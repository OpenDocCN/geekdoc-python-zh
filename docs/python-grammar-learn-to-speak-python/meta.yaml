  md: '# 5.1.1 What is a variable?


    Variables are *named placeholders* for values that reside at a memory address.


    ![](img/bcabe83d3255895870f638a39264a071_88_0.png)


    You can think of variables as values stored in placeholders. Here we have a variable
    named ''a'' holding the value of the digit 1. In Python it''s a primitive of type
    `int` (for *integer*.)


    Variables are stored at a memory address which is assigned automatically in RAM
    at creation time also known as *run time*.


    The variable name is a placeholder pointing to the address in RAM memory where
    the value is physically stored. When you create a new variable, essentially what
    you are doing is naming a memory address:


    ```

    a = 1;

    print(a)                # 1 (value of the variable)

    print(type(a))          # <type ''int''>

    print(id(a))            # 1473574832 (address as integer)

    print(hex(id(a)))       # 0x57d4f7b0 (address as hexadecimal)

    print(type(a) == int)   # True (this is a variable of type integer)


    >>>

    1

    <type ''int''>

    1473574832

    0x57d4f7b0

    True

    ```


    On a 32-bit computer, this value of 1 is actually stored in a placeholder consisting
    of 32 bits that can be either 1 or 0. Only the last bit is switched on:


    ![](img/bcabe83d3255895870f638a39264a071_88_1.png)'
  merge: -1
  pgno: 88
