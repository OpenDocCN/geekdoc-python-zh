- md: "## 7.2.3 Keyword arguments\n\nAs you will shortly see *default arguments* and\
    \ *keyword arguments* share the same syntax. But the difference is in whether\
    \ they are assigned in the parameter list itself or passed as arguments.\n\nIn\
    \ previous example we used *default arguments* to define a function. That's when\
    \ default values are used in case if some or all arguments are missing. But they\
    \ are still assigned in the same order as they appear on the parameter list.\n\
    \nIn contrast to *default arguments* – which simply *define* default values for\
    \ any or all missing arguments – *keyword arguments* allow you to *change the\
    \ order* in which values are *passed* to the function:\n\n```python\ndef say(name,\
    \ message):\n    print(f\"{name} : {message}\")\n\nsay(message = \"Hello\", name\
    \ = \"John\")\n```\n\nWe redefined the order in which arguments were passed. Here's\
    \ the output:\n\n```\nJohn : Hello\n```\n\nAs you can see the arguments were passed\
    \ in an alternative order but the function still produced proper output.\n\n##\
    \ 7.2.4 Mixing keyword and default arguments\n\nIt's possible to mix default and\
    \ keyword arguments together. The only proper way of doing that is to prioritize\
    \ non-keyword parameters in the function definition:\n\n```python\ndef say(name,\
    \ message = \"Greetings\"):\n    print(f\"{name} : {message}\")\n```\n\nHere positional\
    \ non-keyword parameter name is listed first without a default value. This is\
    \ acceptable and it works as expected.\n\n```python\nsay(name = \"Steve\")\n```\n\
    \nAfter setting name to \"Steve\" parameter message is automatically assigned\
    \ value of \"Greetings\" by default:\n\n```\n>>>\nSteve : Greetings\n```\n\nBut\
    \ you may run into two issues with partial definitions.\nFirst, by simply defining\
    \ a default parameter before positional one:\n\n```python\ndef say(name = \"John\"\
    , message):\n    print(f\"{name} : {message}\")\n```\n\nThis function definition\
    \ will produce the following error:\n\n```\nSyntaxError: non-default argument\
    \ follows default argument\n```\n\nBut why using positional arguments *after*\
    \ default arguments is not allowed?\n\n```python\ndef say(name = \"John\", message):\n\
    \    print(f\"{name} : {message}\")\n\n# Overwrite default argument?\n# Or assign\
    \ value to  message?\nsay(\"Steve\")\n```\n\nThis would be simply too confusing\
    \ for the compiler. After all, what does it really mean? Should the first argument\
    \ be replaced by the default argument? Or is the user of this function trying\
    \ to pass second parameter?\n\n## 7.2.5 Arbitrary arguments\n\nArbitrary parameters\
    \ are the assumed parameters of a function. They are not all explicitly defined\
    \ within the function definition.\nArbitrary parameters are defined by using the\
    \ star * (asterisk) character.\n\n```python\ndef list(*arguments):\n    for value\
    \ in arguments:\n        print(value)\n```\n\nNothing happens if none of the arguments\
    \ are passed:\n\n```python\nlist()\n```\n\n```\n>>>\n()\n```\n\nAn empty tuple\
    \ is the result.\nNow let's pass some common animal names:\n\n```python\nlist(\"\
    Fox\",\n    \"Wolf\",\n    \"Coyote\",\n    \"Bear\",\n    \"Rabbit\")\n```\n\n\
    ```\n>>>\nFox\nWolf\nCoyote\nBear\nRabbit\n```\n\nThe arguments parameter is a\
    \ tuple.\nBecause tuples are iterable you can use a for loop here.\n\n## 7.2.6\
    \ Built-in functions\n\nPython has a number of built-in functions. For example\
    \ the function sum does roughly the same thing our custom function add does from\
    \ previous example.\n\n```python\na = sum([10, 5])\nb = sum([12, 8])\n\nprint(a)\
    \ # Prints 15\nprint(b) # Prints 20\n\n>>>\n15\n20\n```\n\nYou can quickly sum\
    \ up a range:\n\n```python\nr = range(0, 5)\na = sum(r)\n\nprint(a) # Prints 10\n\
    ```\n\nThe last example produced 10 after adding numbers 0 1 2 3 4 generated by\
    \ range(0, 5) function.\n\n## 7.2.7 Overwriting built-in functions\n\nPython won't\
    \ generate an error if you create a custom function with the name sum. However\
    \ this means you won't be able to use the built-in function sum in your program.\
    \ Watch out for empty function definitions:\n\n```python\ndef a():\n```\n\nThis\
    \ function definition will produce an error. Functions require at least one statement.\
    \ You will probably never have to create or execute an empty function. But just\
    \ to be complete here is a proper syntax for creating an empty function:\n\n```python\n\
    def b(): return\ndef c(): pass\n```\n\n```python\nb() # nothing happened\nc()\
    \ # nothing happened\n```\n\nUse either `return` without value or `pass` keywords.\n\
    \n## 7.2.8 Practical example\n\nPrevious examples were intentionally basic in\
    \ order to demonstrate how functions are defined and executed. Let's try to build\
    \ something practical.\n\n### What are we calculating?\n\nYou often see social\
    \ media apps display time in \"elapsed\" format. This is done by calculating the\
    \ difference between two numeric time stamp values in seconds: the one from when\
    \ the event occurred and the current time now.\nThe interval between the two dates\
    \ is then converted to something like \"32s\" for 32 seconds, \"1h\" for 1 hour,\
    \ \"2d\" for days or \"3mo\" for 3 months. Alternatively, in cases where interval\
    \ is too long, simply display a date. For example it could be: Wed Nov 18 2020\
    \ or Jan 1 2021.\nIn this section we will take a look at one way of creating this\
    \ function.\n\n### Preparing the data\n\nBefore writing the actual function let's\
    \ define some helper data sets.\nWe know that a minute is 60 seconds, an hour\
    \ is 3600 seconds and so on. Let's create a table to store our intervals in one\
    \ variable:\n\n```python\n# create a table measuring key intervals in seconds\n\
    table = [1,           # seconds (1 to avoid division by 0)\n         60,     \
    \     # 1 minute\n         3600,        # 1 hour\n         3600*24,     # 1 day\n\
    \         3600*24*30,  # 1 month\n         3600*24*30*12] # 1 year\n```\n\nEach\
    \ value represents a \"checkpoint\" to test the time interval (in seconds) against.\
    \ Let's also create a list of endings in string format:\n\n```python\nendings\
    \ = [\"s\", \"m\", \"h\", \"d\", \"mo\", \"y\"]\n```\n\n### Writing seconds2elapsed\
    \ function\n\nThis function converts a time interval in seconds stored in t parameter\
    \ and returns a value that describes that period of time in human-readable form.\n\
    \n```python\nimport time\n\ndef seconds2elapsed(t):\n    difference = abs(time.time()\
    \ - t)\n\n    # convert to integer (truncate decimal point)\n    difference =\
    \ int(difference)\n\n    if (difference == 0)\n        return \"now\"\n\n    i\
    \ = 5\n\n    # iterate over table backwards\n    for interval in reversed(table):\n\
    \n        # if difference is greater\n        if difference > interval:\n    \
    \        t = table[i]\n            v = (difference - (difference % t)) / t\n\n\
    \            # early exit from function\n            return f\"{int(v)}{endings[i]}\"\
    \n\n        # python's for-in loops don't have indexing\n        # so we will\
    \ have to implement our own\n        i -= 1\n```\n\nThe **time.time()** method\
    \ returns time now in seconds with a decimal point. In order to start using it\
    \ you must include **time** package at the top of your program.\n\nFirst we calculate\
    \ the difference between time now and time in seconds passed to the function in\
    \ the t parameter. Using abs function makes sure the interval between two dates\
    \ is never negative.\n\nThe core functionality is in the for loop.\n\nThis for\
    \ loop implements **reversed** method – it flips the order of all items on the\
    \ **table** list. We could have easily reworked our table variable to simply start\
    \ with the year first. But here **reversed** was used to demonstrate one possible\
    \ way of iterating in reverse which wouldn't always be obvious to someone new\
    \ to the language.\n\nWe start with greatest interval which is equal to 1 year\
    \ and compare how many times 1 year can fit into the value stored in difference\
    \ variable calculated in first step. If value is less than 1 year it then checks\
    \ for months, etc.\n\nThe following line of code does all the number crunching:\n\
    \n```python\nv = difference - (difference % t) / t\n```\n\nThe modulo operator\
    \ (%) returns the remainder of a division operation. This helps us perform a clean\
    \ division by t which as you remember refers to the amount of 1 year, 1 month,\
    \ 1 day, 1 hour or 1 minute depending on table index.\n\nRemember that difference\
    \ variable is stored in seconds. But we want 61 seconds to evaluate to 1 minute\
    \ (or \"1m\".) That's what subtracting from the modulo operation will help us\
    \ determine - how many times a value fits into the interval.\n\nThe logic goes\
    \ something like this: if the value in difference variable is greater than 1 year,\
    \ make proper divisions to calculate 1 in the \"1y\" string that will be returned.\
    \ If the interval is larger than 2 years it will be calculated as \"2y\".\n\n\
    If difference is lesser than a year, check if it can be represented by months.\
    \ If difference is shorter than at least one month it will be returned in hours.\n\
    \nIf smaller than hours return in minutes. If it's equal to or less than 60 seconds,\
    \ return value in seconds: \"37s\" for example. If value is 0, return it as \"\
    now\".\n\n### Using seconds2elapsed Function\n\nTo see the function in action\
    \ we need to find a way to call it every few seconds. There is more than one way\
    \ of executing a function at a time interval. For the sake of simplicity this\
    \ section will demonstrate how to do it with **threading** package.\n\nThe **threading**\
    \ package has **Timer** property. It works similar to **setInterval** in JavaScript\
    \ if you're familiar with that function.\n\nThe **Timer** object has **start()**\
    \ method that executes the function after a period of time specified in seconds.\
    \ In this case it was set to 3.0 seconds.\n\n**Note:** This example assumes that\
    \ **seconds2elapsed** function we wrote earlier is also included at some point\
    \ after importing **time** and **threading** packages.\n\n```python\nimport time\n\
    import threading\n# === add definition of seconds2elapsed() function here ===\n\
    since = time.time()\ndef every3seconds():\n    # execute this function every 3.0\
    \ seconds\n    threading.Timer(3.0, every3seconds).start()\n    print(f\"{seconds2elapsed(since)}\"\
    )\n```"
