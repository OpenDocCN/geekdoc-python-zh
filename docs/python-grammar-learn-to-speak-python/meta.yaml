  md: '# 1.2 Thinking in Python


    This book is a break-down of Python''s most important features. But before we
    explore them, let''s take a look at a practical Python program just to give the
    reader an idea of what Python code looks like.


    > We''ll also learn how to "think in Python" by solving a simple bug.


    This section demonstrates a simple program written in Python that converts kilometers
    to miles while expanding on some of its common features.


    # 1.2.1 Convert Kilometers to Miles


    ```

    # get user input in string format

    kilometers = input("Enter number of kilometers:")


    # convert kilometers to floating point number

    kilometers = float(kilometers)


    # km/mi conversion factor

    factor = 0.621371


    # determine miles from kilometers

    miles = kilometers * factor


    # print result to command line

    print("%0.2f km = %0.2f mi" % (kilometers, miles))

    ```


    ```

    >>>

    Enter number of kilometers:10

    10.00km = 6.21mi

    ```


    **Explanation:** To convert kilometers to miles you have to multiply kilometers
    by the kilometers-to-miles conversion factor which is 0.621371.'
