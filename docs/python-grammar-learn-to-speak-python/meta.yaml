    # 5.1. NAMING VARIABLES, VARIABLE TYPES, MEMORY AND...


    When we assigned a to x on line 2 a *copy* of value stored in variable a was made.
    Now x is a completely unique variable holding its own copy of number 1. When we
    increment a, the copy in x stays untouched – they are two separate variables.


    **Assignment by value in Python** is exactly the same:


    ```

    a = 1

    x = a     # make a copy of a and store it in x

    a = a + 1 # increment a

    print(a)  # 2

    print(x)  # 1 (x is still 1 because it''s an original copy)

    ```


    When a was assigned to x, a was actually *copied* to x. This is called assignment
    by value – both values will occupy a similar but unique place in memory:


    ![](img/bcabe83d3255895870f638a39264a071_93_0.png)


    Of course, this means we are using twice as much space in memory. Now two variables
    a and x hold a unique value occupied by two different places in computer memory.
    That''s what you would normally expect to happen.


    **Assignment By Reference in JavaScript**


    In JavaScript variables pointing to objects are assigned by reference. It''s the
    same in Python. Below *Object Literal* and Python''s *dictionary* examples are
    shown.


    To demonstrate it let''s take a look at variable named object pointing to an object
    containing x property, which is also a variable pointing to value of 1:'
