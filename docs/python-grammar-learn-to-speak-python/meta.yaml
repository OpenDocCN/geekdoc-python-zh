    a.append(3)

    a.append(4)

    a.append(5)

    a.append(b)


    print(a)


    >>>

    [1, 2, 3, 4, 5, [6, 7, 8]]

    ```


    # list.extend()


    In previous example we tried to append another list to a list. But append simply
    nests the original list with a new one. This isn''t always what you want to happen.

    In order to *extend* a list by another list you can use extend operation:'
