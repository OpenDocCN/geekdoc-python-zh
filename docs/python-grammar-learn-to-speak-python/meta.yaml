    \ bonkers */` 的序列开始注释。\n如果你来自 C、C++、Java、PHP 或 JavaScript 背景，并开始编写 Python 代码，你会注意到由于没有过多的括号和可选的分号，编写\
    \ Python 代码实际上感觉更轻松。\n\n## 2.3 运行 Python 脚本\n\nPython 脚本通常保存在扩展名为 `.py` 的文件中。要执行脚本，请在命令行中输入以下命令：\n\
    \n```\npython filename.py\n```\n\n如果 `filename.py` 位于你调用此命令的同一目录中，脚本将被执行，你将直接在\
    \ Windows 的 `cmd.exe`、macOS 的终端或你的 Linux bash/cli 中看到其输出。\n`.py` 扩展名不是必需的。你的 Python\
    \ 文件可以被命名为任何名称。只要代码是有效的 Python 代码，它仍然会被解释器处理并执行。例如：\n\npython test\n\n此命令将成功执行\
    \ **test** 文件中的 Python 代码。\n如果你的 Python 脚本没有错误，解释器会将你的代码转换为机器可读的代码并执行它。在你的程序执行完所有语句后，它将退出并返回到命令提示符。\n\
    也有例外。可以在 Python 中编写套接字监听器。这些类型的程序将继续运行并监听传入连接，直到执行被手动停止或服务器崩溃。\n\n## 2.3.1 Python\
    \ 注释\n\n每次你在 Python 代码中看到 `#` 字符，它都表示一个注释。注释对于记录你的代码很有用：\n\n```python\n# create\
