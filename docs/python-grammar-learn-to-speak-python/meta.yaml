    \ + there # TypeError\n\n>>>\nTypeError: unsupported operand type(s) for +: 'Word'\
    \ and 'Word'\n```\n\nWithout overloading + operator trying to add two objects\
    \ doesn't make any sense. What does it mean to add two objects of type Word? And\
    \ what should happen?\nIf only this code worked, it would be a beautiful way for\
    \ solving abstract problems with code. When adding two objects of type Word it\
    \ seems natural that another object of type Word should be returned containing\
    \ both strings concatenated.\nIn the following section we will overload Python's\
    \ built-in magic methods in order to add this new functionality to all objects\
    \ of type Word.\n\n### 9.1 Magic Methods\n\nPython uses magic methods to overload\
    \ operators. The `__add__` magic method will overload + sign so that instead of\
    \ adding numbers like 1 + 1 you will be able to add objects of a particular type.\
    \ You can use `__mul__` and `__div__` objects to override * and division \\ operators\
    \ respectively.\nLet's overload magic method `__add__` of our simple Word class\
    \ from the previous section. To keep things simple in this example we will only\
    \ overload + operator:\n\n```python\nclass Word:\n    def __init__(self, text):\n\
    \        self.text = text\n        print(\"Initialized word\", self.text)\n\n\
    \    # Overload + operator\n    def __add__(self, other):\n        return self.text\
    \ + \" \" + other.text\n```\n\nWe've just overloaded + operator for all object\
    \ instances of type Word. When two objects of this type are added using + a string\
    \ will be returned.\n\n> For each operator you overload you have to supply two\
    \ arguments to the magic method: `self` and `other` where parameter `self` links\
    \ to the object on left hand side of the operator and `other` is a link to object\
    \ to the right of the operator.\n\nLet's see our overloaded operator in action:\n\
    \n```python\nhello = Word(\"hello\")\nthere = Word(\"there\")\n\nprint(hello +\
    \ there)\n```\n\nInstead of `TypeError` we will now see the following result in\
    \ command prompt:\n\n```\nhello there\n```\n\nThis is how operator overloading\
    \ works at its basic. But this doesn't really explain it in context of a practical\
    \ case. In the next section we will write a simple 3D vector class, often used\
    \ in 3D vector math libraries for crunching 3D geometry.\n\n#### 9.1.1 3D Vector\
    \ Class\n\nThis abstract vector object can be used to *add* (+), *subtract* (-)\
    \ or *multiply* (*) 3D vector objects. The < and > symbols are overloaded to compare\
    \ vector length.\nThe length method will calculate 3D vector's length. This is\
    \ done by getting the square root of the sum of each vector's coordinates on each\
    \ axis multiplied by itself (see the formula in body of the def length(self) function.)\n\
    Because we need math.sqrt function, don't forget to first import math module:\n\
    \n```python\nimport math\n```\n\nA 3D vector can be represented using this Cartesian-like\
    \ coordinate system in 3D space where positive z axis extends toward the viewer.\n\
    \n![](img/bcabe83d3255895870f638a39264a071_212_0.png)\n\nA 3D vector is defined\
    \ by 3 points in space: x, y and z which are assumed to extend from the origin\
    \ of the coordinate system at [x=0, y=0, z=0]. Therefore it can be represented\
    \ by the following Python class:\n\n```python\nclass vector:\n    def __init__(self,\
    \ x, y, z):\n        self.x = x\n        self.y = y\n        self.z = z\n    \
    \    self.len = self.length()\n```\n\nUnlike JavaScript, in Python you *cannot*\
    \ have class attribute and method share the same name. You cannot have an attribute\
    \ called `length` and a method called `length`. Your code will still compile but\
    \ one will overwrite the other without displaying any errors.\n\nFor this reason\
    \ in this example attribute `len` will store length of the vector. And `length()`\
    \ is the function that calculates it.\n\nPython object constructor `__init__(self)`\
    \ allows calling functions found later in the definition of that class. You can\
    \ say Python's class methods are *hoisted* to the constructor which is how it\
    \ also works in JavaScript and many other languages.\n\nOur constructor calls\
    \ `self.length()` method defined later in the class. Here is the definition:\n\
    \n```python\ndef length(self):\n    self.length = math.sqrt(self.x * self.x +\n\
    \                            self.y * self.y +\n                            self.z\
    \ * self.z)\n    return self.length\n```\n\nThis function uses `math.sqrt` to\
    \ calculate the length of the vector given 3 coordinates on x, y and z axis.\n\
    \nAnd finally, let's overload several *magic methods*:\n\n```python\ndef __add__(self,\
    \ other):\n    self.x += other.x\n    self.y += other.y\n    self.z += other.z\n\
    \    return self\ndef __sub__(self, other):\n    self.x -= other.x\n    self.y\
    \ -= other.y\n    self.z -= other.z\n    return self\ndef __mul__(self, other):\n\
    \    self.x *= other.x\n    self.y *= other.y\n    self.z *= other.z\n    return\
    \ self\ndef __div__(self, other):\n    self.x /= other.x\n    self.y /= other.y\n\
    \    self.z /= other.z\n    return self\ndef __lt__(self, other):\n    #print\
    \ self.length()\n    #print other.length()\n    return self.length() < other.length()\n\
    def __gt__(self, other):\n    return self.length() > other.length()\ndef __str__(self):\n\
    \    return \"[{},{},{}]\".format(self.x, self.y, self.z)\n```\n\nLet's use this\
    \ class to create two vectors:\n\n```python\nvec_1 = vector(5, 3, 1)\nvec_2 =\
    \ vector(3, 4, 2)\n```\n\nWhen we pass vec_1 or vec_2 to print function __str__\
    \ method is activated:\n\n```python\nprint(vec_1)        # [5,3,1]\nprint(vec_1.length)\
    \ # 5.9\nprint(vec_2)        # [3,4,2]\nprint(vec_2.length) # 5.3\n```\n\nAnd\
    \ finally, let's see our overloaded operators in action:\nWe have just created\
    \ a vector class that allows us to easily add, subtract, multiply, divide and\
    \ compare 3D vectors by length. You can use the same logic to overload objects\
    \ of any type.\n\n## Chapter 10. Classes\n\nThe Sun is a type of a star. Earth\
    \ is a type of a planet. A car is a type of a vehicle. You can create your own\
    \ custom classes to represent all kinds of objects.\nA class is an abstract representation\
    \ of an object. Classes define types of data. For example a class can represent\
    \ anything from a number, a text string or something more complex like an abstract\
    \ model of a car, train, airplane or an animal.\nA class has a constructor function\
    \ responsible for building an instance of the object of type it represents. A\
    \ class can also have a number of *attributes* (known as *properties* in some\
    \ other languages) and *method* definitions.\nLet's create a class Car with one\
    \ attribute and one method:\n\n```python\nclass Car:\n    top_speed = \"180mph\"\
    \n    def describe():\n        print(\"I am method of a Car class\")\n\nprint(Car.top_speed)\
    \ # prints \"180mph\"\nCar.describe()       # prints \"I am method of a Car class\"\
    \n```"
