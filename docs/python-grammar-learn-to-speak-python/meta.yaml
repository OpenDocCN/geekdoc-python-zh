    When we think of Python sequences we think of the order in which items are arranged.

    Sequences can be thought of as *ordered sets*. However, the set (as we will see
    later) structure is not a sequence in Python. In a set order is not guaranteed.

    Sequences guarantee that items in a sequence will be accessible and available
    at the index at which they were originally defined:


    ```

    str = "hello";


    # access second character

    print(str[1])


    >>>

    e

    ```


    Python is an evolving language and that means more sequence types *may* be added
    in the future. Sequences usually share a similar set of operations. Mutable sequences
    like list and string can use + operator to the same effect.

    For example the concatenation operator + can be used on two sequences to combine
    them. Or you can repeat the content of a sequence by a number of times:


    ```

    ha = "ha"

    print(ha * 3)


    checkered = ("black", "white")

    print(checkered * 2)


    zebra = [0, 1]

    print(4 * zebra)

    ```'
