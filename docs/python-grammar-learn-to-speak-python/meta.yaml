    \ previous example we used *default arguments* to define a function. That's when\
    \ default values are used in case if some or all arguments are missing. But they\
    \ are still assigned in the same order as they appear on the parameter list.\n\
    \nIn contrast to *default arguments* – which simply *define* default values for\
    \ any or all missing arguments – *keyword arguments* allow you to *change the\
    \ order* in which values are *passed* to the function:\n\n```\ndef say(name, message):\n\
    \    print(f\"{name} : {message}\")\n\nsay(message = \"Hello\", name = \"John\"\
    )\n```\n\nWe redefined the order in which arguments were passed. Here's the output:\n\
    \n```\nJohn : Hello\n```\n\nAs you can see the arguments were passed in an alternative\
    \ order but the function still produced proper output.\n\n# 7.2.4 Mixing keyword\
    \ and default arguments\n\nIt's possible to mix default and keyword arguments\
    \ together. The only proper way of doing that is to prioritize non-keyword parameters\
    \ in the function definition:\n\n```\ndef say(name, message = \"Greetings\"):\n\
    \    print(f\"{name} : {message}\")\n```\n\nHere positional non-keyword parameter\
    \ name is listed first without a default value. This is acceptable and it works\
    \ as expected."
