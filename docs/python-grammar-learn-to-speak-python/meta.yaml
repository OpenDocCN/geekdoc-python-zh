    \ has no attribute 'update'\n```\n\nAttempting to update a frozen set results\
    \ in AttributeError.\nAt first it might not make any sense as to why you would\
    \ want to use a data structure which does not allow changing its items.\n\n# Chapter\
    \ 7\n\n## Functions\n\nIn previous examples we used the built-in function `print`\
    \ (and many others!) The print function is part of Python's specification. It's\
    \ available to use out of the box. But you can also create your own functions.\
    \ In this chapter we'll explore the basic anatomy of Pythonic functions.\n\nIn\
    \ Python functions are defined using `def` keyword.\n\n```\ndef message():\n \
