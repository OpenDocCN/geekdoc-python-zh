    \nStatic methods, on the other hand, can be called on class name itself – they\
    \ are used as utility functions and don't have access to `self`.\n\nBut – uniquely\
    \ to Python – there is also something called a *class method*, which is sort of\
    \ a hybrid between a static method and a method that can access `self`.\n\nIn\
    \ the following section we will discern the difference between regular class methods\
    \ and static methods and how they work in Python.\n\n## 10.1 Instance, Class and\
    \ Static Methods\n\nIf you are coming to Python from an Object Oriented programming\
