    \ 'l', 'l', 'o']'\n```\n\n## list.index()\n\n查找某个值在列表中的索引位置。注意，列表采用从0开始的索引枚举值。第一个字母\
    \ 'a' 位于索引 0，'o' 位于索引 1，依此类推。\n\n```python\nvowels = ['a', 'o', 'i', 'u', 'e']\n\
    \nnum = vowels.index('u')\n\nprint(num)\n\n>>>\n3\n```\n\n## list.insert()\n\n\
    如果你不想追加或扩展列表，而是想在特定索引位置插入新元素，该怎么办？这就是 `insert` 方法的用途：\n\n```python\na = ['a',\
    \ 'b', 'd', 'e']\n\n# 有些地方看起来不对\nprint(a)\n\n# 让我们在正确的位置插入 'c'：\na.insert(2, 'c')\n\
    \nprint(a)\n\n>>>\n['a', 'b', 'd', 'e']\n['a', 'b', 'c', 'd', 'e']\n```\n\n##\
    \ list.remove()\n\n要从列表中再次移除 'c'：\n\n```python\na = ['a', 'b', 'c', 'd', 'e']\n\
    \na.remove('c')\n\nprint(a)\n\n>>>\n['a', 'b', 'd', 'e']\n```\n\n重要提示：只会移除一个匹配的元素：\n\
    \n```python\na = ['a', 'b', 'c', 'd', 'c', 'e']\n\na.remove('c')\n\nprint(a)\n\
    \n>>>\n['a', 'b', 'd', 'c', 'e']\n```\n\n请注意，`remove` 操作后第二个 'c' 仍然存在。要从列表中移除所有\
    \ 'c'，你可以先统计它们的数量，然后调用 `remove` 方法，次数等于它在列表中出现的次数：\n\n```python\nalpha = ['a',\
    \ 'b', 'c', 'd', 'c', 'e']\n\nfor item in range(alpha.count('c')):\n    alpha.remove('c')\n\
    \nprint(alpha)\n\n>>>\n['a', 'b', 'd', 'e']\n```\n\n`range` 函数将创建一个数字范围，其数量等于列表中找到的\
