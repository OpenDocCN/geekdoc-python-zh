    \n```python\nc = 3\nwhile c:\n    print(c)\n    c -= 1\n```\n\nOne difference\
    \ between Python and many other languages is the absence of curly brackets when\
    \ defining a block of code. In this case, the body of the while loop is indented\
    \ by four spaces. You can use any number of characters or tabs as long as they\
    \ are consistent with the previous line in the same block scope.\n\n> Note: Python\
    \ disallows combining different number of spaces on each consecutive line for\
    \ indentation of the same block. Doing that would make it impossible to know where\
    \ each block starts and ends.\n\nThe while c: statement is evaluated to True as\
    \ long as c remains a positive number. Then c is decremented by 1 by executing\
    \ c -= 1 statement. When c reaches 0 while loop will interpret it as False and\
    \ terminate. The result is 3 decreasing numbers printed in a row.\n\nHere is another\
    \ Python program that picks random numbers from a range:\n\n```python\nimport\
    \ random\n\nnumbers = range(1, 15)\nchosen = []\n\nwhile len(chosen) < 6:\n  \
    \  number = random.choice(numbers)\n    chosen.append(number)\n\nprint(chosen)\n\
    ```\n\nWhat's going on here?\n\n## 2.2. BASICS\n\nUsing **import** keyword the\
    \ program includes a built-in *module* called `random`. This package contains\
    \ methods for working with random numbers.\n\nFor example `random.choice` method\
    \ returns a random element from a set. In Python *ordered* sets of items can be\
    \ also referred to as *sequences*.\n\nA Python sequence is an *iterable*, like\
    \ a JavaScript Array.\n\nThe built-in **range** function generates a linear set\
    \ of numbers between 1 and 15. This sequence is then stored in the variable **numbers**.\n\
    \n> In Python you don't have to type int, float, var, let or const to define a\
    \ variable. Variable names are not even preceded by something like $ as you would\
    \ see in PHP language. They are just names.\n\nThe script then creates a variable\
    \ called **chosen** to store an empty array `[]`. Inside the **while** loop a\
    \ random number is chosen and stored in **number** variable. **numbers.remove(number)**\
    \ line removes that number from **numbers** sequence. Then it will append the\
    \ same number to **chosen** array. This is equivalent to *moving* it from **numbers**\
    \ array into **chosen** array.\n\nWithout a condition **while** loop iterates\
    \ infinitely. But because it checks length of the array **chosen** using another\
    \ built-in Python method **len**, when the length of chosen array reaches 6 the\
    \ loop will be terminated.\n\nLastly, using built-in **print** function, we output\
    \ the array **chosen**. It will contain 6 numbers randomly picked out from the\
    \ original range that was stored in `numbers`.\n\nIf you run it, the result of\
    \ this program will be printed to the console:\n\n```\n[14, 44, 42, 16, 5, 6]\n\
    ```\n\nOr if you launch it from the Command Prompt:\n\n```\nC:>python hello.py\n\
    [7, 3, 41, 18, 20, 28]\n```\n\nOf course because numbers are chosen using a *Random\
    \ Number Generator* if you run this script on your computer, the six numbers will\
    \ be different every time.\n\n## 2.2.4 A Common Pitfall\n\nOne mistake beginners\
    \ can make here is to name the python script for this example **random.py**. Don't\
    \ do it. You will generate an error:\n\n```\nC:\\>python random.py\nTraceback\
    \ (most recent call last):\n  File \"random.py\", line 1, in <module>\n    import\
    \ random\n  File \"C:\\random.py\", line 7, in <module>\n    number = random.choice(numbers)\n\
    AttributeError: 'module' object has no attribute 'choice'\n\nC:\\>\n```\n\n> Do\
    \ not name your Python files the same name as built-in Python modules. Here, because\
    \ we named our script **random.py** and inside imported the module called **random**\
    \ (it is proper for modules to be specified without **.py**) we confused the Python\
    \ interpreter.\n\n## Python is a High-level Language\n\nIn comparison to low-level\
    \ programming languages designed to work close to the hardware-level, Python was\
    \ designed to read more like a human language.\n\nYou can say that low-level languages\
    \ like The Assembly Language created to make it easier to communicate with things\
    \ like memory addresses. Their instruction sets resemble code that talks directly\
    \ to the hardware.\n\nPython is a high-level language. It's not as close to hardware\
    \ as some others. But this makes Python easy to read and I hope you agree that\
    \ it looks very clean.\n\n## Poetic Python\n\nIn comparison to languages that\
    \ use excessive square and curly brackets Python may looks like a hand-written\
    \ letter. Or perhaps even poetry.\n\n## 2.3. RUNNING PYTHON SCRIPTS\n\nIn the\
    \ book called ./code –poetry by Daniel Holden and Chris Kerr the authors present\
    \ 38 pages of poetry written in various computer languages.\nHere is a Python\
    \ poem from the book:\n\n```python\n# This script should save lives.\nimport soul\n\
    \nfor days in len(life)\n    print \"happiness\"\n```\n\nNot many popular computer\
    \ languages can claim the right to look and read as naturally as one would read\
    \ poetry. Perhaps Python is one them.\nThere is something elegant about Python\
    \ comments that begin with #. In contrast to many other languages that start comments\
    \ with an ugly, repetitive sequence of two forward slashes // or something like\
    \ /* bonkers */\nIf you’re coming from C, C++, Java, PHP or JavaScript background\
    \ and start writing Python code, you will notice that it actually feels lighter\
    \ on the hands to write Python code due to absence of excessive brackets and optional\
    \ semicolons.\n\n## 2.3 Running Python Scripts\n\nPython scripts are usually saved\
    \ in files ending with .py extension. To execute the script type the following\
    \ command into the Command Line:\n\n```\npython filename.py\n```\n\nIf filename.py\
    \ is located in the same directory from which you’re calling this command the\
    \ script will be executed and you will see its output directly in your cmd.exe\
    \ on Windows, Terminal on macOS or your Linux bash/cli.\nThe .py extension is\
    \ not a requirement. Your Python file could have been named anything. As long\
    \ as the code is valid Python code, it would still be processed by the interpreter\
    \ and executed. For example:\n\npython test\n\nThis command would successfully\
    \ execute Python code in **test** file.\nIf your Python script contains no errors\
    \ the interpreter will convert your code into machine-readable code and execute\
    \ it. After your program has executed all statements it will exit back to the\
    \ command prompt.\nThere are exceptions. It is possible to write socket listeners\
    \ in Python. Those types of programs will continue running and listening to incoming\
    \ connections until execution is stopped manually or the server crashes.\n\n##\
    \ 2.3.1 Python comments\n\nEvery time you see # character in Python code it indicates\
    \ a comment. Comments are useful for documenting your code:\n\n```python\n# create\
    \ variable a and assign 1 to it\na = 1\n```\n\nComments can trail after the statement:\n\
    \n```python\nprint(message) # Print my message\n```\n\nComments are not Python\
    \ code, they are free-style notes. As such they are ignored by the compiler. You\
    \ can never generate a compiler error by a comment.\nComments are used to leave\
    \ notes to self, reminding you what a block of code or a function below it does.\
    \ They can be also notes left for other programmers or teammates who will be reading\
    \ your code in the future.\nSome tutorials and courses teach that using triple\
