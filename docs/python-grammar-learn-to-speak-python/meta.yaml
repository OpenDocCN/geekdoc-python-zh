    \n在 Python 中，通常使用某些数据结构来初始化另一种类型的数据结构。你可以通过将列表传递给 `tuple` 构造函数来使用列表初始化元组：\n\n\
    ```python\nlist = ['apples', 'oranges', 'pineapples']\n\ntup = tuple(list)\n\n\
    print(tup)\n\n>>>\n('apples', 'oranges', 'pineapples')\n```\n\n可以创建元组列表和列表元组：\n\
    \n```python\n# 元组列表\na = [(1, 2), (3, 4)]\n\n# 列表元组\nb = ([1, 2], [3, 4])\n\n\
    print(a)\nprint(b)\n\n>>>\n[(1, 2), (3, 4)]\n([1, 2], [3, 4])\n```\n\n那么区别是什么？本节将尝试回答这个问题。\n\
    与列表一样，元组可以包含不同类型的值：\n\n```python\nmixed = (\"almonds\", \"oranges\", 15, 7, 0,\
    \ ['a', 'b', 'c'])\nprint(mixed)\n\n>>>\n('almonds', 'oranges', 15, 7, 0, ['a',\
    \ 'b', 'c'])\n```\n\n你也可以从列表初始化元组：\n\n```python\nemployees = [\"mary\", \"robert\"\
    , \"david\"]\n\ntup = tuple(employees)\n\nprint(tup)\n\n>>>\n('mary', 'robert',\
    \ 'david')\n```\n\n到目前为止，元组的工作方式与列表完全相同。你甚至可以使用方括号 `[]` 和索引来访问元素：\n\n```python\n\
    print(employees[0])\nprint(employees[1])\n\nprint(tup[0])\nprint(tup[1])\n\n>>>\n\
