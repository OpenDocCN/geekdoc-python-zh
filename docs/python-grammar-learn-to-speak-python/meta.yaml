  md: 'Assignment by reference is based on the same principle across many different
    languages. However, not all computer languages provide exactly the same set of
    features to deal with it.


    Python doesn''t allow assignment of primitive values (string, number, etc) by
    reference. This only happens when the assigned variable is object-like (dictionary,
    list, sequence.)


    In some languages like C++ it is possible to assign variables as a reference using
    a leading ampersand (&) character:


    ```

    int original = 9;     // create variable

    int &ref = original;  // assign by reference

    ref++;                // increment reference by 1

    cout << original;     // prints 10

    ```


    In this example original also returns 10 after ref is incremented. The C++ language
    relies heavily on references and memory pointers which often leads to crashing
    your computer. JavaScript and Python are more strict in this regard.


    If assignment by reference is part of so many computer languages, it must be an
    important feature! But it seems pointless without a practical example.


    # 5.1.7 Why assign by reference?


    It is often mentioned that you can assign variables or objects by value or reference.
    But it is rarely explained why it is done this way.


    Computer memory is a limited resource. The larger the data sets you are generating
    or working with, the more memory you will require to store them.


    Reference assignment solves two problems. One is that we save space in computer
    memory. We also avoid physically copying values from one place to another.


    Copying is an computationally expensive operation for large data sets:


    ```

    # assign by reference

    object1 = object2

    ```'
