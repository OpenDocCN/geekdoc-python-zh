  md: '# CHAPTER 5. VARIABLES


    Imagine that an object contains 1 million properties. Copying the entire contents
    of an object is a lot of work.


    ![](img/bcabe83d3255895870f638a39264a071_98_0.png)


    Python''s = operator has no way of knowing how large your object actually is.
    Had the = operator triggered a physical memory copy between objects, you''d have
    to wait a while until the operation would complete.


    A simple assignment should never take that much time. This is the reason why most
    languages implement object assignment *by reference*.


    If your object contains millions of properties it would be too much overhead for
    just one line of code. Now imagine if some of those properties are also objects
    containing thousands of other properties. This can bring execution to a halt.


    A reference, on the other hand, is only assigned once as an alias to original
    value.


    > Note, however, this doesn''t mean that you should always avoid copying objects.
    In fact, some algorithms require copying data. Assignment by reference simply
    increases efficiency in many cases.'
