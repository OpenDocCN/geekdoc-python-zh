  mdcn: "## 10.0.1 类构造函数\n\n空类没有什么特别之处。类主要用作创建其代表类型对象的蓝图。类最常见的用途是*实例化一个对象——或多个对象*——该类型的对象。\n\
    \n**构造函数**是一个函数，当你使用该类实例化对象时会被调用——没有它，对象就无法被实例化。\n\n在 Python 中，对象的构造分两个阶段进行。因此，有两个*魔法方法*负责对象的构造：`__new__`\
    \ 和 `__init__`。你可以使用其中任何一个，或者两者都用。\n\n以下示例将演示这一切是如何协同工作的。\n\n```\nclass Car:\n\
    \    def __init__(self):\n        print(\"Hello from __init__\")\n```\n\n定义两个同名的类会覆盖前一个：\n\
    \n```\nclass Car:\n    def __init__(self):\n        print(\"Hello from __init__\"\
    )\n```\n\n```\nclass Car:\n    def __init__(self):\n        print(\"Hello from\
    \ overwritten class Car\")\n```\n\n不会像其他一些语言那样产生重定义错误。第二个定义只是简单地覆盖了第一个，并在实例化对象时被使用。\n\
    \n## 实例化对象\n\n要实例化一个 `Car` 类型的对象，我们调用 `Car()` 构造函数并将其赋值给变量名 mazda：\n\n```\nmazda\
    \ = Car()\n```\n\n变量 mazda 现在持有一个 Car 类型对象的实际实例。参数 self 是对正在创建的对象实例的自动引用。如果将其打印出来，它将显示对象实例在内存中的位置。\n\
    \n让我们在以下示例中打印它：\n\n```\nclass Car:\n    def __init__(self):\n        print(self)\n\
    \ntesla = Car()\nprint(tesla)\n```\n\n此示例也创建了一个 Car 类型的对象实例：\n\n```\n<__main__.Car\
    \ instance at 0x0000000002CBF6C8>\n```\n\n## 对象属性\n\n在本章开头，我们访问了 Car.top_speed\
    \ 属性。\n你可以将其视为属于类本身的类范围属性。只有在该类主体内定义的属性才继承此行为。\n\n向对象的实际实例添加属性是通过 self 属性完成的。\n\
    在此示例中，构造函数通过指向对象实例的 self 属性，为 make 和 wheel 属性分配了两个硬编码值：\n\n```\nclass Car:\n \
    \   def __init__(self):\n        self.make = \"Tesla\"\n        self.wheels =\
    \ 4\n        print(self.make, self.wheels, \"wheels\")\n\ntesla = Car()    # 从构造函数打印\
    \ \"Tesla 4 wheels\"\n```\n\n尽管没有通过 Car() 调用向构造函数传递任何参数，但属性是通过 self 从构造函数分配给对象实例的。\n\
    \n## 使对象构造函数更灵活\n\n我们并不真的想在构造函数中像前面的示例那样硬编码属性值。为了使我们的类更灵活，我们希望让用户通过构造函数本身传递它们，以创建不同类型的汽车：\n\
    \n```\nclass Car:\n    def __init__(self, p1, p2):\n        self.make = p1\n \
    \       self.wheels = p2\n        print(self.make, self.wheels, \"wheels\")\n\n\
    volvo = Car(\"Volvo\", 18)    # 打印 \"Volvo 18 wheels\"\n```\n\n你也可以从对象实例单独访问属性：\n\
    \n```\nprint(volvo.make)   # 打印 \"Volvo\"\nprint(volvo.wheels) # 打印 18\n```\n\n\
    使用与实例属性相同的参数名是合法的：\n\n```\nclass Car:\n    def __init__(self, make, wheels):\n\
    \        self.make = make\n        self.wheels = wheels\n        print(self.make,\
    \ self.wheels)\n```\n\n这是 Python 类构造函数最常见的形式。\n\n## 10.0.2 使用 __new__ 构造函数\n\n\
    魔法方法 __new__ 是可选的。它在 __init__ 之前执行，作为创建对象实例的同一过程的一部分。\n\n使用 __new__ 时，你*必须*在类定义\
    \ `Car (object):` 中添加 `(object)`。\n\n```\nclass Car(object):\n    def __new__(cls):\n\
    \        print(\"Hello from __new__\")\n        return object.__new__(cls)\n```\n\
    \n这里使用任意的 cls 参数代替了 self。\n\n需要从 __new__ 方法返回一个对象。\n\n与 __init__ 一样，你可以提供额外的参数：\n\
    \n```\nclass Car(object):\n    def __new__(cls, make, wheels):\n        cls.make\
    \ = make\n        cls.wheels = wheels\n        return object.__new__(cls)\n```\n\
    \n像 __init__ 一样，__new__ 也分配属性。\n\n让我们检查一下：\n\n```\nvolvo = Car(\"volvo\", 18)\n\
    print(volvo.make)\nprint(volvo.wheels)\n```\n\n打印：\n\n```\nvolvo\n18\n```\n\n\
    我们刚刚看到了 __new__ 如何可以用来替代 __init__，但除非在高级情况下，否则可能不应该这样做。\n\n## 10.0.3 同时使用 __new__\
    \ 和 __init__\n\n如果两者都存在，__new__ 方法先执行：\n\n```\nclass Car(object):\n    def __new__(cls,\
    \ make, wheels):\n        cls.make = make\n        cls.wheels = wheels\n     \
    \   return object.__new__(cls)\n    def __init__(self, make, wheels):\n      \
    \  print(self.make, self.wheels)\n```\n\ncls 变成了 self（它们都指向同一个构造的对象实例）\n\n属性 make\
    \ 和 wheels 在 __new__ 中被分配给 cls 对象。\n从 __new__ 返回的对象被传递给 __init__ 内部的 self——它们都指向同一个对象实例。__init__\
    \ 至少需要一个 self 参数。因此 __new__ *必须*返回一个对象——否则 init 永远不会被调用。\n\n```\nvolvo = Car(\"\
    volvo\", 10) # 打印 \"volvo 10\"\n```\n\n同时使用 __new__ 和 __init__ 时，两个魔法方法中*必须*指定相同数量的参数。\n\
    \n## self 覆盖 cls\n\n你可以将属性分配给 cls 对象，但分配给 __init__ 的 self 会覆盖它们：\n\n```\nclass\
    \ Car(object):\n    def __new__(cls, make, wheels):\n        cls.make = make\n\
    \        cls.wheels = wheels\n        return object.__new__(cls)\n    def __init__(self,\
    \ make, wheels):\n        self.make = \"over\"\n        self.wheels = \"written\"\
    \n        print(self.make, self.wheels)\n```\n\n以下代码将打印 \"over written\"，而不是 \"\
    volvo 80\"：\n\n```\nvolvo = Car(\"volvo\", 80) # 打印 \"over written\"\n```\n\n\
    你可以根据自己的喜好或情况，覆盖两个*魔法方法*或只覆盖一个。\n只需记住，单个 `__init__` 构造函数是 Python 中创建对象最常见的方式。在大多数情况下，你根本不需要覆盖\
    \ `__new__`。\n`__new__` 和 `__init__` 方法是*魔法方法*。无论如何它们都会在底层执行，但通过显式定义它们，我们可以控制方法的主体和返回值，以修改它们的行为。\n\
    \n## 使用 `__slots__` 进行内存优化\n\n默认情况下，Python 使用字典来存储对象实例的属性。在处理成千上万或数百万个对象时，这可能会占用大量\
    \ RAM。\n使用 `__slots__` 方法，在许多情况下可以将 RAM 使用量减少 40% 到 50%。\n\n```\nclass SomeClass(object):\n\
    \    __slots__ = ['name', 'identifier']\n    def __init__(self, name, identifier):\n\
    \        self.name = name\n        self.identifier = identifier\n```\n\n要让 Python\
    \ 使用 slots，请创建一个与传递给类构造函数的参数名匹配的参数名列表，并将其分配给 `__slots__` 属性。\n这应该会自动减少 RAM 使用量，尤其是在使用小型类和同一对象的许多实例的程序中。\n\
    \n## 下一步是什么？\n\n类通常是为了定义对象方法而创建的，你可以在对象实例上调用这些方法。正如我们刚刚看到的，类构造函数可以访问 `self`，其中\
    \ `self` 和*对象实例*是同义词。\n\n另一方面，静态方法可以在类名本身上调用——它们用作实用函数，不能访问 `self`。\n\n但是——这是\
    \ Python 独有的——还有一种叫做*类方法*的东西，它介于静态方法和可以访问 `self` 的方法之间。\n\n在下一节中，我们将区分常规类方法和静态方法，以及它们在\
    \ Python 中的工作方式。\n\n## 10.1 实例方法、类方法和静态方法\n\n如果你是从 C++ 等面向对象编程语言转向 Python，你可能会发现\
