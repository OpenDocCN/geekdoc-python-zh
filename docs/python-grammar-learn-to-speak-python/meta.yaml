    # 2.3.1 Python comments


    Every time you see # character in Python code it indicates a comment. Comments
    are useful for documenting your code:


    ```

    # create variable a and assign 1 to it

    a = 1

    ```


    Comments can trail after the statement:


    ```

    print(message) # Print my message

    ```


    Comments are not Python code, they are free-style notes. As such they are ignored
    by the compiler. You can never generate a compiler error by a comment.

    Comments are used to leave notes to self, reminding you what a block of code or
    a function below it does. They can be also notes left for other programmers or
    teammates who will be reading your code in the future.

    Some tutorials and courses teach that using tripple quotes """ should be used
    as multi-line comments. That''s not true. Python interprets """ as a stand-alone
    string value. And while the compiler will ignore them if they are not assigned
    to any variables they should never be used as comments:'
