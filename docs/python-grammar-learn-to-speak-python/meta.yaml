    # 3.1. BASIC OPERATIONS


    You can force the value to be interpreted by any type you want. See next section.


    # Floating point and .format() method


    Using {:.f} will force the value to be interpreted as floating point number regardless
    of whether it actually is (in this case it''s a whole number):


    ```

    print("Your balance is $:f".format(125))

    >>>

    Your balance is $125.000000

    ```


    By default the floating point number will display 6 trailing zeros. Perhaps this
    is not how you want to display a monetary value. But there is a solution.


    # Floating point with decimal point


    Sometimes you want to choose number of digits to the right of . in a floating
    point number. For example, when displaying financial information like balance.
    You can do that with {:.2f}


    ```

    num = 125

    print("Your balance is $:.2f".format(num))

    >>>

    Your balance is $125.00

    ```


