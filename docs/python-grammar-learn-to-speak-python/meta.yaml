    \n字典通过使用属性（也称为键）来引用其数据。在此类对象中存储值的顺序是不可靠的——在程序的整个生命周期中，它可能随时自发改变。字典是可迭代的，但它们不是序列。\n\
    \n你可以将序列视为可枚举对象，因为它假定每个项目都存储在数字索引处。学习数据类型时，区分可枚举对象和可迭代对象很重要。\n\n可迭代对象可以使用 for\
