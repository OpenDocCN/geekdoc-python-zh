    \ without indents:\n\n```\ndef message(): print(\"My message.\")\n```\n\nIf the\
    \ function does not require any arguments you can execute it by typing its name\
    \ with empty parenthesis at the end:\n\n```\nmessage()\n\n>>>\nMy message.\n```\n\
    \nYou can make a function execute as many statements as you want:\n\n```\n# Define\
    \ a function that executes multiple statements:\ndef messages():\n    print(\"\
    My message.\")\n    print(\"My other message.\")\n    print(\"Something else.\"\
    )\n\n# Call this function:\nmessages()\n\n>>>\nMy message.\nMy other message.\n\
    Something else.\n```\n\n## 7.1 Using return keyword to return values\n\nFunctions\
    \ help us print messages, execute a number of any Python statements in a row or\
    \ do calculations in isolation. But they can also *return a value* or multiple\
    \ values that can be later stored in a variable or printed.\n\nTo return a value\
    \ use the return statement and the value:\n\n```\ndef thousand():\n    return\
    \ 1000\n\n# Execute the function\n# and assign its return value to variable num:\n\
    num = thousand()\n\nprint(num) # prints 1000\n```\n\nHere we used the return keyword\
    \ to return a value from the function and assign it to a new variable. We then\
    \ printed it out using print function.\n\n## 7.2 Function Parameters and Arguments\n\
    \nOne property of a function is the ability to receive information passed to it\
    \ as parameters. Function *parameters* are optional but if present, they become\
    \ part of the function's definition. Parameters are defined as a list of variable\
    \ names.\n\nArguments are the real values passed to the function that will be\
    \ assigned to its parameter names. Inside scope of the function you will use its\
    \ parameter names to refer to the values that were passed into the function.\n\
    \nPython has 4 different ways in which it allows specifying function parameters:\
    \ *positional*, *default*, *keyword* and *arbitrary*.\n\n### 7.2.1 Positional\
    \ arguments\n\nIn this section we'll explore *positional arguments*. Positional\
    \ arguments define the *required* arguments a function expects to receive. Not\
    \ providing them when calling the function will result in an error.\n\nLet's create\
    \ a function called add that takes two arguments: a and b.\nIt can be defined\
    \ as follows:\n\n```\ndef add(a, b):\n    return a + b\n```\n\nHere the a and\
    \ b variable names are the *parameters* of the function.\nThis function takes\
    \ two numeric values and returns their sum. Let's execute it two times in a row\
    \ by passing two different sets of *arguments*:\n\n```\nr = add(10, 5) # 10 and\
    \ 5 are the function's arguments\ns = add(12, 8) # 12 and 8 are the function's\
    \ arguments\n\nprint(r) # Prints 15\nprint(s) # Prints 20\n```\n\nThe values 10,\
    \ 5 and 12, 8 are the arguments passed to the function.\n\n### 7.2.2 Default arguments\n\
    \nYou can define *default arguments* in function's parameter list. Default arguments\
    \ will be used as a fall back if no other values are provided:\n\n```\ndef say(name\
    \ = \"John\", msg = \"Hello\"):\n    print(name, \":\", msg)\n```\n\nLet's call\
    \ this function to see what happens if we skip all arguments:\n\n```\nsay()\n\
    ```\n\n```\n>>>\nJohn : Hello\n```\n\nThe function falls back on default values.\
    \ You can also pass partial arguments:\n\n```\nsay(\"Steve\")\n```\n\nOutputs:\n\
    \n```\nSteve : Hello\n```\n\nOr you can overwrite both arguments:\n\n```\nsay(\"\
    Steve\", \"Goodbye\")\n```\n\nOutputs:\n\n```\nSteve : Goodbye\n```\n\nArguments\
    \ are usually passed to the function in the same order they appear in the function's\
    \ parameter list in function's definition. But not always:\nIn Python you can\
    \ also use something called *keyword arguments*."
