    # 6.9 set


    A set is an *unordered, immutable* collection of unique elements – it cannot contain
    duplicate values. Sets are not sequences, because they are unordered.

    Like tuples, sets are immutable – their values cannot be modified once defined.

    The difference is that sets cannot contain duplicate values. Each value in a set
    is unique and appears only once even if duplicates were provided in the assignment:


    ```

    s = {3, 3, 3, 5}

    print(s)


    >>>

    {3, 5}

    ```


    Duplicate values were automatically removed. One use case could be storing email
    lists when you need to make sure that no email appears on the list more than once.

    The set data structure provides a number of methods you can and should use to
    manipulate sets (but not in a way that changes its values). These methods will
    be explored in the following section of this book.


    # set.add()


    Use add(*element*) method to add a new item to the set:


    ```

    followers = "@pythonista"

    followers.add("@pythonic129")


    print(followers)


    >>>

    ''@pythonista'', ''@pythonic129''

    ```


    If the element already exists, nothing happens.'
