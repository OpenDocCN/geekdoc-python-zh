    I like it, and I would NOT wear it on a T-shirt.*


    Over 25 people disagree with you so far and thats without any advertising whatsoever
    (it''s an older version of the logo) because you can get T-Shirts from cafepress/pydotorg
    and any profits go to the PSF.


    > *Both the cross and the yin-yang have religious associations, which will be
    positive for some and negative for others but will certainly be unrepresentative
    of what Python is. This would be a great logo for Taoist Christians, if such a
    group exists.*


    *How is Python about "balance"? It is about abstraction, composition, the whole
    greater than the parts, yes, but there''s nothing there that really draws on duality.
    So the whole two-ness of the thing is one of the parts that disturbs me.*


    They''re friendly snakes at a tadpole fancy dress competition having a ''cuddle''.
    Where do you think Python eggs come from...


    Tim Parkin


    P.S. The logo is actually based on mayan representations of snakes which often
    represent only the head and perhaps a short length of tail. The structure of the
    snake representations the natural coiling/nesting of a snake as seen side on.


    The Mesoamerican calendar also represents snake heads in a similar manner.


    The abstraction of the snake design used in mayan culture seemed non-denominational
    enough to only raise contrived objections. The shapes used (cross/spiral/yin-yang)
    are also primitive enough that there will always be connotations that can be derived.


    The two headed snake was also an influence on the design which is also a common
    ''meme'' in many continents, including Africa.


    And I''d like to see you tell a civil war soldier that it looks like his trousers
    are held up by a two headed tadpole.


    If you look carefully at the logo, you will also see an indian symbol of peace.
    (I''ll leave this one alone as it can also mean something else.)


    ![](img/bcabe83d3255895870f638a39264a071_260_0.png)


    ## 13.7 Python Grammar


    What is this book about and who is it for?


    - 1.) It''s a practical introduction to Python language.

    - 2.) It''s a collection of examples relevant to learning Python for the first
    time.

    - 3.) Reference for many practical features of Python 3.0 and beyond

    - 4.) A book that sparsely uses visual diagrams to explain abstract principles.

    - 5.) Guidebook for programmers already familiar with another language (such as
    JavaScript, C, C#, C++, PHP or Java) who now also want to learn Python.


    ## 13.8 Which Python?


    Python 3 – also known as “Python 3000” or “Py3K” is the first ever intentionally
    backwards incompatible Python release.


    Python 3.0 is a major version release and as such contains more changes than usual.
    However this doesn’t change the language in a fundamental way and many of the
    things you’re used to in previous versions are still there.


    This book is for Python 3.0 and greater. Running some examples from this book
    will not work in Python <= 3 – in many ways due to changes to print function.


    ## 13.9 Book Format


    There is no good reason for the presentation format of a book about a computer
    language to be any more complicated than the syntax of that language.

    Source code will be presented in simple mono-spaced typewriter-like font without
    any decorations, line numbers or colors:


    ```

    print("Hello from Python running on .".format("Ubuntu"))

    ```


    What you learn matters only when knowledge is put into practice. It is recommended
    to actually type along with the code examples and run them from the command line
    on either Windows or in the Mac''s Terminal:


    ```

    python hello.py

    ```


    Output:

    Hello from Python running on Ubuntu.


    If you have previous experience writing code in other languages, you''ve probably
    already guessed that Python replaced {} with value provided to .format method.

    If not, and Python is your first language, don''t worry. This and many other examples
    found throughout **Python Grammar** will be explained in complete detail.


    > **Reminder:** When learning how to code *in any language* simply memorizing
    keywords doesn''t work. It''s important to learn how to use the language as a
    problem-solving tool. While this book alone cannot teach you that skill, you are
    encouraged to improvise on examples shown in this book and write your own code.


    ### Python Grammar Symbol


    ![](img/bcabe83d3255895870f638a39264a071_261_0.png)


    While reading, look out for this logo. Whenever you see a box like this it''s
    usually a **Python Grammar Pro Tip!** It will often contain some practical wisdom.
    It might also offer help in guiding you to avoid common pitfalls on your journey,
    or point out mistakes you might run into while learning...which is usually not
    a fault of your own.


    Diagrams will be used sparsely. Only if they become absolutely necessary to explain
    visual concepts. Sometimes connecting the dots is possible only by visualizing
    the relationship between composite ideas.


    ## 13.10 Learning Python


    This book – Python Grammar – is exactly what it sounds like.

    Using simple tutorial format we’ll learn how to use Python to write short computer
    programs. We’ll explore Python syntax by using many source code examples that
    will help you reach a level of confidence needed to write meaningful programs.

    Like any programming language, Python gives you a set of problem-solving tools
    like *data structures*, conditional statements and operators. Using your creativity
    you will use these tools to write computer programs.

    Mostly we will focus on the features of Python programming language. That makes
    it a book for beginners. But these simple rules mirror foundational patterns seen
    in many programming languages, not just Python.

    This is a walk-through book. It is structured in a linear way. It’s best to go
    through it one chapter at a time. But it can also be used as a desk reference
    in case you need to look up one particular feature in isolation.

    My first language was C++. And then I picked up PHP and JavaScript, because both
    languages were similar to the syntax of C++.

    Python is a very different language, but in a good way.

    I like Python. It’s the computer scientist’s language. I don’t think I am one.
    What I do think is that Python is actually physically a lot easier on the hands
    to write. There are no excessive brackets or semicolons. Python is dynamically-typed
    – so there are no variable type keywords, making definitions clean. The language
    is very simple. Coding in Python is a lot like writing an email to your computer.

    In the following section we will install Python and then go over the basics!


    # Chapter 14


    ## Installing Python


    Before starting programming in Python you need to install it on your system. I
    won''t go into great detail on how to install packages of applications on your
    operating system because primarily this book is about Python the language. But
    this section will give you a few pointers in the right direction.


    ## 14.1 Installing on Windows


    Head over to https://www.python.org/downloads/ and download Python executable.
    Launch it and go through simple setup process:


    ![](img/bcabe83d3255895870f638a39264a071_263_0.png)


    At the time when I started writing this book latest version of Python was 3.8.3.
    Head over to python.org and install the latest version.

    If you already have Python installed, you can check what version you have by executing
    the following command:


    ```

    C:\Python>python --version

    Python 2.7.16


    C:\Python>

    ```


    Earlier versions of Python might not support some of the examples in this book.
    If you have an old version it is recommended to upgrade to latest.


    ## 14.2 Installing on Mac


    Mac already comes prepackaged with Python. Which version of Python was originally
    installed with the OS will depend on the version of your operating system.

    The Mac''s system installation path is:


    ```

    /System/Library/Frameworks/Python.framework

    ```


    and:


    ```

    /usr/bin/python

    ```


    Earlier versions of macOS such as the OS X came with Python 2.7. While it''s great
    for practice it is recommended to upgrade to latest version.

    However, if you choose to upgrade keep in mind that you will end up with two different
    versions of Python on your system. They will both work but may not be able to
    run the same Python scripts – it''s possible that some of the later Python versions
    such as Python 3.9 or Python 4.0+ wouldn''t compile code written in some of the
    previous versions of the Python compiler because not all versions of Python are
    backward compatible.'
