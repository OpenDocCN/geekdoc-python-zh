    \ that reads the contents of this poem, prints it out and \"finally\" closes the\
    \ file:\n\n```python\ntry:\n    # Open file to read its contents\n    poem = open('the_tyger.txt')\n\
    \    contents = poem.read()\n    print(contents)\nexcept FileNotFoundError:\n\
    \    print(\"FileNotFoundError has occurred\")\nfinally:\n    print(\"> closing\
