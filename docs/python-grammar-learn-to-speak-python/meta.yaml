    # 6.0.1 Built-in type() function


    Once a variable is assigned to a value you can find out its type by using the
    built-in function `type()` . It only takes one argument – the value – and returns
    its type.


    ```

    a = 1

    b = 15.75

    c = "hello"


    print(type(a))

    print(type(b))

    print(type(c))


    >>>

    <class ''int''>

    <class ''float''>

    <class ''str''>

    ```


    > Note in Python 2.7 type(1) evaluates to <type ''int''> and not <class ''int''>.
    Classes can be thought of as blueprints for creating objects of the type they
    represent. We will cover classes in more detail at a later chapter.


    Each type has its own built-in class definition. The (sometimes) abbreviated name
    is what we''re looking for. Here 1 is an *integer* or ''int'' and "hello" is a
    *string* or ''str''. Decimals are floating point numbers or ''float'' for short.


    The type() function can be also used to identify *lists*, *sets*, *tuples* and
    *dictionaries*:


    ```

    tuple = ("a", "b")

    list = ["a", "b"]

    set = {"a", "b"}

    dict = {"a": 1, "b": 2}

    ```'
