    {\n  \"os\": \"Linux\",\n  \"distro\": \"Ubuntu\",\n  \"ver\": \"18\",\n  \"ram\"\
    : \"32Gb\",\n  \"cpu\": \"Intel\",\n  \"cores\": 8\n}\n```"
