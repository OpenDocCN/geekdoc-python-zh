- md: "## 10.2. Static Methods\n\nTo create a custom class method use `def` keyword:\n\
    \n```python\nclass Car:\n    def describe():\n        print(\"This is a car.\"\
    )\n```\n\nInstance methods *can* behave as static methods.\n\n```python\nCar.describe()\
    \ # Prints: \"This is a car.\"\n```\n\nBy default `describe()` *can be called*\
    \ as a *static method* – directly on `Car` class without having to instantiate\
    \ an object.\nBut there is a catch. While this is *possible* it is suggested to\
    \ use Python's `@staticmethod` decorator to explicitly define it as static method.\n\
    \n## 10.2 Static methods\n\nA static method cannot and will be used only as a\
    \ general purpose *utility* function.\nStatic methods can be called directly from\
    \ class name like `Car.info()` but they can neither access nor modify class state.\n\
    To make static method definition explicit, use `@staticmethod` keyword directly\
    \ above the method's definition:\n\n```python\nclass Car:\n    @staticmethod\n\
    \    def describe():\n        print(\"This is a car.\")\n```\n\n```python\nCar.describe()\
    \ # Prints: \"This is a car.\"\n```\n\nThis class behaves in exactly the same\
    \ way as previous example. But this is a more proper way of defining a static\
    \ method.\n\n## 10.2.1 Class Methods\n\nTo specify `describe()` method as class\
    \ method use `@classmethod` keyword:\n\n```python\nclass Car:\n    @classmethod\n\
    \    def describe():\n        print(\"This is a car.\")\n```\n\nNow calling `Car.describe()`\
    \ will result in error:\n\n```python\nCar.describe()\n```\n\n```\nTypeError: describe()\
    \ takes 0 positional arguments but 1 was given\n```\n\nIn order to make this work\
    \ the positional `self` parameter must be explicitly specified on a non-static\
    \ class method:\n\n```python\nclass Car:\n    @classmethod\n    def describe(self):\n\
    \        print(\"This is a car.\")\n```\n\nOf course, when `self` is involved\
    \ it is assumed that there will be a constructor:\n\n```python\nclass Car:\n \
    \   def __init__(self, make):\n        self.make = make\n    @classmethod\n  \
    \  def describe(self):\n        print(\"The make of this car is \", self.make)\n\
    ```\n\nTechnically, non-static class methods such as the one above are not intended\
    \ to be called on class name – `Car`. Non-static class methods are reserved for\
    \ use on *instance* of an object.\n\nHowever, soon as `self` parameter is added\
    \ the `describe()` it makes `describe()` *callable* as a static method again:\n\
    \n```python\nCar.describe() # \"This is a car.\"\n```\n\nIt is possible. But this\
    \ is probably not something you should be doing. The proper way to call a non-static\
    \ class method is to first create an instance of an object:\n\n```python\nmazda\
    \ = Car() # Prints \"This is a car.\"\n```\n\n## 10.2.2 Static methods\n\nStatic\
    \ methods are methods that can be called directly on the class name:\nHere `Car.count()`\
    \ calls static method `count` if it's defined. This method is not attached to\
    \ an instance of an object of type `Car`.\nStatic attributes are useful for tracking\
    \ class-wide information. For example how many object instances of type `Car`\
    \ were created:\nTo draw a distinction between a static method from object instance\
    \ method, Python provides two keywords: `@classmethod` and `@staticmethod`:\n\n\
    ```python\nclass Car:\n    @classmethod\n    def describe():\n        print(\"\
    This is a car\")\n```\n\n```python\nclass Car:\n    total_cars = 4\n    @staticmethod\n\
    \    def count():\n        print(\"This is a car\")\n```\n\n```python\nCar.describe()\n\
    ```\n\nAll variables declared inside the class body are static attributes. They\
    \ should contain values relating to entire class as a whole, not the object instances\
    \ created with it. (For example, to keep track of the number of all instantiated\
    \ cars.)\n\n## 10.2.3 Static Attributes\n\nAt this point you can actually access\
    \ `Car.make` and `Car.wheels` attributes directly from the class definition:\n\
    \n```python\nprint(Car.total_cars)\n\n>>>\n4\n```\n\nAttributes defined at class-level\
    \ are called *static* attributes.\n\n## 10.3 Objects\n\nAn object can be thought\
    \ of as an instance of a class. Let's add more code to the previous example to\
    \ actually do something with this class. To create an object instance of the class\
    \ `Car`:\n\n```python\nclass Car:\n    def __init__(self):\n        self.make\
    \ = \"Tesla\"\n        self.wheels = 4\n\n    def describe(self):\n        message\
    \ = \"This car is a %s and it has %d wheels\"\n        print(message % (self.make,\
    \ self.wheels))\n\n# Instantiate object tesla from class Car\ntesla = Car()\n\n\
    # Print out some values\nprint(tesla)\nprint(\"My Tesla has %i\" % tesla.wheels)\n\
    ```\n\nOutput:\n\n```\nMy Tesla has 4 wheels\n```\n\nOnce instantiated, you can\
    \ access properties from `Car` class definition via the object instance `tesla`.\
    \ The `wheels` property can be accessed using dot operator:\n\n```python\ntesla.wheels\n\
    ```\n\nAnd the `make` can be accessed as:\n\n```python\ntesla.make\n```\n\nThis\
    \ is how property access of instantiated objects works. You can also access methods\
    \ in the same way. But in order to execute them, add parentheses:\n\n```python\n\
    tesla.describe()\n```\n\nBut design of our class can still be improved.\nClasses\
    \ are patterns created to help you reduce amount of code written. This principle\
    \ of code reuse is very important in programming. In order to take advantage of\
    \ it you can create a more flexible constructor method that takes user-defined\
    \ values and sets them to the `self` object.\n\n## 10.4 Constructors\n\nIn the\
    \ previous section we created an object `tesla` from `Car` class. But every time\
    \ we create a new object it still only allows us to create the same \"Tesla\"\
    \ car with 4 wheels because the values are hard-coded inside the constructor.\n\
    Ideally, you want the class to be as flexible as possible. Let's modify the constructor\
    \ by allowing whoever is using our class to enter their own values:\n\n```python\n\
    def __init__(self, make, wheels):\n    self.make = make\n    self.wheels = wheels\n\
    ```\n\nThe only difference here is the addition of `make` and `wheels` arguments\
    \ to the constructor. Inside the constructor we now assign values passed in those\
    \ arguments to `self.make` and `self.wheels` object properties instead of hard-coding\
    \ them.\nNow we can create multiple objects of the same type `Car` using the same\
    \ class but with drastically different properties:\n\n```python\ntesla = Car(\"\
    Tesla\", 4)\ntesla.describe()\n\ntruck = Car(\"Volvo\", 18)\ntruck.describe()\n\
    ```\n\nOutput will be:\n\n```\nThis car is a Tesla and it has 4 wheels\nThis car\
    \ is a Volvo and it has 18 wheels\n```\n\nWe just used the same class definition\
    \ to create a 4-wheel Tesla and a Volvo, the 18-wheeler truck. Two different cars\
    \ with unique characteristics.\nThat's what you want to achieve with your class\
    \ design – a model that can create similar objects, without changing the original\
    \ design of the class.\nBy doing this you reduce the size of your computer program.\n\
    \n### Another Class Example\n\nLet's create a class to represent a web server:\n\
    \n```python\nclass Server:\n    # Object constructor\n    def __init__(self, os,\
    \ distro, ver, ram, cpu, cores, gpu):\n        self.os = os\n        self.distro\
    \ = distro\n        self.ver = ver\n        self.ram = ram\n        self.cpu =\
    \ cpu\n        self.cores = cores\n        self.gpu = gpu\n\n    # return list\
    \ of attributes\n    def attributes(self):\n        return vars(self)\n\nwebserver\
    \ = Server(\"Linux\", \"Ubuntu\", \"18\", \"32Gb\", \"Intel\", 8, \"Nvidia RTX\"\
    )\n\n# Call object's attributes() method\nattrs = webserver.attributes()\n\n#\
    \ Print attributes\nprint(attrs)\n```\n\nHere is the output:\n\n```\n'os': 'Linux',\
    \ 'distro': 'Ubuntu', 'ver': '18', 'ram': '32Gb', 'cpu': 'Intel'\n```\n\nWe've\
    \ just printed out all attributes of our instantiated object.\nIn Python object\
    \ properties are called *attributes*.\n\nPython's built-in function `vars` works\
    \ with objects. It retrieves the list of attributes from the object passed to\
    \ it. You don't have to add any modules to start using it.\n\nWhen we passed `self`\
    \ object to `vars` function in the body of the Server's class `attributes` method,\
    \ it packaged the object's attributes into a JSON object and returned it using\
    \ function's `return` keyword.\n\nNote: You don't have to call `vars` inside a\
    \ class method. It's a global scope function that works anywhere.\n\n### Prettifying\
    \ JSON output\n\nWorking with JSON objects is very common.\nOutput becomes less\
    \ readable the more properties there are in the JSON object.\nTo prettify JSON\
    \ output you can use `json.dumps` method from built-in `json` module. Let's add\
    \ following code to previous example:\n\n```python\n# Import json module (so we\
    \ can use json.dumps method)\nimport json\n\n# Format JSON object with 2 spaces\n\
    formatted = json.dumps(attrs, 2)\n```\n\nThe output of running this line of code\
    \ will be a list of all object's attributes as a JSON object but with line breaks\
    \ and formatted with 2 spaces:\n\n```json\n{\n  \"os\": \"Linux\",\n  \"distro\"\
    : \"Ubuntu\",\n  \"ver\": \"18\",\n  \"ram\": \"32Gb\",\n  \"cpu\": \"Intel\"\
    ,\n  \"cores\": 8\n}\n```"
