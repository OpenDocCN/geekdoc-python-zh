    # One more thing about "w" mode


    Be careful not to open *important* files with "w" – even if file already exists
    a new blank file will be created overwriting content in the original file.


    Force creating a blank file for writing if it doesn''t exist:


    ```

    f = open("file.txt", "w")

    ```


    This mode will clear out contents of an existing `file.txt` or create a new one
    from scratch. At this point the file is ready to be written to.


    # Open file modes


    | Mode | Description |

    | :--- | :--- |

    | r | Open file for reading. (default) |

    | t | Open in text mode. (default) |

    | w | Open file for writing. (Creates a new file if file doesn''t exist; truncate
    file if it exists. |

    | x | Open file for exclusive creation. (If the file already exists this operation
    will fail.) |

    | a | Open file to appending content to the end of file (Creates a new file if
    it does not exist.) |

    | b | Open file in binary mode (requires another mode) |

    | + | Open file for updating (reading and writing) |'
