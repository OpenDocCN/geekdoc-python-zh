    @pythonic129\")\n\nprint(followers)\n\n>>>\n'@pythonista', '@pythonic129'\n```\n\
    \n如果元素已存在，则不会发生任何事情。\n\n### set.discard()\n\n按值从集合中丢弃项目。\n\n```\nfollowers = \"\
