  - '[PAGE 88]


    # 5.1.1 What is a variable?


    Variables are *named placeholders* for values that reside at a memory address.


    ![](img/bcabe83d3255895870f638a39264a071_88_0.png)


    You can think of variables as values stored in placeholders. Here we have a variable
    named ''a'' holding the value of the digit 1. In Python it''s a primitive of type
    `int` (for *integer*.)


    Variables are stored at a memory address which is assigned automatically in RAM
    at creation time also known as *run time*.


    The variable name is a placeholder pointing to the address in RAM memory where
    the value is physically stored. When you create a new variable, essentially what
    you are doing is naming a memory address:


    ```

    a = 1;

    print(a)                # 1 (value of the variable)

    print(type(a))          # <type ''int''>

    print(id(a))            # 1473574832 (address as integer)

    print(hex(id(a)))       # 0x57d4f7b0 (address as hexadecimal)

    print(type(a) == int)   # True (this is a variable of type integer)


    >>>

    1

    <type ''int''>

    1473574832

    0x57d4f7b0

    True

    ```


    On a 32-bit computer, this value of 1 is actually stored in a placeholder consisting
    of 32 bits that can be either 1 or 0. Only the last bit is switched on:


    ![](img/bcabe83d3255895870f638a39264a071_88_1.png)'
  - '[PAGE 89]


    Why is this important? You need to understand this if you ever plan on writing
    or reading files in binary mode. Thinking in binary format can also help you optimize
    your data. Variable a only stores 1 value. If you have a set of flags, why create
    variable b? You can simply flip any of the 32 bits in a single variable to store
    32 unique 0/1 flags.


    For now just know that this is how computers represent values in memory. On 32
    bit computers even small numbers like 1 are packed into 32 bit placeholders.

    On a 64-bit computer there are 64 placeholders, etc. Understanding memory might
    be useful if you plan on optimizing your data. But it might not be necessary when
    writing simple Python scripts or just learning the language for the first time.


    # 5.1.2 How to find out variable’s memory address


    When you create a variable a value representing that variable is physically created
    in memory. It is also placed there at an address.

    Choosing exactly where in memory your value is stored is not something you have
    to worry about – the address is chosen automatically. Often, knowing where a variable
    is stored in memory can be useful. Python has built-in id and hex functions to
    help work with memory addresses.


    # 5.1.3 Built-in id() function


    ```

    a = 1

    addr = id(a)

    print(addr) # Prints 50098056 (or similar)

    ```


    The built-in id function returns object identity – it’s the variable’s memory
    address in decimal format. If you run this on your computer, address will be different.'
  - '[PAGE 90]


    # 5.1.4 Built-in hex() function


    Addresses are often displayed in hex format. To convert the object''s decimal
    identity to actual memory address you can use the hex() function which converts
    any integer (not just an address) into hexadecimal format:


    ```

    a = 1

    addr = id(a)

    hexaddr = hex(addr)

    print(addr)    # Print decimal object identity

    print(hexaddr) # Print memory address in hex format

    ```


    ```

    >>>

    50098056

    0x2fc6f88L

    ```


    Every time you run this program, it may (or may not) output a different address.
    This is normal behavior. The reason for it is because variables are stored in
    RAM (Random Access Memory.) This doesn''t mean the address is chosen completely
    at random, however. It''s just called that way.


    In this context random simply means address won''t follow an easily predictable
    pattern. Internally, it''s decided by your computer processor in a way that''s
    convenient at that time given various factors that depend on your processor''s
    architecture.


    When determining address the goal of your computer processor is to choose next
    available address slot as fast as possible – this gives addresses random-like
    nature.


    There is certain logic to how your processor will choose a storage address based
    on various factors. It can be influenced relative to where in memory your script
    was running from at the time of execution.


    # One more thing about how Python manages memory


    You should be aware of a quirk unique to Python language when it comes to memory
    addresses – it''s explained in the next subsection.'
- md: "## 5.1.5 Shared memory for variables containing the same value\n\nLet's take\
    \ a careful look at this example.\n\n```python\na = 1\nprint(\"a =\", hex(id(a)))\
    \ # print address of a\n\nb = 2\nprint(\"b =\", hex(id(b))) # print address of\
    \ b\n\nc = 1\nprint(\"c =\", hex(id(c))) # same address as a\n\nc += 1\nprint(\"\
    c =\", hex(id(c))) # changed to same as address of b\n```\n\nRunning this example\
    \ you will notice something peculiar in the output:\n\n```\n>>>\na = 0x3166f88L\n\
    b = 0x3166f70L\nc = 0x3166f88L  # same address as a\nc = 0x3166f70L  # after +=\
    \ 1 it's same address as b\n```\n\nHow can two variables be stored at the same\
    \ address? This happens only when two unique variables start to share the same\
    \ value.\n\nThe address of a and c – two different variables – is exactly the\
    \ same. This optimization occurs when different variables contain the same value\
    \ (1).\n\nThen, when we incremented c by 1 in the last step, the address of c\
    \ changed and it now matches address of b because now both c and b share the same\
    \ value (2).\n\nThis is not limited to same code blocks or current execution context.\
    \ Address can be shared across global scope and function scope:\n\n```python\n\
    u = 1\nprint(id(u))\n\ndef func():\n    u = 1\n    print(id(u))\n\nfunc()\n\n\
    >>>\n41709448\n41709448\n```\n\nEven in function scope variable address is the\
    \ same if value is shared.\nPython tries to re-use objects in memory that have\
    \ the same value, which also makes comparing objects very fast.\nAs you can see\
    \ this behavior is different from C-language, for example, where all 3 variables\
    \ would have stored at 3 unique addresses in memory.\n\n> It's not uncommon for\
    \ a JavaScript developer to learn Python. Moreover, by learning one language you\
    \ learn another. Some of the following examples with contain brief JavaScript\
    \ examples mirroring Python explanations that cover the same functionality.\n\n\
    ## 5.1.6 Assignment by reference vs. assignment by value\n\nWhen learning *any*\
    \ computer language one of the first things you want to figure out is how values\
    \ are assigned – by reference or by value?\nYou may already be familiar with **assignment\
    \ by value** in JavaScript:\n\n```javascript\nlet a = 1;\nlet x = a;        //\
    \ a copy of a was made and stored in x\na = a + 1;        // increment a by 1;\
    \ now a is 2\nconsole.log(a); // 2\nconsole.log(x); // 1 (x is still 1)\n```\n\
    \nWhen we assigned a to x on line 2 a *copy* of value stored in variable a was\
    \ made. Now x is a completely unique variable holding its own copy of number 1.\
    \ When we increment a, the copy in x stays untouched – they are two separate variables.\n\
    \n**Assignment by value in Python** is exactly the same:\n\n```python\na = 1\n\
    x = a     # make a copy of a and store it in x\na = a + 1 # increment a\nprint(a)\
    \  # 2\nprint(x)  # 1 (x is still 1 because it's an original copy)\n```\n\nWhen\
    \ a was assigned to x, a was actually *copied* to x. This is called assignment\
    \ by value – both values will occupy a similar but unique place in memory:\n\n\
    ![](img/bcabe83d3255895870f638a39264a071_93_0.png)\n\nOf course, this means we\
    \ are using twice as much space in memory. Now two variables a and x hold a unique\
    \ value occupied by two different places in computer memory. That's what you would\
    \ normally expect to happen.\n\n**Assignment By Reference in JavaScript**\n\n\
    In JavaScript variables pointing to objects are assigned by reference. It's the\
    \ same in Python. Below *Object Literal* and Python's *dictionary* examples are\
    \ shown.\n\nTo demonstrate it let's take a look at variable named object pointing\
    \ to an object containing x property, which is also a variable pointing to value\
    \ of 1:\n\n![](img/bcabe83d3255895870f638a39264a071_94_0.png)\n\nFigure 5.1: An\
    \ object object encapsulates property {x:1}\n\nIn JavaScript variable type determines\
    \ how equality operator = will assign it. For example, primitive values are assigned\
    \ by value but objects by reference:\n\n```javascript\nlet object = {x: 1};\n\
    let reference = object; // Assignment by reference\nconsole.log(object.x, reference.x);\n\
    ```\n\n```\n>>>\n1, 1\n```\n\n```javascript\nreference.x++;\nconsole.log(object.x,\
    \ reference.x);\n```\n\n```\n>>>\n2, 2\n```\n\nOnly reference.x was incremented.\
    \ But object.x now also returns 2.\nUnlike assignment by value from previous example\
    \ nothing was actually copied to reference. The variable reference simply points\
    \ to same place in memory as object because it was assigned by reference.\nBecause\
    \ variable reference is a reference to object, reference.x points to the x value\
    \ in object.x. This is why they both evaluate to 2.\nLet's add something just\
    \ to the end of the previous code listing:\n\n```javascript\nobject.x++;\n```\n\
    \nAnd now let's print out both values again:\n\n```javascript\nconsole.log(`object.x\
    \ = ${object.x}`);\nconsole.log(`reference.x = ${reference.x}`);\n```\n\n```\n\
    >>>\nobject.x = 3\nreference.x = 3\n```\n\nThis shows that changing value by using\
    \ either variable changes it in both.\n\n## Assign By Reference In Python\n\n\
    ```python\n# Create dictionary\noriginal = {\"x\":1}\nprint(original)\n\n# Make\
    \ copy a reference to original\ncopy = original\nprint(copy)\n\n# Change x in\
    \ copy\ncopy[\"x\"] = 2\n\n# original[\"x\"] now also contains 2\nprint(original)\n\
    \n>>>\n{'x': 1}\n{'x': 1}\n{'x': 2}\n```\n\nHere is what actually happens:\n\n\
    ![](img/bcabe83d3255895870f638a39264a071_96_0.png)\n\nFigure 5.2: thing and object\
    \ point to the same address in memory.\n\nBoth values *appear* to be incremented\
    \ even though we only incremented one of them. They point to the same object in\
    \ memory.\n\nAssignment by reference is based on the same principle across many\
    \ different languages. However, not all computer languages provide exactly the\
    \ same set of features to deal with it.\n\nPython doesn't allow assignment of\
    \ primitive values (string, number, etc) by reference. This only happens when\
    \ the assigned variable is object-like (dictionary, list, sequence.)\n\nIn some\
    \ languages like C++ it is possible to assign variables as a reference using a\
    \ leading ampersand (&) character:\n\n```cpp\nint original = 9;     // create\
    \ variable\nint &ref = original;  // assign by reference\nref++;             \
    \   // increment reference by 1\ncout << original;     // prints 10\n```\n\nIn\
    \ this example original also returns 10 after ref is incremented. The C++ language\
    \ relies heavily on references and memory pointers which often leads to crashing\
    \ your computer. JavaScript and Python are more strict in this regard.\n\nIf assignment\
    \ by reference is part of so many computer languages, it must be an important\
    \ feature! But it seems pointless without a practical example.\n\n## 5.1.7 Why\
    \ assign by reference?\n\nIt is often mentioned that you can assign variables\
    \ or objects by value or reference. But it is rarely explained why it is done\
    \ this way.\n\nComputer memory is a limited resource. The larger the data sets\
    \ you are generating or working with, the more memory you will require to store\
    \ them.\n\nReference assignment solves two problems. One is that we save space\
    \ in computer memory. We also avoid physically copying values from one place to\
    \ another.\n\nCopying is an computationally expensive operation for large data\
    \ sets:\n\n```python\n# assign by reference\nobject1 = object2\n```\n\nImagine\
    \ that an object contains 1 million properties. Copying the entire contents of\
    \ an object is a lot of work.\n\n![](img/bcabe83d3255895870f638a39264a071_98_0.png)\n\
    \nPython's = operator has no way of knowing how large your object actually is.\
    \ Had the = operator triggered a physical memory copy between objects, you'd have\
    \ to wait a while until the operation would complete.\n\nA simple assignment should\
    \ never take that much time. This is the reason why most languages implement object\
    \ assignment *by reference*.\n\nIf your object contains millions of properties\
    \ it would be too much overhead for just one line of code. Now imagine if some\
    \ of those properties are also objects containing thousands of other properties.\
    \ This can bring execution to a halt.\n\nA reference, on the other hand, is only\
    \ assigned once as an alias to original value.\n\n> Note, however, this doesn't\
    \ mean that you should always avoid copying objects. In fact, some algorithms\
    \ require copying data. Assignment by reference simply increases efficiency in\
    \ many cases."
  mdcn: "## 5.1.5 存储相同值的变量共享内存\n\n让我们仔细看看这个例子。\n\n```python\na = 1\nprint(\"a =\"\
    , hex(id(a))) # 打印 a 的地址\n\nb = 2\nprint(\"b =\", hex(id(b))) # 打印 b 的地址\n\nc\
