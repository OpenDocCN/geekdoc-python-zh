    \ `pass`。\n\n现在让我们在命令提示符中运行脚本，看看结果：\n\n```\nC:\\Python38-32>python book.py\n\n\
    start= 1836354.906\nLooping through 10 million numbers...\nend=1836355.656\n\n\
    Difference between two points in time:\nend-start= 0.75\n```\n\n根据我们的脚本，循环遍历范围序列中的\
    \ 1000 万个数字花费了 **0.75** 秒。如果你再次运行脚本，会看到略有不同的结果，但它们会接近相同的数字。\n\n你的值可能不同。这取决于许多因素，例如你的处理器类型、是否有其他程序同时运行并占用\
