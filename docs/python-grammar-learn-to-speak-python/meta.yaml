    # Print out some values\nprint(tesla)\nprint(\"My Tesla has %i\" % tesla.wheels)\n\
    ```\n\n输出：\n\n```\nMy Tesla has 4 wheels\n```\n\n一旦实例化，你就可以通过对象实例 `tesla` 访问 `Car`\
    \ 类定义中的属性。`wheels` 属性可以使用点运算符访问：\n\n```python\ntesla.wheels\n```\n\n而 `make` 可以这样访问：\n\
