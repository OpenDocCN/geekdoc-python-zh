    要迭代同一个元组：\n\n```python\nfor var in nested:\n    print(var)\n\n>>>\n(1, 2, 3)\n\
    ('a', 'b', 'c')\n```\n\n与作为*可迭代*数据结构的 `list` 相比，`tuple` 的值也可以使用以下语法进行*解包*：\n`(*var1*,\
