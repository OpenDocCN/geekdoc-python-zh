- md: "## 10.4. CONSTRUCTORS\n\n```python\n\"gpu\": \"Nvidia RTX\"\n}\n```\n\nThe\
    \ `json.dumps` function will also properly format a JSON object which by specification\
    \ requires double quotes around property names. (Single-quotes are considered\
    \ a malformed JSON format and shouldn't be used to define JSON.)\n\nThe `import\
    \ json` line adds `json` module to our code. It has a bunch of json-related functions.\
    \ In this case we only needed `json.dumps`. Usually importing modules is done\
    \ at the very top of your file, but you can add it anywhere in the file as long\
    \ as it's *above* the place in code where `json.dumps` is actually used.\n\n##\
    \ CHAPTER 10. CLASSES\n\n# Chapter 11\n\n## File System\n\nPython has a number\
    \ of functions for working with files.\n\n### 11.0.1 File operations\n\n#### Opening\
    \ files with built-in open() function\n\nLet's open `file.txt` for reading:\n\n\
    ```python\n# which file?\nfilename = \"file.txt\"\n\nprint(f\"Opening {filename}\
    \ for reading...\")\n\nf = open(filename) # open file\n\n>>>\nOpening file.txt\
    \ for reading...\n```\n\nThe last line of code is equivalent to executing `open`\
    \ function with `\"rt\"` flag:\n\n```python\nf = open(filename, \"rt\")\n```\n\
    \n`\"rt\"` is the default mode for opening files. It means opening the file for\
    \ (r)eading in (t)ext format (as opposed to binary.) We'll take a look at all\
    \ modes shortly.\n\n> The `open` function will make an attempt to open the file\
    \ `\"file.txt\"` in the same directory from which script was executed. But you\
    \ can also provide a full path to the file.\n\nThe default value for second argument\
    \ in `file` function is `\"r\"`.\nIt's an optional parameter for specifying file\
    \ operation mode.\nHere `\"r\"` tells `open` function to open the file for *reading*.\n\
    For example, to open a file for writing you can use `\"w\"` instead:\n\n```python\n\
    f = open(filename, \"w\")\n```\n\nWe will take a look at all seven modes in a\
    \ moment. But first I think it's important to cover error handling.\n\n### Error\
    \ handling\n\nWhat will happen if we try to open a file that doesn't exist?\n\n\
    ```python\nf = open(filename)\n```\n\nBecause we didn't create this file yet,\
    \ Python will complain to the command line:\n\n```\nTraceback (most recent call\
    \ last):\n  File \"fileops.py\", line 5, in <module>\n    f = open(filename, \"\
    r\")\nFileNotFoundError: [Errno 2] No such file or directory: 'file.txt'\n```\n\
    \nWhat just happened is called an *exception*. These types of errors are common\
    \ to many other programming languages. What makes exceptions unique is that they\
    \ are not generated by *your code* but by circumstance in which it was executed.\n\
    (For example if `file.txt` existed, no error would be generated.)\n\n### 11.0.2\
    \ Handling Exceptions with try: except: block\n\nWe have just seen that if the\
    \ file doesn't exist Python throws an error.\nBecause reading a file is an operation\
    \ that can often fail for various reasons outside of your control (for example:\
    \ *file was deleted or its permissions are set to \"read-only\" and you're trying\
    \ to open it for writing*) it's important to catch these types of failures without\
    \ interrupting execution flow of your program.\nAnd that's what catching errors\
    \ helps us accomplish in general – exceptions are not limited to file operations\
    \ and can happen anywhere in your program.\nFor example one classic example is\
    \ trying to divide by 0:\n\n```python\n100/0\n```\n\n```\n>>>\nTraceback (most\
    \ recent call last):\n  File \"test.py\", line 1, in <module>\n    100/0\nZeroDivisionError:\
    \ division by zero\n```\n\nNote that Python identified the error as `ZeroDivisionError`.\n\
    Adding two previously undefined variables:\n\n```python\nhello = 1\nworld = 2\n\
    hello + world\n```\n\n```\n>>>\nTraceback (most recent call last):\n  File \"\
    fileops.py\", line 1, in <module>\n    hello + world\nNameError: name 'hello'\
    \ is not defined\n```\n\nThis erroneous code produced `NameError` error. If this\
    \ exception is uncaught, your program will halt and exit. That's not something\
    \ you want to ever happen.\n\n### try: except: block\n\nPython exception handling\
    \ is done with a **try:** and **except:** block.\n\n```python\ntry:\n    print(\"\
    Do something.\")\nexcept:\n    print(\"Statement failed.\")\n```\n\nThere is nothing\
    \ wrong with the code in **try:** block:\n\n```\n>>>\nDo something.\n```\n\nIn\
    \ order to trigger the **except:** block the statement concealed in **try:** must\
    \ fail.\nTo catch an exception you can write **try:** and **except:** blocks around\
    \ any Python statement you want to test for errors. If a natural error occurs\
    \ in the **try:** block the code in **except:** clause will be executed.\nAt this\
    \ point all we are doing is displaying \"Statement failed.\" message if the code\
    \ fails. But it still doesn't give us control over handling the actual error code.\n\
    The solution to that is to tell **except:** what error we're trying to handle.\
    \ Python error codes are displayed on the command line when the statement actually\
    \ fails.\nIf file you're trying to open doesn't exist you get `FileNotFoundError`\
    \ exception. This is the error code we need to pass to **except:** as follows:\n\
    \n```python\ntry:\n    file = open('filename.txt')\nexcept FileNotFoundError:\n\
    \    print(\"FileNotFoundError has occurred\")\n```\n\nIn addition you can interpret\
    \ the error code by copying it into a variable called **error** (but you can use\
    \ any other name) if you need to print it out:\n\n```python\ntry:\n    file =\
    \ open('filename.txt')\nexcept FileNotFoundError as error:\n    print(f\"{error}\
    \ has occurred\")\n```\n\nWe can now apply this to our file example as follows:\n\
    \n```python\nfilename = \"test.txt\"\n\ntry:\n    print(f\"Opening {filename}\
    \ for writing\")\n    f = open(filename, \"w\")\nexcept FileNotFoundError as error:\n\
    \    print(f\"Error is = {error}\")\n```\n\nThis should be the standard way of\
    \ opening files.\n\n> Now even if, for whatever reason, the `open` function fails\
    \ we can gracefully display a message and move on to the next statement without\
    \ breaking the program flow. Use **try:** and **except:** to handle errors outside\
    \ of your control when dealing with files and similar operations.\n\n### Raising\
    \ exceptions\n\nIt is possible to raise your own exceptions. This is useful when\
    \ you are 100% sure the code relies on success of an operation. And if it fails,\
    \ there is no way you want to perform any other future operations. This often\
    \ indicates a serious error.\n\nTo raise your own exception use **raise** keyword:\n\
    \n```python\ntry:\n    print(\"About to raise an exception\")\n    raise ZeroDivisionError\n\
    finally:\n    print(\"Goodbye!\")\n```\n\n```\n>>>\nAbout to raise an exception\n\
    Goodbye!\nTraceback (most recent call last):\n  File \"raise.py\", line 3, in\
    \ <module>\n    raise ZeroDivisionError\nZeroDivisionError\n```\n\nThe **raise**\
    \ keyword must point to an existing exception error class. We have just risen\
    \ the `ZeroDivisionError` even though we did not perform the division by 0 operation\
    \ – the exception was forced. But ideally you want to create your own exception\
    \ types which can be defined by extending `Error` class:\n\n```python\nclass Error(Exception):\n\
    \    # base error class\n    pass\n```\n\n```python\nclass CustomError(Error):\n\
    \    # custom exception\n    # that defines attributes\n    # with more information\n\
    \    # about this error\n    def __init__(self):\n        print(\"The dough has\
    \ not risen!\")\n        pass\n```\n\n```python\ntry:\n    raise CustomError\n\
    finally:\n    print(\"Goodbye!\")\n```\n\n```\n>>>\nThe dough has not risen!\n\
    Goodbye!\nTraceback (most recent call last):\n  File \"raise.py\", line 16, in\
    \ <module>\n    raise CustomError\n__main__.CustomError\n```\n\nError names usually\
    \ end with the word `Error`, so be sure to name yours in a way that follows that\
    \ pattern to remain consistent.\n\n```python\nf = open(\"file.txt\", \"w\")\n\
    ```\n\n### One more thing about \"w\" mode\n\nBe careful not to open *important*\
    \ files with `\"w\"` – even if file already exists a new blank file will be created\
    \ overwriting content in the original file.\n\nForce creating a blank file for\
    \ writing if it doesn't exist:\n\n```python\nf = open(\"file.txt\", \"w\")\n```\n\
    \nThis mode will clear out contents of an existing `file.txt` or create a new\
    \ one from scratch. At this point the file is ready to be written to.\n\n### Open\
    \ file modes\n\n| Mode | Description |\n| :--- | :--- |\n| r | Open file for reading.\
    \ (default) |\n| t | Open in text mode. (default) |\n| w | Open file for writing.\
    \ (Creates a new file if file doesn't exist; truncate file if it exists.) |\n\
    | x | Open file for exclusive creation. (If the file already exists this operation\
    \ will fail.) |\n| a | Open file to appending content to the end of file (Creates\
    \ a new file if it does not exist.) |\n| b | Open file in binary mode (requires\
    \ another mode) |\n| + | Open file for updating (reading and writing) |"
  mdcn: "## 10.4. 构造函数\n\n```python\n\"gpu\": \"Nvidia RTX\"\n}\n```\n\n`json.dumps`\
    \ 函数也能正确格式化 JSON 对象，根据规范，JSON 对象的属性名需要使用双引号。（单引号被视为格式错误的 JSON，不应用于定义 JSON。）\n\n\
    `import json` 这行代码将 `json` 模块添加到我们的代码中。它包含一系列与 JSON 相关的函数。在这个例子中，我们只需要 `json.dumps`。通常，导入模块的操作会放在文件的最顶部，但你也可以将其添加到文件中的任何位置，只要它位于代码中实际使用\
    \ `json.dumps` 的地方的*上方*即可。\n\n## 第10章. 类\n\n# 第11章\n\n## 文件系统\n\nPython 提供了许多用于处理文件的函数。\n\
    \n### 11.0.1 文件操作\n\n#### 使用内置的 open() 函数打开文件\n\n让我们打开 `file.txt` 进行读取：\n\n```python\n\
    # which file?\nfilename = \"file.txt\"\n\nprint(f\"Opening {filename} for reading...\"\
    )\n\nf = open(filename) # open file\n\n>>>\nOpening file.txt for reading...\n\
    ```\n\n最后一行代码等同于使用 `\"rt\"` 标志执行 `open` 函数：\n\n```python\nf = open(filename, \"\
    rt\")\n```\n\n`\"rt\"` 是打开文件的默认模式。它表示以（t）文本格式（相对于二进制）打开文件进行（r）读取。我们稍后会查看所有模式。\n\
    \n> `open` 函数会尝试在脚本执行的同一目录下打开文件 `\"file.txt\"`。但你也可以提供文件的完整路径。\n\n`file` 函数第二个参数的默认值是\
    \ `\"r\"`。\n这是一个可选参数，用于指定文件操作模式。\n这里 `\"r\"` 告诉 `open` 函数以*读取*模式打开文件。\n例如，要以写入模式打开文件，你可以使用\
    \ `\"w\"` 代替：\n\n```python\nf = open(filename, \"w\")\n```\n\n我们稍后会查看所有七种模式。但首先，我认为介绍错误处理很重要。\n\
    \n### 错误处理\n\n如果我们尝试打开一个不存在的文件会发生什么？\n\n```python\nf = open(filename)\n```\n\n\
    因为我们还没有创建这个文件，Python 会在命令行报错：\n\n```\nTraceback (most recent call last):\n  File\
    \ \"fileops.py\", line 5, in <module>\n    f = open(filename, \"r\")\nFileNotFoundError:\
    \ [Errno 2] No such file or directory: 'file.txt'\n```\n\n刚才发生的情况被称为*异常*。这类错误在许多其他编程语言中也很常见。异常的独特之处在于，它们不是由*你的代码*生成的，而是由代码执行的环境生成的。\n\
    （例如，如果 `file.txt` 存在，就不会产生错误。）\n\n### 11.0.2 使用 try: except: 块处理异常\n\n我们刚刚看到，如果文件不存在，Python\
    \ 会抛出错误。\n因为读取文件是一个经常因各种你无法控制的原因而失败的操作（例如：*文件被删除，或其权限被设置为“只读”，而你正尝试以写入模式打开它*），因此在不中断程序执行流程的情况下捕获这类失败非常重要。\n\
    而这正是捕获错误通常能帮助我们实现的——异常不仅限于文件操作，它们可能发生在你程序中的任何地方。\n例如，一个经典的例子是尝试除以 0：\n\n```python\n\
    100/0\n```\n\n```\n>>>\nTraceback (most recent call last):\n  File \"test.py\"\
    , line 1, in <module>\n    100/0\nZeroDivisionError: division by zero\n```\n\n\
    注意 Python 将错误识别为 `ZeroDivisionError`。\n将两个先前未定义的变量相加：\n\n```python\nhello = 1\n\
    world = 2\nhello + world\n```\n\n```\n>>>\nTraceback (most recent call last):\n\
    \  File \"fileops.py\", line 1, in <module>\n    hello + world\nNameError: name\
    \ 'hello' is not defined\n```\n\n这段错误代码产生了 `NameError` 错误。如果这个异常未被捕获，你的程序将停止并退出。这不是你希望发生的事情。\n\
    \n### try: except: 块\n\nPython 的异常处理是通过 **try:** 和 **except:** 块完成的。\n\n```python\n\
    try:\n    print(\"Do something.\")\nexcept:\n    print(\"Statement failed.\")\n\
    ```\n\n**try:** 块中的代码没有问题：\n\n```\n>>>\nDo something.\n```\n\n为了触发 **except:**\
    \ 块，**try:** 中包含的语句必须失败。\n要捕获异常，你可以在任何你想要测试错误的 Python 语句周围编写 **try:** 和 **except:**\
    \ 块。如果在 **try:** 块中发生自然错误，**except:** 子句中的代码将被执行。\n此时，我们所做的只是在代码失败时显示“Statement\
    \ failed.”消息。但这仍然没有让我们能够控制实际的错误代码。\n解决方案是告诉 **except:** 我们试图处理什么错误。Python 错误代码会在语句实际失败时显示在命令行上。\n\
    如果你尝试打开的文件不存在，你会得到 `FileNotFoundError` 异常。这就是我们需要传递给 **except:** 的错误代码，如下所示：\n\
    \n```python\ntry:\n    file = open('filename.txt')\nexcept FileNotFoundError:\n\
    \    print(\"FileNotFoundError has occurred\")\n```\n\n此外，如果你需要打印错误代码，可以通过将其复制到一个名为\
    \ **error** 的变量中（但你可以使用任何其他名称）来解释它：\n\n```python\ntry:\n    file = open('filename.txt')\n\
    except FileNotFoundError as error:\n    print(f\"{error} has occurred\")\n```\n\
    \n我们现在可以将此应用于我们的文件示例，如下所示：\n\n```python\nfilename = \"test.txt\"\n\ntry:\n   \
    \ print(f\"Opening {filename} for writing\")\n    f = open(filename, \"w\")\n\
    except FileNotFoundError as error:\n    print(f\"Error is = {error}\")\n```\n\n\
    这应该是打开文件的标准方式。\n\n> 现在，即使由于某种原因 `open` 函数失败，我们也可以优雅地显示一条消息并继续执行下一条语句，而不会中断程序流程。在处理文件和类似操作时，使用\
    \ **try:** 和 **except:** 来处理你无法控制的错误。\n\n### 抛出异常\n\n你可以抛出自己的异常。当你百分之百确定代码依赖于某个操作的成功时，这很有用。如果操作失败，你绝对不想执行任何其他后续操作。这通常表示一个严重的错误。\n\
    \n要抛出自己的异常，请使用 **raise** 关键字：\n\n```python\ntry:\n    print(\"About to raise an\
    \ exception\")\n    raise ZeroDivisionError\nfinally:\n    print(\"Goodbye!\"\
    )\n```\n\n```\n>>>\nAbout to raise an exception\nGoodbye!\nTraceback (most recent\
    \ call last):\n  File \"raise.py\", line 3, in <module>\n    raise ZeroDivisionError\n\
    ZeroDivisionError\n```\n\n**raise** 关键字必须指向一个现有的异常错误类。我们刚刚抛出了 `ZeroDivisionError`，尽管我们并没有执行除以\
    \ 0 的操作——这个异常是强制产生的。但理想情况下，你应该创建自己的异常类型，这可以通过扩展 `Error` 类来定义：\n\n```python\nclass\
    \ Error(Exception):\n    # base error class\n    pass\n```\n\n```python\nclass\
    \ CustomError(Error):\n    # custom exception\n    # that defines attributes\n\
    \    # with more information\n    # about this error\n    def __init__(self):\n\
    \        print(\"The dough has not risen!\")\n        pass\n```\n\n```python\n\
    try:\n    raise CustomError\nfinally:\n    print(\"Goodbye!\")\n```\n\n```\n>>>\n\
    The dough has not risen!\nGoodbye!\nTraceback (most recent call last):\n  File\
    \ \"raise.py\", line 16, in <module>\n    raise CustomError\n__main__.CustomError\n\
    ```\n\n错误名称通常以 `Error` 一词结尾，因此请确保你的命名遵循此模式以保持一致性。\n\n```python\nf = open(\"file.txt\"\
    , \"w\")\n```\n\n### 关于 \"w\" 模式的另一点\n\n小心不要用 `\"w\"` 模式打开*重要*文件——即使文件已经存在，也会创建一个新的空白文件，覆盖原始文件的内容。\n\
    \n如果文件不存在，则强制创建一个用于写入的空白文件：\n\n```python\nf = open(\"file.txt\", \"w\")\n```\n\
    \n此模式将清空现有 `file.txt` 的内容或从头开始创建一个新文件。此时文件已准备好被写入。\n\n### 打开文件模式\n\n| 模式 | 描述\
    \ |\n| :--- | :--- |\n| r | 以读取模式打开文件。（默认） |\n| t | 以文本模式打开。（默认） |\n| w | 以写入模式打开文件。（如果文件不存在则创建新文件；如果文件存在则截断文件。）\
    \ |\n| x | 以独占创建模式打开文件。（如果文件已存在，此操作将失败。） |\n| a | 以追加模式打开文件，将内容添加到文件末尾（如果文件不存在则创建新文件。）\
    \ |\n| b | 以二进制模式打开文件（需要与其他模式组合使用） |\n| + | 以更新模式打开文件（可读写） |"
