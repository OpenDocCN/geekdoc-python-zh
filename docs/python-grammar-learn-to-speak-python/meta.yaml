    def __init__(self, make, wheels):\n    self.make = make\n    self.wheels = wheels\n\
    ```\n\n这里唯一的区别是向构造函数添加了 `make` 和 `wheels` 参数。在构造函数内部，我们现在将传递给这些参数的值分配给 `self.make`\
