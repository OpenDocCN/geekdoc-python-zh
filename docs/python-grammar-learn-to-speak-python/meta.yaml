  md: '# 14.3 Using python command


    Now that Python is installed on your system you are ready to use python executable
    to run your Python scripts.

    Navigate to the directory from your command prompt (Windows) or Terminal (Mac)
    or bash (Linux) where you installed Python. Create and save your Python script
    into a file `script.py` and then execute the following command:


    ```

    python script.py

    ```


    This will execute your python script.


    # 14.4 Running python scripts system-wide


    On Mac or Linux Python will likely be available for running from any location
    on your hard drive in Terminal or bash command line soon after the installation
    because generally it''s installed globally. But it may not be the same on Windows.

    New projects are likely to be stored in a unique directory.

    On Windows for example it could be: `C:\develop\my_app\main.py`. In order to execute
    `main.py` from command line we must first navigate there (using the cd command)
    to let python know where the script is.

    But in some cases we won''t be able to run Python outside of its own installation
    folder. On Windows you might run into an error if the location of `python.exe`
    is not also present in the PATH environment variable.

    Some Python installation software will automatically add `python.exe` to PATH.
    But sometimes it won''t happen. So let''s make sure **python.exe** exists in PATH
    variable so it can be executed from anywhere on the command line.

    The solution is to include path to **python.exe** to your **Environment Variables**.'
  merge: -1
