    \ pop from empty list\n```\n\n## list.reverse()\n\n```python\nalpha = ['a', 'b',\
    \ 'c', 'd', 'e', 'f']\n\nalpha.reverse()\n\nprint(alpha)\n\n>>>\n['f', 'e', 'd',\
    \ 'c', 'b', 'a']\n```\n\n## list.sort()\n\n默认情况下，`sort` 方法按升序重新排列数字和字母。\n\n```python\n\
