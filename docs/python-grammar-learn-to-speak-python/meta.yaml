    # 3.2.7 Bitwise Operators


    On a 64-bit processor, each variable is 64 bits long, even if the value of that
    variable is set to 1. Bitwise operators help you work on the actual bits of the
    variable, rather than its primitive type value.


    | Operator | Name | Description |

    | :--- | :--- | :--- |

    | & | AND | Sets target bit to 1 if both bits are 1 |

