    say(\"Steve\")\n```\n\n这对编译器来说会非常困惑。毕竟，这到底意味着什么？第一个参数应该被默认参数替换吗？还是这个函数的用户试图传递第二个参数？\n\
    \n## 7.2.5 任意参数\n\n任意参数是函数的假定参数。它们并非都在函数定义中被显式定义。\n任意参数通过使用星号 `*`（星号）字符来定义。\n\n\
    ```python\ndef list(*arguments):\n    for value in arguments:\n        print(value)\n\
    ```\n\n如果没有传递任何参数，则不会发生任何事情：\n\n```python\nlist()\n```\n\n```\n>>>\n()\n```\n\n\
    结果是一个空元组。\n现在让我们传递一些常见的动物名称：\n\n```python\nlist(\"Fox\",\n    \"Wolf\",\n    \"\
    Coyote\",\n    \"Bear\",\n    \"Rabbit\")\n```\n\n```\n>>>\nFox\nWolf\nCoyote\n\
    Bear\nRabbit\n```\n\n`arguments` 参数是一个元组。\n因为元组是可迭代的，所以你可以在这里使用 `for` 循环。\n\n\
    ## 7.2.6 内置函数\n\nPython 有许多内置函数。例如，函数 `sum` 所做的事情与我们前面例子中的自定义函数 `add` 大致相同。\n\n\
    ```python\na = sum([10, 5])\nb = sum([12, 8])\n\nprint(a) # 打印 15\nprint(b) #\
    \ 打印 20\n\n>>>\n15\n20\n```\n\n你可以快速对一个范围求和：\n\n```python\nr = range(0, 5)\na\
