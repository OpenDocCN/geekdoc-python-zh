    # Chapter 3


    ## Python Programming Language


    ### 3.1 Basic Operations


    #### 3.1.1 Learning To Speak In Python


    When I was learning my first computer language initially I just wanted to learn
    how to do *basic operations*, like printing and formatting strings to console
    and adding numbers. Perhaps also making my own functions and calling them.


    I wanted to learn how to **think in Python** at the level of its basic grammar
    before dealing with more complex ideas like closures, objects and static methods.


    Primitive types, classes, objects, lists and other data types and data structures
    are also important and we will go over them one by one in detail after we cover
    basics.


    As an introduction to the Python language the passage will first go over common-place
    scenarios from the life of a Python programmer.


    This part of the book will introduce you to the "flavor" of Python language. In
    other words – what it generally feels like to program in Python.


    Like in many other languages, there are multiple ways of doing the same thing
    in Python. Examples throughout this book will give reader a preference as to which
    way they should use without bias.


    All of the following examples will focus on everything that works in Python 3
    and above. Some examples of printing values may be more "outdated" than others,
    or rolled over as features from previous version.


    Since so many Python programs have been written in prior versions of the language
    it was decided to include some of those examples as well. The book will make best
    effort to notify you about any deviations.


    At the time when this book was written Python 3.9.0 was the latest version, awaiting
    4.0 release. This means *most* of the examples will be based on the latest version
    of Python at this time.


    Let''s start with the very basics! Comments.


    ### 3.1. BASIC OPERATIONS


    #### Comments


    Comments start with `#` and placed at the beginning of a line or *after* a statement:


    ```python

    # Create a new variable

    chickens = 10


    egg = 1 # one egg

    ```


    #### Printing Values


    To print simple values use print function. In Python 3 or greater:


    ```python

    chickens = 10

    print(chickens)           # prints 10 to command prompt

    ```


    #### Printing Multiple Values


    You can form a sentence by separating values by comma:


    ```python

    num = 5

    what = "wolves"

    print("there are",num,what)

    ```


    This code will print the following string:


    ```

    there are 5 wolves

    ```


    > *Space characters* were automatically inserted by print function. All you have
    to do is give the print function a comma-separated list of values. This is a great
    automatic feature for formatting natural text.


    #### Using {} placeholders and string''s .format() method


    Objects of type string have a `.format()` method, making it possible to execute
    it directly on a *string literal*. Embedding empty curly braces `{}` into string
    creates a placeholder value specified in `.format()` method:


    ```python

    print("You have collected {} pine cones".format(15))

    ```


    The number of `{}`''s must match the number of values passed into the `.format()`
    method as a comma separated list:


    ```python

    print("You have collected {} pine {}".format(15, "cones"))

    ```


    Both of the statements above will produce the following output:


    ```

    You have collected 15 pine cones

    ```


    #### Formatting dynamic text values in proper English


    Often when you have to write text output you may want to append the letter "s"
    to sentences containing numeric values. You might also swap the *linking verbs*
    "are" and "is" to make the text read in proper English.


    What if after some operations your variable changed from 10 to 1 and you need
    to update your text value according to those changes?


    For example: There "are" 10 apple(s). But there "is" 1 apple. Let''s try this
    out:


    ```python

    apples = 10;

    print("There are {} apples.".format(apples))

    ```


    Output looks correct:


    ```

    There are 10 apples

    ```


    Now let''s change the value to 1 and run the same code:


    ```python

    apples = 1;

    print("There are {} apples.".format(apples))

    ```


    Output:


    ```

    There are 1 apples

    ```


    Something is wrong. This doesn''t read like proper English. It should say There
    *is* 1 apple. At first it might seem like we have to cover many different cases.

    Luckily, these syntactic changes happen in all cases only if the value is or isn''t
    equal 1. And it''s the only test we need to write.

    One way of solving this problem is to use Python''s *inline* if/else statement:


    ```python

    cones = 15

    letter = "s" if cones != 1 else ""

    print("You have collected {} pine cone{}".format(cones, letter));


    cones = 1

    letter = "s" if cones != 1 else ""

    print("You have collected {} pine cone{}".format(cones, letter))

    ```


    Output:


    ```

    You have collected 15 pine cones

    You have collected 1 pine cone

    ```


    Now let''s go back to our apple example and swap linking verbs *is* and *are*:


    ```python

    apples = 1

    letter = "s" if apples != 1 else ""

    verb = "are" if apples != 1 else "is"

    print("There {} {} apple{}".format(verb, apples, letter));


    apples = 200

    letter = "s" if apples != 1 else ""

    verb = "are" if apples != 1 else "is"

    print("There {} {} apple{}".format(verb, apples, letter))

    ```


    Output:


    ```

    There is 1 apple

    There are 200 apples

    ```


    Now it reads like proper English.

    The inline if/else statement evaluates based on provided condition. In this case
    we were testing the numeric variable for not being equal to 1. And the linking
    verb for being either are or is.


    #### The .format() method automatically interprets value by type


    By default the `.format()` method will automatically interpret either numeric
    or string variables with respect to the type of variable''s value.

    Whole floating point numbers will be reduced to one trailing zero:


    ```python

    print("num = {}".format(15.0000)) # prints 15.0

    ```


    A proper number of trailing zeros will be displayed for non-0 decimal point:


    ```python

    print("num = {}".format(15.0025)) # prints 15.0025

    ```


    You can force the value to be interpreted by any type you want. See next section.


    #### Floating point and .format() method


    Using `{:.f}` will force the value to be interpreted as floating point number
    regardless of whether it actually is (in this case it''s a whole number):


    ```python

    print("Your balance is ${:.f}".format(125))

    >>>

    Your balance is $125.000000

    ```


    By default the floating point number will display 6 trailing zeros. Perhaps this
    is not how you want to display a monetary value. But there is a solution.


    #### Floating point with decimal point


    Sometimes you want to choose number of digits to the right of `.` in a floating
    point number. For example, when displaying financial information like balance.
    You can do that with `{:.2f}`


    ```python

    num = 125

    print("Your balance is ${:.2f}".format(num))

    >>>

    Your balance is $125.00

    ```


    #### Using % value interpretation character


    You can also print one or multiple variables with print function by using `%`
    character embedded directly into the target string:'
