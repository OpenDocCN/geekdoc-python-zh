    \ over a *list*? How are Python data types different or similar to data types\
    \ in other languages? The following section will try to answer all of these questions\
    \ with a few brief practical examples.\n\n### 6.0.5 bool\n\n**True** and **False**\
    \ are primitive boolean values in Python. They can be used in many ways. One of\
    \ them is to indicate whether a feature or a setting is currently in \"on\" or\
    \ \"off\" state.\n\nExamples below demonstrate booleans used together with an\
    \ if statement and two different styles of Pythonic *ternary* operators.\n\n```python\n\
    dark  = True    # dark mode enabled\nlarge = True    # large font\nshow  = False\
    \   # private email\n\nif dark:\n    print(\"Dark mode is on!\")\nelse:\n    print(\"\
    Dark mode is off!\")\n\n# ternary if else operator\nstatus = \"on\" if large else\
    \ \"off\"\nprint(f\"Use large font: status\")\n\n# ternary statement with tuples\n\
    public = False\nstatus = (\"private\", \"public\")[public]\nprint(f\"Email is\
    \ {status}\")\n\n>>>\nDark mode is on!\nUse large font: on\nEmail is private\n\
    ```\n\nBooleans can be used to check if an object like a dictionary, list or a\
    \ set is empty by initializing the value with `bool` function.\n\n```python\n\
    print(bool(False))      # False\nprint(bool(True))       # True\nprint(bool(1))\
    \          # Numeric value 1 is cast to True\nprint(bool(0))          # Numeric\
    \ value 0 is cast to False\nprint(bool([]))         # False because list is empty\n\
    print(bool([1, 2]))     # True because list is not empty\nprint(bool({}))    \
    \     # False because dictionary is empty\nprint(bool({\"a\": 1}))   # True because\
    \ dictionary is not empty\n```\n\n```\n>>>\nFalse\nTrue\nTrue\nFalse\nFalse\n\
    True\nFalse\nTrue\n```\n\nDo something if a list is empty, and something else\
    \ if it isn't:\n\n```python\nA = [5,7,3]\n\nif bool(A) == True:\n    first = A[0]\n\
    \    print(f\"List is not empty, first item is = first\")\n    print(first)\n\
    else:\n    print(\"List is empty\")\n```\n\n```\n>>>\nList is not empty, first\
    \ item is = 5\n```\n\n### 6.1 str\n\nStrings are straightforward. They are used\
    \ to print text.\n\n```python\nstring = \"Hello there.\"\nprint(string)\n\n>>>\n\
    Hello there.\n```\n\nYou just have to watch out for the many different ways in\
    \ which strings can be defined in different versions of Python.\nFor example the\
    \ *f-string* doesn't work in earlier versions of Python:\n\n```python\nnum = 10\n\
    fstr = f\"There are {num} apples in the basket.\"\nprint(fstr)\n\n>>>\nThere are\
    \ 10 apples in the basket.\n```\n\nThis code would fail in Python 2.7.16 but works\
    \ in Python 3.8.3\n\n### 6.2 int\n\nGenerally the integer represents a whole number\
    \ and whole number operations:\n\n```python\nnumber = 100\nprint(type(number))\n\
    print(number)\nprint(100 + 25)\n\n>>>\n<class 'int'>\n100\n125\n```\n\nBut when\
    \ two whole numbers are multiplied by a fractional number (or divided) they are\
    \ automatically cast to float:\n\n```python\nprint(10 / 2)\nprint(10 * 0.1)\n\n\
    >>>\n5.0\n1.0\n```\n\n### 6.3 float\n\nFloating point numbers are helpful for\
    \ calculations that require decimal point.\n\n```python\nfloat = 200.14\nprint(type(float))\n\
    print(float)\nprint(float + 81.33)\n\n>>>\n<class 'float'>\n200.14\n281.46999999999997\n\
    ```\n\nPopular Python math library `cmath` can be used to produce the value of\
    \ PI:\n\n```python\nimport cmath\nprint('PI =', cmath.pi)\nprint(type(cmath.pi))\n\
    ```\n\n```\n>>>\n('PI =', 3.141592653589793)\n<type 'float'>\n```\n\nFloating\
    \ point numbers can be used for calculating any value that requires decimal point\
    \ precision such as shopping cart balance or tax rate.\n\n### 6.4 complex\n\n\
    A *complex number* is a number that can be expressed in the form of `a + bi` where\
    \ `i` represents imaginary unit.\nComplex numbers consist of a `Real` and an `Imaginary\
    \ Number` added together.\nIn Python append `j` to create the imaginary part of\
    \ the number:\n\n```python\nnum = 3 + 1j\n\nprint(num)\nprint(type(num))\n```\n\
    \n```\n>>>\n(3 + 1j)\n<type 'complex'>\n```\n\nTo access each part of the number\
    \ individually use `real` and `imag` attributes:\n\n```python\nprint(num.real)\n\
    print(num.imag)\n```\n\n```\n>>>\n3.0\n1.0\n```"
