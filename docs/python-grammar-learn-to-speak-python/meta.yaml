  md: '# CHAPTER 6. DATA TYPES AND STRUCTURES


    word sequence often – string, list and tuple are considered to be sequences. A
    sequence assumes there is linear order to stored values. Neither set nor dict
    (dictionary) are sequences, but string, list and tuple are.


    Dictionaries refer to its data by using properties – also known as keys. The order
    in which values are stored in such an object cannot be relied on – it can change
    spontaneously at any moment throughout lifetime of your program. Dictionaries
    are iterable but they are not sequences.


    You can think of a sequence as enumerable object because it assumes each item
    is stored at a numeric index. When learning data types it’s important to draw
    distinction between enumerable and iterable objects.


    Iterable objects can be iterated with a for-loop or the built-in iterator function
    **iter** and its sidekick function **next** which gives you control over stepping
    through the entire set – one item at a time.


    Iterators walk through all object properties when order is not important. But
    it isn’t uncommon for iterable types to be converted to enumerable.


    Items in an enumerable object are looped through in the same order in which they
    were defined, using an indexing system where first item is stored at index 0,
    second item is stored at index 1, and so on. It assumes unchanging index slots.


    You may have already used iterable and enumerable objects to write code without
    knowing what they are. Not many people learn computer languages in depth before
    they start using them to write code. However this awareness can only deepen your
    understanding of programming and will usually lead to greater code efficiency.


    **Data types** help us think about how to organize and manage primitive data (like
    strings and numbers) in a computer program. **Data structures** are also types
    but they usually consist of more complex objects. Python has several built-in
    data types and data structures. Others can be imported from packages.


    While there are no imposed rules on which data type or data structure you should
    use to solve any given problem it’s important to know how to choose the right
    one for a given task.


    The goal of this chapter is to demonstrate how each data type works in isolation'
