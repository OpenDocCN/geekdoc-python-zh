  md: '# CHAPTER 1. PYTHON GRAMMAR


    ```

    yes = True

    no = False


    print(yes)

    print(no)


    # initialize a boolean with one of its own values

    print(bool(True))

    print(bool(False))


    # initialize a boolean with a number or string

    print(bool(0))

    print(bool(1))

    print(bool(""))

    ```


    ```

    >>>

    True

    False

    True

    False

    False

    True

    False

    ```


    Because *boolean* is limited to True or False the constructor function has to
    make some decisions when you try to initialize its value by using an *integer*
    or a *string*. Empty string "" will produce False when passed to `bool()` function.
    But a string containing some text will produce True. Similar to that, the integer
    0 will be cast to False and integer 1 (or any positive *or* negative integer)
    to True:


    ```

    print(bool(""))

    print(bool("0"))

    print(bool("Hello"))

    print(bool(1))

    print(bool(125))

    ```'
