  md: '# 13.6 The Story Behind Python Logo


    Python is a general-purpose language. Originally, its name was influenced by *Monty
    Python* - the British surreal comedy troupe, not the snake – but over time, it
    was inevitable for the symbol to be generally accepted.


    The Python Software Foundation is a non-profit corporation that holds intellectual
    rights to the Python programming language.


    ![](img/bcabe83d3255895870f638a39264a071_258_0.png)


    Tim Parkin designed what is now known as the Python logo with two snakes.


    In the spirit of good humor, I will include Tim Parkin''s answer to one of the
    critics of the Python logo who said it has various undertones and communicates
    balance (instead of true properties of Python languages such as abstraction, composition
    and "the whole is greater than the parts" principle.)


    It was decided to include the following forum discussion because it quickly communicates
    the design of the Python logo from a reliable source – the logo designer himself.
    *Note: the print was edited with minor adjustments for this book-format, with
    only small additions like uppercase letters.*'
