    programs. We’ll explore Python syntax by using many source code examples that
    will help you reach a level of confidence needed to write meaningful programs.

    Like any programming language, Python gives you a set of problem-solving tools
    like *data structures*, conditional statements and operators. Using your creativity
    you will use these tools to write computer programs.

    Mostly we will focus on the features of Python programming language. That makes
    it a book for beginners. But these simple rules mirror foundational patterns seen
    in many programming languages, not just Python.

