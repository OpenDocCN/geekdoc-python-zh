  md: "# CHAPTER 9. OVERLOADING OPERATORS\n\nWithout overloading + operator trying\
    \ to add two objects doesn't make any sense. What does it mean to add two objects\
    \ of type Word? And what should happen?\nIf only this code worked, it would be\
    \ a beautiful way for solving abstract problems with code. When adding two objects\
    \ of type Word it seems natural that another object of type Word should be returned\
    \ containing both strings concatenated.\nIn the following section we will overload\
    \ Python's built-in magic methods in order to add this new functionality to all\
    \ objects of type Word.\n\n# 9.1 Magic Methods\n\nPython uses magic methods to\
    \ overload operators. The `__add__` magic method will overload + sign so that\
    \ instead of adding numbers like 1 + 1 you will be able to add objects of a particular\
    \ type. You can use `__mul__` and `__div__` objects to override * and division\
    \ \\ operators respectively.\nLet's overload magic method `__add__` of our simple\
    \ Word class from the previous section. To keep things simple in this example\
    \ we will only overload + operator:\n\n```\nclass Word:\n    def __init__(self,\
    \ text):\n        self.text = text\n        print(\"Initialized word\", self.text)\n\
    \n    # Overload + operator\n    def __add__(self, other):\n        return self.text\
    \ + \" \" + other.text\n```\n\nWe've just overloaded + operator for all object\
    \ instances of type Word. When two objects of this type are added using + a string\
    \ will be returned.\n\n> For each operator you overload you have to supply two\
    \ arguments to the magic method: `self` and `other` where parameter `self` links\
    \ to the object on left hand side of the operator and `other` is a link to object\
    \ to the right of the operator."
