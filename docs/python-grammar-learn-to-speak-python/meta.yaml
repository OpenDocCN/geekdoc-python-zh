    \ = ('black', 'white', 'black', 'white')\n\nblack = zebra[::2]\nwhite = zebra[1::2]\n\
    \nprint(black)\nprint(white)\n\n>>>\n('black', 'black')\n('white', 'white')\n\
    ```\n\n这类似于使用 for 循环并将索引递增 2 而不是 1。\n\n## 6.8. 元组\n\n### 反转序列\n\n负*步长*可用于反转元组（或任何序列）：\n\
    \n```\nforwards = [1,2,3,4,5]\nbackwards = forwards[::-1]\nprint(backwards)\n\n\
    >>>\n[5, 4, 3, 2, 1]\n```\n\n或者字符串（字符串是一种序列）：\n\n```\nprint(\"Hello\"[::-1])\n\
    \n>>>\nolleH\n```\n\n### 替换项目\n\n有时你可能希望同时用其他值替换一组切片项目。为此，你可以使用 [::] 与赋值运算符一起提供一组替换值：\n\
