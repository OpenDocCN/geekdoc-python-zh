    \ 轮的 Tesla 和一辆 Volvo，一辆 18 轮的卡车。两辆具有独特特征的不同汽车。\n这就是你希望通过类设计实现的目标——一个可以创建相似对象而无需更改类原始设计的模型。\n\
    通过这样做，你可以减少计算机程序的大小。\n\n### 另一个类示例\n\n让我们创建一个类来表示一个 Web 服务器：\n\n```python\nclass\
    \ Server:\n    # Object constructor\n    def __init__(self, os, distro, ver, ram,\
