    \ can be thought of as *ordered sets*. However, the set (as we will see later)\
    \ structure is not a sequence in Python. In a set order is not guaranteed.\nSequences\
    \ guarantee that items in a sequence will be accessible and available at the index\
    \ at which they were originally defined:\n\n```python\nstr = \"hello\";\n\n# access\
