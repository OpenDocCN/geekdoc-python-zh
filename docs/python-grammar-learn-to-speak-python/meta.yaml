    \ 20, 28]\n```\n\n当然，由于数字是使用*随机数生成器*选择的，如果你在你的计算机上运行这个脚本，这六个数字每次都会不同。\n\n## 2.2.4\
    \ 一个常见陷阱\n\n初学者在这里可能犯的一个错误是将此示例的 Python 脚本命名为 **random.py**。不要这样做。你会产生一个错误：\n\n\
