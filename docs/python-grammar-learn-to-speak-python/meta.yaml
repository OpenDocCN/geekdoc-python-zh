- md: "## CHAPTER 4. LOOPS\n\nIn Python basic for-in loop does not provide an index\
    \ value. One way of imitating an indexed for-loop in Python is to create an extra\
    \ variable. Alternatively you can also use enumerate() function.\n\nSee next examples.\n\
    \nOne way of adding indexing to a Python for loop is to provide your own independent\
    \ index variable:\n\n```\nindex = 0\nfor value in [9,5,5]\n    print(\"Value at\
    \ index  is \".format(index, value))\n    index += 1\n```\n\n```\n>>>\nValue at\
    \ index 0 is 9\nValue at index 1 is 5\nValue at index 2 is 5\n```\n\nAlternatively\
    \ you can use enumerate():\n\n```\ncolors = [\"red\",\n         \"yellow\",\n\
    \         \"green\",\n         \"blue\",\n         \"purple\"]\n```\n\n```\n#\
    \ print out enumerable object\nprint(enumerate(colors))\n```\n\n```\nfor (index,\
    \ value) in enumerate(colors):\n    print(f\"index={index}, value = {value}\"\
    )\n```\n\n```\n>>>\n<enumerate object at 0x017E88C8>\nindex=0, value = red\nindex=1,\
    \ value = yellow\nindex=2, value = green\nindex=3, value = blue\nindex=4, value\
    \ = purple\n```\n\nThe enumerate() function produces an enumerable object.\n\n\
    ## 4.2. WHILE LOOPS\n\n### 4.2.1 while loop syntax\n\nThe while loop executes\
    \ a statement until a logical condition is met:\n\n```\nwhile condition: statement\n\
    ```\n\nWalk through a number of items:\n\n```\nnum = 0\nwhile num < 5:\n    num\
    \ += 1 < 5\n    print(num)\n```\n\n```\n>>>\n1\n2\n3\n4\n5\n```\n\nHere's another\
    \ simple example where a list is popped until all items are ejected:\n\n```\n\
    fruit = [\"guava\", \"apricot\", \"apple\", \"orange\", \"banana\"]\n```\n\n```\n\
    while fruit and fruit.pop():\n    print(fruit)\n```\n\n```\n>>>\n['guava', 'apricot',\
    \ 'apple', 'orange']\n['guava', 'apricot', 'apple']\n['guava', 'apricot']\n['guava']\n\
    []\n```\n\nNote \"banana\" is missing. By the time we reach the statement, the\
    \ last item is already removed (\"popped\") from the list because it's part of\
    \ the `while` statement. We also check if fruit is non-empty. The `list.pop` and\
    \ other list methods are explained in *Chapter 6: Data Types and Structures*.\n\
    \n### 4.2.2 while loops and not operator\n\nIn this example `while` loop was used\
    \ together with `not` operator to continue looping as long as the value is non-numeric:\n\
    \n```\n# set kilometers to non-numeric value\n# so while loop executes at least\
    \ once\nkilometers = \"\"\n\nwhile not kilometers.isnumeric():\n    kilometers\
    \ = input(\"Enter number of kilometers:\")\n\nprint(f\"Value entered = {kilometers}\"\
    )\n```\n\n```\n>>>\nEnter number of kilometers:sdfsdfs\nEnter number of kilometers:nothingasd\n\
    Enter number of kilometers:dfhfghjfghfd\nEnter number of kilometers:40\nValue\
    \ entered = 40\n```\n\nThis while loop will continue to take user input until\
    \ a numeric value is entered.\n\n## CHAPTER 5. VARIABLES\n\n### 5.1 Naming variables,\
    \ variable types, memory and assigning objects by reference\n\nQuantum theory\
    \ suggests particles can exist in two different places at the same time. When\
    \ it comes to variables – they are stored at a unique location in memory.\nEvery\
    \ variable has 4 components: **name**, **value**, **type** and **address**.\n\
    In many languages including Python a *reference* is a variable that points to\
    \ – or *refers* to a value – by location in RAM memory where it is physically\
    \ stored.\nBecause variables are an essential part of any computer language we\
    \ already practiced defining and using them in prior sections of this book.\n\
    This chapter goes in depth on variables by exploring how variables and values\
    \ relate to each other and computer memory.\n\n> > Python’s compiler has a memory\
    \ optimization trick. Two unique variables can share the same memory slot if their\
    \ value is the same.\n> \n> **Shared memory for variables containing the same\
    \ value** is one of the following sections in this book that will explain how\
    \ it works.\n\nBut first let’s break down a variable into its basic components.\n\
    \n#### 5.1.1 What is a variable?\n\nVariables are *named placeholders* for values\
    \ that reside at a memory address.\n\n![](img/bcabe83d3255895870f638a39264a071_88_0.png)\n\
    \nYou can think of variables as values stored in placeholders. Here we have a\
    \ variable named 'a' holding the value of the digit 1. In Python it's a primitive\
    \ of type `int` (for *integer*.)\n\nVariables are stored at a memory address which\
    \ is assigned automatically in RAM at creation time also known as *run time*.\n\
    \nThe variable name is a placeholder pointing to the address in RAM memory where\
    \ the value is physically stored. When you create a new variable, essentially\
    \ what you are doing is naming a memory address:\n\n```\na = 1;\nprint(a)    \
    \            # 1 (value of the variable)\nprint(type(a))          # <type 'int'>\n\
    print(id(a))            # 1473574832 (address as integer)\nprint(hex(id(a))) \
    \      # 0x57d4f7b0 (address as hexadecimal)\nprint(type(a) == int)   # True (this\
    \ is a variable of type integer)\n\n>>>\n1\n<type 'int'>\n1473574832\n0x57d4f7b0\n\
    True\n```\n\nOn a 32-bit computer, this value of 1 is actually stored in a placeholder\
    \ consisting of 32 bits that can be either 1 or 0. Only the last bit is switched\
    \ on:\n\n![](img/bcabe83d3255895870f638a39264a071_88_1.png)\n\nWhy is this important?\
    \ You need to understand this if you ever plan on writing or reading files in\
    \ binary mode. Thinking in binary format can also help you optimize your data.\
    \ Variable a only stores 1 value. If you have a set of flags, why create variable\
    \ b? You can simply flip any of the 32 bits in a single variable to store 32 unique\
    \ 0/1 flags.\n\nFor now just know that this is how computers represent values\
    \ in memory. On 32 bit computers even small numbers like 1 are packed into 32\
    \ bit placeholders.\nOn a 64-bit computer there are 64 placeholders, etc. Understanding\
    \ memory might be useful if you plan on optimizing your data. But it might not\
    \ be necessary when writing simple Python scripts or just learning the language\
    \ for the first time.\n\n#### 5.1.2 How to find out variable’s memory address\n\
    \nWhen you create a variable a value representing that variable is physically\
    \ created in memory. It is also placed there at an address.\nChoosing exactly\
    \ where in memory your value is stored is not something you have to worry about\
    \ – the address is chosen automatically. Often, knowing where a variable is stored\
    \ in memory can be useful. Python has built-in id and hex functions to help work\
    \ with memory addresses.\n\n#### 5.1.3 Built-in id() function\n\n```\na = 1\n\
    addr = id(a)\nprint(addr) # Prints 50098056 (or similar)\n```\n\nThe built-in\
    \ id function returns object identity – it’s the variable’s memory address in\
    \ decimal format. If you run this on your computer, address will be different.\n\
    \n#### 5.1.4 Built-in hex() function\n\nAddresses are often displayed in hex format.\
    \ To convert the object's decimal identity to actual memory address you can use\
    \ the hex() function which converts any integer (not just an address) into hexadecimal\
    \ format:\n\n```\na = 1\naddr = id(a)\nhexaddr = hex(addr)\nprint(addr)    # Print\
    \ decimal object identity\nprint(hexaddr) # Print memory address in hex format\n\
    ```\n\n```\n>>>\n50098056\n0x2fc6f88L\n```\n\nEvery time you run this program,\
    \ it may (or may not) output a different address. This is normal behavior. The\
    \ reason for it is because variables are stored in RAM (Random Access Memory.)\
    \ This doesn't mean the address is chosen completely at random, however. It's\
    \ just called that way.\n\nIn this context random simply means address won't follow\
    \ an easily predictable pattern. Internally, it's decided by your computer processor\
    \ in a way that's convenient at that time given various factors that depend on\
    \ your processor's architecture.\n\nWhen determining address the goal of your\
    \ computer processor is to choose next available address slot as fast as possible\
    \ – this gives addresses random-like nature.\n\nThere is certain logic to how\
    \ your processor will choose a storage address based on various factors. It can\
    \ be influenced relative to where in memory your script was running from at the\
    \ time of execution.\n\n### One more thing about how Python manages memory\n\n\
    You should be aware of a quirk unique to Python language when it comes to memory\
    \ addresses – it's explained in the next subsection."
  mdcn: "## 第四章 循环\n\n在Python中，基础的for-in循环不提供索引值。在Python中模拟带索引的for循环的一种方法是创建一个额外的变量。或者，你也可以使用`enumerate()`函数。\n\
    \n请看下面的例子。\n\n为Python for循环添加索引的一种方法是提供你自己的独立索引变量：\n\n```\nindex = 0\nfor value\
    \ in [9,5,5]\n    print(\"Value at index  is \".format(index, value))\n    index\
    \ += 1\n```\n\n```\n>>>\nValue at index 0 is 9\nValue at index 1 is 5\nValue at\
    \ index 2 is 5\n```\n\n或者，你可以使用`enumerate()`：\n\n```\ncolors = [\"red\",\n   \
    \      \"yellow\",\n         \"green\",\n         \"blue\",\n         \"purple\"\
    ]\n```\n\n```\n# print out enumerable object\nprint(enumerate(colors))\n```\n\n\
    ```\nfor (index, value) in enumerate(colors):\n    print(f\"index={index}, value\
    \ = {value}\")\n```\n\n```\n>>>\n<enumerate object at 0x017E88C8>\nindex=0, value\
    \ = red\nindex=1, value = yellow\nindex=2, value = green\nindex=3, value = blue\n\
    index=4, value = purple\n```\n\n`enumerate()`函数生成一个可枚举对象。\n\n## 4.2. WHILE 循环\n\
    \n### 4.2.1 while 循环语法\n\nwhile循环执行一条语句，直到满足一个逻辑条件：\n\n```\nwhile condition: statement\n\
    ```\n\n遍历一系列项目：\n\n```\nnum = 0\nwhile num < 5:\n    num += 1 < 5\n    print(num)\n\
    ```\n\n```\n>>>\n1\n2\n3\n4\n5\n```\n\n这是另一个简单的例子，其中列表被弹出，直到所有项目都被移除：\n\n```\n\
    fruit = [\"guava\", \"apricot\", \"apple\", \"orange\", \"banana\"]\n```\n\n```\n\
    while fruit and fruit.pop():\n    print(fruit)\n```\n\n```\n>>>\n['guava', 'apricot',\
    \ 'apple', 'orange']\n['guava', 'apricot', 'apple']\n['guava', 'apricot']\n['guava']\n\
    []\n```\n\n注意\"banana\"不见了。当我们执行到该语句时，最后一个项目已经从列表中被移除（\"弹出\"），因为它是`while`语句的一部分。我们还检查了fruit是否非空。`list.pop`和其他列表方法在*第六章：数据类型和结构*中有解释。\n\
    \n### 4.2.2 while 循环与 not 运算符\n\n在这个例子中，`while`循环与`not`运算符一起使用，只要值是非数字的就继续循环：\n\
    \n```\n# set kilometers to non-numeric value\n# so while loop executes at least\
    \ once\nkilometers = \"\"\n\nwhile not kilometers.isnumeric():\n    kilometers\
    \ = input(\"Enter number of kilometers:\")\n\nprint(f\"Value entered = {kilometers}\"\
    )\n```\n\n```\n>>>\nEnter number of kilometers:sdfsdfs\nEnter number of kilometers:nothingasd\n\
    Enter number of kilometers:dfhfghjfghfd\nEnter number of kilometers:40\nValue\
    \ entered = 40\n```\n\n这个while循环将继续获取用户输入，直到输入一个数字值。\n\n## 第五章 变量\n\n### 5.1 命名变量、变量类型、内存和通过引用赋值对象\n\
    \n量子理论认为粒子可以同时存在于两个不同的地方。而变量——它们存储在内存中的唯一位置。\n每个变量有4个组成部分：**名称**、**值**、**类型**和**地址**。\n\
    在包括Python在内的许多语言中，*引用*是一个变量，它通过RAM内存中物理存储的位置指向——或*引用*——一个值。\n因为变量是任何计算机语言的基本组成部分，我们已经在本书的前面章节中练习了定义和使用它们。\n\
    本章将深入探讨变量，探索变量和值如何相互关联以及与计算机内存的关系。\n\n> > Python的编译器有一个内存优化技巧。如果两个唯一变量的值相同，它们可以共享同一个内存槽。\n\
    > \n> **包含相同值的变量共享内存**是本书后续章节之一，将解释其工作原理。\n\n但首先，让我们将一个变量分解为其基本组成部分。\n\n#### 5.1.1\
    \ 什么是变量？\n\n变量是存储在内存地址中的值的*命名占位符*。\n\n![](img/bcabe83d3255895870f638a39264a071_88_0.png)\n\
    \n你可以将变量视为存储在占位符中的值。这里我们有一个名为'a'的变量，它持有数字1的值。在Python中，它是一个`int`（*整数*）类型的原始类型。\n\
    \n变量存储在内存地址中，该地址在创建时（也称为*运行时*）在RAM中自动分配。\n\n变量名是一个占位符，指向RAM内存中值物理存储的地址。当你创建一个新变量时，你本质上是在命名一个内存地址：\n\
    \n```\na = 1;\nprint(a)                # 1 (value of the variable)\nprint(type(a))\
    \          # <type 'int'>\nprint(id(a))            # 1473574832 (address as integer)\n\
    print(hex(id(a)))       # 0x57d4f7b0 (address as hexadecimal)\nprint(type(a) ==\
    \ int)   # True (this is a variable of type integer)\n\n>>>\n1\n<type 'int'>\n\
    1473574832\n0x57d4f7b0\nTrue\n```\n\n在32位计算机上，这个值为1实际上存储在一个由32位组成的占位符中，每一位可以是1或0。只有最后一位被开启：\n\
    \n![](img/bcabe83d3255895870f638a39264a071_88_1.png)\n\n为什么这很重要？如果你计划以二进制模式读写文件，你需要理解这一点。以二进制格式思考也可以帮助你优化数据。变量a只存储1个值。如果你有一组标志，为什么要创建变量b？你可以简单地翻转单个变量中的任何32位来存储32个唯一的0/1标志。\n\
    \n目前只需知道这就是计算机在内存中表示值的方式。在32位计算机上，即使是像1这样的小数字也被打包到32位占位符中。\n在64位计算机上有64个占位符，等等。如果你计划优化数据，理解内存可能很有用。但在编写简单的Python脚本或第一次学习这门语言时，可能没有必要。\n\
    \n#### 5.1.2 如何找出变量的内存地址\n\n当你创建一个变量时，一个代表该变量的值在内存中被物理创建。它也被放置在一个地址上。\n选择值在内存中的确切存储位置不是你需要担心的事情——地址是自动选择的。通常，知道变量在内存中的存储位置可能很有用。Python有内置的`id`和`hex`函数来帮助处理内存地址。\n\
    \n#### 5.1.3 内置 id() 函数\n\n```\na = 1\naddr = id(a)\nprint(addr) # Prints 50098056\
    \ (or similar)\n```\n\n内置的`id`函数返回对象标识——它是变量的十进制格式内存地址。如果你在你的计算机上运行这个，地址会不同。\n\
    \n#### 5.1.4 内置 hex() 函数\n\n地址通常以十六进制格式显示。要将对象的十进制标识转换为实际的内存地址，你可以使用`hex()`函数，它将任何整数（不仅仅是地址）转换为十六进制格式：\n\
    \n```\na = 1\naddr = id(a)\nhexaddr = hex(addr)\nprint(addr)    # Print decimal\
    \ object identity\nprint(hexaddr) # Print memory address in hex format\n```\n\n\
    ```\n>>>\n50098056\n0x2fc6f88L\n```\n\n每次运行此程序时，它可能（或可能不会）输出不同的地址。这是正常行为。其原因是变量存储在RAM（随机存取存储器）中。这并不意味着地址是完全随机选择的。它只是这样命名而已。\n\
    \n在这个上下文中，随机仅仅意味着地址不会遵循一个容易预测的模式。在内部，它是由你的计算机处理器根据当时各种因素（取决于你的处理器架构）以一种方便的方式决定的。\n\
    \n在确定地址时，你的计算机处理器的目标是尽快选择下一个可用的地址槽——这赋予了地址类似随机的特性。\n\n你的处理器如何选择存储地址有一定的逻辑。它可能受到执行时脚本在内存中运行位置的影响。\n\
    \n### 关于Python如何管理内存的另一件事\n\n你应该意识到Python语言在内存地址方面有一个独特的怪异之处——这将在下一小节中解释。"
