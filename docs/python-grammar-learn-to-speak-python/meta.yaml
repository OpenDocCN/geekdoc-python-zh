  md: '# 5.1.5 Shared memory for variables containing the same value


    Let''s take a careful look at this example.


    ```

    a = 1

    print("a =", hex(id(a))) # print address of a


    b = 2

    print("b =", hex(id(b))) # print address of b


    c = 1

    print("c =", hex(id(c))) # same address as a


    c += 1

    print("c =", hex(id(c))) # changed to same as address of b

    ```


    Running this example you will notice something peculiar in the output:


    ```

    >>>

    a = 0x3166f88L

    b = 0x3166f70L

    c = 0x3166f88L  # same address as a

    c = 0x3166f70L  # after += 1 it''s same address as b

    ```


    How can two variables be stored at the same address? This happens only when two
    unique variables start to share the same value.


    The address of a and c – two different variables – is exactly the same. This optimization
    occurs when different variables contain the same value (1).


    Then, when we incremented c by 1 in the last step, the address of c changed and
    it now matches address of b because now both c and b share the same value (2).


    This is not limited to same code blocks or current execution context. Address
    can be shared across global scope and function scope:


    ```

    u = 1

    print(id(u))

    ```'
