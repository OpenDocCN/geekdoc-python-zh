    \ 1 是*整数*或 'int'，\"hello\" 是*字符串*或 'str'。小数是浮点数或简称为 'float'。\n\ntype() 函数也可用于识别*列表*、*集合*、*元组*和*字典*：\n\
    \n```\ntuple = (\"a\", \"b\")\nlist = [\"a\", \"b\"]\nset = {\"a\", \"b\"}\ndict\
