    # 6.8 tuple


    The `tuple` data structure represents a mixed list of items. Tuples are similar
    to lists, but main difference is that tuples are *immutable*. Lists are *mutable*.


    > Mutable types allow you to change item values after they''re defined. Trying
    to change values in an immutable object will produce an error.


    A list of vowels should not change once defined. It wouldn''t make sense to add
    any more items to a complete set of vowels. Therefore, they should be probably
    stored in a tuple, set or frozenset.


    In Python it''s common to use some of the data structures to initialize data structures
    of another type. You can initialize a tuple using a list by passing the list to
    tuple constructor function:


    ```

    list = [''apples'', ''oranges'', ''pineapples'']


    tup = tuple(list)


    print(tup)


    >>>

    (''apples'', ''oranges'', ''pineapples'')

    ```


