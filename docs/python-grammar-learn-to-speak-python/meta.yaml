    You might get another number like 272 – in Python 2.7 – different versions of
    Python don''t allocate the amount of memory in the same way.

    Python''s `getsizeof` function shows how much memory was allocated to store a
    given set of values. This doesn''t really mean sum of all items stored in a dictionary.

    But the size of a dictionary will noticeably expand based on number of attributes.

    In Python 3.8, for example, lists with 4 and 5 items will both allocate 128 bytes:


