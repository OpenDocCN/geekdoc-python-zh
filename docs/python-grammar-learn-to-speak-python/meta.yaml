  md: 'This usually depends on the level of depth and familiarity with its feature
    set. As you continue to practice you will notice that Python, like many other
    languages, has its own "flavor" to writing code. This can be only learned from
    experience.

    Many programmers that come to Python from other languages may experience a bit
    of *cognitive dissonance*. The goal of this book is to help readers develop *Pythonic
    Thinking* – a way of thinking about writing computer programs following intricate
    details of Python programming language.


    # 1.1.1 Installation


    Installing Python on either Mac or Windows is a relatively simple process. We''ll
    briefly go into downloading the files, using Python shell and executing Python
    scripts with **python.exe** (or simply **python**) from the command line.


    > Note: installation chapter was moved to back of the book. This way we can dive
    right into Python examples. Find it there if you still need to install Python.


    # 1.1.2 Python is a simple language that helps you deal with complex problems
    in an elegant way


    Before getting good at Python''s advanced features it''s good to understand the
    fundamentals like printing text, creating variables, working with *data types*,
    *data structures* and *strings*, executing *file operations* for reading and writing
    data from|to your hard drive, command line output and a few other things.

    *Python is a simple language that helps you deal with complex problems in an elegant
    way.* Many of its features have basic form. As a programmer you will use creativity
    and logic to put them together and write (hopefully) efficient code.

    To master Python you will need to understand what those features are and learn
    how to use them in proper situation to avoid writing bad code.'
