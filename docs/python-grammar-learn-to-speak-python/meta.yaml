  md: 'Why is this important? You need to understand this if you ever plan on writing
    or reading files in binary mode. Thinking in binary format can also help you optimize
    your data. Variable a only stores 1 value. If you have a set of flags, why create
    variable b? You can simply flip any of the 32 bits in a single variable to store
    32 unique 0/1 flags.


    For now just know that this is how computers represent values in memory. On 32
    bit computers even small numbers like 1 are packed into 32 bit placeholders.

    On a 64-bit computer there are 64 placeholders, etc. Understanding memory might
    be useful if you plan on optimizing your data. But it might not be necessary when
