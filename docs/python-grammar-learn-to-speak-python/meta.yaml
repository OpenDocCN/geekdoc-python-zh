    \n```python\na = ['a', 'b', 'c', 'd', 'e']\n\na.pop()\nprint(a)\n\na.pop()\nprint(a)\n\
    \na.pop()\nprint(a)\n\na.pop()\nprint(a)\n\na.pop()\nprint(a)\n\n>>>\n['a', 'b',\
    \ 'c', 'd']\n['a', 'b', 'c']\n['a', 'b']\n['a']\n[]\n```\n\n如果你尝试从一个空数组中弹出元素，将会得到一个\
