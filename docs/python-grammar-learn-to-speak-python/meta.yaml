    \ = \"written\"\n    print(self.make, self.wheels)\n```\n\nThe following code\
    \ will print \"over written\", not \"volvo 80\":\n\n```\nvolvo = Car(\"volvo\"\
    , 80) # Prints \"over written\"\n```\n\nYou can override both *magic methods*\
    \ or just one to your heart's content or depending on the situation.\nJust keep\
    \ in mind single `__init__` constructor is the most common way to create objects\
    \ in Python. In most cases you won't need to override `__new__` at all.\n`__new__`\
    \ and `__init__` methods are *magic methods*. They are executed under the hood\
    \ anyway but by explicitly defining them we can take control over the method's\
    \ body and return values in order to modify their behavior.\n\n# Memory optimization\
    \ with `__slots__`\n\nBy default Python uses dict to store object instance's attributes.\
    \ This can take a lot of RAM when dealing with thousands or millions of objects.\n\
    Using `__slots__` method you can reduce RAM usage by 40 to 50% in many cases.\n\
    \n```\nclass SomeClass(object):\n    __slots__ = ['name', 'identifier']\n    def\
    \ __init__(self, name, identifier):\n        self.name = name\n        self.identifier\
    \ = identifier\n```\n\nTo make Python use slots create a list of argument names\
    \ matching those passed to class constructor and assign it to `__slots__` attribute.\n\
    This should automatically reduce RAM usage, especially in programs that use small\
    \ classes and many instances of the same object."
