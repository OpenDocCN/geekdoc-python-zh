  md: '# 1.2. THINKING IN PYTHON


    The built-in Python function `input()` will halt execution of your program to
    take user input directly from command line to produce a value. The input function
    returns whatever you typed in string format after you press Enter.


    Multiplication operator `*` can work with strings, but that''s not what we need
    here. This is why we converted kilometers variable to floating point (a decimal
    point number) using `float()` function, which can be thought of as a constructor
    function for floating point numbers.


    Python provides several type constructor functions: `int()`, `float()`, `str()`,
    `complex()`, `tuple()`, `list()`, etc. Each creates a primitive or an object of
    that type. We''ll take a closer look at them all in future chapters.


    For now just know that values, like integers, can be converted to other types
    (decimal point numbers and strings, are some of the most common examples) by using
    the function that represents that type:


    ```

    integer = 125

    print(integer)


    # convert integer to decimal number

    decimal = float(integer)

    print(decimal)


    # convert decimal back to whole number

    whole = int(decimal)

    print(whole)


    >>>

    125

    125.0

    125

    ```


    Integers are whole numbers. Converting or "casting" them to float produces a decimal
    point number. Here we converted an integer to a float and back.


    One other common type you will often use is the `boolean` which has its own type
    constructor function `bool()`. It''s a primitive value that can only have two
    possible states: `True` or `False`:'
  merge: -1
  pgno: 19
