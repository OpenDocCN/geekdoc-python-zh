  md: "# 10.0.1 Class Constructors\n\nThere is nothing special about empty classes.\
    \ Classes are mostly used as blueprints for creating objects of type they represent.\
    \ The most common use of a class is to *instantiate an object – or many objects*\
    \ – of that type.\n\nA **constructor** is a function that gets called when you\
    \ instantiate an object using that class – without it an object cannot be instantiated.\n\
    \nIn Python, object construction happens in two stages. Therefore there are two\
    \ *magic methods* responsible for construction of an object: `__new__` and `__init__`.\
    \ You can use either one of them. Or you can use both.\n\nThe following examples\
    \ will demonstrate how it all fits together.\n\n```\nclass Car:\n    def __init__(self):\n\
    \        print(\"Hello from __init__\")\n```\n\nDefining two classes with the\
    \ same name overwrites the previous one:\n\n```\nclass Car:\n    def __init__(self):\n\
    \        print(\"Hello from __init__\")\n```\n\n```\nclass Car:\n    def __init__(self):\n\
    \        print(\"Hello from overwritten class Car\")\n```\n\nNo redefinition error\
    \ is generated as in some other languages. The second definition simply overwrites\
    \ the first one and will be used when object is instantiated. f\n\n# Instantiating\
    \ an object\n\nTo instantiate an object of type `Car` let's call `Car()` constructor\
    \ and assign it to a variable name mazda:"
