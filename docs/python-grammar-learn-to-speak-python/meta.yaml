    \ 4 相加后，结果为 10。\n\n## 7.2.7 覆盖内置函数\n\n如果你创建一个名为 `sum` 的自定义函数，Python 不会生成错误。然而，这意味着你将无法在程序中使用内置函数\
    \ `sum`。注意空函数定义：\n\n```python\ndef a():\n```\n\n此函数定义将产生错误。函数至少需要一个语句。你可能永远不需要创建或执行一个空函数。但为了完整性，以下是创建空函数的正确语法：\n\
    \n```python\ndef b(): return\ndef c(): pass\n```\n\n```python\nb() # 什么也没发生\n\
    c() # 什么也没发生\n```\n\n使用不带值的 `return` 或 `pass` 关键字。\n\n## 7.2.8 实际示例\n\n前面的例子故意设计得很基础，以演示函数是如何定义和执行的。让我们尝试构建一些实用的东西。\n\
    \n### 我们在计算什么？\n\n你经常看到社交媒体应用以“已过去”的格式显示时间。这是通过计算两个数字时间戳值（以秒为单位）之间的差值来完成的：一个是事件发生时的时间，另一个是当前时间。\n\
    然后，两个日期之间的间隔被转换为类似“32s”（32秒）、“1h”（1小时）、“2d”（2天）或“3mo”（3个月）的形式。或者，在间隔太长的情况下，直接显示一个日期。例如，它可能是：Wed\
    \ Nov 18 2020 或 Jan 1 2021。\n在本节中，我们将探讨创建此函数的一种方法。\n\n### 准备数据\n\n在编写实际函数之前，让我们定义一些辅助数据集。\n\
    我们知道一分钟是60秒，一小时是3600秒，等等。让我们创建一个表，将间隔存储在一个变量中：\n\n```python\n# 创建一个以秒为单位测量关键间隔的表\n\
    table = [1,           # 秒（1 以避免除以 0）\n         60,          # 1 分钟\n         3600,\
    \        # 1 小时\n         3600*24,     # 1 天\n         3600*24*30,  # 1 个月\n \
    \        3600*24*30*12] # 1 年\n```\n\n每个值代表一个“检查点”，用于测试时间间隔（以秒为单位）。让我们也创建一个字符串格式的后缀列表：\n\
    \n```python\nendings = [\"s\", \"m\", \"h\", \"d\", \"mo\", \"y\"]\n```\n\n###\
    \ 编写 seconds2elapsed 函数\n\n此函数将存储在参数 `t` 中的以秒为单位的时间间隔转换为人类可读的形式来描述该时间段的值。\n\n\
    ```python\nimport time\n\ndef seconds2elapsed(t):\n    difference = abs(time.time()\
    \ - t)\n\n    # 转换为整数（截断小数点）\n    difference = int(difference)\n\n    if (difference\
    \ == 0)\n        return \"now\"\n\n    i = 5\n\n    # 反向遍历表\n    for interval\
    \ in reversed(table):\n\n        # 如果差值更大\n        if difference > interval:\n\
    \            t = table[i]\n            v = (difference - (difference % t)) / t\n\
    \n            # 提前退出函数\n            return f\"{int(v)}{endings[i]}\"\n\n     \
    \   # python 的 for-in 循环没有索引\n        # 所以我们必须实现自己的索引\n        i -= 1\n```\n\n\
    **time.time()** 方法返回当前时间（以秒为单位，带小数点）。要开始使用它，你必须在程序顶部包含 **time** 包。\n\n首先，我们计算当前时间与传递给函数参数\
    \ `t` 的时间（以秒为单位）之间的差值。使用 `abs` 函数确保两个日期之间的间隔永远不会为负。\n\n核心功能在 `for` 循环中。\n\n这个\
    \ `for` 循环实现了 **reversed** 方法——它翻转了 **table** 列表上所有项目的顺序。我们本可以轻松地重新设计我们的 `table`\
    \ 变量，使其从年份开始。但这里使用 **reversed** 是为了演示一种可能的反向迭代方式，这对于语言新手来说可能并不总是显而易见的。\n\n我们从最大的间隔（等于1年）开始，并比较1年可以放入第一步计算出的存储在\
    \ `difference` 变量中的值多少次。如果值小于1年，则检查月份，依此类推。\n\n以下代码行完成了所有数字计算：\n\n```python\n\
    v = difference - (difference % t) / t\n```\n\n取模运算符 (`%`) 返回除法运算的余数。这帮助我们执行除以\
    \ `t` 的整除运算，正如你所记得的，`t` 根据表索引指的是1年、1个月、1天、1小时或1分钟的量。\n\n请记住，`difference` 变量是以秒为单位存储的。但我们希望61秒被评估为1分钟（或\
    \ \"1m\"）。这就是从取模运算中减去可以帮助我们确定的——一个值在间隔中能容纳多少次。\n\n逻辑大致如下：如果 `difference` 变量中的值大于1年，则进行适当的除法以计算将返回的字符串\
    \ \"1y\" 中的 \"1\"。如果间隔大于2年，则将计算为 \"2y\"。\n\n如果 `difference` 小于一年，检查它是否可以用月份表示。如果\
    \ `difference` 小于至少一个月，则将以小时为单位返回。\n\n如果小于小时，则以分钟为单位返回。如果它等于或小于60秒，则以秒为单位返回值：例如\
    \ \"37s\"。如果值为0，则返回 \"now\"。\n\n### 使用 seconds2elapsed 函数\n\n要查看函数的实际运行，我们需要找到一种方法每隔几秒调用它一次。有多种方法可以在时间间隔执行函数。为简单起见，本节将演示如何使用\
    \ **threading** 包来实现。\n\n**threading** 包具有 **Timer** 属性。如果你熟悉 JavaScript 中的 **setInterval**\
    \ 函数，它的工作方式类似。\n\n**Timer** 对象具有 **start()** 方法，该方法在指定的时间（以秒为单位）后执行函数。在本例中，它被设置为3.0秒。\n\
    \n**注意：** 此示例假设我们之前编写的 **seconds2elapsed** 函数也包含在导入 **time** 和 **threading** 包之后的某个位置。\n\
    \n```python\nimport time\nimport threading\n# === 在此处添加 seconds2elapsed() 函数的定义\
    \ ===\nsince = time.time()\ndef every3seconds():\n    # 每 3.0 秒执行一次此函数\n    threading.Timer(3.0,\
    \ every3seconds).start()\n    print(f\"{seconds2elapsed(since)}\")\n```"
