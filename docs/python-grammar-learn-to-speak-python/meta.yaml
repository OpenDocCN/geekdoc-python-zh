    # Replacing items


    Sometimes you will want to simultaneously replace a sliced set of items with other
    values. To do that you can use [::] together with equality operator to provide
    a set of replacement values:


    ```

    nums = [1, 2, 3]

    nums[0:2] = (''a'', ''b'')

    print(nums)


