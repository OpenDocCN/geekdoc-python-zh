    \ file operations you might want to use in your program.\n\n## 11.1 Desktop Salvation\n\
    \nDoes your Desktop ever get cluttered with files? What if there was a way to\
    \ quickly move all files on the Desktop to their respective folders by type.\n\
    \nImage files with extension `.jpg`, `.jpeg`, `.bmp`, `.psd` and `.png` could\
    \ be moved to \"Images\" folder. Text documents like `.txt`, `.doc` and `.xls`\
    \ can be moved to \"Text\" folder. Likewise, the development files such as `.py`,\
    \ `.js`, `.html`, `.css` could go into \"Dev\" folder.\n\nYou can specify your\
    \ own rules by modifying the folders dictionary.\n\nKnowing everything we know\
    \ so far about loops and file operations, let's write a simple program that will\
    \ scan all files on desktop, identify file type by their extension and move them\
    \ to a folder.\n\nWe can create a relationship between the folder and a list of\
    \ file extensions that should be moved there by using a dictionary of tuples.\n\
    \n```python\nimport os\n\ndesktop = \"C:Desktop\" # replace with your desktop\
    \ path\n\nfolders = {\n    \"Text\" :\n        (\".txt\",\n         \".doc\",\n\
    \         \".xls\"),\n    \"Images\" :\n        (\".psd\",\n         \".jpg\"\
    ,\n         \".jpeg\",\n         \".jpg_large\",\n         \".jfif\",\n      \
    \   \".png\",\n         \".bmp\",\n         \".tga\"),\n    \"Dev\" :\n      \
    \  (\".html\",\n         \".css\",\n         \".js\",\n         \".py\",\n   \
    \      \".c\",\n         \".cpp\",\n         \".h\"),\n    \"Video\" :\n     \
    \   (\".mpg\",\n         \".mov\",\n         \".mp4\"),\n    \"Music\" :\n   \
    \     (\".mp3\"),\n}\n```\n\nTo keep things simple the code consists of several\
    \ nested for loops.\n\n```python\nmoved = 0\n# list all files in desktop directory\n\
    for file in os.listdir(desktop):\n    # for each destination folder from our dictionary\n\
    \    for folder in folders:\n        # for each destination folder\n        for\
    \ extension in folders[folder]:\n            # if matches file extension\n   \
    \         if file.endswith(extension):\n                # check if folder exists,\
    \ if not create it\n                directory = f\"{desktop}{folder}f\"\n    \
    \            if os.path.isdir(directory) == False:\n                    os.mkdir(directory)\n\
    \                # move file to this directory\n                original = f\"\
    {desktop}{file}\"\n                target = f\"{directory}{file}\"\n         \
    \       # make sure it's a file and not directory\n                if os.path.isfile(original)\
    \ == True:\n                    # make sure target file doesn't already exist\n\
    \                    if os.path.isfile(target) == False:\n                   \
    \     # finally move file...\n                        os.rename(original, target)\n\
    \                        moved += 1\nprint(f\"{moved} files moved\")\n```\n\n\
    Running this script moves all files with listed extensions to one of target directories\
