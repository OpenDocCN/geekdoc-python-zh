    \n```python\ntesla.describe()\n```\n\n但我们的类设计仍然可以改进。\n类是为了帮助你减少编写的代码量而创建的模式。这种代码重用的原则在编程中非常重要。为了利用它，你可以创建一个更灵活的构造函数方法，该方法接受用户定义的值并将其设置到\
    \ `self` 对象上。\n\n## 10.4 构造函数\n\n在上一节中，我们从 `Car` 类创建了一个对象 `tesla`。但每次我们创建一个新对象时，它仍然只允许我们创建相同的“Tesla”汽车，有\
