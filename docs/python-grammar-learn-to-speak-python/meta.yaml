    \ = \"Steve\")\n```\n\n将 `name` 设置为 \"Steve\" 后，参数 `message` 自动被赋予默认值 \"Greetings\"\
    ：\n\n```\n>>>\nSteve : Greetings\n```\n\n但在部分定义时，你可能会遇到两个问题。\n首先，简单地在位置参数之前定义一个默认参数：\n\
    \n```python\ndef say(name = \"John\", message):\n    print(f\"{name} : {message}\"\
    )\n```\n\n此函数定义将产生以下错误：\n\n```\nSyntaxError: non-default argument follows default\
