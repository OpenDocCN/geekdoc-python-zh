    \n>>>\n[0, 1, 2]\n```\n\nHere the last item in the result is 2, but slicing stop\
    \ is 3. Proper thinking about slicing can be explained by the following diagram:\n\
    \n```\n+---+---+---+---+---+---+---+\n| P | y | t | h | o | n |\n+---+---+---+---+---+---+---+\n\
