    默认情况下，浮点数将显示 6 个尾随零。也许这不是你想要显示货币价值的方式。但有一个解决方案。


    #### 带小数点的浮点数


    有时你想选择浮点数中小数点 `.` 右边的位数。例如，在显示余额等财务信息时。你可以使用 `{:.2f}` 来做到这一点：


    ```python

    num = 125

    print("Your balance is ${:.2f}".format(num))

    >>>

    Your balance is $125.00

    ```


