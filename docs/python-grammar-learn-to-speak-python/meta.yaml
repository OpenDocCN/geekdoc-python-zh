    # 5.1.8 Python Timers


    How long would it actually take a Python program to copy 1 million values to another
    object? Let''s find out while exploring Python timer functions.


    ```

    # Include time module

    import time


    # Display monotonic time now

    print(time.monotonic())


    # Display monotonic time in nanoseconds

    print(time.monotonic_ns())

    ```


    As of the time when this book was written my results were:


    1834844.703

    1834844703000000


    > A monotonic clock is a clock that cannot go backwards. The method time.monotonic()
    returns the value of a monotonic clock in fractional seconds. Monotonic timers
    are often used when you need to measure elapsed time between two points in time.


    Let''s see monotonic timer in action by counting how long it takes to loop through
    10 million numbers.


    ```

    import time


    # Track monotonic before for loop

    start = time.monotonic()

    print("start=", start)


    # Create a range of 10 million numbers

    number = range(0, 10000000)

    ```'
