    这里 `Car.count()` 调用静态方法 `count`（如果已定义）。此方法不附加到 `Car` 类型的对象实例上。\n静态属性对于跟踪整个类的信息很有用。例如，创建了多少个\
    \ `Car` 类型的对象实例：\n为了区分静态方法和对象实例方法，Python 提供了两个关键字：`@classmethod` 和 `@staticmethod`：\n\
    \n```python\nclass Car:\n    @classmethod\n    def describe():\n        print(\"\
    This is a car\")\n```\n\n```python\nclass Car:\n    total_cars = 4\n    @staticmethod\n\
    \    def count():\n        print(\"This is a car\")\n```\n\n```python\nCar.describe()\n\
    ```\n\n在类体内声明的所有变量都是静态属性。它们应包含与整个类相关的值，而不是与其创建的对象实例相关的值。（例如，跟踪所有实例化的汽车数量。）\n\n\
    ## 10.2.3 静态属性\n\n此时，你实际上可以直接从类定义访问 `Car.make` 和 `Car.wheels` 属性：\n\n```python\n\
    print(Car.total_cars)\n\n>>>\n4\n```\n\n在类级别定义的属性称为*静态*属性。\n\n## 10.3 对象\n\n对象可以看作是类的一个实例。让我们在前面的示例中添加更多代码，以实际使用这个类。要创建\
