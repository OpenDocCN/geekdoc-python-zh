    # Slicing sequences with `[start:stop:step]`


    Sequences can be sliced using the built-in `[start:stop:step]` operator where
    *start* and *stop* indicate *starting* and *ending* index of the span in the sequence.
    The value at the index indicated by *stop* will not be included in the result.


    *start*, *stop* and *step* are all optional arguments. Using `[:]` operator without
    parameters returns a copy of the entire sequence:


    ```

    tup = (''cat'', ''dog'', ''spider'')


    print(tup[:])

    print(tup[::])

    ```


    ```

    >>>

    (''cat'', ''dog'', ''spider'')

    (''cat'', ''dog'', ''spider'')

    ```


    Because all arguments are optional, using either `[:]` or `[::]` will produce
    the same result using default arguments. Default arguments are:


    `[0, len(sequence), 1]`


    Note the *step* argument cannot be 0. It should be at least 1 or negative.

    In previous example we produced a copy of the entire sequence. Most of the time,
    however, you will use slicing operation to cut out a section from a sequence.

    For example, here''s how you would extract the word ''slice'' from a longer string:


    ```

    message = "Can you find slice in this sequence?"

    ```'
