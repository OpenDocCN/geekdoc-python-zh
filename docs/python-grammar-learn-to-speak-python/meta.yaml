    \n```\nfor letter in \"hello\": print(letter)\n```\n\n```\n>>>\nh\ne\nl\nl\no\n\
    ```\n\n#### 4.1.3 Using iter() to iterate a list\n\nTechnically what takes place\
    \ inside a for-loop can be thought of as iterating – we \"walk\" each item in\
    \ the iterable data type until item list is exhausted.\n\nIn some instances you\
    \ will want to iterate a list one item at a time. To do that Python provides a\
    \ special function `iter()` that creates an iterator object.\n\nTo create an iterator\
    \ pass a list or other iterable object to `iter()` function. Then every time you\
    \ use `next()` function you'll progress to next item one at a time.\n\nNext example\
    \ uses an iterator to walk through a list of 4 items (out of 5 total.)\n\n```\n\
    colors = [\"red\", \"yellow\", \"green\", \"blue\", \"purple\"]\n```\n\n```\n\
    # create iterator\nstepper = iter(colors)\n\n# print out the object\nprint(stepper)\n\
    \n>>>\n<list_iterator object at 0x00E36178>\n\n# take 4 steps\nprint(next(stepper))\n\
    print(next(stepper))\nprint(next(stepper))\nprint(next(stepper))\n\n>>>\nred\n\
