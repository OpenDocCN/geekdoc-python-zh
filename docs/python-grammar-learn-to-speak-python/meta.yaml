    \ again.\n\nHowever, lists are mutable and a list can be one of the items in a\
    \ tuple. In this case you can actually change values in a list that appears in\
    \ a tuple:\n\n```python\ntup = (0, ['a'])\n\ntup[1][0] = 'b'\n\nprint(tup)\n\n\
    >>>\n(0, ['b'])\n```\n\nChanging a list in a tuple is completely legal.\n\n```python\n\
    tup = (1, 2)\nprint(tup)\n\ntup[0] = 5\nprint(tup)\n\n>>>\n(1, 2)\nTraceback (most\
    \ recent call last):\n  File \"tuple.py\", line 5, in <module>\n    tup[0] = 5\n\
    TypeError: 'tuple' object does not support item assignment\n```\n\nTrying to change\
    \ items in an immutable data type such as tuple will produce a TypeError. And\
    \ that's exactly what happened here. Use lists if you need ability to change values\
    \ in your data set.\n\nThere is one gotcha when it comes to working with tuples.\
    \ And it's about tuple definitions that contain only one item. They are treated\
    \ as strings. See below.\n\n## Constructing tuples containing 0 or 1 items.\n\n\
    Tuple containing only 1 item will be treated as a string:\n\n```python\ntup =\
    \ ('a')\n\nprint(type(tup))\nprint(tup)\n\n>>>\n<class 'str'>\na\n```\n\nIf you\
    \ *need* the data set to be treated as tuple, add a comma:\n\n```python\ntup =\
    \ ('a',)\n\nprint(type(tup))\nprint(tup)\n\n>>>\n<class 'tuple'>\n('a',)\n```\n\
    \nNote that empty tuples are still treated as tuple type:\n\n```python\ntup =\
    \ ()\nprint(type(tup))\nprint(tup)\n\n>>>\n<class 'tuple'>\n()\n```\n\n## Accessing\
    \ tuples by index or slice\n\nTo access data in tuple you must use either an integer\
    \ or a slice.\nThe following examples demonstrate this:\n\n```python\ntup = (10,20,30,40,50)\n\
    \n# access individual items\nprint( tup[0] )\nprint( tup[1] )\n\n# slice out items\
    \ between 1 and 3\nprint( tup[1:3] )\n\n# reverse a tuple with slicing operation\n\
