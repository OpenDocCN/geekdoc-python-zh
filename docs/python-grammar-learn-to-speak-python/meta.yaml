    # Deep copy


    In our first example the `tree4` property was created using `copy.deepcopy` function
    – it recreated all attributes on the new object `tree4` by making a physical copy
    of all nested attributes it found in object `tree1` – no items were assigned by
    reference.

    You can think of it visually as follows:


    ![](img/bcabe83d3255895870f638a39264a071_109_0.png)


    As you can imagine choosing deep copy on a large data set can potentially reduce
    performance of your application because all nested attributes are physically copied.

    Some objects will have many nested attributes within other nested attributes.

    The `copy.deepcopy` method will iterate all nested attributes recursively using
    a potentially computationally expensive internal loop.

    Python''s `tuple` data type doesn''t have a `copy` method for a reason – because
    it''s *immutable*. Immutable objects don''t support item reassignment after definition:


    ```

    # create a tuple (immutable object)

    tup = (1,2,3,4,5)

    ```'
