    \ = \"david\"\nTypeError: 'tuple' object does not support item assignment\n```\n\
    \n不可变类型不响应访问运算符，通常没有任何用于更改值的方法。\n\n事实上，元组只有两个方法：`index()` 和 `count()`。而列表有 `append()`、`clear()`、`copy()`、`count()`、`reverse()`、`sort()`\
