    \ = open(\"file.txt\", \"r+\")\n```\n\nModes can be combined. To open file for\
    \ both reading and writing in binary mode you can use \"r+b\":\n\n```python\n\
    f = open(\"file.txt\", \"r+b\")\n```\n\nThis mode allows you to use both **read**\
    \ and **write** functions on open stream.\n\n## Reading data from file\n\nThis\
    \ section will also introduce you to another way of handling exceptions. This\
    \ time we will use **try-finally** block. The **finally** part executes regardless\
    \ of whether operation failed or not. It's often used to do optional clean up.\n\
    \nOur file `the_tyger.txt` contains four lines of famous poem \"*The Tyger*\"\
    \ by William Blake. First, let's open this file for reading and then simply output\
    \ its contents. The file `the_tyger.txt` contains only the first four lines of\
    \ the poem:\n\nTyger Tyger, burning bright,\nIn the forests of the night;\nWhat\
