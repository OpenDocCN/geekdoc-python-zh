    \ 1000 万个数字就花费了 **0.75** 秒。\n\n要实际将 1000 万个属性从一个对象复制到另一个对象，将花费更长的时间。让我们来看看：\n\
    让我们在这个脚本中添加一个新变量：\n`copy = [];`\n然后在我们的 for 循环中，从 range 的当前索引处复制一个值：\n`for index\
    \ in number: copy[index] = number[index]`\n这将把 1000 万个值复制到 copy 数组中。\n现在让我们看看通过引用将一个对象赋值给另一个对象需要多长时间：\n\
