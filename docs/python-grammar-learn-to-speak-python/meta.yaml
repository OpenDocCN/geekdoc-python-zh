  md: '# What’s Next?


    Classes are usually created to define object methods that you can call on an instance
    of an object. Class constructors have access to `self` as we have just seen where
    `self` and *object instance* are synonymous.


    Static methods, on the other hand, can be called on class name itself – they are
    used as utility functions and don''t have access to `self`.


    But – uniquely to Python – there is also something called a *class method*, which
    is sort of a hybrid between a static method and a method that can access `self`.


    In the following section we will discern the difference between regular class
    methods and static methods and how they work in Python.


    # 10.1 Instance, Class and Static Methods


    If you are coming to Python from an Object Oriented programming language such
    as C++, you may find Python''s distinction between *class methods* and *static
    methods* confusing. Considering that even *instance methods* can be still called
    on Class itself in the same way only static methods can be called in C++.


    In Python the object constructor has two attributes (properties) representing
    the instantiated object with their default names `cls` and `self`. The `cls` object
    is constructed in magic method `__main__` and then passed on as argument called
    `self` to magic method `__init__`. So the construction process is two-fold.


    There are 3 types of methods you should be aware of when making classes in Python:
    instance methods, static methods and class methods. Which type of method should
    be used and when? The following sections will make an attempt to answer this question.


    # 10.1.1 Instance methods


    Instance methods are your regular object methods, they assume positional `self`
    parameter and are intended to be called on instance of an object created (after
    it is *instantiated*) using that class:'
