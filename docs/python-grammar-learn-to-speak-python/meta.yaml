    This process of converting one type of a value to another type is called *type-casting*.


    > The input function automatically converts (or "casts") user input from the prompt
    into string format, even if the value that was typed was an integer or a floating
    point number.


    A similar problem arises if we wanted to treat user input as integer to perform
    a mathematical operation on two entered values:


    ```

    one = input("Enter 1st numeric value: ")

    two = input("Enter 2nd numeric value: ")

    res = one + two

    print(res)

    ```


    ```

    >>>

    Enter 1st numeric value: 100

    Enter 2nd numeric value: 34

    10034

    ```


    Because `input()` automatically converted both values to strings the `+` operator
    added up two strings instead of treating them as a numeric operation.


    The result is concatenation of two strings "100" and "34" into one: "10034"


    In Python the `+` operator will add two strings together if values on both of
    sides are of type string. If both values are numbers, it will perform mathematical
    addition.


    If we want the addition of two integers to take place we first need to cast both
    values to int type:


    ```

    one = input("Enter 1st numeric value: ")

    two = input("Enter 2nd numeric value: ")

    res = int(one) + int(two)

    print(res)

    ```


    ```

    >>>

    Enter 1st numeric value: 100

    Enter 2nd numeric value: 34

    134

    ```'
