    # CHAPTER 14. INSTALLING PYTHON


    At the time when I started writing this book latest version of Python was 3.8.3.
    Head over to python.org and install the latest version.

    If you already have Python installed, you can check what version you have by executing
    the following command:


    ```

    C:\Python>python --version

    Python 2.7.16


    C:\Python>

    ```


    Earlier versions of Python might not support some of the examples in this book.
    If you have an old version it is recommended to upgrade to latest.


    # 14.2 Installing on Mac


    Mac already comes prepackaged with Python. Which version of Python was originally
    installed with the OS will depend on the version of your operating system.

    The Mac''s system installation path is:


    ```

    /System/Library/Frameworks/Python.framework

    ```


    and:


    ```

    /usr/bin/python

    ```


    Earlier versions of macOS such as the OS X came with Python 2.7. While it''s great
    for practice it is recommended to upgrade to latest version.

    However, if you choose to upgrade keep in mind that you will end up with two different
    versions of Python on your system. They will both work but may not be able to
    run the same Python scripts – it''s possible that some of the later Python versions
    such as Python 3.9 or Python 4.0+ wouldn''t compile code written in some of the
    previous versions of the Python compiler because not all versions of Python are
    backward compatible.'
- md: '## 14.2.1 Checking current Python version


    To check if you have Python already installed open Terminal and type the following
    command (at the $ command line symbol.)


    ```

    $ python --version

    Python 2.7.5

    ```


    For Python 3.0+ you can also try typing python3 --version command:


    ```

    $ python3 --version

    Python 3.8.3

    ```


    If for some reason the commands typed above result in an error it means you don''t
    have Python installed on your system.

    This section assumes familiarity with Mac OSX command line installation tools.
    Depending on the OS version it may be homebrew:


    ```

    brew install python3

    ```


    Or use apt and apt-get installers if you''re on Linux. Don''t forget to apt-get
    update first:


    ```

    sudo apt-get update

    sudo apt-get install python

    ```


    But this might install the latest version on your current Linux build. To install
    a specific version, for example 3.8, you can execute:


    ```

    sudo apt-get update

    sudo apt-get install python3.8

    ```


    This book won''t go into much more detail about the installation process on different
    versions of Mac or Linux operating systems. It''s assumed the reader is already
    somewhat familiar with the process.


    ## 14.2.2 Installing GCC


    One more thing. Python''s original implementation is called CPython. It was written
    in the C language and it''s what compiles your Python program into bytecode and
    later interprets that bytecode. CPython is both an interpreter and a compiler.
    Long story short, we need to install GCC to run Python.


    If you already have Xcode installed chances are you already have GCC installed
    on your Mac. Installing Xcode is one of easiest options for getting GCC on a Mac.


    Simply search for Xcode on Mac App Store page:


    ```

    https://www.apple.com/app-store/

    ```


    ## 14.2.3 Installing XCode command line tools


    If you''re installing Xcode from scratch it''s helpful to run the following command:


    ```

    xcode-select --install

    ```


    This will add the command line tools.


    ## 14.2.4 The OXC GCC installer


    Without Xcode you can look into:


    ```

    https://github.com/not-kennethreitz/osx-gcc-installer

    ```


    For instructions on how to install the stand-alone GCC.


    > It''s advised not to install both Xcode and the stand-alone GCC together. This
    combination might complicate your installation and result in configuration problems
    that are hard to resolve. For this reason installing both is often avoided by
    Python developers on the Mac.


    ## 14.3 Using python command


    Now that Python is installed on your system you are ready to use python executable
    to run your Python scripts.

    Navigate to the directory from your command prompt (Windows) or Terminal (Mac)
    or bash (Linux) where you installed Python. Create and save your Python script
    into a file `script.py` and then execute the following command:


    ```

    python script.py

    ```


    This will execute your python script.


    ## 14.4 Running python scripts system-wide


    On Mac or Linux Python will likely be available for running from any location
    on your hard drive in Terminal or bash command line soon after the installation
    because generally it''s installed globally. But it may not be the same on Windows.

    New projects are likely to be stored in a unique directory.

    On Windows for example it could be: `C:\develop\my_app\main.py`. In order to execute
    `main.py` from command line we must first navigate there (using the cd command)
    to let python know where the script is.

    But in some cases we won''t be able to run Python outside of its own installation
    folder. On Windows you might run into an error if the location of `python.exe`
    is not also present in the PATH environment variable.

    Some Python installation software will automatically add `python.exe` to PATH.
    But sometimes it won''t happen. So let''s make sure **python.exe** exists in PATH
    variable so it can be executed from anywhere on the command line.

    The solution is to include path to **python.exe** to your **Environment Variables**.


    ## CHAPTER 14. INSTALLING PYTHON


    There are at least two different ways to access Environment Variables on Windows.
    The easiest one is to **hold Windows key** and **press R**. The following "Run"
    dialog will appear:


    ![](img/bcabe83d3255895870f638a39264a071_268_0.png)


    Figure 14.1: Hold the Windows key and press R.


    Type "SystemPropertiesAdvanced" and press Enter. The Environment Variables editor
    window will appear:


    ![](img/bcabe83d3255895870f638a39264a071_268_1.png)


    Click on Environment Variables button in lower right corner...


    ## 14.4. RUNNING PYTHON SCRIPTS SYSTEM-WIDE


    257


    ![](img/bcabe83d3255895870f638a39264a071_269_0.png)


    You can access the same window from command line:


    ![](img/bcabe83d3255895870f638a39264a071_269_1.png)


    Figure 14.2: **Running:** rundll32 sysdm.cpl,EditEnvironmentVariables


    Running the command **rundll32 sysdm.cpl,EditEnvironmentVariables**

    Either way, you will arrive at the following window:


    ![](img/bcabe83d3255895870f638a39264a071_269_2.png)


    Figure 14.3: Upper half of **Environment Variables** window.


    In the *upper* box of **Environment Variables** window (where it says user variables
    for **YourUserName**) click on **Path** and click **Edit...** button.

    Find out the path where you installed Python (the place where **python.exe** is
    located). In this example I''ll use mine which is simply C:\Python38-32\.

    In next window, click **New** and type:

    C:\Python38-32\


    ![](img/bcabe83d3255895870f638a39264a071_270_0.png)


    Figure 14.4: You will probably see other variables on the list. Just add path
    to your Python installation directory.


    Click Ok button and you''re all set. You can now run Python from anywhere on your
    hard drive, not just its installation folder.


    ## 14.5 Using Python Shell


    Shell is a sandbox environment for executing Python statements.

    To enter Python shell simply type `python` on command line and hit Enter:


    ```

    C:\>python

    ```


    You will be greeted by intro showing your current Python version and what type
    of process and operating system you''re running on:


    ```

    Python 3.8.0 (Nov 14 2019, 22:29:45) [GCC 5.4.0 20160609] on linux

    Type "help", "copyright", "credits" or "license" for more info...

    >>>

    ```


    The >>> is where you will enter your Python commands.


    ### Exiting from Python Shell


    To exit back to the Command Prompt, press Ctrl-Z and hit Enter.

    Everything you type into the shell will be erased on exit. So it''s only good
    for experimenting with Python commands just to see how they work. This is similar
    to the JavaScript developer''s console in Chrome.


    ### Executing Python Scripts


    In order to actually execute a Python script program you need to first save your
    Python code into a file with .py extension.

    After doing that, you can run python filename.py command on that file. Starting
    from next chapter it is assumed that all examples will be executed in this way.


    ## 14.6 python command usage


    Type:


    ```

    python -h

    ```


    To see all available modes available for executing python scripts.


