  - "[PAGE 236]\n\n# try: except: block\n\nPython exception handling is done with\
    \ a **try:** and **except:** block.\n\n```\ntry:\n    print(\"Do something.\"\
    )\nexcept:\n    print(\"Statement failed.\")\n```\n\nThere is nothing wrong with\
    \ the code in **try:** block:\n\n```\n>>>\nDo something.\n```\n\nIn order to trigger\
    \ the **except:** block the statement concealed in **try:** must fail.\nTo catch\
    \ an exception you can write **try:** and **except:** blocks around any Python\
    \ statement you want to test for errors. If a natural error occurs in the **try:**\
    \ block the code in **except:** clause will be executed.\nAt this point all we\
    \ are doing is displaying \"Statement failed.\" message if the code fails. But\
    \ it still doesn't give us control over handling the actual error code.\nThe solution\
    \ to that is to tell **except:** what error we're trying to handle. Python error\
    \ codes are displayed on the command line when the statement actually fails.\n\
