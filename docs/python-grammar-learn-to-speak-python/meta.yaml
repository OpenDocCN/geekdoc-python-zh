  mdcn: "## 第六章 数据类型与结构\n\n学习数据类型和结构时，需要关注三个主要概念：数据结构是否是*序列*（与可枚举相同）、是否支持*不可变性*，以及是否*允许重复值*。\n\
    \n## 数据类型与数据结构\n\n常见的数据类型包括*布尔型*（bool）、*字符串*（str）、*整型*（int）、*复数*（complex）和*浮点数*（float）。它们可以被视为用于语句（如：1\
