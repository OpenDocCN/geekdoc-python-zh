- md: '## 12.0.1 Inserting Dictionaries Into Mongo Collections


    In contrast to MySQL which is a relational database, Mongo is document-based.
    This means instead of writing queries, items are inserted into Mongo collections
    (think of them as being similar to tables in MySQL) using JSON-like object format.


    ## 12.0.2 .insert_one() method


    In this example we will insert a simple user object containing an email and a
    password into "users" collection. This is something you would do on the back-end
    when registering a new user from a web form input.


    ```python

    import pymongo


    # Connect to client

    client = pymongo.MongoClient("mongodb://localhost:27017/")


    # Grab a link to the database and users collection

    database = client["database"]

    users = database["users"]


    # Create a user dictionary to insert into "users" collection

    user = {"email": "felix@gmail.com", "password": "catfood15"}


    # Finally insert it into Mongo users collection

    users.insert_one(user)

    ```


    First, we created a Mongo client, acquired live database object, and created a
    link to "users" collection via collection variable.

    Remember that in Python JSON-like object structures are called *dictionaries*.
    Here we also created an arbitrary dictionary and inserted it into users collection
    (table) using Mongo''s `insert_one` method.


    ## CHAPTER 12. MONGODB


    ## Chapter 13


    ## What can Python be used for?


    Python''s syntax makes it one of the easiest languages to learn. You are probably
    a front-end developer who writes code primarily in JavaScript. You may have only
    heard of Python without actually taking time to learn it. I can understand that:

    Virtually all front-end work is done in JavaScript – the only language supported
    by modern browsers and Python is not even a client-side language.

    Python is usually used for server-side scripting, DevOps and things like Machine
    Learning. Due to recent year''s progress in these areas of computer technology
    Python has also become one of the fastest growing computer languages.

    Recently Python has experienced unprecedented growth. What contributed to this
    interest in the language since 2010? Let''s take a look.


    ## CHAPTER 13. WHAT CAN PYTHON BE USED FOR?


    ![](img/bcabe83d3255895870f638a39264a071_252_0.png)


    This growth can probably be attributed to a combination of many things. We already
    know that due to its simple syntax Python is an easy language to learn. But what
    else makes it a popular language?


    ### 13.0.1 Machine Learning


    A great deal of Python''s popularity can be attributed to the increased interest
    in Machine Learning. Google''s TensorFlow library used for writing Machine Learning
    algorithms is written in Python (that also has a C++ counterpart.)


    TensorFlow library can also work on Nvidia graphics card with CUDA and can be
    installed on Linux operating systems.


    ![](img/bcabe83d3255895870f638a39264a071_253_0.png)


    ### 13.0.2 Blockchain


    Perhaps you''ve also heard of **blockchain** technology and **cryptocurrency**.
    It''s not uncommon for cryptocurrency miner software to be written in Python.


    ## CHAPTER 13. WHAT CAN PYTHON BE USED FOR?


    ![](img/bcabe83d3255895870f638a39264a071_254_0.png)


    It''s fairly simple to see that this and many other *relatively* new technologies
    have together contributed to the growth of Python language.


    ### 13.0.3 Pygame


    Pygame is a cross-platform set of Python modules designed for writing video games.
    It includes computer graphics and sound libraries designed to be used with the
    Python programming language.


    ![](img/bcabe83d3255895870f638a39264a071_255_0.png)


    The interest in Pygame has been pretty consistent over the last two decades.


    ### 13.0.4 Arduino


    Arduino is an open-source electronics platform based on easy-to-use hardware and
    software. It''s intended for anyone making interactive projects.


    ![](img/bcabe83d3255895870f638a39264a071_255_1.png)


    Though it may appear as though interest in Arduino is fading, a decline in Google
    Trends can also be indicative of world-wide acceptance. Instead of searching for
    something people go directly to the site because it''s saved in their bookmarks.

    Python is not the only language you can use to program Arduino projects. It is
    possible to use C, C++ and JavaScript, but it''s on the list of acceptable choices.


    ### 13.1 Amazon AWS


    Amazon''s Web Services (AWS) is a popular platform that provides on-demand cloud
    server resources for solving various computing problems. While you don''t have
    to use Python with AWS, it is likely that at one point in your career as a web
    developer you may run into this combination.


    ### 13.2 Algebra, Matrices and Image Processing


    Python has several image processing libraries which makes it a great tool for
    server-side image manipulation. Some of the popular libraries are scikit, and
    NumPy. NumPy is a core library in Python that provides tools for working with
    *arrays* (Arrays, or ordered lists in Python are called *lists*). But because
    images are basically arrays NumPy is often used for image manipulation. Scipy
    is another library that works on n-dimensional arrays, in particular the module
    scipy.ndimage.


    ### 13.3 MySQL, MongoDB or PostgreSQL


    Python can be used with MySQL, MongoDB and PostgreSQL. That makes it possible
    to create your own API end-point server in Python for your web application.

    This setup allows you to compete with Node.js (or Deno) servers. If not in speed,
    at least in server architecture. As you will shortly see writing Python API code
    can be a joy.


    ### 13.4 File System Operations


    Python can read and write files from the file system. This makes it a great companion
    to scripts that format excel spreadsheets, read an email inbox and generally to
    any situation where you want to copy, edit, or save files on hard drive.


    ### 13.5 Math Library


    Python has a great math library including built-in math functions that are not
    even available "out of the box" in some of other popular languages.


    If you''re someone who has an appreciation for math and physics, you will find
    Python to be a natural companion.


    Python has a large scientific community based around it which often leads to writing
    optimized math-focused modules. Whereas languages like JavaScript are thought
    of being used primarily for web development.


    It can handle large data sets and can be used exclusively to perform complex mathematics.


    Finally, Python is available for almost any Operating System. This includes UNIX-based,
    Windows, macOS, iOS, and Android.


    ### 13.6 The Story Behind Python Logo


    Python is a general-purpose language. Originally, its name was influenced by *Monty
    Python* - the British surreal comedy troupe, not the snake – but over time, it
    was inevitable for the symbol to be generally accepted.


    The Python Software Foundation is a non-profit corporation that holds intellectual
    rights to the Python programming language.


    ![](img/bcabe83d3255895870f638a39264a071_258_0.png)


    Tim Parkin designed what is now known as the Python logo with two snakes.


    In the spirit of good humor, I will include Tim Parkin''s answer to one of the
    critics of the Python logo who said it has various undertones and communicates
    balance (instead of true properties of Python languages such as abstraction, composition
    and "the whole is greater than the parts" principle.)


    It was decided to include the following forum discussion because it quickly communicates
