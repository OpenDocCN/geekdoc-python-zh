    print(4 * zebra)\n\n>>>\nhahaha\n('black', 'white', 'black', 'white')\n[0, 1,\
    \ 0, 1, 0, 1, 0, 1]\n```\n\n## Slicing sequences with `[start:stop:step]`\n\n\
    Sequences can be sliced using the built-in `[start:stop:step]` operator where\
    \ *start* and *stop* indicate *starting* and *ending* index of the span in the\
    \ sequence. The value at the index indicated by *stop* will not be included in\
    \ the result.\n\n*start*, *stop* and *step* are all optional arguments. Using\
    \ `[:]` operator without parameters returns a copy of the entire sequence:\n\n\
    ```python\ntup = ('cat', 'dog', 'spider')\n\nprint(tup[:])\nprint(tup[::])\n\n\
    >>>\n('cat', 'dog', 'spider')\n('cat', 'dog', 'spider')\n```\n\nBecause all arguments\
    \ are optional, using either `[:]` or `[::]` will produce the same result using\
    \ default arguments. Default arguments are:\n\n`[0, len(sequence), 1]`\n\nNote\
    \ the *step* argument cannot be 0. It should be at least 1 or negative.\nIn previous\
