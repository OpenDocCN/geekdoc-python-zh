    \ # Print my message\n```\n\n注释不是 Python 代码，它们是自由格式的笔记。因此，它们会被编译器忽略。你永远不会因为注释而产生编译器错误。\n\
    注释用于给自己留下笔记，提醒你下面的代码块或函数的作用。它们也可以是留给将来阅读你代码的其他程序员或团队成员的笔记。\n一些教程和课程教导说，应该使用三引号\
