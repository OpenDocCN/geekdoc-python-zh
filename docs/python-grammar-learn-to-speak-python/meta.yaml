    \nA 3D vector is defined by 3 points in space: x, y and z which are assumed to\
    \ extend from the origin of the coordinate system at [x=0, y=0, z=0]. Therefore\
    \ it can be represented by the following Python class:\n\n```\nclass vector:\n\
    \    def __init__(self, x, y, z):\n        self.x = x\n        self.y = y\n  \
