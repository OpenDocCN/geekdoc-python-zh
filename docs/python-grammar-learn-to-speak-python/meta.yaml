    to scripts that format excel spreadsheets, read an email inbox and generally to
    any situation where you want to copy, edit, or save files on hard drive.


    # 13.5 Math Library


    Python has a great math library including built-in math functions that are not
    even available "out of the box" in some of other popular languages.


    If you''re someone who has an appreciation for math and physics, you will find
    Python to be a natural companion.


    Python has a large scientific community based around it which often leads to writing
    optimized math-focused modules. Whereas languages like JavaScript are thought
    of being used primarily for web development.


    It can handle large data sets and can be used exclusively to perform complex mathematics.


    Finally, Python is available for almost any Operating System. This includes UNIX-based,
    Windows, macOS, iOS, and Android.'
