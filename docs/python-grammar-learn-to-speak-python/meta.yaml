    # # Chapter 6


    # ## Data Types and Structures


    When I started learning data structures I would often get stuck trying to understand
    why Python has 4 relatively similar structures: `list`, `dictionary`, `tuple`
    and `set`.

    As you dive deeper into working with these data types you will begin to form this
    *mental model* of their differences which should help you determine which data
    structure to choose for solving a particular problem:


    | LIST | DICTIONARY |

    | :--- | :--- |

    | **Sequence**<br>**mutable**<br>**allows** duplicate values<br>has **11** methods<br>*(more
    may be added in the future)* | **Not sequence**<br>**mutable**<br>**disallows**
    duplicates because it stores items as { **key: value,** } pairs<br>has **11**
    methods<br>*(more may be added in the future)* |

    | **TUPLE** | **SET** |

    | **Sequence**<br>**immutable**<br>**allows** duplicate values<br>has **2** methods:<br>only
    has methods `index()` and `count()` | **Not sequence**<br>**immutable**<br>**disallows**
    duplicate values<br>has **17** methods<br>*(more may be added in the future)*
    |


    These are not only structures in Python. But they are the most important ones.'
- md: "## CHAPTER 6. DATA TYPES AND STRUCTURES\n\nWhen learning data types and structures\
    \ three main concepts to watch out for are whether data structure is a *sequence*\
    \ (same as enumerable), whether it supports *immutability* and whether it *allows\
    \ duplicate values*.\n\n## Data Types and Data Structures\n\nCommon data types\
    \ include *boolean* (bool), *string* (str), *integer* (int), *complex number*\
    \ (complex) and *decimal point numbers* (float). They can be interpreted as primitive\
    \ values for using in statements such as: 1 + 2 and much more complex.\n\nData\
    \ structures list, dict (as in *dictionary*), set, frozenset and tuple are unique\
    \ to Python. However, some of them resemble the same exact data structures from\
    \ other languages that share similar functionality.\n\n## Difference between Data\
    \ Types and Data Structures\n\nA data structure is an abstract way of organizing\
    \ complex data in a way that allows certain operations to be efficiently performed\
    \ on it: an array or list, for example.\n\nIn computer science, Binary Tree can\
    \ be thought of as a data structure. It consists of the abstract idea of nodes\
    \ and possibly some methods for operating on them.\n\nThe Binary Tree data structure\
    \ can also contain several methods defined for working with it, for example, add_node()\
    \ and remove_node().\n\nWhile there is no such thing as a built-in Binary Tree\
    \ data structure in Python, you can create one yourself by using class keyword.\
    \ Classes will be covered later.\n\nThe Python's built-in data structures that\
    \ can be categorized as *sequences* are *string*, *list*, *tuple*, *bytearray*\
    \ and *range objects*. A sequence is exactly what it sounds like. It's an array-like\
    \ set of values that follows some type of sequential (linear) order. Whereas dictionary,\
    \ set and frozenset.\n\nA data type is more primitive. For example an integer\
    \ or 'int' is a data type that stores whole numbers. A string or 'str' is a data\
    \ type that contains text. One way of looking at data types is to think of them\
    \ as units for storing values in category represented by that type.\n\nNumbers,\
    \ strings, and booleans (True or False) can be thought of as primitive data types.\
    \ Unlike data structures they usually don't have (m)any methods attached to them\
    \ because they represent basic form of a value which can be manipulated by common\
    \ operators.\n\n## Mutability\n\nWhen it comes to data structures programmers\
    \ need to understand the distinction between *mutable* and *immutable* data structures.\
    \ The concept of immutability doesn't always work in the same way in different\
    \ programming languages.\nGenerally, an immutable type disallows changing its\
    \ values once they have already been set. However, you are still allowed to add\
    \ new items or remove existing ones using that type's built-in methods like `add()`\
    \ or any of its other 16 methods.\nBut manipulating the set by using its methods\
    \ still follows one important rule: it assumes that none of the values will ever\
    \ be changed once they are defined: in other words at all times the set remains\
    \ immutable.\nA `frozenset` cannot be updated after being initialized with a set\
    \ of values. You can still use some of the set's methods on it like `union()`,\
    \ `intersection()`, `copy()`, etc. They will be covered later.\n\n## Lists, Dictionaries\
    \ and Ranges\n\nThe `list` in Python is a mutable data structure similar to `Array`\
    \ in JavaScript.\nA `dict` is a dictionary – it's similar to JavaScript's *object\
    \ literal* which is defined by curly brackets (and resembles JavaScript's JSON\
    \ format.)\nThe `range()` function can be mistaken for a data type by beginners.\
    \ There is no such thing as range data type – this built-in function produces\
    \ a *sequence* of numeric values which are returned as `list` data structure.\n\
    \n## Sequences\n\nIn Python a `sequence` is a general term for referring to an\
    \ ordered set. Sequences can be thought of as being synonymous with enumerable\
    \ data types (in that they can be placed into a one-to-one correspondence with\
    \ the natural numbers.)\nThere is no such thing as `sequence` data structure in\
    \ Python but you will hear the word sequence often – string, list and tuple are\
    \ considered to be sequences. A sequence assumes there is linear order to stored\
    \ values. Neither set nor dict (dictionary) are sequences, but string, list and\
    \ tuple are.\n\nDictionaries refer to its data by using properties – also known\
    \ as keys. The order in which values are stored in such an object cannot be relied\
    \ on – it can change spontaneously at any moment throughout lifetime of your program.\
    \ Dictionaries are iterable but they are not sequences.\n\nYou can think of a\
    \ sequence as enumerable object because it assumes each item is stored at a numeric\
    \ index. When learning data types it’s important to draw distinction between enumerable\
    \ and iterable objects.\n\nIterable objects can be iterated with a for-loop or\
    \ the built-in iterator function **iter** and its sidekick function **next** which\
    \ gives you control over stepping through the entire set – one item at a time.\n\
    \nIterators walk through all object properties when order is not important. But\
    \ it isn’t uncommon for iterable types to be converted to enumerable.\n\nItems\
    \ in an enumerable object are looped through in the same order in which they were\
    \ defined, using an indexing system where first item is stored at index 0, second\
    \ item is stored at index 1, and so on. It assumes unchanging index slots.\n\n\
    You may have already used iterable and enumerable objects to write code without\
    \ knowing what they are. Not many people learn computer languages in depth before\
    \ they start using them to write code. However this awareness can only deepen\
    \ your understanding of programming and will usually lead to greater code efficiency.\n\
    \n**Data types** help us think about how to organize and manage primitive data\
    \ (like strings and numbers) in a computer program. **Data structures** are also\
    \ types but they usually consist of more complex objects. Python has several built-in\
    \ data types and data structures. Others can be imported from packages.\n\nWhile\
