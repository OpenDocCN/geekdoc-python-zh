    ```\n\nJavaScript 程序员会发现这类似于[解构赋值](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Operators/Destructuring_assignment)特性。\n\
    元组数据结构只有 2 个方法：\n\n### tuple.count()\n\n统计某个值在元组中出现的次数：\n\n```python\nword = ('h',\
