  md: '# 2.2. BASICS


    Using **import** keyword the program includes a built-in *module* called `random`.
    This package contains methods for working with random numbers.


    For example `random.choice` method returns a random element from a set. In Python
    *ordered* sets of items can be also referred to as *sequences*.


    A Python sequence is an *iterable*, like a JavaScript Array.


    The built-in **range** function generates a linear set of numbers between 1 and
    15. This sequence is then stored in the variable **numbers**.


    > In Python you don''t have to type int, float, var, let or const to define a
    variable. Variable names are not even preceded by something like $ as you would
    see in PHP language. They are just names.


    The script then creates a variable called **chosen** to store an empty array `[]`.
    Inside the **while** loop a random number is chosen and stored in **number** variable.
    **numbers.remove(number)** line removes that number from **numbers** sequence.
    Then it will append the same number to **chosen** array. This is equivalent to
    *moving* it from **numbers** array into **chosen** array.


    Without a condition **while** loop iterates infinitely. But because it checks
    length of the array **chosen** using another built-in Python method **len**, when
    the length of chosen array reaches 6 the loop will be terminated.


    Lastly, using built-in **print** function, we output the array **chosen**. It
    will contain 6 numbers randomly picked out from the original range that was stored
    in `numbers`.


    If you run it, the result of this program will be printed to the console:


    ```

    [14, 44, 42, 16, 5, 6]

    ```


    Or if you launch it from the Command Prompt:


    ```

    C:>python hello.py

    [7, 3, 41, 18, 20, 28]

    ```


    Of course because numbers are chosen using a *Random Number Generator* if you
    run this script on your computer, the six numbers will be different every time.'
