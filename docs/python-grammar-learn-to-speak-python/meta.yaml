    # Mutability


    When it comes to data structures programmers need to understand the distinction
    between *mutable* and *immutable* data structures. The concept of immutability
    doesn''t always work in the same way in different programming languages.

    Generally, an immutable type disallows changing its values once they have already
    been set. However, you are still allowed to add new items or remove existing ones
    using that type''s built-in methods like `add()` or any of its other 16 methods.

    But manipulating the set by using its methods still follows one important rule:
    it assumes that none of the values will ever be changed once they are defined:
    in other words at all times the set remains immutable.

    A `frozenset` cannot be updated after being initialized with a set of values.
    You can still use some of the set''s methods on it like `union()`, `intersection()`,
    `copy()`, etc. They will be covered later.


    # Lists, Dictionaries and Ranges


    The `list` in Python is a mutable data structure similar to `Array` in JavaScript.

    A `dict` is a dictionary – it''s similar to JavaScript''s *object literal* which
    is defined by curly brackets (and resembles JavaScript''s JSON format.)

    The `range()` function can be mistaken for a data type by beginners. There is
    no such thing as range data type – this built-in function produces a *sequence*
    of numeric values which are returned as `list` data structure.


