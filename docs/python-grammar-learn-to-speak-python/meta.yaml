- md: "## Chapter 1\n\n## Python Grammar\n\n### 1.1 Preface\n\nEvery time a book is\
    \ written it assumes some type of audience. This book, Python Grammar – *as the\
    \ title suggests* – is about examining fundamentals of Python. It was written\
    \ for someone new to Python language and learning it from scratch.\n\nTo avoid\
    \ being a rudimentary guideline similar to Python tutorials that can be found\
    \ online for free, some of the chapters will be augmented by providing slightly\
    \ more complex examples. This is especially useful for those learners who seek\
    \ *practical examples* or simply want to be challenged while still learning.\n\
    \nPython is a tool for problem solvers who appreciate writing clean, elegant code.\
    \ It offers a vast array of simple language features. You might not need to know\
    \ all of them – but learning them one at a time gets you closer to *Pythonic Thinking*.\n\
    \nPython is a type of language that provides common functionality from many packages\
    \ that come with it by default. Most packages are congruent with the original\
    \ feature set and play well together with existing data types.\n\nElegant code\
    \ is not only code that looks clean, but the kind that also follows *logical aesthetic*\
    \ – Python is perfect for writing logically elegant code without sacrificing performance\
    \ – but only when its features are understood in context of their intended purpose.\
    \ One goal of this book is to develop that awareness.\n\nThere is a proper and\
    \ an improper way of writing code in any computer language. This usually depends\
    \ on the level of depth and familiarity with its feature set. As you continue\
    \ to practice you will notice that Python, like many other languages, has its\
    \ own \"flavor\" to writing code. This can be only learned from experience. Many\
    \ programmers that come to Python from other languages may experience a bit of\
    \ *cognitive dissonance*. The goal of this book is to help readers develop *Pythonic\
    \ Thinking* – a way of thinking about writing computer programs following intricate\
    \ details of Python programming language.\n\n### 1.1.1 Installation\n\nInstalling\
    \ Python on either Mac or Windows is a relatively simple process. We'll briefly\
    \ go into downloading the files, using Python shell and executing Python scripts\
    \ with **python.exe** (or simply **python**) from the command line.\n\n> Note:\
    \ installation chapter was moved to back of the book. This way we can dive right\
    \ into Python examples. Find it there if you still need to install Python.\n\n\
    ### 1.1.2 Python is a simple language that helps you deal with complex problems\
    \ in an elegant way\n\nBefore getting good at Python's advanced features it's\
    \ good to understand the fundamentals like printing text, creating variables,\
    \ working with *data types*, *data structures* and *strings*, executing *file\
    \ operations* for reading and writing data from|to your hard drive, command line\
    \ output and a few other things.\n\n*Python is a simple language that helps you\
    \ deal with complex problems in an elegant way.* Many of its features have basic\
    \ form. As a programmer you will use creativity and logic to put them together\
    \ and write (hopefully) efficient code. To master Python you will need to understand\
    \ what those features are and learn how to use them in proper situation to avoid\
    \ writing bad code.\n\n### 1.1.3 Source Code\n\nSource code will be presented\
    \ in following format:\n\n```\n# print something\nprint(\"hello\" * 2)\nprint(8\
    \ + 2)\n```\n\nPython source code will be followed by its output. To save space,\
    \ the results will be printed right after >>> characters that follow source code\
    \ examples:\n\n```\n>>>\nhellohello\n10\n```\n\n## 1.2 Thinking in Python\n\n\
    This book is a break-down of Python's most important features. But before we explore\
    \ them, let's take a look at a practical Python program just to give the reader\
    \ an idea of what Python code looks like.\n\n> We'll also learn how to \"think\
    \ in Python\" by solving a simple bug.\n\nThis section demonstrates a simple program\
    \ written in Python that converts kilometers to miles while expanding on some\
    \ of its common features.\n\n### 1.2.1 Convert Kilometers to Miles\n\n```\n# get\
    \ user input in string format\nkilometers = input(\"Enter number of kilometers:\"\
    )\n\n# convert kilometers to floating point number\nkilometers = float(kilometers)\n\
    \n# km/mi conversion factor\nfactor = 0.621371\n\n# determine miles from kilometers\n\
    miles = kilometers * factor\n\n# print result to command line\nprint(\"%0.2f km\
    \ = %0.2f mi\" % (kilometers, miles))\n```\n\n```\n>>>\nEnter number of kilometers:10\n\
    10.00km = 6.21mi\n```\n\n**Explanation:** To convert kilometers to miles you have\
    \ to multiply kilometers by the kilometers-to-miles conversion factor which is\
    \ 0.621371.\n\nThe built-in Python function `input()` will halt execution of your\
    \ program to take user input directly from command line to produce a value. The\
    \ input function returns whatever you typed in string format after you press Enter.\n\
    \nMultiplication operator `*` can work with strings, but that's not what we need\
    \ here. This is why we converted kilometers variable to floating point (a decimal\
    \ point number) using `float()` function, which can be thought of as a constructor\
    \ function for floating point numbers.\n\nPython provides several type constructor\
    \ functions: `int()`, `float()`, `str()`, `complex()`, `tuple()`, `list()`, etc.\
    \ Each creates a primitive or an object of that type. We'll take a closer look\
    \ at them all in future chapters.\n\nFor now just know that values, like integers,\
    \ can be converted to other types (decimal point numbers and strings, are some\
    \ of the most common examples) by using the function that represents that type:\n\
    \n```\ninteger = 125\nprint(integer)\n\n# convert integer to decimal number\n\
    decimal = float(integer)\nprint(decimal)\n\n# convert decimal back to whole number\n\
    whole = int(decimal)\nprint(whole)\n\n>>>\n125\n125.0\n125\n```\n\nIntegers are\
    \ whole numbers. Converting or \"casting\" them to float produces a decimal point\
    \ number. Here we converted an integer to a float and back.\n\nOne other common\
    \ type you will often use is the `boolean` which has its own type constructor\
    \ function `bool()`. It's a primitive value that can only have two possible states:\
    \ `True` or `False`:\n\n```\nyes = True\nno = False\n\nprint(yes)\nprint(no)\n\
    \n# initialize a boolean with one of its own values\nprint(bool(True))\nprint(bool(False))\n\
    \n# initialize a boolean with a number or string\nprint(bool(0))\nprint(bool(1))\n\
    print(bool(\"\"))\n```\n\n```\n>>>\nTrue\nFalse\nTrue\nFalse\nFalse\nTrue\nFalse\n\
    ```\n\nBecause *boolean* is limited to True or False the constructor function\
    \ has to make some decisions when you try to initialize its value by using an\
    \ *integer* or a *string*. Empty string \"\" will produce False when passed to\
    \ `bool()` function. But a string containing some text will produce True. Similar\
    \ to that, the integer 0 will be cast to False and integer 1 (or any positive\
    \ *or* negative integer) to True:\n\n```\nprint(bool(\"\"))\nprint(bool(\"0\"\
    ))\nprint(bool(\"Hello\"))\nprint(bool(1))\nprint(bool(125))\nprint(bool(-1))\n\
    print(bool(0))\n```\n\n```\n>>>\nFalse\nTrue\nTrue\nTrue\nTrue\nTrue\nFalse\n\
    ```\n\nYou can also check type of a value by using Python's built-in type function:\n\
    \n```\nyes = True\nno = False\nn = 1\ns = \"hello there\"\n\na = type(yes)\nb\
    \ = type(no)\nc = type(n)\nd = type(s)\n\nprint(a)\nprint(b)\nprint(c)\nprint(d)\n\
    ```\n\n```\n>>>\n<class 'bool'>\n<class 'bool'>\n<class 'int'>\n<class 'str'>\n\
    ```\n\nVariables a and b are booleans, n is an integer, s is a string.\n\n###\
    \ Why is type checking important?\n\nDue to variety of types not all conversions\
    \ are possible. In many cases Python will make a guess, but there are exceptions.\
    \ Some conversions will fail.\n\nWhat would it mean to convert a string of text\
    \ like \"hello there\" to a decimal point number with `float()` function? It doesn't\
    \ make much sense.\n\n### Solving the bug\n\nThe kilometers-to-miles conversion\
    \ program we wrote earlier works only if you enter numeric values. But there is\
    \ a bug. If you type a non-numeric value, like a random string of text: `asddasd`\
    \ the program will fail with a nasty error:\n\n```\nEnter number of kilometers:asddasd\n\
    \n>>>\nTraceback (most recent call last):\n  File \"km2mi.py\", line 5, in <module>\n\
    \    kilometers = float(kilometers)\nValueError: could not convert string to float:\
    \ 'asddasd'\n```\n\nThe code fails because the we tried to pass the string \"\
    asddasd\" to the `float()` function which expects a numeric value.\n\nBy design\
    \ the `input()` function always produces a string: if you enter 10, it will return\
    \ as \"10\", 125.10 becomes \"125.10\". Simply running `type()` function on it\
    \ won't help us here, because we'll get <class 'str'> every time, regardless what\
    \ value was entered.\n\nLet's fix this bug by limiting the value produced by input\
    \ function to numeric values. In Python primitive values have a method called\
    \ `isnumeric()` that can be called directly on the variable name:\n\n```\nif kilometers.isnumeric():\n\
    \    print(\"value is numeric!\")\n```\n\nKnowing this we can update our original\
    \ program to keep asking for input until a numeric value is entered:"
  mdcn: "## 第一章\n\n## Python 语法\n\n### 1.1 前言\n\n每次撰写一本书时，都会预设某种类型的读者。本书《Python 语法》——*正如标题所示*——旨在探讨\
    \ Python 的基础知识。它专为 Python 语言的初学者和从零开始学习的人而编写。\n\n为了避免成为类似网上免费 Python 教程的基础指南，部分章节将通过提供稍复杂的示例进行补充。这对于那些寻求*实践示例*或希望在学习过程中接受挑战的学习者尤其有用。\n\
    \nPython 是一种为问题解决者设计的工具，他们欣赏编写简洁、优雅的代码。它提供了大量简单的语言特性。你可能不需要了解所有特性——但逐一学习它们会让你更接近*Pythonic\
    \ 思维*。\n\nPython 是一种语言，它通过默认附带的许多包提供通用功能。大多数包与原始特性集兼容，并能与现有数据类型良好协作。\n\n优雅的代码不仅看起来简洁，而且遵循*逻辑美学*——Python\
    \ 非常适合编写逻辑优雅的代码，同时不牺牲性能——但前提是理解其特性在预期用途中的上下文。本书的目标之一就是培养这种意识。\n\n在任何计算机语言中，编写代码都有正确和错误的方式。这通常取决于对其特性集的深度和熟悉程度。随着你不断练习，你会注意到\
    \ Python 与许多其他语言一样，有其独特的代码编写“风格”。这只能从经验中学习。许多从其他语言转向 Python 的程序员可能会经历一些*认知失调*。本书的目标是帮助读者培养*Pythonic\
    \ 思维*——一种遵循 Python 编程语言复杂细节来思考编写计算机程序的方式。\n\n### 1.1.1 安装\n\n在 Mac 或 Windows 上安装\
    \ Python 是一个相对简单的过程。我们将简要介绍下载文件、使用 Python shell 以及通过命令行中的 **python.exe**（或简写为\
    \ **python**）执行 Python 脚本。\n\n> 注意：安装章节已移至书末。这样我们可以直接深入 Python 示例。如果你仍需安装 Python，请在书末查找。\n\
    \n### 1.1.2 Python 是一种简单的语言，帮助你以优雅的方式处理复杂问题\n\n在熟练掌握 Python 的高级特性之前，最好先理解基础知识，如打印文本、创建变量、处理*数据类型*、*数据结构*和*字符串*、执行*文件操作*以从硬盘读取/写入数据、命令行输出以及其他一些内容。\n\
    \n*Python 是一种简单的语言，帮助你以优雅的方式处理复杂问题。* 它的许多特性都有基本形式。作为程序员，你将运用创造力和逻辑将它们组合起来，编写（希望是）高效的代码。要掌握\
    \ Python，你需要理解这些特性是什么，并学习如何在适当的情况下使用它们，以避免编写糟糕的代码。\n\n### 1.1.3 源代码\n\n源代码将以以下格式呈现：\n\
    \n```\n# print something\nprint(\"hello\" * 2)\nprint(8 + 2)\n```\n\nPython 源代码后将跟其输出。为节省空间，结果将直接打印在源代码示例后的\
    \ `>>>` 字符之后：\n\n```\n>>>\nhellohello\n10\n```\n\n## 1.2 用 Python 思考\n\n本书是对 Python\
    \ 最重要特性的分解。但在我们探索它们之前，让我们先看一个实际的 Python 程序，让读者了解 Python 代码的样子。\n\n> 我们还将通过解决一个简单的错误来学习如何“用\
    \ Python 思考”。\n\n本节演示了一个用 Python 编写的简单程序，该程序将公里转换为英里，同时扩展了一些常见特性。\n\n### 1.2.1\
    \ 将公里转换为英里\n\n```\n# get user input in string format\nkilometers = input(\"Enter\
    \ number of kilometers:\")\n\n# convert kilometers to floating point number\n\
    kilometers = float(kilometers)\n\n# km/mi conversion factor\nfactor = 0.621371\n\
    \n# determine miles from kilometers\nmiles = kilometers * factor\n\n# print result\
    \ to command line\nprint(\"%0.2f km = %0.2f mi\" % (kilometers, miles))\n```\n\
    \n```\n>>>\nEnter number of kilometers:10\n10.00km = 6.21mi\n```\n\n**解释：** 要将公里转换为英里，你必须将公里乘以公里到英里的转换系数，即\
    \ 0.621371。\n\n内置的 Python 函数 `input()` 会暂停程序的执行，直接从命令行获取用户输入以产生一个值。输入函数在你按 Enter\
    \ 键后返回你输入的任何字符串格式的内容。\n\n乘法运算符 `*` 可以与字符串一起使用，但这不是我们这里需要的。这就是为什么我们使用 `float()`\
    \ 函数将 kilometers 变量转换为浮点数（带小数点的数字），该函数可以被视为浮点数的构造函数。\n\nPython 提供了几个类型构造函数：`int()`、`float()`、`str()`、`complex()`、`tuple()`、`list()`\
    \ 等。每个都创建该类型的原始值或对象。我们将在未来的章节中更仔细地研究它们。\n\n目前只需知道，像整数这样的值可以通过使用代表该类型的函数转换为其他类型（小数点数字和字符串是最常见的例子）：\n\
    \n```\ninteger = 125\nprint(integer)\n\n# convert integer to decimal number\n\
    decimal = float(integer)\nprint(decimal)\n\n# convert decimal back to whole number\n\
    whole = int(decimal)\nprint(whole)\n\n>>>\n125\n125.0\n125\n```\n\n整数是整数。将它们转换或“强制转换”为浮点数会产生一个小数点数字。这里我们将一个整数转换为浮点数，然后再转换回来。\n\
    \n另一个你经常使用的常见类型是 `boolean`，它有自己的类型构造函数 `bool()`。它是一个原始值，只能有两种可能的状态：`True` 或 `False`：\n\
    \n```\nyes = True\nno = False\n\nprint(yes)\nprint(no)\n\n# initialize a boolean\
    \ with one of its own values\nprint(bool(True))\nprint(bool(False))\n\n# initialize\
    \ a boolean with a number or string\nprint(bool(0))\nprint(bool(1))\nprint(bool(\"\
    \"))\n```\n\n```\n>>>\nTrue\nFalse\nTrue\nFalse\nFalse\nTrue\nFalse\n```\n\n因为\
    \ *boolean* 仅限于 True 或 False，所以当你尝试使用 *integer* 或 *string* 初始化其值时，构造函数必须做出一些决定。空字符串\
    \ \"\" 传递给 `bool()` 函数时将产生 False。但包含一些文本的字符串将产生 True。类似地，整数 0 将被强制转换为 False，整数\
    \ 1（或任何正数或负整数）将被强制转换为 True：\n\n```\nprint(bool(\"\"))\nprint(bool(\"0\"))\nprint(bool(\"\
    Hello\"))\nprint(bool(1))\nprint(bool(125))\nprint(bool(-1))\nprint(bool(0))\n\
    ```\n\n```\n>>>\nFalse\nTrue\nTrue\nTrue\nTrue\nTrue\nFalse\n```\n\n你也可以使用 Python\
    \ 的内置类型函数检查值的类型：\n\n```\nyes = True\nno = False\nn = 1\ns = \"hello there\"\n\n\
    a = type(yes)\nb = type(no)\nc = type(n)\nd = type(s)\n\nprint(a)\nprint(b)\n\
    print(c)\nprint(d)\n```\n\n```\n>>>\n<class 'bool'>\n<class 'bool'>\n<class 'int'>\n\
    <class 'str'>\n```\n\n变量 a 和 b 是布尔值，n 是整数，s 是字符串。\n\n### 为什么类型检查很重要？\n\n由于类型多样，并非所有转换都是可能的。在许多情况下，Python\
    \ 会进行猜测，但也有例外。有些转换会失败。\n\n将像 \"hello there\" 这样的文本字符串转换为使用 `float()` 函数的小数点数字意味着什么？这没有多大意义。\n\
    \n### 解决错误\n\n我们之前编写的公里到英里转换程序只有在输入数值时才有效。但有一个错误。如果你输入一个非数值，比如一个随机的文本字符串：`asddasd`，程序将因一个严重的错误而失败：\n\
    \n```\nEnter number of kilometers:asddasd\n\n>>>\nTraceback (most recent call\
    \ last):\n  File \"km2mi.py\", line 5, in <module>\n    kilometers = float(kilometers)\n\
    ValueError: could not convert string to float: 'asddasd'\n```\n\n代码失败是因为我们试图将字符串\
    \ \"asddasd\" 传递给期望数值的 `float()` 函数。\n\n根据设计，`input()` 函数总是产生一个字符串：如果你输入 10，它将返回\
    \ \"10\"，125.10 变成 \"125.10\"。简单地对其运行 `type()` 函数在这里对我们没有帮助，因为无论输入什么值，我们都会得到 <class\
    \ 'str'>。\n\n让我们通过将输入函数产生的值限制为数值来修复这个错误。在 Python 中，原始值有一个名为 `isnumeric()` 的方法，可以直接在变量名上调用：\n\
    \n```\nif kilometers.isnumeric():\n    print(\"value is numeric!\")\n```\n\n知道这一点，我们可以更新原始程序，持续请求输入，直到输入数值："
