- md: "## 10.0.1 Class Constructors\n\nThere is nothing special about empty classes.\
    \ Classes are mostly used as blueprints for creating objects of type they represent.\
    \ The most common use of a class is to *instantiate an object – or many objects*\
    \ – of that type.\n\nA **constructor** is a function that gets called when you\
    \ instantiate an object using that class – without it an object cannot be instantiated.\n\
    \nIn Python, object construction happens in two stages. Therefore there are two\
    \ *magic methods* responsible for construction of an object: `__new__` and `__init__`.\
    \ You can use either one of them. Or you can use both.\n\nThe following examples\
    \ will demonstrate how it all fits together.\n\n```\nclass Car:\n    def __init__(self):\n\
    \        print(\"Hello from __init__\")\n```\n\nDefining two classes with the\
    \ same name overwrites the previous one:\n\n```\nclass Car:\n    def __init__(self):\n\
    \        print(\"Hello from __init__\")\n```\n\n```\nclass Car:\n    def __init__(self):\n\
    \        print(\"Hello from overwritten class Car\")\n```\n\nNo redefinition error\
    \ is generated as in some other languages. The second definition simply overwrites\
    \ the first one and will be used when object is instantiated.\n\n## Instantiating\
    \ an object\n\nTo instantiate an object of type `Car` let's call `Car()` constructor\
    \ and assign it to a variable name mazda:\n\n```\nmazda = Car()\n```\n\nThe variable\
    \ mazda now holds an actual instance of an object of type Car. Parameter self\
    \ is automatic reference to object instance being created. If it is printed out,\
    \ it will display where in memory the object instance is located.\n\nLet's print\
    \ it out in the following example:\n\n```\nclass Car:\n    def __init__(self):\n\
    \        print(self)\n\ntesla = Car()\nprint(tesla)\n```\n\nThis example also\
    \ creates an object instance of type Car:\n\n```\n<__main__.Car instance at 0x0000000002CBF6C8>\n\
    ```\n\n## Object attributes\n\nIn the beginning of this chapter we accessed Car.top_speed\
    \ attribute.\nYou can think of it as a class-wide attribute that belongs to the\
    \ class itself. Only attributes defined within body of that class inherit this\
    \ behavior.\n\nAdding attributes to the actual instance of an object is done through\
    \ self property.\nIn this example constructor assigns two hard-coded values to\
    \ make and wheel attributes via self attribute that points to the instance of\
    \ the object:\n\n```\nclass Car:\n    def __init__(self):\n        self.make =\
    \ \"Tesla\"\n        self.wheels = 4\n        print(self.make, self.wheels, \"\
    wheels\")\n\ntesla = Car()    # Prints \"Tesla 4 wheels\" from constructor\n```\n\
    \nEven though no arguments were passed to the constructor via Car() call the attributes\
    \ were assigned to object instance from the constructor via self.\n\n## Making\
    \ object constructors more flexible\n\nWe don't really want to hard-code attribute\
    \ values in the constructor as in previous example. To make our class more flexible\
    \ we want to let the user pass them via the constructor itself in order to create\
    \ different types of cars:\n\n```\nclass Car:\n    def __init__(self, p1, p2):\n\
    \        self.make = p1\n        self.wheels = p2\n        print(self.make, self.wheels,\
    \ \"wheels\")\n\nvolvo = Car(\"Volvo\", 18)    # prints \"Volvo 18 wheels\"\n\
    ```\n\nYou can also access attributes individually from object instance:\n\n```\n\
    print(volvo.make)   # Prints \"Volvo\"\nprint(volvo.wheels) # Prints 18\n```\n\
    \nIt's legal to use the same parameter names as instance attributes:\n\n```\n\
    class Car:\n    def __init__(self, make, wheels):\n        self.make = make\n\
    \        self.wheels = wheels\n        print(self.make, self.wheels)\n```\n\n\
    This is the most common form of Python class constructors.\n\n## 10.0.2 Using\
    \ __new__ constructor\n\nThe magic method __new__ is optional. It is executed\
    \ before __init__ as part of the same process of creating the instance of an object.\n\
    \nWhen using __new__ you *must* add (object) to class Car (object): definition.\n\
    \n```\nclass Car(object):\n    def __new__(cls):\n        print(\"Hello from __new__\"\
    )\n        return object.__new__(cls)\n```\n\nInstead of self arbitrary cls parameter\
    \ is used.\n\nIt is required to return an object from __new__ method.\n\nIn the\
    \ same way as __init__ you can supply additional parameters:\n\n```\nclass Car(object):\n\
    \    def __new__(cls, make, wheels):\n        cls.make = make\n        cls.wheels\
    \ = wheels\n        return object.__new__(cls)\n```\n\nLike __init__, __new__\
    \ also assigns attributes.\n\nLet's check:\n\n```\nvolvo = Car(\"volvo\", 18)\n\
    print(volvo.make)\nprint(volvo.wheels)\n```\n\nPrints:\n\n```\nvolvo\n18\n```\n\
    \nWe had just seen how __new__ can be used to replace __init__ but it probably\
    \ shouldn't except in advanced cases.\n\n## 10.0.3 Using __new__ and __init__\
    \ together\n\nIf both exist, __new__ method executes first:\n\n```\nclass Car(object):\n\
    \    def __new__(cls, make, wheels):\n        cls.make = make\n        cls.wheels\
    \ = wheels\n        return object.__new__(cls)\n    def __init__(self, make, wheels):\n\
    \        print(self.make, self.wheels)\n```\n\ncls becomes self (they both point\
    \ to the same constructed object instance)\n\nAttributes make and wheels were\
    \ assigned in __new__ to cls object.\nThe object returned from __new__ is passed\
    \ on to self inside __init__ – they both point to the same object instance. __init__\
    \ requires at least one self parameter. Therefore __new__ *must* return an object\
    \ – otherwise init is never called.\n\n```\nvolvo = Car(\"volvo\", 10) # Prints\
    \ \"volvo 10\"\n```\n\nWhen using __new__ and __init__ together, the same number\
    \ of parameters *must* be specified in both magic methods.\n\n## self overrides\
    \ cls\n\nYou can assign properties to cls object but assignment to __init__'s\
    \ self will overwrite them:\n\n```\nclass Car(object):\n    def __new__(cls, make,\
    \ wheels):\n        cls.make = make\n        cls.wheels = wheels\n        return\
    \ object.__new__(cls)\n    def __init__(self, make, wheels):\n        self.make\
    \ = \"over\"\n        self.wheels = \"written\"\n        print(self.make, self.wheels)\n\
    ```\n\nThe following code will print \"over written\", not \"volvo 80\":\n\n```\n\
    volvo = Car(\"volvo\", 80) # Prints \"over written\"\n```\n\nYou can override\
    \ both *magic methods* or just one to your heart's content or depending on the\
    \ situation.\nJust keep in mind single `__init__` constructor is the most common\
    \ way to create objects in Python. In most cases you won't need to override `__new__`\
    \ at all.\n`__new__` and `__init__` methods are *magic methods*. They are executed\
    \ under the hood anyway but by explicitly defining them we can take control over\
    \ the method's body and return values in order to modify their behavior.\n\n##\
    \ Memory optimization with `__slots__`\n\nBy default Python uses dict to store\
    \ object instance's attributes. This can take a lot of RAM when dealing with thousands\
    \ or millions of objects.\nUsing `__slots__` method you can reduce RAM usage by\
    \ 40 to 50% in many cases.\n\n```\nclass SomeClass(object):\n    __slots__ = ['name',\
    \ 'identifier']\n    def __init__(self, name, identifier):\n        self.name\
    \ = name\n        self.identifier = identifier\n```\n\nTo make Python use slots\
    \ create a list of argument names matching those passed to class constructor and\
    \ assign it to `__slots__` attribute.\nThis should automatically reduce RAM usage,\
    \ especially in programs that use small classes and many instances of the same\
    \ object.\n\n## What’s Next?\n\nClasses are usually created to define object methods\
    \ that you can call on an instance of an object. Class constructors have access\
