    32 seconds, "1h" for 1 hour, "2d" for days or "3mo" for 3 months. Alternatively,
    in cases where interval is too long, simply display a date. For example it could
    be: Wed Nov 18 2020 or Jan 1 2021.

    In this section we will take a look at one way of creating this function.


    # Preparing the data


    Before writing the actual function let''s define some helper data sets.

    We know that a minute is 60 seconds, an hour is 3600 seconds and so on. Let''s
    create a table to store our intervals in one variable:'
