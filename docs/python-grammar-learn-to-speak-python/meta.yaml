    \ loop would add up or \"reduce\" their total values into a single value – the\
    \ sum of all items:\n\n```\nprices = [19.99, 34.99, 44.99]\ntotal = 0\n\nfor price\
    \ in prices:\n    total += price\n\nprint(\"total =\", total)\n\n>>>\ntotal =\
    \ 99.97\n```\n\nIn mathematics this specific type of operation is so common it\
    \ actually has a name – *reduction*. Reduction can be alternatively performed\
    \ by function `reduce()` from `functools` package as will be shown below.\n\n\
    But in order to make it work we need to create our own add() function because\
    \ its required as the first argument to reduce() function. Second argument is\
    \ our iterable list:\n\n```\nfunctools.reduce(function, iterable)\n```\n\n> **Higher-order\
    \ function.** A function that takes another function as an argument is called\
