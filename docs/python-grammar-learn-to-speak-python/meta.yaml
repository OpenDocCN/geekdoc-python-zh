  md: '# CHAPTER 6. DATA TYPES AND STRUCTURES


    When learning data types and structures three main concepts to watch out for are
    whether data structure is a *sequence* (same as enumerable), whether it supports
    *immutability* and whether it *allows duplicate values*.


    # Data Types and Data Structures


    Common data types include *boolean* (bool), *string* (str), *integer* (int), *complex
    number* (complex) and *decimal point numbers* (float). They can be interpreted
    as primitive values for using in statements such as: 1 + 2 and much more complex.


    Data structures list, dict (as in *dictionary*), set, frozenset and tuple are
    unique to Python. However, some of them resemble the same exact data structures
    from other languages that share similar functionality.


    # Difference between Data Types and Data Structures


    A data structure is an abstract way of organizing complex data in a way that allows
    certain operations to be efficiently performed on it: an array or list, for example.


    In computer science, Binary Tree can be thought of as a data structure . It consists
    of the abstract idea of nodes and possibly some methods for operating on them.


    The Binary Tree data structure can also contain several methods defined for working
    with it, for example, add_node() and remove_node().


    While there is no such thing as a built-in Binary Tree data structure in Python,
    you can create one yourself by using class keyword. Classes will be covered later.


    The Python''s built-in data structures that can be categorized as *sequences*
    are *string*, *list*, *tuple*, *bytearray* and *range objects*. A sequence is
    exactly what it sounds like. It''s an array-like set of values that follows some
    type of sequential (linear) order. Whereas dictionary, set and frozenset.


    A data type is more primitive. For example an integer or ''int'' is a data type
    that stores whole numbers. A string or ''str'' is a data type that contains text.
    One way of looking at data types is to think of them as units for storing values
    in category represented by that type.


    Numbers, strings, and booleans (True or False) can be thought of as primitive
    data types. Unlike data structures they usually don''t have (m)any methods attached
    to them because they represent basic form of a value which can be manipulated'
