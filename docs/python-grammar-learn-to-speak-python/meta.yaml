    \n# create slicing object\nknife = slice(5)\n\n# slice the number at knife\nprint(numbers[knife])\n\
    ```\n\n```\n>>>\n(1, 2, 3, 4, 5)\n```\n\nThe third argument *step* will \"step\"\
