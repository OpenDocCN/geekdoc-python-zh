    \    print(\"This is a car.\")\n```\n\nOf course, when self is involved it is\
    \ assumed that there will be a constructor:\n\n```\nclass Car:\n    def __init__(self,\
    \ make):\n        self.make = make\n    @classmethod\n    def describe(self):\n\
    \        print(\"The make of this car is \", self.make)\n```\n\nTechnically, non-static\
    \ class methods such as the one above are not intended to be called on class name\
    \ – Car. Non-static class methods are reserved for use on *instance* of an object.\n\
