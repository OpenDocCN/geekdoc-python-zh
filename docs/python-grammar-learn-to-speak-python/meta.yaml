    \ attributes() method\nattrs = webserver.attributes()\n\n# Print attributes\n\
    print(attrs)\n```\n\n以下是输出：\n\n```\n'os': 'Linux', 'distro': 'Ubuntu', 'ver':\
    \ '18', 'ram': '32Gb', 'cpu': 'Intel'\n```\n\n我们刚刚打印出了实例化对象的所有属性。\n在 Python 中，对象属性被称为*属性*。\n\
    \nPython 的内置函数 `vars` 可以与对象一起使用。它从传递给它的对象中检索属性列表。你不需要添加任何模块就可以开始使用它。\n\n当我们在 Server\
    \ 类的 `attributes` 方法体中将 `self` 对象传递给 `vars` 函数时，它将对象的属性打包成一个 JSON 对象，并使用函数的 `return`\
