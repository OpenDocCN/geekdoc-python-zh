    \ decorator to explicitly define it as static method.\n\n# 10.2 Static methods\n\
    \nA static method cannot and will be used only as a general purpose *utility*\
    \ function.\nStatic methods can be called directly from class name like Car.info()\
    \ but they can neither access nor modify class state.\nTo make static method definition\
    \ explicit, use @staticmethod keyword directly above the method's definition:\n\
    \n```\nclass Car:\n    @staticmethod\n    def describe():\n        print(\"This\
    \ is a car.\")\n```\n\n```\nCar.describe() # Prints: \"This is a car.\"\n```\n\
    \nThis class behaves in exactly the same way as previous example. But this is\
