    \ - file already exists\")\n```\n\nNot all files are in plain text format. For\
    \ example Photoshop files, PDF files, or video game 3D model data is stored in\
    \ binary format. In that case, when you need to read file's binary data you can\
    \ use \"b\" mode:\n\n```python\n# open file in binary mode with\nf = open(\"file.dat\"\
    , \"rb\")\n```\n\n> When opening a file with \"b\" you *must* also include one\
    \ of the four file modes (\"r\", \"w\" or \"a\") and at most one plus (\"+\").\
    \ Trying to open file with just the single character \"b\" will fail.\n\nTo open\
    \ file for *appending* data to its end:\n\n```python\nf = open(\"file.txt\", \"\
