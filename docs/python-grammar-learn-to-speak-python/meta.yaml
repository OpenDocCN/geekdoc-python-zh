  md: "# 10.0.3 Using __new__ and __init__ together\n\nIf both exist, __new__ method\
    \ executes first:\n\n```\nclass Car(object):\n    def __new__(cls, make, wheels):\n\
    \        cls.make = make\n        cls.wheels = wheels\n        return object.__new__(cls)\n\
    \    def __init__(self, make, wheels):\n        print(self.make, self.wheels)\n\
    ```\n\ncls becomes self (they both point to the same constructed object instance)\n\
    \nAttributes make and wheels were assigned in __new__ to cls object.\nThe object\
    \ returned from __new__ is passed on to self inside __init__ – they both point\
    \ to the same object instance. __init__ requires at least one self parameter.\
    \ Therefore __new__ *must* return an object – otherwise init is never called.\n\
    \n```\nvolvo = Car(\"volvo\", 10) # Prints \"volvo 10\"\n```\n\nWhen using __new__\
    \ and __init__ together, the same number of parameters *must* be specified in\
    \ both magic methods.\n\n# self overrides cls\n\nYou can assign properties to\
    \ cls object but assignment to __init__'s self will overwrite them:\n\n```\nclass\
    \ Car(object):\n    def __new__(cls, make, wheels):\n        cls.make = make\n\
    \        cls.wheels = wheels\n        return object.__new__(cls)\n```"
