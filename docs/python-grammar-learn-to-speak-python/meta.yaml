  md: '# # Chapter 1


    # ## Python Grammar


    # ### 1.1 Preface


    Every time a book is written it assumes some type of audience. This book, Python
    Grammar – *as the title suggests* – is about examining fundamentals of Python.
    It was written for someone new to Python language and learning it from scratch.


    To avoid being a rudimentary guideline similar to Python tutorials that can be
    found online for free, some of the chapters will be augmented by providing slightly
    more complex examples. This is especially useful for those learners who seek *practical
    examples* or simply want to be challenged while still learning.


    Python is a tool for problem solvers who appreciate writing clean, elegant code.
    It offers a vast array of simple language features. You might not need to know
    all of them – but learning them one at a time gets you closer to *Pythonic Thinking*.


    Python is a type of language that provides common functionality from many packages
    that come with it by default. Most packages are congruent with the original feature
    set and play well together with existing data types.


    Elegant code is not only code that looks clean, but the kind that also follows
    *logical aesthetic* – Python is perfect for writing logically elegant code without
    sacrificing performance – but only when its features are understood in context
    of their intended purpose. One goal of this book is to develop that awareness.


    There is a proper and an improper way of writing code in any computer language.'
  merge: -1
