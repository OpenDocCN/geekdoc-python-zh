  md: "# 10.2. STATIC METHODS\n\nTo create a custom class method use def keyword:\n\
    \n```\nclass Car:\n    def describe():\n        print(\"This is a car.\")\n```\n\
    \nInstance methods *can* behave as static methods.\n\n```\nCar.describe() # Prints:\
    \ \"This is a car.\"\n```\n\nBy default describe() *can be called* as a *static\
    \ method* – directly on Car class without having to instantiate an object.\nBut\
