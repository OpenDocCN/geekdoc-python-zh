  - "[PAGE 3]\n\n# Python Cheat Sheet - Classes\n\n“A puzzle a day to learn, code,\
    \ and play” → Visit [finxter.com](https://finxter.com)\n\n| | Description | Example\
    \ |\n|---|---|---|\n| **Classes** | A class encapsulates data and functionality\
    \ - data as attributes, and functionality as methods. It is a blueprint to create\
    \ concrete instances in the memory. | python\nclass Dog:\n    \"\"\" Blueprint\
    \ of a dog \"\"\"\n\n    # class variable shared by all instances\n    species\
    \ = [\"canis lupus\"]\n\n    def __init__(self, name, color):\n        self.name\
    \ = name\n        self.state = \"sleeping\"\n        self.color = color\n\n  \
    \  def command(self, x):\n        if x == self.name:\n            self.bark(2)\n\
    \        elif x == \"sit\":\n            self.state = \"sit\"\n        else:\n\
    \            self.state = \"wag tail\"\n\n    def bark(self, freq):\n        for\
    \ i in range(freq):\n            print(\"[\" + self.name\n                  +\
    \ \"]: Woof!\")\n\n\n![Diagram showing Class vs Instances](image_placeholder_1)\n\
    \npython\nbello = Dog(\"bello\", \"black\")\nalice = Dog(\"alice\", \"white\"\
    )\n\nprint(bello.color) # black\nprint(alice.color) # white\n\nbello.bark(1) #\
    \ [bello]: Woof!\n\nalice.command(\"sit\")\nprint(\"[alice]: \" + alice.state)\n\
    # [alice]: sit\n\nbello.command(\"no\")\nprint(\"[bello]: \" + bello.state)\n\
    # [bello]: wag tail\n\nalice.command(\"alice\")\n# [alice]: Woof!\n# [alice]:\
    \ Woof!\n\nbello.species += [\"wulf\"]\nprint(len(bello.species)\n      == len(alice.species))\
    \ # True (!)\n |\n| **Instance** | You are an instance of the class human. An\
    \ instance is a concrete implementation of a class: all attributes of an instance\
    \ have a fixed value. Your hair is blond, brown, or black - but never unspecified.\n\
    \nEach instance has its own attributes independent of other instances. Yet, class\
    \ variables are different. These are data values associated with the class, not\
    \ the instances. Hence, all instance share the same class variable **species**\
    \ in the example. | |\n| **Self** | The first argument when defining any method\
    \ is always the **self** argument. This argument specifies the instance on which\
    \ you call the method.\n\n**self** gives the Python interpreter the information\
    \ about the concrete instance. To *define* a method, you use **self** to modify\
    \ the instance attributes. But to *call* an instance method, you do not need to\
    \ specify **self**. | |\n| **Creation** | You can create classes “on the fly”\
    \ and use them as logical units to store complex data types.\n\npython\nclass\
    \ Employee():\n    pass\nemployee = Employee()\nemployee.salary = 122000\nemployee.firstname\
    \ = \"alice\"\nemployee.lastname = \"wonderland\"\n\nprint(employee.firstname\
    \ + \" \"\n      + employee.lastname + \" \"\n      + str(employee.salary) + \"\
    $\")\n# alice wonderland 122000$\n | |"
