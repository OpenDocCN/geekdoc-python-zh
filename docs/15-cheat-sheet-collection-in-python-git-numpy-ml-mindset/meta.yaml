  md: "# [Machine Learning Cheat Sheet] Support Vector Machines\n\nBased on Article:\
    \ https://blog.finxter.com/support-vector-machines-python/\n\n> Main idea: Maximize\
    \ width of separator zone → increases „margin of safety“ for classification\n\n\
    ![](img/3302642dac9e1022b8a65373dea5984a_11_0.png)\n\n# What are basic SVM properties?\n\
    \n| Support Vector Machines | |\n|---|---|\n| Alternatives: | SVM, support-vector\
    \ networks |\n| Learning: | Classification, Regression |\n| Advantages: | Robust\
    \ for high-dimensional space<br>Memory efficient (only uses support vectors)<br>Flexible\
    \ and customizable |\n| Disadvantages: | Danger of overfitting in high-dimensional\
    \ space<br>No classification probabilities like Decision trees |\n| Boundary:\
    \ | Linear and Non-linear |\n\n# What's the explanation of the code example?\n\
    \n**Explanation: A Study Recommendation System with SVM**\n\n+   - NumPy array\
    \ holds labeled training data (one row per user and one column per feature).\n\
    - Features: skill level in maths, language, and creativity.\n- Labels: last column\
    \ is recommended study field.\n- 3D data → SVM separates data using 2D planes\
    \ (the linear separator) rather than 1D lines.\n- One-liner:\n    1. Create model\
    \ using constructor of scikit-learn's svm.SVC class (SVC = support vector classification).\n\
    \    2. Call fit function to perform training based on labeled training data.\n\
    - Results: call predict function on new observations\n    - student_0 (skills\
    \ maths=3, language=3, and creativity=6) → SVM predicts \"art\"\n    - student_1\
    \ (maths=8, language=1, and creativity=1) → SVM predicts \"computer science\"\n\
    - Final output of one-liner:\n\n# What's the most basic Python code example?\n\
    \n```\n## Dependencies\nfrom sklearn import svm\nimport numpy as np\n\n## Data:\
    \ student scores in (math, language, creativity)\n## --> study field\nX = np.array([[9,\
    \ 5, 6, \"computer science\"],\n              [10, 1, 2, \"computer science\"\
    ],\n              [1, 8, 1, \"literature\"],\n              [4, 9, 3, \"literature\"\
    ],\n              [0, 1, 10, \"art\"],\n              [5, 7, 9, \"art\"]])\n\n\
    ## One-liner\nsvm = svm.SVC().fit(X[:,:-1], X[:,-1])\n\n## Result & puzzle\nstudent_0\
    \ = svm.predict([[3, 3, 6]])\nprint(student_0)\n\nstudent_1 = svm.predict([[8,\
    \ 1, 1]])\nprint(student_1)\n```\n\n```\n## Result & puzzle\nstudent_0 = svm.predict([[3,\
    \ 3, 6]])\nprint(student_0)\n# ['art']\n\nstudent_1 = svm.predict([[8, 1, 1]])\n\
    print(student_1)\n## ['computer science']\n```\n\nfinxter\n\n„A Puzzle A Day to\
    \ Learn, Code, and Play!“"
