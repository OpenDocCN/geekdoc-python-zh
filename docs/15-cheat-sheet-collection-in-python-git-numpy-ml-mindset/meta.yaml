    \    1. Create model using constructor of scikit-learn's svm.SVC class (SVC =\
    \ support vector classification).\n    2. Call fit function to perform training\
    \ based on labeled training data.\n- Results: call predict function on new observations\n\
    \    - student_0 (skills maths=3, language=3, and creativity=6) → SVM predicts\
