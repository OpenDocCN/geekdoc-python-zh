    \ The method is defined similarly to a function (using the keyword \"def\") in\
    \ the **class** definition. An object can have an arbitrary number of methods.\
    \ | |\n| **Self** | The first argument when defining any method is always the\
    \ `self` argument. This argument specifies the **instance** on which you call\
    \ the **method**. `self` gives the Python interpreter the information about the\
    \ concrete instance. To *define* a method, you use `self` to modify the instance\
    \ attributes. But to *call* an instance method, you do not need to specify `self`.\
    \ | |\n| **Encapsulation** | Binding together data and functionality that manipulates\
    \ the data. | ```python\nclass Cat:\n    # method overloading\n    def miau(self,\
    \ times=1):\n        print(\"miau \" * times)\n\n\nfifi = Cat()\n\nfifi.miau()\n\
