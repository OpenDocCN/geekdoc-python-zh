    # Python Cheat Sheet - Complex Data Types


    “A puzzle a day to learn, code, and play” → Visit [finxter.com](https://finxter.com)


    | | Description | Example |

    |---|---|---|

    | **List** | A container data type that stores a sequence of elements. Unlike
    strings, lists are mutable: modification possible. | `l = [1, 2, 2]`

    `print(len(l)) # 3` |

    | **Adding elements** | Add elements to a list with (i) append, (ii) insert, or
    (iii) list concatenation. The append operation is very fast. | `[1, 2, 2].append(4)
    # [1, 2, 2, 4]`

    `[1, 2, 4].insert(2,2) # [1, 2, 2, 4]`

    `[1, 2, 2] + [4] # [1, 2, 2, 4]` |

    | **Removal** | Removing an element can be slower. | `[1, 2, 2, 4].remove(1) #
    [2, 2, 4]` |

    | **Reversing** | This reverses the order of list elements. | `[1, 2, 3].reverse()
    # [3, 2, 1]` |

    | **Sorting** | Sorts a list. The computational complexity of sorting is O(n log
    n) for n list elements. | `[2, 4, 2].sort() # [2, 2, 4]` |

    | **Indexing** | Finds the first occurence of an element in the list & returns
    its index. Can be slow as the whole list is traversed. | `[2, 2, 4].index(2) #
    index of element 4 is "0"`

    `[2, 2, 4].index(2,1) # index of element 2 after pos 1 is "1"` |

    | **Stack** | Python lists can be used intuitively as stack via the two list operations
    append() and pop(). | `stack = [3]`

    `stack.append(42) # [3, 42]`

    `stack.pop() # 42 (stack: [3])`

    `stack.pop() # 3 (stack: [])` |

    | **Set** | A set is an unordered collection of elements. Each can exist only
    once. | `basket = {''apple'', ''eggs'', ''banana'', ''orange''}`

    `same = set([''apple'', ''eggs'', ''banana'', ''orange''])` |

    | **Dictionary** | The dictionary is a useful data structure for storing (key,
    value) pairs. | `calories = {''apple'' : 52, ''banana'' : 89, ''choco'' : 546}`
    |

    | **Reading and writing elements** | Read and write elements by specifying the
    key within the brackets. Use the keys() and values() functions to access all keys
    and values of the dictionary. | `print(calories[''apple''] < calories[''choco''])
    # True`

    `calories[''cappu''] = 74`

    `print(calories[''banana''] < calories[''cappu'']) # False`

    `print(''apple'' in calories.keys()) # True`

    `print(52 in calories.values()) # True` |

    | **Dictionary Looping** | You can loop over the (key, value) pairs of a dictionary
    with the items() method. | `for k, v in calories.items():`

    `    print(k) if v > 500 else None # ''chocolate''` |

    | **Membership operator** | Check with the ''in'' keyword whether the set, list,
    or dictionary contains an element. Set containment is faster than list containment.
    | `basket = {''apple'', ''eggs'', ''banana'', ''orange''}`

    `print(''eggs'' in basket) # True`

    `print(''mushroom'' in basket) # False` |

    | **List and Set Comprehension** | List comprehension is the concise Python way
    to create lists. Use brackets plus an expression, followed by a for clause. Close
    with zero or more for or if clauses. Set comprehension is similar to list comprehension.
    | `# List comprehension`

    `l = [(''Hi '' + x) for x in [''Alice'', ''Bob'', ''Pete'']]`

    `print(l) # [''Hi Alice'', ''Hi Bob'', ''Hi Pete'']`

    `l2 = [x * y for x in range(3) for y in range(3) if x>y]`

    `print(l2) # [0, 0, 2]`

    `# Set comprehension`

    `squares = { x**2 for x in [0,2,4] if x < 4 } # {0, 4}` |'
- md: "# Python Cheat Sheet - Classes\n\n“A puzzle a day to learn, code, and play”\
    \ → Visit [finxter.com](https://finxter.com)\n\n| | Description | Example |\n\
    |---|---|---|\n| **Classes** | A class encapsulates data and functionality - data\
    \ as attributes, and functionality as methods. It is a blueprint to create concrete\
    \ instances in the memory. | python\nclass Dog:\n    \"\"\" Blueprint of a dog\
    \ \"\"\"\n\n    # class variable shared by all instances\n    species = [\"canis\
    \ lupus\"]\n\n    def __init__(self, name, color):\n        self.name = name\n\
    \        self.state = \"sleeping\"\n        self.color = color\n\n    def command(self,\
    \ x):\n        if x == self.name:\n            self.bark(2)\n        elif x ==\
    \ \"sit\":\n            self.state = \"sit\"\n        else:\n            self.state\
    \ = \"wag tail\"\n\n    def bark(self, freq):\n        for i in range(freq):\n\
    \            print(\"[\" + self.name\n                  + \"]: Woof!\")\n\n\n\
    ![Diagram showing Class vs Instances](image_placeholder_1)\n\npython\nbello =\
    \ Dog(\"bello\", \"black\")\nalice = Dog(\"alice\", \"white\")\n\nprint(bello.color)\
    \ # black\nprint(alice.color) # white\n\nbello.bark(1) # [bello]: Woof!\n\nalice.command(\"\
    sit\")\nprint(\"[alice]: \" + alice.state)\n# [alice]: sit\n\nbello.command(\"\
    no\")\nprint(\"[bello]: \" + bello.state)\n# [bello]: wag tail\n\nalice.command(\"\
    alice\")\n# [alice]: Woof!\n# [alice]: Woof!\n\nbello.species += [\"wulf\"]\n\
    print(len(bello.species)\n      == len(alice.species)) # True (!)\n |\n| **Instance**\
    \ | You are an instance of the class human. An instance is a concrete implementation\
    \ of a class: all attributes of an instance have a fixed value. Your hair is blond,\
    \ brown, or black - but never unspecified.\n\nEach instance has its own attributes\
    \ independent of other instances. Yet, class variables are different. These are\
    \ data values associated with the class, not the instances. Hence, all instance\
    \ share the same class variable **species** in the example. | |\n| **Self** |\
    \ The first argument when defining any method is always the **self** argument.\
    \ This argument specifies the instance on which you call the method.\n\n**self**\
    \ gives the Python interpreter the information about the concrete instance. To\
    \ *define* a method, you use **self** to modify the instance attributes. But to\
    \ *call* an instance method, you do not need to specify **self**. | |\n| **Creation**\
    \ | You can create classes “on the fly” and use them as logical units to store\
    \ complex data types.\n\npython\nclass Employee():\n    pass\nemployee = Employee()\n\
    employee.salary = 122000\nemployee.firstname = \"alice\"\nemployee.lastname =\
    \ \"wonderland\"\n\nprint(employee.firstname + \" \"\n      + employee.lastname\
    \ + \" \"\n      + str(employee.salary) + \"$\")\n# alice wonderland 122000$\n\
    \ | |\n\n# Python Cheat Sheet - Functions and Tricks\n\n“A puzzle a day to learn,\
    \ code, and play” → Visit [finxter.com](https://finxter.com)\n\n| | Description\
    \ | Example | Result |\n|---|---|---|---|\n| **ADVANCED** | | | |\n| map(func,\
    \ iter) | Executes the function on all elements of the iterable | list(map(lambda\
    \ x: x[0], ['red', 'green', 'blue'])) | ['r', 'g', 'b'] |\n| map(func, i1, ...,\
    \ ik) | Executes the function on all k elements of the k iterables | list(map(lambda\
    \ x, y: str(x) + ' ' + y + 's' , [0, 2, 2], ['apple', 'orange', 'banana'])) |\
    \ ['0 apples', '2 oranges', '2 bananas'] |\n| string.join(iter) | Concatenates\
