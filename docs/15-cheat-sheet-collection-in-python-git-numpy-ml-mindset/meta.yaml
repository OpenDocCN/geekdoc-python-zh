    \ [0 1 2 3] |\n\n# Python 速查表：面向对象术语\n\n“每日一题，学习、编码、娱乐” → 访问 [finxter.com](https://finxter.com)\n\
    \n| 术语 | 描述 | 示例 |\n| :--- | :--- | :--- |\n| **类** | 创建**对象**的蓝图。它定义了对象的数据（**属性**）和功能（**方法**）。你可以通过点号表示法访问属性和方法。\
    \ | ```python\nclass Dog:\n    # 类属性\n    is_hairy = True\n\n    # 构造函数\n    def\
    \ __init__(self, name):\n        # 实例属性\n        self.name = name\n\n    # 方法\n\
    \    def bark(self):\n        print(\"Wuff\")\n\n\nbello = Dog(\"bello\")\nparis\
    \ = Dog(\"paris\")\n\nprint(bello.name)\n\"bello\"\n\nprint(paris.name)\n\"paris\"\
    \n``` |\n| **对象**（=实例） | Python 程序中根据**类**定义构建的、封装了数据和功能的一段代码。通常，一个对象对应现实世界中的一个事物。例如，根据类定义“Person”创建的对象“Obama”。一个对象由任意数量的**属性**和**方法****封装**在一个单元中。\
    \ | |\n| **实例化** | 创建**类**的**对象**的过程。这通过构造函数方法 `__init__(self, ...)` 完成。 | |\n\
    | **方法** | **对象**整体功能的一个子集。方法在**类**定义中类似于函数（使用关键字“def”）进行定义。一个对象可以有任意数量的方法。 |\
    \ |\n| **Self** | 定义任何方法时的第一个参数始终是 `self` 参数。此参数指定调用**方法**的**实例**。`self` 为 Python\
    \ 解释器提供有关具体实例的信息。要*定义*一个方法，你使用 `self` 来修改实例属性。但要*调用*实例方法，你不需要指定 `self`。 | |\n\
    | **封装** | 将数据和操作数据的功能绑定在一起。 | ```python\nclass Cat:\n    # 方法重载\n    def miau(self,\
    \ times=1):\n        print(\"miau \" * times)\n\n\nfifi = Cat()\n\nfifi.miau()\n\
    \"miau \"\n\nfifi.miau(5)\n\"miau miau miau miau miau \"\n\n# 动态属性\nfifi.likes\
    \ = \"mice\"\nprint(fifi.likes)\n\"mice\"\n``` |\n| **属性** | 为**类**（**类属性**）或**对象**（**实例属性**）定义的变量。你使用属性将数据打包到封闭单元（类或实例）中。\
    \ | |\n| **类属性** | （=类变量，静态变量，静态属性）在**类**定义中静态创建的变量，由所有类**对象**共享。 | |\n| **实例属性**（=实例变量）\
    \ | 仅属于单个实例的数据变量。其他实例不共享此变量（与**类属性**相反）。在大多数情况下，你在创建实例本身时在构造函数中使用 `self` 关键字（例如\
    \ `self.x = <val>`）创建实例属性 `x`。 | |\n| **动态属性** | 在程序执行期间动态定义的**实例属性**，未在任何**方法**中定义。例如，你可以通过调用\
    \ `o.neew = <val>` 简单地向任何**对象** `o` 添加一个新属性 `neew`。 | |\n| **方法重载** | 你可能希望以一种有多种调用选项的方式定义一个方法。例如，对于类\
    \ `X`，你定义一个**方法** `f(...)`，可以通过三种方式调用：`f(a)`、`f(a,b)` 或 `f(a,b,c)`。为此，你可以使用默认参数定义该方法（例如\
    \ `f(a, b=None, c=None)`）。 | |\n| **继承** | **类** A 可以从类 B 继承某些特性（如**属性**或**方法**）。例如，类“Dog”可以从类“Animal”继承属性“number_of_legs”。在这种情况下，你将定义继承类“Dog”如下：`\"\
    class Dog(Animal): ...\"` | ```python\n# 继承\nclass Persian_Cat(Cat):\n    classification\
    \ = \"Persian\"\n\nmimi = Persian_Cat()\nprint(mimi.miau(3))\n\"miau miau miau\
    \ \"\n\nprint(mimi.classification)\n``` |\n\n# [测试表] 帮助爱丽丝找到她的编程爸爸！\n\nfinxter\
