- md: "# Python Cheat Sheet: NumPy\n\n\"A puzzle a day to learn, code, and play\"\
    \ → Visit [finxter.com](https://finxter.com)\n\n| Name | Description | Example\
    \ |\n| :--- | :--- | :--- |\n| `a.shape` | The shape attribute of NumPy array\
    \ a keeps a tuple of integers. Each integer describes the number of elements of\
    \ the axis. | `a = np.array([[1,2],[1,1],[0,0]])`<br>`print(np.shape(a))`<br>#\
    \ (3, 2) |\n| `a.ndim` | The ndim attribute is equal to the length of the shape\
    \ tuple. | `print(np.ndim(a))`<br># 2 |\n| `*` | The asterisk (star) operator\
    \ performs the Hadamard product, i.e., multiplies two matrices with equal shape\
    \ element-wise. | `a = np.array([[2, 0], [0, 2]])`<br>`b = np.array([[1, 1], [1,\
    \ 1]])`<br>`print(a*b)`<br># [[2 0] [0 2]] |\n| `np.matmul(a,b)`, `a@b` | The\
    \ standard matrix multiplication operator. Equivalent to the @ operator. | `print(np.matmul(a,b))`<br>#\
    \ [[2 2] [2 2]] |\n| `np.arange([start, ]stop, [step, ])` | Creates a new 1D numpy\
    \ array with evenly spaced values | `print(np.arange(0,10,2))`<br># [0 2 4 6 8]\
    \ |\n| `np.linspace(start, stop, num=50)` | Creates a new 1D numpy array with\
    \ evenly spread elements within the given interval | `print(np.linspace(0,10,3))`<br>#\
    \ [ 0. 5. 10.] |\n| `np.average(a)` | Averages over all the values in the numpy\
    \ array | `a = np.array([[2, 0], [0, 2]])`<br>`print(np.average(a))`<br># 1.0\
    \ |\n| `<slice> = <val>` | Replace the `<slice>` as selected by the slicing operator\
    \ with the value `<val>`. | `a = np.array([0, 1, 0, 0, 0])`<br>`a[::2] = 2`<br>`print(a)`<br>#\
    \ [2 1 2 0 2] |\n| `np.var(a)` | Calculates the variance of a numpy array. | `a\
    \ = np.array([2, 6])`<br>`print(np.var(a))`<br># 4.0 |\n| `np.std(a)` | Calculates\
    \ the standard deviation of a numpy array | `print(np.std(a))`<br># 2.0 |\n| `np.diff(a)`\
    \ | Calculates the difference between subsequent values in NumPy array a | `fibs\
    \ = np.array([0, 1, 1, 2, 3, 5])`<br>`print(np.diff(fibs, n=1))`<br># [1 0 1 1\
    \ 2] |\n| `np.cumsum(a)` | Calculates the cumulative sum of the elements in NumPy\
    \ array a. | `print(np.cumsum(np.arange(5)))`<br># [ 0 1 3 6 10] |\n| `np.sort(a)`\
    \ | Creates a new NumPy array with the values from a (ascending). | `a = np.array([10,3,7,1,0])`<br>`print(np.sort(a))`<br>#\
    \ [ 0 1 3 7 10] |\n| `np.argsort(a)` | Returns the indices of a NumPy array so\
    \ that the indexed values would be sorted. | `a = np.array([10,3,7,1,0])`<br>`print(np.argsort(a))`<br>#\
    \ [4 3 1 2 0] |\n| `np.max(a)` | Returns the maximal value of NumPy array a. |\
    \ `a = np.array([10,3,7,1,0])`<br>`print(np.max(a))`<br># 10 |\n| `np.argmax(a)`\
    \ | Returns the index of the element with maximal value in the NumPy array a.\
    \ | `a = np.array([10,3,7,1,0])`<br>`print(np.argmax(a))`<br># 0 |\n| `np.nonzero(a)`\
