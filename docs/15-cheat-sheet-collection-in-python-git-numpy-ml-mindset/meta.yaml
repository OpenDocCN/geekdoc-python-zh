  md: '# # Python Cheat Sheet - Keywords


    “A puzzle a day to learn, code, and play” → Visit [finxter.com](https://finxter.com)


    | Keyword | Description | Code example |

    | :--- | :--- | :--- |

    | **False, True** | Data values from the data type Boolean | `False == (1 > 2)`,
    `True == (2 > 1)` |

    | **and, or, not** | Logical operators:<br>(x and y) → both x and y must be True<br>(x
    or y) → either x or y must be True<br>(not x) → x must be false | `x, y = True,
    False`<br>`(x or y) == True` # True<br>`(x and y) == False` # True<br>`(not y)
    == True` # True |

    | **break** | Ends loop prematurely | `while(True):`<br>`    break # no infinite
    loop`<br>`print("hello world")` |

    | **continue** | Finishes current loop iteration | `while(True):`<br>`    continue`<br>`print("43")
    # dead code` |

    | **class** | Defines a new class → a real-world concept<br>(object oriented programming)
    | `class Beer:`<br>`    def __init__(self):`<br>`        self.content = 1.0`<br>`    def
    drink(self):`<br>`        self.content = 0.0`<br><br>`becks = Beer() # constructor
    - create class`<br>`becks.drink() # beer empty: b.content == 0` |

    | **def** | Defines a new function or class method. For latter,<br>first parameter
    ("self") points to the class object.<br>When calling class method, first parameter
    is implicit. | |

    | **if, elif, else** | Conditional program execution: program starts with<br>"if"
    branch, tries the "elif" branches, and finishes with<br>"else" branch (until one
    branch evaluates to True). | `x = int(input("your value: "))`<br>`if x > 3: print("Big")`<br>`elif
    x == 3: print("Medium")`<br>`else: print("Small")` |

    | **for, while** | # For loop declaration<br>`for i in [0,1,2]:`<br>`    print(i)`
    | # While loop - same semantics<br>`j = 0`<br>`while j < 3:`<br>`    print(j)`<br>`    j
    = j + 1` |

    | **in** | Checks whether element is in sequence | `42 in [2, 39, 42] # True`
    |

    | **is** | Checks whether both elements point to the same<br>object | `y = x =
    3`<br>`x is y # True`<br>`[3] is [3] # False` |

    | **None** | Empty value constant | `def f():`<br>`    x = 2`<br>`f() is None
    # True` |

    | **lambda** | Function with no name (anonymous function) | `(lambda x: x + 3)(3)
    # returns 6` |

    | **return** | Terminates execution of the function and passes the<br>flow of
    execution to the caller. An optional value after<br>the return keyword specifies
    the function result. | `def incrementor(x):`<br>`    return x + 1`<br>`incrementor(4)
    # returns 5` |


