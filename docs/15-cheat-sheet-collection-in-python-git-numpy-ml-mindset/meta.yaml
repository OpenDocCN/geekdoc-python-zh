  mdcn: '## finxter 书籍：简约——创造软件的精妙艺术


    复杂性


    > “一个由部分组成的整体——难以分析、理解或解释”。


    复杂性出现在

    - 项目生命周期

    - 代码开发

    - 算法理论

    - 流程

    - 社交网络

    - 学习与日常生活


    → 复杂性会降低生产力和专注力。它会消耗你宝贵的时间。保持简单！


    80/20 法则


    大多数结果源于少数原因。


    帕累托建议


    1.  确定你的成功指标。

    2.  明确你人生中的宏大目标。

    3.  寻找用更少资源实现相同目标的方法。

    4.  反思你自己的成功。

    5.  反思你自己的失败。

    6.  多阅读你所在行业的书籍。

    7.  将大部分时间用于改进和调整现有产品。

    8.  微笑。

    9.  不做降低价值的事情。


    最大化成功指标：

    #编写的代码行数


    最小可行产品（MVP）


    软件意义上的最小可行产品是指剥离了所有功能，专注于核心功能的代码。


    如何进行 MVP？


    - 提出假设

    - 省略不必要的功能

    - 进行拆分测试以验证每个新功能

    - 专注于产品市场契合度

    - 寻求高价值、低成本的功能


    整洁代码原则


    1.  你不会需要它

    2.  最小惊讶原则

    3.  不要重复自己

    4.  为人类而非机器编写代码

    5.  站在巨人的肩膀上

    6.  使用恰当的名称

    7.  单一职责原则

    8.  使用注释

    9.  避免不必要的注释

    10. 保持一致性

    11. 测试

    12. 从大局思考

    13. 只与你的朋友交谈

    14. 重构

    15. 不要过度工程化

    16. 不要过度使用缩进

    17. 小即是美

    18. 使用度量指标

    19. 童子军规则：离开营地时比你来时更干净


    Unix 哲学


    1.  简单胜于复杂

    2.  小即是美（再次强调）

    3.  让每个程序做好一件事

    4.  先构建原型

    5.  可移植性优于效率

    6.  将数据存储在纯文本文件中

    7.  利用软件杠杆

    8.  避免强制用户界面

    9.  程序 = 过滤器

    10. 更坏即是更好

    11. 整洁 > 聪明的代码

    12. 设计相互连接的程序

    13. 使你的代码健壮

    14. 修复你能修复的——但要尽早且大声地失败

    15. 编写用于编写程序的程序


    过早优化


    > “程序员浪费大量时间思考他们程序中非关键部分的运行速度。我们应该忘记小的效率提升，大约 97% 的时间都应如此：过早优化是万恶之源。” —— 唐纳德·克努特


    性能调优入门


    1.  先测量，再改进

    2.  专注于慢的 20%

    3.  算法优化是王道

    4.  缓存至上

    5.  解决更简单的问题版本

    6.  知道何时停止


    心流


    > “……人类巅峰表现的源代码” – Kotler


    程序员的心流技巧


    1.  始终从事一个明确的实际代码项目

    2.  从事能实现你目标的有趣项目

    3.  发挥你的优势

    4.  大块的编码时间

    5.  减少干扰：智能手机 + 社交媒体

    6.  多睡觉，健康饮食，阅读优质书籍，锻炼身体 → 垃圾进，垃圾出！


    如何达到心流？（1）明确的目标，（2）即时反馈，以及（3）机会与能力的平衡。


    设计中的少即是多


    如何简化设计？


    1.  使用留白

    2.  移除设计元素

    3.  移除功能

    4.  减少字体、字体类型、颜色的变化

    5.  在所有界面中保持一致


    专注


    你可以获取原始资源，并通过专注于实现更大计划的努力，将其从高熵状态转变为低熵状态。


    高效软件创建的三步法


    1.  规划你的代码

    2.  集中精力将其变为现实。

    3.  寻求反馈


