    \ No offense, Java! | a, b = 'Jane', 'Alice'<br>a, b = b, a | a = 'Alice'<br>b\
    \ = 'Jane' |\n| Unpacking arguments | Use a sequence as function arguments via\
    \ asterisk operator *. Use a dictionary (key, value) via double asterisk operator\
