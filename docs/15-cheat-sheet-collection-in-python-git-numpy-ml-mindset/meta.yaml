    \ = { x**2 for x in [0,2,4]`<br>`           if x < 4 } # {0, 4}` |"
  mdcn: "## 简易 Git 速查表 – 实用图解指南\n\n### 集中式 Git 工作流\n\n-   每位开发者都拥有项目的独立副本\n-   工作流相互独立\n\
    -   无需高级的分支与合并操作\n\n![](img/3302642dac9e1022b8a65373dea5984a_10_0.png)\n\n####\
    \ Git 主分支\n\n##### 远程仓库：主分支\n\n![](img/3302642dac9e1022b8a65373dea5984a_10_1.png)\n\
    \n###### Alice\n\n![](img/3302642dac9e1022b8a65373dea5984a_10_2.png)\n\n######\
    \ Bob\n\n```bash\ngit init\n```\n\n创建新仓库\n\n```bash\ngit clone alice@host:/path/repos\n\
    ```\n\n克隆仓库\n\n```bash\ngit add main.py\n```\n\n将文件 „main.py“ 添加到项目\n\n```bash\n\
    git clone bob@host:/path/repos\n```\n\n```bash\ngit commit -m \"new file\"\n```\n\
    \n提交更改，并向主分支添加消息 „new file“\n\n```bash\ngit push origin master\n```\n\n将主分支发送到远程仓库\n\
    \n```bash\ngit pull\n```\n\n使用主分支更新本地仓库\n\n```bash\ngit add *\n```\n\n将所有更改添加到主分支\n\
    \n```bash\ngit rm main.py\n```\n\n从主分支移除文件 „main.py“\n\n```bash\ngit commit -m\
    \ \"add 2, rem 1\"\n```\n\n提交更改，并向主分支添加消息\n\n```bash\ngit push origin master\n\
    ```\n\n将主分支发送到远程仓库\n\n![](img/3302642dac9e1022b8a65373dea5984a_10_3.png)\n\n„每日一题，学习、编码、玩乐！“\n\
    \n## [机器学习速查表] 支持向量机\n\n基于文章：https://blog.finxter.com/support-vector-machines-python/\n\
    \n> 核心思想：最大化分隔区域的宽度 → 增加分类的 „安全边际“\n\n![](img/3302642dac9e1022b8a65373dea5984a_11_0.png)\n\
    \n### 支持向量机的基本属性是什么？\n\n| 支持向量机 | |\n|---|---|\n| 别名： | SVM，支持向量网络 |\n| 学习类型：\
    \ | 分类，回归 |\n| 优点： | 对高维空间具有鲁棒性<br>内存效率高（仅使用支持向量）<br>灵活且可定制 |\n| 缺点： | 在高维空间中有过拟合的风险<br>无法像决策树那样提供分类概率\
    \ |\n| 边界： | 线性与非线性 |\n\n### 代码示例的解释是什么？\n\n**解释：基于 SVM 的学习推荐系统**\n\n-   NumPy\
    \ 数组存储带标签的训练数据（每行代表一个用户，每列代表一个特征）。\n-   特征：数学、语言和创造力的技能水平。\n-   标签：最后一列是推荐的学习领域。\n\
    -   三维数据 → SVM 使用二维平面（线性分隔器）而非一维直线来分离数据。\n-   单行代码：\n    1.  使用 scikit-learn 的\
    \ svm.SVC 类的构造函数创建模型（SVC = 支持向量分类）。\n    2.  调用 fit 函数，基于带标签的训练数据执行训练。\n-   结果：对新观测值调用\
    \ predict 函数\n    -   student_0（技能：数学=3，语言=3，创造力=6）→ SVM 预测为 „艺术“\n    -   student_1（数学=8，语言=1，创造力=1）→\
    \ SVM 预测为 „计算机科学“\n-   单行代码的最终输出：\n\n### 最基本的 Python 代码示例是什么？\n\n```python\n##\
    \ 依赖项\nfrom sklearn import svm\nimport numpy as np\n\n## 数据：学生在（数学、语言、创造力）上的分数\n\
    ## --> 学习领域\nX = np.array([[9, 5, 6, \"computer science\"],\n              [10,\
    \ 1, 2, \"computer science\"],\n              [1, 8, 1, \"literature\"],\n   \
    \           [4, 9, 3, \"literature\"],\n              [0, 1, 10, \"art\"],\n \
    \             [5, 7, 9, \"art\"]])\n\n## 单行代码\nsvm = svm.SVC().fit(X[:,:-1], X[:,-1])\n\
    \n## 结果与谜题\nstudent_0 = svm.predict([[3, 3, 6]])\nprint(student_0)\n\nstudent_1\
    \ = svm.predict([[8, 1, 1]])\nprint(student_1)\n```\n\n```python\n## 结果与谜题\nstudent_0\
    \ = svm.predict([[3, 3, 6]])\nprint(student_0)\n# ['art']\n\nstudent_1 = svm.predict([[8,\
