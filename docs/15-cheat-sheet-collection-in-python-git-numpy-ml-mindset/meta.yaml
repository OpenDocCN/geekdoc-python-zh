- md: "# Python Cheat Sheet - Keywords\n\n\"A puzzle a day to learn, code, and play\"\
    \ → Visit [finxter.com](https://finxter.com)\n\n| Keyword | Description | Code\
    \ example |\n| :--- | :--- | :--- |\n| **False, True** | Data values from the\
    \ data type Boolean | `False == (1 > 2)`, `True == (2 > 1)` |\n| **and, or, not**\
    \ | Logical operators:<br>(x and y) → both x and y must be True<br>(x or y) →\
    \ either x or y must be True<br>(not x) → x must be false | `x, y = True, False`<br>`(x\
    \ or y) == True` # True<br>`(x and y) == False` # True<br>`(not y) == True` #\
    \ True |\n| **break** | Ends loop prematurely | `while(True):`<br>`    break #\
    \ no infinite loop`<br>`print(\"hello world\")` |\n| **continue** | Finishes current\
    \ loop iteration | `while(True):`<br>`    continue`<br>`print(\"43\") # dead code`\
    \ |\n| **class** | Defines a new class → a real-world concept<br>(object oriented\
    \ programming) | `class Beer:`<br>`    def __init__(self):`<br>`        self.content\
    \ = 1.0`<br>`    def drink(self):`<br>`        self.content = 0.0`<br><br>`becks\
    \ = Beer() # constructor - create class`<br>`becks.drink() # beer empty: b.content\
    \ == 0` |\n| **def** | Defines a new function or class method. For latter,<br>first\
    \ parameter (\"self\") points to the class object.<br>When calling class method,\
    \ first parameter is implicit. | |\n| **if, elif, else** | Conditional program\
    \ execution: program starts with<br>\"if\" branch, tries the \"elif\" branches,\
    \ and finishes with<br>\"else\" branch (until one branch evaluates to True). |\
    \ `x = int(input(\"your value: \"))`<br>`if x > 3: print(\"Big\")`<br>`elif x\
    \ == 3: print(\"Medium\")`<br>`else: print(\"Small\")` |\n| **for, while** | #\
    \ For loop declaration<br>`for i in [0,1,2]:`<br>`    print(i)` | # While loop\
    \ - same semantics<br>`j = 0`<br>`while j < 3:`<br>`    print(j)`<br>`    j =\
    \ j + 1` |\n| **in** | Checks whether element is in sequence | `42 in [2, 39,\
    \ 42] # True` |\n| **is** | Checks whether both elements point to the same<br>object\
    \ | `y = x = 3`<br>`x is y # True`<br>`[3] is [3] # False` |\n| **None** | Empty\
    \ value constant | `def f():`<br>`    x = 2`<br>`f() is None # True` |\n| **lambda**\
    \ | Function with no name (anonymous function) | `(lambda x: x + 3)(3) # returns\
    \ 6` |\n| **return** | Terminates execution of the function and passes the<br>flow\
    \ of execution to the caller. An optional value after<br>the return keyword specifies\
    \ the function result. | `def incrementor(x):`<br>`    return x + 1`<br>`incrementor(4)\
    \ # returns 5` |\n\n# Python Cheat Sheet - Basic Data Types\n\n\"A puzzle a day\
    \ to learn, code, and play\" → Visit [finxter.com](https://finxter.com)\n\n| |\
    \ Description | Example |\n|---|---|---|\n| **Boolean** | The Boolean data type\
    \ is a truth value, either True or False.<br><br>The Boolean operators ordered\
    \ by priority:<br>not x → “if x is False, then x, else y”<br>x and y → “if x is\
    \ False, then x, else y”<br>x or y → “if x is False, then y, else x”<br><br>These\
    \ comparison operators evaluate to True:<br>1 < 2 and 0 <= 1 and 3 > 2 and 2 >=2\
    \ and<br>1 == 1 and 1 != 0 # True | python\n## 1. Boolean Operations\nx, y = True,\
    \ False\nprint(x and not y) # True\nprint(not x and y or x) # True\n\n## 2. If\
    \ condition evaluates to False\nif None or 0 or 0.0 or '' or [] or {} or set():\n\
    \    # None, 0, 0.0, empty strings, or empty\n    # container types are evaluated\
    \ to False\n    print(\"Dead code\") # Not reached\n |\n| **Integer, Float** |\
    \ An integer is a positive or negative number without floating point (e.g. 3).\
    \ A float is a positive or negative number with floating point precision (e.g.\
    \ 3.14159265359).<br><br>The ‘//’ operator performs integer division. The result\
    \ is an integer value that is rounded towards the smaller integer number (e.g.\
    \ 3 // 2 == 1). | python\n## 3. Arithmetic Operations\nx, y = 3, 2\nprint(x +\
    \ y) # = 5\nprint(x - y) # = 1\nprint(x * y) # = 6\nprint(x / y) # = 1.5\nprint(x\
    \ // y) # = 1\nprint(x % y) # = 1\nprint(-x) # = -3\nprint(abs(-x)) # = 3\nprint(int(3.9))\
    \ # = 3\nprint(float(3)) # = 3.0\nprint(x ** y) # = 9\n |\n| **String** | Python\
    \ Strings are sequences of characters.<br><br>The four main ways to create strings\
    \ are the following.<br><br>1. Single quotes<br>'Yes'<br>2. Double quotes<br>\"\
    Yes\"<br>3. Triple quotes (multi-line)<br>\"\"\"Yes<br>We Can\"\"\"<br>4. String\
    \ method<br>str(5) == '5' # True<br>5. Concatenation<br>\"Ma\" + \"hatma\" # 'Mahatma'<br><br>These\
    \ are whitespace characters in strings.<br>• Newline \\n<br>• Space \\s<br>• Tab\
    \ \\t | python\n## 4. Indexing and Slicing\ns = \"The youngest pope was 11 years\
    \ old\"\nprint(s[0])       # 'T'\nprint(s[1:3])     # 'he'\nprint(s[-3:-1])  \
    \ # 'ol'\nprint(s[-3:])     # 'old'\nx = s.split()     # creates string array\
    \ of words\nprint(x[-3] + \" \" + x[-1] + \" \" + x[2] + \"s\")\n            \
    \      # '11 old popes'\n\n## 5. Most Important String Methods\ny = \"    This\
    \ is lazy\\t\\n   \"\nprint(y.strip()) # Remove Whitespace: 'This is lazy'\nprint(\"\
    DrDre\".lower()) # Lowercase: 'drdre'\nprint(\"attention\".upper()) # Uppercase:\
    \ 'ATTENTION'\nprint(\"smartphone\".startswith(\"smart\")) # True\nprint(\"smartphone\"\
    .endswith(\"phone\")) # True\nprint(\"another\".find(\"other\")) # Match index:\
    \ 2\nprint(\"cheat\".replace(\"ch\", \"m\")) # 'meat'\nprint(','.join([\"F\",\
    \ \"B\", \"I\"])) # 'F,B,I'\nprint(len(\"Rumpelstiltskin\")) # String length:\
    \ 15\nprint(\"ear\" in \"earth\") # Contains: True\n |\n\n# Python Cheat Sheet\
    \ - Complex Data Types\n\n\"A puzzle a day to learn, code, and play\" → Visit\
    \ [finxter.com](https://finxter.com)\n\n| | Description | Example |\n|---|---|---|\n\
    | **List** | A container data type that stores a sequence of elements. Unlike\
    \ strings, lists are mutable: modification possible. | `l = [1, 2, 2]`\n`print(len(l))\
    \ # 3` |\n| **Adding elements** | Add elements to a list with (i) append, (ii)\
    \ insert, or (iii) list concatenation. The append operation is very fast. | `[1,\
    \ 2, 2].append(4) # [1, 2, 2, 4]`\n`[1, 2, 4].insert(2,2) # [1, 2, 2, 4]`\n`[1,\
    \ 2, 2] + [4] # [1, 2, 2, 4]` |\n| **Removal** | Removing an element can be slower.\
    \ | `[1, 2, 2, 4].remove(1) # [2, 2, 4]` |\n| **Reversing** | This reverses the\
    \ order of list elements. | `[1, 2, 3].reverse() # [3, 2, 1]` |\n| **Sorting**\
    \ | Sorts a list. The computational complexity of sorting is O(n log n) for n\
    \ list elements. | `[2, 4, 2].sort() # [2, 2, 4]` |\n| **Indexing** | Finds the\
    \ first occurrence of an element in the list & returns its index. Can be slow\
    \ as the whole list is traversed. | `[2, 2, 4].index(2) # index of element 4 is\
    \ \"0\"`\n`[2, 2, 4].index(2,1) # index of element 2 after pos 1 is \"1\"` |\n\
    | **Stack** | Python lists can be used intuitively as stack via the two list operations\
    \ append() and pop(). | `stack = [3]`\n`stack.append(42) # [3, 42]`\n`stack.pop()\
    \ # 42 (stack: [3])`\n`stack.pop() # 3 (stack: [])` |\n| **Set** | A set is an\
    \ unordered collection of elements. Each can exist only once. | `basket = {'apple',\
    \ 'eggs', 'banana', 'orange'}`\n`same = set(['apple', 'eggs', 'banana', 'orange'])`\
    \ |\n| **Dictionary** | The dictionary is a useful data structure for storing\
    \ (key, value) pairs. | `calories = {'apple' : 52, 'banana' : 89, 'choco' : 546}`\
    \ |\n| **Reading and writing elements** | Read and write elements by specifying\
    \ the key within the brackets. Use the keys() and values() functions to access\
    \ all keys and values of the dictionary. | `print(calories['apple'] < calories['choco'])\
    \ # True`\n`calories['cappu'] = 74`\n`print(calories['banana'] < calories['cappu'])\
    \ # False`\n`print('apple' in calories.keys()) # True`\n`print(52 in calories.values())\
    \ # True` |\n| **Dictionary Looping** | You can loop over the (key, value) pairs\
    \ of a dictionary with the items() method. | `for k, v in calories.items():`\n\
    `    print(k) if v > 500 else None # 'chocolate'` |\n| **Membership operator**\
    \ | Check with the 'in' keyword whether the set, list, or dictionary contains\
    \ an element. Set containment is faster than list containment. | `basket = {'apple',\
    \ 'eggs', 'banana', 'orange'}`\n`print('eggs' in basket) # True`\n`print('mushroom'\
    \ in basket) # False` |\n| **List and Set Comprehension** | List comprehension\
    \ is the concise Python way to create lists. Use brackets plus an expression,\
    \ followed by a for clause. Close with zero or more for or if clauses. Set comprehension\
    \ is similar to list comprehension. | `# List comprehension`\n`l = [('Hi ' + x)\
    \ for x in ['Alice', 'Bob', 'Pete']]`\n`print(l) # ['Hi Alice', 'Hi Bob', 'Hi\
    \ Pete']`\n`l2 = [x * y for x in range(3) for y in range(3) if x>y]`\n`print(l2)\
    \ # [0, 0, 2]`\n`# Set comprehension`\n`squares = { x**2 for x in [0,2,4] if x\
    \ < 4 } # {0, 4}` |"
  mdcn: "# Python 速查表 - 关键字\n\n“每日一题，学习、编码、畅玩” → 访问 [finxter.com](https://finxter.com)\n\
    \n| 关键字 | 描述 | 代码示例 |\n| :--- | :--- | :--- |\n| **False, True** | 布尔数据类型的数据值\
    \ | `False == (1 > 2)`, `True == (2 > 1)` |\n| **and, or, not** | 逻辑运算符：<br>(x\
    \ and y) → x 和 y 都必须为 True<br>(x or y) → x 或 y 必须为 True<br>(not x) → x 必须为 False\
    \ | `x, y = True, False`<br>`(x or y) == True` # True<br>`(x and y) == False`\
    \ # True<br>`(not y) == True` # True |\n| **break** | 提前结束循环 | `while(True):`<br>`\
    \    break # 避免无限循环`<br>`print(\"hello world\")` |\n| **continue** | 结束当前循环迭代\
    \ | `while(True):`<br>`    continue`<br>`print(\"43\") # 死代码` |\n| **class** |\
    \ 定义一个新类 → 一个现实世界的概念<br>（面向对象编程） | `class Beer:`<br>`    def __init__(self):`<br>`\
    \        self.content = 1.0`<br>`    def drink(self):`<br>`        self.content\
    \ = 0.0`<br><br>`becks = Beer() # 构造函数 - 创建类`<br>`becks.drink() # 啤酒喝完：b.content\
    \ == 0` |\n| **def** | 定义一个新函数或类方法。对于后者，<br>第一个参数（“self”）指向类对象。<br>调用类方法时，第一个参数是隐式的。\
    \ | |\n| **if, elif, else** | 条件程序执行：程序从<br>“if”分支开始，尝试“elif”分支，最后以<br>“else”分支结束（直到某个分支求值为\
    \ True）。 | `x = int(input(\"your value: \"))`<br>`if x > 3: print(\"Big\")`<br>`elif\
    \ x == 3: print(\"Medium\")`<br>`else: print(\"Small\")` |\n| **for, while** |\
    \ # For 循环声明<br>`for i in [0,1,2]:`<br>`    print(i)` | # While 循环 - 语义相同<br>`j\
    \ = 0`<br>`while j < 3:`<br>`    print(j)`<br>`    j = j + 1` |\n| **in** | 检查元素是否在序列中\
    \ | `42 in [2, 39, 42] # True` |\n| **is** | 检查两个元素是否指向同一个<br>对象 | `y = x = 3`<br>`x\
    \ is y # True`<br>`[3] is [3] # False` |\n| **None** | 空值常量 | `def f():`<br>`\
    \    x = 2`<br>`f() is None # True` |\n| **lambda** | 无名函数（匿名函数） | `(lambda x:\
    \ x + 3)(3) # 返回 6` |\n| **return** | 终止函数的执行，并将<br>执行流程传递给调用者。return 关键字后的<br>可选值指定函数结果。\
    \ | `def incrementor(x):`<br>`    return x + 1`<br>`incrementor(4) # 返回 5` |\n\
    \n# Python 速查表 - 基本数据类型\n\n“每日一题，学习、编码、畅玩” → 访问 [finxter.com](https://finxter.com)\n\
    \n| | 描述 | 示例 |\n|---|---|---|\n| **布尔型** | 布尔数据类型是一个真值，要么是 True，要么是 False。<br><br>按优先级排序的布尔运算符：<br>not\
    \ x → “如果 x 为 False，则结果为 x，否则为 y”<br>x and y → “如果 x 为 False，则结果为 x，否则为 y”<br>x\
    \ or y → “如果 x 为 False，则结果为 y，否则为 x”<br><br>以下比较运算符求值为 True：<br>1 < 2 and 0 <=\
    \ 1 and 3 > 2 and 2 >=2 and<br>1 == 1 and 1 != 0 # True | python\n## 1. 布尔运算\n\
    x, y = True, False\nprint(x and not y) # True\nprint(not x and y or x) # True\n\
    \n## 2. 如果条件求值为 False\nif None or 0 or 0.0 or '' or [] or {} or set():\n    #\
    \ None, 0, 0.0, 空字符串或空\n    # 容器类型求值为 False\n    print(\"Dead code\") # 不会执行\n\
    \ |\n| **整数、浮点数** | 整数是没有浮点数的正数或负数（例如 3）。浮点数是具有浮点精度的正数或负数（例如 3.14159265359）。<br><br>‘//’\
    \ 运算符执行整数除法。结果是一个向较小整数方向舍入的整数值（例如 3 // 2 == 1）。 | python\n## 3. 算术运算\nx, y = 3,\
    \ 2\nprint(x + y) # = 5\nprint(x - y) # = 1\nprint(x * y) # = 6\nprint(x / y)\
    \ # = 1.5\nprint(x // y) # = 1\nprint(x % y) # = 1\nprint(-x) # = -3\nprint(abs(-x))\
    \ # = 3\nprint(int(3.9)) # = 3\nprint(float(3)) # = 3.0\nprint(x ** y) # = 9\n\
    \ |\n| **字符串** | Python 字符串是字符序列。<br><br>创建字符串的四种主要方式如下。<br><br>1. 单引号<br>'Yes'<br>2.\
    \ 双引号<br>\"Yes\"<br>3. 三引号（多行）<br>\"\"\"Yes<br>We Can\"\"\"<br>4. 字符串方法<br>str(5)\
    \ == '5' # True<br>5. 连接<br>\"Ma\" + \"hatma\" # 'Mahatma'<br><br>以下是字符串中的空白字符。<br>•\
    \ 换行符 \\n<br>• 空格 \\s<br>• 制表符 \\t | python\n## 4. 索引和切片\ns = \"The youngest pope\
    \ was 11 years old\"\nprint(s[0])       # 'T'\nprint(s[1:3])     # 'he'\nprint(s[-3:-1])\
    \   # 'ol'\nprint(s[-3:])     # 'old'\nx = s.split()     # 创建单词字符串数组\nprint(x[-3]\
    \ + \" \" + x[-1] + \" \" + x[2] + \"s\")\n                  # '11 old popes'\n\
    \n## 5. 最重要的字符串方法\ny = \"    This is lazy\\t\\n   \"\nprint(y.strip()) # 移除空白：'This\
    \ is lazy'\nprint(\"DrDre\".lower()) # 转为小写：'drdre'\nprint(\"attention\".upper())\
    \ # 转为大写：'ATTENTION'\nprint(\"smartphone\".startswith(\"smart\")) # True\nprint(\"\
    smartphone\".endswith(\"phone\")) # True\nprint(\"another\".find(\"other\")) #\
    \ 匹配索引：2\nprint(\"cheat\".replace(\"ch\", \"m\")) # 'meat'\nprint(','.join([\"\
    F\", \"B\", \"I\"])) # 'F,B,I'\nprint(len(\"Rumpelstiltskin\")) # 字符串长度：15\nprint(\"\
    ear\" in \"earth\") # 包含：True\n |\n\n# Python 速查表 - 复合数据类型\n\n“每日一题，学习、编码、畅玩”\
    \ → 访问 [finxter.com](https://finxter.com)\n\n| | 描述 | 示例 |\n|---|---|---|\n| **列表**\
    \ | 存储元素序列的容器数据类型。与字符串不同，列表是可变的：可以修改。 | `l = [1, 2, 2]`\n`print(len(l)) # 3` |\n\
    | **添加元素** | 使用 (i) append、(ii) insert 或 (iii) 列表连接向列表添加元素。append 操作非常快。 | `[1,\
    \ 2, 2].append(4) # [1, 2, 2, 4]`\n`[1, 2, 4].insert(2,2) # [1, 2, 2, 4]`\n`[1,\
    \ 2, 2] + [4] # [1, 2, 2, 4]` |\n| **移除** | 移除元素可能较慢。 | `[1, 2, 2, 4].remove(1)\
    \ # [2, 2, 4]` |\n| **反转** | 反转列表元素的顺序。 | `[1, 2, 3].reverse() # [3, 2, 1]` |\n\
    | **排序** | 对列表进行排序。对于 n 个列表元素，排序的计算复杂度为 O(n log n)。 | `[2, 4, 2].sort() # [2,\
    \ 2, 4]` |\n| **索引** | 查找列表中元素首次出现的位置并返回其索引。由于需要遍历整个列表，可能较慢。 | `[2, 2, 4].index(2)\
    \ # 元素 4 的索引是 \"0\"`\n`[2, 2, 4].index(2,1) # 位置 1 之后元素 2 的索引是 \"1\"` |\n| **栈**\
    \ | Python 列表可以通过 append() 和 pop() 两个列表操作直观地用作栈。 | `stack = [3]`\n`stack.append(42)\
    \ # [3, 42]`\n`stack.pop() # 42 (栈：[3])`\n`stack.pop() # 3 (栈：[])` |\n| **集合**\
    \ | 集合是元素的无序集合。每个元素只能存在一次。 | `basket = {'apple', 'eggs', 'banana', 'orange'}`\n\
    `same = set(['apple', 'eggs', 'banana', 'orange'])` |\n| **字典** | 字典是存储（键，值）对的有用数据结构。\
    \ | `calories = {'apple' : 52, 'banana' : 89, 'choco' : 546}` |\n| **读写元素** |\
    \ 通过在括号内指定键来读写元素。使用 keys() 和 values() 函数访问字典的所有键和值。 | `print(calories['apple']\
    \ < calories['choco']) # True`\n`calories['cappu'] = 74`\n`print(calories['banana']\
    \ < calories['cappu']) # False`\n`print('apple' in calories.keys()) # True`\n\
    `print(52 in calories.values()) # True` |\n| **字典循环** | 你可以使用 items() 方法遍历字典的（键，值）对。\
    \ | `for k, v in calories.items():`\n`    print(k) if v > 500 else None # 'chocolate'`\
    \ |\n| **成员运算符** | 使用 'in' 关键字检查集合、列表或字典是否包含某个元素。集合包含检查比列表包含检查更快。 | `basket =\
    \ {'apple', 'eggs', 'banana', 'orange'}`\n`print('eggs' in basket) # True`\n`print('mushroom'\
    \ in basket) # False` |\n| **列表和集合推导式** | 列表推导式是创建列表的简洁 Python 方式。使用方括号加一个表达式，后跟一个\
    \ for 子句。以零个或多个 for 或 if 子句结束。集合推导式类似于列表推导式。 | `# 列表推导式`\n`l = [('Hi ' + x) for\
    \ x in ['Alice', 'Bob', 'Pete']]`\n`print(l) # ['Hi Alice', 'Hi Bob', 'Hi Pete']`\n\
    `l2 = [x * y for x in range(3) for y in range(3) if x>y]`\n`print(l2) # [0, 0,\
    \ 2]`\n`# 集合推导式`\n`squares = { x**2 for x in [0,2,4] if x < 4 } # {0, 4}` |"
