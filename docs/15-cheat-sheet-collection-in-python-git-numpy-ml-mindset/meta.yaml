    Methods:<br>1. Single quotes<br>>>> ''Yes''<br>2. Double quotes<br>>>> "Yes"<br>3.
    Triple quotes (multi-line)<br>>>> """Yes<br>We Can"""<br>4. String method<br>>>>
    str(5) == ''5''<br>True<br>5. Concatenation<br>>>> ''Ma'' + ''hatma''<br>''Mahatma''<br><br>Whitespace
    chars:<br>Newline \n,<br>Space \s,<br>Tab \t | `## Indexing and Slicing`<br>`s
    = "The youngest pope was 11 years"`<br>`s[0] # ''T''`<br>`s[1:3] # ''he''`<br>`s[-3:-1]
    # ''ar''`<br>`s[-3:] # ''ars''`<br><br>`x = s.split()`<br>`x[-2] + " " + x[2]
    + "s" # ''11 popes''`<br><br>`## String Methods`<br>`y = "    Hello world!\n    "`<br>`y.strip()
    # Remove Whitespace`<br>`"Hi".lower() # Lowercase: ''hi''`<br>`"hi".upper() #
    Uppercase: ''HI''`<br>`"hello".startswith("he") # True`<br>`"hello".endswith("lo")
    # True`<br>`"hello".find("ll") # Match at 2`<br>`"cheat".replace("ch", "m") #
    ''meat''`<br>`''''.join(["F", "B", "I"]) # ''FBI''`<br>`len("hello world") # Length:
    15`<br>`"ear" in "earth" # True` |


    # Complex Data Structures


    | Type | Description | Example |

    | :--- | :--- | :--- |

    | List | Stores a sequence of elements. Unlike strings, you can modify list objects
    (they''re mutable). | `l = [1, 2, 2]`<br>`print(len(l)) # 3` |

    | Adding elements | Add elements to a list with (i) append, (ii) insert, or (iii)
    list concatenation. | `[1, 2].append(4) # [1, 2, 4]`<br>`[1, 4].insert(1,9) #
    [1, 9, 4]`<br>`[1, 2] + [4] # [1, 2, 4]` |

    | Removal | Slow for lists | `[1, 2, 2, 4].remove(1) # [2, 2, 4]` |

    | Reversing | Reverses list order | `[1, 2, 3].reverse() # [3, 2, 1]` |

    | Sorting | Sorts list using fast Timsort | `[2, 4, 2].sort() # [2, 2, 4]` |

    | Indexing | Finds the first occurrence of an element & returns index. Slow worst
    case for whole list traversal. | `[2, 2, 4].index(2)`<br>`# index of item 2 is
    0`<br>`[2, 2, 4].index(2,1)`<br>`# index of item 2 after pos 1 is 1` |

    | Stack | Use Python lists via the list operations append() and pop() | `stack
    = [3]`<br>`stack.append(42) # [3, 42]`<br>`stack.pop() # 42 (stack: [3])`<br>`stack.pop()
    # 3 (stack: [])` |

    | Set | An unordered collection of unique elements (at-most-once) → fast membership
    O(1) | `basket = {''apple'', ''eggs'',`<br>`          ''banana'', ''orange''}`<br>`same
    = set([''apple'', ''eggs'',`<br>`            ''banana'', ''orange''])` |


    | Type | Description | Example |

    | :--- | :--- | :--- |

    | Dictionary | Useful data structure for storing (key, value) pairs | `cal = {''apple''
    : 52, ''banana'' : 89,`<br>`        ''choco'' : 546} # calories` |

    | Reading and writing elements | Read and write elements by specifying the key
    within the brackets. Use the **keys()** and **values()** functions to access all
    keys and values of the dictionary | `print(cal[''apple''] < cal[''choco''])`<br>`#
    True`<br>`cal[''cappu''] = 74`<br>`print(cal[''banana''] < cal[''cappu''])`<br>`#
    False`<br>`print(''apple'' in cal.keys()) # True`<br>`print(52 in cal.values())
    # True` |

    | Dictionary Iteration | You can access the (key, value) pairs of a dictionary
    with the **items()** method. | `for k, v in cal.items():`<br>`    print(k if v
    > 500 else '''')`<br>`# ''choco''` |

    | Membership operator | Check with the **in** keyword if set, list, or dictionary
    contains an element. Set membership is faster than list membership | `basket =
    {''apple'', ''eggs'',`<br>`          ''banana'', ''orange''}`<br>`print(''eggs''
    in basket) # True`<br>`print(''mushroom'' in basket) # False` |

    | List & set comprehension | List comprehension is the concise Python way to create
    lists. Use brackets plus an expression, followed by a for clause. Close with zero
    or more if or for clauses. Set comprehension works similar to list comprehension.
    | `l = [''hi '' + x for x in [''Alice'',`<br>`     ''Bob'', ''Pete'']]`<br>`#
    [''Hi Alice'', ''Hi Bob'', ''Hi Pete'']`<br><br>`12 = [x * y for x in range(3)
    for y`<br>`     in range(3) if x>y] # [0, 0, 2]`<br><br>`squares = { x**2 for
    x in [0,2,4]`<br>`           if x < 4 } # {0, 4}` |'
- md: '## finxter Book: Simplicity – The Finer Art of Creating Software


    Complexity


    > “A whole, made up of parts—difficult to analyze, understand, or explain”.


    Complexity appears in

    - Project Lifecycle

    - Code Development

    - Algorithmic Theory

    - Processes

    - Social Networks

    - Learning & Your Daily Life


    → Complexity reduces productivity and focus. It’ll consume your precious time.
    Keep it simple!


    80/20 Principle


    Majority of effects come from the minority of causes.


    Pareto Tips


    1. Figure out your success metrics.

    2. Figure out your big goals in life.

    3. Look for ways to achieve the same things with fewer resources.

    4. Reflect on your own successes

    5. Reflect on your own failures

    6. Read more books in your industry.

    7. Spend much of your time improving and tweaking existing products

    8. Smile.

    9. Don’t do things that reduce value


    Maximize Success Metric:

    #lines of code written


    Minimum Viable Product (MVP)


    A minimum viable product in the software sense is code that is stripped from all
    features to focus on the core functionality.


    How to MVP?


    - Formulate hypothesis

    - Omit needless features

    - Split test to validate each new feature

    - Focus on product-market fit

    - Seek high-value and low-cost features


    Clean Code Principles


    1. You Ain’t Going to Need It

    2. The Principle of Least Surprise

    3. Don’t Repeat Yourself

    4. Code For People Not Machines

    5. Stand on the Shoulders of Giants

    6. Use the Right Names

    7. Single-Responsibility Principle

    8. Use Comments

    9. Avoid Unnecessary Comments

    10. Be Consistent

    11. Test

    12. Think in Big Pictures

    13. Only Talk to Your Friends

    14. Refactor

    15. Don’t Overengineer

    16. Don’t Overuse Indentation

    17. Small is Beautiful

    18. Use Metrics

    19. Boy Scout Rule: Leave Camp Cleaner Than You Found It


    Unix Philosophy


    1. Simple’s Better Than Complex

    2. Small is Beautiful (Again)

    3. Make Each Program Do One Thing Well

    4. Build a Prototype First

    5. Portability Over Efficiency

    6. Store Data in Flat Text Files

    7. Use Software Leverage

    8. Avoid Captive User Interfaces

    9. Program = Filter

    10. Worse is Better

    11. Clean > Clever Code

    12. Design Connected Programs

    13. Make Your Code Robust

    14. Repair What You Can — But Fail Early and Noisily

    15. Write Programs to Write Programs


    Premature Optimization


    > “Programmers waste enormous amounts of time thinking about [...] the speed of
    noncritical parts of their programs. We should forget about small efficiencies,
    say about 97 % of the time: premature optimization is the root of all evil.” —
    Donald Knuth


    Performance Tuning 101


    1. Measure, then improve

    2. Focus on the slow 20%

    3. Algorithmic optimization wins

    4. All hail to the cache

    5. Solve an easier problem version

    6. Know when to stop


    Flow


    > “... the source code of ultimate human performance” – Kotler


    Flow Tips for Coders


    1. Always work on an explicit practical code project

    2. Work on fun projects that fulfill your purpose

    3. Perform from your strengths

    4. Big chunks of coding time

    5. Reduce distractions: smartphone + social

    6. Sleep a lot, eat healthily, read quality books, and exercise → garbage in,
    garbage out!


    How to Achieve Flow? (1) clear goals, (2) immediate feedback, and (3) balance
    opportunity & capacity.


    Less Is More in Design


    How to Simplify Design?


    1. Use whitespace

    2. Remove design elements

    3. Remove features

    4. Reduce variation of fonts, font types, colors

    5. Be consistent across UIs


    Focus


    You can take raw resources and move them from a state of high entropy into a state
    of low entropy—using focused effort towards the attainment of a greater plan.


    3-Step Approach of Efficient Software Creation


    1. Plan your code

    2. Apply focused effort to make it real.

    3. Seek feedback


