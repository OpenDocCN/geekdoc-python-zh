    in l) # True` | Get missing number in [1...100] | `def get_missing_number(lst):`<br>`    return
    set(range(lst[len(lst)-1]+1)) - set(l)`<br>`l = list(range(1,100))`<br>`l.remove(50)`<br>`print(get_missing_number(l))
    # 50` |

    | Find duplicate number in integer list | `def find_duplicates(elements):`<br>`    duplicates,
    seen = set(), set()`<br>`    for element in elements:`<br>`        if element
    in seen:`<br>`            duplicates.add(element)`<br>`        seen.add(element)`<br>`    return
    list(duplicates)` | Compute the intersection of two lists | `def intersect(lst1,
    lst2):`<br>`    res, lst2_copy = [], lst2[:]`<br>`    for el in lst1:`<br>`        if
    el in lst2_copy:`<br>`            res.append(el)`<br>`            lst2_copy.remove(el)`<br>`    return
    res` |

    | Check if two strings are anagrams | `def is_anagram(s1, s2):`<br>`    return
    set(s1) == set(s2)`<br>`print(is_anagram("elvis", "lives")) # True` | Find max
    and min in unsorted list | `l = [4, 3, 6, 3, 4, 888, 1, -11, 22, 3]`<br>`print(max(l))
