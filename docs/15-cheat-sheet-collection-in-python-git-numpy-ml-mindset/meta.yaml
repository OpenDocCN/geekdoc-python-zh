    \ : 1, 'y' : 3}) | 13<br>13 |\n| Extended Unpacking | Use unpacking for multiple\
    \ assignment feature in Python | a, *b = [1, 2, 3, 4, 5] | a = 1<br>b = [2, 3,\
    \ 4, 5] |\n| Merge two dictionaries | Use unpacking to merge two dictionaries\
    \ into a single one | x={'Alice' : 18}<br>y={'Bob' : 27, 'Ann' : 22}<br>z = {**x,\
    \ **y} | z = {'Alice': 18, 'Bob': 27, 'Ann': 22} |\n\n![](img/3302642dac9e1022b8a65373dea5984a_4_0.png)\n\
    \n# Python Cheat Sheet: 14 Interview Questions\n\n“A puzzle a day to learn, code,\
