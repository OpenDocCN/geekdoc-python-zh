    You''ve learned that in Python, we can use either single or double quotation marks
    to delimit strings.


    ```

    >>> ''Hello World!''

    ''Hello World!''

    >>> "Hello World!"

    ''Hello World!''

    ```


    Both are syntactically valid, and Python does not differentiate between the two.


