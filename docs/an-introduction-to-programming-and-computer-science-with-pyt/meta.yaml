  md: "nature of a loop to be a little... circular. However, what we're checking in\
    \ the case of a while loop is whether or not we should execute the body. If the\
    \ condition is true, then we execute the body, then we loop back to the beginning\
    \ and check the condition again.\n\n# Termination of a while loop\n\nAt some point\
    \ (if we've designed our program correctly), the while condition becomes false.\
    \ For example, if the dealer were to draw an eight, then adding eight points would\
    \ bring the dealer's score to 17. At that point, the condition dealer < 17 would\
    \ evaluate to False (because 17 is not less than 17), and the loop terminates.\n\
    \n# After the loop\n\nOnce a while terminates, code execution continues with the\
    \ code which follows the loop.\n\n> It's important to understand that the while\
    \ condition is not evaluated again after the loop has terminated.\n\n# Review\
    \ of our blackjack loop\n\n```\ndealer = 9\n\nprompt = \"What's the value of the\
    \ next card drawn? \"\n\nwhile dealer < 17:\n    next_card = int(input(prompt))\n\
    \    dealer = dealer + next_card\n\nif dealer <= 21:\n    print(f\"Dealer has\
    \ {dealer} points!\")\nelse:\n    print(f\"Oh, dear. \"\n          f\"Dealer has\
    \ gone over with {dealer} points!\")\n```\n\nWhen we first reach this line of\
    \ code, the value of dealer is 9, so the condition is true. We enter the loop\
    \ and the body of the loop is executed.\n\n```\ndealer = 9\n\nprompt = \"What's\
    \ the value of the next card drawn? \"\n\nwhile dealer < 17:\n    next_card =\
    \ int(input(prompt))\n    dealer = dealer + next_card\n\nif dealer <= 21:\n  \
    \  print(f\"Dealer has {dealer} points!\")\nelse:\n    print(f\"Oh, dear. \"\n\
    \          f\"Dealer has gone over with {dealer} points!\")\n```\n\nHaving entered\
    \ the loop, the body is executed. The condition is not evaluated while the body\
    \ is being executed."
