- md: '## 2.2 Compilation and interpretation


    Generally speaking, *compilation* is a process whereby source code in some programming
    language is converted into binary code for execution on a particular architecture.
    The program which performs this conversion is called a *compiler*. The compiler
    takes source code (in some programming language) as an input, and yields binary
    machine code as an output.


    *Interpreted* languages work a little differently. Python is an interpreted language.
    In the case of Python, intermediate code is generated, and then this intermediate
    code is read and executed by another program. The intermediate code is called
    *bytecode*.


    While the difference between compilation and interpretation is not quite as clear-cut
    as suggested here, these descriptions will serve for the present purposes.


    ## The Python interpreter


    Python is an interpreted language with intermediate bytecode. While you don''t
    need to understand all the details of this process, it''s helpful to have a general
    idea of what''s going on.

    Say you have written this program and saved it as hello_world.py.


    ```

    print(''Hello World!'')

    ```


    You may run this program from the terminal (command prompt), thus:


    ```

    $ python hello_world.py

    ```


    where $ indicates a command prompt (your prompt may vary). When this runs, the
    following is printed to the console:


    ```

    Hello World!

    ```


    When we run this program, Python first reads the source code, then produces the
    intermediate bytecode, then executes each instruction in the bytecode.


    1. By issuing the command `python hello_world.py`, we invoke the Python interpreter
    and tell it to read and execute the program `hello_world.py` (.py is the file
    extension used for Python files).

    2. The Python interpreter reads the file `hello_world.py`.

    3. The Python interpreter produces an intermediate, bytecode representation of
    the program in `hello_world.py`.

    4. The bytecode is executed by the Python Virtual Machine.

    5. This results in the words “Hello World!” being printed to the console.


    So you see, there''s a lot going on behind the scenes when we run a Python program.²
    However, this allows us to write programs in a high-level language that we as
    humans can understand.


    ## Supplemental reading


    - *Whetting Your Appetite*, from The (Official) Python Tutorial.³


    ## 2.3 The Python shell


    The Python interpreter provides you with an environment for experimentation and
    observation—the *Python shell*, where we work in *interactive mode*. It''s a great
    way to get your feet wet.


    When working with the Python shell, you can enter *expressions* and Python will
    *read* them, *evaluate* them, and *print* the result. (There''s more you can do,
    but this is a start.)


    There are several ways to run the Python shell: in a terminal (command prompt)
    by typing `python`, `python3`, or `py` depending on the version(s) of Python installed
    on your machine. You can also run the Python shell through your chosen IDE (details
    will vary).


    The first thing you''ll notice is this symbol: `>>>`. This is the Python prompt
    (you don''t type this bit, this is Python telling you it''s ready for new input).


    We''ll start with some simple examples (open the shell on your computer and follow
    along):


    ```

    >>> 1

    1

    ```


    Here we''ve entered `1`. This is interpreted by Python as an integer, and Python
    responds by printing the *evaluation* of what you''ve just typed: `1`.


    When we enter numbers like this, we call them “integer literals”—in the example
    above, what we entered was *literally* a `1`. Literals are special in that *they
    evaluate to themselves*.


    Now let''s try a simple *expression* that''s not a mere literal:


    ```

    >>> 1 + 2

    3

    ```


    Python understands arithmetic and when the operands are numbers (integers or floating-point)
    then + works just like you''d expect. So here we have a simple *expression*—a
    syntactically valid sequence of symbols that evaluates to a *value*. What does
    this expression evaluate to? 3 of course!


    We refer to the + operator as a *binary infix operator*, since it takes two operands
    (hence, “binary”) and the operand is placed *between* the operands (hence, “infix”).


    Here''s another familiar binary infix operator: -. You already know what this
    does.


    ```

    >>> 17 - 5

    12

    ```


    Yup. Just as you''d expect. The Python shell evaluates the expression 17 - 5 and
    returns the result: 12.


    ## REPL


    This process—of entering an expression and having Python evaluate it and display
    the result—is called *REPL* which is an acronym for *read-evaluate-print loop*.
    Many languages have REPLs, and obviously, Python does too. REPLs were invented
    (back in the early 1960s) to provide an environment for *exploratory programming*.
    This is facilitated by allowing the programmer to see the result of each portion
    of code they enter. Accordingly, I encourage you to experiment with the Python
    shell. Do some tinkering and see the results. You can learn *a lot* by working
    this way.


    ## Saving your work


    Entering expressions into the Python shell *does not save anything*. In order
    to save your code, you''ll want to work outside the shell (we''ll see more on
    this soon).


    ## Exiting the interpreter


    If you''re using an IDE there''s no need to exit the shell. However, if you''re
    using a terminal, and you wish to return to your command prompt, you may exit
    the shell with `exit()`.


    ```

    >>> exit()

    ```


    ## 2.4 Hello, Python!


    It is customary—a nearly universal ritual, in fact—when learning a new programming
    language, to write a program that prints “Hello World!” to the console. This tradition
    goes back as at least as far as 1974, when Brian Kernighan included such a program
    in his tutorial for the C programming language at Bell Labs, perhaps earlier.


    So, in keeping with this fine tradition, our first program will do the same—print
    “Hello World!” to the console.


    Python provides us with simple means to print to the console: a function named
    `print()`. If we wish to print something to the console, we write `print()` and
    place what we wish to print within the parentheses.


    ```

    print("Hello World!")

    ```


    That''s it!


    If we want to run a program in script mode we must write it and save it. Let''s
    do that.


    In your editor or IDE open a new file, and enter this one line of code (above).
    Save the file as `hello_world.py`.


    Now you can run your program. If you''re using an IDE, you can run the file within
    your IDE. You can also run the file from the command line, *e.g.*,


    ```

    $ python hello_world.py

    ```


    where `$` is the command line prompt (this will vary from system to system). The
    `$` isn''t something you type, it''s just meant to indicate a command prompt (like
    `>>>` in the Python shell). When you run this program it should print:


    ```

    Hello World!

    ```


    ²Actually, there''s quite a bit more going on behind the scenes, but this should
    suffice for our purposes. If you''re curious and wish to learn more, ask!

    ³https://docs.python.org/release/3.10.4/tutorial/appetite.html'
  mdcn: '## 2.2 编译与解释


    一般来说，*编译*是将某种编程语言的源代码转换为可在特定架构上执行的二进制代码的过程。执行此转换的程序称为*编译器*。编译器以源代码（某种编程语言）作为输入，并生成二进制机器代码作为输出。


    *解释型*语言的工作方式略有不同。Python 就是一种解释型语言。在 Python 的情况下，会生成中间代码，然后由另一个程序读取并执行该中间代码。这种中间代码称为*字节码*。


    虽然编译和解释之间的区别并不像这里描述的那样泾渭分明，但这些描述对于当前的目的来说已经足够了。


    ## Python 解释器


    Python 是一种带有中间字节码的解释型语言。虽然你不需要理解这个过程的所有细节，但对正在发生的事情有一个大致的了解会很有帮助。

    假设你编写了这个程序并将其保存为 hello_world.py。


    ```

    print(''Hello World!'')

    ```


    你可以从终端（命令提示符）运行此程序，如下所示：


    ```

    $ python hello_world.py

    ```


    其中 $ 表示命令提示符（你的提示符可能有所不同）。当此程序运行时，以下内容将打印到控制台：


    ```

    Hello World!

    ```


    当我们运行这个程序时，Python 首先读取源代码，然后生成中间字节码，最后执行字节码中的每条指令。


    1.  通过发出命令 `python hello_world.py`，我们调用 Python 解释器并告诉它读取并执行程序 `hello_world.py`（.py
    是 Python 文件使用的文件扩展名）。

    2.  Python 解释器读取文件 `hello_world.py`。

    3.  Python 解释器生成 `hello_world.py` 中程序的中间字节码表示。

    4.  字节码由 Python 虚拟机执行。

    5.  这导致“Hello World!”被打印到控制台。


    所以你看，当我们运行一个 Python 程序时，幕后发生了很多事情。² 然而，这使我们能够用人类可以理解的高级语言编写程序。


    ## 补充阅读


    - *激发你的兴趣*，来自（官方）Python 教程。³


    ## 2.3 Python shell


    Python 解释器为你提供了一个用于实验和观察的环境——*Python shell*，我们在其中以*交互模式*工作。这是让你入门的好方法。


    使用 Python shell 时，你可以输入*表达式*，Python 会*读取*它们、*求值*它们并*打印*结果。（你还可以做更多事情，但这只是一个开始。）


    有几种方法可以运行 Python shell：在终端（命令提示符）中输入 `python`、`python3` 或 `py`，具体取决于你机器上安装的 Python
    版本。你也可以通过你选择的 IDE 运行 Python shell（细节会有所不同）。


    你首先注意到的是这个符号：`>>>`。这是 Python 提示符（你不需要输入这部分，这是 Python 在告诉你它已准备好接受新输入）。


    我们将从一些简单的例子开始（在你的计算机上打开 shell 并跟着操作）：


    ```

    >>> 1

    1

    ```


    这里我们输入了 `1`。Python 将其解释为一个整数，Python 通过打印你刚刚输入内容的*求值结果*来响应：`1`。


    当我们像这样输入数字时，我们称它们为“整数字面量”——在上面的例子中，我们输入的*字面上*就是一个 `1`。字面量的特殊之处在于*它们求值为自身*。


    现在让我们尝试一个不是简单字面量的简单*表达式*：


    ```

    >>> 1 + 2

    3

    ```


    Python 理解算术运算，当操作数是数字（整数或浮点数）时，+ 的工作方式正如你所预期的那样。所以这里我们有一个简单的*表达式*——一个语法上有效的符号序列，它求值为一个*值*。这个表达式求值为什么？当然是
    3！


    我们将 + 运算符称为*二元中缀运算符*，因为它接受两个操作数（因此称为“二元”），并且操作数放置在操作数*之间*（因此称为“中缀”）。


    这是另一个熟悉的二元中缀运算符：-。你已经知道它的作用了。


    ```

    >>> 17 - 5

    12

    ```


    是的。正如你所预期的那样。Python shell 对表达式 17 - 5 求值并返回结果：12。


    ## REPL


    这个过程——输入表达式并让 Python 对其求值并显示结果——称为 *REPL*，它是 *read-evaluate-print loop*（读取-求值-打印循环）的首字母缩写。许多语言都有
    REPL，显然，Python 也有。REPL 是在（早在 1960 年代初）为提供*探索性编程*环境而发明的。这通过允许程序员看到他们输入的每部分代码的结果来实现。因此，我鼓励你尝试使用
    Python shell。做一些小实验并查看结果。通过这种方式工作，你可以学到*很多*。


    ## 保存你的工作


    在 Python shell 中输入表达式*不会保存任何内容*。为了保存你的代码，你需要在 shell 之外工作（我们很快会看到更多相关内容）。


    ## 退出解释器


    如果你使用的是 IDE，则无需退出 shell。但是，如果你使用的是终端，并且希望返回到命令提示符，可以使用 `exit()` 退出 shell。


    ```

    >>> exit()

    ```


    ## 2.4 你好，Python！


    学习一门新的编程语言时，习惯上——事实上，这几乎是一个普遍的仪式——编写一个向控制台打印“Hello World!”的程序。这个传统至少可以追溯到 1974
    年，当时 Brian Kernighan 在他在贝尔实验室的 C 语言教程中包含了这样一个程序，也许更早。


    因此，为了遵循这个优良传统，我们的第一个程序也将做同样的事情——向控制台打印“Hello World!”。


    Python 为我们提供了向控制台打印的简单方法：一个名为 `print()` 的函数。如果我们希望向控制台打印某些内容，我们编写 `print()` 并将我们希望打印的内容放在括号内。


    ```

    print("Hello World!")

    ```


    就是这样！


    如果我们想在脚本模式下运行程序，我们必须编写并保存它。让我们这样做。


    在你的编辑器或 IDE 中打开一个新文件，并输入这一行代码（上面）。将文件保存为 `hello_world.py`。


    现在你可以运行你的程序了。如果你使用的是 IDE，你可以在 IDE 中运行该文件。你也可以从命令行运行该文件，*例如*，


    ```

    $ python hello_world.py

    ```


    其中 `$` 是命令行提示符（这会因系统而异）。`$` 不是你输入的内容，它只是用来表示命令提示符（就像 Python shell 中的 `>>>`）。当你运行这个程序时，它应该打印：


    ```

    Hello World!

    ```


    ²实际上，幕后发生的事情要多得多，但这应该足以满足我们的目的。如果你好奇并想了解更多，请提问！

    ³https://docs.python.org/release/3.10.4/tutorial/appetite.html'
