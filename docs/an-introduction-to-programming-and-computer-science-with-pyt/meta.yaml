  md: 'different ways to calculate the mean of a data set. Here we will present the
    *arithmetic mean* (average). The standard deviation is a measure of the amount
    of variation observed in a data set.

    We''ll also look briefly at *quantiles*, which provide a different perspective
    from which to view the spread or variation in a data set.


    # The arithmetic mean


    Usually, when speaking of the *average* of a set of data, without further qualification,
    we''re speaking of the arithmetic mean. You probably have some intuitive sense
    of what this means. The mean summarizes the data, boiling it down to a single
    value that''s somehow "in the middle."

    Here''s how we define and calculate the **arithmetic mean**, denoted $\mu$, given
    some set of values, $X$.


    $$\mu = \frac{1}{N} \sum_{i=0}^{N-1} x_i$$


    where we have a set of numeric values, $X$, indexed by $i$, with $N$ equal to
    the number of elements in $X$.

    Here''s an example: number of dentists per 10,000 population, by country, 2020.¹

    The first few records of this data set look like this:


    | Country | Value |

    |---|---|

    | Bangladesh | 0.69 |

    | Belgium | 11.33 |

    | Bhutan | 0.97 |

    | Brazil | 6.68 |

    | Brunei | 2.38 |

    | Cameroon | 0.049 |

    | Chad | 0.011 |

    | Chile | 14.81 |

    | Colombia | 8.26 |

    | Costa Rica | 10.58 |

    | Cyprus | 8.58 |

    | ... | ... |


    Assume we have these data saved in a CSV file named dentists_per_10k.csv. We can
    use Python''s csv module to read the data.


    > ¹Source: World Health Organization: https://www.who.int/data/gho/data/indicators/indicator-details/GHO/dentists-(per-10-000-population)
    (retrieved 2023-07-07)'
