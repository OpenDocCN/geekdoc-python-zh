  md: '# Floating-point numbers and IEEE 754


    Floating-point numbers are a little tricky. Stop and think for a minute: How would
    *you* represent floating-point numbers? (It’s not as straightforward as you might
    think.)


    Floating-point numbers are represented using the IEEE 754 standard (IEEE stands
    for “Institute of Electrical and Electronics Engineers”).<sup>10</sup> There are
    three parts to this representation: the sign, the exponent, and the fraction (also
    called the *mantissa* or *significand*)—and all of these must be expressed in
    binary. IEEE 754 uses either 32 or 64 bits for representing floating point numbers.
    The issue with representation lies in the fact that there’s a fixed number of
    bits available: one bit for the sign of a number, eight bits for the exponent,
    and the rest for the fractional portion. With a finite number of bits, there’s
    a finite number of values that can be represented without error.


    # Examples of representation error


    Now we have some idea of how integers and floating-point numbers are represented
    in a computer. Consider this: We have some fixed number of bits set aside for
    these representations.<sup>11</sup> So we have a limited number of bits we can
    use to represent numbers on a computer. Do you see the problem?


    The set of all integers, Z, is infinite. The set of all real numbers, ℝ, is infinite.
    Any computer we can manufacture is finite. Now do you see the problem?


    There exist infinitely more integers, and infinitely more real numbers, than we
    can represent in *any* system with a fixed number of bits. Let that soak in.


    For any given machine or finite representation scheme, there are *infinitely many
    numbers that cannot be represented in that system*! This means that many numbers
    are represented by an approximation only.


    Let’s return to the example of 1/3 in our decimal system. We can never write down
    enough digits to the right of the decimal point so that we have the exact value
    of 1/3.


    0.3333333333333333333333 ...


    No matter how far we extend this expansion, the value will only be an *approximation
    of 1/3*. However, the fact that its decimal expansion is non-terminating is determined
    by the choice of base (10).


    What if we were to represent this in base 3? In base 3, decimal 1/3 is 0.1. In
    base 3, it’s easy to represent!


    Of course our computers use binary, and so in that system (base 2) there are some
    numbers that can be represented accurately, and an infinite number that can only
    be approximated.


    Here’s the canonical example, in Python:


    <sup>10</sup>For more, see: https://en.wikipedia.org/wiki/IEEE_754

    <sup>11</sup>That’s not entirely true for integers in Python, but it’s reasonable
    to think of it this way for the purpose at hand.'
