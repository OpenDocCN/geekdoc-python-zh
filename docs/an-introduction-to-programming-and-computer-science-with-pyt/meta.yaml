    else:\n    print(f'I asked for a non-negative number, and '\n          f'{r} is\
    \ negative!')\n```\n\nThis is conventional and follows good coding style (e.g.,\
    \ PEP 8). You may have seen something like this:\n\n```\n\"\"\"\nA program which\
    \ prompts the user for a radius of a circle,\nr, and calculates and reports the\
    \ circumference.\n\"\"\"\n\nimport math\n\ndef circumference(r_):\n    return\
    \ 2 * math.pi * r_\n\ndef main():\n    r = float(input('Enter a non-negative real\
    \ number: '))\n    if r >= 0:\n        c = circumference(r)\n        print(f'The\
    \ circumference of a circle of radius '\n              f'{r:,.3f} is {c:,.3f}.')\n\
    \    else:\n        print(f'I asked for a non-negative number, and '\n       \
    \       f'{r} is negative!')\n\nmain()\n```\n\nWhile this is not syntactically\
    \ incorrect, it's not really the Python way either."
