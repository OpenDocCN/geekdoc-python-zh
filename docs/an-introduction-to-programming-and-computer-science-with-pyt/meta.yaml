    \ 子句包含一个条件，只有当用户的选择在所需范围内时才为真。因此，这个循环将无限期地执行，直到用户输入一个1到10之间的数字。\n\n就用户体验而言，这比如果用户不遵循指令就立即终止程序要友好得多。当收到无效输入时，我们的程序可以再次询问，而不是抱怨并退出。\n\
