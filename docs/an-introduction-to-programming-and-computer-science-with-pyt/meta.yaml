    # string


    A *string* is a sequence, an ordered collection of characters (or more precisely
    Unicode code points).


    # string interpolation


    *String interpolation* is the substitution of values into a string containing
    some form of placeholder. Python supports more than one form of string interpolation,
    but most examples given in this text make use of f-strings for string interpolation.
    There are some use cases which justify the use of earlier, so-called C-style string
    interpretation, but f-strings have been the preferred method for most other use
    cases since their introduction in 2002 with Python 3.6.


    # summation


    A *summation* (in mathematical notation, with $\sum$) is merely the addition of
    all terms in some collection (list, tuple, *etc.*). Sometimes, a summation is
    nothing more than adding a bunch of numbers. In such cases, Python''s built-in
    `sum()` suffices. In other cases, it is the result of some calculation which must
    be summed, say, for example, summing the squares of all numbers in some collection.
    In cases like this, we implement the summation in a loop.


    # syntax


    The *syntax* of a programming language is the collection of all rules which determine
    what is permitted as valid code. If your code contains syntax errors, a `SyntaxError`
    (or subclass thereof) is raised.


    # terminal


    Most modern operating systems provide a *terminal* (or more strictly speaking
    a terminal emulator) which provides a text-based command line interface for issuing
    commands.

    The details of how to open a terminal window will vary depending on your operating
    system.


    # top-level code environment


    The *top-level code environment* is where top-level code is executed. We specify
    the top-level code environment (perhaps unwittingly) when we run a Python program
    (either from the terminal or within an IDE). We distinguish the top-level environment
    from other modules which we may import as needed to run our code.

    See: entry point, and Chapter 9 Structure, development, and testing.'
