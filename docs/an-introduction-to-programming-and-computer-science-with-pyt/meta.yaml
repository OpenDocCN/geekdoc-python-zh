  md: "![](img/c79d476b9b167832781fbb4257bb2cb9_190_0.png)\n\nFigure 9.3: Edsger Dijkstra.\
    \ Source: University of Texas at Austin, under a Creative Commons license\n\n\
    Despite Dijkstra's remonstrances, the term stuck. So now we have “bugs.”\nBugs\
    \ are, of course, inevitable. What's important is how we strive to avoid them\
    \ and how we fix them when we find them.\n\n# 9.6 Using assertions to test your\
    \ code\n\nMany languages, Python included, allow for *assertions* or *assert statements*.\
    \ These are used to verify things you believe *should* be true about some condition\
    \ or result. By making an assertion, you're saying “I believe *x* to be true”,\
    \ whatever *x* might be. Assertions are a powerful tool for verifying that a function\
    \ or program actually does what you expect it to do.\nPython provides a keyword,\
    \ `assert` which can be used in *assert statements*. Here are some examples:\n\
    Let's say you have a function which takes a list of items for some purchase and\
    \ applies sales tax. Whatever the subtotal might be, we know that the sales tax\
    \ must be greater than or equal to zero. So we write an assertion:\n\n```\nsales_tax\
    \ = calc_sales_tax(items)\nassert sales_tax >= 0\n```\n\nIf `sales_tax` is ever\
    \ negative (which would be unexpected), this statement would raise an `AssertionError`,\
    \ informing you that something you believed to be true, was not, in fact, true.\
    \ This is roughly equivalent to\n\n```\nif sales_tax < 0:\n    raise AssertionError\n\
    ```\n\nbut is more concise and readable."
