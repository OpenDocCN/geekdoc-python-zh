    # Chapter 14


    # Data analysis and presentation


    What follows in this chapter is merely a tiny peek into the huge topic of data
    analysis and presentation. This is not intended to be a substitute for a course
    in statistics. There are plenty of good textbooks on the subject (and plenty of
    courses at any university), so what’s presented here is just a little something
    to get you started in Python.


    # Learning objectives


    +   - You will gain a rudimentary understanding of two important descriptive statistics:
    the mean and standard deviation.

    - You will understand how to calculate these statistics and be able to implement
    them on your own in Python.

    - You will learn the basics of Matplotlib’s Pyplot interface, and be able to use
    matplotlib.pyplot to create line, bar, and scatter plots.


    # Terms introduced


    +   - arithmetic mean

    - central tendency

    - descriptive statistics

    - Matplotlib

    - normal distribution

    - quantile (including quartile, quintile, percentile)

    - standard deviation


    # 14.1 Some elementary statistics


    Statistics is the science of data—gathering, analyzing, and interpreting data.


    Here we’ll touch on some elementary *descriptive statistics*, which involve describing
    a collection of data. It’s usually among the first things one learns within the
    field of statistics.


    The two most widely used descriptive statistics are the *mean* and the *standard
    deviation*. Given some collection of numeric data, the mean gives us a measure
    of the *central tendency* of the data. There are several'
