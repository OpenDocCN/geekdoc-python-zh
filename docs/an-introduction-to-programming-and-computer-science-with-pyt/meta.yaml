    # 10.8 Sequence unpacking


    Python provides us with an elegant syntax for unpacking the individual elements
    of a sequence as separate variables. We call this *unpacking*.


    ```

    >>> x, y = (3.945, 7.002)

    >>> x

    3.945

    >>> y

    7.002

    ```


    Here, each element in the tuple on the right-hand side is assigned to a matching
    variable on the left-hand side.


    ```

    >>> x = (2,)

    >>> x

    2

    >>> x, y, z = (''a'', ''b'', ''c'')

    >>> x

    ''a''

    >>> y

    ''b''

    >>> z

    ''c''

    ```


    This works with tuples of any size!


    ```

    a, b, c, d, e = (''Hello'', 5, [1, 2, 3], ''Chocolate'', 2022)

    ```


    However, the number of variables on the left-hand side must match the number of
    elements in the tuple on the right-hand side. If they don''t match, we get an
    error, either `ValueError: too many values to unpack` or `ValueError: not enough
    values to unpack`.


    Tuple unpacking is particularly useful by:


    +   - allowing for more concise and readable code by assigning multiple values
    to variables on a single line,

    - allowing for multiple values to be returned by a function,

    - making it easier to swap variable values (more on this shortly).


    # Can we unpack lists too?


    Yup. We can unpack lists the same way.


    ```

    x, y = [1, 2]

    ```


    But this isn''t used as much as tuple unpacking. Can you think why this may be
    so?


    The reason is that lists are dynamic, and we may not know at runtime how many
    elements we have to unpack. This scenario occurs less often'
