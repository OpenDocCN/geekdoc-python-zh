  md: '# 10.7 Finding an element within a sequence


    It should come as no surprise that if we have a sequence of objects, we often
    wish to see if an element is in the sequence (list, tuple, or string). Sometimes
    we also want to find the index of the element within a sequence. Python makes
    this relatively straightforward.


    # Checking to see if an element is in a sequence


    Say we have the following list:


    ```

    >>> fruits = [''kumquat'', ''papaya'', ''kiwi'', ''lemon'', ''lychee'']

    ```


    We can check to see if an element exists using the Python keyword in.


    ```

    >>> ''kiwi'' in fruits

    True

    >>> ''apple'' in fruits

    False

    ```


    We can use the evaluation of such expressions in conditions:


    ```

    >>> if ''apple'' in fruits:

    ...     print("Let''s bake a pie!")

    ... else:

    ...     print("Oops. No apples.")

    ...

    Oops. No apples.

    ```


    or


    ```

    >>> if ''kiwi'' in fruits:

    ...     print("Let''s bake kiwi tarts!")

    ... else:

    ...     print("Oops. No kiwis.")

    ...

    Let''s bake kiwi tarts!

    ```


    This works the same with numbers or with mixed-type lists.


    ```

    >>> some_primes = [2, 3, 5, 7, 11, 13, 17, 19, 23]

    >>> 5 in some_primes

    True

    >>> 4 in some_primes

    False

    ```


    or'
