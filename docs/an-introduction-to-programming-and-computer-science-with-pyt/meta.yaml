    # Restrictions on keys


    Keys in a dictionary must be *hashable*. In order for an object to be hashable,
    it must be immutable, or if it is an immutable container of other objects (e.g.,
    a tuple) then all the objects contained must also be immutable. Valid keys include
    objects of type int, float (OK, but a little strange), str, bool (also OK, but
    use cases are limited). Tuples can also serve as keys as long as they do not contain
    any mutable objects.


    ```

    >>> d = {0: ''Alexei Fyodorovich'', 1: ''Dmitri Fyodorovich'',

    ...      2: ''Ivan Fyodorovich'', 3: ''Fyodor Pavlovich'',

