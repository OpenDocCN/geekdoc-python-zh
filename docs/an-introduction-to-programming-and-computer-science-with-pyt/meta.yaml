  - '[PAGE 94]


    ```

    >>> print(''My hovercraft is full of eels!'')

    My hovercraft is full of eels!

    ```


    But does print() return a value? How would you find out? Can you think of a way
    you might check this?

    What do you think would happen here?


    ```

    >>> mystery = print(''Hello'')

    ```


    Let''s see:


    ```

    >>> mystery = print(''Hello'')

    Hello

    >>> print(mystery)

    None

    ```


    None is Python''s special way of saying “no value.” None is the default value
    returned by functions which don''t otherwise return a value. *All Python functions
    return a value, though in some cases that value is None.*<sup>6</sup> So print()
    returns the None.

    How do we return None (assuming that''s something we want to do)? By default,
    in the absence of any return statement, None will be returned implicitly.


    ```

    >>> def nothing():

    ...     pass  # `pass` means "don''t do anything"

    ...

    >>> type(nothing())

    <class ''NoneType''>

    ```


    Using the keyword return without any value will also return None.


    ```

    >>> def nothing():

    ...     return

    ...

    >>> type(nothing())

    <class ''NoneType''>

    ```


    Or, if you wish, you can explicitly return None.


    ```

    >>> def nothing():

    ...     return None

    ...

    >>> type(nothing())

    <class ''NoneType''>

    ```


    <sup>6</sup>If you''ve seen void in C++ or Java you have some prior experience
    with functions that don''t return anything. All Python functions return a value,
    even if that value is None.'
