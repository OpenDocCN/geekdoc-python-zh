    The modulo operator *partitions* the integers into *equivalence classes* based
    on their *residues* (remainders) with respect to some modulus. For example, with
    a modulus of three, the integers are partitioned into three equivalence classes:
    those for which $n \bmod 3 \equiv 0$, $n \bmod 3 \equiv 1$, and $n \bmod 3 \equiv
    2$.


    Write and test a function which takes as arguments an arbitrary list of integers
