    # 6.7 Comments in code


    Virtually all programming languages allow programmers to add *comments* to their
    code, and Python is no different. Comments are text within your code which is
    ignored by the Python interpreter.


    Comments have many uses:


    +   - explanations as to *why* a portion of code was written the way it was,

    - reminders to the programmer, and

    - guideposts for others who might read your code.


    Comments are an essential part of your code. In fact, it''s helpful to think of
    your comments as you do your code. By that, I mean that *the comments you supply
    should be of value to the reader*—even if that reader is *you*.


    Some folks say that code should explain *how*, and comments should explain *why*.
    This is not always the case, but it''s a very good rule in general. But beware:
    good comments cannot make up for opaque or poorly-written code.


    Python also has what are called *docstrings*. While these are not ignored by the
    Python interpreter, it''s OK for the purposes of this textbook to think of them
    that way.


    Docstrings are used for:


    +   - providing identifying information,

    - indicating the purpose and correct use of your code, and

    - providing detailed information about the inputs to and output from functions.


    That said, here are some forms and guidelines for comments and docstrings.


    # Inline and single-line comments


    The simplest comment is an *inline* or *single-line* comment. Python uses the
    # (call it what you will—pound sign, hash sign, number sign, or octothorpe) to
    start a comment. Everything following the # on the same line will be ignored by
    the Python interpreter. Here are some examples:


    ```

    # This is a single-line comment


    foo = ''bar''  # This is an inline comment

    ```


    # Docstrings


    *Docstring* is short for *documentation string*. These are somewhat different
    from comments. According to PEP 257


    > A *docstring* is a string literal that occurs as the first statement in a module,
    function, class, or method definition.'
