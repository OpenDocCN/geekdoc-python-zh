  - "[PAGE 250]\n\n# Using an iterable solely to keep count\n\n```\nfor _ in range(1_000_000):\n\
    \    print(\"I will not waste chalk\")\n```\n\nHere we're not using the data encoded\
    \ in the members of the iterable. Instead, we're just using it to keep count.\
    \ Accordingly, we've given the variable which holds the individual members returned\
    \ by the iterable the name _ _ is commonly used as a name for a variable that\
