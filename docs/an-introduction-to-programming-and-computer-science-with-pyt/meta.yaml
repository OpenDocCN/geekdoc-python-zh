    \            break\n        else:\n            print(\"Price must be greater than\
    \ $1.00!\")\n    return price\n```\n\n这是一个非纯函数，因为它有副作用，副作用是向用户显示的提示和响应。也就是说，我们可以观察到这个函数除了返回值之外的其他行为。它*确实*返回一个值，但也暴露了其他行为。\n\
    \n### 将副作用保持在最低限度\n\n始终，*始终*考虑你的函数有什么副作用，以及这些副作用是否正确且可取。\n\n作为一条规则，最好将副作用保持在*最低限度*（如果可能，完全消除它们）。但有时依赖副作用是合适的。只需确保，如果你依赖副作用，它是正确的并且是设计好的，而不是由于编程缺陷。也就是说，如果你编写一个带有副作用的函数，那应该是因为*你选择这样做*并且*你理解副作用可能如何改变或不改变你的程序状态*。这应该始终是一个有意识的选择，而不是无意的，否则你可能会在程序中引入错误。例如，如果你无意中修改了一个可变对象，你可能会以未预料到的方式改变程序的状态，你的程序可能会表现出意外和不良的行为。\n\
    \n我们将在第 10 章和第 16 章讨论可变数据类型如 `list` 和 `dict` 时再次讨论这个主题。\n\n### 理解检查\n\n1. 编写一个产生副作用但返回\
    \ `None` 的非纯函数。\n2. 编写一个执行简单计算并返回结果的纯函数。\n\n## 5.6 math 模块\n\n我们已经看到 Python 为我们提供了许多“开箱即用”的便利。其中包括*内置*函数，我们作为程序员可以在代码中轻松使用——并重用。例如，`print()`，还有很多其他函数。\n\
    \n我们还学习了如何在 Python 中定义常量。例如，牛顿引力常数：\n\n```python\nG = 6.67 * 10 ** -11  # N m^2\
    \ / kg^2\n```\n\n这里我们将学习一些关于 Python 的 `math` 模块的知识。Python 的 `math` 模块是一个常量和函数的集合，你可以在自己的程序中使用——这些非常非常方便。例如，为什么要在\
    \ Python 可以帮你做的情况下编写自己的函数来求一个数的主平方根呢？<sup>10</sup>\n\n与内置函数不同，为了使用 Python `math`\
    \ 模块提供的函数（和常量），我们必须首先*导入*该模块（或其部分）。<sup>11</sup> 你可以将此视为将你需要的功能导入到你的程序中。\n\nPython\
    \ 的 `math` 模块功能丰富。它提供了许多函数，包括\n\n| 函数 | 计算 |\n| :--- | :--- |\n| `sqrt(x)` | $\\\
    sqrt{x}$ |\n| `exp(x)` | $e^x$ |\n| `log(x)` | $\\ln x$ |\n| `log2(x)` | $\\log_2\
    \ x$ |\n| `sin(x)` | $\\sin x$ |\n| `cos(x)` | $\\cos x$ |\n\n以及许多其他函数。\n\n###\
    \ 使用 `math` 模块\n\n要导入一个模块，我们使用 `import` 关键字。导入语句应出现在代码开头的文档字符串之后，并且你只需要导入一次模块。如果导入成功，那么导入的模块就可用了。\n\
    \n```python\n>>> import math\n```\n\n现在怎么办？假设我们想使用 `math` 模块提供的 `sqrt()` 函数。我们如何访问它？\n\
    \n如果我们想访问 `math` 模块内的函数（或常量），我们使用 `.` 运算符。\n\n```python\n>>> import math\n>>>\
    \ math.sqrt(25)\n5.0\n```\n\n让我们解析一下。在 `math` 模块内，有一个名为 `sqrt()` 的函数。编写 `math.sqrt()`\
    \ 就是访问 `math` 模块内的 `sqrt()` 函数。这使用了 Python 中所谓的*点表示法*（许多其他语言也使用这种方式）。\n\n让我们尝试\
    \ `math` 模块中的另一个函数 `sin()`，它计算一个角的正弦值。你可能从预备微积分或三角学课程中记得 $\\sin 0 = 0$，$\\sin\
    \ \\frac{\\pi}{2} = 1$，$\\sin \\pi = 0$，$\\sin \\frac{3\\pi}{2} = -1$，以及 $\\sin\
    \ 2\\pi = 0$。让我们试试看。"
