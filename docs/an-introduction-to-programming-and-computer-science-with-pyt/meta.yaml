  md: "except block specifies the type of exception we wish to handle, and code for\
    \ handling the exception.\n\n# Input validation with try/except\n\nHere's an example\
    \ of input validation using try/except. Let's say we want a positive integer as\
    \ input. We've seen how to validate input in a while loop.\n\n```\nwhile True:\n\
    \    n = int(input(\"Please enter a positive integer: \"))\n    if n > 0:\n  \
    \      break\n```\n\nThis ensures that if the user enters an integer that's less\
    \ than one, that they'll be prompted again until they supply a positive integer.\
    \ But what happens if the naughty user enters something that cannot be converted\
    \ to an integer?\n\n```\nPlease enter a positive integer: cheese\nTraceback (most\
    \ recent call last):\n  File \"/.../code.py\", line 90, in runcode\n    exec(code,\
    \ self.locals)\n  File \"<input>\", line 2, in <module>\nValueError: invalid literal\
    \ for int() with base 10: 'cheese'\n```\n\nPython cannot convert 'cheese' to an\
    \ integer and thus a ValueError is raised.\n\nSo now what? We put the code that\
    \ could result in a ValueError in a try block, and then provide an exception handler\
    \ in an except block. Here's how we'd do it.\n\n```\nwhile True:\n    try:\n \
    \       user_input = input(\"Enter a positive integer: \")\n        n = int(user_input)\n\
    \        if n > 0:\n            break\n    except ValueError:\n        print(f'\"\
    {user_input}\" cannot be converted to an int!')\n```\n\n```\nprint(f'You have\
    \ entered {n}, a positive integer.')\n```"
