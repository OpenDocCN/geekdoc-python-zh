  - '[PAGE 351]


    Try/except can be considered another form of branching. See: Exception Handling
    (Chapter 15).


    # bug


    Simply put, a *bug* is a defect in our code. I hesitate to call syntax errors
    “bugs”. It’s best to restrict this term to semantic defects in our code (and perhaps
    unhandled exceptions which should be handled). In any event, when you find a bug,
    fix it!


    # bytecode


    *Bytecode* is an intermediate form, between source code (written by humans) and
    binary code (which is executed by your computer’s central processor unit (CPU)).
    Bytecode is a representation that’s intended to be efficiently executed by an
    interpreter. Python, being an interpreted language, produces an intermediate bytecode
    for execution on the Python virtual machine (PVM). Conversion of Python source
    code to intermediate bytecode is performed by the Python compiler.


    # call (see: invoke)


    When we wish to use a previously-defined function or method, we *call* the function
    or method, supplying whatever arguments are required, if any. When we call a function,
    flow of execution is temporarily passed to the function. The function does its
    work (whatever that might be), and then flow of control and a value are returned
    to the point at which the function was called. See: Chapter 5 Functions, for more
    details.


    ```

    print("Hello, World!")  # call the print() function

    x = math.sqrt(2)       # call the sqrt() function

    ```


    Note: *call* is synonymous with *invoke*.


    # camel case


    *Camel case* is a naming convention in which an identifier composed of multiple
    words has the first letter of each interior word capitalized. Sometimes stylized
    thus: camelCase. See: PEP 8 for appropriate usage.


    # central tendency


    In statistics, the arithmetic mean is one example of a measure of *central tendency*,
    measuring a “central” or (hopefully) “typical” value for a data set. Another aspect
    of central tendency is that values tend to cluster around some central value (*e.g.*,
    mean).


    # comma separated values (CSV)


    The *comma separated values* format (CSV) is a commonly used way to represent
    data that is organized into rows and columns. In this format,'
  - '[PAGE 352]


    commas are used to separate values in different columns. If commas appear within
    a value, say in the case of a text string, the value is delimited with quotation
    marks. Python provides a convenient module—the csv module for reading, parsing,
    and iterating rows in a CSV file.


    # command line interface (CLI)


    Command line interfaces (abbreviated CLI) are user interfaces where the user interacts
    with a program by typing commands or responding to prompts in text form, or viewing
    data and responses from the program in similar format. All the programs in this
    book make use of a command line interface.


    # comment


    Strictly speaking, comments are text appearing in source code which is not read
    or interpreted by the language, but instead, is solely for the benefit of human
    readers. Comments in Python are delimited by the octothorpe, #, a.k.a. hash sign,
    pound sign, etc. In Python, any text on a given line following this symbol is
    ignored by the interpreter.

    In general, it is good practice to leave comments which explain why something
    is as it is. Ideally, comments should not be necessary to explain how something
    is being done (as this should be evident from the code itself).


    # comparable


    Objects are comparable if they can be ordered or compared, that is, if the comparison
    operators—==, <=, >=, <, >, and != can be applied. If so, the operands on either
    side of the comparison operators are comparable. Instances of many types can be
    compared among themselves (any string is comparable to all other strings, any
    numeric is comparable to all other numerics), but some types cannot be compared
    with other objects of the same type. For example, we cannot compare objects of
    type range or function this way. In most cases, objects of different types are
    not comparable (with different numeric types as a notable exception). For example,
    we cannot compare strings and integers.


    # compiler


    A compiler is a program which converts source code into machine code, or, in the
    case of Python, to bytecode, which can then be run on the Python virtual machine.


    # concatenation


    Concatenation is a kind of joining together, not unlike coupling of railroad cars.
    Some types can be concatenated, others cannot. Strings and lists are two types
    which can be concatenated. If both operands are a string, or both operands are
    a list, then the + operator performs concatenation (rather than addition, if both
    operands were numeric).'
  - '[PAGE 353]


    Examples:


    ```

    >>> ''dog'' + ''food''

    ''dogfood''

    >>> [1, 2, 3] + [''a'', ''b'', ''c'']

    [1, 2, 3, ''a'', ''b'', ''c'']

    ```


    # condition


    *Conditions* are used to govern the behavior of while loops and if/elif/else statements.
    Loops or branches are executed when a condition is true—that is, it evaluates
    to True or has a truthy value. Note: Python supports *conditional expressions*,
    which are shorthand forms for if/else, but these are not presented in this text.


    # congruent


    In the context of modular arithmetic, we say two numbers are *congruent* if they
    have the same remainder with respect to some given modulus. For example, 5 is
    congruent to 19 modulo 2, because 5 % 2 leaves a remainder of 1 and 19 % 2 also
    leaves a remainder of 1. In mathematical notation, we indicate congruence with
    the ≡ symbol, and we can write this example as 5 ≡ 19 (mod 2). In Python, the
    expression 5 % 2 == 19 % 2 evaluates to True.


    # console


    *Console* refers either to the Python shell, or Python input/output when run in
    a terminal.


    # constructor


    A *constructor* is a special function which constructs and returns an object of
    a given type. Python provides a number of built-in constructors, *e.g.*, int(),
    float(), str(), list(), tuple(), *etc*. These are often used in Python to perform
    conversions between types. Examples:


    +   - list((''a'', ''b'', ''c'')) converts the tuple argument to a list: [''a'',
    ''b'', ''c''].

    - list(''apple'') converts the string argument to a list: [''a'', ''p'', ''p'',
    ''l'', ''e''].

    - int(42.1) converts the float argument to an integer, truncating the portion
    to the right of the decimal point: 42.

    - int(''2001'') converts the string argument to an integer: 2001.

    - float(''98.6'') converts the string argument to a float: 98.6.

    - tuple([2, 4, 6, 8]) converts the list argument to a tuple: (2, 4, 6, 8).


    Other constructors include range() and enumerate().'
  - '[PAGE 354]


    # context manager


    Context managers are created using the `with` keyword, and are commonly used when
    working with file I/O. Context managers take over some of the work of opening
    and closing a file, or ensuring that a file is closed at the end of a `with` block,
    regardless of what else might occur within that block. Without using a context
    manager, it''s up to the programmer to ensure that a file is closed. Accordingly,
    `with` is the preferred idiom whenever opening a file.


    Context managers have other uses, but these are outside the scope of this text.


    # cycle (within a graph)


    A *cycle* exists in a graph if there is more than one path of edges from one vertex
    to another. We refer to a graph containing a cycle or cycles as *cyclic*, and
    a graph without any cycles as *acyclic*.


    # delimiter


    A *delimiter* is a symbol or symbols used to set one thing apart from another.
    What delimiters are used, how they are used, and what they delimit depend on context.
    For example, single-line and inline comments in Python are delimited by the `#`
    symbol at the start and the newline character at the end. Strings can be delimited
    (beginning and end) with apostrophes, `''`, quotation marks, `"`, or triple quotation
    marks, `"""`. In a CSV file, columns are delimited by commas.


    # dictionary


    A *dictionary* is a mutable type which stores data in key/value pairs, like a
    conventional dictionary. Keys must be unique, and each key is associated with
    a single value. Dictionary values can be just about anything, including other
    dictionaries, but keys must be *hashable*. Dictionaries are written in Python
    using curly braces, with colons used to separate keys and values. Dictionary entries
    (elements) are separated by commas.


    Examples:


    +   - `{1: ''odd'', 2: ''even''}`

    - `{''apple'': ''red'', ''lime'': ''green'', ''lemon'': ''yellow''}`

    - `{''name'': ''Egbert'', ''courses'': [''CS1210'', ''CS2240'', ''CS2250''], ''age'':
    19}`


    # directory (file system)


    A *directory* is a component of a file system which contains files, and possibly
    other directories. It is the nesting of directories (containment of one directory
    within another) that gives a file system its hierarchical structure. The top-level
    directory in a disk drive or volume is called the *root* directory.


    In modern operating system GUIs, directories are visually represented as folders,
    and may be referred to as folders.'
- md: "## dividend\n\nIn the context of division (including floor division, // and\
    \ the modulo operator, %), the *dividend* is the number being divided. For example,\
    \ in the expression 21 / 3, the dividend is 21.\n\n## divisor\n\nIn the context\
    \ of division (including floor division, // and the modulo operator, %), the *divisor*\
    \ is the number dividing the dividend. For example, in the expression 21 / 3,\
    \ the divisor is 3. In the context of the modulo operator and modular arithmetic,\
    \ we also refer to this as the modulus.\n\n## driver code\n\n*Driver code* is\
    \ an informal way of referring to the code which drives (runs) your program, to\
    \ distinguish it from function definitions, constant assignments, or classes defined\
    \ by the programmer. Driver code is often fenced behind the if statement: `if\
    \ __name__ == '__main__':`\n\n## docstring\n\nA *docstring* is a triple-quoted\
    \ string which includes information about a program, module, function, or method.\
    \ These should not be used for inline comments. Unlike inline comments, docstrings\
    \ are read and parsed by the Python interpreter. Example at the program (module)\
    \ level:\n\n```\n\"\"\"\nMy Fabulous Program\nEgbert Porcupine <eporcupi@uvm.edu>\n\
    This program prompts the user for a number and\nreturns the corresponding frombulation\
    \ coefficient.\n\"\"\"\n```\n\nOr at the level of a function:\n\n```\ndef successor(n_):\n\
    \    \"\"\"Given some number, n_, returns its successor. \"\"\"\n    return n_\
    \ + 1\n```\n\n## dunder\n\nSpecial variables and functions in Python have identifiers\
    \ that begin and end with two underscores. Such identifiers are referred to as\
    \ *dunders*, a descriptive *portmanteau* of “double underscore.” Examples include\
    \ the variable `__name__` and the special name `'__main__'`, and many other identifiers\
    \ defined by the language. These are generally used to indicate visually that\
    \ these are system-defined identifiers.\n\n## dynamic typing / dynamically typed\n\
    \nUnlike statically typed languages (e.g., C, C++, Java, Haskell, OCaml, Rust,\
    \ Scala), Python is *dynamically typed*. This means that we can rebind new values\
    \ to existing names, even if these values are of a different type than were bound\
    \ in previous assignments. For example, in Python, this is A-OK:\n\n```\nx = 1\
    \          # now x is bound to a value of type int\nx = 'wombat'   # now x is\
    \ bound to a value of type str\nx = [3, 5, 7]  # ...and now a list\n```\n\nThis\
    \ demonstrates *dynamic typing*—at different points in the execution of this code\
    \ `x` is associated with values of different types. In many other languages, this\
    \ would result in type errors.\n\n## edge (graph)\n\nA graph consists of vertices\
    \ (also called nodes) and *edges*. An *edge* connects two vertices, and each edge\
    \ in a graph has exactly two endpoints (vertices). All edges in graphs in this\
    \ text are *undirected*, meaning that they have no direction. If an edge exists\
    \ between vertices A and B, then A is adjacent to B and B is adjacent to A.\n\n\
    ## empty sequence\n\nThe term *empty* applies to any sequence which contains no\
    \ elements. For example, the empty string `\"\"`, the empty list `[]`, and the\
    \ empty tuple `(,)`—these are all *empty sequences*. We refer to these using the\
    \ definite article (\"the\"), because there is only one such object of each type.\
    \ Of note, empty sequences are falsey.\n\n## entry point\n\nThe *entry point*\
    \ of a program is the point at which code begins execution. In Python, the dunder\
    \ `__main__` is the name of the environment where top-level code is run, and thus\
    \ indicates the entry point. Example:\n\n```\n\"\"\"\nSome docstring here\n\"\"\
    \"\n\ndef square(x_):\n    return x_ * x_\n\n# This is the entry point, where\
    \ execution of code begins...\nif __name__ == '__main__':\n    x = float(input(\"\
    Enter a number: \"))\n    x_squared = square(x)\n    print(f\"{x} squared is {x_squared}\"\
    )\n```\n\n## escape sequence\n\nAn *escape sequence* (within a string) is a substring\
    \ preceded by a \\ character, indicating that the following character should be\
    \ interpreted literally and not as a delimiter. Example: print('The following\
    \ apostrophe isn\\'t a delimiter')\n\nEscape sequences are also used to represent\
    \ special values that otherwise can't be represented within a string. For example,\
    \ \\n represents a new line and \\t represents a tab.\n\n## Euclidean division\n\
    \nThis is the kind of division you first learned in primary school, before you\
    \ learned about decimal expansion. A calculation involving *Euclidean division*\
    \ yields a quotient and a remainder (which may be zero). In Python, this is implemented\
    \ by two separate operators, one which yields the quotient (without decimal expansion),\
    \ and the other which yields the remainder. These are // (a.k.a. floor division)\
    \ and % (a.k.a., modulo) respectively.\n\nSo, for example, in primary school,\
    \ when asked to divide 25 by 3, you'd answer 8 remainder 1. In Python:\n\n```\n\
    quotient = 25 // 3   # quotient gets 8\nremainder = 25 % 3   # remainder gets\
    \ 1\n```\n\n## evaluate / evaluation\n\nExpressions are *evaluated* by reducing\
    \ them to a value. For example, the *evaluation* of the expression 1 + 1 yields\
    \ 2. The evaluation of larger expressions proceeds by order of operator precedence\
    \ or order of function calls. So, for example,\n\n```\n>>> import math\n>>> x\
    \ = 16\n>>> y = 5\n>>> int(math.sqrt(x) + 4 * y + 1)\n25\n```\n\nThe call to math.sqrt()\
    \ is evaluated first (yielding 4.0). The multiplication 4 * y is evaluated next\
    \ (yielding 20). Then addition is performed (4.0 + 20 + 1, yielding 25.0). Finally,\
    \ the int constructor is called, and the final evaluation of this expression is\
    \ 25.\n\nWhen literals are evaluated, they evaluate to themselves.\n\n## exception\n\
    \nAn *exception* is an error that occurs at run time. This occurs when code is\
    \ syntactically valid, but it contains semantic defects (bugs) or receives unexpected\
    \ values. When Python detects such an error, it raises an exception. If the exception\
    \ is not handled, program execution terminates.\n\nPython provides a great many\
    \ built-in exceptions which help in diagnosing errors. Examples: TypeError, ValueError,\
    \ ZeroDivisionError, etc. Exceptions can be handled using try and except.\n\n\
    ## exception handling\n\nException handling allows the programmer to anticipate\
    \ the possibility of certain exceptions that might arise during execution and\
    \ provide a fallback or means of responding to the exception should it arise.\
    \ For example, we often use exception handling when validating input from the\
    \ user.\n\n```\nwhile True:\n    response = input(\"Enter a valid number greater\
    \ than zero: \")\n    try:\n        x = float(response)\n        if x > 0:\n \
    \           break\n    except ValueError:\n        print(f\"Sorry I cannot convert\
    \ {response} to a float!\")\n```\n\nException handling should be as limited and\
    \ specific as possible. For example, you should never use a bare except: or except\
    \ Exception:.\n\nSome types of exception, for example NameError should never be\
    \ handled, as this would conceal a serious programming defect which should be\
    \ addressed by revising code.\n\n## expression\n\nAn expression is any syntactically\
    \ valid code that can be evaluated, that is, an expression yields a value. Expressions\
    \ can be simple (e.g., a single literal) or complex (i.e., composed of literals,\
    \ variables, operators, function calls, etc). Expressions are to be distinguished\
    \ from statements—expressions have an evaluation, statements do not.\n\n## falsey\n\
    \nWhen used as conditions or in Boolean expressions, most everything in Python\
    \ has a truth value. If something has a truth value that is treated as if it were\
    \ false, we say such a thing is falsey. Falsey things include (but are not limited\
    \ to) empty sequences, 0, and 0.0.\n\n## Fibonacci sequence\n\nThe Fibonacci sequence\
    \ is a sequence of natural numbers starting with 0, 1, in which each successive\
    \ element is the sum of the two preceding elements. Thus the Fibonacci sequence\
    \ begins 0, 1, 1, 2, 3, 5, 8, 13, 21, ... The Fibonacci sequence gets its name\
    \ from Leonardo of Pisa (c. 1170–c. 1245 CE) whose nickname was Fibonacci. The\
    \ Fibonacci sequence was known to Indian mathematicians (notably Pingala) as early\
    \ as 200 BCE, but history isn't always fair about naming these things."
  mdcn: "## 被除数\n\n在除法（包括整除 `//` 和取模运算符 `%`）的语境中，*被除数*是被除的数。例如，在表达式 `21 / 3` 中，被除数是\
    \ `21`。\n\n## 除数\n\n在除法（包括整除 `//` 和取模运算符 `%`）的语境中，*除数*是除被除数的数。例如，在表达式 `21 / 3`\
    \ 中，除数是 `3`。在取模运算符和模运算的语境中，我们也称其为模数。\n\n## 驱动代码\n\n*驱动代码*是一个非正式术语，指代驱动（运行）你程序的代码，以区别于程序员定义的函数、常量赋值或类。驱动代码通常被\
    \ `if` 语句包裹：`if __name__ == '__main__':`。\n\n## 文档字符串\n\n*文档字符串*是一个三引号字符串，包含关于程序、模块、函数或方法的信息。它们不应被用作行内注释。与行内注释不同，文档字符串会被\
    \ Python 解释器读取和解析。程序（模块）级别的示例：\n\n```\n\"\"\"\nMy Fabulous Program\nEgbert Porcupine\
    \ <eporcupi@uvm.edu>\nThis program prompts the user for a number and\nreturns\
    \ the corresponding frombulation coefficient.\n\"\"\"\n```\n\n或函数级别的示例：\n\n```\n\
    def successor(n_):\n    \"\"\"Given some number, n_, returns its successor. \"\
    \"\"\n    return n_ + 1\n```\n\n## 双下划线\n\nPython 中的特殊变量和函数具有以两个下划线开头和结尾的标识符。这样的标识符被称为\
    \ *dunders*，是“double underscore”的描述性*混成词*。示例包括变量 `__name__` 和特殊名称 `'__main__'`，以及语言定义的许多其他标识符。这些通常用于直观地表示它们是系统定义的标识符。\n\
    \n## 动态类型 / 动态类型化\n\n与静态类型语言（例如 C、C++、Java、Haskell、OCaml、Rust、Scala）不同，Python\
    \ 是*动态类型化*的。这意味着我们可以将新值重新绑定到现有名称，即使这些值与之前赋值绑定的类型不同。例如，在 Python 中，这是完全允许的：\n\n\
    ```\nx = 1          # 现在 x 绑定到一个 int 类型的值\nx = 'wombat'   # 现在 x 绑定到一个 str 类型的值\n\
    x = [3, 5, 7]  # ...现在是一个列表\n```\n\n这展示了*动态类型*——在此代码执行的不同点，`x` 与不同类型的值相关联。在许多其他语言中，这将导致类型错误。\n\
    \n## 边（图）\n\n图由顶点（也称为节点）和*边*组成。一条*边*连接两个顶点，图中的每条边恰好有两个端点（顶点）。本文中所有图中的边都是*无向的*，意味着它们没有方向。如果顶点\
    \ A 和 B 之间存在一条边，那么 A 与 B 相邻，B 也与 A 相邻。\n\n## 空序列\n\n术语*空*适用于任何不包含元素的序列。例如，空字符串\
    \ `\"\"`、空列表 `[]` 和空元组 `(,)`——这些都是*空序列*。我们使用定冠词（“the”）来指代它们，因为每种类型只有一个这样的对象。值得注意的是，空序列是假值。\n\
    \n## 入口点\n\n程序的*入口点*是代码开始执行的位置。在 Python 中，双下划线 `__main__` 是运行顶层代码的环境的名称，因此指示了入口点。示例：\n\
    \n```\n\"\"\"\nSome docstring here\n\"\"\"\n\ndef square(x_):\n    return x_ *\
    \ x_\n\n# 这是入口点，代码执行从这里开始...\nif __name__ == '__main__':\n    x = float(input(\"\
    Enter a number: \"))\n    x_squared = square(x)\n    print(f\"{x} squared is {x_squared}\"\
    )\n```\n\n## 转义序列\n\n*转义序列*（在字符串内）是以 `\\` 字符开头的子字符串，表示后续字符应被按字面意义解释，而不是作为分隔符。示例：`print('The\
    \ following apostrophe isn\\'t a delimiter')`\n\n转义序列也用于表示在字符串中无法直接表示的特殊值。例如，`\\\
    n` 表示换行，`\\t` 表示制表符。\n\n## 欧几里得除法\n\n这是你在小学时最初学到的除法，在你学习小数展开之前。涉及*欧几里得除法*的计算会产生一个商和一个余数（余数可能为零）。在\
    \ Python 中，这由两个独立的运算符实现，一个产生商（不带小数展开），另一个产生余数。它们分别是 `//`（也称为整除）和 `%`（也称为取模）。\n\
    \n所以，例如，在小学时，当被要求将 25 除以 3 时，你会回答 8 余 1。在 Python 中：\n\n```\nquotient = 25 // 3\
    \   # 商得到 8\nremainder = 25 % 3   # 余数得到 1\n```\n\n## 求值 / 求值\n\n表达式通过将其归约为一个值来*求值*。例如，表达式\
    \ `1 + 1` 的*求值*结果为 2。更大表达式的求值按照运算符优先级或函数调用顺序进行。所以，例如，\n\n```\n>>> import math\n\
    >>> x = 16\n>>> y = 5\n>>> int(math.sqrt(x) + 4 * y + 1)\n25\n```\n\n首先对 `math.sqrt()`\
    \ 的调用进行求值（结果为 4.0）。接下来对乘法 `4 * y` 进行求值（结果为 20）。然后执行加法（`4.0 + 20 + 1`，结果为 25.0）。最后，调用\
    \ `int` 构造函数，此表达式的最终求值结果为 25。\n\n当字面量被求值时，它们求值为自身。\n\n## 异常\n\n*异常*是运行时发生的错误。当代码语法正确，但包含语义缺陷（错误）或接收到意外值时，就会发生这种情况。当\
    \ Python 检测到此类错误时，它会引发一个异常。如果异常未被处理，程序执行将终止。\n\nPython 提供了大量内置异常，有助于诊断错误。示例：`TypeError`、`ValueError`、`ZeroDivisionError`\
    \ 等。异常可以使用 `try` 和 `except` 来处理。\n\n## 异常处理\n\n异常处理允许程序员预见执行期间可能出现的某些异常的可能性，并提供后备方案或在异常发生时进行响应的方法。例如，我们经常在验证用户输入时使用异常处理。\n\
    \n```\nwhile True:\n    response = input(\"Enter a valid number greater than zero:\
    \ \")\n    try:\n        x = float(response)\n        if x > 0:\n            break\n\
    \    except ValueError:\n        print(f\"Sorry I cannot convert {response} to\
    \ a float!\")\n```\n\n异常处理应尽可能有限和具体。例如，你永远不应该使用裸 `except:` 或 `except Exception:`。\n\
    \n某些类型的异常，例如 `NameError`，永远不应该被处理，因为这会掩盖一个严重的编程缺陷，应该通过修改代码来解决。\n\n## 表达式\n\n表达式是任何语法上有效的、可以被求值的代码，也就是说，表达式会产生一个值。表达式可以是简单的（例如，单个字面量）或复杂的（即由字面量、变量、运算符、函数调用等组成）。表达式应与语句区分开来——表达式有求值，语句没有。\n\
    \n## 假值\n\n当用作条件或在布尔表达式中时，Python 中的大多数事物都有一个真值。如果某个事物的真值被视为假，我们称这样的事物是假值。假值事物包括（但不限于）空序列、`0`\
    \ 和 `0.0`。\n\n## 斐波那契数列\n\n斐波那契数列是一个从 0、1 开始的自然数序列，其中每个后续元素是前两个元素的和。因此斐波那契数列以\
    \ 0, 1, 1, 2, 3, 5, 8, 13, 21, ... 开始。斐波那契数列以比萨的莱昂纳多（约 1170–约 1245 年）命名，他的绰号是斐波那契。斐波那契数列早在公元前\
    \ 200 年就为印度数学家（特别是平伽拉）所知，但历史在命名这些事物上并不总是公平的。"
