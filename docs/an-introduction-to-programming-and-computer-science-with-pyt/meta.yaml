  - '[PAGE 106]


    write your own function to find the principal square root of a number when Python
    can do it for you?<sup>10</sup>


    Unlike built-in functions, in order to use functions (and constants) provided
    by the Python `math` module, we must first *import* the module (or portions thereof).<sup>11</sup>
    You can think of this as importing features you need into your program.


    Python''s `math` module is rich with features. It provides many functions including


    | function | calculation |

    | :--- | :--- |

    | `sqrt(x)` | $\sqrt{x}$ |

    | `exp(x)` | $e^x$ |

    | `log(x)` | $\ln x$ |

    | `log2(x)` | $\log_2 x$ |

    | `sin(x)` | $\sin x$ |

    | `cos(x)` | $\cos x$ |


    and many others.


    # Using the `math` module


    To import a module, we use the `import` keyword. Imports should appear in your
    code immediately after the starting docstring, and you only need to import a module
    once. If the import is successful, then the imported module becomes available.


    ```

    >>> import math

    ```


    Now what? Say we''d like to use the `sqrt()` function provided by the `math` module.
    How do we access it?


    If we want to access functions (or constants) within the `math` module we use
    the `.` operator.


    ```

    >>> import math

    >>> math.sqrt(25)

    5.0

    ```


    Let''s unpack this. Within the `math` module, there''s a function named `sqrt()`.
    Writing `math.sqrt()` is accessing the `sqrt()` function within the `math` module.
    This uses what is called *dot notation* in Python (and many other languages use
    this as well).


    Let''s try another function in the `math` module, `sin()`, which calculates the
    sine of an angle. You may remember from pre-calculus or trigonometry course that
    $\sin 0 = 0$, $\sin \frac{\pi}{2} = 1$, $\sin \pi = 0$, $\sin \frac{3\pi}{2} =
    -1$, and $\sin 2\pi = 0$. Let''s try this out.'
