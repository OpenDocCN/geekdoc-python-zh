    \ / guess)) / 2\n\n    if abs(guess ** 2 - x) < EPSILON:\n        break\n\nprint(guess)\n\
    ```\n\n(`abs()` is a built-in Python function which calculates the absolute value\
    \ of a number.) What does this loop do?\n\n## 11.4 An ancient algorithm with a\
    \ while loop\n\nThere's a rather beautiful algorithm for finding the greatest\
    \ common divisor of two positive integers.\n\nYou may recall from your elementary\
    \ algebra course that the *greatest common divisor* of two positive integers,\
    \ *a* and *b*, is the greatest integer which divides both *a* and *b* without\
    \ a remainder.\n\nFor example, the greatest common divisor of 120 and 105 is 15.\
    \ It's clear that 15 is a divisor of both 120 and 105:\n\n120/15 = 8\n105/15 =\
    \ 7.\n\nHow do we know that 15 is the *greatest* common divisor? One way is to\
    \ factor both numbers and find all the common factors.\n\n**120 = 2 × 2 × 2 ×\
    \ 3 × 5**\n**105 = 3 × 5 × 7**\n\nWe've found the common factors of 120 and 105,\
    \ which are 3 and 5, and their product is 15. Therefore, 15 is the greatest common\
    \ divisor of 120 and 105. This works, and it may well be what you learned in elementary\
    \ algebra, however, it becomes difficult with larger numbers and isn't particularly\
    \ efficient.\n\n## Euclid's algorithm\n\nEuclid was an ancient Greek mathematician\
    \ who flourished around 300 BCE. Here's an algorithm that bears Euclid's name.\
    \ It was presented in Euclid's *Elements*, but it's likely that it originated\
    \ many years before Euclid.²\n\n²Some historians believe that Eudoxus of Cnidus\
    \ was aware of this algorithm (c. 375 BCE), and it's quite possible it was known\
    \ before that time.\n\n## Euclid’s GCD algorithm\n\n**input** : Positive integers,\
    \ $a$ and $b$\n**output**: Calculates the GCD of $a$ and $b$\n**while** $b$ does\
    \ not equal 0 **do**\n    Find the remainder when we divide $a$ by $b$;\n    Let\
    \ $a$ equal $b$;\n    Let $b$ equal the remainder;\n**end**\n$a$ is the GCD\n\n\
    Let’s work out an example. Say we have $a = 342$ and $b = 186$.\nFirst, we find\
    \ the remainder of 342/186. 186 goes into 342 once, leaving a remainder of 156.\
    \ Now, let $a = 186$, and let $b = 156$. Does $b$ equal 0? No, so we continue.\n\
    Find the remainder of 186/156. 156 goes into 186 once, leaving a remainder of\
    \ 30. Now, let $a = 156$, and let $b = 30$. Does $b$ equal 0? No, so we continue.\n\
    Find the remainder of 156/30. 30 goes into 156 five times, leaving a remainder\
    \ of 6. Now, let $a = 30$, and let $b = 6$. Does $b$ equal 0? No, so we continue.\n\
    Find the remainder of 30/6. 6 goes into 30 five times, leaving a remainder of\
    \ 0. Now, let $a = 6$, and let $b = 0$. Does $b$ equal 0? Yes, so we are done.\n\
    The GCD is the value of $a$, so the GCD is 6.\nPretty cool, huh?\n\n## Why does\
    \ it work?\n\nIf we have $a$ and $b$ both positive integers, with $a > b$, then\
    \ we can write\n$$a = bq + r$$\nwhere $q$ is the quotient of dividing $a$ by $b$\
    \ (Euclidean division) and $r$ is the remainder. For example, in the first step\
    \ of our example (above) we have\n$$342 = 1 \\times 186 + 156.$$\nIt follows that\
    \ the GCD of $a$ and $b$ equals the GCD of $b$ and $r$.^3 That is,\n$$\\gcd(a,\
    \ b) = \\gcd(b, r).$$\nThus, by successive divisions, we continue to reduce the\
    \ problem to smaller and smaller terms. At some point in the execution of the\
    \ algorithm, $b$ becomes 0, and we can divide no further. At this point, what\
    \ remains as the value for $a$ is the GCD, because the greatest common divisor\
    \ of $a$ and zero is $a$!\n\n> ^3If we have positive integers $a$, $b$ with $a\
    \ > b$, then by the division algorithm, we know there exist integers $q$, $r$,\
    \ such that $a = bq + r$, with $b > r \\ge 0$. Let $d$ be a common divisor of\
    \ $a$ and $b$. Since $d$ divides $a$ and $d$ divides $b$, then there exist integers\
    \ $n$, $m$, such that $a = dm$ and $b = dn$. By substitution, we have $dm = dqn\
    \ + r$. Rearranging terms we have $dm - dqn = r$. By factoring, we have $d(m -\
    \ qn) = r$. Therefore, $d$ divides $r$. Thus the set of common divisors of $a$\
    \ and $b$ is the same as the set of common divisors of $b$ and $r$. Thus the greatest\
    \ element of each of these sets must be the same. Therefore, we have $\\gcd(a,\
    \ b) = \\gcd(b, r)$, as desired.\n\nThis algorithm saves us from having to factor\
    \ both terms.\nConsider a larger problem instance with $a = 30759$ and $b = 9126$.\n\
    Factoring these would be a nuisance, but the Euclidean algorithm takes\nonly eight\
    \ iterations to find the answer, 3.\n\n## Show me the code!\n\nHere's an implementation\
    \ in Python.\n\n```python\n\"\"\"\nImplementation of Euclid's algorithm.\n\"\"\
    \"\n\na = int(input(\"Enter a positive integer, a: \"))\nb = int(input(\"Enter\
    \ a positive integer, b: \"))\n\nwhile b != 0:\n    remainder = a % b\n    a =\
    \ b\n    b = remainder\n\nprint(f\"The GCD is {a}.\")\n```\n\nThat's one elegant\
    \ little algorithm (and one of my personal favorites).\nIt also demonstrates the\
    \ use of a while loop, which is needed, since we\ndon't know *a priori* how many\
    \ iterations it will take to reach a solution.\n\n## 11.5 for loops\n\nWe've seen\
    \ that while loops are useful when we know we wish to perform\na calculation or\
    \ task, but we don't know in advance how many iterations\nwe may need. Thus, while\
    \ loops provide a condition, and we loop until\nthat condition (whatever it may\
    \ be) no longer holds true.\nPython has another type of loop which is useful when:\n\
    \n- we know exactly how many iterations we require, or\n- we have some sequence\
    \ (i.e., list, tuple, or string) and we wish\nto perform calculations, tasks,\
    \ or operations with respect to the\nelements of the sequence (or some subset\
    \ thereof).\n\nThis new kind of loop is the for loop. for loops are so named because\n\
    they iterate *for* each element in some iterable. Python for loops *iterate*\n\
    over some *iterable*. Always.$^4$\n\n$^4$for loops in Python work rather differently\
    \ than they do in many other languages. Some languages use counters, and thus\
    \ for loops are *count-controlled*. For\nexample, in Java we might write\n\n```java\n\
    for (int i = 0; i < 10; ++i) {\n    // do something\n}\n```\n\nWhat's an iterable?\
    \ Something we can iterate over, of course! And what might that be? The sequence\
    \ types we've seen so far (list, tuple, string) are sequences, and these are iterable.\
    \ We can also produce other iterable objects (which we shall see soon).\n\nHere's\
    \ an example. We can iterate over a list, [1, 2, 3], by taking the elements, one\
    \ at a time, in the order they appear in sequence.\n\n```python\n>>> numbers =\
    \ [1, 2, 3]\n>>> for n in numbers:\n...     print(n)\n...\n1\n2\n3\n```\n\nSee?\
    \ In our for loop, Python iterated over the elements (a.k.a. “members”) of the\
    \ list provided. It started with 1, then 2, then 3. At that point the list was\
    \ exhausted, so the loop terminated.\n\nIf it helps, you can read `for n in numbers:`\
    \ as “for each number, n, in the iterable called ‘numbers’.”\n\nThis works for\
    \ tuples as well.\n\n```python\n>>> letters = ('a', 'b', 'c')\n>>> for letter\
    \ in letters:\n...     print(letter)\n...\na\nb\nc\n```\n\nNotice the syntax:\
    \ `for <some variable> in <some iterable>:`. As we iterate over some iterable,\
    \ we get each member of the iterable in turn, one at a time. Accordingly, we need\
    \ to assign these members (one at a time) to some variable.\n\nIn the first example,\
    \ above the variable has the identifier n.\n\n```python\n>>> numbers = [1, 2,\
    \ 3]\n>>> for n in numbers:\n...     print(n)\n...\n```\n\nAs we iterate over\
    \ numbers (a list), we get one element from the list at a time (in the order they\
    \ appear in the list). So at the first iteration, n is assigned the value 1. At\
    \ the second iteration, n is assigned the value 2.\n\n> In this case, there's\
    \ a counter, i, which is updated at each iteration of the loop. Here we update\
    \ by incrementing i using ++i (which in Java increments i). The loop runs so long\
    \ as the control condition i < 10 is true. On the last iteration, with i equal\
    \ to nine, i is incremented to ten, then the condition no longer holds, and the\
    \ loop exits. This is not how for loops work in Python! Python for loops always\
    \ iterate over an iterable."
