    # Storing a value returned by a function


    Continuing with our example of square():


    ```

    >>> a = 17

    >>> b = square(a)

    >>> b

    289

    ```


    Notice that we can supply a variable as an argument to our function. Notice also
    that this object needn’t be called x.⁵


    # Using the value returned by a function in an expression


