  - '[PAGE 359]


    # file


    A *file* is a component of a file system that''s used to store data. The computer
    programs you write are saved as files, as are all the other documents, programs,
    and other resources you may have on your computer. Files are contained in directories.


    # floating-point


    A *floating-point* number is a number which has a decimal point. These are represented
    differently from integers. Python has a type, `float` which is used for floating-point
    numbers.


    # floor division


    *Floor division* calculates the Euclidean quotient, or, if you prefer, the largest
    integer that is less than or equal to the result of floating-point division. For
    example, `8 // 3` yields 2, because 2 is the largest integer less than 2.666...(which
    is the result of `8 / 3`).


    # floor function


    The floor function returns the largest integer less than or equal to the argument
    provided. In mathematical notation, we write


    $$\lfloor x \rfloor$$


    and, for example $\lfloor 6.125 \rfloor = 6$.


    Python implements this function in the `math` module. Example: `math.floor(6.125)`
    yields 6.


    # flow chart


    A *flow chart* is a tool used to represent the possible paths of execution and
    flow of control in a program, function, method, or portion thereof. See: Chapter
    8 Branching.


    # format specifier


    *Format specifiers* are used within f-string replacement fields to indicate how
    the interpolated content should be formatted, *e.g.*, indicating precision of
    floating-point numbers; aligning text left, right or center, *etc*. There is a
    complete "mini-language" of format specifiers. Within the replacement field, the
    format specifier follows the interpolated expression, separated by a colon. Format
    specifiers are optional.


    # folder (see: directory)


    *Folder* is synonymous with directory.'
  - '[PAGE 360]


    # f-string


    f-string is short for *formatted string literal*. f-strings are used for string
    interpolation, where values are substituted into replacement fields within the
    f-string (with optional formatting specifiers). The syntax for an f-string requires
    that it be prefixed with the letter “f”, and replacement fields appear within
    curly braces. For example, `f"The secret number is {num}."` In this case, the
    replacement field is `{num}`, and the string representation of the value associated
    with the identifier `num` is substituted into the string. So, if we had `num =
    42`, then this string becomes “The secret number is 42.”


    # function


    In Python, a *function* is a named block of code which performs some task or returns
    some value. We distinguish between the definition of a function, using the keyword
    `def`, and calls to the function, which result in the function being executed
    and then returning to the point at which it was called. Functions may have zero
    or more formal parameters. Formal parameters receive arguments when the function
    is called.


    All Python functions return a value (the default, if there is no explicit `return`
    statement, is for the function to return `None`).


    See: Chapter 5 Functions.


    # graph


    A *graph* consists of a set of vertices and a set of edges. Trivially, the empty
    graph is one with no vertices and thus no edges. A graph with two or more vertices
    may include edges (assuming we exclude self-edges which is common). An edge connects
    two vertices.


    Graphs are widely used in computer science to represent networks of all kinds
    as well as mathematical and other objects.


    # graphical user interface


    A *graphical user interface* (abbreviated GUI, which is pronounced “gooey”) is
    an interface with graphical elements such as windows, buttons, scroll bars, input
    fields, and other fancy doo-dads. These are distinguished from command line interfaces,
    which lack these elements and are text based.


    # hashable


    Dictionary keys must be *hashable*. Internally, Python produces a hash (a number)
    corresponding to each key in a dictionary and uses this to look up elements in
    the dictionary. In order for this to work, such hashes must be stable—they may
    not change. Accordingly, Python disallows the use of non-hashable objects as dictionary
    keys. This includes mutable objects (lists, dictionaries) or immutable containers
    of mutable objects (for example, a tuple containing a list). Most other objects
    are hashable: integers, floats, strings, *etc*.'
  - "[PAGE 361]\n\n# heterogeneous\n\n*Heterogeneous* means “of mixed kind or type”.\
    \ Python allows for heterogeneous lists or tuples, meaning that these can contain\
    \ objects of different types. For example, this is just fine in Python: `['a',\
    \ 42, False, [x], 101.9]`.\n\n# identifier\n\nAn *identifier* is a name we give\
    \ to an object in Python. For many types, we give a name by assignment. Example:\n\
    \n```\nx = 1234567\n```\n\ngives the value 1234567 the name (identifier) `x`.\
    \ This allows us to refer to the value 1234567 in our code by its identifier,\
    \ `x`.\n\n```\nprint(x)\nz = x // 100\n# etc\n```\n\nWe give identifiers to functions\
    \ using the `def` keyword.\n\n```\ndef successor(n):\n    return n + 1\n```\n\n\
    Now this function has the identifier (name) `successor`.\n\nFor restrictions on\
    \ identifiers, see the Python documentation at [https://docs.python.org/3/reference/lexical_analysis.html](https://docs.python.org/3/reference/lexical_analysis.html)\
    \ (section 2.3. Identifiers and keywords).\n\n# immutable\n\nIf an object is *immutable*\
    \ it means that the object cannot be changed. In Python, `int`, `float`, `str`,\
    \ and `tuple` are all immutable types. It is true that we can reassign a new value\
    \ to a variable, but this is different from changing the value itself.\n\n# import\n\
    \nWe *import* a module for use in our own code by using Python's `import` keyword.\
    \ For example, if we wish to use the `math` module, we must first import it thus:\n\
    \n```\nimport math\n```\n\n# impure functions\n\n*Impure functions* are functions\
    \ with side effects. Side effects include reading from or writing to the console,\
    \ reading from or writing to a file, or mutating (changing) a non-local variable.\
    \ *Cf.*, pure function."
  - '[PAGE 362]


    # incremental development


    Incremental development is a process whereby we write, and presumably test, our
    programs in small increments.


    # index / indices


    All sequences have indices (the plural of index). To each element in the sequence,
    there corresponds an index. We can use an index to access an individual element
    within a sequence. For this we use square bracket notation (which is distinct
    from the syntax used to create a list). For example, given the list


    ```

    >>> lst = [''dog'', ''cat'', ''gerbil'']

    ```


    we can access individual elements by their index. Python is (like the majority
    of programming languages) zero-indexed so indices start at zero.


    ```

    >>> lst[0]

    ''dog''

    >>> lst[2]

    ''gerbil''

    >>> lst[1]

    ''cat''

    ```


    Lists, being mutable, support indexed writes as well as indexed reads, so this
    works:


    ```

    >>> lst[2] = ''hamster''

    ```


    But this won''t work with tuples or strings (since they are immutable).


    # I/O


    I/O is short for input/output. This may refer to console I/O, file I/O, or some
    other form of input and output.


    # instance / instantiate


    An instance is an object of a given type once created. For example, 1 is an instance
    of an object of type int. More often, though, we speak of instances as objects
    returned by a constructor. For example, when using the csv module, we can instantiate
    CSV reader and writer objects by calling the corresponding constructors, csv.reader()
    and csv.writer(). What are returned by these constructors are instances of the
    corresponding type.


    # integrated development environment (IDE)


    Integrated development environments are convenient (but not essential) tools for
    writing code. Rather than a mere text editor, they provide'
  - '[PAGE 363]


    syntax highlighting, hints, and other facilities for writing, testing, debugging,
    and running code. Python provides its own IDE, called IDLE (integrated development
    and learning environment) and there are many commercial or open source IDEs: Thonny
    (worth a look if you''re a beginner), JetBrains Fleet, JetBrains PyCharm, Microsoft
    VS Code, and many others.


    # interactive mode


    Interactive mode is what we''re using when we''re interacting at the Python shell.
    At the shell, you''ll see the Python prompt >>>. Work at the shell is not saved—so
    it''s suitable for experimenting but not for writing programs.

    Compare with script mode, below.


    # interpolation


    In this text, when we mention interpolation, we''re always talking about string
    interpolation (and not numeric interpolation or frame interpolation).

    See: string interpolation.


    # interpreter


    An interpreter is a program that executes some form of code without it first being
    compiled into binary machine code. In Python, this is done by the Python interpreter,
    which interprets bytecode produced by the Python compiler.


    # invoke (see: call)


    Invoke is synonymous with call.


    # iterable / iterate


    An iterable object is one we may iterate, that is, it is an object which contains
    zero or more elements, which are ordered and can be taken one at a time. A familiar
    form of iteration is dealing from a deck of cards. The deck contains zero or more
    elements (52 for a standard deck). The deck is ordered—which doesn''t mean the
    cards are sorted, it just means that each card has a unique position within the
    deck (depending on how the deck is shuffled). If we were to turn over the cards
    from the top of the deck one at a time, until there were no more cards left, we''d
    have iterated over the deck. At the first iteration, we might turn over the six
    of clubs. At the second iteration, we might turn over the nine of diamonds. And
    so on. That''s iterating an iterable.

    Iterables in Python include objects of type str, list, tuple, dict, range, and
    enumerate (there are others as well). When we iterate these objects, we get one
    element at a time, in the order they appear within'
- md: "## keyword\n\nCertain identifiers are reserved by the syntax of any language\
    \ as *keywords*. Keywords always have the same meaning and cannot be changed by\
    \ the user. Python keywords we've seen in this text are: False, None, True, as,\
    \ assert, break, def, del, elif, else, except, for, if, import, in, not, or, pass,\
    \ return, try, while, and with. Feel free to try redefining any of these at the\
    \ Python shell—you won't succeed.\n\n## keyword argument\n\nA keyword argument\
    \ is an argument provided to a function which is preceded by the name. (Note:\
    \ keyword arguments have absolutely nothing to do with Python keywords.) Keyword\
    \ arguments are specified in the function definition. Defining functions with\
    \ keyword arguments is not covered in this text, but there are a few instances\
    \ of using keyword arguments, notably:\n\n1.  The optional `end` keyword argument\
    \ to the `print()` function, which allows the user to override the default ending\
    \ of printed strings (which is the newline character, \\n).\n2.  The optional\
    \ `newline` keyword argument to the `open()` function (which is a little hack\
    \ to prevent ugly behavior on certain Windows machines).\n\nKeyword arguments,\
    \ if any, always follow positional arguments.\n\n## lexicographic order\n\n*Lexicographic\
    \ order* is how Python orders strings and certain other types by default when\
    \ sorting. This is, essentially, how strings would appear if in a conventional\
    \ dictionary. For example, when sorting two words, the first letters are compared.\
    \ If the first letters are different, then the word which contains the first letter\
    \ which appears earlier in the alphabet appears before the other in the sort.\
    \ If the first letters are the same, then the second letters are compared, and\
    \ so on. If the number of letters is different, but all letters that can be compared\
    \ are the same, then the shorter word appears before the other in the sort. So,\
    \ for example the word 'sort' would appear before the word 'sorted' in a sorted\
    \ list of words.\n\n> ¹Dictionaries are a bit of a special case here, since the\
    \ order in which elements are added to a dictionary is not necessarily the order\
    \ in which they appear when iterating, but there is an underlying order. Moreover,\
    \ Python does provide an orderedDict type (provided by the collections module)\
    \ which preserves the order of addition when iterating. But these are minor points.\n\
    \n## list\n\nA list (type `list`) is a mutable container for other objects. Lists\
    \ are sequences, meaning that their contents are ordered (each object in the list\
    \ has a specific position within the list). Lists are iterable, meaning that we\
    \ can iterate over them in a `for` loop. We can create a list by assigning a list\
    \ literal to a variable:\n\n```\ncheeses = ['gouda', 'brie', 'mozzarella', 'cheddar']\n\
    ```\n\nor we may create a list from some other iterable object using the list\
    \ constructor:\n\n```\n# This creates the list ['a', 'b', 'c']\nletters = list(('a',\
    \ 'b', 'c'))\n# This creates the list ['w', 'o', 'r', 'd']\nletters = list('word')\n\
    ```\n\nThe list constructor can also be used to make a copy of a list.\n\n## literal\n\
    \nA literal is an actual value of a given type. `1` is a literal of the `int`\
    \ type. `'muffin'` is a literal of the `str` type. `['foo', 'bar', 123]` is a\
    \ literal of the `list` type. During evaluation, literals evaluate to themselves.\n\
    \n## local variable\n\nA *local variable* is one which is defined within a limited\
    \ scope. The local variables we've seen in this text are those created by assignment\
    \ within a function.\n\n## loop\n\nA *loop* is a structure which is repeated zero\
    \ or more times, depending on the condition if it's a `while` loop, or depending\
    \ on the iterable being iterated if it's a `for` loop. `break` and (in some cases)\
    \ `return` can be used to exit a loop which might otherwise continue.\nPython\
    \ supports two kinds of loops: `while` loops which continue to execute as long\
    \ as some condition is true, and `for` loops which iterate some iterable.\n\n\
    ## Matplotlib\n\nMatplotlib is a widely used library for creating plots, animations,\
    \ and other visualizations of data in Python. It is *not* part of the Python standard\
    \ library, and so it must be installed before it can be used.\nFor more, see:\
    \ https://matplotlib.org.\n\n## method\n\nA *method* is a function which is bound\
    \ to objects of a specific type.² For example, we have list methods such as `.append()`,\
    \ `.pop()`, and `.sort()`, string methods such as `.upper()`, `.capitalize()`,\
    \ and `.strip()`, and so on. Methods are accessed by use of the dot operator (as\
    \ indicated in the identifiers above). So to sort a list, `lst`, we use `lst.sort()`;\
    \ to remove and return the last element from a non-empty list, `lst`, we use `lst.pop()`;\
    \ to return a capitalized copy of a string, `s`, we use `s.capitalize()`; and\
    \ so on.\n\n## module\n\nA *module* is a collection of Python objects and code.\
    \ Examples include the `math` module, the `csv` module, and the `statistics` module.\
    \ In order to use a module, it must be imported, *e.g.*, `import math`. Imported\
    \ modules are given *namespaces*, and we access functions within a module using\
    \ the dot operator. For example, when importing the `math` module, the namespace\
    \ is `math` and we access a function within that namespace thus: `math.sqrt(2)`,\
    \ as one example.\n\nYou can import programs you write yourself if you wish to\
    \ reuse functions written in another program. In cases like this, your program\
    \ can be imported as a module.\n\n## modulus\n\nWhen using the modulo operator,\
    \ we refer to the second operand as the *modulus*. For example, in the case of\
    \ `23 % 5` the modulus is 5.\n\nSee also: Euclidean division and congruent.\n\n\
    ## Monte Carlo\n\n*Monte Carlo* method makes use of repeated random sampling (from\
    \ some distribution), in order to solve certain classes of problems. For example,\
    \ we can use the Monte Carlo method to approximate π. The Monte Carlo method is\
    \ widely used in physics, economics, operations management, and many other domains.\n\
    \n## mutable\n\nAn object (type) is mutable if it can be changed after it's been\
    \ created. Lists and dictionaries are mutable, whereas objects of type `int`,\
    \ `float`, `str` and `tuple` are not.\n\n## name (see: identifier)\n\n*Name* is\
    \ synonymous with *identifier*.\n\n²Strictly speaking, a method is a function\
    \ defined with a class.\n\n## namespace\n\nNamespaces are places where Python\
    \ objects are stored, and these are very much like but not identical to dictionaries.\
    \ For example, like dictionary keys, identifiers within a namespace are unique\
    \ (you can't have two different variables named x in the same namespace).\nMost\
    \ often you're working in the global namespace. However, functions, and modules\
    \ you import have their own namespaces. In the case of functions, a function's\
    \ namespace is created when the function is called, and destroyed when the function\
    \ returns. In the case of modules, we refer to elements within a module's namespace\
    \ using the dot operator (see: Module).\n\n## node (graph; see: vertex)\n\nIn\
    \ the context of graphs, *node* and vertex are synonymous.\n\n## object\n\nPretty\
    \ much anything in Python that's not a keyword or operator or punctuation is an\
    \ object. Every object has a type, so we have objects of type int, objects of\
    \ type str, and so on. Functions are objects of type function.\nIf you learn about\
    \ object-oriented programming you'll learn how to define your own types, and instantiate\
    \ objects of those types.\n\n## operator\n\nAn operator is a special symbol (or\
    \ combination of symbols) that takes one or more operands and performs some operation\
    \ such as addition, multiplication, *etc.*, or some kind of comparison. Operators\
    \ include (but are not limited to) +, -, *, **, /, //, %, =, ==, > <, >=, <=,\
    \ and !=. Operators that have a single operand are called *unary operators*, *e.g.*,\
    \ unary negation. Operators that take two operands are called *binary operators*.\n\
    Some operators perform different operations depending on the type of their operands.\
    \ This is called *operator overloading*. Example: If both operands are numeric,\
    \ + performs addition; if both operands are strings, or both operands are lists,\
    \ + performs concatenation.\n\n## parameter (and formal parameter)\n\nA function\
    \ definition may include one or more *parameter* (also called *formal parameter*).\
    \ These parameters provide names for arguments when the function is called. For\
    \ example:\n\n```\ndef square(x):\n    return x * x\n```\n\nIn this example, x\
    \ is the formal parameter, and in order to call the function we must supply a\
    \ corresponding argument."
  mdcn: "## 关键字\n\n任何语言的语法都会将某些标识符保留为*关键字*。关键字始终具有相同的含义，用户无法更改。本文中我们见过的 Python 关键字有：False、None、True、as、assert、break、def、del、elif、else、except、for、if、import、in、not、or、pass、return、try、while\
    \ 和 with。你可以在 Python shell 中尝试重新定义其中任何一个——你不会成功的。\n\n## 关键字参数\n\n关键字参数是提供给函数的、前面带有名称的参数。（注意：关键字参数与\
    \ Python 关键字毫无关系。）关键字参数在函数定义中指定。本文不涉及使用关键字参数定义函数，但有一些使用关键字参数的实例，特别是：\n\n1.  `print()`\
    \ 函数的可选 `end` 关键字参数，它允许用户覆盖打印字符串的默认结尾（即换行符 `\\n`）。\n2.  `open()` 函数的可选 `newline`\
    \ 关键字参数（这是一个小技巧，用于防止某些 Windows 机器上出现不良行为）。\n\n关键字参数（如果有的话）总是跟在位置参数之后。\n\n## 字典序\n\
    \n*字典序*是 Python 在排序字符串和某些其他类型时默认使用的顺序。本质上，这就像字符串在传统词典中出现的顺序。例如，当对两个单词排序时，会比较首字母。如果首字母不同，那么包含在字母表中出现较早的首字母的单词会排在另一个之前。如果首字母相同，则比较第二个字母，依此类推。如果字母数量不同，但所有可比较的字母都相同，那么较短的单词会排在另一个之前。因此，例如，在排序后的单词列表中，单词\
    \ 'sort' 会出现在单词 'sorted' 之前。\n\n> ¹字典在这里有点特殊，因为元素添加到字典的顺序不一定与它们在迭代时出现的顺序相同，但存在一个底层顺序。此外，Python\
    \ 确实提供了一个 orderedDict 类型（由 collections 模块提供），它在迭代时保留添加的顺序。但这些都是次要的点。\n\n## 列表\n\
    \n列表（类型 `list`）是其他对象的可变容器。列表是序列，这意味着它们的内容是有序的（列表中的每个对象在列表中都有一个特定的位置）。列表是可迭代的，这意味着我们可以在\
    \ `for` 循环中遍历它们。我们可以通过将列表字面量赋值给一个变量来创建列表：\n\n```\ncheeses = ['gouda', 'brie',\
    \ 'mozzarella', 'cheddar']\n```\n\n或者我们可以使用列表构造函数从其他可迭代对象创建列表：\n\n```\n# 这创建了列表\
    \ ['a', 'b', 'c']\nletters = list(('a', 'b', 'c'))\n# 这创建了列表 ['w', 'o', 'r', 'd']\n\
    letters = list('word')\n```\n\n列表构造函数也可用于制作列表的副本。\n\n## 字面量\n\n字面量是给定类型的实际值。`1`\
    \ 是 `int` 类型的字面量。`'muffin'` 是 `str` 类型的字面量。`['foo', 'bar', 123]` 是 `list` 类型的字面量。在求值过程中，字面量求值为其自身。\n\
    \n## 局部变量\n\n*局部变量*是在有限作用域内定义的变量。本文中我们见过的局部变量是在函数内通过赋值创建的变量。\n\n## 循环\n\n*循环*是一种重复零次或多次的结构，对于\
    \ `while` 循环取决于条件，对于 `for` 循环取决于正在迭代的可迭代对象。`break` 和（在某些情况下）`return` 可用于退出一个可能原本会继续的循环。\n\
    Python 支持两种循环：`while` 循环在某个条件为真时持续执行，以及 `for` 循环遍历某个可迭代对象。\n\n## Matplotlib\n\n\
    Matplotlib 是一个广泛使用的库，用于在 Python 中创建绘图、动画和其他数据可视化。它*不是* Python 标准库的一部分，因此必须在使用前安装。\n\
    更多信息，请参见：https://matplotlib.org。\n\n## 方法\n\n*方法*是绑定到特定类型对象的函数。² 例如，我们有列表方法如 `.append()`、`.pop()`\
    \ 和 `.sort()`，字符串方法如 `.upper()`、`.capitalize()` 和 `.strip()`，等等。方法通过使用点运算符（如上面标识符所示）来访问。因此，要对列表\
    \ `lst` 排序，我们使用 `lst.sort()`；要从非空列表 `lst` 中移除并返回最后一个元素，我们使用 `lst.pop()`；要返回字符串\
    \ `s` 的首字母大写副本，我们使用 `s.capitalize()`；等等。\n\n## 模块\n\n*模块*是 Python 对象和代码的集合。例如\
    \ `math` 模块、`csv` 模块和 `statistics` 模块。为了使用模块，必须导入它，*例如*，`import math`。导入的模块被赋予*命名空间*，我们使用点运算符访问模块内的函数。例如，导入\
    \ `math` 模块时，命名空间是 `math`，我们这样访问该命名空间内的函数：`math.sqrt(2)`，这是一个例子。\n\n如果你想重用另一个程序中编写的函数，你可以导入你自己编写的程序。在这种情况下，你的程序可以作为模块导入。\n\
    \n## 取模\n\n使用取模运算符时，我们将第二个操作数称为*模数*。例如，在 `23 % 5` 的情况下，模数是 5。\n\n另见：欧几里得除法和同余。\n\
    \n## 蒙特卡洛\n\n*蒙特卡洛*方法利用重复随机抽样（来自某个分布）来解决某类问题。例如，我们可以使用蒙特卡洛方法来近似 π。蒙特卡洛方法广泛应用于物理学、经济学、运筹学管理以及许多其他领域。\n\
    \n## 可变\n\n如果一个对象（类型）在创建后可以被更改，则它是可变的。列表和字典是可变的，而类型为 `int`、`float`、`str` 和 `tuple`\
    \ 的对象则不是。\n\n## 名称（见：标识符）\n\n*名称*与*标识符*同义。\n\n²严格来说，方法是在类中定义的函数。\n\n## 命名空间\n\n\
    命名空间是存储 Python 对象的地方，它们非常像但不完全等同于字典。例如，像字典键一样，命名空间内的标识符是唯一的（你不能在同一个命名空间中有两个名为\
    \ x 的不同变量）。\n大多数情况下，你是在全局命名空间中工作。然而，函数和你导入的模块有自己的命名空间。对于函数，函数的命名空间在函数被调用时创建，在函数返回时销毁。对于模块，我们使用点运算符引用模块命名空间内的元素（见：模块）。\n\
    \n## 节点（图；见：顶点）\n\n在图的上下文中，*节点*和顶点是同义词。\n\n## 对象\n\nPython 中几乎任何不是关键字、运算符或标点符号的东西都是对象。每个对象都有一个类型，所以我们有类型为\
    \ int 的对象、类型为 str 的对象，等等。函数是类型为 function 的对象。\n如果你学习面向对象编程，你将学习如何定义自己的类型，并实例化这些类型的对象。\n\
    \n## 运算符\n\n运算符是一个特殊符号（或符号组合），它接受一个或多个操作数并执行某种操作，如加法、乘法、*等等*，或某种比较。运算符包括（但不限于）+、-、*、**、/、//、%、=、==、>、<、>=、<=\
    \ 和 !=。只有一个操作数的运算符称为*一元运算符*，*例如*，一元取负。接受两个操作数的运算符称为*二元运算符*。\n某些运算符根据其操作数的类型执行不同的操作。这称为*运算符重载*。例如：如果两个操作数都是数字，+\
    \ 执行加法；如果两个操作数都是字符串，或者两个操作数都是列表，+ 执行连接。\n\n## 参数（和形式参数）\n\n函数定义可以包含一个或多个*参数*（也称为*形式参数*）。这些参数在函数被调用时为实参提供名称。例如：\n\
    \n```\ndef square(x):\n    return x * x\n```\n\n在这个例子中，x 是形式参数，为了调用函数，我们必须提供一个相应的实参。"
