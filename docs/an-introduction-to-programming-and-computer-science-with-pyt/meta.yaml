    \ a *float* before attempting the calculation (remember, the *input()* function\
    \ *always* returns a string).\nWe go back to our code and fix it so that the string\
    \ we get from *input()* is converted to a *float* using the *float* constructor,\
    \ *float()*. Having made this change, let’s try the program again."
