  md: "# Appendix A\n\n# Glossary\n\n# absolute value\n\nThe *absolute value* of a\
    \ number is its distance from the origin (0), that is, the magnitude of the number\
    \ regardless of its sign. In mathematics this is written with vertical bars on\
    \ either side of the number or variable in question. Thus\n\n$|4| = 4$\n$|-4|\
    \ = 4$\n\nand generally,\n\n$|x| = \\begin{cases} x & x \\geq 0 \\ -x & x < 0.\
    \ \\end{cases}$\n\nThe absolute value of any numeric literal, variable, or expression\
    \ can be calculated with the Python built-in, abs().\n\n# accumulator\n\nAn *accumulator*\
    \ is a variable that's used to hold a cumulative result within a loop. For example,\
    \ we can calculate the sum of all numbers from 1 to 10, thus\n\n```\ns = 0  #\
