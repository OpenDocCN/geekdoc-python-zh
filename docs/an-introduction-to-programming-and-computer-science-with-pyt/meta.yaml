    # 8.3 Branching


    Up until this point, all the programs we''ve seen and written proceed in a linear
    fashion from beginning to end. This is fine for some programs, but it''s rather
    inflexible. Sometimes we want our program to respond differently to different
    conditions.


    Imagine we wanted to write a program that calculates someone''s income tax. The
    US Internal Revenue Service recognizes five different filing statuses:


    ```

    >>> ord(''a'')

    97

    >>> ord(''b'')

    98

    >>> ord(''É'')

    163

    ```


    > See also: Joel Spolsky''s *The Absolute Minimum Every Software Developer Absolutely,
    Positively Must Know About Unicode and Character Sets (No Excuses!)* last seen
    in the wild at https://www.joelonsoftware.com/2003/10/08/the-absolute-minimum-every-software-developer-absolutely-positively-must-know-about-unicode-and-character-sets-no-excuses/'
