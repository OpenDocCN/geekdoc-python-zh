    \ follow this branch, we print “x is zero”, and we’re done.\n\nHere it is in Python,\n\
    \n```\n\"\"\"\nCS 1210\nPositive, negative, or zero?\nUsing nested if.\n\"\"\"\
    \n\nx = float(input('Please enter an real number: '))\n\nif x > 0:\n    print('x\
    \ is positive!')\nelse:\n    if x < 0:\n        print('x is negative!')\n    else:\n\
