- md: "Some textbooks use this, and there are abundant examples on the internet, perhaps\
    \ attempting to make Python code look more similar to languages like C or Java\
    \ (in the case of Java, an executable program *must* implement `main()`). But\
    \ again, *this is not the Python way*.\n\nHere's how things work in Python. Python\
    \ has what is called the *top-level code environment*. When a program is executed\
    \ in this environment (which is what happens when you run your code within your\
    \ IDE or from the command line), there's a special variable `__name__` which is\
    \ automatically set to the value `'__main__'`.¹ `'__main__'` is the name of the\
    \ environment in which top-level code is run.\n\nSo if we wish to distinguish\
    \ portions of our code which are automatically run when executed (sometimes called\
    \ *driver code*) from other portions of our code (like imports and the functions\
    \ we define), we do it thus:\n\n```\n\"\"\"\nA program which prompts the user\
    \ for a radius of a circle,\nr, and calculates and reports the circumference.\n\
    \"\"\"\n\nimport math\n\ndef circumference(r_):\n    return 2 * math.pi * r_\n\
    \nif __name__ == '__main__':\n\n    # This code will only be executed if this\
    \ module\n    # (program) is run. It will *not* be executed if\n    # this module\
    \ is imported.\n\n    r = float(input('Enter a non-negative real number: '))\n\
    \    if r >= 0:\n        c = circumference(r)\n        print(f'The circumference\
    \ of a circle of radius '\n              f'{r:.3f} is {c:.3f}.')\n    else:\n\
    \        print(f'I asked for a non-negative number, and '\n              f'{r}\
    \ is negative!')\n```\n\nLet's say we saved this file as `circle.py`. If we were\
    \ to run this program from our IDE or from the command line with\n\n```\n$ python\
    \ circle.py\n```\n\nPython would read the file, would see that we're executing\
    \ it, and thus would set `__name__` equal to `'__main__'`. Then, after reading\
    \ the definition of the function `circumference(r_)`, it would reach the `if`\
    \ statement,\n\n¹Some other programming languages refer to the top-level as the\
    \ *entry point*. `'__main__'` is the name of a Python program's entry point.\n\
    \n```\nif __name__ == '__main__':\n```\n\nThis condition evaluates to True, and\
    \ the code nested within this if statement would be executed. So it would prompt\
    \ the user for a radius, and then check for valid input and return an appropriate\
    \ response.\n\n## Another simple demonstration\n\nConsider this Python program\n\
    \n```\n\"\"\"\ntlce.py (top-level code environment)\nAnother program to demonstrate\
    \ the significance\nof __name__ and __main__.\n\"\"\"\n\nprint(__name__)\n\nif\
    \ __name__ == '__main__':\n    print(\"Hello World!\")\n```\n\nCopy this code\
    \ and save it as tlce.py (short for top-level code environment). Then, try running\
    \ this program from within your IDE or from the command line. What will it print\
    \ when you run it? It should print\n\n```\n__main__\nHello World!\n```\n\nSo,\
    \ you see, when we run a program in Python, Python sets the value of the variable\
    \ __name__ to the string '__main__', and then, when the program performs the comparison\
    \ __name__ == '__main__' this evaluates to True, and the code within the if is\
    \ executed.\n\n## What happens if we import our module in another program?\n\n\
    Now write another program which imports this module (formally we refer to Python\
    \ programs as modules).\nIn the same directory where you have tlce.py, create\
    \ a new file\n\n```\n\"\"\"\nA program which imports tlce (from the previous example).\n\
    \"\"\"\n\nimport tlce\n```\n\nSave this as use_tlce.py and then run it. What is\
    \ printed? This program should print\n\ntlce\n\nSo, if we import tlce then Python\
    \ sets __name__ equal to 'tlce', and the body of the if is never executed.\n\n\
    Why would we do this? One reason is that we can write functions in one module,\
    \ and import the module without executing any of the module's code, but make the\
    \ functions available to us. Sound familiar? It should. Consider what happens\
    \ when we import the math module. Nothing is executed, but now we have math.pi,\
    \ math.sqrt(), math.sin(), etc. available to us.\n\n## A complete example\n\n\
    Earlier we created a program which, given some radius, r, provided by the user,\
    \ calculated the circumference, diameter, surface area, and volume of a sphere\
    \ of radius r. Here it is, with some minor modifications, notably the addition\
    \ of the check on the value of __name__.\n\n```\n\"\"\"\nSphere calculator (sphere.py)\n\
    \nPrompts the user for some radius, r, and then prints\nthe circumference, diameter,\
    \ surface area, and volume\nof a sphere with this radius.\n\"\"\"\n\nimport math\n\
    \ndef circumference(r_):\n    return 2 * math.pi * r_\n\ndef diameter(r_):\n \
    \   return 2 * r_\n\ndef surface_area(r_):\n    return 4 * math.pi * r_ ** 2\n\
    \ndef volume(r_):\n    return 4 / 3 * math.pi * r_ ** 3\n\nif __name__ == '__main__':\n\
    \    r = float(input(\"Enter a radius >= 0.0: \"))\n    if r < 0:\n        print(\"\
    Invalid input\")\n    else:\n        print(f\"The diameter is \"\n           \
    \   f\"{diameter(r):0,.3f} units.\")\n        print(f\"The circumference is \"\
    \n              f\"{circumference(r):0,.3f} units.\")\n        print(f\"The surface\
    \ area is \"\n              f\"{surface_area(r):0,.3f} units squared.\")\n   \
    \     print(f\"The volume is \"\n              f\"{volume(r):0,.3f} units cubed.\"\
    )\n```\n\nNow we have a program that prompts the user for some radius, $r$, and\
    \ uses some convenient functions to calculate these other values for a sphere.\
    \ But it's not a stretch to see that we might want to use these functions somewhere\
    \ else!\n\nLet's say we're manufacturing yoga balls—those inflatable balls that\
    \ people use for certain exercises requiring balance. We'd want to know how much\
    \ plastic we'd need to manufacture some number of balls. Say our yoga balls are\
    \ 33 centimeters in radius when inflated, and that we want the thickness of the\
    \ balls to be 0.1 centimeter.\n\nIn order to complete this calculation, we'll\
    \ need to calculate volume. Why reinvent the wheel? We've already written a function\
    \ to do this!\n\nLet's import sphere.py and use the function provided by this\
    \ module.\n\n```\n\"\"\"\nYoga ball material requirements\n\"\"\"\n\nimport sphere\n\
    # sphere.py must be in the same directory for this to work\n\nRADIUS_CM = 33\n\
    THICKNESS_CM = 0.1\nVINYL_G_PER_CC = 0.95\nG_PER_KG = 1000\n\nif __name__ == '__main__':\n\
    \    balls = int(input(\"How many balls do you want \"\n                     \"\
    to manufacture this month? \"))\n    outer = sphere.volume(RADIUS_CM)\n    inner\
    \ = sphere.volume(RADIUS_CM - THICKNESS_CM)\n    material_per_ball = outer - inner\n\
    \    total_material = balls * material_per_ball\n    total_material_by_weight\
    \ = total_material / VINYL_G_PER_CC / G_PER_KG\n\n    print(f\"To make {balls}\
    \ balls, you will need \"\n          f\"{total_material:,.1f} cc of vinyl.\")\n\
    \    print(f\"Order at least \"\n          f\"{total_material_by_weight:,.1f}\
    \ \"\n          f\"kg of vinyl to meet material requirements.\")\n```\n\nSee?\
    \ We've imported sphere so we can use its functions. When we import sphere, __name__\
    \ (for sphere) takes on the value sphere so the code under if __name__ == '__main__'\
    \ isn't executed!\n\nThis allows us to have our cake (a program that calculates\
    \ diameter, circumference, surface area, and volume of a sphere) and eat it too\
    \ (by allowing imports and code reuse)! How cool is that?\n\n## What's up with\
    \ the funny names?\n\nThese funny names `__name__` and `'__main__'` are called\
    \ *dunders*. Dunder is short for *double underscore*. This is a naming convention\
    \ that Python uses to set special variables, methods, and functions apart from\
    \ the typical names programmers use for variables, methods, and functions they\
    \ define.\n\n## 9.2 Program structure\n\nThere is an order to things, and programs\
    \ are no different. Your Python code should follow this general layout:\n\n1.\
    \ docstring\n2. imports (if any)\n3. constants (if any)\n4. function definitions\
    \ (if any)\n\n... and then, nested under `if __name__ == '__main__':`, all the\
    \ rest of your code. Here's an example:\n\n```\n\"\"\"\nA docstring, delimited\
    \ by triple double-quotes,\nwhich includes your name and a brief description\n\
    of your program.\n\"\"\"\n\nimport foo   # imports (if any)\n\nMEGACYCLES_PER_FROMBULATION\
    \ = 133   # constants (if any)\n\n# Functions which you define...\ndef f(x_):\n\
    \    return 2 * x_ + 1\n\ndef g(x_):\n    return (x_ - 1) ** 2\n\n# The rest of\
    \ your code...\nif __name__ == '__main__':\n    x = float(input(\"Enter a real\
    \ number: \"))\n    print(f\"Answer: {f(g(x))\n            / MEGACYCLES_PER_FROMBULATION}\
    \ megacycles!\")\n```\n\n## 9.3 Iterative and incremental development\n\n*Incremental\
    \ development* is a process whereby we build our program incrementally—often in\
    \ small steps or by components. This is a structured approach to software development\
    \ that helps manage complexity and improve code quality."
  mdcn: "一些教科书会使用这种写法，网上也有大量示例，或许是为了让Python代码看起来更像C或Java这类语言（对于Java，可执行程序*必须*实现`main()`）。但再次强调，*这不是Python的方式*。\n\
    \n以下是Python中的实际工作方式。Python有一个所谓的*顶层代码环境*。当程序在此环境中执行时（即在IDE中运行代码或从命令行运行时），会有一个特殊变量`__name__`被自动设置为值`'__main__'`。¹\
    \ `'__main__'`是运行顶层代码的环境的名称。\n\n因此，如果我们希望区分代码中在执行时自动运行的部分（有时称为*驱动代码*）与其他部分（如导入和我们定义的函数），可以这样做：\n\
    \n```\n\"\"\"\n一个提示用户输入圆半径r，\n并计算和报告周长的程序。\n\"\"\"\n\nimport math\n\ndef circumference(r_):\n\
    \    return 2 * math.pi * r_\n\nif __name__ == '__main__':\n\n    # 此代码仅在该模块（程序）被运行时执行。\n\
    \    # 如果该模块被导入，则*不会*执行。\n\n    r = float(input('Enter a non-negative real number:\
    \ '))\n    if r >= 0:\n        c = circumference(r)\n        print(f'The circumference\
    \ of a circle of radius '\n              f'{r:.3f} is {c:.3f}.')\n    else:\n\
    \        print(f'I asked for a non-negative number, and '\n              f'{r}\
    \ is negative!')\n```\n\n假设我们将此文件保存为`circle.py`。如果我们从IDE或命令行运行此程序：\n\n```\n$ python\
    \ circle.py\n```\n\nPython会读取该文件，看到我们正在执行它，因此会将`__name__`设置为等于`'__main__'`。然后，在读取函数`circumference(r_)`的定义后，它会到达`if`语句，\n\
    \n¹其他一些编程语言将顶层称为*入口点*。`'__main__'`是Python程序入口点的名称。\n\n```\nif __name__ == '__main__':\n\
    ```\n\n此条件求值为True，嵌套在此if语句中的代码将被执行。因此，它会提示用户输入半径，然后检查输入是否有效并返回相应的响应。\n\n## 另一个简单的演示\n\
    \n考虑这个Python程序\n\n```\n\"\"\"\ntlce.py（顶层代码环境）\n另一个演示__name__和__main__重要性的程序。\n\
    \"\"\"\n\nprint(__name__)\n\nif __name__ == '__main__':\n    print(\"Hello World!\"\
    )\n```\n\n复制此代码并将其保存为tlce.py（顶层代码环境的缩写）。然后，尝试从IDE或命令行运行此程序。运行时它会打印什么？它应该打印\n\n\
    ```\n__main__\nHello World!\n```\n\n所以，你看，当我们运行Python程序时，Python将变量__name__的值设置为字符串'__main__'，然后，当程序执行比较__name__\
    \ == '__main__'时，这求值为True，if内的代码被执行。\n\n## 如果我们在另一个程序中导入我们的模块会怎样？\n\n现在编写另一个导入此模块的程序（正式地，我们将Python程序称为模块）。\n\
    在包含tlce.py的同一目录中，创建一个新文件\n\n```\n\"\"\"\n一个导入tlce（来自上一个示例）的程序。\n\"\"\"\n\nimport\
    \ tlce\n```\n\n将其保存为use_tlce.py，然后运行它。打印了什么？此程序应该打印\n\ntlce\n\n所以，如果我们导入tlce，那么Python将__name__设置为等于'tlce'，if的主体永远不会执行。\n\
    \n我们为什么要这样做？一个原因是我们可以在一个模块中编写函数，然后导入该模块而不执行模块的任何代码，但使函数对我们可用。听起来很熟悉？应该如此。考虑当我们导入math模块时会发生什么。没有执行任何操作，但现在我们有了math.pi、math.sqrt()、math.sin()等可用。\n\
    \n## 一个完整的示例\n\n早些时候，我们创建了一个程序，该程序根据用户提供的某个半径r，计算半径为r的球体的周长、直径、表面积和体积。以下是它，经过一些小的修改，特别是添加了对__name__值的检查。\n\
    \n```\n\"\"\"\n球体计算器（sphere.py）\n\n提示用户输入某个半径r，然后打印\n具有此半径的球体的周长、直径、表面积和体积。\n\"\
    \"\"\n\nimport math\n\ndef circumference(r_):\n    return 2 * math.pi * r_\n\n\
    def diameter(r_):\n    return 2 * r_\n\ndef surface_area(r_):\n    return 4 *\
    \ math.pi * r_ ** 2\n\ndef volume(r_):\n    return 4 / 3 * math.pi * r_ ** 3\n\
    \nif __name__ == '__main__':\n    r = float(input(\"Enter a radius >= 0.0: \"\
    ))\n    if r < 0:\n        print(\"Invalid input\")\n    else:\n        print(f\"\
    The diameter is \"\n              f\"{diameter(r):0,.3f} units.\")\n        print(f\"\
    The circumference is \"\n              f\"{circumference(r):0,.3f} units.\")\n\
    \        print(f\"The surface area is \"\n              f\"{surface_area(r):0,.3f}\
    \ units squared.\")\n        print(f\"The volume is \"\n              f\"{volume(r):0,.3f}\
    \ units cubed.\")\n```\n\n现在我们有了一个程序，它提示用户输入某个半径$r$，并使用一些方便的函数来计算球体的这些其他值。但不难看出，我们可能想在其他地方使用这些函数！\n\
    \n假设我们正在制造瑜伽球——那些用于需要平衡的特定练习的充气球。我们想知道制造一定数量的球需要多少塑料。假设我们的瑜伽球充气后的半径为33厘米，并且我们希望球的厚度为0.1厘米。\n\
    \n为了完成此计算，我们需要计算体积。为什么要重新发明轮子？我们已经编写了一个函数来完成这个！\n\n让我们导入sphere.py并使用此模块提供的函数。\n\
    \n```\n\"\"\"\n瑜伽球材料需求\n\"\"\"\n\nimport sphere\n# sphere.py必须在同一目录中才能工作\n\nRADIUS_CM\
    \ = 33\nTHICKNESS_CM = 0.1\nVINYL_G_PER_CC = 0.95\nG_PER_KG = 1000\n\nif __name__\
    \ == '__main__':\n    balls = int(input(\"How many balls do you want \"\n    \
    \                 \"to manufacture this month? \"))\n    outer = sphere.volume(RADIUS_CM)\n\
    \    inner = sphere.volume(RADIUS_CM - THICKNESS_CM)\n    material_per_ball =\
    \ outer - inner\n    total_material = balls * material_per_ball\n    total_material_by_weight\
    \ = total_material / VINYL_G_PER_CC / G_PER_KG\n\n    print(f\"To make {balls}\
    \ balls, you will need \"\n          f\"{total_material:,.1f} cc of vinyl.\")\n\
    \    print(f\"Order at least \"\n          f\"{total_material_by_weight:,.1f}\
    \ \"\n          f\"kg of vinyl to meet material requirements.\")\n```\n\n看到了吗？我们导入了sphere，以便可以使用它的函数。当我们导入sphere时，__name__（对于sphere）取值为sphere，因此if\
    \ __name__ == '__main__'下的代码没有被执行！\n\n这让我们既能拥有蛋糕（一个计算球体直径、周长、表面积和体积的程序），又能吃掉它（通过允许导入和代码重用）！这有多酷？\n\
    \n## 这些奇怪的名字是怎么回事？\n\n这些奇怪的名字`__name__`和`'__main__'`被称为*dunders*。Dunder是*double\
    \ underscore*（双下划线）的缩写。这是Python使用的一种命名约定，用于将特殊变量、方法和函数与程序员为他们定义的变量、方法和函数使用的典型名称区分开来。\n\
    \n## 9.2 程序结构\n\n事物有其顺序，程序也不例外。你的Python代码应遵循以下一般布局：\n\n1. 文档字符串\n2. 导入（如果有）\n\
    3. 常量（如果有）\n4. 函数定义（如果有）\n\n... 然后，嵌套在`if __name__ == '__main__':`下，是你的所有其余代码。以下是一个示例：\n\
    \n```\n\"\"\"\n一个文档字符串，由三个双引号分隔，\n包含你的名字和程序的简要描述。\n\"\"\"\n\nimport foo   # 导入（如果有）\n\
    \nMEGACYCLES_PER_FROMBULATION = 133   # 常量（如果有）\n\n# 你定义的函数...\ndef f(x_):\n \
    \   return 2 * x_ + 1\n\ndef g(x_):\n    return (x_ - 1) ** 2\n\n# 你的其余代码...\n\
    if __name__ == '__main__':\n    x = float(input(\"Enter a real number: \"))\n\
    \    print(f\"Answer: {f(g(x))\n            / MEGACYCLES_PER_FROMBULATION} megacycles!\"\
    )\n```\n\n## 9.3 迭代式和增量式开发\n\n*增量式开发*是一个过程，我们通过增量式地构建我们的程序——通常以小步骤或按组件进行。这是一种结构化的软件开发方法，有助于管理复杂性和提高代码质量。"
