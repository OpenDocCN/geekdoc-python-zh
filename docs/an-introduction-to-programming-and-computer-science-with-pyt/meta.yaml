- md: "tured, step-by-step approach to writing software. This approach has long been\
    \ used to make the process of building complex programs more reliable. Even if\
    \ you're not undertaking a large-scale software development project, this approach\
    \ can be fruitful. Moreover, decomposing problems into small portions or components\
    \ can help reduce the complexity of the task you're working on at any given time.\n\
    \nHere's an example. Let's say we want to write a program that prompts the user\
    \ for mass and velocity and calculates the resulting kinetic energy. If you haven't\
    \ had a course in physics before, don't sweat it—the formula is rather simple.\n\
    \n$$K_e = \\frac{1}{2}mv^2$$\n\nwhere $K_e$ is kinetic energy in Joules, $m$ is\
    \ mass in kg, and $v$ is velocity in m / s.\n\nHow would you go about this incrementally?\
    \ The first step might be to sketch out what needs to happen with comments.²\n\
    \n```\n\"\"\"\nKinetic Energy Calculator\nEgbert Porcupine <egbert.porcupine@uvm.edu>\n\
    CS 1210\n\"\"\"\n\n# Step 1: Prompt user for mass in kg and save result\n# Step\
    \ 2: Prompt user for velocity in m / s and save result\n# Step 3: Calculate kinetic\
    \ energy in Joules using formula\n# Step 4: Display pretty result\n```\n\nThat's\
    \ a start, but then you remember that Python's input() function returns a string,\
    \ and thus you need to convert these strings to floats. You decide that before\
    \ you start writing code you'll add this to your comments, so you don't forget.\n\
    \n```\n\"\"\"\nKinetic Energy Calculator\nEgbert Porcupine <egbert.porcupine@uvm.edu>\n\
    CS 1210\n\"\"\"\n\n# Step 1: Prompt user for mass in kg and convert input\n# \
    \        to float and save result\n# Step 2: Prompt user for velocity in m / s\
