    \n## 8.8 Flow charts\n\nFlow charts are a convenient and often used tool for representing\
    \ the behavior of a program (or portion thereof) in a diagram. They can help us\
    \ reason about the behavior of a program before we start writing it. If we have\
    \ a good flow chart, this can be a useful “blueprint” for a program. We’ll begin\
    \ with the basics. The most commonly used elements of a flow chart are:\n\n- ellipses,\
    \ which indicate the start or end of a program’s execution,\n- rectangles, which\
    \ indicate performing some calculation or task,\n- diamonds, which indicate a\
    \ decision, and\n- directed edges (a.k.a. arrows), which indicate process flow.\n\
    \n![](img/c79d476b9b167832781fbb4257bb2cb9_158_0.png)\n\n**Figure 8.1:** Basic\
    \ flow chart elements\n\nDiamonds (decisions) have one input and two outputs.\
    \ It is at these points that we test some condition. We refer to this as branching—our\
    \ path through or flow chart can follow one of two branches. If the condition\
    \ is true, we take one branch. If the condition is false, we take the other branch.\n\
    \n![](img/c79d476b9b167832781fbb4257bb2cb9_159_0.png)\n\n### A minimal example\n\
    \nHere's a minimal example—a program which prompts a user for an integer, n, and\
    \ then, if n is even, the program prints “n is even”, otherwise the program prints\
    \ “n is odd!”\n\nIn order to determine whether n is even or odd, we'll perform\
    \ a simple test: We'll calculate the remainder with respect to modulus two and\
    \ compare this value to zero.⁵ If the comparison yields True then we know the\
    \ remainder when dividing by two is zero and thus, n must be even. If the comparison\
    \ yields False then we know the remainder is one and thus, n must be odd. (This\
    \ assumes, of course, that the user has entered a valid integer.)\n\nHere's what\
    \ the flow chart for this program looks like:\n\n> ⁵Remember, if we have some\
    \ integer n, then it must be the case that either n ≡ 0 mod 2 or n ≡ 1 mod 2.\
    \ Those are the *only* possibilities.\n\n![](img/c79d476b9b167832781fbb4257bb2cb9_160_0.png)\n\
    \n**Figure 8.3: Even or odd**\n\n- We start at the top (the ellipse labeled “start”).\n\
    - From there, we proceed to the next step: prompting the user for an integer,\
    \ n.\n- Then we test to see if the remainder when we divide n by two equals zero.\n\
    \  - If it does, we follow the left branch, and we print “n is even!”\n  - Otherwise,\
    \ we follow the right branch, and we print “n is odd!”\n- Finally, our program\
    \ ends.\n\nHere it is, in Python:\n\n```\n\"\"\"\nCS 1210\nEven or odd?\n\"\"\"\
    \n\nn = int(input('Please enter an integer: '))\n\nif n % 2 == 0:\n    print('n\
    \ is even!')\nelse:\n    print('n is odd!')\n```\n\nThe branching takes place\
    \ here:\n\n```\nif n % 2 == 0:\n    print('n is even!')\nelse:\n    print('n is\
    \ odd!')\n```\n\nNotice there are two branches:\n\n- the if clause—the portion\
    \ that’s executed if the expression n % 2 == 0 evaluates to True; and\n- the else\
    \ clause—the portion that’s executed if the expression n % 2 == 0 evaluates to\
    \ False.\n\n### Another example: Is a number positive, negative, or zero?\n\n\
    Let’s say we want to decide if a number is positive, negative, or zero. In this\
    \ instance, there are three possibilities. How do we do this with comparisons\
    \ that only yield True or False? The answer is: with more than one comparison!\n\
    \nFirst we’ll check to see if the number is greater than zero. If it is, it’s\
    \ positive.\n\nBut what if it is not greater than zero? Well, in that case, the\
    \ number could be negative or it could be zero. There are no other possibilities.\
    \ Why? Because we’ve already ruled out the possibility of the number being positive\
    \ (by the previous comparison).\n\nHere’s a flow chart:\n\n![](img/c79d476b9b167832781fbb4257bb2cb9_161_0.png)\n\
    \n**Figure 8.4:** Positive, negative, or zero\n\nAs before, we start at the ellipse\
