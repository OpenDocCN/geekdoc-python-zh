    ```\n\n（`abs()` 是一个内置的 Python 函数，用于计算一个数的绝对值。）这个循环是做什么的？\n\n## 11.4 一个使用 while\
    \ 循环的古老算法\n\n有一个相当优美的算法，用于求两个正整数的最大公约数。\n\n你可能在初等代数课程中回忆过，两个正整数 *a* 和 *b* 的 *最大公约数*\
    \ 是能整除 *a* 和 *b* 而没有余数的最大整数。\n\n例如，120 和 105 的最大公约数是 15。很明显，15 是 120 和 105 的公约数：\n\
    \n120/15 = 8\n105/15 = 7。\n\n我们怎么知道 15 是 *最大* 公约数呢？一种方法是将两个数分解质因数，并找出所有公因数。\n\n\
    **120 = 2 × 2 × 2 × 3 × 5**\n**105 = 3 × 5 × 7**\n\n我们找到了 120 和 105 的公因数，即 3 和\
    \ 5，它们的乘积是 15。因此，15 是 120 和 105 的最大公约数。这种方法可行，而且很可能就是你在初等代数中学到的，然而，对于较大的数字，这种方法变得困难且效率不高。\n\
    \n## 欧几里得算法\n\n欧几里得是古希腊数学家，活跃于公元前 300 年左右。这里有一个以欧几里得命名的算法。它出现在欧几里得的《几何原本》中，但它很可能在欧几里得之前很多年就已出现。²\n\
    \n²一些历史学家认为，尼多斯的欧多克索斯（约公元前 375 年）已经知道这个算法，而且它很可能在那个时间之前就已为人所知。\n\n## 欧几里得最大公约数算法\n\
    \n**输入**：正整数 $a$ 和 $b$\n**输出**：计算 $a$ 和 $b$ 的最大公约数\n**当** $b$ 不等于 0 **时** **执行**\n\
    \    求 $a$ 除以 $b$ 的余数；\n    令 $a$ 等于 $b$；\n    令 $b$ 等于余数；\n**结束**\n$a$ 就是最大公约数\n\
    \n让我们来计算一个例子。假设我们有 $a = 342$ 和 $b = 186$。\n首先，我们求 342/186 的余数。186 进入 342 一次，余数为\
    \ 156。现在，令 $a = 186$，令 $b = 156$。$b$ 等于 0 吗？不，所以我们继续。\n求 186/156 的余数。156 进入 186\
    \ 一次，余数为 30。现在，令 $a = 156$，令 $b = 30$。$b$ 等于 0 吗？不，所以我们继续。\n求 156/30 的余数。30 进入\
    \ 156 五次，余数为 6。现在，令 $a = 30$，令 $b = 6$。$b$ 等于 0 吗？不，所以我们继续。\n求 30/6 的余数。6 进入 30\
    \ 五次，余数为 0。现在，令 $a = 6$，令 $b = 0$。$b$ 等于 0 吗？是的，所以我们完成了。\n最大公约数就是 $a$ 的值，所以最大公约数是\
    \ 6。\n很酷，对吧？\n\n## 为什么它有效？\n\n如果我们有 $a$ 和 $b$ 都是正整数，且 $a > b$，那么我们可以写成\n$$a =\
    \ bq + r$$\n其中 $q$ 是 $a$ 除以 $b$ 的商（欧几里得除法），$r$ 是余数。例如，在我们上面例子的第一步中，我们有\n$$342\
    \ = 1 \\times 186 + 156.$$\n由此可知，$a$ 和 $b$ 的最大公约数等于 $b$ 和 $r$ 的最大公约数。³ 也就是说，\n\
    $$\\gcd(a, b) = \\gcd(b, r).$$\n因此，通过连续的除法，我们不断地将问题简化为更小的项。在算法执行的某个时刻，$b$ 变为 0，我们无法再进行除法。此时，$a$\
    \ 的值就是最大公约数，因为 $a$ 和零的最大公约数就是 $a$！\n\n> ³如果我们有正整数 $a$, $b$ 且 $a > b$，那么根据除法算法，我们知道存在整数\
    \ $q$, $r$，使得 $a = bq + r$，其中 $b > r \\ge 0$。令 $d$ 是 $a$ 和 $b$ 的一个公约数。由于 $d$ 整除\
    \ $a$ 且 $d$ 整除 $b$，那么存在整数 $n$, $m$，使得 $a = dm$ 且 $b = dn$。通过代入，我们有 $dm = dqn +\
    \ r$。重新排列项，我们有 $dm - dqn = r$。通过因式分解，我们有 $d(m - qn) = r$。因此，$d$ 整除 $r$。所以 $a$\
    \ 和 $b$ 的公约数集合与 $b$ 和 $r$ 的公约数集合相同。因此，这两个集合中的最大元素必须相同。因此，我们有 $\\gcd(a, b) = \\\
    gcd(b, r)$，正如所期望的。\n\n这个算法使我们不必对两个数都进行因式分解。\n考虑一个更大的问题实例，$a = 30759$ 和 $b = 9126$。\n\
    对这些数进行因式分解会很麻烦，但欧几里得算法只需八次迭代就能找到答案，即 3。\n\n## 给我看代码！\n\n这是一个 Python 实现。\n\n```python\n\
    \"\"\"\n欧几里得算法的实现。\n\"\"\"\n\na = int(input(\"Enter a positive integer, a: \"\
    ))\nb = int(input(\"Enter a positive integer, b: \"))\n\nwhile b != 0:\n    remainder\
    \ = a % b\n    a = b\n    b = remainder\n\nprint(f\"The GCD is {a}.\")\n```\n\n\
    这是一个优雅的小算法（也是我个人最喜欢的算法之一）。\n它也展示了 while 循环的使用，这是必需的，因为我们事先不知道需要多少次迭代才能得到一个解。\n\
    \n## 11.5 for 循环\n\n我们已经看到，当我们知道我们希望执行一个计算或任务，但事先不知道可能需要多少次迭代时，while 循环很有用。因此，while\
    \ 循环提供一个条件，我们循环直到该条件（无论它是什么）不再成立。\nPython 有另一种类型的循环，在以下情况下很有用：\n\n-   我们确切地知道需要多少次迭代，或者\n\
    -   我们有一些序列（即列表、元组或字符串），并且我们希望对序列的元素（或其某个子集）执行计算、任务或操作。\n\n这种新的循环就是 for 循环。for\
    \ 循环之所以得名，是因为它们为某个可迭代对象中的每个元素进行迭代。Python 的 for 循环总是迭代某个可迭代对象。⁴\n\n⁴Python 中的 for\
    \ 循环与许多其他语言中的工作方式相当不同。一些语言使用计数器，因此 for 循环是 *计数控制* 的。例如，在 Java 中我们可能会写\n\n```java\n\
    for (int i = 0; i < 10; ++i) {\n    // 做一些事情\n}\n```\n\n什么是可迭代对象？当然是我们可以迭代的东西！那可能是什么？我们目前见过的序列类型（列表、元组、字符串）都是序列，这些是可迭代的。我们也可以产生其他可迭代对象（我们很快就会看到）。\n\
    \n这里有一个例子。我们可以通过按顺序逐个获取元素来迭代一个列表 [1, 2, 3]。\n\n```python\n>>> numbers = [1, 2,\
    \ 3]\n>>> for n in numbers:\n...     print(n)\n...\n1\n2\n3\n```\n\n看到了吗？在我们的\
    \ for 循环中，Python 迭代了所提供列表的元素（也称为“成员”）。它从 1 开始，然后是 2，然后是 3。此时列表已耗尽，所以循环终止。\n\n\
    如果这有帮助，你可以将 `for n in numbers:` 读作“对于名为‘numbers’的可迭代对象中的每个数字 n”。\n\n这对元组也适用。\n\
    \n```python\n>>> letters = ('a', 'b', 'c')\n>>> for letter in letters:\n...  \
    \   print(letter)\n...\na\nb\nc\n```\n\n注意语法：`for <某个变量> in <某个可迭代对象>:`。当我们迭代某个可迭代对象时，我们依次获得可迭代对象的每个成员，一次一个。因此，我们需要将这些成员（一次一个）分配给某个变量。\n\
    \n在上面的第一个例子中，变量标识符是 n。\n\n```python\n>>> numbers = [1, 2, 3]\n>>> for n in numbers:\n\
    ...     print(n)\n...\n```\n\n当我们迭代 numbers（一个列表）时，我们一次从列表中获取一个元素（按它们在列表中出现的顺序）。所以在第一次迭代中，n\
    \ 被赋值为 1。在第二次迭代中，n 被赋值为 2。\n\n> 在这种情况下，有一个计数器 i，在循环的每次迭代中更新。这里我们通过使用 ++i（在 Java\
    \ 中使 i 递增）来更新 i。只要控制条件 i < 10 为真，循环就运行。在最后一次迭代中，当 i 等于九时，i 被递增到十，然后条件不再成立，循环退出。Python\
    \ 中的 for 循环不是这样工作的！Python 的 for 循环总是迭代一个可迭代对象。"
