  md: '# The origin of the term “bug”


    ![](img/c79d476b9b167832781fbb4257bb2cb9_189_0.png)


    In interviews, Hopper said that after this discovery, whenever something was wrong
    she and her team would say “There must be a bug.”


    Not everyone likes the term “bug.” For example, the famously grumpy Edsger Dijkstra
    thought that calling errors “bugs” was intellectually dishonest. He made this
    point in an essay with the remarkable title “On the cruelty of really teaching
    computing science.”⁵


    > We could, for instance, begin with cleaning up our language by no longer calling
    a bug a bug but by calling it an error. It is much more honest because it squarely
    puts the blame where it belongs, viz. with the programmer who made the error.
    The animistic metaphor of the bug that maliciously sneaked in while the programmer
    was not looking is intellectually dishonest as it disguises that the error is
    the programmer’s own creation.


    ⁵Edsger Dijkstra, 1988, “On the cruelty of really teaching computing science”.
    This essay is recommended. See the entry in the Edsger Dijkstra archive hosted
    by the University of Texas at Austin: https://www.cs.utexas.edu/~EWD/transcriptions/EWD10xx/EWD1036.html'
