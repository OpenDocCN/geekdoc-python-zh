    # PEP 8


    PEP 8 is the official Python style guide. See: [https://peps.python.org/pep-0008/](https://peps.python.org/pep-0008/)


    # pseudo-random


    It is impossible for a computer to produce a truly random number (whatever that
    might actually be). Instead, they can produce *pseudo-random* numbers which appear
    random and approximate certain distributions. Pseudo-random number generation
    is implemented in Python''s `random` module. See: Chapter 12 Randomness, games,
    and simulations, for more.


    # pure function


    A *pure function* is a function without side effects. Furthermore, the output
    of a pure function (the value returned), depends solely on the argument(s) supplied
    and the function definition, and given the same argument a pure function will
    always return precisely the same result. In this regard, *pure functions* are
    akin to mathematical functions.

    *Cf.* impure function.


    # quantile


    In statistics, a *quantile* is a set of points which divide a distribution or
    data set into intervals of equal probability. For example, if we divide our data
    into quartiles (a quantile of four parts), then each of the four parts has equal
    probability. Note that if dividing into *n* parts we need *n* − 1 values to do
    so.

    Some quantiles have special names. For example, we call the value that divides
    a distribution, sample or population into two equally probable parts a *median*.
    If we divide into 100 parts we call that *percentiles*.


    # quotient


    A *quotient* is the result of division, whether floor division or floating-point
    division. In the case of `/` and `//`, the value yielded is called the quotient.


    # random walk


    A *random walk* is a mathematical object which describes a path in some space
    (say, the integers) taken by a repeated random sequence of steps.'
  - '[PAGE 369]


    For example, if the space in question is the integers, if we start at zero, we
    could take a random walk by repeatedly flipping a fair coin and adding one if
    the toss comes up heads and subtracting one if the toss comes up tails.


    A random walk needn''t be constrained to a single dimension. For example, we could
    model the motion of a particle suspended in a fluid (Brownian motion) by a random
    walk in three-dimensional space.


    Random walks are used in modeling many phenomena in engineering, physics, chemistry,
    ecology, economics, and other domains.


    # read-evaluate-print loop (REPL)


    A *read-evaluate-print* loop is an interactive interface which allows a user to
    type commands or expressions at a prompt, have them performed or evaluated, and
    then see the result printed to the console. This is performed in a loop, allowing
    the user to continue indefinitely until they choose to terminate the session.
    The *Python shell* is an example.


    # remainder


    The *remainder* is the quantity left over after performing Euclidean (floor) division.
    The remainder of such an operation must be in the interval [0, *m*) where *m*
    is the divisor (or modulus). Notice that this is a half-open interval. For example
    if we divide 31 by 6, the remainder is 1. This is implemented in Python with the
    modulo operator, %. See also: modulo, and relevant sections in Chapter 4.


    # replacement field


    Within an f-string, a *replacement field* indicates where expressions are to be
    interpolated within the string. Replacement fields are delimited by curly braces.
    Example: `f"Hello {name}, it''s nice to meet you!"`


    # representation error


    *Representation error* of floating-point numbers is the inevitable result of the
    fact that the real numbers are infinite and the representation of numbers in a
    computer is finite—there are infinitely more real numbers than can be represented
    on a computer using a finite number of bits.


    # return value


    All Python functions return a value, and we call this the *return value*. For
    example, `math.sqrt()` returns the square root of the argument supplied (with
    some restrictions). As noted, all Python functions return a value, though in some
    cases the value returned is `None`. Functions which return `None` include (but
    are not limited to) `print()` and certain list methods which modify a list in
    place (e.g., `.append()`, `.sort()`).'
  - '[PAGE 370]


    # rubberducking


    Rubberducking is a process whereby a programmer tries to explain their code to
    a rubber duck, and in doing so (hopefully) solves a problem or realizes what needs
    to be done in order to fix a bug. Rubber ducks are particularly useful in this
    respect in that they listen without interruption, and, not being too bright, they
    require the simplest possible explanation from the programmer. If you get stuck,
    *talk to the duck*!


    # run time


    *Run time* (or sometimes *runtime*) refers to the time at which a program is run.


    # scope


    *Scope* refers to the visibility or lifetime of a name (or identifier). For example,
    variables first defined in assignment statements within a function or formal parameters
    of a function are *local* to that function, and when the function returns and
    its namespace is destroyed such local variables are out of scope.


    We often refer to *inner scope* as the scope within the body of a function or
    method, and *outer scope* to the code outside the body of a function.


    See also: Chapter 5 Functions, and glossary entry for namespace.


    # script mode


    *Script mode* refers to the mode of operation at work when we run a program that
    we''d previously written and saved. This is distinct from *interactive mode* which
    takes place in the Python shell.


    # seed


    A *seed* is a starting point for calculations used to generate a pseudo-random
    number (or sequence of pseudo-random numbers). Usually, when using functions from
    the random module, we allow the random number generator to use the seed provided
    by the computer''s operating system (which is designed to be as unpredictable
    as possible). Sometimes, however, and especially in cases where we wish to test
    code which includes the use of pseudo-random numbers, we explicitly set the seed
    to a known value. In doing so, we can reproduce the sequence of pseudo-random
    numbers. See: Chapter 12 Randomness, games, and simulations.


    # semantics


    *Semantics* refers to the meaning of our code as distinct from the *syntax* required
    by the language. Bugs are defects of semantics—our code doesn''t mean (or do)
    what we intend it to mean (or do).'
  - "[PAGE 371]\n\n# sequence unpacking\n\nSequence unpacking is a language feature\
    \ which allows us to unpack values within a sequence to individual variables.\
    \ Examples:\n\n```\n>>> lst = [1, 2, 3]\n>>> a, b, c = lst\n>>> a\n1\n>>> b\n\
    2\n>>> c\n3\n>>> coordinates = (44.47844, -73.19758)\n>>> lat, lon = coordinates\n\
    >>> lat\n44.47844\n>>> lon\n-73.19758\n```\n\nIn order for sequence unpacking\
    \ to work, there must be exactly the same number of variables on the left-hand\
    \ side of the assignment operator as there are elements to unpack in the sequence\
    \ on the right-hand side. Accordingly, sequence unpacking is not useful (or perhaps\
    \ impossible) if there are a large number of elements to be unpacked or the number\
    \ of elements is not known. This is why we see examples of tuple unpacking more\
    \ than we do of list unpacking (since lists are mutable, we can't always know\
    \ how many elements they contain).\nTuple unpacking is the preferred idiom in\
    \ Python when working with enumerate(). It is also handy for swapping variables.\n\
    \n# shadowing\n\nShadowing occurs when we use the same identifier in two different\
    \ scopes, with the name in the inner scope shadowing the name in the outer scope.\
    \ In the case of functions, which have their own namespace, shadowing is permitted\
    \ (it's syntactically legal) and Python is not confused about identifiers. However,\
    \ even experienced programmers are often confused by shadowing. It not only affects\
    \ the readability of the code, but it can also lead to subtle defects that can\
    \ be hard to pin down and fix. Accordingly, shadowing is discouraged (this is\
    \ noted in PEP 8).\nHere's an example:\n\n```\ndef square(x):\n    x = x * x\n\
    \    return x\n\nif __name__ == '__main__':\n    x = float(input(\"Enter a number\
    \ and I'll square it: \"))\n    print(square(x))\n```"
- md: "## side effect\n\nA *side effect* is an observable behavior of a function other\
    \ than simply returning a result. Examples of side effects include printing or\
    \ prompting the user for information, or mutating a mutable object that's been\
    \ passed to the function (which affects the object in the outer scope).\nWhenever\
    \ writing a function, any side effects should be included by design and never\
    \ inadvertently. Hence, pure functions are preferred to impure functions wherever\
    \ possible.\n\n## slice / slicing\n\nPython provides a convenient notation for\
    \ extracting a subset from a sequence. This is called *slicing*. For example,\
    \ we can extract every other letter from a string:\n\n```\n>>> s = 'omphaloskepsis'\n\
    >>> s[::2]\n'opaokpi'\n```\n\nWe can extract the first five letters, or the last\
    \ three letters:\n\n```\n>>> s[:5]\n'ompha'\n>>> s[-3:]\n'sis'\n```\n\nWe call\
    \ the result of such operations *slices*. In general, the syntax is `s[<start>:<stop>:<stride>]`,\
    \ where `s` is some sequence. As indicated in the above examples, stride is optional.\n\
    See: Chapter 10 Sequences for more.\n\n## snake case\n\n*Snake case* is a naming\
    \ convention in which all letters are lower case, and words are separated by underscores\
    \ (keeping everything down low, like a snake slithering on the ground). Your variable\
    \ names and function names should be all lower case or snake case. Sometimes stylized\
    \ as `snake_case`.\nSee: PEP 8.\n\n## standard deviation\n\n*Standard deviation*\
    \ is a measure of variability in a distribution, sample or population. Standard\
    \ deviation is calculated with respect to the mean.\nSee: Chapter 14 Data analysis\
    \ and presentation, for details on how standard deviation is calculated.\n\n##\
    \ statement\n\nA *statement* is Python code which does not have an evaluation,\
    \ and thus statements are distinguished from expressions. Examples include assignment\
    \ statements, branching statements, loop control statements, and with statements.\n\
    For example, consider a simple assignment statement:\n\n```\n>>> x = 1\n>>>\n\
    ```\n\nNotice that nothing is printed to the console after making the assignment.\
    \ This is because `x = 1` is a statement and not an expression. Expressions have\
    \ evaluations, but statements do not.\nDon't confuse matters by thinking, for\
    \ example, that the control statement of a while loop has an evaluation. It does\
    \ not. It is true that the *condition* must be an expression, but the control\
    \ statement itself does not have an evaluation (nor do if statements, elif statements,\
    \ etc.).\n\n## static typing / statically typed\n\nSome languages (not Python)\
    \ are *statically typed*. In the case of *static typing* the type of all variables\
    \ must be known *at compile time* and while the value of such variables may change,\
    \ their types cannot. Examples of statically typed languages: C, C++, Haskell,\
    \ OCaml, Java, Rust, Go, etc.\n\n## stride\n\n*Stride* refers to the step size\
    \ in the context of range objects and slices. In both cases, the default is 1,\
    \ and thus can be excluded by the syntax.\nFor example, both `x[0:10]` and `range(0,\
    \ 10)` are syntactically valid. If, however, we wish to use a different stride,\
    \ we must supply the argument explicitly, e.g., `x[0:10:2]` and `range(0, 10,\
    \ 2)`.\n\n## string\n\nA *string* is a sequence, an ordered collection of characters\
    \ (or more precisely Unicode code points).\n\n## string interpolation\n\n*String\
    \ interpolation* is the substitution of values into a string containing some form\
    \ of placeholder. Python supports more than one form of string interpolation,\
    \ but most examples given in this text make use of f-strings for string interpolation.\
    \ There are some use cases which justify the use of earlier, so-called C-style\
    \ string interpretation, but f-strings have been the preferred method for most\
    \ other use cases since their introduction in 2002 with Python 3.6.\n\n## summation\n\
    \nA *summation* (in mathematical notation, with $\\sum$) is merely the addition\
    \ of all terms in some collection (list, tuple, *etc.*). Sometimes, a summation\
    \ is nothing more than adding a bunch of numbers. In such cases, Python's built-in\
    \ `sum()` suffices. In other cases, it is the result of some calculation which\
    \ must be summed, say, for example, summing the squares of all numbers in some\
    \ collection. In cases like this, we implement the summation in a loop.\n\n##\
    \ syntax\n\nThe *syntax* of a programming language is the collection of all rules\
    \ which determine what is permitted as valid code. If your code contains syntax\
    \ errors, a `SyntaxError` (or subclass thereof) is raised.\n\n## terminal\n\n\
    Most modern operating systems provide a *terminal* (or more strictly speaking\
    \ a terminal emulator) which provides a text-based command line interface for\
    \ issuing commands.\nThe details of how to open a terminal window will vary depending\
    \ on your operating system.\n\n## top-level code environment\n\nThe *top-level\
    \ code environment* is where top-level code is executed. We specify the top-level\
    \ code environment (perhaps unwittingly) when we run a Python program (either\
    \ from the terminal or within an IDE). We distinguish the top-level environment\
    \ from other modules which we may import as needed to run our code.\nSee: entry\
    \ point, and Chapter 9 Structure, development, and testing.\n\n## truth value\n\
    \nAlmost everything (apart from keywords) in Python has a *truth value* even if\
    \ it is not strictly a Boolean or something that evaluates to a Boolean. This\
    \ means that programmers have considerable flexibility in choosing conditions\
    \ for flow of control (branching and loop control).\nFor example, we might want\
    \ to perform operations on some list, but only if the list is non-empty. Python\
    \ obliges by treating a non-empty as having a \"true\" truth value (we say it's\
    \ truthy) and by treating an empty list as something \"false\" or \"falsey.\"\
    \ Accordingly, we can write:\n\n```\nif lst:\n    # Now we know the list is not\
    \ empty and we can\n    # do whatever it is we wish to do with the\n    # elements\
    \ of the list.\n```\n\nSee: Chapter 8 Branching and Boolean expressions, especially\
    \ sections covering truthy and falsey.\n\n## truthy\n\nIn Python, many things\
    \ are treated as if they evaluated to True when used as conditions in while loops\
    \ or branching statements. We call such things *truthy*. This includes numerics\
    \ with non-zero values, and any non-empty sequence, and many other objects.\n\n\
    ## tuple\n\nA *tuple* is an immutable sequence of objects. They are similar to\
    \ lists in that they can contain heterogeneous elements (or none at all), but\
    \ they differ from lists in that they cannot be changed once created.\nSee: Chapter\
    \ 10 Sequences for details.\n\n## type\n\nPython allows for many different kinds\
    \ of object. We refer to these kinds as *types*. We have integers (int), floating-point\
    \ numbers (float), strings (str), lists (list), tuples (tuple), dictionaries (dict),\
    \ functions (function), and many other types. An object's type determines not\
    \ just how it is represented internally in the computer's memory, but also what\
    \ kinds of operations can be performed on objects of various types. For example,\
    \ we can divide one number by another (provided the divisor isn't zero) but we\
    \ cannot divide a string by a number or by another string.\n\n## type inference\n\
    \nPython has limited *type inference*, called \"duck typing\" (which means if\
    \ it looks like a duck, and quacks like a duck, chances are pretty good it's a\
    \ duck). So when we write\n\n```\nx = 17\n```"
  mdcn: "## 副作用\n\n*副作用*是指函数除了简单地返回结果之外的可观察行为。副作用的例子包括打印或提示用户输入信息，或者修改传递给函数的可变对象（这会影响外部作用域中的对象）。\n\
    编写函数时，任何副作用都应通过设计有意为之，绝不能无意中产生。因此，在可能的情况下，应优先使用纯函数而非非纯函数。\n\n## 切片 / 切片操作\n\n\
    Python 提供了一种便捷的记法，用于从序列中提取子集。这被称为*切片*。例如，我们可以从字符串中提取每隔一个字母：\n\n```\n>>> s = 'omphaloskepsis'\n\
    >>> s[::2]\n'opaokpi'\n```\n\n我们可以提取前五个字母，或最后三个字母：\n\n```\n>>> s[:5]\n'ompha'\n\
    >>> s[-3:]\n'sis'\n```\n\n我们将此类操作的结果称为*切片*。通常，语法为 `s[<start>:<stop>:<stride>]`，其中\
    \ `s` 是某个序列。如上例所示，步长是可选的。\n另见：第 10 章 序列。\n\n## 蛇形命名法\n\n*蛇形命名法*是一种命名约定，其中所有字母均为小写，单词之间用下划线分隔（所有内容都保持在低位，就像蛇在地面上滑行一样）。你的变量名和函数名应全部小写或使用蛇形命名法。有时也写作\
    \ `snake_case`。\n另见：PEP 8。\n\n## 标准差\n\n*标准差*是衡量分布、样本或总体中变异性的指标。标准差是相对于均值计算的。\n\
    另见：第 14 章 数据分析与呈现，了解标准差的计算方法。\n\n## 语句\n\n*语句*是 Python 中没有求值结果的代码，因此语句与表达式是有区别的。例子包括赋值语句、分支语句、循环控制语句和\
    \ with 语句。\n例如，考虑一个简单的赋值语句：\n\n```\n>>> x = 1\n>>>\n```\n\n注意，赋值后控制台没有打印任何内容。这是因为\
    \ `x = 1` 是一个语句，而不是一个表达式。表达式有求值结果，但语句没有。\n不要混淆，例如，认为 while 循环的控制语句有求值结果。它没有。确实，*条件*必须是一个表达式，但控制语句本身没有求值结果（if\
    \ 语句、elif 语句等也是如此）。\n\n## 静态类型 / 静态类型语言\n\n一些语言（非 Python）是*静态类型*的。在*静态类型*的情况下，所有变量的类型必须在*编译时*已知，虽然这些变量的值可以改变，但它们的类型不能改变。静态类型语言的例子：C、C++、Haskell、OCaml、Java、Rust、Go\
    \ 等。\n\n## 步长\n\n*步长*是指在 range 对象和切片上下文中的步进大小。在这两种情况下，默认值都是 1，因此可以通过语法省略。\n例如，`x[0:10]`\
    \ 和 `range(0, 10)` 在语法上都是有效的。但是，如果我们希望使用不同的步长，则必须显式提供参数，例如 `x[0:10:2]` 和 `range(0,\
    \ 10, 2)`。\n\n## 字符串\n\n*字符串*是一个序列，是字符（或更准确地说是 Unicode 码点）的有序集合。\n\n## 字符串插值\n\
    \n*字符串插值*是将值替换到包含某种占位符的字符串中。Python 支持多种形式的字符串插值，但本文中的大多数示例都使用 f-strings 进行字符串插值。有些用例适合使用早期的、所谓的\
    \ C 风格字符串插值，但自 2002 年 Python 3.6 引入 f-strings 以来，对于大多数其他用例，f-strings 一直是首选方法。\n\
    \n## 求和\n\n*求和*（在数学符号中，用 $\\sum$ 表示）仅仅是将某个集合（列表、元组等）中的所有项相加。有时，求和不过就是将一堆数字相加。在这种情况下，Python\
    \ 的内置 `sum()` 就足够了。在其他情况下，它是需要求和的某些计算的结果，例如，对某个集合中所有数字的平方求和。在这种情况下，我们在循环中实现求和。\n\
    \n## 语法\n\n编程语言的*语法*是确定哪些内容被允许作为有效代码的所有规则的集合。如果你的代码包含语法错误，将引发 `SyntaxError`（或其子类）。\n\
    \n## 终端\n\n大多数现代操作系统都提供一个*终端*（或者更严格地说是一个终端模拟器），它提供了一个基于文本的命令行界面来执行命令。\n如何打开终端窗口的细节因操作系统而异。\n\
    \n## 顶层代码环境\n\n*顶层代码环境*是执行顶层代码的地方。当我们运行一个 Python 程序（无论是从终端还是在 IDE 中）时，我们（可能是无意中）指定了顶层代码环境。我们将顶层环境与可能根据需要导入以运行代码的其他模块区分开来。\n\
    另见：入口点，以及第 9 章 结构、开发与测试。\n\n## 真值\n\nPython 中几乎一切（关键字除外）都有一个*真值*，即使它严格来说不是一个布尔值或求值结果为布尔值的东西。这意味着程序员在选择控制流（分支和循环控制）的条件时具有相当大的灵活性。\n\
    例如，我们可能想对某个列表执行操作，但前提是该列表非空。Python 通过将非空列表视为具有“真”真值（我们说它是 truthy）并将空列表视为“假”或“falsey”来满足这一需求。因此，我们可以这样写：\n\
    \n```\nif lst:\n    # 现在我们知道列表非空，我们可以\n    # 对列表的元素执行任何我们想执行的操作。\n```\n\n另见：第\
    \ 8 章 分支与布尔表达式，特别是涵盖 truthy 和 falsey 的部分。\n\n## 真值为真\n\n在 Python 中，许多东西在用作 while\
    \ 循环或分支语句的条件时，都被视为求值结果为 True。我们称这样的东西为*真值为真*。这包括非零值的数字、任何非空序列以及许多其他对象。\n\n## 元组\n\
    \n*元组*是一个不可变的对象序列。它们与列表相似，因为它们可以包含异构元素（或根本不包含任何元素），但它们与列表不同，因为一旦创建就不能更改。\n另见：第\
    \ 10 章 序列。\n\n## 类型\n\nPython 允许多种不同种类的对象。我们将这些种类称为*类型*。我们有整数（int）、浮点数（float）、字符串（str）、列表（list）、元组（tuple）、字典（dict）、函数（function）以及许多其他类型。一个对象的类型不仅决定了它在计算机内存中的内部表示方式，还决定了可以对各种类型的对象执行哪些操作。例如，我们可以将一个数字除以另一个数字（前提是除数不为零），但我们不能将一个字符串除以一个数字或另一个字符串。\n\
    \n## 类型推断\n\nPython 具有有限的*类型推断*，称为“鸭子类型”（这意味着如果它看起来像鸭子，叫起来像鸭子，那它很可能就是一只鸭子）。所以当我们写\n\
    \n```\nx = 17\n```"
