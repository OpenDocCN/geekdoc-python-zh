    \n## Style\n\n> Programs must be written for people to read, and only incidentally\
    \ for machines to execute.\n–Abelson, Sussman, and Sussman\n\nLearn the rules\
    \ so you know how to break them.\n–The 14th Dalai Lama\n\nThis chapter will introduce\
    \ the concept of good Python style through the use of the PEP 8 style guide. We’ll\
    \ further our understanding of constants, learn about the benefits of using comments,\
    \ and how/when to use them effectively.\n\n### Learning objectives\n\n- You will\
    \ learn about the importance of good Python style and the PEP 8 style guide.\n\
    - You will learn conventions for naming constants.\n- You will learn about comments\
    \ and docstrings in Python and their uses.\n\n### Terms introduced\n\n- camelCase\n\
    - docstring\n- inline comment\n- PEP 8\n- single-line comment\n- snake_case\n\n\
    ## 6.1 The importance of style\n\nAs we learn to write programs, we will also\
    \ learn how to use good style. Good coding style is more important than many beginners\
    \ realize. Using good style:\n\n- helps you read your code more quickly and accurately.\n\
    - makes it easier to identify syntax errors and common bugs.\n- helps clarify\
    \ your reasoning about your code.\n\nMost workplaces and open-source projects\
    \ require conformance to a coding standard. For example, *Google's style guide\
    \ for Python*.<sup>1</sup>\n\nWhen we're solving problems we don't want reading\
    \ code or making decisions about formatting our code to consume more than their\
    \ share of valuable cognitive load. So start off on the right foot and use good\
    \ style from the beginning. That way, you can free your brain to solve problems—that's\
    \ the fun part.\n\nEvery language has its conventions, and you should stick to\
    \ them. This is part of writing readable, idiomatic code.\n\n## 6.2 PEP 8\n\n\
    Fortunately, there is a long-standing, comprehensive style guide for Python called\
    \ PEP 8.<sup>2</sup> The entire style guide *PEP 8 – Style Guide for Python Code*\
    \ is available online.<sup>3</sup> Noted Python developer Kenneth Reitz has made\
    \ a somewhat prettified version at [https://pep8.org/](https://pep8.org/). You\
    \ should consult these resources for a complete guide to good style for Python.\
    \ Many projects in industry and in the open source world enforce the use of this\
    \ standard.\n\nDon't think in terms of saving keystrokes—follow the style guide,\
    \ and you'll find this helps you (and others!) read and understand what you write.\n\
    \n## 6.3 Whitespace\n\nYes! Whitespace is important! Using whitespace correctly\
    \ can make your code *much* more readable.\n\nUse whitespace between operators\
    \ and after commas.<sup>4</sup> Example:\n\n```python\n# Don't do this\n\nx=3.4*y+9-17/2\n\
    \njoules=(kg*m**2)/(sec**2)\n\namount=priceperitem*items\n```\n\nInstead, do this:\n\
    \n```python\n# Better\n\nx = 3.4 * y + 9 - 17 / 2\n\njoules = (kg * m ** 2) /\
    \ (sec ** 2)\n\namount = price_per_item * items\n```\n\nWithout the whitespace\
    \ between operators, your eye and brain have to do much more work to divide these\
    \ up for reading.\n\nSometimes, however, extra whitespace is unnecessary or may\
    \ even hinder readability. You should avoid unnecessary whitespace before closing\
    \ and after opening braces, brackets or parentheses.\n\n```python\n# Don't do\
    \ this\n\npicas = inches_to_picas ( inches )\n\n# Better\n\npicas = inches_to_picas(inches)\n\
    ```\n\nDo not put whitespace after names of functions.\n\n```python\n# Don't do\
    \ this\n\ndef inches_to_points (in):\n    return in * POINTS_PER_INCH\n\n# Better\n\
    \ndef inches_to_points(in):\n    return in * POINTS_PER_INCH\n```\n\nIn doing\
    \ this, we create a tight visual association between the name of a function and\
    \ its parameters.\n\nDo not put whitespace before commas or colons.\n\n```python\n\
    # Don't do this\n\nlst = [3 , 2 , 1]\n\n# Better\nlst = [3, 2, 1]\n```\n\nIt's\
    \ OK to slip a blank line within a block of code to logically separate elements\
    \ but don't use more than one blank line. Exceptions to this are function declarations\
    \ which should be preceded by two blank lines, and function bodies which should\
    \ be followed by two blank lines.\n\n<sup>1</sup> [https://google.github.io/styleguide/pyguide.html](https://google.github.io/styleguide/pyguide.html)\n\
    <sup>2</sup> PEP is short for Python Enhancement Proposal\n<sup>3</sup> [https://peps.python.org/pep-0008/](https://peps.python.org/pep-0008/)\n\
    <sup>4</sup> One exception to this rule is keyword arguments in function calls,\
    \ *e.g.*, the end keyword argument for the built-in print() function."
