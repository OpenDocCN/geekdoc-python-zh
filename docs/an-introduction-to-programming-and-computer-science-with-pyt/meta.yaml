  md: "```\ndef square(x):\n    return x * x\n```\n\ndef is a Python keyword, short\
    \ for “define”, which tells Python we’re defining a function. (**Keywords** are\
    \ reserved words that are part of the syntax of the language. def is one such\
    \ keyword, and we will see others soon.) Functions defined with def must have\
    \ names (a.k.a., “identifiers”),³ so we give our function the name “square”.\n\
    \nNow, in order to calculate the square of something we need to know what that\
    \ something is. That’s where the x comes in. We refer to this as a *formal parameter*\
    \ of the function. When we use this function elsewhere in our code we must supply\
    \ a value for x. Values passed to a function are called *arguments* (however,\
    \ in casual usage it’s not uncommon to hear people use “parameter” and “argument”\
    \ interchangeably).\n\nAt the end of the first line of our definition we add a\
    \ colon. What follows after the colon is referred to as the *body* of the function.\
    \ It is within the body of the function that the actual work is done. The body\
    \ of a function must be indented as shown below—this is required by the syntax\
    \ of the language. It is important to note that *the body of the function is only\
    \ executed when the function is called, not when it is defined*.\n\nIn this example,\
    \ we calculate the square, x * x, and we *return* the result. return is a Python\
    \ keyword, which does exactly that: it returns some value from a function.\n\n\
    Let’s try this in the Python shell to see how it works:\n\n```\n>>> def square(x):\n\
    ...     return x * x\n...\n>>>\n```\n\nHere we’ve defined the function square().\
    \ Notice that if we enter this in the shell, after we hit return after the colon,\
    \ Python replies with ... and indents for us. This is to indicate that Python\
    \ expects the body of the function to follow. Remember: The body of a function\
    \ must be indented. Indentation in Python is syntactically significant (which\
    \ might seem strange if you’ve coded in Java, C, C++, Rust, JavaScript, C#, etc.;\
    \ Python uses indentation rather than braces).\n\nSo we write the body—in this\
    \ case, it’s just a single line. Again, Python replies with ..., essentially asking\
    \ “Is there more?”. Here we hit the return/enter key, and Python understands we’re\
    \ done, and we wind up back at the >>> prompt.\n\nNow let’s use our function by\
    \ calling it. To call a function, we give the name, and we supply the required\
    \ argument(s).\n\n> ³Python does allow for anonymous functions, called “lambdas”,\
    \ but that’s for another day. For the time being, we’ll be defining and calling\
    \ functions as demonstrated here."
