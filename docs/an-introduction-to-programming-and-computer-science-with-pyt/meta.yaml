    ## De Morgan''s Laws


    When working with Boolean expressions *De Morgan''s Laws* provide us with handy
    rules for transforming Boolean expressions from one form to another. Here we''ll
    use a and b to stand in for arbitrary Boolean expressions.


    | not (a or b) | is the same as | (not a) and (not b) |

    | not (a and b) | is the same as | (not a) or (not b) |


    You can think of this as a kind of distributive law for negation. We distribute
    the not over the disjunction (a or b), but when we do, we change the or to and.
    By the same token, we distribute not over the conjunction (a and b), but when
    we do, we change the and to or.

    You''ll see these may come in handy when we get to input validation (among other
    applications).


    ## Supplemental information


    If you''d like to explore this further, here are some good resources:


    - Stanford Encyclopedia of Philosophy''s entry on George Boole: https://plato.stanford.edu/entries/boole

    - Boolean Algebra (Wikipedia): https://en.wikipedia.org/wiki/Boolean_algebra

    - De Morgan''s Laws (Wikipedia): https://en.wikipedia.org/wiki/De_Morgan%27s_laws


    ## 8.2 Comparison operators


    It is often the case that we wish to compare two objects or two values. We do
    this with *comparison operators*.


    **Comparison operators** compare two objects (or the values of these objects)
    and return a Boolean `True` if the comparison holds, and `False` if it does not.


    Python provides us with the following comparison operators (and more):


    | Operator | Example | Explanation |

    | :--- | :--- | :--- |

    | == | a == b | Does the value of a *equal* the value of b? |

    | > | a > b | Is the value of a *greater than* the value of b? |

    | < | a < b | Is the value of a *less than* the value of b? |

    | >= | a >= b | Is the value of a *greater than or equal to* the value of b? |

    | <= | a <= b | Is the value of a *less than or equal to* the value of b? |

    | != | a != b | Is the value of a *not equal to* the value of b? |


    It''s important to understand that *these operators perform comparisons* and expressions
    which use them to *evaluate to a Boolean value* (True or False).


    Let''s demonstrate in the Python shell.


    ```

    >>> a = 12

    >>> b = 31

    >>> a == b

    False

    >>> a > b

    False

    >>> a < b

    True

    >>> a >= b

    False

    >>> a <= b

    True

    >>> a != b

    True

    >>> not (a == b)

    True

    ```


    Now what happens in the case of strings? Let''s try it and find out!


    ```

    >>> a = ''duck''

    >>> b = ''swan''

    >>> a == b

    False

    >>> a > b

    False

    >>> a < b

    True

    >>> a >= b

    False

    >>> a <= b

    True

    >>> a != b

    True

    >>> not (a == b)

    True

    ```


    What''s going on here? When we compare strings, we compare them *lexicographically*.
    A string is *less than* another string if its lexicographic order is lower than
    the other. A string is *greater than* another string if its lexicographic order
    is greater than the other.


    ## What is *lexicographic* order?


    Lexicographic order is like alphabetic order, but is somewhat more general. Consider
    our example ''duck'' and ''swan''. This is an easy case, since both are four characters
    long, so alphabetizing them is straightforward.

    But what about ''a'' and ''aa''? Which comes first? Both start with ''a'' so their
    first character is the same. If you look in a dictionary you''ll find that ''a''
    appears before ''aa''.² Why? Because when comparing strings of different lengths,
    the comparison is made as if the shorter string were padded with an invisible
    character which comes before all other characters in the ordering. Hence, ''a''
    comes before ''aa'' in a lexicographic ordering.


    ```

    >>> ''a'' < ''aa''

    True

    >>> ''a'' > ''aa''

    False

    ```


    The situation is a little more complex than this, because strings can have any
    character in them (not just letters, and hence the term “alphabetic order” loses
    its meaning). So what Python actually compares are the *code points* of Unicode
    characters. Unicode is the system that Python uses to encode character information,
    and Unicode includes many other alphabets (Arabic, Armenian, Cyrillic, Greek,
    Hangul, Hebrew, Hindi, Telugu, Thai, *etc.*), symbols from non-alphabetic languages
    such as Chinese or Japanese Kanji, and many special symbols (®, €, ±, ∞, *etc.*).
    Each character has a number associated with it called a *code point* (yes, this
    is a bit of a simplification). In comparing strings, Python compares these values.³


    > ²Yes, “aa” is a word, sometimes spelled “a''a”. It comes from the Hawai''ian,
    meaning rough and jagged cooled lava (as opposed to *pahoehoe*, which is very
    smooth).

    > ³If you want to get really nosy about this, you can use the Python built-in
    function ord() to get the numeric value associated with each character. *E.g.*,

    > ```

    > >>> ord(''A'')

    > 65

    > ```


    Thus, ''duck'' < ''swan'' evaluates to True, ''wing'' < ''wings'' evaluates to
    True, and ''bingo'' < ''bin'' evaluates to False.


    ```

    >>> ''duck'' < ''swan''

    True

    >>> ''wing'' < ''wings''

    True

    >>> ''bingo'' < ''bin''

    False

    ```


    Now, you may wonder what happens in alphabetic systems, like English and modern
    European languages, which have majuscule (upper-case) and miniscule (lower-case)
    letters (not all alphabetic systems have this distinction).


    ```

    >>> ''a'' > ''A''

    True

    >>> ''a'' < ''A''

    False

    ```


    Upper-case letters have lower order than lower-case letters.


    ```

    >>> ''ALPHA'' < ''aLPHA''

    True

    ```


    So keep this in mind when comparing strings.


    ## 8.3 Branching


    Up until this point, all the programs we''ve seen and written proceed in a linear
    fashion from beginning to end. This is fine for some programs, but it''s rather
    inflexible. Sometimes we want our program to respond differently to different
    conditions.


    Imagine we wanted to write a program that calculates someone''s income tax. The
    US Internal Revenue Service recognizes five different filing statuses:


    ```

    >>> ord(''a'')

    97

    >>> ord(''b'')

    98

    >>> ord(''É'')

    163

    ```


    > See also: Joel Spolsky''s *The Absolute Minimum Every Software Developer Absolutely,
    Positively Must Know About Unicode and Character Sets (No Excuses!)* last seen
    in the wild at https://www.joelonsoftware.com/2003/10/08/the-absolute-minimum-every-software-developer-absolutely-positively-must-know-about-unicode-and-character-sets-no-excuses/


    - single,

    - married, filing jointly,

    - married, filing separately,

    - head of household,

    - qualifying widow or widower with dependent child.⁴


    So in writing our program we''d need to prompt the user for different questions,
    gather different data, perform different calculations, and use different tax tables
    depending on a user''s filing status. Obviously, this cannot be done in a strictly
    linear fashion.


    Instead, we''d want our program to be able to make decisions, and follow different
    *branches*, depending on the results of those decisions.


    This example of an income tax program is by no means unusual. In fact, most real-world
    programs involve some kind of branching.


    When our program includes branches, we execute different portions of our program
    depending on certain conditions. Which conditions might those be? It depends entirely
    on the program we wish to write.


    Thus, most programming languages (Python included) allow for *control flow*—which
    includes branching and conditional execution of code.


    How do we do this? In Python, we accomplish this with `if`, `elif` and `else`
    statements (or combinations thereof).


    ## 8.4 if, elif, and else


    `if`, `elif`, and `else` work with Boolean expressions to determine which branch
    (or branches) our program will execute.


    Since tax preparation is complicated, let''s consider more modest examples.


    ### Examples using if, elif, and else


    A minimal program we could write using `if` and `else` might work like this:


    - Prompt the user to guess a magic word.

    - If the user guesses correctly, print “You WIN!”

    - If the user does not guess correctly, print “You LOSE!”


    Let''s think about what we''d need for this program to work:


    - A secret word.

    - Prompt the user for their guess.

    - Then *compare* the user''s guess with the secret word.

    - Print the appropriate message.


    Here''s how we can do this in Python using `if` and `else`.'
