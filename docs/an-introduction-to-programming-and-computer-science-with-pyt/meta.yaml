    \n```\n[0.274, 2.2359999999999998, 6.590000000000001, 8.826]\n```\n\n注意我们有*四个*值，它们将数据划分为*五个*相等的部分。任何低于\
    \ 0.274 的值都在第一个五分位数中。介于 0.274 和 2.236（四舍五入）之间的值在第二个五分位数中，依此类推。高于 8.826 的值在第五个五分位数中。\n\
    \n如果我们查看美国的值（未在上表中显示），我们发现美国每 10,000 人有 5.99 名牙医，这使其稳稳地处于第三个五分位数中。每 10,000 人拥有超过\
    \ 8.826 名牙医的国家——那些处于前五分之一的国家——是比利时（11.33）、智利（14.81）、哥斯达黎加（10.58）、以色列（8.88）、立陶宛（13.1）、挪威（9.29）、巴拉圭（12.81）和乌拉圭（16.95）。当然，解释这些结果是一件复杂的事情，结果无疑受到*人均*收入、认可牙科学校的数量和规模、执照和认证法规以及其他基础设施和经济因素的影响。³\n\
