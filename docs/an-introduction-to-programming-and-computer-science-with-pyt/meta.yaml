  md: "# Euclid’s GCD algorithm\n\n**input** : Positive integers, $a$ and $b$\n**output**:\
    \ Calculates the GCD of $a$ and $b$\n**while** $b$ does not equal 0 **do**\n \
    \   Find the remainder when we divide $a$ by $b$;\n    Let $a$ equal $b$;\n  \
    \  Let $b$ equal the remainder;\n**end**\n$a$ is the GCD\n\nLet’s work out an\
    \ example. Say we have $a = 342$ and $b = 186$.\nFirst, we find the remainder\
    \ of 342/186. 186 goes into 342 once, leaving a remainder of 156. Now, let $a\
    \ = 186$, and let $b = 156$. Does $b$ equal 0? No, so we continue.\nFind the remainder\
    \ of 186/156. 156 goes into 186 once, leaving a remainder of 30. Now, let $a =\
    \ 156$, and let $b = 30$. Does $b$ equal 0? No, so we continue.\nFind the remainder\
    \ of 156/30. 30 goes into 156 five times, leaving a remainder of 6. Now, let $a\
    \ = 30$, and let $b = 6$. Does $b$ equal 0? No, so we continue.\nFind the remainder\
    \ of 30/6. 6 goes into 30 five times, leaving a remainder of 0. Now, let $a =\
    \ 6$, and let $b = 0$. Does $b$ equal 0? Yes, so we are done.\nThe GCD is the\
    \ value of $a$, so the GCD is 6.\nPretty cool, huh?\n\n# Why does it work?\n\n\
    If we have $a$ and $b$ both positive integers, with $a > b$, then we can write\n\
    $$a = bq + r$$\nwhere $q$ is the quotient of dividing $a$ by $b$ (Euclidean division)\
    \ and $r$ is the remainder. For example, in the first step of our example (above)\
    \ we have\n$$342 = 1 \\times 186 + 156.$$\nIt follows that the GCD of $a$ and\
    \ $b$ equals the GCD of $b$ and $r$.^3 That is,\n$$\\gcd(a, b) = \\gcd(b, r).$$\n\
    Thus, by successive divisions, we continue to reduce the problem to smaller and\
    \ smaller terms. At some point in the execution of the algorithm, $b$ becomes\
    \ 0, and we can divide no further. At this point, what remains as the value for\
    \ $a$ is the GCD, because the greatest common divisor of $a$ and zero is $a$!\n\
    \n> ^3If we have positive integers $a$, $b$ with $a > b$, then by the division\
    \ algorithm, we know there exist integers $q$, $r$, such that $a = bq + r$, with\
    \ $b > r \\ge 0$. Let $d$ be a common divisor of $a$ and $b$. Since $d$ divides\
    \ $a$ and $d$ divides $b$, then there exist integers $n$, $m$, such that $a =\
    \ dm$ and $b = dn$. By substitution, we have $dm = dqn + r$. Rearranging terms\
    \ we have $dm - dqn = r$. By factoring, we have $d(m - qn) = r$. Therefore, $d$\
    \ divides $r$. Thus the set of common divisors of $a$ and $b$ is the same as the\
    \ set of common divisors of $b$ and $r$. Thus the greatest element of each of\
    \ these sets must be the same. Therefore, we have $\\gcd(a, b) = \\gcd(b, r)$,\
    \ as desired."
