    \ 如果有一根刺长 51.2 厘米呢？这应该被认为是异常长的吗？为什么？\n\n### 练习 04\n\n考虑所示的两个分布，A 和 B。\n\n![](img/c79d476b9b167832781fbb4257bb2cb9_311_0.png)\n\
    \n- a. 哪一个的平均值更大？\n- b. 哪一个的标准差更大？\n- c. 哪一条曲线下方的面积更大？（提示：这是个陷阱问题）\n\n### 练习 05\n\
    \n几何平均数是统计学和金融学中使用的另一种平均数。它不是将数据中的所有值相加然后除以值的数量，而是取所有值的*乘积*，然后，如果有 *N* 个值，就取结果的\
    \ *N* 次方根。通常，这仅在数据集中的所有值都为正数时使用。\n\n我们定义几何平均数：\n\n$$\\gamma = \\left( \\prod_{i=0}^{N-1}\
    \ x_i \\right)^{\\frac{1}{N}}$$\n\n其中 $\\prod$ 符号表示重复乘法。就像 $\\sum$ 表示“将它们全部相加”，$\\\
    prod$ 表示“将它们全部相乘”。\n\n我们可以使用分数指数来计算一个数的 *N* 次方根，如所示。例如，要计算某个 *x* 的立方根，我们可以使用 `x\
    \ ** (1 / 3)`。\n\n实现一个函数，计算任意正数值列表的几何平均数。你可以通过将你的函数输出与 `statistics` 模块的 `geometric_mean()`\
    \ 函数的输出进行比较来验证你的结果。\n\n# 第 15 章\n\n## 异常处理\n\n到目前为止，我们已经看到了很多异常：\n\n- SyntaxError\n\
    - IndentationError\n- AttributeError\n- NameError\n- TypeError\n- IndexError\n\
    - ValueError\n- ZeroDivisionError\n- FileNotFoundError\n\n这些是 Python 定义的异常，当发生某些错误时会被*引发*。（还有许多、许多其他异常超出了本教材的范围。）\n\
    \n当发生*未处理*的异常时，你的程序会终止。这通常是一个不希望的结果。\n\n在这里，我们将看到其中一些异常可以使用 `try` 和 `except` 优雅地处理——它们携手并进。在\
    \ `try` 块中，我们包含我们认为*可能*引发异常的代码。在随后的 `except` 块中，我们*捕获*或*处理*某些异常。我们在 `except` 块中做什么将取决于你程序的预期行为。\n\
    \n然而，我们也会看到其中一些——例如 `SyntaxError` 和 `IndentationError`——是无法处理的，因为这些异常发生在 Python\
    \ 首次读取你的代码时，在执行之前。\n\n我们还将看到，其中一些异常只在我们的代码存在缺陷且我们不想处理时才会发生！这些异常就像 `AttributeError`\
    \ 和 `NameError`。试图处理这些异常会掩盖我们代码中应该修复的缺陷。因此，我们甚至不想处理这些异常的情况并不多。\n\n有时我们想处理 `TypeError`\
    \ 或 `IndexError`。我们经常想处理 `ValueError` 或 `ZeroDivisionError`。我们几乎总是想处理 `FileNotFoundError`。这在很大程度上取决于上下文，确定哪些异常应该被处理以及如何处理，其中有一点艺术性。"
