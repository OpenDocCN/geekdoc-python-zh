    # 3.1 What are *types*?


    Consider the universe of wheeled motor vehicles. There are many types: motorcycles,
    mopeds, automobiles, sport utility vehicles, busses, vans, tractor-trailers, pickup
    trucks, all-terrain vehicles, *etc.*, and agricultural vehicles such as tractors,
    harvesters, *etc.* Each type has characteristics which distinguish it from other
    types. Each type is suited for a particular purpose (you wouldn''t use a moped
    to do the work of a tractor, would you?).


    Similarly, everything in Python has a *type*, and every type is suited for a particular
    purpose. Python''s types include numeric types such as integers and floating-point
    numbers; sequences such as strings, lists, and tuples; Booleans (true and false);
    and other types such as sets, dictionaries, ranges, and functions.


    Why do we have different types in a programming language? Primarily for three
    reasons.


    First, different types have different requirements regarding how they are stored
    in the computer''s memory (we''ll take a peek into this when we discuss *representation*).


    Second, certain operations may or may not be appropriate for different types.
    For example, we can''t raise 5 to the ''pumpkin'' power, or divide ''illuminate''
    by 2.


    Third, some operators behave differently depending on the types of their operands.
    For example, we''ll see in the next chapter how + is used to add numeric types,
    but when the operands are strings + performs concatenation. How does Python know
    what operations to perform and what operations are permitted? It checks the type
    of the operands.


    # What''s a *literal*?


    A **literal** is simply fixed values of a given type. For example, 1 is a literal.
    It means, literally, the integer 1. Other examples of literals follow.


    # Some commonly used types in Python


    Here are examples of some types we''ll see. Don''t worry if you don''t know what
    they all are now—all will become clear in time.


    | Type | Description | Example(s) of literals |

    |---|---|---|

    | int | integer | 42, 0, -1 |

    | float | floating-point number | 3.14159, 2.7182, 0.0 |

    | str | string | ''Python'', ''badger'', ''hovercraft'' |

    | bool | Boolean | True, False |

    | NoneType | none, no value | None |

    | tuple | tuple | (), (''a'', ''b'', ''c''), (-1, 1) |'
