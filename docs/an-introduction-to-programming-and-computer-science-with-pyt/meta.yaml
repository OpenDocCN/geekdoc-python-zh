    # keyword


    Certain identifiers are reserved by the syntax of any language as *keywords*.
    Keywords always have the same meaning and cannot be changed by the user. Python
    keywords we''ve seen in this text are: False, None, True, as, assert, break, def,
    del, elif, else, except, for, if, import, in, not, or, pass, return, try, while,
    and with. Feel free to try redefining any of these at the Python shell—you won''t
    succeed.


    # keyword argument


    A keyword argument is an argument provided to a function which is preceded by
    the name. (Note: keyword arguments have absolutely nothing to do with Python keywords.)
    Keyword arguments are specified in the function definition. Defining functions
    with keyword arguments is not covered in this text, but there are a few instances
    of using keyword arguments, notably:


    +   1. The optional `end` keyword argument to the `print()` function, which allows
    the user to override the default ending of printed strings (which is the newline
    character, \n).

    2. The optional `newline` keyword argument to the `open()` function (which is
    a little hack to prevent ugly behavior on certain Windows machines).


    Keyword arguments, if any, always follow positional arguments.


    # lexicographic order


    *Lexicographic order* is how Python orders strings and certain other type by default
    when sorting. This is, essentially, how strings would appear if in a conventional
    dictionary. For example, when sorting two words, the first letters are compared.
    If the first letters are different, then the word which contains the first letter
    which appears earlier in the alphabet appears before the other in the sort. If
    the first letters are the same, then the second letters are compared, and so on.
    If the number of letters is different, but all letters that can be compared are
    the same, then the shorter word appears before the other in the sort. So, for
    example the word ''sort'' would appear before the word ''sorted'' in a sorted
    list of words.


    > ¹Dictionaries are a bit of a special case here, since the order in which elements
    are added to a dictionary is not necessarily the order in which they appear when
    iterating, but there is an underlying order. Moreover, Python does provide an
    orderedDict type (provided by the collections module) which preserves the order
    of addition when iterating. But these are minor points.'
  - '[PAGE 365]


    # list


    A list (type `list`) is a mutable container for other objects. Lists are sequences,
    meaning that their contents are ordered (each object in the list has a specific
    position within the list). Lists are iterable, meaning that we can iterate over
    them in a `for` loop. We can create a list by assigning a list literal to a variable:


    ```

    cheeses = [''gouda'', ''brie'', ''mozzarella'', ''cheddar'']

    ```


    or we may create a list from some other iterable object using the list constructor:


    ```

    # This creates the list [''a'', ''b'', ''c'']

    letters = list((''a'', ''b'', ''c''))

    # This creates the list [''w'', ''o'', ''r'', ''d'']

    letters = list(''word'')

    ```


    The list constructor can also be used to make a copy of a list.


    # literal


    A literal is an actual value of a given type. `1` is a literal of the `int` type.
    `''muffin''` is a literal of the `str` type. `[''foo'', ''bar'', 123]` is a literal
    of the `list` type. During evaluation, literals evaluate to themselves.


    # local variable


    A *local variable* is one which is defined within a limited scope. The local variables
    we''ve seen in this text are those created by assignment within a function.


    # loop


    A *loop* is a structure which is repeated zero or more times, depending on the
    condition if it''s a `while` loop, or depending on the iterable being iterated
    if it''s a `for` loop. `break` and (in some cases) `return` can be used to exit
    a loop which might otherwise continue.

    Python supports two kinds of loops: `while` loops which continue to execute as
    long as some condition is true, and `for` loops which iterate some iterable.


    # Matplotlib


    Matplotlib is a widely used library for creating plots, animations, and other
    visualizations of data in Python. It is *not* part of the Python standard library,
    and so it must be installed before it can be used.

    For more, see: https://matplotlib.org.'
  - '[PAGE 366]


    # method


    A *method* is a function which is bound to objects of a specific type.² For example,
    we have list methods such as `.append()`, `.pop()`, and `.sort()`, string methods
    such as `.upper()`, `.capitalize()`, and `.strip()`, and so on. Methods are accessed
    by use of the dot operator (as indicated in the identifiers above). So to sort
    a list, `lst`, we use `lst.sort()`; to remove and return the last element from
    a non-empty list, `lst`, we use `lst.pop()`; to return a capitalized copy of a
    string, `s`, we use `s.capitalize()`; and so on.


    # module


    A *module* is a collection of Python objects and code. Examples include the `math`
    module, the `csv` module, and the `statistics` module. In order to use a module,
    it must be imported, *e.g.*, `import math`. Imported modules are given *namespaces*,
    and we access functions within a module using the dot operator. For example, when
    importing the `math` module, the namespace is `math` and we access a function
    within that namespace thus: `math.sqrt(2)`, as one example.


    You can import programs you write yourself if you wish to reuse functions written
    in another program. In cases like this, your program can be imported as a module.


    # modulus


    When using the modulo operator, we refer to the second operand as the *modulus*.
    For example, in the case of `23 % 5` the modulus is 5.


    See also: Euclidean division and congruent.


    # Monte Carlo


    *Monte Carlo* method makes use of repeated random sampling (from some distribution),
    in order to solve certain classes of problems. For example, we can use the Monte
    Carlo method to approximate π. The Monte Carlo method is widely used in physics,
    economics, operations management, and many other domains.


    # mutable


    An object (type) is mutable if it can be changed after it''s been created. Lists
    and dictionaries are mutable, whereas objects of type `int`, `float`, `str` and
    `tuple` are not.


    # name (see: identifier)


    *Name* is synonymous with *identifier*.


    ²Strictly speaking, a method is a function defined with a class.'
  - "[PAGE 367]\n\n# namespace\n\nNamespaces are places where Python objects are stored,\
    \ and these are very much like but not identical to dictionaries. For example,\
    \ like dictionary keys, identifiers within a namespace are unique (you can't have\
    \ two different variables named x in the same namespace).\nMost often you're working\
    \ in the global namespace. However, functions, and modules you import have their\
    \ own namespaces. In the case of functions, a function's namespace is created\
    \ when the function is called, and destroyed when the function returns. In the\
    \ case of modules, we refer to elements within a module's namespace using the\
    \ dot operator (see: Module).\n\n# node (graph; see: vertex)\n\nIn the context\
    \ of graphs, *node* and vertex are synonymous.\n\n# object\n\nPretty much anything\
    \ in Python that's not a keyword or operator or punctuation is an object. Every\
    \ object has a type, so we have objects of type int, objects of type str, and\
    \ so on. Functions are objects of type function.\nIf you learn about object-oriented\
    \ programming you'll learn how to define your own types, and instantiate objects\
    \ of those types.\n\n# operator\n\nAn operator is a special symbol (or combination\
    \ of symbols) that takes one or more operands and performs some operation such\
    \ as addition, multiplication, *etc.*, or some kind of comparison. Operators include\
    \ (but are not limited to) +, -, *, **, /, //, %, =, ==, > <, >=, <=, and !=.\
    \ Operators that have a single operand are called *unary operators*, *e.g.*, unary\
    \ negation. Operators that take two operands are called *binary operators*.\n\
    Some operators perform different operations depending on the type of their operands.\
    \ This is called *operator overloading*. Example: If both operands are numeric,\
    \ + performs addition; if both operands are strings, or both operands are lists,\
    \ + performs concatenation.\n\n# parameter (and formal parameter)\n\nA function\
    \ definition may include one or more *parameter* (also called *formal parameter*).\
    \ These parameters provide names for arguments when the function is called. For\
    \ example:\n\n```\ndef square(x):\n    return x * x\n```\n\nIn this example, x\
    \ is the formal parameter, and in order to call the function we must supply a\
    \ corresponding argument."
- md: "## PEP 8\n\nPEP 8 is the official Python style guide. See: [https://peps.python.org/pep-0008/](https://peps.python.org/pep-0008/)\n\
    \n## pseudo-random\n\nIt is impossible for a computer to produce a truly random\
    \ number (whatever that might actually be). Instead, they can produce *pseudo-random*\
    \ numbers which appear random and approximate certain distributions. Pseudo-random\
    \ number generation is implemented in Python's `random` module. See: Chapter 12\
    \ Randomness, games, and simulations, for more.\n\n## pure function\n\nA *pure\
    \ function* is a function without side effects. Furthermore, the output of a pure\
    \ function (the value returned), depends solely on the argument(s) supplied and\
    \ the function definition, and given the same argument a pure function will always\
    \ return precisely the same result. In this regard, *pure functions* are akin\
    \ to mathematical functions.\n*Cf.* impure function.\n\n## quantile\n\nIn statistics,\
    \ a *quantile* is a set of points which divide a distribution or data set into\
    \ intervals of equal probability. For example, if we divide our data into quartiles\
    \ (a quantile of four parts), then each of the four parts has equal probability.\
    \ Note that if dividing into *n* parts we need *n* − 1 values to do so.\nSome\
    \ quantiles have special names. For example, we call the value that divides a\
    \ distribution, sample or population into two equally probable parts a *median*.\
    \ If we divide into 100 parts we call that *percentiles*.\n\n## quotient\n\nA\
    \ *quotient* is the result of division, whether floor division or floating-point\
    \ division. In the case of `/` and `//`, the value yielded is called the quotient.\n\
    \n## random walk\n\nA *random walk* is a mathematical object which describes a\
    \ path in some space (say, the integers) taken by a repeated random sequence of\
    \ steps.\nFor example, if the space in question is the integers, if we start at\
    \ zero, we could take a random walk by repeatedly flipping a fair coin and adding\
    \ one if the toss comes up heads and subtracting one if the toss comes up tails.\n\
    \nA random walk needn't be constrained to a single dimension. For example, we\
    \ could model the motion of a particle suspended in a fluid (Brownian motion)\
    \ by a random walk in three-dimensional space.\n\nRandom walks are used in modeling\
    \ many phenomena in engineering, physics, chemistry, ecology, economics, and other\
    \ domains.\n\n## read-evaluate-print loop (REPL)\n\nA *read-evaluate-print* loop\
    \ is an interactive interface which allows a user to type commands or expressions\
    \ at a prompt, have them performed or evaluated, and then see the result printed\
    \ to the console. This is performed in a loop, allowing the user to continue indefinitely\
    \ until they choose to terminate the session. The *Python shell* is an example.\n\
    \n## remainder\n\nThe *remainder* is the quantity left over after performing Euclidean\
    \ (floor) division. The remainder of such an operation must be in the interval\
    \ [0, *m*) where *m* is the divisor (or modulus). Notice that this is a half-open\
    \ interval. For example if we divide 31 by 6, the remainder is 1. This is implemented\
    \ in Python with the modulo operator, %. See also: modulo, and relevant sections\
    \ in Chapter 4.\n\n## replacement field\n\nWithin an f-string, a *replacement\
    \ field* indicates where expressions are to be interpolated within the string.\
    \ Replacement fields are delimited by curly braces. Example: `f\"Hello {name},\
    \ it's nice to meet you!\"`\n\n## representation error\n\n*Representation error*\
    \ of floating-point numbers is the inevitable result of the fact that the real\
    \ numbers are infinite and the representation of numbers in a computer is finite—there\
    \ are infinitely more real numbers than can be represented on a computer using\
    \ a finite number of bits.\n\n## return value\n\nAll Python functions return a\
    \ value, and we call this the *return value*. For example, `math.sqrt()` returns\
    \ the square root of the argument supplied (with some restrictions). As noted,\
    \ all Python functions return a value, though in some cases the value returned\
    \ is `None`. Functions which return `None` include (but are not limited to) `print()`\
    \ and certain list methods which modify a list in place (e.g., `.append()`, `.sort()`).\n\
    \n## rubberducking\n\nRubberducking is a process whereby a programmer tries to\
    \ explain their code to a rubber duck, and in doing so (hopefully) solves a problem\
    \ or realizes what needs to be done in order to fix a bug. Rubber ducks are particularly\
    \ useful in this respect in that they listen without interruption, and, not being\
    \ too bright, they require the simplest possible explanation from the programmer.\
    \ If you get stuck, *talk to the duck*!\n\n## run time\n\n*Run time* (or sometimes\
    \ *runtime*) refers to the time at which a program is run.\n\n## scope\n\n*Scope*\
    \ refers to the visibility or lifetime of a name (or identifier). For example,\
    \ variables first defined in assignment statements within a function or formal\
    \ parameters of a function are *local* to that function, and when the function\
    \ returns and its namespace is destroyed such local variables are out of scope.\n\
    \nWe often refer to *inner scope* as the scope within the body of a function or\
    \ method, and *outer scope* to the code outside the body of a function.\n\nSee\
    \ also: Chapter 5 Functions, and glossary entry for namespace.\n\n## script mode\n\
    \n*Script mode* refers to the mode of operation at work when we run a program\
    \ that we'd previously written and saved. This is distinct from *interactive mode*\
    \ which takes place in the Python shell.\n\n## seed\n\nA *seed* is a starting\
    \ point for calculations used to generate a pseudo-random number (or sequence\
    \ of pseudo-random numbers). Usually, when using functions from the random module,\
    \ we allow the random number generator to use the seed provided by the computer's\
    \ operating system (which is designed to be as unpredictable as possible). Sometimes,\
    \ however, and especially in cases where we wish to test code which includes the\
    \ use of pseudo-random numbers, we explicitly set the seed to a known value. In\
    \ doing so, we can reproduce the sequence of pseudo-random numbers. See: Chapter\
    \ 12 Randomness, games, and simulations.\n\n## semantics\n\n*Semantics* refers\
    \ to the meaning of our code as distinct from the *syntax* required by the language.\
    \ Bugs are defects of semantics—our code doesn't mean (or do) what we intend it\
    \ to mean (or do).\n\n## sequence unpacking\n\nSequence unpacking is a language\
    \ feature which allows us to unpack values within a sequence to individual variables.\
    \ Examples:\n\n```\n>>> lst = [1, 2, 3]\n>>> a, b, c = lst\n>>> a\n1\n>>> b\n\
    2\n>>> c\n3\n>>> coordinates = (44.47844, -73.19758)\n>>> lat, lon = coordinates\n\
    >>> lat\n44.47844\n>>> lon\n-73.19758\n```\n\nIn order for sequence unpacking\
    \ to work, there must be exactly the same number of variables on the left-hand\
    \ side of the assignment operator as there are elements to unpack in the sequence\
    \ on the right-hand side. Accordingly, sequence unpacking is not useful (or perhaps\
    \ impossible) if there are a large number of elements to be unpacked or the number\
    \ of elements is not known. This is why we see examples of tuple unpacking more\
    \ than we do of list unpacking (since lists are mutable, we can't always know\
    \ how many elements they contain).\nTuple unpacking is the preferred idiom in\
    \ Python when working with enumerate(). It is also handy for swapping variables.\n\
    \n## shadowing\n\nShadowing occurs when we use the same identifier in two different\
    \ scopes, with the name in the inner scope shadowing the name in the outer scope.\
    \ In the case of functions, which have their own namespace, shadowing is permitted\
    \ (it's syntactically legal) and Python is not confused about identifiers. However,\
    \ even experienced programmers are often confused by shadowing. It not only affects\
    \ the readability of the code, but it can also lead to subtle defects that can\
    \ be hard to pin down and fix. Accordingly, shadowing is discouraged (this is\
    \ noted in PEP 8).\nHere's an example:\n\n```\ndef square(x):\n    x = x * x\n\
    \    return x\n\nif __name__ == '__main__':\n    x = float(input(\"Enter a number\
    \ and I'll square it: \"))\n    print(square(x))\n```"
  mdcn: "## PEP 8\n\nPEP 8 是 Python 的官方风格指南。参见：[https://peps.python.org/pep-0008/](https://peps.python.org/pep-0008/)\n\
    \n## 伪随机\n\n计算机不可能产生真正的随机数（无论其实际定义如何）。相反，它们可以产生*伪随机*数，这些数看起来是随机的，并且近似于某些分布。伪随机数生成在\
    \ Python 的 `random` 模块中实现。更多信息请参见：第 12 章 随机性、游戏与模拟。\n\n## 纯函数\n\n*纯函数*是没有副作用的函数。此外，纯函数的输出（返回的值）仅取决于提供的参数和函数定义，并且给定相同的参数，纯函数总是返回完全相同的结果。在这方面，*纯函数*类似于数学函数。\n\
    *参见* 非纯函数。\n\n## 分位数\n\n在统计学中，*分位数*是一组点，它们将一个分布或数据集划分为概率相等的区间。例如，如果我们将数据划分为四分位数（一种四部分的分位数），那么这四个部分中的每一个都具有相等的概率。请注意，如果要划分为\
    \ *n* 部分，我们需要 *n* − 1 个值来实现。\n一些分位数有特殊的名称。例如，我们将一个值称为*中位数*，该值将一个分布、样本或总体划分为两个概率相等的部分。如果划分为\
    \ 100 部分，我们称之为*百分位数*。\n\n## 商\n\n*商*是除法的结果，无论是整数除法还是浮点数除法。对于 `/` 和 `//`，产生的值称为商。\n\
    \n## 随机游走\n\n*随机游走*是一个数学对象，它描述了在某个空间（例如整数）中通过重复的随机步骤序列所走的路径。\n例如，如果所讨论的空间是整数，我们从零开始，可以通过反复抛掷一枚公平的硬币来进行随机游走：如果抛出正面则加一，如果抛出反面则减一。\n\
    \n随机游走不必局限于单一维度。例如，我们可以通过三维空间中的随机游走来模拟悬浮在流体中的粒子的运动（布朗运动）。\n\n随机游走被用于建模工程、物理、化学、生态学、经济学和其他领域的许多现象。\n\
    \n## 读取-求值-打印循环 (REPL)\n\n*读取-求值-打印*循环是一种交互式界面，允许用户在提示符下键入命令或表达式，执行或求值它们，然后在控制台看到打印的结果。这在一个循环中执行，允许用户无限期地继续，直到他们选择终止会话。*Python\
    \ shell* 就是一个例子。\n\n## 余数\n\n*余数*是执行欧几里得（整数）除法后剩下的量。这种运算的余数必须在区间 [0, *m*) 内，其中\
    \ *m* 是除数（或模数）。请注意，这是一个半开区间。例如，如果我们用 31 除以 6，余数是 1。这在 Python 中通过取模运算符 % 实现。另见：取模，以及第\
    \ 4 章的相关部分。\n\n## 替换字段\n\n在 f-string 中，*替换字段*指示表达式要在字符串中插值的位置。替换字段由花括号分隔。示例：`f\"\
    Hello {name}, it's nice to meet you!\"`\n\n## 表示误差\n\n浮点数的*表示误差*是实数无限而计算机中数字表示有限这一事实不可避免的结果——实数的数量比使用有限位数在计算机上可以表示的要多得多。\n\
    \n## 返回值\n\n所有 Python 函数都返回一个值，我们称之为*返回值*。例如，`math.sqrt()` 返回所提供参数的平方根（有一些限制）。如前所述，所有\
    \ Python 函数都返回一个值，尽管在某些情况下返回的值是 `None`。返回 `None` 的函数包括（但不限于）`print()` 和某些就地修改列表的列表方法（例如，`.append()`、`.sort()`）。\n\
    \n## 橡皮鸭调试法\n\n橡皮鸭调试法是一个过程，程序员试图向一只橡皮鸭解释他们的代码，并在此过程中（希望）解决问题或意识到需要做什么来修复错误。橡皮鸭在这方面特别有用，因为它们不会打断你，而且由于不太聪明，它们需要程序员给出最简单的解释。如果你卡住了，*和鸭子谈谈*！\n\
    \n## 运行时\n\n*运行时*（有时也称为 *runtime*）指的是程序运行的时间。\n\n## 作用域\n\n*作用域*指的是名称（或标识符）的可见性或生命周期。例如，首先在函数内的赋值语句或函数的形式参数中定义的变量是该函数的*局部*变量，当函数返回且其命名空间被销毁时，这些局部变量就超出了作用域。\n\
    \n我们通常将*内部作用域*称为函数或方法体内的作用域，将*外部作用域*称为函数体外的代码。\n\n另见：第 5 章 函数，以及命名空间的术语表条目。\n\n\
    ## 脚本模式\n\n*脚本模式*指的是当我们运行先前编写并保存的程序时的工作模式。这与在 Python shell 中进行的*交互模式*不同。\n\n##\
    \ 种子\n\n*种子*是用于生成伪随机数（或伪随机数序列）的计算的起点。通常，在使用 random 模块中的函数时，我们允许随机数生成器使用计算机操作系统提供的种子（该种子被设计为尽可能不可预测）。然而，有时，特别是当我们希望测试包含使用伪随机数的代码时，我们会将种子显式设置为已知值。通过这样做，我们可以重现伪随机数序列。参见：第\
    \ 12 章 随机性、游戏与模拟。\n\n## 语义\n\n*语义*指的是我们代码的含义，与语言要求的*语法*不同。错误是语义上的缺陷——我们的代码没有表达（或执行）我们打算让它表达（或执行）的意思。\n\
    \n## 序列解包\n\n序列解包是一种语言特性，允许我们将序列中的值解包到单个变量中。示例：\n\n```\n>>> lst = [1, 2, 3]\n\
    >>> a, b, c = lst\n>>> a\n1\n>>> b\n2\n>>> c\n3\n>>> coordinates = (44.47844,\
    \ -73.19758)\n>>> lat, lon = coordinates\n>>> lat\n44.47844\n>>> lon\n-73.19758\n\
    ```\n\n为了使序列解包工作，赋值运算符左侧的变量数量必须与右侧序列中要解包的元素数量完全相同。因此，如果有大量元素要解包或元素数量未知，序列解包就不太有用（或者可能不可能）。这就是为什么我们看到元组解包的例子比列表解包更多（因为列表是可变的，我们并不总是知道它们包含多少个元素）。\n\
    元组解包是 Python 中使用 enumerate() 时的首选惯用法。它对于交换变量也很方便。\n\n## 遮蔽\n\n当我们使用相同的标识符在两个不同的作用域中时，就会发生遮蔽，内部作用域中的名称会遮蔽外部作用域中的名称。在函数的情况下，函数有自己的命名空间，遮蔽是允许的（语法上是合法的），Python\
    \ 不会混淆标识符。然而，即使是经验丰富的程序员也经常被遮蔽搞混。它不仅影响代码的可读性，还可能导致难以定位和修复的微妙缺陷。因此，不鼓励使用遮蔽（PEP\
    \ 8 中提到了这一点）。\n这是一个例子：\n\n```\ndef square(x):\n    x = x * x\n    return x\n\n\
    if __name__ == '__main__':\n    x = float(input(\"Enter a number and I'll square\
    \ it: \"))\n    print(square(x))\n```"
