    \ a different team writes the tests for the code.\nThe important things we've\
    \ learned here are:\n\n- Work out in advance of testing (by using a calculator,\
    \ hand calculation, or other method) what the *expected* output of your program\
    \ should be on any given input. Then you can compare the expected value with the\
    \ *actual* value and thus identify any discrepancies.\n- Test your code with a\
    \ wide range of values. In cases where inputs are numeric, test with extreme values.\n\
    - Don't forget how humans might enter input values. Different users might enter\
    \ 1000 in different ways: 1000, 1000.0000, 1E3, 1,000, 1,000.0, *etc.* Equivalent\
    \ values for inputs should always yield equivalent outputs!\n\n## Another example:\
    \ grams to moles\n\nIf you've ever taken a chemistry course, you've converted\
    \ grams to *moles*. A *mole* is a unit which measures quantity of a substance.\
    \ One mole is equivalent to 6.02214076 × 10²³ *elementary entities*, where an\
    \ elementary entity may be an atom, an ion, a molecule, *etc.* depending on context.\
    \ For example, a reaction might yield so many grams of some substance, and by\
    \ converting to moles, we know exactly how many entities this represents. In order\
    \ to convert moles to grams, one needs the mass of the entities in question.\n\
    \nHere's an example. Our reaction has produced 75 grams of water, H₂O. Each water\
    \ molecule contains two hydrogen atoms and one oxygen atom. The atomic mass of\
    \ hydrogen is 1.008 grams per mole. The atomic mass of oxygen is 15.999 grams\
    \ per mole. Accordingly, the molecular mass of one molecule of H₂O is\n\n2 × 1.008\
    \ g/mole + 1 × 15.999 g/mole = 18.015 g/mole.\n\nOur program will require two\
    \ inputs: grams, and grams per mole (for the substance in question). Our program\
    \ should return the number of moles.\nLet's build a table of inputs and outputs\
