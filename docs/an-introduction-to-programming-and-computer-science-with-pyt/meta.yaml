    and what to do about the inevitable bugs.


    # Learning objectives


    +   - You will learn about incremental development, and how to use comments as
    “scaffolding” for your code.

    - You will learn how to organize and structure your code.

    - You will understand how Python handles the main *entry point* of your program,
    and how Python distinguishes between modules that are imported and modules that
    are to be executed.

    - You will be able to write code with functions that can be imported and used
    independently of any *driver code*.

    - You will understand how to test your code, and when to use assertions in your
    code.


    # Terms and Python keywords introduced


    +   - assert (Python keyword) and assertions

    - AssertionError

    - bug

    - driver code

    - dunder

    - entry point and top-level code environment

    - incremental development

    - namespace

    - rubberducking'
