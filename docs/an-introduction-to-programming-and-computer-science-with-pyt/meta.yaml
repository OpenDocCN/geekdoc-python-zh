  md: '# 12.1 The random module


    Consider all the games you''ve ever played that involve throwing dice or shuffling
    a deck of cards. Games like this are fun in part because of the element of chance.
    We don''t know how many dots will come up when we throw the dice. We don''t know
    what the next card to be dealt will be. If we knew all these things in advance,
    such games would be boring!


    Outside of games, there''s a tremendous variety of applications which require
    randomness.


    Simulations of all kinds make use of this—for example, modeling biological or
    ecological phenomena, statistical mechanics and physics, physical chemistry, modeling
    social or economic behavior of humans, operations research, and climate modeling.
    Randomness is also used in cryptography, artificial intelligence, and many other
    domains. For example, the Monte Carlo method (named after the famous casino in
    Monaco) is a widely used technique which repeatedly samples data from a random
    distribution, and has been used in science and industry since the 1940s.


    Python''s `random` module gives us many methods for generating "random" numbers
    or making "random" choices. These come in handy when we want to implement a game
    of chance (or game with some chance element) or simulation.


    But think: how would you write code that simulates the throw of a die or picks
    a "random" number between, say, one and ten? Really. Stop for a minute and give
    it some thought. This is where the `random` module comes in. We can use it to
    simulate such events.


    I put "random" in quotation marks (above) because true randomness cannot be calculated.
    What the Python random module does is generate *pseudo-random* numbers and make
    *pseudo-random* choices. What''s the difference? To the casual observer, there
    is no difference. However, deep down there are deterministic processes behind
    the generation of these pseudo-random numbers and making pseudo-random choices.


    That sounds rather complicated, but using the `random` module isn''t. If we wish
    to use the `random` module, we first import it (just like we''ve been doing with
    the `math` module).


    ```

    import random

    ```


    Now we can use methods within the `random` module.


    # random.choice()


    The `random.choice()` method takes an iterable and returns a pseudo-random choice
    from among the elements of the iterable. This is useful when selecting from a
    fixed set of possibilities. For example:


    ```

    >>> import random

    >>> random.choice([''heads'', ''tails''])

    ''tails''

    ```


    Each time we call `choice` this way, it will make a pseudo-random choice between
    ''heads'' and ''tails'', thus simulating a coin toss.'
