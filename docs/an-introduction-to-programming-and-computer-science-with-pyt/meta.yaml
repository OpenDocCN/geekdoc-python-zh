- md: "## 5.1 Introduction to functions\n\nAmong the most powerful tools we have as\
    \ programmers—perhaps the most powerful tools—are *functions*.\n\nWe’ve already\
    \ seen some built-in Python functions, *e.g.*, `print()` and `type()`. We’ll see\
    \ many others soon.\n\nEssentially, a function is a sub-program which we can “call”\
    \ or “invoke” from within our larger program. For example, consider this code\
    \ which prints a string to the console.\n\n```\nprint('Do you want a cookie?')\n\
    ```\n\nHere we’re making use of built-in Python function `print()`. The developers\
    \ of Python have written this function for you, so you can use it within your\
    \ program. When we use a function, we say we are “calling” or “invoking” the function.\n\
    \nIn the example above, we *call* the `print()` function, supplying the string\
    \ `'Do you want a cookie?'` as an argument.\n\nAs a programmer using this function,\
    \ you don’t need to worry about what goes on “under the hood” (which is quite\
    \ a bit, actually). How convenient!\n\nWhen we call a function, the flow of control\
    \ within our program passes to the function, the function does its work, and then\
    \ returns a value. All Python functions return a value, though in some cases,\
    \ the value returned is `None`.\n\n## Defining a function\n\nPython allows us\
    \ to define our own functions. A **function** is a unit of code which performs\
    \ some calculation or some task. A function may take zero or more **arguments**\
    \ (inputs to the function). The definition of a function may include zero or more\
    \ **formal parameters** which are, essentially, variables that will take on the\
    \ values of the arguments provided. When called, the body of the function is executed.\
    \ In most, but not all cases, a value is explicitly returned. Returned values\
    \ might be the result of a calculation or some status indicator—this will vary\
    \ depending on the purpose of the function. If a value is not explicitly returned,\
    \ the value `None` is returned implicitly.\n\nLet’s take the simple example of\
    \ a function which squares a number. In your mathematics class you might write\n\
    \n$$f(x) = x^2$$\n\nand you would understand that when we apply the function $f$\
    \ to some argument $x$ the result is $x^2$. For example, $f(3) = 9$. Let’s write\
    \ a function in Python which squares the argument supplied:\n\n> ¹Unlike C or\
    \ Java, there is no such thing as a *void* function in Python. All Python functions\
    \ return a value, even if that value is `None`.\n\n²Different languages have different\
    \ names for sub-programs we can call within a larger program, *e.g.*, functions,\
    \ methods, procedures, subroutines, etc., and some of these designations vary\
    \ with context. Also, these are defined and implemented somewhat differently in\
    \ different languages. However, the fundamental idea is similar for all: these\
    \ are portions of code we can call or invoke within our programs.\n\n```\ndef\
    \ square(x):\n    return x * x\n```\n\n`def` is a Python keyword, short for “define”,\
    \ which tells Python we’re defining a function. (**Keywords** are reserved words\
    \ that are part of the syntax of the language. `def` is one such keyword, and\
    \ we will see others soon.) Functions defined with `def` must have names (a.k.a.,\
    \ “identifiers”),³ so we give our function the name “square”.\n\nNow, in order\
    \ to calculate the square of something we need to know what that something is.\
    \ That’s where the `x` comes in. We refer to this as a *formal parameter* of the\
    \ function. When we use this function elsewhere in our code we must supply a value\
    \ for `x`. Values passed to a function are called *arguments* (however, in casual\
    \ usage it’s not uncommon to hear people use “parameter” and “argument” interchangeably).\n\
    \nAt the end of the first line of our definition we add a colon. What follows\
    \ after the colon is referred to as the *body* of the function. It is within the\
    \ body of the function that the actual work is done. The body of a function must\
    \ be indented as shown below—this is required by the syntax of the language. It\
    \ is important to note that *the body of the function is only executed when the\
    \ function is called, not when it is defined*.\n\nIn this example, we calculate\
    \ the square, `x * x`, and we *return* the result. `return` is a Python keyword,\
    \ which does exactly that: it returns some value from a function.\n\nLet’s try\
    \ this in the Python shell to see how it works:\n\n```\n>>> def square(x):\n...\
    \     return x * x\n...\n>>>\n```\n\nHere we’ve defined the function `square()`.\
    \ Notice that if we enter this in the shell, after we hit return after the colon,\
    \ Python replies with `...` and indents for us. This is to indicate that Python\
    \ expects the body of the function to follow. Remember: The body of a function\
    \ must be indented. Indentation in Python is syntactically significant (which\
    \ might seem strange if you’ve coded in Java, C, C++, Rust, JavaScript, C#, etc.;\
    \ Python uses indentation rather than braces).\n\nSo we write the body—in this\
    \ case, it’s just a single line. Again, Python replies with `...`, essentially\
    \ asking “Is there more?”. Here we hit the return/enter key, and Python understands\
    \ we’re done, and we wind up back at the `>>>` prompt.\n\nNow let’s use our function\
    \ by calling it. To call a function, we give the name, and we supply the required\
    \ argument(s).\n\n> ³Python does allow for anonymous functions, called “lambdas”,\
    \ but that’s for another day. For the time being, we’ll be defining and calling\
    \ functions as demonstrated here.\n\n```\n>>> square(5)   # call `square` with\
    \ argument 5\n25\n>>> square(7)   # call `square` with argument 7\n49\n>>> square(10)\
    \  # call `square` with argument 10\n100\n```\n\nNotice that once we define our\
    \ function we can reuse it over and over again. This is one of the primary motivations\
    \ for functions.\nNotice also that in this case, there is no `x` outside the body\
    \ of the function.\n\n```\n>>> x\nTraceback (most recent call last):\n  File \"\
    /blah/blah/code.py\", line 90, in runcode\n    exec(code, self.locals)\n  File\
    \ \"<input>\", line 1, in <module>\nNameError: name 'x' is not defined\n```\n\n\
    In this case, `x` exists only within the body of the function.⁴ The argument we\
    \ supply within the parentheses becomes available within the body of the function\
    \ as `x`. The function then calculates `x * x` and returns the *value* which is\
    \ the result of this calculation.\nIf we wish to use the value returned by our\
    \ function we can save it by assigning the value to some variable, or use it in\
    \ an expression, or even include it as an argument to another function!\n\n##\
    \ Can we create new variables in our functions?\n\nYes. Of course.\n\n```\ndef\
    \ cube(x):\n    y = x ** 3   # assign result local variable `y`\n    return y\
    \      # return the value of `y`\n```\n\nWe refer to such variable names (`y`\
    \ in this example) as *local variables*, and like the formal parameters of a function,\
    \ they exist only within the body of the function.\n\n⁴This is what is called\
    \ \"scope\", and in the example given `x` exists only within the scope of the\
    \ function. It does not exist outside the function—for this we say \"`x` is out\
    \ of scope.\" We'll learn more about scope later.\n\n## Storing a value returned\
    \ by a function\n\nContinuing with our example of `square()`:\n\n```\n>>> a =\
    \ 17\n>>> b = square(a)\n>>> b\n289\n```\n\nNotice that we can supply a variable\
    \ as an argument to our function. Notice also that this object needn’t be called\
    \ `x`.⁵\n\n## Using the value returned by a function in an expression\n\nSometimes\
    \ there’s no need for assigning the value returned by a function to a variable.\
    \ Let’s use the value returned by the `square()` function to calculate the circumference\
    \ of a circle of radius `r`.\n\n```\n>>> PI = 3.1415926\n>>> r = 126.1\n>>> PI\
    \ * square(r)\n49955.123667046\n```\n\nNotice we didn’t assign the value returned\
    \ to a variable first, but rather, we used the result directly in an expression.\n\
    \n## Passing the value returned from a function to another function\n\nSimilarly,\
    \ we can pass the value returned from a function to another function.\n\n```\n\
    >>> print(square(12))\n144\n```\n\nWhat happens here? We pass the value 12 to\
    \ the `square()` function, this calculates the square and returns the result (144).\
    \ This result becomes the value we pass to the `print()` function, and, unsurprisingly,\
    \ Python prints 144.\n\n## Do all Python functions return a value?\n\nThis is\
    \ a reasonable question to ask, and the answer is “yes.” But what about `print()`?\
    \ Well, the point of `print()` is not to return some value but rather to display\
    \ something in the console. We call things that a function does apart from returning\
    \ a value *side effects*. The side effect of calling `print()` is that it displays\
    \ something in the console.\n\n> ⁵In fact, even though it’s syntactically valid\
    \ for a variable in the outer scope to have the same name as a parameter to a\
    \ function, or a local variable within a function, it’s best if they don’t have\
    \ the same identifier. See the section on “shadowing” for more."
  mdcn: "## 5.1 函数简介\n\n作为程序员，我们拥有的最强大的工具之一——或许是最强大的工具——是*函数*。\n\n我们已经见过一些内置的 Python\
    \ 函数，*例如* `print()` 和 `type()`。我们很快会看到更多。\n\n本质上，函数是一个子程序，我们可以在更大的程序中“调用”或“调用”它。例如，考虑这段将字符串打印到控制台的代码。\n\
    \n```\nprint('Do you want a cookie?')\n```\n\n这里我们使用了内置的 Python 函数 `print()`。Python\
    \ 的开发者已经为你编写了这个函数，所以你可以在你的程序中使用它。当我们使用一个函数时，我们说我们正在“调用”或“调用”该函数。\n\n在上面的例子中，我们*调用*了\
    \ `print()` 函数，并提供了字符串 `'Do you want a cookie?'` 作为参数。\n\n作为使用此函数的程序员，你不需要担心“底层”发生了什么（实际上相当多）。多么方便！\n\
    \n当我们调用一个函数时，程序中的控制流会传递给该函数，函数执行其工作，然后返回一个值。所有 Python 函数都返回一个值，尽管在某些情况下，返回的值是\
    \ `None`。\n\n## 定义函数\n\nPython 允许我们定义自己的函数。**函数**是执行某些计算或任务的代码单元。函数可以接受零个或多个**参数**（函数的输入）。函数的定义可以包含零个或多个**形式参数**，这些参数本质上是将接受所提供的参数值的变量。当被调用时，函数体被执行。在大多数情况下（但不是所有情况），会显式返回一个值。返回的值可能是计算结果或某种状态指示器——这将根据函数的目的而变化。如果没有显式返回值，则隐式返回值\
    \ `None`。\n\n让我们以一个对数字求平方的函数为例。在你的数学课上，你可能会写\n\n$$f(x) = x^2$$\n\n你会理解，当我们对某个参数\
    \ $x$ 应用函数 $f$ 时，结果是 $x^2$。例如，$f(3) = 9$。让我们用 Python 编写一个对提供的参数求平方的函数：\n\n> ¹与\
    \ C 或 Java 不同，Python 中没有 *void* 函数这样的东西。所有 Python 函数都返回一个值，即使该值是 `None`。\n\n²不同的语言对可以在更大程序中调用的子程序有不同的名称，*例如*，函数、方法、过程、子程序等，其中一些名称会根据上下文而变化。此外，这些在不同语言中的定义和实现方式也有些不同。然而，所有语言的基本思想是相似的：这些是我们可以在程序中调用或调用的代码部分。\n\
    \n```\ndef square(x):\n    return x * x\n```\n\n`def` 是一个 Python 关键字，是“define”的缩写，它告诉\
    \ Python 我们正在定义一个函数。（**关键字**是语言语法的一部分保留字。`def` 就是这样一个关键字，我们很快会看到其他关键字。）用 `def`\
    \ 定义的函数必须有名称（也称为“标识符”），³ 因此我们给函数取名为“square”。\n\n现在，为了计算某个东西的平方，我们需要知道那个东西是什么。这就是\
    \ `x` 的作用。我们将其称为函数的*形式参数*。当我们在代码的其他地方使用此函数时，必须为 `x` 提供一个值。传递给函数的值称为*参数*（然而，在非正式用法中，人们经常互换使用“parameter”和“argument”）。\n\
    \n在定义的第一行末尾，我们添加一个冒号。冒号之后的内容称为函数的*体*。函数的实际工作是在函数体内完成的。函数体必须缩进，如下所示——这是语言语法要求的。需要注意的是，*函数体仅在函数被调用时执行，而不是在定义时执行*。\n\
    \n在这个例子中，我们计算平方 `x * x`，并*返回*结果。`return` 是一个 Python 关键字，它的作用正是如此：从函数返回某个值。\n\n\
    让我们在 Python shell 中尝试一下，看看它是如何工作的：\n\n```\n>>> def square(x):\n...     return\
    \ x * x\n...\n>>>\n```\n\n这里我们定义了函数 `square()`。注意，如果我们在 shell 中输入这个，在冒号后按回车键后，Python\
    \ 会回复 `...` 并为我们缩进。这是为了表明 Python 期望函数体紧随其后。记住：函数体必须缩进。Python 中的缩进在语法上很重要（如果你用过\
    \ Java、C、C++、Rust、JavaScript、C# 等语言编码，这可能看起来很奇怪；Python 使用缩进而不是花括号）。\n\n所以我们编写函数体——在这个例子中，它只有一行。同样，Python\
    \ 回复 `...`，本质上是在问“还有更多吗？”。这里我们按回车键，Python 理解我们完成了，我们回到了 `>>>` 提示符。\n\n现在让我们通过调用它来使用我们的函数。要调用一个函数，我们给出名称，并提供所需的参数。\n\
    \n> ³Python 确实允许匿名函数，称为“lambdas”，但那是以后的事了。目前，我们将按照这里演示的方式定义和调用函数。\n\n```\n>>>\
    \ square(5)   # 用参数 5 调用 `square`\n25\n>>> square(7)   # 用参数 7 调用 `square`\n49\n\
    >>> square(10)  # 用参数 10 调用 `square`\n100\n```\n\n注意，一旦我们定义了函数，就可以一遍又一遍地重用它。这是函数的主要动机之一。\n\
    还要注意，在这种情况下，函数体外没有 `x`。\n\n```\n>>> x\nTraceback (most recent call last):\n  File\
    \ \"/blah/blah/code.py\", line 90, in runcode\n    exec(code, self.locals)\n \
    \ File \"<input>\", line 1, in <module>\nNameError: name 'x' is not defined\n\
    ```\n\n在这种情况下，`x` 仅存在于函数体内。⁴ 我们在括号内提供的参数在函数体内作为 `x` 变得可用。然后函数计算 `x * x` 并返回作为此计算结果的*值*。\n\
    如果我们希望使用函数返回的值，可以通过将值赋给某个变量来保存它，或在表达式中使用它，甚至将其作为另一个函数的参数！\n\n## 我们能在函数中创建新变量吗？\n\
    \n是的。当然可以。\n\n```\ndef cube(x):\n    y = x ** 3   # 将结果赋给局部变量 `y`\n    return\
    \ y      # 返回 `y` 的值\n```\n\n我们将这样的变量名（本例中的 `y`）称为*局部变量*，与函数的形式参数一样，它们仅存在于函数体内。\n\
    \n⁴这就是所谓的“作用域”，在给定的例子中，`x` 仅存在于函数的作用域内。它在函数外部不存在——为此我们说“`x` 超出了作用域”。我们稍后会了解更多关于作用域的知识。\n\
    \n## 存储函数返回的值\n\n继续我们的 `square()` 示例：\n\n```\n>>> a = 17\n>>> b = square(a)\n\
    >>> b\n289\n```\n\n注意，我们可以将变量作为参数提供给函数。还要注意，这个对象不必称为 `x`。⁵\n\n## 在表达式中使用函数返回的值\n\
    \n有时不需要将函数返回的值赋给变量。让我们使用 `square()` 函数返回的值来计算半径为 `r` 的圆的周长。\n\n```\n>>> PI = 3.1415926\n\
    >>> r = 126.1\n>>> PI * square(r)\n49955.123667046\n```\n\n注意，我们没有先将返回的值赋给变量，而是直接在表达式中使用了结果。\n\
    \n## 将函数返回的值传递给另一个函数\n\n类似地，我们可以将函数返回的值传递给另一个函数。\n\n```\n>>> print(square(12))\n\
    144\n```\n\n这里发生了什么？我们将值 12 传递给 `square()` 函数，该函数计算平方并返回结果（144）。这个结果成为我们传递给 `print()`\
    \ 函数的值，毫不奇怪，Python 打印 144。\n\n## 所有 Python 函数都返回值吗？\n\n这是一个合理的问题，答案是“是的”。但是 `print()`\
    \ 呢？嗯，`print()` 的重点不是返回某个值，而是在控制台中显示某些内容。我们称函数除了返回值之外所做的其他事情为*副作用*。调用 `print()`\
    \ 的副作用是在控制台中显示某些内容。\n\n> ⁵事实上，即使外部作用域中的变量与函数的参数或函数内的局部变量同名在语法上是有效的，但最好它们不要使用相同的标识符。有关更多信息，请参阅“遮蔽”部分。"
