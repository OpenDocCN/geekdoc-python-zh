    \ this:\n\n```\nWhat is your name? Galahad\nWhat is your quest? To seek the Holy\
    \ Grail!\nGalahad\nTo seek the Holy Grail!\n```\n\nNotice that in order to use\
    \ the strings returned by input() we assigned them to variables. Again, remember\
    \ that the input() function returns a string.\n\nThat’s pretty convenient, when\
    \ what we want are strings, but sometimes we want numeric data, so we’ll also\
    \ learn how to convert strings to numeric data (where possible) with the functions\
    \ int() and float().\n\n# 7.4 Converting strings to numeric types\n\n# The problem\n\
    \nHere’s an example which illustrates a problem we encounter when trying to get\
    \ numeric input from the user—the input() function *always* returns a string and\
    \ we can’t do math with strings.\n\n```\n\"\"\"\nPrompts the user for weight in\
    \ kilograms\nand converts to (US customary) pounds.\n\"\"\"\n\nPOUNDS_PER_KILOGRAM\
    \ = 2.204623\n\ndef kg_to_pounds(kg_):\n    return kg_ * POUNDS_PER_KILOGRAM\n\
    ```"
- md: "## 7.5 Some ways to format output\n\nSay we want to write a program which prompts\
    \ a user for some number and calculates the square of that number. Here's a program\
    \ that does just that:\n\n```python\n\"\"\"A program to square a number provided\
    \ by the user\nand display the result. \"\"\"\n\nx = input(\"Enter a number: \"\
    )\nx = float(x)\nresult = x * x\nprint(result)\n```\n\nThat's fine, but perhaps\
    \ we could make this more friendly. Let's say we wanted to print the result like\
    \ this.\n\n17.0 squared is 289.0\n\nHow would we go about it? There are a few\
    \ ways. One somewhat clunky approach would be to use string concatenation. Now,\
    \ we cannot do this:\n\n```python\n\"\"\"A program to square a number provided\
    \ by the user\nand display the result. \"\"\"\n\nx = input(\"Enter a number: \"\
    )\nx = float(x)\nresult = x * x\nprint(x + ' squared is ' + result)\n```\n\nThis\
    \ program fails, with the error:\n\n```\nTraceback (most recent call last):\n\
    \  File \".../squared_with_concatenation.py\", line 4, in <module>\n    print(x\
    \ + ' squared is ' + result)\nTypeError: unsupported operand type(s) for +: 'float'\
    \ and 'str'\n```\n\nWhy? Because we cannot concatenate floats and strings. One\
    \ way to fix this would be to explicitly convert the floating-point values to\
    \ strings. We can do this—explicitly—by using Python's built-in function `str()`.\n\
    \n```python\n\"\"\"A program to square a number provided by the user\nand display\
    \ the result. \"\"\"\n\nx = input(\"Enter a number: \")\nx = float(x)\nresult\
    \ = x * x\nprint(str(x) + ' squared is ' + str(result))\n```\n\nNow, this works.\
    \ Here's a trial.\n\n```python\nkg = input(\"Enter the weight in kilograms (kg):\
    \ \")\nlbs = kg_to_pounds(kg)\nprint(lbs)\n```\n\nIf we save this code to file\
    \ and try running it, it will fail when trying to convert kilograms to pounds.\
    \ We'll get the message:\n\n```\nTypeError: can't multiply sequence by non-int\
    \ of type 'float'\n```\n\nWhat happened? When the program gets input from the\
    \ user:\n\n```python\nkg = input(\"Enter the weight in kilograms (kg): \")\n```\n\
    \nthe value returned from the `input()` function is a string. The value returned\
    \ from the `input()` function is *always* a string. Say the user enters \"82\"\
    \ at the prompt. Then what gets saved with the name `kg` is the *string* '82'\
    \ not the number 82 and we can't multiply a string by a floating point number—that\
    \ makes no sense!\n\nHappily, there's an easy fix. Python provides built-in functions\
    \ that can be used to convert strings to numeric types (if possible). These are\
    \ the integer *constructor*, `int()`, and the float *constructor*, `float()`.\
    \ These functions can take a string which *looks* like it ought to be convertible\
    \ to a number, performs the conversion, and returns the corresponding numeric\
    \ type.\n\nLet's try these out in the Python shell:\n\n```python\n>>> int('82')\n\
    82\n>>> float('82')\n82.0\n```\n\nIn the first instance, we convert the string\
    \ '82' to an int. In the second instance, we convert the string '82' to a float.\n\
    \nWhat happens if we try to convert a string like '82.5'? This works when converting\
    \ to a float, but does not work when converting to an int.\n\n```python\n>>> float('82.5')\
    \  # this works OK\n82.5\n>>> int('82.5')\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nValueError: invalid literal for int()\
    \ with base 10: '82.5'\n```\n\nThe error message is telling us that the string\
    \ '82.5' cannot be converted to an int.\n\nNow, returning to the problem at hand—converting\
    \ user input to a floating point number—here's how we fix the code we started\
    \ with.\n\n```python\n\"\"\"\nPrompts the user for weight in kilograms\nand converts\
    \ to (US customary) pounds.\n\"\"\"\n\nPOUNDS_PER_KILOGRAM = 2.204623\n\ndef kg_to_pounds(kg_):\n\
    \    return kg_ * POUNDS_PER_KILOGRAM\n\nkg = float(input(\"Enter the weight in\
    \ kilograms (kg): \"))\nlbs = kg_to_pounds(kg)\nprint(lbs)\n```\n\nNotice that\
    \ we wrapped the call to `input()` within a call to the `float` constructor. This\
    \ expression is evaluated from the inside out (as you might suspect). First the\
    \ call to `input()` displays the prompt provided, waits for input, then returns\
    \ a string. The value returned (say, '82.5') is then passed to the `float` constructor\
    \ as an argument. The `float` constructor does its work and the constructor returns\
    \ a floating point number, 82.5. Now, when we pass this value to the function\
    \ `kg_to_pounds()`, everything works just fine.\n\nIf you've seen mathematical\
    \ functions before this is no different from something like\n\n$f(g(x))$\n\nwhere\
    \ we would first calculate $g(x)$ and then apply $f$ to the result.\n\n## Another\
    \ scenario with a nasty bug\n\nConsider this program which has a nasty bug:\n\n\
    ```python\n\"\"\"This program has a bug!\nIt does not add as you might expect.\
    \ \"\"\"\n\na = input(\"Enter an integer: \")\nb = input(\"Enter another integer:\
    \ \")\nprint(a + b)\n```\n\nCan you see what the bug is?\nImagine what would happen\
    \ if at the first prompt the user typed \"42\" and at the second prompt the user\
    \ typed \"10\". Of course, 42 plus 10 equals 52, but is that what this program\
    \ would print?\nNo. Here's a trial run of this program:\n\n```\nEnter an integer:\
    \ 42\nEnter another integer: 10\n4210\n```\n\n\"4210\" is not the correct result!\
    \ What happened?\nRemember, `input()` always returns a string, so in the program\
    \ above, `a` is a string and `b` is a string. Thus, when we perform the operation\
    \ `a + b` it's not addition, it's string concatenation!\nWhat do we do in cases\
    \ like this? In order to perform arithmetic with user-supplied values from `input()`,\
    \ we first need to convert input strings to numeric types (as above).\n\n```python\n\
    \"\"\"This program fixes the bug in the earlier program.\"\"\"\n\na = input(\"\
    Enter an integer: \")\nb = input(\"Enter another integer: \")\na = int(a)\nb =\
    \ int(b)\nprint(a + b)\n```\n\nWe can make this a little more concise:\n\n```python\n\
    \"\"\"Prompt the user for two integers and display the sum.\"\"\"\n\na = int(input(\"\
    Enter an integer: \"))\nb = int(input(\"Enter another integer: \"))\nprint(a +\
    \ b)\n```\n\n## Conversion may fail\n\nWhile the code samples above work fine\
    \ if the user follows instructions and enters numeric strings that can be converted\
    \ to integers, users don't always read instructions and they aren't always well-behaved.\
    \ For example, if a misbehaved user were to enter values that cannot be converted\
    \ to integers, we might see a session like this:\n\n```\nEnter an integer: cheese\n\
    Enter another integer: bananas\nTraceback (most recent call last):\n  File \"\
    /myfiles/addition_fixed.py\", line 5, in <module>\n    a = int(a)\nValueError:\
    \ invalid literal for int() with base 10: 'cheese'\n\nProcess finished with exit\
    \ code 1\n```\n\nThis occurs because 'cheese' cannot be converted to an int. In\
    \ this case, Python reports a `ValueError` and indicates the invalid literal 'cheese'.\
    \ We'll see how to handle problems like this later on in Chapter 15.\n\n## input()\
    \ does not validate input\n\nIt's important to note that `input()` does not validate\
    \ the user's input.\n\nValidation is a process whereby we check to ensure that\
    \ input from a user or some other source meets certain criteria. That's a big\
    \ topic we'll touch on later, but for now, just keep in mind that the user can\
    \ type just about anything at a prompt and `input()` will return whatever the\
    \ user typed--without checking anything.\n\nSo a different session with the same\
    \ program (above) might be\n\n```\nWhat is your name? -1\n-1\n\nBe warned.\n```\n\
    \n## Don't use names that collide with names of built-in Python functions!\n\n\
    As noted, `input`, `int`, and `float` are names of built-in Python functions.\
    \ It's very important that you do not use such names as names for your own functions\
    \ or variables. In doing so, for example, you'd be reassigning the name `input`,\
    \ and thus the `input()` function would no longer be accessible. For example,\
    \ this\n\n```python\ninput = input('What is your name? ')\nprint(input)  # so\
    \ far, so good -- prints what the user typed\ninput = input('What is your quest?\
    \ ')\nprint(input)\n```\n\nfails miserably, with\n\n```\nTraceback (most recent\
    \ call last):\n  File \".../3.10/lib/python3.10/code.py\", line 90, in runcode\n\
    \    exec(code, self.locals)\n  File \"<input>\", line 1, in <module>\nTypeError:\
    \ 'str' object is not callable\n```\n\nWhat happened? We assigned the result to\
    \ an object named `input`, so after the first line (above) is executed, `input`\
    \ no longer refers to the function, but instead is now a string (hence the error\
    \ message \"'str' object is not callable\").\n\nSo be careful to choose good names\
    \ and avoid collisions with built-ins.\n\n## Additional resources\n\nThe documentation\
    \ for any programming language can be a bit technical. But it can't hurt to take\
    \ a look at the documentation for `input()`, `int()`, and `float()`. If it makes\
    \ your head spin, just navigate away and move on. But maybe the documentation\
    \ can deepen your understanding of these functions. See relevant sections of:\n\
    \n- https://docs.python.org/3/library/functions.html"
  mdcn: "## 7.5 格式化输出的几种方法\n\n假设我们想编写一个程序，提示用户输入一个数字并计算该数字的平方。下面就是一个这样的程序：\n\n```python\n\
    \"\"\"一个计算用户输入数字的平方并显示结果的程序。\"\"\"\n\nx = input(\"请输入一个数字：\")\nx = float(x)\n\
    result = x * x\nprint(result)\n```\n\n这样运行没问题，但或许我们可以让它更友好一些。比如，我们希望将结果打印成这样：\n\
    \n17.0 的平方是 289.0\n\n我们该如何实现呢？有几种方法。一种稍显笨拙的方法是使用字符串拼接。现在，我们不能这样做：\n\n```python\n\
    \"\"\"一个计算用户输入数字的平方并显示结果的程序。\"\"\"\n\nx = input(\"请输入一个数字：\")\nx = float(x)\n\
    result = x * x\nprint(x + ' squared is ' + result)\n```\n\n这个程序会失败，并出现错误：\n\n\
    ```\nTraceback (most recent call last):\n  File \".../squared_with_concatenation.py\"\
    , line 4, in <module>\n    print(x + ' squared is ' + result)\nTypeError: unsupported\
    \ operand type(s) for +: 'float' and 'str'\n```\n\n为什么？因为我们不能将浮点数和字符串拼接起来。一种解决方法是显式地将浮点值转换为字符串。我们可以通过使用\
    \ Python 的内置函数 `str()` 来*显式地*做到这一点。\n\n```python\n\"\"\"一个计算用户输入数字的平方并显示结果的程序。\"\
    \"\"\n\nx = input(\"请输入一个数字：\")\nx = float(x)\nresult = x * x\nprint(str(x) +\
    \ ' squared is ' + str(result))\n```\n\n现在，这可以工作了。下面是一个测试。\n\n```python\nkg =\
    \ input(\"请输入体重（千克）：\")\nlbs = kg_to_pounds(kg)\nprint(lbs)\n```\n\n如果我们把这段代码保存到文件并尝试运行它，在尝试将千克转换为磅时会失败。我们会得到这样的信息：\n\
    \n```\nTypeError: can't multiply sequence by non-int of type 'float'\n```\n\n\
    发生了什么？当程序从用户那里获取输入时：\n\n```python\nkg = input(\"请输入体重（千克）：\")\n```\n\n`input()`\
    \ 函数返回的值是一个字符串。`input()` 函数返回的值*总是*一个字符串。假设用户在提示符后输入了 \"82\"。那么，保存在变量 `kg` 中的是*字符串*\
    \ '82'，而不是数字 82，而我们不能将一个字符串乘以一个浮点数——这没有意义！\n\n幸运的是，有一个简单的解决方法。Python 提供了内置函数，可用于将字符串转换为数字类型（如果可能的话）。这些是整数*构造函数*\
    \ `int()` 和浮点数*构造函数* `float()`。这些函数可以接受一个*看起来*应该可以转换为数字的字符串，执行转换，并返回相应的数字类型。\n\
    \n让我们在 Python shell 中试试这些：\n\n```python\n>>> int('82')\n82\n>>> float('82')\n\
    82.0\n```\n\n在第一个例子中，我们将字符串 '82' 转换为整数。在第二个例子中，我们将字符串 '82' 转换为浮点数。\n\n如果我们尝试转换像\
    \ '82.5' 这样的字符串会发生什么？转换为浮点数时可以工作，但转换为整数时不行。\n\n```python\n>>> float('82.5')  #\
    \ 这可以正常工作\n82.5\n>>> int('82.5')\nTraceback (most recent call last):\n  File \"\
    <stdin>\", line 1, in <module>\nValueError: invalid literal for int() with base\
    \ 10: '82.5'\n```\n\n错误信息告诉我们，字符串 '82.5' 无法转换为整数。\n\n现在，回到手头的问题——将用户输入转换为浮点数——以下是我们如何修复最初代码的方法。\n\
    \n```python\n\"\"\"\n提示用户输入体重（千克）并转换为（美制）磅。\n\"\"\"\n\nPOUNDS_PER_KILOGRAM = 2.204623\n\
    \ndef kg_to_pounds(kg_):\n    return kg_ * POUNDS_PER_KILOGRAM\n\nkg = float(input(\"\
    请输入体重（千克）：\"))\nlbs = kg_to_pounds(kg)\nprint(lbs)\n```\n\n注意，我们将对 `input()` 的调用包装在了对\
    \ `float` 构造函数的调用中。这个表达式是从内向外求值的（正如你可能猜测的那样）。首先，对 `input()` 的调用显示提供的提示，等待输入，然后返回一个字符串。返回的值（比如\
    \ '82.5'）随后作为参数传递给 `float` 构造函数。`float` 构造函数完成其工作，构造函数返回一个浮点数 82.5。现在，当我们把这个值传递给函数\
    \ `kg_to_pounds()` 时，一切就都正常工作了。\n\n如果你以前见过数学函数，这与下面这样的形式没什么不同：\n\n$f(g(x))$\n\n\
    其中我们首先计算 $g(x)$，然后将 $f$ 应用于结果。\n\n## 另一个存在严重错误的场景\n\n考虑这个有严重错误的程序：\n\n```python\n\
    \"\"\"这个程序有一个错误！\n它不像你预期的那样进行加法运算。\"\"\"\n\na = input(\"请输入一个整数：\")\nb = input(\"\
    请输入另一个整数：\")\nprint(a + b)\n```\n\n你能看出错误是什么吗？\n想象一下，如果在第一个提示符处用户输入了 \"42\"，在第二个提示符处用户输入了\
    \ \"10\"，会发生什么。当然，42 加 10 等于 52，但这是这个程序会打印的结果吗？\n不是。下面是这个程序的一次试运行：\n\n```\n请输入一个整数：42\n\
    请输入另一个整数：10\n4210\n```\n\n\"4210\" 不是正确的结果！发生了什么？\n记住，`input()` 总是返回一个字符串，所以在上面的程序中，`a`\
    \ 是一个字符串，`b` 也是一个字符串。因此，当我们执行 `a + b` 这个操作时，它不是加法，而是字符串拼接！\n在这种情况下我们该怎么办？为了对来自\
    \ `input()` 的用户提供的值进行算术运算，我们首先需要将输入字符串转换为数字类型（如上所述）。\n\n```python\n\"\"\"这个程序修复了前面程序中的错误。\"\
    \"\"\n\na = input(\"请输入一个整数：\")\nb = input(\"请输入另一个整数：\")\na = int(a)\nb = int(b)\n\
    print(a + b)\n```\n\n我们可以让它更简洁一些：\n\n```python\n\"\"\"提示用户输入两个整数并显示它们的和。\"\"\"\
    \n\na = int(input(\"请输入一个整数：\"))\nb = int(input(\"请输入另一个整数：\"))\nprint(a + b)\n\
    ```\n\n## 转换可能失败\n\n虽然上面的代码示例在用户遵循指示并输入可以转换为整数的数字字符串时可以正常工作，但用户并不总是阅读指示，他们也不总是守规矩。例如，如果一个不守规矩的用户输入了无法转换为整数的值，我们可能会看到这样的会话：\n\
    \n```\n请输入一个整数：cheese\n请输入另一个整数：bananas\nTraceback (most recent call last):\n\
    \  File \"/myfiles/addition_fixed.py\", line 5, in <module>\n    a = int(a)\n\
    ValueError: invalid literal for int() with base 10: 'cheese'\n\nProcess finished\
    \ with exit code 1\n```\n\n这发生是因为 'cheese' 无法转换为整数。在这种情况下，Python 报告了一个 `ValueError`\
    \ 并指出了无效的字面量 'cheese'。我们将在第 15 章中看到如何处理这类问题。\n\n## input() 不验证输入\n\n需要注意的是，`input()`\
    \ 不会验证用户的输入。\n\n验证是一个过程，通过它我们检查来自用户或其他来源的输入是否满足某些标准。这是一个很大的话题，我们稍后会涉及，但现在，请记住，用户可以在提示符处输入几乎任何内容，而\
    \ `input()` 会返回用户输入的任何内容——不进行任何检查。\n\n因此，使用同一个程序（上面那个）的另一次会话可能是：\n\n```\nWhat\
    \ is your name? -1\n-1\n\nBe warned.\n```\n\n## 不要使用与 Python 内置函数名称冲突的名称！\n\n\
    如前所述，`input`、`int` 和 `float` 是 Python 内置函数的名称。非常重要的一点是，你不要使用这样的名称作为你自己的函数或变量的名称。这样做，例如，你会重新赋值\
    \ `input` 这个名称，因此 `input()` 函数将不再可访问。例如，这个\n\n```python\ninput = input('What is\
    \ your name? ')\nprint(input)  # 到目前为止，没问题 -- 打印用户输入的内容\ninput = input('What is\
    \ your quest? ')\nprint(input)\n```\n\n会彻底失败，出现\n\n```\nTraceback (most recent\
    \ call last):\n  File \".../3.10/lib/python3.10/code.py\", line 90, in runcode\n\
    \    exec(code, self.locals)\n  File \"<input>\", line 1, in <module>\nTypeError:\
    \ 'str' object is not callable\n```\n\n发生了什么？我们将结果赋值给了一个名为 `input` 的对象，所以在执行完第一行（上面）之后，`input`\
    \ 不再指向该函数，而是变成了一个字符串（因此出现了错误信息 \"'str' object is not callable\"）。\n\n所以要小心选择好的名称，避免与内置名称冲突。\n\
    \n## 附加资源\n\n任何编程语言的文档可能都有点技术性。但看看 `input()`、`int()` 和 `float()` 的文档总没有坏处。如果它让你头晕，就直接跳过，继续前进。但也许文档可以加深你对这些函数的理解。参见以下相关部分：\n\
    \n- https://docs.python.org/3/library/functions.html"
