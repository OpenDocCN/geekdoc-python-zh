    - You will learn about the csv file format and Python module, as well as how to\
    \ read from and write to a .csv file.\n\n### Terms and Python keywords introduced\n\
    \n- as\n- context manager\n- CSV (file format)\n- keyword argument\n- with\n\n\
    ## 13.1 Context managers\n\nA **context manager** is a Python object which controls\
    \ (to a certain extent) what occurs within a `with` statement. Context managers\
    \ relieve some of the burden placed on programmers. For example, if we open a\
    \ file, and for some reason something goes wrong and an exception is raised, we\
    \ still want to ensure that the file is closed. Before the introduction of the\
    \ `with` statement (in Python 2.5, almost twenty years ago), programmers often\
    \ used `try/finally` statements (we'll see more about `try` when we get to exception\
    \ handling).\n\nWe introduce `with` and context managers in the context of file\
    \ i/o, because this approach simplifies our code and ensures that when we're done\
    \ reading from or writing to a file that the file is closed automatically, without\
    \ any need to explicitly call the `.close()` method. The idiom we'll follow is:\n\
    \n```python\nwith open(\"somefile.txt\") as fh:\n    # do stuff, e.g., read from\
    \ file\n    s = fh.read()\n```\n\nWhen we exit this block (i.e. all the indented\
    \ code has executed), Python will close the file automatically. Without this context\
    \ manager, we'd need to call `.close()` explicitly, and failure to do so can lead\
    \ to unexpected and undesirable results.\n\n`with` and `as` are Python keywords.\
    \ Here, `with` creates the context manager, and `as` is used to give a name to\
    \ our file object. So once the file is opened, we may refer to it by the name\
    \ given with `as`—in this instance `fh` (a common abbreviation for \"file handle\"\
    ).\n\n## 13.2 Reading from a file\n\nLet's say we have a .txt file called `hello.txt`\
    \ in the same directory as a Python file we just created. We wish to open the\
    \ file, read its content and assign it a variable, and print that variable to\
    \ the console. This is how we would do this:\n\n```python\n>>> with open('hello.txt')\
    \ as f:\n...     s = f.read()\n...\n>>> print(s)\nHello World!\n```\n\nIt's often\
    \ useful to read one line at a time into a list.\n\n```python\n>>> lines = []\n\
    >>> with open('poem.txt') as f:\n...     for line in f:\n...         lines.append(line)\n\
    ...\n```"
