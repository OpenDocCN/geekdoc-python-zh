    \n```\n\"\"\"\nImplementation of Euclid's algorithm.\n\"\"\"\n\na = int(input(\"\
    Enter a positive integer, a: \"))\nb = int(input(\"Enter a positive integer, b:\
    \ \"))\n\nwhile b != 0:\n    remainder = a % b\n    a = b\n    b = remainder\n\
