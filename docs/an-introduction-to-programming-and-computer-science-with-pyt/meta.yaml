    \ = {'foo': 'bar', 'foo': 'baz'}\n```\n\nWhat do you think is the value of *d*?\
    \ Guess first, then check!\n\n### Exercise 04\n\nCreate this dictionary:\n\n```\n\
    d = {'foo': 'bar'}\n```\n\nNow pass *d* as an argument to a function which has\
    \ a single formal parameter, *d_*. Within the function modify the dictionary (mutate\
