    # Variables, names, and mutability


    Assignment in Python is all about *names*, and it’s important to understand that
    when we make assignments we are *not* copying values from one variable to another.
    This becomes most clear when we examine the behavior with respect to mutable objects
    (e.g., lists):


    ```

    >>> lst_a = [1, 2, 3, 4, 5]

    >>> lst_b = lst_a

    ```


    Now let’s change lst_a.


    ```

    >>> lst_a.append(6)

    >>> lst_b

    [1, 2, 3, 4, 5, 6]

    ```


    See? lst_b isn’t a copy of lst_a, it’s a different name for the same object! If
    a mutable value has more than one name, if we affect some change in the value
    via one name, all the other names still refer to the mutated value.


    Now, what do you think about this example:


    ```

    >>> lst_a = [1, 2, 3, 4, 5]

    >>> lst_b = [1, 2, 3, 4, 5]

    >>> lst_a.append(6)

    ```


    Are lst_a and lst_b different names for the same object? Or do they refer to different
    objects?'
- md: "## 10.4 Subscripts are indices\n\nHere we make explicit the connection between\
    \ subscript notation in mathematics and indices in Python.\n\nIn mathematics:\
    \ Say we have a collection of objects $X$. We can refer to individual elements\
    \ of the collection by associating each element of the collection with some index\
    \ from the natural numbers. Thus,\n\n$$x_0 \\in X$$\n$$x_1 \\in X$$\n$$\\dots$$\n\
    $$x_n \\in X$$\n\nDifferent texts may use different starting indices. For example,\
    \ a linear algebra text probably starts indices at one. A text on set theory is\
    \ likely to use indices starting at zero.\n\nIn Python, sequences—lists, tuples,\
    \ and strings—are indexed in this fashion. All Python indices start at zero, and\
    \ we refer to Python as being *zero indexed*.\n\nIndexing works the same for lists,\
    \ tuples, and even strings. Remember that these are sequences—ordered collections—so\
    \ each element has an index, and we may access elements within the sequence by\
    \ its index.\n\n```\nmy_list = ['P', 'O', 'R', 'C', 'U', 'P', 'I', 'N', 'E']\n\
    ```\n\n![](img/c79d476b9b167832781fbb4257bb2cb9_212_0.png)\n\nWe start indices\
    \ at zero, and for a list of length $n$, the indices range from zero to $n - 1$.\n\
    \nIt's exactly the same for tuples.\n\n```\nmy_tuple = ('P', 'O', 'R', 'C', 'U',\
    \ 'P', 'I', 'N', 'E')\n```\n\n![](img/c79d476b9b167832781fbb4257bb2cb9_212_1.png)\n\
    \nThe picture looks the same, doesn't it? That's because it is! It's even the\
    \ same for strings.\n\n```\nmy_string = 'PORCUPINE'\n```\n\n![](img/c79d476b9b167832781fbb4257bb2cb9_213_0.png)\n\
    \nWhile we don't explicitly separate the characters of a string with commas, they\
    \ are a sequence nonetheless, and we can read characters by index.\n\n## 10.5\
    \ Concatenating lists and tuples\n\nSometimes we have two or more lists or tuples,\
    \ and we want to combine them. We've already seen how we can concatenate strings\
    \ using the + operator. This works for lists and tuples too!\n\n```\n>>> plain_colors\
    \ = ['red', 'green', 'blue', 'yellow']\n>>> fancy_colors = ['ultramarine', 'ochre',\
    \ 'indigo', 'viridian']\n>>> all_colors = plain_colors + fancy_colors\n>>> all_colors\n\
    ['red', 'green', 'blue', 'yellow', 'ultramarine', 'ochre',\n 'indigo', 'viridian']\n\
    ```\n\nor\n\n```\n>>> plain_colors = ('red', 'green', 'blue', 'yellow')\n>>> fancy_colors\
    \ = ('ultramarine', 'ochre', 'indigo', 'viridian')\n>>> all_colors = plain_colors\
    \ + fancy_colors\n>>> all_colors\n('red', 'green', 'blue', 'yellow', 'ultramarine',\
    \ 'ochre',\n 'indigo', 'viridian')\n```\n\nThis works just like coupling railroad\
    \ cars. Coupling two trains with multiple cars preserves the ordering of the cars.\n\
    \n> Answering the inevitable question: Can we concatenate a list with a tuple\
    \ using the + operator? No, we cannot.\n\n```\n>>> [1, 2, 3] + [4, 5, 6]\n[1,\
    \ 2, 3, 4, 5, 6]\n>>> [1, 2, 3] + (4, 5, 6)\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nTypeError: can only concatenate list\
    \ (not \"tuple\") to list\n```\n\n## 10.6 Copying lists\n\nWe've seen elsewhere\
    \ that the following simply gives another name to a list.\n\n```\n>>> lst_1 =\
    \ ['gamma', 'epsilon', 'delta', 'alpha', 'beta']\n>>> lst_2 = lst_1\n>>> lst_1.sort()\n\
    >>> lst_2\n['alpha', 'beta', 'delta', 'epsilon', 'gamma']\n```\n\nHowever, there\
    \ are times when we really mean to make a copy. Earlier we saw that the .copy()\
    \ method returns a *shallow copy* of a list. We've also seen that we can copy\
    \ a list using a slice.\n\n```\n>>> lst_1 = ['gamma', 'epsilon', 'delta', 'alpha',\
    \ 'beta']\n>>> lst_2 = lst_1.copy()\n>>> lst_1.sort()\n>>> lst_2\n['gamma', 'epsilon',\
    \ 'delta', 'alpha', 'beta']\n```\n\nor\n\n```\n>>> lst_1 = ['gamma', 'epsilon',\
    \ 'delta', 'alpha', 'beta']\n>>> lst_2 = lst_1[:]  # slice\n>>> lst_1.sort()\n\
    >>> lst_2\n['gamma', 'epsilon', 'delta', 'alpha', 'beta']\n```\n\nThere's another\
    \ way we can copy a list: using the *list constructor*. The list constructor takes\
    \ some iterable and iterates it, producing a new list composed of the elements\
    \ yielded by iteration. Since lists are iterable, we can use this to create a\
    \ copy of a list.\n\n```\n>>> lst_1 = ['gamma', 'epsilon', 'delta', 'alpha', 'beta']\n\
    >>> lst_2 = list(lst_1)  # using the list constructor\n>>> lst_1.sort()\n>>> lst_2\n\
    ['gamma', 'epsilon', 'delta', 'alpha', 'beta']\n```\n\nSo now we have *three*\
    \ ways to make a copy of a list:\n\n- By using the .copy() method\n- By slicing\
    \ (lst_2 = lst_1[:])\n- By using the list constructor (lst_2 = list(lst_1))\n\n\
    Fun fact: Under the hood, .copy() simply calls the list constructor to make a\
    \ new list.\n\n## 10.7 Finding an element within a sequence\n\nIt should come\
    \ as no surprise that if we have a sequence of objects, we often wish to see if\
    \ an element is in the sequence (list, tuple, or string). Sometimes we also want\
    \ to find the index of the element within a sequence. Python makes this relatively\
    \ straightforward.\n\n### Checking to see if an element is in a sequence\n\nSay\
    \ we have the following list:\n\n```\n>>> fruits = ['kumquat', 'papaya', 'kiwi',\
    \ 'lemon', 'lychee']\n```\n\nWe can check to see if an element exists using the\
    \ Python keyword in.\n\n```\n>>> 'kiwi' in fruits\nTrue\n>>> 'apple' in fruits\n\
    False\n```\n\nWe can use the evaluation of such expressions in conditions:\n\n\
    ```\n>>> if 'apple' in fruits:\n...     print(\"Let's bake a pie!\")\n... else:\n\
    ...     print(\"Oops. No apples.\")\n...\nOops. No apples.\n```\n\nor\n\n```\n\
    >>> if 'kiwi' in fruits:\n...     print(\"Let's bake kiwi tarts!\")\n... else:\n\
    ...     print(\"Oops. No kiwis.\")\n...\nLet's bake kiwi tarts!\n```\n\nThis works\
    \ the same with numbers or with mixed-type lists.\n\n```\n>>> some_primes = [2,\
    \ 3, 5, 7, 11, 13, 17, 19, 23]\n>>> 5 in some_primes\nTrue\n>>> 4 in some_primes\n\
    False\n```\n\nor\n\n```\n>>> mixed = (42, True, 'tobacconist', 3.1415926)\n>>>\
    \ 42 in mixed\nTrue\n>>> -5 in mixed\nFalse\n```\n\nWe can also check to see if\
    \ some substring is within a string.\n\n```\n>>> \"quick\" in \"The quick brown\
    \ fox...\"\nTrue\n```\n\nSo, we can see that the Python keyword `in` can come\
    \ in very handy in a variety of ways.\n\n### Getting the index of an element in\
    \ a sequence\n\nSometimes we want to know the index of an element in a sequence.\
    \ For this we use `.index()` method. This method takes some value as an argument\
    \ and returns the index of the first occurrence of that element in the sequence\
    \ (if found).\n\n```\n>>> fruits = ['kumquat', 'papaya', 'kiwi', 'lemon', 'lychee']\n\
    >>> fruits.index('lychee')\n4\n```\n\nHowever, this one can bite. If the element\
    \ is *not* in the list, Python will raise a `ValueError` exception.\n\n```\n>>>\
    \ fruits.index('frog')\nTraceback (most recent call last):\n  File \"/Library/Frameworks/.../code.py\"\
    , line 90, in runcode\n    exec(code, self.locals)\n  File \"<input>\", line 1,\
    \ in <module>\nValueError: 'frog' is not in list\n```\n\nThis is rather inconvenient,\
    \ since if this were to occur when running your program, it would crash your program!\
    \ Yikes! So what can be done? Later on in this textbook we'll learn about *exception\
    \ handling*, but for now, here's a different solution: just check to see if the\
    \ element is in the list (or other sequence) first by using an `if` statement,\
    \ and *then* get the index if it is indeed in the list.\n\n```\n>>> if 'frog'\
    \ in fruits:\n...     print(f\"The index of frog in fruits is \"\n...        \
    \   f\"{fruits.index('frog')}\")\n... else:\n...     print(\"'frog' is not among\
    \ the elements in the list!\")\n```\n\nThis way you can avoid `ValueError`."
  mdcn: "## 10.4 下标即索引\n\n这里我们明确阐述数学中的下标表示法与 Python 中索引之间的联系。\n\n在数学中：假设我们有一个对象集合\
    \ $X$。我们可以通过将集合中的每个元素与自然数中的某个索引相关联来引用该集合的各个元素。因此，\n\n$$x_0 \\in X$$\n$$x_1 \\\
    in X$$\n$$\\dots$$\n$$x_n \\in X$$\n\n不同的文本可能使用不同的起始索引。例如，线性代数教材可能从 1 开始索引。而集合论教材则可能使用从\
    \ 0 开始的索引。\n\n在 Python 中，序列——列表、元组和字符串——正是以这种方式进行索引的。所有 Python 索引都从 0 开始，我们称 Python\
    \ 是 *零索引* 的。\n\n索引对列表、元组甚至字符串的工作方式都相同。请记住，这些都是序列——有序的集合——因此每个元素都有一个索引，我们可以通过索引来访问序列中的元素。\n\
    \n```\nmy_list = ['P', 'O', 'R', 'C', 'U', 'P', 'I', 'N', 'E']\n```\n\n![](img/c79d476b9b167832781fbb4257bb2cb9_212_0.png)\n\
    \n我们从 0 开始索引，对于一个长度为 $n$ 的列表，索引范围是从 0 到 $n - 1$。\n\n对于元组，情况完全相同。\n\n```\nmy_tuple\
    \ = ('P', 'O', 'R', 'C', 'U', 'P', 'I', 'N', 'E')\n```\n\n![](img/c79d476b9b167832781fbb4257bb2cb9_212_1.png)\n\
    \n图片看起来一样，不是吗？因为确实如此！对于字符串也是如此。\n\n```\nmy_string = 'PORCUPINE'\n```\n\n![](img/c79d476b9b167832781fbb4257bb2cb9_213_0.png)\n\
    \n虽然我们没有用逗号显式地分隔字符串中的字符，但它们仍然是一个序列，我们可以通过索引来读取字符。\n\n## 10.5 连接列表和元组\n\n有时我们有两个或多个列表或元组，想要将它们组合起来。我们已经见过如何使用\
    \ `+` 运算符连接字符串。这对列表和元组同样适用！\n\n```\n>>> plain_colors = ['red', 'green', 'blue',\
    \ 'yellow']\n>>> fancy_colors = ['ultramarine', 'ochre', 'indigo', 'viridian']\n\
    >>> all_colors = plain_colors + fancy_colors\n>>> all_colors\n['red', 'green',\
    \ 'blue', 'yellow', 'ultramarine', 'ochre',\n 'indigo', 'viridian']\n```\n\n或者\n\
    \n```\n>>> plain_colors = ('red', 'green', 'blue', 'yellow')\n>>> fancy_colors\
    \ = ('ultramarine', 'ochre', 'indigo', 'viridian')\n>>> all_colors = plain_colors\
    \ + fancy_colors\n>>> all_colors\n('red', 'green', 'blue', 'yellow', 'ultramarine',\
    \ 'ochre',\n 'indigo', 'viridian')\n```\n\n这就像连接火车车厢一样。将两列有多节车厢的火车连接起来，会保持车厢的顺序。\n\
    \n> 回答一个不可避免的问题：我们能用 `+` 运算符连接一个列表和一个元组吗？不能。\n\n```\n>>> [1, 2, 3] + [4, 5, 6]\n\
    [1, 2, 3, 4, 5, 6]\n>>> [1, 2, 3] + (4, 5, 6)\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nTypeError: can only concatenate list\
    \ (not \"tuple\") to list\n```\n\n## 10.6 复制列表\n\n我们在其他地方见过，以下操作只是给列表起了另一个名字。\n\
    \n```\n>>> lst_1 = ['gamma', 'epsilon', 'delta', 'alpha', 'beta']\n>>> lst_2 =\
    \ lst_1\n>>> lst_1.sort()\n>>> lst_2\n['alpha', 'beta', 'delta', 'epsilon', 'gamma']\n\
    ```\n\n然而，有时我们确实想要制作一个副本。之前我们看到 `.copy()` 方法返回列表的 *浅拷贝*。我们也见过可以使用切片来复制列表。\n\n\
    ```\n>>> lst_1 = ['gamma', 'epsilon', 'delta', 'alpha', 'beta']\n>>> lst_2 = lst_1.copy()\n\
    >>> lst_1.sort()\n>>> lst_2\n['gamma', 'epsilon', 'delta', 'alpha', 'beta']\n\
    ```\n\n或者\n\n```\n>>> lst_1 = ['gamma', 'epsilon', 'delta', 'alpha', 'beta']\n\
    >>> lst_2 = lst_1[:]  # 切片\n>>> lst_1.sort()\n>>> lst_2\n['gamma', 'epsilon',\
    \ 'delta', 'alpha', 'beta']\n```\n\n还有另一种复制列表的方法：使用 *列表构造函数*。列表构造函数接受某个可迭代对象并对其进行迭代，生成一个由迭代产生的元素组成的新列表。由于列表是可迭代的，我们可以用它来创建列表的副本。\n\
    \n```\n>>> lst_1 = ['gamma', 'epsilon', 'delta', 'alpha', 'beta']\n>>> lst_2 =\
    \ list(lst_1)  # 使用列表构造函数\n>>> lst_1.sort()\n>>> lst_2\n['gamma', 'epsilon', 'delta',\
    \ 'alpha', 'beta']\n```\n\n所以现在我们有 *三种* 方法来复制列表：\n\n- 使用 `.copy()` 方法\n- 使用切片\
    \ (`lst_2 = lst_1[:]`)\n- 使用列表构造函数 (`lst_2 = list(lst_1)`)\n\n有趣的事实：在底层，`.copy()`\
    \ 只是调用列表构造函数来创建一个新列表。\n\n## 10.7 在序列中查找元素\n\n毫不奇怪，如果我们有一个对象序列，我们常常希望查看某个元素是否在该序列（列表、元组或字符串）中。有时我们也想找到该元素在序列中的索引。Python\
    \ 使这变得相对简单。\n\n### 检查元素是否在序列中\n\n假设我们有以下列表：\n\n```\n>>> fruits = ['kumquat', 'papaya',\
    \ 'kiwi', 'lemon', 'lychee']\n```\n\n我们可以使用 Python 关键字 `in` 来检查元素是否存在。\n\n```\n\
    >>> 'kiwi' in fruits\nTrue\n>>> 'apple' in fruits\nFalse\n```\n\n我们可以在条件语句中使用此类表达式的求值结果：\n\
    \n```\n>>> if 'apple' in fruits:\n...     print(\"Let's bake a pie!\")\n... else:\n\
    ...     print(\"Oops. No apples.\")\n...\nOops. No apples.\n```\n\n或者\n\n```\n\
    >>> if 'kiwi' in fruits:\n...     print(\"Let's bake kiwi tarts!\")\n... else:\n\
    ...     print(\"Oops. No kiwis.\")\n...\nLet's bake kiwi tarts!\n```\n\n这对数字或混合类型的列表同样适用。\n\
    \n```\n>>> some_primes = [2, 3, 5, 7, 11, 13, 17, 19, 23]\n>>> 5 in some_primes\n\
    True\n>>> 4 in some_primes\nFalse\n```\n\n或者\n\n```\n>>> mixed = (42, True, 'tobacconist',\
    \ 3.1415926)\n>>> 42 in mixed\nTrue\n>>> -5 in mixed\nFalse\n```\n\n我们还可以检查某个子字符串是否在字符串中。\n\
    \n```\n>>> \"quick\" in \"The quick brown fox...\"\nTrue\n```\n\n因此，我们可以看到 Python\
    \ 关键字 `in` 在各种情况下都非常有用。\n\n### 获取序列中元素的索引\n\n有时我们想知道序列中某个元素的索引。为此，我们使用 `.index()`\
    \ 方法。此方法接受某个值作为参数，并返回该元素在序列中首次出现的索引（如果找到）。\n\n```\n>>> fruits = ['kumquat', 'papaya',\
    \ 'kiwi', 'lemon', 'lychee']\n>>> fruits.index('lychee')\n4\n```\n\n然而，这个方法可能会出问题。如果元素\
    \ *不在* 列表中，Python 将引发 `ValueError` 异常。\n\n```\n>>> fruits.index('frog')\nTraceback\
    \ (most recent call last):\n  File \"/Library/Frameworks/.../code.py\", line 90,\
    \ in runcode\n    exec(code, self.locals)\n  File \"<input>\", line 1, in <module>\n\
    ValueError: 'frog' is not in list\n```\n\n这相当不方便，因为如果在运行程序时发生这种情况，它会使你的程序崩溃！哎呀！那么该怎么办呢？在本教材的后面，我们将学习\
    \ *异常处理*，但现在，这里有一个不同的解决方案：只需先使用 `if` 语句检查元素是否在列表（或其他序列）中，*然后* 如果确实在列表中再获取索引。\n\
    \n```\n>>> if 'frog' in fruits:\n...     print(f\"The index of frog in fruits\
    \ is \"\n...           f\"{fruits.index('frog')}\")\n... else:\n...     print(\"\
    'frog' is not among the elements in the list!\")\n```\n\n这样你就可以避免 `ValueError`。"
