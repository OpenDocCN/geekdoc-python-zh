  - "[PAGE 104]\n\nwithin the function square is local, within that function. Yes,\
    \ it has the same name as the x in the outer scope, but it’s a different x.\n\n\
    Generally, it’s not a good idea to shadow variable names in a function. Python\
    \ allows it, but this is more a matter of style and avoiding confusion. Oftentimes,\
    \ we rename the variables in our functions, appending an underscore.\n\n```\n\
    >>> def square(x_):\n...     x_ = x_ * x_\n...     return x_\n...\n>>> x = 5\n\
    >>> y = square(x)\n>>> y\n25\n```\n\nThis is one way to avoid shadowing.\n\nAnother\
    \ approach is to give longer, more descriptive names to variables in the outer\
    \ scope, and leave the shorter or single-character names to the function. Which\
    \ approach is best depends on context.\n\n# 5.5 Pure and impure functions\n\n\
    So far, all the functions we’ve written are *pure*. That is, they accept some\
