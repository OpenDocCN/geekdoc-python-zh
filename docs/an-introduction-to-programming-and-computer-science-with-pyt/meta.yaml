    \ |\n| \\\\ | 反斜杠 |\n| \\' | 单引号 / 撇号 |\n| \\\" | 双引号 |\n\n## Python字符串文档\n\n\
    更多信息，请参阅Python字符串文档，包括*Python非正式入门*<sup>8</sup>和*词法分析*。<sup>9</sup>\n\n## 3.5\
    \ 数值类型的表示错误\n\n*表示错误*发生在我们试图使用有限的位数或数字来表示一个在所选系统中无法精确表示的数字时。例如，在我们熟悉的十进制系统中：\n\
    \n| 数字 | 十进制表示 | 表示错误 |\n| :--- | :--- | :--- |\n| 1 | 1 | 0 |\n| 1/3 | 0.3333333333333333\
