    \ an exception, prints a message with information about the exception, and then\
    \ halts execution. Exceptions have different types, and this tells us about the\
    \ kind of error that's occurred.\n\nIf there is a syntax error, an exception of\
    \ type `SyntaxError` is raised. If there is an indentation error (a more specific\
    \ kind of syntax error), an `IndentationError` is raised. These errors occur before\
    \ your code is ever run—they are discovered as Python is first reading your file.\n\
    \nMost other exceptions occur as your program is run. In these cases, the message\
    \ will include what's called a *traceback*, which provides a little information\
    \ about where in your code the error occurred. The last line in an exception message\
    \ reports the type of exception that has occurred. It's often helpful to read\
    \ such messages from the bottom up.\n\nWhat follows are brief summaries of the\
    \ first types of exceptions you're likely to encounter, and in each new chapter,\
    \ we'll introduce new exception types as appropriate.\n\n# SyntaxError\n\nIf you\
    \ write code which does not follow the rules of Python syntax, Python will raise\
    \ an exception of type `SyntaxError`. Example:\n\n```\n>>> 1 + / 1\nFile \"<stdin>\"\
    , line 1\n  1 + / 1\n    ^\nSyntaxError: invalid syntax\n```"
