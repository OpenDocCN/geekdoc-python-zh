    So you see, what's yielded at each iteration is a tuple of index and element.\
    \ Pretty cool, huh?\n\nNow that we've learned a little about enumerate() let's\
    \ revisit the alternating sum example:\n\n```\nalternating_sum = 0\n\nfor i, e\
    \ in enumerate(lst):\n    if i % 2:\n        alternating_sum -= e\n    else:\n\
    \        alternating_sum += e\n```\n\nRecall that we'd assumed lst is a previously\
    \ defined list of numeric elements. When we pass lst as an argument to enumerate()\
    \ we get an enumerate object. When we iterate over this object, we get tuples\
    \ at each iteration. Here we unpack them to variables i and e. i is assigned the\
    \ index, and e is assigned the element.\n\nIf you need both the element and its\
    \ index, use enumerate()."
