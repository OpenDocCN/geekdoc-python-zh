  md: "We begin with a tuple of numeric values, t. Since the elements of t are all\
    \ numeric, we can calculate their sum. First, we create a variable to hold the\
    \ result of the sum. We call this, sum_. Then, we iterate over all the elements\
    \ in t, and at each iteration of the loop, we add the value of each element to\
    \ the variable sum_. Once the loop has terminated, sum_ holds the sum of all the\
    \ elements of t. Then we print, and compare with the result returned by sum(t)\
    \ to verify this is indeed the correct result.\n\nIn calculations like this we\
    \ call the variable, sum_, an *accumulator* (because it accumulates the values\
    \ of the elements in the iteration).\n\nThat's how we calculate a sum in a loop!\n\
    \n# 11.9 Loops and summations\n\nIt is often the case that we have some formula\
    \ which includes a *summation*, and we wish to implement the summation in Python.\n\
    \nFor example, the formula for calculating the arithmetic mean of a list of numbers\
    \ requires that we first sum all the numbers:\n\n$$\\mu = \\frac{1}{N} \\sum_{i=0}^{N-1}\
    \ x_i$$\n\nIf you've not seen the symbol $\\sum$ before, it's just shorthand for\
    \ \"add them all up.\"\n\nWhat's the connection between summations and loops?\
    \ The summation *is a loop!*\n\nIn the formula above, there's some list of values,\
    \ $x$ indexed by $i$. The summation says: \"Take all the elements, $x_i$, and\
    \ sum them.\" The summation portion is just\n\n$$\\sum_{i=0}^{N-1} x_i$$\n\nwhich\
    \ is the same as\n\n$$x_0 + x_1 + \\dots + x_{N-2} + x_{N-1}$$\n\nHere's the loop\
    \ in Python (assuming we have some list called x):\n\n```\ns = 0\nfor e in x:\n\
    \    s = s + e\n```\n\nafter which, we'd divide by the number of elements in the\
    \ list:\n\n```\nmean = s / len(x)\n```\n\nYes, we could calculate the sum with\
    \ sum() but what do you think sum() does behind the scenes? Exactly this!\n\n\
    > Why do we use the trailing underscore? To avoid overwriting the Python built-in\
    \ function sum() with a new definition."
