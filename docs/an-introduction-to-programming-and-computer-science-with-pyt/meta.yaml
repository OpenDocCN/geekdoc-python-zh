    # 11.15 A deeper dive into iteration in Python


    What follows is a bit more detail about iterables and iteration in Python. You
    can skip this section entirely if you wish. This is presented here for the sole
    purpose of demonstrating what goes on "behind the scenes" when we iterate over
    some object in Python. With that said, let''s start with the case of a list (it
    works the same with a tuple or any other iterable).


    ```

    >>> m = [''Greninja'', ''Lucario'', ''Mimikyu'', ''Charizard'']

    ```


    When we ask Python to iterate over some iterable, it calls the function iter()
    which returns an *iterator* for the iterable (in this case a list).


    ```

    >>> iterator = iter(m)

    >>> type(iterator)

    <class ''list_iterator''>

    ```


    The way iterators work is that Python keeps asking "give me the next member",
    until the iterator is exhausted. This is done (behind the scenes) by calls to
    the iterator''s __next__() method.


    ```

    >>> iterator.__next__()

    ''Greninja''

    >>> iterator.__next__()

    ''Lucario''

    >>> iterator.__next__()

    ''Mimikyu''

    >>> iterator.__next__()

    ''Charizard''

    ```


    Now what happens if we call __next__() one more time?

    We get a StopIteration error'
