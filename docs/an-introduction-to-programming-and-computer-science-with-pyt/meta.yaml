    ### Exercise 01


    The following code has a bug. Instead of printing what the user types, it prints
    `<built-in function input>`. What''s wrong and how would you fix it?


    ```python

    input(''Please enter your name: '')

    print(input)

    ```


    ### Exercise 02


    Which of the following can be converted to an int? (Try these out in a Python
    shell.)


    - a. ''1''

    - b. ''1.0''

    - c. ''-3''

    - d. 5

    - e. ''pumpkin''

    - f. ''1,000''

    - g. ''+1 802 555 1212''

    - h. ''192.168.1.1''

    - i. ''2023-01-15''

    - j. ''2023/01/15''

    - k. 2023-01-15

    - l. 2023/01/15


    ### Exercise 03


    Which of the following can be converted to a float? (Try these out in a Python
    shell.)


    - a. 3.141592

    - b. ''A''

    - c. ''5.0 + 1.0''

    - d. ''17''

    - e. ''inf'' (Be sure to try this one out! What do you think it means?)

    - f. 2023/01/15

    - g. 2023/1/15


    ### Exercise 04


    Write a program which prompts the user for two floating-point numbers and displays
    the product of the two numbers entered. Example:


    ```

    Enter a floating-point number: 3.14159

    Enter another floating-point number: 17

    53.40703

    ```


    Notice here that the second input is an integer string. It''s easy to treat an
    input like this as an integer, just as easily as we could write "17.0" instead
    of "17".


    ```python

    >>> float(17)

    17.0

    ```


    ### Exercise 05


