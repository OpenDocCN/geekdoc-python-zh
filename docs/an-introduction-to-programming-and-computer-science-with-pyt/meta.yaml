    \n我们如何在Python中实现这样的循环？什么可以作为条件？\n\n情节转折：在这种情况下，我们会选择一个*总是*为真的条件，然后只在我们得到一个在所需范围内的数字时才*跳出*循环。这是Python（以及许多其他编程语言）中的一个常见惯用法。\n\
