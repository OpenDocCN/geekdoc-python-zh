    compiled into binary machine code. In Python, this is done by the Python interpreter,
    which interprets bytecode produced by the Python compiler.


    # invoke (see: call)


    Invoke is synonymous with call.


    # iterable / iterate


    An iterable object is one we may iterate, that is, it is an object which contains
    zero or more elements, which are ordered and can be taken one at a time. A familiar
    form of iteration is dealing from a deck of cards. The deck contains zero or more
    elements (52 for a standard deck). The deck is ordered—which doesn''t mean the
    cards are sorted, it just means that each card has a unique position within the
    deck (depending on how the deck is shuffled). If we were to turn over the cards
    from the top of the deck one at a time, until there were no more cards left, we''d
    have iterated over the deck. At the first iteration, we might turn over the six
    of clubs. At the second iteration, we might turn over the nine of diamonds. And
    so on. That''s iterating an iterable.

    Iterables in Python include objects of type str, list, tuple, dict, range, and
    enumerate (there are others as well). When we iterate these objects, we get one
    element at a time, in the order they appear within'
