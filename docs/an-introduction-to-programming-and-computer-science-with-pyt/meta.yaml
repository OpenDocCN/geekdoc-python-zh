  - '[PAGE 221]


    # Methods


    | Type | .sort(), .append(), and .pop() | .index() |

    |---|---|---|

    | list | yes | yes |

    | tuple | no | yes |

    | str | no | yes |


    +   - If an object is *mutable*, then the object can be modified.

    - Indexed read: m[i] where m is a list or tuple, and i is a valid index into the
    list or tuple.

    - Indexed write: m[i] on left-hand side of assignment.

    - Python built-in len() works the same for lists and tuples.

    - Python built-ins sum(), min(), and max() behave the same for lists and tuples.

    - For sum() to work m must contain only numeric types (int, float) or Booleans.
    So, for example, sum([1, 1.0, True]) yields three. We cannot sum over strings.

    - min() and max() work so long as the elements of the list or tuple are *comparable*—meaning
    that >, >=, <, <=, == can be applied to any pair of list elements. We cannot compare
    numerics and strings, but we can compare numerics with numerics and strings with
    strings.

    - We can test whether a value is in a list or tuple with in. For example ''cheese''
    in m returns a Boolean.

    - m.sort(), m.append(), and m.pop() work for lists only. Tuples are immutable.
    Note that these change the list *in place*.

    - We cannot apply m.sort() if the list or tuple contains elements which are not
    comparable.

    - We must supply an argument to m.append() (we have to append *something*).

    - m.pop() without argument pops the last element from a list.

    - m.pop(i) where i is a valid index into m pops the element at index i from the
    list.

    - We cannot pop from an empty list (IndexError).

    - m.index(x) will return the index of the first occurrence of x in m. Note: This
    will raise ValueError if x is not in m.


    # 10.11 Slicing


    Python supports a powerful means for extracting data from a sequence (string,
    list or tuple) called *slicing*.


    # Basic slicing


    We can take a *slice* through some sequence by specifying a range of indices.'
  - "[PAGE 222]\n\n```\n>>> un_security_council = ['China', 'France', 'Russia', 'UK',\n\
    ...                        'USA', 'Albania', 'Brazil', 'Gabon',\n...         \
    \               'Ghana', 'UAE', 'India', 'Ireland',\n...                     \
    \   'Kenya', 'Mexico', 'Norway']\n```\n\nLet's say we just wanted the permanent\
    \ members of the UN Security Council (these are the first five in the list). Instead\
    \ of providing a single index within brackets, we provide a range of indices,\
    \ in the form <sequence>[<start>:<end>].\n\n```\n>>> un_security_council[0:5]\n\
    ['China', 'France', 'Russia', 'UK', 'USA']\n```\n\n“Hey! Wait a minute!” you say,\
    \ “We provided a range of *six* indices! Why doesn’t this include ‘Albania’ too?”\n\
    \nReasonable question. Python treats the ending index as its stopping point, so\
    \ it slices from index 0 to index 5 *but not including the element at index 5*!\
    \ This is the Python way, as you’ll see with other examples soon. It does take\
    \ a little getting used to, but when you see this kind of indexing at work elsewhere,\
    \ you’ll understand the rationale.\n\nWhat if we wanted the non-permanent members\
    \ whose term ends in 2023? That’s Albania, Brazil, Gabon, Ghana, and UAE.\n\n\
    To get that slice we’d use\n\n```\n>>> un_security_council[5:10]\n['Albania',\
    \ 'Brazil', 'Gabon', 'Ghana', 'UAE']\n```\n\nAgain, Python doesn’t return the\
    \ item at index 10; it just goes up to index 10 and stops.\n\n# Some shortcuts\n\
    \nPython allows a few shortcuts. For example, we can leave out the starting index,\
    \ and Python reads from the start of the list (or tuple).\n\n```\n>>> un_security_council[:10]\n\
    ['China', 'France', 'Russia', 'UK', 'USA',\n 'Albania', 'Brazil', 'Gabon', 'Ghana',\
    \ 'UAE']\n```\n\nBy the same token, if we leave out the ending index, then Python\
    \ will read to the end of the list (or tuple).\n\n```\n>>> un_security_council[10:]\n\
    ['India', 'Ireland', 'Kenya', 'Mexico', 'Norway']\n```\n\nNow you should be able\
    \ to guess what happens if we leave out both start and end indices."
- md: "## Specifying the stride\n\nImagine you're on a stepping-stone path through\
    \ a garden. You might be able to step one stone at a time. You might be able to\
    \ step two stones at a time—skipping over every other stone. If you have long\
    \ legs, or the stones are very close together, you might be able to step three\
    \ stones at a time! We call this *step size* or *stride*.\n\nIn Python, when specifying\
    \ slices we can specify the stride as a third parameter. This comes in handy if\
    \ we only want values at odd indices or at even indices.\n\nThe syntax is `<sequence>[<start>:<stop>:<stride>]`.\n\
    \nHere are some examples:\n\n```python\n>>> un_security_council[::2]  # only even\
    \ indices\n['China', 'Russia', 'USA', 'Brazil', 'Ghana',\n 'India', 'Kenya', 'Norway']\n\
    >>> un_security_council[1::2]  # only odd indices\n['France', 'UK', 'Albania',\
    \ 'Gabon', 'UAE',\n 'Ireland', 'Mexico']\n```\n\nWhat happens if the stride is\
    \ greater than the number of elements in the sequence?\n\n```python\n>>> un_security_council[::1000]\n\
    ['China']\n```\n\nCan we step backward? Sure!\n\n```python\n>>> un_security_council[-1::-1]\n\
    ['Norway', 'Mexico', 'Kenya', 'Ireland', 'India',\n 'UAE', 'Ghana', 'Gabon', 'Brazil',\
    \ 'Albania',\n 'USA', 'UK', 'Russia', 'France', 'China']\n```\n\nNow you know\
    \ one way to get the reverse of a sequence. Can you think of some use cases for\
    \ changing the stride?\n\n## 10.12 Passing mutables to functions\n\nYou'll recall\
    \ that as an argument is passed to a function it is *assigned* to the corresponding\
    \ formal parameter. This, combined with mutability, can sometimes cause confusion.⁷\n\
    \n### Mutable and immutable arguments to a function\n\nHere's an example where\
    \ some confusion often arises.\n\n```python\n>>> def foo(lst):\n...     lst.append('Waffles')\n\
    ...\n>>> breakfasts = ['Oatmeal', 'Eggs', 'Pancakes']\n>>> foo(breakfasts)\n>>>\
    \ breakfasts\n['Oatmeal', 'Eggs', 'Pancakes', 'Waffles']\n```\n\nSome interpret\
    \ this behavior incorrectly, assuming that Python must handle immutable and mutable\
    \ arguments differently! This is *not* correct. Python passes mutable and immutable\
    \ arguments the same way. The argument is assigned to the formal parameter.\n\n\
    The result of this example is only a little different than if we'd done this:\n\
    \n```python\n>>> breakfasts = ['Oatmeal', 'Eggs', 'Pancakes']\n>>> lst = breakfasts\n\
    >>> lst.append('Waffles')\n>>> breakfasts\n['Oatmeal', 'Eggs', 'Pancakes', 'Waffles']\n\
    ```\n\nAll we've done is give two different *names* to the same list, by assignment.\
    \ In the example with the function foo (above) the only difference is that the\
    \ name lst exists only within the scope of the function. Otherwise, these two\
    \ examples behave the same.\n\nNotice that there is no \"reference\" being passed,\
    \ just an assignment taking place.\n\n### Names have scope, values do not\n\n\
    This example draws out another point. To quote Python guru Ned Batchelder:\n\n\
    > Names have scope but no type. Values have type but no scope.\n\n⁷If you search\
    \ on the internet you may find sources that say that immutable object are *passed\
    \ by value* and *mutable* objects are *passed by reference* in Python. This is\
    \ not correct! Python always passes by assignment—no exceptions. This is different\
    \ from many other languages (e.g., C, C++, Java). If you haven't heard these terms\
    \ before, just ignore them.\n\nWhat do we mean by that? Well, in the case where\
    \ we pass the list breakfast to the function foo, we create a new name for breakfast,\
    \ lst. This name, lst, exists only within the scope of the function, but the value\
    \ persists. Since we've given this list another name, breakfast, which exists\
    \ outside the scope of the function we can still access this list once the function\
    \ call has returned, even though the name lst no longer exists. Here's another\
    \ demonstration which may help make this more clear.\n\n```python\n>>> def foo(lst):\n\
    ...     lst.append('Waffles')\n...     print(lst)\n...\n>>> foo(['Oatmeal', 'Eggs',\
    \ 'Pancakes'])\n['Oatmeal', 'Eggs', 'Pancakes', 'Waffles']\n```\n\nHowever, now\
    \ we can no longer use the name lst since it exists only within the scope of the\
    \ function.\n\n```python\n>>> lst\nTraceback (most recent call last):\n  File\
    \ \"<stdin>\", line 1, in <module>\nNameError: name 'lst' is not defined. Did\
    \ you mean: 'list'?\n```\n\n### Where did the list go?\n\nWhen an object no longer\
    \ has a name that refers to it, Python will destroy the object in a process called\
    \ *garbage collection*. We won't cover garbage collection in detail. Let it suffice\
    \ to understand that once an object no longer has a name that refers to it, it\
    \ will be subject to *garbage collection*, and thus inaccessible.\n\nSo in the\
    \ previous example, where we passed a list literal to the function, the only time\
    \ the list had a name was during the execution of the function. Again, the formal\
    \ parameter is lst, and the argument (in this last example) is the literal ['Oatmeal',\
    \ 'Eggs', 'Pancakes']. The assignment that took place when the function was called\
    \ was lst = ['Oatmeal', 'Eggs', 'Pancakes']. Then we appended 'Waffles', printed\
    \ the list, and returned.\n\nPoof! lst is gone.\n\n## 10.13 Exceptions\n\n###\
    \ IndexError\n\nWhen dealing with sequences, you may encounter IndexError. This\
    \ exception is raised when an integer is supplied as an index, but there is no\
    \ element at that index.\n\n```python\n>>> lst = ['j', 'a', 's', 'p', 'e', 'r']\n\
    >>> lst[6]\nTraceback (most recent call last):\n  File \"<stdin>\", line 1, in\
    \ <module>\nIndexError: list index out of range\n```\n\nNotice that the error\
    \ message explicitly states “list index out of range”. In the example above, we\
    \ have a list of six elements, so valid indices range up to five. There is no\
    \ element at index six, so if we attempt to access lst[6], an IndexError is raised.\n\
    \n### TypeError\n\nAgain, when dealing with sequences, you may encounter TypeError\
    \ in a new context. This occurs if you try to use something other than an integer\
    \ (or slice) as an index.\n\n```python\n>>> lst[1.0]\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 1, in <module>\nTypeError: list indices must\
    \ be integers or slices, not float\n```\n\n```python\n>>> lst['cheese']\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\nTypeError:\
    \ list indices must be integers or slices, not str\n```\n\n```python\n>>> lst[None]\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    TypeError: list indices must be integers or slices, not NoneType\n```\n\nNotice\
    \ that the error message explicitly states that “list indices must be integers\
    \ or slices” and in each case, it identifies the offending type that was actually\
    \ supplied.\n\n## 10.14 Exercises\n\nWhere appropriate, guess first, then check\
    \ your guess in the Python shell.\n\n### Exercise 01\n\nGiven the following list,\n\
    \n```python\n>>> mammals = ['cheetah', 'aardvark', 'bat', 'dikdik', 'ermine']\n\
    ```\n\nwrite the indices that correspond to:\n\n- a. aardvark\n- b. bat\n- c.\
    \ cheetah\n- d. dikdik\n- e. ermine\n\nGive an example of an index, n, that would\
    \ result in an IndexError if we were to use it in the expression mammals[n].\n\
    \n### Exercise 02\n\nGiven the following tuple\n\n```python\n>>> elements = (None,\
    \ 'hydrogen', 'helium', 'lithium',\n...            'beryllium', 'boron', 'carbon',\n\
    ...            'nitrogen', 'oxygen')\n```\n\nwrite the indices that correspond\
    \ to\n\n- a. beryllium\n- b. boron\n- c. carbon\n- d. helium\n- e. hydrogen\n\
    - f. lithium\n- g. nitrogen\n- h. oxygen\n\n(Extra: If you've had a course in\
    \ chemistry, why do you think the first element in the tuple is None?)\n\n###\
    \ Exercise 03\n\nGiven the polynomial $4x^3 + 2x^2 + 5x - 4$, write the coefficients\
    \ as a tuple and name the result coefficients. Use an assignment.\n\n- a. What\
    \ is the value of len(coefficients)?\n- b. What is the value of coefficients[2]?\n\
    - c. Did you write the coefficients in ascending or descending order? Why did\
    \ you make that choice?\n\n### Exercise 04\n\nGiven the lists in exercises 1 and\
    \ 2\n\n```python\n>>> mammals = ['cheetah', 'aardvark', 'bat', 'dikdik', 'ermine']\n\
    >>> elements = (None, 'hydrogen', 'helium', 'lithium',\n...             'beryllium',\
    \ 'boron', 'carbon',\n...             'nitrogen', 'oxygen')\n```\n\nwhat is the\
    \ evaluation of the following expressions?\n\n- a. len(mammals) > len(elements)\n\
    - b. elements[5] < mammals[2]\n- c. elements[-1]\n\n### Exercise 05\n\nWrite a\
    \ function which, given any arbitrary list, returns True if the list has an even\
    \ number of elements and False if the list has an odd number of elements. Name\
    \ your function is_even_length().\n\n### Exercise 06\n\nGiven the following list\n\
    \n```python\nmoons = ['Mimas', 'Enceladus', 'Tethys', 'Dione']\n```\n\nwrite one\
    \ line of code which calls the function is_even_length() (see Exercise 05) with\
    \ moons as an argument and assigns the result to an object named n. What is n's\
    \ type?\n\n### Exercise 07\n\nGiven the following list, which contains data about\
    \ some moons of Saturn and their diameters (in km),\n\n```python\nmoons = [('Mimas',\
    \ 396.4), ('Enceladus', 504.2),\n         ('Tethys', 1062.2), ('Dione', 1122.8)]\n\
    ```\n\n- a. If we were to perform the assignment m = moons[0], what would m's\
    \ type be?\n- b. How would we get the name of the moon from m?\n- c. How would\
    \ we get the diameter of the moon from m?\n- d. Write a single line of code which\
    \ calculates the average diameter of these moons, and assigns the result to an\
    \ object named avg_diameter. (No, you do not need a loop.)\n- e. Write one line\
    \ of code which adds Iapetus to the list, using the same structure. The diameter\
    \ of Iapetus is 1468.6 (km)."
  mdcn: "## 指定步长\n\n想象你正走在花园里的踏脚石小径上。你可能一次能跨一块石头，也可能一次能跨两块石头——跳过中间的那块。如果你腿很长，或者石头之间挨得很近，你甚至可能一次跨三块！我们把这称为*步长*或*步幅*。\n\
    \n在Python中，指定切片时，我们可以将步长作为第三个参数。如果我们只想获取奇数索引或偶数索引的值，这会非常方便。\n\n语法是 `<sequence>[<start>:<stop>:<stride>]`。\n\
    \n以下是一些示例：\n\n```python\n>>> un_security_council[::2]  # 只取偶数索引\n['China', 'Russia',\
    \ 'USA', 'Brazil', 'Ghana',\n 'India', 'Kenya', 'Norway']\n>>> un_security_council[1::2]\
    \  # 只取奇数索引\n['France', 'UK', 'Albania', 'Gabon', 'UAE',\n 'Ireland', 'Mexico']\n\
    ```\n\n如果步长大于序列中的元素数量会怎样？\n\n```python\n>>> un_security_council[::1000]\n['China']\n\
    ```\n\n我们能反向跨步吗？当然可以！\n\n```python\n>>> un_security_council[-1::-1]\n['Norway',\
    \ 'Mexico', 'Kenya', 'Ireland', 'India',\n 'UAE', 'Ghana', 'Gabon', 'Brazil',\
    \ 'Albania',\n 'USA', 'UK', 'Russia', 'France', 'China']\n```\n\n现在你知道了获取序列反转的一种方法。你能想到一些改变步长的用例吗？\n\
    \n## 10.12 将可变对象传递给函数\n\n你会记得，当一个参数传递给函数时，它会被*赋值*给相应的形参。这一点，加上可变性，有时会引起混淆。⁷\n\n\
    ### 函数的可变与不可变参数\n\n这里有一个经常引起混淆的例子。\n\n```python\n>>> def foo(lst):\n...     lst.append('Waffles')\n\
    ...\n>>> breakfasts = ['Oatmeal', 'Eggs', 'Pancakes']\n>>> foo(breakfasts)\n>>>\
    \ breakfasts\n['Oatmeal', 'Eggs', 'Pancakes', 'Waffles']\n```\n\n有些人错误地解释了这种行为，认为Python一定是以不同方式处理不可变和可变参数！这*不*正确。Python传递可变和不可变参数的方式是相同的。参数被赋值给形参。\n\
    \n这个例子的结果与我们这样做相比，只有一点点不同：\n\n```python\n>>> breakfasts = ['Oatmeal', 'Eggs',\
    \ 'Pancakes']\n>>> lst = breakfasts\n>>> lst.append('Waffles')\n>>> breakfasts\n\
    ['Oatmeal', 'Eggs', 'Pancakes', 'Waffles']\n```\n\n我们所做的只是通过赋值，给同一个列表起了两个不同的*名字*。在上面的函数foo示例中，唯一的区别是名字`lst`只存在于函数的作用域内。除此之外，这两个示例的行为是相同的。\n\
    \n请注意，这里传递的不是“引用”，只是发生了赋值。\n\n### 名字有作用域，值没有\n\n这个例子引出了另一点。引用Python大师Ned Batchelder的话：\n\
    \n> 名字有作用域但没有类型。值有类型但没有作用域。\n\n⁷如果你在网上搜索，可能会发现一些资料说在Python中，不可变对象是*按值传递*的，而*可变*对象是*按引用传递*的。这是不正确的！Python总是按赋值传递——没有例外。这与许多其他语言（例如C、C++、Java）不同。如果你以前没听过这些术语，直接忽略它们就好。\n\
    \n我们这么说是什么意思呢？嗯，在我们将列表`breakfast`传递给函数`foo`的情况下，我们为`breakfast`创建了一个新名字`lst`。这个名字`lst`只存在于函数的作用域内，但值会持续存在。由于我们给了这个列表另一个名字`breakfast`，它存在于函数的作用域之外，因此即使在函数调用返回后，我们仍然可以访问这个列表，尽管名字`lst`已不复存在。这里还有另一个演示，可能有助于更清楚地说明这一点。\n\
    \n```python\n>>> def foo(lst):\n...     lst.append('Waffles')\n...     print(lst)\n\
    ...\n>>> foo(['Oatmeal', 'Eggs', 'Pancakes'])\n['Oatmeal', 'Eggs', 'Pancakes',\
    \ 'Waffles']\n```\n\n然而，现在我们不能再使用名字`lst`了，因为它只存在于函数的作用域内。\n\n```python\n>>> lst\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    NameError: name 'lst' is not defined. Did you mean: 'list'?\n```\n\n### 列表去哪了？\n\
    \n当一个对象不再有引用它的名字时，Python会销毁该对象，这个过程称为*垃圾回收*。我们不会详细讨论垃圾回收。只需理解，一旦一个对象不再有引用它的名字，它就会被*垃圾回收*，从而无法访问。\n\
    \n所以在前面的例子中，我们将一个列表字面量传递给函数，列表唯一有名字的时候是在函数执行期间。同样，形参是`lst`，而参数（在最后一个例子中）是字面量`['Oatmeal',\
    \ 'Eggs', 'Pancakes']`。函数调用时发生的赋值是`lst = ['Oatmeal', 'Eggs', 'Pancakes']`。然后我们追加了`'Waffles'`，打印了列表，然后返回了。\n\
    \n噗！`lst`消失了。\n\n## 10.13 异常\n\n### IndexError\n\n处理序列时，你可能会遇到`IndexError`。当提供一个整数作为索引，但该索引处没有元素时，就会引发此异常。\n\
    \n```python\n>>> lst = ['j', 'a', 's', 'p', 'e', 'r']\n>>> lst[6]\nTraceback (most\
    \ recent call last):\n  File \"<stdin>\", line 1, in <module>\nIndexError: list\
    \ index out of range\n```\n\n请注意，错误消息明确指出“list index out of range”。在上面的例子中，我们有一个包含六个元素的列表，因此有效索引范围最大到五。索引六处没有元素，因此如果我们尝试访问`lst[6]`，就会引发`IndexError`。\n\
    \n### TypeError\n\n同样，在处理序列时，你可能会在新的上下文中遇到`TypeError`。如果你尝试使用整数（或切片）以外的东西作为索引，就会发生这种情况。\n\
    \n```python\n>>> lst[1.0]\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nTypeError: list indices must be integers or slices, not\
    \ float\n```\n\n```python\n>>> lst['cheese']\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nTypeError: list indices must be integers\
    \ or slices, not str\n```\n\n```python\n>>> lst[None]\nTraceback (most recent\
    \ call last):\n  File \"<stdin>\", line 1, in <module>\nTypeError: list indices\
    \ must be integers or slices, not NoneType\n```\n\n请注意，错误消息明确指出“list indices must\
    \ be integers or slices”，并且在每种情况下，它都指出了实际提供的错误类型。\n\n## 10.14 练习\n\n在适当的情况下，先猜测，然后在Python\
    \ shell中验证你的猜测。\n\n### 练习 01\n\n给定以下列表，\n\n```python\n>>> mammals = ['cheetah',\
    \ 'aardvark', 'bat', 'dikdik', 'ermine']\n```\n\n写出对应以下元素的索引：\n\n- a. aardvark\n\
    - b. bat\n- c. cheetah\n- d. dikdik\n- e. ermine\n\n给出一个索引`n`的例子，如果在表达式`mammals[n]`中使用它，会导致`IndexError`。\n\
    \n### 练习 02\n\n给定以下元组\n\n```python\n>>> elements = (None, 'hydrogen', 'helium',\
    \ 'lithium',\n...            'beryllium', 'boron', 'carbon',\n...            'nitrogen',\
