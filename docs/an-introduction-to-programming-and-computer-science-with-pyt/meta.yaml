    也是无限的。\n\n有理数$\\mathbb{Q}$和所有实数的集合$\\mathbb{R}$也是无限的。\n\n这个事实——这些集合的大小是无限的——对计算机上的数值表示和数值计算有影响。\n\
    \n当我们使用计算机时，数字以整数或浮点数的形式表示。例如，在Python中，我们有独立的类型`int`和`float`来分别保存整数和浮点数。\n\n我不会详细讨论它们在二进制中是如何表示的，但这里提供一些信息。\n\
