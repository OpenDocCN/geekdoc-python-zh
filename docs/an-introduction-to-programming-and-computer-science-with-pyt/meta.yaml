    \ a function?\n\nA function call must match the *signature* of the function. The\
    \ signature of a function is its identifier and formal parameters. When we call\
    \ a function, the number of arguments must agree with the number of formal parameters.⁸\n\
    \nA function should receive as arguments *all* of the information it needs to\
    \ do its work. A function should *not* depend on variables that exist only in\
    \ the outer scope. (In most cases, it's OK for a function to depend on a *constant*\
    \ defined in the outer scope.)\n\nHere's an example of how things can go wrong\
    \ if we write a function which depends on some variable that exists in the outer\
    \ scope.\n\n```\ny = 2\n\ndef square(x):\n    return x ** y\n\nprint(square(3))\
    \  # prints \"9\"\n\ny = 3\n\nprint(square(3))  # oops! prints \"27\"\n```\n\n\
    This is a great way to introduce bugs and cause headaches. Better that the function\
    \ should use a value passed in as an argument, or a value assigned within the\
    \ body of the function (a local variable), or a literal. For example, this is\
    \ OK:\n\n```\ndef square(x):\n    y = 2\n    return x ** y\n```\n\n⁸Again, we're\
    \ excluding from consideration functions with optional arguments or keyword arguments."
