    This chapter introduces much of the machinery that will be used throughout the
    remainder of the text: variables, assignment, expressions, operators, and evaluation
    of expressions.


    On account of its broad applicability, a substantial account of modular arithmetic
    is presented as well.


    # Functions


    Functions are the single most important concept a beginning programmer can acquire.
    *Functional decomposition* is a crucial requirement of writing reliable, robust,
    correct code.


    This chapter explains why we use functions, how functions are defined, how functions
    are called, and how values are returned. We''ve tried to keep this “non-technical”
    and so there''s no discussion of a call stack, though there is discussion of scope.


    Because beginning programmers often introduce side effects into functions where
    they are undesirable or unnecessary, this chapter makes clear the distinction
    between *pure* functions (those without side effects) and *impure* functions (those
    with side effects, including mutating mutable objects).


    Because the math module is so widely used and includes many useful functions,
    we introduce the math module in this chapter. In this way, we also reinforce the
    idea of information hiding and good functional design. Do we need to know how
    the math module implements its sqrt() function? Of course not. Should we have
    to know how a function is implemented'
- md: '## Style


    Our goal here is to encourage the writing of idiomatic Python. Accordingly, we
    address the high points of PEP 8—the *de facto* style guide for Python—and provide
    examples of good and bad style. Students don’t always understand how important
    style is for the readability of one’s code. By following style guidelines we can
    reduce the cognitive load that’s required to read code, thereby making it easier
    to reason about and understand our code.


    ## Console I/O (input/output)


    This chapter demonstrates how to get input from the user (in command line programs)
    and how to format output using f-strings. Because f-strings have been around so
    long now, and because they allow for more readable code, we’ve avoided presentation
    of older, and now seldom used, C-style string formatting.


    ## Branching


    *Branching* is a programming language’s way of handling *conditional execution*
    of code. In this chapter, we cover conditions (Boolean expressions) which evaluate
    to a true or false (or a value which is “truthy” or “falsey”—like true or like
    false). Python uses these conditions to determine whether a block of code should
    be executed. In many cases we have multiple branches—multiple paths of execution
    that might be taken. These are implemented with `if`, `elif` (a *portmanteau*
    of “else if”), and often `else`. One common confusion that beginners face is understanding
    which branch is executed in an if/elif/else structure, and hopefully the chapter
    makes this clear. Also covered are nested `if` statements, and two ways of visually
    representing branching (each appropriate to different use cases)—decision trees
    and flow charts.


    ## Structure, development, and testing


    Beginners often struggle with how to structure their code—both for proper flow
    of execution and for readability. This chapter gives clear guidelines for structuring
    code based on common idioms in Python. It also addresses how we can incrementally
    build and test our code. Unlike many introductory texts, we present *assertions*
    in this chapter. Assertions are easy to understand and their use has great pedagogical
    value. In order to write an assertion, a programmer must understand clearly what
    behavior or output is expected for a given input. Using assertions helps you reason
    about what should be happening when your code is executed.


    ## Sequences


    Sequences—lists, tuples, and strings—are presented in this chapter. It makes sense
    to present these before presenting loops for two reasons. First, sequences are
    *iterable*, and as such are used in `for` loops, and without a clear understanding
    of what constitutes an iterable, understanding such loops may present challenges.
    Second, we often do work within a loop which might involve constructing or filtering
    a list of objects. Common features of sequences—for example, they are all indexed,
    support indexed reads, and are iterable—are highlighted throughout the chapter.
    As this chapter introduces our first *mutable* type, the Python list, we present
    the concepts of mutability and immutability in this chapter.


    ## Loops


    Loops allow for repetitive work or calculation. In this chapter we present the
    two kinds of loop supported by Python—`while` loops and `for` loops. At this point,
    students have seen iterables (in the form of sequences) and Boolean expressions,
    which are a necessary foundation for a proper presentation of loops. Also, this
    chapter introduces two new types—`range` and `enumerate`—and their corresponding
    constructors. Presentation of `range` entails discussion of *arithmetic sequences*,
    and presentation of `enumerate` works nicely with tuple *unpacking* (or more generally,
    sequence unpacking), and so these are presented first in this chapter. This chapter
    also provides a brief introduction to stacks and queues, which are trivially implemented
    in Python using `list` as an underlying data structure. I''ve intentionally excluded
    treatment of *comprehensions* since beginners have difficulty reading and writing
    comprehensions without a prior, solid foundation in `for` loops.


    ## Randomness, games, and simulations


    There are many uses for randomness. Students love to write programs which implement
    games, and many games involve some chance element or elements—rolling dice, spinning
    a wheel, tossing a coin, shuffling a deck, and so on. Another application is in
    simulations, which may also include some chance elements. All manner of physical
    and other phenomena can be simulated with some randomness built in. This chapter
    presents Python''s `random` module, and some of the more commonly used methods
    within this module—`random.random()`, `random.randint()`, `random.choice()`, and
    `random.shuffle()`. Much of this is done within the context of games of chance,
    but we also include some simulations (e.g., random walk and Gambler''s Ruin).
    There is also some discussion of pseudo-random numbers and how Python''s pseudo-random
    number generator is seeded.


    ## File I/O (input/output)


    This chapter shows you how to read data from and write data to a file. File I/O
    is best accomplished using a context manager. Context managers were introduced
    with Python 2.5 in 2006, and are a much preferred idiom (as compared to using
    try/finally). Accordingly, all file I/O demonstrations make use of context managers
    created with the Python keyword with. Because so much data is in CSV format (or
    can be exported to this format easily), we introduce the csv module in this chapter.
    Using the csv module reduces some of the complexity we face when reading data
    from a file, since we don''t have to parse it ourselves.


    ## Exception handling


    In this chapter, we present simple exception handling (using try/except, but not
    finally), and explain that some exceptions should not be handled since in doing
    so, we can hide programming defects which should be corrected. We also demonstrate
    the use of exception handling in input validation. When you reach this chapter,
    you''ll already have seen while loops for input validation, so the addition of
    exception handling represents only an incremental increase in complexity in this
    context.


    ## Data analysis and presentation


    This chapter is motivated in large part by the University of Vermont''s QD (quantitative
    and data literacy) designation for the course for which this textbook was written.
    Accordingly, we present some very basic descriptive statistics and introduce Python''s
    statistics module including statistics.mean(), statistics.pstdev(), and statistics.quantiles().
    The presentation component of this chapter is done using Matplotlib, which is
    the de facto standard for plotting and visualization with Python. This covers
    only the rudiments of Matplotlib''s Pyplot interface (line plot, bar plot, etc.),
    and is not intended as a complete introduction.


    ## Dictionaries


    Dictionaries are the last new type we present in the text. Dictionaries store
    information using a key/value model—we look up values in a dictionary by their
    keys. Like sequences, dictionaries are iterable, but since they have keys rather
    than indices, this works a little differently. We''ll see three different ways
    to iterate over a dictionary. We''ll also learn about hashability in the context
    of dictionary keys.


    ## Graphs


    Since graphs are so commonplace in computer science, it seems appropriate to include
    a basic introduction to graphs in this text. Plus, graphs are really fun! A graph
    is a collection of vertices (also called nodes) and edges, which connect the vertices
    of the graph. The concrete example of a highway map is used, and an algorithm
    for breadth-first search (BFS) is demonstrated. Since queues were introduced in
    chapter 11, the conceptual leap here—using a queue in the BFS algorithm—shouldn''t
    be too great.


    ## Assumptions regarding prior knowledge of mathematics


    This text assumes a reasonable background in high-school algebra and a little
    geometry (for example, the Pythagorean theorem and right triangles). Prior exposure
    to summations and subscripts would help the reader but is not essential, as these
    are introduced in the text. The same goes for mean, standard deviation, and quantiles.
    You might find it helpful if you''ve seen these before, but these, too, are introduced
    in the text. The minimum expectation is that you can add, subtract, multiply and
    divide; that you understand exponents and square roots; and that you understand
    the precedence of operations, grouping of expressions with parentheses, and evaluating
    expressions with multiple terms and operations.


    ## Assumptions regarding prior knowledge of computer use


    While this book assumes no prior knowledge whatsoever when it comes to programming,
    it does assume that you have some familiarity with using a computer and have a
    basic understanding of your computer''s file system (a hierarchical system consisting
    of files and directories). If you don''t know what a file is, or what a directory
    is, see Appendix D, or consult documentation for your operating system. Writing
    and running programs requires that you understand the basics of a computer file
    system.


    ## Typographic conventions used in this book


    Names of functions, variables, and modules are rendered in fixed-pitch typeface,
    as are Python keywords, code snippets, and sample output.


    ```

    print("Hello, World!")

    ```


    When referring to structures which make use of multiple keywords we render these
    keywords separated by slashes but do not use fixed-pitch typeface. Examples: if/else,
    if/elif, if/elif/else, try/except, try/finally, etc. File names, e.g., hello_world.py,
    and module names, e.g., math, are also rendered in fixed-pitch typeface. Where
    it is understood that code is entered into the Python shell, the interactive Python
    prompt >>> is shown. Wherever you see this, you should understand we''re working
    in Python shell. >>> should never appear in your code. Return values and evaluation
    of expressions are indicated just as they are in the Python shell, without the
    leading >>>.


    ```

    >>> 1 + 2

    3

    >>> import math

    >>> math.sqrt(36)

    6

    ```


    > 2Except in the case of doctests, which are not presented in this text.'
  mdcn: '## 风格


    我们的目标是鼓励编写地道的 Python 代码。因此，我们重点介绍了 PEP 8 的要点——这是 Python 的*事实上的*风格指南——并提供了良好和不良风格的示例。学生并不总是理解风格对于代码可读性的重要性。遵循风格指南可以减少阅读代码所需的认知负荷，从而更容易推理和理解我们的代码。


    ## 控制台 I/O（输入/输出）


    本章演示如何从用户（在命令行程序中）获取输入，以及如何使用 f-string 格式化输出。由于 f-string 已经存在很长时间，并且它们允许编写更具可读性的代码，我们避免了介绍较旧且现在很少使用的
    C 风格字符串格式化。


    ## 分支


    *分支*是编程语言处理代码*条件执行*的方式。在本章中，我们涵盖了条件（布尔表达式），这些表达式求值为真或假（或“真值”或“假值”——像真或像假）。Python
    使用这些条件来确定是否应执行一段代码块。在许多情况下，我们有多个分支——可能采取的多个执行路径。这些通过 `if`、`elif`（“else if”的*混成词*）以及通常的
    `else` 来实现。初学者面临的一个常见困惑是理解在 if/elif/else 结构中执行哪个分支，希望本章能阐明这一点。本章还涵盖了嵌套的 `if` 语句，以及两种可视化表示分支的方式（每种都适用于不同的用例）——决策树和流程图。


    ## 结构、开发和测试


    初学者经常在如何构建代码方面遇到困难——既为了正确的执行流程，也为了可读性。本章根据 Python 中的常见惯用法，为构建代码提供了清晰的指南。它还解决了我们如何增量地构建和测试代码。与许多入门文本不同，我们在本章中介绍了*断言*。断言易于理解，并且其使用具有很大的教学价值。为了编写断言，程序员必须清楚地理解对于给定输入预期的行为或输出。使用断言有助于你推理代码执行时应该发生什么。


    ## 序列


    本章介绍了序列——列表、元组和字符串。在介绍循环之前介绍这些是有道理的，原因有二。首先，序列是*可迭代的*，因此用于 `for` 循环，如果不清楚什么构成可迭代对象，理解这样的循环可能会带来挑战。其次，我们经常在循环中执行可能涉及构建或过滤对象列表的工作。序列的共同特征——例如，它们都是索引的，支持索引读取，并且是可迭代的——在本章中被重点强调。由于本章介绍了我们的第一个*可变*类型——Python
    列表，我们在本章中介绍了可变性和不可变性的概念。


    ## 循环


    循环允许重复工作或计算。在本章中，我们介绍了 Python 支持的两种循环——`while` 循环和 `for` 循环。此时，学生已经看到了可迭代对象（以序列的形式）和布尔表达式，这是正确介绍循环的必要基础。此外，本章介绍了两种新类型——`range`
    和 `enumerate`——以及它们相应的构造函数。介绍 `range` 需要讨论*等差数列*，而介绍 `enumerate` 与元组*解包*（或更一般地，序列解包）配合得很好，因此这些在本章中首先被介绍。本章还简要介绍了栈和队列，它们在
    Python 中使用 `list` 作为底层数据结构可以轻松实现。我有意排除了对*推导式*的处理，因为初学者在没有扎实的 `for` 循环基础的情况下，阅读和编写推导式有困难。


    ## 随机性、游戏和模拟


    随机性有许多用途。学生喜欢编写实现游戏的程序，而许多游戏涉及一些随机元素——掷骰子、转轮盘、抛硬币、洗牌等等。另一个应用是在模拟中，模拟也可能包括一些随机元素。各种物理和其他现象都可以通过内置一些随机性来模拟。本章介绍了
    Python 的 `random` 模块，以及该模块中一些更常用的方法——`random.random()`、`random.randint()`、`random.choice()`
    和 `random.shuffle()`。大部分内容是在赌博游戏的背景下完成的，但我们也包括一些模拟（例如，随机游走和赌徒破产）。本章还讨论了伪随机数以及
    Python 的伪随机数生成器是如何播种的。


    ## 文件 I/O（输入/输出）


    本章向你展示如何从文件读取数据以及将数据写入文件。文件 I/O 最好使用上下文管理器来完成。上下文管理器在 2006 年随 Python 2.5 引入，是一种更受青睐的惯用法（与使用
    try/finally 相比）。因此，所有文件 I/O 演示都使用 Python 关键字 `with` 创建的上下文管理器。由于大量数据采用 CSV 格式（或可以轻松导出到此格式），我们在本章中介绍了
    csv 模块。使用 csv 模块减少了我们从文件读取数据时面临的一些复杂性，因为我们不必自己解析它。


    ## 异常处理


    在本章中，我们介绍了简单的异常处理（使用 try/except，但不使用 finally），并解释了某些异常不应该被处理，因为这样做可能会隐藏应该纠正的编程缺陷。我们还演示了在输入验证中使用异常处理。当你读到本章时，你已经见过用于输入验证的
    while 循环，因此在这种情况下，添加异常处理只代表复杂性的增量增加。


    ## 数据分析和展示


    本章在很大程度上是由佛蒙特大学为本教材所写的课程的 QD（定量和数据素养）指定所驱动的。因此，我们介绍了一些非常基础的描述性统计，并介绍了 Python 的
    statistics 模块，包括 statistics.mean()、statistics.pstdev() 和 statistics.quantiles()。本章的展示部分使用
    Matplotlib 完成，这是 Python 中绘图和可视化的事实标准。这仅涵盖了 Matplotlib 的 Pyplot 接口的基础知识（折线图、条形图等），并非旨在作为完整的介绍。


    ## 字典


    字典是我们在本书中介绍的最后一种新类型。字典使用键/值模型存储信息——我们通过键在字典中查找值。与序列一样，字典是可迭代的，但由于它们有键而不是索引，这工作方式略有不同。我们将看到三种不同的方式来迭代字典。我们还将学习字典键的哈希性。


    ## 图


    由于图在计算机科学中如此普遍，在本书中包含图的基本介绍似乎是合适的。此外，图真的很有趣！图是顶点（也称为节点）和边的集合，边连接图的顶点。使用了高速公路地图的具体示例，并演示了广度优先搜索（BFS）算法。由于队列在第
    11 章中已经介绍过，这里的概念飞跃——在 BFS 算法中使用队列——应该不会太大。


    ## 关于数学先验知识的假设


    本书假设读者具有合理的高中代数背景和一点几何知识（例如，勾股定理和直角三角形）。之前接触过求和和下标会对读者有所帮助，但并非必需，因为这些内容在本书中会介绍。平均值、标准差和分位数也是如此。如果你以前见过这些，可能会觉得有帮助，但这些内容也在本书中介绍。最低要求是你会加、减、乘、除；理解指数和平方根；并理解运算的优先级、用括号对表达式进行分组，以及求值包含多个项和运算的表达式。


    ## 关于计算机使用先验知识的假设


    虽然本书在编程方面假设没有任何先验知识，但它假设你熟悉使用计算机，并对计算机的文件系统（一个由文件和目录组成的层次系统）有基本的了解。如果你不知道什么是文件，或者什么是目录，请参阅附录
    D，或查阅操作系统的文档。编写和运行程序需要你理解计算机文件系统的基础知识。


    ## 本书中使用的排版约定


    函数、变量和模块的名称以固定宽度字体呈现，Python 关键字、代码片段和示例输出也是如此。


    ```

    print("Hello, World!")

    ```


    当指代使用多个关键字的结构时，我们用斜杠分隔这些关键字，但不使用固定宽度字体。示例：if/else、if/elif、if/elif/else、try/except、try/finally
    等。文件名（例如 hello_world.py）和模块名（例如 math）也以固定宽度字体呈现。在理解代码是输入到 Python shell 中的情况下，会显示交互式
    Python 提示符 `>>>`。无论你在哪里看到这个，都应该理解我们是在 Python shell 中工作。`>>>` 不应出现在你的代码中。返回值和表达式的求值与在
    Python shell 中一样显示，没有前导的 `>>>`。


    ```

    >>> 1 + 2

    3

    >>> import math

    >>> math.sqrt(36)

    6

    ```


    > 2 除了 doctest 的情况，本书中未介绍 doctest。'
