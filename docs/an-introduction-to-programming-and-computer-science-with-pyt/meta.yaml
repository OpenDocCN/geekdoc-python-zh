    \ outside world. In fact, *information hiding* is considered a fundamental principle\
    \ of software design.⁹\n\nFor example, let's say I gave you a function which calculates\
    \ the square root of any real number greater than zero. Should you be required\
    \ to understand the internal workings of this function in order to use it correctly?\
