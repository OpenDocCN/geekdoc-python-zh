    , line 8, in psi_to_bars\n    return PSI_PER_BAR / p\nTypeError: unsupported operand\
    \ type(s) for /: 'float' and 'str'\n```\n\nOh dear! Already we have a problem.\
    \ Looking at the last line of the error message we see\n\n> TypeError: unsupported\
    \ operand type(s) for /: 'float' and 'str'\n\n**What went wrong?**\nObviously\
    \ we’re trying to do arithmetic—division—where one operand is a *float* and the\
    \ other is a *str*. That’s not allowed, hence the type error.\nWhen we give this\
