  md: '# 5.1 Introduction to functions


    Among the most powerful tools we have as programmers—perhaps the most powerful
    tools—are *functions*.


    We’ve already seen some built-in Python functions, *e.g.*, `print()` and `type()`.
    We’ll see many others soon.


    Essentially, a function is a sub-program which we can “call” or “invoke” from
    within our larger program. For example, consider this code which prints a string
    to the console.


    ```

    print(''Do you want a cookie?'')

    ```


    Here we’re making use of built-in Python function `print()`. The developers of
    Python have written this function for you, so you can use it within your program.
    When we use a function, we say we are “calling” or “invoking” the function.


    In the example above, we *call* the `print()` function, supplying the string `''Do
    you want a cookie?''` as an argument.


    As a programmer using this function, you don’t need to worry about what goes on
    “under the hood” (which is quite a bit, actually). How convenient!


    When we call a function, the flow of control within our program passes to the
    function, the function does its work, and then returns a value. All Python functions
    return a value, though in some cases, the value returned is `None`.


    # Defining a function


    Python allows us to define our own functions. A **function** is a unit of code
    which performs some calculation or some task. A function may take zero or more
    **arguments** (inputs to the function). The definition of a function may include
    zero or more **formal parameters** which are, essentially, variables that will
    take on the values of the arguments provided. When called, the body of the function
    is executed. In most, but not all cases, a value is explicitly returned. Returned
    values might be the result of a calculation or some status indicator—this will
    vary depending on the purpose of the function. If a value is not explicitly returned,
    the value `None` is returned implicitly.


    Let’s take the simple example of a function which squares a number. In your mathematics
    class you might write


    $$f(x) = x^2$$


    and you would understand that when we apply the function $f$ to some argument
    $x$ the result is $x^2$. For example, $f(3) = 9$. Let’s write a function in Python
    which squares the argument supplied:


    > ¹Unlike C or Java, there is no such thing as a *void* function in Python. All
    Python functions return a value, even if that value is `None`.


    ²Different languages have different names for sub-programs we can call within
    a larger program, *e.g.*, functions, methods, procedures, subroutines, etc., and
    some of these designations vary with context. Also, these are defined and implemented
    somewhat differently in different languages. However, the fundamental idea is
    similar for all: these are portions of code we can call or invoke within our programs.'
