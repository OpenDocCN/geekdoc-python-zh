  md: '# escape sequence


    An *escape sequence* (within a string) is a substring preceded by a \ character,
    indicating that the following character should be interpreted literally and not
    as a delimiter. Example: print(''The following apostrophe isn\''t a delimiter'')


    Escape sequences are also used to represent special values that otherwise can''t
    be represented within a string. For example, \n represents a new line and \t represents
    a tab.


    # Euclidean division


    This is the kind of division you first learned in primary school, before you learned
    about decimal expansion. A calculation involving *Euclidean division* yields a
    quotient and a remainder (which may be zero). In Python, this is implemented by
    two separate operators, one which yields the quotient (without decimal expansion),
    and the other which yields the remainder. These are // (a.k.a. floor division)
    and % (a.k.a., modulo) respectively.


    So, for example, in primary school, when asked to divide 25 by 3, you''d answer
    8 remainder 1. In Python:


    ```

    quotient = 25 // 3   # quotient gets 8

    remainder = 25 % 3   # remainder gets 1

    ```


    # evaluate / evaluation


    Expressions are *evaluated* by reducing them to a value. For example, the *evaluation*
    of the expression 1 + 1 yields 2. The evaluation of larger expressions proceeds
    by order of operator precedence or order of function calls. So, for example,


    ```

    >>> import math

    >>> x = 16

    >>> y = 5

    >>> int(math.sqrt(x) + 4 * y + 1)

    25

    ```


    The call to math.sqrt() is evaluated first (yielding 4.0). The multiplication
    4 * y is evaluated next (yielding 20). Then addition is performed (4.0 + 20 +
    1, yielding 25.0). Finally, the int constructor is called, and the final evaluation
    of this expression is 25.


    When literals are evaluated, they evaluate to themselves.


    # exception


    An *exception* is an error that occurs at run time. This occurs when code is syntactically
    valid, but it contains semantic defects (bugs) or receives unexpected values.
    When Python detects such an error, it raises an exception. If the exception is
    not handled, program execution terminates.'
