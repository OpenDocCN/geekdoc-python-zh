  md: '# Euclidean or “floor” division


    Obviously the operations of finding the quotient and the remainder are closely
    related. For any two integers $a$, $b$, with $b \neq 0$ there exist unique integers
    $q$ and $r$ such that


    $$a = bq + r$$


    where $q$ is the Euclidean quotient and $r$ is the remainder. Furthermore, $0
    \leq r < |b|$, where $|b|$ is the absolute value of $b$. This should be familiar.


