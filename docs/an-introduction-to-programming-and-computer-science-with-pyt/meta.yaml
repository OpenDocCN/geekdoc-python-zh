  mdcn: "所以，Python 对此有自己的看法。\n现在，去进行指数运算吧！\n\n## 一个小谜题\n\n考虑以下 Python shell 会话：\n\n\
    ```\n>>> pow(-1, 0)\n1\n>>> -1 ** 0\n-1\n```\n\n这是怎么回事？我们使用 `pow()` 得到的结果是预期的。难道这两个表达式不应该产生相同的结果吗？你能猜出为什么它们会得到不同的答案吗？\n\
    \n## 4.7 异常\n\n**异常**是在运行时发生的错误，也就是在你运行代码时发生的错误。当发生此类错误时，Python 会引发一个异常，打印一条包含异常信息的消息，然后停止执行。异常有不同的类型，这告诉我们发生了哪种错误。\n\
    \n如果存在语法错误，会引发 `SyntaxError` 类型的异常。如果存在缩进错误（一种更具体的语法错误），会引发 `IndentationError`。这些错误发生在你的代码运行之前——它们是在\
    \ Python 首次读取你的文件时被发现的。\n\n大多数其他异常发生在你的程序运行时。在这些情况下，消息将包含所谓的*回溯信息*，它提供了关于错误发生在代码中何处的一些信息。异常消息的最后一行报告了已发生异常的类型。从下往上阅读此类消息通常很有帮助。\n\
    \n以下是对你可能遇到的前几种异常类型的简要总结，并且在每个新章节中，我们将根据需要介绍新的异常类型。\n\n## SyntaxError\n\n如果你编写的代码不符合\
    \ Python 语法规则，Python 将引发 `SyntaxError` 类型的异常。示例：\n\n```\n>>> 1 + / 1\nFile \"\
    <stdin>\", line 1\n  1 + / 1\n    ^\nSyntaxError: invalid syntax\n```\n\n注意，`^`\
    \ 字符用于指示错误发生的位置。\n另一个示例：\n\n```\n>>> True False\nFile \"<stdin>\", line 1\n  \
    \  True False\n    ^\nSyntaxError: invalid syntax\n```\n\n当你遇到语法错误时，意味着你的代码的某些部分不符合语法规则。包含语法错误的代码无法被\
    \ Python 解释器执行，并且必须在代码运行之前纠正语法错误。\n\n## NameError\n\n当我们尝试使用一个未定义的名称时，会发生 NameError。在使用名称之前，必须为该名称分配一个值。\n\
    这是一个 NameError 的示例：\n\n```\n>>> print(x)\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nNameError: name 'x' is not defined\n\
    ```\n\n注意，Python 报告了 NameError 并告知你尝试使用但未定义的名称（在本例中为 x）。\n这类错误最常发生在我们拼写错误名称时。\n\
    根据错误的根本原因，有两种方法可以纠正这些错误。\n\n- 如果原因是拼写错误，只需纠正你的拼写错误。\n- 如果不仅仅是拼写错误，那么你必须通过使用适当的名称进行赋值来*定义*该名称。\n\
    \n```\n>>> pet = 'rabbit'\n>>> print(pot)\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nNameError: name 'pot' is not defined\n\
    >>> print(pet)\nrabbit\n```\n\n```\n>>> age = age + 1  # Happy birthday!\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\nNameError:\
    \ name 'age' is not defined\n```\n\n```\n>>> age = 100\n>>> age = age + 1  # Happy\
    \ birthday!\n>>> print(age)\n101\n```\n\n## TypeError\n\n当我们尝试对不支持该操作的对象执行操作时，会发生\
    \ TypeError。\n\nPython 文档指出：\"[TypeError 在]将操作或函数应用于不适当类型的对象时引发。关联值是一个字符串，提供有关类型不匹配的详细信息。\"\
    <sup>11</sup>\n\n例如，我们可以使用 `+` 运算符对 `int` 类型的操作数执行加法，也可以使用相同的运算符连接字符串，但我们不能将 `int`\
