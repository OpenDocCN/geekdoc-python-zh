    2\n>>> iterator.__next__()\n3\n>>> iterator.__next__()\n4\n>>> iterator.__next__()\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    StopIteration\n```\n\n所有可迭代对象都共享此接口和行为。\n\n## 11.16 练习\n\n### 练习 01\n\n编写一个 while\
