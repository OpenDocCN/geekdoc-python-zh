  md: '# rubberducking


    Rubberducking is a process whereby a programmer tries to explain their code to
    a rubber duck, and in doing so (hopefully) solves a problem or realizes what needs
    to be done in order to fix a bug. Rubber ducks are particularly useful in this
    respect in that they listen without interruption, and, not being too bright, they
    require the simplest possible explanation from the programmer. If you get stuck,
    *talk to the duck*!


    # run time


    *Run time* (or sometimes *runtime*) refers to the time at which a program is run.


    # scope


    *Scope* refers to the visibility or lifetime of a name (or identifier). For example,
    variables first defined in assignment statements within a function or formal parameters
    of a function are *local* to that function, and when the function returns and
    its namespace is destroyed such local variables are out of scope.


    We often refer to *inner scope* as the scope within the body of a function or
    method, and *outer scope* to the code outside the body of a function.


    See also: Chapter 5 Functions, and glossary entry for namespace.


    # script mode


    *Script mode* refers to the mode of operation at work when we run a program that
    we''d previously written and saved. This is distinct from *interactive mode* which
    takes place in the Python shell.


    # seed


    A *seed* is a starting point for calculations used to generate a pseudo-random
    number (or sequence of pseudo-random numbers). Usually, when using functions from
    the random module, we allow the random number generator to use the seed provided
    by the computer''s operating system (which is designed to be as unpredictable
    as possible). Sometimes, however, and especially in cases where we wish to test
    code which includes the use of pseudo-random numbers, we explicitly set the seed
    to a known value. In doing so, we can reproduce the sequence of pseudo-random
    numbers. See: Chapter 12 Randomness, games, and simulations.


    # semantics


    *Semantics* refers to the meaning of our code as distinct from the *syntax* required
    by the language. Bugs are defects of semantics—our code doesn''t mean (or do)
    what we intend it to mean (or do).'
