    # 6.4 Names (identifiers)


    Choosing good names is crucial in producing readable code. Use meaningful names
    when defining variables, constants, and functions. This makes your code easier
    to read and easier to debug!


    Examples of good variable names:


    +   - velocity

    - average_score

    - watts


    Examples of bad variable names:


    +   - q

    - m7

    - rsolln


    Compare these with the good names (above). With a good name, you know what the
    variable represents. With these bad names, who knows what they mean? (Seriously,
    what the heck is rsolln?)


    There are some particularly bad names that should be avoided no matter what. Never
    use the letter "O" (upper or lower case) or "l" (lowercase "L") or "I" (upper
    case "i") as a variable name. "O" and "o" look too much like "0", "l" and "I"
    look too much like "1".


    While single letter variable names are, in general, to be avoided, it''s OK sometimes
    (depending on context). For example, it''s common practice to use i, j, etc. for
    loop indices (we''ll get to loops later) and x, y, z for spatial coordinates,
    but only use such short names when it is 100% clear from context what these represent.


    Similar rules apply to functions. Examples of bad function names:


    +   - i2m()

    - sd()


    Examples of good function names:


    +   - inches_to_meters()

    - standard_deviation()


    # ALL_CAPS, lowercase, snake_case, camelCase, WordCaps


    In Python, the convention for naming variables and function is that they should
    use lowercase or so-called snake case, in which words are separated by underscores.


    In some other languages, camelCase (with capital letters in the middle) or WordCaps
    (where each word is capitalized) are the norm. Not so with Python. camelCase should
    be avoided (always). WordCaps are appropriate for class names (a feature of object-oriented
    programming—something that''s not presented in this text).


    +   - Good: price_per_item

    - Bad: Priceperitem or pricePerItem'
