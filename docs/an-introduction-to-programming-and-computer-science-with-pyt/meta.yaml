  md: 'Again, in programming, every syntactically valid statement or expression has
    a meaning. It is our job as programmers to write code which is syntactically valid
    but also semantically correct.


    What happens if we write something which is syntactically valid and also semantically
    incorrect? It means that we''ve written code that *does not do what we intend
    for it to do*. There''s a word for that: a *bug*.


    Here''s an example. Let''s say we know the temperature in degrees Fahrenheit,
    but we want to know the equivalent in degrees Celsius. You may know the formula


    $$C = \frac{F - 32}{1.8}$$


    where F is degrees Fahrenheit and C is degrees Celsius.


    Let''s say we wrote this Python code.


    ```

    f = 68.0            # 68 degrees Fahrenheit

    c = (f - 32) * 1.8  # attempt conversion to Celsius

    print(c)            # print the result

    ```


    This prints 64.8 which is incorrect! What''s wrong? We''re multiplying by 1.8
    when we should be dividing by 1.8! This is a problem of *semantics*. Our code
    is syntactically valid. Python interprets it, runs it, and produces a result—but
    the result is *wrong*. Our code does not do what we intend for it to do. Call
    it what you will—a defect, an error, a bug—but it''s a semantic error, not a syntactic
    error.


    To fix it, we must change the *semantics*—the meaning—of our code. In this case
    the fix is simple.


    ```

    f = 68.0            # 68 degrees Fahrenheit

    c = (f - 32) / 1.8  # correct conversion to Celsius

    print(c)            # print the result

    ```


    and now this prints 20.0 which is correct. Now our program has the semantics we
    intend for it.


