  - "[PAGE 243]\n\nThis algorithm saves us from having to factor both terms.\nConsider\
    \ a larger problem instance with $a = 30759$ and $b = 9126$.\nFactoring these\
    \ would be a nuisance, but the Euclidean algorithm takes\nonly eight iterations\
    \ to find the answer, 3.\n\n# Show me the code!\n\nHere's an implementation in\
    \ Python.\n\n```\n\"\"\"\nImplementation of Euclid's algorithm.\n\"\"\"\n\na =\
    \ int(input(\"Enter a positive integer, a: \"))\nb = int(input(\"Enter a positive\
    \ integer, b: \"))\n\nwhile b != 0:\n    remainder = a % b\n    a = b\n    b =\
    \ remainder\n\nprint(f\"The GCD is {a}.\")\n```\n\nThat's one elegant little algorithm\
    \ (and one of my personal favorites).\nIt also demonstrates the use of a while\
    \ loop, which is needed, since we\ndon't know *a priori* how many iterations it\
    \ will take to reach a solution.\n\n# 11.5 for loops\n\nWe've seen that while\
    \ loops are useful when we know we wish to perform\na calculation or task, but\
    \ we don't know in advance how many iterations\nwe may need. Thus, while loops\
    \ provide a condition, and we loop until\nthat condition (whatever it may be)\
    \ no longer holds true.\nPython has another type of loop which is useful when:\n\
    \n+   - we know exactly how many iterations we require, or\n- we have some sequence\
    \ (i.e., list, tuple, or string) and we wish\nto perform calculations, tasks,\
    \ or operations with respect to the\nelements of the sequence (or some subset\
    \ thereof).\n\nThis new kind of loop is the for loop. for loops are so named because\n\
    they iterate *for* each element in some iterable. Python for loops *iterate*\n\
    over some *iterable*. Always.$^4$\n\n$^4$for loops in Python work rather differently\
    \ than they do in many other lan-\nguages. Some languages use counters, and thus\
    \ for loops are *count-controlled*. For\nexample, in Java we might write\n\n```\n\
    for (int i = 0; i < 10; ++i) {\n    // do something\n}\n```"
  - '[PAGE 244]


    What''s an iterable? Something we can iterate over, of course! And what might
    that be? The sequence types we''ve seen so far (list, tuple, string) are sequences,
    and these are iterable. We can also produce other iterable objects (which we shall
    see soon).


    Here''s an example. We can iterate over a list, [1, 2, 3], by taking the elements,
    one at a time, in the order they appear in sequence.


    ```

    >>> numbers = [1, 2, 3]

    >>> for n in numbers:

    ...     print(n)

    ...

    1

    2

    3

    ```


    See? In our for loop, Python iterated over the elements (a.k.a. “members”) of
    the list provided. It started with 1, then 2, then 3. At that point the list was
    exhausted, so the loop terminated.


    If it helps, you can read for n in numbers: as “for each number, n, in the iterable
    called ‘numbers’.”


    This works for tuples as well.


    ```

    >>> letters = (''a'', ''b'', ''c'')

    >>> for letter in letters:

    ...     print(letter)

    ...

    a

    b

    c

    ```


    Notice the syntax: for <some variable> in <some iterable>:. As we iterate over
    some iterable, we get each member of the iterable in turn, one at a time. Accordingly,
    we need to assign these members (one at a time) to some variable.


    In the first example, above the variable has the identifier n.


    ```

    >>> numbers = [1, 2, 3]

    >>> for n in numbers:

    ...     print(n)

    ...

    ```


    As we iterate over numbers (a list), we get one element from the list at a time
    (in the order they appear in the list). So at the first iteration, n is assigned
    the value 1. At the second iteration, n is assigned the value 2.


    > In this case, there''s a counter, i, which is updated at each iteration of the
    loop. Here we update by incrementing i using ++i (which in Java increments i).
    The loop runs so long as the control condition i < 10 is true. On the last iteration,
    with i equal to nine, i is incremented to ten, then the condition no longer holds,
    and the loop exits. This is not how for loops work in Python! Python for loops
    always iterate over an iterable.'
- md: "At the third iteration, n is assigned the value 3. After the third iteration,\
    \ there are no more elements left in the sequence and the loop terminates.\n\n\
    Thus, the syntax of a for loop *requires* us to give a variable name for the variable\
    \ which will hold the individual elements of the sequence. For example, we cannot\
    \ do this:\n\n```\n>>> for [1, 2, 3]:\n...     print(\"Hello!\")\n```\n\nIf we\
    \ were to try this, we'd get a SyntaxError. The syntax that must be used is:\n\
    \n```\nfor <some variable> in <some iterable>:\n    # body of the loop, indented\n\
    ```\n\nwhere `<some variable>` is replaced with a valid variable name, and `<some\
    \ iterable>` is the name of some iterable, be it a list, tuple, string, or other\
    \ iterable.\n\n## Iterating over a range of numbers\n\nSometimes we want to iterate\
    \ over a *range* of numbers or we wish to iterate some fixed number of times,\
    \ and Python provides us with a means to do this: the range type. This is a new\
    \ type that we've not seen before. range objects are iterable, and we can use\
    \ them in for loops.\n\nWe can create a new range object using Python's built-in\
    \ function `range()`. This function, also called the range constructor, is used\
    \ to create range objects representing *arithmetic sequences*.\n\nBefore we create\
    \ a loop using a range object, let's experiment a little. The simplest syntax\
    \ for creating a range object is to pass a positive integer as an argument to\
    \ the range constructor. What we get back is a range object, which is like a list\
    \ of numbers. If we provide a positive integer, n, as a single argument, we get\
    \ a range object with n elements.\n\n```\n>>> r = range(4)\n```\n\nNow we have\
    \ a range object, named r. Let's get nosy.\n\n```\n>>> len(r)\n4\n```\n\nOK. So\
    \ r has 4 elements. That checks out.\n\nAn arithmetic sequence is a sequence of\
    \ numbers such that the difference between any number in the sequence and its\
    \ predecessor is constant. 1, 2, 3, 4, ... is an arithmetic sequence because the\
    \ difference between each of the terms is 1. Similarly, 2, 4, 6, 8, ... is an\
    \ arithmetic sequence because the difference between each term is 2. Python range\
    \ objects are restricted to arithmetic sequences of integers.\n\n```\n>>> r[0]\n\
    0\n>>> r[1]\n1\n>>> r[2]\n2\n>>> r[3]\n3\n>>> r[4]\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 1, in <module>\nIndexError: range object index\
    \ out of range\n```\n\nWe see that the values held by this range object, are 0,\
    \ 1, 2, and 3, in that order.\n\nNow let's use a range object in a for loop. Here's\
    \ the simplest possible example:\n\n```\n>>> for n in range(4):\n...     print(n)\n\
    ```\n\nWhat do you think this will print?\n\n- The numbers 1 through 4?\n- The\
    \ numbers 0 through 4? (since Python is zero-indexed)\n- The numbers 0 through\
    \ 3? (since Python slices go up to, but do not include, the stop index)\n\nHere's\
    \ the answer:\n\n```\n>>> for n in range(4):\n...     print(n)\n...\n0\n1\n2\n\
    3\n```\n\nZero through three. `range(n)` with a single integer argument will generate\
    \ an arithmetic sequence from 0 up to, *but not including*, the value of the argument.\n\
    \nNotice, though, that if we use `range(n)` our loop will execute n times. What\
    \ if we wanted to iterate integers in the interval [5, 10]? How would we do that?\n\
    \n```\n>>> for n in range(5, 11):\n...     print(n)\n...\n5\n6\n7\n8\n9\n10\n\
    ```\n\nThe syntax here, when we use two arguments, is `range(<start>, <stop>)`,\
    \ where `<start>` and `<stop>` are integers or variables with integer values.\
    \ The `range` will include integers starting at the start value up to *but not\
    \ including* the stop value.\n\nWhat if, for some reason, we wanted only even\
    \ or odd values? Or what if we wanted to count by threes, or fives, or tens? Can\
    \ we use a different step size or stride? Yes, of course. These are all valid\
    \ arithmetic sequences. Let's count by threes.\n\n```\n>>> for n in range(3, 19,\
    \ 3):\n...     print(n)\n...\n3\n6\n9\n12\n15\n18\n```\n\nThis three argument\
    \ syntax is `range(<start>, <stop>, <stride>)`. The last argument, called the\
    \ *stride* or *step size* corresponds to the difference between terms in the arithmetic\
    \ sequence (the default stride is 1).\n\nCan we go backward? Yup. We just use\
    \ a negative stride, and adjust the start and stop values accordingly.\n\n```\n\
    >>> for n in range(18, 2, -3):\n...     print(n)\n...\n18\n15\n12\n9\n6\n3\n```\n\
    \nThis yields a `range` which goes from 18, down to *but not including* 2, counting\
    \ backward by threes.\n\nSo you see, `range()` is pretty flexible.\n\n## What\
    \ if I just want to do something many times and I don't care about the members\
    \ in the sequence?\n\nNo big deal. While we do require a variable to hold each\
    \ member of the sequence or other iterable we're iterating over, we aren't *required*\
    \ to use it in the body of the loop. There is a convention, not required by the\
    \ language, but commonly used, to use an underscore as the name for a variable\
    \ that we aren't going to use or don't really care about.\n\n```\n>>> for _ in\
    \ range(5):\n...     print(\"I don't like Brussels sprouts!\")\n...\nI don't like\
    \ Brussels sprouts!\nI don't like Brussels sprouts!\nI don't like Brussels sprouts!\n\
    I don't like Brussels sprouts!\nI don't like Brussels sprouts!\n```\n\n(Now you\
    \ know how I feel about Brussels sprouts.)\n\n## Comprehension check\n\n1. What\
    \ is the evaluation of `sum(range(5))`?\n2. What is the evaluation of `max(range(10))`?\n\
    3. What is the evaluation of `len(range(0, 10, 2))`?\n\n## 11.6 Iterables\n\n\
    As we have seen, iterables are Python's way of controlling a for loop.\nYou can\
    \ think of an iterable as a sequence or composite object (composed of many parts)\
    \ which can return one element at a time, until the sequence is exhausted. We\
    \ usually refer to the elements of an iterable as members of the iterable.\nIt's\
    \ much like dealing playing cards from a deck, and doing something (performing\
    \ a task or calculation) once for each card that's dealt.\nA deck of playing cards\
    \ is an iterable. It has 52 members (the individual cards). The cards have some\
    \ order (they may be shuffled or not, but the cards in a deck are ordered nonetheless).\
    \ We can deal cards one at a time. This is iterating through the deck. Once we've\
    \ dealt the 52nd card, the deck is exhausted, and iteration stops.\nNow, there\
    \ are two ways we could use the cards.\nFirst, we can use the information that's\
    \ encoded in each card. For example, we could say the name of the card, or we\
    \ could add up the pips on each card, and so on.\nAlternatively, if we wanted\
    \ to do something 52 times (like push-ups) we could do one push-up for every card\
    \ that was dealt. In this case, the information encoded in each card and the order\
    \ of the individual cards would be irrelevant. Nevertheless, if we did one push-up\
    \ for every card that was dealt, we'd know when we reached the end of the deck\
    \ that we'd done 52 push-ups.\nSo it is in Python. When iterating some iterable,\
    \ we can use the data or value of each member (say calculating the sum of numbers\
    \ in a list), or we can just use iteration as a way of keeping count. Both are\
    \ OK in Python.\n\n## Using the data provided by an iterable\n\nHere are two examples\
    \ of using the data of members of an iterable.\nFirst, assume we have a list of\
    \ integers and we want to know how many of those numbers are even and how many\
    \ are odd. Say we have such a list in a variable named `lst`.\n\n```\nevens =\
    \ 0\n\nfor n in lst:\n    if n % 2 == 0:  # it's even\n        evens += 1\n\n\
    print(f\"There are {evens} even numbers in this list, \"\n      f\"and there are\
    \ {len(lst) - evens} odd numbers.\")\n```\n\nAs another example, say we have a\
    \ list of all known periodic comets, and we want to produce a list of those comets\
    \ with an orbital period of less than 100 years. We would iterate through the\
    \ list of comets, check to see each comet's orbital period, and if that value\
    \ were less than 100 years, we'd append that comet to another list. In the following\
    \ example, the list `COMETS` contains tuples in which the first element of the\
    \ tuple is the name of the comet, and the second element is its orbital period\
    \ in years.[^6]\n\n```\n\"\"\"\nProduce a list of Halley's type periodic comets\n\
    with orbital period less than 100 years.\n\"\"\"\nCOMETS = [('Mellish', 145),\
    \ ('Sheppard-Trujillo', 66),\n          ('Levy', 51), ('Halley', 75), ('Borisov',\
    \ 152),\n          ('Tsuchinshan', 101), ('Holvorcem', 38)]\n          # This\
    \ list is abridged. You get the idea.\n\nshort_period_comets = []\n\nfor comet\
    \ in COMETS:\n    if comet[1] < 100:\n        short_period_comets.append(comet)\n\
    \        # Yes, there's a better way to do this,\n        # but this suffices\
    \ for illustration.\n```\n\nHere we're using the data encoded in each member of\
    \ the iterable, `COMETS`.\n\n[^6] The *orbital period* of a comet is the time\
    \ it takes for the comet to make one orbit around the sun."
  mdcn: "在第三次迭代时，n 被赋值为 3。第三次迭代后，序列中已无剩余元素，循环终止。\n\n因此，for 循环的语法*要求*我们为一个变量命名，该变量将用于保存序列中的各个元素。例如，我们不能这样做：\n\
    \n```\n>>> for [1, 2, 3]:\n...     print(\"Hello!\")\n```\n\n如果我们尝试这样做，会得到一个语法错误。必须使用的语法是：\n\
    \n```\nfor <some variable> in <some iterable>:\n    # 循环体，缩进\n```\n\n其中 `<some\
    \ variable>` 替换为一个有效的变量名，而 `<some iterable>` 是某个可迭代对象的名称，可以是列表、元组、字符串或其他可迭代对象。\n\
    \n## 遍历数字范围\n\n有时我们想遍历一个*数字范围*，或者希望执行固定次数的迭代，Python 为我们提供了一种实现方式：range 类型。这是一个我们之前未见过的新类型。range\
    \ 对象是可迭代的，我们可以在 for 循环中使用它们。\n\n我们可以使用 Python 的内置函数 `range()` 创建一个新的 range 对象。这个函数也称为\
    \ range 构造函数，用于创建表示*等差数列*的 range 对象。\n\n在使用 range 对象创建循环之前，让我们先做一些实验。创建 range\
    \ 对象最简单的语法是向 range 构造函数传递一个正整数作为参数。我们得到的是一个 range 对象，它类似于一个数字列表。如果我们提供一个正整数 n\
    \ 作为唯一参数，我们会得到一个包含 n 个元素的 range 对象。\n\n```\n>>> r = range(4)\n```\n\n现在我们有了一个名为\
    \ r 的 range 对象。让我们探究一下。\n\n```\n>>> len(r)\n4\n```\n\n好的。所以 r 有 4 个元素。这验证了。\n\n\
    等差数列是一个数字序列，其中序列中任何数字与其前驱数字之间的差是恒定的。1, 2, 3, 4, ... 是一个等差数列，因为每一项之间的差是 1。类似地，2,\
    \ 4, 6, 8, ... 也是一个等差数列，因为每一项之间的差是 2。Python 的 range 对象仅限于整数的等差数列。\n\n```\n>>>\
    \ r[0]\n0\n>>> r[1]\n1\n>>> r[2]\n2\n>>> r[3]\n3\n>>> r[4]\nTraceback (most recent\
    \ call last):\n  File \"<stdin>\", line 1, in <module>\nIndexError: range object\
    \ index out of range\n```\n\n我们看到这个 range 对象包含的值依次是 0, 1, 2 和 3。\n\n现在让我们在 for\
    \ 循环中使用 range 对象。这是最简单的例子：\n\n```\n>>> for n in range(4):\n...     print(n)\n\
    ```\n\n你认为这会打印什么？\n\n- 数字 1 到 4？\n- 数字 0 到 4？（因为 Python 是从零开始索引的）\n- 数字 0 到 3？（因为\
    \ Python 切片是到停止索引但不包括它）\n\n答案如下：\n\n```\n>>> for n in range(4):\n...     print(n)\n\
    ...\n0\n1\n2\n3\n```\n\n从零到三。`range(n)` 带有一个整数参数时，会生成一个从 0 开始，到参数值*但不包括*该值的等差数列。\n\
    \n不过请注意，如果我们使用 `range(n)`，我们的循环将执行 n 次。如果我们想遍历区间 [5, 10] 内的整数呢？我们该怎么做？\n\n```\n\
    >>> for n in range(5, 11):\n...     print(n)\n...\n5\n6\n7\n8\n9\n10\n```\n\n\
    这里使用的语法，当我们使用两个参数时，是 `range(<start>, <stop>)`，其中 `<start>` 和 `<stop>` 是整数或具有整数值的变量。`range`\
    \ 将包含从起始值开始，到*但不包括*停止值的整数。\n\n如果出于某种原因，我们只想要偶数或奇数值呢？或者如果我们想按三、五或十来计数呢？我们能使用不同的步长或步幅吗？当然可以。这些都是有效的等差数列。让我们按三来计数。\n\
    \n```\n>>> for n in range(3, 19, 3):\n...     print(n)\n...\n3\n6\n9\n12\n15\n\
    18\n```\n\n这种三个参数的语法是 `range(<start>, <stop>, <stride>)`。最后一个参数，称为*步幅*或*步长*，对应于等差数列中各项之间的差（默认步幅为\
    \ 1）。\n\n我们能倒着走吗？可以。我们只需使用负步幅，并相应地调整起始和停止值。\n\n```\n>>> for n in range(18, 2,\
    \ -3):\n...     print(n)\n...\n18\n15\n12\n9\n6\n3\n```\n\n这会产生一个 `range`，从 18\
    \ 开始，向下到*但不包括* 2，按三倒数。\n\n所以你看，`range()` 相当灵活。\n\n## 如果我只想做某件事很多次，而不关心序列中的成员呢？\n\
    \n没什么大不了的。虽然我们确实需要一个变量来保存我们正在遍历的序列或其他可迭代对象的每个成员，但我们并*不必须*在循环体中使用它。有一个惯例，不是语言要求的，但常用，就是使用下划线作为我们不打算使用或不真正关心的变量的名称。\n\
    \n```\n>>> for _ in range(5):\n...     print(\"I don't like Brussels sprouts!\"\
    )\n...\nI don't like Brussels sprouts!\nI don't like Brussels sprots!\nI don't\
    \ like Brussels sprouts!\nI don't like Brussels sprouts!\nI don't like Brussels\
    \ sprouts!\n```\n\n（现在你知道我对抱子甘蓝的看法了。）\n\n## 理解检查\n\n1. `sum(range(5))` 的求值结果是什么？\n\
    2. `max(range(10))` 的求值结果是什么？\n3. `len(range(0, 10, 2))` 的求值结果是什么？\n\n## 11.6\
    \ 可迭代对象\n\n正如我们所看到的，可迭代对象是 Python 控制 for 循环的方式。\n你可以将可迭代对象视为一个序列或复合对象（由多个部分组成），它可以一次返回一个元素，直到序列耗尽。我们通常将可迭代对象的元素称为可迭代对象的成员。\n\
    这很像从一副牌中发牌，并对发出的每张牌执行一次操作（执行任务或计算）。\n一副扑克牌是一个可迭代对象。它有 52 个成员（单张牌）。这些牌有一定的顺序（它们可能被洗过也可能没洗过，但一副牌中的牌仍然是有序的）。我们可以一次发一张牌。这就是遍历这副牌。一旦我们发完第\
    \ 52 张牌，这副牌就耗尽了，迭代停止。\n现在，有两种方式可以使用这些牌。\n首先，我们可以使用每张牌中编码的信息。例如，我们可以说出牌的名字，或者我们可以将每张牌上的点数相加，等等。\n\
    或者，如果我们想做某件事 52 次（比如俯卧撑），我们可以每发一张牌就做一个俯卧撑。在这种情况下，每张牌中编码的信息和单张牌的顺序就无关紧要了。然而，如果我们每发一张牌就做一个俯卧撑，当我们到达牌堆末尾时，我们就知道我们已经做了\
    \ 52 个俯卧撑。\nPython 中也是如此。当遍历某个可迭代对象时，我们可以使用每个成员的数据或值（比如计算列表中数字的总和），或者我们也可以只使用迭代作为一种计数方式。在\
    \ Python 中，这两种方式都是可以的。\n\n## 使用可迭代对象提供的数据\n\n以下是使用可迭代对象成员数据的两个例子。\n首先，假设我们有一个整数列表，我们想知道其中有多少个偶数和多少个奇数。假设我们有一个这样的列表，变量名为\
    \ `lst`。\n\n```\nevens = 0\n\nfor n in lst:\n    if n % 2 == 0:  # 是偶数\n     \
    \   evens += 1\n\nprint(f\"There are {evens} even numbers in this list, \"\n \
    \     f\"and there are {len(lst) - evens} odd numbers.\")\n```\n\n再举一个例子，假设我们有一个所有已知周期彗星的列表，我们想生成一个轨道周期小于\
    \ 100 年的彗星列表。我们将遍历彗星列表，检查每颗彗星的轨道周期，如果该值小于 100 年，我们就将该彗星添加到另一个列表中。在下面的例子中，列表 `COMETS`\
    \ 包含元组，其中元组的第一个元素是彗星的名称，第二个元素是其以年为单位的轨道周期。[^6]\n\n```\n\"\"\"\n生成一个轨道周期小于 100\
    \ 年的哈雷型周期彗星列表。\n\"\"\"\nCOMETS = [('Mellish', 145), ('Sheppard-Trujillo', 66),\n\
    \          ('Levy', 51), ('Halley', 75), ('Borisov', 152),\n          ('Tsuchinshan',\
    \ 101), ('Holvorcem', 38)]\n          # 此列表已精简。你明白意思即可。\n\nshort_period_comets\
    \ = []\n\nfor comet in COMETS:\n    if comet[1] < 100:\n        short_period_comets.append(comet)\n\
    \        # 是的，有更好的方法可以做到这一点，\n        # 但这足以说明问题。\n```\n\n这里我们使用了可迭代对象 `COMETS`\
    \ 每个成员中编码的数据。\n\n[^6] 彗星的*轨道周期*是彗星绕太阳运行一周所需的时间。"
