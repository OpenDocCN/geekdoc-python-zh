    # Format a floating-point number with comma-separated thousands


    ```

    >>> gdp = 22996100000000  # USA gross domestic product

    >>> population = 331893745  # USA population, 2021 est.

    >>> gdp_per_capita = gdp / population

    >>> f''${gdp_per_capita:,.2f}''

    ''$69,287.54''

    ```


    # 7.8 Scientific notation


    Using E as a format specifier will result in *normalized* scientific notation.


    ```

    >>> x = 1234567890

    >>> f"{x:.4E}"

    ''1.2346E+09''

    ```


    # 7.9 Formatting tables


    It''s not uncommon that we wish to print data or results of calculations in tabular
    form. For this, we need to be able to specify *width* of a field or column, and
    the *alignment* of a field or column. For example, say we wanted to print a table
    like this:²


    | Country | GDP ($ billion) | Population (million) | GDP per capita ($) |

    |---|---|---|---|

    | Chad | 11.780 | 16.818 | 700 |

    | Chile | 317.059 | 19.768 | 16,039 |

    | China | 17,734.063 | 1,412.600 | 12,554 |

    | Colombia | 314.323 | 51.049 | 6,157 |


    We''d want to left-align the "Country" column, and right-align numbers (numbers,
    in almost all cases should be right-aligned, and if the decimal point is displayed,
    all decimal points should be aligned vertically). Let''s see how to do that with
    f-strings and format specifiers. We''ll start with the column headings.


    ²Sources: 2021 GDP from World Bank (https://data.worldbank.org/); 2021 population
    from the United Nations (https://www.un.org/development/desa/pd/).'
