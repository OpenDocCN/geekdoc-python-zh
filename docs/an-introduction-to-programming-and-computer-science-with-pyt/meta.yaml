  md: "# 9.1 main the Python way\n\nSo far, we've followed this general outline:\n\
    \n```\n\"\"\"\nA program which prompts the user for a radius of a circle,\nr,\
    \ and calculates and reports the circumference.\n\"\"\"\n\nimport math\n\ndef\
    \ circumference(r_):\n    return 2 * math.pi * r_\n\nr = float(input('Enter a\
