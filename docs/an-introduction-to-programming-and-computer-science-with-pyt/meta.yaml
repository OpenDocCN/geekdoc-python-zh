- md: "## Chapter 17\n\n## Graphs\n\nWe have looked at the *dictionary* data structure,\
    \ which associates *keys* with *values*, and we've looked at some examples and\
    \ use cases. Now that we understand dictionaries, we're going to dive into *graphs*.\
    \ Graphs are a collection of vertices (nodes) connected by edges, that represent\
    \ relationships between the vertices (nodes). We'll see that a dictionary can\
    \ be used to represent a graph.\n\n## Learning objectives\n\n- You will learn\
    \ some of the terms associated with graphs.\n- You will learn how to represent\
    \ data using a graph.\n- You will learn about searching a graph using breadth-first\
    \ search.\n\n## Terms introduced\n\n- graph\n- vertices (nodes)\n- edge\n- neighbor\
    \ (common edge)\n- adjacent\n- breadth-first search\n\n## 17.1 Introduction to\
    \ graphs\n\nGraphs are a very versatile data structure. They can be used to represent\
    \ game states, positions on a map with routes, people in a social network, and\
    \ so on. Here we will consider graphs that represent positions on a map with routes\
    \ and that represent friendships in a social network.\n\nLet's start with maps.\
    \ Consider a minimal example of two towns in Michigan, Ann Arbor and Ypsilanti.\n\
    \n![](img/c79d476b9b167832781fbb4257bb2cb9_339_0.png)\n\nHere, in the language\
    \ of graphs, we have two vertices (a.k.a., nodes) representing the towns, Ann\
    \ Arbor and Ypsilanti, and an edge connecting the vertices, indicating that a\
    \ route exists between them. We can travel along this route from Ann Arbor to\
    \ Ypsilanti, and from Ypsilanti to Ann Arbor. Notice the symmetry. This is because\
    \ the edge between Ann Arbor and Ypsilanti is *undirected*, which is reasonable,\
    \ since the highway that connects them allows traffic in both directions.¹\n\n\
    We refer to vertices which share a common edge as *neighbors*. We also refer to\
    \ vertices which share a common edge as *adjacent*. So in the example above, Ann\
    \ Arbor and Ypsilanti are neighbors. Ann Arbor is adjacent to Ypsilanti, and Ypsilanti\
    \ is adjacent to Ann Arbor.\n\nHere's a little more elaborate example:\n\n![](img/c79d476b9b167832781fbb4257bb2cb9_340_0.png)\n\
    \nIn this example, Burlington is adjacent to St Albans, Montpelier and Middlebury.\
    \ Rutland is adjacent to Middlebury and Bennington. (Yes, we're leaving out a\
    \ lot of detail for simplicity's sake.)\n\nSo the question arises: how do we represent\
    \ a graph in our code? There are several ways, but what we'll demonstrate here\
    \ is what's called the *adjacency list* representation.\n\nWe'll use a dictionary,\
    \ with town names as keys and the values will be a list of all towns adjacent\
    \ to the key.\n\n> ¹There are what are called *directed* edges, like one-way streets,\
    \ but we'll only deal with undirected edges in this text.\n\nFor example, Montpelier\
    \ is adjacent to St Johnsbury, White River Junction and Burlington, so the dictionary\
    \ entry for Montpelier would look like this:\n\n```\nROUTES = {'Montpelier': ['Burlington',\
    \ 'White River Junction',\n                         'St Johnsbury']}\n```\n\n\
    A complete representation of adjacencies, given the map above is:\n\n```\nROUTES\
    \ = {\n    'Burlington': ['St Albans', 'Montpelier', 'Middlebury'],\n    'Montpelier':\
    \ ['Burlington', 'White River Junction',\n                   'St Johnsbury'],\n\
    \    'White River Junction': ['Montpelier', 'Brattleboro',\n                 \
    \            'St Johnsbury'],\n    'Brattleboro': ['White River Junction'],\n\
    \    'Newport': ['St Johnsbury'],\n    'St Albans': ['Burlington', 'Swanton'],\n\
    \    'St Johnsbury': ['Montpelier', 'Newport',\n                     'White River\
    \ Junction'],\n    'Swanton': ['St Albans'],\n    'Middlebury': ['Burlington',\
    \ 'Rutland'],\n    'Rutland': ['Middlebury', 'Bennington'],\n    'Bennington':\
    \ ['Rutland']\n}\n```\n\nNotice that Montpelier, St Johnsbury, and White River\
    \ Junction are all neighbors with each other. This is called a *cycle*. If a graph\
    \ doesn't have any cycles, it is called an *acyclic graph*. Similarly, if a graph\
    \ contains at least one cycle, then it is called a *cyclic graph*. So, this is\
    \ a cyclic graph.\n\n## 17.2 Searching a graph: breadth-first search\n\nIt is\
    \ often the case that we wish to search such a structure. A common approach is\
