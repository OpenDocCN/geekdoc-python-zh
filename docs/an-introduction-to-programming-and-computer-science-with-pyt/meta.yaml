    \ lon\n-96.7898\n```\n\n## Restrictions on keys\n\nKeys in a dictionary must be\
    \ *hashable*. In order for an object to be hashable, it must be immutable, or\
    \ if it is an immutable container of other objects (e.g., a tuple) then all the\
    \ objects contained must also be immutable. Valid keys include objects of type\
    \ int, float (OK, but a little strange), str, bool (also OK, but use cases are\
    \ limited). Tuples can also serve as keys as long as they do not contain any mutable\
    \ objects.\n\n```python\n>>> d = {0: 'Alexei Fyodorovich', 1: 'Dmitri Fyodorovich',\n\
    ...      2: 'Ivan Fyodorovich', 3: 'Fyodor Pavlovich',\n...      4: 'Agrafena\
    \ Alexandrovna', 5: 'Pavel Fyodorovich',\n...      6: 'Zosima', 7: 'Katerina Ivanovna'}\n\
    \n>>> d = {True: 'if porcupines are blue, then the sky is pink',\n...      False:\
    \ 'chunky monkey is the best ice cream'}\n\n>>> d = {'Phelps': 23, 'Latynina':\
    \ 9, 'Nurmi': 9, 'Spitz': 9,\n...      'Lewis': 9, 'Bjørgen': 8}\n```\n\nHowever,\
