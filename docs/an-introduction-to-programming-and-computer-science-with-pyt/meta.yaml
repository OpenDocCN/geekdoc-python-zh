    \ in the range [0, 5],\n    # calculate sum, and report the winner.\nelse:\n \
    \   print('Invalid input!')\n```\n\nAdmittedly, these aren't satisfactory solutions.\
    \ Usually, when a user enters invalid data the program gives the user another\
