  md: "+   - What can be used as a while condition?\n- When is the while condition\
    \ checked?\n- When does the while loop terminate?\n- What happens after the loop\
    \ terminates?\n\n# A while condition can be any expression which evaluates to\
    \ a Boolean or truthy value\n\nIn the example above, we have a simple Boolean\
    \ expression as our while condition. However, a while condition can be any Boolean\
    \ expression, simple or compound, or any value or expression that's truthy or\
    \ falsey—and in Python, that's just about anything! Examples:\n\n```\nlst = ['a',\
    \ 'b', 'c']\n\nwhile lst:\n    print(lst.pop(0))\n```\n\nNon-empty sequences are\
    \ truthy. Empty sequences are false. So as long as the list lst contains any elements,\
    \ this while loop will continue. This will print\n\n```\na\nb\nc\n```\n\nand then\
    \ terminate (because after popping the last element, the list is empty, and thus\
    \ falsey).\n\n```\nwhile x < 100 and x % 2 == 0:\n    ...\n```\n\nThis loop will\
    \ execute as long as x is less than 100 and x is even.\n\n# The condition of a\
    \ while loop is checked before each iteration\n\nThe condition of a while loop\
    \ is checked *before* each iteration of the loop. In this case, the condition\
    \ is dealer < 17. At the start, the dealer has nine points, so dealer < 17 evaluates\
    \ to True. Since this condition is true, the *body* of the loop is executed. (The\
    \ body consists of the indented lines under while dealer < 17.)\n\nOnce the body\
    \ of the while loop has executed, the condition is checked *again*. If the condition\
    \ remains true, then the body of the loop will be executed *again*. That's why\
    \ we call it a loop!\n\n> It's important to understand that the condition is not\
    \ checked while the body of the loop is executing.\n\nThe condition is always\
    \ checked *before* executing the body of the loop. This might sound paradoxical.\
    \ Didn't we just say that *after* executing the body the condition is checked\
    \ again? Yes. That's true, and it's in the"
