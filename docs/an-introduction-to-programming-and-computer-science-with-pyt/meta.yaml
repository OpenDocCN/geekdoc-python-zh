    # Passing the value returned from a function to another function


    Similarly, we can pass the value returned from a function to another function.


    ```

    >>> print(square(12))

    144

    ```


    What happens here? We pass the value 12 to the square() function, this calculates
    the square and returns the result (144). This result becomes the value we pass
    to the print() function, and, unsurprisingly, Python prints 144.


    # Do all Python functions return a value?


    This is a reasonable question to ask, and the answer is “yes.” But what about
    print()? Well, the point of print() is not to return some value but rather to
    display something in the console. We call things that a function does apart from
    returning a value *side effects*. The side effect of calling print() is that it
    displays something in the console.


    > ⁵In fact, even though it’s syntactically valid for a variable in the outer scope
    to have the same name as a parameter to a function, or a local variable within
    a function, it’s best if they don’t have the same identifier. See the section
    on “shadowing” for more.'
- md: "## What functions can do for us\n\n- Functions allow us to break a program\
    \ into smaller, more manageable pieces.\n- They make the program easier to debug.\n\
    - They make it easier for programmers to work in teams.\n- Functions can be efficiently\
    \ tested.\n- Functions can be written once, and used many times.\n\n## Comprehension\
    \ check\n\n1. Write a function which calculates the successor of any integer.\
    \ That is, given some argument n the function should return n + 1.\n2. What's\
    \ the difference between a formal parameter and an argument?\n3. When is the body\
    \ of a function executed?\n\n## 5.2 A deeper dive into functions\n\nRecall that\
    \ we define a function using the Python keyword def. So, for example, if we wanted\
    \ to implement the following mathematical function in Python:\n\n$f(x) = x^2 -\
    \ 1$\n\nOur function would need to take a single argument and return the result\
    \ of the calculation.\n\n```python\ndef f(x):\n    return x ** 2 - 1\n```\n\n\
    We refer to f as the *name* or *identifier* of the function. What follows the\
    \ identifier, within parentheses, are the *formal parameters* of the function.\
    \ A function may have zero or more parameters. The function above has one parameter\
    \ x.⁷\n\nLet's take a look at a complete Python program in which this function\
    \ is defined and then called twice: once with the argument 12 and once with the\
    \ argument 5.\n\n> ⁷While Python does support optional parameters, we won't present\
    \ the syntax for this here.\n\n```python\n\"\"\"\nDemonstration of a function\n\
    \"\"\"\n\ndef f(x):\n    return x ** 2 - 1\n\nif __name__ == '__main__':\n\n \
    \   y = f(12)\n    print(y)\n\n    y = f(5)\n    print(y)\n```\n\nHere we define\
    \ the function.\nAt this point, x does not have a value,\nand this code is not\
    \ executed.\n\nRemember: Writing a function definition does not execute the function.\n\
    A function is executed *only when it is called*.\n\n## Calling a function\n\n\
    Once we have written our function, we may *call* or *invoke* the function\nby\
    \ name, supplying the necessary arguments. To call the function f()\nabove, we\
    \ must supply one argument.\n\n```python\ny = f(12)\n```\n\nThis calls the function\
    \ f(), with the argument 12 and assigns the result\nto a variable named y. Now\
    \ what happens?\n\n```python\n\"\"\"\nDemonstration of a function\n\"\"\"\n\n\
    def f(x):\n    return x ** 2 - 1\n\nif __name__ == '__main__':\n\n    y = f(12)\n\
    \    print(y)\n\n    y = f(5)\n    print(y)\n```\n\nHere we call the function,\n\
    supplying 12 as an argument.\n\nWhen we call a function with an argument, the\
    \ argument is *passed* to\nthe function. The formal parameter receives the argument—that\
    \ is, *the\nargument is assigned to the formal parameter*. So when we pass the\
    \ argument 12 to the function f(), then the first thing that happens is that\n\
    the formal parameter x is assigned the argument. It's almost as if we\nperformed\
    \ the assignment x = 12 as the first line within the body of the function.\n\n\
    ```python\n\"\"\"\nDemonstration of a function\n\"\"\"\ndef f(x):\n    return\
    \ x ** 2 - 1\n\nif __name__ == '__main__':\n    y = f(12)\n    print(y)\n\n  \
    \  y = f(5)\n    print(y)\n```\n\nWhen we call the function and pass the argument\
    \ 12, x takes on the value 12.\n\nOnce the formal parameter has been assigned\
    \ the value of the argument, the function does its work, executing the body of\
    \ the function.\n\n```python\n\"\"\"\nDemonstration of a function\n\"\"\"\ndef\
    \ f(x):\n    return x ** 2 - 1\n\nif __name__ == '__main__':\n    y = f(12)\n\
    \    print(y)\n\n    y = f(5)\n    print(y)\n```\n\nNow, with x = 12, the function\
    \ evaluates the expression...\n...12 × 12 - 1\n...144 - 1\n...143\n\nThen, the\
    \ function returns the result. Flow of control is returned *to the point at which\
    \ the function was called*.\n\n```python\n\"\"\"\nDemonstration of a function\n\
    \"\"\"\n\ndef f(x):\n    return x ** 2 - 1\n\nif __name__ == '__main__':\n   \
    \ y = f(12)\n    print(y)\n\n    y = f(5)\n    print(y)\n```\n\nThe function returns\
    \ the calculated value (143)...\n\nSo f(12) has evaluated to 143, and the result\
    \ is assigned to y.\n\nFor this example, we print the result, 143.\n\n```python\n\
    \"\"\"\nDemonstration of a function\n\"\"\"\n\ndef f(x):\n    return x ** 2 -\
    \ 1\n\nif __name__ == '__main__':\n    y = f(12)\n    print(y)\n\n    y = f(5)\n\
    \    print(y)\n```\n\nPrints 143 at the console.\n\nLet's call the function again,\
    \ this time with a different argument, 5.\n\n```python\n\"\"\"\nDemonstration\
    \ of a function\n\"\"\"\n\ndef f(x):\n    return x ** 2 - 1\n\nif __name__ ==\
    \ '__main__':\n    y = f(12)\n    print(y)\n\n    y = f(5)\n    print(y)\n```\n\
    \nHere we call the function again, supplying 5 as an argument.\n\n## A deeper\
    \ dive into functions\n\n```python\n\"\"\"\nDemonstration of a function\n\"\"\"\
    \n\ndef f(x):\n    return x ** 2 - 1\n\nif __name__ == '__main__':\n    y = f(12)\n\
    \    print(y)\n\n    y = f(5)\n    print(y)\n```\n\nWhen we call the function\
    \ and pass the argument 5, x takes on the value 5.\n\n```python\n\"\"\"\nDemonstration\
    \ of a function\n\"\"\"\n\ndef f(x):\n    return x ** 2 - 1\n\nif __name__ ==\
    \ '__main__':\n    y = f(12)\n    print(y)\n\n    y = f(5)\n    print(y)\n```\n\
    \nNow, with x = 5, the function evaluates the expression...\n\n...5 × 5 - 1\n\
    ...25 - 1\n...24\n\n```python\n\"\"\"\nDemonstration of a function\n\"\"\"\n\n\
    def f(x):\n    return x ** 2 - 1\n\nif __name__ == '__main__':\n    y = f(12)\n\
    \    print(y)\n\n    y = f(5)\n    print(y)\n```\n\nThe function returns the calculated\
    \ value (24)...\n\nSo f(5) has evaluated to 24, and the result is assigned to\
    \ y.\n\n```python\n\"\"\"\nDemonstration of a function\n\"\"\"\n\ndef f(x):\n\
    \    return x ** 2 - 1\n\nif __name__ == '__main__':\n    y = f(12)\n    print(y)\n\
    \n    y = f(5)\n    print(y)  # Prints 24 at the console.\n```\n\n## What to pass\
    \ to a function?\n\nA function call must match the *signature* of the function.\
    \ The signature of a function is its identifier and formal parameters. When we\
    \ call a function, the number of arguments must agree with the number of formal\
    \ parameters.⁸\n\nA function should receive as arguments *all* of the information\
    \ it needs to do its work. A function should *not* depend on variables that exist\
    \ only in the outer scope. (In most cases, it's OK for a function to depend on\
    \ a *constant* defined in the outer scope.)\n\nHere's an example of how things\
    \ can go wrong if we write a function which depends on some variable that exists\
    \ in the outer scope.\n\n```python\ny = 2\n\ndef square(x):\n    return x ** y\n\
    \nprint(square(3))  # prints \"9\"\n\ny = 3\n\nprint(square(3))  # oops! prints\
    \ \"27\"\n```\n\nThis is a great way to introduce bugs and cause headaches. Better\
    \ that the function should use a value passed in as an argument, or a value assigned\
    \ within the body of the function (a local variable), or a literal. For example,\
    \ this is OK:\n\n```python\ndef square(x):\n    y = 2\n    return x ** y\n```\n\
    \n⁸Again, we're excluding from consideration functions with optional arguments\
    \ or keyword arguments.\n\nand this is even better:\n\n```python\ndef square(x):\n\
    \    return x ** 2\n```\n\nNow, whenever we supply some particular argument, we'll\
    \ always get the same, correct return value.\n\n## Functions should be “black\
    \ boxes”\n\nIn most cases functions should operate like *black boxes* which take\
    \ some input (or inputs) and return some output.\n\n![](img/c79d476b9b167832781fbb4257bb2cb9_101_0.png)\n\
    \nWe should write functions in such a way that, once written, we don't need to\
    \ keep track of what's going on within the function in order to use it correctly.\
    \ A cardinal rule of programming: functions should *hide implementation details*\
    \ from the outside world. In fact, *information hiding* is considered a fundamental\
    \ principle of software design.⁹\n\nFor example, let's say I gave you a function\
    \ which calculates the square root of any real number greater than zero. Should\
    \ you be required to understand the internal workings of this function in order\
    \ to use it correctly? Of course not! Imagine if you had to initialize variables\
    \ used internally by this function in order for it to work correctly! That would\
    \ make our job as programmers much more complicated and error-prone.\n\nInstead,\
    \ we write functions that take care of their implementation details internally,\
    \ without having to rely on code or the existence of variables outside the function\
    \ body.\n\n## 5.3 Passing arguments to a function\n\nWhat happens when we pass\
    \ arguments to a function in Python? When we call a function and supply an argument,\
    \ the argument is *assigned* to the corresponding formal parameter. For example:\n\
    \n```python\ndef f(z):\n    z = z + 1\n    return z\n```\n\n> ⁹If you're curious,\
    \ check out David Parnas' seminal 1972 article: \"On the Criteria To Be Used in\
    \ Decomposing Systems into Modules\", Communications of the ACM, 15(12) (https://dl.acm.org/doi/pdf/10.1145/361598.361623)."
  mdcn: "## 函数能为我们做什么\n\n-   函数允许我们将程序分解成更小、更易于管理的部分。\n-   它们使程序更容易调试。\n-   它们使程序员更容易进行团队协作。\n\
    -   函数可以被高效地测试。\n-   函数可以编写一次，多次使用。\n\n## 理解检查\n\n1.  编写一个函数，计算任意整数的后继数。也就是说，给定某个参数\
    \ n，函数应返回 n + 1。\n2.  形式参数和实参有什么区别？\n3.  函数的函数体何时执行？\n\n## 5.2 深入探讨函数\n\n回想一下，我们使用\
    \ Python 关键字 `def` 来定义一个函数。因此，例如，如果我们想在 Python 中实现以下数学函数：\n\n$f(x) = x^2 - 1$\n\
    \n我们的函数需要接受一个参数并返回计算结果。\n\n```python\ndef f(x):\n    return x ** 2 - 1\n```\n\n\
    我们将 f 称为函数的*名称*或*标识符*。标识符后面括号内的是函数的*形式参数*。一个函数可以有零个或多个参数。上面的函数有一个参数 x。⁷\n\n让我们看一个完整的\
    \ Python 程序，其中定义了这个函数，然后被调用了两次：一次使用参数 12，一次使用参数 5。\n\n> ⁷虽然 Python 确实支持可选参数，但我们这里不介绍其语法。\n\
    \n```python\n\"\"\"\n函数演示\n\"\"\"\n\ndef f(x):\n    return x ** 2 - 1\n\nif __name__\
    \ == '__main__':\n\n    y = f(12)\n    print(y)\n\n    y = f(5)\n    print(y)\n\
    ```\n\n这里我们定义了函数。\n此时，x 还没有值，\n并且这段代码不会被执行。\n\n记住：编写函数定义并不会执行该函数。\n函数*仅在被调用时*才会执行。\n\
    \n## 调用函数\n\n一旦我们编写了函数，我们就可以通过名称*调用*或*执行*该函数，并提供必要的参数。要调用上面的函数 `f()`，我们必须提供一个参数。\n\
    \n```python\ny = f(12)\n```\n\n这会调用函数 `f()`，参数为 12，并将结果赋值给名为 y 的变量。现在发生了什么？\n\n\
    ```python\n\"\"\"\n函数演示\n\"\"\"\n\ndef f(x):\n    return x ** 2 - 1\n\nif __name__\
    \ == '__main__':\n\n    y = f(12)\n    print(y)\n\n    y = f(5)\n    print(y)\n\
    ```\n\n这里我们调用函数，\n提供 12 作为参数。\n\n当我们用参数调用函数时，参数被*传递*给函数。形式参数接收该参数——也就是说，*参数被赋值给形式参数*。因此，当我们把参数\
    \ 12 传递给函数 `f()` 时，首先发生的是形式参数 x 被赋值为该参数。这几乎就像我们在函数体的第一行执行了赋值 `x = 12`。\n\n```python\n\
    \"\"\"\n函数演示\n\"\"\"\ndef f(x):\n    return x ** 2 - 1\n\nif __name__ == '__main__':\n\
    \    y = f(12)\n    print(y)\n\n    y = f(5)\n    print(y)\n```\n\n当我们调用函数并传递参数\
    \ 12 时，x 的值变为 12。\n\n一旦形式参数被赋予了参数的值，函数就开始工作，执行函数体。\n\n```python\n\"\"\"\n函数演示\n\
    \"\"\"\ndef f(x):\n    return x ** 2 - 1\n\nif __name__ == '__main__':\n    y\
    \ = f(12)\n    print(y)\n\n    y = f(5)\n    print(y)\n```\n\n现在，当 x = 12 时，函数计算表达式...\n\
    ...12 × 12 - 1\n...144 - 1\n...143\n\n然后，函数返回结果。控制流返回*到调用该函数的位置*。\n\n```python\n\
    \"\"\"\n函数演示\n\"\"\"\n\ndef f(x):\n    return x ** 2 - 1\n\nif __name__ == '__main__':\n\
    \    y = f(12)\n    print(y)\n\n    y = f(5)\n    print(y)\n```\n\n函数返回计算出的值（143）...\n\
    \n所以 `f(12)` 的计算结果为 143，并将结果赋值给 y。\n\n在这个例子中，我们打印结果 143。\n\n```python\n\"\"\"\n\
    函数演示\n\"\"\"\n\ndef f(x):\n    return x ** 2 - 1\n\nif __name__ == '__main__':\n\
    \    y = f(12)\n    print(y)\n\n    y = f(5)\n    print(y)\n```\n\n在控制台打印 143。\n\
    \n让我们再次调用函数，这次使用不同的参数 5。\n\n```python\n\"\"\"\n函数演示\n\"\"\"\n\ndef f(x):\n   \
    \ return x ** 2 - 1\n\nif __name__ == '__main__':\n    y = f(12)\n    print(y)\n\
    \n    y = f(5)\n    print(y)\n```\n\n这里我们再次调用函数，提供 5 作为参数。\n\n## 深入探讨函数\n\n```python\n\
    \"\"\"\n函数演示\n\"\"\"\n\ndef f(x):\n    return x ** 2 - 1\n\nif __name__ == '__main__':\n\
    \    y = f(12)\n    print(y)\n\n    y = f(5)\n    print(y)\n```\n\n当我们调用函数并传递参数\
    \ 5 时，x 的值变为 5。\n\n```python\n\"\"\"\n函数演示\n\"\"\"\n\ndef f(x):\n    return x\
    \ ** 2 - 1\n\nif __name__ == '__main__':\n    y = f(12)\n    print(y)\n\n    y\
    \ = f(5)\n    print(y)\n```\n\n现在，当 x = 5 时，函数计算表达式...\n\n...5 × 5 - 1\n...25\
    \ - 1\n...24\n\n```python\n\"\"\"\n函数演示\n\"\"\"\n\ndef f(x):\n    return x **\
    \ 2 - 1\n\nif __name__ == '__main__':\n    y = f(12)\n    print(y)\n\n    y =\
    \ f(5)\n    print(y)\n```\n\n函数返回计算出的值（24）...\n\n所以 `f(5)` 的计算结果为 24，并将结果赋值给 y。\n\
    \n```python\n\"\"\"\n函数演示\n\"\"\"\n\ndef f(x):\n    return x ** 2 - 1\n\nif __name__\
    \ == '__main__':\n    y = f(12)\n    print(y)\n\n    y = f(5)\n    print(y)  #\
    \ 在控制台打印 24。\n```\n\n## 应该向函数传递什么？\n\n函数调用必须与函数的*签名*匹配。函数的签名是其标识符和形式参数。当我们调用函数时，参数的数量必须与形式参数的数量一致。⁸\n\
    \n函数应该接收其工作所需的*所有*信息作为参数。函数*不应*依赖于仅存在于外部作用域的变量。（在大多数情况下，函数依赖于外部作用域中定义的*常量*是可以的。）\n\
    \n下面是一个例子，说明如果我们编写一个依赖于外部作用域中某个变量的函数，可能会出错。\n\n```python\ny = 2\n\ndef square(x):\n\
    \    return x ** y\n\nprint(square(3))  # 打印 \"9\"\n\ny = 3\n\nprint(square(3))\
    \  # 糟糕！打印 \"27\"\n```\n\n这是引入错误和导致问题的绝佳方式。最好让函数使用作为参数传入的值，或在函数体内赋值的值（局部变量），或字面量。例如，这样是可以的：\n\
    \n```python\ndef square(x):\n    y = 2\n    return x ** y\n```\n\n⁸同样，我们这里不考虑具有可选参数或关键字参数的函数。\n\
    \n而这样更好：\n\n```python\ndef square(x):\n    return x ** 2\n```\n\n现在，无论我们提供什么特定参数，我们总是会得到相同、正确的返回值。\n\
    \n## 函数应该是“黑盒子”\n\n在大多数情况下，函数应该像*黑盒子*一样运作，接受一些输入（或多个输入）并返回一些输出。\n\n![](img/c79d476b9b167832781fbb4257bb2cb9_101_0.png)\n\
    \n我们应该以这样的方式编写函数：一旦编写完成，我们就不需要跟踪函数内部发生的事情就能正确使用它。编程的一条基本原则：函数应该向外部世界*隐藏实现细节*。事实上，*信息隐藏*被认为是软件设计的一个基本原则。⁹\n\
    \n例如，假设我给你一个函数，它可以计算任何大于零的实数的平方根。为了正确使用它，你是否需要理解这个函数的内部工作原理？当然不需要！想象一下，如果为了让这个函数正常工作，你必须初始化其内部使用的变量！那将使我们作为程序员的工作变得更加复杂且容易出错。\n\
    \n相反，我们编写函数，让它们在内部处理实现细节，而不必依赖函数体外部的代码或变量的存在。\n\n## 5.3 向函数传递参数\n\n在 Python 中，当我们向函数传递参数时会发生什么？当我们调用函数并提供参数时，参数被*赋值*给相应的形式参数。例如：\n\
    \n```python\ndef f(z):\n    z = z + 1\n    return z\n```\n\n> ⁹如果你好奇，可以查看 David\
    \ Parnas 1972 年的开创性文章：\"On the Criteria To Be Used in Decomposing Systems into\
    \ Modules\"，发表于 Communications of the ACM, 15(12) (https://dl.acm.org/doi/pdf/10.1145/361598.361623)。"
