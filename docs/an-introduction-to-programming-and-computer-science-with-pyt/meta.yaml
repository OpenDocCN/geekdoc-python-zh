  md: '# 8.1 Boolean logic and Boolean expressions


    Boolean expressions and Boolean logic are widely used in mathematics, computer
    science, computer programming, and philosophy. These take their name from the
    19th century mathematician and logician George Boole. His motivation was to systematize
    and formalize the logic that philosophers and others used, which had come down
    to us from ancient Greece, primarily due to Aristotle.


    The fundamental idea is really quite simple: we have truth values—*true* or *false*—and
    rules for simplifying compound expressions.


    It''s easiest to explain by example. We''ll start with informal presentation,
    and then formalize things a little later.


    Say we have this sentence “It is raining.” Now, either it is, or it is not raining.
    If it is raining, we say that this sentence is *true*. If it is *not* raining,
    we say that this sentence is *false*.


    We call a sentence like this a *proposition*.


    Notice that there is no middle ground here. From our perspective, a proposition
    like this is either true or false. It can''t be 67% true and 33% false, for example.
    We call this the *law of the excluded middle*.


    Another way of stating this law is that either a proposition is true, or its negation
    is true. That is to say, either “It is raining” is true or its *negation*, “It
    is not raining” (or “It is not the case that it is raining”) is true. One or the
    other.¹


    What does this mean for us as computer programmers? Sometimes we want our code
    to do one thing if a certain condition is true, and do something different if
    that condition is false (not true). Without this ability, our programs would be
    very inflexible.


    But before we get to coding, let''s learn a little more about *Boolean expressions*.


    # Boolean expressions


    What is a Boolean expression? Well, true and false are both Boolean expressions.
    We can build more complex expressions using the Boolean connectives *not*, *and*,
    and *or*.


    We often use *truth tables* to demonstrate. Here''s the simplest possible truth
    table. We usually abbreviate true and false as T and F, respectively, but here
    we''ll stick with the Python Boolean literals `True` and `False`.


    | Expression | Truth value |

    | :--- | :--- |

    | True | True |

    | False | False |


    > ¹There are some logicians who reject the law of the excluded middle. Consider
    this proposition called the *liar paradox* or *Epimenides paradox*: “This statement
    is false.” Is this true or false? If it''s true it''s false, if it''s false it''s
    true! Some take this as an example of where the law of the excluded middle fails.
    Thankfully, we don''t need to worry about this in this textbook, but if you''re
    curious, see: Law of the excluded middle (Wikipedia). There''s even an episode
    in the original *Star Trek* television series, in which Captain Kirk and Harry
    Mudd defeat a humanoid robot by confronting it with the liar''s paradox. You can
    view it on YouTube: https://www.youtube.com/watch?v=QqCiW0wD44U.'
  merge: -1
