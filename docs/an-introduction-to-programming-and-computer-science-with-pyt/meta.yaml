    \ | 0.049 |\n| Chad | 0.011 |\n| Chile | 14.81 |\n| Colombia | 8.26 |\n| Costa\
    \ Rica | 10.58 |\n| Cyprus | 8.58 |\n| ... | ... |\n\nAssume we have these data\
    \ saved in a CSV file named dentists_per_10k.csv. We can use Python's csv module\
    \ to read the data.\n\n> ¹Source: World Health Organization: https://www.who.int/data/gho/data/indicators/indicator-details/GHO/dentists-(per-10-000-population)\
