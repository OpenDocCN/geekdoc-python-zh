    # 11.13 Nested loops


    It''s not uncommon that we include one loop within another. This is called *nesting*,
    and such loops are called *nested loops*.


    Let''s say we wanted to print out pairings of contestants in a round robin chess
    tournament (a "round robin" tournament is one in which each player plays each
    other player). Because in chess white has a slight advantage over black, it''s
    fair that each player should play each other player twice: once as black and once
    as white.


    We''ll represent each game with the names of the players, in pairs, where the
    first player listed plays white and the second plays black.


    So in a tiny tournament with players Anne, Bojan, Carlos, and Doris, we''d have
    the pairings:


    +   - Anne (W) vs Bojan (B)

    - Anne (W) vs Carlos (B)

    - Anne (W) vs Doris (B)

    - Bojan (W) vs Anne (B)

    - Bojan (W) vs Carlos (B)

    - Bojan (W) vs Doris (B)

    - Carlos (W) vs Anne (B)

    - Carlos (W) vs Bojan (B)

    - Carlos (W) vs Doris (B)

    - Doris (W) vs Anne (B)

    - Doris (W) vs Bojan (B)

    - Doris (W) vs Carlos (B)


    (we exclude self-pairings for obvious reasons).


    Given the list of players, [''Anne'', ''Bojan'', ''Carlos'', ''Doris''], how could
    we write code to generate all these pairings? One way is with a nested loop.'
