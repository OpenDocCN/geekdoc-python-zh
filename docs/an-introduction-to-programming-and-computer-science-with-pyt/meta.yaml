    # Sorting a list in place


    Now let’s look at .sort(). *In place* means that the list is modified right where
    it is, and there’s no list returned from .sort(). This means that calling .sort()
    *alters the list!*


    ```

    >>> data

    [4.2, 4.7, 3.1, 2.9, 8.5, 7.2, 6.1, 1.4, 1.9, 3.3]

    >>> data.sort()

    >>> data

    [1.4, 1.9, 2.9, 3.1, 3.3, 4.2, 4.7, 6.1, 7.2, 8.5]

    ```


    This is *unlike* the string methods like .lower() which return an altered *copy*
    of the string. Why is this? Strings are immutable; lists are mutable. Because
    .sort() sorts a list *in place*, it returns None. So don’t think you can work
    with the return value of .sort() because there isn’t any! Example:


    ```

    >>> m = [5, 7, 1, 3, 8, 2]

    >>> n = m.sort()

    >>> n

    >>> type(n)

    <class ''NoneType''>

    ```


