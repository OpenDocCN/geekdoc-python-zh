    \ $n$。\n\n### 练习 08\n\n在数学中，函数的一个要求是，给定相同的输入，它总是产生相同的输出。总是如此。例如，2的平方总是4。你不能过一会儿再检查，发现它变成了4.1，或者9，或者其他什么。对同一个参数应用函数总是会得到相同的结果。如果情况并非如此，那么它就不是一个函数。\n\
    \n问题：`random` 模块中的函数是真正的函数吗？如果是，为什么？如果不是，为什么不是？\n\n### 练习 09（挑战！）\n\n重新审视练习05中的赌徒破产问题。修改程序，使其运行1,000次赌徒破产模拟，并记录赌徒输光所花费的次数。然而——这一点很重要——总是从相同的金额开始（比如1,000单位，任何你喜欢的货币）。然后计算这组模拟结果的均值和标准差。\n\
    \n均值，记为 $\\mu$，由下式给出\n\n$$\\mu = \\frac{1}{N} \\sum_{i=0}^{N-1} x_i$$\n\n其中我们有一组结果\
    \ $X$，由索引 $i$ 标记，$N$ 等于 $X$ 中的元素数量。\n\n标准差，记为 $\\sigma$，由下式给出\n\n$$\\sigma = \\\
    frac{1}{N} \\sum_{i=0}^{N-1} (x_i - \\mu)^2.$$\n\n完成之后，分别再次运行程序，进行10,000、100,000和1,000,000次模拟，并记录结果。\n\
    \n均值会随着模拟次数的变化而变化吗？标准差呢？\n\n这一切告诉你关于赌博的什么？\n\n提示：编写单独的函数来计算均值和标准差是合理的。\n\n## 第13章\n\
    \n## 文件 I/O\n\n到目前为止，我们程序的所有输入和所有输出都发生在控制台中。也就是说，我们使用 `input()` 来提示用户输入，使用 `print()`\
    \ 将输出发送到控制台。\n\n当然，向程序发送信息和从程序接收输出的方式有很多：鼠标和触摸板、音频数据、图形用户界面（“GUIs”，发音为“gooeys”）、温度传感器、加速度计、数据库、执行器、网络、Web\
    \ API（应用程序编程接口）等等。\n\n在这里，我们将学习如何从文件读取数据和向文件写入数据。我们称之为“文件 i/o”，即“文件输入和输出”的缩写。当我们需要处理大量数据时，这特别有用。\n\
    \n为了从文件读取或向文件写入，我们需要能够打开和关闭文件。我们将使用*上下文管理器*来完成此操作。\n\n我们还将看到在尝试从文件读取或向文件写入时可能出现的新异常，特别是\
    \ `FileNotFoundError`。\n\n### 学习目标\n\n- 你将学习如何从文件读取。\n- 你将学习一些向文件写入的方法。\n- 你将学习一些有价值的关键词参数。\n\
    - 你将了解 csv 文件格式和 Python 模块，以及如何从 .csv 文件读取和向其写入。\n\n### 介绍的术语和 Python 关键字\n\n\
    - as\n- 上下文管理器\n- CSV（文件格式）\n- 关键词参数\n- with\n\n## 13.1 上下文管理器\n\n**上下文管理器**是一个\
    \ Python 对象，它（在一定程度上）控制 `with` 语句内部发生的事情。上下文管理器减轻了程序员的一些负担。例如，如果我们打开一个文件，由于某种原因出了问题并引发了异常，我们仍然希望确保文件被关闭。在引入\
    \ `with` 语句之前（在 Python 2.5 中，大约二十年前），程序员经常使用 `try/finally` 语句（我们将在讨论异常处理时看到更多关于\
    \ `try` 的内容）。\n\n我们在文件 i/o 的上下文中介绍 `with` 和上下文管理器，因为这种方法简化了我们的代码，并确保当我们完成从文件读取或向文件写入时，文件会自动关闭，无需显式调用\
    \ `.close()` 方法。我们将遵循的惯用法是：\n\n```python\nwith open(\"somefile.txt\") as fh:\n\
    \    # 做一些事情，例如，从文件读取\n    s = fh.read()\n```\n\n当我们退出这个代码块（即所有缩进的代码执行完毕）时，Python\
    \ 将自动关闭文件。如果没有这个上下文管理器，我们需要显式调用 `.close()`，而未能这样做可能导致意外和不良的结果。\n\n`with` 和 `as`\
    \ 是 Python 关键字。这里，`with` 创建上下文管理器，`as` 用于给我们的文件对象命名。因此，一旦文件被打开，我们可以通过 `as` 给出的名称来引用它——在这个例子中是\
    \ `fh`（“file handle”的常用缩写）。\n\n## 13.2 从文件读取\n\n假设我们有一个名为 `hello.txt` 的 .txt 文件，它与我们刚创建的\
    \ Python 文件在同一目录中。我们希望打开该文件，读取其内容并将其赋值给一个变量，然后将该变量打印到控制台。我们可以这样做：\n\n```python\n\
    >>> with open('hello.txt') as f:\n...     s = f.read()\n...\n>>> print(s)\nHello\
    \ World!\n```\n\n一次读取一行到列表中通常很有用。\n\n```python\n>>> lines = []\n>>> with open('poem.txt')\
    \ as f:\n...     for line in f:\n...         lines.append(line)\n...\n```"
