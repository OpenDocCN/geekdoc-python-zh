    # More on operations


    So far, we''ve seen some simple expressions involving literals, operators, and
    parentheses. We''ve also seen examples of a few types: integers, floating-point
    numbers ("floats" for short), strings, and Booleans.

    We''ve seen that we can perform arithmetic operations on numeric types (integers
    and floats).


    # The operators + and * applied to strings


    Certain arithmetic operators behave differently when their operands are strings.
    For example,


    ```

    >>> ''Hello'' + '', '' + ''World!''

    ''Hello, World!''

    ```


    This is an example of *operator overloading*, which is just a fancy way of saying
    that an operator behaves differently in different contexts. In this context, with
    strings as operands, + doesn''t perform addition, but instead performs **concatenation**.
    **Concatenation** is the joining of two or more strings, like the coupling of
    railroad cars.

    We can also use the multiplication operator * with strings. In the context of
    strings, this operator concatenates multiple copies of a string together.


    ```

    >>> ''Foo'' * 1

    ''Foo''

    >>> ''Foo'' * 2

    ''FooFoo''

    >>> ''Foo'' * 3

    ''FooFooFoo''

    ```


    What do you think would be the result of the following?


    ```

    >>> ''Foo'' * 0

    ```


    This gives us '''' which is called the *empty string* and is the result of concatenating
    zero copies of ''Foo'' together. Notice that the result is still a string, albeit
    an empty one.'
  - '[PAGE 68]


    # 4.3 Augmented assignment operators


    As a shorthand, Python provides what are called *augmented assignment* operators.
    Here are some (but not all):


    | augmented assignment | similar to |

    | --- | --- |

    | a += b | a = a + b |

    | a -= b | a = a - b |

    | a *= b | a = a * b |


    A common example is incrementing or decrementing by one.


    ```

    >>> a = 0

    >>> a += 1

    >>> a

    1

    >>> a += 1

    >>> a

    2

    >>> a -= 1

    >>> a

    1

    >>> a -= 1

    >>> a

    0

    ```


    You can use these or not, depending on your own preference.⁵


    # 4.4 Euclidean or “floor” division


    When presenting expressions, we saw examples of common arithmetic operations:
    addition, subtraction, multiplication, and division. Here we will present two
    additional operations which are closely related: the modulo or “remainder” operator,
    and what’s variously called “quotient”, “floor division”, “integer division” or
    “Euclidean division.”⁶


    Chances are, when you first learned division in primary school, you learned about
    Euclidean (floor) division. For example, 17 ÷ 5 = 3 r 2, or 21 ÷ 4 = 5 r 1. In
    the latter example, we’d call 21 the dividend, 4 the divisor, 5 the quotient,
    and 1 the remainder.


    > ⁵The table above says “similar to” because, for example, a += b isn’t *exactly*
    the same as a = a + b. In augmented assignment, the left-hand side is evaluated
    *before* the right-hand side, then the right-hand side is evaluated and the result
    is assigned to the variable on the left-hand side. There are some other minor
    differences.


    ⁶Euclid had many things named after him, even if he wasn’t the originator (I guess
    fame begets fame). Anyhow, Euclid was unaware of the division algorithm you’re
    taught in primary school. Similar division algorithms depend on the positional
    system of Hindu-Arabic numerals, and these date from around the 12th Century CE.
    The algorithm you most likely learned, called “long division”, dates from around
    1600 CE.'
