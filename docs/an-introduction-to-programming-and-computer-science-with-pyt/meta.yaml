    虽然动态类型很方便，但这确实给程序员你带来了额外的责任。这一点尤其重要，因为 Python 与许多其他语言不同，它完全不关心函数的形式参数或返回值的类型。一些语言确保程序员不能编写以错误类型参数调用函数，或从函数返回错误类型值的代码。


