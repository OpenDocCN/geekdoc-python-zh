  md: '# 4.6 Exponentiation


    Exponentiation is a ubiquitous mathematical operation. However, the syntax for
    exponentiation varies between programming languages. In some languages, the caret
    (^) is the exponentiation operator. In other languages, including Python, it’s
    the double-asterisk (**). Some languages don’t have an exponentiation operator,
    and instead they provide a library function, pow().


    The reasons for these differences are largely historical. In mathematics, we write
    an exponent as a superscript, e.g., $x^2$. However, keyboards and character sets
    don’t know about superscripts,¹⁰ and so the designers of programming languages
    had to come up with different ways of writing exponentiation.


    ** was first used in Fortran, which first appeared in 1957. This is the operator
    which Python uses for exponentiation.


    For the curious, here’s a table with some programming languages and the operators
    or functions they use for exponentiation.


    | Operator | Languages |

    | :--- | :--- |

    | ** | Algol, Basic, Fortran, JavaScript, OCaml, Pascal, Perl, **Python**, Ruby,
    Smalltalk |

    | ^ | J, Julia, Lua, Mathematica |

    | pow() | C, C++, C#, Dart, Go, Java, Kotlin, Rust, Scala |

    | expt | Lisp, Clojure |


    # Exponentiation in Python


    Now we know that ** is the exponentiation operator in Python. This is an *infix*
    operator, meaning that the operator appears *between* its two operands. As you’d
    expect, the first operand is the *base*, and the second operand is the *exponent*
    or *power*. So,


    ```

    b ** n

    ```


    implements $b^n$.


    Here are some examples,


    | Description | Expression |

    | :--- | :--- |

    | Area of a circle of a given radius | 3.14159 * radius ** 2 |

    | Kinetic energy, given mass and velocity | (1 / 2) * m * v ** 2 |


    Also, as you’d expect, ** has precedence over * so in the above examples, radius
    ** 2 and v ** 2 are calculated before multiplication with other terms.


    > ¹⁰Picking nits, that’s not entirely true, since nowadays there are some character
    sets that include superscript 2 and 3. But they’re not understood as numbers and
    aren’t useful in programming.'
