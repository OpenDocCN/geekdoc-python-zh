    Bounds checking is an approach to input validation which ensures that a value\
    \ is in some desired range. To return to our kilogram to pound conversion program,\
    \ it does not make sense for the user to enter a negative value for the weight\
    \ in kilograms. We might guard against this with bounds checking.\n\n```python\n\
    POUNDS_PER_KILOGRAM = 2.204623\n\nkg = float(input('Enter weight in kilograms:\
    \ '))\nif kg >= 0:\n    # convert kilograms to pounds and print result\nelse:\n\
    \    print('Invalid input! '\n          'Weight in kilograms must not be negative!')\n\
    ```\n\nSo our program would perform the desired calculations if and only if the\
