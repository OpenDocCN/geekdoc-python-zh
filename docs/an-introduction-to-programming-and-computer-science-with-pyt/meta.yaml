  md: '# Preface


    This book has been written for use in University of Vermont’s CS1210 Introduction
    to Programming (formerly CS021). This is a semester long course which covers much
    of the basics of programming, and an introduction to some fundamental concepts
    in computer science. Not being happy with any of the available textbooks, I endeavored
    to write my own. Drafting began in August 2022, essentially writing a chapter
    a week over the course of the semester, delivered to students via UVM’s learning
    management system. The text was revised, edited, and expanded in the following
    semester.


    UVM’s CS1210 carries “QR” (quantitative reasoning) and “QD” (quantitative and
    data literacy) designations. Accordingly, there’s some mathematics included:


    +   - writing functions to perform calculations,

    - writing programs to generate interesting integer sequences,

    - demonstrating the connection between pure functions and mathematical functions,

    - demonstrating the connection between list indices and subscript notation,

    - demonstrating that summations are loops,


    and so on, to address the QR requirement. To address the QD requirement, we include
    some simple plotting with Matplotlib. Other aspects of these requirements are
    addressed in programming assignments, lab exercises, and lecture.


    Nevertheless, despite this book’s primary objective as instructional material
    for a specific course at UVM, others may find this material useful.


    –CC, July 2023'
