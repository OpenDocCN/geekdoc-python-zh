  md: "Notice that if the assertion holds, no exception is raised, and the execution\
    \ of your code continues uninterrupted. Here's another example:\n\n```\ndef calc_hypotenuse(a,\
    \ b):\n    \"\"\"Given two legs of a right triangle, return the\n    length of\
    \ the hypotenuse. \"\"\"\n    assert a >= 0\n    assert b >= 0\n\n    return math.sqrt(a\
    \ ** 2 + b ** 2)\n```\n\nWhat's going on here? This isn't data validation. Rather,\
    \ we're documenting conditions that must hold for the function to return a valid\
    \ result, and we ensure that the program will fail if these conditions aren't\
    \ met. We could have a *degenerate triangle*, where one or both legs have length\
    \ zero, but it cannot be the case that either leg has negative length. This approach\
    \ has the added benefit of reminding the programmer what conditions must hold\
    \ in order to ensure correct behavior. Judicious use of assertions can help you\
    \ write correct, robust code.\n\n# Adding friendly messages\n\nPython's assert\
    \ allows you to provide a custom message in the event of an AssertionError. The\
    \ syntax is simple,\n\n```\nassert 1 + 1 == 2, \"Something is horribly wrong!\"\
    \n```\n\n# Some caveats\n\nIt's important to understand that assert is a Python\
    \ keyword and *not* the name of a built-in function. This is correct:\n\n```\n\
    assert 0.0 <= x <= 1.0, \"x must be in [0.0, 1.0]\"\n```\n\nbut this is not\n\n\
    ```\nassert(0.0 <= x <= 1.0, \"x must be in [0.0, 1.0]\")\n```\n\nWhy? This will\
    \ treat the tuple\n\n```\n(0.0 <= x <= 1.0, \"x must be in [0.0, 1.0]\")\n```\n\
    \nas what is being asserted. But non-empty tuples are truthy, and so this will\
    \ *never* result in an AssertionError, no matter what the value of x! Let's test\
    \ it"
