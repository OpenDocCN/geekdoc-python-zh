    (Notice the >>> at the end of the snippet above, indicating that the assertion\
    \ has passed and is thus silent.)\n\nYou should try adding assertions to your\
    \ code. In fact, the NASA/JPL Laboratory for Reliable Software published a set\
    \ of guidelines for producing reliable code, and one of these is “Use a minimum\
    \ of two runtime assertions per function.”⁶\n\n# 9.7 Rubberducking\n\n“Rubberducking”?\
    \ What on Earth is “rubberducking”? Don’t laugh: rubberducking is one of the most\
    \ powerful debugging tools in the known universe! Many programmers keep a little\
    \ rubber duck handy on their desk, in case of debugging emergencies.\n\nHere’s\
    \ how it works. If you get stuck, and cannot solve a particular problem or cannot\
    \ fix a pesky bug you *talk to the duck*. Now, rubber ducks aren’t terribly sophisticated,\
    \ so you have to explain things to them in the simplest possible terms. Explain\
    \ your problem to the duck using as little computer jargon as you can. Talk to\
    \ your duck as if it were an intelligent five-year-old. You’d be amazed at how\
    \ many problems can be solved this way!\n\nWhy does it work?\n\nFirst, by talking\
    \ to your duck, you step outside your code for a while. You’re talking about your\
    \ code without having to type at the keyboard, and without getting bogged down\
    \ in the details of syntax. You’re talking about what you think your code should\
    \ be doing.\n\nSecond, your duck will never judge you. It will remain silent while\
    \ you do your best to explain. Ducks are amazing listeners!\n\n> ⁶G.J. Holzmann,\
    \ 2006, “The Power of 10: Rules for Developing Safety-Critical Code”, *IEEE Computer*,\
    \ 39(6). doi:10.1109/MC.2006.212."
