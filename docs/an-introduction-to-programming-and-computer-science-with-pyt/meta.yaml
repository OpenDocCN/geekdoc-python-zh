  md: 'What''s an iterable? Something we can iterate over, of course! And what might
    that be? The sequence types we''ve seen so far (list, tuple, string) are sequences,
    and these are iterable. We can also produce other iterable objects (which we shall
    see soon).


    Here''s an example. We can iterate over a list, [1, 2, 3], by taking the elements,
    one at a time, in the order they appear in sequence.


    ```

    >>> numbers = [1, 2, 3]

    >>> for n in numbers:

    ...     print(n)

    ...

    1

    2

    3

    ```


    See? In our for loop, Python iterated over the elements (a.k.a. “members”) of
    the list provided. It started with 1, then 2, then 3. At that point the list was
    exhausted, so the loop terminated.


    If it helps, you can read for n in numbers: as “for each number, n, in the iterable
    called ‘numbers’.”


    This works for tuples as well.


    ```

    >>> letters = (''a'', ''b'', ''c'')

    >>> for letter in letters:

    ...     print(letter)

    ...

    a

    b

    c

    ```


    Notice the syntax: for <some variable> in <some iterable>:. As we iterate over
    some iterable, we get each member of the iterable in turn, one at a time. Accordingly,
    we need to assign these members (one at a time) to some variable.


    In the first example, above the variable has the identifier n.


    ```

    >>> numbers = [1, 2, 3]

    >>> for n in numbers:

    ...     print(n)

    ...

    ```


    As we iterate over numbers (a list), we get one element from the list at a time
    (in the order they appear in the list). So at the first iteration, n is assigned
    the value 1. At the second iteration, n is assigned the value 2.


    > In this case, there''s a counter, i, which is updated at each iteration of the
    loop. Here we update by incrementing i using ++i (which in Java increments i).
    The loop runs so long as the control condition i < 10 is true. On the last iteration,
    with i equal to nine, i is incremented to ten, then the condition no longer holds,
    and the loop exits. This is not how for loops work in Python! Python for loops
    always iterate over an iterable.'
