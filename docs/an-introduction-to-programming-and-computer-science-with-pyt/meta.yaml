    \ structures: the *stack* and the *queue*. You'll see that implementing these\
    \ in Python is almost trivial—we use a list for both, and the only difference\
    \ is *how* we use the list.\n\n## Stacks\n\nA *stack* is what's called a last\
    \ in, first out data structure (abbreviated LIFO and pronounced life-o). It's\
    \ a linear data structure where we add elements to a list at one end, and remove\
    \ them from *the same end*.\n\nThe canonical example for a stack is cafeteria\
    \ trays. Oftentimes these are placed on a spring-loaded bed, and cafeteria customers\
    \ take the tray off the top and the next tray in the stack is exposed. The first\
    \ tray to be put on the stack is the last one to be removed. You've likely seen\
    \ chairs that can be stacked. The last one on is the first one off. Have you ever\
    \ packed a suitcase? What's gone in last is the first to come out. Have you ever\
    \ hit the 'back' button in your web browser? Web browsers use a stack to keep\
    \ track of the pages you've visited. Have you ever used ctrl-z to undo an edit\
    \ to a document? Do you have a stack of dishes or bowls in your cupboard? Guess\
    \ what? These are all everyday examples of stacks.\n\nWe refer to appending an\
    \ element to a stack as *pushing*. We refer to removing an element to a stack\
    \ as *popping* (this should sound familiar).\n\n![](img/c79d476b9b167832781fbb4257bb2cb9_261_0.png)\n\
    \nWhen we push an item onto a stack, it becomes the \"top\" item.\n\nHere's a\
    \ stack keeping track of websites Egbert has visited.\n\n![](img/c79d476b9b167832781fbb4257bb2cb9_262_0.png)\n\
    \nWhen Egbert hits the \"back\" button, YouTube is popped off the stack, and Reddit\
    \ is now at the top. He's gone back to the site he visited previously.\n\nStacks\
    \ are very widely used in computer science and stacks are at the heart of many\
    \ important algorithms. (In fact, function calls are managed using a stack!)\n\
    The default behavior for a list in Python is to function as a stack. Yes, that's\
    \ right, we get stacks for free! If we append an item to a list, it's appended\
    \ at one end. When we pop an item off a list, by default, it pops *from the same\
    \ end*. So the last element in a Python list represents the *top* of the stack.\n\
    Here's a quick example:\n\n```\n>>> stack = []\n>>> stack.append(\"Pitchfork\"\
    )\n>>> stack.append(\"Spotify\")\n>>> stack.append(\"Netflix\")\n>>> stack.append(\"\
    Reddit\")\n>>> stack.append(\"YouTube\")\n>>> stack[-1]  # see what's on top\n\
    YouTube\n>>> stack.pop()\nYouTube\n>>> stack[-1]  # see what's on top\nReddit\n\
    >>> stack.pop()\nReddit\n>>> stack[-1]  # see what's on top\nNetflix\n```\n\n\
    So you see, implementing a stack in Python is a breeze.\n\n## Queues\n\nA queue\
    \ is a first in, first out linear data structure (FIFO, pronounced fife-o). The\
    \ only difference between a stack and a queue is that with a stack we push and\
    \ pop items from the same end, and with a queue we add elements at one end and\
    \ remove them from the other. That’s the only difference.\n\nWhat are some real\
    \ world examples? The checkout line at a grocery store—the first one in line is\
    \ the first to be checked out. Did you ever wait at a printer because someone\
    \ had sent a job before you did? That’s another queue. Cars through a toll booth,\
    \ wait lists for customer service chats, and so on—real world examples abound.\n\
    \nThe terminology is a little different. We refer to appending an element to a\
    \ queue as *enqueueing*. We refer to removing an element to a queue as *dequeueing*.\
    \ But these are just fancy names for appending and popping.\n\n![](img/c79d476b9b167832781fbb4257bb2cb9_263_0.png)\n\
    \nLike stacks, queues are very widely used in computer science and are at the\
    \ heart of many important algorithms.\n\nThere’s one little twist needed to turn\
    \ a list into a queue. With a queue, we enqueue from one end and dequeue from\
    \ the other. Like a stack, we can use append to enqueue. The little twist is that\
    \ instead of .pop() which would pop from the same end, we use .pop(0) to pop from\
    \ the other end of the list, and *voilà*, we have a queue.\n\nHere’s a quick example:\n\
    \n```\nqueue = []\n>>> queue.append(\"Fred\")    # Fred is first in line\n>>>\
    \ queue.append(\"Mary\")    # Mary is next in line\n>>> queue.append(\"Claire\"\
    )  # Claire is behind Mary\n>>> queue.pop(0)            # Fred has been served\n\
    'Fred'\n>>> queue[0]                # now see who's in front\n'Mary'\n>>> queue.append(\"\
    Gladys\")  # Gladys gets in line\n>>> queue.pop(0)            # Mary's been served\n\
    'Mary'\n```\n\nSo you see, a list can be used as a stack or a queue. Usually,\
    \ stacks and queues are used within a loop. We'll see a little more about this\
    \ in a later chapter.\n\n## 11.15 A deeper dive into iteration in Python\n\nWhat\
    \ follows is a bit more detail about iterables and iteration in Python. You can\
    \ skip this section entirely if you wish. This is presented here for the sole\
    \ purpose of demonstrating what goes on \"behind the scenes\" when we iterate\
    \ over some object in Python. With that said, let's start with the case of a list\
    \ (it works the same with a tuple or any other iterable).\n\n```\n>>> m = ['Greninja',\
    \ 'Lucario', 'Mimikyu', 'Charizard']\n```\n\nWhen we ask Python to iterate over\
    \ some iterable, it calls the function iter() which returns an *iterator* for\
    \ the iterable (in this case a list).\n\n```\n>>> iterator = iter(m)\n>>> type(iterator)\n\
    <class 'list_iterator'>\n```\n\nThe way iterators work is that Python keeps asking\
    \ \"give me the next member\", until the iterator is exhausted. This is done (behind\
    \ the scenes) by calls to the iterator's __next__() method.\n\n```\n>>> iterator.__next__()\n\
    'Greninja'\n>>> iterator.__next__()\n'Lucario'\n>>> iterator.__next__()\n'Mimikyu'\n\
    >>> iterator.__next__()\n'Charizard'\n```\n\nNow what happens if we call __next__()\
    \ one more time?\nWe get a StopIteration error\n\n```\n>>> iterator.__next__()\n\
    Traceback (most recent call last):\n  File \"/Library/.../code.py\", line 90,\
    \ in runcode\n    exec(code, self.locals)\n  File \"<input>\", line 1, in <module>\n\
    StopIteration\n```\n\nAgain, behind the scenes, when iterating through an iterable,\
    \ Python will get an iterator for that object, and then call __next__() until\
    \ a StopIteration error occurs, and then it stops iterating.\n\n## What about\
    \ range()?\n\nAs we've seen earlier, range() returns an object of the range type.\n\
    \n```\n>>> r = range(5)\n>>> type(r)\n<class 'range'>\n```\n\nBut ranges are iterable,\
    \ so they work with the same function iter(r), and the resulting iterator will\
    \ have __next__() as a method.\n\n```\n>>> iterator = iter(r)\n>>> iterator.__next__()\n\
    0\n>>> iterator.__next__()\n1\n>>> iterator.__next__()\n2\n>>> iterator.__next__()\n\
    3\n>>> iterator.__next__()\n4\n>>> iterator.__next__()\nTraceback (most recent\
    \ call last):\n  File \"<stdin>\", line 1, in <module>\nStopIteration\n```\n\n\
    All iterables share this interface and behavior.\n\n## 11.16 Exercises\n\n###\
