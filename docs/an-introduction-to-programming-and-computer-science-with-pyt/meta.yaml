    \ 3.5 to 6.1. To do this, we put the list and index on the left side of an assignment.\n\
    \n```\n>>> data\n[4.2, 9.5, 1.1, 3.1, 2.9, 8.5, 7.2, 3.5, 1.4, 1.9, 3.3]\n>>>\
    \ data[7] = 6.1\n>>> data\n[4.2, 9.5, 1.1, 3.1, 2.9, 8.5, 7.2, 6.1, 1.4, 1.9,\
    \ 3.3]\n```\n\nLet's do another: We'll change the element at index 2 to 4.7.\n\
    \n```\n>>> data[2] = 4.7\n>>> data\n[4.2, 9.5, 4.7, 3.1, 2.9, 8.5, 7.2, 6.1, 1.4,\
    \ 1.9, 3.3]\n```\n\n# Some convenient built-in functions that work with lists\n\
    \nPython provides many tools and built-in functions that work with lists (and\
    \ tuples, which we'll see soon). Here are a few such built-in functions:"
  - '[PAGE 201]


    | description | constraint(s) if any | example |

    | --- | --- | --- |

    | sum() calculates sum of elements | values must be numeric or Boolean * | sum(data)
    |

    | len() returns number of elements | none | len(data) |

    | max() returns largest value | can''t mix numerics and strings; must be all numeric
    or all strings | max(data) |

    | min() returns smallest value | can''t mix numerics and strings; must be all
    numeric or all strings | min(data) |


    * In the context of sum(), max(), and min(), Boolean True is treated as 1 and
    Boolean False is treated as 0.


    Using our example data (from above):


    ```

    >>> sum(data)

    52.8

    >>> len(data)

    11

    >>> max(data)

    9.5

    >>> min(data)

    1.4

    ```


    It seems natural at this point to ask, can I calculate the average (mean) of the
    values in a list? If the list contains only numeric values, the answer is “yes,”
    but Python doesn’t supply a built-in for this. However, the solution is straightforward.


    ```

    >>> sum(data) / len(data)

    4.8

    ```


    ... and there’s our mean!


    # Some convenient list methods


    We’ve seen already that string objects have methods associated with them. For
    example, .upper(), .lower(), and .capitalize(). Recall that methods are just functions
    associated with objects of a given type, which operate on the object’s data (value
    or values).


    Lists also have handy methods which operate on a list’s data. Here are a few:'
  - '[PAGE 202]


    | | description | constraint(s) if any | example |

    |---|---|---|---|

    | .sort() | sorts list | can''t mix strings and numerics | data.sort() |

    | .append() | appends an item to list | none | data.append(8) |

    | .pop() | “pops” the last element off list and returns its value or removes the
    element at index i and returns its value | cannot pop from empty list must be
    valid index | data.pop() data.pop(2) |


    There are many others, but let’s start with these.


    # Appending an element to a list


    To append an element to a list, we use the .append() method, where x is the element
    we wish to append.


    ```

    >>> data

    [4.2, 9.5, 4.7, 3.1, 2.9, 8.5, 7.2, 6.1, 1.4, 1.9, 3.3]

    >>> data.append(5.9)

    >>> data

    [4.2, 9.5, 4.7, 3.1, 2.9, 8.5, 7.2, 6.1, 1.4, 1.9, 3.3, 5.9]

    ```


    By using the .append() method, we’ve appended the value 5.9 to the end of the
    list.


    # “Popping” elements from a list


    We can remove (pop) elements from a list using the .pop() method. If we call .pop()
    without an argument, Python will remove the last element in the list and return
    its value.


    ```

    >>> data.pop()

    5.9

    >>> data

    [4.2, 9.5, 4.7, 3.1, 2.9, 8.5, 7.2, 6.1, 1.4, 1.9, 3.3]

    ```


    Notice that the value 5.9 is returned, and that the last element in the list (5.9)
    has been removed.

    Sometimes we wish to pop an element from a list that doesn’t happen to be the
    last element in the list. For this we can supply an index, .pop(i), where i is
    the index of the element we wish to pop.


    ```

    >>> data.pop(1)

    9.5

    ```'
  - '[PAGE 203]


    ```

    >>> data

    [4.2, 4.7, 3.1, 2.9, 8.5, 7.2, 6.1, 1.4, 1.9, 3.3]

    ```


    For reasons which may be obvious, we cannot .pop() from an empty list, and we
    cannot .pop(i) if the index i does not exist.


    # Sorting a list in place


    Now let’s look at .sort(). *In place* means that the list is modified right where
    it is, and there’s no list returned from .sort(). This means that calling .sort()
    *alters the list!*


    ```

    >>> data

    [4.2, 4.7, 3.1, 2.9, 8.5, 7.2, 6.1, 1.4, 1.9, 3.3]

    >>> data.sort()

    >>> data

    [1.4, 1.9, 2.9, 3.1, 3.3, 4.2, 4.7, 6.1, 7.2, 8.5]

    ```


    This is *unlike* the string methods like .lower() which return an altered *copy*
    of the string. Why is this? Strings are immutable; lists are mutable. Because
    .sort() sorts a list *in place*, it returns None. So don’t think you can work
    with the return value of .sort() because there isn’t any! Example:


    ```

    >>> m = [5, 7, 1, 3, 8, 2]

    >>> n = m.sort()

    >>> n

    >>> type(n)

    <class ''NoneType''>

    ```


    # Some things you might not expect


    Lists behave differently from many other objects when performing assignment. Let’s
    say you wanted to preserve your data “as-is” but also have a sorted version. You
    might think that this would do the trick.


    ```

    >>> data = [4.2, 4.7, 3.1, 2.9, 8.5, 7.2, 6.1, 1.4, 1.9, 3.3]

    >>> copy_of_data = data  # naively thinking you''re making a copy

    >>> data.sort()

    >>> data

    [1.4, 1.9, 2.9, 3.1, 3.3, 4.2, 4.7, 6.1, 7.2, 8.5]

    ```


    But now look what happens when we inspect copy_of_data.


    ```

    >>> copy_of_data

    [1.4, 1.9, 2.9, 3.1, 3.3, 4.2, 4.7, 6.1, 7.2, 8.5]

    ```


    Wait! What? How did that happen?'
  - '[PAGE 204]


    When we made the assignment `copy_of_data = data` we assumed (quite reasonably)
    that we were making a copy of our data. It turns out this is not so. What we wound
    up with was *two names for the same underlying data structure*, `data` and `copy_of_data`.
    This is the way things work with mutable objects (like lists).<sup>3</sup>


    So how do we get a copy of our list? One way is to use the `.copy()` method.<sup>4</sup>
    This will return a copy of the list, so we have two different list instances.<sup>5</sup>


    ```

    >>> data = [4.2, 4.7, 3.1, 2.9, 8.5, 7.2, 6.1, 1.4, 1.9, 3.3]

    >>> copy_of_data = data.copy()   # call the copy method

    >>> data.sort()

    >>> data

    [1.4, 1.9, 2.9, 3.1, 3.3, 4.2, 4.7, 6.1, 7.2, 8.5]

    >>> copy_of_data

    [4.2, 4.7, 3.1, 2.9, 8.5, 7.2, 6.1, 1.4, 1.9, 3.3]

    ```


    # A neat trick to get the last element of a list


    Let''s say we have a list, and don''t know how many elements are in it. Let''s
    say we want the *last* element in the list. How might we go about it?


    We could take a brute force approach. Say our list is called `x`.


    ```

    >>> x[len(x) - 1]

    ```


    Let''s unpack that. Within the brackets we have the expression `len(x) - 1`. `len(x)`
    returns the number of elements in the list, and then we subtract 1 to adjust for
    zero-indexing (if we have *n* elements in a list, the index of the last element
    is *n* − 1). So that works, but it''s a little clunky. Fortunately, Python allows
    us to get the last element of a list with an index of -1.


    ```

    >>> x[-1]

    ```


    You may think of this as counting backward through the indices of the list.


    # A puzzle (optional)


    Say we have some list `x` (as above), and we''re intrigued by this idea of counting
    backward through a list, and we want to find an alternative way to access the
    first element of *any* list of any size with a negative-valued


    > <sup>3</sup>The reasons for this state of affairs is beyond the scope of this
    text. However, if you''re curious, see: https://docs.python.org/3/library/copy.html.

    <sup>4</sup>There are other approaches to creating a copy of a list, specifically
    using the list constructor or slicing with [:], but we''ll leave these for another
    time. However, slicing is slower than the other two. *Source*: I timed it.

    <sup>5</sup>Actually it makes what''s called a *shallow copy*. See: https://docs.python.org/3/library/copy.html.'
- md: "## 10.2 Tuples\n\nA tuple? What’s a tuple? A **tuple** is an *immutable sequence*\
    \ of objects. Like lists they allow for indexed access of elements. Like lists\
    \ they may contain any arbitrary type of Python object (int, float, bool, str,\
    \ *etc.*). Unlike lists they are immutable, meaning that once created they cannot\
    \ change. You’ll see that this property can be desirable in certain contexts.\n\
    \n### How do we write a tuple?\n\nThe crucial thing in writing a tuple is commas—we\
    \ separate elements of a tuple with commas—but it’s conventional to write them\
    \ with parentheses as well. Here are some examples:\n\n```\n>>> coordinates =\
    \ 0.378, 0.911\n>>> coordinates\n(0.378, 0.911)\n>>> coordinates = (1.452, 0.872)\n\
    >>> coordinates\n(1.452, 0.872)\n```\n\nWe can create a tuple with a single element\
    \ with a comma, with or without parentheses.\n\n```\n>>> singleton = 5,\n>>> singleton\n\
    (5,)\n>>> singleton = ('Hovercraft',)\n>>> singleton\n('Hovercraft',)\n```\n\n\
    Notice that it’s the comma that’s crucial.\n\n```\n>>> (5)\n5\n>>> ('Hovercraft')\n\
    'Hovercraft'\n```\n\nWe can create an empty tuple, thus:\n\n```\n>>> empty = ()\n\
    >>> empty\n()\n```\n\nIn this case, no comma is needed.\n\n### Accessing elements\
    \ in a tuple\n\nAs with lists, we can access the elements of a tuple with integer\
    \ indices.\n\n```\n>>> t = ('cheese', 42, True, -1.0)\n>>> t[0]\n'cheese'\n>>>\
    \ t[1]\n42\n>>> t[2]\nTrue\n>>> t[3]\n-1.0\n```\n\nJust like lists, we can access\
    \ the last element by providing -1 as an index.\n\n```\n>>> t[-1]\n-1.0\n```\n\
    \n### Finding the number of elements in a tuple\n\nAs with lists, we can get the\
    \ number of elements in a tuple with `len()`.\n\n```\n>>> t = ('cheese', 42, True,\
    \ -1.0)\n>>> len(t)\n4\n```\n\n### Why would we use tuples instead of lists?\n\
    \nFirst, there are cases in which we want immutability. Lists are a dynamic data\
    \ structure. Tuples on the other hand are well-suited to static data.\nAs one\
    \ example, say we're doing some geospatial tracking or analysis. We might use\
    \ tuples to hold the coordinates of some location—the latitude and longitude.\
    \ A tuple is appropriate in this case.\n\n```\n>>> (44.4783021, -73.1985849)\n\
    ```\n\nClearly a list is not appropriate: we'd never want to append elements or\
    \ remove elements from latitude and longitude, and coordinates like this belong\
    \ together—they form a pair.\nAnother case would be records retrieved from some\
    \ kind of database.\n\n```\n>>> student_record = ('Porcupine', 'Egbert', 'eporcupi@uvm.edu',\n\
    ....                    3.21, 'sophomore')\n```\n\nAnother reason that tuples\
    \ are preferred in many contexts is that creating a tuple is more efficient than\
    \ creating a list. So, for example, if you're reading many records from a database\
    \ into Python objects, using tuples will be faster. However, the difference is\
    \ small, and could only become a factor if handling many records (think millions).\n\
    \n### You say tuples are immutable. Prove it.\n\nJust try modifying a tuple. Say\
    \ we have the tuple (1, 2, 3). We can read individual elements from the tuple\
    \ just like we can for lists. But unlike lists we can’t use the same approach\
    \ to assign a new value to an element of the tuple.\n\n```\n>>> t = (1, 2, 3)\n\
    >>> t[0]\n1\n>>> t[0] = 51\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nTypeError: 'tuple' object does not support item assignment\n\
    ```\n\nThere you have it: “‘tuple’ object does not support item assignment.”\n\
    \n### What about this?\n\n```\n>>> t = (1, 2, 3)\n>>> t = ('a', 'b', 'c')\n```\n\
    \n“There!” you say, “I’ve changed the tuple!” No, you haven’t. What’s happened\
    \ here is that you’ve created a new tuple, and given it the same name t.\n\n###\
    \ What about a tuple that contains a list?\n\nTuples can contain any type of Python\
    \ object—even lists. This is valid:\n\n```\n>>> t = ([1, 2, 3],)\n>>> t\n([1,\
    \ 2, 3],)\n```\n\nNow let’s modify the list.\n\n```\n>>> t[0][0] = 5\n>>> t\n\
    ([5, 2, 3],)\n```\n\nHaven’t we just modified the tuple? Actually, no. The tuple\
    \ contains the list (which is mutable). So we can modify the list within the tuple,\
    \ but we can’t replace the list with another list.\n\n```\n>>> t = ([1, 2, 3],)\n\
    >>> new_list = [4, 5, 6]\n>>> t[0] = new_list\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nTypeError: 'tuple' object does not support\
    \ item assignment\n```\n\nAgain, the tuple is unchanged.\nYou may ask: What's\
    \ up with the two indices?\nSay we have a list within a tuple. The list has an\
    \ index within the tuple, and the elements of the list have their indices within\
    \ the list. So the first index is used to retrieve the list from within the tuple,\
    \ and the second is used to retrieve the element from the list.\n\n```\n>>> t\
    \ = (['a', 'b', 'c'],)\n>>> t[0]\n['a', 'b', 'c']\n>>> t[0][0]\n'a'\n>>> t[0][1]\n\
    'b'\n>>> t[0][2]\n'c'\n```\n\n## 10.3 Mutability and immutability\n\nMutability\
    \ and immutability are properties of certain classes of object. For example, these\
    \ are immutable—once created they cannot be changed:\n\n- numeric types (int and\
    \ float)\n- Booleans\n- strings\n- tuples\n\nHowever, lists are mutable. Later,\
    \ we'll see another mutable data structure, the dictionary.\n\n### Immutable objects\n\
    \nYou may ask what's been happening in cases like this:\n\n```\n>>> x = 75021\n\
    >>> x\n75021\n>>> x = 61995\n>>> x\n61995\n```\n\nAren't we changing the value\
    \ of x? While we might speak this way casually, what's really going on here is\
    \ that we're creating a new int, x.\n\nHere's how we can demonstrate this—using\
    \ Python's built-in function id().⁶\n\n```\n>>> x = 75021\n>>> id(x)\n4386586928\n\
    >>> x = 61995\n>>> id(x)\n4386586960\n```\n\nSee? The IDs have changed.\nThe IDs\
    \ you'll see if you try this on your computer will no doubt be different. But\
    \ you get the idea: different IDs mean we have two different objects!\nSame goes\
    \ for strings, another immutable type.\n\n```\n>>> s = 'Pharoah Sanders'  # who\
    \ passed away the day I wrote this\n>>> id(s)\n4412581232\n>>> s = 'Sal Nistico'\n\
    >>> id(s)\n4412574640\n```\n\nSame goes for tuples, another immutable type.\n\n\
    ```\n>>> t = ('a', 'b', 'c')\n>>> id(t)\n4412469504\n>>> t[0] = 'z'   # Try to\
    \ change an element of t...\nTraceback (most recent call last):\n  File \"/Library/.../code.py\"\
    , line 90, in runcode\n    exec(code, self.locals)\n  File \"<input>\", line 1,\
    \ in <module>\nTypeError: 'tuple' object does not support item assignment\n>>>\
    \ id(t)    # still the same object\n4412469504\n>>> t = ('z', 'y', 'x')\n>>> id(t)\n\
    4412558784\n```\n\n### Mutable objects\n\nNow let's see what happens in the case\
    \ of a list. Lists are mutable.\n\n> ⁶While using id() is fine for tinkering around\
    \ in the Python shell, this is the only place it should be used. Never include\
    \ id() in any programs you write. The Python documentation states that id() returns\
    \ \"the 'identity' of an object. This is an integer which is guaranteed to be\
    \ unique and constant for this object during its lifetime. Two objects with non-overlapping\
    \ lifetimes may have the same id() value.\" So please keep this in mind.\n\n```\n\
    >>> parts = ['rim', 'hub', 'spokes']\n>>> id(parts)\n4412569472\n>>> parts.append('inner\
    \ tube')\n>>> parts\n['rim', 'hub', 'spokes', 'inner tube']\n>>> id(parts)\n4412569472\n\
    >>> parts.pop(0)\n'rim'\n>>> parts\n['hub', 'spokes', 'inner tube']\n>>> id(parts)\n\
    4412569472\n```\n\nSee? We make changes to the list and the ID remains unchanged.\
    \ It’s the same object throughout!\n\n### Variables, names, and mutability\n\n\
    Assignment in Python is all about *names*, and it’s important to understand that\
    \ when we make assignments we are *not* copying values from one variable to another.\
    \ This becomes most clear when we examine the behavior with respect to mutable\
    \ objects (e.g., lists):\n\n```\n>>> lst_a = [1, 2, 3, 4, 5]\n>>> lst_b = lst_a\n\
    ```\n\nNow let’s change lst_a.\n\n```\n>>> lst_a.append(6)\n>>> lst_b\n[1, 2,\
    \ 3, 4, 5, 6]\n```\n\nSee? lst_b isn’t a copy of lst_a, it’s a different name\
    \ for the same object! If a mutable value has more than one name, if we affect\
    \ some change in the value via one name, all the other names still refer to the\
    \ mutated value.\n\nNow, what do you think about this example:\n\n```\n>>> lst_a\
    \ = [1, 2, 3, 4, 5]\n>>> lst_b = [1, 2, 3, 4, 5]\n>>> lst_a.append(6)\n```\n\n\
    Are lst_a and lst_b different names for the same object? Or do they refer to different\
    \ objects?"
  mdcn: "## 10.2 元组\n\n元组？什么是元组？**元组**是一个*不可变的*对象序列。与列表类似，它们允许通过索引访问元素。与列表类似，它们可以包含任意类型的Python对象（整数、浮点数、布尔值、字符串等）。与列表不同的是，它们是不可变的，这意味着一旦创建就不能更改。你会看到这个特性在某些情况下是可取的。\n\
    \n### 我们如何编写元组？\n\n编写元组的关键是逗号——我们用逗号分隔元组的元素——但按照惯例，也会用括号将它们括起来。以下是一些示例：\n\n```\n\
    >>> coordinates = 0.378, 0.911\n>>> coordinates\n(0.378, 0.911)\n>>> coordinates\
    \ = (1.452, 0.872)\n>>> coordinates\n(1.452, 0.872)\n```\n\n我们可以用逗号创建一个包含单个元素的元组，可以带括号，也可以不带括号。\n\
    \n```\n>>> singleton = 5,\n>>> singleton\n(5,)\n>>> singleton = ('Hovercraft',)\n\
    >>> singleton\n('Hovercraft',)\n```\n\n注意，关键的是逗号。\n\n```\n>>> (5)\n5\n>>> ('Hovercraft')\n\
    'Hovercraft'\n```\n\n我们可以这样创建一个空元组：\n\n```\n>>> empty = ()\n>>> empty\n()\n```\n\
    \n在这种情况下，不需要逗号。\n\n### 访问元组中的元素\n\n与列表类似，我们可以使用整数索引访问元组的元素。\n\n```\n>>> t = ('cheese',\
    \ 42, True, -1.0)\n>>> t[0]\n'cheese'\n>>> t[1]\n42\n>>> t[2]\nTrue\n>>> t[3]\n\
    -1.0\n```\n\n就像列表一样，我们可以通过提供-1作为索引来访问最后一个元素。\n\n```\n>>> t[-1]\n-1.0\n```\n\n\
    ### 查找元组中的元素数量\n\n与列表类似，我们可以使用`len()`获取元组中的元素数量。\n\n```\n>>> t = ('cheese', 42,\
    \ True, -1.0)\n>>> len(t)\n4\n```\n\n### 为什么我们使用元组而不是列表？\n\n首先，有些情况下我们希望数据是不可变的。列表是一种动态数据结构。而元组则非常适合静态数据。\n\
    举个例子，假设我们正在进行一些地理空间跟踪或分析。我们可能会使用元组来保存某个位置的坐标——纬度和经度。在这种情况下，元组是合适的。\n\n```\n>>>\
    \ (44.4783021, -73.1985849)\n```\n\n显然，列表是不合适的：我们永远不想向纬度和经度追加或删除元素，像这样的坐标应该在一起——它们形成一对。\n\
    另一种情况是从某种数据库中检索的记录。\n\n```\n>>> student_record = ('Porcupine', 'Egbert', 'eporcupi@uvm.edu',\n\
    ....                    3.21, 'sophomore')\n```\n\n元组在许多情况下更受青睐的另一个原因是，创建元组比创建列表更高效。因此，例如，如果你从数据库中读取许多记录到Python对象中，使用元组会更快。然而，差异很小，只有在处理大量记录（比如数百万条）时才会成为因素。\n\
    \n### 你说元组是不可变的。证明一下。\n\n试着修改一个元组。假设我们有元组(1, 2, 3)。我们可以像读取列表一样读取元组中的各个元素。但与列表不同的是，我们不能使用相同的方法为元组的元素赋新值。\n\
    \n```\n>>> t = (1, 2, 3)\n>>> t[0]\n1\n>>> t[0] = 51\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 1, in <module>\nTypeError: 'tuple' object does\
    \ not support item assignment\n```\n\n看到了吧：“'tuple' object does not support item\
    \ assignment.”\n\n### 那这个呢？\n\n```\n>>> t = (1, 2, 3)\n>>> t = ('a', 'b', 'c')\n\
    ```\n\n“看！”你说，“我改变了元组！”不，你没有。这里发生的是你创建了一个新元组，并给了它相同的名称t。\n\n### 那包含列表的元组呢？\n\n\
    元组可以包含任何类型的Python对象——甚至列表。这是有效的：\n\n```\n>>> t = ([1, 2, 3],)\n>>> t\n([1, 2,\
    \ 3],)\n```\n\n现在让我们修改列表。\n\n```\n>>> t[0][0] = 5\n>>> t\n([5, 2, 3],)\n```\n\n\
