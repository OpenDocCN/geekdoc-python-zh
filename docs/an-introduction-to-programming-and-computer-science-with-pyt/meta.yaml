    # 4.5 Modular arithmetic


    Now, in the Python documentation<sup>7</sup>, you''ll see // referred to as floor
    division. You''ll also see that % is referred to as the *modulo operator*.

    It''s fine to think about % as the remainder operator (with the provisos noted
    above), but what is a “modulo operator”?

    Let''s start with the example of clocks.


    ![](img/c79d476b9b167832781fbb4257bb2cb9_73_0.png)


    **Figure 4.1:** Clock face


    Perhaps you don''t realize it, but you do modular arithmetic in your head all
    the time. For example, if you were asked what time is 5 hours after 9 o''clock,
    you''d answer 2 o''clock. You wouldn''t say 14 o''clock.<sup>8</sup> This is an
    example of modular arithmetic. In fact, modular arithmetic is sometimes called
    “clock arithmetic.”


    <sup>7</sup>https://docs.python.org/3/reference/expressions.html

    <sup>8</sup>OK. Maybe in the military or in Europe you might, but you get the
    idea. We have a clock with numbers 12-11, and 12 hours brings us back to where
    we started (at least as far as the clock face is concerned). Notice also that
    the arithmetic is the same for an analog clock face with hands and a digital clock
    face. This difference in interface doesn''t change the math at all, it''s just
    that *visually* things work out nicely with the analog clock face.'
