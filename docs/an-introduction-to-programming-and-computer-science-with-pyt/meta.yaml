  md: "Let’s run this code, and try a little mischief:\n\n```\nEnter a positive integer:\
    \ negative\n\"negative\" cannot be converted to an int!\nEnter a positive integer:\
    \ cheese\n\"cheese\" cannot be converted to an int!\nEnter a positive integer:\
    \ -42\nEnter a positive integer: 15\nYou have entered 15, a positive integer.\n\
    ```\n\nSee? Now mischief (or failure to read instructions) is handled gracefully.\n\
    \n# Getting an index with try/except\n\nEarlier, we saw that .index() will raise\
    \ a ValueError exception if the argument passed to the .index() method is not\
    \ found in the underlying sequence.\n\n```\n>>> lst = ['apple', 'boat', 'cat',\
    \ 'drama']\n>>> lst.index('egg')\nTraceback (most recent call last):\n  File \"\
    /.../code.py\", line 90, in runcode\n    exec(code, self.locals)\n  File \"<input>\"\
    , line 1, in <module>\nValueError: 'egg' is not in list\n```\n\nWe can use exception\
    \ handling to improve on this.\n\n```\nlst = ['apple', 'boat', 'cat', 'drama']\n\
    s = input('Enter a string to search for: ')\ntry:\n    i = lst.index(s)\n    print(f'The\
    \ index of \"{s}\" in {lst} is {i}.')\nexcept ValueError:\n    print(f'\"{s}\"\
    \ was not found in {lst}.')\n```\n\nIf we were to enter “egg” at the prompt, this\
    \ code would print:\n\n```\n\"egg\" was not found in ['apple', 'boat', 'cat',\
    \ 'drama']\n```\n\nThis brings up the age-old question of whether it’s better\
    \ to check first to see if you can complete an operation without error, or better\
    \ to try and then handle an exception if it occurs. Sometimes these two approaches\
    \ are referred to as “look before you leap” (LBYL) and “it’s easier to ask forgiveness\
    \ than it is to ask for permission” (EAFP). Python favors the latter approach.\n\
    \nWhy is this the case? Usually, EAFP makes your code more readable, and there’s\
    \ no guarantee that the programmer can anticipate and write all the necessary\
    \ checks to ensure an operation will be successful."
