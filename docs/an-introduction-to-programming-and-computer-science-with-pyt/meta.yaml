  md: '# But wait! There''s more!


    You''re going to find out sooner or later, so you might as well know now that
    Python also has a built-in function `pow()`. For our purposes, `**` and `pow()`
    are equivalent, so you may use either. Here''s a session at the Python shell:


    ```

    >>> 3 ** 2

    9

    >>> 3.0 ** 2

    9.0

    >>>

    >>> pow(3, 2)

    9

    >>> pow(3.0, 2)

    9.0

    ```


    With two operands or arguments, `**` and `pow()` behave identically. If both operands
    are integers, and the exponent is positive, the result will be an integer. If
    one or more of the operands is a float, the result will be a float.


    Negative or fractional exponents behave as you''d expect.


    ```

    >>> 3 ** 0.5    # Calculates the square root of 3

    1.7320508075688772

    >>> 3 ** -1      # Calculates 1 / 3

    0.3333333333333333

    ```


    No surprises here.


    $x^0 = 1$


    Remember from algebra that any non-zero number raised to the zero power is one.
    If that weren''t the case, what would become of this rule?


    $b^{m+n} = b^m \times b^n$


    So $x^0 = 1$ for all non-zero $x$. Python knows about that, too.


    ```

    >>> 1 ** 0

    1

    >>> 2 ** 0

    1

    >>> 0.1 ** 0

    1.0

    ```


    What about $0^0$? Many mathematics texts state that this should be undefined or
    indeterminate. Others say $0^0 = 1$. What do you think Python does?'
