  md: 'sequence of random numbers generated or the sequence of choices made is the
    same. For example,


    ```

    >>> import random

    >>> random.seed(42)  # Set the seed.

    >>> random.random()

    0.6394267984578837

    >>> random.random()

    0.025010755222666936

    >>> random.random()

    0.27502931836911926

    >>> random.seed(42)  # Set the seed again, to the same value.

    >>> random.random()

    0.6394267984578837

    >>> random.random()

    0.025010755222666936

    >>> random.random()

    0.27502931836911926

    ```


    Notice that the sequence of numbers generated by successive calls to random.random()
    are identical: 0.6394267984578837, 0.025010755222666936, 0.27502931836911926,
    ...


    Here''s another example:


    ```

    >>> import random

    >>> results = []

    >>> random.seed(''walrus'')

    >>> for _ in range(10):

    ...     results.append(random.choice([''a'', ''b'', ''c'']))

    ...

    >>> results

    [''b'', ''a'', ''c'', ''b'', ''a'', ''a'', ''a'', ''c'', ''a'', ''b'']

    >>> results = []

    >>> random.seed(''walrus'')

    >>> for _ in range(10):

    ...     results.append(random.choice([''a'', ''b'', ''c'']))

    ...

    >>> results

    [''b'', ''a'', ''c'', ''b'', ''a'', ''a'', ''a'', ''c'', ''a'', ''b'']

    ```


    Notice that the results are identical in both instances. If we were to perform
    this experiment 1,000,000 with the same seed, we''d always get the same result.
    It looks random, but deep down it isn''t.


    By setting the seed, we can make the behavior of calls to random methods *entirely
    predictable*. As you might imagine, this allows us to test programs that incorporate
    pseudo-random number generation or choices.


    Try something similar with random.shuffle(). Start with a short list, set the
    seed, and shuffle it. Then re-initialize the list to its original value, set the
    seed again—with the same value—and shuffle it. Is the shuffled list the same in
    both cases?'
