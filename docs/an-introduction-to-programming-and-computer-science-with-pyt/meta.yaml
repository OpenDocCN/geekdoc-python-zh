    | ''Hello, Python'' | string (str) |

    | :--- | :--- |

    | 1 | integer (int) |

    | 3.141592 | floating-point (float) |

    | True | Boolean (bool) |


    ''Hello, Python!'' is a *string* literal. The quotation marks *delimit* the string.
    They let Python know that what''s between them is to be interpreted as a string,
    but *they are not part of the string itself*. Python allows single-quoted or double-quoted
    strings, so "Hello, Python!" and ''Hello, Python!'' are both syntactically correct.
    Note that if you start with a single quote (''), you must end with a single quote.
