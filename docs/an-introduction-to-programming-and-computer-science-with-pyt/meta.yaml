    - 类型（包括int、float、str、list、tuple、dict等）\n- 类型推断\n- Unicode\n\n## 3.1 什么是*类型*？\n\
    \n考虑轮式机动车辆的范畴。有许多类型：摩托车、轻便摩托车、汽车、运动型多用途车、公共汽车、货车、牵引挂车、皮卡车、全地形车，*等等*，以及农业车辆如拖拉机、收割机，*等等*。每种类型都有区别于其他类型的特征。每种类型都适用于特定的目的（你不会用轻便摩托车去干拖拉机的活，对吧？）。\n\
    \n同样，Python中的每样东西都有一个*类型*，每种类型都适用于特定的目的。Python的类型包括数值类型，如整数和浮点数；序列，如字符串、列表和元组；布尔值（真和假）；以及其他类型，如集合、字典、范围和函数。\n\
    \n为什么编程语言中要有不同的类型？主要有三个原因。\n\n首先，不同类型在计算机内存中的存储方式有不同的要求（我们将在讨论*表示*时稍作探讨）。\n\n\
    其次，某些操作可能适用于某些类型，而不适用于其他类型。例如，我们不能将5提升到“南瓜”次幂，也不能将“照亮”除以2。\n\n第三，某些运算符的行为取决于其操作数的类型。例如，我们将在下一章看到+用于数值类型的加法，但当操作数是字符串时，+执行连接操作。Python如何知道要执行哪些操作以及允许哪些操作？它会检查操作数的类型。\n\
    \n## 什么是*字面量*？\n\n**字面量**就是给定类型的固定值。例如，1是一个字面量。它字面上就是整数1。其他字面量示例如下。\n\n## Python中一些常用的类型\n\
    \n以下是我们将看到的一些类型的示例。如果你现在还不知道它们都是什么，请不要担心——一切都会逐渐清晰。\n\n| 类型 | 描述 | 字面量示例 |\n|---|---|---|\n\
    | int | 整数 | 42, 0, -1 |\n| float | 浮点数 | 3.14159, 2.7182, 0.0 |\n| str | 字符串\
    \ | 'Python', 'badger', 'hovercraft' |\n| bool | 布尔值 | True, False |\n| NoneType\
    \ | 无，无值 | None |\n| tuple | 元组 | (), ('a', 'b', 'c'), (-1, 1) |\n| list | 列表\
    \ | [], [1, 2, 3], ['foo', 'bar', 'baz'] |\n| dict | 字典（键: 值） | {'cheese': 'stilton'},\
    \ {'age': 99} |\n| function | 函数 | （见：第5章） |\n\n## int\n\nint类型表示*整数*，即正数、负数和零的整数。int字面量示例：1,\
    \ 42, -99, 0, 10000000, *等等*。为了可读性，我们可以在整数字面量中使用下划线作为千位分隔符。例如，1_000_000比1000000更容易阅读，两者具有相同的值。\n\
    \n## float\n\nfloat类型的对象表示浮点数，即带有小数（基数）点的数字。这些数字近似于实数（近似程度不一；参见表示误差部分）。float字面量示例：1.0,\
    \ 3.1415, -25.1, *等等*。\n\n## str\n\n*字符串*是字符的有序序列。本页上的每个单词都是一个字符串。\"abc123\"和\"\
    @&)z)$\"也是字符串——字符串的符号不必是字母。在Python中，str（字符串）类型的对象在有序序列中保存零个或多个符号。字符串必须用*定界符*括起来，以区别于变量名和我们稍后将看到的其他标识符。字符串可以用单引号、双引号或“三引号”定界。str字面量示例：\"\
    abc\", \"123\", \"vegetable\", \"My hovercraft is full of eels.\", \"\"\"What\
    \ nonsense is this?\"\"\", *等等*。\n\n单引号和双引号在定界字符串时是等效的，但你必须保持一致——开始和结束的定界符必须相同。\"\
    foo\"和'foo'都是有效的字符串字面量；\"foo'和'foo\"则不是。\n\n```\n>>> \"foo'\nFile \"<stdin>\"\
    , line 1\n    \"foo'\n    ^\nSyntaxError: unterminated string literal (detected\
