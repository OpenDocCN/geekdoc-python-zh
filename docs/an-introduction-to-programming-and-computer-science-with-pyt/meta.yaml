  md: 'Assignment is a kind of *statement* in Python. Assignment statements associate
    a name with a value (or, in certain cases, can modify a value).


    Beginners often get confused about the assignment operator. You may find it helpful
    to think of it as a left-pointing arrow.² When reading your code, for example


    ```

    a = 42

    ```


    it may help to say, “*Let* a equal 42”, or “a *gets* 42”, rather than “a equals
    42” (which sounds more like a claim or assertion about the value of a). This can
    reinforce the concept of assignment.³


    # Dynamic typing


    In Python, all values have a *type*, and Python knows the type of each value at
    every instant. However, Python is a *dynamically typed* language. This means that
    any given *name* can refer to values of different types at different points in
    a program. So this is valid Python:


    ```

    a = 42      # now ''a'' is of type int

    print(a)    # prints 42 to the console

    a = ''abc''   # now ''a'' is of type str

    print(a)    # prints ''abc'' to the console

    ```


    # Evaluation and assignment


    Sometimes we can use a variable in some calculation and reassign the result. For
    example:


    ```

    x = 0

    print(x)    # prints 0 to the console

    x = x + 1

    print(x)    # prints 1 to the console

    x = x + 1

    print(x)    # prints 2 to the console

    ```


    What’s going on here? Remember, = is the *assignment* operator. So in the code
    snippet above, we’re not making assertions about equivalence; instead, we’re assigning
    values to x. With:


    ```

