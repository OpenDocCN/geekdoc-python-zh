    \ iter() 函数，该函数返回该可迭代对象的*迭代器*（在本例中是一个列表）。\n\n```\n>>> iterator = iter(m)\n>>>\
    \ type(iterator)\n<class 'list_iterator'>\n```\n\n迭代器的工作方式是 Python 不断询问“给我下一个成员”，直到迭代器耗尽。这是通过（在幕后）调用迭代器的\
    \ __next__() 方法来完成的。\n\n```\n>>> iterator.__next__()\n'Greninja'\n>>> iterator.__next__()\n\
    'Lucario'\n>>> iterator.__next__()\n'Mimikyu'\n>>> iterator.__next__()\n'Charizard'\n\
    ```\n\n现在，如果我们再调用一次 __next__() 会发生什么？\n我们会得到一个 StopIteration 错误\n\n```\n>>> iterator.__next__()\n\
    Traceback (most recent call last):\n  File \"/Library/.../code.py\", line 90,\
    \ in runcode\n    exec(code, self.locals)\n  File \"<input>\", line 1, in <module>\n\
    StopIteration\n```\n\n同样，在幕后，当迭代一个可迭代对象时，Python 会获取该对象的迭代器，然后调用 __next__() 直到发生\
    \ StopIteration 错误，然后停止迭代。\n\n## 那 range() 呢？\n\n正如我们之前看到的，range() 返回一个 range\
    \ 类型的对象。\n\n```\n>>> r = range(5)\n>>> type(r)\n<class 'range'>\n```\n\n但 range\
    \ 是可迭代的，所以它们可以与 iter(r) 函数一起使用，生成的迭代器将具有 __next__() 作为方法。\n\n```\n>>> iterator\
