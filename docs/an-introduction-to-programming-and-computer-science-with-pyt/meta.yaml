    \ * exchange_rate\n\nprint(f'{source_amount:,.2f} {source_label} is worth '\n\
    \      f'{target_amount:,.2f} {target_label}')\n```\n\nNotice that we don't need\
    \ any comments to explain our code. By choosing good names we've made comments\
    \ unnecessary!\nWe'll revisit this program, making improvements as we acquire\
    \ more tools.\nFeel free to copy, save, and run this code. There are lots of websites\
    \ which provide exchange rates and perform such conversions. One such website\
    \ is the Xe Currency Converter (https://www.xe.com/currencyconverter/).\n\n> ⁵From\
    \ the Python documentation: Two or more physical lines may be joined into logical\
    \ lines using backslash characters (`\\`), as follows: when a physical line ends\
    \ in a backslash that is not part of a string literal or comment, it is joined\
    \ with the following forming a single logical line, deleting the backslash and\
    \ the following end-of-line character (https://docs.python.org/3/reference/lexical_analysis.html).\n\
    \n## 7.11 Format specifiers: a quick reference\n\nFormat specifiers actually constitute\
    \ a “mini-language” of their own. For a complete reference, see the section entitled\
    \ “Format Specification Mini-Language” in the Python documentation for strings\
    \ (https://docs.python.org/3/library/string.html).\nRemember that format specifiers\
    \ are optionally included in f-string replacement fields. The format specifier\
    \ is separated from the replacement expression by a colon. Examples:\n\n```\n\
    >>> x = 0.16251\n>>> f'{x:.1%}'\n'16.3%'\n>>> f'{x:.2f}'\n'0.16'\n>>> f'{x:>12}'\n\
    '      0.16251'\n>>> f'{x:.3E}'\n'1.625E-01'\n```\n\nHere's a quick reference\
    \ for some commonly used format specifiers:\n\n| option | meaning | example |\n\
    | :--- | :--- | :--- |\n| < | align left, can be combined with width | <12 |\n\
    | > | align right, can be combined with width | >15 |\n| f | fixed point notation,\
    \ combined with precision | .2f |\n| % | percentage (multiplies by 100 automatically)\
    \ | .1% |\n| , | use thousands separators, e.g., 1,000 | , |\n| E | scientific\
    \ notation, combined with precision | .4E |\n\n## 7.12 Exceptions\n\n**ValueError**\n\
    \nIn an earlier chapter, we saw how trying to use `math.sqrt()` with a negative\
    \ number as an argument results in a `ValueError`.\n\nIn this chapter we've seen\
    \ another case of `ValueError`—where inputs to numeric constructors, `int()` and\
    \ `float()`, are invalid. These functions take strings, so the issue isn't the\
    \ type of the argument. Rather, it's an issue with the value of the argument—some\
    \ strings cannot be converted to numeric types.\n\nFor example,\n\n```\n>>> int('5')\n\
    5\n>>> int('5.0')\nTraceback (most recent call last):\n  File \"<stdin>\", line\
    \ 1, in <module>\nValueError: invalid literal for int() with base 10: '5.0'\n\
    >>> int('kumquat')\nTraceback (most recent call last):\n  File \"<stdin>\", line\
    \ 1, in <module>\nValueError: invalid literal for int() with base 10: 'kumquat'\n\
    ```\n\nThe first call, with the argument `'5'` succeeds because the string `'5'`\
    \ can be converted to an object of type `int`. The other two calls fail with a\
    \ `ValueError`.\n\n`int('5.0')` fails because Python doesn't know what to do about\
    \ the decimal point when trying to construct an `int`. Even though 5.0 has a corresponding\
    \ integer value, 5, Python rejects this input and raises a `ValueError`.\n\nThe\
    \ last example, `int('kumquat')`, fails for the obvious reason that `'kumquat'`\
    \ cannot be converted to an integer.\n\nWhat about the `float` constructor, `float()`?\
    \ Most numeric strings can be converted to an object of type `float`. Examples:"
  mdcn: "这里我们将演示一个货币转换器。思考一下，假设我们需要用户提供汇率，我们希望这样的程序如何运行。执行计算需要哪些信息？\n\n- 我们想要转换的金额。\n\
    - 我们想要转换的货币标签，*例如*，USD、CAD、MXN、BRL、EUR，*等等*<sup>4</sup>。我们称之为*源货币*。\n- 汇率。\n-\
    \ 我们想要接收的货币标签（同上）。我们称之为*目标货币*。\n\n让我们想象一下这可能如何工作：\n\n1.  程序提示用户输入源货币标签。\n2.  程序提示用户输入目标货币标签。\n\
    3.  程序提示用户输入金额（以源货币计）。\n4.  程序提示用户输入汇率。\n5.  程序显示结果。\n\n这就引出了一个问题：我们如何表示汇率？一种方法是将汇率表示为源货币单位价值与目标货币单位价值的比率。例如，在撰写本文时，一美元（USD）相当于1.3134加元（CAD）。\n\
    \n采用这种方法，我们将源货币金额乘以汇率，以获得目标货币的等值。以下是一个会话可能的进行方式：\n\n```\nEnter source currency\
    \ label: USD\nEnter target currency label: CAD\nOK. We will convert USD to CAD.\n\
    Enter the amount in USD you wish to convert: 1.00\nEnter the exchange rate (USD/CAD):\
    \ 1.3134\n1.00 USD is worth 1.31 CAD\n```\n\n此时，我们还没有所有需要的工具来验证用户的输入，因此对于这个程序，我们将信任用户行为良好，并输入合理的标签和汇率。（我们很快会看到更多关于输入验证和异常处理的内容。）有了这个前提，我们可以这样开始这个程序：\n\
    \n```\nsource_label = input('Enter source currency label: ')\ntarget_label = input('Enter\
    \ target currency label: ')\nprint(f'OK. We will convert {source_label} '\n  \
    \    f'to {target_label}.')\n```\n\n这段代码将提示用户输入源和目标标签，然后打印出用户请求的转换。注意我们使用了一个f-string来插值用户提供的标签。\n\
    \n<sup>4</sup>关于三字符ISO 4217标准货币代码，请参见：https://en.wikipedia.org/wiki/ISO_4217。\n\
    \n## 示例：货币转换器\n\n现在我们需要另外两条信息：我们希望转换的金额和汇率。（这里我们将使用`\\`，当如图所示使用时，在Python中表示显式行继续。Python将自动连接这些行。）⁵\n\
    \n```\nsource_prompt = f'Enter the amount in {source_label} ' \\\n           \
    \     f'you wish to convert: '\n\nex_rate_prompt = f'Enter the exchange rate '\
    \ \\\n                 f'({source_label}/{target_label}): '\n\nsource_amount =\
    \ float(input(source_prompt))\nexchange_rate = float(input(ex_rate_prompt))\n\
    ```\n\n此时，我们有了标签`source_label`和`target_label`，希望转换的金额存储为`source_amount`，汇率存储为`exchange_rate`。标签是`str`类型。源金额和汇率是`float`类型。\n\
    给这些对象起有意义的名字（而不是`x`、`y`、`z`……）使代码易于阅读和理解。\n现在，进行计算。由于我们将汇率表示为源货币单位价值与目标货币单位价值的比率，我们只需要做乘法。\n\
    \n```\ntarget_amount = source_amount * exchange_rate\n```\n\n看到选择好的名字如何使事情变得如此清晰了吗？在命名对象并使用它们时，你应该追求类似的清晰度。\n\
    剩下的就是打印结果。同样，我们将使用f-string，但这次我们将包含格式说明符，以显示两位小数精度的结果。\n\n```\nprint(f'{source_amount:,.2f}\
    \ {source_label} is worth '\n      f'{target_amount:,.2f} {target_label}')\n```\n\
    \n将所有内容放在一起，我们得到：\n\n```\n\"\"\"\nCurrency Converter\nEgbert Porcupine <egbert.porcupine@uvm.edu>\n\
    CS 1210\n\nPrompts users for two currencies, amount to convert,\nand exchange\
    \ rate, and then performs the conversion\nand displays the result.\n\"\"\"\n\n\
    source_label = input('Enter source currency label: ')\ntarget_label = input('Enter\
    \ target currency label: ')\nprint(f'OK. We will convert {source_label} '\n  \
    \    f'to {target_label}.')\n\nsource_prompt = f'Enter the amount in {source_label}\
    \ ' \\\n                f'you wish to convert: '\n\nex_rate_prompt = f'Enter the\
    \ exchange rate ' \\\n                 f'({source_label}/{target_label}): '\n\n\
    source_amount = float(input(source_prompt))\nexchange_rate = float(input(ex_rate_prompt))\n\
    \ntarget_amount = source_amount * exchange_rate\n\nprint(f'{source_amount:,.2f}\
    \ {source_label} is worth '\n      f'{target_amount:,.2f} {target_label}')\n```\n\
    \n注意我们不需要任何注释来解释我们的代码。通过选择好的名字，我们使注释变得不必要！\n我们将在获得更多信息后重新审视这个程序，并进行改进。\n请随意复制、保存并运行此代码。有很多网站提供汇率并执行此类转换。其中一个网站是Xe货币转换器（https://www.xe.com/currencyconverter/）。\n\
    \n> ⁵来自Python文档：两个或多个物理行可以使用反斜杠字符（`\\`）连接成逻辑行，如下所示：当一个物理行以反斜杠结尾，且该反斜杠不是字符串字面量或注释的一部分时，它将与下一行连接形成一个逻辑行，删除反斜杠和随后的行结束符（https://docs.python.org/3/reference/lexical_analysis.html）。\n\
    \n## 7.11 格式说明符：快速参考\n\n格式说明符实际上构成了它们自己的“迷你语言”。完整参考，请参见Python文档中字符串部分的“格式规范迷你语言”（https://docs.python.org/3/library/string.html）。\n\
    记住，格式说明符可选择性地包含在f-string替换字段中。格式说明符通过冒号与替换表达式分隔。示例：\n\n```\n>>> x = 0.16251\n\
    >>> f'{x:.1%}'\n'16.3%'\n>>> f'{x:.2f}'\n'0.16'\n>>> f'{x:>12}'\n'      0.16251'\n\
    >>> f'{x:.3E}'\n'1.625E-01'\n```\n\n以下是一些常用格式说明符的快速参考：\n\n| 选项 | 含义 | 示例 |\n|\
    \ :--- | :--- | :--- |\n| < | 左对齐，可与宽度组合 | <12 |\n| > | 右对齐，可与宽度组合 | >15 |\n|\
    \ f | 定点表示法，与精度组合 | .2f |\n| % | 百分比（自动乘以100） | .1% |\n| , | 使用千位分隔符，例如，1,000\
    \ | , |\n| E | 科学计数法，与精度组合 | .4E |\n\n## 7.12 异常\n\n**ValueError**\n\n在前面的章节中，我们看到尝试使用`math.sqrt()`并以负数作为参数会导致`ValueError`。\n\
    \n在本章中，我们看到了`ValueError`的另一种情况——当传递给数字构造函数`int()`和`float()`的输入无效时。这些函数接受字符串，因此问题不在于参数的类型。相反，这是参数值的问题——某些字符串无法转换为数字类型。\n\
    \n例如，\n\n```\n>>> int('5')\n5\n>>> int('5.0')\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nValueError: invalid literal for int()\
    \ with base 10: '5.0'\n>>> int('kumquat')\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nValueError: invalid literal for int()\
    \ with base 10: 'kumquat'\n```\n\n第一次调用，参数为`'5'`，成功是因为字符串`'5'`可以转换为`int`类型的对象。另外两次调用失败并抛出`ValueError`。\n\
    \n`int('5.0')`失败是因为Python在尝试构造`int`时不知道如何处理小数点。即使5.0有对应的整数值5，Python也拒绝此输入并引发`ValueError`。\n\
    \n最后一个例子`int('kumquat')`失败的原因很明显，`'kumquat'`无法转换为整数。\n\n那么`float`构造函数`float()`呢？大多数数字字符串可以转换为`float`类型的对象。示例："
