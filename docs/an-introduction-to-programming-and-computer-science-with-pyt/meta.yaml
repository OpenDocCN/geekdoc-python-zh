    \n# 附录 D\n\n## 文件系统\n\n作者：Harry Sharman\n\n### 简介\n\n本附录涵盖了 macOS、Linux 和 Windows\
    \ 文件系统的基础知识。尽管这些文件系统之间有许多相似之处，特别是 Mac 和 Linux 之间，但接下来将分为三个不同的部分——每个操作系统一个。这是一个基本概述，以便你可以进入有趣的部分——编程！\n\
    \n如果你已经熟悉你机器的文件系统，那么你可能在这里学不到任何新东西，但也许你可以了解其他操作系统的一些知识！\n\nmacOS、Linux 和 Windows\
    \ 各自拥有不同的文件系统，但它们都是层次化的，并且都由文件和目录（也称为文件夹）组成。在层次化的文件系统中，文件以树状结构组织，顶层有一个目录，所有其他文件和目录都在其下。你可以将其想象为一棵倒置的树，根在顶部，枝叶在下面。因为你的文件系统是树状结构，所以计算机上的每个文件或目录都有一个唯一的*路径*。每个路径的末尾是一个文件（或者可能是一个空目录）。文件就像树的叶子。\n\
    \n我们将详细介绍每个操作系统，因为它们都略有不同。（在本文档中，路径或其部分以固定宽度字体显示。）\n\n## macOS\n\nmacOS 使用 Finder\
    \ 作为其默认的文件管理应用程序。Finder 是用于管理文件、文件夹（目录）和应用程序的图形用户界面（GUI）。Finder 通常位于屏幕底部的 Dock\
    \ 中，看起来像一个半蓝半白的笑脸。或者，你也可以通过导航到桌面并点击文件或文件夹的背景来打开 Finder。在屏幕顶部的菜单栏中，点击文件 > 新建 Finder\
    \ 窗口。\n\nmacOS 中的根目录位于 \"Macintosh HD\"（你的机器的主要存储设备）中。¹ 在 Finder 窗口的左侧，你会注意到有一个侧边栏，其中包含各种文件夹和位置。如果你没有看到这个侧边栏，请转到查看\
    \ > 显示侧边栏。在侧边栏中，在位置下，选择你的主要存储设备。同样，这通常标记为 \"Macintosh HD\"。在这里你可以找到所有其他文件、文件夹和应用程序。默认情况下，每个在你的\
    \ Mac 上有登录名的用户都有一个单独的目录来存放他们的文件。要访问*你的*文件和文件夹，如桌面和下载，你应该导航到此主要存储设备中的目录：/Users/<你的账户名称>，例如\
    \ /Users/harry。\n\n/Users/harry 就是所谓的路径。路径段由 / 分隔。每个路径段（除了最后一个）都是一个目录（文件夹）。因此\
    \ /Users/harry 表示目录 harry 位于另一个目录 /Users 中。典型的 macOS 用户目录将包含其他目录（文件夹），例如文档、下载、桌面等。例如，目录\
    \ /Users/harry/Desktop 位于 /Users/harry 中，而 /Users/harry 位于 /Users 中。/Users 位于根目录中，由开头的斜杠\
    \ / 表示。\n\n要在桌面上创建一个文件夹，你可以导航到此目录：/Users/<你的账户名称>/桌面（替换为你的实际账户名称），然后右键单击（在触控板或\
    \ Apple Magic Mouse 上用两指按下）以打开上下文菜单。现在，选择新建文件夹，为你的新文件夹命名，然后按键盘上的回车键。恭喜，你已经在桌面上创建了一个文件夹！\n\
    \n要删除、重命名、复制等，你可以右键单击文件夹或文件。要将文件或文件夹移动到新文件夹，你可以单击并将其拖动到所需位置。\n\n与许多其他操作系统一样，macOS\
    \ 使用*文件扩展名*——通常是一个点后跟两个、三个或四个字符。这些用于指示文件的附加信息（并可能将其与可以打开它的程序关联起来）。例如，Python 程序通常具有扩展名\
    \ .py，文本文件通常具有扩展名 .txt，等等。然而，在 macOS 中，应用程序（以及某些其他文件或目录）的文件扩展名默认是隐藏的。\n\n## Windows\n\
    \nWindows 使用文件资源管理器作为其默认的文件管理应用程序。文件资源管理器是用于管理文件、文件夹和应用程序的图形用户界面（GUI）。文件资源管理器通常可以通过屏幕底部的任务栏访问，你也可以通过\
    \ Windows 开始菜单找到它。尝试按 Windows 键，然后导航到文件资源管理器。\n\nWindows 中的主要存储设备通常标记为 c:。此驱动器上的根目录是\
    \ c:\\。这是所有其他文件、文件夹和应用程序的来源。在 Windows 机器上，磁盘驱动器\n\n> ¹请注意，你机器上主要存储设备的名称可能不同，因为这是用户可自定义的。"
