    # 10.4 Subscripts are indices


    Here we make explicit the connection between subscript notation in mathematics
    and indices in Python.


    In mathematics: Say we have a collection of objects $X$. We can refer to individual
    elements of the collection by associating each element of the collection with
    some index from the natural numbers. Thus,


    $$x_0 \in X$$

    $$x_1 \in X$$

    $$\dots$$

    $$x_n \in X$$


    Different texts may use different starting indices. For example, a linear algebra
    text probably starts indices at one. A text on set theory is likely to use indices
    starting at zero.


    In Python, sequences—lists, tuples, and strings—are indexed in this fashion. All
    Python indices start at zero, and we refer to Python as being *zero indexed*.


    Indexing works the same for lists, tuples, and even strings. Remember that these
    are sequences—ordered collections—so each element has an index, and we may access
    elements within the sequence by its index.


    ```

    my_list = [''P'', ''O'', ''R'', ''C'', ''U'', ''P'', ''I'', ''N'', ''E'']

    ```


    ![](img/c79d476b9b167832781fbb4257bb2cb9_212_0.png)


    We start indices at zero, and for a list of length $n$, the indices range from
    zero to $n - 1$.


    It''s exactly the same for tuples.


    ```

    my_tuple = (''P'', ''O'', ''R'', ''C'', ''U'', ''P'', ''I'', ''N'', ''E'')

    ```


    ![](img/c79d476b9b167832781fbb4257bb2cb9_212_1.png)'
