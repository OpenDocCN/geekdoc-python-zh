    \ list index out of range\n```\n\nThis `IndexError` message is telling us there\
    \ *is no element with index 3*.\n\n# Changing the values of individual elements\
    \ in a list\n\nWe can use the index to access individual elements in the list\
    \ for modification as well (remember: lists are mutable).\nLet's say there was\
