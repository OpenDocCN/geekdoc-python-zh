    \n```\n>>> x[-1]\n```\n\n你可以将其理解为通过列表的索引进行反向计数。\n\n## 一个谜题（可选）\n\n假设我们有一个列表`x`（如上），我们对这种通过列表反向计数的想法很感兴趣，我们想找到一种替代方法，使用负值索引来访问*任何*大小的列表的第一个元素。\n\
