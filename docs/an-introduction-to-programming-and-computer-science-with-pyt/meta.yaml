    \ False.\n\n# branching\n\nIt is through *branching* that we implement conditional\
    \ execution of portions of our code. For example, we may wish some portion of\
    \ our code to be executed only if some condition is true. Branching in Python\
    \ is implemented with the keywords if, elif, and else. Examples:\n\n```\nif x\
    \ > 1:\n    print(\"x is greater than one\")\n```\n\nand\n\n```\nif x < 0:\n \
    \   print(\"x is less than zero\")\nelif x > 1:\n    print(\"x is greater than\
    \ one\")\nelse:\n    print(\"x must be between 0 and 1, inclusive\")\n```\n\n\
    It's important to understand that in any given if/elif/else compound statement,\
    \ only one branch is executed—the first for which the condition is true, or the\
    \ else clause (if there is one) in the event that none of the preceding conditions\
    \ is true."
- md: '## bug


    Simply put, a *bug* is a defect in our code. I hesitate to call syntax errors
    “bugs”. It’s best to restrict this term to semantic defects in our code (and perhaps
    unhandled exceptions which should be handled). In any event, when you find a bug,
    fix it!


    ## bytecode


    *Bytecode* is an intermediate form, between source code (written by humans) and
    binary code (which is executed by your computer’s central processor unit (CPU)).
    Bytecode is a representation that’s intended to be efficiently executed by an
    interpreter. Python, being an interpreted language, produces an intermediate bytecode
    for execution on the Python virtual machine (PVM). Conversion of Python source
    code to intermediate bytecode is performed by the Python compiler.


    ## call (see: invoke)


    When we wish to use a previously-defined function or method, we *call* the function
    or method, supplying whatever arguments are required, if any. When we call a function,
    flow of execution is temporarily passed to the function. The function does its
    work (whatever that might be), and then flow of control and a value are returned
    to the point at which the function was called. See: Chapter 5 Functions, for more
    details.


    ```

    print("Hello, World!")  # call the print() function

    x = math.sqrt(2)       # call the sqrt() function

    ```


    Note: *call* is synonymous with *invoke*.


    ## camel case


    *Camel case* is a naming convention in which an identifier composed of multiple
    words has the first letter of each interior word capitalized. Sometimes stylized
    thus: camelCase. See: PEP 8 for appropriate usage.


    ## central tendency


    In statistics, the arithmetic mean is one example of a measure of *central tendency*,
    measuring a “central” or (hopefully) “typical” value for a data set. Another aspect
    of central tendency is that values tend to cluster around some central value (*e.g.*,
    mean).


    ## comma separated values (CSV)


    The *comma separated values* format (CSV) is a commonly used way to represent
    data that is organized into rows and columns. In this format, commas are used
    to separate values in different columns. If commas appear within a value, say
    in the case of a text string, the value is delimited with quotation marks. Python
    provides a convenient module—the csv module for reading, parsing, and iterating
    rows in a CSV file.


    ## command line interface (CLI)


    Command line interfaces (abbreviated CLI) are user interfaces where the user interacts
    with a program by typing commands or responding to prompts in text form, or viewing
    data and responses from the program in similar format. All the programs in this
    book make use of a command line interface.


    ## comment


    Strictly speaking, comments are text appearing in source code which is not read
    or interpreted by the language, but instead, is solely for the benefit of human
    readers. Comments in Python are delimited by the octothorpe, #, a.k.a. hash sign,
    pound sign, etc. In Python, any text on a given line following this symbol is
    ignored by the interpreter.


    In general, it is good practice to leave comments which explain why something
    is as it is. Ideally, comments should not be necessary to explain how something
    is being done (as this should be evident from the code itself).


    ## comparable


    Objects are comparable if they can be ordered or compared, that is, if the comparison
    operators—==, <=, >=, <, >, and != can be applied. If so, the operands on either
    side of the comparison operators are comparable. Instances of many types can be
    compared among themselves (any string is comparable to all other strings, any
    numeric is comparable to all other numerics), but some types cannot be compared
    with other objects of the same type. For example, we cannot compare objects of
    type range or function this way. In most cases, objects of different types are
    not comparable (with different numeric types as a notable exception). For example,
    we cannot compare strings and integers.


    ## compiler


    A compiler is a program which converts source code into machine code, or, in the
    case of Python, to bytecode, which can then be run on the Python virtual machine.


    ## concatenation


    Concatenation is a kind of joining together, not unlike coupling of railroad cars.
    Some types can be concatenated, others cannot. Strings and lists are two types
    which can be concatenated. If both operands are a string, or both operands are
    a list, then the + operator performs concatenation (rather than addition, if both
    operands were numeric).


    Examples:


    ```

    >>> ''dog'' + ''food''

    ''dogfood''

    >>> [1, 2, 3] + [''a'', ''b'', ''c'']

    [1, 2, 3, ''a'', ''b'', ''c'']

    ```


    ## condition


    *Conditions* are used to govern the behavior of while loops and if/elif/else statements.
    Loops or branches are executed when a condition is true—that is, it evaluates
    to True or has a truthy value. Note: Python supports *conditional expressions*,
    which are shorthand forms for if/else, but these are not presented in this text.


    ## congruent


    In the context of modular arithmetic, we say two numbers are *congruent* if they
    have the same remainder with respect to some given modulus. For example, 5 is
    congruent to 19 modulo 2, because 5 % 2 leaves a remainder of 1 and 19 % 2 also
    leaves a remainder of 1. In mathematical notation, we indicate congruence with
    the ≡ symbol, and we can write this example as 5 ≡ 19 (mod 2). In Python, the
    expression 5 % 2 == 19 % 2 evaluates to True.


    ## console


    *Console* refers either to the Python shell, or Python input/output when run in
    a terminal.


    ## constructor


    A *constructor* is a special function which constructs and returns an object of
    a given type. Python provides a number of built-in constructors, *e.g.*, int(),
    float(), str(), list(), tuple(), *etc*. These are often used in Python to perform
    conversions between types. Examples:


    - list((''a'', ''b'', ''c'')) converts the tuple argument to a list: [''a'', ''b'',
    ''c''].

    - list(''apple'') converts the string argument to a list: [''a'', ''p'', ''p'',
    ''l'', ''e''].

    - int(42.1) converts the float argument to an integer, truncating the portion
    to the right of the decimal point: 42.

    - int(''2001'') converts the string argument to an integer: 2001.

    - float(''98.6'') converts the string argument to a float: 98.6.

    - tuple([2, 4, 6, 8]) converts the list argument to a tuple: (2, 4, 6, 8).


    Other constructors include range() and enumerate().


    ## context manager


    Context managers are created using the `with` keyword, and are commonly used when
    working with file I/O. Context managers take over some of the work of opening
    and closing a file, or ensuring that a file is closed at the end of a `with` block,
    regardless of what else might occur within that block. Without using a context
    manager, it''s up to the programmer to ensure that a file is closed. Accordingly,
    `with` is the preferred idiom whenever opening a file.


    Context managers have other uses, but these are outside the scope of this text.


    ## cycle (within a graph)


    A *cycle* exists in a graph if there is more than one path of edges from one vertex
    to another. We refer to a graph containing a cycle or cycles as *cyclic*, and
    a graph without any cycles as *acyclic*.


    ## delimiter


    A *delimiter* is a symbol or symbols used to set one thing apart from another.
    What delimiters are used, how they are used, and what they delimit depend on context.
    For example, single-line and inline comments in Python are delimited by the `#`
    symbol at the start and the newline character at the end. Strings can be delimited
    (beginning and end) with apostrophes, `''`, quotation marks, `"`, or triple quotation
    marks, `"""`. In a CSV file, columns are delimited by commas.


    ## dictionary


    A *dictionary* is a mutable type which stores data in key/value pairs, like a
    conventional dictionary. Keys must be unique, and each key is associated with
    a single value. Dictionary values can be just about anything, including other
    dictionaries, but keys must be *hashable*. Dictionaries are written in Python
    using curly braces, with colons used to separate keys and values. Dictionary entries
    (elements) are separated by commas.


    Examples:


    - `{1: ''odd'', 2: ''even''}`

    - `{''apple'': ''red'', ''lime'': ''green'', ''lemon'': ''yellow''}`

    - `{''name'': ''Egbert'', ''courses'': [''CS1210'', ''CS2240'', ''CS2250''], ''age'':
    19}`


    ## directory (file system)


    A *directory* is a component of a file system which contains files, and possibly
    other directories. It is the nesting of directories (containment of one directory
    within another) that gives a file system its hierarchical structure. The top-level
    directory in a disk drive or volume is called the *root* directory.


    In modern operating system GUIs, directories are visually represented as folders,
    and may be referred to as folders.'
  mdcn: '## bug


    简而言之，*bug* 是我们代码中的一个缺陷。我倾向于不将语法错误称为“bug”。最好将这个术语限制在代码中的语义缺陷（以及可能未处理但应该处理的异常）上。无论如何，当你发现一个
    bug 时，请修复它！


    ## bytecode


    *字节码* 是介于源代码（由人类编写）和二进制代码（由计算机的中央处理器单元 (CPU) 执行）之间的一种中间形式。字节码是一种旨在被解释器高效执行的表示形式。Python
    作为一种解释型语言，会生成中间字节码，以便在 Python 虚拟机 (PVM) 上执行。Python 源代码到中间字节码的转换由 Python 编译器执行。


    ## call (see: invoke)


    当我们希望使用先前定义的函数或方法时，我们会*调用*该函数或方法，并提供所需的任何参数（如果有的话）。当我们调用一个函数时，执行流程会暂时传递给该函数。函数执行其工作（无论那是什么），然后控制流和一个值会返回到调用该函数的位置。更多详情请参见：第
    5 章 函数。


    ```

    print("Hello, World!")  # 调用 print() 函数

    x = math.sqrt(2)       # 调用 sqrt() 函数

    ```


    注意：*call* 与 *invoke* 同义。


    ## camel case


    *驼峰命名法* 是一种命名约定，其中由多个单词组成的标识符，其每个内部单词的首字母大写。有时这样书写：camelCase。请参见：PEP 8 了解适当用法。


    ## central tendency


    在统计学中，算术平均值是*集中趋势*度量的一个例子，它衡量数据集的“中心”或（希望是）“典型”值。集中趋势的另一个方面是，值倾向于聚集在某个中心值（*例如*，平均值）周围。


    ## comma separated values (CSV)


    *逗号分隔值*格式 (CSV) 是一种常用的方式来表示组织成行和列的数据。在此格式中，逗号用于分隔不同列中的值。如果逗号出现在值中，例如在文本字符串的情况下，该值会用引号括起来。Python
    提供了一个方便的模块——csv 模块，用于读取、解析和遍历 CSV 文件中的行。


    ## command line interface (CLI)


    命令行界面（缩写为 CLI）是一种用户界面，用户通过以文本形式键入命令或响应提示，或以类似格式查看程序的数据和响应来与程序交互。本书中的所有程序都使用命令行界面。


    ## comment


    严格来说，注释是出现在源代码中的文本，不会被语言读取或解释，而是完全为了人类读者的便利。Python 中的注释由井号 `#`（也称为 hash 符号、pound
    符号等）分隔。在 Python 中，给定行上此符号之后的任何文本都会被解释器忽略。


    一般来说，留下解释为什么某事如此的注释是良好的实践。理想情况下，注释不应该用来解释某事是如何完成的（因为这应该从代码本身就能明显看出）。


    ## comparable


    如果对象可以被排序或比较，即如果可以应用比较运算符——`==`、`<=`、`>=`、`<`、`>` 和 `!=`，那么这些对象就是可比较的。如果可以，那么比较运算符两侧的操作数就是可比较的。许多类型的实例可以相互比较（任何字符串都可以与所有其他字符串比较，任何数字都可以与所有其他数字比较），但某些类型不能与相同类型的其他对象进行比较。例如，我们不能以这种方式比较
    `range` 或 `function` 类型的对象。在大多数情况下，不同类型的对象是不可比较的（不同的数字类型是一个显著的例外）。例如，我们不能比较字符串和整数。


    ## compiler


    编译器是一种将源代码转换为机器代码的程序，或者在 Python 的情况下，转换为字节码，然后可以在 Python 虚拟机上运行。


    ## concatenation


    连接是一种连接在一起的方式，类似于铁路车厢的连接。某些类型可以连接，其他则不能。字符串和列表是两种可以连接的类型。如果两个操作数都是字符串，或者两个操作数都是列表，那么
    `+` 运算符执行连接（而不是加法，如果两个操作数都是数字的话）。


    示例：


    ```

    >>> ''dog'' + ''food''

    ''dogfood''

    >>> [1, 2, 3] + [''a'', ''b'', ''c'']

    [1, 2, 3, ''a'', ''b'', ''c'']

    ```


    ## condition


    *条件* 用于控制 `while` 循环和 `if/elif/else` 语句的行为。当条件为真时——即它求值为 `True` 或具有真值（truthy value）时，循环或分支就会执行。注意：Python
    支持*条件表达式*，它们是 `if/else` 的简写形式，但本文不介绍这些。


    ## congruent


    在模算术的上下文中，如果两个数相对于某个给定的模数具有相同的余数，我们称这两个数是*同余*的。例如，5 与 19 模 2 同余，因为 5 % 2 的余数是
    1，19 % 2 的余数也是 1。在数学符号中，我们用 ≡ 符号表示同余，我们可以将此示例写为 5 ≡ 19 (mod 2)。在 Python 中，表达式
    `5 % 2 == 19 % 2` 的求值结果为 `True`。


    ## console


    *控制台* 指的是 Python shell，或在终端中运行时的 Python 输入/输出。


    ## constructor


    *构造函数* 是一个特殊的函数，它构造并返回给定类型的对象。Python 提供了许多内置构造函数，*例如* `int()`、`float()`、`str()`、`list()`、`tuple()`
    等。这些在 Python 中通常用于执行类型之间的转换。示例：


    - `list((''a'', ''b'', ''c''))` 将元组参数转换为列表：`[''a'', ''b'', ''c'']`。

    - `list(''apple'')` 将字符串参数转换为列表：`[''a'', ''p'', ''p'', ''l'', ''e'']`。

    - `int(42.1)` 将浮点数参数转换为整数，截断小数点右侧的部分：`42`。

    - `int(''2001'')` 将字符串参数转换为整数：`2001`。

    - `float(''98.6'')` 将字符串参数转换为浮点数：`98.6`。

    - `tuple([2, 4, 6, 8])` 将列表参数转换为元组：`(2, 4, 6, 8)`。


    其他构造函数包括 `range()` 和 `enumerate()`。


    ## context manager


    上下文管理器使用 `with` 关键字创建，在处理文件 I/O 时常用。上下文管理器接管了打开和关闭文件的部分工作，或者确保在 `with` 块结束时关闭文件，无论该块内可能发生什么其他情况。如果不使用上下文管理器，程序员需要确保文件被关闭。因此，`with`
    是打开文件时的首选惯用法。


    上下文管理器还有其他用途，但这些超出了本文的范围。


    ## cycle (within a graph)


    如果在一个图中，从一个顶点到另一个顶点存在多条边路径，则存在*环*。我们称包含一个或多个环的图为*有环的*，没有任何环的图为*无环的*。


    ## delimiter


    *分隔符* 是用于将一个事物与另一个事物区分开来的符号或符号组合。使用什么分隔符、如何使用以及它们分隔什么取决于上下文。例如，Python 中的单行和内联注释由行首的
    `#` 符号和行尾的换行符分隔。字符串可以用单引号 `''`、双引号 `"` 或三引号 `"""` 来分隔（开始和结束）。在 CSV 文件中，列由逗号分隔。


    ## dictionary


    *字典* 是一种可变类型，它以键/值对的形式存储数据，类似于传统字典。键必须是唯一的，每个键与一个值相关联。字典的值几乎可以是任何东西，包括其他字典，但键必须是*可哈希的*。在
    Python 中，字典使用花括号书写，冒号用于分隔键和值。字典条目（元素）用逗号分隔。


    示例：


    - `{1: ''odd'', 2: ''even''}`

    - `{''apple'': ''red'', ''lime'': ''green'', ''lemon'': ''yellow''}`

    - `{''name'': ''Egbert'', ''courses'': [''CS1210'', ''CS2240'', ''CS2250''], ''age'':
    19}`


    ## directory (file system)


    *目录* 是文件系统的一个组成部分，它包含文件，可能还包含其他目录。正是目录的嵌套（一个目录包含在另一个目录中）赋予了文件系统其层次结构。磁盘驱动器或卷中的顶级目录称为*根*目录。


    在现代操作系统的图形用户界面 (GUI) 中，目录在视觉上表示为文件夹，也可能被称为文件夹。'
