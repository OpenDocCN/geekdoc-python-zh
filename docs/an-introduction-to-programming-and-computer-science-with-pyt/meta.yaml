    # 9.5 The origin of the term “bug”


    So where do we get the word “bug” anyhow? Alas, the origin of the term is lost.
    However, in 1947, the renowned computer pioneer Grace Murray Hopper was working
    on the Harvard Mark I computer, and a program was misbehaving.⁴


    ![](img/c79d476b9b167832781fbb4257bb2cb9_188_0.png)


    Figure 9.1: Grace Murray Hopper. Source: The Grace Murray Hopper Collection, Archives
    Center, National Museum of American History (image is in the public domain)


    After reviewing the code and finding no error, she investigated further and found
    a moth in one of the computer’s relays (remember this was back in the days when
    a computer filled an entire large room). The moth was removed, and taped into
    Hopper’s lab notebook.


    > ⁴Judging from Hopper’s notebook (9 September 1947), the misbehaving program
    was a “multi-adder test”. It appears they were running the machine through a sequence
    of tests—e.g., tests for certain trigonometric functions took place earlier that
    day. At least one had failed and some relays (hardware components) were replaced.
    The multi-adder test was started at 3:25 PM (Hopper uses military time in the
    notebook: “1525”), and twenty minutes later, the moth was taped into the notebook.
    It’s not clear how the problem became manifest, but someone went looking at the
    hardware and found the moth.'
