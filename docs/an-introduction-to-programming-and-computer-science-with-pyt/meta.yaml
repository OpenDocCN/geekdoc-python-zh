- md: "## 6.4 Names (identifiers)\n\nChoosing good names is crucial in producing readable\
    \ code. Use meaningful names when defining variables, constants, and functions.\
    \ This makes your code easier to read and easier to debug!\n\nExamples of good\
    \ variable names:\n\n- velocity\n- average_score\n- watts\n\nExamples of bad variable\
    \ names:\n\n- q\n- m7\n- rsolln\n\nCompare these with the good names (above).\
    \ With a good name, you know what the variable represents. With these bad names,\
    \ who knows what they mean? (Seriously, what the heck is rsolln?)\n\nThere are\
    \ some particularly bad names that should be avoided no matter what. Never use\
    \ the letter \"O\" (upper or lower case) or \"l\" (lowercase \"L\") or \"I\" (upper\
    \ case \"i\") as a variable name. \"O\" and \"o\" look too much like \"0\", \"\
    l\" and \"I\" look too much like \"1\".\n\nWhile single letter variable names\
    \ are, in general, to be avoided, it's OK sometimes (depending on context). For\
    \ example, it's common practice to use i, j, etc. for loop indices (we'll get\
    \ to loops later) and x, y, z for spatial coordinates, but only use such short\
    \ names when it is 100% clear from context what these represent.\n\nSimilar rules\
    \ apply to functions. Examples of bad function names:\n\n- i2m()\n- sd()\n\nExamples\
    \ of good function names:\n\n- inches_to_meters()\n- standard_deviation()\n\n\
    ## ALL_CAPS, lowercase, snake_case, camelCase, WordCaps\n\nIn Python, the convention\
    \ for naming variables and function is that they should use lowercase or so-called\
    \ snake case, in which words are separated by underscores.\n\nIn some other languages,\
    \ camelCase (with capital letters in the middle) or WordCaps (where each word\
    \ is capitalized) are the norm. Not so with Python. camelCase should be avoided\
    \ (always). WordCaps are appropriate for class names (a feature of object-oriented\
    \ programming—something that's not presented in this text).\n\n- Good: price_per_item\n\
    - Bad: Priceperitem or pricePerItem\n\n## 6.5 Line length\n\nPEP 8 suggests that\
    \ lines should not exceed 79 characters in length. There are several reasons why\
    \ this is a good practice.\n\n- It makes it feasible to print source code on paper\
    \ or to view without truncation on various source code hosting websites (e.g.\
    \ GitHub, GitLab, etc.).\n- It accommodates viewports (editor windows, etc.) of\
    \ varying width (don't forget you may be collaborating with others).\n- Even if\
    \ you have a wide monitor, and can fit long lines in your viewport, long lines\
    \ *slow your reading down*. This is well documented. If your eye has to scan too\
    \ great a distance to find the beginning of the next line, readability suffers.\n\
    \nThroughout this text, you may notice some techniques used to keep line length\
    \ in code samples within these bounds.\n\n## 6.6 Constants\n\nIn most programming\
    \ languages there's a convention for naming constants. Python is no different—and\
    \ the convention is quite similar to many other languages.\nIn Python, we use\
    \ ALL_CAPS for constant names, with underscores to separate words if necessary.\
    \ Here are some examples:\n\n```\n# Physical constants\nC = 299792458  # speed\
    \ of light: meters / second ** -1\nMASS_ELECTRON = 9.1093837015 * 10 ** -31  #\
    \ mass in kg\n\n# Mathematical constants\nPI = 3.1415926535  # pi\nPHI = 1.6180339887\
    \  # phi (golden ratio)\n\n# Unit conversions\nFEET_PER_METER = 3.280839895\n\
    KM_PER_NAUTICAL_MILES = 1.852\n\n# Other constants\nEGGS_PER_CARTON = 12\n```\n\
    \nUnlike Java, there is no `final` keyword, which tells the compiler that a constant\
    \ must not be changed (same for other languages like C++ or Rust which have a\
    \ `const` keyword).\nWhat prevents a user from changing a constant? In Python,\
    \ nothing. All the more reason to make it immediately clear—visually—that we're\
    \ dealing with a constant.\nSo the rule in Python is to use ALL_CAPS for constants\
    \ and nothing else. Then it's up to you, the programmer, to ensure these remain\
    \ unchanged.\n\n## 6.7 Comments in code\n\nVirtually all programming languages\
    \ allow programmers to add *comments* to their code, and Python is no different.\
    \ Comments are text within your code which is ignored by the Python interpreter.\n\
    \nComments have many uses:\n\n- explanations as to *why* a portion of code was\
    \ written the way it was,\n- reminders to the programmer, and\n- guideposts for\
    \ others who might read your code.\n\nComments are an essential part of your code.\
    \ In fact, it's helpful to think of your comments as you do your code. By that,\
    \ I mean that *the comments you supply should be of value to the reader*—even\
    \ if that reader is *you*.\n\nSome folks say that code should explain *how*, and\
    \ comments should explain *why*. This is not always the case, but it's a very\
    \ good rule in general. But beware: good comments cannot make up for opaque or\
    \ poorly-written code.\n\nPython also has what are called *docstrings*. While\
    \ these are not ignored by the Python interpreter, it's OK for the purposes of\
    \ this textbook to think of them that way.\n\nDocstrings are used for:\n\n- providing\
    \ identifying information,\n- indicating the purpose and correct use of your code,\
    \ and\n- providing detailed information about the inputs to and output from functions.\n\
    \nThat said, here are some forms and guidelines for comments and docstrings.\n\
    \n## Inline and single-line comments\n\nThe simplest comment is an *inline* or\
    \ *single-line* comment. Python uses the # (call it what you will—pound sign,\
    \ hash sign, number sign, or octothorpe) to start a comment. Everything following\
    \ the # on the same line will be ignored by the Python interpreter. Here are some\
    \ examples:\n\n```\n# This is a single-line comment\n\nfoo = 'bar'  # This is\
