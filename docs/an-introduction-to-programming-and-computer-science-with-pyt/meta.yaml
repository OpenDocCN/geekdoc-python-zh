  md: 'On the $x$-axis are the values we might measure, and on the $y$-axis we have
    the probability of observing a particular value. In a normal distribution, the
    mean is the most likely value for an observation, and the greater the distance
    from the mean, the less likely a given value. The *standard deviation* tells us
    how spread out values are about the mean. If the standard deviation is large,
    we have a broad curve:


    ![](img/c79d476b9b167832781fbb4257bb2cb9_298_0.png)


    With a smaller standard deviation, we have a narrow curve with a higher peak.


    ![](img/c79d476b9b167832781fbb4257bb2cb9_298_1.png)


    The area under these curves is equal.'
