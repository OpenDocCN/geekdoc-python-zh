    # 4.4 Euclidean or “floor” division


    When presenting expressions, we saw examples of common arithmetic operations:
    addition, subtraction, multiplication, and division. Here we will present two
    additional operations which are closely related: the modulo or “remainder” operator,
    and what’s variously called “quotient”, “floor division”, “integer division” or
    “Euclidean division.”⁶


    Chances are, when you first learned division in primary school, you learned about
    Euclidean (floor) division. For example, 17 ÷ 5 = 3 r 2, or 21 ÷ 4 = 5 r 1. In
    the latter example, we’d call 21 the dividend, 4 the divisor, 5 the quotient,
    and 1 the remainder.


    > ⁵The table above says “similar to” because, for example, a += b isn’t *exactly*
    the same as a = a + b. In augmented assignment, the left-hand side is evaluated
    *before* the right-hand side, then the right-hand side is evaluated and the result
    is assigned to the variable on the left-hand side. There are some other minor
    differences.


