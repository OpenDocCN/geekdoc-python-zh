    # 11.6 Iterables


    As we have seen, iterables are Python''s way of controlling a for loop.

    You can think of an iterable as a sequence or composite object (composed of many
    parts) which can return one element at a time, until the sequence is exhausted.
    We usually refer to the elements of an iterable as members of the iterable.

    It''s much like dealing playing cards from a deck, and doing something (performing
    a task or calculation) once for each card that''s dealt.

    A deck of playing cards is an iterable. It has 52 members (the individual cards).
    The cards have some order (they may be shuffled or not, but the cards in a deck
    are ordered nonetheless). We can deal cards one at a time. This is iterating through
    the deck. Once we''ve dealt the 52nd card, the deck is exhausted, and iteration
    stops.

    Now, there are two ways we could use the cards.

    First, we can use the information that''s encoded in each card. For example, we
    could say the name of the card, or we could add up the pips on each card, and
    so on.

    Alternatively, if we wanted to do something 52 times (like push-ups) we could
    do one push-up for every card that was dealt. In this case, the information encoded
    in each card and the order of the individual cards would be irrelevant. Nevertheless,
    if we did one push-up for every card that was dealt, we''d know when we reached
    the end of the deck that we''d done 52 push-ups.

    So it is in Python. When iterating some iterable, we can use the data or value
    of each member (say calculating the sum of numbers in a list), or we can just
    use iteration as a way of keeping count. Both are OK in Python.'
