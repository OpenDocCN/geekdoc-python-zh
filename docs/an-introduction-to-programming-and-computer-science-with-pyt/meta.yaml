  - "[PAGE 355]\n\n# dividend\n\nIn the context of division (including floor division,\
    \ // and the modulo operator, %), the *dividend* is the number being divided.\
    \ For example, in the expression 21 / 3, the dividend is 21.\n\n# divisor\n\n\
    In the context of division (including floor division, // and the modulo operator,\
    \ %), the *divisor* is the number dividing the dividend. For example, in the expression\
    \ 21 / 3, the divisor is 3. In the context of the modulo operator and modular\
    \ arithmetic, we also refer to this as the modulus.\n\n# driver code\n\n*Driver\
    \ code* is an informal way of referring to the code which drives (runs) your program,\
    \ to distinguish it from function definitions, constant assignments, or classes\
    \ defined by the programmer. Driver code is often fenced behind the if statement:\
    \ `if __name__ == '__main__':`\n\n# docstring\n\nA *docstring* is a triple-quoted\
    \ string which includes information about a program, module, function, or method.\
    \ These should not be used for inline comments. Unlike inline comments, docstrings\
    \ are read and parsed by the Python interpreter. Example at the program (module)\
    \ level:\n\n```\n\"\"\"\nMy Fabulous Program\nEgbert Porcupine <eporcupi@uvm.edu>\n\
    This program prompts the user for a number and\nreturns the corresponding frombulation\
    \ coefficient.\n\"\"\"\n```\n\nOr at the level of a function:\n\n```\ndef successor(n_):\n\
    \    \"\"\"Given some number, n_, returns its successor. \"\"\"\n    return n_\
    \ + 1\n```\n\n# dunder\n\nSpecial variables and functions in Python have identifiers\
    \ that begin and end with two underscores. Such identifiers are referred to as\
    \ *dunders*, a descriptive *portmanteau* of “double underscore.” Examples include\
    \ the variable `__name__` and the special name `'__main__'`, and many other identifiers\
    \ defined by the language. These are generally used to indicate visually that\
    \ these are system-defined identifiers."
  - "[PAGE 356]\n\n# dynamic typing / dynamically typed\n\nUnlike statically typed\
    \ languages (e.g., C, C++, Java, Haskell, OCaml, Rust, Scala), Python is *dynamically\
    \ typed*. This means that we can rebind new values to existing names, even if\
    \ these values are of a different type than were bound in previous assignments.\
    \ For example, in Python, this is A-OK:\n\n```\nx = 1          # now x is bound\
    \ to a value of type int\nx = 'wombat'   # now x is bound to a value of type str\n\
    x = [3, 5, 7]  # ...and now a list\n```\n\nThis demonstrates *dynamic typing*—at\
    \ different points in the execution of this code `x` is associated with values\
    \ of different types. In many other languages, this would result in type errors.\n\
    \n# edge (graph)\n\nA graph consists of vertices (also called nodes) and *edges*.\
    \ An *edge* connects two vertices, and each edge in a graph has exactly two endpoints\
    \ (vertices). All edges in graphs in this text are *undirected*, meaning that\
    \ they have no direction. If an edge exists between vertices A and B, then A is\
    \ adjacent to B and B is adjacent to A.\n\n# empty sequence\n\nThe term *empty*\
    \ applies to any sequence which contains no elements. For example, the empty string\
    \ `\"\"`, the empty list `[]`, and the empty tuple `(,)`—these are all *empty\
    \ sequences*. We refer to these using the definite article (\"the\"), because\
    \ there is only one such object of each type. Of note, empty sequences are falsey.\n\
    \n# entry point\n\nThe *entry point* of a program is the point at which code begins\
    \ execution. In Python, the dunder `__main__` is the name of the environment where\
    \ top-level code is run, and thus indicates the entry point. Example:\n\n```\n\
    \"\"\"\nSome docstring here\n\"\"\"\n\ndef square(x_):\n    return x_ * x_\n\n\
    # This is the entry point, where execution of code begins...\nif __name__ == '__main__':\n\
    \    x = float(input(\"Enter a number: \"))\n    x_squared = square(x)\n    print(f\"\
    {x} squared is {x_squared}\")\n```"
  - '[PAGE 357]


    # escape sequence


    An *escape sequence* (within a string) is a substring preceded by a \ character,
    indicating that the following character should be interpreted literally and not
    as a delimiter. Example: print(''The following apostrophe isn\''t a delimiter'')


    Escape sequences are also used to represent special values that otherwise can''t
    be represented within a string. For example, \n represents a new line and \t represents
    a tab.


    # Euclidean division


    This is the kind of division you first learned in primary school, before you learned
    about decimal expansion. A calculation involving *Euclidean division* yields a
    quotient and a remainder (which may be zero). In Python, this is implemented by
    two separate operators, one which yields the quotient (without decimal expansion),
    and the other which yields the remainder. These are // (a.k.a. floor division)
    and % (a.k.a., modulo) respectively.


    So, for example, in primary school, when asked to divide 25 by 3, you''d answer
    8 remainder 1. In Python:


    ```

    quotient = 25 // 3   # quotient gets 8

    remainder = 25 % 3   # remainder gets 1

    ```


    # evaluate / evaluation


    Expressions are *evaluated* by reducing them to a value. For example, the *evaluation*
    of the expression 1 + 1 yields 2. The evaluation of larger expressions proceeds
    by order of operator precedence or order of function calls. So, for example,


    ```

    >>> import math

    >>> x = 16

    >>> y = 5

    >>> int(math.sqrt(x) + 4 * y + 1)

    25

    ```


    The call to math.sqrt() is evaluated first (yielding 4.0). The multiplication
    4 * y is evaluated next (yielding 20). Then addition is performed (4.0 + 20 +
    1, yielding 25.0). Finally, the int constructor is called, and the final evaluation
    of this expression is 25.


    When literals are evaluated, they evaluate to themselves.


    # exception


    An *exception* is an error that occurs at run time. This occurs when code is syntactically
    valid, but it contains semantic defects (bugs) or receives unexpected values.
    When Python detects such an error, it raises an exception. If the exception is
    not handled, program execution terminates.'
  - "[PAGE 358]\n\nPython provides a great many built-in exceptions which help in\
    \ diagnosing errors. Examples: TypeError, ValueError, ZeroDivisionError, etc.\
    \ Exceptions can be handled using try and except.\n\n# exception handling\n\n\
    Exception handling allows the programmer to anticipate the possibility of certain\
    \ exceptions that might arise during execution and provide a fallback or means\
    \ of responding to the exception should it arise. For example, we often use exception\
    \ handling when validating input from the user.\n\n```\nwhile True:\n    response\
    \ = input(\"Enter a valid number greater than zero: \")\n    try:\n        x =\
    \ float(response)\n        if x > 0:\n            break\n    except ValueError:\n\
    \        print(f\"Sorry I cannot convert {response} to a float!\")\n```\n\nException\
    \ handling should be as limited and specific as possible. For example, you should\
    \ never use a bare except: or except Exception:.\n\nSome types of exception, for\
    \ example NameError should never be handled, as this would conceal a serious programming\
    \ defect which should be addressed by revising code.\n\n# expression\n\nAn expression\
    \ is any syntactically valid code that can be evaluated, that is, an expression\
    \ yields a value. Expressions can be simple (e.g., a single literal) or complex\
    \ (i.e., composed of literals, variables, operators, function calls, etc). Expressions\
    \ are to be distinguished from statements—expressions have an evaluation, statements\
    \ do not.\n\n# falsey\n\nWhen used as conditions or in Boolean expressions, most\
    \ everything in Python has a truth value. If something has a truth value that\
    \ is treated as if it were false, we say such a thing is falsey. Falsey things\
    \ include (but are not limited to) empty sequences, 0, and 0.0.\n\n# Fibonacci\
    \ sequence\n\nThe Fibonacci sequence is a sequence of natural numbers starting\
    \ with 0, 1, in which each successive element is the sum of the two preceding\
    \ elements. Thus the Fibonacci sequence begins 0, 1, 1, 2, 3, 5, 8, 13, 21, ...\
    \ The Fibonacci sequence gets its name from Leonardo of Pisa (c. 1170–c. 1245\
    \ CE) whose nickname was Fibonacci. The Fibonacci sequence was known to Indian\
    \ mathematicians (notably Pingala) as early as 200 BCE, but history isn't always\
    \ fair about naming these things."
- md: "## file\n\nA *file* is a component of a file system that's used to store data.\
    \ The computer programs you write are saved as files, as are all the other documents,\
    \ programs, and other resources you may have on your computer. Files are contained\
    \ in directories.\n\n## floating-point\n\nA *floating-point* number is a number\
    \ which has a decimal point. These are represented differently from integers.\
    \ Python has a type, `float` which is used for floating-point numbers.\n\n## floor\
    \ division\n\n*Floor division* calculates the Euclidean quotient, or, if you prefer,\
    \ the largest integer that is less than or equal to the result of floating-point\
    \ division. For example, `8 // 3` yields 2, because 2 is the largest integer less\
    \ than 2.666...(which is the result of `8 / 3`).\n\n## floor function\n\nThe floor\
    \ function returns the largest integer less than or equal to the argument provided.\
    \ In mathematical notation, we write\n\n$$\\lfloor x \\rfloor$$\n\nand, for example\
    \ $\\lfloor 6.125 \\rfloor = 6$.\n\nPython implements this function in the `math`\
    \ module. Example: `math.floor(6.125)` yields 6.\n\n## flow chart\n\nA *flow chart*\
    \ is a tool used to represent the possible paths of execution and flow of control\
    \ in a program, function, method, or portion thereof. See: Chapter 8 Branching.\n\
    \n## format specifier\n\n*Format specifiers* are used within f-string replacement\
    \ fields to indicate how the interpolated content should be formatted, *e.g.*,\
    \ indicating precision of floating-point numbers; aligning text left, right or\
    \ center, *etc*. There is a complete \"mini-language\" of format specifiers. Within\
    \ the replacement field, the format specifier follows the interpolated expression,\
    \ separated by a colon. Format specifiers are optional.\n\n## folder (see: directory)\n\
    \n*Folder* is synonymous with directory.\n\n## f-string\n\nf-string is short for\
    \ *formatted string literal*. f-strings are used for string interpolation, where\
    \ values are substituted into replacement fields within the f-string (with optional\
    \ formatting specifiers). The syntax for an f-string requires that it be prefixed\
    \ with the letter “f”, and replacement fields appear within curly braces. For\
    \ example, `f\"The secret number is {num}.\"` In this case, the replacement field\
    \ is `{num}`, and the string representation of the value associated with the identifier\
    \ `num` is substituted into the string. So, if we had `num = 42`, then this string\
    \ becomes “The secret number is 42.”\n\n## function\n\nIn Python, a *function*\
    \ is a named block of code which performs some task or returns some value. We\
    \ distinguish between the definition of a function, using the keyword `def`, and\
    \ calls to the function, which result in the function being executed and then\
    \ returning to the point at which it was called. Functions may have zero or more\
    \ formal parameters. Formal parameters receive arguments when the function is\
    \ called.\n\nAll Python functions return a value (the default, if there is no\
    \ explicit `return` statement, is for the function to return `None`).\n\nSee:\
    \ Chapter 5 Functions.\n\n## graph\n\nA *graph* consists of a set of vertices\
    \ and a set of edges. Trivially, the empty graph is one with no vertices and thus\
    \ no edges. A graph with two or more vertices may include edges (assuming we exclude\
    \ self-edges which is common). An edge connects two vertices.\n\nGraphs are widely\
    \ used in computer science to represent networks of all kinds as well as mathematical\
    \ and other objects.\n\n## graphical user interface\n\nA *graphical user interface*\
    \ (abbreviated GUI, which is pronounced “gooey”) is an interface with graphical\
    \ elements such as windows, buttons, scroll bars, input fields, and other fancy\
    \ doo-dads. These are distinguished from command line interfaces, which lack these\
    \ elements and are text based.\n\n## hashable\n\nDictionary keys must be *hashable*.\
    \ Internally, Python produces a hash (a number) corresponding to each key in a\
    \ dictionary and uses this to look up elements in the dictionary. In order for\
    \ this to work, such hashes must be stable—they may not change. Accordingly, Python\
    \ disallows the use of non-hashable objects as dictionary keys. This includes\
    \ mutable objects (lists, dictionaries) or immutable containers of mutable objects\
    \ (for example, a tuple containing a list). Most other objects are hashable: integers,\
    \ floats, strings, *etc*.\n\n## heterogeneous\n\n*Heterogeneous* means “of mixed\
    \ kind or type”. Python allows for heterogeneous lists or tuples, meaning that\
    \ these can contain objects of different types. For example, this is just fine\
    \ in Python: `['a', 42, False, [x], 101.9]`.\n\n## identifier\n\nAn *identifier*\
    \ is a name we give to an object in Python. For many types, we give a name by\
    \ assignment. Example:\n\n```\nx = 1234567\n```\n\ngives the value 1234567 the\
    \ name (identifier) `x`. This allows us to refer to the value 1234567 in our code\
    \ by its identifier, `x`.\n\n```\nprint(x)\nz = x // 100\n# etc\n```\n\nWe give\
    \ identifiers to functions using the `def` keyword.\n\n```\ndef successor(n):\n\
    \    return n + 1\n```\n\nNow this function has the identifier (name) `successor`.\n\
    \nFor restrictions on identifiers, see the Python documentation at [https://docs.python.org/3/reference/lexical_analysis.html](https://docs.python.org/3/reference/lexical_analysis.html)\
    \ (section 2.3. Identifiers and keywords).\n\n## immutable\n\nIf an object is\
    \ *immutable* it means that the object cannot be changed. In Python, `int`, `float`,\
    \ `str`, and `tuple` are all immutable types. It is true that we can reassign\
    \ a new value to a variable, but this is different from changing the value itself.\n\
    \n## import\n\nWe *import* a module for use in our own code by using Python's\
    \ `import` keyword. For example, if we wish to use the `math` module, we must\
    \ first import it thus:\n\n```\nimport math\n```\n\n## impure functions\n\n*Impure\
    \ functions* are functions with side effects. Side effects include reading from\
    \ or writing to the console, reading from or writing to a file, or mutating (changing)\
    \ a non-local variable. *Cf.*, pure function.\n\n## incremental development\n\n\
    Incremental development is a process whereby we write, and presumably test, our\
    \ programs in small increments.\n\n## index / indices\n\nAll sequences have indices\
    \ (the plural of index). To each element in the sequence, there corresponds an\
    \ index. We can use an index to access an individual element within a sequence.\
    \ For this we use square bracket notation (which is distinct from the syntax used\
    \ to create a list). For example, given the list\n\n```\n>>> lst = ['dog', 'cat',\
    \ 'gerbil']\n```\n\nwe can access individual elements by their index. Python is\
    \ (like the majority of programming languages) zero-indexed so indices start at\
    \ zero.\n\n```\n>>> lst[0]\n'dog'\n>>> lst[2]\n'gerbil'\n>>> lst[1]\n'cat'\n```\n\
    \nLists, being mutable, support indexed writes as well as indexed reads, so this\
    \ works:\n\n```\n>>> lst[2] = 'hamster'\n```\n\nBut this won't work with tuples\
    \ or strings (since they are immutable).\n\n## I/O\n\nI/O is short for input/output.\
    \ This may refer to console I/O, file I/O, or some other form of input and output.\n\
    \n## instance / instantiate\n\nAn instance is an object of a given type once created.\
    \ For example, 1 is an instance of an object of type int. More often, though,\
    \ we speak of instances as objects returned by a constructor. For example, when\
    \ using the csv module, we can instantiate CSV reader and writer objects by calling\
    \ the corresponding constructors, csv.reader() and csv.writer(). What are returned\
    \ by these constructors are instances of the corresponding type.\n\n## integrated\
    \ development environment (IDE)\n\nIntegrated development environments are convenient\
    \ (but not essential) tools for writing code. Rather than a mere text editor,\
    \ they provide syntax highlighting, hints, and other facilities for writing, testing,\
    \ debugging, and running code. Python provides its own IDE, called IDLE (integrated\
    \ development and learning environment) and there are many commercial or open\
    \ source IDEs: Thonny (worth a look if you're a beginner), JetBrains Fleet, JetBrains\
    \ PyCharm, Microsoft VS Code, and many others.\n\n## interactive mode\n\nInteractive\
    \ mode is what we're using when we're interacting at the Python shell. At the\
    \ shell, you'll see the Python prompt >>>. Work at the shell is not saved—so it's\
    \ suitable for experimenting but not for writing programs.\nCompare with script\
    \ mode, below.\n\n## interpolation\n\nIn this text, when we mention interpolation,\
    \ we're always talking about string interpolation (and not numeric interpolation\
    \ or frame interpolation).\nSee: string interpolation.\n\n## interpreter\n\nAn\
    \ interpreter is a program that executes some form of code without it first being\
    \ compiled into binary machine code. In Python, this is done by the Python interpreter,\
    \ which interprets bytecode produced by the Python compiler.\n\n## invoke (see:\
    \ call)\n\nInvoke is synonymous with call.\n\n## iterable / iterate\n\nAn iterable\
    \ object is one we may iterate, that is, it is an object which contains zero or\
    \ more elements, which are ordered and can be taken one at a time. A familiar\
    \ form of iteration is dealing from a deck of cards. The deck contains zero or\
    \ more elements (52 for a standard deck). The deck is ordered—which doesn't mean\
    \ the cards are sorted, it just means that each card has a unique position within\
    \ the deck (depending on how the deck is shuffled). If we were to turn over the\
    \ cards from the top of the deck one at a time, until there were no more cards\
    \ left, we'd have iterated over the deck. At the first iteration, we might turn\
    \ over the six of clubs. At the second iteration, we might turn over the nine\
    \ of diamonds. And so on. That's iterating an iterable.\nIterables in Python include\
    \ objects of type str, list, tuple, dict, range, and enumerate (there are others\
    \ as well). When we iterate these objects, we get one element at a time, in the\
    \ order they appear within"
  mdcn: "## 文件\n\n*文件*是文件系统中用于存储数据的组件。你编写的计算机程序以文件形式保存，你计算机上的所有其他文档、程序和其他资源也同样如此。文件包含在目录中。\n\
    \n## 浮点数\n\n*浮点数*是带有小数点的数字。它们的表示方式与整数不同。Python 有一种名为 `float` 的类型，用于表示浮点数。\n\n\
    ## 整除\n\n*整除*计算的是欧几里得商，或者，如果你愿意的话，是小于或等于浮点除法结果的最大整数。例如，`8 // 3` 的结果是 2，因为 2 是小于\
    \ 2.666...（即 `8 / 3` 的结果）的最大整数。\n\n## 取整函数\n\n取整函数返回小于或等于给定参数的最大整数。在数学符号中，我们写作\n\
    \n$$\\lfloor x \\rfloor$$\n\n例如，$\\lfloor 6.125 \\rfloor = 6$。\n\nPython 在 `math`\
    \ 模块中实现了此函数。示例：`math.floor(6.125)` 的结果是 6。\n\n## 流程图\n\n*流程图*是一种用于表示程序、函数、方法或其部分中可能的执行路径和控制流的工具。参见：第\
    \ 8 章 分支。\n\n## 格式说明符\n\n*格式说明符*用于 f-string 替换字段内，以指示插值内容应如何格式化，*例如*，指定浮点数的精度；将文本左对齐、右对齐或居中对齐，*等等*。格式说明符有一套完整的“迷你语言”。在替换字段中，格式说明符跟在插值表达式之后，用冒号分隔。格式说明符是可选的。\n\
    \n## 文件夹（参见：目录）\n\n*文件夹*与目录同义。\n\n## f-string\n\nf-string 是 *格式化字符串字面量* 的缩写。f-string\
    \ 用于字符串插值，其中值被替换到 f-string 内的替换字段中（带有可选的格式说明符）。f-string 的语法要求其以字母“f”为前缀，替换字段出现在花括号内。例如，`f\"\
    The secret number is {num}.\"`。在这个例子中，替换字段是 `{num}`，与标识符 `num` 关联的值的字符串表示被替换到字符串中。因此，如果我们有\
    \ `num = 42`，那么这个字符串就变成了“The secret number is 42.”\n\n## 函数\n\n在 Python 中，*函数*是一个命名的代码块，用于执行某些任务或返回某些值。我们区分函数的定义（使用关键字\
    \ `def`）和对函数的调用（导致函数被执行，然后返回到调用点）。函数可以有零个或多个形式参数。形式参数在函数被调用时接收实参。\n\n所有 Python\
    \ 函数都返回一个值（如果没有显式的 `return` 语句，默认情况下函数返回 `None`）。\n\n参见：第 5 章 函数。\n\n## 图\n\n\
    *图*由一组顶点和一组边组成。简单来说，空图是没有顶点因此也没有边的图。一个包含两个或更多顶点的图可能包含边（假设我们排除了常见的自环边）。一条边连接两个顶点。\n\
    \n图在计算机科学中被广泛用于表示各种网络以及数学和其他对象。\n\n## 图形用户界面\n\n*图形用户界面*（缩写为 GUI，发音为“gooey”）是一种包含图形元素（如窗口、按钮、滚动条、输入框和其他花哨小部件）的界面。这些与命令行界面不同，后者缺乏这些元素且基于文本。\n\
    \n## 可哈希\n\n字典的键必须是*可哈希的*。在内部，Python 为字典中的每个键生成一个哈希值（一个数字），并使用它来查找字典中的元素。为了使这能够工作，这样的哈希值必须是稳定的——它们不能改变。因此，Python\
    \ 禁止使用不可哈希的对象作为字典键。这包括可变对象（列表、字典）或包含可变对象的不可变容器（例如，包含列表的元组）。大多数其他对象是可哈希的：整数、浮点数、字符串，*等等*。\n\
    \n## 异构\n\n*异构*意味着“混合种类或类型”。Python 允许异构列表或元组，这意味着它们可以包含不同类型的对象。例如，这在 Python 中是完全没问题的：`['a',\
    \ 42, False, [x], 101.9]`。\n\n## 标识符\n\n*标识符*是我们给 Python 中对象起的名字。对于许多类型，我们通过赋值来命名。示例：\n\
    \n```\nx = 1234567\n```\n\n将值 1234567 赋予名称（标识符）`x`。这允许我们在代码中通过其标识符 `x` 来引用值 1234567。\n\
    \n```\nprint(x)\nz = x // 100\n# 等等\n```\n\n我们使用 `def` 关键字为函数赋予标识符。\n\n```\ndef\
    \ successor(n):\n    return n + 1\n```\n\n现在这个函数就有了标识符（名称）`successor`。\n\n关于标识符的限制，请参阅\
    \ Python 文档 [https://docs.python.org/3/reference/lexical_analysis.html](https://docs.python.org/3/reference/lexical_analysis.html)（第\
    \ 2.3 节 标识符和关键字）。\n\n## 不可变\n\n如果一个对象是*不可变的*，这意味着该对象不能被更改。在 Python 中，`int`、`float`、`str`\
    \ 和 `tuple` 都是不可变类型。确实，我们可以将一个新值重新赋给一个变量，但这与更改值本身是不同的。\n\n## 导入\n\n我们通过使用 Python\
    \ 的 `import` 关键字来*导入*模块以在我们自己的代码中使用。例如，如果我们希望使用 `math` 模块，我们必须首先这样导入它：\n\n```\n\
    import math\n```\n\n## 非纯函数\n\n*非纯函数*是具有副作用的函数。副作用包括从控制台读取或写入、从文件读取或写入，或修改（更改）非局部变量。*参见*，纯函数。\n\
    \n## 增量开发\n\n增量开发是一个过程，我们以小的增量编写并（大概）测试我们的程序。\n\n## 索引 / 索引（复数）\n\n所有序列都有索引（index\
    \ 的复数形式）。序列中的每个元素都对应一个索引。我们可以使用索引来访问序列中的单个元素。为此，我们使用方括号表示法（这与用于创建列表的语法不同）。例如，给定列表\n\
    \n```\n>>> lst = ['dog', 'cat', 'gerbil']\n```\n\n我们可以通过索引访问单个元素。Python（像大多数编程语言一样）是零索引的，所以索引从零开始。\n\
    \n```\n>>> lst[0]\n'dog'\n>>> lst[2]\n'gerbil'\n>>> lst[1]\n'cat'\n```\n\n列表是可变的，因此支持索引写入和索引读取，所以这样是可行的：\n\
    \n```\n>>> lst[2] = 'hamster'\n```\n\n但这对元组或字符串不起作用（因为它们是不可变的）。\n\n## I/O\n\n\
    I/O 是输入/输出的缩写。这可能指控制台 I/O、文件 I/O 或其他形式的输入和输出。\n\n## 实例 / 实例化\n\n实例是给定类型一旦创建后的对象。例如，1\
    \ 是 int 类型对象的一个实例。不过，我们更常将实例称为由构造函数返回的对象。例如，使用 csv 模块时，我们可以通过调用相应的构造函数 csv.reader()\
    \ 和 csv.writer() 来实例化 CSV 读取器和写入器对象。这些构造函数返回的是相应类型的实例。\n\n## 集成开发环境（IDE）\n\n集成开发环境是编写代码的便捷（但非必需）工具。它们不仅仅是文本编辑器，还提供语法高亮、提示以及其他用于编写、测试、调试和运行代码的功能。Python\
    \ 提供了自己的 IDE，称为 IDLE（集成开发和学习环境），还有许多商业或开源 IDE：Thonny（如果你是初学者，值得一看）、JetBrains Fleet、JetBrains\
    \ PyCharm、Microsoft VS Code 等等。\n\n## 交互模式\n\n交互模式是我们在 Python shell 中交互时使用的模式。在\
    \ shell 中，你会看到 Python 提示符 >>>。在 shell 中的工作不会被保存——因此它适合实验，但不适合编写程序。\n与下面的脚本模式进行比较。\n\
    \n## 插值\n\n在本文中，当我们提到插值时，我们总是指字符串插值（而不是数值插值或帧插值）。\n参见：字符串插值。\n\n## 解释器\n\n解释器是一种程序，它执行某种形式的代码，而无需先将其编译成二进制机器码。在\
    \ Python 中，这是由 Python 解释器完成的，它解释由 Python 编译器产生的字节码。\n\n## 调用（参见：调用）\n\n调用与调用同义。\n\
    \n## 可迭代 / 迭代\n\n可迭代对象是我们可以迭代的对象，也就是说，它是一个包含零个或多个元素的对象，这些元素是有序的，并且可以一次取一个。一个熟悉的迭代形式是从一副牌中发牌。这副牌包含零个或多个元素（标准牌有\
    \ 52 张）。这副牌是有序的——这并不意味着牌是排好序的，只是意味着每张牌在牌堆中都有一个唯一的位置（取决于牌堆是如何洗牌的）。如果我们从牌堆顶部一张一张地翻开牌，直到没有牌剩下，我们就已经迭代了这副牌。在第一次迭代中，我们可能翻开了梅花六。在第二次迭代中，我们可能翻开了方块九。以此类推。这就是迭代一个可迭代对象。\n\
    Python 中的可迭代对象包括 str、list、tuple、dict、range 和 enumerate 类型的对象（还有其他）。当我们迭代这些对象时，我们一次获得一个元素，按照它们在"
