    \ rate.\n5. The program displays the result.\n\nThis raises the question: how\
    \ do we express the exchange rate? One approach would be to express the rate as\
    \ the ratio of the value of the source currency unit to the target currency unit.\
    \ For example, as of this writing, one US dollar (USD) is equivalent to 1.3134\
    \ Canadian dollars (CAD).\n\nTaking this approach, we'll multiply the source currency\
    \ amount by the exchange rate to get the equivalent value in the target currency.\
    \ Here's how a session might proceed:\n\n```\nEnter source currency label: USD\n\
