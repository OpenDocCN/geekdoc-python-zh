    # Using `random.choice()` for a random walk


    The *random walk* is a process whereby we take steps along the number line in
    a positive or negative direction, at random.

    Starting at 0, and taking five steps, choosing -1 or +1 at random, a walk might
    proceed like this: 0, -1, 0, 1, 2, 1. At each step, we move one to the left (negative)
    or one to the right (positive). In a walk like this there are $2^n$ possible outcomes,
    where $n$ is the number of steps taken.

    Here''s a loop which implements such a walk:


    ```

    >>> position = 0

    >>> for _ in range(5):

    ...     position = position + random.choice([-1, 1])

    ...

    ```


