- md: "In a few places, items which are placeholders for actual values or variable\
    \ names are given in angle brackets, thus `<foo>`. For example, when describing\
    \ the three-argument syntax for the `range()` function, we might write `range(<start>,\
    \ <stop>, <stride>)` to indicate that three arguments must be supplied—the first\
    \ for the start value, the second for the stop value, and the last for the stride.\
    \ It's important to understand that the angle brackets are not part of the syntax,\
    \ but are merely a typographic convention to indicate where an appropriate substitution\
    \ must be made.\n\nAll of these conventions are in accord with the typographical\
    \ conventions used in the official Python documentation at python.org. Hopefully,\
    \ this will make it easier for students when they consult the official documentation.\n\
    \nNote that this use of angle brackets is a little different when it comes to\
    \ traceback messages printed when exceptions occur. There you may see things like\
    \ `<stdin>` and `<module>`, and in this context, they are not placeholders requiring\
    \ substitution by the user.\n\n## Other conventions\n\nWhen referring to functions,\
    \ whether built-in, from some imported module, or otherwise, without any other\
    \ context or specific problem instance, we write function identifiers along with\
    \ parentheses (as a visual indicator that we're speaking of a function) but without\
    \ formal parameters. Example: “The `range()` function accepts one, two, or three\
    \ arguments.” This should not be read as suggesting that `range()` takes no arguments.\n\
    \n## Entry point / top-level code environment\n\nAs noted in the text, unlike\
    \ many other languages such as C, C++, Java, etc., a function named `main()` has\
    \ *no special meaning in Python whatsoever*. The correct way to specify the entry\
    \ point of your code in Python is with\n\n```python\nif __name__ == '__main__':\n\
    \    # the rest of your code here\n```\n\nThis is explained fully in Chapter 9.\n\
    \nIn code samples in the book, we do, however, avoid using this *if there are\
    \ no function definitions included in the code*. We do this for space and conciseness\
    \ of the examples. The same could reasonably apply to your code. In most cases,\
    \ if there are no function definitions in your module, there's no need for this\
    \ `if` statement (though it's fine to include it). However, if there are any function\
    \ definitions in your module, then `if __name__ == '__main__':` is the correct,\
    \ Pythonic way to segregate your driver code from your function definitions.\n\
    \n## Origin of Python\n\nPython has been around a long time, with the first release\
    \ appearing in 1991 (four years before Java). It was invented by Guido van Rossum,\
    \ who is now officially Python's benevolent dictator for life (BDFL).\n\nPython\
    \ gets its name from the British comedy troupe *Monty Python's Flying Circus*\
    \ (Guido is a fan).\nNowadays, Python is one of the most widely used programming\
    \ languages on the planet and is supported by an immense ecosystem and thriving\
    \ community. See: [https://python.org/](https://python.org/) for more.\n\n## Python\
    \ version\n\nAs this book is written, the current version of Python is 3.11.4.\
    \ However, no new language features introduced since version 3.6 are presented\
    \ in this book (as most are not appropriate or even useful for beginners). This\
    \ book does cover f-strings, which were introduced in version 3.6. Accordingly,\
    \ if you have Python version 3.6–3.11, you should be able to follow along with\
    \ all code samples and exercises.\n\n## Using the Python documentation\n\nFor\
    \ beginners and experts alike, a language's documentation is an essential resource.\
    \ Accordingly, it's important that you know how to find and consult Python's online\
    \ documentation.\nThere are many resources available on the internet and the quality\
    \ of these resources varies from truly awful to superb. The online Python documentation\
    \ falls toward the good end of that spectrum.\n\n### Pros\n\n- Definitive and\
    \ up-to-date\n- Documentation for different versions clearly specified\n- Thorough\
    \ and accurate\n- Includes references for all standard libraries\n- Available\
    \ in multiple languages\n- Includes a comprehensive tutorial for Python beginners\n\
    - Coding examples (where given) conform to good Python style (PEP 8)\n\n### Cons\n\
    \n- Can be lengthy or technical—not always ideal for beginners\n- Don't always\
    \ appear at top of search engine results.\n\n## python.org\n\nOfficial Python\
    \ documentation, tutorials, and other resources are hosted at [https://python.org](https://python.org).\n\
    \n- Documentation: https://docs.python.org/3/\n- Tutorial: https://docs.python.org/3/tutorial/\n\
    - Beginner's Guide: https://wiki.python.org/moin/BeginnersGuide\n\nI recommend\
    \ these as the first place to check for online resources.\n\n> ⚠️ Warning\n\n\
    There's a lot of incorrect, dated, or otherwise questionable code on the internet.\
    \ Be careful when consulting sources other than official documentation.\n\n# Chapter\
    \ 2\n\n## Programming and the Python Shell\n\nOur objective for this chapter is\
    \ to lay the foundations for the rest of the course. If you've done any programming\
    \ before, some of this may seem familiar, but read carefully nonetheless. If you\
    \ haven't done any programming before that's OK.\n\n## Learning objectives\n\n\
    - You will learn how to interact with the Python interpreter using the *Python\
    \ shell*.\n- You will learn the difference between *interactive mode* (in the\
    \ shell) and *script mode* (writing, saving, and running programs).\n- You will\
    \ learn a little about computers, how they are structured, and that they use binary\
    \ code.\n- You will understand why we wish to write code in something other than\
    \ just zeros and ones, and you'll learn a little about how Python translates high-level\
    \ code (written by you, the programmer) into binary instructions that a computer\
    \ can execute.\n- You will write, save, and run your first Python program—an ordered\
    \ collection of statements and expressions.\n\n## Terms introduced\n\n- binary\
    \ code\n- bytecode\n- compilation *vs* interpretation\n- compiler\n- console\n\
    - integrated development environment (IDE)\n- interactive mode\n- low-level *vs*\
    \ high-level programming language\n- Python interpreter / shell\n- read-evaluate-print\
    \ loop (REPL)\n- semantics\n- script mode\n- syntax\n- terminal\n\n### 2.1 Why\
    \ learn a programming language?\n\nComputers are powerful tools. Computers can\
    \ perform all manner of tasks: communication, computation, managing and manipulating\
    \ data, modeling natural phenomena, and creating images, videos, and music, just\
    \ to name a few. However, computers don't read minds (yet), and thus we have to\
    \ provide instructions to computers so they can perform these tasks.\n\nComputers\
    \ don't speak natural languages (yet)—they only understand binary code. Binary\
    \ code is unreadable by humans.\n\nFor example, a portion of an executable program\
    \ might look like this (in binary):\n\n```\n0110101101101011 1100000000110101\
    \ 1011110100100100\n1010010100100100 0010100100010011 1110100100010101\n1110100100010101\
    \ 0001110110000000 1110000111100000\n0000100000000001 0100101101110100 0000001000101011\n\
    0010100101110000 0101001001001001 1010100110101000\n```\n\nThis is unintelligible.\
    \ It's bad enough to try to read it, and it would be even worse if we had to write\
    \ our computer programs in this fashion.\n\nComputers don't speak human language,\
    \ and humans don't speak computer language. That's a problem. The solution is\
    \ *programming languages*.\n\nProgramming languages allow us, as humans, to write\
    \ instructions in a form we can understand and reason about, and then have these\
    \ instructions converted into a form that a computer can read and execute.\n\n\
    There is a tremendous variety of programming languages. Some languages are *low-level*,\
    \ like assembly language, where there's roughly a one-to-one correspondence between\
    \ machine instructions and assembly language instructions. Here's a \"Hello World!\"\
    \ program in assembly language (for ARM64 architecture):¹\n\n```assembly\n.equ\
    \ STDOUT, 1\n.equ SVC_WRITE, 64\n.equ SVC_EXIT, 93\n\n.text\n.global _start\n\n\
    _start:\n    stp x29, x30, [sp, -16]!\n    mov x0, #STDOUT\n    ldr x1, =msg\n\
    \    mov x2, 13\n```\n\n> ¹Assembly language code sample from Rosetta Code: https://www.rosettacode.org/wiki/Hello_world"
  mdcn: "在一些地方，实际值或变量名的占位符会用尖括号表示，例如 `<foo>`。例如，在描述 `range()` 函数的三参数语法时，我们可能会写 `range(<start>,\
    \ <stop>, <stride>)`，以表示必须提供三个参数——第一个是起始值，第二个是停止值，最后一个是步长。重要的是要理解，尖括号不是语法的一部分，而仅仅是一种排版惯例，用于指示必须进行适当替换的位置。\n\
    \n所有这些惯例都与 python.org 上官方 Python 文档中使用的排版惯例一致。希望这能让学生在查阅官方文档时更容易。\n\n请注意，当涉及异常发生时打印的回溯消息时，这种尖括号的使用略有不同。在那里，你可能会看到类似\
    \ `<stdin>` 和 `<module>` 的内容，在这种情况下，它们不是需要用户替换的占位符。\n\n## 其他惯例\n\n在指代函数时，无论是内置函数、来自某个导入模块的函数，还是其他函数，在没有其他上下文或特定问题实例的情况下，我们写函数标识符时会带上括号（作为我们正在谈论函数的视觉指示），但不带形式参数。例如：“`range()`\
    \ 函数接受一个、两个或三个参数。”这不应被理解为暗示 `range()` 不接受任何参数。\n\n## 入口点 / 顶层代码环境\n\n如文中所述，与许多其他语言（如\
    \ C、C++、Java 等）不同，名为 `main()` 的函数在 Python 中*没有任何特殊意义*。在 Python 中指定代码入口点的正确方式是使用\n\
    \n```python\nif __name__ == '__main__':\n    # the rest of your code here\n```\n\
    \n这在第 9 章中有详细解释。\n\n然而，在本书的代码示例中，如果代码中*不包含任何函数定义*，我们会避免使用这个 *if*。我们这样做是为了节省空间并使示例简洁。同样的道理也适用于你的代码。在大多数情况下，如果你的模块中没有函数定义，就不需要这个\
    \ `if` 语句（尽管包含它也没问题）。但是，如果你的模块中有任何函数定义，那么 `if __name__ == '__main__':` 就是将驱动代码与函数定义分开的正确、符合\
    \ Python 风格的方式。\n\n## Python 的起源\n\nPython 已经存在很长时间了，第一个版本发布于 1991 年（比 Java 早四年）。它是由\
    \ Guido van Rossum 发明的，他现在正式担任 Python 的终身仁慈独裁者（BDFL）。\n\nPython 的名字来源于英国喜剧团体 *Monty\
    \ Python's Flying Circus*（Guido 是粉丝）。\n如今，Python 是地球上使用最广泛的编程语言之一，拥有庞大的生态系统和蓬勃发展的社区。更多信息请参见：[https://python.org/](https://python.org/)。\n\
    \n## Python 版本\n\n在撰写本书时，Python 的当前版本是 3.11.4。然而，本书不介绍自 3.6 版本以来引入的任何新语言特性（因为大多数对初学者来说不合适甚至无用）。本书确实涵盖了\
    \ f-strings，它是在 3.6 版本中引入的。因此，如果你使用的是 Python 3.6–3.11 版本，你应该能够跟上所有的代码示例和练习。\n\n\
    ## 使用 Python 文档\n\n对于初学者和专家来说，语言的文档都是必不可少的资源。因此，了解如何查找和查阅 Python 的在线文档非常重要。\n\
    互联网上有许多资源，这些资源的质量参差不齐，从非常糟糕到非常优秀。Python 的在线文档属于好的那一端。\n\n### 优点\n\n- 权威且最新\n-\
    \ 不同版本的文档明确指定\n- 全面且准确\n- 包含所有标准库的参考\n- 提供多种语言版本\n- 包含面向 Python 初学者的综合教程\n- 代码示例（如果提供）符合良好的\
    \ Python 风格（PEP 8）\n\n### 缺点\n\n- 可能冗长或技术性强——对初学者来说并不总是理想的选择。\n- 在搜索引擎结果中并不总是排在最前面。\n\
    \n## python.org\n\n官方的 Python 文档、教程和其他资源托管在 [https://python.org](https://python.org)。\n\
    \n- 文档：https://docs.python.org/3/\n- 教程：https://docs.python.org/3/tutorial/\n\
    - 初学者指南：https://wiki.python.org/moin/BeginnersGuide\n\n我建议将这些作为查找在线资源的首选。\n\n\
    > ⚠️ 警告\n\n互联网上有很多不正确、过时或有问题的代码。在查阅官方文档以外的来源时要小心。\n\n# 第 2 章\n\n## 编程与 Python\
    \ Shell\n\n本章的目标是为课程的其余部分奠定基础。如果你之前做过一些编程，其中一些内容可能看起来很熟悉，但无论如何请仔细阅读。如果你之前没有做过任何编程，那也没关系。\n\
    \n## 学习目标\n\n- 你将学习如何使用 *Python shell* 与 Python 解释器交互。\n- 你将了解 *交互模式*（在 shell\
    \ 中）和 *脚本模式*（编写、保存和运行程序）之间的区别。\n- 你将了解一些关于计算机的知识，它们的结构，以及它们使用二进制代码。\n- 你将理解为什么我们希望用零和一以外的东西来编写代码，并且你将了解一点\
    \ Python 如何将高级代码（由你，程序员编写）翻译成计算机可以执行的二进制指令。\n- 你将编写、保存并运行你的第一个 Python 程序——一个有序的语句和表达式集合。\n\
    \n## 引入的术语\n\n- 二进制代码\n- 字节码\n- 编译 *vs* 解释\n- 编译器\n- 控制台\n- 集成开发环境（IDE）\n- 交互模式\n\
    - 低级 *vs* 高级编程语言\n- Python 解释器 / shell\n- 读取-求值-打印循环（REPL）\n- 语义\n- 脚本模式\n- 语法\n\
    - 终端\n\n### 2.1 为什么要学习编程语言？\n\n计算机是强大的工具。计算机可以执行各种任务：通信、计算、管理和操作数据、建模自然现象以及创建图像、视频和音乐，仅举几例。然而，计算机还不能读取思想，因此我们必须向计算机提供指令，以便它们能够执行这些任务。\n\
    \n计算机还不能理解自然语言——它们只理解二进制代码。二进制代码对人类来说是不可读的。\n\n例如，一个可执行程序的一部分可能看起来像这样（二进制）：\n\n\
    ```\n0110101101101011 1100000000110101 1011110100100100\n1010010100100100 0010100100010011\
    \ 1110100100010101\n1110100100010101 0001110110000000 1110000111100000\n0000100000000001\
    \ 0100101101110100 0000001000101011\n0010100101110000 0101001001001001 1010100110101000\n\
    ```\n\n这是无法理解的。尝试阅读它已经够糟糕了，如果我们必须以这种方式编写计算机程序，那就更糟了。\n\n计算机不说人类语言，人类也不说计算机语言。这就是问题所在。解决方案是*编程语言*。\n\
    \n编程语言允许我们人类以一种我们可以理解和推理的形式编写指令，然后将这些指令转换成计算机可以读取和执行的形式。\n\n编程语言种类繁多。有些语言是*低级*的，比如汇编语言，机器指令和汇编语言指令之间大致是一一对应的。这是一个用汇编语言（针对\
    \ ARM64 架构）编写的 \"Hello World!\" 程序：¹\n\n```assembly\n.equ STDOUT, 1\n.equ SVC_WRITE,\
    \ 64\n.equ SVC_EXIT, 93\n\n.text\n.global _start\n\n_start:\n    stp x29, x30,\
    \ [sp, -16]!\n    mov x0, #STDOUT\n    ldr x1, =msg\n    mov x2, 13\n```\n\n>\
    \ ¹汇编语言代码示例来自 Rosetta Code：https://www.rosettacode.org/wiki/Hello_world"
