    \ bank_balance >= 20 and bank_balance < 50.0:\n```\n\n？因为只有当第一个条件为假时，我们才会到达 `elif`。没有必要再次检查。\n\
    \n所以，如果银行余额大于或等于20.00美元且小于50.00美元，我们就打印“从莱昂纳多那里订购披萨”。\n\n现在，如果银行余额大于或等于50.00美元呢？我们就打印“和朋友一起去威努斯基的Tiny\
    \ Thai餐厅！”。\n\n我们可以有一个单独的 `if` 语句，没有 `elif` 或 `else`。我们也可以，正如我们刚刚看到的，编写组合语句，将\
    \ `if` 和 `else`、`if` 和 `elif`，或者所有三个 `if`、`elif` 和 `else` 结合起来。我们将这种复合语句中的每个代码块称为*子句*（不同于复合布尔表达式中的子句）。\n\
    \n## 一些需要记住的重要事项\n\n1. 如果我们的程序中有一个复合的 if/else 语句，那么要么执行 `if` 子句的主体，要么执行 `else`\
    \ 子句的主体——永远不会两者都执行。\n2. 如果我们的程序中有一个复合的 if/elif/else 语句，那么只会执行其中一个分支的主体。\n\n##\
    \ 补充资源\n\n关于流程控制的更多信息，请参阅：[https://docs.python.org/3/tutorial/controlflow.html](https://docs.python.org/3/tutorial/controlflow.html)\n\
    \n## 8.5 真值与假值\n\nPython 允许在布尔表达式中使用许多快捷方式。Python 中的几乎所有东西都有一个真值。如前所述，我们用“真值”和“假值”这两个诙谐的术语来指代布尔值以外的任何东西的真值（我们也使用“真实性”和“虚假性”这些术语）。\n\
    \n当用于布尔表达式以及循环或分支（if/elif）的条件时，*真值*（或多或少）被视为 `True`，而*假值*（或多或少）被视为 `False`。\n\n\
    输入验证\n\n| 真值事物 | 假值事物 |\n| :--- | :--- |\n| 任何非零值的整数或浮点数，例如，5, -17, 3.1415 | 0,\
    \ 0.0 |\n| 任何非空列表，例如，['foo'], [0], ['a', 'b', 'c'] | 空列表，[] |\n| 任何非空元组，例如，(42.781,\
    \ -73.901), ('vladimir') | 空元组，() |\n| 任何非空字符串，例如，\"bluster\", \"kimchee\" | 空字符串，\"\
    \" |\n\n这允许我们使用如下条件：\n\n```python\nif x % 2:\n    # it's odd\n    print(f\"{x}\
    \ is odd\")\n\nif not s:\n    print(\"The string, s, is empty!\")\n```\n\n如果你想在\
    \ Python 中知道某样东西是真值还是假值，你可以尝试使用 `bool()` 方法将其转换为布尔值。\n\n```python\n>>> bool(1)\n\
    True\n>>> bool(-1)\nTrue\n>>> bool(0)\nFalse\n>>> bool('xyz')\nTrue\n>>> bool('')\n\
    False\n>>> bool(None)\nFalse\n```\n\n## 8.6 输入验证\n\n早些时候，我们编写了一个将千克转换为磅的 Python\
    \ 程序。我们信任用户为千克体重提供有效的整数或浮点数，并且我们没有做任何事情来确保提供的信息是合理的。也就是说，我们没有验证输入。\n\n输入验证是任何接受用户输入的程序的关键部分。用户有时会提供无效输入。造成这种情况的一些原因包括：\n\
    \n- 提示不够清晰。\n- 用户没有仔细阅读提示。\n- 用户不理解需要什么样的输入。\n- 用户在捣乱——试图破坏程序。\n- 用户在输入数据时出现了拼写错误或格式错误。\n\
