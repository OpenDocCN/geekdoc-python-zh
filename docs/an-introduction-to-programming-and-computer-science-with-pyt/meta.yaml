- md: "## 9.7 Rubberducking\n\n“Rubberducking”? What on Earth is “rubberducking”?\
    \ Don’t laugh: rubberducking is one of the most powerful debugging tools in the\
    \ known universe! Many programmers keep a little rubber duck handy on their desk,\
    \ in case of debugging emergencies.\n\nHere’s how it works. If you get stuck,\
    \ and cannot solve a particular problem or cannot fix a pesky bug you *talk to\
    \ the duck*. Now, rubber ducks aren’t terribly sophisticated, so you have to explain\
    \ things to them in the simplest possible terms. Explain your problem to the duck\
    \ using as little computer jargon as you can. Talk to your duck as if it were\
    \ an intelligent five-year-old. You’d be amazed at how many problems can be solved\
    \ this way!\n\nWhy does it work?\n\nFirst, by talking to your duck, you step outside\
    \ your code for a while. You’re talking about your code without having to type\
    \ at the keyboard, and without getting bogged down in the details of syntax. You’re\
    \ talking about what you think your code should be doing.\n\nSecond, your duck\
    \ will never judge you. It will remain silent while you do your best to explain.\
    \ Ducks are amazing listeners!\n\nIt’s very often the case that while you’re explaining\
    \ your troubles to the duck, or describing what you think your code *should* be\
    \ doing, that you reach a moment of realization. By talking through the problem\
    \ you arrive at a solution or you recognize where you went wrong.\n\n## What if\
    \ I don’t have a rubber duck?\n\nThat’s OK. Many other things can stand in for\
    \ a duck if need be. Do you have a stuffed animal? a figurine of any kind? a photograph\
    \ of a friend? a roommate with noise-cancelling headphones? Any of these can be\
    \ substituted for a duck if need be.\n\nThe important thing is that you take your\
    \ hands off the keyboard, and maybe even look away from your code, and describe\
    \ your problem in simple terms.\n\nTrust the process! It works!\n\n## 9.8 Exceptions\n\
    \n### AssertionError\n\nAs we’ve seen, if an assertion passes, code execution\
    \ continues normally. However, if an assertion fails, an `AssertionError` is raised.\
    \ This indicates that what has been asserted has evaluated to `False`.\n\nIf you\
    \ write an assertion, and when you test your code an `AssertionError` is raised,\
    \ then you should do two things:\n\n1.  Make sure that the assertion you’ve written\
    \ is correct. That is, you are asserting some condition is true when it should,\
    \ in fact, be true.\n2.  If you’ve verified that your assertion statement(s) are\
    \ correct, and an `AssertionError` continues to be raised, then it’s time to debug\
    \ your code. Continue updating and testing until the issue is resolved.\n\n##\
