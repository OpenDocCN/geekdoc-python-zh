  md: 'based on their position. The base is the first argument. The exponent is the
    second argument.


    Some functions allow for *keyword* arguments. Keyword arguments follow positional
    arguments, and are given a name when calling the function. For example, `print()`
    allows you to provide a keyword argument `end` which can be used to override the
    default behavior of `print()` which is to append a newline character, `\n`, with
    every call. Example:


    ```

    print("Cheese")

    print("Shop")

    ```


    prints "Cheese" and "Shop" on two different lines, because the default is to append
    that newline character. However...


    ```

    print("Cheese", end=" ")

    print("Shop")

    ```


    prints "Cheese Shop" on a single line (followed by a newline), because in the
    first call to `print()` the `end` keyword argument is supplied with one blank
    space, `" "`, and thus, no newline is appended. This is an example of a keyword
    argument.


    In the context of file input and output, we''ll use a similar keyword argument
    when working with CSV files (comma separated values).


    ```

    open(''my_data.csv'', newline='''')

    ```


    This allows us to avoid an annoying behavior in Python''s CSV module in some contexts.
    We''ll get into more detail on this soon, but for now, just be aware that we can,
    in certain cases, use keyword arguments where permitted, and that the syntax is
    as shown: positional arguments come first, followed by optional keyword arguments,
    with keyword arguments supplied in the form `keyword=value`. See: The `newline=''''`
    keyword argument, below.


    # 13.5 More on printing strings


    # Specifying the ending of printed strings


    By default, the `print()` function appends a newline character with each call.
    Since this is, by far, the most common behavior we desire when printing, this
    default makes good sense. However, there are times when we do not want this behavior,
    for example when printing strings that are terminated with newline characters
    (`''\n''`) as this would produce *two* newline characters at the end. This happens
    often when reading certain data from a file. In this case, and in others where
    we wish to override the default behavior of `print()`, we can supply the keyword
    argument, `end`. The `end` keyword argument specifies the character (or characters)
    if any, we wish to append to a printed string.'
