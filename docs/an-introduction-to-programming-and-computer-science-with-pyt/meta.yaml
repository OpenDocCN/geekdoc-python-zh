    FileNotFoundError: [Errno 2] No such file or directory:\n    'some_non-existent_file.foobar'\n\
    ```\n\nUsually we can fix this by supplying the correct filename or a complete\
    \ path to the file.\n\n## 13.8 Exercises\n\n### Exercise 01\n\nWrite a program\
