    \ - 2 = 3$，但 $5^2 - 2^2 = 25 - 4 = 21$。所以最后一步，取平方根，将结果恢复到适合数据的尺度。这就是我们计算标准差的方法。$^2$\n\
    \n在计算求和时，我们执行 $(x_i - \\mu)^2$ 的计算。因此，我们不能使用 `sum()`。相反，我们必须在循环中计算这个。然而，这并不是太复杂，在\
