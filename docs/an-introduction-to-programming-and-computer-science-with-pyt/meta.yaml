    This book has been written for use in University of Vermont’s CS1210 Introduction
    to Programming (formerly CS021). This is a semester long course which covers much
    of the basics of programming, and an introduction to some fundamental concepts
    in computer science. Not being happy with any of the available textbooks, I endeavored
    to write my own. Drafting began in August 2022, essentially writing a chapter
    a week over the course of the semester, delivered to students via UVM’s learning
    management system. The text was revised, edited, and expanded in the following
    semester.


    UVM’s CS1210 carries “QR” (quantitative reasoning) and “QD” (quantitative and
    data literacy) designations. Accordingly, there’s some mathematics included:


    - writing functions to perform calculations,

    - writing programs to generate interesting integer sequences,

    - demonstrating the connection between pure functions and mathematical functions,

    - demonstrating the connection between list indices and subscript notation,

    - demonstrating that summations are loops,


    and so on, to address the QR requirement. To address the QD requirement, we include
    some simple plotting with Matplotlib. Other aspects of these requirements are
    addressed in programming assignments, lab exercises, and lecture.


    Nevertheless, despite this book’s primary objective as instructional material
    for a specific course at UVM, others may find this material useful.


    –CC, July 2023


    ## Errata and suggestions


    I''m fully aware that this text isn''t quite “ready for prime time,” but, as it''s
    been said “time and tide wait for no one,” and a new semester approaches. So we
    push this unfinished work out of the nest, and hope for the best. If you have
    errata (which I''m certain are abundant) or suggestions, I''m all ears and I welcome
    your feedback—bouquets or brickbats or anything in between.


    ## Contact


    Clayton Cafiero

    The University of Vermont

    College of Engineering and Mathematical Sciences

    Department of Computer Science

    Innovation E309

    82 University Place

    Burlington, VT 05405-0125 (USA)


    cbcafier@uvm.edu

    https://www.uvm.edu/~cbcafier


    ## To the student


    Learning how to program is fun and rewarding, but it demands a rather different,
    structured approach to problem solving. This comes with time and practice. While
    I hope this book will help you learn how to solve problems with code, the only
    way to learn programming is by doing it. There’s more than a little trial and
    error involved. If you find yourself struggling, don’t despair—it just takes time
    and practice.


    You will make mistakes—that’s part of the process. As John Dewey once said “Failure
    is instructive. The person who really thinks learns quite as much from their failures
    as from their successes.”


    You’ll notice in this book that there are abundant examples given using the Python
    shell. The Python shell is a great way to experiment and deepen your understanding.
    I encourage you to follow along with the examples in the book, and enter them
    into the shell yourself. Unlike writing programs and then running them, interacting
    with the Python shell gives you immediate feedback. If you don’t understand something
    as well as you’d like, turn to the shell. Experiment there, and then go back to
    writing your program.


    If you take away only one thing from a first course in programming, it should
    not be the details of the syntax of the language. Rather, it should be an ability
    to *decompose* a problem into smaller units, to solve the smaller problems in
    code, and then to build up a complete solution from smaller subproblems. The primary
    vehicle for this approach is *functions*. So make sure you gain a firm grasp of
    functions (see in particular Chapter 5).


    Good luck and happy coding!


    ## Acknowledgements


    Thanks to my colleagues, students, and teaching assistants in the Department of
    Computer Science at the University of Vermont for motivation, encouragement, suggestions,
    feedback, and corrections. Without you, this book would not exist. Thanks to Chris
    Skalka for support and encouragement, for the opportunity to teach, and for luring
    me back to UVM. Thanks to Isaac Levy for stimulating conversations on Python,
    and for feedback on early drafts that he used in his own teaching. Thanks to Jackie
    Horton, particularly for helpful comments on Chapter 3. Thanks to Jim Eddy for
    helping me through my first semester of teaching CS1210 (back when it was CS021).
    Thanks to Sami Connolly for using a preliminary draft in her own teaching and
    providing feedback. Thanks to Lisa Dion for morning check-ins and many helpful
    suggestions. Thanks to Joan “Rosi” Rosebush for regular chocolate deliveries and
    a shoulder to cry on. Thanks to Harry Sharman for helping with much of the painstaking
    work of turning words into a book, and for contributing a few of the exercises
    and Appendix D. Thanks to Deborah Cafiero for proofreading and patience. Thanks
    to Jim Hefferon who has served as a role model without knowing it.


    Since the release of the first print edition, the following people have reported
    defects and provided corrections: Murat Güngör, Daniel Triplett, Anna Gale, Nina
    Holm, Colin Menuchi, Shiloh Chiu, Ted Pittman, Milan Chirag Shah, Andrew Slowman,
    Joey Donohue, Gale Stone, Darby Lane, Lillian Wyckoff, Angelique Macie, Alex Marshall,
    and Ryan Stailey. Thank you all.


    ![](img/c79d476b9b167832781fbb4257bb2cb9_13_0.png)


    # Chapter 1


    ## Introduction


    > Computer science is a science of abstraction—creating the right model for a
    problem and devising the appropriate mechanizable techniques to solve it.

    –Alfred V. Aho


    The goal of this book is to provide an introduction to computer programming with
    Python. This includes


    - functional decomposition and a structured approach to programming,

    - writing idiomatic Python,

    - understanding the importance of abstraction,

    - practical problem-solving exercises, and

    - a brief introduction to plotting with Matplotlib.


    When you get to know it, Python is a peculiar programming language.¹ Much of what’s
    peculiar about Python is concealed by its seemingly simple syntax. This is part
    of what makes Python a great first language—and it’s fun!


    ## Organization of this book


    The book is organized into chapters which roughly correspond to a week’s worth
    of material (with some deviations). Some chapters, particularly the first few,
    should be consumed at a rate of two a week. We present below a brief description
    of each chapter, followed by mention of some conventions used in the book.


    ## Programming and the Python shell


    This chapter provides some motivation for why programming languages are useful,
    and gives a general outline of how a program is executed by the Python interpreter.
    This chapter also introduces the two modes of using Python. The *interactive mode*
    allows the user to interact with the Python interpreter using the Python shell.
    Python statements and expressions are entered one at a time, and the interpreter
    evaluates or executes the code entered by the user. This is an essential tool
    for experimentation and learning the details of various language features. *Script
    mode* allows the user to write, save, and execute Python programs. This is convenient
    since in this mode we can save our work, and run it multiple times without having
    to type it again and again at the Python shell.


    This chapter also includes a brief introduction to binary numbers and binary arithmetic.


    ## Types and literals


    The concept of *type* is one of the most important in all computer science (indeed
    there''s an entire field called “type theory”).


    This chapter introduces the most commonly used Python types, though in some cases,
    complete presentation of a given type will come later in the text—lists and dictionaries,
    for example. Other types are introduced later in the text (e.g., function, range,
    enumerate, etc.). As types are introduced, examples of literals of each type are
    given.


    Since representation error is a common cause of bewilderment among beginners,
    there is some discussion of why this occurs with *float* objects.


    ## Variables, statements, and expressions


    This chapter introduces much of the machinery that will be used throughout the
    remainder of the text: variables, assignment, expressions, operators, and evaluation
    of expressions.


    On account of its broad applicability, a substantial account of modular arithmetic
    is presented as well.


    ## Functions


    Functions are the single most important concept a beginning programmer can acquire.
    *Functional decomposition* is a crucial requirement of writing reliable, robust,
    correct code.


    This chapter explains why we use functions, how functions are defined, how functions
    are called, and how values are returned. We''ve tried to keep this “non-technical”
    and so there''s no discussion of a call stack, though there is discussion of scope.


    Because beginning programmers often introduce side effects into functions where
    they are undesirable or unnecessary, this chapter makes clear the distinction
    between *pure* functions (those without side effects) and *impure* functions (those
    with side effects, including mutating mutable objects).


    Because the math module is so widely used and includes many useful functions,
    we introduce the math module in this chapter. In this way, we also reinforce the
    idea of information hiding and good functional design. Do we need to know how
    the math module implements its sqrt() function? Of course not. Should we have
    to know how a function is implemented


    ¹It’s not quite *sui generis*—Python is firmly rooted in the tradition of ALGOL-influenced
    programming languages.'
  mdcn: '## 前言


    本书是为佛蒙特大学CS1210编程导论课程（原CS021）编写的教材。这是一门为期一学期的课程，涵盖编程的大部分基础知识，并介绍计算机科学的一些基本概念。由于对现有教材均不满意，我决定亲自编写一本。初稿始于2022年8月，基本上在学期内每周撰写一章，通过UVM的学习管理系统分发给学生。文本在随后的学期中进行了修订、编辑和扩充。


    UVM的CS1210课程具有“QR”（定量推理）和“QD”（定量与数据素养）的指定要求。因此，教材中包含了一些数学内容：


    - 编写函数执行计算，

    - 编写程序生成有趣的整数序列，

    - 展示纯函数与数学函数之间的联系，

    - 展示列表索引与下标表示法之间的联系，

    - 展示求和即循环，


    等等，以满足QR要求。为满足QD要求，我们包含了一些使用Matplotlib的简单绘图。这些要求的其他方面则通过编程作业、实验练习和讲座来涵盖。


    尽管本书的主要目标是作为UVM特定课程的教学材料，但其他人也可能发现这些材料有用。


    –CC，2023年7月


    ## 勘误与建议


    我完全清楚本文尚未“完全准备好”，但正如俗话所说，“时光不等人”，新学期即将来临。因此，我们将这份未完成的作品推出，希望一切顺利。如果您发现勘误（我确信会有很多）或建议，我洗耳恭迎您的反馈——无论是赞扬、批评还是任何中间意见。


    ## 联系方式


    Clayton Cafiero

    佛蒙特大学

    工程与数学科学学院

    计算机科学系

    Innovation E309

    82 University Place

    Burlington, VT 05405-0125 (USA)


    cbcafier@uvm.edu

    https://www.uvm.edu/~cbcafier


    ## 致学生


    学习编程既有趣又有回报，但它需要一种相当不同的、结构化的问题解决方法。这需要时间和实践。虽然我希望本书能帮助你学习如何用代码解决问题，但学习编程的唯一方法就是动手实践。这其中包含大量的试错。如果你发现自己感到困难，不要绝望——这只需要时间和实践。


    你会犯错——这是过程的一部分。正如约翰·杜威所说：“失败是有教益的。真正思考的人从失败中学到的和从成功中学到的一样多。”


    你会注意到本书中有大量使用Python shell的示例。Python shell是进行实验和加深理解的好方法。我鼓励你跟随书中的示例，并自己在shell中输入它们。与编写程序然后运行它们不同，与Python
    shell交互会给你即时反馈。如果你对某些内容理解不够深入，可以转向shell。在那里进行实验，然后回去编写你的程序。


    如果从编程入门课程中只能学到一件事，那不应该是语言语法的细节。相反，它应该是一种将问题*分解*为更小单元、用代码解决这些小问题、然后从更小的子问题构建完整解决方案的能力。这种方法的主要载体是*函数*。因此，确保你牢固掌握函数（特别是参见第5章）。


    祝你好运，编程愉快！


    ## 致谢


    感谢佛蒙特大学计算机科学系的同事、学生和助教们提供的动力、鼓励、建议、反馈和修正。没有你们，这本书就不会存在。感谢Chris Skalka的支持和鼓励，感谢他提供的教学机会，以及将我引诱回UVM。感谢Isaac
    Levy关于Python的启发性对话，以及他对早期草稿的反馈，这些草稿他也在自己的教学中使用。感谢Jackie Horton，特别是对第3章的有益评论。感谢Jim
    Eddy帮助我度过教授CS1210的第一学期（当时还是CS021）。感谢Sami Connolly在她自己的教学中使用初步草稿并提供反馈。感谢Lisa Dion的晨间交流和许多有益的建议。感谢Joan
    “Rosi” Rosebush定期的巧克力供应和可以依靠的肩膀。感谢Harry Sharman帮助完成将文字转化为书籍的许多艰苦工作，并贡献了一些练习和附录D。感谢Deborah
    Cafiero的校对和耐心。感谢Jim Hefferon，他在不知情的情况下成为了榜样。


    自第一版印刷版发布以来，以下人员报告了缺陷并提供了修正：Murat Güngör、Daniel Triplett、Anna Gale、Nina Holm、Colin
    Menuchi、Shiloh Chiu、Ted Pittman、Milan Chirag Shah、Andrew Slowman、Joey Donohue、Gale
    Stone、Darby Lane、Lillian Wyckoff、Angelique Macie、Alex Marshall和Ryan Stailey。感谢你们所有人。


    ![](img/c79d476b9b167832781fbb4257bb2cb9_13_0.png)


    # 第1章


    ## 引言


    > 计算机科学是一门抽象的科学——为问题创建正确的模型，并设计适当的可机械化技术来解决它。

    –Alfred V. Aho


    本书的目标是提供使用Python进行计算机编程的入门介绍。这包括


    - 函数分解和结构化的编程方法，

    - 编写地道的Python代码，

    - 理解抽象的重要性，

    - 实际的问题解决练习，

    - 以及使用Matplotlib进行绘图的简要介绍。


    当你了解它时，Python是一种独特的编程语言。¹ Python的许多独特之处被其看似简单的语法所掩盖。这正是使Python成为一门优秀的入门语言的部分原因——而且它很有趣！


    ## 本书的组织结构


    本书按章节组织，大致对应一周的学习内容（有些偏差）。某些章节，特别是前几章，应以每周两章的速度学习。下面我们简要描述每一章，然后提及本书中使用的一些约定。


    ## 编程与Python shell


    本章提供了一些关于编程语言为何有用的动机，并概述了Python解释器如何执行程序。本章还介绍了使用Python的两种模式。*交互模式*允许用户使用Python
    shell与Python解释器交互。Python语句和表达式一次输入一个，解释器评估或执行用户输入的代码。这是实验和学习各种语言特性细节的基本工具。*脚本模式*允许用户编写、保存和执行Python程序。这很方便，因为在这种模式下我们可以保存工作，并多次运行它，而无需在Python
    shell中反复输入。


    本章还包括二进制数和二进制算术的简要介绍。


    ## 类型与字面量


    *类型*的概念是整个计算机科学中最重要的概念之一（实际上有一个完整的领域称为“类型理论”）。


    本章介绍了最常用的Python类型，尽管在某些情况下，对给定类型的完整介绍将在文本后面出现——例如列表和字典。其他类型在文本后面介绍（例如，函数、range、enumerate等）。在介绍类型时，会给出每种类型的字面量示例。


    由于表示错误是初学者常见的困惑原因，因此对*浮点*对象为何会发生这种情况进行了一些讨论。


    ## 变量、语句和表达式


    本章介绍了文本其余部分将使用的大部分机制：变量、赋值、表达式、运算符和表达式求值。


    由于其广泛的适用性，本章还详细介绍了模运算。


    ## 函数


    函数是初学者程序员可以掌握的最重要的概念。*函数分解*是编写可靠、健壮、正确代码的关键要求。


    本章解释了我们为什么使用函数、如何定义函数、如何调用函数以及如何返回值。我们试图保持“非技术性”，因此没有讨论调用栈，但讨论了作用域。


    由于初学者程序员经常在函数中引入不必要或不需要的副作用，本章明确了*纯*函数（无副作用）和*非纯*函数（有副作用，包括修改可变对象）之间的区别。


    由于math模块被广泛使用并包含许多有用的函数，我们在本章介绍math模块。这样，我们也强化了信息隐藏和良好函数设计的理念。我们需要知道math模块如何实现其sqrt()函数吗？当然不需要。我们应该知道一个函数是如何实现的吗？


    ¹它并非完全*独一无二*——Python牢固植根于受ALGOL影响的编程语言传统。'
