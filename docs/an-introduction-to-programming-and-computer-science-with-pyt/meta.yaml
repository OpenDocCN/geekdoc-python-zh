  mdcn: "## 6.4 名称（标识符）\n\n选择好的名称对于编写可读性强的代码至关重要。在定义变量、常量和函数时，请使用有意义的名称。这会使你的代码更易于阅读和调试！\n\
    \n好的变量名示例：\n\n- velocity\n- average_score\n- watts\n\n坏的变量名示例：\n\n- q\n- m7\n\
