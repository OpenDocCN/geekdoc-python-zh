  md: "Plot twist: In this case, we'd choose a condition that's *always* true, and\
    \ then only *break* out of the loop when we have a number in the desired range.\
    \ This is a common idiom in Python (and many other programming languages).\n\n\
    ```\nwhile True:\n    n = int(input(\"Pick a number from 1 to 10: \"))\n    if\
    \ 1 <= n <= 10:\n        break\n    print(\"Invalid input.\")\n\nif n == 7:\n\
    \    print(\"You have entered 7, \"\n          \"which is a very lucky number!\"\
    )\nelse:\n    print(f\"You have entered {n}. Good for you!\")\n```\n\nNotice what\
    \ we've done here: the *while* condition is the Boolean literal *True*. This can\
    \ *never* be false! So we have to have a way of exiting the loop. That's where\
    \ *break* comes in. *break* is a Python keyword which means \"break out of the\
    \ nearest enclosing loop.\" The *if* clause includes a condition which is only\
    \ true if the user's choice is in the desired range. Therefore, this loop will\
    \ execute indefinitely, until the user enters a number between one and 10.\n\n\
    As far as user experience goes, this is much more friendly than just terminating\
    \ the program immediately if the user doesn't follow instructions. Rather than\
    \ complaining and exiting, our program can ask again when it receives invalid\
    \ input.\n\n# A note of caution\n\nWhile the example above demonstrates a valid\
    \ use of *break*, *break* should be used sparingly. If there's a good way to write\
    \ a *while* loop without using *break* then you should do so! This often involves\
    \ careful consideration of *while* conditions—a worthwhile investment of your\
    \ time.\n\nIt's also considered bad form to include more than one *break* statement\
    \ within a loop. Again, please use *break* sparingly.\n\n# Other applications\
    \ of *while* loops\n\nWe'll see many other uses for the *while* loop, including\
    \ performing numeric calculations and reading data from a file.\n\n# Comprehension\
    \ check\n\n+   1. What is printed?\n\n```\n>>> c = 5\n>>> while c >= 0:\n... \
    \    print(c)\n...     c -= 1\n```"
