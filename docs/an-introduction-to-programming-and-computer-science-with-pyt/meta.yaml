    # 7.7 Format specifiers


    Let''s say the result of some calculation was 1/3. The decimal expansion of this
    is 0.333... Let''s print this.


    ```

    >>> 1 / 3

    0.3333333333333333

    ```


    Now, in this example, it''s unlikely that you''d need or want to display 0.3333333333333333
    to quite so many decimal places. Usually, it suffices to print fewer digits to
    the right of the decimal point, e.g., 0.33 or 0.3333. If we were to interpolate
    this value within an f-string, we''d get a similar result.


    ```

    >>> x = 1 / 3

    >>> f''{x}''

    ''0.3333333333333333''

    ```


    Fortunately, we can tell Python how many decimal places we wish to use. We can
    include a *format specifier* within our f-string.


    ```

    >>> x = 1 / 3

    >>> f''{x:.2f}''

    ''0.33''

    ```


    The syntax for this is to follow the interpolated element with a colon : and then
    a specifier for the desired format. In the example above, we used .2f meaning
    “display as a floating-point number to two decimal places precision”. Notice what
    happens here:


    ```

    >>> x = 2 / 3

    >>> f''{x:.2f}''

    ''0.67''

    ```


    Python has taken care of rounding for us, rounding the value 0.6666666666666666
    to two decimal places. Unless you have very specific reasons not to do so, you
    should use f-strings for formatting output. There are many format specifiers we
    can use. Here are a few:


    # Format a floating-point number as a percentage.


    ```

    >>> x = 2 / 3

    >>> f''{x:.2%}''

    ''66.67%''

    ```'
