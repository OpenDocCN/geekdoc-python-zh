    # Introduction


    > Computer science is a science of abstraction—creating the right model for a
    problem and devising the appropriate mechanizable techniques to solve it.

    –Alfred V. Aho


    The goal of this book is to provide an introduction to computer programming with
    Python. This includes


    +   - functional decomposition and a structured approach to programming,

    - writing idiomatic Python,

    - understanding the importance of abstraction,

    - practical problem-solving exercises, and

    - a brief introduction to plotting with Matplotlib.


    When you get to know it, Python is a peculiar programming language.¹ Much of what’s
    peculiar about Python is concealed by its seemingly simple syntax. This is part
    of what makes Python a great first language—and it’s fun!


    # Organization of this book


    The book is organized into chapters which roughly correspond to a week’s worth
    of material (with some deviations). Some chapters, particularly the first few,
    should be consumed at a rate of two a week. We present below a brief description
    of each chapter, followed by mention of some conventions used in the book.


    # Programming and the Python shell


    This chapter provides some motivation for why programming languages are useful,
    and gives a general outline of how a program is executed by the


    ¹It’s not quite *sui generis*—Python is firmly rooted in the tradition of ALGOL-influenced
    programming languages.'
