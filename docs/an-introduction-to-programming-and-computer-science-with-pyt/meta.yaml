    In order to determine whether n is even or odd, we''ll perform a simple test:
    We''ll calculate the remainder with respect to modulus two and compare this value
    to zero.⁵ If the comparison yields True then we know the remainder when dividing
    by two is zero and thus, n must be even. If the comparison yields False then we
    know the remainder is one and thus, n must be odd. (This assumes, of course, that
    the user has entered a valid integer.)


    Here''s what the flow chart for this program looks like:


    > ⁵Remember, if we have some integer n, then it must be the case that either n
    ≡ 0 mod 2 or n ≡ 1 mod 2. Those are the *only* possibilities.'
