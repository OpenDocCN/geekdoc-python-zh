    \n| 范围 | 范围内的预期比例 |\n| :--- | :--- |\n| $\\mu \\pm \\sigma$ | 68.2689% |\n| $\\\
    mu \\pm 2\\sigma$ | 95.4500% |\n| $\\mu \\pm 3\\sigma$ | 99.7300% |\n| $\\mu \\\
    pm 4\\sigma$ | 99.9937% |\n| $\\mu \\pm 5\\sigma$ | 99.9999% |\n\n当我们有现实世界的数据时，它通常不是完美的正态分布。通过将我们的数据与正态分布下的预期进行比较，我们可以学到很多东西。\n\
