    \ headings)\n    for row in reader:\n        data.append(float(row[1]))\n```\n\
    \nWe can write a function to calculate the mean. It's a simple one-liner.\n\n\
    ```\ndef mean(lst):\n    return sum(lst) / len(lst)\n```\n\nThat's a complete\
    \ implementation of the formula:\n\n$$\\mu = \\frac{1}{N} \\sum_{i=0}^{N-1} x_i$$\n\
    \nWe take all the $x_i$ and add them up (with `sum()`). Then we get the number\
    \ of elements in the set (with `len()`) and use this as the divisor. If we print\
    \ the result with `print(f\"{mean(data):.4f}\")` we get 5.1391.\n\nThat tells\
    \ us a little about the data set: on average (for the sample of countries included)\
    \ there are a little over five dentists per 10,000 population. If everyone were\
    \ to go to the dentist once a year, that would suggest, on average, that each\
    \ dentist serves a little less than 2,000 patients per year. With roughly 2,000\
    \ working hours in a year, that seems plausible. But the mean doesn't tell us\
    \ much more than that.\n\nTo get a better understanding of the data, it's helpful\
    \ to understand how values are distributed about the mean.\n\nLet's say we didn't\
    \ know anything about the distribution of values about the mean. It would be reasonable\
    \ for us to assume these values are *normally distributed*. There's a function\
    \ which describes the *normal distribution*, and you've likely seen the so-called\
    \ \"bell curve\" before.\n\n![](img/c79d476b9b167832781fbb4257bb2cb9_297_0.png)"
  - '[PAGE 298]


    On the $x$-axis are the values we might measure, and on the $y$-axis we have the
    probability of observing a particular value. In a normal distribution, the mean
    is the most likely value for an observation, and the greater the distance from
    the mean, the less likely a given value. The *standard deviation* tells us how
    spread out values are about the mean. If the standard deviation is large, we have
    a broad curve:


    ![](img/c79d476b9b167832781fbb4257bb2cb9_298_0.png)


    With a smaller standard deviation, we have a narrow curve with a higher peak.


    ![](img/c79d476b9b167832781fbb4257bb2cb9_298_1.png)


    The area under these curves is equal.'
  - '[PAGE 299]


    ![](img/c79d476b9b167832781fbb4257bb2cb9_299_0.png)


    If we had a standard deviation of zero, that would mean that every value in the
    data set is identical (that doesn’t happen often). The point is that the greater
    the standard deviation, the greater the variation there is in the data.


    Just like we can calculate the mean of our data, we can also calculate the standard
    deviation. The **standard deviation**, written $\sigma$, is given by


    ```

    $$\sigma = \frac{1}{N} \sqrt{\sum_{i=0}^{N-1} (x_i - \mu)^2}.$$

    ```


    Let’s unpack this. First, remember the goal of this measure is to tell us how
    much variation there is in the data. But variation with respect to what? Look
    at the expression $(x_i - \mu)^2$. We subtract the mean, $\mu$, from each value
    in the data set $x_i$. This tells us how far the value of a given observation
    is from the mean. But we care more about the distance from the mean rather than
    whether a given value is above or below the mean. That’s where the squaring comes
    in. When we square a positive number we get a positive number. When we square
    a negative number we get a positive number. So by squaring the difference between
    a given value and the mean, we’re eliminating the sign. Then, we divide the sum
    of these squared differences by the number of elements in the data set (just as
    we do when calculating the mean). Finally, we take the square root of the result.
    Why do we do this? Because by squaring the differences, we stretch them, changing
    the scale. For example, $5 - 2 = 3$, but $5^2 - 2^2 = 25 - 4 = 21$. So this last
    step, taking the square root, returns the result to a scale appropriate to the
    data. This is how we calculate standard deviation.$^2$


    As we calculate the summation, we perform the calculation $(x_i - \mu)^2$. On
    this account, we cannot use sum(). Instead, we must calculate this in a loop.
    However, this is not too terribly complicated, and implementing this in Python
    is left as an exercise for the reader.


    > $^2$Strictly speaking, this is the *population* standard deviation, and is used
    if the data set represents the entire universe of possible observations; rather
    than just a sample. There’s a slightly different formula for the *sample* standard
    deviation.'
  - "[PAGE 300]\n\nAssuming we have implemented this correctly, in a function named\
    \ `std_dev()`, if we apply this to the data and print with `print(f\"{std_dev(data):.4f}\"\
    )`, we get 4.6569.\n\nHow do we interpret this? Again, the standard deviation\
    \ tells us how spread out values are about the mean. Higher values mean that the\
    \ data are more spread out. Lower values mean that the data are more closely distributed\
    \ about the mean.\n\nWhat practical use is the standard deviation? There are many\
    \ uses, but it's commonly used to identify unusual or \"unlikely\" observations.\n\
    \nWe can calculate the area of some portion under the normal curve. Using this\
    \ fact, we know that given a normal distribution, we'd expect to find 68.26% of\
    \ observations within one standard deviation of the mean. We'd expect 95.45% of\
    \ observations within two standard deviations of the mean. Accordingly, the farther\
    \ from the mean, the less likely an observation. If we express this distance in\
    \ standard deviations, we can determine just how likely or unlikely an observation\
    \ might be (assuming a normal distribution). For example, an observation that's\
    \ more than five standard deviations from the mean would be very unlikely indeed.\n\
    \n| Range | Expected fraction in range |\n| :--- | :--- |\n| $\\mu \\pm \\sigma$\
    \ | 68.2689% |\n| $\\mu \\pm 2\\sigma$ | 95.4500% |\n| $\\mu \\pm 3\\sigma$ |\
    \ 99.7300% |\n| $\\mu \\pm 4\\sigma$ | 99.9937% |\n| $\\mu \\pm 5\\sigma$ | 99.9999%\
    \ |\n\nWhen we have real-world data, it's not often perfectly normally distributed.\
    \ By comparing our data with what would be expected if it were normally distributed\
    \ we can learn a great deal.\n\nReturning to our dentists example, we can look\
    \ for possible outliers by iterating through our data and finding any values that\
    \ are greater than two standard deviations from the mean.\n\n```\nm = mean(data)\n\
    std = std_dev(data)\n\noutliers = []\nfor datum in data:\n    if abs(datum) >\
    \ m + 2 * std:\n        outliers.append(datum)\n```\n\nIn doing so, we find two\
    \ possible outliers—14.81, 16.95—which correspond to Chile and Uruguay, respectively.\
    \ This might well lead us to ask, \"Why are there so many dentists per 10,000\
    \ population in these particular countries?\""
- md: "## 14.2 Python's statistics module\n\nWhile implementing standard deviation\
    \ (either for a sample or for an entire population) is straightforward in Python,\
    \ we don't often write functions like this ourselves (except when learning how\
    \ to write functions). Why? Because Python provides a statistics module for us.\n\
    \nWe can use Python's statistics module just like we do with the math module.\
    \ First we import the module, then we have access to all the functions (methods)\
    \ within the module.\n\nLet's start off using Python's functions for mean and\
    \ population standard deviation. These are statistics.mean() and statistics.pstdev(),\
    \ and they each take an iterable of numeric values as arguments.\n\n```python\n\
    import csv\nimport statistics\n\ndata = []\nwith open('dentists_per_10k.csv',\
    \ newline='') as fh:\n    reader = csv.reader(fh)\n    next(reader)  # skip the\
    \ first row\n    for row in reader:\n        data.append(float(row[1]))\n\nprint(f\"\
    {statistics.mean(data):.4f}\")\nprint(f\"{statistics.pstdev(data):.4f}\")\n```\n\
    \nWhen we run this, we see that the results for mean and standard deviation—5.1391\
    \ and 4.6569, respectively—are in perfect agreement with the results reported\
    \ above.\n\nThe statistics module comes with a great many functions including:\n\
    \n- mean()\n- median()\n- pstdev()\n- stdev()\n- quantiles()\n\namong others.\n\
    \n## Using the statistics module to calculate quantiles\n\nQuantiles divide a\
    \ data set into continuous intervals, with each interval having equal probability.\
    \ For example, if we divide our data set into quartiles (n = 4), then each quartile\
    \ represents 1/4 of the distribution. If we divide our data set into quintiles\
    \ (n = 5), then each quintile represents 1/5 of the distribution. If we divide\
    \ our data into percentiles (n = 100), then each percentile represents 1/100 of\
    \ the distribution.\n\nYou may have seen quantiles—specifically percentiles—before,\
    \ since these are often reported for standardized test scores. If your score was\
    \ in the 80th percentile, then you did better than 79% of others taking the test.\
    \ If your score was in the 95th percentile, then you're in the top 5% of all those\
    \ who took the test.\n\nLet's use the statistics module to find quintiles for\
    \ our dentists data (recall that quintiles divide the distribution into five parts).\n\
    \nIf we import csv and statistics and then read our data (as above), we can calculate\
    \ the values which divide the data into quintiles thus:\n\n```python\nquintiles\
    \ = statistics.quantiles(data, n=5)\nprint(quintiles)\n```\n\nNotice that we pass\
    \ the data to the function just as we did with mean() and pstdev(). Here we also\
    \ supply a keyword argument, n=5, to indicate we want quintiles. When we print\
    \ the result, we get\n\n```\n[0.274, 2.2359999999999998, 6.590000000000001, 8.826]\n\
    ```\n\nNotice we have *four* values, which divide the data into *five* equal parts.\
    \ Any value below 0.274 is in the first quintile. Values between 0.274 and 2.236\
    \ (rounding) are in the second quintile, and so on. Values above 8.826 are in\
    \ the fifth quintile.\n\nIf we check the value for the United States of America\
    \ (not shown in the table above), we find that the USA has 5.99 dentists per 10,000\
    \ population, which puts it squarely in the third quintile. Countries with more\
    \ than 8.826 dentists per 10,000—those in the top fifth—are Belgium (11.33), Chile\
    \ (14.81), Costa Rica (10.58), Israel (8.88), Lithuania (13.1), Norway (9.29),\
    \ Paraguay (12.81), and Uruguay (16.95). Of course, interpreting these results\
    \ is a complex matter, and results are no doubt influenced by *per capita* income,\
    \ number and size of accredited dental schools, regulations for licensure and\
    \ accreditation, and other infrastructure and economic factors.³\n\n## Other functions\
    \ in the **statistics** module\n\nI encourage you to experiment with these and\
    \ other functions in the statistics module. If you have a course in which you're\
    \ expected to calculate means, standard deviations, and the like, you might consider\
    \ doing away with your spreadsheet and trying this in Python!\n\n## 14.3 A brief\
    \ introduction to plotting with Matplotlib\n\nNow that we've seen how to read\
    \ data from a file, and how to generate some descriptive statistics for the data,\
    \ it makes sense that we should address visual presentation of data. For this\
    \ we will use a third-party⁴ module: Matplotlib.\n\nMatplotlib is a feature-rich\
    \ module for producing a wide array of graphs, plots, charts, images, and animations.\
    \ It is the *de facto* standard for visual presentation of data in Python (yes,\
    \ there are some other tools, but they're not nearly as widely used).\n\nSince\
    \ Matplotlib is not part of the Python core library (like the math, csv, and statistics\
    \ modules we've seen so far), we need to install Matplotlib before we can use\
    \ it.\n\nThe installation process for third-party Python modules is unlike installing\
    \ an app on your phone or desktop. Some IDEs (PyCharm, Thonny, VS Code, *etc.*)\
    \ have built-in facilities for installing such modules. IDLE (the Python-supplied\
    \ IDE) does not have such a facility. Accordingly, we won't get into the details\
    \ of installation here (since details will vary from OS to OS, machine to machine),\
    \ though if you're the DIY type and aren't using PyCharm, Thonny, or VS Code,\
    \ you may find *Appendix C: pip and venv* helpful.\n\nHere are some examples of\
    \ plots made with Matplotlib (from the Matplotlib gallery at matplotlib.org):\n\
    \n![](img/c79d476b9b167832781fbb4257bb2cb9_303_0.png)\n\n![](img/c79d476b9b167832781fbb4257bb2cb9_303_1.png)\n\
    \n![](img/c79d476b9b167832781fbb4257bb2cb9_304_0.png)\n\n![](img/c79d476b9b167832781fbb4257bb2cb9_304_1.png)\n\
    \n![](img/c79d476b9b167832781fbb4257bb2cb9_304_2.png)\n\nFor more examples and\
    \ complete (very well-written) documentation, visit https://matplotlib.org.\n\n\
    ## 14.4 The basics of Matplotlib\n\nWe're just going to cover the basics here.\
    \ Why? Because Matplotlib has thousands of features *and* it has excellent documentation.\
    \ So we're just going to dip a toe in the waters. For more, see:\n\n- Matplotlib\
    \ website: https://matplotlib.org\n- Getting started guide: https://matplotlib.org/stable/users/getting_started\n\
    - Documentation: https://matplotlib.org/stable/index.html\n- Quick reference guides\
    \ and handouts: https://matplotlib.org/cheatsheets\n\n## The most basic basics\n\
    \nWe'll start with perhaps the simplest interface provided by Matplotlib, called\
    \ pyplot. To use pyplot we usually import and abbreviate:\n\n```python\nimport\
    \ matplotlib.pyplot as plt\n```\n\nRenaming isn't required, but it is commonplace\
    \ (and this is how it's done in the Matplotlib documentation). We've seen this\
    \ syntax before—using as to give a name to an object without using the assignment\
    \ operator (=). It's very much like giving a name to a file object when using\
    \ the with context manager. Here we give matplotlib.pyplot a shorter name plt\
    \ so we can refer to it easily in our code. This is almost as if we'd written\n\
    \n```python\nimport matplotlib.pyplot\n\nplt = matplotlib.pyplot\n```\n\nAlmost.\n\
    \nNow let's generate some data to plot. We'll generate random numbers in the interval\
    \ (-1.0, 1.0).\n\n```python\nimport random\n\ndata = [0]\nfor _ in range(100):\n\
    \    data.append(data[-1]\n               + random.random()\n               *\
    \ random.choice([-1, 1]))\n```\n\nSo now we've got some random data to plot. Let's\
    \ plot it.\n\n```python\nplt.plot(data)\n```\n\nThat's pretty straightforward,\
    \ right?\n\nNow let's label our y axis.\n\n```python\nplt.ylabel('Random numbers\
    \ (cumulative)')\n```\n\nLet's put it all together and display our plot.\n\n```python\n\
    import random\nimport matplotlib.pyplot as plt\n\ndata = [0]\nfor _ in range(100):\n\
    \    data.append(data[-1]\n               + random.random()\n               *\
    \ random.choice([-1, 1]))\n\nplt.plot(data)\nplt.ylabel('Random numbers (cumulative)')\n\
    plt.show()\n```\n\n![](img/c79d476b9b167832781fbb4257bb2cb9_306_0.png)\n\nIt takes\
    \ only one more line to save our plot as an image file. We call the savefig()\
    \ method and provide the file name we'd like to use for our plot. The plot will\
    \ be saved in the current directory, with the name supplied.\n\n---\n³ I'm happy\
    \ with my dentist here in Vermont, but I will say she's booking appointments over\
    \ nine months in advance, so maybe a few more dentists in the USA wouldn't be\
    \ such a bad thing.\n⁴ i.e, not provided by Python or written by you"
  mdcn: "## 14.2 Python 的 statistics 模块\n\n虽然在 Python 中实现标准差（无论是样本标准差还是总体标准差）很简单，但我们通常不会自己编写这样的函数（除非是在学习如何编写函数）。为什么呢？因为\
    \ Python 为我们提供了 statistics 模块。\n\n我们可以像使用 math 模块一样使用 Python 的 statistics 模块。首先导入模块，然后就可以访问模块内的所有函数（方法）。\n\
    \n让我们从使用 Python 的函数计算均值和总体标准差开始。这些函数是 `statistics.mean()` 和 `statistics.pstdev()`，它们各自接受一个数值可迭代对象作为参数。\n\
    \n```python\nimport csv\nimport statistics\n\ndata = []\nwith open('dentists_per_10k.csv',\
    \ newline='') as fh:\n    reader = csv.reader(fh)\n    next(reader)  # skip the\
    \ first row\n    for row in reader:\n        data.append(float(row[1]))\n\nprint(f\"\
    {statistics.mean(data):.4f}\")\nprint(f\"{statistics.pstdev(data):.4f}\")\n```\n\
    \n运行这段代码，我们会看到均值和标准差的结果——分别为 5.1391 和 4.6569——与上面报告的结果完全一致。\n\nstatistics 模块包含许多函数，包括：\n\
    \n- `mean()`\n- `median()`\n- `pstdev()`\n- `stdev()`\n- `quantiles()`\n\n等等。\n\
    \n## 使用 statistics 模块计算分位数\n\n分位数将数据集划分为连续的区间，每个区间的概率相等。例如，如果我们将数据集划分为四分位数（n =\
    \ 4），那么每个四分位数代表分布的 1/4。如果我们将数据集划分为五分位数（n = 5），那么每个五分位数代表分布的 1/5。如果我们将数据划分为百分位数（n\
    \ = 100），那么每个百分位数代表分布的 1/100。\n\n你可能以前见过分位数——特别是百分位数——因为标准化考试成绩经常报告这些数据。如果你的分数在第\
    \ 80 百分位，那么你的成绩优于 79% 的其他考生。如果你的分数在第 95 百分位，那么你处于所有考生的前 5%。\n\n让我们使用 statistics\
    \ 模块来找出我们牙医数据的五分位数（回想一下，五分位数将分布分为五部分）。\n\n如果我们导入 csv 和 statistics，然后读取数据（如上所述），我们可以计算将数据划分为五分位数的值：\n\
