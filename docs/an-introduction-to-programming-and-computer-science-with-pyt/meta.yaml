    >>> a > b

    False

    >>> a < b

    True

    >>> a >= b

    False

    >>> a <= b

    True

    >>> a != b

    True

    >>> not (a == b)

    True

    ```


    这是怎么回事？当我们比较字符串时，我们是按*字典顺序*进行比较的。如果一个字符串的字典顺序低于另一个字符串，则它*小于*另一个字符串。如果一个字符串的字典顺序高于另一个字符串，则它*大于*另一个字符串。


