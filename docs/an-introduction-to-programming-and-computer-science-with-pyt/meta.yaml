    \  # this is A-OK\n2.0\n>>> math.sqrt(-1)\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nValueError: math domain error\n```\n\
    \nIn a case like this, you need to ensure that the argument or operand which is\
