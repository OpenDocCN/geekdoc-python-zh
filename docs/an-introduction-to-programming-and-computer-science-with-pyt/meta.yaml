  md: 'We can use `min()` and `max()` with strings. When we do, Python will compare
    characters (Unicode code points) within the string. In the case of `min()`, Python
    will return the character with the lowest-valued code point. In the case of `max()`,
    Python will return the character with the highest-valued code point.

    We can also use `len()` with strings. This returns the length of the string.


    ```

    >>> word = "omphaloskepsis"

    >>> max(word)

    ''s''

    >>> min(word)

    ''a''

    >>> len(word)

    14

    ```


    Recall that Unicode includes thousands of characters, so these work with more
