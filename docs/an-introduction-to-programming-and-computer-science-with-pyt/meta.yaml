    \ that leftover burrito.')\nelif bank_balance < 50.0:\n    print('Order pizza\
    \ from Leonardo\\'s')\nelse:\n    print('Go out to Tiny Thai in Winooski with\
    \ a friend!')\n```\n\nFirst we prompt the user for their bank balance. If this\
    \ amount is less than $20.00 then we prompt the user *again* to find out if they\
    \ have any meal points left. If they do, that is, if meal_points == 'y', we print\
    \ “Eat at the dining hall.” If not, we print “Eat that leftover burrito.”\n\n\
    Now, what happens if that very first condition is false? If that's false, we *know*\
    \ we have more than $20.00, so our next comparison is:\n\n```python\nelif bank_balance\
    \ < 50.0:\n```\n\nWhy not\n\n```python\nelif bank_balance >= 20 and bank_balance\
    \ < 50.0:\n```\n\nyou might ask? Because we only reach the `elif` if the first\
    \ condition is false. There’s no need to check again.\n\nSo if the bank balance\
    \ is greater than or equal to $20.00 and less than $50.00 we print “Order pizza\
    \ from Leonardo’s”.\n\nNow, what if the bank balance is greater than or equal\
    \ to $50.00? We print “Go out to Tiny Thai in Winooski with a friend!”.\n\nWe\
    \ can have a single `if` statement, without `elif` or `else`. We can also, as\
    \ we’ve just seen, write compound statements which combine `if` and `else`, `if`\
    \ and `elif`, or all three, `if`, `elif`, and `else`. We refer to each block of\
    \ code in such compound statements as *clauses* (distinct from clauses in a compound\
    \ Boolean expression).\n\n## Some important things to keep in mind\n\n1. If we\
    \ have a compound if/else statement in our program either the body of the `if`\
