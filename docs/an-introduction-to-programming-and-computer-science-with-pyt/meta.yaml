    ## Unicode


    Unicode is a widely-used standard for encoding symbols (letters, glyphs, and others).
    Python has provided full Unicode support since version 3.0, which was released
    in 2008. For purposes of this textbook, it should suffice that you understand
    that Python strings can contain letters, letters with diacritic marks (accents,
    umlauts, etc.), letters from different alphabets (from Cyrillic to Arabic to Thai),
    symbols from non-alphabetic writing systems (Chinese, Japanese, hieroglyphs, Cuneiform,
    Cherokee, Igbo), mathematical symbols, and a tremendous variety of bullets, arrows,
    icons, dingbats—even emojis!


    ## unpacking


    See: sequence unpacking.


    ## variable


    Answering the question, What is a variable? can get a little thorny. I think it''s
    most useful to think of a variable as a name bound to a value forming a pair—two
    things, tightly connected.


    Take the result of this assignment


    ```

    animal = ''porcupine''

    ```


    Is the variable just the name, animal? No. Is the variable just the value, ''porcupine''?
    No. It really is these two things together: a name attached to a value.


    Accordingly, we can speak of a variable as having a name and a value.

    What''s the name of this variable? animal.

    What''s the value of this variable? ''porcupine''.

    We sometimes speak of the type of a variable, and while names do not have types
    in Python, values do.


    ## vertex (graph)


    As noted elsewhere, a graph consists of a set of vertices (the plural of vertex),
    and a set of edges (which connect vertices).


    If we were to represent a highway map with a graph, the cities and towns would
    be represented by vertices, and the highways connecting them would be the edges
    of the graph.


    ## Appendix B


    ## Mathematical notation


    Note: What follows is *mathematical* notation used in this book, and should not
    be confused with language elements of Python.


    An *ellipsis*, ..., can be read as “and so on.” For example, 1, 2, 3, ..., 100
    denotes the list of all numbers from 1 to 100, and 1 + 2 + 3 + ··· + 100 denotes
    the sum of all integers from 1 to 100 (inclusive).


    Braces are used to denote *sets*, *e.g.*, {4, 12, 31} is the set containing the
    elements 4, 12, and 31.


    ∈ denotes *membership* in a set. For example, 4 ∈ {4, 12, 31}.


    ∉ is used to indicate that some object is *not* an element of some set. For example,
    7 ∉ {4, 12, 31}.


    ℕ denotes the set of all *natural numbers*, that is, 0, 1, 2, 3, ...


    ℤ denotes the set of all *integers*, that is, ... − 2, −1, 0, 1, 2, ...


    ℝ denotes the set of all *real numbers*. Unlike the integers, real numbers can
    be used to measure continuous quantities.


    Sometimes we describe a set by stating the properties that must hold for its members.
    In such cases, we use the vertical bar, |, which can be read “such that.” For
    example, {x ∈ ℝ | x ≥ 0} is the set of all real numbers greater than or equal
    to zero.


    ℚ is the set of all *rational numbers*, *i.e.*, ℚ = {a/b | a, b ∈ ℤ, b ≠ 0}.


    ≡ denotes *congruence*. We write a ≡ b (mod m) to indicate that a is congruent
    to b modulo m. For example, 5 ≡ 1 (mod 2), and 72 ≡ 18 (mod 9).


    ∘ is the *composition operator*. For example, f ∘ g is the composition of functions
    f and g. With this notation, composition is performed right-to-left, so it may
    be helpful to read f ∘ g as “f applied after g.”


    Square brackets denote *closed intervals*, the elements of the interval usually
    determined by context. For example, [0, 12] = {n ∈ ℤ | 0 ≤ n ≤ 12} and [π, 2π]
    = {x ∈ ℝ | π ≤ x ≤ 2π}.


    Subscripts are used to denote individual elements within a set or sequence. For
    example, $x_i$ is the $i$th element of the sequence $X$, and we call $i$ the *index*
    of the element. Note: In this text, indices start with 0.


    $\Sigma$ denotes a *summation*. For example, given the set $X = \{2, 9, 3, 5,
    1\}$, $\Sigma x_i$ is the sum of all elements of $X$, that is $2 + 9 + 3 + 5 +
    1 = 20$. Sometimes, an operation or operations are applied to the elements of
    a summation. For example, given the set $X = \{1, 2, 3\}$, $\Sigma x_i^2$ is the
    sum of the squares of all elements of $X$, that is $1^2 + 2^2 + 3^2 = 1 + 4 +
    9 = 14$.


    $\Pi$ (upper-case) denotes a *repeated product*. For example, given the set $X
    = \{2, 9, 3, 5, 1\}$, $\Pi x_i$ is the product of all elements of $X$, that is
    $2 \times 9 \times 3 \times 5 \times 1 = 270$.


    $\pi$ (lower-case) is a mathematical constant, the ratio of a circle''s circumference
    to its diameter. This is approximately equal to 3.141592653589793.


    In statistics, $\mu$ is used to denote the mean of a sample, population, or distribution.
    You may have seen $\bar{x}$ in other texts. These are different notations for
    the same thing.


    In statistics, $\sigma$ denotes the standard deviation of a sample, population,
    or distribution ($\sigma^2$ denotes the variance).


    $\pm$ denotes “plus or minus” e.g., $\mu \pm 2.5\sigma$ or $-b \pm \sqrt{b^2 -
    4ac}$.


    ## Appendix C


    ## pip and venv


    ## Introduction


    This covers creation of virtual environments and installing packages for use in
    your own projects. If you are using an IDE other than IDLE, chances are that your
    IDE has an interface for managing packages and virtual environments. The instructions
    that follow are intended more for people who are not using an IDE other than IDLE,
    or who are the DIY type, or simply those who are more interested in how Python
    and the Python ecosystem work. What follows is for users of Python version 3.4
    or later.


    ## PyPI, pip, and venv


    There is a huge repository of modules you can use in your own projects. This repository
    is called PyPI—the Python Package Index—and it’s hosted at [https://pypi.org/](https://pypi.org/).


    > The Python Package Index (PyPI) is a repository of software for the Python programming
    language.

    PyPI helps you find and install software developed and shared by the Python community.

    —From the PyPI website


    There you’ll find modules for just about anything—integration with cloud computing
    services, scientific computing, machine learning, accessing and reading web-based
    information, creating games, cryptography, and more. There are almost half a million
    projects hosted on PyPI. It’s often the case that we want to install packages
    hosted on PyPI, which do not ship with Python. Fortunately, there are tools that
    make this less challenging than it might be otherwise. Two of the most useful
    of these are pip and venv.


    pip is the package installer for Python. You can use this to install any packages
    listed on PyPI. pip will manage all dependencies for you. What are dependencies?
    It’s often the case that one package on PyPI requires another (sometimes dozens),
    and each of those might require other packages. pip takes care of all that for
    you. pip identifies all packages that might be needed for the package you request
    and will automatically download and install them, usually with a single command.


    The other tool presented here is venv. This is, perhaps, a little more abstract
    and can often confuse beginners, but in most cases it''s not too complicated.
    What venv does is create a virtual environment where you can install packages
    using pip. First, we''ll walk through the reasons behind virtual environments
    and how to create one using venv. Then we''ll see how to activate that virtual
    environment, install packages using pip, and start coding.


    Of course, you can follow the directions at https://packaging.python.org/en/latest/tutorials/installing-packages/#creating-and-using-virtual-environments
    and https://pip.pypa.io/en/stable/installation/, but if you want a somewhat more
    gentle introduction, read on.


    ## What the heck is a virtual environment and why do I want one?


    Depending on your operating system and operating system version, your computer
    may have come with Python installed, or Python may be installed to some protected
    location. Because of this, we don''t usually want to monkey with the OS-installed
    Python environment (in fact, doing so can break certain components of your OS).
    So installing packages to your OS-installed (or otherwise protected) Python environment
    is usually a bad idea. This is where virtual environments come in. With venv you
    can create an isolated Python environment for your own programming projects within
    which you can change Python versions, install and delete packages, etc., without
    ever touching your OS-installed Python environment.


    Another reason you might want to use venv is to isolate and control dependencies
    on a project-by-project basis. Say you''re collaborating with Jane on a new game
    written in Python. You both want to be able to run and test your code in the same
    environment. With venv, again, you can create a virtual environment just for that
