  md: 'When we made the assignment `copy_of_data = data` we assumed (quite reasonably)
    that we were making a copy of our data. It turns out this is not so. What we wound
    up with was *two names for the same underlying data structure*, `data` and `copy_of_data`.
    This is the way things work with mutable objects (like lists).<sup>3</sup>


    So how do we get a copy of our list? One way is to use the `.copy()` method.<sup>4</sup>
    This will return a copy of the list, so we have two different list instances.<sup>5</sup>


    ```

    >>> data = [4.2, 4.7, 3.1, 2.9, 8.5, 7.2, 6.1, 1.4, 1.9, 3.3]

    >>> copy_of_data = data.copy()   # call the copy method

    >>> data.sort()

    >>> data

    [1.4, 1.9, 2.9, 3.1, 3.3, 4.2, 4.7, 6.1, 7.2, 8.5]

    >>> copy_of_data

    [4.2, 4.7, 3.1, 2.9, 8.5, 7.2, 6.1, 1.4, 1.9, 3.3]

    ```


    # A neat trick to get the last element of a list


    Let''s say we have a list, and don''t know how many elements are in it. Let''s
    say we want the *last* element in the list. How might we go about it?


    We could take a brute force approach. Say our list is called `x`.


    ```

    >>> x[len(x) - 1]

    ```


    Let''s unpack that. Within the brackets we have the expression `len(x) - 1`. `len(x)`
    returns the number of elements in the list, and then we subtract 1 to adjust for
    zero-indexing (if we have *n* elements in a list, the index of the last element
    is *n* − 1). So that works, but it''s a little clunky. Fortunately, Python allows
    us to get the last element of a list with an index of -1.


    ```

    >>> x[-1]

    ```


    You may think of this as counting backward through the indices of the list.


