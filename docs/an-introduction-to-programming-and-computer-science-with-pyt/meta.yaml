    \n我们维护一个已访问城镇的列表，以及一个待访问城镇的队列。城镇列表和队列都是`list`类型。我们选择一个起点（这里选哪个都一样），并将其添加到已访问城镇列表和队列中。这就是我们的开始。\n\
