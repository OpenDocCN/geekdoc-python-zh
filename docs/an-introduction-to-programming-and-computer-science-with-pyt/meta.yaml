    \    for row in reader:\n        data.append(float(row[1]))\n```\n\nWe can write\
    \ a function to calculate the mean. It's a simple one-liner.\n\n```\ndef mean(lst):\n\
    \    return sum(lst) / len(lst)\n```\n\nThat's a complete implementation of the\
    \ formula:\n\n$$\\mu = \\frac{1}{N} \\sum_{i=0}^{N-1} x_i$$\n\nWe take all the\
    \ $x_i$ and add them up (with `sum()`). Then we get the number of elements in\
    \ the set (with `len()`) and use this as the divisor. If we print the result with\
    \ `print(f\"{mean(data):.4f}\")` we get 5.1391.\n\nThat tells us a little about\
    \ the data set: on average (for the sample of countries included) there are a\
    \ little over five dentists per 10,000 population. If everyone were to go to the\
    \ dentist once a year, that would suggest, on average, that each dentist serves\
    \ a little less than 2,000 patients per year. With roughly 2,000 working hours\
    \ in a year, that seems plausible. But the mean doesn't tell us much more than\
    \ that.\n\nTo get a better understanding of the data, it's helpful to understand\
    \ how values are distributed about the mean.\n\nLet's say we didn't know anything\
    \ about the distribution of values about the mean. It would be reasonable for\
    \ us to assume these values are *normally distributed*. There's a function which\
    \ describes the *normal distribution*, and you've likely seen the so-called \"\
    bell curve\" before.\n\n![](img/c79d476b9b167832781fbb4257bb2cb9_297_0.png)"
