- md: "Enter a number: 17\n17.0 squared is 289.0\n\nAgain, this works, but it's not\
    \ a particularly elegant solution. If you were to think “there must be a better\
    \ way” you'd be right!\n\n## 7.6 Python f-strings and string interpolation\n\n\
    The approach described above is valid Python, but there's a better way. Earlier\
    \ versions of Python offered a form of *string interpolation* borrowed from the\
    \ C programming language and the string `format()` function (neither of which\
    \ are presented here). These are still available, but are largely superseded.\
    \ With Python 3.6 came *f-strings*.<sup>1</sup>\n\nf-strings provide an improved\
    \ approach to string interpolation. They are, essentially, template strings with\
    \ placeholders for values we wish to interpolate into the string.\n\nAn f-string\
    \ is prefixed with the letter `f`, thus:\n\n```\nf'I am an f-string, albeit a\
    \ boring one.'\n```\n\nThe prefix tells the Python interpreter that this is an\
    \ f-string.\n\nWithin the f-string, we can include names of objects or expressions\
    \ we wish to interpolate within curly braces (these are called *replacement fields*).\
    \ For example,\n\n```\n>>> name = 'Carol'\n>>> f'My name is {name}.'\nMy name\
    \ is Carol.\n>>> favorite_number = 498\n>>> f'My favorite number is {favorite_number}.'\n\
    My favorite number is 498.\n>>> f'My favorite number is {400 + 90 + 8}.'\nMy favorite\
    \ number is 498.\n```\n\nHere's how we'd solve our earlier problem above using\
    \ f-strings.\n\n```\n\"\"\"A program to square a number provided by the user\n\
    and display the result. \"\"\"\n\nx = input(\"Enter a number: \")\nx = float(x)\n\
    result = x * x\nprint(f'{x} squared is {result}')\n```\n\n> <sup>1</sup>“F-string”\
    \ is short for “formatted string literal”. These were introduced in Python 3.6.\
    \ For details, see the *Input and Output* section of the official Python tutorial\
    \ (https://docs.python.org/3/tutorial/inputoutput.html#formatted-string-literals),\
    \ and PEP 498 (https://peps.python.org/pep-0498/) for a complete rationale behind\
    \ literal string interpolation.\n\n## 7.7 Format specifiers\n\nLet's say the result\
    \ of some calculation was 1/3. The decimal expansion of this is 0.333... Let's\
    \ print this.\n\n```\n>>> 1 / 3\n0.3333333333333333\n```\n\nNow, in this example,\
    \ it's unlikely that you'd need or want to display 0.3333333333333333 to quite\
    \ so many decimal places. Usually, it suffices to print fewer digits to the right\
    \ of the decimal point, e.g., 0.33 or 0.3333. If we were to interpolate this value\
    \ within an f-string, we'd get a similar result.\n\n```\n>>> x = 1 / 3\n>>> f'{x}'\n\
    '0.3333333333333333'\n```\n\nFortunately, we can tell Python how many decimal\
    \ places we wish to use. We can include a *format specifier* within our f-string.\n\
    \n```\n>>> x = 1 / 3\n>>> f'{x:.2f}'\n'0.33'\n```\n\nThe syntax for this is to\
    \ follow the interpolated element with a colon : and then a specifier for the\
    \ desired format. In the example above, we used .2f meaning “display as a floating-point\
    \ number to two decimal places precision”. Notice what happens here:\n\n```\n\
    >>> x = 2 / 3\n>>> f'{x:.2f}'\n'0.67'\n```\n\nPython has taken care of rounding\
    \ for us, rounding the value 0.6666666666666666 to two decimal places. Unless\
    \ you have very specific reasons not to do so, you should use f-strings for formatting\
    \ output. There are many format specifiers we can use. Here are a few:\n\n###\
    \ Format a floating-point number as a percentage.\n\n```\n>>> x = 2 / 3\n>>> f'{x:.2%}'\n\
    '66.67%'\n```\n\n### Format an integer with comma-separated thousands\n\n```\n\
    >>> x = 1234567890\n>>> f'{x:,}'\n'1,234,567,890'\n```\n\n### Format a floating-point\
    \ number with comma-separated thousands\n\n```\n>>> gdp = 22996100000000  # USA\
    \ gross domestic product\n>>> population = 331893745  # USA population, 2021 est.\n\
    >>> gdp_per_capita = gdp / population\n>>> f'${gdp_per_capita:,.2f}'\n'$69,287.54'\n\
    ```\n\n## 7.8 Scientific notation\n\nUsing E as a format specifier will result\
    \ in *normalized* scientific notation.\n\n```\n>>> x = 1234567890\n>>> f\"{x:.4E}\"\
    \n'1.2346E+09'\n```\n\n## 7.9 Formatting tables\n\nIt's not uncommon that we wish\
    \ to print data or results of calculations in tabular form. For this, we need\
    \ to be able to specify *width* of a field or column, and the *alignment* of a\
    \ field or column. For example, say we wanted to print a table like this:²\n\n\
    | Country | GDP ($ billion) | Population (million) | GDP per capita ($) |\n|---|---|---|---|\n\
    | Chad | 11.780 | 16.818 | 700 |\n| Chile | 317.059 | 19.768 | 16,039 |\n| China\
    \ | 17,734.063 | 1,412.600 | 12,554 |\n| Colombia | 314.323 | 51.049 | 6,157 |\n\
    \nWe'd want to left-align the \"Country\" column, and right-align numbers (numbers,\
    \ in almost all cases should be right-aligned, and if the decimal point is displayed,\
    \ all decimal points should be aligned vertically). Let's see how to do that with\
    \ f-strings and format specifiers. We'll start with the column headings.\n\n²Sources:\
    \ 2021 GDP from World Bank (https://data.worldbank.org/); 2021 population from\
    \ the United Nations (https://www.un.org/development/desa/pd/).\n\n```\nprint(f'{\"\
    \":<12}'\n      f'{\"GDP\":>16}'\n      f'{\"Population\":>16}'\n      f'{\"GDP\
    \ per\":>16}')\nprint(f'{\"Country\":<12}'\n      f'{\"($ billion)\":>16}'\n \
    \     f'{\"(million)\":>16}'\n      f'{\"capita ($)\":>16}')\n```\n\nThis would\
    \ have been a little long as two single lines, so it's been split into multiple\
    \ lines.³ This prints the column headings:\n\nGDP Population GDP per\nCountry\
    \ ($ billion) (million) capita ($)\n\n< is used for left-alignment (it points\
    \ left). > is used for right-alignment (it points right). The numbers in the format\
    \ specifiers (above) designate the width of the field (or column), so the country\
    \ column is 12 characters wide, GDP column is 16 characters wide, *etc.*\n\nNow\
    \ let's see about a horizontal rule, dividing the column headings from the data.\
    \ For that we can use repeated concatenation.\n\n```\nprint('-' * 60)  # prints\
    \ 60 hyphens\n```\n\nSo now we have\n\n```\nprint(f'{\"\":<12}'\n      f'{\"GDP\"\
    :>16}'\n      f'{\"Population\":>16}'\n      f'{\"GDP per\":>16}')\nprint(f'{\"\
    Country\":<12}'\n      f'{\"($ billion)\":>16}'\n      f'{\"(million)\":>16}'\n\
    \      f'{\"capita ($)\":>16}')\nprint('-' * 60)\n```\n\nwhich prints:\n\nGDP\
    \ Population GDP per\nCountry ($ billion) (million) capita ($)\n------------------------------------------------------------\n\
    \nNow we need to handle the data. Let's say we have the data in this form:\n\n\
    ³This takes advantage of the fact that when Python sees two strings without an\
    \ operator between them it will concatenate them automatically. Don't do this\
    \ just to save keystrokes. It's best to reserve this feature for handling long\
    \ lines or building long strings across multiple lines.\n\n```\ngdp_chad = 11.780\n\
    gdp_chile = 317.059\ngdp_china = 17734.063\ngdp_colombia = 314.323\npop_chad =\
    \ 16.818\npop_chile = 19.768\npop_china = 1412.600\npop_colombia = 51.049\n```\n\
    \n(Yeah. This is a little clunky. We'll learn better ways to handle data later.)\
    \ We could print the rows in our table like this:\n\n```\nprint(f'{\"Chad\":<12}'\n\
    \      f'{gdp_chad:>16,.3f}'\n      f'{pop_chad:>16,.3f}'\n      f'{gdp_chad /\
    \ pop_chad * 1000:>16,.0f}')\n\nprint(f'{\"Chile\":<12}'\n      f'{gdp_chile:>16,.3f}'\n\
    \      f'{pop_chile:>16,.3f}'\n      f'{gdp_chile / pop_chile * 1000:>16,.0f}')\n\
    \nprint(f'{\"China\":<12}'\n      f'{gdp_china:>16,.3f}'\n      f'{pop_china:>16,.3f}'\n\
    \      f'{gdp_china / pop_china * 1000:>16,.0f}')\n\nprint(f'{\"Colombia\":<12}'\n\
    \      f'{gdp_colombia:>16,.3f}'\n      f'{pop_colombia:>16,.3f}'\n      f'{gdp_colombia\
    \ / pop_colombia * 1000:>16,.0f}')\n```\n\n(Yeah. This is a little clunky too.\
    \ We'll see better ways soon.) Notice that we can combine format specifiers, so\
    \ for values in the GDP column we have a format specifier\n\n```\n>16,.3f\n```\n\
    \nThe first symbol > indicates that the column should be right-aligned. The 16\
    \ indicates the width of the column. The , indicates that we should use a comma\
    \ as a thousands separator. .3f indicates formatting as a floating point number,\
    \ with three decimal places of precision. Other format specifiers are similar.\n\
    \nPutting it all together we have:\n\n```\ngdp_chad = 11.780\ngdp_chile = 317.059\n\
    gdp_china = 17734.063\ngdp_colombia = 314.323\npop_chad = 16.818\npop_chile =\
    \ 19.768\npop_china = 1412.600\npop_colombia = 51.049\n\nprint(f'{\"\":<12}'\n\
    \      f'{\"GDP\":>16}'\n      f'{\"Population\":>16}'\n      f'{\"GDP per\":>16}')\n\
    print(f'{\"Country\":<12}'\n      f'{\"($ billion)\":>16}'\n      f'{\"(million)\"\
    :>16}'\n      f'{\"capita ($)\":>16}')\nprint('-' * 60)\n\nprint(f'{\"Chad\":<12}'\n\
    \      f'{gdp_chad:>16,.3f}'\n      f'{pop_chad:>16,.3f}'\n      f'{gdp_chad /\
    \ pop_chad * 1000:>16,.0f}')\n\nprint(f'{\"Chile\":<12}'\n      f'{gdp_chile:>16,.3f}'\n\
    \      f'{pop_chile:>16,.3f}'\n      f'{gdp_chile / pop_chile * 1000:>16,.0f}')\n\
    \nprint(f'{\"China\":<12}'\n      f'{gdp_china:>16,.3f}'\n      f'{pop_china:>16,.3f}'\n\
    \      f'{gdp_china / pop_china * 1000:>16,.0f}')\n\nprint(f'{\"Colombia\":<12}'\n\
    \      f'{gdp_colombia:>16,.3f}'\n      f'{pop_colombia:>16,.3f}'\n      f'{gdp_colombia\
    \ / pop_colombia * 1000:>16,.0f}')\n```\n\nwhich prints:\n\n| Country | GDP ($\
