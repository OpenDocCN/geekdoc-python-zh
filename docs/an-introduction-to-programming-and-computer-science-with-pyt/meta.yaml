    Let''s use the statistics module to find quintiles for our dentists data (recall
    that quintiles divide the distribution into five parts).


    If we import csv and statistics and then read our data (as above), we can calculate
    the values which divide the data into quintiles thus:


    ```

    quintiles = statistics.quantiles(data, n=5)

    print(quintiles)

    ```


    Notice that we pass the data to the function just as we did with mean() and pstdev().
    Here we also supply a keyword argument, n=5, to indicate we want quintiles. When
    we print the result, we get


    ```

    [0.274, 2.2359999999999998, 6.590000000000001, 8.826]

    ```


    Notice we have *four* values, which divide the data into *five* equal parts. Any
    value below 0.274 is in the first quintile. Values between 0.274 and 0.236 (rounding)
    are in the second quartile, and so on. Values above 8.826 are in the fifth quintile.


    If we check the value for the United States of America (not shown in the table
    above), we find that the USA has 5.99 dentists per 10,000 population, which puts
    it squarely in the third quartile. Countries with more than 8.826 dentists per
    10,000—those in the top fifth—are Belgium (11.33), Chile (14.81), Costa Rica (10.58),
    Israel (8.88), Lithuania (13.1), Norway (9.29), Paraguay (12.81), and Uruguay
    (16.95). Of course, interpreting these results is a complex matter, and results
