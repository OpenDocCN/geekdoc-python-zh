    you can free your brain to solve problems—that''s the fun part.


    Every language has its conventions, and you should stick to them. This is part
    of writing readable, idiomatic code.


    # 6.2 PEP 8


    Fortunately, there is a long-standing, comprehensive style guide for Python called
    PEP 8.<sup>2</sup> The entire style guide *PEP 8 – Style Guide for Python Code*
    is available online.<sup>3</sup> Noted Python developer Kenneth Reitz has made
    a somewhat prettified version at [https://pep8.org/](https://pep8.org/). You should
    consult these resources for a complete guide to good style for Python. Many projects
    in industry and in the open source world enforce the use of this standard.


    Don''t think in terms of saving keystrokes—follow the style guide, and you''ll
    find this helps you (and others!) read and understand what you write.


    # 6.3 Whitespace


    Yes! Whitespace is important! Using whitespace correctly can make your code *much*
    more readable.


    Use whitespace between operators and after commas.<sup>4</sup> Example:


    ```

    # Don''t do this


    x=3.4*y+9-17/2


    joules=(kg*m**2)/(sec**2)


    amount=priceperitem*items

    ```


    Instead, do this:


    <sup>1</sup> [https://google.github.io/styleguide/pyguide.html](https://google.github.io/styleguide/pyguide.html)

    <sup>2</sup> PEP is short for Python Enhancement Proposal

    <sup>3</sup> [https://peps.python.org/pep-0008/](https://peps.python.org/pep-0008/)

    <sup>4</sup> One exception to this rule is keyword arguments in function calls,
    *e.g.*, the end keyword argument for the built-in print() function.'
