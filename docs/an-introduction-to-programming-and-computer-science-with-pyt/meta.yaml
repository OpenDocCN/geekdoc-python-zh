    \ call last):\n  File \"<stdin>\", line 1, in <module>\nTypeError: unhashable\
    \ type: 'list'\n```\n\n## Testing membership\n\nJust as with lists we can use\
    \ the keyword in to test whether a particular key is in a dictionary.\n\n```python\n\
    >>> d = {'jane': 'maine', 'wanda': 'new hampshire',\n...     'willard': 'vermont',\
    \ 'simone': 'connecticut'}\n>>> 'wanda' in d\nTrue\n>>> 'dobbie' in d\nFalse\n\
    >>> 'dobbie' not in d\nTrue\n```\n\n## 16.2 Iterating over dictionaries\n\nIf\
    \ we iterate over a dictionary as we do with a list, this yields the dictionary's\
    \ keys.\n\n```python\n>>> furniture = {'living room': ['armchair', 'sofa', 'table'],\n\
    ...              'bedroom': ['bed', 'nightstand', 'dresser'],\n...           \
    \   'office': ['desk', 'chair', 'cabinet']}\n...\n>>> for x in furniture:\n...\
    \     print(x)\n...\nliving room\nbedroom\noffice\n```\n\nUsually, when iterating\
    \ over a dictionary we use dictionary view objects. These objects provide a dynamic\
    \ view into a dictionary's keys, values, or entries.\n\nDictionaries have three\
    \ different view objects: items, keys, and values. Dictionaries have methods that\
    \ return these view objects:\n\n- dict.keys() which provides a view of a dictionary's\
    \ keys,\n- dict.values() which provides a view of a dictionary's values, and\n\
    - dict.items() which provides tuples of key/value pairs.\n\nDictionary view objects\
    \ are all iterable.\n\n### Iterating over the keys of a dictionary\n\n```python\n\
    >>> furniture = {'living room': ['armchair', 'sofa', 'table'],\n...          \
    \   'bedroom': ['bed', 'nightstand', 'dresser'],\n...             'office': ['desk',\
    \ 'chair', 'cabinet']}\n>>> for key in furniture.keys():\n...     print(key)\n\
    ...\nliving room\nbedroom\noffice\n```\n\nNote that it's common to exclude .keys()\
    \ if it's keys you want, since the default behavior is to iterate over keys (as\
    \ shown in the previous example).\n\n### Iterating over the values of a dictionary\n\
    \n```python\n>>> for value in furniture.values():\n...     print(value)\n...\n\
    ['armchair', 'sofa', 'table']\n['bed', 'nightstand', 'dresser']\n['desk', 'chair',\
    \ 'cabinet']\n```\n\n### Iterating over the items of a dictionary\n\n```python\n\
    >>> for item in furniture.items():\n...     print(item)\n...\n('living room',\
    \ ['armchair', 'sofa', 'table'])\n('bedroom', ['bed', 'nightstand', 'dresser'])\n\
    ('office', ['desk', 'chair', 'cabinet'])\n```\n\n### Iterating over the items\
    \ of a dictionary using tuple unpacking\n\n```python\n>>> for key, value in furniture.items():\n\
    ...     print(f\"Key: '{key}', value: {value}\")\n...\nKey: 'living room', value:\
    \ ['armchair', 'sofa', 'table']\nKey: 'bedroom', value: ['bed', 'nightstand',\
    \ 'dresser']\nKey: 'office', value: ['desk', 'chair', 'cabinet']\n```\n\n### Some\
    \ examples\n\nLet's say we wanted to count the number of pieces of furniture in\
    \ our dwelling.\n\n```python\n>>> count = 0\n>>> for lst in furniture.values():\n\
    ...     count = count + len(lst)\n...\n>>> count\n9\n```\n\nLet's say we wanted\
    \ to find all the students in the class who are not CS majors, assuming the items\
    \ in our dictionary look like this:\n\n```python\n>>> students =\n...     {'esmerelda'\
    \ : {'class': 2024, 'major': 'ENSC', 'gpa': 3.08},\n...      'winston': {'class':\
    \ 2023, 'major': 'CS', 'gpa': 3.30},\n...      'clark': {'class': 2022, 'major':\
    \ 'PHYS', 'gpa': 2.95},\n...      'kumiko': {'class': 2023, 'major': 'CS', 'gpa':\
    \ 3.29},\n...      'abeba' : {'class': 2024, 'major': 'MATH', 'gpa': 3.71}}\n\
    ```\n\nOne approach:\n\n```python\n>>> non_cs_majors = []\n>>> for student, info\
    \ in students.items():\n...     if info['major'] != 'CS':\n...         non_cs_majors.append(student)\n\
    ...\n>>> non_cs_majors\n['esmerelda', 'clark', 'abeba']\n```\n\n## 16.3 Deleting\
    \ dictionary keys\n\nEarlier we saw that we could use list's .pop() method to\
    \ remove an element from a list, removing either the last element in the list\
    \ (the default, when no argument is supplied), or at a specific index (if we supply\
    \ an argument)."
