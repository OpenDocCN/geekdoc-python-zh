    \ For each pair of values you choose, give the expected output of the function.\
    \ (See section 9.3)\n\n### Exercise 04\n\nConsider this module (program):\n\n\
    ```python\n\"\"\"\nA simple program\n\"\"\"\n\ndef cube(x_):\n    return x_ **\
    \ 3\n\n# Test function to make sure it works\n# as intended\n\nassert cube(3)\
    \ == 27\nassert cube(0) == 0\nassert cube(-1) == -1\n\n# Allow for other test\
    \ at user's discretion\n\nx = float(input(\"Enter a number: \"))\nprint(f\"The\
