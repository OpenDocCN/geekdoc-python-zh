    \n标准差有什么实际用途？它有很多用途，但通常用于识别不寻常或“不太可能”的观测值。\n\n我们可以计算正态曲线下某个部分的面积。利用这个事实，我们知道，给定一个正态分布，我们预期在平均值的一个标准差范围内找到\
