    # Chapter 15


    # Exception handling


    We''ve seen a lot of exceptions so far:


    +   - SyntaxError

    - IndentationError

    - AttributeError

    - NameError

    - TypeError

    - IndexError

    - ValueError

    - ZeroDivisionError

    - FileNotFoundError


    These are exceptions defined by Python, and which are *raised* when certain errors
    occur. (There are many, *many* other exceptions that are outside the scope of
    this textbook.)


    When an *unhandled* exception occurs, your program terminates. This is usually
    an undesired outcome.


    Here we will see that some of these exceptions can be handled gracefully using
    try and except—these go together, hand in hand. In a try block, we include the
    code that we think *might* raise an exception. In the following except block,
    we *catch* or *handle* certain exceptions. What we do in the except block will
    depend on the desired behavior for your program.


    However, we''ll also see that some of these—SyntaxError and IndentationError for
    example—can''t be handled, since these occur when Python is first reading your
    code, prior to execution.


    We''ll also see that some of these exceptions only occur when there''s a defect
    in our code that we do not want to handle! These are exceptions like AttributeError
    and NameError. Trying to handle these covers up defects in our code that we should
    repair. Accordingly, there aren''t many cases where we''d even want to handle
    these exceptions.


    Sometimes we want to handle TypeError or IndexError. It''s very often the case
    that we want to handle ValueError or ZeroDivisionError. It''s almost always the
    case that we want to handle FileNotFoundError. Much of this depends on context,
    and there''s a little art in determining which exceptions are handled, and how
    they should be handled.'
- md: "## Learning objectives\n\n- You will understand why many of the Python exceptions\
    \ are raised.\n- You will learn how to deal with exceptions when they are raised,\
    \ and how to handle them gracefully.\n- You will learn that sometimes it's not\
    \ always best to handle every exception that could be raised.\n\n## Terms introduced\n\
    \n- exception handling\n- \"it's easier to ask forgiveness than it is to ask for\
    \ permission\" (EAFP)\n- \"look before you leap\" (LBYL)\n- raise (an exception)\n\
    - try/except\n\n## 15.1 Exceptions\n\nBy this time, you've seen quite a few exceptions.\
    \ Exceptions occur when something goes wrong. We refer to this as *raising* an\
    \ exception.\n\nExceptions may be raised by the Python interpreter or by built-in\
    \ functions or by methods provided by Python modules. You may even raise exceptions\
    \ in your own code (but we'll get to that later).\n\nExceptions include information\
    \ about the type of exception which has been raised, and where in the code the\
    \ exception occurred. Sometimes, quite a bit of information is provided by the\
    \ exception. In general, a good approach is to start at the last few lines of\
    \ the exception message, and work backward if necessary to see what went wrong.\n\
    \nThere are many types of built-in exceptions in Python. Here are a few that you're\
    \ likely to have seen before.\n\n### SyntaxError\n\nWhen a module is executed\
    \ or imported, Python will read the file, and try *parsing* the file. If, during\
    \ this process, the parser encounters a syntax error, a SyntaxError exception\
    \ is raised. SyntaxError can also be raised when invalid syntax is used in the\
    \ Python shell.\n\n```\n>>> # if requires a condition and colon\n>>> if\n  File\
    \ \"<stdin>\", line 1\n    if\n    ^\nSyntaxError: invalid syntax\n```\n\nHere\
    \ you see the exception includes information about the error and where the error\
    \ occurred. The ^ is used to point to a portion of code where the error occurred.\n\
    \n### IndentationError\n\nIndentationError is a subtype of SyntaxError. Recall\
    \ that indentation is significant in Python—we use it to structure branches, loops,\
    \ and functions. So IndentationError occurs when Python encounters a syntax error\
    \ that it attributes to invalid indentation.\n\n```\nif True:\n    x = 1    #\
    \ This should be indented!\n  File \"<stdin>\", line 2\n    x = 1  # should be\
    \ indented\n    ^\nIndentationError: expected an indented block\n    after 'if'\
    \ statement on line 1\n```\n\nAgain, almost everything you need to know is included\
    \ in the last few lines of the message. Here Python is informing us that it was\
    \ expecting an indented block of code immediately following an if statement.\n\
    \n### AttributeError\n\nThere are several ways an AttributeError can be raised.\
    \ You may have encountered an AttributeError by misspelling the name of a method\
    \ in a module you've imported.\n\n```\n>>> import math\n>>> math.foo   # There\
    \ is no such method or constant in math\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nAttributeError: module 'math' has no\
    \ attribute 'foo'\n```\n\nAn AttributeError is different from a SyntaxError in\
    \ that it occurs at runtime, and not during the parsing or early processing of\
    \ code. An AttributeError is only related to the availability of *attributes*\
    \ and not violations of the Python syntax rules.\n\n### NameError\n\nA NameError\
    \ is raised when Python cannot find an identifier. For example, if you were to\
    \ try to perform a calculation with some variable x without previously having\
    \ assigned a value to x.\n\n```\n>>> x + 1   # Without having previously assigned\
    \ a value to x\nTraceback (most recent call last):\n  File \"<stdin>\", line 1,\
    \ in <module>\nNameError: name 'x' is not defined\n```\n\nAny attempted access\
    \ of an undefined variable will result in a NameError.\n\n```\n>>> foo  # Wasn't\
    \ defined earlier\nTraceback (most recent call last):\n  File \"<stdin>\", line\
    \ 1, in <module>\nNameError: name 'foo' is not defined\n```\n\n### IndexError\n\
    \nIndividual elements of a sequence can be accessed using an index into the sequence.\
    \ This presumes, of course, that the index is valid—that is, there is an element\
    \ at that index. If you try to access an element of a sequence by its index, and\
    \ there is no index, Python will raise an IndexError.\n\n```\n>>> lst = []\n>>>\
    \ lst[2]  # There is no element at index 2\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nIndexError: list index out of range\n\
    ```\n\nThis (above) fails because the list is empty and there is no element at\
    \ index 2. Hence, 2 is an invalid index and an IndexError is raised. Here's another\
    \ example:\n\n```\n>>> alphabet = 'abcdefghijklmnopqrstuvwxyz'\n>>> alphabet[26]\
    \  # Python is 0-indexed so z has index 25\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nIndexError: string index out of range\n\
    ```\n\n### TypeError\n\nA TypeError is raised when a value of one type is expected\
    \ and a different type is supplied. For example, sequence indices—for lists, tuples,\
    \ strings—must be integers. If we try using a float or str as an index, Python\
    \ will raise a TypeError.\n\n```\n>>> lst = [6, 5, 4, 3, 2]\n>>> lst['foo']  #\
    \ Can't use a string as an index\nTraceback (most recent call last):\n  File \"\
    <stdin>\", line 1, in <module>\nTypeError: list indices must be integers or slices,\
    \ not str\n```\n\n```\n>>> lst[1.0]  # Can't use a float as an index\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\nTypeError:\
    \ list indices must be integers or slices, not float\n```\n\nPython will also\
    \ raise a TypeError if we try to perform operations on operands which are not\
    \ supported. For example, we cannot concatenate an int to a str or add a str to\
    \ an int.\n\n```\n>>> 'foo' + 1  # Try concatenating 1 with 'foo'\nTraceback (most\
    \ recent call last):\n  File \"<stdin>\", line 1, in <module>\nTypeError: can\
    \ only concatenate str (not \"int\") to str\n```\n\n```\n>>> 1 + 'foo'  # Try\
    \ adding 'foo' to 1\nTraceback (most recent call last):\n  File \"<stdin>\", line\
    \ 1, in <module>\nTypeError: unsupported operand type(s) for +: 'int' and 'str'\n\
    ```\n\nWe cannot calculate the sum of a number and a string. We cannot calculate\
    \ the sum of any list or tuple which contains a string.\n\n```\n>>> sum('Add me\
    \ up!')  # Can't sum a string\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nTypeError: unsupported operand type(s) for +: 'int' and\
    \ 'str'\n```\n\n```\n>>> sum(1)  # Python sum() requires an iterable of numerics\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    TypeError: 'int' object is not iterable\n```\n\nBy the same token, we cannot get\
    \ the length of a float or int.\n\n```\n>>> len(1)\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 1, in <module>\nTypeError: object of type 'int'\
    \ has no len()\n```\n\n### ValueError\n\nA ValueError is raised when the type\
    \ of some argument or operand is correct, but the value is not. For example, math.sqrt(x)\
    \ will raise a ValueError if we try to take the square root of a negative number.\n\
    \n```\n>>> import math\n>>> math.sqrt(-1)\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nValueError: math domain error\n```\n\
    \nNote that dividing by zero is considered an arithmetic error, and has its own\
    \ exception (see below).\n\n### ZeroDivisionError\n\nJust as in mathematics, Python\
    \ will not allow us to divide by zero. If we try to, Python will raise a ZeroDivisionError.\
    \ Note that this occurs with floor division and modulus as well (as they depend\
    \ on division).\n\n```\n>>> 10 / 0\nTraceback (most recent call last):\n  File\
    \ \"<stdin>\", line 1, in <module>\nZeroDivisionError: division by zero\n```\n\
    \n```\n>>> 10 % 0\nTraceback (most recent call last):\n  File \"<stdin>\", line\
    \ 1, in <module>\nZeroDivisionError: integer division or modulo by zero\n```\n\
    \n```\n>>> 10 // 0\nTraceback (most recent call last):\n  File \"<stdin>\", line\
    \ 1, in <module>\nZeroDivisionError: integer division or modulo by zero\n```\n\
    \n### FileNotFoundError\n\nWe've seen how to open files for reading and writing.\
    \ There are many ways this can go wrong, but one common issue is FileNotFoundError.\
    \ This exception is raised when Python cannot find the specified file. The file\
    \ may not exist, may be in the wrong directory, or may be named incorrectly.\n\
    \n```\nopen('non-existent file')\nTraceback (most recent call last):\n  File \"\
    <stdin>\", line 1, in <module>\nFileNotFoundError: [Errno 2] No such file or directory:\n\
    \    'non-existent file'\n```\n\n## 15.2 Handling exceptions\n\nSo far, what we've\
    \ seen is that when an exception is raised our program is terminated (or not even\
    \ run to begin with in the case of a SyntaxError). However, Python allows us to\
    \ handle exceptions. What this means is that when an exception is raised, a specific\
    \ block of code can be executed to deal with the problem.\n\nFor this we have,\
    \ minimally, a try/except compound statement. This involves creating two blocks\
    \ of code: a try block and an exception handler--an except block.\n\nThe code\
    \ in the try block is code where we want to guard against unhandled exceptions.\
    \ A try block is followed by an except block."
  mdcn: "## 学习目标\n\n- 你将理解许多 Python 异常被引发的原因。\n- 你将学习当异常被引发时如何处理它们，以及如何优雅地处理它们。\n\
    - 你将了解到，有时并非总是处理每一个可能引发的异常才是最佳选择。\n\n## 引入的术语\n\n- 异常处理\n- “请求原谅比请求许可更容易”（EAFP）\n\
    - “三思而后行”（LBYL）\n- 引发（异常）\n- try/except\n\n## 15.1 异常\n\n到目前为止，你已经见过不少异常了。当某些事情出错时，就会发生异常。我们称之为*引发*一个异常。\n\
    \n异常可能由 Python 解释器、内置函数或 Python 模块提供的方法引发。你甚至可以在自己的代码中引发异常（但我们稍后会讲到）。\n\n异常包含有关已引发异常类型以及异常在代码中发生位置的信息。有时，异常会提供相当多的信息。通常，一个好的方法是从异常消息的最后几行开始，必要时向前追溯，以查看出了什么问题。\n\
    \nPython 中有许多内置异常类型。以下是你可能之前见过的一些。\n\n### SyntaxError\n\n当模块被执行或导入时，Python 会读取文件并尝试*解析*文件。如果在此过程中解析器遇到语法错误，就会引发\
    \ SyntaxError 异常。在 Python shell 中使用无效语法时，也可能引发 SyntaxError。\n\n```\n>>> # if 需要一个条件和一个冒号\n\
    >>> if\n  File \"<stdin>\", line 1\n    if\n    ^\nSyntaxError: invalid syntax\n\
    ```\n\n这里你可以看到异常包含了有关错误以及错误发生位置的信息。`^` 用于指向错误发生位置的代码部分。\n\n### IndentationError\n\
    \nIndentationError 是 SyntaxError 的一个子类型。回想一下，缩进在 Python 中很重要——我们用它来构建分支、循环和函数。因此，当\
    \ Python 遇到归因于无效缩进的语法错误时，就会发生 IndentationError。\n\n```\nif True:\n    x = 1  \
    \  # 这里应该缩进！\n  File \"<stdin>\", line 2\n    x = 1  # should be indented\n  \
    \  ^\nIndentationError: expected an indented block\n    after 'if' statement on\
    \ line 1\n```\n\n同样，你需要知道的几乎所有信息都包含在消息的最后几行中。这里 Python 告诉我们，它期望在 `if` 语句之后立即有一个缩进的代码块。\n\
    \n### AttributeError\n\n有几种方式可以引发 AttributeError。你可能因为拼错了导入模块中的方法名而遇到过 AttributeError。\n\
    \n```\n>>> import math\n>>> math.foo   # math 中没有这样的方法或常量\nTraceback (most recent\
    \ call last):\n  File \"<stdin>\", line 1, in <module>\nAttributeError: module\
    \ 'math' has no attribute 'foo'\n```\n\nAttributeError 与 SyntaxError 不同，因为它发生在运行时，而不是在代码的解析或早期处理过程中。AttributeError\
    \ 仅与*属性*的可用性有关，而与违反 Python 语法规则无关。\n\n### NameError\n\n当 Python 找不到标识符时，会引发 NameError。例如，如果你尝试使用某个变量\
    \ `x` 进行计算，但之前没有给 `x` 赋值。\n\n```\n>>> x + 1   # 之前没有给 x 赋值\nTraceback (most recent\
    \ call last):\n  File \"<stdin>\", line 1, in <module>\nNameError: name 'x' is\
    \ not defined\n```\n\n任何尝试访问未定义变量的操作都会导致 NameError。\n\n```\n>>> foo  # 之前没有定义\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    NameError: name 'foo' is not defined\n```\n\n### IndexError\n\n可以使用索引来访问序列的各个元素。当然，这假设索引是有效的——即该索引处存在一个元素。如果你尝试通过索引访问序列的元素，但该索引不存在，Python\
    \ 将引发 IndexError。\n\n```\n>>> lst = []\n>>> lst[2]  # 索引 2 处没有元素\nTraceback (most\
    \ recent call last):\n  File \"<stdin>\", line 1, in <module>\nIndexError: list\
    \ index out of range\n```\n\n上面的代码失败是因为列表为空，索引 2 处没有元素。因此，2 是一个无效索引，引发了 IndexError。这里是另一个例子：\n\
    \n```\n>>> alphabet = 'abcdefghijklmnopqrstuvwxyz'\n>>> alphabet[26]  # Python\
    \ 是从 0 开始索引的，所以 z 的索引是 25\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nIndexError: string index out of range\n```\n\n### TypeError\n\
    \n当期望某种类型的值但提供了不同类型的值时，会引发 TypeError。例如，序列索引——对于列表、元组、字符串——必须是整数。如果我们尝试使用浮点数或字符串作为索引，Python\
    \ 将引发 TypeError。\n\n```\n>>> lst = [6, 5, 4, 3, 2]\n>>> lst['foo']  # 不能使用字符串作为索引\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    TypeError: list indices must be integers or slices, not str\n```\n\n```\n>>> lst[1.0]\
    \  # 不能使用浮点数作为索引\nTraceback (most recent call last):\n  File \"<stdin>\", line\
    \ 1, in <module>\nTypeError: list indices must be integers or slices, not float\n\
    ```\n\n如果我们尝试对不支持的操作数执行操作，Python 也会引发 TypeError。例如，我们不能将整数连接到字符串，也不能将字符串加到整数上。\n\
    \n```\n>>> 'foo' + 1  # 尝试将 1 与 'foo' 连接\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nTypeError: can only concatenate str\
    \ (not \"int\") to str\n```\n\n```\n>>> 1 + 'foo'  # 尝试将 'foo' 加到 1 上\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\nTypeError:\
    \ unsupported operand type(s) for +: 'int' and 'str'\n```\n\n我们无法计算一个数字和一个字符串的和。我们无法计算任何包含字符串的列表或元组的和。\n\
    \n```\n>>> sum('Add me up!')  # 不能对字符串求和\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nTypeError: unsupported operand type(s)\
    \ for +: 'int' and 'str'\n```\n\n```\n>>> sum(1)  # Python 的 sum() 需要一个可迭代的数值对象\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    TypeError: 'int' object is not iterable\n```\n\n同样，我们无法获取浮点数或整数的长度。\n\n```\n>>>\
    \ len(1)\nTraceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    TypeError: object of type 'int' has no len()\n```\n\n### ValueError\n\n当某个参数或操作数的类型正确但值不正确时，会引发\
    \ ValueError。例如，如果我们尝试对负数取平方根，`math.sqrt(x)` 将引发 ValueError。\n\n```\n>>> import\
    \ math\n>>> math.sqrt(-1)\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nValueError: math domain error\n```\n\n请注意，除以零被视为算术错误，并有其自己的异常（见下文）。\n\
    \n### ZeroDivisionError\n\n就像在数学中一样，Python 不允许我们除以零。如果我们尝试这样做，Python 将引发 ZeroDivisionError。请注意，这在整除和取模运算中也会发生（因为它们依赖于除法）。\n\
    \n```\n>>> 10 / 0\nTraceback (most recent call last):\n  File \"<stdin>\", line\
    \ 1, in <module>\nZeroDivisionError: division by zero\n```\n\n```\n>>> 10 % 0\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    ZeroDivisionError: integer division or modulo by zero\n```\n\n```\n>>> 10 // 0\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    ZeroDivisionError: integer division or modulo by zero\n```\n\n### FileNotFoundError\n\
    \n我们已经了解了如何打开文件进行读写。这可能会以多种方式出错，但一个常见的问题是 FileNotFoundError。当 Python 找不到指定的文件时，会引发此异常。文件可能不存在、可能在错误的目录中，或者可能命名不正确。\n\
    \n```\nopen('non-existent file')\nTraceback (most recent call last):\n  File \"\
    <stdin>\", line 1, in <module>\nFileNotFoundError: [Errno 2] No such file or directory:\n\
    \    'non-existent file'\n```\n\n## 15.2 处理异常\n\n到目前为止，我们所看到的是，当异常被引发时，我们的程序会终止（或者在\
    \ SyntaxError 的情况下甚至根本没有开始运行）。然而，Python 允许我们处理异常。这意味着当异常被引发时，可以执行特定的代码块来处理问题。\n\
    \n为此，我们至少有一个 try/except 复合语句。这涉及创建两个代码块：一个 try 块和一个异常处理程序——一个 except 块。\n\ntry\
    \ 块中的代码是我们希望防范未处理异常的代码。try 块后面跟着一个 except 块。"
