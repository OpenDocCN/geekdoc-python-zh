    # Natural numbers, integers, rational numbers, and real numbers


    You probably know that the set of all natural numbers

    $$\mathbb{N} = \{0, 1, 2, 3, ...\}$$

    is infinite.


    From there it''s not a great leap to see that the set of all integers

    $$\mathbb{Z} = \{..., -2, -1, 0, 1, 2, ...\}$$

    is infinite too.


    The rational numbers, $\mathbb{Q}$, and set of all real numbers, $\mathbb{R}$,
    also are infinite.


    This fact—that these sets are of infinite size—has implications for numeric representation
    and numeric calculations on computers.


    When we work with computers, numbers are given integer or floating-point representations.
    For example, in Python, we have distinct types, `int` and `float`, for holding
    integer and floating-point numbers, respectively.


    I won''t get into too much detail about how these are represented in binary, but
    here''s a little bit of information.


    # Integers


    Representation of integers is relatively straightforward. Integers are represented
    as binary numbers with a position set aside for the sign. So, 12345 would be represented
    as 00110000 00111001. That''s

    $$0 \times 2^{15} + 0 \times 2^{14} + 1 \times 2^{13} + 1 \times 2^{12}$$

    $$+ 0 \times 10^{11} + 0 \times 10^{10} + 0 \times 10^9 + 0 \times 10^8$$

    $$+ 0 \times 10^6 + 1 \times 2^5 + 1 \times 2^4 + 1 \times 2^3$$

    $$+ 0 \times 2^2 + 0 \times 2^1 + 1 \times 2^0$$

    This works out to

    $$8192 + 4096 + 32 + 16 + 8 + 1 = 12345.$$

    Negative integers are a little different. If you''re curious about this, see the
    Wikipedia article on *Two''s Complement*.'
