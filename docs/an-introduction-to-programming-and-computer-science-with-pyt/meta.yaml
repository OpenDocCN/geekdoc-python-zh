  md: "# Example: currency converter\n\nNow we need two other bits of information:\
    \ the amount we wish to convert, and the exchange rate. (Here we'll use the \\\
    , which, when used as shown, signifies an explicit line continuation in Python.\
    \ Python will automatically join the lines.)⁵\n\n```\nsource_prompt = f'Enter\
    \ the amount in {source_label} ' \\n                  f'you wish to convert: '\n\
    \nex_rate_prompt = f'Enter the exchange rate ' \\n                  f'({source_label}/{target_label}):\
    \ '\n\nsource_amount = float(input(source_prompt))\nexchange_rate = float(input(ex_rate_prompt))\n\
    ```\n\nAt this point, we have both labels source_label and target_label, the amount\
    \ we wish to convert stored as source_amount, and the exchange rate stored as\
    \ exchange_rate. The labels are of type str. The source amount and the exchange\
    \ rate are of type float.\nGiving these objects significant names (rather than\
    \ x, y, z, ...) makes the code easy to read and understand.\nNow, on to the calculation.\
    \ Since we have the rate expressed as a ratio of the value of a unit of the source\
    \ currency to a unit of the target currency, all we need to do is multiply.\n\n\
    ```\ntarget_amount = source_amount * exchange_rate\n```\n\nSee how choosing good\
    \ names makes things so clear? You should aim for similar clarity when naming\
    \ objects and putting them to use.\nThe only thing left is to print the result.\
    \ Again, we'll use f-strings, but this time we'll include format specifiers to\
    \ display the results to two decimal places of precision.\n\n```\nprint(f'{source_amount:,.2f}\
    \ {source_label} is worth '\n      f'{target_amount:,.2f} {target_label}')\n```\n\
    \nPutting it all together we get:\n\n```\n\"\"\"\nCurrency Converter\nEgbert Porcupine\
    \ <egbert.porcupine@uvm.edu>\nCS 1210\n\nPrompts users for two currencies, amount\
    \ to convert,\nand exchange rate, and then performs the conversion\n```\n\n> ⁵From\
    \ the Python documentation: Two or more physical lines may be joined into logical\
    \ lines using backslash characters (), as follows: when a physical line ends in\
    \ a backslash that is not part of a string literal or comment, it is joined with\
    \ the following forming a single logical line, deleting the backslash and the\
    \ following end-of-line character (https://docs.python.org/3/reference/lexical_analysis.html)."
