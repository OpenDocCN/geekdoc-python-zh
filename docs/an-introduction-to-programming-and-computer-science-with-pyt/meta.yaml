    # Negative modulus


    We''ve seen that when we add we go clockwise, and when we subtract we go anti-clockwise.
    What happens when the modulus is negative?

    To preserve the “direction” of addition (clockwise) and subtraction (anti-clockwise),
    if our modulus is negative we number the face of the clock anti-clockwise.

    Examples:

    1 ≡ -4 (mod -5)

    2 ≡ -3 (mod -5)

    2 + 4 ≡ -4 (mod -5)

    We can confirm these agree with Python''s evaluation of these expressions:


    ```

    >>> 1 % -5

    -4

    >>> 2 % -5

    ```'
