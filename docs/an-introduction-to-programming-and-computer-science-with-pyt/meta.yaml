    \ is expected and your code isn't, or if a portion of your code is over-indented.\
    \ IndentationError is a more specific type of SyntaxError.\nWhen you encounter\
    \ an indentation error, you should inspect your code and correct the indentation.\n\
    Here's an example:\n\n```python\n>>> def square(n):\n...     return n * n\nFile\
    \ \"<stdin>\", line 2\n    return n * n\n    ^\nIndentationError: expected an\
    \ indented block after function definition on line 1\n```\n\n```python\n>>> def\
    \ square(n):\n...     return n * n  # now it's correctly indented!\n...\n>>> square(4)\n\
    16\n```\n\n### ValueError\n\nA ValueError is raised when the type of an argument\
    \ or operand is valid, but the value is somehow unsuitable. We've seen how to\
    \ import the math module and how to use math.sqrt() to calculate the square root\
    \ of some number. However, math.sqrt() does not accept negative operands (it doesn't\
