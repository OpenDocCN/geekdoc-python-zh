    # Chapter 13


    # File I/O


    So far all of the input to our programs and all of the output from our programs
    has taken place in the console. That is, we''ve used `input()` to prompt for user
    input, and we''ve used `print()` to send output to the console.


    Of course, there are a great many ways to send information to a program and to
    receive output from a program: mice and trackpads, audio data, graphical user
    interfaces ("GUIs", pronounced "gooeys"), temperature sensors, accelerometers,
    databases, actuators, networks, web APIs (application program interfaces), and
    more.


    Here we will learn how to read data from a file and write data to a file. We call
    this "file i/o" which is short for "file input and output." This is particularly
    useful when we have large amounts of data to process.


    In order to read from or write to a file, we need to be able to open and close
    a file. We will do this using a *context manager*.


    We will also see new exceptions which may occur when attempting to read from or
    write to a file, specifically `FileNotFoundError`.


    # Learning objectives


    +   - You will learn how to read from a file.

    - You will learn some of the ways to write to a file.

    - You will learn some valuable keyword arguments.

    - You will learn about the csv file format and Python module, as well as how to
    read from and write to a .csv file.


    # Terms and Python keywords introduced


    +   - as

    - context manager

    - CSV (file format)

    - keyword argument

    - with'
  - "[PAGE 282]\n\n# 13.1 Context managers\n\nA **context manager** is a Python object\
    \ which controls (to a certain extent) what occurs within a with statement. Context\
    \ managers relieve some of the burden placed on programmers. For example, if we\
    \ open a file, and for some reason something goes wrong and an exception is raised,\
    \ we still want to ensure that the file is closed. Before the introduction of\
    \ the with statement (in Python 2.5, almost twenty years ago), programmers often\
    \ used try/finally statements (we'll see more about try when we get to exception\
    \ handling).\n\nWe introduce with and context managers in the context of file\
    \ i/o, because this approach simplifies our code and ensures that when we're done\
    \ reading from or writing to a file that the file is closed automatically, without\
    \ any need to explicitly call the .close() method. The idiom we'll follow is:\n\
    \n```\nwith open(\"somefile.txt\") as fh:\n    # do stuff, e.g., read from file\n\
    \    s = fh.read()\n```\n\nWhen we exit this block (i.e. all the indented code\
    \ has executed), Python will close the file automatically. Without this context\
    \ manager, we'd need to call .close() explicitly, and failure to do so can lead\
    \ to unexpected and undesirable results.\n\nwith and as are Python keywords. Here,\
    \ with creates the context manager, and as is used to give a name to our file\
    \ object. So once the file is opened, we may refer to it by the name given with\
    \ as—in this instance fh (a common abbreviation for \"file handle\").\n\n# 13.2\
    \ Reading from a file\n\nLet's say we have a .txt file called hello.txt in the\
    \ same directory as a Python file we just created. We wish to open the file, read\
    \ its content and assign it a variable, and print that variable to the console.\
    \ This is how we would do this:\n\n```\n>>> with open('hello.txt') as f:\n...\
    \     s = f.read()\n...\n>>> print(s)\nHello World!\n```\n\nIt's often useful\
    \ to read one line at a time into a list.\n\n```\n>>> lines = []\n>>> with open('poem.txt')\
    \ as f:\n...     for line in f:\n...         lines.append(line)\n...\n```"
- md: "## 13.3 Writing to a file\n\nSo far, the only output our programs have produced\
    \ is characters printed to the console. This is fine, as far as it goes, but often\
    \ we have more output than we wish to read at the console, or we wish to store\
    \ output for future use, distribution, or other purposes. Here we will learn how\
    \ to write data to a file.\n\nWith Python, this isn't difficult. Python provides\
    \ us with a built-in function `open()` which returns a file object. Then we can\
    \ read from and write to the file, using this object.\n\nThe best approach to\
    \ opening a file for writing is as follows:\n\n```python\nwith open('hello.txt',\
    \ 'w') as f:\n    f.write('Hello World!')\n```\n\nLet's unpack this one step at\
    \ a time. The `open()` function takes a file name, an optional mode, and other\
    \ optional arguments we don't need to trouble ourselves with right now. So in\
    \ the example above, `'hello.txt'` is the file name (here, a quoted string), and\
    \ `'w'` is the mode. You may have already guessed that `'w'` means \"write\",\
    \ and if so, you're correct!\n\nPython allows for other ways to specify the file,\
    \ and `open()` will accept any \"path-like\" object. Here we'll only use strings,\
    \ but be aware that there are other ways of specifying where Python should look\
    \ for a given file.\n\nThere are a number of different modes, some of which can\
    \ be used in combination. Quoting from the Python documentation:¹\n\n| Character\
    \ | Meaning |\n| :--- | :--- |\n| 'r' | open for reading (default) |\n| 'w' |\
    \ open for writing, truncating the file first |\n| 'x' | open for exclusive creation,\
    \ failing if the file already exists |\n| 'a' | open for writing, appending to\
    \ the end of the file if it exists |\n| 'b' | binary mode |\n| 't' | text mode\
    \ (default) |\n| '+' | open for updating (reading and writing) |\n\nAgain, in\
    \ the code snippet above, we specify `'w'` since we wish to write. We could have\
    \ written:\n\n```python\nwith open('hello.txt', 'wt') as f:\n    f.write('Hello\
    \ World!')\n```\n\nexplicitly specifying text mode, but this is somewhat redundant.\
    \ We will only present reading and writing text data in this text.²\n\nThe idiom\
    \ `with open('hello.txt', 'w') as f:` is the preferred approach when reading from\
    \ or writing to files. We could write\n\n```python\nf = open('hello.txt', 'w')\n\
    f.write('Hello World')\nf.close()\n```\n\nbut then it's our responsibility to\
    \ close the file when done. The idiom `with open('hello.txt', 'w') as f:` will\
    \ take care of closing the file automatically, as soon as the block is exited.\n\
    \nNow let's write a little more data. Here's a snippet from a poem by Walt Whitman\
    \ (taking some liberties with line breaks):\n\n```python\nfragment = [\"Flood-tide\
    \ below me!\\n\"\n           \"I see you face to face\\n\"\n           \"Clouds\
    \ of the west--\\n\"\n           \"Sun there half an hour high--\\n\"\n      \
    \     \"I see you also face to face.\\n\"]\n\nwith open('poem.txt', 'w') as fh:\n\
    \    for line in fragment:\n        fh.write(line)\n```\n\nHere we simply iterate\
    \ through the lines in this fragment and write them to the file `poem.txt`. Notice\
    \ that we include newline characters `'\\n'` to end each line.\n\n### Writing\
    \ numeric data\n\nThe `.write()` method requires a string, so if you wish to write\
    \ numeric data, you should use `str()` or f-strings. Example:\n\n```python\nimport\
    \ random\n\n# Write 10,000 random values in the range [-1.0, 1.0)\nwith open('data.txt',\
    \ 'w') as f:\n    for _ in range(10_000):\n        x = (random.random() - 0.5)\
    \ * 2.0\n        f.write(f\"{x}\\n\")\n```\n\n### Always use with\n\nFrom the\
    \ documentation:\n\n> Warning: Calling `f.write()` without using the `with` keyword\
    \ or calling `f.close()` might result in the arguments of `f.write()` not being\
    \ completely written to the disk, even if the program exits successfully.\n\n\
    Since we can forget to call `f.close()`, use of `with` is the preferred (and most\
    \ Pythonic) approach.\n\n### Comprehension check\n\n1.  Try the above code snippets\
    \ to write to files `hello.txt` and `poem.txt`.\n2.  Write a program that writes\
    \ five statements about you to a file called `about_me.txt`.\n\n## 13.4 Keyword\
    \ arguments\n\nSome of what we'll do with files involves using *keyword arguments*.\
    \ Thus far, when we've called or defined functions, we've only seen *positional\
    \ arguments*. For example, `math.sqrt(x)` and `list.append(x)` each take one positional\
    \ argument. Some functions take two or more positional arguments. For example,\
    \ `math.pow(x, y)`, takes *two* positional arguments. The first is the base, the\
    \ second is the power. So this function returns x raised to the y power (x^y).\
    \ Notice that what's significant here is not the names of the formal parameters\
    \ but their *order*. It matters how we supply arguments when calling this function.\
    \ Clearly, 2^3 (8) is not the same as 3^2 (9). How does the function know which\
    \ argument should be used as the base and which argument should be used as the\
    \ exponent? It's all based on their position. The base is the first argument.\
    \ The exponent is the second argument.\n\nSome functions allow for *keyword* arguments.\
    \ Keyword arguments follow positional arguments, and are given a name when calling\
    \ the function. For example, `print()` allows you to provide a keyword argument\
    \ `end` which can be used to override the default behavior of `print()` which\
    \ is to append a newline character, `\\n`, with every call. Example:\n\n```python\n\
    print(\"Cheese\")\nprint(\"Shop\")\n```\n\nprints \"Cheese\" and \"Shop\" on two\
    \ different lines, because the default is to append that newline character. However...\n\
    \n```python\nprint(\"Cheese\", end=\" \")\nprint(\"Shop\")\n```\n\nprints \"Cheese\
    \ Shop\" on a single line (followed by a newline), because in the first call to\
    \ `print()` the `end` keyword argument is supplied with one blank space, `\" \"\
    `, and thus, no newline is appended. This is an example of a keyword argument.\n\
    \nIn the context of file input and output, we'll use a similar keyword argument\
    \ when working with CSV files (comma separated values).\n\n```python\nopen('my_data.csv',\
    \ newline='')\n```\n\nThis allows us to avoid an annoying behavior in Python's\
    \ CSV module in some contexts. We'll get into more detail on this soon, but for\
    \ now, just be aware that we can, in certain cases, use keyword arguments where\
    \ permitted, and that the syntax is as shown: positional arguments come first,\
    \ followed by optional keyword arguments, with keyword arguments supplied in the\
    \ form `keyword=value`. See: The `newline=''` keyword argument, below.\n\n## 13.5\
    \ More on printing strings\n\n### Specifying the ending of printed strings\n\n\
    By default, the `print()` function appends a newline character with each call.\
    \ Since this is, by far, the most common behavior we desire when printing, this\
    \ default makes good sense. However, there are times when we do not want this\
    \ behavior, for example when printing strings that are terminated with newline\
    \ characters (`'\\n'`) as this would produce *two* newline characters at the end.\
    \ This happens often when reading certain data from a file. In this case, and\
    \ in others where we wish to override the default behavior of `print()`, we can\
    \ supply the keyword argument, `end`. The `end` keyword argument specifies the\
    \ character (or characters) if any, we wish to append to a printed string.\n\n\
    ¹https://docs.python.org/3/library/functions.html#open\n\n²It is often the case\
    \ that we wish to write binary data to file, but doing so is outside the scope\
    \ of this text."
  mdcn: "## 13.3 写入文件\n\n到目前为止，我们程序产生的唯一输出是打印到控制台的字符。就目前而言，这已经足够了，但通常我们会有比希望在控制台阅读更多的输出，或者我们希望存储输出以供将来使用、分发或其他目的。在这里，我们将学习如何将数据写入文件。\n\
    \n使用Python，这并不困难。Python为我们提供了一个内置函数`open()`，它返回一个文件对象。然后我们可以使用这个对象从文件读取和写入文件。\n\
    \n打开文件进行写入的最佳方法如下：\n\n```python\nwith open('hello.txt', 'w') as f:\n    f.write('Hello\
    \ World!')\n```\n\n让我们一步一步地解析它。`open()`函数接受一个文件名、一个可选的模式和其他我们现在不需要担心的可选参数。所以在上面的例子中，`'hello.txt'`是文件名（这里是一个带引号的字符串），`'w'`是模式。你可能已经猜到`'w'`表示“写入”，如果猜对了，你是正确的！\n\
    \nPython允许其他方式来指定文件，`open()`将接受任何“类路径”对象。这里我们只使用字符串，但要注意还有其他方式来指定Python应该在哪里查找给定的文件。\n\
    \n有多种不同的模式，其中一些可以组合使用。引用Python文档：¹\n\n| 字符 | 含义 |\n| :--- | :--- |\n| 'r' | 打开用于读取（默认）\
    \ |\n| 'w' | 打开用于写入，首先截断文件 |\n| 'x' | 打开用于独占创建，如果文件已存在则失败 |\n| 'a' | 打开用于写入，如果文件存在则追加到文件末尾\
    \ |\n| 'b' | 二进制模式 |\n| 't' | 文本模式（默认） |\n| '+' | 打开用于更新（读取和写入） |\n\n同样，在上面的代码片段中，我们指定了`'w'`，因为我们希望写入。我们本可以写成：\n\
    \n```python\nwith open('hello.txt', 'wt') as f:\n    f.write('Hello World!')\n\
    ```\n\n显式地指定文本模式，但这有些多余。本文中我们将只介绍读取和写入文本数据。²\n\n惯用法`with open('hello.txt', 'w')\
    \ as f:`是读取或写入文件时的首选方法。我们可以写成\n\n```python\nf = open('hello.txt', 'w')\nf.write('Hello\
    \ World')\nf.close()\n```\n\n但那样的话，关闭文件就是我们的责任了。惯用法`with open('hello.txt', 'w')\
    \ as f:`会自动处理关闭文件，一旦退出代码块就会关闭。\n\n现在让我们写入更多数据。这是沃尔特·惠特曼一首诗的片段（对换行做了一些自由处理）：\n\n\
    ```python\nfragment = [\"Flood-tide below me!\\n\"\n           \"I see you face\
    \ to face\\n\"\n           \"Clouds of the west--\\n\"\n           \"Sun there\
    \ half an hour high--\\n\"\n           \"I see you also face to face.\\n\"]\n\n\
    with open('poem.txt', 'w') as fh:\n    for line in fragment:\n        fh.write(line)\n\
    ```\n\n这里我们只是遍历这个片段中的行，并将它们写入文件`poem.txt`。注意我们包含了换行符`'\\n'`来结束每一行。\n\n### 写入数字数据\n\
    \n`.write()`方法需要一个字符串，所以如果你希望写入数字数据，你应该使用`str()`或f-strings。示例：\n\n```python\n\
    import random\n\n# 写入10,000个在范围[-1.0, 1.0)内的随机值\nwith open('data.txt', 'w') as\
    \ f:\n    for _ in range(10_000):\n        x = (random.random() - 0.5) * 2.0\n\
    \        f.write(f\"{x}\\n\")\n```\n\n### 始终使用with\n\n来自文档：\n\n> 警告：在不使用`with`关键字或不调用`f.close()`的情况下调用`f.write()`，可能会导致`f.write()`的参数没有完全写入磁盘，即使程序成功退出。\n\
    \n由于我们可能会忘记调用`f.close()`，使用`with`是首选（也是最Pythonic的）方法。\n\n### 理解检查\n\n1.  尝试上面的代码片段，将内容写入文件`hello.txt`和`poem.txt`。\n\
    2.  编写一个程序，将关于你的五条陈述写入一个名为`about_me.txt`的文件。\n\n## 13.4 关键字参数\n\n我们将对文件进行的一些操作涉及使用*关键字参数*。到目前为止，当我们调用或定义函数时，我们只见过*位置参数*。例如，`math.sqrt(x)`和`list.append(x)`各接受一个位置参数。有些函数接受两个或更多位置参数。例如，`math.pow(x,\
    \ y)`接受*两个*位置参数。第一个是底数，第二个是指数。所以这个函数返回x的y次幂（x^y）。注意，这里重要的不是形式参数的名称，而是它们的*顺序*。调用此函数时，我们如何提供参数很重要。显然，2^3（8）与3^2（9）不同。函数如何知道哪个参数应该用作底数，哪个参数应该用作指数？这完全基于它们的位置。底数是第一个参数。指数是第二个参数。\n\
    \n有些函数允许*关键字*参数。关键字参数跟在位置参数之后，并在调用函数时给出一个名称。例如，`print()`允许你提供一个关键字参数`end`，它可以用来覆盖`print()`的默认行为，即每次调用时追加一个换行符`\\\
    n`。示例：\n\n```python\nprint(\"Cheese\")\nprint(\"Shop\")\n```\n\n将“Cheese”和“Shop”打印在两行不同的行上，因为默认行为是追加那个换行符。然而...\n\
    \n```python\nprint(\"Cheese\", end=\" \")\nprint(\"Shop\")\n```\n\n将“Cheese Shop”打印在一行上（后面跟着一个换行符），因为在第一次调用`print()`时，提供了`end`关键字参数为一个空格`\"\
    \ \"`，因此没有追加换行符。这就是关键字参数的一个例子。\n\n在文件输入和输出的上下文中，我们在处理CSV文件（逗号分隔值）时将使用类似的关键字参数。\n\
    \n```python\nopen('my_data.csv', newline='')\n```\n\n这使我们能够避免Python的CSV模块在某些上下文中令人烦恼的行为。我们很快会对此进行更详细的介绍，但现在，只需注意在某些情况下，我们可以在允许的地方使用关键字参数，语法如所示：位置参数在前，后面是可选的关键字参数，关键字参数以`keyword=value`的形式提供。参见：下面的`newline=''`关键字参数。\n\
    \n## 13.5 关于打印字符串的更多内容\n\n### 指定打印字符串的结尾\n\n默认情况下，`print()`函数在每次调用时追加一个换行符。由于这迄今为止是我们打印时最期望的行为，这个默认值非常合理。然而，有时我们不希望这种行为，例如当打印以换行符（`'\\\
    n'`）结尾的字符串时，因为这会在末尾产生*两个*换行符。这在从文件读取某些数据时经常发生。在这种情况下，以及其他我们希望覆盖`print()`默认行为的情况下，我们可以提供关键字参数`end`。`end`关键字参数指定了我们希望追加到打印字符串的字符（或多个字符），如果有的话。\n\
    \n¹https://docs.python.org/3/library/functions.html#open\n\n²我们通常希望将二进制数据写入文件，但这样做超出了本文的范围。"
