    是 Python 用来编码字符信息的系统，Unicode 包括许多其他字母表（阿拉伯语、亚美尼亚语、西里尔字母、希腊语、韩语、希伯来语、印地语、泰卢固语、泰语等）、来自非字母语言的符号（如中文或日文汉字）以及许多特殊符号（®,
