    \ 在 Mary 后面\n>>> queue.pop(0)            # Fred 已被服务\n'Fred'\n>>> queue[0]   \
    \             # 现在看看谁在前面\n'Mary'\n>>> queue.append(\"Gladys\")  # Gladys 加入队伍\n\
    >>> queue.pop(0)            # Mary 已被服务\n'Mary'\n```\n\n所以你看，一个列表可以用作栈或队列。通常，栈和队列在循环中使用。我们将在后面的章节中进一步了解这一点。\n\
    \n## 11.15 深入了解 Python 中的迭代\n\n接下来是关于 Python 中可迭代对象和迭代的更多细节。如果你愿意，可以完全跳过本节。这里介绍的唯一目的是展示当我们迭代\
    \ Python 中的某个对象时，“幕后”发生了什么。话虽如此，让我们从列表的情况开始（元组或其他任何可迭代对象的工作原理相同）。\n\n```\n>>>\
