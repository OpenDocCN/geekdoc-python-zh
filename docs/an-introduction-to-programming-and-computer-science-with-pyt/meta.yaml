    >>> 0.1

    0.1

    >>> 0.2

    0.2

    >>> 0.1 + 0.2

    0.30000000000000004

    ```


    Wait! What? Yup. Something strange is going on. Python rounds values when displaying
    in the shell. Here''s proof:


    ```

    >>> print(f''{0.1:.56f}'')

    0.10000000000000000555111512312578270211815834045410156250

    >>> print(f''{0.2:.56f}'')

    0.20000000000000001110223024625156540423631668090820312500

    >>> print(f''{0.1 + 0.2:.56f}'')

    0.30000000000000004440892098500626161694526672363281250000

    ```


    The last, 0.1 + 0.2, is an example of representation error that accumulates to
    the point that it is no longer hidden by Python''s automatic rounding, hence


    ```

    >>> 0.1 + 0.2

    0.30000000000000004

    ```


    Remember we only work with powers of two. So there''s no way to accurately represent
    these numbers in binary with a fixed number of decimal places.


    # What''s the point?


    +   1. The subset of real numbers that can be accurately represented within a
    given positional system depends on the base chosen (1/3 cannot be represented
    without error in the decimal system, but it can be in base 3).

    2. It''s important that we understand that *no finite machine can represent all
    real numbers without error*.

    3. Most numbers that we provide to the computer and which the computer provides
    to us in the form of answers are *only approximations*.

    4. Perhaps most important from a practical standpoint, *representation error can
    accumulate with repeated calculations*.

    5. Understanding representation error can prevent you from chasing bugs when none
    exist.


    For more, see:


    +   - Floating Point Arithmetic: Issues and Limitations: https://docs.python.org/3.10/tutorial/floatingpoint.html.'
