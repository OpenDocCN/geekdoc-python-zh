  md: "# Chapter 11\n\n# Loops and iteration\n\nIn this chapter, we introduce *loops*.\
    \ With loops, we can automate repetitive tasks or calculations. Why are they called\
    \ loops? Well, so far we've seen code which (apart from function calls) progresses\
    \ in a linear fashion from beginning to end (even if there are branches, we still\
    \ proceed in a linear fashion). Loops change the shape of the execution of our\
    \ code in a very interesting and powerful way. They loop!\n\nLooping allows portions\
    \ of our code to execute repeatedly—either for a fixed number of times or while\
    \ some condition holds—before moving on to execute the rest of our code.\n\nPython\
    \ provides us with two types of loop: `for` loops and `while` loops. `for` loops\
    \ work by iterating over some iterable object, be it a list, a tuple, a range,\
    \ or even a string. `while` loops continue as long as some condition is true.\n\
    \n```\nword = \"cat\"\n\nfor letter in word:\n    print(letter)\n\nprint(\"All\
    \ done!\")\n```\n\nWith variables, functions, branching, and loops, we have all\
    \ the tools we need to create powerful programs. All the rest, as they say, is\
    \ gravy.\n\n# Learning objectives\n\n+   - You will learn how to use `for` loops\
    \ and `while` loops."
