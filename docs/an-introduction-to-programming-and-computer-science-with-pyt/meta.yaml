    except ValueError:\n    print(f'\"{s}\" was not found in {lst}.')\n```\n\n# Dos\
    \ and don’ts\n\nDo:\n\n+   - Keep try blocks as small as possible.\n- Catch and\
    \ handle specific exceptions.\n- Avoid catching and handling IndexError, TypeError,\
    \ NameError. When these occur, it’s almost always due to a defect in programming.\
    \ Catching and handling these exceptions can hide defects that should be corrected.\n\
    - Use separate except blocks to handle different kinds of exceptions.\n\nDon’t:\n\
    \n+   - Write one handler for different exception types.\n- Wrap all your code\
    \ in one big try block.\n- Use exception handling to hide programming errors.\n\
    - Use bare except: or except Exception:—these are too general and might catch\
    \ things you shouldn’t.\n\n# 15.3 Exceptions and flow of control\n\nWhile it’s\
    \ considered pythonic to use exceptions and to follow the rule of EAFP (“easier\
    \ to ask for forgiveness than permission”), it is unwise to use exceptions for\
    \ controlling the flow of program execution except within very narrow limits.\n\
    Here are some rules to follow:\n\n+   - Keep try and except blocks as small as\
    \ possible.\n- Handle an exception in the most simple and direct way possible.\n\
    - Avoid calling another function from within an except block which might send\
    \ program flow away from the point where the exception was raised."
