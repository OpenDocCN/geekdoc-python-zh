  md: "We can use this to govern how many iterations we wish to perform and also to\
    \ provide data that we can use in our tasks or calculations.\nIn the following\
    \ sections, we'll give a thorough treatment of both kinds of loop: while and for.\n\
    \n# 11.2 while loops\n\nSometimes, we wish to perform some task or calculation\
    \ repetitively, but we only want to do this under certain conditions. For this\
    \ we have the while loop. A while loop continues to execute, *as long as some\
    \ condition is true or has a truthy value*.\nImagine you're simulating a game\
    \ of blackjack, and it's the dealer's turn. The dealer turns over their down card,\
    \ and if their total is less than 17 they must continue to draw until they reach\
    \ 17 or they go over 21.¹ We don't know how many cards they'll draw, but they\
    \ must continue to draw until the condition is met. A while loop will repeat as\
    \ long as some condition is true, so it's perfect for a case like this.\nHere's\
    \ a little snippet of Python code, showing how we might use a while loop.\n\n\
    ```\n# Let's say the dealer has a five showing, and\n# then turns over a four.\
    \ That gives the dealer\n# nine points. They *must* draw.\ndealer = 9\n\nprompt\
    \ = \"What's the value of the next card drawn? \"\n\nwhile dealer < 17:\n    next_card\
    \ = int(input(prompt))\n    dealer = dealer + next_card\n\nif dealer <= 21:\n\
    \    print(f\"Dealer has {dealer} points!\")\nelse:\n    print(f\"Oh, dear. \"\
    \n          f\"Dealer has gone over with {dealer} points!\")\n```\n\nHere the\
    \ dealer starts with a total of nine. Then, in the while loop, we keep prompting\
    \ for the number of points to be added to the dealer's hand. Points are added\
    \ to the value of dealer. This loop will continue to execute as long as the dealer's\
    \ score is less than 17. We see this in the while condition:\n\n```\nwhile dealer\
    \ < 17:\n    ...\n```\n\nNaturally, this construction raises some questions.\n\
    \n¹If you're unfamiliar with the rules of blackjack, see https://en.wikipedia.org/wiki/Blackjack"
