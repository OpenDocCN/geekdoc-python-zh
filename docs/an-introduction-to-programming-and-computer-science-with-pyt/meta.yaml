- md: "## The .strip() method\n\nSometimes—especially when reading certain data from\
    \ a file—we wish to remove whitespace, including spaces, tabs, and newlines from\
    \ strings. One approach is to use the .strip() method. Without any argument supplied,\
    \ .strip() removes all leading and trailing whitespace and newlines.\n\n```\n\
    >>> s = '\\nHello     \\t   \\n'\n>>> s.strip()\n'Hello'\n```\n\nOr you can specify\
    \ the character you wish to remove.\n\n```\n>>> s = '\\nHello     \\t   \\n'\n\
    >>> s.strip('\\n')\n'Hello     \\t   '\n```\n\nThis method allows more complex\
    \ behavior (but I find the use cases rare). For more on .strip() see: https://docs.python.org/3/library/stdtypes.html?highlight=strip#str.strip\n\
    \n## 13.6 The csv module\n\nThere's a very common format in use for tabular data,\
    \ the CSV or comma separated value format. Many on-line data sources publish data\
    \ in this format, and all spreadsheet software can read from and write to this\
    \ format. The idea is simple: columns of data are separated by commas. That's\
    \ it!\n\nHere's an example of some tabular data:\n\n| Year | FIFA champion |\n\
    |------|---------------|\n| 2018 | France        |\n| 2014 | Germany       |\n\
    | 2010 | Spain         |\n| 2006 | Italy         |\n| 2002 | Brazil        |\n\
    \nHere's how it might be represented in CSV format:\n\n```\nYear,FIFA champion\n\
    2018,France\n2014,Germany\n2010,Spain\n2006,Italy\n2002,Brazil\n```\n\nPretty\
    \ simple.\n\nWhat happens if we have commas in our data? Usually numbers don't\
    \ include comma separators when in CSV format. Instead, commas are added only\
    \ when data are displayed. So, for example, we might have data like this (using\
    \ format specifiers):\n\n| Country | 2018 population |\n| --- | --- |\n| China\
    \ | 1,427,647,786 |\n| India | 1,352,642,280 |\n| USA | 327,096,265 |\n| Indonesia\
    \ | 267,670,543 |\n| Pakistan | 212,228,286 |\n| Brazil | 209,469,323 |\n| Nigeria\
    \ | 195,874,683 |\n| Bangladesh | 161,376,708 |\n| Russia | 145,734,038 |\n\n\
    and the CSV data would look like this:\n\n```\nCountry,2018 population\nChina,1427647786\n\
    India,1352642280\nUSA,327096265\nIndonesia,267670543\nPakistan,212228286\nBrazil,209469323\n\
    Nigeria,195874683\nBangladesh,161376708\nRussia,145734038\n```\n\nBut what if\
    \ we *really* wanted commas in our data?\n\n| Building | Address |\n| --- | ---\
    \ |\n| Waterman | 85 Prospect St, Burlington, VT |\n| Innovation | 82 University\
    \ Pl, Burlington, VT |\n\nWe'd probably break this into additional columns.\n\n\
    ```\nBuilding,Street,City,State\nWaterman,85 Prospect St,Burlington,VT\nInnovation,82\
    \ University Pl,Burlington,VT\n```\n\nWhat if we really, *really* had to have\
    \ commas in our data? Oh, OK. Here are cousin David's favorite bands of all time:\n\
    \n| Band | Rank |\n| --- | --- |\n| Lovin' Spoonful | 1 |\n| Sly and the Family\
    \ Stone | 2 |\n| Crosby, Stills & Nash | 3 |\n| Earth, Wind and Fire | 4 |\n|\
    \ Herman's Hermits | 5 |\n| Iron Butterfly | 6 |\n| Blood, Sweat & Tears | 7 |\n\
    | The Monkees | 8 |\n| Peter, Paul & Mary | 9 |\n| Ohio Players | 10 |\n\nNow\
    \ there's no way around commas in the data. For this we wrap the data including\
    \ commas in quotation marks.\n\n```\nBand,Rank\nLovin' Spoonful,1\nSly and the\
    \ Family Stone,2\n\"Crosby, Stills, Nash and Young\",3\n\"Earth, Wind and Fire\"\
    ,4\nHerman's Hermits,5\nIron Butterfly,6\n\"Blood, Sweat & Tears\",7\nThe Monkees,8\n\
    \"Peter, Paul & Mary\",9\nOhio Players,10\n```\n\n(We'll save the case of data\
    \ which includes commas *and* quotation marks for another day.)\n\nWe can read\
    \ data like this using Python's csv module.\n\n```\nimport csv\nwith open('bands.csv',\
    \ newline='') as csvfile:\n    reader = csv.reader(csvfile)\n    for row in reader:\n\
    \        print(row)\n```\n\nThis prints:\n\n```\n['Band', 'Rank']\n[\"Lovin' Spoonful\"\
    , '1']\n['Sly and the Family Stone', '2']\n['Crosby, Stills, Nash and Young',\
    \ '3']\n['Earth, Wind and Fire', '4']\n[\"Herman's Hermits\", '5']\n['Iron Butterfly',\
    \ '6']\n['Blood, Sweat & Tears', '7']\n['The Monkees', '8']\n['Peter, Paul & Mary',\
    \ '9']\n['Ohio Players', '10']\n```\n\nNotice that we have to create a special\
    \ object, a CSV reader. We *instantiate* this object by calling the *constructor*\
    \ function, csv.reader(), and we pass to this function the file *object* we wish\
    \ to read. Notice also that we read each row of our data file into a list, where\
    \ the columns are separated by commas. That's very handy!\n\nWe can write data\
    \ to a CSV file as well.\n\n```\nimport csv\n\nbands = [['Deerhoof', 1],\n   \
    \      ['Lightning Bolt', 2],\n         ['Radiohead', 3],\n         ['Big Thief',\
    \ 4],\n         ['King Crimson', 5],\n         ['French for Rabbits', 6],\n  \
    \       ['Yak', 7],\n         ['Boygenius', 8],\n         ['Tipsy', 9],\n    \
    \     ['My Bloody Valentine', 10]]\n\nwith open('bands.csv', 'w', newline='')\
    \ as csvfile:\n    writer = csv.writer(csvfile)\n    for item in bands:\n    \
    \    writer.writerow(item)\n```\n\nThis writes\n\n```\nDeerhoof,1\nLightning Bolt,2\n\
