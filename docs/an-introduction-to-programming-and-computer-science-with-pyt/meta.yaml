  md: 'Once the algorithm has terminated, we have a list of the visited towns, in
    the order they were visited.


    Needless to say, this isn''t a very sophisticated approach. For example, we don''t
    consider the distances traveled, and we have a very simple graph. But this suffices
    for a demonstration of BFS.


    # A worked example


    Here''s a complete, worked example of breadth-first search. It might help for
    you to go over this while checking the map (above).


    Say we choose St Johnsbury as a starting point. Thus, the list of visited towns
    will be St Johnsbury, and the queue will contain only St Johnsbury. Then, in a
    while loop...


    First, we pop St Johnsbury from the front of the queue, and we check its neighbors.
    Its neighbors are Montpelier, Newport, and White River Junction so we append Montpelier,
    Newport, and White River Junction to the list of visited towns, and to the queue.
    At this point, the queue looks like this:


    ```

    [''Montpelier'', ''Newport'', ''White River Junction'']

    ```


    At the next iteration, we pop Montpelier from the front of the queue. Now, when
    we check Montpelier''s neighbors, we find Burlington, White River Junction, and
    St Johnsbury. St Johnsbury has already been visited and so has White River Junction,
    so we leave them be. However, we have not visited Burlington, so we append it
    to the list of visited towns and to the queue. At this point, the queue looks
    like this:


    ```

    [''Newport'', ''White River Junction'', ''Burlington'']

    ```


    At the next iteration, we pop Newport from the front of the queue. We check Newport''s
    neighbors and find only St Johnsbury, so there''s nothing to append to the queue.
    At this point, the queue looks like this:


    ```

    [''White River Junction'', ''Burlington'']

    ```


    At the next iteration we pop White River Junction from the front of the queue.
    White River Junction is adjacent to Montpelier (already visited), Brattleboro,
    and St Johnsbury (already visited). So we append Brattleboro to visited list and
    to the queue. At this point, the queue looks like this:


    ```

    [''Burlington'', ''Brattleboro'']

    ```


    At the next iteration, Burlington is popped from the queue. Now we check Burlington''s
    neighbors, and we find St Albans, Montpelier (already visited), and Middlebury.
    Montpelier we''ve already visited, but St Albans and Middlebury haven''t been
    visited yet, so we append them to the list of visited towns and to the queue.
    At this point, the queue looks like this:'
  merge: -1
  pgno: 342
- img_proc: true
  md: '[''Brattleboro'', ''St Albans'', ''Middlebury'']


    At the next iteration, Brattleboro is popped from the front of the queue. Brattleboro
    is adjacent to White River Junction (already visited). At this point, the queue
    looks like this:


    [''St Albans'', ''Middlebury'']


    At the next iteration, we pop St Albans from the front of the queue. We check
    St Albans''s neighbors. These are Burlington (already visited) and Swanton. So
    we append Swanton to the visited list and to the queue. At this point, the queue
    looks like this:


    [''Middlebury'', ''Swanton'']


    At the next iteration, we pop Middlebury from the queue, and we check its neighbors.
    Its neighbors are Burlington (already visited) and Rutland. Rutland is new, so
    we append it to the visited list and to the queue. At this point, the queue looks
    like this:


    [''Swanton'', ''Rutland'']


    At the next iteration, we pop Swanton from the front of the queue. Swanton''s
    only neighbor is St Albans and that''s already visited so we do nothing. At this
    point, the queue looks like this:


    [''Rutland'']


    At the next iteration we pop Rutland from the front of the queue. Rutland''s neighbors
    are Bennington and Middlebury. We''ve already visited Middlebury, but we haven''t
    visited Bennington, so we add it to the list of visited towns and to the queue.
    At this point, the queue looks like this:


    [''Bennington'']


    At the next iteration we pop Bennington. Bennington''s sole neighbor is Rutland
    (already visited), so we do nothing. At this point, the queue looks like this:


    []


    With nothing added to an empty queue, the queue remains empty, and the while loop
    terminates. (Remember: an empty list is falsey.) At this point we have a complete
    list of all the visited towns in the order they were visited:


    St Johnsbury, Montpelier, Newport, White River Junction, Burlington, Brattleboro,
    St Albans, Middlebury, Swanton, Rutland, and Bennington.'
