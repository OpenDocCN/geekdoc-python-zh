    # 7.1 Motivation


    It''s often the case that as we are writing code, we don''t have all the information
    we need for our program to produce the desired result. For example, imagine you
    were asked to write a calculator program. No doubt, such a program would be expected
    to add, subtract, multiply, and divide. But *what* should it add? *What* should
    it multiply? You, as the programmer, would not know in advance. Thus, you''d need
    a way to get information from the user *into* the program.


    Of course, there are many ways to get input from a user. The most common, perhaps,
    is via a *graphical user interface* or *GUI*. Most, or likely all, of the software
    you use on your laptop, desktop, tablet, or phone makes use of a GUI.


    In this chapter, we''ll see how to get input in the most simple way, without having
    to construct a GUI. Here we''ll introduce getting user input from the console.
    Later, in Chapter 13, we''ll learn how to read data from an external file.


    # 7.2 Command line interface


    We''ve seen how to use the Python shell, where we type expressions or other Python
    code and it''s executed interactively.


    What we''ll learn now is how to write what are called *CLI* programs. That''s
    short for *command line interface*. This distinguishes them from GUI or graphical
    user interface programs.


    When we interact with a CLI program, we run it from the command line (or within
    your IDE) and we enter data and view program output in text format. We often refer
    to this interaction as taking place within the *console*. The console is just
    a window where we receive text prompts, and reply by typing at the keyboard.


    This has a similar feel to the Python shell: prompt then reply, prompt then reply.


