    \ newline='') as fh:\n    reader = csv.reader(fh)\n    next(reader)  # skip the\
    \ first row (column headings)\n    for row in reader:\n        data.append(float(row[1]))\n\
    ```\n\nWe can write a function to calculate the mean. It's a simple one-liner.\n\
    \n```\ndef mean(lst):\n    return sum(lst) / len(lst)\n```\n\nThat's a complete\
    \ implementation of the formula:\n\n$$\\mu = \\frac{1}{N} \\sum_{i=0}^{N-1} x_i$$\n\
    \nWe take all the $x_i$ and add them up (with `sum()`). Then we get the number\
    \ of elements in the set (with `len()`) and use this as the divisor. If we print\
    \ the result with `print(f\"{mean(data):.4f}\")` we get 5.1391.\n\nThat tells\
    \ us a little about the data set: on average (for the sample of countries included)\
    \ there are a little over five dentists per 10,000 population. If everyone were\
    \ to go to the dentist once a year, that would suggest, on average, that each\
    \ dentist serves a little less than 2,000 patients per year. With roughly 2,000\
    \ working hours in a year, that seems plausible. But the mean doesn't tell us\
    \ much more than that.\n\nTo get a better understanding of the data, it's helpful\
    \ to understand how values are distributed about the mean.\n\nLet's say we didn't\
    \ know anything about the distribution of values about the mean. It would be reasonable\
    \ for us to assume these values are *normally distributed*. There's a function\
    \ which describes the *normal distribution*, and you've likely seen the so-called\
    \ \"bell curve\" before.\n\n![](img/c79d476b9b167832781fbb4257bb2cb9_297_0.png)\n\
    \nOn the $x$-axis are the values we might measure, and on the $y$-axis we have\
    \ the probability of observing a particular value. In a normal distribution, the\
    \ mean is the most likely value for an observation, and the greater the distance\
    \ from the mean, the less likely a given value. The *standard deviation* tells\
    \ us how spread out values are about the mean. If the standard deviation is large,\
    \ we have a broad curve:\n\n![](img/c79d476b9b167832781fbb4257bb2cb9_298_0.png)\n\
    \nWith a smaller standard deviation, we have a narrow curve with a higher peak.\n\
    \n![](img/c79d476b9b167832781fbb4257bb2cb9_298_1.png)\n\nThe area under these\
    \ curves is equal.\n\n![](img/c79d476b9b167832781fbb4257bb2cb9_299_0.png)\n\n\
    If we had a standard deviation of zero, that would mean that every value in the\
    \ data set is identical (that doesn’t happen often). The point is that the greater\
    \ the standard deviation, the greater the variation there is in the data.\n\n\
    Just like we can calculate the mean of our data, we can also calculate the standard\
    \ deviation. The **standard deviation**, written $\\sigma$, is given by\n\n$$\\\
    sigma = \\frac{1}{N} \\sqrt{\\sum_{i=0}^{N-1} (x_i - \\mu)^2}.$$\n\nLet’s unpack\
    \ this. First, remember the goal of this measure is to tell us how much variation\
    \ there is in the data. But variation with respect to what? Look at the expression\
    \ $(x_i - \\mu)^2$. We subtract the mean, $\\mu$, from each value in the data\
    \ set $x_i$. This tells us how far the value of a given observation is from the\
    \ mean. But we care more about the distance from the mean rather than whether\
    \ a given value is above or below the mean. That’s where the squaring comes in.\
    \ When we square a positive number we get a positive number. When we square a\
    \ negative number we get a positive number. So by squaring the difference between\
    \ a given value and the mean, we’re eliminating the sign. Then, we divide the\
    \ sum of these squared differences by the number of elements in the data set (just\
    \ as we do when calculating the mean). Finally, we take the square root of the\
    \ result. Why do we do this? Because by squaring the differences, we stretch them,\
    \ changing the scale. For example, $5 - 2 = 3$, but $5^2 - 2^2 = 25 - 4 = 21$.\
    \ So this last step, taking the square root, returns the result to a scale appropriate\
    \ to the data. This is how we calculate standard deviation.$^2$\n\nAs we calculate\
    \ the summation, we perform the calculation $(x_i - \\mu)^2$. On this account,\
    \ we cannot use sum(). Instead, we must calculate this in a loop. However, this\
    \ is not too terribly complicated, and implementing this in Python is left as\
    \ an exercise for the reader.\n\n> $^2$Strictly speaking, this is the *population*\
    \ standard deviation, and is used if the data set represents the entire universe\
    \ of possible observations; rather than just a sample. There’s a slightly different\
    \ formula for the *sample* standard deviation.\n\nAssuming we have implemented\
    \ this correctly, in a function named `std_dev()`, if we apply this to the data\
    \ and print with `print(f\"{std_dev(data):.4f}\")`, we get 4.6569.\n\nHow do we\
    \ interpret this? Again, the standard deviation tells us how spread out values\
    \ are about the mean. Higher values mean that the data are more spread out. Lower\
    \ values mean that the data are more closely distributed about the mean.\n\nWhat\
    \ practical use is the standard deviation? There are many uses, but it's commonly\
    \ used to identify unusual or \"unlikely\" observations.\n\nWe can calculate the\
    \ area of some portion under the normal curve. Using this fact, we know that given\
    \ a normal distribution, we'd expect to find 68.26% of observations within one\
    \ standard deviation of the mean. We'd expect 95.45% of observations within two\
    \ standard deviations of the mean. Accordingly, the farther from the mean, the\
    \ less likely an observation. If we express this distance in standard deviations,\
    \ we can determine just how likely or unlikely an observation might be (assuming\
    \ a normal distribution). For example, an observation that's more than five standard\
    \ deviations from the mean would be very unlikely indeed.\n\n| Range | Expected\
    \ fraction in range |\n| :--- | :--- |\n| $\\mu \\pm \\sigma$ | 68.2689% |\n|\
    \ $\\mu \\pm 2\\sigma$ | 95.4500% |\n| $\\mu \\pm 3\\sigma$ | 99.7300% |\n| $\\\
    mu \\pm 4\\sigma$ | 99.9937% |\n| $\\mu \\pm 5\\sigma$ | 99.9999% |\n\nWhen we\
    \ have real-world data, it's not often perfectly normally distributed. By comparing\
    \ our data with what would be expected if it were normally distributed we can\
