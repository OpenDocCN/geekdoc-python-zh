    \n## 5.7 异常\n\n### IndentationError\n\n在 Python 中，与许多其他语言不同，缩进在语法上具有重要意义。我们已经看到，在定义函数时，函数体必须缩进（我们很快会看到缩进的其他用途）。\n\
