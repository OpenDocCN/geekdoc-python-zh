    no elements.

    The elements of a tuple can be of any type—including another tuple! The elements
    of a tuple needn''t be the same type. That is, tuples can be *heterogeneous*.

    While not strictly required by Python syntax (except in the case of the empty
    tuple), it is conventional to write tuples with enclosing parentheses. Examples
    of tuples: `()`, `(42, 71, 99)`, `(x, y)`, `(''cheese'', 11, True)`, *etc*.

