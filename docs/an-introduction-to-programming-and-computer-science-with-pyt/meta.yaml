    ```\n\nAt this point, we have both labels `source_label` and `target_label`, the\
    \ amount we wish to convert stored as `source_amount`, and the exchange rate stored\
    \ as `exchange_rate`. The labels are of type `str`. The source amount and the\
    \ exchange rate are of type `float`.\nGiving these objects significant names (rather\
    \ than `x`, `y`, `z`, ...) makes the code easy to read and understand.\nNow, on\
