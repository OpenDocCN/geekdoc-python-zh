    # What happens if the while condition is never met?


    Let''s say we called the serve_coffee() function (above), with the arguments,
    6, lst, and 8, where lst is some arbitrary list of orders:


    ```

    serve_coffee(6, lst, 8)

    ```


    In this case, when we check the while condition the first time, the condition
    fails, because six is not greater than or equal to eight. Thus, the body of the
    loop would never execute, and the function would report:


    We have served 0 customers, and we have only 6 ounces remaining.


    So it''s possible that the body of any given while loop might never be executed.
    If, at the start, the while condition is false, Python will skip past the loop
    entirely!


    # 11.3 Input validation with while loops


    A common use for a while loop is *input validation*.


    Let''s say we want the user to provide a number from 1 to 10, inclusive. We present
    the user with a prompt:


    ```

    Pick a number from 1 to 10:

    ```


    So far, we''ve only seen how to complain to the user:


    ```

    Pick a number from 1 to 10: 999

    You have done a very bad thing.

    I will terminate now and speak to you no further!

    ```


    That''s not very user-friendly! Usually what we do in cases like this is we continue
    to prompt the user until they supply a suitable value.


    ```

    Pick a number from 1 to 10: 999

    Invalid input.

    Pick a number from 1 to 10: -1

    Invalid input.

    Pick a number from 1 to 10: 7

    You have entered 7, which is a very lucky number!

    ```


    But here''s the problem: We don''t know how many tries it will take for the user
    to provide a valid input! Will they do so on the first try? On the second try?
    On the fourth try? On the twelfth try? We just don''t know! Thus, a while loop
    is the perfect tool.


    How would we implement such a loop in Python? What would serve as a condition?'
