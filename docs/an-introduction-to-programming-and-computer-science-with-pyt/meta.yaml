  md: '# Boolean logic and Boolean expressions


    True is true, and false is false (big surprise, I know).

    Now let''s go crazy and mix it up. We''ll begin with the Boolean connective *not*.
    *not* simply negates the value or expression which follows.


    | Expression | Truth value |

    |---|---|

    | True | True |

    | False | False |

    | not True | False |

    | not False | True |


    Now let''s see what happens with the other connectives, *and* and *or*. Some languages
    have special symbols for these (e.g., Java uses && and || for *and* and *or* respectively).
    In Python, we simply use and and or. When we use these connectives, we refer to
    the expressions being connected as *clauses*.


    | Expression | Truth value |

    |---|---|

    | True and True | True |

    | True and False | False |

    | False and True | False |

    | False and False | False |


    So when using the conjunctive *and*, the expression is true if and only if both
    clauses are true. In all other cases (above) the expression is false.

    Here''s *or*.


    | Expression | Truth value |

    |---|---|

    | True or True | True |

    | True or False | True |

    | False or True | True |

    | False or False | False |


    You see, in the case of *or*, as long as one clause is true, the entire expression
    is true. It is only when both clauses are false that the entire expression is
    false.

    We refer to clauses joined by *and* as a *conjunction*. We refer to clauses joined
    by *or* as a *disjunction*. Let''s try this out in the Python shell:


    ```

    >>> True

    True

    >>> False

    False

    >>> not True

    False

    >>> not False

    True

    >>> True and True

    ```'
