    本章将通过介绍类型和字面量来扩展我们对编程的理解。Python中的所有对象都有一个*类型*，而*字面量*是给定类型的固定值。例如，字面量1是一个整数，其类型为`int`（“integer”的缩写）。Python有许多不同的类型。\n\
    \n## 学习目标\n\n- 你将了解Python中许多常用的类型。\n- 你将理解为什么我们需要不同的类型。\n- 你将能够编写各种类型的字面量。\n-\
