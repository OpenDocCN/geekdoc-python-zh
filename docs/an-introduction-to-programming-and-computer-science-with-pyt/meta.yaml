  md: 'Now, just like we can access individual members of the math module with the
    member (.) operator (e.g., math.pi, math.sqrt(2), math.sin(0.478), etc.) we can
    access string methods the same way!


    For example, the capitalize() method can be called for any string object, and
    it will return a copy of the string with the first character capitalized (note:
    this does not modify the string, it just returns a copy of the string).


    ```

    >>> s = ''mephistopheles''  # note: this is all lower case

    >>> s.capitalize()

    ''Mephistopheles''

    ```


    Here''s another method: upper() (you can guess what this does).


    ```

    >>> s = ''mephistopheles''  # note: this is all lower case

    >>> s.upper()

    ''MEPHISTOPHELES''

    ```


    Now what if we had a string in all upper case, but wanted it in lower case?


    ```

    >>> s = ''PLEASE STOP YELLING''

    >>> s.lower()

    ''please stop yelling''

    ```


    As you might imagine, these can come in handy, and there are many more (take a
    peek at Built-in Types (https://docs.python.org/3/library/stdtypes.html) and scroll
    down to String Methods if you''re curious).


    It is important to keep in mind that these do not alter the string''s value, they
    only return an altered copy of the string.


    ```

    >>> s = ''PLEASE STOP YELLING''

    >>> s.lower()

    ''please stop yelling''

    >>> s

    ''PLEASE STOP YELLING''

    ```


    If you want to use the result returned by these methods you may need to assign
    the result to a new object or overwrite the value of the current variable, thus:


    ```

    >>> s = ''PLEASE STOP YELLING''

    >>> s = s.lower()

    >>> s

    ''please stop yelling''

    ```


    This isn''t always necessary, but keep this in mind.'
