    \nWhen we iterate over a string, the iterator returns one character at a time.\
    \ Here's an example:\n\n```\n>>> word = \"cat\"\n>>> for letter in word:\n...\
    \     print(letter)\n...\nc\na\nt\n```\n\n# 11.8 Calculating a sum in a loop\n\
    \nWhile we have the Python built-in function sum() which sums the elements of\
    \ a sequence (provided the elements of the sequence are all of numeric type),\
    \ it's instructive to see how we can do this in a loop (in fact, summing in a\
    \ loop is *exactly* what the sum() function does).\n\nHere's a simple example.\n\
    \n```\nt = (27, 3, 19, 43, 11, 9, 31, 36, 75, 2)\n\nsum_ = 0\n\nfor n in t:\n\
    \    sum_ += n\n\nprint(sum_)           # prints 256\nassert sum_ == sum(t) #\
    \ verify answer\n```"
  - "[PAGE 251]\n\nWe begin with a tuple of numeric values, t. Since the elements\
    \ of t are all numeric, we can calculate their sum. First, we create a variable\
    \ to hold the result of the sum. We call this, sum_. Then, we iterate over all\
    \ the elements in t, and at each iteration of the loop, we add the value of each\
    \ element to the variable sum_. Once the loop has terminated, sum_ holds the sum\
    \ of all the elements of t. Then we print, and compare with the result returned\
    \ by sum(t) to verify this is indeed the correct result.\n\nIn calculations like\
    \ this we call the variable, sum_, an *accumulator* (because it accumulates the\
    \ values of the elements in the iteration).\n\nThat's how we calculate a sum in\
    \ a loop!\n\n# 11.9 Loops and summations\n\nIt is often the case that we have\
    \ some formula which includes a *summation*, and we wish to implement the summation\
    \ in Python.\n\nFor example, the formula for calculating the arithmetic mean of\
    \ a list of numbers requires that we first sum all the numbers:\n\n$$\\mu = \\\
    frac{1}{N} \\sum_{i=0}^{N-1} x_i$$\n\nIf you've not seen the symbol $\\sum$ before,\
    \ it's just shorthand for \"add them all up.\"\n\nWhat's the connection between\
    \ summations and loops? The summation *is a loop!*\n\nIn the formula above, there's\
    \ some list of values, $x$ indexed by $i$. The summation says: \"Take all the\
    \ elements, $x_i$, and sum them.\" The summation portion is just\n\n$$\\sum_{i=0}^{N-1}\
    \ x_i$$\n\nwhich is the same as\n\n$$x_0 + x_1 + \\dots + x_{N-2} + x_{N-1}$$\n\
    \nHere's the loop in Python (assuming we have some list called x):\n\n```\ns =\
    \ 0\nfor e in x:\n    s = s + e\n```\n\nafter which, we'd divide by the number\
    \ of elements in the list:\n\n```\nmean = s / len(x)\n```\n\nYes, we could calculate\
    \ the sum with sum() but what do you think sum() does behind the scenes? Exactly\
    \ this!\n\n> Why do we use the trailing underscore? To avoid overwriting the Python\
    \ built-in function sum() with a new definition."
  - "[PAGE 252]\n\nHere’s another. Let’s say we wanted to calculate the sum of the\
    \ squares of a list of numbers (which is common enough). Here’s the summation\
    \ notation (again using zero indexing):\n\n$$\\sum_{i=0}^{N-1} x_i^2$$\n\nHere’s\
    \ the loop in Python:\n\n```\ns = 0\nfor e in x:\n    s = s + e ** 2\n```\n\n\
    See? The connection between summations and loops is straightforward.\n\n# 11.10\
    \ Products\n\nThe same applies to products. Just as we can sum by adding all the\
    \ elements in some list or tuple of numerics, we can also take their product by\
    \ multiplying. For this, instead of the symbol $\\sum$, we use the symbol $\\\
    Pi$ (that’s an upper-case $\\Pi$ to distinguish it from the constant $\\pi$).\n\
    \n$$\\prod_{i=0}^{N-1} x_i$$\n\nThis is the same as\n\n$$x_0 \\times x_1 \\times\
    \ \\dots \\times x_{N-2} \\times x_{N-1}$$\n\nThe corresponding loop in Python:\n\
    \n```\np = 1\nfor e in x:\n    p = p * e\n```\n\nWhy do we initialize the accumulator\
    \ to 1? Because that’s the multiplicative identity. If we set this equal to zero\
