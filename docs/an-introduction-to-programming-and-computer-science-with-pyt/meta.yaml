  md: '# Swapping variables with tuple unpacking


    In many languages, swapping variables requires a temporary variable. Let''s say
    we wanted to swap the values of variables a and b. In most languages we''d need
    to do something like this:


    ```

    int a = 1

    int b = 2


    // now swap

    int temp = a

    a = b

    b = temp

    ```


    This is unnecessary in Python.


    ```

    a = 1

    b = 2


    # now swap

    b, a = a, b

    ```


    That''s a fun trick, eh?


    # 10.9 Strings are sequences


    We''ve already seen another sequence type: strings. Strings are nothing more than
    immutable sequences of characters (more accurately sequences of Unicode code points).
    Since a string is a sequence, we can use index notation to read individual characters
    from a string. For example:


    ```

    >>> word = "omphaloskepsis"  # which means "navel gazing"

    >>> word[0]

    ''o''

    >>> word[-1]

    ''s''

    >>> word[2]

    ''p''

    ```


    We can use in to check whether a substring is within a string. A substring is
    one or more contiguous characters within a string.


    ```

    >>> word = "omphaloskepsis"

    >>> "k" in word

    True

    >>> "halo" in word

    True

    >>> "chicken" in word

    False

    ```'
