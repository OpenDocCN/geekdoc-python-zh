    \ program code after the loop.\n\nNote that we don't re-evaluate the condition\
    \ after exiting the loop.\n\n# Another example: coffee shop queue with limited\
    \ coffee\n\nHere's another example of using a while loop.\n\nLet's say we have\
    \ a queue of customers at a coffee shop. They all want coffee (of course). The\
    \ coffee shop offers small (8 oz), medium (12 oz) and large (20 oz) coffees. However,\
    \ the coffee shop has run out of beans and all they have is what's left in the\
