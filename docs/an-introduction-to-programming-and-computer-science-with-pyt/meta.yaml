  md: "In a few places, items which are placeholders for actual values or variable\
    \ names are given in angle brackets, thus <foo>. For example, when describing\
    \ the three-argument syntax for the range() function, we might write range(<start>,\
    \ <stop>, <stride>) to indicate that three arguments must be supplied—the first\
    \ for the start value, the second for the stop value, and the last for the stride.\
    \ It's important to understand that the angle brackets are not part of the syntax,\
    \ but are merely a typographic convention to indicate where an appropriate substitution\
    \ must be made.\n\nAll of these conventions are in accord with the typographical\
    \ conventions used in the official Python documentation at python.org. Hopefully,\
    \ this will make it easier for students when they consult the official documentation.\n\
    \nNote that this use of angle brackets is a little different when it comes to\
    \ traceback messages printed when exceptions occur. There you may see things like\
    \ <stdin> and <module>, and in this context, they are not placeholders requiring\
    \ substitution by the user.\n\n# Other conventions\n\nWhen referring to functions,\
    \ whether built-in, from some imported module, or otherwise, without any other\
    \ context or specific problem instance, we write function identifiers along with\
    \ parentheses (as a visual indicator that we're speaking of a function) but without\
    \ formal parameters. Example: “The range() function accepts one, two, or three\
    \ arguments.” This should not be read as suggesting that range() takes no arguments.\n\
    \n# Entry point / top-level code environment\n\nAs noted in the text, unlike many\
    \ other languages such as C, C++, Java, etc., a function named main() has *no\
    \ special meaning in Python whatsoever*. The correct way to specify the entry\
    \ point of your code in Python is with\n\n```\nif __name__ == '__main__':\n  \
    \  # the rest of your code here\n```\n\nThis is explained fully in Chapter 9.\n\
    \nIn code samples in the book, we do, however, avoid using this *if there are\
    \ no function definitions included in the code*. We do this for space and conciseness\
    \ of the examples. The same could reasonably apply to your code. In most cases,\
    \ if there are no function definitions in your module, there's no need for this\
    \ if statement (though it's fine to include it). However, if there are any function\
    \ definitions in your module, then if __name__ == '__main__': is the correct,\
    \ Pythonic way to segregate your driver code from your function definitions.\n\
    \n# Origin of Python\n\nPython has been around a long time, with the first release\
    \ appearing in 1991 (four years before Java). It was invented by Guido van Rossum,\
    \ who is now officially Python's benevolent dictator for life (BDFL)."
