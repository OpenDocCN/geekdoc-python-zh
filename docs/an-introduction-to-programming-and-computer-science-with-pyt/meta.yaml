    \nComputers are powerful tools. Computers can perform all manner of tasks: communication,\
    \ computation, managing and manipulating data, modeling natural phenomena, and\
    \ creating images, videos, and music, just to name a few. However, computers don't\
    \ read minds (yet), and thus we have to provide instructions to computers so they\
    \ can perform these tasks.\n\nComputers don't speak natural languages (yet)—they\
    \ only understand binary code. Binary code is unreadable by humans.\n\nFor example,\
    \ a portion of an executable program might look like this (in binary):\n\n```\n\
    0110101101101011 1100000000110101 1011110100100100\n1010010100100100 0010100100010011\
    \ 1110100100010101\n1110100100010101 0001110110000000 1110000111100000\n0000100000000001\
    \ 0100101101110100 0000001000101011\n0010100101110000 0101001001001001 1010100110101000\n\
    ```\n\nThis is unintelligible. It's bad enough to try to read it, and it would\
    \ be even worse if we had to write our computer programs in this fashion.\n\n\
    Computers don't speak human language, and humans don't speak computer language.\
    \ That's a problem. The solution is *programming languages*.\n\nProgramming languages\
