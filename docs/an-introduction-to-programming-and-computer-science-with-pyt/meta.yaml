    to parse it ourselves.


    # Exception handling


    In this chapter, we present simple exception handling (using try/except, but not
    finally), and explain that some exceptions should not be handled since in doing
    so, we can hide programming defects which should be corrected. We also demonstrate
    the use of exception handling in input validation. When you reach this chapter,
    you''ll already have seen while loops for input validation, so the addition of
    exception handling represents only an incremental increase in complexity in this
    context.


    # Data analysis and presentation


    This chapter is motivated in large part by the University of Vermont''s QD (quantitative
    and data literacy) designation for the course for which this textbook was written.
    Accordingly, we present some very basic descriptive statistics and introduce Python''s
    statistics module including statistics.mean(), statistics.pstdev(), and statistics.quantiles().
    The presentation component of this chapter is done using Matplotlib, which is
    the de facto standard for plotting and visualization with Python. This covers
    only the rudiments of Matplotlib''s Pyplot interface (line plot, bar plot, etc.),
    and is not intended as a complete introduction.


    # Dictionaries


    Dictionaries are the last new type we present in the text. Dictionaries store
    information using a key/value model—we look up values in a dictionary by their
    keys. Like sequences, dictionaries are iterable, but since they have keys rather
    than indices, this works a little differently. We''ll see three different ways
    to iterate over a dictionary.


    We''ll also learn about hashability in the context of dictionary keys.


    # Graphs


    Since graphs are so commonplace in computer science, it seems appropriate to include
    a basic introduction to graphs in this text. Plus, graphs are really fun!


    A graph is a collection of vertices (also called nodes) and edges, which connect
    the vertices of the graph. The concrete example of a highway map is used, and
    an algorithm for breadth-first search (BFS) is demonstrated. Since queues were
    introduced in chapter 11, the conceptual leap here—using a queue in the BFS algorithm—shouldn''t
    be too great.'
