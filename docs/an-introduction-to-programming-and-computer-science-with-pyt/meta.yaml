    # Queues


    A queue is a first in, first out linear data structure (FIFO, pronounced fife-o).
    The only difference between a stack and a queue is that with a stack we push and
    pop items from the same end, and with a queue we add elements at one end and remove
    them from the other. That’s the only difference.


    What are some real world examples? The checkout line at a grocery store—the first
    one in line is the first to be checked out. Did you ever wait at a printer because
    someone had sent a job before you did? That’s another queue. Cars through a toll
    booth, wait lists for customer service chats, and so on—real world examples abound.


    The terminology is a little different. We refer to appending an element to a queue
    as *enqueueing*. We refer to removing an element to a queue as *dequeueing*. But
    these are just fancy names for appending and popping.


    ![](img/c79d476b9b167832781fbb4257bb2cb9_263_0.png)


    Like stacks, queues are very widely used in computer science and are at the heart
    of many important algorithms.


    There’s one little twist needed to turn a list into a queue. With a queue, we
    enqueue from one end and dequeue from the other. Like a stack, we can use append
    to enqueue. The little twist is that instead of .pop() which would pop from the
    same end, we use .pop(0) to pop from the other end of the list, and *voilà*, we
    have a queue.


    Here’s a quick example:'
