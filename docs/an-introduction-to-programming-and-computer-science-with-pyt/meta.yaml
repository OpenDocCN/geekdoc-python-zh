    | % | remainder or “modulo” |

    | ** | exponentiation |


    There are other operators, but these will suffice for now. Here we''ll present
    examples of the first four, and we''ll present the others later—floor division,
    modulo, and exponentiation. Let''s try a few (I encourage you follow along and
    try these out in the Python shell as we go).


    ```

    >>> 40 + 2

    42

    >>> 3 * 5

    15

    ```'
  - '[PAGE 65]


    ```

    >>> 5 - 1

    4

    >>> 30 / 3

    10.0

    ```


    Notice that in the last case, when performing division, Python returns a floating-point
    number and not an integer (Python does support what''s called *integer division*
    or *floor division*, but we''ll get to that later). So even if we have two integer
    operands, division yields a floating-point number.


    What do you think would be the result if we were to add the following?


    ```

    >>> 1 + 1.0

    ```


    In a case like this, Python performs *implicit type conversion*, essentially promoting
    1 to 1.0 so it can add like types. Accordingly, the result is:


    ```

    >>> 1 + 1.0

    2.0

    ```


    Python will perform similar type conversions in similar contexts:


    ```

    >>> 2 - 1.0

    1.0

    >>> 3 * 5.0

    15.0

    ```


    # Precedence of operators


    No doubt you''ve learned about *precedence of operations*, and Python respects
    these rules.


    ```

    >>> 40 + 2 * 3

    46

    >>> 3 * 5 - 1

    14

    >>> 30 - 18 / 3

    24.0

    ```


    Multiplication and division have higher precedence than addition and subtraction.
    We also say multiplication and division *bind* more strongly than addition and
    subtraction—this is just a different way of saying the same thing.


    As you might expect, we can use parentheses to group expressions. We do this to
    group operations of lower precedence—either in order to perform the desired calculation,
    or to disambiguate or make our code easier to read, or both.'
  - '[PAGE 66]


    ```

    >>> 40 + (2 * 3)

    46

    >>> 3 * (5 - 1)

    12

    >>> (30 - 18) / 3

    4.0

    ```


    So what happens here? The portions within the parentheses are evaluated first,
    and then Python performs the remaining operation.

    We can construct expressions of arbitrary complexity using these arithmetic operators
    and parentheses.


    ```

    >>> (1 + 1) * (1 + 1 + 1) - 1

    5

    ```


    Python also has *unary operators*. These are operators with a single operand.
    For example, we negate a number by prefixing -.


    ```

    >>> -1

    -1

    >>> -1 + 3

    2

    >>> 1 + -3

    -2

    ```


    We can also negate expressions within parentheses.


    ```

    >>> -(3 * 5)

    -15

    ```


    # Summary of operator precedence


    | Operator | Description |

    | :--- | :--- |

    | ** | exponentiation |

    | +, - | unary positive or negative (+x, -x) |

    | *, /, //, % | multiplication, and various forms of division |

    | +, - | addition and subtraction (x - y, x + y) |


    Expressions grouped within parentheses are evaluated first, so the rule you might
    have learned in high school and its associated mnemonic—PEMDAS (parentheses, exponentiation,
    multiplication and division, addition and subtraction)—apply.'
- md: '## Comprehension check


    1. When evaluating expressions, do you think Python proceeds left-to-right or
    right-to-left? Can you think of an experiment you might perform to test your hypothesis?
    Write down an expression that might provide some evidence.

    2. Why do you think 1 / 1 evaluates to 1.0 (a float) and not just 1 (an integer)?


    ## More on operations


    So far, we''ve seen some simple expressions involving literals, operators, and
    parentheses. We''ve also seen examples of a few types: integers, floating-point
    numbers ("floats" for short), strings, and Booleans. We''ve seen that we can perform
    arithmetic operations on numeric types (integers and floats).


    ## The operators + and * applied to strings


    Certain arithmetic operators behave differently when their operands are strings.
    For example,


    ```

    >>> ''Hello'' + '', '' + ''World!''

    ''Hello, World!''

    ```


    This is an example of *operator overloading*, which is just a fancy way of saying
    that an operator behaves differently in different contexts. In this context, with
    strings as operands, + doesn''t perform addition, but instead performs **concatenation**.
    **Concatenation** is the joining of two or more strings, like the coupling of
    railroad cars. We can also use the multiplication operator * with strings. In
    the context of strings, this operator concatenates multiple copies of a string
    together.


    ```

    >>> ''Foo'' * 1

    ''Foo''

    >>> ''Foo'' * 2

    ''FooFoo''

    >>> ''Foo'' * 3

    ''FooFooFoo''

    ```


    What do you think would be the result of the following?


    ```

    >>> ''Foo'' * 0

    ```


    This gives us '''' which is called the *empty string* and is the result of concatenating
    zero copies of ''Foo'' together. Notice that the result is still a string, albeit
    an empty one.


    ## 4.3 Augmented assignment operators


    As a shorthand, Python provides what are called *augmented assignment* operators.
    Here are some (but not all):


    | augmented assignment | similar to |

    | --- | --- |

    | a += b | a = a + b |

    | a -= b | a = a - b |

    | a *= b | a = a * b |


    A common example is incrementing or decrementing by one.


    ```

    >>> a = 0

    >>> a += 1

    >>> a

    1

    >>> a += 1

    >>> a

    2

    >>> a -= 1

    >>> a

    1

    >>> a -= 1

    >>> a

    0

    ```


    You can use these or not, depending on your own preference.⁵


    ## 4.4 Euclidean or “floor” division


    When presenting expressions, we saw examples of common arithmetic operations:
    addition, subtraction, multiplication, and division. Here we will present two
    additional operations which are closely related: the modulo or “remainder” operator,
    and what’s variously called “quotient”, “floor division”, “integer division” or
    “Euclidean division.”⁶


    Chances are, when you first learned division in primary school, you learned about
    Euclidean (floor) division. For example, 17 ÷ 5 = 3 r 2, or 21 ÷ 4 = 5 r 1. In
    the latter example, we’d call 21 the dividend, 4 the divisor, 5 the quotient,
    and 1 the remainder.


    > ⁵The table above says “similar to” because, for example, a += b isn’t *exactly*
    the same as a = a + b. In augmented assignment, the left-hand side is evaluated
    *before* the right-hand side, then the right-hand side is evaluated and the result
    is assigned to the variable on the left-hand side. There are some other minor
    differences.


    ⁶Euclid had many things named after him, even if he wasn’t the originator (I guess
    fame begets fame). Anyhow, Euclid was unaware of the division algorithm you’re
    taught in primary school. Similar division algorithms depend on the positional
    system of Hindu-Arabic numerals, and these date from around the 12th Century CE.
    The algorithm you most likely learned, called “long division”, dates from around
    1600 CE.


    ## Euclidean or “floor” division


    Obviously the operations of finding the quotient and the remainder are closely
    related. For any two integers $a$, $b$, with $b \neq 0$ there exist unique integers
    $q$ and $r$ such that


    $$a = bq + r$$


    where $q$ is the Euclidean quotient and $r$ is the remainder. Furthermore, $0
    \leq r < |b|$, where $|b|$ is the absolute value of $b$. This should be familiar.


    Just in case you need a refresher:


    ![](img/c79d476b9b167832781fbb4257bb2cb9_69_0.png)


    ![](img/c79d476b9b167832781fbb4257bb2cb9_69_1.png)


    ![](img/c79d476b9b167832781fbb4257bb2cb9_69_2.png)


    ![](img/c79d476b9b167832781fbb4257bb2cb9_70_0.png)


    ## Python''s // and % operators


    Python provides us with operators for calculating quotient and remainder. These
    are // and %, respectively. Here are some examples:


    ```

    >>> 17 // 5  # calculate the quotient

    3

    >>> 17 % 5   # calculate the remainder

    2

    >>> 21 // 4  # calculate the quotient

    5

    >>> 21 % 4   # calculate the remainder

    1

    ```


    You may ask: What''s the difference between the division we saw earlier, /, and
    floor division with //? The difference is that / calculates the quotient as a
    decimal expansion. Here''s a simple comparison:


    ```

    >>> 4 / 3

    1.3333333333333333  # three goes into four 1 and 1/3 times

    >>> 4 // 3          # calculates Euclidean quotient

    1

    >>> 4 % 3           # calculates remainder

    1

    ```


    ## Common questions


    ### What happens when the divisor is zero?


    Just as in mathematics, we cannot divide by zero in Python either. So all of these
    operations will fail if the right operand is zero, and Python will complain: ZeroDivisionError.


    ### What happens if we supply floating-point operands to // or %?


    In both cases, operands are first converted to a common type. So if one operand
    is a float and the other an int, the int will be converted to a float. Then the
    calculations behave as you''d expect.


    ```

    >>> 7 // 2    # if both operands are ints, we get an int

    3

    >>> 7.0 // 2  # otherwise, we get a float...

    3.0

    >>> 7 // 2.0

    3.0

    >>> 7.0 // 2.0

    3.0

    >>> 7 % 2     # if both operands are ints, we get an int

    1

    >>> 7.0 % 2   # otherwise, we get a float...

    1.0

    >>> 7 % 2.0

    1.0

    >>> 7.0 % 2.0

    1.0

    ```


    ### What if the dividend is zero?


    What are 0 // n and 0 % n?


    ```

    >>> 0 // 5    # five goes into zero zero times

    0

    >>> 0 % 5     # the remainder is also zero

    0

    ```


    ### What if the dividend is less than the divisor?


    What are m // n and m % n, when m < n, with m and n both integers, and m ≥ 0,
    n > 0?


    The first one''s easy: if m < n, then m // n yields zero. The other trips some
    folks up at first.


    ```

    >>> 5 % 7

    5

    ```


    That is, seven goes into five zero times and leaves a remainder of five. So if
    m < n, then m % n yields m.


    ### What if the divisor is negative?


    What is m % n, when n < 0? This might not work the way you''d expect at first.


    ```

    >>> 15 // -5

    -3

    >>> 15 % -5

    0

    ```


    So far, so good. Now consider:


    ```

    >>> 17 // -5

    -4

    >>> 17 % -5

    -3

    ```


    Why does 17 // -5 yield -4 and not -3? Remember that this is what''s called “floor
    division.” What Python does, is that it calculates the (floating-point) quotient
    and then applies the floor function.


    The floor function is a mathematical function which, given some number $x$, returns
    the largest integer less than or equal to $x$. In mathematics this is written
    as:


    $\lfloor x \rfloor$.


    So in the case of 17 // -5, Python first converts the operands to float type,
    then calculates the (floating-point) quotient, which is -3.4 and then applies
    the floor function, to yield -4 (since -4 is the largest integer less than or
    equal to -3.4).


    This also makes clear why 17 % -5 yields -3. This preserves the equality


    $a = bq + r$

    $17 = (-5 \times -4) + (-3)$

    $17 = 20 - 3$.


    ### What if the dividend is negative?


    ```

    >>> -15 // 5

    -3

    >>> -15 % 5

    0

    ```


    So far so good. Now consider:


    ```

    >>> -17 // 5

    -4

    >>> -17 % 5

    3

    ```


    Again, Python preserves the equality


    $a = bq + r$

    $-17 = (5 \times -4) + 3$

    $-17 = -20 + 3$.


    Yeah. I know. These take a little getting used to.


    ### What if dividend and divisor both are negative?


    Let''s try it out—having seen the previous examples, this should come as no surprise.


    ```

    >>> -43 // -3

    14

    >>> -43 % -3

    -1

    ```


    Check this result:


    $$a = bq + r$$

    $$-43 = (-3 \times 14) + (-1)$$

    $$-43 = -42 - 1$$


    The % operator will always yield a result with the same sign as the second operand
    (or zero). You are encouraged to experiment with the Python shell. It is a great
    tool to further your understanding.


    ## 4.5 Modular arithmetic


    Now, in the Python documentation⁷, you''ll see // referred to as floor division.
    You''ll also see that % is referred to as the *modulo operator*. It''s fine to
    think about % as the remainder operator (with the provisos noted above), but what
    is a “modulo operator”? Let''s start with the example of clocks.


    ![](img/c79d476b9b167832781fbb4257bb2cb9_73_0.png)


    **Figure 4.1:** Clock face


    Perhaps you don''t realize it, but you do modular arithmetic in your head all
    the time. For example, if you were asked what time is 5 hours after 9 o''clock,
    you''d answer 2 o''clock. You wouldn''t say 14 o''clock.⁸ This is an example of
    modular arithmetic. In fact, modular arithmetic is sometimes called “clock arithmetic.”


    ⁷https://docs.python.org/3/reference/expressions.html

    ⁸OK. Maybe in the military or in Europe you might, but you get the idea. We have
    a clock with numbers 12-11, and 12 hours brings us back to where we started (at
    least as far as the clock face is concerned). Notice also that the arithmetic
    is the same for an analog clock face with hands and a digital clock face. This
    difference in interface doesn''t change the math at all, it''s just that *visually*
    things work out nicely with the analog clock face.'
  mdcn: '## 理解检查


    1.  在计算表达式时，你认为Python是从左到右还是从右到左进行的？你能想到一个可以验证你假设的实验吗？写下可能提供一些证据的表达式。

    2.  你认为为什么 `1 / 1` 的结果是 `1.0`（一个浮点数）而不是 `1`（一个整数）？


    ## 关于运算的更多内容


    到目前为止，我们已经看到了一些涉及字面量、运算符和括号的简单表达式。我们也看到了几种类型的例子：整数、浮点数（简称“浮点数”）、字符串和布尔值。我们已经看到，我们可以对数值类型（整数和浮点数）执行算术运算。


    ## 运算符 + 和 * 应用于字符串


    当操作数是字符串时，某些算术运算符的行为会有所不同。例如，


    ```

    >>> ''Hello'' + '', '' + ''World!''

    ''Hello, World!''

    ```


    这是一个*运算符重载*的例子，这只是一个花哨的说法，表示一个运算符在不同的上下文中行为不同。在这种情况下，操作数是字符串，`+` 不执行加法，而是执行**连接**。**连接**是将两个或多个字符串连接在一起，就像连接铁路车厢一样。我们也可以将乘法运算符
    `*` 与字符串一起使用。在字符串的上下文中，此运算符将多个字符串副本连接在一起。


    ```

    >>> ''Foo'' * 1

    ''Foo''

    >>> ''Foo'' * 2

    ''FooFoo''

    >>> ''Foo'' * 3

    ''FooFooFoo''

    ```


    你认为以下表达式的结果是什么？


    ```

    >>> ''Foo'' * 0

    ```


    这会得到 `''''`，它被称为*空字符串*，是将零个 `''Foo''` 副本连接在一起的结果。请注意，结果仍然是一个字符串，尽管是空的。


    ## 4.3 增强赋值运算符


    作为一种简写，Python提供了所谓的*增强赋值*运算符。以下是一些（但不是全部）：


    | 增强赋值 | 类似于 |

    | --- | --- |

    | a += b | a = a + b |

    | a -= b | a = a - b |

    | a *= b | a = a * b |


    一个常见的例子是递增或递减一。


    ```

    >>> a = 0

    >>> a += 1

    >>> a

    1

    >>> a += 1

    >>> a

    2

    >>> a -= 1

    >>> a

    1

    >>> a -= 1

    >>> a

    0

    ```


    你可以根据自己的偏好选择使用或不使用这些运算符。⁵


    ## 4.4 欧几里得或“地板”除法


    在介绍表达式时，我们看到了一些常见的算术运算：加法、减法、乘法和除法。这里我们将介绍两个密切相关的额外运算：取模或“余数”运算符，以及各种被称为“商”、“地板除法”、“整数除法”或“欧几里得除法”的运算。⁶


    很可能，当你在小学第一次学习除法时，你学的是欧几里得（地板）除法。例如，17 ÷ 5 = 3 余 2，或者 21 ÷ 4 = 5 余 1。在后一个例子中，我们称21为被除数，4为除数，5为商，1为余数。


    > ⁵上表说“类似于”，因为例如，`a += b` 并不*完全*等同于 `a = a + b`。在增强赋值中，左侧*先于*右侧被求值，然后右侧被求值，结果被赋值给左侧的变量。还有一些其他细微的差别。


    ⁶欧几里得有许多以他命名的东西，即使他不是原创者（我猜名声带来名声）。无论如何，欧几里得并不知道你在小学学的除法算法。类似的除法算法依赖于印度-阿拉伯数字的位值系统，这些可以追溯到公元12世纪左右。你最可能学到的算法，称为“长除法”，可以追溯到公元1600年左右。


    ## 欧几里得或“地板”除法


    显然，求商和求余数的操作密切相关。对于任意两个整数 $a$ 和 $b$，其中 $b \neq 0$，存在唯一的整数 $q$ 和 $r$，使得


    $$a = bq + r$$


    其中 $q$ 是欧几里得商，$r$ 是余数。此外，$0 \leq r < |b|$，其中 $|b|$ 是 $b$ 的绝对值。这应该很熟悉。


    以防你需要复习：


    ![](img/c79d476b9b167832781fbb4257bb2cb9_69_0.png)


    ![](img/c79d476b9b167832781fbb4257bb2cb9_69_1.png)


    ![](img/c79d476b9b167832781fbb4257bb2cb9_69_2.png)


    ![](img/c79d476b9b167832781fbb4257bb2cb9_70_0.png)


    ## Python的 // 和 % 运算符


    Python为我们提供了计算商和余数的运算符。它们分别是 `//` 和 `%`。以下是一些例子：


    ```

    >>> 17 // 5  # 计算商

    3

    >>> 17 % 5   # 计算余数

    2

    >>> 21 // 4  # 计算商

    5

    >>> 21 % 4   # 计算余数

    1

    ```


    你可能会问：我们之前看到的除法 `/` 和地板除法 `//` 有什么区别？区别在于 `/` 将商计算为十进制展开。这里有一个简单的比较：


    ```

    >>> 4 / 3

    1.3333333333333333  # 3除以4得1又1/3次

    >>> 4 // 3          # 计算欧几里得商

    1

    >>> 4 % 3           # 计算余数

    1

    ```


    ## 常见问题


    ### 当除数为零时会发生什么？


    就像在数学中一样，在Python中我们也不能除以零。因此，如果右操作数为零，所有这些操作都会失败，Python会报错：`ZeroDivisionError`。


    ### 如果我们给 `//` 或 `%` 提供浮点操作数会怎样？


    在这两种情况下，操作数首先被转换为公共类型。因此，如果一个操作数是浮点数，另一个是整数，整数将被转换为浮点数。然后计算会按你预期的方式进行。


    ```

    >>> 7 // 2    # 如果两个操作数都是整数，我们得到一个整数

    3

    >>> 7.0 // 2  # 否则，我们得到一个浮点数...

    3.0

    >>> 7 // 2.0

    3.0

    >>> 7.0 // 2.0

    3.0

    >>> 7 % 2     # 如果两个操作数都是整数，我们得到一个整数

    1

    >>> 7.0 % 2   # 否则，我们得到一个浮点数...

    1.0

    >>> 7 % 2.0

    1.0

    >>> 7.0 % 2.0

    1.0

    ```


    ### 如果被除数为零会怎样？


    `0 // n` 和 `0 % n` 是什么？


    ```

    >>> 0 // 5    # 5除以0得0次

    0

    >>> 0 % 5     # 余数也是0

    0

    ```


    ### 如果被除数小于除数会怎样？


    当 `m < n`，且 `m` 和 `n` 都是整数，`m ≥ 0`，`n > 0` 时，`m // n` 和 `m % n` 是什么？


    第一个很简单：如果 `m < n`，那么 `m // n` 的结果是零。另一个一开始会让一些人困惑。


    ```

    >>> 5 % 7

    5

    ```


    也就是说，7除以5得0次，余数是5。所以如果 `m < n`，那么 `m % n` 的结果是 `m`。


    ### 如果除数是负数会怎样？


    当 `n < 0` 时，`m % n` 是什么？这可能一开始不会按你预期的方式工作。


    ```

    >>> 15 // -5

    -3

    >>> 15 % -5

    0

    ```


    到目前为止，一切正常。现在考虑：


    ```

    >>> 17 // -5

    -4

    >>> 17 % -5

    -3

    ```


    为什么 `17 // -5` 的结果是 `-4` 而不是 `-3`？记住，这被称为“地板除法”。Python所做的，是计算（浮点）商，然后应用地板函数。


    地板函数是一个数学函数，给定某个数 $x$，返回小于或等于 $x$ 的最大整数。在数学中写作：


    $\lfloor x \rfloor$。


    所以在 `17 // -5` 的情况下，Python首先将操作数转换为浮点类型，然后计算（浮点）商，即 `-3.4`，然后应用地板函数，得到 `-4`（因为
    `-4` 是小于或等于 `-3.4` 的最大整数）。


    这也清楚地说明了为什么 `17 % -5` 的结果是 `-3`。这保持了等式


    $a = bq + r$

    $17 = (-5 \times -4) + (-3)$

    $17 = 20 - 3$。


    ### 如果被除数是负数会怎样？


    ```

    >>> -15 // 5

    -3

    >>> -15 % 5

    0

    ```


    到目前为止，一切正常。现在考虑：


    ```

    >>> -17 // 5

    -4

    >>> -17 % 5

    3

    ```


    同样，Python保持了等式


    $a = bq + r$

    $-17 = (5 \times -4) + 3$

    $-17 = -20 + 3$。


    是的。我知道。这些需要一点时间来适应。


    ### 如果被除数和除数都是负数会怎样？


    让我们试一试——既然已经看到了前面的例子，这应该不会令人惊讶。


    ```

    >>> -43 // -3

    14

    >>> -43 % -3

    -1

    ```


    验证这个结果：


    $$a = bq + r$$

    $$-43 = (-3 \times 14) + (-1)$$

    $$-43 = -42 - 1$$


    `%` 运算符的结果总是与第二个操作数（或零）具有相同的符号。我们鼓励你使用Python shell进行实验。这是一个帮助你加深理解的好工具。


    ## 4.5 模运算


    现在，在Python文档⁷中，你会看到 `//` 被称为地板除法。你也会看到 `%` 被称为*取模运算符*。将 `%` 视为余数运算符（带有上述注意事项）是可以的，但什么是“取模运算符”？让我们从时钟的例子开始。


    ![](img/c79d476b9b167832781fbb4257bb2cb9_73_0.png)


    **图 4.1：** 时钟盘面


