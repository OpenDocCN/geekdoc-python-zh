    ### Strings as ordered collections of characters


    As we''ve seen, strings are ordered collections of characters, delimited by quotation
    marks. But what kind of characters can be included in a string?


    Since Python 3.0, strings are composed of *Unicode* characters.⁵


    > Unicode, formally The Unicode Standard, is an information technology standard
    for the consistent encoding, representation, and handling of text expressed in
    most of the world''s writing systems. The standard, which is maintained by the
    Unicode Consortium, defines as of the current version (15.0) 149,186 characters
    covering 161 modern and historic scripts, as well as symbols, thousands of emoji
    (including in colors), and non-visual control and formatting codes.⁶


    That''s a lot of characters!


    We won''t dive deep into Unicode, but you should be aware that Python uses it,
    and that "hello", "γειά σου", and "привіт" are all valid strings in Python. Strings
    can contain emojis too!


