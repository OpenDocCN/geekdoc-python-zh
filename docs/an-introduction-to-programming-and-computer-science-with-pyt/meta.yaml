    Tipsy,9\nMy Bloody Valentine,10\n```\n\nto the file.\n\n## The newline='' keyword\
    \ argument\n\nIf you're using a Mac or a Linux machine, the newline='' keyword\
    \ argument may not be strictly necessary when opening a file for use with a csv\
    \ reader or writer. However, omitting it could cause problems on a Windows machine\
    \ and so it's probably best to include it for maximum portability. The Python\
    \ documentation recommends using it.\n\n## 13.7 Exceptions\n\n### FileNotFoundError\n\
    \nThis is just as advertised: an exception which is raised when a file is not\
