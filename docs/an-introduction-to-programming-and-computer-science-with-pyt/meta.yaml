    \ outliers by iterating through our data and finding any values that are greater\
    \ than two standard deviations from the mean.\n\n```\nm = mean(data)\nstd = std_dev(data)\n\
    \noutliers = []\nfor datum in data:\n    if abs(datum) > m + 2 * std:\n      \
    \  outliers.append(datum)\n```\n\nIn doing so, we find two possible outliers—14.81,\
    \ 16.95—which correspond to Chile and Uruguay, respectively. This might well lead\
    \ us to ask, \"Why are there so many dentists per 10,000 population in these particular\
    \ countries?\""
