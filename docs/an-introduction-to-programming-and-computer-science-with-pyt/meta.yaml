  md: "# 10.1 Lists\n\nThe *list* is one of the most widely used data structures in\
    \ Python. One could not enumerate all possible applications of lists.¹ Lists are\
    \ ubiquitous, and you’ll see they come in handy!\n\n# What is a list?\n\nA *list*\
    \ is a *mutable sequence of objects*. That sounds like a mouthful, but it’s not\
    \ that complicated. If something is *mutable*, that means that it can change (as\
    \ opposed to *immutable*, which means it cannot). A *sequence* is an *ordered\
    \ collection*—that is, each element in the collection has its own place in some\
    \ ordering.\n\nFor example, we might represent customers queued up in a coffee\
    \ shop with a list. The list can change—new people can get in the coffee shop\
    \ queue, and the people at the front of the queue are served and they leave. So\
    \ the queue at the coffee shop is *mutable*. It’s also *ordered*—each customer\
    \ has a place in the queue, and we could assign a number to each position. This\
    \ is known as an *index*.\n\n# How to write a list in Python\n\nThe syntax for\
    \ writing a list in Python is simple: we include the objects we want in our list\
    \ within square brackets. Here are some examples of lists:\n\n```\ncoffee_shop_queue\
    \ = ['Bob', 'Egbert', 'Jason', 'Lisa',\n                     'Jim', 'Jackie',\
    \ 'Sami']\nscores = [74, 82, 78, 99, 83, 91, 77, 98, 74, 87]\n```\n\nWe separate\
    \ elements in a list with commas.\n\nUnlike many other languages, the elements\
    \ of a Python list needn’t all be of the same type. So this is a perfectly valid\
    \ list:\n\n```\nmixed = ['cheese', 0.1, 5, True]\n```\n\nThere are other ways\
    \ of creating lists in Python, but this will suffice for now.\n\nAt the Python\
    \ shell, we can display a list by giving its name.\n\n```\n>>> mixed = ['cheese',\
    \ 0.1, 5, True]\n>>> mixed\n['cheese', 0.1, 5, True]\n```\n\n¹If you’ve programmed\
    \ in another language before, you may have come to know similar data structures,\
    \ *e.g.*, *ArrayList* in Java, mutable vectors in C++, *etc*. However, there are\
    \ many differences, so keep that in mind."
