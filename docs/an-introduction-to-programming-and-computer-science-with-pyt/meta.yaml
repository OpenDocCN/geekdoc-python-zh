    \ calculates how many people are served in the queue and reports the result. To\
    \ do this we'll use a while loop. Our function will take three arguments: the\
    \ number of ounces of coffee in the urn, a list representing the queue of orders,\
    \ and the minimum amount of coffee that must remain in the urn before the baristas\
    \ must stop taking orders. The queue will be a list of values—8, 12, or 20—depending\
