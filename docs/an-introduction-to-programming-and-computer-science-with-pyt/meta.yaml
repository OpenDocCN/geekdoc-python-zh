    \nThe decimal system is a *positional numeral system* based on powers of ten.⁶\
    \ What do we mean by that? In the decimal system, we represent\n\n> ⁶In fact,\
    \ the first positional numeral system, developed in ancient Babylonia around 2000\
    \ BCE, used 60 as a base. Our base 10 system is an extension of the Hindu-Arabic\
    \ numeral system. Other cultures have used other bases. For example, the Kewa\
    \ counting system in Papua New Guinea is base 37—counting on fingers and other\
    \ parts of the body: heel of thumb, palm, wrist, forearm, *etc*, up to the top\
