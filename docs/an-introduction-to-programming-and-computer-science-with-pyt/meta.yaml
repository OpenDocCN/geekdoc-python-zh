    \nPython also provides the keyword `del` which can be used to remove a key from\
    \ a dictionary.\n\n```\n>>> pets = {'fluffy': 'gerbil', 'george': 'turtle',\n\
    ...         'oswald': 'goldfish', 'wyatt': 'ferret'}\n>>> del pets['oswald'] \
    \ # RIP oswald :(\n>>> pets\n{'fluffy': 'gerbil', 'george': 'turtle', 'wyatt':\
    \ 'ferret'}\n```\n\nBut be careful! If you do not specify a key, the entire dictionary\
    \ will be deleted!\n\n```\n>>> pets = {'fluffy': 'gerbil', 'george' : 'turtle',\n\
    ...         'oswald': 'goldfish', 'wyatt': 'ferret'}\n>>> del pets  # oops!\n\
    >>> pets\nTraceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    NameError: name 'pets' is not defined\n```\n\nNotice also that `.pop()` with a\
    \ key supplied will return the value associated with that key and then remove\
    \ the key/value pair. `del` will simply delete the entry.\n\n## 16.4 Hashables\n\
    \nThe keys of a dictionary cannot be arbitrary Python objects. In order to serve\
    \ as a key, an object must be *hashable*.\nWithout delving into too much technical\
    \ detail, the reason is fairly straightforward. We can't have keys that might\
    \ change!\n\nImagine if that dictionary or thesaurus on your desk had magical\
    \ keys that could change. You'd never be able to find anything. Accordingly, all\
    \ keys in a dictionary must be hashable—and not subject to possible change.\n\n\
    Hashing is a process whereby we calculate a number (called a hash) from an object.\
    \ In order to serve as a dictionary key, this hash value must never change.\n\n\
    What kinds of objects are hashable? Actually most of the objects we've seen so\
    \ far are hashable.\n\nAnything that is immutable and is not a container is hashable.\
    \ This includes int, float, bool, str. It even includes objects of type range\
    \ (though it would be very peculiar indeed if someone were to use a range as a\
    \ dictionary key).\n\nWhat about things that are immutable and are containers?\
    \ Here we're speaking of tuples. If all the elements of a tuple are themselves\
    \ immutable, then the tuple is hashable. If a tuple contains a mutable object,\
    \ say, a list, then it is not hashable.\n\nWe can inspect the hash values of various\
    \ objects using the built-in function, hash().\n\n```\n>>> x = 2\n>>> hash(x)\n\
    2\n>>> x = 4.11\n>>> hash(x)\n253642731013507076\n>>> x = 'hello'\n>>> hash(x)\n\
    1222179648610370860\n>>> x = True\n>>> hash(x)\n1\n>>> x = (1, 2, 3)\n>>> hash(x)\n\
    529344067295497451\n```\n\nNow, what happens if we try this on something unhashable?\n\
    \n```\n>>> x = [1, 2, 3]\n>>> hash(x)\nTraceback (most recent call last):\n  File\
    \ \"<stdin>\", line 1, in <module>\nTypeError: unhashable type: 'list'\n```\n\n\
    What happens if we try an immutable container (tuple) which contains a mutable\
    \ object (list)?\n\n```\n>>> x = (1, 2, [3])\n>>> hash(x)\nTraceback (most recent\
    \ call last):\n  File \"<stdin>\", line 1, in <module>\nTypeError: unhashable\
    \ type: 'list'\n```\n\nNow, a tuple can contain a tuple, which may contain another\
    \ tuple and so on. All it takes is one mutable element, no matter how deeply nested,\
    \ to make an object unhashable.\n\n```\n>>> x = (1, 2, (3, 4, (5, 6, (7, 8, [9]))))\n\
    >>> hash(x)\nTraceback (most recent call last):\n  File \"<stdin>\", line 1, in\
    \ <module>\nTypeError: unhashable type: 'list'\n```\n\nFinally, it should go without\
    \ saying that since dictionaries are mutable, they are not hashable, and thus\
    \ a dictionary cannot serve as a key for another dictionary.\n\n```\n>>> x = {'foo':\
    \ 'bar'}\n>>> hash(x)\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nTypeError: unhashable type: 'dict'\n```\n\n## 16.5 Counting\
    \ letters in a string\n\nHere's an example of how we can use a dictionary to keep\
    \ track of the number of occurrences of letters or other characters in a string.\
    \ It's common enough in many word guessing and related games that we'd want this\
    \ information.\n\nLet's say we have this string: “How far that little candle throws\
    \ its beams! So shines a good deed in a naughty world.”²\n\nHow would we count\
    \ all the symbols in this? Certainly, separate variables would be cumbersome.\
    \ Let's use a dictionary instead. The keys in the dictionary are the individual\
    \ letters and symbols in the string, and the values will be their counts. To simplify\
    \ things a little, we'll convert the string to lower case before counting.\n\n\
    > ²William Shakespeare, *The Merchant of Venice*, Act V, Scene I (Portia).\n\n\
    ```\ns = \"How far that little candle throws its beams! \" \\\n    \"So shines\
    \ a good deed in a naughty world.\"\n\nd = {}\nfor char in s.lower():\n    try:\n\
    \        d[char] += 1\n    except KeyError:\n        d[char] = 1\n```\n\nWe start\
    \ with an empty dictionary. Then for every character in the string, we try to\
    \ increment the value associated with the dictionary key. If we get a KeyError,\
    \ this means we haven't seen that character yet, and so we add a new key to the\
    \ dictionary with a value of one. After this code has run, the dictionary, d,\
    \ is as follows:\n\n```\n{'h': 5, 'o': 6, 'w': 3, ' ': 16, 'f': 1, 'a': 7, 'r':\
    \ 3,\n 't': 7, 'l': 4, 'i': 4, 'e': 6, 'c': 1, 'n': 4, 'd': 5,\n 's': 6, 'b':\
    \ 1, 'm': 1, '!': 1, 'g': 2, 'u': 1, 'y': 1,\n '.': 1}\n```\n\nSo we have five\
    \ 'h', six 'o', three 'w', and so on.\nWe could write a function that reports\
    \ how many of a given character appears in the string like this:\n\n```\ndef get_count(char,\
    \ d):\n    try:\n        return d[char]\n    except KeyError:\n        return\
    \ 0\n```\n\nThis function returns the count if char is in d or zero otherwise.\n\
    \n## 16.6 Exceptions\n\n### KeyError\n\nIf you try to read or pop or delete a\
    \ key from a dictionary which does not exist, a KeyError is raised. This is similar\
    \ to the IndexError you've seen in the cases of lists and tuples.\nIf you encounter\
    \ a KeyError it means the specified key does not exist in the dictionary.\n\n\
    ```\n>>> furniture = {'living room': ['armchair', 'sofa', 'table'],\n...     \
    \        'bedroom': ['bed', 'nightstand', 'dresser'],\n...             'office':\
    \ ['desk', 'chair', 'cabinet']}\n>>> furniture['kitchen']\nTraceback (most recent\
    \ call last):\n  File \"<stdin>\", line 1, in <module>\nKeyError: 'kitchen'\n\
    ```\n\n### TypeError\n\nIf you try to add to a dictionary a key which is not hashable,\
    \ Python will raise a type error:\n\n```\n>>> d = {[1, 2, 3]: 'cheese'}\nTraceback\
