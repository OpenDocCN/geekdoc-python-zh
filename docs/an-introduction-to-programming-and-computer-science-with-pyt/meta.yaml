    We call the result of such operations *slices*. In general, the syntax is s[<start>:<stop>:<stride>],
    where s is some sequence. As indicated in the above examples, stride is optional.

    See: Chapter 10 Sequences for more.


    # snake case


    *Snake case* is a naming convention in which all letters are lower case, and words
    are separated by underscores (keeping everything down low, like a snake slithering
    on the ground). Your variable names and function names should be all lower case
    or snake case. Sometimes stylized as `snake_case`.

    See: PEP 8.


    # standard deviation


    *Standard deviation* is a measure of variability in a distribution, sample or
    population. Standard deviation is calculated with respect to the mean.

    See: Chapter 14 Data analysis and presentation, for details on how standard deviation
    is calculated.


    # statement


    A *statement* is Python code which does not have an evaluation, and thus statements
    are distinguished from expressions. Examples include assignment statements, branching
    statements, loop control statements, and with statements.

    For example, consider a simple assignment statement:


    ```

    >>> x = 1

    >>>

    ```


    Notice that nothing is printed to the console after making the assignment. This
    is because x = 1 is a statement and not an expression. Expressions have evaluations,
    but statements do not.

    Don''t confuse matters by thinking, for example, that the control statement of
    a while loop has an evaluation. It does not. It is true that the *condition* must
    be an expression, but the control statement itself does not have an evaluation
    (nor do if statements, elif statements, etc.).


    # static typing / statically typed


    Some languages (not Python) are *statically typed*. In the case of *static typing*
    the type of all variables must be known *at compile time* and while the value
    of such variables may change, their types cannot. Examples of statically typed
    languages: C, C++, Haskell, OCaml, Java, Rust, Go, etc.


    # stride


    *Stride* refers to the step size in the context of range objects and slices. In
    both cases, the default is 1, and thus can be excluded by the syntax.'
  - '[PAGE 374]


    For example, both `x[0:10]` and `range(0, 10)` are syntactically valid. If, however,
    we wish to use a different stride, we must supply the argument explicitly, e.g.,
    `x[0:10:2]` and `range(0, 10, 2)`.


    # string


    A *string* is a sequence, an ordered collection of characters (or more precisely
    Unicode code points).


    # string interpolation


    *String interpolation* is the substitution of values into a string containing
    some form of placeholder. Python supports more than one form of string interpolation,
    but most examples given in this text make use of f-strings for string interpolation.
    There are some use cases which justify the use of earlier, so-called C-style string
    interpretation, but f-strings have been the preferred method for most other use
    cases since their introduction in 2002 with Python 3.6.


    # summation


    A *summation* (in mathematical notation, with $\sum$) is merely the addition of
    all terms in some collection (list, tuple, *etc.*). Sometimes, a summation is
    nothing more than adding a bunch of numbers. In such cases, Python''s built-in
    `sum()` suffices. In other cases, it is the result of some calculation which must
    be summed, say, for example, summing the squares of all numbers in some collection.
    In cases like this, we implement the summation in a loop.


    # syntax


    The *syntax* of a programming language is the collection of all rules which determine
    what is permitted as valid code. If your code contains syntax errors, a `SyntaxError`
    (or subclass thereof) is raised.


    # terminal


    Most modern operating systems provide a *terminal* (or more strictly speaking
    a terminal emulator) which provides a text-based command line interface for issuing
    commands.

    The details of how to open a terminal window will vary depending on your operating
    system.


    # top-level code environment


    The *top-level code environment* is where top-level code is executed. We specify
    the top-level code environment (perhaps unwittingly) when we run a Python program
    (either from the terminal or within an IDE). We distinguish the top-level environment
    from other modules which we may import as needed to run our code.

    See: entry point, and Chapter 9 Structure, development, and testing.'
  - "[PAGE 375]\n\n# truth value\n\nAlmost everything (apart from keywords) in Python\
    \ has a *truth value* even if it is not strictly a Boolean or something that evaluates\
