    # Exercise 05


    The geometric mean is another kind of mean used in statistics and finance. Rather
    than summing all the values in the data and then dividing by the number of values,
    we take the *product* of all the values, and then, if there are *N* values, we
    take the *N*th root of the result. Typically, this is only used when all values
    in the data set are positive.


    We define the geometric mean:


    $$\gamma = \left( \prod_{i=0}^{N-1} x_i \right)^{\frac{1}{N}}$$


    where the $\prod$ symbol signifies repeated multiplication. Just as $\sum$ says
    “add them all up”, $\prod$ means “multiply them all together.”


    We can calculate the *N*th root of a number using exponentiation by a fraction
    as shown. For example, to calculate the cube root of some *x*, we can use `x **
    (1 / 3)`.


    Implement a function which calculates the geometric mean of an arbitrary list
    of positive numeric values. You can verify your result by comparing the output
    of your function with the output of the statistics module’s `geometric_mean()`
    function.'
