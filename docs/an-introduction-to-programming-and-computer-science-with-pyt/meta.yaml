    There are only two literals of type bool: `True` and `False`. Notice that these
    are not strings, but instead are special literals of this type (so there aren''t
    any quotation marks, and capitalization is significant).¹


    # NoneType


    NoneType is a special type in Python to represent the absence of a value. This
    may seem a little odd, but this comes up quite often in programming. There is
    *exactly one* literal of this type: `None` (and indeed there is exactly one instance
    of this type).

    Like `True` and `False`, `None` is not a string, but rather a special literal.


    # tuple


    A *tuple* is an *immutable sequence* of zero or more values. If an object is **immutable**,
    this means it cannot be changed once it''s been created. Tuples are constructed
