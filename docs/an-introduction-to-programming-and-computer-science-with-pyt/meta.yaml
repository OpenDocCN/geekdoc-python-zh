    # 8.9 Decision trees


    In another section we saw how to use the diamond symbol in a flow chart to represent
    decisions and branching, and we saw that a flow chart (or program) can have multiple
    branches.


    Another way of representing a decision-making process is with a *decision tree*.
    Decision trees are commonly used for species identification.⁶


    Here''s an example:


    ![](img/c79d476b9b167832781fbb4257bb2cb9_163_0.png)


    **Figure 8.5:** Decision tree for fruit


    Here, we start on the left and move toward the right, making decisions along the
    way. Notice that at each branching point we have two branches.


    So, for example, to reach “watermelon, cantaloupe”, we make the decisions: soft
    inside, small seeds, thick skin, and unsegmented. To reach “peach”, we''d have
    to have made the decisions: soft inside, pit or stone, and fuzzy.


    > ⁶If you''ve had a course in biology, you may have heard of a *cladogram* for
    representing taxonomic relationships of organisms. A cladogram is a kind of decision
    tree. If you''re curious, see: https://en.wikipedia.org/wiki/Cladogram and similar
    applications.'
