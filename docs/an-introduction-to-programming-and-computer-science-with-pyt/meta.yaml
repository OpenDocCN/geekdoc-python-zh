    have to hunt through the dictionary to find it. Even if all the words were in
    lexicographic order, it would still be a nuisance having to find a word this way.


    The good news is that dictionaries don''t work that way. We can look up the meaning
    of the word by finding the word itself. This is the basic idea of dictionaries
    in Python.


    A Python dictionary, simply put, is a data structure which associates *keys* and
    *values*. In the case of a conventional dictionary, each word is a *key*, and
    the associated definition or definitions are the *values*.


    Here''s how the entry for "pianist" appears in my dictionary:¹


    > *pianist* n. a person who plays the piano, esp. a skilled or professional performer


    Here *pianist* is the key, and the rest is the value. We can write this, with
    some liberty, as a Python dictionary, thus:


    ```

    >>> d = {''pianist'': "a person who plays the piano, " \n...     "esp. a skilled
    or professional performer"}

    ```


    The entries of a dictionary appear within braces {}. The key/value pairs are separated
    by a colon, thus: <key>: <value>, where <key> is a valid key, and <value> is a
    valid value.


    We can look up values in a dictionary by their key. The syntax is similar to accessing
    elements in a list or tuple by their indices.


    ```

    >>> d[''pianist'']

    ''a person who plays the piano, esp. a skilled or professional performer''

    ```


