  md: '# 6.5 Line length


    PEP 8 suggests that lines should not exceed 79 characters in length. There are
    several reasons why this is a good practice.


    +   - It makes it feasible to print source code on paper or to view without truncation
    on various source code hosting websites (e.g. GitHub, GitLab, etc.).

    - It accommodates viewports (editor windows, etc.) of varying width (don''t forget
    you may be collaborating with others).

    - Even if you have a wide monitor, and can fit long lines in your viewport, long
    lines *slow your reading down*. This is well documented. If your eye has to scan
    too great a distance to find the beginning of the next line, readability suffers.


    Throughout this text, you may notice some techniques used to keep line length
    in code samples within these bounds.


    # 6.6 Constants


    In most programming languages there''s a convention for naming constants. Python
    is no different—and the convention is quite similar to many other languages.

    In Python, we use ALL_CAPS for constant names, with underscores to separate words
    if necessary. Here are some examples:


    ```

    # Physical constants

    C = 299792458  # speed of light: meters / second ** -1

    MASS_ELECTRON = 9.1093837015 * 10 ** -31  # mass in kg


    # Mathematical constants

    PI = 3.1415926535  # pi

    PHI = 1.6180339887  # phi (golden ratio)


    # Unit conversions

    FEET_PER_METER = 3.280839895

    KM_PER_NAUTICAL_MILES = 1.852


    # Other constants

    EGGS_PER_CARTON = 12

    ```


    Unlike Java, there is no `final` keyword, which tells the compiler that a constant
    must not be changed (same for other languages like C++ or Rust which have a `const`
    keyword).

    What prevents a user from changing a constant? In Python, nothing. All the more
    reason to make it immediately clear—visually—that we''re dealing with a constant.

    So the rule in Python is to use ALL_CAPS for constants and nothing else. Then
    it''s up to you, the programmer, to ensure these remain unchanged.'
