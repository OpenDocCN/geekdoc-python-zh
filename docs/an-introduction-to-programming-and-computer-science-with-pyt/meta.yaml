    # A brief introduction to plotting with Matplotlib


    Matplotlib is a feature-rich module for producing a wide array of graphs, plots,
    charts, images, and animations. It is the *de facto* standard for visual presentation
    of data in Python (yes, there are some other tools, but they''re not nearly as
    widely used).


    Since Matplotlib is not part of the Python core library (like the math, csv, and
    statistics modules we''ve seen so far), we need to install Matplotlib before we
    can use it.


    The installation process for third-party Python modules is unlike installing an
    app on your phone or desktop. Some IDEs (PyCharm, Thonny, VS Code, *etc.*) have
    built-in facilities for installing such modules. IDLE (the Python-supplied IDE)
    does not have such a facility. Accordingly, we won''t get into the details of
    installation here (since details will vary from OS to OS, machine to machine),
    though if you''re the DIY type and aren''t using PyCharm, Thonny, or VS Code,
