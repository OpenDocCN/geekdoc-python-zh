- md: "## Input validation with try/except\n\nHere's an example of input validation\
    \ using try/except. Let's say we want a positive integer as input. We've seen\
    \ how to validate input in a while loop.\n\n```python\nwhile True:\n    n = int(input(\"\
    Please enter a positive integer: \"))\n    if n > 0:\n        break\n```\n\nThis\
    \ ensures that if the user enters an integer that's less than one, that they'll\
    \ be prompted again until they supply a positive integer. But what happens if\
    \ the naughty user enters something that cannot be converted to an integer?\n\n\
    ```\nPlease enter a positive integer: cheese\nTraceback (most recent call last):\n\
    \  File \"/.../code.py\", line 90, in runcode\n    exec(code, self.locals)\n \
    \ File \"<input>\", line 2, in <module>\nValueError: invalid literal for int()\
    \ with base 10: 'cheese'\n```\n\nPython cannot convert 'cheese' to an integer\
    \ and thus a ValueError is raised.\n\nSo now what? We put the code that could\
    \ result in a ValueError in a try block, and then provide an exception handler\
    \ in an except block. Here's how we'd do it.\n\n```python\nwhile True:\n    try:\n\
    \        user_input = input(\"Enter a positive integer: \")\n        n = int(user_input)\n\
    \        if n > 0:\n            break\n    except ValueError:\n        print(f'\"\
    {user_input}\" cannot be converted to an int!')\n```\n\n```python\nprint(f'You\
    \ have entered {n}, a positive integer.')\n```\n\nLet's run this code, and try\
    \ a little mischief:\n\n```\nEnter a positive integer: negative\n\"negative\"\
    \ cannot be converted to an int!\nEnter a positive integer: cheese\n\"cheese\"\
    \ cannot be converted to an int!\nEnter a positive integer: -42\nEnter a positive\
    \ integer: 15\nYou have entered 15, a positive integer.\n```\n\nSee? Now mischief\
    \ (or failure to read instructions) is handled gracefully.\n\n## Getting an index\
    \ with try/except\n\nEarlier, we saw that .index() will raise a ValueError exception\
    \ if the argument passed to the .index() method is not found in the underlying\
    \ sequence.\n\n```python\n>>> lst = ['apple', 'boat', 'cat', 'drama']\n>>> lst.index('egg')\n\
    Traceback (most recent call last):\n  File \"/.../code.py\", line 90, in runcode\n\
    \    exec(code, self.locals)\n  File \"<input>\", line 1, in <module>\nValueError:\
    \ 'egg' is not in list\n```\n\nWe can use exception handling to improve on this.\n\
    \n```python\nlst = ['apple', 'boat', 'cat', 'drama']\ns = input('Enter a string\
    \ to search for: ')\ntry:\n    i = lst.index(s)\n    print(f'The index of \"{s}\"\
    \ in {lst} is {i}.')\nexcept ValueError:\n    print(f'\"{s}\" was not found in\
    \ {lst}.')\n```\n\nIf we were to enter “egg” at the prompt, this code would print:\n\
    \n```\n\"egg\" was not found in ['apple', 'boat', 'cat', 'drama']\n```\n\nThis\
    \ brings up the age-old question of whether it’s better to check first to see\
    \ if you can complete an operation without error, or better to try and then handle\
    \ an exception if it occurs. Sometimes these two approaches are referred to as\
    \ “look before you leap” (LBYL) and “it’s easier to ask forgiveness than it is\
    \ to ask for permission” (EAFP). Python favors the latter approach.\n\nWhy is\
    \ this the case? Usually, EAFP makes your code more readable, and there’s no guarantee\
    \ that the programmer can anticipate and write all the necessary checks to ensure\
    \ an operation will be successful.\n\nIn this example, it’s a bit of a toss up.\
    \ We could write:\n\n```python\nif s in lst:\n    print(f'The index of \"{s}\"\
    \ in {lst} is {lst.index(s)}.')\nelse:\n    print(f'\"{s}\" was not found in {lst}.')\n\
    ```\n\nOr we could write (as we did earlier):\n\n```python\ntry:\n    print(f'The\
    \ index of \"{s}\" in {lst} is {lst.index(s)}.')\nexcept ValueError:\n    print(f'\"\
    {s}\" was not found in {lst}.')\n```\n\n## Dos and don’ts\n\nDo:\n\n- Keep try\
    \ blocks as small as possible.\n- Catch and handle specific exceptions.\n- Avoid\
    \ catching and handling IndexError, TypeError, NameError. When these occur, it’s\
    \ almost always due to a defect in programming. Catching and handling these exceptions\
    \ can hide defects that should be corrected.\n- Use separate except blocks to\
    \ handle different kinds of exceptions.\n\nDon’t:\n\n- Write one handler for different\
    \ exception types.\n- Wrap all your code in one big try block.\n- Use exception\
    \ handling to hide programming errors.\n- Use bare except: or except Exception:—these\
    \ are too general and might catch things you shouldn’t.\n\n## 15.3 Exceptions\
    \ and flow of control\n\nWhile it’s considered pythonic to use exceptions and\
    \ to follow the rule of EAFP (“easier to ask for forgiveness than permission”),\
    \ it is unwise to use exceptions for controlling the flow of program execution\
    \ except within very narrow limits.\nHere are some rules to follow:\n\n- Keep\
    \ try and except blocks as small as possible.\n- Handle an exception in the most\
    \ simple and direct way possible.\n- Avoid calling another function from within\
    \ an except block which might send program flow away from the point where the\
    \ exception was raised.\n\n## 15.4 Exercises\n\n### Exercise 01\n\n> **! Important**\n\
    \nBe sure to save your work for this exercise, as we will revisit these in later\
    \ exercises!\n\nHere's an example of code which raises a SyntaxError:\n\n```python\n\
    >>> foo bar\nFile \"<stdin>\", line 1\n    foo bar\n    ^^^\nSyntaxError: invalid\
    \ syntax\n```\n\nHere's an example of code which raises a TypeError:\n\n```python\n\
    >>> 1 + []\nTraceback (most recent call last):\n  File \"<stdin>\", line 1, in\
    \ <module>\nTypeError: unsupported operand type(s) for +: 'int' and 'list'\n```\n\
    \nWithout using raise, write your own code that results in the following exceptions:\n\
    \n- a. SyntaxError\n- b. IndentationError\n- c. IndexError\n- d. NameError\n-\
    \ e. TypeError\n- f. AttributeError\n- g. ZeroDivisionError\n- h. FileNotFoundError\n\
    \n### Exercise 02\n\nNow write a try/except for the following exceptions, starting\
    \ with code you wrote for exercise 01.\n\n- a. TypeError\n- b. ZeroDivisionError\n\
    - c. FileNotFoundError\n\n### Exercise 03\n\nSyntaxError and IndentationError\
    \ should always be fixed in your code. Under normal circumstances, these *can't*\
    \ be handled. NameError and AttributeError almost always arise from programming\
    \ defects. There's almost never any reason to write try/except for these.\nFix\
