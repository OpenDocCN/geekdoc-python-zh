    Enter velocity in m / s: 19.5

    Mass = 72.100 kg

    Velocity = 19.500 m / s

    Kinetic energy = 13,708.012 Joules

    ```


    Looks great!

    Now we can remove the comments we used as scaffolding, and we finish with:


    ```

    """

    Kinetic Energy Calculator

    Egbert Porcupine <egbert.porcupine@uvm.edu>

    CS 1210

    """


    mass = float(input(''Enter mass in kg: ''))

    velocity = float(input(''Enter velocity in m / s: ''))

    kinetic_energy = 0.5 * mass * velocity ** 2

    print(f''Mass = {mass:,.3f} kg'')

    print(f''velocity = {velocity:,.3f} m / s'')

    print(f''kinetic energy = {kinetic_energy:,.3f} Joules'')

    ```


    So now you''ve seen how to do incremental development.³ Notice that we did not
    try to solve the entire problem all at once. We started with comments as placeholder
    / reminders, and then built up the program one step at a time, testing along the
    way. Using this approach can make the whole process easier by decomposing the
    problem into small, manageable, bite-sized (or should I say “byte-sized”?) chunks.
    That''s incremental development.


    # 9.4 Testing your code


    It''s important to test your code. In fact one famous dictum of programming is:


    > If it hasn''t been tested, it''s broken.


    When writing code, try to anticipate odd or non-conforming input, and then test
    your program to see how it handles such input.


    ³If you''re curious about how the pros do iterative and incremental development,
    see the Wikipedia article on iterative and incremental development: https://en.wikipedia.org/wiki/Iterative_and_incremental_development'
