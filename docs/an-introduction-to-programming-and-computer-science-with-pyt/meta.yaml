    programs involve some kind of branching.


    When our program includes branches, we execute different portions of our program
    depending on certain conditions. Which conditions might those be? It depends entirely
    on the program we wish to write.


    Thus, most programming languages (Python included) allow for *control flow*—which
    includes branching and conditional execution of code.


    How do we do this? In Python, we accomplish this with `if`, `elif` and `else`
    statements (or combinations thereof).


    # 8.4 if, elif, and else


    `if`, `elif`, and `else` work with Boolean expressions to determine which branch
    (or branches) our program will execute.


    Since tax preparation is complicated, let''s consider more modest examples.


    # Examples using if, elif, and else


    A minimal program we could write using `if` and `else` might work like this:


    +   - Prompt the user to guess a magic word.

    - If the user guesses correctly, print “You WIN!”

    - If the user does not guess correctly, print “You LOSE!”


    Let''s think about what we''d need for this program to work:


    +   - A secret word.

    - Prompt the user for their guess.

    - Then *compare* the user''s guess with the secret word.

    - Print the appropriate message.


    Here''s how we can do this in Python using `if` and `else`.'
