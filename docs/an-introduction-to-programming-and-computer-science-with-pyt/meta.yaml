  md: '```

    True

    >>> True and False

    False

    >>> False and True

    False

    >>> False and False

    False

    >>> True or True

    True

    >>> True or False

    True

    >>> False or True

    True

    >>> False or False

    False

    ```


    Now, we don''t usually use literals like this in our code. Usually, we want to
    test some condition to see if it evaluates to True or False. Then our program
    does one thing if the condition is true and a different thing if the condition
    is false. We''ll see how this works in another section.


    # De Morgan''s Laws


    When working with Boolean expressions *De Morgan''s Laws* provide us with handy
    rules for transforming Boolean expressions from one form to another. Here we''ll
    use a and b to stand in for arbitrary Boolean expressions.


    | not (a or b) | is the same as | (not a) and (not b) |

    | not (a and b) | is the same as | (not a) or (not b) |


    You can think of this as a kind of distributive law for negation. We distribute
    the not over the disjunction (a or b), but when we do, we change the or to and.
    By the same token, we distribute not over the conjunction (a and b), but when
    we do, we change the and to or.

    You''ll see these may come in handy when we get to input validation (among other
    applications).


    # Supplemental information


    If you''d like to explore this further, here are some good resources:


    +   - Stanford Encyclopedia of Philosophy''s entry on George Boole: https://plato.stanford.edu/entries/boole

    - Boolean Algebra (Wikipedia): https://en.wikipedia.org/wiki/Boolean_algebra

    - De Morgan''s Laws (Wikipedia): https://en.wikipedia.org/wiki/De_Morgan%27s_laws'
