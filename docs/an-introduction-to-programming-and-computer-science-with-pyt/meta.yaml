- img_proc: true
  md: '![](img/c79d476b9b167832781fbb4257bb2cb9_299_0.png)


    If we had a standard deviation of zero, that would mean that every value in the
    data set is identical (that doesn’t happen often). The point is that the greater
    the standard deviation, the greater the variation there is in the data.


    Just like we can calculate the mean of our data, we can also calculate the standard
    deviation. The **standard deviation**, written $\sigma$, is given by


    ```

    $$\sigma = \frac{1}{N} \sqrt{\sum_{i=0}^{N-1} (x_i - \mu)^2}.$$

    ```


    Let’s unpack this. First, remember the goal of this measure is to tell us how
    much variation there is in the data. But variation with respect to what? Look
    at the expression $(x_i - \mu)^2$. We subtract the mean, $\mu$, from each value
    in the data set $x_i$. This tells us how far the value of a given observation
    is from the mean. But we care more about the distance from the mean rather than
    whether a given value is above or below the mean. That’s where the squaring comes
    in. When we square a positive number we get a positive number. When we square
    a negative number we get a positive number. So by squaring the difference between
    a given value and the mean, we’re eliminating the sign. Then, we divide the sum
    of these squared differences by the number of elements in the data set (just as
    we do when calculating the mean). Finally, we take the square root of the result.
    Why do we do this? Because by squaring the differences, we stretch them, changing
    the scale. For example, $5 - 2 = 3$, but $5^2 - 2^2 = 25 - 4 = 21$. So this last
    step, taking the square root, returns the result to a scale appropriate to the
    data. This is how we calculate standard deviation.$^2$


    As we calculate the summation, we perform the calculation $(x_i - \mu)^2$. On
    this account, we cannot use sum(). Instead, we must calculate this in a loop.
    However, this is not too terribly complicated, and implementing this in Python
    is left as an exercise for the reader.


    > $^2$Strictly speaking, this is the *population* standard deviation, and is used
    if the data set represents the entire universe of possible observations; rather
    than just a sample. There’s a slightly different formula for the *sample* standard
    deviation.'
