    \ be as limited and specific as possible. For example, you should never use a\
    \ bare except: or except Exception:.\n\nSome types of exception, for example NameError\
    \ should never be handled, as this would conceal a serious programming defect\
    \ which should be addressed by revising code.\n\n# expression\n\nAn expression\
