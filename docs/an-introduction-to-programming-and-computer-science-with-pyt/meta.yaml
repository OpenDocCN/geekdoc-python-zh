    Many languages have REPLs, and obviously, Python does too. REPLs were invented
    (back in the early 1960s) to provide an environment for *exploratory programming*.
    This is facilitated by allowing the programmer to see the result of each portion
    of code they enter. Accordingly, I encourage you to experiment with the Python
    shell. Do'
