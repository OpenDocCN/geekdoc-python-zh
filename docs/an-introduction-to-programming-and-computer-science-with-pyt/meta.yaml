    ### 4.1 Variables and assignment


    You have already written a “Hello, World!” program. As you can see, this isn’t
    very flexible—you provided the exact text you wanted to print. However, more often
    than not, we don’t know the values we want to use in our programs when we write
    them. Values may depend on user input, database records, results of calculations,
    and other sources that we cannot know in advance when we write our programs.


    Imagine writing a program to calculate the sum of two numbers and print the result.
    We could write,


    ```

    print(1 + 1)

    print(2 + 2)

    ...

    ```


    but that’s really awkward. For every sum we want to calculate, we’d have to write
    another statement.


    So when we write computer programs we use *variables*. In Python, a **variable**
    is the combination of a *name* and an associated *value* which has a specific
    *type*.<sup>1</sup>


    It’s important to note that variables in a computer program are *not* like variables
    you’ve learned about in mathematics. For example, in mathematics we might write
    *a + b = 5* and, of course, there’s an infinite number of possible pairs of values
    which sum to five.


    When writing computer programs, variables are rather different. While the same
    name can refer to different values at different times, a name can refer to only
    *one* value at a time.


    ### Assignment statements


    In Python, we use the = to assign a value to a variable, and we call = the *assignment
    operator*. The variable name is on the left-hand side of the assignment operator,
    and the expression (which yields a value) is on the right-hand side of the assignment
    operator.


    ```

    a = 3       # the variable named `a` has the value 3

    print(a)    # prints 3 to the console

    a = 17      # now the variable named `a` has the value 17

    print(a)    # prints 17 to the console

    ```


    > <sup>1</sup>Python differs from most other programming languages in this regard.
    In many other programming languages, variables refer to memory locations which
    hold values. (Yes, deep down, this is what goes on “under the hood” but the paradigm
    from the perspective of those writing programs in Python is that variables are
    *names* attached to *values*.) Feel free to check the entry in the glossary for
    more.


    Assignment is a kind of *statement* in Python. Assignment statements associate
    a name with a value (or, in certain cases, can modify a value).


    Beginners often get confused about the assignment operator. You may find it helpful
    to think of it as a left-pointing arrow.² When reading your code, for example


    ```

    a = 42

    ```


    it may help to say, “*Let* a equal 42”, or “a *gets* 42”, rather than “a equals
    42” (which sounds more like a claim or assertion about the value of a). This can
    reinforce the concept of assignment.³


    ### Dynamic typing


    In Python, all values have a *type*, and Python knows the type of each value at
    every instant. However, Python is a *dynamically typed* language. This means that
    any given *name* can refer to values of different types at different points in
    a program. So this is valid Python:


    ```

    a = 42      # now ''a'' is of type int

    print(a)    # prints 42 to the console

    a = ''abc''   # now ''a'' is of type str

    print(a)    # prints ''abc'' to the console

    ```


    ### Evaluation and assignment


    Sometimes we can use a variable in some calculation and reassign the result. For
    example:


    ```

    x = 0

    print(x)    # prints 0 to the console

    x = x + 1

    print(x)    # prints 1 to the console

    x = x + 1

    print(x)    # prints 2 to the console

    ```


    What’s going on here? Remember, = is the *assignment* operator. So in the code
    snippet above, we’re not making assertions about equivalence; instead, we’re assigning
    values to x. With:


    ```

    x = 0

    ```


    ²In fact, the left-facing arrow is commonly used to indicate assignment in *pseudocode*—descriptions
    of algorithms outside the context of any particular programming language.


    ³Later on, we’ll see the comparison operator ==. This is used to compare two values
    to see if they are identical. For example, a == b would be *true* if the values
    of a and b were the same. So it’s important to keep the assignment (=) and comparison
    (==) operators straight in your mind.


    we''re assigning the literal value 0 to x. At this point we can say the value
    of x is 0.


    Consider what happens here:


    ```

    x = x + 1

    ```


    So first, Python will evaluate the expression on the right, and then it will assign
    the result to x. At the start, the value of x is still zero, so we can think of
    Python substituting the value of x for the object x on the right hand side.


    ```

    x = 0 + 1

    ```


    and then evaluating the right-hand side:


    ```

    x = 1

    ```


    and assigning the result to x. Now the value of x is 1. If we do it again,


    ```

    x = x + 1

    ```


    now the x on the right has the value 1, and 1 + 1 is 2, so the variable x has
    the value 2.


    ### Variables are *names* associated with values


    What are variables in Python? Variables work differently in Python than they do
    in many other languages. Again, in Python, a variable is a name associated with
    a value.


    Consider this code:


    ```

    >>> x = 1001

    >>> y = x

    ```


    What we''ve done here is give two different names to the same value. This is A-OK
    in Python. What does x refer to? The value 1001. What does y refer to? *The exact
    same 1001.*<sup>4</sup> It is *not* the case that there are two different locations
    in memory both holding the value 1001 (as might be the case in a different programming
    language).


    Now what happens if we assign a new value to x? Does y “change”? What do you think?


    ```

    >>> x = 2001

    >>> x

    2001

    >>> y

    1001

    ```


    > <sup>4</sup>We can verify this by inspecting the identity number of the object(s)
    in question using Python''s built-in id() function.'
