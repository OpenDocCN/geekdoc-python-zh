    \n```python\nPOUNDS_PER_KILOGRAM = 2.204623\n\nkg = float(input('Enter weight\
    \ in kilograms: '))\nif kg >= 0:\n    # convert kilograms to pounds and print\
    \ result\nelse:\n    print('Invalid input! '\n          'Weight in kilograms must\
    \ not be negative!')\n```\n\n因此，我们的程序将执行所需的计算，当且仅当用户输入的千克体重为非负数（即大于或等于零）时。\n\n\
