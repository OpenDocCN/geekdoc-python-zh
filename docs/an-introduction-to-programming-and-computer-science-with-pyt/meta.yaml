  md: "If your code has multiple branches, it’s probably a good idea to test each\
    \ branch. Obviously, with larger programs this could get unwieldy, but for small\
    \ programs with few branches, it’s not unreasonable to try each branch.\n\n# Some\
    \ examples\n\nLet’s say we had written a program that is intended to take pressure\
    \ in pounds per square inch (psi) and convert this to bars. A *bar* is a unit\
    \ of pressure and 1 bar is equivalent to 14.503773773 psi.\nWithout looking at\
    \ the code, let’s test our program. Here are some values that represent reasonable\
    \ inputs to the program.\n\n| input (in psi) | expected output (bars) | actual\
    \ output (bars) |\n| :--- | :--- | :--- |\n| 0 | 0 | |\n| 14.503773773 | 1.0 |\
    \ |\n| 100.0 | ~ 6.894757293 | |\n\nHere’s our first test run.\n\n```\nEnter pressure\
    \ in psi: 0\nTraceback (most recent call last):\n  File \"/.../pressure.py\",\
