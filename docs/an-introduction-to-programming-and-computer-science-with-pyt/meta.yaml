    Tails!\")\n```\n\n这种方法在物理或生物建模、经济学和游戏的模拟中很常用。\n\n如果你想选择一个在区间 [-100.0, 100.0] 内的伪随机浮点数呢？没什么大不了的。记住\
    \ random.random() 给我们一个在区间 [0.0, 1.0) 内的伪随机数，所以要得到所需区间的值，我们只需减去0.5（使分布以零为中心）并乘以200（以“拉伸”结果）。\n\
    \n```\nx = (random.random() - 0.5) * 200\n```\n\n## 理解检查\n\n- 1. 我们如何模拟一个发生概率为1/4的事件？\n\
    - 2. 我们如何生成一个在区间 [-2.0, 2.0) 内的伪随机浮点数？\n\n## random.randint()\n\n如前所述，我们可以使用 random.choice()\
