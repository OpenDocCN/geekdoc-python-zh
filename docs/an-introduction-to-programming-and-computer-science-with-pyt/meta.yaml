    之前。² 为什么？因为在比较不同长度的字符串时，比较是这样进行的：就好像较短的字符串用一个在排序中位于所有其他字符之前的不可见字符进行了填充。因此，在字典顺序中，''a''
    排在 ''aa'' 之前。


