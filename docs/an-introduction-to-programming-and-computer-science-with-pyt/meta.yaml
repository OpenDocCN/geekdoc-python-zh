  md: '+   1. By issuing the command `python hello_world.py`, we invoke the Python
    interpreter and tell it to read and execute the program `hello_world.py` (.py
    is the file extension used for Python files).

    2. The Python interpreter reads the file `hello_world.py`.

    3. The Python interpreter produces an intermediate, bytecode representation of
    the program in `hello_world.py`.

    4. The bytecode is executed by the Python Virtual Machine.

    5. This results in the words “Hello World!” being printed to the console.


    So you see, there''s a lot going on behind the scenes when we run a Python program.²
    However, this allows us to write programs in a high-level language that we as
    humans can understand.


    # Supplemental reading


    +   - *Whetting Your Appetite*, from The (Official) Python Tutorial.³


    # 2.3 The Python shell


    The Python interpreter provides you with an environment for experimentation and
    observation—the *Python shell*, where we work in *interactive mode*. It''s a great
    way to get your feet wet.


    When working with the Python shell, you can enter *expressions* and Python will
    *read* them, *evaluate* them, and *print* the result. (There''s more you can do,
    but this is a start.)


    There are several ways to run the Python shell: in a terminal (command prompt)
    by typing `python`, `python3`, or `py` depending on the version(s) of Python installed
    on your machine. You can also run the Python shell through your chosen IDE (details
    will vary).


    The first thing you''ll notice is this symbol: `>>>`. This is the Python prompt
    (you don''t type this bit, this is Python telling you it''s ready for new input).


    We''ll start with some simple examples (open the shell on your computer and follow
    along):


    ```

    >>> 1

    1

    ```


    Here we''ve entered `1`. This is interpreted by Python as an integer, and Python
    responds by printing the *evaluation* of what you''ve just typed: `1`.


    When we enter numbers like this, we call them “integer literals”—in the example
    above, what we entered was *literally* a `1`. Literals are special in that *they
    evaluate to themselves*.


