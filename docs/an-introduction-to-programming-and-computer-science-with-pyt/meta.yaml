    这演示了动态类型。当我们第一次创建变量 `x` 时，我们给它赋值为字面值 `1`。Python 理解 `1` 是一个整数，因此结果是一个类型为 `''int''`（“integer”的缩写）的对象。在下一行，我们打印
    `x` 的类型，Python 如预期打印出：`<class ''int''>`。然后，我们给 `x` 赋一个新值，Python 毫不迟疑地接受了。由于 Python
    是动态类型的，我们可以在运行时更改变量的类型。当我们给 `x` 赋值 `''Hey! Now I am a string!''` 时，`x` 的类型变成了
    `''str''`（“string”的缩写）。


    在静态类型语言（比如 C、Java 或 Rust）中，如果我们尝试类似的操作，会在编译时收到错误。例如，在 Java 中：


    ```

