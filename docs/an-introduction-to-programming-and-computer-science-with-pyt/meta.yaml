    \n有些特别糟糕的名称无论如何都应该避免使用。永远不要使用字母 \"O\"（大写或小写）或 \"l\"（小写 \"L\"）或 \"I\"（大写 \"i\"\
    ）作为变量名。\"O\" 和 \"o\" 看起来太像 \"0\"，\"l\" 和 \"I\" 看起来太像 \"1\"。\n\n虽然通常应避免使用单字母变量名，但有时（取决于上下文）是可以的。例如，使用\
