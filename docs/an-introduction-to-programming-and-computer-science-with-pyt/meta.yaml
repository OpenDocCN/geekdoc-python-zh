    # 7.6 Python f-strings and string interpolation


    The approach described above is valid Python, but there''s a better way. Earlier
    versions of Python offered a form of *string interpolation* borrowed from the
    C programming language and the string `format()` function (neither of which are
    presented here). These are still available, but are largely superseded. With Python
    3.6 came *f-strings*.<sup>1</sup>


    f-strings provide an improved approach to string interpolation. They are, essentially,
    template strings with placeholders for values we wish to interpolate into the
    string.


    An f-string is prefixed with the letter `f`, thus:


    ```

    f''I am an f-string, albeit a boring one.''

    ```


    The prefix tells the Python interpreter that this is an f-string.


    Within the f-string, we can include names of objects or expressions we wish to
    interpolate within curly braces (these are called *replacement fields*). For example,


    ```

    >>> name = ''Carol''

    >>> f''My name is {name}.''

    My name is Carol.

    >>> favorite_number = 498

    >>> f''My favorite number is {favorite_number}.''

    My favorite number is 498.

    >>> f''My favorite number is {400 + 90 + 8}.''

    My favorite number is 498.

    ```


    Here''s how we''d solve our earlier problem above using f-strings.


    ```

    """A program to square a number provided by the user

    and display the result. """


    x = input("Enter a number: ")

    x = float(x)

    result = x * x

    print(f''{x} squared is {result}'')

    ```


    > <sup>1</sup>“F-string” is short for “formatted string literal”. These were introduced
    in Python 3.6. For details, see the *Input and Output* section of the official
    Python tutorial (https://docs.python.org/3/tutorial/inputoutput.html#formatted-string-literals),
    and PEP 498 (https://peps.python.org/pep-0498/) for a complete rationale behind
    literal string interpolation.'
