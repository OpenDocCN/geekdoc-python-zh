    - Bojan (W) vs Carlos (B)

    - Bojan (W) vs Doris (B)

    - Carlos (W) vs Anne (B)

    - Carlos (W) vs Bojan (B)

    - Carlos (W) vs Doris (B)

    - Doris (W) vs Anne (B)

    - Doris (W) vs Bojan (B)

    - Doris (W) vs Carlos (B)


    (we exclude self-pairings for obvious reasons).


    Given the list of players, [''Anne'', ''Bojan'', ''Carlos'', ''Doris''], how could
    we write code to generate all these pairings? One way is with a nested loop.'
