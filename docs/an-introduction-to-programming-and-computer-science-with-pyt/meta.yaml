    \ instructions. Here's a \"Hello World!\" program in assembly language (for ARM64\
    \ architecture):¹\n\n```\n.equ STDOUT, 1\n.equ SVC_WRITE, 64\n.equ SVC_EXIT, 93\n\
    \n.text\n.global _start\n\n_start:\n    stp x29, x30, [sp, -16]!\n    mov x0,\
