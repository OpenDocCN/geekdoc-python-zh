  md: 'While the difference between compilation and interpretation is not quite as
    clear-cut as suggested here, these descriptions will serve for the present purposes.


    # The Python interpreter


    Python is an interpreted language with intermediate bytecode. While you don''t
    need to understand all the details of this process, it''s helpful to have a general
    idea of what''s going on.

    Say you have written this program and saved it as hello_world.py.


    ```

    print(''Hello World!'')

    ```


    You may run this program from the terminal (command prompt), thus:


    ```

    $ python hello_world.py

    ```


    where $ indicates a command prompt (your prompt may vary). When this runs, the
    following is printed to the console:


    ```

    Hello World!

    ```


    When we run this program, Python first reads the source code, then produces the
    intermediate bytecode, then executes each instruction in the bytecode.


    ![](img/c79d476b9b167832781fbb4257bb2cb9_29_0.png)'
