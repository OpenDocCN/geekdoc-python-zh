  md: 'is represented by a letter, here C:, and segments of the path are separated
    by backslashes (\). To access familiar folders like Desktop and Downloads, you
    should follow this directory path: C:\Users\<your account name>. Within that folder
    you should find other folders, for example, Desktop (C:\Users\<your account name>\Desktop).
    To create a folder on your desktop, you can navigate to this directory: C:\Users\<your
    account name>\Desktop (you''ll see this shown at the bottom of the Windows File
    Explorer window), then right-click (press with two fingers on a trackpad or right-click
    on a mouse) to open the context menu. Now, select New and then choose Folder.
    You can name the folder whatever you wish and press Enter on the keyboard to complete
    the operation. Congratulations, you have made a folder on your desktop.


    To perform various file operations like deleting, renaming, copying, *etc.*, you
    can right-click on the file or folder to bring up a context menu. To move a file
    or folder to a new location, you can click and drag it into the desired folder.


    Windows File Explorer hides file extensions for known file types by default (including
    files such as Python programs). However, you can enable the display of file extensions
    through the View tab in the File Explorer ribbon. File extensions tell us what
    type of file something is. For example, a Python file has a .py extension, a text
    file has a .txt extension, and so on.


    # Linux


    Linux uses a file management application called File Manager or Nautilus (in some
    Linux distributions) as its default graphical user interface (GUI) for handling
    files, folders, and applications. File Manager or Nautilus are usually accessible
    from the system menu or application launcher.


    In Linux, the root directory is represented as /, and it serves as the top-level
    directory from which all other files, directories, and applications branch. To
    access commonly used folders, such as Desktop and Downloads, you should follow
    this directory path: /home/<your account name>/. The /home directory contains
    user-specific directories, and <your account name> is a placeholder for the name
    of your user account.


    Just like in macOS, each forward slash (/) in the directory path denotes a new
    folder. For instance, the path to your desktop folder is /home/<your account name>/Desktop.
    Put another way, your Desktop folder is located in /home/<your account name>.


    To create a folder on your desktop, you can navigate to this directory: /home/<your
    account name>/Desktop/, then right-click to open the context menu. Select Create
    New Folder, name it as desired, and press Enter on the keyboard (details may vary
    by distribution). Congratulations, you have successfully created a folder on your
    desktop.


    For various file operations like deletion, renaming, copying, *etc.*, you can
    right-click on the file or folder. To move a file or folder to a different location,
    click and drag it to the desired destination.


    By default, Linux may hide file extensions for known file types. However, you
    can enable the display of file extensions through the file manager''s settings
    or preferences.'
