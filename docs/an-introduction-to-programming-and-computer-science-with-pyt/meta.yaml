  md: '# Appendix D


    # File systems


    By Harry Sharman


    # Introduction


    This appendix covers the basics of the macOS, Linux, and Windows file systems.
    Though there are many similarities between each of these file systems, particularly
    between Mac and Linux, there are three different sections which follow—one for
    each operating system. This is a basic overview so that you can get to the fun
    part, programming!


    If you''re already experienced with the file system of your machine then you probably
    won''t learn anything new here, but maybe you can learn something about a different
    OS!


    macOS, Linux and Windows each have their own, different file system, but they
    are all hierarchical, and all consist of files and directories (a.k.a. folders).
    In a hierarchical file system, files are organized in a tree-like structure, with
    one directory at the top level, and all other files and directories below. You
    can think of this as a tree drawn upside down, with the root at the top, and the
    branches and leaves below. Because your file system is a tree-like structure,
    there''s a unique *path* to each file or directory on your computer. At the end
    of each path is a file (or perhaps an empty directory). Files are like the leaves
    of the tree.


    We will go into more detail with each operating system since they are all slightly
    different. (In this document, paths, or portions thereof, are rendered in fixed-pitch
    typeface.)


    # macOS


    macOS uses Finder as its default file management application. Finder is the graphical
    user interface (GUI) for managing files, folders (directories), and applications.
    Finder is usually in the dock at the bottom of the screen and looks like a half-blue,
    half-white smiley face. Alternatively, you can also get to the Finder by navigating
    to your desktop and clicking on the'
  merge: -1
  pgno: 383
- img_proc: true
  md: 'background of a file or folder. At the top of your screen in the menu bar,
    click File > New Finder Window in the dropdown menu.


    The root directory in macOS is located in “Macintosh HD” (your machine’s primary
    storage device).¹ In the Finder window on the left hand side, you will notice
    there is a sidebar with various folders and locations. If you do not see this
    sidebar, go to View > Show Sidebar. In the sidebar, under Locations, select your
    primary storage device. Again, this is usually labeled “Macintosh HD”. This is
    where you can find all the other files, folders, and applications. By default,
    each user with a login on your Mac has a separate directory for their files. To
    access *your* files and folder, like Desktop and Downloads, you should navigate
    to this directory within your primary storage device: /Users/<your account name>,
    for example /Users/harry.


    /Users/harry is what is called a path. Path segments are separated by /. Each
    path segment (apart from perhaps the last) is a directory (folder). So /Users/harry
    indicates that the directory, harry, is within another directory /Users. A typical
    macOS user directory will contain other directories (folders), such as Documents,
    Downloads, Desktop, *etc*. For example, the directory /Users/harry/Desktop is
    located in /Users/harry, and /Users/harry is located in /Users. /Users is located
    in the root directory, indicated by the initial slash /.


    To make a folder on your desktop, you can navigate to this directory: /Users/<your
    account name>/Desktop (substituting your actual account name), and then right
    click (press with two fingers on a trackpad or Apple Magic Mouse) to open the
    context menu. Now, select New Folder, and give your new folder whatever name you
    wish, and press return on the keyboard. Congratulations, you have made a folder
    in your desktop!


    To delete, rename, copy, *etc*. you can right-click on a folder or file. To move
    a file or folder to a new folder, you can click and drag it into the desired location.


    Like many other operating systems, macOS uses *file extensions*—typically a dot
    followed by two, three, or four characters. These are used to indicate additional
    information about a file (and perhaps to associate it with a program which can
    open it). For example, Python programs usually have the extension .py, text files
    usually have the extension .txt, and so on. However, in macOS, file extensions
    of applications (and certain other files or directories) are hidden by default.


    # Windows


    Windows uses File Explorer as its default file management application. File Explorer
    serves as the graphical user interface (GUI) for managing files, folders, and
    applications. File Explorer is typically accessible through the taskbar at the
    bottom of the screen, and you can also find it by using the Windows Start Menu.
    Try pressing the Windows key, and then navigate to File Explorer.


    The primary storage device in Windows is usually labeled c:. The root directory
    on this drive is c:\. This is where all the other files, folders, and applications
    stem from. On a Windows machine, the disc drive


    > ¹Note that the name of the primary storage device on your machine may be different
    as this is customizable by the user.'
  merge: -1
