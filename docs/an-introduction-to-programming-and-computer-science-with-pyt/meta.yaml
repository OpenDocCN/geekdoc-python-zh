    \ -500\nWhat is the atomic weight of your stuff? 42\nYou have -1.1905E+01 moles\
    \ of stuff!\n```\n\nNonsense! Ideally, our program should not accept negative\
    \ values for grams, and should not accept negative values or zero for atomic weight.\n\
    In any event, you see now how useful testing a range of values can be. Don't let\
    \ yourself be fooled into thinking your program is defect-free if you've not tested\
    \ it with a sufficient variety of inputs.\n\n## 9.5 The origin of the term “bug”\n\
    \nSo where do we get the word “bug” anyhow? Alas, the origin of the term is lost.\
    \ However, in 1947, the renowned computer pioneer Grace Murray Hopper was working\
    \ on the Harvard Mark I computer, and a program was misbehaving.⁴\n\n![](img/c79d476b9b167832781fbb4257bb2cb9_188_0.png)\n\
    \nFigure 9.1: Grace Murray Hopper. Source: The Grace Murray Hopper Collection,\
    \ Archives Center, National Museum of American History (image is in the public\
    \ domain)\n\nAfter reviewing the code and finding no error, she investigated further\
    \ and found a moth in one of the computer’s relays (remember this was back in\
    \ the days when a computer filled an entire large room). The moth was removed,\
    \ and taped into Hopper’s lab notebook.\n\n> ⁴Judging from Hopper’s notebook (9\
    \ September 1947), the misbehaving program was a “multi-adder test”. It appears\
    \ they were running the machine through a sequence of tests—e.g., tests for certain\
    \ trigonometric functions took place earlier that day. At least one had failed\
    \ and some relays (hardware components) were replaced. The multi-adder test was\
    \ started at 3:25 PM (Hopper uses military time in the notebook: “1525”), and\
    \ twenty minutes later, the moth was taped into the notebook. It’s not clear how\
    \ the problem became manifest, but someone went looking at the hardware and found\
    \ the moth.\n\n## The origin of the term “bug”\n\n![](img/c79d476b9b167832781fbb4257bb2cb9_189_0.png)\n\
    \nIn interviews, Hopper said that after this discovery, whenever something was\
    \ wrong she and her team would say “There must be a bug.”\n\nNot everyone likes\
    \ the term “bug.” For example, the famously grumpy Edsger Dijkstra thought that\
    \ calling errors “bugs” was intellectually dishonest. He made this point in an\
    \ essay with the remarkable title “On the cruelty of really teaching computing\
    \ science.”⁵\n\n> We could, for instance, begin with cleaning up our language\
    \ by no longer calling a bug a bug but by calling it an error. It is much more\
    \ honest because it squarely puts the blame where it belongs, viz. with the programmer\
    \ who made the error. The animistic metaphor of the bug that maliciously sneaked\
    \ in while the programmer was not looking is intellectually dishonest as it disguises\
    \ that the error is the programmer’s own creation.\n\n⁵Edsger Dijkstra, 1988,\
    \ “On the cruelty of really teaching computing science”. This essay is recommended.\
    \ See the entry in the Edsger Dijkstra archive hosted by the University of Texas\
    \ at Austin: https://www.cs.utexas.edu/~EWD/transcriptions/EWD10xx/EWD1036.html\n\
    \n![](img/c79d476b9b167832781fbb4257bb2cb9_190_0.png)\n\nFigure 9.3: Edsger Dijkstra.\
    \ Source: University of Texas at Austin, under a Creative Commons license\n\n\
    Despite Dijkstra's remonstrances, the term stuck. So now we have “bugs.”\nBugs\
    \ are, of course, inevitable. What's important is how we strive to avoid them\
    \ and how we fix them when we find them.\n\n## 9.6 Using assertions to test your\
    \ code\n\nMany languages, Python included, allow for *assertions* or *assert statements*.\
    \ These are used to verify things you believe *should* be true about some condition\
    \ or result. By making an assertion, you're saying “I believe *x* to be true”,\
    \ whatever *x* might be. Assertions are a powerful tool for verifying that a function\
    \ or program actually does what you expect it to do.\nPython provides a keyword,\
    \ `assert` which can be used in *assert statements*. Here are some examples:\n\
    Let's say you have a function which takes a list of items for some purchase and\
    \ applies sales tax. Whatever the subtotal might be, we know that the sales tax\
    \ must be greater than or equal to zero. So we write an assertion:\n\n```\nsales_tax\
    \ = calc_sales_tax(items)\nassert sales_tax >= 0\n```\n\nIf `sales_tax` is ever\
    \ negative (which would be unexpected), this statement would raise an `AssertionError`,\
    \ informing you that something you believed to be true, was not, in fact, true.\
    \ This is roughly equivalent to\n\n```\nif sales_tax < 0:\n    raise AssertionError\n\
    ```\n\nbut is more concise and readable.\n\nNotice that if the assertion holds,\
    \ no exception is raised, and the execution of your code continues uninterrupted.\
    \ Here's another example:\n\n```\ndef calc_hypotenuse(a, b):\n    \"\"\"Given\
    \ two legs of a right triangle, return the\n    length of the hypotenuse. \"\"\
    \"\n    assert a >= 0\n    assert b >= 0\n\n    return math.sqrt(a ** 2 + b **\
    \ 2)\n```\n\nWhat's going on here? This isn't data validation. Rather, we're documenting\
    \ conditions that must hold for the function to return a valid result, and we\
    \ ensure that the program will fail if these conditions aren't met. We could have\
    \ a *degenerate triangle*, where one or both legs have length zero, but it cannot\
    \ be the case that either leg has negative length. This approach has the added\
    \ benefit of reminding the programmer what conditions must hold in order to ensure\
    \ correct behavior. Judicious use of assertions can help you write correct, robust\
    \ code.\n\n### Adding friendly messages\n\nPython's assert allows you to provide\
    \ a custom message in the event of an AssertionError. The syntax is simple,\n\n\
    ```\nassert 1 + 1 == 2, \"Something is horribly wrong!\"\n```\n\n### Some caveats\n\
    \nIt's important to understand that assert is a Python keyword and *not* the name\
    \ of a built-in function. This is correct:\n\n```\nassert 0.0 <= x <= 1.0, \"\
    x must be in [0.0, 1.0]\"\n```\n\nbut this is not\n\n```\nassert(0.0 <= x <= 1.0,\
    \ \"x must be in [0.0, 1.0]\")\n```\n\nWhy? This will treat the tuple\n\n```\n\
    (0.0 <= x <= 1.0, \"x must be in [0.0, 1.0]\")\n```\n\nas what is being asserted.\
    \ But non-empty tuples are truthy, and so this will *never* result in an AssertionError,\
    \ no matter what the value of x! Let's test it"
  mdcn: "编写被测试的代码！一个开发团队编写代码，另一个不同的团队为代码编写测试。\n\n我们在这里学到的重要经验是：\n\n-   在测试之前（通过使用计算器、手工计算或其他方法）预先确定程序在任何给定输入下的*预期*输出。然后，你可以将预期值与*实际*值进行比较，从而找出任何差异。\n\
    -   使用广泛的值范围来测试你的代码。在输入为数值的情况下，使用极端值进行测试。\n-   不要忘记人类可能如何输入输入值。不同的用户可能以不同的方式输入\
    \ 1000：1000、1000.0000、1E3、1,000、1,000.0，*等等*。等效的输入值应始终产生等效的输出！\n\n## 另一个例子：克到摩尔\n\
    \n如果你上过化学课，你一定将克转换为*摩尔*。*摩尔*是衡量物质数量的单位。一摩尔相当于 6.02214076 × 10²³ 个*基本实体*，其中基本实体可以是原子、离子、分子，*等等*，具体取决于上下文。例如，一个反应可能产生若干克某种物质，通过转换为摩尔，我们确切地知道这代表了多少个实体。为了将摩尔转换为克，需要知道相关实体的质量。\n\
    \n这里有一个例子。我们的反应产生了 75 克水，H₂O。每个水分子包含两个氢原子和一个氧原子。氢的原子质量为每摩尔 1.008 克。氧的原子质量为每摩尔\
