    \ in Boolean expressions and conditions for loops or branching (if/elif), *truthy*\
    \ values are treated (more-or-less) as `True`, and *falsey* values are treated\
    \ (more-or-less) as `False`.\n\nInput validation\n\n| Truthy things | Falsey things\
    \ |\n| :--- | :--- |\n| any non-zero valued int or float, e.g., 5, -17, 3.1415\
