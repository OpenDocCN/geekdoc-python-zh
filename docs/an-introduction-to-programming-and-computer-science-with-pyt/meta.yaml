  md: '# Chapter 17


    # Graphs


    We have looked at the *dictionary* data structure, which associates *keys* with
    *values*, and we''ve looked at some examples and use cases. Now that we understand
    dictionaries, we''re going to dive into *graphs*. Graphs are a collection of vertices
    (nodes) connected by edges, that represent relationships between the vertices
    (nodes). We''ll see that a dictionary can be used to represent a graph.


    # Learning objectives


    +   - You will learn some of the terms associated with graphs.

    - You will learn how to represent data using a graph.

    - You will learn about searching a graph using breadth-first search.


    # Terms introduced


    +   - graph

    - vertices (nodes)

    - edge

    - neighbor (common edge)

    - adjacent

    - breadth-first search


    # 17.1 Introduction to graphs


    Graphs are a very versatile data structure. They can be used to represent game
    states, positions on a map with routes, people in a social network, and so on.
    Here we will consider graphs that represent positions on a map with routes and
    that represent friendships in a social network.

    Let''s start with maps. Consider a minimal example of two towns in Michigan, Ann
    Arbor and Ypsilanti.


    ![](img/c79d476b9b167832781fbb4257bb2cb9_339_0.png)'
  merge: -1
  pgno: 339
- img_proc: true
  md: 'Here, in the language of graphs, we have two vertices (a.k.a., nodes) representing
    the towns, Ann Arbor and Ypsilanti, and an edge connecting the vertices, indicating
    that a route exists between them. We can travel along this route from Ann Arbor
    to Ypsilanti, and from Ypsilanti to Ann Arbor. Notice the symmetry. This is because
    the edge between Ann Arbor and Ypsilanti is *undirected*, which is reasonable,
    since the highway that connects them allows traffic in both directions.¹


    We refer to vertices which share a common edge as *neighbors*. We also refer to
    vertices which share a common edge as *adjacent*. So in the example above, Ann
    Arbor and Ypsilanti are neighbors. Ann Arbor is adjacent to Ypsilanti, and Ypsilanti
    is adjacent to Ann Arbor.


    Here''s a little more elaborate example:


    ![](img/c79d476b9b167832781fbb4257bb2cb9_340_0.png)


    In this example, Burlington is adjacent to St Albans, Montpelier and Middlebury.
    Rutland is adjacent to Middlebury and Bennington. (Yes, we''re leaving out a lot
    of detail for simplicity''s sake.)


    So the question arises: how do we represent a graph in our code? There are several
    ways, but what we''ll demonstrate here is what''s called the *adjacency list*
    representation.


    We''ll use a dictionary, with town names as keys and the values will be a list
    of all towns adjacent to the key.


    > ¹There are what are called *directed* edges, like one-way streets, but we''ll
    only deal with undirected edges in this text.'
  merge: -1
  pgno: 340
- img_proc: true
  md: "For example, Montpelier is adjacent to St Johnsbury, White River Junction and\
    \ Burlington, so the dictionary entry for Montpelier would look like this:\n\n\
    ```\nROUTES = {'Montpelier': ['Burlington', 'White River Junction',\n        \
    \                 'St Johnsbury']}\n```\n\nA complete representation of adjacencies,\
    \ given the map above is:\n\n```\nROUTES = {\n    'Burlington': ['St Albans',\
    \ 'Montpelier', 'Middlebury'],\n    'Montpelier': ['Burlington', 'White River\
    \ Junction',\n                   'St Johnsbury'],\n    'White River Junction':\
    \ ['Montpelier', 'Brattleboro',\n                             'St Johnsbury'],\n\
    \    'Brattleboro': ['White River Junction'],\n    'Newport': ['St Johnsbury'],\n\
    \    'St Albans': ['Burlington', 'Swanton'],\n    'St Johnsbury': ['Montpelier',\
    \ 'Newport',\n                     'White River Junction'],\n    'Swanton': ['St\
    \ Albans'],\n    'Middlebury': ['Burlington', 'Rutland'],\n    'Rutland': ['Middlebury',\
    \ 'Bennington'],\n    'Bennington': ['Rutland']\n}\n```\n\nNotice that Montpelier,\
    \ St Johnsbury, and White River Junction are all neighbors with each other. This\
    \ is called a *cycle*. If a graph doesn't have any cycles, it is called an *acyclic\
    \ graph*. Similarly, if a graph contains at least one cycle, then it is called\
    \ a *cyclic graph*. So, this is a cyclic graph.\n\n# 17.2 Searching a graph: breadth-first\
    \ search\n\nIt is often the case that we wish to search such a structure. A common\
    \ approach is to use what is called breadth-first search (BFS). Here's how it\
    \ works (in the current context):\n\nWe keep a list of towns that we've visited,\
    \ and we keep a queue of towns yet to visit. Both the list of towns and the queue\
    \ are of type `list`. We choose a starting point (here it doesn't matter which\
    \ one), and we add it to the list of visited towns, and to the queue. This is\
    \ how we begin.\n\nThen, in a while loop, as long as there are elements in the\
    \ queue:\n\n+   - pop a town from the front of the queue\n- for each neighboring\
    \ town, if we haven't already visited the town:\n    - we append the neighboring\
    \ town to the list of visited towns\n    - we append the neighboring town to the\
    \ back of the queue\n\nAt some point, the queue is exhausted (once we've popped\
    \ the last one off), and we only add unvisited towns to the queue. So this algorithm\
    \ will terminate."
