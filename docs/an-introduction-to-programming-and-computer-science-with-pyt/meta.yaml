    # Saving your work


    Entering expressions into the Python shell *does not save anything*. In order
    to save your code, you''ll want to work outside the shell (we''ll see more on
    this soon).


    # Exiting the interpreter


    If you''re using an IDE there''s no need to exit the shell. However, if you''re
    using a terminal, and you wish to return to your command prompt, you may exit
    the shell with `exit()`.


    ```

    >>> exit()

    ```


    # 2.4 Hello, Python!


    It is customary—a nearly universal ritual, in fact—when learning a new programming
    language, to write a program that prints “Hello World!” to the console. This tradition
    goes back as at least as far as 1974, when Brian Kernighan included such a program
    in his tutorial for the C programming language at Bell Labs, perhaps earlier.


    So, in keeping with this fine tradition, our first program will do the same—print
    “Hello World!” to the console.


    Python provides us with simple means to print to the console: a function named
    `print()`. If we wish to print something to the console, we write `print()` and
    place what we wish to print within the parentheses.


    ```

    print("Hello World!")

    ```


    That''s it!


    If we want to run a program in script mode we must write it and save it. Let''s
    do that.


    In your editor or IDE open a new file, and enter this one line of code (above).
    Save the file as `hello_world.py`.


    Now you can run your program. If you''re using an IDE, you can run the file within
    your IDE. You can also run the file from the command line, *e.g.*,


    ```

    $ python hello_world.py

    ```


    where `$` is the command line prompt (this will vary from system to system). The
    `$` isn''t something you type, it''s just meant to indicate a command prompt (like
    `>>>` in the Python shell). When you run this program it should print:'
