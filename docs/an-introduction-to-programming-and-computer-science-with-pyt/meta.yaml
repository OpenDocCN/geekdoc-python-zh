    \n## 7.6 Python f-string 与字符串插值\n\n上述方法是有效的 Python 代码，但还有更好的方式。早期版本的 Python 提供了一种借鉴自\
    \ C 语言和字符串 `format()` 函数的 *字符串插值* 形式（此处均不介绍）。这些方法仍然可用，但已基本被取代。Python 3.6 引入了 *f-string*。<sup>1</sup>\n\
    \nf-string 提供了一种改进的字符串插值方法。本质上，它们是带有占位符的模板字符串，用于将我们希望插入字符串的值进行插值。\n\nf-string\
    \ 以字母 `f` 为前缀，如下所示：\n\n```\nf'I am an f-string, albeit a boring one.'\n```\n\n\
    该前缀告诉 Python 解释器这是一个 f-string。\n\n在 f-string 内部，我们可以将希望插值的对象名称或表达式包含在花括号中（这些被称为\
    \ *替换字段*）。例如，\n\n```\n>>> name = 'Carol'\n>>> f'My name is {name}.'\nMy name is\
    \ Carol.\n>>> favorite_number = 498\n>>> f'My favorite number is {favorite_number}.'\n\
    My favorite number is 498.\n>>> f'My favorite number is {400 + 90 + 8}.'\nMy favorite\
    \ number is 498.\n```\n\n以下是我们使用 f-string 解决上述问题的方法。\n\n```\n\"\"\"一个程序，用于计算用户提供的数字的平方并显示结果。\"\
    \"\"\n\nx = input(\"Enter a number: \")\nx = float(x)\nresult = x * x\nprint(f'{x}\
    \ squared is {result}')\n```\n\n> <sup>1</sup>“F-string”是“格式化字符串字面值”的缩写。它们在 Python\
    \ 3.6 中引入。详情请参阅官方 Python 教程的 *输入与输出* 部分 (https://docs.python.org/3/tutorial/inputoutput.html#formatted-string-literals)，以及\
    \ PEP 498 (https://peps.python.org/pep-0498/) 了解字面字符串插值背后的完整原理。\n\n## 7.7 格式说明符\n\
    \n假设某个计算的结果是 1/3。其十进制展开是 0.333... 让我们打印它。\n\n```\n>>> 1 / 3\n0.3333333333333333\n\
    ```\n\n现在，在这个例子中，你不太可能需要或想要显示 0.3333333333333333 这么多位小数。通常，打印小数点后较少的数字就足够了，例如\
    \ 0.33 或 0.3333。如果我们将这个值插值到 f-string 中，会得到类似的结果。\n\n```\n>>> x = 1 / 3\n>>> f'{x}'\n\
    '0.3333333333333333'\n```\n\n幸运的是，我们可以告诉 Python 我们希望使用多少位小数。我们可以在 f-string 中包含一个\
    \ *格式说明符*。\n\n```\n>>> x = 1 / 3\n>>> f'{x:.2f}'\n'0.33'\n```\n\n其语法是在插值元素后跟一个冒号\
    \ `:`，然后是指定所需格式的说明符。在上面的例子中，我们使用了 `.2f`，意思是“显示为保留两位小数的浮点数”。注意这里发生了什么：\n\n```\n\
    >>> x = 2 / 3\n>>> f'{x:.2f}'\n'0.67'\n```\n\nPython 已经为我们处理了四舍五入，将值 0.6666666666666666\
    \ 四舍五入到两位小数。除非你有非常特殊的原因不这样做，否则你应该使用 f-string 来格式化输出。我们可以使用许多格式说明符。以下是一些示例：\n\n\
    ### 将浮点数格式化为百分比。\n\n```\n>>> x = 2 / 3\n>>> f'{x:.2%}'\n'66.67%'\n```\n\n### 将整数格式化为带逗号分隔的千位分隔符\n\
    \n```\n>>> x = 1234567890\n>>> f'{x:,}'\n'1,234,567,890'\n```\n\n### 将浮点数格式化为带逗号分隔的千位分隔符\n\
    \n```\n>>> gdp = 22996100000000  # 美国国内生产总值\n>>> population = 331893745  # 美国人口，2021年估计值\n\
    >>> gdp_per_capita = gdp / population\n>>> f'${gdp_per_capita:,.2f}'\n'$69,287.54'\n\
