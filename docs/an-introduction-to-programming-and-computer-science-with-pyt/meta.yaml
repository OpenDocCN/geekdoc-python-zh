    \ internet, perhaps attempting to make Python code look more similar to languages\
    \ like C or Java (in the case of Java, an executable program *must* implement\
    \ `main()`). But again, *this is not the Python way*.\n\nHere's how things work\
    \ in Python. Python has what is called the *top-level code environment*. When\
    \ a program is executed in this environment (which is what happens when you run\
    \ your code within your IDE or from the command line), there's a special variable\
    \ `__name__` which is automatically set to the value `'__main__'`.¹ `'__main__'`\
    \ is the name of the environment in which top-level code is run.\n\nSo if we wish\
    \ to distinguish portions of our code which are automatically run when executed\
    \ (sometimes called *driver code*) from other portions of our code (like imports\
    \ and the functions we define), we do it thus:\n\n```\n\"\"\"\nA program which\
    \ prompts the user for a radius of a circle,\nr, and calculates and reports the\
    \ circumference.\n\"\"\"\n\nimport math\n\ndef circumference(r_):\n    return\
    \ 2 * math.pi * r_\n\nif __name__ == '__main__':\n\n    # This code will only\
