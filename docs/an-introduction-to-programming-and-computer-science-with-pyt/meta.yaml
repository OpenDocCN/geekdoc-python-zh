    \ to deal with the problem.\n\nFor this we have, minimally, a try/except compound\
    \ statement. This involves creating two blocks of code: a try block and an exception\
    \ handler--an except block.\n\nThe code in the try block is code where we want\
    \ to guard against unhandled exceptions. A try block is followed by an except\
    \ block. The"
