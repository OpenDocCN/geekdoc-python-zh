  - '[PAGE 349]


    # arithmetic sequence


    An *arithmetic sequence* of numbers is one in which the difference between successive
    terms is a constant. For example, 1, 2, 3, 4, 5,... is an arithmetic sequence
    because the difference between successive terms is the constant, 1. Other examples
    of arithmetic sequences:


    2, 4, 6, 8, 10, ...

    7, 10, 13, 16, 19, 22, ...

    44, 43, 42, 41, 40, 39, ...


    Python''s range objects are a form of arithmetic sequence. The stride (which defaults
    to 1) is the difference between successive terms. Example:


    ```

    range(3, 40, 3)

    ```


    when iterated counts by threes from three to 39.


    # assertion


    An *assertion* is a statement about something you believe to be true. “At the
    present moment, the sky is blue.” is an assertion (which happens to be true where
    I am, as I write this). We use assertions in our code to help verify correctness,
    and assertions are often used in software testing. Assertions can be made using
    the Python keyword *assert* (note that this is a keyword and *not* a function).
    Example:


    ```

    assert 4 == math.sqrt(16)

    ```


    # assignment


    We use *assignment* to bind values to names. In Python, this is accomplished with
    the assignment operator, =. For example:


    ```

    x = 4

    ```


    creates a name x (presuming x has not been defined earlier), and associates it
    with the value, 4.


    # binary code


    Ultimately, all instructions that are executed on your computer and all data represented
    on your computer are in *binary code*. That is, as sequences of 0s and 1s.


    # bind / bound / binding


    When we make an assignment, we say that a value is *bound* to a name—thus creating
    an association between the two. For example, the assignment n = 42 *binds* the
    name n to the value 42.'
