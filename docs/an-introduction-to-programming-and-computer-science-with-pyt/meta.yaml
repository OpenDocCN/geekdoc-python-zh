    ### 练习 03\n\n以下表达式的求值结果是什么？\n\n- a. 10 % 2\n- b. 19 % 2\n- c. 24 % 5\n- d. -8\
    \ % 3\n\n### 练习 04\n\n你认为如果我们对非数字类型使用刚刚看到的操作数会发生什么？例如，你认为如果我们输入以下内容会发生什么。然后使用\
    \ Python 解释器检查你的预期。有什么意外吗？\n\n- a. 'Hello' + ', ' + 'World!'\n- b. 'Hello' * 3\n\
    - c. True * True\n- d. True * False\n- e. False * 42\n- f. -True\n- g. True +\
    \ True\n\n### 练习 05\n\n以下语句有什么区别？\n\n```\nit_is_cloudy_today = True\nit_will_rain_tomorrow\
    \ = 'True'\n```\n\n### 练习 06\n\n有些操作数不适用于某些类型。例如，以下内容将导致错误。在提示符下尝试这些，并观察发生了什么。记下发生的错误类型。\n\
    \n- a. 'Hello' / 3\n- b. -'Hello'\n- c. 'Hello' - 'H'\n\n### 练习 07\n\n- a. 编写一条语句，将值\
    \ 79.95 赋给变量名 subtotal。\n- b. 编写一条语句，将值 0.06 赋给变量名 tax_rate。\n- c. 编写一条语句，将 subtotal\
    \ 乘以 tax_rate，并将结果赋给变量名 sales_tax。\n- d. 编写一条语句，将 subtotal 和 sales_tax 相加，并将结果赋给变量名\
