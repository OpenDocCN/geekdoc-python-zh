  md: '# 8.2 Comparison operators


    It is often the case that we wish to compare two objects or two values. We do
    this with *comparison operators*.


    **Comparison operators** compare two objects (or the values of these objects)
    and return a Boolean `True` if the comparison holds, and `False` if it does not.


    Python provides us with the following comparison operators (and more):


    | Operator | Example | Explanation |

    | :--- | :--- | :--- |

    | == | a == b | Does the value of a *equal* the value of b? |

    | > | a > b | Is the value of a *greater than* the value of b? |

    | < | a < b | Is the value of a *less than* the value of b? |

    | >= | a >= b | Is the value of a *greater than or equal to* the value of b? |

    | <= | a <= b | Is the value of a *less than or equal to* the value of b? |

    | != | a != b | Is the value of a *not equal to* the value of b? |


    It''s important to understand that *these operators perform comparisons* and expressions
    which use them to *evaluate to a Boolean value* (True or False).


    Let''s demonstrate in the Python shell.


    ```

    >>> a = 12

    >>> b = 31

    >>> a == b

    False

    >>> a > b

    False

    >>> a < b

    True

    >>> a >= b

    False

    >>> a <= b

    True

    >>> a != b

    True

    >>> not (a == b)

    True

    ```


    Now what happens in the case of strings? Let''s try it and find out!


    ```

    >>> a = ''duck''

    >>> b = ''swan''

    >>> a == b

    False

    >>> a > b

    False

    ```'
