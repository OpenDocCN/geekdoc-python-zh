    \n当参数或操作数的类型有效，但其值在某种程度上不合适时，会引发 `ValueError`。我们已经看到如何导入 math 模块以及如何使用 `math.sqrt()`\
    \ 来计算某个数字的平方根。然而，`math.sqrt()` 不接受负的操作数（它不知道复数），因此，如果你向 `math.sqrt()` 提供一个负的操作数，就会引发\
    \ `ValueError`。\n\n示例：\n\n```python\n>>> import math\n>>> math.sqrt(4)  # 这完全没问题\n\
    2.0\n>>> math.sqrt(-1)\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nValueError: math domain error\n```\n\n在这种情况下，你需要确保导致问题的参数或操作数具有合适的值。\n\
    \n### ModuleNotFoundError\n\n如果我们尝试导入一个不存在的模块、Python 找不到的模块，或者我们拼错了模块名称，就会遇到 `ModuleNotFoundError`。\n\
    \n示例：\n\n```python\n>>> import maath\nTraceback (most recent call last):\n  File\
    \ \"<stdin>\", line 1, in <module>\nModuleNotFoundError: No module named 'maath'\n\
    ```\n\n## 5.8 练习\n\n### 练习 01\n\n识别以下每个函数中的形式参数。\n\n- a.\n\n```python\ndef add_one(n):\n\
    \    n = n + 1\n    return n\n```\n\n- b.\n\n```python\ndef power(x, y):\n   \
    \ return x ** y\n```\n\n### 练习 02\n\n以下每个函数定义都有问题。找出问题并提出修复方法。\n\n- a. 计算任意实数立方的函数。\n\
    \n```python\ndef cube:\n    return x ** 3\n```\n\n- b. 打印某人名字的函数。\n\n```python\n\
    def say_hello():\n    print(name)\n```\n\n- c. 计算任意实数 $x$ 的 $x^2 + 3x - 1$ 的函数。\n\
    \n```python\ndef poly(x):\nreturn x ** 2 + 3 * x - 1\n```\n\n- d. 接受某个数字 $x$，减去\
    \ 1，并返回结果的函数。\n\n```python\ndef subtract_one(x):\n    y = x - 1\n```\n\n### 练习\
    \ 03\n\n编写一个函数，该函数接受任意字符串作为参数，并将该字符串打印到控制台。\n\n### 练习 04\n\n编写一个函数，该函数接受两个数值参数（浮点数或整数）并返回它们的乘积。\n\
    \n### 练习 05\n\n- a. 编写一个函数，该函数接受一个整数作为参数，如果整数是偶数则返回 0，如果是奇数则返回 1。提示：取余（模）运算符 `%`\
    \ 在执行整数除法时计算余数。例如，`17 % 5` 的结果是 2，因为 5 除以 17 三次，余数为二。\n- b. 你给你的函数起了什么名字，为什么？\n\
    \n### 练习 06\n\n编写一个函数，该函数接受两个数值参数，一个名为 `subtotal`，另一个名为 `tax_rate`，计算并返回含税总额。例如，如果提供的参数是\
    \ `subtotal` 为 114.0，`tax_rate` 为 0.05，你的函数应返回值 119.7。如果参数是 328.0 和 0.045，你的函数应返回值\
    \ 342.76。\n此函数不应产生任何副作用。\n\n## 第 6 章\n\n## 风格\n\n> 程序必须为人类阅读而编写，只是顺便为机器执行。\n–Abelson,\
    \ Sussman, and Sussman\n\n学习规则，这样你才知道如何打破它们。\n–第十四世达赖喇嘛\n\n本章将通过使用 PEP 8 风格指南来介绍良好\
    \ Python 风格的概念。我们将进一步理解常量，了解使用注释的好处，以及如何/何时有效地使用它们。\n\n### 学习目标\n\n- 你将了解良好 Python\
    \ 风格和 PEP 8 风格指南的重要性。\n- 你将学习命名常量的约定。\n- 你将了解 Python 中的注释和文档字符串及其用途。\n\n### 引入的术语\n\
    \n- camelCase\n- docstring\n- inline comment\n- PEP 8\n- single-line comment\n\
    - snake_case\n\n## 6.1 风格的重要性\n\n当我们学习编写程序时，我们也将学习如何使用良好的风格。良好的编码风格比许多初学者意识到的更重要。使用良好的风格：\n\
    \n- 帮助你更快、更准确地阅读你的代码。\n- 使识别语法错误和常见错误更容易。\n- 帮助澄清你对代码的推理。\n\n大多数工作场所和开源项目都要求遵守编码标准。例如，*Google\
    \ 的 Python 风格指南*。<sup>1</sup>\n\n当我们解决问题时，我们不希望阅读代码或决定代码格式消耗超过其应占份额的宝贵认知负荷。所以从一开始就走正确的道路，使用良好的风格。这样，你就可以解放你的大脑去解决问题——那才是有趣的部分。\n\
    \n每种语言都有其约定，你应该遵守它们。这是编写可读、地道代码的一部分。\n\n## 6.2 PEP 8\n\n幸运的是，有一个长期存在的、全面的 Python\
    \ 风格指南，称为 PEP 8。<sup>2</sup> 整个风格指南 *PEP 8 – Python 代码风格指南* 可在线获取。<sup>3</sup>\
    \ 著名的 Python 开发者 Kenneth Reitz 制作了一个稍微美化的版本，地址为 [https://pep8.org/](https://pep8.org/)。你应该查阅这些资源以获取关于\
    \ Python 良好风格的完整指南。工业界和开源世界中的许多项目都强制执行此标准。\n\n不要想着节省按键次数——遵循风格指南，你会发现这有助于你（以及他人！）阅读和理解你所写的内容。\n\
    \n## 6.3 空白\n\n是的！空白很重要！正确使用空白可以使你的代码*更*易读。\n\n在运算符之间和逗号之后使用空白。<sup>4</sup> 示例：\n\
    \n```python\n# 不要这样做\n\nx=3.4*y+9-17/2\n\njoules=(kg*m**2)/(sec**2)\n\namount=priceperitem*items\n\
    ```\n\n相反，这样做：\n\n```python\n# 更好\n\nx = 3.4 * y + 9 - 17 / 2\n\njoules = (kg\
    \ * m ** 2) / (sec ** 2)\n\namount = price_per_item * items\n```\n\n如果没有运算符之间的空白，你的眼睛和大脑需要做更多的工作来划分这些内容以便阅读。\n\
    \n然而，有时额外的空白是不必要的，甚至可能妨碍可读性。你应该避免在右括号、方括号或圆括号之前以及左括号、方括号或圆括号之后使用不必要的空白。\n\n```python\n\
    # 不要这样做\n\npicas = inches_to_picas ( inches )\n\n# 更好\n\npicas = inches_to_picas(inches)\n\
    ```\n\n不要在函数名后放置空白。\n\n```python\n# 不要这样做\n\ndef inches_to_points (in):\n    return\
    \ in * POINTS_PER_INCH\n\n# 更好\n\ndef inches_to_points(in):\n    return in * POINTS_PER_INCH\n\
    ```\n\n这样做，我们就在函数名和其参数之间创建了紧密的视觉关联。\n\n不要在逗号或冒号之前放置空白。\n\n```python\n# 不要这样做\n\
    \nlst = [3 , 2 , 1]\n\n# 更好\nlst = [3, 2, 1]\n```\n\n在代码块内插入空行以逻辑分隔元素是可以的，但不要使用超过一个空行。例外情况是函数声明前应有两个空行，函数体后应有两个空行。\n\
    \n<sup>1</sup> [https://google.github.io/styleguide/pyguide.html](https://google.github.io/styleguide/pyguide.html)\n\
    <sup>2</sup> PEP 是 Python Enhancement Proposal 的缩写\n<sup>3</sup> [https://peps.python.org/pep-0008/](https://peps.python.org/pep-0008/)\n\
    <sup>4</sup> 此规则的一个例外是函数调用中的关键字参数，*例如*，内置 `print()` 函数的 `end` 关键字参数。"
