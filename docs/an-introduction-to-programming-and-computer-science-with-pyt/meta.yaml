    # 10.2 Tuples


    A tuple? What’s a tuple? A **tuple** is an *immutable sequence* of objects. Like
    lists they allow for indexed access of elements. Like lists they may contain any
    arbitrary type of Python object (int, float, bool, str, *etc.*). Unlike lists
    they are immutable, meaning that once created they cannot change. You’ll see that
    this property can be desirable in certain contexts.


    # How do we write a tuple?


    The crucial thing in writing a tuple is commas—we separate elements of a tuple
    with commas—but it’s conventional to write them with parentheses as well. Here
    are some examples:


    ```

    >>> coordinates = 0.378, 0.911

    >>> coordinates

    (0.378, 0.911)

    >>> coordinates = (1.452, 0.872)

    >>> coordinates

    (1.452, 0.872)

    ```


    We can create a tuple with a single element with a comma, with or without parentheses.


    ```

    >>> singleton = 5,

    >>> singleton

    (5,)

    >>> singleton = (''Hovercraft'',)

    >>> singleton

    (''Hovercraft'',)

    ```


    Notice that it’s the comma that’s crucial.


    ```

    >>> (5)

    5

    >>> (''Hovercraft'')

    ''Hovercraft''

    ```


    We can create an empty tuple, thus:


    ```

    >>> empty = ()

    >>> empty

    ()

    ```


    In this case, no comma is needed.'
