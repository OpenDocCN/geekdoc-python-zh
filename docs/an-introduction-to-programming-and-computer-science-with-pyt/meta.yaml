  md: '```

    >>> a < b

    True

    >>> a >= b

    False

    >>> a <= b

    True

    >>> a != b

    True

    >>> not (a == b)

    True

    ```


    What''s going on here? When we compare strings, we compare them *lexicographically*.
    A string is *less than* another string if its lexicographic order is lower than
    the other. A string is *greater than* another string if its lexicographic order
    is greater than the other.


    # What is *lexicographic* order?


    Lexicographic order is like alphabetic order, but is somewhat more general. Consider
    our example ''duck'' and ''swan''. This is an easy case, since both are four characters
    long, so alphabetizing them is straightforward.

    But what about ''a'' and ''aa''? Which comes first? Both start with ''a'' so their
    first character is the same. If you look in a dictionary you''ll find that ''a''
    appears before ''aa''.² Why? Because when comparing strings of different lengths,
    the comparison is made as if the shorter string were padded with an invisible
    character which comes before all other characters in the ordering. Hence, ''a''
    comes before ''aa'' in a lexicographic ordering.


    ```

    >>> ''a'' < ''aa''

    True

    >> ''a'' > ''aa''

    False

    ```


    The situation is a little more complex than this, because strings can have any
    character in them (not just letters, and hence the term “alphabetic order” loses
    its meaning). So what Python actually compares are the *code points* of Unicode
    characters. Unicode is the system that Python uses to encode character information,
    and Unicode includes many other alphabets (Arabic, Armenian, Cyrillic, Greek,
    Hangul, Hebrew, Hindi, Telugu, Thai, *etc.*), symbols from non-alphabetic languages
    such as Chinese or Japanese Kanji, and many special symbols (®, €, ±, ∞, *etc.*).
    Each character has a number associated with it called a *code point* (yes, this
    is a bit of a simplification). In comparing strings, Python compares these values.³


    > ²Yes, “aa” is a word, sometimes spelled “a''a”. It comes from the Hawai''ian,
    meaning rough and jagged cooled lava (as opposed to *pahoehoe*, which is very
    smooth).

    ³If you want to get really nosy about this, you can use the Python built-in function
    ord() to get the numeric value associated with each character. *E.g.*,

    >>> ord(''A'')

    65'
