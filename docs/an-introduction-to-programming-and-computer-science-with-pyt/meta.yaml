    \n流程图是一种方便且常用的工具，用于在图表中表示程序（或其部分）的行为。它们可以帮助我们在开始编写程序之前推理程序的行为。如果我们有一个好的流程图，这可以成为程序的有用“蓝图”。我们将从基础开始。流程图最常用的元素是：\n\
    \n-   椭圆，表示程序执行的开始或结束，\n-   矩形，表示执行某些计算或任务，\n-   菱形，表示决策，以及\n-   有向边（又称箭头），表示流程。\n\
    \n![](img/c79d476b9b167832781fbb4257bb2cb9_158_0.png)\n\n**图 8.1：** 基本流程图元素\n\n\
    菱形（决策）有一个输入和两个输出。正是在这些点上，我们测试某个条件。我们称之为分支——我们通过流程图的路径可以遵循两个分支之一。如果条件为真，我们走一个分支。如果条件为假，我们走另一个分支。\n\
    \n![](img/c79d476b9b167832781fbb4257bb2cb9_159_0.png)\n\n### 一个最小的例子\n\n这是一个最小的例子——一个程序，它提示用户输入一个整数\
    \ n，然后，如果 n 是偶数，程序打印“n 是偶数”，否则程序打印“n 是奇数！”\n\n为了确定 n 是偶数还是奇数，我们将执行一个简单的测试：我们将计算模二的余数，并将此值与零进行比较。⁵\
    \ 如果比较结果为 True，那么我们知道除以二的余数为零，因此 n 必须是偶数。如果比较结果为 False，那么我们知道余数为一，因此 n 必须是奇数。（当然，这假设用户输入了一个有效的整数。）\n\
    \n这个程序的流程图如下所示：\n\n> ⁵记住，如果我们有一个整数 n，那么必然有 n ≡ 0 mod 2 或 n ≡ 1 mod 2。这是*仅有的*可能性。\n\
    \n![](img/c79d476b9b167832781fbb4257bb2cb9_160_0.png)\n\n**图 8.3：偶数还是奇数**\n\n\
    -   我们从顶部（标记为“开始”的椭圆）开始。\n-   从那里，我们进入下一步：提示用户输入一个整数 n。\n-   然后我们测试 n 除以二的余数是否等于零。\n\
    \    -   如果是，我们走左边的分支，打印“n 是偶数！”\n    -   否则，我们走右边的分支，打印“n 是奇数！”\n-   最后，我们的程序结束。\n\
    \n这是用 Python 实现的：\n\n```\n\"\"\"\nCS 1210\n偶数还是奇数？\n\"\"\"\n\nn = int(input('Please\
    \ enter an integer: '))\n\nif n % 2 == 0:\n    print('n is even!')\nelse:\n  \
    \  print('n is odd!')\n```\n\n分支发生在这里：\n\n```\nif n % 2 == 0:\n    print('n is\
    \ even!')\nelse:\n    print('n is odd!')\n```\n\n注意有两个分支：\n\n-   if 子句——当表达式 `n\
    \ % 2 == 0` 求值为 True 时执行的部分；以及\n-   else 子句——当表达式 `n % 2 == 0` 求值为 False 时执行的部分。\n\
    \n### 另一个例子：一个数是正数、负数还是零？\n\n假设我们想判断一个数是正数、负数还是零。在这种情况下，有三种可能性。我们如何用只产生 True 或\
