    \ LIFO，发音为 life-o）。它是一种线性数据结构，我们在一端向列表添加元素，并从*同一端*移除元素。\n\n栈的经典例子是自助餐厅的托盘。通常这些托盘放在一个弹簧床上，顾客从顶部取走托盘，栈中的下一个托盘就露出来了。第一个放上栈的托盘是最后一个被取走的。你可能见过可以堆叠的椅子。最后放上去的是第一个被拿走的。你打包过行李箱吗？最后放进去的东西是第一个被拿出来的。你点击过网页浏览器中的“后退”按钮吗？网页浏览器使用栈来跟踪你访问过的页面。你使用过\
    \ ctrl-z 来撤销对文档的编辑吗？你的橱柜里有一摞盘子或碗吗？猜怎么着？这些都是栈在日常生活中的例子。\n\n我们将向栈添加一个元素称为*入栈*。我们将从栈中移除一个元素称为*出栈*（这听起来应该很熟悉）。\n\
    \n![](img/c79d476b9b167832781fbb4257bb2cb9_261_0.png)\n\n当我们把一个项目推入栈时，它就成为了“栈顶”项目。\n\
