    # 8.7 Some string methods


    Python provides us with many tools for manipulating strings. We won’t introduce
    them all here, but instead we’ll demonstrate a few which we’ll use in programming
    exercises, and then introduce more as we need them.


    First, what is a *string method*? If you’ve ever programmed in Java or C# or other
    OOP language, you may be familiar with methods. If not, don’t fret, because the
    concept isn’t too difficult.


    Strings are a type of *object* in Python. Consider what happens when we ask Python
    what type the string “Mephistopheles” is.


    ```

    >>> type(''Mephistopheles'')

    <class ''str''>

    ```


    What Python is telling us is that “Mephistopheles” is an object of type str.


    When the developers of Python defined the types *str*, *int*, *float*, *bool*,
    *etc.*, they created *classes* corresponding to these different types of objects.
    We won’t cover any object-oriented programming in this book, but you can think
    of a class as a blueprint for creating objects of a given type. We *instantiate*
    an object by making an assignment, for example


    ```

    n = 42

    ```


    creates an *object* of type *int*, and


    ```

    s = ''Cheese Shoppe''

    ```


    creates an *object* of type *str*, and so on. The class definitions give Python
    a blueprint for instantiating objects of these different types.


    One of the things classes allow us to do is to define *methods* that are part
    of the class definition and which are included with the objects along with their
    data. Methods are nothing more than functions defined for a class of objects which
    operate on the data of those objects.


    Here’s an example. Let’s create a string object, s


    ```

    >>> s = ''mephistopheles''

    ```'
