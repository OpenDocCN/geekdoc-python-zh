    ### Exercise 06\n\nWrite a program with a function that takes three integers as\
    \ arguments and returns their sum. Comment first, then write your code.\n\n# Chapter\
    \ 10\n\n## Sequences\n\nIn this chapter, we'll introduce two new types, lists\
    \ and tuples. These are fundamental data structures that can be used to store,\
    \ retrieve, and, in some contexts, manipulate data. We sometimes refer to these\
    \ as “sequences” since they carry with them the concepts of order and sequence.\
    \ Strings (str) are also sequences.\n\n### Learning objectives\n\n- You will learn\
    \ about lists, and about common list operations, including adding and removing\
    \ elements, finding the number of elements in a list, checking to see if a list\
    \ contains a certain value, etc.\n- You will learn that lists are mutable. This\
    \ means that you can modify a list after it's created. We can append items, remove\
    \ items, change the values of individual items and more.\n- You will learn about\
    \ tuples. Tuples are unlike lists in that they are immutable—they cannot be changed.\n\
    - You will learn that strings are sequences.\n- You will learn how to use indices\
    \ to retrieve individual values from these structures.\n\nIn the next chapter,\
    \ we'll learn how to iterate over the elements of a sequence.\n\n### Terms introduced\n\
    \n- list\n- tuple\n- mutable\n- immutable\n- index\n- sequence unpacking\n- slicing\n\
    \n## 10.1 Lists\n\nThe *list* is one of the most widely used data structures in\
    \ Python. One could not enumerate all possible applications of lists.¹ Lists are\
    \ ubiquitous, and you’ll see they come in handy!\n\n### What is a list?\n\nA *list*\
    \ is a *mutable sequence of objects*. That sounds like a mouthful, but it’s not\
    \ that complicated. If something is *mutable*, that means that it can change (as\
    \ opposed to *immutable*, which means it cannot). A *sequence* is an *ordered\
    \ collection*—that is, each element in the collection has its own place in some\
    \ ordering.\n\nFor example, we might represent customers queued up in a coffee\
    \ shop with a list. The list can change—new people can get in the coffee shop\
    \ queue, and the people at the front of the queue are served and they leave. So\
    \ the queue at the coffee shop is *mutable*. It’s also *ordered*—each customer\
    \ has a place in the queue, and we could assign a number to each position. This\
    \ is known as an *index*.\n\n### How to write a list in Python\n\nThe syntax for\
    \ writing a list in Python is simple: we include the objects we want in our list\
    \ within square brackets. Here are some examples of lists:\n\n```python\ncoffee_shop_queue\
    \ = ['Bob', 'Egbert', 'Jason', 'Lisa',\n                     'Jim', 'Jackie',\
    \ 'Sami']\nscores = [74, 82, 78, 99, 83, 91, 77, 98, 74, 87]\n```\n\nWe separate\
    \ elements in a list with commas.\n\nUnlike many other languages, the elements\
    \ of a Python list needn’t all be of the same type. So this is a perfectly valid\
    \ list:\n\n```python\nmixed = ['cheese', 0.1, 5, True]\n```\n\nThere are other\
