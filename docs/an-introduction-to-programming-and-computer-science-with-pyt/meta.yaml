    - An exchange rate.\n- A label for the currency we want to receive (as above).\
    \ We'll call this the *target currency*.\n\nLet's imagine how this might work:\n\
    \n1. The user is prompted for a source currency label.\n2. The user is prompted\
    \ for a target currency label.\n3. The user is prompted for an amount (in the\
    \ source currency).\n4. The user is prompted for an exchange rate.\n5. The program\
    \ displays the result.\n\nThis raises the question: how do we express the exchange\
    \ rate? One approach would be to express the rate as the ratio of the value of\
    \ the source currency unit to the target currency unit. For example, as of this\
    \ writing, one US dollar (USD) is equivalent to 1.3134 Canadian dollars (CAD).\n\
    \nTaking this approach, we'll multiply the source currency amount by the exchange\
    \ rate to get the equivalent value in the target currency. Here's how a session\
    \ might proceed:\n\n```\nEnter source currency label: USD\nEnter target currency\
    \ label: CAD\nOK. We will convert USD to CAD.\nEnter the amount in USD you wish\
    \ to convert: 1.00\nEnter the exchange rate (USD/CAD): 1.3134\n1.00 USD is worth\
    \ 1.31 CAD\n```\n\nAt this point, we don't have all the tools we'd need to validate\
    \ input from the user, so for this program we'll trust the user to be well-behaved\
    \ and to enter reasonable labels and rates. (We'll see more on input validation\
    \ and exception handling soon.) With this proviso, here's how we might start this\
    \ program:\n\n```\nsource_label = input('Enter source currency label: ')\ntarget_label\
    \ = input('Enter target currency label: ')\nprint(f'OK. We will convert {source_label}\
    \ '\n      f'to {target_label}.')\n```\n\nThis code will prompt the user for source\
    \ and target labels and then print out the conversion the user has requested.\
    \ Notice that we use an f-string to interpolate the user-supplied labels.\n\n\
    <sup>4</sup>For three-character ISO 4217 standard currency codes, see: https://en.wikipedia.org/wiki/ISO_4217.\n\
    \n## Example: currency converter\n\nNow we need two other bits of information:\
