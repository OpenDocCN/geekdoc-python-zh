  md: 'Computers compute. They can''t pluck a random number out of thin air. You might
    think that computation by your computer is deterministic and you''d be right.


    So how do we use a deterministic computing device to produce something that appears
    random, something that has all the statistical properties we need?


    Deep down, the `random` module makes use of an algorithm called the *Mersenne
    twister* (what a lovely name for an algorithm!).¹ You don''t need to understand
    how this algorithm works, but it''s useful to understand that it does require
    an input used as a starting point for its calculations. This input is called a
    *seed*, and from this, the algorithm produces a sequence of pseudo-random numbers.
    At each request, we get a new pseudo-random number.


    ```

    >>> import random

    >>> random.random()

    0.16558225561225903

    >>> random.random()

    0.20717009610984627

    >>> random.random()

    0.2577426786448077

    >>> random.random()

    0.5173312574262303

    >>>

    ```


    Try this out. (The sequence of numbers you''ll get will differ.)

    So where does the seed come in? By default, the algorithm gets a seed from your
    computer''s operating system. Modern operating systems provide a special source
    for this, and if a seed is not supplied in your code, the `random` module will
    ask the operating system to supply one.²


    # 12.3 Using the seed


    Most of the time we want unpredictability from our pseudo-random number generator
    (or choices). However, sometimes we wish to control the process a little more,
    for comparability of results.

    For example, it would be difficult, if not impossible, to test a program whose
    output is unpredictable. This is why the `random` module allows us to provide
    our own seed. If we start the process from the same seed, the


    > ¹M. Matsumoto and T. Nishimura, 1998, "Mersenne Twister: A 623-dimensionally
    equidistributed uniform pseudorandom number generator", *ACM Transactions on Modeling
    and Computer Simulation*, 8(1).

    ²If you''re curious, try this:


    ```

    >>> import os        # interface to the operating system

    >>> os.urandom(8)    # request a bytestring of size 8

    b''\xa6t\x08=\xa5\x19\xde\x94''

    ```


    This is where the `random` module gets its seed by default. This service itself
    requires a seed, which the OS gets from a variety of hardware sources. The objective
    is for the seed to be as unpredictable as possible.'
  merge: -1
  pgno: 276
