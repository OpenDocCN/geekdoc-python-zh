    # 8.8 Flow charts


    Flow charts are a convenient and often used tool for representing the behavior
    of a program (or portion thereof) in a diagram. They can help us reason about
    the behavior of a program before we start writing it. If we have a good flow chart,
    this can be a useful “blueprint” for a program. We’ll begin with the basics. The
    most commonly used elements of a flow chart are:


    +   - ellipses, which indicate the start or end of a program’s execution,

    - rectangles, which indicate performing some calculation or task,

    - diamonds, which indicate a decision, and

    - directed edges (a.k.a. arrows), which indicate process flow.


    ![](img/c79d476b9b167832781fbb4257bb2cb9_158_0.png)


    **Figure 8.1:** Basic flow chart elements


    Diamonds (decisions) have one input and two outputs. It is at these points that
    we test some condition. We refer to this as branching—our'
