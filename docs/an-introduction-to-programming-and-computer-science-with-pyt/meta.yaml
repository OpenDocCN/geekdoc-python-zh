    \ name x. For example, thinking that because x is assigned the result of x * x\
    \ in the body of the function, that the return value is unnecessary:\n\n```\n\
    def square(x):\n    x = x * x\n    return x\n\nif __name__ == '__main__':\n  \
    \  x = float(input(\"Enter a number and I'll square it: \"))\n    square(x)\n\
    \    print(x)  # this prints the x here from the outer scope!\n```\n\nThe first\
    \ example, above, is correct (despite shadowing) and the program prints the square\
    \ of the number entered by the user. In the second example, however, the program\
    \ does not print the square of the number entered by the user—instead it prints\
    \ the number that was originally entered by the user.³\n\n# side effect\n\nA *side\
    \ effect* is an observable behavior of a function other than simply returning\
    \ a result. Examples of side effects include printing or prompting the user for\
    \ information, or mutating a mutable object that's been passed to the function\
    \ (which affects the object in the outer scope).\nWhenever writing a function,\
    \ any side effects should be included by design and never inadvertently. Hence,\
    \ pure functions are preferred to impure functions wherever possible.\n\n# slice\
    \ / slicing\n\nPython provides a convenient notation for extracting a subset from\
    \ a sequence. This is called *slicing*. For example, we can extract every other\
    \ letter from a string:\n\n```\n>>> s = 'omphaloskepsis'\n>>> s[::2]\n'opaokpi'\n\
    ```\n\nWe can extract the first five letters, or the last three letters:\n\n```\n\
    >>> s[:5]\n'ompha'\n>>> s[-3:]\n'sis'\n```\n\n³Yeah, OK, if the user enters 0\
    \ or 1, the program will print the square of the number, but as they say, even\
    \ a broken clock tells the right time twice a day! That's not much consolation,\
