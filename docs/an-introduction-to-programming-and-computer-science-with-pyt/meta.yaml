    \ + 2 * std:\n        outliers.append(datum)\n```\n\n这样做，我们发现了两个可能的异常值——14.81，16.95——分别对应智利和乌拉圭。这很可能引导我们提出问题：“为什么这些特定国家的每10,000人口牙医数量如此之多？”"
