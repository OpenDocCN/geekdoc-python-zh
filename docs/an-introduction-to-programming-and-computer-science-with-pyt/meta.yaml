    # What if we want to unpack but we don''t care about certain elements in the sequence?


    Let''s say we want the convenience of sequence unpacking, but on the right-hand
    side we have a tuple or a function which returns a tuple, and we don''t care about
    some element in the tuple. In cases like this, we often use the variable name
    _ to signify "I don''t really care about this value".


    Examples:


    ```

    >>> _, lon = (44.318393, -72.885126)  # don''t care about latitude

    ```


    or


    ```

    >>> lat, _ = (44.318393, -72.885126)  # don''t care about longitude

    ```


    This makes it clear visually that we''re only concerned with a specific value,
    and is preferred over names like temp, foo, junk or whatever.


    Occasionally, you may see code where two elements of an unpacked sequence are
    ignored. In these cases, it''s not unusual to see both _ and __ used as variable
    names to signify "I don''t care."


    Examples:


    ```

    >>> _, lon, __ = (44.318393, -72.885126, 1244.498)

    ```


    or


    ```

    >>> lat, _, __ = (44.318393 -72.8851266, 1244.498)

    ```


    or


    ```

    >>> _, __, elevation = (44.318393, -72.8851266, 1244.498)

    ```


    It is possible also to reuse _. For example, this works just fine:


    ```

    >>> _, _, elevation = (44.318393, -72.8851266, 1244.498)

    ```


    In this instance, Python unpacks the first element of the tuple to _, then it
    unpacks the second element of the tuple to _, and then it unpacks the third element
    to the variable elevation.


    If you were to inspect the value of _ after executing the line above, you''d see
    it holds the value -72.8851266.'
