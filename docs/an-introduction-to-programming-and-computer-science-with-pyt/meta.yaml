  md: 'writing the code that''s being tested! One team of developers writes the code,
    a different team writes the tests for the code.

    The important things we''ve learned here are:


    +   - Work out in advance of testing (by using a calculator, hand calculation,
    or other method) what the *expected* output of your program should be on any given
    input. Then you can compare the expected value with the *actual* value and thus
    identify any discrepancies.

    - Test your code with a wide range of values. In cases where inputs are numeric,
    test with extreme values.

    - Don''t forget how humans might enter input values. Different users might enter
    1000 in different ways: 1000, 1000.0000, 1E3, 1,000, 1,000.0, *etc.* Equivalent
    values for inputs should always yield equivalent outputs!


    # Another example: grams to moles


    If you''ve ever taken a chemistry course, you''ve converted grams to *moles*.
    A *mole* is a unit which measures quantity of a substance. One mole is equivalent
    to 6.02214076 × 10²³ *elementary entities*, where an elementary entity may be
    an atom, an ion, a molecule, *etc.* depending on context. For example, a reaction
    might yield so many grams of some substance, and by converting to moles, we know
    exactly how many entities this represents. In order to convert moles to grams,
    one needs the mass of the entities in question.

    Here''s an example. Our reaction has produced 75 grams of water, H₂O. Each water
    molecule contains two hydrogen atoms and one oxygen atom. The atomic mass of hydrogen
    is 1.008 grams per mole. The atomic mass of oxygen is 15.999 grams per mole. Accordingly,
    the molecular mass of one molecule of H₂O is


    2 × 1.008 g/mole + 1 × 15.999 g/mole = 18.015 g/mole.


    Our program will require two inputs: grams, and grams per mole (for the substance
    in question). Our program should return the number of moles.

    Let''s build a table of inputs and outputs we can use to test our program.


    | grams | grams per mole | expected output (moles) | actual output (moles) |

    |---|---|---|---|

    | 0 | any | 0 | |

    | 75 | 18.015 | ~ 4.16319 E0 | |

    | 245 | 16.043 | ~ 1.527240 E1 | |

    | 3.544 | 314.469 | ~ 1.12698 E-2 | |

    | 1,000 | 100.087 | ~ 9.99130 E0 | |


    Let''s test our program:'
