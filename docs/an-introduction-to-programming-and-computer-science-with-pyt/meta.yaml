  - '[PAGE 381]


    optionally be isolated from the packages in the base environment, so only those
    explicitly installed in the virtual environment are available.

    When used from within a virtual environment, common installation tools such as
    pip will install Python packages into a virtual environment without needing to
    be told to do so explicitly.


    The syntax for creating a virtual environment is straightforward. At a command
    prompt,


    ```

    $ python -m venv [name of or path to environment]

    ```


    where $ represents the command prompt, and we substitute in the name of the environment
    we wish to create. So if we want to create a virtual environment called “cs1210”
    we’d use this command:


    ```

    $ python -m venv cs1210

    ```


    This creates a virtual environment named cs1210 in the current directory (you
    may wish to create your virtual environment elsewhere, but that’s up to you).


    > 💡 If you get an error complaining that there is no python...


    On some systems, python might be named python3. If you find yourself in that situation,
    just substitute python3 or, on some OSs, py, for python wherever it appears in
    the instructions.


    In order to use a virtual environment it must be *activated*. Once activated,
    any installations of modules will install the modules into the virtual environment.
    Python, when running in this virtual environment will have access to all installed
    modules.

    On macOS


    ```

    $ . ./cs1210/bin/activate

    (cs1210) $

    ```


    On Windows (with PowerShell)


    ```

    PS C:\your\path\here > .\cs1210\Scripts\activate

    (cs1210) PS C:\your\path\here >

    ```


    Notice that in each case after activation, the command prompt changed. The prefix,
    in this case (cs1210) indicates the virtual environment that is currently active.

    When you’re done using a virtual environment you can *deactivate* it. To deactivate,
    use the deactivate command.'
