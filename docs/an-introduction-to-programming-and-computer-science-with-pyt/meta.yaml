- md: "## 10.8 Sequence unpacking\n\nPython provides us with an elegant syntax for\
    \ unpacking the individual elements of a sequence as separate variables. We call\
    \ this *unpacking*.\n\n```\n>>> x, y = (3.945, 7.002)\n>>> x\n3.945\n>>> y\n7.002\n\
    ```\n\nHere, each element in the tuple on the right-hand side is assigned to a\
    \ matching variable on the left-hand side.\n\n```\n>>> x = (2,)\n>>> x\n2\n>>>\
    \ x, y, z = ('a', 'b', 'c')\n>>> x\n'a'\n>>> y\n'b'\n>>> z\n'c'\n```\n\nThis works\
    \ with tuples of any size!\n\n```\na, b, c, d, e = ('Hello', 5, [1, 2, 3], 'Chocolate',\
    \ 2022)\n```\n\nHowever, the number of variables on the left-hand side must match\
    \ the number of elements in the tuple on the right-hand side. If they don't match,\
    \ we get an error, either `ValueError: too many values to unpack` or `ValueError:\
    \ not enough values to unpack`.\n\nTuple unpacking is particularly useful by:\n\
    \n- allowing for more concise and readable code by assigning multiple values to\
    \ variables on a single line,\n- allowing for multiple values to be returned by\
    \ a function,\n- making it easier to swap variable values (more on this shortly).\n\
    \n## Can we unpack lists too?\n\nYup. We can unpack lists the same way.\n\n```\n\
    x, y = [1, 2]\n```\n\nBut this isn't used as much as tuple unpacking. Can you\
    \ think why this may be so?\n\nThe reason is that lists are dynamic, and we may\
    \ not know at runtime how many elements we have to unpack. This scenario occurs\
    \ less often with tuples, since they are immutable, and once created, we know\
    \ how many elements they have.\n\n## What if we want to unpack but we don't care\
    \ about certain elements in the sequence?\n\nLet's say we want the convenience\
    \ of sequence unpacking, but on the right-hand side we have a tuple or a function\
    \ which returns a tuple, and we don't care about some element in the tuple. In\
    \ cases like this, we often use the variable name _ to signify \"I don't really\
    \ care about this value\".\n\nExamples:\n\n```\n>>> _, lon = (44.318393, -72.885126)\
    \  # don't care about latitude\n```\n\nor\n\n```\n>>> lat, _ = (44.318393, -72.885126)\
    \  # don't care about longitude\n```\n\nThis makes it clear visually that we're\
    \ only concerned with a specific value, and is preferred over names like temp,\
    \ foo, junk or whatever.\n\nOccasionally, you may see code where two elements\
    \ of an unpacked sequence are ignored. In these cases, it's not unusual to see\
    \ both _ and __ used as variable names to signify \"I don't care.\"\n\nExamples:\n\
    \n```\n>>> _, lon, __ = (44.318393, -72.885126, 1244.498)\n```\n\nor\n\n```\n\
    >>> lat, _, __ = (44.318393, -72.8851266, 1244.498)\n```\n\nor\n\n```\n>>> _,\
    \ __, elevation = (44.318393, -72.8851266, 1244.498)\n```\n\nIt is possible also\
    \ to reuse _. For example, this works just fine:\n\n```\n>>> _, _, elevation =\
    \ (44.318393, -72.8851266, 1244.498)\n```\n\nIn this instance, Python unpacks\
    \ the first element of the tuple to _, then it unpacks the second element of the\
    \ tuple to _, and then it unpacks the third element to the variable elevation.\n\
    \nIf you were to inspect the value of _ after executing the line above, you'd\
    \ see it holds the value -72.8851266.\n\n## Swapping variables with tuple unpacking\n\
    \nIn many languages, swapping variables requires a temporary variable. Let's say\
    \ we wanted to swap the values of variables a and b. In most languages we'd need\
    \ to do something like this:\n\n```\nint a = 1\nint b = 2\n\n// now swap\nint\
    \ temp = a\na = b\nb = temp\n```\n\nThis is unnecessary in Python.\n\n```\na =\
    \ 1\nb = 2\n\n# now swap\nb, a = a, b\n```\n\nThat's a fun trick, eh?\n\n## 10.9\
    \ Strings are sequences\n\nWe've already seen another sequence type: strings.\
    \ Strings are nothing more than immutable sequences of characters (more accurately\
    \ sequences of Unicode code points). Since a string is a sequence, we can use\
    \ index notation to read individual characters from a string. For example:\n\n\
    ```\n>>> word = \"omphaloskepsis\"  # which means \"navel gazing\"\n>>> word[0]\n\
    'o'\n>>> word[-1]\n's'\n>>> word[2]\n'p'\n```\n\nWe can use in to check whether\
    \ a substring is within a string. A substring is one or more contiguous characters\
    \ within a string.\n\n```\n>>> word = \"omphaloskepsis\"\n>>> \"k\" in word\n\
    True\n>>> \"halo\" in word\nTrue\n>>> \"chicken\" in word\nFalse\n```\n\nWe can\
    \ use `min()` and `max()` with strings. When we do, Python will compare characters\
    \ (Unicode code points) within the string. In the case of `min()`, Python will\
    \ return the character with the lowest-valued code point. In the case of `max()`,\
    \ Python will return the character with the highest-valued code point.\nWe can\
    \ also use `len()` with strings. This returns the length of the string.\n\n```\n\
    >>> word = \"omphaloskepsis\"\n>>> max(word)\n's'\n>>> min(word)\n'a'\n>>> len(word)\n\
    14\n```\n\nRecall that Unicode includes thousands of characters, so these work\
    \ with more than just letters in the English alphabet.\n\n## Comprehension check\n\
    \n1. What is returned by `max('headroom')`?\n2. What is returned by `min('frequency')`?\n\
    3. What is returned by `len('toast')`?\n\n## 10.10 Sequences: a quick reference\
    \ guide\n\n### Mutability and immutability\n\n| Type | Mutable | Indexed read\
    \ | Indexed write |\n| :--- | :--- | :--- | :--- |\n| list | yes | yes | yes |\n\
    | tuple | no | yes | no |\n| str | no | yes | no |\n\n### Built-ins\n\n| Type\
    \ | len() | sum() | min() and max() |\n| :--- | :--- | :--- | :--- |\n| list |\
    \ yes | yes (if numeric) | yes, with some restrictions |\n| tuple | yes | yes\
    \ (if numeric) | yes, with some restrictions |\n| str | yes | no | yes |\n\n###\
    \ Methods\n\n| Type | .sort(), .append(), and .pop() | .index() |\n| :--- | :---\
    \ | :--- |\n| list | yes | yes |\n| tuple | no | yes |\n| str | no | yes |\n\n\
    - If an object is *mutable*, then the object can be modified.\n- Indexed read:\
    \ m[i] where m is a list or tuple, and i is a valid index into the list or tuple.\n\
    - Indexed write: m[i] on left-hand side of assignment.\n- Python built-in len()\
    \ works the same for lists and tuples.\n- Python built-ins sum(), min(), and max()\
    \ behave the same for lists and tuples.\n- For sum() to work m must contain only\
    \ numeric types (int, float) or Booleans. So, for example, sum([1, 1.0, True])\
    \ yields three. We cannot sum over strings.\n- min() and max() work so long as\
    \ the elements of the list or tuple are *comparable*—meaning that >, >=, <, <=,\
    \ == can be applied to any pair of list elements. We cannot compare numerics and\
    \ strings, but we can compare numerics with numerics and strings with strings.\n\
    - We can test whether a value is in a list or tuple with in. For example 'cheese'\
    \ in m returns a Boolean.\n- m.sort(), m.append(), and m.pop() work for lists\
    \ only. Tuples are immutable. Note that these change the list *in place*.\n- We\
    \ cannot apply m.sort() if the list or tuple contains elements which are not comparable.\n\
    - We must supply an argument to m.append() (we have to append *something*).\n\
    - m.pop() without argument pops the last element from a list.\n- m.pop(i) where\
    \ i is a valid index into m pops the element at index i from the list.\n- We cannot\
    \ pop from an empty list (IndexError).\n- m.index(x) will return the index of\
    \ the first occurrence of x in m. Note: This will raise ValueError if x is not\
    \ in m.\n\n## 10.11 Slicing\n\nPython supports a powerful means for extracting\
    \ data from a sequence (string, list or tuple) called *slicing*.\n\n### Basic\
    \ slicing\n\nWe can take a *slice* through some sequence by specifying a range\
    \ of indices.\n\n```\n>>> un_security_council = ['China', 'France', 'Russia',\
    \ 'UK',\n...                        'USA', 'Albania', 'Brazil', 'Gabon',\n...\
    \                        'Ghana', 'UAE', 'India', 'Ireland',\n...            \
    \            'Kenya', 'Mexico', 'Norway']\n```\n\nLet's say we just wanted the\
    \ permanent members of the UN Security Council (these are the first five in the\
    \ list). Instead of providing a single index within brackets, we provide a range\
    \ of indices, in the form <sequence>[<start>:<end>].\n\n```\n>>> un_security_council[0:5]\n\
    ['China', 'France', 'Russia', 'UK', 'USA']\n```\n\n“Hey! Wait a minute!” you say,\
    \ “We provided a range of *six* indices! Why doesn’t this include ‘Albania’ too?”\n\
    \nReasonable question. Python treats the ending index as its stopping point, so\
    \ it slices from index 0 to index 5 *but not including the element at index 5*!\
    \ This is the Python way, as you’ll see with other examples soon. It does take\
    \ a little getting used to, but when you see this kind of indexing at work elsewhere,\
    \ you’ll understand the rationale.\n\nWhat if we wanted the non-permanent members\
    \ whose term ends in 2023? That’s Albania, Brazil, Gabon, Ghana, and UAE.\n\n\
    To get that slice we’d use\n\n```\n>>> un_security_council[5:10]\n['Albania',\
    \ 'Brazil', 'Gabon', 'Ghana', 'UAE']\n```\n\nAgain, Python doesn’t return the\
    \ item at index 10; it just goes up to index 10 and stops.\n\n### Some shortcuts\n\
    \nPython allows a few shortcuts. For example, we can leave out the starting index,\
    \ and Python reads from the start of the list (or tuple).\n\n```\n>>> un_security_council[:10]\n\
    ['China', 'France', 'Russia', 'UK', 'USA',\n 'Albania', 'Brazil', 'Gabon', 'Ghana',\
    \ 'UAE']\n```\n\nBy the same token, if we leave out the ending index, then Python\
    \ will read to the end of the list (or tuple).\n\n```\n>>> un_security_council[10:]\n\
    ['India', 'Ireland', 'Kenya', 'Mexico', 'Norway']\n```\n\nNow you should be able\
    \ to guess what happens if we leave out both start and end indices."
  mdcn: "## 10.8 序列解包\n\nPython 为我们提供了一种优雅的语法，可以将序列中的各个元素解包为独立的变量。我们称之为*解包*。\n\n```\n\
    >>> x, y = (3.945, 7.002)\n>>> x\n3.945\n>>> y\n7.002\n```\n\n这里，右侧元组中的每个元素都被赋值给左侧对应的变量。\n\
    \n```\n>>> x = (2,)\n>>> x\n2\n>>> x, y, z = ('a', 'b', 'c')\n>>> x\n'a'\n>>>\
    \ y\n'b'\n>>> z\n'c'\n```\n\n这适用于任何大小的元组！\n\n```\na, b, c, d, e = ('Hello', 5,\
    \ [1, 2, 3], 'Chocolate', 2022)\n```\n\n但是，左侧变量的数量必须与右侧元组中的元素数量匹配。如果不匹配，我们会得到一个错误，要么是\
    \ `ValueError: too many values to unpack`，要么是 `ValueError: not enough values to\
    \ unpack`。\n\n元组解包特别有用，因为：\n\n-   允许在单行中将多个值赋给变量，使代码更简洁、更易读。\n-   允许函数返回多个值。\n\
    -   使交换变量值更容易（稍后会详细介绍）。\n\n## 我们也能解包列表吗？\n\n是的。我们可以用同样的方式解包列表。\n\n```\nx, y =\
    \ [1, 2]\n```\n\n但这不如元组解包常用。你能想到为什么吗？\n\n原因是列表是动态的，我们可能在运行时不知道有多少元素需要解包。这种情况在元组中较少发生，因为元组是不可变的，一旦创建，我们就知道它有多少个元素。\n\
    \n## 如果我们想解包但不关心序列中的某些元素怎么办？\n\n假设我们想要序列解包的便利性，但右侧是一个元组或返回元组的函数，而我们不关心元组中的某些元素。在这种情况下，我们经常使用变量名\
    \ `_` 来表示“我真的不关心这个值”。\n\n示例：\n\n```\n>>> _, lon = (44.318393, -72.885126)  # 不关心纬度\n\
    ```\n\n或\n\n```\n>>> lat, _ = (44.318393, -72.885126)  # 不关心经度\n```\n\n这在视觉上清楚地表明我们只关心特定的值，比使用\
    \ `temp`、`foo`、`junk` 或其他名称更受欢迎。\n\n偶尔，你可能会看到代码中解包序列的两个元素被忽略。在这些情况下，同时使用 `_` 和\
    \ `__` 作为变量名来表示“我不关心”并不罕见。\n\n示例：\n\n```\n>>> _, lon, __ = (44.318393, -72.885126,\
    \ 1244.498)\n```\n\n或\n\n```\n>>> lat, _, __ = (44.318393, -72.8851266, 1244.498)\n\
    ```\n\n或\n\n```\n>>> _, __, elevation = (44.318393, -72.8851266, 1244.498)\n```\n\
    \n也可以重用 `_`。例如，这完全可行：\n\n```\n>>> _, _, elevation = (44.318393, -72.8851266, 1244.498)\n\
    ```\n\n在这个例子中，Python 将元组的第一个元素解包给 `_`，然后将第二个元素解包给 `_`，最后将第三个元素解包给变量 `elevation`。\n\
    \n如果你在执行上面这行代码后检查 `_` 的值，你会看到它持有的值是 `-72.8851266`。\n\n## 使用元组解包交换变量\n\n在许多语言中，交换变量需要一个临时变量。假设我们想交换变量\
    \ `a` 和 `b` 的值。在大多数语言中，我们需要这样做：\n\n```\nint a = 1\nint b = 2\n\n// 现在交换\nint temp\
    \ = a\na = b\nb = temp\n```\n\n在 Python 中这是不必要的。\n\n```\na = 1\nb = 2\n\n# 现在交换\n\
    b, a = a, b\n```\n\n这是个有趣的技巧，对吧？\n\n## 10.9 字符串是序列\n\n我们已经见过另一种序列类型：字符串。字符串不过是字符的不可变序列（更准确地说是\
    \ Unicode 码点的序列）。由于字符串是序列，我们可以使用索引表示法从字符串中读取单个字符。例如：\n\n```\n>>> word = \"omphaloskepsis\"\
    \  # 意思是“凝视肚脐”\n>>> word[0]\n'o'\n>>> word[-1]\n's'\n>>> word[2]\n'p'\n```\n\n\
    我们可以使用 `in` 来检查子字符串是否在字符串中。子字符串是字符串中的一个或多个连续字符。\n\n```\n>>> word = \"omphaloskepsis\"\
    \n>>> \"k\" in word\nTrue\n>>> \"halo\" in word\nTrue\n>>> \"chicken\" in word\n\
    False\n```\n\n我们可以对字符串使用 `min()` 和 `max()`。当我们这样做时，Python 会比较字符串中的字符（Unicode 码点）。对于\
    \ `min()`，Python 会返回码点值最低的字符。对于 `max()`，Python 会返回码点值最高的字符。\n我们也可以对字符串使用 `len()`。这返回字符串的长度。\n\
    \n```\n>>> word = \"omphaloskepsis\"\n>>> max(word)\n's'\n>>> min(word)\n'a'\n\
    >>> len(word)\n14\n```\n\n回想一下，Unicode 包含数千个字符，所以这些函数不仅适用于英文字母。\n\n## 理解检查\n\n\
    1.  `max('headroom')` 返回什么？\n2.  `min('frequency')` 返回什么？\n3.  `len('toast')`\
    \ 返回什么？\n\n## 10.10 序列：快速参考指南\n\n### 可变性与不可变性\n\n| 类型 | 可变 | 索引读取 | 索引写入 |\n|\
    \ :--- | :--- | :--- | :--- |\n| list | 是 | 是 | 是 |\n| tuple | 否 | 是 | 否 |\n|\
    \ str | 否 | 是 | 否 |\n\n### 内置函数\n\n| 类型 | len() | sum() | min() 和 max() |\n| :---\
    \ | :--- | :--- | :--- |\n| list | 是 | 是（如果是数字） | 是，但有限制 |\n| tuple | 是 | 是（如果是数字）\
    \ | 是，但有限制 |\n| str | 是 | 否 | 是 |\n\n### 方法\n\n| 类型 | .sort(), .append(), 和 .pop()\
    \ | .index() |\n| :--- | :--- | :--- |\n| list | 是 | 是 |\n| tuple | 否 | 是 |\n\
    | str | 否 | 是 |\n\n-   如果一个对象是*可变的*，那么该对象可以被修改。\n-   索引读取：`m[i]`，其中 `m` 是列表或元组，`i`\
    \ 是列表或元组的有效索引。\n-   索引写入：`m[i]` 在赋值语句的左侧。\n-   Python 内置函数 `len()` 对列表和元组的工作方式相同。\n\
    -   Python 内置函数 `sum()`、`min()` 和 `max()` 对列表和元组的行为相同。\n-   要使 `sum()` 工作，`m`\
    \ 必须只包含数字类型（`int`、`float`）或布尔值。因此，例如，`sum([1, 1.0, True])` 的结果是三。我们不能对字符串求和。\n\
    -   `min()` 和 `max()` 只要列表或元组的元素是*可比较的*就可以工作——这意味着 `>`、`>=`、`<`、`<=`、`==` 可以应用于任何一对列表元素。我们不能比较数字和字符串，但我们可以比较数字与数字，字符串与字符串。\n\
    -   我们可以使用 `in` 测试一个值是否在列表或元组中。例如，`'cheese' in m` 返回一个布尔值。\n-   `m.sort()`、`m.append()`\
    \ 和 `m.pop()` 仅适用于列表。元组是不可变的。注意这些方法会*就地*修改列表。\n-   如果列表或元组包含不可比较的元素，我们不能应用 `m.sort()`。\n\
    -   我们必须向 `m.append()` 提供一个参数（我们必须追加*某些东西*）。\n-   不带参数的 `m.pop()` 从列表中弹出最后一个元素。\n\
    -   `m.pop(i)`，其中 `i` 是 `m` 的有效索引，从列表中弹出索引 `i` 处的元素。\n-   我们不能从空列表中弹出元素（`IndexError`）。\n\
    -   `m.index(x)` 将返回 `x` 在 `m` 中第一次出现的索引。注意：如果 `x` 不在 `m` 中，这将引发 `ValueError`。\n\
    \n## 10.11 切片\n\nPython 支持一种强大的从序列（字符串、列表或元组）中提取数据的方法，称为*切片*。\n\n### 基本切片\n\n\
    我们可以通过指定索引范围来获取某个序列的*切片*。\n\n```\n>>> un_security_council = ['China', 'France',\
    \ 'Russia', 'UK',\n...                        'USA', 'Albania', 'Brazil', 'Gabon',\n\
    ...                        'Ghana', 'UAE', 'India', 'Ireland',\n...          \
    \              'Kenya', 'Mexico', 'Norway']\n```\n\n假设我们只想要联合国安理会的常任理事国（这些是列表中的前五个）。我们不是在方括号内提供单个索引，而是提供一个索引范围，形式为\
    \ `<sequence>[<start>:<end>]`。\n\n```\n>>> un_security_council[0:5]\n['China',\
    \ 'France', 'Russia', 'UK', 'USA']\n```\n\n“嘿！等一下！”你说，“我们提供了*六个*索引的范围！为什么这不包括‘Albania’？”\n\
    \n合理的问题。Python 将结束索引视为其停止点，因此它从索引 0 切片到索引 5，*但不包括索引 5 处的元素*！这是 Python 的方式，你很快就会在其他示例中看到。这确实需要一点时间来适应，但当你在其他地方看到这种索引方式时，你会理解其原理。\n\
    \n如果我们想要任期在 2023 年结束的非常任理事国呢？那就是 Albania、Brazil、Gabon、Ghana 和 UAE。\n\n要获取该切片，我们将使用\n\
    \n```\n>>> un_security_council[5:10]\n['Albania', 'Brazil', 'Gabon', 'Ghana',\
    \ 'UAE']\n```\n\n同样，Python 不返回索引 10 处的项目；它只到索引 10 然后停止。\n\n### 一些快捷方式\n\nPython\
    \ 允许一些快捷方式。例如，我们可以省略起始索引，Python 会从列表（或元组）的开头读取。\n\n```\n>>> un_security_council[:10]\n\
    ['China', 'France', 'Russia', 'UK', 'USA',\n 'Albania', 'Brazil', 'Gabon', 'Ghana',\
    \ 'UAE']\n```\n\n同样，如果我们省略结束索引，那么 Python 会读取到列表（或元组）的末尾。\n\n```\n>>> un_security_council[10:]\n\
    ['India', 'Ireland', 'Kenya', 'Mexico', 'Norway']\n```\n\n现在你应该能猜出如果我们同时省略起始和结束索引会发生什么。"
