  md: "# 7.5 Some ways to format output\n\nSay we want to write a program which prompts\
    \ a user for some number and calculates the square of that number. Here's a program\
    \ that does just that:\n\n```\n\"\"\"A program to square a number provided by\
    \ the user\nand display the result. \"\"\"\n\nx = input(\"Enter a number: \")\n\
    x = float(x)\nresult = x * x\nprint(result)\n```\n\nThat's fine, but perhaps we\
    \ could make this more friendly. Let's say we wanted to print the result like\
    \ this.\n\n17.0 squared is 289.0\n\nHow would we go about it? There are a few\
    \ ways. One somewhat clunky approach would be to use string concatenation. Now,\
    \ we cannot do this:\n\n```\n\"\"\"A program to square a number provided by the\
    \ user\nand display the result. \"\"\"\n\nx = input(\"Enter a number: \")\nx =\
    \ float(x)\nresult = x * x\nprint(x + ' squared is ' + result)\n```\n\nThis program\
    \ fails, with the error:\n\n```\nTraceback (most recent call last):\n  File \"\
    .../squared_with_concatenation.py\", line 4, in <module>\n    print(x + ' squared\
    \ is ' + result)\nTypeError: unsupported operand type(s) for +: 'float' and 'str'\n\
    ```\n\nWhy? Because we cannot concatenate floats and strings. One way to fix this\
    \ would be to explicitly convert the floating-point values to strings. We can\
    \ do this—explicitly—by using Python's built-in function str().\n\n```\n\"\"\"\
    A program to square a number provided by the user\nand display the result. \"\"\
    \"\n\nx = input(\"Enter a number: \")\nx = float(x)\nresult = x * x\nprint(str(x)\
    \ + ' squared is ' + str(result))\n```\n\nNow, this works. Here's a trial."
