    # Python''s // and % operators


    Python provides us with operators for calculating quotient and remainder. These
    are // and %, respectively. Here are some examples:


    ```

    >>> 17 // 5  # calculate the quotient

    3

    >>> 17 % 5   # calculate the remainder

    2

    >>> 21 // 4  # calculate the quotient

    5

    >>> 21 % 4   # calculate the remainder

    1

    ```


    You may ask: What''s the difference between the division we saw earlier, /, and
    floor division with //? The difference is that / calculates the quotient as a
    decimal expansion. Here''s a simple comparison:


    ```

    >>> 4 / 3

    1.3333333333333333  # three goes into four 1 and 1/3 times

    >>> 4 // 3          # calculates Euclidean quotient

    1

    >>> 4 % 3           # calculates remainder

    1

    ```


    # Common questions


    # What happens when the divisor is zero?


    Just as in mathematics, we cannot divide by zero in Python either. So all of these
    operations will fail if the right operand is zero, and Python will complain: ZeroDivisionError.


    # What happens if we supply floating-point operands to // or %?


    In both cases, operands are first converted to a common type. So if one operand
    is a float and the other an int, the int will be converted to a float. Then the
    calculations behave as you''d expect.'
