    \ bool(0)\nFalse\n>>> bool('xyz')\nTrue\n>>> bool('')\nFalse\n>>> bool(None)\n\
    False\n```\n\n## 8.6 Input validation\n\nEarlier, we wrote a Python program to\
    \ convert kilograms to pounds. We trusted the user to provide a valid integer\
