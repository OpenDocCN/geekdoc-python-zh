    # The .strip() method


    Sometimes—especially when reading certain data from a file—we wish to remove whitespace,
    including spaces, tabs, and newlines from strings. One approach is to use the
    .strip() method. Without any argument supplied, .strip() removes all leading and
    trailing whitespace and newlines.


    ```

    >>> s = ''\nHello     \t   \n''

    >>> s.strip()

    ''Hello''

    ```


    Or you can specify the character you wish to remove.


    ```

    >>> s = ''\nHello     \t   \n''

    >>> s.strip(''\n'')

    ''Hello     \t   ''

    ```


    This method allows more complex behavior (but I find the use cases rare). For
    more on .strip() see: https://docs.python.org/3/library/stdtypes.html?highlight=strip#str.strip


