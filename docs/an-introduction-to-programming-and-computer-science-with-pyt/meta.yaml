    \nThis chapter will expand our understanding of programming by introducing types\
    \ and literals. All objects in Python have a *type*, and *literals* are fixed\
    \ values of a given type. For example, the literal 1 is an integer and is of type\
    \ `int` (short for “integer”). Python has many different types.\n\n## Learning\
    \ objectives\n\n- You will learn about many commonly used types in Python.\n-\
    \ You will understand why we have different types.\n- You will be able to write\
    \ literals of various types.\n- You will learn different ways to write string\
    \ literals which include various quotation marks within them.\n- You will learn\
    \ about representation error as it applies to numeric types (especially floating-point\
    \ values).\n\n## Terms introduced\n\n- dynamic typing\n- escape sequence\n- empty\
    \ string, empty tuple, and empty list\n- heterogeneous\n- literal\n- representation\
    \ error\n- static typing\n- “strong” vs “weak” typing\n- type (including int,\
    \ float, str, list, tuple, dict, etc.)\n- type inference\n- Unicode\n\n## 3.1\
    \ What are *types*?\n\nConsider the universe of wheeled motor vehicles. There\
    \ are many types: motorcycles, mopeds, automobiles, sport utility vehicles, busses,\
    \ vans, tractor-trailers, pickup trucks, all-terrain vehicles, *etc.*, and agricultural\
    \ vehicles such as tractors, harvesters, *etc.* Each type has characteristics\
    \ which distinguish it from other types. Each type is suited for a particular\
    \ purpose (you wouldn't use a moped to do the work of a tractor, would you?).\n\
    \nSimilarly, everything in Python has a *type*, and every type is suited for a\
    \ particular purpose. Python's types include numeric types such as integers and\
    \ floating-point numbers; sequences such as strings, lists, and tuples; Booleans\
    \ (true and false); and other types such as sets, dictionaries, ranges, and functions.\n\
    \nWhy do we have different types in a programming language? Primarily for three\
    \ reasons.\n\nFirst, different types have different requirements regarding how\
    \ they are stored in the computer's memory (we'll take a peek into this when we\
    \ discuss *representation*).\n\nSecond, certain operations may or may not be appropriate\
    \ for different types. For example, we can't raise 5 to the 'pumpkin' power, or\
    \ divide 'illuminate' by 2.\n\nThird, some operators behave differently depending\
    \ on the types of their operands. For example, we'll see in the next chapter how\
    \ + is used to add numeric types, but when the operands are strings + performs\
    \ concatenation. How does Python know what operations to perform and what operations\
    \ are permitted? It checks the type of the operands.\n\n## What's a *literal*?\n\
    \nA **literal** is simply fixed values of a given type. For example, 1 is a literal.\
    \ It means, literally, the integer 1. Other examples of literals follow.\n\n##\
    \ Some commonly used types in Python\n\nHere are examples of some types we'll\
    \ see. Don't worry if you don't know what they all are now—all will become clear\
    \ in time.\n\n| Type | Description | Example(s) of literals |\n|---|---|---|\n\
    | int | integer | 42, 0, -1 |\n| float | floating-point number | 3.14159, 2.7182,\
    \ 0.0 |\n| str | string | 'Python', 'badger', 'hovercraft' |\n| bool | Boolean\
    \ | True, False |\n| NoneType | none, no value | None |\n| tuple | tuple | (),\
    \ ('a', 'b', 'c'), (-1, 1) |\n| list | list | [], [1, 2, 3], ['foo', 'bar', 'baz']\
    \ |\n| dict | dictionary (key: value) | {'cheese': 'stilton'}, {'age': 99} |\n\
    | function | function | (see: Chapter 5) |\n\n## int\n\nThe int type represents\
    \ *integers*, that is, whole numbers, positive or negative, and zero. Examples\
    \ of int literals: 1, 42, -99, 0, 10000000, *etc*. For readability, we can write\
    \ integer literals with underscores in place of thousands separators. For example,\
    \ 1_000_000 is rather easier to read than 1000000, and both have the same value.\n\
    \n## float\n\nObjects of the float type represent floating-point numbers, that\
    \ is, numbers with decimal (radix) points. These approximate real numbers (to\
    \ varying degrees; see the section on representation error). Examples of float\
    \ literals: 1.0, 3.1415, -25.1, *etc*.\n\n## str\n\nA *string* is an ordered sequence\
    \ of characters. Each word on this page is a string. So are \"abc123\" and \"\
    @&)z)$\"—the symbols of a string needn't be alphabetic. In Python, objects of\
    \ the str (string) type hold zero or more symbols in an ordered sequence. Strings\
    \ must be *delimited* to distinguish them from variable names and other identifiers\
    \ which we'll see later. Strings may be delimited with single quotation marks,\
    \ double quotation marks, or “triple quotes.” Examples of str literals: \"abc\"\
    , \"123\", \"vegetable\", \"My hovercraft is full of eels.\", \"\"\"What nonsense\
    \ is this?\"\"\", *etc*.\n\nSingle and double quotation marks are equivalent when\
    \ delimiting strings, but you must be consistent in their use—starting and ending\
    \ delimiters must be the same. \"foo\" and 'foo' are both valid string literals;\
    \ \"foo' and 'foo\" are not.\n\n```\n>>> \"foo'\nFile \"<stdin>\", line 1\n  \
    \  \"foo'\n    ^\nSyntaxError: unterminated string literal (detected at line 1)\n\
    ```\n\nIt is possible to have a string without any characters at all! We call\
    \ this the *empty string*, and we write it `''` or `\"\"` (just quotation marks\
    \ with nothing in between).\n\nTriple-quoted strings have special meaning in Python,\
    \ and we'll see more about that in Chapter 6, on style. These can also be used\
    \ for creating multi-line strings. Multi-line strings are handy for things like\
    \ email templates and longer text, but in general it's best to use the single-\
    \ or double-quoted versions.\n\n## bool\n\nbool type is used for two special values\
    \ in Python: `True` and `False`. bool is short for \"Boolean\", named after George\
    \ Boole (1815–1864), a largely self-taught logician and mathematician, who devised\
    \ Boolean logic—a cornerstone of modern logic and computer science (though computers\
    \ did not yet exist in Boole's day).\n\nThere are only two literals of type bool:\
    \ `True` and `False`. Notice that these are not strings, but instead are special\
    \ literals of this type (so there aren't any quotation marks, and capitalization\
    \ is significant).¹\n\n## NoneType\n\nNoneType is a special type in Python to\
    \ represent the absence of a value. This may seem a little odd, but this comes\
    \ up quite often in programming. There is *exactly one* literal of this type:\
    \ `None` (and indeed there is exactly one instance of this type).\n\nLike `True`\
    \ and `False`, `None` is not a string, but rather a special literal.\n\n## tuple\n\
    \nA *tuple* is an *immutable sequence* of zero or more values. If an object is\
    \ **immutable**, this means it cannot be changed once it's been created. Tuples\
    \ are constructed using the comma to separate values. The *empty tuple*, `()`,\
    \ is a tuple containing no elements.\n\nThe elements of a tuple can be of any\
    \ type—including another tuple! The elements of a tuple needn't be the same type.\
    \ That is, tuples can be *heterogeneous*.\n\nWhile not strictly required by Python\
    \ syntax (except in the case of the empty tuple), it is conventional to write\
    \ tuples with enclosing parentheses. Examples of tuples: `()`, `(42, 71, 99)`,\
    \ `(x, y)`, `('cheese', 11, True)`, *etc*.\n\nA complete introduction to tuples\
    \ appears in Chapter 10.\n\n## list\n\nA *list* is a *mutable sequence* of zero\
    \ or more values. If an object is **mutable**, then it can be changed after it\
    \ is created (we'll see how to mutate lists later). Lists must be created with\
    \ square brackets and elements\n\n¹In some instances, it might be helpful to interpret\
    \ these as \"on\" and \"off\" but this will vary with context."
  mdcn: "## 二进制算术\n\n一旦掌握了窍门，二进制算术就很简单了。这里是最基本的例子：1加1。\n\n```\n      1\n    + 1\n\
    \    ----\n    1 0\n```\n\n在个位上，我们计算一加一，结果是二——二进制的10——所以我们写下0，向十位进1，然后在十位上写下1，计算就完成了。\n\
