    \ conditions for flow of control (branching and loop control).\nFor example, we\
    \ might want to perform operations on some list, but only if the list is non-empty.\
    \ Python obliges by treating a non-empty as having a “true” truth value (we say\
    \ it’s truthy) and by treating an empty list as something “false” or “falsey.”\
    \ Accordingly, we can write:\n\n```\nif lst:\n    # Now we know the list is not\
    \ empty and we can\n    # do whatever it is we wish to do with the\n    # elements\
    \ of the list.\n```\n\nSee: Chapter 8 Branching and Boolean expressions, especially\
    \ sections covering truthy and falsey.\n\n# truthy\n\nIn Python, many things are\
    \ treated as if they evaluated to True when used as conditions in while loops\
    \ or branching statements. We call such things *truthy*. This includes numerics\
    \ with non-zero values, and any non-empty sequence, and many other objects.\n\n\
    # tuple\n\nA *tuple* is an immutable sequence of objects. They are similar to\
    \ lists in that they can contain heterogeneous elements (or none at all), but\
    \ they differ from lists in that they cannot be changed once created.\nSee: Chapter\
    \ 10 Sequences for details.\n\n# type\n\nPython allows for many different kinds\
    \ of object. We refer to these kinds as *types*. We have integers (int), floating-point\
    \ numbers (float), strings (str), lists (list), tuples (tuple), dictionaries (dict),\
    \ functions (function), and many other types. An object’s type determines not\
    \ just how it is represented internally in the computer’s memory, but also what\
    \ kinds of operations can be performed on objects of various types. For example,\
    \ we can divide one number by another (provided the divisor isn’t zero) but we\
    \ cannot divide a string by a number or by another string.\n\n# type inference\n\
    \nPython has limited *type inference*, called “duck typing” (which means if it\
    \ looks like a duck, and quacks like a duck, chances are pretty good it’s a duck).\
    \ So when we write\n\n```\nx = 17\n```"
