    \ is provided by the exception. In general, a good approach is to start at the\
    \ last few lines of the exception message, and work backward if necessary to see\
    \ what went wrong.\nThere are many types of built-in exceptions in Python. Here\
    \ are a few that you're likely to have seen before.\n\n# SyntaxError\n\nWhen a\
    \ module is executed or imported, Python will read the file, and try *parsing*\
    \ the file. If, during this process, the parser encounters a syntax error, a SyntaxError\
    \ exception is raised. SyntaxError can also be raised when invalid syntax is used\
    \ in the Python shell.\n\n```\n>>> # if requires a condition and colon\n>>> if\n\
    \  File \"<stdin>\", line 1\n    if\n    ^\nSyntaxError: invalid syntax\n```\n\
    \nHere you see the exception includes information about the error and where the\
    \ error occurred. The ^ is used to point to a portion of code where the error\
    \ occurred."
  - "[PAGE 315]\n\n# IndentationError\n\nIndentationError is a subtype of SyntaxError.\
