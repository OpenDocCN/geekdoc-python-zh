    # 2.5 Syntax and semantics


    In this text we''ll talk about *syntax* and *semantics*, so it''s important that
    we understand what these terms mean, particularly in the context of computer programming.


    # Syntax


    In a (natural) language course—say Spanish, Chinese, or Latin—you''d learn about
    certain rules of *syntax*, that is, how we arrange words and choose the correct
    forms of words to produce a valid sentence or utterance. For example, in English,


    My hovercraft is full of eels.


    is a syntactically valid sentence.⁴ While it may or may not be true, and may not
    even make sense, it is certainly a *well-formed* English sentence. By contrast,
    the sequence of words


    Is by is is and cheese for


    is *not* a well-formed English sentence. These are examples of valid and invalid
    syntax. The first is syntactically valid (*well-formed*); the second is not.


    Every programming language has rules of syntax—rules which govern what is and
    is not a valid statement or expression in the language. For example, in Python


    ```

    >>> 2 3

    ```


    is not syntactically valid. If we were to try this using the Python shell, the
    Python interpreter would complain.


