    $$i(t) = C(t) \frac{dv(t)}{dt}$$

    ```


    The last two are often referred to as dynamic elements, and we assume for now
    the variables $L$, $C$ are independent of current and voltage. $L$ is called the
    inductance and $C$ the capacitance. The fact that there is such a thing as nonlinear
    capacitors, for instance, in CMOS devices can significantly complicate the solution
    and accuracy and convergence of a simulator, and we will discuss a few examples
    of this later in Chap. 5. A network consisting of resistors only is referred to
    as a *resistive network*, and one that contains capacitors and inductors is often
    called a *dynamic network*. If the network only has passive devices, it is called
    a *linear network*.


    Consider now a simple network as in Fig. 4.1.


    We can write KCL at node $v_1$ as


    ```

    $$i_1 = i_2 + i_3$$

    ```


    At node $v_{in}$, KCL gives the simple


    ```

    $$i_{in} = i_1$$

    ```


