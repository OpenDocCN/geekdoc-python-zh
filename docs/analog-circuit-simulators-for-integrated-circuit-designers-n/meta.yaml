  md: 'students learn in elementary classes on circuit analysis how to analyze fairly
    simple circuit topologies, and this section will show how to systematize such
    methods when building simulator matrices. We will start with the fundamentals
    of *passive elements* and from a simple passive network build a full matrix equation.
    This should be familiar to most readers. We will then use that exercise to motivate
    a common way to set up simulation matrices. Much of the mathematical details and
    formal proofs we leave as references and outline in Chap. 7 for the interested
    reader to investigate further. Once such a methodology has been employed, we will
    use it to build a simple Python code that can be used to read in circuit netlists
    and set up matrix equations. Thereafter, we will use the built-in matrix solver
    in Python to solve the system of equations and compare to other SPICE implementations.
    The main motivation is to show that the methodology is fairly straightforward
    and dispels any mystery that might surround a circuit simulator. Naturally a fully
    professional simulator has many more optimization tricks, and details in the implementation
    can easily be differentiated between various products.


    After showing a simple simulation setup with passive devices, we will then continue
    by defining *active devices* and show how they can be implemented in a similar
    fashion to the passive devices in building a full matrix.


    # 4.3.1 Passive Element


    A passive circuit element is a component that can only dissipate, absorb, or store
    energy in an electric or magnetic field. They do not need any form of electrical
    power to operate. The most obvious examples are resistors, capacitors, and inductors
    that we will be described in this section.


    Let us first review the basic equation governing passive devices. Any device can
    be described by its current-voltage relationship:


    $$i(t) = f\left(v(t), \frac{dv(t)}{dt}\right) \text{ or } v(t) = f\left(i(t),
    \frac{di(t)}{dt}\right) \quad (4.1)$$


    An element is called linear if $f$ is linear. A device is called a resistor if
    the relationship is set by


    $$v(t) = i(t)R(t) \quad (4.2)$$


    where $R$ is the resistance we consider constant for now. Nonlinear resistors
    are an important circuit device, but we will not discuss them here. We also have
    inductors


    $$v(t) = L(t)\frac{di(t)}{dt} \quad (4.3)$$'
