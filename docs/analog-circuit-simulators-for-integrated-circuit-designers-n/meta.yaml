    # 3.1.4.2 BSIM6


    As the technology has gone to more sophisticated physical implementations like
    system-on-insulator (SOI) and FinFET structures, the BSIM model team has been
    very busy following along. The latest generation of model under the BSIM6 umbrella
    contains many more implementations targeting these specific technologies and others.
    Due to space limitations, we will here only briefly mention what they do and leave
    the details to be explored by the reader. The reader is highly encouraged to study
    these implementations in detail along the lines we described in the previous sections.


    BSIM-BULK: This is the new BULK BSIM model

    BSIM-SOI: This is a compact model for SOI structures, based on BSIM3v3

    BSIM-IMG: BSIM-IMG (independent multi-gate) model has been developed to model
    the electrical characteristics of the independent double-gate structures like
    ultra-thin body and BOX SOI transistors (UTBB). It allows different front- and
    back-gate voltages, work functions, dielectric thicknesses, and dielectric constants.

    BSIM-CMG: (common multi-gate) is a compact model for the class of common multi-gate
    FETs. Physical surface potential-based formulations are derived for both intrinsic
    and extrinsic models with finite body doping. The surface potentials at the source
    and drain ends are solved analytically with poly-depletion and quantum mechanical
    effects. The effect of finite body doping is captured through a perturbation approach.
    The analytic surface potential solution agrees with 2D device simulation results
    well.


    # 3.2 Bipolar Transistors


    A bipolar transistor operation is quite different from a CMOS transistor. Traditionally
    the speed of a SiGe bipolar transistor was much faster than a CMOS transistor,
    but with the introduction of small geometry CMOS, the speeds of the two technologies
    are now more comparable. Perhaps the biggest advantage of CMOS is the fact that
    it is complementary in nature; there is a PMOS transistor that is just as fast
    as the NMOS. There are then many more architecture choices available.'
  - '[PAGE 62]


    One of the hardest aspects of implementing bipolar devices in a simulator is the
    strong exponential dependence of current vs voltage. This can easily cause blowup
    of solutions since large steps in the voltage cause an overflow in the updated
    current. We will see examples of this behavior later in Chap. 5. There are ways
    to work around this problem by, for example, limiting the voltage excursion to
    some number or construct a new exponential function that is not exponential beyond
    a certain input.


    We start this section with a brief description of the general behavior and follow
    this with a discussion of a few popular models in Sects. 3.2.2, 3.2.3, 3.2.4,
    and 3.2.5.


    # 3.2.1 General Behavior


    The physics of bipolar transistors is quite complex. One advantage is that the
    physics is the same for many orders of magnitude of output current, and this gives
    rise to fewer discontinuities in model which helps with convergence. We will not
    have space to go through the details here but rather just quote the fundamental
    results. The reader can find a good discussion in [2].


    A bipolar transistor has a common symbol exemplified in Fig. 3.5

    The basic relationship between the output collector current and the base emitter
    voltage is the well-known formulae


    $$I_C = I_s \left(e^{qV_{BE}/kT} - 1\right)$$

    $$I_B = I_C / \beta$$

    $$I_E = I_C + I_B$$


    The factor $\beta$ is the current amplification factor.


    # 3.2.2 Ebers-Moll Model


    A more complicated model and one of the first that was developed is called the
    Ebers-Moll model [14]. It was originally a static nonlinear model only but was
    refined over the years to include effects like charge storage, variation with
    current, and base-width modulation (causing finite output conductance). A large
    signal model describing the effect of capacitances and parasitic resistors such
    as it was implemented in spice in the early years can be found in Fig. 3.6.


    The basic current relationship for the collector and emitter node is much more
    complicated than we indicated in Sect. 3.2.1 and is given by'
