    # 5.3 Linearization Techniques


    One aspect of nonlinear circuits is we can linearize the response around a particular
    operating point and apply our linear analysis tools (AC analysis) in a small region
    around this point where everything is close to linear in the response. This section
    will briefly discuss how simulators can accomplish this. We will use our transistor
    model as examples. Let us start with the simplest one, model1.


    **Model1**

    This model has the simple transfer function given by Eq. 3.47. To linearize we
    do a simple Taylor expansion around the operating point:


    $g_m = \frac{\partial I_d}{\partial V_{gs}} \bigg|_o = 2KV_{gs} \bigg|_o = 2K(V_{g,o}
    - V_{s,o})$


    where the subscript $o$ indicates the DC value at the operating point.


    The input impedance is infinite and the output impedance likewise. We then find
    the linearized version of the transistor is a VCCS with a gain of $g_m$. This
    can easily be accommodated in our matrix setup in Sect. 4.3.3.


    **Model2**

    The transfer function is here a bit more complex given the various operating regions,
    so we have


    $g_m = \begin{cases} 0, V_{gs} - V_T < 0 \ 2KV_{ds}, V_{ds} < V_{gs} - V_T \ 2K(V_{gs}
    - V_T)(1 + \lambda V_{ds}) \end{cases}$'
