    allowed, while the DC gate voltage is being swept. The AC currents in both drain
    and gate are compared, and the transition frequency is now the point where the
    two currents have the same magnitude.


    At this point, there are a number of appropriate questions to ask:


    +   - What is the transition frequency $f_t$? Does it match the advertised number?

    - How does this point depend on the biasing? (Dependence on gate voltage can prove
    educational.)'
