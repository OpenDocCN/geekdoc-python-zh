    # 4.6 Transient Linear Simulation


    Once we have a DC solution, we can start a transient or time-dependent simulation.
    Such a simulation is mathematically known as an initial value problem. The initial
    values are known at a certain time, time zero is often a convenient choice, in'
  - '[PAGE 115]


    transient analysis, and from there the simulation progresses to later times. This
    section will describe how such a simulation can be implemented and will show how
    different implementations of differential equations lead to different characteristics
    of the solution. As before we will use the Python environment to build the simulation,
    but the reader is encouraged to use his or her favorite simulator in addition
    to verify the various concepts. We will stick to linear elements in this section.
    As an example, we will again use Fig. 4.1, but this time we will look at a solution
    in the time domain.


    The key in transient simulations is implementing a convenient difference equation
    to approximate the differential equations. The following sections discuss the
    most common difference equation approximations using the circuit in Fig. 4.1 as
    a basis. One of the main difficulties with these approximations is the resulting
    so-called local truncation error (LTE), and we will examine this effect in Sect.
    4.6.6 and how circuit simulators usually handle it. Finally, we end the section
    on transient linear simulations with a look at an ideal LC resonator and see how
    the different integration methods behave for this case.


    # Timestep Adjustments


    It is well-known how to implement a variable timestep, and we will show such an
    implementation in Chap. 5, but in this chapter, we will stick to a fixed timestep.
    The nonlinear circuits we will discuss in Chap. 5 will benefit much more from
    an adjustable timestep, something we will demonstrate there. The flow here will
    be to first pick a timestep and run the simulation and observe the behavior. After
    discussing the LTE estimate, we will simply run the simulation, and if that LTE
    error condition is not met at some point in time, we will simply adjust the timestep
    and rerun the whole simulation. The benefit with the fixed timestep is that the
    error in all the difference equations is under better control. It is not unusual
    to employ this strategy in practical circuit situations where one can set the
    max timestep variable to some small value to ensure the timestep taken by the
    simulator is uniform. This will often improve accuracy as we will also see in
    Chap. 5.


    # 4.6.1 Forward Euler


    The forward Euler is the simplest implementation and the easiest to start a discussion.
    It is almost never used in circuit simulators due to poor stability, but it serves
    well as an initial point of discussion. Let us look at a capacitor from a differential
    equation view point:


    $$i(t) = C \frac{du(t)}{dt}$$'
