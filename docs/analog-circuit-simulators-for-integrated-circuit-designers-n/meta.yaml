  md: 'solutions where the system enters odd modes are not that uncommon. The study
    of nonlinear systems is important, and much work has been done as the reader is
    no doubt aware. In this section, we will describe perhaps the most common technique
    in the circuit simulator community to solve nonlinear initial value problems,
    namely, the Newton-Raphson method.


    # 2.2.1 Newton-Raphson


    Let us look at the following one-dimensional equation


    $$f(x) = 0 \tag{2.11}$$


    where we need to solve for $x$. Let us do a Taylor expansion around a point $x_0$
    which does not solve the equation but is close. We find


    $$f(x = x_0 + \Delta x) = f(x_0) + \frac{df}{dx}(x_0) \Delta x = 0 \tag{2.12}$$


    which can be written as


    $$\Delta x = -\frac{f(x_0)}{df/dx(x_0)} \tag{2.13}$$


    Clearly, if the higher-order derivatives are zero, we have a linear equation,
    and we have arrived at the solution with this calculation of $\Delta x$. In practice,
    the higher-order terms still contribute, and we need to iterate a few times to
    arrive at the correct solution. The method is generally easy to implement, and
    it is a standard work horse in almost all numerical implementations of nonlinear
    solvers. We will also use the multidimensional version later on in Chap. 5. Newton''s
    method is guaranteed to converge if the starting point is close enough to the
    solution and the solution function is smooth (no discontinuities of the function
    itself or its derivatives) since then the higher-order derivatives are small.
    Clearly for functions that are not continuous or the derivative is not continuous,
    the method will easily get confused. This was historically one of the most notorious
    reasons transistor models had convergence issues. The continuity of the derivatives
    has been guaranteed in the latest transistor model implementations (Fig. 2.7).


