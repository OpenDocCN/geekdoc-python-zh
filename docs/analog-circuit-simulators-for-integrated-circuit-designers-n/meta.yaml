  mdcn: "## 4.3 矩阵方程\n\n图 4.2 一个独立电压源\n\n![](img/75093da0d280ad52326a78925e5cc403_82_0.png)\n\
    \n从该方程可知，电压源连接的两个节点将是接地节点和节点 $v_{in}$。让我们看看更一般的情况，即电压源位于两个节点 $a$ 和 $b$ 之间（见图 4.2）。我们可以用数学形式表示为\n\
    \n$$v_a - v_b = V$$\n\n这是独立电压源的支路方程。特别要注意的是，电压源的电流并未出现在方程中。这是基于独立电压源可以提供任意大小/相位电流的假设；其阻抗为\
    \ 0 欧姆。唯一的要求是节点 $a$ 和 $b$ 处所有其他电流的总和应大小相等、符号相反。换句话说，在节点 $a$，流入电压源的电流等于 $i_{v_s}$，而在节点\
    \ $b$，流出电压源的电流等于 $-i_{v_s}$。我们遵循的惯例是：流入器件的电流为正，流出器件的电流为负。\n\n如果我们将此电流视为一个单独的矩阵项，则可以在节点\
    \ $a$ 处列出 KCL 方程：\n\n$$\\cdots + i_v + \\cdots = 0 \\qquad \\text{节点 } a \\text{\
    \ 处的 KCL}$$\n\n对于节点 $b$：\n\n$$\\cdots - i_v + \\cdots = 0 \\qquad \\text{节点 }\
    \ b \\text{ 处的 KCL}$$\n\n顺便提一下，如果两个独立的电压源并联连接两个节点，如图 4.3 所示，会发生什么？由于电压源提供的电流仅由节点处的所有其他电流决定，因此很明显，这样的系统通常没有解。通常，仿真器会发出拓扑错误标志，并要求用户修正。\n\
    \n现在应该清楚，当读取网表时，电压源将具有以下特征：\n\n图 4.3 两个并联的独立电压源\n\n![](img/75093da0d280ad52326a78925e5cc403_83_0.png)\n\
    \n$$\\begin{pmatrix} v_a & v_b & i_V \\\\ v_a & & -1 \\\\ v_b & & +1 \\\\ i_V\
    \ & +1 & -1 \\end{pmatrix} = \\begin{pmatrix} V \\end{pmatrix}$$ (4.24)\n\n注意，电压源的值现在是方程右侧的一个项，电压\
    \ $V$ 被假定为已知。在我们的示例中，电压源连接在节点 $in$ 和接地节点（或零点）之间。因此，节点 $b$ 不存在，因为接地节点方程不会为系统增加任何新信息，故被忽略。\n\
    \n独立电压源的伪代码片段可以如下所示：\n\n```\nif DeviceType = 'Voltage Source':\n    Matrix[DeviceBranchIndex][DeviceNode1Index]\
    \ = 1\n    Matrix[DeviceBranchIndex][DeviceNode2Index] = -1\n    rhs[DeviceBranchIndex]\
    \ = DeviceValue\n// 这是支路方程行，由变量 DeviceBranchRow 指示，\n// 列由 DeviceNode1Columns\
    \ 和 DeviceNode2Column 变量设置\n    Matrix[Nodes.index[DeviceNode1Index]][DeviceBranchIndex]=1\n\
    \    Matrix[Nodes.index[DeviceNode2Index]][DeviceBranchIndex]=-1\n// 这是两个 KCL\
    \ 方程项\n```\n\n## 独立电流源\n\n独立电流源可以类似地处理。假设我们有一个电流源连接节点 $a$ 和 $b$，如图 4.4 所示。我们采用与独立电压源类似的推理，在节点\
    \ $a$ 得到：\n\n$\\cdots + i_A + \\cdots = 0$ 节点 $a$ 处的 KCL\n\n其中我们使用电流 $i_A = I$。同样对于节点\
    \ $b$：\n\n图 4.4 一个独立电流源\n\n![](img/75093da0d280ad52326a78925e5cc403_84_0.png)\n\
    \n$\\cdots - i_A + \\cdots = 0$ 节点 $b$ 处的 KCL\n\n对于电流方程本身：\n\n$i_A = I$\n\n矩阵特征将如下所示：\n\
    \n$$\\begin{pmatrix} & v_a & v_b & i_A \\\\ v_a & & -1 & \\\\ v_b & & +1 & \\\\\
    \ i_A & & +1 & \\end{pmatrix} \\begin{pmatrix} \\\\ \\\\ \\\\ I \\end{pmatrix}\
    \ = \\begin{pmatrix} \\\\ \\\\ \\\\ \\end{pmatrix}$$ (4.25)\n\n独立电流源的伪代码片段可以如下所示：\n\
    \n```\nif DeviceType = 'Current Source':\n    Matrix[DeviceBranchIndex][DeviceBranchIndex]\
    \ = 1\n    rhs[DeviceBranchIndex] = DeviceValue\n// 这是支路方程行，由变量 DeviceBranchIndex\
    \ 指示，\n    Matrix[Nodes.index[DeviceNode1Index]][DeviceBranchIndex]=1\n    Matrix[Nodes.index[DeviceNode2Index]][DeviceBranchIndex]=-1\n\
    // 这是两个 KCL 方程项\n```\n\n显然，我们可以直接消去电流行，然后得到：\n\n$\\text{LHS} = I$ 节点 $a$ 处的 KCL\n\
    \n对于节点 $b$：\n\n$\\text{LHS} = -I$ 节点 $b$ 处的 KCL\n\n然后，当我们移除显式电流方程时，得到以下描述：\n\n\
    $$v_a \\left( \\quad \\right) = \\begin{pmatrix} -I \\\\ +I \\end{pmatrix}$$\n\
    \n这些公式相当直观。从支路方程中，我们注意到输出节点之间的电压可以是任意值；它根本不进入方程。我们说电流源具有无限阻抗。输出节点之间的电压将完全由连接到节点的其他元件决定。类似于独立电压源的情况，我们这里不能将两个独立电流源堆叠在一起，因为要使这样的构造收敛，电流必须完全相同，因为输出阻抗是无限的。除非两个电流完全相同，否则仿真器通常会发出关于拓扑结构的抱怨。\n\
    \n## 4.3.3.2 受控源\n\n受控源稍微复杂一些，因为除了驱动端子外还有感测端子，我们将在此描述四种受控源中每一种的工作原理以及如何在矩阵公式中实现。我们将从压控源\
    \ VCVS 和 VCCS 开始，然后是流控源 CCVS 和 CCCS。\n\n## VCVS\n\n电压控制电压源的简单示意图如图 4.5 所示。\n\n\
    VCVS 的感测端口 $s_1$、$s_2$ 不吸取电流。电流而是从器件的输出节点 $a$ 和 $b$ 流出。输出节点之间的电压与感测节点相比放大了 $k$\
    \ 倍。我们发现，对于新的方程组，节点 $a$ 和 $b$ 处的 KCL 与上一节中独立电压源的情况相同：\n\n$$\\cdots + i_v + \\\
    cdots = 0 \\qquad \\text{节点 } a \\text{ 处的 KCL}$$\n\n![](img/75093da0d280ad52326a78925e5cc403_85_0.png)\n\
    \n$\\cdots - i_v + \\cdots = 0$ 节点 $b$ 处的 KCL\n\nVCVS 元件的支路方程现在为：\n\n$v_a - v_b\
    \ = k(v_{s1} - v_{s2})$\n\n或等效地：\n\n$v_a - v_b - k(v_{s1} - v_{s2}) = 0$\n\n我们看到，与独立电压源一样，流经输出节点的电流可以取任意值。\n\
    \n现在清楚了，VCVS 具有如下矩阵所示的特征：\n\n$$\\begin{pmatrix} & v_a & v_b & v_{s1} & v_{s2}\
    \ \\\\ v_a & & & & +1 \\\\ v_b & & & & -1 \\\\ \\vdots & & & & \\\\ i_v & +1 &\
    \ -1 & -k & +k \\end{pmatrix}$$ (4.27)\n\n与独立电压源相比，右侧没有项。行为由矩阵本身控制：\n\n```\nif\
    \ DeviceType = 'VCVS':\n    Matrix[DeviceBranchIndex][DeviceNode1Index]=1\n  \
    \  Matrix[DeviceBranchIndex][DeviceNode2Index]=-1\n// 这是支路方程行，由变量 DeviceBranchRow\
    \ 指示，\n// 列由 DeviceNode1Columns 和 DeviceNode2Column 变量设置\n    Matrix[DeviceBranchIndex][DeviceNode3Index]=DeviceValue\n\
    \    Matrix[DeviceBranchIndex][DeviceNode4Index]=-DeviceValue\n    Matrix[DeviceNode1Index][DeviceBranchIndex]=1\n\
    \    Matrix[DeviceNode1Index][DeviceBranchIndex]=-1\n// 这两行是 KCL 方程\n```\n\n##\
    \ VCCS\n\nVCCS 是一种在给定输入电压下输出电流的器件。它可以被视为一个理想的跨导器。电子学中的大多数晶体管元件都可以被视为跨导器，因此该元件可用作理想晶体管。我们将在本章后面将其用作理想晶体管，并在第\
    \ 5 章中将其用作非线性跨导器。在本节中，我们将研究假设输入感测端子和输出端子之间存在线性增益的方程：\n\n图 4.6 一个包含 VCCS 的简单线性网络\n\
    \n![](img/75093da0d280ad52326a78925e5cc403_87_0.png)\n\n类似于 VCVS，我们在图 4.6 中找到了一个简单的实现。\n\
    \n这与我们刚刚看过的 VCVS 部分类似，但这里的结果是输出端子处的电流。为了捕捉这一点，我们需要添加两个方程：\n\n$\\cdots + i_G +\
    \ \\cdots = 0$ 节点 $a$ 处的 KCL\n\n$\\cdots - i_G + \\cdots = 0$ 节点 $b$ 处的 KCL\n\n\
    该元件的支路方程现在为：\n\n$i_G = G(v_{s1} - v_{s2})$ (4.28)\n\n或等效地：\n\n$i_G - G(v_{s1}\
    \ - v_{s2}) = 0$ (4.29)\n\n与之前一样，这可以直接纳入我们的矩阵描述。我们最终得到以下特征：\n\n$\\begin{pmatrix}\
    \ & v_a & v_b & v_{s1} & v_{s2} & \\cdots & i_G \\\\ v_a & & & & & & +1 \\\\ v_b\
    \ & & & & & & -1 \\\\ \\vdots & & & & & & \\\\ i_G & & & -G & +G & & -1 \\end{pmatrix}$\
