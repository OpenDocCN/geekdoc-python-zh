    $$g_o = \begin{cases} 0, V_{gs} - V_T < 0 \ 2K((V_{gs} - V_T) - V_{ds}), V_{ds}
    < V_{gs} - V_T \ K(V_{gs} - V_T)^2 \lambda \end{cases}$$


    This is again a VCCS with a gain depending on the operating region, and there
    is also an output conductance *connecting* the drain and source terminals that
    is DC bias-dependent. This conductance can be modeled by an output resistor: $r_o
    = 1/g_o$.


