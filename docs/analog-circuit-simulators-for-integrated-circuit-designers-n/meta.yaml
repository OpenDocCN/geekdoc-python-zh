    \ Fig. 5.44.\n\nA code implementation can be found in Sect. 5.6.9 Code 5p9.\n\n\
    The algorithm should now look for correct amplitude and frequency by changing\
    \ the driving voltage amplitude and frequency. When the correct combination is\
    \ found, the current through the filter should ideally be zero, and in that sense,\
    \ the driving circuitry is not participating in the tank. This is a two-dimensional\
    \ search space which is not too difficult to implement. For simplicity we here\
    \ only implement the amplitude search algorithm since we know the frequency by\
    \ a simple $LC$ resonance calculation: $f = 1/(2\\pi\\sqrt{LC}) = 5.0329210^9$\
    \ Hz.\n\nLet us run the simulation with the following code snippet to implement\
    \ search:\n\n```\npython\nfor AmpIndex in range(20):\n    STA_rhs[(NumberOfNodes+StimulusIndex)*TotalHarmonics+Jacob\
    \ ian_Offset+1]=.235+float (AmpIndex)/10000\n    STA_rhs[(NumberOfNodes+StimulusIndex)*TotalHarmonics+Jacob\
    \ ian_Offset-1]=.235+float (AmpIndex)/10000.\n```\n\nWe find the result in Fig.\
    \ 5.45.\n\nThe output voltage at the minimum setting is now depicted in Fig. 5.46.\n\
    \nFor the PNOISe simulation, let us assume that the only noise sources are noise\
    \ currents sitting in parallel with the drain-source terminals. For illustrative\
    \ purposes, we assume the noise amplitude is “1.” We can now launch the PNOISE\
    \ code, Code 5.16, and add one noise sources in parallel with the active devices.\
    \ We plot the result in Fig. 5.47. The scaling of the response is roughly 6 dB\
    \ per octave as expected.\n\nThis is a simple example of a oscillator noise simulation.\
    \ A real situation has more devices and much more complicated noise contributors,\
    \ but the basic idea is the same."
