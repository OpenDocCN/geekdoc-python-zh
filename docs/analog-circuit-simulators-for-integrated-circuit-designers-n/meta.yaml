  mdcn: "简而言之，这就是仿真器的工作原理。这个特定的代码段处理交流分析，由于其定义上是线性的，并且在构建矩阵本身时工作点并不重要，因此它可能是最容易理解的实现。我们将在接下来的章节中扩展这一经验，展示如何设置线性瞬态仿真器，并在下一章中进而讨论更复杂的非线性元件情况。读者应该会欣赏到这个代码实现的简单性。毫无疑问，读者会怀疑实际实现会更复杂一些，事实也确实如此。例如，由于一切都是线性的，没有出现困难的导数算子，因此收敛性问题尚未出现。我们将在本章后面以及第5章中讨论如何处理此类情况。\n\
