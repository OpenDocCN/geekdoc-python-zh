    **Table 5.11** Two-level timestep adjustment algorithm as a function of reltol


    | reltol | Amplitude |

    |---|---|

    | 1e-1 | 0.47 |

    | 1e-2 | 0.47 |

    | 1e-3 | 0.47 |

