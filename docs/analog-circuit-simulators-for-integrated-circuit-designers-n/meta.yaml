  md: "# 5.2.2 Convergence Criteria\n\nAs we can see from the iterations in Table\
    \ 5.1 to Table 5.3, the total error goes down fairly rapidly for each iteration,\
    \ and we simply need to define what being done means. In other words, decide what\
    \ accuracy we desire. One might think a constraint on the KCL, $f_{KCL}(v_k) <\
    \ \\varepsilon$, would be an obvious choice, and in some simulators, it is. One\
    \ refers to this constraint as the residue constraint. However, it is not always\
    \ implemented, and the user should be aware of what convergence criterions are\
