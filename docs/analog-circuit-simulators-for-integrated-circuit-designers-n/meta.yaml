  md: '# 2.1.6 Solution Methods: Accuracy and Stability


    We have looked at four different ways to formulate a differential equation in
    terms of difference equations. Let us now try to quantify them each in terms of
    accuracy and stability.


    # 2.1.6.1 Accuracy


    The accuracy of the solution will depend on the circuit to be solved, the timestep,
    and which integration method was used. The accuracy of numerical approximations
    to differential equations can be estimated by their truncation error. One way
    to construct difference approximations is to use a Taylor series of a function
    around some point:


    $$f(t+\Delta t) = f(t) + f''(t)\Delta t + \frac{1}{2}f''''(t)\Delta t^2 + \dots
    + \frac{1}{n!}f^n(t)\Delta t^n$$


    A first-order accurate approximation will now be found by assuming all higher-order
    derivatives are negligible, and we are left with


    $$f(t+\Delta t) = f(t) + f''(t)\Delta t + \frac{1}{2}f''''(t)\Delta t^2 + \dots$$


    which after some rewrite gives


    $$f''(t) = \frac{f(t+\Delta t) - f(t)}{\Delta t} + o(\Delta t) \quad (2.10)$$


    where the $o$ symbol indicates behavior for small arguments.


    This is the Euler forward approximation which is accurate to first order. It means
    the truncation error is $\sim \Delta t$. One can similarly show that the trapezoidal
    approximation and Gear2 approximation are of second-order accuracy where the error
    scales as $\Delta t^2$. What this means practically is that if the solution is
    a straight line, the first derivative is not changing with time, so the second-order
    derivative is zero, and all the three methods we have been discussing will have
    no truncation error in the evaluation of the derivative. If the solution is a
    second-order polynomial, the Euler method will start to have truncation errors,
    and one must reduce the timestep to reduce their impact. The trap and Gear2 method
    can trace out a second-order polynomial with no truncation error but will have
    errors when higher-order solutions are encountered. Generally the higher the order,
    the better when it comes to accuracy. The penalty is lengthy evaluations in time,
    so most simulators use up to third-order approximations in the derivative calculation.'
  merge: -1
  pgno: 23
