    omega_k + \\omega_p)t}$ 是一个谐波 $k$ 的单音扰动，具有偏移频率 $\\omega_p$。傅里叶变换为 $\\tilde{U}\
    \ = U_k \\delta(\\omega - (\\omega_k + \\omega_p)) + U_{-k} (\\delta\\omega -\
