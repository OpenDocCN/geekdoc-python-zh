    ## 5.4.2.4 Example Circuits with Timestep Control: Dynamic Case


    ### Cross-Coupled Inverters

    Let us run the cross-coupled inverters again with the adjustable timestep control.
    We can rerun the convergence simulation with various initial conditions and compare
