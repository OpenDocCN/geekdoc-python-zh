    +   1. Play with codes and the netlists. When does it break? Why? If anything
    looks off, please go to www.fastictechniques.com for an updated code version and
    an interesting discussion.

    2. Do the details of the mathematical implementation of a PMOS, and compare to
    the code implementation in Appendix A. Is the code done properly? Improve it!

    3. Implement a charge conserved nonlinear capacitor following the outline in Sect.
    5.4.4. Verify by applying a voltage up and down ramp, and compute the charge both
    at the peak and at the end. Use a capacitor that varies like

    4. A consequence of the fact that a capacitor''s current is calculated through
    the numerical approximation of a time derivative is that accuracy of such wave
    forms is less. Any rapid rise in voltage across a capacitor can result in an erroneously
    large error in current. Imagine we have a nonlinear capacitor with voltage ramp.
    Simulate this with backward Euler, trap, and Gear2, and explain the difference
    in response.

    5. Simulate a CMOS inverter stage with capacitors both to ground and across gate-drain,
    and based on hand calculations of the delay, show the simulator gives the appropriate
    response.

    6. Simulate the five-transistor circuit in Fig. 5.48. Does the response look reasonable?
    What can be improved?

    7. Redesign the bandgap in Fig. 5.8 to make its temperature flat at 27C.

    8. Build a simulator combining an initial transient with a subsequent steady-state
    simulation.

    9. Simulate the amplifier in Sect. 5.5.7 with an amplitude A = 1V, and examine
    the output harmonics. Compare to the harmonics of a square wave.

    10. Implement a multitone Python code using both the shooting method and the harmonic
    balance method.

    11. Implement an envelope analysis simulation algorithm by wrapping the harmonic
    balance routine developed in Sect. 5.5.2 inside a time step loop where the circuitry
    controlling the modulation is changing slowly. Try it on a simple netlist.

    12. Implement a periodic steady-state solver where inductors are also included.

    13. The periodic S-parameter, transfer function, and stability analyses are simple
    generalizations of the algorithms we discussed in Chap. 4. Implement them in Python,
    and compare to simple situations to ensure they work properly.

    14. Implement a quasi-periodic Python code that can generate harmonics around
    certain main harmonic frequencies.


