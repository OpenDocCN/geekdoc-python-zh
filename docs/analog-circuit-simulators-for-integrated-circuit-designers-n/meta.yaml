    It turns out, [5, 6, 9, 17], that to investigate the stability of a numerical
    approximation, one simply applies it to the test equation and examines for which
    timesteps the numerical solution dies down, or stays within a certain bound with
    time.


    # Region of Stability


    The region of stability is now the part of the complex plane defined by the product
    $\Delta t \lambda_i$ where the numerical implementation goes to zero with time.
    We will look at our four integration methods and simply quote the results; the
    details are given in, for example, [5, 6, 9, 17] and Chap. 7. The main point here
    is to get a sense of the region of the stability.


    # Euler


    For Euler’s implementation, the backward Euler is much more stable than the forward
    one. The stability region can be found to be in Fig. 2.3. What does this mean?
    If the system itself is stable, in other words all the eigenvalues have negative
    real components, the forward Euler implementation can still become unstable. In
    fact it is only within the small grayed-out circle, the product $\Delta t \lambda_i$
    will result in stable behavior. One simply has to take smaller timesteps to achieve
    a stable behavior. We will quantify more in Chap. 4 what this means in practice.


    Next we can look at backward Euler (Fig. 2.4). Here the behavior is totally different.
    The method is stable even if the system itself is not; note the grayed-out region
    extends into the right-hand plane. We will look at a system in Chap. 4 that behaves
    this way with Euler’s method. The reader is certain to appreciate the peculiar
    property that with Euler’s backward method, a system might simulate just fine
    but in reality it will become unstable!'
