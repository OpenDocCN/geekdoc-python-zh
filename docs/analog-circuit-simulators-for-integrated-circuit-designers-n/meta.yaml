  md: 'residual $y = A (x - x_0)$ by somehow calculating a new solution from $x_1
    = x_0 + \beta z_0$, where $z_0$ is some cleverly chosen direction. This goes on
    until desired accuracy (size of $|y|$) has been reached. There are a number of
    different ways of doing this that are called conjugate gradient, biconjugate gradient
    methods, generalized minimum residue methods, etc. (see [11, 18]). These methods
    are part of a larger class of algorithms that goes under the name Krylov subspace
    methods. They are generally quite easy to implement numerically that works well
    for sparse matrices, frequently encountered in circuit systems (see [18] for a
