    noise of the current sink with the oscillation frequency. Let us consider the
    current sink having a noise source at $f_n$, and the oscillator has a oscillation
    frequency of $f$. We then have the noise current from the current sink:


    $i_n = A \sin 2\pi f_n t$ (4.35)


    The oscillator can be modeled as


    $i_{osc} = B \sin 2\pi f t$ (4.36)


    The output current is now a product of the two:


    $i_{out} = i_{osc} i_n = \frac{AB}{2} (\cos 2\pi (f - f_n)t - \cos 2\pi (f + f_n)t)$
    (4.37)


    The noise current has created two side bands around the oscillator frequency.
    Imagine now the noise source has a 1/f noise component. This DC noise will appear
    around the oscillator tone (it turns out it will often look like 1/f^3 due to
    the oscillator tank response). This phenomenon, called phase noise, cannot be
    captured by traditional noise analysis. Instead periodic noise is needed, and
    we will discuss this in Sect. 5.5.4.


    Even with simpler systems like amplifiers, the assumption behind noise analysis
    is not correct. Imagine a system where there are harmonics due to nonlinearity.
    Similar calculations will show that the same kind of mixing that occurs in oscillators
    also occurs in amplifiers.


    ### 4.4.2 Stability Analysis


    Stability analysis is usually applied to circuit loops where questions like phase
    and gain margin needs to be answered. Stability theory is discussed at depths
    elsewhere, and here we will just provide a short summary as a reminder to the
    reader.


    **Brief Stability Theory Review**


    Basically a loop will oscillate if Barkhausen’s criterion is met:


    > **Barkhausen’s criterion** A system will oscillate if the gain of the loop is
    greater than one and the phase shift is 360 degrees.


    This criterion is certainly helpful, but it says nothing of margins or how close
    to oscillation a system might get. In a sense, one needs to be “far away” from
    the point of oscillation, and this needs to be quantified. The most general stability
    theory is the one discussed in, for example, [18–20] and commonly called Nyquist’s
    criteria for stability. In most cases, this theory can be simplified to the concepts
    of gain margin and phase margin. The key to this discussion is the system loop
    needs to be opened up, and the analysis is done on that open loop where the open-loop
    gain and phase shift are simulated (in an AC sim commonly) and plotted as a function
    of frequency.


    Mathematically, the concept of phase margin can be studied in terms of complex
    transfer functions (see [20, 23]).


    **Numerical Algorithms for Stability Simulations**


    Any modern circuit we try to build with the sophisticated models available now
    has huge numbers of poles and zeros, and trying to do a complete mathematical
    analysis is impossible, hence the need for a stability analysis tool. There is
    a well-known paper by Professor Middlebrook from the California Institute of Technology
    in 1975 [21] where he describes a general algorithm to simulate stability. It
    involves biasing the circuit, breaking the loop, and performing two AC simulations.
    It works really well in most cases and we discuss it first below. A further generalization
    that is nowadays more often used can be found in [22]. We will provide a short
    review of the theory by discussing Middlebrook’s analysis first and then generalize
    it.


    ![](img/75093da0d280ad52326a78925e5cc403_103_0.png)


    **Fig. 4.17** A loop modeled as a one-port system


    ### Middlebrook Stability Analysis


    For loop stability, let us first discuss it as described in [21]. This was one
    of the first theoretical discussions on linear loop gain and has been used as
    a basis for stability simulations for many years. The basic idea is to use injections
    to be able to break the loop at any point.


    Let us look at Fig. 4.17. The loop is broken, and in one end, there is a driving
    source with a certain admittance, and at the other end, there is a load admittance.
    We find with KCL following the notation in [22]


    $$g_1 v_e + v_f (Y_e + Y_f) = 0$$


    or, defining the loop gain


    $$T = -\frac{v_f}{v_e} = \frac{g_1}{(Y_e + Y_f)}$$


    The voltage and current injections are now performed in such a way as to null
    the forward current. We then find


    $$g_1 v_e + v_f Y_f = 0$$


    with the null current ratio


    $$T_n^i = -\frac{v_f}{v_e} = \frac{g_1}{Y_f}$$


    In the next simulation, we provide voltage and current injections such that the
    forward voltage drop is zero:


    $$-i_f Y_e = g_1 i_e$$


    or


    $$-\frac{i_f}{i_e} = \frac{g_1}{Y_e}$$


    We have the so-called null voltage gain:


    $$T_n^v = -\frac{i_f}{i_e} = \frac{g_1}{Y_e}$$


    From these we now find


    $$T = \frac{T_n^v T_n^i}{T_n^v + T_n^i}$$


    This technique has been widely used, and the name Middlebrook is sometimes used
    as a verb “Middlebrook the loop.”


    ### Generalized Middlebrook Stability Analysis


    The Middlebrook analysis in the previous section suffers from shortcomings in
    terms of the signal flow direction. There is only one current source, and the
    assumption is the signal flows in only one direction. This approximation is often
    adequate for low-frequency applications. However, for higher frequencies, there
    is the possibility that there is a reverse loop flow [22]. We can then generalize
    this concept to the model in Fig. 4.18. Here, using the same notation as [22],
    we find the loop gain is given by


    $$T = \frac{g_1 + g_2}{Y_e + Y_f}$$


    Imagine now that we inject both current and voltage at the loop break point. The
    resulting parameters, $v_f$, $i_e$, can then be derived using the network ABCD
    approach:


    $$\begin{pmatrix} i_f \\ v_e \end{pmatrix} = \begin{pmatrix} A & B \\ C & D \end{pmatrix}
    \begin{pmatrix} i_{inj} \\ v_{inj} \end{pmatrix}$$


    where trivially


    $$B = i_f \big|_{i_{inj}=0, v_{inj}=1} \quad D = v_e \big|_{i_{inj}=0, v_{inj}=1}$$


    $$A = i_f \big|_{i_{inj}=1, v_{inj}=0} \quad C = v_e \big|_{i_{inj}=1, v_{inj}=0}$$


    We now simply need to relate the ABCD entities with $g_1$, $g_2$, $Y_e$, $Y_f$,
    and we can calculate the loop gain. We find from the loop equations


    $$-Y_e v_e + i_{inj} + i_f - g_2 (v_e - v_{inj}) = 0$$


    $$g_1 v_e + i_f + Y_f (v_e - v_{inj}) = 0$$


    ![](img/75093da0d280ad52326a78925e5cc403_105_0.png)


    We can now identify the ABCD variables from these two relationships and we find


    $$A = \frac{-g_1 - Y_f}{g_1 + g_2 + Y_f + Y_e}$$


    $$B = \frac{-g_1 g_2 + Y_f Y_e}{g_1 + g_2 + Y_f + Y_e}$$


    $$C = \frac{1}{g_1 + g_2 + Y_f + Y_e}$$


    $$D = \frac{g_2 + Y_f}{g_1 + g_2 + Y_f + Y_e}$$


    We then find for


    $$g_1 = \frac{AD - BC - A}{C}$$


    $$g_2 = \frac{AD - BC + D}{C}$$


    $$Y_f = \frac{BC - AD}{C}$$


    $$Y_e = \frac{1 - AD + BC + A - D}{C}$$


    And for the loop gain,


    $$T = \frac{2(AD - BC) - A + D}{2(BC - AD) + A - D + 1}$$


    We can recover the original Middlebrook result by setting $g_2 = 0$. We then find


    $$T_{forward} = \frac{AD - BC - A}{2(BC - AD) + A - D + 1}$$


    The procedure is now to:


    - DC bias the circuit.

    - Break the loop somewhere.

    - Insert a series voltage source.

    - Run an AC sim.

    - Notice $v_f$, $i_e$.

    - Insert a shunt current source.

    - Run an AC sim.

    - Notice $v_f$, $i_e$.

    - Calculate the open-loop gain.


    To get a better feel for how this would work, let us use the simple example in
    Fig. 4.19, where we can do this calculation by hand and then we can compare to
    a Python implementation. The injected current is directed as indicated in the
    figure and the voltage likewise. For simplicity let us also assume the output
    capacitor is zero so the calculations go a little smoother. The input impedance
    to the transistor gain pair is infinite, so there is no current going in that
    way. We find


    $$B = i_f|_{v=1, i=0} = 0$$


    Now for the voltage response, $D = v_e|_{v=1, i=0}$, we need to calculate it.
    We find at the input to the gate of the transistor we have $v_e = v_f + v$, and
    since the follower is biased with an ideal current source, we find the following
    loop equation:


    $$\frac{(v_f + v)g_m}{2} Z_L = v_f \rightarrow v_f \left(1 - \frac{g_m Z_L}{2}\right)
    = v \frac{g_m Z_L}{2}$$


    We then see


    $$D = v_e = v_f + v = v \left( \frac{g_m Z_L}{2 - g_m Z_L} + 1 \right) = v \left(
    \frac{2}{2 - g_m Z_L} \right)$$


    The remaining parameters are now


    $$A = i_f|_{v=0, i=1} = -1$$


    $$C = v_e|_{v=0, i=1}$$


    Actually since $B = 0$, $C$ is not a player. We find for


    $$T = \frac{2(AD - BC) - A + D}{2(BC - AD) + A - D + 1} = \frac{-D + 1}{D} = \frac{-\left(
    \frac{2}{2 - g_m Z_L} \right) + 1}{\left( \frac{2}{2 - g_m Z_L} \right)} = \frac{-2
    + 2 - g_m Z_L}{2} = -\frac{g_m Z_L}{2}$$'
