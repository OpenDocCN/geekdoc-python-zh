    与BSIM1中基于简单物理解析解对迁移率进行建模不同，BSIM3版本引入了一个更复杂的模型来捕捉与更小几何尺寸相关的效应。我们将在此将此迁移率称为 $\mu_{eff}$，不再进一步讨论细节。


