    begin{pmatrix} V_o \\\\ i_p \\\\ i_n \\end{pmatrix} = \\begin{pmatrix} 0 \\\\\
    \ -K(V_{in} - V_{dd})^2 \\\\ KV_{in}^2 \\end{pmatrix}$$\n\nThe matrix is clearly\
    \ singular in that its determinant is equal to zero. The root cause of this is\
    \ the output $V_o$ does not appear in any equation and is unrestricted. Clearly\
    \ removing it altogether from the system of equation means KCL will not be met\
