    \ which has limitations. Often in practice, one should, in addition, excite the\
    \ circuit with a step function when the loop is closed to see if there is any\
    \ ringing. Nonlinear effects causing instability can thereby be investigated.\n\
    \n![](img/75093da0d280ad52326a78925e5cc403_108_0.png)\n\n**Fig. 4.20** Gain and\
    \ phase response as a result of simulation and compared to exact result. The second\
    \ pole is intentionally set where the unity gain frequency of the first pole is.\
    \ This gives roughly 45-degree phase margin at the unity gain frequency\n\n![](img/75093da0d280ad52326a78925e5cc403_109_0.png)\n\
    \nFig. 4.21 General system with multiple input/output ports © [2019] Cambridge\
    \ University Press. Reprinted, with permission, from Cambridge University Press\n\
    \n![](img/75093da0d280ad52326a78925e5cc403_109_1.png)\n\nFig. 4.22 A schematic\
    \ test setup for S11\n\n### 4.4.3 S-Parameter Analysis\n\nAnother modern adaptation\
    \ of AC analysis is in S-parameter simulations. An S-parameter is a linear response\
    \ of a given circuit, and so AC simulation is appropriate. The basic idea behind\
    \ the S-parameter analysis is that all sources and sinks have a certain termination\
    \ impedance (in many cases, this is just 50 ohms real impedance). The S-parameter\
    \ response is then the gain between ports (Fig. 4.21).\n\nThe gain between ports\
    \ $i, j$ is annotated $S_{ji}$, where the $j$ index refers to the output port\
    \ and the $i$ index is the input port. $S_{21}$ is then the gain between port\
    \ $1 \\rightarrow 2$. This gain is then the same thing as AC gain of a circuit\
    \ that is terminated at all ports. The only bit of confusion can arise regarding\
    \ same port gain like $S_{11}$ (Fig. 4.22). One can show, see [23, 24], that\n\
    \n$$S11 = \\frac{S_{out}}{S_{in}} = \\frac{Z - R_t}{Z + R_t}$$ (4.38)\n\nwhere\
    \ $Z$ is the impedance looking in to the port and $R_t$ is the termination resistance.\
    \ The input impedance is defined as the voltage at the input node, $v_{in}$, divided\
    \ by the current going into the input, $i_{in}$. We find\n\n$$v_{in} = \\frac{Z}{R_t\
    \ + Z}V \\quad v_{R_t} = \\frac{R_t}{R_t + Z}V$$ (4.39)\n\nThis gives\n\n$$S11\
    \ = \\frac{v_{in} - v_{R_t}}{V} = \\frac{v_{in} - (V - v_{in})}{V} = \\frac{2v_{in}\
    \ - V}{V} = \\frac{v_{in} - V/2}{V/2}$$ (4.40)\n\nBy convention it is common to\
    \ use $V = 2 + j * 0$, a real voltage at the voltage source.\n\nSimulating $S_{11}$\
    \ as an AC simulation is then a matter of having a resistor, say 50 ohms, in series\
    \ with the input signal voltage source. Measure the AC response *after* the termination\
    \ resistor, remove 1, and take the complex magnitude, and we are done:\n\n$$S_{11}\
    \ = 20 \\log(|v_{in} - 1|)$$ (4.41)\n\nS21 is easier to understand (see Fig. 4.23).\
    \ It is simply an AC simulation with all ports terminated 50 ohms to ground. Still\
    \ using the convention the driving voltage source has amplitude $V = 2$, we find\
    \ the voltage at the input is $\\approx 1$. The AC magnitude at the output port\
    \ then directly gives the forward gain:\n\n$$S_{21} = 20 \\log|v_{out}|$$ (4.42)\n\
    \n![](img/75093da0d280ad52326a78925e5cc403_110_0.png)\n\n![](img/75093da0d280ad52326a78925e5cc403_111_0.png)\n\
    \nFig. 4.24 Schematic network for S-parameter analysis\n\nThis is straightforward\
    \ to implement in Python:\n**Code 4p5**\nLet us do an S-parameter analysis of\
    \ the circuit in Fig. 4.24. We have the netlist\n\n```\n*\nvp1 p1 0 0\nvss vss\
    \ 0 0\nr1 p1 in 50\nr2 in vss 50\nc1 in vss 1e-12\nl1 in b 1e-9\nr3 b c 10\nr4\
    \ c out 100\nc2 c out 1e-13\nc3 out vss 1e-11\nr5 out p2 50\nvp2 p2 vss 0\n**netlist\
    \ 4p6**\n```\n\nThe result is shown in Fig. 4.25.\n\n### 4.4.4 Transfer Function\
    \ Analysis\n\nA transfer function analysis is similar to an AC simulation in that\
    \ it simulates the gain (or transfer function) between inputs and outputs. The\
    \ advantage with transfer function analysis is that it computes the gain from\
    \ inputs like independent sources to a single output. In this way, properties\
    \ like gain, PSRR, etc. can be accessed through one simulation. In the early days\
    \ of SPICE, this analysis performed a DC linearized transfer between a specified\
    \ input source and an output node. It also frequently provided the input and output\
    \ resistance. In modern implementations, one can do a broader range of investigations.\
    \ This is in contrast to AC analysis where you have one (or a few) stimulus in\
    \ the circuit and you want to find out its effect on various parts of the circuit;\
    \ the output points are larger than the number of input or stimulus points. With\
    \ a transfer function analysis, you can calculate the response from several starting\
    \ points to a single (or a few) output; the number of inputs is larger than the\
    \ number of outputs. This is straightforward to implement in Python, and we leave\
    \ it to the reader to pursue.\n\n### 4.4.5 Sensitivity Analysis\n\nSensitivity\
    \ analysis is another AC analysis offshoot that is very convenient. The analysis\
    \ lists the sensitivity of a user-defined output to a bunch of inputs that are\
    \ also user-defined. Modern implementations also use DC simulations like operating\
    \ point analysis to simulate sensitivity as shown in Fig. 4.26. We will bypass\
    \ the explicit Python implementation here and leave as an exercise to the reader.\n\
    \n![](img/75093da0d280ad52326a78925e5cc403_113_0.png)\n\nFig. 4.26 Figure indicating\
    \ how various parameters can affect the “output” in different ways. The sensitivity\
    \ analysis option can quantify this via AC analysis simulations\n\n### 4.4.6 Odd\
    \ Cases: Things to Watch out for\n\nWe indicated the impossibility of implementing\
    \ an inductor eliminating its current equation with the motivation that its impedance\
    \ is zero, resulting in an infinite current going through it for a finite, non-zero,\
    \ voltage across it. The same can be said about a resistor with 0 ohm. Such a\
    \ device must be done as an explicit current device. If not, it is sort of obvious\
    \ the matrix elements will become infinite and poorly defined. A sophisticated\
    \ simulator will detect this problem and take precautions, but readers beware.\
    \ Another more subtle problem occurs when we have an LC resonator with ideal LC.\
    \ A series combination of such will cause a 0 ohm impedance at the resonance.\
    \ Let us investigate what happens.\n\n**Ideal LC Resonator**\n\nIt should be fairly\
    \ obvious that unless we hit the resonance exactly, where the impedance is zero\
    \ for a series combination, the algorithm will work. And in the unlikely event,\
    \ we do hit the resonance spot on the matrix will become singular as expected.\
    \ The guarantee to prevent this is a non-zero ohm resistor in series with the\
    \ inductor.\n\n**Floating Elements**\n\nIt is often the case in practice that\
    \ all elements are not connected to other elements; they are floating. The matrix\
    \ for such a case will be non-singular since the voltage on the terminals of such\
    \ an element is completely undeterministic; any value will work. How should a\
    \ simulator handle this problem? The traditional solution is to add a resistor\
    \ and capacitor to ground from all nodes with a resistance value of $1/g_{min}$,\
    \ where $g_{min}$ is a simulator variable that can be changed by the user. Also\
    \ a minimum capacitance, $c_{min}$, is usually defined at each node to reduce\
    \ the nodes’ bandwidth. See a more detailed discussion of this in Sect. 5.2.\n\
    \n## 4.5 DC Linear Simulation\n\nA DC solution for a linear system is just as\
    \ straightforward as the AC solution. All inductors are shorted and capacitors\
    \ are removed. In effect we are only left with linear resistors and DC sources.\
    \ We can take the previous example and see how it"
  mdcn: "## 4.4 矩阵构建：交流仿真\n\n![](img/75093da0d280ad52326a78925e5cc403_107_0.png)\n\
    \n图 4.19 用于稳定性检查的电路环路\n\n这正如我们所预期的开环增益。负载阻抗为\n\n$$Z_L = \\frac{R_L}{R_L j\\omega\
    \ C_L + 1}$$\n\n接下来，展示增益和相位裕度就变得直接了当。\n我们可以在 Python 代码中实现基本算法：\n**代码 4p4**\n我们可以将此代码应用于图\
    \ 4.19 中的电路，以验证我们的估算分析是否正确。网表如下\n\n```\n*\n  *\nvdd vdd 0 0\nvss vss 0 0\nvinp\
    \ inp 0 1\n* stab\n* probes\nistab vss inn 0\nvstab inn op 0\nr5 vdd outp 1000\n\
    r6 vdd outn 1000\nc1 vdd outp 1e-12\nc2 vdd outn 1e-12\ni1 vs vss 0\nm1 outn inp\
