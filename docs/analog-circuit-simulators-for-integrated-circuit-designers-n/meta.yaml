  - "[PAGE 367]\n\n# 7.6.2 LU Decomposition\n\nA much better general method to find\
    \ the inverse of matrices that we exemplified in Chap. 2 is the LU decomposition\
    \ method. For this method to work, we do not need the right-hand side of the equation,\
    \ but we can proceed by rewriting the matrix directly [7]\n\n$$Ax = LUx = b$$\n\
    \nwhere $U$ is an upper-right triangular and $L$ is a lower-left triangular matrix.\
    \ We then simply have to solve a set of equations $Ux = y$ and $Ly = b$. Since\
    \ the $LU$ matrices are triangular, it is a set of straightforward substitutions.\
    \ This sounds good, but the alert reader no doubt questions the complexity of\
    \ decomposing a matrix in such a way. There is in fact an extraordinary procedure\
    \ known as Crout's method that quite easily decomposes a matrix into these two\
    \ matrices. Let us write\n\n$$L = \\begin{pmatrix} l_{11} & \\cdots & 0 \\ \\\
    vdots & \\ddots & \\vdots \\ l_{n1} & \\cdots & l_{nn} \\end{pmatrix} \\quad U\
    \ = \\begin{pmatrix} u_{11} & \\cdots & u_{1n} \\ \\vdots & \\ddots & \\vdots\
    \ \\ 0 & \\cdots & u_{nn} \\end{pmatrix}$$\n\nIt turns out the diagonal of $L$\
    \ can always be chosen to be unity $l_{ii} = 1$. Let us write out explicitly a\
    \ row of the matrix equation $LU = A$:\n\n$$l_{i1}u_{1j} + l_{i2}u_{2j} + \\dots\
    \ + l_{in}u_{nj} = a_{ij}$$\n\nGiven the triangular nature of $L$, $U$, we see\
    \ the number of terms in the sum on the left depends strongly on whether $i =\
    \ j$ or $i < j$:\n\n$$i = j : l_{i1}u_{1i} + l_{i2}u_{2i} + \\dots + l_{ii}u_{ii}\
    \ = a_{ii}$$\n$$i < j : l_{i1}u_{1j} + l_{i2}u_{2j} + \\dots + l_{ii}u_{ij} =\
    \ a_{ij}$$\n$$i > j : l_{i1}u_{1j} + l_{i2}u_{2j} + \\dots + l_{ij}u_{jj} = a_{ij}$$\n\
    \nThe Crout's algorithm now gives the following steps:\n\n+   - Set $l_{ii} =\
    \ 1$\n- For each $j = 1, 2, \\dots, N$, do:\n  1. For $i = 1, 2, \\dots, j$, use\
    \ (1) and (2) to solve for $u_{ij} : u_{ij} = a_{ij} - \\sum_{k=1}^{i-1} l_{ik}u_{kj}$\n\
    \  2. For $i = j + 1, j + 1, \\dots, N$, use (3) to solve for $a_{ij}$:\n\n$$l_{ij}\
    \ = \\frac{1}{u_{jj}} a_{ij} - \\sum_{k=1}^{j-1} a_{ik}u_{kj}$$"
  - '[PAGE 368]


    +   - Working through these steps, one finds the procedure can be used to replace
    the original $\boldsymbol{A}$ with a new


    $$\begin{pmatrix} u_{11} & u_{12} & u_{1n} \ l_{21} & u_{22} & u_{2n} \ l_{n1}
    & l_{n2} & u_{nn} \end{pmatrix}$$


    which are the $\boldsymbol{LU}$ components! The reader realizes naturally that
    pivoting is again a critical procedure in completing the calculations. One in
    fact does not LU-decompose $\boldsymbol{A}$ but rather a row-permutated version
    of it.


    # 7.6.3 Iterative Matrix Solvers


    The idea of an iterative solver is fairly easy to understand, [7]. Suppose we
    have an approximate solution to $\boldsymbol{Ax} = \boldsymbol{b}$. Let us call
    it $\boldsymbol{x}_0$. We then have $\boldsymbol{x} = \boldsymbol{x}_0 + \delta\boldsymbol{x}$.
    We end up with


    $$\boldsymbol{Ax} = \boldsymbol{A}(\boldsymbol{x}_0 + \delta\boldsymbol{x}) =
    \boldsymbol{b}$$


    We can further write $\boldsymbol{b} = \boldsymbol{b}_0 + \delta\boldsymbol{b}$,
    where $\boldsymbol{A}\delta\boldsymbol{x} = \delta\boldsymbol{b}$ and $\boldsymbol{Ax}_0
    = \boldsymbol{b}_0$. We can now put these relations into the matrix equation,
    and we find


    $$\boldsymbol{Ax} = \boldsymbol{A}(\boldsymbol{x}_0 + \delta\boldsymbol{x}) =
    \boldsymbol{b}_0 + \delta\boldsymbol{b} \rightarrow \boldsymbol{A}\delta\boldsymbol{x}
    = \boldsymbol{b} - \boldsymbol{b}_0$$


    where the right-hand side is known. We now simply need to solve this equation
    for $\delta\boldsymbol{x}$, and we then simply subtract it from our original guess
    $\boldsymbol{x}_0$ to end up with a new guess at the solution. Questions regarding
    convergence, etc. are obviously important, and there is a lot of formal theory
    regarding this which we will now describe in some cursory fashion.


    We saw in Chap. 2 that an iterative method to solve matrix equations belonging
    to a class of solutions known as Krylov subspace methods can be very efficient
    in particular when solving large sparse matrices. It involved the idea of using
    projection to iterate through to the correct solution to solve [8]


    $$\boldsymbol{Ax} = \boldsymbol{b}$$


    Let us attempt a first guess to a solution $\boldsymbol{x} \approx \boldsymbol{x}_0$.
    We define the residue


    $$\boldsymbol{r}_0 = \boldsymbol{Ax}_0 - \boldsymbol{b} \qquad (7.51)$$


    In all likelihood, this residue is not zero. One can now define a string of vectors
    as'
  - '[PAGE 369]


    $$r_0, Ar_0, A^2r_0, \dots, A^{m-1}r_0$$


    This string of vectors make up a subspace, the Krylov subspace, $\mathcal{K}_m$.
    We will not prove this here but see [8] for many examples and more details.


    # General Procedure


    The general iterative procedure is now approximate: we have defined the Krylov
    subspace $\mathcal{K}_m$. Let us now annotate with $\mathcal{L}_m$ another subspace:


    +   1. We take an approximate solution $x_m$ from the subspace made up of the
    vectors from the space $x_0 + \mathcal{K}_m$.

    2. Require that $b - Ax_m \perp \mathcal{L}_m$. In other words, the resulting
    residue cannot be part of the subspace $\mathcal{L}_m$. Check error. Go back to
    1.


    All these techniques create some kind of polynomial approximation of the matrix
    inverse; the choice of $\mathcal{L}_m$ will be important. Sometimes, $\mathcal{L}_m
    = \mathcal{K}_m$; at other times $\mathcal{L}_m = A\mathcal{K}_m$. There are many
    varieties of this method. We will discuss Krylov subspaces and point out some
    of their properties.


    # Krylov Subspaces


    We assume here we have a Krylov subspace made up of


    $$\mathcal{K}_m(A, v) = \text{span}\{r_0, Ar_0, A^2r_0, \dots, A^{m-1}r_0\}$$


    As we proceed with the iterations, the index, $m$, increases, and so the dimension
    of the subspace is also increasing. The vector $v$ has associated with it a minimal
    polynomial that is non-zero of lowest degree such that $p(A)v = 0$. This degree
    is often called the grade of $v$ with respect to $A$. The grade of $v$ cannot
    exceed the dimension $n$ of the space $R^n$. There are some interesting properties
    of this subspace. We have:


    +   1. $\mathcal{K}_m$ is the subspace of all vectors that can be written as a
    polynomial of $p(A)v$ where $p$ is a polynomial of degree $\le m - 1$.

    2. If we let $\gamma$ denote the grade of $v$, we have $\mathcal{K}_m = \mathcal{K}_\gamma$
    for $m \ge \gamma$.

    3. $\dim(\mathcal{K}_m) = m \iff \text{grade}(v) \ge m$


    The number of steps of a Krylov subspace method is limited by the maximal Krylov
    subspace dimension $d$. A projection process breaks down in step $m$ if no $x_m$
    is found or if it is not unique. We are of course interested in methods that ensure
    existence and uniqueness for each $x_m$ as we step along $m \le d$. A method is
    called *well-defined* if it terminates with the exact solution in step $d$. It
    is called the *finite termination property*. This depends on the properties of
    the matrix $A$. Let us now assume the matrix $A$ is non-singular. We then also
    note the conditions


    $$x_m \in x_0 + K(A, r_0) \quad r_m \in r_0 + AK(A, r_0)$$


    Imply the error $x - x_m$ and the residual $r_m$ can be written in the polynomial
    form'
  - '[PAGE 370]


    $x - x_m = p_m(A)(x - x_0), \quad r_m = p_m(A)r_0$


    where $p_m$ is a polynomial of degree at most $m$ and with value one at the origin.
    We have only discussed the very preliminaries of these powerful methods and for
    more details see for example the discussions in [7, 8].


    # Convergence Properties


    Since these methods have a finite number of steps, the idea of convergence is
    a little different compared to, for example, Newton-Raphson, where we could get
    closer and closer to the precise solution by just taking more steps. Here, once
    you have reached maximal subspace dimension $d$, you are done and should be at
    the exact solution (if the method is well-defined as we just discussed). We will
    not go into the details here but suffice it to say the idea of convergence and
    rate of convergence is quite different and does not have their usual meaning [8].


    # References


    +   1. Hachtel, G. D., Brayton, R. K., & Gustavson, F. G. (1971). The sparse tableau
    approach to network analysis and design. *IEEE Transactions on Circuit Theorym*,
    18(1), 101–113.

    2. Ho, C.-W., Zein, A., Ruehli, A. E., & Brennan, P. A. (1975). The modified nodal
    approach to network analysis. *IEEE Transactions on Circuits and Systems*, 22,
    504–509.

    3. Najm, F. N. (2010). *Circuit simulation*. Hobroken: Wiley.

    4. Lambert, J. D. (1991). *Numerical methods for ordinary differential systems*.
    Chichester: Wiley & Sons.

    5. Pedro, J., Root, D., Xu, J., & Nunes, L. (2018). *Nonlinear circuit simulation
    and modeling: fundamentals for microwave design* (The Cambridge RF and microwave
    engineering series). Cambridge: Cambridge University Press. https://doi.org/10.1017/9781316492963.

    6. Kundert, K., White, J., & Sangiovanni-Vicentelli. (1990). *Steady-state methods
    for simulating analog and microwave circuits*. Norwell, MA: Kluwer Academic Publications.

    7. Press, W. H., Teukolsky, S. A., Vetterling, W. T., & Flannery, B. P. (2007).
    *Numerical recipes*. Cambridge: Cambridge University Press.

    8. Saad, Y. (2003). *Iterative method for sparse linear systems* (2nd ed.). Philadelphia:
    Society for Industrial and Applied Mathematics.'
- md: "## Appendix A Complete Python Code Lists for All Examples\n\nThis appendix\
    \ contains the complete codes for all the various simulation examples studied\
    \ in the book. First, a word of caution:\n\n- The main goal of the code has been\
    \ to make it readable for people without any code expertise in their background.\
    \ Therefore, a lot of the cleverness of Python has perhaps not been utilized fully.\n\
    - The code segments have not been debugged much beyond the displayed netlists,\
    \ so if other netlists are attempted, it is likely there will be errors.\n\n##\
    \ A.1 Introduction\n\nHere we will first define the various variables we are using\
    \ and show an example of a Python implementation of what we just discussed in\
    \ the previous sections.\n\n### A.1.1 Variables\n\nThe python code will be discussed\
    \ here with variable definitions, etc.\n\n**DeviceCount** – Counter for number\
    \ of devices in the netlist\n**NDevices** – Max number of devices\n**DevType[]**\
    \ – Array of length NDevices where each element describes the device type for\
    \ each element\n**DevLabel[]** – Array of length NDevices where each element contains\
    \ a string with the device’s label.\n**DevNode1[]** – Array of length NDevices\
    \ where each element contains a string with the device’s first node name\n**DevNode2[]**\
    \ – Array of length NDevices where each element contains a string with the device’s\
    \ second node name\n**DevNode3[]** – Array of length NDevices where each element\
    \ contains a string with the device’s third node name\n**DevNode4[]** – Array\
    \ of length NDevices where each element contains a string with the device’s fourth\
    \ node name\n**DevValue[]** – Array of length NDevices where each element contains\
    \ a number with the device’s value, for example, resistance\n**Nodes[]** – List\
    \ of string node names. It is dynamically allocated as the netlist is read.\n\
    **NumberOfNodes** – Length of Nodes[]\n**STA_matrix[][]** – The STA matrix with\
    \ size [NumberOfNodes+DeviceCount] [NumberOfNodes+DeviceCount]\n**STA_rhs[]**\
    \ – The right hand side of the equation. It has size [NumberOfNodes+DeviceCount].\n\
    \n### A.1.2 Basic Structure\n\nThe STA_matrix is defined such that the first NumberOfNodes\
    \ rows contain the nodes where KCL is described. The next DeviceCount rows contain\
    \ the branch equation for each device. The STA_rhs follows this structure.\n\n\
    ### A.1.3 Netlist Syntax\n\nThe netlists follows the basic SPICE netlist format.\n\
    The SPICE netlist format was originally conceived by the team behind the SPICE\
    \ simulator at UC Berkeley. The source file for any version of spice has the following\
    \ format:\n\n```\nTITLE\nELEMENT DESCRIPTIONS\n.MODEL STATEMENTS\nOUTPUT COMMANDS\n\
    .END\n```\n\nImportant points:\n\n- The first line traditionally is a circuit\
    \ name label preceded by a *. Here we just keep that tradition going and start\
    \ all netlists with such a row. It is treated as a comment.\n- Comment entire\
    \ lines by beginning them with '*'.\n- Only independent sources can contain the\
    \ ground node “0.”\n\n## The Circuit Description\n\nA circuit description in SPICE,\
    \ which is frequently called a netlist, consists of a statement defining each\
    \ circuit element. Connections are described by naming nodes. (The usual names\
    \ are actually numbers.) One node name has a defined meaning. Node 0 is ground!\
    \ This node can only be connected to an independent source.\n\nNo other elements\
    \ can have ground explicit in the node list. Instead one defines a node like vss\
    \ which connects to ground via an independent source.\n\nThe format of an element\
    \ description is\n\n```\n<letter><name><n1><n2>…[mname][parvals]\n```\n\nwhere\
    \ <...> must be present and [...] is optional.\n\n- <letter> is a single letter\
    \ denoting the component type.\n- <name> is a unique alpha-num combination describing\
    \ the particular instance of this component.\n- <ni> is the name of a node.\n\
    - [mname] is the (optional) modelname.\n- [parvals] are (sometimes optional) parametervalues.\n\
    \n## Sign Conventions\n\nA current is considered positive going into a device\
    \ port and negative otherwise.\n\n## Passive Elements\n\nThe <letter> that begins\
    \ an element instance denotes the circuit element. The passive elements are\n\n\
    R or r for resistors, L or l for inductors, and C or c for capacitors.\n\nThis\
    \ <letter> is followed by a unique instancename and then (in order) the nodes\
    \ associated with + and – voltage and the value of the associated parameter (R,\
    \ L, or C). The value needs to be in real numbers.\n\nExamples:\n\n- R 1 50 20000\n\
    - cloadn IN GND 250e-15\n- L41 22 21 4e-9\n\n## Independent Sources\n\n```\nV<name><n+><n–>[type]<val>\n\
    ```\n\ndefines an independent voltage source with its + terminal at node n+ and\
    \ its - node at node n-.\n\n```\nI<name><n+><n–>[type]<val>\n```\n\ndefines an\
    \ independent current source whose current flows through the source from node\
    \ n+ to node n-.\n\n> Only independent sources can have node 0 defined. All other\
    \ devices cannot. This is to reduce the number of conditional statements in the\
    \ code.\n\n## Examples:\n\n- Vdd 4 0 5 defines a 5 V source with the + terminal\
    \ connected at node 4 and the - terminal connected at node 0 (ground).\n- Ibias\
    \ 18 4 15e-3\n- Vin vin 0 sin(Offset Amplitude freq phase) defines a sinewave\
    \ with a certain Offset, Amplitude, freq and phase.\n- Vpwl vin 0 pwl(t1 val1\
    \ t2 val2) defines a piecewise linear device with time/value points defined by\
    \ the list of pairs.\n\n## Bipolar Junction Transistors\n\nThe BJT also requires\
    \ both a netlist statement and a .MODEL. A BJT is included in the netlist with\
    \ a statement of the form\n\n```\nQ<name><nc><nb><ne><model – name>\n```\n\nwhere\
    \ the collector is connected at node nc, the base at node nb, and the emitter\
    \ at node ne.\n\n**Example:** Q3 6 3 0 my-nnp corresponds to\n\nThe model-name\
    \ is defined as\n\n```\n.MODEL <model – name> Early =, K =\n```\n\nwhere Early\
    \ means the Early voltage as discussed in Chap. 3 and K is the current $I_0$ as\
    \ defined in Sect. 3.4.3.\n\n## MOSFETs\n\nThe BJT again requires both a netlist\
    \ statement and a .MODEL. A MOSFET is included in the netlist with a statement\
    \ of the form\n\n```\nM<name><nd><ng><ns><model – name>\n```\n\nwhere the drain,\
    \ gate, source, and body are connected at nodes nd, ng, ns, and nb, respectively.\
    \ The length L and width W are optional.\n\nThe model-name is defined as\n\n```\n\
    .MODEL <model – name> K =, VT =, lambdaT =\n```\n\ncorresponding to the basic\
    \ parameters in Sect. 3.4.2\n\n### A.1.4 Control Statements\n\nThere are four\
    \ types of control lines possible: .options, .ic, .write, and .plot. The syntax\
    \ is trivial, but beware of trailing spaces:\n\n```\n.options parameter1=val1\
    \ parameter2=val2\n.ic v(out)=1 v(in)=0 * This statement only controls voltage\
    \ initial conditions at this point.\n.write filename v(out) v(in) * This write\
    \ the solution values for voltage nodes out and in to file ‘filename’\n.plot v(out)\
    \ v(in) * This plots the voltages out in to the Python output window.\n```\n\n\
    ## A.2 AnalogDef.py\n\n```python\n#!/usr/bin/env python3\n# -*- coding: utf-8\
    \ -*-\n\"\"\"\nCreated on Tue Jan 28 12:04:22 2020\n\n@author: mikael\n\"\"\"\n\
    import sys\nimport re\nimport math\nimport matplotlib.pyplot as plt\nimport numpy\n\
    from scipy.fftpack import fft, ifft\n\nVthermal=1.38e-23*300/1.602e-19\nTINY=1e-5\n\
    \ndef readnetlist(netlist,modeldict,ICdict,Plotdict,Writedict,Optiondict,DevType,DevValue,DevLabel,DevNode1,DevNode2,DevNode3,DevModel,Nodes,MaxNDevices):\n\
    \    try:\n        myfile=open(netlist,'r')\n    except:\n        print('netlist\
    \ file',netlist,' not found')\n        sys.exit()\n    DeviceCount=0\n    if len(modeldict)==0:\n\
    \        print('Warning: model dictionary is empty!')\n    line=myfile.readline()\n\
    \    while line !='' :\n        DevType[DeviceCount]='empty'\n        if line[0]=='*':\n\
    \            print('comment')\n        if line[0]=='v':\n            print('VoltSource')\n\
    \            DevType[DeviceCount]='VoltSource'\n        if line[0]=='i':\n   \
    \         print('CurrSource')\n            DevType[DeviceCount]='CurrentSource'\n\
    \        if line[0]=='r':\n            print('resistor')\n            DevType[DeviceCount]='resistor'\n\
    \        if line[0]=='f':\n            print('Special Oscillator filter found')\n\
    \            DevType[DeviceCount]='oscfilter'\n        if line[0]=='l':\n    \
    \        print('inductor')\n            DevType[DeviceCount]='inductor'\n    \
    \    if line[0]=='c':\n            print('capacitor')\n            DevType[DeviceCount]='capacitor'\n\
    \        if line[0]=='m':\n            print('transistor')\n            DevType[DeviceCount]='transistor'\n\
    \        if line[0]=='q':\n            print('bipolar')\n            DevType[DeviceCount]='bipolar'\n\
    \        if re.split(' ',line)[0]=='.ic':\n            print('Initial Condition\
    \ Statement')\n            lineSplit=re.split(' ',line)\n            for i in\
    \ range(len(lineSplit)-1):\n                ConditionSplit=re.split('\\(\\)|=|\\\
    n',re.split(' ',line)[i+1])\n                if len(ConditionSplit)>2:\n     \
    \               try:\n                        ICdict[i]={}\n                 \
    \       ICdict[i]['NodeName']=ConditionSplit[1]\n                        ICdict[i]['Value']=float(ConditionSplit[3])\n\
    \                    except:\n                        print('Syntax Error in .ic\
    \ statement')\n                        sys.exit()\n                else:\n   \
    \                 print('Warning: Odd characters in IC statement \\'',ConditionSplit,'\\\
    '')\n        if re.split(' ',line)[0]=='.plot':\n            print('Plot Statement')\n\
    \            lineSplit=re.split(' ',line)\n```"
  mdcn: "## 附录A 所有示例的完整Python代码列表\n\n本附录包含本书中研究的所有各种仿真示例的完整代码。首先，有一点需要提醒：\n\n- 代码的主要目标是让没有代码专业知识背景的人也能读懂。因此，Python的许多巧妙之处可能并未被充分利用。\n\
    - 代码段除了显示的网表外，并未进行太多调试，因此如果尝试其他网表，很可能会出现错误。\n\n## A.1 简介\n\n这里我们将首先定义所使用的各种变量，并展示一个Python实现的示例，该示例对应我们在前面章节中刚刚讨论的内容。\n\
    \n### A.1.1 变量\n\nPython代码将在此处讨论，包括变量定义等。\n\n**DeviceCount** – 网表中器件数量的计数器\n**NDevices**\
    \ – 器件的最大数量\n**DevType[]** – 长度为NDevices的数组，其中每个元素描述每个器件的类型\n**DevLabel[]** –\
    \ 长度为NDevices的数组，其中每个元素包含一个带有器件标签的字符串。\n**DevNode1[]** – 长度为NDevices的数组，其中每个元素包含一个带有器件第一个节点名称的字符串\n\
    **DevNode2[]** – 长度为NDevices的数组，其中每个元素包含一个带有器件第二个节点名称的字符串\n**DevNode3[]** – 长度为NDevices的数组，其中每个元素包含一个带有器件第三个节点名称的字符串\n\
    **DevNode4[]** – 长度为NDevices的数组，其中每个元素包含一个带有器件第四个节点名称的字符串\n**DevValue[]** – 长度为NDevices的数组，其中每个元素包含一个表示器件值的数字，例如电阻值\n\
    **Nodes[]** – 字符串节点名称的列表。它在读取网表时动态分配。\n**NumberOfNodes** – Nodes[]的长度\n**STA_matrix[][]**\
    \ – STA矩阵，大小为 [NumberOfNodes+DeviceCount] [NumberOfNodes+DeviceCount]\n**STA_rhs[]**\
    \ – 方程的右侧。其大小为 [NumberOfNodes+DeviceCount]。\n\n### A.1.2 基本结构\n\nSTA_matrix的定义使得前NumberOfNodes行包含描述KCL的节点。接下来的DeviceCount行包含每个器件的支路方程。STA_rhs遵循此结构。\n\
    \n### A.1.3 网表语法\n\n网表遵循基本的SPICE网表格式。\nSPICE网表格式最初由加州大学伯克利分校SPICE仿真器背后的团队构思。任何版本的SPICE源文件都具有以下格式：\n\
    \n```\nTITLE\nELEMENT DESCRIPTIONS\n.MODEL STATEMENTS\nOUTPUT COMMANDS\n.END\n\
    ```\n\n要点：\n\n- 第一行传统上是电路名称标签，前面带有*。这里我们只是延续这一传统，所有网表都以这样一行开始。它被视为注释。\n- 以'*'开头的整行是注释。\n\
    - 只有独立源可以包含接地节点“0”。\n\n## 电路描述\n\nSPICE中的电路描述，通常称为网表，由定义每个电路元件的语句组成。连接通过命名节点来描述。（通常的名称实际上是数字。）一个节点名称具有定义的含义。节点0是接地！此节点只能连接到独立源。\n\
    \n其他任何元件都不能在节点列表中显式包含接地。相反，定义一个节点（如vss），该节点通过独立源连接到接地。\n\n元件描述的格式为\n\n```\n<letter><name><n1><n2>…[mname][parvals]\n\
    ```\n\n其中<...>必须存在，[...]是可选的。\n\n- <letter>是表示元件类型的单个字母。\n- <name>是描述该元件特定实例的唯一字母数字组合。\n\
    - <ni>是节点的名称。\n- [mname]是（可选的）模型名称。\n- [parvals]是（有时可选的）参数值。\n\n## 符号约定\n\n电流被认为在流入器件端口时为正，否则为负。\n\
    \n## 无源元件\n\n开始元件实例的<letter>表示电路元件。无源元件为\n\nR或r表示电阻，L或l表示电感，C或c表示电容。\n\n此<letter>后跟唯一的实例名称，然后（按顺序）是与+和-电压相关的节点以及相关参数（R、L或C）的值。该值需要是实数。\n\
