    \ a voltage source can deliver whatever current the rest of the nodes require\
    \ at any given point in time or frequency. A current source is analogously a device\
    \ that has infinite impedance that delivers the desired current at whatever voltage\
    \ the other devices on the connected nodes need to absorb the desired current.\
