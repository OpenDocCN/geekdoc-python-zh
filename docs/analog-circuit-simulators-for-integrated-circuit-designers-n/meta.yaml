    *ideal LC

    l1 a vs 1e-9

    c1 a vs 1e-12

    vs vs 0 0

    end

    ```


    **netlist 4p9**


    As we just mentioned about the Gear2 method, the amplitude decreases with time
    due to the “artificial” resistor that in this case acts as a shunting resistor.
    The backward Euler is even worse! However, the trapezoidal just tugs along with
    no attenuation in time.'
