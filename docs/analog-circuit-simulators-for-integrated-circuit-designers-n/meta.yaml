    transistor pair runs out of gain. This point can be analyzed from an estimation
    analysis perspective and has been done elsewhere [22, 23]. There are lots of ways
    to achieve this feedback effect, and here we will focus on an LC oscillator consisting
    of an inductor and a capacitor acting as the load to a cross-coupled NMOS pair
    of transistors. Such a tank, in which the shunted cap and inductor is often referred
    to, always has some resistive loss modeled as a shunt resistor. Such a resistor
    can also represent the series loss leading into the tank. The point of the transistor
    pair is to provide negative resistance (or gain) to the system and so maintain
    the oscillation. Oscillator work is a rich study with many complicated issues.
    If the reader wants to dig through the details, [22] is a highly recommended read.
