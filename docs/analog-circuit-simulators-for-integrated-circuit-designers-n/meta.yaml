    # 5.2 DC Nonlinear Simulation


    In Chap. 4, we showed a few implementations of linear simulators, and we discussed
    the fact that characterizing circuit elements as having a certain matrix signature
    makes it really easy to build up the basic matrix equation including the known
    right-hand side (rhs) column matrix. Here we will discuss a DC simulator and the
    key difficulties in implementing such a simulator when the branch equations are
    nonlinear and common remedies to these problems.


    As a circuit designer, it can often seem like the DC simulation is trivial in
    that it is only solving for the operating points of the circuit; no capacitors
    or inductors or other frequency dependent objects are used and can be ignored.
    We can use the scheme developed earlier and simply short all inductors and remove
    all capacitors, and we would be done. The problems come when we have nonlinear
    elements. Many solutions can then exist, and if a starting point for the DC iterations
    is not good, it can take a long time to find one of them, if at all feasible in
    a reasonable time [4, 18]. We will here outline some of these difficulties, and
    in doing so, we will encounter common terminology and explain their technical
    meaning.


    # 5.2.1 Solution Techniques


    The study of nonlinear equations has a long and rich history. We mentioned in
    Chap. 2 the dominant solution method as being the Newton-Raphson algorithm. In
    Chap. 2, we discussed a one-dimensional derivation of the method. This section
    will introduce a multidimensional version, and we will show how one can implement
    it numerically. It is one of the work horses in nonlinear numerical codes, and
    a good understanding of it and its convergence properties can be a really helpful
    tool in one''s toolbox. There are also some interesting pathologies stemming from
    not being “close enough” to the correct solution initially, and we will mention
    these briefly also.


    # 5.2.1.1 Nonlinear Model Implementations


    We will discuss the DC problem by looking at a specific example (see Fig. 5.1).
    The new element is a nonlinear transistor we will model in three different ways
    following our analytical outline in Sect. 3.4. A transistor can be seen as a VCCS
    where an'
  - '[PAGE 171]


    input voltage between gate and source (or base-emitter) controls the current through
    the drain (or collector). There is a lot more to modeling a transistor as we discussed
    already in Chap. 3, but for our purposes, we will keep the models really simple
    so various aspects of analog simulators can be showcased. We will start with the
    simplest CMOS model from Sect. 3.4. This model shows the drain current varies
    like $I_d \sim V_{gs}^2$. This is perhaps the simplest nonlinearity one can think
    of. In order to proceed, we need to take a look at the definitions of the direction
    of currents as they apply to NMOS and PMOS transistors, respectively. Let us look
    one more time at Fig. 3.8 where the directions of the source and drain currents
    are indicated. The current direction convention is that a current going into a
    device (or subcircuit) is positive; outgoing currents are negative. For the NMOS
    transistor, we have then that the drain current is


    $$I_d = K(V_g - V_s)^2 = KV_{gs}^2 \quad (5.1)$$


    For the PMOS, $I_d$ becomes negative:


    $$I_d = -K(V_s - V_g)^2 = -KV_{sg}^2 \quad (5.2)$$


    Note the subtle change of subscript for the PMOS. For this model, it has no significance,
    but it will play a role later on with more sophisticated implementations.

    With these sign conventions in mind, let us now discuss solution techniques for
    such nonlinear devices.


    ![](img/75093da0d280ad52326a78925e5cc403_171_0.png)'
  - '[PAGE 172]


    Let us look at this model with our circuit in Fig. 5.1. The reader will realize
    the solution is fairly straightforward analytically, but let us go through Newton-Raphson
    iterations to see how it works. We find after some trivial algebra the equations
    we are trying to solve are


    $$\begin{cases} I_p + I_n = I_{sink} \ I_p = K(V_a - V_s)^2 \ I_n = K(V_b - V_s)^2
    \end{cases} \rightarrow \begin{cases} f_0 : I_p + I_n - I_{sink} = 0 \ f_1 : I_p
    - K(V_a - V_s)^2 = 0 \ f_2 : I_n - K(V_b - V_s)^2 = 0 \end{cases} \rightarrow
    f(\boldsymbol{v}) = 0, \boldsymbol{v} = \begin{pmatrix} V_s \ I_p \ I_n \end{pmatrix}
    \quad (5.3)$$


    where we have explicitly solved for the voltages $V_A = V_{dd}R_1/(R_1 + R_2)$
    and $V_B = V_{dd}R_3/(R_3 + R_4)$ to simplify the math and keep the network equations
    manageable for analytical calculations. The drain voltages follow trivially from
    the currents, $I_p$, $I_n$, and we will not add them directly to the network equations.
    $\boldsymbol{v}$ is here the vector of unknown quantities. The function $f$ is
    a common symbol in the simulation literature [3, 4, 10, 11] when discussing network
    equations. There the full MNA description is often used, and no explicit current
    branches are included; it is therefore common to see $f$ simply as the equation
    for KCL. In this book, we explicitly include all branch equations, so $f$ will
    here also include those. The reader should keep this in mind when reading the
    common reference literature [1–21]. When we explicitly refer to the KCL equations
    only, we denote $f$ as $f_{KCL}$.


    These set of equations contain linear terms and nonlinear terms. We can separate
    these out such that we have a set of equations that look like


    $$f(\boldsymbol{v}) = \begin{pmatrix} 0 & 1 & 1 \ 0 & 1 & 0 \ 0 & 0 & 1 \end{pmatrix}
    \begin{pmatrix} V_s \ I_p \ I_n \end{pmatrix} + \begin{pmatrix} 0 \ -K(V_a - V_s)^2
    \ -K(V_b - V_s)^2 \end{pmatrix} - \begin{pmatrix} I_{sink} \ 0 \ 0 \end{pmatrix}
    = 0 \quad (5.4)$$


    The second term in the equation is known as the nonlinear term. Is it simply added
    as a separate column matrix to the matrix equation. The last term is the right-hand
    side of the matrix equation we have just moved over as part of the definition
    of $f$. This way of separating out the linear and nonlinear parts of the network
    equations is standard practice.


    Following the Newton-Raphson recipe we discussed in Chap. 2, we can now write
    this equation as a Taylor expansion in multidimensions around some point $\boldsymbol{v}_0$;
    for a detailed derivation, see Chap. 7:


    $$f(\boldsymbol{v}) = f(\boldsymbol{v}_0) + \left. \frac{\partial f}{\partial
    \boldsymbol{v}} \right|_{\boldsymbol{v}_0} (\boldsymbol{v} - \boldsymbol{v}_0)
    \quad (5.5)$$


    Let us now calculate the matrix in the second term, known as the *Jacobian*:'
  - "[PAGE 173]\n\n$$J_{ij} = \\frac{\\partial f_i}{\\partial v_j}$$\n\n(5.6)\n\n\
