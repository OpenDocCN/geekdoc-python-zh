    netlist 5.9\n```\n\nNote in order to get the simulation to start in a reasonable\
    \ time, it is common to “jank” it with an ideal piecewise linear current source\
    \ that turns on for a short time. Without this, it is possible the simulator will\
    \ only find the other stable point, namely, DC particularly if the transconductor\
    \ gain is weak. Firing up this netlist in our simulator with our three integration\
    \ methods result in the plot in Fig. 5.19.\n\n![](img/75093da0d280ad52326a78925e5cc403_207_0.png)\n\
    \nFig. 5.19 Oscillator output using TRAP method compared to the same method using\
    \ ngspice. Note the output node is outn in ngspice and outp in Python, and not\
    \ only is the amplitude and frequency the same, the phase is also the same"
