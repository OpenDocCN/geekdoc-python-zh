    ![](img/75093da0d280ad52326a78925e5cc403_252_0.png)


    tone are considered. Often the user has to define what signals are *large* and
    what signals are *moderate* in size. The large tones get lots of harmonics (still
    user-controlled), and the moderate ones have just handful of harmonics considered.
    In our example, let us assume that the 2GHz and 3GHz tones are large, and the
    1 MHz tone is moderate; then only the beat frequency between the 2 and 3 GHz tones
    will be considered, and a small set of 1 MHz tones around this fundamental 1GHz
    tone will be used in the analysis (Fig. 5.40). This way one can get an accurate
    picture of the circuitry without using all possible harmonics. The method is therefore
    called quasi-periodic since not all possible combinations of hamonics are used.


    Such a code is simple to implement in particular with harmonic balance. We leave
    it as an exercise to the reader to construct such a code.


    # 5.5.7 Specific Circuit Examples


    With these periodic steady-state codes, let us look at a few common examples where
    they are extraordinarily useful. We first will discuss a phase-noise simulation
    using our very simple nonlinear FET model. It is a great example of how such a
    technique can be helpful. We follow this with a low-noise amplifier (LNA) example,
    where the linearity in terms of harmonics is directly given by the steady-state
    solution. Lastly we consider an up-conversion RF mixer where a small signal at
    base band is upconverted to higher frequencies. We will use the code we established
    with the PAC and PNOISE additions previously discussed. It should be obvious that
    with such a simple nonlinearity we are using, the conversion is straightforward.
    In a real system, there can be other much stronger nonlinear components, for example,
    a BJT process where the mixing into higher harmonics is a lot more complicated.'
