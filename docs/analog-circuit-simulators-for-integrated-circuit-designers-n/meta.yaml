    我们要求电荷守恒，即


    $$Q_g + Q_b + Q_d + Q_s = 0$$


    这意味着，通过取时间导数，有


    $$i_g + i_b + i_d + i_s = 0$$


    这应该不足为奇。可以很容易地证明这意味着电容并非全部独立。事实上，可以证明 12 个电容中的 3 个可以从其他九个中找到。


