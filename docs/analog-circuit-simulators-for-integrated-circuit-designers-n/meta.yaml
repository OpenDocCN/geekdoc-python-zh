    is not a problem, but imagine if it is close to zero! In that case errors will
    be amplified and the inversion will fail. Here we find


    $$\left\{\begin{array}{l}3x+2y+z=7\frac{7}{3}y+\frac{5}{3}z=\frac{8}{3}\z=3\end{array}\right.$$


    which is known as the echelon form of the matrix, or upper triangular form (Wikipedia).
    Proceeding along these lines and manipulating the equations so the unknowns become
    trivial to solve for, we find


    $$\left\{\begin{array}{l}x=2\y=-1\z=3\end{array}\right.$$


    This whole scheme, incidentally called “Gaussian elimination with no pivoting”
    [11], works great as long as the factors we divide with, the pivots, to get to
    the unity matrix are not zero or too close to zero. It almost never works in practice
    for large matrices. Often the pivots are really small and something needs to be
    done. Usually, the rows *and* columns are interchanged to try to put a large number
    in front of the desired variable to avoid the divide-by-zero scenario. In simulators
    there are often options related to the pivot, like *pivrel* (this sets the biggest
    relative value of the pivot) and *pivabs* (the smallest acceptable size of a pivot
    element) that sets how the matrix inverter handles the pivoting. In almost no
    instances is there a need to adjust these parameters in modern simulators, but
    it is good to be aware they exist.


    > In modern simulators, there is rarely, if ever, any need to adjust pivoting-related
    parameters.'
