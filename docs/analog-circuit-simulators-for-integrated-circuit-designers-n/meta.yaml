- img_proc: true
  md: 'input voltage between gate and source (or base-emitter) controls the current
    through the drain (or collector). There is a lot more to modeling a transistor
    as we discussed already in Chap. 3, but for our purposes, we will keep the models
    really simple so various aspects of analog simulators can be showcased. We will
    start with the simplest CMOS model from Sect. 3.4. This model shows the drain
    current varies like $I_d \sim V_{gs}^2$. This is perhaps the simplest nonlinearity
    one can think of. In order to proceed, we need to take a look at the definitions
    of the direction of currents as they apply to NMOS and PMOS transistors, respectively.
    Let us look one more time at Fig. 3.8 where the directions of the source and drain
    currents are indicated. The current direction convention is that a current going
    into a device (or subcircuit) is positive; outgoing currents are negative. For
    the NMOS transistor, we have then that the drain current is


    $$I_d = K(V_g - V_s)^2 = KV_{gs}^2 \quad (5.1)$$


    For the PMOS, $I_d$ becomes negative:


    $$I_d = -K(V_s - V_g)^2 = -KV_{sg}^2 \quad (5.2)$$


    Note the subtle change of subscript for the PMOS. For this model, it has no significance,
    but it will play a role later on with more sophisticated implementations.

    With these sign conventions in mind, let us now discuss solution techniques for
    such nonlinear devices.


    ![](img/75093da0d280ad52326a78925e5cc403_171_0.png)'
  merge: -1
