    \ i_3 = 0 \\\\ i_1 j\\omega L + v_1 = v_{in} \\\\ i_3 - v_1 j\\omega C = 0 \\\\\
    \ i_4 R_2 - v_2 = 0 \\end{cases}$$\n\nThe resistor now only shows up in the KCL\
    \ equation:\n\n$$\\begin{pmatrix} v_1 \\\\ v_2 \\\\ i_2 \\\\ i_3 \\end{pmatrix}\
    \ \\begin{pmatrix} -1/R_1 & +1/R_1 \\\\ +1/R_1 & -1/R_1 \\end{pmatrix}$$\n\nThis\
    \ is in fact the general signature for a resistor where the current through it\
    \ is not of interest, and it is not necessary to keep it explicitly.\n\nWe have\
    \ encountered two ways to look at a resistor in the matrix formulation: one where\
