    \ + \\left. \\frac{\\partial f}{\\partial \\boldsymbol{v}} \\right|_{\\boldsymbol{v}_0}\
    \ (\\boldsymbol{v} - \\boldsymbol{v}_0) \\quad (5.5)$$\n\n现在让我们计算第二项中的矩阵，称为*雅可比矩阵*：\n\
    \n$$J_{ij} = \\frac{\\partial f_i}{\\partial v_j} \\quad (5.6)$$\n\n对于这种情况，计算相当直接，我们得到以下表达式：\n\
