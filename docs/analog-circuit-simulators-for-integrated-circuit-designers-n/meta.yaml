    通过金属接触和扩散区连接到漏极和源极的互连电阻在内部建模，并假设漏极和源极区域是对称的。


    ### 漏源电流


    与之前在强反型区一样，我们有两个子区域：线性区和饱和区。


    1. 线性区，$V_{gs} > V_{th}$ 且 $0 < V_{ds} < V_{ds, sat}$


    $$I_{ds} = \mu_{eff} \frac{C_{ox} W / L}{1 + \frac{1}{LE_{sat}} V_{ds}} \left(
    V_{gs} - V_{th} - V_{ds} / 2 \right) V_{ds}$$


    2. 饱和区 $V_{gs} > V_{th}$ 且 $V_{ds} \ge V_{ds, sat}$


    $$I_{ds} = \mu_{eff} \frac{C_{ox} W / L}{2aK} \left( V_{gs} - V_{th} \right)^2
    \left( 1 + (V_{ds} - V_{ds, sat}) / V_A \right)$$


    其中 $V_A$ 是厄尔利电压，用于建模输出电阻。弱反型区建模为


    $$I_{ds} = \mu_{eff} C_{ox} \frac{W}{L} \left( \frac{kT}{q} \right)^2 e^{\frac{q}{kT}(V_{gs}
    - V_{eff})/n} \left( 1 - e^{-V_{ds}q/kT} \right) \quad (3.34)$$


    这与BSIM1类似。然而，弱反型和强反型之间的过渡区域是通过引入弱反型区和强反型区的两个截止点来单独建模的，分别称为 $V_{gslow}$、$I_{dslow}$
    和 $V_{gshigh}$、$I_{dshigh}$。在这些限制内，漏源电流和栅源电压参数化为


    $$I_E = (1-t)^2 I_{dslow} + 2(1-t)tI_p + t^2 I_{dshigh} \quad (3.35)$$


    $$V_{gs} = (1-t)^2 V_{gslow} + 2(1-t)tV_p + t^2 V_{gshigh} \quad (3.36)$$


    通过这种简单的参数化，过渡区域将是连续的，并且具有一阶连续导数。


    正如我们刚才提到的，BSIM3中的输出电阻模型要复杂得多，它是通过引入厄尔利电压 $V_A$ 来建模的。该电压被建模为由三个独立且互不影响的效应主导：沟道长度调制（CLM）、漏致势垒降低（DIBL）和衬底电流引起的体效应（SCBE）。这些效应像它们的倒数一样相加


    $$\frac{1}{V_A} = \frac{1}{V_{ACLM}} + \frac{1}{V_{ADIBL}} + \frac{1}{V_{ASCBE}}
    \quad (3.37)$$


    其中


    $$V_{ACLM} = I_{dsat} \left( \frac{\partial I_{ds}}{\partial V_{dsat}} \frac{\partial
    V_{dsat}}{\partial L} \frac{\partial L}{\partial V_{ds}} \right)^{-1} \quad (3.38)$$


    $$V_{ADIBL} = I_{dsat} \left( \frac{\partial I_{ds}}{\partial V_{dsat}} \frac{\partial
    V_{dsat}}{\partial V_{th}} \frac{\partial V_{th}}{\partial V_{ds}} \right)^{-1}
    \quad (3.39)$$


    $$V_{ASCBE} = I_{dsat} \left( \frac{\partial I_{ds}}{\partial V_{th}} \frac{\partial
    V_{th}}{\partial V_{bs}} \frac{\partial V_{bs}}{\partial I_{sub}} \frac{\partial
    I_{sub}}{\partial V_{ds}} \right)^{-1} \quad (3.40)$$


    BSIM3模型版本在建模方面带来了显著改进。引入准二维泊松方程的解析解和大大改进的输出电阻模型，在大约10年内，随着一些子模型的改进，成为CMOS晶体管的标准模型。早期版本所需的基于物理的参数总数约为25个。我们很快会看到，随着BSIM4的发布，这将发生巨大变化，我们接下来将讨论BSIM4。


    ### 噪声模型


    BSIM3中的噪声模型可以由用户通过参数 $noiMod$ 选择三种之一。对于 $noimod = 1$，噪声建模方式与（手工计算模型）相同'
