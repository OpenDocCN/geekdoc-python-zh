    # 6.2.2 Small Digital Circuit Simulation Strategy


    For large digital circuits, one needs to follow the register transfer logic (RTL)
    flow where the circuits are described in a high-level hardware description language
    (RTL) like Verilog. These are simulated with event-based simulators, in contrast
    to the continuous time simulators we have described in this book. However, occasionally
    one needs relatively small digital blocks and state machines to control some analog
    circuit. These circuits can be simulated with a continuous time simulator of the
    kind we have discussed here. For these circuits, the simulation strategy can be
    simplified compared to the analog continuous time case.


    For small digital circuits, do a DC simulation.


    +   - Look at the bias point, all digital gate outputs should be either at ground
    or vdd; if not, some connection might be floating unintentionally.

    - There is no point running AC simulations for pure digital circuits; instead
    one should proceed to the transient simulation, and one should look at timing:

    - Is the timing correct between the signals? If not, the sizing of some buffers
    might be wrong and unable to drive the load properly.

    - Is the edge rate healthy? This is another indicator the load is inappropriate.
    What healthy means is directly dependent on the application.


    The steady simulators usually have a hard time with circuits with a lot of fast-switching
    edges. The shooting method is in particular infamous for having difficulties because
    of the inherent assumption that the final state depends weakly on changes in the
    initial state (Sect. 5.5), and for a fast-changing edge, this is not true, and
    Newton-Raphson might not find an appropriate solution. Furthermore, there might
    not be a simple way to see periodicity in the circuit, or it might be really long,
    so the fundamental assumption of a steady state is not helpful. Most of the time,
    the designer is then limited to transient simulations.'
