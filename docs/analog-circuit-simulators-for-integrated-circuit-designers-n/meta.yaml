    +   - Guess a timestep, $\Delta t_{step}$.

    - Solve for the new variables at times $N \cdot \Delta t_{step}$ using Newton-Raphson
    iteration. We use the convergence criteria developed in Sect. 5.2.1.

    - If the Newton-Raphson method or the LTE criterion developed in Sect. 4.6.6.
    has not converged at a given timestep, start over from the beginning with a smaller
    timestep that we do by hand for this section.


    This section will showcase a few examples of nonlinear transient simulations where
    we will examine circuits with and without dynamic components. The first two circuits
    will be simple amplifiers and buffers with resistive loads, and the rest will
    be circuitry with various dynamic elements where the memory of the circuit plays
    a role.


    # 5.4.1.1 Example Circuits with Uniform Timesteps: Purely Resistive Case


    When there are no dynamic elements like capacitors and inductors present, there
    are no differential equations in time that need to be solved, and so there is
    no memory in the circuit. The state of the circuit at time $t$ is the result of
    the driving source at the same time. One way to view such a transient simulation
    is simply as a series of DC simulations, where we can use the previous timestep
    as a starting point for the next step in time. Here we will show two examples
    of such DC-like simulations and then we introduce dynamic elements.


