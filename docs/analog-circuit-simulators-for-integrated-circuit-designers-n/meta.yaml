    \boldsymbol{v}_0} = \frac{\partial \boldsymbol{i}(\boldsymbol{v}(t_n))}{\partial
    \boldsymbol{v}_0} + \frac{\partial (\boldsymbol{q}(\boldsymbol{v}(t_n)) - \boldsymbol{q}(\boldsymbol{v}(t_{n-1})))}{\Delta
    t \partial \boldsymbol{v}_0} = 0$$


