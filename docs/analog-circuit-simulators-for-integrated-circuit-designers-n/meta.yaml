    The idea of an iterative solver is fairly easy to understand, [7]. Suppose we
    have an approximate solution to $\boldsymbol{Ax} = \boldsymbol{b}$. Let us call
    it $\boldsymbol{x}_0$. We then have $\boldsymbol{x} = \boldsymbol{x}_0 + \delta\boldsymbol{x}$.
    We end up with


    $$\boldsymbol{Ax} = \boldsymbol{A}(\boldsymbol{x}_0 + \delta\boldsymbol{x}) =
    \boldsymbol{b}$$


    We can further write $\boldsymbol{b} = \boldsymbol{b}_0 + \delta\boldsymbol{b}$,
    where $\boldsymbol{A}\delta\boldsymbol{x} = \delta\boldsymbol{b}$ and $\boldsymbol{Ax}_0
    = \boldsymbol{b}_0$. We can now put these relations into the matrix equation,
    and we find


    $$\boldsymbol{Ax} = \boldsymbol{A}(\boldsymbol{x}_0 + \delta\boldsymbol{x}) =
    \boldsymbol{b}_0 + \delta\boldsymbol{b} \rightarrow \boldsymbol{A}\delta\boldsymbol{x}
    = \boldsymbol{b} - \boldsymbol{b}_0$$


    where the right-hand side is known. We now simply need to solve this equation
    for $\delta\boldsymbol{x}$, and we then simply subtract it from our original guess
    $\boldsymbol{x}_0$ to end up with a new guess at the solution. Questions regarding
    convergence, etc. are obviously important, and there is a lot of formal theory
    regarding this which we will now describe in some cursory fashion.


