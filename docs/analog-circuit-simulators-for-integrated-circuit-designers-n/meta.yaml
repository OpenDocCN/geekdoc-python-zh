    这被称为矩阵的**阶梯形**，或**上三角形**形式（维基百科）。沿着这些思路继续，通过操作方程使未知数变得容易求解，我们得到


    $$\left\{\begin{array}{l}x=2\\y=-1\\z=3\end{array}\right.$$


    顺便说一下，这个整个方案被称为“**无主元高斯消元法**”[11]，只要我们用来得到单位矩阵的除数（主元）不为零或不太接近零，它就工作得很好。对于大型矩阵，它在实践中几乎从不奏效。通常主元非常小，需要采取一些措施。通常，行*和*列会被互换，以尝试将一个大数放在所需变量前面，以避免除以零的情况。在仿真器中，通常有与主元相关的选项，如
    *pivrel*（设置主元的最大相对值）和 *pivabs*（主元元素的最小可接受大小），用于设置矩阵求逆器如何处理主元。在现代仿真器中，几乎不需要调整这些参数，但了解它们的存在是好的。


    > 在现代仿真器中，几乎不需要调整与主元相关的参数。


    ## 2.3.2.2 LU 分解


    一种流行的矩阵求解器类型是 LU 分解法。这里通过将矩阵写成另外两个矩阵 $L,U$ 的乘积来消除等式右边的问题，使得 $A = LU$。$L$ 矩阵的左下三角（包括对角线）被填充，而
    $U$ 的右上三角被填充，对角线上为零。这种书写方程的方式导致了另一种回代方法，就像之前一样，但它不再依赖于等式右边，并且只要矩阵不改变，它通常是一种更好的方法。更详细地说


    $$A x = (LU) x = L(U x) = b$$


    通过令 $y = U x$，我们得到一组新的方程


    $$L y = b$$


    和


    $$U x = y$$


    这里的优势在于求解三角形方程相当简单；这是逐行直接代入的问题。关于如何对一般情况进行分解的细节，我们请感兴趣的读者参阅 [11]。这里我们可以使用前面的例子，我们注意到高斯消元步骤产生了一个阶梯形或上三角形的矩阵。这就是
    $U$。我们有


    $$U = \begin{pmatrix} 3 & 2 & 1 \\ 0 & \frac{7}{3} & \frac{5}{3} \\ 0 & 0 & \frac{18}{7}
    \end{pmatrix}$$


    在这种情况下，找到 $L$ 是很直接的，因为我们知道


    $$A = LU = \begin{pmatrix} 1 & 0 & 0 \\ l_{21} & 1 & 0 \\ l_{31} & l_{32} & 1
    \end{pmatrix} \begin{pmatrix} 3 & 2 & 1 \\ 0 & \frac{7}{3} & \frac{5}{3} \\ 0
    & 0 & \frac{18}{7} \end{pmatrix} = \begin{pmatrix} 3 & 2 & 1 \\ 1 & 3 & 2 \\ 2
    & 1 & 3 \end{pmatrix}$$


    通过进行特定的矩阵乘法并与 $A$ 中的元素进行比对，我们发现


    $$l_{21} = \frac{1}{3}, \quad l_{31} = \frac{2}{3} \quad 2l_{31} + \frac{7}{3}l_{32}
    = 1 \rightarrow l_{32} = -\frac{1}{7}$$


    $$\boldsymbol{L} = \begin{pmatrix} 1 & 0 & 0 \\ 1/3 & 1 & 0 \\ 2/3 & -1/7 & 1
    \end{pmatrix}$$


    读者肯定会注意到，矩阵系数实际上就是我们为高斯消元方案所做的行操作，只是符号相反。我们从 $\boldsymbol{L}\boldsymbol{y} = \boldsymbol{b}$
    中发现


    $$\boldsymbol{y} = \begin{pmatrix} 7 \\ 8/3 \\ 54/7 \end{pmatrix}$$


    最后，从 $\boldsymbol{U}\boldsymbol{x} = \boldsymbol{y}$，我们得到解


    $$\begin{pmatrix} 3 & 2 & 1 \\ 0 & 7/3 & 5/3 \\ 0 & 0 & 18/7 \end{pmatrix} \begin{pmatrix}
    x \\ y \\ z \end{pmatrix} = \begin{pmatrix} 7 \\ 8/3 \\ 54/7 \end{pmatrix}$$


    通过回代，我们发现


    $$\begin{pmatrix} x \\ y \\ z \end{pmatrix} = \begin{pmatrix} 2 \\ -1 \\ 3 \end{pmatrix}$$


    我们可以说，$LU$ 分解使得 $\boldsymbol{L}$ 矩阵记录了行操作，因此等式右边需要用 $\boldsymbol{L}$ 相应地调整。在这些操作之后，只需使用
    $\boldsymbol{U}$ 进行回代即可得到答案。与之前一样，在高斯消元法中，主元是分解/分解矩阵的关键步骤。在现代仿真器中，几乎不需要调整主元算法的参数。我们最初提到的优势在于，分解（或因式分解）独立于等式右边。在实际实现中，主元的选择比这个例子中显示的更为微妙（参见
    [11]）。


    ## 2.3.2.3 迭代法


    真正影响矩阵求逆速度的是迭代法，这对于大型稀疏系统可能非常有利。基本思想是从解 $\boldsymbol{A}\boldsymbol{x} = \boldsymbol{b}$
    的一个猜测值 $\boldsymbol{x}_0$ 开始，并想出一种方法来最小化残差 $y = A (x - x_0)$，方法是通过某种方式从 $x_1 =
    x_0 + \beta z_0$ 计算出一个新的解，其中 $z_0$ 是某个巧妙选择的方向。这个过程一直持续到达到所需的精度（$|y|$ 的大小）。有许多不同的方法可以做到这一点，称为共轭梯度法、双共轭梯度法、广义最小残差法等（参见
    [11, 18]）。这些方法属于一类更大的算法，统称为 Krylov 子空间方法。它们通常在数值上相当容易实现，并且对于电路系统中经常遇到的稀疏矩阵效果良好（关于这些技术的详细讨论，请参见
    [18]）。它们的工作原理比前面讨论的技术更难理解，我们将在第 7 章提供一些细节。相反，我们将展示一个这样的迭代算法的例子，称为 GMRes（广义最小残差）法。基本上，该方法使用最小均方（lms）法来最小化残差
    $|Ax_m - b|$。这种方法还有很多细节，强烈鼓励读者在 [11, 18] 和第 7 章中更详细地研究。Python 代码实现可以在第 2.6.1 节找到：


    ### 具体示例


    为了说明这些方法，让我们将它们应用于上一节的示例矩阵方程。


    $$A x = b$$


    其中


    $$A = \begin{pmatrix} 3 & 2 & 1 \\ 1 & 3 & 2 \\ 2 & 1 & 3 \end{pmatrix} \quad
    x = \begin{pmatrix} x \\ y \\ z \end{pmatrix} \quad b = \begin{pmatrix} 7 \\ 5
    \\ 12 \end{pmatrix}$$


    让我们猜测第一个解


    $$x_0 = \begin{pmatrix} 1 \\ 0 \\ 0 \end{pmatrix}$$


    并将其输入我们的 python 代码。我们发现以下结果是迭代次数的函数（表 2.1）


    这只是一个非常简单的例子，它几乎无法体现这些方法的全部优势。对于电路分析中常见的大型稀疏矩阵，与直接方法相比，加速可能是显著的。请注意算法的显著简单性；在这种情况下，它只有几行代码。'
