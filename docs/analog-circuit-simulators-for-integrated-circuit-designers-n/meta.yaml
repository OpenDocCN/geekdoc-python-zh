    \ & v_a & v_b & v_{s1} & v_{s2} \\ v_a & & & & +1 \\ v_b & & & & -1 \\ \\vdots\
    \ & & & & \\ i_v & +1 & -1 & -k & +k \\end{pmatrix}$$ (4.27)\n\nCompared to the\
