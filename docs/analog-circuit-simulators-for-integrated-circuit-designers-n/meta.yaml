    | deltaT | 5e-12 | S |\n| 迭代次数 | 19,402 | N/A |\n\n初始启动阶段之后是如图 5.25 所示的稳态振荡。使用\
    \ ngspice 可以构建一个行为与我们模型完全相同的晶体管模型；然后我们可以用它来比较我们的仿真器实现与 ngspice 版本。如图 5.25 所示，两者几乎完全相同。我们可以使用文献\
    \ [23] 中推导的公式来估算振幅。我们发现\n\n$$A = \\sqrt{\\left(g_m - \\frac{1}{R}\\right)\\frac{4}{g_m^3}}$$\n\
    \n与仿真结果相比，我们发现两者合理吻合，误差约为 5%。我们可以将设置总结在表 5.10 中。\n\n## 射频混频器电路\n\n混频器电路是窄带无线电类电路中的主力（图\
