- md: '## 5.5.8 Odd Cases: Things to Watch Out for


    For the steady-state-type systems, perhaps the most obvious issue one runs into
    is using too few harmonics in the harmonic balance method. Oftentimes one needs
    to use a significantly higher number than one might initially estimate. This is
    most often due to sharp edges in the circuitry that if not allowed for can result
    in the familiar Gibbs phenomenon or ringing around the edges where the high-frequency
    content is high.


    ## 5.5.9 Accuracy: How to Determine


    A difficult task is to estimate the accuracy of the simulation result. Most methods
    have had their accuracy stepwise analyzed and is characterized as a second-order,
    third-order, or sometime first-order accuracy. This is referring to the local
    estimate at the precise timestep or frequency step or whatever. The global accuracy
    after many steps can be much harder to estimate, and sometimes the errors will
    dissipate and sometimes the errors will persist indefinitely. As we work through
    various systems, we will discuss the topic of accuracy when appropriate. One common
    and extraordinarily time consuming way to verify the accuracy is accurate is to
    rerun the simulation with the tolerances tightened. This cannot be done every
    time since the time required will be much longer to complete the task. In practice,
    what people do is to spot check accuracy from time to time by tightening the required
    tolerance.


    > In practice it is good to verify the accuracy of a system by spot checking and
    resimulate with tighter tolerance


    ## 5.5.10 Simulator Options Considered


    We have considered the following options and what they mean in this chapter:


    - reltol

    - abstol

    - vntol

    - chgtol

    - Trapezoidal integration method

    - Euler (forward/backward) integration method

    - Gear second-order integration method

    - GearOnly

    - TrapOnly

    - Truncation errors: point local, local, global

    - Source stepping

    - $g_{min}$ stepping

    - PTran stepping

    - DPtran stepping

    - Newton max iteration

    - Shooting method

    - Harmonic balance

    - NHarmonics

    - Oversampling


    ## 5.5.11 Summary


    We have in this chapter discussed the basic ideas behind nonlinear simulators,
    and we have gone from simple nonlinear models of transistors to more complicated
    ones. We are still far from any realistic BSIM implementation. Many of the inherent
    pitfalls using say nonlinear capacitors have been exemplified a few times. Finally
    we have constructed a simple code that can achieve a steady-state solution, and
    this is one of the most important tools for the modern circuit designer.


    All throughout the chapter, we have built a kind of toy simulator with simple
    transistor modeling just to illustrate a possible way to implement the techniques.
    Many of the more or less well-known pitfalls with nonlinear capacitors or integration
    methods were highlighted with direct use of the toy simulator.'
  mdcn: '## 5.5.8 特殊情况：需要注意的问题


    对于稳态系统，人们遇到的最明显的问题可能是在谐波平衡法中使用了过少的谐波分量。通常，需要使用的谐波数量远高于最初的估计值。这通常是由于电路中存在尖锐的边沿，如果不加以考虑，就会导致熟悉的吉布斯现象或在高频分量较高的边沿处出现振铃。


    ## 5.5.9 精度：如何确定


    一个困难的任务是估计仿真结果的精度。大多数方法都经过逐步的精度分析，并被表征为二阶、三阶或有时是一阶精度。这指的是在精确的时间步长或频率步长等处的局部估计。经过许多步之后的全局精度可能更难估计，有时误差会消散，有时误差会无限期地持续存在。在我们研究各种系统时，我们将在适当的时候讨论精度问题。一种常见且极其耗时的验证精度的方法是收紧容差重新运行仿真。由于完成任务所需的时间会大大增加，因此不能每次都这样做。在实践中，人们会不时地通过收紧所需的容差来抽查精度。


    > 在实践中，通过抽查和使用更严格的容差重新仿真来验证系统的精度是很好的做法。


    ## 5.5.10 仿真器选项考量


    本章我们考虑了以下选项及其含义：


    - reltol

    - abstol

    - vntol

    - chgtol

    - 梯形积分法

    - 欧拉（前向/后向）积分法

    - Gear二阶积分法

    - GearOnly

    - TrapOnly

    - 截断误差：点局部、局部、全局

    - 源步进

    - $g_{min}$ 步进

    - PTran 步进

    - DPtran 步进

    - 牛顿最大迭代次数

    - 打靶法

    - 谐波平衡

    - NHarmonics

    - 过采样


    ## 5.5.11 总结


    本章我们讨论了非线性仿真器背后的基本原理，并从晶体管的简单非线性模型过渡到更复杂的模型。我们距离任何现实的BSIM实现还很远。使用非线性电容器等固有的许多陷阱已经被多次举例说明。最后，我们构建了一个简单的代码来实现稳态解，这是现代电路设计者最重要的工具之一。


    在整个章节中，我们构建了一种带有简单晶体管建模的玩具仿真器，只是为了说明实现这些技术的一种可能方式。通过直接使用这个玩具仿真器，突出了非线性电容器或积分方法中许多或多或少众所周知的陷阱。'
