    $Q_{inv}$ 控制。


    $$\frac{4kT\mu_{eff}}{\mu_{eff}|Q_{inv}|R_{ds}(V) + L_{eff}^2}|Q_{inv}|$$


    ## BSIM4 2000


    BSIM4 是第四代模型，带来了数百个参数来描述 MOSFET 的工作原理。随着著名的摩尔定律驱动特征尺寸不断缩小，栅极长度和宽度持续减小以改善功耗并提高处理能力，对更精细的
    BSIM 模型的需求变得显而易见。与上一代一样，这一代也有许多子版本，提供了各种改进。


    ## 概述


    我们不会深入探讨这些模型，只是浅尝辄止，重点介绍一些改进。与 BSIM3 相比，BSIM4 版本有许多改进，仅举几例：


    - 改进了衬底电阻模型。

    - 沟道热噪声建模更加精确，并改进了感应栅噪声模型。

    - 更好的 $1/f$ 噪声模型。

    - 改进了非准静态（NQS）模型，能够正确考虑 NQS 效应。

    - 漏源电阻模型正确考虑了不对称和其他与偏置相关的效应。

    - 更精确的栅极隧穿模型。

    - 统一的电流饱和模型，包含所有电流饱和机制——速度饱和、速度过冲和源端速度限制。

    - 阈值电压定义已更改，以改善亚阈值响应。

    - 改进了漏致势垒降低（DIBL）效应和 ROUT 模型。

    - 仅提及这一系列模型为该领域带来的众多改进中的一部分！


    总体而言，有数百个新参数。我们现在将更详细地描述其中一些效应。


    ## 阈值电压


    首先让我们看看阈值电压：


    $$V_{th} = V_{T0} + K_1\left(\sqrt{\varphi_s - V_{BS}} - \sqrt{\varphi_s}\right)
    - K_2V_{BS} - \Delta V_{th}$$


    其建模方式与之前非常相似。最大的变化之一在于短沟道调整的表达式：


    $$\Delta V_{th} = D_{vr0} \frac{0.5}{\cosh \frac{L}{l_t} - 1} \left( 2(V_{bi}
    - \phi_s) + V_{ds} \right)$$


    之前的表达式在 $L$ 变得非常小时会导致虚假的第二次 $V_{th}$ 上升。为了适应更广泛的技术范围，参数被进一步细分为子参数，以增加模型的适用性。我们在此不深入这些细节。


    在 BSIM3 中，栅极厚度使得薄氧化层附近感应电荷层的有效厚度远小于栅极厚度。在 BSIM4 中，栅极厚度与电荷层厚度更接近的事实导致表面电荷的基本近似失效。这引入了几个新的方程和相关参数。


    各种偏置区域的物理原理现在要复杂得多，我们将简要介绍一些需要建模的新效应。


    ## 弱反型区


    该区域的漏极电流与之前类似：


    $$I_{ds} = \mu_0 \sqrt{\frac{q \epsilon_{si} NDEP}{2 \phi_s}} \frac{W}{L} \left(
    \frac{kT}{q} \right)^2 e^{\frac{q}{kT}(V_{gs} - V_{th} - V_{off})/\eta} \left(
    1 - e^{-V_{ds}q/kT} \right)$$


    ## 栅极隧穿效应


    随着栅极厚度持续缩小，一种称为隧穿的量子力学效应开始变得重要。如果读者回忆起现代物理课程，电子可以被视为粒子或波，根据具体情况，其中一种性质更为明显。在波动情况下，通过求解薛定谔方程可以证明电子波函数存在于氧化层区域，甚至在晶体管体内具有有限大小。因此，电子有一定概率能够存在于栅极之外；它“隧穿”通过薄氧化层区域。这是一种纯粹的量子力学效应，可能导致显著的漏电损失。BSIM4
    中考虑了这一点。


    ## 统一迁移率模型


    迁移率显然是一个关键参数，因为它直接影响漏极电流。在 BSIM4 中，引入了新的统一迁移率模型，参数为 MOBMOD = 2。


    ## 漏源电流


    BSIM4 为线性区和饱和区引入了统一的电流模型


    $$I_{ds} = \frac{I_{ds0}}{\left(1 + \frac{R_{ds}I_{ds0}}{V_{dseff}}\right)} NF
    \left(1 + \frac{1}{C_{clm}} \ln \frac{V_A}{V_{Asat}}\right) f(V_{ADIBL}, V_{ADITS},
    V_{ASCBE}) \quad (3.44)$$


    其中


    $$I_{ds0} = \mu_{eff} W Q_{ch0} \frac{V_{ds}}{L} \frac{\left(1 - \frac{V_{ds}}{2V_b}\right)}{1
    + \frac{V_{ds}}{E_{sat}L}} \quad (3.45)$$


    ## 噪声模型


    晶体管的噪声模型包括沟道的热噪声和闪烁（1/f）噪声。


    ### 1/f 噪声


    闪烁噪声使用两种近似方法建模：一种表达式简单，便于手工计算；另一种称为统一模型，更多地考虑了现象背后的详细物理原理，包括器件所处的工作区域。选择权在用户手中，通过
    *fnoimod* 参数设置，查看代工厂提供的模型以了解使用了哪种模型通常很有启发性。


    ### 热噪声


    热噪声建模也由用户参数 *tnoimod* 控制，可在三组近似之间选择。第一种通过设置 *tnoimod* = 0 启用，类似于 BSIM3 中已有的模型。第二种称为*整体*模型，通过设置
    *tnoimod* = 1 访问。它被建模为源漏之间的噪声电流，此外在晶体管源端串联一个噪声电压源。该模型被称为整体模型，因为所有短沟道效应和速度饱和效应都自动包含在内。最后，*tnoimod*
    = 2 选项使用两个噪声电流来建模噪声，其中在晶体管栅源端之间插入一个噪声电流，而不是在源端使用噪声电压源。已发表的与测量结果的相关性 [12, 15] 显示，当
    *tnoimod* 设置为 2 时，相关性良好。


    ### 其他噪声源


    BSIM4 模型还包括其他噪声源，源于漏源电阻和栅极隧穿电流引起的散粒噪声。


    ## 模型参数调整


    了解模型及其局限性很重要，因为代工厂通常会提供带有标准参数集和参数标志的模型，这些在大多数情况下都适用。然而，如果需要不寻常的尺寸，例如，这个标准参数集可能就不够了。有经验的工程师会自行调整这些标志/参数。像本书这样的书无法涵盖最新模型代中的每个参数。那将是一大卷书，而且没有必要，因为这类信息已经存在。相反，我们将重点介绍作者及其团队遇到与测量结果存在差异的一些效应。希望这能鼓励读者大胆调查模型设置对其特定应用的适用性。


    ## 非准静态效应


    FET 沟道可以建模为传输线，由一串电阻连接而成，每个连接点都有一个电容接地。如果沟道很宽，这可能导致信号传播延迟。在短沟道区域，这通常可以简化为一个包含一个电阻和一个电容的集总模型。该效应由一个开关控制，一个用于瞬态仿真，一个用于交流仿真。通常，代工厂模型会将此
    NQS 开关设置为零，这意味着忽略分布效应。这也有助于缩短仿真时间。然而，有时可能需要长沟道器件，例如作为电路中承载高速信号部分的电容，此时需要启用 NQS
    开关以考虑分布效应。否则可能导致对此类电容延迟的过度乐观估计。


    ## 栅极电阻模型


    栅极可能具有显著的电阻，特别是小尺寸 CMOS 晶体管。BSIM4 包含一个开关来考虑这种电阻；它被称为 rgatemod。将此参数设置为 0 意味着不产生内部栅极电阻。在现代
    PDK 中，晶体管通常实例化在包含栅极电阻的无源网络中，因此通常禁用此内部建模效应。有关其使用方法的更多信息，请参见 [15]。


    ## 衬底电阻网络


    衬底电阻可以在 BSIM4 中建模，这是高速应用的重要参数。模型开关称为 rbodmod。在研究新技术时，查看此模型开关是否启用通常很有价值。更多信息，请参见
    [15]。


    ## 电荷分配模型


    电荷分配描述了反型层电荷如何分为源电荷和漏电荷。通常有三个选项：50%/50%、40%/60% 和 0%/100%。40%/60% 模型被认为是最符合物理实际的
    [13]。实际分配将取决于节点电压，这很难通过解析解决 [13]。根据应用，使用的分配模型可能会给出错误的结果。


    ## 总结


    我们简要介绍了 BSIM4 的建模。我们触及了一些基本的建模假设，并与早期的 BSIM 版本进行了比较。我们看到复杂性显著增加，许多微妙的效应'
