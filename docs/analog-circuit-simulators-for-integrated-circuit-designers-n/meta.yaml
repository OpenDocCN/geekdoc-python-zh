    $$I_{ds} = \frac{I_{ds0}}{\left(1 + \frac{R_{ds}I_{ds0}}{V_{dseff}}\right)} NF
    \left(1 + \frac{1}{C_{clm}} \ln \frac{V_A}{V_{Asat}}\right) f(V_{ADIBL}, V_{ADITS},
    V_{ASCBE}) \quad (3.44)$$


    where


    $$I_{ds0} = \mu_{eff} W Q_{ch0} \frac{V_{ds}}{L} \frac{\left(1 - \frac{V_{ds}}{2V_b}\right)}{1
    + \frac{V_{ds}}{E_{sat}L}} \quad (3.45)$$


    # Noise Model


    The noise model for a transistor consists of the thermal noise of the channel
    as well as flicker (1/f) noise.


    # 1/f noise


    The flicker noise is modeled using two kinds of approximations: one where the
    expressions are simple and convenient to use for hand calculations and another
    referred to as the unified model takes more of the detailed physics behind the
    phenomenon into account including what operating region the device is in. The
    choice is up to the user, via the *fnoimod* parameter, and it is often instructive
    to take a look at the models provided by the foundry to see which one is used.


    # Thermal Noise


    The thermal noise modeling is also controlled by a user parameter *tnoimod* that
    chooses between three sets of approximations. The first, enabled by setting *tnoimod*
    = 0, is similar to what was already in BSIM3. The second, referred to as the *holistic*
    model, is accessed by setting *tnoimod* = 1. It is modeled as a noise current
    between source and drain, and in addition there is a noise voltage source in series
    with the transistor source terminal. The model is called holistic because all
    short-channel effects and velocity saturation effects are automatically included.
    Finally the *tnoimod* = 2 option uses two noise currents to model the noise where
    instead of a noise voltage source at the source terminal, a noise current is inserted
    between the gate and source terminals of the transistor. The published correlations
    with measurements [12, 15] shows good correlation with *tnoimod* set to 2.


    # Other Noise Sources


    The BSIM4 model also includes other noise sources stemming from drain-source resistances
    and shot noise due to gate tunneling currents.


    # Model Parameter Tweaking


    It is important to be aware of the modeling and its limitations since often the
    foundry will provide models with a standard set of parameters and parameter flags
    that work in most cases. However, oftentimes if an unusual size is needed for
    example, this'
  - '[PAGE 60]


    standard parameter set might not sufficient. The informed engineer will then go
    and adjust these flags/parameters on his/her own. A book like this cannot cover
    every parameter in the latest model generations. It would be a large volume and
    unnecessary since this type of information is already out there. Instead we will
    highlight some effects where the author and the team around him have encountered
    discrepancies with measurements. Hopefully this will encourage the reader to boldly
    investigate the appropriateness of the model setup for his/her particular application.


    # Non-quasi-static Effect


    A FET channel can be modeled as a transmission line with a string of resistors
    connected together and from each interconnect point a capacitor to gnd. This can
    cause a delay in the propagation of the signal if the channel is wide. In the
    short channel region, this can often be simplified as a lumped model with one
    resistor and one capacitor. This effect is controlled with a switch one for transient
    simulations and one for AC simulations. Oftentimes a foundry model will have this
    NQS switch set to zero, meaning the distributed effect is ignored. This will help
    with the simulation time also. However, occasionally one might need a long channel
    device perhaps as a capacitor in a part of the circuit carrying high-speed signals,
    and then the NQS switch needs to be enabled so the distributed effect is taken
    into account. Failure to do so can result in overoptimistic delay of such a capacitor.


    # Gate Resistance Model


    The gate can have significant resistance, in particular the small geometry CMOS
    transistors. BSIM4 includes a switch to take such a resistance into account; it
    is called rgatemod. Setting this parameter to 0 means no internal gate resistance
    is generated. In a modern PDK, the transistor is often instantiated in a passive
    network that includes a gate resistor, so oftentimes this internal modeling effect
    is disabled. For more information on how it is used, see [15].


    # Substrate Resistance Network


    The substrate resistance can be modeled in BSIM4, and this is an important parameter
    for high-speed applications. The model switch is called rbodmod. When investigating
    a new technology, it is often worthwhile to see if this model switch is enabled
    or not. For more information, see [15].


    # Charge Partitioning Model


    The charge partitioning tells how the inversion layer charge is divided into source
    and drain charge. There are typically three options: 50%/50%, 40%/60%, and 0%/100%.
    The 40%/60% model is considered the most physical [13]. The actual split will
    depend on the node voltages, something that is hard to solve analytically [13].
    Depending on the application, the partitioning model used might give the wrong
    answer.


    # Summary


    We have looked briefly at the modeling of BSIM4. We have touched on a few of the
    basic modeling assumptions and compared to the earlier BSIM versions. We see a
    significant increase in the sophistication has occurred, and many subtle effects
    that'
- md: 'are important for small geometry CMOS can now be captured with reasonable accuracy.
    We have also highlighted some model switches that can be very important for correct
    behavior and correlation with silicon. The reader is highly encouraged to study
    the model files provided by the factory and make his/her own judgment on what
    the suitable parameter (switches) should be for the application under consideration.


    ## 3.1.4.2 BSIM6


    As the technology has gone to more sophisticated physical implementations like
    system-on-insulator (SOI) and FinFET structures, the BSIM model team has been
    very busy following along. The latest generation of model under the BSIM6 umbrella
    contains many more implementations targeting these specific technologies and others.
    Due to space limitations, we will here only briefly mention what they do and leave
    the details to be explored by the reader. The reader is highly encouraged to study
    these implementations in detail along the lines we described in the previous sections.


    - BSIM-BULK: This is the new BULK BSIM model

    - BSIM-SOI: This is a compact model for SOI structures, based on BSIM3v3

    - BSIM-IMG: BSIM-IMG (independent multi-gate) model has been developed to model
    the electrical characteristics of the independent double-gate structures like
    ultra-thin body and BOX SOI transistors (UTBB). It allows different front- and
    back-gate voltages, work functions, dielectric thicknesses, and dielectric constants.

    - BSIM-CMG: (common multi-gate) is a compact model for the class of common multi-gate
    FETs. Physical surface potential-based formulations are derived for both intrinsic
    and extrinsic models with finite body doping. The surface potentials at the source
    and drain ends are solved analytically with poly-depletion and quantum mechanical
    effects. The effect of finite body doping is captured through a perturbation approach.
    The analytic surface potential solution agrees with 2D device simulation results
    well.


    ## 3.2 Bipolar Transistors


    A bipolar transistor operation is quite different from a CMOS transistor. Traditionally
    the speed of a SiGe bipolar transistor was much faster than a CMOS transistor,
    but with the introduction of small geometry CMOS, the speeds of the two technologies
    are now more comparable. Perhaps the biggest advantage of CMOS is the fact that
    it is complementary in nature; there is a PMOS transistor that is just as fast
    as the NMOS. There are then many more architecture choices available.


    One of the hardest aspects of implementing bipolar devices in a simulator is the
    strong exponential dependence of current vs voltage. This can easily cause blowup
    of solutions since large steps in the voltage cause an overflow in the updated
    current. We will see examples of this behavior later in Chap. 5. There are ways
    to work around this problem by, for example, limiting the voltage excursion to
    some number or construct a new exponential function that is not exponential beyond
    a certain input.


    We start this section with a brief description of the general behavior and follow
    this with a discussion of a few popular models in Sects. 3.2.2, 3.2.3, 3.2.4,
    and 3.2.5.


    ### 3.2.1 General Behavior


    The physics of bipolar transistors is quite complex. One advantage is that the
    physics is the same for many orders of magnitude of output current, and this gives
    rise to fewer discontinuities in model which helps with convergence. We will not
    have space to go through the details here but rather just quote the fundamental
    results. The reader can find a good discussion in [2].


    A bipolar transistor has a common symbol exemplified in Fig. 3.5. The basic relationship
    between the output collector current and the base emitter voltage is the well-known
    formulae


    $$I_C = I_s \left(e^{qV_{BE}/kT} - 1\right)$$

    $$I_B = I_C / \beta$$

    $$I_E = I_C + I_B$$


    The factor $\beta$ is the current amplification factor.


    ### 3.2.2 Ebers-Moll Model


    A more complicated model and one of the first that was developed is called the
    Ebers-Moll model [14]. It was originally a static nonlinear model only but was
    refined over the years to include effects like charge storage, variation with
    current, and base-width modulation (causing finite output conductance). A large
    signal model describing the effect of capacitances and parasitic resistors such
    as it was implemented in spice in the early years can be found in Fig. 3.6.


    The basic current relationship for the collector and emitter node is much more
    complicated than we indicated in Sect. 3.2.1 and is given by


    Fig. 3.5 A bipolar transistor symbol. It consists of three main terminals, base,
    collector, and emitter


