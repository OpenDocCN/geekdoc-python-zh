  md: '# 5.5.4 Perturbation Techniques


    Having established a periodic steady-state solution much can now be analyzed.
    Part of the analysis in the previous section showed there is a matrix called the
    conversion matrix, simply the harmonic Jacobian, that calculates the gain from
    one frequency harmonic to any other harmonic provided the signal is small enough
    as not to disturb the steady-state condition we have established. We can think
    of it as a harmonic AC analysis. A small signal riding on top of larger one will
    mix with such a signal via the conversion matrix and produce tones around other
    harmonic frequencies. This is not an uncommon situation. Think of the case of
    an up-conversion RF mixer where the LO signal is large and the RF signal that
    multiplies it is small and of baseband frequency (say 100 kHz). To resolve the
    gain of such, a system will require a simulation lasting some 10 μs, something
    that is really painful if the LO frequency is in the GHz range. Imagine our periodic
    steady-state system, where we can translate the gain from DC to the LO first harmonic
    simply with an AC like calculation; we can simulate this gain much more efficiently.
    The same can be said about other conversion-type systems like phase-noise translation
    in oscillators, etc. We will discuss details of such simulations in the last section
    of this chapter.


    This section will discuss first what is commonly known as periodic AC simulation
    followed by periodic noise analysis. We will exemplify the technique in our Python
    setup and use it later in Sect. 5.5.7.


    # Periodic AC Analysis


    Let us assume we have a solution for our circuit such that


    $$f(v(t)) = i(v(t)) + \dot{q}(v(t)) + u = 0 \quad (5.72)$$


    What if we add a small signal perturbation to $u(t) \rightarrow u(t) + \tilde{u}(t)$
    such that the overall solution is still approximately valid? The solution will
    likewise be adjusted with a small correction, $v(t) \rightarrow v(t) + \tilde{v}(t)$,
    and we see we seek a solution that meets


    $$f(v(t) + \tilde{v}(t)) = i(v(t) + \tilde{v}(t)) + \dot{q}(v(t) + \tilde{v}(t))
    + u + \tilde{u}(t) = 0 \quad (5.73)$$


    This we can expand the usual way with a Taylor series and we find


    $$i(v(t) + \tilde{v}(t)) + \dot{q}(v(t) + \tilde{v}(t)) \approx i(v(t)) + \frac{\partial
    i(v)}{\partial v}\tilde{v} + \frac{d}{dt}\left(q(v(t)) + \frac{\partial q(v)}{\partial
    v}\tilde{v}\right) \quad (5.74)$$


