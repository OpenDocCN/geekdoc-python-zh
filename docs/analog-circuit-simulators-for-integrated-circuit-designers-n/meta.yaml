- md: '## Chapter 4

    Circuit Simulators: Linear Case


    **Abstract** This chapter discusses the basics of simulators where the focus is
    on linear systems. We start with a simple circuit network and use it as a demonstration
    of how an arbitrary circuit network can be built as a matrix equation. This is
    a natural environment for AC analysis, and we start with such a simulation and
    compare to a professional simulator. We then extend the analysis to include linear
    transient simulation where we include elements like capacitors and inductors so
    that one can demonstrate various integration methods.


    ## 4.1 Introduction


    A circuit simulator is set up to solve Kirchhoff’s current law (KCL) and voltage
    law (KVL) together with equations governing the electrical component’s response
    to current and or voltage stimuli. This chapter will show the basic structure
    of simulators in the case of linear systems. We will start with a brief historical
    overview and then derive the basic matrix equation for a simple circuit as an
    example, and we will use this to motivate how to set up general matrix equations
    in a computer program. We will only hint at the formal derivations behind these
    general equations since this has been done thoroughly many times, and we will
    provide more of the details in Chap. 7 and also give plenty of references for
    the user to dig into the details if interested. We will first study the single-frequency
    tone transfer, and since we are looking at linear systems, this means we will
    look at AC analysis first, which is a good starting point for understanding the
    general methodology. We follow this using a time-dependent or transient analysis.
    It follows naturally from the AC discussion. In Chap. 2, we mentioned four different
    ways to implement differential equations with the help of difference equations.
    These four implementations have different properties, and we will highlight those
    with specific example codes and netlists we will provide in the text.


    ## 4.2 Historical Development


    The 1960s and 1970s saw many attempts in developing a way to build circuits using
    computer-aided design (CAD) techniques [1–8]. Many simulator codes in the 1960s
    were written under contract with the US Department of Defense and as such restricted
    in their public use. The design group at the University of California at Berkeley
    under Professor D.O. Pederson quickly became one of the leading teams proposing
    “Simulation Program with Integrated Circuit Emphasis” or SPICE as a way to implement
    circuit network equations in a computer and solve those using numerical techniques.
