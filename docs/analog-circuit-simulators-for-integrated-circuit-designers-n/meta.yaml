    # Linear Region


    The linear region is characterized by $V_{ds}$ being small, and so we can expand
    the expression for $I_{ds}$ in terms of $V_{ds}$. We find to first order


    $$I_{ds} = \mu_{eff} C_{ox} \frac{W}{L} \left( V_{gs} - V_{fb} - 2\psi_B - \frac{\sqrt{4\psi_B
    \epsilon_{si} q N_A}}{C_{ox}} \right) V_{ds} \quad (3.18)$$


    This can be formulated in terms of a threshold voltage


    $$V_T = V_{fb} + 2\psi_B + \frac{\sqrt{4\psi_B \epsilon_{si} q N_A}}{C_{ox}} \quad
    (3.19)$$


    so that


    $$I_{ds} = \mu_{eff} C_{ox} \frac{W}{L} (V_{gs} - V_T) V_{ds} \quad (3.20)$$


    This is the familiar expression that can be found in most circuit textbooks.


    # Parabolic Region


    For larger $V_{ds}$, we need to include the second-order terms also, and then
    we find


    $$I_{ds} = \mu_{eff} C_{ox} \frac{W}{L} \left( (V_{gs} - V_T) V_{ds} - \frac{m}{2}
    V_{ds}^2 \right) \quad (3.21)$$


    # Saturation Region


    The expression for $I_{ds}$ in the parabolic region indicates the current increases
    with $V_{ds}$ until it reaches a maximum where


    $$I_{ds} = \mu_{eff} C_{ox} \frac{W}{L} \frac{(V_{gs} - V_T)^2}{2m} \quad (3.22)$$


    This expression is also familiar as the square law function of $I_{ds}$ vs $V_{gs}$
    in the saturation region. These expressions represent an idealized linear to saturation
    region behavior, and they are a good starting point for constructing models. In
    fact, the earliest models used small varieties of these expressions, and we will
    present the BSIM models in the order in which they were constructed where these
    simple expressions where expanded upon to become much more sophisticated with
    time.


    # Noise Model


    The most convenient noise model for hand calculations is to simply put a noise
    current source between the drain and source of the transistor as in Fig. 3.4.'
