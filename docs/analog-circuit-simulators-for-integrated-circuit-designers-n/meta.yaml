    \ will then look like\n\n$$\\begin{pmatrix} & v_a & v_b \\\\ v_a & & 1 \\\\ v_b\
    \ & & -1 \\\\ i_L & -\\frac{\\Delta t}{2L} & \\frac{\\Delta t}{2L} & 1 \\end{pmatrix}\
    \ = \\begin{pmatrix} \\ \\ \\ i_L(t_n) + \\frac{\\Delta t}{2L} (v_a(t_n) - v_b(t_n))\
    \ \\end{pmatrix} \\quad (4.61)$$\n\nA pseudocode can look like\n\n```\nif DeviceType\
