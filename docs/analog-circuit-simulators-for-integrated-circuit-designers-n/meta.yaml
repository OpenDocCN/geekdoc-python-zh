    # 6.1.5 Summary


    We have looked at a “unit” transistor in our fictitious technology. We found it
    has the following characteristics as shown in Table 6.4.


    Armed with this little table, we can now get an idea of the value of these parameters
    for any size transistor by simply multiplying by a scale factor. The further we
    are from this “unit” transistor size, the greater the error, but it will still
    provide a good sense of what, say, the capacitive load is with a particular transistor.
    Also things like transconductance and output conductance can be estimated really
    quickly without need for simulations. It is a handy little table one can use throughout
    the design process.


    In other applications, other parameters like the on-resistance, $r_{on}$, might
    be valuable to add to this short list of characterization parameters. This whole
    idea is not new by any means (see, e.g., [1–3] for more much more details).'
