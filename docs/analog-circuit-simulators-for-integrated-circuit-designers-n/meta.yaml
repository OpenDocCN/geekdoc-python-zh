    have a realistic DC solution. Oftentimes the solution at the end of this ramp
    up can be used as a starting point for another kind of simulation, like a transient
    simulation. There are other methods we will discuss in the section, and choosing
    one is often referred to as choosing a homotopy (the term comes from the mathematical
    discipline topology where a homotopy is a relationship between two functions where
    one function is continuously changed into the other through some parameter, loosely
    speaking). For the ramp-up case we just discussed, we often see ramp up, or source
    stepping or some such option for the simulator.


    # Homotopy Methods


    In this section, we will discuss the most common homotopy methods, source stepping,
    $g_{min}$ stepping, and (briefly) pseudo-transient methods. We will be quite brief
    and highlight what often works best in practice.


    # Source Stepping


    Most circuits have the convenient property that if the voltage sources are at
    0 V and the current sources are at 0 A, the circuit has the solution = 0; all
    other voltages and currents are zero. We mentioned this case briefly in the introduction
    to this section. In the case where there is a problem with DC convergence, one
    method would then be to start everything off at zero and slowly ramp all the sources
    up to their final value. This is clearly a continuous change of the circuit from
    one state to the other, so it is classified as a homotopy. It is called source
    stepping in most commercial simulators. It is often a very convenient way to achieve
    DC convergence. The trick is often in the rate of the ramp where one needs to
    adjust the next value of the sources if a new step fails. It is not always guaranteed
    to converge, and there is a lot of theoretical work that has been done to investigate
    these problems. Often the Achilles heel is in the severe nonlinearity in switching-type
    circuits where the gain around the switch point can be large.


    Let us take a look at a cross-coupled inverter circuit where we can showcase a
    way to implement the stepping algorithm Code5.4. The circuit can be found in Fig.
    5.10, and the netlist is


    ![](img/75093da0d280ad52326a78925e5cc403_192_0.png)'
