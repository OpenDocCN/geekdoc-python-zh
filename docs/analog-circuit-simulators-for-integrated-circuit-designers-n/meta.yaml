- md: "## 4.6.5 Stiff Circuits\n\nThe kinds of circuits where there are time constants,\
    \ like $RC$, that are small compared to the timestep are called stiff circuits.\
    \ In electrical systems, it is very common to have many high-frequency poles due\
    \ to small capacitors, for example. Normally a timestep would be much larger than\
    \ what is needed to determine the characteristics of such time constants, mostly\
    \ because they are way beyond the bandwidth of the system and will play negligible\
    \ role in the dynamical evolution of the system. We noticed in Sect. 4.6.1 the\
    \ forward Euler method has some real problems and needs to take really small timesteps\
    \ in order to converge. This is very characteristic for this method. The other\
    \ three integration methods we are using are stable when used on stiff systems.\
    \ For the circuit we have used so far, we notice the following time constants:\n\
    \n$$\\tau_{c1} = \\frac{L}{R_1} = 10^{-11} [s], \\quad \\tau_{c2} = R_1 C = 1.2\
    \ \\cdot 10^{-10} [s], \\quad \\tau_{c3} = \\sqrt{LC} = 3.5 \\cdot 10^{-11} [s]$$\n\
    \nIt is then clear the smallest time scale is set by $\\tau_{c1}$. We thus need\
    \ a timestep <10 ps to make sure forward Euler converges which is confirmed by\
    \ our experiment in Sect. 4.6.1.\n\n## 4.6.6 Local Truncation Error\n\nThe fact\
    \ that we approximate the differential equation with a truncated difference scheme\
    \ causes LTEs, in which higher-order derivatives are discarded [25]. This error\
    \ needs to be estimated somehow, and there are many ways one can do this and exercise\
    \ some control of the timestep the simulator is taking. One way is to use a fixed\
    \ step size and run through the simulation and compare it to a simulation with\
    \ smaller step size and see to what degree the two simulations agree. This is\
    \ a cumbersome way to approach the problem and is rarely used practically. A better\
    \ way would be to estimate the LTE. We can do this by extrapolating the previous\
    \ few timesteps assuming the solution follows a parabola [25]. Let us call this\
    \ extrapolated voltage, $v_{n, pred}(t)$. The difference between the solved values\
    \ $v_n(t)$ and $v_{n, pred}(t)$ can be viewed as an estimate of the LTE. We can\
    \ then exercise a timestep control by forcing this estimated LTE to be less than\
    \ a certain criterion (see [25]) at every time point:\n\n$$v_n(t) - v_{npred}(t)\
    \ < \\alpha \\left( \\text{reltol } v_{nmax} + \\text{vabstol} \\right)$$\n\n\
    Here, $\\alpha$ is some user-controlled factor. $v_{nmax}$ can be chosen in different\
    \ ways as\n\n$$v_{nmax} = \\begin{cases} \\max \\forall t, \\forall v_n \\\\ \\\
    max \\forall t, v_n \\\\ |v_n(t)| \\end{cases}$$\n\nThe first criterion is often\
    \ called a global error criteria, the next a local error since it concerns the\
    \ max value over past time for node $n$. The last is often referred to as the\
    \ point local error criteria. If the LTE is greater than this criterion, one needs\
    \ to take a smaller timestep. Let us implement these criteria in our simulator\
    \ and take a look at the convergence rate. Depending on the situation, either\
    \ of these $v_{nmax}$ settings is relevant. Sometimes the point local criterion\
    \ is simply too tight and does not provide any benefits, and sometimes it is necessary.\
    \ We will look into these choices in more detail in Chap. 5. The $v_{n, pred}$\
    \ can be calculated as follows:\n\nLet us assume the solution follows a second-order\
    \ polynomial in time:\n\n$$v_{n,pred} = a + bt_n + ct_n^2$$\n\nWe know the previous\
    \ time values are $t_{n-1}, t_{n-2}, t_{n-3}$. It is convenient to shift the times\
    \ such that $\\tau = t - t_{n-3}$. We then find\n\n$$\\tau_0 = 0, \\tau_1 = t_{n-2}\
    \ - t_{n-3}, \\tau_2 = t_{n-1} - t_{n-3}, \\tau_3 = t_n - t_{n-3}$$\n\nand we\
    \ can write\n\n$$v_{n-1} = a + b\\tau_2 + c\\tau_2^2$$\n$$v_{n-2} = a + b\\tau_1\
    \ + c\\tau_1^2$$\n$$v_{n-3} = a$$\n\n$$\\begin{cases} v_{n-1} = a + b\\tau_2 +\
    \ c\\tau_2^2 \\\\ v_{n-2} = a + b\\tau_1 + c\\tau_1^2 \\\\ v_{n-3} = a \\end{cases}$$\n\
    \nWe can now clearly solve for the coefficients, $a, b, c$ and calculate the predicted\
    \ value as\n\n$$v_{n,pred} = a + b\\tau_3 + c\\tau_3^2$$\n\nVerify this and the\
    \ python implementation again.\n\n```python\nLTEConverged=True\nwhile LTEConverged:\n\
    \    for i in range(NumberOfNodes):\n        # Assume parabola v=a+b*t+c*t^2 v[t_solm1\n\
    (t=0)]=solm1[i] -> a=solm1[i], a+b*t_nm1+c*t_nm1^2=solold[i]\n        # a+b*tn+c*t_n^2=sol[i].\
    \ A simple 2x2 matrix\n        #\n        # |t_nm1    t_nm1^2| |b| =solold[i]-solm1[i]\n\
    \        # |t_n      t_n^2| |c| =sol[i]-solm1[i]\n        #\n        # This gives\n\
    \        #\n        # |b|=1/(t_nm1*t_n^2-t_nm1^2*t_n)| t_n^2    -t_nm1^2||solold[i]-solm1[i]|\n\
    \        # |c|=      | -t_n      t_nm1^2||sol[i]-solm1[i]|\n        # \n    PredMatrix[0][0]=(timeVector[iter-1]-timeVector[iter-2])\n\
    \    PredMatrix[0, 1]=(timeVector[iter-1]-timeVector[iter-2])*(timeVector[iter-1]-timeVector[iter-2])\n\
    \    PredMatrix[0, 1]=(SimTime-timeVector[iter-2])\n    PredMatrix[1]=(SimTime-timeVector[iter-2])*(SimTime-timeVector[iter-2])\n\
    \    Predrhs[0]=solold[i]-solm1[i]\n    Predrhs[1]=sol[i]-solm1[i]\n    Predsol=numpy.matmul(numpy.linalg.inv(PredMatrix),Predrhs)\n\
    \    vpred=solm1[i]+Predsol[0]*SimTime+Predsol[1]*SimTime*SimTime\n    if PointLocal:\n\
    \        for node in range(NumberOfNodes):\n            vkmax=max(abs(sol[node]),abs(sol[node]-SolutionCorrection[node]))\n\
    \            if abs(vpred-sol[i])>vkmax*reltol+vabstol:\n                LTEConverged=False\n\
    \    elif GlobalTruncation:\n        for node in range(NumberOfNodes):\n     \
    \       if abs(vpred-sol[i])>vkmax*reltol+vabstol:\n                LTEConverged=False\n\
    \    else:\n        print('Error: Unknown truncation error')\n        sys.exit()\n\
    ```\n\nWith this code, we can now proceed with simulations having an estimate\
    \ of the local truncation error. Let us look at the simple circuit we just investigated\
    \ with this code added to the forward Euler implementation we discussed in Sect.\
    \ 4.6.1 (see Code 4.10 Sect. 4.9.9). The result is shown in Table 4.1.\n\nWe notice\
    \ the LTE algorithm flags the result and stops the simulation if the timestep\
    \ is too large. In the exercises, the reader is encouraged to investigate this\
    \ type of algorithm further.\n\nInterestingly, at times the circuit convergence\
    \ can be really difficult to achieve, and the simulator can be forced to take\
    \ increasingly smaller and smaller timesteps. In fact, the step can get so small\
    \ the whole simulation progress crawls to a virtual halt. These situations are\
    \ almost always due to some modeling issue in some of the devices used in the\
    \ circuit. In some simulators, there is a trick where the minimum timestep can\
    \ be defined so that the LTE criterion is temporarily ignored and simulator can\
    \ bypass the tough spot. It is called LTEminstep or other similar name.\n\nTable\
    \ 4.1 The result of running a forward Euler implementation with an LTE algorithm\n\
    \n| Timestep | LTE OK |\n| :--- | :--- |\n| 1e-12 | Yes |\n| 1e-11 | No |\n| 1e-10\
    \ | No |\n\n## 4.6.7 Odd Cases: Things to Watch out for\n\n**Trapezoidal Ringing**\n\
    The “trapezoidal ringing” is a fairly known weakness of the trapezoidal method\
    \ [25]. It is quite characteristic, and one can easily recognize it in the simulator\
    \ output. It tends to show up around steps, which is why a simulator will often\
    \ shift to backward Euler around such events.\n\nSince we are now armed with a\
    \ range of integration methods, let us illustrate this ringing with a very simple\
    \ test case. Let us use a single capacitor to ground with a voltage source across\
    \ it, according to the following netlist:\n\n```\n*\nvdd vdd 0 0\nc1 vdd 0 1e-12\n\
    netlist 4p8\n```\n\nWe induce a step by having the initial voltage at the cap\
    \ be 1V, by taking advantage of the initial condition feature of the code we have\
    \ developed. Adding\n\n```\n.ic v(a)=1\n```\n\nto the netlist will accomplish\
    \ this, and the next timestep we force it to zero with the voltage source. We\
    \ use both trap and Gear2. We find the result in Fig. 4.32.\nFor these simulations,\
    \ we used 10 ps timestep and 10 steps in time.\n\n**Numerical Loss**\nThe Gear2\
    \ implementation does not suffer from this odd ringing featured with the trap\
    \ method. This can be a relief. However, it’s doing so because of artificial dissipation.\
    \ The method adds artificial resistors to the circuit, and any ringing will quickly\
    \ roll-off. We can illustrate this with the following classic example [25] shown\
    \ in Fig. 4.33.\n\nIt shows an LC tank with a shunting resistor. If one perturbs\
    \ it, by adding\n\n```\n.ic v(in)=1\n```\n\nto the netlist"
  mdcn: "## 4.6.5 刚性电路\n\n那些时间常数（如 $RC$）远小于时间步长的电路被称为刚性电路。在电气系统中，由于小电容的存在，出现许多高频极点是非常常见的。通常，时间步长会远大于确定此类时间常数特性所需的时间，主要是因为它们远超出系统的带宽，并且在系统的动态演化中作用可忽略不计。我们在第\
    \ 4.6.1 节中注意到，前向欧拉法存在一些实际问题，需要采用非常小的时间步长才能收敛。这是该方法的一个非常典型的特征。我们使用的另外三种积分方法在用于刚性系统时是稳定的。对于我们迄今为止使用的电路，我们注意到以下时间常数：\n\
    \n$$\\tau_{c1} = \\frac{L}{R_1} = 10^{-11} [s], \\quad \\tau_{c2} = R_1 C = 1.2\
    \ \\cdot 10^{-10} [s], \\quad \\tau_{c3} = \\sqrt{LC} = 3.5 \\cdot 10^{-11} [s]$$\n\
    \n因此，最小的时间尺度由 $\\tau_{c1}$ 决定。因此，我们需要一个 <10 ps 的时间步长来确保前向欧拉法收敛，这在我们第 4.6.1 节的实验中得到了证实。\n\
    \n## 4.6.6 局部截断误差\n\n我们用截断差分格式近似微分方程的事实会导致局部截断误差（LTE），其中高阶导数被舍弃 [25]。这种误差需要以某种方式估计，并且有许多方法可以做到这一点，并对仿真器采用的时间步长进行某种控制。一种方法是使用固定步长运行仿真，并将其与使用更小步长的仿真进行比较，看看两者在多大程度上一致。这是一种处理问题的繁琐方法，实际中很少使用。更好的方法是估计\
    \ LTE。我们可以通过外推前几个时间步长来做到这一点，假设解遵循抛物线 [25]。让我们称这个外推电压为 $v_{n, pred}(t)$。求解值 $v_n(t)$\
    \ 和 $v_{n, pred}(t)$ 之间的差异可以被视为 LTE 的估计值。然后，我们可以通过强制此估计的 LTE 在每个时间点小于某个标准（参见 [25]）来实施时间步长控制：\n\
    \n$$v_n(t) - v_{npred}(t) < \\alpha \\left( \\text{reltol } v_{nmax} + \\text{vabstol}\
    \ \\right)$$\n\n这里，$\\alpha$ 是某个用户控制的因子。$v_{nmax}$ 可以选择不同的方式，例如：\n\n$$v_{nmax}\
    \ = \\begin{cases} \\max \\forall t, \\forall v_n \\\\ \\max \\forall t, v_n \\\
    \\ |v_n(t)| \\end{cases}$$\n\n第一个标准通常称为全局误差标准，下一个称为局部误差，因为它涉及节点 $n$ 过去时间的最大值。最后一个通常称为点局部误差标准。如果\
    \ LTE 大于此标准，则需要采用更小的时间步长。让我们在仿真器中实现这些标准，并看看收敛速度。根据情况，这些 $v_{nmax}$ 设置中的任何一个都是相关的。有时点局部标准过于严格，没有任何好处，而有时又是必要的。我们将在第\
    \ 5 章更详细地研究这些选择。$v_{n, pred}$ 可以如下计算：\n\n让我们假设解遵循时间的二阶多项式：\n\n$$v_{n,pred} = a\
    \ + bt_n + ct_n^2$$\n\n我们知道之前的时间值是 $t_{n-1}, t_{n-2}, t_{n-3}$。将时间平移使得 $\\tau\
    \ = t - t_{n-3}$ 是方便的。然后我们得到\n\n$$\\tau_0 = 0, \\tau_1 = t_{n-2} - t_{n-3}, \\\
    tau_2 = t_{n-1} - t_{n-3}, \\tau_3 = t_n - t_{n-3}$$\n\n我们可以写成\n\n$$v_{n-1} =\
