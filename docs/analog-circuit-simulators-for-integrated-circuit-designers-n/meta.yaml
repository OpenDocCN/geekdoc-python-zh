    # 4.6.6 Local Truncation Error


    The fact that we approximate the differential equation with a truncated difference
    scheme causes LTEs, in which higher-order derivatives are discarded [25]. This
    error needs to be estimated somehow, and there are many ways one can do this and
    exercise some control of the timestep the simulator is taking. One way is to use
    a fixed step size and run through the simulation and compare it to a simulation
    with smaller step size and see to what degree the two simulations agree. This
    is a cumbersome way to approach the problem and is rarely used practically. A
    better way would be to estimate the LTE. We can do this by extrapolating the previous
    few timesteps assuming the solution follows a parabola [25]. Let us call this
    extrapolated voltage, $v_{n, pred}(t)$. The difference between the solved values
    $v_n(t)$ and $v_{n, pred}(t)$ can be viewed as an estimate of the LTE. We can
    then exercise a timestep control by forcing this estimated LTE to be less than
    a certain criterion (see [25]) at every time point:


    $$v_n(t) - v_{npred}(t) < \alpha \left( \text{reltol } v_{nmax} + \text{vabstol}
    \right)$$


    Here, $\alpha$ is some user-controlled factor. $v_{nmax}$ can be chosen in different
    ways as


    $$v_{nmax} = \begin{cases} \max \forall t, \forall v_n \ \max \forall t, v_n \
    |v_n(t)| \end{cases}$$


    The first criterion is often called a global error criteria, the next a local
    error since it concerns the max value over past time for node $n$. The last is
    often referred to as the point local error criteria. If the LTE is greater than
    this criterion, one needs to take a smaller timestep. Let us implement these criteria
    in our simulator and take a look at the convergence rate. Depending on the situation,
    either of these $v_{nmax}$ settings is relevant. Sometimes the point local criterion
    is simply too tight and does not provide any benefits, and sometimes it is necessary.
    We will look into these choices in more detail in Chap. 5. The $v_{n, pred}$ can
    be calculated as follows:'
