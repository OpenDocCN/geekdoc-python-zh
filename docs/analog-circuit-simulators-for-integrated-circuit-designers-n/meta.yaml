    \n图4.11 具有线性晶体管的两级放大器的交流仿真\n\n### 4.4.1 噪声分析\n\n噪声分析传统上是一种类似交流的分析，因为噪声电压通常很小（例如在振荡器中存在一些例外）。用户需要定义输出节点，仿真器在器件所在位置添加噪声源，并仿真每个组件到输出的增益作为频率的函数。各种器件的噪声模型复杂程度不同，取决于器件的复杂性。例如，电阻的噪声通常建模为与电阻并联的电流源，其值为：\n\
