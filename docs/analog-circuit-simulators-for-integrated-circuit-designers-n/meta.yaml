    ## 5.5.2 谐波平衡法


    谐波平衡是一种通过在频域而非时域中工作来寻找电路稳态的方法。想象我们有一个由特定频率信号驱动的电路。如果电路是线性的，那么所有节点都将包含该频率和直流分量。这仅仅是一个关于相位和幅值的问题。通常的拓扑约束，如基尔霍夫电流定律，也可以应用于频域。如果电路是非线性的，根据基本理论，我们知道基频音调的谐波也会出现。这就是谐波平衡法的基础，各种算法背后的思想是找到一组谐波（包括幅值和相位），它们定义了所有器件电流和节点电压。我们将在此不涉及太多形式化内容，仅简要介绍其基本原理，然后像之前一样，继续进行Python代码的实际实现。


    在频域中工作时，我们将傅里叶变换定义为


    $$H(f) = \frac{1}{T} \int_{-\infty}^{\infty} h(t) e^{-j\omega t} dt \quad (5.30)$$


    其中 $\omega = 2\pi f$，$T$ 是我们定义积分的周期。此外，我们将同时处理正频率和负频率。对于实值函数 $h(t)$，以下性质很容易证明


    $$H(f) = H^*(-f) \quad (5.31)$$


    其中 $*$ 表示复共轭。这样处理计算要容易得多。对于仿真器，使用离散傅里叶变换（DFT）


    $$H(f) = \int_{0}^{T} h(t) e^{\frac{-i2\pi n t}{T}} dt \delta\left(f - \frac{n}{T}\right),
    \quad 0 < n < \frac{T}{2T_s}$$


    其中 $T$ 是信号周期，$T_s$ 是采样周期。一些仿真器可以通过一个称为采样比或类似名称的参数来操纵采样时间步长。可以利用这一点对信号进行时域过采样，以可能提高精度。


    我们将在第7章展示谐波平衡方程的更正式推导。这里我们仅陈述网络方程 $f(v_k) = 0$ 可以进行傅里叶变换为


    $$F(V) = I(V) + \Omega Q(V) + U$$


    这里的大写 $V$ 现在代表每个节点电压的傅里叶系数。


    我们定义雅可比矩阵：


    $$J_{ij} = \frac{\partial F_i}{\partial V_j}$$


    我们得到


    $$J(V) = \frac{\partial I(V)}{\partial V} + \Omega \frac{\partial Q(V)}{\partial
    V}$$


    应用牛顿-拉夫逊算法，我们得到迭代公式：


    $$V^{j+1} = V^{(j)} - J^{-1}\left(V^{(j)}\right)F\left(V^{(j)}\right)$$


    矩阵 $J$ 被称为谐波雅可比矩阵或转换矩阵。它告诉你节点 $j$ 处的某个傅里叶分量如何与节点 $i$ 处的另一个傅里叶分量耦合。注意，这个矩阵实际上是一个矩阵中的矩阵。每个电路节点包含一组傅里叶向量分量，这些分量与其他节点的傅里叶分量耦合。因此，现在这个过程与我们在时域中遵循的过程非常相似。我们建立矩阵
    $F$ 和 $J$ 并进行迭代。由 $U$ 设定的边界条件具有固定的分量，我们可以轻松地迭代得到正确的解。我们确实有更多的变量；每个节点有k个傅里叶分量，但一旦迭代收敛，我们就完成了。在时域中，我们只需继续，因此我们在谐波平衡中付出的代价是矩阵大得多，但我们只需求解一次。


    现在让我们看一些来自我们器件模型的例子。我们将从晶体管模型1开始，因为它相当简单，并说明建立基本矩阵 $F,J$ 时的过程。我们发现


    $$i(t) = K\left(v_g(t) - v_s(t)\right)^2$$


    为了在频域中计算雅可比矩阵，我们需要先进行傅里叶变换：


    $$i(t) = \sum_{k=1-K}^{K-1} I_k e^{j2\pi k \frac{t}{T}}$$


    $$I_k = \frac{1}{T} \sum_{n=0}^{N-1} i(n\tau) e^{-j2\pi k \frac{n\tau}{T}}$$


    我们现在看到


    $$\frac{\partial I_k}{\partial V_l^g} = \frac{1}{T} \sum_{n=0}^{N} \frac{\partial
    i(t)}{\partial V_l^g} e^{-j2\pi k \frac{n\tau}{T}} = \frac{1}{T} \sum_{n=0}^{N}
    \frac{\partial i(t)}{\partial v_g} \frac{\partial v_g}{\partial V_l^g} e^{-j2\pi
    k \frac{n\tau}{T}} \quad (5.39)$$


    我们有


    $$v_g(t) = \sum_{k=1-K}^{K-1} V_k^g e^{j2\pi k \frac{t}{T}} \rightarrow \frac{\partial
    v_g}{\partial V_l^g} = e^{j2\pi l \frac{t}{T}} \quad (5.40)$$


    同样对于 $v_s$


    $$v_s(t) = \sum_{k=1-K}^{K-1} V_k^s e^{j2\pi k \frac{t}{T}} \rightarrow \frac{\partial
    v_s}{\partial V_l^s} = e^{j2\pi l \frac{t}{T}} \quad (5.41)$$


    导数项很直接


    $$\frac{\partial i(t)}{\partial v_g} = 2K(v_g(t) - v_s(t))$$

    $$\frac{\partial i(t)}{\partial v_s} = -2K(v_g(t) - v_s(t)) \quad (5.42)$$


    将所有这些放在一起，我们得到


    $$\frac{\partial I_k}{\partial V_l^g} = \frac{1}{T} \sum_{n=0}^{N} \frac{\partial
    i(n\tau)}{\partial v_g} \frac{\partial v_g}{\partial V_l^g} e^{-j2\pi k \frac{n\tau}{T}}
    = \frac{1}{T} \sum_{n=0}^{N} \frac{\partial i(n\tau)}{\partial v_g} e^{j2\pi l
    \frac{n\tau}{T}} e^{-j2\pi k \frac{n\tau}{T}} =$$

    $$= \frac{1}{T} \sum_{n=0}^{N} \frac{\partial i(n\tau)}{\partial v_g} e^{j2\pi(l-k)\frac{n\tau}{T}}$$

    $$= \sum_{n=0}^{N} 2K(v_g(n\tau) - v_s(n\tau)) e^{j2\pi(l-k)\frac{n\tau}{T}} \quad
    (5.43)$$


    类似地对于另一个电压，


    $$\frac{\partial I_k}{\partial V_l^s} = J_{l-k} = \frac{1}{T} \sum_{n=0}^{N} \frac{\partial
    i(n\tau)}{\partial v_s} e^{j2\pi(l-k)\frac{n\tau}{T}} \quad (5.44)$$


    我们现在看到，在这两种情况下，并且不难一般性地证明，雅可比矩阵看起来像是某个函数时间导数的傅里叶变换。还要注意，重要的是索引之间的差值 $l - k$。以矩阵形式，我们有


    $$J = \begin{pmatrix} \frac{\partial I_{1-K}}{\partial V_{1-K}^s} & \cdots & \frac{\partial
    I_{1-K}}{\partial V_{K-1}^s} \\ \vdots & \ddots & \vdots \\ \frac{\partial I_{K-1}}{\partial
    V_{1-K}^s} & \cdots & \frac{\partial I_{K-1}}{\partial V_{K-1}^s} \end{pmatrix}
    \quad (5.45)$$


    对于 $K = 3$ 的情况，我们有


    $$\begin{pmatrix} \frac{\partial I_{-2}}{\partial V_{-2}^s} & \frac{\partial I_{-2}}{\partial
    V_{-1}^s} & \frac{\partial I_{-2}}{\partial V_{0}^s} & \frac{\partial I_{-2}}{\partial
    V_{1}^s} & \frac{\partial I_{-2}}{\partial V_{2}^s} \\ \frac{\partial I_{-1}}{\partial
    V_{-2}^s} & \frac{\partial I_{-1}}{\partial V_{-1}^s} & \frac{\partial I_{-1}}{\partial
    V_{0}^s} & \frac{\partial I_{-1}}{\partial V_{1}^s} & \frac{\partial I_{-1}}{\partial
    V_{2}^s} \\ \frac{\partial I_{0}}{\partial V_{-2}^s} & \frac{\partial I_{0}}{\partial
    V_{-1}^s} & \frac{\partial I_{0}}{\partial V_{0}^s} & \frac{\partial I_{0}}{\partial
    V_{1}^s} & \frac{\partial I_{0}}{\partial V_{2}^s} \\ \frac{\partial I_{1}}{\partial
    V_{-2}^s} & \frac{\partial I_{1}}{\partial V_{-1}^s} & \frac{\partial I_{1}}{\partial
    V_{0}^s} & \frac{\partial I_{1}}{\partial V_{1}^s} & \frac{\partial I_{1}}{\partial
    V_{2}^s} \\ \frac{\partial I_{2}}{\partial V_{-2}^s} & \frac{\partial I_{2}}{\partial
    V_{-1}^s} & \frac{\partial I_{2}}{\partial V_{0}^s} & \frac{\partial I_{2}}{\partial
    V_{1}^s} & \frac{\partial I_{2}}{\partial V_{2}^s} \end{pmatrix}$$


    这些项仅仅是傅里叶变换的分量，一旦我们有了它，我们就有了雅可比矩阵。让我们快速再看一下积分（或者在我们离散傅里叶变换的情况下是离散求和）：


    $$\frac{1}{T} \sum_{n=0}^{N} \frac{\partial i(n\tau)}{\partial v_s} e^{j2\pi(l-k)\frac{n\tau}{T}}
    \quad (5.46)$$


    这个求和是两个函数 $\frac{\partial i(n\tau)}{\partial v_s}, e^{j2\pi(l-k)\frac{n\tau}{T}}$
    乘积的求和。除非两个函数的频率相同，否则这个求和总是为零，因为这些函数只能由基频的谐波组成，而我们是在基频谐波周期上积分。特别是在 $\frac{\partial
    i(n\tau)}{\partial v_s} = C$（一个常数）的情况下，唯一非零的分量是 $l = k$ 的那个，矩阵简化为


    $$J = \begin{pmatrix} J_0 & \cdots & 0 \\ \vdots & \ddots & \vdots \\ 0 & \cdots
    & J_0 \end{pmatrix} \quad (5.47)$$'
