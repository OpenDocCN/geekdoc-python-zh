    points but with much less convergence problems. In practice this is often the
    case also for larger circuitry; the ptran method and its cousin dampened ptran,
    or dptran, have much better convergence properties. One should not draw too far-reaching
    conclusions from the relatively simple examples here, but the results we have
    discussed do resemble what can happen in day-to-day engineering development situations.'
- md: "## 5.4.4 Nonlinear Capacitors\n\nWe described how one can handle nonlinear\
    \ active devices in the previous section. Here we will go into nonlinear capacitors.\
    \ Such devices occur naturally as we saw in Chap. 2 where the MOSFET gate capacitance\
    \ varied in a strongly nonlinear fashion with gate voltage, and it is therefore\
    \ beneficial to show how one can deal with such devices. The behavior of capacitors\
    \ as we saw in Chap. 2 and in Chap. 4 is governed by a differential equation,\
    \ and for numerical purposes such equations need to be approximated by difference\
    \ equations with the resulting accuracy difficulties. If we now add nonlinear\
    \ response to the capacitance itself as a function of the voltage across it, naturally\
    \ the problems become worse. We will give a brief initial motivation why this\
    \ can be a problem and show various ways simulators often deal with it.\n\n###\
    \ Nonlinear Capacitors and Charge Conservation\n\nThere is a simple argument why\
    \ this causes problems, and it can be found described in more details in [4].\
    \ It goes like this:\n\nConnect a linear 1 pF capacitor to a voltage source. Assume\
    \ the voltage source change from 0 to 1 mV in one timestep and then back to zero\
    \ on the next. Let both timesteps be 1 ps. The current computed on the first step\
    \ is $i = CdV/dt = 10^{-12}10^{-3}/10^{-12} = 1mA$, and the charge is $Q = CU\
    \ = 1fC$. On the next timestep, the charge is the opposite, and so for a linear\
    \ capacitor, there is no charge conservation problem.\n\nConsider then a nonlinear\
    \ capacitor that has a capacitance of 1 pF at 0 V and 1.1 pF at 1 mV. Then as\
    \ before, the charge for the initial timestep is 1fC, but for the next timestep,\
    \ it is 1.1fC. Thus there is a net charge of $-0.1fC$ for the timestep sequence.\
    \ The solution here could be to take much smaller timesteps to reduce the accumulated\
    \ error. Interestingly enough there is no way to completely remove the error unless\
    \ all derivatives are known exactly, but the proof goes outside the scope of this\
    \ book [4].\n\nHow can one deal with such complications? Let us examine the example\
    \ by using a charge-based model instead where, for example, the charge $q(v) =\
    \ Cv + Dv^2$. For the capacitor current, we now have $i(t) = (q(t1) - q(t0))/\\\
    Delta t$. We find\n\n$i(t1) = 1.05mA$\n\n$\\Delta q(t1) = 1.05fC$\n\n$i(t2) =\
    \ -1.05mA$\n\n$\\Delta q(t2) = -1.05fC$\n\nIt is fairly obvious it will conserve\
    \ charge since the algebraic expression for charge is not changing. The point\
    \ here is that since charge is computed directly, it will conserve charge.\n\n\
    > Verify how your favorite simulator conserves entities. Is it a charge conserved\
    \ simulator or a voltage conserved one for the nonlinear capacitor case.\n\nTo\
    \ put this more formally, we need to employ this charge formulation in the Newton-Raphson\
    \ formulation. We know\n\n$i(v) = \\frac{\\partial q}{\\partial t} \\rightarrow\
    \ i_{n+1} \\approx \\frac{q(u_{n+1}) - q(u_n)}{\\Delta t} = g(u_{n+1})$\n\nFirst\
    \ we need to know how the charge on the capacitor depends on voltage, $q(u) \\\
    approx C(u)u$. This we enter into the STA_nonlinear function like a subroutine\
    \ call:\n\n```\ndef charge(V1, V2, deltaT)\n    V=V1-V2\n    C=some function of\
    \ V\n    return C*V\n```\n\nNext we need to linearize the response and add to\
    \ the Jacobian much like for the nonlinear transistor. We have by definition\n\
    \n$$\\frac{\\partial q}{\\partial u} = C(u) \\rightarrow \\frac{\\partial g}{\\\
    partial u} = \\frac{C(u)}{\\Delta t}$$ (5.27)\n\nWe then find that the current\
    \ $i$ and voltage $v$ for the next Newton step $k+1$ are\n\n$$i = g(u_{n+1}) \\\
    approx g(u_{n+1}^k) + \\frac{\\partial g}{\\partial u}(u - u_n) = \\frac{q(u_{n+1}^k)\
    \ - q(u_n)}{\\Delta t} + \\frac{C(u_{n+1}^k)}{\\Delta t}(u - u_n)$$\n\nin the\
    \ backward Euler formulation. We see that the voltages known at the previous timestep\
    \ should be kept at the rhs of the STA system, and we have for the matrix itself\
    \ the rest of the terms.\n\nA python implementation will look like\n\n```\ni=(q(sol[])-q(solold[]))/deltaT\n\
    ```\n\nfor the STA_nonlinear term and\n\n```\nSTA_rhs=(q[sol]-q[solold])/deltaT-C(u[sol])solold[]/deltaT\n\
    Jacobian[][]=C(u[sol])/deltaT\n```\n\nfor the Jacobian calculation.\n\nWe leave\
    \ it to the reader to implement a Python version of this algorithm and verify\
    \ charge conservation in the exercises.\n\n## 5.4.5 Break Points\n\nImagine you\
    \ have a circuit where the stimulus is some kind of step function or piece-wise\
    \ linear function of time. Here the stimulus can be either a voltage or a current.\
    \ At certain points in time, this stimulus will change, and these points need\
    \ to be included in the simulation (Fig. 5.35). For example,\n\nVpwl nodea nodeb\
    \ {0ps, 0V} {100ps,1V} {120ps,1V} {150ps,0}\n\nThe time-voltage coordinate points\
    \ correspond to specific times where the voltage has a particular value. If two\
    \ consecutive points have different voltages, the intermediate voltage will be\
    \ a linear ramp. The time points 0 ps, 100 ps, 120 ps, and 150 ps are referred\
    \ to as break points. It simply means the simulator is forced to include these\
    \ time points as it goes along solving the circuit. The netlist is searched for\
    \ such stimulus and the break points included in the set of time points. In a\
    \ real situation, the simulator examines if a particular timestep overreaches\
    \ a break point. If it is, the timestep is adjusted to appear right at the break\
    \ point. In our simple simulator, the code could look like\n\n```\nIf time+deltaT\
    \ > NextBreakPoint\n    deltaT=NextBreakPoint-time\n    BreakPointUsed\nIf timestepAccepted\
    \ and BreakPointUsed\n    NextBreakPoint=FindNextBreakPoint[NextBreakPoint]\n\
    ```\n\nWe leave it to the reader to implement this function in the code examples.\
    \ Since the simulator knows when “things” happen in this case, it can take preemptive\
    \ measures. Often simulators use backward Euler around these timesteps to avoid\
    \ trapezoidal ringing. We noticed in Sect. 4.6 that the Euler method has a certain\
    \ artificial “resistor” that dissipates energy and dampens oscillations. Therefore\
    \ when such schemes are employed, there can be certain initial edge rate degradations.\n\
    \n**Fig. 5.35** Picture shows the break points for a piece-wise linear function\
    \ (pwl)\n\n## 5.4.6 Transient Accuracy: Summary\n\nThe accuracy of a transient\
    \ simulation is set by a number of different criteria:\n\n- The circuit itself\
    \ will amplify errors or the errors will dissipate as a function of time.\n- Reltol,\
    \ the relative tolerance parameter.\n- $v_{nmax}$ how is it determined, globally\
    \ or locally.\n\nThe actual simulator used should have plenty of information on\
    \ how the accuracy is decided, and the user should spend time making sure to understand\
    \ the simulator’s operation.\n\nFinally, the traditional sure-fire test is to\
    \ run the simulation again with the appropriate tolerances tightened and compare\
    \ the end result. The change should be less than the tolerated error.\n\n## 5.5\
    \ Periodic Steady-State Solvers\n\nThe situation we have looked at so far involves\
    \ descriptions and algorithms that were developed very early on in the SPICE development\
    \ and are perhaps the most commonly used in engineering groups today. In the early\
    \ 1970s, people started to consider the situation where the circuit was in a steady\
    \ state where all the initial transients had died off. How can such a situation\
    \ be simulated? If one thinks of a driven circuit and we have some nonlinear elements,\
    \ these elements will give rise to harmonics of the fundamental tone, and in a\
    \ steady state, all currents and voltages will only contain harmonics of this\
    \ fundamental tone. One can then formulate the unknowns as unknown phases and\
    \ magnitudes of all such harmonics. In fact the equations can be stated on a harmonic\
    \ basis. This is in a nut shell how the harmonic balance method operates. We will\
    \ look at a real example of this in Sect. 5.5.2. This method was studied by [3]\
    \ among many others. It turns out that for some situations, a ridiculous number\
    \ of harmonics need to be incorporated, particularly if one uses ideal voltage\
    \ sources with fast rise-fall times. The known Gibbs phenomenon will creep up,\
    \ and the inverse Fourier transform of the solution (in other words time domain)\
    \ will look odd. Instead, what is called the shooting method can be used. Here\
    \ an initial guess at the rate of change for each node is attempted, the time\
    \ evolution is followed for one period, and then the algorithm checks if the end\
    \ condition is the same as the guess of the initial condition. If so we have found\
    \ a periodic solution; if not try again. We will look at this method in Sect.\
    \ 5.5.1. As the wary reader no doubt recognizes, the shooting method looks cleaner\
    \ but is having a much harder time converging in particular for large circuits.\
    \ We will take a look at some of these interesting details.\n\nAs we did before,\
    \ we will discuss a basic implementation in terms of Python codes."
  mdcn: "## 5.4.4 非线性电容器\n\n我们在上一节中描述了如何处理非线性有源器件。本节将深入探讨非线性电容器。正如我们在第2章所见，这类器件自然存在，例如MOSFET栅极电容随栅极电压呈强非线性变化，因此有必要展示如何处理此类器件。正如我们在第2章和第4章所见，电容器的行为受微分方程支配，出于数值计算目的，这些方程需要用差分方程近似，从而带来精度问题。如果现在再加上电容本身作为其两端电压函数的非线性响应，问题自然会变得更糟。我们将简要说明为何这会成为问题，并展示仿真器常用的多种处理方法。\n\
    \n### 非线性电容器与电荷守恒\n\n有一个简单的论点可以解释为何这会导致问题，更详细的描述可参见文献[4]。其论证如下：\n\n将一个线性1 pF电容器连接到电压源。假设电压源在一个时间步长内从0变为1\
    \ mV，然后在下一个时间步长内恢复为零。设两个时间步长均为1 ps。第一步计算的电流为 $i = CdV/dt = 10^{-12}10^{-3}/10^{-12}\
    \ = 1mA$，电荷为 $Q = CU = 1fC$。在下一个时间步长，电荷相反，因此对于线性电容器，不存在电荷守恒问题。\n\n考虑一个非线性电容器，其在0\
    \ V时电容为1 pF，在1 mV时为1.1 pF。那么如前所述，初始时间步长的电荷为1fC，但下一个时间步长的电荷为1.1fC。因此，对于该时间步长序列，存在\
    \ $-0.1fC$ 的净电荷。这里的解决方案可能是采用更小的时间步长以减少累积误差。有趣的是，除非所有导数都精确已知，否则无法完全消除误差，但其证明超出了本书范围[4]。\n\
    \n如何处理此类复杂情况？让我们通过使用基于电荷的模型来考察该示例，例如电荷 $q(v) = Cv + Dv^2$。对于电容器电流，我们现在有 $i(t)\
    \ = (q(t1) - q(t0))/\\Delta t$。我们发现\n\n$i(t1) = 1.05mA$\n\n$\\Delta q(t1) = 1.05fC$\n\
    \n$i(t2) = -1.05mA$\n\n$\\Delta q(t2) = -1.05fC$\n\n很明显它将守恒电荷，因为电荷的代数表达式没有改变。这里的关键在于，由于电荷是直接计算的，它将守恒电荷。\n\
    \n> 验证您喜爱的仿真器如何守恒实体。对于非线性电容器情况，它是电荷守恒仿真器还是电压守恒仿真器。\n\n更正式地说，我们需要在牛顿-拉夫逊公式中采用这种电荷公式。我们知道\n\
    \n$i(v) = \\frac{\\partial q}{\\partial t} \\rightarrow i_{n+1} \\approx \\frac{q(u_{n+1})\
    \ - q(u_n)}{\\Delta t} = g(u_{n+1})$\n\n首先，我们需要知道电容器上的电荷如何依赖于电压，$q(u) \\approx\
    \ C(u)u$。我们将其输入到STA_nonlinear函数中，就像子程序调用一样：\n\n```\ndef charge(V1, V2, deltaT)\n\
    \    V=V1-V2\n    C=some function of V\n    return C*V\n```\n\n接下来，我们需要线性化响应并添加到雅可比矩阵中，类似于非线性晶体管。根据定义，我们有\n\
    \n$$\\frac{\\partial q}{\\partial u} = C(u) \\rightarrow \\frac{\\partial g}{\\\
    partial u} = \\frac{C(u)}{\\Delta t}$$ (5.27)\n\n然后我们发现，对于下一个牛顿步 $k+1$，电流 $i$\
    \ 和电压 $v$ 为\n\n$$i = g(u_{n+1}) \\approx g(u_{n+1}^k) + \\frac{\\partial g}{\\\
    partial u}(u - u_n) = \\frac{q(u_{n+1}^k) - q(u_n)}{\\Delta t} + \\frac{C(u_{n+1}^k)}{\\\
    Delta t}(u - u_n)$$\n\n在向后欧拉公式中。我们看到，前一个时间步长已知的电压应保留在STA系统的右侧，而矩阵本身则包含其余项。\n\n\
    Python实现将如下所示\n\n```\ni=(q(sol[])-q(solold[]))/deltaT\n```\n\n用于STA_nonlinear项，以及\n\
    \n```\nSTA_rhs=(q[sol]-q[solold])/deltaT-C(u[sol])solold[]/deltaT\nJacobian[][]=C(u[sol])/deltaT\n\
    ```\n\n用于雅可比矩阵计算。\n\n我们将此算法的Python版本实现以及电荷守恒验证留给读者在练习中完成。\n\n## 5.4.5 断点\n\n想象你有一个电路，其激励是某种阶跃函数或分段线性时间函数。这里的激励可以是电压或电流。在特定时间点，此激励会发生变化，这些点需要包含在仿真中（图5.35）。例如，\n\
    \nVpwl nodea nodeb {0ps, 0V} {100ps,1V} {120ps,1V} {150ps,0}\n\n时间-电压坐标点对应于电压具有特定值的特定时间。如果两个连续点具有不同的电压，中间电压将是线性斜坡。时间点0\
    \ ps、100 ps、120 ps和150 ps被称为断点。它仅仅意味着仿真器在求解电路时被迫包含这些时间点。网表被搜索以查找此类激励，并将断点包含在时间点集合中。在实际情况下，仿真器会检查特定时间步长是否超过断点。如果是，则调整时间步长以恰好出现在断点处。在我们的简单仿真器中，代码可能如下所示\n\
    \n```\nIf time+deltaT > NextBreakPoint\n    deltaT=NextBreakPoint-time\n    BreakPointUsed\n\
    If timestepAccepted and BreakPointUsed\n    NextBreakPoint=FindNextBreakPoint[NextBreakPoint]\n\
    ```\n\n我们将此函数在代码示例中的实现留给读者完成。由于仿真器在此情况下知道“事情”何时发生，它可以采取预防措施。通常仿真器在这些时间步长附近使用向后欧拉法以避免梯形振荡。我们在第4.6节中注意到，欧拉法具有某种人为的“电阻”，它耗散能量并阻尼振荡。因此，当采用此类方案时，可能会出现某些初始边沿速率退化。\n\
    \n**图5.35** 图片显示了分段线性函数（pwl）的断点\n\n## 5.4.6 瞬态精度：总结\n\n瞬态仿真的精度由多个不同标准设定：\n\n-\
    \ 电路本身会放大误差，或者误差会随时间消散。\n- Reltol，相对容差参数。\n- $v_{nmax}$ 如何确定，全局还是局部。\n\n实际使用的仿真器应提供大量关于精度如何决定的信息，用户应花时间确保理解仿真器的操作。\n\
    \n最后，传统的可靠测试是使用收紧的适当容差再次运行仿真，并比较最终结果。变化应小于容许误差。\n\n## 5.5 周期稳态求解器\n\n我们目前所研究的情况涉及在SPICE开发早期就已开发的描述和算法，这些算法可能是当今工程团队中最常用的。在1970年代初，人们开始考虑电路处于稳态的情况，其中所有初始瞬态都已消失。如何仿真这种情况？如果考虑一个受驱动的电路，我们有一些非线性元件，这些元件将产生基波的谐波，在稳态下，所有电流和电压将仅包含此基波的谐波。然后可以将未知数表述为所有此类谐波的未知相位和幅度。实际上，方程可以在谐波基础上陈述。这就是谐波平衡法的工作原理概要。我们将在第5.5.2节中查看一个实际示例。该方法由[3]等人研究过。事实证明，对于某些情况，需要包含数量惊人的谐波，特别是如果使用具有快速上升-下降时间的理想电压源。已知的吉布斯现象会出现，解的逆傅里叶变换（换句话说，时域）看起来会很奇怪。相反，可以使用所谓的打靶法。这里尝试对每个节点的变化率进行初始猜测，跟踪一个周期的时间演化，然后算法检查结束条件是否与初始条件的猜测相同。如果是这样，我们就找到了周期解；如果不是，再试一次。我们将在第5.5.1节中研究此方法。正如谨慎的读者无疑认识到的，打靶法看起来更简洁，但在收敛方面困难得多，特别是对于大型电路。我们将探讨一些有趣的细节。\n\
    \n正如我们之前所做的，我们将用Python代码讨论一个基本实现。"
