    \n$$\\begin{pmatrix} & v_a & v_b \\\\ v_a & & 1 \\\\ v_b & & -1 \\\\ i_C & -\\\
    frac{2C}{\\Delta t} & \\frac{2C}{\\Delta t} & 1 \\end{pmatrix} = \\begin{pmatrix}\
    \ \\ \\ \\ -2C \\frac{v_a(t_n) - v_b(t_n)}{\\Delta t} - i(t_n) \\end{pmatrix}\
    \ \\quad (4.59)$$\n\nwhere all the known entities, evaluated at the previous timestep,\
    \ can be found on the rhs. Also the voltage across the capacitor has been spelled\
    \ out, $u(t) = v_a(t) - v_b(t)$.\n\nA pseudocode can look like\n\n```\nif DeviceType\
