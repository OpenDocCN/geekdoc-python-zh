    ### 7.2.1.4 Timestep Control Algorithms


    The method used to control the timestep when using variable timesteps is obvious
    of some import. Basically one can surmise that if a timestep was successful, one
    can increase the next timestep. The purpose would be to reach the final goal in
    as short a physical time as possible within the required accuracy. How much should
    one increase the step? If a timestep was not successful in reaching the desired
    accuracy, how much should one decrease it? The actual choice in professional circuit
    simulators is not well known, but the literature on numerical solution of differential
    equations has quite a few suggestions [3, 4]. The basic idea is to measure somehow
    how close to failing the error requirements a given timestep was, and if you are
    close to failing, you take somewhat smaller timesteps. If you are far away from
    failing, you take longer timesteps. If you are in the middle, you do not change
    the timestep. The problem then becomes finding out how far we are from failing
    the timestep. Assume we have such a norm, let us call it $\rho$. We have then


    $$\text{if } \begin{cases} \rho \geq 0.9, \text{decrease timestep by } x\% \\
    0.2 < \rho < 0.9, \text{leave timestep unchanged} \\ \rho \leq 0.2 \text{ increase
    time step by } y\% \end{cases}$$


    How can we find such a norm, and what are the appropriate changes to the timestep
    when required? The timestep itself is most governed by the LTE requirement. We
    can then define a norm as


    $$\rho = \frac{\left|v_n(t) - v_{npred}(t)\right|}{\left|\alpha \left(\text{reltol
    } v_{nmax} + \text{vabstol}\right)\right|}$$


    Naturally one can tier the timestep change more if desired and the reader is encouraged
    to do so. In our implementation, we decrease the timestep by 10% when needed and
    increase it by 0.1%. The reader is strongly encouraged to explore more.


    ## 7.3 Newton-Raphson Theory


    We will in this section go through more of the details of the derivation of the
    Newton-Raphson algorithm and point out some of the potential difficulties one
    can run into when deploying it. As we already discussed in Chap. 2, the Newton-Raphson
    is a true workhorse in solving nonlinear equations. It is employed almost everywhere
    such solvers are needed and performs generally really well, provided the function
    it tracks is reasonably smooth. We will discuss briefly such shortcomings in this
    section.


    ### 7.3.1 Basic Derivation for Arbitrary Dimensions


    Let us look at the following n-dimensional equation


    $$f(x) = 0, f = f_n, n > 1 \quad (7.45)$$


    where $f$ is a vector with components $f_n$ and we need to solve for $x$, having
    components $x_n$. Let us do a Taylor expansion around a point $x_0$ which does
    not solve the equation but is close. We find


    $$f_n(x = x_0 + \Delta x) = f_n(x_0) + \frac{\partial f_i}{\partial x_j}(x_0)
    \Delta x = 0$$


    The entity $\partial f / \partial x_j$ is a matrix commonly referred to as the
    Jacobian. By finding the inverse to the Jacobian, we can then solve for the error
    $\Delta x$ which can be written as


    $$\Delta x = -\left[\frac{\partial f_i}{\partial x_j}\right]^{-1} f(x_0) \quad
    (7.46)$$


    Clearly if the Jacobian is non-singular, the procedure is very similar to the
    one-dimensional case.


    **Convergence Rate**

    The Newton-Raphson method converges with a rate proportional to $\Delta x^2$.
    This follows from the error term in the Taylor expansion.


    ### 7.3.2 Common Difficulties and Workarounds


    The main difficulty with Newton-Raphson lies in the behavior of the Jacobian.
    If it is singular, the method obviously fails, but also if it is close to zero,
    the solution can jump far away from the true solution even if it is close to it
    at the beginning of the iteration. A non-singular Jacobian is usually indicative
    of a circuit problem most likely in the branch equations where poor device models
    give rise to poorly defined Jacobians.


    In addition, there are also situations where there is a local minimum to the function
    $f$, and if during the course of iteration the solution gets close to such a point,
    it can iterate around this local minima endlessly [5]. The Newton-Raphson algorithm
    is guaranteed to converge if the starting point is close “enough” to the solution.
    Luckily in most circuit situations, the starting point is the previous timestep,
    and if the timestep itself is small enough, the Newton-Raphson method usually
    finds its way.


    ## 7.4 Shooting Method Theory


    We have as before the governing equation [6]


    $$f(\boldsymbol{v}(t)) = i(\boldsymbol{v}(t)) + \dot{q}(\boldsymbol{v}(t)) + \boldsymbol{u}
    = 0 \qquad (7.47)$$


    Let us spell out the full terms for all elements. For resistors


    $$i(v) = \frac{1}{R}v$$


    For inductors


    $$i(v) = \int \frac{1}{L} v(t) dt$$


    The capacitors appear naturally in the second term in Eq. 7.47


    $$q(v) = Cv$$


    or


    $$i(v) = \dot{q}(v) = C \frac{dv}{dt}$$


    The transistors finally are the well-known


    $$i(v) = g_m v$$


    for the linear case.


    We denote by $v(t)$ the state of the circuit voltages at a specific time $t$ similar
    to [5]. We are looking for solutions that have the property:


    $$v(t) = v(t+T)$$


    Let us define a function that is the difference in state between these two times:


    $$h_i(v_i(t), v_i(t+T)) = v_i(t) - v_i(t+T)$$


    We know this function is supposed to be zero when we have found the proper solution.
    For the intermediate iterations, we can do a Taylor expansion of $h$:


    $$h_{i+1} = h_i + \frac{\partial h_i}{\partial v_i} \Delta v_i = v_i(t) - v_i(t+T)
    + \frac{\partial (v_i(t) - v_i(t+T))}{\partial v_i} \Delta v_i(t)$$

    $$\approx v_i(t) - v_i(t+T) + \left( I - \frac{\Delta v_i(t+T)}{\Delta v_i(t)}
    \right) \Delta v_i(t) = v_i(t) - v_i(t+T) + (I - J_{\phi, ij}(T)) \Delta v_i(t)
    = 0$$


    Here the Jacobian $J_{\phi, ij}(T)$ represents the sensitivity of the final state
    due to changes in the initial state. The equation can now be rearranged to yield


    $$\Delta v_i(t) = (I - J_{\phi, ij}(T))^{-1} (-v_i(t) + v_i(t+T))$$


    Following Newton-Raphson''s idea, we see that a change in initial state can be
    calculated from the Jacobian of the previous iteration. We can write the Jacobian
    using the chain rule as


    $$J_{\phi, ij}(T) = \frac{\partial v_N}{\partial v_{N-1}} \frac{\partial v_{N-1}}{\partial
    v_{N-2}} \dots \frac{\partial v_1}{\partial v_0} \frac{\partial v_0}{\partial
    v_0}$$'
