    time scale depending directly on the capacitive load. This is in contrast to the
    DC solution that converged to mid supply point.


    The take-home lesson from this example is that DC circuits can have some surprising
    properties contributing to the difficulty of finding solutions.


    Oscillator


    As another example, let us study an oscillator. It is one of the key circuit implementations
    in many modern chips, and a lot of efforts have been made in sorting out their
    behavior [22]. In a circuit development environment, a free running oscillator
    by itself is not that useful except perhaps for process monitoring schemes. Normally
    one would need a way to control the oscillation frequency, and often this is done
    with an input voltage controlling the frequency through a voltage-dependent capacitor.
    Such a device is called a voltage-controlled oscillator (VCO). Here we will look
    at an oscillator without such capacitors. Such an oscillator is an excellent test
    bench for simulator implementations since particularly the amplitude is highly
    dependent'
