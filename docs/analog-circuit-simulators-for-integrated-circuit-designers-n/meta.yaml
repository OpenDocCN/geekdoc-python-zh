    ## 5.5.2 Harmonic Balance Methods


    Harmonic balance is a way to find the steady state of a circuit by working in
    frequency space instead of time. Imagine we have a circuit driven by a signal
    with a certain frequency. If the circuit was linear, then all nodes will contain
    this frequency and DC. It is simply a question of phase and magnitude. The normal
    topology constraints, KCL, can also be applied to frequency space. If the circuit
    is nonlinear, we know from elementary theory that harmonics of the fundamental
    frequency tone will also appear. This is the basis for harmonic balance methods,
    and the idea behind the various algorithms is to find the set of harmonics, both
    magnitude and phase, that defines all device currents and node voltages. We will
    here go through the basic theory without too much formalities and just hint at
    its inner workings. We will then move on with the actual implementation in a Python
    code as before.


    When working in frequency space, we will define the Fourier transform as


    $$H(f) = \frac{1}{T} \int_{-\infty}^{\infty} h(t) e^{-j\omega t} dt \quad (5.30)$$


    where $\omega = 2\pi f$ and $T$ is the period over which we define the integral.
    Furthermore, we will work with both positive and negative frequencies. For real-valued
    functions $h(t)$, the following property is easy to prove


    $$H(f) = H^*(-f) \quad (5.31)$$


    where $*$ denotes the complex conjugate. It is much easier to work with calculations
    this way. For the simulator, the discrete Fourier transform (DFT) is used


    $$H(f) = \int_{0}^{T} h(t) e^{\frac{-i2\pi n t}{T}} dt \delta\left(f - \frac{n}{T}\right),
    \quad 0 < n < \frac{T}{2T_s}$$


    where $T$ is the signal period and $T_s$ is the sampling period. Some simulators
    can manipulate the sampling timestep often via a parameter called sampling ratio
    or similar. One can use this to oversample the signal in time for a possible increase
    in accuracy.


    We show the more formal derivation of the harmonic balance equations in Chap.
    7. We here simply state the network equation, $f(v_k) = 0$, can be Fourier transformed
    as


    $$F(V) = I(V) + \Omega Q(V) + U$$


    Here the capital $V$ now represents the Fourier coefficients for the voltages
    at each node.


    We define the Jacobian:


    $$J_{ij} = \frac{\partial F_i}{\partial V_j}$$


    We get


    $$J(V) = \frac{\partial I(V)}{\partial V} + \Omega \frac{\partial Q(V)}{\partial
    V}$$


    Applying the Newton-Raphson algorithm, we find the iteration:


    $$V^{j+1} = V^{(j)} - J^{-1}\left(V^{(j)}\right)F\left(V^{(j)}\right)$$


    The matrix $J$ is referred to as the harmonic Jacobian or conversion matrix. It
    tells you how a Fourier component at some node $j$ couples to another Fourier
    component at node $i$. Note the matrix is really a matrix within a matrix. Each
    circuit node contains a set of Fourier vector components that couples to Fourier
    components at other nodes. So now the procedure is very similar to the one we
    followed in the time-domain case. We set up the matrices $F$ and $J$ and iterate
    along. The boundary conditions set by $U$ have fixed components, and we can just
    easily iterate our way to the right solution. We do have many more variables;
    each node has k Fourier components, but once the iterations have converged, we
    are done. In the time domain, we simply had to continue, so the price we pay in
    harmonic balance is that the matrix is much bigger, but we only solve it once.


    Let us now look at some examples from our device models. We will start with transistor
    model1 since it is fairly simple and illustrate the procedure when setting up
    the fundamental matrices $F,J$. We find there


    $$i(t) = K\left(v_g(t) - v_s(t)\right)^2$$


    To calculate the Jacobian in frequency space, we need to first Fourier transform:


    $$i(t) = \sum_{k=1-K}^{K-1} I_k e^{j2\pi k \frac{t}{T}}$$


    $$I_k = \frac{1}{T} \sum_{n=0}^{N-1} i(n\tau) e^{-j2\pi k \frac{n\tau}{T}}$$


    We now see


    $$\frac{\partial I_k}{\partial V_l^g} = \frac{1}{T} \sum_{n=0}^{N} \frac{\partial
    i(t)}{\partial V_l^g} e^{-j2\pi k \frac{n\tau}{T}} = \frac{1}{T} \sum_{n=0}^{N}
    \frac{\partial i(t)}{\partial v_g} \frac{\partial v_g}{\partial V_l^g} e^{-j2\pi
    k \frac{n\tau}{T}} \quad (5.39)$$


    We have


    $$v_g(t) = \sum_{k=1-K}^{K-1} V_k^g e^{j2\pi k \frac{t}{T}} \rightarrow \frac{\partial
    v_g}{\partial V_l^g} = e^{j2\pi l \frac{t}{T}} \quad (5.40)$$


    Likewise for $v_s$


    $$v_s(t) = \sum_{k=1-K}^{K-1} V_k^s e^{j2\pi k \frac{t}{T}} \rightarrow \frac{\partial
    v_s}{\partial V_l^s} = e^{j2\pi l \frac{t}{T}} \quad (5.41)$$


    The derivative term is straightforward


    $$\frac{\partial i(t)}{\partial v_g} = 2K(v_g(t) - v_s(t))$$

    $$\frac{\partial i(t)}{\partial v_s} = -2K(v_g(t) - v_s(t)) \quad (5.42)$$


    Putting all this together, we get


    $$\frac{\partial I_k}{\partial V_l^g} = \frac{1}{T} \sum_{n=0}^{N} \frac{\partial
    i(n\tau)}{\partial v_g} \frac{\partial v_g}{\partial V_l^g} e^{-j2\pi k \frac{n\tau}{T}}
    = \frac{1}{T} \sum_{n=0}^{N} \frac{\partial i(n\tau)}{\partial v_g} e^{j2\pi l
    \frac{n\tau}{T}} e^{-j2\pi k \frac{n\tau}{T}} =$$

    $$= \frac{1}{T} \sum_{n=0}^{N} \frac{\partial i(n\tau)}{\partial v_g} e^{j2\pi(l-k)\frac{n\tau}{T}}$$

    $$= \sum_{n=0}^{N} 2K(v_g(n\tau) - v_s(n\tau)) e^{j2\pi(l-k)\frac{n\tau}{T}} \quad
    (5.43)$$


    Similarly for the other voltage,


    $$\frac{\partial I_k}{\partial V_l^s} = J_{l-k} = \frac{1}{T} \sum_{n=0}^{N} \frac{\partial
    i(n\tau)}{\partial v_s} e^{j2\pi(l-k)\frac{n\tau}{T}} \quad (5.44)$$


    We see now in both these cases, and it is not hard to show this in general that
    the Jacobian looks like the Fourier transform of the time derivative of some function.
    Also note it is the difference between the indices that matters $l - k$. In matrix
    form, we have


    $$J = \begin{pmatrix} \frac{\partial I_{1-K}}{\partial V_{1-K}^s} & \cdots & \frac{\partial
    I_{1-K}}{\partial V_{K-1}^s} \\ \vdots & \ddots & \vdots \\ \frac{\partial I_{K-1}}{\partial
    V_{1-K}^s} & \cdots & \frac{\partial I_{K-1}}{\partial V_{K-1}^s} \end{pmatrix}
    \quad (5.45)$$


    For the case where $K = 3$, we have


    $$\begin{pmatrix} \frac{\partial I_{-2}}{\partial V_{-2}^s} & \frac{\partial I_{-2}}{\partial
    V_{-1}^s} & \frac{\partial I_{-2}}{\partial V_{0}^s} & \frac{\partial I_{-2}}{\partial
    V_{1}^s} & \frac{\partial I_{-2}}{\partial V_{2}^s} \\ \frac{\partial I_{-1}}{\partial
    V_{-2}^s} & \frac{\partial I_{-1}}{\partial V_{-1}^s} & \frac{\partial I_{-1}}{\partial
    V_{0}^s} & \frac{\partial I_{-1}}{\partial V_{1}^s} & \frac{\partial I_{-1}}{\partial
    V_{2}^s} \\ \frac{\partial I_{0}}{\partial V_{-2}^s} & \frac{\partial I_{0}}{\partial
    V_{-1}^s} & \frac{\partial I_{0}}{\partial V_{0}^s} & \frac{\partial I_{0}}{\partial
    V_{1}^s} & \frac{\partial I_{0}}{\partial V_{2}^s} \\ \frac{\partial I_{1}}{\partial
    V_{-2}^s} & \frac{\partial I_{1}}{\partial V_{-1}^s} & \frac{\partial I_{1}}{\partial
    V_{0}^s} & \frac{\partial I_{1}}{\partial V_{1}^s} & \frac{\partial I_{1}}{\partial
    V_{2}^s} \\ \frac{\partial I_{2}}{\partial V_{-2}^s} & \frac{\partial I_{2}}{\partial
    V_{-1}^s} & \frac{\partial I_{2}}{\partial V_{0}^s} & \frac{\partial I_{2}}{\partial
    V_{1}^s} & \frac{\partial I_{2}}{\partial V_{2}^s} \end{pmatrix}$$


    These terms are simply components of the Fourier transform, and as soon as we
    have it, we also have the Jacobian. Let us take a quick look at the integral (or
    discrete sum in our case of a discrete Fourier transform) again:


    $$\frac{1}{T} \sum_{n=0}^{N} \frac{\partial i(n\tau)}{\partial v_s} e^{j2\pi(l-k)\frac{n\tau}{T}}
    \quad (5.46)$$


    The sum is a sum over a product of two functions $\frac{\partial i(n\tau)}{\partial
    v_s}, e^{j2\pi(l-k)\frac{n\tau}{T}}$. This sum is always zero unless the frequency
    of the two functions is the same since the functions can only consist of harmonics
    of the fundamental, and we integrate over the fundamental harmonics period. Particularly
    in the case where $\frac{\partial i(n\tau)}{\partial v_s} = C$, a constant, the
    only non-zero component is the one where $l = k$ and the matrix simplifies to


    $$J = \begin{pmatrix} J_0 & \cdots & 0 \\ \vdots & \ddots & \vdots \\ 0 & \cdots
    & J_0 \end{pmatrix} \quad (5.47)$$'
