    where $U$ is an upper-right triangular and $L$ is a lower-left triangular matrix.\
    \ We then simply have to solve a set of equations $Ux = y$ and $Ly = b$. Since\
    \ the $LU$ matrices are triangular, it is a set of straightforward substitutions.\
    \ This sounds good, but the alert reader no doubt questions the complexity of\
    \ decomposing a matrix in such a way. There is in fact an extraordinary procedure\
    \ known as Crout's method that quite easily decomposes a matrix into these two\
    \ matrices. Let us write\n\n$$L = \\begin{pmatrix} l_{11} & \\cdots & 0 \\ \\\
    vdots & \\ddots & \\vdots \\ l_{n1} & \\cdots & l_{nn} \\end{pmatrix} \\quad U\
    \ = \\begin{pmatrix} u_{11} & \\cdots & u_{1n} \\ \\vdots & \\ddots & \\vdots\
    \ \\ 0 & \\cdots & u_{nn} \\end{pmatrix}$$\n\nIt turns out the diagonal of $L$\
    \ can always be chosen to be unity $l_{ii} = 1$. Let us write out explicitly a\
    \ row of the matrix equation $LU = A$:\n\n$$l_{i1}u_{1j} + l_{i2}u_{2j} + \\dots\
    \ + l_{in}u_{nj} = a_{ij}$$\n\nGiven the triangular nature of $L$, $U$, we see\
    \ the number of terms in the sum on the left depends strongly on whether $i =\
    \ j$ or $i < j$:\n\n$$i = j : l_{i1}u_{1i} + l_{i2}u_{2i} + \\dots + l_{ii}u_{ii}\
    \ = a_{ii}$$\n$$i < j : l_{i1}u_{1j} + l_{i2}u_{2j} + \\dots + l_{ii}u_{ij} =\
    \ a_{ij}$$\n$$i > j : l_{i1}u_{1j} + l_{i2}u_{2j} + \\dots + l_{ij}u_{jj} = a_{ij}$$\n\
    \nThe Crout's algorithm now gives the following steps:\n\n+   - Set $l_{ii} =\
    \ 1$\n- For each $j = 1, 2, \\dots, N$, do:\n  1. For $i = 1, 2, \\dots, j$, use\
