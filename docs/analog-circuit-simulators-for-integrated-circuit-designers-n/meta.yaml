    # 6.1.2 V_th Extraction


    The threshold voltage, V_th, is not a physical quantity like the thermal voltage,
    V_t = kT/q; instead it is a common way to parameterize the transition from non-inverted
    channel to an inverted channel where minority carriers become present in'
  merge: -1
  pgno: 324
- img_proc: true
  md: 'the region just below the gate dielectric (see Chap. 3). The precise value
    of the $V_{th}$ voltage can thus be debated. One common methodology is called
    the gm-max method where the transistor is biased in the linear region, and $V_{ds}
    < V_{gs} - V_{th}$ is fixed, the gate voltage is swept, and the peak value of
    $g_m$ is located. The point where the tangent to the $I_d$ vs $V_{gs}$ at gm-max
    crosses the $I_d = 0$ axis is the threshold voltage. The reason we look at the
    point where $g_m$ is maximum is we need to make sure we are out of the subthreshold
    regime but not that deep in the saturation region where the mobility is affected.
    The max $g_m$ point is thus where the following formula is approximately valid
    (linear region from Chap. 3):


    $$I_{ds} = \mu_{eff} C_{ox} \frac{W}{L} \left( (V_{gs} - V_T) V_{ds} - \frac{m}{2}
    V_{ds}^2 \right)$$


    The expression for $I_d = 0$ when


    $$(V_{gs} - V_T) V_{ds} - \frac{1}{2} V_{ds}^2 = 0 \rightarrow V_{gs} = V_T +
    \frac{1}{2} V_{ds}$$


    We simply subtract $1/2V_{ds}$ from $V_{gs}$ at the intercept point to get an
    estimate of $V_T$. Simulate $V_T$ as a function of gate length and gate width.
    An example of such a simulation can be found in Figs. 6.1 and 6.3. The max $g_m$
    is found around $V_{gs} = 750$ mV, and drawing a tangent from that point on Fig.
    6.1 results in Fig. 6.6. The intersection point is at $V_{int} = V_{gs} = 0.45$
    V resulting in a $V_{th} = V_{int} - V_{ds}/2 = 400$ mV. After simulating all
    these characteristics, we ask questions like:


    ![](img/75093da0d280ad52326a78925e5cc403_325_0.png)'
  merge: -1
  pgno: 325
- img_proc: true
  md: '• Is the response reasonable in terms of

    (a) scaling?

    (b) physics, in terms of say output conductance for the CS stage and $V_T$ vs
    gate length?


    • Are the parasitics, like gate-source/gate-drain resistance and sidewall capacitance,
    included? Do they make sense? The gate-source capacitance should be larger than
    the gate-drain capacitance even in the presence of sidewall capacitance. If the
    parasitics are not included properly when the model file switches are set correctly,
    we have a different kind of problem.


    When the DC characterization curves and the threshold voltage has been simulated,
    think of a “unit” transistor in your design flow. If you do low-power design,
    it might be a 10 uA drain current transistor, or if you are doing high-speed designs,
    it might be 1 mA transistor or even higher. Here we will assume a “unit” transistor
    is biased at 1 mA with a 150 mV overdrive ($V_{gs} - V_{th}$) and a $V_{ds} =
    500$ mV with a minimum channel length. These factors will determine the transistor
    width. With the characterization plots we just did, we can now find out what the
    trans-conductance $g_m$ is for such a “unit” transistor and of course $g_{ds}$.
    If we look through Figs. 6.1, 6.2, 6.3, and 6.4 again, we find a threshold voltage
    of 370 mV, and with a $V_{gs} = 520$ mV, we find a drain current of 1 mA from
    Fig. 6.1. We have a $g_m = 0.012$ and $g_{ds} = 0.75 \cdot 10^{-3}$ mmhos from
    Figs. 6.3 and 6.4. Do these numbers correspond to the model extracted values?
    Often a modern schematic tool will back-annotate these numbers for a given transistor,
    and it is surprising how often these numbers do not correspond to the simulated
    ones. Users beware! We summarize the DC characteristics of this transistor in
    Table 6.1.


    In the next few sections, we will continue to add various characteristics to this
    “unit” transistor.


    # 6.1.3 $f_t$ Characterization


    The transition frequency, $f_t$, is a classic parameter used to estimate the speed
    of a transistor. The advanced CMOS nodes can have $f_t > 400$ GHz for certain
    bias settings which is quite impressive. The transition frequency is defined as
    the frequency where the drain current equals gate current (see Fig. 6.7). If one
    simulates a transistor in the common gate configuration, one can see the transition
    frequency is simply


    Table 6.1 DC characteristics of a “unit” transistor


