    $$J = \begin{pmatrix} 0 \cdots & J_m & \cdots & 0 \\ J_{-m} & 0 & J_m & \\ 0 \cdots
    & J_{-m} & \cdots & 0 \end{pmatrix} \quad (5.50)$$


    We see we get contributions to component $l - K$ from component $l - K + m$ which
    is also obvious from the trigonometric identity:


    $$\sin(l-k+m)\frac{2\pi}{T} \sin m\frac{2\pi}{T} = \frac{1}{2}\left(\cos(l-k+2m)\frac{2\pi}{T}
    + \cos(l-k)\frac{2\pi}{T}\right) \quad (5.51)$$


    Now it should be obvious the basic approximation we are doing when we limit the
    harmonics from $l - K$ to $K - 1$ is that the harmonics resulting from products
    going outside this range are ignored. This fact will result in convergence issues
    since we are only trying to solve for only a subset of all harmonics. This is
    why it is important to include enough harmonics to at least cover the maximum
    bandwidth of the system a few times over.


    > It is important to include enough harmonics to at least cover the maximum bandwidth
    of the system a few times to minimize convergence issues.


    The case for a linear resistor should now be obvious:


    $$\frac{\partial i}{\partial v} = \frac{1}{R} \rightarrow J_0 = \frac{1}{T} \sum_{n=0}^{N}
    \frac{\partial i(n\tau)}{\partial v_s} e^{j2\pi(l-k)\frac{n\tau}{T}} = \frac{1}{T}
    \sum_{n=0}^{N} \frac{1}{R} = \frac{1}{R} \quad (5.52)$$


    For a linear capacitor, we see


    $$i = C \frac{\partial v}{\partial t} = C \sum_{k=1-K}^{K-1} j\omega_k V_k^C e^{j\omega_k
    t} = \sum_{k=1-K}^{K-1} I_k^C e^{j\omega_k t}$$


    where


    $$I_k^C = Cj\omega_k V_k^C$$


    And thus


    $$\frac{\partial I_k}{\partial V_l} = Cj\omega_k \delta(k-l)$$


    Finally for a linear inductor, we know


    $$v = L \frac{\partial i}{\partial t} = L \sum_{k=1-K}^{K-1} j\omega_k I_k^L e^{j\omega_k
    t} = \sum_{k=1-K}^{K-1} V_k^L e^{j\omega_k t}$$


    As with the capacitor, we get now


    $$V_k^L = Lj\omega_k I_k^L$$


    And


    $$\frac{\partial I_k}{\partial V_l} = \frac{1}{Lj\omega_k} \delta(k-l)$$


    We see here there is a divergence at DC since any voltage would cause an infinite
    current to run through the inductor. It will need special attention; any DC voltage
    across an inductor is zero.


    In the STA matrix description, we recall from earlier a resistor''s signature
    looks like


    $$\begin{pmatrix} v_a & & & -1 \\ v_b & & & +1 \\ \vdots & & & \vdots \\ i_R &
    -1 & +1 & \cdots & -R \end{pmatrix}$$


    In the harmonic balance formulation, we simply replace the numbers with diagonal
    matrices corresponding to the harmonics involved, for example, the case of three
    harmonics results in.


    Since the resistor is here a linear element, each harmonic only interacts with
    itself, as should be clear from the matrix signature.

    For an inductor, we see


    A linear capacitor will look like


    $$\begin{pmatrix} & v_a & v_b & i_C \\ v_a & & & -1 \\ v_b & & & +1 \\ i_C & +C
    & -C & -1 \end{pmatrix}$$


    (5.63)


    $$\begin{pmatrix} v_a \\ v_b \\ \vdots \\ i_R \end{pmatrix} \begin{pmatrix} -1
    & 0 & 0 \\ 0 & -1 & 0 \\ 0 & 0 & -1 \end{pmatrix} \begin{pmatrix} +1 & 0 & 0 \\
    0 & +1 & 0 \\ 0 & 0 & +1 \end{pmatrix} \vdots \begin{pmatrix} j\omega_{-1}C &
    0 & 0 \\ 0 & j\omega_0C & 0 \\ 0 & 0 & j\omega_1C \end{pmatrix} \begin{pmatrix}
    -j\omega_{-1}C & 0 & 0 \\ 0 & -j\omega_0C & 0 \\ 0 & 0 & -j\omega_1C \end{pmatrix}
    \cdots \begin{pmatrix} -1 & 0 & 0 \\ 0 & -1 & 0 \\ 0 & 0 & -1 \end{pmatrix}$$


    (5.64)


    Finally for a transistor modeled as a nonlinear VCCS, we need to add a nonlinear
    term as in the transient simulation section. Since we are working in the frequency
    domain, we need to do a Fourier transform of the transistor transconductance,
    and for our simple model, that means using


    $$I = K\left(v_g - v_s\right)^2$$


    (5.65)


    We find


    $$I_k = \frac{1}{T} \sum_{n=0}^{N} K\left(v_g(n\tau) - v_s(n\tau)\right)^2 e^{-i\omega_k
    n\tau}$$


    (5.66)


    For this simple case, we can of course just expand and identify terms, but let
    us do a proper Fourier transform, and add the resulting harmonics to the function
    $F(V)$. For the Jacobian (the derivative), we already derived the formula


    For an independent voltage source, we get likewise


    We are now ready to write the code where we first assume the nonlinear transistor
    behavior follows model1 from Sect. 3.4. Due to the oversimplistic transistor model,
    it will not result in a very useful output as we will now show by reexamining
    the circuit in netlist 5.6. We see the harmonic balance result after an inverse
    Fourier transform in Fig. 5.37.


    The blip in the response is due to the poor transistor model; the transistor turns
    on again when the gate voltage goes below the source.


    ![](img/75093da0d280ad52326a78925e5cc403_244_0.png)


    **Fig. 5.37** The result of a harmonic balance simulation of netlist 5.6 using
    our CMOS model1


    We can take this further and implement the more realistic transistor model we
    discussed in Sects. 3.4.2 and 5.2.1.1. We Fourier transform the current voltage
    relationship just we did for the simpler model and note we need to add a derivative
    of the drain voltage to the Jacobian matrix. We will not go thought the details,
    here but they are straightforward, and we leave the mathematical derivations to
    the reader and present the code implementation as Code 5p8 in Sect. 5.6.8. We
    can simulate the same circuit one more time, **netlist 5.6**, with this improved
    transistor model, and we find the result in Fig. 5.38.


    The improvement going from 4 harmonics to 8 is quite different from 16 to 32.
    The system has clearly converged.


    We need to accentuate one more time the fact that the steady-state solution is
    what the transient would be if one waits for a long time. A properly designed
    steady-state simulator will always have a more accurate response than a transient.
    Also note the step in time is *one* period. A transient simulation ends when it
    ends.


    *Multi-tone Implementation*

    Just like we discussed for the shooting method case, a multi-tone implementation
    is fairly straightforward when using the beat frequency of all signal sources.


    ## 5.5.3 Envelope Analysis


    In time-domain-based simulators, we have discussed the timesteps taken need to
    be smaller when higher frequencies appear in the circuitry due to LTE and GTE
    effects. Harmonic balance simulators do not suffer from this weakness, but they
    require a substantial number of harmonics, in particular if one has a combination
    of low-frequency modulation components riding on top of higher-frequency carriers.


    ## 5.5 Periodic Steady-State Solvers


    ![](img/75093da0d280ad52326a78925e5cc403_245_0.png)


    Fig. 5.38 Harmonic balance results of using a more realistic transistor model
    as a function of the number of harmonics. As that number is increasing, the result
    improves considerably. Note: smoothing has been enabled in the rendering to make
    the differences stand out clearer


    Envelope simulation is a combination of a steady-state simulator and a time-domain
    simulator. If you have ever done work in an electronics laboratory, you have perhaps
    had the chance to work with a spectrum analyzer. In a typical setup, such an instrument
    shows the spectral components of the signal at the input port. When looking at
    those spectral views and often seeing they vary with time, see Fig. 5.39. These
    time-varying components are what we are after with an envelope simulator.


    Mathematically, in harmonic balance, we can write a wave form at a certain node
    as


    $$v(t) = \sum_{k=0}^{\infty} V_k e^{-i\omega_k t}$$ (5.70)


    In an envelope simulation, the Fourier coefficients vary with time, so we have


    $$v(t) = \sum_{k=0}^{\infty} V_k(t) e^{-i\omega_k t}$$ (5.71)


    just like we have seen in a spectrum analyzer.'
