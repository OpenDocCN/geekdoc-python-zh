    # 4.4.3 S-Parameter Analysis


    Another modern adaptation of AC analysis is in S-parameter simulations. An S-parameter
    is a linear response of a given circuit, and so AC simulation is appropriate.
    The basic idea behind the S-parameter analysis is that all sources and sinks have
    a certain termination impedance (in many cases, this is just 50 ohms real impedance).
    The S-parameter response is then the gain between ports (Fig. 4.21).


    The gain between ports $i, j$ is annotated $S_{ji}$, where the $j$ index refers
    to the output port and the $i$ index is the input port. $S_{21}$ is then the gain
    between port $1 \rightarrow 2$. This gain is then the same thing as AC gain of
    a circuit that is terminated at all ports. The only bit of confusion can arise
    regarding same port gain like $S_{11}$ (Fig. 4.22). One can show, see [23, 24],
    that'
  - '[PAGE 110]


    $$S11 = \frac{S_{out}}{S_{in}} = \frac{Z - R_t}{Z + R_t}$$ (4.38)


    where $Z$ is the impedance looking in to the port and $R_t$ is the termination
    resistance. The input impedance is defined as the voltage at the input node, $v_{in}$,
    divided by the current going into the input, $i_{in}$. We find


    $$v_{in} = \frac{Z}{R_t + Z}V \quad v_{R_t} = \frac{R_t}{R_t + Z}V$$ (4.39)


    This gives


    $$S11 = \frac{v_{in} - v_{R_t}}{V} = \frac{v_{in} - (V - v_{in})}{V} = \frac{2v_{in}
    - V}{V} = \frac{v_{in} - V/2}{V/2}$$ (4.40)


    By convention it is common to use $V = 2 + j * 0$, a real voltage at the voltage
    source.


    Simulating $S_{11}$ as an AC simulation is then a matter of having a resistor,
    say 50 ohms, in series with the input signal voltage source. Measure the AC response
    *after* the termination resistor, remove 1, and take the complex magnitude, and
    we are done:


    $$S_{11} = 20 \log(|v_{in} - 1|)$$ (4.41)


    S21 is easier to understand (see Fig. 4.23). It is simply an AC simulation with
    all ports terminated 50 ohms to ground. Still using the convention the driving
    voltage source has amplitude $V = 2$, we find the voltage at the input is $\approx
    1$. The AC magnitude at the output port then directly gives the forward gain:


    $$S_{21} = 20 \log|v_{out}|$$ (4.42)


    ![](img/75093da0d280ad52326a78925e5cc403_110_0.png)'
