  md: '$l_{21} = \frac{1}{3}, \quad l_{31} = \frac{2}{3} \quad 2l_{31} + \frac{7}{3}l_{32}
    = 1 \rightarrow l_{32} = -\frac{1}{7}$


    $$\boldsymbol{L} = \begin{pmatrix} 1 & 0 & 0 \ 1/3 & 1 & 0 \ 2/3 & -1/7 & 1 \end{pmatrix}$$


    The reader will surely note the matrix coefficients are in fact the row operations
    we did for the Gaussian elimination scheme but with the sign reversed. We find
    from $\boldsymbol{L}\boldsymbol{y} = \boldsymbol{b}$ that


    $$\boldsymbol{y} = \begin{pmatrix} 7 \ 8/3 \ 54/7 \end{pmatrix}$$


    Finally, from $\boldsymbol{U}\boldsymbol{x} = \boldsymbol{y}$, we have the solution


    $$\begin{pmatrix} 3 & 2 & 1 \ 0 & 7/3 & 5/3 \ 0 & 0 & 18/7 \end{pmatrix} \begin{pmatrix}
    x \ y \ z \end{pmatrix} = \begin{pmatrix} 7 \ 8/3 \ 54/7 \end{pmatrix}$$


    We find by back substitution


    $$\begin{pmatrix} x \ y \ z \end{pmatrix} = \begin{pmatrix} 2 \ -1 \ 3 \end{pmatrix}$$


    We can say the $LU$ decomposition is such the $\boldsymbol{L}$ matrix keeps track
    of the row manipulations, so the rhs need to be adjusted accordingly with $\boldsymbol{L}$.
    After those operations, it is just a matter of back substitution using $\boldsymbol{U}$
    to get the answer. As before, in the Gaussian elimination method, pivoting is
    a key step when factoring/decomposing the matrix. In modern simulators, there
    is rarely a need to adjust the parameters of the pivoting algorithm. The advantage
    here that we mentioned initially is that the decomposition (or factorization)
    is independent on the rhs. The pivoting in a real implementation is somewhat more
    subtle than what is apparent in this example (see [11]).


