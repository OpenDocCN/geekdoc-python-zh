    \    STA_rhs[NumberOfNodes+i] = sol[NumberOfNodes+i] + deltaT*(sol[Nodes.index(DevNode1[i])]\
    \ - sol[Nodes.index(DevNode2[i])])/(2*DevValue[i])\n```\n\n## Simulation\n\nWe\
    \ can change the system build routine straightforwardly (Sect. 4.9.7). Let us\
    \ look at simulations of the same netlist we used for the previous two integration\
    \ methods in Fig. 4.30.\n\nThe major difference from earlier is the accuracy of\
    \ the algorithm since it is of second order.\n\n### 4.6.4 Second-Order Gear Method\n\
    \nFinally, the last method we will discuss is the second-order Gear method. It\
    \ is together with trapezoidal method the most commonly used in circuit simulators.\
    \ We have from Chap. 1 the basic approximation:\n\n$$\\frac{df}{dt}(t+\\Delta\
    \ t) \\approx \\frac{1}{\\Delta t} \\left( \\frac{3}{2} f(t+\\Delta t) - 2f(t)\
    \ + \\frac{1}{2} f(t-\\Delta t) \\right) \\quad (4.62)$$\n\nIf we were to implement\
    \ this with our capacitor model, we would get\n\n$$i(t_{n+1}) = \\frac{C}{\\Delta\
    \ t} \\left( \\frac{3}{2} u(t_{n+1}) - 2u(t_n) + \\frac{1}{2} u(t_{n-1}) \\right)\
    \ \\quad (4.63)$$\n\n![](img/75093da0d280ad52326a78925e5cc403_124_0.png)\n\nBy\
