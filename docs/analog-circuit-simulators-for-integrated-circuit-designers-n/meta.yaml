    $l_{21} = \frac{1}{3}, \quad l_{31} = \frac{2}{3} \quad 2l_{31} + \frac{7}{3}l_{32}
    = 1 \rightarrow l_{32} = -\frac{1}{7}$


    $$\boldsymbol{L} = \begin{pmatrix} 1 & 0 & 0 \ 1/3 & 1 & 0 \ 2/3 & -1/7 & 1 \end{pmatrix}$$


    The reader will surely note the matrix coefficients are in fact the row operations
    we did for the Gaussian elimination scheme but with the sign reversed. We find
    from $\boldsymbol{L}\boldsymbol{y} = \boldsymbol{b}$ that


    $$\boldsymbol{y} = \begin{pmatrix} 7 \ 8/3 \ 54/7 \end{pmatrix}$$


    Finally, from $\boldsymbol{U}\boldsymbol{x} = \boldsymbol{y}$, we have the solution


    $$\begin{pmatrix} 3 & 2 & 1 \ 0 & 7/3 & 5/3 \ 0 & 0 & 18/7 \end{pmatrix} \begin{pmatrix}
    x \ y \ z \end{pmatrix} = \begin{pmatrix} 7 \ 8/3 \ 54/7 \end{pmatrix}$$


    We find by back substitution


    $$\begin{pmatrix} x \ y \ z \end{pmatrix} = \begin{pmatrix} 2 \ -1 \ 3 \end{pmatrix}$$


    We can say the $LU$ decomposition is such the $\boldsymbol{L}$ matrix keeps track
    of the row manipulations, so the rhs need to be adjusted accordingly with $\boldsymbol{L}$.
    After those operations, it is just a matter of back substitution using $\boldsymbol{U}$
    to get the answer. As before, in the Gaussian elimination method, pivoting is
    a key step when factoring/decomposing the matrix. In modern simulators, there
    is rarely a need to adjust the parameters of the pivoting algorithm. The advantage
    here that we mentioned initially is that the decomposition (or factorization)
    is independent on the rhs. The pivoting in a real implementation is somewhat more
    subtle than what is apparent in this example (see [11]).


    # 2.3.2.3 Iterative Methods


    What really have impacted the matrix inversion speeds are iterative methods that
    can be very advantageous for large sparse systems. The basic idea is to start
    with a guess, $\boldsymbol{x}_0$, to the solution of $\boldsymbol{A}\boldsymbol{x}
    = \boldsymbol{b}$ and to come up with a way to minimize the'
  - '[PAGE 36]


    residual $y = A (x - x_0)$ by somehow calculating a new solution from $x_1 = x_0
    + \beta z_0$, where $z_0$ is some cleverly chosen direction. This goes on until
    desired accuracy (size of $|y|$) has been reached. There are a number of different
    ways of doing this that are called conjugate gradient, biconjugate gradient methods,
    generalized minimum residue methods, etc. (see [11, 18]). These methods are part
    of a larger class of algorithms that goes under the name Krylov subspace methods.
    They are generally quite easy to implement numerically that works well for sparse
    matrices, frequently encountered in circuit systems (see [18] for a good and detailed
    discussion of these techniques). How they work is somewhat more difficult to understand
    than the previously discussed techniques, and we provide a bit more details in
    Chap. 7. Instead we will show an example of such an iterative algorithm known
    as the GMRes (generalized minimal residual) method. Basically, this method minimizes
    the residual, $|Ax_m - b|$, using the least-mean-square (lms) method. There are
    a lot more details to this methodology, and the reader is highly encouraged to
    study the details more in [11, 18] and Chap. 7. A Python code implementation can
    be found in Sect. 2.6.1:


