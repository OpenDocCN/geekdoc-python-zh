    # 2.3.2.4 Summary


    The main takeaway from this section is that some of these iterative projection
    algorithms are remarkably easy to implement and the reader is encouraged to do
    so for their own projects. Just bear in mind, becoming a professional matrix inverter
    algorithm developer is a huge task, and proper appreciation for the remarkable
    difficulties involved in the development is warranted. No doubt the reader will
    quite quickly learn to appreciate the sophisticated art that is matrix inversions.


    The solution of matrix equations is a major research field, and a lot of progress
    is being made on a yearly basis. We have just highlighted some important algorithms
    and leave the reader to explore more on his or her own. Some simulators have options
    referring to entities like pivots, and this section has served as a quick reminder
    of the major steps one encounters when solving these types of equations. The techniques
    are really at the core of modern simulators, and it is well worth spending time
    keeping up to date on modern developments.


    In the rest of the book, we will use standard built-in matrix inverters in numerical
    packages like Python, and we will not dig into this subject much further.'
