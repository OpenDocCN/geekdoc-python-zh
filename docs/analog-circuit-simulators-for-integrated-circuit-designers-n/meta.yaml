    from that equation that the two nodes connected by the voltage source would be
    the ground node and node $v_{in}$. Let us look at the more general case where
    a voltage source sits between two nodes, $a$ and $b$ (see Fig. 4.2). We can write
    this mathematically as


    $$v_a - v_b = V$$


    This is the branch equation for an independent voltage source. Note in particular
    the current of the voltage source does not enter the picture. This is a consequence
    of the assumption that an independent voltage source can deliver any magnitude/phase
    of current; it has 0 ohm impedance. The only requirement is the sum of all other
    currents at nodes $a$ and $b$ should have the same magnitude but opposite sign.
    In other words, at node $a$ the current going into the voltage source would be
    equal to $i_{v_s}$ and the current going out of the voltage source at node $b$
    is equal to $-i_{v_s}$. We follow the convention that current going into a device
    is positive and negative if it is going out of a device.


    If we treat this current as a separate matrix entry, we can formulate KCL at node
    $a$ as


    $$\cdots + i_v + \cdots = 0 \qquad \text{KCL at node } a$$


    And for $b$


    $$\cdots - i_v + \cdots = 0 \qquad \text{KCL at node } b$$


    As a side note, what happens if there are two separate voltage sources connecting
    two nodes in parallel as in Fig. 4.3? Since a current being supplied by a voltage
    source is only defined by all other currents at the node, it should be clear that
    such a system has no solution in general. Usually the simulator will issue a topology
    error flag and ask the user to fix it.


