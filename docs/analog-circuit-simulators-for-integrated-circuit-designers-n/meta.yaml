    最简单的数值公式当属欧拉法（前向与后向欧拉）。从前一节讨论的最直观实现——前向欧拉法开始：


    $$i(t_n) = C \frac{u(t_{n+1}) - u(t_n)}{\Delta t} \rightarrow u(t_{n+1}) = u(t_n)
    + \Delta t \frac{i(t_n)}{C} \quad (2.5)$$


    该方法看似简单且确实可用，但如前所述，它极易失稳导致解快速发散，有时被迫采用极小时间步长以避免问题。其根本原因将在第7章详述，这也是实际应用中从不采用该方法的原因。而简单的公式调整即可解决此问题：


    $$i(t_{n+1}) = C \frac{u(t_{n+1}) - u(t_n)}{\Delta t} \rightarrow u(t_{n+1}) =
    u(t_n) + \Delta t \frac{i(t_{n+1})}{C} \quad (2.6)$$


