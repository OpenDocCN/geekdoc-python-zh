    The fundamental difficulty with this particular implementation is that it changes
    the timestep every time it is updated. This will increase the accumulated error.
    Let us instead adjust it by adding a third, mid-level, to the adjustments. What
    we do is simply to keep track of the maximum ratio of the voltage difference to
    the error limit as in


    $$v_{\max} = \frac{|v_k - v_{pred}|}{reltol \cdot v_{k,\max} + vabstol}$$


    for all the voltage nodes. If this max is >0.9, we step down a percentage; if
    it is <0.1, we step up another percentage; and if it is between these limits,
    we leave the timestep unchanged. This will keep the timesteps the same for large
    stretch of the simulation and should improve the accuracy. Let us implement this
    as in the following code snippet:'
