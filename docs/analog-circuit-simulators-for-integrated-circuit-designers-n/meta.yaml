    ### 7.2.1.3 Stability of Linear Multistep Methods


    In the last section, we defined what is called zero stability. Essentially we
    looked at an LMS method to see if it approached the exact solution as the timestep
    $h \to 0$. We noted this is obviously a desirable property of a numerical solution
    scheme. The similarity between this zero stability property and the concept of
    well-posedness for the differential equation was also quite a natural consequence
    of the numerical method approaches of the continuous time formulation when $h
    \to 0$. Now, in a real implementation, we cannot put $h = 0$, and we instead need
    an idea of stability for finite $h$. In reality errors can accumulate as we step
    along the solution, and such errors can completely blow up the solution. Chapter
    3 demonstrates such behavior for the FE method. The concept of stability has obviously
    been studied to great depths over the years due to its importance. Even before
    the arrival of the electronic computer, such studies were performed. It is a widely
    researched topic, and we will here limit ourselves to the presentation of linear
    stability theory. There are also intense research going on in the field of nonlinear
    stability, but we will not touch upon that here. Linear stability concerns the
    examination of a test system. In continuous time, we have


    $$\frac{dx(t)}{dt} = Ax(t) \qquad (7.44)$$


    It is common to assume the solution to such systems die down with time, but strictly
    speaking, there are situations one can imagine where this is not true, for example,
    oscillators. We will not overly complicate the discussion but assume here the
    system solution is such $x(t) \to 0$, $t \to \infty$. A numerical approximation
    to this system can then be expected to also die down for large times, $x_n \to
    0$, $n \to \infty$. This is what we mean when talking about stability of the numerical
    system. How can we convince ourselves our numerical method behaves this way? As
    we saw earlier, such a linear system has the solution


    $$x(t) = \sum_{i=1}^m c_i e^{\lambda_i t} q_i$$


    where $\lambda$ is the complex eigenvalue and $q_i$ is the eigenvector of the
    matrix $A$. For simplicity we will assume that all eigenvalues are distinct. For
    this solution to die down with time, we then simply require


    $$\text{Re}(\lambda_i) < 0, \forall i$$


    If we apply an LMS method to the system, we end up with the following sequence:


    $$\sum_{j=-1}^{k-1} \alpha_j x_{n-j} - h \sum_{j=-1}^{k-1} \beta_j A x_{n-j} =
    \sum_{j=-1}^{k-1} (\alpha_j I - h \beta_j A) x_{n-j} = 0$$


    We now need to understand under what conditions the solutions die down with time:


    $$x_n \rightarrow 0, n \rightarrow \infty$$


    From matrix theory, we know we can find a non-singular matrix $Q$ that transforms
    $A$ into a diagonal matrix $\Lambda = Q^{-1}AQ$ whose diagonal elements are equal
    to the eigenvalues of $A$, $\lambda_i$. Let us multiply the sequence by $Q^{-1}$
    from the left and insert $I = QQ^{-1}$ next to $A$.


    $$\sum_{j=-1}^{k-1} (\alpha_j Q^{-1} - h \beta_j Q^{-1} A Q Q^{-1}) x_{n-j} =
    \sum_{j=-1}^{k-1} (\alpha_j Q^{-1} - h \beta_j \Lambda Q^{-1}) x_{n-j} = 0$$


    We then define $x_n = Q y_n$, and we get


    $$\sum_{j=-1}^{k-1} (\alpha_j Q^{-1} - h \beta_j \Lambda Q^{-1}) Q y_{n-j} = \sum_{j=-1}^{k-1}
    (\alpha_j I - h \beta_j \Lambda) y_{n-j} = 0$$


    The sequence $y_n$ can in general be complex. We see these define a sequence of
    $m$ single-variable equations (one for each eigenvalue), and we need to look for
    $y_n \rightarrow 0$, $n \rightarrow \infty$ which is simply a condition that each
    of the sequences


    $$\lim_{n \rightarrow \infty} y_n = 0$$


    We can then simply restate the problem in terms of single-variable sequence


    $$\sum_{j=-1}^{k-1} (\alpha_j - h \beta_j \lambda_i) y_{n-j} = \sum_{j=-1}^{k-1}
    \gamma_j y_{n-j} = 0$$


    and ask what conditions must exist so the solution satisfies the limit. Since
    all the $m$ equations are the same, we only need to look at one of them to find
    the right conditions. We have here assumed the coefficients are constant, and
    for such sequences, there are solutions one can find as follows. Let us write
    $y_n$ in terms of a candidate solution, $y_n = r_i^n$, where $r_i \in \mathbb{C}$
    & $r_i \neq 0$:


    $$\sum_{j=-1}^{k-1} \gamma_j y_{n-j} = \sum_{j=-1}^{k-1} \gamma_j r_i^{n-j} =
    r_i^{n-k+1} \left( \gamma_{-1} r_i^k + \gamma_0 r_i^{k-1} + \dots + \gamma_{k-1}
    \right)$$


    One can now see the sequence is a solution if $r_i$ is a root to the so-called
    characteristic polynomial:


    $$\sum_{j=-1}^{k-1} \gamma_j r_i^{k-j-1} = \gamma_{-1} r_i^k + \gamma_0 r_i^{k-1}
    + \dots + \gamma_{k-1}$$


    In fact one can show that if $r_i$ is a solution to the characteristic polynomial,
    then the following sequences are also solutions:


    $$\{r_i^n\}, \{n r_i^n\}, \{n^2 r_i^n\}, \dots, \{n^{\mu_i-1} r_i^n\}$$


    One can further show the general solution is simple a linear combination of these
    sequences. With this in mind, it should be clear that for the solution to die
    down with time, we must have $|r_i| < 1$ for all roots of the characteristic polynomial.
    We can write the characteristic polynomial in terms of the first and second polynomials
    for the LMS method:


    $$\pi(r, \hat{h}) = \sum_{j=-1}^{k-1} (\alpha_j - \hat{h} \beta_j) r^{k-j-1} =
    \rho(r) - \hat{h} \sigma(r), \hat{h} = h \lambda_i$$


    This polynomial is often called the stability polynomial in the literature. We
    can now define


    > **Definition 7.9**

    > A LMS method is said to be absolutely stable for a given $\hat{h}$ if, for that
    $\hat{h}$, all the roots of $\pi(r, \hat{h})$ are strictly inside the unit circle
    of the complex plane. Otherwise it is said to be absolutely unstable.


    We can see that if $\rho(r)$ and $\sigma(r)$ have the same root, the polynomial
    has the same root. In general this is not true, so the root, $r_0$, can be found
    for a given $\hat{h}$ by


    $$\hat{h}_0 = \frac{\rho(r_0)}{\sigma(r_0)}$$'
