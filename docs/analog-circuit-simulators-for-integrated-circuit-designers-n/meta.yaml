    \n### 6.2.2 小型数字电路仿真策略\n\n对于大型数字电路，需要遵循寄存器传输逻辑（RTL）流程，其中电路使用高级硬件描述语言（RTL）如 Verilog\
    \ 进行描述。这些电路使用基于事件的仿真器进行仿真，这与本书中描述的连续时间仿真器形成对比。然而，偶尔需要相对较小的数字模块和状态机来控制某些模拟电路。这些电路可以使用我们在此讨论的连续时间仿真器进行仿真。对于这些电路，与模拟连续时间情况相比，仿真策略可以简化。\n\
    \n对于小型数字电路，进行直流仿真。\n\n- 查看偏置点，所有数字门输出应处于地或 vdd；否则，某些连接可能无意中处于浮空状态。\n- 对于纯数字电路，运行交流仿真没有意义；相反，应进行瞬态仿真，并应关注时序：\n\
    \    - 信号之间的时序是否正确？如果不正确，某些缓冲器的尺寸可能不合适，无法正确驱动负载。\n    - 边沿速率是否健康？这是负载不合适的另一个指标。健康的含义直接取决于应用。\n\
    \n稳态仿真器通常难以处理具有大量快速切换边沿的电路。打靶法尤其因困难而臭名昭著，这是由于其固有的假设，即最终状态对初始状态的变化依赖性较弱（第 5.5 节），而对于快速变化的边沿，这并不成立，牛顿-拉夫森法可能无法找到合适的解。此外，可能没有简单的方法来观察电路中的周期性，或者周期可能非常长，因此稳态的基本假设没有帮助。大多数情况下，设计者只能局限于瞬态仿真。\n\
    \n## 6.3 大模块仿真\n\n对于较大的模块，最难处理的问题是电路的规模。正如我们在第 2、4 和 5 章中讨论的，现代仿真器具有一些非常巧妙的功能，其中包括非常高效的矩阵求解器，但对于现代片上系统（SOC），模拟部分的器件数量很容易达到数千万，即使如此强大的工具也可能开始不堪重负。这自然不足为奇，因为更强大的计算机能够生成更强大的芯片，这些芯片可以被用来制造更强大的计算机，从而制造出更强大的芯片，如此循环。这是一个指数级的发展努力！\n\
    \n处理这些情况的一个好方法是使用混合模式仿真器，例如，你可以将 Verilog 事件型仿真器与 SPICE 等微分方程求解器混合使用。如果没有这样的工具可用，通常可以通过为模块构建简化的\
    \ Verilog-A 模型来帮助，这些模型可以在原理图视图和 Verilog-A 视图之间切换。这些模型在 SPICE 仿真器中效果良好，可以成为更快推进设计的一种方式。对于\
    \ Verilog-A 视图，请记住包含适当的驱动和负载阻抗。\n\n大模块仿真的关键是确保信号路径在适当的负载和源阻抗下得到完全仿真。如果存在时钟分配路径，也应将其包含在内。\n\
    \n- 带隙基准、偏置电路在启用后是否正常启动？\n- 正确的模块是否获得了正确的偏置电流？\n- 寄存器是否可以正确编程？\n- 所有模块是否都正确启用？\n\
    \n特别注意时钟。如果时钟没有正确启动，数字域中*任何*功能都无法测试，模拟功能也寥寥无几。这是一个如此重要的功能，以至于通常存在时钟覆盖机制，可以使用低频外部时钟直接启用数字核心，绕过所有模拟电路。\n\
    \n### 6.3.1 模拟-数字协同仿真策略\n\n原则上，模拟模块与数字模块协同仿真至少有三种不同的方式：（1）两者都使用类 SPICE 工具，（2）模拟\
    \ → SPICE，数字 → Verilog，以及（3）两者都使用 Verilog 工具。第一种选择由于电路规模庞大很快变得不可行；后两种更常见，其中第二种最为常见。第三种选择偶尔在可能需要简单信号路径分析时使用。它显然无法处理模拟信号，除非使用某种数字化方法。\n\
    \n一个好的设计方法是确保在施加电源电压时所有模拟模块都关闭。这意味着带隙基准和相关电流的基本偏置已经建立。然后，在启动过程中，可以逐个打开模拟模块并建立功能。立即打开所有模块可能导致奇怪的行为，因为电路的状态可能未知，大的意外电流可能开始破坏互连金属。\n\
    \n对于现代模拟模块，通常需要许多数字位来详细控制偏置并调整温度、电压漂移和老化等因素。很容易有数千位来控制模拟电路。自然，数字寄存器无法在模拟仿真器中编程；寄存器编程序列的时间尺度可能为几微秒，而模拟电路的时间尺度可能为皮秒。寄存器的正确功能只能通过\
    \ Verilog 仿真器验证，并且由于它们控制模拟模块，在混合仿真模式环境中进行验证是理想的。\n\n在数据转换器或射频混频器等电路中，通常某处有一个快速时钟来设置芯片功能的时间。为了在内部生成时钟，通常需要一个高达几\
    \ GHz 的精确输入时钟（频率越高，印刷电路板设计上的解决方案成本越高）。在仿真寄存器编程期间，由于涉及不同的时间尺度，需要关闭此时钟。这通常可以通过在时钟输入电路中使用延迟语句轻松实现。\n\
    \n芯片通常生成自己的偏置，其中内部带隙基准、固定电压和电流被生成。一种有用的方法是通过寄存器编程来启动此带隙基准和电流发生器。为了防止偏置模块产生过多噪声，模块中通常存在一个具有大时间常数的大电容。根据电路的不同，这样的模块可能需要几十微秒才能正常启动，在此期间，所有更快的时间常数（如我们刚才提到的时钟）都应关闭，以便可以观察带隙基准的行为。\n\
    \n当偏置已被证明可以正常工作并正确偏置所需的电路模块（需要 100 到 1000 个电流）时，就该打开时钟和输入信号，以便研究详细的模拟行为。\n\n###\
    \ 6.3.2 总结\n\n在本章中，我们简要介绍了使用仿真器和现代代工厂模型设计模块时的良好实践。我们提到验证器件建模非常重要，特别是对于即将上线的工艺节点。现代代工厂的建模团队非常专业且知识渊博，但使用\
    \ BSIM 对现代晶体管进行表征是一项非常依赖测量且耗时的任务，很容易出现不足，尤其是在早期版本中。即使是更成熟的技术，也值得研究器件模型。这样，发现模型不足的可能性较小，而发现自身不足的可能性更大。"
