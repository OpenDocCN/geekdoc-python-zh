    ```\nI<name><n+><n–>[type]<val>\n```\n\n定义一个独立电流源，其电流通过源从节点n+流向节点n-。\n\n> 只有独立源可以定义节点0。所有其他器件都不能。这是为了减少代码中的条件语句数量。\n\
