  md: '# 2.1 Differential Equations: Difference Equations


    One difficulty when using numerical techniques to solve for a systems evolution
    in time comes when the solution at a particular point in time depends on the previous
    time points, when there is some kind of memory in the system. Most often this
    memory effect is expressed in terms of differential equations, and their numerical
    approximation is often a significant source of error. This section will briefly
    review such approximations, focusing on those that are common in circuit analysis.
    With some exceptions, we will discuss what is known as initial value problems
    in numerical analysis.


    We will start with the basic idea behind approximating continuous time/space differential
    equations and look at simple examples with pseudocode suggestions. This we follow
    with differential equations common in circuit analysis that arise from typical
    circuit elements.


    # 2.1.1 Initial Value Problems


    Let us start with a simple first-order equation:


    $$-\frac{u(t)}{R} = C \frac{du(t)}{dt}, \quad u(0) = 1, \qquad (2.1)$$


    where $C$, $R$ are constants. This equation describes a parallel combination of
    a resistor with value $R$ and a capacitor with value $C$ (Fig. 2.1).


    It has a well-known analytical solution:


    $$u(t) = e^{-t/(RC)} \qquad (2.2)$$


    How can we approximate this equation numerically? We recall from basic calculus
    the derivative is defined as


    ![](img/75093da0d280ad52326a78925e5cc403_18_0.png)'
  merge: -1
  pgno: 18
- img_proc: true
  md: '$$\frac{df(t)}{dt} = \lim_{\varepsilon \to 0} \frac{f(t+\varepsilon) - f(t)}{\varepsilon}$$


    It is now natural to find a numerical approximation as


    $$\frac{df}{dt} \approx \frac{\Delta f}{\Delta t} = \frac{f(t+\Delta t) - f(t)}{\Delta
    t}$$


    With this approximation of the derivative, we find for the differential equation


    $$-\frac{u(t)}{R} = C \frac{u(t+\Delta t) - u(t)}{\Delta t}, \quad u(0)=1,$$


    or after rewrite


    $$u(t+\Delta t) = u(t) \left( 1 - \frac{\Delta t}{RC} \right), \quad u(0)=1, \qquad
    (2.3)$$


    This formulation is knowns as Euler''s forward method or sometimes Euler''s explicit
    method. It is perhaps the most straightforward method to implement, but due to
    a notorious instability problem, where the solution blows up due to numerical
    errors, it is almost never used in practical situations. We will look at examples
    of this method in Chap. 4 where the stability issues will be clear.


    There are many ways to formulate a differential equation in terms of difference
    equations, and so many choices are available. Great care must be taken when making
    the choice. Instability, accuracy, and other factors must be understood and accounted
    for. We will here discuss an overview of common ways to implement difference equations
    and mention various issues where appropriate. For a full analysis, we will refer
    to Chap. 7 and the ample literature, and the reader interested in digging deeper
    is encouraged to do so.


    The problem we just discussed is part of a class of problems known as initial
    value problems. At some point in time, often chosen as $t=0$, the solution is
    known, and the problem amounts to finding the solution at later times. This is
    a vast field of study, and many applications are found across science and engineering
    disciplines. One such application is circuit analysis, and in this section, we
    will discuss a handful of popular algorithms encountered in electrical engineering.
    Specifically, we will discuss Euler''s methods, the trapezoidal method, and lastly
    the second-order Gear formulations. These last two methods, together with one
    of the Euler formulations, constitute the vast majority of numerical implementations
    in circuit simulators today. As we mentioned earlier, here we will just go through
    a couple of examples to give the reader a better practical understanding of how
    they work, and for the detailed analysis, we refer to the literature [1-17] and
    Chap. 7.'
