    varieties of this method. We will discuss Krylov subspaces and point out some
    of their properties.


    # Krylov Subspaces


    We assume here we have a Krylov subspace made up of


    $$\mathcal{K}_m(A, v) = \text{span}\{r_0, Ar_0, A^2r_0, \dots, A^{m-1}r_0\}$$


    As we proceed with the iterations, the index, $m$, increases, and so the dimension
    of the subspace is also increasing. The vector $v$ has associated with it a minimal
    polynomial that is non-zero of lowest degree such that $p(A)v = 0$. This degree
    is often called the grade of $v$ with respect to $A$. The grade of $v$ cannot
    exceed the dimension $n$ of the space $R^n$. There are some interesting properties
    of this subspace. We have:


    +   1. $\mathcal{K}_m$ is the subspace of all vectors that can be written as a
    polynomial of $p(A)v$ where $p$ is a polynomial of degree $\le m - 1$.

    2. If we let $\gamma$ denote the grade of $v$, we have $\mathcal{K}_m = \mathcal{K}_\gamma$
    for $m \ge \gamma$.

    3. $\dim(\mathcal{K}_m) = m \iff \text{grade}(v) \ge m$


    The number of steps of a Krylov subspace method is limited by the maximal Krylov
    subspace dimension $d$. A projection process breaks down in step $m$ if no $x_m$
    is found or if it is not unique. We are of course interested in methods that ensure
    existence and uniqueness for each $x_m$ as we step along $m \le d$. A method is
    called *well-defined* if it terminates with the exact solution in step $d$. It
    is called the *finite termination property*. This depends on the properties of
    the matrix $A$. Let us now assume the matrix $A$ is non-singular. We then also
