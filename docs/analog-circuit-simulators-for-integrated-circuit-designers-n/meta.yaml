    # 5.4.6 Transient Accuracy: Summary


    The accuracy of a transient simulation is set by a number of different criteria:


    +   - The circuit itself will amplify errors or the errors will dissipate as a
    function of time.

    - Reltol, the relative tolerance parameter.

    - $v_{nmax}$ how is it determined, globally or locally.


    The actual simulator used should have plenty of information on how the accuracy
    is decided, and the user should spend time making sure to understand the simulator’s
    operation.


    Finally, the traditional sure-fire test is to run the simulation again with the
    appropriate tolerances tightened and compare the end result. The change should
    be less than the tolerated error.


    # 5.5 Periodic Steady-State Solvers


    The situation we have looked at so far involves descriptions and algorithms that
    were developed very early on in the SPICE development and are perhaps the most
    commonly used in engineering groups today. In the early 1970s, people started
    to consider the situation where the circuit was in a steady state where all the
    initial transients had died off. How can such a situation be simulated? If one
    thinks of a driven circuit and we have some nonlinear elements, these elements
    will give rise to harmonics of the fundamental tone, and in a steady state, all
    currents and voltages will only contain harmonics of this fundamental tone. One
    can then formulate the unknowns as unknown phases and magnitudes of all such harmonics.
    In fact the equations can be stated on a harmonic basis. This is in a nut shell
    how the harmonic balance method operates. We will look at a real example of this
    in Sect. 5.5.2. This method was studied by [3] among many others. It turns out
    that for some situations, a ridiculous number of harmonics need to be incorporated,
    particularly if one uses ideal voltage sources with fast rise-fall times. The
    known Gibbs phenomenon will creep up, and the inverse Fourier transform of the
    solution (in other words time domain) will look odd. Instead, what is called the
    shooting method can be used. Here an initial guess at the rate of change for each
    node is attempted, the time evolution is followed for one period, and then the
    algorithm checks if the end condition is the same as the guess of the initial
    condition. If so we have found a periodic solution; if not try again. We will
    look at this method in Sect. 5.5.1. As the wary reader no doubt recognizes, the
    shooting method looks cleaner but is having a much harder time converging in particular
    for large circuits. We will take a look at some of these interesting details.


    As we did before, we will discuss a basic implementation in terms of Python codes.'
- md: '## 5.5.1 Shooting Methods


    There are presently two popular ways to implement steady-state solvers. We will
    discuss what is known as shooting methods in this section. The basic idea is that
    if the circuit is periodic, the response should repeat itself after a fundamental
    period. The other time simulators we have looked at earlier in Sect. 5.4 are known
    as initial value solvers where we start from an often DC-derived operating point
    and simulate along in time. The shooting method has different assumptions. Here
    we assume the signals are periodic in time with a user-defined period, T. At the
    start and end of the period, all signals have not only the same value $v_n(0)
    = v_n(T)$ but also the same curvatures so that $v_n(t) = v_n(t + T)$. One speaks
    of a boundary problem in time. The shooting method takes advantage of this in
    a special way we will describe here. We will not go deep into the mathematical
    derivations here but leave that aspect to Chap. 7 and [1, 3]. Instead we will
    provide a basic motivation of the theory.


    We have as before the governing equation


    $$f(v(t)) = i(v(t)) + \dot{q}(v(t)) + u = 0 \qquad (5.28)$$


    The basic idea behind the shooting method is to note that for a periodic system
    $f$, the system should return to the same state after time $T$. In a sense the
    shooting method is all about finding one correct initial condition, there can
    be many. Let us get a better feel for this by looking at a circuit that has no
    capacitors in it. We can run the amplifier in Fig. 5.1 with a fixed timestep with
    a netlist replacing the resistor input bias with voltage sources.


    ```

    ...

    vinp inp 0 sin(0.5 0.45 1e9 0 0)

    vinn inn 0 sin(0.5 0.45 1e9 0.5e-9 0)

    ...

    ```


    Let us compare the initial state with the final state as shown in Table 5.19.
    Clearly we do not have the correct initial state. But let us simply use the following
    initial state, reflecting the final state in Table 5.19. Let us simulate again
    and we now find in Table 5.20.


    Table 5.19 Initial and final voltage state over a harmonic period with zero initial
    state


    | Node voltage | Initial state | Final state |

    | :--- | :--- | :--- |

    | Inp | 0 | 0.5 |

    | Inn | 0 | 0.5 |

    | Outp | 0 | 0.85 |

    | Outn | 0 | 0.85 |

    | Vs | 0 | -0.2075 |


    Table 5.20 Initial and final voltage state over a harmonic period with specific
    initial conditions


    | Node voltage | Initial state | Final state |

    | :--- | :--- | :--- |

    | Inp | 0.5 | 0.5 |

    | Inn | 0.5 | 0.5 |

    | Outp | 0.85 | 0.85 |

    | Outn | 0.85 | 0.85 |

    | Vs | -0.2075 | -0.2075 |


    Table 5.21 Initial and final voltage state with a capacitor in the load (all initial
    state settings are not shown in the table)


    | Node voltage | Initial state | Final state |

    | :--- | :--- | :--- |

    | Inp | 0.5 | 0.5 |

    | Inn | 0.5 | 0.5 |

    | Outp | 0.83008 | 0.82756 |

    | Outn | 0.87354 | 0.87257 |

    | Vs | -0.207503 | 0.207503 |


    We now see perfect agreement. This is no surprise really since there are no capacitors
    or inductors in the netlist. Hence, there is no memory and each time point only
    depends on itself.


    Let us now complicate the picture by adding capacitors to the outputs.


    ```

    ...

    c1 vdd outp 3e-12

    c2 vdd outn 3e-12

    ...

    ```


    Going through the same iteration we find now the result in Table 5.21. We now
    see we are not quite at the same point in the final state as the initial state.
    One can say the initial transient is still not gone, and one can simulate for
    longer or easily iterate the procedure we outlined a few times and find the correct
    initial condition and a periodic solution. This type of iterations can be made
    systematic and we discuss this next.


    Imagine we are trying to figure out what a system response should look like and
    we are close to finding it. We then have $f(\vec{v}(t)) \approx f(\vec{v}(t+T))$.
    Clearly the final state depends on the initial state as we just saw with the previous
    examples. If we now perturb the approximate solution $\vec{v}(t) = \vec{v}(t)
    + \delta \vec{v}$, we can apply the familiar Newton-Raphson scheme again as long
    as we can figure out the transfer function from the initial state to the final
    one. We will here discuss specifically the case for capacitors and leave the case
    for inductors to the reader in the exercises.


    A change in initial state turns out to be given by (see Chap. 7 for details)


    $$\Delta \boldsymbol{v}_i(t) = (\boldsymbol{I} - \boldsymbol{J}_{\varphi, ij}(T))^{-1}
    (-\boldsymbol{v}_i(t) + \boldsymbol{v}_i(t+T))$$


    where


    $$\boldsymbol{J}_{\varphi, ij}(T) = \frac{\partial \boldsymbol{v}_N}{\partial
    \boldsymbol{v}_0} = \frac{\partial \boldsymbol{v}_N}{\partial \boldsymbol{v}_{N-1}}
    \frac{\partial \boldsymbol{v}_{N-1}}{\partial \boldsymbol{v}_{N-2}} \cdots \frac{\partial
    \boldsymbol{v}_1}{\partial \boldsymbol{v}_0}$$


    is the transfer function we were looking for. Here, the indices indicate timestep,
    so to get to timestep $N$, we need to see how timestep 1 depends on timestep 0
    and how timestep 2 depends on timestep 1 and so on. We show in Chap. 7 for the
    case with capacitors in the netlist that this Jacobian can be calculated at timestep,
    $n$, as


    $$\frac{\partial \boldsymbol{v}(t_n)}{\partial \boldsymbol{v}_0} = \frac{1}{\Delta
    t} \boldsymbol{J}_f^{-1} \frac{\partial \boldsymbol{q}(\boldsymbol{v}(t_{n-1}))}{\partial
    \boldsymbol{v}(t_{n-1})} \frac{\partial \boldsymbol{v}(t_{n-1})}{\partial \boldsymbol{v}_0}$$


    where


    $$\boldsymbol{J}^f = \left[ \frac{\partial \boldsymbol{i}(\boldsymbol{v}(t_n))}{\partial
    \boldsymbol{v}(t_n)} + \frac{1}{\Delta t} \frac{\partial \boldsymbol{q}(\boldsymbol{v}(t_n))}{\partial
    \boldsymbol{v}(t_n)} \right]$$


    is the normal network Jacobian we encountered in Sects. 5.2 and 5.4. In other
    words, as we step in time, we can calculate the Jacobian $\boldsymbol{J}_{\varphi}$
    as we go along.


    This might seem complicated, but let us consider again the example of a circuit
    without memory where there are no capacitors or inductors. Now, since the signals
    everywhere at a given time point $t$ are only dependent on the value of the driving
    source at the same time point, clearly $\boldsymbol{J}_{\varphi, ij} \equiv \boldsymbol{0}$,
    and if we solve the circuit with a DC solver at this time point, we clearly will
    have $\boldsymbol{v}_i(t) = \boldsymbol{v}_i(t+T)$; we then find $\Delta \boldsymbol{v}_i(t)
    = \boldsymbol{0}$. This is the same conclusion we drew previously for our example
    circuit.


    The general idea is now straightforward. We start with a certain initial state
    at $t=0$ we have gotten from either a previous transient simulation or perhaps
    a brave guess; we step through all time steps until $t=T$ calculating the Jacobian
    along the way. When we get to the final state, we use Newton-Raphson with Eq.
    5.29 to calculate a new initial state and start over.


    Let us codify this idea. In Sect. 5.6.7, Code5.7 is an implementation of the shooting
    method concept with capacitors as the dynamic element.


    We can apply the code to the example we used earlier in Fig. 5.1 where we have
    added capacitors $c_1$, $c_2$ to the input and find the netlist


    ```

    *

    vdd vdd 0 0.9

    vss vss 0 0

    vinp in1 0 sin(0 1.95 1e9 0 0)

    vinn in2 0 sin(0 1.95 1e9 0.5e-9 0)

    r1 vdd inp 100

    r2 inp vss 100

    r3 vdd inn 100

    r4 inn vss 100

    r5 vdd outp 100

    r6 vdd outn 100

    c1 in1 inp 1e-11

    c2 in2 inn 1e-11

    c3 vdd outp 1e-12

    c4 vdd outn 1e-12

    i1 vs vss 1e-3

    m1 outn inp vs nch1

    m2 outp inn vs nch1

    .plot v(outp) v(outn)

    netlist 5.14

    ```


    and the result is shown in Fig. 5.36. We can see the algorithm converges after
    just a few iterations.


    ## Multi-tone Simulation


    The example code we just examined contained only one signal tone. It should be
    clear that any number of signals can be implemented in principle. One only has
    to keep track of the beat frequency between them and use it as a fundamental harmonic.
    Let us say, for example, we have a tone of 2GHz and another with frequency


    ![](img/75093da0d280ad52326a78925e5cc403_234_0.png)


    Fig. 5.36 The output of a shooting method implementation of a steady-state simulator;
    (a) shows the output waveform of netlist, and (b) shows the max difference in
    initial state as a function of iteration. The code converges really quickly for
    the very simple example'
  mdcn: '## 5.5.1 打靶法


    目前实现稳态求解器有两种流行的方法。本节我们将讨论所谓的打靶法。其基本思想是，如果电路是周期性的，那么响应在一个基本周期后应该重复自身。我们在第5.4节中讨论过的其他时间仿真器被称为初值求解器，它们通常从一个直流工作点开始，然后在时间上进行仿真。打靶法有不同的假设。这里我们假设信号在时间上是周期性的，周期为用户定义的T。在周期的开始和结束时刻，所有信号不仅具有相同的值
    $v_n(0) = v_n(T)$，而且具有相同的曲率，使得 $v_n(t) = v_n(t + T)$。这被称为时间上的边值问题。打靶法以一种特殊的方式利用了这一点，我们将在下文描述。我们不会在此深入数学推导，而是将这方面内容留给第7章和文献[1,
    3]。相反，我们将提供该理论的基本动机。


    我们之前得到的控制方程为


    $$f(v(t)) = i(v(t)) + \dot{q}(v(t)) + u = 0 \qquad (5.28)$$


    打靶法背后的基本思想是注意到，对于一个周期性系统 $f$，系统在时间 $T$ 后应该返回到相同的状态。从某种意义上说，打靶法就是关于找到一个正确的初始条件，这样的条件可能有很多。让我们通过一个不含电容的电路来更好地理解这一点。我们可以用固定时间步长运行图5.1中的放大器，用网表将电阻输入偏置替换为电压源。


    ```

    ...

    vinp inp 0 sin(0.5 0.45 1e9 0 0)

    vinn inn 0 sin(0.5 0.45 1e9 0.5e-9 0)

    ...

    ```


    让我们比较一下初始状态和最终状态，如表5.19所示。显然，我们没有正确的初始状态。但让我们简单地使用以下初始状态，它反映了表5.19中的最终状态。让我们再次仿真，现在我们在表5.20中看到结果。


    表5.19 零初始状态下，一个谐波周期内的初始和最终电压状态


    | 节点电压 | 初始状态 | 最终状态 |

    | :--- | :--- | :--- |

    | Inp | 0 | 0.5 |

    | Inn | 0 | 0.5 |

    | Outp | 0 | 0.85 |

    | Outn | 0 | 0.85 |

    | Vs | 0 | -0.2075 |


    表5.20 特定初始条件下，一个谐波周期内的初始和最终电压状态


    | 节点电压 | 初始状态 | 最终状态 |

    | :--- | :--- | :--- |

    | Inp | 0.5 | 0.5 |

    | Inn | 0.5 | 0.5 |

    | Outp | 0.85 | 0.85 |

    | Outn | 0.85 | 0.85 |

    | Vs | -0.2075 | -0.2075 |


    表5.21 负载中包含电容时的初始和最终电压状态（所有初始状态设置未在表中显示）


    | 节点电压 | 初始状态 | 最终状态 |

    | :--- | :--- | :--- |

    | Inp | 0.5 | 0.5 |

    | Inn | 0.5 | 0.5 |

    | Outp | 0.83008 | 0.82756 |

    | Outn | 0.87354 | 0.87257 |

    | Vs | -0.207503 | 0.207503 |


    我们现在看到完全一致。这并不奇怪，因为网表中没有电容或电感。因此，没有记忆效应，每个时间点只取决于其自身。


    现在让我们通过向输出端添加电容来使情况复杂化。


    ```

    ...

    c1 vdd outp 3e-12

    c2 vdd outn 3e-12

    ...

    ```


    经过相同的迭代过程，我们现在在表5.21中看到结果。我们现在看到最终状态与初始状态并不完全相同。可以说初始瞬态过程尚未消失，可以仿真更长时间，或者简单地迭代我们概述的几次过程，找到正确的初始条件和周期解。这种类型的迭代可以系统化，我们接下来将讨论这一点。


    想象我们正试图弄清楚系统响应应该是什么样子，并且我们接近找到了它。那么我们有 $f(\vec{v}(t)) \approx f(\vec{v}(t+T))$。显然，最终状态取决于初始状态，正如我们刚刚在前面的例子中看到的。如果我们现在扰动近似解
    $\vec{v}(t) = \vec{v}(t) + \delta \vec{v}$，只要我们能弄清楚从初始状态到最终状态的传递函数，我们就可以再次应用熟悉的牛顿-拉夫森方法。我们将在此专门讨论电容的情况，而将电感的情况留给读者在练习中完成。


    初始状态的变化由下式给出（详见第7章）


    $$\Delta \boldsymbol{v}_i(t) = (\boldsymbol{I} - \boldsymbol{J}_{\varphi, ij}(T))^{-1}
    (-\boldsymbol{v}_i(t) + \boldsymbol{v}_i(t+T))$$


    其中


    $$\boldsymbol{J}_{\varphi, ij}(T) = \frac{\partial \boldsymbol{v}_N}{\partial
    \boldsymbol{v}_0} = \frac{\partial \boldsymbol{v}_N}{\partial \boldsymbol{v}_{N-1}}
    \frac{\partial \boldsymbol{v}_{N-1}}{\partial \boldsymbol{v}_{N-2}} \cdots \frac{\partial
    \boldsymbol{v}_1}{\partial \boldsymbol{v}_0}$$


    就是我们正在寻找的传递函数。这里，索引表示时间步长，因此要到达时间步长 $N$，我们需要看时间步长1如何依赖于时间步长0，时间步长2如何依赖于时间步长1，依此类推。我们在第7章中针对网表中包含电容的情况证明，这个雅可比矩阵可以在时间步长
    $n$ 计算为


    $$\frac{\partial \boldsymbol{v}(t_n)}{\partial \boldsymbol{v}_0} = \frac{1}{\Delta
    t} \boldsymbol{J}_f^{-1} \frac{\partial \boldsymbol{q}(\boldsymbol{v}(t_{n-1}))}{\partial
    \boldsymbol{v}(t_{n-1})} \frac{\partial \boldsymbol{v}(t_{n-1})}{\partial \boldsymbol{v}_0}$$


    其中


    $$\boldsymbol{J}^f = \left[ \frac{\partial \boldsymbol{i}(\boldsymbol{v}(t_n))}{\partial
    \boldsymbol{v}(t_n)} + \frac{1}{\Delta t} \frac{\partial \boldsymbol{q}(\boldsymbol{v}(t_n))}{\partial
    \boldsymbol{v}(t_n)} \right]$$


    是我们在第5.2和5.4节中遇到的常规网络雅可比矩阵。换句话说，当我们随时间步进时，我们可以沿途计算雅可比矩阵 $\boldsymbol{J}_{\varphi}$。


    这可能看起来很复杂，但让我们再次考虑一个没有记忆（即没有电容或电感）的电路示例。现在，由于在给定时间点 $t$ 处所有信号仅取决于同一时间点驱动源的值，显然
    $\boldsymbol{J}_{\varphi, ij} \equiv \boldsymbol{0}$，并且如果我们在此时间点用直流求解器求解电路，显然会有
    $\boldsymbol{v}_i(t) = \boldsymbol{v}_i(t+T)$；那么我们发现 $\Delta \boldsymbol{v}_i(t)
    = \boldsymbol{0}$。这与我们之前对示例电路得出的结论相同。


    现在一般思路很直接。我们从 $t=0$ 时的某个初始状态开始，这个状态来自之前的瞬态仿真或者可能是一个大胆的猜测；我们步进所有时间步长直到 $t=T$，沿途计算雅可比矩阵。当我们到达最终状态时，我们使用牛顿-拉夫森法和公式5.29来计算一个新的初始状态，然后重新开始。


    让我们将这个想法具体化。在第5.6.7节中，代码5.7是打靶法概念的一个实现，其中电容作为动态元件。


    我们可以将代码应用于之前在图5.1中使用的例子，其中我们向输入添加了电容 $c_1$ 和 $c_2$，得到的网表如下


    ```

    *

    vdd vdd 0 0.9

    vss vss 0 0

    vinp in1 0 sin(0 1.95 1e9 0 0)

    vinn in2 0 sin(0 1.95 1e9 0.5e-9 0)

    r1 vdd inp 100

    r2 inp vss 100

    r3 vdd inn 100

    r4 inn vss 100

    r5 vdd outp 100

    r6 vdd outn 100

    c1 in1 inp 1e-11

    c2 in2 inn 1e-11

    c3 vdd outp 1e-12

    c4 vdd outn 1e-12

    i1 vs vss 1e-3

    m1 outn inp vs nch1

    m2 outp inn vs nch1

    .plot v(outp) v(outn)

    netlist 5.14

    ```


    结果如图5.36所示。我们可以看到算法在几次迭代后就收敛了。


    ## 多音仿真


    我们刚刚检查的示例代码只包含一个信号频率。很明显，原则上可以实现任意数量的信号。只需跟踪它们之间的拍频并将其用作基波谐波即可。例如，假设我们有一个2GHz的信号和另一个频率为


    ![](img/75093da0d280ad52326a78925e5cc403_234_0.png)


    图5.36 稳态仿真器打靶法实现的输出；(a)显示了网表的输出波形，(b)显示了初始状态的最大差异随迭代次数的变化。对于这个非常简单的例子，代码收敛得非常快。'
