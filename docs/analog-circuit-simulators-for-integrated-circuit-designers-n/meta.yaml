    often due to sharp edges in the circuitry that if not allowed for can result in
    the familiar Gibbs phenomenon or ringing around the edges where the high-frequency
    content is high.


    # 5.5.9 Accuracy: How to Determine


    A difficult task is to estimate the accuracy of the simulation result. Most methods
    have had their accuracy stepwise analyzed and is characterized as a second-order,
    third-order, or sometime first-order accuracy. This is referring to the local
    estimate at the precise timestep or frequency step or whatever. The global accuracy
    after many steps can be much harder to estimate, and sometimes the errors will
    dissipate and sometimes the errors will persist indefinitely. As we work through
    various systems, we will discuss the topic of accuracy when appropriate. One common
    and extraordinarily time consuming way to verify the accuracy is accurate is to
    rerun the simulation with the tolerances tightened. This cannot be done every
    time since the time required will be much longer to complete the task. In practice,
    what people do is to spot check accuracy from time to time by tightening the required
    tolerance.


    > In practice it is good to verify the accuracy of a system by spot checking and
    resimulate with tighter tolerance'
