    # 7.2 Numerical Solution Techniques of Differential Equations


    We have included the preceding derivation of the standard circuit matrix system
    for the sake of completeness. The standard references contain much more details
    [1–5]. We will in this section offer a brief discussion on solvability of these
    equations. We know from matrix theory that in order for a matrix equation to be
    solvable, the inverse of the matrix needs to exist in general. Obviously, if the
    rhs is zero, the trivial solution (zero) will always be possible (if there’s nothing,
    you get nothing). So a study of solvability of the MNA set of equations is a study
    of the matrix itself and what can be said of its inverse. It is clear that if
    the matrix is diagonal, the solution will exist, so in the weaker case where the
    matrix is strongly diagonal, one can make the case that it probably exists. We
    will spend a few pages here discussing these various interesting cases.


    It is clear in general that a solution to the MNA equations do not exist. We need
    to put additional constraints on the elements and the network to increase the
    probability of a solution. Imagine, for instance, the case where there are two
    independent voltage sources across the same branch with different voltages. This
    will result in an impossible situation with a resulting infinite current. Sometimes
    when setting up simulations in the schematic environment, one can make a mistake
    resulting in precisely this situation. A modern simulator will always complain
    about illegal branch topologies and exit with an error. There is also the complimentary
    problem of two independent current sources in series with different current values.
    This will also often result in an impossible situation. These types of pathological
    situations must not be allowed. They are often called *consistency requirements*.


    The equations we have discussed so far are most generally known as differential-algebraic
    equations (DAE). They are more difficult to solve than the ordinary differential
    equations (ODE) we often think about regarding network systems. An ODE has a long
    history of study and many methods are known. The difficulty with network equations
    comes when the dynamic element matrix $\begin{bmatrix} 0 & A_1 C_{11} A_1^T \
    L_{22} & -C_{22} A_2^T \end{bmatrix}$ is nonlinear or singular. Nonlinear capacitance
    is very common in circuitry where, for example, reverse biased junction diodes
    and effects like channel capacitance variation with gate voltage in MOSFETs can
    significantly complicate the problem. In this book, we have mostly concerned ourselves
    with the simpler problem of constant $L, C$ which makes traditional ODE methods
    working well. With this cautionary tale of the difficulty surrounding the solution
    of general network equations, we will focus the remainder of this section on ODEs.


    # 7.2.1 ODE Solution Methods


    This section will discuss the basic mathematics and theorems surrounding ODEs.
    As in the previous section, we will present the material for the purpose of self-containment.
    We rely on references [3, 4] for much of the presentation.'
