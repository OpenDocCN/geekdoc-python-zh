    $$i_g = \frac{\partial Q_g}{\partial v_{gb}} \frac{\partial v_{gb}}{\partial t}
    + \frac{\partial Q_g}{\partial v_{gd}} \frac{\partial v_{gd}}{\partial t} + \frac{\partial
    Q_g}{\partial v_{gs}} \frac{\partial v_{gs}}{\partial t}$$


    $$i_b = \frac{\partial Q_b}{\partial v_{bg}} \frac{\partial v_{bg}}{\partial t}
    + \frac{\partial Q_b}{\partial v_{bd}} \frac{\partial v_{bd}}{\partial t} + \frac{\partial
    Q_b}{\partial v_{bs}} \frac{\partial v_{bs}}{\partial t}$$


    $$i_d = \frac{\partial Q_d}{\partial v_{dg}} \frac{\partial v_{dg}}{\partial t}
    + \frac{\partial Q_d}{\partial v_{db}} \frac{\partial v_{db}}{\partial t} + \frac{\partial
    Q_d}{\partial v_{ds}} \frac{\partial v_{ds}}{\partial t}$$


    $$i_s = \frac{\partial Q_s}{\partial v_{sg}} \frac{\partial v_{sg}}{\partial t}
    + \frac{\partial Q_s}{\partial v_{sb}} \frac{\partial v_{sb}}{\partial t} + \frac{\partial
    Q_s}{\partial v_{sd}} \frac{\partial v_{sd}}{\partial t}$$


