    \n其中 $x$ 是一个 $m$ 维实向量，向量 $x_0$ 是在时间 $t = 0$ 时的已知状态。\n\n显然，并非所有 IVP 都有解，有时可能存在多个解。我们称这些为特定方程的存在性和唯一性性质。在我们深入这些性质之前，我们需要更具体地说明我们讨论的是哪种解，以及它们在什么定义域（空间和时间区域）上定义。让我们首先定义域\
