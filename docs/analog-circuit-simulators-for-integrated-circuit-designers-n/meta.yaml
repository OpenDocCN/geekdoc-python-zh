- md: '## About the Author


    **Mikael Sahrling** is a principal electronics engineer working on developing
    high-speed electrical interfaces for the test and measurement and communication
    industries. He has about 25 years of experience developing integrated circuits.
    Mikael has worked for many of the leading analog chip companies like Semtech Corporation,
    Maxim Integrated, Tektronix Inc., and IPG Photonics where he is the lead analog
    design engineer. His special interest is in high-speed active and passive design
    with a bandwidth of several tens of gigahertz.


    He is the author of “Fast Techniques for Integrated Circuit Design” published
    by Cambridge University Press in August 2019.


    ## Chapter 1

    Introduction


    **Abstract** This chapter will introduce the general subject matter to the reader
    with no assumption regarding the reader’s experience level. It will highlight
    the engineering environment where the tools are used and the importance of the
    subject itself both historically and in a modern engineering environment.


    ### 1.1 Background


    The semiconductor industry is one of the marvels of modern society. We are constantly
    being presented with novel machines that utilize the extraordinary progress the
    industry has kept up over some seven decades of intense development. It was around
    1965 that one of the Intel founders, Gordon Moore, coined what has become known
    as Moore’s law stating that for every 2 years, the number of transistors in a
    given area is doubling. It is an exponential scaling law that has kept up until
    recently (Fig. 1.1).


    This is an extraordinary development driven by consumer demand for higher and
    higher data processing. The advent of streaming where full movies can be viewed
    as they are downloaded to a particular device requires enormous data delivery
    rates. In the beginning of this industry epoch, a commercial integrated circuit
    had a few hundred transistors at most. Compare this to the latest tens of billions
    of devices in a modern central processing unit (CPU) integrated circuit.


    One of the fundamental units one measures these devices with is the so-called
    transistor gate length. It is as presently known to the author at 3 nm scale with
    the latest so-called gate-all-around technology. A typical atom has perhaps a
    size scale of 0.1 nm, just 30 times smaller. We are at the realm of quantum physics
    for these devices. This is not new. Quantum effects like tunneling, where an electron
    can appear at the other side of a barrier with a certain probability, has been
    a source of the so-called leakage current for more than a decade.


    Imagine now a modern integrated circuit or chip in industry parlance with some
    billion devices on it. The key development step of these products is the mask-making
    step. There might be some 50 masks needed for the latest technology, and on average
    such masks cost a few 100,000 US dollars each. This cost is a large portion of
    the design engineering cost, and the total cost of designing such chips can then
    be of the order tens of millions of US dollars. This is before mass production
    starts. If something is wrong with the design, the masks need to be remade. How
    can one be reasonably sure that such enormous chips will be working when it comes
    back from the first fabrication run so a costly mask production step is avoided?
    The answer lies in the use of simulators, both digital, for the core data processing,
    and analog ones for the interfaces to the outside world among other things.


    Fig. 1.1 Moore’s law exemplified by the number of transistors per CPU over the
    years. There are many similar scaling relationships, but this one shows that the
    transistor count in CPUs double every 2 years or so


    ![](img/75093da0d280ad52326a78925e5cc403_14_0.png)


    ### 1.2 The Arrival of Simulators


    Using simulators to prove out electronic circuitry is an old idea. The earliest
    attempts can be found in the 1960s where the US Department of Defense supported
    circuit simulation developments that were proprietary. The modern attempts to
    make simulators publicly available were started by researchers at the University
    of California at Berkeley, where the extraordinary vision by a handful of young
    professors and researchers has developed what became known as Simulation Program
    with Integrated Circuit Emphasis or SPICE. It was not without controversy in the
    beginning. A lot of contemporaries felt that simulators could not possibly capture
    the operations well and the effort was a waste of time. Instead the idea was to
    prototype the design using breadboards and discrete devices and then miniaturize
    on a chip. The Berkeley team persisted and it is now considered the original master
    code, and most simulators after this use many of the same features SPICE introduced
    to solve numerical problems. In fact the word spice has become a verb in that
    one often says of simulating a circuit as “spiceing” a circuit. Naturally many
    decades of innovation have produced a code that is quite a bit more complex than
    the first versions.


    ### 1.3 This Book


    People often ask me why I would write a book about simulators: “You’re a design
    engineer!” There are basically two answers to this question: first of all, I think
    it is important to have at least a basic understanding of the tools we use in
    our work. If one understands their strengths and weaknesses, one becomes a much
    better user. Second, the inner workings of these tools are really fascinating
    in their own right and a lot of fun to know more about.


    This book concerns the inner workings of analog simulators and describes how various
    difficult problems that arose in their development were solved. The book shows
    the basics of the algorithms using Python as the code environment of choice. Python
    is readily available for virtually all operating systems, and the code examples
    can thus be run and examined pretty much everywhere. It is also unusually easy
    to both read and use the code itself. The codes are not intended to be the starting
    point for any full-fledged professional simulator. They are simple code test benches
    for the interested reader. All the algorithms behind the precise code implementation
    can be found in journals and books available to the public. This book will not
    present any secret algorithms or trade secret to the best of the authors’ knowledge.
    Instead the intention is to show the basic working principles of the core algorithms.


    Furthermore, the presentation is based on really simple examples rather than a
    detailed mathematical theory. This is so the basic ideas can be grasped quicker,
    and we leave the more detailed mathematical theory and its development to Chap.
    7 that follows a more traditional and rigorous approach to the material.


    It is the hope of the author that the provided gentle mathematics and plenty of
    code examples will inspire the reader to explore more on his or her own when it
    comes to simulators and what to watch out for and learn how to optimize their
    use. In addition to the provided code examples, the book also presents the results
    of professional simulators to ensure the reader we are on firm ground. For the
    curious mind, the basics of the formal mathematical theory behind the simulator
    algorithms can be found in one of the later chapters. They are there for the sake
    of completeness, and they contain nothing new for the sophisticated reader.


    Toward the end, one of the chapters concerns a more subjective approach to designing
    analog parts of integrated circuits using analog simulators. It is based on the
    authors’ many years in the semiconductor industry and incorporates lessons learned
    from one particular perspective. Other experienced engineers can have a somewhat
    different view on how to approach the design and production of mass-marketable
    chips. In either case, the approach the author describes is hardly controversial
    and has resulted in many successful market introductions of integrated circuits.


    Chapter 2 presents a review of some of the basic numerical schemes frequently
    used in simulators. Chapter 3 follows with an overview of device modeling, specifically
    the complementary metal-oxide-semiconductor (CMOS) transistor.'
  mdcn: '## 关于作者


    **米卡埃尔·萨尔林** 是一名首席电子工程师，致力于为测试测量和通信行业开发高速电气接口。他在集成电路开发领域拥有约25年经验。米卡埃尔曾在多家领先的模拟芯片公司工作，如Semtech公司、Maxim
    Integrated、Tektronix Inc.和IPG Photonics，并在后者担任首席模拟设计工程师。他的特别兴趣在于带宽达数十吉赫兹的高速有源和无源设计。


    他是《Fast Techniques for Integrated Circuit Design》一书的作者，该书由剑桥大学出版社于2019年8月出版。


    ## 第1章

    引言


    **摘要** 本章将向读者介绍一般主题内容，不假设读者的经验水平。它将重点介绍使用这些工具的工程环境，以及该主题本身在历史上和现代工程环境中的重要性。


    ### 1.1 背景


    半导体行业是现代社会的奇迹之一。我们不断接触到利用该行业在约七十年密集发展中取得的非凡进步而制造的新颖机器。大约在1965年，英特尔创始人之一戈登·摩尔提出了后来被称为摩尔定律的理论，指出每2年，给定面积内的晶体管数量就会翻倍。这是一条指数级缩放定律，一直持续到最近（图1.1）。


    这是由消费者对更高数据处理能力的需求所驱动的非凡发展。流媒体的出现，使得完整电影可以在下载到特定设备时观看，这需要巨大的数据传输速率。在这个行业时代的初期，一个商用集成电路最多只有几百个晶体管。与之相比，现代中央处理器（CPU）集成电路中最新的器件数量已达数百亿。


    测量这些器件的基本单位之一是所谓的晶体管栅极长度。据作者目前所知，最新的所谓全环绕栅极技术已达到3纳米尺度。一个典型原子的尺寸可能约为0.1纳米，仅小30倍。我们已进入这些器件的量子物理领域。这并不新鲜。量子效应，如隧穿（电子以一定概率出现在势垒另一侧），十多年来一直是所谓漏电流的来源。


    现在想象一下现代集成电路，或业界所称的芯片，上面有数十亿个器件。这些产品的关键开发步骤是掩模制造步骤。最新的技术可能需要约50个掩模，平均每个掩模成本为几十万美元。这笔成本占设计工程成本的很大一部分，因此设计此类芯片的总成本可能达到数千万美元。这还是在大规模生产开始之前。如果设计有问题，掩模就需要重新制作。如何合理地确保如此巨大的芯片在第一次制造后就能正常工作，从而避免昂贵的掩模生产步骤？答案在于使用模拟器，包括用于核心数据处理的数字模拟器，以及用于与外界接口的模拟模拟器等。


    图1.1 摩尔定律的例证：多年来每个CPU中的晶体管数量。有许多类似的缩放关系，但此图显示CPU中的晶体管数量大约每2年翻一番。


    ![](img/75093da0d280ad52326a78925e5cc403_14_0.png)


    ### 1.2 模拟器的出现


    使用模拟器来验证电子电路是一个古老的想法。最早的尝试可以追溯到20世纪60年代，当时美国国防部支持了专有的电路模拟开发。现代将模拟器公开的尝试始于加州大学伯克利分校的研究人员，那里少数年轻教授和研究人员的非凡远见发展出了后来被称为“以集成电路为重点的模拟程序”或SPICE的工具。起初并非没有争议。许多同时代的人认为模拟器不可能很好地捕捉电路操作，这种努力是浪费时间。相反，他们的想法是使用面包板和分立器件制作设计原型，然后在芯片上小型化。伯克利团队坚持了下来，现在它被认为是原始的主代码，之后的大多数模拟器都使用了SPICE引入的许多相同特性来解决数值问题。事实上，“spice”这个词已经成为一个动词，人们常说模拟电路是“spicing”一个电路。当然，几十年的创新产生了一个比最初版本复杂得多的代码。


    ### 1.3 本书


    人们经常问我为什么要写一本关于模拟器的书：“你是个设计工程师！”这个问题基本上有两个答案：首先，我认为至少对我们工作中使用的工具有基本的了解很重要。如果一个人理解了它们的优缺点，他就会成为一个更好的使用者。其次，这些工具的内部工作原理本身就非常迷人，了解更多也很有趣。


    本书涉及模拟模拟器的内部工作原理，并描述了在其开发过程中出现的各种难题是如何解决的。本书使用Python作为首选代码环境来展示算法的基础。Python几乎适用于所有操作系统，因此代码示例几乎可以在任何地方运行和检查。代码本身也异常易于阅读和使用。这些代码并非旨在成为任何成熟专业模拟器的起点。它们是为感兴趣的读者准备的简单代码测试平台。所有精确代码实现背后的算法都可以在公开的期刊和书籍中找到。据作者所知，本书不会介绍任何秘密算法或商业秘密。相反，其目的是展示核心算法的基本工作原理。


    此外，演示基于非常简单的例子，而不是详细的数学理论。这样可以更快地掌握基本思想，我们将更详细的数学理论及其发展留给第7章，该章采用更传统和严谨的方法来处理这些材料。


    作者希望，所提供的温和数学和大量代码示例能够激励读者在模拟器及其注意事项方面进行更多自主探索，并学习如何优化其使用。除了提供的代码示例外，本书还展示了专业模拟器的结果，以确保读者我们建立在坚实的基础上。对于好奇的读者，模拟器算法背后的正式数学理论基础可以在后面的章节中找到。它们是为了完整性而存在的，对于经验丰富的读者来说，其中不包含任何新内容。


