    # Chapter 3

    Modeling Techniques


    **Abstract** In order to fully utilize a simulator, one needs to have an understanding
    of the devices the simulator is modeling and the difficulties that might hide
    underneath the hood. This chapter will provide an overview of the CMOS transistor
    and briefly describe bipolar implementations with associated challenges. We will
    go into the basic physical description in some detail in order to connect such
    a model with the first computer models we encounter in Sect. 3.1.4. We will highlight
    the difficulties and what the designer needs to keep in mind when simulating circuits.
    We are making the assumption the reader has already encountered the basic physical
    properties of the transistors, and we present this as a review, and for the details,
    the reader should consult the references.


    # 3.1 CMOS Transistor Model


    The CMOS transistor is by far the most used active device in modern integrated
    circuits. It might seem deceptively simple in its construction, in particular
    if one is looking at popular text books. It is however quite difficult to model
    [1–15]. The BSIM (Berkeley short-channel IGFET Model) which exist in several different
    levels of sophistication can take advantage of hundreds of parameters when characterizing
    a transistor. In this section, we will motivate why this is so, and we will start
    with a basic review of the physics of these devices. This is followed by a section
    on the BSIM models where we follow the model development over the years. The BSIM
    starting point in the late 1980s is quite similar to the physical model we will
    discuss in Sect. 3.1.2 and and as such is a good transition from simple analytical
    modeling to more complex numerical ones. The BSIM development is also an interesting
    study in how improvements are done gradually as the need arises and how deeper
    understanding of the transistor devices and their construction develop with time.'
- md: '## 3.1.1 CMOS Transistor Basics


    Broadly speaking, a CMOS transistor changes its behavior significantly as the
    terminal voltage changes. The device goes through several operating regions where
    different mechanisms are responsible for its response. This has traditionally
    caused some problems when modeling the devices, which we will describe in Sect.
    3.1.4. Here, we start with a broad description of the gate capacitance as we change
    the gate voltage (see Fig. 3.1).


    > To improve accuracy of simulations, bias the transistor in such a way it stays
    in one region of operation.


    The voltage across the structure is set by the parameter $V_g$. For negative voltage,
    the bottom plate (substrate) will attract the majority carriers, and the capacitance
    is simply


    $$C_g = \frac{4\pi\epsilon}{t_{ox}} \quad (3.1)$$


    where $\epsilon$ is the permittivity of the insulator material. This mode is referred
    to as accumulation mode. When the voltage $V_g$ is increasing, it will push away
    the positive charges and create a so-called space charge region. The result of
    this is the effective thickness of the capacitor dielectric is increasing, causing
    a reduction in capacitance. This is called the depletion region. As the voltage
    $V_g$ is increasing further past a so-called threshold voltage $V_t$, an inversion
    layer is eventually created at the interface between the semiconductor material
    and the insulator. As a result, the effective capacitance is again increasing
    since the distance between the capacitor plates (where the charges are accumulating)
    is decreasing. We end up with a capacitance-voltage relationship as in Fig. 3.2.


    This is all well-known, and here we use it as an example of the complex behavior
    of a MOSFET transistor as its terminal voltages are changing. Please note in Fig.
    3.2 there is a frequency component to this simple description that changes the
    capacitance we just outlined.


    ## 3.1.2 CMOS Transistor Physics


    In order to better follow the discussion in the modeling implementation in Chaps.
    4 and 5, we will provide a brief overview of a more detailed model of a CMOS transistor
    where we make a basic two-dimensional approximation. The details we will leave
    to the references. We will along the way take a look at the important threshold
    voltage derivation among other things. These calculations will serve to motivate
    some of the model assumptions we will discuss in Sect. 3.1.4. We will follow what
    is known as the surface potential approximation. This is a convenient starting
    point for the transistor behavior in the various operating regions.


    Surface potential models are based on the surface potential solution to Poisson’s
    equation for a MOS transistor. The main difference to earlier models, like the
    first versions of BSIM, is instead of having the transistor operation divided
    into separate operating regions, the solution is continuous across all regions,
    and there is no need for various transition region modelings. The disadvantage
    is that the governing equation is inherently implicit and it can take time to
    find an acceptable solution. We will do a quick review of the basics in this section.
    We start with a basic two-dimensional approximation and show a way to solve it
    implicitly. We finally discuss the consequences for the design engineer. These
    are well-known calculations and we choose to follow [1] fairly closely.


    Let us start the modeling by referring to Fig. 3.3. Here we will follow the estimation
    analysis flow [4] without spending too much time on the actual calculations since
    they have been done at other places in great detail.


    We denote by $\psi(x,y)$ the intrinsic potential at $(x,y)$ with respect to the
    intrinsic potential of the bulk substrate (see Fig. 3.3). We define a voltage
    $V$ which is positive in the channel direction and is zero at the source terminal.
    There is a more precise technical definition of $V$, and the reader is encouraged
    to find out in for example [1]. For our review purposes, here it is sufficient
    to define it the way we have it.


    **Simplify** First let us simplify the problem so it becomes manageable for a
    simple model.


    We will assume:


    - The gradual channel approximation – the variation of the electric field in the
    $y$-direction – is much smaller than the variation in the $x$-direction [5]. We
    can then reduce the 2D Poisson equation to 1D slices. This approximation is valid
    for most of the channel regions except beyond pinch off.

    - The hole current and generation and recombination currents are negligible. This
    means the current is the same along the direction of the channel ($y$-direction).

    - We assume the voltage $V$ is independent of $x$ so $V = V(y)$. It is motivated
    by the fact that the current flows mostly in the source-drain or $y$-direction.
    At the source end $V(0) = 0$ and at the drain, we have $V(y = L) = V_{ds}$.

    - The inversion layer is really thin leading to what is known as the charge sheet
    model where the electric field changes abruptly across the inversion region. Denote
    that $V_{fb}$ is the flatband voltage, $\varepsilon_{si}$ the silicon permittivity,
    $q$ the electron charge, $N_a$ the doping concentration, and $\psi_s = \psi(0,y)$.
    The expression for the inversion charge becomes then


    $$Q_i = -C_{ox} \left( V_{gs} - V_{fb} - \psi_s \right) - \sqrt{2 \varepsilon_{si}
    q N_a \psi_s}$$


    These assumptions lead to the following expression for the electron concentration
    at $(x,y)$.


    ## 3.1 CMOS Transistor Model


    $$n(x,y) = \frac{n_i^2}{N_a} e^{q(\psi - V)/kT}$$


    From Maxwell''s equation, we know in the static approximation that $E = \nabla
    \psi$ and $\nabla \cdot \boldsymbol{D} = en(x,y)$ we can find an expression for
    the electric field:


    $$E^2 = \left(\frac{d\psi}{dx}\right)^2 = \frac{2kTN_a}{\varepsilon_{si}} \left(
    e^{-q\psi/kT} + \frac{q\psi}{kT} - 1 \right) + \frac{n_i^2}{N_a^2} \left( e^{-qV/kT}
    \left( e^{q\psi/kT} - 1 \right) - \frac{q\psi}{kT} \right)$$


    The surface inversion occurs when


    $$\psi(0,y) = V(y) + 2\psi_B$$


    where $2\psi_B = \psi_{s,s}$ is the surface potential at the source terminal.


    We can now assert the electron current density at a point $(x,y)$ to be


    $$J_n(x,y) = -q\mu_{eff} n(x,y) \frac{dV(y)}{dy}$$


    where the generation and recombination currents have been neglected. $\mu_{eff}$
    is the effective electron mobility in the channel based on averaging over the
    channel potentials. The total current at a point $y$ along the channel is obtained
    by multiplying the above equation with the channel width $W$ and integrating over
    the depth of the current carrying layer. The integration is carried out from $x
    = 0$ to $x_i$ where $x_i$ is a certain depth into the p-type substrate; the precise
    value is not important since the integrand is near zero in the bulk of the substrate.
    We have


    $$I_{ds} = W\mu_{eff} \frac{dV(y)}{dy} \int_0^{x_i} qn(x,y) dx$$


    **Solve** The expression inside the integral is simply a charge:


    $$Q_i = -\int_0^{x_i} qn(x,y) dx$$


    The expression for


    $$I_{ds} = -W \mu_{eff} \frac{dV(y)}{dy} Q_i(V)$$


    In the last step, we have changed variables from $y$ to $V$ and can express $Q_i$
    as a function of $V$ directly. We now take this idea one step further and express
    $V = V(\psi_s)$ such that $Q_i = Q_i(\psi_s)$.


    One of our simplifications leads to the current in the channel and is independent
    of $y$. We can therefore integrate this expression and find


    $$I_{ds} L = -W \mu_{eff} \int_{\psi_{s,s}}^{\psi_{s,d}} \frac{dV(\psi_s)}{d\psi_s}
    Q_i(\psi_s) d\psi_s$$


    The boundary value $\psi_s$ is determined by two coupled equations


    $$V_{gs} - V_{fb} = \psi_s - \frac{Q_s}{C_{ox}}$$


    or the gate bias equation


    $$Q_s = -\varepsilon_{si} E(\psi_s)$$


    or Gauss''s law. One finds for the combined equation after some algebra and assuming
    $q\psi_s/kT \gg 1$


    $$V_{gs} = V_{fb} + \psi_s + \frac{\sqrt{2\varepsilon_{si}kTN_a}}{C_{ox}} \sqrt{\frac{q\psi}{kT}
    + \frac{n_i^2}{N_a^2} e^{q(\psi_s - V)/kT}}$$


    This is an implicit equation for $\psi_s(V)$ given the voltages $V_g, V_s$. Their
    complexity requires numerical solution strategies in general. Please note the
    fact they are valid for any combination $V_{gs}, V_{ds}$ and as such do not require
    specific regions to be highlighted. We can rewrite the equation, so we express
    $V(\psi_s)$ and we find then


    $$V = \psi_s - \frac{kT}{q} \ln \left[ \frac{N_a^2}{n_i^2} \frac{C_{ox}^2 (V_{gs}
    - V_{fb} - \psi_s)^2}{2\varepsilon_{si}kTN_a} - \frac{q\psi_s}{kT} \right]$$


    Its derivative is


    $$\frac{dV}{d\psi_s} = 1 + 2 \frac{kT}{q} \frac{C_{ox}^2 (V_{gs} - V_{fb} - \psi_s)
    + \varepsilon_{si}qN_a}{C_{ox}^2 (V_{gs} - V_{fb} - \psi_s)^2 - 2\varepsilon_{si}kTN_a}$$'
  mdcn: '## 3.1.1 CMOS晶体管基础


    广义上讲，CMOS晶体管的行为会随着端电压的变化而发生显著改变。该器件会经历几个不同的工作区域，每个区域的响应机制各不相同。这在传统上给器件建模带来了一些问题，我们将在第3.1.4节中描述。在此，我们首先概述一下栅极电容随栅极电压变化的情况（见图3.1）。


    > 为提高仿真精度，应将晶体管偏置在某一特定工作区域内。


    结构两端的电压由参数 $V_g$ 设定。对于负电压，底板（衬底）会吸引多数载流子，此时电容仅为


    $$C_g = \frac{4\pi\epsilon}{t_{ox}} \quad (3.1)$$


    其中 $\epsilon$ 是绝缘材料的介电常数。这种模式称为积累模式。当电压 $V_g$ 增加时，它会排斥正电荷并形成所谓的空间电荷区。其结果是电容器介质的有效厚度增加，导致电容减小。这称为耗尽区。随着电压
    $V_g$ 进一步增加并超过所谓的阈值电压 $V_t$，最终会在半导体材料与绝缘体的界面处形成反型层。因此，有效电容再次增加，因为电容器极板（电荷积累处）之间的距离减小了。我们最终得到如图3.2所示的电容-电压关系。


    这些都是众所周知的，我们在此用它作为MOSFET晶体管端电压变化时复杂行为的一个例子。请注意，图3.2中这个简单描述还包含一个频率分量，它会改变我们刚才概述的电容。


    ## 3.1.2 CMOS晶体管物理


    为了更好地理解第4章和第5章建模实现中的讨论，我们将简要概述一个更详细的CMOS晶体管模型，其中我们进行了基本的二维近似。具体细节将留给参考文献。在此过程中，我们将重点考察重要的阈值电压推导等内容。这些计算将为我们讨论第3.1.4节中的一些模型假设提供依据。我们将采用所谓的表面势近似法。这是分析晶体管在不同工作区域行为的一个便捷起点。


    表面势模型基于MOS晶体管泊松方程的表面势解。与早期模型（如BSIM的早期版本）的主要区别在于，它不是将晶体管工作划分为独立的工作区域，而是解在所有区域都是连续的，无需对各种过渡区域进行建模。其缺点在于控制方程本质上是隐式的，找到可接受的解可能需要时间。我们将在本节快速回顾基础知识。我们从基本的二维近似开始，并展示一种隐式求解方法。最后，我们将讨论这对设计工程师的意义。这些都是众所周知的计算，我们选择相当严格地遵循文献[1]。


    让我们从图3.3开始建模。我们将遵循估计分析流程[4]，而不会在实际计算上花费太多时间，因为这些计算已在其他地方被详细完成。


    我们用 $\psi(x,y)$ 表示 $(x,y)$ 处相对于体衬底本征电势的本征电势（见图3.3）。我们定义一个电压 $V$，它在沟道方向为正，并且在源端为零。$V$
    有一个更精确的技术定义，鼓励读者在例如文献[1]中查找。出于我们的回顾目的，这里按我们定义的方式就足够了。


    **简化** 首先，我们简化问题，使其成为一个简单模型可以处理的形式。


    我们将假设：


    - 渐变沟道近似——电场在 $y$ 方向的变化远小于在 $x$ 方向的变化[5]。这样我们可以将二维泊松方程简化为一维切片。除了夹断点之后，这个近似对大多数沟道区域都是有效的。

    - 空穴电流以及产生和复合电流可以忽略不计。这意味着电流在沟道方向（$y$ 方向）上是相同的。

    - 我们假设电压 $V$ 与 $x$ 无关，因此 $V = V(y)$。其依据是电流主要在源-漏或 $y$ 方向流动。在源端 $V(0) = 0$，在漏端，我们有
    $V(y = L) = V_{ds}$。

    - 反型层非常薄，导致所谓的电荷片模型，其中电场在反型区域两侧发生突变。记 $V_{fb}$ 为平带电压，$\varepsilon_{si}$ 为硅的介电常数，$q$
    为电子电荷，$N_a$ 为掺杂浓度，$\psi_s = \psi(0,y)$。反型电荷的表达式变为


    $$Q_i = -C_{ox} \left( V_{gs} - V_{fb} - \psi_s \right) - \sqrt{2 \varepsilon_{si}
    q N_a \psi_s}$$


    这些假设导致 $(x,y)$ 处电子浓度的以下表达式。


    ## 3.1 CMOS晶体管模型


    $$n(x,y) = \frac{n_i^2}{N_a} e^{q(\psi - V)/kT}$$


    根据麦克斯韦方程，我们知道在静态近似下 $E = \nabla \psi$ 且 $\nabla \cdot \boldsymbol{D} = en(x,y)$，我们可以找到电场的表达式：


    $$E^2 = \left(\frac{d\psi}{dx}\right)^2 = \frac{2kTN_a}{\varepsilon_{si}} \left(
    e^{-q\psi/kT} + \frac{q\psi}{kT} - 1 \right) + \frac{n_i^2}{N_a^2} \left( e^{-qV/kT}
    \left( e^{q\psi/kT} - 1 \right) - \frac{q\psi}{kT} \right)$$


    表面反型发生在


    $$\psi(0,y) = V(y) + 2\psi_B$$


    其中 $2\psi_B = \psi_{s,s}$ 是源端的表面势。


    我们现在可以断言 $(x,y)$ 点的电子电流密度为


    $$J_n(x,y) = -q\mu_{eff} n(x,y) \frac{dV(y)}{dy}$$


    其中忽略了产生和复合电流。$\mu_{eff}$ 是基于沟道电势平均的有效沟道电子迁移率。沿沟道 $y$ 点的总电流通过将上述方程乘以沟道宽度 $W$ 并对电流承载层的深度进行积分得到。积分从
    $x = 0$ 到 $x_i$ 进行，其中 $x_i$ 是进入p型衬底的某个深度；精确值并不重要，因为被积函数在衬底主体中接近于零。我们有


    $$I_{ds} = W\mu_{eff} \frac{dV(y)}{dy} \int_0^{x_i} qn(x,y) dx$$


    **求解** 积分内的表达式就是一个电荷：


    $$Q_i = -\int_0^{x_i} qn(x,y) dx$$


    表达式为


    $$I_{ds} = -W \mu_{eff} \frac{dV(y)}{dy} Q_i(V)$$


    在最后一步，我们已经将变量从 $y$ 改为 $V$，并且可以直接将 $Q_i$ 表示为 $V$ 的函数。我们现在将这个想法更进一步，将 $V = V(\psi_s)$
    表示出来，使得 $Q_i = Q_i(\psi_s)$。


    我们的一个简化导致沟道中的电流与 $y$ 无关。因此我们可以积分这个表达式并得到


    $$I_{ds} L = -W \mu_{eff} \int_{\psi_{s,s}}^{\psi_{s,d}} \frac{dV(\psi_s)}{d\psi_s}
    Q_i(\psi_s) d\psi_s$$


    边界值 $\psi_s$ 由两个耦合方程确定


    $$V_{gs} - V_{fb} = \psi_s - \frac{Q_s}{C_{ox}}$$


    或栅极偏置方程


    $$Q_s = -\varepsilon_{si} E(\psi_s)$$


    或高斯定律。经过一些代数运算并假设 $q\psi_s/kT \gg 1$，可以得到组合方程


    $$V_{gs} = V_{fb} + \psi_s + \frac{\sqrt{2\varepsilon_{si}kTN_a}}{C_{ox}} \sqrt{\frac{q\psi}{kT}
    + \frac{n_i^2}{N_a^2} e^{q(\psi_s - V)/kT}}$$


    这是一个关于 $\psi_s(V)$ 的隐式方程，给定电压 $V_g, V_s$。它们的复杂性通常需要数值求解策略。请注意，它们对任何 $V_{gs}, V_{ds}$
    的组合都有效，因此不需要突出特定区域。我们可以重写方程，将 $V(\psi_s)$ 表示出来，然后我们发现


    $$V = \psi_s - \frac{kT}{q} \ln \left[ \frac{N_a^2}{n_i^2} \frac{C_{ox}^2 (V_{gs}
    - V_{fb} - \psi_s)^2}{2\varepsilon_{si}kTN_a} - \frac{q\psi_s}{kT} \right]$$


    其导数为


    $$\frac{dV}{d\psi_s} = 1 + 2 \frac{kT}{q} \frac{C_{ox}^2 (V_{gs} - V_{fb} - \psi_s)
    + \varepsilon_{si}qN_a}{C_{ox}^2 (V_{gs} - V_{fb} - \psi_s)^2 - 2\varepsilon_{si}kTN_a}$$'
