    \ & v_a & v_b & i_C \\\\ v_a & & & -1 \\\\ v_b & & & +1 \\\\ i_C & +j\\omega C\
    \ & -j\\omega C & -1 \\end{pmatrix}$$ (4.23)\n\nThe astute reader no doubt has\
