    The first two equations are just KCL at nodes $v_1$, $v_2$. The following four
    equations describe how our four unknown currents, $i_{1 \rightarrow 4}$, are determined.
    In general, we will have a certain number of nodes, $v_i$, $0 \le i < N$, and
    currents $i_j$, $0 \le j < M$, and each row in the matrix corresponds to KCL for
    the node if it is a voltage and the branch equations if it is a current:


    ```

    $$

    \begin{pmatrix}

    v_0 \n\vdots \nv_{N-1} \ni_0 \n\vdots \ni_{M-1}

    \end{pmatrix}$$

    (4.16)

    ```


    Let us look specifically at the resistor $R_1$. It shows up in the first equation
    by sinking current out of node $v_1$. In the second equation, it shows up again
    by sourcing current into node $v_2$. It also shows up in the fourth equation as
    a branch equation variable:


    ```

    $$

    \begin{pmatrix}

    v_1 & & & \dots & -1 \nv_2 & & & \dots & +1 \n\vdots & \vdots & \vdots & \vdots
    & \vdots \ni_2 & -1 & 1 & \dots & R_1

    \end{pmatrix}$$

    (4.17)

