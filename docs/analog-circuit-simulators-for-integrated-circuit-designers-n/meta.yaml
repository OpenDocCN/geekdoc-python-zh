    \ Table 5.7. The model is, of course, still way unrealistic but the behavior is\
    \ fairly reasonable.\n\nThe error calculation with Newton-Raphson is the same\
    \ as for the DC case. For the timestep itself, there is no error estimate since\
    \ there are no dynamic elements present. The main point here is to illustrate\
    \ the flow at each time point. The reader will realize pretty quickly that if\
    \ the solution does not converge, and one has to change the timestep and start\
    \ over, it might take a while to get done. Therefore some way to have an adjustable\
    \ timestep is of the essence, and we will discuss ways of doing that in Sect.\
    \ 5.4.2. Many simulators use a similar algorithm on the get-go where the initial\
    \ timestep is set as a fraction of the total simulation time. If error conditions\
    \ are met, it just steps along. This can at times have unintended consequences\
    \ as the solution the simulator traces out might be feasible in principle, think\
    \ a VCO with no swing, but in practice things like noise will get the circuit\
    \ going, and if the timesteps are too large, numerical noise might not be enough.\
    \ In other words, the initial timestep might be too large for the circuit time\
    \ scales to be noticed.\n\n> Make sure the default initial time step is small\
    \ enough so that the circuit start-up properly. If not, the circuit might not\
    \ respond correctly, causing confusion.\n\n## CMOS Inverter\n\nThe advantage with\
    \ the more realistic model2 is we can also implement a PMOS transistor that we\
    \ can connect with the NMOS in a digital gate fashion. We can, for example, simulate\
    \ a CMOS inverter.\n\n```\nNetlist\n*\nvdd vdd 0 0.9\nvin in 0 sin(0.45 0.45 1e9\
    \ 0 0)\nvss vss 0 0\nmn1 out in vss nch2\nmp2 out in vdd pch2\n    .options MaxSimTime=2e-9\
    \ reltol=1e-2 FixedTimeStep=True\ndeltaT=1e-12 iabstol=1e-3 vabstol=1e-3 literatio=1000000\n\
    MaxNewtonIter=15\n.ic v(in)=0.45 v(out)=0.45\n.plot v(out) v(in)\nNetlist 5.8\n\
    ```\n\nLet us now run a transient simulation. The input is a sine wave with amplitude\
    \ 450 mV and DC offset of 450 mV, so the signal swings around the mid-point; we\
    \ find the result in Fig. 5.17 and Table 5.8.\n\nNotice, the capacitance is not\
    \ modeled, and we can drive this entity with any speed and it will still work.\n\
    \n![](img/75093da0d280ad52326a78925e5cc403_204_0.png)\n\nTable 5.8 Number of iterations\
    \ for a given fixed timestep\n\n| Parameter | Value | Units |\n|---|---|---|\n\
    | deltaT | 1e-12 | s |\n| Number of iterations | 2052 | |\n\n### 5.4.1.2 Example\
    \ Circuits with Uniform Timesteps: Dynamic Case\n\nThe last two examples used\
    \ active devices with resistors to illustrate the nonlinear techniques. The truncation\
    \ error has been nonexistent, and the LTE error-check algorithm has not been necessary.\
    \ The next few circuit examples will feature both capacitors and inductors and\
    \ so will be more interesting from a general case perspective. We will start with\
    \ cross-coupled inverters with capacitors and follow with oscillator design and\
    \ an RF mixer circuit.\n\n#### Cross-Coupled Inverters\n\nWith the improved model\
    \ of a transistor, model2, let us now look at a cross-coupled pair of inverters,\
    \ similar to what we had before in the DC section. We noticed there we had three\
    \ possible solutions, and in particular the mid-point solution was stable. Let\
    \ us now add in some capacitors to the system with the following addition to the\
    \ netlist 5.5:\n\n```\nC1 in vss 1e-13\nC2 out vss 1e-13\n.ic v(in)=0.0 v(out)=0.0\n\
    ```\n\nWe can now run this as a function of time and we find the result in Table\
    \ 5.9. As we have been accustomed, the mid-point solution drives to the rails\
    \ with a time scale depending directly on the capacitive load. This is in contrast\
    \ to the DC solution that converged to mid supply point.\n\nThe take-home lesson\
    \ from this example is that DC circuits can have some surprising properties contributing\
    \ to the difficulty of finding solutions.\n\n#### Oscillator\n\nAs another example,\
    \ let us study an oscillator. It is one of the key circuit implementations in\
    \ many modern chips, and a lot of efforts have been made in sorting out their\
    \ behavior [22]. In a circuit development environment, a free running oscillator\
    \ by itself is not that useful except perhaps for process monitoring schemes.\
    \ Normally one would need a way to control the oscillation frequency, and often\
    \ this is done with an input voltage controlling the frequency through a voltage-dependent\
    \ capacitor. Such a device is called a voltage-controlled oscillator (VCO). Here\
    \ we will look at an oscillator without such capacitors. Such an oscillator is\
    \ an excellent test bench for simulator implementations since particularly the\
    \ amplitude is highly dependent\n\nTable 5.9 Number of iterations to settle for\
    \ a cross-coupled inverter and using TRAP integration method\n\n| deltaT | Number\
    \ of iterations |\n| :--- | :--- |\n| 1e-12 | ~10,000 |\n| 1e-13 | ~125,000 |\n\
    | 1e-14 | ~125,000 |\n\n![](img/75093da0d280ad52326a78925e5cc403_206_0.png)\n\n\
    on the specific algorithm used, and we saw an example of this in Sect. 5.4. We\
    \ will look at it again when discussing variable timestep implementation in Sect.\
    \ 5.4.2 and in Sect. 5.5.7 when we will look at it in terms of steady-state simulators\
    \ and phase-noise simulations. For now, we will just do a transient simulation,\
    \ and we aim at just getting an oscillation going with the simplified MOS model2\
    \ we developed.\n\nAn oscillator is a system that exhibits a controlled instability.\
    \ There is a positive feedback mechanism that causes a perturbation to grow up\
    \ until nonlinearities in the transistors limit the growth. In effect the swing\
    \ becomes so large the transistor pair runs out of gain. This point can be analyzed\
    \ from an estimation analysis perspective and has been done elsewhere [22, 23].\
    \ There are lots of ways to achieve this feedback effect, and here we will focus\
    \ on an LC oscillator consisting of an inductor and a capacitor acting as the\
    \ load to a cross-coupled NMOS pair of transistors. Such a tank, in which the\
    \ shunted cap and inductor is often referred to, always has some resistive loss\
    \ modeled as a shunt resistor. Such a resistor can also represent the series loss\
    \ leading into the tank. The point of the transistor pair is to provide negative\
    \ resistance (or gain) to the system and so maintain the oscillation. Oscillator\
    \ work is a rich study with many complicated issues. If the reader wants to dig\
    \ through the details, [22] is a highly recommended read. Let us now look at our\
    \ model of an oscillator (see Fig. 5.18). The netlist is straightforward.\n\n\
    ```\nNetlist\n*\nvdd vdd 0 0.9\nvss vss 0 0\nl1 vdd outp 1e-9\nl2 vdd outn 1e-9\n\
    c1 vdd outp 1e-12\nc2 vdd outn 1e-12\nr1 vdd outp 1e3\nr2 vdd outn 1e3\nm1 outp\
    \ outn vss nch1\nm2 outn outp vss nch1\ni1 outp vss pwl(0 0 1e-8 0 1.1e-8 1e-3\
    \ 1.2e-8 0)\n    .options MaxSimTime=6e-8  reltol=1e-3  FixedTimeStep=True\ndeltaT=1e-12\
    \      iabstol=1e-6   vabstol=1e-6   MaxNewtonIter=15\nThreeLevelStep=True\n.plot\
    \ v(outp) v(outn)\nnetlist 5.9\n```\n\nNote in order to get the simulation to\
    \ start in a reasonable time, it is common to “jank” it with an ideal piecewise\
    \ linear current source that turns on for a short time. Without this, it is possible\
    \ the simulator will only find the other stable point, namely, DC particularly\
    \ if the transconductor gain is weak. Firing up this netlist in our simulator\
    \ with our three integration methods result in the plot in Fig. 5.19.\n\n![](img/75093da0d280ad52326a78925e5cc403_207_0.png)\n\
    \nFig. 5.19 Oscillator output using TRAP method compared to the same method using\
    \ ngspice. Note the output node is outn in ngspice and outp in Python, and not\
    \ only is the amplitude and frequency the same, the phase is also the same"
  mdcn: "## 5.4 瞬态非线性仿真\n\n![](img/75093da0d280ad52326a78925e5cc403_203_0.png)\n\n\
    图 5.16 使用晶体管模型2的缓冲器输出\n\n表 5.7 基本仿真参数：reltol = 1e-7, iabstol = 1e-12, vabstol\
    \ = 1e-8, FixedTimeStep = True\n\n| 参数 | 值 | 单位 |\n|---|---|---|\n| deltaT | 1e-12\
    \ | s |\n| 迭代次数 | 5719 | |\n\n我们在图 5.16 和表 5.7 中找到了输出结果。当然，该模型仍然很不真实，但其行为相当合理。\n\
    \n牛顿-拉夫森法的误差计算与直流情况相同。对于时间步长本身，由于不存在动态元件，因此没有误差估计。这里的主要目的是说明每个时间点的计算流程。读者很快会意识到，如果解不收敛，必须更改时间步长并重新开始，那么完成仿真可能需要一段时间。因此，某种可调节时间步长的方法至关重要，我们将在第\
    \ 5.4.2 节讨论实现方法。许多仿真器从一开始就使用类似的算法，其中初始时间步长被设置为总仿真时间的一个分数。如果满足误差条件，它就继续步进。这有时可能会产生意想不到的后果，因为仿真器追踪出的解在原则上可能是可行的（想象一个没有摆幅的压控振荡器），但在实践中，噪声等因素会使电路启动，如果时间步长太大，数值噪声可能不足以触发启动。换句话说，初始时间步长可能太大，以至于电路的时间尺度无法被注意到。\n\
    \n> 确保默认的初始时间步长足够小，以便电路能够正常启动。否则，电路可能无法正确响应，从而引起混淆。\n\n## CMOS 反相器\n\n更真实的模型2的优势在于，我们还可以实现一个\
    \ PMOS 晶体管，并将其与 NMOS 以数字门电路的方式连接。例如，我们可以仿真一个 CMOS 反相器。\n\n```\nNetlist\n*\nvdd\
    \ vdd 0 0.9\nvin in 0 sin(0.45 0.45 1e9 0 0)\nvss vss 0 0\nmn1 out in vss nch2\n\
    mp2 out in vdd pch2\n    .options MaxSimTime=2e-9 reltol=1e-2 FixedTimeStep=True\n\
    deltaT=1e-12 iabstol=1e-3 vabstol=1e-3 literatio=1000000\nMaxNewtonIter=15\n.ic\
    \ v(in)=0.45 v(out)=0.45\n.plot v(out) v(in)\nNetlist 5.8\n```\n\n现在让我们运行一个瞬态仿真。输入是一个振幅为\
    \ 450 mV、直流偏置为 450 mV 的正弦波，因此信号围绕中点摆动；我们在图 5.17 和表 5.8 中找到了结果。\n\n请注意，电容没有被建模，我们可以以任何速度驱动这个实体，它仍然会工作。\n\
    \n![](img/75093da0d280ad52326a78925e5cc403_204_0.png)\n\n表 5.8 给定固定时间步长下的迭代次数\n\
    \n| 参数 | 值 | 单位 |\n|---|---|---|\n| deltaT | 1e-12 | s |\n| 迭代次数 | 2052 | |\n\n\
    ### 5.4.1.2 使用均匀时间步长的示例电路：动态情况\n\n最后两个示例使用了带有电阻的有源器件来说明非线性技术。截断误差不存在，LTE 误差检查算法也没有必要。接下来的几个电路示例将同时包含电容和电感，因此从一般情况来看会更有趣。我们将从带有电容的交叉耦合反相器开始，然后是振荡器设计和一个射频混频器电路。\n\
    \n#### 交叉耦合反相器\n\n使用改进的晶体管模型（模型2），我们现在来看一对交叉耦合的反相器，类似于我们在直流部分之前看到的。我们注意到那里有三个可能的解，特别是中点解是稳定的。现在让我们在系统中添加一些电容，对网表\
    \ 5.5 进行如下补充：\n\n```\nC1 in vss 1e-13\nC2 out vss 1e-13\n.ic v(in)=0.0 v(out)=0.0\n\
    ```\n\n我们现在可以将其作为时间的函数来运行，结果在表 5.9 中。正如我们已经习惯的那样，中点解会驱动到电源轨，其时间尺度直接取决于电容负载。这与收敛到电源中点的直流解形成对比。\n\
    \n这个例子的主要教训是，直流电路可能具有一些令人惊讶的特性，从而增加了求解的难度。\n\n#### 振荡器\n\n作为另一个例子，让我们研究一个振荡器。它是许多现代芯片中的关键电路实现之一，人们已经付出了大量努力来理清它们的行为\
    \ [22]。在电路开发环境中，一个自由运行的振荡器本身用处不大，也许除了用于工艺监控方案。通常需要一种方法来控制振荡频率，这通常通过一个电压控制的电容，由输入电压来控制频率。这种器件称为压控振荡器（VCO）。这里我们将研究一个没有此类电容的振荡器。这样的振荡器是仿真器实现的绝佳测试平台，因为特别是其幅度高度依赖于所使用的具体算法，我们在第\
    \ 5.4 节中看到了一个例子。我们将在第 5.4.2 节讨论可变时间步长实现时，以及在第 5.5.7 节从稳态仿真器和相位噪声仿真的角度再次讨论它。现在，我们只进行瞬态仿真，目标是使用我们开发的简化\
    \ MOS 模型2来启动振荡。\n\n振荡器是一个表现出受控不稳定性的系统。存在一种正反馈机制，导致扰动增长，直到晶体管中的非线性限制了增长。实际上，摆幅变得如此之大，以至于晶体管对失去了增益。这一点可以从估计分析的角度进行分析，并已在其他地方完成\
    \ [22, 23]。实现这种反馈效应的方法有很多，这里我们将重点讨论一个 LC 振荡器，它由一个电感和一个电容组成，作为一对交叉耦合 NMOS 晶体管的负载。这种谐振回路（通常指并联的电容和电感）总是存在一些电阻损耗，建模为并联电阻。这样的电阻也可以代表进入谐振回路的串联损耗。晶体管对的作用是为系统提供负电阻（或增益），从而维持振荡。振荡器的研究是一个内容丰富的领域，涉及许多复杂问题。如果读者想深入研究细节，强烈推荐阅读\
    \ [22]。现在让我们看看我们的振荡器模型（见图 5.18）。网表很直接。\n\n```\nNetlist\n*\nvdd vdd 0 0.9\nvss\
    \ vss 0 0\nl1 vdd outp 1e-9\nl2 vdd outn 1e-9\nc1 vdd outp 1e-12\nc2 vdd outn\
    \ 1e-12\nr1 vdd outp 1e3\nr2 vdd outn 1e3\nm1 outp outn vss nch1\nm2 outn outp\
    \ vss nch1\ni1 outp vss pwl(0 0 1e-8 0 1.1e-8 1e-3 1.2e-8 0)\n    .options MaxSimTime=6e-8\
    \  reltol=1e-3  FixedTimeStep=True\ndeltaT=1e-12      iabstol=1e-6   vabstol=1e-6\
    \   MaxNewtonIter=15\nThreeLevelStep=True\n.plot v(outp) v(outn)\nnetlist 5.9\n\
    ```\n\n请注意，为了使仿真在合理的时间内启动，通常使用一个理想的分段线性电流源来“刺激”它，该电流源会短暂开启。如果没有这个，仿真器可能只会找到另一个稳定点，即直流点，特别是如果跨导增益较弱的话。在我们的仿真器中使用三种积分方法运行此网表，结果如图\
    \ 5.19 所示。\n\n![](img/75093da0d280ad52326a78925e5cc403_207_0.png)\n\n图 5.19 使用\
    \ TRAP 方法的振荡器输出与使用 ngspice 的相同方法的比较。注意 ngspice 中的输出节点是 outn，而 Python 中是 outp，不仅幅度和频率相同，相位也相同"
