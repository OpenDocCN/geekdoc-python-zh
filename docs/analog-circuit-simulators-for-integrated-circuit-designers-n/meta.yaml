    # 5.5.10 Simulator Options Considered


    We have considered the following options and what they mean in this chapter:


    +   - reltol

    - abstol

    - vntol

    - chgtol

    - Trapezoidal integration method

    - Euler (forward/backward) integration method

    - Gear second-order integration method

    - GearOnly

    - TrapOnly

    - Truncation errors: point local, local, global

    - Source stepping

    - $g_{min}$ stepping

    - PTran stepping

    - DPtran stepping

    - Newton max iteration

    - Shooting method

    - Harmonic balance

    - NHarmonics

    - Oversampling


    # 5.5.11 Summary


    We have in this chapter discussed the basic ideas behind nonlinear simulators,
    and we have gone from simple nonlinear models of transistors to more complicated
    ones. We are still far from any realistic BSIM implementation. Many of the inherent
    pitfalls using say nonlinear capacitors have been exemplified a few times. Finally
    we have constructed a simple code that can achieve a steady-state solution, and
    this is one of the most important tools for the modern circuit designer.


    All throughout the chapter, we have built a kind of toy simulator with simple
    transistor modeling just to illustrate a possible way to implement the techniques.
    Many of the more or less well-known pitfalls with nonlinear capacitors or integration
    methods were highlighted with direct use of the toy simulator.'
