    \ = \\begin{bmatrix} -A_1 s_1 \\\\ s_2 \\end{bmatrix} \\quad (7.34)$$\n\n## 7.2\
    \ 微分方程的数值求解技术\n\n我们包含前面标准电路矩阵系统的推导是为了完整性。标准参考文献包含更多细节 [1–5]。在本节中，我们将简要讨论这些方程的可解性。我们从矩阵理论知道，为了使矩阵方程可解，通常需要矩阵的逆存在。显然，如果右边为零，平凡解（零）总是可能的（如果什么都没有，你得到的就是什么都没有）。因此，对\
