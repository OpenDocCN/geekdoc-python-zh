    # 5.5.2 Harmonic Balance Methods


    Harmonic balance is a way to find the steady state of a circuit by working in
    frequency space instead of time. Imagine we have a circuit driven by a signal
    with a certain frequency. If the circuit was linear, then all nodes will contain
    this frequency and DC. It is simply a question of phase and magnitude. The normal
    topology constraints, KCL, can also be applied to frequency space. If the circuit
    is nonlinear, we know from elementary theory that harmonics of the fundamental
    frequency tone will also appear. This is the basis for harmonic balance methods,
    and the idea behind the various algorithms is to find the set of harmonics, both
    magnitude and phase, that defines all device currents and node voltages. We will
    here go through the basic theory without too much formalities and just hint at
    its inner workings. We will then move on with the actual implementation in a Python
    code as before.


    When working in frequency space, we will define the Fourier transform as


    $$H(f) = \frac{1}{T} \int_{-\infty}^{\infty} h(t) e^{-j\omega t} dt \quad (5.30)$$


    where $\omega = 2\pi f$ and $T$ is the period over which we define the integral.
    Furthermore, we will work with both positive and negative frequencies. For real-valued
    functions $h(t)$, the following property is easy to prove


    $$H(f) = H^*(-f) \quad (5.31)$$


    where $*$ denotes the complex conjugate. It is much easier to work with calculations
    this way. For the simulator, the discrete Fourier transform (DFT) is used


    $$H(f) = \int_{0}^{T} h(t) e^{\frac{-i2\pi n t}{T}} dt \delta\left(f - \frac{n}{T}\right),
    \quad 0 < n < \frac{T}{2T_s}$$


    where $T$ is the signal period and $T_s$ is the sampling period. Some simulators
    can manipulate the sampling timestep often via a parameter called sampling ratio
    or similar. One can use this to oversample the signal in time for a possible increase
    in accuracy.


    We show the more formal derivation of the harmonic balance equations in Chap.
    7. We here simply state the network equation, $f(v_k) = 0$, can be Fourier transformed
    as'
