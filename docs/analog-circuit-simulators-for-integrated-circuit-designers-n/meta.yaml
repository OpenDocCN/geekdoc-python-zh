    mathcal{D} = \\{(x, t) | x \\in \\mathbb{R}^m \\text{ and } 0 \\le t \\le t_f\\\
    } \\quad (7.36)$$\n\n像方程 7.35 这样的问题需要在小扰动下（记住诸如数值舍入误差之类的事情）表现良好，而不会失控。这样的系统被定义为适定的。\n\
    \n> **定义 7.1**\n> 设 $(\\delta(t), \\delta_0)$ 和 $(\\tilde{\\delta}(t), \\tilde{\\\
    delta}_0)$ 是方程 $\\dot{x}(t) = f(x, t), x(t_0) = x_0$ 的两个扰动，并设 $\\hat{x}(t)$ 和\
    \ $\\tilde{x}(t)$ 是由此产生的扰动解。如果存在一个 $S > 0$，使得对于所有 $t \\in [0, t_f]$，$\\epsilon\
    \ > 0$，我们有\n> $$||\\hat{x}(t) - \\tilde{x}(t)|| \\le S\\epsilon, \\text{ whenever\
    \ } ||\\delta(t) - \\tilde{\\delta}(t)|| \\le \\epsilon \\text{ and } ||\\delta_0\
    \ - \\tilde{\\delta}_0|| \\le \\epsilon$$\n> 则称该方程是完全稳定的，或适定的。\n\n其思想是，如果解在小扰动下差异不大，则解是稳定的。现在，考虑一个数字\
    \ CMOS 门，当其输入在触发点附近轻微变化时。这样的系统是适定的吗？考虑到门的增益，输出将发生剧烈变化。然而，仍然可以找到一个 $S > 0$ 来满足定义中的条件，因此这样的系统在技术上仍然是适定的。这并不意味着它在寻找解时是有帮助的，而且确实有些分析方法在跳变点附近非常困难（例如，参见第\
    \ 4 章中的打靶法）。"
