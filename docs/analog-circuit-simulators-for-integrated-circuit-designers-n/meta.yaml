    # 5.4.4 Nonlinear Capacitors


    We described how one can handle nonlinear active devices in the previous section.
    Here we will go into nonlinear capacitors. Such devices occur naturally as we
    saw in the Chap. 2 where the MOSFET gate capacitance varied in a strongly nonlinear
    fashion with gate voltage, and it is therefore beneficial to show how one can
    deal with such devices. The behavior of capacitors as we saw in Chap. 2 and in
    Chap. 4 is governed by a differential equation, and for numerical purposes such
    equations need to be approximated by difference equations with the resulting accuracy
    difficulties. If we now add nonlinear response to the capacitance itself as a
    function of the voltage across it, naturally the problems become worse. We will
    give a brief initial motivation why this can be a problem and show various ways
    simulators often deal with it.'
