  md: '# 7.1.1 Sparse Tableau Analysis


    Let us first look at linear circuit elements and see how the branch equations
    arise. Such a circuit element can be characterized as either a current response
    to a voltage stimulus


    $$i = yv$$


    or vice versa


    $$v = zi$$


    As the reader no doubt knows, $y$ is the admittance and $z$ is the impedance of
    the element. In general for a set of $m$ branch equations, we find


    $$Zi - Yu = s$$


    where $Z, Y$ are sparse $m \times m$ matrices and $s$ is known $1 \times m$ vector
    (often zero). We can now combine these set of branch equations with the topological
    constraints to find


    $$\begin{bmatrix} A & 0 & 0 \ 0 & I & -A^T \ Z & Y & 0 \end{bmatrix} \begin{bmatrix}
    i \ u \ v \end{bmatrix} = \begin{bmatrix} 0 \ 0 \ s \end{bmatrix}$$


    This is known as the sparse tableau analysis (STA) formulation (see [1]). This
    formulation is general and sparse making it fast to solve for. However, there
    is some redundancy, and in modern circuit simulators where often memory space
    is a concern due to the large circuitry often under study, there are other more
    compact formulations. Let us first substitute KVL ($u = A^T v$) into the branch
    equations. We find


    $$Zi + Yu = Zi + YA^T v = s$$


    The network matrix equation now becomes


    $$\begin{bmatrix} A & 0 \ Z & YA^T \end{bmatrix} \begin{bmatrix} i \ v \end{bmatrix}
    = \begin{bmatrix} 0 \ s \end{bmatrix}$$


    This is sometimes called the reduced tableau form.


    # 7.1.2 Nodal Analysis'
  merge: -1
  pgno: 342
- img_proc: true
  md: '$i = Yu + s$ (7.18)


    and KVL, we get a much reduced matrix system that do not depend on the branch
    currents at all:


    $AYA^T v = -As$ (7.19)


    The formulation is called the nodal analysis (NA) form of the network equations.
    It is much smaller $(n-1) \times (n-1)$ matrix with only the nodes as unknowns.
    It turns out the requirement in the branch currents excludes ideal voltage sources
    since the equation for an ideal independent voltage source does not contain its
    current:


    $v(a) - v(b) = V$ (7.20)


    The node voltage between two nodes is fixed independent on current (put differently,
    the ideal independent voltage source has 0 ohm output resistance). This nice property
    of the network equation where the currents are eliminated with the unfortunate
    requirement on the absence of an independent voltage source is quite attractive,
    and we will discuss the common way to work around this problem next.


    # 7.1.3 Modified Nodal Analysis


    The modified nodal analysis (MNA) was first proposed by [2]. The starting point
    is the nodal analysis we just discussed with the modification that elements that
    need to keep their currents are simply added to the system of branch equations.
    One talks about elements belonging to one of two *groups* see for example [2,
    3]:


    > **Definition of Element Groups**

    Elements whose currents are to be eliminated belong to Group 1 and all other belong
    to Group 2.


    The branch currents and voltages can now be separated depending on the elements''
    group membership. We have


    $i = \begin{bmatrix} i_1 \ i_2 \end{bmatrix}, u = \begin{bmatrix} u_1 \ u_2 \end{bmatrix}$
    (7.21)


    where currents in the Group 1 elements current are denoted by $i_1$, voltages
    by $u_2$, and so on. The branch equations now become for elements in Group 1


    $i_1 + Z_{12}i_2 = Y_{11}u_1 + Y_{12}u_2 + s_1$ (7.22)'
