    so be achieved by multiplying the previous dependent matrix by the effective capacitance
    matrix and the Jacobian for the circuit equations at the new timestep.


    ## 7.5 Harmonic Balance Theory


    Let us look at the circuit equations in terms of the function $f(v_k)$ similar
    to the discussion in [6]:


    $$f(v(t)) = i(v(t)) + \dot{q}(v(t)) + u \quad (7.49)$$


    Let us Fourier transform this equation. We find


    $$F(V) = I(V) + \Omega Q(V) + U \quad (7.50)$$


    Here the capital $V$ now represents the Fourier coefficients for the voltages
    at each node. We have used


    $$F(\dot{q}(v(t))) = F(\dot{q}_k(v_i(t))) = F\left(\frac{dq_k(v_i)}{dv_i} \frac{dv_i(t)}{dt}\right)
    = F\left(\frac{dq_k(v_i)}{dv_i} \sum_m j\omega_m v_{lm} e^{j\omega_m t}\right)$$


    For linear systems, we get


    $$F(\dot{q}(v(t))) = F(\dot{q}_k(v_i(t))) = F\left(C_{kl} \frac{dv_i(t)}{dt}\right)
    = C_{kl} \sum_m j\omega_m v_{lm} = \Omega Q(V)$$


    $$\Omega = \begin{pmatrix} j\omega & \cdots & 0 \\ \vdots & \ddots & \vdots \\
    0 & \cdots & j\omega \end{pmatrix}, \omega = (\omega_1 \cdots \omega_k)$$


    For nonlinear functions $i, q$, the procedure is to first inverse Fourier transform
    the voltages in the time domain, solve the time evolution problem there (remember
    it is harmonic), and then Fourier transform back into the frequency domain. There
    are many ways to solve Eq. 7.50, but we will use what is often called harmonic
    Newton which is very similar to Newton-Raphson we used earlier in the time domain.
    We define the Jacobian


    $$J_{ij} = \frac{\partial F_i}{\partial V_j}$$


    We get


    $$J(V) = \frac{\partial I(V)}{\partial V} + \Omega \frac{\partial Q(V)}{\partial
    V}$$


    Applying the Newton-Raphson algorithm, we find the iteration


    $$V^{j+1} = V^{(j)} - J^{-1}(V^{(j)})F(V^{(j)})$$


    The matrix $J$ is referred to as the harmonic Jordan or conversion matrix. It
    tells you how a Fourier component at some node $j$ couples to another Fourier
    component at node $i$. Note the matrix is really a matrix within a matrix. Each
    circuit node contains a set of Fourier vector components that couples to Fourier
    components at other nodes. So now procedure is very similar to the one we followed
    in the time domain case. We set up the matrices $F$ and $J$ and iterate along.
    The boundary conditions set by $U$ has fixed components, and we can just easily
    iterate our way to the right solution. We do have many more variables; each node
    has k Fourier components, but once the iterations have converged, we are done.


    ## 7.6 Matrix Solvers: Brief Theory


    Matrix solvers are one of the most important algorithms used in modern society.
    It is used far beyond mere engineering hallway applications. With the appearance
    of artificial intelligence on the hardware scene, such systems are also incorporated
    directly into hardware and are as such very much part of everyday life. From an
    engineering/scientific viewpoint, we end up with matrix equations simply because
    of the way we quantize or discretize the problems we are investigating. For the
    circuit application, we have simply a finite number of unknown voltages and currents,
    so there a matrix equation is natural. But also in more continuous systems like
    electromagnetic field solvers, the matrix equation appear because the systems
    we are investigating are put on a discrete grid within which key properties are
    constant or varying slowly. It is a very important field of study and notoriously
    difficult to construct solvers that work all the time for any kind of problem.
    For circuit systems, we are often helped by the fact the matrices are sparse and
    then efficient iterative solvers can be used, and we discuss such in Sect. 7.6.3.
    Sometimes the matrices are dense or small, and then the direct methods are employed.
    These are discussed in Sects. 7.6.1 and 7.6.2. We follow the presentation in [7,
    8] fairly closely.


    ### 7.6.1 Gauss-Jordan Elimination


    The method of Gauss to solve linear systems of equations has a long history [7].
    We will here present a condensed version of the mathematical derivations. The
    Gauss method is simply a set of row and column interchanges with the goal to avoid
    a small value of the pivot we described in Chap. 2. The method is generally such
    that the matrix is producing an identity matrix on the left-hand side and so the
    matrix on the right-hand side is an inverse [7]:


    $$Ax = b$$


    Multiply by $A^{-1}$


    $$A^{-1}Ax = Ix = A^{-1}b$$


    where $x$, $b$ can be allowed to be matrices. An appropriate choice of $b$ will
    now show us the inverse matrix on the right-hand side. Since it requires the right-hand
    side to be known, it is quite susceptible to round off errors and is rarely the
    first method one should employ when inverting matrices. The key to the method
    is the way one adjusts the rows and columns to avoid a small pivot. The best choice
    is almost always to pick a pivot that is the largest available. Interestingly,
    the choice of pivot will depend on the original scaling of the problem. It is
    therefore common to scale the problem such that the largest element is unity;
    it is often called implicit pivoting. Let us dig into the row and column interchanges
    some more. One can show pretty easily that the row interchange can be accomplished
    by multiplying the matrix from the left by a matrix $R$. A Gauss elimination by
    row is then simply a series of multiplication by some matrix from the left


    $$Ax = b$$


    $$R_1 R_2 \dots R_n Ax = Ix = R_1 R_2 \dots R_n b$$


    where we use the set of left-hand operation to define the inverse matrix. Column
    interchanges correspond to right-hand multiplications of a matrix $C$. We get


    $$Ax = b$$


    $$AC_1 C_1^{-1} x = b$$


    $$AC_1 C_2 C_2^{-1} C_1^{-1} x = b$$


    $$AC_1 C_2 \dots C_n C_n^{-1} \dots C_2^{-1} C_1^{-1} x = b$$


    The matrix multiplications $AC_1 C_2 \dots C_n = I$, and we find


    $$x = C_1 C_2 \dots C_n b$$


    We notice from this equation that we first need to multiply the right-hand side
    by the *last* matrix we find, so all matrices $C$ need to be stored in memory.
    This makes the column interchanges very expensive, and one is often left with
    these operations being very simple ones.'
