    The matrix $J$ is referred to as the harmonic Jacobian or conversion matrix. It
    tells you how a Fourier component at some node $j$ couples to another Fourier
    component at node $i$. Note the matrix is really a matrix within a matrix. Each
    circuit node contains a set of Fourier vector components that couples to Fourier
    components at other nodes. So now the procedure is very similar to the one we
    followed in the time-domain case. We set up the matrices $F$ and $J$ and iterate
    along. The boundary conditions set by $U$ have fixed components, and we can just
    easily iterate our way to the right solution. We do have many more variables;
    each node has k Fourier components, but once the iterations have converged, we
    are done. In the time domain, we simply had to continue, so the price we pay in
    harmonic balance is that the matrix is much bigger, but we only solve it once.


