    a simple bandgap. Exponential dependency in the model is very difficult to handle
    without a lot of help from initial conditions. Often this kind of model has some
    kind of exponential limit built into it to avoid "exploding" solutions.


    # PMOS Transistor


    A PMOS transistor implementation will look very similar to the NMOS but with some
    sign differences. We find if we, compared to NMOS, do


    $$K \rightarrow -K, \quad (V_g - V_s) \rightarrow -(V_g - V_s)$$


    we can use the same coding implementation as we did for NMOS. Let us illustrate
    with the example in Fig. 5.2

    When using the CMOS approximation outlined in Sect. 3.4, model1, the network matrix,
    will look like


    $$\begin{cases} V_g = V_{in} \ I_d = -K(V_s - V_g)^2 \ I_{source} = -I_d \end{cases}
    \rightarrow f(\mathbf{v}_k) = \begin{cases} V_g - V_{in} = 0 \ I_d + K(V_s - V_g)^2
    = 0 \ I_{source} + I_d = 0 \end{cases}$$


    With unknowns, $\mathbf{v}_k = (V_g, I_d, V_s)$. And the accompanying Jacobian
    matrix becomes


    $$\mathbf{J} = \begin{pmatrix} 1 & 0 & 0 \ -2K(V_s - V_g) & 1 & 2K(V_s - V_g)
    \ 0 & 1 & 0 \end{pmatrix}$$'
