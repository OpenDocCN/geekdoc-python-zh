    resistor. The analytical solution is


    $$v(t) = \exp(-t/(RC)) \sin \sqrt{LC - \frac{1}{4R^2C^2}t} \quad (4.68)$$


    where $R$ represents a real loss in the tank. If $R$ is equal to infinity, the
    oscillation will go on forever with an amplitude set by the initial conditions.
    Let us simulate this with our transient simulators we have just developed using
