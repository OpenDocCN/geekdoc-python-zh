    # 7.2.1.3 Stability of Linear Multistep Methods


    In the last section, we defined what is called zero stability. Essentially we
    looked at an LMS method to see if it approached the exact solution as the timestep
    $h \to 0$. We noted this is obviously a desirable property of a numerical solution
    scheme. The similarity between this zero stability property and the concept of
    well-posedness for the differential equation was also quite a natural consequence
    of the numerical method approaches of the continuous time formulation when $h
    \to 0$. Now, in a real implementation, we cannot put $h = 0$, and we instead need
    an idea of stability for finite $h$. In reality errors can accumulate as we step
    along the solution, and such errors can completely blow up the solution. Chapter
    3 demonstrates such behavior for the FE method. The concept of stability has obviously
    been studied to great depths over the years due to its importance. Even before
    the arrival of the electronic computer, such studies were performed. It is a widely
    researched topic, and we will here limit ourselves to the presentation of linear
    stability theory. There are also intense research going on in the field of nonlinear
    stability, but we will not touch upon that here. Linear stability concerns the
    examination of a test system. In continuous time, we have


    $$\frac{dx(t)}{dt} = Ax(t) \qquad (7.44)$$


    It is common to assume the solution to such systems die down with time, but strictly
    speaking, there are situations one can imagine where this is not true, for example,
    oscillators. We will not overly complicate the discussion but assume here the
    system solution is such $x(t) \to 0$, $t \to \infty$. A numerical approximation
    to this system can then be expected to also die down for large times, $x_n \to
    0$, $n \to \infty$. This is what we mean when talking about stability of the numerical
    system. How can we convince ourselves our numerical method behaves this way? As
    we saw earlier, such a linear system has the solution


    $$x(t) = \sum_{i=1}^m c_i e^{\lambda_i t} q_i$$'
