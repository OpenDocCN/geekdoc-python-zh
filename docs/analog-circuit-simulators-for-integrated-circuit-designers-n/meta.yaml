    # 4.6.5 Stiff Circuits


    The kinds of circuits where there are time constants, like $R C$, that are small
    compared to the timestep are called stiff circuits. In electrical systems, it
    is very common to have many high-frequency poles due to small capacitors, for
    example. Normally a timestep would be much larger than what is needed to determine
    the characteristics of such time constants, mostly because they are way beyond
    the bandwidth of the system and will play negligible role in the dynamical evolution
    of the system. We noticed in Sect. 4.6.1 the forward Euler method has some real
    problems and needs to take really small timesteps in order to converge. This is
    very characteristic for this method. The other three integration methods we are
    using are'
