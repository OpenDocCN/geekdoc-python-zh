    \begin{cases} 3x+ & 2y+ & z=7 \ & \frac{7}{3}y+ & \frac{5}{3}z=\frac{8}{3} \ 2x+
    & y+ & 3z=12 \end{cases} \rightarrow$$


    $$\left\{ R_3 \rightarrow R_3 - \frac{2}{3}R_1 \right\} \rightarrow \begin{cases}
    3x+ & 2y+ & z= & 7 \ & \frac{7}{3}y+ & \frac{5}{3}z= & \frac{8}{3} \ & -\frac{1}{3}y+
