    # 4.4.2 Stability Analysis


    Stability analysis is usually applied to circuit loops where questions like phase
    and gain margin needs to be answered. Stability theory is discussed at depths
    elsewhere, and here we will just provide a short summary as a reminder to the
    reader.


    **Brief Stability Theory Review**

    Basically a loop will oscillate if Barkhausen’s criterion is met:


    > **Barkhausen’s criterion** A system will oscillate if the gain of the loop is
    greater than one and the phase shift is 360 degrees.


    This criterion is certainly helpful, but it says nothing of margins or how close
    to oscillation a system might get. In a sense, one needs to be “far away” from
    the point of oscillation, and this needs to be quantified. The most general stability
    theory is the one discussed in, for example, [18–20] and commonly called Nyquist’s
    criteria for stability. In most cases, this theory can be simplified to the concepts
    of gain margin and phase margin. The key to this discussion is the system loop
    needs to be opened up, and the analysis is done on that open loop where the open-loop
    gain and phase shift are simulated (in an AC sim commonly) and plotted as a function
    of frequency.


    Mathematically, the concept of phase margin can be studied in terms of complex
    transfer functions (see [20, 23]).


    **Numerical Algorithms for Stability Simulations**

    Any modern circuit we try to build with the sophisticated models available now
    has huge numbers of poles and zeros, and trying to do a complete mathematical
    analysis is impossible, hence the need for a stability analysis tool. There is
    a well-known paper by Professor Middlebrook from the California Institute of Technology
    in 1975 [21] where he describes a general algorithm to simulate stability. It
    involves biasing the circuit, breaking the loop, and performing two AC simulations.
    It works really well in most cases and we discuss it first below. A further generalization
    that is nowadays more often used can be found in [22]. We will provide a short
    review of the theory by discussing Middlebrook’s analysis first and then generalize
    it.'
