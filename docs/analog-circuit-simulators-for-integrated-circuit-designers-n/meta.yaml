    of iterations needed for each of our three transistor models for a given set of
    simulation parameters. Next, we discuss the idea of a variable timestep and how
    such can be implemented. We will then reexamine our circuits with a varying timestep
    algorithm and note differences in terms of number of needed iterations and compare
    accuracy. We will also describe the concept of global truncation error and how
