    # 4.6.7 Odd Cases: Things to Watch out for


    **Trapezoidal Ringing**

    The “trapezoidal ringing” is a fairly known weakness of the trapezoidal method
    [25]. It is quite characteristic, and one can easily recognize it in the simulator
    output. It tends to show up around steps, which is why a simulator will often
    shift to backward Euler around such events.


    Since we are now armed with a range of integration methods, let us illustrate
    this ringing with a very simple test case. Let us use a single capacitor to ground
    with a voltage source across it, according to the following netlist:


    ```

    *

    vdd vdd 0 0

    c1 vdd 0 1e-12

    netlist 4p8

    ```


    We induce a step by having the initial voltage at the cap be 1V, by taking advantage
    of the initial condition feature of the code we have developed. Adding


    ```

    .ic v(a)=1

    ```


    to the netlist will accomplish this, and the next timestep we force it to zero
    with the voltage source. We use both trap and Gear2. We find the result in Fig.
    4.32.

    For these simulations, we used 10 ps timestep and 10 steps in time.


    **Numerical Loss**

    The Gear2 implementation does not suffer from this odd ringing featured with the
    trap method. This can be a relief. However, it’s doing so because of artificial
    dissipation. The method adds artificial resistors to the circuit, and any ringing
    will quickly roll-off. We can illustrate this with the following classic example
    [25] shown in Fig. 4.33.


    It shows an LC tank with a shunting resistor. If one perturbs it, by adding


    ```

    .ic v(in)=1

    ```


    to the netlist'
