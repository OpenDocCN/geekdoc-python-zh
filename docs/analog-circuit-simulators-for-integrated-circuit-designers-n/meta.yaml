    *\n```\n\n**网表 4p5**\n\n我们得到的增益和相位响应如图 4.20 所示。\n此代码在原理上易于实现，但需注意电流和电压的符号。这些量的方向对于获得正确的响应至关重要。\n\
    请注意，这是一种线性响应分析，存在局限性。在实际应用中，通常还应在闭环时用阶跃函数激励电路，以观察是否存在任何振铃现象。由此可以研究导致不稳定的非线性效应。\n\
    \n![](img/75093da0d280ad52326a78925e5cc403_108_0.png)\n\n**图 4.20** 仿真结果与精确结果的增益和相位响应对比。第二个极点被特意设置在第一个极点的单位增益频率处。这使得在单位增益频率处大约有\
    \ 45 度的相位裕度。\n\n![](img/75093da0d280ad52326a78925e5cc403_109_0.png)\n\n图 4.21\
    \ 具有多个输入/输出端口的通用系统 © [2019] 剑桥大学出版社。经许可转载。\n\n![](img/75093da0d280ad52326a78925e5cc403_109_1.png)\n\
    \n图 4.22 S11 的示意性测试设置\n\n### 4.4.3 S 参数分析\n\n交流分析的另一个现代应用是 S 参数仿真。S 参数是给定电路的线性响应，因此交流仿真非常适用。S\
    \ 参数分析背后的基本思想是，所有源和汇都具有特定的端接阻抗（在许多情况下，这只是 50 欧姆的实阻抗）。S 参数响应即为端口之间的增益（图 4.21）。\n\
    \n端口 $i, j$ 之间的增益记为 $S_{ji}$，其中 $j$ 索引表示输出端口，$i$ 索引表示输入端口。$S_{21}$ 即为端口 $1 \\\
    rightarrow 2$ 之间的增益。这个增益与所有端口都端接的电路的交流增益相同。唯一可能引起混淆的是同端口增益，如 $S_{11}$（图 4.22）。可以证明（参见\
    \ [23, 24]），\n\n$$S11 = \\frac{S_{out}}{S_{in}} = \\frac{Z - R_t}{Z + R_t}$$ (4.38)\n\
    \n其中 $Z$ 是向端口看进去的阻抗，$R_t$ 是端接电阻。输入阻抗定义为输入节点电压 $v_{in}$ 除以流入输入的电流 $i_{in}$。我们得到\n\
    \n$$v_{in} = \\frac{Z}{R_t + Z}V \\quad v_{R_t} = \\frac{R_t}{R_t + Z}V$$ (4.39)\n\
    \n由此可得\n\n$$S11 = \\frac{v_{in} - v_{R_t}}{V} = \\frac{v_{in} - (V - v_{in})}{V}\
    \ = \\frac{2v_{in} - V}{V} = \\frac{v_{in} - V/2}{V/2}$$ (4.40)\n\n按照惯例，通常使用 $V\
    \ = 2 + j * 0$，即电压源上的实电压。\n\n将 $S_{11}$ 作为交流仿真来模拟，只需在输入信号电压源串联一个电阻，例如 50 欧姆。在端接电阻*之后*测量交流响应，减去\
    \ 1，然后取复数幅度，即可完成：\n\n$$S_{11} = 20 \\log(|v_{in} - 1|)$$ (4.41)\n\nS21 更容易理解（见图\
    \ 4.23）。它只是一个所有端口都端接 50 欧姆到地的交流仿真。仍然使用驱动电压源幅度为 $V = 2$ 的惯例，我们发现输入电压约为 1。输出端口的交流幅度直接给出前向增益：\n\
    \n$$S_{21} = 20 \\log|v_{out}|$$ (4.42)\n\n![](img/75093da0d280ad52326a78925e5cc403_110_0.png)\n\
    \n![](img/75093da0d280ad52326a78925e5cc403_111_0.png)\n\n图 4.24 用于 S 参数分析的示意网络\n\
    \n这在 Python 中易于实现：\n**代码 4p5**\n让我们对图 4.24 中的电路进行 S 参数分析。我们有以下网表\n\n```\n*\nvp1\
    \ p1 0 0\nvss vss 0 0\nr1 p1 in 50\nr2 in vss 50\nc1 in vss 1e-12\nl1 in b 1e-9\n\
    r3 b c 10\nr4 c out 100\nc2 c out 1e-13\nc3 out vss 1e-11\nr5 out p2 50\nvp2 p2\
    \ vss 0\n**netlist 4p6**\n```\n\n结果如图 4.25 所示。\n\n### 4.4.4 传递函数分析\n\n传递函数分析类似于交流仿真，因为它模拟输入和输出之间的增益（或传递函数）。传递函数分析的优势在于，它计算从独立源等输入到单个输出的增益。通过这种方式，增益、PSRR\
    \ 等特性可以通过一次仿真获得。在 SPICE 的早期，这种分析执行的是在指定输入源和输出节点之间的直流线性化传递。它也经常提供输入和输出电阻。在现代实现中，可以进行更广泛的研究。这与交流分析形成对比，交流分析中电路有一个（或几个）激励，你想找出它对电路各部分的影响；输出点的数量大于输入或激励点的数量。通过传递函数分析，你可以计算从多个起点到单个（或几个）输出的响应；输入的数量大于输出的数量。这在\
    \ Python 中易于实现，我们留给读者自行探索。\n\n### 4.4.5 灵敏度分析\n\n灵敏度分析是交流分析的另一个非常方便的分支。该分析列出了用户定义的输出对一组同样由用户定义的输入的灵敏度。现代实现也使用直流仿真，如工作点分析来模拟灵敏度，如图\
    \ 4.26 所示。我们将在此跳过具体的 Python 实现，留给读者作为练习。\n\n![](img/75093da0d280ad52326a78925e5cc403_113_0.png)\n\
    \n图 4.26 该图表明各种参数如何以不同方式影响“输出”。灵敏度分析选项可以通过交流分析仿真来量化这一点。\n\n### 4.4.6 特殊情况：需要注意的问题\n\
    \n我们曾指出，不可能实现一个电感器并消除其电流方程，因为其阻抗为零，导致在有限、非零的电压下通过它的电流为无穷大。对于 0 欧姆的电阻也是如此。此类器件必须作为显式电流器件来处理。否则，很明显矩阵元素将变得无穷大且定义不良。复杂的仿真器会检测到此问题并采取预防措施，但读者需注意。另一个更微妙的问题出现在我们有一个具有理想\
    \ LC 的 LC 谐振器时。这样的串联组合将在谐振时产生 0 欧姆的阻抗。让我们研究一下会发生什么。\n\n**理想 LC 谐振器**\n\n应该相当明显的是，除非我们恰好命中谐振点（此时串联组合的阻抗为零），否则算法将正常工作。而在不太可能的情况下，如果我们恰好命中谐振点，矩阵将如预期那样变为奇异。防止这种情况的保证是在电感器上串联一个非零欧姆的电阻。\n\
    \n**浮空元件**\n\n在实践中，通常所有元件并非都与其他元件连接；它们是浮空的。这种情况下的矩阵将是非奇异的，因为此类元件端子上的电压是完全不确定的；任何值都可以。仿真器应如何处理这个问题？传统的解决方案是从所有节点添加一个电阻和电容到地，电阻值为\
    \ $1/g_{min}$，其中 $g_{min}$ 是一个可以由用户更改的仿真器变量。此外，通常在每个节点定义一个最小电容 $c_{min}$，以降低节点的带宽。更详细的讨论见第\
    \ 5.2 节。\n\n## 4.5 直流线性仿真\n\n线性系统的直流求解与交流求解一样直接。所有电感器短路，电容器移除。实际上，我们只剩下线性电阻和直流源。我们可以采用前面的例子，看看它如何"
