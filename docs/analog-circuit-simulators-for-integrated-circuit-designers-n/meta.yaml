    # 6.1.6 Example of Faulty Model Behavior


    To drive home the point of examining the model behavior closely, let us look at
    the buffer in Sect. 5.2 but use the unrealistic transistor model 1 instead and
    take a look at the output node. We did this already in Chap. 5 (Fig. 5.37). The
    unphysical blip in the middle of the up and down plateaus comes from the fact
    that the model is a simple square function, and if $V_{gs} < 0$, the transistor
    turns on again something that is unphysical. It is very unlikely the reader will
    run into some model that is this off, but hopefully the benefit of examining transistor
    behavior carefully is appreciated.


    # 6.1.7 Corner Simulation Strategy


    A foundry will not release only one set of models. Often they will include many
    different model sets often referred to as process corner models, and as a new
    engineer, it is easy to be convinced the word “corner” refers to some extreme
    case that will “never happen.” This is not the case. A single wafer or die for
    that matter contains a certain process variation. The average over the wafer can
    very well be lining up with one process skew corner, but around this average,
    there will be a certain variation that depends on the foundry and technology used.
    Occasionally one finds silicon coming back from the factory and behaving much
    worse than any model simulation could ever accomplish. This is often due to some
    weakness in the design itself that shows up in a simulation corner that “could
    never happen.” Instead of looking at corners at some kind of extreme case, it
    is better to view them as a stress test on your circuit. If any of the simulation
    results changes significantly (and “caveat lector” be careful with the meaning
    of the word significant) in one corner, your circuit will simply not work properly.
    This odd behavior will be a part, to a lesser or higher degree, of all your dice
    no matter what supposed process skew corner wafer they came from.


    Sometimes the skew process files have all elements lumped together in the corner
    files. This rarely makes sense since different device types have different process
    dependencies. If the foundry is not providing a separate corner file for capacitors,
    NMOS, PMOS, resistors, diodes, etc., it often makes sense to create your own skew'
  merge: -1
  pgno: 330
- img_proc: true
  md: 'model files. Depending on the type of project you are getting into and its
    application, it might be best to add in more corners than just the standard CMOS
    transistor that comes directly from the foundry.


    Traditionally there are two other corner simulation parameters that are needed:
    the supply voltage corner and the temperature corner case. We have the fearsome
    three, namely, process, voltage, and temperature (PVT), and they are often listed
    like this in descending order of importance.


    Once the needed corners have been established, it is time to go to town and simulate.
    With modern simulator environments, it is not difficult to set up large simulation
    sweeps and verify compliance with simple scripting languages. Run these over the
    weekends or overnight, and pay careful attention to small oddities in the result
    (Fig. 6.10). Is there a trend over corners? Sometimes it is so by necessity, but
    say with a bandgap, you would expect to see a flat response around the target
    temperature. In this evaluation phase, it is a good thing to be a bit “paranoid,”
    and often one has to fight one’s tendency to move on.


    ![](img/75093da0d280ad52326a78925e5cc403_331_0.png)


    **Fig. 6.10** Corner simulation warning examples. Do not be fooled because the
    slow corner seems to misbehave that since it is just in one corner that can “never
    happen,” the circuit is ok. Such a case indicates that something is off with the
    circuit or the simulation setup, and on silicon this circuit will not work properly'
  merge: -1
  pgno: 331
- img_proc: true
  md: '# 6.1.8 Monte Carlo Simulations


    Monte Carlo simulations are another classic stress test of circuitry. The idea
    is that in manufacturing, there is variability when deploying the various doping
    and injection steps where the device characteristics will vary from device to
    device. This is often characterized by the foundry one way or other. This characterization
    is often done with devices lying right next to each other and can be a too good
    situation compared to devices being far apart. There are some key steps to think
    about:


    +   - How is the mismatch characterized by the foundry? Are the devices assumed
    to lie next to each other?

    - Run ≫ 100 simulations, with C-only extraction models and the RC-only extraction
    models.

    - Study the resulting standard deviation. How close in number of sigma are we
    from the specifications?


    # 6.2 Small Block Simulations


    In this section, we will discuss general strategies concerning small block simulations.
    We start with simple model estimation calculations and continue with appropriate
    simulation strategies to characterize the schematic.


    Before any circuit simulation is performed, think the circuit through in terms
    of simple modeling (see [1] for many examples on how to do this for a broad range
    of applications). The crucial idea is the simulator should only confirm what you
    already know will happen. If one lets the simulator tell what is going on without
    asking oneself why, one can easily be led astray. It can be the simulator responding
    incorrectly to some stimulus along the lines we outlined in Chaps. 4 and 5, or
    it can be a result of incorrect stimulus. Both of these problems must be caught
    early to avoid lengthy debugging later. With experience many of these calculations
    can be done in one’s head.


    > First describe the circuit you are to design in terms of a simple model.


    # 6.2.1 Analog Circuit Simulation Strategy


    The simulation strategy will depend strongly on what type of circuit you are designing.
    What we outline here is intended for use in continuous time applications like
    amplifiers. Always start your design work by making a simple model of your design
    [1].'
  merge: -1
  pgno: 332
- img_proc: true
  md: 'Once the simple model is in place, it is always best to first verify the DC
    bias with a DC simulation. Ask yourself:


    +   - Is everything biased properly?

    - Are all relevant transistors in saturation (for CMOS)?

    - Is the current draw as expected?


    Once the DC bias condition is satisfactory, one should proceed doing an AC simulation
    and look whether:


    +   - AC gain is as expected from the simple model.

    - AC bandwidth matches the simple model.


    When the small signal response is as expected, one should run transient simulations
    and periodic steady-state simulations and look at things like:


    +   - Is distortion as expected (see [1] for fast ways to estimate harmonics)?

    - Do the CMOS transistors get out of the saturation condition? (This can cause
    distortion and change in loading.)


    The flow is illustrated in Fig. 6.11.

    One of the most common mistakes made by beginners is to use ideal sources everywhere.
    Often it is alright to do at a very initial stage, the first few days. Ideal sources
    are really *ideal*, and a voltage source can deliver any current with no limitation.
    Think, for example, of the case where we have some RF input of 50 ohms and one
    uses an ideal voltage source to model this. It will have infinite bandwidth! It
    is really disappointing at the end of a long design effort to realize the bandwidth
    is actually down the tubes, and it was not caught due to some idealization. But
    it is not just true for signal sources. Voltage supply sources are equally bad
    to substitute with ideal ones. The packaging around the die will often show significant
    inductance in the supply nodes, and to counter this huge numbers of decoupling,
    capacitors need to be used on chip to lower the impedance for fast-switching signals
    (see Fig. 6.12).

    Likewise for current sources, sometimes a design needs to proceed before a full
    biasing block is ready. In this case, mirror an ideal current properly to set
    the bias up. Do not use an ideal current directly at the common source point of
    a differential pair. Instead use a mirror circuit to set up the bias as in Fig.
    6.13. An ideal current source should be used at the point where the biasing current
    will end up eventually.


    > Always use realistic voltage and current sources.


    And perhaps most important for small blocks in particular, use realistic source
    impedance and load impedance.


    > Use realistic source and load impedances from the get-go.'
