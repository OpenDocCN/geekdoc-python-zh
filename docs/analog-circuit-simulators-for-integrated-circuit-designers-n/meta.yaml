    MaxNewtonIter=15

    .ic v(in)=0.45 v(out)=0.45

    .plot v(out) v(in)

    ```


    Let us now run a transient simulation. The input is a sine wave with amplitude
    450 mV and DC offset of 450 mV so the signal swings around the mid-point; we find
    the resulting edge rate by taking the derivative with respect to time in Fig.
    5.25.


    We see here the timestep adjustment algorithm we use causes errors as we step
    along the voltage edge. This is fundamentally why at times it is very useful to
    simulate a circuit with a uniform timestep.


