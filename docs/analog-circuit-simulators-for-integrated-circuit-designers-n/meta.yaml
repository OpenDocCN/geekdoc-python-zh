- img_proc: true
  md: 'We can expand these to get


    $$i_g = \frac{\partial Q_g}{\partial v_{gb}} \frac{\partial v_{gb}}{\partial t}
    + \frac{\partial Q_g}{\partial v_{gd}} \frac{\partial v_{gd}}{\partial t} + \frac{\partial
    Q_g}{\partial v_{gs}} \frac{\partial v_{gs}}{\partial t}$$


    $$i_b = \frac{\partial Q_b}{\partial v_{bg}} \frac{\partial v_{bg}}{\partial t}
    + \frac{\partial Q_b}{\partial v_{bd}} \frac{\partial v_{bd}}{\partial t} + \frac{\partial
    Q_b}{\partial v_{bs}} \frac{\partial v_{bs}}{\partial t}$$


    $$i_d = \frac{\partial Q_d}{\partial v_{dg}} \frac{\partial v_{dg}}{\partial t}
    + \frac{\partial Q_d}{\partial v_{db}} \frac{\partial v_{db}}{\partial t} + \frac{\partial
    Q_d}{\partial v_{ds}} \frac{\partial v_{ds}}{\partial t}$$


    $$i_s = \frac{\partial Q_s}{\partial v_{sg}} \frac{\partial v_{sg}}{\partial t}
    + \frac{\partial Q_s}{\partial v_{sb}} \frac{\partial v_{sb}}{\partial t} + \frac{\partial
    Q_s}{\partial v_{sd}} \frac{\partial v_{sd}}{\partial t}$$


    These equations define 12 nonlinear non-reciprocal capacitances:


    $$C_{ij} = \frac{\partial Q_i}{\partial v_{ij}} \quad \text{where} \quad i, j
    \in \{v, g, s, d\}$$


    We require for charge conservation that


    $$Q_g + Q_b + Q_d + Q_s = 0$$


    Which implies, by taking the time derivative, that


    $$i_g + i_b + i_d + i_s = 0$$


    which should come as no surprise. One can easily show that this means that the
    capacitances are not all independent. One can in fact show that 3 of the 12 capacitances
    can be found from the other nine.


    We conclude by saying that modern simulator implementations have equations to
    calculate the following nine capacitors from the model equations


    $$\begin{pmatrix} C_{gb} & C_{gd} & C_{gs} \ C_{bg} & C_{bd} & C_{bs} \ C_{dg}
    & C_{db} & C_{ds} \end{pmatrix}$$


    and derive the remaining three from these nine.'
