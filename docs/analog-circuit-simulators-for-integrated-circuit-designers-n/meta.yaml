    # 3.1.3 MOSFET Capacitance Modeling Details


    Historically, the development of the FET capacitors models started in the early
    1970s when the Meyer model was presented. This model included three nonlinear
    capacitors between the gate (G), source (S), drain (D), and body (B) terminals.


    It was realized in the late 1970s that something was off with the model. It did
    not conserve charge in all situations. Instead an improved model by [13] addressed
    the issue. Here, more capacitances were added to the model, and the capacitors
    were assumed to be non-reciprocal, in other words $C_{ij} \neq C_{ji}$. This results
    in a total of 12 capacitors of which 9 are independent. To see why the capacitors
    are not necessarily reciprocal, we can use a simple argument. Let us imagine a
    MOS transistor in saturation. We ignore all side wall capacitances and just focus
    on the capacitance of the channel. Now, in saturation a small test voltage at
    the drain will not affect the charge at the gate terminal. However, the opposite
    is not true: a test voltage at the gate will certainly impact charge at the drain
    through the transistor action. We can then say that $C_{gd} \neq C_{dg}$, and
    this non-reciprocal nature of the transistor capacitances was a key to resolve
    the issue of charge conservation.


    We know from basic physics that the rate of change with time of a charge $Q$ is
    equal to a current. For a FET, we find these four currents


    $i_g = \frac{dQ_g}{dt} \quad i_b = \frac{dQ_b}{dt} \quad i_d = \frac{dQ_d}{dt}
    \quad i_s = \frac{dQ_s}{dt} \quad (3.23)$'
  - '[PAGE 51]


    We can expand these to get


    $$i_g = \frac{\partial Q_g}{\partial v_{gb}} \frac{\partial v_{gb}}{\partial t}
    + \frac{\partial Q_g}{\partial v_{gd}} \frac{\partial v_{gd}}{\partial t} + \frac{\partial
    Q_g}{\partial v_{gs}} \frac{\partial v_{gs}}{\partial t}$$


    $$i_b = \frac{\partial Q_b}{\partial v_{bg}} \frac{\partial v_{bg}}{\partial t}
    + \frac{\partial Q_b}{\partial v_{bd}} \frac{\partial v_{bd}}{\partial t} + \frac{\partial
    Q_b}{\partial v_{bs}} \frac{\partial v_{bs}}{\partial t}$$


    $$i_d = \frac{\partial Q_d}{\partial v_{dg}} \frac{\partial v_{dg}}{\partial t}
    + \frac{\partial Q_d}{\partial v_{db}} \frac{\partial v_{db}}{\partial t} + \frac{\partial
    Q_d}{\partial v_{ds}} \frac{\partial v_{ds}}{\partial t}$$


    $$i_s = \frac{\partial Q_s}{\partial v_{sg}} \frac{\partial v_{sg}}{\partial t}
    + \frac{\partial Q_s}{\partial v_{sb}} \frac{\partial v_{sb}}{\partial t} + \frac{\partial
    Q_s}{\partial v_{sd}} \frac{\partial v_{sd}}{\partial t}$$


    These equations define 12 nonlinear non-reciprocal capacitances:


    $$C_{ij} = \frac{\partial Q_i}{\partial v_{ij}} \quad \text{where} \quad i, j
    \in \{v, g, s, d\}$$


    We require for charge conservation that


    $$Q_g + Q_b + Q_d + Q_s = 0$$


    Which implies, by taking the time derivative, that


    $$i_g + i_b + i_d + i_s = 0$$


    which should come as no surprise. One can easily show that this means that the
    capacitances are not all independent. One can in fact show that 3 of the 12 capacitances
    can be found from the other nine.


    We conclude by saying that modern simulator implementations have equations to
    calculate the following nine capacitors from the model equations


    $$\begin{pmatrix} C_{gb} & C_{gd} & C_{gs} \ C_{bg} & C_{bd} & C_{bs} \ C_{dg}
    & C_{db} & C_{ds} \end{pmatrix}$$


    and derive the remaining three from these nine.'
