    \ simulation with timesteps (a) 1 ps, (b) 10 ps, (c) 100 ps\n\n$$i(t_{n+1}) =\
    \ C \\left( 2 \\frac{u(t_{n+1}) - u(t_n)}{\\Delta t} - u'(t_n) \\right) \\quad\
    \ (4.56)$$\n\nThe last term we can approximate is\n\n$$u'(t_n) \\approx \\frac{i(t_n)}{C}\
    \ \\quad (4.57)$$\n\nand we end up with\n\n$$i(t_{n+1}) \\approx C \\left( 2 \\\
    frac{u(t_{n+1}) - u(t_n)}{\\Delta t} - \\frac{i(t_n)}{C} \\right) = C \\left(\
