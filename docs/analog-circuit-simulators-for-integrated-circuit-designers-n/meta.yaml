    Introduction


    **Abstract** This chapter will introduce the general subject matter to the reader
    with no assumption regarding the reader’s experience level. It will highlight
    the engineering environment where the tools are used and the importance of the
    subject itself both historically and in a modern engineering environment.


    # 1.1 Background


    The semiconductor industry is one of the marvels of modern society. We are constantly
    being presented with novel machines that utilize the extraordinary progress the
    industry has kept up over some seven decades of intense development. It was around
    1965 that one of the Intel founders, Gordon Moore, coined what has become known
    as Moore’s law stating that for every 2 years, the number of transistors in a
    given area is doubling. It is an exponential scaling law that has kept up until
    recently (Fig. 1.1).


    This is an extraordinary development driven by consumer demand for higher and
    higher data processing. The advent of streaming where full movies can be viewed
    as they are downloaded to a particular device requires enormous data delivery
    rates. In the beginning of this industry epoch, a commercial integrated circuit
    had a few hundred transistors at most. Compare this to the latest tens of billions
    of devices in a modern central processing unit (CPU) integrated circuit.


    One of the fundamental units one measures these devices with is the so-called
    transistor gate length. It is as presently known to the author at 3 nm scale with
    the latest so-called gate-all-around technology. A typical atom has perhaps a
    size scale of 0.1 nm, just 30 times smaller. We are at the realm of quantum physics
    for these devices. This is not new. Quantum effects like tunneling, where an electron
    can appear at the other side of a barrier with a certain probability, has been
    a source of the so-called leakage current for more than a decade.


    Imagine now a modern integrated circuit or chip in industry parlance with some
    billion devices on it. The key development step of these products is the mask-making
    step. There might be some 50 masks needed for the latest technology, and on average
    such masks cost a few 100,000 US dollars each. This cost is a large portion of
    the design engineering cost, and the total cost of designing such chips can then
    be of the order tens of millions of US dollars. This is before mass production'
