  md: '# Nonlinear Capacitors and Charge Conservation


    There is a simple argument why this causes problems, and it can be found described
    in more details in [4]. It goes like this:


    Connect a linear 1 pF capacitor to a voltage source. Assume the voltage source
    change from 0 to 1 mV in one timestep and then back to zero on the next. Let both
    timesteps be 1 ps. The current computed on the first step is $i = CdV/dt = 10^{-12}10^{-3}/10^{-12}
    = 1mA$, and the charge is $Q = CU = 1fC$. On the next timestep, the charge is
    the opposite, and so for a linear capacitor, there is no charge conservation problem.


    Consider then a nonlinear capacitor that has a capacitance of 1 pF at 0 V and
    1.1 pF at 1 mV. Then as before, the charge for the initial timestep is 1fC, but
    for the next timestep, it is 1.1fC. Thus there is a net charge of $-0.1fC$ for
    the timestep sequence. The solution here could be to take much smaller timesteps
    to reduce the accumulated error. Interestingly enough there is no way to completely
    remove the error unless all derivatives are known exactly, but the proof goes
    outside the scope of this book [4].


    How can one deal with such complications? Let us examine the example by using
    a charge-based model instead where, for example, the charge $q(v) = Cv + Dv^2$.
    For the capacitor current, we now have $i(t) = (q(t1) - q(t0))/\Delta t$. We find


    $i(t1) = 1.05mA$


    $\Delta q(t1) = 1.05fC$


    $i(t2) = -1.05mA$


    $\Delta q(t2) = -1.05fC$


    It is fairly obvious it will conserve charge since the algebraic expression for
    charge is not changing. The point here is that since charge is computed directly,
    it will conserve charge.


    > Verify how your favorite simulator conserves entities. Is it a charge conserved
    simulator or a voltage conserved one for the nonlinear capacitor case.


    To put this more formally, we need to employ this charge formulation in the Newton-Raphson
    formulation. We know


    $i(v) = \frac{\partial q}{\partial t} \rightarrow i_{n+1} \approx \frac{q(u_{n+1})
    - q(u_n)}{\Delta t} = g(u_{n+1})$'
