    被称为该 LMS 方法的误差常数。


    可以证明，这个阶数是 LMS 方法一个定义良好的内在属性 [3, 4]。一个 $p$ 阶 LMS 方法的残差变为


    $$R_{n+1} = C_{p+1} h^{p+1} \frac{d^{p+1}x(t_n)}{dt^{p+1}} + \dots h^{p+2}$$


    这将在后面讨论局部截断误差时带来便利。有了这些定义和定理，我们现在可以进行一些有趣的观察：


    $$C_0 = \rho(1) \quad \text{且} \quad C_1 = \frac{d\rho(1)}{dz} - \sigma(1) - (k-1)\rho(1)$$


    我们现在知道，一个 LMS 方法是相容的，当且仅当


    $$\lim_{h \to 0} \frac{1}{h} \left( C_0 x(t_n) + C_1 h x^{(t_n)} + C_2 h^2 x^{(t_n)}
    + \dots \right) = 0$$


    显然，为了使方法相容，必须有 $C_0 = C_1 = 0$。换句话说，阶数必须 $\geq 1$。同样明显的是，相容性要求：


    $$\rho(1) = 0 \quad \text{且} \quad \frac{d\rho(1)}{dz} = \sigma(1)$$


    有趣的是，如果 $\sigma(1) = 0 \rightarrow \rho(1) = \rho''(1) = 0$，这意味着 $z = +1$ 是 $\rho(z)$
    的一个重根，那么该方法就不可能是零稳定的。基本上我们已经证明，相容且零稳定的方法必须满足


    $$\sigma(1) \neq 0$$


    在所有这些定义之后，局部截断误差（LTE）的定义如下应该不足为奇：


    $$\text{LTE} = C_{p+1} h^{p+1} \frac{d^{p+1}x(t_n)}{dt^{p+1}} + \dots h^{p+2}$$


    上述第一项通常被称为主局部截断误差（PLTE）。


    有了这些准备工作，我们现在可以看看我们的积分方法并了解它们的特性。


    ## 前向欧拉法


    前向欧拉法具有以下序列：$x_{n+1} = x_n + hf_n$ 可以写成


    $$x_{n+1} - x_n = hf_n$$


    根据泰勒展开，我们有


    $$x(t_{n+1}) = x(t_n) + hx''(t_n) + \frac{1}{2}h^2x''''(t_n) + \dots h^3$$


    因此，前向欧拉法（FE）的 LTE 阶数为 2。


    ## 后向欧拉法


    类似地，对于后向欧拉法（BE），我们有 $x_{n+1} - x_n = hf_{n+1}$，我们有 $\alpha_{-1} = 1, \alpha_0
    = -1, \beta_{-1} = 1$，得到


    $$C_0 = 0, \quad C_1 = 0, \quad C_2 = -\frac{1}{2}$$


    这意味着 BE 是 1 阶的，而其 LTE 是二阶的，由下式给出


    $$\tau_{n+1}(h) = -\frac{1}{2}h^2x''''(t_n) + \dots h^3$$


    ## 梯形法


    梯形法具有


    $$x_{n+1} - x_n = \frac{h}{2}(f_{n+1} + f_n)$$


    我们可以确定系数为 $\alpha_{-1} = 1, \alpha_0 = -1, \beta_{-1} = \beta_0 = 1/2$，得到


    $$C_0 = 0, \quad C_1 = 0, \quad C_2 = 0, \quad C_3 = -\frac{1}{12}$$


    因此，梯形法是 2 阶的，LTE 是 3 阶的


    $$\tau_{n+1}(h) = -\frac{1}{12} h^3 x''''''(t_n) + \dots h^4$$


    ## 二阶 Gear 法


    我们将此留给读者进一步探索。


    ### 7.2.1.3 线性多步法的稳定性


    在上一节中，我们定义了所谓的零稳定性。本质上，我们考察一个 LMS 方法，看它是否在时间步长 $h \to 0$ 时趋近于精确解。我们注意到，这显然是数值解方案的一个理想特性。这种零稳定性与微分方程适定性概念之间的相似性，也是当
    $h \to 0$ 时数值方法逼近连续时间公式的自然结果。现在，在实际实现中，我们不能令 $h = 0$，而是需要一个关于有限 $h$ 的稳定性概念。实际上，当我们沿着解推进时，误差会累积，这样的误差可能会完全破坏解。第
    3 章展示了前向欧拉法的这种行为。由于其重要性，稳定性概念显然已被深入研究多年。甚至在电子计算机出现之前，就已经进行了此类研究。这是一个被广泛研究的主题，我们在此将仅限于介绍线性稳定性理论。非线性稳定性领域也有激烈的研究，但我们在此不涉及。线性稳定性涉及对一个测试系统的考察。在连续时间中，我们有


    $$\frac{dx(t)}{dt} = Ax(t) \qquad (7.44)$$


    通常假设此类系统的解随时间衰减，但严格来说，可以想象存在不成立的情况，例如振荡器。我们不会过度复杂化讨论，但在此假设系统解满足 $x(t) \to 0$，$t
    \to \infty$。那么，该系统的数值近似在长时间后也应衰减，即 $x_n \to 0$，$n \to \infty$。这就是我们谈论数值系统稳定性时的含义。我们如何确信我们的数值方法表现如此？正如我们之前所见，这样的线性系统具有解


    $$x(t) = \sum_{i=1}^m c_i e^{\lambda_i t} q_i$$


    其中 $\lambda$ 是复特征值，$q_i$ 是矩阵 $A$ 的特征向量。为简单起见，我们将假设所有特征值都是不同的。为了使这个解随时间衰减，我们只需要


    $$\text{Re}(\lambda_i) < 0, \forall i$$


    如果我们对系统应用 LMS 方法，最终会得到以下序列：


    $$\sum_{j=-1}^{k-1} \alpha_j x_{n-j} - h \sum_{j=-1}^{k-1} \beta_j A x_{n-j} =
    \sum_{j=-1}^{k-1} (\alpha_j I - h \beta_j A) x_{n-j} = 0$$


    我们现在需要理解在什么条件下解会随时间衰减：


    $$x_n \rightarrow 0, n \rightarrow \infty$$


    根据矩阵理论，我们知道可以找到一个非奇异矩阵 $Q$，将 $A$ 转换为对角矩阵 $\Lambda = Q^{-1}AQ$，其对角线元素等于 $A$ 的特征值
    $\lambda_i$。让我们从左边用 $Q^{-1}$ 乘以序列，并在 $A$ 旁边插入 $I = QQ^{-1}$。


    $$\sum_{j=-1}^{k-1} (\alpha_j Q^{-1} - h \beta_j Q^{-1} A Q Q^{-1}) x_{n-j} =
    \sum_{j=-1}^{k-1} (\alpha_j Q^{-1} - h \beta_j \Lambda Q^{-1}) x_{n-j} = 0$$


    然后我们定义 $x_n = Q y_n$，得到


    $$\sum_{j=-1}^{k-1} (\alpha_j Q^{-1} - h \beta_j \Lambda Q^{-1}) Q y_{n-j} = \sum_{j=-1}^{k-1}
    (\alpha_j I - h \beta_j \Lambda) y_{n-j} = 0$$


    序列 $y_n$ 通常可以是复数。我们看到这定义了 $m$ 个单变量方程的序列（每个特征值一个），我们需要寻找 $y_n \rightarrow 0$，$n
    \rightarrow \infty$，这简单来说就是每个序列都满足


    $$\lim_{n \rightarrow \infty} y_n = 0$$


    然后我们可以简单地用单变量序列表示问题


    $$\sum_{j=-1}^{k-1} (\alpha_j - h \beta_j \lambda_i) y_{n-j} = \sum_{j=-1}^{k-1}
    \gamma_j y_{n-j} = 0$$


    并询问必须存在什么条件才能使解满足该极限。由于所有 $m$ 个方程都是相同的，我们只需要查看其中一个就能找到正确的条件。我们在此假设系数是常数，对于这样的序列，可以找到如下解。让我们用候选解表示
    $y_n$，即 $y_n = r_i^n$，其中 $r_i \in \mathbb{C}$ & $r_i \neq 0$：


    $$\sum_{j=-1}^{k-1} \gamma_j y_{n-j} = \sum_{j=-1}^{k-1} \gamma_j r_i^{n-j} =
    r_i^{n-k+1} \left( \gamma_{-1} r_i^k + \gamma_0 r_i^{k-1} + \dots + \gamma_{k-1}
    \right)$$


    现在可以看出，如果 $r_i$ 是所谓的特征多项式的根，那么该序列就是一个解：


    $$\sum_{j=-1}^{k-1} \gamma_j r_i^{k-j-1} = \gamma_{-1} r_i^k + \gamma_0 r_i^{k-1}
    + \dots + \gamma_{k-1}$$


    事实上，可以证明，如果 $r_i$ 是特征多项式的解，那么以下序列也是解：


    $$\{r_i^n\}, \{n r_i^n\}, \{n^2 r_i^n\}, \dots, \{n^{\mu_i-1} r_i^n\}$$


    可以进一步证明，通解就是这些序列的线性组合。考虑到这一点，应该清楚，为了使解随时间衰减，我们必须对特征多项式的所有根都有 $|r_i| < 1$。我们可以用
    LMS 方法的第一和第二多项式来表示特征多项式：


    $$\pi(r, \hat{h}) = \sum_{j=-1}^{k-1} (\alpha_j - \hat{h} \beta_j) r^{k-j-1} =
    \rho(r) - \hat{h} \sigma(r), \hat{h} = h \lambda_i$$


    这个多项式在文献中通常被称为稳定性多项式。我们现在可以定义


    > **定义 7.9**

    > 如果对于给定的 $\hat{h}$，$\pi(r, \hat{h})$ 的所有根都严格位于复平面的单位圆内，则称一个 LMS 方法对于该 $\hat{h}$
    是绝对稳定的。否则，它被称为绝对不稳定。


    我们可以看到，如果 $\rho(r)$ 和 $\sigma(r)$ 有相同的根，那么该多项式也有相同的根。通常情况并非如此，因此对于给定的 $\hat{h}$，根
    $r_0$ 可以通过下式找到


    $$\hat{h}_0 = \frac{\rho(r_0)}{\sigma(r_0)}$$'
