    # 3.2.3 Gummel-Poon Model


    The Gummel-Poon model was the workhorse for many years and is now considered more
    or less obsolete. It expanded on the Ebers-Moll model by also taking into account
    effects of low currents and at high-level injection (Fig. 3.7) show the equivalent
    circuit of the *Gummel-Poon* model. The transistor operation is divided into four
    operating regions: normal active region, inverse region, saturated region, and
    off region.


    *Normal Active Region*

    Here, $V_{be} > -5n_jkT/q$ and $V_{bc} \le -5n_jkT/q$. We then have


    $$I_c = \frac{I_s}{q_b} \left( e^{\frac{qV_{be}}{n_jkT}} + \frac{q_b}{\beta_r}
    \right) + C_4 I_s + \left( \frac{V_{be}}{q_b} - \left( \frac{1}{q_b} + \frac{1}{\beta_r}
    \right) V_{bc} \right) G_{\min}$$


    $$I_c = I_s \left( \frac{e^{\frac{qV_{be}}{n_jkT}}}{\beta_f} - \frac{1}{\beta_f}
    - \frac{1}{\beta_r} \right) + C_2 I_s \left( e^{\frac{qV_{bc}}{n_jkT}} - 1 \right)
    - C_4 I_s + \left( \frac{V_{be}}{\beta_f} + \frac{V_{bc}}{\beta_r} \right) G_{\min}
    \quad (3.46)$$


