    # 5.4.2.5 Benefits of Timestep Control


    In the previous few sections, we have looked at timesteps and how one can adjust
    the timestep to be smaller when the circuit activity warrants it and one can take
    longer steps when the activity is of lower intensity. The penalty one suffers
    is one of accuracy since the difference equations are less accurate when the timestep
    varies, in particular when it varies rapidly. The enormous benefit is one of overall
    simulation speed. The simple examples we looked at here had up to a factor of
    four increase in simulation speed. This is significant. We also noticed that the
    penalty in terms of error was modest. Indeed for modern simulators, the timestep
    algorithm is often a closely guarded secret. In practice if one is interested
    in high accuracy, it is very common to artificially limit the timestep by setting
    the MaxTimeStep variable to some small number. This usually forces the simulator
    to take approximately equation timesteps all through the simulation. As the reader
    no doubt realizes, the penalty in terms of physical time spent simulating can
    be drastically increased, and it is a decision a designer often makes with some
    reservation.'
  - '[PAGE 219]


    # 5.4.3 Convergence Issues


    Convergence issues are a plague to the circuit designer. The good news is that
    modern simulators are much better in solving these problems on their own with
    less assistance from the designer. The days were much different way back when.
    A significant portion of a designer''s time was spent debugging convergence problems,
    and one was forced to learn more about simulators than was perhaps expected. In
    this section, we will look at a couple of examples using our simulator where it
    will have some difficulties, and we will examine various attempts to work around
    it.


    After the chosen integration method had discretized time, it is time to solve
    a large system of nonlinear equations timestep by timestep. We noticed in the
    case of an inverter with no capacitors in Sect. 5.2 that the nonlinear issues
    are similar to a DC analysis. In fact one can view the transient analysis as a
    continuation method with time as the continuation parameter. In general one will
    expect that if all the models are continuous and have continuous first derivatives,
    as long as the timestep is small enough, one can achieve convergence. This is
    what makes transient analysis less prone to convergence issues than DC analysis.
    In DC there is no previous good time point!


    Example: Jumps in Waveform

    One candidate for convergence difficulties where just shrinking the timestep is
    not working is when there are jumps in the waveforms. This can happen in places
    where there are no capacitors to ground at a particular node. This makes that
    node have infinite bandwidth with the resulting convergence difficulties. This
    is mostly an issue with poor modeling since in practice, there are no such nodes
    and often simulators add a cmin capacitor to all nodes to ensure finite bandwidth.
    In earlier versions of CMOS modeling, there were cases where the gate capacitance
    was modeled as a channel capacitance only. This could cause a sudden disappearance
    of capacitance when the channel disappears, but adding sidewall and overlap capacitors
    ensures there is always some capacitance.


    # 5.4.3.1 LTE Criterion Guidelines


    The LTE convergence criteria depends on a user-controlled setting called either
    global, local, or point local (see Sect. 4.6.6). We will discuss the usefulness
    of the global and local varieties in this section and give some simple arguments
    where each may apply.


    Global Usefulness

    The global criterion is useful in situations where there are both large and small
    voltages at the same time in the circuit. Let us look at the example in Fig. 5.27.'
