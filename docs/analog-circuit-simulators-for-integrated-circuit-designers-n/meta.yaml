    # 6.1.4 Gate-Source and Gate-Drain Capacitance Characterization


    One convenient property to characterize the transistors is their gate capacitance
    both to source and drain, in particular when in saturation. A good approach is
    to take a "unit" transistor biased in saturation with an overdrive voltage >100
    mV and a drain current of roughly 1 mA. Or pick a transistor that is typical for
    the particular application one is working on. Then run an AC simulation where
    you look at the amount of *imaginary* current going through the drain and source
    nodes, respectively (see Fig. 6.9). This will quickly give you the capacitances
    for a typical (or unit) transistor, since the imaginary current slope is equal
    to $\omega C$. For the case of Fig. 6.9, we find (Table 6.3).


    By keeping these numbers in mind, one can estimate a transistor''s loading on
    a circuit when looking at schematics [1]. This can be very efficient when designing
    circuits. Furthermore, do the drain source capacitances scale properly? With no
    parasitic resistors in the source and drain, one would imagine the gate-source
    capacitance to be larger since the sidewall capacitance should be similar to the
    drain side, but the channel charge in saturation should only contribute to the
    source capacitance. Sometimes one needs to explicitly turn off the parasitic resistors
    through a specific model family choice. These parasitic resistors can confuse
    the initial intuition one has about the relative size of the capacitors. A drain
    resistor can increase the effective gate-drain capacitance through the Miller
    effect, and a source resistor can reduce the effective gate-source capacitance
    through negative feedback in the source (the internal source voltage is in phase
    with the gate voltage).


    We can calculate the resulting $f_t$ from these capacitances


    ```

    $$f_t = \frac{g_m}{2\pi(C_{gs} + C_{gd})} \approx \frac{10^{-2}}{36 \cdot 10^{-15}}
    \approx 280 \text{ GHz}$$

    ```


    which confirms our direct simulation of the transition frequency.'
