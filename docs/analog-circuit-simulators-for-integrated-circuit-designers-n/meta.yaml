    back from the first fabrication run so a costly mask production step is avoided?
    The answer lies in the use of simulators, both digital, for the core data processing,
    and analog ones for the interfaces to the outside world among other things.


    # 1.2 The Arrival of Simulators


    Using simulators to prove out electronic circuitry is an old idea. The earliest
    attempts can be found in the 1960s where the US Department of Defense supported
    circuit simulation developments that were proprietary. The modern attempts to
    make simulators publicly available were started by researchers at the University
    of California at Berkeley, where the extraordinary vision by a handful of young
    professors and researchers has developed what became known as Simulation Program
    with Integrated Circuit Emphasis or SPICE. It was not without controversy in the
    beginning. A lot of contemporaries felt that simulators could not possibly capture
    the operations well and the effort was a waste of time. Instead the idea was to
    prototype the design using breadboards and discrete devices and then miniaturize
    on a chip. The Berkeley team persisted and it is now considered the original master
    code, and most simulators after this use many of the same features SPICE introduced
    to solve numerical problems. In fact the word spice has become a verb in that
    one often says of simulating a circuit as “spiceing” a circuit. Naturally many
    decades of innovation have produced a code that is quite a bit more complex than
    the first versions.'
