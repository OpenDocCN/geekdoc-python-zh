  md: '# 4.2 Historical Development


    The 1960s and 1970s saw many attempts in developing a way to build circuits using
    computer-aided design (CAD) techniques [1–8]. Many simulator codes in the 1960s
    were written under contract with the US Department of Defense and as such restricted
    in their public use. The design group at the University of California at Berkeley
    under Professor D.O. Pederson quickly became one of the leading teams proposing
    “Simulation Program with Integrated Circuit Emphasis” or SPICE as a way to implement
    circuit network equations in a computer and solve those using numerical techniques.
    At the time, it was often considered a waste of time. The thinking was that computer
    adaptations would be too inaccurate and not capable of producing meaningful results.
    A real transistor implementation being simply too difficult was some of the comments,
    but this did not discourage Pederson and his students. We all owe a debt of gratitude
    to Pederson and his group for their unwavering belief in computer implementations
    using SPICE.


    The first version of SPICE was presented at a conference in Waterloo, Canada,
    in 1973 [7]. It was written by Laurence Nagel, a student of Professor Pederson,
    and is a derivative of an earlier proprietary program called Computer Analysis
    of Nonlinear Circuits, Excluding Radiation (CANCER). Pederson insisted the program
    to be rewritten such that the proprietary restrictions would be removed and the
    code could be placed in the public domain. The code was somewhat limited in what
    devices could be included, and it also used a fixed timestep to advance the equations.
    The popularity of the program increased with the release of SPICE2 in 1975 [6].
    Now the timestep was variable, and there were more circuit elements included in
    the code. The first versions of SPICE were written in FORTRAN with the latest
    release SPICE2g.6 in 1983. The next generation of SPICE, SPICE3, was released
    in 1989 and was written in C where a graphical interface using the X Window System
    was added. The fact that the code was in the public domain and could be purchased
    for a nominal fee covering the cost of a magnetic tape contributed to the huge
    popularity of the code. The author took advantage of this offer from the development
    team as late as the mid-1990s. Simulating a circuit became synonymous to “spice”
    a circuit.


    The development of SPICE was named a milestone in 2011 by IEEE, and L. Nagel was
    awarded the Donald O. Pederson Award in Solid-State Circuits in 2019 for the development
    of the initial code.


    # 4.3 Matrix Equations


    Matrix equations and their solutions were mentioned in Chap. 1. It is a key to
    many modern simulation methods, and a good knowledge on how one can set up and
    solve them is an essential piece of knowledge for the working engineer. This section
    will discuss the setup of such equations given an electronic circuit topology.
    Most'
