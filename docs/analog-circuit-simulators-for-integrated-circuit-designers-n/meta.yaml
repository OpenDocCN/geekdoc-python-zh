    # Middlebrook Stability Analysis


    For loop stability, let us first discuss it as described in [21]. This was one
    of the first theoretical discussions on linear loop gain and has been used as
    a basis for stability simulations for many years. The basic idea is to use injections
    to be able to break the loop at any point.


    Let us look at Fig. 4.17. The loop is broken, and in one end, there is a driving
    source with a certain admittance, and at the other end, there is a load admittance.
    We find with KCL following the notation in [22]


    $$g_1 v_e + v_f (Y_e + Y_f) = 0$$


    or, defining the loop gain


    $$T = -\frac{v_f}{v_e} = \frac{g_1}{(Y_e + Y_f)}$$


    The voltage and current injections are now performed in such a way as to null
    the forward current. We then find


    $$g_1 v_e + v_f Y_f = 0$$


    with the null current ratio


    $$T_n^i = -\frac{v_f}{v_e} = \frac{g_1}{Y_f}$$


    In the next simulation, we provide voltage and current injections such that the
    forward voltage drop is zero:


    $$-i_f Y_e = g_1 i_e$$


    or


    $$-\frac{i_f}{i_e} = \frac{g_1}{Y_e}$$'
