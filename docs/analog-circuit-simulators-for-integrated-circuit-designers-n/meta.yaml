    $$\frac{\partial \boldsymbol{i}(\boldsymbol{v}(t_n))}{\partial \boldsymbol{v}(t_n)}
    \frac{\partial \boldsymbol{v}(t_n)}{\partial \boldsymbol{v}_0} + \frac{1}{\Delta
    t} \left[ \frac{\partial \boldsymbol{q}(\boldsymbol{v}(t_n))}{\partial \boldsymbol{v}(t_n)}
    \frac{\partial \boldsymbol{v}(t_n)}{\partial \boldsymbol{v}_0} - \frac{\partial
    \boldsymbol{q}(\boldsymbol{v}(t_{n-1}))}{\partial \boldsymbol{v}(t_{n-1})} \frac{\partial
    \boldsymbol{v}(t_{n-1})}{\partial \boldsymbol{v}_0} \right] = 0$$


