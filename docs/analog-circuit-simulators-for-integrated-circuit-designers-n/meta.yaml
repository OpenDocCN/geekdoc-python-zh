    \ 60 ns simulation with fixed timesteps\n\n| Parameter | Value | Unit |\n|---|---|---|\n\
    | deltaT | 5e-12 | S |\n| Number of iterations | 19,402 | N/A |\n\nAn initial\
    \ startup phase is followed by the steady oscillation shown in Fig. 5.25. With\
    \ ngspice one can construct a transistor model that behaves just like ours; we\
    \ can then use it to compare our simulator implementation to the ngspice version.\
    \ The two are virtually identical as can be seen in Fig. 5.25. We can use the\
    \ formula derived in [23] to estimate the amplitude. We find\n\n$$A = \\sqrt{\\\
    left(g_m - \\frac{1}{R}\\right)\\frac{4}{g_m^3}}$$\n\nAnd comparing to the simulation,\
    \ we find a reasonable agreement, some 5% off. We can summarize the settings in\
    \ Table 5.10.\n\n## RF Mixer Circuit\n\nA mixer circuit is a workhorse in narrow-band\
    \ radio-type circuits (Fig. 5.20). It is used to translate a frequency-modulated\
    \ signal to baseband (or low frequency). It can also be used to translate a baseband\
    \ frequency up to RF for use in transmitters. The netlist is\n\n```\n*\nvdd vdd\
    \ 0 0.9\nvss vss 0 0\nvinp in1 0 sin(0 0.3 1e9 0 0)\nvinn in2 0 sin(0 0.3 1e9\
    \ 5e-10 0)\nr1 vdd inp 100\nr2 inp vss 100\nr3 vdd inn 100\nr4 inn vss 100\nr5\
    \ vdd outp 100\nr6 vdd outn 100\nc1 in1 inp 1e-12\nc2 in2 inn 1e-12\ni1 vs vss\
    \ sin(1e-3 100e-6 1.001e9 0 0)\nm1 outn inp vs nch\nm2 outp inn vs nch\ni2 vs2\
    \ vss sin(1e-3 100e-6 1.001e9 4.995e-10 0)\nm3 outp inp vs2 nch\nm4 outn inn vs2\
    \ nch\n.options MaxSimTime=2e-6 reltol=1e-3 FixedTimeStep=True\ndeltaT=2e-11 iabstol=1e-6\
    \ vabstol=1e-6 MaxNewtonIter=15\nThreeLevelStep=True\n```\n\n![](img/75093da0d280ad52326a78925e5cc403_209_0.png)\n\
    \nFig. 5.20 A Gilbert-cell mixer circuit\n\n![](img/75093da0d280ad52326a78925e5cc403_209_1.png)\n\
    \nFig. 5.21 The figure shows the spectrum of the output differential voltage (a)\
    \ The full spectrum up to 2.5GHz and (b) the zoom-in around the 1 MHz down-mixed\
    \ signal\n\n```\nspice\n.plot v(outp) v(outn)\nnetlist 5.10\n```\n\nWe can simulate\
    \ this and look at the resulting baseband signal. The input RF signal we have\
    \ chosen is 1GHz + 1 MHz. The LO is at 1GHz. We can then expect a baseband signal\
    \ showing up at 1 MHz. This means the simulation must be >1μs long. This is quite\
    \ a stretch. Later in this chapter, Sect. 5.5.4, we will explore a similar situation\
    \ with a much better type of simulation algorithm (PAC) where we will demonstrate\
    \ the speed improvement with which we can achieve results. See Fig. 5.21 for the\
    \ simulation result.\n\n## 5.4.2 Adjustable Timestep\n\nWe saw in Sect. 5.4.1\
    \ it will be quite cumbersome to have a fixed timestep since the accuracy might\
    \ not be met at some point in time and one might have to redo the simulation.\
    \ Here we will demonstrate the power of timestep adjustments. There is a bit of\
    \ loss of accuracy we will look at toward the end of the section, but the speed\
    \ up with respect to simulation time is significant.\n\n### 5.4.2.1 Timestep Adjustments\n\
    \nA variable timestep change is relatively easy to implement, but the question\
    \ is more what algorithm to choose. It is clear that if the Newton iteration is\
    \ not converging in some reasonable number of iterations, a common number is five,\
    \ we need to take a smaller timestep. How small this should be and what happens\
    \ to the timestep after that is something we will address in this section. One\
    \ might think to try dividing the timestep by 2 if the convergence criteria are\
    \ not met and doubling the timestep if they are met is a good idea. Let us experiment\
    \ with an oscillator. Such a circuit is a good test bench since if the timestep\
    \ algorithm is wrong, it will simply stop oscillating (an oscillator can have\
    \ a DC solution in an idealized world with no noise). Let us investigate the oscillator\
    \ in Sect. 5.4.1.2. We can try to implement the idea of increasing and dividing\
    \ the timestep by a factor of two and see what happens (see Fig. 5.22).\n\n```python\n\
    if NewtonConverged:\n    .\n    .\n    .\n    if not FixedTimeStep:\n        deltaT=2*deltaT\n\
    \    .\n    .\n    .\nelse:\n    .\n    .\n    .\n    SimTime=SimTime-deltaT\n\
    \    deltaT=deltaT/2\n```\n\nWe see the result in Fig. 5.22.\n\n![](img/75093da0d280ad52326a78925e5cc403_211_0.png)\n\
    \nWhat is happening here? The problem is the timestep quickly becomes too large\
    \ and the simulator “misses” the oscillation and finds the DC solution instead.\
    \ We can try to remedy the situation with a MaxTimeStep construct.\n\n```python\n\
    if NewtonConverged:\n    .\n    .\n    .\n    if not FixedTimeStep:\n        deltaT=min(MaxTimeStep,2*deltaT)\n\
    \    .\n    .\n    .\nelse:\n    .\n    .\n    .\n    SimTime=SimTime-deltaT\n\
    \    deltaT=deltaT/2\n```\n\nThe result is in Fig. 5.23.\n\n![](img/75093da0d280ad52326a78925e5cc403_212_0.png)\n\
    \n**Fig. 5.23** Simulator response with a max timestep implementation\n\nNow the\
    \ solver operates much better. Alternatively we can make the timestep increase\
    \ and decrease unequal amounts as in the following code snippet:\n\n```python\n\
    if NewtonConverged:\n    .\n    .\n    .\n    if not FixedTimeStep:\n        deltaT=1.01*deltaT\n\
    \    .\n    .\n    .\nelse:\n    .\n    .\n    .\n    SimTime=SimTime-deltaT\n\
    \    deltaT=deltaT/1.1\n```\n\nThe result is in Fig. 5.24.\n\n![](img/75093da0d280ad52326a78925e5cc403_213_0.png)\n\
    \n**Fig. 5.24** Simulator response with asymmetric increase and decrease in time\
    \ step\n\nThis also seems to work adequately. Let us also look at the increase/decrease\
    \ algorithm by changing reltol. We find the result in Table 5.11.\n\n**Table 5.11**\
    \ Two-level timestep adjustment algorithm as a function of reltol\n\n| reltol\
    \ | Amplitude |\n|---|---|\n| 1e-1 | 0.47 |\n| 1e-2 | 0.47 |\n| 1e-3 | 0.47 |\n\
    | 1e-4 | 0.47 |\n\nThe simulator will always change the timestep which results\
    \ in an increase in the numerical noise causing the oscillation to start even\
    \ at high reltols.\n\nThe fundamental difficulty with this particular implementation\
    \ is that it changes the timestep every time it is updated. This will increase\
    \ the accumulated error. Let us instead adjust it by adding a third, mid-level,\
    \ to the adjustments. What we do is simply to keep track of the maximum ratio\
    \ of the voltage difference to the error limit as in\n\n$$v_{\\max} = \\frac{|v_k\
    \ - v_{pred}|}{reltol \\cdot v_{k,\\max} + vabstol}$$\n\nfor all the voltage nodes.\
    \ If this max is >0.9, we step down a percentage; if it is <0.1, we step up another\
    \ percentage; and if it is between these limits, we leave the timestep unchanged.\
    \ This will keep the timesteps the same for large stretch of the simulation and\
    \ should improve the accuracy. Let us implement this as in the following code\
    \ snippet:\n\nTable 5.12 Three-level timestep adjustment algorithm as a function\
    \ of reltol\n\n| reltol | Amplitude |\n|---|---|\n| 1e-1 | 0 |\n| 1e-2 | 0 |\n\
    | 1e-3 | 0.47 |\n| 1e-4 | 0.47 |\n\nNote the intermediate timestep is so long\
    \ for the high reltols the simulator misses the oscillation! There is less numerical\
    \ noise being generated for these cases, and the simulator finds the DC solution.\n\
    \nTable 5.13 Accuracy of two versions of timestep adjustments\n\n| Property |\
    \ Fixed timestep | MaxTime, % difference | Small increase, % error |\n|---|---|---|---|\n\
    | Frequency | 5.032e9 | 0.1 | 0.1 |\n| Amplitude | 0.47 | 2 | 1 |\n\nLet us run\
    \ the oscillator for different reltols like we just did for the two-level algorithm.\
    \ We find the result in Table 5.12.\n\nWe can use these methods and compare with\
    \ the fixed timestep solution and measure frequency and amplitude using the fixed\
    \ timestep as the absolute reference. We then find the result in Table 5.13.\n\
    \n### 5.4.2.2 Summary\n\nTimestep control is a closely guarded secret for commercial\
    \ simulators since it directly affects the simulator performance. In this section,\
    \ we have demonstrated a couple of strategies one can employ and showed the possible\
    \ strengths and weaknesses of each compared to a more accurate fixed timestep\
    \ simulation.\n\nThe reader is strongly encouraged to explore this more on his\
    \ or her own. The literature on timestep adjustments is rich, and the reader can,\
    \ for example, look at [4, 15–17, 24] to get an idea of what people have tried.\n\
    \nThe fact that we are using a variable timestep can cause problems when we are\
    \ using a Gear2 implementation. If we recall from the previous sections and in\
    \ Chap. 1, the Gear method relies on information from two timesteps back. If these\
    \ two timesteps are different, we are not quite getting the right value, and one\
    \ then needs to inter(extra)-polate to get the appropriate number. This can often\
    \ result in a convergence problem unless one remedies it. Can you find a good\
    \ way to circumvent this potential problem?"
