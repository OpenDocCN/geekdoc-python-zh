    \ = u(t_{n+1}) \\frac{2\\Delta t}{3L} + \\frac{4}{3} i(t_n) - \\frac{1}{3} i(t_{n-1})\
    \ \\quad (4.66)$$\n\nAnd the matrix implementation will look like\n\n$$\\begin{pmatrix}\
