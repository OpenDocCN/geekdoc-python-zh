    \ A & 0 \\\\ Z & Y \\end{pmatrix}$$\n\nwhere Z is an impedance matrix\n\n$$Z =\
    \ \\begin{pmatrix} j\\omega L & 0 & 0 \\\\ 0 & 1 & 0 \\\\ 0 & 0 & 1 \\end{pmatrix}$$\n\
    \nand\n\n$$A = (1 \\ -1 \\ -1) \\text{ and } Y = \\begin{pmatrix} \\frac{1}{j\\\
    omega L} \\\\ -\\frac{1}{R} \\\\ -j\\omega C \\end{pmatrix}$$\n\nA is often called\
    \ the *reduced incidence* matrix in the literature [1–8, 10], and Y is an *admittance*\
    \ matrix. In short form, we have\n\n$$\\begin{pmatrix} A & 0 \\\\ Z & Y \\end{pmatrix}\
    \ \\begin{pmatrix} i_1 \\\\ i_2 \\\\ i_3 \\\\ v_o \\end{pmatrix} = \\begin{pmatrix}\
    \ 0 \\\\ v_{in} \\\\ 0 \\\\ 0 \\end{pmatrix}$$\n\nThis is sometimes referred to\
    \ as the *reduced form* of the *sparse tableau analysis* (STA) form in books.\
    \ In this book, we will use this formulation throughout, since it keeps all the\
    \ current and branch voltages as explicit unknowns and it then is easier to examine\
    \ a particular variable. One can further reduce the systems of equations by rewriting\
    \ most of the device currents as a function of the voltage across them. One then\
    \ arrives at the *nodal analysis* form. It is rarely useful, and in simulators\
    \ one most commonly use what is called the *modified nodal analysis* (MNA) form.\
    \ Here some currents have been added back into the system of equations. The details\
    \ on these various formulations we leave for Chap. 7 and [4, 5, 10–15]. These\
    \ formulations are convenient since one can build up the matrix equations in linear\
    \ time just upon reading the circuit netlist, following some simple rules. To\
    \ see how this might be done, let us again look at Eq. 4.10:\n\n$$\n\\begin{cases}\n\
    i_1 - i_2 - i_3 = 0 \\\\\n-i_4 + i_2 + i_3 = 0 \\\\\ni_1 j\\omega L + v_1 = v_{in}\
    \ \\\\\ni_2 R_1 - v_1 + v_2 = 0 \\\\\ni_3 - v_1 j\\omega C = 0 \\\\\ni_4 R_2 -\
    \ v_2 = 0\n\\end{cases}\n$$\n(4.15)\n\nThe first two equations are just KCL at\
    \ nodes $v_1$, $v_2$. The following four equations describe how our four unknown\
