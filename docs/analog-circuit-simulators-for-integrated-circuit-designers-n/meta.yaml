    ## Definition 7.2

    Lipschitz continuity. Let us assume $f$ is such that there exists a constant $L$
    such that

    $$\|f(x,t) - f(x'',t)\| \leq L\|x - x''\| \quad (7.37)$$

    holds for every $(x,t), (x'',t) \in \mathcal{D}$. $f$ is then called Lipschitz
    continuous.


    It is a little more than a continuity condition but not quite as strong as differentiability
    [4].

    The following standard theorem now guarantees the existence of a unique solution:


    ## Theorem 7.1

    Let $f(x,t)$ be continuous in $t$ on $\mathcal{D}$ and Lipschitz continuous in
    $x$ on $\mathcal{D}$. Then, for any $x_0 \in \mathbb{R}^m$, there exists a unique
    solution $x(t)$ of the equation $\dot{x}(t) = f(x,t), x(t_0) = x_0$, where $x(t)$
    is continuous and differentiable on $\mathcal{D}$. In addition the equation is
    well-posed.


    Finally, let us wrap up the mathematical definitions by the following definition
    of a linear system. We will assume the system under study in this chapter is such
    that Theorem 7.1 is met.


    ## Definition 7.3 Linear System

    An equation $\dot{x}(t) = f(x,t)$ is considered linear if $f(x,t)$ can be described
    as

    $$f(x,t) = A(t)x + b(t)$$

    where $A(t)$ is in general an $m \times m$ matrix and $b$ is a column vector of
    size $m$. If $A(t) = A$, in other words, constant independent of time, we say
    the system is linear with constant coefficients:

    $$\dot{x}(t) = Ax + b(t)$$

    If $b = 0$ we have a homogeneous system:

    $$\dot{x}(t) = Ax$$


    Imagine a general solution $\hat{x}(t)$ to the homogeneous system and $\bar{x}(t)$
    is a particular solution to constant coefficient equation, one can show that $x(t)
    = \hat{x}(t) + \bar{x}(t)$ is the general solution to the constant coefficient
    equation [3, 4]. Since $A$ is a matrix, one can solve for its eigenvalues and
    eigenvectors by solving


    $$Aq_i = \lambda_i q_i, i \in \{1, 2, ..., m\} \quad (7.38)$$


    One can now show that


    $$\hat{x}(t) = \sum_{i=1}^{m} c_i e^{\lambda_i t} q_i \quad (7.39)$$


    is the general solution to the homogeneous system where the constants $c_i$ are
    arbitrary [3, 4]. As a result, the solution to the constant coefficient equation
    is


    $$x(t) = \bar{x}(t) + \sum_{i=1}^{m} c_i e^{\lambda_i t} q_i \quad (7.40)$$


    We will need these solutions and properties of linear equations later when we
    discuss stability of ODEs.


    ### 7.2.1.2 Classification of Linear Multistep Methods


    The most common solution methods are called linear multistep methods. They rely
    on more than one previous solution in time to calculate the new solution at the
    new timestep. Formally we have from [4] originally but also [3]


    $$\sum_{j=-1}^{k-1} \alpha_j x_{n-j} = h \sum_{j=-1}^{k-1} \beta_j f(x_{n-j},
    t_{n-j}), k \ge 1, \alpha_{-1} \equiv 1 \quad (7.41)$$


    where $h$ is the timestep which is assumed uniform for now. If $\beta_{-1} \neq
    0$, we say the method is implicit; else we say it is explicit.


    For any solution method, there are a few important properties that are needed
    for them to be useful. First, the method should converge and we will define that
    properly shortly. Second, the method should be stable. These two properties will
    be discussed in the next few sections.


    ### Convergence


    We can think of convergence as the way a numerical method approaches the exact
    solution as the timestep, $h \to 0$ (we leave round-off errors out of the discussion
    for now). The following definition is then fairly intuitive:


    ## Definition 7.4


    A numerical method is said to be convergent if, for all IVPs satisfying the hypotheses
    in Theorem 7.1, we have that


    $$\lim_{h \to 0} \left( \max_{t_n \in [t_0, t_f]} x(t_n) - x_n \right) = 0$$


    Notice we evaluate the exact solution $x$ at the discrete time points, $t_n$.
    Basically it means the numerical solution approaches the exact one as the timestep
    goes to zero. It is clearly necessary to have a method that approaches the exact
    solution in this limit.


    ## Definition 7.5


    A numerical method is said to be consistent if, for all IVPs satisfying the hypotheses
    in Theorem 7.1, we have that


    $$\lim_{h \to 0} \left( \max_{t_n \in [t_0, t_f]} \frac{1}{h} R_{n+1} \right)
    = 0$$


    Here $R_{n+1}$ is the residual defined as


    $$R_{n+1} = \sum_{j=-1}^{k-1} \alpha_j x(t_{n-j}) - h \sum_{j=-1}^{k-1} \beta_j
    f\left(x(t_{n-j}), t_{n-j}\right) \quad (7.42)$$


    It is essentially equal to the local truncation error (LTE) we discussed in Chap.
    4. If $R_{n+1}$ is zero, it means the numerical solution follows the exact solution
    precisely. We now come to the important definition of the first characteristic
    polynomial. We will use this later in this section when discussing stability.


    ## Definition 7.6a


    For the linear multistep method, we define the first characteristic polynomial
    in $z \in \mathbb{C}$ as


    $$\rho(z) = \sum_{j=-1}^{k-1} \alpha_j z^{k-j-1} = \alpha_{-1} z^k + \alpha_0
    z^{k-1} + \dots + \alpha_{k-1}$$


    As the reader sees, it is defined using only the coefficients on the left-hand
    side of the LMS method. This is due to fact that as $h \to 0$, it is only the
    terms on the left-hand side that determines the dynamics of the algorithm. As
    such it should be an important entity to study. We have also the second characteristic
    polynomial.


    ## Definition 7.6b

    For the linear multistep method, we define the second characteristic polynomial
    in $z \in \mathbb{C}$ as

    $$\sigma(z) = \sum_{j=-1}^{k-1} \beta_j z^{k-j-1} = \beta_{-1} z^k + \beta_0 z^{k-1}
    + \dots + \beta_{k-1}$$


    In this section, we have concerned ourselves with the implementation of a numerical
    method to solve the original IVP. To have a chance at a solution, the IVP had
    to meet certain well-posedness qualities as we discussed in the previous section.
    For the numerical method itself, there are similar considerations, and we will
    discuss first what is called zero-stable difference systems.


    ## Definition 7.7

    Let $\{\delta_n\}$ and $\{\hat{\delta}_n\}$ be any two perturbations of the difference
    system, and let $\{x_n\}$ and $\{\hat{x}_n\}$ be the resulting perturbed solutions.
    If there exists constants $S$ and $h_0$ such that, for all $0 < h \le h_0$, we
    have

    $$x_n - \hat{x}_n \le S\epsilon, \forall n \quad \text{whenever} \quad \delta_n
    - \hat{\delta}_n \le \epsilon, \forall n$$

    we say the difference system is zero-stable.


    Notice the similarity to the continuous time definition of well-posedness for
    the differential equation.

    As we hinted earlier, the first characteristic polynomial is important to study
    zero stability. In fact we have the following theorem:


    ## Theorem 7.2

    A difference system is zero-stable if and only if it satisfies what is called
    the root condition: if every root of the characteristic polynomial $\rho(z)$ is
    either inside the unit circle (in the complex plane) or alone on the unit circle.


    With these definitions and theorems in hand, we can now state the fundamental
    theorem for the study of IVPs as


    ## Theorem 7.3

    A difference system is convergent if and only if it is both consistent and zero-stable.


    We will go through the various methods we have defined in the book and see how
    these conditions line up.


    ### Order of Difference Equation


    The concept of order of a difference equation will be defined shortly, but first
    we need to define what is called a difference operator.


    The linear difference operator of a LMS method, denoted by $D$, is an operator
    which applied to a smooth time function $s(t)$ produces another time function:


    $$D[s(t);h] \equiv \sum_{j=1}^{k-1} \alpha_j s(t-jh) - h \sum_{j=1}^{k-1} \beta_j
    s''(t-jh) \quad (7.43)$$


    Notice that when $D$ is applied to the exact solution, it becomes the residual.
    With this definition, one can define the order of an LMS method easily. A Taylor
    expansion is most often used to describe the order of a function, and we start
    here with the expansion of $s(\tau)$ around $\tau = t$:


    $$s(\tau) = s(t) + \sum_{q=1}^{\infty} \frac{1}{q!} \frac{d^q s(t)}{dt^q} (\tau
    - t)^q$$


    The derivative of $s(\tau)$ with respect to $\tau$ gives us


    $$\frac{ds(\tau)}{d\tau} = \sum_{q=1}^{\infty} \frac{1}{(q-1)!} \frac{d^q s(t)}{dt^q}
    (\tau - t)^{q-1}$$


    After evaluating these two expressions at $\tau = t - jh$, we have


    $$s(t-jh) = s(t) + \sum_{q=1}^{\infty} \frac{1}{q!} \frac{d^q s(t)}{dt^q} (-jh)^q$$


    $$\frac{ds(t-jh)}{d\tau} = \sum_{q=1}^{\infty} \frac{1}{(q-1)!} \frac{d^q s(t)}{dt^q}
    (-jh)^{q-1}$$


    We can now put these two expressions into the definition of $D$ and collect terms
    of the same kind


    $$D[s(t);h] = C_0 s(t) + C_1 h \frac{ds(t)}{dt} + \dots + C_q h^q \frac{d^q s(t)}{dt^q}
    + \dots$$


