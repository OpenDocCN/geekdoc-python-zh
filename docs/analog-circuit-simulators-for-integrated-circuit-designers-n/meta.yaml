    \end{pmatrix}$$


    It is straightforward to see the following properties are true:


    +   - The rows in the matrix equation are interchangeable. It is just a matter
    of ordering the equations. The second equation can exchange places with the first,
    for example, with no change in the solution.

    - Naturally we can add rows together, with a weight, at will as long as we also
    do the same operation on the rhs. For example, row1-3*(row2) will result in a
    new row $-7y - 5z = -8$ that does not contain any $x$. No information is added
    or destroyed when this new row is used in place of one of the original two rows.

    - One can also interchange any two columns in $A$ but not without also interchanging
    the corresponding rows in $x$:


    $$A = \begin{pmatrix} 3 & 1 & 2 \ 1 & 2 & 3 \ 2 & 3 & 1 \end{pmatrix} \rightarrow
    x = \begin{pmatrix} x \ z \ y \end{pmatrix}, \quad b = \begin{pmatrix} 7 \ 5 \
    12 \end{pmatrix}$$


    Gaussian elimination uses one or more of the steps above to reduce the matrix
    $A$ to the identity matrix. When this is done, the rhs becomes the solution. Let
    us solve the matrix equation above to illustrate specifically:


    $$\begin{cases} 3x+ & 2y+ & z=7 \ x+ & 3y+ & 2z=5 \ 2x+ & y+ & 3z=12 \end{cases}
