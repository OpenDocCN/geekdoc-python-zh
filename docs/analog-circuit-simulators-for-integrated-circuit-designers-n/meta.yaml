    # Appendix A Complete Python Code Lists for All Examples


    This appendix contains the complete codes for all the various simulation examples
    studied in the book. First, a word of caution:


    +   - The main goal of the code has been to make it readable for people without
    any code expertise in their background. Therefore, a lot of the cleverness of
    Python has perhaps not been utilized fully.

    - The code segments have not been debugged much beyond the displayed netlists,
    so if other netlists are attempted, it is likely there will be errors.


    # A.1 Introduction


    Here we will first define the various variables we are using and show an example
    of a Python implementation of what we just discussed in the previous sections.


    # A.1.1 Variables


    The python code will be discussed here with variable definitions, etc.


    **DeviceCount** – Counter for number of devices in the netlist

    **NDevices** – Max number of devices

    **DevType[]** – Array of length NDevices where each element describes the device
    type for each element

    **DevLabel[]** – Array of length NDevices where each element contains a string
    with the device’s label.

    **DevNode1[]** – Array of length NDevices where each element contains a string
    with the device’s first node name

    **DevNode2[]** – Array of length NDevices where each element contains a string
    with the device’s second node name'
  - '[PAGE 372]


    **DevNode3[]** – Array of length NDevices where each element contains a string
    with the device’s third node name

    **DevNode4[]** – Array of length NDevices where each element contains a string
    with the device’s fourth node name

    **DevValue[]** – Array of length NDevices where each element contains a number
    with the device’s value, for example, resistance

    **Nodes[]** – List of string node names. It is dynamically allocated as the netlist
    is read.

    **NumberOfNodes** – Length of Nodes[]

    **STA_matrix[][]** – The STA matrix with size [NumberOfNodes+DeviceCount] [NumberOfNodes+DeviceCount]

    **STA_rhs[]** – The right hand side of the equation. It has size [NumberOfNodes+DeviceCount].


    # A.1.2 Basic Structure


    The STA_matrix is defined such that the first NumberOfNodes rows contain the nodes
    where KCL is described. The next DeviceCount rows contain the branch equation
    for each device. The STA_rhs follows this structure.


    # A.1.3 Netlist Syntax


    The netlists follows the basic SPICE netlist format.

    The SPICE netlist format was originally conceived by the team behind the SPICE
    simulator at UC Berkeley. The source file for any version of spice has the following
    format:


    ```

    TITLE

    ELEMENT DESCRIPTIONS

    .MODEL STATEMENTS

    OUTPUT COMMANDS

    .END

    ```


    Important points:


    +   - The first line traditionally is a circuit name label preceded by a *. Here
    we just keep that tradition going and start all netlists with such a row. It is
    treated as a comment.

    - Comment entire lines by beginning them with ''*''.

    - Only independent sources can contain the ground node “0.”


    # The Circuit Description


    A circuit description in SPICE, which is frequently called a netlist, consists
    of a statement defining each circuit element. Connections are described by naming
    nodes. (The usual names are actually numbers.) One node name has a defined meaning.
    Node 0 is ground! This node can only be connected to an independent source.'
  - '[PAGE 373]


    No other elements can have ground explicit in the node list. Instead one defines
    a node like vss which connects to ground via an independent source.


    The format of an element description is


    ```

    <letter><name><n1><n2>…[mname][parvals]

    ```


    where <...> must be present and [...] is optional.


    +   - <letter> is a single letter denoting the component type.

    - <name> is a unique alpha-num combination describing the particular instance
    of this component..

    - <ni> is the name of a node.

    - [mname] is the (optional) modelname.

    - [parvals] are (sometimes optional) parametervalues.


    # Sign Conventions


    A current is considered positive going into a device port and negative otherwise.


    # Passive Elements


    The <letter> that begins an element instance denotes the circuit element. The
    passive elements are


    R or r for resistors, L or l for inductors, and C or c for capacitors.


    This <letter> is followed by a unique instancename and then (in order) the nodes
    associated with + and – voltage and the value of the associated parameter (R,
    L, or C). The value needs to be in real numbers.


    Examples:


    +   - R 1 50 20000

    - cloadn IN GND 250e-15

    - L41 22 21 4e-9


    # Independent Sources


    ```

    V<name><n+><n–>[type]<val>

    ```


    defines an independent voltage source with its + terminal at node n+ and its -
    node at node n-.


    ```

    I<name><n+><n–>[type]<val>

    ```


    defines an independent current source whose current flows through the source from
    node n+ to node n-.


    > Only independent sources can have node 0 defined. All other devices cannot.
    This is to reduce the number of conditional statements in the code.'
  - '[PAGE 374]


    # Examples:


    +   - Vdd 4 0 5 defines a 5 V source with the + terminal connected at node 4 and
    the - terminal connected at node 0 (ground).

    - Ibias 18 4 15e-3

    - Vin vin 0 sin(Offset Amplitude freq phase) defines a sinewave with a certain
    Offset, Amplitude, freq and phase.

    - Vpwl vin 0 pwl(t1 val1 t2 val2) defines a piecewise linear device with time/value
    points defined by the list of pairs.


    # Bipolar Junction Transistors


    The BJT also requires both a netlist statement and a .MODEL. A BJT is included
    in the netlist with a statement of the form


    ```

    Q<name><nc><nb><ne><model – name>

    ```


    where the collector is connected at node nc, the base at node nb, and the emitter
    at node ne.


    **Example:** Q3 6 3 0 my-nnp corresponds to


    The model-name is defined as


    ```

    .MODEL <model – name> Early =, K =

    ```


    where Early means the Early voltage as discussed in Chap. 3 and K is the current
    $I_0$ as defined in Sect. 3.4.3.


    # MOSFETs


    The BJT again requires both a netlist statement and a .MODEL. A MOSFET is included
    in the netlist with a statement of the form


    ```

    M<name><nd><ng><ns><model – name>

    ```


    where the drain, gate, source, and body are connected at nodes nd, ng, ns, and
    nb, respectively. The length L and width W are optional.


    The model-name is defined as


    ```

    .MODEL <model – name> K =, VT =, lambdaT =

    ```


    corresponding to the basic parameters in Sect. 3.4.2


