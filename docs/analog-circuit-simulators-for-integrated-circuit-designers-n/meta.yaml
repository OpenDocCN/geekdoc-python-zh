- img_proc: true
  md: '# 5.5 Periodic Steady-State Solvers


    ![](img/75093da0d280ad52326a78925e5cc403_245_0.png)


    Fig. 5.38 Harmonic balance results of using a more realistic transistor model
    as a function of the number of harmonics. As that number is increasing, the result
    improves considerably. Note: smoothing has been enabled in the rendering to make
    the differences stand out clearer


    Envelope simulation is a combination of a steady-state simulator and a time-domain
    simulator. If you have ever done work in an electronics laboratory, you have perhaps
    had the chance to work with a spectrum analyzer. In a typical setup, such an instrument
    shows the spectral components of the signal at the input port. When looking at
    those spectral views and often seeing they vary with time, see Fig. 5.39. These
    time-varying components are what we are after with an envelope simulator.


    Mathematically, in harmonic balance, we can write a wave form at a certain node
    as


    $$v(t) = \sum_{k=0}^{\infty} V_k e^{-i\omega_k t}$$ (5.70)


    In an envelope simulation, the Fourier coefficients vary with time, so we have


    $$v(t) = \sum_{k=0}^{\infty} V_k(t) e^{-i\omega_k t}$$ (5.71)


    just like we have seen in a spectrum analyzer.'
  merge: -1
  pgno: 245
- img_proc: true
  md: '![](img/75093da0d280ad52326a78925e5cc403_246_0.png)


    **Fig. 5.39** Typical spectrum analyzer output (a, b) shows spectrum at different
    times


    Before the purist reading this has a fit (this type of formula is not self consistent
    for arbitrary waveforms), the basic assumption is that the coefficients $V_k(t)$
    vary with time much slower than the carrier frequencies. In other words, as the
    envelope function changes, the rest of the high-frequency components have a chance
    to completely settle. In this sense, what we are doing in an envelope simulation
    is to do a steady-state analysis at a series of points in time. We start at $t
    = 0$ and set the modulation generators to whatever value they have at that time.
    The rest of the circuit is now used to solve the steady state assuming the modulation
    control values are constant. This will give rise to a certain set of harmonics.
    Having solved for the situation at $t = 0$, we can now continue to $t = t_1$ set
    all modulation sources to their value at that time and again solve for steady
    state with this new input in mind. This we continue to do until all the desired
    time points are solved for. Often the timestep size is fixed, and for that case
    the modulation bandwidth is $\pm \frac{1}{2T_{step}}$. Any tone in the envelope
    function will show up as two modulation tones around the harmonic carrier.


    The advantage of envelopes simulations is that the amplitude, phase of each carrier,
    is available immediately. One can then use these to make models of various modulation
    schemes. One does not need additional calculations to convert the time-domain
    information to envelope information. We simply start from the steady-state solution
    directly, no need to wait for time-domain settling. It of course also goes the
    other way, and if the initial transient is of interest, the harmonic balance method
    does not provide a way to examine it. In short, an envelope simulator takes the
    carrier steady state into account through harmonic balance, and there is no need
    to wait for the steady state; a low-frequency modulation signal is then used in
    the time domain to calculate the circuit response, and there is no need to include
    all possible harmonics. The envelope simulator then takes advantage of what is
    best in both harmonic balance and time-domain simulators for certain specific
    applications.'
  merge: -1
