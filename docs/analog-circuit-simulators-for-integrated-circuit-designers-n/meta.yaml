  md: 'The global accuracy is more difficult to predict since it is very dependent
    on the circuit being simulated. We will address these issues again in Chap. 4.


    > If the solution is a polynomial of order $n$, a difference approximation that
    is accurate to this order will have no truncation errors.


    # 2.1.6.2 Stability


    Stability of numerical implementations of differential equations is obviously
    an important subject, and it has been well studied over many years (see, for example,
    Chap. 7 and [2–17]). We will here just show what is referred to as the regions
    of stability for the methods we just discussed in Sects. 2.1.2, 2.1.3, and 2.1.4.


    # General Stability Theory


    What one means by a system being stable can be different from application to application.
    Here, as in most circuit theory books, we will adopt the bounded definition of
    stability, meaning the solution is considered stable if the signals will remain
    within a certain limited bound, $B$, at all times. We will follow the common thread
    in the literature and use simple linear systems to investigate the numerical stability.


    To analyze stability, let us then consider a homogeneous linear differential system
    with constant coefficients


    $$\frac{dx}{dt} = Ax$$


    where we assume $|x(t)|_{\max} \rightarrow \leq B$ as $t \rightarrow \infty$.
    This equation is referred to as a test equation. A set of linear equations like
    the test equation has the exact general solution


    $$x(t) = \sum_{i=1}^{n} c_i e^{\lambda_i t} v_i$$


    where $\lambda_i$, $v_i$ are the eigenvalues/vectors to the system obtained by
    solving


    $$Av_i = \lambda_i v_i$$


    $\lambda_i$ are in general complex numbers. If we assume the system is stable,
    it implies that $Re(\lambda_i) \leq 0 \forall i$. All eigenvalues are in the left
    half plane or on the imaginary axes. Let us illustrate in Fig. 2.2. It shows how
    the solution with positive real eigenvalues explodes beyond bounds due to an exponent
    that increases linearly with time on the right-hand plane, while eigenvalues with
    negative real values decreases with time on the left-hand side (Fig. 2.2).'
