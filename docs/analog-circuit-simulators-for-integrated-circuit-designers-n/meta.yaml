    discussed in Sects. 3.4.2 and 5.2.1.1. We Fourier transform the current voltage
    relationship just we did for the simpler model and note we need to add a derivative
    of the drain voltage to the Jacobian matrix. We will not go thought the details,
    here but they are straightforward, and we leave the mathematical derivations to
    the reader and present the code implementation as Code 5p8 in Sect. 5.6.8. We
    can simulate the same circuit one more time, **netlist 5.6**, with this improved
    transistor model, and we find the result in Fig. 5.38.


    The improvement going from 4 harmonics to 8 is quite different from 16 to 32.
    The system has clearly converged.


    We need to accentuate one more time the fact that the steady-state solution is
    what the transient would be if one waits for a long time. A properly designed
    steady-state simulator will always have a more accurate response than a transient.
    Also note the step in time is *one* period. A transient simulation ends when it
    ends.


    *Multi-tone Implementation*

    Just like we discussed for the shooting method case, a multi-tone implementation
    is fairly straightforward when using the beat frequency of all signal sources.


    # 5.5.3 Envelope Analysis


    In time-domain-based simulators, we have discussed the timesteps taken need to
    be smaller when higher frequencies appear in the circuitry due to LTE and GTE
    effects. Harmonic balance simulators do not suffer from this weakness, but they
    require at substantial number of harmonics, in particular if one has a combination
    of low-frequency modulation components riding on top of higher-frequency carriers.'
  - '[PAGE 245]


    # 5.5 Periodic Steady-State Solvers


    ![](img/75093da0d280ad52326a78925e5cc403_245_0.png)


    Fig. 5.38 Harmonic balance results of using a more realistic transistor model
    as a function of the number of harmonics. As that number is increasing, the result
    improves considerably. Note: smoothing has been enabled in the rendering to make
    the differences stand out clearer


    Envelope simulation is a combination of a steady-state simulator and a time-domain
    simulator. If you have ever done work in an electronics laboratory, you have perhaps
    had the chance to work with a spectrum analyzer. In a typical setup, such an instrument
    shows the spectral components of the signal at the input port. When looking at
    those spectral views and often seeing they vary with time, see Fig. 5.39. These
    time-varying components are what we are after with an envelope simulator.


    Mathematically, in harmonic balance, we can write a wave form at a certain node
    as


    $$v(t) = \sum_{k=0}^{\infty} V_k e^{-i\omega_k t}$$ (5.70)


    In an envelope simulation, the Fourier coefficients vary with time, so we have


    $$v(t) = \sum_{k=0}^{\infty} V_k(t) e^{-i\omega_k t}$$ (5.71)


    just like we have seen in a spectrum analyzer.'
- md: "## 5.5.4 Perturbation Techniques\n\nHaving established a periodic steady-state\
    \ solution much can now be analyzed. Part of the analysis in the previous section\
    \ showed there is a matrix called the conversion matrix, simply the harmonic Jacobian,\
    \ that calculates the gain from one frequency harmonic to any other harmonic provided\
    \ the signal is small enough as not to disturb the steady-state condition we have\
    \ established. We can think of it as a harmonic AC analysis. A small signal riding\
    \ on top of larger one will mix with such a signal via the conversion matrix and\
    \ produce tones around other harmonic frequencies. This is not an uncommon situation.\
    \ Think of the case of an up-conversion RF mixer where the LO signal is large\
    \ and the RF signal that multiplies it is small and of baseband frequency (say\
    \ 100 kHz). To resolve the gain of such, a system will require a simulation lasting\
    \ some 10 μs, something that is really painful if the LO frequency is in the GHz\
    \ range. Imagine our periodic steady-state system, where we can translate the\
    \ gain from DC to the LO first harmonic simply with an AC like calculation; we\
    \ can simulate this gain much more efficiently. The same can be said about other\
    \ conversion-type systems like phase-noise translation in oscillators, etc. We\
    \ will discuss details of such simulations in the last section of this chapter.\n\
    \nThis section will discuss first what is commonly known as periodic AC simulation\
    \ followed by periodic noise analysis. We will exemplify the technique in our\
    \ Python setup and use it later in Sect. 5.5.7.\n\n### Periodic AC Analysis\n\n\
    Let us assume we have a solution for our circuit such that\n\n$$f(v(t)) = i(v(t))\
    \ + \\dot{q}(v(t)) + u = 0 \\quad (5.72)$$\n\nWhat if we add a small signal perturbation\
    \ to $u(t) \\rightarrow u(t) + \\tilde{u}(t)$ such that the overall solution is\
    \ still approximately valid? The solution will likewise be adjusted with a small\
    \ correction, $v(t) \\rightarrow v(t) + \\tilde{v}(t)$, and we see we seek a solution\
    \ that meets\n\n$$f(v(t) + \\tilde{v}(t)) = i(v(t) + \\tilde{v}(t)) + \\dot{q}(v(t)\
    \ + \\tilde{v}(t)) + u + \\tilde{u}(t) = 0 \\quad (5.73)$$\n\nThis we can expand\
    \ the usual way with a Taylor series and we find\n\n$$i(v(t) + \\tilde{v}(t))\
    \ + \\dot{q}(v(t) + \\tilde{v}(t)) \\approx i(v(t)) + \\frac{\\partial i(v)}{\\\
    partial v}\\tilde{v} + \\frac{d}{dt}\\left(q(v(t)) + \\frac{\\partial q(v)}{\\\
    partial v}\\tilde{v}\\right) \\quad (5.74)$$\n\nWe note the zeroth-order terms\
    \ are simply the original solution, and they cancel out and we are left with\n\
    \n$$\\frac{\\partial i(\\boldsymbol{v})}{\\partial \\boldsymbol{v}} \\tilde{\\\
    boldsymbol{v}} + \\frac{d}{dt} \\left( \\frac{\\partial \\boldsymbol{q}(\\boldsymbol{v})}{\\\
    partial \\boldsymbol{v}} \\tilde{\\boldsymbol{v}} \\right) + \\tilde{\\boldsymbol{u}}\
    \ = 0 \\quad (5.75)$$\n\nWe can now go through similar steps we did before where\
    \ we Fourier transform the variables and assuming the perturbation $u(t) = u_k\
    \ e^{-i(\\omega_k + \\omega_p)t}$ is a single-tone perturbation of a harmonic,\
    \ $k$, with an offset frequency, $\\omega_p$. The Fourier transform, $\\tilde{U}\
    \ = U_k \\delta(\\omega - (\\omega_k + \\omega_p)) + U_{-k} (\\delta\\omega -\
    \ (-\\omega_k + \\omega_p))$.\n\n$$\\frac{\\partial \\boldsymbol{I}(\\boldsymbol{V})}{\\\
    partial \\boldsymbol{V}} \\tilde{\\boldsymbol{v}} + \\tilde{\\boldsymbol{\\Omega}}\
    \ \\frac{\\partial \\boldsymbol{Q}(\\boldsymbol{V})}{\\partial \\boldsymbol{V}}\
    \ \\tilde{\\boldsymbol{v}} + \\tilde{\\boldsymbol{u}} = 0 \\quad (5.76)$$\n\n\
    The derivative term is just the Jacobian we discussed in Sect. 5.5.2, and the\
    \ equation is straightforward to solve. Note the matrix $\\boldsymbol{\\Omega}\
    \ = \\boldsymbol{\\Omega}$ where the frequency components are offset the harmonics\
    \ with the offset frequency $\\omega_k \\rightarrow \\omega_k + \\omega_p$. This\
    \ simple exercise shows that we can use the Jacobian of our system to find the\
    \ solution to small perturbations around the known solution. It is the same idea\
    \ as perturbation calculations for other systems, like one-dimensional equations,\
    \ but here we apply it to harmonic systems where the large-scale solution is known.\
    \ To gain further insight, we can write the stimulus vector:\n\n$$\\boldsymbol{u}(\\\
    omega) = \\sum_n \\sum_{k=-N}^N U_k^n \\delta(\\omega_k + \\omega_p) \\quad (5.77)$$\n\
    \nThe response vector $\\boldsymbol{v}$ is similarly written as\n\n$$\\boldsymbol{v}(\\\
    omega) = \\sum_n \\sum_{k=-N}^N V_k^n \\delta(\\omega_k + \\omega_p) \\quad (5.78)$$\n\
    \nHere $n$ denotes all nodes and currents defined in the nodal analysis; $k$ is\
    \ the harmonic index. The coefficients $U_k$ are user-defined and depend on what\
    \ node and harmonic we want to add the stimulus. Notice the offset frequency here\
    \ must be the same since we are now looking at the linearized circuit. We can\
    \ now see the response $V_k$ of the circuit to a given stimulus with a specific\
    \ amplitude and offset frequency to a given harmonic(s). We can, for example,\
    \ sweep the offset frequency $\\omega_p$ around some harmonic $\\omega_k$ and\
    \ see how the system responds at some other node and harmonic component. This\
    \ type of analysis is often called the periodic AC analysis. This is fairly straightforward\
    \ to implement in a code. It simply involves the gains around the various harmonics.\n\
    \n```python\n# We need to recalculate the Matrix due to the frequency terms\n\
    # from the inductors+capacitors\nSTA_rhs=[0 for i in range(MatrixSize)]\nval=[[0\
    \ for i in range(100)] for j in range(4)]\nfor iter in range(100):\n    omega=iter*1e6*2*3.14159265\n\
    \    for i in range(DeviceCount):\n        for row in range(TotalHarmonics):\n\
    \            if DevType[i]=='capacitor':\n                if DevNode1[i] != '0'\
    \ :\n                    Jacobian[(NumberOfNodes+i)*TotalHarmonics+row][Nodes.index(DevNode1[i])*TotalHarmonics+row]=1j*(omegak[row]+(numpy.sign(omegak[row])+(omegak[row]==0))*omega)*DevValue[i]\n\
    \                if DevNode2[i] != '0' :\n                    Jacobian[(NumberOfNodes+i)*TotalHarmonics+row][Nodes.index(DevNode2[i])*TotalHarmonics+row]=-1j*(omegak[row]+(numpy.sign(omegak[row])+(omegak[row]==0))*omega)*DevValue[i]\n\
    \            if DevType[i]=='inductor':\n                Jacobian[(NumberOfNodes+i)*TotalHarmonics+row][(NumberOfNodes+i)*TotalHarmonics+row]=-1j*(omegak[row]+(numpy.sign(omegak[row])+(omegak[row]==0))*omega)*DevValue[i]\n\
    \            if DevType[i]=='CurrentSource':\n                if DevLabel[i]=='i1':\n\
    \                    STA_rhs[(NumberOfNodes+i)*TotalHarmonics+row]=1*(row==Jacobian_Offset)\n\
    \                else:\n                    STA_rhs[(NumberOfNodes+i)*TotalHarmonics+row]=-(row==Jacobian_Offset)\n\
    \    sol=numpy.matmul(numpy.linalg.inv(Jacobian),STA_rhs)\n    val[0][iter]=abs(sol[6*TotalHarmonics+Jacobian_Offset])\n\
    \    val[1][iter]=abs(sol[6*TotalHarmonics+Jacobian_Offset+1])\n    val[2][iter]=abs(sol[6*TotalHarmonics+Jacobian_Offset+2])\n\
    \    val[3][iter]=abs(sol[6*TotalHarmonics+Jacobian_Offset+3])\nplt.plot(val[1])\n\
    ```\n\nWe will look at a few examples in Sect. 5.5.7 where we apply this code\
    \ to some simple circuitry.\n\nWe have now a small-signal analysis code snippet\
    \ that can look at small-signal gain riding on top of a large signal. The natural\
    \ example is analog mixers where a large clock signal is used to mix down (or\
    \ up) a small RF signal. In modern simulators, it is referred to as periodic ac\
    \ analysis, *PAC*. Another really useful implementation is noise transfer often\
    \ called periodic noise or *PNOISE*. We will look at that application next.\n\n\
    **Fig. 5.39** Typical spectrum analyzer output (a, b) shows spectrum at different\
    \ times\n\nBefore the purist reading this has a fit (this type of formula is not\
    \ self consistent for arbitrary waveforms), the basic assumption is that the coefficients\
    \ $V_k(t)$ vary with time much slower than the carrier frequencies. In other words,\
    \ as the envelope function changes, the rest of the high-frequency components\
    \ have a chance to completely settle. In this sense, what we are doing in an envelope\
    \ simulation is to do a steady-state analysis at a series of points in time. We\
    \ start at $t = 0$ and set the modulation generators to whatever value they have\
    \ at that time. The rest of the circuit is now used to solve the steady state\
    \ assuming the modulation control values are constant. This will give rise to\
    \ a certain set of harmonics. Having solved for the situation at $t = 0$, we can\
    \ now continue to $t = t_1$ set all modulation sources to their value at that\
    \ time and again solve for steady state with this new input in mind. This we continue\
    \ to do until all the desired time points are solved for. Often the timestep size\
    \ is fixed, and for that case the modulation bandwidth is $\\pm \\frac{1}{2T_{step}}$.\
    \ Any tone in the envelope function will show up as two modulation tones around\
    \ the harmonic carrier.\n\nThe advantage of envelopes simulations is that the\
    \ amplitude, phase of each carrier, is available immediately. One can then use\
    \ these to make models of various modulation schemes. One does not need additional\
    \ calculations to convert the time-domain information to envelope information.\
    \ We simply start from the steady-state solution directly, no need to wait for\
    \ time-domain settling. It of course also goes the other way, and if the initial\
    \ transient is of interest, the harmonic balance method does not provide a way\
    \ to examine it. In short, an envelope simulator takes the carrier steady state\
    \ into account through harmonic balance, and there is no need to wait for the\
    \ steady state; a low-frequency modulation signal is then used in the time domain\
    \ to calculate the circuit response, and there is no need to include all possible\
    \ harmonics. The envelope simulator then takes advantage of what is best in both\
    \ harmonic balance and time-domain simulators for certain specific applications.\n\
    \n## 5.5 Periodic Steady-State Solvers"
