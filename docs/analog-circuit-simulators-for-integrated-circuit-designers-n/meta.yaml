    \    val[3][iter]=abs(sol[6*TotalHarmonics+Jacobian_Offset+3])\nplt.plot(val[1])\n\
    ```\n\n我们将在第5.5.7节中看几个例子，将此代码应用于一些简单的电路。\n\n我们现在有了一个小信号分析代码片段，可以观察叠加在大信号上的小信号增益。一个自然的例子是模拟混频器，其中使用大时钟信号来混频（下变频或上变频）一个小射频信号。在现代仿真器中，它被称为周期性交流分析，*PAC*。另一个非常有用的实现是噪声传输，通常称为周期性噪声或\
