    # 3.1.4 BSIM Models


    We have spent the last few sections going through the basic physics of the MOS
    transistor. We are now all set for a review of various models. We will spend significant
    time on the Berkeley short-channel IGFET Model (BSIM) since it is by far the most
    used in the industry. We will discuss it from a historical perspective since it
    is easier to connect that flow with the simple physical model we just described.
    The earlier versions were quite similar to the simple physics, and as the demand
    grew, the models became much more sophisticated.


    BSIM was developed in the late 1980s to account for what was at the time referred
    to as short-channel field effect transistors. It is physics based and continuous
    across the various regions and is perhaps the most used model family today. Over
    the years as the technology has progressed, so has the modeling effort and at
    present we are at BSIM6. The model has as of this writing split up into several
    models, namely, BSIM-BULK, BSIM-CMG (common multi-gate), BSIM-IMG (independent
    multi-gate), and BSIM-SOI (silicon on insulator). The name BSIM6 is no longer
    used. We will highlight some of the main features and difficulties with the models
    and alert the user that at times the default settings from the foundry might be
    inappropriate for the task at hand. The latest release contains hundreds of parameters,
    and it is outside the scope of this book to do justice to all the work that has
    gone into making these models. The reader should consult the references for an
    in-depth discussion.


    This section will start with a basic introduction of the model and highlight some
    of the basic features. We will then show that for some cases, the default settings
    should be changed. The reader is encouraged to question all the model settings
    when doing simulations of in particular unusual sizes and/or operating regions;
    here we will just point out a couple of such examples.


    # 3.1.4.1 Basic Model


    The BSIM model was developed more than 30 years ago by the device physics group
    at UC Berkeley. We will here describe the features of the model by following the
    historical development starting with one of the very first papers describing the
    model, and then we will follow development and improvements over the years. Many
    books and papers have been written about this model, and we have no room to do
    the model development full justice. Instead we will start with the initial model
    and follow the improvements by highlighting some of the new features as we go
    along. We believe this approach will make the model more accessible than start
    to describe the complex modern version from the beginning. The goal is to familiarize
    the reader enough with the model so he/she can explore the details on his/her
    own.


    # BSIM1 1987


    The first paper describing the BSIM model came in 1987. Up until then, the difficulty
    with modeling CMOS transistors was the different physical effects that drove'
- md: 'the currents depending on the bias of the transistor. BSIM was one of the first
    attempts to take everything into account in one implementation. We will here follow
    the presentation in [9]. The formulation is based on device physics of small geometry
    MOS transistors. Special effects included are:


    - (a) Vertical field dependence of carrier mobility

    - (b) Carrier velocity saturation

    - (c) Drain-induced barrier lowering

    - (d) Depletion charge sharing by the drain and the source

    - (e) Nonuniform doping for ion-implanted devices

    - (f) Channel length modulation

    - (g) Subthreshold conduction

    - (h) Geometric dependencies


    The eight drain current parameters which directly appear in the threshold-voltage
    and drain-current expressions are as follows:


    - $V_{FB}$ flatband voltage

    - $\varphi_s$ surface-inversion potential

    - $K_1$ body-effect coefficient

    - $K_2$ source and drain depletion charge sharing coefficient

    - $\eta$ drain-induced barrier lowering coefficient

    - $U_0$ vertical field mobility degradation coefficient

    - $U_1$ velocity saturation coefficient

    - $\mu_0$ carrier mobility


    With these parameters, the threshold voltage is modeled as


    $$V_{th} = V_{FB} + \varphi_s + K_1 \sqrt{\varphi_s - V_{BS}} - K_2 (\varphi_s
    - V_{BS}) - \eta V_{Ds} \quad (3.28)$$


    Notice the parameter $\eta$ that models the channel length modulation in addition
    to the drain-induced barrier lowering effect. This expression should now be compared
    to what we derived in Sect. 3.1.2. For $V_{BS} = 0$, we see they are very close
    to each other when we identify the parameter $\varphi_s$ with $2\psi_B$ in Eq.
    3.19. The last two terms are not part of our simple model calculation.


    Let us now look at the drain current model. In BSIM1 it is divided into separate
    physical regions depending on the terminal bias points:


    1. Cutoff region, $V_{gs} \le V_{th}$


    $$I_{DS} = 0$$


    2. Triode region, $V_{gs} > V_{th}$ and $0 < V_{ds} < V_{ds, sat}$


    $$I_{ds} = \frac{\mu_0}{1 + U_0 (V_{gs} - V_{th})} \frac{C_{ox} W / L}{1 + \frac{U_1}{L}
    V_{ds}} \left( (V_{gs} - V_{th})V_{ds} - \frac{a}{2} V_{ds}^2 \right)$$


    3. Saturation region $V_{gs} > V_{th}$ and $V_{ds} \geq V_{ds, sat}$


    $$I_{ds} = \frac{\mu_0}{1 + U_0 (V_{gs} - V_{th})} \frac{C_{ox} W / L}{2aK} (V_{gs}
    - V_{th})^2$$


    The weak inversion region was modeled as


    $$I_{ds,w} = \frac{I_{\exp} I_{\lim it}}{I_{\exp} + I_{\lim it}} \quad (3.29)$$


    where


    $$I_{\exp} = \mu_0 C_{ox} \frac{W}{L} \left( \frac{kT}{q} \right)^2 e^{1.8} e^{\frac{q}{kT}
    (V_{gs} - V_{th}) / n} \left( 1 - e^{-V_{ds} q / kT} \right) \quad (3.30)$$


    and


    $$I_{\lim it} = \frac{\mu_0 C_{ox}}{2} \frac{W}{L} \left( 3 \frac{kT}{q} \right)^2
    \quad (3.31)$$


    This approach did not introduce any discontinuity in the derivative between the
    different regions, and so convergence was much improved. The Newton-Raphson method
    discussed in Chap. 2 needs the derivatives, and if there are discontinuities,
    the convergence is bound to have problems.


    Comparing these expressions to the analytical model we just studied in Sect. 3.1.2,
    we see some real resemblance, so this first BSIM attempt was a way to code the
    analytical model based on real physical parameters.


    Notice the output resistance model for the saturation case. The dependence on
    the current on $V_{ds}$ is only seen through the threshold voltage expression.
    The later versions of BSIM will bring a significant improvement to this feature.


    ## BSIM3 1993


    The BSIM3 version of the transistor model brought several improvements to the
    predictability, in particular concerning the output resistance. This version had
    several subversions we will not go into here. Instead we will list the major differences
    to the earlier version. But let us first look at the new threshold model:


    $$V_{th} = V_{T0} + K_1 \left( \sqrt{\varphi_s - V_{BS}} - \sqrt{\varphi_s} \right)
    - K_2 V_{BS} - \Delta V_{th} \quad (3.32)$$


    Where $V_{T0}$ is the long-channel threshold voltage, the rest of the parameters
    are the same as in BSIM1. As the reader sees, the parameterization has improved,
    and the model is based on an analytical solution to a quasi-2d Poisson equation.
    Notice here the $\Delta V_{th}$ parameter. It is intended to capture short-channel
    effects and has an exponential dependence on the channel length and a length scale
    parameter, $l_t = \sqrt{3T_{ox}X_{dep}} / \eta$. Here, $T_{ox}$ is the thickness
    of the thin-oxide region, and $X_{dep}$ is the depletion width near the transistor
    source. The expression for


    $$\Delta V_{th} = D_{sv0} \left( e^{-L/2l_t} + 2e^{-L/l_t} \right) \left( 2(V_{bi}
    - \varphi_s) + V_{ds} \right) \quad (3.33)$$


    Notice here the dependence on $T_{ox}$. The thinner we make the oxide, the smaller
    the impact of short-channel effects! This is an important realization that drove
    a lot of the later years'' development of SOI transistors and finFETs. Let us
    also look at the drain current model.


    ### Mobility Model


    Compared to BSIM1 where the mobility was modeled based on a simply physical analytical
    solution, the BSIM3 version introduced a more complex model to capture effects
    related to smaller geometries. We will refer to this mobility as $\mu_{eff}$ here
    and not discuss the details much further.


    ### Drain-Source Resistance


    The interconnect resistance to the drain and source through the metal contact
    and the diffusion region is modeled internally and is assumed to be symmetric
    for drain and source regions.


    ### Drain-Source Current


    As before in the strong inversion region, we have two subregions, the triode region
    and the saturation region.


    1. Triode region, $V_{gs} > V_{th}$ and $0 < V_{ds} < V_{ds, sat}$


    $$I_{ds} = \mu_{eff} \frac{C_{ox} W / L}{1 + \frac{1}{LE_{sat}} V_{ds}} \left(
    V_{gs} - V_{th} - V_{ds} / 2 \right) V_{ds}$$


    2. Saturation region $V_{gs} > V_{th}$ and $V_{ds} \ge V_{ds, sat}$


    $$I_{ds} = \mu_{eff} \frac{C_{ox} W / L}{2aK} \left( V_{gs} - V_{th} \right)^2
    \left( 1 + (V_{ds} - V_{ds, sat}) / V_A \right)$$


    where $V_A$ is the Early voltage which is introduced to model the output resistance.
    The weak inversion region is modeled as


    $$I_{ds} = \mu_{eff} C_{ox} \frac{W}{L} \left( \frac{kT}{q} \right)^2 e^{\frac{q}{kT}(V_{gs}
    - V_{eff})/n} \left( 1 - e^{-V_{ds}q/kT} \right) \quad (3.34)$$


    which is similar to BSIM1. However the transition region between weak inversion
    and strong inversion is modeled separately by introducing two cutoff points in
    the weak regime and strong inversion regime referred to as $V_{gslow}$, $I_{dslow}$
    and $V_{gshigh}$, $I_{dshigh}$. Within these limits, the drain-source current
    and gate-source voltage are parameterized as


    $$I_E = (1-t)^2 I_{dslow} + 2(1-t)tI_p + t^2 I_{dshigh} \quad (3.35)$$


    $$V_{gs} = (1-t)^2 V_{gslow} + 2(1-t)tV_p + t^2 V_{gshigh} \quad (3.36)$$


    With this simple parameterization, the transition region will be continuous and
    have continuous first derivatives.


    As we just mentioned, the output resistance model is much more sophisticated in
    BSIM3, and it is modeled by the introduction of the Early voltage $V_A$. This
    voltage was modeled as being dominated by three separate and independent effects:
    channel-length modulation (CLM), drain-induced barrier lowering (DIBL), and substrate
    current induced body effect (SCBE). The effects add like their inverses


    $$\frac{1}{V_A} = \frac{1}{V_{ACLM}} + \frac{1}{V_{ADIBL}} + \frac{1}{V_{ASCBE}}
    \quad (3.37)$$


    where


    $$V_{ACLM} = I_{dsat} \left( \frac{\partial I_{ds}}{\partial V_{dsat}} \frac{\partial
    V_{dsat}}{\partial L} \frac{\partial L}{\partial V_{ds}} \right)^{-1} \quad (3.38)$$


    $$V_{ADIBL} = I_{dsat} \left( \frac{\partial I_{ds}}{\partial V_{dsat}} \frac{\partial
    V_{dsat}}{\partial V_{th}} \frac{\partial V_{th}}{\partial V_{ds}} \right)^{-1}
    \quad (3.39)$$


    $$V_{ASCBE} = I_{dsat} \left( \frac{\partial I_{ds}}{\partial V_{th}} \frac{\partial
    V_{th}}{\partial V_{bs}} \frac{\partial V_{bs}}{\partial I_{sub}} \frac{\partial
    I_{sub}}{\partial V_{ds}} \right)^{-1} \quad (3.40)$$


    The BSIM3 model version brought significant improvements to the modeling. The
    introduction of an analytical solution to a quasi-2D Poisson equation and the
    much improved output resistance model brought for some 10 years with some sub-model
    improvements was the standard model for CMOS transistors. The total number of
    physics-based parameters needed was around 25 in the early versions. We will see
    shortly this was to change drastically with the release of BSIM4 which we will
    discuss next.


    ### Noise Model


    The noise model in BSIM3 can be chosen by the user to be one of three with the
    parameter $noiMod$. For $noimod = 1$, the noise is modeled as in (the hand calc
    model)'
