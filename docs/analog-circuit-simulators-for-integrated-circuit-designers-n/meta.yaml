    ## Preface


    This book is intended as an aid in using modern simulators encountered in the
    design of both active and passive electronic circuits. These simulators have been
    developed over many years and have become quite complex. As a result, it can be
    hard to get a handle on all the sophisticated options one has at one’s disposal
    as a circuit designer. Literatures describing these innovations are fairly extensive
    but they often target specialists, mathematicians, and computer scientists, and
    the level is often such that for a practical user it can be too time consuming
    to differentiate the advantages of different simulation options. This book goes
    through the simulation methods from the very basic algorithms and builds up understanding
    step by step by adding more sophisticated methods on top of what has already been
    discussed. The basic idea is to do this in such a way that the reader will better
    understand how simulators work without becoming a simulator design expert. This
    will be done by looking at fairly simple example codes that illustrate the methods
    without going into the details of what makes algorithms and code implementations
    production ready. Throughout the book, we will build a few simple simulators that
    demonstrate the basics of the lessons learned. The reader can then go out on their
    own to expand the code and learn more sophisticated techniques. The goal is not
    to build a full fledge modern simulator; however, the firm belief is that through
    actually doing numerical experiments, a deeper understanding of the difficulties
    and potential weaknesses behind modern implementations will develop. With increased
    understanding of the tools, a more efficient use of real simulators will follow.
    There are many references supplied for the interested reader wanting to dig deeper.
    A book such as this is by necessity heavy on examples and exercises to ensure
    the reader understands the sometimes-subtle workings of simulators and each chapter
    has plenty of both.


    The use of simulators is intimately tied to modeling techniques, particularly
    of active devices. We therefore include a chapter where we discuss modeling techniques
    and various limitations that can impact the simulation results.


    The final chapter describes good practices when using simulators gained from many
    years of active design work in the fast-paced semiconductor industry. Here, we
    address issues like how to handle foundry models including the supplied corner
    cases, and how to best simulate small circuits up to full chips in an efficient
    manner, among other topics.


    We start with an overview of the basics in Chap. 2, how differential equations
    are translated into difference equations and common numerical solution algorithms.
    Nonlinear equations and their solution in terms of Newton-Raphson algorithms are
    highlighted for the simple one-dimensional case. It will also describe matrix
    equations and common solution techniques including iterative algorithms. In Chap.
    3 we describe modeling techniques of active devices where we discuss mostly CMOS
    transistors, in particular the popular BSIM model and also the basics of the surface
    potential model. We further highlight a few common assumptions made by modern
    foundries when constructing models and what one should look out for as a circuit
    designer. We address bipolar devices briefly and mention some of the difficulties
    in their implementation. Chap. 4 discusses linear circuit simulators, and the
    lessons learned are applied to specific circuit examples as we go through the
    chapter. Chap. 5 extends the simulator discussion to the non-linear case. This
    chapter also includes steady-state simulators. The final chapter, Chap. 6, provides
    practical advice for using simulators. Limitations are highlighted and countermeasures
    are proposed. Chapter 7 contains a more detailed mathematical background to the
    operation of simulators, where some of the key theorems and properties of various
    integration methods are outlined. The appendix contains the complete python codes
    used in all the examples throughout the book. The python codes will also be available
    for download.


    A book like this cannot be completed without the help and support of many people.
    First of all my family, Nancy and Nicole have both been unwavering in their loyalty
    and understanding of the sometimes-lonely task of putting a full manuscript together.
    My manager, Pirooz Hojabri, has been enthusiastic about the project from the very
    beginning. Also, my coworkers Dongwei Chen and Vincent Tso have read through the
    whole manuscript in detail and provided many useful tips for improvement. The
    same goes for Shahrad Naraghi and Thomas Geers. Some of the professorial staff
    at UC Berkeley who I know indirectly have also provided great encouragement for
    the project. The code snippets have been reviewed by, in particular, Bart Hickman
    and others, and thanks to their comments, a much more readable code is the result.


    San Jose, CA, USA


    Mikael Sahrling


    ## List of Abbreviations


    Common Symbols and Their Meaning


    | Symbol | Value | Comment |

    | :--- | :--- | :--- |

    | $C$ | | Capacitance |

    | $C_{gs}$ | | Gate-Source Capacitance |

    | $C_{ds}$ | | Drain-Source Capacitance |

    | $C_{gd}$ | | Gate-Drain Capacitance |

    | $C_{ox}$ | | Oxide Capacitance Per Unit Area |

    | $D$ | $=\epsilon E$ | Electric Flux Density Field |

    | $E$ | | Electric Field |

    | $\epsilon$ | | Permittivity |

    | $g_m$ | [mho] | Transistor Transconductance |

    | $g_o$ | | Transistor Output Conductance |

    | $\gamma$ | | Noise Density Correction Factor for CMOS |

    | $J_{ij}$ | | Jacobian |

    | $j$ | $j^2 = -1$ | Imaginary Factor |

    | $L$ | | Inductance |

    | $N_a$ | | Acceptor Impurity Density |

    | $\omega$ | $=2\pi f$ | Angular Frequency |

    | $q$ | $1.602 \cdot 10^{-19} C$ | Electronic Charge |

    | $Q$ | | Electric Charge |

    | $R$ | [ohm] | Resistance |

    | $Y$ | [ohm] | Admittance |


    ## Contents


    - 1 Introduction

    - 2 Basics

    - 3 Modeling Techniques

    - 4 Linear Circuit Simulators

    - 5 Non-Linear Circuit Simulators

    - 6 Practical Advice

    - 7 Mathematical Background

    - Appendix: Python Codes'
