  md: 'we address issues like how to handle foundry models including the supplied
    corner cases, and how to best simulate small circuits up to full chips in an efficient
    manner, among other topics.


    We start with an overview of the basics in Chap. 2, how differential equations
    are translated into difference equations and common numerical solution algorithms.
    Nonlinear equations and their solution in terms of Newton-Raphson algorithms are
    highlighted for the simple one-dimensional case. It will also describe matrix
    equations and common solution techniques including iterative algorithms. In Chap.
    3 we describe modeling techniques of active devices where we discuss mostly CMOS
    transistors, in particular the popular BSIM model and also the basics of the surface
    potential model. We further highlight a few common assumptions made by modern
    foundries when constructing models and what one should look out for as a circuit
    designer. We address bipolar devices briefly and mention some of the difficulties
    in their implementation. Chap. 4 discusses linear circuit simulators, and the
    lessons learned are applied to specific circuit examples as we go through the
    chapter. Chap. 5 extends the simulator discussion to the non-linear case. This
    chapter also includes steady-state simulators. The final chapter, Chap. 6, provides
    practical advice for using simulators. Limitations are highlighted and countermeasures
    are proposed. Chapter 7 contains a more detailed mathematical background to the
    operation of simulators, where some of the key theorems and properties of various
    integration methods are outlined. The appendix contains the complete python codes
    used in all the examples throughout the book. The python codes will also be available
    for download.


    A book like this cannot be completed without the help and support of many people.
    First of all my family, Nancy and Nicole have both been unwavering in their loyalty
    and understanding of the sometimes-lonely task of putting a full manuscript together.
    My manager, Pirooz Hojabri, has been enthusiastic about the project from the very
    beginning. Also, my coworkers Dongwei Chen and Vincent Tso have read through the
    whole manuscript in detail and provided many useful tips for improvement. The
    same goes for Shahrad Naraghi and Thomas Geers. Some of the professorial staff
    at UC Berkeley who I know indirectly have also provided great encouragement for
    the project. The code snippets have been reviewed by, in particular, Bart Hickman
    and others, and thanks to their comments, a much more readable code is the result.


    San Jose, CA, USA


    Mikael Sahrling'
