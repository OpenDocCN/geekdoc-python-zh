    \n$$\\frac{i(t+\\Delta t)}{C} = \\frac{3u(t+\\Delta t)/2 - 2u(t) + u(t-\\Delta\
    \ t)/2}{\\Delta t}, \\quad u(0)=1,$$\n\n或者经过重新整理后\n\n$$u(t+\\Delta t) = u(t)\\\
    frac{4}{3} - \\frac{u(t-\\Delta t)}{3} + \\frac{2\\Delta t}{3C}i(t+\\Delta t),\
    \ \\quad u(0)=1, \\qquad (2.9)$$\n\n与之前一样，忽略电流更新例程，伪代码如下所示\n\n```\nsubroutine\
    \ SolveDiffGear2\nu(0)=1\nu(1)=1\ndeltaT=RC/100\nfor(i=2, i<N, i++) do\n    u(i)=4u(i-1)/3-u(i-2)/(3C)\
    \ deltaT -2I(i)/(3C)\nend for\nend subroutine\n```\n\n二阶Gear法是多步差分法的一个例子，我们需要知道两个时间步长前的解。\n\
    \n## 2.1.5 总结\n\n最后这三种方法在实际的仿真器实现中被压倒性地使用，并且根据待研究的电路，通常会偏好其中一种，我们将在本书中通过实例展示这些情况。\n\
    \n## 2.1.6 求解方法：精度与稳定性\n\n我们已经研究了用差分方程来建立微分方程的四种不同方法。现在让我们尝试从精度和稳定性两个方面对它们进行量化。\n\
    \n### 2.1.6.1 精度\n\n解的精度将取决于待求解的电路、时间步长以及所使用的积分方法。微分方程数值近似的精度可以通过其截断误差来估计。构建差分近似的一种方法是使用函数在某点附近的泰勒级数：\n\
    \n$$f(t+\\Delta t) = f(t) + f'(t)\\Delta t + \\frac{1}{2}f''(t)\\Delta t^2 + \\\
    dots + \\frac{1}{n!}f^n(t)\\Delta t^n$$\n\n一阶精度的近似可以通过假设所有高阶导数可忽略不计来得到，于是我们得到\n\
    \n$$f(t+\\Delta t) = f(t) + f'(t)\\Delta t + \\frac{1}{2}f''(t)\\Delta t^2 + \\\
    dots$$\n\n经过一些重写后得到\n\n$$f'(t) = \\frac{f(t+\\Delta t) - f(t)}{\\Delta t} + o(\\\
    Delta t) \\quad (2.10)$$\n\n其中 $o$ 符号表示小参数下的行为。\n\n这是欧拉前向近似，具有一阶精度。这意味着截断误差为 $\\\
    sim \\Delta t$。类似地可以证明，梯形近似和Gear2近似具有二阶精度，误差与 $\\Delta t^2$ 成比例。实际上这意味着，如果解是一条直线，一阶导数不随时间变化，因此二阶导数为零，我们讨论的所有三种方法在计算导数时都不会有截断误差。如果解是一个二阶多项式，欧拉法将开始出现截断误差，必须减小时间步长以减少其影响。梯形法和Gear2法可以无截断误差地追踪二阶多项式，但在遇到高阶解时会出现误差。通常，阶数越高，精度越好。代价是计算时间较长，因此大多数仿真器在导数计算中最多使用三阶近似。\n\
    \n全局精度更难预测，因为它非常依赖于被仿真的电路。我们将在第4章再次讨论这些问题。\n\n> 如果解是一个 $n$ 阶多项式，那么一个精确到该阶的差分近似将没有截断误差。\n\
    \n### 2.1.6.2 稳定性\n\n微分方程数值实现的稳定性显然是一个重要课题，并且多年来已被充分研究（例如，参见第7章和[2–17]）。这里我们仅展示在第2.1.2、2.1.3和2.1.4节中讨论的方法的稳定区域。\n\
    \n#### 一般稳定性理论\n\n系统稳定的含义可能因应用而异。这里，与大多数电路理论书籍一样，我们将采用稳定性的有界定义，即如果信号在所有时间都保持在某个有限界限\
    \ $B$ 内，则认为解是稳定的。我们将遵循文献中的共同思路，使用简单的线性系统来研究数值稳定性。\n\n为了分析稳定性，让我们考虑一个具有常系数的齐次线性微分系统\n\
    \n$$\\frac{dx}{dt} = Ax$$\n\n其中我们假设当 $t \\rightarrow \\infty$ 时，$|x(t)|_{\\max}\
    \ \\rightarrow \\leq B$。这个方程被称为测试方程。像测试方程这样的线性方程组具有精确的通解\n\n$$x(t) = \\sum_{i=1}^{n}\
    \ c_i e^{\\lambda_i t} v_i$$\n\n其中 $\\lambda_i$，$v_i$ 是通过求解\n\n$$Av_i = \\lambda_i\
    \ v_i$$\n\n得到的系统的特征值/特征向量。$\\lambda_i$ 通常是复数。如果我们假设系统是稳定的，这意味着对所有 $i$，$Re(\\lambda_i)\
    \ \\leq 0$。所有特征值都在左半平面或虚轴上。让我们在图2.2中说明这一点。它显示了具有正实特征值的解如何由于右半平面随时间线性增长的指数而爆炸超出界限，而具有负实特征值的解在左半平面随时间衰减（图2.2）。\n\
    \n事实证明，[5, 6, 9, 17]，为了研究数值近似的稳定性，只需将其应用于测试方程，并检查在哪些时间步长下数值解会衰减，或者随时间保持在某个界限内。\n\
    \n#### 稳定区域\n\n稳定区域现在是复平面中由乘积 $\\Delta t \\lambda_i$ 定义的部分，其中数值实现随时间趋于零。我们将查看我们的四种积分方法，并直接引用结果；细节在例如[5,\
    \ 6, 9, 17]和第7章中给出。这里的主要目的是了解稳定区域的概念。\n\n#### 欧拉法\n\n对于欧拉法的实现，后向欧拉比前向欧拉稳定得多。稳定区域可以在图2.3中找到。这意味着什么？如果系统本身是稳定的，换句话说所有特征值都具有负实部，前向欧拉实现仍然可能变得不稳定。事实上，只有在小的灰色圆圈内，乘积\
    \ $\\Delta t \\lambda_i$ 才会导致稳定行为。只需采用更小的时间步长即可实现稳定行为。我们将在第4章中更量化地说明这在实践中意味着什么。\n\
    \n接下来我们可以看看后向欧拉（图2.4）。这里的行为完全不同。即使系统本身不稳定，该方法也是稳定的；注意灰色区域延伸到了右半平面。我们将在第4章中研究一个使用欧拉法表现如此的系统。读者肯定会欣赏到欧拉后向法的一个特殊性质：一个系统可能模拟得很好，但实际上它会变得不稳定！"
