    # 3.4.2 CMOS Transistor Model 2


    The transistor model we have used so far was just a very basic one so we could
    illustrate how to implement nonlinear solvers. The model has infinite output impedance
    and no linear region, and what is worse it turns on reversely as the gate-source
    voltage goes below zero. It is not very useful. Let us now build a model that
    is a bit more realistic, still far from the BSIM quality. Let us use a drain current
    that varies with the port voltages like


    $$I_d = \begin{cases} 0, V_{gs} - V_T < 0 \ 2K\left( (V_{gs} - V_T)V_{ds} - \frac{1}{2}V_{ds}^2
    \right), V_{ds} < V_{gs} - V_T \ K(V_{gs} - V_T)^2(1 + \lambda V_{ds}) \end{cases}
    \quad (3.49)$$


    where $V_T$ is the threshold voltage we here model as just a constant voltage,
    $K$ is the same constant we used earlier, and finally $\lambda$ is the parameter
    controlling the drain output impedance in saturation. The equation for a PMOS
    transistor will be very similar with some sign changes in line with what we saw
    for the simpler CMOS model:


    $$I_d = \begin{cases} 0, V_{sg} - V_T < 0 \ -2K\left( (V_{sg} - V_T)V_{sd} - \frac{1}{2}V_{sd}^2
    \right), V_{sd} < V_{sg} - V_T \ -K(V_{sg} - V_T)^2(1 + \lambda V_{sd}) \end{cases}
    \quad (3.50)$$


    # 3.4.3 Bipolar Transistor Model 3


    The bipolar model we will use is given by the following expression


    $$I_C = -I_E = \begin{cases} I_0 \exp\left( \frac{V_{BE}q}{kT} \right) \left(
    1 + \frac{V_{CE}}{V_A} \right), V_{BE} > 0 \ 0, V_{BE} \le 0 \end{cases} \quad
    (3.51)$$'
