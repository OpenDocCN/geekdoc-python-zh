    # gmin Stepping


    Another commonly used method is adding a large resistor, $1/g_{min}$, between
    every node and ground and slowly make the resistor larger and larger, $g_{min}
    \rightarrow 0$, and solve the matrix equation for each step. When the value of
    $g_{min}$ has reached some small number, where the voltages and currents are not
    changing beyond some tolerance, the circuit can be considered as having converged.
    In practical situations with real silicon, there is always some resistance between
    every node and ground due to leakage and other factors, so having a $g_{min} \neq
    0$ is not necessarily a bad approximation. This method is clearly also a homotopy
    since it is continuously changing the circuit from one to another. We can illustrate
    this with a really simple example using one of our CMOS transistor models we just
    developed, model1. Let us use it to investigate the inverter circuit in Fig. 5.13.


    The netlist we will use is as follows:


    ```

    *

    M1 Vo Vi vss nch

    M2 Vo Vi vdd pch

    Vdd vdd vss 0.9

    Vss vss 0 0

    Vin Vi 0 0.2

    netlist 5.6

    ```


    When one attempts to run this netlist, the result is a singularity error. To investigate
    further, let us write the matrix equation (skipping the trivial supply and ground
    current equation for clarity):


    ![](img/75093da0d280ad52326a78925e5cc403_195_0.png)'
