  md: '> Gear2 and Euler method results in an artificial resistor being inserted across
    inductors and capacitors. The trapezoidal method does not. Bear this in mind when
    employing a particular integration method. The trapezoidal has the ringing effect
    as an implementation side effect.


    ![](img/75093da0d280ad52326a78925e5cc403_132_0.png)


    This should not discourage the user too much from using backward Euler. Sometimes,
    when convergence is a real problem, the “resistor” effect with Euler can really
    help quiet down nodes that misbehave for whatever reason. All these methods have
    their uses.


