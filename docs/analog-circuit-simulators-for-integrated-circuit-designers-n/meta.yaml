    $$\left[ \frac{\partial \boldsymbol{i}(\boldsymbol{v}(t_n))}{\partial \boldsymbol{v}(t_n)}
    + \frac{1}{\Delta t} \frac{\partial \boldsymbol{q}(\boldsymbol{v}(t_n))}{\partial
    \boldsymbol{v}(t_n)} \right] \frac{\partial \boldsymbol{v}(t_n)}{\partial \boldsymbol{v}_0}
    = \frac{1}{\Delta t} \frac{\partial \boldsymbol{q}(\boldsymbol{v}(t_{n-1}))}{\partial
