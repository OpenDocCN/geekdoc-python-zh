    $$B = i_f|_{v=1, i=0} = 0$$


    Now for the voltage response, $D = v_e|_{v=1, i=0}$, we need to calculate it.
    We find at the input to the gate of the transistor we have $v_e = v_f + v$, and
    since the follower is biased with an ideal current source, we find the following
    loop equation:


    $$\frac{(v_f + v)g_m}{2} Z_L = v_f \rightarrow v_f \left(1 - \frac{g_m Z_L}{2}\right)
    = v \frac{g_m Z_L}{2}$$


    We then see


    $$D = v_e = v_f + v = v \left( \frac{g_m Z_L}{2 - g_m Z_L} + 1 \right) = v \left(
    \frac{2}{2 - g_m Z_L} \right)$$


    The remaining parameters are now


    $$A = i_f|_{v=0, i=1} = -1$$


    $$C = v_e|_{v=0, i=1}$$


    Actually since $B = 0$, $C$ is not a player. We find for


    $$T = \frac{2(AD - BC) - A + D}{2(BC - AD) + A - D + 1} = \frac{-D + 1}{D} = \frac{-\left(
    \frac{2}{2 - g_m Z_L} \right) + 1}{\left( \frac{2}{2 - g_m Z_L} \right)} = \frac{-2
    + 2 - g_m Z_L}{2} = -\frac{g_m Z_L}{2}$$'
