    # 5.5.1 Shooting Methods


    There are presently two popular ways to implement steady-state solvers. We will
    discuss what is known as shooting methods in this section. The basic idea is that
    if the circuit is periodic, the response should repeat itself after a fundamental
    period. The other time simulators we have looked at earlier in Sect. 5.4 are known
    as initial value solvers where we start from an often DC-derived operating point
    and simulate along in time. The shooting method has different assumptions. Here
    we assume the signals are periodic in time with a user-defined period, T. At the
    start and end of the period, all signals have not only the same value $v_n(0)
    = v_n(T)$ but also the same curvatures so that $v_n(t) = v_n(t + T)$. One speaks
    of a boundary problem in time. The shooting method takes advantage of this in
    a special way we will describe here. We will not go deep into the mathematical
    derivations here but leave that aspect to Chap. 7 and [1, 3]. Instead we will
    provide a basic motivation of the theory.


    We have as before the governing equation


    $$f(v(t)) = i(v(t)) + \dot{q}(v(t)) + u = 0 \qquad (5.28)$$


    The basic idea behind the shooting method is to note that for a periodic system
    $f$, the system should return to the same state after time $T$. In a sense the
    shooting method is all about finding one correct initial condition, there can
    be many. Let us get a better feel for this by looking at a circuit that has no
    capacitors in it. We can run the amplifier in Fig. 5.1 with a fixed timestep with
    a netlist replacing the resistor input bias with voltage sources.


    ```

    ...

    vinp inp 0 sin(0.5 0.45 1e9 0 0)

    vinn inn 0 sin(0.5 0.45 1e9 0.5e-9 0)

    ...

    ```


    Let us compare the initial state with the final state as shown in Table 5.19.
    Clearly we do not have the correct initial state. But let us simply use the following
    initial state, reflecting the final state in Table 5.19. Let us simulate again
    and we now find in Table 5.20.


    Table 5.19 Initial and final voltage state over a harmonic period with zero initial
    state


    | Node voltage | Initial state | Final state |

    | :--- | :--- | :--- |

    | Inp | 0 | 0.5 |

    | Inn | 0 | 0.5 |

    | Outp | 0 | 0.85 |

    | Outn | 0 | 0.85 |

    | Vs | 0 | -0.2075 |'
