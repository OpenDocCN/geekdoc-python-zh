    # **Mobility Model**


    Compared to BSIM1 where the mobility was modeled based on a simply physical analytical
    solution, the BSIM3 version introduced a more complex model to capture effects
    related to smaller geometries. We will refer to this mobility as $\mu_{eff}$ here
    and not discuss the details much further.


    # **Drain-Source Resistance**


    The interconnect resistance to the drain and source through the metal contact
    and the diffusion region is modeled internally and is assumed to be symmetric
    for drain and source regions.


    # **Drain-Source Current**


    As before in the strong inversion region, we have two subregions, the triode region
    and the saturation region.


    +   1. Triode region, $V_{gs} > V_{th}$ and $0 < V_{ds} < V_{ds, sat}$


    $$I_{ds} = \mu_{eff} \frac{C_{ox} W / L}{1 + \frac{1}{LE_{sat}} V_{ds}} \left(
    V_{gs} - V_{th} - V_{ds} / 2 \right) V_{ds}$$


    +   2. Saturation region $V_{gs} > V_{th}$ and $V_{ds} \ge V_{ds, sat}$


    $$I_{ds} = \mu_{eff} \frac{C_{ox} W / L}{2aK} \left( V_{gs} - V_{th} \right)^2
    \left( 1 + (V_{ds} - V_{ds, sat}) / V_A \right)$$


    where $V_A$ is the Early voltage which is introduced to model the output resistance.
    The weak inversion region is modeled as


    $$I_{ds} = \mu_{eff} C_{ox} \frac{W}{L} \left( \frac{kT}{q} \right)^2 e^{\frac{q}{kT}(V_{gs}
    - V_{eff})/n} \left( 1 - e^{-V_{ds}q/kT} \right) \quad (3.34)$$


    which is similar to BSIM1. However the transition region between weak inversion
    and strong inversion is modeled separately by introducing two cutoff points in
    the'
