    implementation followed by the second-order Gear formulation. We will as an example
    consider numerical implementations of this simple equation:


    $$i(t) = C \frac{du(t)}{dt} \quad (2.4)$$


    # 2.1.2 Euler''s Methods


    Perhaps the simplest numerical formulation is what is known as Euler''s methods,
    the forward and backward Euler. We start with the most obvious implementation
    we just discussed in the previous section, the forward Euler''s method:


    $$i(t_n) = C \frac{u(t_{n+1}) - u(t_n)}{\Delta t} \rightarrow u(t_{n+1}) = u(t_n)
    + \Delta t \frac{i(t_n)}{C} \quad (2.5)$$


    This seems simple enough and it is certainly fair game to use. As we mentioned,
    one soon discovers it easily gets unstable and the solution can blow out of proportion
    quickly, and one is forced to sometimes take remarkably small timesteps to avoid
    the problem. We will not discuss the underlying reason here, it is deferred to
    Chap. 7, but it is fundamentally the reason why it is never used in practical
    implementations. Instead a really small reformulation fixes the problem:


    $$i(t_{n+1}) = C \frac{u(t_{n+1}) - u(t_n)}{\Delta t} \rightarrow u(t_{n+1}) =
    u(t_n) + \Delta t \frac{i(t_{n+1})}{C} \quad (2.6)$$


    Please note the current is evaluated at the new timestep! We say this is an implicit
    formulation of the differential equation. The unknowns show up at both sides of
    the equal sign. This is the key, and it turns out this formulation does not suffer
    from the type of instability that plagues the forward Euler, and this is known
    as the backward, or implicit, Euler implementation. Most simulators provide this
    integration method, and it is fairly straightforward to implement as we shall
    see later.


    # 2.1.3 Trapezoidal Method (Trap)


    The trapezoidal method is based on integrating the differential equation over
    a short time using trapezoids as a way to approximate the functions, hence the
    name. We will not go into the details, but with this formulation, one finds the
    derivative is approximated as'
