  md: 'A change in initial state turns out to be given by (see Chap. 7 for details)


    $$\Delta \boldsymbol{v}_i(t) = (\boldsymbol{I} - \boldsymbol{J}_{\varphi, ij}(T))^{-1}
    (-\boldsymbol{v}_i(t) + \boldsymbol{v}_i(t+T))$$


    where


    $$\boldsymbol{J}_{\varphi, ij}(T) = \frac{\partial \boldsymbol{v}_N}{\partial
    \boldsymbol{v}_0} = \frac{\partial \boldsymbol{v}_N}{\partial \boldsymbol{v}_{N-1}}
    \frac{\partial \boldsymbol{v}_{N-1}}{\partial \boldsymbol{v}_{N-2}} \cdots \frac{\partial
    \boldsymbol{v}_1}{\partial \boldsymbol{v}_0}$$


    is the transfer function we were looking for. Here, the indices indicate timestep,
    so to get to timestep $N$, we need to see how timestep 1 depends on timestep 0
    and how timestep 2 depends on timestep 1 and so on. We show in Chap. 7 for the
    case with capacitors in the netlist that this Jacobian can be calculated at timestep,
    $n$, as


    $$\frac{\partial \boldsymbol{v}(t_n)}{\partial \boldsymbol{v}_0} = \frac{1}{\Delta
    t} \boldsymbol{J}_f^{-1} \frac{\partial \boldsymbol{q}(\boldsymbol{v}(t_{n-1}))}{\partial
    \boldsymbol{v}(t_{n-1})} \frac{\partial \boldsymbol{v}(t_{n-1})}{\partial \boldsymbol{v}_0}$$


    where


    $$\boldsymbol{J}^f = \left[ \frac{\partial \boldsymbol{i}(\boldsymbol{v}(t_n))}{\partial
    \boldsymbol{v}(t_n)} + \frac{1}{\Delta t} \frac{\partial \boldsymbol{q}(\boldsymbol{v}(t_n))}{\partial
    \boldsymbol{v}(t_n)} \right]$$


    is the normal network Jacobian we encountered in Sects. 5.2 and 5.4. In other
    words, as we step in time, we can calculate the Jacobian $\boldsymbol{J}_{\varphi}$
    as we go along.


    This might seem complicated, but let us consider again the example of a circuit
    without memory where there are no capacitors or inductors. Now, since the signals
    everywhere at a given time point $t$ are only dependent on the value of the driving
    source at the same time point, clearly $\boldsymbol{J}_{\varphi, ij} \equiv \boldsymbol{0}$,
    and if we solve the circuit with a DC solver at this time point, we clearly will
    have $\boldsymbol{v}_i(t) = \boldsymbol{v}_i(t+T)$; we then find $\Delta \boldsymbol{v}_i(t)
    = \boldsymbol{0}$. This is the same conclusion we drew previously for our example
    circuit.


    The general idea is now straightforward. We start with a certain initial state
    at $t=0$ we have gotten from either a previous transient simulation or perhaps
    a brave guess; we step through all time steps until $t=T$ calculating the Jacobian
    along the way. When we get to the final state, we use Newton-Raphson with Eq.
    5.29 to calculate a new initial state and start over.


    Let us codify this idea. In Sect. 5.6.7, Code5.7 is an implementation of the shooting
    method concept with capacitors as the dynamic element.


    We can apply the code to the example we used earlier in Fig. 5.1 where we have
    added capacitors $c_1$, $c_2$ to the input and find the netlist'
