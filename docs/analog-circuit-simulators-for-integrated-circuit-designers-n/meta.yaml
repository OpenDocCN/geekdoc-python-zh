  md: 'Surface potential models are based on the surface potential solution to Poisson’s
    equation for a MOS transistor. The main difference to earlier models, like the
    first versions of BSIM, is instead of having the transistor operation divided
    into separate operating regions, the solution is continuous across all regions,
    and there is no need for various transition region modelings. The disadvantage
    is that the governing equation is inherently implicit and it can take time to
    find an acceptable solution. We will do a quick review of the basics in this section.
    We start with a basic two-dimensional approximation and show a way to solve it
    implicitly. We finally discuss the consequences for the design engineer. These
    are well-known calculations and we choose to follow [1] fairly closely.


    Let us start the modeling by referring to Fig. 3.3. Here we will follow the estimation
    analysis flow [4] without spending too much time on the actual calculations since
    they have been done at other places in great detail.


    We denote by $\psi(x,y)$ the intrinsic potential at $(x,y)$ with respect to the
    intrinsic potential of the bulk substrate (see Fig. 3.3). We define a voltage
    $V$ which is positive in the channel direction and is zero at the source terminal.
    There is a more precise technical definition of $V$, and the reader is encouraged
    to find out in for example [1]. For our review purposes, here it is sufficient
    to define it the way we have it.


    **Simplify** First let us simplify the problem so it becomes manageable for a
    simple model.


    We will assume:


    +   - The gradual channel approximation – the variation of the electric field
    in the $y$-direction – is much smaller than the variation in the $x$-direction
    [5]. We can then reduce the 2D Poisson equation to 1D slices. This approximation
    is valid for most of the channel regions except beyond pinch off.

    - The hole current and generation and recombination currents are negligible. This
    means the current is the same along the direction of the channel ($y$-direction).

    - We assume the voltage $V$ is independent of $x$ so $V = V(y)$. It is motivated
    by the fact that the current flows mostly in the source-drain or $y$-direction.
    At the source end $V(0) = 0$ and at the drain, we have $V(y = L) = V_{ds}$

    - The inversion layer is really thin leading to what is known as the charge sheet
    model where the electric field changes abruptly across the inversion region. Denote
    that $V_{fb}$ is the flatband voltage, $\varepsilon_{si}$ the silicon permittivity,
    $q$ the electron charge, $N_a$ the doping concentration, and $\psi_s = \psi(0,y)$.
    The expression for the inversion charge becomes then


    $$Q_i = -C_{ox} \left( V_{gs} - V_{fb} - \psi_s \right) - \sqrt{2 \varepsilon_{si}
    q N_a \psi_s}$$


    These assumptions lead to the following expression for the electron concentration
    at $(x,y)$.'
