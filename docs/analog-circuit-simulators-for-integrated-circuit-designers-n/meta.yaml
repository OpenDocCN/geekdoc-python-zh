    *Saturated Region*

    Here, $V_{be} > -5n_jkT/q$ and $V_{bc} > -5n_jkT/q$. We then have


    $$I_c = \frac{I_s}{q_b} \left( e^{\frac{qV_{be}}{n_jkT}} - e^{\frac{qV_{bc}}{n_jkT}}
    - \frac{q_b}{\beta_r} \left( e^{\frac{qV_{bc}}{n_jkT}} - 1 \right) \right) - C_4
    I_s \left( e^{\frac{qV_{bc}}{n_jkT}} - 1 \right) + \left( \frac{V_{be}}{q_b} -
    \left( \frac{1}{q_b} + \frac{1}{\beta_r} \right) V_{bc} \right) G_{\min}$$


    ![](img/75093da0d280ad52326a78925e5cc403_65_0.png)


    Fig. 3.7 Gummel-Poon large signal model showing the distributed base-collector
    capacitance $C_{JX}$. (© [1987] Republished with permission from McGraw Hill “Semiconductor
    device modeling with SPICE”, Massobrio G, Antognetti P; permission conveyed through
    Copyright Clearance Center)


    $$I_b = I_s \left( \frac{1}{\beta_f} \left( e^{\frac{qV_{be}}{n_f kT}} - 1 \right)
    + \frac{1}{\beta_r} \left( e^{\frac{qV_{bc}}{n_r kT}} - 1 \right) \right)$$


    *Off Region*

    Here, $V_{be} \leq -5n_f kT/q$ and $V_{bc} \leq -5 n_r kT/q$. We then have


    $$I_c = \frac{I_s}{\beta_r} + C_4 I_s + \left( \frac{V_{be}}{q_b} - \left( \frac{1}{q_b}
    + \frac{1}{\beta_r} \right) V_{bc} \right) G_{\min}$$


    $$I_b = -I_s \frac{\beta_f + \beta_r}{\beta_f \beta_r} - I_s (C_2 + C_4) + \left(
    \frac{V_{be}}{\beta_f} + \frac{V_{bc}}{\beta_r} \right) G_{\min}$$


    In all these equations, $G_{min}$ represents the minimal conductance in parallel
    to each pn-junction.'
  mdcn: '对于小尺寸CMOS而言，这些因素至关重要，现在可以以合理的精度进行捕获。我们还强调了一些模型开关，这些开关对于正确的行为以及与硅片的相关性可能非常重要。强烈建议读者研究工厂提供的模型文件，并自行判断对于所考虑的应用，合适的参数（开关）应该是什么。


    ## 3.1.4.2 BSIM6


    随着技术发展到更复杂的物理实现，如绝缘体上系统（SOI）和FinFET结构，BSIM模型团队一直非常忙碌地跟进。BSIM6框架下的最新一代模型包含了更多针对这些特定技术以及其他技术的实现。由于篇幅限制，我们在此仅简要提及它们的功能，将细节留给读者探索。强烈建议读者按照我们在前面章节中描述的思路，详细研究这些实现。


    -   BSIM-BULK：这是新的体硅BSIM模型

    -   BSIM-SOI：这是基于BSIM3v3的SOI结构紧凑模型

    -   BSIM-IMG：BSIM-IMG（独立多栅）模型已开发用于模拟独立双栅结构的电学特性，如超薄体和埋氧层SOI晶体管（UTBB）。它允许不同的前栅和后栅电压、功函数、介电层厚度和介电常数。

    -   BSIM-CMG：（共栅多栅）是针对共栅多栅FET类器件的紧凑模型。针对本征和外征模型，推导了基于物理表面势的公式，并考虑了有限的体掺杂。源端和漏端的表面势通过解析求解，并考虑了多晶硅耗尽和量子力学效应。有限体掺杂的影响通过微扰方法捕获。解析表面势解与二维器件模拟结果吻合良好。


    ## 3.2 双极晶体管


    双极晶体管的工作原理与CMOS晶体管大不相同。传统上，SiGe双极晶体管的速度比CMOS晶体管快得多，但随着小尺寸CMOS的引入，这两种技术的速度现在更具可比性。也许CMOS最大的优势在于其互补性质；存在一个与NMOS一样快的PMOS晶体管。因此，有更多架构选择可用。


    在模拟器中实现双极器件最困难的方面之一是电流对电压的强指数依赖性。这很容易导致解的发散，因为电压的大步长会导致更新电流时出现溢出。我们将在后面的第5章中看到这种行为的例子。有办法解决这个问题，例如，将电压偏移限制在某个数值，或者构建一个新的指数函数，使其在超过某个输入后不再是指数函数。


    本节首先简要描述一般行为，然后在3.2.2、3.2.3、3.2.4和3.2.5节中讨论几个流行模型。


    ### 3.2.1 一般行为


    双极晶体管的物理原理相当复杂。一个优势是，物理原理在输出电流的多个数量级上是相同的，这导致模型中的不连续性较少，有助于收敛。我们在此没有空间详细讨论，仅引用基本结果。读者可以在[2]中找到很好的讨论。


    双极晶体管有一个通用符号，如图3.5所示。输出集电极电流与基极-发射极电压之间的基本关系是著名的公式


    $$I_C = I_s \left(e^{qV_{BE}/kT} - 1\right)$$

    $$I_B = I_C / \beta$$

    $$I_E = I_C + I_B$$


    因子$\beta$是电流放大系数。


    ### 3.2.2 Ebers-Moll模型


    一个更复杂的模型，也是最早开发的模型之一，称为Ebers-Moll模型[14]。它最初只是一个静态非线性模型，但多年来经过改进，包含了电荷存储、随电流变化以及基区宽度调制（导致有限输出电导）等效应。一个描述电容和寄生电阻效应的大信号模型，如其在早期SPICE中实现的，可以在图3.6中找到。


    集电极和发射极节点的基本电流关系比我们在3.2.1节中指出的要复杂得多，由下式给出


    图3.5 双极晶体管符号。它由三个主要端子组成：基极、集电极和发射极


    ![](img/75093da0d280ad52326a78925e5cc403_63_0.png)


    ![](img/75093da0d280ad52326a78925e5cc403_63_1.png)


    图3.6 SPICE BJT大信号模型。（© [1987] 经McGraw Hill许可转载，“Semiconductor device modeling
    with SPICE”，Massobrio G., Antognetti P.；许可通过Copyright Clearance Center传达）


    $$I_C = I_S \left[ \left( e^{qV_{BE}/kT} - e^{qV_{BC}/kT} \right) \left( 1 - \frac{V_{BC}}{V_A}
    \right) - \frac{1}{\beta_R} \left( e^{qV_{BC}/kT} - 1 \right) \right] + \left[
    V_{BE} - \left( 1 + \frac{1}{\beta_R} \right) V_{BC} \right] G_{\min}$$

    $$I_E = I_S \left[ \frac{1}{\beta_F} \left( e^{qV_{BE}/kT} - 1 \right) + \frac{1}{\beta_R}
    \left( e^{qV_{BC}/kT} - 1 \right) \right] + \left[ \frac{V_{BE}}{\beta_F} + \frac{V_{BC}}{\beta_R}
    \right] G_{\min}$$


    ### 3.2.3 Gummel-Poon模型


    Gummel-Poon模型多年来一直是主力模型，现在或多或少被认为已过时。它扩展了Ebers-Moll模型，还考虑了低电流和高注入水平下的效应（图3.7）显示了*Gummel-Poon*模型的等效电路。晶体管操作分为四个工作区域：正向有源区、反向区、饱和区和截止区。


    *正向有源区*

    此处，$V_{be} > -5n_jkT/q$ 且 $V_{bc} \le -5n_jkT/q$。我们有


    $$I_c = \frac{I_s}{q_b} \left( e^{\frac{qV_{be}}{n_jkT}} + \frac{q_b}{\beta_r}
    \right) + C_4 I_s + \left( \frac{V_{be}}{q_b} - \left( \frac{1}{q_b} + \frac{1}{\beta_r}
    \right) V_{bc} \right) G_{\min}$$


    $$I_c = I_s \left( \frac{e^{\frac{qV_{be}}{n_jkT}}}{\beta_f} - \frac{1}{\beta_f}
    - \frac{1}{\beta_r} \right) + C_2 I_s \left( e^{\frac{qV_{bc}}{n_jkT}} - 1 \right)
    - C_4 I_s + \left( \frac{V_{be}}{\beta_f} + \frac{V_{bc}}{\beta_r} \right) G_{\min}
    \quad (3.46)$$


    *反向区*

    此处，$V_{be} \le -5n_jkT/q$ 且 $V_{bc} > -5n_jkT/q$。我们有


    $$I_c = -\frac{I_s}{q_b} \left( e^{\frac{qV_{bc}}{n_jkT}} + \frac{q_b}{\beta_r}
    \left( e^{\frac{qV_{bc}}{n_jkT}} - 1 \right) \right) + C_4 I_s \left( e^{\frac{qV_{bc}}{n_jkT}}
    - 1 \right) + \left( \frac{V_{be}}{q_b} - \left( \frac{1}{q_b} + \frac{1}{\beta_r}
    \right) V_{bc} \right) G_{\min}$$


    $$I_c = I_s \left( \frac{1}{\beta_f} - \frac{1}{\beta_r} \left( e^{\frac{qV_{bc}}{n_jkT}}
    - 1 \right) \right) - C_2 I_s + C_4 I_s \left( e^{\frac{qV_{bc}}{n_jkT}} - 1 \right)
    + \left( \frac{V_{be}}{\beta_f} + \frac{V_{bc}}{\beta_r} \right) G_{\min}$$


    *饱和区*

    此处，$V_{be} > -5n_jkT/q$ 且 $V_{bc} > -5n_jkT/q$。我们有


    $$I_c = \frac{I_s}{q_b} \left( e^{\frac{qV_{be}}{n_jkT}} - e^{\frac{qV_{bc}}{n_jkT}}
    - \frac{q_b}{\beta_r} \left( e^{\frac{qV_{bc}}{n_jkT}} - 1 \right) \right) - C_4
    I_s \left( e^{\frac{qV_{bc}}{n_jkT}} - 1 \right) + \left( \frac{V_{be}}{q_b} -
    \left( \frac{1}{q_b} + \frac{1}{\beta_r} \right) V_{bc} \right) G_{\min}$$


    ![](img/75093da0d280ad52326a78925e5cc403_65_0.png)


    图3.7 Gummel-Poon大信号模型，显示了分布的基极-集电极电容$C_{JX}$。（© [1987] 经McGraw Hill许可转载，“Semiconductor
    device modeling with SPICE”，Massobrio G, Antognetti P；许可通过Copyright Clearance
    Center传达）


    $$I_b = I_s \left( \frac{1}{\beta_f} \left( e^{\frac{qV_{be}}{n_f kT}} - 1 \right)
    + \frac{1}{\beta_r} \left( e^{\frac{qV_{bc}}{n_r kT}} - 1 \right) \right)$$


    *截止区*

    此处，$V_{be} \leq -5n_f kT/q$ 且 $V_{bc} \leq -5 n_r kT/q$。我们有


    $$I_c = \frac{I_s}{\beta_r} + C_4 I_s + \left( \frac{V_{be}}{q_b} - \left( \frac{1}{q_b}
    + \frac{1}{\beta_r} \right) V_{bc} \right) G_{\min}$$


    $$I_b = -I_s \frac{\beta_f + \beta_r}{\beta_f \beta_r} - I_s (C_2 + C_4) + \left(
    \frac{V_{be}}{\beta_f} + \frac{V_{bc}}{\beta_r} \right) G_{\min}$$


    在所有这些方程中，$G_{min}$代表与每个pn结并联的最小电导。'
