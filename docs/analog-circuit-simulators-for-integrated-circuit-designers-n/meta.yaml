    # 5.4.2.2 Summary


    Timestep control is a closely guarded secret for commercial simulators since it
    directly affects the simulator performance. In this section, we have demonstrated
    a couple of strategies one can employ and showed the possible strengths and weaknesses
    of each compared to a more accurate fixed timestep simulation.

    The reader is strongly encouraged to explore this more on his or her own. The
    literature on timestep adjustments is rich, and the reader can, for example, look
    at [4, 15–17, 24] to get an idea of what people have tried.

    The fact that we are using a variable timestep can cause problems when we are
    using a Gear2 implementation. If we recall from the previous sections and in Chap.
    1, the Gear method relies on information from two timesteps back. If these two
    timesteps are different, we are not quite getting the right value, and one then
    needs to inter(extra)-polate to get the appropriate number. This can often result
    in a convergence problem unless one remedies it. Can you find a good way to circumvent
    this potential problem?'
