    # 1.3 This Book


    People often ask me why I would write a book about simulators: “You’re a design
    engineer!” There are basically two answers to this question: first of all, I think
    it is important to have at least a basic understanding of the tools we use in
    our work. If one understands their strengths and weaknesses, one becomes a much
    better user. Second, the inner workings of these tools are really fascinating
    in their own right and a lot of fun to know more about.


    This book concerns the inner workings of analog simulators and describes how various
    difficult problems that arose in their development were solved. The book shows
    the basics of the algorithms using Python as the code environment of choice. Python
    is readily available for virtually all operating systems, and the code examples
    can thus be run and examined pretty much everywhere. It is also unusually easy
    to both read and use the code itself. The codes are not intended to be the starting
    point for any full-fledged professional simulator. They are simple code test benches
    for the interested reader. All the algorithms behind the precise code implementation
    can be found in journals and books available to the public. This book will not
    present any secret algorithms or trade secret to the best of the authors’ knowledge.
    Instead the intention is to show the basic working principles of the core algorithms.


    Furthermore, the presentation is based on really simple examples rather than a
    detailed mathematical theory. This is so the basic ideas can be grasped quicker,
    and we leave the more detailed mathematical theory and its development to Chap.
    7 that follows a more traditional and rigorous approach to the material.


    It is the hope of the author that the provided gentle mathematics and plenty of
    code examples will inspire the reader to explore more on his or her own when it
    comes to simulators and what to watch out for and learn how to optimize their
    use. In addition to the provided code examples, the book also presents the results
    of professional simulators to ensure the reader we are on firm ground. For the
    curious mind, the basics of the formal mathematical theory behind the simulator
    algorithms can be found in one of the later chapters. They are there for the sake
    of completeness, and they contain nothing new for the sophisticated reader.


    Toward the end, one of the chapters concerns a more subjective approach to designing
    analog parts of integrated circuits using analog simulators. It is based on the
    authors’ many years in the semiconductor industry and incorporates lessons learned
    from one particular perspective. Other experienced engineers can have a somewhat
    different view on how to approach the design and production of mass-marketable
    chips. In either case, the approach the author describes is hardly controversial
    and has resulted in many successful market introductions of integrated circuits.


