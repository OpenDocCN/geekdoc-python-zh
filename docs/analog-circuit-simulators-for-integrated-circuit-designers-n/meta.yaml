- md: "## 2.1.4 Second-Order Gear Method (Gear2)\n\nC. William Gear [5] published\
    \ a book in 1971 that has since become one of the classics. He constructs a set\
    \ of difference equations with varying truncation error that has some really nice\
    \ properties. He shows how one can systematically formulate a difference equation\
    \ of higher order and in the early days of SPICE one can incorporate several of\
    \ them in the numerical solver. In recent decades, the second-order version has\
    \ proven to be the most widely used, and in modern simulators, the Gear2 option\
    \ is a standard integration method.\n\nIn the second-order Gear implementation\
    \ of a derivative, we have\n\n$$\\frac{df}{dt}(t+\\Delta t) \\approx \\frac{1}{\\\
    Delta t}\\left(\\frac{3}{2}f(t+\\Delta t) - 2f(t) + \\frac{1}{2}f(t-\\Delta t)\\\
    right)$$\n\nIt looks quite a bit different compared to the earlier implementations.\
    \ This formulation is somewhat less precise than the trap method (we will see\
    \ why later in Chap. 4) but does not suffer from its “ringing” weakness. Numerically,\
    \ this is also straightforward to implement; we just need an initial derivative\
    \ in addition to initial value and knowledge of the solution two timesteps back.\
    \ We have for the full formulation using the previous example\n\n$$\\frac{i(t+\\\
    Delta t)}{C} = \\frac{3u(t+\\Delta t)/2 - 2u(t) + u(t-\\Delta t)/2}{\\Delta t},\
    \ \\quad u(0)=1,$$\n\nor after reformulation\n\n$$u(t+\\Delta t) = u(t)\\frac{4}{3}\
    \ - \\frac{u(t-\\Delta t)}{3} + \\frac{2\\Delta t}{3C}i(t+\\Delta t), \\quad u(0)=1,\
    \ \\qquad (2.9)$$\n\nAs before, ignoring the current update routine, a pseudocode\
    \ will look like\n\n```\nsubroutine SolveDiffGear2\nu(0)=1\nu(1)=1\ndeltaT=RC/100\n\
    for(i=2, i<N, i++) do\n    u(i)=4u(i-1)/3-u(i-2)/(3C) deltaT -2I(i)/(3C)\nend\
    \ for\nend subroutine\n```\n\nThe second-order Gear method is an example of a\
    \ multistep difference method where we need to know the solution two timesteps\
    \ back.\n\n## 2.1.5 Summary\n\nThese last three methods are overwhelmingly used\
    \ in practical simulator implementations, and depending on the circuit to be studied,\
    \ one usually prefers one over the other, and we will show examples of these situations\
    \ as we go through the book.\n\n## 2.1.6 Solution Methods: Accuracy and Stability\n\
    \nWe have looked at four different ways to formulate a differential equation in\
    \ terms of difference equations. Let us now try to quantify them each in terms\
    \ of accuracy and stability.\n\n### 2.1.6.1 Accuracy\n\nThe accuracy of the solution\
    \ will depend on the circuit to be solved, the timestep, and which integration\
    \ method was used. The accuracy of numerical approximations to differential equations\
    \ can be estimated by their truncation error. One way to construct difference\
    \ approximations is to use a Taylor series of a function around some point:\n\n\
    $$f(t+\\Delta t) = f(t) + f'(t)\\Delta t + \\frac{1}{2}f''(t)\\Delta t^2 + \\\
    dots + \\frac{1}{n!}f^n(t)\\Delta t^n$$\n\nA first-order accurate approximation\
    \ will now be found by assuming all higher-order derivatives are negligible, and\
    \ we are left with\n\n$$f(t+\\Delta t) = f(t) + f'(t)\\Delta t + \\frac{1}{2}f''(t)\\\
    Delta t^2 + \\dots$$\n\nwhich after some rewrite gives\n\n$$f'(t) = \\frac{f(t+\\\
    Delta t) - f(t)}{\\Delta t} + o(\\Delta t) \\quad (2.10)$$\n\nwhere the $o$ symbol\
    \ indicates behavior for small arguments.\n\nThis is the Euler forward approximation\
    \ which is accurate to first order. It means the truncation error is $\\sim \\\
    Delta t$. One can similarly show that the trapezoidal approximation and Gear2\
    \ approximation are of second-order accuracy where the error scales as $\\Delta\
    \ t^2$. What this means practically is that if the solution is a straight line,\
    \ the first derivative is not changing with time, so the second-order derivative\
    \ is zero, and all the three methods we have been discussing will have no truncation\
    \ error in the evaluation of the derivative. If the solution is a second-order\
    \ polynomial, the Euler method will start to have truncation errors, and one must\
    \ reduce the timestep to reduce their impact. The trap and Gear2 method can trace\
    \ out a second-order polynomial with no truncation error but will have errors\
    \ when higher-order solutions are encountered. Generally the higher the order,\
    \ the better when it comes to accuracy. The penalty is lengthy evaluations in\
    \ time, so most simulators use up to third-order approximations in the derivative\
    \ calculation.\n\nThe global accuracy is more difficult to predict since it is\
    \ very dependent on the circuit being simulated. We will address these issues\
    \ again in Chap. 4.\n\n> If the solution is a polynomial of order $n$, a difference\
    \ approximation that is accurate to this order will have no truncation errors.\n\
    \n### 2.1.6.2 Stability\n\nStability of numerical implementations of differential\
    \ equations is obviously an important subject, and it has been well studied over\
    \ many years (see, for example, Chap. 7 and [2–17]). We will here just show what\
    \ is referred to as the regions of stability for the methods we just discussed\
    \ in Sects. 2.1.2, 2.1.3, and 2.1.4.\n\n#### General Stability Theory\n\nWhat\
    \ one means by a system being stable can be different from application to application.\
    \ Here, as in most circuit theory books, we will adopt the bounded definition\
    \ of stability, meaning the solution is considered stable if the signals will\
    \ remain within a certain limited bound, $B$, at all times. We will follow the\
    \ common thread in the literature and use simple linear systems to investigate\
    \ the numerical stability.\n\nTo analyze stability, let us then consider a homogeneous\
    \ linear differential system with constant coefficients\n\n$$\\frac{dx}{dt} =\
    \ Ax$$\n\nwhere we assume $|x(t)|_{\\max} \\rightarrow \\leq B$ as $t \\rightarrow\
    \ \\infty$. This equation is referred to as a test equation. A set of linear equations\
    \ like the test equation has the exact general solution\n\n$$x(t) = \\sum_{i=1}^{n}\
    \ c_i e^{\\lambda_i t} v_i$$\n\nwhere $\\lambda_i$, $v_i$ are the eigenvalues/vectors\
    \ to the system obtained by solving\n\n$$Av_i = \\lambda_i v_i$$\n\n$\\lambda_i$\
    \ are in general complex numbers. If we assume the system is stable, it implies\
    \ that $Re(\\lambda_i) \\leq 0 \\forall i$. All eigenvalues are in the left half\
    \ plane or on the imaginary axes. Let us illustrate in Fig. 2.2. It shows how\
    \ the solution with positive real eigenvalues explodes beyond bounds due to an\
    \ exponent that increases linearly with time on the right-hand plane, while eigenvalues\
    \ with negative real values decreases with time on the left-hand side (Fig. 2.2).\n\
    \nIt turns out, [5, 6, 9, 17], that to investigate the stability of a numerical\
    \ approximation, one simply applies it to the test equation and examines for which\
    \ timesteps the numerical solution dies down, or stays within a certain bound\
    \ with time.\n\n#### Region of Stability\n\nThe region of stability is now the\
    \ part of the complex plane defined by the product $\\Delta t \\lambda_i$ where\
    \ the numerical implementation goes to zero with time. We will look at our four\
    \ integration methods and simply quote the results; the details are given in,\
    \ for example, [5, 6, 9, 17] and Chap. 7. The main point here is to get a sense\
    \ of the region of the stability.\n\n#### Euler\n\nFor Euler’s implementation,\
    \ the backward Euler is much more stable than the forward one. The stability region\
    \ can be found to be in Fig. 2.3. What does this mean? If the system itself is\
    \ stable, in other words all the eigenvalues have negative real components, the\
    \ forward Euler implementation can still become unstable. In fact it is only within\
    \ the small grayed-out circle, the product $\\Delta t \\lambda_i$ will result\
    \ in stable behavior. One simply has to take smaller timesteps to achieve a stable\
    \ behavior. We will quantify more in Chap. 4 what this means in practice.\n\n\
    Next we can look at backward Euler (Fig. 2.4). Here the behavior is totally different.\
    \ The method is stable even if the system itself is not; note the grayed-out region\
    \ extends into the right-hand plane. We will look at a system in Chap. 4 that\
    \ behaves this way with Euler’s method. The reader is certain to appreciate the\
    \ peculiar property that with Euler’s backward method, a system might simulate\
    \ just fine but in reality it will become unstable!"
  mdcn: "## 2.1.4 二阶Gear法（Gear2）\n\nC. William Gear [5] 于1971年出版了一本后来成为经典之一的著作。他构建了一组具有不同截断误差的差分方程，这些方程具有一些非常优良的特性。他展示了如何系统地建立高阶差分方程，并且在SPICE的早期版本中，可以在数值求解器中整合多个这样的方程。近几十年来，二阶版本已被证明是使用最广泛的，在现代仿真器中，Gear2选项是一种标准的积分方法。\n\
    \n在导数的二阶Gear实现中，我们有\n\n$$\\frac{df}{dt}(t+\\Delta t) \\approx \\frac{1}{\\Delta\
    \ t}\\left(\\frac{3}{2}f(t+\\Delta t) - 2f(t) + \\frac{1}{2}f(t-\\Delta t)\\right)$$\n\
