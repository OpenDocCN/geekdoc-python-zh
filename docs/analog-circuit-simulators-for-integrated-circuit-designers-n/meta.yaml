    ## 5.4.3.2 Global Truncation Error


    We have in the previous section spent a bit of time on a cross-region MOS model,
    and we looked at a few common circuit topologies and drew some conclusions about
    the need for accurate models. Errors related to the approximation of the differential
    equations through truncated difference schemes can be divided into two main groups:
    a local truncation error, or LTE, that we discussed in Sect. 4.6.6 and a global
    truncation error (GTE). Here we will now take a step back and discuss the GTE
    effect in more detail.


    Consider, for example, a digital system where there is an error at the output
    of an inverter. It will quickly return to ground or supply as a function of time.
    These types of circuits are very insensitive to errors. Consider on the other
    hand an LC oscillator where we inject an error at the zero crossing. We see the
    resulting difference compared to the unperturbed simulation in Fig. 5.31.


    The error occurs at the zero crossing and causes the phase to shift in time. This
    error will persist forever. In a real circuit, a noise injection at the zero crossing
    will contribute to phase noise (see [23]).


    Consider now the error in a driven circuit like an amplifier where we perturb
    the output at the zero crossing with the following Python code. The error will
    now dissipate with time due to the driving signal as depicted in Fig. 5.32.


    We have looked at two examples with varying degrees of error dissipation. Depending
    on the situation and the time constants involved, the GTE may or may not dissipate
    with time. It is then clear the global error is difficult to predict in general.
    In Chap. 6, we will mention a practical way to get an idea of the size of the
    global truncation error by changing accuracy requirements or timesteps.


    **Fig. 5.31** Oscillator-phase error, the error will persist indefinitely © [2019]
    Cambridge University Press. Reprinted, with permission, from Cambridge University
    Press


    **Fig. 5.32** Amplifier step error, an error at a certain time point which will
    dissipate with time due to the driving signal © [2019] Cambridge University Press.
    Reprinted, with permission, from Cambridge University Press


    ## 5.4.3.3 Pseudo-Transient Method for Convergence Aid


    With our final transient code, let us investigate the pseudo-transient (ptran)
    method for achieving convergence. Let us look at the circuit in Fig. 5.10. We
    noticed there that depending on the pull-down resistors and where they tie the
    output, the source stepping response would change. We found there are three different
    possible outcomes for DC source stepping. In this section, we will look at the
    same circuit, but this time we will imitate a pseudo-transient solution by having
    an inductor in series with the supply voltage source and have two capacitors shunting
    the outputs of the inverters to ground (Fig. 5.33). We will simulate this for
    a long “pseudo”-time and see what the solution becomes. Importantly we will keep
    the pull-up/pull-down resistors. As the reader no doubt realizes, the L and C’s
    will form a resonant block and a certain oscillation is likely to occur. The loss
    provided by the resistors will shut the oscillation down as time goes by. There
    are obviously many ways to do this in practice, and this type of oscillation is
    difficult with the algorithm and there dampened versions that have been developed,
    often referred to as dptran methods. We will not go into that further, but merely
    note that in our simple example, the resistors we have added will provide the
    needed dampening.


    Fig. 5.33 Circuit to exemplify ptran with the added inductors and capacitors;
    note the initial condition on the inductor needs to be such the voltage across
    it is zero; in other words the voltage on the PMOS source side is equal to vdd
    initially


    ```

    *

    vdd vdd1 0 1

    vss vss 0 0

    mn1 out in vss nch

    mp1 out in vdd pch

    mn2 in out vss nch

    mp2 in out vdd pch

    r1 in vdd 1000000

    r2 out vdd 1000000

    l1 vdd1 vdd 1e-12

    c1 in vss 1e-13

    c2 out vss 1e-13

    netlist 5.13

    ```


    The result is presented in Fig. 5.34. What is noteworthy here is the relative
    ease of convergence. For the source stepping case we investigated in Sect. 5.2.2.1,
    we found severe convergence issues for some of the initial conditions, using resistors
    to loosely tie nodes in that case. Using ptran we see the same stable operating
    points but with much less convergence problems. In practice this is often the
    case also for larger circuitry; the ptran method and its cousin dampened ptran,
    or dptran, have much better convergence properties. One should not draw too far-reaching
    conclusions from the relatively simple examples here, but the results we have
    discussed do resemble what can happen in day-to-day engineering development situations.'
