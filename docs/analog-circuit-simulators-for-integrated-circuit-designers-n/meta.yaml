  md: '# Chapter 3

    Modeling Techniques


    **Abstract** In order to fully utilize a simulator, one needs to have an understanding
    of the devices the simulator is modeling and the difficulties that might hide
    underneath the hood. This chapter will provide an overview of the CMOS transistor
    and briefly describe bipolar implementations with associated challenges. We will
    go into the basic physical description in some detail in order to connect such
    a model with the first computer models we encounter in Sect. 3.1.4. We will highlight
    the difficulties and what the designer needs to keep in mind when simulating circuits.
    We are making the assumption the reader has already encountered the basic physical
    properties of the transistors, and we present this as a review, and for the details,
    the reader should consult the references.


    # 3.1 CMOS Transistor Model


    The CMOS transistor is by far the most used active device in modern integrated
    circuits. It might seem deceptively simple in its construction, in particular
    if one is looking at popular text books. It is however quite difficult to model
    [1–15]. The BSIM (Berkeley short-channel IGFET Model) which exist in several different
    levels of sophistication can take advantage of hundreds of parameters when characterizing
    a transistor. In this section, we will motivate why this is so, and we will start
    with a basic review of the physics of these devices. This is followed by a section
    on the BSIM models where we follow the model development over the years. The BSIM
    starting point in the late 1980s is quite similar to the physical model we will
    discuss in Sect. 3.1.2 and and as such is a good transition from simple analytical
    modeling to more complex numerical ones. The BSIM development is also an interesting
    study in how improvements are done gradually as the need arises and how deeper
    understanding of the transistor devices and their construction develop with time.'
  merge: -1
  pgno: 41
- img_proc: true
  md: '# 3.1.1 CMOS Transistor Basics


    Broadly speaking a CMOS transistor changes its behavior significantly as the terminal
    voltage changes. The device goes through several operating regions where different
    mechanisms are responsible for its response. This has traditionally caused some
    problems when modeling the devices which we will describe in Sect. 3.1.4. Here,
    we start with a broad description of the gate capacitance as we change the gate
    voltage (see Fig. 3.1).


    > To improve accuracy of simulations, bias the transistor in such a way it stays
    in one region of operation.


    The voltage across the structure is set by the parameter $V_g$. For negative voltage,
    the bottom plate (substrate) will attract the majority carriers, and the capacitance
    is simply


    $$C_g = \frac{4\pi\epsilon}{t_{ox}} \quad (3.1)$$


    where $\epsilon$ is the permittivity of the insulator material. This mode is referred
    to as accumulation mode. When the voltage $V_g$ is increasing, it will push away
    the positive charges and create a so-called space charge region. The result of
    this is the effective thickness of the capacitor dielectric is increasing, causing
    a reduction in capacitance. This is called the depletion region. As the voltage
    $V_g$ is increasing further passed a so-called threshold voltage $V_t$, an inversion
    layer is eventually created at the interface between the semiconductor material
    and the insulator. As a result, the effective capacitance is again increasing
    since the distance between the capaci-


    ![](img/75093da0d280ad52326a78925e5cc403_42_0.png)'
  merge: -1
  pgno: 42
- img_proc: true
  md: '![](img/75093da0d280ad52326a78925e5cc403_43_0.png)


    Fig. 3.2 Idealized capacitance vs voltage. (© [2009] Cambridge University Press.
    Reprinted, with permission, from Cambridge University Press)


    tor plates (where the charges are accumulating) is decreasing. We end up with
    a capacitance-voltage relationship as in Fig. 3.2.

    This is all well-known, and here we use it as an example of the complex behavior
    of a MOSFET transistor as its terminal voltages are changing. Please note in Fig.
    3.2 there is a frequency component to this simple description that changes the
    capacitance we just outlined.


    # 3.1.2 CMOS Transistor Physics


    In order to better follow the discussion in the modeling implementation in Chaps.
    4 and 5, we will provide a brief overview of a more detailed model of a CMOS transistor
    where we make a basic two-dimensional approximation. The details we will leave
    to the references. We will along the way take a look at the important threshold
    voltage derivation among other things. These calculations will serve to motivate
    some of the model assumptions we will discuss in Sect. 3.1.4. We will follow what
    is known as the surface potential approximation. This is a convenient starting
    point for the transistor behavior in the various operating regions.'
