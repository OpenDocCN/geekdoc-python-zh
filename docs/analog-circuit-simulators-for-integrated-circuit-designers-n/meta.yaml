    After we have examined common ways to adjust the timestep size, let us now reexamine
    our test circuits from Sect. 5.4.1.


    ### Simple Buffer with Realistic CMOS Model

    We can now resimulate the buffer we had with an adjustable timestep. The resulting
    number of iterations and comparison to the fixed timestep case can be found in
    Table 5.14.


