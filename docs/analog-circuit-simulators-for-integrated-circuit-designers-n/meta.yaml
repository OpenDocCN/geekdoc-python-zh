    and see what the solution becomes. Importantly we will keep the pull-up/pull-down
    resistors. As the reader no doubt realizes, the L and C’s will form a resonant
    block and a certain oscillation is likely to occur. The loss provided by the resistors
    will shut the oscillation down as time goes by. There are obviously many ways
