    | 1e-7 | 0 |\n| 1e-9 | 0 |\n\nin an error, and a convergence flag will be set.\
    \ The situation is different if we set the input voltage $V_{in} = V_{dd}/2$.\
    \ Now the current outputs match, and we should see a better convergence (Table\
    \ 5.6). We have used **code 5.5**.\n\nThis was a trivial example of how the gmin\
    \ method operates. It attempts to find a stable solution by simply adding resistors\
    \ to various nodes.\n\n## Pseudo-transient\n\nThe pseudo-transient method, ptran\
    \ for short, is perhaps the method that works best in practice. Here all the dynamic\
    \ elements, inductors, and capacitors are not disabled but actually used. The\
    \ basic idea of the method is to use *time* as the continuation variable, and\
