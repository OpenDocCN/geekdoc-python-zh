    adaptations would be too inaccurate and not capable of producing meaningful results.
    A real transistor implementation being simply too difficult was some of the comments,
    but this did not discourage Pederson and his students. We all owe a debt of gratitude
    to Pederson and his group for their unwavering belief in computer implementations
    using SPICE.


