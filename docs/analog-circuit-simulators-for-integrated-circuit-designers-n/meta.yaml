    of non-zero elements are of $\mathcal{O}(N)$ ($N$ is the number of rows/columns).
    The solution of sparse matrices is a research area in itself since it is a common
    problem [9]. Another point of interest is the ground node does not appear in the
    circuit network equations. This is due to the fact that adding a ground node equation
    will overdetermine the system of equations; in fact, it will add no new information
    to the circuit analysis and can be left out (see Chap. 7 and [1–8, 10–15]).


    # 4.3.2 AC Simulation


    Traditionally, AC simulations are single-tone frequency analyses where a certain
    stimulus frequency is varied and the systems response is calculated. The circuit
    for these simulations is linear. If the underlying circuitry contains nonlinear
    elements, these have been simply linearized around some bias point. This section
    will look at such a simulation using the circuit from the previous section as
    a specific example. We will also describe how the analysis from this circuit suggests
    how to set up the matrix from an arbitrary circuit topology with some surprisingly
    simple rules. We will describe these rules for passive elements and also how they
    work for various sources (voltage/current) and multi-port controlled sources.
    We will then implement these rules in a Python code script and run it for a couple
    of circuit examples. The reader is then encouraged to explore more using the exercises
    at the end of this chapter.


    If the system is linear and driven by a single frequency, $\sim e^{j\omega t}$,
    we can replace the derivatives $\frac{de^{j\omega t}}{dt} = j\omega e^{j\omega
    t}$ with a product: $j\omega$ (the exponential term is the same everywhere and
    can be eliminated). We then have the three basic passive elements:


