    \ 7.2.1 ODE 求解方法\n\n本节将讨论围绕 ODE 的基本数学和定理。与上一节一样，我们将呈现材料以保证自包含性。我们的大部分内容依赖于参考文献\
    \ [3, 4]。\n\n#### 7.2.1.1 初值问题\n\n初值问题（IVP）是指在某个时间（我们称之为时间 $t = 0$）解是已知的，并且系统由一个微分方程控制，该方程将其从该时间驱动到某个最终时间\
