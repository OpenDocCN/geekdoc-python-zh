    # Chapter 5

    Circuit Simulation: Nonlinear Case


    **Abstract** After the chapter on linear simulators, we will venture into the
    nonlinear aspects of circuit simulators by first looking at nonlinear DC operating
    point simulations. This was historically perhaps the most difficult problem to
    solve since one usually does not have an actual starting point unlike a transient
    solution where one often starts from the DC point and look at small changes with
    the new timestep. After the DC discussion, we will do full nonlinear transient
    simulations with active devices. The chapter ends with exploring other developments
    in circuit simulation such as periodic steady-state simulators. They have been
    extraordinarily helpful with circuit development, and we will examine several
    implementations using working code examples.


    # 5.1 Introduction


    As we already mentioned in Chap. 2 in the discussion on nonlinear solvers, they
    invariably involve an iterative step most commonly implemented as a version of
    the Newton-Raphson method. In this chapter, we will discuss this in more detail
    with respect to circuit simulators [1–21]. Perhaps most notably, the first difficulty
    one runs into is a DC convergence; it is one of the most challenging problems
    in circuit simulations with nonlinear elements, and we will discuss this in the
    first section. The next section will cover how nonlinear issues are tackled in
    a transient simulation. We will follow this by a detailed section on periodic
    steady-state-solvers (PSS) where we discuss the most popular implementations,
    harmonic balance, and shooting methods. Once a PSS solution has been found, we
    can use perturbation techniques to find solutions to periodic AC (PAC) and periodic
    noise (PNOISE) problems, and these are discussed in the subsequent sections. We
    end this chapter discussing a handful of common circuit example simulations where
    the steady-state approach is helpful.


    It should be noted the material in this chapter is very dense. Many complex issues
    are merely hinted at through brief and very simple examples. Things like convergence
    issues are extraordinarily difficult to address thoroughly in such small space
    as this chapter. The reader is therefore highly encouraged to explore outside
    the examples provided. It is not difficult to construct circuitry that has serious
    convergence difficulties, and the reader should consider what one can do about
    them and'
- md: "## 5.2 DC Nonlinear Simulation\n\nIn Chap. 4, we showed a few implementations\
    \ of linear simulators, and we discussed the fact that characterizing circuit\
    \ elements as having a certain matrix signature makes it really easy to build\
    \ up the basic matrix equation including the known right-hand side (rhs) column\
    \ matrix. Here we will discuss a DC simulator and the key difficulties in implementing\
    \ such a simulator when the branch equations are nonlinear and common remedies\
    \ to these problems.\n\nAs a circuit designer, it can often seem like the DC simulation\
    \ is trivial in that it is only solving for the operating points of the circuit;\
    \ no capacitors or inductors or other frequency dependent objects are used and\
    \ can be ignored. We can use the scheme developed earlier and simply short all\
    \ inductors and remove all capacitors, and we would be done. The problems come\
    \ when we have nonlinear elements. Many solutions can then exist, and if a starting\
    \ point for the DC iterations is not good, it can take a long time to find one\
    \ of them, if at all feasible in a reasonable time [4, 18]. We will here outline\
    \ some of these difficulties, and in doing so, we will encounter common terminology\
    \ and explain their technical meaning.\n\n### 5.2.1 Solution Techniques\n\nThe\
    \ study of nonlinear equations has a long and rich history. We mentioned in Chap.\
    \ 2 the dominant solution method as being the Newton-Raphson algorithm. In Chap.\
    \ 2, we discussed a one-dimensional derivation of the method. This section will\
    \ introduce a multidimensional version, and we will show how one can implement\
    \ it numerically. It is one of the work horses in nonlinear numerical codes, and\
    \ a good understanding of it and its convergence properties can be a really helpful\
    \ tool in one's toolbox. There are also some interesting pathologies stemming\
    \ from not being “close enough” to the correct solution initially, and we will\
    \ mention these briefly also.\n\n#### 5.2.1.1 Nonlinear Model Implementations\n\
    \nWe will discuss the DC problem by looking at a specific example (see Fig. 5.1).\
    \ The new element is a nonlinear transistor we will model in three different ways\
    \ following our analytical outline in Sect. 3.4. A transistor can be seen as a\
    \ VCCS where an input voltage between gate and source (or base-emitter) controls\
    \ the current through the drain (or collector). There is a lot more to modeling\
    \ a transistor as we discussed already in Chap. 3, but for our purposes, we will\
    \ keep the models really simple so various aspects of analog simulators can be\
    \ showcased. We will start with the simplest CMOS model from Sect. 3.4. This model\
    \ shows the drain current varies like $I_d \\sim V_{gs}^2$. This is perhaps the\
    \ simplest nonlinearity one can think of. In order to proceed, we need to take\
    \ a look at the definitions of the direction of currents as they apply to NMOS\
    \ and PMOS transistors, respectively. Let us look one more time at Fig. 3.8 where\
    \ the directions of the source and drain currents are indicated. The current direction\
    \ convention is that a current going into a device (or subcircuit) is positive;\
    \ outgoing currents are negative. For the NMOS transistor, we have then that the\
    \ drain current is\n\n$$I_d = K(V_g - V_s)^2 = KV_{gs}^2 \\quad (5.1)$$\n\nFor\
    \ the PMOS, $I_d$ becomes negative:\n\n$$I_d = -K(V_s - V_g)^2 = -KV_{sg}^2 \\\
    quad (5.2)$$\n\nNote the subtle change of subscript for the PMOS. For this model,\
    \ it has no significance, but it will play a role later on with more sophisticated\
    \ implementations.\n\nWith these sign conventions in mind, let us now discuss\
    \ solution techniques for such nonlinear devices.\n\nLet us look at this model\
    \ with our circuit in Fig. 5.1. The reader will realize the solution is fairly\
    \ straightforward analytically, but let us go through Newton-Raphson iterations\
    \ to see how it works. We find after some trivial algebra the equations we are\
    \ trying to solve are\n\n$$\\begin{cases} I_p + I_n = I_{sink} \\\\ I_p = K(V_a\
    \ - V_s)^2 \\\\ I_n = K(V_b - V_s)^2 \\end{cases} \\rightarrow \\begin{cases}\
    \ f_0 : I_p + I_n - I_{sink} = 0 \\\\ f_1 : I_p - K(V_a - V_s)^2 = 0 \\\\ f_2\
    \ : I_n - K(V_b - V_s)^2 = 0 \\end{cases} \\rightarrow f(\\boldsymbol{v}) = 0,\
    \ \\boldsymbol{v} = \\begin{pmatrix} V_s \\\\ I_p \\\\ I_n \\end{pmatrix} \\quad\
    \ (5.3)$$\n\nwhere we have explicitly solved for the voltages $V_A = V_{dd}R_1/(R_1\
    \ + R_2)$ and $V_B = V_{dd}R_3/(R_3 + R_4)$ to simplify the math and keep the\
    \ network equations manageable for analytical calculations. The drain voltages\
    \ follow trivially from the currents, $I_p$, $I_n$, and we will not add them directly\
    \ to the network equations. $\\boldsymbol{v}$ is here the vector of unknown quantities.\
    \ The function $f$ is a common symbol in the simulation literature [3, 4, 10,\
    \ 11] when discussing network equations. There the full MNA description is often\
    \ used, and no explicit current branches are included; it is therefore common\
    \ to see $f$ simply as the equation for KCL. In this book, we explicitly include\
    \ all branch equations, so $f$ will here also include those. The reader should\
    \ keep this in mind when reading the common reference literature [1–21]. When\
    \ we explicitly refer to the KCL equations only, we denote $f$ as $f_{KCL}$.\n\
    \nThese set of equations contain linear terms and nonlinear terms. We can separate\
    \ these out such that we have a set of equations that look like\n\n$$f(\\boldsymbol{v})\
    \ = \\begin{pmatrix} 0 & 1 & 1 \\\\ 0 & 1 & 0 \\\\ 0 & 0 & 1 \\end{pmatrix} \\\
    begin{pmatrix} V_s \\\\ I_p \\\\ I_n \\end{pmatrix} + \\begin{pmatrix} 0 \\\\\
    \ -K(V_a - V_s)^2 \\\\ -K(V_b - V_s)^2 \\end{pmatrix} - \\begin{pmatrix} I_{sink}\
    \ \\\\ 0 \\\\ 0 \\end{pmatrix} = 0 \\quad (5.4)$$\n\nThe second term in the equation\
    \ is known as the nonlinear term. It is simply added as a separate column matrix\
    \ to the matrix equation. The last term is the right-hand side of the matrix equation\
    \ we have just moved over as part of the definition of $f$. This way of separating\
    \ out the linear and nonlinear parts of the network equations is standard practice.\n\
    \nFollowing the Newton-Raphson recipe we discussed in Chap. 2, we can now write\
    \ this equation as a Taylor expansion in multidimensions around some point $\\\
    boldsymbol{v}_0$; for a detailed derivation, see Chap. 7:\n\n$$f(\\boldsymbol{v})\
    \ = f(\\boldsymbol{v}_0) + \\left. \\frac{\\partial f}{\\partial \\boldsymbol{v}}\
    \ \\right|_{\\boldsymbol{v}_0} (\\boldsymbol{v} - \\boldsymbol{v}_0) \\quad (5.5)$$\n\
    \nLet us now calculate the matrix in the second term, known as the *Jacobian*:\n\
    \n$$J_{ij} = \\frac{\\partial f_i}{\\partial v_j} \\quad (5.6)$$\n\nIt is fairly\
    \ straightforward to calculate for this case, and we find the following expression:\n\
    \n$$J = \\left( \\frac{\\partial f}{\\partial V_s} \\quad \\frac{\\partial f}{\\\
    partial I_p} \\quad \\frac{\\partial f}{\\partial I_n} \\right) = \\begin{pmatrix}\
    \ 0 & 1 & 1 \\\\ 2K(V_a - V_s) & 1 & 0 \\\\ 2K(V_b - V_s) & 0 & 1 \\end{pmatrix}\
    \ \\quad (5.7)$$\n\nThis matrix is evaluated at the previous iteration so all\
    \ the entities are known. Newton's method now tells us we can iterate the solution\
    \ in the following way (see Chap. 7 and [1, 3, 15–20]):\n\n$$v_{k+1} = v_k - (J)^{-1}\
    \ f(v_k) \\quad (5.8)$$\n\nThis is very similar in structure to the one-dimensional\
    \ case we presented in Chap. 2, but now it is all in matrix annotation. As should\
    \ be clear to the reader, the difficulty here is mainly finding the Jacobian;\
    \ luckily most of the time, it is already known through the device models. We\
    \ find the following Python code example:\n\n```python\nif DevType[i]=='transistor':\n\
    \    STA_matrix[NumberOfNodes+i][NumberOfNodes+i]=DevValue[i]\n    STA_matrix[NumberOfNodes+i][Nodes.index(DevNode1[i])]=0\n\
    \    STA_matrix[Nodes.index(DevNode1[i])][NumberOfNodes+i]=1\n    STA_matrix[NumberOfNodes+i][Nodes.index(DevNode3[i])]=0\n\
    \    STA_matrix[Nodes.index(DevNode3[i])][NumberOfNodes+i]=-1\n    STA_nonlinear[NumberOfNodes+i]=(sol[Nodes.index(DevNode2[i])]\n\
    \    - sol[Nodes.index(DevNode3[i])])**2\n\n#\n# Now we need the Jacobian, the\
    \ transistors look like VCCS with\n# a specific gain = 2 K (Vg-Vs) in our case\n\
    #\n    for i in range(MatrixSize):\n        for j in range(MatrixSize):\n    \
    \        Jacobian[i][j]=STA_matrix[i][j]\n    for i in range(DeviceCount):\n \
    \       if DevType[i]=='transistor':\n            Jacobian[NumberOfNodes+i][NumberOfNodes+i]=DevValue[i]\
    \ # due to derivative leading to double gain\n```"
  mdcn: "## 5.2 直流非线性仿真\n\n在第4章中，我们展示了几种线性仿真器的实现方式，并讨论了将电路元件表征为具有特定矩阵特性，对于构建包含已知右侧列向量的基本矩阵方程是多么容易。这里我们将讨论一个直流仿真器，以及在支路方程为非线性时实现此类仿真器的关键难点，以及针对这些问题的常见解决方法。\n\
    \n作为电路设计师，直流仿真有时看起来似乎微不足道，因为它只是求解电路的工作点；不涉及电容器、电感器或其他频率相关元件，因此可以忽略。我们可以使用前面开发的方案，简单地将所有电感短路、移除所有电容器，问题就解决了。然而，当我们遇到非线性元件时，问题就来了。此时可能存在多个解，如果直流迭代的初始点选择不佳，可能需要很长时间才能找到其中一个解，甚至在合理时间内根本无法找到[4,\
    \ 18]。我们将在此概述其中一些难点，并在此过程中介绍一些常见术语及其技术含义。\n\n### 5.2.1 求解技术\n\n非线性方程的研究有着悠久而丰富的历史。我们在第2章中提到，主要的求解方法是牛顿-拉夫逊算法。在第2章中，我们讨论了该方法的一维推导。本节将介绍其多维版本，并展示如何进行数值实现。它是非线性数值代码中的主力工具之一，深入理解它及其收敛特性对于工具箱来说是一个非常有用的工具。此外，由于初始解“不够接近”正确解，还会出现一些有趣的病态情况，我们也会简要提及。\n\
    \n#### 5.2.1.1 非线性模型实现\n\n我们将通过一个具体示例（见图5.1）来讨论直流问题。新元件是一个非线性晶体管，我们将按照第3.4节的分析大纲，用三种不同的方式进行建模。晶体管可以看作是一个压控电流源（VCCS），其中栅极和源极（或基极-发射极）之间的输入电压控制着漏极（或集电极）的电流。正如我们在第3章中已经讨论过的，对晶体管建模涉及更多内容，但为了我们的目的，我们将保持模型非常简单，以便展示模拟仿真器的各个方面。我们将从第3.4节最简单的CMOS模型开始。该模型显示漏极电流的变化类似于\
    \ $I_d \\sim V_{gs}^2$。这可能是人们能想到的最简单的非线性。为了继续，我们需要看一下电流方向的定义，它们分别适用于NMOS和PMOS晶体管。让我们再看一下图3.8，其中标出了源极和漏极电流的方向。电流方向的惯例是：流入器件（或子电路）的电流为正；流出的电流为负。对于NMOS晶体管，漏极电流为\n\
    \n$$I_d = K(V_g - V_s)^2 = KV_{gs}^2 \\quad (5.1)$$\n\n对于PMOS，$I_d$ 变为负值：\n\n\
    $$I_d = -K(V_s - V_g)^2 = -KV_{sg}^2 \\quad (5.2)$$\n\n注意PMOS下标的微妙变化。对于这个模型，它没有意义，但在更复杂的实现中会起作用。\n\
    \n记住这些符号约定，我们现在来讨论此类非线性器件的求解技术。\n\n让我们结合图5.1中的电路来看这个模型。读者会意识到解析解相当直接，但让我们通过牛顿-拉夫逊迭代来看看它是如何工作的。经过一些简单的代数运算，我们发现试图求解的方程是\n\
    \n$$\\begin{cases} I_p + I_n = I_{sink} \\\\ I_p = K(V_a - V_s)^2 \\\\ I_n = K(V_b\
    \ - V_s)^2 \\end{cases} \\rightarrow \\begin{cases} f_0 : I_p + I_n - I_{sink}\
    \ = 0 \\\\ f_1 : I_p - K(V_a - V_s)^2 = 0 \\\\ f_2 : I_n - K(V_b - V_s)^2 = 0\
    \ \\end{cases} \\rightarrow f(\\boldsymbol{v}) = 0, \\boldsymbol{v} = \\begin{pmatrix}\
    \ V_s \\\\ I_p \\\\ I_n \\end{pmatrix} \\quad (5.3)$$\n\n其中我们显式地求解了电压 $V_A = V_{dd}R_1/(R_1\
    \ + R_2)$ 和 $V_B = V_{dd}R_3/(R_3 + R_4)$，以简化数学运算并使网络方程在解析计算中易于处理。漏极电压可以从电流 $I_p$、$I_n$\
    \ 中直接得出，我们不会将它们直接添加到网络方程中。$\\boldsymbol{v}$ 是未知量的向量。函数 $f$ 是仿真文献[3, 4, 10, 11]中讨论网络方程时的常用符号。那里通常使用完整的MNA描述，不包含显式的电流支路；因此通常将\
    \ $f$ 简单地视为KCL方程。在本书中，我们显式地包含了所有支路方程，因此 $f$ 在这里也将包含这些方程。读者在阅读常见参考文献[1–21]时应记住这一点。当我们仅明确指代KCL方程时，我们将\
    \ $f$ 表示为 $f_{KCL}$。\n\n这组方程包含线性项和非线性项。我们可以将它们分离出来，得到一组如下形式的方程\n\n$$f(\\boldsymbol{v})\
    \ = \\begin{pmatrix} 0 & 1 & 1 \\\\ 0 & 1 & 0 \\\\ 0 & 0 & 1 \\end{pmatrix} \\\
    begin{pmatrix} V_s \\\\ I_p \\\\ I_n \\end{pmatrix} + \\begin{pmatrix} 0 \\\\\
    \ -K(V_a - V_s)^2 \\\\ -K(V_b - V_s)^2 \\end{pmatrix} - \\begin{pmatrix} I_{sink}\
    \ \\\\ 0 \\\\ 0 \\end{pmatrix} = 0 \\quad (5.4)$$\n\n方程中的第二项被称为非线性项。它只是作为一个单独的列矩阵添加到矩阵方程中。最后一项是我们刚刚移至\
    \ $f$ 定义部分的矩阵方程的右侧。这种将网络方程的线性和非线性部分分离出来的做法是标准做法。\n\n遵循我们在第2章讨论的牛顿-拉夫逊方法，我们现在可以将这个方程写成在某个点\
