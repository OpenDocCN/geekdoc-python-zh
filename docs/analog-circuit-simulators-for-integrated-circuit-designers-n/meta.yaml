    \ the circuit can be considered as having converged. In practical situations with\
    \ real silicon, there is always some resistance between every node and ground\
    \ due to leakage and other factors, so having a $g_{min} \\neq 0$ is not necessarily\
    \ a bad approximation. This method is clearly also a homotopy since it is continuously\
    \ changing the circuit from one to another. We can illustrate this with a really\
    \ simple example using one of our CMOS transistor models we just developed, model1.\
    \ Let us use it to investigate the inverter circuit in Fig. 5.13.\n\nThe netlist\
    \ we will use is as follows:\n\n```\n*\nM1 Vo Vi vss nch\nM2 Vo Vi vdd pch\nVdd\
    \ vdd vss 0.9\nVss vss 0 0\nVin Vi 0 0.2\nnetlist 5.6\n```\n\nWhen one attempts\
    \ to run this netlist, the result is a singularity error. To investigate further,\
    \ let us write the matrix equation (skipping the trivial supply and ground current\
