    As we already mentioned earlier, a VCO, and an LC-VCO in particular, is a great
    test circuit for simulator performance. The fact there are resonances caused by
    various impedances cancelling each other can make it difficult to accurately predict
    the oscillation amplitude, for example. Using the wrong method of integration
    is another well-known source of error (see Sect. 4.6.7). Simulating oscillators
    with a steady-state method also carries with it the risk of finding the DC solution
    instead of the oscillating one, something we will see shortly.


