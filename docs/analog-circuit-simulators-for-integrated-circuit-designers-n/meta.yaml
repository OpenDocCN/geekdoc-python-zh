- img_proc: true
  md: '# Chapter 6

    Epilogue: Simulators in Practice


    **Abstract** This book has so far looked at the basic principles behind circuit
    simulators. With the help of the provided codes, the reader has hopefully gained
    a better understanding of what simulators do well and what they perhaps do less
    well. Armed with this knowledge, this chapter will discuss best practices when
    using simulators and working on design projects. It is by necessity a subjective
    viewpoint, but the hope is the reader will learn something helpful along the way.
    Different developers will have different experiences and as such slightly different
    approaches to design work. All in all, we will stay away from controversial and
    very subjective approaches and stay true to what a designer is most likely to
    encounter in the industry.


    Fundamentally, the task for an industry professional is to build circuitry with
    a reasonable yield, so it is economically feasible to produce them. This important
    aspect will be the undertone of the chapter. The work for an industry professional
    is thus somewhat different than for an academic professional. In academia, inventing
    new ways to use devices or break new grounds in unexplored adaptations of a technology
    is paramount. The industry professional is also very keen on inventing new uses
    of devices but with the goal of making an end product that can be mass produced.
    These slightly different approaches will make the work a little bit different
    in the two settings, and this chapter will showcase more of the industry professional’s
    approach.


    We will first discuss good practices when encountering a new process technology
    in Sect. 6.1. It can be a new “fresh off the press” high-end technology just released
    from a foundry, or it might simply be new to the user. The worst thing to do is
    to just start simulating along without any idea of how the foundry modeling team
    has built their models. The model switches might not be tuned properly to a particular
    application, and if one does not find this out first thing, one could be in for
    a surprise in the laboratory evaluating the circuit. Section 6.2 discusses small
    block simulation strategies, and we wrap up the chapter with a presentation of
    a typical simulation flow when designing large blocks.'
  merge: -1
  pgno: 320
- img_proc: true
  md: '# 6.1 Model Verification Strategies with a New Process Technology


    Let us imagine we are starting a design project with a new process technology.
    It can be new to the user, or it might be an actual brand new process that comes
    online. In today''s environment, new processes come online at a fairly fast pace,
    and if one is working on projects where the latest technologies are of interest,
    this is a common experience to run into. The economics of semiconductor industry
    dictates that cost both in terms of power and money is pushed lower and lower,
    and since both are tied to the transistor size, there is a big incentive to reduce
    the scale of the transistors. The first thing to do is to look at the device models,
    and we discuss that next.


    Often when one encounters a new technology, one is given a set of model files,
    and depending on the maturity of the process, these model files will reflect the
    devices more or less well. A mature process such as the classic TSMC 180 nm has
    been in active design for decades and can be trusted much more than the latest
    ultra-small geometry CMOS process that just came online. However, even for TSMC
    180 nm, a good understanding of what models do well and not so well is important.
    For new processes, the difficulty for the designer is to be able to gauge the
    quality of the models. A modern foundry has professional staff that characterizes
    the active devices with great care, but if the process is new, all kinds of time
    pressures can cause the models to be off, not least because the process might
    be in flux! It is up to the designer to judge the maturity of the model files,
    and if oddities are found, a heads up to the foundry is often much appreciated.


    What kind of characterization should one do? The answer tends to be application
    specific in the details, but we will provide a general set of simulations that
    are most of the time very useful to have on hand when proceed with design tasks:


    +   - Simulate the transistors using $I_d$ vs $V_{gs}$, $V_{ds}$ for a CMOS process
    ($I_c$ vs $V_{bes}$, $V_{ce}$ for a bipolar one). Vary channel length and width.

    - Use these plots to extract the threshold voltage, $V_{th}$.

    - Simulate the transition frequency $f_t$ vs channel length and width.

    - Simulate the gate-source, gate-drain capacitance vs length and width.


    In this section, we will discuss the details behind these three sets of simulations
    and what one should take away from them in Sects. 6.1.1, 6.1.2, and 6.1.3. There
    are of course other sets of simulations that could be useful, like noise and 1/f-corner,
    and these three sets are just a good starting point and are not intended to be
    exhaustive to any degree.


    We will discuss briefly what these properties might mean in this chapter. For
    example, it can be quite frustrating to extract a transistor and found huge discrepancies
    compared to schematic simulations. The contact and drain/source resistance of
    ultra-small channel length transistors can be very detrimental to performance,
    and if one has to do an extraction to find out how bad it is, it is good to know
    this early on so one can find ways to expedite the design time.'
  merge: -1
  pgno: 321
- img_proc: true
  md: 'In this section, we will present some model verification strategies that have
    proven helpful over many years of design work. The benefit is if discrepancies
    are found, one can take preventive measures and so improve the likelihood of first-time
    success with a particular design. We first discuss the basic characterizations,
    and then we follow with other spot checks like drain/source resistance modeling,
    $g_m$ versus channel length, NQS switch $g_{m,max}$ method to extract $V_t$, and
    varactor''s capacitance vs voltage (some models only characterize the capacitance
    at some average voltage and can thus be off). We do not intend this list to be
    exhaustive but rather reflect what the author encountered over the years of active
    design work and has found to be useful hints at the workings of the process devices.


    # 6.1.1 DC Response Curves


    The first thing to do when a new process is to be evaluated is to simulate the
    basic drain current versus gate-source voltage and drain-source voltage. The result
    will look something like Figs. 6.1 and 6.2.

    Note in particular what happens at high $V_{ds}$ levels. There are effects like
    DIBL and ISCE that will increase the drain current significantly at higher drain
    voltages, and it is a good idea to verify the result is reasonable. Of course,
    also look at the first derivatives of these functions to make sure they are continuous
    (Figs.6.3 and 6.4) and their first derivatives (Fig. 6.5)


    ![](img/75093da0d280ad52326a78925e5cc403_322_0.png)


    Fig. 6.1 $I_d$ vs $V_{ds}$, $V_{gs}$. The cross marks a possible biasing point
    where the gate overdrive voltage is about 150 mV and the drain current is 1 mA
    for a $V_{ds}$ = 500 mV'
  merge: -1
  pgno: 322
- img_proc: true
  md: '![](img/75093da0d280ad52326a78925e5cc403_323_0.png)


    Fig. 6.2 $I_d$ vs $V_{gs}$


    ![](img/75093da0d280ad52326a78925e5cc403_323_1.png)


    Fig. 6.3 $g_m$ vs $V_{gs}$


    At times going even further can be useful also. We will stick to these plots here,
    and if in need of further data, we will simply mention that in the text.


    +   - Do the response curves look physical?

    - How does the model scale with channel length? Device width?

    - How are parasitic resistors handled? Really important for ultra-short channel
    length processes.'
