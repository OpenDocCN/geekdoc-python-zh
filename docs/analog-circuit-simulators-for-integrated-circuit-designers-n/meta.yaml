    This is in a nutshell how a simulator works. This particular code segment handles
    AC analysis and is perhaps the easiest implementation to understand since it is
    linear by definition, and the operating point is not important for the building
    of the matrix itself. We will in the following sections expand on this experience
    and show how a linear transient simulator can be set up and go from there to the
    more complex cases of nonlinear elements in the next chapter. The reader will
    hopefully appreciate how simple this code implementation is. No doubt the reader
    suspects a real implementation is a bit more complex, and sure enough it is. For
    example, the issue of convergence has not entered since everything is linear and
    no difficult derivative operators appear. We will discuss how to deal with such
    situations later on in this chapter and also in Chap. 5.


    The heart of this type of solvers is the matrix inverter, and here we are using
    the built-in matrix inverter in Python. This is a general matrix inverter designed
    to handle most practical situations. A circuit matrix inverter is much more specialized
    and as such much faster. Also, more efficient ways to fill the matrix are needed
    to make a “real” simulator, and the example we have here is just to showcase the
    overall structure of such simulators. There is a lot of ongoing effort to make
    these numerical systems more efficient, and the interested reader should consult
    the references [12–17], for example, for more of the details. We will now move
    forward discussing linear transient simulations. The nonlinear discussion will
    follow in Chap. 5, where we also will discuss steady-state implementations.'
