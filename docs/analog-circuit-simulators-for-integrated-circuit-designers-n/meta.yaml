    我们像以前一样有控制方程 [6]


    $$f(\boldsymbol{v}(t)) = i(\boldsymbol{v}(t)) + \dot{q}(\boldsymbol{v}(t)) + \boldsymbol{u}
    = 0 \qquad (7.47)$$


    让我们列出所有元件的完整项。对于电阻器


    $$i(v) = \frac{1}{R}v$$


    对于电感器


    $$i(v) = \int \frac{1}{L} v(t) dt$$


    电容器自然出现在方程 7.47 的第二项中


    $$q(v) = Cv$$


    或


    $$i(v) = \dot{q}(v) = C \frac{dv}{dt}$$


    晶体管最终是众所周知的线性情况


    $$i(v) = g_m v$$


    我们用 $v(t)$ 表示特定时间 $t$ 的电路电压状态，类似于 [5]。我们正在寻找具有以下性质的解：


    $$v(t) = v(t+T)$$


    让我们定义一个函数，它是这两个时间点状态之间的差异：


    $$h_i(v_i(t), v_i(t+T)) = v_i(t) - v_i(t+T)$$


    我们知道当我们找到正确的解时，这个函数应该为零。对于中间迭代，我们可以对 $h$ 进行泰勒展开：


    $$h_{i+1} = h_i + \frac{\partial h_i}{\partial v_i} \Delta v_i = v_i(t) - v_i(t+T)
    + \frac{\partial (v_i(t) - v_i(t+T))}{\partial v_i} \Delta v_i(t)$$

    $$\approx v_i(t) - v_i(t+T) + \left( I - \frac{\Delta v_i(t+T)}{\Delta v_i(t)}
    \right) \Delta v_i(t) = v_i(t) - v_i(t+T) + (I - J_{\phi, ij}(T)) \Delta v_i(t)
    = 0$$


    这里雅可比矩阵 $J_{\phi, ij}(T)$ 表示最终状态对初始状态变化的敏感性。该方程现在可以重新排列以得到


    $$\Delta v_i(t) = (I - J_{\phi, ij}(T))^{-1} (-v_i(t) + v_i(t+T))$$


    遵循牛顿-拉夫逊的思想，我们看到初始状态的变化可以从上一次迭代的雅可比矩阵计算出来。我们可以使用链式法则将雅可比矩阵写为


    $$J_{\phi, ij}(T) = \frac{\partial v_N}{\partial v_{N-1}} \frac{\partial v_{N-1}}{\partial
    v_{N-2}} \dots \frac{\partial v_1}{\partial v_0} \frac{\partial v_0}{\partial
    v_0}$$'
