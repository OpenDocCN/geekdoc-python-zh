    \                if DevNode2[i] != '0' :\n                    Jacobian[(NumberOfNodes+i)*TotalHarmonics+row][Nodes.index(DevNode2[i])*TotalHarmonics+row]=-1j*(omegak[row]+(numpy.sign(omegak[row])+(omegak[row]==0))*omega)*DevValue[i]\n\
