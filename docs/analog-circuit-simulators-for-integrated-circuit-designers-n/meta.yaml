    ### 3.1.3 MOSFET 电容建模细节


    历史上，FET 电容模型的发展始于 1970 年代初，当时提出了 Meyer 模型。该模型包括栅极 (G)、源极 (S)、漏极 (D) 和体极 (B) 端子之间的三个非线性电容。


    在 1970 年代末，人们意识到该模型存在问题。它在所有情况下都不能保持电荷守恒。相反，[13] 提出的改进模型解决了这个问题。这里，模型中添加了更多的电容，并且假设电容是非互易的，换句话说
    $C_{ij} \neq C_{ji}$。这导致总共有 12 个电容，其中 9 个是独立的。为了理解为什么电容不一定是互易的，我们可以使用一个简单的论证。让我们想象一个处于饱和区的
    MOS 晶体管。我们忽略所有侧壁电容，只关注沟道的电容。现在，在饱和区，漏极的一个小测试电压不会影响栅极端子的电荷。然而，情况并非相反：栅极的测试电压肯定会通过晶体管作用影响漏极的电荷。然后我们可以说
    $C_{gd} \neq C_{dg}$，晶体管电容的这种非互易性是解决电荷守恒问题的关键。


    根据基础物理学，我们知道电荷 $Q$ 随时间的变化率等于电流。对于 FET，我们找到这四个电流


    $i_g = \frac{dQ_g}{dt} \quad i_b = \frac{dQ_b}{dt} \quad i_d = \frac{dQ_d}{dt}
