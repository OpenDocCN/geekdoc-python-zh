    \ Chapter 5\n## Circuit Simulation: Nonlinear Case\n\n**Abstract** After the chapter\
    \ on linear simulators, we will venture into the nonlinear aspects of circuit\
    \ simulators by first looking at nonlinear DC operating point simulations. This\
    \ was historically perhaps the most difficult problem to solve since one usually\
    \ does not have an actual starting point unlike a transient solution where one\
    \ often starts from the DC point and look at small changes with the new timestep.\
    \ After the DC discussion, we will do full nonlinear transient simulations with\
    \ active devices. The chapter ends with exploring other developments in circuit\
    \ simulation such as periodic steady-state simulators. They have been extraordinarily\
    \ helpful with circuit development, and we will examine several implementations\
    \ using working code examples.\n\n## 5.1 Introduction\n\nAs we already mentioned\
    \ in Chap. 2 in the discussion on nonlinear solvers, they invariably involve an\
    \ iterative step most commonly implemented as a version of the Newton-Raphson\
    \ method. In this chapter, we will discuss this in more detail with respect to\
    \ circuit simulators [1–21]. Perhaps most notably, the first difficulty one runs\
    \ into is a DC convergence; it is one of the most challenging problems in circuit\
    \ simulations with nonlinear elements, and we will discuss this in the first section.\
    \ The next section will cover how nonlinear issues are tackled in a transient\
    \ simulation. We will follow this by a detailed section on periodic steady-state-solvers\
    \ (PSS) where we discuss the most popular implementations, harmonic balance, and\
    \ shooting methods. Once a PSS solution has been found, we can use perturbation\
    \ techniques to find solutions to periodic AC (PAC) and periodic noise (PNOISE)\
    \ problems, and these are discussed in the subsequent sections. We end this chapter\
    \ discussing a handful of common circuit example simulations where the steady-state\
    \ approach is helpful.\n\nIt should be noted the material in this chapter is very\
    \ dense. Many complex issues are merely hinted at through brief and very simple\
    \ examples. Things like convergence issues are extraordinarily difficult to address\
    \ thoroughly in such small space as this chapter. The reader is therefore highly\
    \ encouraged to explore outside the examples provided. It is not difficult to\
    \ construct circuitry that has serious convergence difficulties, and the reader\
    \ should consider what one can do about them and"
