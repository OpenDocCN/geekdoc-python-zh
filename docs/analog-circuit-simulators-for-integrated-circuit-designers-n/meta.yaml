    vss vss 0 0\nvinp in1 0 sin(0 0.3 1e9 0 0)\nvinn in2 0 sin(0 0.3 1e9 5e-10 0)\n\
    r1 vdd inp 100\nr2 inp vss 100\nr3 vdd inn 100\nr4 inn vss 100\nr5 vdd outp 100\n\
    r6 vdd outn 100\nc1 in1 inp 1e-12\nc2 in2 inn 1e-12\ni1 vs vss sin(1e-3 100e-6\
    \ 1.001e9 0 0)\nm1 outn inp vs nch\nm2 outp inn vs nch\ni2 vs2 vss sin(1e-3 100e-6\
    \ 1.001e9 4.995e-10 0)\nm3 outp inp vs2 nch\nm4 outn inn vs2 nch\n.options MaxSimTime=2e-6\
    \ reltol=1e-3 FixedTimeStep=True\ndeltaT=2e-11 iabstol=1e-6 vabstol=1e-6 MaxNewtonIter=15\n\
    ThreeLevelStep=True\n```\n\n![](img/75093da0d280ad52326a78925e5cc403_209_0.png)\n\
    \n图 5.20 吉尔伯特单元混频器电路\n\n![](img/75093da0d280ad52326a78925e5cc403_209_1.png)\n\n\
    图 5.21 该图显示了输出差分电压的频谱：(a) 直到 2.5GHz 的全频谱，以及 (b) 围绕 1 MHz 下变频信号的放大图\n\n```\nspice\n\
    .plot v(outp) v(outn)\nnetlist 5.10\n```\n\n我们可以对此进行仿真并查看生成的基带信号。我们选择的输入射频信号是\
    \ 1GHz + 1 MHz。本振频率为 1GHz。因此我们可以预期在 1 MHz 处出现基带信号。这意味着仿真时间必须大于 1μs。这相当漫长。在本章后面的第\
    \ 5.5.4 节，我们将探讨一种类似的情况，但使用一种好得多的仿真算法（PAC），届时我们将展示其在获得结果方面的速度提升。仿真结果见图 5.21。\n\n\
    ## 5.4.2 可调时间步长\n\n我们在第 5.4.1 节中看到，使用固定时间步长会相当麻烦，因为在某个时间点可能无法满足精度要求，可能需要重新进行仿真。这里我们将演示时间步长调整的威力。在本节末尾我们将讨论精度方面的一些损失，但相对于仿真时间的加速是显著的。\n\
    \n### 5.4.2.1 时间步长调整\n\n可变时间步长的改变相对容易实现，但问题更多在于选择哪种算法。很明显，如果牛顿迭代在某个合理的迭代次数内（通常为五次）没有收敛，我们就需要采用更小的时间步长。这个步长应该多小，以及之后时间步长如何变化，是本节将要讨论的问题。人们可能认为，如果未满足收敛标准，尝试将时间步长除以\
    \ 2；如果满足，则将时间步长加倍，是个好主意。让我们用一个振荡器来实验一下。这种电路是一个很好的测试平台，因为如果时间步长算法错误，它就会停止振荡（在理想化的无噪声世界中，振荡器可以有一个直流解）。让我们研究第\
    \ 5.4.1.2 节中的振荡器。我们可以尝试实现将时间步长增加和除以二的想法，看看会发生什么（见图 5.22）。\n\n```python\nif NewtonConverged:\n\
    \    .\n    .\n    .\n    if not FixedTimeStep:\n        deltaT=2*deltaT\n   \
    \ .\n    .\n    .\nelse:\n    .\n    .\n    .\n    SimTime=SimTime-deltaT\n  \
    \  deltaT=deltaT/2\n```\n\n我们在图 5.22 中看到结果。\n\n![](img/75093da0d280ad52326a78925e5cc403_211_0.png)\n\
    \n这里发生了什么？问题是时间步长很快变得太大，仿真器“错过”了振荡，反而找到了直流解。我们可以尝试用 MaxTimeStep 构造来补救这种情况。\n\n\
    ```python\nif NewtonConverged:\n    .\n    .\n    .\n    if not FixedTimeStep:\n\
    \        deltaT=min(MaxTimeStep,2*deltaT)\n    .\n    .\n    .\nelse:\n    .\n\
    \    .\n    .\n    SimTime=SimTime-deltaT\n    deltaT=deltaT/2\n```\n\n结果如图 5.23\
    \ 所示。\n\n![](img/75093da0d280ad52326a78925e5cc403_212_0.png)\n\n**图 5.23** 采用最大时间步长实现的仿真器响应\n\
    \n现在求解器运行得好多了。或者，我们可以使时间步长的增加和减少量不相等，如下面的代码片段所示：\n\n```python\nif NewtonConverged:\n\
    \    .\n    .\n    .\n    if not FixedTimeStep:\n        deltaT=1.01*deltaT\n\
    \    .\n    .\n    .\nelse:\n    .\n    .\n    .\n    SimTime=SimTime-deltaT\n\
    \    deltaT=deltaT/1.1\n```\n\n结果如图 5.24 所示。\n\n![](img/75093da0d280ad52326a78925e5cc403_213_0.png)\n\
    \n**图 5.24** 时间步长非对称增减的仿真器响应\n\n这似乎也足够有效。让我们也看看通过改变 reltol 来实现的增/减算法。我们在表 5.11\
    \ 中找到结果。\n\n**表 5.11** 两级时间步长调整算法随 reltol 的变化\n\n| reltol | 振幅 |\n|---|---|\n\
    | 1e-1 | 0.47 |\n| 1e-2 | 0.47 |\n| 1e-3 | 0.47 |\n| 1e-4 | 0.47 |\n\n仿真器总会改变时间步长，这导致数值噪声增加，即使在高\
    \ reltol 下也会使振荡开始。\n\n这种特定实现的根本困难在于它每次更新时都会改变时间步长。这将增加累积误差。让我们改为通过添加第三个中间级别来调整它。我们所做的只是跟踪电压差与误差限值的最大比值，如\n\
    \n$$v_{\\max} = \\frac{|v_k - v_{pred}|}{reltol \\cdot v_{k,\\max} + vabstol}$$\n\
    \n对于所有电压节点。如果这个最大值 >0.9，我们减少一个百分比；如果 <0.1，我们增加另一个百分比；如果介于这些限制之间，我们保持时间步长不变。这将在仿真的大部分时间内保持时间步长相同，并应提高精度。让我们按照以下代码片段实现这一点：\n\
    \n表 5.12 三级时间步长调整算法随 reltol 的变化\n\n| reltol | 振幅 |\n|---|---|\n| 1e-1 | 0 |\n\
    | 1e-2 | 0 |\n| 1e-3 | 0.47 |\n| 1e-4 | 0.47 |\n\n注意，对于高 reltol，中间时间步长如此之长，以至于仿真器错过了振荡！在这些情况下产生的数值噪声较少，仿真器找到了直流解。\n\
    \n表 5.13 两种时间步长调整版本的精度\n\n| 属性 | 固定时间步长 | MaxTime, % 差异 | 小幅增加, % 误差 |\n|---|---|---|---|\n\
    | 频率 | 5.032e9 | 0.1 | 0.1 |\n| 振幅 | 0.47 | 2 | 1 |\n\n让我们像刚才对两级算法所做的那样，对不同的 reltol\
    \ 运行振荡器。我们在表 5.12 中找到结果。\n\n我们可以使用这些方法，并与固定时间步长解进行比较，并以固定时间步长作为绝对参考来测量频率和振幅。然后我们在表\
    \ 5.13 中找到结果。\n\n### 5.4.2.2 总结\n\n时间步长控制是商业仿真器严格保密的秘诀，因为它直接影响仿真器性能。在本节中，我们展示了几种可以采用的策略，并展示了每种策略与更精确的固定时间步长仿真相比可能存在的优缺点。\n\
    \n强烈鼓励读者自行进一步探索。关于时间步长调整的文献非常丰富，读者可以，例如，参考文献 [4, 15–17, 24] 来了解人们尝试过的方法。\n\n我们使用可变时间步长这一事实，在使用\
    \ Gear2 实现时可能会引起问题。如果我们回顾前面的章节和第 1 章，Gear 方法依赖于两个时间步长之前的信息。如果这两个时间步长不同，我们就无法得到正确的值，然后需要进行插值（外推）以获得适当的数值。除非加以补救，否则这通常会导致收敛问题。你能找到一个好方法来规避这个潜在问题吗？"
