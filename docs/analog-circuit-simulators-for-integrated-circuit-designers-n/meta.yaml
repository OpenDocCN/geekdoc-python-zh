    This was a trivial example of how the gmin method operates. It attempts to find
    a stable solution by simply adding resistors to various nodes.


    # Pseudo-transient


    The pseudo-transient method, ptran for short, is perhaps the method that works
    best in practice. Here all the dynamic elements, inductors, and capacitors are
    not disabled but actually used. The basic idea of the method is to use *time*
    as the continuation variable, and if one can think of the circuit as being simulated
    “forever” clearly, a DC value can be reached in principle, keeping all independent
    sources at their DC value. The method works by adding inductors in series with
    all voltage sources and some dependent sources and capacitors across all independent
    current sources and some dependent current sources. Naturally the STA system is
    now increasing with the additional nodes and currents this will provide. Furthermore
    as an initial condition on the circuit, all new nodes created by the insertion
    of a series inductor are set to the value of the voltage source. All other nodes
    are set to 0 V initially, so many capacitors have 0 V across them. Lastly all
    currents are set to 0 A initially. With this initial condition, a regular transient
    simulation is run. In practice this method works really well. Clearly, the transition
    from the initial state to the final state is of no interest in this analysis.
    Therefore, one can ignore the truncation error as long as the circuit converges
    to the correct final value. This means the step size in pseudo-time can be much
    larger than for regular transient, and one needs only to make sure the Newton-Raphson
    algorithm converges.


    One of the issues with such a method is all these dynamic elements in terms of
    inductors and capacitors can cause resonances and oscillations can occur.


    We will look at an example of this kind of algorithm in the transient section
    of this chapter.


    # dptran


    The damped pseudo-transient method is a variety of the ptran method that improves
    the convergence by reducing the likelihood of an oscillation.'
