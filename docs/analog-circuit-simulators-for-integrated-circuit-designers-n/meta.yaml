    振荡器可以建模为


    $i_{osc} = B \sin 2\pi f t$ (4.36)


    输出电流是两者的乘积：


    $i_{out} = i_{osc} i_n = \frac{AB}{2} (\cos 2\pi (f - f_n)t - \cos 2\pi (f + f_n)t)$
    (4.37)


    噪声电流在振荡器频率周围产生了两个边带。现在想象噪声源有一个 1/f 噪声分量。这个直流噪声将出现在振荡器信号周围（由于振荡器谐振回路的响应，它通常看起来像
    1/f^3）。这种现象称为相位噪声，传统的噪声分析无法捕捉到它。相反，需要周期性噪声分析，我们将在第 5.5.4 节讨论。


    即使是像放大器这样更简单的系统，噪声分析背后的假设也不正确。想象一个由于非线性而产生谐波的系统。类似的计算将表明，振荡器中发生的那种混频现象在放大器中同样会发生。


    ### 4.4.2 稳定性分析


    稳定性分析通常应用于需要回答相位裕度和增益裕度等问题的电路环路。稳定性理论在其他地方有深入讨论，这里我们只提供一个简短的总结，以提醒读者。


    **稳定性理论简要回顾**


    基本上，如果满足巴克豪森准则，环路将会振荡：


    > **巴克豪森准则** 如果环路的增益大于一且相移为 360 度，系统将会振荡。


    这个准则当然很有帮助，但它没有说明裕度或系统可能接近振荡的程度。从某种意义上说，需要“远离”振荡点，而这需要量化。最通用的稳定性理论是例如在 [18–20]
    中讨论的，通常称为奈奎斯特稳定性判据。在大多数情况下，该理论可以简化为增益裕度和相位裕度的概念。讨论的关键是需要将系统环路断开，并在开环上进行分析，其中开环增益和相移被模拟（通常在交流仿真中）并绘制为频率的函数。


    从数学上讲，相位裕度的概念可以用复数传递函数来研究（参见 [20, 23]）。


    **稳定性仿真的数值算法**


    我们尝试用现在可用的复杂模型构建的任何现代电路都有大量的极点和零点，试图进行完整的数学分析是不可能的，因此需要稳定性分析工具。加州理工学院的 Middlebrook
    教授在 1975 年发表了一篇著名的论文 [21]，其中他描述了一种模拟稳定性的通用算法。它涉及对电路进行偏置、断开环路并执行两次交流仿真。在大多数情况下它效果非常好，我们将在下面首先讨论它。一个更通用的、现在更常用的方法可以在
    [22] 中找到。我们将通过首先讨论 Middlebrook 的分析然后将其推广来简要回顾该理论。


    ![](img/75093da0d280ad52326a78925e5cc403_103_0.png)


    **图 4.17** 建模为单端口系统的环路


    ### Middlebrook 稳定性分析


    对于环路稳定性，让我们首先按照 [21] 中的描述进行讨论。这是关于线性环路增益的最早的理论讨论之一，并且多年来一直作为稳定性仿真的基础。基本思想是使用注入法，以便能够在任何点断开环路。


    让我们看图 4.17。环路被断开，一端有一个具有特定导纳的驱动源，另一端有一个负载导纳。我们按照 [22] 中的符号，根据基尔霍夫电流定律得到：


    $$g_1 v_e + v_f (Y_e + Y_f) = 0$$


    或者，定义环路增益


    $$T = -\frac{v_f}{v_e} = \frac{g_1}{(Y_e + Y_f)}$$


    现在执行电压和电流注入，以使前向电流为零。然后我们得到


    $$g_1 v_e + v_f Y_f = 0$$


    零电流比为


    $$T_n^i = -\frac{v_f}{v_e} = \frac{g_1}{Y_f}$$


    在下一次仿真中，我们提供电压和电流注入，使得前向电压降为零：


    $$-i_f Y_e = g_1 i_e$$


    或


    $$-\frac{i_f}{i_e} = \frac{g_1}{Y_e}$$


    我们得到所谓的零电压增益：


    $$T_n^v = -\frac{i_f}{i_e} = \frac{g_1}{Y_e}$$


    由此我们现在得到


    $$T = \frac{T_n^v T_n^i}{T_n^v + T_n^i}$$


    这项技术已被广泛使用，Middlebrook 这个名字有时被用作动词“Middlebrook the loop”（对环路进行 Middlebrook 分析）。


    ### 广义 Middlebrook 稳定性分析


    上一节中的 Middlebrook 分析在信号流方向方面存在缺点。只有一个电流源，并且假设信号只沿一个方向流动。这种近似对于低频应用通常足够。然而，对于较高频率，可能存在反向环路流
    [22]。然后我们可以将这个概念推广到图 4.18 中的模型。这里，使用与 [22] 相同的符号，我们发现环路增益由下式给出


    $$T = \frac{g_1 + g_2}{Y_e + Y_f}$$


    现在想象我们在环路断点处同时注入电流和电压。由此产生的参数 $v_f$、$i_e$ 可以使用网络 ABCD 方法推导：


    $$\begin{pmatrix} i_f \\ v_e \end{pmatrix} = \begin{pmatrix} A & B \\ C & D \end{pmatrix}
    \begin{pmatrix} i_{inj} \\ v_{inj} \end{pmatrix}$$


    其中显然


    $$B = i_f \big|_{i_{inj}=0, v_{inj}=1} \quad D = v_e \big|_{i_{inj}=0, v_{inj}=1}$$


    $$A = i_f \big|_{i_{inj}=1, v_{inj}=0} \quad C = v_e \big|_{i_{inj}=1, v_{inj}=0}$$


    我们现在只需要将 ABCD 参数与 $g_1$、$g_2$、$Y_e$、$Y_f$ 联系起来，就可以计算环路增益。我们从环路方程得到


    $$-Y_e v_e + i_{inj} + i_f - g_2 (v_e - v_{inj}) = 0$$


    $$g_1 v_e + i_f + Y_f (v_e - v_{inj}) = 0$$


    ![](img/75093da0d280ad52326a78925e5cc403_105_0.png)


    我们现在可以从这两个关系中识别出 ABCD 变量，我们得到


    $$A = \frac{-g_1 - Y_f}{g_1 + g_2 + Y_f + Y_e}$$


    $$B = \frac{-g_1 g_2 + Y_f Y_e}{g_1 + g_2 + Y_f + Y_e}$$


    $$C = \frac{1}{g_1 + g_2 + Y_f + Y_e}$$


    $$D = \frac{g_2 + Y_f}{g_1 + g_2 + Y_f + Y_e}$$


    然后我们得到


    $$g_1 = \frac{AD - BC - A}{C}$$


    $$g_2 = \frac{AD - BC + D}{C}$$


    $$Y_f = \frac{BC - AD}{C}$$


    $$Y_e = \frac{1 - AD + BC + A - D}{C}$$


    对于环路增益，


    $$T = \frac{2(AD - BC) - A + D}{2(BC - AD) + A - D + 1}$$


    我们可以通过设置 $g_2 = 0$ 来恢复原始的 Middlebrook 结果。然后我们得到


    $$T_{forward} = \frac{AD - BC - A}{2(BC - AD) + A - D + 1}$$


    现在的步骤是：


    - 对电路进行直流偏置。

    - 在某处断开环路。

    - 插入一个串联电压源。

    - 运行交流仿真。

    - 记录 $v_f$、$i_e$。

    - 插入一个并联电流源。

    - 运行交流仿真。

    - 记录 $v_f$、$i_e$。

    - 计算开环增益。


    为了更好地理解这是如何工作的，让我们使用图 4.19 中的简单示例，我们可以手动进行此计算，然后与 Python 实现进行比较。注入电流的方向如图所示，电压也类似。为简单起见，我们还假设输出电容为零，这样计算会更顺畅一些。晶体管增益对的输入阻抗是无穷大，因此没有电流从那个方向流入。我们得到


    $$B = i_f|_{v=1, i=0} = 0$$


    现在对于电压响应 $D = v_e|_{v=1, i=0}$，我们需要计算它。我们发现在晶体管栅极的输入处，$v_e = v_f + v$，并且由于跟随器由理想电流源偏置，我们得到以下环路方程：


    $$\frac{(v_f + v)g_m}{2} Z_L = v_f \rightarrow v_f \left(1 - \frac{g_m Z_L}{2}\right)
    = v \frac{g_m Z_L}{2}$$


    然后我们看到


    $$D = v_e = v_f + v = v \left( \frac{g_m Z_L}{2 - g_m Z_L} + 1 \right) = v \left(
    \frac{2}{2 - g_m Z_L} \right)$$


    其余参数现在为


    $$A = i_f|_{v=0, i=1} = -1$$


    $$C = v_e|_{v=0, i=1}$$


    实际上，由于 $B = 0$，$C$ 不起作用。我们得到


    $$T = \frac{2(AD - BC) - A + D}{2(BC - AD) + A - D + 1} = \frac{-D + 1}{D} = \frac{-\left(
    \frac{2}{2 - g_m Z_L} \right) + 1}{\left( \frac{2}{2 - g_m Z_L} \right)} = \frac{-2
    + 2 - g_m Z_L}{2} = -\frac{g_m Z_L}{2}$$'
