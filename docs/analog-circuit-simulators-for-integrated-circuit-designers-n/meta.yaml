    # 3.5 Summary


    We have in this chapter looked at basic device physics for key components of modern
    process technologies. Our premise is the designer needs to be aware of how the
    modeling is done in order to simulate the devices properly. After the basic physics
    review, we outlined how models are made and went through the historical development
    of BSIM from the UC Berkeley device group. Along the way, we highlighted various
    approximations and pointed out how nominal model files from modern foundries can
    sometimes have limitations, and we gave a few examples of things to watch out
    for. We also gave a brief overview of FinFET physics and showed how effects like
    DIBL are reduced, giving a much lower output conductance for transistors resulting
    in an overall higher basic gain, $g_m r_o$.


    Finally we provided a set of nominal simulation sweeps that are helpful before
    starting to use a new set of models.


