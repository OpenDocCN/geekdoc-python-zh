    # 7.2.1.1 Initial Value Problems


    An initial value problem (IVP) is one where the solution is known at some time,
    let us call it time $t = 0$, and the system is governed by a differential equation
    that drives it forward in time to some other final time $t_f$. Formally we have


    $$\frac{dx(t)}{dt} = f(x(t), t) \quad x(0) = x_0 \quad (7.35)$$


    where $x$ is an $m$-dimensional real vector and the vector $x_0$ is the known
    state at time $t = 0$.


    Not all IVPs have a solution obviously, and sometimes there can be several solutions.
    We call these existence and uniqueness properties of a particular equation. Before
    we go into these properties, we need to be more specific about what kind of solutions
    we are discussing and over what domain (region in space and time) they are defined.
    Let us first define the domain $\mathcal{D}$. We are interested in solutions defined
    on $\mathbb{R}^m \times \mathbb{R}$ such that


    $$\mathcal{D} = \{(x, t) | x \in \mathbb{R}^m \text{ and } 0 \le t \le t_f\} \quad
    (7.36)$$


    A problem like the one in Eq. 7.35 needs to be well behaved under small perturbations
    (remember things like numerical round-off errors) and not run haywire. Such systems
    are defined as well-posed.


    > **Definition 7.1**

    Let $(\delta(t), \delta_0)$ and $(\tilde{\delta}(t), \tilde{\delta}_0)$ be two
    perturbations to the equation $\dot{x}(t) = f(x, t), x(t_0) = x_0$, and let $\hat{x}(t)$
    and $\tilde{x}(t)$ be the resulting perturbed solutions. If there exist an $S
    > 0$ such that, for all $t \in [0, t_f]$, $\epsilon > 0$, we have

    $$||\hat{x}(t) - \tilde{x}(t)|| \le S\epsilon, \text{ whenever } ||\delta(t) -
    \tilde{\delta}(t)|| \le \epsilon \text{ and } ||\delta_0 - \tilde{\delta}_0||
    \le \epsilon$$

    then the equation is said to be totally stable, or well-posed.


    The idea is that if the solution does not differ too much with a small perturbation,
    the solution is stable. Now, think about a digital CMOS gate whose input changes
    slightly when it sits around the trigger point. Is such a system well-posed? Given
    that gain of the gate, the output will change drastically. However, it is still
    possible to find an $S > 0$ that matches the condition in the definition, so such
    a system is still technically well-posed. That does not mean it is a helpful thing
    when looking for a solution, and sure enough some analysis methods have a really
    hard time around trip points (see, e.g., the shooting method in Chap. 4).'
