    \ kHz）。为了求解此类系统的增益，需要进行大约10 μs的仿真，如果本振频率在GHz范围内，这确实非常痛苦。想象我们的周期性稳态系统，我们可以通过类似交流的计算，将增益从直流直接转换到本振基波；我们可以更高效地仿真这种增益。对于其他转换型系统，如振荡器中的相位噪声转换等，情况也是如此。我们将在本章最后一节讨论此类仿真的细节。\n\
