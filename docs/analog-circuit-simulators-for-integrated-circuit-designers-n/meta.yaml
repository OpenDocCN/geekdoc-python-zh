    in Sect. 5.6.6. This code will now be used for all our subsequent simulations
    using transient techniques.


    ### 5.4.1 Fixed Timestep


    Let us again look at the situation in Fig. 5.1, where there are no dynamic elements.
    To implement a nonlinear transient simulation, we will simply follow the recipe
    we outlined in the previous section and calculate the Jacobian at every timestep
    and do Newton Raphson iterations, and when the tolerance requirements are met,
    we will accept the timestep. This is called a uniform timestep simulation. The
    more complicated case of adjustable timesteps we will discuss in Sect. 5.4.2.


    It is clear that one way to handle nonlinear situations is to take small timesteps
    where the devices are approximately linear and then use Newton-Raphson to nail
    down the error.


