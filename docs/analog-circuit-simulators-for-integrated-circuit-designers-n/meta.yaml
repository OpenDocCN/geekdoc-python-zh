  md: '$$\begin{pmatrix} 0 & 1 & 1 \ 0 & 1 & 0 \ 0 & 0 & 1 \end{pmatrix} \begin{pmatrix}
    V_o \ i_p \ i_n \end{pmatrix} = \begin{pmatrix} 0 \ -K(V_{in} - V_{dd})^2 \ KV_{in}^2
    \end{pmatrix}$$


    The matrix is clearly singular in that its determinant is equal to zero. The root
    cause of this is the output $V_o$ does not appear in any equation and is unrestricted.
    Clearly removing it altogether from the system of equation means KCL will not
    be met at that node, so that is not an option. In addition, there is also the
    problem with the output currents from the PMOS, and CMOS transistors do not match
    in general, only when $V_{in} = V_{dd}/2$. These problems are both due to the
    fact the output conductance is zero with the very simplified transistor model
    we are using. Shortly we will discuss examples with transistor model2 from Chap.
    3, but let us stay with this one a little bit longer and illustrate the gmin stepping
    method. Let us add a resistor with value $R = 1/g_{min}$, between the output and
    $v_{ss}$ and see what happens (Fig. 5.14). Such a resistor will add another equation
    to our matrix which now becomes


    $$\begin{pmatrix} 0 & 1 & 1 & 1 \ 0 & 1 & 0 & 0 \ 0 & 0 & 1 & 0 \ -1/g_m & 0 &
    0 & 1 \end{pmatrix} \begin{pmatrix} V_o \ i_p \ i_n \ i_o \end{pmatrix} = \begin{pmatrix}
    0 \ -K(V_{in} - V_{dd})^2 \ KV_{in}^2 \ 0 \end{pmatrix}$$


    If nothing else now, the system of equation is solvable. Let us look at the output
