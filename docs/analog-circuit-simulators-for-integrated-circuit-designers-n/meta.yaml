    # 4.8 Summary


    We have looked at a linear simulator for the three basic cases of AC, DC, and
    transient simulations. The idea of circuit simulation is about the same age as
    the inventions of the computer. It has been a crucial development tool in the
    technology revolution, and a good understanding of such tools and what their weaknesses
    and strengths are is critical to the modern circuit designer. We have in this
    chapter discussed the basic ideas behind such simulators, and we have studied
    linear simulators from AC to transient simulations in quite some detail and shown
    the pros and cons of various integration methods. The belief is the more one is
    aware of what is going “under the hood,” the better equipped one is to handle
    a design project. Fundamentally the simulator is just a very simple test bench
    where the user can explore different effects directly. A word of caution, the
    reader must not fall into the temptation that the suggested code example is the
    beginning of a full-fledged simulator. Modern simulators are a whole different
    ball game where things like convergence aids are often proprietary and the result
    of many years of intense research.


