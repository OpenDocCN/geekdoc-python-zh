    \ are using. Shortly we will discuss examples with transistor model2 from Chap.\
    \ 3, but let us stay with this one a little bit longer and illustrate the gmin\
    \ stepping method. Let us add a resistor with value $R = 1/g_{min}$, between the\
    \ output and $v_{ss}$ and see what happens (Fig. 5.14). Such a resistor will add\
