    // These two rows are the KCL equations for Node1 and Node2\n\n## CCVS\n\nA CCVS\
    \ is exemplified in Fig. 4.7. It senses a current through some element, most often\
    \ a voltage source, and produces a voltage at the output terminals. In terms of\
    \ KCL, it looks just like the voltage sources we have already examined:\n\n$\\\
    cdots + i_E + \\cdots = 0$ &nbsp;&nbsp;&nbsp;&nbsp; KCL at node $a$\n\n$\\cdots\
    \ - i_E + \\cdots = 0$ &nbsp;&nbsp;&nbsp;&nbsp; KCL at node $b$\n\nThe branch\
    \ equation that relates current to voltage can be described as\n\n$v_a - v_b =\
    \ E i_s$\n\nWe see again this equation is not dependent on $i_E$, so the voltage\
    \ source can absorb any current.\nThese equations we can easily incorporate into\
    \ the matrix equations resulting in the following signature:\n\n![](img/75093da0d280ad52326a78925e5cc403_88_0.png)\n\
    \n$$\\begin{pmatrix} & v_a & v_b & & i_S & i_E \\ v_a & & & & +1 & \\ v_b & &\
    \ & & -1 & \\ i_S & & & & & \\ i_E & +1 & -1 & & -E & \\end{pmatrix}$$ (4.31)\n\
    \nIt has a similar structure to the dependent sources we presented earlier. A\
    \ code snippet for a CCVS could look like\n\n```\nif DeviceType = 'CCVS':\n  \
    \  Matrix[DeviceBranchIndex][DeviceNode1Index]=1\n    Matrix[DeviceBranchIndex][DeviceNode2Index]=-1\n\
    \    Matrix[DeviceBranchIndex][DeviceSenseIndex]=-DeviceValue\n// This is the\
    \ branch equation row, indicated by the variable DeviceBranchRow,\n// The columns\
    \ are set by the two Device Nodes and the Sense current, iS\n//\n    Matrix[DeviceNode1Index][DeviceBranchIndex]=1\n\
    \    Matrix[DeviceNode2Index][DeviceBranchIndex]=-1\n// These two rows are the\
    \ KCL equations\n//\n```\n\n## CCCS\n\nThe last dependent source is the CCCS.\
    \ It senses a current through some element and outputs a current between two output\
    \ nodes. We will follow the same steps we did for the other dependent sources\
    \ and come up with a simple expression to use. Let us look at the implementation\
    \ of a CCCS in Fig. 4.8. As before, we can write the branch equation as\n\n$$A\
    \ \\cdot i_s = i_A$$\n\nFig. 4.8 A simple linear network with a CCCS\n\n![](img/75093da0d280ad52326a78925e5cc403_89_0.png)\n\
    \nThe currents at the output nodes follow the now recognizable pattern:\n\n$\\\
    cdots + i_A + \\cdots = 0$ &nbsp;&nbsp;&nbsp;&nbsp; KCL at node $a$\n\n$\\cdots\
    \ - i_A + \\cdots = 0$ &nbsp;&nbsp;&nbsp;&nbsp; KCL at node $b$\n\nTo incorporate\
    \ this into our admittance description, we simply write the matrix signature as\n\
    \n$$\\begin{pmatrix} & v_a & v_b & i_S & i_A \\ v_a & & & +1 & \\ v_b & & & -1\
    \ & \\ i_S & & & & \\ i_A & & -A & 1 & \\end{pmatrix} \\quad (4.32)$$\n\nWe see\
    \ here that no voltage appears anywhere. The output impedance is infinite, and\
    \ the element just senses a current which is a 0 ohm input.\n\nA code snippet\
    \ for a CCCS could look like\n\n```\nif DeviceType = 'CCCS':\n    Matrix[DeviceBranchIndex][DeviceSenseIndex]=-DeviceValue\n\
    \    Matrix[DeviceBranchIndex][DeviceBranchIndex]=1\n// This is the branch equation\
    \ row, indicated by the variable DeviceBranchIndex,\n// The columns are set by\
    \ the two Device Nodes and the Sense current, iS\n//\n    Matrix[DeviceNode1Index][DeviceBranchIndex]=1\n\
    \    Matrix[DeviceNode2Index][DeviceBranchIndex]=-1\n// These two rows are the\
    \ KCL equations\n//\n```\n\n### 4.3.4 Summary\n\nThe passive and active elements\
    \ are incorporated into the basic admittance equation through really simple branch\
    \ element equations between various voltages and current in addition to the KCL\
    \ equations, where the current generated by the device is added and subtracted\
    \ according to the connectivity. Independent voltage and current sources also\
    \ have entries on the right-hand side of the matrix equation.\n\n## 4.4 Matrix\
    \ Building: AC Simulation\n\nLet us know look at how such a code to build an STA\
    \ matrix system can be put together. We will need a code that reads a netlist,\
    \ where we will use SPICE3 netlist format for simplicity. Let us first define\
    \ the environment for our codes. We use Python 3 for the code base. Python is\
    \ a readily available code base, and it is perhaps the most popular analysis framework\
    \ around both for its ease of use and available codes. We use it to demonstrate\
    \ the various algorithms we discuss. For basic code variable definitions and netlist\
    \ syntax, see Appendix A.\n\nIn the following code segment, we have a Python implementation\
    \ of such a code:\n\n```\nPython code\n#!/usr/bin/env python3\n# -*- coding: utf-8\
    \ -*-\n\"\"\"\nCreated on Thu Feb 28 22:33:04 2019\n\n@author: mikael\n\"\"\"\n\
    import numpy as np\nimport matplotlib.pyplot as plt\nimport analogdef as ana\n\
    #\n# Initialize Variables\n#\nMaxNumberOfDevices=100\nDevType=[0*i for i in range(MaxNumberOfDevices)]\n\
    DevLabel=[0*i for i in range(MaxNumberOfDevices)]\nDevNode1=[0*i for i in range(MaxNumberOfDevices)]\n\
    DevNode2=[0*i for i in range(MaxNumberOfDevices)]\nDevNode3=[0*i for i in range(MaxNumberOfDevices)]\n\
    DevModel=[0*i for i in range(MaxNumberOfDevices)]\nDevValue=[0*i for i in range(MaxNumberOfDevices)]\n\
    Nodes=[]\n#\n# Read modelfile\n#\nmodeldict=ana.readmodelfile('models.txt')\n\
    ICdict={}\nPlotdict={}\nPrintdict={}\nOptdict={}\n#\n# Read the netlist\n#\nDeviceCount=ana.readnetlist('netlist_4p1.txt',modeldict,ICdict,\n\
    Plotdict,Printdict,Optdict,DevType,DevValue,DevLabel,DevNode1,Dev\nNode2,DevNode3,DevModel,Nodes,MaxNumberOfDevices)\n\
    #\n# Create Matrix based on circuit size. We do not implement strict\nModified\
    \ Nodal Analysis. We keep instead all currents\n# but keep referring to the voltages\
    \ as absolute voltages. We\nbelieve this will make the operation clearer to the\
    \ user.\n#\nMatrixSize=DeviceCount+len(Nodes)\n#\n# The number of branch equations\
    \ are given by the number of\ndevices\n# The number of KCL equations are given\
    \ by the number of nodes\nin the netlist.\n# Hence the matrix size if set by the\
    \ sum of DeviceCount and\nlen(Nodes)\n#\nSTA_matrix=[[0 for i in range(MatrixSize)]\
    \ for j in\nrange(MatrixSize)]\nSTA_rhs=[0 for i in range(MatrixSize)]\n#\n# Loop\
    \ through all devices and create matrix/rhs entries accord-\ning to signature\n\
    #\nNumberOfNodes=len(Nodes)\nfor i in range(DeviceCount):\n    if DevType[i]=='capacitor'\
    \ or DevType[i]=='inductor':\n        DevValue[i]*=(0+1j)\n    STA_matrix[NumberOfNodes+i][NumberOfNodes+i]=-DevValue[i]\n\
    \    if DevNode1[i] != '0' :\n        STA_matrix[NumberOfNodes+i][Nodes.index(DevNode1[i])]=1\n\
    \        STA_matrix[Nodes.index(DevNode1[i])][NumberOfNodes+i]=1\n    if DevNode2[i]\
    \ != '0' :\n        STA_matrix[NumberOfNodes+i][Nodes.index(DevNode2[i])]=-1\n\
    \        STA_matrix[Nodes.index(DevNode2[i])][NumberOfNodes+i]=-1\n    if DevType[i]=='capacitor':\n\
    \        STA_matrix[NumberOfNodes+i][NumberOfNodes+i]=1\n        if DevNode1[i]\
    \ != '0' : STA_matrix[NumberOfNodes+i][Nodes.\nindex(DevNode1[i])]=-DevValue[i]\n\
    \        if DevNode2[i] != '0' : STA_matrix[NumberOfNodes+i][Nodes.\nindex(DevNode2[i])]=+DevValue[i]\n\
    \    if DevType[i]=='VoltSource':\n        STA_matrix[NumberOfNodes+i][NumberOfNodes+i]=0\n\
    \        STA_rhs[NumberOfNodes+i]=DevValue[i]\n#\n#Loop through frequency points\n\
    #\nval=[0 for i in range(100)]\nfor iter in range(100):\n    omega=iter*1e9*2*3.14159265\n\
    \    for i in range(DeviceCount):\n        if DevType[i]=='capacitor':\n     \
    \       if DevNode1[i] != '0' :\n                STA_matrix[NumberOfNodes+i][Nodes.index(DevNode1[i])]=DevValue[i]*omega\n\
    \            if DevNode2[i] != '0' :\n                STA_matrix[NumberOfNodes+i][Nodes.index(DevNode2[i])]=-DevValue[i]*omega\n\
    \        if DevType[i]=='inductor':\n            STA_matrix[NumberOfNodes+i][NumberOfNodes+i]=DevValue[i]*omega\n\
    \    STA_inv=np.linalg.inv(STA_matrix)\n    sol=np.matmul(STA_inv,STA_rhs)\n \
    \   val[iter]=abs(sol[2])\nplt.plot(val)\nEnd Python\n```\n\n### Code 4-1\n\n\
    ```\n*\nv1 in 0 1\nvs vs 0 0\nl1 in a 1e-9\nr1 a b 100\nc1 a b 1.2e-12\nr2 b vs\
    \ 230\nnetlist 4.1\n```\n\nThere are only two subcircuit calls in the code (readnetlist\
    \ and the matrix inverter numpy.linalg.inv), and the rest is made up of a matrix/rhs\
    \ build segment and a loop through the frequency points.\n\nVerify\nWe can now\
    \ verify the code works by comparing the simulation output to an ngspice simulation\
    \ of the same circuit (Fig. 4.9) using netlist 4.1. We find the agreement is such\
    \ the max error is less than 0.001%."
  mdcn: "## 4.3 矩阵方程\n\n如果 DeviceType = 'VCCS'：\n    Matrix[DeviceBranchIndex][DeviceNode3Index]=-DeviceValue\n\
    \    Matrix[DeviceBranchIndex][DeviceNode4Index]=DeviceValue\n    Matrix[DeviceBranchIndex][DeviceBranchIndex]=-1\n\
    // 这是支路方程行，由变量 DeviceBranchIndex 指示，\n//\n    Matrix[DeviceNode1Index][DeviceBranchIndex]=1\n\
    \    Matrix[DeviceNode1Index][DeviceBranchIndex]=-1\n// 这两行是节点1和节点2的KCL方程\n\n\
    ## CCVS\n\nCCVS（电流控制电压源）的示例如图4.7所示。它感应通过某个元件（通常是电压源）的电流，并在输出端产生一个电压。就KCL而言，它看起来与我们已经研究过的电压源完全一样：\n\
    \n$\\cdots + i_E + \\cdots = 0$ &nbsp;&nbsp;&nbsp;&nbsp; 节点 $a$ 处的KCL\n\n$\\cdots\
    \ - i_E + \\cdots = 0$ &nbsp;&nbsp;&nbsp;&nbsp; 节点 $b$ 处的KCL\n\n将电流与电压相关联的支路方程可以描述为\n\
    \n$v_a - v_b = E i_s$\n\n我们再次看到这个方程不依赖于 $i_E$，因此电压源可以吸收任何电流。\n这些方程我们可以轻松地纳入矩阵方程，得到以下特征：\n\
    \n![](img/75093da0d280ad52326a78925e5cc403_88_0.png)\n\n$$\\begin{pmatrix} & v_a\
    \ & v_b & & i_S & i_E \\ v_a & & & & +1 & \\ v_b & & & & -1 & \\ i_S & & & & &\
    \ \\ i_E & +1 & -1 & & -E & \\end{pmatrix}$$ (4.31)\n\n它与我们之前介绍的受控源具有相似的结构。CCVS的代码片段可能如下所示\n\
    \n```\nif DeviceType = 'CCVS':\n    Matrix[DeviceBranchIndex][DeviceNode1Index]=1\n\
    \    Matrix[DeviceBranchIndex][DeviceNode2Index]=-1\n    Matrix[DeviceBranchIndex][DeviceSenseIndex]=-DeviceValue\n\
    // 这是支路方程行，由变量 DeviceBranchRow 指示，\n// 列由两个器件节点和感应电流 iS 设置\n//\n    Matrix[DeviceNode1Index][DeviceBranchIndex]=1\n\
    \    Matrix[DeviceNode2Index][DeviceBranchIndex]=-1\n// 这两行是KCL方程\n//\n```\n\n\
    ## CCCS\n\n最后一种受控源是CCCS（电流控制电流源）。它感应通过某个元件的电流，并在两个输出节点之间输出一个电流。我们将遵循与其他受控源相同的步骤，并得出一个简单的表达式来使用。让我们看看图4.8中CCCS的实现。与之前一样，我们可以将支路方程写为\n\
    \n$$A \\cdot i_s = i_A$$\n\n图4.8 一个包含CCCS的简单线性网络\n\n![](img/75093da0d280ad52326a78925e5cc403_89_0.png)\n\
    \n输出节点的电流遵循现在可识别的模式：\n\n$\\cdots + i_A + \\cdots = 0$ &nbsp;&nbsp;&nbsp;&nbsp;\
    \ 节点 $a$ 处的KCL\n\n$\\cdots - i_A + \\cdots = 0$ &nbsp;&nbsp;&nbsp;&nbsp; 节点 $b$\
    \ 处的KCL\n\n为了将其纳入我们的导纳描述，我们只需将矩阵特征写为\n\n$$\\begin{pmatrix} & v_a & v_b & i_S &\
    \ i_A \\ v_a & & & +1 & \\ v_b & & & -1 & \\ i_S & & & & \\ i_A & & -A & 1 & \\\
    end{pmatrix} \\quad (4.32)$$\n\n我们在这里看到任何地方都没有出现电压。输出阻抗是无穷大的，该元件只是感应一个电流，这是一个0欧姆的输入。\n\
    \nCCCS的代码片段可能如下所示\n\n```\nif DeviceType = 'CCCS':\n    Matrix[DeviceBranchIndex][DeviceSenseIndex]=-DeviceValue\n\
    \    Matrix[DeviceBranchIndex][DeviceBranchIndex]=1\n// 这是支路方程行，由变量 DeviceBranchIndex\
    \ 指示，\n// 列由两个器件节点和感应电流 iS 设置\n//\n    Matrix[DeviceNode1Index][DeviceBranchIndex]=1\n\
    \    Matrix[DeviceNode2Index][DeviceBranchIndex]=-1\n// 这两行是KCL方程\n//\n```\n\n\
    ### 4.3.4 总结\n\n无源和有源元件通过各种电压和电流之间非常简单的支路元件方程，以及KCL方程（其中器件产生的电流根据连接性进行加减）被纳入基本的导纳方程。独立电压源和电流源在矩阵方程的右侧也有条目。\n\
    \n## 4.4 矩阵构建：交流仿真\n\n现在让我们看看如何将构建STA矩阵系统的此类代码组合起来。我们需要一个读取网表的代码，为简单起见，我们将使用SPICE3网表格式。让我们首先定义代码的环境。我们使用Python\
    \ 3作为代码基础。Python是一个易于获取的代码库，由于其易用性和可用的代码，它可能是目前最流行的分析框架。我们用它来演示我们讨论的各种算法。关于基本的代码变量定义和网表语法，请参见附录A。\n\
    \n在下面的代码段中，我们有一个这样的Python实现：\n\n```\nPython code\n#!/usr/bin/env python3\n# -*-\
    \ coding: utf-8 -*-\n\"\"\"\nCreated on Thu Feb 28 22:33:04 2019\n\n@author: mikael\n\
    \"\"\"\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport analogdef\
    \ as ana\n#\n# 初始化变量\n#\nMaxNumberOfDevices=100\nDevType=[0*i for i in range(MaxNumberOfDevices)]\n\
    DevLabel=[0*i for i in range(MaxNumberOfDevices)]\nDevNode1=[0*i for i in range(MaxNumberOfDevices)]\n\
    DevNode2=[0*i for i in range(MaxNumberOfDevices)]\nDevNode3=[0*i for i in range(MaxNumberOfDevices)]\n\
    DevModel=[0*i for i in range(MaxNumberOfDevices)]\nDevValue=[0*i for i in range(MaxNumberOfDevices)]\n\
    Nodes=[]\n#\n# 读取模型文件\n#\nmodeldict=ana.readmodelfile('models.txt')\nICdict={}\n\
    Plotdict={}\nPrintdict={}\nOptdict={}\n#\n# 读取网表\n#\nDeviceCount=ana.readnetlist('netlist_4p1.txt',modeldict,ICdict,\n\
    Plotdict,Printdict,Optdict,DevType,DevValue,DevLabel,DevNode1,Dev\nNode2,DevNode3,DevModel,Nodes,MaxNumberOfDevices)\n\
    #\n# 根据电路规模创建矩阵。我们没有实现严格的\n改进节点分析法。我们保留所有电流\n# 但继续将电压称为绝对电压。我们\n相信这将使操作对用户更清晰。\n\
    #\nMatrixSize=DeviceCount+len(Nodes)\n#\n# 支路方程的数量由器件数量给出\n# KCL方程的数量由网表中的节点数量给出。\n\
    # 因此矩阵大小由DeviceCount和\nlen(Nodes)的和设定\n#\nSTA_matrix=[[0 for i in range(MatrixSize)]\
    \ for j in\nrange(MatrixSize)]\nSTA_rhs=[0 for i in range(MatrixSize)]\n#\n# 遍历所有器件，并根据特征创建矩阵/右端项\n\
    #\nNumberOfNodes=len(Nodes)\nfor i in range(DeviceCount):\n    if DevType[i]=='capacitor'\
    \ or DevType[i]=='inductor':\n        DevValue[i]*=(0+1j)\n    STA_matrix[NumberOfNodes+i][NumberOfNodes+i]=-DevValue[i]\n\
    \    if DevNode1[i] != '0' :\n        STA_matrix[NumberOfNodes+i][Nodes.index(DevNode1[i])]=1\n\
    \        STA_matrix[Nodes.index(DevNode1[i])][NumberOfNodes+i]=1\n    if DevNode2[i]\
    \ != '0' :\n        STA_matrix[NumberOfNodes+i][Nodes.index(DevNode2[i])]=-1\n\
    \        STA_matrix[Nodes.index(DevNode2[i])][NumberOfNodes+i]=-1\n    if DevType[i]=='capacitor':\n\
    \        STA_matrix[NumberOfNodes+i][NumberOfNodes+i]=1\n        if DevNode1[i]\
    \ != '0' : STA_matrix[NumberOfNodes+i][Nodes.\nindex(DevNode1[i])]=-DevValue[i]\n\
    \        if DevNode2[i] != '0' : STA_matrix[NumberOfNodes+i][Nodes.\nindex(DevNode2[i])]=+DevValue[i]\n\
    \    if DevType[i]=='VoltSource':\n        STA_matrix[NumberOfNodes+i][NumberOfNodes+i]=0\n\
    \        STA_rhs[NumberOfNodes+i]=DevValue[i]\n#\n# 遍历频率点\n#\nval=[0 for i in\
    \ range(100)]\nfor iter in range(100):\n    omega=iter*1e9*2*3.14159265\n    for\
    \ i in range(DeviceCount):\n        if DevType[i]=='capacitor':\n            if\
    \ DevNode1[i] != '0' :\n                STA_matrix[NumberOfNodes+i][Nodes.index(DevNode1[i])]=DevValue[i]*omega\n\
    \            if DevNode2[i] != '0' :\n                STA_matrix[NumberOfNodes+i][Nodes.index(DevNode2[i])]=-DevValue[i]*omega\n\
    \        if DevType[i]=='inductor':\n            STA_matrix[NumberOfNodes+i][NumberOfNodes+i]=DevValue[i]*omega\n\
    \    STA_inv=np.linalg.inv(STA_matrix)\n    sol=np.matmul(STA_inv,STA_rhs)\n \
    \   val[iter]=abs(sol[2])\nplt.plot(val)\nEnd Python\n```\n\n### 代码 4-1\n\n```\n\
    *\nv1 in 0 1\nvs vs 0 0\nl1 in a 1e-9\nr1 a b 100\nc1 a b 1.2e-12\nr2 b vs 230\n\
    netlist 4.1\n```\n\n代码中只有两个子电路调用（readnetlist和矩阵求逆器numpy.linalg.inv），其余部分由一个矩阵/右端项构建段和一个频率点循环组成。\n\
    \n验证\n我们现在可以通过将仿真输出与使用网表4.1的相同电路（图4.9）的ngspice仿真进行比较来验证代码是否有效。我们发现一致性很好，最大误差小于0.001%。"
