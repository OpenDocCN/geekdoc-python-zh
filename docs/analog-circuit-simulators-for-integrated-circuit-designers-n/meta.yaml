    \\ -\\frac{2\\Delta t}{3L} & \\frac{2\\Delta t}{3L} & 1 \\end{pmatrix} = \\begin{pmatrix}\
    \ 0 \\\\ 0 \\\\ \\frac{4}{3} i_L(t_n) - \\frac{1}{3} i_L(t_{n-1}) \\end{pmatrix}\
    \ \\quad (4.67)$$\n\nNotice in these formulae we need information from two timesteps\
