    The astute reader no doubt has a sense in reality that things are a bit more complicated,
    and yes when encountering real networks with various independent and dependent
    sources and active devices, the heat turns up a few notches. We will now continue
    by first describing how to incorporate various sources, which in the literature
    is often referred to as active elements.


    # 4.3.3 Active Elements


    An active circuit element is an electronic component that supplies energy to a
    circuit. This includes voltage and current sources of various flavors and of course
    transistors. In this book, we will model transistors using voltage sources, so
    we will limit the discussion of active elements to voltage and current sources.


    An element is called active if one of the following conditions is met:


    +   1. The voltage or current is a constant or a function of time, $v(t)$, $i(t)
    = f(t)$. It is then called an *independent* voltage or current source.

    2. The voltage or current is a function of the current through an other network
    element or a function of the voltage across an other network element. It is then
    called a *dependent* voltage or current source.


    There are two varieties of voltage-controlled devices, namely, voltage-controlled
    voltage source (VCVS) and voltage-controlled current source (VCCS). Likewise for
    current-controlled devices, we have current-controlled voltage source (CCVS) and
    current-controlled current source (CCCS). In this section, we will go through
    both the independent and dependent sources.


    # 4.3.3.1 Independent Sources


    An independent source is either a voltage or a current source that outputs a voltage
    or current signal as a function of time or frequency independently of other devices
    or node parameters. A voltage source is most often considered a 0 ohms device,
    and the simulator is set up such that a voltage source can deliver whatever current
    the rest of the nodes require at any given point in time or frequency. A current
    source is analogously a device that has infinite impedance that delivers the desired
    current at whatever voltage the other devices on the connected nodes need to absorb
    the desired current. How this works in the simulator will soon become clear. We
    start here with discussing independent voltage sources and follow with independent
    current sources.


    # Independent Voltage Source


    First, and this is the most simple, is the independent voltage source. In fact
    we have already looked at this in the example in the previous section. The independent
    voltage source simply shows up on the right-hand side of the matrix Eq. 4.10.
    We see'
