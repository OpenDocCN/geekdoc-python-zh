    interest in principal. The reader is encouraged to search online for free implementations
    one can use for self-study. If you are interested in building a simulator for
    commercial purposes, you need to make sure you have the proper permission if you
    decide to use an external matrix solver.


    # 2.3.2.1 Gauss Elimination


    Gaussian elimination is a well-known method to solve matrix equations and is often
    part of elementary classes on linear algebra. It produces both the solution and
    the matrix inverse at the same time. The inverse matrix tends to suffer from round-off
    errors and using it to solve for other right-hand sides (rhs) can result in poor
    accuracy. Its main weakness is it requires the right-hand side (rhs) to be known
    and manipulated along with with the operations, and for the cases the inverse
    matrix is not needed, it takes up to three time longer to complete than other
    methods [11].


    We will spend a bit of time on this method since it exemplifies some common issues.
    Let us consider a set of three equations:


    ```

    \begin{cases} 3x+ & 2y+ & z = 7 \ x+ & 3y+ & 2z = 5 \ 2x+ & y+ & 3z=12 \end{cases}

    ```


    In matrix form, this becomes


    ```

    $Ax = b$

    ```'
