  - "[PAGE 190]\n\n# 5.2.2 Convergence Criteria\n\nAs we can see from the iterations\
    \ in Table 5.1 to Table 5.3, the total error goes down fairly rapidly for each\
    \ iteration, and we simply need to define what being done means. In other words,\
    \ decide what accuracy we desire. One might think a constraint on the KCL, $f_{KCL}(v_k)\
    \ < \\varepsilon$, would be an obvious choice, and in some simulators, it is.\
    \ One refers to this constraint as the residue constraint. However, it is not\
    \ always implemented, and the user should be aware of what convergence criterions\
    \ are implemented in the specific simulator used. The most heavily used criteria\
    \ rely on the difference of the consecutive iterations $v_k$ and $v_{k+1}$, called\
    \ the update criterion, in addition to the residue convergence criterion see for\
    \ example [4].\n\nFor the residue, $f_{KCL}(v_k)$, we say the Newton-Raphson iteration\
    \ residue has converged if\n\n$$|f_{KCL}(v_k)| < \\text{reltol} \\cdot i_{n,\\\
    text{max}} + \\text{iabstol}$$ (5.21)\n\nwhere $i_{n,\\text{max}}$ is the largest\
    \ absolute current entering node $n$.\n\nThe update convergence criterion for\
    \ a Newton-Raphson iteration is\n\n$$|v_k - v_{k-1}| < \\text{reltol} \\cdot v_{k,\\\
    text{max}} + \\text{vabstol}$$ (5.22)\n\nwhere $v_{k,\\text{max}}$ is usually\
    \ $\\max(|v_k|, |v_{k-1}|)$.\n\nIn most simulators, both of these needs to be\
    \ fulfilled for the Newton-Raphson iteration to be considered converged. We can\
    \ implement this in our Python environment in the following way:\n\n```\nPython\
    \ code\n.\n.\n.\n    ResidueConverged=True\n    node=0\n    while ResidueConverged\
    \ and node<NumberOfNodes:\n        # Let us find the maximum current going into\
