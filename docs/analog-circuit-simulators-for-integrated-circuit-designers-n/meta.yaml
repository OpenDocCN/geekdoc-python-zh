    $$v_a \left( \quad \right) = \begin{pmatrix} -I \ +I \end{pmatrix}$$


    These formulations are fairly intuitive. From the branch equation, we note the
    voltage between the output nodes can be anything; it does not enter the equation
    at all. We say that the current source has infinite impedance. The voltage between
    the output nodes will be completely determined by the other elements connecting
    to the nodes. Analogously to the independent voltage source case, we here cannot
    stack two independent current sources on top of each other, for such a construction
    to converge the currents needs to be exactly the same since the output impedance
    is infinite. A simulator will usually issue a complaint about the topology unless
    the two currents are identical.


    # 4.3.3.2 Dependent Sources


    The dependent sources are a little bit more complicated since there are sense
    terminals in addition to the drive terminals, and we will describe here how each
    of the four kinds of dependent sources operates and can be implemented in a matrix
    formulation. We will start with the voltage-controlled sources, VCVS and VCCS,
    and follow with the current-controlled sources, CCVS and CCCS.


    # VCVS


    A simple picture of a voltage-controlled voltage source is shown in Fig. 4.5.


    The sense ports, $s_1$, $s_2$, of the VCVS draw no current. The current is instead
    pulled from the output nodes $a$ and $b$ of the element. The voltage between the
    output nodes is amplified by a factor of $k$ compared to the sense nodes. We find
    for the new set of equations that KCL at nodes $a$ and $b$ is the same as for
    the independent voltage source in the previous section:


    $$\cdots + i_v + \cdots = 0 \qquad \text{KCL at node } a$$


    ![](img/75093da0d280ad52326a78925e5cc403_85_0.png)'
