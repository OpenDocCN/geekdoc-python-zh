    ## BSIM4 2000


    BSIM4 was the fourth generation of models and brought with it hundreds of parameters
    to describe MOSFET operation. As the scaling down of feature size driven by the
    famous Moore''s law kept decreasing the gate length and width to improve power
    consumption and increase processing power, the need for a much refined BSIM model
    became clear. As the previous generation, this generation has plenty of subversions
    that provide improvements.


    ## Overview


    We will not dig that deep into the models but just scratch the surface and highlight
    some of the improvements. There are quite a few improvements in the BSIM4 version
    compared to BSIM3, and to highlight just a few, we have:


    - An improved substrate resistance model.

    - The channel thermal noise is much more accurately modeled also featuring an
    improved model for the induced gate noise.

    - A better $1/f$ noise model.

    - An improved non-quasi-static (NQS) model that can properly account for NQS effects.

    - The drain-source resistance model properly takes into effect asymmetrical and
    other bias-dependent effects.

    - A more accurate gate tunneling model.

    - A unified current saturation model that includes all mechanisms of current saturation-velocity
    saturation, velocity overshoot, and source-end velocity limit.

    - The threshold voltage definition has changed to improve subthreshold response.

    - The drain-induced barrier lowering (DIBL) effect and ROUT model are improved.

    - Just to mention, a few of the many improvements this family of models brought
    to the field!


    Overall there are a few hundred new parameters. We will now describe some of these
    effects in a bit more detail.


    ## Threshold Voltage


    First let us look at the threshold voltage:


    $$V_{th} = V_{T0} + K_1\left(\sqrt{\varphi_s - V_{BS}} - \sqrt{\varphi_s}\right)
    - K_2V_{BS} - \Delta V_{th}$$


    It is modeled very similarly to earlier. One of the biggest changes is in the
    expression for short-channel adjustments:


    $$\Delta V_{th} = D_{vr0} \frac{0.5}{\cosh \frac{L}{l_t} - 1} \left( 2(V_{bi}
    - \phi_s) + V_{ds} \right)$$


    The earlier expression caused a phantom second $V_{th}$ roll-up when $L$ becomes
    really small. To account for a larger range of technologies, the parameters are
    further split into subparameters to increase the applicability of the models.
    We will not go into these details here.


    Earlier in BSIM3, the thickness of the gate was such that the effective thickness
    of the induced charge layer next to the thin oxide layer was much smaller than
    the gate thickness. In BSIM4 the fact that the gate thickness is much closer to
    the charge layers, thickness causes the fundamental approximation of surface charge
    to break down. This introduced several new equations and accompanying parameters.


    The physics of the various biasing regions is now much more complicated, and we
    will briefly touch on a few new effects that need to be modeled.


    ## Weak Inversion Region


    The drain current in this region is similar to earlier:


    $$I_{ds} = \mu_0 \sqrt{\frac{q \epsilon_{si} NDEP}{2 \phi_s}} \frac{W}{L} \left(
    \frac{kT}{q} \right)^2 e^{\frac{q}{kT}(V_{gs} - V_{th} - V_{off})/\eta} \left(
    1 - e^{-V_{ds}q/kT} \right)$$


    ## Gate Tunneling Effect


    As the gate thickness continued to shrink, a quantum mechanical effect known as
    tunneling started to become important. If the reader recalls the modern physics
    classes, an electron can be seen as either particle or a wave, and depending on
    the particular situation, one of these natures is apparent. In the wave case,
    one can show by solving Schroedinger''s equation the electron wave function exist
    in the oxide region and even has a finite size in the transistor body. There is
    then a certain likelihood the electron will be able to exist beyond the gate;
    it "tunnels" through the thin-oxide region. This is a purely quantum mechanical
    effect, and it can cause significant leakage loss. This is taking into account
    in BSIM4.


    ## Unified Mobility Model


    The mobility is obviously a critical parameter since it directly affects the drain
    current. In BSIM4 a new universal mobility was introduced with the parameter MOBMOD
    = 2.


    ## Drain-Source Current


    BSIM4 introduced a uniform current model for the triode and saturation regions


    $$I_{ds} = \frac{I_{ds0}}{\left(1 + \frac{R_{ds}I_{ds0}}{V_{dseff}}\right)} NF
    \left(1 + \frac{1}{C_{clm}} \ln \frac{V_A}{V_{Asat}}\right) f(V_{ADIBL}, V_{ADITS},
    V_{ASCBE}) \quad (3.44)$$


    where


    $$I_{ds0} = \mu_{eff} W Q_{ch0} \frac{V_{ds}}{L} \frac{\left(1 - \frac{V_{ds}}{2V_b}\right)}{1
    + \frac{V_{ds}}{E_{sat}L}} \quad (3.45)$$


    ## Noise Model


    The noise model for a transistor consists of the thermal noise of the channel
    as well as flicker (1/f) noise.


    ### 1/f noise


    The flicker noise is modeled using two kinds of approximations: one where the
    expressions are simple and convenient to use for hand calculations and another
    referred to as the unified model takes more of the detailed physics behind the
    phenomenon into account including what operating region the device is in. The
    choice is up to the user, via the *fnoimod* parameter, and it is often instructive
    to take a look at the models provided by the foundry to see which one is used.


    ### Thermal Noise


    The thermal noise modeling is also controlled by a user parameter *tnoimod* that
    chooses between three sets of approximations. The first, enabled by setting *tnoimod*
    = 0, is similar to what was already in BSIM3. The second, referred to as the *holistic*
    model, is accessed by setting *tnoimod* = 1. It is modeled as a noise current
    between source and drain, and in addition there is a noise voltage source in series
    with the transistor source terminal. The model is called holistic because all
    short-channel effects and velocity saturation effects are automatically included.
    Finally the *tnoimod* = 2 option uses two noise currents to model the noise where
    instead of a noise voltage source at the source terminal, a noise current is inserted
    between the gate and source terminals of the transistor. The published correlations
    with measurements [12, 15] shows good correlation with *tnoimod* set to 2.


    ### Other Noise Sources


    The BSIM4 model also includes other noise sources stemming from drain-source resistances
    and shot noise due to gate tunneling currents.


    ## Model Parameter Tweaking


    It is important to be aware of the modeling and its limitations since often the
    foundry will provide models with a standard set of parameters and parameter flags
    that work in most cases. However, oftentimes if an unusual size is needed for
    example, this standard parameter set might not sufficient. The informed engineer
    will then go and adjust these flags/parameters on his/her own. A book like this
    cannot cover every parameter in the latest model generations. It would be a large
    volume and unnecessary since this type of information is already out there. Instead
    we will highlight some effects where the author and the team around him have encountered
    discrepancies with measurements. Hopefully this will encourage the reader to boldly
    investigate the appropriateness of the model setup for his/her particular application.


    ## Non-quasi-static Effect


    A FET channel can be modeled as a transmission line with a string of resistors
    connected together and from each interconnect point a capacitor to gnd. This can
    cause a delay in the propagation of the signal if the channel is wide. In the
    short channel region, this can often be simplified as a lumped model with one
    resistor and one capacitor. This effect is controlled with a switch one for transient
    simulations and one for AC simulations. Oftentimes a foundry model will have this
    NQS switch set to zero, meaning the distributed effect is ignored. This will help
    with the simulation time also. However, occasionally one might need a long channel
    device perhaps as a capacitor in a part of the circuit carrying high-speed signals,
    and then the NQS switch needs to be enabled so the distributed effect is taken
    into account. Failure to do so can result in overoptimistic delay of such a capacitor.


    ## Gate Resistance Model


    The gate can have significant resistance, in particular the small geometry CMOS
    transistors. BSIM4 includes a switch to take such a resistance into account; it
    is called rgatemod. Setting this parameter to 0 means no internal gate resistance
    is generated. In a modern PDK, the transistor is often instantiated in a passive
    network that includes a gate resistor, so oftentimes this internal modeling effect
    is disabled. For more information on how it is used, see [15].


    ## Substrate Resistance Network


    The substrate resistance can be modeled in BSIM4, and this is an important parameter
    for high-speed applications. The model switch is called rbodmod. When investigating
    a new technology, it is often worthwhile to see if this model switch is enabled
    or not. For more information, see [15].


    ## Charge Partitioning Model


    The charge partitioning tells how the inversion layer charge is divided into source
    and drain charge. There are typically three options: 50%/50%, 40%/60%, and 0%/100%.
    The 40%/60% model is considered the most physical [13]. The actual split will
    depend on the node voltages, something that is hard to solve analytically [13].
    Depending on the application, the partitioning model used might give the wrong
    answer.


    ## Summary


    We have looked briefly at the modeling of BSIM4. We have touched on a few of the
    basic modeling assumptions and compared to the earlier BSIM versions. We see a
    significant increase in the sophistication has occurred, and many subtle effects
    that'
