    \n**图4.10** 带有电阻/电容负载和源极跟随器输出级的简单跨导器\n\n## 具有线性晶体管的放大器\n\n利用我们刚刚完成的分析，我们也可以研究包含线性“晶体管”的电路。此类器件可以使用我们在第3.3节中研究的压控电流源来描述。让我们看一下图4.10所示的简单放大器。\n\
