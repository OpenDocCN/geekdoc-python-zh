- md: '## 3.2.4 Hi-Current Model (HiCUM)


    The high-current model (HiCUM) is a modification to the basic Gummel-Poon model
    we just discussed. A few highlights of the improvements over Gummel-Poon models
    are:


    - One of the problems with Gummel-Poon is the insensitivity to effects around
    the emitter periphery. These types of effects can play a significant role in modern
    high-speed transistors.

    - Another issue is the distributed nature of the external base-collector region.

    - Also the high-frequency small signal current crowding in the emitter needs to
    be addressed.

    - Other convenient improvements involve the base-emitter isolation capacitance
    and the BC oxide capacitance.

    - Compared to other models, the internal series resistance is taken into account
    by the model equations to some degree. This approach avoids the need for an internal
    resistor but also saves one node and makes the computational expense less.

    - There is the possibility of a substrate parasitic transistor turning on at very
    low CE voltages, referred to as saturation region or even hard saturation region.
    Such a parasitic transistor is being taken into account by a simple transport
    model.


    ## 3.2.5 VBIC Model


    VBIC is a bipolar junction transistor (BJT) model that was developed as a public
    domain replacement for the SPICE Gummel-Poon (SGP) model. VBIC is designed to
    be as similar as possible to the SGP model yet overcomes its major deficiencies.
    VBIC improvements on SGP:


    - Improved Early effect modeling

    - Quasi-saturation modeling

    - Parasitic substrate transistor modeling

    - Parasitic fixed (oxide) capacitance modeling

    - Includes an avalanche multiplication model

    - Improved temperature modeling

    - Base current decoupled from collector current

    - Electrothermal modeling

    - Smooth, continuous model


    ## 3.3 Model Options Considered


    In this chapter, we discussed the following BSIM model options specifically:


    - Non-quasi-static (NQS) model

    - Gate resistance model

    - Substrate resistance model


    ## 3.4 Transistor Models Used


    Implementing a full BSIM model is out of the scope for this book. Instead we will
    use simpler models to illustrate various aspects of analog simulators. We will
    use two different models for CMOS transistors and a simple exponential model for
    bipolar transistors.


    ### 3.4.1 CMOS Transistor Model 1


    The new element is a VCCS that has a transfer function $g_m = Kv_g^2$. This is
    perhaps the simplest nonlinearity one can think of. The reader, no doubt, recognizes
    this as close to a CMOS transistor transfer function with a threshold voltage
    equal to zero. This is no coincidence. In order to proceed, we need to take a
    look at the definitions of the direction of currents as they apply to NMOS and
    PMOS transistors, respectively. Let us look at Fig. 3.8 where the direction of
    the source and drain currents is indicated. The convention is that a current going
    into a device (or subcircuit) is positive; outgoing currents are negative. For
    the NMOS transistor, we have then that the drain current


    $I_d = K(V_g - V_s)^2 = KV_{gs}^2$ (3.47)


    For the PMOS, $I_d$ becomes negative:


    $$I_d = -K(V_s - V_g)^2 = KV_{sg}^2 \quad (3.48)$$


    Note the subtle change of subscript for the PMOS. For this model, it has no significance,
    but it will play a role in the next model 2.


    ### 3.4.2 CMOS Transistor Model 2


    The transistor model we have used so far was just a very basic one so we could
    illustrate how to implement nonlinear solvers. The model has infinite output impedance
    and no linear region, and what is worse it turns on reversely as the gate-source
    voltage goes below zero. It is not very useful. Let us now build a model that
    is a bit more realistic, still far from the BSIM quality. Let us use a drain current
    that varies with the port voltages like


    $$I_d = \begin{cases} 0, & V_{gs} - V_T < 0 \\ 2K\left( (V_{gs} - V_T)V_{ds} -
    \frac{1}{2}V_{ds}^2 \right), & V_{ds} < V_{gs} - V_T \\ K(V_{gs} - V_T)^2(1 +
    \lambda V_{ds}) \end{cases} \quad (3.49)$$


    where $V_T$ is the threshold voltage we here model as just a constant voltage,
    $K$ is the same constant we used earlier, and finally $\lambda$ is the parameter
    controlling the drain output impedance in saturation. The equation for a PMOS
    transistor will be very similar with some sign changes in line with what we saw
    for the simpler CMOS model:


    $$I_d = \begin{cases} 0, & V_{sg} - V_T < 0 \\ -2K\left( (V_{sg} - V_T)V_{sd}
    - \frac{1}{2}V_{sd}^2 \right), & V_{sd} < V_{sg} - V_T \\ -K(V_{sg} - V_T)^2(1
    + \lambda V_{sd}) \end{cases} \quad (3.50)$$


    ### 3.4.3 Bipolar Transistor Model 3


    The bipolar model we will use is given by the following expression


    $$I_C = -I_E = \begin{cases} I_0 \exp\left( \frac{V_{BE}q}{kT} \right) \left(
    1 + \frac{V_{CE}}{V_A} \right), & V_{BE} > 0 \\ 0, & V_{BE} \le 0 \end{cases}
    \quad (3.51)$$


    where we have used $V_A$ to denote the Early voltage. The model is similar in
    structure to its CMOS counterpart, but there are fewer regions. The exponential
    nature of this equation will cause some interesting problems in the implementation
    sections later.


    ## 3.5 Summary


    We have in this chapter looked at basic device physics for key components of modern
    process technologies. Our premise is the designer needs to be aware of how the
    modeling is done in order to simulate the devices properly. After the basic physics
    review, we outlined how models are made and went through the historical development
    of BSIM from the UC Berkeley device group. Along the way, we highlighted various
    approximations and pointed out how nominal model files from modern foundries can
    sometimes have limitations, and we gave a few examples of things to watch out
    for. We also gave a brief overview of FinFET physics and showed how effects like
    DIBL are reduced, giving a much lower output conductance for transistors resulting
    in an overall higher basic gain, $g_m r_o$.


    Finally we provided a set of nominal simulation sweeps that are helpful before
    starting to use a new set of models.


    ## 3.6 Exercises


    1. Derive the quasi-2D physics for the finFET structure using the model in Fig.
    3.9.

    2. Discuss why finFET devices have superior transconductance and output conductance.


    ## References


    1. Taur, Y., & Ning, T. H. (2009). *Fundamentals of modern VLSI devices* (2nd
    ed.). Cambridge: Cambridge University Press.

    2. Antognetti, P., & Massobrio, G. (1998). *Semiconductor device modeling with
    spice* (2nd ed.). India: McGraw Hill Education.

    3. Hu, C. H. (2009). *Modern semiconductor devices for integrated circuits*. London:
    Pearson Publishing.

    4. Sahrling, M. (2019). *Fast techniques for integrated circuit design*. Cambridge:
    Cambridge University Press.

    5. Pao, H. C., & Sah, C. T. (1966). Effect of diffusion current on characteristics
    of metal-oxide (insulator)–semiconductor transistors. *Solid State Electronics*,
    9(10), 927–937.

    6. Sze, S. M. (2006). *Physics of semiconductor devices*. Hobroken: John Wiley.

    7. Ashcroft, N. W., & Mermin, N. D. (1976). *Solid state physics*. New York: Brooks
    Cole.

    8. Neamen, D. A., & Biswas, D. (2017). *Semiconductor physics and devices* (4th
    ed.). India: McGraw Hill Education.

    9. Sheu, B. J., et al. (1987). BSIM: Berkeley short-channel IGFET model for MOS
    transistors. *IEEE Journal of Solid-State Circuits*, 22(4), 558–566.

    10. Huang, J. H., et al. (1993). A robust physical and predictive model for deep-submicrometer
    MOS circuit simulation, Electronics Research Laboratory, UCB/ERL M93/57.

    11. Chauhan, Y. S., et al. (2012). BSIM – Industry standard compact MOSFET models.
    *IEEE*, 30–33.

    12. Xi, X., et al. (2004) The next generation BSIM for sub-100nm mixed-signal
    circuit simulation. *IEEE Custom Integrated Circuits Conference*, 13–16.

    13. Ward, D. E., & Dutton, R. W. (1978). A charge-oriented model for MOS transistor
    capacitances. *IEEE Journal of Solid State Circuits*, 13, 703–708.

    14. Ebers, J. J., & Moll, J. L. (1954). Large signal behavior of junction transistors.
    *Proceedings of IRE*, 42, 1761–1772.

    15. Niknejad, A., et al. (2020). *BSIM4 manual*. http://bsim.berkeley.edu/models/bsim4/'
  mdcn: '## 3.2.4 大电流模型 (HiCUM)


    大电流模型 (HiCUM) 是对刚刚讨论的基本 Gummel-Poon 模型的改进。相较于 Gummel-Poon 模型，其主要改进点包括：


    -   Gummel-Poon 模型的问题之一是对发射极外围效应不敏感。这类效应在现代高速晶体管中可能扮演重要角色。

    -   另一个问题是外部基极-集电极区域的分布特性。

    -   此外，发射极中的高频小信号电流拥挤效应也需要解决。

    -   其他便捷的改进涉及基极-发射极隔离电容和 BC 氧化层电容。

    -   与其他模型相比，该模型在一定程度上通过模型方程考虑了内部串联电阻。这种方法避免了使用内部电阻的需要，同时节省了一个节点并降低了计算成本。

    -   在极低的 CE 电压下，存在衬底寄生晶体管导通的可能性，这被称为饱和区甚至硬饱和区。这种寄生晶体管通过一个简单的传输模型加以考虑。


    ## 3.2.5 VBIC 模型


    VBIC 是一种双极结型晶体管 (BJT) 模型，它被开发作为 SPICE Gummel-Poon (SGP) 模型的公共领域替代品。VBIC 旨在尽可能与
    SGP 模型相似，同时克服其主要缺陷。VBIC 对 SGP 的改进包括：


    -   改进的 Early 效应建模

    -   准饱和建模

    -   寄生衬底晶体管建模

    -   寄生固定（氧化层）电容建模

    -   包含雪崩倍增模型

    -   改进的温度建模

    -   基极电流与集电极电流解耦

    -   电热建模

    -   平滑、连续的模型


    ## 3.3 考虑的模型选项


    在本章中，我们专门讨论了以下 BSIM 模型选项：


    -   非准静态 (NQS) 模型

    -   栅极电阻模型

    -   衬底电阻模型


    ## 3.4 使用的晶体管模型


    实现完整的 BSIM 模型超出了本书的范围。相反，我们将使用更简单的模型来说明模拟器的各个方面。我们将使用两种不同的 CMOS 晶体管模型，以及一个用于双极晶体管的简单指数模型。


    ### 3.4.1 CMOS 晶体管模型 1


    新元件是一个压控电流源 (VCCS)，其传递函数为 $g_m = Kv_g^2$。这可能是人们能想到的最简单的非线性特性。读者无疑会认出这接近于阈值电压为零的
    CMOS 晶体管传递函数。这并非巧合。为了继续，我们需要分别查看适用于 NMOS 和 PMOS 晶体管的电流方向定义。让我们看一下图 3.8，其中标出了源极和漏极电流的方向。惯例是流入器件（或子电路）的电流为正；流出的电流为负。对于
    NMOS 晶体管，漏极电流为


    $I_d = K(V_g - V_s)^2 = KV_{gs}^2$ (3.47)


    对于 PMOS，$I_d$ 变为负值：


    $$I_d = -K(V_s - V_g)^2 = KV_{sg}^2 \quad (3.48)$$


    注意 PMOS 下标的细微变化。对于此模型，这没有意义，但在下一个模型 2 中将发挥作用。


    ### 3.4.2 CMOS 晶体管模型 2


    到目前为止我们使用的晶体管模型只是一个非常基础的模型，以便说明如何实现非线性求解器。该模型具有无限的输出阻抗，没有线性区，更糟糕的是，当栅源电压低于零时它会反向导通。它不是很实用。现在让我们构建一个稍微更现实的模型，虽然离
    BSIM 的质量还很远。让我们使用一个漏极电流随端口电压变化的模型，如下所示


    $$I_d = \begin{cases} 0, & V_{gs} - V_T < 0 \\ 2K\left( (V_{gs} - V_T)V_{ds} -
    \frac{1}{2}V_{ds}^2 \right), & V_{ds} < V_{gs} - V_T \\ K(V_{gs} - V_T)^2(1 +
    \lambda V_{ds}) \end{cases} \quad (3.49)$$


    其中 $V_T$ 是我们在此建模为常数的阈值电压，$K$ 是我们之前使用的相同常数，最后 $\lambda$ 是控制饱和区漏极输出阻抗的参数。PMOS 晶体管的方程将非常相似，只是符号根据我们在更简单的
    CMOS 模型中看到的进行了更改：


    $$I_d = \begin{cases} 0, & V_{sg} - V_T < 0 \\ -2K\left( (V_{sg} - V_T)V_{sd}
    - \frac{1}{2}V_{sd}^2 \right), & V_{sd} < V_{sg} - V_T \\ -K(V_{sg} - V_T)^2(1
    + \lambda V_{sd}) \end{cases} \quad (3.50)$$


    ### 3.4.3 双极晶体管模型 3


    我们将使用的双极模型由以下表达式给出


    $$I_C = -I_E = \begin{cases} I_0 \exp\left( \frac{V_{BE}q}{kT} \right) \left(
    1 + \frac{V_{CE}}{V_A} \right), & V_{BE} > 0 \\ 0, & V_{BE} \le 0 \end{cases}
    \quad (3.51)$$


    其中我们使用 $V_A$ 表示 Early 电压。该模型在结构上与其 CMOS 对应模型相似，但区域较少。该方程的指数特性将在后面的实现部分引起一些有趣的问题。


    ## 3.5 总结


    在本章中，我们探讨了现代工艺技术关键组件的基本器件物理。我们的前提是设计者需要了解建模方式，以便正确地仿真器件。在回顾了基本物理之后，我们概述了模型是如何建立的，并回顾了来自加州大学伯克利分校器件小组的
    BSIM 的历史发展。在此过程中，我们强调了各种近似，并指出现代代工厂的标称模型文件有时可能存在局限性，并给出了一些需要注意的示例。我们还简要概述了 FinFET
    物理学，并展示了如何减少 DIBL 等效应，从而显著降低晶体管的输出电导，获得更高的基本增益 $g_m r_o$。


    最后，我们提供了一组标称仿真扫描，这在开始使用一组新模型之前非常有帮助。


    ## 3.6 练习


    1.  使用图 3.9 中的模型推导 finFET 结构的准二维物理。

    2.  讨论为什么 finFET 器件具有更优的跨导和输出电导。


    ## 参考文献


    1.  Taur, Y., & Ning, T. H. (2009). *Fundamentals of modern VLSI devices* (2nd
    ed.). Cambridge: Cambridge University Press.

    2.  Antognetti, P., & Massobrio, G. (1998). *Semiconductor device modeling with
