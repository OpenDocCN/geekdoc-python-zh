    \ implementation will now look like\n\n$$\\begin{pmatrix} & v_a & v_b \\\\ v_a\
    \ & & 1 \\\\ v_b & & -1 \\\\ i_C & -\\frac{3C}{2\\Delta t} & \\frac{3C}{2\\Delta\
    \ t} & 1 \\end{pmatrix} = \\begin{pmatrix} \\ \\ \\ \\frac{C}{\\Delta t} \\left(\
    \ -2u(t_n) + \\frac{1}{2}u(t_{n-1}) \\right) \\end{pmatrix} \\quad (4.64)$$\n\n\
