    \ think of a way to improve convergence?\n\n### 5.2.2 Convergence Criteria\n\n\
    As we can see from the iterations in Table 5.1 to Table 5.3, the total error goes\
    \ down fairly rapidly for each iteration, and we simply need to define what being\
    \ done means. In other words, decide what accuracy we desire. One might think\
    \ a constraint on the KCL, $f_{KCL}(v_k) < \\varepsilon$, would be an obvious\
    \ choice, and in some simulators, it is. One refers to this constraint as the\
    \ residue constraint. However, it is not always implemented, and the user should\
    \ be aware of what convergence criterions are implemented in the specific simulator\
    \ used. The most heavily used criteria rely on the difference of the consecutive\
    \ iterations $v_k$ and $v_{k+1}$, called the update criterion, in addition to\
    \ the residue convergence criterion see for example [4].\n\nFor the residue, $f_{KCL}(v_k)$,\
    \ we say the Newton-Raphson iteration residue has converged if\n\n$$|f_{KCL}(v_k)|\
    \ < \\text{reltol} \\cdot i_{n,\\text{max}} + \\text{iabstol}$$ (5.21)\n\nwhere\
    \ $i_{n,\\text{max}}$ is the largest absolute current entering node $n$.\n\nThe\
    \ update convergence criterion for a Newton-Raphson iteration is\n\n$$|v_k - v_{k-1}|\
    \ < \\text{reltol} \\cdot v_{k,\\text{max}} + \\text{vabstol}$$ (5.22)\n\nwhere\
    \ $v_{k,\\text{max}}$ is usually $\\max(|v_k|, |v_{k-1}|)$.\n\nIn most simulators,\
    \ both of these needs to be fulfilled for the Newton-Raphson iteration to be considered\
    \ converged. We can implement this in our Python environment in the following\
    \ way:\n\n```\nPython code\n.\n.\n.\n    ResidueConverged=True\n    node=0\n \
    \   while ResidueConverged and node<NumberOfNodes:\n        # Let us find the\
    \ maximum current going into node, Nodes[node]\n        MaxCurrent=0\n       \
    \ for current in range(NumberOfCurrents):\n            MaxCurrent= max(MaxCurrent,abs(STA_matrix[node][NumberOfNodes+current]*(sol[NumberOfNodes+current])))\n\
    \        if f[node] > reltol*MaxCurrent+iabstol:\n            ResidueConverged=False\n\
    \        node=node+1\n```\n\n```\nSolutionCorrection=numpy.matmul(numpy.linalg.inv(Jacobian),f)\n\
    UpdateConverged=True\nif PointLocal:\n    for node in range(NumberOfNodes):\n\
    \        vkmax=max(abs(sol[node]),abs(sol[node]-SolutionCorrection[node]))\n \
    \       if abs(SolutionCorrection[node])>vkmax*reltol+vabstol:\n            UpdateConverged=False\n\
    elif GlobalTruncation:\n    for node in range(NumberOfNodes):\n        if abs(SolutionCorrection[node])>vkmax*reltol+vabstol:\n\
    \            UpdateConverged=False\nEnd Python code\n```\n\nWe can now run the\
    \ previous examples with this convergence check and compare the number of iterations\
    \ needed for a given tolerance (Codes 5.3.1) and find the results in Table 5.4.\n\
    \nAs one would expect, the number of iterations increases with the setting of\
    \ reltol. The more complicated bandgap circuit takes a few more iterations for\
    \ the given tolerance. The number of iterations are also highly dependent on the\
    \ initial conditions which should come as no surprise.\n\n### 5.2.2.1 Convergence\
    \ Issues\n\nFor real circuits, there can be millions of nonlinear devices, and\
    \ finding the correct operating point (there can be many) can be a difficult task.\
    \ In response to this, several methods were developed. For one thing, it should\
    \ be clear that if all voltage and current sources are zero, a solution presents\
    \ itself, namely, zero! One can then simply ramp up the various voltage and current\
    \ sources to their nominal value, and if one does this slowly enough, the circuitry\
    \ should be able to tag along, and we will have a realistic DC solution. Oftentimes\
    \ the solution at the end of this ramp up can be used as a starting point for\
    \ another kind of simulation, like a transient simulation. There are other methods\
    \ we will discuss in the section, and choosing one is often referred to as choosing\
    \ a homotopy (the term comes from the mathematical discipline topology where a\
    \ homotopy is a relationship between two functions where one function is continuously\
    \ changed into the other through some parameter, loosely speaking). For the ramp-up\
    \ case we just discussed, we often see ramp up, or source stepping or some such\
    \ option for the simulator.\n\n## Homotopy Methods\n\nIn this section, we will\
    \ discuss the most common homotopy methods, source stepping, $g_{min}$ stepping,\
    \ and (briefly) pseudo-transient methods. We will be quite brief and highlight\
    \ what often works best in practice.\n\n## Source Stepping\n\nMost circuits have\
    \ the convenient property that if the voltage sources are at 0 V and the current\
    \ sources are at 0 A, the circuit has the solution = 0; all other voltages and\
    \ currents are zero. We mentioned this case briefly in the introduction to this\
    \ section. In the case where there is a problem with DC convergence, one method\
    \ would then be to start everything off at zero and slowly ramp all the sources\
    \ up to their final value. This is clearly a continuous change of the circuit\
    \ from one state to the other, so it is classified as a homotopy. It is called\
    \ source stepping in most commercial simulators. It is often a very convenient\
    \ way to achieve DC convergence. The trick is often in the rate of the ramp where\
    \ one needs to adjust the next value of the sources if a new step fails. It is\
    \ not always guaranteed to converge, and there is a lot of theoretical work that\
    \ has been done to investigate these problems. Often the Achilles heel is in the\
    \ severe nonlinearity in switching-type circuits where the gain around the switch\
    \ point can be large.\n\nLet us take a look at a cross-coupled inverter circuit\
    \ where we can showcase a way to implement the stepping algorithm Code5.4. The\
    \ circuit can be found in Fig. 5.10, and the netlist is\n\nFig. 5.4 Drain current\
    \ vs gate voltage for (a) CMOS model1, (b) CMOS model2 compared to exact calculation\n\
