    # 4.4.4 Transfer Function Analysis


    A transfer function analysis is similar to an AC simulation in that it simulates
    the gain (or transfer function) between inputs and outputs. The advantage with
    transfer function analysis is that it computes the gain from inputs like independent
    sources to a single output. In this way, properties like gain, PSRR, etc. can
    be accessed through one simulation. In the early days of SPICE, this analysis
    performed a DC'
  - '[PAGE 112]


    ![](img/75093da0d280ad52326a78925e5cc403_112_0.png)


    linearized transfer between a specified input source and an output node. It also
    frequently provided the input and output resistance. In modern implementations,
    one can do a broader range of investigations. This is in contrast to AC analysis
    where you have one (or a few) stimulus in the circuit and you want to find out
    its effect on various parts of the circuit; the output points are larger than
    the number of input or stimulus points. With a transfer function analysis, you
    can calculate the response from several starting points to a single (or a few)
    output; the number of inputs is larger than the number of outputs. This is straightforward
    to implement in Python, and we leave it to the reader to pursue.


    # 4.4.5 Sensitivity Analysis


    Sensitivity analysis is another AC analysis offshoot that is very convenient.
    The analysis lists the sensitivity of a user-defined output to a bunch of inputs
    that are also user-defined. Modern implementations also use DC simulations like
    operating point analysis to simulate sensitivity as shown in Fig. 4.26. We will
    bypass the explicit Python implementation here and leave as an exercise to the
    reader.'
