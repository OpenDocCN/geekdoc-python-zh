  md: '# 6.3 Large Block Simulations


    For larger blocks, the most difficult problem to deal with is the size of the
    circuit. As we discussed in Chaps. 2, 4, and 5, modern simulators have some really
    nifty features, among them really efficient matrix solvers, but for modern SOC,
    the device count for the analog section can easily be in the tens of millions,
    and even such powerful tools can start to choke. It is naturally not surprising
    that this happens since the one gives rise to the other with more powerful computers
    being able to generate even more powerful chips one can put in to make the computers
    more powerful that makes even more powerful chips and so on. It is an exponential
    development effort!


    A good way to deal with these situations is to use mixed-mode simulators, where
    you can, for example, mix Verilog event-type simulators with differential equation
    solvers like SPICE. If there is no such tool available, one is often helped by
    constructing simplified Verilog-A models for the blocks that one can switch in
    and out between schematic views and Verilog-A views. These work well in SPICE
    simulators and can be a much faster way to move forward. For Verilog-A views,
    keep in mind to include appropriate driving and load impedances.


    The key thing for large block simulations is to make sure the signal path is fully
    simulated with appropriate load and source impedances. Include also the clock
    distribution path if there is such.


    +   - Does the bandgap, bias circuit come up properly after being enabled?

    - Does the right block get the right bias current?

    - Can the registers be programmed properly?

    - Are all the blocks being enabled correctly?


    Pay particular attention to the clocks. If the clocks are not coming up correctly,
    *nothing* can be tested in the digital domain and few analog functions. This is
    such an important function that there are often clock overrides that can enable
    the digital core with a low-frequency external clock that goes directly to the
    core, bypassing all analog circuitry.


    # 6.3.1 Analog-Digital Co-simulation Strategies


    There are in principal at least three different ways analog blocks can co-simulate
    with digital blocks: (1) both using SPICE-like tools, (2) analog → spice and digital
    → Verilog, and (3) both using Verilog tools. The first option quickly becomes
    impossible due to sheer circuit size; the other two are more common, the second
    option being the most common of all. Option 3 is occasionally used when simple
    signal path analysis might be warranted. It obviously cannot handle analog signals
    unless one uses some sort of digitization.


    A good design methodology is to make sure all analog blocks are turned off when
    the supply voltages are applied. This means the basic biasing in terms of'
  merge: -1
  pgno: 336
- img_proc: true
  md: 'bandgap and associated currents are down. Then, in bring up, one analog block
    after another can be turned on and functionality established. Having everything
    turned on immediately can cause strange behavior since the state of the circuit
    can be unknown, and large unintended currents can start destroying the interconnect
    metals.


    For modern analog blocks, there are normally many digital bits needed to be able
    to control the biasing in detail and adjust for things like temperature, voltage
    drift, and aging to name a few. There can easily be many thousand bits to control
    the analog circuitry. Naturally, there is no way the digital registers can be
    programmed in the analog simulator; the time scale for a register programming
    sequence can be several microseconds, whereas the analog circuits can have a timescale
    of picoseconds. The proper functionality of the registers can only be verified
    with a Verilog simulator, and since they control the analog block, doing it in
    a mixed simulation mode environment is ideal.


    In circuits like data converters or RF mixers, there is usually a fast clock somewhere
    that sets the time for the chip functions. To generate the clock internally, it
    is often required to have an accurate input clock of up to a few GHz perhaps (the
    higher the frequency, the more expensive the solution gets on the printed circuit
    board design). This clock needs to be turned off during simulation of register
    programming due to the different timescales involved. This is usually easy to
    do with a delay statement in the clock input circuitry.


    A chip usually generates its own biasing where internal bandgap, fixed voltage,
    and currents are generated. One useful approach is to program this bandgap and
    current generator to come up with the help of register programming. To keep a
    bias block from generating too much noise, there is usually a large capacitor
    with a large time constant present in the block. It can take several 10 s of microseconds
    for such a block to come up properly, depending on the circuit, and during this
    time, all faster time constants, like clocks we just mentioned, should be turned
    off so the bandgap’s behavior can be observed.


    When the biasing has been proven to work and come up properly and bias the correct
    circuit block, with 100 s–1000 s of currents needed, it is time to turn on the
    clocks and input signals so the detailed analog behavior can be studied.


    # 6.3.2 Summary


    We have in this chapter touched briefly on good practices when designing blocks
    using simulators and modern foundry models. We mentioned it is really important
    to verify the device modeling, in particular for technology nodes that are coming
    online. The modeling teams working for modern foundries are very professional
    and knowledgeable, but characterizing modern transistors with BSIM is a very measurement-intensive
    and time-consuming task, and it is easy to have shortcomings, in particular the
    early releases. Even with more established technologies, it is worthwhile to study
    the device models. It is then less likely one finds shortcomings in the model
    and much more likely one finds shortcomings in one’s own under-'
