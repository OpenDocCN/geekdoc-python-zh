    \ 周期性交流分析\n\n假设我们有一个电路的解，满足\n\n$$f(v(t)) = i(v(t)) + \\dot{q}(v(t)) + u = 0 \\\
    quad (5.72)$$\n\n如果我们向 $u(t)$ 添加一个小信号扰动，即 $u(t) \\rightarrow u(t) + \\tilde{u}(t)$，使得整体解仍然近似有效，会怎样？解同样会进行一个小的修正调整，$v(t)\
