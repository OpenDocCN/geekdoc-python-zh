    **Simplify** After the onset of inversion but before saturation, the linear region,
    we have from Eq. (3.5) that $dV/d\psi = 1$.


    **Solve** Applying the intrinsic potential values at the source $\psi_{s,s} =
    2\psi_B$ and drain $\psi_{s,d} = 2\psi_B + V_{ds}$, we obtain the drain current
    as a function of the gate and drain potentials.


    $$I_{ds} = \mu_{eff} C_{ox} \frac{W}{L} \left( V_{gs} - V_{fb} - 2\psi_B - \frac{V_{ds}}{2}
    \right) V_{ds} - \frac{2 \sqrt{2 \epsilon_{si} q N_A}}{3 C_{ox}} \left( (2\psi_B
    + V_{ds})^{3/2} - (2\psi_B)^{3/2} \right) \quad (3.17)$$


    **Verify** This is a well-known expression for the drain current [1].


    **Evaluate** This expression can now be expanded in terms of $V_{ds}$, and we
