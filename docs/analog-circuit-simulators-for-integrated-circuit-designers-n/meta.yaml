    ## 7.5 谐波平衡理论


    让我们来看一下类似于 [6] 中讨论的电路方程，其形式为函数 $f(v_k)$：


    $$f(v(t)) = i(v(t)) + \dot{q}(v(t)) + u \quad (7.49)$$


    让我们对这个方程进行傅里叶变换。我们得到


    $$F(V) = I(V) + \Omega Q(V) + U \quad (7.50)$$


    这里的 $V$ 现在代表每个节点电压的傅里叶系数。我们使用了


    $$F(\dot{q}(v(t))) = F(\dot{q}_k(v_i(t))) = F\left(\frac{dq_k(v_i)}{dv_i} \frac{dv_i(t)}{dt}\right)
    = F\left(\frac{dq_k(v_i)}{dv_i} \sum_m j\omega_m v_{lm} e^{j\omega_m t}\right)$$


    对于线性系统，我们得到


    $$F(\dot{q}(v(t))) = F(\dot{q}_k(v_i(t))) = F\left(C_{kl} \frac{dv_i(t)}{dt}\right)
    = C_{kl} \sum_m j\omega_m v_{lm} = \Omega Q(V)$$


    $$\Omega = \begin{pmatrix} j\omega & \cdots & 0 \\ \vdots & \ddots & \vdots \\
    0 & \cdots & j\omega \end{pmatrix}, \omega = (\omega_1 \cdots \omega_k)$$


    对于非线性函数 $i, q$，处理过程是首先将时域中的电压进行逆傅里叶变换，在那里求解时间演化问题（记住它是谐波的），然后再傅里叶变换回频域。求解公式 7.50
    有许多方法，但我们将使用通常称为谐波牛顿法的方法，它与我们之前在时域中使用的牛顿-拉夫森法非常相似。我们定义雅可比矩阵


    $$J_{ij} = \frac{\partial F_i}{\partial V_j}$$


    我们得到


    $$J(V) = \frac{\partial I(V)}{\partial V} + \Omega \frac{\partial Q(V)}{\partial
    V}$$


    应用牛顿-拉夫森算法，我们得到迭代公式


    $$V^{j+1} = V^{(j)} - J^{-1}(V^{(j)})F(V^{(j)})$$


    矩阵 $J$ 被称为谐波雅可比矩阵或转换矩阵。它告诉你节点 $j$ 处的某个傅里叶分量如何与节点 $i$ 处的另一个傅里叶分量耦合。注意，这个矩阵实际上是一个矩阵中的矩阵。每个电路节点包含一组傅里叶向量分量，这些分量与其他节点的傅里叶分量耦合。因此，现在的过程与我们在时域情况下的过程非常相似。我们建立矩阵
    $F$ 和 $J$ 并进行迭代。由 $U$ 设定的边界条件具有固定的分量，我们可以轻松地迭代得到正确的解。我们确实有更多的变量；每个节点有 k 个傅里叶分量，但一旦迭代收敛，我们就完成了。


    ## 7.6 矩阵求解器：简要理论


    矩阵求解器是现代社会中使用的最重要的算法之一。它的应用远远超出了纯粹的工程领域。随着人工智能在硬件领域的出现，此类系统也被直接集成到硬件中，因此在日常生活中非常普遍。从工程/科学的角度来看，我们最终得到矩阵方程，仅仅是因为我们量化或离散化所研究问题的方式。对于电路应用，我们只有有限数量的未知电压和电流，因此矩阵方程是自然的。但在更连续的系统中，如电磁场求解器，矩阵方程的出现是因为我们研究的系统被放置在一个离散网格上，其中关键属性是恒定的或变化缓慢的。这是一个非常重要的研究领域，而且众所周知，构建能够始终适用于任何类型问题的求解器非常困难。对于电路系统，我们通常受益于矩阵是稀疏的这一事实，因此可以使用高效的迭代求解器，我们将在第
    7.6.3 节讨论这些内容。有时矩阵是稠密的或很小，那么就会采用直接方法。这些将在第 7.6.1 和 7.6.2 节中讨论。我们相当紧密地遵循了 [7, 8]
    中的表述。


    ### 7.6.1 高斯-约当消元法


    高斯求解线性方程组的方法有着悠久的历史 [7]。我们将在此介绍数学推导的简要版本。高斯方法简单来说就是一系列行和列交换，目的是避免我们在第 2 章中描述的主元值过小的问题。该方法通常使矩阵在左侧产生一个单位矩阵，因此右侧的矩阵就是逆矩阵
    [7]：


    $$Ax = b$$


    乘以 $A^{-1}$


    $$A^{-1}Ax = Ix = A^{-1}b$$


    其中 $x$, $b$ 可以是矩阵。现在选择合适的 $b$ 将在右侧显示逆矩阵。由于它需要已知右侧，因此很容易受到舍入误差的影响，并且在求逆矩阵时很少是首选方法。该方法的关键在于调整行和列以避免小主元的方式。最佳选择几乎总是选择可用的最大主元。有趣的是，主元的选择取决于问题的原始缩放。因此，通常将问题缩放，使最大元素为单位值；这通常称为隐式主元选择。让我们更深入地探讨行和列交换。可以相当容易地证明，行交换可以通过从左侧乘以一个矩阵
    $R$ 来实现。那么行高斯消元就是简单地从左侧乘以一系列矩阵


    $$Ax = b$$


    $$R_1 R_2 \dots R_n Ax = Ix = R_1 R_2 \dots R_n b$$


    其中我们使用左侧操作集来定义逆矩阵。列交换对应于从右侧乘以矩阵 $C$。我们得到


    $$Ax = b$$


    $$AC_1 C_1^{-1} x = b$$


    $$AC_1 C_2 C_2^{-1} C_1^{-1} x = b$$


    $$AC_1 C_2 \dots C_n C_n^{-1} \dots C_2^{-1} C_1^{-1} x = b$$


    矩阵乘积 $AC_1 C_2 \dots C_n = I$，我们发现


    $$x = C_1 C_2 \dots C_n b$$


    我们从这个方程中注意到，我们首先需要将右侧乘以我们找到的*最后一个*矩阵，因此所有矩阵 $C$ 都需要存储在内存中。这使得列交换的代价非常高，因此这些操作通常被设计得非常简单。'
