    Newton which is very similar to Newton-Raphson we used earlier in the time domain.
    We define the Jacobian


    $$J_{ij} = \frac{\partial F_i}{\partial V_j}$$


    We get


    $$J(V) = \frac{\partial I(V)}{\partial V} + \Omega \frac{\partial Q(V)}{\partial
    V}$$


    Applying the Newton-Raphson algorithm, we find the iteration'
  - '[PAGE 365]


    $$V^{j+1} = V^{(j)} - J^{-1}(V^{(j)})F(V^{(j)})$$


    The matrix $J$ is referred to as the harmonic Jordan or conversion matrix. It
    tells you how a Fourier component at some node $j$ couples to another Fourier
    component at node $i$. Note the matrix is really a matrix within a matrix. Each
    circuit node contains a set of Fourier vector components that couples to Fourier
    components at other nodes. So now procedure is very similar to the one we followed
    in the time domain case. We set up the matrices $F$ and $J$ and iterate along.
    The boundary conditions set by $U$ has fixed components, and we can just easily
    iterate our way to the right solution. We do have many more variables; each node
    has k Fourier components, but once the iterations have converged, we are done.


    # 7.6 Matrix Solvers: Brief Theory


    Matrix solvers are one of the most important algorithms used in modern society.
    It is used far beyond mere engineering hallway applications. With the appearance
    of artificial intelligence on the hardware scene, such systems are also incorporated
    directly into hardware and are as such very much part of everyday life. From an
    engineering/scientific viewpoint, we end up with matrix equations simply because
    of the way we quantize or discretize the problems we are investigating. For the
    circuit application, we have simply a finite number of unknown voltages and currents,
    so there a matrix equation is natural. But also in more continuous systems like
    electromagnetic field solvers, the matrix equation appear because the systems
    we are investigating are put on a discrete grid within which key properties are
    constant or varying slowly. It is a very important field of study and notoriously
    difficult to construct solvers that work all the time for any kind of problem.
    For circuit systems, we are often helped by the fact the matrices are sparse and
    then efficient iterative solvers can be used, and we discuss such in Sect. 7.6.3.
    Sometimes the matrices are dense or small, and then the direct methods are employed.
    These are discussed in Sects. 7.6.1 and 7.6.2. We follow the presentation in [7,
    8] fairly closely.


    # 7.6.1 Gauss-Jordan Elimination


    The method of Gauss to solve linear systems of equations has a long history [7].
    We will here present a condensed version of the mathematical derivations. The
    Gauss method is simply a set of row and column interchanges with the goal to avoid
    a small value of the pivot we described in Chap. 2. The method is generally such
    that the matrix is producing an identity matrix on the left-hand side and so the
    matrix on the right-hand side is an inverse [7]:'
  - '[PAGE 366]


    $$Ax = b$$


    Multiply by $A^{-1}$


    $$A^{-1}Ax = Ix = A^{-1}b$$


    where $x$, $b$ can be allowed to be matrices. An appropriate choice of $b$ will
    now show us the inverse matrix on the right-hand side. Since it requires the right-hand
    side to be known, it is quite susceptible to round off errors and is rarely the
    first method one should employ when inverting matrices. The key to the method
    is the way one adjusts the rows and columns to avoid a small pivot. The best choice
    is almost always to pick a pivot that is the largest available. Interestingly,
    the choice of pivot will depend on the original scaling of the problem. It is
    therefore common to scale the problem such that the largest element is unity;
    it is often called implicit pivoting. Let us dig into the row and column interchanges
    some more. One can show pretty easily that the row interchange can be accomplished
    by multiplying the matrix from the left by a matrix $R$. A Gauss elimination by
    row is then simply a series of multiplication by some matrix from the left


    $$Ax = b$$


    $$R_1 R_2 \dots R_n Ax = Ix = R_1 R_2 \dots R_n b$$


    where we use the set of left-hand operation to define the inverse matrix. Column
    interchanges correspond to right-hand multiplications of a matrix $C$. We get


    $$Ax = b$$


    $$AC_1 C_1^{-1} x = b$$


    $$AC_1 C_2 C_2^{-1} C_1^{-1} x = b$$


    $$AC_1 C_2 \dots C_n C_n^{-1} \dots C_2^{-1} C_1^{-1} x = b$$


    The matrix multiplications $AC_1 C_2 \dots C_n = I$, and we find


    $$x = C_1 C_2 \dots C_n b$$


    We notice from this equation that we first need to multiply the right-hand side
    by the *last* matrix we find, so all matrices $C$ need to be stored in memory.
    This makes the column interchanges very expensive, and one is often left with
    these operations being very simple ones.'
- md: "## 7.6.2 LU Decomposition\n\nA much better general method to find the inverse\
    \ of matrices that we exemplified in Chap. 2 is the LU decomposition method. For\
    \ this method to work, we do not need the right-hand side of the equation, but\
    \ we can proceed by rewriting the matrix directly [7]\n\n$$Ax = LUx = b$$\n\n\
    where $U$ is an upper-right triangular and $L$ is a lower-left triangular matrix.\
    \ We then simply have to solve a set of equations $Ux = y$ and $Ly = b$. Since\
    \ the $LU$ matrices are triangular, it is a set of straightforward substitutions.\
    \ This sounds good, but the alert reader no doubt questions the complexity of\
    \ decomposing a matrix in such a way. There is in fact an extraordinary procedure\
    \ known as Crout's method that quite easily decomposes a matrix into these two\
    \ matrices. Let us write\n\n$$L = \\begin{pmatrix} l_{11} & \\cdots & 0 \\\\ \\\
    vdots & \\ddots & \\vdots \\\\ l_{n1} & \\cdots & l_{nn} \\end{pmatrix} \\quad\
    \ U = \\begin{pmatrix} u_{11} & \\cdots & u_{1n} \\\\ \\vdots & \\ddots & \\vdots\
    \ \\\\ 0 & \\cdots & u_{nn} \\end{pmatrix}$$\n\nIt turns out the diagonal of $L$\
    \ can always be chosen to be unity $l_{ii} = 1$. Let us write out explicitly a\
    \ row of the matrix equation $LU = A$:\n\n$$l_{i1}u_{1j} + l_{i2}u_{2j} + \\dots\
    \ + l_{in}u_{nj} = a_{ij}$$\n\nGiven the triangular nature of $L$, $U$, we see\
    \ the number of terms in the sum on the left depends strongly on whether $i =\
    \ j$ or $i < j$:\n\n$$i = j : l_{i1}u_{1i} + l_{i2}u_{2i} + \\dots + l_{ii}u_{ii}\
    \ = a_{ii}$$\n$$i < j : l_{i1}u_{1j} + l_{i2}u_{2j} + \\dots + l_{ii}u_{ij} =\
    \ a_{ij}$$\n$$i > j : l_{i1}u_{1j} + l_{i2}u_{2j} + \\dots + l_{ij}u_{jj} = a_{ij}$$\n\
    \nThe Crout's algorithm now gives the following steps:\n\n- Set $l_{ii} = 1$\n\
    - For each $j = 1, 2, \\dots, N$, do:\n  1. For $i = 1, 2, \\dots, j$, use (1)\
    \ and (2) to solve for $u_{ij} : u_{ij} = a_{ij} - \\sum_{k=1}^{i-1} l_{ik}u_{kj}$\n\
    \  2. For $i = j + 1, j + 1, \\dots, N$, use (3) to solve for $a_{ij}$:\n\n$$l_{ij}\
    \ = \\frac{1}{u_{jj}} a_{ij} - \\sum_{k=1}^{j-1} a_{ik}u_{kj}$$\n\nWorking through\
    \ these steps, one finds the procedure can be used to replace the original $\\\
    boldsymbol{A}$ with a new\n\n$$\\begin{pmatrix} u_{11} & u_{12} & u_{1n} \\\\\
    \ l_{21} & u_{22} & u_{2n} \\\\ l_{n1} & l_{n2} & u_{nn} \\end{pmatrix}$$\n\n\
    which are the $\\boldsymbol{LU}$ components! The reader realizes naturally that\
    \ pivoting is again a critical procedure in completing the calculations. One in\
    \ fact does not LU-decompose $\\boldsymbol{A}$ but rather a row-permutated version\
    \ of it.\n\n## 7.6.3 Iterative Matrix Solvers\n\nThe idea of an iterative solver\
    \ is fairly easy to understand, [7]. Suppose we have an approximate solution to\
    \ $\\boldsymbol{Ax} = \\boldsymbol{b}$. Let us call it $\\boldsymbol{x}_0$. We\
    \ then have $\\boldsymbol{x} = \\boldsymbol{x}_0 + \\delta\\boldsymbol{x}$. We\
    \ end up with\n\n$$\\boldsymbol{Ax} = \\boldsymbol{A}(\\boldsymbol{x}_0 + \\delta\\\
    boldsymbol{x}) = \\boldsymbol{b}$$\n\nWe can further write $\\boldsymbol{b} =\
    \ \\boldsymbol{b}_0 + \\delta\\boldsymbol{b}$, where $\\boldsymbol{A}\\delta\\\
    boldsymbol{x} = \\delta\\boldsymbol{b}$ and $\\boldsymbol{Ax}_0 = \\boldsymbol{b}_0$.\
    \ We can now put these relations into the matrix equation, and we find\n\n$$\\\
    boldsymbol{Ax} = \\boldsymbol{A}(\\boldsymbol{x}_0 + \\delta\\boldsymbol{x}) =\
    \ \\boldsymbol{b}_0 + \\delta\\boldsymbol{b} \\rightarrow \\boldsymbol{A}\\delta\\\
    boldsymbol{x} = \\boldsymbol{b} - \\boldsymbol{b}_0$$\n\nwhere the right-hand\
    \ side is known. We now simply need to solve this equation for $\\delta\\boldsymbol{x}$,\
    \ and we then simply subtract it from our original guess $\\boldsymbol{x}_0$ to\
    \ end up with a new guess at the solution. Questions regarding convergence, etc.\
    \ are obviously important, and there is a lot of formal theory regarding this\
    \ which we will now describe in some cursory fashion.\n\nWe saw in Chap. 2 that\
    \ an iterative method to solve matrix equations belonging to a class of solutions\
    \ known as Krylov subspace methods can be very efficient in particular when solving\
    \ large sparse matrices. It involved the idea of using projection to iterate through\
    \ to the correct solution to solve [8]\n\n$$\\boldsymbol{Ax} = \\boldsymbol{b}$$\n\
    \nLet us attempt a first guess to a solution $\\boldsymbol{x} \\approx \\boldsymbol{x}_0$.\
    \ We define the residue\n\n$$\\boldsymbol{r}_0 = \\boldsymbol{Ax}_0 - \\boldsymbol{b}\
    \ \\qquad (7.51)$$\n\nIn all likelihood, this residue is not zero. One can now\
    \ define a string of vectors as\n\n$$r_0, Ar_0, A^2r_0, \\dots, A^{m-1}r_0$$\n\
    \nThis string of vectors make up a subspace, the Krylov subspace, $\\mathcal{K}_m$.\
    \ We will not prove this here but see [8] for many examples and more details.\n\
    \n### General Procedure\n\nThe general iterative procedure is now approximate:\
    \ we have defined the Krylov subspace $\\mathcal{K}_m$. Let us now annotate with\
    \ $\\mathcal{L}_m$ another subspace:\n\n1. We take an approximate solution $x_m$\
    \ from the subspace made up of the vectors from the space $x_0 + \\mathcal{K}_m$.\n\
    2. Require that $b - Ax_m \\perp \\mathcal{L}_m$. In other words, the resulting\
    \ residue cannot be part of the subspace $\\mathcal{L}_m$. Check error. Go back\
    \ to 1.\n\nAll these techniques create some kind of polynomial approximation of\
    \ the matrix inverse; the choice of $\\mathcal{L}_m$ will be important. Sometimes,\
    \ $\\mathcal{L}_m = \\mathcal{K}_m$; at other times $\\mathcal{L}_m = A\\mathcal{K}_m$.\
    \ There are many varieties of this method. We will discuss Krylov subspaces and\
    \ point out some of their properties.\n\n### Krylov Subspaces\n\nWe assume here\
    \ we have a Krylov subspace made up of\n\n$$\\mathcal{K}_m(A, v) = \\text{span}\\\
    {r_0, Ar_0, A^2r_0, \\dots, A^{m-1}r_0\\}$$\n\nAs we proceed with the iterations,\
    \ the index, $m$, increases, and so the dimension of the subspace is also increasing.\
    \ The vector $v$ has associated with it a minimal polynomial that is non-zero\
    \ of lowest degree such that $p(A)v = 0$. This degree is often called the grade\
    \ of $v$ with respect to $A$. The grade of $v$ cannot exceed the dimension $n$\
    \ of the space $R^n$. There are some interesting properties of this subspace.\
    \ We have:\n\n1. $\\mathcal{K}_m$ is the subspace of all vectors that can be written\
    \ as a polynomial of $p(A)v$ where $p$ is a polynomial of degree $\\le m - 1$.\n\
    2. If we let $\\gamma$ denote the grade of $v$, we have $\\mathcal{K}_m = \\mathcal{K}_\\\
    gamma$ for $m \\ge \\gamma$.\n3. $\\dim(\\mathcal{K}_m) = m \\iff \\text{grade}(v)\
    \ \\ge m$\n\nThe number of steps of a Krylov subspace method is limited by the\
    \ maximal Krylov subspace dimension $d$. A projection process breaks down in step\
    \ $m$ if no $x_m$ is found or if it is not unique. We are of course interested\
    \ in methods that ensure existence and uniqueness for each $x_m$ as we step along\
    \ $m \\le d$. A method is called *well-defined* if it terminates with the exact\
    \ solution in step $d$. It is called the *finite termination property*. This depends\
    \ on the properties of the matrix $A$. Let us now assume the matrix $A$ is non-singular.\
    \ We then also note the conditions\n\n$$x_m \\in x_0 + K(A, r_0) \\quad r_m \\\
    in r_0 + AK(A, r_0)$$\n\nImply the error $x - x_m$ and the residual $r_m$ can\
    \ be written in the polynomial form\n\n$x - x_m = p_m(A)(x - x_0), \\quad r_m\
    \ = p_m(A)r_0$\n\nwhere $p_m$ is a polynomial of degree at most $m$ and with value\
    \ one at the origin. We have only discussed the very preliminaries of these powerful\
    \ methods and for more details see for example the discussions in [7, 8].\n\n\
    ### Convergence Properties\n\nSince these methods have a finite number of steps,\
    \ the idea of convergence is a little different compared to, for example, Newton-Raphson,\
    \ where we could get closer and closer to the precise solution by just taking\
    \ more steps. Here, once you have reached maximal subspace dimension $d$, you\
    \ are done and should be at the exact solution (if the method is well-defined\
    \ as we just discussed). We will not go into the details here but suffice it to\
    \ say the idea of convergence and rate of convergence is quite different and does\
    \ not have their usual meaning [8].\n\n### References\n\n1. Hachtel, G. D., Brayton,\
    \ R. K., & Gustavson, F. G. (1971). The sparse tableau approach to network analysis\
    \ and design. *IEEE Transactions on Circuit Theory*, 18(1), 101–113.\n2. Ho, C.-W.,\
    \ Zein, A., Ruehli, A. E., & Brennan, P. A. (1975). The modified nodal approach\
    \ to network analysis. *IEEE Transactions on Circuits and Systems*, 22, 504–509.\n\
    3. Najm, F. N. (2010). *Circuit simulation*. Hobroken: Wiley.\n4. Lambert, J.\
    \ D. (1991). *Numerical methods for ordinary differential systems*. Chichester:\
    \ Wiley & Sons.\n5. Pedro, J., Root, D., Xu, J., & Nunes, L. (2018). *Nonlinear\
    \ circuit simulation and modeling: fundamentals for microwave design* (The Cambridge\
    \ RF and microwave engineering series). Cambridge: Cambridge University Press.\
    \ https://doi.org/10.1017/9781316492963.\n6. Kundert, K., White, J., & Sangiovanni-Vicentelli.\
    \ (1990). *Steady-state methods for simulating analog and microwave circuits*.\
    \ Norwell, MA: Kluwer Academic Publications.\n7. Press, W. H., Teukolsky, S. A.,\
    \ Vetterling, W. T., & Flannery, B. P. (2007). *Numerical recipes*. Cambridge:\
    \ Cambridge University Press.\n8. Saad, Y. (2003). *Iterative method for sparse\
    \ linear systems* (2nd ed.). Philadelphia: Society for Industrial and Applied\
    \ Mathematics."
  mdcn: "## 7.6.2 LU 分解\n\n我们在第2章中举例说明的、寻找矩阵逆的一种好得多的通用方法是 LU 分解法。要使此方法奏效，我们不需要方程的右侧，而是可以直接重写矩阵来继续[7]\n\
    \n$$Ax = LUx = b$$\n\n其中 $U$ 是右上三角矩阵，$L$ 是左下三角矩阵。然后我们只需解一组方程 $Ux = y$ 和 $Ly =\
    \ b$。由于 $LU$ 矩阵是三角矩阵，这只是一组直接的代入求解。这听起来不错，但敏锐的读者无疑会质疑以这种方式分解矩阵的复杂性。事实上，有一种非凡的程序称为\
    \ Crout 方法，可以相当容易地将矩阵分解为这两个矩阵。让我们写出\n\n$$L = \\begin{pmatrix} l_{11} & \\cdots\
    \ & 0 \\\\ \\vdots & \\ddots & \\vdots \\\\ l_{n1} & \\cdots & l_{nn} \\end{pmatrix}\
    \ \\quad U = \\begin{pmatrix} u_{11} & \\cdots & u_{1n} \\\\ \\vdots & \\ddots\
    \ & \\vdots \\\\ 0 & \\cdots & u_{nn} \\end{pmatrix}$$\n\n事实证明，$L$ 的对角线总可以选择为单位值\
    \ $l_{ii} = 1$。让我们明确写出矩阵方程 $LU = A$ 的一行：\n\n$$l_{i1}u_{1j} + l_{i2}u_{2j} + \\\
    dots + l_{in}u_{nj} = a_{ij}$$\n\n考虑到 $L$ 和 $U$ 的三角性质，我们看到左边求和中的项数强烈取决于 $i = j$\
    \ 还是 $i < j$：\n\n$$i = j : l_{i1}u_{1i} + l_{i2}u_{2i} + \\dots + l_{ii}u_{ii}\
    \ = a_{ii}$$\n$$i < j : l_{i1}u_{1j} + l_{i2}u_{2j} + \\dots + l_{ii}u_{ij} =\
    \ a_{ij}$$\n$$i > j : l_{i1}u_{1j} + l_{i2}u_{2j} + \\dots + l_{ij}u_{jj} = a_{ij}$$\n\
    \nCrout 算法现在给出以下步骤：\n\n- 设置 $l_{ii} = 1$\n- 对于每个 $j = 1, 2, \\dots, N$，执行：\n \
    \ 1. 对于 $i = 1, 2, \\dots, j$，使用 (1) 和 (2) 求解 $u_{ij} : u_{ij} = a_{ij} - \\sum_{k=1}^{i-1}\
    \ l_{ik}u_{kj}$\n  2. 对于 $i = j + 1, j + 1, \\dots, N$，使用 (3) 求解 $a_{ij}$：\n\n\
    $$l_{ij} = \\frac{1}{u_{jj}} a_{ij} - \\sum_{k=1}^{j-1} a_{ik}u_{kj}$$\n\n执行这些步骤后，会发现该程序可用于将原始\
    \ $\\boldsymbol{A}$ 替换为新的\n\n$$\\begin{pmatrix} u_{11} & u_{12} & u_{1n} \\\\\
    \ l_{21} & u_{22} & u_{2n} \\\\ l_{n1} & l_{n2} & u_{nn} \\end{pmatrix}$$\n\n\
    这就是 $\\boldsymbol{LU}$ 分量！读者自然会意识到，选主元在完成计算时再次成为关键步骤。实际上，我们 LU 分解的不是 $\\boldsymbol{A}$，而是其行置换后的版本。\n\
    \n## 7.6.3 迭代矩阵求解器\n\n迭代求解器的思想相当容易理解，[7]。假设我们有一个 $\\boldsymbol{Ax} = \\boldsymbol{b}$\
    \ 的近似解。我们称之为 $\\boldsymbol{x}_0$。那么我们有 $\\boldsymbol{x} = \\boldsymbol{x}_0 +\
    \ \\delta\\boldsymbol{x}$。我们最终得到\n\n$$\\boldsymbol{Ax} = \\boldsymbol{A}(\\boldsymbol{x}_0\
    \ + \\delta\\boldsymbol{x}) = \\boldsymbol{b}$$\n\n我们可以进一步写成 $\\boldsymbol{b}\
    \ = \\boldsymbol{b}_0 + \\delta\\boldsymbol{b}$，其中 $\\boldsymbol{A}\\delta\\boldsymbol{x}\
    \ = \\delta\\boldsymbol{b}$ 且 $\\boldsymbol{Ax}_0 = \\boldsymbol{b}_0$。我们现在可以将这些关系代入矩阵方程，我们发现\n\
    \n$$\\boldsymbol{Ax} = \\boldsymbol{A}(\\boldsymbol{x}_0 + \\delta\\boldsymbol{x})\
    \ = \\boldsymbol{b}_0 + \\delta\\boldsymbol{b} \\rightarrow \\boldsymbol{A}\\\
    delta\\boldsymbol{x} = \\boldsymbol{b} - \\boldsymbol{b}_0$$\n\n其中右侧是已知的。我们现在只需解这个方程求出\
    \ $\\delta\\boldsymbol{x}$，然后将其从我们最初的猜测 $\\boldsymbol{x}_0$ 中减去，从而得到对解的新猜测。关于收敛性等问题显然很重要，并且有很多相关的正式理论，我们现在将粗略地描述一下。\n\
    \n我们在第2章中看到，求解矩阵方程的迭代方法属于一类称为 Krylov 子空间方法的解法，在求解大型稀疏矩阵时可能非常高效。它涉及使用投影迭代以找到正确解的思想来求解[8]\n\
    \n$$\\boldsymbol{Ax} = \\boldsymbol{b}$$\n\n让我们尝试对解进行第一次猜测 $\\boldsymbol{x} \\\
    approx \\boldsymbol{x}_0$。我们定义残差\n\n$$\\boldsymbol{r}_0 = \\boldsymbol{Ax}_0 -\
    \ \\boldsymbol{b} \\qquad (7.51)$$\n\n很可能，这个残差不为零。现在可以定义一串向量为\n\n$$r_0, Ar_0,\
    \ A^2r_0, \\dots, A^{m-1}r_0$$\n\n这串向量构成一个子空间，即 Krylov 子空间 $\\mathcal{K}_m$。我们不在这里证明这一点，但可以在\
    \ [8] 中找到许多示例和更多细节。\n\n### 通用过程\n\n通用的迭代过程现在近似为：我们已经定义了 Krylov 子空间 $\\mathcal{K}_m$。现在让我们用\
    \ $\\mathcal{L}_m$ 标注另一个子空间：\n\n1. 我们从由空间 $x_0 + \\mathcal{K}_m$ 中的向量构成的子空间中取一个近似解\
    \ $x_m$。\n2. 要求 $b - Ax_m \\perp \\mathcal{L}_m$。换句话说，结果残差不能是子空间 $\\mathcal{L}_m$\
    \ 的一部分。检查误差。返回步骤 1。\n\n所有这些技术都创建了矩阵逆的某种多项式近似；$\\mathcal{L}_m$ 的选择将很重要。有时，$\\mathcal{L}_m\
    \ = \\mathcal{K}_m$；其他时候 $\\mathcal{L}_m = A\\mathcal{K}_m$。这种方法有很多变体。我们将讨论 Krylov\
    \ 子空间并指出它们的一些性质。\n\n### Krylov 子空间\n\n我们在此假设有一个由以下构成的 Krylov 子空间\n\n$$\\mathcal{K}_m(A,\
    \ v) = \\text{span}\\{r_0, Ar_0, A^2r_0, \\dots, A^{m-1}r_0\\}$$\n\n随着我们进行迭代，索引\
    \ $m$ 增加，因此子空间的维度也在增加。向量 $v$ 与一个最小多项式相关联，该多项式是非零的且次数最低，使得 $p(A)v = 0$。这个次数通常称为\
    \ $v$ 相对于 $A$ 的阶。$v$ 的阶不能超过空间 $R^n$ 的维度 $n$。这个子空间有一些有趣的性质。我们有：\n\n1. $\\mathcal{K}_m$\
    \ 是所有可以写成 $p(A)v$ 的多项式的向量的子空间，其中 $p$ 是次数 $\\le m - 1$ 的多项式。\n2. 如果我们让 $\\gamma$\
    \ 表示 $v$ 的阶，那么对于 $m \\ge \\gamma$，我们有 $\\mathcal{K}_m = \\mathcal{K}_\\gamma$。\n\
    3. $\\dim(\\mathcal{K}_m) = m \\iff \\text{grade}(v) \\ge m$\n\nKrylov 子空间方法的步数受限于最大\
    \ Krylov 子空间维度 $d$。如果找不到 $x_m$ 或者它不唯一，投影过程在步骤 $m$ 处会崩溃。我们当然对确保在 $m \\le d$ 的每一步中\
    \ $x_m$ 存在且唯一的方法感兴趣。如果一个方法在步骤 $d$ 以精确解终止，则称其为*良定义的*。这被称为*有限终止性质*。这取决于矩阵 $A$ 的性质。现在让我们假设矩阵\
    \ $A$ 是非奇异的。那么我们还注意到条件\n\n$$x_m \\in x_0 + K(A, r_0) \\quad r_m \\in r_0 + AK(A,\
    \ r_0)$$\n\n意味着误差 $x - x_m$ 和残差 $r_m$ 可以写成多项式形式\n\n$x - x_m = p_m(A)(x - x_0),\
    \ \\quad r_m = p_m(A)r_0$\n\n其中 $p_m$ 是一个次数至多为 $m$ 且在原点值为一的多项式。我们只讨论了这些强大方法的非常初步的内容，更多细节请参见例如\
    \ [7, 8] 中的讨论。\n\n### 收敛性质\n\n由于这些方法具有有限步数，收敛的概念与例如牛顿-拉夫逊法有些不同，在后者中我们可以通过采取更多步骤越来越接近精确解。在这里，一旦你达到了最大子空间维度\
    \ $d$，你就完成了，并且应该得到精确解（如果该方法如我们刚才讨论的是良定义的）。我们不会在这里深入细节，但可以说收敛和收敛率的概念相当不同，并且没有它们通常的含义[8]。\n\
    \n### 参考文献\n\n1. Hachtel, G. D., Brayton, R. K., & Gustavson, F. G. (1971). The\
    \ sparse tableau approach to network analysis and design. *IEEE Transactions on\
    \ Circuit Theory*, 18(1), 101–113.\n2. Ho, C.-W., Zein, A., Ruehli, A. E., & Brennan,\
    \ P. A. (1975). The modified nodal approach to network analysis. *IEEE Transactions\
    \ on Circuits and Systems*, 22, 504–509.\n3. Najm, F. N. (2010). *Circuit simulation*.\
    \ Hobroken: Wiley.\n4. Lambert, J. D. (1991). *Numerical methods for ordinary\
    \ differential systems*. Chichester: Wiley & Sons.\n5. Pedro, J., Root, D., Xu,\
    \ J., & Nunes, L. (2018). *Nonlinear circuit simulation and modeling: fundamentals\
    \ for microwave design* (The Cambridge RF and microwave engineering series). Cambridge:\
    \ Cambridge University Press. https://doi.org/10.1017/9781316492963.\n6. Kundert,\
    \ K., White, J., & Sangiovanni-Vicentelli. (1990). *Steady-state methods for simulating\
    \ analog and microwave circuits*. Norwell, MA: Kluwer Academic Publications.\n\
    7. Press, W. H., Teukolsky, S. A., Vetterling, W. T., & Flannery, B. P. (2007).\
    \ *Numerical recipes*. Cambridge: Cambridge University Press.\n8. Saad, Y. (2003).\
    \ *Iterative method for sparse linear systems* (2nd ed.). Philadelphia: Society\
    \ for Industrial and Applied Mathematics."
