    $$v_i = v_{in} \frac{R/2}{R/2 + 1/(j\omega C)} = v_{in} \frac{j\omega CR}{j\omega
    CR + 2}$$


    This voltage is amplified at the output to be


    $$v_o = v_i g_m R$$


    The final transfer function to the output is now an easy algebraic calculation:


    $$v_{out} = v_o \frac{g_{m,2}}{g_{m,2} + j\omega C}$$


    And finally we get


    $$v_{out} = v_{in} \frac{j\omega CR^2 g_m}{j\omega CR + 2} \frac{g_{m,2}}{g_{m,2}
    + j\omega C}$$


    with a magnitude


    $$|v_{out}| = v_{in} \frac{\omega CR^2}{\sqrt{(\omega CR)^2 + 4}} \frac{g_m}{\sqrt{(\omega
    C / g_{m,2})^2 + 1}}$$


    This response is also included in Fig. 4.11. The two solutions coincide with a
    maximum relative error of 0.0004%.


    We will in the rest of Sect. 4.4 go through a set of applications of AC analysis.
    Once the linear response of a circuit is known, a lot can be learned about its
    small signal behavior that is very useful for the circuit designer. These additional
    simulation techniques all use the AC formulation we just described. The linear
    response of circuits is very important which is why all these additional characterization
    methods have been developed.'
