  md: 'and one can write the branch equations in either an impedance or admittance
    matrix form. To highlight this further, we can write the matrix in Eq. 4.10 as


    $$\begin{pmatrix} 1 & -1 & -1 & 0 \ j\omega L & 0 & 0 & 1 \ 0 & 1 & 0 & -\frac{1}{R}
    \ 0 & 0 & 1 & -j\omega C \end{pmatrix} = \begin{pmatrix} A & 0 \ Z & Y \end{pmatrix}$$


    where Z is an impedance matrix


    $$Z = \begin{pmatrix} j\omega L & 0 & 0 \ 0 & 1 & 0 \ 0 & 0 & 1 \end{pmatrix}$$


    and


    $$A = (1 \ -1 \ -1) \text{ and } Y = \begin{pmatrix} \frac{1}{j\omega L} \ -\frac{1}{R}
    \ -j\omega C \end{pmatrix}$$


    A is often called the *reduced incidence* matrix in the literature [1–8, 10],
    and Y is an *admittance* matrix. In short form, we have


    $$\begin{pmatrix} A & 0 \ Z & Y \end{pmatrix} \begin{pmatrix} i_1 \ i_2 \ i_3
    \ v_o \end{pmatrix} = \begin{pmatrix} 0 \ v_{in} \ 0 \ 0 \end{pmatrix}$$


    This is sometimes referred to as the *reduced form* of the *sparse tableau analysis*
    (STA) form in books. In this book, we will use this formulation throughout, since
    it keeps all the current and branch voltages as explicit unknowns and it then
    is easier to examine a particular variable. One can further reduce the systems
    of equations by rewriting most of the device currents as a function of the voltage
    across them. One then arrives at the *nodal analysis* form. It is rarely useful,
    and in simulators one most commonly use what is called the *modified nodal analysis*
    (MNA) form. Here some currents have been added back into the system of equations.
    The details on these various formulations we leave for Chap. 7 and [4, 5, 10–15].
    These formula-'
