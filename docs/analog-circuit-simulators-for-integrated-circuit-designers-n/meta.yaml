    # 4.4.6 Odd Cases: Things to Watch out for


    We indicated the impossibility of implementing an inductor eliminating its current
    equation with the motivation that its impedance is zero, resulting in an infinite
    current going through it for a finite, non-zero, voltage across it. The same can
    be said about a resistor with 0 ohm. Such a device must be done as an explicit
    current device. If not, it is sort of obvious the matrix elements will become
    infinite and poorly defined. A sophisticated simulator will detect this problem
    and take precautions, but readers beware. Another more subtle problem occurs when
    we have an LC resonator with ideal LC. A series combination of such will cause
    a 0 ohm impedance at the resonance. Let us investigate what happens.


    **Ideal LC Resonator**


    It should be fairly obvious that unless we hit the resonance exactly, where the
    impedance is zero for a series combination, the algorithm will work. And in the
    unlikely event, we do hit the resonance spot on the matrix will become singular
    as expected. The guarantee to prevent this is a non-zero ohm resistor in series
    with the inductor.


    **Floating Elements**


    It is often the case in practice that all elements are not connected to other
    elements; they are floating. The matrix for such a case will be non-singular since
    the voltage on the terminals of such an element is completely undeterministic;
    any value will work. How should a simulator handle this problem? The traditional
    solution is to add a resistor and capacitor to ground from all nodes with a resistance
    value of $1/g_{min}$, where $g_{min}$ is a simulator variable that can be changed
    by the user. Also a minimum capacitance, $c_{min}$, is usually defined at each
    node to reduce the nodes’ bandwidth. See a more detailed discussion of this in
    Sect. 5.2.


    # 4.5 DC Linear Simulation


    A DC solution for a linear system is just as straightforward as the AC solution.
    All inductors are shorted and capacitors are removed. In effect we are only left
    with linear resistors and DC sources. We can take the previous example and see
    how it'
- md: "## 4.6 Transient Linear Simulation\n\nOnce we have a DC solution, we can start\
    \ a transient or time-dependent simulation. Such a simulation is mathematically\
    \ known as an initial value problem. The initial values are known at a certain\
    \ time, time zero is often a convenient choice, in transient analysis, and from\
    \ there the simulation progresses to later times. This section will describe how\
    \ such a simulation can be implemented and will show how different implementations\
    \ of differential equations lead to different characteristics of the solution.\
    \ As before we will use the Python environment to build the simulation, but the\
    \ reader is encouraged to use his or her favorite simulator in addition to verify\
    \ the various concepts. We will stick to linear elements in this section. As an\
    \ example, we will again use Fig. 4.1, but this time we will look at a solution\
    \ in the time domain.\n\nThe key in transient simulations is implementing a convenient\
    \ difference equation to approximate the differential equations. The following\
    \ sections discuss the most common difference equation approximations using the\
    \ circuit in Fig. 4.1 as a basis. One of the main difficulties with these approximations\
    \ is the resulting so-called local truncation error (LTE), and we will examine\
    \ this effect in Sect. 4.6.6 and how circuit simulators usually handle it. Finally,\
    \ we end the section on transient linear simulations with a look at an ideal LC\
    \ resonator and see how the different integration methods behave for this case.\n\
    \n### Timestep Adjustments\n\nIt is well-known how to implement a variable timestep,\
    \ and we will show such an implementation in Chap. 5, but in this chapter, we\
    \ will stick to a fixed timestep. The nonlinear circuits we will discuss in Chap.\
    \ 5 will benefit much more from an adjustable timestep, something we will demonstrate\
    \ there. The flow here will be to first pick a timestep and run the simulation\
    \ and observe the behavior. After discussing the LTE estimate, we will simply\
    \ run the simulation, and if that LTE error condition is not met at some point\
    \ in time, we will simply adjust the timestep and rerun the whole simulation.\
    \ The benefit with the fixed timestep is that the error in all the difference\
    \ equations is under better control. It is not unusual to employ this strategy\
    \ in practical circuit situations where one can set the max timestep variable\
    \ to some small value to ensure the timestep taken by the simulator is uniform.\
    \ This will often improve accuracy as we will also see in Chap. 5.\n\n### 4.6.1\
    \ Forward Euler\n\nThe forward Euler is the simplest implementation and the easiest\
    \ to start a discussion. It is almost never used in circuit simulators due to\
    \ poor stability, but it serves well as an initial point of discussion. Let us\
    \ look at a capacitor from a differential equation view point:\n\n$$i(t) = C \\\
    frac{du(t)}{dt}$$\n\nwhere $u(t)$ is the voltage across the capacitor and $i(t)$\
    \ is the current through it at time $t$. To find a numerical implementation, we\
    \ assume we know the solution at time $t = t_n$, and we want to know the solution\
    \ at $t = t_{n+1}$. Using the forward Euler implementation, we find as in Chap.\
    \ 1\n\n$$i(t_n) = C \\frac{u(t_{n+1}) - u(t_n)}{\\Delta t} \\rightarrow u(t_{n+1})\
    \ = u(t_n) + \\Delta t \\frac{i(t_n)}{C} \\quad (4.46)$$\n\nNote that all entities\
    \ on the right-hand side are known. The equation states that the new voltage across\
    \ the capacitor is determined by the old voltage across it plus another known\
    \ term. It looks like an independent voltage source. We already know the matrix\
    \ equation signature of such a voltage source from Sect. 3.3. The equation we\
    \ have is a bit simplified in the voltage $u(t)$ across the capacitor, and we\
    \ need to spell it out. We assume the capacitor sits between two nodes $a$ and\
    \ $b$, and we find $u(t) = v_a(t) - v_b(t)$.\n\n$$\\begin{pmatrix} & v_a & v_b\
    \ & i_V \\\\ v_a & & & -1 \\\\ v_b & & & +1 \\\\ i_V & +1 & -1 & \\end{pmatrix}\
    \ = \\begin{pmatrix} \\ \\ \\ v_a(t_n) - v_b(t_n) + \\Delta t \\frac{i_V(t_n)}{C}\
    \ \\end{pmatrix} \\quad (4.47)$$\n\nA pseudocode could look like\n\n```\nif DeviceType\
    \ = 'Capacitor':\n    Matrix[DeviceBranchIndex][DeviceNode1Index] = 1\n    Matrix[DeviceBranchIndex][DeviceNode2Index]\
    \ = -1\n    rhs[DeviceBranchIndex] = V[DeviceNode1Index]-V[DeviceNode2Index]+deltaT*I[DeviceBranchIndex]/DeviceValue\n\
    \    // This is the branch equation row, indicated by the variable DeviceBranchRow,\n\
    \    // The columns are set by the DeviceNode1Columns and DeviceNode2Column variables\n\
    \    Matrix[Nodes.index[DeviceNode1Index]][DeviceBranchIndex] = 1\n    Matrix[Nodes.index[DeviceNode2Index]][DeviceBranchIndex]\
    \ = -1\n    // These are the two KCL equation entries\n```\n\nLikewise looking\
    \ at an inductor, we get\n\n$$u(t) = L \\frac{di(t)}{dt}$$\n\nWith the forward\
    \ Euler implementation, we find\n\n$$u(t_n) = L \\frac{i(t_{n+1}) - i(t_n)}{\\\
    Delta t} \\rightarrow i(t_{n+1}) = i(t_n) + \\Delta t \\frac{u(t_n)}{L}$$\n\n\
    This looks like an independent current source, and an inductor implementation\
    \ will have a matrix equation signature like\n\n$$\\begin{pmatrix} & v_a & v_b\
    \ & i_L \\\\ v_a & & -1 & \\\\ v_b & & +1 & \\\\ i_L & & & 1 \\end{pmatrix} =\
    \ \\begin{pmatrix} \\ \\ \\ i_L(t_n) + \\Delta t \\frac{v_a(t_n) - v_b(t_n)}{L}\
    \ \\end{pmatrix}$$\n\nwhere we have expanded the voltage across the inductor $u(t)\
    \ = v_a(t) - v_b(t)$.\n\n```\nif DeviceType = 'Inductor':\n    Matrix[DeviceBranchIndex][DeviceBranchIndex]\
    \ = 1\n    rhs[DeviceBranchIndex] = I[DeviceBranchIndex]+deltaT* (V[DeviceNode1]-V[DeviceNode2])/DeviceValue\n\
    \    // This is the branch equation row, indicated by the variable DeviceBranchIndex,\n\
    \    Matrix[Nodes.index[DeviceNode1Index]][DeviceBranchIndex]=1\n    Matrix[Nodes.index[DeviceNode2Index]][DeviceBranchIndex]=-1\n\
    \    // These are the two KCL equation entries\n```\n\n### Simulation\n\nWe have\
    \ constructed a way to implement a capacitor and an inductor using Euler's forward\
    \ method. The resistor implementation remains the same as we had in Sect. 3.1.\
    \ We can now build a simple simulator code where the timestep is a constant, and\
    \ we simulate to a stop time (see Sect. 4.9.5).\n\n```\n*\nv1 in 0 sin(1G)\nvs\
    \ vs 0 0\nl1 in a 1e-9\nr1 a b 100\nc1 a b 1.2e-12\nr2 b vs 230\nnetlist 4.7\n\
    ```\n\nLet us run this code with netlist 4.7 with a few choices of timestep. Let\
    \ us try deltaT = 1 ps, 10 ps, 100 ps. The results are shown in Fig. 4.28.\n\n\
    What is happening? It seems that to get anything reasonable, we need to take really\
    \ small timesteps. As the reader has probably guessed already, this is the infamous\
    \ instability of the forward Euler method. The timestep required is set by smallest\
    \ capacitor, and you can imagine in a real circuit implementation, where there\
    \ are plenty of very small capacitors, how difficult it is to use in practice.\
    \ Fundamentally, this is the reason why this method is never used. It will take\
    \ forever to simulate basic circuits. We need to come up with something better\
    \ and the next section will do so.\n\n**Fig. 4.28** Forward Euler simulation with\
    \ timestep **(a)** 1 ps, **(b)** 10 ps, **(c)** 100 ps\n\n### 4.6.2 Backward Euler\n\
    \nThe forward Euler implementation as we saw is fairly straightforward. The drawback\
    \ using that method is its poor stability. We saw in the previous section we needed\
    \ to take small timesteps to get anywhere. The backward Euler is a tad more complex\
    \ as we will now show, but it is much more stable.\n\nLet us start with the difference\
    \ equation implementation of a capacitor using backward Euler:\n\n$$i(t_{n+1})\
    \ = C \\frac{u(t_{n+1}) - u(t_n)}{\\Delta t} \\rightarrow u(t_{n+1}) = u(t_n)\
    \ + \\Delta t \\frac{i(t_{n+1})}{C} \\quad (4.51)$$\n\nThe right-hand side of\
    \ this equation depends on the new timestep, so a matrix signature will be more\
    \ complicated, but let us express it in terms of a current source so we can minimize\
    \ the size of the matrix like we discovered in the discussion on inductors:\n\n\
    $$i(t_{n+1}) = \\frac{C}{\\Delta t} (v_a(t_{n+1}) - v_b(t_{n+1})) - \\frac{C}{\\\
    Delta t} (v_a(t_n) - v_b(t_n)) \\quad (4.52)$$\n\nThe matrix equation now becomes\n\
    \n$$\\begin{pmatrix} & v_a & v_b & i_C \\\\ v_a & & & 1 \\\\ v_b & & & -1 \\\\\
    \ i_C & -\\frac{C}{\\Delta t} & \\frac{C}{\\Delta t} & 1 \\end{pmatrix} = \\begin{pmatrix}\
    \ \\ \\ \\ -\\frac{C}{\\Delta t} (v_a(t_n) - v_b(t_n)) \\end{pmatrix} \\quad (4.53)$$\n\
    \nA pseudocode will look like\n\n```\nif DeviceType = 'Capacitor':\n    Matrix[DeviceBranchIndex][DeviceNode1Index]\
    \ = 1\n    Matrix[DeviceBranchIndex][DeviceNode2Index] = -1\n    rhs[DeviceBranchIndex]\
    \ = V[DeviceNode1Index]-V[DeviceNode2Index]+deltaT*I[DeviceBranchIndex]/DeviceValue\n\
    \    // This is the branch equation row, indicated by the variable DeviceBranchRow,\n\
    \    // The columns are set by the DeviceNode1Columns and DeviceNode2Column variables\n\
    \    Matrix[Nodes.index[DeviceNode1Index]][DeviceBranchIndex] = 1\n    Matrix[Nodes.index[DeviceNode2Index]][DeviceBranchIndex]\
    \ = -1\n    // These are the two KCL equation entries\n```"
  mdcn: "## 4.6 瞬态线性仿真\n\n一旦我们获得了直流解，就可以开始瞬态或时域仿真。这种仿真在数学上被称为初值问题。在瞬态分析中，初始值在某个时刻是已知的（时间零点通常是一个方便的选择），仿真从该时刻向后推进。本节将描述如何实现这种仿真，并展示微分方程的不同实现方式如何导致解的不同特性。与之前一样，我们将使用Python环境来构建仿真，但鼓励读者同时使用自己熟悉的仿真器来验证各种概念。本节我们将坚持使用线性元件。作为示例，我们将再次使用图4.1，但这次我们将观察时域中的解。\n\
    \n瞬态仿真的关键在于实现一个方便的差分方程来近似微分方程。以下各节将以图4.1中的电路为基础，讨论最常见的差分方程近似方法。这些近似方法的主要困难之一是由此产生的所谓局部截断误差（LTE），我们将在第4.6.6节中研究这种影响以及电路仿真器通常如何处理它。最后，我们将通过观察理想LC谐振器来结束关于瞬态线性仿真的讨论，并看看不同的积分方法在这种情况下如何表现。\n\
    \n### 时间步长调整\n\n如何实现可变时间步长是众所周知的，我们将在第5章中展示这样的实现，但在本章中，我们将坚持使用固定时间步长。我们将在第5章讨论的非线性电路将从可变时间步长中获益更多，我们将在那里进行演示。这里的流程是首先选择一个时间步长，运行仿真并观察行为。在讨论LTE估计之后，我们将直接运行仿真，如果在某个时间点不满足LTE误差条件，我们将调整时间步长并重新运行整个仿真。固定时间步长的好处是所有差分方程中的误差都得到更好的控制。在实际电路情况中采用这种策略并不少见，可以将最大时间步长变量设置为某个小值，以确保仿真器采用的时间步长是均匀的。这通常会提高精度，我们将在第5章中看到这一点。\n\
    \n### 4.6.1 前向欧拉法\n\n前向欧拉法是最简单的实现，也是开始讨论最容易的方法。由于稳定性差，它在电路仿真器中几乎从不使用，但它作为讨论的起点非常合适。让我们从微分方程的角度来看一个电容器：\n\
    \n$$i(t) = C \\frac{du(t)}{dt}$$\n\n其中 $u(t)$ 是电容器两端的电压，$i(t)$ 是在时间 $t$ 流过它的电流。为了找到数值实现，我们假设在时间\
    \ $t = t_n$ 时已知解，并且我们想知道在 $t = t_{n+1}$ 时的解。使用前向欧拉实现，我们发现如第1章所述\n\n$$i(t_n) =\
    \ C \\frac{u(t_{n+1}) - u(t_n)}{\\Delta t} \\rightarrow u(t_{n+1}) = u(t_n) +\
    \ \\Delta t \\frac{i(t_n)}{C} \\quad (4.46)$$\n\n注意，右侧的所有量都是已知的。该方程表明，电容器上的新电压由其旧电压加上另一个已知项决定。它看起来像一个独立的电压源。我们已经从第3.3节知道了这种电压源的矩阵方程形式。我们得到的方程在电容器两端的电压\
    \ $u(t)$ 方面有点简化，我们需要将其展开。我们假设电容器位于两个节点 $a$ 和 $b$ 之间，并且我们得到 $u(t) = v_a(t) - v_b(t)$。\n\
    \n$$\\begin{pmatrix} & v_a & v_b & i_V \\\\ v_a & & & -1 \\\\ v_b & & & +1 \\\\\
    \ i_V & +1 & -1 & \\end{pmatrix} = \\begin{pmatrix} \\ \\ \\ v_a(t_n) - v_b(t_n)\
    \ + \\Delta t \\frac{i_V(t_n)}{C} \\end{pmatrix} \\quad (4.47)$$\n\n伪代码可能如下所示\n\
    \n```\nif DeviceType = 'Capacitor':\n    Matrix[DeviceBranchIndex][DeviceNode1Index]\
    \ = 1\n    Matrix[DeviceBranchIndex][DeviceNode2Index] = -1\n    rhs[DeviceBranchIndex]\
    \ = V[DeviceNode1Index]-V[DeviceNode2Index]+deltaT*I[DeviceBranchIndex]/DeviceValue\n\
    \    // This is the branch equation row, indicated by the variable DeviceBranchRow,\n\
    \    // The columns are set by the DeviceNode1Columns and DeviceNode2Column variables\n\
    \    Matrix[Nodes.index[DeviceNode1Index]][DeviceBranchIndex] = 1\n    Matrix[Nodes.index[DeviceNode2Index]][DeviceBranchIndex]\
    \ = -1\n    // These are the two KCL equation entries\n```\n\n同样地，观察一个电感器，我们得到\n\
    \n$$u(t) = L \\frac{di(t)}{dt}$$\n\n使用前向欧拉实现，我们发现\n\n$$u(t_n) = L \\frac{i(t_{n+1})\
    \ - i(t_n)}{\\Delta t} \\rightarrow i(t_{n+1}) = i(t_n) + \\Delta t \\frac{u(t_n)}{L}$$\n\
    \n这看起来像一个独立的电流源，电感器的实现将具有如下矩阵方程形式\n\n$$\\begin{pmatrix} & v_a & v_b & i_L \\\\\
    \ v_a & & -1 & \\\\ v_b & & +1 & \\\\ i_L & & & 1 \\end{pmatrix} = \\begin{pmatrix}\
    \ \\ \\ \\ i_L(t_n) + \\Delta t \\frac{v_a(t_n) - v_b(t_n)}{L} \\end{pmatrix}$$\n\
    \n其中我们已经展开了电感器两端的电压 $u(t) = v_a(t) - v_b(t)$。\n\n```\nif DeviceType = 'Inductor':\n\
    \    Matrix[DeviceBranchIndex][DeviceBranchIndex] = 1\n    rhs[DeviceBranchIndex]\
    \ = I[DeviceBranchIndex]+deltaT* (V[DeviceNode1]-V[DeviceNode2])/DeviceValue\n\
    \    // This is the branch equation row, indicated by the variable DeviceBranchIndex,\n\
    \    Matrix[Nodes.index[DeviceNode1Index]][DeviceBranchIndex]=1\n    Matrix[Nodes.index[DeviceNode2Index]][DeviceBranchIndex]=-1\n\
    \    // These are the two KCL equation entries\n```\n\n### 仿真\n\n我们已经构建了一种使用欧拉前向方法实现电容器和电感器的方法。电阻器的实现与我们在第3.1节中的一样。我们现在可以构建一个简单的仿真器代码，其中时间步长是常数，我们仿真到一个停止时间（参见第4.9.5节）。\n\
    \n```\n*\nv1 in 0 sin(1G)\nvs vs 0 0\nl1 in a 1e-9\nr1 a b 100\nc1 a b 1.2e-12\n\
    r2 b vs 230\nnetlist 4.7\n```\n\n让我们使用网表4.7运行这段代码，选择几个不同的时间步长。让我们尝试 deltaT = 1\
    \ ps, 10 ps, 100 ps。结果显示在图4.28中。\n\n发生了什么？似乎为了得到任何合理的结果，我们需要取非常小的时间步长。正如读者可能已经猜到的，这就是臭名昭著的前向欧拉方法的不稳定性。所需的时间步长由最小的电容器决定，你可以想象在实际的电路实现中，存在大量非常小的电容器，这在实践中使用起来有多困难。从根本上说，这就是这种方法从未被使用的原因。仿真基本电路将花费永远的时间。我们需要想出更好的方法，下一节将会这样做。\n\
    \n**图4.28** 时间步长为 **(a)** 1 ps, **(b)** 10 ps, **(c)** 100 ps 的前向欧拉仿真\n\n### 4.6.2\
    \ 后向欧拉法\n\n正如我们所看到的，前向欧拉实现相当简单。使用该方法的缺点是其稳定性差。我们在上一节中看到，为了取得任何进展，我们需要取小的时间步长。后向欧拉法稍微复杂一些，正如我们现在将要展示的，但它要稳定得多。\n\
    \n让我们从使用后向欧拉法的电容器差分方程实现开始：\n\n$$i(t_{n+1}) = C \\frac{u(t_{n+1}) - u(t_n)}{\\\
    Delta t} \\rightarrow u(t_{n+1}) = u(t_n) + \\Delta t \\frac{i(t_{n+1})}{C} \\\
    quad (4.51)$$\n\n该方程的右侧依赖于新的时间步长，因此矩阵形式会更复杂，但让我们将其表示为电流源的形式，以便我们可以像在电感器讨论中发现的那样最小化矩阵的大小：\n\
    \n$$i(t_{n+1}) = \\frac{C}{\\Delta t} (v_a(t_{n+1}) - v_b(t_{n+1})) - \\frac{C}{\\\
    Delta t} (v_a(t_n) - v_b(t_n)) \\quad (4.52)$$\n\n矩阵方程现在变为\n\n$$\\begin{pmatrix}\
    \ & v_a & v_b & i_C \\\\ v_a & & & 1 \\\\ v_b & & & -1 \\\\ i_C & -\\frac{C}{\\\
    Delta t} & \\frac{C}{\\Delta t} & 1 \\end{pmatrix} = \\begin{pmatrix} \\ \\ \\\
    \ -\\frac{C}{\\Delta t} (v_a(t_n) - v_b(t_n)) \\end{pmatrix} \\quad (4.53)$$\n\
    \n伪代码将如下所示\n\n```\nif DeviceType = 'Capacitor':\n    Matrix[DeviceBranchIndex][DeviceNode1Index]\
    \ = 1\n    Matrix[DeviceBranchIndex][DeviceNode2Index] = -1\n    rhs[DeviceBranchIndex]\
    \ = V[DeviceNode1Index]-V[DeviceNode2Index]+deltaT*I[DeviceBranchIndex]/DeviceValue\n\
    \    // This is the branch equation row, indicated by the variable DeviceBranchRow,\n\
    \    // The columns are set by the DeviceNode1Columns and DeviceNode2Column variables\n\
    \    Matrix[Nodes.index[DeviceNode1Index]][DeviceBranchIndex] = 1\n    Matrix[Nodes.index[DeviceNode2Index]][DeviceBranchIndex]\
    \ = -1\n    // These are the two KCL equation entries\n```"
