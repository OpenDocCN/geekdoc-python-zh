    \n$P(q) = \\sum_{n=0}^{\\infty} p(n)q^n$\n\n其中 $q$ 是一个形式变量。$P(q)$ 的系数提供了分拆函数的值。\n\
    \n### 3 示例计算\n\n作为一个例子，让我们使用一个 Python 代码片段来计算 $n = 0, 1, 2, 3, 4$ 时的分拆函数 $p(n)$：\n\
    \n```python\ndef partition_function(n):\n    p = [0] * (n + 1)\n    p[0] = 1\n\
    \n    for i in range(1, n + 1):\n        for j in range(i, n + 1):\n         \
    \   p[j] += p[j - i]\n\n    return p\n\nn = 4\n\n# Calculate partition function\
    \ for n = 0, 1, 2, 3, 4\np = partition_function(n)\nprint(f\"Partition function\
    \ p(n) for n = 0 to {n}: {p}\")\n```\n\n在此代码片段中，我们定义了函数 `partition_function(n)`，它使用动态规划计算分拆函数。计算得到的\
