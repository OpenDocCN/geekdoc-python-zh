    # Chinese Remainder Theorem


    # Statement and Proof


    # 1 The Chinese Remainder Theorem


    The Chinese Remainder Theorem (CRT) is a fundamental result in modular arithmetic
    that provides a solution to a system of congruences.


    **Theorem 7.1 (Chinese Remainder Theorem):** Let $m_1, m_2, \dots, m_k$ be pairwise
    coprime positive integers and let $a_1, a_2, \dots, a_k$ be arbitrary integers.
    Then the system of congruences:


    $$x \equiv a_1 \pmod{m_1}$$

    $$x \equiv a_2 \pmod{m_2}$$

    $$\vdots$$

    $$x \equiv a_k \pmod{m_k}$$


    has a unique solution modulo $M = m_1 m_2 \dots m_k$.


    # 2 Proof of the Chinese Remainder Theorem


    To prove the Chinese Remainder Theorem, we will show the existence and uniqueness
    of the solution.


    **Existence:** To prove the existence of a solution, we can construct a specific
    solution using the method of iterated remainders. Let $M_i = M/m_i$, and let $N_i$
    be the modular inverse of $M_i$ modulo $m_i$. The solution $x$ can be obtained
    by taking the sum of products:


    $$x = \sum_{i=1}^{k} a_i M_i N_i \pmod{M}$$


    It can be shown that this solution satisfies all the congruences in the system.


    **Uniqueness:** To prove the uniqueness of the solution, suppose that $x_1$ and
    $x_2$ are two solutions to the system of congruences. We will show that $x_1 \equiv
    x_2 \pmod{M}$.


    By the congruences, we have:'
