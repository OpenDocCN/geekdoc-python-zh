    # Divisibility


    Divisibility is a fundamental concept in number theory that captures the notion
    of one number being evenly divisible by another. We say that a nonzero integer
    $a$ is divisible by another nonzero integer $b$ (denoted as $b \mid a$) if there
    exists an integer $c$ such that $a = b \cdot c$. In this case, $b$ is commonly
    referred to as the divisor or the factor of $a$, while $a$ is known as the multiple
    or the product of $b$.


    # 1 Divisibility Properties


    The concept of divisibility comes with several key properties:


    +   - **Reflexivity**: Every nonzero integer $a$ is divisible by itself, i.e.,
    $a \mid a$.

    - **Transitivity**: If $a \mid b$ and $b \mid c$, then $a \mid c$. In other words,
    if $a$ divides $b$ and $b$ divides $c$, then $a$ divides $c$.

    - **Linearity**: For any integers $a$, $b$, and $c$, if $a \mid b$ and $a \mid
    c$, then $a$ divides any linear combination of $b$ and $c$. Specifically, if $a
    \mid b$ and $a \mid c$, then $a \mid (mb + nc)$ for any integers $m$ and $n$.

    - **Cancellation**: If $a \mid b$ and $a$ is nonzero, then $\frac{b}{a}$ is an
    integer. Conversely, if $\frac{b}{a}$ is an integer, then $a \mid b$.'
