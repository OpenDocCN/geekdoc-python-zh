    # Multiplicative Functions


    # Definitions and Examples


    In this chapter, we delve into the concept of multiplicative functions, which
    play a crucial role in number theory. We define multiplicative functions and provide
    examples to illustrate their properties and applications.


    # 1 Definition of Multiplicative Functions


    A function $f : \mathbb{N} \to \mathbb{C}$ is called *multiplicative* if it satisfies
    the following two conditions for all positive integers $m$ and $n$ with $\gcd(m,
    n) = 1$:


    $$f(1) = 1$$

    $$f(mn) = f(m)f(n)$$


    In other words, a multiplicative function is a function that preserves the multiplication
    property when applied to coprime numbers.


    # 2 Examples of Multiplicative Functions


    Let''s consider some examples of multiplicative functions to gain a better understanding
    of their properties:


    +   - The *identity function*, denoted by $I$, is defined as $I(n) = n$ for all
    positive integers $n$. This is a trivial example of a multiplicative function,
    as it satisfies both conditions: $I(1) = 1$ and $I(mn) = mn = I(m)I(n)$.

    - The *constant function*, denoted by $c$, is defined as $c(n) = c$ for all positive
    integers $n$. This is another simple example of a multiplicative function, as
    it satisfies both conditions: $c(1) = c$ and $c(mn) = c = c(m)c(n)$.

    - The well-known *Euler''s totient function*, denoted by $\phi(n)$, counts the
    number of positive integers coprime to $n$ in the range from 1 to $n$. Euler''s
    totient function is a multiplicative function, which can be seen from its properties.
    For example, if $m$ and $n$ are coprime, then $\phi(mn) = \phi(m)\phi(n)$.'
