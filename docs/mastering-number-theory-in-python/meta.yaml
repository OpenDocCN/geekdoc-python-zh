    # 1 The ABC Conjecture


    Let $a, b, c$ be positive coprime integers such that $a + b = c$ and $rad(abc)$
    represents the product of distinct prime factors of $abc$. The ABC conjecture
    asserts that for any positive real number $\epsilon > 0$, there exist only finitely
    many triples $a, b, c$ satisfying the inequality:


    $$\frac{c}{rad(abc)^{1+\epsilon}} > 1$$


    In other words, the conjecture states that there is a limit to the "quality" of
    solutions where $c$ is much larger than the radical of $abc$.


    # 2 Implications


    The ABC conjecture has extensive implications for various problems in number theory.
    Here are some notable consequences:


    # Fermat''s Last Theorem


    The ABC conjecture implies a weakened version of Fermat''s Last Theorem, which
    states that there are no nontrivial integer solutions to the equation $x^n + y^n
    = z^n$ for $n > 2$. While the full proof of Fermat''s Last Theorem was given by
    Andrew Wiles in 1994, the ABC conjecture provides an alternative approach to proving
    certain cases or weaker versions of the theorem.'
