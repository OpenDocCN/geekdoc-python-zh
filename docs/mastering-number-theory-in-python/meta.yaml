    # # Chapter 35


    # # Chebyshev’s Theorem


    # ## Statements and Implications


    Chebyshev’s Theorem, named after the Russian mathematician Pafnuty Chebyshev,
    provides bounds on the difference between the number of primes and the number
    of composite numbers. It is a fundamental result in analytic number theory and
    plays a crucial role in understanding the distribution of prime numbers.


    # ### 1 First Statement


    The first statement of Chebyshev’s Theorem asserts that there exist constants
    $C_1$ and $C_2$ such that for all positive integers $n$, we have:


    $$C_1 \frac{n}{\ln(n)} < \pi(n) < C_2 \frac{n}{\ln(n)},$$


    where $\pi(n)$ represents the number of primes less than or equal to $n$.

    This inequality implies that no matter how large a positive integer $n$ is, the
    ratio $\frac{\pi(n)}{n/\ln(n)}$ is bounded above and below by positive constants
    $C_1$ and $C_2$. In other words, the prime counting function $\pi(n)$ behaves
    asymptotically like $\frac{n}{\ln(n)}$.


    # ### 2 Second Statement


    The second statement of Chebyshev’s Theorem strengthens the first statement by
    proving the existence of additional bounds. It states that there are constants
    $C_3$ and $C_4$ such that for all positive integers $n$:


    $$C_3 \frac{n}{\ln(n)} \ln 2 < \theta(n) < C_4 \frac{n}{\ln(n)} \ln 2,$$


    where $\theta(n)$ represents the number of composite numbers less than or equal
    to $n$.

    This statement establishes a similar behavior for the composite counting function
    $\theta(n)$, bounded above and below by positive constants times $\frac{n}{\ln(n)}
    \ln 2$. It further demonstrates the dual nature between primes and composites.'
