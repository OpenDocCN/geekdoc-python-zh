    # Introduction to Number Theory


    # Overview and Historical Background


    Number theory is a branch of mathematics that deals with the properties and relationships
    of integers. It has a long and rich history, dating back to ancient civilizations
    such as Babylon, Egypt, and Greece. However, the formal development of number
    theory as a mathematical discipline began in the 19th century, with the works
    of mathematicians like Carl Friedrich Gauss and Pierre-Simon Laplace.


    Number theory has both theoretical and practical applications. Theoretical number
    theory seeks to explore the fundamental properties of numbers and their relationships,
    while applied number theory finds applications in areas such as cryptography,
    computer science, and physics.


    # Basic Concepts and Terminology


    To develop a solid foundation in number theory, we must first familiarize ourselves
    with some basic concepts and terminology.


    # 1 Natural Numbers


    We begin by defining the set of natural numbers $\mathbb{N}$ as the set of positive
    integers: $\mathbb{N} = \{1, 2, 3, \dots\}$. The natural numbers are the building
    blocks of number theory, and many concepts in number theory are based on properties
    of natural numbers.


    In Python, we can represent the set of natural numbers using the built-in `range`
    function:


    ```

    naturals = list(range(1, n + 1))

    ```


    # 2 Peano Axioms


    The Peano axioms provide a rigorous foundation for the natural numbers. They consist
    of the following five statements:


    +   - **Peano Axiom 1:** 1 is a natural number.

    - **Peano Axiom 2:** Every natural number $n$ has a unique successor $S(n)$, which
    is also a natural number.'
