    # Basic Concepts from Probability Theory


    To apply probabilistic methods in number theory, we first need to establish some
    foundational concepts from probability theory. In particular, we focus on the
    notion of random variables, probability distributions, and expected values.


    # 1 Random Variables


    In probability theory, a random variable is a mathematical function that maps
    the outcomes of a random experiment to real numbers. In the context of number
    theory, we often consider random variables that encode number-theoretic properties
    of interest. For example, we might define a random variable that represents the
    number of prime factors of an integer chosen at random.

    Formally, a random variable $X$ is defined as a function $X : \Omega \rightarrow
    \mathbb{R}$, where $\Omega$ is the sample space of possible outcomes. Depending
    on the context, the sample space $\Omega$ could be finite, countably infinite,
    or uncountably infinite.


    # 2 Probability Distributions


    A probability distribution describes the likelihood of various outcomes for a
    random variable. It assigns probabilities to different values the random variable
    can take. There are different types of probability distributions, including discrete
    distributions and continuous distributions.

    In terms of number theory, we often encounter discrete probability distributions.
    For example, we can define a probability distribution that models the likelihood
    of a randomly selected integer having a certain number of prime factors.

    The probability distribution of a random variable can be fully described by its
    probability mass function (PMF) or probability density function (PDF). The PMF
    or PDF encodes the probability of each possible outcome.'
  - '[PAGE 171]


    # 3 Expected Values


    The expected value of a random variable provides a measure of its average value
    or central tendency. It captures the long-term behavior of the random variable.
    For discrete random variables, the expected value is computed as the sum of the
    products of each outcome and its corresponding probability. Mathematically, for
    a discrete random variable $X$ with probability mass function $p(x)$, the expected
    value is defined as:


    $$\mathbb{E}[X] = \sum_{x} x \cdot p(x)$$


    The expected value provides valuable insight into the behavior of the random variable
    and can be used to make predictions or draw conclusions about the underlying phenomenon.


    # Erdős-Kac Theorem


    The Erdős-Kac theorem is a remarkable result in number theory that applies probabilistic
    methods to study the distribution of prime factors of integers. It provides a
    probabilistic model for the number of prime factors of a randomly chosen integer
    and establishes important connections between number theory and probability theory.


    # 1 Statement


    The Erdős-Kac theorem states that as $n$ tends to infinity, the number of prime
    factors of a randomly selected integer $N$ approaches a Poisson distribution with
    parameter $\lambda = \log \log n$.


    More precisely, if $N$ is an integer chosen at random from the set $\{1, 2, \ldots,
    n\}$ with uniform distribution, and $P_N(k)$ denotes the probability that $N$
    has exactly $k$ prime factors, then for any fixed $k$,


    $$\lim_{n \to \infty} P_N(k) = e^{-\lambda} \frac{\lambda^k}{k!}$$


    where $\lambda = \log \log n$.


    This result implies that the distribution of the number of prime factors of a
    randomly chosen integer follows a Poisson distribution, which is a fundamental
    concept in probability theory.


    # 2 Implications


    The Erdős-Kac theorem has important implications for the study of prime numbers
    and their distribution. It provides a probabilistic model that accurately captures
    certain aspects of the distribution of prime factors.


    By establishing the connection between number theory and probability theory, the
    Erdős-Kac theorem allows researchers to apply powerful probabilistic tools and
    reasoning to investigate number-theoretic phenomena. It opens up avenues for further
    investigation and exploration of the behavior of prime factors and the distribution
    of prime numbers.'
