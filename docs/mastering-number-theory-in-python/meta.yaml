    \n换句话说，大型随机酉矩阵的特征值均匀地填满复平面上的单位圆盘。\n\n### Python实现\n\n为了从计算角度展示圆律，我们可以生成随机酉矩阵并计算其特征值。通过可视化特征值分布，我们可以观察到圆律所指示的圆形模式。\n\
    \n以下是一个实现该计算的Python代码片段：\n\n```python\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\n\n# Set the dimension of the random matrix\nN = 1000\n\n# Generate a\
    \ random unitary matrix\nH = np.random.randn(N, N) + 1j * np.random.randn(N, N)\n\
