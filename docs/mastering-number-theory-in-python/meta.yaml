    # Fermat''s Little Theorem


    # Statement and Proof


    # 1 Fermat''s Little Theorem


    Fermat''s Little Theorem is a fundamental result in number theory that provides
    a relationship between prime numbers and modular arithmetic.


    **Theorem 8.1 (Fermat''s Little Theorem):** Let $p$ be a prime number and $a$
    be an integer not divisible by $p$. Then, we have the congruence:


    $$a^{p-1} \equiv 1 \pmod{p}$$


    # 2 Proof of Fermat''s Little Theorem


    To prove Fermat''s Little Theorem, we consider the set $S = \{a, 2a, 3a, \ldots,
    (p-1)a\}$. Note that none of the elements in $S$ are divisible by $p$.


    We can rearrange the elements in $S$ modulo $p$ as follows:


    $$S \equiv \{1a, 2a, 3a, \ldots, (p-1)a\} \equiv \{1, 2, 3, \ldots, p-1\} \pmod{p}$$


    If we take the product of all the elements in $S$, modulo $p$, we obtain:


    $$\prod_{i=1}^{p-1} (ia) \equiv \prod_{i=1}^{p-1} i \pmod{p}$$

    $$a^{p-1}(p-1)! \equiv (p-1)! \pmod{p}$$


    Since $p$ is prime, $(p-1)! \not\equiv 0 \pmod{p}$, and we can cancel $(p-1)!$
    from both sides of the congruence:


    $$a^{p-1} \equiv 1 \pmod{p}$$


    Hence, we have proved Fermat''s Little Theorem.'
