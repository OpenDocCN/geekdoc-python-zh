    \n### 分解问题\n\n给定一个正整数 $N$，分解问题涉及找到它的素因子，即能整除 $N$ 且没有余数的素数。数学上，如果 $p$ 是 $N$ 的一个素因子，可以表示为\
    \ $p|N$。最终目标是将 $N$ 表示为其素因子的乘积，即 $N = p_1^{e_1} \\cdot p_2^{e_2} \\cdot \\dots\
