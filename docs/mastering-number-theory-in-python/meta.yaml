- md: '## 25 General Number Field Sieve (GNFS)


    ### Introduction


    The General Number Field Sieve (GNFS) is the most efficient classical algorithm
    known for factoring integers larger than $10^{100}$. It is a generalization of
    the Special Number Field Sieve (SNFS), which was originally developed to factor
    numbers of the form $r^n \pm s$ for small $r$ and $s$. The GNFS can be applied
    to any integer, but its performance depends on the algebraic properties of the
    number being factored.


    The algorithm can be divided into several main phases:


    - **Polynomial Selection**: Finding two irreducible polynomials $f(x)$ and $g(x)$
    with integer coefficients that share a common root $m$ modulo the integer $N$
    to be factored. The quality of these polynomials significantly impacts the overall
    running time.

    - **Sieving (Relation Collection)**: Searching for pairs $(a, b)$ of coprime integers
    such that the norms of the algebraic numbers $a - b\alpha$ (where $\alpha$ is
    a root of $f$) and $a - b\beta$ (where $\beta$ is a root of $g$) are smooth over
    predefined factor bases. This phase is highly parallelizable.

    - **Linear Algebra**: Constructing a large, sparse matrix over $\mathbb{F}_2$
    from the relations found during sieving and finding a large set of linearly dependent
    vectors (a null space vector). This is typically done using block Lanczos or block
    Wiedemann algorithms.

    - **Square Root**: Combining the dependencies from the linear algebra phase to
    compute a square root in the appropriate number fields, which yields a non-trivial
    factor of $N$ via a GCD computation.


    The complexity of the GNFS is sub-exponential, specifically $L_N\left[\frac{1}{3},
    \left(\frac{64}{9}\right)^{1/3}\right]$ in L-notation, which is faster than any
    known polynomial-time algorithm for general integer factorization. The practical
    implementation of GNFS involves sophisticated software packages such as GGNFS
    and CADO-NFS.'
  mdcn: '## 25 一般数域筛法 (GNFS)


    ### 简介


    一般数域筛法 (GNFS) 是目前已知对大于 $10^{100}$ 的整数进行因数分解最高效的经典算法。它是特殊数域筛法 (SNFS) 的推广，后者最初是为分解形如
    $r^n \pm s$（其中 $r$ 和 $s$ 较小）的数而开发的。GNFS 可应用于任何整数，但其性能取决于待分解数的代数性质。


    该算法可分为几个主要阶段：


    - **多项式选择**：寻找两个具有整数系数的不可约多项式 $f(x)$ 和 $g(x)$，它们在模待分解整数 $N$ 下共享一个公共根 $m$。这些多项式的质量对整体运行时间有显著影响。

    - **筛法（关系收集）**：搜索互质整数对 $(a, b)$，使得代数数 $a - b\alpha$（其中 $\alpha$ 是 $f$ 的根）和 $a
    - b\beta$（其中 $\beta$ 是 $g$ 的根）的范数在预定义的因子基上是光滑的。此阶段具有高度可并行性。

    - **线性代数**：根据筛法阶段找到的关系，在 $\mathbb{F}_2$ 上构建一个大型稀疏矩阵，并找到一个大型线性相关向量集（零空间向量）。这通常使用块
    Lanczos 或块 Wiedemann 算法完成。

    - **平方根**：结合线性代数阶段的依赖关系，在适当的数域中计算平方根，然后通过最大公约数 (GCD) 计算得到 $N$ 的一个非平凡因子。


    GNFS 的复杂度是亚指数的，具体在 L-记法中为 $L_N\left[\frac{1}{3}, \left(\frac{64}{9}\right)^{1/3}\right]$，这比任何已知的通用整数分解多项式时间算法都快。GNFS
    的实际实现涉及复杂的软件包，例如 GGNFS 和 CADO-NFS。'
