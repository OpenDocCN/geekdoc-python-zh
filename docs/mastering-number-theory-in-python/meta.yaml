    # # Sumsets and the Erdős-Ginzburg-Ziv Theorem


    # ## Definition and Theorems


    In this chapter, we explore the concept of sumsets and introduce the Erdős-Ginzburg-Ziv
    (EGZ) theorem, which provides a fundamental result concerning the structure of
    sumsets.


    # ### 1 Definition of Sumsets


    Given two sets $A$ and $B$ of integers, their sumset, denoted $A + B$, is defined
    as the set of all possible sums of an element from $A$ and an element from $B$:


    $$A + B = \{a + b : a \in A, b \in B\}$$


    For example, if $A = \{1, 2\}$ and $B = \{3, 4, 5\}$, their sumset would be:


    $$A + B = \{4, 5, 6, 5, 6, 7\}$$


    Note that duplicate values may appear in the sumset.


    # ### 2 The Erdős-Ginzburg-Ziv (EGZ) Theorem


    The Erdős-Ginzburg-Ziv (EGZ) theorem, first proven by Paul Erdős, Aryeh Dvoretzky,
    and Abraham Ziv in 1961, provides a remarkable result related to sumsets.


    > **Theorem 39.1 (EGZ Theorem):** For any positive integer $k$, there exists a
    positive integer $N(k)$ such that if we color the positive integers from 1 to
    $N(k)$ using $k$ colors, then there exist $k$ positive integers of the same color
    whose sum is a multiple of $k$.


    The EGZ theorem essentially guarantees that when the positive integers are properly
    colored, we can always find a monochromatic sumset containing multiples of $k$.'
