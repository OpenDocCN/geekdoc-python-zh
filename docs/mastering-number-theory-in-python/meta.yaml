    # Chapter 24


    # Quadratic Sieve


    # Introduction


    In this chapter, we explore the Quadratic Sieve, a powerful algorithm for integer
    factorization. The Quadratic Sieve was initially proposed by Carl Pomerance in
    1981 as an improvement over the General Number Field Sieve (GNFS), especially
    for factoring numbers with small to medium-sized prime factors.


    # Algorithm Overview


    The Quadratic Sieve is a sieve-based algorithm that aims to find non-trivial factors
    of composite numbers using quadratic polynomials. The basic idea is to express
    the given composite number $N$ as a difference of squares modulo $p$, where $p$
    is a carefully chosen prime. By sieving through a set of residue classes, we can
    find values that yield quadratic residues whose product is a perfect square modulo
    $p$. This information can then be used to construct a congruence relation from
    which we can extract non-trivial factors of $N$.


    # 1 Steps of the Quadratic Sieve


    The Quadratic Sieve algorithm can be divided into several steps:


    +   1. **Choose the Factor Base:** Select a factor base $\mathcal{B}$, which consists
    of small primes. These primes will be used to sieve for smooth numbers.

    2. **Select the Sieving Interval:** Determine the sieving interval $[a, b]$, where
    we will search for smooth numbers and perform sieving operations.

    3. **Sieve for Smooth Numbers:** For each prime $p$ in the factor base $\mathcal{B}$,
    sieve through the numbers in the interval $[a, b]$ to find numbers that are divisible
    only by primes from $\mathcal{B}$.

    4. **Create the Sieving Matrix:** Create a sieving matrix, where each row corresponds
    to a smooth number and each column corresponds to a prime from the factor base
    $\mathcal{B}$. Populate the matrix by marking the occurrence of each prime factor
    in each smooth number.'
