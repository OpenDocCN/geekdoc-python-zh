    # Basic Concepts and Terminology


    To develop a solid foundation in number theory, we must first familiarize ourselves
    with some basic concepts and terminology.


    # 1 Natural Numbers


    We begin by defining the set of natural numbers $\mathbb{N}$ as the set of positive
    integers: $\mathbb{N} = \{1, 2, 3, \dots\}$. The natural numbers are the building
