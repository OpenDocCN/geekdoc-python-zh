    # Chapter 33


    # Dirichlet’s Theorem on Arithmetic Progressions


    # Statement and Proof Overview


    Dirichlet’s Theorem on Arithmetic Progressions, established by Johann Peter Gustav
    Lejeune Dirichlet in 1837, is a fundamental result in number theory that provides
    conditions for the existence of infinitely many primes in certain arithmetic progressions.
    The theorem states that for any two positive coprime integers $a$ and $d$, there
    are infinitely many primes of the form $a + nd$, where $n$ is a non-negative integer.


    Formally, let $a$ and $d$ be coprime positive integers. The theorem asserts that
    there exist infinitely many primes $p$ such that $p \equiv a \pmod{d}$, where
    "$\equiv$" denotes congruence modulo $d$. In other words, there are infinitely
    many primes in the arithmetic progression $a, a + d, a + 2d, a + 3d, \dots$


    The proof of Dirichlet’s Theorem on Arithmetic Progressions employs techniques
    from complex analysis, specifically analytic continuation and properties of the
    Riemann zeta function. The original proof by Dirichlet involved Dirichlet L-series,
    a precursor to the more general theory of Hecke L-series. However, a simpler proof
    using modern techniques was later provided by Harold Davenport in 1936, which
    we present here.


    # Proof of Dirichlet’s Theorem on Arithmetic Progressions


    The proof of Dirichlet’s Theorem on Arithmetic Progressions relies on three main
    steps: the construction of a special Dirichlet series, establishing its analytic
    continuation, and showing that this series equals zero at a particular value.
    We outline the proof below:


    # 1 Construction of the Dirichlet Series


    Consider the Dirichlet series given by:


    ```

    $$L(s, \chi) = \sum_{n=1}^{\infty} \frac{\chi(n)}{n^s},$$

    ```


    where $\chi$ is a Dirichlet character modulo $d$ that sends coprime integers to
    complex numbers.'
