    \n### 1 整数分拆\n\n一个正整数 $n$ 的分拆可以用杨图表示，杨图由若干行方格组成，每行包含一个非递增的方格序列。例如，5 的分拆可以用杨图表示：\n\
    \n![](img/9336df70acd0e49fa464427c68e1e1d1_136_0.png)\n\n$n$ 的分拆数也对应于将 $n$ 个点排成一行的方式数，其中分隔线左侧的点属于一个独立的组。分拆函数计算了排列这些点的不同方式的数量。\n\
