    # Fundamental Theorem of Arithmetic


    The Fundamental Theorem of Arithmetic, also known as the Unique Factorization
    Theorem, states that every positive integer greater than 1 can be expressed uniquely
    (up to the order of the factors) as the product of prime numbers.


    # 1 Statement and Proof


    Given a positive integer $n > 1$, the Fundamental Theorem of Arithmetic can be
    formulated as follows:


    $n = p_1 \cdot p_2 \cdot p_3 \cdots p_k$


    where $p_1, p_2, p_3, \dots, p_k$ are prime numbers and $k$ is a positive integer.

    The uniqueness of the prime factorization implies that the prime numbers used
    in the expression are unique. In other words, any positive integer greater than
    1 has a unique set of prime factors.

    The proof of the Fundamental Theorem of Arithmetic is beyond the scope of this
    chapter, but it relies on the concept of divisibility, inductive reasoning, and
    properties of prime numbers. The theorem is considered one of the foundational
    results in number theory and has a profound impact on various branches of mathematics.


    # 2 Applications


    The Fundamental Theorem of Arithmetic has numerous applications in number theory
    and related disciplines. It forms the basis for various algorithms and computations
    involving integers. Some noteworthy applications include:


    +   - **Finding the GCD:** The prime factorization of two integers can be used
    to compute their greatest common divisor (GCD). By comparing the prime factors
    and their multiplicities, we can determine the common factors and calculate the
    GCD efficiently using the Fundamental Theorem of Arithmetic.

    - **Solving Diophantine Equations:** Diophantine equations, which involve finding
    integer solutions to polynomial equations, can often be solved using the prime
    factorization of the coefficients and the Fundamental Theorem of Arithmetic.

    - **Cryptographic Applications:** The prime factorization of large numbers is
    the basis for several cryptographic algorithms, such as RSA. The security of these
    algorithms relies on the difficulty of factoring large composite numbers into
    prime factors.


    The Fundamental Theorem of Arithmetic provides us with a powerful tool for understanding
    and manipulating integers, offering deeper insights into their structure and properties.'
