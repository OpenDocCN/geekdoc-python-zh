    \ $x$ 的最佳有理逼近。第 $n$ 个渐近分数可以使用以下算法计算：\n\n$$\\begin{aligned} p_{-2} &= 0, & q_{-2}\
    \ &= 1, \\\\ p_{-1} &= 1, & q_{-1} &= 0, \\\\ p_i &= a_i p_{i-1} + p_{i-2}, &\
    \ q_i &= a_i q_{i-1} + q_{i-2}, & i \\ge 0 \\end{aligned}$$\n\n当 $n$ 趋近于无穷大时，渐近分数\
    \ $\\frac{p_n}{q_n}$ 收敛于无理数 $x$。\n\n## 应用\n\n连分数在数论及其他领域有多种应用。以下是一些例子：\n\n###\
    \ 1 实数的逼近\n\n连分数提供了一种用有理数逼近实数的方法。连分数的渐近分数为实数提供了越来越精确的有理逼近。\n\n### 2 丢番图方程\n\n\
    连分数可用于求解丢番图方程，即寻找多项式方程的整数解。连分数的渐近分数有助于确定这些方程的解。\n\n### 3 无理性\n\n连分数可以简洁而信息丰富地表示无理数。无限连分数中部分商的模式揭示了无理数的本质。\n\
    \n## Python 实现\n\n要计算连分数的第 $n$ 个渐近分数，我们可以使用以下 Python 代码：\n\n```python\ndef nth_convergent(a,\
    \ n):\n    p_prev, q_prev = 0, 1\n    p_curr, q_curr = 1, 0\n\n    for i in range(n):\n\
    \        p_next = a[i] * p_curr + p_prev\n        q_next = a[i] * q_curr + q_prev\n\
    \n        p_prev, q_prev = p_curr, q_curr\n        p_curr, q_curr = p_next, q_next\n\
    \n    return p_curr, q_curr\n```\n\n在此代码中，函数 `nth_convergent(a, n)` 计算部分商为 a 的连分数的第\
    \ $n$ 个渐近分数。该函数以元组形式返回渐近分数的分子和分母。\n\n## 结论\n\n连分数提供了一种将实数表示为有理逼近的独特方式。有限和无限连分数提供了越来越精确的有理逼近，并揭示了无理数的性质。连分数在数论、丢番图方程和无理性研究中有着广泛的应用。连分数为理解数的本质提供了宝贵的见解，并为数学的进一步探索打开了大门。\n\
    \n# 第 17 章\n\n## 佩尔方程\n\n### 引言\n\n佩尔方程以英国数学家约翰·佩尔的名字命名，是一种已被研究了几个世纪的丢番图方程。它被定义为方程\
    \ $x^2 - dy^2 = 1$，其中 $d$ 是一个不是完全平方数的正整数。在本章中，我们将探讨佩尔方程的性质和解。\n\n### 基本解\n\n佩尔方程的解可以用连分数表示。通过找到\
    \ $\\sqrt{d}$ 的连分数表示的渐近分数，我们可以得到方程的基本解 $(x_0, y_0)$。设 $[a_0; a_1, a_2, \\dots]$\
    \ 是 $\\sqrt{d}$ 的连分数表示。那么，基本解 $(x_0, y_0)$ 由渐近分数 $\\frac{p_n}{q_n}$ 给出，其中 $p_n$\
    \ 和 $q_n$ 通过以下递归公式获得：\n\n$$\n\\begin{aligned}\np_{-2} &= 0, \\quad p_{-1} = 1,\
    \ \\\\\np_i &= a_i p_{i-1} + p_{i-2}, \\quad i \\geq 0, \\\\\nq_{-2} &= 1, \\\
    quad q_{-1} = 0, \\\\\nq_i &= a_i q_{i-1} + q_{i-2}, \\quad i \\geq 0.\n\\end{aligned}\n\
    $$\n\n基本解 $(x_0, y_0)$ 对应于某个 $n$ 的渐近分数 $\\frac{p_n}{q_n}$。\n\n### 通解\n\n一旦我们有了基本解\
    \ $(x_0, y_0)$，我们就可以找到佩尔方程的无穷多个解。通解 $(x, y)$ 可以通过以下递推关系获得：\n\n$$\n\\begin{aligned}\n\
    x_{n+1} &= x_0 x_n + d y_0 y_n, \\\\\ny_{n+1} &= x_0 y_n + y_0 x_n.\n\\end{aligned}\n\
    $$\n\n因此，通过选择不同的 $n$ 值，我们可以生成一个无穷解序列 $(x_n, y_n)$。\n\n### Python 实现\n\n要找到基本解并生成佩尔方程的解，我们可以使用以下\
    \ Python 代码：\n\n```python\nfrom math import isqrt\n\ndef pell_equation(d):\n \
    \   a = [isqrt(d)]\n    m = 0\n    d = 1\n    a0 = a[0]\n    h1, k1 = 1, 0\n \
    \   h, k = a0, 1\n\n    while True:\n        yield h, k\n        m = d * a[m]\
    \ - m\n        d = (d - m * m) // d\n        a.append((a0 + m) // d)\n       \
    \ h1, h = h, a[-1] * h + h1\n        k1, k = k, a[-1] * k + k1\n\ndef solve_pell_equation(d,\
    \ limit):\n    solutions = []\n    gen = pell_equation(d)\n\n    for _ in range(limit):\n\
    \        x, y = next(gen)\n        solutions.append((x, y))\n\n    return solutions\n\
    ```\n\n函数 `solve_pell_equation(d, limit)` 接受一个正整数 `d` 和一个整数 `limit` 作为输入。它返回佩尔方程\
    \ $x^2 - dy^2 = 1$ 的 `limit` 个解的列表。\n\n### 结论\n\n在本章中，我们探讨了佩尔方程及其解。通过使用连分数，我们可以找到方程的基本解。从基本解出发，我们可以生成一个无穷解序列。提供的\
    \ Python 代码使我们能够高效地计算佩尔方程的解。佩尔方程在数论和密码学中有着应用，使其成为数学中的一个重要课题。\n\n# 第 18 章\n\n##\
    \ 椭圆曲线\n\n### 基本性质和定义\n\n椭圆曲线是一种代数曲线，由形如 $y^2 = x^3 + ax + b$ 的方程定义，其中 $a$ 和 $b$\
    \ 是常数，曲线定义在一个域上。在本章中，我们探讨椭圆曲线的基本性质和定义。\n\n让我们考虑定义在域 $\\mathbb{F}$ 上的椭圆曲线 $E$。我们将曲线上的点表示为\
    \ $P = (x, y) \\in E$，其中 $x, y \\in \\mathbb{F}$。我们还引入一个特殊点 $\\mathcal{O}$，称为*无穷远点*，它作为\
    \ $E$ 上群结构的加法单位元。\n\n曲线 $E$ 满足以下性质：\n\n1.  **光滑性**：曲线没有奇点，这意味着它在每一点的切线在该点与曲线相交于一个不同的第三点。\n\
    2.  **非奇异性**：方程 $4a^3 + 27b^2 \\neq 0$，这确保了曲线没有尖点或自交点。\n3.  **群结构**：点集 $E(\\mathbb{F})\
    \ = \\{(x, y) \\in \\mathbb{F} \\times \\mathbb{F} : y^2 = x^3 + ax + b\\} \\\
    cup \\{\\mathcal{O}\\}$ 在称为*点加法*的运算下构成一个阿贝尔群。\n\n### 在现代数论中的意义\n\n椭圆曲线与数学的许多领域，包括数论，有着深刻的联系。对椭圆曲线的研究导致了密码学领域的重大进步，特别是在椭圆曲线密码学（ECC）的发展中。\n\
    \n椭圆曲线的群结构允许实现各种密码算法，例如密钥交换协议和数字签名方案。与传统密码系统相比，ECC 具有若干优势，包括更小的密钥尺寸、更快的计算速度以及对某些类型攻击的抵抗力。\n\
    \nECC 的安全性依赖于求解*椭圆曲线离散对数问题*（ECDLP）的难度，该问题涉及在给定点 $P$ 的情况下找到一个整数 $k$，使得 $P = k \\\
    cdot G$，其中 $G$ 是椭圆曲线的一个生成元。求解 ECDLP 的最佳已知算法是*通用点计数算法*，其时间复杂度为 $O(\\sqrt{n})$，其中\
    \ $n$ 是由 $G$ 生成的群的阶。"
