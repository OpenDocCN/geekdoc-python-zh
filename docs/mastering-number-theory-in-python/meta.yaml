    \n# Plot the eigenvalue distribution\nplt.scatter(np.real(eigenvalues), np.imag(eigenvalues),\
    \ s=1, alpha=0.5)\nplt.xlabel('Real')\nplt.ylabel('Imaginary')\nplt.title('Eigenvalue\
    \ Distribution')\nplt.axis('equal')\nplt.show()\n```\n\n在此代码片段中，我们使用`numpy`库生成一个具有复数元素的随机矩阵，并使用`np.linalg.eigvals`函数计算其特征值。然后，我们使用`plt.scatter`函数在复平面上绘制特征值分布图。\n\
    \n生成的图形应显示出以原点为中心的圆形模式，直观地证实了圆律。\n\n## 结论\n\n随机矩阵理论为研究具有随机元素的矩阵行为提供了一个强大的框架。高斯酉系综和圆律是随机矩阵理论的关键概念，在包括数论在内的多个领域都有应用。圆律描述了随机酉矩阵的特征值分布，指出特征值均匀地填满复平面上的一个圆盘。计算方法使我们能够探索和可视化这些理论结果，为我们提供了关于随机矩阵行为的额外见解。随机矩阵理论的研究仍然是一个活跃的研究领域，在众多学科中持续发展并得到应用。\n\
