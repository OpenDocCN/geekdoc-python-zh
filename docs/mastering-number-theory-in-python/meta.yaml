    \ `gamma` 函数的使用。\n\n## 计算 Zeta 函数\n\n对于复数值计算 Zeta 函数本质上比实数值更具挑战性。然而，存在几种高效的算法和数值技术来计算其值。\n\
    \n其中一种方法是 Riemann-Siegel 公式，它用于近似计算虚部较大的复数值的 Zeta 函数。以下代码片段演示了如何在 Python 中使用 Riemann-Siegel\
    \ 公式近似计算 Zeta 函数：\n\n```python\nimport cmath\nimport math\n\ndef zeta(s):\n  \
    \  # Riemann-Siegel 公式\n    def rs_formula(s):\n        arg = (s - 0.5) * cmath.pi\n\
    \        return cmath.exp(0.5 * arg * 1j) * cmath.sqrt(2 * cmath.pi) * zeta_rational(1\
    \ - s)\n\n    # 有理数值的 Zeta 函数\n    def zeta_rational(s):\n        if s == 1:\n\
