    # Euler’s Totient Function


    # Introduction


    In this chapter, we will explore the concept of Euler’s Totient Function, denoted
    as $\phi(n)$. It is a significant arithmetic function in number theory that counts
    the positive integers less than or equal to $n$ and coprime to $n$. Euler’s Totient
    Function has various properties and applications in number theory and cryptography.


    # Definition and Properties


    # 1 Definition of Euler’s Totient Function


    The Euler’s Totient Function, denoted as $\phi(n)$, is defined as the number of
    positive integers less than or equal to $n$ that are coprime to $n$. In other
    words, $\phi(n)$ represents the count of the numbers from 1 to $n$ that have no
    common divisors with $n$.

    Mathematically, we can define $\phi(n)$ as follows:

    $$\phi(n) = \text{number of } a \in \mathbb{Z} \text{ such that } 1 \le a \le
    n \text{ and } \gcd(a, n) = 1$$

    where $\gcd(a, n)$ represents the greatest common divisor of $a$ and $n$.


    # 2 Properties of Euler’s Totient Function


    Euler’s Totient Function has several important properties:


    +   - For any prime number $p$, $\phi(p) = p - 1$. This property holds because
    all numbers from 1 to $p - 1$ are coprime to $p$.

    - For any prime power $p^k$, where $p$ is a prime number and $k \ge 1$, $\phi(p^k)
    = p^k - p^{k-1}$. This property follows from the fact that numbers divisible by
    $p$ are not coprime to $p^k$.

    - For any two coprime numbers $a$ and $b$, $\phi(ab) = \phi(a) \cdot \phi(b)$.
    This property is a consequence of the Chinese Remainder Theorem.

    - For any positive integer $n$, $\sum_{d|n} \phi(d) = n$, where the sum is taken
    over all positive divisors of $n$. This property can be proved by using the concept
    of a multiplicative function.'
