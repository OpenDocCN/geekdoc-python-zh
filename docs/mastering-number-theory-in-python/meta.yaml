    # Miller-Rabin Primality Test


    # Introduction


    The Miller-Rabin primality test, devised by Gary L. Miller and Michael O. Rabin
    in 1980, is a probabilistic test used to determine whether a given number is composite
    or likely to be prime. It is based on the properties of strong pseudoprimes.


    # Algorithm Description


    The Miller-Rabin primality test is performed in several rounds, with the number
    of rounds determining the accuracy of the test. The algorithm works as follows:


    +   1. Given an odd integer $n > 3$ to be tested for primality, express it as
    $2^r \cdot d + 1$, where $r$ is a non-negative integer and $d$ is an odd number.

    2. Choose a random integer $a$ such that $2 \le a \le (n - 2)$. If $a$ is a witness
    to the compositeness of $n$, then $n$ is definitely not prime.

    3. Compute $x \equiv a^d \pmod{n}$.

    4. If $x \equiv \pm 1 \pmod{n}$ or $x^{2^i} \equiv -1 \pmod{n}$ for some $0 \le
    i < r$, then stop and declare $n$ as likely prime. Otherwise, continue to the
    next step.

    5. If none of the above conditions are satisfied for any witness $a$, then $n$
    is composite.


    # Algorithm Complexity


    The Miller-Rabin primality test has a time complexity of $O(k \cdot \log^3 n)$,
    where $k$ is the number of rounds and $n$ is the number being tested. The accuracy
    of the test increases with the number of rounds performed.'
