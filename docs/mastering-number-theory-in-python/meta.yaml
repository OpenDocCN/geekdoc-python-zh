    # Probabilistic Methods


    In this chapter, we explore the use of probabilistic methods in number theory.
    These methods involve applying probabilistic reasoning and techniques to study
    number-theoretic objects and properties. We begin by introducing the basic concepts
    and tools from probability theory that are relevant to our discussions. We then
    delve into various applications of probabilistic methods in number theory, including
    the Erdős-Kac theorem and its implications.


    # Basic Concepts from Probability Theory


    To apply probabilistic methods in number theory, we first need to establish some
    foundational concepts from probability theory. In particular, we focus on the
    notion of random variables, probability distributions, and expected values.


    # 1 Random Variables


    In probability theory, a random variable is a mathematical function that maps
    the outcomes of a random experiment to real numbers. In the context of number
    theory, we often consider random variables that encode number-theoretic properties
    of interest. For example, we might define a random variable that represents the
    number of prime factors of an integer chosen at random.

    Formally, a random variable $X$ is defined as a function $X : \Omega \rightarrow
    \mathbb{R}$, where $\Omega$ is the sample space of possible outcomes. Depending
    on the context, the sample space $\Omega$ could be finite, countably infinite,
    or uncountably infinite.


    # 2 Probability Distributions


    A probability distribution describes the likelihood of various outcomes for a
    random variable. It assigns probabilities to different values the random variable
    can take. There are different types of probability distributions, including discrete
    distributions and continuous distributions.

    In terms of number theory, we often encounter discrete probability distributions.
    For example, we can define a probability distribution that models the likelihood
    of a randomly selected integer having a certain number of prime factors.

    The probability distribution of a random variable can be fully described by its
    probability mass function (PMF) or probability density function (PDF). The PMF
    or PDF encodes the probability of each possible outcome.'
