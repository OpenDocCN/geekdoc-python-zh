    \n#### 3 求解方法\n\n为了找到线性丢番图方程的解，我们可以使用扩展欧几里得算法。该算法是欧几里得算法的扩展，不仅能计算两个数的最大公约数，还能提供满足贝祖等式的系数。\n\
    \n通过对等式 $ax + by = \\gcd(a, b)$ 应用扩展欧几里得算法，我们可以找到满足该方程的整数解 $x$ 和 $y$。然后，这些解可以用来找到原始线性丢番图方程的整数解。\n\
    \n### 欧几里得算法的应用\n\n#### 1 求解线性丢番图方程\n\n欧几里得算法在求解线性丢番图方程中起着至关重要的作用。通过找到 $a$ 和 $b$\
