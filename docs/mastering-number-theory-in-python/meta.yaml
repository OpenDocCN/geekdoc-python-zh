    # Quadratic Residues


    # 1 Definition and Properties


    Let $n$ be a positive integer, and let $a$ be an integer coprime to $n$. The residue
    of $a$ modulo $n$, denoted as $a \pmod{n}$, is the remainder when $a$ is divided
    by $n$.


    **Definition 11.1 (Quadratic Residue):** For a given positive integer $n$, an
    integer $a$ is said to be a quadratic residue modulo $n$ if there exists an integer
    $x$ such that $x^2 \equiv a \pmod{n}$. Otherwise, $a$ is called a non-quadratic
    residue modulo $n$.


    Quadratic residues have several notable properties:


    +   - For an odd prime $p$, there are $\frac{p-1}{2}$ quadratic residues and $\frac{p-1}{2}$
    non-quadratic residues modulo $p$.

    - The product of two quadratic residues modulo $n$ is always a quadratic residue.

    - The product of a quadratic residue and a non-quadratic residue modulo $n$ is
    always a non-quadratic residue.

    - The quadratic residues modulo $n$ form a subgroup of the group of integers coprime
    to $n$ under multiplication.'
