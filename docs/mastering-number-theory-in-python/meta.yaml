    # Key Generation


    The key generation process in ECC involves the following steps:


    +   1. Select an elliptic curve.

    2. Choose a base point, denoted as $G$, on the curve.

    3. Select a private key, denoted as $d$, which is a random number.

    4. Compute the public key, denoted as $Q$, as the scalar multiplication of the
    base point: $Q = d \cdot G$.


    The security of ECC lies in the difficulty of computing the private key $d$ from
    the public key $Q$ and the base point $G$.


    # Encryption and Decryption


    # 1 Encryption


    To encrypt a message using ECC, the sender follows these steps:


    +   1. Obtain the recipient''s public key, denoted as $Q$.

    2. Choose a random number $k$ as the ephemeral/private key.

    3. Compute the ephemeral/public key $P$ as $P = k \cdot G$.

    4. Compute the shared secret key $S$ as $S = k \cdot Q$.

    5. Convert the message into a numeric representation, typically using a reversible
    encoding scheme.

    6. Apply an encryption function to the message and the shared secret key to obtain
    the ciphertext.


    # 2 Decryption


    The recipient can decrypt the ciphertext using their private key as follows:


    +   1. Obtain the ephemeral/public key $P$ from the ciphertext.

    2. Compute the shared secret key $S$ as $S = d \cdot P$.

    3. Apply the decryption function to the ciphertext and the shared secret key to
    obtain the original message.'
