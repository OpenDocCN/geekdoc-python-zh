    \ integer. We will define these symbols, discuss their properties, and provide\
    \ algorithms for their computation.\n\n## The Legendre Symbol\n\n### 1 Definition\
    \ and Properties\n\nThe Legendre symbol $\\left(\\frac{a}{p}\\right)$, where $p$\
    \ is an odd prime and $a$ is an integer coprime to $p$, provides information about\
    \ whether $a$ is a quadratic residue modulo $p$. The Legendre symbol is defined\
    \ as:\n\n$$\\left(\\frac{a}{p}\\right) = \\begin{cases} 0 & \\text{if } a \\equiv\
    \ 0 \\pmod{p} \\\\ 1 & \\text{if } a \\text{ is a quadratic residue modulo } p\
    \ \\\\ -1 & \\text{if } a \\text{ is a non-quadratic residue modulo } p \\end{cases}$$\n\
    \nThe Legendre symbol has several useful properties:\n\n- **Euler's Criterion:**\
    \ For an odd prime $p$ and an integer $a$ coprime to $p$, the Legendre symbol\
    \ satisfies the congruence:\n\n$$\\left(\\frac{a}{p}\\right) \\equiv a^{\\frac{p-1}{2}}\
    \ \\pmod{p}$$\n\nThis criterion allows us to determine the value of the Legendre\
    \ symbol without explicitly calculating quadratic residues.\n\n- **Quadratic Reciprocity:**\
    \ The law of quadratic reciprocity, discussed in the previous chapter, provides\
    \ a relationship between the Legendre symbols of two distinct odd primes $p$ and\
    \ $q$. Specifically, we have:\n\n$$\\left(\\frac{p}{q}\\right) \\cdot \\left(\\\
    frac{q}{p}\\right) = (-1)^{\\frac{p-1}{2} \\cdot \\frac{q-1}{2}}$$\n\nThis result\
    \ has important implications and can be used to simplify calculations involving\
    \ Legendre symbols.\n\n### 2 Python Code: Calculating the Legendre Symbol\n\n\
    We can compute the Legendre symbol for a given integer $a$ and an odd prime $p$\
    \ using Euler's criterion. The following Python code demonstrates this calculation:\n\
    \n```python\ndef legendre_symbol(a, p):\n    \"\"\"\n    Calculate the Legendre\
    \ symbol (a/p) using Euler's criterion.\n    Returns 0 if a is divisible by p,\
    \ 1 if a is a quadratic residue mod p, -1 if\n    a is a non-quadratic residue\
    \ mod p.\n    \"\"\"\n    result = pow(a, (p-1)//2, p)\n    if a % p == 0:\n \
    \       return 0\n    elif result == 1:\n        return 1\n    else:\n       \
    \ return -1\n```\n\nIn this code, the function `legendre_symbol(a, p)` takes two\
    \ parameters: a and p. It calculates the Legendre symbol $(a/p)$ using Euler's\
    \ criterion and returns the corresponding value.\n\n## The Jacobi Symbol\n\n###\
    \ 1 Definition and Properties\n\nThe Jacobi symbol $\\left(\\frac{a}{n}\\right)$\
