- md: '## 42 The Distribution of Primes


    - Introduction


    The distribution of prime numbers is a central topic in number theory. The prime
    number theorem, proved independently by Hadamard and de la Vallée Poussin in 1896,
    describes the asymptotic distribution of primes. It states that the number of
    primes less than or equal to x, denoted π(x), is asymptotically equivalent to
    x / ln(x). This means that for large x, the density of primes near x is approximately
    1 / ln(x).


    The Riemann zeta function, ζ(s), plays a crucial role in understanding the distribution
    of primes. The Euler product formula connects the zeta function to the primes:


    ζ(s) = ∏ (1 - p^{-s})^{-1}


    where the product is over all prime numbers p. The Riemann Hypothesis, one of
    the most famous unsolved problems in mathematics, conjectures that all non-trivial
    zeros of the zeta function have a real part equal to 1/2. This hypothesis has
    profound implications for the error term in the prime number theorem.


    Other important results include Dirichlet''s theorem on primes in arithmetic progressions,
    which states that for any two coprime integers a and d, there are infinitely many
    primes of the form a + nd. The Goldbach conjecture, still unproven, asserts that
    every even integer greater than 2 can be expressed as the sum of two primes.


    The study of prime gaps, the differences between consecutive primes, is another
    active area of research. While it is known that gaps can be arbitrarily large,
    it is also conjectured that there are infinitely many twin primes (primes differing
    by 2). Recent progress has shown that there are infinitely many prime pairs with
    a bounded gap, a result known as the Polymath project''s work on the bounded gaps
    between primes.'
  mdcn: '## 42 素数的分布


    - 引言


    素数的分布是数论中的一个核心课题。素数定理由阿达马和德拉瓦莱·普桑在1896年独立证明，它描述了素数的渐近分布。该定理指出，小于或等于x的素数个数，记作π(x)，在渐近意义上等价于x
    / ln(x)。这意味着对于较大的x，x附近的素数密度大约为1 / ln(x)。


    黎曼ζ函数，ζ(s)，在理解素数分布中扮演着至关重要的角色。欧拉乘积公式将ζ函数与素数联系起来：


    ζ(s) = ∏ (1 - p^{-s})^{-1}


    其中乘积遍历所有素数p。黎曼猜想是数学中最著名的未解难题之一，它猜想ζ函数的所有非平凡零点的实部都等于1/2。这个猜想对素数定理中的误差项有着深远的影响。


    其他重要结果包括狄利克雷关于算术级数中素数的定理，该定理指出，对于任意两个互质的整数a和d，存在无穷多个形如a + nd的素数。哥德巴赫猜想至今未被证明，它断言每个大于2的偶数都可以表示为两个素数之和。


    对素数间隙（相邻素数之间的差）的研究是另一个活跃的研究领域。虽然已知间隙可以任意大，但也有猜想认为存在无穷多对孪生素数（相差2的素数）。最近的进展表明，存在无穷多对间隙有界的素数对，这一结果被称为“博学者项目”在素数有界间隙方面的工作。'
