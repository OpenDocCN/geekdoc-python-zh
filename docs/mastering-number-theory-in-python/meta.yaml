    # Statement and Methods of Proof


    Waring’s Problem, first proposed by Edward Waring in 1770, deals with the representation
    of positive integers as the sum of a fixed number of $k$th powers. More precisely,
    for a fixed positive integer $k$ and a positive integer $s$, Waring’s Problem
    seeks to determine the smallest positive integer $g(k)$ such that every positive
    integer can be expressed as the sum of at most $g(k)$ $k$th powers.

    This problem can be stated mathematically as:

    $$\forall s \in \mathbb{N}, \exists n_1, n_2, \dots, n_{g(k)} \in \mathbb{N} \text{
    s.t. } s = n_1^k + n_2^k + \dots + n_{g(k)}^k$$

    The value of $g(k)$ depends on the value of $k$ and can be quite large.

    The proof of Waring’s Problem involves examining different cases for the values
    of $k$.


    # 1 Case 1: $k = 1$


    When $k = 1$, we have that every positive integer is itself a first power. Therefore,
    $g(1) = 1$.


    # 2 Case 2: $k = 2$


    When $k = 2$, we are dealing with representing positive integers as sums of squares.
    This problem was famously solved by Joseph Lagrange in 1770, using his Four Square
    Theorem. Lagrange’s theorem states that every positive integer can be represented
    as the sum of at most four squares.

    Therefore, $g(2) = 4$.


    # 3 Case 3: $k \geq 3$


    The case where $k \geq 3$ is more challenging and involves techniques from advanced
    number theory. The famous mathematician G.H. Hardy and his student J.E. Littlewood
    proved in 1923 that there exists a positive integer $g(k)$ such that every positive
    integer can be written as the sum of at most $g(k)$ $k$th powers.

    However, the exact value of $g(k)$ for $k \geq 3$ remains unknown, leading to
    the famous unsolved Waring’s Problem.'
