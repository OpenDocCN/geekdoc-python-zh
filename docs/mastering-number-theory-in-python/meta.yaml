    # Chapter 14


    # Möbius Function and Inversion Formula


    # Introduction


    The Möbius function $\mu(n)$ is a well-known arithmetic function in number theory
    that plays a fundamental role in various areas of mathematics. Its definition
    is given as follows:


    $$\mu(n) = \begin{cases} 0 & \text{if } n \text{ is divisible by a square number
    greater than 1}, \ (-1)^k & \text{if } n \text{ is a product of } k \text{ distinct
    primes}. \end{cases}$$


    In this chapter, we explore the properties of the Möbius function and delve into
    the Möbius inversion formula, which allows us to derive other arithmetic functions
    from the Möbius function.


    # Definition and Properties


    The Möbius function $\mu(n)$ is defined for positive integers $n$. It takes on
    three possible values: 0, 1, or $-1$ depending on the properties of $n$. These
    properties are as follows:


    +   - If $n$ is divisible by a square number greater than 1, $\mu(n)$ is defined
    as 0.

    - If $n$ is a product of $k$ distinct primes, $\mu(n)$ is given by $(-1)^k$.


    One key property of the Möbius function is its multiplicative nature. If $a$ and
    $b$ are coprime positive integers, then we have:


    $$\mu(ab) = \mu(a) \cdot \mu(b).$$


    The Möbius function also exhibits an important property known as the Möbius inversion
    formula. For any arithmetic function $f(n)$, this formula states:


    $$f(n) = \sum_{d|n} \mu(d) \cdot g\left(\frac{n}{d}\right),$$


    where $g(n)$ is the Dirichlet convolution inverse of $f(n)$.'
