    # Chapter 55


    # Random Matrix Theory


    # Introduction


    Random Matrix Theory (RMT) is a branch of mathematical study that deals with the
    properties and behavior of matrices with random entries. It has applications in
    various fields, including number theory, quantum mechanics, statistical physics,
    and computer science. In this chapter, we will introduce the basic concepts and
    results of RMT and explore its connections to number theory.


    # Gaussian Unitary Ensemble


    The Gaussian Unitary Ensemble (GUE) is one of the most well-known and extensively
    studied random matrix ensembles in RMT. It consists of Hermitian matrices with
    complex entries whose real and imaginary parts are independently and identically
    distributed according to a Gaussian distribution with mean 0 and variance 1.


    A $N \times N$ random matrix $M$ belonging to the GUE ensemble can be expressed
    as:


    $$M = \frac{1}{\sqrt{2N}}(H + H^*),$$


    where $H$ is an $N \times N$ matrix with independent and identically distributed
    Gaussian entries with mean 0 and variance 1, and $H^*$ denotes the conjugate transpose
    of $H$.


    The probability density function (PDF) of the GUE ensemble is given by:


    $$P(M) \propto e^{-\frac{N}{4}\text{Tr}(M^2)},$$


    where $\text{Tr}(M^2)$ denotes the trace of the matrix $M^2$.


    # Circular Law


    The Circular Law is a fundamental result in RMT that characterizes the eigenvalue
    distribution of random unitary matrices. It states that as the dimension of the
    matrix tends to infinity, the eigenvalues uniformly distribute within a disk in
    the complex plane centered at the origin.


    More formally, let $M$ be a random matrix belonging to the GUE ensemble. The empirical
    spectral distribution of $M$, denoted by $\mu_N$, is defined as:'
  - '[PAGE 174]


    $$\mu_N = \frac{1}{N} \sum_{i=1}^N \delta_{\lambda_i},$$


    where $\delta_{\lambda_i}$ represents a Dirac delta function concentrated at the
    eigenvalue $\lambda_i$ of $M$.

    The Circular Law states that for any fixed positive radius $r$, as $N$ tends to
    infinity:


    $$\lim_{N \to \infty} \mathbb{P}(\lambda_i \in B_r(0)) = \pi r^2,$$


    where $B_r(0)$ denotes the disk centered at the origin with radius $r$.

    In other words, the eigenvalues of large random unitary matrices uniformly fill
    the unit disk in the complex plane.


    # Python Implementation


    To demonstrate the Circular Law computationally, we can generate random unitary
    matrices and calculate their eigenvalues. By visualizing the eigenvalue distribution,
    we can observe the circular pattern indicative of the Circular Law.

    Here is a Python code snippet that implements the computation:


    ```

    import numpy as np

    import matplotlib.pyplot as plt


    # Set the dimension of the random matrix

    N = 1000


    # Generate a random unitary matrix

    H = np.random.randn(N, N) + 1j * np.random.randn(N, N)

    Q, _ = np.linalg.qr(H)


    # Calculate the eigenvalues

    eigenvalues = np.linalg.eigvals(Q)


    # Plot the eigenvalue distribution

    plt.scatter(np.real(eigenvalues), np.imag(eigenvalues), s=1, alpha=0.5)

    plt.xlabel(''Real'')

    plt.ylabel(''Imaginary'')

    plt.title(''Eigenvalue Distribution'')

    plt.axis(''equal'')

    plt.show()

    ```


    In this code snippet, we use the numpy library to generate a random matrix with
    complex entries and calculate its eigenvalues using the `np.linalg.eigvals` function.
    We then plot the eigenvalue distribution in the complex plane using the `plt.scatter`
    function.

    The resulting plot should exhibit a circular pattern centered at the origin, visually
    confirming the Circular Law.'
