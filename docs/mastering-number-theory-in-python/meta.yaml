    \ `range` 函数来表示自然数集：\n\n```\nnaturals = list(range(1, n + 1))\n```\n\n### 2 皮亚诺公理\n\
    \n皮亚诺公理为自然数提供了严格的理论基础。它们包含以下五个陈述：\n\n- **皮亚诺公理 1：** 1是自然数。\n- **皮亚诺公理 2：** 每个自然数\
    \ $n$ 都有一个唯一的后继 $S(n)$，它也是一个自然数。\n- **皮亚诺公理 3：** 1不是任何自然数的后继。\n- **皮亚诺公理 4：**\
    \ 如果 $m$ 和 $n$ 是自然数且 $m \\neq n$，那么 $S(m) \\neq S(n)$。\n- **皮亚诺公理 5**（数学归纳法原理）：设\
    \ $P(n)$ 是关于自然数 $n$ 的一个性质或命题。如果 $P(1)$ 为真，并且对于每个自然数 $k$，如果 $P(k)$ 为真，则 $P(S(k))$\
    \ 也为真，那么 $P(n)$ 对所有自然数 $n$ 都为真。\n\n这些公理提供了一套基本规则，使我们能够推理自然数的性质和关系。\n\n### 3 数学归纳法\n\
    \n数学归纳法是一种强大的证明技术，基于皮亚诺公理。它使我们能够证明对所有自然数都成立的命题。\n\n数学归纳法的基本思想如下：\n\n1. 证明该命题对基础情况（通常是\
    \ $n = 1$）成立。\n2. 假设该命题对某个一般自然数 $k$ 成立。\n3. 利用这个假设，证明该命题对 $k + 1$ 也成立。\n4. 根据数学归纳法原理，得出该命题对所有自然数都成立的结论。\n\
    \n在Python中，我们可以使用递归或循环来实现数学归纳法。以下是使用数学归纳法证明前 $n$ 个自然数之和为 $\\frac{n(n+1)}{2}$ 的示例：\n\
    \n```\ndef sum_of_naturals(n: int) -> int:\n    if n == 1:\n        return 1\n\
