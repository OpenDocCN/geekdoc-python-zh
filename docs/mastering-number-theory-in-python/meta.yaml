    # ## Introduction


    In this chapter, we will explore the concept of linear Diophantine equations,
    which are equations involving multiple variables where we seek integer solutions.
    These equations have applications in various areas including number theory, cryptography,
    and optimization. We will discuss the general form of linear Diophantine equations,
    methods to find their solutions, and explore applications of the Euclidean Algorithm
    in this context.


    # ## Linear Diophantine Equations


    # ### 1 Definition and Examples


    A linear Diophantine equation is an equation of the form:


    $$ax + by = c \quad (5.1)$$


    where $a$, $b$, and $c$ are given integers, and $x$ and $y$ are the variables
    we are trying to solve for. The goal is to find integer solutions, if any exist,
    that satisfy the equation.


    To illustrate with an example, consider the linear Diophantine equation:


    $$3x + 5y = 13 \quad (5.2)$$


    Here, $a = 3$, $b = 5$, $c = 13$, and we want to find integer solutions for $x$
    and $y$. In this case, one possible solution is $x = 2$ and $y = 1$, since $3(2)
    + 5(1) = 13$.


    # ### 2 Existence of Solutions


    Determining whether a linear Diophantine equation has any solutions depends on
    the greatest common divisor (GCD) of $a$ and $b$. Specifically, a linear Diophantine
    equation $ax + by = c$ has a solution if and only if $c$ is divisible by the GCD
    of $a$ and $b$, denoted as $\gcd(a, b)$.


    Mathematically, this can be expressed as:


    $$\gcd(a, b) \mid c \quad (5.3)$$'
