    \ Factor is Found**\n   Repeat the following steps until a non-trivial factor\
    \ of $N$ is found:\n   1. Compute $x = f(x)$.\n   2. Compute $y = f(f(y))$.\n\
    \   3. Update the candidate factor as $d = \\gcd(|x - y|, N)$.\n   4. If $d$ is\
    \ a non-trivial factor of $N$, stop and return $d$ as a factor of $N$.\n\n###\
    \ Algorithm Complexity\n\nThe time complexity of the Pollard's Rho algorithm for\
