    # Congruences and Properties


    # 1 Definition and Notation


    In this section, we will explore the concept of modular arithmetic and its fundamental
    properties.

    **Definition (Congruence):** Let $a$, $b$, and $n$ be integers, where $n > 0$.
    We say that $a$ is congruent to $b$ modulo $n$, denoted as $a \equiv b \pmod{n}$,
    if $n$ divides the difference $a - b$. In other words, $a$ and $b$ have the same
    remainder when divided by $n$.

    **Notation:** Instead of writing out the full congruence notation, we often use
    the shorthand $a \equiv b \pmod{n}$ and refer to $n$ as the modulus.


    # 2 Properties of Congruences


    Congruences possess several important properties that we will explore in this
    section.

    **Reflexive Property:** For any integer $a$ and modulus $n$, we have $a \equiv
    a \pmod{n}$.

    **Symmetry Property:** If $a \equiv b \pmod{n}$, then $b \equiv a \pmod{n}$.

    **Transitive Property:** If $a \equiv b \pmod{n}$ and $b \equiv c \pmod{n}$, then
    $a \equiv c \pmod{n}$.

    **Addition Property:** If $a \equiv b \pmod{n}$ and $c \equiv d \pmod{n}$, then
    $a + c \equiv b + d \pmod{n}$.

    **Multiplication Property:** If $a \equiv b \pmod{n}$ and $c \equiv d \pmod{n}$,
    then $ac \equiv bd \pmod{n}$.

    These properties allow us to perform various operations on congruences, including
    addition, subtraction, multiplication, and exponentiation.


    # Modular Addition, Subtraction, Multiplication, and Division


    # 1 Modular Addition


    In modular arithmetic, addition can be performed by finding the remainder when
    the sum of the numbers is divided by the modulus. More formally, if $a \equiv
    b \pmod{n}$ and $c \equiv d \pmod{n}$, then $a + c \equiv b + d \pmod{n}$.

