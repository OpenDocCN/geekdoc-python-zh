    # # Wilson’s Theorem


    # ## Statement and Proof


    # ### 1 Wilson’s Theorem


    Wilson’s Theorem is a significant result in number theory that provides a necessary
    and sufficient condition for a number to be prime.


    **Theorem 9.1 (Wilson’s Theorem):** For any integer $p > 1$, $p$ is a prime number
    if and only if


    $$(p - 1)! \equiv -1 \pmod{p}$$


    # ### 2 Proof of Wilson’s Theorem


    To prove Wilson’s Theorem, we consider the integers from 1 to $p-1$ inclusive,
    denoted as $1, 2, 3, \dots, p-1$. If $p$ is a prime number, all these integers
    are coprime to $p$, meaning that each of them has a multiplicative inverse modulo
    $p$.


    We can pair up the integers in the following way:


    ```

    $$\begin{cases} 1 \cdot (p - 1) \equiv 1 \pmod{p} \ 2 \cdot (p - 2) \equiv 1 \pmod{p}
    \ 3 \cdot (p - 3) \equiv 1 \pmod{p} \ \vdots \ (p - 1) \cdot 1 \equiv 1 \pmod{p}
    \end{cases}$$

    ```


    Multiplying all these congruences together, we obtain:


    ```

    $$(p - 1)! \equiv 1 \cdot 1 \cdot 1 \cdot \dots \cdot 1 \equiv 1 \pmod{p}$$

    ```


    Since $p$ is prime and $p \not\equiv 1 \pmod{p}$, its modular multiplicative inverse
    is $p - 1$. Therefore, we have:


    ```

    $$(p - 1)! \cdot (p - 1) \equiv -1 \pmod{p}$$

    ```


    Hence, we have proved Wilson’s Theorem.'
