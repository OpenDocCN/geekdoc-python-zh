- md: '## 20 Miller-Rabin Primality Test


    ### Introduction


    The Miller-Rabin primality test is a probabilistic algorithm to determine if a
    number is a probable prime. It is a more efficient and reliable variant of the
    Fermat primality test. The test is based on the properties of strong pseudoprimes
    and is widely used in practice due to its simplicity and effectiveness.


    The core idea of the test is to check whether a given odd integer \( n > 2 \)
    satisfies certain conditions that are necessary for primality. If \( n \) fails
    any of these conditions, it is definitely composite. If it passes, it is likely
    prime, with the probability of error decreasing as more rounds of testing are
    performed.


    The test works by expressing \( n-1 \) as \( 2^s \cdot d \), where \( d \) is
    odd. For a randomly chosen base \( a \) (where \( 1 < a < n-1 \)), we compute
    \( a^d \mod n \). If the result is 1 or \( n-1 \), \( n \) passes this round.
    Otherwise, we repeatedly square the result up to \( s-1 \) times. If at any point
    we obtain \( n-1 \), \( n \) passes. If we never obtain 1 or \( n-1 \), \( n \)
    is composite.


    The probability that a composite number passes \( k \) independent rounds of the
    test is at most \( 4^{-k} \). This makes the test highly reliable for practical
    purposes, such as in cryptographic applications like RSA key generation.'
  mdcn: '## 20 Miller-Rabin 素性测试


    ### 简介


    Miller-Rabin 素性测试是一种概率算法，用于判断一个数是否为**可能素数**。它是费马素性测试的一种更高效、更可靠的变体。该测试基于强伪素数的性质，因其简单性和有效性而在实践中被广泛使用。


    该测试的核心思想是检查给定的奇数整数 \( n > 2 \) 是否满足素数所必需的某些条件。如果 \( n \) 未能通过其中任何一个条件，它一定是合数。如果通过，则它很可能是素数，并且随着测试轮数的增加，出错的概率会降低。


    测试的工作原理是将 \( n-1 \) 表示为 \( 2^s \cdot d \)，其中 \( d \) 是奇数。对于随机选择的基数 \( a \)（其中
    \( 1 < a < n-1 \)），我们计算 \( a^d \mod n \)。如果结果是 1 或 \( n-1 \)，则 \( n \) 通过本轮测试。否则，我们将结果重复平方最多
    \( s-1 \) 次。如果在任何时刻我们得到 \( n-1 \)，则 \( n \) 通过测试。如果我们从未得到 1 或 \( n-1 \)，则 \( n
    \) 是合数。


    一个合数通过 \( k \) 轮独立测试的概率最多为 \( 4^{-k} \)。这使得该测试在实际应用中高度可靠，例如在 RSA 密钥生成等密码学应用中。'
