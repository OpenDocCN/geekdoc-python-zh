    \n## Chapter 6\n\n## Modular Arithmetic\n\n### Congruences and Properties\n\n\
    #### 1 Definition and Notation\n\nIn this section, we will explore the concept\
    \ of modular arithmetic and its fundamental properties.\n\n**Definition (Congruence):**\
    \ Let $a$, $b$, and $n$ be integers, where $n > 0$. We say that $a$ is congruent\
    \ to $b$ modulo $n$, denoted as $a \\equiv b \\pmod{n}$, if $n$ divides the difference\
    \ $a - b$. In other words, $a$ and $b$ have the same remainder when divided by\
    \ $n$.\n\n**Notation:** Instead of writing out the full congruence notation, we\
    \ often use the shorthand $a \\equiv b \\pmod{n}$ and refer to $n$ as the modulus.\n\
    \n#### 2 Properties of Congruences\n\nCongruences possess several important properties\
    \ that we will explore in this section.\n\n**Reflexive Property:** For any integer\
    \ $a$ and modulus $n$, we have $a \\equiv a \\pmod{n}$.\n\n**Symmetry Property:**\
    \ If $a \\equiv b \\pmod{n}$, then $b \\equiv a \\pmod{n}$.\n\n**Transitive Property:**\
    \ If $a \\equiv b \\pmod{n}$ and $b \\equiv c \\pmod{n}$, then $a \\equiv c \\\
    pmod{n}$.\n\n**Addition Property:** If $a \\equiv b \\pmod{n}$ and $c \\equiv\
    \ d \\pmod{n}$, then $a + c \\equiv b + d \\pmod{n}$.\n\n**Multiplication Property:**\
    \ If $a \\equiv b \\pmod{n}$ and $c \\equiv d \\pmod{n}$, then $ac \\equiv bd\
    \ \\pmod{n}$.\n\nThese properties allow us to perform various operations on congruences,\
    \ including addition, subtraction, multiplication, and exponentiation.\n\n###\
    \ Modular Addition, Subtraction, Multiplication, and Division\n\n#### 1 Modular\
