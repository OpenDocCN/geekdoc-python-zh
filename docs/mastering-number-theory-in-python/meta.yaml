    # # Prime Number Theorem


    # ## Statement and Proofs


    The Prime Number Theorem is a fundamental result in analytic number theory that
    establishes an asymptotic formula for the number of prime numbers up to a given
    bound. It states that the prime counting function, denoted by $\pi(x)$, satisfies
    the equation:


    $$\lim_{x \to \infty} \frac{\pi(x)}{x / \ln(x)} = 1.$$


    In other words, as $x$ tends to infinity, the ratio of the number of primes up
    to $x$ to $x / \ln(x)$ approaches 1. This result provides important insights into
    the distribution of prime numbers.


    The Prime Number Theorem was first conjectured by Gauss and was later proven independently
    by Jacques Hadamard and Charles Jean de la Vallée-Poussin in 1896. The proofs
    relied on techniques from complex analysis, specifically the properties of the
    Riemann zeta function.


    These landmark proofs established the Prime Number Theorem as a foundational result
    in number theory and laid the groundwork for further investigations into the distribution
    of prime numbers.


    # ## Historical Development and Implications


    The proof of the Prime Number Theorem had a profound impact on number theory and
    led to the development of various techniques to study prime numbers. It unveiled
    the deep connections between prime numbers and the properties of the Riemann zeta
