  md: '$$x_1 \equiv x_2 \equiv a_1 \pmod{m_1}$$

    $$x_1 \equiv x_2 \equiv a_2 \pmod{m_2}$$

    $$\vdots$$

    $$x_1 \equiv x_2 \equiv a_k \pmod{m_k}$$


    Since $m_i$ and $M/m_i$ are coprime for all $i$, the Chinese Remainder Theorem
    implies that $x_1 \equiv x_2 \pmod{M/m_i}$ for all $i$. Taking the product of
    these congruences, we have:


    $$x_1 \equiv x_2 \pmod{M/m_1}$$

    $$x_1 \equiv x_2 \pmod{M/m_2}$$

    $$\vdots$$

    $$x_1 \equiv x_2 \pmod{M/m_k}$$


    By the uniqueness of solutions to congruences, we conclude that $x_1 \equiv x_2
    \pmod{M}$. Hence, the Chinese Remainder Theorem guarantees the existence and uniqueness
    of a solution to the system of congruences.


    # Applications and Examples


    The Chinese Remainder Theorem has various applications in number theory and cryptography,
    particularly in solving modular equations and performing computations on large
    numbers. Here are some examples:


    # 1 Clock Synchronization


    Consider the following problem: Cindy has three unsynchronized clocks at home,
    each with a different period of time. She wants to find a moment when all three
    clocks will show the same time again.


    Let $m_1, m_2, m_3$ represent the periods of the three clocks, and let $a_1, a_2,
    a_3$ represent the time shown on each clock at a specific moment. Cindy can use
    the Chinese Remainder Theorem to find the smallest positive integer $x$ that satisfies
    the congruences:


    $$x \equiv a_1 \pmod{m_1}$$

    $$x \equiv a_2 \pmod{m_2}$$

    $$x \equiv a_3 \pmod{m_3}$$


    The solution $x$ obtained using the Chinese Remainder Theorem will represent the
    moment when all three clocks show the same time.


    # 2 Large Number Computations


    The Chinese Remainder Theorem is also essential for computations involving large
    integers. Suppose we want to perform arithmetic operations on integers that are
    too large to be processed efficiently. By using the Chinese Remainder Theorem,
    we can break down these large integers into smaller parts and perform computations
    on each part individually. This technique is widely used in cryptography algorithms
    such as the RSA cryptosystem.'
