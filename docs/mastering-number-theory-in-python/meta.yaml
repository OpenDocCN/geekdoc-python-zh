    4. Publish the public key **A**, while keeping the private key **s** secret.


    # 2 Encryption


    The encryption process in lattice-based cryptography involves transforming a plaintext
    message into a ciphertext using the public key. The encryption process typically
    follows these steps:


    +   1. Represent the plaintext message as a vector **m**.

    2. Generate a random noise vector **e** from a discrete probability distribution.

    3. Compute the ciphertext **c** as **c** = **Ar** + **m** + **e**, where **r**
    is a random vector from a discrete probability distribution.


    # 3 Decryption


    The decryption process in lattice-based cryptography involves recovering the plaintext
