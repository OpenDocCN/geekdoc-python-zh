    \ 1994 年利用数论和代数几何的先进技术给出了证明。\n\n另一个著名的丢番图方程是佩尔方程 $x^2 - ny^2 = 1$，其中 $n$ 是一个非平方的正整数。这个方程已被广泛研究，并在二次方程的整数解和连分数等领域有应用。\n\
    \n总的来说，丢番图方程的研究有着丰富的历史，并且仍然是数论及相关领域的一个活跃研究领域。数学家们不断发现求解丢番图方程的新技术和方法，这有助于我们理解数论与代数几何之间的深刻联系。\n\
