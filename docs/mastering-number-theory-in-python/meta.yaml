  md: 'fraction $x = [a_0; a_1, a_2, \dots, a_{n-1}]$. We can express $x$ as the following
    rational approximation:


    $$x = a_0 + \cfrac{1}{a_1 + \cfrac{1}{a_2 + \cfrac{1}{\ddots + \cfrac{1}{a_{n-1}}}}$$


    This can be simplified as follows:


    $$x = \frac{p_n}{q_n}$$


    where $p_n$ and $q_n$ are integers. The algorithm to compute the $n$th convergent
    of a finite continued fraction is as follows:


    $$\begin{aligned} p_{-2} &= 1, & q_{-2} &= 0, \ p_{-1} &= a_0, & q_{-1} &= 1,
    \ p_i &= a_i p_{i-1} + p_{i-2}, & q_i &= a_i q_{i-1} + q_{i-2}, & 0 \le i \le
    n-1 \end{aligned}$$


    The fraction $\frac{p_n}{q_n}$ is the $n$th convergent of the continued fraction.


    # Infinite Continued Fractions


    An infinite continued fraction represents an irrational number that cannot be
    expressed as a finite fraction. Let''s consider the infinite continued fraction
    $x = [a_0; a_1, a_2, a_3, \dots]$. The convergents of an infinite continued fraction
    are the best rational approximations to $x$. The $n$th convergent can be computed
    using the following algorithm:


    $$\begin{aligned} p_{-2} &= 0, & q_{-2} &= 1, \ p_{-1} &= 1, & q_{-1} &= 0, \
    p_i &= a_i p_{i-1} + p_{i-2}, & q_i &= a_i q_{i-1} + q_{i-2}, & i \ge 0 \end{aligned}$$


    As $n$ approaches infinity, the convergents $\frac{p_n}{q_n}$ converge to the
    irrational number $x$.


    # Applications


    Continued fractions have several applications in number theory and beyond. Here
    are a few examples:


    # 1 Approximation of Real Numbers


    Continued fractions provide a method for approximating real numbers with rational
    numbers. The convergents of a continued fraction offer increasingly accurate rational
    approximations to the real number.


    # 2 Diophantine Equations


    Continued fractions can be used to solve Diophantine equations, which involve
    finding integer solutions to polynomial equations. The convergents of a continued
    fraction can help determine the solutions of these equations.'
