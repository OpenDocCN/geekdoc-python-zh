  md: "# 1 Naive Algorithm\n\nThe naive algorithm for solving the DLP involves iterating\
    \ through all possible values of $x$ until a match for the residue $a$ is found.\
    \ This algorithm has a time complexity of $O(p)$, making it impractical for large\
    \ prime numbers. The code snippet below demonstrates the naive algorithm for solving\
    \ the DLP.\n\n```\ndef discrete_log_naive(g, a, p):\n    for x in range(p):\n\
    \        if pow(g, x, p) == a:\n            return x\n    return None\n```\n\n\
    The function `discrete_log_naive(g, a, p)` takes the base $g$, the residue $a$,\
    \ and the prime number $p$ as input. It iterates through all possible values of\
    \ $x$ from $0$ to $p-1$, raising $g$ to the power of $x$ modulo $p$ and checking\
    \ if the result equals $a$. If a match is found, the function returns the value\
    \ of $x$. If no match is found, the function returns `None`.\n\n# 2 Shanks' Baby-Step\
    \ Giant-Step Algorithm\n\nShanks' baby-step giant-step algorithm is a more efficient\
    \ method for solving the Discrete Logarithm Problem. This algorithm reduces the\
    \ time complexity to $O(\\sqrt{p})$ by dividing the exponent $x$ into two parts:\
    \ $x = im + j$, where $m$ is the square root of $p$ rounded up to the nearest\
    \ integer. By precomputing a table of baby steps and giant steps, the algorithm\
    \ searches for a match between the shifted baby steps and giant steps.\n\nThe\
    \ code snippet below demonstrates Shanks' baby-step giant-step algorithm for solving\
    \ the DLP.\n\n```\ndef discrete_log_bsgs(g, a, p):\n    m = math.isqrt(p) + 1\n\
    \    baby_table = {pow(g, i, p): i for i in range(m)}\n    giant_step = pow(pow(g,\
    \ m, p), -1, p)\n    y = a\n    for j in range(m):\n        if y in baby_table:\n\
    \            return (j * m + baby_table[y]) % p\n        y = (y * giant_step)\
    \ % p\n    return None\n```\n\nThe function `discrete_log_bsgs(g, a, p)` takes\
    \ the base $g$, the residue $a$, and the prime number $p$ as input. It initializes\
    \ the variable $m$ as the square root of $p$ rounded up to the nearest integer.\
    \ The algorithm then precomputes a table of baby steps, where each element is\
    \ $g^i$ modulo $p$ for $i$ ranging from $0$ to $m-1$. It also computes the giant\
    \ step as $g^m$ modulo $p$ raised to the power of $-1$ modulo $p$. The algorithm\
    \ iterates through all possible values of $j$ from $0$ to $m-1$, checking if the\
    \ current value of $y$ is in the baby step table. If a match is found, the function\
    \ returns the corresponding exponent $j \\cdot m + \\text{baby\\_table}[y]$ modulo\
    \ $p$. If no match is found, the function returns `None`."
