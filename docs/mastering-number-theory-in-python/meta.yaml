    \n数论既有理论应用，也有实际应用。理论数论旨在探索数字的基本性质及其关系，而应用数论则在密码学、计算机科学和物理学等领域得到应用。\n\n## 基本概念与术语\n\
    \n为了在数论中打下坚实的基础，我们必须首先熟悉一些基本概念和术语。\n\n### 1 自然数\n\n我们首先将自然数集 $\\mathbb{N}$ 定义为正整数集：$\\\
