    \ 4 == 3:\n            result = -result\n        a %= n\n    if n == 1:\n    \
    \    return result\n    else:\n        return 0 if gcd(a, n) == 1 else 0\n```\n\
    \nIn this code, the function `jacobi_symbol(a, n)` takes two parameters: `a` and\
    \ `n`. It calculates the Jacobi symbol $(a/n)$ using the properties of Legendre\
    \ symbols and returns the corresponding value.\n\n## Chapter 13\n\n## Möbius Function\
    \ and Inversion Formula\n\n### Introduction\n\nThe Möbius function $\\mu(n)$ is\
