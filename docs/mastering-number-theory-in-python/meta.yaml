    \ f(f(y))\n        d = math.gcd(abs(x - y), N)\n\n    if d == N:\n        return\
    \ None\n    else:\n        return d\n```\n\nThe function `pollard_rho(N)` takes\
    \ an integer N as input and returns a non-trivial factor of N using Pollard’s\
    \ rho algorithm. The algorithm initializes two values x and y to 2 and iterates\
    \ the function f(x) until a cycle is found. At each iteration, x is updated once,\
    \ and y is updated twice. The greatest common divisor (gcd) of $|x - y|$ and N\
    \ is calculated to determine if a factor has been found. If the result is equal\
    \ to N, the algorithm continues until a non-trivial factor is discovered."
