    # Farey Sequences


    # Definition and Properties


    In this chapter, we will explore Farey sequences, which are a type of sequence
    in number theory that have important properties and applications. Farey sequences
    are constructed by considering the fractions between 0 and 1 with denominators
    that do not exceed a given positive integer $n$.


    # 1 Definition


    Let $n$ be a positive integer. The $n$th Farey sequence, denoted as $F_n$, is
    the sequence of irreducible fractions $\frac{a}{b}$, where $0 \le a \le b \le
    n$ and $\gcd(a,b) = 1$. The fractions in $F_n$ are listed in increasing order.


    # 2 Example


    Let us consider the example of the 5th Farey sequence, denoted as $F_5$. In this
    case, we have $n = 5$ and the fractions in $F_5$ are:


    $0, \frac{1}{5}, \frac{1}{4}, \frac{1}{3}, \frac{2}{5}, \frac{1}{2}, \frac{3}{5},
    \frac{2}{3}, \frac{3}{4}, \frac{4}{5}, 1$


    These fractions are all irreducible and listed in increasing order.


    # Properties of Farey Sequences


    Farey sequences have several interesting properties that make them useful in various
    areas of mathematics.


    # 1 Density


    The fractions in a Farey sequence have a remarkable property known as density.
    For any two adjacent fractions $\frac{a}{b}$ and $\frac{c}{d}$ in a Farey sequence,
    we have:


    $bc - ad = 1$


    This property implies that the Farey fractions are evenly spaced in the Farey
    sequence.'
