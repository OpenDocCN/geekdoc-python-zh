    \n## 计算 Gamma 函数\n\nGamma 函数的计算可能具有挑战性，尤其是对于复数。然而，对于正实数和某些有理数，存在高效的算法来计算其值。\n\n\
    其中一种方法是 Lanczos 近似法，它在实践中常用于计算 Gamma 函数。下面的代码片段演示了如何在 Python 中使用 Lanczos 近似法计算\
    \ Gamma 函数：\n\n```python\nimport math\n\ndef gamma(x):\n    # Lanczos 近似系数\n \
    \   c = [1.000000000190015,\n         76.18009172947146, -86.50532032941677,\n\
    \         24.01409824083091, -1.231739572450155,\n         0.001208650973866179,\
    \ -5.395239384953e-06]\n\n    # 数值常数\n    sqrt_two_pi = math.sqrt(2 * math.pi)\n\
    \n    # 检查 x 是否为非正整数\n    if x <= 0 and math.isclose(x % 1, 0):\n        return\
    \ float('inf')  # Gamma 函数在这些值上未定义\n\n    x -= 1  # 平移以匹配 Lanczos 系数\n\n    #\
    \ Lanczos 近似\n    value = c[0] + sum(c[i] / (x + i) for i in range(1, len(c)))\n\
    \    value *= sqrt_two_pi * math.pow((x + 5.5), x + 0.5) * math.exp(-x - 5.5)\n\
    \n    return value\n\n# 计算几个测试值的 Gamma 函数\nprint(\"Gamma(2) =\", gamma(2))\nprint(\"\
    Gamma(5) =\", gamma(5))\nprint(\"Gamma(0.5) =\", gamma(0.5))\n```\n\n在此代码中，首先定义了\
