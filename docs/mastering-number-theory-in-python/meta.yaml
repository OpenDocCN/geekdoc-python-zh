    \ two positive integers $a$ and $b$ with $a > b$, we can use the steps below to\
    \ find their GCD:\n\n+   Step 1: Divide $a$ by $b$ and let $r$ be the remainder.\n\
    Step 2: Replace $a$ with $b$ and $b$ with $r$.\nStep 3: Repeat Steps 1 and 2 until\
    \ $r = 0$.\nStep 4: The GCD is the value of $b$ when $r = 0$.\n\nBy applying the\
    \ Euclidean Algorithm, we ensure that every step decreases the size of the numbers\
    \ involved. Eventually, we will reach the point where $r = 0$, and the GCD will\
    \ be the value of $b$ at that iteration.\n\n# 2 Python Implementation\n\nWe can\
