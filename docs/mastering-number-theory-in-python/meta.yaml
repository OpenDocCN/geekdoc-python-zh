    # 1 Primality Testing: Miller-Rabin Primality Test


    The Miller-Rabin primality test is a probabilistic algorithm for testing the primality
    of a given integer. It is based on the Miller-Rabin primality criterion, which
    states that for a prime number $p$, either $a^{p-1} \equiv 1 \pmod{p}$ or there
    exists $i$ such that $a^{2^i(p-1)} \equiv -1 \pmod{p}$, where $a$ is a random
    number chosen between 2 and $p-2$.


    The Miller-Rabin test is implemented in various mathematical software packages,
    including SAGE. The following SAGE code snippet demonstrates how to use the Miller-Rabin
    test to check the primality of a given integer:


