    # Statement and Partial Results


    The Goldbach Conjecture, proposed by the German mathematician Christian Goldbach
    in 1742, is one of the oldest and most famous unsolved problems in number theory.
    It states that every even integer greater than 2 can be expressed as the sum of
    two prime numbers.


    Formally, the conjecture can be stated as follows:

    For every even integer $n > 2$, there exist prime numbers $p$ and $q$ such that
    $n = p + q$.


    Despite extensive efforts by mathematicians over the past few centuries, a proof
    or counterexample for the Goldbach Conjecture remains elusive.


    However, partial results have been established towards proving the conjecture.
    In 2013, the Peruvian mathematician Harald Helfgott proved a weak version of the
    conjecture known as the Odd Goldbach Conjecture, stating that every odd integer
    greater than 5 can be expressed as the sum of three prime numbers.


    Additionally, many computer investigations and numerical experiments have been
    conducted to test the conjecture for large even integers. These computations have
    provided strong evidence in support of the conjecture, as no counterexamples have
    been found within the range of computations.


