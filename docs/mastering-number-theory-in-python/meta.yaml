    frac{m-1}{2} \\cdot \\frac{n-1}{2}}$$\n\n- **Jacobi's Two Square Theorem:** For\
    \ an integer $n > 1$, the Jacobi symbol satisfies the congruence:\n\n$$\\left(\\\
    frac{-1}{n}\\right) = (-1)^{\\frac{n-1}{2}}$$\n\nThis result can be used to determine\
    \ whether $n$ can be written as a sum of two squares.\n\n### 2 Python Code: Calculating\
    \ the Jacobi Symbol\n\nWe can compute the Jacobi symbol for a given integer $a$\
