    \ the Fundamental Theorem of Arithmetic can be formulated as follows:\n\n$n =\
    \ p_1 \\cdot p_2 \\cdot p_3 \\cdots p_k$\n\nwhere $p_1, p_2, p_3, \\dots, p_k$\
