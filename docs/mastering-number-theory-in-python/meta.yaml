    # Introduction


    In this chapter, we explore two important number theoretic functions: the Legendre
    symbol and the Jacobi symbol. These symbols, closely related to each other, provide
    a way to determine whether a given integer is a quadratic residue modulo another
    integer. We will define these symbols, discuss their properties, and provide algorithms
    for their computation.


    # The Legendre Symbol


    # 1 Definition and Properties


    The Legendre symbol $ap$, where $p$ is an odd prime and $a$ is an integer coprime
    to $p$, provides information about whether $a$ is a quadratic residue modulo $p$.
    The Legendre symbol is defined as:


    $$ap = \begin{cases} 0 & \text{if } a \equiv 0 \pmod{p} \ 1 & \text{if } a \text{
    is a quadratic residue modulo } p \ -1 & \text{if } a \text{ is a non-quadratic
    residue modulo } p \end{cases}$$


    The Legendre symbol has several useful properties:


    +   - **Euler''s Criterion:** For an odd prime $p$ and an integer $a$ coprime
    to $p$, the Legendre symbol satisfies the congruence:


    $$ap \equiv a^{\frac{p-1}{2}} \pmod{p}$$


    This criterion allows us to determine the value of the Legendre symbol without
    explicitly calculating quadratic residues.


    +   - **Quadratic Reciprocity:** The law of quadratic reciprocity, discussed in
    the previous chapter, provides a relationship between the Legendre symbols of
    two distinct odd primes $p$ and $q$. Specifically, we have:


    $$pq \cdot qp = (-1)^{\frac{p-1}{2} \cdot \frac{q-1}{2}}$$'
