    \  N //= p\n    if N > 1:\n        factors.append(N)\n    return factors\n```\n\
    \n函数 `trial_division(N)` 接受一个整数 N 作为输入，并使用试除法算法返回其素因子列表。该算法遍历所有小于或等于 N 平方根的素数，并检查它们是否能整除\
    \ N。如果找到一个素因子，它会被添加到因子列表中，然后 N 被该素因子除。算法持续进行，直到找不到更多的素因子，如果剩余的 N 值大于 1，则将其作为因子添加。\n\
    \n#### 2 Pollard的rho算法\n\nPollard的rho算法是一种概率算法，旨在找到一个整数的非平凡因子。它通过迭代一个函数 $f(x)$\
    \ 在整数上，并在生成的值序列中搜索循环来工作。如果找到一个循环，则表明可以从循环中的值推导出一个因子。\n\n```python\ndef pollard_rho(N):\n\
    \    x = 2\n    y = 2\n    d = 1\n    f = lambda x: (x**2 + 1) % N\n\n    while\
    \ d == 1:\n        x = f(x)\n        y = f(f(y))\n        d = math.gcd(abs(x -\
    \ y), N)\n\n    if d == N:\n        return None\n    else:\n        return d\n\
    ```\n\n函数 `pollard_rho(N)` 接受一个整数 N 作为输入，并使用Pollard的rho算法返回 N 的一个非平凡因子。该算法将两个值\
    \ x 和 y 初始化为 2，并迭代函数 f(x) 直到找到一个循环。在每次迭代中，x 更新一次，y 更新两次。计算 $|x - y|$ 和 N 的最大公约数\
    \ (gcd) 以确定是否找到了因子。如果结果等于 N，算法继续进行，直到发现一个非平凡因子。\n\n#### 3 二次筛法\n\n二次筛法是一种更先进、更高效的大整数分解方法。它结合了试除法和筛法技术的元素来找到整数的素因子。该算法通过找到一个二次多项式来工作，该多项式对于某些\
    \ $x$ 值模 $N$ 计算结果为一个完全平方数。通过创建一个二次剩余矩阵，算法试图找到行之间的线性依赖关系，从而识别出因子。\n\n二次筛法算法的实现超出了本章的范围。然而，值得一提的是，二次筛法是一种强大的算法，已被用于分解具有数百位数字的大数。\n\
    \n### 量子计算与分解\n\n量子计算机的发展对基于分解难度的现代密码系统的安全性构成了重大威胁。Shor算法是一种量子算法，它分解大整数的速度比经典算法呈指数级快。通过利用量子叠加和量子纠缠现象，Shor算法有可能破解许多当前使用的公钥加密方案。\n\
