    # Chapter 17


    # Pell’s Equation


    # Introduction


    Pell’s equation is named after the English mathematician John Pell and is a type
    of Diophantine equation that has been studied for centuries. It is defined as
    the equation $x^2 - dy^2 = 1$, where $d$ is a positive integer that is not a perfect
    square. In this chapter, we will explore the properties and solutions of Pell’s
    equation.


    # Fundamental Solutions


    The solutions of Pell’s equation can be represented using continued fractions.
    By finding the convergents of the continued fraction representation of $\sqrt{d}$,
    we can obtain the fundamental solutions $(x_0, y_0)$ of the equation. Let $[a_0;
    a_1, a_2, \dots]$ be the continued fraction representation of $\sqrt{d}$. Then,
    the fundamental solution $(x_0, y_0)$ is given by the convergent $\frac{p_n}{q_n}$,
    where $p_n$ and $q_n$ are obtained from the recursive formulas:


    ```

    $p_{-2} = 0, \quad p_{-1} = 1,$


    $p_i = a_i p_{i-1} + p_{i-2}, \quad i \geq 0,$


    $q_{-2} = 1, \quad q_{-1} = 0,$


    $q_i = a_i q_{i-1} + q_{i-2}, \quad i \geq 0.$

    ```


    The fundamental solution $(x_0, y_0)$ corresponds to the convergent $\frac{p_n}{q_n}$
    for some $n$.


    # General Solutions


    Once we have the fundamental solution $(x_0, y_0)$, we can find infinitely many
    solutions to Pell’s equation. The general solution $(x, y)$ can be obtained from
    the recurrence relation:


    ```

    $x_{n+1} = x_0 x_n + d y_0 y_n,$


    $y_{n+1} = x_0 y_n + y_0 x_n.$

    ```


    Thus, by choosing different values of $n$, we can generate an infinite sequence
    of solutions $(x_n, y_n)$.'
