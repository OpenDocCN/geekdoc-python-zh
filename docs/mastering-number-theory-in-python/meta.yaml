    # Elliptic Curves and Finite Fields


    # 1 Elliptic Curves


    An elliptic curve is a smooth, non-singular curve defined by an equation of the
    form $y^2 = x^3 + ax + b$, where $a$ and $b$ are constants. To ensure that the
    curve is non-singular, certain conditions must be satisfied by the coefficients
    $a$ and $b$. The set of points $(x, y)$ that satisfy the equation, including a
    point at infinity denoted as $\mathcal{O}$, forms a group under the operation
    of point addition.


    # 2 Finite Fields


    In the context of ECC, elliptic curves are defined over finite fields, also known
    as Galois fields or $\mathbb{F}_p$ fields. A finite field $\mathbb{F}_p$ consists
    of a set of integers between 0 and $p - 1$, where $p$ is a prime number. The arithmetic
    operations in $\mathbb{F}_p$ are performed modulo $p$.


