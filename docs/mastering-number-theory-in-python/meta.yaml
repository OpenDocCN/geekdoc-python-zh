- md: '## 9 Wilson''s Theorem


    ### Statement and Proof


    Wilson''s Theorem states that for a prime number \( p \), the following congruence
    holds:

    \[ (p-1)! \equiv -1 \pmod{p} \]


    Conversely, if the congruence \( (n-1)! \equiv -1 \pmod{n} \) holds for an integer
    \( n > 1 \), then \( n \) must be prime.


    **Proof:**


    Let \( p \) be a prime number. Consider the set of integers \( \{1, 2, 3, \dots,
    p-1\} \). This set forms a complete residue system modulo \( p \) excluding zero.


    For each integer \( a \) in this set, there exists a unique integer \( b \) in
    the same set such that \( a \cdot b \equiv 1 \pmod{p} \). This \( b \) is called
    the modular inverse of \( a \) modulo \( p \).


    The only integers in the set that are their own inverses are those satisfying
    \( a^2 \equiv 1 \pmod{p} \). This congruence implies \( p \) divides \( (a^2 -
    1) = (a-1)(a+1) \). Since \( p \) is prime, it must divide either \( a-1 \) or
    \( a+1 \). Given that \( 1 \leq a \leq p-1 \), the only solutions are \( a \equiv
    1 \pmod{p} \) and \( a \equiv p-1 \pmod{p} \).


    Thus, in the product \( (p-1)! = 1 \cdot 2 \cdot 3 \cdots (p-1) \), all the terms
    can be paired up with their distinct inverses, except for \( 1 \) and \( p-1 \).
    The product of each pair is congruent to \( 1 \) modulo \( p \). Therefore:

    \[ (p-1)! \equiv 1 \cdot (p-1) \equiv -1 \pmod{p} \]


    This completes the proof of Wilson''s Theorem.'
  mdcn: '## 9 威尔逊定理


    ### 陈述与证明


    威尔逊定理指出，对于一个素数 \( p \)，以下同余式成立：

    \[ (p-1)! \equiv -1 \pmod{p} \]


    反之，如果对于一个整数 \( n > 1 \)，同余式 \( (n-1)! \equiv -1 \pmod{n} \) 成立，那么 \( n \) 必定是素数。


    **证明：**


    设 \( p \) 是一个素数。考虑整数集合 \( \{1, 2, 3, \dots, p-1\} \)。这个集合构成了模 \( p \) 的一个完全剩余系（不包括零）。


    对于该集合中的每个整数 \( a \)，都存在一个唯一的整数 \( b \)（也在该集合中），使得 \( a \cdot b \equiv 1 \pmod{p}
    \)。这个 \( b \) 被称为 \( a \) 模 \( p \) 的模逆元。


    该集合中唯一是其自身逆元的整数是那些满足 \( a^2 \equiv 1 \pmod{p} \) 的数。这个同余式意味着 \( p \) 整除 \( (a^2
    - 1) = (a-1)(a+1) \)。由于 \( p \) 是素数，它必须整除 \( a-1 \) 或 \( a+1 \)。考虑到 \( 1 \leq
    a \leq p-1 \)，唯一的解是 \( a \equiv 1 \pmod{p} \) 和 \( a \equiv p-1 \pmod{p} \)。


    因此，在乘积 \( (p-1)! = 1 \cdot 2 \cdot 3 \cdots (p-1) \) 中，除了 \( 1 \) 和 \( p-1 \)
    之外，所有项都可以与其不同的逆元配对。每一对的乘积模 \( p \) 同余于 \( 1 \)。因此：

    \[ (p-1)! \equiv 1 \cdot (p-1) \equiv -1 \pmod{p} \]


    这就完成了威尔逊定理的证明。'
