    \ 2: Replace $a$ with $b$ and $b$ with $r$.\n- Step 3: Repeat Steps 1 and 2 until\
    \ $r = 0$.\n- Step 4: The GCD is the value of $b$ when $r = 0$.\n\nBy applying\
    \ the Euclidean Algorithm, we ensure that every step decreases the size of the\
