    \n# 打印姓名和身高\nprint(name1, height1) # Alice 1.65\nprint(name2, height2) # Bob 1.75\n\
    ```\n\n### 命名元组\n\n命名元组是一种特殊的元组，允许你为元组的字段分配名称，而不是使用索引。这可以提高代码的可读性和可维护性，尤其是在处理记录时。要创建一个命名元组，你需要使用\
    \ `collections` 模块中的 `namedtuple` 函数。`namedtuple` 函数接受两个参数：元组类型的名称，以及一个由空格或逗号分隔的字段名字符串。例如：\n\
