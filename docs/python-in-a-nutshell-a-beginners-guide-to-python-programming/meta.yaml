    pattern. For example, the regex \d+ matches one or more digits, the regex [a-z]+
    matches one or more lowercase letters, and the regex \w+ matches one or more alphanumeric
    characters.


    The re module provides several functions to perform pattern matching operations
    on strings, such as:


    re.search(): Returns a match object if the regex matches anywhere in the string,
    or None if not.


    For example:


    ```

