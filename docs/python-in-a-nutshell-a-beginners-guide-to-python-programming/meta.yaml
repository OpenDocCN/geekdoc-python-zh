- md: "## Decorators\n\nDecorators are a powerful feature of Python that allow you\
    \ to modify the behavior of a function or a class without changing its source\
    \ code. Decorators are functions that take another function or a class as an argument,\
    \ and return a modified version of it. Decorators are useful for adding extra\
    \ functionality, logging, debugging, caching, validation, etc. to your functions\
    \ or classes.\n\nTo create a decorator, you need to define a function that takes\
    \ another function as an argument, and returns a wrapper function that executes\
    \ some code before or after calling the original function.\n\nFor example:\n\n\
    ```python\n# Define a decorator that prints a message before and after calling\
    \ a function\ndef print_message(func):\n    # Define a wrapper function\n    def\
    \ wrapper():\n        # Print a message before calling the function\n        print(\"\
    Calling\", func.__name__)\n        # Call the original function\n        func()\n\
    \        # Print a message after calling the function\n        print(\"Done\"\
    )\n    # Return the wrapper function\n    return wrapper\n```\n\nIn this example,\
    \ the `print_message` function is a decorator that takes another function as an\
    \ argument, and returns a wrapper function that prints a message before and after\
    \ calling the original function. The wrapper function uses the `__name__` attribute\
    \ of the original function to get its name, and uses the `func()` syntax to call\
    \ it.\n\nTo apply a decorator to a function, you need to use the `@` symbol, followed\
    \ by the name of the decorator, above the function definition.\n\nFor example:\n\
    \n```python\n# Apply the print_message decorator to a function that prints hello\n\
    @print_message\ndef hello():\n    print(\"Hello, world!\")\n\n# Call the decorated\
    \ function\nhello()\n```\n\nOutput:\n\n```\nCalling hello\nHello, world!\nDone\n\
    ```\n\nIn this example, the @print_message syntax applies the print_message decorator\
    \ to the hello function, which means that the hello function is replaced by the\
    \ wrapper function returned by the decorator. When you call the hello function,\
    \ you are actually calling the wrapper function, which prints a message before\
    \ and after calling the original hello function.\n\nYou can also apply multiple\
    \ decorators to a function, by stacking them on top of each other. The order of\
    \ the decorators matters, as the bottom-most decorator is applied first, and the\
    \ top-most decorator is applied last. For example:\n\n```python\n# Define another\
    \ decorator that prints the time before and after calling a function\ndef print_time(func):\n\
    \    # Import the time module\n    import time\n    # Define a wrapper function\n\
    \    def wrapper():\n        # Get the current time before calling the function\n\
    \        start = time.time()\n        # Call the original function\n        func()\n\
    \        # Get the current time after calling the function\n        end = time.time()\n\
    \        # Print the elapsed time\n        print(f\"Elapsed time: {end - start}\
    \ seconds\")\n    # Return the wrapper function\n    return wrapper\n\n# Apply\
    \ both decorators to a function that prints hello\n@print_time\n@print_message\n\
    def hello():\n    print(\"Hello, world!\")\n\n# Call the decorated function\n\
    hello()\n```\n\nOutput:\n\n```\nCalling hello\nHello, world!\nDone\nElapsed time:\
    \ 0.00012302398681640625 seconds\n```\n\nIn this example, the `@print_time` and\
    \ `@print_message` syntax applies both decorators to the `hello` function, in\
    \ that order. This means that the `hello` function is first replaced by the wrapper\
    \ function returned by the `print_message` decorator, and then by the wrapper\
    \ function returned by the `print_time` decorator. When you call the `hello` function,\
    \ you are actually calling the wrapper function returned by the `print_time` decorator,\
    \ which prints the time before and after calling the wrapper function returned\
    \ by the `print_message` decorator, which prints a message before and after calling\
    \ the original `hello` function.\n\n## Decorator Arguments\n\nSometimes, you may\
    \ want to pass some arguments to the decorator itself, instead of the callable\
    \ object that it modifies. For example, you may want to customize the behavior\
    \ of the decorator based on some parameters. This can be useful for creating more\
    \ flexible and reusable decorators.\n\nTo pass arguments to the decorator, you\
    \ need to define a function that takes the arguments and returns another function\
    \ that acts as the decorator. The returned function will take the callable object\
    \ as an argument and return a modified version of it.\n\nFor example, here is\
    \ a decorator that takes a prefix and a suffix as arguments and adds them to the\
    \ message of the function:\n\n```python\ndef add_text(prefix, suffix):\n    #\
    \ Define a function that takes a callable object as an argument and returns a\
    \ decorator\n    def decorator(func):\n        # Define a wrapper function that\
    \ adds the prefix and suffix to the message and calls the original function\n\
    \        def wrapper():\n            print(prefix, end=\"\")\n            func()\n\
    \            print(suffix)\n        # Return the wrapper function\n        return\
    \ wrapper\n    # Return the decorator function\n    return decorator\n```\n\n\
    You can apply this decorator to any function using the @ syntax, and pass the\
    \ arguments in parentheses:\n\n```python\n@add_text(\"(\", \")\")\ndef hello():\n\
    \    print(\"Hello, world!\")\n```\n\nNow, when you call the function, you will\
    \ see the modified output:\n\n```\n>>> hello()\n(Hello, world!)\n```\n\nThe @\
    \ syntax is equivalent to writing:\n\n```python\nhello = add_text(\"(\", \")\"\
    )(hello)\n```\n\nYou can also pass different arguments to the same decorator,\
    \ creating different versions of it. For example, you can write:\n\n```python\n\
    @add_text(\"<\", \">\")\ndef bye():\n    print(\"Bye, world!\")\n```\n\nThis is\
    \ equivalent to writing:\n\n```python\nbye = add_text(\"<\", \">\")(bye)\n```\n\
    \nNow, when you call the function, you will see the modified output:\n\n```\n\
    >>> bye()\n<Bye, world!>\n```\n\n## Decorator Nesting\n\nDecorators can be nested\
    \ inside other decorators, creating higher-order decorators that combine the functionality\
    \ of multiple decorators. This allows you to create more complex and flexible\
    \ decorators that can be applied to different callable objects.\n\nTo nest a decorator\
    \ inside another decorator, you need to define a function that takes a decorator\
    \ as an argument and returns another decorator. The returned decorator will apply\
    \ the original decorator to the callable object and then apply the nested decorator\
    \ to the modified callable object.\n\nFor example, here is a decorator that nests\
    \ another decorator inside a `print_info` decorator:\n\n```python\ndef print_info(func):\n\
    \    # Define a wrapper function that prints the info and calls the original function\n\
    \    def wrapper(*args, **kwargs):\n        print(f\"Calling {func.__name__} with\
    \ args={args} and kwargs={kwargs}\")\n        return func(*args, **kwargs)\n \
    \   # Return the wrapper function\n    return wrapper\n\ndef nest_decorator(decorator):\n\
    \    # Define a function that takes a callable object as an argument and returns\
    \ a nested decorator\n    def wrapper(func):\n        # Apply the original decorator\
    \ to the callable object\n        decorated_func = decorator(func)\n        #\
    \ Apply the print_info decorator to the modified callable object\n        return\
    \ print_info(decorated_func)\n    # Return the wrapper function\n    return wrapper\n\
    ```\n\nYou can use this decorator to nest any decorator inside a print_info decorator.\
    \ For example, you can nest a double_result decorator inside a print_info decorator:\n\
    \n```python\n@nest_decorator(double_result)\ndef add(x, y):\n    return x + y\n\
    ```\n\nThis is equivalent to writing:\n\n```python\nadd = print_info(double_result(add))\n\
    ```\n\nNow, when you call the function, you will see the info printed before the\
