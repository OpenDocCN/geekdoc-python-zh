    ```


    `filter` 函数接受两个参数：一个函数和一个可迭代对象。它将该函数应用于可迭代对象的每个元素，并返回一个 filter 对象，这是一个惰性求值结果的迭代器。要获得列表，你需要使用
    `list` 函数将 filter 对象转换为列表。`lambda` 表达式是一个匿名函数，定义了要应用于每个元素的函数。在这种情况下，如果输入是偶数则返回
    `True`，否则返回 `False`。


    你可能想知道哪种方式更好：使用列表推导式还是使用 `map` 和 `filter`。答案取决于你的偏好和具体情况。列表推导式更具可读性和表达力，因为它们允许你以自然的方式编写逻辑，而无需使用
    lambda 表达式或将迭代器转换为列表。然而，map 和 filter 可能更高效且更节省内存，因为它们避免了创建中间列表并使用惰性求值。它们也可以与其他函数结合使用以执行更复杂的操作。


    ## 生成器


    从现有可迭代对象创建新可迭代对象的另一种方式是使用**生成器**，它类似于列表推导式，但使用圆括号而不是方括号。例如，以下代码使用生成器表达式创建一个迭代器，其中包含列表
    [1, 2, 3, 4, 5] 中数字的平方：


    ```

    >>> numbers = [1, 2, 3, 4, 5]

    >>> squares = (n**2 for n in numbers)

    >>> squares

    <generator object <genexpr> at 0x7f9c6c0a9f90>

    ```


    生成器表达式返回一个生成器对象，这是一个惰性求值结果的迭代器。要获取值，你需要使用 for 循环或消耗迭代器的函数（如 `list`、`sum` 或 `max`）来迭代生成器对象。例如，以下代码打印生成器对象的值：


    ```

    >>> for n in squares:

    ...     print(n)

    ...

    1

