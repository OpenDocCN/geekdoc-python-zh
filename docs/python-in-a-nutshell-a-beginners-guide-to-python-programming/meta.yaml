    \ seconds to execute\nfib took 0.024944782257080078 seconds to execute\nfib took\
    \ 0.03992724418640137 seconds to execute\n\n55\n```\n\nWe can see that the fib\
    \ function is very inefficient, as it makes a lot of recursive calls and repeats\
    \ the same calculations. We can improve the performance of the function by using\
    \ memoization, as we saw in the previous section. This will reduce the number\
    \ of calls and the execution time.\n\n```python\n@timeit\n@functools.lru_cache(maxsize=128)\n\
    def fib(n):\n    if n < 2:\n        return n\n    return fib(n-1) + fib(n-2)\n\
    ```\n\nNow, when we call the function, we will see the execution time printed\
