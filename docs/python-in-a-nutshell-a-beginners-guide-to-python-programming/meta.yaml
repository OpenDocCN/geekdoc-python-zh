    # Fraction Type


    The fraction type represents rational numbers, which are fractions of two integers,
    such as 1/2, 3/4, or -5/9. The fraction type is useful for applications that require
    exact arithmetic with fractions, such as symbolic math or music theory. To create
    a fraction object, we can use the fractions.Fraction() function, passing either
    two integers (numerator and denominator), a string, a float, or another fraction
    object as the argument.


    Examples of fraction type:


    ```

    from fractions import Fraction # import the fractions module

    f1 = Fraction(1, 2) # create a fraction object from two integers

    f2 = Fraction(''3/4'') # create a fraction object from a string

    f3 = Fraction(0.25) # create a fraction object from a float

    f4 = Fraction(f1, f2) # create a fraction object from another fraction object

    print(f1) # 1/2

    print(f2) # 3/4

    print(f3) # 1/4

    print(f4) # 2/3

    ```


    The fractions module also provides some useful functions for working with fractions,
    such as fractions.gcd() to find the greatest common divisor of two integers, and
    fractions.limit_denominator() to find the closest fraction to a given float within
    a given maximum denominator.'
