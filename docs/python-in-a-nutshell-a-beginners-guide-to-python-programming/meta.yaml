    +   - The append() method, which adds an item to the right end of the deque.

    - The appendleft() method, which adds an item to the left end of the deque.

    - The pop() method, which removes and returns an item from the right end of the
    deque.

    - The popleft() method, which removes and returns an item from the left end of
    the deque.

    - The extend() method, which adds multiple items to the right end of the deque.

    - The extendleft() method, which adds multiple items to the left end of the deque.

    - The rotate() method, which rotates the deque by a specified number of steps
    to the right or to the left.


    To implement a stack using a deque, you can use the append() and pop() methods
    to add and remove items from the right end of the deque. For example:


