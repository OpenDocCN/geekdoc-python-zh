    you are consistent. The only difference is that if you want to include a quote
    character inside the string, you need to use the opposite type of quotes to enclose
    the string.


    For example:


    ```

    s = ''She said, "Hello"''


    t = "He said, ''Goodbye''"

    ```


    Alternatively, you can use a backslash (\) to escape the quote character inside
