    >>> numbers

    [0, 3, 4, 5]

    ```


    请注意，新值的长度不必与切片的长度匹配。在这种情况下，新值只有一个元素，而切片有两个元素。因此，该赋值用一个元素替换了两个元素，使列表的长度减少了一个。


    你也可以通过向切片赋予空列表或更长的列表来使用切片插入或删除列表中的元素。例如，以下代码通过向空切片赋予值 1，在列表开头插入该值：


