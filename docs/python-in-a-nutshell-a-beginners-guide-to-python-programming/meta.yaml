    # 输出: None\n\n# 打印函数的用户定义属性字典\nprint(add.__dict__)\n# 输出: {}\n```\n\n你还可以通过使用赋值运算符（`=`）向函数对象添加自己的属性。例如：\n\
    \n```python\n# 定义一个将两个数相加的函数\ndef add(a, b):\n    \"\"\"返回 a 和 b 的和\"\"\"\n  \
