    # Decorators


    Decorators are a powerful feature of Python that allow you to modify the behavior
    of a function or a class without changing its source code. Decorators are functions
    that take another function or a class as an argument, and return a modified version
    of it. Decorators are useful for adding extra functionality, logging, debugging,
    caching, validation, etc. to your functions or classes.


    To create a decorator, you need to define a function that takes another function
    as an argument, and returns a wrapper function that executes some code before
    or after calling the original function.


