    ## 模式匹配


    模式匹配是一种在字符串中查找或替换特定字符模式的技术。Python 提供了一个名为 `re` 的内置模块，该模块实现了正则表达式，这是一种定义和操作模式的强大而灵活的方式。


    正则表达式（或称 regex）是一个定义搜索模式的字符序列。例如，正则表达式 `\d+` 匹配一个或多个数字，正则表达式 `[a-z]+` 匹配一个或多个小写字母，正则表达式
    `\w+` 匹配一个或多个字母数字字符。


    `re` 模块提供了多个函数来对字符串执行模式匹配操作，例如：


    `re.search()`：如果正则表达式在字符串中的任何位置匹配，则返回一个匹配对象，否则返回 `None`。


    例如：


    ```python

    import re

    s = ''Hello, World''

    t = re.search(''o'', s)  # <re.Match object; span=(4, 5), match=''o''>

    u = re.search(''x'', s)  # None

    ```


    `re.match()`：如果正则表达式在字符串的开头匹配，则返回一个匹配对象，否则返回 `None`。


    例如：


    ```python

    import re

    s = ''Hello, World''

    t = re.match(''H'', s)  # <re.Match object; span=(0, 1), match=''H''>

    u = re.match(''o'', s)  # None

    ```


    `re.findall()`：返回正则表达式在字符串中所有匹配项的列表，如果没有匹配项则返回空列表。


    例如：


    ```python

    import re

    s = ''Hello, World''

    t = re.findall(''o'', s)  # [''o'', ''o'']

    u = re.findall(''x'', s)  # []

    ```


    `re.sub()`：返回字符串的一个副本，其中所有正则表达式的匹配项都被替换字符串替换。


    例如：


    ```python

    import re

    s = ''Hello, World''

    t = re.sub(''o'', ''x'', s)  # ''Hellx, Wxrld''

    u = re.sub(''x'', ''y'', s)  # ''Hello, World''

    ```


    `re.split()`：返回一个子字符串列表，这些子字符串由字符串中正则表达式的匹配项分隔。


    例如：


    ```python

    import re

    s = ''Hello, World''

    t = re.split('','', s)  # [''Hello'', '' World'']

    u = re.split(''o'', s)  # [''Hell'', '', W'', ''rld'']

    ```


    `re` 模块还有更多函数和选项，你可以在 Python 文档中探索。你也可以使用在线工具（如 regex101.com）来测试和调试你的正则表达式。


    ## Unicode 字符串


    Unicode 是一个标准，它为世界上每种语言中的每个字符定义了一个唯一的码位。Python 支持 Unicode 字符串，可以存储和操作任何语言和文字的文本数据。


    要在 Python 中创建一个 Unicode 字符串，你可以在字符串字面值前使用 `u` 前缀。


    例如：


    ```python

    s = u''Hello, World''

    t = u''こんにちは、世界''

    u = u''مرحبا، العالم''

    ```


    这些都是有效的 Unicode 字符串，包含来自不同语言和文字的字符。你也可以使用转义序列通过码位来表示 Unicode 字符。


    例如：


    ```python

    s = u''\u0048\u0065\u006c\u006c\u006f''  # ''Hello''

    t = u''\u3053\u3093\u306b\u3061\u306f''  # ''こんにちは''

    u = u''\u0645\u0631\u062d\u0628\u0627''  # ''مرحبا''

    ```


    转义序列 `\u` 后跟四个十六进制数字，通过其码位表示一个 Unicode 字符。对于码位超出基本多文种平面的字符，你也可以使用 `\U` 后跟八个十六进制数字。你也可以使用在线工具（如
    "unicodelookup"）来查找和转换 Unicode 字符。


    Python 提供了多个函数和方法来处理 Unicode 字符串，例如：


    `ord()`：返回单个 Unicode 字符的码位。


    例如：


    ```python

    s = u''Hello''

    t = ord(s[0])  # 72

    u = ord(s[4])  # 111

    ```


    `chr()`：返回与码位对应的 Unicode 字符。例如：


    ```python

    s = chr(72)  # ''H''

    t = chr(111)  # ''o''

    u = chr(12354)  # ''あ''

    ```


    `encode()`：返回一个字节字符串，表示 Unicode 字符串在特定编码下的形式。例如：


    ```python

    s = u''Hello''

    t = s.encode(''utf-8'')  # b''Hello''

    u = s.encode(''ascii'')  # b''Hello''

    v = s.encode(''latin-1'')  # b''Hello''

    ```


    `decode()`：返回一个从字节字符串使用特定编码解码得到的 Unicode 字符串。例如：


    ```python

    s = b''Hello''

    t = s.decode(''utf-8'')  # ''Hello''

    u = s.decode(''ascii'')  # ''Hello''

    v = s.decode(''latin-1'')  # ''Hello''

    ```


    Unicode 字符串还有更多函数和方法，你可以在 Python 文档中探索。


