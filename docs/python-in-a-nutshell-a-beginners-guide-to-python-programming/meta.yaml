    \ multiple for clauses is:\n\n```\n[expression for item1 in iterable1 for item2\
    \ in iterable2 ...]\n```\n\nThe list comprehension iterates over the first iterable,\
    \ then over the second iterable for each item in the first iterable, and so on,\
