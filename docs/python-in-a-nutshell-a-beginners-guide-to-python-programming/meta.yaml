    - bool: a boolean value, which can be either True or False.

    - list: a collection of values that are ordered and changeable, enclosed by square
    brackets [], such as [1, 2, 3], ["a", "b", "c"].

    - tuple: a collection of values that are ordered and unchangeable, enclosed by
    parentheses (), such as (1, 2, 3), ("a", "b", "c").

    - dict: a collection of key-value pairs that are unordered and changeable, enclosed
    by curly braces {}, such as {"name": "Alice", "age": 21}, {"a": 1, "b": 2, "c":
    3}.

