    ## Pattern Matching


    Pattern matching is a technique to find or replace specific patterns of characters
    in a string. Python provides a built-in module called re that implements regular
    expressions, which are a powerful and flexible way to define and manipulate patterns.


    A regular expression, or regex, is a sequence of characters that defines a search
    pattern. For example, the regex \d+ matches one or more digits, the regex [a-z]+
    matches one or more lowercase letters, and the regex \w+ matches one or more alphanumeric
    characters.


    The re module provides several functions to perform pattern matching operations
    on strings, such as:


    re.search(): Returns a match object if the regex matches anywhere in the string,
    or None if not.


    For example:


    ```python

    import re

    s = ''Hello, World''

    t = re.search(''o'', s)  # <re.Match object; span=(4, 5), match=''o''>

    u = re.search(''x'', s)  # None

    ```


    re.match(): Returns a match object if the regex matches at the beginning of the
    string, or None if not.


    For example:


    ```python

    import re

    s = ''Hello, World''

    t = re.match(''H'', s)  # <re.Match object; span=(0, 1), match=''H''>

    u = re.match(''o'', s)  # None

    ```


    re.findall(): Returns a list of all the matches of the regex in the string, or
    an empty list if none.


    For example:


    ```python

    import re

    s = ''Hello, World''

    t = re.findall(''o'', s)  # [''o'', ''o'']

    u = re.findall(''x'', s)  # []

    ```


    re.sub(): Returns a copy of the string with all the matches of the regex replaced
    by a replacement string.


    For example:


    ```python

    import re

    s = ''Hello, World''

    t = re.sub(''o'', ''x'', s)  # ''Hellx, Wxrld''

    u = re.sub(''x'', ''y'', s)  # ''Hello, World''

    ```


    re.split(): Returns a list of substrings that are separated by the matches of
    the regex in the string.


    For example:


    ```python

    import re

    s = ''Hello, World''

    t = re.split('','', s)  # [''Hello'', '' World'']

    u = re.split(''o'', s)  # [''Hell'', '', W'', ''rld'']

    ```


    There are many more functions and options for the re module that you can explore
    in the Python documentation. You can also use online tools such as regex101.com
    to test and debug your regular expressions.


    ## Unicode Strings


    Unicode is a standard that defines a unique code point for every character in
    every language in the world. Python supports Unicode strings, which can store
    and manipulate text data in any language and script.


    To create a Unicode string in Python, you can use the u prefix before the string
    literal.


    For example:


    ```python

    s = u''Hello, World''

    t = u''こんにちは、世界''

    u = u''مرحبا، العالم''

    ```


    These are valid Unicode strings that contain characters from different languages
    and scripts. You can also use escape sequences to represent Unicode characters
    by their code points.


    For example:


    ```python

    s = u''\u0048\u0065\u006c\u006c\u006f''  # ''Hello''

    t = u''\u3053\u3093\u306b\u3061\u306f''  # ''こんにちは''

    u = u''\u0645\u0631\u062d\u0628\u0627''  # ''مرحبا''

    ```


    The escape sequence \u followed by four hexadecimal digits represents a Unicode
    character by its code point. You can also use \U followed by eight hexadecimal
    digits for characters that have code points beyond the Basic Multilingual Plane.
    You can also use online tools such as "unicodelookup" to find and convert Unicode
    characters.


    Python provides several functions and methods to work with Unicode strings, such
    as:


    ord(): Returns the code point of a single Unicode character.


    For example:


    ```python

    s = u''Hello''

    t = ord(s[0])  # 72

    u = ord(s[4])  # 111

    ```


    chr(): Returns the Unicode character corresponding to a code point. For example:


    ```python

    s = chr(72)  # ''H''

    t = chr(111)  # ''o''

    u = chr(12354)  # ''あ''

    ```


    encode(): Returns a byte string that represents the Unicode string in a specific
    encoding. For example:


    ```python

    s = u''Hello''

    t = s.encode(''utf-8'')  # b''Hello''

    u = s.encode(''ascii'')  # b''Hello''

    v = s.encode(''latin-1'')  # b''Hello''

    ```


    decode(): Returns a Unicode string that is decoded from a byte string using a
    specific encoding. For example:


    ```python

    s = b''Hello''

    t = s.decode(''utf-8'')  # ''Hello''

    u = s.decode(''ascii'')  # ''Hello''

    v = s.decode(''latin-1'')  # ''Hello''

    ```


    There are many more functions and methods for Unicode strings that you can explore
    in the Python documentation.


    ## String Extensions


    Python strings have some extensions that are not available in other types of sequences.
    Some of these extensions are:


    - String literals can be enclosed by single or double quotes, or triple quotes
    for multi-line strings.

    - String literals can use escape sequences to represent special characters, such
    as \n for newline, \t for tab, or \x for hexadecimal.

    - String literals can use raw strings to suppress escape sequences by prefixing
    the string with r or R.

    - String literals can use f-strings or formatted string literals to embed expressions
    inside the string, by prefixing the string with f or F.

    - Strings have methods for manipulating and modifying text, such as upper, lower,
    strip, replace, find, count, join, split, and format.

    - Strings support pattern matching using regular expressions, by importing the
    re module and using its functions, such as search, match, findall, sub, and split.


