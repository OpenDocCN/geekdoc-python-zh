  md: '# # Virtual Environments


    Virtual environments are isolated Python environments that allow you to install
    and use packages without affecting the system''s default Python installation.
    They are useful for managing dependencies, avoiding conflicts, and ensuring reproducibility
    of your Python projects.


    Benefits of using virtual environments:


    +   - Virtual environments enable you to work on multiple projects with different
    requirements, without worrying about compatibility issues or polluting the global
    namespace.

    - Virtual environments help you to keep your system clean and organized, by avoiding
    installing unnecessary or outdated packages.

    - Virtual environments make it easier to share and distribute your code, by allowing
    you to specify the exact versions of the packages you used.


    # ## Tools for creating virtual environments


    **venv module (built-in since Python 3.3)**


    The venv module is a standard library module that provides a simple way to create
    and manage virtual environments. It is recommended for most users, as it is easy
    to use and compatible with most Python versions and packages.


    **virtualenv (third-party package)**


    The virtualenv package is a popular and widely used tool for creating and managing
    virtual environments. It offers more features and flexibility than the venv module,
    such as supporting older Python versions, customizing the Python interpreter,
    and creating isolated environments for different Python versions.'
  merge: -1
  pgno: 330
- img_proc: true
  md: '# conda (package and environment manager for scientific Python):


    The conda tool is a powerful package and environment manager that is designed
    for scientific Python. It can create and manage virtual environments, as well
    as install and update packages from various sources, such as Anaconda, PyPI, and
    conda-forge. It is especially useful for working with complex dependencies and
    binary packages, such as numpy, scipy, and tensorflow.


    # Steps to create a virtual environment using each tool


    # venv module


    To create a virtual environment using the venv module, you need to run the following
    command in your terminal, where <env_name> is the name of your virtual environment:


    ```

    python -m venv <env_name>

    ```


    This will create a directory called <env_name> in your current working directory,
    where the virtual environment files will be stored.


    # virtualenv package


    To create a virtual environment using the virtualenv package, you need to first
    install the package using pip:


    ```

    pip install virtualenv

    ```


    Then, you can run the following command in your terminal, where <env_name> is
    the name of your virtual environment:


    ```

    virtualenv <env_name>

    ```'
