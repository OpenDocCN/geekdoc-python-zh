- img_proc: true
  md: '+   - Indentation syntax makes the code more readable, consistent, and elegant,
    as it avoids cluttering the code with extra symbols and enforces a uniform style.

    - Indentation syntax makes the code more concise, as it reduces the number of
    lines and characters needed to write a block of code.

    - Indentation syntax makes the code more error-prone, as it prevents some common
    mistakes, such as forgetting to close a curly brace or misplacing a semicolon.


    Disadvantages:


    +   - Indentation syntax can be confusing or frustrating for some programmers,
    especially those who are used to other languages that use curly braces or keywords.

    - Indentation syntax can be sensitive to whitespace errors, such as mixing spaces
    and tabs, or using inconsistent indentation levels, which can cause syntax errors
    or unexpected behavior.

    - Indentation syntax can be difficult to edit or debug, as it requires careful
    attention to the alignment and spacing of the code.


    # Expressions vs Statements


    An expression is a combination of values, variables, operators, and functions
    that evaluates to a single value. For example, 2 + 3 is an expression that evaluates
    to 5, and len(“Hello”) is an expression that evaluates to 5.


    A statement can contain one or more expressions, but not every expression can
    be a statement. For example, 2 + 3 is a valid expression, but not a valid statement,
    because it does not perform any action or produce any effect. However, print(2
    + 3) is a valid statement, because it displays the value of the expression to
    the standard output. Python has several types of statements that allow you to
    control the flow and logic.'
