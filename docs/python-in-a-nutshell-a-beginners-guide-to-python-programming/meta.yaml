    # String Formatting


    One of the most common tasks involving strings is formatting them to display or
    store data. Python provides several ways to format strings, such as:


    The % operator: This operator can format strings using a printf-style syntax.


    For example:


    ```

    s = ''Hello, %s'' % ''World'' # ''Hello, World''


    t = ''The answer is %d'' % 42 # ''The answer is 42''


    u = ''The value is %.2f'' % 3.14 # ''The value is 3.14''

    ```


    The % operator takes a format string on the left and a value or a tuple of values
    on the right. The format string contains placeholders that start with a % sign,
    followed by a conversion specifier that indicates the type of the value. Some
    of the common conversion specifiers are:


    +   - %s: String

    - %d: Decimal integer

    - %f: Floating-point number'
  - '[PAGE 65]


    +   - %x: Hexadecimal integer

    - %o: Octal integer

    - %e: Exponential notation


    You can also specify the width and precision of the placeholders using numbers
    and dots.


    For example:


    ```

    s = ''%10s'' % ''Hello'' # ''     Hello''

    t = ''%-10s'' % ''Hello'' # ''Hello     ''

    u = ''%10.2f'' % 3

    ```


    Dictionary-based formatting expressions allow you to use a dictionary as the source
    of values for the placeholders in a format string. You can use the “%(key)conversion
    specifier” syntax to refer to the key in the dictionary.


    For example:


    ```

    person = {"name": "Alice", "age": 25}


    s = "Hello, %(name)s. You are %(age)d years old." % person


    # ''Hello, Alice. You are 25 years old.''

    ```


    The str.format() method: This method can format strings using a format string
    that contains placeholders enclosed by curly braces.


    For example:


    ```

    s = ''Hello, {}''.format(''World'') # ''Hello, World''

    t = ''The answer is {}''.format(42) # ''The answer is 42''

    ```'
