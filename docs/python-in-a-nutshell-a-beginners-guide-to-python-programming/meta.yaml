  md: '# Modules


    Modules are files that contain Python code, such as functions, classes, and variables.
    They allow us to organize and reuse code across different programs. Packages are
    collections of modules that are related to each other. For example, the math package
    contains modules for various mathematical operations and constants.


    To use a module in our program, we need to import it first. There are different
    ways to import modules, depending on how we want to access their contents. We
    can use the `import` keyword to import the entire module, and then use the dot
    notation to access its attributes.


    For example:


    ```

    import math

    print(math.pi) # prints 3.141592653589793

    ```


    We can also use the `from...import` keyword to import specific attributes from
    a module, and then use them directly without the dot notation.


    For example:


    ```

    from math import pi

    print(pi) # prints 3.141592653589793

    ```


    We can also use the `as` keyword to give an alias to a module or an attribute,
    and then use the alias instead of the original name.


    For example:


    ```

    import math as m

    ```'
