    # Decimal Type


    The decimal type represents decimal floating-point numbers, which can exactly
    represent decimal fractions such as 0.1, unlike binary floating-point numbers,
    which can only approximate them. The decimal type is useful for applications that
    require high precision or deal with money, as it avoids the rounding errors that
    can occur with binary floating-point arithmetic. To create a decimal object, we
    can use the decimal.Decimal() function, passing a string, an integer, or another
    decimal object as the argument.


    Examples of decimal type:


    ```

    from decimal import Decimal # import the decimal module

    d1 = Decimal(''0.1'') # create a decimal object from a string

    d2 = Decimal(0.1) # create a decimal object from a float

    d3 = Decimal(1) / Decimal(3) # create a decimal object from a division

    print(d1) # 0.1

    print(d2) # 0.1000000000000000055511151231257827021181583404541015625

    print(d3) # 0.33333333333333333333333333333333

    ```


    The decimal module also provides a context object that can be used to set the
    precision, rounding mode, and other options for decimal arithmetic. For example,
    we can use the decimal.getcontext() function to get the current context, and modify
    its attributes as needed.


    Examples of using the decimal context;


    ```

    from decimal import Decimal, getcontext # import the decimal module and the getcontext
    function

    getcontext().prec = 6 # set the precision to 6 digits

    d4 = Decimal(1) / Decimal(3) # create a decimal object from a division

    print(d4) # 0.333333

    ```'
