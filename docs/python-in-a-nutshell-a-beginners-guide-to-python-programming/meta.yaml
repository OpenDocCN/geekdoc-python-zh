    ```


    ## Dynamic Type


    Python is a dynamically typed language, so the type of a variable can change at
    run-time, depending on the value assigned to it. Unlike statically typed languages,
    Python does not require explicit type declarations for variables. Variables have
    their data types determined by the value they currently hold. For example, you
    can create a variable named x and assign it the value 1, which is an integer.
    Then, you can reassign x to the value “Hello”, which is a string. Python will
    not complain or throw an error, because it can change the type of x dynamically.


    ```

    x = 1 # x is an integer

    print(type(x)) # <class ''int''>

    x = "Hello" # x is a string

    print(type(x)) # <class ''str''>

    ```


    A dynamic type can be useful for writing flexible and concise code, but it can
    also introduce some errors and bugs that are hard to detect and debug. For example,
    if you try to perform an operation that is not supported by the current type of
    a variable, you will get a run-time error. For example, you can create a variable
