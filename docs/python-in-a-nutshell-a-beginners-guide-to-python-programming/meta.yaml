    - 集合没有保证的顺序，因为哈希函数可能会根据哈希表的大小和容量将键映射到不同的桶中。这意味着遍历集合在不同的运行中可能会产生不同的结果。要保留顺序，你可以使用列表或元组而不是集合。\n\
    - 集合的大小是可变的，因为哈希表可能会根据元素的数量和负载因子而增长或缩小。这意味着从集合中添加或删除元素可能会改变其内存占用和性能。\n\n### 操作\n\
