  md: '+   - | (bitwise OR): returns a number with the bits that are set in either
    or both operands.

    - ^ (bitwise XOR): returns a number with the bits that are set in one but not
    both operands.

    - ~ (bitwise NOT): returns the complement of the operand, with all the bits flipped.

    - << (left shift): returns the operand shifted to the left by the specified number
    of bits, filling the vacated bits with zeros.

    - >> (right shift): returns the operand shifted to the right by the specified
    number of bits, discarding the shifted bits.


    Examples of bitwise operations:


    ```

    a = 0b1010 # 10 in decimal

    b = 0b1100 # 12 in decimal

    print(bin(a & b)) # bitwise AND, 0b1000 (8 in decimal)

    print(bin(a | b)) # bitwise OR, 0b1110 (14 in decimal)

    print(bin(a ^ b)) # bitwise XOR, 0b110 (6 in decimal)

    print(bin(~a)) # bitwise NOT, -0b1011 (-11 in decimal)

    print(bin(a << 2)) # left shift by 2 bits, 0b101000 (40 in decimal)

    print(bin(a >> 2)) # right shift by 2 bits, 0b10 (2 in decimal)

    ```


