    ## 位运算


    Python 支持对整数进行位运算，将数字视为比特序列并对其执行逻辑运算。


    位运算符包括：


    -   `&`（按位与）：返回一个数字，其比特位仅在两个操作数中都设置时才设置。

    -   `|`（按位或）：返回一个数字，其比特位在任一或两个操作数中设置时即设置。

    -   `^`（按位异或）：返回一个数字，其比特位仅在一个操作数中设置而不在两个操作数中同时设置。

    -   `~`（按位非）：返回操作数的补码，所有比特位取反。

    -   `<<`（左移）：返回操作数向左移动指定比特位的结果，空出的比特位用零填充。

    -   `>>`（右移）：返回操作数向右移动指定比特位的结果，移出的比特位被丢弃。


    位运算示例：


    ```

    a = 0b1010 # 十进制中的 10

    b = 0b1100 # 十进制中的 12

    print(bin(a & b)) # 按位与，0b1000（十进制中的 8）

    print(bin(a | b)) # 按位或，0b1110（十进制中的 14）

    print(bin(a ^ b)) # 按位异或，0b110（十进制中的 6）

    print(bin(~a)) # 按位非，-0b1011（十进制中的 -11）

    print(bin(a << 2)) # 左移 2 位，0b101000（十进制中的 40）

    print(bin(a >> 2)) # 右移 2 位，0b10（十进制中的 2）

    ```


