  md: '# # Lists


    Lists are one of the most versatile and commonly used data structures in Python.
    They are ordered collections of arbitrary objects that can be modified, sliced,
    iterated, and manipulated in various ways. In this chapter, you will learn how
    to:


    +   - Create and access lists

    - Perform basic operations on lists, such as adding, removing, and sorting elements

    - Use nested lists to create matrices and multidimensional arrays

    - Use list comprehensions and generator expressions to create lists in a concise
    and elegant way

    - Compare the performance and trade-offs of different ways of processing lists,
    such as using built-in functions, loops, or map and filter

    - Use the bisect module to perform binary search and insertion on sorted lists

    - Use the array module and the NumPy package to create and manipulate efficient
    arrays and matrices


    # ## Creating and Accessing Lists


    A list is created by enclosing a comma-separated sequence of objects in square
    brackets. For example, the following code creates a list of four integers:


    ```

    >>> numbers = [1, 2, 3, 4]

    >>> numbers

    [1, 2, 3, 4]

    ```'
