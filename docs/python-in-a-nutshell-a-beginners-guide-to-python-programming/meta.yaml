- md: "## Exception is a class\n\nThere are many built-in exceptions in Python, such\
    \ as `ZeroDivisionError`, `ValueError`, `IndexError`, etc. that are raised when\
    \ a specific error occurs. We can also define our own custom exceptions by creating\
    \ a class that inherits from the `Exception` class or any of its subclasses.\n\
    \nTo handle exceptions in Python, we use the `try-except` block, which has the\
    \ following syntax:\n\n```python\ntry:\n    # try block\n    # write the code\
    \ that may cause an exception\nexcept ExceptionType as e:\n    # except block\n\
    \    # write the code that handles the exception\n    # use the variable e to\
    \ access the exception object\n```\n\nThe `try` block contains the code that may\
    \ cause an exception, and the `except` block contains the code that handles the\
    \ exception. The `ExceptionType` is the name of the exception class that we want\
    \ to catch, and the `e` is the variable that holds the exception object. We can\
    \ have multiple `except` blocks for different types of exceptions, or use a generic\
    \ `except` block that catches any exception. For example, to handle a `ZeroDivisionError`\
    \ and a generic exception, we write:\n\n```python\ntry:\n    # try block\n   \
    \ # divide a number by zero\n    x = 10 / 0\nexcept ZeroDivisionError as e:\n\
    \    # except block for ZeroDivisionError\n    # print the error message\n   \
    \ print(f\"Cannot divide by zero: {e}\")\nexcept Exception as e:\n    # except\
    \ block for any other exception\n    # print the error message\n    print(f\"\
    Something went wrong: {e}\")\n```\n\nTo raise an exception in Python, we use the\
    \ `raise` statement, which has the following syntax:\n\n```python\nraise ExceptionType(\"\
    error message\")\n```\n\nThe `raise` statement creates an exception object of\
    \ the specified type, and passes the error message as an argument. The exception\
    \ object is then thrown to the caller of the function, or to the `except` block\
    \ if there is one. For example, to raise a `ValueError` in a function, we write:\n\
    \n```python\ndef square_root(x):\n    # check if the input is valid\n    if x\
    \ < 0:\n        # raise a ValueError\n        raise ValueError(\"Cannot take the\
    \ square root of a negative number.\")\n    else:\n        # return the square\
    \ root\n        return x ** 0.5\n```\n\nTo create a custom exception in Python,\
    \ we create a class that inherits from the `Exception` class or any of its subclasses,\
    \ and define the `__init__` and `__str__` methods. The `__init__` method takes\
    \ the error message as an argument, and passes it to the superclass constructor.\
    \ The `__str__` method returns the error message as a string. For example, to\
    \ create a custom exception called `InvalidAgeError`, we write:\n\n```python\n\
    class InvalidAgeError(Exception):\n    # constructor\n    def __init__(self, message):\n\
    \        # call the superclass constructor\n        super().__init__(message)\n\
    \n    # string representation\n    def __str__(self):\n        return self.message\n\
    ```\n\nTo use the custom exception, we can raise it or catch it as usual. For\
    \ example, to raise and catch the `InvalidAgeError`, we write:\n\n```python\n\
    try:\n    # try block\n    # get the age from the user\n    age = int(input(\"\
    Enter your age: \"))\n    # check if the age is valid\n    if age < 0 or age >\
    \ 120:\n        # raise the custom exception\n        raise InvalidAgeError(\"\
    Invalid age value.\")\n    else:\n        # print the age\n        print(f\"Your\
    \ age is {age}.\")\nexcept InvalidAgeError as e:\n    # except block for the custom\
    \ exception\n    # print the error message\n    print(f\"Error: {e}\")\n```\n\n\
    ## Advanced OOP Concepts\n\nIn this topic, we will explore some advanced concepts\
    \ of object-oriented programming in Python, such as mixins, metaclasses, iterators.\n\
    \n## Mixins\n\nA mixin is a class that contains methods that can be reused by\
    \ other classes, without requiring inheritance. A mixin is typically used to provide\
    \ a specific functionality or behavior to a class, without affecting its hierarchy\
    \ or structure. A mixin can also be used to implement multiple inheritance, which\
    \ is the ability of a class to inherit from more than one class. To use a mixin\
    \ in Python, we simply inherit from the mixin class along with the other base\
    \ classes, and use the methods defined by the mixin as usual. For example, to\
    \ create a mixin class called `Flyable` that contains a method called `fly`, and\
    \ use it in a subclass called `Superman` that inherits from the `Person` class\
    \ and the `Flyable` class, we write:\n\n```python\nclass Flyable:\n    # mixin\
    \ method\n    def fly(self):\n        print(\"I can fly.\")\n\nclass Person:\n\
    \    # instance attribute\n    def __init__(self, name):\n        self.name =\
    \ name\n\n    # method\n    def greet(self):\n        print(f\"Hello, my name\
    \ is {self.name}.\")\n\nclass Superman(Person, Flyable):\n    # subclass constructor\n\
    \    def __init__(self, name):\n        # call the superclass constructor\n  \
    \      super().__init__(name)\n\ns = Superman(\"Clark\")\ns.greet() # Hello, my\
    \ name is Clark.\ns.fly() # I can fly.\n```\n\n## Metaclasses\n\nA metaclass is\
    \ a class that defines how other classes are created. A metaclass is typically\
    \ used to modify or customize the behavior or structure of a class, such as adding\
    \ or removing attributes or methods, changing the inheritance, enforcing rules\
    \ or constraints, etc. A metaclass can also be used to implement the **singleton**\
    \ pattern, which is the design principle that ensures that only one instance of\
    \ a class can be created. To use a metaclass in Python, we have to define a class\
    \ that inherits from the `type` class, which is the default metaclass in Python,\
    \ and override the `__new__` method, which is the method that is called before\
    \ the `__init__` method to create the class object. We also have to use the `metaclass`\
    \ keyword argument in the class definition to specify the metaclass. For example,\
    \ to create a metaclass called `Singleton` that implements the singleton pattern,\
    \ and use it in a class called `Database`, we write:\n\n```python\nclass Singleton(type):\n\
    \    # class attribute to store the singleton instance\n    _instance = None\n\
    \n    # overridden method\n    def __new__(cls, name, bases, attrs):\n       \
    \ # check if the singleton instance already exists\n        if cls._instance is\
    \ None:\n            # create the singleton instance\n            cls._instance\
    \ = super().__new__(cls, name, bases, attrs)\n        # return the singleton instance\n\
    \        return cls._instance\n\nclass Database(metaclass=Singleton):\n    # instance\
