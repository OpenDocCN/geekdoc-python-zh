    ## Hash Tables


    As we have seen, hash tables are data structures that store key-value pairs using
    a hash function to map keys to buckets. A hash function is a mathematical function
    that takes any object and returns a fixed-length number, called a hash value or
    a hash code. A good hash function should have the following properties:


    - It should be fast and easy to compute.

    - It should distribute the keys uniformly across the buckets, minimizing the chances
    of collisions.

    - It should produce different hash values for different objects, or at least minimize
    the chances of hash collisions.


    A hash collision occurs when two different objects have the same hash value, and
    thus map to the same bucket. This can cause problems for the hash table, as it
    has to resolve the conflict and store both key-value pairs in the same bucket.
    There are different ways to handle hash collisions, such as chaining, linear probing,
    or double hashing. Python uses a technique called open addressing with linear
    probing, which means that it tries to find an empty slot in the next available
    position in the hash table.


    The hash function used by Python for dictionaries and sets is based on the `__hash__`
    method of the objects, which returns an integer value. The `__hash__` method is
    defined by default for most built-in types, such as numbers, strings, tuples,
    and frozen sets. However, some types are not hashable, such as lists, dictionaries,
    sets, and custom classes that do not implement `__hash__` and `__eq__` methods.
