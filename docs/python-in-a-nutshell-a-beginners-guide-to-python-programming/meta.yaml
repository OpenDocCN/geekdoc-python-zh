    # Hex, Octal, Binary: Literals and Conversions


    Python supports hexadecimal, octal, and binary literals as well as decimal literals.
    Hexadecimal literals start with 0x or 0X, followed by digits from 0 to 9 and letters
    from A to F (case-insensitive). Octal literals start with 0o or 0O, followed by
    digits from 0 to 7. Binary literals start with 0b or 0B, followed by digits 0
    or 1.'
