    ## 列表推导式、map 和 filter


    正如你所见，列表推导式是从现有列表创建新列表的一种强大而简洁的方式。然而，它们并不是唯一的方法。你也可以使用内置函数 `map` 和 `filter` 将函数应用于可迭代对象的每个元素，并返回一个新的可迭代对象。例如，以下代码使用
