    ## Dictionaries


    Dictionaries are one of the most powerful and versatile data structures in Python.
    They allow you to store and access data using key-value pairs, where each key
    is associated with a value. Dictionaries are mutable, meaning that you can add,
    remove, or modify items after creating them. They are also ordered, meaning that
    the items have a defined order that will not change unless you explicitly reorder
    them.


    In this section, you will learn how to create, manipulate, and use dictionaries
    in various ways. You will also explore some of the built-in modules and classes
    that provide additional functionality and features for working with dictionaries.


    ### Basic Dictionary Operations


    To create a dictionary, you can use curly braces `{}` and separate the key-value
    pairs with commas. You can also use the `dict()` constructor function and pass
    a sequence of key-value pairs as an argument. For example:


    ```

    # Using curly braces

    my_dict = {"name": "Alice", "age": 25, "occupation": "programmer"}

    ```


    ```

    # Using dict() constructor

    my_dict = dict(name="Alice", age=25, occupation="programmer")

    ```


    To access the value of a specific key, you can use square brackets `[]` and pass
    the key as an index. You can also use the `get()` method and pass the key as an
    argument. The `get()` method returns `None` if the key does not exist, while the
    square brackets will raise a `KeyError` exception. For example:


    ```

    # Using square brackets

    print(my_dict["name"]) # Alice

    print(my_dict["gender"]) # KeyError: ''gender''

    ```


    ```

    # Using get() method

    print(my_dict.get("name")) # Alice

    print(my_dict.get("gender")) # None

    ```


    To add or update an item in a dictionary, you can assign a value to a key using
    the assignment operator `=`. If the key already exists, the value will be overwritten.
    If the key does not exist, a new item will be added. For example:


    ```

    # Adding a new item

    my_dict["gender"] = "female"


    # Updating an existing item

    my_dict["age"] = 26

    ```


    To delete an item from a dictionary, you can use the `del` statement and pass
    the key as an index. You can also use the `pop()` method and pass the key as an
    argument. The `pop()` method returns the value of the deleted item, while the
    `del` statement does not. For example:


    ```

    # Using del statement

    del my_dict["occupation"]


    # Using pop() method

    age = my_dict.pop("age")

    print(age) # 26

    ```


    To check if a key exists in a dictionary, you can use the `in` operator or the
    `has_key()` method. The `in` operator returns `True` if the key is found, and
    `False` otherwise. The `has_key()` method does the same, but it is deprecated
    in Python 3 and should be avoided. For example:


    ```

    # Using in operator

    print("name" in my_dict) # True

    print("salary" in my_dict) # False

    ```


    ```

    # Using has_key() method (deprecated)

    print(my_dict.has_key("name")) # True

    print(my_dict.has_key("salary")) # False

    ```


    To get the number of items in a dictionary, you can use the `len()` function and
    pass the dictionary as an argument. For example:


    ```

    # Getting the length of a dictionary

    print(len(my_dict)) # 2

    ```


    To get a list of all the keys, values, or key-value pairs in a dictionary, you
    can use the `keys()`, `values()`, or `items()` methods, respectively. These methods
