    # Python''s Core Data Types


    Python has the following core data types built-in by default:


    +   - Numeric types: These are types that represent numbers, such as integers,
    floating-point numbers, and complex numbers. You can use these types to perform
    various mathematical operations and calculations.

    - String type: This is the type that represents text or a sequence of characters.
    In Python, there is only one string type, which is `str`. You can use this type
    to store and manipulate strings of any length and encoding.

    - Sequence types: These are types that represent ordered collections of items,
    such as lists, tuples, and ranges. You can use these types to store and access
    multiple values sequentially.

    - Mapping type: This is the type that represents unordered collections of key-value
    pairs, such as dictionaries. You can use this type to store and retrieve values
    by their associated keys.

    - Set types: These are types that represent unordered collections of unique items,
    such as sets and frozensets. You can use these types to perform operations on
    sets, such as union, intersection, and difference.

    - Boolean type: This is the type that represents the truth values of logic, which
    are `True` and `False`. You can use this type to evaluate conditions and control
    the flow of your program.

    - Binary types: These are types that represent sequences of bytes, such as bytes,
    bytearrays, and memoryviews. You can use these types to handle binary data, such
    as images, and files.

    - None type: This is the type that represents the absence of a value, which is
    `None`. You can use this type to indicate that a variable or a function has no
