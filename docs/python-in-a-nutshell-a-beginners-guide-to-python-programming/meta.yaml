    \n## Functions\n\nFunctions are one of the most powerful features of Python. They\
    \ allow you to group a set of statements together to perform a specific task.\
    \ You can reuse functions in different parts of your program, which makes your\
    \ code more modular, readable, and maintainable. You can also pass data to functions\
