    >>> range(1, 4) * 2

    range(1, 4, 1, 4)

    ```


    然而，在序列上使用 + 和 * 运算符时有一些限制和注意事项。例如：


    - 你只能对相同类型的序列使用 + 运算符。例如，你不能连接列表和元组，或者字符串和范围。

    - 你只能对序列和整数使用 * 运算符。例如，你不能用分数或负数重复序列。

    - + 和 * 运算符创建的是新序列，而不是原始序列的视图。因此，它们可能比切片或迭代序列消耗更多的内存和时间。


