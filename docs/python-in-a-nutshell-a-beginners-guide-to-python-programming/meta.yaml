    ## 列表推导式\n\n列表推导式是一种简洁且富有表现力的方式，可以从其他可迭代对象创建列表。我们可以使用列表推导式对可迭代对象中的每个元素应用某些操作或函数，并获得包含结果的新列表。列表推导式的语法是：\n\
    \n```\n[expression for item in iterable]\n```\n\n表达式可以是任何涉及该元素的有效 Python 表达式，例如数学运算、函数调用或条件表达式。可迭代对象可以是任何支持迭代的对象，例如列表、元组、字符串或文件。列表推导式返回一个新列表，其中包含对可迭代对象中每个元素应用表达式的结果。\n\
    \n例如，我们可以使用列表推导式从数字列表创建平方数列表：\n\n```\nnumbers = [1, 2, 3, 4, 5] # create a list\
