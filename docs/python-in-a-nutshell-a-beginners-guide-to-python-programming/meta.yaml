    Recursion is a powerful and elegant way to solve problems that have a recursive
    structure, by using a function that calls itself. However, recursion also has
    some limitations and drawbacks, such as:


    +   - **Stack overflow**: Recursion uses the call stack to keep track of the function
    calls and their arguments. The call stack is a data structure that stores the
    information about the active function calls in a last-in, first-out (LIFO) order.
    Each function call creates a new stack frame, which is a section of the stack
    that contains the information about the function, such as its name, parameters,
    local variables, return address, etc. When a function returns, its stack frame
    is popped from the stack, and the control is transferred to the previous function
    call. However, the call stack has a limited size, and if the recursion is too
    deep or infinite, the stack may run out of space, and cause a stack overflow error,
    which terminates the program. To avoid stack overflow, you need to limit the depth
    of the recursion, or use an iterative solution instead of a recursive one.

    - **Redundant computation**: Recursion may involve repeated or redundant computation,
    as the same subproblem may be solved multiple times by different function calls.
    This may lead to inefficiency and waste of time and resources. To avoid redundant
    computation, you need to store the results of the subproblems in a cache or a
    dictionary, and reuse them when needed. This technique is called memoization,
    and it can improve the performance and speed of the recursive function.'
