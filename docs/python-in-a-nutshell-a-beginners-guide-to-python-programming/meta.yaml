  - "[PAGE 295]\n\nThe enumerate function takes two arguments: an iterable and a start.\
    \ The start is the first index to use for the counter, and the default value is\
    \ 0. The enumerate function returns an object that is not a list, but an optimized\
    \ iterable that does not store the tuples in memory, but generates them on demand.\
    \ We can use the list function to convert an enumerate object into a list, if\
    \ we need to.\n\nWe can also use the enumerate function in a for loop, and unpack\
    \ the tuples into separate variables. For example, we can use the enumerate function\
    \ to iterate over a list of names and print their indices and values:\n\n```\n\
    names = ['Alice', 'Bob', 'Charlie', 'David', 'Eve'] # create a list of names\n\
    for i, name in enumerate(names): # iterate over the enumerate object and unpack\
    \ the tuples\n    print(i, name) # print the index and the name\n```\n\nThe output\
    \ is:\n\n```\n0 Alice\n1 Bob\n2 Charlie\n3 David\n4 Eve\n```\n\n# The reversed\
    \ function\n\nIt returns an iterable that reverses another iterable. We can use\
    \ the reversed function to create an iterable that iterates over the items from\
    \ an iterable in reverse order, and get a new iterable with the reversed items.\
    \ For example, we can use the reversed function to create a list of numbers from\
    \ a list of numbers in reverse order:\n\n```\nnumbers = [1, 2, 3, 4, 5] # create\
    \ a list of numbers\nreversed_numbers = reversed(numbers) # create an iterable\
    \ that reverses the numbers\nprint(list(reversed_numbers)) # convert the iterable\
    \ into a list and print it\n```"
  - "[PAGE 296]\n\nThe output is:\n\n```\n[5, 4, 3, 2, 1]\n```\n\nThe reversed function\
    \ takes one argument: an iterable. The iterable must be a sequence, such as a\
    \ list, a tuple, or a string, or an object that has a __reversed__ method. The\
    \ reversed function returns an object that is not a list, but an optimized iterable\
    \ that does not store the results in memory, but generates them on demand. We\
    \ can use the list function to convert a reversed object into a list, if we need\
    \ to.\n\nWe can also use the reversed function in a for loop, and get the items\
    \ in reverse order. For example, we can use the reversed function to iterate over\
    \ a list of numbers and print them in reverse order:\n\n```\nnumbers = [1, 2,\
    \ 3, 4, 5] # create a list of numbers\nfor n in reversed(numbers): # iterate over\
    \ the reversed object\n    print(n) # print each number\n```\n\nThe output is:\n\
    \n```\n5\n4\n3\n2\n1\n```\n\n# The iter function\n\nThe iter() function can also\
    \ be used to create an iterator from a callable object and a sentinel value. A\
