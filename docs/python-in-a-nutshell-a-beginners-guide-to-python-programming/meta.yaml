  mdcn: "## 扩展列表推导式\n\n列表推导式也可以包含多个 `for` 子句，这使我们能够从嵌套或多个可迭代对象中创建列表。例如，我们可以使用列表推导式从两个列表中创建一个配对列表：\n\
    \n```\na = [1, 2, 3] # 创建一个数字列表\nb = ['a', 'b', 'c'] # 创建一个字母列表\npairs = [(x,\
