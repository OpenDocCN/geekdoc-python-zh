    a name that refers to an object in memory. In Python, variables do not have to
    be declared explicitly, and their data type can change dynamically based on the
    value assigned.


    The syntax of an assignment statement is:


    variable = expression


    where variable is the name of the variable, and expression is any valid Python
    expression that evaluates to a value. The = operator assigns the value of the
    expression to the variable.


    For example:


    x = 10 # assign the integer value 10 to x

    y = "Hello" # assign the string value "Hello" to y

    z = x + 5 # assign the result of the expression x + 5 to z


    Python also supports multiple assignment, where more than one variable can be
    assigned at the same time. The syntax of multiple assignment is:


    variable1, variable2, ..., variableN = expression1, expression2, ..., expressionN


    where variable1, variable2, ..., variableN are the names of the variables, and
    expression1, expression2, ..., expressionN are the corresponding expressions that
    evaluate to values. The number of variables and expressions must match, and the
    values are assigned from left to right.


    For example:


    x, y, z = 1, 2, 3 # assign 1 to x, 2 to y, and 3 to z

    a, b = b, a # swap the values of a and b


