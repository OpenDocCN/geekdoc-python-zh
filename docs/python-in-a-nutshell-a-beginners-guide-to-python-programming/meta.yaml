  md: '# Expression statements


    An expression statement evaluates an expression and displays the result to the
    standard output. For example, print(x) evaluates the expression x and displays
    its value to the standard output.


    Some expressions can cause in-place changes to the objects they operate on, such
    as lists, dictionaries, sets, and objects with methods that modify their state.
    For example, the append() method of a list object adds an element to the end of
    the list, and the pop() method of a dictionary object removes and returns a key-value
    pair from the dictionary. These expressions do not return a new object, but modify
    the existing one. Therefore, using them as expression statements can have side
    effects on the program.


    For example, the following expression statements cause in-place changes to the
    list x and the dictionary y:


    ```

    x = [1, 2, 3] # A list object

    x.append(4) # An expression statement that modifies x

    print(x) # Prints [1, 2, 3, 4]

    y = {"a": 1, "b": 2, "c": 3} # A dictionary object

    y.pop("b") # An expression statement that modifies y

    print(y) # Prints {"a": 1, "c": 3}

    ```


    # Assignment Statement and Syntax


    An assignment statement is used to assign a value to a variable. A variable is
    a name that refers to an object in memory. In Python, variables do not have to
    be declared explicitly, and their data type can change dynamically based on the
    value assigned.


    The syntax of an assignment statement is:


    ```

    variable = expression

    ```'
