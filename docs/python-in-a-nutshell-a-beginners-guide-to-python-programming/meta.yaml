    \ seconds to execute\nfib took 0.0009970664978027344 seconds to execute\nfib took\
    \ 0.0009970664978027344 seconds to execute\n55\n```\n\nWe can see that the fib\
    \ function is much faster, as it only makes one call for each argument and retrieves\
    \ the results from the cache.\n\n## Validating Function Arguments\n\nAnother useful\
    \ application of function decorators is validating function arguments, which means\
    \ checking if the arguments passed to the function meet some criteria or constraints.\
    \ This can be helpful for ensuring the correctness and robustness of the function.\n\
    \nTo implement a validation decorator, we can use the assert statement to raise\
    \ an exception if the arguments do not satisfy the condition. We can also use\
    \ the functools.wraps decorator to preserve the identity and documentation of\
    \ the function.\n\nFor example, here is a decorator that checks if the arguments\
    \ passed to the function are positive numbers:\n\n```python\nimport functools\n\
    \ndef positive(func):\n    # Define a wrapper function that validates the arguments\
    \ and calls the original function\n    @functools.wraps(func)\n    def wrapper(*args,\
    \ **kwargs):\n        # Check if all the arguments are positive numbers\n    \
    \    assert all(isinstance(arg, (int, float)) and arg > 0 for arg in args), \"\
    Arguments must be positive numbers\"\n        # Call the original function\n \
    \       return func(*args, **kwargs)\n    # Return the wrapper function\n    return\
    \ wrapper\n```\n\nWe can apply this decorator to any function that expects positive\
    \ numbers as arguments using the @ syntax:\n\n```python\n@positive\ndef add(x,\
    \ y):\n    return x + y\n```\n\nNow, when we call the function with valid arguments,\
    \ we will get the result as expected:\n\n```\n>>> add(3, 4)\n7\n```\n\nHowever,\
    \ when we call the function with invalid arguments, we will get an exception:\n\
    \n```\n>>> add(-3, 4)\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\n  File \"<stdin>\", line 5, in wrapper\nAssertionError:\
    \ Arguments must be positive numbers\n```\n\nWe can also use the functools module\
    \ to create more complex validation decorators, such as the singledispatch decorator,\
    \ which allows us to define different behaviors for the function based on the\
    \ type of the first argument. This can be useful for creating generic functions\
    \ that can handle different types of inputs.\n\nFor example, here is a decorator\
    \ that defines different behaviors for the add function based on the type of the\
    \ first argument:\n\n```python\nimport functools\n\n@functools.singledispatch\n\
    def add(x, y):\n    # The default behavior for the add function\n    raise NotImplementedError(\"\
    Unsupported type\")\n\n@add.register\ndef _(x: int, y: int):\n    # The behavior\
    \ for the add function when the first argument is an int\n    return x + y\n\n\
    @add.register\ndef _(x: str, y: str):\n    # The behavior for the add function\
    \ when the first argument is a str\n    return x + y\n\n@add.register\ndef _(x:\
    \ list, y: list):\n    # The behavior for the add function when the first argument\
    \ is a list\n    return x + y\n```\n\nNow, when we call the function with different\
    \ types of arguments, we will get different results:\n\n```\n>>> add(3, 4)\n7\n\
    >>> add(\"Hello\", \"World\")\n\"HelloWorld\"\n>>> add([1, 2], [3, 4])\n[1, 2,\
    \ 3, 4]\n>>> add(3.0, 4.0)\nNotImplementedError: Unsupported type\n```\n\n## Coroutines\
    \ and Async/Await\n\nCoroutines are a generalization of subroutines that can be\
    \ suspended and resumed multiple times. Coroutines are useful for creating concurrent\
    \ programs that can perform multiple tasks without blocking the main thread. Coroutines\
    \ are also a core concept of asynchronous programming, a paradigm that focuses\
    \ on writing non-blocking code that can handle multiple events or requests at\
    \ the same time.\n\nTo create a coroutine in Python, you need to use the `async`\
    \ keyword before the `def` keyword in your function definition. The `async` keyword\
    \ indicates that the function is a coroutine, and that it can use the `await`\
    \ keyword to suspend its execution until another coroutine or an asynchronous\
    \ operation is completed.\n\nFor example:\n\n```python\n# Import the asyncio module\n\
    import asyncio\n\n# Define a coroutine that prints a message after a delay\nasync\
    \ def hello(delay):\n    # Print a message before the delay\n    print(f\"Hello,\
    \ world! Waiting for {delay} seconds...\")\n    # Await for the asyncio.sleep\
    \ function, which is an asynchronous operation that suspends the coroutine for\
    \ a given number of seconds\n    await asyncio.sleep(delay)\n    # Print a message\
    \ after the delay\n    print(f\"Hello, world! Done waiting for {delay} seconds.\"\
    )\n\n# Create an event loop, which is an object that manages the execution of\
    \ coroutines and asynchronous operations\nloop = asyncio.get_event_loop()\n\n\
    # Run the hello coroutine using the event loop\n```"
  mdcn: "## 计时调用\n\n函数装饰器的另一个常见用例是计时调用，即测量并打印函数的执行时间。这对于分析和优化函数性能非常有帮助。\n\n要实现一个计时装饰器，我们可以使用\
    \ `time` 模块在调用函数前后获取当前时间，并计算差值。我们还可以使用 `functools.wraps` 装饰器来保留函数的标识和文档。\n\n```python\n\
    import functools\nimport time\n\ndef timeit(func):\n    # 定义一个包装函数，用于计时执行并调用原始函数\n\
    \    @functools.wraps(func)\n    def wrapper(*args, **kwargs):\n        # 获取开始时间\n\
    \        start = time.time()\n        # 调用原始函数\n        result = func(*args, **kwargs)\n\
    \        # 获取结束时间\n        end = time.time()\n        # 计算耗时\n        elapsed\
    \ = end - start\n        # 打印耗时\n        print(f\"{func.__name__} took {elapsed}\
    \ seconds to execute\")\n        # 返回结果\n        return result\n    # 返回包装函数\n\
    \    return wrapper\n```\n\n我们可以使用 `@` 语法将此装饰器应用于任何函数：\n\n```python\n@timeit\n\
    def fib(n):\n    if n < 2:\n        return n\n    return fib(n-1) + fib(n-2)\n\
    ```\n\n现在，当我们调用该函数时，将在结果之后看到打印的执行时间：\n\n```\n>>> fib(10)\nfib took 0.0009975433349609375\
    \ seconds to execute\nfib took 0.0009970664978027344 seconds to execute\nfib took\
    \ 0.0029916763305664062 seconds to execute\nfib took 0.0009970664978027344 seconds\
    \ to execute\nfib took 0.0009970664978027344 seconds to execute\nfib took 0.004985332489013672\
    \ seconds to execute\nfib took 0.0009970664978027344 seconds to execute\nfib took\
    \ 0.0009970664978027344 seconds to execute\nfib took 0.0029914379119873047 seconds\
    \ to execute\nfib took 0.0009970664978027344 seconds to execute\nfib took 0.0009970664978027344\
    \ seconds to execute\nfib took 0.004985570907592773 seconds to execute\nfib took\
    \ 0.014962911605834961 seconds to execute\nfib took 0.0009970664978027344 seconds\
    \ to execute\nfib took 0.0009970664978027344 seconds to execute\nfib took 0.0029914379119873047\
    \ seconds to execute\nfib took 0.0009970664978027344 seconds to execute\nfib took\
    \ 0.0009970664978027344 seconds to execute\nfib took 0.004985570907592773 seconds\
    \ to execute\nfib took 0.0009970664978027344 seconds to execute\nfib took 0.0009970664978027344\
    \ seconds to execute\nfib took 0.0029914379119873047 seconds to execute\nfib took\
    \ 0.008976936340332031 seconds to execute\nfib took 0.024944782257080078 seconds\
    \ to execute\nfib took 0.03992724418640137 seconds to execute\n\n55\n```\n\n我们可以看到\
    \ `fib` 函数效率非常低，因为它进行了大量递归调用并重复了相同的计算。我们可以使用记忆化来提高函数的性能，正如我们在上一节中看到的那样。这将减少调用次数和执行时间。\n\
    \n```python\n@timeit\n@functools.lru_cache(maxsize=128)\ndef fib(n):\n    if n\
    \ < 2:\n        return n\n    return fib(n-1) + fib(n-2)\n```\n\n现在，当我们调用该函数时，将在结果之后看到打印的执行时间：\n\
    \n```\n>>> fib(10)\nfib took 0.0009970664978027344 seconds to execute\nfib took\
    \ 0.0009970664978027344 seconds to execute\nfib took 0.0009970664978027344 seconds\
    \ to execute\nfib took 0.0009970664978027344 seconds to execute\nfib took 0.0009970664978027344\
    \ seconds to execute\nfib took 0.0009970664978027344 seconds to execute\nfib took\
    \ 0.0009970664978027344 seconds to execute\nfib took 0.0009970664978027344 seconds\
    \ to execute\nfib took 0.0009970664978027344 seconds to execute\nfib took 0.0009970664978027344\
    \ seconds to execute\n55\n```\n\n我们可以看到 `fib` 函数快了很多，因为它只为每个参数进行一次调用，并从缓存中检索结果。\n\
    \n## 验证函数参数\n\n函数装饰器的另一个有用应用是验证函数参数，即检查传递给函数的参数是否满足某些标准或约束。这有助于确保函数的正确性和健壮性。\n\
    \n要实现一个验证装饰器，我们可以使用 `assert` 语句在参数不满足条件时引发异常。我们还可以使用 `functools.wraps` 装饰器来保留函数的标识和文档。\n\
    \n例如，这是一个检查传递给函数的参数是否为正数的装饰器：\n\n```python\nimport functools\n\ndef positive(func):\n\
    \    # 定义一个包装函数，用于验证参数并调用原始函数\n    @functools.wraps(func)\n    def wrapper(*args,\
    \ **kwargs):\n        # 检查所有参数是否为正数\n        assert all(isinstance(arg, (int,\
    \ float)) and arg > 0 for arg in args), \"Arguments must be positive numbers\"\
    \n        # 调用原始函数\n        return func(*args, **kwargs)\n    # 返回包装函数\n    return\
    \ wrapper\n```\n\n我们可以使用 `@` 语法将此装饰器应用于任何期望正数作为参数的函数：\n\n```python\n@positive\n\
    def add(x, y):\n    return x + y\n```\n\n现在，当我们使用有效参数调用该函数时，将按预期获得结果：\n\n```\n\
    >>> add(3, 4)\n7\n```\n\n但是，当我们使用无效参数调用该函数时，将得到一个异常：\n\n```\n>>> add(-3, 4)\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    \  File \"<stdin>\", line 5, in wrapper\nAssertionError: Arguments must be positive\
    \ numbers\n```\n\n我们还可以使用 `functools` 模块创建更复杂的验证装饰器，例如 `singledispatch` 装饰器，它允许我们根据第一个参数的类型为函数定义不同的行为。这对于创建可以处理不同类型输入的通用函数非常有用。\n\
    \n例如，这是一个根据第一个参数的类型为 `add` 函数定义不同行为的装饰器：\n\n```python\nimport functools\n\n@functools.singledispatch\n\
    def add(x, y):\n    # add 函数的默认行为\n    raise NotImplementedError(\"Unsupported\
    \ type\")\n\n@add.register\ndef _(x: int, y: int):\n    # 当第一个参数是 int 时 add 函数的行为\n\
    \    return x + y\n\n@add.register\ndef _(x: str, y: str):\n    # 当第一个参数是 str\
    \ 时 add 函数的行为\n    return x + y\n\n@add.register\ndef _(x: list, y: list):\n \
    \   # 当第一个参数是 list 时 add 函数的行为\n    return x + y\n```\n\n现在，当我们使用不同类型的参数调用该函数时，将得到不同的结果：\n\
    \n```\n>>> add(3, 4)\n7\n>>> add(\"Hello\", \"World\")\n\"HelloWorld\"\n>>> add([1,\
    \ 2], [3, 4])\n[1, 2, 3, 4]\n>>> add(3.0, 4.0)\nNotImplementedError: Unsupported\
    \ type\n```\n\n## 协程与 Async/Await\n\n协程是子程序的泛化，可以多次挂起和恢复。协程对于创建并发程序非常有用，这些程序可以执行多个任务而不阻塞主线程。协程也是异步编程的核心概念，异步编程是一种专注于编写非阻塞代码的范式，可以同时处理多个事件或请求。\n\
    \n要在 Python 中创建协程，你需要在函数定义中使用 `async` 关键字放在 `def` 关键字之前。`async` 关键字表示该函数是一个协程，并且它可以使用\
    \ `await` 关键字来挂起其执行，直到另一个协程或异步操作完成。\n\n例如：\n\n```python\n# 导入 asyncio 模块\nimport\
    \ asyncio\n\n# 定义一个协程，在延迟后打印消息\nasync def hello(delay):\n    # 在延迟之前打印消息\n   \
    \ print(f\"Hello, world! Waiting for {delay} seconds...\")\n    # 等待 asyncio.sleep\
    \ 函数，这是一个异步操作，将协程挂起给定的秒数\n    await asyncio.sleep(delay)\n    # 在延迟之后打印消息\n  \
    \  print(f\"Hello, world! Done waiting for {delay} seconds.\")\n\n# 创建一个事件循环，这是一个管理协程和异步操作执行的对象\n\
    loop = asyncio.get_event_loop()\n\n# 使用事件循环运行 hello 协程\n```"
