    \n## 计数循环\n\nfor 循环最常见的类型之一是计数循环，即你希望将一段代码重复执行特定次数。要创建计数循环，可以使用 range 函数，该函数返回一个从起始值到结束值的数字序列，并可指定可选的步长。range\
    \ 函数的语法是：\n\n```\nrange(start, stop, step)\n```\n\n这里，start 是序列中的第一个数字，stop 是最后一个数字（不包含），step\
    \ 是两个连续数字之间的差值。如果省略 start，则默认为 0。如果省略 step，则默认为 1。例如：\n\n创建一个从 0 到 9 的数字序列：\n\n\
    ```\nrange(10)\n```\n\n创建一个从 5 到 15 的数字序列：\n\n```\nrange(5, 16)\n```\n\n创建一个从\
