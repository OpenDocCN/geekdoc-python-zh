    items from each iterable. For example, we can use the map function to add two
    lists element-wise:


    ```

    a = [1, 2, 3, 4, 5] # create a list of numbers

    b = [6, 7, 8, 9, 10] # create another list of numbers

    c = map(lambda x, y: x + y, a, b) # create an iterable that applies the lambda
    function to each pair of numbers

    print(list(c)) # convert the iterable into a list and print it

