    number of values as the subsequent arguments. The format string contains placeholders
    that can be numbered or named, and can have optional format specifications. Some
    of the common format specifications are:


    +   - s: String

    - d: Decimal integer

    - f: Floating-point number

    - x: Hexadecimal integer

    - o: Octal integer

    - e: Exponential notation


    You can also specify the width and precision of the placeholders using numbers
    and dots.


