    # # Sets


    Sets are unordered collections of unique and immutable objects that support operations
    corresponding to mathematical set theory. They are useful for removing duplicates,
    testing membership, and performing set operations such as union, intersection,
    and difference.


    To create a set, you can use curly braces `{}` and separate the elements by commas,
    or use the built-in `set` function with any iterable object.


    For example:


    ```

    >>> s = {1, 2, 3}

    >>> s

    {1, 2, 3}

    >>> t = set(''hello'')

    >>> t

    {''h'', ''e'', ''l'', ''o''}

    ```


    Note that sets only contain unique elements, so any duplicates are discarded.
    Sets are also unordered, meaning the elements may not appear in the same order
    as they were entered.


    A frozen set is a special kind of set that is immutable, meaning it cannot be
    changed once created. To create a frozen set, you can use the built-in `frozenset`
    function with any iterable object.


    For example:


    ```

    >>> fs = frozenset([1, 2, 3])

    >>> fs

    frozenset({1, 2, 3})

    ```'
