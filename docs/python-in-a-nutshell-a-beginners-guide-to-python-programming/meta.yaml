    # Operations


    Sets and frozen sets support a variety of operations that correspond to mathematical
    set theory. You can perform these operations using methods or operators. Here
    are some examples of common set operations:


    Union: The union of two sets is a new set that contains all the elements from
    both sets. It can be performed using the union method or the | operator.


    For example:


    ```

    >>> s = {1, 2, 3}

    >>> t = {3, 4, 5}

    >>> s.union(t)

    {1, 2, 3, 4, 5}

    >>> s | t

    {1, 2, 3, 4, 5}

    ```


    Intersection: The intersection of two sets is a new set that contains only the
    elements that are common to both sets. It can be performed using the intersection
    method or the & operator.


    For example:


    ```

    >>> s = {1, 2, 3}

    >>> t = {3, 4, 5}

    >>> s.intersection(t)

