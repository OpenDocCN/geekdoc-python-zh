  md: 'For example, to install the requests package within a virtual environment called
    my_env, you need to run the following commands:


    ```

    # Activate the virtual environment if it is not activated.

    source my_env/bin/activate


    # Install the requests package

    pip install requests

    ```


    This will install the requests package and its dependencies within the my_env
    virtual environment, and make them available for use within the virtual environment.


    You can use the pip list command to see the list of installed packages within
    the virtual environment.


    # Isolating package dependencies between different projects


    One of the main benefits of using virtual environments is that they isolate the
    package dependencies between different projects, so that you can work on multiple
    projects with different requirements, without worrying about compatibility issues
    or polluting the global namespace.


    For example, suppose you have two projects, project_a and project_b, that use
    different versions of the requests package. project_a requires requests==2.25.1,
    while project_b requires requests==2.26.0. If you install both versions of the
    requests package in the system''s default Python environment, you will encounter
    conflicts and errors when you try to run either project. However, if you create
    separate virtual environments for each project, and install the appropriate version
    of the requests package within each virtual environment, you can avoid these problems
    and run both projects smoothly.'
