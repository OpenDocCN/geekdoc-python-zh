    # Stack and Deque


    A stack is a data structure that follows the last-in, first-out (LIFO) principle.
    This means that the last item that is added to the stack is the first item that
    is removed from the stack. A stack can be implemented using a list, but it is
    more efficient to use a collections.deque object, which is a subclass of the dict
    class that provides a double-ended queue.'
