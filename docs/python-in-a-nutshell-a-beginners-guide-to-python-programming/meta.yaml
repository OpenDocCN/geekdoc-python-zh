    \ specific attributes from a package. For example, we can modify the `test.py`\
    \ program as follows:\n\n```\nfrom calculator import add, subtract\n\nprint(add(2,\
    \ 3)) # prints 5\nprint(subtract(5, 3)) # prints 2\n```"
