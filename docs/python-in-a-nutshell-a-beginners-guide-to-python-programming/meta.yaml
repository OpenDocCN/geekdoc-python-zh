  md: '# # Object-Oriented Programming


    Object-oriented programming (OOP) is a programming paradigm that organizes data
    and behavior into reusable units called **objects**. Objects are instances of
    **classes**, which are templates that define the attributes and methods of the
    objects. Attributes are variables that store the state of the object, and methods
    are functions that perform actions on the object.


