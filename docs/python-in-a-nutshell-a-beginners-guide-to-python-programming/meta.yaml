    >>> s.union(t)\n{1, 2, 3, 4, 5}\n>>> s | t\n{1, 2, 3, 4, 5}\n```\n\n**交集：** 两个集合的交集是一个仅包含两个集合中共有的元素的新集合。可以使用\
    \ `intersection` 方法或 `&` 运算符执行。\n\n例如：\n\n```\n>>> s = {1, 2, 3}\n>>> t = {3,\
    \ 4, 5}\n>>> s.intersection(t)\n```"
