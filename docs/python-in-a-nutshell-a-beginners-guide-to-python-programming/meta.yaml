- md: '## Writing Python


    You can run Python in two modes: interactive mode and script mode. In interactive
    mode, you can type Python statements and expressions in a shell or a console,
    and see the results immediately. Interactive mode is useful for testing, debugging,
    and experimenting with Python code.


    In script mode, you can write Python statements and expressions in a file and
    execute the file as a program. Script mode is useful for developing, running,
    and distributing Python applications. To run a Python script, you need to save
    the file with a .py extension, and run it in the command line or the terminal
    with the python command, followed by the name of the file. For example, python
    myfile.py.


    ## Idle and Python shell


    Idle is an integrated development environment (IDE) for Python, which provides
    a graphical user interface (GUI) for writing, running, and debugging Python code.
    The standard Python installation on Windows and Mac includes Idle, which you can
    launch by clicking on its icon. Idle has many features, such as syntax highlighting,
    code completion, indentation, interactive shell, debugger, and more.


    Python shell is an interactive interpreter for Python, which allows you to enter
    and execute Python code line by line, and see the results immediately. The standard
    Python installation includes Python shell, and you can launch it by running the
    python command in the command prompt or the terminal. Python shell has some features,
    such as history, help, and more.


    ## Create, Save, and Run (Visual Studio Code)


    To create and save your first Python file, you can follow these steps:


    - Install Visual Studio Code: Before you can use VS Code to create and run a Python
    file, you need to install Python and VS Code on your computer. You can download
    VS Code from code.visualstudio.com. Follow the instructions on the websites to
    install it properly.

    - Install the Python extension for VS Code: To enable VS Code to work with Python
    seamlessly, you need to install the Python extension by Microsoft. This extension
    provides many features, such as syntax highlighting, code completion, debugging,
    testing, and more. To install the extension, open VS Code and click on the Extensions
    icon on the left sidebar. Search for “Python” and select the one by Microsoft.
    Click on the Install button and wait for the installation to finish. You may need
    to restart your VS Code for the extension to start working.

    - Create a Python file and write some code: To create a Python file, open VS Code
    and click on the File menu. Select New File and save it with a .py extension,
    such as hello.py. You can also use the keyboard shortcut Ctrl+N to create a new
    file and Ctrl+S to save it. To write some code, type the following code in the
    editor: print(“Hello, world!”) .


    This is a simple Python program that prints the message “Hello, world!” to the
    standard output.


    - Run the Python file: To run the Python file, you have two options:


    Option 1: Use the Run Python File in Terminal command. This command will run the
    Python file in the integrated terminal of VS Code. To use this command, right-click
    on the editor and select Run Python File in Terminal. You can also use the keyboard
    shortcut Ctrl+Shift+P to open the Command Palette and type “Run Python File in
    Terminal”. You should see the output “Hello, world!” in the terminal.


    Option 2: Use the Code Runner extension. This extension allows you to run any
    code with one click. To use this extension, you need to install it from the Extensions
    marketplace. Search for “Code Runner” and select the one by Jun Han. Click on
    the Install button and wait for the installation to finish. To run the Python
    file, click on the Run Code icon on the top-right corner of the editor. You can
    also use the keyboard shortcut Ctrl+Alt+N. You should see the output “Hello, world!”
    in the output console.


    Option 3: Run the file by running the command python hello.py in the command prompt
    or the terminal. You should see the message “Hello, world!” printed on the screen.


    ## Comments and type of comments


    Comments are lines of text that are ignored by the Python interpreter, and that
    are used to explain or document your code. Comments can make your code more readable,
    understandable, and maintainable. There are two types of comments in Python:


    - Single-line comments: These are comments that start with a hash sign (#), and
    that span only one line. For example: # This is a single-line comment .

    - Multi-line comments: These are comments that span multiple lines, and that are
    enclosed by triple quotes (""" or ''''''). For example: """ This is a multi-line
    comment """.


    ## Variables


    ### What is a variable?


    A variable is a name that refers to a value stored in memory. A variable can hold
    any type of data, such as numbers, strings, lists, dictionaries. You can use variables
    to store and manipulate data in your programs.


    ### Variable Names - Naming Convention


    A variable name can be any combination of letters, digits, and underscores (_),
    but it cannot start with a digit. A variable name should be descriptive and meaningful,
    and it should follow the Python style guide (PEP 8).


    Some examples of good variable names are:


    - name: a string that stores a person''s name

    - age: an integer that stores a person''s age

    - grades: a list that stores a student''s grades

    - phone_book: a dictionary that stores phone numbers and names


    Some examples of bad variable names are:


    - x: too vague and meaningless

    - a1b2c3: too hard to read and understand

    - Name: starts with a capital letter, which is reserved for classes

    - phone-book: contains a hyphen, which is not allowed


    ## Reserved Keywords


    There are some words in Python that have special meanings and cannot be used as
    variable names. These words are called reserved keywords, and they are:


    - False, None, True, and, as, assert, async, await, break, class, continue, def,
    del, elif, else, except, finally, for, from, global, if, import, in, is, lambda,
    nonlocal, not, or, pass, raise, return, try, while, with, and yield.


    If you try to use a reserved keyword as a variable name, you will get a syntax
    error.


    ## Why you can not use reserved keywords as variable names in Python


    Python has a set of keywords that are reserved for defining the syntax and structure
    of the language. These keywords hold special meanings and functions, and users
    cannot use them as identifiers for variables, functions, classes, or modules.
    For example, the keyword “if” is used to create conditional statements, and the
    keyword “def” is used to define functions. Using these keywords as variable names
    would cause a syntax error and confuse the Python interpreter and the programmers.
    For example:


    ```

    if = 10 # SyntaxError: invalid syntax

    def = “This is not a function” # SyntaxError: invalid syntax

    ```


    ## But I want to use a reserved keyword


    One way to avoid naming conflicts with Python keywords is to use a single trailing
    underscore (_) after the keyword. This is a convention that allows you to use
    a name that would otherwise cause a syntax error or a shadowing problem. For example:


    ```

    if_ = 10 # This is a valid name

    ```'
  mdcn: '## 编写 Python


    你可以通过两种模式运行 Python：交互模式和脚本模式。在交互模式下，你可以在 shell 或控制台中输入 Python 语句和表达式，并立即看到结果。交互模式对于测试、调试和尝试
    Python 代码非常有用。


    在脚本模式下，你可以将 Python 语句和表达式写入文件，并将该文件作为程序执行。脚本模式对于开发、运行和分发 Python 应用程序非常有用。要运行 Python
    脚本，你需要将文件保存为 .py 扩展名，并在命令行或终端中使用 `python` 命令后跟文件名来运行它。例如，`python myfile.py`。


    ## Idle 和 Python shell


    Idle 是一个 Python 的集成开发环境（IDE），它提供了一个图形用户界面（GUI），用于编写、运行和调试 Python 代码。Windows 和
    Mac 上的标准 Python 安装包含 Idle，你可以通过点击其图标来启动它。Idle 具有许多功能，例如语法高亮、代码补全、缩进、交互式 shell、调试器等。


    Python shell 是一个 Python 的交互式解释器，它允许你逐行输入和执行 Python 代码，并立即看到结果。标准 Python 安装包含 Python
    shell，你可以通过在命令提示符或终端中运行 `python` 命令来启动它。Python shell 具有一些功能，例如历史记录、帮助等。


    ## 创建、保存和运行（Visual Studio Code）


    要创建并保存你的第一个 Python 文件，你可以按照以下步骤操作：


    - 安装 Visual Studio Code：在你使用 VS Code 创建和运行 Python 文件之前，你需要在你的计算机上安装 Python 和 VS
    Code。你可以从 code.visualstudio.com 下载 VS Code。请按照网站上的说明正确安装它。

    - 安装 VS Code 的 Python 扩展：为了使 VS Code 能够与 Python 无缝协作，你需要安装由 Microsoft 提供的 Python
    扩展。此扩展提供了许多功能，例如语法高亮、代码补全、调试、测试等。要安装该扩展，请打开 VS Code 并点击左侧边栏上的扩展图标。搜索“Python”并选择由
    Microsoft 提供的那个。点击安装按钮并等待安装完成。你可能需要重启 VS Code 才能使扩展开始工作。

    - 创建一个 Python 文件并编写一些代码：要创建一个 Python 文件，请打开 VS Code 并点击“文件”菜单。选择“新建文件”并将其保存为 .py
    扩展名，例如 `hello.py`。你也可以使用键盘快捷键 `Ctrl+N` 创建新文件，并使用 `Ctrl+S` 保存它。要编写一些代码，请在编辑器中输入以下代码：`print("Hello,
    world!")`。


    这是一个简单的 Python 程序，它将消息“Hello, world!”打印到标准输出。


    - 运行 Python 文件：要运行 Python 文件，你有两个选项：


    选项 1：使用“在终端中运行 Python 文件”命令。此命令将在 VS Code 的集成终端中运行 Python 文件。要使用此命令，请在编辑器上右键单击并选择“在终端中运行
    Python 文件”。你也可以使用键盘快捷键 `Ctrl+Shift+P` 打开命令面板并输入“Run Python File in Terminal”。你应该在终端中看到输出“Hello,
    world!”。


    选项 2：使用 Code Runner 扩展。此扩展允许你一键运行任何代码。要使用此扩展，你需要从扩展市场安装它。搜索“Code Runner”并选择由 Jun
    Han 提供的那个。点击安装按钮并等待安装完成。要运行 Python 文件，请点击编辑器右上角的“运行代码”图标。你也可以使用键盘快捷键 `Ctrl+Alt+N`。你应该在输出控制台中看到输出“Hello,
    world!”。


    选项 3：通过在命令提示符或终端中运行命令 `python hello.py` 来运行文件。你应该在屏幕上看到打印的消息“Hello, world!”。


    ## 注释和注释类型


    注释是被 Python 解释器忽略的文本行，用于解释或记录你的代码。注释可以使你的代码更具可读性、可理解性和可维护性。Python 中有两种类型的注释：


    - 单行注释：这些注释以井号（#）开头，并且只跨越一行。例如：`# 这是一个单行注释`。

    - 多行注释：这些注释跨越多行，并由三引号（`"""` 或 `''''''`）包围。例如：`""" 这是一个多行注释 """`。


    ## 变量


    ### 什么是变量？


    变量是引用存储在内存中的值的名称。变量可以保存任何类型的数据，例如数字、字符串、列表、字典。你可以使用变量来存储和操作程序中的数据。


    ### 变量名 - 命名约定


    变量名可以是字母、数字和下划线（_）的任意组合，但不能以数字开头。变量名应该具有描述性和意义，并且应该遵循 Python 风格指南（PEP 8）。


    一些好的变量名示例：


    - `name`：存储人名的字符串

    - `age`：存储年龄的整数

    - `grades`：存储学生成绩的列表

    - `phone_book`：存储电话号码和姓名的字典


    一些不好的变量名示例：


    - `x`：太模糊且无意义

    - `a1b2c3`：太难阅读和理解

    - `Name`：以大写字母开头，这是为类保留的

    - `phone-book`：包含连字符，这是不允许的


    ## 保留关键字


    Python 中有一些具有特殊含义的词，不能用作变量名。这些词称为保留关键字，它们是：


    - `False`, `None`, `True`, `and`, `as`, `assert`, `async`, `await`, `break`, `class`,
    `continue`, `def`, `del`, `elif`, `else`, `except`, `finally`, `for`, `from`,
    `global`, `if`, `import`, `in`, `is`, `lambda`, `nonlocal`, `not`, `or`, `pass`,
    `raise`, `return`, `try`, `while`, `with`, 和 `yield`。


    如果你尝试将保留关键字用作变量名，你将得到一个语法错误。


    ## 为什么不能在 Python 中将保留关键字用作变量名


    Python 有一组保留关键字，用于定义语言的语法和结构。这些关键字具有特殊的含义和功能，用户不能将它们用作变量、函数、类或模块的标识符。例如，关键字“if”用于创建条件语句，关键字“def”用于定义函数。将这些关键字用作变量名会导致语法错误，并使
    Python 解释器和程序员感到困惑。例如：


    ```

    if = 10 # SyntaxError: invalid syntax

    def = "This is not a function" # SyntaxError: invalid syntax

    ```


    ## 但我想使用保留关键字


    避免与 Python 关键字命名冲突的一种方法是在关键字后使用单个尾随下划线（_）。这是一种约定，允许你使用一个原本会导致语法错误或遮蔽问题的名称。例如：


    ```

    if_ = 10 # 这是一个有效的名称

    ```'
