    9

    16

    25

    ```


    当你只想创建一个只使用一次的可迭代对象，或者想节省内存并避免创建大型列表时，生成器表达式非常有用。然而，它们有一些限制，例如：


    - 你只能迭代生成器对象一次。如果你尝试再次迭代它，它将引发 StopIteration 异常，因为它没有更多值可以生成。

    - 你不能通过索引或切片访问生成器对象的元素。你只能通过使用 for 循环或消耗迭代器的函数来顺序访问它们。

    - 你不能修改生成器对象的元素。你只能基于现有的生成器对象创建一个新的生成器对象。


