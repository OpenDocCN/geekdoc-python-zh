    ## Hex, Octal, Binary: Literals and Conversions


    Python supports hexadecimal, octal, and binary literals as well as decimal literals.
    Hexadecimal literals start with 0x or 0X, followed by digits from 0 to 9 and letters
    from A to F (case-insensitive). Octal literals start with 0o or 0O, followed by
    digits from 0 to 7. Binary literals start with 0b or 0B, followed by digits 0
    or 1.


    Examples of numeric literals in different bases:


    ```

    hex_num = 0x1A # hexadecimal

    oct_num = 0o24 # octal

    bin_num = 0b11010 # binary

    dec_num = 26 # decimal

    ```


    To convert a number from one base to another, we can use the built-in functions
    int(), hex(), oct(), and bin().


    The int() function takes a string representation of a number and an optional base
    argument, and returns the corresponding integer value.


    The hex(), oct(), and bin() functions take an integer value and return the corresponding
    string representation in the specified base, prefixed with 0x, 0o, or 0b respectively.


    Examples of conversions between bases:


    ```

    print(int(''1A'', 16)) # convert hexadecimal to decimal

    print(hex(26)) # convert decimal to hexadecimal

    print(oct(0b11010)) # convert binary to octal

    print(bin(0o24)) # convert octal to binary

    ```


    ## Bitwise Operations


    Python supports bitwise operations on integers, which treat the numbers as sequences
    of bits and perform logical operations on them.


    The bitwise operators are:


    - & (bitwise AND): returns a number with only the bits that are set in both operands.

    - | (bitwise OR): returns a number with the bits that are set in either or both
    operands.

    - ^ (bitwise XOR): returns a number with the bits that are set in one but not
    both operands.

    - ~ (bitwise NOT): returns the complement of the operand, with all the bits flipped.

    - << (left shift): returns the operand shifted to the left by the specified number
    of bits, filling the vacated bits with zeros.

    - >> (right shift): returns the operand shifted to the right by the specified
    number of bits, discarding the shifted bits.


    Examples of bitwise operations:


    ```

    a = 0b1010 # 10 in decimal

    b = 0b1100 # 12 in decimal

    print(bin(a & b)) # bitwise AND, 0b1000 (8 in decimal)

    print(bin(a | b)) # bitwise OR, 0b1110 (14 in decimal)

    print(bin(a ^ b)) # bitwise XOR, 0b110 (6 in decimal)

    print(bin(~a)) # bitwise NOT, -0b1011 (-11 in decimal)

    print(bin(a << 2)) # left shift by 2 bits, 0b101000 (40 in decimal)

    print(bin(a >> 2)) # right shift by 2 bits, 0b10 (2 in decimal)

    ```


    ## Other Numeric Types


    Python also supports other numeric types, such as decimal, fraction, complex,
    and boolean. These types are defined in the modules decimal, fractions, and cmath
    respectively, and need to be imported before use. The boolean type is a subclass
    of int, and has two values: True and False, which are equivalent to 1 and 0 respectively.


    ### Decimal Type


    The decimal type represents decimal floating-point numbers, which can exactly
    represent decimal fractions such as 0.1, unlike binary floating-point numbers,
    which can only approximate them. The decimal type is useful for applications that
    require high precision or deal with money, as it avoids the rounding errors that
    can occur with binary floating-point arithmetic. To create a decimal object, we
    can use the decimal.Decimal() function, passing a string, an integer, or another
    decimal object as the argument.


    Examples of decimal type:


    ```

    from decimal import Decimal # import the decimal module

    d1 = Decimal(''0.1'') # create a decimal object from a string

    d2 = Decimal(0.1) # create a decimal object from a float

    d3 = Decimal(1) / Decimal(3) # create a decimal object from a division

    print(d1) # 0.1

    print(d2) # 0.1000000000000000055511151231257827021181583404541015625

    print(d3) # 0.33333333333333333333333333333333

    ```


    The decimal module also provides a context object that can be used to set the
    precision, rounding mode, and other options for decimal arithmetic. For example,
    we can use the decimal.getcontext() function to get the current context, and modify
    its attributes as needed.


    Examples of using the decimal context:


    ```

    from decimal import Decimal, getcontext # import the decimal module and the getcontext
    function

    getcontext().prec = 6 # set the precision to 6 digits

    d4 = Decimal(1) / Decimal(3) # create a decimal object from a division

    print(d4) # 0.333333

    getcontext().rounding = ''ROUND_HALF_UP'' # set the rounding mode to round half
    up

    d5 = Decimal(''0.5'').quantize(Decimal(''1'')) # round 0.5 to the nearest integer

    print(d5) # 1

    ```


    ### Fraction Type


    The fraction type represents rational numbers, which are fractions of two integers,
    such as 1/2, 3/4, or -5/9. The fraction type is useful for applications that require
    exact arithmetic with fractions, such as symbolic math or music theory. To create
    a fraction object, we can use the fractions.Fraction() function, passing either
    two integers (numerator and denominator), a string, a float, or another fraction
    object as the argument.


    Examples of fraction type:


    ```

    from fractions import Fraction # import the fractions module

    f1 = Fraction(1, 2) # create a fraction object from two integers

    f2 = Fraction(''3/4'') # create a fraction object from a string

    f3 = Fraction(0.25) # create a fraction object from a float

    f4 = Fraction(f1, f2) # create a fraction object from another fraction object

    print(f1) # 1/2

    print(f2) # 3/4

    print(f3) # 1/4

    print(f4) # 2/3

    ```


    The fractions module also provides some useful functions for working with fractions,
    such as fractions.gcd() to find the greatest common divisor of two integers, and
    fractions.limit_denominator() to find the closest fraction to a given float within
    a given maximum denominator.


    Examples of using the fractions functions:


    ```

    from fractions import Fraction, gcd, limit_denominator # import the fractions
    module and the functions

    print(gcd(12, 18)) # find the greatest common divisor of 12 and 18, 6

    f5 = Fraction(3.14159) # create a fraction object from a float

    print(f5) # 3537115888337719/1125899906842624

    print(f5.limit_denominator(100)) # find the closest fraction to f5 within a maximum
    denominator of 100, 22/7

    ```


