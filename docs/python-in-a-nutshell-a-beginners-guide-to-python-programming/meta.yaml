    \ The speed of the car is 200 km/h.\nprint(e.Car.get_speed()) # 200\n```\n\n然而，这并不推荐，因为它破坏了继承原则，并使代码的可读性和可维护性降低。访问或修改被子类重写的父类属性或方法的更好方式是使用`super`函数，它返回对父类对象的引用。例如，要访问`Car`类的`__speed`属性并调用其`set_speed`方法，我们这样写：\n\
    \n```\ne = ElectricCar()\nprint(super(ElectricCar, e).get_speed()) # 0\nsuper(ElectricCar,\
    \ e).set_speed(200) # The speed of the car is 200 km/h.\nprint(super(ElectricCar,\
    \ e).get_speed()) # 200\n```\n\n`super`函数也可以用于从子类调用父类的`__init__`方法，这在子类需要初始化来自父类的某些属性或方法时非常有用。例如，要从`ElectricCar`类调用`Car`类的`__init__`方法，我们这样写：\n\
