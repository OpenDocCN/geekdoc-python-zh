    ## 变量、对象和引用


    要理解 Python 如何处理数据类型和变量，你需要理解变量、对象和引用的概念。


    -   **对象**是具有类型和值的数据。例如，10 是一个类型为 `int`、值为 10 的对象，而 “Hello” 是一个类型为 `str`、值为 “Hello”
    的对象。Python 中的每个对象都有一个唯一的标识符，这是一个表示对象内存地址的整数。你可以使用内置函数 `id()` 来获取对象的标识符。

    -   **变量**是引用对象的名称。例如，当你写 `x = 10` 时，你创建了一个名为 `x` 的变量，它引用了对象 10。变量本身没有类型或值，它只指向一个具有类型和值的对象。你可以使用内置函数
    `type()` 来获取变量所引用对象的类型，使用内置函数 `print()` 来显示变量所引用对象的值。

    -   **引用**是变量和对象之间的连接。例如，当你写 `x = 10` 时，你创建了一个从变量 `x` 到对象 10 的引用。引用不是物理链接或指针，它是由
    Python 解释器维护的逻辑关联。你可以使用赋值运算符 (`=`) 来创建、更改或删除引用。


    ## 类型、对象、变量


    如前所述，Python 是一种动态类型语言，这意味着变量的类型由它所引用的对象的类型决定，而不是由变量的名称决定。这意味着在程序执行过程中，当你将不同的对象赋值给变量时，变量的类型可以改变。


    例如：


    ```python

    x = 10 # x 引用一个类型为 int 的对象

    ```


    ```python

    type(x) # <class ''int''>

    ```


    ```python

    x = "Hello" # x 现在引用一个类型为 str 的对象

    ```


    ```python

    type(x) # <class ''str''>

    ```


    在上面的例子中，变量 `x` 没有固定的类型，它可以引用任何类型的任何对象。`x` 的类型由它当前引用的对象的类型决定，这可以在程序运行时改变。这与一些其他编程语言（如
    Java 或 C++）不同，在那些语言中，变量的类型是固定的，一旦声明就不能改变。


    ## 垃圾回收


    当你在 Python 中创建一个对象时，Python 解释器会分配一些内存空间来存储该对象。通过将对象赋值给变量，Python 解释器会创建一个从变量到对象的引用，使你能够通过变量访问该对象。当你将不同的对象赋值给同一个变量时，Python
    解释器会更改从变量到新对象的引用，并移除对旧对象的引用。例如：


    ```python

    x = 10 # x 引用一个值为 10 的对象

    ```


    ```python

    x = 20 # x 现在引用一个值为 20 的对象，而值为 10 的对象失去了引用

    ```


    在上面的例子中，当你将 20 赋值给 `x` 时，之前被 `x` 引用的值为 10 的对象不再可访问，因为没有变量引用它。这意味着值为 10 的对象不再需要，它占用的内存空间可以被释放和重用。这个释放未使用对象内存空间的过程称为**垃圾回收**。


    Python 有一个内置机制来执行自动垃圾回收，无需你显式删除或释放你创建的对象。Python 解释器会跟踪每个对象的引用数量，当一个对象的引用数量变为零时，该对象会被标记为垃圾并由垃圾回收器回收。这样，你就不需要担心管理程序的内存，可以专注于代码的逻辑和功能。


    ## 共享引用


    当你将一个对象赋值给一个变量时，你创建了一个从变量到对象的引用。当你将同一个对象赋值给另一个变量时，你创建了另一个对同一对象的引用。这意味着两个变量引用同一个对象并共享同一个引用。


    例如：


    Python 中有一些对象和操作执行就地更改，这意味着它们修改现有对象而不创建新对象。例如，当你将一个值赋给列表中的一个元素时，你更改的是列表对象本身，而不是创建一个新的列表对象。


    例如：


    ```python

    L1 = [1, 2, 3, 4, 5] # L1 是一个列表对象

    ```


    ```python

    L2 = L1 # L2 是对同一列表对象的另一个引用

    ```


    ```python

    L1[0] = 0 # 这会就地更改列表对象

    ```


    ```python

    print(L1) # [0, 2, 3, 4, 5]

    ```


    ```python

    print(L2) # [0, 2, 3, 4, 5]

    ```


    在上面的例子中，`L1` 和 `L2` 都引用同一个列表对象，因此通过一个引用对列表对象所做的任何更改也会影响另一个引用。这是因为列表对象是一个**可变**对象，意味着它可以在创建后被更改。


    然而，并非 Python 中的所有对象都是可变的。有些对象是**不可变**的，意味着它们在创建后不能被更改。例如，字符串、数字和元组是不可变对象。当你尝试更改不可变对象时，你会得到一个错误或创建一个新对象。


    例如：


    ```python

    S1 = "Hello" # S1 是一个字符串对象

    ```


    ```python

    S2 = S1 # S2 是对同一字符串对象的另一个引用

    ```


    ```python

    S1[0] = "h" # 这会引发错误，因为字符串是不可变的

    ```


    ```python

    # TypeError: ''str'' object does not support item assignment

    ```


    ```python

    S1 = "hello" # 这会创建一个新的字符串对象并将其赋值给 S1

    ```


    ```python

    print(S1) # hello

    ```


    ```python

    print(S2) # Hello

    ```


    在上面的例子中，`S1` 和 `S2` 最初引用同一个字符串对象，但当你尝试通过 `S1` 更改字符串对象时，你会得到一个错误，因为字符串是不可变的。要更改
    `S1` 的值，你需要创建一个新的字符串对象并将其赋值给 `S1`，这会打破与 `S2` 的共享引用。现在，`S1` 和 `S2` 引用不同的字符串对象，对其中一个的任何更改都不会影响另一个。


    ## 对象标识和类型


    要检查两个变量是否引用同一个对象，你可以使用 `is` 运算符，如果两个变量共享同一个引用，它返回 `True`，否则返回 `False`。


    例如：


    ```python

    x = 10

    y = x

    z = 10

    print(x is y) # True

    print(x is z) # False

    ```


    在上面的例子中，`x` 和 `y` 引用同一个对象，所以 `x is y` 返回 `True`。然而，`x` 和 `z` 引用不同的对象，即使它们具有相同的值，所以
    `x is z` 返回 `False`。


    要检查对象的类型，你可以使用 `type()` 函数，它返回对象的类。


    例如：


    ```python

    x = 10

    y = "Hello"

    z = [1, 2, 3]

    print(type(x)) # <class ''int''>

    print(type(y)) # <class ''str''>

    print(type(z)) # <class ''list''>

    ```


    在上面的例子中，`x` 是一个类型为 `int` 的对象，`y` 是一个类型为 `str` 的对象，`z` 是一个类型为 `list` 的对象。你也可以使用
    `isinstance()` 函数来检查一个对象是否是特定类的实例或其子类的实例。


    例如：


    ```python

    x = 10

    y = "Hello"

    z = [1, 2, 3]

    print(isinstance(x, int)) # True

    print(isinstance(y, str)) # True

    print(isinstance(z, list)) # True

    print(isinstance(x, object)) # True

    print(isinstance(y, object)) # True

    print(isinstance(z, object)) # True

    ```


    在上面的例子中，`x`、`y` 和 `z` 都是它们各自类的实例，也是 `object` 类的实例，`object` 类是 Python 中所有类的基类。


    ## Python 中的数字类型


    Python 支持三种主要的数字类型：整数、浮点数和复数。每种类型都有不同的特征和可以执行的操作。


    ### 数字字面量。


    数字字面量是在 Python 代码中书写数字的一种方式。例如，`42` 是一个整数字面量，`3.14` 是一个浮点数字面量，`2+3j` 是一个复数字面量。数字字面量的类型决定了它在内存中的存储和操作方式。


    要检查数字的类型，我们可以使用 `type()` 函数。


    例如：


    ```python

    >>> type(42)

    <class ''int''>

    >>> type(3.14)

    <class ''float''>

    >>> type(2+3j)

    <class ''complex''>

    ```


    我们也可以使用 `isinstance()` 函数来检查一个数字是否属于某种类型。'
