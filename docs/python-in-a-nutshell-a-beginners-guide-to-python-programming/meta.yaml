- md: 'Besides the core data types, Python also has some built-in types that are used
    for representing the structure and behavior of the program, such as functions,
    classes, modules, exceptions. We will discuss these types in later chapters.


    ## Variables, Objects, and References


    To understand how Python handles data types and variables, you need to understand
    the concepts of variables, objects, and references.


    - An **object** is a piece of data that has a type and a value. For example, 10
    is an object of type int and value 10, and “Hello” is an object of type str and
    value “Hello”. Every object in Python has a unique identity, which is an integer
    that represents the memory address of the object. You can use the built-in function
    id() to get the identity of an object.

    - A **variable** is a name that refers to an object. For example, when you write
    x = 10, you create a variable named x that refers to the object 10. A variable
    does not have a type or a value by itself, it only points to an object that has
    a type and a value. You can use the built-in function type() to get the type of
    the object that a variable refers to, and the built-in function print() to display
    the value of the object that a variable refers to.

    - A **reference** is the connection between a variable and an object. For example,
    when you write x = 10, you create a reference from the variable x to the object
    10. A reference is not a physical link or a pointer, it is a logical association
    that is maintained by the Python interpreter. You can use the assignment operator
    (=) to create, change, or remove references.


    ## Types, Objects, Variables


    As mentioned earlier, Python is a dynamically typed language, meaning that the
    type of variable is determined by the type of the object that it refers to, not
    by the name of the variable. This means that the type of variable can change during
    the execution of the program, as you assign different objects to it.


    For example:


    ```python

    x = 10 # x refers to an object of type int

    ```


    ```python

    type(x) # <class ''int''>

    ```


    ```python

    x = "Hello" # x now refers to an object of type str

    ```


    ```python

    type(x) # <class ''str''>

    ```


    In the above example, the variable x does not have a fixed type, it can refer
    to any object of any type. The type of x is determined by the type of the object
    that it currently refers to, which can change as the program runs. This differs
    from some other programming languages, such as Java or C++, where the type of
    variable is fixed and cannot change once it is declared.


    ## Garbage Collection


    When you create an object in Python, the Python interpreter allocates some memory
    space to store the object. By assigning an object to a variable, the Python interpreter
    creates a reference from the variable to the object, enabling you to access the
    object through the variable. When you assign a different object to the same variable,
    the Python interpreter changes the reference from the variable to the new object,
    and removes the reference to the old object. For example:


    ```python

    x = 10 # x refers to an object of value 10

    ```


    ```python

    x = 20 # x now refers to an object of value 20, and the object of value 10 loses
    its reference

    ```


    In the above example, when you assign 20 to x, the object of value 10 that was
    previously referred to by x is no longer accessible, as there is no variable that
    refers to it. This means that the object of value 10 is no longer needed, and
    the memory space that it occupies can be freed and reused. This process of freeing
    the memory space of unused objects is called **garbage collection**.


    Python has a built-in mechanism that performs automatic garbage collection, without
    requiring you to explicitly delete or deallocate the objects that you create.
    The Python interpreter keeps track of the number of references to each object,
    and when the number of references to an object becomes zero, the object is marked
    as garbage and collected by the garbage collector. This way, you do not need to
    worry about managing the memory of your program, and you can focus on the logic
    and functionality of your code.


    ## Shared References


    When you assign an object to a variable, you create a reference from the variable
    to the object. When you assign the same object to another variable, you create
    another reference to the same object. This means that both variables refer to
    the same object and share the same reference.


    For example:


    There are some objects and operations in Python that perform in-place changes,
    meaning that they modify the existing object without creating a new one. For example,
    when you assign a value to an element in a list, you change the list object itself,
    rather than creating a new list object.


    For example:


    ```python

    L1 = [1, 2, 3, 4, 5] # L1 is a list object


    L2 = L1 # L2 is another reference to the same list object

    ```


    ```python

    L1[0] = 0 # This changes the list object in-place

    ```


    ```python

    print(L1) # [0, 2, 3, 4, 5]

    ```


    ```python

    print(L2) # [0, 2, 3, 4, 5]

    ```


    In the above example, both L1 and L2 refer to the same list object, so any changes
    to the list object through one reference will affect the other reference as well.
    This is because the list object is a **mutable** object, meaning that it can be
    changed after it is created.


    However, not all objects in Python are mutable. Some objects are **immutable**,
    meaning that they cannot be changed after they are created. For example, strings,
    numbers, and tuples are immutable objects. When you try to change an immutable
    object, you will get an error or create a new object instead.


    For example:


    ```python

    S1 = "Hello" # S1 is a string object

    ```


    ```python

    S2 = S1 # S2 is another reference to the same string object

    ```


    ```python

    S1[0] = "h" # This raises an error, because strings are immutable

    ```


    ```python

    # TypeError: ''str'' object does not support item assignment

    ```


    ```python

    S1 = "hello" # This creates a new string object and assigns it to S1

    ```


    ```python

    print(S1) # hello

    ```


    ```python

    print(S2) # Hello

    ```


    In the above example, S1 and S2 initially refer to the same string object, but
    when you try to change the string object through S1, you get an error, because
    strings are immutable. To change the value of S1, create a new string object and
    assign it to S1, which breaks the shared reference with S2. Now, S1 and S2 refer
    to different string objects, and any changes to one will not affect the other.


    ## Object Identity and Type


    To check if two variables refer to the same object, you can use the `is` operator,
    which returns `True` if both variables share the same reference, and `False` otherwise.


    For example:


    ```python

    x = 10


    y = x


    z = 10


    print(x is y) # True


    print(x is z) # False

    ```


    In the above example, `x` and `y` refer to the same object, so `x is y` returns
    `True`. However, `x` and `z` refer to different objects, even though they have
    the same value, so `x is z` returns `False`.


    To check the type of object, you can use the `type()` function, which returns
    class of the object.


    For example:


    ```python

    x = 10


    y = "Hello"


    z = [1, 2, 3]


    print(type(x)) # <class ''int''>


    print(type(y)) # <class ''str''>


    print(type(z)) # <class ''list''>

    ```


    In the above example, x is an object of type int, y is an object of type str,
    and z is an object of type list. You can also use the isinstance() function to
    check if an object is an instance of a specific class or a subclass of it.


    For example:


    ```python

    x = 10


    y = "Hello"


    z = [1, 2, 3]


    print(isinstance(x, int)) # True


    print(isinstance(y, str)) # True


    print(isinstance(z, list)) # True


    print(isinstance(x, object)) # True


    print(isinstance(y, object)) # True


    print(isinstance(z, object)) # True

    ```


    In the above example, x, y, and z are all instances of their respective classes,
    as well as instances of the object class, which is the base class of all classes
    in Python.


    ## Number Type in Python


    Python supports three main types of numbers: integers, floating-point numbers,
    and complex numbers. Each type has different characteristics and operations that
    can be performed on them.


    ### Number literals.


    A number literal is a way of writing a number in Python code. For example, 42
    is an integer literal, 3.14 is a floating-point literal, and 2+3j is a complex
    literal. The type of number literal determines how it is stored and manipulated
    in memory.


    To check the type of number, we can use the type() function.


    For example:


    ```python

    >>> type(42)

    <class ''int''>

    >>> type(3.14)

    <class ''float''>

    >>> type(2+3j)

    <class ''complex''>

    ```


    We can also use the isinstance() function to check if a number belongs to a certain
    type.'
