    # Dictionary Comprehensions


    Dictionary comprehensions are a concise and elegant way to create or modify dictionaries
    using a single expression. They are similar to list comprehensions, but use curly
    braces {} instead of square brackets [], and have a key-value pair separated by
    a colon : instead of a single value. For example:


    ```

    # Creating a dictionary using a dictionary comprehension

    my_dict = {x: x**2 for x in range(1, 11)}

    print(my_dict) # {1: 1, 2: 4, 3: 9, 4: 16, 5: 25, 6: 36, 7: 49, 8: 64, 9: 81,
    10: 100}

    ```


    As you can see, the dictionary comprehension creates a new dictionary with the
    keys and values generated by the expression. You can also use an optional if clause
    to filter the items based on a condition. For example:


    ```

    # Creating a dictionary using a dictionary comprehension with an if clause

    ```'
