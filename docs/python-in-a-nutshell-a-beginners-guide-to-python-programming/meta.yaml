    # collections.Counter


    The collections.Counter class is another subclass of the dict class that provides
    a convenient way to count the occurrences of items in an iterable. It is similar
    to the count() method of lists or strings, but it works for any hashable object,
    such as numbers, tuples, or other dictionaries. For example:


    ```

    # Importing the collections module

    import collections


    # Creating a list of numbers

    numbers = [1, 2, 3, 4, 5, 1, 2, 3, 1, 2, 1]


    # Creating a Counter using the Counter() constructor

    my_counter = collections.Counter(numbers)

