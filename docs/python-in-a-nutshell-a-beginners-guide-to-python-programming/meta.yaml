    \ an element is in a collection.\n- Sets have no guaranteed order, since the hash\
    \ function may map keys to different buckets depending on the size and capacity\
    \ of the hash table. This means that iterating over a set may produce different\
    \ results in different runs. To preserve order, you can use a list or a tuple\
    \ instead of a set."
