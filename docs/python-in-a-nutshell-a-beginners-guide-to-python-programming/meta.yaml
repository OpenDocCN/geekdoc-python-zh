    ## List Iteration and Comprehensions


    One of the most common tasks involving lists is iterating over their elements.
    You can use a `for` loop to do this, as shown in the following code that prints
    the sum of each row of the matrix:


    ```

    >>> for row in matrix:

    ...     print(sum(row))

    ...

    6

    15

    24

    ```


    However, sometimes you may want to create a new list based on an existing one,
    applying some transformation or filtering to each element. For example, suppose
    you want to create a list of the squares of the numbers in the list `[1, 2, 3,
    4, 5]`. You could use a `for` loop and append the results to a new list, as shown
    in the following code:


    ```

    >>> numbers = [1, 2, 3, 4, 5]

    >>> squares = []

    >>> for n in numbers:

    ...     squares.append(n**2)

    ...

    >>> squares

    [1, 4, 9, 16, 25]

    ```


    However, this is verbose and inefficient. A more concise and elegant way to do
    this is to use a **list comprehension**, which is a syntactic construct that allows
    you to create a new list from an existing one in a single line of code. The syntax
    of a list comprehension is:


    ```

    [expression for element in iterable if condition]

    ```


    where `expression` is the transformation to apply to each element, `iterable`
    is the source list or any other iterable object, and `condition` is an optional
    filter to select only certain elements. For example, the following code uses a
    list comprehension to create the same list of squares as before:


    ```

    >>> numbers = [1, 2, 3, 4, 5]

    >>> squares = [n**2 for n in numbers]

    >>> squares

    [1, 4, 9, 16, 25]

    ```


    You can also use a list comprehension to create a nested list. For example, the
    following code uses a list comprehension to create a 3x3 identity matrix:


    ```

    >>> identity = [[1 if i == j else 0 for j in range(3)] for i in range(3)]

    >>> identity

    [[1, 0, 0], [0, 1, 0], [0, 0, 1]]

    ```


    List comprehensions are not only concise and elegant, but also efficient, as they
    avoid creating intermediate lists and use a single loop. However, they can also
    become complex and unreadable if you nest too many expressions or conditions.
    In such cases, it may be better to use a regular `for` loop or a function.


