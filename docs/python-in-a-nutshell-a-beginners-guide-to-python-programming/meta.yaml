    print(numbers[0])\n# 输出：1\n```\n\n如你所见，你可以使用任意数量的参数调用函数，该函数将返回所有值的总和。你也可以访问函数内部的元组并对其执行各种操作。任意参数使你的函数更灵活、适应性更强，因为它们允许你处理可变长度的输入。\n\
    \n## 仅关键字参数\n\n这些参数只能通过其名称传递，而不能通过其位置传递。它们对于创建具有清晰明确接口、并能接受可变数量位置参数的函数非常有用。要定义一个具有仅关键字参数的函数，你需要在参数列表中使用星号\
    \ (*)，后跟仅关键字参数的名称。例如：\n\n```\n# 定义一个可以打印任意数量消息的函数，带有一个可选的结束字符\ndef print_messages(*messages,\
    \ end=\"\\n\"):\n    # 遍历消息\n    for message in messages:\n        # 使用结束字符打印消息\n\
    \        print(message, end=end)\n```\n\n在这个函数中，messages 是一个任意参数，可以接受任意数量的位置参数，而\
    \ end 是一个仅关键字参数，其默认值为“\\n”，表示换行。你可以用不同的方式调用这个函数：\n\n```\n# 使用一个位置参数调用函数\nprint_messages(\"\
    Hello\")\n# 输出：Hello\n\n# 使用三个位置参数调用函数\nprint_messages(\"Hello\", \"world\", \"\
    !\")\n# 输出：Hello world !\n\n# 使用一个位置参数和一个关键字参数调用函数\nprint_messages(\"Hello\",\
    \ end=\" \")\n# 输出：Hello\n\n# 使用三个位置参数和一个关键字参数调用函数\nprint_messages(\"Hello\",\
    \ \"world\", \"!\", end=\" \")\n# 输出：Hello world !\n```\n\n如你所见，你可以向函数传递任意数量的位置参数，它们将使用指定的结束字符打印。但是，你不能将结束字符作为位置参数传递，因为这会导致错误：\n\
    \n```\n# 使用两个位置参数调用函数\nprint_messages(\"Hello\", \"\\n\")\n# 输出：TypeError: print_messages()\
    \ takes 0 positional arguments but 2 were given\n```\n\n这是因为函数期望结束字符作为关键字参数传递，而不是作为位置参数。仅关键字参数使你的函数更清晰、更明确，因为它们强制调用者指定参数的名称。它们还防止了因位置参数过多而可能引起的混淆。\n\
    \n## 函数对象、属性和注解\n\n在 Python 中，一切都是对象，包括函数。这意味着函数可以像任何其他对象一样拥有属性和方法。你也可以将函数赋值给变量，将它们作为参数传递给其他函数，或从其他函数返回它们。\n\
    \n例如：\n\n```\n# 定义一个打印消息的函数\ndef hello():\n    print(\"Hello, world!\")\n\n# 将函数赋值给变量\n\
    greet = hello\n\n# 使用变量调用函数\n```"
