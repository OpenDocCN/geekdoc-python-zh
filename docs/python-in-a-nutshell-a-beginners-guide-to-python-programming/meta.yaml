    \ base case. The final result is 5 * 4 * 3 * 2 * 1, which is 120."
  mdcn: "## 异常与断言\n\n异常和断言是两个允许你处理和预防 Python 代码中错误与缺陷的概念。异常和断言对于调试、测试和验证你的代码非常有用，也有助于创建健壮可靠的程序。\n\
    \n异常是在你的代码中发生错误时触发的事件，例如语法错误、除以零、文件未找到等。当异常发生时，Python 会停止程序的正常执行，并跳转到最近的异常处理程序——这是一段可以处理该错误的代码块。如果没有异常处理程序，程序将终止并显示错误信息。\n\
    \n你可以使用 `try` 和 `except` 关键字来创建异常处理程序。`try` 代码块包含可能引发异常的代码，而 `except` 代码块包含处理异常的代码。你还可以使用\
    \ `else` 和 `finally` 关键字来添加可选的代码块，这些代码块在 `try` 代码块之后执行，具体取决于是否发生了异常。例如：\n\n递归是一种强大而优雅的解决问题的方法，适用于具有递归结构的问题，它通过使用一个调用自身的函数来实现。然而，递归也有一些局限性和缺点，例如：\n\
    \n- **栈溢出**：递归使用调用栈来跟踪函数调用及其参数。调用栈是一种数据结构，它以**后进先出**的顺序存储有关活动函数调用的信息。每次函数调用都会创建一个新的栈帧，这是栈中包含有关函数信息（如其名称、参数、局部变量、返回地址等）的一部分。当函数返回时，其栈帧从栈中弹出，控制权转移给前一个函数调用。然而，调用栈的大小是有限的，如果递归过深或无限递归，栈可能会耗尽空间，导致栈溢出错误，从而终止程序。为避免栈溢出，你需要限制递归的深度，或者使用迭代解决方案代替递归。\n\
    - **冗余计算**：递归可能涉及重复或冗余的计算，因为相同的子问题可能被不同的函数调用多次解决。这可能导致效率低下和时间、资源的浪费。为避免冗余计算，你需要将子问题的结果存储在缓存或字典中，并在需要时重用它们。这种技术称为**记忆化**，它可以提高递归函数的性能和速度。\n\
    \n记忆化是一种允许函数记住先前函数调用结果并直接返回这些结果而无需重新计算的技术。记忆化对于优化涉及重复或冗余计算的递归函数非常有用，因为它可以减少函数的时间和空间复杂度。记忆化也是**动态规划**的核心概念，动态规划是一种专注于通过将复杂问题分解为重叠子问题，并存储和重用其解决方案来解决问题的范式。\n\
    \n要在 Python 中实现记忆化，你需要使用字典或缓存来存储先前函数调用的结果，并检查当前函数调用的结果是否已存在于字典或缓存中，如果存在则直接返回而无需重新计算。例如：\n\
    \n```python\n# 定义一个字典来存储先前函数调用的结果\ncache = {}\n\n# 定义一个使用记忆化计算数字阶乘的递归函数\ndef factorial(n):\n\
    \    # 检查 n 是否为零或一，这是基本情况\n    if n == 0 or n == 1:\n        # 返回 1，这是零或一的阶乘\n\
    \        return 1\n    # 检查 n 是否已在缓存中，这意味着结果已经计算过\n    if n in cache:\n      \
    \  # 从缓存中返回结果，无需重新计算\n        return cache[n]\n    # 否则，n 大于一，这是递归情况\n    else:\n\
    \        # 通过递归调用函数处理更小的子问题来计算结果\n        result = n * factorial(n - 1)\n    \
    \    # 将结果存储在缓存中，以 n 为键，result 为值\n        cache[n] = result\n        # 返回结果\n\
    \        return result\n```\n\n在这个例子中，`factorial` 函数被修改为使用记忆化，通过使用一个名为 `cache`\
    \ 的字典来存储先前函数调用的结果。函数检查 `n` 是否已在缓存中，这意味着结果已经计算过，并直接返回而无需重新计算。否则，函数通过递归调用处理更小的子问题来计算结果，并将结果存储在缓存中，以\
    \ `n` 为键，`result` 为值。这样，函数避免了重复或冗余的计算，提高了其效率和速度。\n\n你也可以使用 `functools` 模块中的 `lru_cache`\
    \ 装饰器在 Python 中实现记忆化，而无需显式使用字典或缓存。`lru_cache` 装饰器接受一个函数作为参数，并返回该函数的一个修改版本，该版本使用缓存来存储先前函数调用的结果，并实现**最近最少使用**策略，在缓存满时移除最近最少使用的项。`lru_cache`\
    \ 装饰器还接受一个可选参数 `maxsize`，用于指定缓存的最大大小。如果 `maxsize` 为 `None`，则缓存可以无限增长。例如：\n\n```python\n\
    # 从 functools 模块导入 lru_cache 装饰器\nfrom functools import lru_cache\n\n# 将 lru_cache\
    \ 装饰器应用于一个使用记忆化计算数字阶乘的递归函数\n@lru_cache(maxsize=None)\ndef factorial(n):\n    #\
    \ 检查 n 是否为零或一，这是基本情况\n    if n == 0 or n == 1:\n        # 返回 1，这是零或一的阶乘\n    \
    \    return 1\n    # 否则，n 大于一，这是递归情况\n    else:\n        # 返回 n 乘以 n-1 的阶乘，这是递归调用函数处理更小的子问题的结果\n\
    \        return n * factorial(n - 1)\n```\n\n在这个例子中，`@lru_cache(maxsize=None)`\
    \ 语法将 `lru_cache` 装饰器应用于 `factorial` 函数，这意味着 `factorial` 函数被替换为它的一个修改版本，该版本使用缓存来存储先前函数调用的结果，并实现最近最少使用策略，在缓存满时移除最近最少使用的项。`maxsize=None`\
    \ 参数指定缓存可以无限增长。修改后的函数行为与原始函数相同，但具有记忆化功能。\n\n定义递归情况，这是问题的通用或更大版本，可以通过将其分解为更小或更简单的子问题，并对每个子问题递归调用函数来解决。递归情况通常涉及一个返回语句，该语句返回组合子问题解决方案的结果。\n\
    \n以下是一个计算数字阶乘的递归函数示例：\n\n```python\n# 定义一个计算数字阶乘的递归函数\ndef factorial(n):\n   \
    \ # 检查 n 是否为零或一，这是基本情况\n    if n == 0 or n == 1:\n        # 返回 1，这是零或一的阶乘\n  \
    \      return 1\n    # 否则，n 大于一，这是递归情况\n    else:\n        # 返回 n 乘以 n-1 的阶乘，这是递归调用函数处理更小的子问题的结果\n\
    \        return n * factorial(n - 1)\n```\n\n在这个例子中，`factorial` 函数接受一个参数 `n`，它是一个非负整数。函数检查\
    \ `n` 是否为零或一，这是基本情况，并返回 1，这是零或一的阶乘。否则，`n` 大于一，这是递归情况，函数返回 `n` 乘以 `n-1` 的阶乘，这是递归调用函数处理更小的子问题的结果。例如：\n\
    \n```python\n# 使用 5 作为参数调用 factorial 函数\nprint(factorial(5))\n# 输出：120\n```\n\n\
    在这个例子中，`factorial` 函数以 5 作为参数被调用，这是递归情况。函数返回 5 乘以 4 的阶乘，这是递归调用函数处理更小的子问题的结果。然后函数返回\
    \ 4 乘以 3 的阶乘，这是递归调用函数处理更小的子问题的结果。然后函数返回 3 乘以 2 的阶乘，这是递归调用函数处理更小的子问题的结果。然后函数返回\
    \ 2 乘以 1 的阶乘，这是递归调用函数处理更小的子问题的结果。然后函数返回 1，这是基本情况。最终结果是 5 * 4 * 3 * 2 * 1，即 120。"
