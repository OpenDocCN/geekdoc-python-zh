    ```


    类型代码 `"i"` 表示数组包含有符号整数。你可以为不同类型的值使用不同的类型代码，例如 `"f"` 表示浮点数，`"b"` 表示字节，或 `"u"` 表示
    Unicode 字符。


    你可以像使用列表一样，通过索引来访问和修改数组的元素。例如，以下代码打印数组的第一个和最后一个元素，并将第二个元素更改为 10：


