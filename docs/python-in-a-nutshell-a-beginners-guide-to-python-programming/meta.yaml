    ## 哈希表


    正如我们所见，哈希表是一种使用哈希函数将键映射到桶中来存储键值对的数据结构。哈希函数是一种数学函数，它接受任何对象并返回一个固定长度的数字，称为哈希值或哈希码。一个好的哈希函数应具备以下特性：


    -   它应该快速且易于计算。

    -   它应该将键均匀地分布在各个桶中，以最小化冲突的可能性。

    -   它应该为不同的对象产生不同的哈希值，或者至少最小化哈希冲突的可能性。


    当两个不同的对象具有相同的哈希值，从而映射到同一个桶时，就发生了哈希冲突。这可能会给哈希表带来问题，因为它必须解决冲突并将两个键值对都存储在同一个桶中。处理哈希冲突有不同的方法，例如链地址法、线性探测或双重哈希。Python
    使用一种称为开放寻址法与线性探测的技术，这意味着它会尝试在哈希表中下一个可用位置找到一个空槽。


    Python 用于字典和集合的哈希函数基于对象的 `__hash__` 方法，该方法返回一个整数值。`__hash__` 方法默认为大多数内置类型定义，例如数字、字符串、元组和冻结集合。然而，有些类型是不可哈希的，例如列表、字典、集合以及未实现
    `__hash__` 和 `__eq__` 方法的自定义类。这些类型不能用作字典的键或集合的元素，因为它们没有固定的哈希值，并且无法进行相等性比较。


    对象的哈希值在不同 Python 运行中不保证相同，因为它可能取决于对象的内存地址、随机种子或哈希函数的实现细节等因素。因此，对象的哈希值不应用作唯一标识符或持久值。相反，哈希值只应用于哈希表中的快速查找和比较。


    对象的哈希值在不同平台或 Python 版本之间也不保证相同，因为它可能取决于哈希表的大小和容量、机器的字长或哈希函数的算法。因此，对象的哈希值不应用于跨平台或跨版本的兼容性或通信。相反，哈希值只应用于哈希表内部的优化和性能。


