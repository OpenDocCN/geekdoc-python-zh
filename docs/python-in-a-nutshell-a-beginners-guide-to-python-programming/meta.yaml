    use the enumerate function to create a list of tuples from a list of names:


    ```

    names = [''Alice'', ''Bob'', ''Charlie'', ''David'', ''Eve''] # create a list
    of names

    people = enumerate(names) # create an iterable that pairs up the names with their
    indices

