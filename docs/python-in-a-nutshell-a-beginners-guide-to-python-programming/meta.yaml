    \n## 真值与布尔测试\n\n在本节中，我们将学习 **真值** 的概念以及它们如何在 **布尔测试** 中使用。真值是表示真或假的值，可以是 `True`\
    \ 或 `False`。布尔测试是求值为真值的表达式，可以用作 if 语句中的条件。例如，我们可以编写以下代码：\n\n```\nx = 10 # this\
    \ is a variable assignment\nif x > 0: # this is a boolean test\n    print(“x is\
    \ positive”) # this is a statement\n```\n\n在这段代码中，布尔测试是 `x > 0`，如果 x 大于零则求值为 `True`，否则为\
    \ `False`。布尔测试用作 if 语句中的条件，这意味着只有当布尔测试为 `True` 时，语句 `print(“x is positive”)` 才会执行。\n\
    \nPython 有许多可用于创建布尔测试的运算符和函数，例如：\n\n**比较运算符**，用于比较两个值并根据比较结果返回 `True` 或 `False`。Python\
