- md: "## Timing Calls\n\nAnother common use case of function decorators is timing\
    \ calls, which means measuring and printing the execution time of the function.\
    \ This can be helpful for profiling and optimizing the performance of the function.\n\
    \nTo implement a timing decorator, we can use the time module to get the current\
    \ time before and after calling the function, and calculate the difference. We\
    \ can also use the functools.wraps decorator to preserve the identity and documentation\
    \ of the function.\n\n```python\nimport functools\nimport time\n\ndef timeit(func):\n\
    \    # Define a wrapper function that times the execution and calls the original\
    \ function\n    @functools.wraps(func)\n    def wrapper(*args, **kwargs):\n  \
    \      # Get the start time\n        start = time.time()\n        # Call the original\
    \ function\n        result = func(*args, **kwargs)\n        # Get the end time\n\
    \        end = time.time()\n        # Calculate the elapsed time\n        elapsed\
    \ = end - start\n        # Print the elapsed time\n        print(f\"{func.__name__}\
    \ took {elapsed} seconds to execute\")\n        # Return the result\n        return\
    \ result\n    # Return the wrapper function\n    return wrapper\n```\n\nWe can\
    \ apply this decorator to any function using the @ syntax:\n\n```python\n@timeit\n\
    def fib(n):\n    if n < 2:\n        return n\n    return fib(n-1) + fib(n-2)\n\
    ```\n\nNow, when we call the function, we will see the execution time printed\
    \ after the result:\n\n```\n>>> fib(10)\nfib took 0.0009975433349609375 seconds\
