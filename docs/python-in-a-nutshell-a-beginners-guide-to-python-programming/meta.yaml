    , \"banana\", \"cherry\", \"date\", \"elderberry\"]\na_fruits = [] # 创建一个空列表\n\
    for i in range(len(fruits)): # 遍历列表长度的范围\n    if fruits[i].startswith('a'): #\
    \ 检查元素是否以 'a' 开头\n        a_fruits.append(fruits[i]) # 将元素追加到新列表\nprint(a_fruits)\
    \ # ['apple']\n```\n\n然而，使用带有 `range` 对象和索引的 `for` 循环来创建新列表并不十分优雅或高效。从现有列表创建新列表的更好方法是使用列表推导式，这是一种在列表内部编写\
    \ `for` 循环的简洁且富有表现力的方式。\n\n例如：\n\n使用列表推导式创建水果长度的新列表：\n\n```\nfruits = [\"apple\"\
    , \"banana\", \"cherry\", \"date\", \"elderberry\"]\nlengths = [len(fruit) for\
    \ fruit in fruits] # 使用列表推导式\nprint(lengths) # [5, 6, 6, 4, 10]\n```\n\n使用列表推导式创建以\
    \ 'a' 开头的水果的新列表：\n\n```\nfruits = [\"apple\", \"banana\", \"cherry\", \"date\"\
    , \"elderberry\"]\na_fruits = [fruit for fruit in fruits if fruit.startswith('a')]\
    \ # 使用带条件的列表推导式\nprint(a_fruits) # ['apple']\n```\n\n列表推导式比使用带有 `range` 对象和索引的\
    \ `for` 循环来创建新列表更简洁、更具可读性且更高效。它们还避免了创建空列表并向其追加元素的需要。\n\n## 练习\n\n编写一个列表推导式，创建一个包含\
    \ 1 到 10 的数字的立方的列表。\n\n编写一个列表推导式，从一个字符串中创建一个包含长度超过 4 个字母的单词的列表。\n\n编写一个列表推导式，创建一个包含两个列表中共同元素的列表。\n\
    \n## 解答\n\n第一个练习的解答：\n\n```\ncubes = [n**3 for n in range(1, 11)] # 创建一个包含 1 到\
    \ 10 的立方的列表\nprint(cubes) # 打印列表\n```\n\n输出结果为：\n\n```\n[1, 8, 27, 64, 125, 216,\
    \ 343, 512, 729, 1000]\n```\n\n第二个练习的解答：\n\n```\ns = 'This is a sentence with\
    \ some long words' # 创建一个字符串\nwords = [w for w in s.split() if len(w) > 4] # 创建一个包含长度超过\
    \ 4 个字母的单词的列表\nprint(words) # 打印列表\n```\n\n输出结果为：\n\n```\n['sentence', 'long',\
    \ 'words']\n```\n\n第三个练习的解答：\n\n```\na = [1, 2, 3, 4, 5] # 创建一个数字列表\nb = [3, 4,\
    \ 5, 6, 7] # 创建另一个数字列表\ncommon = [n for n in a if n in b] # 创建一个包含两个列表中共同元素的列表\n\
    print(common) # 打印列表\n```\n\n输出结果为：\n\n```\n[3, 4, 5]\n```\n\n## 函数\n\n函数是 Python\
    \ 最强大的特性之一。它们允许你将一组语句组合在一起以执行特定任务。你可以在程序的不同部分重用函数，这使你的代码更具模块化、可读性和可维护性。你还可以将数据作为参数传递给函数，并从函数中获取返回值作为数据。函数还可以具有各种属性和注解，以提供有关它们的附加信息。\n\
    \n## 为什么使用函数\n\n函数在许多方面都很有用，例如：\n\n- **可重用性**：你可以编写一次函数，并在程序的不同部分多次使用它，而无需重复相同的代码。这使你的代码更简洁、更一致，并减少了错误和缺陷的可能性。\n\
    - **模块化**：你可以将一个复杂的问题分解为更小、更简单的子问题，并用一个函数来解决每个子问题。这使你的代码更有条理，更容易理解、测试和调试。\n- **抽象**：你可以隐藏函数工作方式的细节，只暴露其输入和输出。这使你的代码更具可读性和可维护性，并允许你在不影响用户的情况下更改函数的实现。\n\
    - **多态性**：你可以编写一个可以处理不同类型数据的函数，并相应地调整其行为。这使你的代码更灵活、更通用，并减少了类型检查和转换的需要。\n\n## 编写函数\n\
    \n要在 Python 中编写一个函数，你需要使用 `def` 关键字，后跟函数名称和一对括号。括号可以包含一个或多个参数，这些参数是接收传递给函数的值的变量。括号之后是一个冒号，后跟一个缩进的语句块，构成函数体。函数体可以包含一个\
    \ `return` 语句，该语句指定函数返回给调用者的值。如果没有 `return` 语句，函数默认返回 `None`。\n\n这是一个打印问候消息的简单函数示例：\n\
    \n```\n# 定义一个名为 greet 的函数\ndef greet():\n    # 打印问候消息\n    print(\"Hello, world!\"\
    )\n\n# 调用函数\ngreet()\n```\n\n输出：\n\n```\nHello, world!\n```\n\n要调用一个函数，你使用函数名称后跟一对括号。你还可以将函数的返回值赋给一个变量，或在表达式中使用它。例如：\n\
    \n```\n# 定义一个名为 square 的函数\ndef square(x):\n    # 返回 x 的平方\n    return x ** 2\n\
    ```"
