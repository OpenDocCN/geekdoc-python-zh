- md: 'You can access individual elements of a list by using their index, which starts
    from zero. For example, the following code prints the first and the last element
    of the list:


    ```

    >>> numbers[0]

    1

    >>> numbers[-1]

    4

    ```


    You can also use slicing to access a subset of a list. Slicing uses the syntax
    `list[start:stop:step]`, where `start` is the index of the first element to include,
    `stop` is the index of the first element to exclude, and `step` is the increment
    between elements. For example, the following code prints every other element of
    the list, starting from the second one:


    ```

    >>> numbers[1::2]

    [2, 4]

    ```


    You can also omit any of the slicing parameters, in which case they default to
    the beginning, the end, and one, respectively. For example, the following code
    prints a copy of the entire list:


    ```

    >>> numbers[:]

    [1, 2, 3, 4]

    ```


    ## Basic Operations on Lists


    Lists support many operations that allow you to modify and manipulate them. Some
    of the most common operations are:


    - `len(list)` returns the number of elements in the list

    - `list + list` concatenates two lists

    - `list * n` repeats the list `n` times

    - `x in list` returns `True` if `x` is an element of the list, `False` otherwise

    - `list.append(x)` adds `x` to the end of the list

    - `list.insert(i, x)` inserts `x` at index `i` in the list

    - `list.pop(i)` removes and returns the element at index `i` in the list

    - `list.remove(x)` removes the first occurrence of `x` in the list

    - `list.reverse()` reverses the order of the elements in the list

    - `list.sort()` sorts the elements of the list in ascending order


    Examples:


    ```

    >>> colors = ["red", "green", "blue"]

    >>> len(colors)

    3

    >>> colors + ["yellow", "pink"]

    ["red", "green", "blue", "yellow", "pink"]

    >>> colors * 2

    ["red", "green", "blue", "red", "green", "blue"]

    >>> "red" in colors

    True

    >>> "purple" in colors

    False

    >>> colors.append("orange")

    >>> colors

    ["red", "green", "blue", "orange"]

    >>> colors.insert(1, "white")

    >>> colors

    ["red", "white", "green", "blue", "orange"]

    >>> colors.pop()

    "orange"

    >>> colors

    ["red", "white", "green", "blue"]

    >>> colors.remove("white")

    >>> colors

    ["red", "green", "blue"]

    >>> colors.reverse()

    >>> colors

    ["blue", "green", "red"]

    >>> colors.sort()

    >>> colors

    ["blue", "green", "red"]

    ```


    ## List Nesting


    Lists can contain any type of objects, including other lists. This allows you
    to create nested or hierarchical structures, such as matrices, trees, or graphs.
    For example, the following code creates a 3x3 matrix as a list of lists:


    ```

    >>> matrix = [[1, 2, 3], [4, 5, 6], [7, 8, 9]]

    >>> matrix

    [[1, 2, 3], [4, 5, 6], [7, 8, 9]]

    ```


    You can access the elements of a nested list by using multiple indices. For example,
    the following code prints the element in the second row and the third column of
    the matrix:


    ```

    >>> matrix[1][2]

    6

    ```


    You can also use slicing to access a subset of a nested list. For example, the
    following code prints the first two rows of the matrix:


    ```

    >>> matrix[:2]

