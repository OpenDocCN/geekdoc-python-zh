  mdcn: "## 装饰器\n\n装饰器是 Python 的一项强大功能，允许你在不修改函数或类源代码的情况下，改变其行为。装饰器是接收另一个函数或类作为参数，并返回其修改版本的函数。装饰器可用于为函数或类添加额外功能，如日志记录、调试、缓存、验证等。\n\
    \n要创建装饰器，你需要定义一个函数，该函数接收另一个函数作为参数，并返回一个包装函数，该包装函数在调用原始函数之前或之后执行一些代码。\n\n例如：\n\n\
    ```python\n# 定义一个装饰器，在调用函数前后打印消息\ndef print_message(func):\n    # 定义一个包装函数\n \
    \   def wrapper():\n        # 在调用函数前打印消息\n        print(\"Calling\", func.__name__)\n\
    \        # 调用原始函数\n        func()\n        # 在调用函数后打印消息\n        print(\"Done\"\
    )\n    # 返回包装函数\n    return wrapper\n```\n\n在这个例子中，`print_message` 函数是一个装饰器，它接收另一个函数作为参数，并返回一个包装函数，该包装函数在调用原始函数前后打印消息。包装函数使用原始函数的\
    \ `__name__` 属性获取其名称，并使用 `func()` 语法调用它。\n\n要将装饰器应用于函数，你需要在函数定义上方使用 `@` 符号，后跟装饰器的名称。\n\
    \n例如：\n\n```python\n# 将 print_message 装饰器应用于一个打印 hello 的函数\n@print_message\ndef\
    \ hello():\n    print(\"Hello, world!\")\n\n# 调用被装饰的函数\nhello()\n```\n\n输出：\n\n\
    ```\nCalling hello\nHello, world!\nDone\n```\n\n在这个例子中，`@print_message` 语法将 `print_message`\
    \ 装饰器应用于 `hello` 函数，这意味着 `hello` 函数被装饰器返回的包装函数所替换。当你调用 `hello` 函数时，你实际上是在调用包装函数，该包装函数在调用原始\
    \ `hello` 函数前后打印消息。\n\n你也可以通过将多个装饰器堆叠在一起来将它们应用于一个函数。装饰器的顺序很重要，因为最底部的装饰器最先应用，最顶部的装饰器最后应用。例如：\n\
    \n```python\n# 定义另一个装饰器，在调用函数前后打印时间\ndef print_time(func):\n    # 导入 time 模块\n\
    \    import time\n    # 定义一个包装函数\n    def wrapper():\n        # 在调用函数前获取当前时间\n\
    \        start = time.time()\n        # 调用原始函数\n        func()\n        # 在调用函数后获取当前时间\n\
    \        end = time.time()\n        # 打印经过的时间\n        print(f\"Elapsed time:\
    \ {end - start} seconds\")\n    # 返回包装函数\n    return wrapper\n\n# 将两个装饰器应用于一个打印\
    \ hello 的函数\n@print_time\n@print_message\ndef hello():\n    print(\"Hello, world!\"\
    )\n\n# 调用被装饰的函数\nhello()\n```\n\n输出：\n\n```\nCalling hello\nHello, world!\nDone\n\
