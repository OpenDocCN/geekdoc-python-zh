    ```\n\n`try` 块包含可能导致异常的代码，而 `except` 块包含处理异常的代码。`ExceptionType` 是我们想要捕获的异常类的名称，`e`\
    \ 是保存异常对象的变量。我们可以为不同类型的异常设置多个 `except` 块，或者使用一个通用的 `except` 块来捕获任何异常。例如，要处理 `ZeroDivisionError`\
