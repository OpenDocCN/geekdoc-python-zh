    ## List Comprehension, map and filter


    As you have seen, list comprehensions are a powerful and concise way to create
    new lists from existing ones. However, they are not the only way to do so. You
    can also use the built-in functions `map` and `filter` to apply a function to
    each element of an iterable and return a new iterable. For example, the following
    code uses `map` to create a list of the squares of the numbers in the list `[1,
    2, 3, 4, 5]`:


    ```

    >>> numbers = [1, 2, 3, 4, 5]

    >>> squares = list(map(lambda x: x**2, numbers))

    >>> squares

    [1, 4, 9, 16, 25]

    ```


    The `map` function takes two arguments: a function and an iterable. It applies
    the function to each element of the iterable and returns a map object, which is
    an iterator that lazily evaluates the results. To get a list, you need to convert
    the map object to a list using the `list` function. The `lambda` expression is
    an anonymous function that defines the function to apply to each element. In this
    case, it returns the square of the input.


    Similarly, the following code uses `filter` to create a list of the even numbers
    in the list `[1, 2, 3, 4, 5]`:


    ```

    >>> numbers = [1, 2, 3, 4, 5]

    >>> evens = list(filter(lambda x: x % 2 == 0, numbers))

    >>> evens

    [2, 4]

    ```


    The `filter` function takes two arguments: a function and an iterable. It applies
    the function to each element of the iterable and returns a filter object, which
    is an iterator that lazily evaluates the results. To get a list, you need to convert
    the filter object to a list using the `list` function. The `lambda` expression
    is an anonymous function that defines the function to apply to each element. In
    this case, it returns `True` if the input is even, and `False` otherwise.


    You may wonder which way is better: using list comprehensions or using `map` and
    `filter`. The answer depends on your preference and the situation. List comprehensions
    are more readable and expressive, as they allow you to write the logic in a natural
    way, without using lambda expressions or converting iterators to lists. However,
    map and filter can be more efficient and memory-friendly, as they avoid creating
    intermediate lists and use lazy evaluation. They can also be combined with other
    functions to perform more complex operations.


    ## Generator


    Another way to create new iterables from existing ones is to use **generator**,
    which is similar to list comprehensions, but use parentheses instead of square
    brackets. For example, the following code uses a generator expression to create
    an iterator of the squares of the numbers in the list [1, 2, 3, 4, 5]:


    ```

    >>> numbers = [1, 2, 3, 4, 5]

    >>> squares = (n**2 for n in numbers)

    >>> squares

    <generator object <genexpr> at 0x7f9c6c0a9f90>

    ```


    The generator expression returns a generator object, which is an iterator that
    lazily evaluates the results. To get the values, you need to iterate over the
    generator object using a for loop or a function that consumes an iterator, such
    as `list`, `sum`, or `max`. For example, the following code prints the values
    of the generator object:


    ```

    >>> for n in squares:

    ...     print(n)

    ...

    1

    4

    9

    16

    25

    ```


    Generator expressions are useful when you want to create an iterable that you
    only need to use once, or when you want to save memory and avoid creating a large
    list. However, they have some limitations, such as:


    - You can only iterate over a generator object once. If you try to iterate over
    it again, it will raise a StopIteration exception, as it has no more values to
    yield.

    - You cannot access the elements of a generator object by index or slice. You
    can only access them sequentially by using a for loop or a function that consumes
    an iterator.

    - You cannot modify the elements of a generator object. You can only create a
    new generator object based on the existing one.


    ## Assigning to Slices


    We have seen how to use slicing to access and modify subsets of a list. However,
    slicing can also be used to assign a new value to a subset of a list, replacing
    the original elements with the new ones. For example, suppose you have the following
    list of numbers:


    ```

    >>> numbers = [1, 2, 3, 4, 5]

    ```


    You can use slicing to assign a new value to a slice of the list. For example,
    the following code assigns the value 0 to the first two elements of the list:


    ```

    >>> numbers[:2] = [0]

    >>> numbers

    [0, 3, 4, 5]

    ```


    Notice that the length of the new value does not have to match the length of the
    slice. In this case, the new value has only one element, while the slice has two
    elements. Therefore, the assignment replaces the two elements with one element,
    reducing the length of the list by one.


    You can also use slicing to insert or delete elements from a list, by assigning
    an empty list or a longer list to a slice. For example, the following code inserts
    the value 1 at the beginning of the list, by assigning it to an empty slice:


    ```

    >>> numbers[:0] = [1]

    >>> numbers

    [1, 0, 3, 4, 5]

    ```


    Similarly, the following code deletes the last two elements of the list, by assigning
    an empty list to the slice:


    ```

    >>> numbers[-2:] = []

    >>> numbers

    [1, 0, 3]

    ```


    ## Using + and * with Sequences


    We have seen how to use the + and * operators to concatenate and repeat lists,
    respectively. However, these operators can also be used with other types of sequences,
    such as strings, tuples, and ranges. For example, the following code uses the
    + and * operators to create and manipulate strings:


    ```

    >>> "Hello" + " " + "World"

    "Hello World"

    >>> "Python" * 3

    "PythonPythonPython"

    ```


    The + and * operators can also be used with tuples, which are immutable sequences
    of arbitrary objects. For example, the following code uses the + and * operators
    to create and manipulate tuples:


    ```

    >>> (1, 2, 3) + (4, 5, 6)

    (1, 2, 3, 4, 5, 6)

    >>> (1, 2, 3) * 2

    (1, 2, 3, 1, 2, 3)

    ```


    The + and * operators can also be used with ranges, which are immutable sequences
    of numbers that are commonly used for looping. For example, the following code
    uses the + and * operators to create and manipulate ranges:


    ```

    >>> range(1, 4) + range(4, 7)

    range(1, 7)

    >>> range(1, 4) * 2

    range(1, 4, 1, 4)

    ```


    However, there are some limitations and caveats when using the + and * operators
    with sequences. For example:


    - You can only use the + operator with sequences of the same type. You cannot
    concatenate a list and a tuple, or a string and a range, for example.

    - You can only use the * operator with a sequence and an integer. You cannot repeat
    a sequence by a fractional or a negative number, for example.

    - The + and * operators create new sequences, not views of the original sequences.
    Therefore, they may consume more memory and time than slicing or iterating over
    the sequences.


    ## Building Lists of Lists


    We have seen how to use nested lists to create matrices and multidimensional arrays.
    However, building lists of lists can be tricky, especially if you want to initialize
    them with some default values. For example, suppose you want to create a 3x3 matrix
    filled with zeros. You may be tempted to use the following code:


    ```

    >>> matrix = [[0] * 3] * 3

    >>> matrix

    [[0, 0, 0], [0, 0, 0], [0, 0, 0]]

    ```


    This seems to work, as it creates a list of three lists, each containing three
    zeros. However, there is a problem with this approach: the three lists are references
    to the same list object, not independent copies. Therefore, if you modify one
    element of the matrix, you will modify the corresponding element in all the rows.


    For example, the following code changes the element in the first row and the first
    column of the matrix to 1:


    ```

    >>> matrix[0][0] = 1

    >>> matrix

    [[1, 0, 0], [1, 0, 0], [1, 0, 0]]

    ```


    Notice that the element in the second and the third row and the first column also
    changed to 1, which is not what you wanted. To avoid this problem, you need to
    create a list of lists using a loop or a list comprehension, as shown in the following
    code:


    ```

    >>> matrix = [[0] * 3 for _ in range(3)]

    >>> matrix

    [[0, 0, 0], [0, 0, 0], [0, 0, 0]]

    ```'
