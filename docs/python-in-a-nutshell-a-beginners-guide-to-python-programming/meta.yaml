    \ of a number\ndef factorial(n):\n    # Check if n is zero or one, which is the\
    \ base case\n    if n == 0 or n == 1:\n        # Return 1, which is the factorial\
    \ of zero or one\n        return 1\n    # Otherwise, n is greater than one, which\
    \ is the recursive case\n    else:\n        # Return n times the factorial of\
    \ n - 1, which is the result of applying the function recursively on a smaller\
    \ subproblem\n        return n * factorial(n - 1)\n```\n\nIn this example, the\
    \ factorial function takes one argument, n, which is a non-negative integer. The\
