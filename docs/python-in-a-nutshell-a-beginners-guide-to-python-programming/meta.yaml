    有时，你可能希望将一些参数传递给装饰器本身，而不是它修改的可调用对象。例如，你可能希望根据某些参数自定义装饰器的行为。这对于创建更灵活和可重用的装饰器很有用。\n\
    \n要将参数传递给装饰器，你需要定义一个函数，该函数接收参数并返回另一个充当装饰器的函数。返回的函数将接收可调用对象作为参数，并返回其修改版本。\n\n例如，这是一个接收前缀和后缀作为参数，并将它们添加到函数消息中的装饰器：\n\
    \n```python\ndef add_text(prefix, suffix):\n    # 定义一个函数，该函数接收一个可调用对象作为参数并返回一个装饰器\n\
    \    def decorator(func):\n        # 定义一个包装函数，该函数将前缀和后缀添加到消息中并调用原始函数\n       \
    \ def wrapper():\n            print(prefix, end=\"\")\n            func()\n  \
    \          print(suffix)\n        # 返回包装函数\n        return wrapper\n    # 返回装饰器函数\n\
    \    return decorator\n```\n\n你可以使用 `@` 语法将此装饰器应用于任何函数，并在括号中传递参数：\n\n```python\n\
    @add_text(\"(\", \")\")\ndef hello():\n    print(\"Hello, world!\")\n```\n\n现在，当你调用该函数时，你将看到修改后的输出：\n\
    \n```\n>>> hello()\n(Hello, world!)\n```\n\n`@` 语法等同于编写：\n\n```python\nhello =\
    \ add_text(\"(\", \")\")(hello)\n```\n\n你也可以将不同的参数传递给同一个装饰器，创建其不同的版本。例如，你可以编写：\n\
    \n```python\n@add_text(\"<\", \">\")\ndef bye():\n    print(\"Bye, world!\")\n\
    ```\n\n这等同于编写：\n\n```python\nbye = add_text(\"<\", \">\")(bye)\n```\n\n现在，当你调用该函数时，你将看到修改后的输出：\n\
    \n```\n>>> bye()\n<Bye, world!>\n```\n\n## 装饰器嵌套\n\n装饰器可以嵌套在其他装饰器内部，创建组合了多个装饰器功能的高阶装饰器。这允许你创建更复杂和灵活的装饰器，可以应用于不同的可调用对象。\n\
