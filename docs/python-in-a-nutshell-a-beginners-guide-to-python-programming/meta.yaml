  - "[PAGE 278]\n\n# # Iterations\n\nIteration is the process of accessing each item\
    \ in a sequence, one at a time. In Python, we can use the for loop to iterate\
    \ over any object that supports iteration, such as lists, strings, tuples, dictionaries,\
    \ sets, and files. For example, we can iterate over a list of numbers and print\
    \ each one:\n\n```\npython\nnumbers = [1, 2, 3, 4, 5]\nfor n in numbers:\n   \
    \ print(n)\n```\n\nThe output is:\n\n```\n\n1\n2\n3\n4\n5\n```\n\nThe for loop\
    \ works by calling a special method called __iter__ on the object that we want\
    \ to iterate over. This method returns an iterator object, which is an object\
    \ that has another special method called __next__. The __next__ method returns\
    \ the next item in the sequence, or raises a StopIteration exception when there\
    \ are no more items. The for loop internally calls the __next__ method on the\
    \ iterator until it catches the StopIteration exception, and then exits the loop.\n\
    \nWe can see this process more clearly by using the iter and next built-in functions,\
    \ which are equivalent to calling the __iter__ and __next__ methods. For example,\
    \ we can manually create an iterator from a list and get the next item:\n\n```\n\
    python\nnumbers = [1, 2, 3, 4, 5]\n```"
