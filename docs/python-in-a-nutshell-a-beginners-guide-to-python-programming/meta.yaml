    \n    # subclass method\n    def charge(self, amount):\n        self.battery +=\
    \ amount\n        print(f\"The battery level of the car is {self.battery}%.\"\
    )\n\n    # overridden attribute\n    self.__speed = 0\n\n    # overridden method\n\
    \    def set_speed(self, value):\n        if value >= 0 and value <= 150: # lower\
    \ the maximum speed\n            self.__speed = value\n        else:\n       \
    \     print(\"Invalid speed value.\")\n\n    # subclass constructor\n    def __init__(self,\
    \ color, model, battery):\n        # call the superclass constructor\n       \
    \ super().__init__(color, model)\n        # initialize the subclass attribute\n\
    \        self.battery = battery\n```\n\n要使用`__init__`方法创建子类的对象，我们必须传递父类和子类都需要的参数。例如，要使用`__init__`方法创建`ElectricCar`类的对象，我们这样写：\n\
    \n```\ne = ElectricCar(\"blue\", \"Tesla\", 80)\n```\n\n## 多态\n\n多态是允许对象根据上下文表现不同行为的原则，通过在运行时改变其行为来实现。多态性支持灵活性和多样性，也支持**替换**的概念，即子类对象可以在需要父类对象的地方使用。\n\
    \nPython中有两种类型的多态：**运算符重载**和**鸭子类型**。运算符重载是为自定义类重新定义运算符含义的能力，例如`+`、`-`、`*`、`/`等。鸭子类型是基于对象的行为而非其类型来使用对象的能力，只要它具有所需的属性或方法即可。\n\
    \n要在Python中实现运算符重载，我们必须在类中定义与要重载的运算符相对应的特殊方法。这些特殊方法以双下划线（`__`）开始和结束，并具有指示其重载运算符的特定名称。例如，要为`Car`类重载`+`运算符，我们必须定义`__add__`方法，该方法接受`self`参数和另一个表示另一个操作数的参数，并返回操作结果。例如，要为`Car`类定义`__add__`方法，我们这样写：\n\
    \n```\nclass Car:\n    # class attribute\n    count = 0\n\n    # instance attribute\n\
    \    def __init__(self, color, model):\n        self.color = color\n        self.model\
    \ = model\n        # increment the class attribute by 1\n        Car.count +=\
    \ 1\n\n    # operator overloading\n    def __add__(self, other):\n        # check\
    \ if the other operand is a Car object\n        if isinstance(other, Car):\n \
    \           # create a new Car object with the combined attributes\n         \
    \   return Car(self.color + \" and \" + other.color, self.model + \" and \" +\
    \ other.model)\n        else:\n            # raise an exception if the other operand\
    \ is not a Car object\n            raise TypeError(\"The other operand must be\
    \ a Car object.\")\n```\n\n要使用重载的运算符，我们只需像往常一样使用该运算符，但使用类的对象作为操作数。例如，要对`Car`类的对象使用`+`运算符，我们这样写：\n\
    \n```\nc1 = Car(\"red\", \"Toyota\")\nc2 = Car(\"blue\", \"Tesla\")\nc3 = c1 +\
    \ c2 # use the overloaded operator\nprint(c3.color) # red and blue\nprint(c3.model)\
    \ # Toyota and Tesla\n```\n\n要在Python中实现鸭子类型，我们不必显式指定对象的类型，只需检查它是否具有我们想要使用的所需属性或方法。例如，要定义一个接受任何具有`show_color`方法的对象并调用它的函数，我们这样写：\n\
    \n```\ndef show_any_color(obj):\n    # check if the object has a show_color method\n\
