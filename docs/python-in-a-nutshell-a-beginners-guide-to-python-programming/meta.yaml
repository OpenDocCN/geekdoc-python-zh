    # 字符串


    字符串是 Python 中最常见和最通用的数据类型之一。字符串是字符序列，用单引号或双引号括起来。字符串可以存储和操作文本数据，例如姓名、消息、命令等。


    在本节中，你将学习如何在 Python 中创建、访问、修改和操作字符串。你还将了解字符串的一些高级特性，例如 Unicode、转义序列、原始字符串和模式匹配。


    ## 字符串基础


    要在 Python 中创建字符串，你可以使用单引号或双引号。


    例如：


    ```

    s = ''Hello''


    t = "World"

    ```


    `s` 和 `t` 都是有效的字符串。你可以使用任何一种引号，只要保持一致即可。唯一的区别是，如果你想在字符串中包含引号字符，你需要使用另一种类型的引号来括起字符串。


    例如：


    ```

    s = ''She said, "Hello"''


    t = "He said, ''Goodbye''"

    ```


    或者，你可以使用反斜杠 (`\`) 来转义字符串中的引号字符。'
