    \n## 任意参数\n\n有时你可能想定义一个可以接受任意数量参数的函数，而无需预先知道将传递多少个参数。例如，你可能想编写一个可以计算任意数量数字之和的函数。你可以通过在函数定义中使用任意参数来实现这一点。任意参数是在其名称前有一个星号\
