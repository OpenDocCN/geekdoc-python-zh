    The zip function is another built-in function that returns an iterable that combines
    multiple iterables into tuples. We can use the zip function to create an iterable
    that pairs up the items from two or more iterables, and get a new iterable with
    the tuples. For example, we can use the zip function to create a list of tuples
    from two lists:


    ```

    names = [''Alice'', ''Bob'', ''Charlie'', ''David'', ''Eve''] # create a list
    of names

    ages = [25, 30, 35, 40, 45] # create a list of ages

    people = zip(names, ages) # create an iterable that pairs up the names and ages

    print(list(people)) # convert the iterable into a list and print it

    ```'
