    You can also use slicing to access a range of items from a tuple. Slicing uses
    the syntax `[start:stop:step]`, where `start` is the index of the first item to
    include, `stop` is the index of the last item to exclude, and `step` is the interval
    between items. You can omit any of these parameters to use the default values.
    For example:


