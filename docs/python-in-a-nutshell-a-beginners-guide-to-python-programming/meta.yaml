    * 运算符创建和操作字符串：


    ```

    >>> "Hello" + " " + "World"

    "Hello World"

    >>> "Python" * 3

    "PythonPythonPython"

    ```


    + 和 * 运算符也可以用于元组，元组是任意对象的不可变序列。例如，以下代码使用 + 和 * 运算符创建和操作元组：


    ```

    >>> (1, 2, 3) + (4, 5, 6)

    (1, 2, 3, 4, 5, 6)

    >>> (1, 2, 3) * 2

    (1, 2, 3, 1, 2, 3)

    ```


    + 和 * 运算符也可以用于范围，范围是常用于循环的数字不可变序列。例如，以下代码使用 + 和 * 运算符创建和操作范围：


    ```

