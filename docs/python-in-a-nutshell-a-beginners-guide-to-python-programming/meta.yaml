  mdcn: "## 偏函数与柯里化\n\n偏函数和柯里化是两种技术，允许你通过固定部分参数或参数，从现有函数创建新函数。偏函数和柯里化对于创建专门或定制的函数，或简化函数调用非常有用。\n\
    \n要在 Python 中创建偏函数，你需要使用 `functools` 模块中的 `partial` 函数。`partial` 函数接受一个函数和一个或多个参数或关键字作为参数，并返回一个新函数，该函数的行为与原始函数类似，但部分参数或关键字已固定。例如：\n\
    \n```python\n# 从 functools 模块导入 partial 函数\nfrom functools import partial\n\n\
    # 定义一个计算数字幂的函数\ndef power(x, y):\n    return x ** y\n\n# 创建一个计算数字平方的偏函数\nsquare\
    \ = partial(power, y=2)\n\n# 调用偏函数\nprint(square(3))\n# 输出: 9\n```\n\n在这个例子中，`partial`\
    \ 函数创建了一个名为 `square` 的新函数，它的行为类似于 `power` 函数，但 `y` 参数固定为 2。这意味着 `square` 函数只接受一个参数\
    \ `x`，并返回 `x ** 2`，即 `x` 的平方。要调用偏函数，你使用与原始函数相同的语法，但参数更少。\n\n你也可以创建具有多个固定参数或关键字，或不同位置的偏函数。例如：\n\
    \n```python\n# 从 functools 模块导入 partial 函数\nfrom functools import partial\n\n\
    # 定义一个计算矩形面积的函数\ndef area(length, width):\n    return length * width\n\n# 创建一个计算正方形面积的偏函数\n\
    square_area = partial(area, width=length)\n\n# 调用偏函数\nprint(square_area(4))\n\
    # 输出: 16\n```\n\n在这个例子中，`partial` 函数创建了一个名为 `square_area` 的新函数，它的行为类似于 `area`\
