    in the dictionary, or the default value if it is not. It also adds the key and
    the default value to the dictionary if the key is not present.


    The setdefault() method is especially useful when you want to create a dictionary
    that maps keys to lists, and append values to the lists without checking if the
    key exists. For example:


    ```python

    # Creating an empty dictionary

