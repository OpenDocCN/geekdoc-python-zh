- md: "## Iterations\n\nIteration is the process of accessing each item in a sequence,\
    \ one at a time. In Python, we can use the for loop to iterate over any object\
    \ that supports iteration, such as lists, strings, tuples, dictionaries, sets,\
    \ and files. For example, we can iterate over a list of numbers and print each\
    \ one:\n\n```python\nnumbers = [1, 2, 3, 4, 5]\nfor n in numbers:\n    print(n)\n\
    ```\n\nThe output is:\n\n```\n1\n2\n3\n4\n5\n```\n\nThe for loop works by calling\
    \ a special method called `__iter__` on the object that we want to iterate over.\
    \ This method returns an iterator object, which is an object that has another\
    \ special method called `__next__`. The `__next__` method returns the next item\
    \ in the sequence, or raises a `StopIteration` exception when there are no more\
    \ items. The for loop internally calls the `__next__` method on the iterator until\
    \ it catches the `StopIteration` exception, and then exits the loop.\n\nWe can\
    \ see this process more clearly by using the `iter` and `next` built-in functions,\
    \ which are equivalent to calling the `__iter__` and `__next__` methods. For example,\
    \ we can manually create an iterator from a list and get the next item:\n\n```python\n\
    numbers = [1, 2, 3, 4, 5]\nit = iter(numbers) # get an iterator from the list\n\
    print(next(it)) # get the first item\nprint(next(it)) # get the second item\n\
    print(next(it)) # get the third item\n```\n\nThe output is:\n\n```\n1\n2\n3\n\
    ```\n\nIf we call `next` again, we will get the fourth item, and so on, until\
    \ we exhaust the iterator and get a `StopIteration` exception:\n\n```python\n\
    print(next(it)) # get the fourth item\nprint(next(it)) # get the fifth item\n\
    print(next(it)) # get the sixth item\n```\n\nThe output is:\n\n```\n4\n5\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\nStopIteration\n\
    ```\n\nThis is how the for loop works under the hood. It is important to understand\
    \ the iteration protocol, because it allows us to create our own custom iterables\
    \ and iterators, and use them with the for loop and other iteration tools.\n\n\
    ## File Iterators\n\nOne of the most common examples of iterables and iterators\
    \ in Python are files. When we open a file in text mode, we get a file object\
    \ that supports the iteration protocol. We can use the for loop to iterate over\
    \ the lines of the file, or use the `iter` and `next` functions to get the lines\
    \ manually. For example, suppose we have a file called `data.txt` that contains\
    \ the following text:\n\n```\nHello\nWorld\nPython\nis\nawesome\n```\n\nWe can\
    \ open the file and iterate over the lines using the for loop:\n\n```python\n\
    f = open('data.txt') # open the file in text mode\nfor line in f: # iterate over\
    \ the lines\n    print(line) # print each line\nf.close() # close the file\n```\n\
    \nThe output is:\n\n```\nHello\nWorld\nPython\nis\nawesome\n```\n\nNotice that\
    \ each line has a newline character (`\\n`) at the end, which is why we see blank\
    \ lines in the output. We can use the `strip` method to remove the newline characters\
    \ and any other whitespace from the lines:\n\n```python\nf = open('data.txt')\
    \ # open the file in text mode\nfor line in f: # iterate over the lines\n    print(line.strip())\
    \ # print each line without whitespace\nf.close() # close the file\n```\n\nThe\
    \ output is:\n\n```\nHello\nWorld\nPython\nis\nawesome\n```\n\nAlternatively,\
    \ we can use the `iter` and `next` functions to get the lines manually:\n\n```python\n\
    f = open('data.txt') # open the file in text mode\nit = iter(f) # get an iterator\
    \ from the file object\nprint(next(it).strip()) # get the first line without whitespace\n\
    print(next(it).strip()) # get the second line without whitespace\nprint(next(it).strip())\
    \ # get the third line without whitespace\nf.close() # close the file\n```\n\n\
    The output is:\n\n```\nHello\nWorld\nPython\n```\n\nIf we call `next` again, we\
    \ will get the fourth line, and so on, until we reach the end of the file and\
    \ get a `StopIteration` exception:\n\n```python\nprint(next(it).strip()) # get\
    \ the fourth line without whitespace\nprint(next(it).strip()) # get the fifth\
    \ line without whitespace\nprint(next(it).strip()) # get the sixth line without\
    \ whitespace\n```\n\nThe output is:\n\n```\nis\nawesome\nTraceback (most recent\
    \ call last):\n  File \"<stdin>\", line 1, in <module>\nStopIteration\n```\n\n\
    File objects are examples of multiple pass iterators, which means that we can\
    \ iterate over them more than once. However, we need to reset the file pointer\
    \ to the beginning of the file before we iterate over it again, using the `seek`\
    \ method. For example, we can iterate over the file twice using the for loop:\n\
    \n```python\nf = open('data.txt') # open the file in text mode\nfor line in f:\
    \ # iterate over the lines for the first time\n    print(line.strip()) # print\
    \ each line without whitespace\nf.seek(0) # reset the file pointer to the beginning\n\
    for line in f: # iterate over the lines for the second time\n    print(line.strip())\
    \ # print each line without whitespace\nf.close() # close the file\n```\n\n# Define\
    \ a function that divides two numbers\ndef divide(x, y):\n    # Try to perform\
    \ the division\n    try:\n        # Return the quotient\n        return x / y\n\
    \    # Handle the exception if y is zero\n    except ZeroDivisionError:\n    \
    \    # Print an error message\n        print(\"Cannot divide by zero\")\n    #\
    \ Execute this block if no exception occurred\n    else:\n        # Print a success\
    \ message\n        print(\"Division successful\")\n    # Execute this block regardless\
    \ of whether an exception occurred or not\n    finally:\n        # Print a final\
    \ message\n        print(\"End of function\")\n\n# Call the function with valid\
    \ arguments\ndivide(10, 2)\n# Output: Division successful\n# Output: End of function\n\
    # Return: 5.0\n\n# Call the function with invalid arguments\ndivide(10, 0)\n#\
    \ Output: Cannot divide by zero\n# Output: End of function\n# Return: None\n\n\
    In this example, the `divide` function tries to perform the division of two numbers,\
    \ and handles the `ZeroDivisionError` exception if the second argument is zero.\
    \ The `else` block executes if no exception occurred, and the `finally` block\
    \ executes regardless of whether an exception occurred or not.\n\nYou can also\
    \ use the `raise` keyword to create your own exceptions. You can use a built-in\
    \ exception class, such as `ValueError`, `TypeError`, `RuntimeError`, etc., or\
    \ define your own custom exception class by inheriting from the `Exception` class.\
    \ You can also pass a message to the exception class to provide more information\
    \ about the error. For example:\n\n```python\n# Define a custom exception class\n\
    class NegativeNumberError(Exception):\n    # Initialize the class with a message\n\
    \    def __init__(self, message):\n        # Call the superclass constructor with\
    \ the message\n        super().__init__(message)\n```\n\n```python\n# Define a\
    \ function that calculates the square root of a number\ndef sqrt(x):\n    # Check\
    \ if the argument is negative\n    if x < 0:\n        # Raise a custom exception\n\
    \        raise NegativeNumberError(\"Cannot take the square root of a negative\
    \ number\")\n    # Return the square root\n    return x ** 0.5\n```\n\n```python\n\
    # Call the function with a valid argument\nprint(sqrt(9))\n# Output: 3.0\n```\n\
    \n```python\n# Call the function with an invalid argument\nprint(sqrt(-9))\n#\
    \ Output: NegativeNumberError: Cannot take the square root of a negative number\n\
    ```\n\nIn this example, the `sqrt` function calculates the square root of a number,\
    \ and raises a custom exception if the argument is negative. The custom exception\
    \ class inherits from the `Exception` class, and takes a message as an argument.\
    \ The `raise` keyword creates an instance of the exception class and passes the\
    \ message to it.\n\nAn assertion is a statement that checks if a condition is\
    \ true, and raises an `AssertionError` exception if it is false. Assertions are\
    \ used to verify the correctness of your code, and to catch bugs and logic errors.\
    \ You can use the `assert` keyword to create an assertion, followed by a condition\
    \ and an optional message. For example:\n\n```python\n# Define a function that\
    \ calculates the factorial of a number\ndef factorial(n):\n    # Check if the\
    \ argument is a positive integer\n    assert isinstance(n, int) and n >= 0, \"\
    n must be a non-negative integer\"\n    # Initialize the result\n    result =\
    \ 1\n    # Loop from 1 to n\n    for i in range(1, n + 1):\n        # Multiply\
    \ the result by i\n        result *= i\n    # Return the result\n    return result\n\
    \n# Call the function with a valid argument\nprint(factorial(5))\n# Output: 120\n\
    \n# Call the function with an invalid argument\nprint(factorial(-5))\n# Output:\
    \ AssertionError: n must be a non-negative integer\n```\n\nIn this example, the\
    \ `factorial` function calculates the factorial of a number, and uses an assertion\
    \ to check if the argument is a positive integer. The `assert` keyword takes a\
    \ condition and an optional message, and raises an `AssertionError` exception\
    \ if the condition is false. The assertion helps to catch invalid arguments and\
    \ prevent unexpected results."
  mdcn: "## 迭代\n\n迭代是逐个访问序列中每个元素的过程。在 Python 中，我们可以使用 `for` 循环来遍历任何支持迭代的对象，例如列表、字符串、元组、字典、集合和文件。例如，我们可以遍历一个数字列表并打印每个数字：\n\
    \n```python\nnumbers = [1, 2, 3, 4, 5]\nfor n in numbers:\n    print(n)\n```\n\
    \n输出结果为：\n\n```\n1\n2\n3\n4\n5\n```\n\n`for` 循环的工作原理是调用我们想要遍历的对象上的一个特殊方法 `__iter__`。该方法返回一个迭代器对象，该对象拥有另一个名为\
    \ `__next__` 的特殊方法。`__next__` 方法返回序列中的下一个元素，或者在没有更多元素时引发 `StopIteration` 异常。`for`\
    \ 循环在内部调用迭代器的 `__next__` 方法，直到捕获到 `StopIteration` 异常，然后退出循环。\n\n我们可以通过使用内置函数 `iter`\
    \ 和 `next` 来更清晰地看到这个过程，它们等同于调用 `__iter__` 和 `__next__` 方法。例如，我们可以手动从一个列表创建迭代器并获取下一个元素：\n\
    \n```python\nnumbers = [1, 2, 3, 4, 5]\nit = iter(numbers) # 从列表获取一个迭代器\nprint(next(it))\
    \ # 获取第一个元素\nprint(next(it)) # 获取第二个元素\nprint(next(it)) # 获取第三个元素\n```\n\n输出结果为：\n\
    \n```\n1\n2\n3\n```\n\n如果我们再次调用 `next`，我们将获得第四个元素，依此类推，直到耗尽迭代器并引发 `StopIteration`\
    \ 异常：\n\n```python\nprint(next(it)) # 获取第四个元素\nprint(next(it)) # 获取第五个元素\nprint(next(it))\
    \ # 获取第六个元素\n```\n\n输出结果为：\n\n```\n4\n5\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nStopIteration\n```\n\n这就是 `for` 循环在底层的工作方式。理解迭代协议非常重要，因为它允许我们创建自己的自定义可迭代对象和迭代器，并将它们与\
    \ `for` 循环和其他迭代工具一起使用。\n\n## 文件迭代器\n\nPython 中可迭代对象和迭代器最常见的例子之一就是文件。当我们以文本模式打开一个文件时，会得到一个支持迭代协议的文件对象。我们可以使用\
    \ `for` 循环来遍历文件的行，或者使用 `iter` 和 `next` 函数手动获取行。例如，假设我们有一个名为 `data.txt` 的文件，包含以下文本：\n\
    \n```\nHello\nWorld\nPython\nis\nawesome\n```\n\n我们可以打开文件并使用 `for` 循环遍历其行：\n\n\
    ```python\nf = open('data.txt') # 以文本模式打开文件\nfor line in f: # 遍历各行\n    print(line)\
    \ # 打印每一行\nf.close() # 关闭文件\n```\n\n输出结果为：\n\n```\nHello\nWorld\nPython\nis\n\
    awesome\n```\n\n请注意，每行末尾都有一个换行符（`\\n`），这就是为什么我们在输出中看到空行。我们可以使用 `strip` 方法来移除行中的换行符和其他空白字符：\n\
    \n```python\nf = open('data.txt') # 以文本模式打开文件\nfor line in f: # 遍历各行\n    print(line.strip())\
    \ # 打印每一行，不含空白字符\nf.close() # 关闭文件\n```\n\n输出结果为：\n\n```\nHello\nWorld\nPython\n\
    is\nawesome\n```\n\n或者，我们可以使用 `iter` 和 `next` 函数手动获取行：\n\n```python\nf = open('data.txt')\
    \ # 以文本模式打开文件\nit = iter(f) # 从文件对象获取一个迭代器\nprint(next(it).strip()) # 获取第一行，不含空白字符\n\
    print(next(it).strip()) # 获取第二行，不含空白字符\nprint(next(it).strip()) # 获取第三行，不含空白字符\n\
    f.close() # 关闭文件\n```\n\n输出结果为：\n\n```\nHello\nWorld\nPython\n```\n\n如果我们再次调用\
    \ `next`，我们将获得第四行，依此类推，直到到达文件末尾并引发 `StopIteration` 异常：\n\n```python\nprint(next(it).strip())\
    \ # 获取第四行，不含空白字符\nprint(next(it).strip()) # 获取第五行，不含空白字符\nprint(next(it).strip())\
    \ # 获取第六行，不含空白字符\n```\n\n输出结果为：\n\n```\nis\nawesome\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 1, in <module>\nStopIteration\n```\n\n文件对象是多次遍历迭代器的例子，这意味着我们可以多次遍历它们。但是，在再次遍历之前，我们需要使用\
    \ `seek` 方法将文件指针重置到文件开头。例如，我们可以使用 `for` 循环遍历文件两次：\n\n```python\nf = open('data.txt')\
    \ # 以文本模式打开文件\nfor line in f: # 第一次遍历各行\n    print(line.strip()) # 打印每一行，不含空白字符\n\
    f.seek(0) # 将文件指针重置到开头\nfor line in f: # 第二次遍历各行\n    print(line.strip()) # 打印每一行，不含空白字符\n\
    f.close() # 关闭文件\n```\n\n# 定义一个除法函数\ndef divide(x, y):\n    # 尝试执行除法\n    try:\n\
    \        # 返回商\n        return x / y\n    # 处理 y 为零的异常\n    except ZeroDivisionError:\n\
    \        # 打印错误信息\n        print(\"Cannot divide by zero\")\n    # 如果没有异常发生，则执行此块\n\
    \    else:\n        # 打印成功信息\n        print(\"Division successful\")\n    # 无论是否发生异常，都执行此块\n\
    \    finally:\n        # 打印最终信息\n        print(\"End of function\")\n\n# 使用有效参数调用函数\n\
    divide(10, 2)\n# 输出: Division successful\n# 输出: End of function\n# 返回: 5.0\n\n\
    # 使用无效参数调用函数\ndivide(10, 0)\n# 输出: Cannot divide by zero\n# 输出: End of function\n\
    # 返回: None\n\n在这个例子中，`divide` 函数尝试执行两个数的除法，并在第二个参数为零时处理 `ZeroDivisionError` 异常。如果没有异常发生，`else`\
    \ 块会执行；无论是否发生异常，`finally` 块都会执行。\n\n你也可以使用 `raise` 关键字来创建自己的异常。你可以使用内置异常类，例如 `ValueError`、`TypeError`、`RuntimeError`\
    \ 等，或者通过继承 `Exception` 类来定义自己的自定义异常类。你还可以向异常类传递一个消息，以提供关于错误的更多信息。例如：\n\n```python\n\
    # 定义一个自定义异常类\nclass NegativeNumberError(Exception):\n    # 使用消息初始化类\n    def __init__(self,\
    \ message):\n        # 使用消息调用父类构造函数\n        super().__init__(message)\n```\n\n\
    ```python\n# 定义一个计算数字平方根的函数\ndef sqrt(x):\n    # 检查参数是否为负数\n    if x < 0:\n  \
    \      # 引发自定义异常\n        raise NegativeNumberError(\"Cannot take the square root\
    \ of a negative number\")\n    # 返回平方根\n    return x ** 0.5\n```\n\n```python\n\
    # 使用有效参数调用函数\nprint(sqrt(9))\n# 输出: 3.0\n```\n\n```python\n# 使用无效参数调用函数\nprint(sqrt(-9))\n\
    # 输出: NegativeNumberError: Cannot take the square root of a negative number\n\
    ```\n\n在这个例子中，`sqrt` 函数计算一个数字的平方根，并在参数为负数时引发自定义异常。自定义异常类继承自 `Exception` 类，并接受一个消息作为参数。`raise`\
    \ 关键字创建异常类的一个实例并将消息传递给它。\n\n断言是一个检查条件是否为真的语句，如果为假则引发 `AssertionError` 异常。断言用于验证代码的正确性，并捕获\
    \ bug 和逻辑错误。你可以使用 `assert` 关键字来创建一个断言，后跟一个条件和一个可选的消息。例如：\n\n```python\n# 定义一个计算数字阶乘的函数\n\
    def factorial(n):\n    # 检查参数是否为正整数\n    assert isinstance(n, int) and n >= 0,\
    \ \"n must be a non-negative integer\"\n    # 初始化结果\n    result = 1\n    # 从 1\
    \ 循环到 n\n    for i in range(1, n + 1):\n        # 将结果乘以 i\n        result *= i\n\
    \    # 返回结果\n    return result\n\n# 使用有效参数调用函数\nprint(factorial(5))\n# 输出: 120\n\
    \n# 使用无效参数调用函数\nprint(factorial(-5))\n# 输出: AssertionError: n must be a non-negative\
    \ integer\n```\n\n在这个例子中，`factorial` 函数计算一个数字的阶乘，并使用断言来检查参数是否为正整数。`assert` 关键字接受一个条件和一个可选的消息，如果条件为假则引发\
    \ `AssertionError` 异常。断言有助于捕获无效参数并防止意外结果。"
