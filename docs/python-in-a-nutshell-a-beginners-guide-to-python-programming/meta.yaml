    # Recursion and Memoization


    Recursion is a technique that allows a function to call itself, either directly
    or indirectly, to solve a smaller or simpler version of the same problem. Recursion
    is useful for solving problems that have a recursive structure, such as fractals,
    trees, graphs, etc. Recursion is also a core concept of functional programming,
    a paradigm that focuses on pure functions and immutable data.


    To create a recursive function in Python, you need to follow two steps:


    +   - Define a base case, which is the simplest or smallest version of the problem
    that can be solved directly, without recursion. The base case usually involves
    a return statement that returns a value or terminates the function.'
