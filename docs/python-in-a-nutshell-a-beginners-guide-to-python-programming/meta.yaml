    如你所见，`collections.OrderedDict` 类会保留元素的顺序，无论键或值如何更改。


    `collections.OrderedDict` 类还提供了一些特定于有序字典的额外方法和属性。其中一些是：


    `popitem()` 方法，它接受一个可选的布尔参数，指定是从字典中弹出最后一个元素（`True`，默认值）还是第一个元素（`False`）。例如：


    ```python

    # 导入 collections 模块

