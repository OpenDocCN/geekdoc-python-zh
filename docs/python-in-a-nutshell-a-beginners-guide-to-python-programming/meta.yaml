    ## 语句与语法


    语句是指执行一个动作或产生一个效果的代码单元。例如，赋值语句将一个值赋给变量，打印语句将一个值显示到标准输出。


    x = 3 # 将 3 赋值给名为 x 的变量

    print(x) # 打印存储在名为 x 的变量中的值


    Python 语法是定义如何在 Python 中编写和组织语句的规则集合。Python 语法基于缩进、空白字符和标点符号。与一些其他语言不同，Python
    不使用花括号或关键字来分隔代码块。相反，Python 使用缩进来表示代码块的范围。代码块是一组作为单元一起执行的语句。例如，函数体、循环或 if 语句的主体就是一个代码块。


    Python 还使用空白字符和标点符号来分隔标记，标记是 Python 代码的基本单元，例如关键字、标识符、字面量和运算符。


    例如，Python 使用空格或制表符来分隔同一行上的标记，并使用换行符来结束语句。


    Python 还使用圆括号、方括号和花括号来分组标记，并使用冒号、逗号和分号来分隔标记。


    ## 为什么使用缩进语法？


    Python 使用缩进来表示代码块的范围，而不是使用花括号或关键字。这是一个设计选择，有其优点和缺点，例如：


    优点：


    -   缩进语法使代码更具可读性、一致性和优雅性，因为它避免了用额外的符号使代码杂乱，并强制执行统一的风格。

    -   缩进语法使代码更简洁，因为它减少了编写代码块所需的行数和字符数。

    -   缩进语法使代码更不易出错，因为它防止了一些常见错误，例如忘记关闭花括号或放错分号的位置。


    缺点：


    -   缩进语法可能会让一些程序员感到困惑或沮丧，尤其是那些习惯于使用花括号或关键字的其他语言的程序员。

    -   缩进语法可能对空白字符错误敏感，例如混合使用空格和制表符，或使用不一致的缩进级别，这可能导致语法错误或意外行为。

    -   缩进语法可能难以编辑或调试，因为它需要仔细注意代码的对齐和间距。


    ## 表达式与语句


    表达式是值、变量、运算符和函数的组合，它会计算出一个单一的值。例如，`2 + 3` 是一个计算结果为 `5` 的表达式，`len("Hello")` 是一个计算结果为
    `5` 的表达式。


    语句可以包含一个或多个表达式，但并非每个表达式都可以是语句。例如，`2 + 3` 是一个有效的表达式，但不是一个有效的语句，因为它不执行任何动作或产生任何效果。然而，`print(2
    + 3)` 是一个有效的语句，因为它将表达式的值显示到标准输出。Python 有几种类型的语句，允许你控制流程和逻辑。


    ## 表达式语句


    表达式语句计算一个表达式并将结果显示到标准输出。例如，`print(x)` 计算表达式 `x` 并将其值显示到标准输出。


    某些表达式可以导致对其操作对象的就地更改，例如列表、字典、集合以及具有修改其状态的方法的对象。例如，列表对象的 `append()` 方法向列表末尾添加一个元素，字典对象的
    `pop()` 方法从字典中移除并返回一个键值对。这些表达式不返回新对象，而是修改现有对象。因此，将它们用作表达式语句可能会对程序产生副作用。


    例如，以下表达式语句导致对列表 `x` 和字典 `y` 的就地更改：


    x = [1, 2, 3] # 一个列表对象

    x.append(4) # 一个修改 x 的表达式语句

    print(x) # 打印 [1, 2, 3, 4]

    y = {"a": 1, "b": 2, "c": 3} # 一个字典对象

    y.pop("b") # 一个修改 y 的表达式语句

    print(y) # 打印 {"a": 1, "c": 3}


    ## 赋值语句与语法


    赋值语句用于将一个值赋给一个变量。变量是引用内存中对象的名称。在 Python 中，变量不必显式声明，其数据类型可以根据赋值的值动态更改。


    赋值语句的语法是：


    variable = expression


    其中 `variable` 是变量的名称，`expression` 是任何计算出一个值的有效 Python 表达式。`=` 运算符将表达式的值赋给变量。


    例如：


    x = 10 # 将整数值 10 赋给 x

    y = "Hello" # 将字符串值 "Hello" 赋给 y

    z = x + 5 # 将表达式 x + 5 的结果赋给 z


    Python 还支持多重赋值，可以同时为多个变量赋值。多重赋值的语法是：


    variable1, variable2, ..., variableN = expression1, expression2, ..., expressionN


    其中 `variable1`, `variable2`, ..., `variableN` 是变量的名称，`expression1`, `expression2`,
    ..., `expressionN` 是计算出值的相应表达式。变量和表达式的数量必须匹配，并且值从左到右依次赋值。


    例如：


    x, y, z = 1, 2, 3 # 将 1 赋给 x，2 赋给 y，3 赋给 z

    a, b = b, a # 交换 a 和 b 的值


    ## if 语句与语法


    if 语句用于根据条件控制执行流程。条件是一个计算结果为 `True` 或 `False` 的布尔表达式。如果条件为 `True`，if 语句执行一个代码块，并且可以选择在条件为
    `False` 时执行另一个代码块。


