    # 输出: 1.0\n```\n\n你还可以使用注解来提供有关函数参数和返回值的附加信息。注解是在运行时求值的表达式，Python 不会强制执行它们。它们主要用于文档或类型检查目的。要向函数添加注解，你需要在参数名后使用冒号（`:`），后跟注解表达式。你还需要在参数列表后使用箭头（`->`），后跟返回值的注解表达式。例如：\n\
    \n```python\n# 定义一个带有注解的、将两个数相加的函数\ndef add(a: int, b: int) -> int:\n    \"\"\"\
    返回 a 和 b 的和\"\"\"\n    return a + b\n\n# 打印函数的注解\nprint(add.__annotations__)\n\
    # 输出: {'a': <class 'int'>, 'b': <class 'int'>, 'return': <class 'int'>}\n```\n\
    \n正如你所见，你可以使用注解来指定函数参数和返回值的预期类型。但是，Python 不会强制执行这些类型，你仍然可以向函数传递不同类型的参数。\n\n注解只是向函数用户传达你的意图和期望的一种方式。你也可以使用其他表达式作为注解，例如字符串、列表、字典等。例如：\n\
    \n```python\n# 定义一个带有注解的、将两个数相加的函数\ndef add(a: \"第一个数\", b: \"第二个数\") -> \"和\"\
    :\n    \"\"\"返回 a 和 b 的和\"\"\"\n    return a + b\n\n# 打印函数的注解\nprint(add.__annotations__)\n\
    # 输出: {'a': '第一个数', 'b': '第二个数', 'return': '和'}\n```\n\n正如你所见，你可以使用注解来提供有关函数参数和返回值的任何信息。\n\
    \n## Lambda 函数\n\nLambda 函数是使用 `lambda` 关键字定义的匿名函数。它们也被称为 lambda 表达式或 lambda 形式。Lambda\
    \ 函数对于创建可以传递给其他函数或在表达式中使用的简单函数非常有用。它们也是函数式编程的核心概念，函数式编程是一种专注于纯函数和不可变数据的范式。\n\n\
    Lambda 函数的语法是：\n\n```\nlambda 参数: 表达式\n```\n\n`lambda` 关键字后跟一个或多个参数，用逗号分隔。参数是可选的，你可以定义一个没有参数的\
    \ lambda 函数。参数之后是一个冒号（`:`），后跟一个表达式。表达式是 lambda 函数的主体，它只能有一行代码。当调用 lambda 函数时，表达式会被求值并返回。\n\
    \n这是一个返回数字平方的 lambda 函数示例：\n\n```python\n# 定义一个返回数字平方的 lambda 函数\nsquare = lambda\
    \ x: x ** 2\n\n# 调用 lambda 函数\nprint(square(3))\n# 输出: 9\n```\n\n在这个例子中，lambda\
    \ 函数被赋值给一个名为 `square` 的变量。这不是必需的，但它使得以后更容易调用 lambda 函数。lambda 函数接受一个参数 `x`，并返回\
    \ `x ** 2`，即 `x` 的平方。要调用 lambda 函数，你使用变量名后跟一对括号，并在括号内传递参数。在这个例子中，参数是 `3`，lambda\
    \ 函数返回 `9`。\n\n你还可以定义一个具有多个参数的 lambda 函数，并在表达式中使用它们。例如：\n\n```python\n# 定义一个返回两个数之和的\
    \ lambda 函数\nadd = lambda a, b: a + b\n\n# 调用 lambda 函数\nprint(add(2, 3))\n# 输出:\
    \ 5\n```\n\n在这个例子中，lambda 函数接受两个参数 `a` 和 `b`，并返回 `a + b`，即 `a` 和 `b` 的和。要调用 lambda\
    \ 函数，你传递两个参数 `2` 和 `3`，lambda 函数返回 `5`。\n\n你也可以在不将 lambda 函数赋值给变量的情况下使用它，并直接调用它。例如：\n\
    \n```python\n# 定义并调用一个返回两个数乘积的 lambda 函数\nprint((lambda x, y: x * y)(4, 5))\n\
    # 输出: 20\n```\n\n在这个例子中，lambda 函数在同一行中被定义和调用。lambda 函数接受两个参数 `x` 和 `y`，并返回 `x\
    \ * y`，即 `x` 和 `y` 的乘积。要调用 lambda 函数，你将其括在括号内，并在另一对括号内传递参数。在这个例子中，参数是 `4` 和 `5`，lambda\
    \ 函数返回 `20`。\n\n正如你所见，lambda 函数是创建可以在各种情况下使用的简单匿名函数的便捷方式。\n\n## Lambda 函数与内置函数\n\
    \nLambda 函数最常见的用例之一是将它们与一些接受其他函数作为参数的内置函数一起使用。这些函数通常与函数式编程相关，函数式编程是一种专注于纯函数和不可变数据的范式。一些与\
    \ lambda 函数配合使用的最有用的内置函数是：\n\n- `map`：此函数将给定的函数应用于可迭代对象的每个元素，并返回一个包含结果的新可迭代对象。例如：\n\
    \n```python\n# 定义一个数字列表\nnumbers = [1, 2, 3, 4, 5]\n\n# 使用 map 和 lambda 函数对每个数字求平方\n\
    squares = map(lambda x: x ** 2, numbers)\n```"
