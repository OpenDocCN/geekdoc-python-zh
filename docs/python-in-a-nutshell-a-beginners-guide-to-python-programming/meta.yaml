- md: "## Exceptions and Assertions\n\nExceptions and assertions are two concepts\
    \ that allow you to handle and prevent errors and bugs in your Python code. Exceptions\
    \ and assertions are useful for debugging, testing, and validating your code,\
    \ and for creating robust and reliable programs.\n\nAn exception is an event that\
    \ occurs when something goes wrong in your code, such as a syntax error, a division\
    \ by zero, a file not found, etc. When an exception occurs, Python stops the normal\
    \ execution of the program and jumps to the nearest exception handler, which is\
    \ a block of code that can deal with the error. If there is no exception handler,\
    \ the program terminates and displays an error message.\n\nYou can use the try\
    \ and except keywords to create an exception handler. The try block contains the\
    \ code that may raise an exception, and the except block contains the code that\
    \ handles the exception. You can also use the else and finally keywords to add\
    \ optional blocks that execute after the try block, depending on whether an exception\
    \ occurred or not. For example:\n\nRecursion is a powerful and elegant way to\
    \ solve problems that have a recursive structure, by using a function that calls\
    \ itself. However, recursion also has some limitations and drawbacks, such as:\n\
    \n- **Stack overflow**: Recursion uses the call stack to keep track of the function\
    \ calls and their arguments. The call stack is a data structure that stores the\
    \ information about the active function calls in a last-in, first-out (LIFO) order.\
    \ Each function call creates a new stack frame, which is a section of the stack\
    \ that contains the information about the function, such as its name, parameters,\
    \ local variables, return address, etc. When a function returns, its stack frame\
    \ is popped from the stack, and the control is transferred to the previous function\
    \ call. However, the call stack has a limited size, and if the recursion is too\
    \ deep or infinite, the stack may run out of space, and cause a stack overflow\
    \ error, which terminates the program. To avoid stack overflow, you need to limit\
    \ the depth of the recursion, or use an iterative solution instead of a recursive\
    \ one.\n- **Redundant computation**: Recursion may involve repeated or redundant\
    \ computation, as the same subproblem may be solved multiple times by different\
    \ function calls. This may lead to inefficiency and waste of time and resources.\
    \ To avoid redundant computation, you need to store the results of the subproblems\
    \ in a cache or a dictionary, and reuse them when needed. This technique is called\
    \ memoization, and it can improve the performance and speed of the recursive function.\n\
    \nMemoization is a technique that allows a function to remember the results of\
    \ the previous function calls, and return them without recomputing them. Memoization\
    \ is useful for optimizing recursive functions that involve repeated or redundant\
    \ computation, as it can reduce the time and space complexity of the function.\
    \ Memoization is also a core concept of dynamic programming, a paradigm that focuses\
    \ on solving complex problems by breaking them down into overlapping subproblems,\
    \ and storing and reusing their solutions.\n\nTo implement memoization in Python,\
    \ you need to use a dictionary or a cache to store the results of the previous\
    \ function calls, and check if the result of the current function call is already\
    \ in the dictionary or the cache, and return it without recomputing it. For example:\n\
    \n```python\n# Define a dictionary to store the results of the previous function\
    \ calls\ncache = {}\n\n# Define a recursive function that calculates the factorial\
    \ of a number with memoization\ndef factorial(n):\n    # Check if n is zero or\
    \ one, which is the base case\n    if n == 0 or n == 1:\n        # Return 1, which\
    \ is the factorial of zero or one\n        return 1\n    # Check if n is already\
    \ in the cache, which means the result is already computed\n    if n in cache:\n\
    \        # Return the result from the cache, without recomputing it\n        return\
    \ cache[n]\n    # Otherwise, n is greater than one, which is the recursive case\n\
    \    else:\n        # Compute the result by calling the function recursively on\
    \ a smaller subproblem\n        result = n * factorial(n - 1)\n        # Store\
    \ the result in the cache, with n as the key and result as the value\n       \
    \ cache[n] = result\n        # Return the result\n        return result\n```\n\
    \nIn this example, the factorial function is modified to use memoization, by using\
    \ a dictionary named cache to store the results of the previous function calls.\
    \ The function checks if n is already in the cache, which means the result is\
    \ already computed, and returns it without recomputing it. Otherwise, the function\
    \ computes the result by calling the function recursively on a smaller subproblem,\
    \ and stores the result in the cache, with n as the key and result as the value.\
    \ This way, the function avoids repeated or redundant computation, and improves\
    \ its efficiency and speed.\n\nYou can also use the lru_cache decorator from the\
    \ functools module to implement memoization in Python, without using a dictionary\
    \ or a cache explicitly. The lru_cache decorator takes a function as an argument,\
    \ and returns a modified version of it that uses a cache to store the results\
    \ of the previous function calls, and implements a least recently used (LRU) eviction\
    \ policy to remove the least recently used items from the cache when it is full.\
    \ The lru_cache decorator also takes an optional argument, maxsize, which specifies\
    \ the maximum size of the cache. If maxsize is None, the cache can grow without\
    \ bound. For example:\n\n```python\n# Import the lru_cache decorator from the\
    \ functools module\nfrom functools import lru_cache\n\n# Apply the lru_cache decorator\
    \ to a recursive function that calculates the factorial of a number with memoization\n\
    @lru_cache(maxsize=None)\ndef factorial(n):\n    # Check if n is zero or one,\
    \ which is the base case\n    if n == 0 or n == 1:\n        # Return 1, which\
    \ is the factorial of zero or one\n        return 1\n    # Otherwise, n is greater\
    \ than one, which is the recursive case\n    else:\n        # Return n times the\
    \ factorial of n - 1, which is the result of applying the function recursively\
    \ on a smaller subproblem\n        return n * factorial(n - 1)\n```\n\nIn this\
    \ example, the @lru_cache(maxsize=None) syntax applies the lru_cache decorator\
    \ to the factorial function, which means that the factorial function is replaced\
    \ by a modified version of it that uses a cache to store the results of the previous\
    \ function calls, and implements a least recently used (LRU) eviction policy to\
    \ remove the least recently used items from the cache when it is full. The maxsize=None\
    \ argument specifies that the cache can grow without bound. The modified function\
    \ behaves like the original function, but with memoization.\n\nDefine a recursive\
    \ case, which is the general or larger version of the problem that can be solved\
    \ by breaking it down into smaller or simpler subproblems, and calling the function\
    \ recursively on each subproblem. The recursive case usually involves a return\
    \ statement that returns the result of combining the solutions of the subproblems.\n\
    \nHere is an example of a recursive function that calculates the factorial of\
