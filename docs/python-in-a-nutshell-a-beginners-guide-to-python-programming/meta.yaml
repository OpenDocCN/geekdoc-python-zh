    [1, 4, 9, 16, 25]

    ```


    `map` 函数接受两个参数：一个函数和一个可迭代对象。它将该函数应用于可迭代对象的每个元素，并返回一个 map 对象，这是一个惰性求值结果的迭代器。要获得列表，你需要使用
