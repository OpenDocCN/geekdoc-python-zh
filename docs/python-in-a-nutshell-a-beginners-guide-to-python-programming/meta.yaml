    code reuse and reduces duplication, and also establishes a hierarchical relationship
    between classes, where the new class is a **subclass** or **child** of the existing
    class, which is a **superclass** or **parent**.

    - **Polymorphism**: This is the principle of allowing an object to behave differently
    depending on the context, by changing its behavior at run-time. Polymorphism enables
    flexibility and diversity, and'
