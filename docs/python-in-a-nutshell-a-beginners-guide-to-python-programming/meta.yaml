    ```\n# 解包Alice的字段\nname, age, height = alice\n```\n\n```\n# 打印变量的值\nprint(name)\
    \ # Alice\nprint(age) # 25\nprint(height) # 1.65\n```\n\n### 将元组用作返回值\n\n元组的一个优点是它可以用于从函数返回多个值。当你想执行一个产生多个结果的计算时，这会很有用，例如查找列表的最小值和最大值，或求解二次方程。要从函数返回一个元组，你只需在\
    \ `return` 语句中使用逗号分隔的值列表。例如：\n\n```\n# 一个返回列表最小值和最大值的函数\ndef min_max(lst):\n \
    \   # 查找列表的最小值和最大值\n    min_value = min(lst)\n    max_value = max(lst)\n    return\
    \ (min_value, max_value)\n```\n\n## 集合\n\n集合是唯一且不可变对象的无序集合，支持与数学集合理论相对应的操作。它们对于删除重复项、测试成员资格以及执行集合并集、交集和差集等操作非常有用。\n\
    \n要创建一个集合，你可以使用花括号 `{}` 并用逗号分隔元素，或者使用内置的 `set` 函数与任何可迭代对象。\n\n例如：\n\n```\n>>>\
    \ s = {1, 2, 3}\n>>> s\n{1, 2, 3}\n>>> t = set('hello')\n>>> t\n{'h', 'e', 'l',\
    \ 'o'}\n```\n\n请注意，集合只包含唯一元素，因此任何重复项都会被丢弃。集合也是无序的，这意味着元素可能不会以它们被输入的顺序出现。\n\n冻结集合是一种特殊的集合，它是不可变的，这意味着一旦创建就无法更改。要创建一个冻结集合，你可以使用内置的\
    \ `frozenset` 函数与任何可迭代对象。\n\n例如：\n\n```\n>>> fs = frozenset([1, 2, 3])\n>>> fs\n\
