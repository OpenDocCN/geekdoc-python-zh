    ## 栈和双端队列


    栈是一种遵循后进先出（LIFO）原则的数据结构。这意味着最后添加到栈中的项目是第一个从栈中移除的项目。栈可以使用列表来实现，但使用 `collections.deque`
    对象更高效，它是 `dict` 类的一个子类，提供了一个双端队列。


    双端队列是一种允许从两端添加和移除项目的数据结构。它支持普通字典的所有方法，以及一些特定于双端队列的额外方法。其中一些是：


    - `append()` 方法，将项目添加到双端队列的右端。

    - `appendleft()` 方法，将项目添加到双端队列的左端。

    - `pop()` 方法，从双端队列的右端移除并返回一个项目。

    - `popleft()` 方法，从双端队列的左端移除并返回一个项目。

    - `extend()` 方法，将多个项目添加到双端队列的右端。

    - `extendleft()` 方法，将多个项目添加到双端队列的左端。

    - `rotate()` 方法，将双端队列按指定的步数向右或向左旋转。


    要使用双端队列实现栈，你可以使用 `append()` 和 `pop()` 方法从双端队列的右端添加和移除项目。例如：


    ```python

    # Importing the collections module

    import collections


    # Creating a deque using the deque() constructor

    my_stack = collections.deque()

    print(my_stack) # deque([])


    # Pushing items to the stack using the append() method

    my_stack.append("A")

    my_stack.append("B")

    my_stack.append("C")

    print(my_stack) # deque([''A'', ''B'', ''C''])


    # Popping items from the stack using the pop() method

    item = my_stack.pop()

    print(item) # C

    print(my_stack) # deque([''A'', ''B''])


    item = my_stack.pop()

    print(item) # B

    print(my_stack) # deque([''A''])


    item = my_stack.pop()

    print(item) # A

    print(my_stack) # deque([])

    ```


    双端队列的行为类似于栈，其中最后添加的项目是第一个被移除的项目。


    ## 字典推导式


    我们已经了解了如何使用字典推导式通过单个表达式来创建或修改字典。在本节中，我们将探讨字典推导式的更多示例和应用。字典推导式的常见用途之一是对字典的键或值应用函数或转换。例如，你可以使用字典推导式创建一个新字典，其中键或值被转换为大写、小写或首字母大写。例如：


    ```python

    # Creating a dictionary

    my_dict = {"name": "Alice", "age": 25, "occupation": "programmer"}


    # Creating a new dictionary with the keys converted to uppercase

    new_dict = {k.upper(): v for k, v in my_dict.items()}

    print(new_dict) # {''NAME'': ''Alice'', ''AGE'': 25, ''OCCUPATION'': ''programmer''}


    # Creating a new dictionary with the values converted to lowercase

    new_dict = {k: v.lower() for k, v in my_dict.items()}

    print(new_dict) # {''name'': ''alice'', ''age'': ''25'', ''occupation'': ''programmer''}


    # Creating a new dictionary with the values converted to title case

    new_dict = {k: v.title() for k, v in my_dict.items()}

    print(new_dict) # {''name'': ''Alice'', ''age'': ''25'', ''occupation'': ''Programmer''}

    ```


    你可以使用字典推导式创建一个新字典，其中键或值被转换为大写、小写或首字母大写，分别使用 `upper()`、`lower()` 或 `title()` 方法。


    你也可以使用字典推导式创建一个新字典，其中键或值被映射到另一个值，例如数字、布尔值或其他对象。例如，你可以使用字典推导式创建一个新字典，其中键或值被映射到它们的长度、类型或哈希值。例如：


    ```python

    # Creating a dictionary

    my_dict = {"name": "Alice", "age": 25, "occupation": "programmer"}


    # Creating a new dictionary with the keys mapped to their lengths

    new_dict = {k: len(k) for k in my_dict}

    print(new_dict) # {''name'': 4, ''age'': 3, ''occupation'': 10}


    # Creating a new dictionary with the values mapped to their types

    new_dict = {k: type(v) for k, v in my_dict.items()}

    print(new_dict) # {''name'': <class ''str''>, ''age'': <class ''int''>, ''occupation'':
    <class ''str''>}


    # Creating a new dictionary with the values mapped to their hash values

    new_dict = {k: hash(v) for k, v in my_dict.items()}

    print(new_dict) # {''name'': -7847182419539750808, ''age'': 25, ''occupation'':
