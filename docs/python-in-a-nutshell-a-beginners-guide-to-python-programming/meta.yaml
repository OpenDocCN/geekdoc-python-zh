    ## Stack and Deque


    A stack is a data structure that follows the last-in, first-out (LIFO) principle.
    This means that the last item that is added to the stack is the first item that
    is removed from the stack. A stack can be implemented using a list, but it is
    more efficient to use a `collections.deque` object, which is a subclass of the
    `dict` class that provides a double-ended queue.


    A deque is a data structure that allows adding and removing items from both ends.
    It supports all the methods of a regular dictionary, as well as some additional
    methods that are specific to deques. Some of them are:


    - The `append()` method, which adds an item to the right end of the deque.

    - The `appendleft()` method, which adds an item to the left end of the deque.

    - The `pop()` method, which removes and returns an item from the right end of
    the deque.

    - The `popleft()` method, which removes and returns an item from the left end
    of the deque.

    - The `extend()` method, which adds multiple items to the right end of the deque.

    - The `extendleft()` method, which adds multiple items to the left end of the
    deque.

    - The `rotate()` method, which rotates the deque by a specified number of steps
    to the right or to the left.


    To implement a stack using a deque, you can use the `append()` and `pop()` methods
    to add and remove items from the right end of the deque. For example:


    ```python

    # Importing the collections module

    import collections


    # Creating a deque using the deque() constructor

    my_stack = collections.deque()

    print(my_stack) # deque([])


    # Pushing items to the stack using the append() method

    my_stack.append("A")

    my_stack.append("B")

    my_stack.append("C")

    print(my_stack) # deque([''A'', ''B'', ''C''])


    # Popping items from the stack using the pop() method

    item = my_stack.pop()

    print(item) # C

    print(my_stack) # deque([''A'', ''B''])


    item = my_stack.pop()

    print(item) # B

    print(my_stack) # deque([''A''])


    item = my_stack.pop()

    print(item) # A

    print(my_stack) # deque([])

    ```


    Deque behaves like a stack, where the last item that is added is the first item
    that is removed.


    ## dict Comprehensions


    We have already seen how to use dictionary comprehensions to create or modify
    dictionaries using a single expression. In this section, we will explore some
    more examples and applications of dictionary comprehensions. One of the common
    uses of dictionary comprehensions is to apply a function or a transformation to
    the keys or values of a dictionary. For example, you can use a dictionary comprehension
    to create a new dictionary with the keys or values converted to uppercase, lowercase,
    or title case. For example:


    ```python

    # Creating a dictionary

    my_dict = {"name": "Alice", "age": 25, "occupation": "programmer"}


    # Creating a new dictionary with the keys converted to uppercase

    new_dict = {k.upper(): v for k, v in my_dict.items()}

    print(new_dict) # {''NAME'': ''Alice'', ''AGE'': 25, ''OCCUPATION'': ''programmer''}


    # Creating a new dictionary with the values converted to lowercase

    new_dict = {k: v.lower() for k, v in my_dict.items()}

    print(new_dict) # {''name'': ''alice'', ''age'': ''25'', ''occupation'': ''programmer''}


    # Creating a new dictionary with the values converted to title case

    new_dict = {k: v.title() for k, v in my_dict.items()}

    print(new_dict) # {''name'': ''Alice'', ''age'': ''25'', ''occupation'': ''Programmer''}

    ```


    You can use a dictionary comprehension to create a new dictionary with the keys
    or values converted to uppercase, lowercase, or title case, by using the `upper()`,
    `lower()`, or `title()` methods, respectively.


    You can also use a dictionary comprehension to create a new dictionary with the
    keys or values mapped to another value, such as a number, a boolean, or another
    object. For example, you can use a dictionary comprehension to create a new dictionary
    with the keys or values mapped to their lengths, types, or hash values. For example:


    ```python

    # Creating a dictionary

    my_dict = {"name": "Alice", "age": 25, "occupation": "programmer"}


    # Creating a new dictionary with the keys mapped to their lengths

    new_dict = {k: len(k) for k in my_dict}

    print(new_dict) # {''name'': 4, ''age'': 3, ''occupation'': 10}


    # Creating a new dictionary with the values mapped to their types

    new_dict = {k: type(v) for k, v in my_dict.items()}

    print(new_dict) # {''name'': <class ''str''>, ''age'': <class ''int''>, ''occupation'':
    <class ''str''>}


    # Creating a new dictionary with the values mapped to their hash values

    new_dict = {k: hash(v) for k, v in my_dict.items()}

    print(new_dict) # {''name'': -7847182419539750808, ''age'': 25, ''occupation'':
    -9192079115573515246}

    ```


    You can use a dictionary comprehension to create a new dictionary with the keys
    or values mapped to their lengths, types, or hash values, by using the `len()`,
    `type()`, or `hash()` functions, respectively.


    ## Handling Missing Keys with setdefault


    We have already seen how to use the `setdefault()` method to set a default value
    for a key that does not exist in the dictionary. In this section, we will explore
    some more examples and applications of the `setdefault()` method.


    One of the common uses of the `setdefault()` method is to create a dictionary
    that maps keys to lists, and append values to the lists without checking if the
    key exists. For example, you can use the `setdefault()` method to create a dictionary
    that stores the grades of students in different courses. For example:


    ```python

    # Creating an empty dictionary

    grades = {}


    # Appending values to the lists using setdefault()

    grades.setdefault("Math", []).append(90)

    grades.setdefault("Math", []).append(85)

    grades.setdefault("English", []).append(95)

    grades.setdefault("English", []).append(80)


    # Printing the dictionary

    print(grades) # {''Math'': [90, 85], ''English'': [95, 80]}

    ```'
