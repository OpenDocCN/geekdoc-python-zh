    # Argument Matching Basics


    When you call a function, you need to pass the right number and type of arguments
    to the function. Otherwise, you will get an error. There are different ways to
    match arguments to parameters in Python, such as:


    +   - **Positional arguments**: These are the arguments that are passed in the
    same order as the parameters in the function definition. For example, if you define
    a function as `def add(a, b):`, then you need to call it as `add(1, 2)`, where
    `1` is assigned to `a` and `2` is assigned to `b`.

    - **Keyword arguments**: These are the arguments that are passed by using the
    name of the parameters in the function definition. For example, if you define
    a function as `def add(a, b):`, then you can call it as `add(a=1, b=2)` or `add(b=2,
    a=1)`, where the order does not matter as long as the names are correct.

    - **Default arguments**: These are the arguments that have a default value assigned
    to them in the function definition. For example, if you define a function as `def
    add(a, b=0):`, then you can call it as `add(1)`, where `b` will take the default
    value of `0`. You can also override the default value by passing a different value
    as a positional or keyword argument.'
