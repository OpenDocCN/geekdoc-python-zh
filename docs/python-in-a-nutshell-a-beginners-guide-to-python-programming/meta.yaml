- md: "## Loop Coding Techniques\n\nThere are some techniques that can help you write\
    \ more efficient and elegant for loops in Python. Some of them are:\n\n- Use the\
    \ break statement to exit the loop prematurely when a certain condition is met.\n\
    - Use the continue statement to skip the current iteration and move on to the\
    \ next one.\n- Use the else clause to execute a block of code after the loop is\
    \ finished, unless it was terminated by a break statement.\n- Use the enumerate\
    \ function to get the index and the item of the iterable at the same time.\n-\
    \ Use list comprehensions to create a new list from an existing iterable in a\
    \ concise way.\n\n## Counter Loops\n\nOne of the most common types of for loops\
    \ is a counter loop, where you want to repeat a block of code for a specific number\
    \ of times. To create a counter loop, you can use the range function, which returns\
    \ a sequence of numbers from a start value to an end value, with an optional step\
    \ size. The syntax of the range function is:\n\n```\nrange(start, stop, step)\n\
    ```\n\nHere, start is the first number in the sequence, stop is the last number\
    \ (not included), and step is the difference between two consecutive numbers.\
    \ If start is omitted, it defaults to 0. If step is omitted, it defaults to 1.\
    \ For example:\n\nCreate a sequence of numbers from 0 to 9:\n\n```\nrange(10)\n\
    ```\n\nCreate a sequence of numbers from 5 to 15:\n\n```\nrange(5, 16)\n```\n\n\
    Create a sequence of even numbers from 2 to 10:\n\n```\nrange(2, 12, 2)\n```\n\
    \nYou can use a range object as the iterable in a for loop to create a counter\
    \ loop. For example:\n\nPrint the numbers from 1 to 10:\n\n```\nfor i in range(1,\
    \ 11):\n    print(i)\n```\n\nPrint the squares of the numbers from 1 to 10:\n\n\
    ```\nfor i in range(1, 11):\n    print(i ** 2)\n```\n\nPrint the countdown from\
    \ 10 to 0:\n\n```\nfor i in range(10, -1, -1):\n    print(i)\n```\n\n## Sequence\
    \ Scans\n\nAnother common type of for loop is a sequence scan, where you want\
    \ to iterate over each item in a sequence, such as a list, a tuple, or a string.\
    \ To create a sequence scan, you can use a for loop with the sequence as the iterable.\
    \ For example:\n\nPrint the elements of a list:\n\n```\nfruits = [\"apple\", \"\
    banana\", \"cherry\"]\nfor fruit in fruits:\n    print(fruit)\n```\n\nPrint the\
    \ characters of a string:\n\n```\nword = \"python\"\nfor char in word:\n    print(char)\n\
    ```\n\nAlternatively, you can also use a while loop with a counter variable and\
    \ an index to access the items of the sequence. For example:\n\nPrint the elements\
    \ of a list using a while loop:\n\n```\nfruits = [\"apple\", \"banana\", \"cherry\"\
    ]\ni = 0 # counter variable\nwhile i < len(fruits): # loop condition\n    print(fruits[i])\
    \ # access the item by index\n    i += 1 # increment the counter\n```\n\nPrint\
    \ the characters of a string using a while loop:\n\n```\nword = \"python\"\ni\
    \ = 0 # counter variable\nwhile i < len(word): # loop condition\n    print(word[i])\
    \ # access the character by index\n    i += 1 # increment the counter\n```\n\n\
    However, using a for loop is more concise and readable than using a while loop\
    \ for sequence scans. A for loop also avoids the risk of infinite loops or index\
    \ errors that may occur with a while loop.\n\nAnother way to create a sequence\
    \ scan is to use a for loop with a range object and an index to access the items\
    \ of the sequence. For example:\n\nPrint the elements of a list using a for loop\
    \ and a range object:\n\n```\nfruits = [\"apple\", \"banana\", \"cherry\"]\nfor\
    \ i in range(len(fruits)): # loop over the range of the length of the list\n \
    \   print(fruits[i]) # access the item by index\n```\n\nPrint the characters of\
    \ a string using a for loop and a range object:\n\n```\nword = \"python\"\nfor\
    \ i in range(len(word)): # loop over the range of the length of the string\n \
    \   print(word[i]) # access the character by index\n```\n\nThis method is useful\
    \ when you need to modify the items of the sequence inside the loop. However,\
    \ it is less elegant and efficient than using a for loop with the sequence itself\
    \ as the iterable. A better way to modify the items of a sequence is to use a\
    \ list comprehension, which will be discussed later.\n\n## Sequence Shufflers\n\
    \nSometimes, you may want to iterate over a sequence in a different order than\
    \ the original one, such as in reverse, randomly, or sorted. To create a sequence\
    \ shuffler, you can use a for loop with a range object and an index to access\
    \ the items of the sequence in the desired order. For example:\n\nPrint the elements\
    \ of a list in reverse order:\n\n```\nfruits = [\"apple\", \"banana\", \"cherry\"\
    ]\nfor i in range(len(fruits) - 1, -1, -1): # loop over the range of the length\
    \ of the list in reverse\n    print(fruits[i]) # access the item by index\n```\n\
    \nPrint the elements of a list in random order:\n\n```\nimport random # import\
    \ the random module\nfruits = [\"apple\", \"banana\", \"cherry\"]\nfor i in range(len(fruits)):\
    \ # loop over the range of the length of the list\n    j = random.randint(0, len(fruits)\
    \ - 1) # generate a random index\n    print(fruits[j]) # access the item by index\n\
    ```\n\nPrint the elements of a list in sorted order:\n\n```\nfruits = [\"apple\"\
    , \"banana\", \"cherry\"]\nfor fruit in sorted(fruits): # loop over the sorted\
    \ list\n    print(fruit) # print the item\n```\n\nNote that these methods do not\
    \ change the original sequence, but only print the items in a different order.\
    \ If you want to create a new sequence with a different order, you can use a list\
    \ comprehension, which will be discussed later.\n\n## Range vs Slices\n\nSometimes,\
    \ you may want to iterate over only a part of a sequence, such as the first few\
    \ items, the last few items, or every other item. To create a nonexhaustive traversal,\
    \ you can use a for loop with a range object and an index to access the items\
    \ of the sequence in the desired range. For example:\n\nPrint the first three\
    \ elements of a list:\n\n```\nfruits = [\"apple\", \"banana\", \"cherry\", \"\
    date\", \"elderberry\"]\nfor i in range(3): # loop over the range of 0 to 2\n\
    \    print(fruits[i]) # access the item by index\n```\n\nPrint the last three\
    \ elements of a list:\n\n```\nfruits = [\"apple\", \"banana\", \"cherry\", \"\
    date\", \"elderberry\"]\nfor i in range(len(fruits) - 3, len(fruits)): # loop\
    \ over the range of the length of the list minus 3 to the length of the list\n\
    \    print(fruits[i]) # access the item by index\n```\n\nPrint every other element\
    \ of a list:\n\n```\nfruits = [\"apple\", \"banana\", \"cherry\", \"date\", \"\
    elderberry\"]\nfor i in range(0, len(fruits), 2): # loop over the range of 0 to\
    \ the length of the list with a step of 2\n    print(fruits[i]) # access the item\
    \ by index\n```\n\nAlternatively, you can also use a for loop with a slice object\
    \ to access the items of the sequence in the desired range. A slice object is\
    \ a way of\n\n## Exercises\n\nHere are some exercises for you to practice your\
    \ skills on for loops in Python. Try to solve them on your own, and then check\
    \ the solutions below.\n\nWrite a for loop that prints the numbers from 1 to 20,\
    \ one per line.\n\nWrite a for loop that prints the sum of the numbers from 1\
    \ to 100.\n\nWrite a for loop that prints the prime numbers up to a given number\
    \ n.\n\n## Solutions\n\nSolution for the first exercise:\n\n```\nfor i in range(1,\
    \ 21): # loop over the range of 1 to 20\n    print(i) # print the number\n```\n\
    \nSolution for the second exercise:\n\n```\ntotal = 0 # initialize the sum\nfor\
    \ i in range(1, 101): # loop over the range of 1 to 100\n    total += i # add\
    \ the number to the sum\nprint(total) # print the sum\n```\n\nSolution for the\
    \ third exercise:\n\n```\nn = int(input(\"Enter a number: \")) # get the input\
    \ from the user\nfor i in range(2, n + 1): # loop over the range of 2 to n\n \
    \   is_prime = True # assume the number is prime\n    for j in range(2, i): #\
    \ loop over the range of 2 to i - 1\n        if i % j == 0: # check if the number\
    \ is divisible by any other number\n            is_prime = False # set the flag\
    \ to false\n            break # exit the inner loop\n    if is_prime: # if the\
    \ flag is true\n        print(i) # print the number\n```\n\n## While Loops\n\n\
    A while loop is a type of loop that repeats a block of code as long as a condition\
    \ is true. The condition is checked before each iteration of the loop, and the\
    \ loop stops when the condition becomes false.\n\nThe general format of a while\
    \ loop in Python is:\n\n```\nwhile condition:\n    # do something\n```\n\nThe\
    \ condition can be any expression that evaluates to a boolean value (True or False).\
    \ The block of code under the while statement is indented by four spaces (or a\
    \ tab) and executed repeatedly until the condition is false.\n\n### Examples of\
    \ while loops in Python\n\nA while loop that prints the numbers from 1 to 10:\n\
    \n```\nn = 1\nwhile n <= 10:\n    print(n)\n    n = n + 1\n```\n\nA while loop\
    \ that calculates the factorial of a given number:\n\n```\nn = int(input(\"Enter\
