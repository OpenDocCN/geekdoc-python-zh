  md: '# Statements and Syntax


    A statement refers to a code unit that executes an action or generates an effect.
    For example, an assignment statement assigns a value to a variable, a print statement
    displays a value to the standard output.


    ```

    x = 3 # assign 3 to variable named x

    print(x) # print the value stored in a variable named x

    ```


    Python syntax is the set of rules that defines how to write and structure statements
    in Python. Python syntax is based on indentation, white-space, and punctuation.
    Unlike some other languages, Python does not use curly braces or keywords to delimit
    blocks of code. Instead, Python uses indentation to indicate the scope of a block.
    A block is a group of statements that are executed together as a unit. For example,
    the body of a function, a loop, or an if statement is a block.


    Python also uses whitespace and punctuation to separate tokens, which are the
    basic units of Python code, such as keywords, identifiers, literals, and operators.


    For example, Python uses spaces or tabs to separate tokens on the same line, and
    a newline character to end a statement.


    Python also uses parentheses, brackets, and braces to group tokens, and colons,
    commas, and semicolons to separate tokens.


    # Why Indentation Syntax?


    Python uses indentation to indicate the scope of a block of code, instead of using
    curly braces or keywords. This is a design choice that has some advantages and
    disadvantages, such as:


    Advantages:'
  merge: -1
