    iterators store the entire sequence of items in memory, while single pass iterators
    generate the items on demand and discard them after they are consumed. This means
    that multiple pass iterators can be more memory-intensive, but also more flexible
    and reusable, while single pass iterators can be more memory-efficient, but also
    more limited and disposable.


