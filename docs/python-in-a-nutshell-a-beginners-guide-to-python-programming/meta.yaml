    +   - **Encapsulation**: This is the principle of hiding the internal details
    of an object from the outside world, and only exposing a public interface that
    defines how the object can be used. Encapsulation ensures that the object''s data
    and behavior are consistent and secure, and that the object can be easily modified
    without affecting other parts of the program.

    - **Abstraction**: This is the principle of simplifying the complexity of an object
    by providing a high-level view of its functionality, without revealing the implementation
    details. Abstraction allows the programmer to focus on the essential features
    of the object, and to use it as a black box that performs a specific task.

    - **Inheritance**: This is the principle of creating new classes from existing
