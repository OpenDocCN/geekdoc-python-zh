    \ 函数在 Python 3 中不是内置函数，你需要从 `functools` 模块中导入它。\n\n## Lambda 函数：局限性与缺点\n\nLambda\
    \ 函数对于创建可以传递给其他函数或在表达式中使用的简单、简洁的函数非常有用。然而，lambda 函数也有一些局限性和缺点，例如：\n\n- **可读性差**：Lambda\
