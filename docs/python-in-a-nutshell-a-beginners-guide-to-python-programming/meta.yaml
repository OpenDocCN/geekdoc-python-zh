    ## collections.OrderedDict


    The collections module is a built-in module that provides various specialized
    container types that extend the functionality of the standard containers. One
    of these types is the collections.OrderedDict class, which is a subclass of the
    dict class that remembers the order of the items.


    The collections.OrderedDict class behaves like a regular dictionary, but it maintains
    the insertion order of the items. This means that the items are ordered according
    to the order they were added, not by their keys or values. For example:


    ```python

    # Importing the collections module

    import collections


    # Creating an OrderedDict using the OrderedDict() constructor

    my_dict = collections.OrderedDict([("name", "Alice"), ("age", 25), ("occupation",
    "programmer")])

    print(my_dict) # OrderedDict([(''name'', ''Alice''), (''age'', 25), (''occupation'',
    ''programmer'')])


    # Adding a new item to the OrderedDict

    my_dict["hobby"] = "guitar"

    print(my_dict) # OrderedDict([(''name'', ''Alice''), (''age'', 25), (''occupation'',
    ''programmer''), (''hobby'', ''guitar'')])


    # Updating an existing item in the OrderedDict

    my_dict["age"] = 26

    print(my_dict) # OrderedDict([(''name'', ''Alice''), (''age'', 26), (''occupation'',
    ''programmer''), (''hobby'', ''guitar'')])

    ```


    As you can see, the collections.OrderedDict class preserves the order of the items,
    regardless of the key or value changes.


    The collections.OrderedDict class also provides some additional methods and attributes
    that are specific to ordered dictionaries. Some of them are:


    The popitem() method, which takes an optional boolean argument that specifies
    whether to pop the last item (True, default) or the first item (False) from the
    dictionary. For example:


    ```python

    # Importing the collections module

    import collections


    # Creating an OrderedDict using the OrderedDict() constructor

    my_dict = collections.OrderedDict([("name", "Alice"), ("age", 25), ("occupation",
    "programmer"), ("hobby", "guitar")])


    # Popping the last item from the OrderedDict (default)

    last_item = my_dict.popitem()

    print(last_item) # (''hobby'', ''guitar'')

    print(my_dict) # OrderedDict([(''name'', ''Alice''), (''age'', 25), (''occupation'',
    ''programmer'')])


    # Popping the first item from the OrderedDict

    first_item = my_dict.popitem(False)

    print(first_item) # (''name'', ''Alice'')

    print(my_dict) # OrderedDict([(''age'', 25), (''occupation'', ''programmer'')])

    ```


    As you can see, the popitem() method pops and returns an item from the dictionary,
    either the last or the first, depending on the argument.


    The move_to_end() method, which takes a key and an optional boolean argument that
    specifies whether to move the item to the end (True, default) or the beginning
    (False) of the dictionary. For example:


    ```python

    # Importing the collections module

    import collections


    # Creating an OrderedDict using the OrderedDict() constructor

    my_dict = collections.OrderedDict([("name", "Alice"), ("age", 25), ("occupation",
    "programmer"), ("hobby", "guitar")])


    # Moving the "age" item to the end of the OrderedDict (default)

    my_dict.move_to_end("age")

    print(my_dict) # OrderedDict([(''name'', ''Alice''), (''occupation'', ''programmer''),
    (''hobby'', ''guitar''), (''age'', 25)])


    # Moving the "hobby" item to the beginning of the OrderedDict

    my_dict.move_to_end("hobby", False)

    print(my_dict) # OrderedDict([(''hobby'', ''guitar''), (''name'', ''Alice''),
    (''occupation'', ''programmer''), (''age'', 25)])

    ```


    As you can see, the move_to_end() method moves an item to the end or the beginning
    of the dictionary, depending on the argument.


    The `__reversed__()` method, which returns an iterator that yields the keys of
    the dictionary in reverse order. For example:


    ```python

    # Importing the collections module

    import collections


    # Creating an OrderedDict using the OrderedDict() constructor

    my_dict = collections.OrderedDict([("name", "Alice"), ("age", 25), ("occupation",
    "programmer"), ("hobby", "guitar")])


    # Reversing the OrderedDict using the __reversed__() method

    reversed_dict = reversed(my_dict)

    print(reversed_dict) # <odict_iterator object at 0x7f9c4c0e6b80>


    # Converting the iterator to a list

    reversed_dict = list(reversed_dict)

    print(reversed_dict) # [''hobby'', ''occupation'', ''age'', ''name'']

    ```


    As you can see, the `__reversed__()` method returns an iterator that yields the
    keys of the dictionary in reverse order.


    The `__eq__()`, `__ne__()`, `__lt__()`, `__le__()`, `__gt__()`, and `__ge__()`
    methods, which compare two ordered dictionaries for equality, inequality, and
    order, respectively. These methods compare the dictionaries based on the order
    and the content of the items, not just the content. For example:


    ```python

    # Importing the collections module

    import collections


    # Creating two OrderedDicts using the OrderedDict() constructor

    dict1 = collections.OrderedDict([("name", "Alice"), ("age", 25), ("occupation",
    "programmer")])

    dict2 = collections.OrderedDict([("age", 25), ("name", "Alice"), ("occupation",
    "programmer")])


    # Comparing the two OrderedDicts for equality

    print(dict1 == dict2) # False


    # Comparing the two OrderedDicts for inequality

    print(dict1 != dict2) # True


    # Comparing the two OrderedDicts for order

    print(dict1 < dict2) # True

    print(dict1 <= dict2) # True

    print(dict1 > dict2) # False

    print(dict1 >= dict2) # False

    ```


    As you can see, the comparison methods compare the two ordered dictionaries based
    on the order and the content of the items, not just the content.


    ## collections.defaultdict


    The `collections.defaultdict` class is another subclass of the `dict` class that
    provides a default value for missing keys. It is similar to the `setdefault()`
    method, but it takes a function or a class as an argument, and calls it to create
    the default value whenever a key is not found. For example:


    ```python

    # Importing the collections module

    import collections


    # Creating a defaultdict using the defaultdict() constructor and a function as
    an argument

    my_dict = collections.defaultdict(lambda: "unknown")

    print(my_dict) # defaultdict(<function <lambda> at 0x7f9c4c0e6ca0>, {})


    # Accessing the value of a key that exists

    my_dict["name"] = "Alice"

    print(my_dict["name"]) # Alice


    # Accessing the value of a key that does not exist

    print(my_dict["age"]) # unknown


    # Printing the updated defaultdict

    print(my_dict) # defaultdict(<function <lambda> at 0x7f9c4c0e6ca0>, {''name'':
    ''Alice'', ''age'': ''unknown''})

    ```


    As you can see, the collections.defaultdict class creates a new dictionary that
    calls the function to create the default value whenever a key is not found. The
    function can be any callable object, such as a lambda expression, a built-in function,
    or a user-defined function. For example:


    ```python

    # Importing the collections module

    import collections


    # Creating a defaultdict using the defaultdict() constructor and a built-in function
    as an argument

    my_dict = collections.defaultdict(int)

    print(my_dict) # defaultdict(<class ''int''>, {})


    # Accessing the value of a key that exists

    my_dict["count"] = 10

    print(my_dict["count"]) # 10


    # Accessing the value of a key that does not exist

    print(my_dict["sum"]) # 0


    # Printing the updated defaultdict

    print(my_dict) # defaultdict(<class ''int''>, {''count'': 10, ''sum'': 0})

    ```


    As you can see, the collections.defaultdict class creates a new dictionary that
    calls the int() function to create the default value whenever a key is not found.
    The int() function returns 0 by default, which is useful for counting or summing
    operations.


