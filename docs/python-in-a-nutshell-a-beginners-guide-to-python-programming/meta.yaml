    \ that contains two modules: `addition.py` and `subtraction.py`. The directory\
    \ structure would look like this:\n\n```\ncalculator/\n    __init__.py\n    addition.py\n\
    \    subtraction.py\n```\n\nThe `addition.py` module could contain the following\
    \ code:\n\n```\n# This is a module for addition\n\ndef add(a, b):\n    # This\
    \ is a function that returns the sum of two numbers\n    return a + b\n```\n\n\
    The `subtraction.py` module could contain the following code:\n\n```\n# This is\
    \ a module for subtraction\n\ndef subtract(a, b):\n    # This is a function that\
    \ returns the difference of two numbers\n    return a - b\n```\n\nThe `__init__.py`\
    \ file could contain the following code:\n\n```\n# This is the initialization\
