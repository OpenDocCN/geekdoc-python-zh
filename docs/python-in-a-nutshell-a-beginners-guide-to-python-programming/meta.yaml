    \n### 嵌套元组解包\n\n嵌套元组解包扩展了元组解包，它允许你在单个赋值语句中处理嵌套元组。当你想处理复杂的数据结构，如嵌套列表、字典或元组时，这会很有用。要使用嵌套元组解包，你需要使用嵌套的括号来匹配嵌套元组的结构。例如：\n\
    \n```\n# 一个嵌套元组\nnested = ((1, 2), (3, 4))\n\n# 解包嵌套元组\n(a, b), (c, d) = nested\n\
    \n# 打印变量的值\nprint(a) # 1\nprint(b) # 2\nprint(c) # 3\nprint(d) # 4\n```\n\n你也可以使用嵌套元组解包从嵌套元组中提取特定项，并使用下划线\
    \ (_) 作为占位符忽略其余部分。例如：\n\n```\n# 一个嵌套元组\nnested = ((\"Alice\", 25, 1.65), (\"Bob\"\
