    # # Tuples


    Tuples are one of the basic data types in Python. They are used to store multiple
    items in a single variable, similar to lists. However, unlike lists, tuples are
    immutable, meaning that they cannot be changed once they are created. This makes
    tuples suitable for representing fixed collections of items, such as records,
    coordinates, or return values.


    # ## Creating and Accessing Tuples


    To create a tuple, you need to enclose a comma-separated sequence of items in
    parentheses. For example:


    ```

    # A tuple of three strings

    colors = ("red", "green", "blue")

    ```


    ```

    # A tuple of two integers and a float

    numbers = (1, 2, 3.0)

    ```


    ```

    # A tuple of a string, a list, and a tuple

    mixed = ("hello", [1, 2, 3], (4, 5, 6))

    ```


    You can also create a tuple with a single item by adding a trailing comma after
    the item. This is necessary to distinguish a tuple from a regular expression in
    parentheses. For example:


    ```

    # A tuple with one string

    single = ("one",)

    ```


    ```

    # Not a tuple, just a string

    not_a_tuple = ("one")

    ```'
