    # ## 6.1 Introduction


    A namespace in Python is a container for a collection of identifiers (like class
    names, variable names, function names, etc.) and the objects (like values, functions
    or classes) that go along with them. To avoid naming conflicts and improve the
    modularity and maintainability of your code, namespaces are used to arrange and
    manage the naming of variables and other objects.


    Namespaces in Python prevent the naming ambiguities and enable programmers to
    use names as they wish. One can understand the usefulness of namespace with an
    example. Assume that you created two modules, Mod1 and Mod2. Both of the modules
    may have used the same variable names. In that condition on importing both the
    modules, there comes uninvited trouble. Yes, it is a pain point.'
  merge: -1
  pgno: 78
- img_proc: true
  md: 'An example is presented below as Figure 6.1 where two namespaces are present
    yet having the same variable name – res – used inside both the namespaces. Because
    the namespace is there, there is no ambiguity, and no error has been created.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_79_0.png)


    Figure 6.1 Namespace example.


    # 6.2 Types of Namespaces


    There are several types of namespaces in Python:


    +   - Built-in namespace – The names of all the built-in Python objects, modules
    and functions are contained in this namespace. It is unnecessary to explicitly
    import these names because they are always available.

    - Global namespace – Names specified at the top level of a script or module are
    included in this namespace. This is formed upon the import of the module and persists
    until the Python application ends.'
  merge: -1
