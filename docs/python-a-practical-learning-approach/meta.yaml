  md: 'mathematical and scientific computations easy for scientists, engineers and
    researchers to accomplish. Combining NumPy and SciPy offers a flexible and strong
    toolkit for utilizing Python to tackle a variety of scientific and technical problems.


    One can install SciPy with pip install scipy command.


    An open-source Python library called SciPy expands on NumPy''s features and offers
    more functionality for a variety of technical and scientific computing applications.
    It frequently works in tandem with NumPy and other libraries to form a potent
    ecosystem for engineering and scientific applications. SciPy is quite helpful
    for tasks like signal and image processing, linear algebra, interpolation, optimization,
    integration, statistics, and more.


    Among SciPy''s main attributes and functionalities are:


    +   - Optimization: For the solution of both linear and nonlinear optimization
    problems, SciPy provides a range of optimization techniques. This helps with model
    training in domains like Machine Learning and in scientific research to identify
    the best answers to challenging issues.

    - Numerical integration functions, such as single and multiple definite integrals,
    are available in SciPy. This is useful for figuring out calculus, physics and
    engineering difficulties.

    - SciPy offers a variety of interpolation methods that are helpful for estimating
    functions from discrete data points.

    - Signal and image processing: Filtering, spectral analysis, and other signal
    processing activities are included in the package. It is appropriate for computer
    vision and image analysis because it also provides tools for working with images.

    - Linear algebra: SciPy adds functionality to NumPy''s linear algebra capabilities,
    allowing for the computation of eigenvalues and eigenvectors, the solution of
    linear equations, and a variety of matrix operations.

    - Statistical functions: SciPy has an extensive collection of statistical functions
    for probability distributions, hypothesis testing, descriptive statistics and
    other applications. It''s an important tool for testing hypotheses and performing
    statistical analysis.'
  merge: -1
  pgno: 147
- img_proc: true
  md: '+   - Special functions: The library has several special mathematical functions
    that are frequently utilized in a variety of scientific and engineering applications,
    including gamma functions and Bessel functions.

    - Sparse matrices: Working with high-dimensional data and solving complex linear
    systems require the effective handling of sparse matrices, which SciPy provides.


    # 12.5 NumPy and SciPy Differences


    Although they are closely linked, NumPy and SciPy are two crucial libraries in
    the Python scientific computing ecosystem that have slightly different uses. The
    following are the main distinctions between SciPy and NumPy:


    +   - NumPy is primarily concerned with supporting fundamental array operations
    and multidimensional arrays (ndarrays). With features for effective data manipulation
    and storage, it serves as the basis for Python''s numerical operations.

    - Building upon NumPy, SciPy offers a broad range of high-level functions and
    tools for a variety of scientific and technical computer applications. It has
    modules for linear algebra, statistics, signal processing, integration, interpolation,
    optimization and more.

    - NumPy mostly offers mathematical operations, array manipulation and elementary
    linear algebra functionalities.

    - SciPy is an extension of NumPy that provides sophisticated numerical methods
    and algorithms for handling intricate mathematical and scientific problems, including
    statistical analysis, interpolation, optimization and integration.

    - NumPy concentrates on arrays and fundamental functions. Basic mathematical functions
    and ndarray manipulation functions are included.

    - SciPy consists of multiple sub-packages, like SciPy, each devoted to a particular
    scientific or technical field. scipy.interpolate for interpolation, scipy.integrate
    for integration, optimize for optimization, and many more.'
  merge: -1
