    # Key Points to Remember


    +   - Tuple is a read-only datatype, which means that it is one time write.

    - Tuples are not arrays. Array has only one data type content permitted to be
    inside and here it is flexible in the tuples.

    - Lists are mutable.

    - Tuples are immutable, meaning that once a tuple is created one cannot change
    its elements. One cannot add, remove or modify elements in the tuple.

    - Two well-known statements supported in Python are the if statement and the if
    – else statement.

    - While and for are also supported and the beauty is, with for or while one can
    use else in Python.

    - Pass is like NOP (no operation) in microprocessors. This is helpful, when a
    statement is needed in a code for syntactical presence and not for any other meaningful
    execution.


    # Further Reading


    Python official website – https://www.python.org/

    Awesome Python – https://github.com/vinta/awesome-python'
