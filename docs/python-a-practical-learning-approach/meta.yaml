    many types of classifications, and each of these is unique. Data structures are
    generally classified as either primitive or non-primitive, and one can choose
    the appropriate option based on the requirements and suitability.


    Experienced programmers shall agree to this point that the choice of the data
    structure chosen and implemented can really make a lot of difference between a
    program which runs very slow or very fast, preferably in a few seconds. Hence,
    data structures are important to organize the data and to make sure that retrieval
    happens fast when they are searched for data.


    # 10.2 Arrays – The Basic Data Structure


    An array is a collection of memory location. It is a pre-defined data structure
    in all programming languages. This is the basic and foremost data structure. Consider
    an ice tray in the Figure 10.3. It has six empty spaces, so it can hold six ice
    cubes. The spaces can be left unused, but it cannot more than six ice cubes. The
