    ## 10.3 Stack


    A stack is a non-primitive data structure. It is a linear data structure designed
    only with linear access and not random access, with the data stored in continuous
    memory locations. Consider a pile of books as shown in Figure 10.6 or a stack
    of files. As the books lie one on top of the other, the data will be visualized
    as one above another. To take a book from the bottom, the books in the top must
    be removed and kept aside, so that the pile won''t collapse. Once the required
    book is taken, the remaining books can be replaced above the pile. However, for
    ready access, only the book on the top of the pile will be available. The same
    is the case with the stack data structure, since to access an element we must
    traverse across the elements above it (in preceding memory locations). Always
    only the contents of the first cell will be readily available. The visual representation
    of a stack is shown in Figure 10.7.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_115_0.png)


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_115_1.png)


    As shown in Figure 10.7, the first element of the stack is indicated by a ‘TOP’
    pointer. This is the only way of accessing any element in the stack, thus forcing
    linear access. The movement of the data in the stack is commonly termed as Last
    In First Out (LIFO). An element that comes first into the stack is placed at the
    bottom, and all the new elements will be placed one above the other. So now, the
    element that came first always exists at the bottom of the stack. While removing
    the elements, the latest element will always move out first as it is present at
    the top of the stack. All the elements will be removed in the order of new to
    old and the element at the base of the stack will be last to be removed. This
    is termed as LIFO, as the last element comes out first.


    Some points to be noted about a stack are:


    - It stores elements in continuous memory locations.

    - Only the top element of the stack can be accessed, using the TOP pointer.

    - Accessing any other element is by linear traversal using the TOP pointer.

    - The movement of data is LIFO, so in reading the data it will be in reverse of
    the order in which they were placed in the stack.


    ### 10.3.1 Working


    As stacks are stored in continuous memory, it may face problems like memory constraints
    and fragmentation issues. So, it is implemented using lists in Python. There are
    only three notable operations over a stack. They are:


    - Push

    - Pop

    - Top


    #### 10.3.1.1 Push


    Push is the act of adding an element into the stack. It is given this name as
    we push the data into the top of the stack. Any data can be placed only on the
    top of the stack, so if you want the stack to be in a specific order, rearrange
    the elements in that order and push it one by one. It is known that stacks do
    not have any size restriction. So to push an element, no other parameter is required.
    Also it is important to update and maintain the TOP pointer, since losing the
    TOP pointer or misplacing it will cause loss of data. Loss of data means data
    is present in the memory, in an unknown location, merely as garbage.


    # Python pseudocode 10.3 for Push operation


    ```

    Pseudocode for Push

    1 Assign the new element to a[size]

    2 Update Top pointer to a[size]

    3 Size++

    ```


    Initially, size will be 0, and TOP pointed to null.

    As an example for better understanding, assume we push 2,3,1,4 into stack ‘a’,
    which is initially empty. Figure 10.8 illustrates pushing 2, 3, 1, 4 into stack
    ‘a’.


    #### 10.3.1.2 Pop


    Pop is the operation of removing an element from the stack. In stack, we cannot
    decide which element is to be removed. Pop will always remove the data at the
    top of the stack. TOP pointer plays the role in pointing to the element at the
    top of the stack. If the TOP pointer is not consistently maintained, then pop
    may not work as expected. Similarly, after removing the top element, the TOP pointer
    should be updated to the next element, otherwise the entire stack will be lost.
    When the stack is empty, pop should not work. Else, it will result in a memory
    exception.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_117_0.png)


    # Python pseudocode 10.4 for Pop operation


    ```

    Pseudocode for Pop is presented:

    1 If stack is not empty

    2 Then

    3     Temp = value at Top

    4     Stack[size - 1 ] = 0

    5     Size--

    6     Update Top to stack[size-1]

    7     Return Temp

    8 Else

    9     Return 0 or any delimiter to show stack is empty

    ```


    An instance to pop from stack ‘a’ containing 2,3,1,4. Figure 10.9 illustrates
    the pop operation.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_118_0.png)


    **Figure 10.9** Pop operation illustration.


    #### 10.3.1.3 Top


    Top is the simplest operation in a stack. It just returns the element in the top
    of the stack and leaves the stack unchanged. Again, this should not work when
    the stack is empty, else it might produce some memory exceptions. It is solely
    dependent on the TOP pointer. If there has been any inconsistency in maintaining
    the TOP pointer at the time of Push or Pop, this function wouldn’t have worked
    as expected. The top operation is also referred as the peek operation in some
    popular implementations.


    # Python pseudocode 10.5 for Top operation


    ```

    Pseudocode for Top operation is presented below:

    1 If stack is not empty

    2 Then

    3 Return value at Top

    4 Else

    5 Return 0 or any delimiter to show stack is empty

    ```


    An instance to find Top from stack ‘a’ containing 2,3,1,4.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_119_0.png)


    Figure 10.10 Top operation and its result from a sample stack.


    Figure 10.10 illustrates the Top operation.

    A simple piece of code is presented below where the stack operation with Python
    has been carried out. One can observe that it is a very simple approach (Figure
    10.11).

    Once the code is executed, then one can get the results as presented in Figure
    10.12.

    It’s time to move to the queue which is in the queue next.


    ```

    list_one = [1,2,3,4,5,6,7,8]

    print ("Initial Stack", list_one)


    print ("Can we push an element on to the stack??")

    list_one.append(9)

    print ("Post Push (grown stack)", list_one)


    print ("can we do a pop from the stack? Means, 9 out")

    list_one.pop()

    print ("Post POP (shrinked stack)", list_one)


    print ("can we do a  peep? Returning the last value from the stack")

    index_for_top = len (list_one) -1

    print ("Length of the stack is", len(list_one))

    print ("Post Peep (Top of the stack)", list_one [index_for_top])

    ```


    Figure 10.11 Top operation and its result from a sample stack.


    ```

    ================ RESTART: F:/Python Playlist/Shriram/DS4.py ================

    Initial Stack [1, 2, 3, 4, 5, 6, 7, 8]

    Can we push an element on to the stack??

    Post Push (grown stack) [1, 2, 3, 4, 5, 6, 7, 8, 9]

    can we do a pop from the stack? Means, 9 out

    Post POP (shrinked stack) [1, 2, 3, 4, 5, 6, 7, 8]

    can we do a  peep? Returning the last value from the stack

    Length of the stack is 8

    Post Peep (Top of the stack) 8

    >>>

    ```


    Figure 10.12 Execution result for the code presented as Figure 10.11.


    ## 10.4 Queue


    Queue is a non-primitive linear data structure. It is a linear data structure
    designed with linear access and restricting random access. This also stores data
    in continuous memory locations. Based on all these descriptions, it seems like
    the same as arrays and stacks. But this is not the case. It has its own uniqueness
    in organizing the data and accessing it. This is the most common data structure
    that can be seen in our day-to-day lives. It is designed after the queues that
    are used to organize people in crowded areas. In the queue of people shown in
    Figure 10.13; when a new person enters, he stands at the end of the queue. When
    the counter is open, the first person moves out. Then, the second person moves,
    and this continues. So, if a person standing in the middle of the queue wants
    to come out, then either all the people before him should come out or all the
    people behind him should come out. Once'
