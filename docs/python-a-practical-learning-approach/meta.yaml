    # # 11 CLASSES AND OBJECTS


    ## LEARNING OBJECTIVES


    After reading this chapter, readers will have learned:


    +   - How to create classes

    - What an object is

    - Class method and self

    - init – a constructive approach

    - Destructor – Let’s destroy

    - Access specifiers

    - Some key points to remember.


    # ### 11.1 Introduction


    A class in Python is an example or template used to create objects, or instances
    of them. It outlines the characteristics (data) and operations (functions) that
    the class’s objects will possess. Classes offer a mechanism to arrange and structure
    code into reusable, self-contained units and are essential to object-oriented
    programming (OOP).


    This section shall detail the classes and objects in Python. Remember, Python
    is object-oriented.


    # ### 11.2 Classes and Objects in Python


    Readers might have learnt the classes and objects with C++ or Java earlier. It
    is time that we learn that in Python. How do we define a class in Python?'
