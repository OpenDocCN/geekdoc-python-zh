    \ index+1 to n-1\n        Assign a[i] to a[i-1]\n        Delete a[i-1]\n    Return\
    \ element\n```\n\nJust like insert, this function is also pre-defined in Python\
    \ in the name of remove, called as ‘list.remove(element)’.\n\n### 10.2.3.3 Merging\n\
    \nAnother notable operation on lists is merging two lists. This is basically concatenating\
    \ the contents of the list into a new list. In addition, some patterns can be\
