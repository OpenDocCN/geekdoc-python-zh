- md: '## 12.5 NumPy and SciPy Differences


    Although they are closely linked, NumPy and SciPy are two crucial libraries in
    the Python scientific computing ecosystem that have slightly different uses. The
    following are the main distinctions between SciPy and NumPy:


    - NumPy is primarily concerned with supporting fundamental array operations and
    multidimensional arrays (ndarrays). With features for effective data manipulation
    and storage, it serves as the basis for Python''s numerical operations.

    - Building upon NumPy, SciPy offers a broad range of high-level functions and
    tools for a variety of scientific and technical computer applications. It has
    modules for linear algebra, statistics, signal processing, integration, interpolation,
    optimization and more.

    - NumPy mostly offers mathematical operations, array manipulation and elementary
    linear algebra functionalities.

    - SciPy is an extension of NumPy that provides sophisticated numerical methods
    and algorithms for handling intricate mathematical and scientific problems, including
    statistical analysis, interpolation, optimization and integration.

    - NumPy concentrates on arrays and fundamental functions. Basic mathematical functions
    and ndarray manipulation functions are included.

    - SciPy consists of multiple sub-packages, like SciPy, each devoted to a particular
    scientific or technical field. scipy.interpolate for interpolation, scipy.integrate
    for integration, optimize for optimization, and many more.

    - NumPy is useful for basic mathematical computations and data preprocessing because
    it can perform basic data manipulation and numerical operations.

    - SciPy is designed for use in scientific and technical applications. It may be
    used for tasks like signal processing, differential equation solution, numerical
    optimization and sophisticated statistical analysis.

    - Since SciPy is based on NumPy, NumPy is automatically installed as a dependent
    when SciPy is installed.

    - To utilize SciPy, you must first install NumPy as a requirement.


    Having learnt the NumPy and SciPy, it is time to understand the distributions
    of Python. The most famous distribution for Python is Intel distribution.


    ## 12.6 The Intel Distribution for Python


    The Intel distribution for Python improves the speed of common libraries and algorithms,
    especially data analytics, to yield better performance. The new optimization provides
    significant speedups for scikit-learn (a free software machine learning library),
    especially in NumPy (short for Numerical Python) and SciPy (Scientific Python)
    packages which are meant for performing various operations with the data. It also
    leverages Intel Data Analytics Acceleration Library (Intel DAAL). The performance
    speed can be seen to accelerate to around a whopping 140 times for several scikit-learn
    algorithms. Intel DAAL is a software development library that is highly optimized
    for Intel architecture processors and provides building blocks for all data analytics
    stages, from data preparation to data mining and Machine Learning.


    The Intel distribution for Python includes accelerated packages for NumPy, SciPy
    and SKLEARN that are drop-in compatible with other similar community packages.
    Since these accelerated packages best utilize the Intel hardware already available,
    no code changes are needed.


    The readers can visit https://intel.ly/33OWf5N to download the Intel distribution
    for Python.


    As a first step to install and use the Intel distribution for Python, one has
    the option to go ahead with Intel AI Analytics Toolkit or Via Anaconda.

    We shall choose the option of Anaconda and then the following steps are to be
    taken, one after another.

    As shown in Figure 12.12, one must click the Anaconda prompt.

    Next, one should update conda with the command “conda update conda”. One would
    get the status completion message on correct execution (Figure 12.13).


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_150_0.png)


    Figure 12.12 Anaconda prompt.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_150_1.png)


    Figure 12.13 ''conda'' update.


    Add Intel channel as the next step. Tell conda to choose Intel packages over default
    packages, when available. One should issue the command conda config --add channels
    intel (Figure 12.14).


    ```

    (base) PS C:\Users\ShriramKV> conda config --add channels intel

    ```


    Figure 12.14 Add intel channel.


    As the next step, install Intel Distribution for Python* via conda. It is recommended
    that you create a new environment while installing. To install the core python3
    environment, issue the command conda create -n idp intelpython3_core python=3.x.
    One can refer to the screenshot to understand the process (Figure 12.15).


    ```

    (base) PS C:\Users\ShriramKV> conda create -n idp intelpython3_core python=3.9

    WARNING: A conda environment already exists at ''C:\Users\ShriramKV\anaconda3\envs\idp''

    Remove existing environment (y/[n])? y


    Collecting package metadata (current_repodata.json): done

    Solving environment: done

    ```


    Figure 12.15 Installation of Intel Python.


    Please note that “x” in “python=3.x” should signify which version of Python* you
    would like to install

    Finally, activate the Conda environment (Figure 12.16).


    ```

    (base) PS C:\Users\ShriramKV> conda activate idp

    (idp) PS C:\Users\ShriramKV>

    ```


    Figure 12.16 Activate conda.


    How can we validate if the installation has gone well? Simple. One should refer
    to Figure 12.17 to know how to do this.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_152_0.png)


    Below is the piece of sample code (Figure 12.18) taken into consideration to run
    with the stock version Python and Intel Distribution for Python. One executed,
    one could note the time needed for the execution with both the variants of the
    Python (Figure 12.19).


    ```

    import numpy as np

    import time


    start = time.time()


    rd = np.random.RandomState(88)

    a = rd.randint(1,1000,(1000,1000))

    y = rd.randint(1,1000,(1000))

    res = np.linalg.solve(a,y)


    end = time.time()


    print(res)

    print(''Time Consuming:'',end-start)

    ```


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_152_1.png)


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_152_2.png)'
  mdcn: '## 12.5 NumPy 与 SciPy 的区别


    尽管联系紧密，NumPy 和 SciPy 是 Python 科学计算生态系统中两个至关重要的库，但它们的用途略有不同。以下是 SciPy 和 NumPy 之间的主要区别：


    -   NumPy 主要关注支持基础数组操作和多维数组（ndarray）。它具备高效的数据操作和存储特性，是 Python 数值运算的基础。

    -   SciPy 建立在 NumPy 之上，提供了广泛的高级函数和工具，适用于各种科学和技术计算应用。它包含线性代数、统计、信号处理、积分、插值、优化等模块。

    -   NumPy 主要提供数学运算、数组操作和基础线性代数功能。

    -   SciPy 是 NumPy 的扩展，提供了复杂的数值方法和算法，用于处理复杂的数学和科学问题，包括统计分析、插值、优化和积分。

    -   NumPy 专注于数组和基础函数。包含基础数学函数和 ndarray 操作函数。

    -   SciPy 由多个子包组成，例如 SciPy，每个子包都致力于特定的科学或技术领域。scipy.interpolate 用于插值，scipy.integrate
    用于积分，optimize 用于优化，等等。

    -   NumPy 适用于基础数学计算和数据预处理，因为它可以执行基础数据操作和数值运算。

    -   SciPy 专为科学和技术应用而设计。它可用于信号处理、微分方程求解、数值优化和复杂统计分析等任务。

    -   由于 SciPy 基于 NumPy，安装 SciPy 时会自动安装 NumPy 作为依赖项。

    -   要使用 SciPy，必须首先安装 NumPy 作为前提条件。


    了解了 NumPy 和 SciPy 之后，现在是时候了解 Python 的发行版了。Python 最著名的发行版是 Intel 发行版。


    ## 12.6 Intel Python 发行版


    Intel Python 发行版提高了常用库和算法的速度，特别是数据分析方面，从而带来更好的性能。新的优化为 scikit-learn（一个免费的机器学习软件库）提供了显著的加速，尤其是在
    NumPy（Numerical Python 的缩写）和 SciPy（Scientific Python）包中，这些包旨在对数据执行各种操作。它还利用了 Intel
    数据分析加速库（Intel DAAL）。可以看到，对于几种 scikit-learn 算法，性能速度可以加速到大约惊人的 140 倍。Intel DAAL
    是一个针对 Intel 架构处理器高度优化的软件开发库，为所有数据分析阶段（从数据准备到数据挖掘和机器学习）提供了构建模块。


    Intel Python 发行版包含用于 NumPy、SciPy 和 SKLEARN 的加速包，这些包与其他类似的社区包兼容，可直接替换使用。由于这些加速包能最好地利用现有的
    Intel 硬件，因此无需更改代码。


    读者可以访问 https://intel.ly/33OWf5N 下载 Intel Python 发行版。


    作为安装和使用 Intel Python 发行版的第一步，可以选择使用 Intel AI Analytics Toolkit 或通过 Anaconda。

    我们将选择 Anaconda 选项，然后依次采取以下步骤。

    如图 12.12 所示，必须点击 Anaconda 提示符。

    接下来，应使用命令“conda update conda”更新 conda。正确执行后，会收到状态完成消息（图 12.13）。


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_150_0.png)


    图 12.12 Anaconda 提示符。


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_150_1.png)


    图 12.13 ''conda'' 更新。


    下一步是添加 Intel 频道。告诉 conda 在可用时选择 Intel 包而不是默认包。应执行命令 conda config --add channels
    intel（图 12.14）。


    ```

    (base) PS C:\Users\ShriramKV> conda config --add channels intel

    ```


    图 12.14 添加 intel 频道。


    下一步，通过 conda 安装 Intel Python 发行版*。建议在安装时创建一个新环境。要安装核心 python3 环境，请执行命令 conda create
    -n idp intelpython3_core python=3.x。可以参考截图了解该过程（图 12.15）。


    ```

    (base) PS C:\Users\ShriramKV> conda create -n idp intelpython3_core python=3.9

    WARNING: A conda environment already exists at ''C:\Users\ShriramKV\anaconda3\envs\idp''

    Remove existing environment (y/[n])? y


    Collecting package metadata (current_repodata.json): done

    Solving environment: done

    ```


    图 12.15 安装 Intel Python。


    请注意，“python=3.x”中的“x”应表示您想要安装的 Python* 版本。

    最后，激活 Conda 环境（图 12.16）。


    ```

    (base) PS C:\Users\ShriramKV> conda activate idp

    (idp) PS C:\Users\ShriramKV>

    ```


    图 12.16 激活 conda。


    我们如何验证安装是否成功？很简单。应参考图 12.17 了解如何操作。


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_152_0.png)


    下面是一段示例代码（图 12.18），考虑在原版 Python 和 Intel Python 发行版上运行。执行后，可以注意到两个 Python 版本执行所需的时间（图
    12.19）。


    ```

    import numpy as np

    import time


    start = time.time()


    rd = np.random.RandomState(88)

    a = rd.randint(1,1000,(1000,1000))

    y = rd.randint(1,1000,(1000))

    res = np.linalg.solve(a,y)


    end = time.time()


    print(res)

    print(''Time Consuming:'',end-start)

    ```


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_152_1.png)


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_152_2.png)'
