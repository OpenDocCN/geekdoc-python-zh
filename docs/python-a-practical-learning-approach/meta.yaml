    has to learn Python.


    Considering all the above facts, one can learn Python and it is definitely a good
    move for the learner. Learning Python is a good investment for a bright future.


    Now, having understood the benefits of learning Python, we can learn the definition
    of Python. Can we?


    ## 1.2 What is Python?


    Python, as we have seen in the previous section, is a programming language. It
    is a general-purpose programming language that is very easy to learn and use.
    It is also regarded as an interpreted and high-level programming language, which
    offers the users a lot of flexibility and versatility. Python, which was created
    by Guido van Rossum and first released in 1991, has been growing consistently
    and is now one of the most used programming languages across the globe.


    The next question, which the readers might pose, is: why is Python called an interpreted
    language? The answer is simple: it uses the interpreter to execute the code. The
    interpreter reads the program, and translates the same line by line to machine
    code. It can then be executed. Make a note of the point, it happens line by line.


    A simple workflow of how a typical Python file is executed is presented below:


    1.  First, one should write the code and save the file as a .py file. It indicates
    the file has Python code. This file shall be human-readable, and is typically
    called a high-level language.

    2.  The interpreter is called now, which is responsible for reading the code and
    executing the same.

    3.  Code parsing happens next, in which the interpreter reads the code line by
    line. Each line shall be interpreted, and it will be translated to a form that
    the computer can understand. Here, the human-readable format to machine-readable
    format translation happens, that too on the fly.

    4.  The interpreter then executes the code, one line at a time.


    Since the Python code is directly executed by the interpreter, there is no compilation
    step required as needed in the C or C++ which you must have come across. Compilers
    need the code to be compiled and then executed. This is a major difference to
    be understood.


    The interpreted nature carries its own benefits and drawbacks. The advantage is
    it is very easy to develop, and no platform dependency challenges are faced. The
    Python code can run on different machines without any modifications needed. On
    the other side, Python handles the code line by line. Hence, it is slower than
    the way the compilers handle the code.


