    The results are presented as Figure 13.9. As one can notice, pip install pyshorteners
    is a definite prerequisite. Then one should import the shorteners, as shown in
    the code snippet.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_160_0.png)


    Figure 13.9 URL shortener with Python.


    Followed by that, the weblink which should be shortened is to be fed as an input
    into the methods as prescribed below. Simple, the URL will be shortened. One can
