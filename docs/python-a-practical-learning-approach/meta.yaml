    After reading through this chapter and watching the video lectures, readers shall
    gain knowledge on writing simple Python codes which shall enable the following:


    - Finding an IP address

    - Spell checker

    - Internet speed checker

    - Music player

    - URL shortener with Python

    - QR code generator.


    Also, some more exercises are given for you to try yourself, but with a video
    tutorial link.


    ## 13.1 Introduction


    This chapter is kept as the last one in the book for a reason. Readers are expected
    to use the knowledge they have gained throughout the book and to build some easy,
    meaningful solutions with Python. Every single problem statement provided in this
    chapter is very interesting and easy to try out. Video links for demonstration
    purposes are also provided for the readers’ convenience. This will be a fun ride!


    ## 13.2 The Exercises – Try These Out


    ### 13.2.1 Find the IP Address of Your Machine with Python


    The below piece of code snippet shown in Figure 13.1 can get the task done. The
    users must import the socket and use the method gethostname as shown. That is
    sufficient, the IP address of your particular machine will be presented as shown
    in Figure 13.2. Try this out; this is fun.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_156_0.png)


    Figure 13.1 The code snippet for finding the IP address.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_156_1.png)


    Figure 13.2 The output – you got the IP address.


    One can watch the demo through the video presented at the link:

    https://www.youtube.com/watch?v=MvtDcQ_g5edw

    Hope you liked it. Let us get to the next one quickly.


    ### 13.2.2 Build a Spell Checker with Python


    Using the Textblob, one can build a spell checker with Python. Importing textblob
    from Textblob has to be done as shown in Figure 13.3. Then, passing the sentence
    one wants to check for the spelling as argument is sufficient. Then calling correct()
    will correct the spell errors. That’s it. Run the code and the output will appear
    without spelling errors. One can understand the way the code works through the
    results presented as Figure 13.4. Simple, try this out.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_157_0.png)


    Figure 13.3 Spell checker with Python.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_157_1.png)


    Figure 13.4 – The Spell checker and corrected spelling as output.


    One can watch the demo through the video presented at the link:


    https://www.youtube.com/watch?v=BnSXLcVY4TI


    Can we go to the next one? The internet speed checker. Yes, you can check the
    speed of your internet connection with a simple piece of code.


    ### 13.2.3 Internet Speed Checker with Python


    Well, the next one could be very useful for all of us. The internet speed checker.
    While there are many apps available to do this task, it would always be great
    for a techie to check this sort of things with their own code.


    The code snippet is presented below as Figure 13.5 and it is very simple. One
    should import the speedtest library and use the methods download() and upload()
    as shown. That’s it. When the same is run, one can get the data immediately as
    shown in Figure 13.6.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_158_0.png)


    **Figure 13.5** Internet speed checker with Python.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_158_1.png)


    **Figure 13.6** The upload and download speeds.


    One can watch the demo through the video presented at the link:


    https://www.youtube.com/watch?v=iBv3YOVapgc


    Can we build a music player with Python, now? Yes, it’s time.


    ### 13.2.4 Play Music with Python


    Yes, it is possible. One can play music with Python. We have modules and libraries
    available to play music with Python. The below piece of code presented in Figure
    13.7 can accomplish the task. There is a pre-requisite to be met. The user must
    have done the pip install pygame. Also, the mixer must be imported from the pygame.
    That’s it. The path for the music file must be included in the code as presented
    below. Then, one can call the methods, init(), load() and play(). Executing the
    code will play the music for you and it’s music time!


    ```python

    # Here you go, we can play music with python!

    # Do the pip install pygame, please.

    from pygame import mixer

    music = ''E:\DeskTop\PPTYT\Python\house_lo.mp3''

    mixer.init()

    mixer.music.load(music)

    mixer.music.play()

    ```


    Figure 13.7 Play music with Python.


    You will receive the message on screen as shown in Figure 13.8 and then the music
    shall be played.


    ```

