    We need to understand that first before moving along the learning curve.


    The reasons are listed one after another as follows:


    +   a. **Ease of learning** – It is the very important reason to be discussed.
    Python is simple and easy to use. It is very easy to understand a Python code
    and there is no complexity involved. Reading a Python code is as good as reading
    English'
