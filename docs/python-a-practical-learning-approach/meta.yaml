- md: '## 5 MODULES IN PYTHON


    ### LEARNING OBJECTIVES


    After reading this chapter, readers will have learned about:


    - Modules in Python

    - The importance of modules

    - Math modules

    - From and import – must-know

    - From, import and as – the “trio”

    - Command-line arguments

    - Some must-know points.


    ### 5.1 Introduction


    We discussed the functions in the last chapter and highlighted the various features
    it offers the programmers. Modules are superior to functions and can be understood
    once the reader has completed this chapter. Modules are already available Python
    files (.py files) which one can use, and they can do some predetermined tasks
    for the programmer, in an easier way. The task could be mathematical or analytical.
    A module is a file which consists of the Python code. A module can define functions,
    classes and even variables. Modules are very helpful in grouping pieces of codes
    together in a file, in a much more logical manner.


    ### 5.2 Module Usage and the Creation of Modules


    Once the module is available, one can import it to the Python file. One can use
    the ‘import’ option to import the modules and can start running the code.


    An example will be very helpful for the readers to understand how modules can
    be imported and used. Figure 5.1 presents a simple example elucidating the usage
    of modules along with results.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_71_0.png)


    It is time to try something very interesting. Can we create a module ourselves?
    Yes, readers are presented with an instance where a module is created and used
    (Figure 5.2).


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_72_0.png)


    Figure 5.2 Creation of own modules.


    ### 5.3 Math Modules


    Math is all fun and Python has math modules. It is very easy to use and an instance
    for generating the square root for the given number with the math module is presented
    below as Figure 5.3, which includes the result obtained. A simple line import
    math shall enable the access to the underlying C library functions which makes
    life easier.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_72_1.png)


    Figure 5.3 Importing math modules.


    More math operations are possible to be done with the math module. A sample code
    covering more math with the support of the math module is presented as Figure
    5.4 with results. Readers can see how easy it is to get math implemented with
    modules.


    ```

    File Edit Format Run Options Window Help

    # Can we do math?

    # All math in one shot!

    import math


    # Square Root

    n = math.sqrt (4)

    print ("Sqrt is",n)


    # Ceil returns the smallest integral value greater than number

    n = math.ceil (4.87)

    print ("ceil is",n)


    # floor returns the greatest integral value smaller than number

    n = math.floor (4.87)

    print ("floored is",n)


    #fabs - Returns the absolute value of the given number.

    n = math.fabs (5)

    print ("fab value is",n)

    n = math.fabs (5.222)

    print ("fab value is",n)


    #factorial

    n = math.factorial (4)

    print ("factorial is",n)

    ```


    ```

    File Edit Shell Debug Options Window Help

    Python 3.7.3 (v3.7.3:ef4ec6ed12, Mar 25 2019, 21:26:53) [MSC v.1916 32 bit (l)]
    on win32

    Type "help", "copyright", "credits" or "license()" for more information.

    >>>

    ================ RESTART: E:/Python Playlist/module5.py ================

    Sqrt is 2.0

    ceil is 5

    floored is 4

    fab value is 5.0

    fab value is 5.222

    factorial is 24

    >>> |

    ```


    Figure 5.4 Easy math with math modules in Python.


    More math is presented in the subsequent example presented as Figure 5.5. Readers
    can see that the copysign, and Greatest Common Divisor (GCD) operations are performed
    with the usage of math modules seamlessly. From these examples, readers can understand
    the modules are so helpful and also easy to use.

    There are more math functions; readers can try out more such options with math
    modules.

    One can use from and import together, which makes it easier for the programmers.
    When we import a module, we import everything from it. A couple of examples were
    just presented. Can someone import selected stuff from the module? Yes, it can
    be done. One example is presented below where both from and import are used together.
    From math, we have imported factorial, as shown in Figure 5.6.


    ```

    # Can we do math?

    # All math in one shot!

    import math


    # copysign - well this is fun

    # Function will return the number with value of a, but with the sign of b.

    # An instance is helpful as ever.

    a = -5

    b = 3

    # Here, as you see, a is negative, b is positive

    print (math.copysign (a,b))


    a = 5

    b = -3

    # Here, as you see, a is negative, b is positive

    print (math.copysign (a,b))


    # GCD - Let''s have fun.

    a = 5

    b = 10

    # Here, as you see, a is negative, b is positive

    print (math.gcd (a,b))

    ```


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_74_0.png)


    Figure 5.5 Copysign, GCD with math.


    ```

    # Let us understand the usage of from and import.

    from math import factorial

    print (factorial (4))

    ```


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_74_1.png)


    Figure 5.6 From and Import together.


    One can have a look at another example presented below as Figure 5.7 where from
    and import are used together. This way of programming is very useful to import
    select modules appropriately.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_75_0.png)


    **Figure 5.7** From and Import together – another example.


    One can use ‘as’ for aliasing. One instance where ‘as’ has been used is presented
    below (Figure 5.8) along with results. In the example, factorial has been used
    as fact through the aliasing.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_75_1.png)


    **Figure 5.8** ‘as’ with from and import.


    ### 5.4 Command-Line Arguments in Python


    This is always seen as one of the toughest topics, even in C programming. Many
    find this difficult to understand and to teach. But this is not so difficult.
    Readers are introduced to the command line arguments in Python through the simple
    example presented in Figure 5.9.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_76_0.png)


    Readers have been exposed to more complex topics and we recommend readers to try
    these out practically to gain more knowledge and understanding.


    Readers can watch the following YouTube lectures to gain more understanding:


    - Modules in Python – https://youtu.be/jcJ3Aq09_tM

    - Command-line arguments in Python – https://youtu.be/kGb9czHzzPQ


    ### Key Points to Remember


    - Modules are already available Python files (.py files) which one can use. They
    can carry out some predetermined tasks for the programmer, in an easier way.

    - Modules are very helpful in grouping pieces of codes together in a file, in
    a much more logical manner.

    - One can use the ‘import’ option to import the modules and start running the
    code.

    - Math modules make the life of programmers much easier through various built-in
    features.

    - One can use the from and import functions together, which makes it easier for
    programmers.

    - One can use ‘as’ for aliasing alongside import.


    ### Further Reading


    Python official website – https://www.python.org/

    Awesome Python – https://github.com/vinta/awesome-python


    ## 6 NAMESPACE IN PYTHON


    ### LEARNING OBJECTIVES


    After reading this chapter, readers will know about the following:


    - What a namespace is

    - Local, global and built-in namespaces

    - How to use calendar

    - Time with Python

    - Getpass and getuser

    - Function redefinition in Python

    - Some key points to remember.


    ### 6.1 Introduction


    A namespace in Python is a container for a collection of identifiers (like class
    names, variable names, function names, etc.) and the objects (like values, functions
    or classes) that go along with them. To avoid naming conflicts and improve the
    modularity and maintainability of your code, namespaces are used to arrange and
    manage the naming of variables and other objects.


    Namespaces in Python prevent the naming ambiguities and enable programmers to
    use names as they wish. One can understand the usefulness of namespace with an
    example. Assume that you created two modules, Mod1 and Mod2. Both of the modules
    may have used the same variable names. In that condition on importing both the
    modules, there comes uninvited trouble. Yes, it is a pain point.'
