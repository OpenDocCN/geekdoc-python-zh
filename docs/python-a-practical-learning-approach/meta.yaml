    \n- If 语句。\n- If – else 语句。\n\n让我们从 ‘if’ 语句开始，然后介绍 ‘if – else’。\n‘if’ 语句的语法和流程如图\
    \ 3.6 所示。\n\n![](img/6aa6b653b3315fe4a7189de2de1d4867_49_0.png)\n\n下面是一个简单的代码，如果数字大于\
    \ 2，则将其增加 6，如图 3.7 所示，并附有结果。\n\n![](img/6aa6b653b3315fe4a7189de2de1d4867_49_1.png)\n\
    \n还提供了一个条件不满足的实例，如图 3.8 所示。\n下面再举一个例子。\n\n![](img/6aa6b653b3315fe4a7189de2de1d4867_50_0.png)\n\
    \n编写一个程序来识别用户输入的是字符还是整数。根据需要使用 input 函数。（请注意，我们在本例中使用了 isdigit 和 isalpha，如图 3.9\
    \ 所示。）\n\n![](img/6aa6b653b3315fe4a7189de2de1d4867_50_1.png)\n\n现在是学习 if – else\
    \ 用法的时候了。\n\n下面向读者展示语法以加深理解。\n\n```\nIf (test_expression):\n    statement 1\n\
    else\n    statement 2\nStatement xyz;\n```\n\n通过查看上面的语法，可以理解 if – else 的工作方式。如果测试表达式为真，则执行语句\
    \ 1；否则，将转到 else 块。可以参考图 3.10 来理解 if – else 的功能。\n\n![](img/6aa6b653b3315fe4a7189de2de1d4867_51_0.png)\n\
