    \ (\"I am done\")\n```\n\n![](img/6aa6b653b3315fe4a7189de2de1d4867_56_0.png)\n\
    \n**图3.19** 一个使用`for`的实例。\n\n了解`range()`函数的用法非常重要。下面的图3.20展示了一个实例。\n\n```\nfor\
