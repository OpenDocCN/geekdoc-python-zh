    S3IziLMWzPZT51


    ## Key Points to Remember


    - Python has been growing tremendously and there is a lot of attention being paid
    to it.

    - Python is simple and easy to use. It is very easy to understand a Python code
    and there is no complexity involved.

    - Python is open source, and it is one of the very important reasons for its rapid
    growth and usage.

    - Python can be used for building a variety of applications catering to different
    domains/sectors. One can build Machine Learning, Deep Learning, NLP, Data Analysis,
    Big Data, Automation, Embedded Applications and many more with Python. So, it
    is an ideal choice for anyone to learn.

    - Python is excellently supported by massive and active developers. There are
    so many resources one could find for Python online.

    - Python is available for all the known operating systems and platforms of which
    we are aware. It suits well for Windows, Linux and macOS.

    - Python is most suitable for small-scale, medium-scale and large-scale applications.

    - Python is a general-purpose programming language and is very easy to learn and
    use.

    - Python is also regarded as an interpreted and high-level programming language
    which offers the users a lot of flexibility and versatility.

    - Python uses the interpreter to execute the code. The interpreter reads the program
    and translates the same, line by line to machine code, then it can be executed.
    Make a note of the point, it happens line by line.'
