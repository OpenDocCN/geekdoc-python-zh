    | 迭代 | for i in list: print i | 遍历列表中的每个元素。 |


    ## 10.3 栈


    栈是一种非基本数据结构。它是一种线性数据结构，仅设计为线性访问而非随机访问，数据存储在连续的内存位置中。考虑如图 10.6 所示的一堆书或一叠文件。由于书是一本叠在另一本上，数据将被可视化为一层叠在另一层之上。要从底部取一本书，必须将顶部的书移开并放在一边，这样堆才不会倒塌。一旦取出了所需的书，剩下的书可以重新放回堆顶。然而，为了便于访问，只有堆顶的书是可用的。栈数据结构的情况也是如此，因为要访问一个元素，我们必须遍历它上面的元素（在前面的内存位置中）。始终只有第一个单元格的内容是随时可用的。栈的可视化表示如图
    10.7 所示。


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_115_0.png)


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_115_1.png)


    如图 10.7 所示，栈的第一个元素由一个 ‘TOP’ 指针指示。这是访问栈中任何元素的唯一方式，从而强制线性访问。栈中数据的移动通常称为后进先出（LIFO）。先进入栈的元素被放置在底部，所有新元素将一个叠一个地放置。因此，现在先进入的元素始终存在于栈的底部。在移除元素时，最新的元素总是最先移出，因为它位于栈的顶部。所有元素将按照从新到旧的顺序移除，栈底部的元素将是最后一个被移除的。这被称为
    LIFO，因为最后一个元素最先出来。


    关于栈需要注意的一些要点是：


    - 它将元素存储在连续的内存位置中。

    - 只能使用 TOP 指针访问栈的顶部元素。

    - 访问任何其他元素都是通过使用 TOP 指针进行线性遍历。

    - 数据的移动是 LIFO，因此在读取数据时，其顺序与它们被放入栈中的顺序相反。


    ### 10.3.1 工作原理


    由于栈存储在连续的内存中，它可能面临内存限制和碎片化问题。因此，在 Python 中使用列表来实现它。栈上只有三个值得注意的操作。它们是：


    - 压入（Push）

    - 弹出（Pop）

    - 栈顶（Top）


    #### 10.3.1.1 压入（Push）


    压入是将元素添加到栈中的操作。之所以这样命名，是因为我们将数据推入栈顶。任何数据只能放置在栈顶，因此如果你希望栈保持特定顺序，请按该顺序重新排列元素并逐个压入。已知栈没有任何大小限制。因此，要压入一个元素，不需要其他参数。同样重要的是更新和维护
    TOP 指针，因为丢失 TOP 指针或放错位置会导致数据丢失。数据丢失意味着数据存在于内存中，位置未知，仅仅是作为垃圾存在。


    # Python 伪代码 10.3 用于压入操作


    ```

    压入的伪代码

    1 将新元素赋值给 a[size]

    2 将 Top 指针更新为 a[size]

    3 Size++

    ```


    最初，size 将为 0，TOP 指向 null。

    为了更好地理解，举个例子，假设我们将 2,3,1,4 压入初始为空的栈 ‘a’ 中。图 10.8 说明了将 2, 3, 1, 4 压入栈 ‘a’ 的过程。


    #### 10.3.1.2 弹出（Pop）


    弹出是从栈中移除元素的操作。在栈中，我们无法决定要移除哪个元素。弹出总是移除栈顶的数据。TOP 指针在指向栈顶元素方面起着作用。如果 TOP 指针没有持续维护，那么弹出可能无法按预期工作。同样，在移除顶部元素后，TOP
    指针应更新为下一个元素，否则整个栈将丢失。当栈为空时，弹出不应工作。否则，它将导致内存异常。


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_117_0.png)


