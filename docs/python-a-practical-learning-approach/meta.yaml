    ![](img/6aa6b653b3315fe4a7189de2de1d4867_160_1.png)


    Figure 13.10 Shortened URL.


    One can watch the demo through the video presented at the link:


    https://www.youtube.com/watch?v=bSlbRkL5UoU


    # 13.2.6 QR Code Generator


    It is time to generate some QR codes! Yes, Python can help you with this too.
    We can generate QR codes with ease. The prerequisites are getting these installed
    – pip install pyqrcode, pip install png and also pypng. Then, import the pyqrcode,
    png as shown below in Figure 13.11. Followed by then import QRCode from the pyqrcode.
    The string which you want to convert as QR code has to be sent to the method as
    shown in the code snippet (Figure 13.11). Also, mention the location in which
    you want the QR generated to be stored. One can see the results as presented in
    Figure 13.12.'
