    \ as ‘list1+list2’. This is achieved through operator overloading of the ‘+’ operator.\
    \ This is an instance to feel that lists are actually implemented as a class in\
    \ Python.\n\n### 10.2.3.4 Some More Operations\n\nThere are many other utility\
    \ functions defined for lists. These can be used in basic read, write or modify\
    \ functionalities of the list. Table 10.1 has a list of available predefined functions,\
    \ a brief description and complexity of the same.\n\nOther than these built-in\
    \ functions, there are some operators overloaded for special utilities. All the\
    \ available operators for list are shared in Table 10.2.\n\nIt is time to move\
    \ to the next data structure, the stack!\n\n**Table 10.1 Pre-Defined Functions\
    \ for Lists**\n\n| FUNCTION | DESCRIPTION |\n| :--- | :--- |\n| List.append(element)\
    \ | Appends the new element to the end of the list |\n| List.count(element) |\
    \ Returns the number of instances of the given element, if it is present in the\
    \ list |\n| List.extend(sequence) | Appends the elements of the sequence into\
    \ the list |\n| List.index(element) | Searches for the first instance of the element\
    \ in the list and returns the index |\n| List.pop( ) | Removes and returns the\
    \ last element from the list. This function can also take an optional argument,\
