    There are three types of queues


    +   - Single-ended Queue (The normal queue)

    - Double-ended Queue (DEQue)

    - Priority Queue


    # 10.4.1 Single-ended Queue


    Single-ended queues are one-way queues. The data can move only in a forward direction.
    The elements enter at the rear and leave from the front. Consider a boarding queue
    in the airport. The queue shown in Figure 10.15 is one such queue. Here, the passengers
    can enter into the queue, but not come back out. Once their procedure is over,
    they will move on to the next counter or lounge or aircraft. But they cannot come
    back out of the queue. Similar is the case with this data structure, elements
    can enter only at the rear end and can exit only at the front. (Readers can explore
    double-ended queues easily with this knowledge.)


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_122_0.png)


    **Figure 10.15** One-way queue.


    As shown in Figure 10.16, Enqueue is based on the Rear pointer and Dequeue is
    based on Front pointer. Only the Front pointer is accessible, whereas the Rear
    pointer is for internal reference.'
  - '[PAGE 123]


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_123_0.png)


    Figure 10.16 Visualization of single-ended queues.


    # 10.4.2 Working


    Queues also store the data in continuous memory locations. Thus, it is also implemented
    using list in Python. There are only three basic operations supported in the data
    structure. They are:


    +   - Enqueue

    - Dequeue

    - Front


    # 10.4.2.1 Enqueue


    This is the operation of adding an element into the queue. Any data can be added
    to the end of the queue. So, if you want the queue to have the data in some order,
    arrange the data in the same order and Enqueue it one by one into the queue. As
    the position cannot be determined by us, no other parameter is required for the
    function. It is always important to internally update the Rear pointer and maintain
    it correctly after every Enqueue operation. If the Rear pointer is not consistently
    maintained, data might be lost as any new data is added only based on this pointer.
    Inconsistency in the Rear pointer may result in two cases, overwriting of data
    – losing some old data or discontinuity within the queue that will collapse the
    whole structure.


    # Python pseudocode 10.6 for Enqueue operation


    ```

    Pseudo code for enqueue:

    1 If Queue is empty

    2 Then,

    3   Assign data in queue[0]

    4   Front->queue[0]

    5   Rear->queue[1]

    6   Increment size

    7 Else,

    8   Assign data to Rear

    9   Increment Rear

    10  Increment size

    ```'
  - '[PAGE 124]


    Initially, size will be 0 and Front, Rear will be NULL.

    Let’s Enqueue 2,3,1,4 into a queue ‘a’, which is initially empty. The entire scenario
    is presented as Figure 10.17.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_124_0.png)


    10.4.2.2 Dequeue Dequeue is the complement for Enqueue. It is the process of removing
    the element out of the queue. As the queue is one way, the elements can come out
    only in the front. As said previously, the elements come out in the order they
    were sent in. The Front pointer marks the first element, and the process of Dequeue
    solely depends on it. So, after removing every element, it is equally important
    to consistently update the Front pointer. Failing to update the same would cause
    the loss of all the data. A queue with only a Rear pointer and no Front pointer
    is no use and the data will be treated as garbage only. The pseudocode for Dequeue
    is shared below. Another important point to notice is that when the queue is empty,
    access to the pointer will result in memory exceptions. Thus, a base case for
    checking the queue is not empty when added in the algorithm.'
