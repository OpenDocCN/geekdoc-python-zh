  md: 'below list of keywords which are predefined. A brief note is also presented
    for quicker understanding:


    +   - False: Represents the Boolean value False.

    - None: Represents a null or undefined value.

    - True: Represents the Boolean value True.

    - and: Used for logical conjunction (&&).

    - as: Used for aliasing while importing modules or creating context managers.

    - assert: Used for debugging and testing purposes to assert that a condition is
    true.

    - async: Indicates that a function or method is asynchronous.

    - await: Used within asynchronous functions to wait for the completion of another
    asynchronous operation.

    - break: Used to exit from a loop prematurely.

    - class: Used to define a class.

    - continue: Used to skip the current iteration of a loop and continue with the
    next one.

    - def: Used to define a function or method.

    - del: Used to delete variables, items from lists or attributes from objects.

    - elif: Short for ‘else if,’ used in conditional statements.

    - else: Used in conditional statements when the condition is not met.

    - except: Used in exception handling to catch and handle exceptions.

    - finally: Used in exception handling to specify a block of code that always executes,
    whether an exception is raised or not.

    - for: Used to create a loop that iterates over a sequence (e.g., a list or a
    range).

    - from: Used in import statements to specify which module to import.

    - global: Used to declare a global variable within a function.

    - if: Used for conditional statements.

    - import: Used to import modules or specific items from modules.

    - in: Used to check if a value is present in a sequence.'
  merge: -1
  pgno: 38
- img_proc: true
  md: '+   - is: Used for identity comparison (checking if two objects are the same).

    - lambda: Used to create anonymous (nameless) functions.

    - nonlocal: Used to declare a variable that is not local to the current function
    but also not global.

    - not: Used for logical negation (!).

    - or: Used for logical disjunction (||).

    - pass: Used as a placeholder for code that does nothing.

    - raise: Used to raise exceptions.

    - return: Used to return a value from a function.

    - try: Used in exception handling to start a block of code where exceptions are
    monitored.

    - while: Used to create a loop that continues if a condition is true.

    - with: Used to create a context manager.

    - yield: Used in generator functions to yield a value to the caller.


    Most of these keywords shall be used in the entire book in a place or other and
