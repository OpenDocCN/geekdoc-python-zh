    # THE INTRODUCTORY DISCUSSION


    ## LEARNING OBJECTIVES


    After reading this chapter, readers will have learned the following:


    - What Python is

    - Why Python is so popular

    - Installation guidelines

    - Hello, world with Python

    - Execution options

    - Numbers and variables

    - Data types

    - Some interesting quiz questions.


    ## 1.1 Introduction


    Let us start with a question: why should someone learn Python in the first place?
    Then we can move on to learn the technical things and allied contents.


    In recent years, Python has been growing tremendously and there is a lot of attention
    being paid to it. Why is this happening? Why are there a lot of takers for Python?
    We need to understand that first before moving along the learning curve.


    The reasons are listed one after another as follows:


    a. **Ease of learning** – It is the very important reason to be discussed. Python
    is simple and easy to use. It is very easy to understand a Python code and there
    is no complexity involved. Reading a Python code is as good as reading English.'
