    \nFigure 2.12 Result for the execution of the code shown in Figure 2.11.\n\nRemember\
    \ this, input will always accept the feed as a string. Means, even you feed in\
    \ the numbers as input, it goes ahead with it as a string.\n\n## 2.5 Keywords\
    \ in Python\n\nPython uses reserved terms called keywords to determine the syntax\
    \ and grammatical structure of the language. Because they are pre-defined in the\
    \ language, these keywords cannot be used as identifiers (variable names, function\
    \ names, etc.). One can have a look at the below list of keywords which are predefined.\
    \ A brief note is also presented for quicker understanding:\n\n- False: Represents\
    \ the Boolean value False.\n- None: Represents a null or undefined value.\n- True:\
    \ Represents the Boolean value True.\n- and: Used for logical conjunction (&&).\n\
    - as: Used for aliasing while importing modules or creating context managers.\n\
    - assert: Used for debugging and testing purposes to assert that a condition is\
    \ true.\n- async: Indicates that a function or method is asynchronous.\n- await:\
    \ Used within asynchronous functions to wait for the completion of another asynchronous\
    \ operation.\n- break: Used to exit from a loop prematurely.\n- class: Used to\
    \ define a class.\n- continue: Used to skip the current iteration of a loop and\
    \ continue with the next one.\n- def: Used to define a function or method.\n-\
    \ del: Used to delete variables, items from lists or attributes from objects.\n\
    - elif: Short for ‘else if,’ used in conditional statements.\n- else: Used in\
    \ conditional statements when the condition is not met.\n- except: Used in exception\
    \ handling to catch and handle exceptions.\n- finally: Used in exception handling\
    \ to specify a block of code that always executes, whether an exception is raised\
