    # 3.3 Lists in Python


    It is very important to know the differences between lists and tuples in Python.
    Though they appear similar, there are some key differences to be understood.


    First, mutability. Lists are mutable. Understanding the term mutability is important
    here. Mutability means that one can change their content after the lists are created.
    By contrast, tuples are immutable; once a tuple is created, one cannot change
    its elements. One cannot add, remove or modify elements in the tuple. Similarly,
    lists are defined with square brackets whereas tuples are defined with parenthesis.
