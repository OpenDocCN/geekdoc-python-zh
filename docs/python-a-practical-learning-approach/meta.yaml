    # 8.2.1 Opening a File


    The open() method in Python is used to open files for reading, writing and adding
    data to a file, among other file actions. You can utilize the file object that
    is returned by the open() function to carry out file-related tasks. The syntax
    for the open() method is presented below with an instance where the same used
    to open a file with wb mode.


    ```

    file = open(file_path, mode)

    ↓

    fp = open("test.txt", "wb")

    ```


    One should understand that, file_path is the path to open the file. It can be
    either a relative or an absolute file path.

    Mode specifies the mode you want to open the file. It can be any one of the following:


    +   - ‘r’: Read mode, which is the default mode.

    - ‘w’: Write mode and the file will be opened for the write process. If the file
    already exists, it will be truncated (cleared). If not, a new file will be created.

    - ‘a’: Append mode gets the file opened for writing, but data is appended to the
    end of the file instead of overwriting its contents. If the file doesn’t exist,
    this mode will create a new file.

    - ‘b’: Binary mode is normally used along with other modes to open files in binary
    mode (e.g., ‘rb’ for reading a binary file, ‘wb’ for writing a binary file).

    - ‘t’: Text mode and is used to open files in text mode (e.g., ‘rt’ for reading
    a text file, ‘wt’ for writing a text file).


    To free up system resources, it’s crucial to use the close() method to end the
    file after you’re finished with it. Nevertheless, using the with statement to
    have the file automatically close when you leave the block is a more advised strategy.

    A sample code is presented below as Figure 8.1 where a file is opened, and results
    are displayed.'
