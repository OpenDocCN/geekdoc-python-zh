    # 10.3 Stack


    A stack is a non-primitive data structure. It is a linear data structure designed
    only with linear access and not random access, with the data stored in continuous
    memory locations. Consider a pile of books as shown in Figure 10.6 or a stack
    of files. As the books lie one on top of the other, the data will be visualized
    as one above another. To take a book from the bottom, the books in the top must
    be removed and kept aside, so that the pile won''t collapse. Once the required
    book is taken, the remaining books can be replaced above the pile. However, for
    ready access, only the book on the top of the pile will be available. The same
    is the case with the stack data structure, since to access an element we must
    traverse across the elements above it (in preceding memory locations). Always
    only the contents of the first cell will be readily available. The visual representation
    of a stack is shown in Figure 10.7.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_115_0.png)


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_115_1.png)'
