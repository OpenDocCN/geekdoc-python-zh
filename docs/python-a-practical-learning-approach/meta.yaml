    \ by a number. This is called the index or subscript. The memory address of the\
    \ first location is stored alone in the variable declaration, while others are\
    \ calculated relatively. Say, ‘a’ is the name of the array. Then, a[3] = address\
    \ of a[0] + 3. While declaration, the address of a[0], that is the starting address\
    \ of the array, will be associated with the variables name ‘a’ in the internal\
    \ symbol table. Arrays can also be declared using pointers in C or C++ (not in\
    \ Python and Java, as these do not have pointers). This is possible only because\
    \ arrays are always continuous. So, the initial address can be referenced to a\
    \ pointer and the rest can be used by relative accessing. Another way is to allocate\
    \ a chunk of memory and assign it to a pointer, which is known as Dynamic Memory\
    \ Allocation in C/C++. By using pointers, the limit on the number of elements\
    \ or the size of an array can be removed. Arrays are defined in the form of lists.\
    \ Even though Python doesn’t have pointers, lists are, by default, designed in\
    \ a dynamic way without any limit.\n\nSome points to be noted about an array include:\n\
    \n- It is a continuous chunk of memory with equally sized blocks.\n- The subscript\
    \ always begins with 0 and goes till n–1, which is also continuous.\n- Any memory\
    \ location can be directly accessed using its subscript.\n- Static arrays have\
    \ issues like memory wastage and memory leak and has constraints over the size.\
    \ These are overcome by using dynamic arrays, or Dynamic Memory Allocation (DMA),\
    \ using pointers.\n- Since it is a continuous chunk of memory, it has internal\
    \ issues like fragmentation and memory leaks.\n- This is the basic and naive data\
    \ structure. Many other data structures are built using arrays.\n\nPython lists\
    \ have properties similar to an array, but don't require any size for declaration.\
    \ They can continuously grow, with the elements being added into it, and are thus\
    \ designed in a dynamic manner. Hence, lists overcome the problem of memory wastage\
    \ and memory leak of arrays, as only the required memory blocks are associated\
    \ with the list variable. Apart from these properties, Python lists have a special\
    \ property. They can contain data of any types within the same lists, which is\
    \ not possible in generic arrays in other programming languages. Thus, Python\
    \ lists are better than basic array implementation in programming languages like\
    \ C/C++. But a constraint for Python list is, as it is dynamic the elements may\
    \ not be mandatorily stored in consecutive locations. Traditionally, however,\
    \ arrays were designed for continuous memory locations only.\n\n## 10.2.2 Lists\
    \ Implementation\n\nPython lists can be initialized in one of the following ways.\
    \ The list can be created empty or with elements.\n\n```\na = [] //empty list\n\
    a = [1,2,3,4,5] //list with 5 elements\na = [] * (5) //Empty list of size 5.\n\
    ```\n\nOnce the list is created, elements can be accessed using the subscript.\
    \ To assign a value '1' in the 4th position of the list created above, a[3] =\
    \ 1 can be used. Such is the accessing of elements done using subscript. One additional\
    \ property in lists is that lists can have data of any type unlike arrays.\n\n\
    ## 10.2.3 The Operations\n\nOnce the list is declared by using either of the above\
    \ ways, it is ready and settled in the memory. The basic operations on lists are:\n\
    \n- Insertion\n- Deletion\n- Merging\n\n### 10.2.3.1 Insertion\n\nThe only way\
    \ to insert a new element into a list is to assign it to a specific subscript.\
    \ So to insert, along with the element, the subscript is mandatory. For example,\
    \ if ‘2’ is to be inserted into ‘a’ at index 3, we have to initiate a[3] with\
    \ ‘2’, that is, ‘a[3]=2’. Now ‘2’ is inserted at subscript 3 of list ‘a’, but\
    \ this may have multiple cases.\n\n**Case 1**\n\nConsider a[3] is empty, then\
    \ inserting ‘2’ will engage the location and ‘2’ will then occupy the memory space\
    \ ‘a[3]’ as shown in Figure 10.4.\n\n**Case 2**\n\nConsider a[3] is already occupied,\
    \ then inserting ‘2’ will overwrite the content in the location and ‘2’ will occupy\
    \ the memory space ‘a[3]’ as shown in Figure 10.5. Now, the old data in the location\
    \ will be completely lost.\n\nThis is the only default available way for inserting\
    \ elements into the array. To insert without the loss of existing data, the following\
    \ algorithm is designed and implemented in Python.\n\nStart from the penultimate\
    \ element of the array, that is, index n-2. Move every element to the right by\
    \ 1 position until the index where the new element is to be inserted is reached.\
    \ Now, assign the location with the new value. All the elements before the index\
    \ remain unchanged.\n\n#### Python pseudocode 10.1: Insertion of an element\n\n\
    ```\nLoop i from length-1 to index\n    Assign a[i] to a[i+1]\nAssign the new\
    \ element to a[index]\n```\n\nAnother advantage of using Python lists is that\
    \ functions like this are pre-defined and can be simply called for usage. This\
