    interchanged. For example, an ice tray can hold only ice cubes and an egg tray
    can have only eggs. An array is a collection of variables of the same type. It
    cannot hold variables of different types. All the blocks in an array are of same
    size, as it holds only the same type of variables. A visual representation of
    an array is also shown in Figure 10.3.


    # 10.2.1 Declaration of Arrays


    The position of each memory space is indicated by a number. This is called the
    index or subscript. The memory address of the first location is stored alone in
    the variable declaration, while others are calculated relatively. Say, ‘a’ is
    the name of the array. Then, a[3] = address of a[0] + 3. While declaration, the
    address of a[0], that is the starting address of the array, will be associated
    with the variables name ‘a’ in the internal symbol table. Arrays can also be declared
    using pointers in C or C++ (not in Python and Java, as these do not have pointers).
    This is possible only because arrays are always continuous. So, the initial address
    can be referenced to a pointer and the rest can be used by relative accessing.
    Another way is to allocate a chunk of memory and assign it to a pointer, which
    is known as Dynamic Memory Allocation in C/C++. By using pointers, the limit on
    the number of elements or the size of an array can be removed. Arrays are defined
    in the form of lists. Even though Python doesn’t have pointers, lists are, by
    default, designed in a dynamic way without any limit.


    Some points to be noted about an array include:


    +   - It is a continuous chunk of memory with equally sized blocks.

    - The subscript always begins with 0 and goes till n–1, which is also continuous.'
