    to run the code. (Or, simple, use python filename.py.) There is a catch. If the
    user does not want to execute the instructions by storing them into a Python file,
    is there an option? Yes, there is an option. One can refer to Figure 1.11 to understand
    the way it is done through the IDLE Shell directly.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_22_2.png)


    Figure 1.11 The Shell way.


