  md: "# 11.3 __init__ and __del__\n\nReaders might be aware of what a constructor\
    \ is. If not, think of it in terms of cleaning the plate before taking food to\
    \ consume. That is, we should initialize. A constructor is a method of initializing\
    \ the object when it is created! Means, it gets called automatically.\n\nIn Python,\
    \ __init__ (with double underscores on both sides) is a special method, often\
    \ referred to as a constructor, that is used to initialize objects created from\
    \ a class. It is automatically called when you create a new instance (object)\
    \ of a class. The __init__ method allows you to set initial values for the object's\
    \ attributes.\n\nAn example code is presented below as Figure 11.4 where readers\
    \ can refer to the way in which it can be done.\n\n```\nclass my_class :\n   \
    \ def __init__(self,value_init): # See, first it is self, second is the argument\n\
    \        print (\"\\n I am inside the class method\")\n        self.value_init=value_init\n\
    \        print (\"\\n The Value is\", value_init)\nmy_obj=my_class (16)\n\nPython\
    \ 3.7.3 (v3.7.3:ef4ec6ed12, Mar 25 2019, 21:26:53) [MSC v.1916 32 bit (In 1)]\
    \ on win32\nType \"help\", \"copyright\", \"credits\" or \"license()\" for more\
    \ information.\n>>> \n================ RESTART: F:/Python Playlist/Shriram/class3.py\
    \ ================\n\nI am inside the class method\n\nThe Value is 16\n>>> |\n\
    ```\n\nFigure 11.4 '__init__' usage.\n\nHaving discussed the constructor, it is\
    \ only fair that we also discuss the destructor.\n\nDestructor is just like washing\
    \ the plate after eating food so that someone else can use it. It is opposite\
    \ to the constructor, meaning that whatever is allocated is wiped off completely.\
    \ To accomplish this, Python has __del__ and once the work is complete, this can\
    \ be called.\n\nIt's less commonly used than __init__ and is typically not needed\
    \ in most Python programs. It's important to note that the use of the __del__\
    \ method is often discouraged because it can lead to unpredictable behavior in\
    \ some cases. The garbage collection process in Python is managed automatically."
