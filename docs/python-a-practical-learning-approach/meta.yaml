    # 10.4.3 Priority Queue


    A priority queue in a nutshell is a normal queue with a priority for each element.
    Consider the scenario in Figure 10.20, which is a function hall or theatre with
    seats. But the catch is the first row alone has royal seats, while the other rows
    have normal seats. The royal seats are for special or VIP visitors. The normal
    seats are for the normal people. Here all the people come in a queue, but the
    prioritized members will come to the front, and the normal person will go behind
    all other priority members. It is similar is the priority queue. A priority queue
    maintains priority for each element. It works as a queue with applied priority.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_126_1.png)


