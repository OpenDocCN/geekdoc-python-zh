  md: '# Key Points to Remember


    +   - A data structure is a format for storing the data in an organized manner.

    - Data structure is all about learning how to store and retrieve data in an effective
    and efficient manner.

    - The simplest data structure is an array.

    - Data structures can be classified as primitive and non-primitive data structures.

    - Arrays – Basic linear data structure which stores elements of the same type
    in continuous memory locations.

    - Python lists – List is a class in Python which is implemented as a data structure
    to store a collection of elements of various types in a sequential pattern in
    continuous/non-continuous memory locations.

    - Insertion into a list – The operation of adding a new element into a list.

    - Deletion from a list – The operation of removing an element.

    - Queues are non-primitive linear data structures that follow the FIFO movement
    of data.

    - Queues allow insertion in the REAR pointer and removal in a pointer.

    - There are three types of queues – single-ended queue (one-way motion), double-ended
    queue (two-way motion) and priority queue (multi-level queue).

    - We can zip two lists or tuples together as one with a zip.

    - A dictionary is a built-in data structure that is used to store a collection
    of key-value pairs.


    # Further Reading


    For further learning one can refer to:


    Python official website – https://www.python.org/

    Awesome Python – https://github.com/vinta/awesome-python'
