    **图 10.9** 弹出操作图示。


    #### 10.3.1.3 栈顶（Top）


    栈顶是栈中最简单的操作。它只是返回栈顶的元素，并保持栈不变。同样，当栈为空时，此操作不应工作，否则可能会产生一些内存异常。它完全依赖于 TOP 指针。如果在压入或弹出时维护
    TOP 指针存在任何不一致，此函数将无法按预期工作。栈顶操作在某些流行实现中也称为窥视（peek）操作。


