  md: '# FUNCTIONS – IN AND OUT


    # LEARNING OBJECTIVES


    After reading this chapter, reader will have learned:


    +   - The need for functions

    - Usage of the functions

    - Nested and lambda functions and

    - Some interesting facts and points to remember.


    # 4.1 Introduction


    Functions are one of the most important aspects of any programming language. Functions
    are very important for the following reasons. Functions provide:


    +   - Modularity – One can break a complex issue into a smaller one easily when
    the functions-based approach is followed. This makes the life of a programmer
    a lot easier.

    - Abstraction – Another very important aspect of the functions is that it abstracts
    the implementation details of a particular operation. When someone calls or uses
    the function, there is no need to know how the function has been built.

    - Readability – Well-written functions are always appreciable. It enhances the
    code''s readability and makes the code more self-explanatory.

    - Reusability – The functions also promote code reusability. One need not reinvent
    the wheel. Once a function is written'
  merge: -1
  pgno: 60
- img_proc: true
  md: 'and tested, it can be reused any number of times as required. This will save
    both time and effort.


    +   - Debugging – Functions help in isolating and debugging issues in your code,
    enabling the programmer to focus on the issue much more clearly.

    - Testing – Functions make it easier to write unit tests, as you can test each
    function in isolation. This makes testing both more effective and more efficient.

    - Maintainability – When a situation arises where one needs to make changes or
    improvements to the code, it can be done with ease focusing on one function at
    a time without affecting any other functions.

    - Collaboration – Numerous developers frequently focus on various areas of the
    codebase in larger software development projects. By establishing distinct boundaries
    and interfaces for various software components, functions promote greater collaboration.
    This is the biggest advantage one could cite while using functions.

    - Code organization – Functions facilitate logical code organization. Your program’s
    structure can be easier to manage and comprehend by breaking off similar functionality
    into distinct functions.


    Looking at all the above points, readers would have understood the importance
    of functions. Python supports functions and readers will be provided with all
    of the details in the subsequent sections.


