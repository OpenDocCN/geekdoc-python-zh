    the variable declaration, while others are calculated relatively. Say, ‘a’ is
    the name of the array. Then, a[3] = address of a[0] + 3. While declaration, the
    address of a[0], that is the starting address of the array, will be associated
    with the variables name ‘a’ in the internal symbol table. Arrays can also be declared
    using pointers in C or C++ (not in Python and Java, as these do not have pointers).
    This is possible only because arrays are always continuous. So, the initial address
    can be referenced to a pointer and the rest can be used by relative accessing.
    Another way is to allocate a chunk of memory and assign it to a pointer, which
    is known as Dynamic Memory Allocation in C/C++. By using pointers, the limit on
    the number of elements or the size of an array can be removed. Arrays are defined
    in the form of lists. Even though Python doesn’t have pointers, lists are, by
    default, designed in a dynamic way without any limit.


    Some points to be noted about an array include:


    +   - It is a continuous chunk of memory with equally sized blocks.

    - The subscript always begins with 0 and goes till n–1, which is also continuous.'
  - '[PAGE 111]


    +   - Any memory location can be directly accessed using its subscript.

    - Static arrays have issues like memory wastage and memory leak and has constraints
    over the size. These are overcome by using dynamic arrays, or Dynamic Memory Allocation
    (DMA), using pointers.

    - Since it is a continuous chunk of memory, it has internal issues like fragmentation
    and memory leaks.

    - This is the basic and naive data structure. Many other data structures are built
    using arrays.


    Python lists have properties similar to an array, but don''t require any size
    for declaration. They can continuously grow, with the elements being added into
    it, and are thus designed in a dynamic manner. Hence, lists overcome the problem
    of memory wastage and memory leak of arrays, as only the required memory blocks
    are associated with the list variable. Apart from these properties, Python lists
    have a special property. They can contain data of any types within the same lists,
    which is not possible in generic arrays in other programming languages. Thus,
    Python lists are better than basic array implementation in programming languages
    like C/C++. But a constraint for Python list is, as it is dynamic the elements
    may not be mandatorily stored in consecutive locations. Traditionally, however,
    arrays were designed for continuous memory locations only.


