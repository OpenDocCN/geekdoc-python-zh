    ## About the Authors


    **Dr. T. S. Murugesh** has nearly 24 years’ experience in academia in the fields
    of Analog and Digital Electronics, Automation and Control, IoT, System Design,
    Image Processing, Artificial Intelligence, Machine Learning, Instrumentation and
    Computational Bio-engineering. After a tenure of almost 19 years with the Department
    of Electronics and Instrumentation Engineering, Faculty of Engineering and Technology,
    Annamalai University, Tamil Nadu, India, he is currently working as Associate
    Professor in the Department of Electronics and Communication Engineering, Government
    College of Engineering Srirangam, Tiruchirappalli, Tamil Nadu, India. He has delivered
    several talks at international-level conferences of high repute and has given
    over two dozen invited lectures at the national level in various institutions,
    including Sastra University, Annamalai University, Mahatma Gandhi University,
    Kerala, National Institute of Technology, Tiruchirappalli, and others. He has
    around 50 peer-reviewed indexed papers in journals, including Springer, Springer
    Nature, Elsevier, Wiley, Inderscience, etc. He has organized several Faculty Development
    Programmes at the national level, and is a reviewer for *IEEE*, *Inderscience*
    and many other peer-reviewed journals. He has coauthored five books for CRC Press
    Taylor & Francis Group (UK) and is currently co-authoring one book for Nova Science
    Publishers, USA and two further books for CRC Press.


    He has assumed the role of Mentor, Primary Evaluator for the Government of India’s
    Smart India Hackathon 2022, Toycathon2021, a Judge in the Grand Finale in “Toycathon
    2021”, an evaluator in “The Kavach2023” Cybersecurity Hackathon, organized by
    the Ministry of Home Affairs (MHA) in collaboration with the Ministry of Education’s
    (MoE) Innovation Cell, Government of India. He is a hackathon enthusiast, and
    his team has won First Prize in the CloudFest Hackathon 2 presented by Google
    Cloud, DigitalGov Hack, the Hackathon by WSIS Forum 2023 and Digital Government
    Authority, Saudi Arabia. His team has also won the MSME Idea Hackathon 2.0 and
    received 15 Lakhs funding from MSME (Ministry of Micro, Small and Medium Enterprises)
    Innovative Scheme, Government of India as well as the Second Prize in the IFG
    x TA Hub Hackathon 2022.


    Murugesh is a certified Intel oneAPI Innovator, a Mentor under the “National Initiative
    for Technical Teachers Training” program from AICTE, and the National Institute
    of Technical Teachers Training and Research, and a Certified Microsoft Educator
    Academy Professional. He is also a Master Assessor for a Naan Mudhalvan Program,
    2023, devised by the Government of Tamil Nadu, and a reviewer of B.E./B. Tech
    Technical Books in the Regional Language scheme of AICTE, coordinated by the Centre
    for Development of Tamil in Engineering and Technology, Anna University, Tamil
    Nadu, India. Huawei has recognized him for academic collaboration. He is a Conference
    Committee Member and Publishing Committee Member of the International Association
    of Applied Science and Technology. He is also a member of the Editorial Board
    of the *American Journal of Embedded Systems and Applications*. He has also served
    as Technical Program Committee member for a Springer-sponsored, Scopus-Indexed
    International Conference conducted at Sharda University, India and a Scientific
    Committee Member for an international conference conducted at the Sultanate of
    Oman, as well as a chairperson in an International Hybrid Conference at Mahatma
    Gandhi University Kerala, India. He has held various academic responsibilities
    such as chairman for Anna University Central Valuation, Chief Superintendent for
    the Anna University Theory Examinations and he is presently the Exam Cell Coordinator
    for his institution. He also holds professional body membership within the Institution
    of Engineers (India).


    **Dr. Shriram K. Vasudevan** has over 17 years’ combined experience in industry
    and academia. He holds a Doctorate in Embedded Systems. He has authored/co-authored
    45 books for various publishers, including Taylor & Francis, Oxford University
    Press, and Wiley. He also has been granted 13 patents to date. Shriram is a hackathon
    enthusiast and has received awards from Harvard University, AICITE, CII, Google,
    TDRA Dubai, the Government of Saudi Arabia, the Government of India and many more.
    He has published more than 150 research articles. He was associated with L&T Technology
    Services before taking up his current role with Intel. Shriram Vasudevan runs
