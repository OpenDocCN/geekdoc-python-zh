    so handy if you have many lines for execution.

    Yes, take a deep breath. The first file is executed.


    ## 1.4 Learn the Fundamentals – With the Numbers


    Python is very easy to learn and use. Spaces between the numbers and operators
    are not mandatory! It is for enhanced readability and nothing else. One can have
    a look at Figure 1.12 to understand the point conveyed.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_23_0.png)


    As a next step, Let’s try dividing a number by zero. (This is interesting.) Have
    you heard of the divide by zero error! Here you go. 10 when divided by 2 is correct
    and the results appear in front. But, when 10 is divided by 0, it is an error.
    Zero division error shall be presented, and this is to be known. One can refer
    to Figure 1.13 for the same.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_23_1.png)


    It is time to do simple multiplication and addition. One can see the multiplication
    and division examples presented as in Figure 1.14.

    Let us go ahead and do division again but this time with quotient and remainder.
    One should use // to get the quotient and % to get the remainder. Also, one should
    note that this works fine with both int and float types (Figure 1.15).


    ## 10 PYTHON


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_24_0.png)


    Figure 1.14 Multiplication and addition examples.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_24_1.png)


    Figure 1.15 Division with quotient and remainder.


    Can we learn the variables now? Yes, it is very important for anyone to learn
    this. It is all automatic here. This means that the memory allocation happens
    as soon as a value is assigned to a variable.


    - Name of the variable = value to be stored in the variable.


    An example is handy as always and is presented as in Figure 1.16. The code now
    has value assigned with an integer, followed by miles assigned with float and
    name with a string. This is the beauty of Python; it is automatic, you need not
    specify what the data type is. The output for the code shown in Figure 1.16 is
    presented as in Figure 1.17.


    ```

    1 value = 99 # See, assigned with an integer.

    2 miles = 999.9 # Assigned with a float.

    3 name = "Shriram Vasudevan" # A string

    4 print (value)

    5 print (miles)

    6 print (name)

    ```


    Figure 1.16 Variables in Python.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_25_0.png)


    Figure 1.17 Output for the code shown as Figure 1.16.


    It is important to have a quick recap on the data types too:


    - Any number like 1,2,4,100 can be called an integer.

    - Bigger numbers like 468364387643864 should be called with respect. Means, it
    should be called Long Integers. Long integers should be represented by using l
    or L as a suffix!

    - Any number such as 3.25 or 1.258 should be called a floating point number.

    - Complex numbers are also supported. These look like 10 + 8i or –9 + 7i.


    Let us navigate to the strings. Whatever is presented inside the single quote
    can be regarded as a string. An instance is ‘Hello, World!’, this is a string.
    One can understand from Figure 1.18 how strings work with Python.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_25_1.png)


    Figure 1.18 Single quote and strings with Python.


    Not only single quotes; double quotes are also fine for strings. “Hello, World!”
    is the same as ‘Hello, World!’ and one can refer to the screenshot presented below
    in Figure 1.19 with which readers can understand the scenario. Nevertheless, one
    thing to understand here is that one cannot mix up single quotes with double quotes
    and it would not work then.


    ## 12 PYTHON


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_26_0.png)


    Figure 1.19 Double quote and strings with Python.


    Can we investigate triple quotes as an option? Do we even have triple quotes?
    One can include as many lines as possible (statements) with triple quotes being
    used. One can refer to Figure 1.20 to understand this concept.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_26_1.png)


    Figure 1.20 Triple quotes and strings with Python.


    One can go ahead with concatenation of strings easily with Python. One can refer
    to Figure 1.21 to understand the string concatenation process. There is also an
    error, which is purposefully made, and the same is presented for the readers''
    perusal. One can see the purposeful error and the solution presented to understand
    the error.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_26_2.png)


    Figure 1.21 String concatenation with Python.


    Can we learn unicode in Python? When you want to include the non-ASCII characters
    or your native language script as part of your program you must use “u”. This
    means unicode. An example as always is handy and presented below in Figure 1.22
    followed by the output presented in Figure 1.23.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_27_0.png)


    **Figure 1.22** Unicode in Python.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_27_1.png)


    **Figure 1.23** Output for the code presented in Figure 1.22.


    However, one should also have a look at the code presented as Figure 1.24, which
    would certainly fail and the results are presented as in Figure 1.25.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_27_2.png)


    **Figure 1.24** Unicode usage – Failure scenario.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_27_3.png)


    **Figure 1.25** Execution results for the code presented as Figure 1.24.


    The escape sequences are the one to be discussed next and the sample code is presented
    in Figure 1.26, where all the escape sequences are included in the code. The results
    are presented in Figure 1.27 and one can refer to the same for enhanced understanding.


    ```

    1 print ("\n")

    2 tab_seq = "\t here you go with tab"

    3 new_line = "India is \n my country"

    4 back_space="Baa\bck space"

    5 back_slash=""

    6 form_feed="Hello \fworld"

    7 single_quote="\''"

    8 double_quote="""

    9 bell_ring="\a bell rings"

    10 print (tab_seq)

    11 print (new_line)

    12 print (back_space)

    13 print (form_feed)

    14 print (single_quote)

    15 print (double_quote)

    16 print (bell_ring)

    17 print (back_slash)

    ```


    **Figure 1.26** Escape sequences.


    ![](img/6aa6b653b3315fe4a7189de2de1d4867_28_0.png)


    **Figure 1.27** Execution result for the code presented in Figure 1.26.


    Well, the first chapter is complete. Readers are expected to try these out practically.
