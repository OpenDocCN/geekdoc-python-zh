    print(lemmatized_words)\n```\n\n### 使用spaCy构建和训练NLP模型\n\nspaCy是另一个流行的Python NLP库，它为各种NLP任务（如分词、命名实体识别、依存句法分析和文本分类）提供了易于使用的接口。\n\
    \n以下是一个演示如何使用spaCy构建和训练NLP模型的示例：\n\n```\nimport spacy\nfrom spacy.lang.en import\
