    ```\n\n在这个示例中，我们创建了一个新的Flask应用，并将其配置为使用SQLite数据库。然后我们使用SQLAlchemy定义了一个User模型，这将在数据库中创建一个新表。最后，我们定义了首页的路由并运行了应用。"
