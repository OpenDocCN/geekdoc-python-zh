    \ [vim.VirtualMachine], True)\nfor vm in vm_view.view:\n    print(vm.name)\n```"
  mdcn: "## 第20章：自动化测试与持续集成\n\n在本示例中，我们定义了一个包含三个阶段——构建、测试和部署——的Jenkins流水线。`agent any`指令指定该流水线可以在任何可用的代理（即机器）上运行。\n\
    \n在构建阶段，我们使用`sh`步骤运行`python setup.py build`命令，该命令用于构建Python包。\n\n在测试阶段，我们使用`sh`步骤运行`pytest`命令，该命令会运行项目中的所有测试。\n\
    \n在部署阶段，我们使用`sh`步骤运行`python setup.py sdist`命令，该命令会创建包的源代码分发包。然后，我们使用`twine upload`命令将包上传到包仓库，例如PyPI。\n\
    \nGitLab是一个基于Web的Git仓库管理器，提供持续集成和部署功能。\n\n以下是一个使用GitLab自动化构建和部署过程的`.gitlab-ci.yml`文件示例：\n\
    \n```yaml\nimage: python:3.8\n\nstages:\n- build\n- test\n- deploy\n\nvariables:\n\
    \  PYPI_SERVER: https://test.pypi.org/legacy/\n  PYPI_USER_NAME: __token__\n \
    \ PYPI_PASSWORD: $TEST_PYPI_TOKEN\n\nbefore_script:\n- pip install -r requirements.txt\n\
    \nbuild:\n  stage: build\n  script:\n  - python setup.py sdist bdist_wheel\n\n\
    test:\n  stage: test\n  script:\n  - pytest\n\ndeploy:\n  stage: deploy\n  script:\n\
    \  - pip install twine\n  - twine upload --repository-url $PYPI_SERVER -u $PYPI_USER_NAME\
    \ -p $PYPI_PASSWORD\n  only:\n  - tags\n```\n\n在此示例中，我们定义了三个阶段：构建、测试和部署。构建阶段使用`setup.py`构建Python包，测试阶段使用`pytest`运行测试，部署阶段使用`twine`将包部署到PyPI仓库。\n\
    \n我们还定义了一些用于PyPI服务器URL、用户名和密码的变量。这些变量在部署阶段用于身份验证并将包上传到PyPI仓库。\n\n部署阶段中的`only:\
    \ - tags`部分确保部署仅针对带标签的提交进行。这是确保只有稳定版本才会部署到PyPI仓库的常见做法。\n\n## 结论\n\n自动化测试和持续集成是现代软件开发的重要组成部分。Python提供了两个内置的测试框架——`unittest`和`pytest`——允许开发者编写和运行自动化测试以验证其代码的功能。Jenkins和GitLab是自动化构建和部署过程的流行工具。\n\
    \n## 第21章：使用Python构建聊天机器人\n\n### 聊天机器人与对话式AI简介\n\n近年来，聊天机器人因其提供快速高效客户支持的能力而日益普及。聊天机器人可以与Slack、Facebook\
    \ Messenger和Telegram等消息平台集成，并可以通过自然语言处理（NLP）和机器学习技术进行训练，以理解和响应用户查询。在本章中，我们将探讨如何使用Python和Rasa等自然语言处理框架来构建聊天机器人。\n\
    \n### 使用Python构建聊天机器人\n\n要使用Python构建聊天机器人，我们可以使用Rasa框架，这是一个开源的NLP框架，允许开发者构建和训练聊天机器人。Rasa框架提供了预构建的组件，用于处理聊天机器人的不同部分，如理解用户输入、存储和检索数据以及生成响应。\n\
    \n以下是如何使用Rasa构建一个简单聊天机器人的示例：\n\n1.  安装Rasa框架：\n    `pip install rasa`\n2.  使用Rasa\
    \ CLI创建一个新项目：\n    `rasa init --no-prompt`\n3.  在`domain.yml`文件中定义聊天机器人的领域。此文件定义了聊天机器人的意图、实体、动作和响应。\n\
    \n```yaml\nintents:\n- greet\n- goodbye\n- inform\n\nresponses:\n  utter_greet:\n\
    \  - text: \"Hello! How can I assist you?\"\n  utter_goodbye:\n  - text: \"Goodbye!\
    \ Have a nice day.\"\n  utter_default:\n  - text: \"Sorry, I don't understand.\
    \ Can you please rephrase your question?\"\n```\n\n4.  在`config.yml`文件中定义聊天机器人的NLU（自然语言理解）管道。此文件定义了聊天机器人将用于理解用户输入的NLP管道。\n\
    \n```yaml\nlanguage: en\n\npipeline:\n- name: WhitespaceTokenizer\n- name: RegexFeaturizer\n\
    - name: CRFEntityExtractor\n- name: EntitySynonymMapper\n- name: CountVectorsFeaturizer\n\
    - name: EmbeddingIntentClassifier\n```\n\n5.  使用`rasa train`命令训练你的聊天机器人：\n   \
    \ `rasa train`\n6.  使用`rasa shell`命令启动你的聊天机器人：\n    `rasa shell`\n\n### 将聊天机器人与消息平台集成\n\
    \n一旦我们使用Python构建了聊天机器人，我们就可以将其与Slack和Telegram等消息平台集成。以下是如何将聊天机器人与Slack集成的示例：\n\
    \n1.  在Slack API控制台中创建一个新的Slack应用和机器人用户。\n2.  安装`slack-sdk`和`slack-bolt` Python包：\n\
    \    `pip install slack-sdk slack-bolt`\n3.  将你的Slack机器人凭证定义为环境变量：\n    `export\
    \ SLACK_APP_TOKEN=<your-app-token>`\n    `export SLACK_BOT_TOKEN=<your-bot-token>`\n\
    4.  在Python中定义你的机器人的事件监听器和消息处理器：\n\n```python\nfrom slack_bolt import App\nfrom\
    \ slack_bolt.adapter.socket_mode import SocketModeHandler\nimport os\n\napp =\
    \ App(token=os.environ[\"SLACK_BOT_TOKEN\"])\n\n@app.event(\"app_mention\")\n\
    def handle_mention(event, say):\n    say(\"Hello! How can I assist you?\")\n\n\
    if __name__ == \"__main__\":\n    handler = SocketModeHandler(app_token=os.environ[\"\
    SLACK_APP_TOKEN\"], app=app)\n    handler.start()\n```\n\n5.  使用python命令启动你的机器人：\n\
    \    `python app.py`\n\n### 结论\n\n在本章中，我们探讨了如何使用Python和Rasa框架构建聊天机器人。我们还研究了如何将聊天机器人与Slack和Telegram等消息平台集成。聊天机器人的使用正变得越来越流行，因为它们可用于自动化客户服务与支持、销售和市场营销。通过使用自然语言处理和机器学习，聊天机器人可以为用户提供更个性化和高效的交互。\n\
    \n## 第22章：自动化虚拟化与容器化\n\n### 虚拟化与容器化简介\n\n本书第22章涵盖了使用Python进行虚拟化和容器化自动化的主题。我们将讨论这些技术在现代软件开发中的重要性，以及如何使用Python自动化虚拟机和容器的创建，以及如何使用Python\
    \ API管理虚拟化和容器化平台。\n\n### 虚拟化与容器化\n\n虚拟化和容器化是允许多个操作系统在单台物理机器上运行的技术。虚拟化涉及在单台物理机器上运行多个虚拟机，而容器化涉及在单个主机操作系统上运行多个容器。这些技术很重要，因为它们提供了隔离性、灵活性和可扩展性。\n\
    \n### 自动化虚拟机和容器的创建\n\nPython可用于自动化虚拟机和容器的创建。例如，我们可以使用Python通过VMware或VirtualBox等提供商创建新的虚拟机。我们也可以使用Python通过Docker创建新的容器。\n\
    \n以下是一个示例代码片段，演示如何使用Docker SDK for Python创建一个新容器：\n\n```python\nimport docker\n\
    \nclient = docker.from_env()\ncontainer = client.containers.run(\"ubuntu\", command=\"\
    echo Hello, world!\")\n```\n\n### 管理虚拟化和容器化平台\n\nPython也可以用于通过各自的API管理虚拟化和容器化平台。例如，我们可以使用VMware\
    \ API管理虚拟机，或使用Docker API管理容器。\n\n以下是一个示例代码片段，演示如何使用VMware vSphere API列出所有虚拟机：\n\
    \n```python\nfrom pyVmomi import vim\nfrom pyVim import connect\n\nsi = connect.SmartConnectNoSSL(host=\"\
    hostname\", user=\"username\", pwd=\"password\")\ncontent = si.RetrieveContent()\n\
    vm_view = content.viewManager.CreateContainerView(content.rootFolder, [vim.VirtualMachine],\
    \ True)\nfor vm in vm_view.view:\n    print(vm.name)\n```"
