    \n```python\nimport librosa\n\n# Load an audio file\naudio_file = 'path/to/audio_file.wav'\n\
    audio_data, sample_rate = librosa.load(audio_file)\n```\n\n在上面的代码中，`librosa.load()`函数用于加载音频文件。该函数返回两个值：音频数据和采样率。音频数据是一维的音频样本数组，采样率是每秒的样本数。\n\
