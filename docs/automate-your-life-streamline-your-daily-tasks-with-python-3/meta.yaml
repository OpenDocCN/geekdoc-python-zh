    \n要运行该程序，请在Visual Studio Code中通过菜单选择“终端” > “新建终端”来打开终端。在终端中，使用`cd`命令导航到保存`hello.py`文件的目录。进入目录后，输入以下命令来运行程序：\n\
    \n```bash\npython hello.py\n```\n\n这将执行`hello.py`程序，您应该会在控制台看到打印出的消息\"Hello, World!\"\
    。\n\n恭喜，您刚刚编写并运行了您的第一个Python程序！在下一章中，我们将学习更多关于Python语言的基础知识，包括变量、数据类型和运算符。\n\n\
    ## 第2章：处理文件和目录\n\n处理文件和目录是任何编程语言（包括Python）的基本组成部分。在本章中，我们将学习如何在Python中创建、删除和重命名文件和目录，复制和移动文件和目录，以及读写文件。\n\
    \n### 创建、删除和重命名文件和目录\n\n要在Python中创建一个新文件，我们可以使用`open()`函数并指定`'w'`模式，代表写入。以下是一个示例：\n\
    \n```python\nf = open('myfile.txt', 'w')\nf.write('Hello, World!')\nf.close()\n\
    ```\n\n此代码将在当前工作目录中创建一个名为`'myfile.txt'`的新文件，并将字符串`'Hello, World!'`写入该文件。\n\n要在Python中删除一个文件，我们可以使用`os.remove()`函数。以下是一个示例：\n\
    \n```python\nimport os\n\nif os.path.exists('myfile.txt'):\n    os.remove('myfile.txt')\n\
    else:\n    print(\"The file does not exist\")\n```\n\n此代码将检查文件`'myfile.txt'`是否存在于当前工作目录中。如果存在，它将使用`os.remove()`函数删除该文件。如果文件不存在，它将打印一条消息说明文件不存在。\n\
    \n要在Python中重命名一个文件，我们可以使用`os.rename()`函数。以下是一个示例：\n\n```python\nimport os\n\n\
    if os.path.exists('myfile.txt'):\n    os.rename('myfile.txt', 'newfile.txt')\n\
    else:\n    print(\"The file does not exist\")\n```\n\n此代码将检查文件`'myfile.txt'`是否存在于当前工作目录中。如果存在，它将使用`os.rename()`函数将文件重命名为`'newfile.txt'`。如果文件不存在，它将打印一条消息说明文件不存在。\n\
    \n要在Python中创建一个新目录，我们可以使用`os.mkdir()`函数。以下是一个示例：\n\n```python\nimport os\n\nif\
    \ not os.path.exists('mydir'):\n    os.mkdir('mydir')\nelse:\n    print(\"The\
    \ directory already exists\")\n```\n\n此代码将检查目录`'mydir'`是否存在于当前工作目录中。如果不存在，它将使用`os.mkdir()`函数创建一个名为`'mydir'`的新目录。如果目录已存在，它将打印一条消息说明目录已存在。\n\
    \n### 复制和移动文件和目录\n\n要在Python中复制一个文件，我们可以使用`shutil.copy()`函数。以下是一个示例：\n\n```python\n\
    import shutil\nshutil.copy('myfile.txt', 'mydir/newfile.txt')\n```\n\n此代码将把文件`'myfile.txt'`从当前工作目录复制到目录`'mydir'`中，并命名为`'newfile.txt'`。\n\
    \n要在Python中移动一个文件，我们可以使用`shutil.move()`函数。以下是一个示例：\n\n```python\nimport shutil\n\
    shutil.move('myfile.txt', 'mydir/newfile.txt')\n```\n\n此代码将把文件`'myfile.txt'`从当前工作目录移动到目录`'mydir'`中，并命名为`'newfile.txt'`。\n\
    \n### 读写文件\n\n要在Python中从文件读取内容，我们可以使用`open()`函数并指定`'r'`模式，代表读取。以下是一个示例：\n\n```python\n\
    f = open('myfile.txt', 'r')\ncontent = f.read()\nprint(content)\nf.close()\n```\n\
    \n此代码将以读取模式打开当前工作目录中的文件`'myfile.txt'`，使用`read()`函数读取文件内容，并将其打印到控制台，然后使用`close()`函数关闭文件。\n\
    \n要在Python中写入文件，我们可以使用`open()`函数并指定`'w'`模式，代表写入。以下是一个示例：\n\n```python\nf = open('myfile.txt',\
    \ 'w')\nf.write('Hello, World!')\nf.close()\n```\n\n此代码将以写入模式打开当前工作目录中的文件`'myfile.txt'`，使用`write()`函数将字符串`'Hello,\
    \ World!'`写入文件，然后使用`close()`函数关闭文件。\n\n我们也可以使用循环逐行读取文件。以下是一个示例：\n\n```python\n\
    f = open('myfile.txt', 'r')\nfor line in f:\n    print(line)\nf.close()\n```\n\
    \n此代码将以读取模式打开当前工作目录中的文件`'myfile.txt'`，循环遍历文件中的每一行，将该行打印到控制台，然后使用`close()`函数关闭文件。\n\
    \n总之，处理文件和目录是Python编程的基本组成部分。在本章中，我们学习了如何在Python中创建、删除和重命名文件和目录，复制和移动文件和目录，以及读写文件。掌握了这些知识，您现在可以轻松地在Python程序中操作文件和目录了。\n\
    \n## 第3章：自动化电子邮件任务\n\n电子邮件是当今最常用的通信形式之一，常用于自动化任务，如发送警报、报告和通知。在本章中，我们将探讨如何使用Python自动化电子邮件任务，例如发送电子邮件、向电子邮件添加附件以及解析和过滤电子邮件消息。\n\
    \n### 使用Python发送电子邮件\n\n在Python中发送电子邮件相对简单。我们可以使用内置的`smtplib`库连接到邮件服务器并发送电子邮件。以下是一个示例：\n\
    \n```python\nimport smtplib\nfrom email.mime.text import MIMEText\n```"
