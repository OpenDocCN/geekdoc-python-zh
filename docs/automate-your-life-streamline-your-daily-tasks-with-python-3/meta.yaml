    \ using the `os.mkdir()` function. If the directory already exists, it will print\
    \ a message saying that the directory already exists.\n\n### Copying and moving\
    \ files and directories\n\nTo copy a file in Python, we can use the `shutil.copy()`\
    \ function. Here is an example:\n\n```python\nimport shutil\nshutil.copy('myfile.txt',\
    \ 'mydir/newfile.txt')\n```\n\nThis code will copy the file ‘myfile.txt’ from\
    \ the current working directory to the directory ‘mydir’ with the name ‘newfile.txt’.\n\
    \nTo move a file in Python, we can use the `shutil.move()` function. Here is an\
    \ example:\n\n```python\nimport shutil\nshutil.move('myfile.txt', 'mydir/newfile.txt')\n\
    ```\n\nThis code will move the file ‘myfile.txt’ from the current working directory\
    \ to the directory ‘mydir’ with the name ‘newfile.txt’.\n\n### Reading and writing\
    \ to files\n\nTo read from a file in Python, we can use the `open()` function\
    \ with the 'r' mode, which stands for read. Here is an example:\n\n```python\n\
    f = open('myfile.txt', 'r')\ncontent = f.read()\nprint(content)\nf.close()\n```\n\
    \nThis code will open the file ‘myfile.txt’ in the current working directory in\
