- md: "Now we can open text files for reading by calling `reader(*filename*)` and\
    \ for writing by calling `writer(*filename*)`.\n\nOne basic use case for partial\
    \ function application is in GUI (Graphical User Interface) programming where\
    \ it is regularly convenient to have one specific function called when any of\
    \ a lot of buttons is pressed. For instance:\n\n```python\nloadButton = tkinter.Button(frame,\
    \ text=\"Load\",\ncommand=functools.partial(doAction, \"load\"))\n\nsaveButton\
    \ = tkinter.Button(frame, text=\"Save\",\ncommand=functools.partial(doAction,\
    \ \"save\"))\n```\n\nThe example applies the tkinter GUI library that is a standard\
    \ one on Python.\n\nThe `tkinter.Button` class is used to draw buttons—here we\
    \ have created two, both are kept inside the same frame, and each of them has\
    \ a text that indicates their purpose.\n\nEvery button’s `command` argument is\
    \ set to the name of the function that tkinter must call when the button is activated,\
    \ in this case the `doAction()` function. We used partial function application\
    \ to make sure that the first argument for the `doAction()` function will be a\
    \ string that indicates which button called it.\n\n## COROUTINES\n\nCoroutines\
    \ are functions whose execution can be suspended and continued at explicit points.\
    \ In this way, ordinarily, a coroutine will execute up to a specific expression,\
    \ at that point suspend execution while waiting for certain data. Now different\
    \ pieces of the program can keep on executing (normally different coroutines that\
    \ aren't suspended). When the data is received the coroutine resumes from the\
    \ point it was suspended, performs processing (probably dependent on the data\
    \ it got), and perhaps sending its results to another coroutine. Coroutines are\
    \ said to have different entry and exit points, since they can have more than\
    \ one spot where they suspend and continue.\n\nCoroutines are useful when we need\
    \ to apply various functions to similar bits of data, or when we need to make\
    \ data handling pipelines, or when we need to have a master function with slave\
    \ functions. Coroutines can likewise be utilized to provide simpler and lower-overhead\
    \ alternatives to threading. A few coroutine-based packages that provide lightweight\
    \ threading are accessible from the Python Package Index, pypi.python.org/pypi.\n\
    \nIn Python, a coroutine is a function that takes its input from a `yield` expression.\
    \ It might likewise send results to a receiver function (which itself must be\
    \ a coroutine). At whatever point a coroutine arrives at a `yield` expression\
    \ it suspends waiting for data; and once it gets data, it resumes execution starting\
    \ there. A coroutine can have more than one `yield` expression, albeit each of\
    \ the coroutine models we will audit has just one.\n\n## PERFORMING INDEPENDENT\
    \ ACTIONS ON DATA\n\nOn the off chance that we need to play out a lot of independent\
    \ actions on certain data, the ordinary methodology is to apply every action thus.\
    \ The weakness of this is in the event that one of the tasks is moderate, the\
    \ program in general should trust that the action will finish before going on\
    \ to the following one. An answer for this is to utilize coroutines. We can execute\
    \ every action as a coroutine and afterward start them all off. In the event that\
    \ one is moderate it won't influence the others—in any event not until they come\
    \ up short on data to process—since they all work autonomously.\n\nThe figure\
    \ below illustrates the use of coroutines for concurrent processing. In the figure,\
    \ three coroutines (each presumably doing a different job) process the same two\
    \ data items—and take different amounts of time to do their work. In the figure,\
    \ `coroutine1()` works quite quickly, `coroutine2()` works slowly, and `coroutine3()`\
    \ varies. Once all three coroutines have been given their initial data to process,\
    \ if one is ever waiting (because it finishes first), the others continue to work,\
    \ which minimizes processor idle time. Once we are finished using the coroutines\
    \ we call `close()` on each of them; this stops them from waiting for more data,\
    \ which means they won’t consume any more processor time.\n\n| Step | Action |\
    \ coroutine1() | coroutine2() | coroutine3() |\n| :--- | :--- | :--- | :--- |\
    \ :--- |\n| 1 | Create coroutines | Waiting | Waiting | Waiting |\n| 2 | coroutine1.send(\"\
    a\") | Process \"a\" | Waiting | Waiting |\n| 3 | coroutine2.send(\"a\") | Process\
    \ \"a\" | Process \"a\" | Waiting |\n| 4 | coroutine3.send(\"a\") | Waiting |\
