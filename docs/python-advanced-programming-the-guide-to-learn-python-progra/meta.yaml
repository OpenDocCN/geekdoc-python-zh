  mdcn: "Python 3 的一个令人惊叹的理念是，它明确区分了原始字节和字符串。然而，这有时会导致在传递字节对象而非期望的字符串对象（或反之）时，发生意外的异常。例如：\n\
    \n```\nTraceback (most recent call last):\n\nFile \"program.py\", line 918, in\
    \ <module>\n    print(datetime.datetime.strptime(date, format))\n\nTypeError:\
    \ strptime() argument 1 must be str, not bytes\n```\n\n遇到此类问题时，我们可以选择进行转换——例如，传递\
    \ `date.decode(\"utf8\")`——或者仔细回溯，找出变量为何是字节对象而非字符串对象，并在源头修复问题。\n\n如果我们传递的是字符串而期望的是字节，错误信息则不那么明确，并且在\
    \ Python 3.0 和 3.1 之间有所不同。例如，在 Python 3.0 中：\n\n```\nTraceback (most recent call\
    \ last):\n\nFile \"program.py\", line 2139, in <module> data.write(info)\n\nTypeError:\
    \ expected an object with a buffer interface\n```\n\n在 Python 3.1 中，错误信息的文本略有改进：\n\
    \n```\nTraceback (most recent call last):\n\nFile \"program.py\", line 2139, in\
    \ <module> data.write(info)\n\nTypeError: 'str' does not have the buffer interface\n\
    ```\n\n在这两种情况下，问题都在于我们传递的是字符串，而期望的是字节、字节数组或类似对象。我们可以选择进行转换——例如，传递 `info.encode(\"\
    utf8\")`——或者回溯找出问题的根源并加以修复。\n\nPython 3.0 引入了异常绑定支持——这意味着基于另一个异常引发的异常可以包含原始异常的详细信息。当一个绑定的异常未被捕获时，回溯信息不仅包含未捕获的异常，还包含导致它的异常（如果它被绑定的话）。处理绑定异常的方法与之前几乎相同：我们从末尾开始，反向追溯，直到在我们自己的代码中找到问题。然而，我们可能需要对每个绑定的异常重复此过程，直到找到问题的真正根源。\n\
    \n我们可以在自己的代码中利用异常绑定——例如，如果我们想使用自定义异常类，同时又希望底层问题可见。\n\n```python\nclass InvalidDataError(Exception):\
    \ pass\n\ndef process(data):\n    try:\n        i = int(data)\n        ...\n \
    \   except ValueError as err:\n        raise InvalidDataError(\"Invalid data received\"\
    ) from err\n```\n\n现在，`int()` 转换失败，`ValueError` 被引发并捕获。然后我们调用自定义异常，但使用了 `from\
    \ err`，这创建了一个链式异常。如果异常被引发但未被捕获，回溯信息将如下所示：\n\n```\nTraceback (most recent call\
    \ last):\n  File \"application.py\", line 249, in process i = int(data)\nValueError:\
    \ invalid literal for int() with base 10: '17.5 '\n\nThe above exception was the\
    \ direct cause of the following exception:\n\nTraceback (most recent call last):\n\
    \  File \"application.py\", line 288, in <module> print(process(line))\n  File\
    \ \"application.py\", line 283, in process\n    raise InvalidDataError(\"Invalid\
    \ data received\") from err\n__main__.InvalidDataError: Invalid data received\n\
    ```\n\n我们自定义异常的基类和消息阐明了问题所在，其上方的行显示了异常被引发的位置（第 283 行）以及导致它的位置（第 288 行）。然而，我们还可以进一步回溯到绑定的异常，它提供了关于具体错误的更多细节，并显示了触发自定义异常的行（第\
    \ 249 行）。\n\n## 科学调试\n\n如果我们的程序运行了，但没有表现出预期或期望的行为，那么我们就有了一个 bug——一个逻辑错误——需要消除。消除此类错误的最佳方法是通过使用\
    \ TDD（测试驱动开发）来防止它们发生。然而，一些 bug 总会漏网，因此即使使用了 TDD，调试仍然是一项需要学习的关键技能。\n\n在本小节中，我们将概述一种基于科学方法的调试方法。该方法解释得非常详细，以至于处理一个“简单”的\
    \ bug 似乎工作量过大。然而，通过严格遵循该过程，我们将避免在“随机”调试上浪费时间，过一段时间后，我们将内化该过程，从而能够无意识地、快速地进行调试。\n\
    \n要修复一个 bug，我们需要能够……\n\n- 1. 复现它。\n- 2. 定位它。\n- 3. 修复它。\n- 4. 测试。\n\n复现 bug 有时很简单——它通常在每次运行时都会发生；有时则很困难——它偶尔发生。无论哪种情况，我们都应该尝试缩小\
    \ bug 的条件，即找到仍然能产生 bug 的最小输入和最少处理量。\n\n一旦我们能够复现 bug，我们就拥有了应用科学方法来查找和修复它所需的数据——输入数据、选项和错误结果。\n\
    \n运行分析应该能找出 bug，并且还应该让我们对解决方案有所了解。（我们很快会回到如何创建和运行分析。）一旦我们确定了如何消除 bug——并且已经将我们的代码提交到版本控制系统中，以便在必要时回滚修复——我们就可以编写修复代码。\n\
    \n当修复就位后，我们应该对其进行测试。通常，我们应该测试以检查预期修复的 bug 是否已消失。但这还不够；毕竟，我们的修复可能解决了我们关注的 bug，但修复也可能引入了另一个\
    \ bug，影响程序的其他部分。因此，除了测试 bug 修复本身，我们还应该运行程序的所有测试，以增加我们对修复没有产生任何不良副作用的信心。\n\n一些\
    \ bug 具有特定的结构，因此每当我们修复一个 bug 时，都值得询问程序或其模块中是否还有其他地方可能存在类似的 bug。如果有，我们可以检查是否已有测试能在这些\
    \ bug 存在时发现它们；如果没有，我们应该添加此类测试；如果这揭示了 bug，那么我们应该如前所述处理它们。\n\n既然我们已经对调试过程有了很好的概述，我们将专注于如何创建和运行分析来检验我们的假设。我们从尝试隔离\
    \ bug 开始。根据程序和 bug 的性质，我们或许可以编写测试来运行程序，例如，向其提供已知能被正确处理的数据，并逐步修改数据，以便我们能准确找出处理失败的位置。一旦我们对问题所在有了想法——无论是通过测试还是基于推理——我们就可以检验我们的假设。\n\
    \n我们可能会提出什么样的假设？嗯，最初可能很简单，比如怀疑某个特定函数或方法在使用某些输入数据和选项时返回了错误的信息。然后，如果这个假设被证明是正确的，我们可以将其细化得更具体——例如，确定函数中我们认为在特定情况下执行了错误计算的特定语句或代码块。\n\
    \n为了检验我们的假设，我们需要在函数返回之前检查它接收的参数、其局部变量的值以及返回值。然后，我们可以使用已知会产生错误的数据运行程序，并检查可疑函数。如果传入函数的参数不是我们预期的，那么问题很可能在调用栈的更上层，因此我们现在需要重新开始这个过程，这次假设调用我们正在查看的函数的那个函数有问题。然而，如果所有传入的参数始终……"
