  mdcn: "## 处理运行时错误\n\n万一运行时发生未处理的异常，Python 将停止执行我们的程序并打印回溯信息。以下是一个未处理异常的回溯示例：\n\n\
    ```\nTraceback (most recent call last):\n\nFile \"blocks.py\", line 392, in <module>\
    \ main()\n\nFile \"blocks.py\", line 381, in main\n\nblocks = parse(blocks)\n\n\
    File \"blocks.py\", line 174, in recursive_descent_parse return data.stack[1]\n\
    \nIndexError: list index out of range\n```\n\n像这样的回溯（也称为回溯信息）应该从最后一行开始向前阅读到第一行。最后一行指明了发生的未处理异常。在此行之上，显示了文件名、行号和函数名，以及导致异常的代码行（分布在两行上）。如果引发异常的函数是由另一个函数调用的，那么该函数的文件名、行号、函数名和调用行会显示在更前面。同样，如果那个函数又是由另一个函数调用的，情况也一样，一直追溯到调用栈的起点。（注意，回溯中的文件名带有路径，但为了清晰起见，我们在示例中通常省略了路径。）\n\
    \n因此，在这个例子中，发生了一个 `IndexError`，这意味着 `data.stack` 是某种序列，但在位置 1 没有元素。错误发生在 `blocks.py`\
    \ 程序的 `recursive_descent_parse()` 函数的第 174 行，因此该函数是在 `main()` 函数的第 381 行被调用的。（函数名在第\
    \ 381 行不同，即 `parse()` 而不是 `recursive_descent_parse()`，是因为 `parse` 变量根据传递给程序的命令行参数被设置为几个不同函数中的一个；在正常情况下，名称总是匹配的。）对\
    \ `main()` 的调用发生在第 392 行，这是程序执行开始的语句。\n\n尽管一开始回溯看起来可能令人生畏，但现在我们理解了它的结构，就很容易看出它是多么有用。在这种情况下，它准确地告诉了我们去哪里寻找问题，尽管显然我们需要自己弄清楚解决方案是什么。\n\
    \n以下是另一个回溯示例：\n\n```\nTraceback (most recent call last):\n\nFile \"blocks.py\"\
    , line 392, in <module>\n    main()\n\nFile \"blocks.py\", line 383, in main\n\
    \    if BlockOutput.save_blocks_as_svg(blocks, svg):\n\nFile \"BlockOutput.py\"\
    , line 141, in save_blocks_as_svg\n\nwidths, rows = compute_widths_and_rows(cells,\
    \ SCALE_BY) File \"BlockOutput.py\", line 95, in compute_widths_and_rows\n\nwidth\
    \ = len(cell.text) // cell.columns ZeroDivisionError: integer division or modulo\
    \ by zero\n```\n\n现在，问题发生在一个被 `blocks.py` 程序调用的模块（`BlockOutput.py`）中。这个回溯引导我们找到问题变得*明显*的地方，但不是问题*发生*的地方。\n\
    \n在 `BlockOutput.py` 模块的 `compute_widths_and_rows()` 函数的第 95 行，`cell.columns`\
    \ 的值显然是 0——毕竟，这就是引发 `ZeroDivisionError` 异常的原因——但我们需要查看前面的行，以找出 `cell.columns`\
    \ 被赋予这个错误值的位置和原因。\n\n有时回溯会揭示发生在 Python 标准库或第三方库中的异常。尽管这可能意味着库中存在错误，但在几乎所有情况下，这都是由于我们自己的代码中的错误造成的。以下是使用\
    \ Python 3.0 的此类回溯示例：\n\n```\nTraceback (most recent call last):\n\nFile \"blocks.py\"\
    , line 392, in <module>\nmain()\n\nFile \"blocks.py\", line 379, in main\n\nblocks\
    \ = open(file, encoding=\"utf8\").read()\n\nFile \"/usr/lib/python3.0/lib/python3.0/io.py\"\
    , line 278, in __new__ return\nopen(*args, **kwargs)\n\nFile \"/usr/lib/python3.0/lib/python3.0/io.py\"\
    , line 222, in open closefd)\n\nFile \"/usr/lib/python3.0/lib/python3.0/io.py\"\
    , line 619, in __init__\n_fileio._FileIO.__init__(self, name, mode, closefd)\n\
    \nIOError: [Errno 2] No such file or directory: 'hierarchy.blk'\n```\n\n最后的 `IOError`\
    \ 异常清楚地告诉了我们问题所在。然而，异常是在标准库的 `io` 模块中引发的。在这种情况下，最好继续向上阅读，直到找到我们程序文件（或我们为其创建的模块之一）中列出的第一个文件。因此，在这个例子中，我们发现对我们程序的第一次引用是在\
    \ `blocks.py` 文件的第 379 行，`main()` 函数中。看起来我们调用了 `open()`，但没有将调用放在 `try...except`\
    \ 块中，也没有使用 `with` 语句。\n\nPython 3.1 比 Python 3.0 更聪明一些，它明白我们需要在自己的代码中查找错误，而不是在标准库中，因此它生成了一个更简洁、更有帮助的回溯。例如：\n\
    \n```\nTraceback (most recent call last):\n\nFile \"blocks.py\", line 392, in\
    \ <module>\n\nmain()\n\nFile \"blocks.py\", line 379, in main\n\nblocks = open(file,\
    \ encoding=\"utf8\").read()\n\nIOError: [Errno 2] No such file or directory: 'hierarchy.blk'\n\
    ```\n\n这消除了所有不必要的细节，使得很容易看出问题是什么（在最后一行）以及它发生在哪里（在它上面的行）。\n\n因此，无论回溯有多长，最后一行总是指明未处理的异常，我们只需要回溯直到找到我们程序的文件或我们自己的模块之一。问题很可能发生在\
    \ Python 指定的行上，或者在更早的行上。\n\n这个特定的例子说明，我们应该修改 `blocks.py` 程序，以便在给定不存在的文件名时能够优雅地处理。这是一个可用性错误，也应该被标记为一致性错误，因为终止并打印回溯不能被视为可接受的程序行为。\n\
    \n实际上，作为良好设计和对用户礼貌的问题，我们应该始终捕获所有相关异常，接受我们认为可能发生的特定异常，例如 `EnvironmentError`。总的来说，我们不应该使用\
    \ `except:` 或 `except Exception:` 这样的通配符，尽管在程序顶层使用后者以避免崩溃可能是合适的——但前提是我们总是报告它捕获的任何异常，这样它们就不会被悄无声息地忽略掉。\n\
    \n我们捕获但无法恢复的异常应该作为错误消息报告，而不是让我们的用户面对看起来令外行害怕的回溯。对于 GUI 程序，同样的情况也适用，只是通常我们会使用消息框来通知用户问题。对于通常无人值守运行的服务器程序，我们应该将错误消息写入服务器的日志。\n\
    \nPython 的异常层次结构设计使得捕获 `Exception` 并不完全覆盖所有异常。具体来说，它不捕获 `KeyboardInterrupt` 异常，因此对于交互式应用程序，如果用户按下\
    \ Ctrl+C，程序将终止。如果我们捕获了这个异常，就有可能将用户困在一个他们无法终止的程序中。这是因为我们异常处理代码中的错误可能会阻止程序终止或异常传播。（显然，即使是“不可中断”的程序也可以被终止其进程，但并非所有用户都知道如何操作。）因此，如果我们确实捕获了\
    \ `KeyboardInterrupt` 异常，我们应该非常小心，只做必要的最少保存和清理工作——然后终止程序。对于不需要保存或清理的程序，最好不要捕获\
    \ `KeyboardInterrupt`，而是让程序直接结束。"
