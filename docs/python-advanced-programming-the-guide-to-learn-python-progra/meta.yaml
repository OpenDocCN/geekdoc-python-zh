    \n在深入编写测试模块之前，我们需要考虑需要哪些测试。我们应该测试三种不同的数据类型：列表、集合和字典。对于列表，我们需要测试附加和插入项目、删除项目以及更改项目的值。对于集合，我们应该测试添加和删除项目。对于字典，我们应该测试插入项目、更改项目的值以及删除项目。此外，我们应该测试在失败的情况下，没有更改被应用。\n\
