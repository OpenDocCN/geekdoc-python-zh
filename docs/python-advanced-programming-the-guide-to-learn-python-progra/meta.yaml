    \ key, d[key]\n\ndef items_in_key_order(d):\n    return ((key, d[key])\n     \
    \       for key in sorted(d))\n```\n\n这两个函数都返回一个生成器，该生成器为给定的字典生成一系列键值对。如果我们需要一次性获取所有项，可以将函数返回的生成器传递给\
    \ `list()` 或 `tuple()`；否则，我们可以迭代生成器，按需获取各项。\n\n生成器提供了一种执行惰性求值的方法，这意味着它们只计算实际需要的值。这比一次性处理一个巨大的列表可能更高效。一些生成器产生的值数量与我们请求的一样多——没有上限。例如：\n\
    \n```python\ndef quarters(next_quarter=0.0):\n    while True:\n        yield next_quarter\n\
    \        next_quarter += 0.25\n```\n\n这个函数将永远返回 0.0、0.25、0.5 等等。以下是我们如何使用这个生成器：\n\
    \n```python\nresult = []\nfor x in quarters():\n    result.append(x)\n    if x\
    \ >= 1.0:\n        break\n```\n\n`break` 命令很有用——没有它，`for ... in` 循环将永远不会结束！\n\n\
    最终，结果列表是 `[0.0, 0.25, 0.5, 0.75, 1.0]`。\n\n每次我们调用 `quarters()`，都会得到一个从 0.0 开始、每次增加\
    \ 0.25 的生成器；但假设我们需要重置生成器的当前值。可以向生成器传递一个值，正如这个新版本的生成器函数所示：\n\n```python\ndef quarters(next_quarter=0.0):\n\
    \    while True:\n        received = (yield next_quarter)\n        if received\
    \ is None:\n            next_quarter += 0.25\n        else:\n            next_quarter\
    \ = received\n```\n\n`yield` 表达式每次都会向调用者返回一个值。此外，如果调用者调用生成器的 `send()` 方法，发送的值将作为\
    \ `yield` 表达式的结果在生成器函数中被接收。以下是我们如何使用新的生成器函数：\n\n```python\nresult = []\ngenerator\
    \ = quarters()\nwhile len(result) < 5:\n    x = next(generator)\n    if abs(x\
    \ - 0.5) < sys.float_info.epsilon:\n        x = generator.send(1.0)\n    result.append(x)\n\
    ```\n\n我们创建一个变量来引用生成器，并调用内置的 `next()` 函数，该函数从给定的生成器中检索下一个项。（通过调用生成器的 `__next__()`\
    \ 特殊方法也可以达到相同效果，即 `x = generator.__next__()`。）如果值等于 0.5，我们就将值 1.0 发送到生成器（它会立即返回这个值）。这次结果列表是\
    \ `[0.0, 0.25, 1.0, 1.25, 1.5]`。\n\n在下一小节中，我们将研究 `magicnumbers.py` 程序，该程序处理命令行上给出的文件。遗憾的是，Windows\
    \ shell 程序（`cmd.exe`）不提供通配符扩展（也称为文件通配），因此如果一个程序在 Windows 上使用参数 `*.*` 运行，严格的字符串\
    \ `*.*` 将进入 `sys.argv` 列表，而不是当前目录中的所有文件。我们通过创建两个不同的 `get_files()` 函数来解决这个问题，一个用于\
    \ Windows，另一个用于 Unix，两者都使用生成器。代码如下：\n\n```python\nif sys.platform.startswith(\"\
    win\"):\n    def get_files(names):\n        for name in names:\n            if\
    \ os.path.isfile(name):\n                yield name\n            else:\n     \
    \           for file in glob.iglob(name):\n                    if not os.path.isfile(file):\n\
    \                        continue\n                    yield file\nelse:\n   \
    \ def get_files(names):\n        return (file for file in names if os.path.isfile(file))\n\
    ```\n\n无论哪种情况，该函数都期望以文件名列表（例如 `sys.argv[1:]`）作为其参数被调用。\n\n在 Windows 上，该函数遍历列出的每个名称。对于每个文件名，函数会\
    \ yield 该名称，但对于非文件（通常是目录），则使用 `glob` 模块的 `glob.iglob()` 函数来返回一个迭代器，该迭代器生成通配符扩展后该名称所代表的文件名。对于像\
