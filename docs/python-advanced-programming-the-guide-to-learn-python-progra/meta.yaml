  md: 'programmer. Python provides good support for creating threaded programs, minimizing
    the work that we must do. Nonetheless, multi-threaded programs are inherently
    more complex than single-threaded programs and require much more care in their
    creation and maintenance.


    In this chapter’s first section we will create two small programs. The first program
    is called by the user and the second program is invoked by the first program,
