  md: '# CHAPTER 7: PROCESSES AND THREADING


    Thanks to multicore processors becoming the norm instead of the exception, it
    is more attractive and more effective than ever before to want to expand the processing
    pressure so as to get the most out of all the accessible cores. There are two
    main strategies to expanding the workload. One is to use many processes and the
    other is to use different threads. This section explains how to use both procedures.


    Using multiple processes, that is, running separate programs, has the advantage
    that each process runs independently. This leaves all the burden of handling concurrency
    to the underlying operating system. The disadvantage is that communication and
    data sharing between the invoking program and the separate processes it invokes
    can be inconvenient. On Unix systems this can be solved by using the exec and
    fork paradigm, but for cross-platform pro-grams other solutions must be used.
    The simplest, and the one shown here, is for the invoking program to feed data
    to the processes it runs and leave them to produce their output independently.
    A more flexible approach that greatly simplifies two-way communication is to use
    networking. Of course, in many situations such communication isn’t needed—we just
    need to run one or more other programs from one orchestrating program.


    An alternative to handing off work to independent processes is to create a threaded
    program that distributes work to independent threads of execution. This has the
    advantage that we can communicate simply by sharing data (providing we ensure
    that shared data is accessed only by one thread at a time), but leaves the burden
    of managing concurrency squarely with the'
  merge: -1
