    \ Marcus Richards's Mailing List](#)\n\n# CHAPTER 1: ADVANCED PROGRAMMING TECHNIQUES\n\
    \nIn this Chapter we will investigate a wide scope of programming methodologies\
    \ and present various extra, consistently further created, Python etymological\
    \ structure. Bits of the material in this segment is very trying, yet recall that\
    \ the most dynamic techniques are now and again required and you can commonly\
    \ skim the primary go through to get an idea of what should be conceivable and\
    \ scrutinized even more circumspectly when the need rises.\n\nThe part's first\
    \ area delves all the more profoundly into Python's procedural highlights. It\
    \ begins by telling the best way to utilize what we previously canvassed in a\
    \ novel manner, and after that profits to the topic of generators. The segment\
    \ at that point presents dynamic programming—stacking modules by name at runtime\
    \ and executing self-assertive code at runtime. The area comes back to the subject\
    \ of nearby (settled) capacities, however what's more covers the utilization of\
    \ the nonlocal watchword and recursive capacities. Prior we perceived how to utilize\
    \ Python's predefined decorators—in this segment we figure out how to make our\
    \ own decorators. The area finishes up with inclusion of annotations.\n\nThe second\
    \ part covers all new material relating to object-oriented programming. It starts\
    \ by the introduction of `__slots__`, a mechanism to minimize the memory used\
    \ by any object. Then, it shows how to access object attributes without using\
    \ its properties.\n\nThe section also describes functors, and context managers—these\
    \ are used in conjunction with the `with` keyword, and in many cases (e.g., file\
    \ handling) they can be used to replace `try ... except ... finally` constructs\
    \ with simpler `try ... except` constructs. The section also shows how to create\
    \ custom context managers, and introduces additional advanced features, including\
    \ class decorators, abstract base classes, multiple inheritance, and metaclasses.\n\
    \nThe third area introduces some basic concepts of functional programming, and\
    \ presents some valuable functions from the `functools`, `itertools`, and `operator`\
    \ modules. This segment additionally tells the best way to utilize halfway capacity\
    \ application to simplify code, and how to make and utilize co-routines.\n\nThis\
    \ chapter takes everything that we have just covered and transforms it into the\
    \ \"deluxe Python toolbox\", with all the first instruments (techniques and punctuations),\
    \ in addition to numerous new ones that can make our programming simpler, shorter,\
    \ and increasingly viable. A portion of the devices can have tradable uses, for\
    \ instance, a few occupations should be possible utilizing either a class decorator\
    \ or a metaclass, while others, for example, descriptors, can be utilized in various\
    \ approaches to accomplish various impacts. A portion of the apparatuses secured\
    \ here, for example, setting supervisors, we will utilize constantly, and others\
    \ will stay prepared close by for those specific circumstances for which they\
    \ are the ideal arrangement.\n\n# FURTHER PROCEDURAL PROGRAMMING\n\nThe majority\
    \ of this area manages additional facilities relating with procedural programming\
    \ and functions, yet the absolute first subsection is diverse in that it shows\
    \ a helpful programming system dependent on what we previously covered without\
    \ presenting any new syntax.\n\n# BRANCHING USING DICTIONARIES\n\nAs we noted\
    \ before, functions are items like everything else in Python, and a function’s\
    \ name is an object reference that alludes to the functions. On the off chance\
    \ that we compose a function’s name without brackets, Python realizes we mean\
    \ the reference, and we can transfer such references around simply like any others.\
    \ We can utilize this reality to supplant if proclamations that have loads of\
    \ elif provisions with a single function call.\n\nWe will observe an interactive\
    \ console called `dvds-dbm.py`, featuring the following menu:\n\n(A)dd (E)dit\
    \ (L)ist (R)emove (I)mport e(X)port (Q)uit\n\nThe software has a function that\
    \ gets the user’s decision and which will return just a legitimate decision, for\
    \ this situation one of \"a\", \"e\", \"l\", \"r\", \"i\", \"x\", and \"q\". Here\
    \ are two proportional code pieces for calling the important functions dependent\
    \ on the user’s decision:\n\n```python\nif action == \"a\":\n    add_dvd(db)\n\
    elif action == \"e\":\n    edit_dvd(db)\nelif action == \"l\":\n    list_dvds(db)\n\
    elif action == \"r\":\n    remove_dvd(db)\nelif action == \"i\":\n    import_(db)\n\
    elif action == \"x\":\n    export(db)\nelif action == \"q\":\n    quit(db)\n```\n\
    \n```python\nfunctions = dict(a=add_dvd, e=edit_dvd, l=list_dvds, r=remove_dvd,\n\
    \                  i=import_, x=export, q=quit)\n\nfunctions[action](db)\n```\n\
    \nThe decision is held as a one-character string in the `action` variable, and\
    \ the database to be utilized is held in the `db` variable. The `import_()` function\
    \ has a trailing underscore to keep it distinct from the built-in `import` proclamation.\n\
    \nIn the correct hand code piece we make a dictionary whose keys are the legitimate\
    \ menu decisions, and whose qualities are function references. In the second proclamation\
    \ we recover the function reference comparing to the given activity and call the\
    \ function alluded to utilizing the call administrator, `()`, and in this model,\
    \ passing the `db` contention. Not exclusively is the code on the right-hand side\
    \ a lot shorter than the code on the left, yet in addition it can scale (have\
    \ unmistakably more word reference things) without influencing its performance,\
    \ dissimilar to one side hand code whose speed relies upon what number of `elif`s\
    \ must be tried to locate the suitable function to call.\n\nThe `convert-incidents.py`\
    \ program uses this technique in its `import_()` method, as this extract from\
    \ the method shows:\n\n```python\ncall = {(\".aix\", \"dom\"): self.import_xml_dom,\n\
    \        (\".aix\", \"etree\"): self.import_xml_etree,\n        (\".aix\", \"\
    sax\"): self.import_xml_sax,\n        (\".ait\", \"manual\"): self.import_text_manual,\n\
    \        (\".ait\", \"regex\"): self.import_text_regex,\n```"
  mdcn: "# Python 高级编程\n\n## 高级编程\n\n学习 Python 编程的指南\n包含关于动态编程、多线程、多进程、调试、测试等方面的练习与示例参考\n\
    \nMarcus Richards\n\n由 Marcus Richards 于 2024 年出版。\n\n尽管在本书的编写过程中已采取了各种预防措施，但出版商对其中可能存在的错误或遗漏，或因使用其中信息而导致的任何损害不承担任何责任。\n\
    \n# PYTHON 高级编程：学习 Python 编程的指南。包含关于动态编程、多线程、多进程、调试、测试等方面的练习与示例参考\n\n**第一版。2024\
    \ 年 3 月 19 日。**\n\n版权所有 © 2024 Marcus Richards。\n\nISBN: 979-8224869794\n\n作者：Marcus\
    \ Richards。\n\n# 目录\n\n- [书名页](#)\n- [版权页](#)\n- [第 1 章：高级编程技术](#)\n  - [深入过程式编程](#)\n\
    \  - [使用字典进行分支](#)\n  - [生成器表达式与函数](#)\n- [第 2 章：动态代码执行](#)\n  - [动态代码执行](#)\n\
    \  - [动态导入模块](#)\n  - [函数与方法装饰器](#)\n  - [函数注解](#)\n- [第 3 章：深入面向对象编程](#)\n  -\
    \ [控制属性访问](#)\n  - [函数式对象](#)\n  - [上下文管理器](#)\n  - [描述符](#)\n  - [类装饰器](#)\n\
    \  - [抽象基类](#)\n  - [多重继承](#)\n  - [元类](#)\n- [第 4 章：函数式编程](#)\n  - [偏函数应用](#)\n\
    \  - [协程](#)\n  - [对数据执行独立操作](#)\n- [第 5 章：调试、测试与性能分析](#)\n- [第 6 章：调试](#)\n \
    \ - [处理语法错误](#)\n  - [处理运行时错误](#)\n  - [科学调试](#)\n  - [单元测试](#)\n  - [性能分析](#)\n\
    - [第 7 章：进程与线程](#)\n  - [使用多进程模块](#)\n- [订阅 Marcus Richards 的邮件列表](#)\n\n# 第 1\
    \ 章：高级编程技术\n\n在本章中，我们将探讨广泛的编程方法，并介绍各种额外的、通常更高级的 Python 语法结构。本节的部分内容颇具挑战性，但请记住，最动态的技术并非总是必需的，你通常可以先快速浏览一遍，了解可能实现的功能，待有需要时再仔细研读。\n\
    \n本节的第一部分将更深入地探讨 Python 的过程式特性。它首先介绍如何以新颖的方式运用我们之前已涵盖的内容，然后回归到生成器的主题。接着，该部分介绍了动态编程——在运行时按名称加载模块以及在运行时执行任意代码。该部分还回到了局部（嵌套）函数的主题，但额外涵盖了\
    \ `nonlocal` 关键字和递归函数的使用。之前我们了解了如何使用 Python 的内置装饰器——在本节中，我们将学习如何创建自己的装饰器。该部分最后介绍了注解。\n\
    \n第二部分涵盖了所有与面向对象编程相关的新内容。它首先介绍了 `__slots__`，这是一种最小化任何对象内存使用量的机制。然后，它展示了如何在不使用其属性的情况下访问对象属性。\n\
    \n该部分还描述了函数式对象和上下文管理器——它们与 `with` 关键字结合使用，并且在许多情况下（例如文件处理），它们可以用来用更简单的 `try ...\
    \ except` 结构替代 `try ... except ... finally` 结构。该部分还展示了如何创建自定义上下文管理器，并介绍了其他高级特性，包括类装饰器、抽象基类、多重继承和元类。\n\
    \n第三部分介绍了函数式编程的一些基本概念，并展示了 `functools`、`itertools` 和 `operator` 模块中的一些实用函数。本节还介绍了如何使用偏函数应用来简化代码，以及如何创建和使用协程。\n\
    \n本章将我们刚刚涵盖的所有内容转化为“豪华 Python 工具箱”，其中包含所有基础工具（方法和语法），以及许多可以使我们的编程更简单、更简洁、更高效的新工具。其中一些工具可以互换使用，例如，某些任务可以使用类装饰器或元类来完成，而其他工具，如描述符，则可以以不同的方式使用以实现不同的效果。本节涵盖的一些工具，例如上下文管理器，我们将经常使用，而其他工具则将随时待命，以应对那些它们是理想解决方案的特定情况。\n\
    \n# 深入过程式编程\n\n本节的大部分内容涉及与过程式编程和函数相关的额外设施，但第一个小节有所不同，因为它展示了一种基于我们之前已涵盖内容的实用编程技巧，而没有引入任何新的语法。\n\
    \n# 使用字典进行分支\n\n正如我们之前提到的，函数是 Python 中像其他任何东西一样的对象，而函数的名称是一个指向该函数的对象引用。如果我们编写一个不带括号的函数名，Python\
    \ 就知道我们指的是该引用，我们可以像传递任何其他引用一样传递这些引用。我们可以利用这一事实，用单个函数调用来替代包含大量 `elif` 子句的 `if`\
    \ 语句。\n\n我们将观察一个名为 `dvds-dbm.py` 的交互式控制台，其菜单如下：\n\n(A)添加 (E)编辑 (L)列表 (R)移除 (I)导入\
    \ e(X)导出 (Q)退出\n\n该软件有一个函数用于获取用户的选择，并且只会返回有效的选择，在本例中是 \"a\"、\"e\"、\"l\"、\"r\"\
    、\"i\"、\"x\" 和 \"q\" 中的一个。以下是两个等效的代码片段，用于根据用户的选择调用相应的函数：\n\n```python\nif action\
    \ == \"a\":\n    add_dvd(db)\nelif action == \"e\":\n    edit_dvd(db)\nelif action\
    \ == \"l\":\n    list_dvds(db)\nelif action == \"r\":\n    remove_dvd(db)\nelif\
    \ action == \"i\":\n    import_(db)\nelif action == \"x\":\n    export(db)\nelif\
    \ action == \"q\":\n    quit(db)\n```\n\n```python\nfunctions = dict(a=add_dvd,\
    \ e=edit_dvd, l=list_dvds, r=remove_dvd,\n                  i=import_, x=export,\
    \ q=quit)\n\nfunctions[action](db)\n```\n\n选择存储在 `action` 变量中，是一个单字符字符串，要使用的数据库存储在\
    \ `db` 变量中。`import_()` 函数末尾有一个下划线，以区别于内置的 `import` 语句。\n\n在右侧的代码片段中，我们创建了一个字典，其键是有效的菜单选择，其值是函数引用。在第二个语句中，我们检索与给定操作对应的函数引用，并使用调用运算符\
    \ `()` 调用该函数，在本例中传递了 `db` 参数。右侧的代码不仅比左侧的代码短得多，而且可以扩展（拥有更多的字典条目）而不影响其性能，不像左侧的代码，其速度取决于需要测试多少个\
    \ `elif` 才能找到合适的函数进行调用。\n\n`convert-incidents.py` 程序在其 `import_()` 方法中使用了这种技术，如该方法的摘录所示：\n\
    \n```python\ncall = {(\".aix\", \"dom\"): self.import_xml_dom,\n        (\".aix\"\
    , \"etree\"): self.import_xml_etree,\n        (\".aix\", \"sax\"): self.import_xml_sax,\n\
    \        (\".ait\", \"manual\"): self.import_text_manual,\n        (\".ait\",\
    \ \"regex\"): self.import_text_regex,\n```"
