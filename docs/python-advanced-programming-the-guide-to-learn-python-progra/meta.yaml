    \n## 动态代码执行\n\n执行表达式的最简单方法是使用内置的 `eval()` 函数。例如：\n\n```python\nx = eval(\"(2 **\
    \ 31) - 1\")  # x === 2147483647\n```\n\n这对于用户输入的表达式来说很好，但如果我们需要更动态地创建一个函数呢？为此，我们可以使用内置的\
    \ `exec()` 函数。例如，用户可能给我们一个公式，如 $4\\pi r^2$ 和名称“球体面积”，他们希望将其转换为一个函数。假设 `x` 将被替换为\
    \ `math.pi`，他们想要的函数可以这样创建：\n\n```python\nimport math\n\ncode = \"\"\"\ndef area_of_sphere(r):\n\
    \    return 4 * math.pi * r ** 2\n\"\"\"\n\ncontext = {}\ncontext[\"math\"] =\
    \ math\nexec(code, context)\n```\n\n我们应该使用适当的缩进——毕竟，引用的代码是标准的 Python。（尽管在这种情况下，我们可以将所有内容写在一行上，因为代码块只有一行。）\n\
    \n如果 `exec()` 仅以代码作为其唯一参数被调用，则无法访问因执行代码而创建的任何函数或变量。此外，`exec()` 无法访问任何已导入的模块，也无法访问调用点作用域内的任何变量、函数或其他对象。这两个问题都可以通过传递一个字典作为第二个参数来解决。该字典提供了一个位置，可以在\
    \ `exec()` 调用完成后用于存储对象引用以供访问。例如，使用上下文字典意味着在 `exec()` 调用之后，该字典拥有一个对由 `exec()` 创建的\
    \ `area_of_sphere()` 函数的对象引用。在这个例子中，我们需要 `exec()` 能够访问 `math` 模块，因此我们在上下文字典中插入了一个项，其键是模块的名称，其值是对相应模块对象的对象引用。这确保了在\
    \ `exec()` 调用内部，`math.pi` 是可访问的。\n\n有时，将整个全局上下文提供给 `exec()` 是方便的。这可以通过传递 `globals()`\
    \ 函数返回的字典来实现。这种方法的一个缺点是，在 `exec()` 调用中创建的任何对象都将被添加到全局字典中。"
