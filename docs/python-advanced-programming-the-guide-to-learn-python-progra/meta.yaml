- md: "One of Python 3's incredible ideals is that it makes an obvious differentiation\
    \ between crude bytes and strings. Be that as it may, this can some of the time\
    \ lead to sudden exemptions happening when we pass a bytes object where a str\
    \ is normal or the other way around. For instance:\n\n```\nTraceback (most recent\
    \ call last):\n\nFile \"program.py\", line 918, in <module>\n    print(datetime.datetime.strptime(date,\
    \ format))\n\nTypeError: strptime() argument 1 must be str, not bytes\n```\n\n\
    When you hit an issue like this we can either play out the change—for this situation,\
    \ by passing `date.decode(\"utf8\")`— or cautiously work back to discover where\
    \ and why the variable is a bytes object as opposed to a str, and fix the issue\
    \ at the source.\n\nIf we pass a string while bytes are expected the error message\
    \ is somewhat less obvious, and differs between Python 3.0 and 3.1. For example,\
    \ in Python 3.0:\n\n```\nTraceback (most recent call last):\n\nFile \"program.py\"\
    , line 2139, in <module> data.write(info)\n\nTypeError: expected an object with\
    \ a buffer interface\n```\n\nIn Python 3.1 the error message’s text has been slightly\
    \ improved:\n\n```\nTraceback (most recent call last):\n\nFile \"program.py\"\
    , line 2139, in <module> data.write(info)\n\nTypeError: 'str' does not have the\
    \ buffer interface\n```\n\nIn the two cases the issue is that we are passing a\
    \ string when a bytes, byte-array, or comparable article is normal. We can either\
    \ play out the change—in this case by passing `info.encode(\"utf8\")`— or work\
    \ back to discover the wellspring of the issue and fix it there.\n\nPython 3.0\
