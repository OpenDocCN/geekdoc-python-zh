  mdcn: "在这一点上，我们应该查看局部变量和返回值。如果这些始终正确，那么我们需要提出另一个假设，因为被怀疑的函数运行正常。然而，如果返回值不正确，那么我们就知道需要进一步检查该函数。\n\
    \n在实践中，我们如何进行调查，即如何测试某个函数行为异常的假设？一种开始的方法是“理性地执行”该函数——这对于一些小函数是可行的，对于较大的函数通过练习也可以做到，并且还有一个额外的好处，即让我们熟悉该函数的行为。在最佳情况下，这可以导致一个改进或更明确的假设——例如，某个特定的语句或代码块是问题所在。然而，为了恰当地进行调查，我们必须对程序进行插桩，以便在调用被怀疑的函数时能够识别发生了什么。\n\
    \n有两种方法可以对程序进行插桩——粗略地，通过插入 `print()` 语句；或者（通常）非粗略地，通过使用调试器。这两种方法都用于实现相同的目的，并且都是有效的，但一些程序员对其中一种有强烈的偏好。我们将简要描述这两种方法，从使用\
    \ `print()` 语句开始。\n\n使用 `print()` 语句时，我们可以在函数的最开始放置一个 `print()` 语句，并让它打印函数的参数。然后，在（或每个）返回语句之前（或者如果函数没有返回语句，则在函数结束时），添加\
    \ `print(locals(), \"\\n\")`。内置的 `locals()` 函数返回一个字典，其键是局部变量的名称，其值是变量的值。我们当然可以只打印我们特别感兴趣的变量。注意我们添加了一个额外的换行符——我们也应该在第一个\
    \ `print()` 语句中这样做，以便在每组变量之间出现一个空行，以帮助提高清晰度。\n\n添加 `print()` 语句的替代方法是使用调试器。Python\
    \ 有两个标准调试器。一个作为模块（`pdb`）提供，可以在控制台中交互式使用——例如，`python3 -m pdb my_program.py`。（在\
    \ Windows 上，当然，我们会将 `python3` 替换为类似 `C:\\Python31\\python.exe` 的内容。）然而，使用它的最简单方法是在程序本身中添加\
    \ `import pdb`，并在我们想要检查的函数的开头添加语句 `pdb.set_trace()`。当程序运行时，`pdb` 会在 `pdb.set_trace()`\
    \ 调用后停止它，并允许我们单步执行程序、设置断点和检查变量。\n\n下面是一个程序的模型运行示例，该程序通过在其导入部分添加 `import pdb` 语句，并在其\
    \ `calculate_median()` 函数内部添加 `pdb.set_trace()` 作为第一条语句来进行插桩。（我们输入的内容以粗体显示，尽管我们输入\
    \ `Enter` 的位置未显示。）\n\n```\npython3 statistics.py sum.dat\n```\n\n```\n> statistics.py(73)calculate_median()\
    \ -> numbers = sorted(numbers)\n```\n\n```\n(Pdb) s\n> statistics.py(74)calculate_median()\
    \ -> middle = len(numbers) // 2\n(Pdb)\n> statistics.py(75)calculate_median()\
    \ -> median = numbers[middle]\n(Pdb)\n> statistics.py(76)calculate_median() ->\
    \ if len(numbers) % 2 == 0:\n(Pdb)\n> statistics.py(78)calculate_median() -> return\
    \ median\n(Pdb) p middle, median, numbers\n(8, 5.0, [-17.0, -9.5, 0.0, 1.0, 3.0,\
    \ 4.0, 4.0, 5.0, 5.0, 5.0, 5.5, 6.0, 7.0, 7.0, 8.0, 9.0, 17.0])\n(Pdb) c\n```\n\
    \n通过在 `(Pdb)` 提示符下输入命令名称并按回车键来向 `pdb` 发出指令。如果我们只按回车键，最后一个命令将被重复。因此，这里我们输入了 `s`（表示\
    \ step，即执行显示的语句），然后重复此操作（基本上通过按回车键），以单步执行 `calculate_median()` 函数中的语句。当我们到达返回语句时，我们使用\
    \ `p`（print）命令打印出我们感兴趣的值。最后，我们使用 `c`（continue）命令继续执行到结束。这个小例子应该能让我们对 `pdb` 有一个初步的了解，当然该模块的功能远比我们这里展示的要多。\n\
    \n在像我们这样插桩过的程序上使用 `pdb` 比在未插桩的程序上要简单得多。但是，由于这需要我们添加一个导入和一个对 `pdb.set_trace()`\
    \ 的调用，很明显使用 `pdb` 与使用 `print()` 语句一样具有侵入性，尽管它提供了有用的设施，例如断点。\n\n## 单元测试\n\n为我们的程序编写测试——如果做得好——可以帮助减少错误的发生，并增加我们对程序按预期运行的信心。然而，总的来说，测试无法保证正确性，因为对于大多数非平凡的程序，潜在输入的范围和潜在计算的范围是如此之大，以至于只有其中极小的一部分能够被实际测试。尽管如此，通过仔细选择我们测试的内容，我们可以提高代码的质量。\n\
    \n可以进行各种各样的测试技术，例如可用性测试、功能测试和集成测试。但在这里，我们将纯粹关注单元测试——测试单个函数、类和方法，以确保它们按照我们的预期运行。\n\
    \n测试驱动开发（TDD）的一个关键目的是，当我们需要添加一个功能时——例如，向一个类添加一个新方法——我们首先为它编写一个测试。当然，这个测试会失败，因为我们还没有编写该方法。现在我们编写该方法，一旦它通过了测试，我们就可以重新运行所有测试，以确保我们的添加没有产生任何意外的副作用。当所有测试都运行通过（包括我们为新功能添加的测试）时，我们就可以签入我们的代码，相当确信它做了我们期望的事情——当然前提是我们的测试是充分的。\n\
    \n如果你需要创建一个在指定索引位置插入字符串的函数，你将开始像这样使用 TDD：\n\n```\ndef insert_at(string, position,\
    \ insert):\n    \"\"\"Returns a copy of string with insert inserted at the position\n\
    \n    >>> string = \"ABCDE\"\n    >>> result = []\n    >>> for i in range(-2,\
    \ len(string) + 2):\n    ...     result.append(insert_at(string, i, \"-\"))\n\
    \    >>> result[:5]\n    ['ABC-DE', 'ABCD-E', '-ABCDE', 'A-BCDE', 'AB-CDE']\n\
    \    >>> result[5:]\n    ['ABC-DE', 'ABCD-E', 'ABCDE-', 'ABCDE-']\n    \"\"\"\n\
    \    return string\n```\n\n对于不返回任何内容（它们实际上返回 `None`）的函数或方法，我们通常给它们一个包含 `pass`\
    \ 的代码块；对于那些使用返回值的函数，我们返回一个常量（例如，`0`）或其中一个参数，未做更改——这就是我们在这里所做的。（在更复杂的情况下，返回假对象可能更有用——第三方模块提供“模拟”对象可用于此类情况。）\n\
    \n当运行 doctest 时，它会失败，列出它期望的所有字符串（'ABCD-EF'、'ABCDE-F' 等）以及它实际收到的字符串（全部是 'ABCDEF'）。当我们确信\
    \ doctest 是充分且正确时，我们就可以编写函数体，在这种情况下基本上就是 `return string[:position] + insert +\
    \ string[position:]`。（而且，如果我们写了 `return string[:position] + insert`，然后为了节省一些输入而在末尾重复了\
    \ `string[:position]`，doctest 会立即发现这个错误。）\n\nPython 的标准库提供了两个单元测试模块：`doctest`，我们之前已经在这里和之前（第\
    \ 5 章；202 ▶，和第 6 章；247 ▶）简要看过；以及 `unittest`。此外，还有用于 Python 的第三方测试工具。其中最著名的两个是\
    \ `nose`（code.google.com/p/python-nose），它旨在比标准的 `unittest` 模块更全面、更有用，同时仍然与之兼容；以及\
    \ `py.test`（codespeak.net/py/dist/test/test.html）——它采用了一种与 `unittest` 稍有不同的方法，并尽可能消除标准测试代码。这两个第三方工具都支持测试发现，因此没有必要编写一个通用的测试程序——因为它们会自己搜索测试。这使得测试整个代码树或仅测试树的一部分（例如，仅测试那些正在处理的模块）变得容易。对于那些认真对待测试的人来说，值得研究这两个第三方模块。"
