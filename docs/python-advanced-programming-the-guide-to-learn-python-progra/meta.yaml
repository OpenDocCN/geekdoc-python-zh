- md: "## doctest 与 unittest 模块\n\n在选择使用哪些测试工具之前，可以先尝试各种你感兴趣的工具。\n\n创建 doctest 非常简单：我们可以在模块、函数、类或方法的文档字符串中编写测试，或者对于模块，只需在代码后添加以下几行：\n\
    \n```python\nif __name__ == \"__main__\":\n    import doctest\n    doctest.testmod()\n\
    ```\n\n如果需要在程序内部使用 doctest，这也是完全可行的。例如，`blocks.py` 文件为其函数编写了 doctest，它以如下代码结尾：\n\
    \n```python\nif __name__ == \"__main__\":\n    main()\n```\n\n这本质上是调用程序的 `main()`\
    \ 函数，而不会执行程序的 doctest。要运行程序的 doctest，我们可以遵循两种方法。第一种是导入 `doctest` 模块，然后运行程序——例如，在命令行中输入\
    \ `python3 -m doctest blocks.py`（在 Windows 上，将 `python3` 替换为类似 `C:\\Python31\\\
    python.exe` 的路径）。如果所有测试都通过，则没有输出，因此我们可能希望执行 `python3 -m doctest blocks.py -v`，因为这将列出每个执行的\
    \ doctest，并在最后给出结果摘要。\n\n另一种执行 doctest 的方法是使用 `unittest` 模块创建一个单独的测试程序。`unittest`\
    \ 模块在理论上借鉴了 Java 的 JUnit 单元测试库，用于创建包含测试用例的测试套件。`unittest` 模块可以基于 doctest 创建测试用例，而无需了解程序或模块包含什么内容，只知道它包含\
    \ doctest。因此，要为 `blocks.py` 程序创建一个测试套件，我们可以创建以下简单程序（我们将其命名为 `test_blocks.py`）：\n\
    \n```python\nimport doctest\nimport unittest\nimport blocks\n\nsuite = unittest.TestSuite()\n\
    suite.addTest(doctest.DocTestSuite(blocks))\nrunner = unittest.TextTestRunner()\n\
    print(runner.run(suite))\n```\n\n请注意，如果我们采用这种方法，对项目名称有一定的限制：它们必须是合法的模块名称，因此名为\
    \ `convert-incidents.py` 的程序不能为此编写这样的测试，因为 `import convert-occurrences` 不是有效的\
    \ Python 标识符。（虽然可以绕过这个问题，但最简单的解决方案是使用也是有效模块名称的程序文件名，例如，用下划线替换连字符。）\n\n这里展示的结构——创建一个测试套件，添加一个或多个测试用例或测试套件，运行整个测试套件，并输出结果——是基于\
