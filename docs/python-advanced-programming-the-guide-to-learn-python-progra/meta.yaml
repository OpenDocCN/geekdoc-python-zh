    \ `enumerate1()` 时，它会使用固定的参数调用原始函数——以及调用时提供的任何其他参数，在本例中是 `lines`。这里我们使用了 `enumerate1()`\
    \ 函数来提供从第 1 行开始的常规行计数。\n\n使用偏函数应用可以改进我们的代码，特别是当我们需要反复使用相同的参数调用相同的函数时。例如，与其每次调用\
