    concepts that we will explore later.


    # COMPARISON OPERATORS


    Understanding different comparison operators is an essential prerequisite for
    understanding the power that control flow statements can provide to a Python programmer.


    Comparison operators, also known as relational operators, usually compare values
    present in two operands and return whether this condition is true or false using
    a Boolean value. There are different variations of these comparison operators
    in the core Python library.


    ''TRUE'' and ''FALSE'' are the Boolean values that Python will display after successfully
    verifying the condition.


    # 1. Less than (<) operator


    Less than (<) operator usually checks whether or not the left value is lesser
    than the right value in the condition.


    ```

    Program Code:

    34 < 45

    Output:

    TRUE

    Program Code:

    45 < 34

    Output:

    FALSE

    ```


    In the first example, the left value is lesser than the right value and hence
    ''TRUE'' Boolean value is displayed as an output. However, the second example
    does not meet the condition, and hence ''FALSE'' Boolean value is displayed on
    the terminal.


    You can also compare int values with floating-point values using a less than operator.


    ```

    Program Code:

    5.2 < 6

    Output:

    TRUE

    ```


    Programmers can use less than operator to compare strings using the ASCII format.


    ```

    Program Code:

    ''Python'' < ''python''

