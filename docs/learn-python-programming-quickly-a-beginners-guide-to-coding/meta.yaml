    # PYTHON STYLE GUIDE


    Python is a programming language that favors simplicity instead of complexity.
    To understand Python''s essence as a programming language, readers must read Tim
    Peters’ “The Zen of Python.” It provides 19 guiding principles that dictate the
    Python style for all projects.


    Understanding these principles and following them in their programming workflow
    can help Python programmers create code that other programmers can easily maintain
    and understand.


    You can find all the 19 working principles related to the Python style guide using
    the below command in your terminal.


    ```

    Terminal code:

