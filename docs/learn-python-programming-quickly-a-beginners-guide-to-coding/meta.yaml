    ## UNDERSTANDING TUPLES


    Lists are mutual objects in Python. All the elements in a list can be easily removed,
    added or deleted using different functions. Tuples, on the other hand, are immutable
    lists. Any element that is entered into a tuple cannot be modified. Trying to
    change an element in a tuples data structure can result in a “TypeError”.


    Also, remember that they are denoted using parentheses instead of square brackets
    that list data structures. You can also represent tuples without using parentheses.


    ```

