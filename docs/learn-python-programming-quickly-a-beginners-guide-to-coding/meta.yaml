    # FUNCTIONS AND MODULES


    A Python programmer needs to be aware of different programming paradigms that
    are frequently used. Functional programming is popular with Pythonists due to
    its versatile nature of doing things simply. Writing functions and calling them
    whenever you need them in a program is easy to follow and effective in runtime
    execution time. For beginners, understanding functions and learning to implement
    them is crucial.


    # WHAT ARE FUNCTIONS?


    In mathematics, functions are a binary relation between two sets and are widely
    acclaimed as many mathematicians'' most impactful discoveries. Computer programmers
    first implemented functions in Z4, the first digital computer. Alan Turing then
    revolutionized its impact in the computer industry by calling and returning using
    functions. Functions can also be called methods or subroutines. Every famous programming
    language implements the usage of subroutines in its core for its users. Python
    is one of the modern programming languages that enforce functions more straightforwardly.


    # What Are Functions in Programming?


    Programmers usually create programs to complete tasks. To complete tasks, programmers
    typically need to create an algorithm that completes it in a step-by-step instruction.
    However, many times a programmer needs to perform a task multiple times. It is
    not considered a practical solution as it decreases productivity to write and
    link the same code repeatedly. Hence, functions are created to reuse code to perform
    different computational and logical tasks.


    Functions can also be either user-defined or system functions. Python provides
    huge libraries of built-in functions that can complete many tasks without rewriting
    the code again. All these built-in functions of Python are created to be on the
    point and non-repetitive for programmers.


    # Example:


    Let’s suppose that you downloaded a mobile application that can change filters
    for your photos. This kind of application uses pre-written functions to manipulate
    your photos'' hue and saturation, resulting in applying a filter to the provided
    image. Here, the application''s programmers created a function to apply these
    filters to any photo provided instead of doing it all over again for every image.


    Almost every interface or component in real-world applications uses functions
    to create use cases that serve a purpose for the software user. A Python programmer
    should remember that the prime focus of writing a function is to encapsulate meaningful
    code to achieve a task.


    # How Functions Work


    The philosophy of functions is simple in all programming languages. First, a programmer
    writes a block of code that performs a task. Programmers should include this block
    of code with all the logical and computational logic that a program needs to commit
    to complete the task.


    Now, this block of code can be called with the function''s name whenever needed
    instead of writing the code all over again. Function calling is sensitive and
    can end up in errors if not done correctly. Functions also contain parameters
    to call functions with specific input values for more robust results.


    # How to Define Your Own Functions


    Python uses the “def” keyword to create a custom function in the program.


    We will now create a small function known as welcome() to explain how a function
    is defined and called.'
  - '[PAGE 68]


    ```

    Program code:

    def welcome() :

    "This displays a welcome message for the user"

    Print ( "Hi! We give you a warm welcome to our software" )

    welcome()

    Output:

    Hi! We give you a warm welcome to our software

    ```


    # Explanation:


    +   1. In line 1, def is used to define a function in the Python programming language.
    Without writing a function definition, the interpreter will not detect it as a
    function. A function definition includes def and is followed by the name of the
    function. Welcome() is the name of the function in the above example. All the
    parameters of the functions will usually be placed between parentheses. A colon
    is placed at the end of the function definition

    2. All the lines that follow the function definition belong to the body of the
    function. Usually, all the programming logic that performs a task is included
    in this section. The first line of the function body is typically a docstring.
    Docstring will be used to describe what a function does. While it is not mandatory
    to use docstrings, it is considered a good practice by many Python programmers.
    Docstrings are usually enclosed in triple quotes and can be multiple lines.

    3. In the above example, the third line uses a print statement to display content
    on the screen. While in this example, the function has only a single purpose,
    in the real world, however, a function body usually has more than ten lines to
    complete a task.

    4. The fourth line represents a function call that precisely says to execute the
    content in the function. When an interpreter finds a function call, it will head
    over to the written function and run it. As the above example is a function with
    no parameters, the interpreter will execute simply by printing the statement provided.


    # USING PARAMETERS IN THE FUNCTIONS


    In the previous example, we have defined a basic function with zero parameters.
    But in the real world, programmers regularly use parameters to improve the functionality
    of the application.


    For example, we can dynamically display the user name using an input parameter
    in the function.


    ```

    Program code:

    def welcome(name) :

    " This displays a welcome message for the user along with their name"

    Print ( " Hi, " + name.title() + " ! \n We give you a warm welcome to our software"
    )

    welcome(''tom'')

    welcome(''grace'')

    Output:

    Hi, Tom! we give you a warm welcome to our software

    Hi, Grace! we give you a warm welcome to our software

    ```


    # Explanation:


    +   1. In the function definition, we added a parameter called ‘name’ that will
    accept any value to print on the screen. As Python is not a statically typed language,
    there is no need to mention the data type of the parameters.

    2. In the print statement, we gave the user ‘name.title()’ to provide a value
    to the defined parameter. If you do not provide a value for the parameter, the
    program will not execute and end with an error. The title() string function prints
    the names in a camel case style for better readability. You can use other string
    functions such as lower() or upper() to achieve different results.

    3. In the final lines, we have called the functions with two different parameter
    arguments. Each argument will display a different output. Here, ‘tom’ and ‘grace’
    are the arguments that we have given to a parameter in the function.


    The sole difference between a parameter and an argument is that the parameter
    is essential for the function to work. In contrast, an argument is just a value
    that programmers can change.'
- md: "## PASSING ARGUMENTS\n\nFunctions in real-world applications usually have multiple\
    \ parameters, and hence you need to know different ways to pass your arguments\
    \ to the function parameters. While there are several ways to pass arguments,\
    \ positional and keyword arguments are the most popular.\n\n## 1. Positional arguments\n\
    \nWhen you use a positional way of passing arguments, you need to match the number\
    \ of arguments. In positional arguments, the order of passing arguments also becomes\
    \ essential.\n\n```\nProgram code:\ndef sports(country, number):\n    \"\"\" This\
    \ describes how many times a country has won FIFA world cup \"\"\"\n    print(country\
    \ + \" has won FIFA \" + number + \" times\")\n\nsports('Brazil', 5)\nsports('France',\
    \ 4)\n\nOutput:\nBrazil has won FIFA 5 times\nFrance has won FIFA 4 times\n```\n\
    \nIn the above example, the arguments are provided at the end of the program using\
    \ the parameter.\n\nIn positional arguments, the change in order can become messy\
    \ or sometimes result in errors, as shown below.\n\n```\nProgram code:\ndef sports(country,\
    \ number):\n    \"\"\" This describes how many times a country has won FIFA world\
    \ cup \"\"\"\n    print(country + \" has won FIFA \" + number + \" times\")\n\n\
    sports(5, Brazil)\nsports(4, France)\n\nOutput:\n5 has won FIFA Brazil times\n\
    4 has won FIFA France times\n```\n\nThe main advantage of positional arguments\
    \ is that they are easy to call functions using this way, especially when you\
    \ want to do it multiple times.\n\n## KEYWORD ARGUMENTS\n\nKeyword Arguments is\
    \ another famous way to pass arguments to functions. It usually uses a key : value\
    \ pair to give arguments to functions. Keyword arguments are mainly used to avoid\
    \ confusion when passing arguments. They also don't have any order restrictions\
    \ as the values are directly linked. However, one major defect is that it takes\
    \ more time and sometimes can become complicated when passing multiple values.\n\
    \n```\nProgram code:\ndef sports(country, number):\n    \"\"\" This describes\
    \ how many times a country has won FIFA world cup \"\"\"\n    print(country +\
    \ \" has won FIFA \" + number + \" times\")\n\nsports(country='Brazil', number=5)\n\
    sports(country='France', number=4)\n\nOutput:\nBrazil has won FIFA 5 times\nFrance\
    \ has won FIFA 4 times\n```\n\n## DEFAULT VALUES IN PYTHON\n\nPython also provides\
    \ an easier way to provide default values for different parameters while creating\
    \ a function. Using default values while writing parameters is entirely optional.\
    \ You can either enter it with the parameter or directly enter the argument values\
    \ in a function call.\n\nUsing default values is considered a good practice as\
    \ it reduces boilerplate code. Boilerplate code is automatic unnecessary code\
    \ that programmers need to write for an interpreter. Reducing boilerplate code\
    \ while writing an application can make your code look less complex and increase\
    \ readability.\n\n```\nProgram code:\ndef sports(country, number=5):\n    \"\"\
    \" This describes how many times a country has won FIFA world cup \"\"\"\n   \
    \ print(country + \" has won FIFA \" + number + \" times\")\n\nsports('Brazil')\n\
    sports('Argentina')\n\nOutput:\nBrazil has won FIFA 5 times\nArgentina has won\
    \ FIFA 5 times\n```\n\nIn the above example, using default values has simplified\
    \ function calls.\n\nRemember that the Python interpreter will use a default value\
    \ only when an argument value is not provided during the function call. If an\
    \ argument value for the parameter is provided, then the supplied argument will\
    \ be used instead of the default argument value.\n\n```\nProgram code:\ndef sports(country,\
    \ number=5):\n    \"\"\" This describes how many times a country has won FIFA\
    \ world cup \"\"\"\n    print(country + \" has won FIFA \" + number + \" times\"\
    )\n\nsports('Brazil')\nsports('Argentina', 4)\n\nOutput:\nBrazil has won FIFA\
    \ 5 times\nArgentina has won FIFA 4 times\n```\n\nIn the above example, when we\
    \ called the function with only one parameter, it automatically used the default\
    \ value. However, when we call the function with two parameters, the default value\
    \ is replaced by the new argument value.\n\n![](img/f3ac244212cac800ff2904a0d5535e2e_70_0.png)\n\
    \n## UNDERSTANDING SCOPE IN PYTHON\n\nUsually, the parameters and variables declared\
    \ within a function can only be called or used within that function. With respect\
    \ to function, these variables will be called local scope variables, whereas those\
    \ declared outside the function will be called global scope variables.\n\n**Note:**\
    \ A function is either a local or a global variable; it cannot be both.\n\n##\
    \ Why is a Scope Essential?\n\nThe scope is essential because it helps to store\
    \ all variables given to it while executing a program. For example, if a program\
    \ is destroyed, the interpreter will forget all the previously given variables,\
    \ and a new set of variables is required when the program restarts.\n\nWhenever\
    \ you call a function in the program, a local scope will be created and used until\
    \ the function returns a value. When the function returns a value, the interpreter\
    \ will forget all the variables given.\n\nThe main reason why programmers prefer\
    \ to use the scope in their applications is that they can help programmers find\
    \ the code lines that create a buggy situation in the program. If you use a global\
    \ scope for all the variables, you may have to recheck all the variables from\
    \ different functions. Using local and global variables will increase your productivity\
    \ and can help you maintain big projects efficiently.\n\n## Understanding Local\
    \ and Global Scope in Depth\n\n1. You cannot use local variables in a global scope.\n\
    \n```\nProgram code:\ndef vegetable():\n    brinjal = 32\n\nvegetable()\nprint(eggs)\n\
    \nOutput:\nTraceback error\n```\n\nThe example mentioned above will generate a\
    \ traceback error because you have called a print function with a local variable\
    \ that doesn’t support global scope. Just remember to use only global variables\
    \ in the global scope.\n\n2. All the local functions, however, can use global\
    \ variables whenever needed.\n\n```\nProgram code:\ndef vegetable():\n    print(brinjal)\n\
    \nbrinjal = 32\nvegetable()\nprint(brinjal)\n\nOutput:\n32\n32\n```\n\nThe example\
    \ mentioned above will print the variables both times as the local functions can\
    \ use variables with global scope.\n\n3. Local variables of one function cannot\
    \ be used by any other functions.\n\n```\nProgram code:\ndef vegetable():\n  \
    \  brinjal = 32\n    fruits()\n    print(brinjal)\n\ndef fruits():\n    apple\
    \ = 21\n    brinjal = 42\n\nvegetable()\n\nOutput:\n32\n```\n\nThe above example\
    \ is complex and needs to be carefully understood for writing better Python programs.\n\
    \n1. When the function vegetable() is called, a local scope variable of brinjal\
    \ with a value of 32 is created.\n2. Immediately, another function, fruit(), is\
    \ called, and it creates two local scope variables, ‘Apple’ and ‘Brinjal’, with\
    \ values 21 and 42. Remember that multiple scope values can co-exist in a Python\
    \ program.\n3. Now, the fruit() function is returned, and hence all the local\
    \ scope variables that are stored will be destroyed.\n4. In the following line,\
    \ when a print statement is used, the interpreter prints 32 instead of 42.\n\n\
    Both local and global variables can have the same name. There won’t be a conflict\
    \ while writing programs. For example, a local and global variable named ‘sample’\
    \ can be created without generating any errors. While it is acceptable to use\
    \ the same names for variables with a local and global case, we recommend you\
    \ not follow it as it may lead to confusion.\n\n## UNDERSTANDING THE ‘GLOBAL’\
    \ STATEMENT\n\nGlobal statement is usually used to change the global scope variable\
    \ value from within a function.\n\n```\nProgram code:\ndef vegetable():\n    global\
    \ brinjal\n    brinjal = 'tasty'\n\nbrinjal = 'global'\nvegetable()\nprint(brinjal)\n\
    \nOutput:\ntasty\n```\n\n1. As we have mentioned in the global statement for brinjal,\
    \ whenever a function is called, a local variable will not be created, but instead,\
    \ a variable with global scope will be created.\n2. Hence, when the interpreter\
    \ executes the print statement, the value of ‘tasty’ will be printed as it is\
    \ a variable with global scope.\n\nThe usage of scopes in Python programs can\
    \ be compared to a “black box” where you only need to know the arguments and parameters\
    \ you are giving. All modern programming languages and libraries will not burden\
    \ you by asking you to look at all the present global scope variables.\n\nFrom\
    \ a beginner’s perspective, all you have to do is understand what the program\
    \ does and insert the values to that function.\n\n## HOW TO IMPORT MODULES\n\n\
    Modules are formed by combining a group of classes. Every program needs modules\
    \ to complete tasks efficiently. To use modules, you need to import them using\
    \ the ‘import’ statement. Importing modules is quite similar to '#include' in\
    \ C/C++ languages. Importing a module usually provides permission to use the methods\
    \ present in those classes in other programs.\n\n```\nSyntax:\nimport (Module\
    \ name)\n\nExample:\nimport math\n```\n\nThe above statement imports Python standard\
    \ library math into the program.\n\nWhen an import module statement is used, it\
    \ searches the _import()_ function that is used while creating modules. Any operation\
    \ can be performed easily using this scenario."
  mdcn: "## 传递参数\n\n现实世界应用中的函数通常具有多个参数，因此你需要了解将参数传递给函数参数的不同方式。虽然传递参数有几种方式，但位置参数和关键字参数是最常用的。\n\
    \n## 1. 位置参数\n\n当你使用位置方式传递参数时，需要匹配参数的数量。在位置参数中，传递参数的顺序也变得至关重要。\n\n```\n程序代码：\n\
    def sports(country, number):\n    \"\"\" 这描述了一个国家赢得FIFA世界杯的次数 \"\"\"\n    print(country\
    \ + \" has won FIFA \" + number + \" times\")\n\nsports('Brazil', 5)\nsports('France',\
    \ 4)\n\n输出：\nBrazil has won FIFA 5 times\nFrance has won FIFA 4 times\n```\n\n\
    在上面的例子中，参数是在程序末尾使用参数提供的。\n\n在位置参数中，顺序的改变可能会变得混乱，有时甚至会导致错误，如下所示。\n\n```\n程序代码：\n\
    def sports(country, number):\n    \"\"\" 这描述了一个国家赢得FIFA世界杯的次数 \"\"\"\n    print(country\
    \ + \" has won FIFA \" + number + \" times\")\n\nsports(5, Brazil)\nsports(4,\
    \ France)\n\n输出：\n5 has won FIFA Brazil times\n4 has won FIFA France times\n```\n\
    \n位置参数的主要优点是使用这种方式调用函数很容易，特别是当你想多次调用时。\n\n## 关键字参数\n\n关键字参数是另一种向函数传递参数的著名方式。它通常使用键：值对向函数传递参数。关键字参数主要用于避免传递参数时的混淆。它们也没有任何顺序限制，因为值是直接关联的。然而，一个主要的缺点是传递多个值时需要更多时间，有时会变得复杂。\n\
    \n```\n程序代码：\ndef sports(country, number):\n    \"\"\" 这描述了一个国家赢得FIFA世界杯的次数 \"\
    \"\"\n    print(country + \" has won FIFA \" + number + \" times\")\n\nsports(country='Brazil',\
    \ number=5)\nsports(country='France', number=4)\n\n输出：\nBrazil has won FIFA 5\
    \ times\nFrance has won FIFA 4 times\n```\n\n## PYTHON中的默认值\n\nPython还提供了一种更简单的方法，在创建函数时为不同的参数提供默认值。在编写参数时使用默认值完全是可选的。你可以将其与参数一起输入，也可以在函数调用中直接输入参数值。\n\
    \n使用默认值被认为是一种良好的实践，因为它减少了样板代码。样板代码是程序员需要为解释器编写的自动不必要的代码。在编写应用程序时减少样板代码可以使你的代码看起来不那么复杂，并提高可读性。\n\
    \n```\n程序代码：\ndef sports(country, number=5):\n    \"\"\" 这描述了一个国家赢得FIFA世界杯的次数\
    \ \"\"\"\n    print(country + \" has won FIFA \" + number + \" times\")\n\nsports('Brazil')\n\
    sports('Argentina')\n\n输出：\nBrazil has won FIFA 5 times\nArgentina has won FIFA\
    \ 5 times\n```\n\n在上面的例子中，使用默认值简化了函数调用。\n\n请记住，Python解释器仅在函数调用期间未提供参数值时才使用默认值。如果提供了该参数的参数值，则将使用提供的参数值，而不是默认参数值。\n\
    \n```\n程序代码：\ndef sports(country, number=5):\n    \"\"\" 这描述了一个国家赢得FIFA世界杯的次数\
    \ \"\"\"\n    print(country + \" has won FIFA \" + number + \" times\")\n\nsports('Brazil')\n\
    sports('Argentina', 4)\n\n输出：\nBrazil has won FIFA 5 times\nArgentina has won\
    \ FIFA 4 times\n```\n\n在上面的例子中，当我们只用一个参数调用函数时，它自动使用了默认值。然而，当我们用两个参数调用函数时，新参数值替换了默认值。\n\
    \n![](img/f3ac244212cac800ff2904a0d5535e2e_70_0.png)\n\n## 理解PYTHON中的作用域\n\n通常，在函数内声明的参数和变量只能在该函数内被调用或使用。相对于函数，这些变量将被称为局部作用域变量，而在函数外声明的变量将被称为全局作用域变量。\n\
    \n**注意：** 一个变量要么是局部变量，要么是全局变量；它不能同时是两者。\n\n## 为什么作用域很重要？\n\n作用域很重要，因为它有助于在执行程序时存储所有赋予它的变量。例如，如果一个程序被销毁，解释器将忘记所有先前赋予的变量，并且在程序重新启动时需要一组新的变量。\n\
    \n每当你在程序中调用一个函数时，都会创建一个局部作用域，并在函数返回值之前使用。当函数返回值时，解释器将忘记所有赋予的变量。\n\n程序员更喜欢在应用程序中使用作用域的主要原因是，它们可以帮助程序员找到在程序中造成错误情况的代码行。如果你对所有变量都使用全局作用域，你可能需要重新检查来自不同函数的所有变量。使用局部和全局变量将提高你的生产力，并帮助你高效地维护大型项目。\n\
    \n## 深入理解局部和全局作用域\n\n1.  你不能在全局作用域中使用局部变量。\n\n```\n程序代码：\ndef vegetable():\n \
    \   brinjal = 32\n\nvegetable()\nprint(eggs)\n\n输出：\nTraceback error\n```\n\n\
    上面提到的例子将生成一个回溯错误，因为你调用了一个带有局部变量的打印函数，而该变量不支持全局作用域。只需记住在全局作用域中只使用全局变量。\n\n2.  然而，所有局部函数都可以在需要时使用全局变量。\n\
    \n```\n程序代码：\ndef vegetable():\n    print(brinjal)\n\nbrinjal = 32\nvegetable()\n\
    print(brinjal)\n\n输出：\n32\n32\n```\n\n上面提到的例子将两次打印变量，因为局部函数可以使用具有全局作用域的变量。\n\n\
    3.  一个函数的局部变量不能被任何其他函数使用。\n\n```\n程序代码：\ndef vegetable():\n    brinjal = 32\n\
    \    fruits()\n    print(brinjal)\n\ndef fruits():\n    apple = 21\n    brinjal\
    \ = 42\n\nvegetable()\n\n输出：\n32\n```\n\n上面的例子很复杂，需要仔细理解才能编写更好的Python程序。\n\n1.\
    \  当调用函数 `vegetable()` 时，会创建一个值为32的局部作用域变量 `brinjal`。\n2.  立即调用另一个函数 `fruit()`，它创建了两个局部作用域变量\
    \ `apple` 和 `brinjal`，值分别为21和42。请记住，多个作用域值可以在Python程序中共存。\n3.  现在，`fruit()` 函数返回，因此所有存储的局部作用域变量都将被销毁。\n\
    4.  在下一行中，当使用打印语句时，解释器打印32而不是42。\n\n局部变量和全局变量可以具有相同的名称。在编写程序时不会产生冲突。例如，可以创建一个名为\
    \ `sample` 的局部变量和全局变量，而不会产生任何错误。虽然为具有局部和全局情况的变量使用相同的名称是可以接受的，但我们建议你不要这样做，因为它可能会导致混淆。\n\
    \n## 理解 'GLOBAL' 语句\n\n全局语句通常用于从函数内部更改全局作用域变量的值。\n\n```\n程序代码：\ndef vegetable():\n\
    \    global brinjal\n    brinjal = 'tasty'\n\nbrinjal = 'global'\nvegetable()\n\
    print(brinjal)\n\n输出：\ntasty\n```\n\n1.  正如我们在 `brinjal` 的全局语句中提到的，每当调用一个函数时，不会创建局部变量，而是创建一个具有全局作用域的变量。\n\
    2.  因此，当解释器执行打印语句时，将打印 `tasty` 的值，因为它是一个具有全局作用域的变量。\n\nPython程序中作用域的使用可以比作一个“黑匣子”，你只需要知道你给出的参数和参数。所有现代编程语言和库都不会要求你查看所有现有的全局作用域变量来增加你的负担。\n\
    \n从初学者的角度来看，你所要做的就是理解程序的功能，并向该函数插入值。\n\n## 如何导入模块\n\n模块是由一组类组合而成的。每个程序都需要模块来高效地完成任务。要使用模块，你需要使用\
    \ `import` 语句导入它们。导入模块与C/C++语言中的 `#include` 非常相似。导入模块通常提供在其他程序中使用这些类中存在的方法的权限。\n\
    \n```\n语法：\nimport (模块名称)\n\n示例：\nimport math\n```\n\n上面的语句将Python标准库 `math` 导入到程序中。\n\
    \n当使用导入模块语句时，它会搜索在创建模块时使用的 `_import()_` 函数。使用此场景可以轻松执行任何操作。"
