    # FUNDAMENTALS OF CLASSES


    Object-oriented programming is a programming paradigm style that changed how software
    institutions work. Object-oriented programming provides several practical approaches
    to writing software when working with teams. Python as a programming language
    supports both functional and object-oriented programming styles. As a Python programmer,
    you must understand and distinguish between classes and objects to write a program
    that represents real-world things and their instances.


