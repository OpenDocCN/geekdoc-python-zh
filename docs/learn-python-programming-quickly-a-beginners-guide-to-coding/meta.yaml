  md: '![](img/f3ac244212cac800ff2904a0d5535e2e_7_0.png)


    # WHO AM I?


    My name is Chris Ford, and I am an experienced Python programmer specializing
    in web design and data mining. My love for programming started seven years back
    when I first discovered a mobile app that automates things. I used it to perform
    tasks that I often forgot to do. Intrigued by the concept, I started to explore
    more about programming and the wonders it possesses. Even after strenuous research,
    because of a lack of good resources I struggled in my initial days to create any
    productive logical code that could turn into actual software.


    I performed due diligence and understood that I have been working with programming
    languages that are complex and work only for a single purpose. In my quest to
    find my programming language, I explored various programming languages such as
    C#, C, C++, and Java, before finally landing on Python. At first, I felt Python
    was a more straightforward language than the other higher-level languages that
    I had tried before. Once I got the hang of it, I understood the power it had and
    how much more it could do with little code.


    I was intrigued by the prowess of Python and started to work on small projects
    that helped me understand the language from a better perspective. Once I got good
    experience with small projects, I began to work on big projects such as websites
    and desktop software. My love for Python has grown exponentially over the years
    and helped me move forward in my programming career. I started to become proficient
    with web design and data mining with the help of Python libraries over the next
    couple of years.


    Last year due to the nationwide lockdown, when I was stuck like everyone in their
    own homes, I decided to write a book that could help people who are just being
    introduced to Python get an introduction that would help them shape their careers.
    Over the next few months, I did extensive research to create content that could
    be easily understood by a layman to the subject. This book provides concepts and
    examples specific to Python. It will help you ignite a programming philosophy
    that is essential for becoming an efficient programmer.


    Teaching Python is not an easy task as it requires a lot of precise understanding
    of the subject. So, to make readers understand the concepts thoroughly, I have
    provided practical exercises and many examples that one can use to work independently.


    # HOW CAN THIS BOOK HELP YOU?


    Python programming is simple to understand but hard to implement. To be aware
    of the abilities of the implementation features of Python, you need to have strong
    knowledge of the basics of the programming language. This book provides theoretical
    and practical knowledge required for a programmer to become efficient in writing
    Python programs.'
