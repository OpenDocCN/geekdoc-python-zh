    ## DIFFERENT VERSIONS OF PYTHON


    Python 2 and Python 3 are the two popular versions that beginners can use to create
    real-world applications. Understanding the differences between them in detail
    can help you while working with a real-world project or for a client.


    ## Python 2


    Python 2 was first released in 2000 with various innovative features that helped
    it become a preferred choice for programmers who craved simplicity.


    In 2021, the Python 2.7 version has become a legacy software, and no further development
    will be provided to it, making it an impractical choice for programmers. However,
    there are programmers who are stuck with Python 2.7 due to difficulties migrating
    written code into Python 3. Many companies and libraries don''t migrate their
    code instantly because it requires both money and time.


    Many notable features available in Python 3 have been backported by the Python
    developer team to Python 2.7 for migrating the projects swiftly. Researchers say
    that even though Python 2.7 has become a legacy software, there will be a demand
    for Python 2 developers until 2025.


    ## Python 3


    Python 3 was released in 2008 and since then has gone through significant changes
    to make Python as effective as possible for real-world projects. Unlike Python
    2, it uses simpler syntax and hence can be easy to maintain.


    The popularity of Python 3 is also due to its adaptability with different modern
    computing fields such as artificial intelligence and machine learning. All the
    developers are creating libraries specifically for Python 3, which is why it is
    essential to learn it. Python 3.9 is the latest available version for developers.


    ## What Should I Choose?


    While the Python version you choose is entirely a personal choice according to
    your requirements, I recommend Python 3. Python 3 is not only simpler to learn
    but also helps programmers create more reliable code. Python 3 is also more versatile
    and powerful, and hence it is my recommended choice for anyone beginning with
    Python.


    **Note:** All the code provided in this book uses Python 3 syntactical rules.


    ## HOW TO INSTALL PYTHON TO GET STARTED


    Python is highly portable and can run on any operating system. Head over to [Python.org](https://www.python.org)
    to download Python 3.


    Any program or application that you develop can run in all the operating systems
    with a slight change in the code.


    For example, a Python network mapper written for the Windows platform can also
    work with Linux if you can change the implementation of ports in the software
    as both operating systems use different approaches to interact with ports.


    As a programmer, it is essential that you understand installing Python in different
    operating systems.


    ## Python on Linux


    Linux is an open-source operating system that is majorly used by programmers.
    As Linux is specifically designed for programming, almost all Linux distros have
    Python pre-installed in it.


    To check whether or not Python is installed in your Linux system, you need to
    enter a terminal. To open a new terminal in your system, use Ctrl + Alt + N.


    Once a terminal is opened, enter the following command.


    ### Terminal Code:


    ```

    $ python3

    ```


    If Python is installed in your system, you will be welcomed with license information
    related to Python. However, if you receive a blank screen, it means that the Python
    3 is not shipped with your Linux distro. You will need to use package managers
    to install Python.


    Many other popular Linux distros, such as Arch, Gentoo and Kali, use different
    commands and package managers to install a package. Make sure you research according
    to your Linux distro not to face any errors.


    ## Python on macOS


    macOS is one of the popular operating systems that Apple maintains. Like Linux,
    macOS also deploys its operating systems with inbuilt Python support.


    To check whether or not Python is installed in macOS, you need first to enter
    a terminal. Open a terminal by entering the Utilities menu in your home bar.


    Once a terminal is opened, enter the below command.


    ### Terminal code:


    ```

    $ python3

    ```


    If you are not welcomed by a license message, then Python is not installed in
    your system. It will help if you use a package manager such as Homebrew to install
    the latest version of Python in macOS.


    ### Terminal code:


    ```

    $ brew install python3

    ```


    ## Python on Windows


    Windows is the popular operating system in the world that Microsoft developed.
    Windows systems are not available as default software in Windows, and hence you
    need to install an executable package to start experimenting with Python programs.


    To install Python 3 in Windows, head over to [Python.org](https://www.python.org)
    and click on the downloads tab, where you can find different executable files
    according to your operating system. Download the executable installer which automatically
    installs Python according to your preferred location. After installing the Python
    installer, make sure that you add “path” in environment variables using a control
    panel to avoid conflicts with any other programming language interpreters present
    in the system.


    You can confirm whether or not a Python interpreter is installed in a Windows
    system using the below command.


    ### Command prompt code:


    ```

    > python --version

    ```


    If you face any problems while installing Python in your preferred operating system,
    we suggest you Google the error displayed in the terminal.


    ## BASICS OF PYTHON


    To create software applications using Python, you need to utilize a development
    environment to perform high-level programming tasks. This chapter is designed
    to help readers understand the importance of a productive development style that
    Python programmers should focus on.


    ## PYTHON INTERPRETER


    Python is an interpreted language. It comes with additional advantages that other
    high-level programming languages cannot provide. For example, Python programs
    are easy to test as they involve less waiting time.


    Compared to its predecessor compilers, interpreters can directly perform actions
    and are recommended as a favorable choice for beginners.


    When you install Python in your system, an interpreter along with an IDLE (Integrated
    Development and Learning Environment) will be installed in your system. You can
    either search it in your system or enter the command “python” to trigger IDLE
    in the shell terminal.


    Python IDLE can be considered an ideal development tool for beginners who are
    just starting with Python. IDLE first reads the line in a program, evaluates its
    instructions, prints them on the screen, and loops into the following line. This
    mechanism is known as REPL and is a fundamental concept all interpreters use to
    parse and run the code effectively.


    With the IDLE, you can easily edit and create files with a .py extension. IDLE
    provides tracebacks to mention the errors in a particular line to keep beginners
    from getting overwhelmed with failed executions.


    **How to Use the Python IDLE shell?**


    Open a terminal using the default “python” command in the terminal.


    ```

    Terminal code:

    $ python

    ```


    The terminal will open a shell window, as shown below.


    ```

    Output:

    >>>

    ```


    Some examples:

    IDLE can be used to test Python code with any simple arithmetic calculations and
    for printing statements.


    ```

    Program code:

    >>> print ( " This is a sample text " )

    ```


    When you press enter, the IDLE will enter into REPL mode and will print the given
    text on the screen, as shown below.


    ```

    Output:

    This is a sample text

    ```


    In the above example, print() is a method in Python’s standard library that programmers
    can use to output strings in the terminal window.


    Now, we will look at some of the arithmetic examples.


    ```

    Program code:

    >>> 2 + 5

    ```


    Here, we are using an addition operator, and the IDLE will instantaneously display
    seven as output once we press the Enter key.


    ```

    Output:

    7

    ```


    **Note:** Remember that once you start a fresh terminal, all the ongoing code
    in the IDLE will destroy itself.


    ### How to Open Python Files in IDLE


    Python inbuilt text editor provides you three essential features that are essential
    for a coding environment.


    - It can automatically highlight your code syntax

    - It can automatically help you complete default code

    - It can automatically indent your code


    To open a file in IDLE, all you have to do is choose the File menu in the toolbar
    and click open. Action will open your file system so that you can choose the file.
    Advanced programmers usually specify a path to open Python files instantly.


    ### How to Edit Files in IDLE


    Once you successfully open a Python file, you will be able to edit it with your
    code. IDLE will provide specific information such as the file name, path, and
    line and column numbers to help the programmer easily create and debug the code.


    After editing the file, you can execute it using the F5 key.


    Python IDLE is also a great debugging tool for small projects. It provides essential
    debugging features such as breakpoints and catching exceptions to debug the code
    quickly. However, if the volume of the project increases, IDLE will struggle to
    parse and debug the code effectively.


    **Note:** Python IDLE provides a help() function to provide easy reference for
    programmers. You can use help() to find implementation information about any method
    or standard library.


