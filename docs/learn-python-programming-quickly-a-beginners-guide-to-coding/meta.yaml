    ```


    However, remember that you can only use this with the exact elements you have
    on your list. Otherwise, a type error will occur and will crash the program.


    ## Finding Value In a List Using The index() Method


    Python also provides various inbuilt functions that help programmers to extract
    different additional data from these data structures.


    ```

    Program code:

    Sample = [USA, China, Russia, Japan, South Korea]

    Sample.index(''Japan'')

    Output:

    3

    ```


    In the above example, the index method has mentioned a list element as an attribute,
    and so it gave the index number of the list as a result. If you provide a list
    element that doesn''t exist, then a type error will occur.


    ```

    Program code:

    Sample = [USA, China, Russia, Japan, South Korea]

    Sample.index(''Switzerland'')

    Output:

    Type error: list element doesn''t exist

    ```


    ## Adding Values to a List Using append() And insert()


    Adding list elements in your favorable index position is essential when you are
    working with python programs.


    ```

    Program code:

    Sample = [USA, China, Russia, Japan, South Korea]

    Sample.append(''Canada'')

