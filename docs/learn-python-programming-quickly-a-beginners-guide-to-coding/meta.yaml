    ## PYTHON基础


    要使用Python创建软件应用，你需要利用开发环境来执行高级编程任务。本章旨在帮助读者理解Python程序员应关注的高效开发方式的重要性。


    ## PYTHON解释器


    Python是一种解释型语言。它具有其他高级编程语言无法提供的额外优势。例如，Python程序易于测试，因为它们涉及的等待时间较少。


    与传统的编译器相比，解释器可以直接执行操作，被推荐为初学者的有利选择。


