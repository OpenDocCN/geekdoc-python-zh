    [USA, China, Russia, Canada, Japan, South Korea]

    ```


    In the above example, a new element called ‘Canada’ is added in the index position
    3, and the previously present elements move an index forward.


    ## Removing List Elements Using remove()


    Using the remove() method, a programmer can quickly delete an element from the
    list.


    ```

    Program code:

    Sample = [USA, China, Russia, Japan, South Korea]

    Sample.remove(‘Japan’)

    Sample

    Output:

    [USA, China, Russia, South Korea]

    ```


    In the above example, the element ‘Japan’ is removed from the list using the remove()
    method. If you try to remove an element that doesn’t exist in the list, a value
