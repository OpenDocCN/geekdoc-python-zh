    ## 字符串格式化


    字符串通常用于显示在程序中操作发生时想要出现的信息。许多人还使用字符串来动态显示用户提供的输入值。


    要执行字符串格式化，Python 程序员主要可以遵循两种不同的策略。


    ### 1. 使用占位符格式化


    在这种方法中，程序员需要使用 %（取模）运算符来格式化字符串的外观。使用占位符来格式化字符串是最古老的方法，''%'' 被著名地称为字符串格式化运算符。


    ```

    程序代码：

