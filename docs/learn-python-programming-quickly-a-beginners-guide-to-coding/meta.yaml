    ```


    ## List Replication


    You can multiply two strings using the list replication technique. To perform
    the replication technique, you need to use the "*" operator.


    ```

    Program code:

    [4, 5, 6] * 3

    Output:

    [4, 5, 6, 4, 5, 6, 4, 5, 6]

    ```


    You can also easily remove an element from a list using del statements. However,
    remember that when you delete a middle element, the value of indices will change
    automatically, so your results may change. Confirm whether or not it will affect
    any other operation before proceeding with the deletion.


    ```

    Program code:

    >>> sample = [USA, China, Russia, Japan, South Korea]

    >>> del sample[3]

    >>> sample

    Output:

    [USA, China, Russia, South Korea]

    ```


    ## ‘in’ and ‘not in’ Operators for Lists


    Python provides two operators called ‘in’ and ‘not in’ to determine whether or
    not an element is there in a list. All the output results for these operators
    will be given as a Boolean value.


    ```

    Program code:

    >>> ''China'' in [USA, China, Russia, Japan, South Korea]

    Output:

    TRUE

    Program code:

    Sample = [USA, China, Russia, Japan, South Korea]

    ''Mexico'' not in sample

    Output:

    TRUE

    ```


    You can also use multiple assignment statements to allot a list element to a variable.


    ```

    Example:

    Sample = [USA, China, Russia, Japan, South Korea]

    Result1 = sample[0]

    Result2 = sample[2]

    Result3 = sample[1]

    ```


    Instead of assigning a variable to an individual list item separately, you can
    use the following format.


    ```

    Program code:

