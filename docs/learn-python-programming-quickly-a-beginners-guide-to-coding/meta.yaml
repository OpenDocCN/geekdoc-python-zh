  md: '# DATA TYPES IN PYTHON


    Python programming language deals with a lot of different types of data to create
    universal applications. Understanding these different sets of values, the operations
    that programmers can make, and their importance in software development are essential
    for beginners.


    # WHAT ARE DATA TYPES?


    In simple terms, data types are a set of values that programmers define while
    creating variables in programming languages. As Python is not a statically typed
    language, there is no rule to define them specifically. The Python interpreter
    will usually automatically detect the data type for a variable and perform operations.
    Even though there is no need to define them, understanding data types is an essential
    skill for creating intricate programs.


    For example, when you create a variable named ''first'' with a value 10, you typically
    create a variable ''value'' with a value ''10'' of data type ''integer''. Python
    automatically detects the data types of all the variable values as it is a dynamically
    typed language.


    ```

    Program code:

    first = 10

    ```


    Statically typed languages such as C make it mandatory for programmers to mention
    the data type when declaring a variable.


    For example, in C language, a variable with a float data type is declared, as
    shown below.


    ```

    Program code:

    float age = 64;

    ```


    # UNDERSTANDING DATA TYPES


    To understand data types in much more depth, you need to understand some of the
    essential code fragments in a Python program.


    ```

    Example:

    a = 64

    b = 54

    c = a + b

    ```


    Here a, b, and c act as variables and ''+'' and ''='' are operators.


    The value given to the variables is known as a literal and represents a data type
    value. 64 and 54 are the literals in the above example. A literal usually acts
    as a directive to insert a specific value into a variable.


    The popular data types in Python are integer, float, string, and Boolean. Understanding
    data types in depth and the operations possible on them is a mandatory prerequisite
    for Python programmers.


    # Strings


    Strings are data types that are used to represent text in programs. Strings are
    usually enclosed in single quotes and have a sequence of characters. When you
    use a string data type, an ''str'' object with a sequence of characters is created.'
