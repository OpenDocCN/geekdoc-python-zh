    the file name which represents its identity and helps users find the content present
    in it. The other is the file path; this allows users to know where the file is
    located in an operating system.


    For example, if sample.pdf is a file, then ‘C:/users/python/sample.pdf’ is the
    path for the file. Here, pdf is the extension of the file. A file management system
    usually consists of folders and directories to effectively organize all the files
    in the system.


    For example, in ‘C:/users/python/sample.pdf’, C is the system''s root directory,
    and both ‘users’ and ‘python’ can be called subfolders in the root directory.
    Whenever you need to modify or add content to a file using Python, you must explicitly
    mention the file''s path. Otherwise, the command provided will not work and will
    return you an error.'
