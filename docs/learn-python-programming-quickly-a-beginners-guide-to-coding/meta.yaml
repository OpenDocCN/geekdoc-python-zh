  md: '# PYTHON INHERITANCE


    Object-oriented programming provides a solution for not repeating code that another
    programmer has already written. When you write a class, you create different attributes
    and methods using those attributes. Let us suppose that you need to use that class
    along with a few other new methods. In this situation, you can use inheritance.


    Inheritance is a classic object-oriented programming concept that helps programmers
    inherit one class''s properties to another class. The original class from which
    a new class is inherited is usually known as a parent class, and the inherited
    class from a parent class is known as a child class.


    Child class, along with inheriting all the attributes and methods present in parent
    class, can also define new methods for extending the capability of the parent
    class.


    ```

    Syntax:

    Class parent class :

    Body of parent class

    class child class ( parent class) :

    Body of child class

    ```


    For example, let us suppose that a car is a parent class and BMW is a child class,
    then the inheritance syntax will look as shown below.


    ```

    Inheritance syntax:

    Class car

    Print ( " This is a car class")

    Class BMW(car) :

    Print ( " This is a BMW class")

    ```


    The BMW class now uses all the functions present in the Car class without rewriting
    them again.


    # METHOD OVERRIDING IN PYTHON


    When you inherit a class, all the functions will be used by a derived class. However,
    if there are two methods with the same name in both parent and child classes,
    the interpreter will prefer the child class instead of the parent class.'
