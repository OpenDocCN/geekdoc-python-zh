    ## Integers


    Integers are the data types in Python that are used to represent numbers from
    0 to 9. Programs often use ‘int’ literals because they are required for both program
    logic execution and complex arithmetic calculations.


    When a Python interpreter encounters an ‘int’ while execution, it creates an int
