    4. Data Types in Python\n    - What Are Data Types?\n    - Understanding Data\
    \ Types\n    - Type Casting\n\n5. Lists and Tuples\n    - What Is a List Data\
    \ Type?\n    - Understanding Tuples\n    - Understanding Dictionaries\n    - Sample\
    \ Exercise\n    - Exercise:\n\n6. User Input and Output\n    - Why Are Input Values\
    \ Necessary?\n    - Understanding input() Function\n    - How to Write Clear Prompts\
    \ for the User\n    - Int() to Accept Numeric Input\n    - Output\n    - Sample\
