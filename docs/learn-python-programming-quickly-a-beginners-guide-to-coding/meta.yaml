    # String Formatting


    Strings are usually used to display the information that wants to appear when
    action appears in the program. Many also use strings to display input values dynamically
    given by the user.


    To perform string formatting, Python programmers can primarily follow two different
    strategies.


    # 1. Format with placeholders


    In this method, programmers are required to use the % (modulus) operator to format
    the appearance of the strings. Using placeholders to format strings is the oldest
    method, and ''%'' is famously called a string formatting operator.


    ```

    Program code:

    >>> print ( " %s is a great game" % ''football'')

    Output:

    football is a great game

    ```


    Using the placeholders method, you can also format two strings at the same time.


    ```

    Program code:

    >>> print ( " %s is the national sport of %s" (''Baseball'', ''USA'') )

    Output:

    Baseball is the national sport of USA

    ```


    Remember that while %s is used to format strings, you can use %d to format integers
    and %f to format floating-point numbers.


    ```

    Program code:

    >>> print ( " Brazil won FIFA world cup %d times" % 5)

    Output:

    Brazil won FIFA world cup 5 times

    ```


    To format floating-point numbers in a string, you need to use a different format
    known as %a.bf. Here, a represents the minimum number of strings displayed on
    the screen, and b represents the number of digits used after the example.


    ```

    Program code:

    >>> print ( " The exchange rate of USD to EUR is : %5.2f" % (0.7546))

    Output:

    The exchange rate of USD to EUR is : 0.75

    ```'
  - '[PAGE 36]


    # 2. Format with .format() string


    Python 3 has provided a special method known as .format() to format strings instead
    of the traditional modulus (%) operator. Python 2 also has recently adopted the
    .format() method into its standard library.


    ```

    Example:

    >>> print ( " Football is popular sport in {}." .format('' South America'') )

    Output:

    Football is popular sport in South America

    Using .format(), we can also format the strings using indexed based positions.

    Program code:

    >>> print( '' {3} {2} {1} {0}'' .format ( '' again'' , ''great'' , '' America''
    , '' Make'') )

    Output:

    Make America great again

    ```


    Apart from these two ways, you can also format strings in Python using f-strings.
    Lambda expressions can be used in this method and are used when there is a requirement
    for advanced formatting scenarios.


    While it is tempting to use the placeholder method as it is easy to implement,
    we recommend using the .format() method as it is considered the best practice
    by many Python 3 experts. The placeholder method usually takes a lot more time
    to execute during runtime and is not a good solution, especially for large projects.


    # String Manipulation Techniques


    Strings are the most utilized data type in programs because data instantiation
    usually happens through strings. Understanding string manipulation techniques
    is a prerequisite skill for Python programmers. Many data scientists and data
    analysts solely depend on these manipulation techniques to create rigorous machine
    learning models.


    The most important string manipulation technique Python programmers need to be
    aware of is concatenating and multiplying the strings.


    # 1. Concatenate


    Concatenate refers to joining strings together to make a new string. To concatenate
    two strings, you can use the arithmetic operator ''+''. You can also separate
    the added strings using white space for better readability.


    ```

    Program code:

    Sample = '' This is '' + '' '' + '' FIFA world cup''

    Print( sample)

    Output:

    This is FIFA world cup

    ```


    In the above example, if the white space is not provided, both strings will be
    together as Python interpreter usually displays output without formatting.


    # 2. Multiply


    Multiplying refers to copying strings again and again easily. A Python programmer
    can use the mathematical operator "*" to multiply strings easily.


    ```

    Program code:

    Sample = '' welcome '' * 4

    # This makes the string to multiply itself 4 times

    Sample1 = '' To whoever you are ''

    Print( sample + sample1)

    Output:

    welcome welcome welcome welcome To whomever you are

    ```


    In the above example, we first multiplied the strings and then concatenated them
    to another string.


    # 3. Appending strings


    While both concatenating and multiplying strings are considered basic string manipulation
    techniques, you can further improve your strings efficiency by appending the strings
    using a special operator (+=).


