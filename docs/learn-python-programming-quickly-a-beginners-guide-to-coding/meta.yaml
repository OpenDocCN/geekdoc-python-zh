    and to achieve several use cases, we need to understand the ability to control
    flow statements that all high-level programming languages support.


    Without control flow statements, programs will become dumb and mechanical, increasing
    the program''s runtime. A good programmer should always use programming components
    that can decrease program execution time. Programming languages provide control
    flow statements for this exact purpose. Understanding control flow statements
