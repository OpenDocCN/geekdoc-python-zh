    ## LISTS AND TUPLES


    As a programmer, you need to deal with a lot of data instead of single linear
    data. Python uses data structures such as lists, tuples, and dictionaries to handle
    more data efficiently. Understanding these data structures that help Python programmers
    manipulate and easily modify the data is an essential prerequisite for beginners.


    ## WHAT IS A LIST DATA TYPE?


    A list is a unique data structure that can hold multiple values of different data
    types in sequential order. Whenever programmers mention ‘list value,’ it represents
    the whole list itself. Like any variable, the list itself can be manipulated,
    replaced, passed to a function and can destroy the Python variable mechanism.


    Lists are usually represented as shown below:


    `[64, 48, 32]`


    Here 64, 48, and 32 are list elements. All the elements in the list are of integer
    data type.


    Lists usually start with a square bracket and end with a square bracket. Commas
    will usually separate all the elements in the list. If the elements in the lists
    are of string data type, they will be enclosed within quotes. Elements inside
    the list can also be called items.


    ```

    Example:

    [USA, China, Russia]

    Here USA, China, and Russia are the elements in the list. They are string data
    types.

    List to variable:

    >>> sample = [USA, China, Russia]

    >>> sample

    Output:

    [USA, China, Russia]

    ```


    In the above example, the variable ‘sample’ has now stored the list provided.
    You can call the list using a variable like you print any other value of standard
    data types on the screen.


    ### Empty List


    If the list doesn’t consist of any elements, it is called an empty or null list.


    It is usually represented as `[]`.


    ```

    Program code:

    >>> sample = []

    # This is an empty list

    ```


    ### Understanding Index in Lists


    Every element in the list can be individually called, manipulated, or modified
    using a unique Python feature known as indexes. Usually, the index numbers start
    with ‘0’, and you can use them as shown in the below example.


    Let us suppose that the list is `[USA, China, Russia]`.


    ```

    Program code:

    >>> sample = [USA, China, Russia]

    >>> sample[0]

    ```'
