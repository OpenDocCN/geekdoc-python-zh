    \ Scope in Python\n    - Understanding the 'Global' Statement\n    - How to Import\
    \ Modules\n    - How to Create Modules\n    - Built-in Function and Modules\n\
    \    - String Methods\n    - Sample Exercise\n    - Sample Exercise\n    - Exercise:\n\
    \n9. Fundamentals of Classes\n    - What Are Classes and Objects?\n    - Exercises:\n\
    \    - What Are Class and Instance Variables?\n    - What Are Class and Static\
    \ Methods?\n\n10. Python Inheritance\n    - Method Overriding in Python\n    -\
    \ Special Methods in Python (__repr__ and __str__)\n\n11. Files in Python\n  \
    \  - Understanding Files and File Paths\n    - Exercise:\n\n12. Advanced Programming\n\
    \    - Python Recursion\n    - Python Lambda Function\n    - Advanced Dictionary\
    \ Functions\n    - Threading\n    - Pip Package Manager\n    - Virtual Environment\n\
    \    - Using Pillow Library to Edit Images\n    - Mastering Python Regular Expressions\
    \ (Regex)\n    - Understanding JSON Data\n    - Understanding Sys Module\n   \
    \ - Iterators and Generators\n    - Jupyter Notebook\n    - Unit Testing\n   \
    \ - GitHub for Python programmers\n    - Different Python Libraries\n\nConclusion\n\
    \nReferences\n\n## A FREE GIFT TO OUR READERS\n\nProgramming can be hard if you\
    \ don’t avoid these 7 biggest mistakes! Visit [chrisfordbooks.com](http://www.chrisfordbooks.com/)\
    \ to get this free PDF guide.\n\n[http://www.chrisfordbooks.com/](http://www.chrisfordbooks.com/)\n\
    \n## INTRODUCTION\n\nComputers have changed the world with their arithmetic and\
    \ logical skills. Computers can also be called dumb machines that can do only\
    \ what they are said to do. Humans who can communicate efficiently with these\
    \ dumb machines to do tasks efficiently and quickly are known as computer programmers.\
    \ Like humans who communicate with each other using different languages, these\
    \ computer programmers try to communicate with computers using high-level programming\
    \ languages that they can understand.\n\nPython, Java, C, C#, and Swift are some\
    \ of these high-level programming languages that have changed the world over the\
    \ last few decades. All websites, databases, mobile apps, ATMs, traffic control,\
    \ and many other day-to-day usages use software written using these programming\
    \ languages.\n\nThis book acts as a beginner's guide to programming by using Python\
    \ as a reference programming language. Python has proved its worth in the programming\
    \ arena with its high adaptability to any domain or operating system. If you are\
    \ a beginner and are looking forward to understanding programming basics using\
    \ Python, you have made the right choice. Even if you are an experienced programmer,\
    \ alienating from other languages and choosing Python as your primary programming\
    \ language can help you to write more effective code in less time.\n\n## WHY IS\
    \ LEARNING PYTHON ESSENTIAL?\n\nPython is considered a programming language that\
    \ can automate things in any domain related to software technology. Do you want\
    \ to create a web application? Python has web libraries to make it possible. Do\
    \ you want to analyze large chunks of data and create a machine learning model\
    \ to predict future instances? Python can do this. Do you want to create automated\
    \ scripts that can maintain your web servers and databases? Python can do it gracefully.\
    \ Do you want to develop exploits and find vulnerabilities that can exploit the\
    \ system? Python can help you.\n\nThis fantastic correlation with every domain\
    \ that exists out there has made Python a popular programming language to learn.\
    \ Many software companies have listed Python as their programming language and\
    \ will hire an employee based on their efficiency with it. Learning Python can\
    \ help you secure a career in the software industry irrespective of your chosen\
    \ domain, making it an essential prerequisite among beginners.\n\n## WHO AM I?\n\
    \nMy name is Chris Ford, and I am an experienced Python programmer specializing\
    \ in web design and data mining. My love for programming started seven years back\
    \ when I first discovered a mobile app that automates things. I used it to perform\
    \ tasks that I often forgot to do. Intrigued by the concept, I started to explore\
    \ more about programming and the wonders it possesses. Even after strenuous research,\
    \ because of a lack of good resources I struggled in my initial days to create\
    \ any productive logical code that could turn into actual software.\n\nI performed\
    \ due diligence and understood that I have been working with programming languages\
    \ that are complex and work only for a single purpose. In my quest to find my\
    \ programming language, I explored various programming languages such as C#, C,\
    \ C++, and Java, before finally landing on Python. At first, I felt Python was\
    \ a more straightforward language than the other higher-level languages that I\
    \ had tried before. Once I got the hang of it, I understood the power it had and\
    \ how much more it could do with little code.\n\nI was intrigued by the prowess\
    \ of Python and started to work on small projects that helped me understand the\
    \ language from a better perspective. Once I got good experience with small projects,\
    \ I began to work on big projects such as websites and desktop software. My love\
    \ for Python has grown exponentially over the years and helped me move forward\
    \ in my programming career. I started to become proficient with web design and\
    \ data mining with the help of Python libraries over the next couple of years.\n\
    \nLast year due to the nationwide lockdown, when I was stuck like everyone in\
    \ their own homes, I decided to write a book that could help people who are just\
    \ being introduced to Python get an introduction that would help them shape their\
    \ careers. Over the next few months, I did extensive research to create content\
    \ that could be easily understood by a layman to the subject. This book provides\
    \ concepts and examples specific to Python. It will help you ignite a programming\
    \ philosophy that is essential for becoming an efficient programmer.\n\nTeaching\
    \ Python is not an easy task as it requires a lot of precise understanding of\
    \ the subject. So, to make readers understand the concepts thoroughly, I have\
    \ provided practical exercises and many examples that one can use to work independently.\n\
    \n## HOW CAN THIS BOOK HELP YOU?\n\nPython programming is simple to understand\
    \ but hard to implement. To be aware of the abilities of the implementation features\
    \ of Python, you need to have strong knowledge of the basics of the programming\
    \ language. This book provides theoretical and practical knowledge required for\
    \ a programmer to become efficient in writing Python programs."
