    ## 4. 代码补全


    IDE 提供智能代码补全功能，帮助初学者不偏离程序的逻辑实现。IDE 使用复杂的人工智能和机器学习算法来预测编程任务中的下一步操作。然而，请记住不要完全依赖它们，因为编程始终是一项人类任务，并且将来也会是。


