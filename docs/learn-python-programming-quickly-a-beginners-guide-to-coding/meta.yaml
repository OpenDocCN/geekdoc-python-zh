  md: '# Python 2


    Python 2 was first released in 2000 with various innovative features that helped
    it become a preferred choice for programmers who craved simplicity.


    In 2021, the Python 2.7 version has become a legacy software, and no further development
    will be provided to it, making it an impractical choice for programmers. However,
    there are programmers who are stuck with Python 2.7 due to difficulties migrating
    written code into Python 3. Many companies and libraries don''t migrate their
    code instantly because it requires both money and time.


    Many notable features available in Python 3 have been backported by the Python
    developer team to Python 2.7 for migrating the projects swiftly. Researchers say
    that even though Python 2.7 has become a legacy software, there will be a demand
    for Python 2 developers until 2025.


    # Python 3


    Python 3 was released in 2008 and since then has gone through significant changes
    to make Python as effective as possible for real-world projects. Unlike Python
    2, it uses simpler syntax and hence can be easy to maintain.


    The popularity of Python 3 is also due to its adaptability with different modern
    computing fields such as artificial intelligence and machine learning. All the
    developers are creating libraries specifically for Python 3, which is why it is
    essential to learn it. Python 3.9 is the latest available version for developers.


    # What Should I Choose?


    While the Python version you choose is entirely a personal choice according to
    your requirements, I recommend Python 3. Python 3 is not only simpler to learn
    but also helps programmers create more reliable code. Python 3 is also more versatile
    and powerful, and hence it is my recommended choice for anyone beginning with
    Python.


    **Note:** All the code provided in this book uses Python 3 syntactical rules.


    # HOW TO INSTALL PYTHON TO GET STARTED


    Python is highly portable and can run on any operating system. Head over to [Python.org](https://www.python.org)
    to download Python 3.


    Any program or application that you develop can run in all the operating systems
    with a slight change in the code.


    For example, a Python network mapper written for the Windows platform can also
    work with Linux if you can change the implementation of ports in the software
    as both operating systems use different approaches to interact with ports.


    As a programmer, it is essential that you understand installing Python in different
    operating systems.


    # Python on Linux


    Linux is an open-source operating system that is majorly used by programmers.
    As Linux is specifically designed for programming, almost all Linux distros have
    Python pre-installed in it.


    To check whether or not Python is installed in your Linux system, you need to
    enter a terminal. To open a new terminal in your system, use Ctrl + Alt + N.


    Once a terminal is opened, enter the following command.


    # Terminal Code:


    ```

    $ python3

    ```


    If Python is installed in your system, you will be welcomed with license information
    related to Python. However, if you receive a blank screen, it means that the Python
    3 is not shipped with your Linux distro. You will need to use package managers
    to install Python.'
