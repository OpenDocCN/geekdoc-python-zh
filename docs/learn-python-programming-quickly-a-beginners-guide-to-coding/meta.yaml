- md: '## PROGRAMMING STRUCTURES


    Computer programmers use programming structures to represent logical reasoning
    to code effectively. Python programmers commonly use three programming structures
    to organize and execute code effectively.


    ### 1. Sequential structure


    In a sequential structure, all the steps involved in a program are executed linearly.


    ```

    Example:

    A = 6

    Print(a + "is a number" )

    Output:

    6 is a number

    ```


    In the above example, the Python interpreter has executed all the steps linearly.


    ### 2. Conditional structure


    The conditional structure is also called a selection structure and uses conditional
    statements to choose which steps of a program to execute. In this structure, only
    partial statements are executed as when a program makes a decision, the Python
    interpreter will ignore the other part in the conditional statement.


    "If" and "if-else" are some of the famous conditional structure statements.


    ### 3. Looping structure


    The looping structure uses conditions to execute the same programming step repeatedly
    until the condition is not satisfied. Loop termination is decided by the judgment
    condition that the programmer writes.


    "While" and "for" loops are some of the famous looping structure statements.


    ## IF/ELSE CONDITIONAL STATEMENTS


    Decision making is essential while writing Python programs as all real-world applications
    need certain conditions to be satisfied for performing specific operations.


    Python provides an if/else statement to make programmers implement the logic of
    decision making in their programs.


    ```

    Syntax:

    If Condition

    Body Statement

    Else

    Body Statement

    ```


    ```

    Program code:

    Sample = 64

    If sample % 4 == 0

    Print ( " This is divided by four " )

    else :

    Print ( " This is not divided by four " )

    Output:

    This is divided by four

    ```


    ## IF ELIF ELSE


    You can further expand the ability of your programs by using multiple conditional
    expressions. If you have multiple statements that need to be checked, then using
    this conditional statement is recommended.


    ```

    Program code:

    Sample = 64

    If sample > 0 :

    Print ( " This is a positive real number " )

    Elif sample == 0 :

    Print( " The number is zero " )

    else :

    Print ( " This is a negative real number " )

    Output:

    This is a positive real number

    ```


    You can also create nested if/else statements to check more conditions and execute
    statements according to them.


    ## FOR LOOP


    For loop is used to iterate over some of the sequences repeatedly until they satisfy
    the condition. You can perform for loops with sequences such as lists, tuples,
    and strings.


    ```

    Syntax:

    For val in list :

    Body of loop

    ```


    The for loop usually goes through all the elements in the list until it is said
    so.


    ```

    Example:

    Sample = [2,4,6,8,10]

    Result = 0

    For val in sample :

    Result = result + val

    Print ( " The sum of the numbers is ", result)

    Output:

    The sum of the numbers is 30

    ```


    In the above example, the for loop has executed all the numbers in the list until
    the condition is satisfied.


    ## WHILE LOOP


    While loop differs from for loop slightly. It can loop over any piece of code
    again and again until the condition is satisfied. The for loop is used when a
    programmer knows how many times a loop is going to be done, whereas the while
    loop is used when a programmer is not aware of the number of times a loop can
    happen.


    ```

    Syntax:

    While condition

    Body statements of while

    Example:

    Sample = 10

    First = 0

    Second = 1

    While second <= sample

    First = first + second

    Second = second + 1

    Print ( " The sum of numbers is: ", first )

    Output:

    Enter n: 4

    The sum of numbers is 10

    ```


    You can interlink while and for loops with conditional statements to create complex
    programming logic.


    ## BREAK AND CONTINUE STATEMENTS


    Loops can be controlled and customized with the help of break and continue statements
    provided by Python. While loops are designed to iterate over a code block until
    they satisfy a condition, programmers can customize them to end or skip certain
    statements based on a result using break and continue.


    ### What is Python break?


    Whenever the Python interpreter sees a break in a loop statement, it ends the
    program flow. If a break is encountered in a loop, then the innermost loop will
    be terminated.


    **Syntax:**

    Break


    ### What is Python continue?


    Whenever the Python interpreter encounters a continue statement, it will skip
    the code that follows. The loop, however, doesn’t exit completely in this condition.
    It just skips to the next iteration once it encounters it.


    **Syntax:**

    Continue


    ## EXCEPTION HANDLING


    Programming languages use exception handling to detect the common errors and find
    a way to run the program instead of getting crashed. Writing valid exceptions
    is an essential skill for all the programmers involved in software development.
    Exception handling also acts as a great tool to detect both familiar and strange
    bugs during the testing and maintenance stage of the project.


    To handle errors, you need to be aware of try and except statements that can help
    you to provide a reason for the encountered error to the user.


    ### Example:


    Visit your Facebook page and try to insert an image with a size of more than 64MB
    as your profile picture. After a few minutes of loading, the website will pop
    you with an error that says, “Image size is too large”.


    Here, the Facebook programmers have created an exception handling statement that
    displays a possible error to the user when image size is exceeded.


    Exception handling is also an excellent tool for programmers to learn how a program
    responds to different instances. Many web and mobile application libraries in
    Python provide prebuilt exceptions to help programmers quickly create bug-free
    applications.


    ### Divide-by-Zero Error


    When we divide a number by zero in mathematics, it cannot be done and results
    in an undefined value. Even in programming, it is impossible to define when a
    number is divided by zero, and therefore all the core programming languages provide
    divide-by-zero error for their users.


    We can use this error type to understand exception handling with try and except
    statements.


    ```

    Program code:

    Def division(value) :

    Return 64 / value

    Print( value(4) )

    Print( value (0) )

    Print ( value(16) )

    Output:

    16

    ZeroDivisionError : Division by zero

    ```


    In the above example, when we try to call a function with an argument of 0, the
    program ends with a ZeroDivisionError. So, we try to show this error and proceed
    further with the program using try and except statements.


    ### What Are Try and Except Statements?


    Python programmers need to write the potential error block that may occur while
    executing the program in the ‘try’ block and should provide a logical solution
    about what the interpreter should do when it catches an exception in the ‘except’
    block.


    ```

    Program code:

    Def division(value) :

    Try :

    Return 64 / value

    Except ZeroDivisionError:

    print ( " A number cannot be divided by zero " )

    Print( value(4) )

    Print( value (0) )

    Print ( value(16) )

    Output:

    16

    Error: A number cannot be divided by zero

    4

    ```


    ### Different Types of Errors


    Zero division error is only one of the many system errors that Python provides.
    Knowing about some of these system errors can be a great learning curve to quickly
    debug or clear your errors.


    - **1. Value error**

    Value type error occurs when you have provided correct arguments for a function
    but with a value not supported by the method.


    - **2. Import error**

    Import error occurs when you try to import a module that is not present at the
    moment in your directory. You will receive this error with online packages if
    they are either deleted or disabled.


    - **3. OS error**

    This error occurs when there is a problem with the operating system that you are
    working with. These can also be called system-related errors.


    - **4. Index error**

    Index error occurs with list data types when the index of a list is way out of
    the bound that the list actually supports.


    - **5. Key error**

    Key error occurs when a key in a dictionary data structure is not available to
    process.


    - **6. TypeError**

    TypeError occurs when a function or object has been given a value of non-supportive
    data type.


    - **7. Name error**

    This error occurs when there is no variable provided in either local or global
    scope.


    ## SAMPLE EXERCISE


    Reverse a given integer number using loops.


    ```

    program code:

    value = 453

    result = 0

    print(" What is the number? ", value)

    while value > 0:

    reminder = value % 10

    result = (result * 10) + reminder

    value = value // 10

    print("Reversed Number is ", result)

    Output :

    What is the number? 453

    Reversed number is : 354

    ```


