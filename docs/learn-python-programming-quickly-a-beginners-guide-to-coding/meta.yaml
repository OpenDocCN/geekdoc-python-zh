    # ITERATORS AND GENERATORS


    Any process that uses the same logic while executing more than one time is known
    as an iteration. For example, a loop in a programming language like Python can
    be called an iteration. If a for loop goes through six times, it can be said to
    have iterated six times.


    In Python, you can use the iter() function to create an iterator object. You can
    also use the next() function to find the next Iterable object.


    ```

