    end-user.


    **2. Break problems into smaller ones**


    Every program solves a problem. Any problem can be solved using different approaches.
    To write better programs, you need to find the best approach that reduces execution
    and run time. To find the best approaches, you need to take a large problem and
    divide it into a set of more minor problems. Approaching solutions using this
    technique can help programmers create software with fewer bugs and less unit testing.
    Always use pseudo-code instead of'
