    determine the lowest value and print out its key. You can also use the min() function
    with lambda functions.


    ```

    **Program code:**

    Movies = {American Pie : 7 , Schindlers list : 10 , Shashswank redemption : 9
    , Avatar : 8}

    Minimum = min( Movies, key = movies.get)

    Print(Minimum)

    **Output:**

    American pie

    ```


    ### Using the sorted() Function


    You can sort elements present in a dictionary in Python using the sorted() method.
    While there are different ways, such as using an items() method or dictionary
    comprehension, the most popular way is to use it as an Iterable argument.


    ```

    Program code:

    Movies = {American Pie : 7 , Schindlers list : 10 , Shashswank redemption : 9
    , Avatar : 8}

    Print(sorted(Movies))

    Output:

    {American Pie : 7 , Avatar : 8 , Shashwank redemption : 9 , Schindlers list :
    10}

    ```


    ## THREADING


    Threading is a phenomenon that allows your Python program to run two instances
    concurrently without ending any one of them. Without the concept of threading
    in Python, real-world applications cannot experience a significant speed.


    A thread creates a separate flow of execution in your program. Multiprocessing
    of threads can sometimes need extra knowledge related to Python. To run faster
    programs, ensure that you import the ‘multiprocessing’ module before implementing
    a threading function.


    To create a separate thread instance in a program, you need to use .start()


    ```

    instance.start()

    ```


    Usually, when you end a program, all the threads will exit automatically. Daemon
    threads, however, will not exit and will run in the background. Any software that
    needs the ability to track should use daemon threads not to close the instance
    completely. Daemon threads utilize significantly less memory power to make them
    operate for practical implementation.


    ### Some additional threading functions:


    - .join() You can join two threads using this threading function.

    - .lock() You can unlock or lock an instance using this threading function.


    ## PIP PACKAGE MANAGER


    Pip is a standard package manager for Python. It is usually used to install additional
    packages or dependencies that are not present in the standard library. Due to
    its popularity among programmers, the Python development team has decided to include
    pip as a default package manager in Python 3 latest versions.


    What can you do with Pip?


    - Install new packages and dependencies

    - Find packages from different repositories or Python Package Index (PyPI)

    - Review and install the requirements that are essential for a new package or
    broken packages

    - Uninstall packages and dependencies with a click


    To check whether or not Pip is installed in your system, use the below command.


    ```

    Terminal command:

    $ pip – version

    ```


    If it prints out the version details, then the package manager is installed. If
    not, you need to install it manually from the official website.


    ### Installing Packages


    Installing packages using pip is straightforward and takes significantly less
    time to complete a transaction.

    For example, to install http3, a popular Python library, you can use the below
    mentioned syntax.


    ```

    Terminal command:

    $ pip install http3

    ```


    To check the metadata of a Python package, use the below command.


    ```

    Terminal command:

    $ pip show http3

    ```


    Output will display all the metadata information such as name, author, license,
    and location of the package.

    To uninstall packages, you can use the below code format.


    ```

    Terminal command:

    $ pip uninstall http3

    ```


    To search packages, you can use the below mentioned code format.


    ```

    Terminal command:

    $ pip search oauth

    ```


    This command will check for a package named ‘oauth’ in the Python Package Index.
    You can also manually provide any third-party software indexes to search in them.


    ## VIRTUAL ENVIRONMENT


    Usually, when we create Python projects in our system, we use several libraries,
    all of which have separate dependencies. Sometimes, however, Python programmers
    need to work with two independent projects that have different dependencies. Python
    creates an isolated virtual environment to help programmers not mess up their
    system or avoid errors during these types of situations.


    A Python virtual environment can help programmers if they are working with software
    of two different versions. Python also provides the facility to create an unlimited
    number of virtual environments.


    ### How to Install Virtualenv


    virtualenv is not a standard Python system library. I recommend that you import
    the package using pip.


    ```

    Terminal command:

    $ pip install virtualenv

    ```


    Once the library is downloaded, you can use virtualenv with the help of one of
    the terminal commands listed below.


    ```

    Terminal command:

    $ virtualenv sample

    ```


    When you enter the above command, the interpreter will form a new directory named
    ‘sample’. It creates new executables and packages that a brand-new application
    or instance will need.


    A newly created virtual environment can be used only after successfully activating
    it using the below command.


    ```

    Terminal command:

    $ source sample/bin/activate

    ```


    Once you enter this command, a new environment will be activated, and you can
    work on your project now without worrying about any dependencies.


    In the same way, you can deactivate a virtual environment using the below command.


    ```

    Terminal command:

    (Sample)$ deactivate

    ```


    ## USING PILLOW LIBRARY TO EDIT IMAGES


    Python has great adaptability with digital processing technology and is used in
    a lot of its applications. You can use a third-party library known as ‘pillow’
    to understand the basic essence of creating media manipulation software in Python.


    First you must install pillow by using the below command via pip.


    ```

    Terminal command:

    pip install pillow

    ```


    As the pillow library is very large, we will import only specific functions that
    will do the work for us.


    ```

    Terminal command:

    from PIL import Image

    ```


    Once the functions are imported, we now need to open an image to work with. Download
    an image and move it to the pillows folder. You can specify the path of the image
    if it is in another directory.


    ```

    Program code:

    Sample = Image.open(“example.jpg”)

    ```


    Now, you have an image that is ready to be manipulated by other functions in the
    library. For now, we will learn how to add text to the image using the pillow
    library.


    To make this happen, you need to import a few other functions into your program.'
