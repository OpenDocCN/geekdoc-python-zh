    # Different Types of Errors


    Zero division error is only one of the many system errors that Python provides.
    Knowing about some of these system errors can be a great learning curve to quickly
    debug or clear your errors.


    # 1. Value error


    Value type error occurs when you have provided correct arguments for a function
    but with a value not supported by the method.


    # 2. Import error


    Import error occurs when you try to import a module that is not present at the
    moment in your directory. You will receive this error with online packages if
    they are either deleted or disabled.


    # 3. OS error


    This error occurs when there is a problem with the operating system that you are
    working with. These can also be called system-related errors.


    # 4. Index error


    Index error occurs with list data types when the index of a list is way out of
    the bound that the list actually supports.


    # 5. Key error


    Key error occurs when a key in a dictionary data structure is not available to
    process.


    # 6. TypeError


    TypeError occurs when a function or object has been given a value of non-supportive
    data type.


    # 7. Name error


    This error occurs when there is no variable provided in either local or global
    scope.


