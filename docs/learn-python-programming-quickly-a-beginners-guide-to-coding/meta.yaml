    ## How Are They Represented?


    ```

    Program code:

    a = ''This is a string.''

    print(a)

    Output:

    This is a string.

    ```


    Everything in between the quotes can be called a string literal, and it can be
    called anywhere in the program using the variable ''a''. In the above example,
    the string consists of 14 characters, excluding whitespaces.


    Python strings can also be represented using three other different ways.


    ```

    Program code:

    a = "This is a string."

    # Literals in double quotes

    print(a)

    a = ''''''This is a single line''''''

    # Literals in triple single quotes

    print(a)

