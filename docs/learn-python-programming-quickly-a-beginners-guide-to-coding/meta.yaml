    [USA, China, Russia, Japan, South Korea, Canada]

    ```


    The above example used the append() method to add an element to the end of the
    list.


    You can also use the insert() method to insert a list element at any index position.
    Insert method also uses a specific format that asks the programmer to insert the
    index number where the element should be inserted.


    Insert (index position, ‘item’)


    ```

    Example:

    Sample = [USA, China, Russia, Japan, South Korea]

