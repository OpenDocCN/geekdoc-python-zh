    # 3. Dynamically typed


    Unlike static programming languages that use compilation time to run their code,
    dynamically typed languages use a runtime mechanism. While both static and dynamic
    typing languages have their advantages and disadvantages, dynamically typed programming
    languages such as Python are believed to be more reliable and reusable, according
    to experienced computer scientists.


    # 4. It supports multiple paradigms


    Any high-level programming language needs to support programming paradigms to
    reuse the already written code effectively. Python provides all three popular
    paradigms for its users: structured, functional, and object-oriented. Even though
    Python provides multiple paradigm opportunities for its users, it is always recommended
    to use a consistent paradigm for better code maintainability.


    # 5. It uses garbage collection mechanism


    Every programming language uses its strategy for effective memory management.
    Python uses garbage collectors to use memory that is no longer referenced. Garbage
    collectors can help programmers interact with data that has just been deleted
