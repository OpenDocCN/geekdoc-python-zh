    ## Floating-Point Numbers


    Float is a special data type in Python that programmers can use to represent floating-point
    numbers while working with program variables. Usually, when we create software,
    we need to work with real numbers along with a decimal point. You can represent
    as far as ten decimal points using a ‘float’ data type variable.


    ```

    Program code:

    A = 7.1213

    Print(a)

    # This represents a floating-point variable

    Output:

    7.1213

    ```


    You can also use a floating-point variable to represent a hexadecimal integer,
    a popular numerical representation method.


    ```

    Example:

    A = float.hex(3.1212)

    Print(a)

    Output:

    ''0x367274872489''

    ```


    Python programmers can also use floating-point numbers to represent both complex
    and exponential numbers.


    ## Boolean Data Type


    Boolean is a special data type that can help programmers to represent true or
    false during an instance. The two Boolean values are TRUE and FALSE.


    You can mostly use Boolean data types along with relational operators.


    ```

    Example:

    Print(100 < 32)

    Output:

    False

    ```


    As this is a false statement, the Python interpreter will output Boolean value
    ‘False’ to the programmer.


    ## TYPE CASTING


    Usually, when we work with programs, situations occur when the data type of a
    variable needs to be changed. Python provides an opportunity to convert data types
    without messing up the program using casting.


    Usually, type casting can be performed using two types: implicit and explicit
    type casting.


    ### 1. Implicit type casting


    Using implicit type casting, Python automatically converts the data types whenever
    required.


    ```

    Example:

    X = 32

    Print(type(x))

    # This prints the data type of x

    Y = 2.0

    Print(type(y))

    # This prints the data type of y

    Z = x + y

    Print(Z)

    Print(type(Z))

    # implicit type casting occurs

    Output:

    <class ''int''>

    <class ''float''>

    64.0

    <class ''float''>

    ```


    In the above example, when a float variable is multiplied with an integer variable,
    the result has already been implicitly converted to a floating-point data type
    variable.


    ### 2. Explicit type casting


    When a Python programmer changes the variable data types with their involvement,
    it is known as explicit type casting. Usually, explicit type casting is performed
    using data type functions.


    #### Typecasting int to float:


    ```

    X = 32

    # This is an int variable with a value ''32''

    Z = float(x)

    # Now the int data type is type casted to float

    Print(Z)

    Print(type(Z))

    Output:

    32.0

    <class ''float''>

    ```


    In the above example, we have converted a variable with data type ''int'' to data
    type ''float'' using explicit type casting.


    #### Typecasting float to int:


    ```

    X = 32.0

    # This is a float variable with a value ''32.0''

    Z = int(x)

    # Now the float data type is type casted to int

    Print(Z)

    Print(type(Z))

    Output:

    32

    <class ''int''>

    ```


    In the above example, we have converted a variable with data type ''float'' to
    data type ''int'' using explicit type casting.


    #### Typecasting int to string:


    ```

    X = 32

    # This is an int variable with a value ''32''

    Z = str(x)

    # Now the int data type is type casted to string

    Print(Z)

    Print(type(Z))

    Output:

    32

    <class ''str''>

    ```


    In the above example, we have converted a variable with data type ‘int’ to data
    type ‘string’ using explicit type casting.


    #### Typecasting string to int:


    ```

    X = "32"

    # This is a string variable with a value ‘32’

    Z = int(x)

    # Now the string data type is type casted to int

    Print(Z)

    Print(type(Z))

    Output:

    32

    <class ''int''>

    ```


    In the above example, we have converted a variable with data type ‘string’ to
    data type ‘int’ using explicit type casting.


