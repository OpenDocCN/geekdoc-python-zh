    # Explanation:


    +   1. In line 1, def is used to define a function in the Python programming language.
    Without writing a function definition, the interpreter will not detect it as a
    function. A function definition includes def and is followed by the name of the
    function. Welcome() is the name of the function in the above example. All the
    parameters of the functions will usually be placed between parentheses. A colon
    is placed at the end of the function definition

    2. All the lines that follow the function definition belong to the body of the
    function. Usually, all the programming logic that performs a task is included
    in this section. The first line of the function body is typically a docstring.
    Docstring will be used to describe what a function does. While it is not mandatory
    to use docstrings, it is considered a good practice by many Python programmers.
    Docstrings are usually enclosed in triple quotes and can be multiple lines.

    3. In the above example, the third line uses a print statement to display content
    on the screen. While in this example, the function has only a single purpose,
    in the real world, however, a function body usually has more than ten lines to
    complete a task.

    4. The fourth line represents a function call that precisely says to execute the
    content in the function. When an interpreter finds a function call, it will head
    over to the written function and run it. As the above example is a function with
    no parameters, the interpreter will execute simply by printing the statement provided.


    # USING PARAMETERS IN THE FUNCTIONS


    In the previous example, we have defined a basic function with zero parameters.
    But in the real world, programmers regularly use parameters to improve the functionality
    of the application.


    For example, we can dynamically display the user name using an input parameter
    in the function.


    ```

    Program code:

    def welcome(name) :

    " This displays a welcome message for the user along with their name"

    Print ( " Hi, " + name.title() + " ! \n We give you a warm welcome to our software"
    )

    welcome(''tom'')

    welcome(''grace'')

    Output:

    Hi, Tom! we give you a warm welcome to our software

    Hi, Grace! we give you a warm welcome to our software

    ```


    # Explanation:


    +   1. In the function definition, we added a parameter called ‘name’ that will
    accept any value to print on the screen. As Python is not a statically typed language,
    there is no need to mention the data type of the parameters.

    2. In the print statement, we gave the user ‘name.title()’ to provide a value
    to the defined parameter. If you do not provide a value for the parameter, the
    program will not execute and end with an error. The title() string function prints
    the names in a camel case style for better readability. You can use other string
    functions such as lower() or upper() to achieve different results.

    3. In the final lines, we have called the functions with two different parameter
    arguments. Each argument will display a different output. Here, ‘tom’ and ‘grace’
    are the arguments that we have given to a parameter in the function.


    The sole difference between a parameter and an argument is that the parameter
    is essential for the function to work. In contrast, an argument is just a value
    that programmers can change.'
