- md: 'Here are the critical five styling principles that Python programmers need
    to be aware of.


    ## 1. Beautiful is better than ugly


    All Python programmers are suggested to write beautiful semantically code instead
    of code that is hard to read and understand. Here ugly refers to code that is
    not clean and unreadable. Remove unnecessary statements or conditionals that can
    complicate the code. Use indentations for better understanding the code according
    to the structure. Beautiful code not only rewards you with good readability but
    also helps to decrease the runtime required.


    ## 2. Explicit is better than implicit


    Never try to hide the functionality of the code to make it explicit unless required.
    Being verbose makes understanding the programming logic difficult. This styling
    principle is also mentioned to encourage Python programmers to write open-source
    code that can be redistributed.


    ## 3. Simple is better than complex


    Make sure that you write code that approaches the logic more straightforwardly
    instead of being complex. If you can solve a problem with ten conditional statements
    or with one method, solve it with one. Make it as simple as possible.


    ## 4. Complex is better than complicated


    It is not always possible to write simple code that can do complex actions. To
    perform complex actions, strive to write complex code instead of complicated code.
    Always write code in a way that you can catch exceptions whenever something unexpected
    happens. Exceptions can help you quickly debug your code.


    ## 5. There should be only one way to do it


    Python programmers are suggested to use only one programming logic for a problem
    all around the project instead of using three or four logics in different instances.
    Maintain uniformity to let others easily understand your program code. Uniformity
    provides flexibility which can lead to easy and quick maintainability.


    ## PYTHON COMMENTS


    Comments are introduced to help programmers easily remember or share the programming
    logic used for a program with other team members while working during projects.
    Nowadays, most libraries and frameworks work with open-source systems, and it
    is practical to start using comments so that others can understand your code concisely.


    Apart from this reason, comments are also highly recommended to write lines that
    can be ignored by the interpreter while testing the software application. As a
    Python programmer, you need to start using comments whenever possible. Comments
    can also help you while updating the code directories in the future.


    There are two types of comments Python programmers can use to make their code
    clearer and more understandable.


    ### 1. Single line comments


    Anything followed by # (hash symbol) in a Python program can be called a single
    line comment.


    ```

    Program code:

    # This is a comment, and we will print a statement

    print("we have learned about comments")

    Output:

    We have learned about comments

    ```


    Only print statement is executed, and the interpreter has ignored everything that
    is written after #.


    Programmers can use single comments, especially in the middle of the code, to
    describe program logic or while initiating conditionals and loops.


    ### 2. Multi-line comments


    You can use hash (#) to create multi-line comments, but it is not considered a
    good practice. To create multi-line comments, a Python programmer can use string
    literals.


    ```

    Program code:

    ''''''

    This is a comment that can be used to write sentences or paragraphs.

    ''''''


    print("We have just learned about multi-line comments")

    ```


    ```

    Output:

    We have just learned about multi-line comments

    ```


    Only the print statement is executed, and the interpreter ignores everything that
    is in between string literals.


    **Note:** Remember not to be redundant while writing comments. Write only what
    your team members or your future self may need.


    ## VARIABLES


    To maximize the potential of Python as a programming language, programmers need
    to start using variables and operators in their programs. Variables and operators
    are fundamental building blocks of programs that can help build programming logic
    and create applications that can manipulate memory effectively.


    ## UNDERSTANDING VARIABLES


    Software applications usually deal with data. Users upload or download data from
    applications to completely experience the product. All these use cases have become
    possible only with the help of variables.


    Computer scientists developed variables to effectively store data to a specific
    location in the computer memory. Variables can be called labels and are usually
    the most basic unit in a program.


    You might have already used variables in mathematics while working with algebra.


    ```

    Example:

    2x + 3y

    x = 3 and y = 4

    ```


    Variables in mathematics are usually used to replace a value in an equation. Computer
    scientists adopted the same concept to effectively manage memory resources in
    the initial stages of computer development.


    To understand what happens when a Python program is executed, read the below example.


    ```

    Program code:

    print("This is an example")

    Output:

    This is an example

    ```


    ### What happens?


    1. When the above program is executed, the editor will send all the lines in the
    program into a Python interpreter.

    2. An interpreter will decipher all the words in the program and determine its
    purpose.

    3. If the interpreter is confused or finds words that it cannot determine, it
    will throw out warnings, exceptions, and errors.

    4. When the above example is executed, an interpreter will look at the ''print''
    statement and understand its purpose is to display whatever is there between parentheses
    on the screen.


    Now, look at a slight variation of the above example.


    ```

    Program code:

    first = "This is an example"

    print(first)

    Output:

    This is an example

    ```


    In the above example, ''first'' is used as a variable to store a string in a specific
    memory location. To be precise, the variable named ''first'' now holds a value
    and can be called at any instance.


    Python is not a statically typed language, and hence there is no need to declare
    variables while creating them. Programmers can also change the value of Python
    variables at any instant.


    ```

    Program code:

    first = "This is an example"

    print(first)

    first = "This is a second example"

    print(first)

    Output:

    This is an example

    This is a second example

    ```


    The variable''s value has changed instantaneously after declaring a different
    string for the variable in the above example.


    ## HOW TO NAME VARIABLES


    Python programming guidelines provide strict rules while creating variables, so
    they do not fall prey to errors. This also improves the program''s readability.


    **Rules for writing variables:**


    1. Python only allows numbers, letters, and underscores for creating variable
    names. For example, ''$message'' is not a qualified variable name.

    2. Python programmers should not start variable names with a number. For example,
    ''message1'' is an allowed variable name, but ''1message'' is not allowed.

    3. Python doesn''t allow you to use 33 reserved keywords as identifiers while
    creating variables. For example, ''print'' cannot be used as a variable name.

    4. Always write variables that are easy to follow. Writing complex variable names
    is considered a bad programming practice, especially if you work with teams.


    ## HOW TO DEFINE VARIABLES


    You can define variables in a Python program using the assignment operator ''=''.


    ```

    Syntax format:

    Variable name = "Variable value"

    Example:

    first = 2

    # This is a variable with integer data type

    second = "United States Of America."

    # This a variable with String data type

    ```


    ## HOW TO FIND THE MEMORY ADDRESS OF THE VARIABLES


    Finding the memory address of the variables is important, especially while working
    with complex applications that constantly have a necessity to change their values.
    Traditional languages such as C use pointers for using memory addresses in programs.


    Python provides a way to provide the memory address of the variables easily. Usually,
    in high-level programming languages such as C and C++, pointers are used to find
    the memory address. But in Python, we need to use a built-in function called id()
    to get the memory address of the variable.


    ```

    Program code:

    first = 324

    id(first)

    Output:

    1x23238200

    ```


    In the above example, 1x23238200 is the memory address of the variable ''first''.
    When a variable is replaced, the memory address will remain the same.'
  mdcn: '以下是Python程序员需要了解的五个关键样式原则。


    ## 1. 优美胜于丑陋


    建议所有Python程序员编写语义优美、易于阅读和理解的代码，而非难以理解的代码。这里的“丑陋”指的是不整洁、难以阅读的代码。移除可能使代码复杂化的不必要语句或条件判断。使用缩进有助于根据结构更好地理解代码。优美的代码不仅带来良好的可读性，还能减少运行所需时间。


    ## 2. 明确胜于隐晦


    除非必要，切勿试图隐藏代码功能以使其明确。冗长的表达会使理解编程逻辑变得困难。提出此样式原则也是为了鼓励Python程序员编写可重新分发的开源代码。


    ## 3. 简洁胜于复杂


    确保编写的代码以更直接的方式处理逻辑，而非使其复杂化。如果可以用十个条件语句或一个方法解决问题，请选择用一个方法解决。尽可能使其简洁。


    ## 4. 复杂胜于晦涩


    编写能执行复杂操作的简单代码并非总是可行。为了执行复杂操作，应力求编写复杂但不晦涩的代码。始终以能在意外发生时捕获异常的方式编写代码。异常可以帮助你快速调试代码。


    ## 5. 应该只有一种显而易见的方法


    建议Python程序员在整个项目中针对一个问题只使用一种编程逻辑，而不是在不同实例中使用三四种逻辑。保持一致性，以便他人轻松理解你的程序代码。一致性提供了灵活性，从而实现轻松快速的维护。


    ## PYTHON 注释


    引入注释是为了帮助程序员在项目工作中轻松记忆或与其他团队成员分享程序所用的编程逻辑。如今，大多数库和框架都基于开源系统运作，因此开始使用注释是实用的，这样他人可以简洁地理解你的代码。


    除此之外，强烈建议在编写测试软件应用程序时可被解释器忽略的代码行时使用注释。作为Python程序员，你需要尽可能开始使用注释。注释也能在将来更新代码目录时为你提供帮助。


    Python程序员可以使用两种类型的注释来使代码更清晰、更易理解。


    ### 1. 单行注释


    在Python程序中，`#`（井号）之后的所有内容都可称为单行注释。


    ```

    程序代码：

    # 这是一个注释，我们将打印一条语句

    print("我们已经学习了注释")

    输出：

    我们已经学习了注释

    ```


    只有`print`语句被执行，解释器忽略了`#`之后写的所有内容。


    程序员可以使用单行注释，特别是在代码中间，用于描述程序逻辑或在初始化条件判断和循环时使用。


    ### 2. 多行注释


    你可以使用井号（`#`）创建多行注释，但这不被认为是好的做法。要创建多行注释，Python程序员可以使用字符串字面量。


    ```

    程序代码：

    ''''''

    这是一个注释，可用于编写句子或段落。

    ''''''


    print("我们刚刚学习了多行注释")

    ```


    ```

    输出：

    我们刚刚学习了多行注释

    ```


    只有`print`语句被执行，解释器忽略了字符串字面量之间的所有内容。


    **注意：** 记住在编写注释时不要冗余。只写你的团队成员或未来的你可能需要的内容。


    ## 变量


    为了最大化Python作为编程语言的潜力，程序员需要在程序中开始使用变量和运算符。变量和运算符是程序的基本构建块，有助于构建编程逻辑并创建能有效操作内存的应用程序。


    ## 理解变量


    软件应用程序通常处理数据。用户上传或下载数据以完全体验产品。所有这些用例只有在变量的帮助下才成为可能。


    计算机科学家开发变量是为了有效地将数据存储到计算机内存的特定位置。变量可以称为标签，通常是程序中最基本的单元。


    你可能在数学中处理代数时已经使用过变量。


    ```

    示例：

    2x + 3y

    x = 3 且 y = 4

    ```


    数学中的变量通常用于替换方程中的值。计算机科学家在计算机发展的早期阶段采用了相同的概念来有效管理内存资源。


    要理解Python程序执行时发生了什么，请阅读以下示例。


    ```

    程序代码：

    print("这是一个示例")

    输出：

    这是一个示例

    ```


    ### 发生了什么？


    1.  当上述程序执行时，编辑器会将程序中的所有行发送到Python解释器。

    2.  解释器会解读程序中的所有单词并确定其目的。

    3.  如果解释器感到困惑或发现无法确定的单词，它会抛出警告、异常和错误。

    4.  当上述示例执行时，解释器会查看`print`语句并理解其目的是在屏幕上显示括号之间的内容。


    现在，看一个上述示例的轻微变体。


    ```

    程序代码：

    first = "这是一个示例"

    print(first)

    输出：

    这是一个示例

    ```


    在上面的示例中，`first`被用作变量，将一个字符串存储在特定的内存位置。准确地说，名为`first`的变量现在持有一个值，可以在任何实例中调用。


    Python不是静态类型语言，因此在创建变量时不需要声明变量。程序员也可以随时更改Python变量的值。


    ```

    程序代码：

    first = "这是一个示例"

    print(first)

    first = "这是第二个示例"

    print(first)

    输出：

    这是一个示例

    这是第二个示例

    ```


    在上面的示例中，为变量声明了不同的字符串后，变量的值立即发生了变化。


    ## 如何命名变量


    Python编程指南在创建变量时提供了严格的规则，以避免它们陷入错误。这也提高了程序的可读性。


    **编写变量的规则：**


    1.  Python只允许使用数字、字母和下划线来创建变量名。例如，`''$message''`不是合格的变量名。

    2.  Python程序员不应以数字开头命名变量。例如，`''message1''`是允许的变量名，但`''1message''`不允许。

    3.  Python不允许在创建变量时使用33个保留关键字作为标识符。例如，`''print''`不能用作变量名。

    4.  始终编写易于理解的变量名。编写复杂的变量名被认为是不好的编程实践，尤其是在团队协作时。


    ## 如何定义变量


    你可以使用赋值运算符`=`在Python程序中定义变量。


    ```

    语法格式：

    变量名 = "变量值"

    示例：

    first = 2

    # 这是一个整数数据类型的变量

    second = "美利坚合众国。"

    # 这是一个字符串数据类型的变量

    ```


    ## 如何查找变量的内存地址


    查找变量的内存地址很重要，尤其是在处理需要不断更改其值的复杂应用程序时。传统语言如C使用指针在程序中使用内存地址。


    Python提供了一种轻松获取变量内存地址的方法。通常，在C和C++等高级编程语言中，使用指针来查找内存地址。但在Python中，我们需要使用一个名为`id()`的内置函数来获取变量的内存地址。


    ```

    程序代码：

    first = 324

    id(first)

    输出：

    1x23238200

    ```


    在上面的示例中，`1x23238200`是变量`first`的内存地址。当变量被替换时，内存地址将保持不变。'
