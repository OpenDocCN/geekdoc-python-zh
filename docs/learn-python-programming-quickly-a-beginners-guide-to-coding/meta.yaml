    # VARIABLES


    To maximize the potential of Python as a programming language, programmers need
    to start using variables and operators in their programs. Variables and operators
    are fundamental building blocks of programs that can help build programming logic
    and create applications that can manipulate memory effectively.


    # UNDERSTANDING VARIABLES


    Software applications usually deal with data. Users upload or download data from
    applications to completely experience the product. All these use cases have become
    possible only with the help of variables.


    Computer scientists developed variables to effectively store data to a specific
    location in the computer memory. Variables can be called labels and are usually
    the most basic unit in a program.


    You might have already used variables in mathematics while working with algebra.


    ```

    Example:

    2x + 3y

    x = 3 and y = 4

    ```


    Variables in mathematics are usually used to replace a value in an equation. Computer
    scientists adopted the same concept to effectively manage memory resources in
    the initial stages of computer development.


    To understand what happens when a Python program is executed, read the below example.


    ```

    Program code:

    print (" This is an example ")

    Output:

    This is an example

    ```


    # What happens?


    +   1. When the above program is executed, the editor will send all the lines
    in the program into a Python interpreter.

    2. An interpreter will decipher all the words in the program and determine its
    purpose.

    3. If the interpreter is confused or finds words that it cannot determine, it
    will throw out warnings, exceptions, and errors.

    4. When the above example is executed, an interpreter will look at the ''print''
    statement and understand its purpose is to display whatever is there between parentheses
    on the screen.


    Now, look at a slight variation of the above example.


    ```

    Program code:

    first = " This is an example"

    print(first)

    Output:

    This is an example

    ```


    In the above example, ''first'' is used as a variable to store a string in a specific
    memory location. To be precise, the variable named ''first'' now holds a value
    and can be called at any instance.'
  - '[PAGE 26]


    Python is not a statically typed language, and hence there is no need to declare
    variables while creating them. Programmers can also change the value of Python
    variables at any instant.


    ```

    Program code:

    first = " This is an example"

    print(first)

    first = " This is a second example"

    print(first)

    Output:

    This is an example

    This is a second example

    ```


    The variable''s value has changed instantaneously after declaring a different
    string for the variable in the above example.


    # HOW TO NAME VARIABLES


    Python programming guidelines provide strict rules while creating variables, so
    they do not fall prey to errors. This also improves the program''s readability.


    **Rules for writing variables:**


    +   1. Python only allows numbers, letters, and underscores for creating variable
    names. For example, ''$message'' is not a qualified variable name.

    2. Python programmers should not start variable names with a number. For example,
    ''message1'' is an allowed variable name, but ''1message'' is not allowed.

    3. Python doesn''t allow you to use 33 reserved keywords as identifiers while
    creating variables. For example, ''print'' cannot be used as a variable name.

    4. Always write variables that are easy to follow. Writing complex variable names
    is considered a bad programming practice, especially if you work with teams.


    # HOW TO DEFINE VARIABLES


    You can define variables in a Python program using the assignment operator ''=''.


    ```

    Syntax format:

    Variable name = " Variable value"

    Example:

    first = 2

    # This is a variable with integer data type

    second = " United States Of America."

    # This a variable with String data type

    ```


    # HOW TO FIND THE MEMORY ADDRESS OF THE VARIABLES


    Finding the memory address of the variables is important, especially while working
    with complex applications that constantly have a necessity to change their values.
    Traditional languages such as C use pointers for using memory addresses in programs.


    Python provides a way to provide the memory address of the variables easily. Usually,
    in high-level programming languages such as C and C++, pointers are used to find
    the memory address. But in Python, we need to use a built-in function called id()
    to get the memory address of the variable.


    ```

    Program code:

    first = 324

    id(first)

    Output:

    1x23238200

    ```


    In the above example, 1x23238200 is the memory address of the variable ''first''.
    When a variable is replaced, the memory address will remain the same.'
