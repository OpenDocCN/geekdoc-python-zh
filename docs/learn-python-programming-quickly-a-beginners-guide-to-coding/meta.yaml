    program is destroyed, the interpreter will forget all the previously given variables,
    and a new set of variables is required when the program restarts.


    Whenever you call a function in the program, a local scope will be created and
    used until the function returns a value. When the function returns a value, the
    interpreter will forget all the variables given.


    The main reason why programmers prefer to use the scope in their applications
    is that they can help programmers find the code lines that create a buggy situation
    in the program. If you use a global scope for all the variables, you may have
    to recheck all the variables from different functions. Using local and global
    variables will increase your productivity and can help you maintain big projects
    efficiently.


    # Understanding Local and Global Scope in Depth


    1. You cannot use local variables in a global scope.


    ```

    Program code:

    def vegetable() :

    Brinjal = 32

    Vegetable()

    Print(eggs)

    Output:

    Traceback error

    ```


    The example mentioned above will generate a traceback error because you have called
    a print function with a local variable that doesn’t support global scope. Just
    remember to use only global variables in the global scope.


    2. All the local functions, however, can use global variables whenever needed.


    ```

    Program code:

    def vegetable () :

    Print(brinjal)

    Brinjal = 32

    Vegetable()

    Print(brinjal)

    Output:

    32

    32

    ```


    The example mentioned above will print the variables both times as the local functions
    can use variables with global scope.


    3. Local variables of one function cannot be used by any other functions.


    ```

    Program code:

    def vegetable() :

    Brinjal = 32

    Fruits()

    Print(brinjal)

    def fruit() :

    Apple = 21

    Brinjal = 42

    Vegetable()

    Output:

    32

    ```


    The above example is complex and needs to be carefully understood for writing
    better Python programs.


    +   1. When the function vegetable() is called, a local scope variable of brinjal
    with a value of 32 is created.

    2. Immediately, another function, fruit(), is called, and it creates two local
    scope variables, ‘Apple’ and ‘Brinjal’, with values 21 and 42. Remember that multiple
    scope values can co-exist in a Python program.

    3. Now, the fruit() function is returned, and hence all the local scope variables
    that are stored will be destroyed

    4. In the following line, when a print statement is used, the interpreter prints
    32 instead of 42.


    Both local and global variables can have the same name. There won’t be a conflict
    while writing programs. For'
