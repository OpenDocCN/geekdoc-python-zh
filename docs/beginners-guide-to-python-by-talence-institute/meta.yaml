    \ parameter values\n\nYou can specify default values for parameters in the function\
    \ definition. If an argument is not passed to the function when it is called,\
    \ the default value will be used instead.\n\nFor example:\n\n```\ndef hello (\
    \ name = \"Alice\" ):\n    print ( \"Hi\" , name )\n```\n\n```\nhello()      \
    \ # Print \"Hi Alice\"\nhello(\"Bob\")  # Print \"Hi Bob\"\n```\n\nThis code defines\
    \ a function called **hello** that takes a single parameter name with a default\
    \ value of \"Alice\". When the function is called without any arguments, the default\
