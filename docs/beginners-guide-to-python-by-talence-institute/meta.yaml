    \ exist, it is created.\n- ' **x** ': This mode creates a new file for writing,\
    \ and raises an error if the file already exists.\n- ' **b** ': This mode can\
    \ be used in combination with any of the above modes to open the file in binary\
    \ mode.\n- ' **t** ': This mode can be used in combination with any of the above\
    \ modes to open the file in text mode. This is the default mode if no mode is\
    \ specified.\n\nFor example, to open a file for **reading** in **text mode**,\
    \ you can use the following code:\n\n```python\nwith open('input.txt', 'rt') as\
    \ f:\n    contents = f.read()\n```\n\nTo open a file for **writing** in **binary\
    \ mode**, you can use the following code:\n\n```python\nwith open('output.bin',\
    \ 'wb') as f:\n    f.write(b'\\x01\\x02\\x03')\n```\n\n## 0. Working with JSON\
    \ files\n\n### 0. Overview\n\n**JSON (JavaScript Object Notation)** is a popular\
    \ data interchange format that is used to represent structured data as a sequence\
