    0. If the temp argument is in Celsius, convert it to Fahrenheit using the following
    formula: **F = (9/5) * C + 32** .

    0. If the **temp** argument is in Fahrenheit, convert it to Celsius using the
    following formula: **C = (5/9) * (F - 32)** .

    0. Return the converted temperature.'
