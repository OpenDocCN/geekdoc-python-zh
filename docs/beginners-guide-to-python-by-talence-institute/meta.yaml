- md: "## 0. Iterating over a list\n\nYou can use a for loop to iterate over a list\
    \ of elements by using the syntax \"**for element in list:**\".\n\nFor example:\n\
    \n```python\nfruits = ['apple', 'grape', 'watermelon']\nfor fruit in fruits:\n\
    \    print(fruit)\n```\n\n## 0. Iterating over a string\n\nYou can also use a\
    \ for loop to iterate over the characters in a string by using the syntax \"**for\
    \ character in string:**\".\n\nFor example:\n\n```python\nstring = \"hello\"\n\
    for c in string:\n    print(c)\n```\n\nThis code will print each character in\
    \ the string to the console.\n\n## 0. Using the enumerate function\n\nSometimes\
    \ you may want to loop over a list and access both the index and the value of\
    \ each element. You can use the **enumerate()** function to do this. The **enumerate()**\
    \ function returns a tuple for each iteration, where the first element is the\
    \ index and the second element is the value.\n\nHere is an example of using the\
    \ **enumerate()** function:\n\n```python\nfruits = ['apple', 'grape', 'watermelon']\n\
    for i, fruit in enumerate(fruits):\n    print(i, fruit)\n```\n\nThis code will\
    \ print the index and value of each element in the list to the console.\n\n##\
    \ 0. Using the zip function\n\nThe **zip()** function allows you to iterate over\
    \ multiple lists at the same time. The **zip()** function returns a tuple for\
    \ each iteration, where the elements of the tuple come from the corresponding\
    \ elements of the input lists.\n\nHere is an example of using the **zip()** function:\n\
    \n```python\nnames = ['Alice', 'Bob', 'Charlie']\nages = [25, 27, 30]\n\nfor name,\
    \ age in zip(names, ages):\n    print(name, age)\n```\n\nThis code will print\
    \ the name and age for each person in the lists to the console.\n\n## 0. The for-else\
    \ loop\n\nThe **for-else** loop is a combination of a **for** loop and an **else**\
    \ clause. The **else** clause is executed after the loop has completed, but only\
    \ if the loop completed normally (i.e., not as the result of a break statement).\n\
    \nHere is an example of a for-else loop:\n\n```python\nnumbers = [1, 2, 3, 4,\
    \ 5]\nfor number in numbers:\n    if number % 2 == 0:\n        print(number, \"\
    is even\")\n        break\nelse:\n    print(\"No even numbers in this iteration\"\
    )\n```\n\nIn this example, the loop will print \"2 is even\" and then exit because\
    \ the **break** statement is encountered when number is 2. The else clause will\
    \ not be executed because the loop was not completed normally.\n\nIf you remove\
    \ the **break** statement, the loop will complete normally and the **else** clause\
    \ will be executed, printing \"*No even numbers in this iteration*\" to the console.\n\
    \n## 0. Conclusion\n\n**For** loops are a powerful and flexible tool for iterating\
    \ over sequences and performing actions in your program. By using for loops and\
    \ the various functions and techniques described above, you can write programs\
    \ that can automate tasks and process data efficiently.\n\n## 0. while loops\n\
    \n### 0. What are while loops?\n\nPython also has a **while** loop - in addition\
    \ to the **for** keyword - which allows you to execute a code block while a condition\
    \ is True. The syntax for a while loop is as follows:\n\n```python\nwhile condition:\n\
    \    # code to be executed\n```\n\nThe **while** keyword indicates the start of\
    \ the loop, and condition is a boolean expression that determines whether the\
    \ loop should continue. If the condition is True, the code block indented under\
    \ the while loop is executed, and the condition is checked again.\n\nThis process\
    \ continues until the condition becomes False, at which point the loop is exited.\n\
    \nHere is an example of a **while** loop in action:\n\n```python\nx = 10\nwhile\
    \ x > 0:\n    print(x)\n    x = x - 1\n```\n\nThis code will print the numbers\
    \ 10 through 1 to the console because the condition **x > 0** is True for each\
    \ iteration, and the value of **x** is decreased by 1 each time the loop is executed.\n\
    \nYou can also use the **break** keyword to exit a loop prematurely and the **continue**\
    \ keyword to skip the rest of the current iteration and move on to the next one.\
    \ We will detail this.\n\n### 0. Using the break keyword\n\nYou can use the **break**\
    \ keyword to exit a while loop prematurely. When the break keyword is encountered,\
    \ the loop is immediately exited and the program continues with the next line\
    \ of code following the loop.\n\nHere is an example of using the **break** keyword:\n\
    \n```python\nx = 0\nwhile True:\n    x = x + 1\n    if x > 5:\n        break\n\
    \    print(x)\n```\n\nThis code will print the numbers 1 through 5 to the console\
    \ and then exit the loop because the **break** keyword is encountered when x becomes\
    \ greater than 5.\n\n### 0. Using the continue keyword\n\nYou can use the **continue**\
    \ keyword to skip the rest of the current iteration and move on to the next one.\
    \ When the continue keyword is encountered, the program immediately jumps back\
    \ to the top of the loop and reevaluates the condition.\n\nHere is an example\
    \ of using the **continue** keyword:\n\n```python\nx = 0\nwhile x < 10:\n    x\
    \ = x + 1\n    if x % 2 == 0:\n        continue\n    print(x)\n```\n\nThis code\
    \ will print the odd numbers from 1 to 9 to the console because the **continue**\
    \ keyword is encountered for even numbers, causing the program to skip the rest\
    \ of the current iteration and move on to the next one.\n\n### 0. The while-else\
    \ loop\n\nThe **while-else** loop is similar to the **for-else** loop, but with\
    \ a **while** loop instead of a **for** loop. The **else** clause is executed\
    \ after the loop has completed, but only if the loop completed normally (i.e.,\
    \ not as the result of a break statement).\n\nHere is an example of a **while-else**\
    \ loop:\n\n```python\nx = 0\nwhile x < 5:\n    x = x + 1\n    if x % 2 == 0:\n\
    \        print(x, \"is even\")\n        break\nelse:\n    print(\"No even numbers\
    \ in this iteration\")\n```\n\nIn this example, the loop will print \"2 is even\"\
    \ and then exit because the **break** statement is encountered when **x** is 2.\
    \ The else clause will not be executed because the loop was not completed normally.\n\
    \nIf you remove the **break** statement, the loop will complete normally and the\
    \ else clause will be executed, printing \"*No even numbers in this iteration*\"\
    \ to the console.\n\n### 0. The infinite loop\n\nAn infinite loop is a loop that\
    \ never stops executing. You can create an infinite loop by using the **while\
    \ True** syntax.\n\nHere is an example of an infinite loop:\n\n```python\nwhile\
    \ True:\n    print(\"Hello World!\")\n```\n\nThis code will print \"Hello World!\"\
    \ to the console **indefinitely** because the condition **True** is always true.\n\
    \nInfinite loops are generally not recommended because they can cause your program\
    \ to run forever and consume resources indefinitely. However, they can be useful\
    \ in certain situations, such as in server programs that need to run continuously\
    \ and wait for input.\n\n### 0. Conclusion\n\nIn summary, Python provides several\
    \ looping constructs to allow you to repeat actions and control the flow of your\
    \ program. You can choose the appropriate looping construct based on your specific\
    \ needs and the requirements of your program.\n\n# Chapter 7: Functions\n\n##\
    \ 0. Defining and calling functions\n\n### 0. What is a function?\n\nFunctions\
    \ are a fundamental aspect of programming that allow you to **group** and **reuse**\
    \ code. In Python, a function is a block of code that performs a specific task\
    \ and can be called by other parts of your program.\n\n### 0. Defining a function\n\
    \nTo define a function in Python, you use the **def** keyword followed by the\
    \ function name and a set of parentheses that may contain parameters. The code\
    \ block indented under the function definition is the body of the function.\n\n\
    Here is an example of a function definition in Python:\n\n```python\ndef hello():\n\
    \    print(\"Hello World!\")\n```\n\nThis function definition creates a function\
    \ called **hello** that prints \"*Hello World!*\" to the console. The function\
    \ will not be used at this time, but we will utilize it in the next section.\n\
    \n### 0. Calling a function\n\nTo call a function in Python, you use the function\
    \ name followed by a set of parentheses that may contain arguments.\n\nFor example:\n\
    \n```python\ndef hello():\n    print(\"Hello World!\")\n```"
  mdcn: "## 0. 遍历列表\n\n你可以使用 `for` 循环，通过语法 \"**for element in list:**\" 来遍历一个元素列表。\n\
    \n例如：\n\n```python\nfruits = ['apple', 'grape', 'watermelon']\nfor fruit in fruits:\n\
    \    print(fruit)\n```\n\n## 0. 遍历字符串\n\n你也可以使用 `for` 循环，通过语法 \"**for character\
    \ in string:**\" 来遍历字符串中的字符。\n\n例如：\n\n```python\nstring = \"hello\"\nfor c in\
    \ string:\n    print(c)\n```\n\n这段代码会将字符串中的每个字符打印到控制台。\n\n## 0. 使用 enumerate 函数\n\
    \n有时你可能想在循环中同时访问列表每个元素的索引和值。你可以使用 **enumerate()** 函数来实现这一点。**enumerate()** 函数在每次迭代中返回一个元组，其中第一个元素是索引，第二个元素是值。\n\
    \n以下是使用 **enumerate()** 函数的一个示例：\n\n```python\nfruits = ['apple', 'grape', 'watermelon']\n\
    for i, fruit in enumerate(fruits):\n    print(i, fruit)\n```\n\n这段代码会将列表中每个元素的索引和值打印到控制台。\n\
    \n## 0. 使用 zip 函数\n\n**zip()** 函数允许你同时遍历多个列表。**zip()** 函数在每次迭代中返回一个元组，元组中的元素来自输入列表的对应元素。\n\
    \n以下是使用 **zip()** 函数的一个示例：\n\n```python\nnames = ['Alice', 'Bob', 'Charlie']\n\
    ages = [25, 27, 30]\n\nfor name, age in zip(names, ages):\n    print(name, age)\n\
    ```\n\n这段代码会将列表中每个人的姓名和年龄打印到控制台。\n\n## 0. for-else 循环\n\n**for-else** 循环是 **for**\
    \ 循环和 **else** 子句的组合。**else** 子句在循环完成后执行，但仅当循环正常完成时（即，不是由于 `break` 语句导致）才会执行。\n\
    \n以下是 for-else 循环的一个示例：\n\n```python\nnumbers = [1, 2, 3, 4, 5]\nfor number in\
    \ numbers:\n    if number % 2 == 0:\n        print(number, \"is even\")\n    \
    \    break\nelse:\n    print(\"No even numbers in this iteration\")\n```\n\n在这个例子中，循环会打印\
    \ \"2 is even\" 然后退出，因为当 `number` 为 2 时遇到了 **break** 语句。else 子句不会被执行，因为循环没有正常完成。\n\
    \n如果你移除 **break** 语句，循环将正常完成，**else** 子句将被执行，向控制台打印 \"*No even numbers in this\
    \ iteration*\"。\n\n## 0. 结论\n\n**For** 循环是遍历序列和在程序中执行操作的强大而灵活的工具。通过使用 for 循环以及上述各种函数和技术，你可以编写出能够自动化任务并高效处理数据的程序。\n\
    \n## 0. while 循环\n\n### 0. 什么是 while 循环？\n\n除了 **for** 关键字，Python 还有 **while**\
    \ 循环——它允许你在条件为 True 时执行一个代码块。while 循环的语法如下：\n\n```python\nwhile condition:\n \
    \   # code to be executed\n```\n\n**while** 关键字表示循环的开始，`condition` 是一个布尔表达式，用于决定循环是否应继续。如果条件为\
    \ True，则执行 while 循环下缩进的代码块，然后再次检查条件。\n\n这个过程会持续进行，直到条件变为 False，此时循环退出。\n\n以下是\
    \ **while** 循环实际运行的一个示例：\n\n```python\nx = 10\nwhile x > 0:\n    print(x)\n  \
    \  x = x - 1\n```\n\n这段代码会将数字 10 到 1 打印到控制台，因为条件 **x > 0** 在每次迭代时都为 True，并且每次循环执行时\
    \ **x** 的值都会减少 1。\n\n你也可以使用 **break** 关键字提前退出循环，以及使用 **continue** 关键字跳过当前迭代的剩余部分并进入下一次迭代。我们将详细说明这一点。\n\
    \n### 0. 使用 break 关键字\n\n你可以使用 **break** 关键字提前退出 while 循环。当遇到 break 关键字时，循环立即退出，程序继续执行循环之后的下一行代码。\n\
    \n以下是使用 **break** 关键字的一个示例：\n\n```python\nx = 0\nwhile True:\n    x = x + 1\n\
    \    if x > 5:\n        break\n    print(x)\n```\n\n这段代码会将数字 1 到 5 打印到控制台，然后退出循环，因为当\
    \ `x` 大于 5 时遇到了 **break** 关键字。\n\n### 0. 使用 continue 关键字\n\n你可以使用 **continue**\
    \ 关键字跳过当前迭代的剩余部分并进入下一次迭代。当遇到 continue 关键字时，程序立即跳回循环顶部并重新评估条件。\n\n以下是使用 **continue**\
    \ 关键字的一个示例：\n\n```python\nx = 0\nwhile x < 10:\n    x = x + 1\n    if x % 2 ==\
    \ 0:\n        continue\n    print(x)\n```\n\n这段代码会将 1 到 9 的奇数打印到控制台，因为对于偶数遇到了\
    \ **continue** 关键字，导致程序跳过当前迭代的剩余部分并进入下一次迭代。\n\n### 0. while-else 循环\n\n**while-else**\
    \ 循环类似于 **for-else** 循环，但使用的是 **while** 循环而不是 **for** 循环。**else** 子句在循环完成后执行，但仅当循环正常完成时（即，不是由于\
    \ `break` 语句导致）才会执行。\n\n以下是 **while-else** 循环的一个示例：\n\n```python\nx = 0\nwhile\
    \ x < 5:\n    x = x + 1\n    if x % 2 == 0:\n        print(x, \"is even\")\n \
    \       break\nelse:\n    print(\"No even numbers in this iteration\")\n```\n\n\
    在这个例子中，循环会打印 \"2 is even\" 然后退出，因为当 **x** 为 2 时遇到了 **break** 语句。else 子句不会被执行，因为循环没有正常完成。\n\
    \n如果你移除 **break** 语句，循环将正常完成，else 子句将被执行，向控制台打印 \"*No even numbers in this iteration*\"\
    。\n\n### 0. 无限循环\n\n无限循环是一个永不停止执行的循环。你可以使用 **while True** 语法来创建一个无限循环。\n\n以下是无限循环的一个示例：\n\
    \n```python\nwhile True:\n    print(\"Hello World!\")\n```\n\n这段代码会**无限地**向控制台打印\
    \ \"Hello World!\"，因为条件 **True** 总是为真。\n\n通常不推荐使用无限循环，因为它们可能导致你的程序永远运行并无限期地消耗资源。然而，在某些情况下它们可能很有用，例如在需要持续运行并等待输入的服务器程序中。\n\
    \n### 0. 结论\n\n总之，Python 提供了多种循环结构，允许你重复执行操作并控制程序的流程。你可以根据你的具体需求和程序的要求选择合适的循环结构。\n\
    \n# 第 7 章：函数\n\n## 0. 定义和调用函数\n\n### 0. 什么是函数？\n\n函数是编程的一个基本方面，它允许你**组织**和**重用**代码。在\
    \ Python 中，函数是一个执行特定任务的代码块，可以被程序的其他部分调用。\n\n### 0. 定义函数\n\n要在 Python 中定义一个函数，你使用\
    \ **def** 关键字，后跟函数名和一组可以包含参数的括号。函数定义下缩进的代码块是函数体。\n\n以下是 Python 中函数定义的一个示例：\n\n\
    ```python\ndef hello():\n    print(\"Hello World!\")\n```\n\n这个函数定义创建了一个名为 **hello**\
    \ 的函数，它会将 \"*Hello World!*\" 打印到控制台。这个函数目前不会被使用，但我们将在下一节中使用它。\n\n### 0. 调用函数\n\
    \n要在 Python 中调用一个函数，你使用函数名后跟一组可以包含参数的括号。\n\n例如：\n\n```python\ndef hello():\n \
    \   print(\"Hello World!\")\n```"
