    # 0. Dictionaries


    # 0. What are Dictionaries?


    Dictionaries are a fundamental data type in Python, and are used to store **key-value
    pairs**. They are similar to lists, but instead of using integers to index values,
    dictionaries use keys, which can be any **immutable** type (such as strings or
    numbers).


    Dictionaries are also known as associative arrays or hash maps.


    Dictionaries are created using curly braces ( {} ), and the key-value pairs are
    separated by a colon ( : ). Keys must be unique, and they can be of any immutable
    type (such as strings, integers, or tuples with immutable elements). Values can
    be of any type.


    Here is an example of a dictionary containing three key-value pairs:


    ```

    my_dict = { ''name'' : ''Alice'' , ''age'' : 25 , ''city'' : ''New York'' }

    ```


    You can also create a dictionary using the dict function:


    ```

    my_dict = dict ( name = ''Alice'' , age = 25 , city = ''New York'' )

    ```


    # 0. Accessing Dictionary Items


    To access the values in a dictionary, you can use the square brackets [] and the
    **key**.


    For example, to access the **value** for the ''name'' **key**:


    ```

    my_dict = dict ( name = ''Alice'' , age = 25 , city = ''New York'' )

    ```'
