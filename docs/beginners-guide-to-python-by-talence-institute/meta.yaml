    \ determines how you want to access the file.\n\nThe following are those different\
    \ modes:\n\n- ' **r** ': This mode opens the file for reading. It is the default\
    \ mode if no mode is specified.\n- ' **w** ': This mode opens the file for writing,\
    \ and overwrites the file if it already exists. If the file does not exist, it\
    \ is created.\n- ' **a** ': This mode opens the file for writing, and appends\
