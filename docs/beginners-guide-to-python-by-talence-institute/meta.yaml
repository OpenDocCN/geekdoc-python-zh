    a value to it using the assignment operator (=). For example: **x = 5** creates
    a variable x and assigns it the value 5.

    0. **Data types** : Different types of data, such as numbers, strings, and lists,
    have different properties and can be used in different ways. Python has a number
    of built-in data types, including integers, floating-point numbers, strings, and
    lists.

    0. **Operators** : Operators are special symbols that perform operations on variables
    or values. Python has a variety of operators, including arithmetic operators (e.g.,
    +, -, *, /), comparison operators (e.g., ==, !=, >, <), and logical operators
    (e.g., and, or, not).

    0. **Control structures** : Control structures are used to control the flow of
    a program. Python has several control structures, including if statements, for
    loops, and while loops, that allow you to execute different blocks of code depending
    on certain conditions or to repeat a block of code multiple times.


    We will discuss each of these concepts and provide examples.


