    \ 遮蔽了全局变量 **var**。代码的最后一行将全局变量 var 的值打印到控制台，结果将是 5。\n\n要从函数内部访问全局变量，你可以使用 **global**\
    \ 关键字来指定你引用的是全局变量，而不是同名的局部变量。\n\n例如：\n\n```\nvar = 5\n\ndef print_var():\n   \
    \ global var\n    var = 10\n    print(var)\n\nprint_var()\nprint(var)\n```\n\n\
    这段代码定义了一个全局变量 **var**，其值为 5，以及一个名为 **print_var** 的函数，该函数使用 **global** 关键字指定它正在访问全局变量\
    \ **var**，然后将其赋值为新的值 10。当函数被调用时，它会将 10 打印到控制台，因为全局变量 **var** 已被修改。代码的最后一行将全局变量\
    \ **var** 的值打印到控制台，结果也将是 10。\n\n# 第 8 章：文件输入与输出\n\n## 0. 概述\n\n在 Python 中，你可以使用文件输入和输出来读取和写入计算机文件系统上的文件。这对于存储数据（如配置或程序输出）或从外部源读取数据非常有用。\n\
    \n## 0. 文件操作\n\n### 0. 从文件读取\n\n要在 Python 中从文件读取，你可以使用 **open()** 函数，该函数返回一个文件对象，你可以用它来访问文件内容。**open()**\
    \ 函数接受两个参数：文件名和打开文件的模式。模式可以是几个选项之一，例如 'r' 表示读取（默认），'w' 表示写入，或 'a' 表示追加。\n\n以下是如何打开文件进行读取的示例：\n\
    \n```\nwith open('example.txt', 'r') as f:\n    contents = f.read()\n```\n\n在这个例子中，**with**\
    \ 语句以读取模式打开文件 **example.txt**，并将生成的文件对象赋给变量 **f**。\n\n文件对象的 **read()** 方法读取文件的全部内容，并将其存储在\
    \ **contents** 变量中。\n\n这里使用 **with** 语句是为了确保即使发生异常，文件在读取后也能被正确关闭。这被称为“上下文管理器”，在处理文件时使用它是一种良好的实践。\n\
    \n一旦你读取了文件的内容，就可以根据需要进行处理。例如，你可能想将内容按行分割，或搜索特定的字符串。以下是如何将文件内容按行分割的示例：\n\n```\n\
    with open('example.txt', 'r') as f:\n    lines = f.readlines()\n```\n\n**readlines()**\
    \ 方法读取文件内容并返回一个字符串列表，每个字符串代表文件的一行。然后你可以使用索引来访问文件的行，如下所示：\n\n```\nfirst_line =\
