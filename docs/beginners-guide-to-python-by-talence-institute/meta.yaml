  md: 'You can also import specific functions from a module using the from keyword:


    ```

    from math import sin, cos


    x = sin(math.pi / 2)  # x = 1.0

    y = cos(0)  # y = 1.0

    ```


    In this case, only the **sin** and **cos** functions are imported from the math
    module, so you don''t need to specify the **math** prefix when using them.


