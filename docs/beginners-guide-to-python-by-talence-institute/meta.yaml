- md: '## Chapter 2: Modules and libraries


    ### 0. Modules


    A module is a file containing Python code that can be imported into other Python
    scripts or programs. Modules can define functions, classes, and variables, and
    they can be used to organize and reuse code.


    Python comes with a large number of built-in modules, which provide a wide range
    of functions and capabilities. For example, the **math** module provides mathematical
    functions like **sin**, **cos**, and **sqrt**, and the **random** module provides
    functions for generating random numbers.


    You can import a module into your Python script or program using the **import**
    statement. For example, to use the math module, you would write "**import math**"
    at the top of your script. You can then use the functions and variables defined
    in the module by prefixing them with the module name, like this: **math.sin(x)**
    or **math.pi**.


    For example, you can import this **math** module into your script by using the
    import statement:


    ```python

    import math


    x = math.sin(math.pi / 2)  # x = 1.0

    y = math.cos(0)  # y = 1.0

    z = math.sqrt(2)  # z = 1.4142

    ```


    In this example, the **math** module is imported and its functions are used to
    calculate the sine, cosine, and square root of various values.


    You can also import specific functions from a module using the from keyword:


    ```python

    from math import sin, cos


    x = sin(math.pi / 2)  # x = 1.0

    y = cos(0)  # y = 1.0

    ```


    In this case, only the **sin** and **cos** functions are imported from the math
    module, so you don''t need to specify the **math** prefix when using them.


    ### 0. Libraries


    In addition to the built-in modules, there are many third-party modules and libraries
    available that you can use to extend the capabilities of Python. These libraries
    are often distributed as package files that can be installed using the **pip**
    or **conda** package managers.


    Some popular third-party libraries for Python include **NumPy** and **SciPy**
    for scientific computing, **Pandas** for data manipulation and analysis, and **Matplotlib**
    for data visualization. There are also many frameworks available for web development,
    machine learning, and other applications.


    For example, the **numpy** library is a popular library for scientific computing
    that provides functions for working with arrays, matrices, and numerical operations.
    To use a library, you will need to install it using a package manager like pip
    and then import it into your script or program.


    To install the **numpy** library using pip, you can use the following command:


    ```

    pip install numpy

    ```


    This will install the numpy library and its dependencies on your system. You can
    then use it in your Python scripts or programs by importing it as below:


    ```python

    import numpy as np


    a = np.array([1, 2, 3])  # Create a 1-dimensional array

    b = np.array([[1, 2, 3], [4, 5, 6]])  # Create a 2-dimensional array

    c = np.dot(a, b)  # Matrix multiplication

    ```


    In this example, the **numpy** library is imported using the alias np, and its
    functions are used to create and manipulate arrays.


    Modules and libraries are an essential part of Python programming, and they provide
    a way to organize, reuse, and share code.


    ## Chapter 3: Variables


    ### 0. What are Variables?


    In programming, a variable is a named location in memory where a value can be
    stored and accessed. Variables are used to store data that can change during the
    execution of a program.


    In Python, you can create a variable by assigning a value to it using the assignment
    operator ( = ). The name of the variable can be any combination of letters, digits,
    and underscores (_) as long as it does not start with a digit and is not a reserved
    word.


    Here is an example of creating a variable and assigning a value to it:


    ```python

    x = 10

    ```


    In this example, we create a variable named x and assign the value 10 to it. The
    type of the value stored in a variable is determined automatically by the interpreter
    based on the value assigned to it. In this case, the type of x is **int** (integer).


    You can also assign a value of a different type to a variable.


    For example, the following will change the value of x to a **string**:


    ```python

    x = ''hello''

    ```


    ### 0. Variable types


    In Python, the type of a variable is determined automatically based on the value
    assigned to it. Here are some of the basic types in Python:


    - **int**: Integer type. Examples: 1, -100, 0

    - **float**: Floating point type. Examples: 3.14, -2.5, 0.0

    - **str**: String type. Examples: ''hello'', "world", ''123''

    - **bool**: Boolean type. Examples: True, False


    You can use the type function to check the type of a variable:


    ```python

    x = 10

    print(type(x))  # Output: <class ''int''>


    x = 3.14

    print(type(x))  # Output: <class ''float''>


    x = ''hello''

    print(type(x))  # Output: <class ''str''>


    x = True

    print(type(x))  # Output: <class ''bool''>

    ```


    ### 0. Strings


    #### 0. What are Strings?


    In Python, a string is a sequence of characters enclosed in quotation marks (either
    single or double). Strings are used to represent text and are an essential data
    type in Python.


    Here is an example of how to create a string in Python:


    ```python

    # Create a string

    s = "Hello, World!"


    # You can also use single quotes to create a string

    s = ''Hello, World!''


    # You can even use triple quotes to create a multi-line string

    s = """

    Hello,

    World!

    """

    ```


    You can access individual characters in a string using indexing.


    The first character has index 0, the second character has index 1, and so on.


    Here is an example:


    ```python

    # Access the first character of a string

    print(s[0])  # Output: "H"


    # Access the third character of a string

    print(s[2])  # Output: "l"

    ```


    You can also use negative indexing to access characters from the end of the string.
    For example, the last character has index -1, the second to last character has
    index -2, and so on.


    ```python

    # Access the last character of a string

    print(s[-1])  # Output: "!"


    # Access the second to last character of a string

    print(s[-2])  # Output: "d"

    ```


    You can slice a string to extract a sub-string by specifying a range of indices.
    The syntax is **s[start:end]**, where **start** is the index of the first character
    to include in the slice and **end** is the index of the first character to exclude
    from the slice.


    For example:


    ```python

    # Extract the sub-string "World" from the string "Hello, World!"

    sub_string = s[7:12]

    print(sub_string)  # Output: "World"

    ```


    You can also omit the **start** or **end** index to include all characters from
    the beginning or end of the string, respectively.


    For example:


    ```python

    # Extract all characters from the beginning of the string

    sub_string = s[:5]

    print(sub_string)  # Output: "Hello"


    # Extract all characters from the end of the string

    sub_string = s[7:]

    print(sub_string)  # Output: "World!"

    ```


    You can also use a step value to skip characters in the slice. The syntax is **s[start:end:step]**.


    For example:


    ```python

    # Extract every other character from the string "Hello, World!"

    sub_string = s[::2]

    print(sub_string)  # Output: "HloWrd"

    ```


    ### 0. Concatenation


    Strings are **immutable** in Python, which means that you cannot change the value
    of a string once it has been created. However, you can create a new string by
    concatenating (joining) multiple strings together using the **+ operator**.


    For example:


    ```python

    # Concatenate two strings

    s1 = "Hello"

    s2 = ", World!"

    s3 = s1 + s2

    print(s3)  # Output: "Hello, World!"

    ```


    You can also use the string method "join" to concatenate a list of strings.


    For example:


    ```python

    # Concatenate a list of strings using the "join" method

    s4 = "".join(["Hello", ", ", "World!"])

    print(s4)  # Output: "Hello, World!"

    ```


    ### 0. Replacement


    The **replace** method allows you to search for a sub-string within a string and
    replace it with another string.


    For example:


    ```python

    # Replace a sub-string in a string with another string using the "replace" method

    s5 = s4.replace("World", "Python")

    print(s5)  # Output: "Hello, Python!"

    ```


    ### 0. Case conversion


    The **upper** and **lower** methods allow you to convert a string to uppercase
    or lowercase, respectively.


    For example:


    ```python

    # Convert a string to uppercase using the "upper" method

    s6 = s5.upper()

    print(s6)  # Output: "HELLO, PYTHON!"


    # Convert a string to lowercase using the "lower" method

    s7 = s6.lower()

    print(s7)  # Output: "hello, python!"

    ```


    ### 0. Whitespace removal


    The **strip** method allows you to remove leading and trailing whitespace from
    a string.


    For example:


    ```python

    # Remove leading and trailing whitespace from a string using the "strip" method

    s8 = " Hello, World! "

    s9 = s8.strip()

    print(s9)  # Output: "Hello, World!"

    ```


    ### 0. Splitting


    The **split** method allows you to split a string into a list of sub-strings based
    on a specified delimiter.'
