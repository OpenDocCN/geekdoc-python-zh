    6 in decimal.


    The **bitwise NOT operator** (~) is used to perform a bitwise NOT operation on
    an integer. It inverts the bits of the integer, changing all 0s to 1s and all
    1s to 0s:


    ```

    x = 5 # 0101

    print(~x) # -6

    ```


    In this example, the bitwise **NOT** of x is -6 in decimal.


    The **bitwise left shift operator** (<<) is used to shift the bits of an integer
    to the left by a specified number of positions. This has the effect of multiplying
    the integer by a power of 2:


    ```

    x = 5 # 0101

    print(x << 1) # 1010

