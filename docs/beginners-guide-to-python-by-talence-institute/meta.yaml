- md: "## 0. Membership operators\n\n**Membership** operators are a type of operator\
    \ in Python that are used to check if a value is contained in a sequence (such\
    \ as a list or a string). These operators include **in** and **not in**. They\
    \ return a **Boolean** value of **True** or **False** based on whether the value\
    \ being checked is contained in the sequence or not.\n\n```\n# Check if a value\
    \ is in a sequence\nx = [1, 2, 3]\nprint(1 in x)  # True\n```\n\nIn this example,\
    \ the value 1 is contained in the list x, so the expression 1 in x evaluates to\
    \ **True**.\n\nOn the other hand, the not in operator is used to check if a value\
    \ is not contained in a sequence:\n\n```\n# Check if a value is not in a sequence\n\
    x = \"Talence\"\nprint(\"T\" not in x)  # False\n```\n\nIn this example, the value\
    \ \"h\" is contained in the string x, so the expression \"h\" not in x evaluates\
    \ to **False**.\n\nMembership operators are often used to check if a value is\
    \ contained in a sequence before performing some action. For example, you might\
    \ use the **in** operator in a **for** loop to iterate over the elements of a\
    \ list:\n\n```\nx = [ 1 , 2 , 3 ]\nfor value in x :\n    print ( value )\n```\n\
    \nIn this case, the **in** operator is used to check if each element of the list\
    \ x is contained in the sequence, and the **for** loop prints each element to\
    \ the screen.\n\nMembership operators are a useful tool for checking if a value\
    \ is contained in a sequence and are widely used in Python programs to manipulate\
    \ and iterate over data.\n\n## 0. Bitwise operators\n\n**Bitwise operators** are\
    \ a type of operator in Python that are used to perform bitwise operations on\
    \ integers. These operators include bitwise **AND** ( & ), bitwise **OR** ( |\
    \ ), bitwise **XOR** ( ^ ), bitwise **NOT** ( ~ ), bitwise **left shift** ( <<\
    \ ), and bitwise **right shift** ( >> ).\n\nThey operate on the individual bits\
    \ of an integer value and can be used to perform a variety of tasks such as setting,\
    \ clearing, or inverting specific bits, or shifting the bits of a value left or\
    \ right.\n\nThe **bitwise AND operator** (&) is used to perform a bitwise AND\
    \ operation on two integers. It compares the bits of the two integers and returns\
    \ a new integer with a 1 in each bit position where both of the original integers\
    \ have a 1:\n\n```\nx = 5   # 0101\ny = 3   # 0011\nprint ( x & y )   # 0001\n\
    ```\n\nIn this example, the bitwise **AND** of x and y is 0001, which is equivalent\
    \ to 1 in decimal.\n\nThe **bitwise OR operator** (|) is used to perform a bitwise\
    \ **OR** operation on two integers. It compares the bits of the two integers and\
    \ returns a new integer with a 1 in each bit position where at least one of the\
    \ original integers has a 1:\n\n```\nx = 5 # 0101\ny = 3 # 0011\nprint(x | y)\
    \ # 0111\n```\n\nIn this example, the bitwise **OR** of x and y is 0111, which\
    \ is equivalent to 7 in decimal.\n\nThe **bitwise XOR operator** (^) is used to\
    \ perform a bitwise XOR operation on two integers. It compares the bits of the\
    \ two integers and returns a new integer with a 1 in each bit position where the\
    \ original integers have different values (either 0 and 1 or 1 and 0):\n\n```\n\
    x = 5 # 0101\ny = 3 # 0011\nprint(x ^ y) # 0110\n```\n\nIn this example, the bitwise\
    \ **XOR** of x and y is 0110, which is equivalent to 6 in decimal.\n\nThe **bitwise\
    \ NOT operator** (~) is used to perform a bitwise NOT operation on an integer.\
    \ It inverts the bits of the integer, changing all 0s to 1s and all 1s to 0s:\n\
    \n```\nx = 5 # 0101\nprint(~x) # -6\n```\n\nIn this example, the bitwise **NOT**\
    \ of x is -6 in decimal.\n\nThe **bitwise left shift operator** (<<) is used to\
    \ shift the bits of an integer to the left by a specified number of positions.\
    \ This has the effect of multiplying the integer by a power of 2:\n\n```\nx =\
    \ 5 # 0101\nprint(x << 1) # 1010\n```\n\nThe bitwise left shift operator shifts\
    \ the bits of the integer x to the left by 1 position, resulting in a new value\
    \ of 10 in binary (1010) or 10 in decimal.\n\nThe **bitwise right shift operator**\
    \ (>>) is used to shift the bits of an integer to the right by a specified number\
    \ of positions. This has the effect of dividing the integer by a power of 2:\n\
    \n```\nx = 5   # 0101\nprint(x >> 1)  # 0010\n```\n\nThe bitwise right shift operator\
    \ shifts the bits of the integer x to the right by 1 position, resulting in a\
    \ new value of 2 in binary (0010) or 2 in decimal.\n\nBitwise operators are a\
    \ useful tool for manipulating individual bits in an integer value and are often\
    \ used in low-level programming tasks such as working with hardware registers\
    \ or optimizing code for performance. They can be a bit challenging to understand\
    \ at first, but with practice they can become an important part of your Python\
    \ programming toolkit.\n\n# Chapter 5: Data types\n\n## 0. Lists\n\n### 0. What\
    \ are Lists?\n\nIn Python, a list is an ordered collection of objects that can\
    \ be of any data type, including other lists. Lists are represented using square\
    \ brackets ( [ ] ) and can contain any number of elements, separated by commas.\n\
    \nHere is an example of how to create a list in Python:\n\n```\n# Create an empty\
    \ list\nlst = []\n\n# Create a list of integers\nlst = [1, 2, 3, 4, 5]\n\n# Create\
    \ a list of strings\nlst = [\"apple\", \"banana\", \"cherry\"]\n\n# Create a list\
    \ of mixed data types\nlst = [1, \"apple\", 3.14, True]\n\n# You can also create\
    \ a list using the \"list\" function\nlst = list(\"hello\")\nprint(lst) # Output:\
    \ ['h', 'e', 'l', 'l', 'o']\n```\n\n### 0. Access elements\n\nLists are indexed,\
    \ which means that you can access the items in a list by their position in the\
    \ list.\n\n> **Note on Element Count**: In Python, it is important to remember\
    \ that the element count in a list starts at 0, rather than 1.\n\nThis means that\
    \ the first element in a list is at index 0, the second element is at index 1,\
    \ and so on.\n\nFor example, in the list [1, 2, 3, 4], the first element is 1\
    \ and is at index 0, the second element is 2 and is at index 1, and so on.\n\n\
    This can be confusing for beginners, as many other programming languages start\
    \ the element count at 1. Make sure to keep this in mind when working with lists\
    \ in Python.\n\nYou can access an item in a list by using its index in square\
    \ brackets, like this:\n\n```\n# Access the first element of a list\nprint(lst[0])\
    \  # Output: \"apple\"\n\n# Access the third element of a list\nprint(lst[2])\
    \  # Output: 3.14\n```\n\nYou can also use negative indexing to access elements\
    \ from the end of the list. For example, the last element has index -1, the second\
    \ to last element has index -2, and so on.\n\nFor example:\n\n```\n# Access the\
    \ last element of a list\nprint(lst[-1])  # Output: True\n\n# Access the second\
    \ to last element of a list\nprint(lst[-2])  # Output: 3.14\n```\n\nYou can slice\
    \ a list to extract a sub-list by specifying a range of indices. The syntax is\
    \ **lst[start:end]**, where start is the index of the first element to include\
    \ in the slice and end is the index of the first element to exclude from the slice.\n\
    \nFor example:\n\n```\n# Extract a sub-list from the list [1, 2, 3, 4, 5]\nsub_list\
    \ = lst[1:4]\nprint(sub_list)  # Output: [2, 3, 4]\n```\n\nYou can also omit the\
    \ **start** or **end** index to include all elements from the beginning or end\
    \ of the list, respectively.\n\nFor example:\n\n```\n# Extract all elements from\
    \ the beginning of the list\nsub_list = lst[:3]\nprint(sub_list)  # Output: [1,\
    \ 2, 3]\n\n# Extract all elements from the end of the list\nsub_list = lst[3:]\n\
    print(sub_list)  # Output: [4, 5]\n```\n\nYou can also use a step value to skip\
    \ elements in the slice. The syntax is **lst[start:end:step]**.\n\nFor example:\n\
    \n```\n# Extract every other element from the list [1, 2, 3, 4, 5]\nsub_list =\
    \ lst[::2]\nprint(sub_list)  # Output: [1, 3, 5]\n```\n\n## 0. Change or add values\n\
    \nLists are mutable in Python, which means that you can change the elements of\
    \ a list once it has been created. Here are some examples of how to modify a list:\n\
    \nFor example:\n\n```\n# Create a list of integers\nmy_list = [1, 2, 3]\n\n# Change\
    \ the value of the first item\nmy_list[0] = 10\nprint(my_list)  # Output: [10,\
    \ 2, 3]\n\n# Add a new item to the end of the list\nmy_list.append(4)\nprint(my_list)\
    \  # Output: [10, 2, 3, 4]\n```"
  mdcn: "## 0. 成员运算符\n\n**成员**运算符是 Python 中的一种运算符，用于检查一个值是否包含在序列（如列表或字符串）中。这些运算符包括\
    \ **in** 和 **not in**。它们根据被检查的值是否包含在序列中，返回一个 **布尔** 值 **True** 或 **False**。\n\n\
    ```\n# 检查一个值是否在序列中\nx = [1, 2, 3]\nprint(1 in x)  # True\n```\n\n在这个例子中，值 1 包含在列表\
    \ x 中，因此表达式 1 in x 的求值结果为 **True**。\n\n另一方面，`not in` 运算符用于检查一个值是否不包含在序列中：\n\n\
    ```\n# 检查一个值是否不在序列中\nx = \"Talence\"\nprint(\"T\" not in x)  # False\n```\n\n\
    在这个例子中，值 \"h\" 包含在字符串 x 中，因此表达式 \"h\" not in x 的求值结果为 **False**。\n\n成员运算符通常用于在执行某些操作之前检查一个值是否包含在序列中。例如，你可以在\
    \ **for** 循环中使用 **in** 运算符来遍历列表的元素：\n\n```\nx = [ 1 , 2 , 3 ]\nfor value in x\
    \ :\n    print ( value )\n```\n\n在这种情况下，**in** 运算符用于检查列表 x 的每个元素是否包含在序列中，而 **for**\
    \ 循环将每个元素打印到屏幕上。\n\n成员运算符是检查一个值是否包含在序列中的有用工具，在 Python 程序中被广泛用于操作和迭代数据。\n\n## 0.\
    \ 位运算符\n\n**位运算符**是 Python 中的一种运算符，用于对整数执行位运算。这些运算符包括按位**与**（ & ）、按位**或**（ | ）、按位**异或**（\
    \ ^ ）、按位**非**（ ~ ）、按位**左移**（ << ）和按位**右移**（ >> ）。\n\n它们对整数值的各个位进行操作，可用于执行各种任务，例如设置、清除或反转特定位，或将值的位向左或向右移动。\n\
    \n**按位与运算符**（&）用于对两个整数执行按位与操作。它比较两个整数的位，并返回一个新的整数，该整数在原始两个整数都为 1 的每个位位置上为 1：\n\
    \n```\nx = 5   # 0101\ny = 3   # 0011\nprint ( x & y )   # 0001\n```\n\n在这个例子中，x\
    \ 和 y 的按位**与**结果是 0001，相当于十进制的 1。\n\n**按位或运算符**（|）用于对两个整数执行按位**或**操作。它比较两个整数的位，并返回一个新的整数，该整数在原始两个整数中至少有一个为\
    \ 1 的每个位位置上为 1：\n\n```\nx = 5 # 0101\ny = 3 # 0011\nprint(x | y) # 0111\n```\n\
    \n在这个例子中，x 和 y 的按位**或**结果是 0111，相当于十进制的 7。\n\n**按位异或运算符**（^）用于对两个整数执行按位异或操作。它比较两个整数的位，并返回一个新的整数，该整数在原始两个整数值不同（即\
    \ 0 和 1 或 1 和 0）的每个位位置上为 1：\n\n```\nx = 5 # 0101\ny = 3 # 0011\nprint(x ^ y) #\
    \ 0110\n```\n\n在这个例子中，x 和 y 的按位**异或**结果是 0110，相当于十进制的 6。\n\n**按位非运算符**（~）用于对一个整数执行按位非操作。它反转整数的位，将所有\
    \ 0 变为 1，所有 1 变为 0：\n\n```\nx = 5 # 0101\nprint(~x) # -6\n```\n\n在这个例子中，x 的按位**非**结果是十进制的\
    \ -6。\n\n**按位左移运算符**（<<）用于将整数的位向左移动指定的位数。这相当于将整数乘以 2 的幂：\n\n```\nx = 5 # 0101\n\
    print(x << 1) # 1010\n```\n\n按位左移运算符将整数 x 的位向左移动 1 位，结果得到二进制值 1010，即十进制的 10。\n\
    \n**按位右移运算符**（>>）用于将整数的位向右移动指定的位数。这相当于将整数除以 2 的幂：\n\n```\nx = 5   # 0101\nprint(x\
    \ >> 1)  # 0010\n```\n\n按位右移运算符将整数 x 的位向右移动 1 位，结果得到二进制值 0010，即十进制的 2。\n\n位运算符是操作整数值中各个位的有用工具，常用于底层编程任务，例如处理硬件寄存器或优化代码性能。起初理解它们可能有点挑战性，但通过练习，它们可以成为你\
    \ Python 编程工具包中的重要组成部分。\n\n# 第 5 章：数据类型\n\n## 0. 列表\n\n### 0. 什么是列表？\n\n在 Python\
    \ 中，列表是一个有序的对象集合，可以包含任何数据类型，包括其他列表。列表使用方括号（ [ ] ）表示，可以包含任意数量的元素，元素之间用逗号分隔。\n\n\
    以下是如何在 Python 中创建列表的示例：\n\n```\n# 创建一个空列表\nlst = []\n\n# 创建一个整数列表\nlst = [1, 2,\
    \ 3, 4, 5]\n\n# 创建一个字符串列表\nlst = [\"apple\", \"banana\", \"cherry\"]\n\n# 创建一个混合数据类型的列表\n\
    lst = [1, \"apple\", 3.14, True]\n\n# 你也可以使用 \"list\" 函数创建列表\nlst = list(\"hello\"\
    )\nprint(lst) # 输出: ['h', 'e', 'l', 'l', 'o']\n```\n\n### 0. 访问元素\n\n列表是索引的，这意味着你可以通过元素在列表中的位置来访问列表中的项目。\n\
    \n> **关于元素计数的说明**：在 Python 中，重要的是要记住列表中的元素计数从 0 开始，而不是从 1 开始。\n\n这意味着列表中的第一个元素在索引\
    \ 0 处，第二个元素在索引 1 处，依此类推。\n\n例如，在列表 [1, 2, 3, 4] 中，第一个元素是 1，位于索引 0；第二个元素是 2，位于索引\
    \ 1，依此类推。\n\n这对于初学者来说可能令人困惑，因为许多其他编程语言的元素计数从 1 开始。在 Python 中使用列表时，请务必记住这一点。\n\n\
    你可以通过在方括号中使用其索引来访问列表中的项目，如下所示：\n\n```\n# 访问列表的第一个元素\nprint(lst[0])  # 输出: \"apple\"\
    \n\n# 访问列表的第三个元素\nprint(lst[2])  # 输出: 3.14\n```\n\n你也可以使用负索引来访问列表末尾的元素。例如，最后一个元素的索引是\
    \ -1，倒数第二个元素的索引是 -2，依此类推。\n\n例如：\n\n```\n# 访问列表的最后一个元素\nprint(lst[-1])  # 输出:\
    \ True\n\n# 访问列表的倒数第二个元素\nprint(lst[-2])  # 输出: 3.14\n```\n\n你可以通过指定索引范围来切片列表以提取子列表。语法是\
    \ **lst[start:end]**，其中 start 是切片中要包含的第一个元素的索引，end 是切片中要排除的第一个元素的索引。\n\n例如：\n\n\
    ```\n# 从列表 [1, 2, 3, 4, 5] 中提取子列表\nsub_list = lst[1:4]\nprint(sub_list)  # 输出:\
    \ [2, 3, 4]\n```\n\n你也可以省略 **start** 或 **end** 索引，以分别包含从列表开头或结尾的所有元素。\n\n例如：\n\
    \n```\n# 从列表开头提取所有元素\nsub_list = lst[:3]\nprint(sub_list)  # 输出: [1, 2, 3]\n\n\
    # 从列表末尾提取所有元素\nsub_list = lst[3:]\nprint(sub_list)  # 输出: [4, 5]\n```\n\n你还可以使用步长值来跳过切片中的元素。语法是\
    \ **lst[start:end:step]**。\n\n例如：\n\n```\n# 从列表 [1, 2, 3, 4, 5] 中每隔一个元素提取一个\n\
    sub_list = lst[::2]\nprint(sub_list)  # 输出: [1, 3, 5]\n```\n\n## 0. 更改或添加值\n\n\
