    \n在 Python 中，你可以使用 `*` **运算符**来定义具有可变长度参数的函数。`*` **运算符**允许你指定该函数应接受任意数量的实参，并将它们存储在一个名为\
    \ **args** 的元组中。\n\n例如：\n\n```\ndef hello(*names):\n    for name in names:\n \
