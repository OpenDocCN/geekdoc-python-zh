    \ \"Bob\", the value of \"Bob\" is used.\n\nThis code will print \" *Hi Alice*\
    \ \" and \" *Hi Bob* \" to the console.\n\n## 0. Variable length arguments\n\n\
    Sometimes, you may not know in advance how many arguments a function will need\
