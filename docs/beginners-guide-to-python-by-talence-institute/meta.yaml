    ## 0. Booleans


    ### 0. Overview


    In Python, a boolean is a data type that can have one of two values: True or False.
    These values are often used in conditional statements, which allow a program to
    take different actions based on whether a certain condition is met.


    ### 0. Comparison operation


    Booleans are often used in comparison operations, which compare two values and
    return a boolean value based on the result of the comparison. For example:


    ```

    x = 5

    y = 10


    result = x < y  # result is True

    ```


    In the example above, the comparison **x < y** checks if the value of x is less
    than the value of y. Since 5 is indeed less than 10, the comparison returns **True**.
    If the comparison had returned **False**, it would mean that the value of x was
    not less than the value of y.


    Booleans can also be used in logical operations, such as **and**, **or**, and
    **not**. These operations allow you to test multiple conditions at the same time
    and return a boolean value based on the result of the tests.


    For example:


    ```

    x = 5

    y = 10

    z = 15


    result = x < y and y < z  # result is True

    ```


    In the example above, the **and** operator checks if both conditions **x < y**
    and **y < z** are true. Since both conditions are indeed true, the comparison
    returns **True**. If either condition had been False, the overall comparison would
    have returned **False**.


    ## 0. Numbers


    ### 0. Overview


    In Python, there are three main types of numbers:


    - **Integers**: These are whole numbers, such as “1”, “-5”, or “100”. They can
    be positive or negative, and can be of any size (subject to the limits of your
    computer''s memory).

    - **Floating-point numbers**: These are numbers with a decimal point, such as
    “3.14”, “-0.5”, or “1.1e5”. They can also be positive or negative, and can have
    a very large or small range (again, subject to the limits of your computer''s
    memory).

    - **Complex numbers**: These are numbers with both a real and an imaginary part,
    represented as **a + bj**, where a is the real part and b is the imaginary part.
    For example, “6 + 3j” is a complex number with a real part of 6 and an imaginary
    part of 3.


    ### 0. int, float, complex


    Numbers are a fundamental data type in Python, used to represent numeric values
    such as integers, floating-point numbers, and complex numbers. There are several
    built-in functions and methods available for working with numbers in Python.


    To create an **integer** (**int**), as we have seen, you can simply assign a whole
    number to a variable:


    ```

    x = 10

    ```


    To create a **floating-point** number (**float**), you can use a decimal point:


    ```

    x = 1.37

    ```


    To create a **complex** number, you can use the complex() function:


    ```

    x = complex(1, 2)  # 1 + 2j

    ```


    You can perform basic arithmetic operations on numbers using the standard arithmetic
    operators:


    ```

    x = 5

    y = 3

    print(x + y)  # 8

    print(x - y)  # 2

    print(x * y)  # 15

    print(x / y)  # 1.6666666666666667

    print(x // y)  # 1

    print(x % y)  # 2

    print(x ** y)  # 125

    ```


    ### 0. Built-in functions


    Python also provides a number of built-in functions for working with numbers.
    For example, you can use the **abs()** function to find the absolute value of
    a number, the **round()** function to round a number to a given precision, and
    the **max()** and **min()** functions to find the maximum and minimum of a set
    of numbers, respectively.


    For example:


    ```

    x = -5

    y = 3.14

    z = 1.5


    result = abs(x)  # result is 5

    result = round(y)  # result is 3

    result = max(x, y, z)  # result is 3.14

    result = min(x, y, z)  # result is -5

    ```


    ### 0. Mathematics


    You can also use the math module to perform more advanced mathematical operations
    such as trigonometry, logarithms, and square roots:


    ```

    import math


    x = math.pi

    print(math.sin(x))  # 0.0015926529164868282

    print(math.cos(x))  # -0.9999987317275395

    print(math.tan(x))  # -0.0015926535896604847

    print(math.sqrt(x))  # 1.7724538509055159

    ```


    Numbers are an essential part of Python programming and are widely used to represent
    and manipulate numeric data in a variety of applications.


    ### 0. Variable conversion


    Sometimes, you might need to convert a value from one type to another. Python
    provides built-in functions for converting values from one type to another.


    For example, you can use the **int** function to convert a **float** or a **string**
    to an integer:


    ```

    x = 10.5

    y = int(x)  # y is now 10


    x = ''123''

    y = int(x)  # y is now 123

    ```


    You can use the **float** function to convert an integer or a string to a float:


    ```

    x = 10

    y = float(x)  # y is now 10.0


    x = ''3.14''

    y = float(x)  # y is now 3.14

    ```


    You can use the **str** function to convert any value to a string:


    ```

    x = 10

    y = str(x)  # y is now ''10''


    x = 3.14

    y = str(x)  # y is now ''3.14''


    x = True

    y = str(x)  # y is now ''True''

    ```


    It is important to note that some type conversions are not possible. For example,
    you cannot convert a string to a boolean or vice versa.


    ### 0. Users inputs


    In Python, you can use the **input()** function to allow users to input data into
    a program. The **input()** function reads a line of text from the user and stores
    it in a variable as a **string**.


    ```

    age = input("Please enter your age: ")

    age = int(age)  # Convert the string to an integer

    print("Your age is:", age)

    ```


    This code prompts the user to enter their age and stores it as a string. The string
    is then converted to an integer using the **int()** function, and the age is printed
    to the console.


    It''s important to note that the **input()** function will always return a string,
    even if the user enters numerical data. This means that you will need to use type
    conversion if you want to work with numerical data in your program.


    ### 0. Pro-Trip: Good practices for Variables


    It is a good practice to choose descriptive and meaningful names for your variables.
    This makes your code easier to read and understand.


    In Python, variable names are case-sensitive, which means that x and X are different
    variables. It is also a good practice to follow the **PEP 8 style guide** [1]
    for Python, which recommends using lowercase letters and separating words in variable
    names with underscores.


    For example, the following are good variable names:


    ```

    name

    student_id

    total_price

    ```


    The following are not good variable names because they do not follow the recommended
    style or because they are reserved words:


    | Examples | Problems |

    | --- | --- |

    | NAME | Uppercase letters are not recommended |

    | studentID | Underscores are not used to separate words |

    | total-price | Dashes are not allowed in variable names |

    | print | Print is a reserved word |'
