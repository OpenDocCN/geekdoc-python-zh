    \ 和 **b**，并返回这两个值的和。\n\n该函数使用实参 10 和 20 被调用，返回的值被赋给 **sum** 变量。代码的最后一行将 **sum**\
    \ 的值打印到控制台，结果将是 30。\n\n## 0. 变量作用域\n\n在 Python 中，在函数内部定义的变量是该函数的局部变量，在函数外部无法访问。在函数外部、**全局作用域**中定义的变量，可以从函数内部访问。\n\
    \n例如：\n\n```\nvar = 5\n\ndef print_var():\n    print(var)\n\nprint_var()\n```\n\
    \n这段代码定义了一个全局变量 **var**，其值为 5，以及一个名为 **print_var** 的函数，该函数将 **var** 的值打印到控制台。当函数被调用时，它会将\
    \ 5 打印到控制台，因为 **var** 是在全局作用域中定义的，可以从函数内部访问。\n\n如果你在函数内部定义了一个与全局变量同名的变量，局部变量将遮蔽全局变量，这意味着全局变量将无法从函数内部访问。\n\
    \n例如：\n\n```\nvar = 5\n\ndef print_var():\n    var = 10\n    print(var)\n\nprint_var()\n\
    \nprint(var)\n```\n\n这段代码定义了一个全局变量 **var**，其值为 5，以及一个名为 **print_var** 的函数，该函数定义了一个值为\
