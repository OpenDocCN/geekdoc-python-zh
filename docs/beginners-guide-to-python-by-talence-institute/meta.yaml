    # # Chapter 5: Data types


    # ## 0. Lists


    # ### 0. What are Lists?


    In Python, a list is an ordered collection of objects that can be of any data
    type, including other lists. Lists are represented using square brackets ( [ ]
    ) and can contain any number of elements, separated by commas.


    Here is an example of how to create a list in Python:


    ```

    # Create an empty list

    lst = []


    # Create a list of integers

    lst = [1, 2, 3, 4, 5]


    # Create a list of strings

    lst = ["apple", "banana", "cherry"]


    # Create a list of mixed data types

    lst = [1, "apple", 3.14, True]


    # You can also create a list using the "list" function

    lst = list("hello")

    print(lst) # Output: [''h'', ''e'', ''l'', ''l'', ''o'']

    ```


    # ### 0. Access elements


    Lists are indexed, which means that you can access the items in a list by their
    position in the list.


    > **Note on Element Count**: In Python, it is important to remember that the element
    count in a list starts at 0, rather than 1.'
  - '[PAGE 37]


    > This means that the first element in a list is at index 0, the second element
    is at index 1, and so on.


    For example, in the list [1, 2, 3, 4], the first element is 1 and is at index
    0, the second element is 2 and is at index 1, and so on.


    This can be confusing for beginners, as many other programming languages start
    the element count at 1. Make sure to keep this in mind when working with lists
    in Python.


    You can access an item in a list by using its index in square brackets, like this:


    ```

    # Access the first element of a list

    print(lst[0])  # Output: "apple"


    # Access the third element of a list

    print(lst[2])  # Output: 3.14

    ```


    You can also use negative indexing to access elements from the end of the list.
    For example, the last element has index -1, the second to last element has index
    -2, and so on.


    For example:


    ```

    # Access the last element of a list

    print(lst[-1])  # Output: True


    # Access the second to last element of a list

    print(lst[-2])  # Output: 3.14

    ```


    You can slice a list to extract a sub-list by specifying a range of indices. The
    syntax is **lst[start:end]**, where start is the index of the first element to
    include in the slice and end is the index of the first element to exclude from
    the slice.


    For example:


    ```

    # Extract a sub-list from the list [1, 2, 3, 4, 5]

    sub_list = lst[1:4]

    print(sub_list)  # Output: [2, 3, 4]

    ```'
  - '[PAGE 38]


    You can also omit the **start** or **end** index to include all elements from
    the beginning or end of the list, respectively.


    For example:


    ```

    # Extract all elements from the beginning of the list

    sub_list = lst[:3]

    print(sub_list)  # Output: [1, 2, 3]


    # Extract all elements from the end of the list

    sub_list = lst[3:]

    print(sub_list)  # Output: [4, 5]

    ```


    You can also use a step value to skip elements in the slice. The syntax is **lst[start:end:step]**.


    For example:


    ```

    # Extract every other element from the list [1, 2, 3, 4, 5]

    sub_list = lst[::2]

    print(sub_list)  # Output: [1, 3, 5]

    ```


    # 0. Change or add values


    Lists are mutable in Python, which means that you can change the elements of a
    list once it has been created. Here are some examples of how to modify a list:


    For example:


    ```

    # Create a list of integers

    my_list = [1, 2, 3]


    # Change the value of the first item

    my_list[0] = 10

    print(my_list)  # Output: [10, 2, 3]


    # Add a new item to the end of the list

    my_list.append(4)

    print(my_list)  # Output: [10, 2, 3, 4]

    ```'
- md: "## 0. Pro Tips: When to use Lists\n\nIn Python, a list is an ordered collection\
    \ of items that can be of any data type (including other lists). Lists are useful\
    \ when you need to store and retrieve a collection of items in a specific order.\n\
    \nYou might want to use a list in Python when you need to store a collection of\
    \ items that needs to be in a specific order, and you want to be able to easily\
    \ add, remove, or modify the items in the list.\n\nIn general, lists are a useful\
    \ data structure in Python whenever you need to store and retrieve a collection\
    \ of items in a specific order, and you want to be able to easily add, remove,\
    \ or modify the items in the list. They are particularly useful when working with\
    \ data that needs to be processed in a specific order, such as in a loop.\n\n\
    Note that Python also has another data structure called a tuple, which is similar\
    \ to a list but is immutable (i.e., you cannot modify the elements of a tuple\
    \ once it is created). Tuples are often used when you need to store a collection\
    \ of items that should not be modified, such as the elements of a point (x, y)\
    \ in a 2D coordinate system.\n\n## 0. Tuples\n\n### 0. What are Tuples?\n\nIn\
    \ Python, a **tuple** is an immutable sequence type. This means that once you\
    \ create a tuple, you cannot change its contents. Tuples are created using parentheses\
    \ ( ) or by using the tuple function.\n\nTuples are similar to lists, but they\
    \ are immutable, which means that once you create a tuple, you cannot change its\
    \ elements. This makes tuples more efficient for storing data that does not need\
    \ to be modified, but it also means that you cannot use many of the methods that\
    \ are available for lists.\n\nTo create a tuple in Python, you can use parentheses\
    \ and separate the elements with commas.\n\nFor example:\n\n```python\nmy_tuple\
    \ = (1, 2, 3)\n```\n\nTuples also have a number of built-in methods, but they\
    \ are more limited than the methods available for lists. Some common methods include\
    \ **count()**, which counts the number of occurrences of a given element, and\
    \ **index()**, which returns the index of the first occurrence of a given element.\n\
    \n### 0. Access elements\n\nWe can access the items in a tuple using their index,\
    \ just like we do with lists. The index of the first item in a tuple is 0, and\
    \ the index of the second item is 1, and so on.\n\nWe can access an item in a\
    \ tuple by using its index in square brackets, like this:\n\n```python\nfirst_item\
    \ = my_tuple[0]\nsecond_item = my_tuple[1]\n```\n\nYou can also use negative indices\
    \ to access items from the end of the tuple. For example, the index -1 refers\
    \ to the last item in the tuple, -2 refers to the second to last item, and so\
    \ on.\n\n```python\nlast_item = my_tuple[-1]\nsecond_to_last_item = my_tuple[-2]\n\
    ```\n\n### 0. Mixing types\n\nTuples can contain items of different types, just\
    \ like lists. However, unlike lists, tuples are immutable, which means that you\
    \ cannot change the values of individual items or add or remove items from a tuple.\n\
    \nHere is an example of a tuple containing integers, strings, and a float:\n\n\
    ```python\nmy_tuple = (1, 'hello', 3.14)\n```\n\nWe can also create a tuple by\
    \ enclosing a comma-separated sequence of values in parentheses:\n\n```python\n\
    my_tuple = 1, 'hello', 3.14\n```\n\n### 0. Tuple Slicing\n\nJust like with lists,\
    \ you can access a range of items in a tuple using slicing. Slicing is done using\
    \ the colon ( : ) operator. For example, to get the first two items in a tuple,\
    \ you can use the following slice:\n\n```python\nfirst_two_items = my_tuple[0:2]\n\
    ```\n\nThis will return a new tuple containing the items at indices 0 and 1. You\
    \ can also omit the first index to start from the beginning of the tuple, or the\
    \ second index to slice to the end of the tuple.\n\nFor example, the following\
    \ will return a new tuple containing all the items in my_tuple except for the\
    \ last one:\n\n```python\nall_but_last = my_tuple[:-1]\n```\n\n### 0. Tuple Unpacking\n\
    \nYou can \"unpack\" a tuple into separate variables by assigning the tuple to\
    \ a comma-separated list of variables.\n\nFor example:\n\n```python\nx, y, z =\
    \ my_tuple\n```\n\nwill assign the values of the items in my_tuple to the variables\
    \ x, y, and z, respectively.\n\n### 0. Tuple Methods and Functions\n\nThere are\
    \ a few methods and functions that you can use with tuples.\n\nThe **len** function\
    \ returns the length of the tuple:\n\n```python\ntuple_length = len(my_tuple)\n\
    ```\n\nThe **count** method returns the number of times a specific value appears\
    \ in the tuple:\n\n```python\nhello_count = my_tuple.count('hello')\n```\n\nThe\
    \ **index** method returns the index of the first occurrence of a specific value\
    \ in the tuple:\n\n```python\nhello_index = my_tuple.index('hello')\n```\n\nYou\
    \ can also use the **in** operator to check if a specific value is contained in\
    \ the tuple:\n\n```python\nif 'hello' in my_tuple:\n    print('Hello is in the\
    \ tuple')\n```\n\n### 0. Pro Tips: When to use Tuples\n\nTuples are useful when\
    \ you need to store a fixed set of values that you don't want to change.\n\nFor\
    \ example, you might use a tuple to store a person's name and age:\n\n```python\n\
    person = ('Alice', 25)\n```\n\nBecause tuples are **immutable**, you can use them\
    \ as keys in dictionaries and as elements in sets. Lists, on the other hand, are\
    \ not suitable for these purposes because they are mutable.\n\nTuples are also\
    \ more memory-efficient than lists because they do not require the extra overhead\
    \ for changing their size.\n\n## 0. Dictionaries\n\n### 0. What are Dictionaries?\n\
    \nDictionaries are a fundamental data type in Python, and are used to store **key-value\
    \ pairs**. They are similar to lists, but instead of using integers to index values,\
    \ dictionaries use keys, which can be any **immutable** type (such as strings\
    \ or numbers).\n\nDictionaries are also known as associative arrays or hash maps.\n\
    \nDictionaries are created using curly braces ( {} ), and the key-value pairs\
    \ are separated by a colon ( : ). Keys must be unique, and they can be of any\
    \ immutable type (such as strings, integers, or tuples with immutable elements).\
    \ Values can be of any type.\n\nHere is an example of a dictionary containing\
    \ three key-value pairs:\n\n```python\nmy_dict = { 'name' : 'Alice' , 'age' :\
    \ 25 , 'city' : 'New York' }\n```\n\nYou can also create a dictionary using the\
    \ dict function:\n\n```python\nmy_dict = dict ( name = 'Alice' , age = 25 , city\
    \ = 'New York' )\n```\n\n### 0. Accessing Dictionary Items\n\nTo access the values\
    \ in a dictionary, you can use the square brackets [] and the **key**.\n\nFor\
    \ example, to access the **value** for the 'name' **key**:\n\n```python\nmy_dict\
    \ = dict ( name = 'Alice' , age = 25 , city = 'New York' )\nname = my_dict [ 'name'\
    \ ]    # name is 'Alice'\nage = my_dict [ 'age' ]      # age is 25\n```\n\nIf\
    \ you try to access a key that does not exist in the dictionary, you will get\
    \ a **KeyError exception**. You can use the get method to avoid this exception.\n\
    \nThe **get** method returns the value for a key if it exists, or a **default\
    \ value** if it does not:\n\nYou can also use the **get()** method to access values.\n\
    \nThis is useful because it returns a default value (such as **None**) if the\
    \ key does not exist in the dictionary:\n\n```python\nmy_dict = dict ( name =\
    \ 'Alice' , age = 25 , city = 'New York' )\ncity = my_dict . get ( 'city' )\n\
    print ( city )  # Print 'New York'\n\ncountry = my_dict . get ( 'country' , 'United\
    \ States' )\nprint ( country )  # Print 'United States' (default value)\n```\n\
    \n**Note**: This will output 'United States', because the 'country' key does not\
    \ exist in the dictionary and the default value of 'United States' is returned\
    \ instead.\n\n### 0. Add / Delete / Update key-value pairs\n\nTo add or update\
    \ key-value pairs in a dictionary, you can use the assignment operator =. For\
    \ example, to add a new key-value pair for the 'country' key:\n\n```python\nmy_dict\
    \ [ 'country' ] = 'United States'\nprint ( my_dict )\n```\n\nThis will add a new\
    \ key-value pair to the dictionary, with the key being 'country' and the value\
    \ being 'United States'."
  mdcn: "## 0. 专业提示：何时使用列表\n\n在 Python 中，列表是一个有序的项目集合，项目可以是任何数据类型（包括其他列表）。当你需要按特定顺序存储和检索一组项目时，列表非常有用。\n\
    \n当你需要存储一组需要按特定顺序排列的项目，并且希望能够轻松地添加、删除或修改列表中的项目时，你可能需要在 Python 中使用列表。\n\n总的来说，只要你需要按特定顺序存储和检索一组项目，并且希望能够轻松地添加、删除或修改列表中的项目，列表就是\
    \ Python 中一种有用的数据结构。当处理需要按特定顺序处理的数据时，例如在循环中，它们特别有用。\n\n请注意，Python 还有另一种称为元组的数据结构，它与列表类似，但是不可变的（即，一旦创建元组，你就无法修改其元素）。当你需要存储一组不应修改的项目时，通常使用元组，例如二维坐标系中点\
    \ (x, y) 的元素。\n\n## 0. 元组\n\n### 0. 什么是元组？\n\n在 Python 中，**元组**是一种不可变的序列类型。这意味着一旦你创建了一个元组，你就无法更改其内容。元组使用圆括号\
    \ ( ) 或使用 `tuple` 函数创建。\n\n元组与列表类似，但它们是不可变的，这意味着一旦你创建了一个元组，你就无法更改其元素。这使得元组在存储不需要修改的数据时更有效率，但这也意味着你不能使用许多可用于列表的方法。\n\
    \n要在 Python 中创建一个元组，你可以使用圆括号并用逗号分隔元素。\n\n例如：\n\n```python\nmy_tuple = (1, 2, 3)\n\
    ```\n\n元组也有许多内置方法，但它们比列表可用的方法更有限。一些常见的方法包括 **count()**，它计算给定元素出现的次数，以及 **index()**，它返回给定元素第一次出现的索引。\n\
    \n### 0. 访问元素\n\n我们可以使用索引来访问元组中的项目，就像我们对列表所做的那样。元组中第一个项目的索引是 0，第二个项目的索引是 1，依此类推。\n\
    \n我们可以通过在方括号中使用其索引来访问元组中的项目，如下所示：\n\n```python\nfirst_item = my_tuple[0]\nsecond_item\
    \ = my_tuple[1]\n```\n\n你也可以使用负索引来访问元组末尾的项目。例如，索引 -1 指的是元组中的最后一个项目，-2 指的是倒数第二个项目，依此类推。\n\
    \n```python\nlast_item = my_tuple[-1]\nsecond_to_last_item = my_tuple[-2]\n```\n\
    \n### 0. 混合类型\n\n元组可以包含不同类型的项目，就像列表一样。然而，与列表不同，元组是不可变的，这意味着你不能更改单个项目的值，也不能从元组中添加或删除项目。\n\
    \n这是一个包含整数、字符串和浮点数的元组示例：\n\n```python\nmy_tuple = (1, 'hello', 3.14)\n```\n\n\
    我们也可以通过将逗号分隔的值序列括在圆括号中来创建元组：\n\n```python\nmy_tuple = 1, 'hello', 3.14\n```\n\n\
    ### 0. 元组切片\n\n就像列表一样，你可以使用切片来访问元组中的一系列项目。切片使用冒号 ( : ) 运算符完成。例如，要获取元组中的前两个项目，你可以使用以下切片：\n\
    \n```python\nfirst_two_items = my_tuple[0:2]\n```\n\n这将返回一个包含索引 0 和 1 处项目的新元组。你也可以省略第一个索引以从元组的开头开始，或者省略第二个索引以切片到元组的末尾。\n\
    \n例如，以下代码将返回一个包含 `my_tuple` 中除最后一个之外所有项目的新元组：\n\n```python\nall_but_last = my_tuple[:-1]\n\
    ```\n\n### 0. 元组解包\n\n你可以通过将元组赋值给一个逗号分隔的变量列表，将元组“解包”到单独的变量中。\n\n例如：\n\n```python\n\
    x, y, z = my_tuple\n```\n\n将把 `my_tuple` 中项目的值分别赋给变量 x、y 和 z。\n\n### 0. 元组方法和函数\n\
    \n有一些方法和函数可以与元组一起使用。\n\n**len** 函数返回元组的长度：\n\n```python\ntuple_length = len(my_tuple)\n\
    ```\n\n**count** 方法返回特定值在元组中出现的次数：\n\n```python\nhello_count = my_tuple.count('hello')\n\
    ```\n\n**index** 方法返回特定值在元组中第一次出现的索引：\n\n```python\nhello_index = my_tuple.index('hello')\n\
    ```\n\n你也可以使用 **in** 运算符来检查特定值是否包含在元组中：\n\n```python\nif 'hello' in my_tuple:\n\
    \    print('Hello is in the tuple')\n```\n\n### 0. 专业提示：何时使用元组\n\n当你需要存储一组固定的、不希望更改的值时，元组非常有用。\n\
