    If you try to access a key that does not exist in the dictionary, you will get
    a **KeyError exception** . You can use the get method to avoid this exception.


    The **get** method returns the value for a key if it exists, or a **default value**
    if it does not:


    You can also use the **get()** method to access values.


    This is useful because it returns a default value (such as **None** ) if the key
    does not exist in the dictionary:


    ```

    my_dict = dict ( name = ''Alice'' , age = 25 , city = ''New York'' )

    city = my_dict . get ( ''city'' )

    print ( city )  # Print ''New York''


    country = my_dict . get ( ''country'' , ''United States'' )

    print ( country )  # Print ''United States'' (default value)

    ```


    **Note** : This will output ''United States'', because the ''country'' key does
    not exist in the dictionary and the default value of ''United States'' is returned
    instead.


    # 0. Add / Delete / Update key-value pairs


    To add or update key-value pairs in a dictionary, you can use the assignment operator
    = . For example, to add a new key-value pair for the ''country'' key:


    ```

    my_dict [ ''country'' ] = ''United States''

    print ( my_dict )

    ```


    This will add a new key-value pair to the dictionary, with the key being ''country''
    and the value being ''United States''.'
