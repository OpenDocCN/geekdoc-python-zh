    , \"salad\"])\n```\n\n![](img/338ed40e6284f10661b5463402ece5a5_148_2.png)\n\n\
    # Drawing\n\nThe Drawing object allows shapes, images, and text to be created.\n\
    \n```\ndrawing = Drawing(app)\n```\n\n![](img/338ed40e6284f10661b5463402ece5a5_148_3.png)\n\
    \n# ListBox\n\nThe ListBox object displays a list of items from which either single\
    \ or multiple items can be selected.\n\n```\nlistbox = ListBox(app, items=[\"\
    cheese\",\n    \"ham\", \"salad\"])\n```\n\n![](img/338ed40e6284f10661b5463402ece5a5_148_4.png)"
  merge: -1
  pgno: 148
- img_proc: true
  md: "# Picture\n\nThe Picture object displays an image.\n\n```\npicture = Picture(app,\
    \ image=\"guizero.png\")\n```\n\n![](img/338ed40e6284f10661b5463402ece5a5_149_0.png)\n\
    \n# PushButton\n\nThe PushButton object displays a button with text or an image,\
    \ which calls a function when pressed.\n\n```\ndef do_nothing():\n    print(\"\
    button pressed\")\n\nbutton = PushButton(app, command=do_nothing)\n```\n\n![](img/338ed40e6284f10661b5463402ece5a5_149_1.png)\n\
    \n# Slider\n\nThe Slider object displays a bar and selector which can be used\
    \ to specify a value in a range.\n\n```\nslider = Slider(app)\n```\n\n![](img/338ed40e6284f10661b5463402ece5a5_149_2.png)\n\
    \n# Text\n\nThe Text object displays non-editable text in your app – useful for\
    \ titles, labels, and instructions.\n\n```\ntext = Text(app, text=\"Hello World\"\
    )\n```\n\n![](img/338ed40e6284f10661b5463402ece5a5_149_3.png)\n\n# TextBox\n\n\
    The TextBox object displays a text box which the user can type in.\n\n```\ntextbox\
    \ = TextBox(app)\n```\n\n![](img/338ed40e6284f10661b5463402ece5a5_149_4.png)"
  merge: -1
  pgno: 149
- img_proc: true
  md: '# Waffle


    The Waffle object displays an n×n grid of squares with custom dimensions and padding.


    ![](img/338ed40e6284f10661b5463402ece5a5_150_0.png)


    ```

    waffle = Waffle(app)

    ```


    # Window


    The Window object creates a new window in guizero.


    ![](img/338ed40e6284f10661b5463402ece5a5_150_1.png)


    ```

    window = Window(app)

    ```


    # Properties


    All widgets are customisable through their properties. These properties are typical
    for most widgets. Check a widget''s online documentation (e.g. **lawsie.github.io/guizero/app**)
    for details.


    | PROPERTY | DATA TYPE | DESCRIPTION |

    | :--- | :--- | :--- |

    | **align** | string | The alignment of this widget within its container |

    | **bg** | string, List | The background colour of the widget |

    | **enabled** | boolean | True if the widget is enabled |

    | **font** | string | The font of the text |

    | **grid** | List | [x,y] co-ordinates of this widget if in a ''grid'' |

    | **height** | int, string | The height of the widget |

    | **master** | App, Window, Box | The container to which this widget belongs |

    | **value** | int, string, bool | The widget''s current ''value'', e.g. the text
    in a TextBox |

    | **visible** | boolean | If this widget is visible |

    | **width** | size | The width of the widget |

    | **ext_size** | int | The size of the text |

    | **ext_color** | color | The colour of the text |'
  merge: -1
  pgno: 150
- img_proc: true
  md: '# Methods


    Widgets can be interacted with through their methods. The methods supported are
    dependent on the widget, so check the documentation. These methods are typical
    across most widgets.


    | METHOD | DESCRIPTION |

    |---|---|

    | after(time, command, args=None) | Schedules a single call to command after time
    milliseconds |

    | cancel(command) | Cancels a scheduled call to command |

    | destroy() | Destroys the widget |

    | disable() | Disables the widget so that it cannot be interacted with |

    | enable() | Enables the widget |

    | focus() | Gives focus to the widget |

    | hide() | Hides the widget from view |

    | repeat(time, command, args=None) | Schedules a call to command every time milliseconds
    |

    | resize(width, height) | Sets the width and height of the widget |

    | show() | Displays the widget if it was previously hidden |

    | update_command(command, args=None) | Updates the function to call when the widget
    is used |'
  merge: -1
  pgno: 151
