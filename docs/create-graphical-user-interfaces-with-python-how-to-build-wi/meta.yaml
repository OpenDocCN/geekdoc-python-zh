    # READING THE DOCS


    You might be wondering how to find out what properties a particular widget has
    that you can change. Even if you are a complete beginner programmer, it is worth
    learning how to read documentation because it will let you use the full power
    of guizero and any other libraries you come across.


    The guizero documentation can be found at **lawsie.github.io/guizero**. Once you
    are there, click on the widget you would like to change, and scroll down until
    you reach the properties section. For example, if you select ''Text'' under the
    heading of widgets, you will see all of the properties of a piece of Text that
    you can possibly change. Documentation also often contains helpful snippets of
    code which show you how to use a particular property or method, so don''t be scared
    of having a look through – you never know what you might learn!


    # 02-wanted.py / Python 3


    ```

    from guizero import App, Text, Picture


    app = App("Wanted!")

    app.bg = "#FBFBD0"


    wanted_text = Text(app, "WANTED")

    wanted_text.text_size = 50

    wanted_text.font = "Times New Roman"


    cat = Picture(app, image="tabitha.png")


    app.display()

    ```


