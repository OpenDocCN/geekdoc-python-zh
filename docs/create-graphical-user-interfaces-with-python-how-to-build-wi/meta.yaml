- md: "## CUSTOM EVENTS\n\nTo get your paint application to react to the mouse position,\
    \ you have used custom events. The events work very similar to the normal widget\
    \ command parameter in that you set them to a function, which is called when that\
    \ event occurs.\n\nWhen your function is called, a variable is passed which contains\
    \ information about the event that has occurred, such as the x and y co-ordinates\
    \ of the mouse. Most widgets, including the App itself, support the following\
    \ events:\n\n- when clicked – **when_clicked**\n- when the left mouse button is\
    \ pressed – **when_left_button_pressed**\n- when the left mouse button is released\
    \ – **when_left_button_released**\n- when the right mouse button is pressed –\
    \ **when_right_button_pressed**\n- when the right mouse button is released – **when_right_button_released**\n\
    - when a key is pressed – **when_key_pressed**\n- when a key is released – **when_key_released**\n\
    - when the mouse enters a widget – **when_mouse_enters**\n- when the mouse leaves\
    \ a widget – **when_mouse_leaves**\n- when the mouse is dragged across a widget\
    \ – **when_mouse_dragged**\n\nThese events can be used to make your GUIs more\
    \ interactive.\n\n## paint1.py / Python 3\n\n```python\n# simple paint app, just\
    \ draw dots\n\n# -------------------------\n# Imports\n# -------------------------\n\
    \nfrom guizero import App, Drawing\n\n\n# -------------------------\n# Functions\n\
    # -------------------------\n\ndef draw(event):\n    painting.oval(\n        event.x\
    \ - 1, event.y - 1,\n        event.x + 1, event.y + 1,\n        color=\"black\"\
    )\n\n\n# -------------------------\n# App\n# -------------------------\n\napp\
    \ = App(\"Paint\")\n\npainting = Drawing(app, width=\"fill\", height=\"fill\"\
    )\n\npainting.when_mouse_dragged = draw\n\napp.display()\n```\n\n![](img/338ed40e6284f10661b5463402ece5a5_115_0.png)\n\
    \n## paint2.py / Python 3\n\n```python\n# drawing lines by tracking when the mouse\
