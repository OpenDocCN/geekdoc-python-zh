  md: '# CREATE GRAPHICAL USER INTERFACES WITH PYTHON


    ![](img/338ed40e6284f10661b5463402ece5a5_140_0.png)


    > Thonny includes a debugger which may prove useful


    # Thonny


    Thonny comes installed with recent versions of Raspberry Pi OS. For Windows and
    Mac computers, you can download and install it from **thonny.org**. By default,
    Thonny uses a version of Python which comes packaged with it, so even if you have
    already installed Python, Thonny will ignore that version and use its own.


    Use the File menu > New to open a Python file. You will type your code in the
    top white box which has a number 1 to the left side. You can run the program by
    selecting the ‘Run current script’ button, or by pressing **F5** on the keyboard.
    If an error occurs, you will see any error messages in the shell area at the bottom
    of the screen.


    Thonny includes a debugger which allows you to step through the code one line
    at a time and see how the variables change.


    Because Thonny uses its own Python installation, you will need to install guizero
    from inside Thonny in order for Thonny to be able to access it. Make sure you
    are connected to the internet, then click on the Tools menu > Manage packages.
    In the window that appears, type guizero in the box and click ‘Find package from
    PyPI’. Thonny will locate the package for you; click Install to install guizero
    within Thonny’s own Python environment.'
  merge: -1
  pgno: 140
