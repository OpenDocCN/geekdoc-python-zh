    # Chapter 5


    # World’s Worst GUI


    Learn good GUI design by doing it all wrong first!


    ![](img/338ed40e6284f10661b5463402ece5a5_35_0.png)


    > It''s time to really go to town with your GUIs and experiment with different
    widgets, colours, fonts, and features. Like most experiments, it''s likely that
    you won''t get it right first time! In fact, you are going to explore the wrong
    way to approach creating your GUI.


    # It''s hard to read


    The right choice of GUI colour and font are important. It''s important that the
    contrast between background and text colour ensure that your GUI is easily readable.
    What you shouldn''t do it is use two very similar colours.


    Import the widgets at the top of the code:


    ```

    from guizero import App, Text

    ```


    Create an app with a title:


    ```

    app = App("it''s all gone wrong")

    title = Text(app, text="Some hard to read text")

    ```'
