- md: "The GUI contains a PushButton and Picture. When the button is pressed, the\
    \ **capture_image** function is called. The function uses the camera to capture\
    \ an image and save it as **frame.jpg**. The picture is then displayed in the\
    \ Picture widget.\n\nTest the program (**stopframe1.py**, page 131). When you\
    \ click the 'Take picture' button, the image should be displayed on the GUI (**Figure\
    \ 2**).\n\n![](img/338ed40e6284f10661b5463402ece5a5_125_0.png)\n\n## Take multiple\
    \ images and save to a GIF\n\nAn animation is made of multiple pictures, known\
    \ as frames. Each frame in the animation will be slightly different to the last\
    \ and when played together at speed, the animation will appear to move.\n\nIn\
    \ this step, you will change your GUI to keep a list of all the frames taken and\
    \ use PIL (Python Imaging Library) to save the frames as an animated GIF which\
    \ will be displayed in the viewer. At the top of your program, import the Image\
    \ module from PIL:\n\n```python\nfrom PIL import Image\n```\n\nCreate a list to\
    \ store the frames of your animation:\n\n```python\nframes = []\n```\n\nTo keep\
    \ track of how many frames have been taken, import a Text widget, add it to your\
    \ app, and set it to 0.\n\n```python\nfrom guizero import App, Picture, PushButton,\
    \ Text\n\ntotal_frames = Text(app, text=\"0\")\n```\n\nEach time a new image is\
    \ captured, you will need to open it and append it to your list of frames:\n\n\
    ```python\ndef capture_image():\n    camera.capture(\"frame.jpg\")\n    viewer.image\
    \ = \"frame.jpg\"\n\n    frame = Image.open(\"frame.jpg\")\n    frames.append(frame)\n\
    \    total_frames.value = len(frames)\n```\n\nThe `len` (length) of the `frames`\
    \ list is then used to update the text in `total_frames`.\nYour program should\
    \ now look similar to `stopframe2.py`. Test it and make sure the number of frames\
    \ increases each time you take a picture.\n\n## Save as a GIF\n\nYou can use PIL\
    \ to save all the frames as one animated GIF. Create a new `save_animation` function\
    \ to save the frames as `animation.gif`.\n\n```python\ndef save_animation():\n\
    \    if len(frames) > 0:\n        viewer.show()\n        frames[0].save(\n   \
    \         \"animation.gif\",\n            save_all=True,\n            append_images=frames[1:])\n\
    \        viewer.image = \"animation.gif\"\n    else:\n        viewer.hide()\n\
    ```\n\nThere is a lot happening here, but by breaking down the code you can see\
    \ how this works.\nIf the number of frames in the list is greater than 0, then\
    \ the viewer is shown, otherwise it is hidden:\n\n```python\nif len(frames) >\
    \ 0:\n    viewer.show()\n    ...\nelse:\n    viewer.hide()\n```\n\nThe frames\
    \ are then saved to a file called `animation.gif`. The first frame (`frames[0]`)\
    \ is saved, the remaining frames (`frames[1:]`) are appended, and all are saved\
    \ to the animated GIF:\n\n```python\nframes[0].save(\n    \"animation.gif\",\n\
    \    save_all=True,\n    append_images=frames[1:])\n```\n\nThe **animation.gif**\
    \ is then shown in the viewer:\n\n```python\nviewer.image = \"animation.gif\"\n\
    ```\n\nCall the `save_animation` function at the *end* of the `capture_image`\
    \ function to create and display the animation:\n\n```python\ndef capture_image():\n\
    \    camera.capture(\"frame.jpg\")\n    viewer.image = \"frame.jpg\"\n\n    save_animation()\n\
    ```\n\nYour code should now be similar to **stopframe3.py**. Test it out.\n\n\
    ## Delete the last frame\n\nAt the moment, if you make a mistake while creating\
    \ your animated GIF, you have to start again from the beginning.\n\nYou should\
    \ modify your GUI to allow the last frame taken to be deleted, so if a mistake\
    \ is made you can undo the change.\n\nCreate a new function which will remove\
    \ or pop the last frame from the list, save the changed animation, and then display\
    \ it.\n\n```python\ndef delete_frame():\n    if len(frames) > 0:\n        frames.pop()\n\
    \        total_frames.value = len(frames)\n\n    save_animation()\n```\n\nThe\
    \ length of the `frames` list is checked before attempting to pop the last item.\
    \ An error would be raised if you tried to pop an item from an empty list.\n\n\
    Add a PushButton to the GUI to call the `delete_frame` function, by inserting\
    \ this code in your app:\n\n```python\ndelete_last_picture = PushButton(controls,\
    \ align=\"left\",\ntext=\"Delete last\", command=delete_frame)\n```\n\n**Note:**\
    \ *You could also modify the GUI to allow you to delete any frame, not just the\
    \ last one.*\n\n## Changing the timing\n\nEach frame is displayed for the default\
    \ duration time of 100 milliseconds. Include a Slider widget in your GUI to allow\
    \ the duration to be changed.\n\nAdd it to the list of imports.\n\n```python\n\
    from guizero import App, Picture, PushButton, Text, Slider\n```\n\nThen create\
    \ the widget in the app.\n\n```python\nText(app, text=\"Duration\")\nduration\
    \ = Slider(app, start=100, end=1000, command=save_animation)\n```\n\nThe `start`\
    \ and `end` parameters will be the minimum and maximum times you can set for the\
    \ frame duration.\n\nEach time the slider is changed, the `save_animation` function\
    \ will be run.\n\nUpdate the `save_animation` function to use the duration value\
    \ when saving the GIF.\n\n```python\nframes[0].save(\n    \"animation.gif\",\n\
    \    save_all=True,\n    append_images=frames[1:],\n    duration=duration.value)\n\
    ```\n\nYour code should now resemble `stopframe4.py`. Try it out.\n\n> ## CONSISTENT\
    \ CAPTURES\n\nAs the camera is using \"auto\", each time an image is captured,\
    \ the setting used may change. This will cause each image to be slightly different\
    \ and will cause a flickering in your animation.\n\nBy fixing the camera settings\
    \ when the program starts, you can stop this from happening.\n\nThe required settings\
    \ will depend on the lighting where you are taking picture.\n\nThis article from\
    \ the picamera documentation provides more information and example settings: rpf.io/picamera-consistent.\n\
    \n## Align the controls\n\nAt the moment, the controls are taking up a lot of\
