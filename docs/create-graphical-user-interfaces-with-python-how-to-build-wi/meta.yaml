  - '[PAGE 146]


    Remember that when Thonny sees that your code needs to be indented, it will do
    so automatically – but it doesn’t know when your code needs to stop being indented,
    so you’ll have to delete the spaces yourself.


    Click the Run icon and type your name into the shell area, as before. Unless your
    name happens to be Clark Kent, you’ll see an additional message ‘You are not Superman!’
    in the shell area. Click Run again, and this time type in the name ‘Clark Kent’
    – making sure to write it exactly as in the program, with a capital C and a capital
    K. This time, the program recognises that you are, in fact, Superman.


    The == symbol tells Python to compare two values. In this case it will look to
    see if the value of the variable my_name matches the text "Clark Kent".


    > ### USING = AND ==


    We have now seen two different operators – the single equals sign (=) and the
    double equals sign (==). They mean different things and it is important to know
    the difference. The single equals (=) means “it IS equal to this value,” while
    a double equals (==) means “IS IT equal to this value?” The first is used to assign
    a value to a variable, and the second is used to compare two values.


    When you are creating the programs in this book, you will collect input from the
