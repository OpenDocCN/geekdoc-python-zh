  md: "# Loops and code indentation\n\nJust as Scratch uses stacks of jigsaw-like\
    \ blocks to control which bits of the program are connected to which other bits,\
    \ Python has its own way of controlling the sequence in which its programs run:\
    \ indentation.\n\nCreate a new program by clicking on the New icon in the Thonny\
    \ toolbar. You won't lose your existing program; instead, Thonny will create a\
    \ new tab above the script area. Type in the following code:\n\n```\nprint (\"\
    Loop starting!\")\nfor i in range(10):\n    print (\"Loop\")\n```\n\nClick the\
    \ Run icon in the Thonny toolbar, save your program with the name 'Indentation',\
    \ and watch the shell area for its output. See if you can work out what is happening.\n\
    \nThe first line prints a message to the shell, just like your Hello World program.\
    \ The second tells Python to start a loop which runs 10 times – the number of\
    \ times the loop runs is controlled by the **range(10)** instruction. The third\
    \ line is indented, which means it is pushed inwards compared to the other lines.\
    \ This indentation is how Python tells the difference between instructions outside\
    \ the loop and instructions inside the loop. In Scratch, the instructions to be\
    \ included in the loop are placed within the C-shaped block, and in Python they\
    \ are indented. So this means that the instruction to print the word 'Loop' is\
    \ repeated 10 times.\n\nYou'll notice that when you pressed **ENTER** at the end\
    \ of the third line, Thonny automatically indented the next line, assuming it\
    \ would be part of the loop. To remove this, just press the **BACKSPACE** key\
    \ once and then type a fourth and final line:\n\n```\nprint (\"Loop finished!\"\
    )\n```\n\nYour four-line program is now complete. The first line sits outside\
    \ the loop, and will only run once; the second line sets up the loop; the third\
    \ sits inside the loop and will run once for each time the loop loops; and the\
    \ fourth line sits outside the loop once again."
  merge: -1
