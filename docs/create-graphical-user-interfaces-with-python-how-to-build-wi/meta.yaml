    \ **grid** | List | [x,y] co-ordinates of this widget if in a 'grid' |\n| **height**\
    \ | int, string | The height of the widget |\n| **master** | App, Window, Box\
    \ | The container to which this widget belongs |\n| **value** | int, string, bool\
