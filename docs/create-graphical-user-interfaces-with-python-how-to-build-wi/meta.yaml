    ![](img/338ed40e6284f10661b5463402ece5a5_139_0.png)


    IDLE usually comes pre-installed with Python


    # IDEs


    # IDLE


    IDLE is a basic IDE which is usually automatically installed alongside Python.
    Once IDLE starts, the first thing you’ll see is a window titled ‘Python 3.8.5
    Shell’ (the number may be different depending on which exact version you have).
    This window is called the *shell* and you can use it to type a line of Python
    code and see the code run straight away.


    For example, try typing the following:

    **6 + 2**


    Use the File menu > New file to open a Python file. A file allows you to type
    multiple lines of code and then run them all, rather than each line running immediately
    when you press **ENTER**. You can run the program by going to the Run menu and
    choosing Run Module – or by pressing **F5** on the keyboard. If an error occurs,
    you will see any error messages in the shell window.'
  - '[PAGE 140]


    # CREATE GRAPHICAL USER INTERFACES WITH PYTHON


    ![](img/338ed40e6284f10661b5463402ece5a5_140_0.png)


    > Thonny includes a debugger which may prove useful


    # Thonny


    Thonny comes installed with recent versions of Raspberry Pi OS. For Windows and
    Mac computers, you can download and install it from **thonny.org**. By default,
    Thonny uses a version of Python which comes packaged with it, so even if you have
    already installed Python, Thonny will ignore that version and use its own.


    Use the File menu > New to open a Python file. You will type your code in the
    top white box which has a number 1 to the left side. You can run the program by
    selecting the ‘Run current script’ button, or by pressing **F5** on the keyboard.
    If an error occurs, you will see any error messages in the shell area at the bottom
    of the screen.


    Thonny includes a debugger which allows you to step through the code one line
    at a time and see how the variables change.


    Because Thonny uses its own Python installation, you will need to install guizero
    from inside Thonny in order for Thonny to be able to access it. Make sure you
    are connected to the internet, then click on the Tools menu > Manage packages.
    In the window that appears, type guizero in the box and click ‘Find package from
    PyPI’. Thonny will locate the package for you; click Install to install guizero
    within Thonny’s own Python environment.'
- md: "## Appendix B\nGet started with Python\n\nIf you’re a complete beginner, here’s\
    \ how to start coding in Python\n\nUnlike a visual, block-based coding environment\
    \ like Scratch, Python is text-based: you write instructions, using a simplified\
    \ language and specific format, which the computer then carries out. Python is\
    \ a great next step for those who have already used Scratch, offering increased\
    \ flexibility and a more ‘traditional’ programming environment. In the following\
    \ examples, we’re using the Thonny IDE (integrated development environment), but\
    \ you can use an alternative IDE if you prefer (see Appendix A).\n\n## First program\n\
    \nThe top white box in the Thonny window is where you write your program script.\
    \ Click in this box and type the following code:\n\n```\nprint (\"Hello, World!\"\
    )\n```\n\nNow click the Run icon in the Thonny toolbar and you will be asked to\
    \ save your program first; type a descriptive name, like ‘Hello World’, and click\
    \ the Save button. Once your program has saved, you’ll see two messages appear\
    \ in the Python shell area:\n\n```\n>>> %Run 'Hello World.py'\nHello, World!\n\
    ```\n\nCongratulations, you have successfully written and run a Python script!\
    \ You will use the same method for all of the programs in this book – write the\
    \ code in the script area and then run it.\n\n## Loops and code indentation\n\n\
    Just as Scratch uses stacks of jigsaw-like blocks to control which bits of the\
    \ program are connected to which other bits, Python has its own way of controlling\
    \ the sequence in which its programs run: indentation.\n\nCreate a new program\
    \ by clicking on the New icon in the Thonny toolbar. You won't lose your existing\
    \ program; instead, Thonny will create a new tab above the script area. Type in\
    \ the following code:\n\n```\nprint (\"Loop starting!\")\nfor i in range(10):\n\
    \    print (\"Loop\")\n```\n\nClick the Run icon in the Thonny toolbar, save your\
    \ program with the name 'Indentation', and watch the shell area for its output.\
    \ See if you can work out what is happening.\n\nThe first line prints a message\
    \ to the shell, just like your Hello World program. The second tells Python to\
    \ start a loop which runs 10 times – the number of times the loop runs is controlled\
    \ by the **range(10)** instruction. The third line is indented, which means it\
    \ is pushed inwards compared to the other lines. This indentation is how Python\
    \ tells the difference between instructions outside the loop and instructions\
    \ inside the loop. In Scratch, the instructions to be included in the loop are\
    \ placed within the C-shaped block, and in Python they are indented. So this means\
    \ that the instruction to print the word 'Loop' is repeated 10 times.\n\nYou'll\
    \ notice that when you pressed **ENTER** at the end of the third line, Thonny\
    \ automatically indented the next line, assuming it would be part of the loop.\
    \ To remove this, just press the **BACKSPACE** key once and then type a fourth\
    \ and final line:\n\n```\nprint (\"Loop finished!\")\n```\n\nYour four-line program\
    \ is now complete. The first line sits outside the loop, and will only run once;\
    \ the second line sets up the loop; the third sits inside the loop and will run\
    \ once for each time the loop loops; and the fourth line sits outside the loop\
    \ once again.\n\nRun the program again. If you haven't made the Thonny window\
    \ larger, you may need to use the scroll bar to the right of the shell area to\
    \ see its full output:\n\n```\nLoop starting!\nLoop\nLoop\nLoop\nLoop\nLoop\n\
    Loop\nLoop\nLoop\nLoop\nLoop finished!\n```\n\n![](img/338ed40e6284f10661b5463402ece5a5_143_0.png)\n\
    \n▶ Run the program and see the result in the shell area below\n\nIndentation\
    \ is a powerful part of Python, and one of the most common reasons for a program\
    \ to not work as you expected. When looking for problems in a program, always\
    \ double-check the indentation.\n\n## Conditionals and Variables\n\nYou can create\
    \ variables in your program to store values; for example, you might want to store\
    \ some data the user typed in, or the result of a calculation.\n\nStart a new\
    \ program by clicking the New icon on the Thonny menu, then type the following\
    \ into the script area:\n\n```\nmy_name = input(\"What is your name? \")\n```\n\
    \nClick the Run icon, save your program with the name 'Input test', and watch\
    \ what happens in the shell area: you'll be asked for your name. Type your name\
    \ and press **ENTER**. The variables area to the right of the Thonny window will\
    \ automatically display the name of the variable\n\n![](img/338ed40e6284f10661b5463402ece5a5_144_0.png)\n\
    \nVariable names and values are shown in the area on the right\n\n(my_name) and\
    \ its value (e.g. 'Laura'). If you can't see the variables area, check on the\
    \ View menu that there is a tick next to Variables. This information remains displayed\
    \ even when the program isn't running, making it easy to see what your program\
    \ has been doing.\n\nThe program has saved what you typed as your name as the\
    \ value of the variable called **my_name**. Using the `input` command is useful\
    \ for basic Python programs, but when you attempt the GUI programs in this book,\
    \ you will learn about other ways to capture input from the user and store it\
    \ in variables to be used in your program.\n\nTo make your program do something\
    \ useful with the name, add a conditional statement by typing the following:\n\
    \n```\nif my_name == \"Clark Kent\":\n    print (\"You are Superman!\")\nelse:\n\
    \    print (\"You are not Superman!\")\n```\n\n![](img/338ed40e6284f10661b5463402ece5a5_145_0.png)\n\
    \nUnless you enter your name is entered as Clark Kent, you're not Superman\n\n\
    Remember that when Thonny sees that your code needs to be indented, it will do\
    \ so automatically – but it doesn’t know when your code needs to stop being indented,\
    \ so you’ll have to delete the spaces yourself.\n\nClick the Run icon and type\
    \ your name into the shell area, as before. Unless your name happens to be Clark\
    \ Kent, you’ll see an additional message ‘You are not Superman!’ in the shell\
    \ area. Click Run again, and this time type in the name ‘Clark Kent’ – making\
    \ sure to write it exactly as in the program, with a capital C and a capital K.\
    \ This time, the program recognises that you are, in fact, Superman.\n\nThe ==\
    \ symbol tells Python to compare two values. In this case it will look to see\
    \ if the value of the variable my_name matches the text \"Clark Kent\".\n\n> ###\
    \ USING = AND ==\n\nWe have now seen two different operators – the single equals\
    \ sign (=) and the double equals sign (==). They mean different things and it\
    \ is important to know the difference. The single equals (=) means “it IS equal\
    \ to this value,” while a double equals (==) means “IS IT equal to this value?”\
    \ The first is used to assign a value to a variable, and the second is used to\
    \ compare two values.\n\nWhen you are creating the programs in this book, you\
    \ will collect input from the user, store data in variables, display information\
    \ on the screen, and use loops. The examples we have worked through in this section\
    \ are very basic and only allow the user to interact with the program via text.\
    \ We hope that now you know the basics of how to write a Python program you will\
    \ enjoy creating GUIs as a more graphical way of interacting with your program.\n\
    \n## Appendix C\n\n## Widgets in guizero\n\nAn overview of the widgets used in\
    \ guizero\n\nWidgets in guizero are how you create your graphical user interface.\
    \ They are the things which appear on the GUI, everything from the app itself\
    \ to text boxes, buttons and pictures.\n\nNote: This is an overview of the widgets\
    \ in guizero. Be sure to view the specific online documentation for each widget\
    \ for more information: lawsie.github.io/guizero.\n\n## Widgets\n\n### App\n\n\
    The App object is the basis of all GUIs created using guizero. It is the main\
    \ window which contains all of the other widgets.\n\n![](img/338ed40e6284f10661b5463402ece5a5_147_0.png)\n\
    \n```\napp = App()\napp.display()\n```\n\n### Box\n\nThe Box object is an invisible\
    \ container which can contain other widgets.\n\n![](img/338ed40e6284f10661b5463402ece5a5_147_1.png)\n\
    \n```\nbox = Box(app)\nbox = Box(app, border=True)\n```\n\n### ButtonGroup\n\n\
    The ButtonGroup object displays a group of radio buttons, allowing the user to\
    \ choose a single option.\n\n```\nchoice = ButtonGroup(app,\n    options=[\"cheese\"\
    , \"ham\", \"salad\"])\n```\n\n![](img/338ed40e6284f10661b5463402ece5a5_148_0.png)\n\
    \n### CheckBox\n\nThe CheckBox object displays a check box to allow an option\
    \ to be ticked or un-ticked.\n\n```\ncheckbox = CheckBox(app, text=\"salad ?\"\
    )\n```\n\n![](img/338ed40e6284f10661b5463402ece5a5_148_1.png)\n\n### Combo\n\n\
    The Combo object displays a drop-down box allowing a single item to be selected\
    \ from a list of options.\n\n```\ncombo = Combo(app, options=[\"cheese\",\n  \
    \  \"ham\", \"salad\"])\n```\n\n![](img/338ed40e6284f10661b5463402ece5a5_148_2.png)\n\
    \n### Drawing\n\nThe Drawing object allows shapes, images, and text to be created.\n\
    \n```\ndrawing = Drawing(app)\n```\n\n![](img/338ed40e6284f10661b5463402ece5a5_148_3.png)\n\
    \n### ListBox\n\nThe ListBox object displays a list of items from which either\
    \ single or multiple items can be selected.\n\n```\nlistbox = ListBox(app, items=[\"\
    cheese\",\n    \"ham\", \"salad\"])\n```\n\n![](img/338ed40e6284f10661b5463402ece5a5_148_4.png)"
  mdcn: "## 附录 B\nPython 入门\n\n如果你是完全的初学者，以下是开始用 Python 编程的方法。\n\n与 Scratch 等可视化的、基于积木的编程环境不同，Python\
    \ 是基于文本的：你使用一种简化的语言和特定格式编写指令，然后由计算机执行。对于已经使用过 Scratch 的人来说，Python 是一个很好的下一步选择，它提供了更大的灵活性和更“传统”的编程环境。在接下来的示例中，我们使用\
    \ Thonny IDE（集成开发环境），但如果你愿意，也可以使用其他 IDE（参见附录 A）。\n\n## 第一个程序\n\nThonny 窗口顶部的白色方框是你编写程序脚本的地方。点击这个方框并输入以下代码：\n\
    \n```\nprint (\"Hello, World!\")\n```\n\n现在点击 Thonny 工具栏中的运行图标，系统会要求你先保存程序；输入一个描述性的名称，比如“Hello\
    \ World”，然后点击保存按钮。程序保存后，你会在 Python shell 区域看到两条消息：\n\n```\n>>> %Run 'Hello World.py'\n\
    Hello, World!\n```\n\n恭喜，你已经成功编写并运行了一个 Python 脚本！本书中的所有程序都将使用相同的方法——在脚本区域编写代码，然后运行它。\n\
    \n## 循环与代码缩进\n\n正如 Scratch 使用类似拼图的积木堆叠来控制程序的哪些部分相互连接，Python 也有自己的方式来控制程序的运行顺序：缩进。\n\
    \n点击 Thonny 工具栏中的新建图标来创建一个新程序。你不会丢失现有的程序；相反，Thonny 会在脚本区域上方创建一个新标签页。输入以下代码：\n\n\
    ```\nprint (\"Loop starting!\")\nfor i in range(10):\n    print (\"Loop\")\n```\n\
    \n点击 Thonny 工具栏中的运行图标，将程序保存为“Indentation”，然后观察 shell 区域的输出。看看你能否弄清楚发生了什么。\n\n\
    第一行向 shell 打印一条消息，就像你的 Hello World 程序一样。第二行告诉 Python 开始一个循环，运行 10 次——循环运行的次数由\
    \ **range(10)** 指令控制。第三行是缩进的，这意味着它相对于其他行向内推移。这种缩进是 Python 区分循环外指令和循环内指令的方式。在 Scratch\
    \ 中，要包含在循环中的指令被放置在 C 形积木内，而在 Python 中，它们是缩进的。因此，这意味着打印“Loop”这个词的指令将重复 10 次。\n\n\
    你会注意到，当你在第三行末尾按下 **ENTER** 键时，Thonny 会自动缩进下一行，假设它是循环的一部分。要删除这个缩进，只需按一次 **BACKSPACE**\
    \ 键，然后输入第四行也是最后一行：\n\n```\nprint (\"Loop finished!\")\n```\n\n你的四行程序现在完成了。第一行在循环外，只运行一次；第二行设置循环；第三行在循环内，每次循环都会运行一次；第四行再次在循环外。\n\
    \n再次运行程序。如果你没有放大 Thonny 窗口，可能需要使用 shell 区域右侧的滚动条来查看完整输出：\n\n```\nLoop starting!\n\
    Loop\nLoop\nLoop\nLoop\nLoop\nLoop\nLoop\nLoop\nLoop finished!\n```\n\n![](img/338ed40e6284f10661b5463402ece5a5_143_0.png)\n\
    \n▶ 运行程序并在下方的 shell 区域查看结果\n\n缩进是 Python 的一个强大功能，也是程序无法按预期工作的最常见原因之一。在查找程序中的问题时，务必仔细检查缩进。\n\
    \n## 条件语句与变量\n\n你可以在程序中创建变量来存储值；例如，你可能想存储用户输入的一些数据或计算结果。\n\n点击 Thonny 菜单上的新建图标来开始一个新程序，然后在脚本区域输入以下内容：\n\
    \n```\nmy_name = input(\"What is your name? \")\n```\n\n点击运行图标，将程序保存为“Input test”，然后观察\
    \ shell 区域会发生什么：系统会要求你输入名字。输入你的名字并按 **ENTER** 键。Thonny 窗口右侧的变量区域将自动显示变量名\n\n![](img/338ed40e6284f10661b5463402ece5a5_144_0.png)\n\
    \n变量名和值显示在右侧区域\n\n（my_name）及其值（例如“Laura”）。如果你看不到变量区域，请检查“视图”菜单中“变量”旁边是否有勾选标记。即使程序未运行，此信息也会保持显示，便于查看程序的执行情况。\n\
    \n程序已将你输入的名字保存为名为 **my_name** 的变量的值。使用 `input` 命令对于基本的 Python 程序很有用，但当你尝试本书中的\
    \ GUI 程序时，你将学习其他从用户获取输入并将其存储在变量中以供程序使用的方法。\n\n要让你的程序对名字做一些有用的事情，请添加一个条件语句，输入以下内容：\n\
    \n```\nif my_name == \"Clark Kent\":\n    print (\"You are Superman!\")\nelse:\n\
    \    print (\"You are not Superman!\")\n```\n\n![](img/338ed40e6284f10661b5463402ece5a5_145_0.png)\n\
    \n除非你输入的名字是 Clark Kent，否则你不是超人\n\n请记住，当 Thonny 看到你的代码需要缩进时，它会自动进行——但它不知道你的代码何时需要停止缩进，因此你必须自己删除空格。\n\
    \n点击运行图标，像之前一样在 shell 区域输入你的名字。除非你的名字恰好是 Clark Kent，否则你会在 shell 区域看到一条额外的消息“You\
    \ are not Superman!”。再次点击运行，这次输入名字“Clark Kent”——确保完全按照程序中的写法，C 和 K 大写。这次，程序会认出你确实是超人。\n\
    \n== 符号告诉 Python 比较两个值。在这种情况下，它会检查变量 my_name 的值是否与文本“Clark Kent”匹配。\n\n> ### 使用\
    \ = 和 ==\n\n我们现在看到了两种不同的运算符——单等号（=）和双等号（==）。它们意味着不同的事情，了解区别很重要。单等号（=）表示“它等于这个值”，而双等号（==）表示“它是否等于这个值？”前者用于将值赋给变量，后者用于比较两个值。\n\
    \n当你在创建本书中的程序时，你将从用户那里收集输入，将数据存储在变量中，在屏幕上显示信息，并使用循环。我们在本节中讲解的示例非常基础，只允许用户通过文本与程序交互。我们希望现在你已经了解了编写\
    \ Python 程序的基础知识，你会喜欢创建 GUI，作为一种更图形化的方式与程序交互。\n\n## 附录 C\n\n## guizero 中的部件\n\n\
    guizero 中使用的部件概述\n\nguizero 中的部件是你创建图形用户界面的方式。它们是出现在 GUI 上的东西，从应用程序本身到文本框、按钮和图片。\n\
    \n注意：这是 guizero 中部件的概述。请务必查看每个部件的特定在线文档以获取更多信息：lawsie.github.io/guizero。\n\n##\
    \ 部件\n\n### App\n\nApp 对象是使用 guizero 创建的所有 GUI 的基础。它是包含所有其他部件的主窗口。\n\n![](img/338ed4e6284f10661b5463402ece5a5_147_0.png)\n\
    \n```\napp = App()\napp.display()\n```\n\n### Box\n\nBox 对象是一个不可见的容器，可以包含其他部件。\n\
    \n![](img/338ed4e6284f10661b5463402ece5a5_147_1.png)\n\n```\nbox = Box(app)\n\
    box = Box(app, border=True)\n```\n\n### ButtonGroup\n\nButtonGroup 对象显示一组单选按钮，允许用户选择一个选项。\n\
    \n```\nchoice = ButtonGroup(app,\n    options=[\"cheese\", \"ham\", \"salad\"\
    ])\n```\n\n![](img/338ed4e6284f10661b5463402ece5a5_148_0.png)\n\n### CheckBox\n\
    \nCheckBox 对象显示一个复选框，允许勾选或取消勾选一个选项。\n\n```\ncheckbox = CheckBox(app, text=\"salad\
    \ ?\")\n```\n\n![](img/338ed4e6284f10661b5463402ece5a5_148_1.png)\n\n### Combo\n\
    \nCombo 对象显示一个下拉框，允许从选项列表中选择一个项目。\n\n```\ncombo = Combo(app, options=[\"cheese\"\
    ,\n    \"ham\", \"salad\"])\n```\n\n![](img/338ed4e6284f10661b5463402ece5a5_148_2.png)\n\
    \n### Drawing\n\nDrawing 对象允许创建形状、图像和文本。\n\n```\ndrawing = Drawing(app)\n```\n\
    \n![](img/338ed4e6284f10661b5463402ece5a5_148_3.png)\n\n### ListBox\n\nListBox\
    \ 对象显示一个项目列表，可以选择单个项目或多个项目。\n\n```\nlistbox = ListBox(app, items=[\"cheese\",\n\
    \    \"ham\", \"salad\"])\n```\n\n![](img/338ed4e6284f10661b5463402ece5a5_148_4.png)"
