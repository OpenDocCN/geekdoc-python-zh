    # Appendix B

    Get started with Python


    If you’re a complete beginner, here’s how to start coding in Python


    Unlike a visual, block-based coding environment like Scratch, Python is text-based:
    you write instructions, using a simplified language and specific format, which
    the computer then carries out. Python is a great next step for those who have
    already used Scratch, offering increased flexibility and a more ‘traditional’
    programming environment. In the following examples, we’re using the Thonny IDE
    (integrated development environment), but you can use an alternative IDE if you
    prefer (see Appendix A).


    # First program


    The top white box in the Thonny window is where you write your program script.
    Click in this box and type the following code:


    ```

    print ("Hello, World!")

    ```


    Now click the Run icon in the Thonny toolbar and you will be asked to save your
    program first; type a descriptive name, like ‘Hello World’, and click the Save
    button. Once your program has saved, you’ll see two messages appear in the Python
    shell area:


    ```

    >>> %Run ''Hello World.py''

    Hello, World!

    ```


    Congratulations, you have successfully written and run a Python script! You will
    use the same method for all of the programs in this book – write the code in the
    script area and then run it.'
  - "[PAGE 142]\n\n# Loops and code indentation\n\nJust as Scratch uses stacks of\
    \ jigsaw-like blocks to control which bits of the program are connected to which\
    \ other bits, Python has its own way of controlling the sequence in which its\
    \ programs run: indentation.\n\nCreate a new program by clicking on the New icon\
    \ in the Thonny toolbar. You won't lose your existing program; instead, Thonny\
    \ will create a new tab above the script area. Type in the following code:\n\n\
    ```\nprint (\"Loop starting!\")\nfor i in range(10):\n    print (\"Loop\")\n```\n\
    \nClick the Run icon in the Thonny toolbar, save your program with the name 'Indentation',\
    \ and watch the shell area for its output. See if you can work out what is happening.\n\
    \nThe first line prints a message to the shell, just like your Hello World program.\
    \ The second tells Python to start a loop which runs 10 times – the number of\
    \ times the loop runs is controlled by the **range(10)** instruction. The third\
    \ line is indented, which means it is pushed inwards compared to the other lines.\
    \ This indentation is how Python tells the difference between instructions outside\
    \ the loop and instructions inside the loop. In Scratch, the instructions to be\
    \ included in the loop are placed within the C-shaped block, and in Python they\
    \ are indented. So this means that the instruction to print the word 'Loop' is\
    \ repeated 10 times.\n\nYou'll notice that when you pressed **ENTER** at the end\
    \ of the third line, Thonny automatically indented the next line, assuming it\
    \ would be part of the loop. To remove this, just press the **BACKSPACE** key\
    \ once and then type a fourth and final line:\n\n```\nprint (\"Loop finished!\"\
    )\n```\n\nYour four-line program is now complete. The first line sits outside\
    \ the loop, and will only run once; the second line sets up the loop; the third\
    \ sits inside the loop and will run once for each time the loop loops; and the\
    \ fourth line sits outside the loop once again."
