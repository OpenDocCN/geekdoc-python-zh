    \ define a *constant* in your variables section called **GRID_SIZE** and set it\
    \ equal to 5:\n\n**GRID_SIZE = 5**\n\nThen, instead of defining your Waffle's\
    \ dimensions with a magic number 5, you can put:\n\n**board = Waffle(app, width=GRID_SIZE,\
    \ height=GRID_SIZE)**\n\nIf you decide to change the size of the grid, you can\
