    \    if len(frames) > 0:\n        viewer.show()\n        frames[0].save(\n   \
    \         \"animation.gif\",\n            save_all=True,\n            append_images=frames[1:])\n\
    \        viewer.image = \"animation.gif\"\n    else:\n        viewer.hide()\n\
    ```\n\n这里有很多操作，但通过分解代码，你可以看到这是如何工作的。\n如果列表中的帧数大于0，则显示查看器，否则隐藏它：\n\n```python\n\
    if len(frames) > 0:\n    viewer.show()\n    ...\nelse:\n    viewer.hide()\n```\n\
    \n然后将帧保存到名为 `animation.gif` 的文件中。保存第一帧（`frames[0]`），追加剩余的帧（`frames[1:]`），并将所有帧保存到动画GIF中：\n\
    \n```python\nframes[0].save(\n    \"animation.gif\",\n    save_all=True,\n   \
    \ append_images=frames[1:])\n```\n\n然后在查看器中显示 **animation.gif**：\n\n```python\n\
    viewer.image = \"animation.gif\"\n```\n\n在 `capture_image` 函数的*末尾*调用 `save_animation`\
    \ 函数，以创建并显示动画：\n\n```python\ndef capture_image():\n    camera.capture(\"frame.jpg\"\
