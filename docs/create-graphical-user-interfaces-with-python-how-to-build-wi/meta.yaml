    ```\n\n## Chapter 10\n### Paint\nCreate a simple drawing application\n\n![](img/338ed40e6284f10661b5463402ece5a5_109_0.png)\n\
    \nYou are going to build a simple application which will allow you to paint using\
    \ lines and shapes (Figure 1). You will create your paint application in four\
    \ stages:\n\n- drawing dots which follow the mouse\n- draw lines between the dots\n\
    - adding colours and line width modifier\n- drawing shapes\n\nNote that you can\
    \ style your application anyway you want – it doesn't have to look like this one.\n\
    \n![](img/338ed40e6284f10661b5463402ece5a5_109_1.png)\n\n### Drawing dots\n\n\
    The first step is to create a simple application which will use the Drawing widget\
    \ and the **when_mouse_dragged** event to draw dots (or ovals on the screen).\n\
    \nIn the imports section of your otherwise blank program, add the widgets:\n\n\
    ```python\nfrom guizero import App, Drawing\n```\n\nCreate a new function:\n\n\
    ```python\ndef draw(event):\n    painting.oval(\n        event.x - 1, event.y\
    \ - 1,\n        event.x + 1, event.y + 1,\n        color=\"black\")\n```\n\nAdd\
    \ this code to the app section:\n\n```python\napp = App(\"Paint\")\n\npainting\
    \ = Drawing(app, width=\"fill\", height=\"fill\")\n\npainting.when_mouse_dragged\
    \ = draw\n\napp.display()\n```\n\nYour code should resemble **paint1.py** (page\
    \ 116). The Drawing widget fills all the available space on the window. When the\
    \ mouse is dragged across the drawing, the function **draw** is called which draws\
    \ ovals on the **painting**.\n\nThe **draw** function is called each time an event\
    \ is raised. The event which contains the x and y position of the mouse is passed\
    \ as a variable to the function.\n\nThere is a problem, though. Unless you move\
    \ your mouse very slowly, a series of dots is drawn by your program, not a continuous\
    \ line (**Figure 2**). It's not a very good paintbrush! There are gaps between\
    \ the dots because an event is not raised for every pixel the mouse crosses.\n\
    \n![](img/338ed40e6284f10661b5463402ece5a5_110_0.png)\n\n▲ Figure 2 Not a very\
    \ good paintbrush\n\n### Lines between the dots\n\nTo solve this problem, you\
    \ are going to change the program to draw lines between the dots. That way the\
    \ line made will be continuous and be more like a pen or paintbrush.\n\nYou will\
    \ need to use a `when_left_button_pressed` event to store the position of where\
    \ the line starts. Then draw a straight line between where the line starts and\
    \ next position the mouse was dragged too.\n\nCreate a new function which will\
    \ be called when the mouse is pressed.\n\n```python\ndef start(event):\n    painting.last_event\
    \ = event\n```\n\nAdd this to the app section:\n\n```python\npainting.when_left_button_pressed\
    \ = start\n```\n\nThe position of where the line starts is stored in the `last_event`\
    \ variable. Modify the `draw` function to draw a line between where the line starts\
    \ and where the mouse has been dragged to.\n\n```python\ndef draw(event):\n  \
    \  painting.line(\n        painting.last_event.x, painting.last_event.y,\n   \
    \     event.x, event.y,\n        color=\"black\",\n        width=3\n    )\n\n\
    \    painting.last_event = event\n```\n\nBy updating the `last_event` variable\
    \ to be the current position of the mouse, the next time the mouse is dragged,\
    \ it will draw another line between this point and the next. Your program should\
    \ look like `paint2.py`. Test it and make sure your paintbrush now works properly.\n\
    \n### Change the line width and colour\n\nYou only have one colour and thickness\
    \ for your paintbrush, which limits the drawing you can create. Next, you will\
    \ amend your GUI so you can pick different colours and line widths.\n\nAdd two\
    \ widgets to the GUI capture a colour and width for the line.\n\n```python\nfrom\
    \ guizero import App, Drawing, Combo, Slider\n```\n\nAdd these lines to the app\
    \ section:\n\n```python\ncolor = Combo(app, options=[\"black\", \"white\", \"\
    red\", \"green\", \"blue\"])\nwidth = Slider(app, start=1, end=10)\n```\n\nYou\
    \ may also want to change the background colour of your painting to be different.\
    \ Also, we have used a Combo and a Slider, but you could choose different widgets.\n\
    \nModify the **draw** function to use the colour and width values when painting\
    \ the line.\n\n```python\npainting.line(\n    painting.last_event.x, painting.last_event.y,\n\
    \    event.x, event.y,\n    color=color.value,\n    width=width.value\n)\n```\n\
    \nTest your code, which should be like **paint3.py**, and you can now select the\
    \ colour and line width.\n\n### Drawing shapes\n\nYou are going to extend your\
    \ paint application so you can draw filled rectangles. When the mouse is pressed,\
    \ the rectangle will appear and grow as the mouse is dragged across the screen.\
    \ When the mouse button is released, the rectangle will drawn onto the screen.\n\
    \nTo do this, you will modify your program to continuously draw and delete rectangles\
    \ until the mouse button is released. Let's add a widget to your GUI so you can\
    \ select whether to draw a line or a rectangle. Add this to the app section:\n\
    \n```python\nshape = Combo(app, options=[\"line\", \"rectangle\"])\n```\n\nModify\
    \ the **draw** function to only draw lines if the **\"line\"** option is selected.\n\
    \n```python\nif shape.value == \"line\":\n    painting.line(\n        painting.last_event.x,\
    \ painting.last_event.y,\n        event.x, event.y,\n        color=color.value,\n\
    \        width=width.value\n    )\n```\n\nTest your program to make sure that\
    \ the line still works and nothing happens when **\"rectangle\"** is selected.\n\
    \nCreate two new variables to keep track of the first event and the last shape\
    \ drawn when the mouse button is pressed.\n\n```python\ndef start(event):\n  \
    \  painting.last_event = event\n    painting.first_event = event\n    painting.last_shape\
    \ = None\n```\n\nThese variables will be used when drawing and deleting the rectangle\
    \ before the mouse button is released.\n\nAdd this code to your draw function\
    \ to draw a rectangle when the mouse is dragged.\n\n```python\nif shape.value\
    \ == \"rectangle\":\n    if painting.last_shape is not None:\n        painting.delete(painting.last_shape)\n\
    \    rectangle = painting.rectangle(\n        painting.first_event.x, painting.first_event.y,\n\
    \        event.x, event.y,\n        color=color.value\n    )\n    painting.last_shape\
    \ = rectangle\n```\n\nThe program will continually draw a rectangle, then delete\
    \ it, then draw it again until you release the button.\n\nYour complete program\
    \ should look similar to **paint4.py**. Have fun trying it out – what pictures\
    \ can you create?\n\n> ## ADD OVALS\n> When you first created the Paint application,\
    \ you used ovals to draw dots across the screen. Can you modify your program to\
    \ draw ovals again, using a similar process to how rectangles are drawn? Hint:\
    \ see the **10-paint.py** listing, which also styles up the tools and aligns them\
    \ neatly in a box.\n\nThe Drawing widget also supports drawing triangles and polygons.\
    \ Take a look at the documentation (**lawsie.github.io/guizero/drawing**) and\
    \ see how you might use this function to create other shapes."
