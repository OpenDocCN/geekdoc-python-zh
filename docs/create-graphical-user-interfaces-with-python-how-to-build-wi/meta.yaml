- img_proc: true
  md: "Add these line to the app section:\n\n```\ncolor = Combo(app, options=[\"black\"\
    , \"white\", \"red\", \"green\", \"blue\"])\nwidth = Slider(app, start=1, end=10)\n\
    ```\n\nYou may also want to change the background colour of your painting to be\
    \ different. Also, we have used a Combo and a Slider, but you could choose different\
    \ widgets.\nModify the **draw** function to use the colour and width values when\
    \ painting the line.\n\n```\npainting.line(\n    painting.last_event.x, painting.last_event.y,\n\
    \    event.x, event.y,\n    color=color.value,\n    width=width.value\n)\n```\n\
    \nTest your code, which should be like **paint3.py**, and you can now select the\
    \ colour and line width.\n\n# Drawing shapes\n\nYou are going to extend your paint\
    \ application so you can draw filled rectangles. When the mouse is pressed, the\
    \ rectangle will appear and grow as the mouse is dragged across the screen. When\
    \ the mouse button is released, the rectangle will drawn onto the screen.\nTo\
    \ do this, you will modify your program to continuously draw and delete rectangles\
    \ until the mouse button is released. Let's add a widget to your GUI so you can\
    \ select whether to draw a line or a rectangle. Add this to the app section:\n\
    \n```\nshape = Combo(app, options=[\"line\", \"rectangle\"])\n```\n\nModify the\
    \ **draw** function to only draw lines if the **\"line\"** option is selected.\n\
    \n```\nif shape.value == \"line\":\n    painting.line(\n        painting.last_event.x,\
    \ painting.last_event.y,\n        event.x, event.y,\n        color=color.value,\n\
    \        width=width.value\n    )\n```\n\nTest your program to make sure that\
    \ the line still works and nothing happens when **\"rectangle\"** is selected."
