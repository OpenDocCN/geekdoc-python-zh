  md: "# Draw game\n\nAt the moment, the game will allow you to continue playing even\
    \ after it has been won, until all of the squares are selected. It will also not\
    \ tell you if the game was a draw. You could stop at this point, but if you really\
    \ want to put the icing on the cake, adding a few more little touches could make\
    \ your game more polished.\n\nFirst, let's add some code to detect whether the\
    \ game is a draw. The game is a draw if all of the squares contain either an X\
    \ or an O, and no one has won. In the functions section, create a new function\
    \ called moves_taken:\n\n```\ndef moves_taken():\n```\n\nYou're going to use this\
    \ function to count the number of moves which have been made, so let's start a\
    \ variable to keep count, initially beginning at 0.\n\n```\ndef moves_taken():\n\
    \    moves = 0\n```\n\nNow, remember when we created the board_squares, we used\
    \ a nested loop to create all of the squares on the grid? We're going to need\
    \ another nested loop here to check each and every square and determine whether\
    \ it has been filled in with an X or O, or whether it is blank.\n\n> GLOBAL VARIABLES\n\
    \nIt is arguably a bad idea to use global variables because if you have many functions\
    \ in a large program, it can become extremely confusing as to which code modifies\
    \ the value of a variable and when. In a small program like this, it is not too\
    \ difficult to keep track.\n\nRemember that it is possible to read and use the\
    \ value of a global variable from inside a function without declaring it global,\
    \ but in order to modify its value you will need to explicitly declare this. The\
    \ functions in this program (and most GUI programs in this book) are actually\
    \ modifying the values of your widgets as global variables. For example, when\
    \ someone wins the game, you set the value of the message to display who won:\n\
    \nmessage.value = winner.text + \" wins!\"\n\nIn this example, message is a global\
    \ variable. So how can we modify its value without declaring it as global? The\
    \ answer is because we are using a property of the message widget, the property\
    \ called value. Essentially what this code is saying is \"Hey Python, you know\
