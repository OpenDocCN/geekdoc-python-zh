    让我们运用前几章学到的知识，创建一个绘制表情包的GUI。你将输入文本和图片名称，你的GUI将使用绘图控件将它们组合成你自己的表情包。\n\n首先，创建一个简单的GUI，包含两个用于顶部和底部文本的文本框。你将在这里输入要插入图片上方和下方以创建表情包的文本。添加这行代码来导入所需的控件。\n\
