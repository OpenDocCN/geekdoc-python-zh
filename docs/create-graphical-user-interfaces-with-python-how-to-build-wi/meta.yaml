    # Chapter 8


    # Flood It


    Create a more complex Waffle-based puzzle game


    ![](img/338ed40e6284f10661b5463402ece5a5_77_0.png)


    ‘Flood It’ is a game where the aim is to flood the board with all squares the
    same colour. Beginning with the top-left square, players choose a colour to flood
    into. It offers a slightly more complex Waffle-based game.


    # Aim of the game


    In this example (Figure 1), the top-left square is blue. The player could either
    choose to flood into the single purple square below, or to flood into the yellow
    square to the right.


    Flooding the yellow square would be a better move because all adjoining yellow
    squares would also be flooded, and the player is only allowed a limited amount
    of moves before the game ends.


    ![](img/338ed40e6284f10661b5463402ece5a5_77_1.png)


    Figure 1 Flood the squares with one colour'
