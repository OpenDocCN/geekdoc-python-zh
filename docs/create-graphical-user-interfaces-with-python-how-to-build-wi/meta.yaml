  md: '# Chapter 4


    # Meme Generator


    Create a GUI application which draws memes


    ![](img/338ed40e6284f10661b5463402ece5a5_25_0.png)


    Let''s take the lessons you learnt from the previous chapters to create a GUI
    which draws memes. You will input the text and image name and your GUI will combine
    them into your own meme using the Drawing widget.


    Start by creating a simple GUI with two text boxes for the top and bottom text.
    This is where you will enter the text which will be inserted over your picture
    to create your meme. Add this line to import the widgets needed.


    ```

    from guizero import App, TextBox, Drawing

    ```


    Then add this code for the app:


    ```

    app = App("meme")


    top_text = TextBox(app, "top text")

    bottom_text = TextBox(app, "bottom text")


    app.display()

    ```'
  merge: -1
  pgno: 25
- img_proc: true
  md: "The meme will be created on a Drawing widget which will hold the image and\
    \ text.\n\n# Create a meme\n\nAdd it to the GUI by inserting this code just before\
    \ the `app.display()` line. The Drawing widget's height and width should be set\
    \ to 'fill' the rest of the GUI.\n\n```\nmeme = Drawing(app, width=\"fill\", height=\"\
    fill\")\n```\n\nThe meme will be created when the text in the top and bottom text\
    \ boxes changes. To do that, we will need to create a function which draws the\
    \ meme.\nThe function should clear the drawing, create an image (we're using a\
    \ photo of a woodpecker, but you can use any you want) and insert the text at\
    \ the top and bottom of the image.\nRemember when you used `name.value` to set\
    \ the value of the Text widget with the spy name in Chapter 3? You can also use\
    \ the value property to get the value of a Text widget, so in this case `top_text.value`\
    \ means 'please get the value that is typed in the top_text box'.\n\n```\ndef\
    \ draw_meme():\n    meme.clear()\n    meme.image(0, 0, \"woodpecker.png\")\n \
    \   meme.text(20, 20, top_text.value)\n    meme.text(20, 320, bottom_text.value)\n\
    ```\n\nThe first two numbers in `meme.image(0, 0)` and `meme.text(20, 20)` are\
    \ the x, y co-ordinates of where to draw the image and text. The image is drawn\
    \ at position 0, 0, which is the top-left corner, so the image covers the whole\
    \ of the drawing.\nFinally, call your `draw_meme` function just before you display\
    \ the app. Insert this code just before the `app.display` line:\n\n![](img/338ed40e6284f10661b5463402ece5a5_26_0.png)\n\
    \n```\ndraw_meme()\n```\n\nYour code should now look like `meme1.py`."
  merge: -1
  pgno: 26
- img_proc: true
  md: "If you run your app (**Figure 1**) and try changing the top and bottom text,\
    \ you will notice that it doesn't update in the meme. To get this working, you\
    \ will have to change your program to call the `draw_meme` function when the text\
    \ changes, by adding a command to the two TextBox widgets to the app.\n\n```\n\
    top_text = TextBox(app, \"top text\", command=draw_meme)\nbottom_text = TextBox(app,\
    \ \"bottom text\", command=draw_meme)\n```\n\nYour code should now look like that\
    \ in **meme2.py**. Run it and update your meme by changing the top and bottom\
    \ text.\nYou can then look of your meme by changing the color, size, and font\
    \ parameters of the text. For example:\n\n```\nmeme.text(\n    20, 20, top_text.value,\n\
    \    color=\"orange\",\n    size=40,\n    font=\"courier\")\nmeme.text(\n    20,\
    \ 320, bottom_text.value,\n    color=\"blue\",\n    size=28,\n    font=\"times\
    \ new roman\",\n    )\n```\n\n> **TIP**\nThese lines of code were starting to\
    \ get very long, so we have split them over a number of lines to make it easier\
    \ to read. It doesn't affect what the program does, just how it looks.\n\nYour\
    \ code should now look like **meme3.py**. Try different styles until you find\
    \ something you like (**Figure 2**).\n\n# Customise your meme generator\n\nFor\
    \ a truly interactive meme generator, the user should be able to set the font,\
    \ size, and colour themselves. You can provide additional widgets on the GUI to\
    \ allow them to do this.\nThe number of options available for the colour and font\
    \ are limited, so you could use a drop-down list, also known as a Combo, for this.\
    \ The size could be set using a Slider widget.\n\n![](img/338ed40e6284f10661b5463402ece5a5_27_0.png)"
  merge: -1
  pgno: 27
- img_proc: true
  md: "First, modify your import statement to include the Combo and Slider widgets.\n\
    \n```\nfrom guizero import App, TextBox, Drawing, Combo, Slider\n```\n\nAfter\
    \ you have created your TextBox widgets for the top and bottom text, create a\
    \ new Combo widget so the user can select a colour.\n\n```\nbottom_text = TextBox(app,\
    \ \"bottom text\", command=draw_meme)\ncolor = Combo(app,\n    options=[\"black\"\
    , \"white\", \"red\", \"green\", \"blue\", \"orange\"],\n    command=draw_meme)\n\
    ```\n\nThe **options** parameter sets what colours the user can select from the\
    \ Combo. Each colour is an element in a list. You can add any other colours you\
    \ want to the list.\nThe options are displayed in the order in which you put them\
    \ in the list. The first option is the default, which is displayed first. If you\
    \ want to have a different option as the default, you can do it using the **selected**\
    \ parameter, e.g. \"blue\".\n\n```\ncolor = Combo(app,\n    options=[\"black\"\
    , \"white\", \"red\", \"green\", \"blue\", \"orange\"],\n    command=draw_meme,\n\
    \    selected=\"blue\")\n```\n\nNow your user can select a colour. Next, you need\
    \ to change the **draw_meme** function to use Combo's value when creating the\
    \ text in your the meme. For example:\n\n```\nmeme.text(\n    20, 20, top_text.value,\n\
    \    color=color.value,\n    size=40,\n    font=\"courier\")\n```\n\nDo the same\
    \ for the bottom-text block of code. Your program should now resemble **meme4.py**.\n\
    Following the steps above, add a second Combo to your application so the user\
    \ can select a font from this list of options: [\"times new roman\", \"verdana\"\
    , \"courier\", \"impact\"]. Remember to change the **draw_meme** function to use\
    \ the **font** value when adding the text.\nCreate a new Slider widget to set\
    \ the size of the text your user wants.\n\n```\nsize = Slider(app, start=20, end=40,\
    \ command=draw_meme)\n```"
  merge: -1
  pgno: 28
- img_proc: true
  md: "The range of the slider is set using the start and end parameters. So, in this\
    \ example, the smallest text available will be 20 and the largest 40.\nModify\
    \ the `draw_meme` function to use the value from your size slider when creating\
    \ the meme's text.\n\n```\nmeme.text(\n    20, 20, top_text.value,\n    color=color.value,\n\
    \    size=size.value,\n    font=font.value)\n```\n\nYour code should now resemble\
