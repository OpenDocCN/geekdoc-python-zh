    \ now look like **worst2.py**. Test your app: the title text should flash, appearing\
    \ and disappearing once every second.\n\n# The wrong widget\n\nUsing an appropriate\
    \ widget can be the difference between a great GUI and one which is completely\
    \ unusable.\nWhich widget would you use to enter a date? A TextBox? Multiple Combos?\
