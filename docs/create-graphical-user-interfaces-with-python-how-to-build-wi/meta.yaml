  md: '# Appendix C


    # Widgets in guizero


    An overview of the widgets used in guizero


    Widgets in guizero are how you create your graphical user interface. They are
    the things which appear on the GUI, everything from the app itself to text boxes,
    buttons and pictures.


    Note: This is an overview of the widgets in guizero. Be sure to view the specific
    online documentation for each widget for more information: lawsie.github.io/guizero.


    # Widgets


    # App


    The App object is the basis of all GUIs created using guizero. It is the main
    window which contains all of the other widgets.


    ![](img/338ed40e6284f10661b5463402ece5a5_147_0.png)


    ```

    app = App()

    app.display()

    ```


    # Box


    The Box object is an invisible container which can contain other widgets.


    ![](img/338ed40e6284f10661b5463402ece5a5_147_1.png)


    ```

    box = Box(app)

    box = Box(app, border=True)

    ```'
