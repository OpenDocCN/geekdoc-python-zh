    \ so check the documentation. These methods are typical across most widgets.\n\
    \n| METHOD | DESCRIPTION |\n|---|---|\n| after(time, command, args=None) | Schedules\
    \ a single call to command after time milliseconds |\n| cancel(command) | Cancels\
