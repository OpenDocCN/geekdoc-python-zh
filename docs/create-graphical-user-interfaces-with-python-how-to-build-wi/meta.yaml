  md: 'Let''s take a closer look at that line of code you just added.


    ```

    wanted_text = Text(app, "WANTED")

    ```


    Here, `wanted_text` is the name of the piece of text. This is so that we can talk
    about it later on in the code – think of it like a person''s name. (You could
    even call your piece of text Dave if you want – the computer won''t care!)

    Inside the brackets we have two things. The second one, "WANTED", is straightforward
    as it is the text we would like to display on the screen. The first is the container
    which controls this piece of text, which is called its ''master''. In this case
    we are saying that this text should be controlled by the app. When you first start
    creating GUIs, most of your widgets will have the app as their master, but there
    are other containers that can store widgets that you will learn about later on.


    # Change text size and colour


    Uh oh, this text is pretty small (Figure 5). Let''s change the `text_size` property
    in exactly the same way as you did when we changed the background colour of the
    app. Remember that you needed to specify three things:


    +   1. The name of the widget

    2. Which property to change

    3. The new value to change it to


    ![](img/338ed40e6284f10661b5463402ece5a5_14_0.png)


    So, in this case you are going to specify the widget (`wanted_text`), the property
    to change (`text_size`) and the new value (50). Add one new line of code immediately
    under the line where you created the text, to change the property.


    ```

    wanted_text = Text(app, "WANTED")

    wanted_text.text_size = 50

    ```


    You now have larger text on your poster (Figure 6). See if you can now change
    the font of this text to something different. Which fonts are available depends
    on which operating system you are using, so here are some suggestions:


    +   - Times New Roman

    - Verdana

    - Courier

    - Impact


    ![](img/338ed40e6284f10661b5463402ece5a5_14_1.png)'
