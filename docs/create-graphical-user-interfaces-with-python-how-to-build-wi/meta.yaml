    Here is a solution which uses a loop and a variable to keep track of which column\
    \ you are colouring in:\n\n```\ndef init_palette():\n    column = 0\n    for colour\
    \ in colours:\n        palette.set_pixel(column, 0, colour)\n        column +=\
    \ 1\n```\n\nHere is a similar solution which uses a range inside the **for** loop\
    \ instead of a counter variable:\n\n```\ndef init_palette():\n    for x in range(len(colours)):\n\
    \        palette.set_pixel(x, 0, colours[x])\n```\n\nHere is a different solution\
    \ which uses the index function **colours.index(colour)**. This code says 'In\
    \ the colours list, find me the position in the list of colour'. So, for example\
    \ if your list was [\"green\", \"blue\", \"red\"] then the index of green would\
    \ be 0, the index of blue would be 1, etc., remembering that we count starting\
    \ from zero.\n\n```\ndef init_palette():\n    for colour in colours:\n       \
    \ palette.set_pixel(colours.index(colour), 0, colour)\n```\n\nYou can use any\
    \ of these solutions, or you may have come up with a different way by yourself.\
    \ None of them is the 'right answer': there are often many different ways of coding\
    \ a solution."
