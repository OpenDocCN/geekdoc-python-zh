    \ = Box(game_box, layout=\"grid\")\n\npictures = []\nbuttons = []\n\nfor x in\
    \ range(0, 3):\n    for y in range(0, 3):\n        picture = Picture(pictures_box,\
    \ grid=[x, y])\n        pictures.append(picture)\n\n        button = PushButton(buttons_box,\
    \ grid=[x, y])\n        buttons.append(button)\n\nresult = Text(app)\n\nsetup_round()\n\
    \napp.repeat(1000, reduce_time)\n\napp.display()\n```\n\n## 第10章\n### 画图\n创建一个简单的绘图应用程序\n\
    \n![](img/338ed40e6284f10661b5463402ece5a5_109_0.png)\n\n你将构建一个简单的应用程序，允许你使用线条和形状进行绘画（图1）。你将分四个阶段创建你的绘图应用程序：\n\
    \n- 绘制跟随鼠标的点\n- 在点之间绘制线条\n- 添加颜色和线条宽度修改器\n- 绘制形状\n\n请注意，你可以按照任何你想要的方式设计你的应用程序——它不必看起来像这个。\n\
    \n![](img/338ed40e6284f10661b5463402ece5a5_109_1.png)\n\n### 绘制点\n\n第一步是创建一个简单的应用程序，它将使用\
    \ **Drawing** 控件和 **when_mouse_dragged** 事件在屏幕上绘制点（或椭圆）。\n\n在你空白程序的导入部分，添加控件：\n\
    \n```python\nfrom guizero import App, Drawing\n```\n\n创建一个新函数：\n\n```python\n\
    def draw(event):\n    painting.oval(\n        event.x - 1, event.y - 1,\n    \
    \    event.x + 1, event.y + 1,\n        color=\"black\")\n```\n\n将此代码添加到应用程序部分：\n\
    \n```python\napp = App(\"画图\")\n\npainting = Drawing(app, width=\"fill\", height=\"\
    fill\")\n\npainting.when_mouse_dragged = draw\n\napp.display()\n```\n\n你的代码应该类似于\
    \ **paint1.py**（第116页）。**Drawing** 控件填充了窗口上所有可用的空间。当鼠标在绘图区域拖动时，会调用 **draw** 函数，该函数在\
    \ **painting** 上绘制椭圆。\n\n每次触发事件时都会调用 **draw** 函数。包含鼠标 x 和 y 位置的事件作为变量传递给该函数。\n\
    \n然而，这里有一个问题。除非你非常缓慢地移动鼠标，否则你的程序绘制的是一系列点，而不是一条连续的线（**图2**）。这不是一个很好的画笔！点之间存在间隙，因为鼠标经过的每个像素点并不会都触发事件。\n\
    \n![](img/338ed40e6284f10661b5463402ece5a5_110_0.png)\n\n▲ 图2 不是一个很好的画笔\n\n###\
    \ 在点之间绘制线条\n\n为了解决这个问题，你将修改程序以在点之间绘制线条。这样画出的线将是连续的，更像一支笔或画笔。\n\n你需要使用 `when_left_button_pressed`\
    \ 事件来存储线条开始的位置。然后在线条开始的位置和鼠标拖动到的下一个位置之间绘制一条直线。\n\n创建一个新函数，当鼠标按下时调用。\n\n```python\n\
    def start(event):\n    painting.last_event = event\n```\n\n将其添加到应用程序部分：\n\n```python\n\
    painting.when_left_button_pressed = start\n```\n\n线条开始的位置存储在 `last_event` 变量中。修改\
    \ `draw` 函数，以在线条开始的位置和鼠标拖动到的位置之间绘制一条线。\n\n```python\ndef draw(event):\n    painting.line(\n\
    \        painting.last_event.x, painting.last_event.y,\n        event.x, event.y,\n\
    \        color=\"black\",\n        width=3\n    )\n\n    painting.last_event =\
    \ event\n```\n\n通过将 `last_event` 变量更新为鼠标的当前位置，下次拖动鼠标时，它将在此点和下一个点之间绘制另一条线。你的程序应该看起来像\
    \ `paint2.py`。测试它，确保你的画笔现在能正常工作。\n\n### 更改线条宽度和颜色\n\n你的画笔只有一种颜色和粗细，这限制了你可以创建的绘图。接下来，你将修改你的图形用户界面，以便你可以选择不同的颜色和线条宽度。\n\
    \n向图形用户界面添加两个控件，以捕获线条的颜色和宽度。\n\n```python\nfrom guizero import App, Drawing, Combo,\
    \ Slider\n```\n\n将这些行添加到应用程序部分：\n\n```python\ncolor = Combo(app, options=[\"black\"\
    , \"white\", \"red\", \"green\", \"blue\"])\nwidth = Slider(app, start=1, end=10)\n\
    ```\n\n你可能还想将绘图区域的背景颜色更改为不同的颜色。另外，我们使用了 **Combo** 和 **Slider**，但你可以选择不同的控件。\n\n\
    修改 **draw** 函数，在绘制线条时使用颜色和宽度值。\n\n```python\npainting.line(\n    painting.last_event.x,\
    \ painting.last_event.y,\n    event.x, event.y,\n    color=color.value,\n    width=width.value\n\
    )\n```\n\n测试你的代码，它应该类似于 **paint3.py**，现在你可以选择颜色和线条宽度了。\n\n### 绘制形状\n\n你将扩展你的绘图应用程序，以便可以绘制填充的矩形。当鼠标按下时，矩形将出现，并随着鼠标在屏幕上拖动而增长。当鼠标按钮释放时，矩形将被绘制到屏幕上。\n\
    \n为此，你将修改你的程序，持续绘制和删除矩形，直到鼠标按钮释放。让我们向你的图形用户界面添加一个控件，以便你可以选择是绘制线条还是矩形。将其添加到应用程序部分：\n\
    \n```python\nshape = Combo(app, options=[\"line\", \"rectangle\"])\n```\n\n修改\
    \ **draw** 函数，仅在选择了 **\"line\"** 选项时才绘制线条。\n\n```python\nif shape.value == \"\
    line\":\n    painting.line(\n        painting.last_event.x, painting.last_event.y,\n\
    \        event.x, event.y,\n        color=color.value,\n        width=width.value\n\
    \    )\n```\n\n测试你的程序，确保线条仍然有效，并且在选择 **\"rectangle\"** 时不会发生任何事情。\n\n创建两个新变量，以跟踪鼠标按下时的第一个事件和最后绘制的形状。\n\
    \n```python\ndef start(event):\n    painting.last_event = event\n    painting.first_event\
    \ = event\n    painting.last_shape = None\n```\n\n这些变量将在鼠标按钮释放之前绘制和删除矩形时使用。\n\n\
    将此代码添加到你的 **draw** 函数中，以便在拖动鼠标时绘制矩形。\n\n```python\nif shape.value == \"rectangle\"\
    :\n    if painting.last_shape is not None:\n        painting.delete(painting.last_shape)\n\
    \    rectangle = painting.rectangle(\n        painting.first_event.x, painting.first_event.y,\n\
    \        event.x, event.y,\n        color=color.value\n    )\n    painting.last_shape\
    \ = rectangle\n```\n\n程序将不断地绘制一个矩形，然后删除它，然后再次绘制，直到你释放按钮。\n\n你的完整程序应该类似于 **paint4.py**。尝试一下，看看你能创建出什么样的图画！\n\
    \n> ## 添加椭圆\n> 当你第一次创建画图应用程序时，你使用了椭圆在屏幕上绘制点。你能否修改你的程序，使用类似于绘制矩形的过程来再次绘制椭圆？提示：查看\
    \ **10-paint.py** 代码清单，它还对工具进行了样式设置，并将它们整齐地排列在一个框中。\n\n**Drawing** 控件还支持绘制三角形和多边形。查看文档（**lawsie.github.io/guizero/drawing**），看看你如何使用此函数来创建其他形状。"
