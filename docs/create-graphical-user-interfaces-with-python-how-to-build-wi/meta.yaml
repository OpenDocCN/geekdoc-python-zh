- img_proc: true
  md: 'No ‘wanted’ poster would be complete without a picture, so let’s add one. My
    poster is going to be for my cat, because she is always scratching things she
    shouldn’t be.

    Save a copy of the image you would like to use in the same folder as your GUI
    program. You can use images in other folders, but if you do you will have to provide
    the path to the image, so it’s a lot easier to just store them in the same folder
    when you are starting out.


    > IMAGE MANIPULATION

    Because guizero is a library for beginners and we wanted to make it as easy as
    possible to install, it does not come with the fancier image manipulation functions
    as these require an extra library called ‘pillow’. You can always use non-animated
    GIF images on any platform, and PNG images on all platforms except Mac, so if
    you’re not sure whether you have installed the extra image manipulation functions,
    stick to those image types.


    Hopefully you’re now getting used to adding widgets. Remember that they must always
    be imported at the top of the program, and then the widget created with a sensible
    name after the line of code where you create the App, but before the final `app.display()`
    line.

    Add ‘Picture’ to the list of widgets to import at the start of the program.


    ```

    from guizero import App, Text, Picture

    ```


    Now create a Picture widget with two parameters: the app and the file name of
    the picture. This is the code we used because our picture was called **tabitha.png**.


    ```

    cat = Picture(app, image="tabitha.png")

    ```


    Run your code (which should look like **02-wanted.py**) again and you should see
    the picture displaying below your text (**Figure 7**).

    Now it’s up to you to use your new GUI customisation skills to style your poster
    however you would like.


    ![](img/338ed40e6284f10661b5463402ece5a5_15_0.png)'
