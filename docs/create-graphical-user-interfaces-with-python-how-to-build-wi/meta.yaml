  md: 'Open up the editor where you will write your Python code. At the start of every
    guizero program, you will choose the widgets you need from the guizero library
    and import them. You only need to import each widget once, and then you can use
    it in your program as many times as you like.

    At the top of the page, add this code to import the App widget:


    ![](img/338ed40e6284f10661b5463402ece5a5_9_0.png)


    ```

    python

    from guizero import App

    ```


    All guizero projects begin with a main window which is a container widget called
    an App. At the end of every guizero program, you must tell the program to display
    the app you have just created.

    Add these two lines of code underneath the line where you imported the App widget:


    ```

    python

    app = App(title="Hello world")

    app.display()

    ```


    Now save and run your code. You should see a GUI window with the title ''Hello
    world'' (Figure 1). Congratulations, you''ve just created your first guizero app!


    # Adding widgets


    Widgets are the things which appear on the GUI, such as text boxes, buttons, sliders,
    and even plain old pieces of text.

    All widgets go between the line of code to create the App and the `app.display()`
    line. Here is the app you just made, but in this example we have added a Text
    widget:


    ```

    python

    from guizero import App, Text

    app = App(title="Hello world")

    message = Text(app, text="Welcome to the app")

    app.display()

    ```


    Did you notice that there are two changes (Figure 2)? There is now an extra line
    of code to add the Text widget, and we have also added Text to the list of widgets
    to import on the very first line.

    Let''s look at the Text widget code in a bit more detail:


    ```

    python

    message = Text(app, text="Welcome to the app")

    ```'
