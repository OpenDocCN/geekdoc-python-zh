    \ `draw_meme` 函数，方法是向应用中的两个TextBox控件添加一个命令。\n\n```python\ntop_text = TextBox(app,\
    \ \"top text\", command=draw_meme)\nbottom_text = TextBox(app, \"bottom text\"\
    , command=draw_meme)\n```\n\n你的代码现在应该看起来像 **meme2.py** 中的那样。运行它，并通过更改顶部和底部文本来更新你的表情包。\n\
    然后你可以通过更改文本的颜色、大小和字体参数来查看你的表情包。例如：\n\n```python\nmeme.text(\n    20, 20, top_text.value,\n\
    \    color=\"orange\",\n    size=40,\n    font=\"courier\")\nmeme.text(\n    20,\
    \ 320, bottom_text.value,\n    color=\"blue\",\n    size=28,\n    font=\"times\
