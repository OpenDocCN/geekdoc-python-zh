  mdcn: "## 自定义事件\n\n要让你的绘图应用响应鼠标位置，你使用了自定义事件。这些事件的工作方式与普通的控件命令参数非常相似，你可以将它们设置为一个函数，当该事件发生时，该函数就会被调用。\n\
