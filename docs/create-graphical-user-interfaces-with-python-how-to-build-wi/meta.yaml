- img_proc: true
  md: '![](img/338ed40e6284f10661b5463402ece5a5_66_0.png)


    Figure 3 Every second, a new dot will appear


    This will schedule a new call to **add_dot** every time a new dot finishes being
    added. The next dot is scheduled to appear in 1 second as well, so if you run
    the program you should see a new dot appearing on the grid every second (**Figure
    3**).


    Try running your program, which should now look like **destroy4.py**. Since you
    already wrote the method to destroy a dot, clicking on any dot should remove it.
    However, if you play the game for a while you will notice it is pretty easy to
    keep up with the pace of one dot every second and it is almost impossible to lose
    the game.


    You still need to add two things – a score to keep track of how many dots you
    have destroyed, and a way of making the game get more difficult so that it becomes
    a challenge.


    # Add a score


    Adding a score is pretty straightforward and takes three steps:


    +   - Add a variable to keep track of the score; the variable should start at
    0.

    - Display a message on the GUI with the current score.

    - Any time the **destroy_dot** function is called and a dot is destroyed, add
    1 to score and update the message display.


    Try to add the code yourself using what you have already learnt.


    > **Hint:** To update the score variable from the **destroy_dot** function, you
    will need to declare it a global.


    > **Hint:** If you get an error saying that the variable score is referenced before
    assignment, make sure your variables section comes before your functions section
    in your program.


    The solution is shown overleaf if you are stuck...'
