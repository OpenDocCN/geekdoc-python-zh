    # Take multiple images and save to a GIF


    An animation is made of multiple pictures, known as frames. Each frame in the
    animation will be slightly different to the last and when played together at speed,
    the animation will appear to move.


    In this step, you will change your GUI to keep a list of all the frames taken
    and use PIL (Python Imaging Library) to save the frames as an animated GIF which
    will be displayed in the viewer. At the top of your program, import the Image
    module from PIL:


    ```

    python

    from PIL import Image

