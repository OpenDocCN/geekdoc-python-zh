    \nLearn how to install Python and an IDE\n\nHere we will show you how to set everything\
    \ up on your computer in order to create Python programs with graphical user interfaces.\
    \ To be able to run and edit the applications in this book, you'll need three\
    \ things:\n\n1.  The Python interpreter – this is the software that allows you\
    \ to run programs written in Python.\n2.  An integrated development environment\
    \ (IDE) – software which includes a code editor and the ability to run a program\
    \ from that editor. Python comes bundled with an IDE called IDLE, but you might\
    \ choose to use a different IDE.\n3.  The guizero Python library – instructions\
    \ for installing this are given in Chapter 1, but if you are using Thonny please\
    \ refer to the section below as the instructions are slightly different.\n\nThere\
    \ are many IDEs available; here we're going to look at two of them – IDLE and\
    \ Thonny. IDLE is a very simple IDE which comes bundled with Python for Windows\
    \ and Mac, and is installed by default on some versions of Raspberry Pi OS. Thonny\
    \ has some additional features, but it is still geared towards beginners.\n\n\
    Occasionally, errors can occur while trying to get everything installed and running\
    \ – especially on older computers. If you experience errors while trying to use\
    \ a particular IDE or version of Python, try another IDE or Python version.\n\n\
    ## Installing Python and IDLE\n\n**Windows**\nWindows does not come with Python\
    \ 3 pre-installed. If you think you may have installed Python previously, you\
    \ can check this by looking for ‘Python’ in the Start menu or under ‘Apps and\
    \ Features’ within Settings. If you intend to use Thonny as your IDE, you can\
    \ skip ahead to the ‘Thonny’ section as Python is automatically installed alongside\
    \ it.\nGo to **python.org**, mouse-over Downloads and click on Windows. Choose\
    \ the option to directly download the latest stable Python 3 release (most people\
    \ will need the one labelled *Windows x86-64 executable installer*, but this may\
    \ vary depending on your computer). Once the download is complete, run the program\
    \ either via your web browser or from your Downloads folder. Click ‘Install now’\
    \ to install using the default options. IDLE will also be installed and can be\
    \ opened via the Start menu or by searching for it by name.\nAlternatively, if\
    \ you have Windows 10, you could download the Microsoft Store package of the latest\
    \ Python version (currently 3.8). If you have any difficulties, full installation\
    \ instructions can be found at **rpf.io/python-windows**.\n\n**Mac**\nAlthough\
    \ most versions of macOS come with a Python interpreter, it’s version 2.7 which\
    \ is not compatible with guizero. You will need to install Python 3 alongside\
    \ the existing installation.\nGo to **python.org**, mouse-over Downloads and click\
    \ on Mac OS X. Choose the latest stable release, and click on *macOS 64-bit installer*.\
    \ Once the download is complete, run the program either via your web browser or\
    \ from your Downloads folder. Install using the default options. IDLE will also\
    \ be installed and can now be opened from the Launchpad or Applications folder.\n\
    \n**Raspberry Pi**\nRaspberry Pi OS (previously known as Raspbian) comes with\
    \ Python already installed. However, recent versions of the OS come with Thonny\
    \ but do not include IDLE. To install IDLE, make sure you are connected to the\
    \ internet, then open a Terminal and type:\n\n```\nsudo apt-get install idle3\n\
    ```\n\nIf you have any problems getting the code in this book to run, try upgrading\
    \ to the most recent version of Raspberry Pi OS.\n\n![IDLE usually comes pre-installed\
    \ with Python](img/338ed40e6284f10661b5463402ece5a5_139_0.png)\n\n## IDEs\n\n\
    ### IDLE\n\nIDLE is a basic IDE which is usually automatically installed alongside\
    \ Python. Once IDLE starts, the first thing you’ll see is a window titled ‘Python\
    \ 3.8.5 Shell’ (the number may be different depending on which exact version you\
    \ have). This window is called the *shell* and you can use it to type a line of\
    \ Python code and see the code run straight away.\n\nFor example, try typing the\
    \ following:\n**6 + 2**\n\nUse the File menu > New file to open a Python file.\
    \ A file allows you to type multiple lines of code and then run them all, rather\
    \ than each line running immediately when you press **ENTER**. You can run the\
    \ program by going to the Run menu and choosing Run Module – or by pressing **F5**\
    \ on the keyboard. If an error occurs, you will see any error messages in the\
    \ shell window.\n\n## CREATE GRAPHICAL USER INTERFACES WITH PYTHON\n\n![Thonny\
    \ includes a debugger which may prove useful](img/338ed40e6284f10661b5463402ece5a5_140_0.png)\n\
    \n### Thonny\n\nThonny comes installed with recent versions of Raspberry Pi OS.\
    \ For Windows and Mac computers, you can download and install it from **thonny.org**.\
    \ By default, Thonny uses a version of Python which comes packaged with it, so\
    \ even if you have already installed Python, Thonny will ignore that version and\
    \ use its own.\n\nUse the File menu > New to open a Python file. You will type\
    \ your code in the top white box which has a number 1 to the left side. You can\
    \ run the program by selecting the ‘Run current script’ button, or by pressing\
    \ **F5** on the keyboard. If an error occurs, you will see any error messages\
    \ in the shell area at the bottom of the screen.\n\nThonny includes a debugger\
    \ which allows you to step through the code one line at a time and see how the\
    \ variables change.\n\nBecause Thonny uses its own Python installation, you will\
    \ need to install guizero from inside Thonny in order for Thonny to be able to\
    \ access it. Make sure you are connected to the internet, then click on the Tools\
    \ menu > Manage packages. In the window that appears, type guizero in the box\
    \ and click ‘Find package from PyPI’. Thonny will locate the package for you;\
    \ click Install to install guizero within Thonny’s own Python environment."
