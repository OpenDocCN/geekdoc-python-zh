- md: "## Solution: add a score\n\nFirst, add a variable in your variables section\n\
    \n```\nscore = 0\n```\n\nNext, add a new Text widget in the app section to display\
    \ the score:\n\n```\nscore_display = Text(app, text=\"Your score is \" + str(score))\n\
    ```\n\nFinally, add 1 to the score every time a dot is destroyed:\n\n```\ndef\
    \ destroy_dot(x,y):\n\n    # Declare score global\n    global score\n\n    # This\
    \ code already exists\n    if board[x,y].dotty == True:\n        board[x,y].dotty\
    \ = False\n        board.set_pixel(x, y, \"white\")\n\n        # Add 1 to score\
    \ and display it on the GUI\n        score += 1\n        score_display.value =\
    \ \"Your score is \" + str(score)\n```\n\nYour code (without the optional comments)\
    \ should now resemble **destroy5.py**. Test your game and you should see your\
    \ score go up by 1 every time you click on a dot.\n\n## Put the player under pressure\n\
    \nNow that you can track the player's score, you can use it to put the player\
    \ under pressure and speed up the spawn of dots if they are doing well.\n\nRemember\
    \ that you used an after call inside the **add_dot** function to schedule another\
    \ dot in 1000 milliseconds (or 1 second)? Go back and find that line – you're\
    \ going to change it a bit.\n\nFirst, create a variable speed and set it to 1000.\
    \ Then, instead of scheduling a call to add a dot after 1000 ms, schedule it to\
    \ add a dot after speed milliseconds. This will have absolutely no effect on the\
    \ game... yet. You are still scheduling the next call after 1000 ms, but that\
    \ figure is now coming from the variable speed instead of being hard-coded as\
    \ a magic number.\n\n```\nspeed = 1000\nboard.after(speed, add_dot)\n```\n\nNow\
    \ here's how you can ramp up the pressure. Between these two lines of code, you\
    \ can add some code to set the speed of dots depending on the current score. Here\
    \ is an example:\n\n```\nspeed = 1000\nif score > 30:\n    speed = 200\nelif score\
    \ > 20:\n    speed = 400\nelif score > 10:\n    speed = 500\nboard.after(speed,\
    \ add_dot)\n```\n\nHere, you can see that if the player has got more than 10 points,\
    \ the new dots will appear every 500ms, if they have more than 20 points a dot\
    \ will appear every 400ms, and so on. This makes the game much harder the more\
    \ points you have. Save your code – **destroy6.py** – and test the game to see\
    \ the difference. You can alter the numbers or add more `elif` conditions if you\
    \ want to increase the difficulty even further.\n\n## Game over\n\nAll that remains\
    \ is to figure out when the player has lost the game; this happens when every\
    \ square has turned into a red dot.\n\nRemember that when you made Tic-tac-toe,\
    \ you used *nested loops* to check whether all squares were filled and the game\
    \ was a draw? You can use the same method here too, to loop through every square\
    \ on the grid and check if it is a red dot. In your `add_dot` function, just before\
    \ the call to `after`, add some code for a nested loop to loop through all squares\
    \ on the board:\n\n```\nall_red = True\nfor x in range(GRID_SIZE):\n    for y\
    \ in range(GRID_SIZE):\n```\n\nThe first line begins by assuming that all squares\
    \ are red. The nested loop will provide the coordinates of every square on the\
    \ grid in turn, as the values x and y so that you can check whether this is true.\n\
    \nAdd some code inside the second loop to find out whether the current pixel is\
    \ red, and if it is *not*, change the `all_red` variable to False.\n\n```\nall_red\
    \ = True\nfor x in range(GRID_SIZE):\n    for y in range(GRID_SIZE):\n       \
    \ if board[x,y].color != \"red\":\n            all_red = False\n```\n\nAfter both\
    \ loops end (make sure you unindent the following code), check whether the grid\
    \ was all red dots. If it is, the player has lost so display a message:\n\n```\n\
    if all_red:\n    score_display.value = \"You lost! Score: \" + str(score)\n```\n\
    \nIf the player hasn't lost, the game should continue. Add an **else:** and inside\
    \ it, indent the **after** method you already have, as we only want to add a new\
    \ dot if the player has *not* lost:\n\n```\nelse:\n    board.after(speed, add_dot)\n\
    ```\n\nBe careful to indent the **after** line you already have here rather than\
    \ adding another one, or your game will start behaving strangely and generate\
    \ multiple dots per second!\nYour final code should resemble **07-destroy-the-dots.py**.\
    \ Enjoy the game.\n\n## USING CONSTANTS\n\nSetting the height and width of your\
