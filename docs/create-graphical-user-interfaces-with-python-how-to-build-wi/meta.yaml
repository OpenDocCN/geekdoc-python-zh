  md: '# Chapter 3


    # Spy Name Chooser


    Make an interactive GUI application


    ![](img/338ed40e6284f10661b5463402ece5a5_17_0.png)


    So far you''ve learnt how to customise your GUI with a variety of different options.
    It''s now time to get into the really interactive part and make a GUI application
    that actually responds to input from the user. Who could resist pushing a big
    red button to generate a super secret spy name?


    ![](img/338ed40e6284f10661b5463402ece5a5_17_1.png)


    Since you already know how to create an app, why not go ahead and create a basic
    window and add some text if you like? Here is some code to get you started, and
    this code also includes some comments (the lines that start with a #) to help
    you structure your program:


    ```

    # Imports -----------------

    from guizero import App, Text


    # Functions ----------------

    ```'
  merge: -1
  pgno: 17
- img_proc: true
  md: '```

    # App -----------------

    app = App("TOP SECRET")


    # Widgets --------------

    title = Text(app, "Push the red button to find out your spy name")


    # Display --------------

    app.display()

    ```


    Run this code and you should see a window with the text (Figure 1).


    # Add a button


    Let''s go ahead and add a button to the GUI. Add PushButton to your list of imports
    so that you can use buttons. (Be careful to use a capital B!)

    Underneath the Text widget, but before the app displays, add a line of code to
    create a button.


    ```

    button = PushButton(app, choose_name, text="Tell me!")

    ```


    Your code should now look like **spy1.py** (page 22). Run it and no button will
    appear, but you''ll see an error in the shell window:


    ```

    NameError: name ''choose_name'' is not defined

    ```


    This is because **choose_name** is the name of a command which runs when the button
    is pressed. Most GUI components can have a command attached to them.

    For a button, attaching a command means "when the button is pressed, run this
    command." A GUI program works differently to other Python programs you might have
    written because the order in which the commands are run in the program depends
    entirely on the order in which the user presses the buttons, moves the sliders,
    ticks the boxes or interacts with whichever other widgets you are using. The actual
    command is almost always the name of a function to run.


    ![](img/338ed40e6284f10661b5463402ece5a5_18_0.png)'
  merge: -1
  pgno: 18
- img_proc: true
  md: "# Create a function\n\nLet's write the function **choose_name** so your button\
    \ has something it can do when it is pressed.\n\n![](img/338ed40e6284f10661b5463402ece5a5_19_0.png)\n\
    \nLook at your program and find the functions section. This is where you should\
    \ write all of the functions which will be attached to GUI widgets, to keep them\
    \ separate from the code for displaying the widget. Add this code in the functions\
    \ section:\n\n```\ndef choose_name():\n    print(\"Button was pressed\")\n```\n\
    \nYour code should now look like **spy2.py**. The button will now appear (**Figure\
    \ 2**). If you press the button, it may appear that nothing has happened, but\
    \ if you look in your shell or output window, you will see that some text has\
    \ appeared there (**Figure 3**).\n\nInstructing your function to first print out\
    \ some dummy text is a useful way of confirming that the button is activating\
    \ its command function correctly when it is pressed. You can then replace the\
    \ `print` statement with the actual code for the task you would like your button\
    \ to perform.\n\nInside your **choose_name** function, type a # symbol in front\
    \ of the line of code that prints \"Button was pressed\". Programmers call this\
    \ 'commenting out', and what you have done here is told the computer to treat\
    \ this line of code as if it were a comment, or in other words you have instructed\
    \ the computer to ignore it. The benefit of commenting a line of code out instead\
    \ of just deleting it is so that if you ever want to use that code again, you\
    \ can easily make it part of your program again by removing the # symbol.\n\n\
    > ## BIG RED BUTTON\n\nAt the moment, your button is not big or red! You used\
    \ properties in the previous chapter to change the appearance of your text on\
    \ the 'Wanted' poster, so can you use the properties of the PushButton widget\
    \ to change the background colour and the text size?\n\nNote that it may not be\
    \ possible to change the colour of a button on macOS, as some versions of the\
    \ operating system will not allow you to do so, but you should still be able to\
    \ alter the text size."
