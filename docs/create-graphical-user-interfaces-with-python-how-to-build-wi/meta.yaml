    into a date and time.


    Getting text from your user is simple: a TextBox or a multi-line TextBox should
    fulfil all your needs. Is it too simple, though. Does this require too much typing?


    What about the user who just wants to use a mouse? Perhaps a series of Combos
    each containing all the letters in the alphabet would be better (**Figure 2**)?


    Start by importing the guizero widgets and `ascii_letters`.


    ```

    python

    from guizero import App, Combo

    from string import ascii_letters

    ```


    `ascii_letters` is a list containing all the ''printable'' ASCII characters which
    you can use as the options for the Combo.


    Create a single Combo which contains all the letters and displays the app.


    ```

