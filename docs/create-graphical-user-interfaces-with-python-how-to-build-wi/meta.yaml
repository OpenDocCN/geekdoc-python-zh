  mdcn: "## 解决方案：添加分数\n\n首先，在变量部分添加一个变量\n\n```\nscore = 0\n```\n\n接下来，在应用部分添加一个新的文本组件来显示分数：\n\
    \n```\nscore_display = Text(app, text=\"Your score is \" + str(score))\n```\n\n\
    最后，每次销毁一个点时，将分数加1：\n\n```\ndef destroy_dot(x,y):\n\n    # 声明 score 为全局变量\n   \
    \ global score\n\n    # 此代码已存在\n    if board[x,y].dotty == True:\n        board[x,y].dotty\
    \ = False\n        board.set_pixel(x, y, \"white\")\n\n        # 将分数加1并在图形界面上显示\n\
    \        score += 1\n        score_display.value = \"Your score is \" + str(score)\n\
    ```\n\n你的代码（不包括可选的注释）现在应该类似于 **destroy5.py**。测试你的游戏，你应该会看到每次点击一个点时，你的分数都会增加1。\n\
    \n## 给玩家施加压力\n\n既然你可以追踪玩家的分数，你就可以利用它来给玩家施加压力，并在玩家表现良好时加快点的生成速度。\n\n还记得你在 **add_dot**\
    \ 函数中使用了一个 `after` 调用来在1000毫秒（或1秒）后安排另一个点吗？回去找到那一行——你将对它进行一些修改。\n\n首先，创建一个变量 `speed`\
    \ 并将其设置为1000。然后，不是安排在1000毫秒后调用 `add_dot`，而是安排在 `speed` 毫秒后调用它。这目前对游戏**完全没有影响**……你仍然在1000毫秒后安排下一次调用，但这个数字现在来自变量\
    \ `speed`，而不是硬编码的魔法数字。\n\n```\nspeed = 1000\nboard.after(speed, add_dot)\n```\n\
    \n现在，这里是如何增加压力的方法。在这两行代码之间，你可以添加一些代码，根据当前分数设置点的速度。下面是一个例子：\n\n```\nspeed = 1000\n\
    if score > 30:\n    speed = 200\nelif score > 20:\n    speed = 400\nelif score\
    \ > 10:\n    speed = 500\nboard.after(speed, add_dot)\n```\n\n在这里，你可以看到如果玩家得分超过10分，新的点将每500毫秒出现一次；如果得分超过20分，点将每400毫秒出现一次，以此类推。这使得游戏难度随着你分数的增加而大大增加。保存你的代码——**destroy6.py**——并测试游戏以查看差异。如果你想进一步增加难度，可以更改数字或添加更多的\
    \ `elif` 条件。\n\n## 游戏结束\n\n剩下的就是确定玩家何时输掉游戏；当每个方格都变成红点时，游戏结束。\n\n还记得你制作井字棋时，使用了*嵌套循环*来检查所有方格是否已填满且游戏是平局吗？你也可以在这里使用同样的方法，遍历网格上的每个方格并检查它是否是红点。在你的\
    \ `add_dot` 函数中，就在调用 `after` 之前，添加一些代码来嵌套循环遍历棋盘上的所有方格：\n\n```\nall_red = True\n\
    for x in range(GRID_SIZE):\n    for y in range(GRID_SIZE):\n```\n\n第一行首先假设所有方格都是红色的。嵌套循环将依次提供网格上每个方格的坐标，作为\
    \ `x` 和 `y` 的值，以便你可以检查这是否属实。\n\n在第二个循环内添加一些代码，以找出当前像素是否为红色，如果*不是*，则将 `all_red`\
    \ 变量更改为 False。\n\n```\nall_red = True\nfor x in range(GRID_SIZE):\n    for y in\
    \ range(GRID_SIZE):\n        if board[x,y].color != \"red\":\n            all_red\
    \ = False\n```\n\n两个循环结束后（确保你取消了以下代码的缩进），检查网格是否全是红点。如果是，玩家就输了，因此显示一条消息：\n\n```\n\
    if all_red:\n    score_display.value = \"You lost! Score: \" + str(score)\n```\n\
    \n如果玩家没有输，游戏应该继续。添加一个 **else:**，并在其内部缩进你已有的 **after** 方法，因为我们只想在玩家*没有*输的情况下添加新点：\n\
    \n```\nelse:\n    board.after(speed, add_dot)\n```\n\n小心缩进你已有的 **after** 行，而不是添加另一行，否则你的游戏将开始表现异常，并每秒生成多个点！\n\
    你的最终代码应该类似于 **07-destroy-the-dots.py**。享受游戏吧。\n\n## 使用常量\n\n将华夫饼的高度和宽度设置为5被称为在程序中使用“魔法数字”，因为特定的数字被硬编码到程序中。如果你想更改网格的大小，你需要找到程序中所有出现此数字的地方并进行更改，这可能会很混乱。\n\
