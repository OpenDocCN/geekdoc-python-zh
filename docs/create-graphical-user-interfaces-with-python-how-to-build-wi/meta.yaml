  md: '# Appendix A


    # Setting up


    Learn how install Python and an IDE


    Here we will show you how to set everything up on your computer in order to create
    Python programs with graphical user interfaces. To be able to run and edit the
    applications in this book, you''ll need three things:


    +   1. The Python interpreter – this is the software that allows you to run programs
    written in Python.

    2. An integrated development environment (IDE) – software which includes a code
    editor and the ability to run a program from that editor. Python comes bundled
    with an IDE called IDLE, but you might choose to use a different IDE.

    3. The guizero Python library – instructions for installing this are given in
    Chapter 1, but if you are using Thonny please refer to the section below as the
    instructions are slightly different.


    There are many IDEs available; here we''re going to look at two of them – IDLE
    and Thonny. IDLE is a very simple IDE which comes bundled with Python for Windows
    and Mac, and is installed by default on some versions of Raspberry Pi OS. Thonny
    has some additional features, but it is still geared towards beginners.


    Occasionally, errors can occur while trying to get everything installed and running
    – especially on older computers. If you experience errors while trying to use
    a particular IDE or version of Python, try another IDE or Python version.'
  merge: -1
  pgno: 137
- img_proc: true
  md: '# Installing Python and IDLE


    **Windows**

    Windows does not come with Python 3 pre-installed. If you think you may have installed
    Python previously, you can check this by looking for ‘Python’ in the Start menu
    or under ‘Apps and Features’ within Settings. If you intend to use Thonny as your
    IDE, you can skip ahead to the ‘Thonny’ section as Python is automatically installed
    alongside it.

    Go to **python.org**, mouse-over Downloads and click on Windows. Choose the option
    to directly download the latest stable Python 3 release (most people will need
    the one labelled *Windows x86-64 executable installer*, but this may vary depending
    on your computer). Once the download is complete, run the program either via your
    web browser or from your Downloads folder. Click ‘Install now’ to install using
    the default options. IDLE will also be installed and can be opened via the Start
    menu or by searching for it by name.

    Alternatively, if you have Windows 10, you could download the Microsoft Store
    package of the latest Python version (currently 3.8). If you have any difficulties,
    full installation instructions can be found at **rpf.io/python-windows**.


    **Mac**

    Although most versions of macOS come with a Python interpreter, it’s version 2.7
    which is not compatible with guizero. You will need to install Python 3 alongside
    the existing installation.

    Go to **python.org**, mouse-over Downloads and click on Mac OS X. Choose the latest
    stable release, and click on *macOS 64-bit installer*. Once the download is complete,
    run the program either via your web browser or from your Downloads folder. Install
    using the default options. IDLE will also be installed and can now be opened from
    the Launchpad or Applications folder.


    **Raspberry Pi**

    Raspberry Pi OS (previously known as Raspbian) comes with Python already installed.
    However, recent versions of the OS come with the Thonny but do not include IDLE.
    To install IDLE, make sure you are connected to the internet, then open a Terminal
    and type:


    ```

    sudo apt-get install idle3

    ```


    If you have any problems getting the code in this book to run, try upgrading to
    the most recent version of Raspberry Pi OS.'
  merge: -1
