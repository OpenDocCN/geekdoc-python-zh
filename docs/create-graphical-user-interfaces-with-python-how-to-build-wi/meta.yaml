  md: '# Chapter 7

    Destroy the Dots

    Learn how to use a Waffle to create a tasty game


    ![](img/338ed40e6284f10661b5463402ece5a5_61_0.png)


    You saw in the Tic-tac-toe game how to create a GUI on a grid layout in order
    to present the player with a grid-like board. If you are making a game involving
    a larger grid, there is a type of guizero widget called a Waffle which can instantly
    create a grid for you, and is really useful for creating all kinds of fun games.


    A Waffle was originally a grid of squares in early versions of guizero. This game
    is called ''Destroy the dots'' and it came about because Martin thought it was
    a good idea to allow a Waffle widget to contain a mixture of squares and dots.


    # Aim of the game


    In this game, you need to destroy the dots before they destroy you! The board
    consists of a grid of squares. The squares will gradually turn into dots. To destroy
    a dot, click on the dot and it will turn back into a square. The aim of the game
    is to last as long as possible before being overrun by dots (Figure 1).'
  merge: -1
  pgno: 61
- img_proc: true
  md: '![](img/338ed40e6284f10661b5463402ece5a5_62_0.png)


    Figure 1 Destroy the red dots before they take over the board


    # Set up the game


    Let''s start by making a guizero program which contains the instructions for the
    game and a Waffle. By now you should be familiar with the layout of a standard
    guizero program with sections for imports, functions, variables, and the app itself.

    First, create an App and inside it add a Text widget for the instructions and
    a Waffle widget for the board:


    ```

    # Imports -----------------

    from guizero import App, Text, Waffle


    # App ----------------------

    app = App("Destroy the dots")


    instructions = Text(app, text="Click the dots to destroy them")

    board = Waffle(app)


    app.display()

    ```


    If you run your program, you will see a small 3×3 grid of white squares. If you
    want to make your grid bigger than this, you can add width and height properties
    to your Waffle:'
  merge: -1
  pgno: 62
- img_proc: true
  md: "```\nboard = Waffle(app, width=5, height=5)\n```\n\nYour code should now resemble\
    \ **destroy1.py** (page 71).\n\n# Bring on the dots\n\nNext you need to write\
    \ a function to find a random square on the board and turn it into a dot. Begin\
    \ a new function in your functions section called **add_dot()**:\n\n```\ndef add_dot():\n\
    ```\n\nTo choose a random square on the board, you need to be able to generate\
    \ a random pair of integers as co-ordinates. Add a line in your imports section\
    \ to import the **randint** function from the **random** library, which lets you\
    \ generate a random integer.\n\n```\nfrom random import randint\n```\n\nLet's\
    \ generate two variables, **x** and **y**, which you can use to reference a co-ordinate\
    \ on the grid. Inside your **add_dot()** function, begin your code like this:\n\
    \n```\nx, y = randint(0,4), randint(0,4)\n```\n\nNotice that you have generated\
    \ two random integers between 0 and 4, because earlier on you set the width and\
    \ height of the grid to be 5 – the rows and columns will be numbered from 0. If\
    \ you chose different values earlier on, you will need to adjust the values here\
    \ to fit the size of your grid. However, there is a better way to manage aspects\
    \ like this (see 'Using constants' box on page 70).\n\n# Dot or not?\n\nNow that\
    \ you know about constants, you can use the following function to generate a random\
    \ co-ordinate on the grid:\n\n```\ndef add_dot():\n    x, y = randint(0,GRID_SIZE-1),\
    \ randint(0,GRID_SIZE-1)\n```\n\nAt this point, you don't know whether the randomly\
    \ chosen co-ordinate is already a dot or not. This might not seem to make any\
    \ difference at the start of a game when the board is mostly squares, but as the\
    \ board gets filled up with dots, you need to make sure that the space is actually\
    \ a square, otherwise the game will be too easy. One way to achieve this is to\
    \ run a loop which checks whether the chosen square is already a dot, and if it\
    \ is, chooses another random square:"
  merge: -1
  pgno: 63
- img_proc: true
  md: "![](img/338ed40e6284f10661b5463402ece5a5_64_0.png)\n\nFigure 2 Generating a\
    \ random red dot\n\n```\nx, y = randint(0,GRID_SIZE-1), randint(0,GRID_SIZE-1)\n\
    while board[x, y].dotty == True:\n    x, y = randint(0,GRID_SIZE-1), randint(0,GRID_SIZE-1)\n\
    ```\n\nYou might realise that this isn't a particularly efficient method of choosing\
    \ a random square that is not a dot, but it will do for what we need in this game.\n\
    \nAs soon as this loop finishes, you can be sure that the randomly chosen x, y\
    \ co-ordinate is definitely a square. Let's convert it to a red dot – following\
    \ (not inside) your while loop, add the following lines:\n\n```\nboard[x, y].dotty\
    \ = True\nboard.set_pixel(x, y, \"red\")\n```\n\nAdd a call to your new add_dot()\
    \ function in the app section after you've created the board. Your program should\
    \ now resemble destroy2.py. When you run it, you should see a single random red\
    \ dot in the grid. If you run the program again, the dot will probably be in a\
    \ different random place (Figure 2).\n\n# Destroy the dot\n\nSo far there is only\
    \ one dot – let's destroy it! Don't worry: you'll add more dots to destroy later\
    \ on, but once you can destroy one, you can destroy them all!\n\nMake a new function\
    \ in your functions section with a really satisfying name – destroy_dot – and\
    \ give it two parameters, x and y.\n\n```\ndef destroy_dot(x, y):\n```"
  merge: -1
  pgno: 64
- img_proc: true
  md: "This function will check whether the co-ordinate x,y is a dot (rather than\
    \ a square). You can do this using the same code as the code to create a dot –\
    \ the code **board[x, y].dotty** will return True if that coordinate is a dot,\
    \ and False if it is a square.\n\n```\nif board[x,y].dotty == True:\n```\n\nIf\
    \ the co-ordinate is a dot, change it to a square by setting its **dotty** property\
    \ to False, and also change its colour back to white:\n\n```\nif board[x,y].dotty\
    \ == True:\n    board[x,y].dotty = False\n    board.set_pixel(x, y, \"white\"\
    )\n```\n\nThis function needs to be triggered whenever the board is clicked. Find\
    \ the line of code you already have which creates the board, and add a command\
    \ like this:\n\n```\nboard = Waffle(app, width=GRID_SIZE, height=GRID_SIZE,\n\
    \    command=destroy_dot)\n```\n\nThis will call the **destroy_dot** function\
    \ whenever a space on the board is clicked.\nNote that a Waffle widget will automatically\
    \ pass two parameters to any command function; these will always be the x and\
    \ y co-ordinates of the pixel that was clicked on to trigger the command.\nYour\
    \ code should now look like **destroy3.py**. Test your program by running it and\
    \ clicking on the dot. You should see the dot turn back into a white square. If\
    \ you click on a square that is not a dot, nothing should happen.\n\n# More dots!\n\
    \nNow it's time to actually make the game a challenge, by adding continually spawning\
    \ dots. Let's start off by adding a new random dot every second. To do this, you\
    \ need to schedule a call to the **add_dot** function every second using a built-in\
    \ feature of guizero called **after**.\nIn your app section, remove the call to\
    \ **add_dot()** and replace it with a new line of code:\n\n```\nboard.after(1000,\
    \ add_dot)\n```\n\nThis line of code means 'after 1000 milliseconds (1 second),\
    \ call the function **add_dot**'.\nIf you run the program now, you'll still get\
    \ a single dot, but it will appear on the grid after a delay of 1 second.\nHere's\
    \ the clever bit. Find your **add_dot** function and add the same line of code\
    \ to it, at the end of the function."
