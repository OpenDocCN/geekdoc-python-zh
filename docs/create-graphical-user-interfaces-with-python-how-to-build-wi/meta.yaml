    \nfrom guizero import App, Drawing\n\n# -------------------------\n# Functions\n\
    # -------------------------\n\ndef start(event):\n    painting.last_event = event\n\
    \ndef draw(event):\n    painting.line(\n        painting.last_event.x, painting.last_event.y,\n\
    \        event.x, event.y,\n        color=\"black\",\n        width=3\n    )\n\
    \n    painting.last_event = event\n\n# -------------------------\n# App\n# -------------------------\n\
    \napp = App(\"Paint\")\n\npainting = Drawing(app, width=\"fill\", height=\"fill\"\
    )\n\npainting.when_left_button_pressed = start\npainting.when_mouse_dragged =\
    \ draw\n\napp.display()\n```\n\n## paint3.py / Python 3\n\n```python\n# widgets\
    \ to set the color and width\n\n# -------------------------\n# Imports\n# -------------------------\n\
    \nfrom guizero import App, Drawing, Combo, Slider\n\n\n# -------------------------\n\
    # Functions\n# -------------------------\n\ndef start(event):\n    painting.last_event\
