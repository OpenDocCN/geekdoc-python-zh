    \ with the Camera Module’ guide at rpf.io/picamera.\n\nYou will need guizero installed\
    \ with the optional ‘images’ functionality, which you can install by running this\
    \ command in the terminal:\n\n```\npip3 install guizero[images]\n```\n\nIf using\
