    \ = len(frames)\n```\n\n然后使用 `frames` 列表的 `len`（长度）来更新 `total_frames` 中的文本。\n\
    你的程序现在应该类似于 `stopframe2.py`。测试它，并确保每次拍照时帧数都会增加。\n\n## 保存为GIF\n\n你可以使用PIL将所有帧保存为一个动画GIF。创建一个新的\
