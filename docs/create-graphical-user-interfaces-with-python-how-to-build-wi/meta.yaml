  md: '# Chapter 2

    Wanted Poster

    Use styled text and an image to create a poster


    ![](img/338ed40e6284f10661b5463402ece5a5_11_0.png)


    Now that you can create a basic GUI, let''s make it look a bit more exciting.
    You can add text in different fonts, sizes and colours, change the background
    colour, and add pictures too. To practise all of this, let''s create a ''Wanted''
    poster.

    First of all, you need to start off by creating an app. In your editor, add this
    code to create the most basic app window:


    ```

    from guizero import App


    app = App("Wanted!")


    app.display()

    ```


    ![](img/338ed40e6284f10661b5463402ece5a5_11_1.png)


    Save and run your code and you should see an app that looks like a plain grey
    square with the title ''Wanted!'' at the top (Figure 1).


    Figure 1 The basic app'
