    ```python\nfrom guizero import App, Picture, PushButton, Text, Slider, Box\n\n\
    controls = Box(app, align=\"top\")\n```\n\nModify the widgets so that they are\
    \ in the controls box and set the align parameter to \"left\". For example:\n\n\
    ```python\ntotal_frames = Text(controls, text=\"0\", align=\"left\")\n```\n\n\
    Aligning widgets to the left inside the box will make them stack up next to each\
    \ other.\n\nRepeat this for rest of the controls so they are all put into the\
    \ top box and lined up next to each other.\n\nYour complete program should look\
    \ similar to 11-stop-frame.py.\n\n![](img/338ed40e6284f10661b5463402ece5a5_129_0.png)\n\
    \n## CREATE GRAPHICAL USER INTERFACES WITH PYTHON\n\n### stopframe1.py / Python\
    \ 3\n\n```python\n# Imports -----------------\n\nfrom guizero import App, Picture,\
    \ PushButton\nfrom picamera import PiCamera\n\n# Functions ---------------\n\n\
    def capture_image():\n    camera.capture(\"frame.jpg\")\n    viewer.image = \"\
    frame.jpg\"\n\n# App ---------------------\n\napp = App(title=\"Stop frame animation\"\
    )\n\ncamera = PiCamera(resolution=\"400x400\")\ntake_next_picture = PushButton(app,\
    \ text=\"Take picture\",\n    command=capture_image)\nviewer = Picture(app)\n\n\
    app.display()\n```\n\n### stopframe2.py / Python 3\n\n```python\n# Imports -----------------\n\
    \nfrom guizero import App, Picture, PushButton, Text\nfrom picamera import PiCamera\n\
