- md: "# 06-tictactoe.py (CONT.) / Python 3\n\n```python\n# Variables ---------------\n\
    turn = \"X\"\n\n# App ---------------------\napp = App(\"Tic tac toe\")\n\nboard\
    \ = Box(app, layout=\"grid\")\nboard_squares = clear_board()\nmessage = Text(app,\
    \ text=\"It is your turn, \" + turn)\n\napp.display()\n```\n\n# Chapter 7\n##\
    \ Destroy the Dots\nLearn how to use a Waffle to create a tasty game\n\n![img](img/338ed40e6284f10661b5463402ece5a5_61_0.png)\n\
    \nYou saw in the Tic-tac-toe game how to create a GUI on a grid layout in order\
    \ to present the player with a grid-like board. If you are making a game involving\
    \ a larger grid, there is a type of guizero widget called a Waffle which can instantly\
    \ create a grid for you, and is really useful for creating all kinds of fun games.\n\
    \nA Waffle was originally a grid of squares in early versions of guizero. This\
    \ game is called 'Destroy the dots' and it came about because Martin thought it\
    \ was a good idea to allow a Waffle widget to contain a mixture of squares and\
    \ dots.\n\n## Aim of the game\n\nIn this game, you need to destroy the dots before\
    \ they destroy you! The board consists of a grid of squares. The squares will\
    \ gradually turn into dots. To destroy a dot, click on the dot and it will turn\
    \ back into a square. The aim of the game is to last as long as possible before\
    \ being overrun by dots (Figure 1).\n\n![img](img/338ed40e6284f10661b5463402ece5a5_62_0.png)\n\
    \nFigure 1 Destroy the red dots before they take over the board\n\n## Set up the\
    \ game\n\nLet's start by making a guizero program which contains the instructions\
    \ for the game and a Waffle. By now you should be familiar with the layout of\
    \ a standard guizero program with sections for imports, functions, variables,\
    \ and the app itself.\n\nFirst, create an App and inside it add a Text widget\
    \ for the instructions and a Waffle widget for the board:\n\n```python\n# Imports\
    \ -----------------\nfrom guizero import App, Text, Waffle\n\n# App ----------------------\n\
    app = App(\"Destroy the dots\")\n\ninstructions = Text(app, text=\"Click the dots\
    \ to destroy them\")\nboard = Waffle(app)\n\napp.display()\n```\n\nIf you run\
    \ your program, you will see a small 3×3 grid of white squares. If you want to\
    \ make your grid bigger than this, you can add width and height properties to\
    \ your Waffle:\n\n```python\nboard = Waffle(app, width=5, height=5)\n```\n\nYour\
    \ code should now resemble **destroy1.py** (page 71).\n\n## Bring on the dots\n\
    \nNext you need to write a function to find a random square on the board and turn\
