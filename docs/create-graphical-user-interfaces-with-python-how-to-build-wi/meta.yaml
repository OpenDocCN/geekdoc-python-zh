  md: 'Indentation is a powerful part of Python, and one of the most common reasons
    for a program to not work as you expected. When looking for problems in a program,
    always double-check the indentation.


    # Conditionals and Variables


    You can create variables in your program to store values; for example, you might
    want to store some data the user typed in, or the result of a calculation.


    Start a new program by clicking the New icon on the Thonny menu, then type the
    following into the script area:


    ```

    my_name = input("What is your name? ")

    ```


    Click the Run icon, save your program with the name ''Input test'', and watch
    what happens in the shell area: you''ll be asked for your name. Type your name
    and press **ENTER**. The variables area to the right of the Thonny window will
    automatically display the name of the variable


    ![](img/338ed40e6284f10661b5463402ece5a5_144_0.png)


    Variable names and values are shown in the area on the right'
