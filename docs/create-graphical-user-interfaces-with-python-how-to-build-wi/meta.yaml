    widgets:


    ```

    from guizero import App, Box

    ```


    In the app section, add the following code:


    ```

    app = App("emoji match")


    pictures_box = Box(app, layout="grid")

    ```


    The Box widget is really useful for laying out your GUI. It''s an invisible area
    of your GUI where you can group widgets together. A Box can have its own layout,
    size, and bg'
