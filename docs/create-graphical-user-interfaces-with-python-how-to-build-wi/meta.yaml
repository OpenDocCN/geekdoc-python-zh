  md: '# Set up


    Download (from magpi.cc/floodit) and open the starter file, floodit_starter.py.
    Save it in a sensible place.


    In the variables section, give the variables some values:


    +   - **colours** – a list of six colours as strings. These can either be common
    colour names or hex colours. The colour names "white", "black", "red", "green",
    "blue", "cyan", "yellow", and "magenta" will always be available.

    - **board_size** – the width/height of the board as an integer; we chose 14. The
    board is always a square.

    - **moves_limit** – how many moves the player is allowed before they lose, as
    an integer; we chose 25.


    In the app section, create an App widget and give it a title.


    ```

    app = App("Flood it")

    app.display()

    ```


    Running this will result in a standard labelled window (Figure 2).


    ![](img/338ed40e6284f10661b5463402ece5a5_78_0.png)


    # Create the board


    The board is a grid of squares, each containing a randomly selected colour from
    the list you created earlier.


    Inside the app, add a Waffle widget. This will create a grid which will be the
    board.


    ```

    board = Waffle(app)

    ```'
