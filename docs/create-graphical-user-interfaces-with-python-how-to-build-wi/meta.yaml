  md: '# Welcome!


    This book will show you how to use Python to create some fun graphical user interfaces
    (GUIs) using the guizero library. The guizero library started with the belief
    that there must be an easier way for students in school to create Python GUIs.
    The library itself was born one day on a long train journey from Cambridge, as
    the side project of a secondary school teacher.


    Guizero has grown significantly in terms of features, yet remained true to its
    original aim of being simple but flexible. It is a library for all beginners to
    create with, for teachers to scaffold learning with and for experts to save time
    with.


    We hope that these projects and guizero brings you that little spark of excitement
    to your Python programs. That spark might be anything from a button that does
    something when you click it, to colours in your otherwise black and white Python
    programming, to a full multicoloured Waffle.


    It turns out that with open-source software, even if you don''t know how to get
    the whole way there, if you start, someone will help you. We are grateful to the
    many contributors who have put time and effort into creating guizero, and to the
    thousands of people who have used it in their projects. Enjoy your journey and
    be proud of your creations.


    Laura and Martin'
