  md: '# Chapter 1

    Introduction to GUIs

    How to install guizero and create your first app


    ![](img/338ed40e6284f10661b5463402ece5a5_7_0.png)


    WHAT YOU''LL NEED


    You will need a computer (e.g. Raspberry Pi, Apple Mac, Windows or Linux PC) and
    an internet connection for the software installation. You will also need the following
    software installed:


    - **Python 3** (python.org) – see Appendix A

    - **An IDE** (code editor), e.g.: IDLE (installed with Python 3), Thonny (thonny.org),
    Mu (codewith.mu), PyCharm (jetbrains.com/pycharm)

    - **The guizero Python library** (lawsie.github.io/guizero)


    A graphical user interface (GUI, pronounced ''gooey'') is a way of making your
    Python programs easier to use and more exciting. You can add different components
    called ''widgets'' to your interface, allowing lots of different ways for information
    to be entered in to the program and displayed as output. You might want to allow
    people to push a button, to display a piece of text, or even let them choose an
    option from a menu. In this book we will use the guizero library, which has been
    developed with the aim of helping beginners to easily create GUIs.


    Python''s standard GUI package is called tkinter, and is already installed with
    Python'
  merge: -1
  pgno: 7
- img_proc: true
  md: 'on most platforms. The guizero library is a wrapper for tkinter – this means
    that it offers a much simpler way of using Python''s standard GUI library.


    ![](img/338ed40e6284f10661b5463402ece5a5_8_0.png)


    # Installing guizero


    You will need to install the guizero (**lawsie.github.io/guizero**) Python library
    to create the programs in this book. It is available as a Python package, which
    is reusable code you can download, install, and then use in your programs.


    How you install of guizero will depend on your operating system and the permissions
    you have to control your computer.


    If you have access to the command line / terminal, you can use the following command:


    ```

    bash

    pip3 install guizero

    ```


    Comprehensive installation instructions for guizero are available at **lawsie.github.io/guizero**,
    including options for installing when you have no administration rights to your
    computer and downloadable installations for Windows.


    # Hello World


    Now that you have guizero installed, let''s check that it''s working and write
    a small ''hello world'' app which is traditional for programmers to write as their
    first program when using a new tool or language.


    | **AIMS OF GUIZERO** |

    | :--- |

    | • Able to be used without installation | • Accessible to young children, but
    able be used for advanced projects |

    | • Remove unnecessary code new learners find difficult to understand | • Good-quality
    documentation with examples |

    | • Sensible widget names | • Generate helpful error messages |'
