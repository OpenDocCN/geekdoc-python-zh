  md: '# Put the name in the GUI


    That''s good, but wouldn''t it be nicer if the spy name appeared on the GUI? Let''s
    make another Text widget and use it to display the spy name.


    ![](img/338ed40e6284f10661b5463402ece5a5_21_0.png)


    In the widgets section, add a new Text widget which will display the spy name:


    ```

    python

    name = Text(app, text="")

    ```


    When you create the widget, you don''t want it to display any text at all as the
    person won''t have pressed the button yet, so you can set the text to "", which
    is called an ''empty string'' and displays nothing. Inside your **choose_name**
    function, comment out the line of code where you print out the spy name.


    Now add a new line of code at the end of the function to set the value of the
    name Text widget to the **spy_name** you just created. This will cause the Text
    widget to update itself and display the name.


    ```

    python

    name.value = spy_name

    ```


    Your final code should be as in **03-spy-name-chooser.py**. Run it and press the
    button to see your spy name displayed proudly on the GUI (**Figure 5**).


    You can press the button again if you don''t like the name you are given, and
    the program will randomly generate another name for you.


    ```

    python

    # Imports -----------------

    from guizero import App, Text, PushButton


    # Functions ---------------


    # App ---------------------

    app = App("TOP SECRET")


    # Widgets -----------------

    title = Text(app, "Push the red button to find out your spy name")

    button = PushButton(app, choose_name, text="Tell me!")


    # Display -----------------

    app.display()

    ```'
