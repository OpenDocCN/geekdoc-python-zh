    # Chapter 7

    Destroy the Dots

    Learn how to use a Waffle to create a tasty game


    ![](img/338ed40e6284f10661b5463402ece5a5_61_0.png)


    You saw in the Tic-tac-toe game how to create a GUI on a grid layout in order
    to present the player with a grid-like board. If you are making a game involving
    a larger grid, there is a type of guizero widget called a Waffle which can instantly
    create a grid for you, and is really useful for creating all kinds of fun games.


    A Waffle was originally a grid of squares in early versions of guizero. This game
    is called ''Destroy the dots'' and it came about because Martin thought it was
    a good idea to allow a Waffle widget to contain a mixture of squares and dots.


    # Aim of the game


    In this game, you need to destroy the dots before they destroy you! The board
    consists of a grid of squares. The squares will gradually turn into dots. To destroy
    a dot, click on the dot and it will turn back into a square. The aim of the game
    is to last as long as possible before being overrun by dots (Figure 1).'
