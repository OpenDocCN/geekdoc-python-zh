    \ width=\"fill\", height=\"fill\")\n\ndraw_meme()\n\napp.display()\n```\n\n##\
    \ Chapter 5\n\n## World’s Worst GUI\n\nLearn good GUI design by doing it all wrong\
    \ first!\n\n![](img/338ed40e6284f10661b5463402ece5a5_35_0.png)\n\n> It's time\
    \ to really go to town with your GUIs and experiment with different widgets, colours,\
    \ fonts, and features. Like most experiments, it's likely that you won't get it\
    \ right first time! In fact, you are going to explore the wrong way to approach\
    \ creating your GUI.\n\n## It's hard to read\n\nThe right choice of GUI colour\
    \ and font are important. It's important that the contrast between background\
    \ and text colour ensure that your GUI is easily readable. What you shouldn't\
    \ do it is use two very similar colours.\n\nImport the widgets at the top of the\
    \ code:\n\n```python\nfrom guizero import App, Text\n```\n\nCreate an app with\
    \ a title:\n\n```python\napp = App(\"it's all gone wrong\")\ntitle = Text(app,\
    \ text=\"Some hard to read text\")\n```\n\n```python\napp.display()\n```\n\nExperiment\
    \ by changing the colours, font, and text size (see **worst1.py** listing, page\
    \ 41). My choices are not the best!\n\n```python\napp = App(\"it's all gone wrong\"\
    , bg=\"dark green\")\ntitle = Text(app, text=\"Some hard-to-read text\", size=\"\
    14\",\nfont=\"Comic Sans\", color=\"green\")\n```\n\nIt's important that text\
    \ on a GUI also stays around long enough to be read. It certainly shouldn't disappear\
    \ or start flashing.\nAll widgets in guizero can be made invisible (or visible\
    \ again) using the **hide()** and **show()** functions. Using the **repeat** function\
    \ in guizero to run a function every second, you can make your text hide and show\
    \ itself and appear to flash.\nCreate a function which will hide the text if it's\
    \ visible and show it if it's not:\n\n```python\ndef flash_text():\n    if title.visible:\n\
    \        title.hide()\n    else:\n        title.show()\n```\n\nBefore the app\
    \ is displayed, use **repeat** to make the **flash_text** function run every 1000\
    \ milliseconds (1 second).\n\n```python\napp.repeat(1000, flash_text)\n\napp.display()\n\
    ```\n\nYour code should now look like **worst2.py**. Test your app: the title\
    \ text should flash, appearing and disappearing once every second.\n\n## The wrong\
    \ widget\n\nUsing an appropriate widget can be the difference between a great\
    \ GUI and one which is completely unusable.\nWhich widget would you use to enter\
    \ a date? A TextBox? Multiple Combos? A TextBox would be more flexible but would\
    \ require validation and formatting. Multiple Combos for year, month, and day\
    \ wouldn't require validating but would be slower to use.\n\n![](img/338ed40e6284f10661b5463402ece5a5_37_0.png)\n\
    \n![](img/338ed40e6284f10661b5463402ece5a5_37_1.png)\n\nUsing a Slider to set\
    \ a date and time (**Figure 1**), as in the **worst3.py** code example, is not\
    \ a great idea, though.\n\nThe Slider widget returns a number between 0 and 999,999,999.\
    \ This is the number of seconds since 1 January 1970. The function `ctime()` is\
    \ used to turn this number into a date and time.\n\nGetting text from your user\
    \ is simple: a TextBox or a multi-line TextBox should fulfil all your needs. Is\
    \ it too simple, though. Does this require too much typing?\n\nWhat about the\
    \ user who just wants to use a mouse? Perhaps a series of Combos each containing\
    \ all the letters in the alphabet would be better (**Figure 2**)?\n\nStart by\
    \ importing the guizero widgets and `ascii_letters`.\n\n```python\nfrom guizero\
    \ import App, Combo\nfrom string import ascii_letters\n```\n\n`ascii_letters`\
    \ is a list containing all the 'printable' ASCII characters which you can use\
    \ as the options for the Combo.\n\nCreate a single Combo which contains all the\
    \ letters and displays the app.\n\n```python\na_letter = Combo(app, options=\"\
    \ \" + ascii_letters, align=\"left\")\n\napp.display()\n```\n\nYour program should\
    \ now resemble **worst4.py**. Running it, you will see a single Combo which contains\
    \ all the letters plus a space and is aligned to the left of the window.\n\nTo\
    \ get a line of letters together, you could continually add Combo widgets to your\
    \ app, e.g.:\n\n```python\na_letter = Combo(app, options=\" \" + ascii_letters,\
    \ align=\"left\")\nb_letter = Combo(app, options=\" \" + ascii_letters, align=\"\
    left\")\nc_letter = Combo(app, options=\" \" + ascii_letters, align=\"left\")\n\
    ```\n\nBy aligning each Combo widget to the left, the widgets are displayed next\
    \ to each other against the left edge.\n\nAlternatively, you could use a **for**\
    \ loop, create a list of letters, and append each letter to the list, as shown\
    \ in **worst5.py**.\n\nTry both these approaches and see which you prefer. The\
    \ **for** loop is more flexible as it allows you to create as many letters as\
    \ you like.\n\n## Pop-ups\n\nNo terrible GUI would be complete without a pop-up\
    \ box. guizero contains a number of pop-up boxes, which can be used to let users\
    \ know something important or gather useful information. They can also be used\
    \ to irritate and annoy users!\n\nFirst, create an application which pops up a\
    \ pointless box at the start to let you know the application has started.\n\n\
    ![](img/338ed40e6284f10661b5463402ece5a5_38_0.png)\n\n```python\nfrom guizero\
    \ import App\n\napp = App(title=\"pointless pop-ups\")\n\napp.info(\"Application\
    \ started\", \"Well done you started the application\")\n\napp.display()\n```\n\
    \nRunning your application, you will see that an 'info' box appears (**Figure\
    \ 3**). The first parameter passed to info is the title of the window; the second\
    \ parameter is the message.\n\nYou can change the style of this simple pop-up\
    \ by using **warn** or **error** instead of **info**.\n\nPop-up boxes can also\
    \ be used to get information from the user. The simplest is a **yesno** which\
    \ will ask the user a question and get a True or False response. This is useful\
    \ if you want a user to confirm before doing something, such as deleting a file.\
    \ Perhaps not every time they press a button, though!\n\nImport the PushButton\
    \ widget into your application:\n\n```python\nfrom guizero import App, PushButton\n\
    ```\n\nCreate a function which uses the **yesno** pop-up to ask for confirmation."
