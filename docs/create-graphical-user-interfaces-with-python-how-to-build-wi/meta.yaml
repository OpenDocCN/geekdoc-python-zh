    \ Python 和集成开发环境\n\n这里我们将向你展示如何在你的计算机上设置一切，以便创建具有图形用户界面的 Python 程序。为了能够运行和编辑本书中的应用程序，你需要三样东西：\n\
    \n1.  Python 解释器 – 这是允许你运行用 Python 编写的程序的软件。\n2.  一个集成开发环境（IDE） – 包含代码编辑器和从该编辑器运行程序功能的软件。Python\
    \ 自带一个名为 IDLE 的 IDE，但你可能会选择使用不同的 IDE。\n3.  guizero Python 库 – 安装说明在第 1 章给出，但如果你使用的是\
    \ Thonny，请参考下面的部分，因为说明略有不同。\n\n有许多 IDE 可用；这里我们将介绍其中两个 – IDLE 和 Thonny。IDLE 是一个非常简单的\
    \ IDE，它随 Windows 和 Mac 版本的 Python 一起捆绑提供，并且在某些版本的 Raspberry Pi OS 上默认安装。Thonny\
    \ 有一些额外的功能，但它仍然面向初学者。\n\n偶尔，在尝试安装和运行所有内容时可能会发生错误 – 尤其是在较旧的计算机上。如果你在尝试使用特定的 IDE\
    \ 或 Python 版本时遇到错误，请尝试另一个 IDE 或 Python 版本。\n\n## 安装 Python 和 IDLE\n\n**Windows**\n\
    Windows 没有预装 Python 3。如果你认为你之前可能已经安装了 Python，你可以通过在开始菜单中查找‘Python’或在设置中的‘应用和功能’下查找来检查。如果你打算使用\
    \ Thonny 作为你的 IDE，你可以跳到‘Thonny’部分，因为 Python 会随它一起自动安装。\n访问 **python.org**，将鼠标悬停在\
    \ Downloads 上并点击 Windows。选择直接下载最新稳定版 Python 3 的选项（大多数人需要标记为 *Windows x86-64 executable\
    \ installer* 的版本，但这可能因你的计算机而异）。下载完成后，通过你的网络浏览器或从下载文件夹运行程序。点击‘Install now’使用默认选项进行安装。IDLE\
    \ 也将被安装，可以通过开始菜单或按名称搜索打开。\n或者，如果你有 Windows 10，你可以从 Microsoft Store 下载最新 Python\
    \ 版本（目前是 3.8）的包。如果你遇到任何困难，完整的安装说明可以在 **rpf.io/python-windows** 找到。\n\n**Mac**\n\
    尽管大多数版本的 macOS 都带有 Python 解释器，但它是 2.7 版本，与 guizero 不兼容。你需要在现有安装旁边安装 Python 3。\n\
    访问 **python.org**，将鼠标悬停在 Downloads 上并点击 Mac OS X。选择最新的稳定版本，然后点击 *macOS 64-bit\
    \ installer*。下载完成后，通过你的网络浏览器或从下载文件夹运行程序。使用默认选项进行安装。IDLE 也将被安装，现在可以从启动台或应用程序文件夹打开。\n\
    \n**Raspberry Pi**\nRaspberry Pi OS（以前称为 Raspbian）已经预装了 Python。但是，最近版本的操作系统带有\
    \ Thonny 但不包含 IDLE。要安装 IDLE，请确保你已连接到互联网，然后打开终端并输入：\n\n```\nsudo apt-get install\
    \ idle3\n```\n\n如果你在运行本书中的代码时遇到任何问题，请尝试升级到最新版本的 Raspberry Pi OS。\n\n![IDLE 通常随\
    \ Python 预装](img/338ed40e6284f10661b5463402ece5a5_139_0.png)\n\n## 集成开发环境\n\n\
    ### IDLE\n\nIDLE 是一个基本的 IDE，通常随 Python 一起自动安装。一旦 IDLE 启动，你首先看到的是一个标题为‘Python 3.8.5\
    \ Shell’的窗口（数字可能因你拥有的具体版本而异）。这个窗口称为 *shell*，你可以用它输入一行 Python 代码并立即看到代码运行。\n\n\
    例如，尝试输入以下内容：\n**6 + 2**\n\n使用文件菜单 > 新建文件来打开一个 Python 文件。文件允许你输入多行代码，然后一次性运行它们，而不是在你按\
    \ **ENTER** 时立即运行每一行。你可以通过转到运行菜单并选择运行模块 – 或者按键盘上的 **F5** 来运行程序。如果发生错误，你将在 shell\
    \ 窗口中看到任何错误消息。\n\n## 使用 Python 创建图形用户界面\n\n![Thonny 包含一个调试器，可能很有用](img/338ed40e6284f10661b5463402ece5a5_140_0.png)\n\
    \n### Thonny\n\nThonny 随最近版本的 Raspberry Pi OS 一起安装。对于 Windows 和 Mac 计算机，你可以从 **thonny.org**\
    \ 下载并安装它。默认情况下，Thonny 使用随其打包的 Python 版本，因此即使你已经安装了 Python，Thonny 也会忽略该版本并使用自己的版本。\n\
    \n使用文件菜单 > 新建来打开一个 Python 文件。你将在顶部的白色框中输入代码，该框左侧有一个数字 1。你可以通过选择‘运行当前脚本’按钮或按键盘上的\
    \ **F5** 来运行程序。如果发生错误，你将在屏幕底部的 shell 区域看到任何错误消息。\n\nThonny 包含一个调试器，允许你逐行单步执行代码并查看变量如何变化。\n\
    \n因为 Thonny 使用自己的 Python 安装，你需要从 Thonny 内部安装 guizero，以便 Thonny 能够访问它。确保你已连接到互联网，然后点击工具菜单\
    \ > 管理包。在出现的窗口中，在框中输入 guizero 并点击‘从 PyPI 查找包’。Thonny 会为你定位该包；点击安装以在 Thonny 自己的\
    \ Python 环境中安装 guizero。"
