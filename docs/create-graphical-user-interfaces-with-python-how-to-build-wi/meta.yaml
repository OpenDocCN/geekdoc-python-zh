  md: '# Chapter 9

    Emoji Match

    Create a fun picture-matching game


    ![](img/338ed40e6284f10661b5463402ece5a5_91_0.png)


    You are going to build an emoji picture-matching game (Figure 1). The object of
    the game is to spot the one emoji that appears in two different sets. You get
    a point for each correct match and lose a point for an incorrect match.


    # Loading emojis


    To create the game, you will need emojis. You can use the emojis created for Twitter
    (twemoji.twitter.com). Download the emojis.zip file from magpi.cc/guizeroemojis,
    open the zip file, and copy the emojis folder to the folder where you save your
    code.

    The game will need to choose nine emojis at random and arrange them into a grid.
    A simple way to do this is to put all of the emojis into a list and randomly shuffle
    them.

    The following code creates a shuffled list of items, each in the form path/emoji_file_name.

    Create a new program with the usual commented lines for different sections (Imports,
    Variables, Functions, App). Under imports, add:


    ```

    import os

    from random import shuffle

    ```'
