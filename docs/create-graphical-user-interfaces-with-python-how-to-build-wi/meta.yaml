  md: '# Chapter 10

    Paint

    Create a simple drawing application


    ![](img/338ed40e6284f10661b5463402ece5a5_109_0.png)


    You are going to build a simple application which will allow you to paint using
    lines and shapes (Figure 1). You will create your paint application in four stages:


    +   - drawing dots which follow the mouse

    - draw lines between the dots

    - adding colours and line width modifier

    - drawing shapes


    Note that you can style your application anyway you want – it doesn''t have to
    look like this one.


    ![](img/338ed40e6284f10661b5463402ece5a5_109_1.png)'
