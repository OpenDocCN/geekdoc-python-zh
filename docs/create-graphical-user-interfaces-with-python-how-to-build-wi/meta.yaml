    \ up\n\n# -------------------------\n# Imports\n# -------------------------\n\n\
    from guizero import App, Drawing, Combo, Slider, Box, Text\n\n# -------------------------\n\
    # Functions\n# -------------------------\n\ndef start(event):\n    painting.last_event\
    \ = event\n    painting.first_event = event\n    painting.last_shape = None\n\n\
