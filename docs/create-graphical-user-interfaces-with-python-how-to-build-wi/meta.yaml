    ## About the authors...


    ![](img/338ed40e6284f10661b5463402ece5a5_3_0.png)


    ### Martin O''Hanlon


    Martin works in the learning team at the Raspberry Pi Foundation, where he creates
    online courses, projects, and learning resources. He contributes to the development
    of many open-source projects and Python libraries, including guizero. As a child,
    he wanted to be a computer scientist, astronaut, or snowboard instructor.


    ![](img/338ed40e6284f10661b5463402ece5a5_3_1.png)


    ### Laura Sach


    Laura leads the A Level team at the Raspberry Pi Foundation, creating resources
    for students to learn about Computer Science. She somehow also manages to make
    cakes, hug cats, and wrangle a toddler.


    ## Welcome!


    This book will show you how to use Python to create some fun graphical user interfaces
    (GUIs) using the guizero library. The guizero library started with the belief
    that there must be an easier way for students in school to create Python GUIs.
    The library itself was born one day on a long train journey from Cambridge, as
    the side project of a secondary school teacher.


    Guizero has grown significantly in terms of features, yet remained true to its
    original aim of being simple but flexible. It is a library for all beginners to
    create with, for teachers to scaffold learning with and for experts to save time
    with.


    We hope that these projects and guizero brings you that little spark of excitement
    to your Python programs. That spark might be anything from a button that does
    something when you click it, to colours in your otherwise black and white Python
    programming, to a full multicoloured Waffle.


    It turns out that with open-source software, even if you don''t know how to get
    the whole way there, if you start, someone will help you. We are grateful to the
    many contributors who have put time and effort into creating guizero, and to the
    thousands of people who have used it in their projects. Enjoy your journey and
    be proud of your creations.


    Laura and Martin


    ## Contents


    **Chapter 1: Introduction to GUIs** 008

    How to install guizero and create your first app


    **Chapter 2: Wanted Poster** 012

    Use styled text and an image to create a poster


    **Chapter 3: Spy Name Chooser** 018

    Make an interactive GUI application


    **Chapter 4: Meme Generator** 026

    Create a GUI application which draws memes


    **Chapter 5: World''s Worst GUI** 036

    Learn good GUI design by doing it all wrong first!


    **Chapter 6: Tic-tac-toe** 044

    Use your GUI to control a simple game


    **Chapter 7: Destroy the Dots** 062

    Learn how to use a Waffle to create a tasty game


    **Chapter 8: Flood It**

    Create a more complex Waffle-based puzzle game


    **Chapter 9: Emoji Match**

    Make a fun picture-matching game


    **Chapter 10: Paint**

    Create a simple drawing application


    **Chapter 11: Stop-frame Animation**

    Build your own stop-frame animated GIF creator


    **Appendix A: Setting up**

    Learn how install Python and an IDE


    **Appendix B: Get started with Python**

    How to start coding in Python


    **Appendix C: Widgets in guizero**

    An overview of the widgets used in guizero


    ## Chapter 1

    Introduction to GUIs

    How to install guizero and create your first app


    ![](img/338ed40e6284f10661b5463402ece5a5_7_0.png)


    WHAT YOU''LL NEED


    You will need a computer (e.g. Raspberry Pi, Apple Mac, Windows or Linux PC) and
    an internet connection for the software installation. You will also need the following
    software installed:


    - **Python 3** (python.org) – see Appendix A

    - **An IDE** (code editor), e.g.: IDLE (installed with Python 3), Thonny (thonny.org),
    Mu (codewith.mu), PyCharm (jetbrains.com/pycharm)

    - **The guizero Python library** (lawsie.github.io/guizero)


    A graphical user interface (GUI, pronounced ''gooey'') is a way of making your
    Python programs easier to use and more exciting. You can add different components
    called ''widgets'' to your interface, allowing lots of different ways for information
    to be entered in to the program and displayed as output. You might want to allow
    people to push a button, to display a piece of text, or even let them choose an
    option from a menu. In this book we will use the guizero library, which has been
    developed with the aim of helping beginners to easily create GUIs.


    Python''s standard GUI package is called tkinter, and is already installed with
    Python on most platforms. The guizero library is a wrapper for tkinter – this
    means that it offers a much simpler way of using Python''s standard GUI library.


    ![](img/338ed40e6284f10661b5463402ece5a5_8_0.png)


    ### Installing guizero


    You will need to install the guizero (**lawsie.github.io/guizero**) Python library
    to create the programs in this book. It is available as a Python package, which
    is reusable code you can download, install, and then use in your programs.


    How you install of guizero will depend on your operating system and the permissions
    you have to control your computer.


    If you have access to the command line / terminal, you can use the following command:


    ```

    bash

    pip3 install guizero

    ```


    Comprehensive installation instructions for guizero are available at **lawsie.github.io/guizero**,
    including options for installing when you have no administration rights to your
    computer and downloadable installations for Windows.


    ### Hello World


    Now that you have guizero installed, let''s check that it''s working and write
    a small ''hello world'' app which is traditional for programmers to write as their
    first program when using a new tool or language.


    | **AIMS OF GUIZERO** |

    | :--- |

    | • Able to be used without installation | • Accessible to young children, but
    able be used for advanced projects |

    | • Remove unnecessary code new learners find difficult to understand | • Good-quality
    documentation with examples |

    | • Sensible widget names | • Generate helpful error messages |


    Open up the editor where you will write your Python code. At the start of every
    guizero program, you will choose the widgets you need from the guizero library
    and import them. You only need to import each widget once, and then you can use
    it in your program as many times as you like.

    At the top of the page, add this code to import the App widget:


    ![](img/338ed40e6284f10661b5463402ece5a5_9_0.png)


    ```python

    from guizero import App

    ```


    All guizero projects begin with a main window which is a container widget called
    an App. At the end of every guizero program, you must tell the program to display
    the app you have just created.

    Add these two lines of code underneath the line where you imported the App widget:


    ```python

    app = App(title="Hello world")

    app.display()

    ```


    Now save and run your code. You should see a GUI window with the title ''Hello
    world'' (Figure 1). Congratulations, you''ve just created your first guizero app!


    ### Adding widgets


    Widgets are the things which appear on the GUI, such as text boxes, buttons, sliders,
    and even plain old pieces of text.

    All widgets go between the line of code to create the App and the `app.display()`
    line. Here is the app you just made, but in this example we have added a Text
    widget:


    ```python

    from guizero import App, Text

    app = App(title="Hello world")

    message = Text(app, text="Welcome to the app")

    app.display()

    ```


    Did you notice that there are two changes (Figure 2)? There is now an extra line
    of code to add the Text widget, and we have also added Text to the list of widgets
    to import on the very first line.

    Let''s look at the Text widget code in a bit more detail:


    ```python

    message = Text(app, text="Welcome to the app")

    ```'
