    ```\n\n## Chapter 8\n\n## Flood It\n\nCreate a more complex Waffle-based puzzle\
    \ game\n\n![](img/338ed40e6284f10661b5463402ece5a5_77_0.png)\n\n‘Flood It’ is\
    \ a game where the aim is to flood the board with all squares the same colour.\
    \ Beginning with the top-left square, players choose a colour to flood into. It\
    \ offers a slightly more complex Waffle-based game.\n\n## Aim of the game\n\n\
    In this example (Figure 1), the top-left square is blue. The player could either\
    \ choose to flood into the single purple square below, or to flood into the yellow\
    \ square to the right.\n\nFlooding the yellow square would be a better move because\
    \ all adjoining yellow squares would also be flooded, and the player is only allowed\
    \ a limited amount of moves before the game ends.\n\n![](img/338ed40e6284f10661b5463402ece5a5_77_1.png)\n\
    \nFigure 1 Flood the squares with one colour\n\n## Set up\n\nDownload (from magpi.cc/floodit)\
    \ and open the starter file, floodit_starter.py. Save it in a sensible place.\n\
    \nIn the variables section, give the variables some values:\n\n- **colours** –\
    \ a list of six colours as strings. These can either be common colour names or\
    \ hex colours. The colour names \"white\", \"black\", \"red\", \"green\", \"blue\"\
    , \"cyan\", \"yellow\", and \"magenta\" will always be available.\n- **board_size**\
    \ – the width/height of the board as an integer; we chose 14. The board is always\
    \ a square.\n- **moves_limit** – how many moves the player is allowed before they\
    \ lose, as an integer; we chose 25.\n\nIn the app section, create an App widget\
    \ and give it a title.\n\n```python\napp = App(\"Flood it\")\napp.display()\n\
    ```\n\nRunning this will result in a standard labelled window (Figure 2).\n\n\
    ![](img/338ed40e6284f10661b5463402ece5a5_78_0.png)\n\n## Create the board\n\n\
    The board is a grid of squares, each containing a randomly selected colour from\
    \ the list you created earlier.\n\nInside the app, add a Waffle widget. This will\
    \ create a grid which will be the board.\n\n```python\nboard = Waffle(app)\n```\n\
    \n![](img/338ed40e6284f10661b5463402ece5a5_79_0.png)\n\nRun your program and you\
    \ will see that the grid is a bit too small (**Figure 3**).\nAdd to the line of\
    \ code you just wrote to specify parameters for the width and height of the Waffle,\
    \ and make the padding between the grid squares zero.\n\n```python\nboard = Waffle(app,\
    \ width=board_size, height=board_size, pad=0)\n```\n\nThat's better (**Figure\
    \ 4**).\n\n![](img/338ed40e6284f10661b5463402ece5a5_79_1.png)\n\n![](img/338ed40e6284f10661b5463402ece5a5_80_0.png)\n\
    \nFigure 5 You'll need a palette for the player to choose a colour\n\n## Create\
    \ the palette\n\nThe palette shows the player which colours they can click on\
    \ to flood the board. They will click on these colours to play the game. The palette\
    \ from the finished game is shown in **Figure 5**.\nOn the line after you created\
    \ the board, create another Waffle, but this time it should be called `palette`.\n\
    \n```python\npalette = Waffle(app)\n```\n\nRemember when you added the parameters\
    \ to the board Waffle in the previous step? This time, add these parameters to\
    \ the `palette` Waffle with each one separated by a comma:\n\n- `width` = 6 (the\
    \ number of colours we have)\n- `height` = 1\n- `dotty` = True (this makes the\
    \ squares into circles)\n\n![](img/338ed40e6284f10661b5463402ece5a5_81_0.png)\n\
    \nSo, now you should have:\n\n```python\npalette = Waffle(app, width=6, height=1,\
    \ dotty=True)\n```\n\nRun the code to see a blank palette (**Figure 6**).\n\n\
    ## Colour in the board\n\nThe board should start off with each square as a randomly\
    \ chosen colour from the colours list you created earlier.\n\nOn the line below\
    \ your palette, write a call to a function\n\n```python\nfill_board()\n```\n\n\
    Find the functions section in your program, and begin writing the code for this\
    \ new function:\n\n```python\ndef fill_board():\n```\n\nYou can write a nested\
    \ loop to loop through every row and column in the board. Each pixel will be coloured\
    \ with a randomly chosen colour from the list. To colour in a pixel, you will\
    \ use this code, where the ? symbols will be replaced with the x, y co-ordinates\
    \ of the pixel:\n\n```python\nboard.set_pixel(?, ?, random.choice(colours))\n\
    ```\n\nTry to write the code yourself using what you have learnt about nested\
    \ loops in the previous chapters – the solution is provided on page 83 if you\
    \ get stuck.\n\n**Hint:** Use the `board_size` variable to know how many times\
    \ to loop.\n\nWhen you run your code, you should see a colourful board. If you\
    \ see a white board, double-check that you put in the function call to `fill_board()`\
    \ (**Figure 7**).\n\n![](img/338ed40e6284f10661b5463402ece5a5_82_0.png)\n\n▲ Figure\
    \ 7 Each square of the board is coloured randomly\n\nHere is one solution, but\
    \ there are many ways you could do this:\n\n```python\ndef fill_board():\n   \
    \ for x in range(board_size):\n        for y in range(board_size):\n         \
    \   board.set_pixel(x, y, random.choice(colours))\n```\n\nAn alternative solution\
    \ which uses a more advanced feature called a list comprehension:\n\n```python\n\
    def fill_board():\n    [board.set_pixel(x, y, random.choice(colours)) for y in\
    \ range(board_size) for x in range(board_size)]\n```\n\n## Colour in the palette\n\
    \nNow that you have a colourful board, let's colour in the palette.\nOn the line\
