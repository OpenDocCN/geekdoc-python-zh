    IDLE usually comes pre-installed with Python


    # IDEs


    # IDLE


    IDLE is a basic IDE which is usually automatically installed alongside Python.
    Once IDLE starts, the first thing you’ll see is a window titled ‘Python 3.8.5
    Shell’ (the number may be different depending on which exact version you have).
    This window is called the *shell* and you can use it to type a line of Python
    code and see the code run straight away.


    For example, try typing the following:

    **6 + 2**


    Use the File menu > New file to open a Python file. A file allows you to type
    multiple lines of code and then run them all, rather than each line running immediately
    when you press **ENTER**. You can run the program by going to the Run menu and
    choosing Run Module – or by pressing **F5** on the keyboard. If an error occurs,
    you will see any error messages in the shell window.'
