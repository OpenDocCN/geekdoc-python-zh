    All guizero projects begin with a main window which is a container widget called
    an App. At the end of every guizero program, you must tell the program to display
    the app you have just created.

    Add these two lines of code underneath the line where you imported the App widget:


    ```

    python

    app = App(title="Hello world")

    app.display()

    ```


    Now save and run your code. You should see a GUI window with the title ''Hello
    world'' (Figure 1). Congratulations, you''ve just created your first guizero app!


    # Adding widgets


    Widgets are the things which appear on the GUI, such as text boxes, buttons, sliders,
    and even plain old pieces of text.

    All widgets go between the line of code to create the App and the `app.display()`
    line. Here is the app you just made, but in this example we have added a Text
    widget:


    ```

    python

    from guizero import App, Text

    app = App(title="Hello world")

    message = Text(app, text="Welcome to the app")

    app.display()

    ```


    Did you notice that there are two changes (Figure 2)? There is now an extra line
    of code to add the Text widget, and we have also added Text to the list of widgets
    to import on the very first line.

    Let''s look at the Text widget code in a bit more detail:


    ```

    python

    message = Text(app, text="Welcome to the app")

    ```'
- md: '## Chapter 2

    ### Wanted Poster

    Use styled text and an image to create a poster


    Now that you can create a basic GUI, let''s make it look a bit more exciting.
    You can add text in different fonts, sizes and colours, change the background
    colour, and add pictures too. To practise all of this, let''s create a ''Wanted''
    poster.


    First of all, you need to start off by creating an app. In your editor, add this
    code to create the most basic app window:


    ```python

    from guizero import App


    app = App("Wanted!")


    app.display()

    ```


    Save and run your code and you should see an app that looks like a plain grey
    square with the title ''Wanted!'' at the top (Figure 1).


    Figure 1 The basic app


    ### Background colours


    Let''s make the background of the app a bit different. Traditionally, wanted posters
    look like they are made of parchment, so let''s add a pale yellow colour instead
    as the background.


    Find the line of code where you create the app. Immediately after this line of
    code, add one more line of code to modify the bg property of the window. In this
    case, bg is short for ''background'' and will let us change the colour of the
    background. Now your code should look like this:


    ```python

    from guizero import App


    app = App("Wanted!")

    app.bg = "yellow"


    app.display()

    ```


    This is called editing a property. In the code, you need to specify the widget
    you are talking about (app), the property you want to change (bg) and the value
    you want to change it to.


    You might think this colour (**Figure 2**) is a bit too yellow, so let''s look
    up the hex code of a different yellow colour. There are lots of websites where
    you can search for colours, for example you could try **htmlcolorcodes.com** (**Figure
    3**).


    When you have selected the colour you want, you will see its code displayed on
    the site either as hexadecimal (in this case #FBFBD0) or as RGB (251, 251, 208).
    You can use both of these formats for setting colours in guizero; for example,
    you could delete the code for making your background yellow and then try one of
    these options in your program:


    ```python

    app.bg = "#FBFBD0"

    app.bg = (251, 251, 208)

    ```


    Figure 4 Pale background


    ### Add some text


    Your app should look something like **Figure 4**. Now let''s add some text to
    the GUI. We will begin by adding the text that all good wanted posters need –
    the word ''Wanted''!


    First, look for the line of code you already have where you imported the App.


    ```python

    from guizero import App

    ```


    You need to import Text to be able to create a piece of text, so add it to the
    end of the list. Now the line looks like this:


    ```python

    from guizero import App, Text

    ```


    Every time you want to use a new type of widget, add its name to the end of the
    list. There is no need to keep adding whole new lines of code: just stick with
    one list so that your program doesn''t get too confusing.


    Now that you can use text, let''s add a piece of text. Remember that all widgets
    on the GUI must be added between the line of code where you create the App and
    the line of code where you display it. Your code should now look like this:


    ```python

    from guizero import App, Text


    app = App("Wanted!")

    app.bg = "#FBFBD0"


    wanted_text = Text(app, "WANTED")


    app.display()

    ```


    Let''s take a closer look at that line of code you just added.


    ```python

    wanted_text = Text(app, "WANTED")

    ```


    Here, `wanted_text` is the name of the piece of text. This is so that we can talk
    about it later on in the code – think of it like a person''s name. (You could
    even call your piece of text Dave if you want – the computer won''t care!)


    Inside the brackets we have two things. The second one, "WANTED", is straightforward
    as it is the text we would like to display on the screen. The first is the container
    which controls this piece of text, which is called its ''master''. In this case
    we are saying that this text should be controlled by the app. When you first start
    creating GUIs, most of your widgets will have the app as their master, but there
    are other containers that can store widgets that you will learn about later on.


    ### Change text size and colour


    Uh oh, this text is pretty small (Figure 5). Let''s change the `text_size` property
    in exactly the same way as you did when we changed the background colour of the
    app. Remember that you needed to specify three things:


    1.  The name of the widget

    2.  Which property to change

    3.  The new value to change it to


    So, in this case you are going to specify the widget (`wanted_text`), the property
    to change (`text_size`) and the new value (50). Add one new line of code immediately
    under the line where you created the text, to change the property.


    ```python

    wanted_text = Text(app, "WANTED")

    wanted_text.text_size = 50

    ```


    You now have larger text on your poster (Figure 6). See if you can now change
    the font of this text to something different. Which fonts are available depends
    on which operating system you are using, so here are some suggestions:


    - Times New Roman

    - Verdana

    - Courier

    - Impact


    No ‘wanted’ poster would be complete without a picture, so let’s add one. My poster
    is going to be for my cat, because she is always scratching things she shouldn’t
    be.


    Save a copy of the image you would like to use in the same folder as your GUI
    program. You can use images in other folders, but if you do you will have to provide
    the path to the image, so it’s a lot easier to just store them in the same folder
    when you are starting out.


    > IMAGE MANIPULATION

    > Because guizero is a library for beginners and we wanted to make it as easy
    as possible to install, it does not come with the fancier image manipulation functions
    as these require an extra library called ‘pillow’. You can always use non-animated
    GIF images on any platform, and PNG images on all platforms except Mac, so if
    you’re not sure whether you have installed the extra image manipulation functions,
    stick to those image types.


    Hopefully you’re now getting used to adding widgets. Remember that they must always
    be imported at the top of the program, and then the widget created with a sensible
    name after the line of code where you create the App, but before the final `app.display()`
    line.


    Add ‘Picture’ to the list of widgets to import at the start of the program.


    ```python

    from guizero import App, Text, Picture

    ```


    Now create a Picture widget with two parameters: the app and the file name of
    the picture. This is the code we used because our picture was called **tabitha.png**.


    ```python

    cat = Picture(app, image="tabitha.png")

    ```


    Run your code (which should look like **02-wanted.py**) again and you should see
    the picture displaying below your text (**Figure 7**).


    Now it’s up to you to use your new GUI customisation skills to style your poster
    however you would like.'
  mdcn: '## 第二章

    ### 通缉令海报

    使用样式化文本和图片创建一张海报


    既然你已经能创建基本的图形用户界面（GUI），让我们把它做得更有趣一些。你可以添加不同字体、大小和颜色的文本，更改背景颜色，还可以添加图片。为了练习所有这些，我们来创建一张“通缉令”海报。


    首先，你需要创建一个应用程序。在你的编辑器中，添加以下代码来创建最基本的应用程序窗口：


    ```python

    from guizero import App


    app = App("Wanted!")


    app.display()

    ```


    保存并运行你的代码，你应该会看到一个应用程序，它看起来像一个纯灰色的方块，顶部有标题“Wanted!”（图1）。


    图1 基本应用程序


    ### 背景颜色


    让我们让应用程序的背景与众不同一些。传统的通缉令海报看起来像是用羊皮纸做的，所以让我们添加一种淡黄色作为背景。


    找到你创建应用程序的那行代码。紧接着这行代码之后，再添加一行代码来修改窗口的 `bg` 属性。在这里，`bg` 是“background”（背景）的缩写，它将允许我们更改背景颜色。现在你的代码应该如下所示：


    ```python

    from guizero import App


    app = App("Wanted!")

    app.bg = "yellow"


    app.display()

    ```


    这被称为编辑属性。在代码中，你需要指定你正在谈论的控件（`app`）、你想要更改的属性（`bg`）以及你想要将其更改为的值。


    你可能觉得这个颜色（**图2**）有点太黄了，所以让我们查找另一种黄色的十六进制代码。有很多网站可以搜索颜色，例如你可以尝试 **htmlcolorcodes.com**（**图3**）。


    当你选择了想要的颜色后，你会看到它的代码以十六进制（在这种情况下是 #FBFBD0）或 RGB（251, 251, 208）的形式显示在网站上。在 guizero
    中设置颜色时，你可以使用这两种格式；例如，你可以删除使背景变黄的代码，然后在你的程序中尝试以下选项之一：


    ```python

    app.bg = "#FBFBD0"

    app.bg = (251, 251, 208)

    ```


    图4 淡色背景


    ### 添加一些文本


    你的应用程序现在应该看起来像**图4**。现在让我们向 GUI 添加一些文本。我们将从添加所有好的通缉令海报都需要的文本开始——“Wanted”这个词！


    首先，找到你已经导入了 `App` 的那行代码。


    ```python

    from guizero import App

    ```


    你需要导入 `Text` 才能创建一段文本，所以将其添加到列表的末尾。现在这行代码如下所示：


    ```python

    from guizero import App, Text

    ```


    每次你想使用一种新类型的控件时，只需将其名称添加到列表的末尾即可。没有必要不断添加全新的代码行：只需坚持使用一个列表，这样你的程序就不会变得太混乱。


    既然你可以使用文本了，让我们添加一段文本。记住，GUI 上的所有控件都必须添加在创建 `App` 的代码行和显示它的代码行之间。你的代码现在应该如下所示：


    ```python

    from guizero import App, Text


    app = App("Wanted!")

    app.bg = "#FBFBD0"


    wanted_text = Text(app, "WANTED")


    app.display()

    ```


    让我们仔细看看你刚刚添加的那行代码。


    ```python

    wanted_text = Text(app, "WANTED")

    ```


    这里，`wanted_text` 是这段文本的名称。这样我们就可以在代码的后面引用它——把它想象成一个人的名字。（你甚至可以把你的文本命名为 Dave，计算机不会在意的！）


    在括号内，我们有两样东西。第二个是 "WANTED"，这很直接，因为它就是我们想要在屏幕上显示的文本。第一个是控制这段文本的容器，被称为它的“主控件”（master）。在这个例子中，我们是在说这段文本应该由应用程序控制。当你刚开始创建
    GUI 时，你的大多数控件都会以应用程序作为它们的主控件，但还有其他可以存储控件的容器，你将在后面学到。


    ### 更改文本大小和颜色


    哎呀，这段文本太小了（图5）。让我们用与更改应用程序背景颜色完全相同的方式更改 `text_size` 属性。记住，你需要指定三样东西：


    1.  控件的名称

    2.  要更改的属性

    3.  要更改为的新值


    所以，在这个例子中，你将指定控件（`wanted_text`）、要更改的属性（`text_size`）和新值（50）。在创建文本的那行代码正下方添加一行新代码来更改属性。


    ```python

    wanted_text = Text(app, "WANTED")

    wanted_text.text_size = 50

    ```


    现在你的海报上有了更大的文本（图6）。看看你是否能将这段文本的字体更改为其他不同的字体。可用的字体取决于你使用的操作系统，所以这里有一些建议：


    - Times New Roman

    - Verdana

    - Courier

    - Impact


    没有图片的“通缉令”海报是不完整的，所以让我们添加一张。我的海报将为我的猫而做，因为她总是抓挠不该抓的东西。


    将你想使用的图像副本保存在与你的 GUI 程序相同的文件夹中。你可以使用其他文件夹中的图像，但如果你这样做，你将必须提供图像的路径，所以当你刚开始时，将它们存储在同一个文件夹中要容易得多。


    > 图像处理

    > 因为 guizero 是一个面向初学者的库，我们希望它尽可能易于安装，所以它不包含更高级的图像处理功能，因为这些功能需要一个名为“pillow”的额外库。你始终可以在任何平台上使用非动画
    GIF 图像，以及在除 Mac 以外的所有平台上使用 PNG 图像，所以如果你不确定是否安装了额外的图像处理功能，请坚持使用这些图像类型。


    希望你现在已经习惯了添加控件。记住，它们必须始终在程序顶部导入，然后在创建 `App` 的代码行之后、最终的 `app.display()` 行之前，用一个合理的名称创建控件。


    在程序开头的控件导入列表中添加“Picture”。


    ```python

    from guizero import App, Text, Picture

    ```


    现在创建一个 `Picture` 控件，包含两个参数：应用程序和图片的文件名。这是我们使用的代码，因为我们的图片名为 **tabitha.png**。


    ```python

    cat = Picture(app, image="tabitha.png")

    ```


    再次运行你的代码（它应该看起来像 **02-wanted.py**），你应该会看到图片显示在文本下方（**图7**）。


    现在轮到你运用新的 GUI 自定义技能，按照你喜欢的任何方式来设计你的海报了。'
