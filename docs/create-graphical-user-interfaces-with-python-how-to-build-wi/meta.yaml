    color = Combo(tools, options=[\"black\", \"white\", \"red\", \"green\",\n\"blue\"\
    ], align=\"left\")\n\nText(tools, text=\"Width\", align=\"left\")\nwidth = Slider(tools,\
    \ start=1, end=10, align=\"left\")\n\npainting = Drawing(app, width=\"fill\",\
    \ height=\"fill\")\n\npainting.when_left_button_pressed = start\npainting.when_mouse_dragged\
    \ = draw\n\napp.display()\n```\n\n## Chapter 11\nStop-frame Animation\nBuild your\
    \ own stop-frame animated GIF creator\n\n![](img/338ed40e6284f10661b5463402ece5a5_123_0.png)\n\
    \nThis projects uses a Raspberry Pi Camera Module and guizero to make a stop-frame\
    \ animation application (Figure 1). To complete this project, you will need a\
