    , \"green\", \"blue\", \"orange\"],\n    command=draw_meme,\n    selected=\"blue\"\
    )\n```\n\n现在你的用户可以选择一种颜色。接下来，你需要更改 **draw_meme** 函数，以便在创建表情包中的文本时使用组合框的值。例如：\n\
