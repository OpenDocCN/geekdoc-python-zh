  md: "# Lines between the dots\n\nTo solve this problem, you are going to change\
    \ the program to draw lines between the dots. That way the line made will be continuous\
    \ and be more like a pen or paintbrush.\n\nYou will need to use a `when_left_button_pressed`\
    \ event to store the position of where the line starts. Then draw a straight line\
    \ between where the line starts and next position the mouse was dragged too.\n\
    \nCreate a new function which will be called when the mouse is pressed.\n\n```\n\
    def start(event):\n    painting.last_event = event\n```\n\nAdd this to the app\
    \ section:\n\n```\npainting.when_left_button_pressed = start\n```\n\nThe position\
    \ of where the line starts is stored in the `last_event` variable. Modify the\
    \ `draw` function to draw a line between where the line starts and where the mouse\
    \ has been dragged to.\n\n```\ndef draw(event):\n    painting.line(\n        painting.last_event.x,\
    \ painting.last_event.y,\n        event.x, event.y,\n        color=\"black\",\n\
    \        width=3\n    )\n\n    painting.last_event = event\n```\n\nBy updating\
    \ the `last_event` variable to be the current position of the mouse, the next\
    \ time the mouse is dragged, it will draw another line between this point and\
    \ the next. Your program should look like `paint2.py`. Test it and make sure your\
    \ paintbrush now works properly.\n\n# Change the line width and colour\n\nYou\
    \ only have one colour and thickness for your paintbrush, which limits the drawing\
    \ you can create. Next, you will amend your GUI so you can pick different colours\
    \ and line widths.\n\nAdd two widgets to the GUI capture a colour and width for\
    \ the line.\n\n```\nfrom guizero import App, Drawing, Combo, Slider\n```"
