  md: "Create two new variables to keep track of the first event and the last shape\
    \ drawn when the mouse button is pressed.\n\n```\ndef start(event):\n    painting.last_event\
    \ = event\n    painting.first_event = event\n    painting.last_shape = None\n\
    ```\n\nThese variables will be used when drawing and deleting the rectangle before\
    \ the mouse button is released.\nAdd this code to your draw function to draw a\
