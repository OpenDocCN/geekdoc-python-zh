  md: "# Drawing dots\n\nThe first step is to create a simple application which will\
    \ use the Drawing widget and the **when_mouse_dragged** event to draw dots (or\
    \ ovals on the screen).\nIn the imports section of your otherwise blank program,\
    \ add the widgets:\n\n```\nfrom guizero import App, Drawing\n```\n\nCreate a new\
    \ function:\n\n```\ndef draw(event):\n    painting.oval(\n        event.x - 1,\
    \ event.y - 1,\n        event.x + 1, event.y + 1,\n        color=\"black\")\n\
    ```\n\nAdd this code to the app section:\n\n```\napp = App(\"Paint\")\n\npainting\
    \ = Drawing(app, width=\"fill\", height=\"fill\")\n\npainting.when_mouse_dragged\
    \ = draw\n\napp.display()\n```\n\nYour code should resemble **paint1.py** (page\
    \ 116). The Drawing widget fills all the available space on the window. When the\
    \ mouse is dragged across the drawing, the function **draw** is called which draws\
    \ ovals on the **painting**.\nThe **draw** function is called each time an event\
    \ is raised. The event which contains the x and y position of the mouse is passed\
    \ as a variable to the function.\nThere is a problem, though. Unless you move\
    \ your mouse very slowly, a series of dots is drawn by your program, not a continuous\
    \ line (**Figure 2**). It's not a very good paintbrush! There are gaps between\
    \ the dots because an event is not raised for every pixel the mouse crosses.\n\
    \n![](img/338ed40e6284f10661b5463402ece5a5_110_0.png)\n\n▲ Figure 2 Not a very\
    \ good paintbrush"
  merge: -1
  pgno: 110
