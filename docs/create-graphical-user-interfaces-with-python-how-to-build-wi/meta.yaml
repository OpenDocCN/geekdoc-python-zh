    # Pop-ups


    No terrible GUI would be complete without a pop-up box. guizero contains a number
    of pop-up boxes, which can be used to let users know something important or gather
    useful information. They can also be used to irritate and annoy users!


    First, create an application which pops up a pointless box at the start to let
    you know the application has started.


    ![](img/338ed40e6284f10661b5463402ece5a5_38_0.png)


    ```

    python

    from guizero import App


    app = App(title="pointless pop-ups")


    app.info("Application started", "Well done you started the application")


    app.display()

    ```


    Running your application, you will see that an ''info'' box appears (**Figure
    3**). The first parameter passed to info is the title of the window; the second
    parameter is the message.


    You can change the style of this simple pop-up by using **warn** or **error**
    instead of **info**.


    Pop-up boxes can also be used to get information from the user. The simplest is
    a **yesno** which will ask the user a question and get a True or False response.
    This is useful if you want a user to confirm before doing something, such as deleting
    a file. Perhaps not every time they press a button, though!


    Import the PushButton widget into your application:


    ```

    python

    from guizero import App, PushButton

    ```


    Create a function which uses the **yesno** pop-up to ask for confirmation.'
