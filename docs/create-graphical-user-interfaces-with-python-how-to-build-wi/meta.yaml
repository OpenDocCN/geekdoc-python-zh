    \n![img](img/338ed40e6284f10661b5463402ece5a5_62_0.png)\n\n图1 在红色圆点占据棋盘之前消灭它们\n\
    \n## 设置游戏\n\n让我们从创建一个包含游戏说明和华夫饼控件的guizero程序开始。到现在，你应该已经熟悉标准guizero程序的布局，包括导入部分、函数部分、变量部分和应用本身。\n\
