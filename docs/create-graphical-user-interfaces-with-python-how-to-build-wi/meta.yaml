  md: "# Solution: add a score\n\nFirst, add a variable in your variables section\n\
    \n```\nscore = 0\n```\n\nNext, add a new Text widget in the app section to display\
    \ the score:\n\n```\nscore_display = Text(app, text=\"Your score is \" + str(score))\n\
    ```\n\nFinally, add 1 to the score every time a dot is destroyed:\n\n```\ndef\
    \ destroy_dot(x,y):\n\n    # Declare score global\n    global score\n\n    # This\
    \ code already exists\n    if board[x,y].dotty == True:\n        board[x,y].dotty\
    \ = False\n        board.set_pixel(x, y, \"white\")\n\n        # Add 1 to score\
    \ and display it on the GUI\n        score += 1\n        score_display.value =\
    \ \"Your score is \" + str(score)\n```\n\nYour code (without the optional comments)\
    \ should now resemble **destroy5.py**. Test your game and you should see your\
    \ score go up by 1 every time you click on a dot.\n\n# Put the player under pressure\n\
    \nNow that you can track the player's score, you can use it to put the player\
    \ under pressure and speed up the spawn of dots if they are doing well.\n\nRemember\
    \ that you used an after call inside the **add_dot** function to schedule another\
    \ dot in 1000 milliseconds (or 1 second)? Go back and find that line – you're\
    \ going to change it a bit.\n\nFirst, create a variable speed and set it to 1000.\
    \ Then, instead of scheduling a call to add a dot after 1000 ms, schedule it to\
    \ add a dot after speed milliseconds. This will have absolutely no effect on the\
    \ game... yet. You are still scheduling the next call after 1000 ms, but that\
    \ figure is now coming from the variable speed instead of being hard-coded as\
    \ a magic number.\n\n```\nspeed = 1000\nboard.after(speed, add_dot)\n```"
  merge: -1
  pgno: 67
- img_proc: true
  md: "Now here's how you can ramp up the pressure. Between these two lines of code,\
    \ you can add some code to set the speed of dots depending on the current score.\
    \ Here is an example:\n\n```\nspeed = 1000\nif score > 30:\n    speed = 200\n\
    elif score > 20:\n    speed = 400\nelif score > 10:\n    speed = 500\nboard.after(speed,\
