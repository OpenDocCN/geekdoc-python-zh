    \nThe Drawing widget is really versatile and can be used to display lots of different\
    \ shapes, patterns, and images.\nTo find out more about the Drawing widget, see\
    \ Appendix C, or take a look at the online documentation: **lawsie.github.io/guizero/drawing**."
