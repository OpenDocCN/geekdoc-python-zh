  md: '# Add some names


    On a new line, add a list of first names. You can choose the names in your list
    and there can be as many names as you like, but make sure that each name is between
    quotes, and the names are each separated by a comma. A collection of letters,
    numbers, and/or punctuation between quotation marks is called a *string*, so we
    say that each name must be a string.


    ![](img/338ed40e6284f10661b5463402ece5a5_20_0.png)


    ```

    first_names = ["Barbara", "Woody", "Tiberius", "Smokey", "Jennifer", "Ruby"]

    ```


    Now add a list of last names as well:


    ```

    last_names = ["Spindleshanks", "Mysterioso", "Dungeon", "Catseye", "Darkmeyer",
    "Flamingobreath"]

    ```


    Now you will need to add a way of choosing a random name from each list to form
    your spy name. Your first job is to add a new import line in your imports section:


    ```

    from random import choice

    ```


    This tells the program that you would like to use a function called choice which
    chooses a random item from a list. Someone else has written the code which does
    this for you, and it is included with Python for you to use.

    In your code for the **choose_name** function, just below your lists of names,
    add a line of code to choose your spy''s first name, and then concatenate it together
    with the last name, with a space in between. Concatenate is a fancy word that
    means ''join two strings together'' and the symbol in Python for concatenation
    is a plus (+).


    ```

    spy_name = choice(first_names) + " " + choice(last_names)

    print(spy_name)

    ```


    Your code should now resemble **spy3.py**. Save and run it. When you press the
    button, you should see that a randomly generated spy name appears in your console
    or shell, in the same place where the original "Button was pressed" message showed
    up before (**Figure 4**).'
