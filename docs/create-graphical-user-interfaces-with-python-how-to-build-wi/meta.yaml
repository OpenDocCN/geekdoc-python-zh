  md: '> ## CONSISTENT CAPTURES


    As the camera is using "auto", each time a image is captured, the setting used
    may change. This will cause each image to be slightly different and will cause
    a flickering in your animation.


    By fixing the camera settings when the program starts, you can stop this from
    happening.


    The required settings will depend on the lighting where you are taking picture.


    This article from the picamera documentation provides more information and example
    settings: rpf.io/picamera-consistent.


