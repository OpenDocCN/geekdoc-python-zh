    \n```python\ndef draw_meme():\n    meme.clear()\n    meme.image(0, 0, \"woodpecker.png\"\
    )\n    meme.text(20, 20, top_text.value)\n    meme.text(20, 320, bottom_text.value)\n\
    ```\n\n`meme.image(0, 0)` 和 `meme.text(20, 20)` 中的前两个数字是绘制图像和文本的x、y坐标。图像绘制在位置0,\
