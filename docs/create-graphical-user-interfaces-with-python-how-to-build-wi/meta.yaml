    \ is not None:\n            painting.delete(painting.last_shape)\n\n        rectangle\
    \ = painting.rectangle(\n            painting.first_event.x, painting.first_event.y,\n\
    \            event.x, event.y,\n            color=color.value\n        )\n\n \
    \       painting.last_shape = rectangle\n\n    painting.last_event = event\n\n\
    # -------------------------\n# App\n# -------------------------\n\napp = App(\"\
