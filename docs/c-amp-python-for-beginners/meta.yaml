  md: "# Strings\n\nSTEP 5 There are also many different operations that you can apply\
    \ with the string function. For instance, to get the length of a string you can\
    \ use:\n\n```\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n \
    \   string greet = \"Welcome\";\n    cout << \"The length of the string is: \"\
    ;\n    cout << greet.size() << \"\\n\";\n}\n```\n\n![](img/840275566c862102888f27d8ae2ac921_72_0.png)\n\
    \nSTEP 6 You can see that we used greet.size() to output the length, the number\
    \ of characters there are, of the contents of the string. Naturally, if you call\
    \ your string something other than greet, then you need to change the command\
    \ to reflect this. It's always stringname.operation. Build and run the code to\
    \ see the results.\n\n![](img/840275566c862102888f27d8ae2ac921_72_1.png)\n\nSTEP\
    \ 7 You can of course add strings together, or rather combine them to form longer\
    \ strings:\n\n```\n#include <iostream>\nusing namespace std;\n\nint main ()\n\
    {\n    string greet1 = \"Hello\";\n    string greet2 = \", world!\";\n    string\
    \ greet3 = greet1 + greet2;\n\n    cout << greet3 << \"\\n\";\n}\n```\n\n![](img/840275566c862102888f27d8ae2ac921_72_2.png)\n\
    \nSTEP 8 Just as you might expect, you can mix in an integer and store something\
    \ to do with the string. In this example, we created int length, which stores\
    \ the result of string.size() and outputs it to the user:\n\n```\n#include <iostream>\n\
    using namespace std;\n\nint main ()\n{\n    int length;\n    string greet1 = \"\
    Hello\";\n    string greet2 = \", world!\";\n    string greet3 = greet1 + greet2;\n\
    \n    length = greet3.size();\n\n    cout << \"The length of the combined strings\
    \ is: \" << length << \"\\n\";\n}\n```\n\nSTEP 9 Using the available operations\
    \ that come with the string function, you can manipulate the contents of a string.\
    \ For example, to remove characters from a string you could use:\n\n```\n#include\
    \ <iostream>\nusing namespace std;\n\nint main ()\n{\n    string strg (\"Here\
    \ is a long sentence in a string.\");\n    cout << strg << '\\n';\n\n    strg.erase\
    \ (10,5);\n    cout << strg << '\\n';\n\n    strg.erase (strg.begin()+8);\n  \
    \  cout << strg << '\\n';\n\n    strg.erase (strg.begin()+9, strg.end()-9);\n\
    \    cout << strg << '\\n';\n}\n```\n\nSTEP 10 It's worth spending some time playing\
    \ around with the numbers, which are the character positions in the string. Occasionally,\
    \ it can be hit and miss whether you get it right, so practice makes perfect.\
    \ Take a look at the screenshot to see the result of the code.\n\n![](img/840275566c862102888f27d8ae2ac921_72_3.png)"
