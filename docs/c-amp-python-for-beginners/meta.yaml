- md: '## How to Set Up Python in Linux


    STEP 5 However, if you want the latest version, 3.6.2 as per the Python website
    at the time of writing, you need to build Python from source. Start by entering
    these commands into the Terminal:


    ```

    sudo apt-get install build-essential checkinstall

    sudo apt-get install libreadline-gplv2-dev libncursesw5-dev libssl-dev libsqlite3-dev
    tk-dev libgdbm-dev libc6-dev libbz2-dev

    ```


    STEP 6 Open up your Linux web browser and go to the Python download page: www.python.org/downloads.
    Click on the Download Python 3.6.2 (or whichever version it''s on when you look)
    to download the source Python-3.6.2.tar.xz file.


    STEP 7 In the Terminal, go the Downloads folder by entering: `cd Downloads/`.
    Then unzip the contents of the downloaded Python source code with: `tar -xvf Python-3.6.2.tar.xz`.
    Now enter the newly unzipped folder with `cd Python-3.6.2/`.


    STEP 8 Within the Python folder, enter:


    ```

    ./configure

    sudo make altinstall

    ```


    This could a little while depending on the speed of your computer. Once finished,
    enter: `python3.6 --version` to check the installed latest version.


    STEP 9 For the GUI IDLE, you need to enter the following command into the Terminal:


    ```

    sudo apt-get install idle3

    ```


    The IDLE can then be started with the command: `idle3`. Note, that IDLE runs a
    different version from the one you installed from source.


    STEP 10 You also need PIP (Pip Installs Packages) which is a tool to help you
    install more modules and extras.


    Enter: `sudo apt-get install python3-pip`


    PIP is then installed; check for the latest update with:


    ```

    pip3 install --upgrade pip

    ```


    When complete, close the Terminal and Python 3.x will be available via the Programming
    section in your distro''s menu.


    ## Getting Started with Python


    Getting started with Python may seem a little daunting at first but the language
    has been designed with simplicity in mind. Like most things, you need to start
    slowly, learn how to get a result and how to get what you want from the code.


    In this section, we cover variables, numbers and expressions, user input, conditions
    and loops; and the types of errors you may well come across in your time with
    Python.


    ## Starting Python for the First Time


    We''re going to be using the Raspberry Pi as our Python 3 hardware platform. The
    latest version of Raspbian comes preinstalled with Python 3, version 3.4.2 to
    be exact, so as long as you have a version 3 Shell, all our code will work.


    ### STARTING PYTHON


    We''re not going to go into the details of getting the Raspberry Pi up and running,
    there''s plenty of material already available on that subject. However, once you''re
    ready, fire up your Pi and get ready for coding.


    **STEP 1** With the Raspbian desktop loaded, click on the Menu button followed
    by Programming > Python 3 (IDLE). This opens the Python 3 Shell. Windows and Mac
    users can find the Python 3 IDLE Shell from within the Windows Start button menu
    and via Finder.


    **STEP 2** The Shell is where you can enter code and see the responses and output
    of code you''ve programmed into Python. This is a kind of sandbox, where you''re
    able to try out some simple code and processes.


    **STEP 3** For example, in the Shell enter: 2+2 After pressing Enter, the next
    line displays the answer: 4. Basically, Python has taken the ''code'' and produced
    the relevant output.


    **STEP 4** The Python Shell acts very much like a calculator, since code is basically
    a series of mathematical interactions with the system. Integers, which are the
    infinite sequence of whole numbers can easily be added, subtracted, multiplied
    and so on.


    **STEP 5** While that''s very interesting, it''s not particularly exciting. Instead,
    try this:


    `print("Hello everyone!")`


    Just like the code we entered in Sublime in the Installing a Text Editor section
    of this book.


    **STEP 6** This is a little more like it, since you''ve just produced your first
    bit of code. The Print command is fairly self-explanatory, it prints things. Python
    3 requires the brackets as well as quote marks in order to output content to the
    screen, in this case the ''Hello everyone!'' bit.


    ```

    >>> print("Hello everyone!")

    Hello everyone!

    >>> |

    ```


    **STEP 7** You may have noticed the colour coding within the Python IDLE. The
    colours represent different elements of Python code. They are:


    Black – Data and Variables

    Green – Strings

    Purple – Functions

    Orange – Commands

    Blue – User Functions

    Dark Red – Comments

    Light Red – Error Messages


    **STEP 8** The Python IDLE is a configurable environment. If you don''t like the
    way the colours are represented, then you can always change them via Options >
    Configure IDLE and clicking on the Highlighting tab. However, we don''t recommend
    that, as you won''t be seeing the same as our screenshots.


    **STEP 9** Just like most programs available, regardless of the operating system,
    there are numerous shortcut keys available. We don''t have room for them all here
    but within the Options > Configure IDLE and under the Keys tab, you can see a
    list of the current bindings.


    **STEP 10** The Python IDLE is a power interface and one that''s actually been
    written in Python using one of the available GUI toolkits. If you want to know
    the many ins and outs of the Shell, we recommend you take a few moments to view
    **www.docs.python.org/3/library/idle.html**, which details many of the IDLE''s
    features.


    ### IDLE Colour Coding


    | Colour | Use for | Examples |

    | :--- | :--- | :--- |

    | Black | Data & variables | 23.6 area |

    | Green | Strings | "Hello World" |

    | Purple | Functions | len() print() |

    | Orange | Commands | if for else |

    | Blue | User functions | get_area() |

    | Dark red | Comments | #Remember VAT |

    | Light red | Error messages | SyntaxError: |


    ## Your First Code


    Essentially, you''ve already written your first piece of code with the ''print("Hello
    everyone!")'' function from the previous tutorial. However, let''s expand that
    and look at entering your code and playing around with some other Python examples.


    ### PLAYING WITH PYTHON


    With most languages, computer or human, it''s all about remembering and applying
    the right words to the right situation. You''re not born knowing these words,
    so you need to learn them.


    STEP 1 If you''ve closed Python 3 IDLE, reopen it in whichever operating system
    version you prefer. In the Shell, enter the familiar following:

    print("Hello")


    STEP 2 Just as predicted, the word Hello appears in the Shell as blue text, indicating
    output from a string. It''s fairly straightforward and doesn''t require too much
    explanation. Now try:

    print("2+2")


    STEP 3 You can see that instead of the number 4, the output is the 2+2 you asked
    to be printed to the screen. The quotation marks are defining what''s being outputted
    to the IDLE Shell; to print the total of 2+2 you need to remove the quotes:

    print(2+2)


    STEP 4 You can continue as such, printing 2+2, 464+2343 and so on to the Shell.
    An easier way is to use a variable, which is something we will cover in more depth
    later. For now, enter:

    a=2

    b=2'
