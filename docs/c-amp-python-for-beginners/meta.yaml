    be detailed in the IDLE Shell. In this case, the words ''Hello everyone!''.


    ![](img/840275566c862102888f27d8ae2ac921_26_0.png)


    STEP 8 Let''s extend the code and enter a few examples from the previous tutorial:


    ```

    a=2

