    \ = pi * radius * radius;\n    cout << area;\n}\n```\n\n![](img/840275566c862102888f27d8ae2ac921_68_2.png)\n\
    \n![](img/840275566c862102888f27d8ae2ac921_68_3.png)\n\nSTEP 7 You can create\
    \ global variables, which are variables that are declared outside any function\
    \ and used in any function within the entire code. What you've used so far are\
    \ local variables: variables used inside the function. For example:\n\n```\n#include\
    \ <iostream>\nusing namespace std;\nint StartLives = 3;\n\nint main ()\n{\n  \
    \  startLives = StartLives - 1;\n    cout << StartLives;\n}\n```\n\nSTEP 10 A\
    \ couple of new elements here: first, auto won't work unless you go to Settings\
    \ > Compiler and tick the box labelled 'Have G++ follow the C++11 ISO C++ Language\
    \ Standard [-std=c++11]'. Then, the new data type, double, which means double-precision\
    \ floating point value. Enable C++11, then build and run the code. The result\
    \ should be 7.06858.\n\n![](img/840275566c862102888f27d8ae2ac921_68_4.png)\n\n\
    ![](img/840275566c862102888f27d8ae2ac921_68_5.png)"
  - "[PAGE 69]\n\n# Data Types\n\nVariables, as we've seen, store information that\
    \ the programmer can then later call up, and manipulate if required. Variables\
    \ are simply reserved memory locations that store the values the programmer assigns,\
    \ depending on the data type used.\n\n# THE VALUE OF DATA\n\nThere are many different\
    \ data types available for the programmer in C++, such as an integer, floating\
    \ point, Boolean, character and so on. It's widely accepted that there are seven\
    \ basic data types, often called Primitive Built-in Types; however, you can create\
    \ your own data types should the need ever arise within your code.\n\nThe seven\
    \ basic data types are:\n\n| TYPE | COMMAND |\n|---|---|\n| Integer | `Integer`\
    \ |\n| Floating Point | `float` |\n| Character | `char` |\n| Boolean | `bool`\
    \ |\n| Double Floating Point | `double` |\n| Wide Character | `wchar_t` |\n| No\
    \ Value | `void` |\n\nThese basic types can also be extended using the following\
    \ modifiers: Long, Short, Signed and Unsigned. Basically this means the modifiers\
    \ can expand the minimum and maximum range values for each data type. For example,\
    \ the int data type has a default value range of -2147483648 to 2147483647, a\
    \ fair value, you would agree.\n\nNow, if you were to use one of the modifiers,\
    \ the range alters:\n\nUnsigned int = 0 to 4294967295\nSigned int = -2147483648\
    \ to 2147483647\nShort int = -32768 to 32767\nUnsigned Short int = 0 to 65,535\n\
    Signed Short int = -32768 to 32767\nLong int = -2147483647 to 2147483647\nSigned\
    \ Long int = -2147483647 to 2147483647\nUnsigned Long int = 0 to 4294967295\n\n\
    Naturally you can get away with using the basic type without the modifier, as\
    \ there's plenty of range provided with each data type. However, it's considered\
    \ good C++ programming practise to use the modifiers when possible.\n\nThere are\
    \ issues when using the modifiers though. Double represents a double-floating\
    \ point value, which you can use for\n\nincredibly accurate numbers but those\
    \ numbers are only accurate up to the fifteenth decimal place. There's also the\
    \ problem when displaying such numbers in C++ using the cout function, in that\
    \ cout by default only outputs the first five decimal places. You can combat that\
    \ by adding a cout.precision () function and adding a value inside the brackets,\
    \ but even then you're still limited by the accuracy of the double data type.\
    \ For example, try this code:\n\n```\n#include <iostream>\nusing namespace std;\n\
    double PI = 3.141592653589793238463;\n\nint main()\n{\n    cout << PI;\n}\n```\n\
    \n![](img/840275566c862102888f27d8ae2ac921_69_0.png)\n\n![](img/840275566c862102888f27d8ae2ac921_69_1.png)\n\
    \nBuild and run the code and as you can see the output is only 3.14159, representing\
    \ cout's limitations in this example.\n\nYou can alter the code including the\
    \ aforementioned cout.precision function, for greater accuracy. Take precision\
    \ all the way up to 22 decimal places, with the following code:\n\n```\n#include\
    \ <iostream>\nusing namespace std;\ndouble PI = 3.141592653589793238463;\n\nint\
    \ main()\n{\n```"
- md: "## Data Types\n\n```cpp\ncout.precision(22);\ncout << PI;\n}\n```\n\nThis is\
    \ mainly due to the conversion from binary in the compiler and that the IEEE 754\
    \ double precision standard occupies 64-bits of data, of which 52-bits are dedicated\
    \ to the significant (the significant digits in a floating-point number) and roughly\
    \ 3.5-bits are taken holding the values 0 to 9. If you divide 53 by 3.5, then\
    \ you arrive at 15.142857 recurring, which is 15-digits of precision.\n\nTo be\
    \ honest, if you're creating code that needs to be accurate to more than fifteen\
    \ decimal places, then you wouldn't be using C++, you would use some scientific\
    \ specific language with C++ as the connective tissue between the two languages.\n\
    \nYou can create your own data types, using an alias-like system called typedef.\
    \ For example:\n\nAgain, build and run the code; as you can see from the command\
    \ line window, the number represented by the variable PI is different to the number\
    \ you've told C++ to use in the variable. The output reads the value of PI as\
    \ 3.141592653589793115998, with the numbers going awry from the fifteenth decimal\
    \ place.\n\n```cpp\n#include <iostream>\nusing namespace std;\ntypedef int metres;\n\
    \nint main()\n{\n    metres distance;\n    distance = 15;\n    cout << \"distance\
    \ in metres is: \" << distance;\n}\n```\n\nThis code when executed creates a new\
    \ int data type called metres. Then, in the main code block, there's a new variable\
    \ called distance, which is an integer; so you're basically telling the compiler\
    \ that there's another name for int. We assigned the value 15 to distance and\
    \ displayed the output: distance in metres is 15.\n\nIt might sound a little confusing\
    \ to begin with but the more you use C++ and create your own code, the easier\
    \ it becomes.\n\n## Strings\n\nStrings are objects that represent and hold sequences\
    \ of characters. For example, you could have a universal greeting in your code\
    \ ‘Welcome’ and assign that as a string to be called up wherever you like in the\
    \ program.\n\n### STRING THEORY\n\nThere are different ways in which you can create\
    \ a string of characters, which historically are all carried over from the original\
    \ C language, and are still supported by C++.\n\n**STEP 1** To create a string\
    \ you use the char function. Open a new C++ file and begin with the usual header:\n\
    \n```cpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n}\n```\n\
    \n**STEP 3** Build and run the code, and ‘Welcome’ appears on the screen. While\
    \ this is perfectly fine, it’s not a string. A string is a class, which defines\
    \ objects that can be represented as a stream of characters and doesn’t need to\
    \ be terminated like an array. The code can therefore be represented as:\n\n```cpp\n\
    #include <iostream>\nusing namespace std;\n\nint main ()\n{\n    char greet[]\
    \ = \"Welcome\";\n    cout << greet << \"\\n\";\n}\n```\n\n**STEP 2** It’s easy\
    \ to confuse a string with an array. Here’s an array, which can be terminated\
    \ with a null character:\n\n```cpp\n#include <iostream>\nusing namespace std;\n\
    \nint main ()\n{\n    char greet[8] = {'W', 'e', 'l', 'c', 'o', 'm', 'e', '\\\
    0'};\n    cout << greet << \"\\n\";\n}\n```\n\n**STEP 4** In C++ there’s also\
    \ a string function, which works in much the same way. Using the greeting code\
    \ again, you can enter:\n\n```cpp\n#include <iostream>\nusing namespace std;\n\
    \nint main ()\n{\n    string greet = \"Welcome\";\n    cout << greet << \"\\n\"\
    ;\n}\n```\n\n**STEP 5** There are also many different operations that you can\
    \ apply with the string function. For instance, to get the length of a string\
    \ you can use:\n\n```cpp\n#include <iostream>\nusing namespace std;\n\nint main\
    \ ()\n{\n    string greet = \"Welcome\";\n    cout << \"The length of the string\
    \ is: \";\n    cout << greet.size() << \"\\n\";\n}\n```\n\n**STEP 6** You can\
    \ see that we used greet.size() to output the length, the number of characters\
    \ there are, of the contents of the string. Naturally, if you call your string\
    \ something other than greet, then you need to change the command to reflect this.\
    \ It's always stringname.operation. Build and run the code to see the results.\n\
    \n**STEP 7** You can of course add strings together, or rather combine them to\
    \ form longer strings:\n\n```cpp\n#include <iostream>\nusing namespace std;\n\n\
    int main ()\n{\n    string greet1 = \"Hello\";\n    string greet2 = \", world!\"\
    ;\n    string greet3 = greet1 + greet2;\n\n    cout << greet3 << \"\\n\";\n}\n\
    ```\n\n**STEP 8** Just as you might expect, you can mix in an integer and store\
    \ something to do with the string. In this example, we created int length, which\
    \ stores the result of string.size() and outputs it to the user:\n\n```cpp\n#include\
    \ <iostream>\nusing namespace std;\n\nint main ()\n{\n    int length;\n    string\
    \ greet1 = \"Hello\";\n    string greet2 = \", world!\";\n    string greet3 =\
    \ greet1 + greet2;\n\n    length = greet3.size();\n\n    cout << \"The length\
    \ of the combined strings is: \" << length << \"\\n\";\n}\n```\n\n**STEP 9** Using\
    \ the available operations that come with the string function, you can manipulate\
    \ the contents of a string. For example, to remove characters from a string you\
    \ could use:\n\n```cpp\n#include <iostream>\nusing namespace std;\n\nint main\
    \ ()\n{\n    string strg (\"Here is a long sentence in a string.\");\n    cout\
    \ << strg << '\\n';\n\n    strg.erase (10,5);\n    cout << strg << '\\n';\n\n\
    \    strg.erase (strg.begin()+8);\n    cout << strg << '\\n';\n\n    strg.erase\
    \ (strg.begin()+9, strg.end()-9);\n    cout << strg << '\\n';\n}\n```\n\n**STEP\
    \ 10** It's worth spending some time playing around with the numbers, which are\
    \ the character positions in the string. Occasionally, it can be hit and miss\
    \ whether you get it right, so practice makes perfect. Take a look at the screenshot\
    \ to see the result of the code.\n\n## C++ Maths\n\nProgramming is mathematical\
    \ in nature and as you might expect, there's plenty of built-in scope for some\
    \ quite intense maths. C++ has a lot to offer someone who's implementing mathematical\
    \ models into their code. It can be extremely complex or relatively simple.\n\n\
    ### C++ = MC²\n\nThe basic mathematical symbols apply in C++ as they do in most\
    \ other programming languages. However, by using the C++ Math Library, you can\
    \ also calculate square roots, powers, trig and more.\n\n**STEP 1** C++'s mathematical\
    \ operations follow the same patterns as those taught in school, in that multiplication\
    \ and division take precedence over addition and subtraction. You can alter that\
    \ though. For now, create a new file and enter:\n\n```cpp\n#include <iostream>\n\
    using namespace std;\n\nint main ()\n{\n    float numbers = 100;\n\n    numbers\
    \ = numbers + 10; // This adds 10 to the initial 100\n    cout << numbers << \"\
    \\n\";\n\n    numbers = numbers - 10; // This subtracts 10 from the new 110\n\
    \    cout << numbers << \"\\n\";\n}\n```\n\n**STEP 3** Multiplication and division\
    \ can be applied as such:\n\n```cpp\n#include <iostream>\nusing namespace std;\n\
    \nint main ()\n{\n    float numbers = 100;\n\n    numbers = numbers * 10; // This\
    \ multiplies 100 by 10\n    cout << numbers << \"\\n\";\n\n    numbers = numbers\
    \ / 10; // And this divides 1000 by 10\n    cout << numbers << \"\\n\";\n}\n```\n\
    \n**STEP 2** While simple, it does get the old maths muscle warmed up. Note that\
    \ we used a float for the numbers variable. While you can happily use an integer,\
    \ if you suddenly started to use decimals, you would need to change to a float\
    \ or a double, depending on the accuracy needed. Run the code and see the results.\n\
    \n**STEP 4** Again, execute the simple code and see the results. While not particularly\
    \ interesting, it's a start into C++ maths. We used a float here, so you can play\
    \ around with the code and multiply by decimal places, as well as divide, add\
    \ and subtract."
  mdcn: "## 数据类型\n\n```cpp\ncout.precision(22);\ncout << PI;\n}\n```\n\n这主要是由于编译器中的二进制转换以及IEEE\
    \ 754双精度标准占用64位数据，其中52位用于有效数字（浮点数中的有效数字），大约3.5位用于存储0到9的值。如果你将53除以3.5，就会得到15.142857的循环小数，也就是15位的精度。\n\
    \n老实说，如果你编写的代码需要精确到小数点后十五位以上，那么你不会使用C++，而是会使用某种科学专用语言，并以C++作为两种语言之间的连接纽带。\n\n\
    你可以使用一种类似别名的系统`typedef`来创建自己的数据类型。例如：\n\n再次构建并运行代码；从命令行窗口可以看到，变量`PI`所表示的数字与你告诉C++在变量中使用的数字不同。输出显示`PI`的值为3.141592653589793115998，数字从第十五位小数开始出现偏差。\n\
    \n```cpp\n#include <iostream>\nusing namespace std;\ntypedef int metres;\n\nint\
    \ main()\n{\n    metres distance;\n    distance = 15;\n    cout << \"distance\
    \ in metres is: \" << distance;\n}\n```\n\n这段代码执行时会创建一个名为`metres`的新`int`数据类型。然后，在主代码块中，有一个名为`distance`的新变量，它是一个整数；所以你基本上是在告诉编译器，`int`还有另一个名字。我们将值15赋给`distance`并显示输出：distance\
    \ in metres is 15。\n\n一开始可能听起来有点令人困惑，但你使用C++并创建自己的代码越多，它就会变得越容易。\n\n## 字符串\n\n\
    字符串是表示和保存字符序列的对象。例如，你可以在代码中有一个通用的问候语‘Welcome’，并将其作为字符串赋值，以便在程序中的任何地方调用。\n\n###\
    \ 字符串理论\n\n有多种方法可以创建字符串，这些方法历史上都源自原始的C语言，并且仍然受到C++的支持。\n\n**步骤1** 要创建字符串，你需要使用`char`函数。打开一个新的C++文件，并以通常的头文件开始：\n\
    \n```cpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n}\n```\n\
    \n**步骤3** 构建并运行代码，‘Welcome’就会出现在屏幕上。虽然这完全没问题，但它不是一个字符串。字符串是一个类，它定义了可以表示为字符流的对象，并且不需要像数组那样终止。因此，代码可以表示为：\n\
    \n```cpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    char\
    \ greet[] = \"Welcome\";\n    cout << greet << \"\\n\";\n}\n```\n\n**步骤2** 很容易将字符串与数组混淆。这是一个数组，可以用空字符终止：\n\
    \n```cpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    char\
    \ greet[8] = {'W', 'e', 'l', 'c', 'o', 'm', 'e', '\\0'};\n    cout << greet <<\
    \ \"\\n\";\n}\n```\n\n**步骤4** 在C++中，还有一个`string`函数，其工作方式大致相同。再次使用问候语代码，你可以输入：\n\
    \n```cpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    string\
    \ greet = \"Welcome\";\n    cout << greet << \"\\n\";\n}\n```\n\n**步骤5** 使用`string`函数还可以应用许多不同的操作。例如，要获取字符串的长度，你可以使用：\n\
    \n```cpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    string\
    \ greet = \"Welcome\";\n    cout << \"The length of the string is: \";\n    cout\
    \ << greet.size() << \"\\n\";\n}\n```\n\n**步骤6** 你可以看到我们使用了`greet.size()`来输出字符串内容的长度，即字符数。当然，如果你将字符串命名为`greet`以外的其他名称，那么你需要更改命令以反映这一点。它总是`stringname.operation`。构建并运行代码以查看结果。\n\
    \n**步骤7** 你当然可以将字符串相加，或者更准确地说，将它们组合成更长的字符串：\n\n```cpp\n#include <iostream>\nusing\
    \ namespace std;\n\nint main ()\n{\n    string greet1 = \"Hello\";\n    string\
    \ greet2 = \", world!\";\n    string greet3 = greet1 + greet2;\n\n    cout <<\
    \ greet3 << \"\\n\";\n}\n```\n\n**步骤8** 正如你所料，你可以混合使用整数并存储与字符串相关的内容。在这个例子中，我们创建了`int\
    \ length`，它存储`string.size()`的结果并将其输出给用户：\n\n```cpp\n#include <iostream>\nusing\
    \ namespace std;\n\nint main ()\n{\n    int length;\n    string greet1 = \"Hello\"\
    ;\n    string greet2 = \", world!\";\n    string greet3 = greet1 + greet2;\n\n\
    \    length = greet3.size();\n\n    cout << \"The length of the combined strings\
    \ is: \" << length << \"\\n\";\n}\n```\n\n**步骤9** 使用`string`函数提供的可用操作，你可以操作字符串的内容。例如，要从字符串中删除字符，你可以使用：\n\
    \n```cpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    string\
    \ strg (\"Here is a long sentence in a string.\");\n    cout << strg << '\\n';\n\
    \n    strg.erase (10,5);\n    cout << strg << '\\n';\n\n    strg.erase (strg.begin()+8);\n\
    \    cout << strg << '\\n';\n\n    strg.erase (strg.begin()+9, strg.end()-9);\n\
    \    cout << strg << '\\n';\n}\n```\n\n**步骤10** 值得花些时间尝试不同的数字，这些数字是字符串中的字符位置。有时，能否正确操作可能会有偏差，所以熟能生巧。查看截图以了解代码的运行结果。\n\
    \n## C++ 数学\n\n编程本质上是数学性的，正如你所料，它提供了大量内置的范围来进行一些相当复杂的数学运算。C++为那些将数学模型实现到代码中的人提供了很多功能。它可以极其复杂，也可以相对简单。\n\
    \n### C++ = MC²\n\n基本的数学符号在C++中的应用与在大多数其他编程语言中相同。然而，通过使用C++数学库，你还可以计算平方根、幂、三角函数等等。\n\
    \n**步骤1** C++的数学运算遵循与学校教授的相同模式，即乘法和除法优先于加法和减法。不过，你可以改变这一点。现在，创建一个新文件并输入：\n\n```cpp\n\
    #include <iostream>\nusing namespace std;\n\nint main ()\n{\n    float numbers\
    \ = 100;\n\n    numbers = numbers + 10; // This adds 10 to the initial 100\n \
    \   cout << numbers << \"\\n\";\n\n    numbers = numbers - 10; // This subtracts\
    \ 10 from the new 110\n    cout << numbers << \"\\n\";\n}\n```\n\n**步骤3** 乘法和除法可以这样应用：\n\
    \n```cpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    float\
    \ numbers = 100;\n\n    numbers = numbers * 10; // This multiplies 100 by 10\n\
    \    cout << numbers << \"\\n\";\n\n    numbers = numbers / 10; // And this divides\
    \ 1000 by 10\n    cout << numbers << \"\\n\";\n}\n```\n\n**步骤2** 虽然简单，但它确实让旧的数学思维活跃起来。注意我们为`numbers`变量使用了`float`。虽然你可以愉快地使用整数，但如果你突然开始使用小数，你就需要根据所需的精度更改为`float`或`double`。运行代码并查看结果。\n\
    \n**步骤4** 同样，执行简单的代码并查看结果。虽然不是特别有趣，但这是进入C++数学的开始。我们在这里使用了`float`，所以你可以尝试修改代码，进行小数乘法，以及除法、加法和减法。"
