  md: '# # Why Python?


    There are many different programming languages available for the modern computer,
    and some still available for older 8 and 16-bit computers too. Some of these languages
    are designed for scientific work, others for mobile platforms and such. So why
    choose Python out of all the rest?


    # ## PYTHON POWER


    Ever since the earliest home computers were available, enthusiasts, users and
    professionals have toiled away until the wee hours, slaving over an overheating
    heap of circuitry to create something akin to magic.


    These pioneers of programming carved their way into a new frontier, forging small
    routines that enabled the letter ''A'' to scroll across the screen. It may not
    sound terribly exciting to a generation that''s used to ultra-high definition
    graphics and open world, multi-player online gaming. However, forty-something
    years ago it was blindingly brilliant.


    Regardless of whether you use an Android device, iOS device, PC, Mac, Linux, Smart
    TV, games console, MP3 player, GPS device built-in to a car, set-top box or a
    thousand other connected and ''smart'' appliances, behind them all is programming.


    Naturally these bedroom coders helped form the foundations for every piece of
    digital technology we use today. Some went on to become chief developers for top
    software companies, whereas others pushed the available hardware to its limits
    and founded the billion pound gaming empire that continually amazes us.


    All those aforementioned digital devices need instructions to tell them what to
    do, and allow them to be interacted with. These instructions form the programming
    core of the device and that core can be built using a variety of programming languages.


    The languages in use today differ depending on the situation, the platform, the
    device''s use and how the device will interact with its


    ![](img/840275566c862102888f27d8ae2ac921_7_0.png)


    C++ is usually reserved for more complex programs, operating systems, games and
    so on.'
  merge: -1
