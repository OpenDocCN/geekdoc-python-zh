    The Format command converts a value, the number 3, to a formatted representation
    as controlled by the format specification, the ''b'' part.


    ![](img/840275566c862102888f27d8ae2ac921_30_1.png)


    STEP 6 Next up we have the power operator, or exponentiation if you want to be
    technical. To work out the power of something you can use a double multiplication
    symbol or double-star on the keyboard:

    2**3

    10**10

    Essentially, it''s 2x2x2 but we''re sure you already know the basics behind maths
    operators. This is how you would work it out in Python.


    ![](img/840275566c862102888f27d8ae2ac921_30_2.png)


    STEP 9 A Boolean Expression is a logical statement that will either be true or
    false. We can use these to compare data and test to see if it''s equal to, less
    than or greater than. Try this in a New File:

    a = 6

    b = 7

    print(1, a == 6)

    print(2, a == 7)

    print(3, a == 6 and b == 7)

    print(4, a == 7 and b == 7)

    print(5, not a == 7 and b == 7)

    print(6, a == 7 or b == 7)

    print(7, a == 7 or b == 6)

    print(8, not (a == 7 and b == 6))

    print(9, not a == 7 and b == 6)


    ![](img/840275566c862102888f27d8ae2ac921_30_3.png)


    STEP 7 Numbers and expressions don''t stop there. Python has numerous built-in
    functions to work out sets of numbers, absolute values, complex numbers and a
    host of mathematical expressions and Pythagorean tongue-twisters. For example,
    to convert a number to binary, use:

    bin(3)


    ![](img/840275566c862102888f27d8ae2ac921_30_4.png)


    STEP 10 Execute the code from Step 9, and you can see a series of True or False
    statements, depending on the result of the two defining values: 6 and 7. It''s
    an extension of what you''ve looked at, and an important part of programming.


    ![](img/840275566c862102888f27d8ae2ac921_30_5.png)'
  - '[PAGE 31]


    # Using Comments


    When writing your code, the flow of it, what each variable does, how the overall
    program will operate and so on is all inside your head. Another programmer could
    follow the code line by line but over time, it can become difficult to read.


    # #COMMENTS!


    Programmers use a method of keeping their code readable by commenting on certain
    sections. If a variable is used, the programmer comments on what it''s supposed
    to do, for example. It''s just good practise.


    STEP 1 Start by creating a new instance of the IDLE Editor (File > New File) and
    create a simple variable and print command:


    a=10

    print("The value of A is,", a)


    Save the file and execute the code.


    STEP 3 Resave the code and execute it. You can see that the output in the IDLE
    Shell is still the same as before, despite the extra lines being added. Simply
    put, the hash symbol (#) denotes a line of text the programmer can insert to inform
    them, and others, of what''s going on without the user being aware.


    ![](img/840275566c862102888f27d8ae2ac921_31_0.png)


    ![](img/840275566c862102888f27d8ae2ac921_31_1.png)


    STEP 2 Running the code will return the line: The value of A is, 10 into the IDLE
    Shell window, which is what we expected. Now, add some of the types of comments
    you''d normally see within code:


    # Set the start value of A to 10

    a=10

    # Print the current value of A

    print("The value of A is,", a)


    STEP 4 Let''s assume that the variable A that we''ve created is the number of
    lives in a game. Every time the player dies, the value is decreased by 1. The
    programmer could insert a routine along the lines of:


    a=a-1

    print("You''ve just lost a life!")

    print("You now have", a, "lives left!")


    ![](img/840275566c862102888f27d8ae2ac921_31_2.png)


    ![](img/840275566c862102888f27d8ae2ac921_31_3.png)'
  - '[PAGE 32]


    # Using Comments


    STEP 5 Whilst we know that the variable A is lives, and that the player has just
    lost one, a casual viewer or someone checking the code may not know. Imagine for
    a moment that the code is twenty thousand lines long, instead of just our seven.
    You can see how handy comments are.


    ![](img/840275566c862102888f27d8ae2ac921_32_0.png)


    STEP 8 Inline comments are comments that follow a section of code. Take our examples
    from above, instead of inserting the code on a separate line, we could use:


    ```

    a=10 # Set the start value of A to 10

    print("The value of A is, ", a) # Print the current value of A

    a=a-1 # Player lost a life!

    print("You''ve just lost a life!")

    print("You now have", a, "lives left!") # Inform player, and display current value
    of A (lives)

    ```


    ![](img/840275566c862102888f27d8ae2ac921_32_1.png)


    STEP 6 Essentially, the new code together with comments could look like:


    ```

    # Set the start value of A to 10

    a=10

    # Print the current value of A

    print("The value of A is, ", a)

    # Player lost a life!

    a=a-1

    # Inform player, and display current value of A (lives)

    print("You''ve just lost a life!")

    print("You now have", a, "lives left!")

    ```


    ![](img/840275566c862102888f27d8ae2ac921_32_2.png)


    STEP 9 The comment, the hash symbol, can also be used to comment out sections
    of code you don''t want to be executed in your program. For instance, if you wanted
    to remove the first print statement, you would use:


    ```

    # print("The value of A is, ", a)

    ```


    ![](img/840275566c862102888f27d8ae2ac921_32_3.png)


    STEP 7 You can use comments in different ways. For example, Block Comments are
    a large section of text that details what''s going on in the code, such as telling
    the code reader what variables you''re planning on using:


    ```

    # This is the best game ever, and has been developed by a crack squad of Python
    experts

    # who haven''t slept or washed in weeks. Despite being very smelly, the code at
    least

    # works really well.

    ```


    ![](img/840275566c862102888f27d8ae2ac921_32_4.png)


    STEP 10 You also use three single quotes to comment out a Block Comment or multi-line
    section of comments. Place them before and after the areas you want to comment
    for them to work:


    ```

    ''''''

    This is the best game ever, and has been developed by a crack squad of Python
    experts who haven''t slept or washed in weeks. Despite being very smelly, the
    code at least works really well.

    ''''''

    ```


    ![](img/840275566c862102888f27d8ae2ac921_32_5.png)'
- md: "## Working with Variables\n\nWe've seen some examples of variables in our Python\
    \ code already but it's always worth going through the way they operate and how\
    \ Python creates and assigns certain values to a variable.\n\n## VARIOUS VARIABLES\n\
    \nYou'll be working with the Python 3 IDLE Shell in this tutorial. If you haven't\
    \ already, open Python 3 or close down the previous IDLE Shell to clear up any\
    \ old code.\n\nSTEP 1 In some programming languages you're required to use a dollar\
    \ sign to denote a string, which is a variable made up of multiple characters,\
    \ such as a name of a person. In Python this isn't necessary. For example, in\
    \ the Shell enter: name=\"David Hayward\" (or use your own name, unless you're\
    \ also called David Hayward).\n\nSTEP 2 You can check the type of variable in\
    \ use by issuing the type() command, placing the name of the variable inside the\
    \ brackets. In our example, this would be: type(name). Add a new string variable:\
    \ title=\"Descended from Vikings\".\n\nSTEP 3 You've seen previously that variables\
    \ can be concatenated using the plus symbol between the variable names. In our\
    \ example we can use: print(name + \": \" + title). The middle part between the\
    \ quotations allows us to add a colon and a space, as variables are connected\
    \ without spaces, so we need to add them manually.\n\nSTEP 4 You can also combine\
    \ variables within another variable. For example, to combine both name and title\
    \ variables into a new variable we use:\ncharacter=name + \": \" + title\nThen\
    \ output the content of the new variable as:\nprint(character)\nNumbers are stored\
    \ as different variables:\nage=44\nType(age)\nWhich, as we know, are integers.\n\
    \nSTEP 5 However, you can't combine both strings and integer type variables in\
    \ the same command, as you would a set of similar variables. You need to either\
    \ turn one into the other or vice versa. When you do try to combine both, you\
    \ get an error message:\n\n```\nprint(name + age)\n```\n\nSTEP 6 This is a process\
    \ known as TypeCasting. The Python code is:\n\n```\nprint(character + \" is \"\
    \ + str(age) + \" years old.\")\n```\n\nor you can use:\n\n```\nprint(character,\
    \ \"is\", age, \"years old.\")\n```\n\nNotice again that in the last example,\
    \ you don't need the spaces between the words in quotes as the commas treat each\
    \ argument to print separately.\n\n```\n>>> print(name + age)\nTraceback (most\
    \ recent call last):\n  File \"<pyshell#18>\", line 1, in <module>\n    print(name\
    \ + age)\nTypeError: Can't convert 'int' object to str implicitly\n>>> print(character\
    \ + \" is \" + str(age) + \" years old.\")\nDavid Hayward: Descended from Vikings\
    \ is 44 years old.\n>>> print(character, \"is\", age, \"years old.\")\nDavid Hayward:\
    \ Descended from Vikings is 44 years old.\n>>>\n```\n\nSTEP 7 Another example\
    \ of TypeCasting is when you ask for input from the user, such as a name. For\
    \ example, enter:\n\n```\nage= input(\"How old are you? \")\n```\n\nAll data stored\
    \ from the Input command is stored as a string variable.\n\nSTEP 8 This presents\
    \ a bit of a problem when you want to work with a number that's been inputted\
    \ by the user, as age + 10 won't work due to being a string variable and an integer.\
    \ Instead, you need to enter:\n\n```\nint(age) + 10\n```\n\nThis will TypeCast\
    \ the age string into an integer that can be worked with.\n\nSTEP 9 The use of\
    \ TypeCasting is also important when dealing with floating point arithmetic; remember:\
    \ numbers that have a decimal point in them. For example, enter:\n\n```\nshirt=19.99\n\
    ```\n\nNow enter type(shirt) and you'll see that Python has allocated the number\
    \ as a 'float', because the value contains a decimal point.\n\nSTEP 10 When combining\
    \ integers and floats Python usually converts the integer to a float, but should\
    \ the reverse ever be applied it's worth remembering that Python doesn't return\
    \ the exact value. When converting a float to an integer, Python will always round\
    \ down to the nearest integer, called truncating; in our case instead of 19.99\
    \ it becomes 19.\n\n## User Input\n\nWe've seen some basic user interaction with\
    \ the code from a few of the examples earlier, so now would be a good time to\
    \ focus solely on how you would get information from the user then store and present\
    \ it.\n\n## USER FRIENDLY\n\nThe type of input you want from the user will depend\
    \ greatly on the type of program you're coding. For example, a game may ask for\
    \ a character's name, whereas a database can ask for personal details.\n\nSTEP\
    \ 1 If it's not already, open the Python 3 IDLE Shell, and start a New File in\
    \ the Editor. Let's begin with something really simple, enter:\nprint(\"Hello\"\
    )\nfirstname=input(\"What is your first name? \")\nprint(\"Thanks.\")\nsurname=input(\"\
    And what is your surname? \")\n\nSTEP 2 Save and execute the code, and as you\
    \ already no doubt suspected, in the IDLE Shell the program will ask for your\
    \ first name, storing it as the variable firstname, followed by your surname;\
    \ also stored in its own variable (surname).\n\nSTEP 3 Now that we have the user's\
    \ name stored in a couple of variables we can call them up whenever we want:\n\
    print(\"Welcome\", firstname, surname, \". I hope you're well today.\")\n\nSTEP\
    \ 4 Run the code and you can see a slight issue, the full stop after the surname\
    \ follows a blank space. To eliminate that we can add a plus sign instead of the\
    \ comma in the code:\nprint(\"Welcome\", firstname, surname+\". I hope you're\
    \ well today.\")\n\nSTEP 5 You don't always have to include quoted text within\
    \ the input command. For example, you can ask the user their name, and have the\
    \ input in the line below:\nprint(\"Hello. What's your name?\")\nname=input()\n\
    \nSTEP 6 The code from the previous step is often regarded as being a little neater\
    \ than having a lengthy amount of text in the input command, but it's not a rule\
    \ that's set in stone, so do as you like in these situations. Expanding on the\
    \ code, try this:\nprint(\"Halt! Who goes there?\")\nname=input()\n\nSTEP 7 It's\
    \ a good start to a text adventure game, perhaps? Now you can expand on it and\
    \ use the raw input from the user to flesh out the game a little:\nif name==\"\
    David\":\n    print(\"Welcome, good sir. You may pass.\")\nelse:\n    print(\"\
    I know you not. Prepare for battle!\")\n\nSTEP 8 What you've created here is a\
    \ condition, which we will cover soon. In short, we're using the input from the\
    \ user and measuring it against a condition. So, if the user enters David as their\
    \ name, the guard will allow them to pass unhindered. Else, if they enter a name\
    \ other than David, the guard challenges them to a fight.\n\nSTEP 9 Just as you\
    \ learned previously, any input from a user is automatically a string, so you\
    \ need to apply a TypeCast in order to turn it into something else. This creates\
    \ some interesting additions to the input command. For example:\n# Code to calculate\
    \ rate and distance\nprint(\"Input a rate and a distance\")\nrate = float(input(\"\
    Rate: \"))\n\nSTEP 10 To finalise the rate and distance code, we can add:\ndistance\
    \ = float(input(\"Distance: \"))\nprint(\"Time:\", (distance / rate))\nSave and\
    \ execute the code and enter some numbers. Using the float(input element, we've\
    \ told Python that anything entered is a floating point number rather than a string."
  mdcn: "## 使用变量\n\n我们已经在 Python 代码中见过一些变量的例子，但回顾一下它们的操作方式以及 Python 如何创建变量并为其赋值总是值得的。\n\
    \n## 各种变量\n\n在本教程中，你将使用 Python 3 IDLE Shell。如果尚未打开，请打开 Python 3 或关闭之前的 IDLE Shell\
    \ 以清除任何旧代码。\n\n步骤 1 在某些编程语言中，你需要使用美元符号来表示字符串，即由多个字符组成的变量，例如一个人的名字。在 Python 中则无需如此。例如，在\
    \ Shell 中输入：`name=\"David Hayward\"`（或使用你自己的名字，除非你也叫 David Hayward）。\n\n步骤 2 你可以通过发出\
    \ `type()` 命令来检查正在使用的变量类型，将变量名放在括号内。在我们的例子中，这将是：`type(name)`。添加一个新的字符串变量：`title=\"\
    Descended from Vikings\"`。\n\n步骤 3 你之前已经看到，变量可以使用加号在变量名之间进行连接。在我们的例子中，我们可以使用：`print(name\
    \ + \": \" + title)`。引号之间的中间部分允许我们添加一个冒号和一个空格，因为变量连接时没有空格，所以我们需要手动添加它们。\n\n步骤\
    \ 4 你也可以将变量组合到另一个变量中。例如，要将 `name` 和 `title` 变量组合成一个新变量，我们使用：\n`character=name\
    \ + \": \" + title`\n然后输出新变量的内容为：\n`print(character)`\n数字存储为不同的变量：\n`age=44`\n\
    `Type(age)`\n我们知道，这些是整数。\n\n步骤 5 然而，你不能像处理一组相似变量那样，在同一个命令中组合字符串和整数类型的变量。你需要将其中一个转换为另一个，反之亦然。当你尝试同时组合两者时，你会得到一条错误消息：\n\
    \n```\nprint(name + age)\n```\n\n步骤 6 这是一个称为类型转换的过程。Python 代码是：\n\n```\nprint(character\
    \ + \" is \" + str(age) + \" years old.\")\n```\n\n或者你可以使用：\n\n```\nprint(character,\
    \ \"is\", age, \"years old.\")\n```\n\n再次注意，在最后一个例子中，你不需要在引号中的单词之间添加空格，因为逗号会将每个参数单独传递给\
    \ `print`。\n\n```\n>>> print(name + age)\nTraceback (most recent call last):\n\
    \  File \"<pyshell#18>\", line 1, in <module>\n    print(name + age)\nTypeError:\
    \ Can't convert 'int' object to str implicitly\n>>> print(character + \" is \"\
    \ + str(age) + \" years old.\")\nDavid Hayward: Descended from Vikings is 44 years\
    \ old.\n>>> print(character, \"is\", age, \"years old.\")\nDavid Hayward: Descended\
    \ from Vikings is 44 years old.\n>>>\n```\n\n步骤 7 类型转换的另一个例子是当你向用户请求输入时，例如一个名字。例如，输入：\n\
    \n```\nage= input(\"How old are you? \")\n```\n\n从 `Input` 命令存储的所有数据都作为字符串变量存储。\n\
    \n步骤 8 当你想处理用户输入的数字时，这会带来一点问题，因为 `age + 10` 由于一个是字符串变量而另一个是整数而无法工作。相反，你需要输入：\n\
    \n```\nint(age) + 10\n```\n\n这将把 `age` 字符串类型转换为可以进行运算的整数。\n\n步骤 9 在处理浮点运算时，类型转换的使用也很重要；记住：带有小数点的数字。例如，输入：\n\
    \n```\nshirt=19.99\n```\n\n现在输入 `type(shirt)`，你会看到 Python 将该数字分配为 'float'，因为该值包含一个小数点。\n\
    \n步骤 10 当组合整数和浮点数时，Python 通常会将整数转换为浮点数，但如果反过来应用，值得记住的是 Python 不会返回精确值。当将浮点数转换为整数时，Python\
    \ 总是向下舍入到最接近的整数，称为截断；在我们的例子中，不是 19.99 而是变成了 19。\n\n## 用户输入\n\n我们从之前的几个例子中已经看到了一些与代码的基本用户交互，所以现在是专注于如何从用户那里获取信息，然后存储和展示它的好时机。\n\
    \n## 用户友好\n\n你想要从用户那里获得的输入类型在很大程度上取决于你正在编写的程序类型。例如，游戏可能会询问角色的名字，而数据库则可以询问个人详细信息。\n\
    \n步骤 1 如果尚未打开，请打开 Python 3 IDLE Shell，并在编辑器中开始一个新文件。让我们从一些非常简单的东西开始，输入：\n`print(\"\
    Hello\")`\n`firstname=input(\"What is your first name? \")`\n`print(\"Thanks.\"\
    )`\n`surname=input(\"And what is your surname? \")`\n\n步骤 2 保存并执行代码，正如你无疑已经预料到的那样，在\
    \ IDLE Shell 中，程序将询问你的名字，将其存储为变量 `firstname`，然后是你的姓氏；也存储在它自己的变量（`surname`）中。\n\
    \n步骤 3 现在我们已经将用户的名字存储在几个变量中，我们可以随时调用它们：\n`print(\"Welcome\", firstname, surname,\
    \ \". I hope you're well today.\")`\n\n步骤 4 运行代码，你会看到一个小问题，姓氏后面的句点后面跟着一个空格。为了消除这一点，我们可以在代码中添加一个加号而不是逗号：\n\
    `print(\"Welcome\", firstname, surname+\". I hope you're well today.\")`\n\n步骤\
    \ 5 你并不总是需要在 `input` 命令中包含带引号的文本。例如，你可以询问用户的名字，并在下面一行输入：\n`print(\"Hello. What's\
    \ your name?\")`\n`name=input()`\n\n步骤 6 上一步的代码通常被认为比在 `input` 命令中包含大量文本更整洁一些，但这不是一成不变的规则，所以在这些情况下随你喜欢。扩展代码，试试这个：\n\
    `print(\"Halt! Who goes there?\")`\n`name=input()`\n\n步骤 7 这是一个文字冒险游戏的良好开端，也许？现在你可以扩展它，并使用用户的原始输入来稍微充实一下游戏：\n\
    `if name==\"David\":`\n`    print(\"Welcome, good sir. You may pass.\")`\n`else:`\n\
    `    print(\"I know you not. Prepare for battle!\")`\n\n步骤 8 你在这里创建的是一个条件，我们很快就会讲到。简而言之，我们正在使用用户的输入并将其与一个条件进行衡量。所以，如果用户输入\
    \ David 作为他们的名字，守卫将允许他们不受阻碍地通过。否则，如果他们输入的名字不是 David，守卫将挑战他们进行战斗。\n\n步骤 9 正如你之前所学，来自用户的任何输入自动都是字符串，因此你需要应用类型转换将其转换为其他类型。这为\
    \ `input` 命令带来了一些有趣的补充。例如：\n`# 计算速率和距离的代码`\n`print(\"Input a rate and a distance\"\
    )`\n`rate = float(input(\"Rate: \"))`\n\n步骤 10 为了完成速率和距离的代码，我们可以添加：\n`distance\
    \ = float(input(\"Distance: \"))`\n`print(\"Time:\", (distance / rate))`\n保存并执行代码，然后输入一些数字。使用\
    \ `float(input` 元素，我们告诉 Python 输入的任何内容都是浮点数而不是字符串。"
