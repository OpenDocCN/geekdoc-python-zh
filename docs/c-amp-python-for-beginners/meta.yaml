    \n# Say Hello to Python\n\n![](img/840275566c862102888f27d8ae2ac921_5_0.png)\n\
    \n# Say Hello to Python\n\nThere are many different programming languages available\
    \ to learn and use. Some are complex and incredibly powerful and some are extremely\
    \ basic and used as minor utilities for operating systems. Python sits somewhere\
    \ in the middle, combining ease of use with a generous helping of power that allows\
    \ the user to create minor utilities, a range of excellent games and performance-heavy\
    \ computational tasks.\n\nHowever, there’s more to Python than simply being another\
    \ programming language. It has a vibrant and lively community behind it that shares\
    \ knowledge, code and project ideas; as well as bug fixes for future releases.\
    \ It’s thanks to this community that the language has grown and thrived and now\
    \ it’s your turn to take the plunge and learn how to program in Python.\n\nThe\
    \ first half of this book helps you get started with the latest version of Python\
    \ and from there guide you on how to use some of the most common and interesting\
    \ functions and features of the language. Before long, you will be able to code\
    \ your own helpful system tools, text adventures and even control a character\
    \ as they move around the screen.\n\n# Why Python?\n\nThere are many different\
    \ programming languages available for the modern computer, and some still available\
    \ for older 8 and 16-bit computers too. Some of these languages are designed for\
    \ scientific work, others for mobile platforms and such. So why choose Python\
    \ out of all the rest?\n\n## PYTHON POWER\n\nEver since the earliest home computers\
    \ were available, enthusiasts, users and professionals have toiled away until\
    \ the wee hours, slaving over an overheating heap of circuitry to create something\
    \ akin to magic.\n\nThese pioneers of programming carved their way into a new\
    \ frontier, forging small routines that enabled the letter 'A' to scroll across\
    \ the screen. It may not sound terribly exciting to a generation that's used to\
    \ ultra-high definition graphics and open world, multi-player online gaming. However,\
    \ forty-something years ago it was blindingly brilliant.\n\nRegardless of whether\
    \ you use an Android device, iOS device, PC, Mac, Linux, Smart TV, games console,\
    \ MP3 player, GPS device built-in to a car, set-top box or a thousand other connected\
    \ and 'smart' appliances, behind them all is programming.\n\nNaturally these bedroom\
    \ coders helped form the foundations for every piece of digital technology we\
    \ use today. Some went on to become chief developers for top software companies,\
    \ whereas others pushed the available hardware to its limits and founded the billion\
    \ pound gaming empire that continually amazes us.\n\nAll those aforementioned\
    \ digital devices need instructions to tell them what to do, and allow them to\
    \ be interacted with. These instructions form the programming core of the device\
    \ and that core can be built using a variety of programming languages.\n\nThe\
    \ languages in use today differ depending on the situation, the platform, the\
    \ device's use and how the device will interact with its environment or users.\
    \ Operating systems, such as Windows, macOS and such are usually a combination\
    \ of C++, C#, assembly and some form of visual-based language. Games generally\
    \ use C++ whilst web pages can use a plethora of available languages such as HTML,\
    \ Java, Python and so on.\n\nMore general-purpose programming is used to create\
    \ programs, apps, software or whatever else you want to call them. They're widely\
    \ used across all hardware platforms and suit virtually every conceivable application.\
    \ Some operate faster than others and some are easier to learn and use than others.\
    \ Python is one such general-purpose language.\n\nPython is what's known as a\
    \ High-Level Language, in that it 'talks' to the hardware and operating system\
    \ using a variety of arrays, variables, objects, arithmetic, subroutines, loops\
    \ and countless more interactions. Whilst it's not as streamlined as a Low-Level\
    \ Language, which can deal directly with memory addresses, call stacks and registers,\
    \ its benefit is that it's universally accessible and easy to learn.\n\nPython\
    \ was created over twenty six years ago and has evolved to become an ideal beginner's\
    \ language for learning how to program a computer. It's perfect for the hobbyist,\
    \ enthusiast, student, teacher and those who simply need to create their own unique\
    \ interaction between either themselves or a piece of external hardware and the\
    \ computer itself.\n\nPython is free to download, install and use and is available\
    \ for Linux, Windows, macOS, MS-DOS, OS/2, BeOS, IBM i-series machines, and even\
    \ RISC OS. It has been voted one of the top five programming languages in the\
    \ world and is continually evolving ahead of the hardware and Internet development\
    \ curve.\n\nSo to answer the question: why Python? Simply put, it's free, easy\
    \ to learn, exceptionally powerful, universally accepted, effective and a superb\
    \ learning and educational tool.\n\n![](img/840275566c862102888f27d8ae2ac921_7_0.png)\n\
    \nC++ is usually reserved for more complex programs, operating systems, games\
    \ and so on.\n\n```java\n//file: Invoke.java\nimport java.lang.reflect.*;\n\n\
    class Invoke {\n    public static void main( String [] args ) {\n        try {\n\
    \            Class c = Class.forName( args[0] );\n            Method m = c.getMethod(\
    \ args[1], new Class [] { } );\n            Object ret = m.invoke( null, null\
    \ );\n            System.out.println(\n                \"Invoked static method:\
    \ \" + args[1]\n                + \" of class: \" + args[0]\n                +\
    \ \" with no args\\nResults: \" + ret );\n        } catch ( ClassNotFoundException\
    \ e ) {\n            // Class.forName( ) can't find the class\n        } catch\
    \ ( NoSuchMethodException e2 ) {\n            // that method doesn't exist\n \
    \       } catch ( IllegalAccessException e3 ) {\n            // we don't have\
    \ permission to invoke that method\n        } catch ( InvocationTargetException\
    \ e4 ) {\n            // an exception occurred while invoking that method\n  \
    \          System.out.println(\n                \"Method threw an: \" + e4.\n\
    \                getTargetException( ) );\n        }\n    }\n}\n```\n\n![](img/840275566c862102888f27d8ae2ac921_8_0.png)\n\
    \n> BASIC was once the starter language that early 8-bit home computer users learned.\n\
    \n> Java is a powerful language that's used in web pages, set-top boxes, TVs and\
    \ even cars.\n\n![](img/840275566c862102888f27d8ae2ac921_8_1.png)\n\n```python\n\
    print(HANGMAN[0])\nattempts = len(HANGMAN) - 1\n\nwhile (attempts != 0 and \"\
    -\" in word_guessed):\n    print((\"\\nYou have {} attempts remaining\").format(attempts))\n\
    \    joined_word = \"\".join(word_guessed)\n    print(joined_word)\n\n    try:\n\
    \        player_guess = str(input(\"\\nPlease select a letter between A-Z\" +\
    \ \"\\n> \"))\n    except: # check valid input\n        print(\"That is not valid\
    \ input. Please try again.\")\n        continue\n    else:\n        if not player_guess.isalpha():\
    \ # check the input is a letter. Also checks a\n            print(\"That is not\
    \ a letter. Please try again.\")\n            continue\n        elif len(player_guess)\
    \ > 1: # check the input is only one letter\n            print(\"That is more\
    \ than one letter. Please try again.\")\n            continue\n        elif player_guess\
    \ in guessed_letters: # check it letter hasn't been guessed\n            print(\"\
    You have already guessed that letter. Please try again.\")\n            continue\n\
    \        else:\n            pass\n\n    guessed_letters.append(player_guess)\n\
    \n    for letter in range(len(chosen_word)):\n        if player_guess == chosen_word[letter]:\n\
    \            word_guessed[letter] = player_guess # replace all letters in the\
    \ chosen\n\n    if player_guess not in chosen_word:\n```\n\n> Python is a more\
    \ modern take on BASIC, it's easy to learn and makes for an ideal beginner's programming\
    \ language."
