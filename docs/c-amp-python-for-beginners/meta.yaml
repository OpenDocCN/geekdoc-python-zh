    # Say Hello to Python


    There are many different programming languages available to learn and use. Some
    are complex and incredibly powerful and some are extremely basic and used as minor
    utilities for operating systems. Python sits somewhere in the middle, combining
    ease of use with a generous helping of power that allows the user to create minor
    utilities, a range of excellent games and performance-heavy computational tasks.


    However, there’s more to Python than simply being another programming language.
    It has a vibrant and lively community behind it that shares knowledge, code and
    project ideas; as well as bug fixes for future releases. It’s thanks to this community
    that the language has grown and thrived and now it’s your turn to take the plunge
    and learn how to program in Python.


    The first half of this book helps you get started with the latest version of Python
    and from there guide you on how to use some of the most common and interesting
    functions and features of the language. Before long, you will be able to code
    your own helpful system tools, text adventures and even control a character as
    they move around the screen.'
