- md: '## Your First Code


    STEP 5 What you have done here is assign the letters a and b two values: 2 and
    2. These are now variables, which can be called upon by Python to output, add,
    subtract, divide and so on for as long as their numbers stay the same. Try this:


    ```

    print(a)

    print(b)

    ```


    ![](img/840275566c862102888f27d8ae2ac921_24_0.png)


    STEP 6 The output of the last step displays the current values of both a and b
    individually, as you''ve asked them to be printed separately. If you want to add
    them up, you can use the following:


    ```

    print(a+b)

    ```


    This code simply takes the values of a and b, adds them together and outputs the
    result.


    ![](img/840275566c862102888f27d8ae2ac921_24_2.png)


    STEP 7 You can play around with different kinds of variables and the Print function.
    For example, you could assign variables for someone''s name:


    ```

    name="David"

    print(name)

    ```


    ![](img/840275566c862102888f27d8ae2ac921_24_4.png)


    STEP 8 Now let''s add a surname:


    ```

    surname="Hayward"

    print(surname)

    ```


    You now have two variables containing a first name and a surname and you can print
    them independently.


    ![](img/840275566c862102888f27d8ae2ac921_24_1.png)


    STEP 9 If we were to apply the same routine as before, using the + symbol, the
    name wouldn''t appear correctly in the output in the Shell. Try it:


    ```

    print(name+surname)

    ```


    You need a space between the two, defining them as two separate values and not
    something you mathematically play around with.


    ![](img/840275566c862102888f27d8ae2ac921_24_3.png)


    STEP 10 In Python 3 you can separate the two variables with a space using a comma:


    ```

    print(name, surname)

    ```


    Alternatively, you can add the space yourself:


    ```

    print(name+" "+surname)

    ```


    The use of the comma is much neater, as you can see. Congratulations, you''ve
    just taken your first steps into the wide world of Python.


    ![](img/840275566c862102888f27d8ae2ac921_24_5.png)


    ## Saving and Executing Your Code


    Whilst working in the IDLE Shell is perfectly fine for small code snippets, it’s
    not designed for entering longer program listings. In this section you’re going
    to be introduced to the IDLE Editor, where you will be working from now on.


    ### EDITING CODE


    You will eventually reach a point where you have to move on from inputting single
    lines of code into the Shell. Instead, the IDLE Editor will allow you to save
    and execute your Python code.


    **STEP 1** First, open the Python IDLE Shell and when it’s up, click on File >
    New File. This will open a new window with Untitled as its name. This is the Python
    IDLE Editor and within it you can enter the code needed to create your future
    programs.


    **STEP 2** The IDLE Editor is, for all intents and purposes, a simple text editor
    with Python features, colour coding and so on; much in the same vein as Sublime.
    You enter code as you would within the Shell, so taking an example from the previous
    tutorial, enter:


    ```

    print("Hello everyone!")

    ```


    ![](img/840275566c862102888f27d8ae2ac921_25_2.png)


    **STEP 3** You can see that the same colour coding is in place in the IDLE Editor
    as it is in the Shell, enabling you to better understand what’s going on with
    your code. However, to execute the code you need to first save it. Press F5 and
    you get a Save...Check box open.


    ![](img/840275566c862102888f27d8ae2ac921_25_0.png)


    ![](img/840275566c862102888f27d8ae2ac921_25_1.png)


    **STEP 4** Click on the OK button in the Save box and select a destination where
    you’ll save all your Python code. The destination can be a dedicated folder called
    Python or you can just dump it wherever you like. Remember to keep a tidy drive
    though, to help you out in the future.


    ![](img/840275566c862102888f27d8ae2ac921_25_3.png)


    STEP 5 Enter a name for your code, ''print hello'' for example, and click on the
    Save button. Once the Python code is saved it''s executed and the output will
    be detailed in the IDLE Shell. In this case, the words ''Hello everyone!''.


    ![](img/840275566c862102888f27d8ae2ac921_26_0.png)


    STEP 6 This is how the vast majority of your Python code will be conducted. Enter
    it into the Editor, hit F5, save the code and look at the output in the Shell.
    Sometimes things will differ, depending on whether you''ve requested a separate
    window, but essentially that''s the process. It''s the process we will use throughout
    this book, unless otherwise stated.


    ![](img/840275566c862102888f27d8ae2ac921_26_2.png)


    STEP 7 If you open the file location of the saved Python code, you can see that
    it ends in a .py extension. This is the default Python file name. Any code you
    create will be whatever.py and any code downloaded from the many Internet Python
    resource sites will be .py. Just ensure that the code is written for Python 3.


    ![](img/840275566c862102888f27d8ae2ac921_26_4.png)


    STEP 8 Let''s extend the code and enter a few examples from the previous tutorial:


    ```

    a=2

    b=2

    name="David"

    surname="Hayward"

    print(name, surname)

    print (a+b)

    ```


    If you press F5 now you''ll be asked to save the file, again, as it''s been modified
    from before.


    ![](img/840275566c862102888f27d8ae2ac921_26_1.png)


    STEP 9 If you click the OK button, the file will be overwritten with the new code
    entries, and executed, with the output in the Shell. It''s not a problem with
    just these few lines but if you were to edit a larger file, overwriting can become
    an issue. Instead, use File > Save As from within the Editor to create a backup.


    ![](img/840275566c862102888f27d8ae2ac921_26_3.png)


    STEP 10 Now create a new file. Close the Editor, and open a new instance (File
    > New File from the Shell). Enter the following and save it as hello.py:


    ```

    a="Python"

    b="is"

    c="cool!"

    print(a, b, c)

    ```


    You will use this code in the next tutorial.


    ![](img/840275566c862102888f27d8ae2ac921_26_5.png)


    ## Executing Code from the Command Line


    Although we’re working from the GUI IDLE throughout this book, it’s worth taking
    a look at Python’s command line handling. We already know there’s a command line
    version of Python but it’s also used to execute code.


    ### COMMAND THE CODE


    Using the code we created in the previous tutorial, the one we named hello.py,
    let’s see how you can run code that was made in the GUI at the command line level.


    STEP 1 Python, in Linux, comes with two possible ways of executing code via the
    command line. One of the ways is with Python 2, whilst the other uses the Python
    3 libraries and so on. First though, drop into the command line or Terminal on
    your operating system.


    STEP 2 Just as before, we’re using a Raspberry Pi; Windows users will need to
    click the Start button and search for CMD, then click the Command Line returned
    search; and macOS users can get access to their command line by clicking Go >
    Utilities > Terminal.


    ![](img/840275566c862102888f27d8ae2ac921_27_2.png)


    STEP 3 Now you’re at the command line we can start Python. For Python 3 you need
    to enter the command python3 and press Enter. This will put you into the command
    line version of the Shell, with the familiar three right-facing arrows as the
    cursor (>>>).


    ![](img/840275566c862102888f27d8ae2ac921_27_0.png)


    ![](img/840275566c862102888f27d8ae2ac921_27_1.png)


    STEP 4 From here you’re able to enter the code you’ve looked at previously, such
    as:


    ```

    a=2

    print(a)

    ```


    You can see that it works exactly the same.


    ![](img/840275566c862102888f27d8ae2ac921_27_3.png)


    STEP 5 Now enter: exit() to leave the command line Python session and return you
    back to the command prompt. Enter the folder where you saved the code from the
    previous tutorial and list the available files within; hopefully you should see
    the hello.py file.


    ![](img/840275566c862102888f27d8ae2ac921_28_0.png)


    STEP 6 From within the same folder as the code you''re going to run, enter the
    following into the command line:


    ```

    python3 hello.py

    ```


    This will execute the code we created, which to remind you is:


    ```

    a="Python"

    b="is"

    c="cool!"

    print(a, b, c)

    ```


    ![](img/840275566c862102888f27d8ae2ac921_28_2.png)


    STEP 7 Naturally, since this is Python 3 code, using the syntax and layout that''s
    unique to Python 3, it only works when you use the python3 command. If you like,
    try the same with Python 2 by entering:


    ```

    python hello.py

    ```


    ![](img/840275566c862102888f27d8ae2ac921_28_4.png)


    STEP 8 The result of running Python 3 code from the Python 2 command line is quite
    obvious. Whilst it doesn''t error out in any way, due to the differences between
    the way Python 3 handles the Print command over Python 2, the result isn''t as
    we expected. Using Sublime for the moment, open the hello.py file.


    ![](img/840275566c862102888f27d8ae2ac921_28_1.png)


    STEP 9 Since Sublime Text isn''t available for the Raspberry Pi, you''re going
    to temporarily leave the Pi for the moment and use Sublime as an example that
    you don''t necessarily need to use the Python IDLE. With the hello.py file open,
    alter it to include the following:


    ```

    name=input("What is your name? ")

    print("Hello,", name)

    ```


    ![](img/840275566c862102888f27d8ae2ac921_28_3.png)


    STEP 10 Save the hello.py file and drop back to the command line. Now execute
    the newly saved code with:


    ```

    python3 hello.py

    ```


    The result will be the original Python is cool! statement, together with the added
    input command asking you for your name, and displaying it in the command window.


