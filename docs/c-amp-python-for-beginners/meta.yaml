  md: '# Starting Python for the First Time


    **STEP 5** While that''s very interesting, it''s not particularly exciting. Instead,
    try this:


    `print("Hello everyone!")`


    Just like the code we entered in Sublime in the Installing a Text Editor section
    of this book.


    ![](img/840275566c862102888f27d8ae2ac921_22_0.png)


    **STEP 8** The Python IDLE is a configurable environment. If you don''t like the
    way the colours are represented, then you can always change them via Options >
    Configure IDLE and clicking on the Highlighting tab. However, we don''t recommend
    that, as you won''t be seeing the same as our screenshots.


    ![](img/840275566c862102888f27d8ae2ac921_22_1.png)


    **STEP 6** This is a little more like it, since you''ve just produced your first
    bit of code. The Print command is fairly self-explanatory, it prints things. Python
    3 requires the brackets as well as quote marks in order to output content to the
    screen, in this case the ''Hello everyone!'' bit.


    ```

    >>> print("Hello everyone!")

    Hello everyone!

    >>> |

    ```


    **STEP 9** Just like most programs available, regardless of the operating system,
    there are numerous shortcut keys available. We don''t have room for them all here
    but within the Options > Configure IDLE and under the Keys tab, you can see a
    list of the current bindings.


    ![](img/840275566c862102888f27d8ae2ac921_22_2.png)


    **STEP 7** You may have noticed the colour coding within the Python IDLE. The
    colours represent different elements of Python code. They are:


    Black – Data and Variables

    Green – Strings

    Purple – Functions

    Orange – Commands

    Blue – User Functions

    Dark Red – Comments

    Light Red – Error Messages


    **STEP 10** The Python IDLE is a power interface and one that''s actually been
    written in Python using one of the available GUI toolkits. If you want to know
    the many ins and outs of the Shell, we recommend you take a few moments to view
    **www.docs.python.org/3/library/idle.html**, which details many of the IDLE''s
    features.


    ### IDLE Colour Coding


    | Colour | Use for | Examples |

    | :--- | :--- | :--- |

    | Black | Data & variables | 23.6 area |

    | Green | Strings | "Hello World" |

    | Purple | Functions | len() print() |

    | Orange | Commands | if for else |

    | Blue | User functions | get_area() |

    | Dark red | Comments | #Remember VAT |

    | Light red | Error messages | SyntaxError: |


