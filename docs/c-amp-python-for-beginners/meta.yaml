  md: "# Creating Functions\n\nSTEP 5 Additional functions can be added to Python\
    \ through modules. Python has a vast range of modules available that can cover\
    \ numerous programming duties. They add functions and can be imported as and when\
    \ required. For example, to use advanced mathematics functions enter:\n\n```\n\
    import math\n```\n\nOnce entered, you have access to all the math module functions.\n\
    \n![](img/840275566c862102888f27d8ae2ac921_38_0.png)\n\nSTEP 6 To use a function\
    \ from a module enter the name of the module followed by a full stop, then the\
    \ name of the function. For instance, using the math module, since you've just\
    \ imported it into Python, you can utilise the square root function. To do so,\
    \ enter:\n\n```\nmath.sqrt(16)\n```\n\nYou can see that the code is presented\
    \ as module.function(data).\n\n![](img/840275566c862102888f27d8ae2ac921_38_1.png)\n\
    \n# FORGING FUNCTIONS\n\nThere are many different functions you can import created\
    \ by other Python programmers and you will undoubtedly come across some excellent\
    \ examples in the future; you can also create your own with the def command.\n\
    \nSTEP 1 Choose File > New File to enter the editor, let's create a function called\
    \ Hello, that greets a user. Enter:\n\n```\ndef Hello():\n    print (\"Hello\"\
    )\n\nHello()\n```\n\nPress F5 to save and run the script. You can see Hello in\
    \ the Shell, type in Hello() and it returns the new function.\n\n![](img/840275566c862102888f27d8ae2ac921_38_2.png)\n\
    \nSTEP 3 To modify it further, delete the Hello(\"David\") line, the last line\
    \ in the script and press Ctrl+S to save the new script. Close the Editor and\
    \ create a new file (File > New File). Enter the following:\n\n```\nfrom Hello\
    \ import Hello\n\nHello(\"David\")\n```\n\nPress F5 to save and execute the code.\n\
    \n![](img/840275566c862102888f27d8ae2ac921_38_3.png)\n\nSTEP 2 Let's now expand\
    \ the function to accept a variable, the user's name for example. Edit your script\
    \ to read:\n\n```\ndef Hello(name):\n    print (\"Hello\", name)\n\nHello(\"David\"\
    )\n```\n\nThis will now accept the variable name, otherwise it prints Hello David.\
    \ In the Shell, enter: name=(\"Bob\"), then: Hello(name). Your function can now\
    \ pass variables through it.\n\n![](img/840275566c862102888f27d8ae2ac921_38_4.png)\n\
    \nSTEP 4 What you've just done is import the Hello function from the saved Hello.py\
    \ program and then used it to say hello to David. This is how modules and functions\
    \ work: you import the module then use the function. Try this one, and modify\
    \ it for extra credit:\n\n```\ndef add(a, b):\n    result = a + b\n    return\
    \ result\n```\n\n![](img/840275566c862102888f27d8ae2ac921_38_5.png)"
