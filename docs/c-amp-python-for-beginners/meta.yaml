- md: '## Equipment Needed


    You don''t need to invest a huge amount of money in order to learn C++ and you
    don''t need an entire computing lab at your disposal either. Providing you have
    a fairly modern computer, everything else is freely available.


    ## C++ SETUPS


    Most, if not all, operating systems have C++ in their code, so it stands to reason
    that you can learn to program in C++ no matter what OS you''re currently using.


    ## COMPUTER


    Unless you fancy writing out your C++ code by hand on a sheet of paper (which
    is something many older coders used to do), a computer is an absolute must have
    component. PC users can have any recent Linux distro or Windows OS, Mac users
    the latest macOS.


    ## AN IDE


    Just as with Python, an IDE is used to enter and execute your C++ code. Many IDEs
    come with extensions and plugins that help make it work better, or add an extra
    level of functionality. Often, an IDE provides enhancements depending on the core
    OS being used, such as being enhanced for Windows 10.


    ## COMPILER


    A compiler is a program that converts the C++ language into binary, so that the
    computer can understand. While some IDEs come with a compiler built in, others
    don''t. Code::Blocks is our favourite IDE that comes with a C++ compiler as part
    of the package. More on this later.


    ## TEXT EDITOR


    Some programmers much prefer to use a text editor to assemble their C++ code before
    running it through a compiler. Essentially you can use any text editor to write
    code, just save it with a .cpp extension. However, Notepad++ is one of the best
    code text editors available.


    ## INTERNET ACCESS


    While it''s entirely possible to learn how to code on a computer that''s not attached
    to the Internet, it''s extraordinarily difficult. You need to install relevant
    software, keep it up to date, install any extras or extensions and look for help
    when coding. All of these require access to the Internet.


    ## TIME AND PATIENCE


    Yes, as with Python, you''re going to need to set aside significant time to spend
    on learning how to code in C++. Sadly, unless you''re a genius, it''s not going
    to happen overnight, or even a week. A good C++ coder has spent many years honing
    their craft, so be patient, start small and keep learning.


    ## OS SPECIFIC NEEDS


    C++ will work in any operating system but getting all the necessary pieces together
    can be confusing to a newcomer. Here are some OS specifics for C++.


    ## LINUX


    Linux users are lucky in that they already have a compiler and text editor built
    into their operating system. Any text editor allows you to type out your C++ code,
    when it''s saved with a .cpp extension, use g++ to compile it.


    ## WINDOWS


    We have mentioned previously that a good IDE is Microsoft''s Visual Studio. However,
    a better IDE and compiler is Code::Blocks, which is regularly kept up to date
    with a new release twice a year. Otherwise Windows users can enter their code
    in Notepad++, then compile it with MinGW as used by Code::Blocks.


    ## RASPBERRY PI


    The Raspberry Pi''s operating system is Raspbian, which is Linux based. Therefore,
    you''re able to write your code out using a text editor, then compile it with
    g++ as you would in any other Linux distro.


    ## MAC


    Mac owners will need to download and install Xcode to be able to compile their
    C++ code natively. Other options for the macOS include Netbeans, Eclipse or Code::Blocks.
    Note: the latest Code::Blocks isn''t available for Mac due to a lack of Mac developers.


    ## How to Set Up C++ in Windows


    Windows users have a wealth of choice when it comes to programming in C++. There
    are plenty of IDEs and compilers available, including Visual Studio from Microsoft.
    However, in our opinion, the best C++ IDE to begin with is Code::Blocks.


    ### CODE::BLOCKS


    Code::Blocks is a free C++, C and Fortran IDE that''s feature rich and easily
    extendible with plug-ins. It''s easy to use, comes with a compiler and has a vibrant
    community behind it.


    **STEP 1** Start by visiting the Code::Blocks download site, at www.codeblocks.org/downloads.
    From there, click on the ''Download the binary releases'' link to be taken to
    the latest downloadable version for Windows.


    **STEP 2** You can see that there are several Windows versions available. The
    one you want to download has ''mingw-setup.exe'' at the end of the current version
    number. At the time of writing this is: codeblocks-17.12mingw-setup.exe. The difference
    is that the mingw-setup version includes a C++ compiler and debugger from TDM-GCC
    (a compiler suite).


    **STEP 3** When you''ve located the file, click on the Sourceforge.net link at
    the end of the line and a download notification window appears; click on Save
    File to start the download and save the executable to your PC. Locate the downloaded
    Code::Blocks installer and double-click to start. Follow the on-screen instructions
    to begin the installation.


    **STEP 4** Once you''ve agreed to the licencing terms, there is a choice of installation
    options available. You can opt for a smaller install, missing out on some of the
    components but we would recommend you opt for the Full option as default.


    **STEP 5** Next choose an install location for the Code::Blocks files. It''s your
    choice, but the default will generally suffice, unless of course you have any
    special requirements. When you click Next, the install begins; when it''s finished
    a notification pops up asking you if you want to start Code::Blocks now, so click
    Yes.


    **STEP 6** The first time Code::Blocks loads it runs an auto-detect for any C++
    compilers you may already have installed on your system. If you don''t have any,
    click on the first detected option, GNU GCC Compiler, and click the Default button
    to set it as the system''s C++ compiler. Click OK when you''re ready to continue.


    **STEP 7** When the program starts another message appears, informing you that
    Code::Blocks is currently not the default application for C++ files. You have
    a couple of options: to leave everything as it is or allow Code::Blocks to associate
    all C++ file types. Again, we would recommend you opt for the last choice to associate
    Code::Blocks with every supported file type.


    **STEP 8** Before you start using Code::Blocks it''s worth explaining exactly
    why you need the added compiler. First, a compiler is a separate program that
    reads through your C++ code and checks it against the latest acceptable programming
    standards; this is why you need the most recently available compiler. This is
    currently C++17, with C++20 underway.


    **STEP 9** Essentially, computers work and understand only binary, ones and zeros,
    or Machine Language. Programming in binary isn''t effective for human beings.
    For example, to output the words "Hello World!" to the screen in C++ would appear
    in binary as:


    ```

    01100011 01101111 01110101 01110100 00100000

    00111100 00111100 00100000 00100010 01101000

    01100101 01101100 01101100 01101111 00100000

    01010111 01101111 01110010 01101100 01100100

    00100001 00100010 00111011

    ```


    **STEP 10** The compiler therefore takes what you''ve entered as C++ code and
    translates that to Machine Language. To execute C++ code the IDE ''builds'' the
    code, checking for errors, then pass it through the compiler to check standardisation
    and convert it to ones and zeros for the computer to act upon. It''s rather clever
    stuff, when you stop to think about it.'
  mdcn: '## 所需设备


    你无需投入大量资金来学习 C++，也不需要一整个计算机实验室供你使用。只要你有一台相当现代的计算机，其他一切都是免费可用的。


    ## C++ 环境设置


    大多数（如果不是全部）操作系统都在其代码中包含 C++，因此无论你当前使用什么操作系统，你都可以学习 C++ 编程。


    ## 计算机


    除非你打算在纸上手写 C++ 代码（这是许多老程序员过去常做的事），否则计算机是绝对必需的组件。PC 用户可以使用任何较新的 Linux 发行版或 Windows
    操作系统，Mac 用户则使用最新的 macOS。


    ## 集成开发环境


    与 Python 一样，集成开发环境用于输入和执行你的 C++ 代码。许多 IDE 附带扩展和插件，有助于使其工作得更好，或增加额外的功能级别。通常，IDE
    会根据所使用的核心操作系统提供增强功能，例如针对 Windows 10 进行了优化。


    ## 编译器


    编译器是一种将 C++ 语言转换为二进制代码的程序，以便计算机能够理解。虽然一些 IDE 内置了编译器，但其他 IDE 则没有。Code::Blocks 是我们最喜欢的
    IDE，它自带 C++ 编译器。稍后会详细介绍。


    ## 文本编辑器


    一些程序员更喜欢使用文本编辑器来组装他们的 C++ 代码，然后再通过编译器运行。本质上，你可以使用任何文本编辑器编写代码，只需将其保存为 .cpp 扩展名即可。然而，Notepad++
    是目前最好的代码文本编辑器之一。


    ## 互联网访问


    虽然完全可以在未连接互联网的计算机上学习编程，但这极其困难。你需要安装相关软件，保持其更新，安装任何额外组件或扩展，并在编码时寻求帮助。所有这些都需要访问互联网。


    ## 时间和耐心


    是的，与 Python 一样，你需要投入大量时间来学习如何用 C++ 编程。遗憾的是，除非你是天才，否则这不会在一夜之间甚至一周内发生。一个优秀的 C++
    程序员花费多年时间磨练他们的技能，所以要有耐心，从小处着手，不断学习。


    ## 操作系统特定需求


    C++ 可以在任何操作系统中运行，但将所有必要的组件组合在一起可能会让新手感到困惑。以下是一些操作系统的 C++ 特定需求。


    ## LINUX


    Linux 用户很幸运，因为他们的操作系统已经内置了编译器和文本编辑器。任何文本编辑器都允许你输入 C++ 代码，当保存为 .cpp 扩展名时，使用 g++
    进行编译。


    ## WINDOWS


    我们之前提到过，一个好的 IDE 是 Microsoft 的 Visual Studio。然而，更好的 IDE 和编译器是 Code::Blocks，它定期更新，每年发布两次新版本。否则，Windows
    用户可以在 Notepad++ 中输入代码，然后使用 Code::Blocks 所用的 MinGW 进行编译。


    ## 树莓派


    树莓派的操作系统是 Raspbian，它基于 Linux。因此，你可以使用文本编辑器编写代码，然后像在任何其他 Linux 发行版中一样使用 g++ 进行编译。


    ## MAC


    Mac 用户需要下载并安装 Xcode 才能原生编译他们的 C++ 代码。macOS 的其他选择包括 Netbeans、Eclipse 或 Code::Blocks。注意：由于缺乏
    Mac 开发人员，最新的 Code::Blocks 不适用于 Mac。


    ## 如何在 Windows 中设置 C++


    Windows 用户在 C++ 编程方面有丰富的选择。有许多 IDE 和编译器可用，包括 Microsoft 的 Visual Studio。然而，在我们看来，最适合初学者的
    C++ IDE 是 Code::Blocks。


    ### CODE::BLOCKS


    Code::Blocks 是一个免费的 C++、C 和 Fortran IDE，功能丰富且易于通过插件扩展。它易于使用，自带编译器，并且背后有一个活跃的社区。


    **步骤 1** 首先访问 Code::Blocks 下载网站，网址为 www.codeblocks.org/downloads。从那里，点击“下载二进制发布版”链接，跳转到适用于
    Windows 的最新可下载版本。


    **步骤 2** 你可以看到有几个 Windows 版本可用。你需要下载的版本在当前版本号末尾带有“mingw-setup.exe”。在撰写本文时，这是：codeblocks-17.12mingw-setup.exe。区别在于
    mingw-setup 版本包含来自 TDM-GCC（一个编译器套件）的 C++ 编译器和调试器。


    **步骤 3** 找到文件后，点击该行末尾的 Sourceforge.net 链接，会出现下载通知窗口；点击“保存文件”开始下载并将可执行文件保存到你的 PC。找到下载的
    Code::Blocks 安装程序并双击开始。按照屏幕上的说明开始安装。


    **步骤 4** 同意许可条款后，有多种安装选项可供选择。你可以选择较小的安装，跳过一些组件，但我们建议你选择“完整”选项作为默认设置。


    **步骤 5** 接下来为 Code::Blocks 文件选择安装位置。由你决定，但默认设置通常足够，除非你有特殊要求。当你点击“下一步”时，安装开始；完成后会弹出通知，询问你是否要立即启动
    Code::Blocks，因此点击“是”。


    **步骤 6** Code::Blocks 首次加载时，会自动检测你系统上可能已安装的任何 C++ 编译器。如果你没有任何编译器，点击第一个检测到的选项“GNU
    GCC Compiler”，然后点击“默认”按钮将其设置为系统的 C++ 编译器。准备好继续时点击“确定”。


    **步骤 7** 当程序启动时，会出现另一条消息，告知你 Code::Blocks 目前不是 C++ 文件的默认应用程序。你有几个选择：保持原样或允许 Code::Blocks
    关联所有 C++ 文件类型。同样，我们建议你选择最后一个选项，将 Code::Blocks 与所有支持的文件类型关联。


    **步骤 8** 在开始使用 Code::Blocks 之前，值得解释一下为什么你需要额外的编译器。首先，编译器是一个单独的程序，它读取你的 C++ 代码并根据最新的可接受编程标准进行检查；这就是为什么你需要最新可用的编译器。目前是
    C++17，C++20 正在进行中。


    **步骤 9** 本质上，计算机只工作和理解二进制代码，即 1 和 0，或机器语言。用二进制编程对人类来说效率不高。例如，在 C++ 中向屏幕输出“Hello
    World!”在二进制中会显示为：


    ```

    01100011 01101111 01110101 01110100 00100000

    00111100 00111100 00100000 00100010 01101000

    01100101 01101100 01101100 01101111 00100000

    01010111 01101111 01110010 01101100 01100100

    00100001 00100010 00111011

    ```


    **步骤 10** 因此，编译器将你输入的 C++ 代码转换为机器语言。要执行 C++ 代码，IDE 会“构建”代码，检查错误，然后将其传递给编译器以检查标准化并将其转换为
    1 和 0，供计算机执行。当你停下来思考时，这是相当聪明的东西。'
