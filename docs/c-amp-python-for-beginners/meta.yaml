  mdcn: '## C++ 程序的结构


    ## 注释


    以双斜杠开头的行是注释。这意味着它们不会在代码中执行，并且会被编译器忽略。注释旨在帮助你，或者查看你代码的其他程序员，解释代码的功能。注释有两种类型：/*
    用于多行注释，// 用于单行注释。以双斜杠开头的行是注释。这意味着它们不会在代码中执行，并且会被编译器忽略。注释旨在帮助你，或者查看你代码的其他程序员，解释代码的功能。注释有两种类型：/*
    用于多行注释，// 用于单行注释。


    ![](img/840275566c862102888f27d8ae2ac921_62_0.png)


    ## <<


    这里使用的两个尖括号是插入运算符。这意味着尖括号后面的所有内容都将被插入到 `std::cout` 语句中。在本例中，它们是单词 ''Hello, world''，当你编译并执行代码时，这些单词将显示在屏幕上。


    ![](img/840275566c862102888f27d8ae2ac921_62_1.png)


    ## STD


    虽然 **std** 代表完全不同的东西，但在 C++ 中它表示 Standard（标准）。它是 C++ 标准命名空间的一部分，涵盖了多种不同的语句和命令。你可以省略代码中的
    `std::` 部分，但必须在开头声明：`using namespace std;`，不能两者兼用。例如：


    ```

    #include <iostream>

    using namespace std;

    ```


    ![](img/840275566c862102888f27d8ae2ac921_62_2.png)


    ## 输出


    接下来，"Hello, world!" 部分是我们希望在代码执行时显示在屏幕上的内容。你可以输入任何你喜欢的内容，只要它在引号内即可。括号不是必需的，但有些编译器要求使用它们。`\n`
    部分表示要插入一个换行符。


    ```

    //My first C++ program

    cout << "Hello, world!\n"

    ```


    ## COUT


    在这个例子中，我们使用 `cout`，它是标准命名空间的一部分，因此它出现在那里，因为你要求 C++ 从该特定命名空间使用它。`cout` 意思是 Character
    OUTput（字符输出），它将某些内容显示或打印到屏幕上。如果我们省略 `std::`，则必须在代码开头声明它，如前所述。


    ![](img/840275566c862102888f27d8ae2ac921_62_3.png)


    ## ; 和 }


    最后，你可以看到函数代码块内的行（注释除外）都以分号结尾。这标志着语句的结束，C++ 中的所有语句都必须在末尾有一个分号，否则编译器将无法构建代码。最后一行有一个闭合大括号，表示主函数的结束。


    ![](img/840275566c862102888f27d8ae2ac921_62_4.png)


    ## 编译与执行


    你已经创建了你的第一个 C++ 程序，现在你理解了其结构背后的基础知识。让我们实际动手，编译并执行（或者如果你愿意，运行）程序，看看它的效果如何。


    ## 来自 C++ 的问候


    从 Code::Blocks 编译和执行 C++ 代码非常简单；只需点击一个图标并查看结果即可。以下是具体步骤。


    **步骤 1** 如果你还没有打开 Code::Blocks，请打开它，并加载你之前保存的 Hello World 代码。确保没有可见的错误，例如 `std::cout`
    行末尾缺少分号。


    **步骤 3** 首先点击构建图标，即黄色齿轮。此时，你的代码已经通过 Code::Blocks 编译器运行并检查了任何错误。你可以通过查看底部窗格来查看构建结果。任何关于代码质量的消息都会显示在这里。


    ![](img/840275566c862102888f27d8ae2ac921_63_0.png)


    ![](img/840275566c862102888f27d8ae2ac921_63_1.png)


    **步骤 2** 如果你的代码看起来与我们截图中的类似，那么请查看屏幕顶部的菜单栏。在最顶部菜单的 Fortran 条目下，你可以看到一组图标：一个黄色齿轮、一个绿色播放按钮以及一个齿轮/播放按钮组合。这些是构建、运行、构建并运行功能。


    **步骤 4** 现在点击运行图标，即绿色播放按钮。一个命令行框出现在你的屏幕上，显示文字：Hello, world!，后面是执行代码所花费的时间，并要求你按任意键继续。干得好，你刚刚编译并执行了你的第一个
    C++ 程序。


    ![](img/840275566c862102888f27d8ae2ac921_63_2.png)


    ![](img/840275566c862102888f27d8ae2ac921_63_3.png)


    ## 编译与执行


    步骤 5 在命令行框中按任意键将其关闭，返回到 Code::Blocks。让我们稍微修改一下代码。在 `#include` 行下方，输入：


