    \ been inputted by the user, as age + 10 won't work due to being a string variable\
    \ and an integer. Instead, you need to enter:\n\n```\nint(age) + 10\n```\n\nThis\
    \ will TypeCast the age string into an integer that can be worked with.\n\n![](img/840275566c862102888f27d8ae2ac921_34_1.png)\n\
    \nSTEP 6 This is a process known as TypeCasting. The Python code is:\n\n```\n\
    print (character + \" is \" + str(age) + \" years old.\")\n```\n\nor you can use:\n\
    \n```\nprint (character, \"is\", age, \"years old.\")\n```\n\nNotice again that\
    \ in the last example, you don't need the spaces between the words in quotes as\
    \ the commas treat each argument to print separately.\n\n```\n>>> print (name\
    \ + age)\nTraceback (most recent call last):\n  File \"<pyshell#18>\", line 1,\
    \ in <module>\n    print (name + age)\nTypeError: Can't convert 'int' object to\
    \ str implicitly\n>>> print (character + \" is \" + str(age) + \" years old.\"\
    )\nDavid Hayward: Descended from Vikings is 44 years old.\n>>> print (character,\
    \ \"is\", age, \"years old.\")\nDavid Hayward: Descended from Vikings is 44 years\
    \ old.\n>>>\n```\n\nSTEP 9 The use of TypeCasting is also important when dealing\
    \ with floating point arithmetic; remember: numbers that have a decimal point\
    \ in them. For example, enter:\n\n```\nshirt=19.99\n```\n\nNow enter type(shirt)\
    \ and you'll see that Python has allocated the number as a 'float', because the\
    \ value contains a decimal point.\n\n![](img/840275566c862102888f27d8ae2ac921_34_2.png)\n\
    \nSTEP 7 Another example of TypeCasting is when you ask for input from the user,\
    \ such as a name. for example, enter:\n\n```\nage= input (\"How old are you? \"\
    )\n```\n\nAll data stored from the Input command is stored as a string variable.\n\
    \n![](img/840275566c862102888f27d8ae2ac921_34_3.png)\n\nSTEP 10 When combining\
    \ integers and floats Python usually converts the integer to a float, but should\
    \ the reverse ever be applied it's worth remembering that Python doesn't return\
    \ the exact value. When converting a float to an integer, Python will always round\
    \ down to the nearest integer, called truncating; in our case instead of 19.99\
    \ it becomes 19.\n\n![](img/840275566c862102888f27d8ae2ac921_34_4.png)"
  - '[PAGE 35]


    # User Input


    We''ve seen some basic user interaction with the code from a few of the examples
    earlier, so now would be a good time to focus solely on how you would get information
    from the user then store and present it.


    # USER FRIENDLY


    The type of input you want from the user will depend greatly on the type of program
    you''re coding. For example, a game may ask for a character''s name, whereas a
    database can ask for personal details.


    STEP 1 If it''s not already, open the Python 3 IDLE Shell, and start a New File
    in the Editor. Let''s begin with something really simple, enter:

    print("Hello")

    firstname=input("What is your first name? ")

    print("Thanks.")

    surname=input("And what is your surname? ")


    STEP 3 Now that we have the user''s name stored in a couple of variables we can
    call them up whenever we want:

    print("Welcome", firstname, surname, ". I hope you''re well today.")


    ![](img/840275566c862102888f27d8ae2ac921_35_0.png)


    ![](img/840275566c862102888f27d8ae2ac921_35_1.png)


    STEP 2 Save and execute the code, and as you already no doubt suspected, in the
    IDLE Shell the program will ask for your first name, storing it as the variable
    firstname, followed by your surname; also stored in its own variable (surname).


    STEP 4 Run the code and you can see a slight issue, the full stop after the surname
    follows a blank space. To eliminate that we can add a plus sign instead of the
    comma in the code:

    print("Welcome", firstname, surname+". I hope you''re well today.")


    ![](img/840275566c862102888f27d8ae2ac921_35_2.png)


    ![](img/840275566c862102888f27d8ae2ac921_35_3.png)'
  - "[PAGE 36]\n\n# User Input\n\nSTEP 5 You don't always have to include quoted text\
    \ within the input command. For example, you can ask the user their name, and\
    \ have the input in the line below:\nprint(\"Hello. What's your name?\")\nname=input()\n\
    \n![](img/840275566c862102888f27d8ae2ac921_36_0.png)\n\nSTEP 8 What you've created\
    \ here is a condition, which we will cover soon. In short, we're using the input\
    \ from the user and measuring it against a condition. So, if the user enters David\
    \ as their name, the guard will allow them to pass unhindered. Else, if they enter\
    \ a name other than David, the guard challenges them to a fight.\n\n![](img/840275566c862102888f27d8ae2ac921_36_1.png)\n\
    \nSTEP 6 The code from the previous step is often regarded as being a little neater\
    \ than having a lengthy amount of text in the input command, but it's not a rule\
    \ that's set in stone, so do as you like in these situations. Expanding on the\
    \ code, try this:\nprint(\"Halt! Who goes there?\")\nname=input()\n\n![](img/840275566c862102888f27d8ae2ac921_36_2.png)\n\
    \nSTEP 9 Just as you learned previously, any input from a user is automatically\
    \ a string, so you need to apply a TypeCast in order to turn it into something\
    \ else. This creates some interesting additions to the input command. For example:\n\
    # Code to calculate rate and distance\nprint(\"Input a rate and a distance\")\n\
    rate = float(input(\"Rate: \"))\n\n![](img/840275566c862102888f27d8ae2ac921_36_3.png)\n\
    \nSTEP 7 It's a good start to a text adventure game, perhaps? Now you can expand\
    \ on it and use the raw input from the user to flesh out the game a little:\n\
    if name==\"David\":\n    print(\"Welcome, good sir. You may pass.\")\nelse:\n\
    \    print(\"I know you not. Prepare for battle!\")\n\n![](img/840275566c862102888f27d8ae2ac921_36_4.png)\n\
    \nSTEP 10 To finalise the rate and distance code, we can add:\ndistance = float(input(\"\
    Distance: \"))\nprint(\"Time:\", (distance / rate))\nSave and execute the code\
    \ and enter some numbers. Using the float(input element, we've told Python that\
    \ anything entered is a floating point number rather than a string.\n\n![](img/840275566c862102888f27d8ae2ac921_36_5.png)"
- md: "## Creating Functions\n\nNow that you've mastered the use of variables and\
    \ user input, the next step is to tackle functions. You've already used a few\
    \ functions, such as the print command but Python enables you to define your own\
    \ functions.\n\n## FUNKY FUNCTIONS\n\nA function is a command that you enter into\
    \ Python to do something. It's a little piece of self-contained code that takes\
    \ data, works on it and then returns the result.\n\nSTEP 1 It's not just data\
    \ that a function works on. They can do all manner of useful things in Python,\
    \ such as sort data, change items from one format to another and check the length\
    \ or type of items. Basically, a function is a short word that's followed by brackets.\
    \ For example, len(), list() or type().\n\nSTEP 2 A function takes data, usually\
    \ a variable, works on it depending on what the function is programmed to do and\
    \ returns the end value. The data being worked on goes inside the brackets, so\
    \ if you wanted to know how many letters are in the word antidisestablishmentarianism,\
    \ then you'd enter: len(\"antidisestablishmentarianism\") and the number 28 would\
    \ return.\n\nSTEP 3 You can pass variables through functions in much the same\
    \ manner. Let's assume you want the number of letters in a person's surname, you\
    \ could use the following code (enter the text editor for this example):\n\n```\n\
    name=input (\"Enter your surname: \")\ncount=len(name)\nprint (\"Your surname\
    \ has\", count, \"letters in it.\")\n```\n\nPress F5 and save the code to execute\
    \ it.\n\nSTEP 4 Python has tens of functions built into it, far too many to get\
    \ into in the limited space available here. However, to view the list of built-in\
    \ functions available to Python 3, navigate to www.docs.python.org/3/library/functions.html.\
    \ These are the predefined functions, but since users have created many more,\
    \ they're not the only ones available.\n\nSTEP 5 Additional functions can be added\
    \ to Python through modules. Python has a vast range of modules available that\
    \ can cover numerous programming duties. They add functions and can be imported\
    \ as and when required. For example, to use advanced mathematics functions enter:\n\
    \n```\nimport math\n```\n\nOnce entered, you have access to all the math module\
    \ functions.\n\nSTEP 6 To use a function from a module enter the name of the module\
    \ followed by a full stop, then the name of the function. For instance, using\
    \ the math module, since you've just imported it into Python, you can utilise\
    \ the square root function. To do so, enter:\n\n```\nmath.sqrt(16)\n```\n\nYou\
    \ can see that the code is presented as module.function(data).\n\n## FORGING FUNCTIONS\n\
    \nThere are many different functions you can import created by other Python programmers\
    \ and you will undoubtedly come across some excellent examples in the future;\
    \ you can also create your own with the def command.\n\nSTEP 1 Choose File > New\
    \ File to enter the editor, let's create a function called Hello, that greets\
    \ a user. Enter:\n\n```\ndef Hello():\n    print (\"Hello\")\n\nHello()\n```\n\
    \nPress F5 to save and run the script. You can see Hello in the Shell, type in\
    \ Hello() and it returns the new function.\n\nSTEP 2 Let's now expand the function\
    \ to accept a variable, the user's name for example. Edit your script to read:\n\
    \n```\ndef Hello(name):\n    print (\"Hello\", name)\n\nHello(\"David\")\n```\n\
    \nThis will now accept the variable name, otherwise it prints Hello David. In\
    \ the Shell, enter: name=(\"Bob\"), then: Hello(name). Your function can now pass\
    \ variables through it.\n\nSTEP 3 To modify it further, delete the Hello(\"David\"\
    ) line, the last line in the script and press Ctrl+S to save the new script. Close\
    \ the Editor and create a new file (File > New File). Enter the following:\n\n\
    ```\nfrom Hello import Hello\n\nHello(\"David\")\n```\n\nPress F5 to save and\
    \ execute the code.\n\nSTEP 4 What you've just done is import the Hello function\
    \ from the saved Hello.py program and then used it to say hello to David. This\
    \ is how modules and functions work: you import the module then use the function.\
    \ Try this one, and modify it for extra credit:\n\n```\ndef add(a, b):\n    result\
    \ = a + b\n    return result\n```\n\n## Conditions and Loops\n\nConditions and\
    \ loops are what makes a program interesting; they can be simple or rather complex.\
    \ How you use them depends greatly on what the program is trying to achieve; they\
    \ could be the number of lives left in a game or just displaying a countdown.\n\
    \n## TRUE CONDITIONS\n\nKeeping conditions simple to begin with makes learning\
    \ to program a more enjoyable experience. Let's start then by checking if something\
    \ is TRUE, then doing something else if it isn't.\n\nSTEP 1 Let's create a new\
    \ Python program that will ask the user to input a word, then check it to see\
    \ if it's a four-letter word or not. Start with File > New File, and begin with\
    \ the input variable:\n`word=input(\"Please enter a four-letter word: \")`\n\n\
    STEP 2 Now we can create a new variable, then use the len function and pass the\
    \ word variable through it to get the total number of letters the user has just\
    \ entered:\n`word=input(\"Please enter a four-letter word: \")`\n`word_length=len(word)`\n\
    \nSTEP 3 Now you can use an if statement to check if the word_length variable\
    \ is equal to four and print a friendly conformation if it applies to the rule:\n\
    `word=input(\"Please enter a four-letter word: \")`\n`word_length=len(word)`\n\
    `if word_length == 4:`\n`    print (word, \"is a four-letter word. Well done.\"\
    )`\n\nThe double equal sign (==) means check if something is equal to something\
    \ else.\n\nSTEP 4 The colon at the end of IF tells Python that if this statement\
    \ is true do everything after the colon that's indented. Next, move the cursor\
    \ back to the beginning of the Editor:\n`word=input(\"Please enter a four-letter\
    \ word: \")`\n`word_length=len(word)`\n`if word_length == 4:`\n`    print (word,\
    \ \"is a four-letter word. Well done.\")`\n`else:`\n`    print (word, \"is not\
    \ a four-letter word.\")`\n\nSTEP 5 Press F5 and save the code to execute it.\
    \ Enter a four-letter word in the Shell to begin with, you should have the returned\
    \ message that it's the word is four letters. Now press F5 again and rerun the\
    \ program but this time enter a five-letter word. The Shell will display that\
    \ it's not a four-letter word.\n\nSTEP 6 Now expand the code to include another\
    \ conditions. Eventually, it could become quite complex. We've added a condition\
    \ for three-letter words:\n\n```\nword=input(\"Please enter a four-letter word:\
    \ \")\nword_length=len(word)\nif word_length == 4:\n    print (word, \"is a four-letter\
    \ word. Well done.\")\nelif word_length == 3:\n    print (word, \"is a three-letter\
    \ word. Try again.\")\nelse:\n    print (word, \"is not a four-letter word.\"\
    )\n```\n\n## LOOPS\n\nA loop looks quite similar to a condition but they are somewhat\
    \ different in their operation. A loop will run through the same block of code\
    \ a number of times, usually with the support of a condition.\n\nSTEP 1 Let's\
    \ start with a simple While statement. Like IF, this will check to see if something\
    \ is TRUE, then run the indented code:\n\n```\nx = 1\nwhile x < 10:\n    print\
    \ (x)\n    x = x + 1\n```\n\nSTEP 2 The difference between if and while is when\
    \ while gets to the end of the indented code, it goes back and checks the statement\
    \ is still true. In our example x is less than 10. With each loop it prints the\
    \ current value of x, then adds one to that value. When x does eventually equal\
    \ 10 it stops.\n\nSTEP 3 The For loop is another example. For is used to loop\
    \ over a range of data, usually a list stored as variables inside square brackets.\
    \ For example:\n\n```\nwords=[\"Cat\", \"Dog\", \"Unicorn\"]\nfor word in words:\n\
    \    print (word)\n```\n\nSTEP 4 The For loop can also be used in the countdown\
    \ example by using the range function:\n\n```\nfor x in range (1, 10):\n    print\
    \ (x)\n```\n\nThe x=x+1 part isn't needed here because the range function creates\
    \ a list between the first and last numbers used."
  mdcn: "## 创建函数\n\n既然你已经掌握了变量和用户输入的使用，下一步就是学习函数。你已经使用过一些函数，比如打印命令，但Python允许你定义自己的函数。\n\
    \n## 有趣的函数\n\n函数是你输入到Python中以执行某项操作的命令。它是一小段自包含的代码，接收数据，对其进行处理，然后返回结果。\n\n**步骤\
    \ 1** 函数处理的不仅仅是数据。它们可以在Python中执行各种有用的任务，例如排序数据、将项目从一种格式转换为另一种格式，以及检查项目的长度或类型。基本上，函数是一个短词，后面跟着括号。例如，`len()`、`list()`或`type()`。\n\
    \n**步骤 2** 函数接收数据（通常是一个变量），根据其编程设定进行处理，并返回最终值。被处理的数据放在括号内，所以如果你想知道单词\"antidisestablishmentarianism\"\
    有多少个字母，你可以输入：`len(\"antidisestablishmentarianism\")`，它会返回数字28。\n\n**步骤 3** 你可以用类似的方式将变量传递给函数。假设你想知道一个人姓氏的字母数，你可以使用以下代码（为此示例进入文本编辑器）：\n\
    \n```\nname=input (\"Enter your surname: \")\ncount=len(name)\nprint (\"Your surname\
    \ has\", count, \"letters in it.\")\n```\n\n按F5并保存代码以执行它。\n\n**步骤 4** Python内置了数十个函数，数量之多，在有限的篇幅内无法一一介绍。但是，要查看Python\
    \ 3可用的内置函数列表，请访问 www.docs.python.org/3/library/functions.html。这些是预定义的函数，但由于用户创建了更多函数，它们并非唯一可用的函数。\n\
    \n**步骤 5** 可以通过模块向Python添加额外的函数。Python拥有大量可用的模块，可以涵盖众多编程任务。它们添加函数，并可以根据需要随时导入。例如，要使用高级数学函数，请输入：\n\
    \n```\nimport math\n```\n\n一旦输入，你就可以访问所有math模块的函数。\n\n**步骤 6** 要使用模块中的函数，请输入模块名称，后跟一个句点，然后是函数名称。例如，使用math模块（因为你刚刚将其导入Python），你可以利用平方根函数。为此，请输入：\n\
    \n```\nmath.sqrt(16)\n```\n\n你可以看到代码的格式是`模块.函数(数据)`。\n\n## 创建函数\n\n你可以导入许多由其他Python程序员创建的不同函数，将来你无疑会遇到一些优秀的例子；你也可以使用`def`命令创建自己的函数。\n\
    \n**步骤 1** 选择“文件 > 新建文件”进入编辑器，让我们创建一个名为`Hello`的函数，用于向用户问好。输入：\n\n```\ndef Hello():\n\
    \    print (\"Hello\")\n\nHello()\n```\n\n按F5保存并运行脚本。你可以在Shell中看到`Hello`，输入`Hello()`，它会返回这个新函数。\n\
    \n**步骤 2** 现在让我们扩展这个函数以接受一个变量，例如用户名。将你的脚本编辑为：\n\n```\ndef Hello(name):\n    print\
    \ (\"Hello\", name)\n\nHello(\"David\")\n```\n\n这现在将接受变量`name`，否则它会打印\"Hello David\"\
    。在Shell中，输入：`name=(\"Bob\")`，然后：`Hello(name)`。你的函数现在可以传递变量了。\n\n**步骤 3** 要进一步修改它，删除`Hello(\"\
    David\")`这一行（脚本的最后一行），然后按Ctrl+S保存新脚本。关闭编辑器并创建一个新文件（“文件 > 新建文件”）。输入以下内容：\n\n```\n\
    from Hello import Hello\n\nHello(\"David\")\n```\n\n按F5保存并执行代码。\n\n**步骤 4** 你刚刚做的是从保存的`Hello.py`程序中导入`Hello`函数，然后用它向David问好。这就是模块和函数的工作方式：你导入模块，然后使用函数。试试这个，并修改它以获得额外加分：\n\
    \n```\ndef add(a, b):\n    result = a + b\n    return result\n```\n\n## 条件和循环\n\
    \n条件和循环使程序变得有趣；它们可以很简单，也可以相当复杂。你如何使用它们很大程度上取决于程序试图实现的目标；它们可以是游戏中剩余的生命数，或者只是显示一个倒计时。\n\
    \n## 真实条件\n\n从简单的条件开始学习编程会使学习过程更加愉快。那么，让我们从检查某事是否为真开始，如果不是，则执行其他操作。\n\n**步骤 1**\
    \ 让我们创建一个新的Python程序，它将要求用户输入一个单词，然后检查它是否是一个四字母单词。从“文件 > 新建文件”开始，并从输入变量开始：\n`word=input(\"\
    Please enter a four-letter word: \")`\n\n**步骤 2** 现在我们可以创建一个新变量，然后使用`len`函数并将`word`变量传递给它，以获取用户刚刚输入的字母总数：\n\
    `word=input(\"Please enter a four-letter word: \")`\n`word_length=len(word)`\n\
    \n**步骤 3** 现在你可以使用`if`语句检查`word_length`变量是否等于四，如果符合规则，则打印一条友好的确认信息：\n`word=input(\"\
    Please enter a four-letter word: \")`\n`word_length=len(word)`\n`if word_length\
    \ == 4:`\n`    print (word, \"is a four-letter word. Well done.\")`\n\n双等号（`==`）表示检查某物是否等于另一物。\n\
    \n**步骤 4** `IF`末尾的冒号告诉Python，如果此语句为真，则执行冒号后所有缩进的内容。接下来，将光标移回编辑器的开头：\n`word=input(\"\
    Please enter a four-letter word: \")`\n`word_length=len(word)`\n`if word_length\
    \ == 4:`\n`    print (word, \"is a four-letter word. Well done.\")`\n`else:`\n\
    `    print (word, \"is not a four-letter word.\")`\n\n**步骤 5** 按F5并保存代码以执行它。首先在Shell中输入一个四字母单词，你应该会收到返回的消息，表明该单词是四个字母。现在再次按F5并重新运行程序，但这次输入一个五字母单词。Shell将显示它不是一个四字母单词。\n\
    \n**步骤 6** 现在扩展代码以包含另一个条件。最终，它可能变得相当复杂。我们添加了一个针对三字母单词的条件：\n\n```\nword=input(\"\
    Please enter a four-letter word: \")\nword_length=len(word)\nif word_length ==\
    \ 4:\n    print (word, \"is a four-letter word. Well done.\")\nelif word_length\
    \ == 3:\n    print (word, \"is a three-letter word. Try again.\")\nelse:\n   \
    \ print (word, \"is not a four-letter word.\")\n```\n\n## 循环\n\n循环看起来与条件非常相似，但它们在操作上有些不同。循环将多次运行同一段代码块，通常由条件支持。\n\
    \n**步骤 1** 让我们从一个简单的`While`语句开始。像`IF`一样，它将检查某事是否为真，然后运行缩进的代码：\n\n```\nx = 1\n\
    while x < 10:\n    print (x)\n    x = x + 1\n```\n\n**步骤 2** `if`和`while`的区别在于，当`while`到达缩进代码的末尾时，它会返回并检查语句是否仍然为真。在我们的例子中，`x`小于10。每次循环，它都会打印`x`的当前值，然后将该值加一。当`x`最终等于10时，它停止。\n\
    \n**步骤 3** `For`循环是另一个例子。`For`用于遍历一系列数据，通常是存储在方括号内的变量列表。例如：\n\n```\nwords=[\"\
    Cat\", \"Dog\", \"Unicorn\"]\nfor word in words:\n    print (word)\n```\n\n**步骤\
    \ 4** `For`循环也可以通过使用`range`函数用于倒计时示例：\n\n```\nfor x in range (1, 10):\n    print\
    \ (x)\n```\n\n这里不需要`x=x+1`部分，因为`range`函数在第一个和最后一个数字之间创建了一个列表。"
