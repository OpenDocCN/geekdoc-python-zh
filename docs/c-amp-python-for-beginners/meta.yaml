    ![](img/840275566c862102888f27d8ae2ac921_64_4.png)


    STEP 10 Replace the semicolon and under the cout line, enter a new line to your
    code:


    `cout << "And greetings from C++!\n";`


    The \n simply adds a new line under the last line of outputted text. Build and
