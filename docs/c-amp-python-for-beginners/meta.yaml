  mdcn: "## C++ 数学运算\n\n第5步 当你调用C++数学库时，有趣的数学内容就出现了。在这个头文件中，包含了数十个数学函数以及更多操作。从计算余弦到双参数反正切，再到圆周率的值，应有尽有。你可以通过以下方式调用该头文件：\n\
    \n```cpp\n#include <iostream>\n#include <cmath>\nusing namespace std;\n\nint main\
    \ ()\n{\n}\n```\n\n第8步 计算数字的幂可以使用：\n\n```cpp\n#include <iostream>\n#include <cmath>\n\
    using namespace std;\n\nint main ()\n{\n    float number = 12;\n    cout << number\
    \ << \" to the power of 2 is \" << pow(number, 2) << \"\\n\";\n    cout << number\
    \ << \" to the power of 3 is \" << pow(number, 3) << \"\\n\";\n    cout << number\
    \ << \" to the power of .08 is \" << pow(number, 0.8) << \"\\n\";\n}\n```\n\n\
    第6步 首先获取一个数的平方根：\n\n```cpp\n#include <iostream>\n#include <cmath>\nusing namespace\
    \ std;\n\nint main ()\n{\n    float number = 134;\n    cout << \"The square root\
    \ of \" << number << \" is: \" << sqrt(number) << \"\\n\";\n}\n```\n\n第9步 这里我们创建了一个名为`number`的浮点数，其值为12，而`pow(变量,\
    \ 幂)`就是进行计算的地方。当然，你也可以不使用变量来计算幂和平方根。例如，`pow(12, 2)`输出的值与代码中第一个`cout`行相同。\n\n第10步\
    \ 圆周率的值也存储在`cmath`头文件库中。可以通过`M_PI`函数调用它。在代码中输入`cout << M_PI;`，你将得到3.14159；或者你可以用它来进行计算：\n\
    \n```cpp\n#include <iostream>\n#include <cmath>\nusing namespace std;\n\nint main\
    \ ()\n{\n    double area, radius = 1.5;\n    area = M_PI * radius * radius;\n\
    \    cout << area << \"\\n\";\n}\n```\n\n第7步 这里我们创建了一个新的浮点数`number`，并使用`sqrt(number)`函数来显示134的平方根，即变量`number`的值。构建并运行代码，你的答案将是11.5758。\n\
    \n现在你已经掌握了基础知识，可以在我们的下一级指南中提升并学习更多必备技能...\n\n现已推出\n\nwww.pclpublications.com\n\
    \n## 初学者指南\n\n技术指南现已登陆Readly\n\n完整标题列表请访问：www.pclpublications.com\n\n## 想要精通你的代码？\n\
    那就不要错过我们全新的《编程与编码》杂志，现已登陆Readly！\n\n点击我们的便捷链接立即阅读：https://bit.ly/3OcL1zx\n\n《C++与Python初学者指南》\n\
    第15版 - ISBN: 978-1-912847-12-9\n出版方：Papercut Limited\n数字发行：Readly AB - www.readly.com\n\
