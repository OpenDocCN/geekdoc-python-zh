  md: "# C++ Maths\n\nProgramming is mathematical in nature and as you might expect,\
    \ there's plenty of built-in scope for some quite intense maths. C++ has a lot\
    \ to offer someone who's implementing mathematical models into their code. It\
    \ can be extremely complex or relatively simple.\n\n# C++ = MC²\n\nThe basic mathematical\
    \ symbols apply in C++ as they do in most other programming languages. However,\
    \ by using the C++ Math Library, you can also calculate square roots, powers,\
    \ trig and more.\n\nSTEP 1 C++'s mathematical operations follow the same patterns\
    \ as those taught in school, in that multiplication and division take precedence\
    \ over addition and subtraction. You can alter that though. For now, create a\
    \ new file and enter:\n\n```\n#include <iostream>\nusing namespace std;\n\nint\
    \ main ()\n{\n    float numbers = 100;\n\n    numbers = numbers + 10; // This\
    \ adds 10 to the initial 100\n    cout << numbers << \"\\n\";\n\n    numbers =\
    \ numbers - 10; // This subtracts 10 from the new 110\n    cout << numbers <<\
    \ \"\\n\";\n}\n```\n\nSTEP 3 Multiplication and division can be applied as such:\n\
    \n```\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    float\
    \ numbers = 100;\n\n    numbers = numbers * 10; // This multiplies 100 by 10\n\
    \    cout << numbers << \"\\n\";\n\n    numbers = numbers / 10; // And this divides\
    \ 1000 by 10\n    cout << numbers << \"\\n\";\n}\n```\n\n![](img/840275566c862102888f27d8ae2ac921_73_0.png)\n\
    \n![](img/840275566c862102888f27d8ae2ac921_73_1.png)\n\nSTEP 2 While simple, it\
    \ does get the old maths muscle warmed up. Note that we used a float for the numbers\
    \ variable. While you can happily use an integer, if you suddenly started to use\
    \ decimals, you would need to change to a float or a double, depending on the\
    \ accuracy needed. Run the code and see the results.\n\nSTEP 4 Again, execute\
    \ the simple code and see the results. While not particularly interesting, it's\
    \ a start into C++ maths. We used a float here, so you can play around with the\
    \ code and multiply by decimal places, as well as divide, add and subtract.\n\n\
    ![](img/840275566c862102888f27d8ae2ac921_73_2.png)\n\n![](img/840275566c862102888f27d8ae2ac921_73_3.png)"
  merge: -1
