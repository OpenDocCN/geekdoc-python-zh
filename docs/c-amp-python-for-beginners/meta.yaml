- md: "## C++ COMMENTS\n\nCommenting in C++ involves using a double forward slash\
    \ '//', or a forward slash and an asterisk, '/*'. You've already seen some brief\
    \ examples but this is how they work.\n\n**STEP 1** Using the Hello World code\
    \ as an example, you can easily comment on different sections of the code using\
    \ the double forward slash:\n\n```\n//My first C++ program\ncout << \"Hello, world!\\\
    n\";\n```\n\n**STEP 2** However, you can also add comments to the end of a line\
    \ of code, to describe in a better way what's going on:\n\n```\ncout << \"Hello,\
    \ world!\\n\"; //This line outputs the words 'Hello, world!'. The \\n denotes\
    \ a new line.\n```\n\nNote, you don't have to put a semicolon at the end of a\
    \ comment. This is because it's a line in the code that's ignored by the compiler.\n\
    \n**STEP 3** You can comment out several lines by using the forward slash and\
    \ asterisk:\n\n```\n/* This comment can\n    cover several lines\n    without\
    \ the need to add more slashes */\n```\n\nJust remember to finish the block comment\
    \ with the opposite asterisk and forward slash.\n\n**STEP 4** Be careful when\
    \ commenting, especially with block comments. It's very easy to forget to add\
    \ the closing asterisk and forward slash and thus negate any code that falls inside\
    \ the comment block.\n\n**STEP 5** Obviously if you try and build and execute\
    \ the code it errors out, complaining of a missing curly bracket '}' to finish\
    \ off the block of code. If you've made the error a few times, then it can be\
    \ time consuming to go back and rectify. Thankfully, the colour coding in Code::Blocks\
    \ helps identify comments from code.\n\n**STEP 6** If you're using block comments,\
    \ it's good practise in C++ to add an asterisk to each new line of the comment\
    \ block. This also helps you to remember to close the comment block off before\
    \ continuing with the code:\n\n```\n/* This comment can\n * cover several lines\n\
    \ * without the need to add more slashes */\n```\n\n## Variables\n\nVariables\
    \ differ slightly when using C++ as opposed to Python. In Python, you can simply\
    \ state that ‘a’ equals 10 and a variable is assigned. However, in C++ a variable\
    \ has to be declared with its type before it can be used.\n\n## THE DECLARATION\
    \ OF VARIABLES\n\nYou can declare a C++ variable by using statements within the\
    \ code. There are several distinct types of variables you can declare. Here’s\
    \ how it works.\n\n**STEP 1** Open up a new, blank C++ file and enter the usual\
    \ code headers:\n\n```\n#include <iostream>\nusing namespace std;\n\nint main()\n\
    {\n}\n```\n\n**STEP 2** Start simple by creating two variables, a and b, with\
    \ one having a value of 10 and the other 5. You can use the data type int to declare\
    \ these variables. Within the curly brackets, enter:\n\n```\nint a;\nint b;\n\n\
    a = 10;\nb = 5;\n```\n\n**STEP 3** You can build and run the code but it won’t\
    \ do much, other than store the values 10 and 5 to the integers a and b. To output\
    \ the contents of the variables, add:\n\n```\ncout << a;\ncout << \"\\n\";\ncout\
    \ << b;\n```\n\nThe `cout << \"\\n\";` part simply places a new line between the\
    \ output of 10 and 5.\n\n**STEP 4** Naturally you can declare a new variable,\
    \ call it result and output some simple arithmetic:\n\n```\nint result;\nresult\
    \ = a + b;\ncout << result;\n```\n\nInsert the above into the code as per the\
    \ screenshot.\n\n**STEP 5** You can assign a value to a variable as soon as you\
    \ declare it. The code you've typed in could look like this, instead:\n\n```\n\
    int a = 10;\nint b = 5;\nint result = a + b;\ncout << result;\n```\n\n**STEP 6**\
    \ Specific to C++, you can also use the following to assign values to a variable\
    \ as soon as you declare them:\n\n```\nint a (10);\nint b (5);\n```\n\nThen, from\
    \ the C++ 2011 standard, using curly brackets:\n\n```\nint result {a+b};\n```\n\
    \n**STEP 7** You can create global variables, which are variables that are declared\
    \ outside any function and used in any function within the entire code. What you've\
    \ used so far are local variables: variables used inside the function. For example:\n\
    \n```\n#include <iostream>\nusing namespace std;\nint StartLives = 3;\n\nint main\
    \ ()\n{\n    startLives = StartLives - 1;\n    cout << StartLives;\n}\n```\n\n\
    **STEP 8** The previous step creates the variable StartLives, which is a global\
    \ variable. In a game, for example, a player's lives go up or down depending on\
    \ how well or how bad they're doing. When the player restarts the game, the StartLives\
    \ returns to its default state: 3. Here we've assigned 3 lives, then subtracted\
    \ 1, leaving 2 lives left.\n\n**STEP 9** The modern C++ compiler is far more intelligent\
    \ than most programmers give it credit. While there are numerous data types you\
    \ can declare for variables, you can in fact use the auto feature:\n\n```\n#include\
    \ <iostream>\nusing namespace std;\nauto pi = 3.141593;\n\nint main()\n{\n   \
    \ double area, radius = 1.5;\n    area = pi * radius * radius;\n    cout << area;\n\
    }\n```\n\n**STEP 10** A couple of new elements here: first, auto won't work unless\
    \ you go to Settings > Compiler and tick the box labelled 'Have G++ follow the\
    \ C++11 ISO C++ Language Standard [-std=c++11]'. Then, the new data type, double,\
    \ which means double-precision floating point value. Enable C++11, then build\
    \ and run the code. The result should be 7.06858.\n\n## Data Types\n\nVariables,\
    \ as we've seen, store information that the programmer can then later call up,\
    \ and manipulate if required. Variables are simply reserved memory locations that\
    \ store the values the programmer assigns, depending on the data type used.\n\n\
    ## THE VALUE OF DATA\n\nThere are many different data types available for the\
    \ programmer in C++, such as an integer, floating point, Boolean, character and\
    \ so on. It's widely accepted that there are seven basic data types, often called\
    \ Primitive Built-in Types; however, you can create your own data types should\
    \ the need ever arise within your code.\n\nThe seven basic data types are:\n\n\
    | TYPE | COMMAND |\n|---|---|\n| Integer | `Integer` |\n| Floating Point | `float`\
    \ |\n| Character | `char` |\n| Boolean | `bool` |\n| Double Floating Point | `double`\
    \ |\n| Wide Character | `wchar_t` |\n| No Value | `void` |\n\nThese basic types\
    \ can also be extended using the following modifiers: Long, Short, Signed and\
    \ Unsigned. Basically this means the modifiers can expand the minimum and maximum\
    \ range values for each data type. For example, the int data type has a default\
    \ value range of -2147483648 to 2147483647, a fair value, you would agree.\n\n\
    Now, if you were to use one of the modifiers, the range alters:\n\nUnsigned int\
    \ = 0 to 4294967295\nSigned int = -2147483648 to 2147483647\nShort int = -32768\
    \ to 32767\nUnsigned Short int = 0 to 65,535\nSigned Short int = -32768 to 32767\n\
    Long int = -2147483647 to 2147483647\nSigned Long int = -2147483647 to 2147483647\n\
    Unsigned Long int = 0 to 4294967295\n\nNaturally you can get away with using the\
    \ basic type without the modifier, as there's plenty of range provided with each\
    \ data type. However, it's considered good C++ programming practise to use the\
    \ modifiers when possible.\n\nThere are issues when using the modifiers though.\
    \ Double represents a double-floating point value, which you can use for incredibly\
    \ accurate numbers but those numbers are only accurate up to the fifteenth decimal\
    \ place. There's also the problem when displaying such numbers in C++ using the\
    \ cout function, in that cout by default only outputs the first five decimal places.\
    \ You can combat that by adding a cout.precision () function and adding a value\
    \ inside the brackets, but even then you're still limited by the accuracy of the\
    \ double data type. For example, try this code:\n\n```\n#include <iostream>\n\
    using namespace std;\ndouble PI = 3.141592653589793238463;\n\nint main()\n{\n\
    \    cout << PI;\n}\n```\n\nBuild and run the code and as you can see the output\
    \ is only 3.14159, representing cout's limitations in this example.\n\nYou can\
    \ alter the code including the aforementioned cout.precision function, for greater\
    \ accuracy. Take precision all the way up to 22 decimal places, with the following\
    \ code:\n\n```\n#include <iostream>\nusing namespace std;\ndouble PI = 3.141592653589793238463;\n\
    \nint main()\n{\n```"
  mdcn: "## C++ 注释\n\n在 C++ 中，注释可以通过使用双斜杠 `//`，或者斜杠加星号 `/*` 来实现。你已经看过一些简单的例子，但下面会详细说明它们的工作原理。\n\
    \n**步骤 1** 以 Hello World 代码为例，你可以轻松地使用双斜杠为代码的不同部分添加注释：\n\n```\n//My first C++\
    \ program\ncout << \"Hello, world!\\n\";\n```\n\n**步骤 2** 不过，你也可以在代码行的末尾添加注释，以更清晰地描述代码的功能：\n\
    \n```\ncout << \"Hello, world!\\n\"; //This line outputs the words 'Hello, world!'.\
    \ The \\n denotes a new line.\n```\n\n请注意，注释末尾不需要加分号。这是因为注释是代码中被编译器忽略的部分。\n\n\
    **步骤 3** 你可以使用斜杠和星号来注释掉多行代码：\n\n```\n/* This comment can\n    cover several lines\n\
    \    without the need to add more slashes */\n```\n\n只需记住，块注释要以相反的星号和斜杠结束。\n\n\
    **步骤 4** 添加注释时要小心，尤其是块注释。很容易忘记添加结束的星号和斜杠，从而导致注释块内的所有代码失效。\n\n**步骤 5** 显然，如果你尝试构建并执行代码，它会报错，提示缺少一个花括号\
    \ `}` 来结束代码块。如果你多次犯这个错误，那么回头修正就会很耗时。幸运的是，Code::Blocks 中的颜色编码有助于区分注释和代码。\n\n**步骤\
    \ 6** 如果你使用块注释，C++ 的良好实践是在注释块的每一行开头添加一个星号。这也有助于你记住在继续编写代码之前关闭注释块：\n\n```\n/* This\
    \ comment can\n * cover several lines\n * without the need to add more slashes\
    \ */\n```\n\n## 变量\n\nC++ 中的变量与 Python 略有不同。在 Python 中，你可以简单地声明 `a` 等于 10，一个变量就被赋值了。然而，在\
    \ C++ 中，变量在使用前必须先声明其类型。\n\n## 变量的声明\n\n你可以通过在代码中使用语句来声明一个 C++ 变量。你可以声明几种不同类型的变量。下面是具体方法。\n\
    \n**步骤 1** 打开一个新的空白 C++ 文件，输入通常的代码头：\n\n```\n#include <iostream>\nusing namespace\
    \ std;\n\nint main()\n{\n}\n```\n\n**步骤 2** 从简单开始，创建两个变量 `a` 和 `b`，一个值为 10，另一个为\
    \ 5。你可以使用数据类型 `int` 来声明这些变量。在花括号内输入：\n\n```\nint a;\nint b;\n\na = 10;\nb = 5;\n\
    ```\n\n**步骤 3** 你可以构建并运行代码，但它除了将值 10 和 5 存储到整数 `a` 和 `b` 中之外，不会做太多事情。要输出变量的内容，请添加：\n\
    \n```\ncout << a;\ncout << \"\\n\";\ncout << b;\n```\n\n`cout << \"\\n\";` 这部分只是在\
    \ 10 和 5 的输出之间插入一个新行。\n\n**步骤 4** 自然，你可以声明一个新变量，称之为 `result`，并输出一些简单的算术运算：\n\n\
    ```\nint result;\nresult = a + b;\ncout << result;\n```\n\n按照截图所示，将上述代码插入到代码中。\n\
    \n**步骤 5** 你可以在声明变量的同时为其赋值。你输入的代码可以像这样：\n\n```\nint a = 10;\nint b = 5;\nint result\
    \ = a + b;\ncout << result;\n```\n\n**步骤 6** C++ 特有的是，你也可以使用以下方式在声明变量的同时为其赋值：\n\
    \n```\nint a (10);\nint b (5);\n```\n\n然后，根据 C++ 2011 标准，可以使用花括号：\n\n```\nint\
    \ result {a+b};\n```\n\n**步骤 7** 你可以创建全局变量，即在任何函数外部声明并在整个代码的任何函数中使用的变量。到目前为止，你使用的都是局部变量：在函数内部使用的变量。例如：\n\
    \n```\n#include <iostream>\nusing namespace std;\nint StartLives = 3;\n\nint main\
    \ ()\n{\n    startLives = StartLives - 1;\n    cout << StartLives;\n}\n```\n\n\
    **步骤 8** 上一步创建了变量 `StartLives`，这是一个全局变量。例如，在游戏中，玩家的生命值会根据其表现好坏而增减。当玩家重新开始游戏时，`StartLives`\
    \ 会恢复到其默认状态：3。这里我们分配了 3 条生命，然后减去 1，剩下 2 条生命。\n\n**步骤 9** 现代 C++ 编译器比大多数程序员所认为的要智能得多。虽然你可以为变量声明多种数据类型，但实际上你可以使用\
    \ `auto` 特性：\n\n```\n#include <iostream>\nusing namespace std;\nauto pi = 3.141593;\n\
    \nint main()\n{\n    double area, radius = 1.5;\n    area = pi * radius * radius;\n\
    \    cout << area;\n}\n```\n\n**步骤 10** 这里有几个新元素：首先，除非你进入“设置 > 编译器”并勾选标有“让 G++\
    \ 遵循 C++11 ISO C++ 语言标准 [-std=c++11]”的框，否则 `auto` 不会工作。然后，新的数据类型 `double`，表示双精度浮点值。启用\
    \ C++11，然后构建并运行代码。结果应该是 7.06858。\n\n## 数据类型\n\n正如我们所看到的，变量存储了程序员可以稍后调用并在需要时操作的信息。变量只是保留的内存位置，用于存储程序员根据所用数据类型分配的值。\n\
    \n## 数据的值\n\nC++ 中程序员可以使用许多不同的数据类型，例如整数、浮点数、布尔值、字符等。普遍认为有七种基本数据类型，通常称为原始内置类型；但是，如果代码中需要，你也可以创建自己的数据类型。\n\
    \n七种基本数据类型是：\n\n| 类型 | 命令 |\n|---|---|\n| 整数 | `Integer` |\n| 浮点数 | `float` |\n\
    | 字符 | `char` |\n| 布尔值 | `bool` |\n| 双精度浮点数 | `double` |\n| 宽字符 | `wchar_t` |\n\
    | 无值 | `void` |\n\n这些基本类型也可以使用以下修饰符进行扩展：Long、Short、Signed 和 Unsigned。基本上，这意味着修饰符可以扩展每种数据类型的最小和最大值范围。例如，`int`\
    \ 数据类型的默认值范围是 -2147483648 到 2147483647，这是一个相当大的范围，你同意吧。\n\n现在，如果你使用其中一个修饰符，范围就会改变：\n\
    \n无符号整数 = 0 到 4294967295\n有符号整数 = -2147483648 到 2147483647\n短整数 = -32768 到 32767\n\
    无符号短整数 = 0 到 65,535\n有符号短整数 = -32768 到 32767\n长整数 = -2147483647 到 2147483647\n\
    有符号长整数 = -2147483647 到 2147483647\n无符号长整数 = 0 到 4294967295\n\n自然，你可以不使用修饰符而直接使用基本类型，因为每种数据类型都提供了足够的范围。然而，尽可能使用修饰符被认为是良好的\
    \ C++ 编程实践。\n\n但是，使用修饰符时会有一些问题。`double` 表示双精度浮点值，你可以用它来表示极其精确的数字，但这些数字只精确到小数点后第十五位。在\
    \ C++ 中使用 `cout` 函数显示此类数字时也存在问题，因为 `cout` 默认只输出前五位小数。你可以通过添加 `cout.precision()`\
    \ 函数并在括号内添加一个值来解决这个问题，但即便如此，你仍然受到 `double` 数据类型精度的限制。例如，尝试这段代码：\n\n```\n#include\
    \ <iostream>\nusing namespace std;\ndouble PI = 3.141592653589793238463;\n\nint\
    \ main()\n{\n    cout << PI;\n}\n```\n\n构建并运行代码，如你所见，输出仅为 3.14159，这体现了 `cout`\
    \ 在此示例中的局限性。\n\n你可以修改代码，包括前面提到的 `cout.precision` 函数，以获得更高的精度。使用以下代码将精度提高到 22 位小数：\n\
    \n```\n#include <iostream>\nusing namespace std;\ndouble PI = 3.141592653589793238463;\n\
    \nint main()\n{\n```"
