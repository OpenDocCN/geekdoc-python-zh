    # How to Set Up Python in Windows


    Windows users can easily install the latest version of Python via the main Python
    Downloads page. Whilst most seasoned Python developers may shun Windows as the
    platform of choice for building their code, it’s still an ideal starting point
    for beginners.


    # INSTALLING PYTHON 3.X


    Microsoft Windows doesn''t come with Python preinstalled as standard, so you''re
    going to have to install it yourself manually. Thankfully, it''s an easy process
    to follow.


    **STEP 1** Start by opening your web browser to **www.python.org/downloads/**.
    Look for the button detailing the download link for Python 3.x.x (in our case
    this is Python 3.6.2 but as mentioned you may see later versions of 3).


    **STEP 3** Choosing the Customise option allows you to specify certain parameters,
    and whilst you may stay with the defaults, it''s a good habit to adopt as sometimes
    (not with Python, thankfully) installers can include unwanted additional features.
    On the first screen available, ensure all boxes are ticked and click the Next
    button.


    ![](img/840275566c862102888f27d8ae2ac921_13_0.png)


    ![](img/840275566c862102888f27d8ae2ac921_13_1.png)


    **STEP 2** Click the download button for version 3.x, and save the file to your
    Downloads folder. When the file is downloaded, double-click the executable and
    the Python installation wizard will launch. From here you have two choices: Install
    Now and Customise Installation. We recommend opting for the Customise Installation
    link.


    **STEP 4** The next page of options include some interesting additions to Python.
    Ensure the Associate file with Python, Create Shortcuts, Add Python to Environment
    Variables, Precompile Standard Library and Install for All Users options are ticked.
    These make using Python later much easier. Click Install when you''re ready to
    continue.


    ![](img/840275566c862102888f27d8ae2ac921_13_2.png)


    ![](img/840275566c862102888f27d8ae2ac921_13_3.png)'
