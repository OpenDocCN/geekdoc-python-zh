- md: '# Equipment You Will Need


    You can learn Python with very little hardware or initial financial investment.
    You don''t need an incredibly powerful computer and any software that''s required
    is freely available.


    ## WHAT WE''RE USING


    Thankfully, Python is a multi-platform programming language available for Windows,
    macOS, Linux, Raspberry Pi and more. If you have one of those systems, then you
    can easily start using Python.


    ![](img/840275566c862102888f27d8ae2ac921_9_0.png)


    ## COMPUTER


    Obviously you''re going to need a computer in order to learn how to program in
    Python and to test your code. You can use Windows (from XP onward) on either a
    32 or 64-bit processor, an Apple Mac or Linux installed PC.


    ## AN IDE


    An IDE (Integrated Developer Environment) is used to enter and execute Python
    code. It enables you to inspect your program code and the values within the code,
    as well as offering advanced features. There are many different IDEs available,
    so find the one that works for you and gives the best results.


    ## PYTHON SOFTWARE


    macOS and Linux already come with Python preinstalled as part of the operating
    system, as does the Raspberry Pi. However, you need to ensure that you''re running
    the latest version of Python. Windows users need to download and install Python,
    which we''ll cover shortly.


    ![](img/840275566c862102888f27d8ae2ac921_9_1.png)


    ## TEXT EDITOR


    Whilst a text editor is an ideal environment to enter code into, it''s not an
    absolute necessity. You can enter and execute code directly from the IDLE but
    a text editor, such as Sublime Text or Notepad++, offers more advanced features
    and colour coding when entering code.


    ## INTERNET ACCESS


    Python is an ever evolving environment and as such new versions often introduce
    new concepts or change existing commands and code structure to make it a more
    efficient language. Having access to the Internet will keep you up-to-date, help
    you out when you get stuck and give access to Python''s immense number of modules.


    ![](img/840275566c862102888f27d8ae2ac921_9_2.png)


    ## TIME AND PATIENCE


    Despite what other books may lead you to believe, you won''t become a programmer
    in 24-hours. Learning to code in Python takes time, and patience. You may become
    stuck at times and other times the code will flow like water. Understand you''re
    learning something entirely new, and you will get there.


    # THE RASPBERRY PI


    Why use a Raspberry Pi? The Raspberry Pi is a tiny computer that''s very cheap
    to purchase but offers the user a fantastic learning platform. Its main operating
    system, Raspbian, comes preinstalled with the latest Python along with many Modules
    and extras.


    ## RASPBERRY PI


    The Raspberry Pi 3 is the latest version, incorporating a more powerful CPU, more
    memory, Wi-Fi and Bluetooth support. You can pick up a Pi for around £32 or as
    a part of kit for £50+, depending on the kit you''re interested in.


    ![](img/840275566c862102888f27d8ae2ac921_10_0.png)


    ![](img/840275566c862102888f27d8ae2ac921_10_1.png)


    ## FUZE PROJECT


    The FUZE is a learning environment built on the latest model of the Raspberry
    Pi. You can purchase the workstations that come with an electronics kit and even
    a robot arm for you to build and program. You can find more information on the
    FUZE at www.fuze.co.uk.


    ## RASPBIAN


    The Raspberry Pi''s main operating system is a Debian-based Linux distribution
    that comes with everything you need in a simple to use package. It''s streamlined
    for the Pi and is an ideal platform for hardware and software projects, Python
    programming and even as a desktop computer.


    ![](img/840275566c862102888f27d8ae2ac921_10_2.png)


    ## BOOKS


    We have several great coding titles available via www.pclpublications.com. Our
    Pi books cover how to buy your first Raspberry Pi, set it up and use it; there
    are some great step-by-step project examples and guides to get the most from the
    Raspberry Pi too.


    ![](img/840275566c862102888f27d8ae2ac921_10_3.png)


    ![](img/840275566c862102888f27d8ae2ac921_10_4.png)


    ![](img/840275566c862102888f27d8ae2ac921_10_5.png)


    ![](img/840275566c862102888f27d8ae2ac921_10_6.png)


    # Getting to Know Python


    Python is the greatest computer programming language ever created. It enables
    you to fully harness the power of a computer, in a language that’s clean and easy
    to understand.


    ## WHAT IS PROGRAMMING?


    It helps to understand what a programming language is before you try to learn
    one, and Python is no different. Let’s take a look at how Python came about and
    how it relates to other languages.


    A programming language is a list of instructions that a computer follows. These
    instructions can be as simple as displaying your name or playing a music file,
    or as complex as building a whole virtual world. Python is a programming language
    conceived in the late 1980s by Guido van Rossum at Centrum Wiskunde & Informatica
    (CWI) in the Netherlands as a successor to the ABC language.


    ## PROGRAMMING RECIPES


    Programs are like recipes for computers. A recipe to bake a cake could go like
    this:


    Put 100 grams of self-raising flour in a bowl.

    Add 100 grams of butter to the bowl.

    Add 100 millilitres of milk.

    Bake for half an hour.


    ![](img/840275566c862102888f27d8ae2ac921_11_0.png)


    **Guido van Rossum, the father of Python.**


    ## CODE


    Just like a recipe, a program consists of instructions that you follow in order.
    A program that describes a cake might run like this:


    ```

    bowl = []

    flour = 100

    butter = 50

    milk = 100

    bowl.append([flour,butter,milk])

    cake.cook(bowl)

    ```


    ![](img/840275566c862102888f27d8ae2ac921_11_1.png)


    ## PROGRAM COMMANDS


    You might not understand some of the Python commands, like bowl.append and cake.cook(bowl).
    The first is a list, the second an object; we’ll look at both in this book. The
    main thing to know is that it’s easy to read commands in Python. Once you learn
    what the commands do, it’s easy to figure out how a program works.


    ![](img/840275566c862102888f27d8ae2ac921_11_2.png)


    ![](img/840275566c862102888f27d8ae2ac921_11_3.png)


    # HIGH-LEVEL LANGUAGES


    Computer languages that are easy to read are known as “high-level”. This is because
    they fly high above the hardware (also referred to as “the metal”). Languages
    that “fly close to the metal,” like Assembly, are known as “low-level”. Low-level
    languages commands read a bit like this: `msg db ,0xa len equ $ - msg`.


    ![](img/840275566c862102888f27d8ae2ac921_12_0.png)


    # ZEN OF PYTHON


    Python lets you access all the power of a computer in a language that humans can
    understand. Behind all this is an ethos called “The Zen of Python.” This is a
    collection of 20 software principles that influences the design of the language.
    Principles include “Beautiful is better than ugly” and “Simple is better than
    complex.” Type `import this` into Python and it will display all the principles.


    ![](img/840275566c862102888f27d8ae2ac921_12_1.png)


    # PYTHON 3 VS PYTHON 2


    In a typical computing scenario, Python is complicated somewhat by the existence
    of two active versions of the language: Python 2 and Python 3.


    ## WORLD OF PYTHON


    When you visit the Python Download page you’ll notice that there are two buttons
    available: one for Python 3.6.2 and the other for Python 2.7.13; correct at the
    time of writing (remember Python is frequently updated so you may see different
    version numbers).


    ## PYTHON 3.X


    In 2008 Python 3 arrived with several new and enhanced features. These features
    provide a more stable, effective and efficient programming environment but sadly,
    most (if not all) of these new features are not compatible with Python 2 scripts,
    modules and tutorials. Whilst not popular at first, Python 3 has since become
    the cutting edge of Python programming.


    ![](img/840275566c862102888f27d8ae2ac921_12_2.png)


    ![](img/840275566c862102888f27d8ae2ac921_12_3.png)


    ## PYTHON 2.X


    So why two? Well, Python 2 was originally launched in 2000 and has since then
    adopted quite a large collection of modules, scripts, users, tutorials and so
    on. Over the years Python 2 has fast become one of the first go to programming
    languages for beginners and experts to code in, which makes it an extremely valuable
    resource.


    ## 3.X WINS


    Python 3’s growing popularity has meant that it’s now prudent to start learning
    to develop with the new features and begin to phase out the previous version.
    Many development companies, such as SpaceX and NASA use Python 3 for snippets
    of important code.


    ![](img/840275566c862102888f27d8ae2ac921_12_4.png)


    ![](img/840275566c862102888f27d8ae2ac921_12_5.png)'
  mdcn: '# 你需要的设备


    学习 Python 所需的硬件和初始资金投入非常少。你不需要一台性能超强的电脑，所需的任何软件都是免费可用的。


    ## 我们使用的工具


    值得庆幸的是，Python 是一种多平台编程语言，适用于 Windows、macOS、Linux、Raspberry Pi 等系统。如果你拥有其中任何一种系统，就可以轻松开始使用
    Python。


    ![](img/840275566c862102888f27d8ae2ac921_9_0.png)


    ## 电脑


    显然，你需要一台电脑来学习 Python 编程和测试代码。你可以使用 Windows（从 XP 版本开始）系统，无论是 32 位还是 64 位处理器，也可以使用苹果
    Mac 或安装了 Linux 的 PC。


    ## 集成开发环境


    IDE（集成开发环境）用于输入和执行 Python 代码。它使你能够检查程序代码和代码中的值，并提供高级功能。市面上有许多不同的 IDE，找到适合你并能带来最佳效果的那个即可。


    ## Python 软件


    macOS 和 Linux 系统通常已预装了 Python 作为操作系统的一部分，Raspberry Pi 也是如此。但是，你需要确保运行的是最新版本的 Python。Windows
    用户需要下载并安装 Python，我们稍后会介绍。


    ![](img/840275566c862102888f27d8ae2ac921_9_1.png)


    ## 文本编辑器


    虽然文本编辑器是输入代码的理想环境，但并非绝对必需。你可以直接从 IDLE 输入和执行代码，但像 Sublime Text 或 Notepad++ 这样的文本编辑器在输入代码时提供了更多高级功能和语法高亮。


    ## 互联网访问


    Python 是一个不断发展的环境，因此新版本通常会引入新概念或更改现有命令和代码结构，使其成为更高效的语言。接入互联网可以让你保持最新状态，在遇到困难时提供帮助，并访问
    Python 海量的模块库。


    ![](img/840275566c862102888f27d8ae2ac921_9_2.png)


    ## 时间和耐心


    尽管其他书籍可能让你相信，但你不可能在 24 小时内成为一名程序员。学习 Python 编程需要时间和耐心。你有时可能会卡住，有时代码又会行云流水。要明白你正在学习全新的东西，你最终会成功的。


    # 树莓派


    为什么使用树莓派？树莓派是一台微型电脑，购买成本非常低廉，却为用户提供了绝佳的学习平台。其主要操作系统 Raspbian 预装了最新的 Python 以及许多模块和附加组件。


    ## 树莓派


    树莓派 3 是最新版本，采用了更强大的 CPU、更大的内存，并支持 Wi-Fi 和蓝牙。你可以花大约 32 英镑购买一个树莓派，或者作为套件的一部分以 50
    英镑以上的价格购买，具体取决于你感兴趣的套件。


    ![](img/840275566c862102888f27d8ae2ac921_10_0.png)


    ![](img/840275566c862102888f27d8ae2ac921_10_1.png)


    ## FUZE 项目


    FUZE 是一个基于最新款树莓派构建的学习环境。你可以购买带有电子套件甚至机械臂的工作站，用于组装和编程。你可以在 www.fuze.co.uk 上找到更多关于
    FUZE 的信息。


    ## Raspbian


    树莓派的主要操作系统是一个基于 Debian 的 Linux 发行版，它在一个易于使用的软件包中提供了你需要的一切。它针对树莓派进行了优化，是硬件和软件项目、Python
    编程乃至作为桌面电脑的理想平台。


    ![](img/840275566c862102888f27d8ae2ac921_10_2.png)


    ## 书籍


    我们通过 www.pclpublications.com 提供几本优秀的编程书籍。我们的树莓派书籍涵盖了如何购买你的第一个树莓派、设置和使用它；还有一些很棒的分步项目示例和指南，帮助你充分利用树莓派。


    ![](img/840275566c862102888f27d8ae2ac921_10_3.png)


    ![](img/840275566c862102888f27d8ae2ac921_10_4.png)


    ![](img/840275566c862102888f27d8ae2ac921_10_5.png)


    ![](img/840275566c862102888f27d8ae2ac921_10_6.png)


    # 认识 Python


    Python 是有史以来最伟大的计算机编程语言。它使你能够以一种简洁易懂的语言，充分利用计算机的强大功能。


    ## 什么是编程？


    在尝试学习编程语言之前，了解什么是编程语言会有所帮助，Python 也不例外。让我们看看 Python 是如何诞生的，以及它与其他语言的关系。


    编程语言是计算机遵循的一系列指令。这些指令可以简单到显示你的名字或播放音乐文件，也可以复杂到构建一个完整的虚拟世界。Python 是一种编程语言，由荷兰数学与计算机科学研究中心的
    Guido van Rossum 在 20 世纪 80 年代末构思，作为 ABC 语言的后继者。


    ## 编程食谱


    程序就像是计算机的食谱。一个烤蛋糕的食谱可能是这样的：


    将 100 克自发粉放入碗中。

    向碗中加入 100 克黄油。

    加入 100 毫升牛奶。

    烘烤半小时。


    ![](img/840275566c862102888f27d8ae2ac921_11_0.png)


    **Guido van Rossum，Python 之父。**


    ## 代码


    就像食谱一样，程序由一系列按顺序执行的指令组成。一个描述蛋糕的程序可能这样运行：


    ```

    bowl = []

    flour = 100

    butter = 50

    milk = 100

    bowl.append([flour,butter,milk])

    cake.cook(bowl)

    ```


    ![](img/840275566c862102888f27d8ae2ac921_11_1.png)


    ## 程序命令


    你可能不理解一些 Python 命令，比如 `bowl.append` 和 `cake.cook(bowl)`。前者是一个列表，后者是一个对象；我们将在本书中介绍这两者。主要需要知道的是，Python
    中的命令易于阅读。一旦你了解了命令的功能，就很容易弄清楚程序是如何工作的。


    ![](img/840275566c862102888f27d8ae2ac921_11_2.png)


    ![](img/840275566c862102888f27d8ae2ac921_11_3.png)


    # 高级语言


    易于阅读的计算机语言被称为“高级语言”。这是因为它们远离硬件（也称为“金属层”）运行。而像汇编语言这样“贴近金属层”运行的语言，则被称为“低级语言”。低级语言的命令读起来有点像这样：`msg
    db ,0xa len equ $ - msg`。


    ![](img/840275566c862102888f27d8ae2ac921_12_0.png)


    # Python 之禅


    Python 让你能够以人类可理解的语言访问计算机的所有强大功能。这一切背后是一种称为“Python 之禅”的理念。这是一套包含 20 条软件原则的集合，影响着该语言的设计。原则包括“优美优于丑陋”和“简洁优于复杂”。在
    Python 中输入 `import this`，它将显示所有原则。


    ![](img/840275566c862102888f27d8ae2ac921_12_1.png)


    # Python 3 与 Python 2


    在典型的计算场景中，Python 因其存在两个活跃版本而显得有些复杂：Python 2 和 Python 3。


    ## Python 的世界


    当你访问 Python 下载页面时，你会注意到有两个可用按钮：一个用于 Python 3.6.2，另一个用于 Python 2.7.13；这是撰写本文时的正确版本（请记住
    Python 经常更新，因此你可能会看到不同的版本号）。


    ## Python 3.X


    2008 年，Python 3 带来了多项新增和增强功能。这些功能提供了更稳定、高效和高效的编程环境，但遗憾的是，这些新功能大多（如果不是全部的话）与 Python
    2 的脚本、模块和教程不兼容。虽然起初并不流行，但 Python 3 此后已成为 Python 编程的前沿。


    ![](img/840275566c862102888f27d8ae2ac921_12_2.png)


    ![](img/840275566c862102888f27d8ae2ac921_12_3.png)


    ## Python 2.X


    那么为什么有两个版本呢？嗯，Python 2 最初于 2000 年推出，此后积累了大量的模块、脚本、用户、教程等。多年来，Python 2 迅速成为初学者和专家首选的编程语言之一，这使其成为极其宝贵的资源。


    ## 3.X 胜出


    Python 3 日益增长的受欢迎程度意味着，现在开始学习使用新特性进行开发并逐步淘汰旧版本是明智之举。许多开发公司，如 SpaceX 和 NASA，都在重要代码片段中使用
    Python 3。


    ![](img/840275566c862102888f27d8ae2ac921_12_4.png)


    ![](img/840275566c862102888f27d8ae2ac921_12_5.png)'
