    C++ 程序中使用的文件。点击列表中的 main.cpp 文件。


    ### 步骤 9

    你可以看到 Xcode 已经自动为你完成了一个基本的 Hello World 程序。虽然目前可能意义不大，但随着你的深入学习，你会发现更多内容，这只是 Xcode
    利用 Mac 上可用资源的结果。


    ### 步骤 10

    当你想运行代码时，点击“产品” > “运行”。你可能会被要求在 Mac 上启用开发者模式；这是为了授权 Xcode 执行功能，而无需每次会话都输入密码。程序执行后，输出会显示在
    Xcode 窗口的底部。


    ## 如何在 Linux 中设置 C++


    Linux 是一个很棒的 C++ 编码环境。大多数 Linux 发行版已经预装了必要的组件，例如编译器，文本编辑器也非常适合输入代码，包括语法高亮；而且还有大量的额外软件可供你使用。


    ### LINUX++


    如果你不熟悉 Linux，那么我们建议你看看 BDM Publications 系列中的一本 Linux 书籍。如果你有树莓派，下面使用的命令同样适用，本例中我们使用的是
    Linux Mint。


    ### 步骤 1

    第一步是确保 Linux 已为你的 C++ 代码做好准备，因此请检查系统和软件是否为最新版本。打开终端并输入：**sudo apt-get update &&
    sudo apt-get upgrade**。然后按回车键并输入你的密码。这些命令会更新整个系统和所有已安装的软件。


    ### 步骤 2

