    这些是 C++ 程序的构建块。有了它们，你可以构建自己的代码，向屏幕输出结果，并存储和检索数据。


    ## 你的第一个 C++ 程序


    你可能之前已经按照 Mac 和 Linux 的示例操作过，但从现在开始，你将完全在 Windows 和 Code::Blocks 环境中工作。让我们从编写你的第一个
    C++ 程序开始，迈出进入更广阔编码世界的第一小步。


    ### HELLO, WORLD!


    在编程中，传统上输入的第一段代码是向屏幕输出“Hello, World!”。有趣的是，这可以追溯到 1968 年，使用一种名为 BCPL 的语言。


    **步骤 1** 如前所述，本书后续的 C++ 代码将使用 Windows 10 和最新版本的 Code::Blocks。首先启动 Code::Blocks。打开后，点击
    File > New > Empty File 或按键盘上的 Ctrl+Shift+N。


    **步骤 2** 现在你可以看到一个空白屏幕，标签为 *Untitled1*，主 Code::Blocks 窗口左上角显示数字一。首先点击主窗口，使光标位于数字一旁边，然后输入：


    ```

    #include <iostream>

    ```


    **步骤 3** 目前它看起来没什么特别的，甚至更让人摸不着头脑，但我们稍后会解释。现在点击 File > Save File As。在硬盘上创建或找到一个合适的位置，在
    File Name 框中，将其命名为 helloworld.cpp。点击 Save as type 框并选择 C/C++ files。点击 Save 按钮。


    **步骤 4** 你可以看到 Code::Blocks 现在改变了颜色编码，识别出该文件现在是 C++ 代码。这意味着可以从 Code::Blocks 仓库中自动选择代码。删除
    `#include <iostream>` 这一行并重新输入。你可以看到自动选择框出现了。


    **步骤 5** 命令的自动选择非常方便，可以避免潜在的输入错误。按 Return 键转到第 3 行，然后输入：


    ```

    int main()

    ```


    注意：括号之间没有空格。


    **步骤 6** 在 `int main()` 下面的下一行，输入一个花括号：


    ```

    {

    ```


    这可以通过按 Shift 和英国英语键盘布局上 P 键右边的键来完成。


    **步骤 7** 注意 Code::Blocks 已经在几行下面自动创建了一个对应的闭合花括号，将这对括号连接起来，并进行了轻微缩进。这是由于 C++ 的结构决定的，这里是输入代码主体的地方。现在输入：


    ```

    //My first C++ program

    ```


    **步骤 8** 再次注意颜色编码的变化。在上一步的行尾按 Return 键，然后输入：


    ```

    std::cout << "Hello, world!\n";

    ```


    **步骤 9** 和之前一样，Code::Blocks 会自动补全你输入的代码，包括在你输入第一个引号时放置闭合引号。不要忘记行尾的分号；这是 C++ 程序中最重要的元素之一，我们将在下一节告诉你原因。现在，将光标向下移动到闭合花括号并按
    Return 键。


    **步骤 10** 这就是你目前需要做的全部。它可能看起来并不十分惊人，但 C++ 最好分小块吸收。目前不要执行代码，因为你需要先了解 C++ 程序的结构；然后你就可以构建和运行代码了。现在，点击保存按钮，那个单独的软盘图标。


    ## C++ 程序的结构


    C++ 有非常明确的结构和做事方式。遗漏任何东西，哪怕是一个分号，你的整个程序都将无法编译和执行。许多专业程序员都曾因结构松散而栽跟头。


    ### #INCLUDE <C++ 结构>


    学习编程基础，你开始理解程序的结构。不同语言的命令可能不同，但你将开始看到代码是如何工作的。


    C++ 由丹麦学生 Bjarne Stroustrup 于 1979 年发明，作为他博士论文的一部分。最初 C++ 被称为 C with Classes，它在已经流行的
    C 编程语言基础上增加了特性，并通过新的结构使其成为更用户友好的环境。


    ### #INCLUDE


    C++ 程序的结构相当精确。每个 C++ 代码都以一个指令开始：**#include <>**。该指令指示预处理器包含一段标准 C++ 代码。例如：**#include
    <iostream>** 包含 iostream 头文件以支持输入/输出操作。


    ```

    1  #include <iostream>

    2

    3

    4

    5

    6

    ```


    Bjarne Stroustrup，C++ 的发明者。


    ### INT MAIN()


    **int main()** 启动一个函数的声明，该函数是一组名为“main”的代码语句。所有 C++ 代码都从 main 函数开始，无论它实际位于代码中的何处。


    ```

    1  #include <iostream>

    2

    3  int main()

    4

    5

    6

    ```


    ### 花括号


    开括号（花括号）可能是你以前没有遇到过的，特别是如果你习惯使用 Python。开括号表示主函数的开始，并包含属于该函数的所有代码。


    ```

    1  #include <iostream>

    2

    3  int main()

    4  {

    5

    6  }

    ```'
