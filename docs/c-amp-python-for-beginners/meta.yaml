    **步骤 2** Shell 是你可以输入代码并查看你编程到 Python 中的代码的响应和输出的地方。这是一个沙盒环境，你可以在其中尝试一些简单的代码和流程。


    **步骤 3** 例如，在 Shell 中输入：2+2 按下 Enter 后，下一行显示答案：4。基本上，Python 获取了“代码”并产生了相关的输出。


    **步骤 4** Python Shell 的作用非常像计算器，因为代码基本上是一系列与系统的数学交互。整数，即无限的整数序列，可以轻松地进行加、减、乘等运算。


    **步骤 5** 虽然这很有趣，但并不特别令人兴奋。相反，试试这个：


    `print("Hello everyone!")`


    就像我们在本书“安装文本编辑器”部分在 Sublime 中输入的代码一样。


    **步骤 6** 这有点更像样了，因为你刚刚产生了你的第一段代码。Print 命令相当不言自明，它打印内容。Python 3 需要括号以及引号才能将内容输出到屏幕，在本例中是“Hello
    everyone!”部分。


    ```

    >>> print("Hello everyone!")

    Hello everyone!

    >>> |

    ```


    **步骤 7** 你可能已经注意到 Python IDLE 中的颜色编码。这些颜色代表 Python 代码的不同元素。它们是：


    黑色 – 数据和变量

    绿色 – 字符串

    紫色 – 函数

    橙色 – 命令

    蓝色 – 用户函数

    深红色 – 注释

    浅红色 – 错误消息


    **步骤 8** Python IDLE 是一个可配置的环境。如果你不喜欢颜色的显示方式，你总是可以通过选项 > 配置 IDLE 并单击高亮选项卡来更改它们。但是，我们不建议这样做，因为你看不到与我们截图相同的内容。


    **步骤 9** 就像大多数可用程序一样，无论操作系统如何，都有许多快捷键可用。我们这里没有空间全部列出，但在选项 > 配置 IDLE 下的键选项卡中，你可以看到当前绑定的列表。


    **步骤 10** Python IDLE 是一个强大的接口，它实际上是使用可用的 GUI 工具包之一用 Python 编写的。如果你想了解 Shell 的许多细节，我们建议你花点时间查看
    **www.docs.python.org/3/library/idle.html**，其中详细介绍了 IDLE 的许多功能。


    ### IDLE 颜色编码


    | 颜色 | 用途 | 示例 |

    | :--- | :--- | :--- |

    | 黑色 | 数据和变量 | 23.6 area |

    | 绿色 | 字符串 | "Hello World" |

    | 紫色 | 函数 | len() print() |

    | 橙色 | 命令 | if for else |

    | 蓝色 | 用户函数 | get_area() |

    | 深红色 | 注释 | #Remember VAT |

    | 浅红色 | 错误消息 | SyntaxError: |


    ## 你的第一段代码


    本质上，你已经通过上一个教程中的 ''print("Hello everyone!")'' 函数编写了你的第一段代码。然而，让我们扩展一下，看看如何输入你的代码并尝试一些其他的
    Python 示例。


    ### 玩转 Python


    对于大多数语言，无论是计算机语言还是人类语言，关键都在于记住并正确应用合适的词语。你并非生来就知道这些词语，所以你需要学习它们。


    步骤 1 如果你已经关闭了 Python 3 IDLE，请在你偏好的操作系统版本中重新打开它。在 Shell 中，输入熟悉的以下内容：

    print("Hello")


    步骤 2 正如预期的那样，单词 Hello 以蓝色文本出现在 Shell 中，表示来自字符串的输出。这相当直接，不需要太多解释。现在试试：

    print("2+2")


    步骤 3 你可以看到，输出的不是数字 4，而是你要求打印到屏幕上的 2+2。引号定义了输出到 IDLE Shell 的内容；要打印 2+2 的总和，你需要去掉引号：

    print(2+2)


    步骤 4 你可以继续这样做，将 2+2、464+2343 等打印到 Shell。一种更简单的方法是使用变量，这是我们稍后将更深入介绍的内容。现在，输入：

    a=2

    b=2'
