  - '[PAGE 50]


    # How to Set Up C++ in Windows


    STEP 5 Next choose an install location for the Code::Blocks files. It''s your
    choice, but the default will generally suffice, unless of course you have any
    special requirements. When you click Next, the install begins; when it''s finished
    a notification pops up asking you if you want to start Code::Blocks now, so click
    Yes.


    ![](img/840275566c862102888f27d8ae2ac921_50_0.png)


    STEP 8 Before you start using Code::Blocks it''s worth explaining exactly why
    you need the added compiler. First, a compiler is a separate program that reads
    through your C++ code and checks it against the latest acceptable programming
    standards; this is why you need the most recently available compiler. This is
    currently C++17, with C++20 underway.


    ![](img/840275566c862102888f27d8ae2ac921_50_1.png)


    STEP 6 The first time Code::Blocks loads it runs an auto-detect for any C++ compilers
    you may already have installed on you system. If you don''t have any, click on
    the first detected option, GNU GCC Compiler, and click the Default button to set
    it as the system''s C++ compiler. Click OK when you''re ready to continue.


    ![](img/840275566c862102888f27d8ae2ac921_50_2.png)


    STEP 9 Essentially, computers work and understand only binary, ones and zeros,
    or Machine Language. Programming in binary isn''t effective for human beings.
    For example, to output the words "Hello World!" to the screen in C++ would appear
    in binary as:


    ```

    01100011 01101111 01110101 01110100 00100000

    00111100 00111100 00100000 00100010 01101000

    01100101 01101100 01101100 01101111 00100000

    01010111 01101111 01110010 01101100 01100100

    00100001 00100010 00111011

    ```


    ![](img/840275566c862102888f27d8ae2ac921_50_3.png)


    STEP 7 When the program starts another message appears, informing you that Code::Blocks
    is currently not the default application for C++ files. You a couple of options:
    to leave everything as it is or allow Code::Blocks to associate all C++ file types.
    Again, we would recommend you opt for the last choice to associate Code::Blocks
    with every supported file type.


    ![](img/840275566c862102888f27d8ae2ac921_50_4.png)


    STEP 10 The compiler therefore takes what you''ve entered as C++ code and translates
    that to Machine Language. To execute C++ code the IDE ''builds'' the code, checking
    for errors, then pass it through the compiler to check standardisation and convert
    it to ones and zeros for the computer to act upon. It''s rather clever stuff,
    when you stop to think about it.


    ![](img/840275566c862102888f27d8ae2ac921_50_5.png)'
- md: '## How to Set Up C++ on a Mac


    To begin C++ coding on a Mac you first need to install Apple''s Xcode. This is
    a free, full featured IDE that''s designed to create native Apple apps. However,
    you can also use it to create C++ code relatively easily.


    ### XCODE


    Apple''s Xcode is primarily designed for users to develop apps for macOS, iOS,
    tvOS and watchOS applications in Swift or Objective-C but you can use it for C++
    too.


    ### STEP 1

    Start by opening the App Store on your Mac, Apple Menu > App Store. In the Search
    box enter ''Xcode'' and press Return. There are many suggestions filling the App
    Store window but it''s the first option, Xcode, that you need to click on.


    ### STEP 2

    Take a moment to browse through the app''s information, including the compatibility,
    to ensure you have the correct version of macOS. Xcode requires macOS 10.12.6
    or later to install and work.


    ### STEP 3

    When you''re ready, click on the Get button which then turns into Install App.
    Enter your Apple ID and Xcode begins to download and install. It may take some
    time depending on the speed of your Internet connection.


    ### STEP 4

    When the installation is complete, click on the Open button to launch Xcode. Click
    Agree to the licence terms and enter your password to allow Xcode to make changes
    to the system. When that is done, Xcode begins to install additional components.


    ### STEP 5

    With everything now installed, including the additional components, Xcode launches,
    displaying the version number along with three choices and any recent projects
    that you’ve worked on; with a fresh install though, this is blank.


    ### STEP 6

    Start by clicking on Create New Xcode Project; this opens a template window to
    choose which platform you’re developing code for. Click the macOS tab, then click
    the Command Line Tool option. Click Next to continue.


    ### STEP 7

    Fill in the various fields but ensure that the Language option at the bottom is
    set to C++; simply choose it from the drop-down list. When you’ve filled in the
    Fields, and made sure that C++ is the chosen language, click on the Next button
    to continue.


    ### STEP 8

    The next step asks where to create a Git Repository for all your future code.
    Choose a location on your Mac, or a network location, and click the Create button.
    When you’ve done all that, you can start to code. The left-hand pane details the
    files used in the C++ program you’re coding. Click on the main.cpp file in the
    list.


    ### STEP 9

    You can see that Xcode has automatically completed a basic Hello World program
    for you. While it may not make much sense at present, you will discover more as
    you progress, the content is just Xcode utilising what’s available on the Mac.


    ### STEP 10

    When you want to run the code, click on Product > Run. You may be asked to enable
    Developer Mode on the Mac; this is to authorise Xcode to perform functions without
    needing your password every session. When the program executes, the output is
    displayed at the bottom of the Xcode window.


    ## How to Set Up C++ in Linux


    Linux is a great C++ coding environment. Most Linux distros already have the essential
    components preinstalled, such as a compiler and the text editors are excellent
    for entering code into, including colour coding; and there’s tons of extra software
    available to help you out.


    ### LINUX++


    If you’re not familiar with Linux, then we recommend taking a look at one of our
    Linux titles from the BDM Publications range. If you have a Raspberry Pi, the
    commands used below work just fine and for this example we’re using Linux Mint.


    ### STEP 1

    The first step is to ensure Linux is ready for your C++ code, so check the system
    and software are up to date. Open a Terminal and enter: **sudo apt-get update
    && sudo apt-get upgrade**. Then press Return and enter your password. These commands
    update the entire system and any installed software.


    ### STEP 2

    Most Linux distros come preinstalled with all the necessary components to start
    coding in C++; however, it’s always worth checking to see if everything is present.
    Still within the Terminal, enter: **sudo apt-get install build-essential** and
    press Return. If you have the right components nothing is installed; if you’re
    missing some then they are installed by the command.


    ### STEP 3

    Amazingly, that’s it. Everything is already for you to start coding. Here’s how
    to get your first C++ program up and running. In Linux Mint the main text editor
    is Xed, which you can launch by clicking on the Menu and typing Xed into the search
    bar. Click on the Text Editor button in the right-hand pane to open it.


    ### STEP 4

    In Xed, or any other text editor you may be using, enter the lines of code that
    make up your C++ Hello World program. It’s a little different to what the Mac
    produced:


    ```cpp

    #include <iostream>

    int main()

    {

    //My first C++ program

    std::cout << "Hello World!\n";

    }

    ```


    ### STEP 5

    When you''ve entered your code, click File > Save As and choose a folder in which
    to save your program. Name the file as helloworld.cpp (it can be any name as long
    as it has .cpp as the extension). Click Save to continue.


    ### STEP 6

    The first thing to notice is that Xed has automatically recognised this as a C++
    file, since the file extension is now set to .cpp. The colour coding is present
    in the code and if you open up the file manager you can also see that file''s
    icon has C++ stamped on it.


    ### STEP 7

    With your code now saved, drop into the Terminal again. You need to navigate to
    the location of the C++ file you''ve just saved. Our example is in the Documents
    folder, so we can navigate to it by entering: **cd Documents**. Remember, the
    Linux Terminal is case sensitive, so any capitals must be entered correctly.


    ### STEP 8

    Before you can execute the C++ file you need to compile it. In Linux it''s common
    to use g++, an open source C++ compiler; as you''re now in the same folder as
    the C++ file, enter: **g++ helloworld.cpp** in the Terminal and press Return.


    ### STEP 9

    It takes a short time while the code is compiled by g++ but providing there are
    no mistakes or errors in the code you are returned to the command prompt. The
    compiling of the code has created a new file. If you enter: ls into the Terminal
    you can see that alongside your C++ file is a.out.


    ### STEP 10

    The a.out file is the compiled C++ code. To run the code enter: **./a.out** and
    press Return. The words ''Hello World!'' appear on the screen. However, a.out
    isn''t very friendly. To name it something else post-compiling, you can recompile
    with: **g++ helloworld.cpp -o helloworld**. This creates an output file called
    helloworld which can be run with: **./helloworld**.


    ## Other C++ IDEs to Install


    If you want to try a different approach to working with your C++ code, then there
    are plenty of options available to you. Windows is the most prolific platform
    for C++ IDEs but there are plenty for Mac and Linux users too.


    ### DEVELOPING C++


    Here are ten great C++ IDEs that are worth looking into. You can install one or
    all of them if you like, but find the one that works best for you.


    ### ECLIPSE


    Eclipse is a hugely popular C++ IDE that offers the programmer a wealth of features.
    It has a great, clean interface, is easy to use and available for Windows, Linux
    and Mac. Head over to www.eclipse.org/downloads/ to download the latest version.
    If you''re stuck, click the Need Help link for more information.


    ### CODELITE


    CodeLite is a free and open source IDE that''s regularly updated and available
    for Windows, Linux and macOS. It''s lightweight, uncomplicated and extremely powerful.
    You can find out more information as well as how to download and install it at
    www.codelite.org/.


    ### GNAT


    The GNAT Programming Studio (GPS) is a powerful and intuitive IDE that supports
    testing, debugging and code analysis. The Community Edition is free, whereas the
    Pro version costs; however, the Community Edition is available for Windows, Mac,
    Linux and even the Raspberry Pi. You can find it at www.adacore.com/download.


    ### NETBEANS


    Another popular choice is NetBeans. This is another excellent IDE that''s packed
    with features and a pleasure to use. NetBeans IDE includes project based templates
    for C++ that give you the ability to build applications with dynamic and static
    libraries. Find out more at www.netbeans.org/features/cpp/index.html.'
  mdcn: '## 如何在 Mac 上设置 C++


    要在 Mac 上开始 C++ 编程，首先需要安装 Apple 的 Xcode。这是一款免费、功能齐全的 IDE，专为创建原生 Apple 应用而设计。不过，你也可以用它相对轻松地创建
    C++ 代码。


    ### XCODE


    Apple 的 Xcode 主要设计用于让用户使用 Swift 或 Objective-C 为 macOS、iOS、tvOS 和 watchOS 应用程序开发应用，但你也可以用它来编写
    C++。


    ### 步骤 1

    首先打开 Mac 上的 App Store，路径是 Apple 菜单 > App Store。在搜索框中输入 ''Xcode'' 并按回车键。App Store
    窗口中会出现许多建议，但你需要点击的是第一个选项，Xcode。


    ### 步骤 2

    花点时间浏览一下应用的信息，包括兼容性，以确保你拥有正确版本的 macOS。Xcode 需要 macOS 10.12.6 或更高版本才能安装和运行。


    ### 步骤 3

    准备好后，点击“获取”按钮，该按钮随后会变成“安装应用”。输入你的 Apple ID，Xcode 就会开始下载和安装。根据你的网络连接速度，这可能需要一些时间。


    ### 步骤 4

    安装完成后，点击“打开”按钮启动 Xcode。点击“同意”许可条款，并输入你的密码以允许 Xcode 对系统进行更改。完成后，Xcode 开始安装附加组件。


    ### 步骤 5

    现在所有内容都已安装完毕，包括附加组件，Xcode 启动，显示版本号以及三个选项和你最近处理过的任何项目；不过，如果是全新安装，这里会是空白的。


    ### 步骤 6

    首先点击“创建新的 Xcode 项目”；这会打开一个模板窗口，让你选择正在为哪个平台开发代码。点击 macOS 标签页，然后点击“命令行工具”选项。点击“下一步”继续。


    ### 步骤 7

    填写各个字段，但确保底部的“语言”选项设置为 C++；只需从下拉列表中选择它。填写完字段并确认选择了 C++ 作为语言后，点击“下一步”按钮继续。


    ### 步骤 8

