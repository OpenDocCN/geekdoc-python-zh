    步骤 9 现在再次点击构建并运行图标以应用代码的更改。这次 Code::Blocks 拒绝执行代码，因为你引入了错误。在屏幕底部的日志窗格中，你会被告知错误，在本例中是：Expected
    '';'' before ''}'' token，表示缺少分号。


    ![](img/840275566c862102888f27d8ae2ac921_64_3.png)


    步骤 7 正如我们在前面几页提到的，如果你已经在代码开头声明了 `using namespace std;`，那么你就不需要 `std::cout`。我们本可以一开始就点击构建/运行图标，但值得了解一下可用的选项。你还可以看到，通过构建和运行，文件已被保存。


    ![](img/840275566c862102888f27d8ae2ac921_64_4.png)


    步骤 10 替换分号，并在 cout 行下方，为你的代码输入一个新行：


    `cout << "And greetings from C++!\n";`


    `\n` 只是在最后一行输出文本下方添加一个新行。构建并运行代码，以展示你的成果。


    ![](img/84027556c862102888f27d8ae2ac921_64_5.png)


    ## 使用注释


    虽然注释对于构成游戏、应用程序甚至整个操作系统的众多代码行来说似乎是一个次要元素，但实际上它们可能是最重要的因素之一。


    ## 注释的重要性


    代码中的注释基本上是人类可读的描述，详细说明了代码在特定点的功能。它们听起来可能不是特别重要，但没有注释的代码是编程中许多令人沮丧的领域之一，无论你是专业人士还是刚刚开始。


    简而言之，所有代码都应该以有效描述一行、一个部分或单个元素的目的的方式进行注释。你应该养成尽可能多地注释的习惯，想象一个对编程一无所知的人可以拿起你的代码，仅仅通过阅读你的注释就能理解它的功能。


    在专业环境中，注释对于代码的成功以及最终公司的成功至关重要。在一个组织中，许多程序员与工程师、其他开发人员、硬件分析师等组成团队工作。如果你是为公司编写定制软件的团队的一员，那么当出现问题，而另一个团队成员必须接手并追踪以定位问题时，你的注释有助于节省大量时间。


    设身处地为那些负责找出程序问题的人着想。该程序有超过 80 万行代码，分布在几个不同的模块中。你很快就会理解，从原始程序员那里获得一些帮助（以良好注释的形式）是多么必要。


    最好的注释总是简洁的，并将代码逻辑地联系起来，详细说明当程序遇到此行或此部分时会发生什么。你不需要对每一行都进行注释。像 `if x==0` 这样的东西不需要你注释说如果
    x 等于零那么做某事；这对读者来说是显而易见的。然而，如果 x 等于零会极大地改变用户的程序，例如，他们用完了生命，那么它肯定需要被注释。


    即使代码是你自己的，你也应该像要公开与他人分享一样编写注释。这样，你就可以回到那段代码，并始终理解你做了什么，或者你在哪里出错了，或者什么效果很好。


    注释是良好的实践，一旦你理解了如何在需要的地方添加注释，你很快就会像第二天性一样去做。


    ![](img/840275566c862102888f27d8ae2ac921_65_0.png)


    ```

