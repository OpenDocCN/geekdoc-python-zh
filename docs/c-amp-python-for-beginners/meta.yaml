- md: '## How to Set Up Python in Windows


    Windows users can easily install the latest version of Python via the main Python
    Downloads page. Whilst most seasoned Python developers may shun Windows as the
    platform of choice for building their code, it’s still an ideal starting point
    for beginners.


    ## INSTALLING PYTHON 3.X


    Microsoft Windows doesn''t come with Python preinstalled as standard, so you''re
    going to have to install it yourself manually. Thankfully, it''s an easy process
    to follow.


    **STEP 1** Start by opening your web browser to **www.python.org/downloads/**.
    Look for the button detailing the download link for Python 3.x.x (in our case
    this is Python 3.6.2 but as mentioned you may see later versions of 3).


    **STEP 2** Click the download button for version 3.x, and save the file to your
    Downloads folder. When the file is downloaded, double-click the executable and
    the Python installation wizard will launch. From here you have two choices: Install
    Now and Customise Installation. We recommend opting for the Customise Installation
    link.


    **STEP 3** Choosing the Customise option allows you to specify certain parameters,
    and whilst you may stay with the defaults, it''s a good habit to adopt as sometimes
    (not with Python, thankfully) installers can include unwanted additional features.
    On the first screen available, ensure all boxes are ticked and click the Next
    button.


    ![](img/840275566c862102888f27d8ae2ac921_13_0.png)


    ![](img/840275566c862102888f27d8ae2ac921_13_1.png)


    **STEP 4** The next page of options include some interesting additions to Python.
    Ensure the Associate file with Python, Create Shortcuts, Add Python to Environment
    Variables, Precompile Standard Library and Install for All Users options are ticked.
    These make using Python later much easier. Click Install when you''re ready to
    continue.


    ![](img/840275566c862102888f27d8ae2ac921_13_2.png)


    ![](img/840275566c862102888f27d8ae2ac921_13_3.png)


    **STEP 5** You may need to confirm the installation with the Windows authentication
    notification. Simply click Yes and Python will begin to install. Once the installation
    is complete the final Python wizard page will allow you to view the latest release
    notes, and follow some online tutorials.


    **STEP 6** Before you close the install wizard window, however, it''s best to
    click on the link next to the shield detailed Disable Path Length Limit. This
    will allow Python to bypass the Windows 260 character limitation, enabling you
    to execute Python programs stored in deep folders arrangements. Again, click Yes
    to authenticate the process; then you can Close the installation window.


    **STEP 7** Windows 10 users will now find the installed Python 3.x within the
    Start button Recently Added section. The first link, Python 3.6 (32-bit) will
    launch the command line version of Python when clicked (more on that in a moment).
    To open the IDLE, type IDLE into Windows start.


    **STEP 8** Clicking on the IDLE (Python 3.6 32-bit) link will launch the Python
    Shell, where you can begin your Python programming journey. Don''t worry if your
    version is newer, as long as it''s Python 3.x our code will work inside your Python
    3 interface.


    ![](img/840275566c862102888f27d8ae2ac921_14_0.png)


    ![](img/840275566c862102888f27d8ae2ac921_14_1.png)


    **STEP 9** If you now click on the Windows Start button again, and this time type:
    CMD, you''ll be presented with the Command Prompt link. Click it to get to the
    Windows command line environment. To enter Python within the command line, you
    need to type: python and press Enter.


    ![](img/840275566c862102888f27d8ae2ac921_14_2.png)


    ![](img/840275566c862102888f27d8ae2ac921_14_3.png)


    **STEP 10** The command line version of Python works in much the same way as the
    Shell you opened in Step 8; note the three left-facing arrows (>>>). Whilst it''s
    a perfectly fine environment, it''s not too user-friendly, so leave the command
    line for now. Enter: exit() to leave and close the Command Prompt window.


    ![](img/840275566c862102888f27d8ae2ac921_14_4.png)


    ![](img/840275566c862102888f27d8ae2ac921_14_5.png)


    ## How to Set Up Python on a Mac


    If you’re running an Apple Mac, then setting up Python is incredibly easy. In
    fact a version of Python is already installed. However, you should make sure you’re
    running the latest version.


    ## INSTALLING PYTHON


    Apple’s operating system comes with Python installed, so you don’t need to install
    it separately. However, Apple doesn’t update Python very often and you’re probably
    running an older version. So it makes sense to check and update first.


    **STEP 1** Open a new Terminal window by clicking Go > Utilities, then double-click
    the Terminal icon. Now enter: `python --version`. You should see “Python 2.5.1”
    and even later, if Apple has updated the OS and Python installation. Either way,
    it’s best to check for the latest version.


    **STEP 2** Open Safari and head over to **www.python.org/downloads**. Just as
    with the Windows setup procedure on the previous pages, you can see two yellow
    download buttons: one for Python 3.6.2, and the other for Python 2.7.13. Note,
    that version numbers may be different due to the frequent releases of Python.


    **STEP 3** Click on the latest version of Python 3.x, in our case this is the
    download button for Python 3.6.2. This will automatically download the latest
    version of Python and depending on how you’ve got your Mac configured, it automatically
    starts the installation wizard.


    ![](img/840275566c862102888f27d8ae2ac921_15_0.png)


    ![](img/840275566c862102888f27d8ae2ac921_15_1.png)


    **STEP 4** With the Python installation wizard open, click on the Continue button
    to begin the installation. It’s worth taking a moment to read through the Important
    Information section, in case it references something that applies to your version
    of macOS. When ready, click Continue again.


    ![](img/840275566c862102888f27d8ae2ac921_15_2.png)


    ![](img/840275566c862102888f27d8ae2ac921_15_3.png)


    **STEP 5** The next section details the Software License Agreement, and whilst
    not particularly interesting to most folks, it''s probably worth a read. When
    you''re ready, click on the Continue button once again.


    **STEP 6** Finally you''re be presented with the amount of space Python will take
    up on your system and an Install button, which you need to click to start the
    actual installation of Python 3.x on to your Mac. You may need to enter your password
    to authenticate the installation process.


    **STEP 7** The installation shouldn''t take too long; the older Mac Mini we used
    in this section is a little slower than more modern Mac machines and it only took
    around thirty seconds for the Installation Successful prompt to be displayed.


    **STEP 8** There''s nothing much else left to do in the Python installation wizard
    so you can click the Close button. If you now drop back into a Terminal session
    and re-enter the command: `python3 --version`, you can see the new version is
    now listed. To enter the command line version of Python, you need to enter: `python3`.
    To exit, it''s: `exit()`.


    ![](img/840275566c862102888f27d8ae2ac921_16_0.png)


    ![](img/840275566c862102888f27d8ae2ac921_16_1.png)


    **STEP 9** You need to search in Finder for the Python IDLE; when you''ve found
    it, click it to launch and it should look similar to that of the Windows IDLE
    version shown on the previous page. The only difference being the Mac detected
    hardware platform it''s running on.


    ![](img/840275566c862102888f27d8ae2ac921_16_2.png)


    ![](img/840275566c862102888f27d8ae2ac921_16_3.png)


    **STEP 10** Older Mac versions may have trouble with the newer versions of Python,
    in which case you will need to revert to a previous Python 3.x build; as long
    as you''re using Python 3.x, the code in this book will work for you.


    ![](img/840275566c862102888f27d8ae2ac921_16_4.png)


    ![](img/840275566c862102888f27d8ae2ac921_16_5.png)


    ## How to Set Up Python in Linux


    Python version 2.x is already installed in most Linux distributions but as we’re
    going to be using Python 3.x, there’s a little work we need to do first to get
    hold of it. Thankfully, it’s not too difficult.


    ## PYTHON PENGUIN


    Linux is such a versatile operating system that it’s often difficult to nail down
    just one way of doing something. Different distributions go about installing software
    in different ways, so we will stick to Linux Mint 18.1 for this particular tutorial.


    **STEP 1** First you need to ascertain which version of Python is currently installed
    in your Linux system; as we mentioned, we’re going to be using Linux Mint 18.1
    for this section. As with macOS, drop into a Terminal by pressing Ctrl+Alt+T.


    **STEP 2** Next enter: `python --version` into the Terminal screen. You should
    have the output relating to version 2.x of Python in the display. Ours in this
