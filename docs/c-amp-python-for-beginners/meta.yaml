  mdcn: '## 如何在 Windows 中设置 Python


    Windows 用户可以通过 Python 官方下载页面轻松安装最新版本的 Python。尽管大多数经验丰富的 Python 开发者可能不会选择 Windows
    作为构建代码的平台，但它仍然是初学者的理想起点。


    ## 安装 Python 3.X


    Microsoft Windows 默认不预装 Python，因此你需要手动安装。幸运的是，这个过程非常简单。


    **步骤 1** 首先，打开你的网页浏览器，访问 **www.python.org/downloads/**。找到 Python 3.x.x 的下载链接按钮（在我们的例子中是
    Python 3.6.2，但如前所述，你可能会看到更新的 3.x 版本）。


    **步骤 2** 点击 3.x 版本的下载按钮，并将文件保存到你的“下载”文件夹。文件下载完成后，双击可执行文件，Python 安装向导将启动。在这里你有两个选择：立即安装和自定义安装。我们建议选择自定义安装链接。


    **步骤 3** 选择自定义选项允许你指定某些参数，虽然你可能保持默认设置，但养成这个习惯是好的，因为有时（幸运的是 Python 不会）安装程序可能会包含不需要的附加功能。在第一个可用的屏幕上，确保所有复选框都被勾选，然后点击下一步按钮。


    ![](img/840275566c862102888f27d8ae2ac921_13_0.png)


    ![](img/840275566c862102888f27d8ae2ac921_13_1.png)


    **步骤 4** 下一页选项包括一些对 Python 有用的附加功能。确保勾选“将文件与 Python 关联”、“创建快捷方式”、“将 Python 添加到环境变量”、“预编译标准库”和“为所有用户安装”选项。这些选项将使后续使用
    Python 更加容易。准备好继续后，点击安装。


    ![](img/840275566c862102888f27d8ae2ac921_13_2.png)


    ![](img/840275566c862102888f27d8ae2ac921_13_3.png)


    **步骤 5** 你可能需要通过 Windows 身份验证通知来确认安装。只需点击“是”，Python 将开始安装。安装完成后，最后的 Python 向导页面将允许你查看最新的发行说明，并跟随一些在线教程。


    **步骤 6** 然而，在关闭安装向导窗口之前，最好点击盾牌图标旁边的“禁用路径长度限制”链接。这将允许 Python 绕过 Windows 的 260 字符限制，使你能够执行存储在深层文件夹结构中的
    Python 程序。同样，点击“是”以验证该过程；然后你可以关闭安装窗口。


    **步骤 7** Windows 10 用户现在可以在“开始”按钮的“最近添加”部分找到已安装的 Python 3.x。第一个链接“Python 3.6 (32-bit)”点击后将启动
    Python 的命令行版本（稍后会详细介绍）。要打开 IDLE，请在 Windows 开始菜单中输入 IDLE。


    **步骤 8** 点击“IDLE (Python 3.6 32-bit)”链接将启动 Python Shell，在这里你可以开始你的 Python 编程之旅。如果你的版本更新，不用担心，只要它是
    Python 3.x，我们的代码就能在你的 Python 3 界面中运行。


    ![](img/840275566c862102888f27d8ae2ac921_14_0.png)


    ![](img/840275566c862102888f27d8ae2ac921_14_1.png)


    **步骤 9** 如果你现在再次点击 Windows 开始按钮，这次输入：CMD，你将看到命令提示符链接。点击它进入 Windows 命令行环境。要在命令行中进入
    Python，你需要输入：python 并按回车键。


    ![](img/840275566c862102888f27d8ae2ac921_14_2.png)


    ![](img/840275566c862102888f27d8ae2ac921_14_3.png)


    **步骤 10** Python 的命令行版本与你在步骤 8 中打开的 Shell 工作方式非常相似；注意三个向左的箭头（>>>）。虽然它是一个完全可用的环境，但不太用户友好，所以暂时离开命令行。输入：exit()
    以退出并关闭命令提示符窗口。


    ![](img/840275566c862102888f27d8ae2ac921_14_4.png)


    ![](img/840275566c862102888f27d8ae2ac921_14_5.png)


    ## 如何在 Mac 上设置 Python


    如果你使用的是 Apple Mac，那么设置 Python 非常简单。事实上，系统已经安装了一个版本的 Python。但是，你应该确保运行的是最新版本。


    ## 安装 Python


    Apple 的操作系统自带 Python，因此你不需要单独安装。然而，Apple 不会经常更新 Python，你可能运行的是一个较旧的版本。因此，最好先检查并更新。


    **步骤 1** 通过点击“前往” > “实用工具”，然后双击“终端”图标来打开一个新的终端窗口。现在输入：`python --version`。你应该会看到“Python
    2.5.1”甚至更新的版本，如果 Apple 更新了操作系统和 Python 安装。无论哪种方式，最好检查最新版本。


    **步骤 2** 打开 Safari 并访问 **www.python.org/downloads**。就像前面页面的 Windows 设置过程一样，你可以看到两个黄色的下载按钮：一个用于
    Python 3.6.2，另一个用于 Python 2.7.13。请注意，由于 Python 的频繁发布，版本号可能有所不同。


    **步骤 3** 点击最新的 Python 3.x 版本，在我们的例子中是 Python 3.6.2 的下载按钮。这将自动下载最新版本的 Python，并根据你的
    Mac 配置，它会自动启动安装向导。


    ![](img/840275566c862102888f27d8ae2ac921_15_0.png)


    ![](img/840275566c862102888f27d8ae2ac921_15_1.png)


    **步骤 4** Python 安装向导打开后，点击“继续”按钮开始安装。值得花点时间阅读“重要信息”部分，以防它提到了适用于你的 macOS 版本的内容。准备好后，再次点击“继续”。


    ![](img/840275566c862102888f27d8ae2ac921_15_2.png)


    ![](img/840275566c862102888f27d8ae2ac921_15_3.png)


    **步骤 5** 下一部分详细说明了软件许可协议，虽然对大多数人来说不是特别有趣，但可能值得一读。准备好后，再次点击“继续”按钮。


    **步骤 6** 最后，你将看到 Python 将占用系统空间的大小和一个“安装”按钮，你需要点击它来开始将 Python 3.x 实际安装到你的 Mac
    上。你可能需要输入密码来验证安装过程。


    **步骤 7** 安装不应该花费太长时间；我们在本节中使用的较旧的 Mac Mini 比现代的 Mac 机器稍慢，只用了大约三十秒钟就显示了“安装成功”提示。


    **步骤 8** Python 安装向导中没有太多其他事情要做，所以你可以点击“关闭”按钮。如果你现在回到终端会话并重新输入命令：`python3 --version`，你可以看到新版本现在已列出。要进入
    Python 的命令行版本，你需要输入：`python3`。要退出，输入：`exit()`。


    ![](img/840275566c862102888f27d8ae2ac921_16_0.png)


    ![](img/840275566c862102888f27d8ae2ac921_16_1.png)


    **步骤 9** 你需要在 Finder 中搜索 Python IDLE；找到后，点击它启动，它应该看起来与前面页面显示的 Windows IDLE 版本相似。唯一的区别是
    Mac 检测到的运行硬件平台。


    ![](img/840275566c862102888f27d8ae2ac921_16_2.png)


    ![](img/840275566c862102888f27d8ae2ac921_16_3.png)


    **步骤 10** 较旧的 Mac 版本可能无法很好地运行较新版本的 Python，在这种情况下，你需要回退到之前的 Python 3.x 构建版本；只要你使用的是
    Python 3.x，本书中的代码就能为你工作。


    ![](img/840275566c862102888f27d8ae2ac921_16_4.png)


    ![](img/840275566c862102888f27d8ae2ac921_16_5.png)


    ## 如何在 Linux 中设置 Python


    大多数 Linux 发行版已经安装了 Python 2.x，但因为我们打算使用 Python 3.x，所以我们需要先做一些工作来获取它。幸运的是，这并不太困难。


    ## PYTHON 企鹅


    Linux 是一个如此通用的操作系统，以至于很难确定一种固定的方法来做某事。不同的发行版以不同的方式安装软件，因此在本教程中，我们将坚持使用 Linux Mint
    18.1。


    **步骤 1** 首先，你需要确定你的 Linux 系统中当前安装的 Python 版本；如前所述，本节我们将使用 Linux Mint 18.1。与 macOS
    类似，通过按 Ctrl+Alt+T 进入终端。


    **步骤 2** 接下来，在终端屏幕中输入：`python --version`。你应该在显示中看到与 Python 2.x 版本相关的输出。在我们的这个特定例子中是
    Python 2.7.12。


    **步骤 3** 一些 Linux 发行版会在系统更新时自动将 Python 安装更新到最新版本。要检查，首先使用以下命令进行系统更新和升级：


    ```

    sudo apt-get update && sudo apt-get upgrade

    ```


    输入你的密码，让系统进行任何更新。


    ![](img/840275566c862102888f27d8ae2ac921_17_0.png)


    ![](img/840275566c862102888f27d8ae2ac921_17_1.png)


    **步骤 4** 更新和升级完成后，你可能需要回答“Y”来授权任何升级，输入：`python3 --version` 查看 Python 3.x 是否已更新甚至已安装。在
    Linux Mint 的情况下，我们拥有的版本是 Python 3.5.2，这对我们来说已经足够了。


    ![](img/840275566c862102888f27d8ae2ac921_17_2.png)


    ![](img/840275566c862102888f27d8ae2ac921_17_3.png)'
