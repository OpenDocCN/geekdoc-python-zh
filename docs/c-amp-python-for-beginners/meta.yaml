    install build-essential** 并按回车键。如果你拥有正确的组件，则不会安装任何内容；如果你缺少某些组件，则该命令会安装它们。


    ### 步骤 3

    令人惊讶的是，就是这样。一切都已准备就绪，你可以开始编码了。以下是如何启动并运行你的第一个 C++ 程序。在 Linux Mint 中，主要的文本编辑器是
    Xed，你可以通过点击菜单并在搜索栏中输入 Xed 来启动它。点击右侧窗格中的“文本编辑器”按钮将其打开。


    ### 步骤 4

    在 Xed 或你可能使用的任何其他文本编辑器中，输入构成你的 C++ Hello World 程序的代码行。它与 Mac 生成的略有不同：


    ```cpp

    #include <iostream>

    int main()

    {

    //My first C++ program

    std::cout << "Hello World!\n";

    }

    ```


    ### 步骤 5

    输入代码后，点击“文件” > “另存为”，并选择一个文件夹来保存你的程序。将文件命名为 helloworld.cpp（可以是任何名称，只要扩展名为 .cpp
    即可）。点击“保存”继续。


    ### 步骤 6

    首先要注意的是，Xed 已自动将其识别为 C++ 文件，因为文件扩展名现在设置为 .cpp。代码中存在语法高亮，如果你打开文件管理器，你还可以看到该文件的图标上印有
    C++ 标记。


    ### 步骤 7

    代码保存后，再次进入终端。你需要导航到刚刚保存的 C++ 文件的位置。我们的示例在 Documents 文件夹中，因此我们可以通过输入以下命令导航到该位置：**cd
    Documents**。请记住，Linux 终端区分大小写，因此任何大写字母都必须正确输入。


    ### 步骤 8

    在执行 C++ 文件之前，你需要先编译它。在 Linux 中，通常使用 g++，一个开源的 C++ 编译器；由于你现在与 C++ 文件位于同一文件夹中，请在终端中输入：**g++
    helloworld.cpp** 并按回车键。


    ### 步骤 9

    代码由 g++ 编译需要一点时间，但只要代码中没有错误，你就会返回到命令提示符。代码的编译创建了一个新文件。如果你在终端中输入：ls，你可以看到在你的 C++
    文件旁边有一个 a.out。


    ### 步骤 10

    a.out 文件是编译后的 C++ 代码。要运行代码，请输入：**./a.out** 并按回车键。屏幕上会出现 ''Hello World!'' 字样。然而，a.out
    并不友好。要在编译后将其命名为其他名称，你可以使用以下命令重新编译：**g++ helloworld.cpp -o helloworld**。这会创建一个名为
    helloworld 的输出文件，可以通过以下命令运行：**./helloworld**。


    ## 其他可安装的 C++ IDE


    如果你想尝试不同的方式来处理你的 C++ 代码，那么有很多选择可供你使用。Windows 是 C++ IDE 最多的平台，但 Mac 和 Linux 用户也有很多选择。


    ### 开发 C++


    以下是十款值得研究的优秀 C++ IDE。如果你愿意，可以安装其中一个或全部，但要找到最适合你的那一个。


    ### ECLIPSE


    Eclipse 是一款非常流行的 C++ IDE，为程序员提供了丰富的功能。它拥有出色、简洁的界面，易于使用，并且适用于 Windows、Linux 和 Mac。请访问
    www.eclipse.org/downloads/ 下载最新版本。如果遇到困难，请点击“需要帮助”链接获取更多信息。


    ### CODELITE


    CodeLite 是一款免费且开源的 IDE，定期更新，适用于 Windows、Linux 和 macOS。它轻量、简单且功能强大。你可以在 www.codelite.org/
    找到更多信息以及如何下载和安装它。


    ### GNAT


    GNAT Programming Studio (GPS) 是一款强大且直观的 IDE，支持测试、调试和代码分析。社区版是免费的，而专业版则需要付费；不过，社区版适用于
    Windows、Mac、Linux 甚至树莓派。你可以在 www.adacore.com/download 找到它。


    ### NETBEANS


    另一个受欢迎的选择是 NetBeans。这是另一款出色的 IDE，功能丰富，使用愉快。NetBeans IDE 包含基于项目的 C++ 模板，使你能够使用动态和静态库构建应用程序。在
    www.netbeans.org/features/cpp/index.html 了解更多信息。'
