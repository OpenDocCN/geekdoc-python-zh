    \n![](img/840275566c862102888f27d8ae2ac921_4_3.png)\n\n# 初识 Python\n\n![](img/840275566c862102888f27d8ae2ac921_5_0.png)\n\
    \n# 初识 Python\n\n有许多不同的编程语言可供学习和使用。有些复杂且功能极其强大，有些则非常基础，仅用作操作系统的辅助工具。Python 介于两者之间，兼具易用性和强大的功能，允许用户创建小型工具、一系列优秀的游戏以及高性能的计算任务。\n\
    \n然而，Python 的意义远不止是另一种编程语言。它背后有一个充满活力的社区，分享知识、代码和项目创意，以及为未来版本修复错误。正是得益于这个社区，这门语言得以成长和繁荣。现在，轮到你投身其中，学习如何用\
    \ Python 编程了。\n\n本书的前半部分帮助你开始使用最新版本的 Python，并指导你如何使用该语言一些最常用和有趣的功能。不久之后，你将能够编写自己的实用系统工具、文字冒险游戏，甚至控制一个角色在屏幕上移动。\n\
    \n# 为什么选择 Python？\n\n现代计算机有许多不同的编程语言可供选择，一些较旧的 8 位和 16 位计算机也有可用的语言。其中一些语言是为科学工作设计的，另一些则用于移动平台等。那么，为什么要在众多语言中选择\
    \ Python 呢？\n\n## PYTHON 的力量\n\n自从最早的家用计算机问世以来，爱好者、用户和专业人士就一直工作到深夜，埋头于一堆过热的电路中，试图创造出类似魔法的东西。\n\
    \n这些编程先驱们开辟了新的领域，编写了让字母 'A' 在屏幕上滚动的小程序。对于习惯了超高清图形和开放世界多人在线游戏的一代人来说，这可能听起来并不那么令人兴奋。然而，四十多年前，这简直是令人眼花缭乱的壮举。\n\
    \n无论你使用的是 Android 设备、iOS 设备、PC、Mac、Linux、智能电视、游戏机、MP3 播放器、车载 GPS 设备、机顶盒，还是成千上万其他联网的“智能”设备，它们背后都是编程。\n\
    \n自然，这些卧室里的程序员帮助奠定了我们今天使用的每一项数字技术的基础。有些人后来成为顶级软件公司的首席开发者，而另一些人则将可用硬件推向极限，创立了不断给我们带来惊喜的数十亿英镑的游戏帝国。\n\
    \n所有上述数字设备都需要指令来告诉它们该做什么，并允许与之交互。这些指令构成了设备的编程核心，而这个核心可以使用多种编程语言来构建。\n\n当今使用的语言因情况、平台、设备用途以及设备与环境或用户的交互方式而异。操作系统，如\
    \ Windows、macOS 等，通常是 C++、C#、汇编语言和某种基于可视化的语言的组合。游戏通常使用 C++，而网页可以使用多种可用语言，如 HTML、Java、Python\
    \ 等。\n\n更通用的编程用于创建程序、应用、软件，或者无论你想怎么称呼它们。它们广泛应用于所有硬件平台，几乎适用于所有可以想象的应用程序。有些运行速度比其他语言快，有些比其他语言更容易学习和使用。Python\
    \ 就是这样一种通用语言。\n\nPython 被称为高级语言，因为它使用各种数组、变量、对象、算术、子程序、循环和无数其他交互方式与硬件和操作系统“对话”。虽然它不像可以直接处理内存地址、调用栈和寄存器的低级语言那样精简，但它的优势在于普遍可访问且易于学习。\n\
    \nPython 诞生于二十六年前，已经发展成为学习计算机编程的理想入门语言。它非常适合爱好者、学生、教师，以及那些只需要在自己或外部硬件与计算机本身之间创建独特交互的人。\n\
    \nPython 可以免费下载、安装和使用，适用于 Linux、Windows、macOS、MS-DOS、OS/2、BeOS、IBM i 系列机器，甚至 RISC\
    \ OS。它被评为世界五大编程语言之一，并持续在硬件和互联网发展曲线之前不断进化。\n\n所以回答这个问题：为什么选择 Python？简单来说，它是免费的、易于学习、功能异常强大、被普遍接受、高效，并且是极佳的学习和教育工具。\n\
    \n![](img/840275566c862102888f27d8ae2ac921_7_0.png)\n\nC++ 通常用于更复杂的程序、操作系统、游戏等。\n\
    \n```java\n//file: Invoke.java\nimport java.lang.reflect.*;\n\nclass Invoke {\n\
    \    public static void main( String [] args ) {\n        try {\n            Class\
    \ c = Class.forName( args[0] );\n            Method m = c.getMethod( args[1],\
    \ new Class [] { } );\n            Object ret = m.invoke( null, null );\n    \
    \        System.out.println(\n                \"Invoked static method: \" + args[1]\n\
    \                + \" of class: \" + args[0]\n                + \" with no args\\\
    nResults: \" + ret );\n        } catch ( ClassNotFoundException e ) {\n      \
    \      // Class.forName( ) can't find the class\n        } catch ( NoSuchMethodException\
    \ e2 ) {\n            // that method doesn't exist\n        } catch ( IllegalAccessException\
    \ e3 ) {\n            // we don't have permission to invoke that method\n    \
    \    } catch ( InvocationTargetException e4 ) {\n            // an exception occurred\
    \ while invoking that method\n            System.out.println(\n              \
