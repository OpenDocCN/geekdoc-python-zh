  md: "# C++ Maths\n\nSTEP 5 The interesting maths content comes when you call upon\
    \ the C++ Math Library. Within this header are dozens of mathematical functions\
    \ along with further operations. Everything from computing cosine to arc tangent\
    \ with two parameters, to the value of PI. You can call the header with:\n\n```\n\
    #include <iostream>\n#include <cmath>\nusing namespace std;\n\nint main ()\n{\n\
    }\n```\n\n![](img/840275566c862102888f27d8ae2ac921_74_0.png)\n\nSTEP 8 Calculating\
    \ powers of numbers can be done with:\n\n```\n#include <iostream>\n#include <cmath>\n\
    using namespace std;\n\nint main ()\n{\n    float number = 12;\n    cout << number\
    \ << \" to the power of 2 is \" << pow(number, 2) << \"\\n\";\n    cout << number\
    \ << \" to the power of 3 is \" << pow(number, 3) << \"\\n\";\n    cout << number\
    \ << \" to the power of .08 is \" << pow(number, 0.8) << \"\\n\";\n}\n```\n\n\
    ![](img/840275566c862102888f27d8ae2ac921_74_1.png)\n\nSTEP 6 Start by getting\
    \ the square root of a number:\n\n```\n#include <iostream>\n#include <cmath>\n\
    using namespace std;\n\nint main ()\n{\n    float number = 134;\n    cout << \"\
    The square root of \" << number << \" is: \" << sqrt(number) << \"\\n\";\n}\n\
    ```\n\nSTEP 9 Here we created a float called number with the value of 12, and\
    \ the pow(variable, power) is where the calculation happens. Of course, you can\
    \ calculate powers and square roots without using variables. For example, pow(12,\
    \ 2) outputs the same value as the first cout line in the code.\n\n![](img/840275566c862102888f27d8ae2ac921_74_2.png)\n\
    \n![](img/840275566c862102888f27d8ae2ac921_74_3.png)\n\nSTEP 10 The value of Pi\
    \ is also stored in the cmath header library. It can be called up with the M_PI\
    \ function. Enter cout << M_PI; into the code and you get 3.14159; or you can\
    \ use it to calculate:\n\n```\n#include <iostream>\n#include <cmath>\nusing namespace\
    \ std;\n\nint main ()\n{\n    double area, radius = 1.5;\n    area = M_PI * radius\
    \ * radius;\n    cout << area << \"\\n\";\n}\n```\n\nSTEP 7 Here we created a\
    \ new float called number and used the sqrt(number) function to display the square\
    \ root of 134, the value of the variable, number. Build and run the code, and\
    \ your answer reads 11.5758.\n\n![](img/840275566c862102888f27d8ae2ac921_74_4.png)\n\
    \n![](img/840275566c862102888f27d8ae2ac921_74_5.png)"
