  md: "# Working with Variables\n\nSTEP 5 However, you can't combine both strings\
    \ and integer type variables in the same command, as you would a set of similar\
    \ variables. You need to either turn one into the other or vice versa. When you\
    \ do try to combine both, you get an error message:\n\n```\nprint (name + age)\n\
    ```\n\n![](img/840275566c862102888f27d8ae2ac921_34_0.png)\n\nSTEP 8 This presents\
    \ a bit of a problem when you want to work with a number that's been inputted\
    \ by the user, as age + 10 won't work due to being a string variable and an integer.\
    \ Instead, you need to enter:\n\n```\nint(age) + 10\n```\n\nThis will TypeCast\
    \ the age string into an integer that can be worked with.\n\n![](img/840275566c862102888f27d8ae2ac921_34_1.png)\n\
    \nSTEP 6 This is a process known as TypeCasting. The Python code is:\n\n```\n\
    print (character + \" is \" + str(age) + \" years old.\")\n```\n\nor you can use:\n\
    \n```\nprint (character, \"is\", age, \"years old.\")\n```\n\nNotice again that\
    \ in the last example, you don't need the spaces between the words in quotes as\
    \ the commas treat each argument to print separately.\n\n```\n>>> print (name\
    \ + age)\nTraceback (most recent call last):\n  File \"<pyshell#18>\", line 1,\
    \ in <module>\n    print (name + age)\nTypeError: Can't convert 'int' object to\
    \ str implicitly\n>>> print (character + \" is \" + str(age) + \" years old.\"\
    )\nDavid Hayward: Descended from Vikings is 44 years old.\n>>> print (character,\
    \ \"is\", age, \"years old.\")\nDavid Hayward: Descended from Vikings is 44 years\
    \ old.\n>>>\n```\n\nSTEP 9 The use of TypeCasting is also important when dealing\
    \ with floating point arithmetic; remember: numbers that have a decimal point\
    \ in them. For example, enter:\n\n```\nshirt=19.99\n```\n\nNow enter type(shirt)\
    \ and you'll see that Python has allocated the number as a 'float', because the\
    \ value contains a decimal point.\n\n![](img/840275566c862102888f27d8ae2ac921_34_2.png)\n\
    \nSTEP 7 Another example of TypeCasting is when you ask for input from the user,\
    \ such as a name. for example, enter:\n\n```\nage= input (\"How old are you? \"\
    )\n```\n\nAll data stored from the Input command is stored as a string variable.\n\
    \n![](img/840275566c862102888f27d8ae2ac921_34_3.png)\n\nSTEP 10 When combining\
    \ integers and floats Python usually converts the integer to a float, but should\
    \ the reverse ever be applied it's worth remembering that Python doesn't return\
    \ the exact value. When converting a float to an integer, Python will always round\
    \ down to the nearest integer, called truncating; in our case instead of 19.99\
    \ it becomes 19.\n\n![](img/840275566c862102888f27d8ae2ac921_34_4.png)"
