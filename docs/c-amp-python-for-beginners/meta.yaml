    \n![](img/840275566c862102888f27d8ae2ac921_38_3.png)\n\nSTEP 2 Let's now expand\
    \ the function to accept a variable, the user's name for example. Edit your script\
    \ to read:\n\n```\ndef Hello(name):\n    print (\"Hello\", name)\n\nHello(\"David\"\
    )\n```\n\nThis will now accept the variable name, otherwise it prints Hello David.\
    \ In the Shell, enter: name=(\"Bob\"), then: Hello(name). Your function can now\
    \ pass variables through it.\n\n![](img/840275566c862102888f27d8ae2ac921_38_4.png)\n\
    \nSTEP 4 What you've just done is import the Hello function from the saved Hello.py\
    \ program and then used it to say hello to David. This is how modules and functions\
    \ work: you import the module then use the function. Try this one, and modify\
    \ it for extra credit:\n\n```\ndef add(a, b):\n    result = a + b\n    return\
    \ result\n```\n\n![](img/840275566c862102888f27d8ae2ac921_38_5.png)"
  - '[PAGE 39]


    # Conditions and Loops


    Conditions and loops are what makes a program interesting; they can be simple
    or rather complex. How you use them depends greatly on what the program is trying
    to achieve; they could be the number of lives left in a game or just displaying
    a countdown.


    # TRUE CONDITIONS


    Keeping conditions simple to begin with makes learning to program a more enjoyable
    experience. Let''s start then by checking if something is TRUE, then doing something
    else if it isn''t.


    **STEP 1** Let''s create a new Python program that will ask the user to input
    a word, then check it to see if it''s a four-letter word or not. Start with File
    > New File, and begin with the input variable:

    `word=input("Please enter a four-letter word: ")`


    **STEP 3** Now you can use an if statement to check if the word_length variable
    is equal to four and print a friendly conformation if it applies to the rule:

    `word=input("Please enter a four-letter word: ")`

    `word_length=len(word)`

    `if word_length == 4:`

    `    print (word, "is a four-letter word. Well done.")`


    The double equal sign (==) means check if something is equal to something else.


    ![](img/840275566c862102888f27d8ae2ac921_39_0.png)


    ![](img/840275566c862102888f27d8ae2ac921_39_1.png)


    **STEP 2** Now we can create a new variable, then use the len function and pass
    the word variable through it to get the total number of letters the user has just
    entered:

    `word=input("Please enter a four-letter word: ")`

    `word_length=len(word)`


    **STEP 4** The colon at the end of IF tells Python that if this statement is true
    do everything after the colon that''s indented. Next, move the cursor back to
    the beginning of the Editor:

    `word=input("Please enter a four-letter word: ")`

    `word_length=len(word)`

    `if word_length == 4:`

    `    print (word, "is a four-letter word. Well done.")`

    `else:`

    `    print (word, "is not a four-letter word.")`


    ![](img/840275566c862102888f27d8ae2ac921_39_2.png)


    ![](img/840275566c862102888f27d8ae2ac921_39_3.png)'
  - "[PAGE 40]\n\n# Conditions and Loops\n\nSTEP 5 Press F5 and save the code to execute\
    \ it. Enter a four-letter word in the Shell to begin with, you should have the\
    \ returned message that it's the word is four letters. Now press F5 again and\
    \ rerun the program but this time enter a five-letter word. The Shell will display\
    \ that it's not a four-letter word.\n\nSTEP 6 Now expand the code to include another\
    \ conditions. Eventually, it could become quite complex. We've added a condition\
    \ for three-letter words:\n\n```\nword=input(\"Please enter a four-letter word:\
    \ \")\nword_length=len(word)\nif word_length == 4:\n    print (word, \"is a four-letter\
    \ word. Well done.\")\nelif word_length == 3:\n    print (word, \"is a three-letter\
    \ word. Try again.\")\nelse:\n    print (word, \"is not a four-letter word.\"\
    )\n```\n\n![](img/840275566c862102888f27d8ae2ac921_40_0.png)\n\n![](img/840275566c862102888f27d8ae2ac921_40_1.png)\n\
    \n# LOOPS\n\nA loop looks quite similar to a condition but they are somewhat different\
    \ in their operation. A loop will run through the same block of code a number\
    \ of times, usually with the support of a condition.\n\nSTEP 1 Let's start with\
    \ a simple While statement. Like IF, this will check to see if something is TRUE,\
    \ then run the indented code:\n\nSTEP 3 The For loop is another example. For is\
    \ used to loop over a range of data, usually a list stored as variables inside\
    \ square brackets. For example:\n\n```\nx = 1\nwhile x < 10:\n    print (x)\n\
    \    x = x + 1\n```\n\n```\nwords=[\"Cat\", \"Dog\", \"Unicorn\"]\nfor word in\
    \ words:\n    print (word)\n```\n\n![](img/840275566c862102888f27d8ae2ac921_40_2.png)\n\
    \n![](img/840275566c862102888f27d8ae2ac921_40_3.png)\n\nSTEP 2 The difference\
    \ between if and while is when while gets to the end of the indented code, it\
    \ goes back and checks the statement is still true. In our example x is less than\
    \ 10. With each loop it prints the current value of x, then adds one to that value.\
    \ When x does eventually equal 10 it stops.\n\nSTEP 4 The For loop can also be\
    \ used in the countdown example by using the range function:\n\n```\nfor x in\
    \ range (1, 10):\n    print (x)\n```\n\nThe x=x+1 part isn't needed here because\
    \ the range function creates a list between the first and last numbers used.\n\
    \n![](img/840275566c862102888f27d8ae2ac921_40_4.png)\n\n![](img/840275566c862102888f27d8ae2ac921_40_5.png)"
- md: "## Python Modules\n\nWe've mentioned modules previously (the Math module),\
    \ but as modules are such a large part of getting the most from Python, it's worth\
    \ dedicating a little more time to them. In this instance we're using the Windows\
    \ version of Python 3.\n\n## MASTERING MODULES\n\nThink of modules as an extension\
    \ that's imported into your Python code to enhance and extend its capabilities.\
    \ There are countless modules available and as we've seen, you can even make your\
    \ own.\n\nSTEP 1 Although good, the built-in functions within Python are limited.\
    \ The use of modules, however, allows us to make more sophisticated programs.\
    \ As you are aware, modules are Python scripts that are imported, such as `import\
    \ math`.\n\nSTEP 2 Some modules, especially on the Raspberry Pi, are included\
    \ by default, the math module being a prime example. Sadly, other modules aren't\
    \ always available. A good example on non-Pi platforms is the pygame module, which\
    \ contains many functions to help create games. Try: `import pygame`.\n\nSTEP\
    \ 3 The result is an error in the IDLE Shell, as the pygame module isn't recognised\
    \ or installed in Python. To install a module we can use PIP (Pip Installs Packages).\
    \ Close down the IDLE Shell and drop into a command prompt or Terminal session.\
    \ At an elevated admin command prompt, enter: `pip install pygame`\n\nSTEP 4 The\
    \ PIP installation requires an elevated status due to it installing components\
    \ at different locations. Windows users can search for CMD via the Start button\
    \ and right-click the result then click Run as Administrator. Linux and Mac users\
    \ can use the Sudo command, with `sudo pip install package`.\n\nSTEP 5 Close the\
    \ command prompt or Terminal and relaunch the IDLE Shell. When you now enter:\
    \ `import pygame`, the module will be imported into the code without any problems.\
    \ You'll find that most code downloaded or copied from the Internet will contain\
    \ a module, mainstream or unique, these are usually the source of errors in execution\
    \ due to them being missing.\n\nSTEP 6 The modules contain the extra code needed\
    \ to achieve a certain result within your own code, as we've previously experimented\
    \ with. For example:\n\n```python\nimport random\n```\n\nBrings in the code from\
    \ the random number generator module. You can then use this module to create something\
    \ like:\n\n```python\nfor i in range(10):\n    print(random.randint(1, 25))\n\
    ```\n\nSTEP 7 This code, when saved and executed, will display ten random numbers\
    \ from 1 to 25. You can play around with the code to display more or less, and\
    \ from a greater or lesser range. For example:\n\n```python\nimport random\n\n\
    for i in range(25):\n    print(random.randint(1, 100))\n```\n\nSTEP 8 Multiple\
    \ modules can be imported within your code. To extend our example, use:\n\n```python\n\
    import random\nimport math\n\nfor i in range(5):\n    print(random.randint(1,\
    \ 25))\n\nprint(math.pi)\n```\n\nSTEP 9 The result is a string of random numbers\
    \ followed by the value of Pi as pulled from the math module using the `print(math.pi)`\
    \ function. You can also pull in certain functions from a module by using the\
    \ `from` and `import` commands, such as:\n\n```python\nfrom random import randint\n\
    \nfor i in range(5):\n    print(randint(1, 25))\n```\n\nSTEP 10 This helps create\
    \ a more streamlined approach to programming. You can also use `import module*`,\
    \ which will import everything defined within the named module. However, it's\
    \ often regarded as a waste of resources but it works nonetheless. Finally, modules\
    \ can be imported as aliases:\n\n```python\nimport math as m\n\nprint(m.pi)\n\
    ```\n\nOf course, adding comments helps to tell others what's going on.\n\n##\
    \ Say Hello to C++\n\nC++ is a high level programming language that’s used in\
    \ a multitude of technologies. Everything from your favourite mobile app, console\
    \ and PC game to entire operating systems, all are developed using C++ and a collection\
    \ of software development kits and custom libraries.\n\nC++ is the driving force\
    \ behind most of what you use on a daily basis, which makes it a complex and extraordinarily\
    \ powerful language to get to grips with. In this section, we look at how to install\
    \ a C++ IDE and compiler on your computer.\n\n## Why C++?\n\nC++ is one of the\
    \ most popular programming languages available today. Originally called C with\
    \ Classes, the language was renamed C++ in 1983. It’s an extension of the original\
    \ C language and is a general purpose object-oriented (OOP) environment.\n\n##\
    \ C EVERYTHING\n\nDue to how complex the language can be, and its power and performance,\
    \ C++ is often used to develop games, programs, device drivers and even entire\
    \ operating systems.\n\nDating back to 1979, the start of the golden era of home\
    \ computing, C++, or rather C with Classes, was the brainchild of Danish computer\
    \ scientist Bjarne Stroustrup while working on his PhD thesis. Stroustrup’s plan\
    \ was to further the original C language, which was widely used since the early\
    \ seventies.\n\nC++ proved to be popular among the developers of the '80s, since\
    \ it was a much easier environment to get to grips with and more importantly,\
    \ it was 99% compatible with the original C language. This meant that it could\
    \ be used beyond the mainstream computing labs and by regular people who didn’t\
    \ have access to the mainframes and large computing data centres.\n\nC++’s impact\
    \ in the digital world is immense. Many of the programs, applications, games and\
    \ even operating systems are coded using C++. For example, all of Adobe’s major\
    \ applications, such as Photoshop, InDesign and so on, are developed in C++. You\
    \ will find that the browser you surf the Internet with is written in C++, as\
    \ well as Windows 10, Microsoft Office and the backbone to Google’s search engine.\
    \ Apple’s macOS is written largely in C++ (with some other languages mixed in\
    \ depending on the function) and the likes of NASA, SpaceX and even CERN use C++\
    \ for various applications, programs, controls and umpteen other computing tasks.\n\
    \nC++ is also extremely efficient and performs well across the board as well as\
    \ being an easier addition to the core C language. This higher level of performance\
    \ over other languages, such as Python, BASIC and such, makes it an ideal development\
    \ environment for modern computing, hence the aforementioned companies using it\
    \ so widely.\n\nWhile Python is a great programming language to learn, C++ puts\
    \ the developer in a much wider world of coding. By mastering C++, you can find\
    \ yourself developing code for the likes of Microsoft, Apple and so on. Generally,\
    \ C++ developers enjoy a higher salary than programmers of some other languages\
    \ and due to its versatility, the C++ programmer can move between jobs and companies\
    \ without the need to relearn anything specific. However, Python is an easier\
    \ language to begin with. If you're completely new to programming then we would\
    \ recommend you begin with Python and spend some time getting to grips with programming\
    \ structure and the many ways and means in which you find a solution to a problem\
    \ through programming. Once you can happily power up your computer and whip out\
    \ a Python program with one hand tied behind your back, then move on to C++. Of\
    \ course, there's nothing stopping you from jumping straight into C++; if you\
    \ feel up to the task, go for it.\n\n**Indeed, the operating system you're using\
    \ is written in C++.**\n\n**Microsoft's Visual Studio is a great, free environment\
    \ to learn C++ in.**\n\nGetting to use C++ is as easy as Python, all you need\
    \ is the right set of tools in which to communicate with the computer in C++ and\
    \ you can start your journey. A C++ IDE is free of charge, even the immensely\
    \ powerful Visual Studio from Microsoft is freely available to download and use.\
    \ You can get into C++ from any operating system, be it macOS, Linux, Windows\
    \ or even mobile platforms.\n\nJust like Python, to answer the question of Why\
    \ C++ is the answer is because it's fast, efficient and developed by most of the\
    \ applications you regularly use. It's cutting edge and a fantastic language to\
    \ master.\n\nC++ code is much faster than that of Python.\n\n```cpp\n#include<iostream>\n\
    using namespace std;\nvoid main()\n{\n    char ch;\n    cout<<\"Enter a character\
    \ to check it is vowel or not\";\n    cin>>ch;\n    switch(ch)\n    {\n      \
    \  case 'a': case 'A':\n            cout<<ch<<\" is a Vowel\";\n            break;\n\
    \        case 'e': case 'E':\n            cout<<ch<<\" is a Vowel\";\n       \
    \     break;\n        case 'i': case 'I':\n            cout<<ch<<\" is a Vowel\"\
    ;\n            break;\n        case 'o': case 'O':\n            cout<<ch<<\" is\
    \ a Vowel\";\n            break;\n        case 'u': case 'U':\n            cout<<ch<<\"\
    \ is a Vowel\";\n            break;\n    }\n}\n```"
  mdcn: "## Python 模块\n\n我们之前已经提到过模块（例如数学模块），但由于模块是充分利用 Python 的重要组成部分，值得花更多时间来探讨。在本例中，我们使用的是\
    \ Windows 版本的 Python 3。\n\n## 掌握模块\n\n可以将模块视为导入到 Python 代码中以增强和扩展其功能的扩展组件。有无数的模块可用，正如我们所见，你甚至可以创建自己的模块。\n\
    \n步骤 1 尽管 Python 的内置函数很好，但功能有限。然而，使用模块可以让我们编写更复杂的程序。如你所知，模块是被导入的 Python 脚本，例如\
    \ `import math`。\n\n步骤 2 某些模块，尤其是在树莓派上，默认是包含的，数学模块就是一个典型的例子。遗憾的是，其他模块并非总是可用。在非树莓派平台上，一个很好的例子是\
    \ pygame 模块，它包含许多帮助创建游戏的函数。尝试：`import pygame`。\n\n步骤 3 结果是在 IDLE Shell 中出现错误，因为\
    \ pygame 模块未被识别或未在 Python 中安装。要安装模块，我们可以使用 PIP（Pip Installs Packages）。关闭 IDLE\
    \ Shell 并进入命令提示符或终端会话。在提升权限的管理员命令提示符下，输入：`pip install pygame`。\n\n步骤 4 PIP 安装需要提升权限，因为它会在不同位置安装组件。Windows\
    \ 用户可以通过“开始”按钮搜索 CMD，右键单击结果，然后单击“以管理员身份运行”。Linux 和 Mac 用户可以使用 Sudo 命令，即 `sudo\
    \ pip install package`。\n\n步骤 5 关闭命令提示符或终端，然后重新启动 IDLE Shell。现在当你输入：`import pygame`\
    \ 时，模块将毫无问题地导入到代码中。你会发现大多数从互联网下载或复制的代码都会包含一个模块，无论是主流的还是独特的，这些通常是执行错误的来源，因为它们缺失了。\n\
    \n步骤 6 模块包含在你自己的代码中实现特定结果所需的额外代码，正如我们之前实验过的那样。例如：\n\n```python\nimport random\n\
    ```\n\n引入了来自随机数生成器模块的代码。然后你可以使用这个模块来创建类似这样的内容：\n\n```python\nfor i in range(10):\n\
    \    print(random.randint(1, 25))\n```\n\n步骤 7 这段代码在保存并执行后，将显示十个从 1 到 25 的随机数。你可以调整代码以显示更多或更少的数字，以及更大或更小的范围。例如：\n\
    \n```python\nimport random\n\nfor i in range(25):\n    print(random.randint(1,\
    \ 100))\n```\n\n步骤 8 可以在代码中导入多个模块。为了扩展我们的示例，使用：\n\n```python\nimport random\n\
    import math\n\nfor i in range(5):\n    print(random.randint(1, 25))\n\nprint(math.pi)\n\
    ```\n\n步骤 9 结果是一串随机数，后面跟着使用 `print(math.pi)` 函数从数学模块中提取的圆周率值。你也可以使用 `from` 和 `import`\
    \ 命令从模块中引入特定函数，例如：\n\n```python\nfrom random import randint\n\nfor i in range(5):\n\
    \    print(randint(1, 25))\n```\n\n步骤 10 这有助于创建更精简的编程方法。你也可以使用 `import module*`，这将导入命名模块中定义的所有内容。然而，这通常被视为浪费资源，但它仍然有效。最后，模块可以作为别名导入：\n\
    \n```python\nimport math as m\n\nprint(m.pi)\n```\n\n当然，添加注释有助于告诉其他人代码的功能。\n\n\
    ## 向 C++ 问好\n\nC++ 是一种高级编程语言，广泛应用于各种技术领域。从你喜爱的移动应用、主机和 PC 游戏，到整个操作系统，所有这些都是使用\
    \ C++ 以及一系列软件开发工具包和自定义库开发的。\n\nC++ 是你日常使用的大多数技术背后的驱动力，这使得它成为一门复杂且功能异常强大的语言，需要深入掌握。在本节中，我们将探讨如何在你的计算机上安装\
    \ C++ IDE 和编译器。\n\n## 为什么选择 C++？\n\nC++ 是当今最受欢迎的编程语言之一。最初被称为“带类的 C”，该语言于 1983\
    \ 年更名为 C++。它是原始 C 语言的扩展，是一个通用的面向对象（OOP）环境。\n\n## 一切皆 C\n\n由于该语言的复杂性、强大的功能和高性能，C++\
    \ 通常用于开发游戏、程序、设备驱动程序，甚至整个操作系统。\n\nC++ 的历史可以追溯到 1979 年，即家庭计算黄金时代的开端，它是丹麦计算机科学家\
    \ Bjarne Stroustrup 在攻读博士学位时的创意。Stroustrup 的计划是扩展原始 C 语言，该语言自七十年代初以来就被广泛使用。\n\n\
    C++ 在 80 年代的开发者中很受欢迎，因为它是一个更容易掌握的环境，更重要的是，它与原始 C 语言 99% 兼容。这意味着它可以用于主流计算实验室之外，供那些无法访问大型机和大型计算数据中心的普通人使用。\n\
    \nC++ 在数字世界中的影响是巨大的。许多程序、应用程序、游戏甚至操作系统都是使用 C++ 编写的。例如，Adobe 的所有主要应用程序，如 Photoshop、InDesign\
    \ 等，都是用 C++ 开发的。你会发现你用来浏览互联网的浏览器是用 C++ 编写的，Windows 10、Microsoft Office 以及 Google\
    \ 搜索引擎的核心也是如此。Apple 的 macOS 主要是用 C++ 编写的（根据功能混合了其他一些语言），而 NASA、SpaceX 甚至 CERN\
    \ 等机构也使用 C++ 进行各种应用程序、程序、控制以及无数其他计算任务。\n\nC++ 也极其高效，在各方面表现出色，并且是核心 C 语言的更易上手的扩展。这种相对于\
    \ Python、BASIC 等其他语言的更高性能水平，使其成为现代计算的理想开发环境，因此上述公司广泛使用它。\n\n虽然 Python 是一门很好的编程语言，但\
    \ C++ 将开发者带入了一个更广阔的编码世界。通过掌握 C++，你可以发现自己为 Microsoft、Apple 等公司开发代码。通常，C++ 开发者的薪资高于某些其他语言的程序员，并且由于其多功能性，C++\
