    ## Compile and Execute


    STEP 5 Pressing any key in the command line box closes it, returning you to Code::Blocks.
    Let''s alter the code slightly. Under the #include line, enter:


    `using namespace std;`


    Then, delete the std:: part of the Cout line; like so:


    `cout << "Hello, world\n";`


    ![](img/840275566c862102888f27d8ae2ac921_64_0.png)


