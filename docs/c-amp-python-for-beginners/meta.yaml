- md: '## Other C++ IDEs to Install


    Microsoft''s Visual Studio is a mammoth C++ IDE that allows you to create applications
    for Windows, Android, iOS and the web. The Community version is free to download
    and install but the other versions allow a free trial period. Go to www.visualstudio.com/
    to see what it can do for you.


    The Anjuta DevStudio is a Linux-only IDE that features some of the more advanced
    features you would normally find in a paid software development studio. There''s
    a GUI designer, source editor, app wizard, interactive debugger and much more.
    Go to www.anjuta.org/ for more information.


    This cross-platform IDE is designed to create C++ applications for desktop and
    mobile environments. It comes with a code editor and integrated tools for testing
    and debugging, as well as deploying to your chosen platform. It''s not free but
    there is a trial period on offer before requiring purchasing: www.qt.io/qt-features-libraries-apis-tools-and-ide/.


    This excellent IDE allows developers to write C++ code for desktop and web applications
    across all the major platforms. There''s an advanced text editor, integrated debugger
    and a configurable workbench to help you create your code. It''s available for
    Windows, Mac and Linux and is free to download and use: www.monodevelop.com/.


    Bloodshed Dev C++, despite its colourful name, is an older IDE that is for Windows
    systems only. However, many users praise its clean interface and uncomplicated
    way of coding and compiling. Although there''s not been much updating for some
    time, it''s certainly one to consider if you want something different: www.bloodshed.net/devcpp.html.


    Ultimate++ is a cross-platform C++ IDE that boasts a rapid development of code
    through the smart and aggressive use of C++. For the novice, it''s a beast of
    an IDE but behind its complexity is a beauty that would make a developer''s knees
    go wobbly. Find out more at www.ultimatepp.org/index.html.


    ## C++ Fundamentals


    Within this section you can begin to understand the structure of C++ code and
    how to compile and execute that code. These are the fundamentals of C++, which
    teach you the basics such as using comments, variables, data types, strings and
    how to use C++ mathematics.


    These are the building blocks of a C++ program. With them, you can form your own
    code, produce an output to the screen and store and retrieve data.


    ## Your First C++ Program


    You may have followed the Mac and Linux examples previously but you’re going to
    be working exclusively in Windows and Code::Blocks from here on. Let’s begin by
    writing your first C++ program and taking the first small step into a larger coding
    world.


    ### HELLO, WORLD!


    It’s traditional in programming for the first code to be entered to output the
    words ‘Hello, World!’ to the screen. Interestingly, this dates back to 1968 using
    a language called BCPL.


    **STEP 1** As mentioned, we’re using Windows 10 and the latest version of Code::Blocks
    for the rest of the C++ code in this book. Begin by launching Code::Blocks. When
    open, click on File > New > Empty File or press Ctrl+Shift+N on the keyboard.


    **STEP 2** Now you can see a blank screen, with the tab labelled *Untitled1*,
    and the number one in the top left of the main Code::Blocks window. Begin by clicking
    in the main window, so the cursor is next to the number one, and entering:


    ```

    #include <iostream>

    ```


    **STEP 3** At the moment it doesn''t look like much, and it makes even less sense,
    but we’ll get to that in due course. Now click on File > Save File As. Create
    or find a suitable location on your hard drive and in the File Name box, call
    it helloworld.cpp. Click the Save as type box and select C/C++ files. Click the
    Save button.


    **STEP 4** You can see that Code::Blocks has now changed the colour coding, recognising
    that the file is now C++ code. This means that code can be auto-selected from
    the Code::Blocks repository. Delete the #include <iostream> line and re-enter
    it. You can see the auto-select boxes appearing.


    **STEP 5** Auto-selection of commands is extremely handy and cuts out potential
    mistyping. Press Return to get to line 3, then enter:


    ```

    int main()

    ```


    Note: there''s no space between the brackets.


    **STEP 6** On the next line below int main(), enter a curly bracket:


    ```

    {

    ```


    This can be done by pressing Shift and the key to the right of P on an English
    UK keyboard layout.


    **STEP 7** Notice that Code::Blocks has automatically created a corresponding
    closing curly bracket a couple of lines below, linking the pair, as well as a
    slight indent. This is due to the structure of C++ and it''s where the meat of
    the code is entered. Now enter:


    ```

    //My first C++ program

    ```


    **STEP 8** Note again the colour coding change. Press Return at the end of the
    previous step''s line, and then enter:


    ```

    std::cout << "Hello, world!\n";

    ```


    **STEP 9** Just as before, Code::Blocks auto-completes the code you''re entering,
    including placing a closing speech mark as soon as you enter the first. Don''t
    forget the semicolon at the end of the line; this is one of the most important
    elements to a C++ program and we''ll tell you why in the next section. For now,
    move the cursor down to the closing curly bracket and press Return.


    **STEP 10** That''s all you need to do for the moment. It may not look terribly
    amazing but C++ is best absorbed in small chunks. Don''t execute the code at the
    moment as you need to look at how a C++ program is structured first; then you
    can build and run the code. For now, click on Save, the single floppy disc icon.


    ## Structure of a C++ Program


    C++ has a very defined structure and way of doing things. Miss something out,
    even as small as a semicolon, and your entire program will fail to be compiled
    and executed. Many a professional programmer has fallen foul of sloppy structure.


    ### #INCLUDE <C++ STRUCTURE>


    Learning the basics of programming, you begin to understand the structure of a
    program. The commands may be different from one language to the next, but you
    will start to see how the code works.


    C++ was invented by Danish student Bjarne Stroustrup in 1979, as a part of his
    Ph.D. thesis. Initially C++ was called C with Classes, which added features to
    the already popular C programming language, while making it a more user-friendly
    environment through a new structure.


    ### #INCLUDE


    The structure of a C++ program is quite precise. Every C++ code begins with a
    directive: **#include <>**. The directive instructs the pre-processor to include
    a section of the standard C++ code. For example: **#include <iostream>** includes
    the iostream header to support input/output operations.


    ```

    1  #include <iostream>

    2

    3

    4

    5

    6

    ```


    Bjarne Stroustrup, inventor of C++.


    ### INT MAIN()


    **int main()** initiates the declaration of a function, which is a group of code
    statements under the name ''main''. All C++ code begins at the main function,
    regardless of where it actually lies within the code.


    ```

    1  #include <iostream>

    2

    3  int main()

    4

    5

    6

    ```


    ### BRACES


    The open brace (curly brackets) is something that you may not have come across
    before, especially if you''re used to Python. The open brace indicates the beginning
    of the main function and contains all the code that belongs to that function.


    ```

    1  #include <iostream>

    2

    3  int main()

    4  {

    5

    6  }

    ```'
