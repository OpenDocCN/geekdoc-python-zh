  md: "# Variables\n\nSTEP 5 You can assign a value to a variable as soon as you declare\
    \ it. The code you've typed in could look like this, instead:\n\n```\nint a =\
    \ 10;\nint b = 5;\nint result = a + b;\ncout << result;\n```\n\n![](img/840275566c862102888f27d8ae2ac921_68_0.png)\n\
    \nSTEP 8 The previous step creates the variable StartLives, which is a global\
    \ variable. In a game, for example, a player's lives go up or down depending on\
    \ how well or how bad they're doing. When the player restarts the game, the StartLives\
    \ returns to its default state: 3. Here we've assigned 3 lives, then subtracted\
    \ 1, leaving 2 lives left.\n\n![](img/840275566c862102888f27d8ae2ac921_68_1.png)\n\
    \nSTEP 6 Specific to C++, you can also use the following to assign values to a\
    \ variable as soon as you declare them:\n\n```\nint a (10);\nint b (5);\n```\n\
    \nThen, from the C++ 2011 standard, using curly brackets:\n\n```\nint result {a+b};\n\
    ```\n\nSTEP 9 The modern C++ compiler is far more intelligent than most programmers\
    \ give it credit. While there are numerous data types you can declare for variables,\
    \ you can in fact use the auto feature:\n\n```\n#include <iostream>\nusing namespace\
    \ std;\nauto pi = 3.141593;\n\nint main()\n{\n    double area, radius = 1.5;\n\
    \    area = pi * radius * radius;\n    cout << area;\n}\n```\n\n![](img/840275566c862102888f27d8ae2ac921_68_2.png)\n\
    \n![](img/840275566c862102888f27d8ae2ac921_68_3.png)\n\nSTEP 7 You can create\
    \ global variables, which are variables that are declared outside any function\
    \ and used in any function within the entire code. What you've used so far are\
    \ local variables: variables used inside the function. For example:\n\n```\n#include\
    \ <iostream>\nusing namespace std;\nint StartLives = 3;\n\nint main ()\n{\n  \
    \  startLives = StartLives - 1;\n    cout << StartLives;\n}\n```\n\nSTEP 10 A\
    \ couple of new elements here: first, auto won't work unless you go to Settings\
    \ > Compiler and tick the box labelled 'Have G++ follow the C++11 ISO C++ Language\
    \ Standard [-std=c++11]'. Then, the new data type, double, which means double-precision\
    \ floating point value. Enable C++11, then build and run the code. The result\
    \ should be 7.06858.\n\n![](img/840275566c862102888f27d8ae2ac921_68_4.png)\n\n\
    ![](img/840275566c862102888f27d8ae2ac921_68_5.png)"
