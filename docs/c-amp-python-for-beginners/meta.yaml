  md: '# THE RASPBERRY PI


    Why use a Raspberry Pi? The Raspberry Pi is a tiny computer that''s very cheap
    to purchase but offers the user a fantastic learning platform. Its main operating
    system, Raspbian, comes preinstalled with the latest Python along with many Modules
    and extras.


    # RASPBERRY PI


    The Raspberry Pi 3 is the latest version, incorporating a more powerful CPU, more
    memory, Wi-Fi and Bluetooth support. You can pick up a Pi for around £32 or as
    a part of kit for £50+, depending on the kit you''re interested in.


    ![](img/840275566c862102888f27d8ae2ac921_10_0.png)


    ![](img/840275566c862102888f27d8ae2ac921_10_1.png)


    # FUZE PROJECT


    The FUZE is a learning environment built on the latest model of the Raspberry
    Pi. You can purchase the workstations that come with an electronics kit and even
    a robot arm for you to build and program. You can find more information on the
    FUZE at www.fuze.co.uk.


    # RASPBIAN


    The Raspberry Pi''s main operating system is a Debian-based Linux distribution
    that comes with everything you need in a simple to use package. It''s streamlined
    for the Pi and is an ideal platform for hardware and software projects, Python
    programming and even as a desktop computer.


    ![](img/840275566c862102888f27d8ae2ac921_10_2.png)


    # BOOKS


    We have several great coding titles available via www.pclpublications.com. Our
    Pi books cover how to buy your first Raspberry Pi, set it up and use it; there
    are some great step-by-step project examples and guides to get the most from the
    Raspberry Pi too.


    ![](img/840275566c862102888f27d8ae2ac921_10_3.png)


    ![](img/840275566c862102888f27d8ae2ac921_10_4.png)


    ![](img/840275566c862102888f27d8ae2ac921_10_5.png)


