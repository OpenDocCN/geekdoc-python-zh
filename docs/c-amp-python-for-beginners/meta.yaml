    步骤 8 在代码中故意制造一个错误。从 cout 行中删除分号，使其变为：


    `cout << "Hello, world!\n"`


    ![](img/840275566c862102888f27d8ae2ac921_64_1.png)


    步骤 6 为了应用代码的新更改，你需要重新编译、构建并再次运行它。然而，这次你可以简单地点击构建/运行图标，即组合的黄色齿轮和绿色播放按钮。


