    在本节中，我们将介绍变量、数字和表达式、用户输入、条件和循环；以及你在使用 Python 时可能遇到的错误类型。


    ## 首次启动 Python


    我们将使用树莓派作为我们的 Python 3 硬件平台。最新版本的 Raspbian 预装了 Python 3，确切地说是 3.4.2 版本，因此只要你有一个版本
    3 的 Shell，我们所有的代码都将正常工作。


    ### 启动 Python


    我们不会详细介绍如何启动和运行树莓派，因为关于该主题已有大量可用材料。但是，一旦你准备好，启动你的树莓派并准备编码。


    **步骤 1** 加载 Raspbian 桌面后，单击菜单按钮，然后选择编程 > Python 3 (IDLE)。这将打开 Python 3 Shell。Windows
