    your code has now been run through the Code::Blocks compiler and checked for any
    errors. You can see the results of the Build by looking to the bottom window pane.
    Any messages regarding the quality of the code are displayed here.


    ![](img/840275566c862102888f27d8ae2ac921_63_0.png)


    ![](img/840275566c862102888f27d8ae2ac921_63_1.png)


    **STEP 2** If your code is looking similar to the one in our screenshot, then
    look to the menu bar along the top of the screen. Under the Fortran entry in the
    topmost menu you can see a group of icons: a yellow cog, green play button and
    a cog/play button together. These are Build, Run, Build and Run functions.


    **STEP 4** Now click on the Run icon, the green play button. A command line box
    appears on your screen displaying the words: Hello, world!, followed by the time
    it''s taken to execute the code, and asking you press a key to continue. Well
