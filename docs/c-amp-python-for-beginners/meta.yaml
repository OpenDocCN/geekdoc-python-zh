    ![](img/840275566c862102888f27d8ae2ac921_27_1.png)


    STEP 2 Just as before, we’re using a Raspberry Pi; Windows users will need to
    click the Start button and search for CMD, then click the Command Line returned
    search; and macOS users can get access to their command line by clicking Go >
    Utilities > Terminal.


    ![](img/840275566c862102888f27d8ae2ac921_27_2.png)


    STEP 4 From here you’re able to enter the code you’ve looked at previously, such
    as:


    a=2

    print(a)


    You can see that it works exactly the same.


