    in an introductory fashion, the “How?” aspect of the'
- md: "## 2.3.1 面向对象编程（OOP）概念\n\ndata model (and also the “Why?”) that Python3 programming\
    \ uses. In particular, as that applies to OOP. OOP is a programming model that\
    \ represents concepts as *objects* that have fields (which are basically attributes\
    \ that describe the object) and associated processes, or if you will, functions,\
    \ known as *methods*, which are basically known as “messaging” operations on those\
    \ attributes. Objects, which are established as instances of what are known as\
    \ “classes”, are constructed to interact with one another using the messaging\
    \ system, to design applications and computer programs. Some examples of modern\
    \ OOP languages are Smalltalk, C++, C#, Java. Perl, Ruby, PHP, and Python.\n\n\
    Below are some common terms used in OOP:\n\n**Class:** A user-defined model for\
    \ an object that defines characteristics of any object in that class. The characteristics\
    \ are data members (class variables and instance variables) and methods, accessed\
    \ via what’s called dot(.) notation.\n\n**Class variable:** A variable that is\
    \ shared by all instances of a class. Class variables are defined within a class,\
    \ but outside any of the class’s methods.\n\n**Data member:** A class variable\
    \ or instance variable that holds data associated with a class and its objects.\n\
    \n**Instance variable:** A variable that is defined inside a method and belongs\
    \ only to the current instance of a class.\n\n**Inheritance:** The transfer of\
    \ the characteristics of a class to other classes that are derived from it.\n\n\
    **Instance:** An individual object of a certain class. An object that belongs\
    \ to a class named Circle, for example, is an instance of the class Circle.\n\n\
    **Instantiation:** The creation of an instance of a class.\n\n**Method:** A special\
    \ kind of function that is defined in a class definition.\n\n**Object:** A unique\
    \ instance of a data structure defined by its class. An object can comprise both\
    \ data members (class variables and instance variables) and methods.\n\nThe general\
    \ form of a class definition is:\n\n```\nclass ClassName:\n    'Optional class\
    \ documentation string'\n    class_suite\n```\n\nThe class has a documentation\
    \ string, which can be accessed via **ClassName.__doc__**.\n\nThe **class_suite**\
    \ consists of all the component statements defining class members, data attributes,\
    \ and methods.\n\nThe following lines of interactive code very simply illustrate\
    \ the inheritance model of OOP classes, and in particular, its hierarchic nature.\
    \ Launch Thonny on your Raspberry Pi system, and execute the code below in the\
    \ Thonny Shell Area. Be sure to press the <Enter> key at the end of Line 2 of\
    \ the code (There is no need to type in the comment line numbers, which we provide\
    \ here for reference only.)\n\n```\n>>> class tab: pass            #Line 1\n...\
    \                            #These ellipses appear on Line 2\n>>> tab.name =\
    \ 'Bob Koretsky'  #Line 3\n>>> tab.age = 85               #Line 4\n>>> print (tab.name,tab.age)\
    \   #Line 5\nBob Koretsky 85\n>>> x = tab()                  #Line 6\n>>> y =\
    \ tab()                  #Line 7\n>>> x.name                     #Line 8\nBob\
    \ Koretsky\n>>> y.name = 'Alan Turing'     #Line 9\n>>> tab.name, x.name, y.name\
    \   #Line 10\n('Bob Koretsky', 'Bob Koretsky', 'Alan Turing')\n>>>\n```\n\nFor\
    \ beginners, a line-by-line analysis and description of this code is as follows:\n\
    \n- Line 1: Starting with the keyword **class**, you name a class **tab**. You\
    \ use the keyword **pass** to assign the class to an empty namespace object, that\
    \ is, *it has no class members, attributes or methods yet*. A class is a model\
    \ of an object!\n- Line 2: Continue by pressing <Enter>.\n- Line 3: You now add\
    \ an attribute called **name** to the class named **tab**. The class **tab** has\
    \ no instances yet!\n- Line 4: You assign another attribute called **age** to\
    \ the class **tab**.\n- Line 5: You print out the attributes of **tab**.\n- Line\
    \ 6: You now assign an instance, named **x**, to the class **tab**, which is now\
    \ an empty instance.\n- Line 7: You now assign another instance, named **y**,\
    \ to the class **tab**, which is another empty instance.\n- Line 8: The instance\
    \ **x** inherits the attribute **name** from **tab**. You use the dot (.) operator\
    \ to connect or refer to the instance **x** with **name** \"Bob Koretsky\" in\
    \ the class **tab**.\n- Line 9: You now explicitly assign the instance **y**,\
    \ with an attribute **name**, the value \"Alan Turing\". You use the dot (.) operator\
    \ to connect the instance **y** with **name** \"Alan Turing\".\n- Line 10: You\
    \ print out the name in **tab**, the name referred to in x inherited from **tab**,\
    \ and the explicitly assigned name in y. Attribute references work through the\
    \ mechanisms of inheritance, and attribute assignments work on the objects to\
    \ which the assignment is done.\n\nThe following is a more involved example of\
    \ creating a class, and then using some methods to manipulate the objects in that\
    \ class. Type the following code into a file named **firstclass.py** using your\
    \ favorite text editor, and save it in the directory that is Thonny’s current\
    \ working directory:\n\n### Example 2.1\n\n```\n#!/usr/bin/python3\nclass Structure:\n\
    \    'Common base class for all Python Structures'\n    StrucCount = 0\n\n   \
    \ def __init__(s, name, number):\n        s.name = name\n        s.number= number\n\
    \        Structure.StrucCount += 1\n\n    def displayCount(s):\n        print\
    \ (\"Total Structures %d\" % Structure.StrucCount)\n\n    def displayStructure(s):\n\
    \        print (\"Name: \", s.name, \", Number: \", s.number)\n```\n\nThen, in\
    \ Thonny, use Way 3 (Import Script mode), which we define more fully below, to\
    \ run **firstclass.py**.\n\nIn the Thonny Shell Area, type the following (you\
    \ can leave out the comments):\n\n```\n>>> import firstclass\n>>> Stru1 = firstclass.Structure(\"\
    Arithmetic Operators\", 17)  #creates the first object\n>>> Stru2 = firstclass.Structure(\"\
    Logical Operators\", 10)  #creates the second object\n>>> Stru1.displayStructure()\n\
    Name: Arithmetic Operators, Number: 17  #displays the first object\n>>> Stru2.displayStructure()\n\
    Name: Logical Operators, Number: 10  #displays the second object\n>>> print (\"\
    Total Structures %d\" % firstclass.Structure.StrucCount)  #prints total structures\n\
    Total Structures 2\n>>> Stru1.inst = 7  #creates a new attribute of Stru1\n>>>\
    \ hasattr(Stru1, 'inst')  #checks object for attribute\nTrue\n>>> getattr(Stru1,\
    \ 'inst') #gets the value of the attribute\n7\n>>> getattr(Stru1, 'name') #gets\
    \ the value of the attribute\n'Arithmetic Operators'\n>>>\n```\n\nThere are three\
    \ important things to notice about this OOP Example:\n\n1. The variable **StrucCount**\
    \ is a class variable whose value is shared among all instances of this class.\
    \ This variable can be accessed as **Structure.StrucCount** from inside the class\
    \ or as **firstclass.Structure.StrucCount** outside the class.\n2. The first class\
    \ method, **__init__**(), is a special method, which is called a *class constructor*\
    \ or *initialization* method. Python3 calls this method when you create a new\
    \ instance of this class.\n3. You declare other class methods like normal Python\
    \ functions, with the exception that the first argument to each method is *s*.\
    \ Python3 adds the *s* argument to the list for you; you do *not* need to include\
    \ it when you call, or invoke the methods.\n\n## 2.3.2 Python3 Program Data Model\n\
    \nFollowing are some statements about the Python3 model of data that might help\
    \ you organize your concepts and thoughts about what the “nuts and bolts” of Python3\
    \ are:\n\n1. Even though Python3 incorporates many of the features of a multi-paradigm\
    \ programming ensemble, its actual, and fundamental basis is the following: Everything\
    \ in the Python3 program can be referred to as an *object*, with the same exact\
    \ meaning of the word *object* used in OOP. These objects have three parts: an\
    \ *identifier*, a *type*, and a *value*.\n\nFor example, when you assign x = 62.25\
    \ interactively in the Python3 interpreter, or in a Python3 module, script file,\
    \ or library of modules, a real number object type is created; it has a value\
