    \ values of all the arguments: $@.\"\necho \"Yet another way is: $?\"\nexit 0\n\
    ```\n\n### Python 代码\n\n```\n#!/usr/bin/python3\nimport sys\nx = (sys.argv)\n\
    print (\"The command name is: \", sys.argv[0])\nprint (\"The value of the command\
    \ line arguments are: \", x[1:10])\nprint (\"Another way to display values of\
    \ all the arguments: \", sys.argv[1:])\nprint (\"Yet another way is: \", sys.argv[slice(1,15)])\n\
    sys.exit ()\n```\n\n在我们的 Raspberry Pi 系统上，使用默认的 Bash shell 和 Python 3.9.2，我们运行了示例\
    \ 2.28 的 Bash 脚本代码及其 Python3 等效代码（使用方式 4 [Bash 模式]）。我们将 Bash 版本命名为 **ex28.bash**，Python3\
    \ 等效文件命名为 **ex28.py**。我们获得了以下输出，其中显示了参数列表（记得在运行这些命令之前使用 **chmod u+x** 命令使 Bash\
    \ 脚本文件及其 Python 等效文件可执行！）：\n\n```\n$ ./ex28.bash a b c d e f g h i j k l m n\n\
    The command name is: ./ex28.bash.\nThe value of the command line arguments are:\
    \ a b c d e f g h i.\nAnother way to display values of all the arguments: a b\
    \ c d e f g h i j k l m n.\nYet another way is: a b c d e f g h i j k l m n.\n\
    $\n```\n\n```\n$ ./ex28.py a b c d e f g h i j k l m n\nThe command name is: ./ex28.py.\n\
    The value of the command line arguments are: ['a', 'b', 'c', 'd', 'e', 'f', 'g',\
    \ 'h', 'i']\nAnother way to display values of all the arguments: ['a', 'b', 'c',\
    \ 'd', 'e', 'f', 'g', 'h', 'i', 'j', 'k', 'l', 'm', 'n']\nYet another way is:\
    \ ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h', 'i', 'j', 'k', 'l', 'm', 'n']\n$\n\
    ```\n\n与 Bash shell 在语法和结构上相似，Tcsh shell 具有可以轻松在 Python3 中实现的功能。以下是一个 Tcsh 脚本文件，其语法结构和程序功能被转换为一个\
    \ Python3 脚本文件，你应该使用方式 4（Bash 模式）运行它，类似于本节中的上述示例：\n\n## 示例 2.29\n\n### Tcsh shell\
    \ 代码\n\n```\n#!/bin/tcsh\nif (($#argv == 0) || ($#argv > 1)) then\n    echo \"\
    Usage: $0 ordinary_file\"\n    exit 1\nendif\nif (-f $1) then\n    set filename\
    \ = $argv[1]\n    set fileinfo = `ls -il $filename`\n    set inode = $fileinfo[1]\n\
    \    set size = $fileinfo[6]\n    echo \"File Name:   $filename\"\n    echo \"\
    Inode Number:  $inode\"\n    echo \"Size (bytes):  $size\"\n    exit 0\nelse\n\
    \    echo \"$0: argument must be an ordinary file\"\n    exit 1\nendif\n```\n\n\
    ### Python 代码\n\n```\n#!/usr/bin/python3\nimport os\nimport sys\nif len(sys.argv)\
    \ == 1 or len(sys.argv) > 2: #check for no/too many args\n    print (\"Usage:\
    \ \", sys.argv[0], \" ordinary file\")\n    sys.exit(1)\nif os.path.isfile(sys.argv[1]):\
    \ #bingo, get stats\n    filename = sys.argv[1]\n    fileinfo = os.stat(filename)\n\
    \    print (\"Filename inode size\")\n    print (\" \")\n    print (filename,\
    \ fileinfo.st_ino, fileinfo.st_size)\n    sys.exit(0)\nelse:                 \
    \   # argument must something else!\n    print (sys.argv[1], \" argument must\
    \ be an ordinary file\")\n    sys.exit(1)\n```\n\n在我们的 Raspberry Pi 系统上，我们使用方式\
    \ 4（Bash 模式）运行了等效的 Python3 代码。我们将 Python3 等效文件命名为 ex29.py。我们获得了以下输出，其中当前工作目录中有一个名为\
    \ ex29.py 的文件，但*没有*名为 **lab1** 的文件（记得使用 **chmod u+x** 命令使 Bash 脚本文件及其 Python 等效文件可执行！）：\n\
    \n```\n$ chmod u+x ex29.py\n$ ./ex29.py\nUsage: ./ex29.py ordinary file\n$ ./ex29.py\
    \ lab1\nlab1 argument must be an ordinary file\n$ ./ex29.py ex29.py\nFilename\
    \ inode size\n\nex29.py 12452180 572\n$\n```\n\n## 2.5.2 基本 Web 服务器和用户文件维护\n\n\
    在你的 Raspberry Pi 系统上使用内置 Python3 功能的一个非常有用且实际的例子是 **http.server** 模块，它随 Python3\
    \ 标准提供。使用此模块的价值，至少对于 Raspberry Pi 系统的普通用户来说，在于你可以快速轻松地实现一个可以由该普通用户编程、配置和控制的系统服务。\n\
    \n普通用户与 Raspberry Pi 系统交互的另一个非常有用且重要的方面，我们在第 2.3.2.2 节中介绍过，就是你可以有效地维护系统上的文件。Python3\
    \ 标准库以及许多用户编写的库和模块可以帮助你在 Raspberry Pi OS 上高效地完成此任务。你可以利用 Python3 广泛的语法和多范式编程能力，远远超越任何\
    \ shell 脚本创建程序中可用的操作系统和文件维护功能。\n\n用户文件维护包括在你的系统上、你自己的账户中或为整个系统及其用户全局地创建、保存、组织和删除文件。\n\
    \n### 2.5.2.1 Web 服务器示例\n\n在本节中，我们向普通用户展示如何使用内置的 Python3 模块创建和使用 Web 服务器。\n\n\
    ## 示例 2.30\n\n一个用 Python3 实现的简单 Web 服务器。\n\nPython3 自带的 SimpleHTTPServer 模块是一个简单的\
    \ HTTP 服务器，提供标准的 GET 和 HEAD 请求处理程序。使用 Python3 内置 HTTP 服务器的一个优点是，你不必安装"
