    \n## In-Chapter Exercise\n\n26. In light of what we have said about updating and\
    \ upgrading your Raspberry Pi system, list applications that you want to install,\
    \ given the use case(s) you undertake on your system. Then, as you go through\
    \ the rest of this section, use the APT package manager to install these.\n\n\
    The best way for you to get more basic help on the package management commands\
    \ we show in this section is to read the man pages available for them on your\
    \ system.\n\n## 1.13.1 Preliminary Storage Model Suggestions\n\nWe previously\
    \ provided an ordinary user with a suggested storage model, where the operating\
    \ system is on a single medium (which we call the “boot/system disk”), and the\
    \ user data is on one or more other media. One of the most useful and practical\
    \ advantages this model gives an ordinary user is the ability to add or update\
    \ software applications, and upgrade the operating system itself in a very reliable\
    \ and time-efficient way. The software applications and operating system, since\
    \ they exist on the boot/system disk, can be incrementally updated or upgraded\
    \ independently of the user data. So, for example, if you want to go from an earlier\
    \ major release of the operating system to the latest release, you can detach\
    \ and unmount the user data media, do a clean install of the new release onto\
    \ the old, or even new, boot/system disk, and then simply reattach the user data\
    \ to it. We have found that this storage model, and this method of update/upgrade\
    \ is safest and most reliable, even for an ordinary user, i.e. it doesn’t break\
    \ the system, and lose user data.\n\nIf you choose to keep the older major release\
    \ of the operating system, and just want to incrementally update software and\
    \ upgrade the operating system, the sections below will give you a basic overview\
    \ of how to do that.\n\nThere is a very wide selection of software programs available\
    \ via the use of the facilities we show here. These programs are found in software\
    \ archives known as “repositories”. The repositories contain collections of “packages”,\
    \ and each package contains bundled-together software and dependencies that can\
    \ all be automatically installed together. When downloaded and installed on your\
    \ system by package management facilities such as APT or Snap (the two package\
    \ management systems we mentioned earlier), that software becomes available to\
    \ a user without the need to do anything else.\n\n### 1.13.1.1 Default Repositories\n\
    \nThe default repositories for Raspberry Pi OS are usually specified in the file\
    \ /etc/apt/sources.list. This file contains a list of package repositories that\
    \ are used by the APT package manager to install and update software.\nBy default,\
    \ the Raspberry Pi OS sources.list file on our Raspberry Pi400, at the time this\
    \ book was written, contained the following lines:\n\n```\ndeb http://deb.debian.org/debian\
    \ bullseye main contrib non-free\ndeb http://security.debian.org/debian-security\
    \ bullseye-security main contrib non-free\ndeb http://deb.debian.org/debian bullseye-updates\
    \ main contrib non-free\n# Uncomment deb-src lines below then 'apt-get update'\
    \ to enable 'apt-get source'\n#deb-src http://deb.debian.org/debian bullseye main\
    \ contrib non-free\n#deb-src http://security.debian.org/debian-security bullseye-security\
    \ main contrib non-free\n#deb-src http://deb.debian.org/debian bullseye-updates\
    \ main contrib non-free\n```\n\nIn the above example listing, the repository URL\
    \ is specified as http://deb.debian.org/debian*. This URL points to the official\
    \ Raspberry Pi OS repository server.\nThe repositories are divided into three\
    \ components:\n\n- **main:** This component contains the core software packages\
    \ officially supported by the Raspberry Pi OS team.\n- **contrib:** This component\
    \ contains packages that are not part of the core distribution but are still provided\
    \ by the Raspberry Pi OS team. These packages depend on software from the main\
    \ component.\n- **non-free:** This component contains packages that are not free\
    \ software and may have licensing restrictions. These packages depend on software\
    \ from the main component.\n\n> ***Note***\n> The contents of the sources.list\
    \ file may change with updates to Raspberry Pi OS, so it's always a good idea\
    \ to check the file on your specific installation, or consult the official Raspberry\
    \ Pi OS documentation for the most up-to-date information.\n\nFor software that\
    \ provides a system service, such as sshd, or a web server like nginx, the package\
    \ manager not only downloads and installs all necessary components and their dependencies,\
    \ but also uses systemd facilities to start the service, and ensure it automatically\
    \ starts at every subsequent system boot.\n\n## In-Chapter Exercise\n\n27. Determine\
    \ exactly how your Raspberry Pi system deploys a storage model. For example, what\
    \ are the paths to a user’s home directory? How is the file system structure segregated\
    \ on the storage media, if it is? How is this different from the storage model\
    \ we suggest? How can you migrate the storage model that now exists on your Raspberry\
    \ Pi system, so that it conforms to our suggested model?\n\n## 1.13.2 Using the\
    \ Advanced Packaging Tool (APT)\n\nFor beginners, a CUI approach to package management\
    \ at first might not seem to be the quickest and easiest way to accomplish one\
    \ of the most significant post-installation tasks a system administrator must\
    \ do. GUI approaches have some tremendous advantages, and not only in terms of\
    \ saving time. But we feel the explicit control you get by using APT, on the command\
    \ line, outweighs the initial advantages of a GUI. Of all of the tools available\
    \ for APT, the **apt-get** command is the most useful for a beginner.\n\n### 1.13.2.1\
    \ Using apt-get\n\nThe Advanced Packaging Tool (APT) is used for all aspects of\
    \ managing packages. The most used (and useful) of its package management utilities\
    \ is the CUI **apt-get** tool. Following is an abbreviated man page description\
    \ of **apt-get**, taken from the man page for it on our Raspberry Pi system:\n\
    \n```\napt-get - APT package handling utility – CUI version\n\nSyntax:\napt-get\
    \ [-asqdyfmubV] [-o=config_string] [-c=config_file]\n        [-t=target_release]\
    \ [-a=architecture] {update | upgrade |\n        dselect-upgrade | dist-upgrade\
    \ |\n        install pkg [{=pkg_version_number | /target_release}]... |\n    \
    \    remove pkg... | purge pkg... |\n        source pkg [{=pkg_version_number\
    \ | /target_release}]... |\n        build-dep pkg [{=pkg_version_number | /target_release}]...\
    \ |\n        download pkg [{=pkg_version_number | /target_release}]... |\n   \
    \     check | clean | autoclean | autoremove | {-v | --version} |\n        {-h\
    \ | --help}}\n\nPurpose:  apt-get is the command-line tool for handling packages,\
    \ and may\n          be considered the user's \"back-end\" to other tools using\
    \ the APT\n          library. Several \"front-end\" interfaces exist.\nOutput:\
    \   Added, removed, or updated software packages on the system.\n```"
  mdcn: "树莓派操作系统上的默认软件包管理器。APT可以在基于文本的命令行界面环境中非常高效地使用。本书正是采用这种方式进行讲解。这并不妨碍使用图形界面的软件包管理器前端，这些前端可以通过树莓派菜单中的“首选项\
    \ > 添加/删除软件”来访问。\n\n此外，我们在本节中还提供了一些关于Snap的信息。Snap软件包管理器是由支持Ubuntu Linux的公司Canonical开发的软件包管理系统。它旨在跨不同的Linux发行版工作，并提供了一种以名为“Snaps”的自包含格式打包和分发软件的方式。\n\
    \nSnaps是容器化的软件包，包含了应用程序运行所需的所有必要依赖项和库，使其更加隔离和安全。它们旨在通过在不同Linux发行版上提供一致的体验来简化软件的安装和更新。\n\
    \n至于树莓派操作系统，Snap软件包管理器*默认未*安装。但是，如果需要，可以在树莓派操作系统上安装Snap。Canonical提供了一个与基于ARM的系统（如树莓派操作系统）兼容的Snap软件包管理器版本。有关在树莓派操作系统上安装Snap的说明，可以在Snapcraft官方网站或社区资源中找到。\n\
    \n可以通过打开终端并输入以下命令，在运行最新版本树莓派操作系统的树莓派上安装Snap。\n\n```\n$ sudo apt update\n$ sudo\
    \ apt install snapd\nOutput truncated...\n$\n```\n\n然后你需要重启系统。\n\n```\n$ sudo\
    \ reboot\n```\n\n接着安装核心snap，以便获取最新的snapd。\n\n```\n$ sudo snap install core\nOutput\
    \ truncated...\ncore 16-2.45.2 from Canonical✓ installed\n$\n```\n\n关于升级操作系统本身，我们在第1.13.4节中展示了一套基本流程，适用于操作系统升级的各种情况。\n\
    \n## 章节内练习\n\n26. 根据我们关于更新和升级树莓派系统的说明，结合你在系统上要执行的用例，列出你想要安装的应用程序。然后，在学习本节剩余内容时，使用APT软件包管理器来安装这些应用。\n\
    \n获取本节所示软件包管理命令更多基础帮助的最佳方式，是阅读你系统上可用的手册页。\n\n## 1.13.1 初步存储模型建议\n\n我们之前为普通用户提供了一个建议的存储模型，其中操作系统位于单个介质上（我们称之为“启动/系统盘”），而用户数据位于一个或多个其他介质上。这个模型给普通用户带来的最实用、最实际的优势之一，就是能够以非常可靠且节省时间的方式添加或更新软件应用程序，以及升级操作系统本身。由于软件应用程序和操作系统存在于启动/系统盘上，它们可以独立于用户数据进行增量更新或升级。因此，例如，如果你想从操作系统的早期主要版本升级到最新版本，你可以分离并卸载用户数据介质，将新版本干净地安装到旧的、甚至新的启动/系统盘上，然后只需重新连接用户数据即可。我们发现，这种存储模型以及这种更新/升级方法即使对普通用户来说也是最安全、最可靠的，即它不会破坏系统或丢失用户数据。\n\
    \n如果你选择保留操作系统的旧主要版本，只想增量更新软件和升级操作系统，以下各节将为你提供如何操作的基本概述。\n\n通过使用我们在此展示的设施，可以获得种类繁多的软件程序。这些程序存在于称为“软件仓库”的软件档案中。软件仓库包含“软件包”的集合，每个软件包都包含捆绑在一起的软件和依赖项，它们可以一起自动安装。当通过软件包管理设施（如APT或Snap——我们之前提到的两个软件包管理系统）下载并安装到你的系统上时，该软件就可以供用户使用，无需进行任何其他操作。\n\
    \n### 1.13.1.1 默认软件仓库\n\n树莓派操作系统的默认软件仓库通常在文件 `/etc/apt/sources.list` 中指定。此文件包含APT软件包管理器用于安装和更新软件的软件包仓库列表。\n\
    默认情况下，在撰写本书时，我们树莓派400上的树莓派操作系统 sources.list 文件包含以下行：\n\n```\ndeb http://deb.debian.org/debian\
    \ bullseye main contrib non-free\ndeb http://security.debian.org/debian-security\
    \ bullseye-security main contrib non-free\ndeb http://deb.debian.org/debian bullseye-updates\
    \ main contrib non-free\n# Uncomment deb-src lines below then 'apt-get update'\
    \ to enable 'apt-get source'\n#deb-src http://deb.debian.org/debian bullseye main\
    \ contrib non-free\n#deb-src http://security.debian.org/debian-security bullseye-security\
    \ main contrib non-free\n#deb-src http://deb.debian.org/debian bullseye-updates\
    \ main contrib non-free\n```\n\n在上面的示例列表中，软件仓库URL指定为 `http://deb.debian.org/debian*`。此URL指向官方的树莓派操作系统软件仓库服务器。\n\
    软件仓库分为三个组件：\n\n- **main:** 此组件包含树莓派操作系统团队官方支持的核心软件包。\n- **contrib:** 此组件包含不属于核心发行版但仍由树莓派操作系统团队提供的软件包。这些软件包依赖于main组件中的软件。\n\
    - **non-free:** 此组件包含非自由软件且可能有许可限制的软件包。这些软件包依赖于main组件中的软件。\n\n> ***注意***\n> sources.list\
    \ 文件的内容可能会随着树莓派操作系统的更新而变化，因此最好检查你特定安装上的文件，或查阅官方的树莓派操作系统文档以获取最新信息。\n\n对于提供系统服务的软件，如\
    \ sshd，或像 nginx 这样的Web服务器，软件包管理器不仅会下载并安装所有必要的组件及其依赖项，还会使用 systemd 功能来启动服务，并确保它在每次后续系统启动时自动启动。\n\
    \n## 章节内练习\n\n27. 确定你的树莓派系统具体如何部署存储模型。例如，用户主目录的路径是什么？存储介质上的文件系统结构是如何划分的（如果划分了的话）？这与我们建议的存储模型有何不同？你如何迁移当前存在于树莓派系统上的存储模型，使其符合我们建议的模型？\n\
    \n## 1.13.2 使用高级软件包工具 (APT)\n\n对于初学者来说，使用命令行界面进行软件包管理最初可能看起来不是完成系统管理员必须执行的最重要安装后任务之一的最快、最简单的方式。图形界面方法有一些巨大的优势，不仅在于节省时间。但我们认为，通过在命令行上使用APT所获得的明确控制，超过了图形界面的初始优势。在所有可用的APT工具中，**apt-get**\
    \ 命令对初学者最有用。\n\n### 1.13.2.1 使用 apt-get\n\n高级软件包工具 (APT) 用于管理软件包的各个方面。其最常用（也最有用）的软件包管理实用程序是命令行界面的\
    \ **apt-get** 工具。以下是取自我们树莓派系统上其手册页的 **apt-get** 的简要描述：\n\n```\napt-get - APT package\
    \ handling utility – CUI version\n\nSyntax:\napt-get [-asqdyfmubV] [-o=config_string]\
    \ [-c=config_file]\n        [-t=target_release] [-a=architecture] {update | upgrade\
    \ |\n        dselect-upgrade | dist-upgrade |\n        install pkg [{=pkg_version_number\
    \ | /target_release}]... |\n        remove pkg... | purge pkg... |\n        source\
    \ pkg [{=pkg_version_number | /target_release}]... |\n        build-dep pkg [{=pkg_version_number\
    \ | /target_release}]... |\n        download pkg [{=pkg_version_number | /target_release}]...\
    \ |\n        check | clean | autoclean | autoremove | {-v | --version} |\n   \
    \     {-h | --help}}\n\nPurpose:  apt-get is the command-line tool for handling\
    \ packages, and may\n          be considered the user's \"back-end\" to other\
    \ tools using the APT\n          library. Several \"front-end\" interfaces exist.\n\
    Output:   Added, removed, or updated software packages on the system.\n```"
