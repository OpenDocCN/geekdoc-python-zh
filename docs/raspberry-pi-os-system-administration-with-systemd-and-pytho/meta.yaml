    >>>next(x)

    2

    >>>next(x)

    3

    >>>next(x)

    ''ijk''

    >>>next(x)

    ''deff''

    >>>next(x)

    ''abc''

    >>>next(x)

    Traceback(most recent call last)

    File "<stdin>", line 1, in <module>

    StopIteration

    >>>

    ```


    In the previous section, we introduced the advanced programming technique of using
    generator functions, which use **yield** to give output results. Python3 generator
    functions can also “consume” results using a **yield** statement. In addition,
    two new methods applied to generator objects, **send()** and **close()**, create
    a “framework” for objects, that consume and produce values. Generator functions
    that define these objects are called *coroutines*. Coroutines consume values using
    a **yield** statement on the right side of an expression, as follows:


    ```

    value = (yield)

    ```


    Using this syntax, execution pauses at this here until the object’s **send** method
    is invoked with an argument:'
