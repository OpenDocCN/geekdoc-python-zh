  - '[PAGE 111]


    devices, and to practice using ZFS on an existing file system instead of deploying
    ZFS on actual physical media, we will create and manipulate files with the important
    ZFS commands.


    Also, if you do not have attached USB3 media, you can do this example to gain
    an appreciation of what ZFS is.


    In case you want to use real disks mounted and partitioned in this preliminary
    introductory example, make a note of the full path to their device names (e.g.
    /dev/sdb1). You will be destroying all the partition information and data on these
    disks, so be sure they’re not needed!


    > ***Note*** If you make a mistake anywhere along the way, you can always start
    over by executing the cleanup steps shown at the end of the example and begin
    again.


    Prerequisites: Installation of ZFS on an Ubuntu system running on your Raspberry
    Pi hardware, as shown in Section 1.9.1.


    Procedures: Follow the steps in the order shown to complete this example.


    +   1. Become root, and then create four 128 MB files as follows (the files must
    be a minimum of 64 MB in size):


    ```

    $ sudo -i


    root@bob-desktop:~#

    root@bob-desktop:~# truncate --size 128m /home/bob/disk1

    root@bob-desktop:~# truncate --size 128m /home/bob/disk2

    root@bob-desktop:~# truncate --size 128m /home/bob/disk3

    root@bob-desktop:~# truncate --size 128m /home/bob/disk4

    ```


    Check the /home/bob directory with the following command:


    ```

    root@bob-desktop:~# ls -lh /home/bob

    total 48K

    ...

    -rw-r--r-- 1 root root 128M May 22 18:47 disk1

    -rw-r--r-- 1 root root 128M May 22 18:47 disk2

    -rw-r--r-- 1 root root 128M May 22 18:47 disk3

    -rw-r--r-- 1 root root 128M May 22 18:48 disk4

    Output truncated...

    ```


    In this example, we initially create and use files to *simulate* disks on an already
    existing file system, and we named them **disk1**, **disk2**, **disk3**, and **disk4**
    to enhance that illusion. Also, it is assumed in the example code that the current
    working directory is **/home/bob** unless otherwise noted.'
  - '[PAGE 112]


    2. Before creating new pools you should check for existing pools, if there are
    any, to avoid confusing them with the example pools we create here. You can check
    what pools exist with the **zpool list** command:


    ```

    root@bob-desktop:~# **zpool list**

    no pools available

    root@bob-desktop:~#

    ```


    3. Pools are created using **zpool create**. We can create a single disk pool
    using a file as follows (you must use the absolute path to the file), and check
    the zpools that now exist:


    ```

    root@bob-desktop:~# **zpool create data /home/bob/disk1**

    root@bob-desktop:~# **zpool list**

    NAME   SIZE  ALLOC   FREE  CKPOINT  EXPANDSZ  FRAG  CAP  DEDUP  HEALTH  ALTROOT

    data   112M   106K   112M        -         -    2%    -   1.00x  ONLINE  -

    ```


    4. Now we will create an actual file in the new pool, check its size, and get
    a zpool listing of it:


    ```

    root@bob-desktop:~# **truncate --size 32m /data/data20file**

    root@bob-desktop:~# **ls -lh /data/data20file**

    -rw-r--r-- 1 root root 32M May 22 18:54 /data/data20file

    root@bob-desktop:~# **zpool list**

    NAME   SIZE  ALLOC   FREE  CKPOINT  EXPANDSZ  FRAG  CAP  DEDUP  HEALTH  ALTROOT

    data   112M   110K   112M        -         -    2%    -   1.00x  ONLINE  -

    ```


    5. We will now destroy the pool data with zpool destroy, and check on zpools now
    available:


    ```

    root@bob-desktop:~# **zpool destroy data**

    root@bob-desktop:~# **zpool list**

    No pools available

    ```


    6. Creating a Mirrored Pool with Files


    > A pool composed of a single disk doesn''t offer any redundancy! One way of providing
    protection against physical disk failure is to use a mirrored pair of disks in
    a pool:


    ```

    root@bob-desktop:~# **zpool create data2 mirror /home/bob/disk1 / \nhome/bob/disk2**

    root@bob-desktop:~# **zpool list**

    ```'
  - '[PAGE 113]


    NAME SIZE ALLOC FREE CKPOINT EXPANDSZ FRAG CAP DEDUP HEALTH ALTROOT

    data2 112M 105K 112M - - 2% 0% 1.00x ONLINE -


    7. To get more information about the pool **data2**, we use **zpool status**:


    ```

    root@bob-desktop:~# **zpool status data2**

    pool: data2

    state: ONLINE

    config:


    NAME STATE READ WRITE CKSUM

    data2 ONLINE 0 0 0

    mirror-0 ONLINE 0 0 0

    /home/bob/disk1 ONLINE 0 0 0

    /home/bob/disk2 ONLINE 0 0 0

    errors: No known data errors

    ```


    8. Create a file in the **data2** pool.


    ```

    root@bob-desktop:~# **truncate --size 32m /data2/data2file**

    ```


    Note the change in the pool after we have added a file to it, using the following
    command:


    ```

    root@bob-desktop:~# **zpool list**

    NAME SIZE ALLOC FREE CKPOINT EXPANDSZ FRAG CAP DEDUP HEALTH ALTROOT

    data2 112M 154K 112M - - 4% 0% 1.00x ONLINE -

    ```


    A fraction of the disk has been used, but more importantly the data is now stored
    redundantly over two disks.


    9. Let’s test that redundancy by overwriting the first “disk” label with random
    data. If you are using real media, like a thumb drive, you could physically remove
    it from the computer to achieve this next operation.


    ```

    root@bob-desktop:~# **dd if=/dev/random of=/home/bob/disk1 bs=\512 count=1**

    1+0 records in

    1+0 records out

    512 bytes copied, 0.00143395 s, 357 kB/s

    ```'
  - "[PAGE 114]\n\n10. ZFS automatically checks for errors when it reads/writes files,\
    \ but we can force a check with the **zfs scrub** command.\n\n```\nroot@bob-desktop:~#\
    \ **zpool scrub data2**\n```\n\n11. Let's check the status of the pool:\n\n```\n\
    root@bob-desktop:~# **zpool status**\npool: data2\nstate: DEGRADED\nstatus: One\
    \ or more devices could not be used because the label is missing or invalid. Sufficient\
    \ replicas exist for the pool to continue functioning in a degraded state.\naction:\
    \ Replace the device using 'zpool replace'.\nsee: https://openzfs.github.io/openzfs-docs/msg/ZFS-8000-4J\n\
    scan: scrub repaired 0B in 00:00:01 with 0 errors on Tue May 23 05:56:49 2023\n\
    config:\n\nNAME                     STATE     READ WRITE CKSUM\ndata2        \
    \            DEGRADED     0     0     0\n  mirror-0               DEGRADED   \
    \  0     0     0\n    /home/bob/disk1      UNAVAIL      0     0     0  corrupted\
    \ data\n    /home/bob/disk2      ONLINE       0     0     0\n\nerrors: No known\
    \ data errors\n```\n\n12. The disk we used the **dd** command on is showing as\
    \ UNAVAIL (unavailable) with corrupted data, but no data errors are reported for\
    \ the pool as a whole, and we can still read and write to the pool as follows:\n\
    \n```\nroot@bob-desktop:~# **truncate --size 32m /data2/data2file2**\nroot@bob-desktop:~#\
    \ **ls -l /data2/**\ntotal 1\n-rw-r--r-- 1 root root 33554432 May 23 05:52 data2file\n\
    -rw-r--r-- 1 root root 33554432 May 23 06:01 data2file2\n```\n\n13. To maintain\
    \ redundancy we should replace the broken disk with another. If you are using\
    \ real media, you can use the **zpool replace** command (the zpool man page provides\
    \ details of this command). However, in this file-based example we simply remove\
    \ the disk file from the mirror and recreate it."
  - "[PAGE 115]\n\nDevices can be detached with the **zpool detach** command, as follows:\n\
    \n```\nroot@bob-desktop:~# **zpool detach data2 /home/bob/disk1**\n```\n\n14.\
    \ Let's check the status of the pool:\n\n```\nroot@bob-desktop:~# **zpool status\
    \ data2**\npool: data2\nstate: ONLINE\nscan: scrub repaired 0B in 00:00:01 with\
    \ 0 errors on Tue May 23 05:56:49 2023\nconfig:\n\nNAME                     STATE\
    \     READ WRITE CKSUM\ndata2                    ONLINE       0     0     0\n\
    \  /home/bob/disk2        ONLINE       0     0     0\n\nerrors: No known data\
    \ errors\n```\n\n15. Let's remove the disk, and then try to replace it, to simulate\
    \ a failure:\n\n```\nroot@bob-desktop:~# **rm /home/bob/disk1**\nroot@bob-desktop:~#\
    \ **truncate --size 128m /home/bob/disk1**\n```\n\n16. In order to replace it\
    \ in the mirror, we need to do the following. To attach another device we specify\
    \ an existing device in the mirror to attach it to with **zpool attach**:\n\n\
    ```\nroot@bob-desktop:~# **zpool attach data2 /home/bob/disk2 /home/bob/disk1**\n\
    ```\n\n17. Check the status of the pool:\n\n```\nroot@bob-desktop:~# **zpool status\
    \ data2**\npool: data2\nstate: ONLINE\nscan: resilvered 206K in 00:00:00 with\
    \ 0 errors on Tue May 23 06:23:02 2023\nconfig:\n\nNAME                     STATE\
    \     READ WRITE CKSUM\ndata2                    ONLINE       0     0     0\n\
    \  mirror-0               ONLINE       0     0     0\n    /home/bob/disk2    \
    \  ONLINE       0     0     0\n    /home/bob/disk1      ONLINE       0     0 \
    \    0\n\nerrors: No known data errors\n```"
- md: "## 18. Adding to a Mirrored Pool\n\nA very critical systems administration\
    \ procedure accomplished by ZFS is to add media to a pool *without taking it offline*.\
    \ Let's double the size of our **data2** pool:\n\n```\nroot@bob-desktop:~# zpool\
    \ list\n\nNAME    SIZE  ALLOC   FREE  CKPOINT  EXPANDSZ   FRAG  CAP  DEDUP  HEALTH\
    \  ALTROOT\ndata2   112M   126K   112M        -         -     5%    0%  1.00x\
    \  ONLINE  -\n```\n\n## 19. We can use the **zpool add** command to add disks\
    \ to the existing pool.\n\n```\nroot@bob-desktop:~# zpool add data2 mirror /home/bob/disk3\
    \ /home/bob/disk4\nroot@bob-desktop:~# zpool list\n\nNAME    SIZE  ALLOC   FREE\
    \  CKPOINT  EXPANDSZ   FRAG  CAP  DEDUP  HEALTH  ALTROOT\ndata2   224M   184K\
    \   224M        -         -     2%    0%  1.00x  ONLINE  -\n```\n\n## 20. The\
    \ file systems within the pool are always available. If we look at the status\
    \ now, it shows the pool consists of two mirrors:\n\n```\nroot@bob-desktop:~#\
    \ zpool status data2\n  pool: data2\n state: ONLINE\n  scan: resilvered 206K in\
    \ 00:00:00 with 0 errors on Tue May 23 06:23:02 2023\nconfig:\n\n\tNAME      \
    \        STATE     READ WRITE CKSUM\n\tdata2             ONLINE       0     0\
    \     0\n\t  mirror-0        ONLINE       0     0     0\n\t    /home/bob/disk2\
    \  ONLINE       0     0     0\n\t    /home/bob/disk1  ONLINE       0     0   \
    \  0\n\t  mirror-1        ONLINE       0     0     0\n\t    /home/bob/disk3  ONLINE\
    \       0     0     0\n\t    /home/bob/disk4  ONLINE       0     0     0\n\nerrors:\
    \ No known data errors\n```\n\n21. We can see where the data is currently written\
    \ in our pool using the **zpool iostat -v** command:\n\n```\nroot@bob-desktop:~#\
    \ zpool iostat -v data2\n                     capacity     operations     bandwidth\n\
    pool        alloc   free   read  write   read  write\n----------  -----  -----\
    \  -----  -----  -----  -----\ndata2        141K  224M      0      0     23  \
    \  360\nmirror-0     127K  112M      0      2  1.54K  16.8K\n  /home/bob/disk2\
    \    -      -      0      0     21    151\n  /home/bob/disk1    -      -     \
    \ 0      1     41  6.27K\nmirror-1     14K   112M      0    152  14.9K      -\n\
    \  /home/bob/disk3    -      -      0      0     76  7.47K\n  /home/bob/disk4\
    \    -      -      0      0     76  7.47K\n----------  -----  -----  -----  -----\
    \  -----  -----\n```\n\n22. All the data is currently written on the first mirror\
    \ pair and none on the second. This is logical, since the second pair of disks\
    \ was added after the data was written. If we write some new data to the pool,\
    \ the new mirror will be used:\n\n```\nroot@bob-desktop:~# truncate --size 64m\
    \ /data2/data2file3\nroot@bob-desktop:~# zpool iostat -v data2\n             \
    \        capacity     operations     bandwidth\npool        alloc   free   read\
    \  write   read  write\n----------  -----  -----  -----  -----  -----  -----\n\
    data2        142K  224M      0      0     23    363\nmirror-0     119K  112M \
    \     0      2  1.28K  14.1K\n  /home/bob/disk2    -      -      0      0    \
    \ 21    152\n  /home/bob/disk1    -      -      0      0     34  5.29K\nmirror-1\
    \      23K  112M      0      0    111  11.1K\n  /home/bob/disk3    -      -  \
    \    0      0     55  5.53K\n  /home/bob/disk4    -      -      0      0     55\
    \  5.53K\n----------  -----  -----  -----  -----  -----  -----\n```\n\n23. We\
    \ see how a little more of the data has been written to the new mirror than to\
    \ the old: ZFS tries to make the best use of all the resources in the pool. Now\
    \ do these In-Chapter Exercises, and then continue onto the final “cleanup” steps.\n\
    \n## In-Chapter Exercises\n\n15. If you have not already done so, execute all\
    \ of the steps of Example 1.7 using proper commands and pathnames.\n\n16. In Example\
    \ 1.7, step 4, what is the pathname to **datafile20**?\n\n17. If you were to use\
    \ a text editor like emacs to create a text file named **text1.txt** in the file\
    \ system named **data**, how would you designate the complete pathname to that\
    \ text file?\n\n18. In Example 1.7, after step 6 was executed correctly, and you\
    \ created a text file with emacs in the **data2** file system, would the pathnames\
    \ to the two mirrored versions of that text file be different? In other words,\
    \ could you edit each one of them separately by designating different pathnames\
    \ to them?\n\n19. In Example 1.7, step 19, could you add a single disk into the\
    \ mirrored **data2** zpool, instead of the two disks specified?\n\n20. In Example\
    \ 1.7, step 20, are the mirrors named **mirror-0** and **mirror-1** mirrors of\
    \ each other?\n\n24. To clean up after doing our work, let's delete everything\
    \ we created in this example.\n\nFrom the root directory, destroy the **data2**\
    \ file system and its files.\n\n```\nroot@bob-desktop:~# zfs destroy -r data2\n\
    ```\n\n25. Next, destroy the **data2** zpool.\n\n```\nroot@bob-desktop:~# zpool\
    \ destroy data2\n```\n\n26. Finally, destroy the disk simulation files, and leave\
    \ root.\n\n```\nroot@bob-desktop:~# rm /home/bob/disk*\nroot@bob-desktop:~# exit\n\
    logout\n$\n```\n\nConclusion: We can use the **zpool** command and its **create**\
    \ sub-command to associate or map file systems to vdevs, whether the vdev is a\
    \ file itself or a disk drive.\n\n## Example 1.8: Creating a ZFS Pool on a USB\
    \ thumb drive\n\nObjectives: To create a zpool, and a ZFS dataset in that pool,\
    \ on a USB thumb drive mounted to an Ubuntu system running on your Raspberry Pi\
    \ hardware.\n\nIntroduction:\n\nQuestion: Where would this example be most useful?\n\
    Answer: In preparation for implementing our recommended storage model on a ZFS\
    \ zpool, and because you want to learn the basics of ZFS.\n\nThe following example\
    \ uses the most essential command in ZFS, the **zpool** command, with the sub-command\
    \ **create** applied to a USB thumb drive on an Ubuntu 23.04 system, installed\
    \ on a Raspberry Pi 4B. The real power of ZFS can be harnessed to common, readily\
    \ available hardware vdevs that are available on that system, by an ordinary user.\n\
    \n> ***Note***\n> If the only thing you want to do is use a USB thumb drive to\
    \ transfer files (such as text files, C program source code, LibreOffice documents,\
    \ and so on) to and from the computer, *you do not have to use the procedures\
    \ of this example to accomplish that!*\n> If you make a mistake anywhere along\
    \ the way, you can always start over by executing the cleanup step shown at the\
    \ end of the example, and then simply begin again.\n\nPrerequisites:\n\n- 0. You\
    \ have installed ZFS on an Ubuntu system, as shown in Section 1.9.1, and are using\
    \ that system on Raspberry Pi hardware.\n- 1. That you have an expendable USB\
    \ thumb drive that is usable on that system, and already has only one partition,\
    \ and no data you want to keep on it. More specifically, if the USB thumb drive\
    \ is by default formatted to FAT32 (which most commercially-available thumb drives\
    \ are), then there is a high probability that it will automatically mount and\
    \ show up as an icon on your desktop in the Ubuntu software system. But for us,\
    \ it didn’t. Go figure.\n- 2. That there is no zpool named **test3** already defined\
    \ on the primary partition of the USB thumb drive, and there is no zpool named\
    \ **test3** on your Ubuntu system. To find this out, in a terminal window type\
    \ **zpool list** on the command line, after the USB thumb drive has been inserted\
    \ and auto-mounts.\n- 3. That you can determine the logical device name and the\
    \ full path to the thumb drive using any one of the methods in Section 1.8.4 “Five\
    \ Quick and Easy Ways to Find Out the Logical Device Names of Media”. The full\
    \ path to our USB thumb drive is /dev/sda, and the path to the first partition\
    \ on it is /dev/sda1. This may not be the same designations as the USB thumb drive\
    \ on your system, but you can substitute your logical device designations for\
    \ them.\n- 4. That you have done Examples 1.5 or 1.6, on disk partitioning with\
    \ Gparted or the **fdisk** command.\n\nProcedure: All commands are shown in **bold**\
    \ type, and are typed at the command line, followed by pressing the <Enter> key\
    \ on the keyboard.\n\n- 1. Plug the thumb drive into a USB port on your Ubuntu\
    \ system. If it’s a fat32-formatted USB thumb drive, it should automatically mount\
    \ and appear as an icon on your system desktop. Determine the logical device name\
    \ of the USB thumb drive, as shown in Section 1.8.4. Then, clear any ZFS information\
    \ off the thumb drive using the following command:\n\n> ***Note***\n> On our Ubuntu\
    \ 23.04 system, the thumb drive did *not* automount, therefore we couldn’t unmount\
    \ it, for obvious reasons!\n\n```\n$ sudo zpool labelclear -f /dev/sda1\n$\n```\n\
    \nThis step is necessary because, if for some reason, this thumb drive had been\
    \ used in a ZFS pool before, you need to clear the ZFS meta-data information from\
    \ the thumb drive so that the old ZFS meta-data information does not conflict\
    \ with what we are going to do in this example.\n\n- 2. If it is mounted, unmount\
    \ the thumb drive using the **umount** command:\n\n```\n$ sudo umount /dev/sda1\n\
    $\n```\n\nAt this point, the desktop icon for the USB thumb drive will disappear\
    \ on your system, if the thumb drive automounted!\nIt must still show up in an\
    \ **ls** listing of **/dev** to be useable. If the thumb drive is not recognized\
    \ in **/dev** after the above step has been done, you need to use another thumb\
    \ drive!\n\n- 3. You can now create a zpool named **test3** on the primary partition\
    \ on the thumb drive you worked on in step 2. To create a zpool on the thumb drive,\
    \ use the following command:\n\n```\n$ sudo zpool create -f test3 /dev/sda1\n\
    $\n```\n\nWe included the **-f** option on **zpool create** to force creation\
    \ of a ZFS file system on partition 1 of the thumb drive, effectively eradicating\
    \ whatever file system was on it."
  mdcn: "## 18. 向镜像池中添加设备\n\nZFS 实现的一项非常关键的系统管理操作是*在不离线的情况下*向池中添加介质。让我们将 **data2**\
    \ 池的大小翻倍：\n\n```\nroot@bob-desktop:~# zpool list\n\nNAME    SIZE  ALLOC   FREE\
    \  CKPOINT  EXPANDSZ   FRAG  CAP  DEDUP  HEALTH  ALTROOT\ndata2   112M   126K\
    \   112M        -         -     5%    0%  1.00x  ONLINE  -\n```\n\n## 19. 我们可以使用\
    \ **zpool add** 命令将磁盘添加到现有池中。\n\n```\nroot@bob-desktop:~# zpool add data2 mirror\
    \ /home/bob/disk3 /home/bob/disk4\nroot@bob-desktop:~# zpool list\n\nNAME    SIZE\
    \  ALLOC   FREE  CKPOINT  EXPANDSZ   FRAG  CAP  DEDUP  HEALTH  ALTROOT\ndata2\
    \   224M   184K   224M        -         -     2%    0%  1.00x  ONLINE  -\n```\n\
    \n## 20. 池中的文件系统始终可用。如果我们现在查看状态，它会显示该池由两个镜像组成：\n\n```\nroot@bob-desktop:~# zpool\
    \ status data2\n  pool: data2\n state: ONLINE\n  scan: resilvered 206K in 00:00:00\
    \ with 0 errors on Tue May 23 06:23:02 2023\nconfig:\n\n\tNAME              STATE\
    \     READ WRITE CKSUM\n\tdata2             ONLINE       0     0     0\n\t  mirror-0\
    \        ONLINE       0     0     0\n\t    /home/bob/disk2  ONLINE       0   \
    \  0     0\n\t    /home/bob/disk1  ONLINE       0     0     0\n\t  mirror-1  \
    \      ONLINE       0     0     0\n\t    /home/bob/disk3  ONLINE       0     0\
    \     0\n\t    /home/bob/disk4  ONLINE       0     0     0\n\nerrors: No known\
    \ data errors\n```\n\n21. 我们可以使用 **zpool iostat -v** 命令查看数据当前在池中的写入位置：\n\n```\n\
    root@bob-desktop:~# zpool iostat -v data2\n                     capacity     operations\
    \     bandwidth\npool        alloc   free   read  write   read  write\n----------\
    \  -----  -----  -----  -----  -----  -----\ndata2        141K  224M      0  \
    \    0     23    360\nmirror-0     127K  112M      0      2  1.54K  16.8K\n  /home/bob/disk2\
    \    -      -      0      0     21    151\n  /home/bob/disk1    -      -     \
    \ 0      1     41  6.27K\nmirror-1     14K   112M      0    152  14.9K      -\n\
    \  /home/bob/disk3    -      -      0      0     76  7.47K\n  /home/bob/disk4\
    \    -      -      0      0     76  7.47K\n----------  -----  -----  -----  -----\
    \  -----  -----\n```\n\n22. 目前所有数据都写入在第一个镜像对上，第二个镜像对上没有数据。这是合乎逻辑的，因为第二对磁盘是在数据写入之后才添加的。如果我们向池中写入一些新数据，将会使用新的镜像：\n\
    \n```\nroot@bob-desktop:~# truncate --size 64m /data2/data2file3\nroot@bob-desktop:~#\
    \ zpool iostat -v data2\n                     capacity     operations     bandwidth\n\
    pool        alloc   free   read  write   read  write\n----------  -----  -----\
    \  -----  -----  -----  -----\ndata2        142K  224M      0      0     23  \
    \  363\nmirror-0     119K  112M      0      2  1.28K  14.1K\n  /home/bob/disk2\
    \    -      -      0      0     21    152\n  /home/bob/disk1    -      -     \
    \ 0      0     34  5.29K\nmirror-1      23K  112M      0      0    111  11.1K\n\
    \  /home/bob/disk3    -      -      0      0     55  5.53K\n  /home/bob/disk4\
    \    -      -      0      0     55  5.53K\n----------  -----  -----  -----  -----\
    \  -----  -----\n```\n\n23. 我们看到写入新镜像的数据比旧镜像多了一点：ZFS 会尝试充分利用池中的所有资源。现在完成这些章内练习，然后继续进行最后的“清理”步骤。\n\
    \n## 章内练习\n\n15. 如果你还没有完成，请使用正确的命令和路径名执行示例 1.7 的所有步骤。\n\n16. 在示例 1.7 的步骤 4 中，**datafile20**\
    \ 的路径名是什么？\n\n17. 如果你使用像 emacs 这样的文本编辑器在名为 **data** 的文件系统中创建一个名为 **text1.txt**\
    \ 的文本文件，你将如何指定该文本文件的完整路径名？\n\n18. 在示例 1.7 中，步骤 6 正确执行后，如果你在 **data2** 文件系统中使用\
    \ emacs 创建了一个文本文件，那么该文本文件的两个镜像版本的路径名会不同吗？换句话说，你能否通过为它们指定不同的路径名来分别编辑每一个？\n\n19.\
    \ 在示例 1.7 的步骤 19 中，你能否将单个磁盘添加到镜像的 **data2** zpool 中，而不是指定的两个磁盘？\n\n20. 在示例 1.7\
    \ 的步骤 20 中，名为 **mirror-0** 和 **mirror-1** 的镜像彼此是镜像关系吗？\n\n24. 为了清理我们的工作，让我们删除在此示例中创建的所有内容。\n\
    \n从根目录开始，销毁 **data2** 文件系统及其文件。\n\n```\nroot@bob-desktop:~# zfs destroy -r data2\n\
    ```\n\n25. 接下来，销毁 **data2** zpool。\n\n```\nroot@bob-desktop:~# zpool destroy data2\n\
    ```\n\n26. 最后，销毁磁盘模拟文件，并退出 root。\n\n```\nroot@bob-desktop:~# rm /home/bob/disk*\n\
    root@bob-desktop:~# exit\nlogout\n$\n```\n\n结论：我们可以使用 **zpool** 命令及其 **create**\
    \ 子命令将文件系统关联或映射到 vdev，无论 vdev 是文件本身还是磁盘驱动器。\n\n## 示例 1.8：在 USB 闪存盘上创建 ZFS 池\n\n\
    目标：在你的 Raspberry Pi 硬件上运行的 Ubuntu 系统挂载的 USB 闪存盘上创建一个 zpool，并在该池中创建一个 ZFS 数据集。\n\
    \n简介：\n\n问题：这个示例在哪里最有用？\n答案：在准备在 ZFS zpool 上实施我们推荐的存储模型时，以及你想学习 ZFS 基础知识时。\n\n\
    以下示例使用了 ZFS 中最基本的命令 **zpool**，其子命令 **create** 应用于安装在 Raspberry Pi 4B 上的 Ubuntu\
    \ 23.04 系统中的 USB 闪存盘。ZFS 的真正威力可以通过普通用户利用该系统上可用的常见、易得的硬件 vdev 来实现。\n\n> ***注意***\n\
    > 如果你唯一想做的就是使用 USB 闪存盘在计算机之间传输文件（例如文本文件、C 程序源代码、LibreOffice 文档等），*你不必使用本示例中的步骤来完成！*\n\
    > 如果你在过程中任何地方犯了错误，你总是可以通过执行示例末尾显示的清理步骤来重新开始，然后简单地再次开始。\n\n先决条件：\n\n- 0. 你已在 Ubuntu\
    \ 系统上安装了 ZFS，如第 1.9.1 节所示，并且正在 Raspberry Pi 硬件上使用该系统。\n- 1. 你有一个可消耗的 USB 闪存盘，可在该系统上使用，并且只有一个分区，上面没有你想要保留的数据。更具体地说，如果\
    \ USB 闪存盘默认格式化为 FAT32（大多数市售闪存盘都是如此），那么它很有可能会自动挂载并显示为 Ubuntu 软件系统桌面上的图标。但对我们来说，它没有。真是奇怪。\n\
    - 2. 在 USB 闪存盘的主分区上没有名为 **test3** 的 zpool，并且你的 Ubuntu 系统上也没有名为 **test3** 的 zpool。要找出这一点，请在插入\
    \ USB 闪存盘并自动挂载后，在终端窗口的命令行中输入 **zpool list**。\n- 3. 你可以使用第 1.8.4 节“五种快速简便的方法找出介质的逻辑设备名称”中的任何一种方法来确定闪存盘的逻辑设备名称和完整路径。我们的\
    \ USB 闪存盘的完整路径是 /dev/sda，其第一个分区的路径是 /dev/sda1。这可能与你系统上的 USB 闪存盘的指定不同，但你可以用你的逻辑设备指定来替换它们。\n\
    - 4. 你已完成示例 1.5 或 1.6，关于使用 Gparted 或 **fdisk** 命令进行磁盘分区。\n\n步骤：所有命令均以**粗体**显示，并在命令行中输入，然后按键盘上的\
    \ <Enter> 键。\n\n- 1. 将闪存盘插入 Ubuntu 系统的 USB 端口。如果它是 FAT32 格式的 USB 闪存盘，它应该会自动挂载并显示为系统桌面上的图标。按照第\
    \ 1.8.4 节所示确定 USB 闪存盘的逻辑设备名称。然后，使用以下命令清除闪存盘上的任何 ZFS 信息：\n\n> ***注意***\n> 在我们的\
    \ Ubuntu 23.04 系统上，闪存盘*没有*自动挂载，因此我们无法卸载它，原因显而易见！\n\n```\n$ sudo zpool labelclear\
    \ -f /dev/sda1\n$\n```\n\n此步骤是必要的，因为如果由于某种原因，此闪存盘以前在 ZFS 池中使用过，你需要清除闪存盘上的 ZFS\
    \ 元数据信息，以便旧的 ZFS 元数据信息不会与我们在本示例中将要进行的操作冲突。\n\n- 2. 如果它已挂载，请使用 **umount** 命令卸载闪存盘：\n\
    \n```\n$ sudo umount /dev/sda1\n$\n```\n\n此时，如果闪存盘自动挂载了，那么 USB 闪存盘的桌面图标将从你的系统中消失！\n\
    它必须仍然显示在 **/dev** 的 **ls** 列表中才能可用。如果在上述步骤完成后，闪存盘在 **/dev** 中未被识别，你需要使用另一个闪存盘！\n\
    \n- 3. 你现在可以在步骤 2 中处理的闪存盘的主分区上创建一个名为 **test3** 的 zpool。要在闪存盘上创建 zpool，请使用以下命令：\n\
    \n```\n$ sudo zpool create -f test3 /dev/sda1\n$\n```\n\n我们在 **zpool create**\
    \ 中包含了 **-f** 选项，以强制在闪存盘的分区 1 上创建 ZFS 文件系统，从而有效地清除其上的任何文件系统。"
