    传统上，系统进程活动最重要、最完整且最易获取的显示方式是通过 **ps** 和 **top**（或 **htop**）命令，它们允许你监控正在运行的进程。


    ## 1.14.1.2 systemd Cgroups，影响 CPU 调度的限制


    随着 systemd 被纳入所有主要 Linux 分支（包括 Debian 及其下游发行版 Raspberry Pi OS）的 Linux 内核，许多新功能和更新功能被引入。例如，这些功能彻底改变了系统启动的启动阶段。但最重要的是，它们从根本上改变了系统和应用程序服务（如
    sshd），甚至普通用户空间进程的管理方式。其中一个经过彻底修改和更新的功能，称为控制组（cgroups），在服务和进程/线程管理方面进行了完全重组。进程和线程，以及系统服务，以统一的方式分组在一起。这将系统资源管理（例如，进程、线程或服务分配到的
    CPU 时间百分比）从进程级别提升到应用程序级别。这是通过将 cgroup 结构映射到 systemd “单元树”来实现的。我们在本节中概述 systemd
    cgroups 对进程和线程通过 CPU 进行性能调度的影响。在下一节中，我们将重点介绍 cgroups 如何影响内存管理以影响系统性能。


    cgroups 是一种用于在分层树或“单元树”中组织服务和进程/线程的机制，该树由编号的组构成，以方便资源管理。该树的结构使用 **systemd-cgls**
    命令进行图形化说明。我们展示了如何使用 **systemd-cgls** 命令来查看和评估 cgroups 结构。然后，对这些编号的组进行控制，以影响 CPU
    使用率、内存管理、网络带宽和其他系统服务相关活动等资源。这种控制可以使用 **systemd-run** 命令在临时或临时基础上进行。或者，可以通过对所有永久性、启动时启动的服务都具有的
    systemd 单元文件进行关键更改，在持久性或永久性基础上进行。我们在本节中围绕这两个基础来组织我们的介绍。


    在 Linux 内核中引入 cgroups 和 systemd 之前，所有进程接收到的系统资源量相似，管理员可以通过进程 *nice* 值来修改这些资源以增强性能（根据系统设计运行的用例）。这种传统方法的缺点是，对于像
    Web 服务器或数据库管理程序这样的应用程序，它们可能同时运行大量子进程或线程，但没有足够的机制来为这些任务组提供优先级。另一个更关键、更关键的任务或任务集，但子任务数量要少得多，必须与
    Web 服务器或数据库管理程序平等地共享资源。


    systemd cgroups 相比传统方法具有巨大优势。例如，使用 systemd cgroups，nginx Web 服务器启动的所有进程都将拥有自己的
    cgroup 编号。这允许你在应用程序级别使用 systemd **systemctl** 命令控制 nginx 及其所有“工作子进程”。我们在第 1 卷第
    2 章中详细介绍了 **systemctl** 命令。


    我们在第 1 卷第 2 章第 2.7.1 节中更深入地解释了分层 cgroups 单元树。在该节中，我们还展示了 **systemd-cgls** 命令的实用性，以及它如何以易于阅读的图形树格式描述
    Raspberry Pi 系统上所有 cgroups 及其分层结构。


    这里的关键要点，也是经常被误解的一点是，如果你运行某个任务，并且没有其他更高“优先级”（在 cgroup 施加的资源控制方面）的任务同时运行，那么该任务将获得
    100% 的资源（或接近 100%，因为系统需要一小部分资源来保持自身运行！）。


    ### 1.14.1.2.1 创建临时或持久控制组


    正如我们在第 1 卷第 2 章第 2.7.1 节中详细说明的，管理 cgroup 资源的地方是 systemd “单元”文件。将此管理资源设施置于单元文件级别，允许使用
    systemd 的命令行实用程序管理其操作。根据单元文件的类型，你的资源管理设置可以是 *临时* 或 *持久* 的。


    要通过其单元文件为服务创建 **临时 cgroup**，请使用 **systemd-run** 命令启动服务。以下是 **systemd-run** 命令的简要描述，摘自其手册页：


    systemd-run - 在临时范围单元、服务单元或路径、套接字或计时器触发的服务单元中运行程序


    语法：

    systemd-run [OPTIONS...] COMMAND [ARGS...]

    systemd-run [OPTIONS...] [PATH OPTIONS...] {COMMAND} [ARGS...]

    systemd-run [OPTIONS...] [SOCKET OPTIONS...] {COMMAND} [ARGS...]

    systemd-run [OPTIONS...] [TIMER OPTIONS...] {COMMAND} [ARGS...]


    用途：

    systemd-run 可用于创建并启动临时 .service 或 .scope 单元，并在其中运行指定的 COMMAND。它也可用于创建并启动临时 .path、.socket
    或 .timer 单元，该单元在时间流逝时激活 .service 单元。


    常用选项：

    env 记录 systemd 提供给服务的环境变量。

    -p BlockIOWeight=10 updatedb 限制命令可用的资源。

    --on-active=30 在特定时间运行命令。

    -t --send-sighup /bin/bash 允许使用 bash 访问 tty。

    --scope --user screen 作为用户服务启动 screen。


    然后，你可以根据系统用例的设计修改应用程序上的资源。值得注意的是，系统编程应用程序可以通过使用 cgroup API 调用 systemd 来创建临时 cgroups。一旦使用
    systemctl stop 命令停止服务或系统重新启动（因为使用 systemd-run 没有为服务创建永久单元文件），临时单元就会从系统中移除。


    要为服务创建持久 cgroup，你必须创建或编辑其单元配置文件。配置可以在系统重新启动后保留，因此可用于管理由 systemd 自动启动的服务。


    我们在下面的示例 1.10 和 1.11 中介绍了这两种服务创建方法，并提供了相关背景信息。


    #### 使用 systemd-run 创建临时 cgroup 并更改其 CPUShare


    要创建临时 cgroup 并在该 cgroup 中运行命令，请使用 systemd-run 命令。systemd-run 命令的一般形式，包含一些特定选项，如下所示：


    ```

    $ systemd-run --unit=name --slice=slice_name --property prop_name=val command

    ```


    其中：


    **name** 是你为单元指定的名称。如果未指定 **--unit**，将自动选择一个非描述性的单元名称。强烈建议始终包含此选项，并选择一些你可以轻松识别的描述性名称。


    **slice_name** 是你希望单元在其下运行的系统上现有的标准切片之一。你可以使用 **systemctl -t slice** 命令列出系统上的切片。或者，你甚至可以通过指定新的唯一名称来创建新的切片。默认情况下，服务和范围在
    **system.slice** 中创建。


    **prop_name** 是你希望为单元初始设置的允许属性，**Val** 是你希望分配给该属性的值。在本节中，我们使用单独的 **systemctl**
    命令来执行此操作，以更改单元的 CPUShares。但也可以使用 **systemd-run** 命令的此选项来完成。


    *command* 是 Linux 命令及其有效选项、选项参数和命令参数，这些将在服务单元启动时在其中执行。该命令应始终位于 **systemd-run**
    命令的末尾，以避免将 **systemd-run** 选项与你希望在单元中运行的命令混淆！


    有关选项及其参数的更多信息，请参阅系统上的 **systemd-run** 手册页。


    要设置属性，例如服务获得的 CPU 百分比份额，请使用 **systemctl** 命令。使用 **systemctl** 设置服务属性的一般语法是：


    ```

    $ systemctl set-service_name property=property_value

    ```


    其中：

    **service_name** 是你想要修改其属性的服务名称，

    **property** 是属性的有效名称，

    **property_value** 是给定属性的允许值。


    有关更多信息，请参阅 Raspberry Pi 系统上的 **systemctl** 手册页。


    ## 示例 1.10 使用 **systemd-run** 启动新服务并分配 CPU 资源


    **目标：** 以下示例允许你在 user.slice 中启动三个临时服务，并将更大比例的 CPU 分配给其中一个。因此，其中一个将在 CPU 中获得更多时间。每个服务中运行的程序'
