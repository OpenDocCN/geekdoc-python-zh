- img_proc: true
  md: '# 1.13.1.1 Default Repositories


    The default repositories for Raspberry Pi OS are usually specified in the file
    /etc/apt/sources.list. This file contains a list of package repositories that
    are used by the APT package manager to install and update software.

    By default, the Raspberry Pi OS sources.list file on our Raspberry Pi400, at the
    time this book was written, contained the following lines:


    ```

    deb http://deb.debian.org/debian bullseye main contrib non-free

    deb http://security.debian.org/debian-security bullseye-security main contrib
    non-free

    deb http://deb.debian.org/debian bullseye-updates main contrib non-free

    # Uncomment deb-src lines below then ''apt-get update'' to enable ''apt-get source''

    #deb-src http://deb.debian.org/debian bullseye main contrib non-free

    #deb-src http://security.debian.org/debian-security bullseye-security main contrib
    non-free

    #deb-src http://deb.debian.org/debian bullseye-updates main contrib non-free

    ```


    In the above example listing, the repository URL is specified as http://deb.debian.org/debian*.
    This URL points to the official Raspberry Pi OS repository server.

    The repositories are divided into three components:


    +   - **main:** This component contains the core software packages officially
    supported by the Raspberry Pi OS team.

    - **contrib:** This component contains packages that are not part of the core
    distribution but are still provided by the Raspberry Pi OS team. These packages
    depend on software from the main component.

    - **non-free:** This component contains packages that are not free software and
    may have licensing restrictions. These packages depend on software from the main
    component.


    > ***Note***

    The contents of the sources.list file may change with updates to Raspberry Pi
    OS, so it''s always a good idea to check the file on your specific installation,
    or consult the official Raspberry Pi OS documentation for the most up-to-date
    information.


    For software that provides a system service, such as sshd, or a web server like
    nginx, the package manager not only downloads and installs all necessary components
    and their dependencies, but also uses systemd facilities to start the service,
    and ensure it automatically starts at every subsequent system boot.'
