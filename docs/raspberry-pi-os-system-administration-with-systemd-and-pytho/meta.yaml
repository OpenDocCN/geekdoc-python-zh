    ## How to Read and Use This Book


    ***Note***

    The premise and prerequisite of this book is that you understand what the correct
    form, or structure, of a Linux command is, and how to type one in on the console
    or terminal command line of a Raspberry Pi!


    Just to review that here, the general syntax, or structure of a single Linux command
    (often referred to as a *simple command*) as it is typed on the command line,
    is as follows:


    ```

    $ command [[-option(s)] [option argument(s)] [command argument(s)]

    ```


    where:

    $ is the command line or shell prompt from the Raspberry Pi OS;

    anything enclosed in [] is not always needed;

    **command** is the name of the valid Linux command for that shell in lowercase
    letters;

    **[-option(s)]** is one or more modifiers that change the behavior of command;

    **[option argument(s)]** is one or more modifiers that change the behavior of
    [-option(s)]; and

    **[command argument(s)]** is one or more objects that are affected by **command**.


    Note the following seven essentials:


    1. A space separates command, options, option arguments, and command arguments,
    but no space is necessary between multiple option(s) or multiple option arguments.

    2. The order of multiple options or option arguments is irrelevant.

    3. A space character is optional between the option and the option argument.

    4. Always press the <Enter> key to submit the command for interpretation and execution.

    5. Options may be preceded by a single hyphen - or two hyphens --, depending on
    the form of the option. The short form of the option is preceded by a single hyphen,
    the long form of the option is preceded by two hyphens. No space character should
    be placed between hyphen(s) and option(s).

    6. A small percentage of commands (like **whoami**) take *no* options, option
    arguments, or command arguments.

    7. Everything on the command line is case sensitive!


    Also, it is possible, and *very* common, to type *multiple* Linux commands (sometimes
    called *compound commands*, to differentiate them from simple commands) on the
    same command line, before pressing the <Enter> key. The components of a multiple
    Linux command are separated with input and output redirection characters, to channel
    the output of one into the input of another.


    As stated in the Series Preface, the fundamental prerequisites of this volume
    are:


    1. Knowledge of how to type a syntactically correct Linux command on the command
    line (as detailed above)

    2. Having access to a dedicated Raspberry Pi computer with the latest Raspberry
    Pi Operating System already installed and running on it

    3. Being a privileged user on the system, and as such, being able to execute the
    **sudo** command to assume superuser status, and

    4. Having a basic knowledge of how to edit and save text files in the **nano**
    text editor. We give no instruction on how to use the nano text editor in this
    volume, but there is a brief overview of it in Volume 3, Raspberry Pi OS Text
    Editing, git, Virtualization with LXC/LXD.


    An online Github site, with further materials and updates, program code, solutions
    to both In-Chapter Exercises and End-of-Chapter Problems, Questions, and Projects,
    plus other supplements, is provided for this book. It can be found at:


    www.github.com/bobk48/RaspberryPiOS


    All command line instructions in this volume were tested on either a Raspberry
    Pi 4B, or a Raspberry Pi 400, both with 4 GB of memory, and the latest version
    of the Raspberry Pi OS at the time.


    ## Routes through the Book


    Browse the Contents.


    Select a topic that interests you.


    Do the examples, or all the command line materials presented for that topic.


    Maybe pick another topic that interests you, and do the examples and all the command
    line materials there.


    Finally, go back to the beginning of the book. Do everything, from start to finish.


    Rinse and repeat the above as necessary.


    Refer as much as possible to the systemd materials in Volume 1, using them as
    an encyclopedic source for the material you select out of Chapter 1.


    **Have fun!**


