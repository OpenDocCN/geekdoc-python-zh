    The following lines of interactive code very simply illustrate the inheritance
    model of OOP classes, and in particular, its hierarchic nature. Launch Thonny
    on your Raspberry Pi system, and execute the code below in the Thonny Shell Area.
    Be sure to press the <Enter> key at the end of Line 2 of the code (There is no
    need to type in the comment line numbers, which we provide here for reference
    only.)


    ```

    >>> class tab: pass            #Line 1

    ...                            #These ellipses appear on Line 2

    >>> tab.name = ''Bob Koretsky''  #Line 3

    >>> tab.age = 85               #Line 4

    >>> print (tab.name,tab.age)   #Line 5

    Bob Koretsky 85

    >>> x = tab()                  #Line 6

    >>> y = tab()                  #Line 7

    >>> x.name                     #Line 8

    Bob Koretsky

    >>> y.name = ''Alan Turing''     #Line 9

    >>> tab.name, x.name, y.name   #Line 10

    (''Bob Koretsky'', ''Bob Koretsky'', ''Alan Turing'')

    >>>

    ```


    For beginners, a line-by-line analysis and description of this code is as follows:


    +   Line 1: Starting with the keyword **class**, you name a class **tab**. You
    use the keyword **pass** to assign the class to an empty namespace object, that
    is, *it has no class members, attributes or methods yet*. A class is a model of
    an object!

    Line 2: Continue by pressing <Enter>.

    Line 3: You now add an attribute called **name** to the class named **tab**. The
    class **tab** has no instances yet!

    Line 4: You assign another attribute called **age** to the class **tab**.

    Line 5: You print out the attributes of **tab**.

    Line 6: You now assign an instance, named **x**, to the class **tab**, which is
    now an empty instance.

    Line 7: You now assign another instance, named **y**, to the class **tab**, which
    is another empty instance.

    Line 8: The instance **x** inherits the attribute **name** from **tab**. You use
    the dot (.) operator to connect or refer to the instance **x** with **name** "Bob
    Koretsky" in the class **tab**.

    Line 9: You now explicitly assign the instance **y**, with an attribute **name**,
    the value "Alan Turing". You use the dot (.) operator to connect the instance
    **y** with **name** "Alan Turing".'
