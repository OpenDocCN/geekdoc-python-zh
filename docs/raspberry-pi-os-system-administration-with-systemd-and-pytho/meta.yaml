- md: "## In-Chapter Exercise\n\n52. Is ufw active on your system? Are there any firewall\
    \ rules in effect by default, and what are they? How did you find this out?\n\n\
    ## 1.15.5.2 Linux Uncomplicated Firewall (ufw)\n\nUnlike other firewall rules-based\
    \ systems, such as the **iptables** firewall configuration utility, **ufw** is\
    \ a much easier way to create an IPv4 or IPv6 host-based firewall. A “rules-based\
    \ system” means that you create syntactically correct rules to control network\
    \ connection access to your system. **ufw**’s most basic application is to allow\
    \ or deny access on ports, or deny them from specific IP addresses that you know\
    \ are problematic security risks.\n\n**ufw** is based upon the Netfilter interface\
    \ to the Linux kernel, and particularly the filter table operations and protocols\
    \ found in that interface. The rule format is also similar to the Packet Filter\
    \ (PF) syntax in OpenBSD UNIX.\n\n## 1.15.5.2.1 ufw Defaults\n\nThe default firewall\
    \ configuration utility for the Raspberry Pi OS is **ufw**. Unlike the iptables\
    \ firewall configuration utility, **ufw** is a much easier way to create an IPv4\
    \ or IPv6 host-based firewall. It is a rule-based system, which means that you\
    \ create rules to control network connection access to your system. By default,\
    \ **ufw** is disabled for example. But once enabled, it has a minimal set of rules,\
    \ as part of its profile, that go into effect. **ufw**’s most basic application\
    \ is to allow or deny access on ports or from specific IP addresses.\n\nThere\
    \ is a GUI front end for **ufw**, known as gufw. It was installed by default on\
    \ our Raspberry Pi OS, and can be found in the Raspberry Pi Menu > Preferences\
    \ > Firewall Configuration.\n\n## 1.15.5.2.2 ufw Basic Syntax\n\nAn abbreviated\
    \ listing of the **ufw** man page is as follows:\n\n```\nufw\nPurpose:\n    ufw\
    \ is used to manage a Linux firewall, and provides an easy to use interface for\
    \ the creation of firewall rules. The rules use a basic syntax as shown below.\n\
    Syntax:\n    ufw [option[s]] [command] [rule[s]]\nOutput: New, modified, or deleted\
