- md: '## 1.14.1.1 Traditional Process Control


    Traditionally, the most important, complete, and readily available display of
    system process activity is given by the **ps** and **top** (or **htop**) commands,
    which allow you to monitor running processes.


    ## 1.14.1.2 systemd Cgroups, Affecting the Limits of CPU Scheduling


    With the adoption of systemd into the Linux kernel in all major branches of Linux,
    including Debian and its downstream distro, the Raspberry Pi OS, several new and
    many updated features have been introduced. These features completely change the
    startup phase of booting the system, for example. But most importantly, they radically
    modify how both system and applications services (such as sshd), and even common
    userland processes, are managed. One of these radically modified and updated features,
    known as Control Groups (cgroups), is completely reorganized with respect to service
    and process/thread management. Processes and threads, as well as system services,
    are grouped together in a unified manner. This moves system resource management,
    such as what percentage of CPU time a process, thread, or service is allocated,
    from the process level up to the application level. This is achieved by mapping
    cgroup structure to the systemd “unit tree”. We sketch systemd cgroups impact
    on the performance scheduling of processes and threads through the CPU in this
    section. In the next section, we focus on how cgroups impact memory management
    to affect system performance.


    cgroups are a mechanism for organizing services and processes/threads in a hierarchic
    tree, or “unit tree”, of numbered groups to facilitate resource management. The
    structure of this tree is graphically illustrated using the **systemd-cgls** command.
    We show how the **systemd-cgls** command can be used to view and assess the cgroups
    structure. Then, control is exercised on these numbered groups to affect resources
    like CPU usage, memory management, network bandwidth, and other system service-related
    activities. This control can be done on a transient, or temporary, basis using
    the **systemd-run** command. Or it can be done on a persistent, or permanent basis,
    by making critical changes to the systemd units file that all permanent, start-at-boot-time
    services have. We organize our presentation in this section around these two bases.


    Before the introduction of cgroups and systemd in the Linux kernel, all processes
    received similar amounts of system resources that the administrator could modify
    to enhance performance (per the use-case(s) the system operated under by design)
    with process *nice* values. The drawback of this legacy approach was that, for
    an application, such as a webserver or database management program, which may
    have a large number of sub-processes or threads running at the same time, there
    was an inadequate mechanism available to give priority to these groups of tasks.
    Another task or set of tasks that was more use-case, mission-critical, but had
    a much smaller number of sub-tasks, had to share resources equally with the webserver
    or database management program.


    systemd cgroups have a tremendous advantage over the legacy approach. For example,
    using systemd cgroups, all the processes started by the nginx webserver will have
    their own cgroup numbers. This allows you to control nginx at the application
    level, and all of its “worker children”, with the systemd **systemctl** command.
    We completely detail the **systemctl** command in Volume 1, Chapter 2.


    We give a more in-depth explanation of the hierarchic cgroups unit tree in Volume
    1, Chapter 2, Section 2.7.1. In that section we also show the utility of the **systemd-cgls**
    command, and how it depicts, in an easy-to-read, graphical tree format, all of
    the cgroups and their hierarchic structuring on your Raspberry Pi system.


    The key takeaway here, and something that is often misunderstood, is that if you
    run some task, and nothing else of higher “priority” (in terms of cgroup-levied
    resource controls) is running at the same time, that task gets 100% of the resources
    (or nearly so, since the system needs to have a small chunk of resources to keep
    itself running!).


    ### 1.14.1.2.1 Creating a Transient or Persistent Control Group


    As we detailed in Volume 1, Chapter 2, Section 2.7.1, the place where cgroup resources
    are managed is the systemd “unit” file. Placing this management resource facility
    at the level of unit files allows their operations to be managed with systemd’s
    command-line utilities. Depending on the kind of unit file, your resource management
    settings can be *transient* or *persistent*.


    To create a **transient cgroup** for a service via its unit file, start the service
    with the **systemd-run** command. A brief description of the **systemd-run** command,
    taken from the man page for it, is as follows:


    systemd-run - Run programs in transient scope units, service units, or path-,
    socket-, or timer-triggered service units


    Syntax:

    systemd-run [OPTIONS...] COMMAND [ARGS...]

    systemd-run [OPTIONS...] [PATH OPTIONS...] {COMMAND} [ARGS...]

    systemd-run [OPTIONS...] [SOCKET OPTIONS...] {COMMAND} [ARGS...]

    systemd-run [OPTIONS...] [TIMER OPTIONS...] {COMMAND} [ARGS...]


    Purpose:

    systemd-run may be used to create and start a transient .service or .scope unit
    and run the specified COMMAND in it. It may also be used to create and start a
    transient .path, .socket, or .timer unit, that activates a .service unit when
    elapsing.


    Common Options:

    env Logs environment variables given by systemd to services.

    -p BlockIOWeight=10 updatedb Limits resources available to a command.

    --on-active=30 Runs commands at a specific time.

    -t --send-sighup /bin/bash Allows access to a tty using bash in this case.

    --scope --user screen Starts a screen as a user service.


    You can then modify resources on an application according to the design of your
    system use case(s). It is worth noting here that system programming applications
    can create transient cgroups by using cgroup API calls to systemd. A transient
    unit is removed from the system as soon as the service is stopped using the systemctl
    stop command, or the system is rebooted (since there is no permanent unit file
    created for the service using systemd-run.)


    To create a persistent cgroup for a service, you must create or edit its unit
    configuration file. The configuration can be preserved after system reboot, so
    it can be used to manage services that are started automatically by systemd.


    We present Examples 1.10 and 1.11 below, with relevant background information,
    on these two methods of service creation.


    #### Creating a Transient cgroup with systemd-run and Changing its CPUShare


    To create a transient cgroup, and run a command in that cgroup, the systemd-run
    command is used. The general form of the systemd-run command, with some specific
    options, is as follows:


    ```

    $ systemd-run --unit=name --slice=slice_name --property prop_name=val command

    ```


    where:


    **name** is your name for the unit. If **--unit** is not specified, a non-descriptive
    unit name will be chosen automatically. It is highly recommended to always include
    this option, and choose some descriptive name you can easily recognize.


    **slice_name** is one of the standard, existing slices on your system you want
    the unit to operate under. You can list slices on your system using the **systemctl
    -t slice** command. Or you can even create a new slice by designating a new, unique
    name. By default, services and scopes are created in the **system.slice**.


    **prop_name** is an allowed property you want to initially set for the unit, and
    Val is the value you want to assign to that property. In this section, we use
    a separate **systemctl** command to do this in order to change a unit''s CPUShares.
    But it can also be done using this option of the **systemd-run** command.


    *command* is the Linux command, and its valid options, option arguments, and command
    arguments that will execute in the service unit, when it is started. The command
    should always be at the end of the **systemd-run** command, to avoid confusing
    **systemd-run** options with the command you want to run in the unit!


    See the **systemd-run** man page on your system for more information on options
    and their arguments.


    In order to set a property, such as the % share of the CPU that a service gets,
    you use the **systemctl** command. The general syntax for setting a property of
    a service with **systemctl** is:


    ```

    $ systemctl set-service_name property=property_value

    ```


    where:

    **service_name** is the name of the service you want to modify the property of,

    **property** is the valid name of a property, and

    **property_value** is an allowable value of the given property.


    See the man page for **systemctl** on your Raspberry Pi system for more information.


    ## Example 1.10 Starting a New Service with **systemd-run** and Allocating CPU
    Resources


    **Objectives:** The following example allows you to start three transient services
    in the user.slice, and allocate a larger percentage of the CPU to one of them.
    Therefore, one of them will get more time in the CPU. The program that will be
    running in each'
