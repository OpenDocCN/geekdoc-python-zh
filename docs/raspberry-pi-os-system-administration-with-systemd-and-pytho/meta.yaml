    \n## 1.14.3 Assessment of System Disk Usage\n\nAlong with CPU usage and memory\
    \ management, the ability to look at, then assess and possibly modify the resources\
    \ of persistent storage media, particularly of a limited-capacity microSD card,\
    \ is critical to a system administrator's task. Even for an ordinary user, storage\
    \ space is a precious commodity, regardless of the availability and lower costs\
    \ of terabyte-capacity externally mounted media. Consider a Raspberry Pi system\
    \ that can only physically support a smaller capacity microSD card, for whatever\
    \ reason. Or a system where an ordinary user is storing large files, such as video\
    \ or other types of media file.\nTraditionally, the **du** command allowed you\
    \ to get a text-based summary of disk usage for files and directories, in a variety\
    \ of formats. An administrator could then take action to trim storage usage according\
    \ to the use case of the system. For more information on the **du** command, see\
    \ the man page for **du** on your Raspberry Pi system.\n\nThe **df** command (df\
    \ is an abbreviation for disk free) allows you to display the amount of available\
    \ storage space for file systems on which the invoking user has read access. **df**\
    \ is typically invoked using the **-h** and **T** option, which gives a human-readable\
    \ output format, which includes the file system types. For example, on our Raspberry\
    \ Pi 400 system whose boot/system medium is an externally mounted USB3 SSD, the\
    \ following command gives information about storage and file system layout:\n\n\
    ```\n$ df -hT\nfile system  Type      Size   Used  Avail  Use%  Mounted on\n/dev/root\
    \    ext4      439G   15G   403G   4%    /\ndevtmpfs     devtmpfs  1.7G   0  \
    \   1.7G   0%    /dev\ntmpfs        tmpfs     1.9G   0     1.9G   0%    /dev/shm\n\
    tmpfs        tmpfs     759M   1.5M  758M   1%    /run\ntmpfs        tmpfs    \
    \ 5.0M   4.0K  5.0M   1%    /run/lock\n/dev/sda1    vfat      253M   31M   222M\
    \   13%   /boot\ntmpfs        tmpfs     380M   32K   380M   1%    /run/user/1000\n\
    $\n```\n\nMore contemporary graphical methods can be used to view and assess disk\
    \ usage on Raspberry Pi systems. For example, you can use the gnome disk usage\
    \ analyzer, named “Baobab”. It displays either a bar or sector chart representation\
    \ of relative disk usage, for any attached persistent medium. This tool is very\
    \ useful when you want to get a picture of where, and what, your disks are being\
    \ used for. Figure 1.11 shows a typical disk capacity display of the root directory\
    \ on the same Raspberry Pi 400 system. Similar tools are found on all Linux systems.\
    \ Another useful summary tool, similar to Gparted, is the gnome-disk-utility,\
    \ launched from the Preferences Menu.\n\n## 1.14.4 Network Configuration with\
    \ the ip Command\n\nThe most important and useful command for the system administrator\
    \ when doing a post-install network configuration is the **ip** command. The following\
    \ sections illustrate the basic usage of this command, and give a use case example\
    \ that illustrates how to assign more than one IP address to a Raspberry Pi network\
    \ interface.\n\nWith the new toolkit, it is as easy as with the old to add new\
    \ ip addresses, as follows:\n\n```\n$ ip addr add 192.168.1.1/24 dev eth0\n```\n\
    \n148 Raspberry Pi OS System Administration with systemd and Python\n\n![](img/7ffbe025fa2ba956525d0c51169283f3_164_0.png)\n\
    \nFIGURE 1.11\nDisk Usage Analyzer Display of the Root Directory.\n\n### 1.14.4.1\
    \ Basic ip Command Syntax, Options, and Operations\n\nAn abbreviated version of\
    \ the man page for the **ip** command is as follows:\n\n```\n********************************************************************************\n\
    \n**ip**\n\nSyntax: ip [Options] Object {Command | help}\n        ip [-force]\
    \ -batch filename\nwhere\n    Object {link | addr | addrlabel | route | rule |\
    \ neigh | ntable | tunnel\n            | tuntap | mad-dress | mroute | mrule |\
    \ monitor | xfrm | netns |\n            l2tp | tcp_metrics}\n    Options {-V[ersion]\
    \ | -h[uman-readable] | -s[tatistics] | -r[esolve] | -\n            f[amily] {inet\
    \ | inet6 | ipx | dnet | link} | -o[neline] | -n[ets] name\n            | -a[ll]\
    \ | -c[olor]}\n\nCommand\n    Specifies the action to perform on the object. The\
    \ set of possible actions\n    depends on the object type.\n```\n\nFor most objects,\
    \ the commands possible are **add**, **delete**, and **show**. Some objects do\
    \ not allow all of these operations, or have some additional commands. The help\
    \ command is available for all objects. It prints out a list of available commands\
    \ and argument syntax conventions. If no command is given, usually the **show**\
    \ command is the default, if that option can be applied to the objects specified.\n\
    \n**Purpose:** Show or manipulate routing, devices, policy routing and tunnels.\n\
    **Output:** Output or modified routing, devices, policy routing, or tunnels.\n\
    **Common Options, Objects, and Commands:**\n**addr** IP address\n\nTo view an\
    \ abbreviated syntax display of help on the ip route command, type the following:\n\
    \n```\n$ ip addr help\nUsage: ip address {add |change| replace} IFADDR dev IFNAME\
    \ [LIFETIME]\n                                [CONFFLAG-LIST]\n    ip address\
    \ del IFADDR dev IFNAME [mngtmpaddr]\n    ip address {show |save |flush} [dev\
    \ IFNAME] [scope SCOPE-ID]\n                                [to PREFIX] [FLAG-LIST]\
    \ [label LABEL] [up]\n    ip address {showdump | restore}\nIFADDR:= PREFIX | ADDR\
    \ peer PREFIX\n    [broadcast ADDR] [anycast ADDR]\n    [label IFNAME] [scope\
    \ SCOPE-ID]\nOutput truncated....\n```\n\nFrom the above abbreviated listing,\
    \ you can see the Commands available to work on the Object route, i.e. add, change,\
    \ replace, del(ete), show, save, flush, and showdump.\n\nTo see the status of\
    \ the specific network interface named eth0 for example, type the following:\n\
    \n```\n$ ip addr show eth0\n2: eth0: <BROADCAST,MULTICAST,UP,LOWER_UP> mtu 1500\
    \ qdisc mq\nstate UP group default qlen 1000\n    link/ether e4:11:5b:12:c2:77\
    \ brd ff:ff:ff:ff:ff\n    inet 192.168.1.26/24 brd 192.168.1.255 scope global\
    \ dynamic noprefixroute eth0\n       valid_lft 14608sec preferred_lft 3808sec\n\
    \    inet6 fe80::9ef2:8f7f:e4c4:7ea2/64 scope link\n       valid_lft forever preferred_lft\
    \ forever\n```\n\nTo see the status of the all network interfaces attached to,\
    \ or defined on, the system, type the following:\n\n```\n$ ip addr show\n1: lo:\
    \ <LOOPBACK,UP,LOWER_UP> mtu 65536 qdisc noqueue state UNKNOWN group default qlen\
    \ 1000\n    link/loopback 00:00:00:00:00:00 brd 00:00:00:00:00:00\n    inet 127.0.0.1/8\
    \ scope host lo\n       valid_lft forever preferred_lft forever\n    inet6 ::1/128\
    \ scope host\n       valid_lft forever preferred_lft forever\n2: eth0: <BROADCAST,MULTICAST,UP,LOWER_UP>\
    \ mtu 1500 qdisc mq state UP group default qlen 1000\n    link/ether e4:11:5b:12:c2:77\
    \ brd ff:ff:ff:ff:ff:ff\n    inet 192.168.1.26/24 brd 192.168.1.255 scope global\
    \ dynamic noprefixroute eth0\n       valid_lft 14227sec preferred_lft 3427sec\n\
    \    inet6 fe80::9ef2:8f7f:e4c4:7ea2/64 scope link\n       valid_lft forever preferred_lft\
    \ forever\n```\n\nTo display link characteristics of eth0, type the following:\n\
    \n```\n$ ip link show dev eth0\n2: eth0: <BROADCAST,MULTICAST,UP,LOWER_UP> mtu\
    \ 1500 qdisc mq state UP mode DEFAULT group default qlen 1000\n    link/ether\
    \ e4:11:5b:12:c2:77 brd ff:ff:ff:ff:ff:ff\n$\n```\n\n### 1.14.4.2 Use Case Example:\
    \ Assigning Multiple IP Addresses to a Raspberry Pi\n\nThis section, and its example,\
    \ show how to assign multiple IP addresses to your system, without using the deprecated\
