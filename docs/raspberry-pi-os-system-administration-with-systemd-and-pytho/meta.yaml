    \ value has to be stored; for example, a key in a dictionary.\n\n**Iterable**:\
    \ An object capable of returning its members one at a time. Examples of iterables\
    \ include all sequence types (such as a list, string, and tuple) and some nonsequence\
    \ types like **dict** and **file** and objects of any classes you define with\
    \ an **\\_\\_iter\\_\\_()** or **\\_\\_getitem\\_\\_()** method. Iterables can\
    \ be used in a **for** loop and in many other places where a sequence is needed.\
    \ When an iterable object is passed as an argument to the built-in function **iter()**,\
    \ it returns an iterator for the object. This iterator is good for one pass over\
    \ the set of values. When using iterables, it is usually not necessary to call\
    \ **iter()** or deal with iterator objects yourself. The **for** statement does\
