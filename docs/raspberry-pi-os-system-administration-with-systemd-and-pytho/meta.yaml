    ## 1.4 系统服务管理、启动和关机程序


    首先，关于通常所说的系统“启动”，你需要思考的是：

    “你希望系统如何启动？”


    如上文第 1.3 节所述，这是你必须做出的最重要的预安装考虑事项之一。有几个选项，它们的细节，特别是对于 ARM 架构的机器，是复杂的。

    本节概述了启动、管理启动过程以及优雅关闭 Raspberry Pi OS 的一般程序，具体取决于你如何回答上述问题。它简要概述了操作系统和硬件在成功启动和关闭过程中所经历的步骤。然后，它提供了一些关于系统管理员可用的基本但重要的
    systemd 服务管理工具的进一步参考。在这些进一步的参考中，我们给出了通过启用和运行新服务来操作和更改系统服务的命令示例。


    ### 1.4.1 启动和启动过程


    Raspberry Pi 4B 和 400 使用 EEPROM 来启动系统。以下是 Raspberry Pi OS 启动所经历的一般步骤：


    1.  当 Raspberry Pi 首次打开时，ARM 核心关闭，GPU 核心开启。此时 SDRAM 被禁用。

    2.  SoC 上的 ROM 启动第一阶段引导。

    3.  microSD 或 USB 启动的引导行为由 EEPROM 中的配置文件控制，可以通过 rpi-eeprom-config 工具编辑，命令为 `sudo
    -E rpi-eeprom-config --edit`


    EEPROM 第二阶段包括以下步骤：

    a. 初始化时钟和 SDRAM。

    b. 读取 EEPROM 配置文件。

    c. 确定引导应该是重启/停止，还是从 microSD 卡、网络、USB 设备或 PCIe NVME 设备启动。


    例如，Raspberry Pi 400 的启动过程与其他基于 Linux 的计算机类似，主要区别在于：

    a. 它传统上默认使用 microSD 卡作为其主要存储设备和引导介质，或替代来源，以及

    b. 由 EEPROM 控制。


    术语“启动”在这里是指将操作系统从完全关闭状态带到 systemd 可以接管的点。然后在“启动”过程中，systemd 将计算机带到稳定状态，完全正常的操作条件。

    当系统在关机过程中挂起时，一种现代的诊断方法是使用 `journalctl` 命令检查 systemd 日志，如第 1 卷所示。这样，如果某个进程或程序阻止系统达到关闭状态，日志将允许你看到导致问题的进程或程序是什么。在关机时，systemd
    尝试停止所有服务并卸载所有文件系统。系统最终关闭。我们将在下一节中提供有关使用 systemd 的 Raspberry Pi 系统如何关闭的更多细节。


    ## 章节内练习


    3.  你如何启动到另一个引导介质上找到的替代环境，以及在图 1.1 所示的启动过程的哪个阶段可能会向你呈现这种替代方法？你为什么想这样做？记下在 Raspberry
    Pi OS 上具体如何执行此操作。另外，在图 1.1 中画一个或多个箭头，指定如果系统是重新启动而不是关闭电源，将遵循什么路径。


    4.  哪种启动方法（从传统的 microSD、USB3 挂载的 SSD、NMVe M.2 设备或网络）可以让你在同一硬件上最快、最轻松地试用不同的 Raspberry
    Pi OS 版本？**不一定在 Raspberry Pi 硬件上。** 根据你的选择，草拟具体如何完成此操作。（注意：*不是同时，而是顺序进行！*）


    ### 1.4.2 systemd 和传统系统重启或关机


    systemd 负责将系统从正常操作状态带到关闭状态，或重新启动系统。相关的 systemd **systemctl** 命令及其选项，用于关闭系统或重新启动系统，以及它们简要完成的功能，如表
    1.1 所示。我们在第 1 卷中进一步描述了这些命令和 systemd 关机过程。从正常操作状态到关闭状态的 systemd 关机路径通过可能的目标状态，如图
    1.2 所述。


    传统上，优雅的关机或重启程序可以从活动窗口系统图形化完成，也可以从命令行或控制台窗口使用 **halt** 或 **shutdown** 命令及其选项完成。**shutdown**
    命令的优点是允许你指定启动关机过程的时间。


    优雅的关机程序通常如下进行：

    1.  关闭系统和用户进程

    2.  将系统内存刷新到磁盘

    3.  卸载文件系统

    4.  关闭电源


    **表 1.1**

    **systemd systemctl 关机命令**


    | 命令 | 描述 |

    | :--- | :--- |

    | **systemctl halt** | 停止系统 |

    | **systemctl poweroff** | 关闭系统电源 |

    | **systemctl reboot** | 重新启动系统 |

    | **systemctl suspend** | 挂起系统 |

    | **systemctl hibernate** | 休眠系统 |

    | **systemctl hybrid-sleep** | 休眠并挂起系统 |'
