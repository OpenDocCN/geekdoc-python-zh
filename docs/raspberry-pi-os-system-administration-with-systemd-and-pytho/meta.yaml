- md: "## Quick Start into Sysadmin for the Raspberry Pi OS 17\n\n```\nSYNOPSIS\n\
    \       ls [OPTION]... [FILE]...\n\nDESCRIPTION\n       List information about\
    \ the FILEs (the current\n       directory by default).\n       Sort entries alphabetically\
    \ if none of -cftuvSUX\n       nor --sort is specified.\n\n       Mandatory arguments\
    \ to long options are manda-\n       tory for short options too.\n\n       -a,\
    \ --all\n              do not ignore entries starting with .\n\n       -A, --almost-all\n\
    \              do not list implied . and ..\n\n       --author\nManual page ls(1)\
    \ line 1 (press h for help or q to quit)\n```\n\nThis output from Raspberry Pi\
    \ OS is a Raspberry Pi OS *manual page*, or *manpage*, which gives a synopsis\
    \ of the command usage showing the options, and a brief description that helps\
    \ you understand how the command should be used. Typing **q** after one page has\
    \ been displayed, as seen in the example, returns you to the command line prompt.\
    \ Pressing the space key on the keyboard would have shown you more of the content\
    \ of the manual pages, one screen at a time, related to the **ls** command.\n\n\
    To get help in using all the Raspberry Pi OS commands and their options, use the\
    \ **man man** command to go to the Raspberry Pi OS reference manual pages.\n\n\
    The pages themselves are organized into eight sections, depending on the topic\
    \ described, and the topics that are applicable to the particular system. Table\
    \ 0.1 lists the sections of the manual and what they contain. Most users find\
    \ the pages they need in Section 2.2. Software developers mostly use library and\
    \ system calls and thus find the pages they need in Sections 2.3 and 2.3. Users\
    \ who work on document preparation get the most help from Section 2.7. Administrators\
    \ mostly need to refer to pages in Sections 2.2, 2.5, 2.6, and 2.9.\n\nThe manual\
    \ pages comprise multi-page, specially formatted, descriptive documentation for\
    \ every command, system call, and library call in Raspberry Pi OS. This format\
    \ consists of eight general parts: name, synopsis, description, list of files,\
    \ related information, errors, warnings, and known bugs. You can use the **man**\
    \ command to view the manual page for a command. Because of the name of this command,\
    \ the manual pages are normally referred to as Raspberry Pi OS man pages. When\
    \ you display a manual page on the screen, the top-left corner of the page has\
    \ the command name with the section it belongs to in parentheses, as with LS(1),\
    \ seen at the top of the output manual page.\n\n### TABLE 0.1\nSections of the\
    \ Raspberry Pi OS Manual\n\n| Section | What It Describes |\n| :--- | :--- |\n\
    | 1 | User commands |\n| 2 | System calls |\n| 3 | Language library calls (C,\
    \ FORTRAN, etc.) |\n| 4 | Devices and network interfaces |\n| 5 | File formats\
    \ |\n| 6 | Games and demonstrations |\n| 7 | Environments, tables, and macros\
    \ for troff |\n| 8 | System maintenance-related commands |\n\nThe command used\
    \ to display the manual page for the **passwd** command is:\n\n```\n$ man passwd\n\
    ```\n\nThe manual page for the **passwd** command now appears on the screen, but\
    \ we do not show its output. Because they are multi-page text documents, the manual\
    \ pages for each topic take up more than one screen of text to display their entire\
    \ contents. To see one screen of the manual page at a time, press the space bar\
    \ on the keyboard. To quit viewing the manual page, press the **Q** key on the\
    \ keyboard.\n\nNow type this command:\n\n```\n$ man pwd\n```\n\nIf more than one\
    \ section of the man pages has information on the same word and you are interested\
    \ in the man page for a particular section, you can use the -S option. The following\
    \ command line therefore displays the man page for the read system call, and not\
    \ the man page for the shell command read.\n\n```\n$ man -S2 read\n```\n\nThe\
    \ command **man -S3 fopen fread strcmp** sequentially displays man pages for three\
    \ C library calls: **fopen**, **fread**, and **strcmp**.\n\nTo exit from the display\
    \ of these system calls, type <Ctrl-C>.\n\nUsing the **man** command and typing\
    \ the command with the **-k** option, allows specifying a keyword that limits\
    \ the search. It is equivalent to using the **apropos** command. The search then\
    \ yields useful man page headers from all the man pages on the system that contain\
    \ just the keyword reference. For example, the following command yields the on-screen\
    \ output on our Raspberry Pi system:\n\n```\n$ man -k passwd\nchgpasswd (8)  \
    \        - update group passwords in batch mode\nchpasswd (8)           - update\
    \ passwords in batch mode\nexim4_passwd (5)       - Files in use by the Debian\
    \ exim4 packages\nexim4_passwd_client (5) - Files in use by the Debian exim4 packages\n\
    fgetpwent_r (3)        - get passwd file entry reentrantly\ngetpwent_r (3)   \
    \      - get passwd file entry reentrantly\ngpasswd (1)            - administer\
    \ /etc/group and /etc/gshadow\nopenssl-passwd (1ssl)  compute password hashes\n\
    pam_localuser (8)      - require users to be listed in /etc/passwd\npasswd (1)\
    \             - change user password\npasswd (1ssl)          - compute password\
    \ hashes\npasswd (5)             - the password file\npasswd2des (3)         -\
    \ RFS password encryption\nupdate-passwd (8)      - safely update /etc/passwd,\
    \ /etc/shadow and\n                        /etc/group\nvncpasswd (1)         \
    \ - VNC Server password utility\nOutput truncated...\n```\n\n### 0.2.6 Other Methods\
    \ of Obtaining Help\n\nTo get a short description of what any particular Raspberry\
    \ Pi OS command does, you can use the **whatis** command. This is similar to the\
    \ command **man -f**. The general syntax of the **whatis** command is as follows:\n\
    \n**whatis keywords**\n**Purpose:** Search the whatis database for abbreviated\
    \ descriptions of each keyword\n**Output:** Prints a one-line description of each\
    \ keyword to the screen\n\nThe following is an illustration of how to use **whatis**-\n\
    The output of the two commands are truncated.\n\nRaspberry Pi OS System Administration\
    \ with systemd and Python\n\n```\n$ whatis man\nman (7) - macros to format man\
    \ pages\nman (1) - an interface to the on-line\n          reference manuals\n\
    $\n```\n\nYou can also obtain short descriptions of more than one command by entering\
    \ multiple arguments to the **whatis** command on the same command line, with\
    \ spaces between each argument. The following is an illustration of this method:\n\
    \n```\n$ whatis login set setenv\nlogin (1) - begin session on the system\nlogin\
    \ (3) - write utmp and wtmp entries\nsetenv (3) - change or add an environment\
    \ variable\nset: nothing appropriate.\n$\n```\n\nThe following in-chapter exercises\
    \ ask you to use the **man** and **whatis** commands to find information about\
    \ the **passwd** command. After completing the exercises, you can use what you\
    \ have learned to change your login password on the Raspberry Pi OS that you use.\n\
    \n### In-Chapter Exercises\n\n- 10. Use the **man** command with the -k option\
    \ to display abbreviated help on the **passwd** command. Doing so will give you\
    \ a screen display similar to that obtained with the **whatis** command, but it\
    \ will show all apropos command names that contain the characters passwd.\n- 11.\
    \ Use the **whatis** command to get a brief description of the **passwd** command\
    \ shown above, and then note the difference between the commands **whatis passwd**\
    \ and **man -k passwd**.\n\n### 0.3 Utility Commands\n\nThere are several important\
    \ commands that allow the beginner to be more productive when using a Raspberry\
    \ Pi OS. A sampling of these kinds of utility commands is given in the following\
    \ sections, and is organized as system setups, general utilities, and communications\
    \ commands.\n\n### 0.3.1 Examining System Setups\n\nThe **whereis** command allows\
    \ you to search along certain prescribed paths to locate utility programs and\
    \ commands, such as shell programs. The general syntax of the **whereis** command\
    \ is as follows:\n\n**whereis [options] filename**\n**Purpose:** Locate the binary,\
    \ source, and man page files for a command\n**Output:** The supplied names are\
    \ first stripped of leading pathname components and extensions, then pathnames\
    \ are displayed on screen\n\n**Commonly used options/features:**\n**-b** Search\
    \ only for binaries\n**-s** Search only for source code\n\nFor example, if you\
    \ type the command **whereis bash** on the command line, you will see a list of\
    \ the paths to the Bash shell program files themselves, as follows:\n\n```\n$\
    \ whereis bash\nbash: /bin/bash /etc/bash.bashrc /usr/share/man/man1/bash.1.gz\n\
    ```\n\nNote that the paths to a “built-in”, or internal, command cannot be found\
    \ with the **whereis** command.\n\nWhen you first log on, it is useful to be able\
    \ to view a display of information about your **userid**, the computer or system\
    \ you have logged on to, and the operating system on that computer. These tasks\
    \ can be accomplished with the **whoami** command, which displays your **userid**\
    \ on the screen. The general syntax of the **whoami** command is as follows:\n\
    \n**whoami**\n**Purpose:** Displays the effective user id\n**Output:** Displays\
    \ your effective user id as a name on standard\n\nThe following shows how our\
    \ system responded to this command when we typed it on the command line.\n\n```\n\
    $ whoami\nbob\n$\n```"
