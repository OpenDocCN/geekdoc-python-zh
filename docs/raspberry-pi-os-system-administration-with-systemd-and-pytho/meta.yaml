    \n此外，上述位置使用以下具体技术。我们将在下面的章节中描述其中一些重要的技术。其中一些技术的进一步阐述在第1.15.2节“访问控制凭证：自主（DAC）、强制（MAC）和基于角色（RBAC）”中给出。\n\
