    \nConclusion: We assigned several IP addresses on our LAN for our Raspberry Pi\
    \ system.\n\n## 1.15 System Security\n\nThere are two meanings of the word “security”\
    \ relevant here, when referring to computers such as the Raspberry Pi. We will\
    \ consider only one of them.\nThe first meaning denotes reliability. In other\
    \ words, the files and data on the disks can be relied upon to be persistent over\
    \ time. That is the objective of not only having persistent media, but also of\
    \ backing up the operating system itself, and the user files and data. For example,\
    \ if the operating system crashes and cannot be brought back to the exact state\
    \ it was before the crash, the user files and data are archived, secure, and can\
    \ be recovered in total.\n\nThe second meaning denotes free from malicious intrusion\
    \ by agents (such as robotic cracker programs) or objects (such as the processes\
    \ that are the basis of program execution) that do *not* have the authority to\
    \ access a specific part of the system, or any of its components, files, or data.\
    \ The reasons for implementing system security in this second sense, both for\
    \ an ordinary, single-user system, and in a multi-user environment, should be\
    \ very obvious to the beginner. Especially in the light of contemporary privacy\
    \ issues, and the widespread hacking and system penetration forces prevalent on\
    \ the Internet currently.\n\nSince we've already dealt with the issues of persistent\
    \ media in the previous sections, here in this section we deal primarily with\
    \ the second meaning of computer security.\n\nFundamentally, according to this\
    \ second meaning, there are at least four places where you can situate system\
    \ security measures as we show them in this section. They are as follows:\n\n\
    1.  At the Process Level: The process model of the Raspberry Pi OS makes this\
    \ site most important. This model dictates security implemented on processes,\
    \ via authentication and credentialing techniques. Processes that are the basis\
    \ for program execution, and that bridge kernel and user spaces. Examples of these\
    \ measures are:\n    * Setting traditional UNIX permission bits (rwx), the special\
    \ permission bits SUID, SGID, and the sticky bit. The setting of permission bits\
    \ implies that the processes that shell commands create, are the real objects\
    \ that the permission bits files possess are aimed at, or applied to. This is\
    \ true of everything that creates processes in the Raspberry Pi OS, which means\
    \ user-written programs, and all other applications programs and system programs\
    \ as well.\n    * Deployment of ACLs, either extended POSIX1.e ACLs or NFSv4 ACLs,\
    \ as detailed in Volume 1.\n    * Use of Linux-specific \"capabilities\" applied\
    \ to processes, as detailed in the sections below.\n    * Namespace isolation\
    \ of processes, using the Linux kernel namespace API, and the six major implementations\
    \ of it.\n2.  At the Physical Level: When someone sits directly in front of the\
    \ Raspberry Pi and tries to log in and use it. One of the ways that can be accomplished\
    \ is through the use of password protection into user accounts. On a public computer\
    \ system (which is kind of rare as far as we know for a Raspberry Pi!), this is\
    \ the most valuable way to maintain general access security, and user/account\
    \ security. There are also many security techniques in this place that limit physical\
    \ access to the hardware of the system, such as locking the door to the room you\
    \ keep the machine in, or having protocols in place for limiting physical access\
    \ to the machine.\n3.  At the Network Level: By placing safeguards on the computer’s\
    \ network connection. This is accomplished using various forms of not only monitoring\
    \ with systemd journalctl, and using the many forms of intrusion detection, but\
    \ also with the intrusion prevention systems we illustrate below.\n4.  At the\
    \ Persistent Media Level: On the persistent media attached, either physically\
    \ or virtually, to the computer itself. These techniques are applied to the boot/system\
    \ medium, and other attached media such as user data disks, or mounted network\
    \ file systems (NFS). Examples of this are the use of virtualized “sandboxed”\
    \ machines on traditional volumes, or on ZFS volumes, and the various domains\
    \ of disk data encryption shown below.\n\nFurthermore, the above sites use the\
    \ following specific techniques. We will describe some of the important ones in\
    \ the sections below. A further elaboration of some of these techniques is given\
    \ in Section 1.15.2, entitled “Access Control Credentials: Discretionary (DAC),\
    \ Mandatory (MAC), and Role-Based (RBAC)”.\n\n- Password-based authentication\n\
    - Access control, either discretionary (DAC), mandatory (MAC), or role-based (RBAC)\n\
    - The **sudo** command\n- Setting POSIX1.e ACLs and extended ACLs, and NFSv4 ACLs\
    \ for files and directories\n- Intrusion Detection and Intrusion Prevention\n\
    - Security Software\n- ufw System Firewall\n- Process Credentialing\n- User namespace\
    \ process isolation\n- Whole disk, partition, directory, or file-level data encryption\n\
    \n### 1.15.1 Password-Based Authentication\n\nThe first line of defense in system\
    \ security, and the technique employed almost universally across many types of\
    \ computer system, is password-based authentication. The Raspberry Pi OS compares\
    \ a user-entered password at login for a user’s ID, compares the password to a\
    \ previously established and stored one held in a password file for that user,\
    \ and based on the comparison,"
