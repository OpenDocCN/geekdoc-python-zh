    \ on your display in the Thonny Shell Area:\n\n```\n>>> %Run two7.py\nw is less\
    \ than 37\ny is equal to 13\nz is less than 21\n>>>\n```\n\n## 2.4.5 Determinate\
    \ and Indeterminate Repetition Structures and Recursion\n\nUsing the procedural/imperative\
    \ model, Python3 can repeat segments of program or script file structures in two\
    \ basic ways: via *determinate repetition structures* or *indeterminate repetition\
    \ structures*. Traditionally, a determinate repetition structure is called *counting\
    \ repetition*, and an indeterminate repetition structure is called *logical repetition*.\
    \ These two methods are implemented with the **for** procedural statement, and\
    \ the **while** procedural statement. Generally, if you know ahead of time (for\
    \ example, at the time you are writing the code) how many repetitions of a block\
    \ of code you want to execute, you use the **for** statement, and if you do *not*\
    \ know (when, for example, you allow the user to input the number of repetitions\
    \ as the script file is run), you use the **while** statement.\n\nOf course, it\
    \ is possible to implement the same two ways of repetition by *not* using a specific\
    \ structured programming approach; for example, by using conditional execution,\
    \ and unstructured switching to obtain the same results. This is not good practice,\
    \ and we choose to show the structured approach in Python3.\n\nMake sure that\
    \ in the body of statements included in the indeterminate repetition block that\
    \ **while** is executing, the test condition for continued execution becomes false.\
    \ Otherwise, this will result in *infinite repetition*! To halt infinite repetition\
    \ in an executing script file, hold down the <Ctrl> and C keys on the keyboard\
    \ at the same time.\n\nA note about Python3 style is in order at this point.\n\
    \n### Pythonic\n\nProceeding from Guido van Rossum's definition of *Pythonic*\
    \ in the Python Language Reference, a common technique in Python3 is to loop over\
    \ all elements of an *iterable* object using a **for** statement. Many other languages\
    \ do not have this type of construct, so people unfamiliar with Python3 sometimes\
    \ use a numerical counter instead, such as:\n\n```\n>>>for i in range(len(money)):\n\
    ... print money[i]\n```\n\nThe Pythonic way is:\n\n```\n>>>for bills in money:\n\
    ... print (bills)\n```\n\nThe Pythonic way can be characterized as *iteration*,\
    \ whereas the traditional language construct can be characterized as *counting*.\n\
    The **for** structure can repeat a block of operations on any *iterable* sequence\
    \ data, such as strings, lists, tuples, or user-defined iterable objects in classes.\n\
    The general form of the **for** statement structure is as follows:\n\n```\nfor\
    \ a certain number of times\n    repeat these statements\n```\n\nThe **while**\
    \ structure can repeat a block of operations as long as a test condition is true.\n\
    The general form of the **while** statement structure is:\n\n```\nwhile a certain\
    \ condition is true\n    repeat these statements\n```\n\nAn object, K is iterable\
    \ if it can be successfully run with the following code in Way 2 (Script Mode).\
    \ This code also shows that a counting form of iteration, such as the traditional\
    \ **for** loop structure, can be implemented with a **while** structure. No need\
    \ to type the comments into the Thonny Script Area, and to run the code, click\
    \ on the Toolbar Run Icon-\n\n```\nK = [22,33,44,55]        #Lists are iterable.\n\
    c = K.__iter__()          #c is the counter\nwhile 1:                  #execute\
    \ while true\n    try:\n        item = next(c)     #get the next one\n       \
    \ print (item)       # Do operations on each item as you count through\n    except\
    \ StopIteration:  #Nothing left\n        break\n```\n\n```\n>>> %Run -c $EDITOR_CONTENT\n\
    22\n33\n44\n55\n>>>\n```\n\nFollowing are two simple examples of both forms of\
    \ repetition. We use Way 2 (Script Mode) to run them.\n\nType the following three\
    \ lines of code into the Thonny Script Area. Notice that the keywords in the Python\
