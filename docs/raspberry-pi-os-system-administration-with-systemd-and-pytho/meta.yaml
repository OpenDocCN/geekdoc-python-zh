    ## “Quick Start” into Sysadmin for the Raspberry Pi OS


    In this introductory chapter, duplicated in the first volume of this series, we
    cover the essential Raspberry Pi OS commands that allow a system administrator
    to do file maintenance and perform other useful operations. This is a mandatory
    set of essentials that even an ordinary, non-administrative user would need to
    know to work efficiently in a character- or text-based interface to the operating
    system. It should be evident to the reader, after completing this chapter, that
    correctly deployed, text-based commands are the predominant means that a system
    administrator has at her disposal to maintain the integrity of the system. We
    give a set of core examples, and show the basic format of essential commands and
    primitives here.


    **Objectives:**


    To explain how to manage and maintain files and directories

    To show where to get system-wide help for Raspberry Pi OS commands

    To demonstrate the use of a beginner’s set of utility commands

    To cover the basic commands and operators:


    **cat cd cp exit hostname -l ip login lp lpr ls man mesg mkdir more mv passwd
    PATH pwd rm rmdir telnet unalias uname whatis whereis who whoami**


    ### 0.1 Introduction


    To start working productively with system administration on the Raspberry Pi OS,
    the beginner needs to have some familiarity with these sequential topics, as follows:


    1. How to maintain and organize files in the file structure of the operating system.
    Creating a tree-like structure of folders (also called directories), and storing
    files in a logical fashion in these folders, is critical to working efficiently
    in the Raspberry Pi OS.

    2. How to get help on text-based commands and their usage. With keyboard entry,
    in a command-based, Character User Interface (CUI) environment, being able to
    find out, in a quick and easy way, how to use a command, its options, and arguments
    by typing it on the keyboard correctly, is imperative to working efficiently.

    3. How to execute a small set of essential utility commands to set up or customize
    your working environment. Once a beginner is familiar with the right way to construct
    file maintenance commands, adding a set of utility commands makes each session
    more productive.


    To use this chapter successfully as a springboard into the remainder of the book,
    you should carefully read, follow, and execute the instructions and command line
    sessions we provide, in the order presented. Each section in this chapter, and
    the two subsequent chapters as well, builds on the information that precedes it.
    They will give you the concepts, command tools, and methods that will enable you
    to do system administration using the Raspberry Pi OS.


    Throughout this book, we illustrate everything using the following version of
    the Raspberry Pi OS, on the hardware listed:


    ```

    System: raspberrypi Kernel: 6.1.21-v8+ aarch64 bits: 64 compiler: gcc v: 10.2.1
    Console: tty0 Distro: Debian GNU/Linux 11 (bullseye)

    Machine: Type: ARM Device System: Raspberry Pi 400 Rev 1.0

    ```


    In this chapter, the major commands we want to illustrate are first defined with
    an abbreviated syntax description, which will clarify general components of those
    commands. The syntax description format is as follows:


    - **Syntax:** The exact syntax of how a command, its options, and its arguments
    are correctly typed on the command line

    - **Purpose:** The specific purpose of the command

    - **Output:** A short description of the results of executing the command

    - **Commonly used options/features:** A listing of the most popular and useful
    options and option arguments


    In addition, the following web link is to a site that allows you to type-in a
    single or multiple Raspberry Pi OS command, and get a verbose explanation of the
    components of that command:


    https://explainshell.com/'
