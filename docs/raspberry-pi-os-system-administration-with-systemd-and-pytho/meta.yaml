    to 2

    zfs destroy name Destroys, or removes, a dataset name

    zfs list Lists all datasets

    zfs rollback name Returns dataset name to a previous snapshot state


    # 1.9.3 ZFS Terminology


    The following describes the basic terminology used throughout this section, and
    as it applies to ZFS practice in general as well:


    Boot environment: A boot environment is a bootable environment consisting of a
    ZFS root file system and, optionally, other file systems mounted underneath it.
    Exactly one boot environment can be active at a time.


    > ***Warning***: This warning applies at the time of the writing of this book,
    and it is important to realize that if you want to create and use ZFS on any system
    other than for the practice Example 1.7 below, you must have an additional storage
    device, or devices, attached to your hardware. This could be additional externally
    mounted SSDs, M.2 NVM.e devices hard drives, or USB2 or USB3 thumb drives. We
    have found that if you attempt to create zpools on your system or boot disk, this
    will render that disk unbootable!


    Checksum: A 256-bit hash of the data in a file system block. The checksum capability
    can range from the simple and fast fletcher4 (the default) to cryptographically
    strong hashes such as SHA256.


    Clone: A file system whose initial contents are identical to the contents of a
    ZFS snapshot.


    Dataset: A generic name for the following ZFS components: clones, file systems,
    snapshots, and volumes. Each dataset is identified by a unique name in the ZFS
    name space. Datasets are identified using the following format:'
  merge: -1
