  - "[PAGE 70]\n\n# newusers - update and create new users in batch mode\n\n**Syntax:**\
    \ newusers [options] [file]\n\n**Purpose:** The newusers command reads a file\
    \ (or the standard input by default) and uses this information to update a set\
    \ of existing users or to create new users. Each line is in the same format as\
    \ the standard password file, as follows:\npw_name:pw_passwd:pw_uid:pw_gid:pw_gecos:pw_dir:pw_shell\n\
    where pw_name is the name of the user you want to create,\npw_passwd is the password,\n\
    pw_uid is the UID,\npw_gid is the GID,\npw_gecos is an identifying comment,\n\
    pw_dir is the home directory path,\npw_shell is the new users default shell.\n\
    \n**Common Options:**\n\n+   - **-h, --help**\n  Display help message and exit.\n\
    - **-r, --system**\n  Create a system account.\n\nExample 1.2 Creating Several\
    \ New Users in \"Batch\" Mode\n\n+   1. Use your favorite text editor to create\
    \ the following file, named \"dev_grp.txt\" in your home directory. Feel free\
    \ to add more lines similar to the one shown to add more new users to the listing.\n\
    \n```\nhassan:QQQ:2001:2001:CFO of Accounting:/home/hassan:/bin/bash\n```\n\n\
    The seven fields of the above line, separated by colons (:), are the new user\
    \ accounts name, password, UID, GID, GECOS commentary, default home directory,\
    \ and default shell.\n\n+   2. Use the following command to create the user(s)\
    \ encoded in the file dev_grp.txt:\n\n```\n$ sudo newusers dev_grp.txt\n[sudo]\
    \ password for bob: qqq\n$\n```"
