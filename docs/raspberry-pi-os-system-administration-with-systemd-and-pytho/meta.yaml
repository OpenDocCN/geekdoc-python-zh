    # 2.5.3.4 General Form of a Widget Call and a Primary Example


    As shown in Section 2.5.3.2, there are several parts to tkinter widget GUI script
    file construction, but the basic parts follow this outline:


    +   1. Generating data.

    2. Constructing your widgets, using a set of universal constructor tools and the
    tkinter widget method set.

    3. “Hooking” the data of the first part to the widget constructors of the second
    part, all within the context of an infinite (but indeterminately interrupted)
    event-loop.


    In this section, we show the general form of widget instancing. We then show an
    outline of tkinter GUI scripting, and also a primary example of one.


    tkinter widgets can be constructed to display and be hooked up to your Python3
    application code, either using purely OOP, or they can be constructed using a
    procedural/imperative programming approach.


    As stated in Section 2.5.3.2, we choose the latter approach because it’s easier
    for beginners. By the time you do all the examples we present here, you should
    be able to see that OOP is an essential, but not mandatory, part of tkinter GUI
    programming.


    The general form of using a tkinter widget is as follows:


    ```

    >>> widget = Widget.method (master, option=value, option=value,...)

    ```


    where:


    **widget** is the name assigned in your Python3 script to the particular instance
    you are creating and using


    **Widget** is the master instance of a widget class in the tkinter module'
