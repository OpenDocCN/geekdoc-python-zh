  md: '# 2.4.12 Generators


    A Python functional technique of program execution, that uses the advanced programming
    methodologies of data flows, streams, and process pipelines, and preserves the
    state of the “propagation” of output as it executes in a “stepwise” fashion, is
    called a *generator*. A generator produces a collection of output results only
    when a method named **next()** in Python3 is called. The **next()** method is
    executed by the Python3 **yield** statement. When a collection of data needs to
    be created on the fly, perhaps in single steps (“stepwise”), at a particular time
    during program execution, the generator function is called. The **next()** built-in
    function steps you through, and generates the output.


    > ***Note***

    The techniques shown in this, and the following section are necessarily for more
    advanced programming applications.


    The following Example 2.20 shows how to create and invoke a generator function.
    It’s helpful to dissect this example into its component parts, as shown on the
    Thonny Shell Area, as follows:


    +   a. Propagation, or generation, then

    b. Invocation with a seed value of 4, then

    c. Invocation again with a seed value of 6, then

    d. Output


    # Example 2.20


    ```

    >>> def generadd(Q):

    ...     for i in range(Q):

    ...         yield i  #generates the next value

    ...         i += 1

    ...

    >>> for i in generadd(4): #whenever function is called, #the values are generated

    ...     print(i)

    ...

    0

    1

    2

    3

    >>> z = generadd(6) #this passes 6 to generadd

    >>> z               #this will show you the compiled generator object

    <generator object generated at 0x284f60f4>

    >>> next(z)         #the next built-in steps you through and generates the value

    ```'
