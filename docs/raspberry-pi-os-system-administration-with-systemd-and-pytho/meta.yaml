    \ only those certain users can read, write, and execute the files in it. The room\
    \ is open to the public, but to login to the computer, each individual user has\
    \ to use her own password.\n\n## 1.5.3 Modifying and Deleting a User Account and\
    \ Group from the Command Line\n\nTo effectively delete a user account or a group\
    \ from the system using the command line, use the **deluser** or **delgroup**\
    \ commands. A brief description of those commands, taken from the man pages on\
