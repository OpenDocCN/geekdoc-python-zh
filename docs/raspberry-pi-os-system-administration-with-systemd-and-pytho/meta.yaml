    \ apt update\n    root@raspberrypi:~# apt upgrade\n    root@raspberrypi:~# apt\
    \ dist-upgrade\n    ```\n\n2. 主版本升级过程最好在你想进行升级时查阅在线文档，并且当然受上述第 1 点的约束。\n\n## 章节内练习\n\
    \n- 30. 创建一个文档，详细说明升级你的树莓派系统必须采取的确切步骤，涵盖软件的次版本和主版本。你的程序步骤安排应反映，例如，次版本更改的每周或每月基础，或主版本更改的某个未指定间隔。然后，实施你的文档指定的程序。\n\
    \n## 1.14 系统与软件性能监控与调整\n\n树莓派操作系统管理员（以及在自己计算机上的普通单用户）在处理系统性能时必须考虑的最重要事项围绕着 CPU\
    \ 进程管理、内存管理、磁盘使用/管理和网络性能。表 1.8 列出了树莓派操作系统为系统调优和性能监控提供的控制设施和功能，最值得注意的是，如果内核可加载的\
    \ ZFS 组件最终变得稳定且易于实现，则会添加该组件。\n实现并影响表 1.8 中某些功能的命令以粗体显示在下方。我们还包括允许你监控这些功能的命令。我们将在以下部分介绍其中一些命令。systemd\
    \ 特定的命令在第 1 卷第 2 章中有详细介绍。\n\n```\ndf, du, free, journalctl, nice, pgrep, ps, renice,\
