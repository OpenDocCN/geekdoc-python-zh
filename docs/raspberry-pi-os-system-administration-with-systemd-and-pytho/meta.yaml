    ```


    The asterisk following the y on the command line is known as a *metacharacter*,
    or a character that represents a pattern; in this case, the pattern is any set
    of characters. When Raspberry Pi OS interprets the command after you press the
    <Enter> key on the keyboard, it searches for all files in the current working
    directory that begin with the letters my and end in anything else.


