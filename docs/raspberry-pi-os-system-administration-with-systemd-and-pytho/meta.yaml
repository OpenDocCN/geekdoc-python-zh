    \ interactive command line, or in the Thonny Script Area, we will indicate what\
    \ is to be typed in **bold** text. In addition, output from Python will be shown\
    \ in unbolded text.\n\n## 2.3.6 Running Python3 Using Our Standard Ways\n\nThe\
    \ following subsection illustrates the ways that we use Thonny to run Python3\
    \ on our Raspberry Pi systems.\n\n### Way 1 (Interactive Mode)\n\nIn the Shell\
    \ Area of Thonny, you type a single line of Python code on the Python command\
    \ line (>>>), or maybe multiple lines of Python3, and see the results immediately.\
    \ A good reason to use this mode is that you can test small fragments of Python3\
    \ code, one line, or a couple of lines, at a time, directly in the current Python\
    \ interpreter which is either the default Python3 interpreter, or another one\
    \ that you've installed and selected. A simple example of this (seen in the Thonny\
    \ Shell Area) would be as follows:\n\n```\n>>>print(\"How about some more?\")\n\
    How about some more?\n>>>\n```\n\nRemember, to submit a line of Python code to\
    \ its interpreter, at the end of the line, press <Enter> on the keyboard.\n\n\
    ### Way 2 (Script Mode)\n\nYou type possibly multiple, properly formatted, and\
    \ syntactically correct Python3 commands into the Thonny Script Area. This is\
    \ traditionally called a *script file* (perhaps saved and named **first.py**).\
    \ Then you click on the Thonny Run Toolbar icon, and the results of the execution\
    \ of the Python3 commands are seen. Generally, those results scroll by in the\
