  mdcn: "# 使用 systemd 和 Python 进行 Raspberry Pi OS 系统管理\n\n实用方法\n\nRobert M. Koretsky\n\
    \n![](img/7ffbe025fa2ba956525d0c51169283f3_0_0.png)\n\nCRC Press\nTaylor & Francis\
    \ Group\nA CHAPMAN & HALL BOOK\n\n# 使用 systemd 和 Python 进行 Raspberry Pi OS 系统管理\n\
    \n这是探索 Raspberry Pi 操作系统管理基础知识的新系列中的第二册，本册在第一卷提供的见解基础上，为新手用户提供了一份易于使用且必不可少的 Raspberry\
    \ Pi 系统管理指南，特别侧重于 Python 和 Python3。\n\n现代 21 世纪 Linux 系统（如 Raspberry Pi OS）系统管理背后的核心理念是使用\
    \ systemd 来确保 Linux 内核高效、有效地工作，从而提供计算机操作和管理的这三块基石：计算机系统并发性、虚拟化和安全持久性。全书包含练习，以强化读者的学习目标，并在配套的\
    \ GitHub 网站上提供解决方案和示例代码。\n\n本书面向希望最大化利用 Raspberry Pi OS 的学生和从业者。凭借大量实用示例、项目和练习，本卷也可用于更正式的学习环境，以补充和扩展\
    \ Linux 操作系统的基础知识。\n\n**Robert M. Koretsky** 是波特兰大学工程学院机械工程系的退休讲师。他此前曾在俄勒冈州波特兰市的\
    \ Freightliner 公司担任汽车工程设计师。他已婚，有两个孩子和两个孙辈。\n\n# 使用 systemd 进行 Raspberry Pi OS\
    \ 系统管理\n\n实用方法\n\n系列编辑：Robert M. Koretsky\n\n使用 systemd 进行 Raspberry Pi OS 系统管理：实用方法\n\
