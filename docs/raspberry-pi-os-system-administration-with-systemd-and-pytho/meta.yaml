    appears on screen, as shown in Figure 1.6. The defaults for the new partition,
    as seen in Figure 1.6, are to take the whole disk up with this partition, create
    it as a primary partition, and create the file system on it as ext4.

    12. Add any label designation of your choice in the Label field, so that you can
