    \ 模块提供了用于处理多个控制线程（也称为*轻量级进程*或*任务*）的低级原语，这些线程共享其全局数据空间。为了同步，该模块的类和方法中提供了简单的锁（也称为*互斥锁*）。\n\
    \n### 2.5.4.1.1 _thread 函数参考\n\n由于基本的 **_thread** 模块比下一小节中介绍的更高级的 **threading**\
