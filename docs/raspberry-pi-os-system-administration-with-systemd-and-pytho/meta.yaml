    +   10. The new disk should now be shown as unallocated. Click on its listing
    in the main Gparted pane. Make the pull-down menu choice Device > Create Partition
    Table. The new partition table type shows msdos. That’s good for us. Click Apply
    in the warning window. Everything on that disk will be erased! When Gparted has
