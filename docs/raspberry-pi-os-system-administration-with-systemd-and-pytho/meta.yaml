    [GCC 10.2.1 20210110] on linux

    Type "help", "copyright", "credits" or "license" for more information.

    >>>

    ```


    The three greater-than symbols (>>>) are the Python interpreter prompt, letting
    you know you are in Python! To exit to the command line prompt in the terminal
    window, press <Ctrl-D> after the >>>.'
