    当你添加新介质时，可以选择使用传统的磁盘分区方法，通过命令行工具如**fdisk**或**gdisk**，或者选择使用基于图形用户界面的方法，通过Gparted等工具。我们在第一卷中展示了使用Gparted的基础知识。并且，正如我们在以下章节中所示，你可以使用传统的ext4文件系统方案来实现我们推荐的数据存储模型。我们提供了一个示例，详细说明如何使用传统ext4方案来完成此操作。


