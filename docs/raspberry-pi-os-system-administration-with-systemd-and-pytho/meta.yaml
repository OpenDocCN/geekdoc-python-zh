    ## 1.4 System Services Administration, Startup, and Shutdown Procedures


    What you have to think about first, in terms of system “booting” as it’s generally
    called, is:

    “How do you want the system to boot?”


    As stated above in Section 1.3, that is one of the most important pre-installation
    considerations you have to make. There are a few options, and the details of them,
    especially for an ARM-architecture machine, are complex.

    This section gives an overview of the general procedures for booting, managing
    the startup process, and gracefully shutting down the Raspberry Pi OS, given how
    you''ve answered the above question. It gives a brief summary overview of the
    steps that the operating system and hardware go through in successfully starting
    up and shutting down. It then gives some further references to the basic but important
    systemd services administration utilities available to a system administrator.
    In those further references, we give examples of commands for manipulating and
    changing system services by enabling and running new services.


    ### 1.4.1 The Boot and Startup Processes


    The Raspberry Pi 4B and 400 use an EEPROM to boot the system. Here are the general
    steps that the Raspberry Pi OS goes through to boot up:


    1.  When the Raspberry Pi is first turned on, the ARM core is off, and the GPU
    core is on. At this point the SDRAM is disabled.

    2.  The ROM on the SoC initiates the first stage of booting.

    3.  The boot behavior for a microSD or USB boot is controlled by a configuration
    file in the EEPROM, and can be edited via the rpi-eeprom-config tool, with the
    command `sudo -E rpi-eeprom-config --edit`


    The EEPROM second stage consists of the following steps:

    a. Initialize clocks and SDRAM.

    b. Read the EEPROM configuration file.

    c. Determine if booting should be a restart/stop, or from microSD card, the network,
    a USB device, or an PCIe NVME device.


    The Raspberry Pi 400''s boot process, for example, is similar to other Linux-based
    computers, with the main differences being that:

    a. it traditionally, by default, uses a microSD card as its primary storage device,
    and boot medium, or alternate sources, and

    b. is controlled by an EEPROM.


    The term “booting” is used here to mean bringing the operating system from a complete
    power-off condition to a point where systemd can take over. Then in “startup”,
    systemd brings the computer to a steady-state, fully normal operating condition.

    When a system hangs up during the shutdown procedure, a contemporary way of diagnosing
    the problem is to examine the systemd journal, with the `journalctl` command,
    as shown in Volume 1. This way, if some process or program is preventing the system
    from reaching a powered-off condition, the journal logs will allow you to see
    what that process or program that’s causing the problem is. On shutdown, systemd
    attempts to stop all services, and unmount all file systems. The system is finally
    powered down. We give more details of how a Raspberry Pi system using systemd
    shuts down in the next section.


    ## In-Chapter Exercises


    3.  How can you boot into an alternative environment found on another boot medium
    on your Raspberry Pi, and in which phase of the bootup process shown in Figure
    1.1 might this alternative method be presented to you? Why would you want to do
    this? Make note of exactly how this might be done on the Raspberry Pi OS. Also,
    draw an arrow, or arrows, in Figure 1.1 that would specify what path would be
    followed if the system were to be rebooted rather than powered-off.


    4.  Which methodology of booting (from a traditional microSD, USB3-mounted SSD,
    NMVe M.2 device, or a network) would allow you to test drive different Raspberry
    Pi OS versions in the quickest and easiest way on the same piece of hardware?
    **And not necessarily on Raspberry Pi hardware.** Sketch exactly how this would
    be accomplished, given your choice. (Note: *Not simultaneously, but sequentially!*)


    ### 1.4.2 systemd and Traditional System Reboot or Shutdown


    systemd is in charge of taking the system from the normal operating condition
    to a power-off state, or to reboot the system. The relevant systemd **systemctl**
    commands, with their options, that achieve shutting the system down or rebooting
    it, and briefly what they accomplish, are shown in Table 1.1. We described these
    commands and the systemd shutdown process further in Volume 1. The systemd shutdown
    path through possible target states, from a normal operating condition, to a powered-off
    state, is described in Figure 1.2.


    Traditionally, the graceful shutdown or reboot procedures can be done graphically
    from the active window system, or from the command line or console window, using
    the **halt** or **shutdown** commands and their options. The **shutdown** command
    has the advantage of allowing you to specify a time when shutdown processes are
    initiated.


    Graceful shutdown procedures are generally done as follows:

    1.  Shutdown system and user processes

    2.  Flush system memory to disk

    3.  Unmount file systems

    4.  Power off


    **TABLE 1.1**

    **systemd systemctl Shutdown Commands**


    | Command | Description |

    | :--- | :--- |

    | **systemctl halt** | Halts the system |

    | **systemctl poweroff** | Powers off the system |

    | **systemctl reboot** | Restarts the system |

    | **systemctl suspend** | Suspends the system |

    | **systemctl hibernate** | Hibernates the system |

    | **systemctl hybrid-sleep** | Hibernates and suspends the system |'
