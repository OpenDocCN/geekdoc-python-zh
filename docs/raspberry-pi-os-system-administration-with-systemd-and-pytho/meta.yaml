    \n    def displayStructure(s):\n        print (\"Name: \", s.name, \", Number:\
    \ \", s.number)\n```\n\n然后，在Thonny中，使用方式3（导入脚本模式），我们将在下面更完整地定义它，来运行**firstclass.py**。\n\
    \n在Thonny Shell区域，输入以下内容（你可以省略注释）：\n\n```\n>>> import firstclass\n>>> Stru1 =\
