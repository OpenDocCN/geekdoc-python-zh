    \ print \"You could have comments appear like this:\" # this comment is ignored.\n\
    You could have comments appear like this:\n>>> # You can also use the pound sign\
    \ to comment out a piece of code:\n...\n>>> # print \"This won't run\".\n...\n\
    >>> print \"This will run\".\nThis will run.\n>>>\n```\n\nIn the interactive session\
    \ above, just press <Enter> on the Python command line when the ... appears.\n\
    \nQuotation marks are used for “string literals”, or characters of text you want\
    \ to include “literally” as they are in the output of an executed Python script\
