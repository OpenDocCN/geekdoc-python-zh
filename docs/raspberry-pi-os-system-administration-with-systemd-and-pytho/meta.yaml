    \ /run/lock\n/dev/sda1    vfat      253M   31M   222M   13%   /boot\ntmpfs   \
    \     tmpfs     380M   32K   380M   1%    /run/user/1000\n$\n```\n\n更现代的图形方法可用于查看和评估树莓派系统上的磁盘使用情况。例如，你可以使用名为“Baobab”的\
    \ GNOME 磁盘使用分析器。它以条形图或扇形图的形式显示任何已连接持久介质的相对磁盘使用情况。当你想了解磁盘被用于何处以及用于什么时，此工具非常有用。图\
    \ 1.11 显示了同一台树莓派 400 系统上根目录的典型磁盘容量显示。所有 Linux 系统上都有类似的工具。另一个有用的摘要工具类似于 Gparted，是\
    \ gnome-disk-utility，可从首选项菜单启动。\n\n## 1.14.4 使用 ip 命令进行网络配置\n\n系统管理员在进行安装后网络配置时，最重要且最有用的命令是\
