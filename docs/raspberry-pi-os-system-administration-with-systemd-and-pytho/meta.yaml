    8. From the pull-down menus at the top of the Gparted window, make the menu choice
    Partition > Unmount. Then click on the red X in the icon bar. This will delete
    the partition information on that disk. It is now a pending operation.

    9. In order to execute the pending operation, make the pull-down menu choice Edit
    > Apply All Operations. In the warning window, click Apply. A window appears showing
    you the progress, and hopefully successful application, of the pending operation.
