    desktops, but also for NAS server-class systems as well. The way that your data
    is deployed on your media is a critical design consideration when you are building
    your system, and is highly dependent on the particular use case that is guiding
    it.


    One caveat you must consider when using the above recommended storage model is
    some applications software, most prominently LXC/LXD containers, store required
    files in both the system area and in the data storage area. We supply some useful
    backup strategies for LXC/LXD containers in Volume 3, that work with our recommended
    data storage mode.


    +   4) Do you want to have a wireless connection to a local area network and the
    Internet? A wired connection through DHCP is *not* automatically done on installation
    by the Raspberry Pi OS 64-bit Desktop version, so you must configure the network
    settings during the default install procedure. This wired connection can also
    be configured post-installation, as shown below in Section 1.3.2, item 4). What
    is the IP address of your Raspberry Pi, and is it automatically assigned by the
    DHCP server on your network?


    5) How many users are you going to initially establish at installation, and what
    are their user profiles going to be? For example, what users will have administrative
    privileges other than yourself, and what kind of security will each profile have?
    Integral with these questions are the considerations of the storage model you
    will establish after the initial installation of the operating system on a single
    medium, as defined in 1)b). For example, will all users'' home directories be
    on separate media from the system medium? Also, what user groups are you going
    to establish at installation, and how are you going to manage groups in a post-installation
    environment?


    6) Who will be responsible for the items of systems administration tasks listed
    above in Section 1.0? For example, that will influence your media management tasks
    concerning file systems for users and projects, according to the data storage
    model you employ.


    7) What kind of software tools do you want to include, given the version of the
    Raspberry Pi OS you are going to install, for the kinds of tasks you and your
    user base will be doing? For example, during installation, you are able to add
    packages on top of the default package installation to help accomplish those tasks.
    How are the user groups established in item 5) above going to have access privileges
    to this'
- md: "## In-Chapter Exercise\n\n- 1. Make a detailed listing on paper of your answers\
    \ to the above eight sets of questions before you begin to install your operating\
    \ system. Then, read through the sections below referencing the procedures for\
    \ actual installation, and for each of your answers, determine ahead of time how\
    \ you will proceed through the procedures. This exercise is meant to serve as\
    \ a “dry run” through any particular path you might take through the purchase,\
    \ installation, and usage procedures.\n\n## 1.3.2 Post-Installation Choices and\
    \ Actions\n\nThe highly practical things you do to your Raspberry Pi OS after\
    \ it is installed successfully are *very* dependent upon your individual pre-installation\
    \ considerations, as outlined above in Section 1.3.1, and how you implemented\
    \ those considerations in detail. As presented in the pre-installation considerations,\
    \ you should view the suggested post-installation considerations here as informally\
    \ presented guides to how you can choose certain post-installation aspects of\
    \ your operating system.\n\nOur minimal set of recommendations for post-installation\
    \ tasks are specific to our Raspberry Pi 4B and 400 systems, and their hardware\
    \ configurations. They follow directly from pre-installation considerations we\
    \ made above in Section 1.3.1.\n\n- 1. Our boot/system medium for our Raspberry\
    \ Pi 4B is a 128 GB SSD, and for the Pi 400 a 512 GB SSD, which we connect through\
    \ the USB3 ports, further described below in item 4.\n- 2. Since we installed\
    \ a desktop system on our Pi 400, which was going to heavily rely on a very convenient\
    \ and easy-to-use GUI environment, it wasn’t possible on those particular models\
    \ of the hardware to increase the amount of installed physical memory, to speed\
    \ up this kind of usage. See the output of the **inxi** commands shown immediately\
    \ following these recommendations listing, and In-Chapter Exercise 2, to gain\
    \ more information and insight into how to view physical memory size on your Raspberry\
    \ Pi system.\n\nAs stated above, your particular physical memory needs depend\
    \ upon how you use your Linux system. We had to go with the defaults affecting\
    \ the size of virtual memory, paging, and swap space, although these may be important\
    \ considerations for you depending on the model of Raspberry Pi you have.\n\n\
    - 3. Use the Pi Menu Preferences > Add/Remove Software to install absolutely essential\
    \ applications that you need to use that are not already pre-installed. For us,\
    \ the pre-installed required software was the Chromium Web Browser, and the LibreOffice\
    \ suite on our version of the operating system. Additionally for us, the post-install\
    \ software included, in priority order, Filezilla, Gparted, Webmin, and the GNU\
    \ Image Manipulation Program. We also put desktop icons on our desktop for all\
    \ of our important applications.\n- 4. Our highly recommended storage model dictates\
    \ the use of **mdadm**, so we installed that package, using the instructions given\
    \ in Volume 1. Our Raspberry Pi OS was originally built on 32 GB microSD cards,\
    \ but then we rebuilt it on the above-indicated capacity SSDs, using the Pi Menu\
    \ Accessories > SD Card Copier, as shown in Section 1.2.3. We then added additional\
    \ USB3-mounted media later, in order to conform to our recommended storage model.\n\
    - 5. Since printing documents was an essential operation that our system needed\
    \ to perform, we attached and setup (via CUPS) a laser printer directly to the\
    \ hardware of the Raspberry Pi 400, with a USB connection (as shown in detail\
    \ in Volume 1).\n- 6. We used the Raspberry Pi Configuration tool, selecting the\
    \ “System” tab, to configure our network settings and connect to a wired intranet\
    \ network. We then exposed our system on the local intranet as a basic ssh server,\
    \ so we immediately modified the sshd configuration file, and constructed ufw\
    \ firewall rules, according to what we show below in this chapter, to secure the\
    \ system.\n- 7. We minimally exposed our system as a web server using nginx, and\
    \ our custom web programs, but went with the default security measures for those\
    \ applications.\n- 8. We needed only a very sparse set of additional users and\
    \ groups on the system, so we immediately set those up using the method shown\
    \ in the sections below, and added to them as necessary. This method of adding\
    \ new users and groups is shown below. The primary advantage this confers is that\
    \ users, and their data files, which for us are on their own redundant pair of\
    \ hard drives, are discreet and maintained separately from the operating system\
    \ installation. We feel that this model is useful for a single-user computer desktop\
    \ system, a shared multi-user computer, or low-to-mid-level enterprise-level servers\
    \ as well.\n\nThere are various text-based Raspberry Pi OS commands that survey\
    \ system hardware, in order to provide you with a basis for doing performance\
    \ tuning and post-installation modification of the system. Some of these are lscpu,\
    \ lshw, hwinfo, lspci, lscpi, lsusb, inxi, lsblk, df, fdisk, mount, free, hdparm,\
    \ and examining the relevant contents of the /proc directories. We detailed the\
    \ use of some of these below, and in Volume 1.\n\nBut, in order to get a very\
    \ useful summary of the actual post-installation configuration of their system,\
    \ we have found that the **inxi** command is the most useful and expedient way\
