  md: '# 1.16 Virtualization Methodologies


    As stated earlier, the three governing functions that the Linux kernel performs
    in order to maintain the system in a steady state are Virtualization, Concurrency,
    and Persistence. At a certain level of abstraction, the kernel itself, and its
    global resources, are virtualized by systemd. In this section, we introduce namespaces
    and LXC/LXD, which also do forms of “virtualizing”.


    Historically speaking, to perform the kernel functions of Virtualization and Concurrency,
    the multiprogramming paradigm was established. Multiprogramming is a computer
    system model where the computer hardware and software would be shared by several
    programs (and users) running and working on the system simultaneously. This led
    to the need for autonomy and sharing among programs. The needs of multiprogramming
    are closely tied to the concept of “virtual memory” in computers as well. In turn,
    this virtualization of memory is directly related to the virtualization of the
    entire operating system itself, as we describe it in this chapter.


    Computer hardware virtualization is the simulation, to various degrees, of hardware
    platforms, parts of them, or only the functionality required to run one or more
    operating systems (“OSs”). It abstracts and effectively “hides” the physical characteristics
    of the hardware from the users. Traditionally, the software that controlled virtualized
    machines was known as the hypervisor. Currently, the hypervisor is often called
    a Virtual Machine Monitor (VMM).


    Platform virtualization is accomplished on any given hardware by host software
    (the hypervisor), which creates a simulated computer environment, a VM, for its
    guest software. The guest software can be as small as a single user application,
    or even as large as a complete OS. The guest software executes as if it were running
    directly on the physical hardware.


    Virtualization comes with some performance disadvantages, both in resources required
    to run the hypervisor and in reduced performance on the VM guest compared with
    running applications on a non-virtualized host physical machine. A VM can be more
    easily controlled and inspected from outside than a physical one, and its configuration
    is more flexible. This is very useful in kernel development and for teaching OS
    courses. A new VM can be implemented as needed without the need for an up-front
    hardware purchase. A VM can easily be moved from one physical machine to another
    as needed. An unrecoverable fault inside a VM guest does not harm the host system,
    so there is no risk of crashing the host OS.


    Examples of virtualization implementations are as follows:


    +   * Running one or more applications that are not supported by the host OS:
    A VM running the required guest OS could allow the desired applications to be
    run, without altering the host OS.'
