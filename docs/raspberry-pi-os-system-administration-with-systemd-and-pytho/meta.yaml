  md: 'systemd-run - Run programs in transient scope units, service units, or path-,
    socket-, or timer-triggered service units


    Syntax:

    systemd-run [OPTIONS...] COMMAND [ARGS...]

    systemd-run [OPTIONS...] [PATH OPTIONS...] {COMMAND} [ARGS...]

    systemd-run [OPTIONS...] [SOCKET OPTIONS...] {COMMAND} [ARGS...]

    systemd-run [OPTIONS...] [TIMER OPTIONS...] {COMMAND} [ARGS...]


    Purpose:

    systemd-run may be used to create and start a transient .service or .scope unit
    and run the specified COMMAND in it. It may also be used to create and start a
    transient .path, .socket, or .timer unit, that activates a .service unit when
    elapsing.


    Common Options:

    env Logs environment variables given by systemd to services.

    -p BlockIOWeight=10 updatedb Limits resources available to a command.

    --on-active=30 Runs commands at a specific time.

    -t --send-sighup /bin/bash Allows access to a tty using bash in this case.

    --scope --user screen Starts a screen as a user service.


    You can then modify resources on an application according to the design of your
    system use case(s). It is worth noting here that system programming applications
    can create transient cgroups by using cgroup API calls to systemd. A transient
    unit is removed from the system as soon as the service is stopped using the systemctl
    stop command, or the system is rebooted (since there is no permanent unit file
    created for the service using systemd-run.)

    To create a persistent cgroup for a service, you must create or edit its unit
    configuration file. The configuration can be preserved after system reboot, so
    it can be used to manage services that are started automatically by systemd.

    We present Examples 1.10 and 1.11 below, with relevant background information,
    on these two methods of service creation.


    Creating a Transient cgroup with systemd-run and Changing its CPUShare

    To create a transient cgroup, and run a command in that cgroup, the systemd-run
    command is used. The general form of the systemd-run command, with some specific
    options, is as follows:


    ```

    $ systemd-run --unit=name --slice=slice_name --property prop_name=val command

    ```'
