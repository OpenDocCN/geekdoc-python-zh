    \ the Raspberry Pi OS, created on a microSD card, from an externally mounted USB\
    \ SSD or M2 PCIe medium, instead of from the microSD card.\nSection 1.2.4—Shows\
    \ how to download and install a 64-bit version of Ubuntu 23.04 onto a microSD\
    \ card mounted on Raspberry Pi hardware.\nThe above sections assume that you will\
    \ be using a release of the software system that is designed for either the 64-bit\
