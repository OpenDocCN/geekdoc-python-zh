    set of directories beneath your own home directory, you will know where to store
    the file. In the following set of commands, we create a directory beneath the
    home directory and use that new directory to store a file.


    To create a new directory beneath the current working directory, you use the **mkdir**
    command. The general syntax for the **mkdir** command is as follows:


    ```

    mkdir [options] dirnames

    Purpose: Creates directory or directories specified in **dirnames**

    Output: New directory or directories

    Commonly used options/features:

    -m MODE Create a directory with given access modes

    -p Create parent directories that don''t exist in the pathnames specified in **dirnames**

    ```


    To create a child, or subdirectory, named **first** under the current working
    directory, type the following:


    ```

    $ mkdir first

    $

    ```


    This command has now created a new subdirectory named **first** under, or as a
    child of, the current working directory. Refer back to Figure 0.1 for a graphical
    description of the directory location of this new subdirectory.


    In order to change the current working directory to this new subdirectory, you
    use the **cd** command. The general syntax for the **cd** command is as follows:


    ```

    cd [directory]

    Purpose: Change the current working directory to **directory** or return to the
    home directory when **directory** is omitted

    Output: New current working directory

    ```


    To change the current working directory to **first** by descending down the path
    structure to the specified directory named **first**, type the following:


    ```

    $ cd first

    $

    ```


    You can always verify what the current working directory is by using the **pwd**
    command. The general syntax of the **pwd** command is as follows:'
  - '[PAGE 29]


    **pwd**

    **Purpose:** Displays the current working directory on screen

    **Output:** Pathname of current working directory


    You can verify that **first** is now the current working directory by typing the
    following:


    ```

    $ pwd

    /home/bob/first

    $

    ```


    The output from the Raspberry Pi OS on the command line shows the pathname to
    the current working directory or folder. As previously stated, this path is a
    textual route through the complete file structure of the computer that Raspberry
    Pi OS is running on, ending in the current working directory. In this example
    of the output, the path starts at /, the root of the file system. Then it descends
    to the directory **home**, a major branch of the file system on the computer running
    Raspberry Pi OS. Then it descends to the directory **bob**, another branch, which
    is the home directory name for the user. Finally, it descends to the branch named
    **first**, the current working directory.


    On some systems, depending on the default settings, another way of determining
    what the current working directory is can be done by simply looking at the command
    line prompt. This prompt may be prefaced with the complete path to the current
    working directory, ending in the current working directory.


    You can ascend back up to the home directory, or the parent of the subdirectory
    **first**, by typing the following:


    ```

    $ cd

    $

    ```


    An alternate way of doing this is to type the following, where the tilde character
    (~) resolves to, or is a substitute for, the specification of the complete path
    to the home directory:


    ```

    $ cd ~

    $

    ```


    To verify that you have now ascended up to the home directory, type the following:


    ```

    $ pwd

    /home/bob

    $

    ```'
