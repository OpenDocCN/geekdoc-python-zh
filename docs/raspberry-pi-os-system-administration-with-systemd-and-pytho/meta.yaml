    ```

    ~/Python-3.11.3 $

    ```


    To run this latest version in Way 4 (Bash Mode) type the following:

    ```

    ~/Python-3.11.3 $ python3.11

    ```


    ### 2.3.8.2 Switching Thonny to the Latest Python


    To change the version of Python used by Thonny on your Raspberry Pi, you need
    to be using Thonny in Regular Mode. To switch back to Simple Mode later, use the
    Tools > Options > General > UI mode > simple menu choice in Regular Mode. Be aware
    that you will have to click OK in the Thonny Options dialog box, and then restart
    Thonny to get back to Simple Mode!

    Follow these steps in Regular Mode to switch to the latest Python you downloaded
    and installed in the last section:


    +   1. Open Thonny on your Raspberry Pi. Switch to Regular Mode by clicking on
    the “Switch to regular mode” message in the extreme right corner of the Thonny
    Toolbar. You get a message box that opens saying that the Configuration has been
    updated, and to restart Thonny to start working in Regular Mode. Click OK.

    2. After you restart Thonny, in the menu bar at the top, click on "Tools" and
    then select "Options".

    3. In the "Options" dialog box, navigate to the "Interpreter" tab.

    4. Under the "Interpreter" tab, you''ll see a list of available Python interpreters.
    This list includes the Python versions installed on your Raspberry Pi.

    5. Select the desired Python version from the list. You can choose from the available
    versions or click on the "Browse" button to specify a custom Python interpreter.

    6. After selecting the desired Python version, click on the "OK" button to save
    the changes.


    Thonny will now use the selected Python version as the default interpreter for
    running and executing your Python code.


    > ***Note***

    You need to have the desired Python version already installed on your Raspberry
    Pi for it to appear in the list of available interpreters in Thonny.

    If the desired Python version is *not* listed in Thonny''s interpreter options,
    you may need to install it on your Raspberry Pi before it can be selected.


