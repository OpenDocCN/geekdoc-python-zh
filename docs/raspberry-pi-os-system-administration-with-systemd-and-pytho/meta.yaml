    \ you to play around with them while any of the script files in this chapter is\
    \ active in Thonny’s Script Area.\n\nWith that said, within the language itself,\
    \ and its syntactic structures, an exception, or unexpected end to a program,\
    \ is a Python3 object that represents an error. To terminate the flow of execution\
    \ of a program because of some exception the interpreter has found, Python3 has\
    \ two kinds of exception-handling structure that can end the program. These structures\
    \ are:\n\n- 1. Exception handling that uses for example **try:...except:...else:**\
