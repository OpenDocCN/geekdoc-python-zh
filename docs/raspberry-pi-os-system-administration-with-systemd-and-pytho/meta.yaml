    \ OOP 编程模型、函数、模块、保存和执行 Python3 脚本、字符串和序列操作以及错误处理。我们还给出了许多基础且实用的例子，例如编写 shell 脚本文件的另一种方式，如重写\
    \ Bash 和 tcsh 脚本、基本的用户文件维护、文件备份、使用 **rsync** 命令进行远程复制以及使用 tkinter 进行图形绘制。最后，我们展示了如何在\
    \ Python3 中实现各种形式的线程执行，以及如何部署 OOP 来完成这些任务。\n\n## 2.7 终极参考术语表\n\n以下是我们从第 2.5 节的参考文献中抽象出来的一些术语的简化和缩略术语表：\n\
    \n**类：** 用于创建用户定义对象的模板。类定义通常包含对类实例进行操作的方法定义。\n\n**表达式：** 一段可以被求值为某个值的语法。换句话说，表达式是表达式元素（如字面量、名称、属性访问、运算符或函数调用）的累积，这些元素都返回一个值。\n\
    \n与许多其他语言不同，并非所有语言构造都是表达式。也有一些语句不能用作表达式，例如 **print** 或 **if**。赋值也是语句，而不是表达式。\n\
    \n**不可变：** 具有固定值的对象。不可变对象包括数字、字符串和元组。此类对象不能被更改。如果需要存储不同的值，则必须创建一个新对象；例如，字典中的键。\n\
    \n**可迭代：** 能够一次返回其成员之一的对象。可迭代对象的例子包括所有序列类型（如列表、字符串和元组）以及一些非序列类型，如 **dict** 和 **file**，以及任何你定义了\
    \ **\\_\\_iter\\_\\_()** 或 **\\_\\_getitem\\_\\_()** 方法的类的对象。可迭代对象可用于 **for**\
    \ 循环以及许多其他需要序列的地方。当可迭代对象作为参数传递给内置函数 **iter()** 时，它会返回该对象的一个迭代器。此迭代器适用于对值集合进行一次遍历。使用可迭代对象时，通常不需要自己调用\
    \ **iter()** 或处理迭代器对象。**for** 语句会自动为你完成这些操作，创建一个临时的无名变量来在循环期间保存迭代器。\n\n**Lambda：**\
    \ 一个匿名的内联函数，由单个表达式组成，该表达式在函数被调用时求值。创建 lambda 函数的语法是 **lambda [参数]: 表达式**。\n\n\
    **方法：** 在类体内部定义的函数。如果作为该类实例的属性被调用，该方法将获得实例对象作为其第一个参数（通常称为 self）。\n\n**可变：** 可变对象可以更改其值，但保持其类标识不变。\n\
    \n**Pythonic：** 一种紧密遵循 Python 语言最常见用法的思想或代码片段，而不是使用其他语言中常见的结构来实现代码。例如，Python 中的一个常见用法是使用\
    \ **for** 语句遍历可迭代对象的所有元素。许多其他语言没有这种类型的构造，因此不熟悉 Python 的人有时会使用数字计数器代替：\n\n```python\n\
    for i in range(len(money)):\n    print (money[i])\n```\n\nPythonic 的方式：\n\n```python\n\
    for bills in money:\n    print (bills)\n```\n\n**序列：** 一种可迭代对象，支持通过 `__getitem__()`\
    \ 特殊方法使用整数索引进行高效元素访问，并定义了一个返回序列长度的 `len()` 方法。一些内置的序列类型是 **list**、**str**、**tuple**\
    \ 和 **unicode**。请注意，**dict** 也支持 `__getitem__()` 和 `__len__()`，但被视为映射而非序列，因为查找使用的是任意不可变键，而不是整数。\n\
