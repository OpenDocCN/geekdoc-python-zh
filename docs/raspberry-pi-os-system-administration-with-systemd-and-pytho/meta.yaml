    >>> Stru2 = firstclass.Structure(\"Logical Operators\", 10)  #creates the second\
    \ object\n>>> Stru1.displayStructure()\nName: Arithmetic Operators, Number: 17\
    \  #displays the first object\n>>> Stru2.displayStructure()\nName: Logical Operators,\
    \ Number: 10  #displays the second object\n>>> print (\"Total Structures %d\"\
    \ % firstclass.Structure.StrucCount)  #prints total structures\nTotal Structures\
    \ 2\n>>> Stru1.inst = 7  #creates a new attribute of Stru1\n>>> hasattr(Stru1,\
