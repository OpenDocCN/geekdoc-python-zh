    **method** is one of several operations that are allowed to be performed on the
    open external file,

    **argument(s)** is(are) one or more qualifiers on the operation specified in method,
    and

    **close** is the termination of connection to the external file.


    The mode can be **r**, **w**, or **a**, for reading (the default, meaning you
    do not need to specify this to open with read), writing, or appending to the file,
    respectively. The file will be created if it does not exist, and opened for writing
    or appending if it does exist. It will be truncated when opened for writing. Add
    **b** to the mode for binary files. Add **+** to the mode to allow simultaneous
    reading and writing.


