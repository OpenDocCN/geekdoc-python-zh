    \ is an accumulation of expression elements like literals, names, attribute access,\
    \ operators, or function calls, which all return a value.\n\nIn contrast to many\
    \ other languages, not all language constructs are expressions. There are also\
    \ statements which cannot be used as expressions, such as **print** or **if**.\
    \ Assignments are also statements, not expressions.\n\n**Immutable**: An object\
    \ with a fixed value. Immutable objects include numbers, strings, and tuples.\
