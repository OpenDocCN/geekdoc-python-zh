    \ range (5):\n    print(\"I'm counting!\", n)\nprint(\"I'm done counting!\")\n\
    ```\n\n```\n>>> %Run -c $EDITOR_CONTENT\nCount for me, Python!\nI'm counting!\
    \ 0\nI'm counting! 1\nI'm counting! 2\nI'm counting! 3\nI'm counting! 4\nI'm done\
    \ counting!\n>>>\n```\n\nIf the commands contain any output directed to the screen,\
    \ such as using print statements as shown in Example 2.2, the shell prompt will\
    \ immediately reappear at the termination of execution, *if the script file terminates\
    \ without error!*\n\nOf course, if you use the Thonny Toolbar Save icon, you can\
    \ save the multiline Python3 code into a file in Python3's current working directory,\
    \ and then at some later time, use Thonny's Load Toolbar icon to bring that file\
    \ back into the Script Area.\n\n### Way 3 (Import Script Mode)\n\nSimilarly to\
    \ Way 2 (Script Mode), you use a text editor of your choice to create and save\
    \ multiple Python commands in a script file, perhaps named **first.py**, in the\
    \ current working directory that has been set in Thonny.\n\nIn the Thonny Shell\
    \ Area, and at the Python3 command prompt there, you bring the script file into\
    \ Python with the Python3 **import** command. A good reason to use this mode is\
    \ if your script files contain function definitions. A simple example of this\
    \ is as follows:\n\n# Example 2.3\n\n```\n>>>import first\nCount for me, Python!\n\
    I'm counting! 0\nI'm counting! 1\nI'm counting! 2\nI'm counting! 3\nI'm counting!\
    \ 4\nI'm done counting!\n>>>\n```\n\nwhere **first** is the file without the .py\
    \ extension. It should contain syntactically correct Python3 commands, and be\
    \ in the current working directory. Now, the objects, statements, expressions,\
    \ and modules (like Python functions) in **first.py** are available to you in\
    \ Thonny. A good reason to use this mode is to bring those structures and functions\
    \ into the current interactive Thonny Python session environment, or namespace.\n\
    \n> ***Note***\n> Once you leave Thonny by clicking on the Toolbar icon Quit,\
    \ the current interactive session is ended, and the environment you have created\
    \ in Python is lost.\n\nHow do you know what the Thonny current working directory\
    \ is?\nIt's set to a default, and can be changed to any directory you want in\
    \ the filesystem of your Raspberry Pi OS, to retrieve, or save, Python3 script\
    \ files from or to. To find out, and be able to reset the current working directory\
    \ in Thonny, in the Thonny Shell Area, type the following commands:\n\n```\n>>>\
    \ import os\n>>> os.getcwd()\n'/home/bob/Public'\n>>>\n```\n\nWe see from the\
    \ above output that the current working directory, where Thonny retrieves and\
    \ saves script files to/from the Script Area is /home/bob/Public.\nTo change that\
    \ current working directory to /home/bob/Documents, for example, type the following\
    \ command on the command line in the Thonny Shell Area, after you've typed in\
    \ the previous two commands:\n\n```\n>>>os.chdir(\"/home/bob/Documents\")\n```\n\
    \n### Way 4 (Bash Mode)\n\nWe don't use this mode very much in the sections below,\
    \ but there is an alternative way of executing Python scripts that depends upon\
    \ the working environment within which you are executing Python. That alternative,\
    \ very similar to the way of executing a Bash, or other script file, is to include\
    \ this line as the first line in the Python script file (which you've created\
