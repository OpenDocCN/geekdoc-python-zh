    # Method 5


    You can also very efficiently use the GUI-Based G Partition Editor (Gparted),
    as shown in Example 1.5 below. With Gparted, you can easily find out the logical
    device names of disks on your system. In addition, with Gparted you can use graphical
    editing methods to affect several important characteristics of the media, such
    as the format and partitioning of the drives.


    # In-Chapter Exercise


    +   11. Insert a USB thumb drive into your Raspberry Pi, and mount it if necessary.
    What command would you use to mount it? Use the **findmnt** command to find out
    its logical device name. What is the logical device name for this thumb drive?
    Along what path is it mounted on your system? What are the uses and meanings of
    the other file system types shown, as output to the **findmnt** command? For example,
    are cgroup, proc, fuse.gvfs, and tempfs logical, virtual, or physical file systems,
    and how exactly do these differ from ext4?


    # 1.8.5 Adding New Media to the System


    The following example shows how to add new media to your system, and partition
    them. We chose to use the GUI-based Gparted partition editor, primarily because
    it’s easy to use, and can be quickly installed on the Raspberry Pi OS. We also
    choose it, instead of the **gdisk** utility, or the legacy **fdisk** command,
    because it has a GUI front-end, and GUI is easy to use. For example, with it,
    you don’t have to remember command names, options, or arguments to accomplish
    what you want. This GUI software not only lets you easily find out what the logical
    device names of media attached to your Raspberry Pi are, but also allows you to
    partition newly added media, and put a file system onto them at the same time.


    Example 1.5: Adding a New Medium, and Using Gparted to “Slice”, or Partition It


    **Objectives:** To practice using the Gparted Partition Editor to place a disk
    partition, with an ext4 file system on that partition, onto a USB thumb drive
    mounted on your Raspberry Pi.

    **Prerequisites:** Having a useable USB thumb drive for your system.

    **Requirements:** Do the steps below in the sequence presented to complete the
    requirements of this example.'
