    # 2.5.3.2 tkinter Toolkit Graphical User Interfaces


    A GUI allows you to use a mouse, or other pointing device (such as your finger
    on a tablet), rather than just the keyboard, to interact with programs that are
    running. Generally when you use a CUI, such as during a Bash shell session, and
    you execute a command, the tasks that command accomplishes do so in some structured
    order, either in a determinate (counting-wise) or indeterminate (logic-wise) manner.
    Then the command eventually terminates. But the Python3 GUI programs we show in
    this section create screen widgets that are displayed on screen, and then the
    Python3 script that generates the icons and widgets "waits" for the user to do
    something with them.


    This kind of programming structure is event-driven. *GUI programs, particularly
    in X windows graphics systems, are event-driven.* We emphasize that kind of programming
    structure in the examples and descriptions we provide below.


    A meaningful and useful Python3-scripted GUI program generally always has some
    form of this basic content and structure:


    +   1. Data of some sort is produced, or already exists, for example, in the form
    of numbers, or database text on the Raspberry Pi. This data itself can be generated
    in a variety of ways. It could be generated by Python3 user-written modules placed
    before the GUI-constructing'
