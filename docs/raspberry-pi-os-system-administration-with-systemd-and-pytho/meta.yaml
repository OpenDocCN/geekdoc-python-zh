    # 1.14.1 Application-Level Process/Thread Resource Management


    The basic reason for monitoring system resources, such as process CPU usage and
    system memory, in terms of how the system is performing given its designed for
    and intended use-case(s), is to allow you to observe, assess, and then gain control,
    at the application level, of how programs important to you are effectively using
    major components of system resources.


    For example, if a particular standard application (such as a web server which
    you have installed from an on-line repository,) or even a user-written program’s
    processes, are consuming too much of CPU or memory resources, according to criteria
    you determine given the use case(s) your system is designed or intended for, you
    can scale back that task’s operation to better serve your user base. On the other
    hand, if those same processes are being under-served, or starved for resources,
    for whatever reason, you can scale up that task’s operation as well. There may
    be some situations where under-service may be caused by hardware malfunctions,
    or illegal intrusion, but we do not cover those situations in this section.'
