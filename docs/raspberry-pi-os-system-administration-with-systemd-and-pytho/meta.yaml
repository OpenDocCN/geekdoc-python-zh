    \n## 1.15.2 Access Control Credentials: Discretionary (DAC), Mandatory (MAC),\
    \ and Role-Based (RBAC)\n\nThe terms we use in this section are important if you\
    \ want to understand the different types of access control. When we talk about\
    \ access control via security checks, here are the important terms:\n\n*Objects:*\
    \ A fundamental component of an executing kernel is the programs and processes\
    \ it maintains. Objects are the entities that are targeted, or worked on, by the\
    \ processes of a program. For example, processes themselves can be objects, or\
    \ the processes that are generated by executing instances of a program.\n\nFiles/inodes\
    \ are another form of object, particularly the executable form of file objects,\
    \ and the data structure(s) holding their information. You shouldn’t mix this\
    \ up with file system objects, which we have referred to as either ordinary or\
    \ directory.\n\n*Object Ownership:* Indicates the owning, user, and group.\n\n\
    *Object Context:* Security checks done when objects are acted on.\n\n*Subjects:*\
    \ An object that is acted upon by another object. Processes are active subjects,\
    \ such as those processes that are created by an **exec()** or **fork()** system\
    \ call from some originating process.\n\n*Subject Context:* Security checks done\
    \ when an active subject performs its operations.\n\n*Action:* What a subject\
    \ does to an object. This includes reading, writing, creating, and deleting files\
    \ or forking and signaling.\n\n*Permissions:* Security checks when a subject acts\
    \ upon an object. Taking the subject context, the object context, and the action,\
    \ and searching one or more sets of permissions to see whether the subject is\
    \ granted, or denied permission to act in the intended way on the object, given\
    \ those contexts. In simple terms, match subject and object permissions, and let\
    \ the subject act, or not, on the object.\n\nThere are three basic “classes” of\
    \ permissions. These are:\n\n1.  Discretionary Access Control (DAC):\n\n    Sometimes\
    \ the object will include sets of rules as part of its description. This is an\
    \ “Access Control List” or “ACL”. A file may supply more than one ACL. A traditional\
    \ Linux file, for example, includes a permissions mask that is an abbreviated\
    \ ACL with three fixed classes of subject (“user”, “group”, and “other”), each\
    \ of which may be granted certain privileges (“read”, “write” and “execute”—or\
    \ whatever those map to for the object in question). Linux file permissions do\
    \ not allow the arbitrary specification of subjects, however, and so are of limited\
    \ use.\n\n    A Linux file might also support a POSIX1e ACL, or an NFSv4 ACL.\
    \ This is a list of rules that grants various permissions to arbitrary subjects.\n\
    \n2.  Mandatory Access Control (MAC):\n\n    The system as a whole may have one\
    \ or more sets of permissions that get applied to all subjects and objects, regardless\
    \ of their source. Security Extended Linux (SELinux) is an example of this.\n\n\
    3.  Role-Based Access Control (RBAC):\n\n    Rather than use the user ID to find\
    \ out what access rights users and groups have on the system, the Role-Based Access\
    \ Control (RBAC) model gives access based on the role, or roles that a user assumes.\
    \ The classic RBAC example is the use of the **su** or **sudo** commands to grant\
    \ an unprivileged user root privileges, in a transient way. Another example can\
    \ be found in ZFS, when you execute the **zfs** command, and your action is checked\
    \ to see that the subject issuing the command has the role privilege, *even if\
    \ the user is root*.\n\nThese classes of access control policies determine what\
    \ action is allowed on what object, under what circumstances (DAC, MAC, or Role-Based\
    \ Access Control [RBAC]), and by what subject.\n\nA permission in the traditional\
    \ UNIX/Linux sense, for example, is read, write, or execute privilege. A subject,\
    \ for example, can be thought of as an executing process. Most importantly, an\
    \ object can be thought of as a Linux process, since everything done on files\
    \ and the data in them, is done through active processes on the system.\n\n##\
    \ In-Chapter Exercises\n\n42. What major apparatus controls the execution of processes\
    \ in the Raspberry Pi OS?\n43. Give other examples of DAC, MAC, and RBAC.\n\n\
    On the command line, an ordinary user, or the system administrator, is able to\
    \ implement resource use restrictions and privileges by controlling process credential\
    \ assignments, levied on subject executable image files, via the **chmod** command.\
    \ An ordinary unprivileged user can be given the required privileged role with\
    \ the **su** or **sudo** command. Then, as root, she can issue a privileged **chmod**,\
    \ **chown**, and **chgrp** to grant, or modify file and directory access permissions,\
    \ and use the DAC, MAC, or RBAC methods.\n\n## 1.15.2.1 Types of Credentials\n\
    \nWe are concerned with the three basic types of credentials that the Linux kernel\
    \ supports. These are as follows.\n\n### Traditional UNIX Credentials\n\n1.  Real\
    \ User ID\n2.  Real Group ID\n\nUID and GID are assigned to most objects. These\
    \ mostly define the object context of that object, with processes included in\
    \ this assignment.\n\n3.  Effective (EUID), Saved (SUID), and FS (FSID) User ID\n\
    4.  Effective (EGID), Saved (SGID), and FS (FSGID) Group ID\n5.  Supplementary\
    \ groups\n\nThe additional credentials used by processes are EUID/EGID/GROUPS,\
    \ and are used as the subject context, and real UID/GID will be used as the object\
    \ context.\n\n## 1.15.2.2 ACLs (Access Control Lists)\n\nACLs provide the ordinary,\
    \ unprivileged user with the ability to set finer access controls on directories\
    \ and files than the traditional permissions, whether they are used on ext4, or\
    \ ZFS file systems. Two different basic types of ACL apply to files and directories.\
    \ An ACL that defines the current access permissions of files and directories\
    \ is called an *access* ACL. An ACL, which can only logically be set on a directory,\
    \ and that defines the permissions that a directory object inherits from its parent\
    \ directory at the time of its creation, is called a *default ACL*. Additional\
    \ basic types of ACL are *minimal* and *extended* ACLs. ACL permissions that can\
    \ be equivalent to the traditional file mode permissions are called *minimal ACLs*.\
    \ Minimal ACLs have three entries, which can be the same as the traditional file\
    \ permissions. ACLs with more than the three entries are called extended ACLs.\
    \ Extended ACLs also contain a mask entry and may contain any number of named\
    \ user and named group entries.\n\nUnfortunately, at the time of the writing of\
    \ this book, the Raspberry Pi OS and the POSIX.1e ACL model that it supports,\
    \ do not easily allow for the interoperability, in terms of Network File System,\
    \ version 4 (NFSv4) ACLs, between Linux and non-Linux servers and clients.\n\n\
