    # 2.3 An Overview of the Python3 Language


    Computer programs execute and accomplish their objectives in a particular order,
    from start to finish. They may "branch" within that order, perhaps'
  - '[PAGE 196]


    to only execute some of their instructions, based on certain logical tests or
    conditions. They may also repeat segments of their operation, either for some
    predetermined number of times, or indeterminately, based on changing conditions.
    Python conforms to this model, and operates using the following scheme of levels:


    +   Level 1. *Everything* in Python3 programs, or scripts, is composed of modular
    components.

    Level 2. These modular components contain syntactically correct Python statements.

    Level 3. These statements contain expressions.

    Level 4. The expressions create and manipulate objects.


    The Python3 code development process starts by formulating syntactically correct
    elements at Level 1, and proceeds downwards through the levels sequentially until
    Level 4 is achieved.


    In the Raspberry Pi OS environment, if you are presented with a task that requires
    you to do either script writing or programming, the first thing you have to decide
    is what programming model you are going to adopt to accomplish the task. In simple
    terms, this means using any of the three predominant programming models: the procedural/imperative
    programming model, the Object Oriented Programming (OOP) model, or the logic programming
    model. Of course, how well you accomplish the task depends on how much script
    writing or programming experience you have using any, or all, of those models.
    And perhaps, if you are doing this task with a group of people, their experiences
    and preferences count for a great deal as well. But, how you formulate the task
    in terms of any of the models is related, most importantly, to your experience
    in using these models. There are no simple guidelines for applying any of the
    models to the vast number of possible script writing or programming tasks that
    exist in the realm of computer programming.


    However, the bottom line in the accomplishment of your task is how familiar you
    are with the syntax of the languages that implement the model you choose.


    That''s why we explain Python3 syntax in detail in this chapter. Python3 can utilize
    all of these programming models, and can, in fact, mix the techniques used in
    the models. We make some commentary on this here, and illustrate some simple uses
    of the models in the next few Sections.


    Python3 is a *high-level, structured* (in this case, meaning built of regular
    structured components, like determinate or indeterminate repetition, for example),
    and *interpreted* programming (or scripting) language, as opposed to a low-level,
    compiled language like C, or Java. As stated, it is also a *multi-paradigm* programming
    language, which allows you to use data abstractions'
  - '[PAGE 197]


    from the three predominant paradigms. For our purposes, “scripting” and “programming”
    can be thought of as the same thing. So why use a “pure” OOP approach?


    Instead of totally defining the most fundamental aspects and parts of OOP (which
    you can find descriptions of easily in the extensive literature), we choose to
    contrast and compare it to the more traditional procedural programming method,
    to give you a more intuitive feel for the approach OOP uses.


    Procedural/imperative, non-OOP programs, as we have noted, can run through their
    structured, flow-of-control operation using the Python3 syntax we show in the
    sections below. Non-trivial programs can possibly be made up of groupings of flow-of-control
    operations, known as procedures, modules, or subroutines. This way of using Python3
    syntax, since the language “accommodates” the procedural/imperative model, can
    put together a program that emphasizes more traditional algorithms and Abstract
    Data Types (ADT). Simple examples of these two things are the algorithm (or mathematical
    plan) for computing the greatest common factor of two integers, or the definition
    of integers themselves as a certain kind of numerical value, along with the prescribed
    set of possible operations on them.


    One of the biggest problems with this approach is that if variables take on a
    global scope, in a global namespace outside of the “container” they are defined
    in, the assignment of values to these can be conflicting and cause errors. That
    is, in part, why using namespaces, as we show in Chapter 1, to essentially isolate
    processes, is so effective. Variables (which are active in any particular process
    namespace) are exclusively, and locally, defined and used.


    In Python3 OOP, this is basically done using what is known as “encapsulation”.
    The idea is that the data, and the functions that manipulate the data, *are one
    entity*. This keeps both objects safe from unwanted changes to them from any environment
    outside the entity. This fundamental component of OOP, that combines data with
    a set of *methods* for accessing and managing the data, is called an object. Its
    data treatment model is completely different from the procedural/imperative program
    model previously described.


    Of course, it is possible, with the rich set of syntax available in Python3, to
    combine both non-OOP and OOP styles in one program. Python does not faithfully
    implement the functional, or logic, programming structure known as *tail recursion*,
    as does a language such as MIT scheme. But it is capable of recursion, as we also
    show below.


    # 2.3.1 Objects and Classes


