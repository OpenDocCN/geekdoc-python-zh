    \ {'x':1, 'y':2, 'z':3} #creates the dictionary\n>>> K\n{'x': 1, 'y': 2, 'z':\
    \ 3}       #not a sequence, thus comes back in any order\n>>> for key in sorted(K):\n\
    ...     print (key, '=', K[key]) #auto-indent by Thonny, and press Enter twice\
    \ here!\n...\nx = 1\ny = 2\nz = 3\n>>>\n```\n\n## 2.4.12 Generators\n\nA Python\
    \ functional technique of program execution, that uses the advanced programming\
    \ methodologies of data flows, streams, and process pipelines, and preserves the\
    \ state of the “propagation” of output as it executes in a “stepwise” fashion,\
    \ is called a *generator*. A generator produces a collection of output results\
    \ only when a method named **next()** in Python3 is called. The **next()** method\
    \ is executed by the Python3 **yield** statement. When a collection of data needs\
    \ to be created on the fly, perhaps in single steps (“stepwise”), at a particular\
    \ time during program execution, the generator function is called. The **next()**\
    \ built-in function steps you through, and generates the output.\n\n> ***Note***\n\
    The techniques shown in this, and the following section are necessarily for more\
    \ advanced programming applications.\n\nThe following Example 2.20 shows how to\
    \ create and invoke a generator function. It’s helpful to dissect this example\
    \ into its component parts, as shown on the Thonny Shell Area, as follows:\n\n\
    +   a. Propagation, or generation, then\nb. Invocation with a seed value of 4,\
    \ then\nc. Invocation again with a seed value of 6, then\nd. Output\n\n### Example\
    \ 2.20\n\n```\n>>> def generadd(Q):\n...     for i in range(Q):\n...         yield\
    \ i  #generates the next value\n...         i += 1\n...\n>>> for i in generadd(4):\
    \ #whenever function is called, #the values are generated\n...     print(i)\n\
    ...\n0\n1\n2\n3\n>>> z = generadd(6) #this passes 6 to generadd\n>>> z       \
    \        #this will show you the compiled generator object\n<generator object\
    \ generated at 0x284f60f4>\n>>> next(z)         #the next built-in steps you through\
    \ and generates the value\n0\n>>> next(z)\n1\n>>> next(z)\n2\n>>> next(z)\n3\n\
    >>> next(z)\n4\n>>> next(z)\n5\n>>> next(z)\nTraceback(most recent call last):\n\
    File \"<stdin>\", line 1, in <module>\nStopIteration\n>>>\n```\n\nAs a further\
    \ application of generator use, the code of the following example shows how to\
    \ implement generator functions, in a file named **regen.py** that you create\
    \ with your favorite text editor. First create the file **regen.py** as shown,\
    \ in the current directory that Thonny is using, and then use Way 3 (Import Script\
    \ Mode) to do In-Chapter Exercises 27–29:\n\n### Example 2.21\n\n```\ndef abc():\n\
    \    a = deff()\n    for i in a:\n        yield i\n    yield 'abc'\ndef deff():\n\
    \    a = ijk()\n    for i in a:\n        yield i\n    yield 'deff'\ndef ijk():\n\
    \    for i in (1,2,3):\n        yield i\n    yield 'ijk'\n```\n\n### In-Chapter\
    \ Exercises\n\n- 27. Give the exact Thonny operations that would bring the three\
    \ functions from Example 2.21 into the Python3 interpreter, given that you have\
    \ used Way 3 (Import Script Mode).\n- 28. Give the exact Python3 code that would\
    \ invoke the three functions from Example 2.21 on the Thonny Shell Area command\
    \ line.\n- 29. Give the exact Python3 code that would allow you to step through\
    \ the invocation of the three functions from Example 2.21, to generate its output\
    \ results until you reach the **StopIteration** message. List the output generated\
    \ at each step through the recursion.\n\n## 2.4.12.1 Generator Recursion\n\nRecursion,\
    \ which is the delay of computation until some target final state is reached,\
    \ can be implemented using Python3 generator functions by defining a generator\
    \ function that *calls itself within the body of its definition*. Here's an example\
    \ of that kind of a recursive generator function in Python3:\n\n```\ndef recursive_generator(n):\n\
    \    if n == 0:\n        return\n    yield n\n    yield from recursive_generator(n\
    \ - 1)\nfor num in recursive_generator(5):\n    print(num)\n```\n\nSave the above\
    \ code in a file named **recursive.py**, in Thonny's current working directory.\
    \ In this descriptive example, the **recursive_generator** function takes an integer\
    \ **n** as its parameter. If **n** is 0, the function simply returns, indicating\
    \ the final state of the recursion has been reached. Otherwise, it yields the\
    \ current value of **n** and then calls itself again, recursively with **n - 1**,\
    \ using the **yield from** statement to assign the iteration to the recursive\
    \ call. But **n** is assigned the value of 5.\n\nUsing Way 3 (Import Script Mode),\
    \ here's how you can use the **recursive_generator** function to generate a sequence\
    \ of numbers. When you import the above code into the Thonny Shell Area, the output\
    \ is as follows:\n\n```\n>>>import recursive\n5\n4\n3\n2\n1\n```\n\nIn this descriptive\
    \ example, calling **recursive_generator(5)** generates a sequence of numbers\
    \ from 5 down to 1, using recursion. The **for** loop iterates over the generated\
    \ values, and prints them one by one.\n\nNote that the use of a generator function\
    \ for recursion allows you to iterate over the generated values *lazily*, i.e.,\
    \ one value at a time, which can be memory-efficient compared to generating the\
    \ entire sequence upfront.\n\n## 2.4.13 Coroutines\n\nSo perhaps to end your suspense,\
    \ here’s how we answered the above three In-Chapter Exercises in the Thonny Shell\
    \ Area:\n\n```\n>>>import regen\n>>>x = regen.abc()\n>>>next(x)\n1\n>>>next(x)\n\
    2\n>>>next(x)\n3\n>>>next(x)\n'ijk'\n>>>next(x)\n'deff'\n>>>next(x)\n'abc'\n>>>next(x)\n\
    Traceback(most recent call last)\nFile \"<stdin>\", line 1, in <module>\nStopIteration\n\
    >>>\n```\n\nIn the previous section, we introduced the advanced programming technique\
    \ of using generator functions, which use **yield** to give output results. Python3\
    \ generator functions can also “consume” results using a **yield** statement.\
    \ In addition, two new methods applied to generator objects, **send()** and **close()**,\
    \ create a “framework” for objects, that consume and produce values. Generator\
    \ functions that define these objects are called *coroutines*. Coroutines consume\
    \ values using a **yield** statement on the right side of an expression, as follows:\n\
    \n```\nvalue = (yield)\n```\n\nUsing this syntax, execution pauses at this here\
    \ until the object’s **send** method is invoked with an argument:\n\n```\ncoroutine.send(data)\n\
    ```\n\nThen, execution resumes, with **value** being assigned, or referenced to\
    \ the value of data. To signal the end of a computation, we shut down a coroutine\
    \ using the **close()** method. This raises a GeneratorExit exception inside the\
    \ coroutine, which we can catch with a **try/except** clause.\n\nThe next example\
    \ illustrates these concepts. It is a coroutine that prints strings that match\
    \ a provided template pattern. Use Way 2 (Script Mode), and the Thonny Run Toolbar\
    \ icon to implement this in Thonny:\n\n### Example 2.22\n\n```\ndef grepper(template):\n\
    \    print ('Searching for ' + template)\n    try:\n        while True:\n    \
    \        x = (yield)\n            if template in x:\n                print (x)\n\
    \    except GeneratorExit:\n        print (\"Done\")\n```\n\nIn the Thonny Shell\
    \ Area, type the following:\n\n```\n>>> q = grepper(\"Pythonista\")\n>>> next(q)\n\
    Pythonista\n>>> q.send(\"After doing this section, you will be known as a Pythonista\"\
    )\nAfter doing this section, you will be known as a Pythonista\n>>> q.send(\"\
    Not a very Pythonic answer\")\n>>> q.send(\"Python makes C look high maintenance\
    \ and too complex\")\n>>> q.close()\nDone\n>>>\n```\n\nWhen we call **q.send**\
    \ with a value, evaluation resumes inside the coroutine **q** at the statement\
    \ line = **(yield)**, where the sent value is assigned to the variable line. Evaluation\
    \ continues inside **q**, printing out the line if it matches, going through the\
    \ loop until it encounters the line = **(yield)** again. Then, evaluation pauses\
    \ inside **q** and resumes where **q.send** was called.\n\nWe can chain functions\
    \ that **send()** and functions that **yield** together to achieve complex behaviors,\
    \ similar to streaming, or pipelining. In the next example, the function **read**\
    \ splits a string named “text” into words and sends each word to another coroutine.\
