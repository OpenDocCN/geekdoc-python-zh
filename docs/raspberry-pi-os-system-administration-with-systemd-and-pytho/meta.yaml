    There are three important things to notice about this OOP Example:


    +   1. The variable **StrucCount** is a class variable whose value is shared among
    all instances of this class. This variable can be accessed as **Structure.StrucCount**
    from inside the class or as **firstclass.Structure.StrucCount** outside the class.

    2. The first class method, **__init__**(), is a special method, which is called
    a *class constructor* or *initialization* method. Python3 calls this method when
    you create a new instance of this class.

    3. You declare other class methods like normal Python functions, with the exception
    that the first argument to each method is *s*. Python3 adds the *s* argument to
    the list for you; you do *not* need to include it when you call, or invoke the
    methods.


    # 2.3.2 Python3 Program Data Model


    Following are some statements about the Python3 model of data that might help
    you organize your concepts and thoughts about what the “nuts and bolts” of Python3
    are:


    +   1. Even though Python3 incorporates many of the features of a multi-paradigm
    programming ensemble, its actual, and fundamental basis is the following:

    Everything in the Python3 program can be referred to as an *object*, with the
    same exact meaning of the word *object* used in OOP. These objects have three
    parts: an *identifier*, a *type*, and a *value*.


    For example, when you assign x = 62.25 interactively in the Python3 interpreter,
    or in a Python3 module, script file, or library of modules, a real number object
    type is created; it has a value of 62.25, and it is identified as an object with
    a pointer to its location in memory. x is the identifier that refers to its specific
    location in memory. The equal sign (=) is essentially the reference between an
    identifier and a value.


    +   2. In OOP languages such as Python3 and Javascript, the type that an object
    assumes gives it membership in a particular set, called its *class*. The class
    of the object limits, and also defines, what are known as the *methods*, or operations,
    which can be performed on or with it.'
- md: '## 2.3.3 Python References and Releases


    When a particular object of some type is created, that particular object is called
    an *instance* of that type. In general, an object''s identity and type cannot
    be changed. They are known as *immutable*. If an object''s value can be modified,
    the object is said to be *mutable*. An object that refers to other objects to
    obtain value and type is known as a *container*.


    Objects can also define their own *attributes*, or characteristics, of the data
    they are comprised of, and even the *methods* used on them. An attribute is a
    property, or value associated with an object. A method is a function internal
    to a class of objects that performs some sort of operation on those objects when
    the method is used or invoked.


    Attributes and methods are accessed using the dot(.) operator, as shown in the
    following examples:


    ```

    x = 2 + 4j creates a complex number x.

    A = a.real uses a method known as real to extract the real part (an attribute)
    of a.

    c = [1, 2, 3] creates an instance of type list identified as c of the integers
    1, -2, and -3.

    c.append(7) adds a new element to c using the append method.

    ```


    Before you begin this section, and as you proceed through the rest of this chapter,
    it would be helpful for you to reference, and read for understanding in a “top-down”
    manner, the following references (the versions and editions of which were available
    at the time this book was written). The Python3 online documentation, and a printed
    book we used, are as follows:


    *The Python Language Reference*—https://docs.python.org/3/reference/


    For the latest version of Python, at the time this book was written, the following
    tutorials and printed books:


    https://docs.python.org/3/tutorial/index.html


    *Learning Python, 5th Edition*, by Mark Lutz, O''Reilly Media, 2013.


    Use the latest versions and editions of the above references, and if necessary,
    have a printed form of them. Whatever top-down principles you can carry with you
    from these references throughout your Python3 programming experience, both in
    this chapter and beyond, are very important, and will enable you to see the complex
    details in a much larger context.


    At the time this book was written, Python 3.11.3 was the latest stable version
    of the Python language available for the Raspberry Pi OS. As you can see from
    Figure 2.1, for our release of the Raspberry Pi OS on our Raspberry Pi 4B and
    400, Python 3.9.2 is used here.


    We also provide an abbreviated Python3 command syntax reference at the end of
    this chapter in Appendix 2A. You can refer to this whenever you need a handy reference
    for syntactic components of the language. In addition to the command syntax reference,
    we present a glossary of Python3 terms at the end of the chapter as well.


    ## 2.3.4 Python3 Standard Type Hierarchy


    The *type* of an object describes the Python data structure representation of
    the object as well as the methods and operations that can be carried out on that
    object. Table 2.1 is a listing of the type categories, and following it is a brief
    description of some of the categories in the table.


    The None type has a single value that contains a null object (an object with no
    value). Its truth value is False.


    - **Numeric types:** Booleans, integers, long integers, floating point numbers,
    and complex numbers.

    - **Sequence types:** *Sequences* represent ordered sets of objects indexed by
    nonnegative integers and include strings, Unicode strings, lists, and tuples.

    - **Mapping types:** A *mapping object* represents an arbitrary collection of
    objects that are indexed by another collection of nearly arbitrary key values.
    Unlike a sequence, a mapping object is unordered and can be indexed by numbers,
    strings, and other objects. *Dictionaries* are the only built-in mapping type,
    and are similar to a *hash*.

    - **Set types:** A *set* is an unordered collection of unique items. Unlike sequences,
    sets provide no indexing or slicing operations. They are also unlike dictionaries
    in that there are no key values associated with the objects. In addition, the
    items placed into a set must be immutable.

    - **Callable types:** These represent objects that support the function call operation.
    There are several kinds of objects with this property, including user-defined
    functions, built-in functions, instance methods, and classes.

    - **Classes and types:** When you define a class, the class definition normally
    produces an object of type *type*.

    - **Modules:** The *module* type is a container that holds objects loaded with
    the **import** statement.


    ### TABLE 2.1 Python3 Type Categories


    | Category | Name | Description |

    | :--- | :--- | :--- |

    | None | None | Null object |

    | Numbers | int | Plain integer |

    | | Long | Arbitrary-precision integer |

    | | Float | Floating point number |

    | | Complex | Complex number |

    | | Bool | Boolean (True or False) |

    | Sequences (immutable) | str | Character string |

    | | Unicode | Unicode character string |

    | | tuple | Tuple |

    | Sequences (mutable) | list | List |

    | | bytearray | Returned by bytearray() |

    | Mapping | dict | Dictionary |

    | Sets | set | Mutable set |

    | | Frozenset | Immutable set |

    | Callable | BuiltinFunctionType | Built-in functions |

    | | BuiltinMethodType | Built-in methods |

    | | type | Type of built-in types and classes |

    | | object | Ancestor of all types and classes |

    | | FunctionType | User-defined function |

    | | InstanceType | Class object instance |

    | | MethodType | Bound class method |

    | | UnboundMethodType | Unbound class method |

    | Modules | ModuleType | Module |

    | Classes | object | Ancestor of all types and classes |

    | Types | type | Type of built-in types and classes |

    | Files | file | File |

    | Internal | CodeType | Byte-compiled code |

    | | FrameType | Execution frame |

    | | GeneratorType | Generator object |

    | | TracebackType | Stacks traceback of an exception |

    | | Slice | Generated by extended slices |

    | | Ellipsis | Used in extended slices |

    | Classic Classes | ClassType | Legacy class definition |

    | | InstanceType | Legacy class instance |


    **Files:** The *file* object represents an open file and is returned by the built-in
    **open()** function.


    **Internal types:** Objects used by the interpreter are exposed to the user, such
    as *traceback objects*, *code objects*, *frame objects*, *generator objects*,
    *slice objects*, and the *ellipsis object*.


    **Code objects:** These represent raw byte-compiled executable code, or *bytecode*,
    and are typically returned by the built-in *compile()* function.


    **Frame objects:** These are used to represent execution frames and most frequently
    occur in traceback objects.


    **Traceback objects:** These are created when an exception occurs and contains
    *stack trace information*.


    **Generator objects:** These are created when a *generator* function is invoked.
    A generator function is defined whenever a function makes use of the special yield
    keyword.


    **Slice objects:** These are used to represent slices given in extended slice
    syntax, such as:


    ```

    a[i:j:stride], a[i:j, n:m], or a[..., i:j].

    ```


    **Ellipsis object:** The ellipsis object is used to indicate the presence of an
    ellipsis (...) in a slice. There is a single object of this type, accessed through
    the built-in name Ellipsis. It has no attributes and evaluates as True.


    **Classic classes:** In versions of Python prior to version 2.2, classes and objects
    were implemented using an entirely different mechanism, that is now deprecated.
    For backward compatibility, however, these classes, called *classic classes* or
    *old-style classes*, are still supported.


    ## 2.3.5 Basic Assumptions We Make


    The four basic and important assumptions we make in this chapter are:


    1. You have the default Python3.X installed on your Raspberry Pi system. Python
    3.9.2, for example, was already installed as part of the installation of our Raspberry
    Pi OS itself.


    If you type in the following command (as we did on our Raspberry Pi system), you
    will see where Python and its components (and what versions) are installed on
    your system:


    ```

    $ whereis python


    python: /usr/bin/python2.7 /usr/bin/python3.9 /usr/bin/python3.9-config /usr/bin/python
    /usr/lib/python2.7 /usr/lib/python3.9 /etc/python2.7 /etc/python3.9 /usr/local/lib/python2.7
    /usr/local/lib/python3.9 /usr/include/python3.9 /usr/include/python3.9m /usr/share/python
    /usr/share/man/man1/python.1.gz

    ```'
  mdcn: '## 2.3.3 Python 引用与版本


    当创建某个特定类型的特定对象时，该特定对象被称为该类型的*实例*。通常，对象的标识和类型无法更改，它们被称为*不可变*。如果对象的值可以被修改，则该对象被称为*可变*。引用其他对象以获取值和类型的对象被称为*容器*。


    对象还可以定义其自身数据的*属性*或特征，甚至定义用于它们的*方法*。属性是与对象关联的属性或值。方法是对象类内部的函数，当方法被使用或调用时，会对这些对象执行某种操作。


    属性和方法使用点（.）运算符访问，如以下示例所示：


    ```

    x = 2 + 4j 创建一个复数 x。

    A = a.real 使用名为 real 的方法提取 a 的实部（一个属性）。

    c = [1, 2, 3] 创建一个类型为 list 的实例，标识为 c，包含整数 1、-2 和 -3。

    c.append(7) 使用 append 方法向 c 添加一个新元素。

    ```


    在开始本节之前，以及在学习本章其余部分时，参考并以“自上而下”的方式阅读以下参考资料（本书撰写时可用的版本和版次）将对您有所帮助。Python3 在线文档和我们使用的一本印刷书籍如下：


    *Python 语言参考*——https://docs.python.org/3/reference/


    本书撰写时最新版本的 Python，以下教程和印刷书籍：


    https://docs.python.org/3/tutorial/index.html


    *Learning Python, 5th Edition*，作者 Mark Lutz，O''Reilly Media，2013。


    请使用上述参考资料的最新版本和版次，如有必要，请获取其印刷版。无论您从这些参考资料中获得哪些自上而下的原则，无论是在本章还是在后续的 Python3 编程经验中，都非常重要，它们将使您能够在更大的背景下理解复杂的细节。


    本书撰写时，Python 3.11.3 是适用于 Raspberry Pi OS 的最新稳定版本。如图 2.1 所示，对于我们 Raspberry Pi 4B
    和 400 上的 Raspberry Pi OS 版本，此处使用的是 Python 3.9.2。


    我们还在本章末尾的附录 2A 中提供了简化的 Python3 命令语法参考。当您需要语言语法组件的便捷参考时，可以随时查阅。除了命令语法参考外，我们还在本章末尾提供了
    Python3 术语表。


    ## 2.3.4 Python3 标准类型层次结构


    对象的*类型*描述了对象的 Python 数据结构表示，以及可以对该对象执行的方法和操作。表 2.1 是类型类别的列表，随后是对表中部分类别的简要描述。


    None 类型只有一个值，包含一个空对象（一个没有值的对象）。其真值为 False。


    - **数值类型：** 布尔值、整数、长整数、浮点数和复数。

    - **序列类型：** *序列*表示由非负整数索引的有序对象集合，包括字符串、Unicode 字符串、列表和元组。

    - **映射类型：** *映射对象*表示由另一组几乎任意的键值索引的任意对象集合。与序列不同，映射对象是无序的，可以通过数字、字符串和其他对象进行索引。*字典*是唯一的内置映射类型，类似于*哈希*。

    - **集合类型：** *集合*是唯一项目的无序集合。与序列不同，集合不提供索引或切片操作。它们也不同于字典，因为没有与对象关联的键值。此外，放入集合的项目必须是不可变的。

    - **可调用类型：** 这些表示支持函数调用操作的对象。有几种具有此属性的对象，包括用户定义的函数、内置函数、实例方法和类。

    - **类和类型：** 当您定义一个类时，类定义通常会产生一个类型为 *type* 的对象。

    - **模块：** *模块*类型是一个容器，用于保存通过 **import** 语句加载的对象。


    ### 表 2.1 Python3 类型类别


    | 类别 | 名称 | 描述 |

    | :--- | :--- | :--- |

    | None | None | 空对象 |

    | 数值 | int | 普通整数 |

    | | Long | 任意精度整数 |

    | | Float | 浮点数 |

    | | Complex | 复数 |

    | | Bool | 布尔值（True 或 False） |

    | 序列（不可变） | str | 字符串 |

    | | Unicode | Unicode 字符串 |

    | | tuple | 元组 |

    | 序列（可变） | list | 列表 |

    | | bytearray | 由 bytearray() 返回 |

    | 映射 | dict | 字典 |

    | 集合 | set | 可变集合 |

    | | Frozenset | 不可变集合 |

    | 可调用 | BuiltinFunctionType | 内置函数 |

    | | BuiltinMethodType | 内置方法 |

    | | type | 内置类型和类的类型 |

    | | object | 所有类型和类的祖先 |

    | | FunctionType | 用户定义的函数 |

    | | InstanceType | 类对象实例 |

    | | MethodType | 绑定的类方法 |

    | | UnboundMethodType | 未绑定的类方法 |

    | 模块 | ModuleType | 模块 |

    | 类 | object | 所有类型和类的祖先 |

    | 类型 | type | 内置类型和类的类型 |

    | 文件 | file | 文件 |

    | 内部 | CodeType | 字节编译代码 |

    | | FrameType | 执行帧 |

    | | GeneratorType | 生成器对象 |

    | | TracebackType | 异常的堆栈跟踪 |

    | | Slice | 由扩展切片生成 |

    | | Ellipsis | 用于扩展切片 |

    | 经典类 | ClassType | 旧式类定义 |

    | | InstanceType | 旧式类实例 |


    **文件：** *file* 对象表示一个打开的文件，由内置的 **open()** 函数返回。


    **内部类型：** 解释器使用的对象对用户公开，例如*回溯对象*、*代码对象*、*帧对象*、*生成器对象*、*切片对象*和*省略号对象*。


    **代码对象：** 这些表示原始的字节编译可执行代码，或*字节码*，通常由内置的 *compile()* 函数返回。


    **帧对象：** 这些用于表示执行帧，最常出现在回溯对象中。


    **回溯对象：** 这些在发生异常时创建，并包含*堆栈跟踪信息*。


    **生成器对象：** 这些在调用*生成器*函数时创建。每当函数使用特殊的 yield 关键字时，就定义了一个生成器函数。


    **切片对象：** 这些用于表示扩展切片语法中给出的切片，例如：


    ```

    a[i:j:stride], a[i:j, n:m], 或 a[..., i:j]。

    ```


    **省略号对象：** 省略号对象用于表示切片中存在省略号 (...)。此类型只有一个对象，通过内置名称 Ellipsis 访问。它没有属性，求值为 True。


    **经典类：** 在 Python 2.2 之前的版本中，类和对象是使用完全不同的机制实现的，该机制现已弃用。但是，为了向后兼容，这些称为*经典类*或*旧式类*的类仍然受支持。


    ## 2.3.5 我们的基本假设


    我们在本章中做出的四个基本且重要的假设是：


    1.  您的 Raspberry Pi 系统上已安装默认的 Python3.X。例如，Python 3.9.2 已作为 Raspberry Pi OS 本身安装的一部分预先安装。


    如果您输入以下命令（就像我们在 Raspberry Pi 系统上所做的那样），您将看到 Python 及其组件（以及版本）在系统中的安装位置：


    ```

    $ whereis python


    python: /usr/bin/python2.7 /usr/bin/python3.9 /usr/bin/python3.9-config /usr/bin/python
    /usr/lib/python2.7 /usr/lib/python3.9 /etc/python2.7 /etc/python3.9 /usr/local/lib/python2.7
    /usr/local/lib/python3.9 /usr/include/python3.9 /usr/include/python3.9m /usr/share/python
    /usr/share/man/man1/python.1.gz

    ```'
