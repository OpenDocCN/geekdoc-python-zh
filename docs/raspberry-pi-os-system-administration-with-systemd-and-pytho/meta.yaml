    # 1.13.1 Preliminary Storage Model Suggestions


    We previously provided an ordinary user with a suggested storage model, where
    the operating system is on a single medium (which we call the “boot/system disk”),
    and the user data is on one or more other media. One of the most useful and practical
    advantages this model gives an ordinary user is the ability to add or update software
    applications, and upgrade the operating system itself in a very reliable and time-efficient
    way. The software applications and operating system, since they exist on the boot/system
    disk, can be incrementally updated or upgraded independently of the user data.
    So, for example, if you want to go from an earlier major release of the operating
    system to the latest release, you can detach and unmount the user data media,
    do a clean install of the new release onto the old, or even new, boot/system disk,
    and then simply reattach the user data to it. We have found that this storage
    model, and this method of update/upgrade is safest and most reliable, even for
    an ordinary user, i.e. it doesn’t break the system, and lose user data.


    If you choose to keep the older major release of the operating system, and just
    want to incrementally update software and upgrade the operating system, the sections
    below will give you a basic overview of how to do that.


    There is a very wide selection of software programs available via the use of the
    facilities we show here. These programs are found in software archives known as
    “repositories”. The repositories contain collections of “packages”, and each package
    contains bundled-together software and dependencies that can all be automatically
    installed together. When downloaded and installed on your system by package management
    facilities such as APT or Snap (the two package management systems we mentioned
    earlier), that software becomes available to a user without the need to do anything
    else.'
  merge: -1
