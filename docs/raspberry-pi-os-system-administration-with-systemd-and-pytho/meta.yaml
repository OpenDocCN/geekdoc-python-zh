  - "[PAGE 61]\n\nAs stated above in Section 1.3, that is one of the most important\
    \ pre-installation considerations you have to make. There are a few options, and\
    \ the details of them, especially for an ARM-architecture machine, are complex.\n\
    This section gives an overview of the general procedures for booting, managing\
    \ the startup process, and gracefully shutting down the Raspberry Pi OS, given\
    \ how you've answered the above question. It gives a brief summary overview of\
    \ the steps that the operating system and hardware go through in successfully\
    \ starting up and shutting down. It then gives some further references to the\
    \ basic but important systemd services administration utilities available to a\
    \ system administrator. In those further references, we give examples of commands\
    \ for manipulating and changing system services by enabling and running new services.\n\
    \n# 1.4.1 The Boot and Startup Processes\n\nThe Raspberry Pi 4B and 400 use an\
    \ EEPROM to boot the system. Here are the general steps that the Raspberry Pi\
    \ OS goes through to boot up:\n\n+   1) When the Raspberry Pi is first turned\
    \ on, the ARM core is off, and the GPU core is on. At this point the SDRAM is\
    \ disabled.\n2) The ROM on the SoC initiates the first stage of booting.\n3) The\
    \ boot behavior for a microSD or USB boot is controlled by a configuration file\
    \ in the EEPROM, and can be edited via the rpi-eeprom-config tool, with the command\
    \ `sudo -E rpi-eeprom-config --edit`\nThe EEPROM second stage consists of the\
    \ following steps:\n   a. Initialize clocks and SDRAM.\n   b. Read the EEPROM\
    \ configuration file.\n   c. Determine if booting should be a restart/stop, or\
    \ from microSD card, the network, a USB device, or an PCIe NVME device.\n\nThe\
    \ Raspberry Pi 400's boot process, for example, is similar to other Linux-based\
    \ computers, with the main differences being that:\n\n+   a. it traditionally,\
    \ by default, uses a microSD card as its primary storage device, and boot medium,\
    \ or alternate sources, and\nb. is controlled by an EEPROM.\n\nThe term “booting”\
    \ is used here to mean bringing the operating system from a complete power-off\
    \ condition to a point where systemd can take over. Then in “startup”, systemd\
    \ brings the computer to a steady-state, fully normal operating condition.\nWhen\
    \ a system hangs up during the shutdown procedure, a contemporary way of diagnosing\
    \ the problem is to examine the systemd journal, with the `journalctl` command,\
    \ as shown in Volume 1. This way, if some process or"
