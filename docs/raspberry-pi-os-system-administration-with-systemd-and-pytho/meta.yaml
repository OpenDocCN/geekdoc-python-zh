    \ may be incomplete.\n$\n```\n\n> **Note**\n> Be very careful when adding custom\
    \ rules or modifying the firewall, it may endanger your system’s security!"
  mdcn: "能力（Capabilities）通过传统的 **rwx** 权限变更来控制，但也可以通过 **capset** 和 **getcap** 系统调用进行更精细的设置和直接查看。有关能力的更多信息，请参阅您系统上的\
    \ capabilities 手册页。\n\n## 章节内练习\n\n44. 你如何（以及为何）在命令行上应用 Linux 能力？请提供一个你已在树莓派系统上实施并测试过的示例。\n\
    \n## 1.15.3 sudo\n\n在树莓派操作系统上，程序、命令和文件通过用户和组权限进行访问。每个用户都有一个唯一的标识符，以用户名或 UID 的形式给出。用户属于唯一的组，以组名或\
    \ GID 的形式给出。特定的用户和组有权访问可用的程序、命令和文件。\n\n**sudo** 程序或命令允许以 root 用户或超级用户身份运行单个命令，*甚至可以其他用户身份运行*。只有系统管理员或\
    \ root 用户才能使用策略列表文件（名为 *sudoers*），其中包含每个用户可以执行的命令。因此，管理员控制着用户在系统上拥有的权限。当任何用户需要运行需要\
    \ root 权限的命令时，该用户在终端窗口或控制台中输入 **sudo command**，从而允许他们以 root 权限运行 **command**。然后，**sudo**\
    \ 会查阅其策略列表文件中的权限列表。如果用户有权运行该命令，则运行该命令。如果用户无权运行该命令，**sudo** 将拒绝执行。运行 **sudo** 不需要知道\
    \ root 密码，但默认情况下需要输入用户自己的密码才能成功执行。\n\n以下是在我们的树莓派系统上使用 sudo 命令的一个示例：\n\n```\nbob@raspberrypi:~\
    \ $ sudo -i\nroot@raspberrypi:~#\nroot@raspberrypi:~# exit\nbob@raspberrypi:~\
    \ $\n```\n\n有关 **sudo** 命令的更详细描述，请参见第一卷。\n\n**su** 命令（“switch user”的缩写）允许用户切换角色并成为系统上的超级用户，而无需从自己的账户注销。如果您想承担\
    \ root 的角色，您必须知道 root 账户的密码。在树莓派系统上，此命令受到限制，建议您将需要更高系统权限的用户包含在 sudoers 文件中。这样，他们只能按命令执行特权操作。\n\
    \n## 章节内练习\n\n- 45. 你在树莓派系统上是否被包含在 sudoers 组和文件中？你是如何发现这一点的？\n- 46. 将你 Linux 系统上的某个非特权用户添加到\
    \ sudoers 文件中。然后让他们测试 **sudo** 命令及其操作，如我们在上一节中所示。\n- 47. **su** 命令在你的树莓派系统上可用吗？为什么可用或不可用？\n\
    \n## 1.15.4 入侵检测与防御系统\n\n图 1.12 展示了来自树莓派操作系统外部的恶意活动如何通过系统组件进行交互的概念布局。重要的是要认识到，该图并未具体说明可以从局域网或互联网侵入系统的多种攻击类型，但确实展示了这些攻击可能针对的系统组件排列。它也未显示任何防御或预防机制在软件、内核或硬件中的具体位置。\n\
    \n## 章节内练习\n\n- 48. 在图 1.12 中，一个俄罗斯机器人会位于何处？\n- 49. 什么是红队手册（RTFM）？什么是蓝队手册（BTFM）？什么是渗透测试？在渗透测试的背景下，为什么你需要其中一本或两本手册？\n\
    \n入侵检测系统（IDS）是一种软件应用程序，用于监控网络或单个系统，以发现未经授权的活动或用户协议违规行为。它位于特定的软件接口上，其输出通过日志文件监控来查看。有各种各样的免费或商业\
    \ IDS 可用，从防病毒软件到监控骨干网络流量的分层系统。它们可以分为网络入侵检测系统（NIDS）或主机入侵检测系统（HIDS）。监控操作系统文件的 IDS\
    \ 是 HIDS 的一个例子。分析传入网络流量的 IDS 是 NIDS 的一个例子。此外，IDS 可以按检测策略分类。最著名的检测策略类型是基于签名的检测（识别不良模式，如恶意软件）和基于异常的检测（检测与预定义的“良好”流量模型的偏差，这使用了某种形式的人工智能（AI））。具有一些预定义和结构化响应协议的\
    \ IDS 被称为入侵防御系统（IPS）。\n\n典型的网络入侵检测系统试图通过监控网络流量来检测恶意活动，例如暴力攻击、拒绝服务攻击、端口扫描或试图入侵计算机的行为。\n\
    \n以下是在我们的树莓派系统上可供安装但默认未安装的一些免费 IDS 的部分列表：\n\n- AIDE 是一个 HIDS，可以监控和分析操作系统的内部。\n\
    - Snort 是一个 NIDS，执行 IP 网络上的数据包记录和实时流量分析。\n- fail2ban 是 IPS 的一个例子。它的一种配置基于来自局域网或互联网的恶意活动，并锁定那些尝试通过\
    \ ssh 使用错误密码登录超过五次的 IP 地址。这可以防止通过端口 22 的暴力攻击。\n\n这三个 IDS 可以通过 APT 或树莓派菜单“首选项 >\
    \ 添加/删除软件”获得。了解有关安装和配置它们的更多具体信息的最佳方式是阅读它们的在线文档和教程。\n\n## 章节内练习\n\n- 50. 使用可用的包管理系统，在你的系统上安装上述一个或所有\
    \ IDS 包。你如何部署 fail2ban，以及如何控制其环境？例如，你如何使用 fail2ban “解封”一个 IP 地址？在你的树莓派系统上测试这一点。\n\
    - 51. Wireshark 的功能和用途是什么？根据我们上面描述的 IDS 来描述它，然后安装 Wireshark 并在你的系统上使用它。\n\n##\
    \ 1.15.5 Linux 安全软件\n\n所有较大的 Linux 计算机服务器系统，以及普通用户使用的单个树莓派桌面系统，都可以拥有多种类型的基于网络和基于主机的安全软件，用于检测恶意活动、保护系统和数据、支持入侵检测及其响应。它们可以组织成以下类别：\n\
    \n- 入侵检测与入侵防御系统\n- 远程访问软件\n- Web 代理\n- 漏洞管理软件\n- 认证服务器\n- 路由器\n- 防火墙\n- 网络隔离服务器\n\
    \n我们将在下一节中介绍入侵检测的一些细节，并更完整地描述防火墙。\n\n### 1.15.5.1 系统防火墙\n\n防火墙是一种防止未经授权访问私有网络或计算机，或防止其向外访问的设施。防火墙可以在硬件、软件或两者中实现。防火墙主要用于阻止来自互联网对私有网络或内网的未经授权访问。进入或离开单个计算机或内网的所有流量都经过防火墙，防火墙可以检查每个消息数据包流，并阻止那些不符合系统管理员设定的特定安全要求的数据包。这些要求被编纂在所谓的\
    \ *防火墙规则* 中。\n\n除了限制对你的计算机和网络的访问外，防火墙还允许通过安全认证证书和登录远程访问私有网络。一种常见的做法是让一台独立计算机作为私有网络的单一硬件防火墙。硬件防火墙可以作为独立产品购买。它们也可以集成在宽带路由器中。大多数硬件防火墙至少有四个网络连接器用于连接其他计算机，但对于较大的网络，有企业网络防火墙解决方案。\n\
    \n树莓派操作系统使用简单防火墙（Uncomplicated Firewall），即 **ufw**，来保护系统。其规则的默认配置文件位于 `/etc/ufw/ufw.conf`。了解有关基于文本的防火墙规则修改的更多信息的最简单方法是查看你系统上的\
    \ **ufw** 手册页。我们在第一卷第 1.16 节“树莓派操作系统中的 ufw 和 Netfilter 接口”中提供了广泛的部分，详细介绍了使用命令行方法修改防火墙规则的基本细节。\n\
    \n除非你的安全模型及其对你特定用例的影响需要自定义防火墙规则，否则绝对没有必要更改 ufw 防火墙规则。我们将在下一节中提供 ufw 的概述。\n\n在树莓派操作系统中，如果防火墙是\
    \ *活动* 的（已启用或正在运行），来自网络的传入流量通常会被 *阻止*，直到你指定允许流量进入的 TCP 或 UDP 端口。此外，通常所有端口上的所有传出流量都是允许的。在接下来的几节中，我们将描述简单防火墙（**ufw**）。\n\
    \n要确定防火墙是否处于活动状态，请在你的树莓派系统上使用以下 systemd 命令：\n\n```\n$ systemctl status ufw\n●\
    \ ufw.service - Uncomplicated firewall\n     Loaded: loaded (/lib/systemd/system/ufw.service;\
    \ enabled; vendor preset: enabled)\n     Active: active (exited) since Wed 2023-05-24\
    \ 15:47:42 PDT; 6 days ago\n       Docs: man:ufw(8)\n    Process: 157 ExecStart=/lib/ufw/ufw-init\
    \ start (code=exited, status=0/SUCCESS)\n   Main PID: 157 (code=exited, status=0/SUCCESS)\n\
    \        CPU: 120ms\n\nWarning: journal has been rotated since unit was started,\
    \ output may be incomplete.\n$\n```\n\n> **注意**\n> 添加自定义规则或修改防火墙时要非常小心，这可能会危及你系统的安全！"
