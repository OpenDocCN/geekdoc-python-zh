    The following shows how to perform printing tasks using the **lp** command. The
    general syntax of the **lp** command is as follows:


    **lp [options][option arguments] file(s)**

    **Purpose:** Submit files for printing on a designated system printer, or alter
    pending print jobs

    **Output:** rinted files or altered print queue

    **Commonly used options/features:**

    **-d destination** Print to the specified destination

    **-n copies** Sets the number of copies to print


    In the first command, the file to be printed is named **file1**. In the second
