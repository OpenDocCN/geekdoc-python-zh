  md: '# 1.11.2.2 Eight Easy tars


    In this section, we show eight of the simplest uses of the **tar** command.


    +   1. Creating an archive:


    This is the simplest command to create an archive file from a directory.


    bash

    $ tar --create --verbose --file archive_name.tar directory_name



    where:

    - **--create** is the operation to create a new archive

    - **--verbose** is the operation to list the files being processed

    - **--file** is the operation that specifies that the file **archive_name.tar**
    is the name of the archive file, and

    - **directory_name** is the directory you want to archive.


    +   2. Creating an archive and preserving its ACL permissions:

    A simple variation on creating an archive is using an option to preserve ACLs
    that the directory has. ACLs are detailed fully in Volume 1, both the POSIX.1e
    and NFSv4 varieties.


    bash

    $ tar --acls --create --verbose --file archive_name.tar directory_name



    where:

    - **--acls** is the option to preserve the ACLs that the directory has

    - **--create** is the operation to create a new archive

    - **--verbose** is the operation to list the files being processed

    - **--file** is the operation that specifies that the file **archive_name.tar**
    is the name of the archive file, and

    - **directory_name** is the directory you want to archive.


    +   3. Extracting an archive:

    This is the simplest command to extract a directory from an archive file an archive
    file.


    bash

    $ tar --extract --verbose --file archive_name.tar



    where:

    - **--extract** is the operation to extract a **directory_name** from an archive
    file

    - **--verbose** is the operation to list the files being processed

    - **--file** is the operation that specifies that the file **archive_name.tar**
    is the name of the archive file.'
