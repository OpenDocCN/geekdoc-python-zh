    \ files and subdirectories\n\nFor example, to make an exact duplicate of the file\
    \ named **myfile**, with the new name **myfile2**, type the following:\n\n```\n\
    $ cp myfile myfile2\n$\n```\n\nThis usage of the **cp** command has two required\
    \ command arguments. The first argument is the source file that already exists\
    \ and which you want to copy. The second argument is the destination file or the\
    \ name of the file that will be the copy. Be aware that many Raspberry Pi OS commands\
