    ```

    $ sudo ls -la /usr/bin/passwd

    -rwsr-xr-x 1 root root 63744 Feb 7 2020 /usr/bin/passwd

    $ sudo ls -la /usr/bin/sudo

    -rwsr-xr-x 1 root root 178432 Jan 14 05:29 /usr/bin/sudo

    $

    ```


    The commands **passwd** and **sudo** are SUID-capable programs. Even though those
    commands are ostensibly run with root user privilege, a non-privileged user can
    only change their own password with the **passwd** command, and can only assume
    root privileges with **sudo**. That is if they are given privilege to do so in
    the /etc/sudoers file!


    The **find** command allows you to search your system to see if there are any
    hidden or otherwise inappropriate SUID and SGID commands on your system. The following
    is an example:


    ```

    $ sudo find / -perm /6000 -ls

    15205524 40 -rwsr-xr-x 1 root root 39768 May 10 2022 /usr/sbin/mount.cifs

    15205509 36 -rwxr-sr-x 1 root shadow 34744 Jun 8 2022 /usr/sbin/unix_chkpwd

    15205491 1368 -rwsr-xr-x 1 root root 1400384 Jul 13 2021 /usr/sbin/exim4

    15205701 112 -rwsr-xr-x 1 root root 114648 Jun 28 2021 /usr/sbin/mount.nfs

    Output truncated...

    ```


    The **find** command reveals SetUID and SetGID commands that unprivileged users
    can run to assume the privileged role.


