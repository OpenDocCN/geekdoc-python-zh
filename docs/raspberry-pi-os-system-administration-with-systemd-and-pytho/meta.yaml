    # 1.14.3 Assessment of System Disk Usage


    Along with CPU usage and memory management, the ability to look at, then assess
    and possibly modify the resources of persistent storage media, particularly of
    a limited-capacity microSD card, is critical to a system administrator''s task.
    Even for an ordinary user, storage space is a precious commodity, regardless of
    the availability and lower costs of terabyte-capacity externally mounted media.
    Consider a Raspberry Pi system that can only physically support a smaller capacity
    microSD card, for whatever reason. Or a system where an ordinary user is storing
    large files, such as video or other types of media file.

    Traditionally, the **du** command allowed you to get a text-based summary of disk
    usage for files and directories, in a variety of formats. An administrator could
    then take action to trim storage usage according to the use case of the'
  - '[PAGE 163]


    system. For more information on the **du** command, see the man page for **du**
    on your Raspberry Pi system.


    The **df** command (df is an abbreviation for disk free) allows you to display
    the amount of available storage space for file systems on which the invoking user
    has read access. **df** is typically invoked using the **-h** and **T** option,
    which gives a human-readable output format, which includes the file system types.
    For example, on our Raspberry Pi 400 system whose boot/system medium is an externally
    mounted USB3 SSD, the following command gives information about storage and file
    system layout:


    ```

    $ df -hT

    file system  Type      Size   Used  Avail  Use%  Mounted on

    /dev/root    ext4      439G   15G   403G   4%    /

    devtmpfs     devtmpfs  1.7G   0     1.7G   0%    /dev

    tmpfs        tmpfs     1.9G   0     1.9G   0%    /dev/shm

    tmpfs        tmpfs     759M   1.5M  758M   1%    /run

    tmpfs        tmpfs     5.0M   4.0K  5.0M   1%    /run/lock

    /dev/sda1    vfat      253M   31M   222M   13%   /boot

    tmpfs        tmpfs     380M   32K   380M   1%    /run/user/1000

    $

    ```


    More contemporary graphical methods can be used to view and assess disk usage
    on Raspberry Pi systems. For example, you can use the gnome disk usage analyzer,
    named “Baobab”. It displays either a bar or sector chart representation of relative
    disk usage, for any attached persistent medium. This tool is very useful when
    you want to get a picture of where, and what, your disks are being used for. Figure
    1.11 shows a typical disk capacity display of the root directory on the same Raspberry
    Pi 400 system. Similar tools are found on all Linux systems. Another useful summary
    tool, similar to Gparted, is the gnome-disk-utility, launched from the Preferences
    Menu.


    # 1.14.4 Network Configuration with the ip Command


    The most important and useful command for the system administrator when doing
    a post-install network configuration is the **ip** command. The following sections
    illustrate the basic usage of this command, and give a use case example that illustrates
    how to assign more than one IP address to a Raspberry Pi network interface.


    With the new toolkit, it is as easy as with the old to add new ip addresses, as
    follows:


    ```

    $ ip addr add 192.168.1.1/24 dev eth0

    ```'
