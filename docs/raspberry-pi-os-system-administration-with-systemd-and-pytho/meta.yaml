    $ lsblk-a

    ```


    2. How can you differentiate a Raspberry Pi OS command from its options, option
    arguments, and command arguments?


    3. What is the difference between a single Raspberry Pi OS command, and a multiple
    Raspberry Pi OS command, as typed on the command line before pressing <Enter>?


    4. If you get no error message after you enter a Raspberry Pi OS command, how
    do you know that it actually accomplished what you wanted it to?


    # 0.2 File Maintenance Commands and Help On Raspberry Pi OS Command Usage


    After your first-time login to a new Raspberry Pi OS, one of your first actions
    will be to construct and organize your workspace environment, and the files that
    will be contained in it. The operation of organizing your files according to some
    logical scheme is known as *file maintenance*. A logical scheme used to organize
    your files might consist of creating *bins* for storing files according to the
    subject matter of the contents of the files, or according to the dates of their
    creation. In the following sections, you will type file creation and maintenance
    commands that produce a structure similar to what is shown in Figure 0.1. Complete
    the operations in the following sections in the order they are presented, to get
    a better overview of what file maintenance really is. Also, it is critical that
    you review what was presented in the Preface regarding the structure of a Raspberry
    Pi OS command, so that when you begin to type commands for file maintenance, you
    understand how the syntax of what you are typing conforms to the general syntax
    of any Raspberry Pi OS command.'
  merge: -1
