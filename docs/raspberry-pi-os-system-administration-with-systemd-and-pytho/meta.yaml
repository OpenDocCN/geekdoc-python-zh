    # 1.1 Introduction


    This chapter is central to a major component of Raspberry Pi OS use: system administration.


    In order to install, maintain, and effectively use a Raspberry Pi system composed
    of both hardware and software components, it is often necessary to perform the
    set of common tasks shown in the following sections. In this chapter, we target
    an individual, novice user, who performs these tasks exclusively for her own use,
    on her own personal desktop/laptop computer. The common tasks may also be performed
    by an appointed administrator, for a more complex system used by many people.
    It is possible to divide these common tasks into those performed by an administrator,
    and those performed by a single user, or a group of ordinary, autonomous users.


    Even though we show the basics of those common tasks, it is possible to extrapolate
    from what is presented to the wider context of much larger-scaled computer systems,
    run by a system administrator.


    Additionally, at the book website, we provide other materials that supplement
    our presentation of these tasks here in the printed book.


    In order to do many of the system administration tasks in this chapter, it is
    absolutely necessary to either have superuser or root user privileges on the system.
    That means you need to know the superuser password, which you (or a designated
    system administrator) can establish at installation of your Raspberry Pi system.


    Both the **su** and **sudo** commands are used to execute programs and other commands
    with root permissions. The root user has maximum permissions, and can do anything
    to the system that a system administrator needs to. Normal users execute programs
    and commands with reduced permissions.


    To execute something that requires maximum permissions, you must first execute
    the **su** or **sudo** commands. Using the **su** command makes you the super
    user—or root user—when you execute it with no additional options.'
  - '[PAGE 44]


    You are prompted to enter the root account’s password. Also, the **su** command
    allows you to switch to any user account. If you execute the command **su**, you’ll
    be prompted to enter the password, and the command shell current working directory
    will be your home directory. Once you’re done running commands in the root shell,
    you should type **exit** to leave the root shell and go back to limited-privileges
    mode.


    > ***Note***

    The root shell is *not* the login shell.


    In contrast, **sudo** runs a single command with root privileges. When you execute


    ```

    $ sudo command

    ```


    the system prompts you for your current user account’s password before running
    **command**, whatever it happens to be, as the root user. In order to use the
    **sudo** command, you must be part of the sudoers group. More information on the
    **sudo** command, and its details, can be found in Volume 1, Section 1.13.


    In our “learning-by-doing” approach, we have selected a common set of system administration
    tasks aimed specifically at an individual novice Raspberry Pi OS user, as stated
    above in Section 1.0.


    Besides these common tasks we have selected to present, there are numerous extensions,
    and also many additional tasks that Linux system administration encompasses.


    You must realize that we have listed all of the tasks above based upon the use
    cases we target.


    To extend some of the system administration topics covered in this book so that
    they are reflective of modern Linux systems, and to anticipate other use cases
    you might have, we provide some additional materials and references in this volume,
    as follows:


    If you want to install another Linux OS, for example, Ubuntu, in a virtual environment
    (such as in a container), so that it runs simultaneously with the Raspberry Pi
    OS on your computer’s hardware, we give specific instructions on how to do this
    in Volume 3, “Raspberry Pi OS Text Editors, git, and Virtualization with LXC/LXD”.
    There we give the specifics of efficient ways of installing a “guest” operating
    systems using LXC/LXD container virtualization.


    In Section 1.14.1.2, we show details of the use of Control Groups (cgroups) in
    systemd. cgroup techniques, executed on the command line, allow an administrator
    to more explicitly set and view the limits of the three major functions performed
    by the modern Linux kernel (or the Linux super-kernel, systemd): concurrency,
    virtualization, and persistence.


    In Volume 1, Sections 1.14 and 1.15, “Raspberry Pi OS POSIX.1e Access Control
    Lists (ACL’s)”, and “Raspberry Pi OS NFS Server and Client Install,'
  - '[PAGE 45]


    and Setting NFSv4 ACLs on the Client”, we fully illustrate the use of POSIX.1e
    and Network File System, version 4 (NFSv4) Access Control Lists (ACLs). We show
    the application of these facilities, which further extend the Discretionary Access
    Control (DAC) methods of the traditional Linux permissions model. We apply ACLs
    to file system objects mounted as NFSv4 “shared” network drives. In addition,
    we provide an extended example of using ACLs on NFSv4 network drives.


    # 1.1.1 System Administration the Easy Way


    How can you do the majority of what is shown in this chapter in an easy way?

    Use Webmin.

    Webmin is a modern Linux web browser-based, GUI system administration tool that
    allows you to do many of the system administration tasks shown in this chapter
    in a very intuitive, fast, and simple way. We strongly encourage you to first
    download and install Webmin on your Linux system, following the instructions we
    give in Volume 1, Section 1.2. Then you can explore the Webmin facilities before
    you begin the rest of this chapter, and even go back to Webmin to find out how
    something which we show in the rest of this chapter can be done (or can’t be done!)
    in Webmin.


    # 1.2 Installation of the Raspberry Pi OS onto Various Media, and Preliminary
    System Configuration


    This section has four paths through it, as follows:

    Section 1.2.1—Shows how to download and install a 64-bit version of the Raspberry
    Pi OS onto a microSD card, so that you can insert that card into Raspberry Pi
    hardware, and operate that hardware with it.

    Section 1.2.2—Shows how to create a 32-bit version of the Raspberry Pi OS desktop
    to install on an older PC, so that you can test drive the operating system to
    get a good feel for how it works.

    Section 1.2.3—Shows how to run the Raspberry Pi OS, created on a microSD card,
    from an externally mounted USB SSD or M2 PCIe medium, instead of from the microSD
    card.

    Section 1.2.4—Shows how to download and install a 64-bit version of Ubuntu 23.04
    onto a microSD card mounted on Raspberry Pi hardware.

    The above sections assume that you will be using a release of the software system
    that is designed for either the 64-bit ARM-architecture Raspberry Pi hardware,
    or a 32-bit X-86 architecture machine, but be aware that some of the functionality
    we show in this chapter is limited to a 64-bit architecture machine. Also be aware
    that some of the systems administration tasks illustrated in this book are, or
    may, be done in a different way in earlier (or'
  - '[PAGE 46]


    later) releases of the software! And, this section assumes that you will running
    the Raspberry Pi OS from persistent media (either a microSD card mounted in the
    provided slot on the Raspberry Pi hardware, from a USB3 thumb drive, SATA SSD,
    or M.2 PCIe module drive, or from the hard drive on an older PC,) rather than
    from some other source.


    If you want to install another Linux operating system in a virtual environment
    created on the Raspberry Pi, so that it runs simultaneously with the Raspberry
    Pi OS on your Raspberry Pi computer''s hardware, we give specific instructions
    on how to do this in Volume 3, entitled "Raspberry Pi OS Text Editors, git, and
    Virtualization with LXC/LXD" . There we give the specifics of installing Ubuntu
    Linux as a "guest" operating systems, using LXC/LXD.


    # 1.2.1 Imager Download and Install of 64-Bit Version of Raspberry Pi OS onto
    a microSD Card


    This section is probably the easiest, and most-often used means of getting the
    Raspberry Pi OS onto your hardware. At the time this book was written, specific
    instructions for doing this were found at the following website: www.raspberrypi.com/documentation/computers/getting-started.html
    They are summarized here as follows:


    +   1) From another Linux computer, perhaps a Raspberry Pi that''s already working
    with an installed operating system on it, type the following at the command prompt:


    $ sudo apt install rpi-imager


    2) Connect an SD card reader to that computer with an adequately sized microSD
    card in it.

    3) Run the Raspberry Pi Imager, and choose the desired operating system from a
    presented list.

    4) Choose the microSD card from step 2).

    5) At this point, while running the Imager, choose "Advanced Options", and enable
    things like SSH, and hostname.

    6) When finished with the Imager, quit it, take out the microSD card, and place
    it into the Raspberry Pi hardware you want the operating system to run on. Boot
    into that microSD card, and follow the instructions.'
- md: "## 1.2.2 Installing the Raspberry Pi Desktop OS on an Older X86 Architecture\
