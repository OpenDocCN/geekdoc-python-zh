    \ and you are encouraged to include users that need to have higher levels of privilege\
    \ on the system in the sudoers file. That way they can only execute privileged\
    \ operations on a per-command basis.\n\n## In-Chapter Exercises\n\n- 45. Are you\
    \ included in the sudoers group and file on your Raspberry Pi system? How did\
