    - 6. 树莓派操作系统现在从USB3挂载的SSD启动并运行。它是你在执行上述步骤时microSD卡上内容的精确克隆。\n\n结论：在撰写本书时，树莓派操作系统能够从外部USB3\
    \ SSD启动并运行。为了评估使用SSD的性能速度优势，我们鼓励你使用附件菜单 > 树莓派诊断程序来评估SSD相对于microSD卡的相对性能速度优势。SSD与microSD卡的日志读数提供了这些信息。\n\
    \n## 1.2.4 如何在树莓派硬件上安装Ubuntu桌面\n\n为了展示可以使用泽字节文件系统（ZFS）的外部媒体添加，我们在本节中为你提供一种技术，允许你将另一个操作系统——64位Ubuntu\
    \ 23.04桌面——安装到树莓派4B或Pi 400硬件上。我们使用microSD卡来启动和运行系统。\n\n尽管这个介绍可能与本书各卷的主题相悖（毕竟，它们是关于树莓派操作系统的！），但学习ZFS及其作为Linux和树莓派操作系统本身的现代文件系统的使用具有重要价值。目前，使用上游操作系统（Debian\
    \ Bullseye）和6.X Linux内核，下游的树莓派操作系统*不容易*支持ZFS的安装，尤其是对初学者而言。但这很可能会改变，特别是在树莓派5发布及其对应的树莓派操作系统版本稳定之后。\n\
    \n背景：\nDebian Linux家族中最受欢迎且支持良好的下游发行版可能是Ubuntu。而该系统的管理者Canonical公司不仅努力使其最新版本的软件可用于树莓派硬件，而且在其发行版中也非常强烈地支持ZFS。在下文中，我们将逐步展示如何将64位Ubuntu\
    \ 23.04桌面安装到树莓派4B上。这些步骤同样适用于Pi 400。\n\n前提条件：\n\n- a. 一张最小容量为9 GB的microSD卡。我们使用了一张32\
    \ GB的microSD卡。\n- b. 一个带有microSD USB连接读卡器和线缆，或附加驱动器托架的树莓派。\n- c. 一台能够识别上述步骤中挂载的microSD卡的树莓派4B或Pi\
    \ 400！\n- d. 一台连接到树莓派的HDMI显示器和一个USB键盘。\n\n要求：按照下图所示的顺序执行以下步骤，以完成本示例的要求。\n\n- 1.\
    \ 在命令行中，输入以下命令：\n\n```\n$ sudo snap install rpi-imager\n```\n\n在我们的树莓派上，最新版本的Imager已经安装好了！\n\
    \n- 2. 启动Imager，在树莓派Imager窗口中，点击标有“选择操作系统”的框。\n- 3. 在出现的菜单中向下滚动，点击“其他通用操作系统”。\n\
    - 4. 出现的菜单中有多种选择。向下滚动到“Ubuntu Desktop 23.04 (Rpi 4/400)”，然后点击它。\n- 5. 在树莓派Imager窗口中，点击“选择存储”框。选择你已挂载到系统上的microSD卡，然后点击“写入”。将镜像写入microSD卡需要几分钟时间。\n\
    - 6. 关闭你的树莓派，并将你已写入Ubuntu的microSD卡插入树莓派的microSD卡插槽。\n- 7. 重新启动树莓派，并按照屏幕上的说明在树莓派硬件上准备你的Ubuntu系统。完整系统安装完成后，可以尝试使用它，以熟悉另一个Linux发行版的功能。例如，启用ssh，安装一些你喜欢的Linux应用程序等。\n\
