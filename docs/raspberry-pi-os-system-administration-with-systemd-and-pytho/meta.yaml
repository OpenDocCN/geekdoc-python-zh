    # 2.5.3 Graphical User Interfaces with Python3 and tkinter Widgets


    Up until this point in the chapter, we have interacted with Python3 via a graphical
    IDE, basically in a text-based manner, where we typed commands into Thonny’s Script
    or Shell Areas, or into a text editor, and executed Python 3.9.2 to view the output
    results as text. In this section, we will build a “widget”-based (widget is short
    for window gadget) GUI with Python3, where we still create the Python3 code as
    text, but see the resulting output of the Python3 script in the form of widget
    graphics. We use tkinter as the GUI interface, or toolkit. tkinter is an abbreviation
    for the “TK interface”. And “TK”, which is short for “toolkit”, is a platform
    independent, customizable, and configurable GUI library. The Python module tkinter
    allows Python programs to interface with the TK libraries, to produce pictures,
    and other forms of graphics, on the display of the Raspberry Pi.


    To accomplish this, we assume the following:


    +   1. That you are using a GUI, desktop environment to interact with your Raspberry
    Pi system. After all, that’s what Thonny is! A graphical IDE. Therefore, we also
    have a GUI capability when we program with tkinter to create Python GUI’s.

    2. That you have Python3.X on your Raspberry Pi system. The command line sessions,
    In-Chapter Exercises, examples, and questions and problems found in this, and
    in the following sections of the chapter, all require that you have at least a
    late version of Python3 installed on your Linux system.


    Our coverage of GUI construction with tkinter uses Python 3.9.2, and the appropriate
    tkinter module for those versions of Python. Depending upon the default Python3.X
    you are using, and given the specific Raspberry Pi OS distribution you are executing
    it on, the tkinter installation instructions may vary slightly from what is shown
    in Section 2.3.3.1 below, but basically it will be the same.


    # 2.5.3.1 Installing tkinter


    The standard widget GUI package that works with Python3 is named tkinter in Python3.X.
    For you to add widget GUI components and functionality to Python, you must be
    able to import this component package into your Python3 session.


    In this section, as much as is possible and practical given the Python3 GUI scripts
    we show, we add widgets from a “styled” widget set. These were available since
    TK version 8.5, and are named ttk widgets.


    You can easily test to see if your default Python system has tkinter available.
    On the Python command line, type:'
- md: "## 2.5.3.2 tkinter Toolkit Graphical User Interfaces\n\nA GUI allows you to\
    \ use a mouse, or other pointing device (such as your finger on a tablet), rather\
    \ than just the keyboard, to interact with programs that are running. Generally\
    \ when you use a CUI, such as during a Bash shell session, and you execute a command,\
    \ the tasks that command accomplishes do so in some structured order, either in\
    \ a determinate (counting-wise) or indeterminate (logic-wise) manner. Then the\
    \ command eventually terminates. But the Python3 GUI programs we show in this\
    \ section create screen widgets that are displayed on screen, and then the Python3\
    \ script that generates the icons and widgets \"waits\" for the user to do something\
    \ with them.\n\nThis kind of programming structure is event-driven. *GUI programs,\
    \ particularly in X windows graphics systems, are event-driven.* We emphasize\
    \ that kind of programming structure in the examples and descriptions we provide\
    \ below.\n\nA meaningful and useful Python3-scripted GUI program generally always\
    \ has some form of this basic content and structure:\n\n1.  Data of some sort\
    \ is produced, or already exists, for example, in the form of numbers, or database\
    \ text on the Raspberry Pi. This data itself can be generated in a variety of\
    \ ways. It could be generated by Python3 user-written modules placed before the\
    \ GUI-constructing components in a Python3 script, which is the style of Python3\
    \ GUI programming shown in all of our examples. It could also be input interactively\
    \ while the Python3 GUI script is running. It could use preexisting data generated\
    \ beforehand by some other application, or it could even use a C program that\
    \ generates data within the Python3 environment, while the Python3 script is executing!\n\
    \n2.  Widgets are created, and are organized within some encompassing window frame,\
    \ and then displayed on screen to the user. These widget objects are instances\
    \ of master widget classes in tkinter, and contain GUI functions that are selected\
    \ for, and specify particular kinds of responses to user input, and possible data-generating\
    \ application events.\n\n3.  There is a “hooking”, or tying together, of the instances\
    \ from Step 2 that utilize “callback” GUI functions to access the data you want\
    \ to display, or otherwise modify. For example, you can use any “callable” Python3\
    \ object as a callback. These might be ordinary Python3 functions, bound methods,\
    \ lambda expressions, and any other callable object.\n\n    > This is the most\
    \ critical, and therefore the most useful aspect, of Python GUI programming.\n\
    \n4.  Steps 2 and 3 exist inside of an infinite event-driven loop, that processes\
    \ user events. When a user event, such as a mouse button press, occurs, the event-driven\
    \ loop invokes the function associated with a specific event.\n\n5.  Data is modified\
    \ or produced with no apparent visible change on screen, or with graphical changes\
    \ occurring on screen. This is the “request” step.\n\n6.  The loop continues to\
    \ wait for events, and process them, until a possible termination event happens.\n\
    \nAs we present in Section 2.5.3.3 next, tkinter widgets can be chosen and constructed\
    \ to display and be hooked up to data using OOP, where the widgets are object\
    \ instances of master classes of tkinter widgets. But the style and execution\
    \ of the Python3 GUI script file itself can take on a procedural/imperative programming\
    \ model approach. We choose, as much as possible, to show the procedural/imperative\
    \ approach because we feel it’s easier for beginners to understand, and figure\
    \ out; particularly people who are *not* familiar with the OOP model of programming.\
    \ Python3 does *not* have core modules that implement GUI, event-driven-programming.\
    \ GUI programming is implemented using imported modules, such as those from the\
    \ tkinter toolkit.\n\nTo summarize the above steps, a user presses a mouse button\
    \ to signify a graphical “pick” in a widget, within an encompassing tkinter-produced\
    \ frame shown on-screen. That choice, or “event”, is recognized by, and acted\
    \ upon by the tkinter function controlling that widget. This event may generate\
    \ a “request” for graphical service, and this request displays the data or graphics\
    \ within the tkinter frame. A very similar situation is present in the X window\
    \ System Event-Request Model.\n\n## 2.5.3.2.1 Non-Event Driven tkinter\n\nThat\
    \ brings up some interesting questions: What kind of graphics is *not* event driven,\
    \ and what apps or programs accomplish this way of displaying data? Basically\
    \ static, non-interactive forms of computer graphics. Can you name any of those?\
    \ And, is tkinter able to do this form of non-event driven processing, and exactly\
    \ how?\n\n**Well, here’s an answer to that last question.**\nAs we’ve noted, tkinter\
    \ is primarily designed for event-driven graphics programming, where the program\
    \ responds to user input or system events. However, you can also create non-event\
    \ driven graphics using tkinter by using a technique called “animation loops”.\n\
    In a non-event driven program, you need to create your own loop that continuously\
    \ updates the graphical elements.\nHere’s a basic example of how you can create\
    \ a non-event driven graphical program using tkinter:\n\n```python\nimport tkinter\
    \ as tk\ndef update_graphics():\n    # Update your graphical elements here\n \
    \   # This function will be called repeatedly in the main loop\n    # Example:\
    \ Move a shape on a canvas\n    canvas.move(shape, 1, 0)\n    # Schedule the next\
    \ update\n    root.after(10, update_graphics) # Update every 10 milliseconds\n\
    root = tk.Tk()\ncanvas = tk.Canvas(root, width=400, height=400)\ncanvas.pack()\n\
    # Create a shape on the canvas\nshape = canvas.create_rectangle(50, 50, 100, 100,\
    \ fill='red')\n# Start the update loop\nupdate_graphics()\nroot.mainloop()\n```\n\
    \nIn the above example, the `update_graphics()` function is called repeatedly\
    \ using the `root.after()` method, which schedules a function to be called after\
    \ a specified delay (in milliseconds). Inside the `update_graphics()` function,\
    \ you can update your graphical elements as needed. In this case, the example\
    \ moves a rectangle on a canvas by calling the **canvas.move()** method.\n\nBy\
    \ adjusting the delay passed to **root.after()**, you can control the speed of\
    \ the updates. Smaller delays result in faster updates and smoother animation,\
    \ but they can also consume more system resources.\n\nKeep in mind that tkinter\
    \ is not optimized for high-performance graphics or animations! For more complex\
    \ or demanding graphics, you might consider using specialized libraries or frameworks\
    \ such as Pygame or OpenGL.\n\n## 2.5.3.3 Basic Widget Construction Techniques\n\
    \nWidgets are constructed images on the screen display, and they have a unique\
    \ “style”, depending on the details of what information, and kind of interactivity\
    \ you want them to participate in. The “style” of a widget is controlled by many\
    \ complex graphical components: the X Window System, the display manager used,\
    \ and the operating system itself. The tkinter module contains two versions of\
    \ widgets: a default, or “generic version”, which makes widgets look the same\
    \ regardless of what windowing system, operating system, or display manager is\
    \ running. tkinter also implements widgets that emulate a particular windowing\
    \ system, operating system, or display manager’s “style”. Which tkinter modules\
    \ you import determines which widget sets are available to generate events and\
    \ “callbacks”. The standard way of doing this uses the module tk to access the\
    \ “generic” widgets, and the module ttk to access the “styled” widgets. You *must*\
    \ import the tk module, because it allows you to create a “root”, or outer-most\
    \ frame window. You optionally import the ttk module if you want the “styled”\
    \ widgets.\n\n> ***Note***\n> As is done in some of the following examples, you\
    \ can use both the tk and ttk widgets in a GUI Python3 script file.\n\nTo use\
    \ the “generic” widgets, include the following **import** statement at the top\
    \ of the Python3 script file:\n\n```python\nimport tkinter as tk\n```\nor:\n```python\n\
    import tkinter\n```\n\nTo use the “styled” widgets, include the following **import**\
    \ statement at the top of the Python3 script file:\n\n```python\nfrom tkinter\
    \ import ttk\n```\n\nThe following two tables list the standard, pre-defined widgets\
    \ in the tkinter module."
  mdcn: "## 2.5.3.2 tkinter 工具包图形用户界面\n\n图形用户界面允许你使用鼠标或其他指向设备（例如平板电脑上的手指）与正在运行的程序进行交互，而不仅仅是键盘。通常，当你使用命令行界面时，例如在\
    \ Bash shell 会话中执行命令，该命令完成的任务会以某种结构化顺序进行，无论是确定性的（可计数的）还是非确定性的（逻辑上的）。然后命令最终会终止。但我们在本节展示的\
    \ Python3 GUI 程序会创建显示在屏幕上的屏幕部件，然后生成这些图标和部件的 Python3 脚本会“等待”用户对它们进行操作。\n\n这种编程结构是事件驱动的。*GUI\
    \ 程序，特别是在 X 窗口图形系统中，是事件驱动的。* 我们在下面提供的示例和描述中强调了这种编程结构。\n\n一个有意义且有用的 Python3 脚本编写的\
    \ GUI 程序通常总是具有某种形式的这种基本内容和结构：\n\n1.  产生或已经存在某种数据，例如，以数字形式或树莓派上的数据库文本形式。这些数据本身可以通过多种方式生成。它可以通过放置在\
    \ Python3 脚本中 GUI 构建组件之前的 Python3 用户编写的模块生成，这是我们所有示例中展示的 Python3 GUI 编程风格。它也可以在\
    \ Python3 GUI 脚本运行时交互式输入。它可以使用由其他应用程序预先生成的数据，甚至可以在 Python3 脚本执行期间使用在 Python3 环境中生成数据的\
    \ C 程序！\n\n2.  创建部件，并将其组织在某个包含窗口框架内，然后显示给用户。这些部件对象是 tkinter 中主部件类的实例，包含为用户输入选择的\
    \ GUI 功能，并指定对用户输入和可能的数据生成应用程序事件的特定响应。\n\n3.  将步骤 2 中的实例进行“挂钩”或绑定在一起，这些实例使用“回调”\
    \ GUI 函数来访问你想要显示或以其他方式修改的数据。例如，你可以使用任何“可调用的” Python3 对象作为回调。这些可能是普通的 Python3 函数、绑定方法、lambda\
    \ 表达式以及任何其他可调用对象。\n\n    > 这是 Python GUI 编程中最关键、因此也是最有用的方面。\n\n4.  步骤 2 和 3 存在于一个无限的事件驱动循环中，该循环处理用户事件。当用户事件（如鼠标按钮按下）发生时，事件驱动循环会调用与特定事件关联的函数。\n\
    \n5.  数据被修改或产生，屏幕上没有明显的可见变化，或者屏幕上发生图形变化。这是“请求”步骤。\n\n6.  循环继续等待事件并处理它们，直到可能发生终止事件。\n\
    \n正如我们在下一节 2.5.3.3 中介绍的，可以选择和构建 tkinter 部件，使用面向对象编程来显示和连接数据，其中部件是 tkinter 部件主类的对象实例。但是，Python3\
    \ GUI 脚本文件本身的风格和执行可以采用过程式/命令式编程模型方法。我们尽可能选择展示过程式/命令式方法，因为我们认为它更容易让初学者理解和弄清楚；特别是那些*不*熟悉面向对象编程模型的人。Python3\
    \ *没有*实现 GUI、事件驱动编程的核心模块。GUI 编程是使用导入的模块实现的，例如来自 tkinter 工具包的模块。\n\n总结上述步骤，用户按下鼠标按钮以表示在\
    \ tkinter 生成的、显示在屏幕上的包含框架内的部件中进行图形“选择”。该选择或“事件”由控制该部件的 tkinter 函数识别并处理。此事件可能生成图形服务的“请求”，该请求在\
    \ tkinter 框架内显示数据或图形。X 窗口系统事件-请求模型中存在非常类似的情况。\n\n## 2.5.3.2.1 非事件驱动的 tkinter\n\
    \n这就引出了一些有趣的问题：什么样的图形*不是*事件驱动的，哪些应用程序或程序以这种方式显示数据？基本上是静态的、非交互式的计算机图形形式。你能说出其中一些吗？而且，tkinter\
    \ 能够进行这种非事件驱动的处理吗？具体如何实现？\n\n**那么，这是对最后一个问题的回答。**\n正如我们所指出的，tkinter 主要设计用于事件驱动的图形编程，程序响应用户输入或系统事件。但是，你也可以通过使用一种称为“动画循环”的技术，使用\
    \ tkinter 创建非事件驱动的图形。\n在非事件驱动的程序中，你需要创建自己的循环来持续更新图形元素。\n以下是如何使用 tkinter 创建非事件驱动图形程序的基本示例：\n\
    \n```python\nimport tkinter as tk\ndef update_graphics():\n    # 在此处更新你的图形元素\n\
    \    # 此函数将在主循环中被重复调用\n    # 示例：在画布上移动一个形状\n    canvas.move(shape, 1, 0)\n   \
    \ # 调度下一次更新\n    root.after(10, update_graphics) # 每10毫秒更新一次\nroot = tk.Tk()\n\
    canvas = tk.Canvas(root, width=400, height=400)\ncanvas.pack()\n# 在画布上创建一个形状\n\
    shape = canvas.create_rectangle(50, 50, 100, 100, fill='red')\n# 启动更新循环\nupdate_graphics()\n\
    root.mainloop()\n```\n\n在上面的示例中，`update_graphics()` 函数使用 `root.after()` 方法被重复调用，该方法调度一个函数在指定的延迟（以毫秒为单位）后被调用。在\
    \ `update_graphics()` 函数内部，你可以根据需要更新图形元素。在这个例子中，示例通过调用 **canvas.move()** 方法在画布上移动一个矩形。\n\
    \n通过调整传递给 **root.after()** 的延迟，你可以控制更新的速度。较小的延迟会导致更快的更新和更流畅的动画，但它们也可能消耗更多的系统资源。\n\
    \n请记住，tkinter 并非为高性能图形或动画而优化！对于更复杂或要求更高的图形，你可能需要考虑使用专门的库或框架，例如 Pygame 或 OpenGL。\n\
    \n## 2.5.3.3 基本部件构建技术\n\n部件是屏幕显示上的构建图像，它们具有独特的“样式”，具体取决于你希望它们参与的信息和交互类型的细节。部件的“样式”由许多复杂的图形组件控制：X\
    \ 窗口系统、使用的显示管理器以及操作系统本身。tkinter 模块包含两个版本的部件：一个默认的或“通用版本”，它使部件看起来相同，无论运行的是什么窗口系统、操作系统或显示管理器。tkinter\
    \ 还实现了模拟特定窗口系统、操作系统或显示管理器“样式”的部件。你导入哪些 tkinter 模块决定了哪些部件集可用于生成事件和“回调”。标准做法是使用\
    \ tk 模块访问“通用”部件，使用 ttk 模块访问“样式化”部件。你*必须*导入 tk 模块，因为它允许你创建“根”或最外层的框架窗口。如果你想要“样式化”的部件，可以选择性地导入\
    \ ttk 模块。\n\n> ***注意***\n> 正如在下面的一些示例中所做的那样，你可以在 GUI Python3 脚本文件中同时使用 tk 和 ttk\
    \ 部件。\n\n要使用“通用”部件，请在 Python3 脚本文件顶部包含以下 **import** 语句：\n\n```python\nimport tkinter\
    \ as tk\n```\n或：\n```python\nimport tkinter\n```\n\n要使用“样式化”部件，请在 Python3 脚本文件顶部包含以下\
    \ **import** 语句：\n\n```python\nfrom tkinter import ttk\n```\n\n以下两个表格列出了 tkinter\
    \ 模块中的标准、预定义部件。"
