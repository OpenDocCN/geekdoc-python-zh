    \ not be stored in /home, as a preventative measure.\n- Set the nodev option so\
    \ no device file located there will be recognized. Device files should be stored\
    \ in /dev, not in /home.\n- Optionally set the noexec option, so no executable\
    \ programs which are stored in /home can be run.\n\n## In-Chapter Exercise\n\n\
    53. You are tasked by your boss to migrate all of the home directories of all\
    \ users on your system off their default location on a microSD-based /boot/ system\
    \ medium, to a multi-media installation on the same Raspberry Pi. Sketch a detailed\
    \ plan of exactly how you would do this, using the migration of a single user\
    \ as an example. Show all commands you would use to achieve the migration, and\
    \ successfully delete the old /home directory for that user's account.\n\n## 1.15.6.2\
    \ Securing the File System\n\nAnother important part of securing your Raspberry\
