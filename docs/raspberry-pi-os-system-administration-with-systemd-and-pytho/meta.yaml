  md: '# Operation 1


    To use the apt-cache package query function to list available packages on your
    system, use the following command:


    ```

    root@raspberrypi:~# apt-cache pkgnames

    ```


    Although this listing can be quite long, it is useful to find out if a package
    has been installed on your system. For example, in the nginx example we show below,
    before you try to install a package named “nginx”, it is a good idea to see if
    it has already been installed!


    # Operation 2


    To install a package, use the following command:


    ```

    root@raspberrypi:~# apt-get install package_name

    ```


    # Operation 3


    To remove a package, or the package and its configuration files, use the following
    commands:


    ```

    root@raspberrypi:~# apt-get remove package_name

    root@raspberrypi:~# apt-get purge package_name

    ```


    # Operation 4


    To update the package index files from the local sources.list directories (the
    metadata for packages), or upgrade all Debian packages to their latest versions,
    use the following commands:


    ```

    root@raspberrypi:~# apt-get update

    root@raspberrypi:~# apt-get upgrade

    ```


    # Operation 5


    To individually update an installed package, by removing it and then reinstalling
    it use the following command:


    ```

    root@raspberrypi:~# apt-get --reinstall install package_name

    ```


    # Operation 6


    To show metadata associated with an installed package on the system, use the following
    command:


    ```

    root@raspberrypi:~# apt-cache show package_name

    ```'
