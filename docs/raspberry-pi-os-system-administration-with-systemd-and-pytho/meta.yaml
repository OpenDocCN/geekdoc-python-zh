    mkdir: Bookshelf/Salinger: Permission denied

    $ cp foo Bookshelf

    cp: Bookshelf/foo: Permission denied

    $ cd sample

    cd: sample: Permission denied

    $ ls -l personal

    total 0

    ls: personal: Permission denied

    $

    ```


    The next set of commands show that having read or write permission on a directory
    is *not* adequate to read its contents (e.g., display them with the **ls** command),
    or create a file or sub-directory in it. For example, the directory dirtest has
    write permission turned on, but you cannot copy the morsel.txt file into it, because
    search permission on it is turned off. Similarly, you cannot remove the file steak.txt
    from dirtest2. After you turn on its search permission with the **chmod u+x dirtest2**
    command, you can remove the file steak.txt.


