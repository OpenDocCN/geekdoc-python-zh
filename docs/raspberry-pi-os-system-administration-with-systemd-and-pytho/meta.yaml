  md: '# 1.13 Software Updates and Operating System Upgrades


    Question: Why would the two most-significant, post-installation tasks, that an
    ordinary user on a single-user Raspberry Pi system need to perform, be as follows?


    +   a) The addition, removal, or update of software applications as packages on
    the system.

    b) The upgrade of the operating system itself to a newer, currently stable release


    Answer:


    +   a) The standard installation of the operating system does *not* include software
    that the user needs, given the use-cases she puts the system to. And also, changing
    conditions in use-cases require removal of software packages as well. Finally,
    as newer and improved versions of installed packages become available, there must
    be a quick and easy way to update the packages to incorporate those improvements.

    b) Purely from a performance and *security viewpoint*, upgrades of the system
    happen very regularly, and even an ordinary user should take advantage of these
    improvements via upgrades.


    Question: What is the difference between “updating” and “ upgrading” a Raspberry
    Pi system?


    Answer: Generally in the literature, the two terms are often confused with one
    another. But from our perspective in this section (and throughout this chapter),
    we define the two terms as follows:


    *Updating* is the process of adding or replacing application software packages.
    For example, bringing the nginx web server application from an earlier-installed
    version to the latest stable release of it.


    *Upgrading* is the process of replacing the entire operating system with a newer,
    hopefully stable release. The upgrade can be to a newer minor release, or to a
    new major release. For example, upgrading from what was named Raspbian to the
    Raspberry Pi OS, an upgrade which was not just a naming convention change. Additionally,
    a change in the kernel from an earlier release to a later release constitutes
    a major upgrade of the operating system.


    In this section we show the basics of how these two fundamental tasks can be done
    on our representative Raspberry Pi OS.


    For software application addition, removal, or updates, we limit the discussion
    to covering the Advanced Packaging Tool (APT), because that’s the'
