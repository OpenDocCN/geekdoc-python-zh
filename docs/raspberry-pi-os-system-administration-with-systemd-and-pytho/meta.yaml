    ## 2.3.7 Uses of Python3


    Python can accomplish several kinds of programming tasks, which might be broken
    down into the following sample categories:


    - Shell scripting

    - Systems programming

    - Network and Internet scripting

    - Database programming

    - Systems administration scripting

    - Graphical user interface (GUI) scripting

    - Scientific and math programming

    - Data mining


    In this chapter, we use all four modes of running Python shown above in the examples
    in Section 2.3.6, and we give a beginners'' introduction to the Python language.
    We also follow the model of level schemes as shown in the beginning of Section
    2.3, going roughly from the top of the scheme to the bottom.


    ## 2.3.8 Information on the Installation of Python


    Version 3.9.2 of Python was already installed and usable by us on the Raspberry
    Pi OS we had deployed on our Pi4B and Pi400 hardware. But, you may need to, or
    want to, install a more recent version of Python3 on your system, or if you want
    to install a later version of the software alongside, or to even replace the version
    your system already has preinstalled on it. Be aware that because of variations
    in the way your system has been installed by you, or the system administrator,
    and exactly what version of the Raspberry Pi OS has been installed, the installation
    procedure for the latest available Python3 may have to be already done by a system
    administrator for you! A good example of a similar situation would be that you
    do not have a C compiler available, or you want to upgrade to the latest gcc compiler,
    and don’t know how to do that with, or without, a package manager!


    We give installation instructions for the installation of the latest Python3 (available
    at the time we wrote this book) below. Be aware though that it may not include,
    or have the stable features found with the Python3 that is already installed.


    ### 2.3.8.1 Installing the Latest Release of Python3


    Follow the steps below to install the latest release of Python3:


    +   1. Go to www.python.org/downloads/ in a web browser. Find the name of the
    latest stable release of Python.

    2. For us, at the time this book was written, it was Python-3.11.3.tgz. Remember
    that the version of Python3 already installed by default on our Raspberry Pi OS
    was Python 3.9.2.

    3. Type the following commands, substituting the latest release for the one we
    show in Step 2:


    ```

    $ wget www.python.org/ftp/python/3.11.3/Python-3.11.3.tgz

    --2023-06-02 06:05:47-- www.python.org/ftp/python/3.11.3/Python-3.11.3.tgz

