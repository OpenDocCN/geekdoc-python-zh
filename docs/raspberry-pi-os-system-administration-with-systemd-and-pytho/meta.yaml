  md: 'The general syntax of the **tar** command, shown with GNU-style syntax as opposed
    to traditional UNIX-style syntax, is as follows:


    ```

    tar


    Syntax: tar [operation mode] [operation mode options] [FILE...]


    Purpose: Archive (copy in a particular format) files to, or restore files from,
    an archival medium (which can be an ordinary file). Directories are by default
    archived and restored recursively.

    Output: Archived or restored files or directory structures.

    ```


    **Main Operations and Operation Options in GNU-Style Usage:**


    +   - `--append` Append files to the end of an archive.

    - `--concatenate` Append an archive to the end of another archive.

    - `--compare` Find differences between archive and file system.

    - `--create` Create a new tape and record archive files on it

    - `--delete` Delete from the archive.

    - `--extract` Extract files from an archive.

    - `--help` Display a short option summary.

    - `--list` List the contents of an archive.

    - `--show-defaults` Show built-in defaults for options.

    - `--test-label` Test the archive volume label and then exit.

    - `--update` Append files which are newer than the versions in an archive.

    - `--usage` Display a list of available options.

    - `--version` Display program version and copyright information.


    **Common Options:**


    +   - `--preserve-permissions` Extract information about traditional file permissions.

    - `--acls` Enable POSIX.1e ACL support.

    - `--gzip` Filter the archive through gzip.

    - `--verbose` Verbosely list files processed.

    - `--file ARCHIVE.tar` Send archive to file named ARCHIVE.tar.


    **Command Arguments:**

    FILE... Target, either an archive file, or file object to be archived.


    # **1.11.2.1 Archiving and Restoring Files Using tar**


    A normal Raspberry Pi OS user can archive their own work if they want to. They
    would normally need to do this with file objects related to a project, so that
    they'
  merge: -1
  pgno: 128
- img_proc: true
  md: 'can transfer them to someone via e-mail, ssh, or via mobile secondary storage
    media (USB thumb drive, for example). Or perhaps they would want to retain their
    own file system objects as backups via the same methods.


    The primary reason for making an archive is the convenience of dealing with (sending
    or receiving) a single file instead of a complete directory hierarchy. Without
    an archive, the sender might have to send several files and directories (a file
    structure) that the receiver would have to restore in their correct hierarchical
    structure. Without an archiving facility such as **tar**, depending on the size
    of the files and directory structure, the task of sending, receiving, and reconstructing
    the file structure can be very time consuming.


    There are other file compression facilities, such as the **bzip2**, **gzip**,
    **gunzip**, **gzexe**, **xz**, **zcat**, and **zmore** commands, and we must point
    out that compression saves disk space and transmission time. But compressing small
    files normally does not result in much compression, and storage space. Also, compressing
    files of one cluster in size (the minimum unit of disk storage, i.e. one or more
    sectors) or less does not help save storage media space, even if compression does
    result in smaller files, because the system ends up using one cluster to save
    the compressed file anyway. But if compression does result in a smaller file,
    you do save time in transmitting the compressed version. If the disk block size
    is 512 bytes and a cluster consists of more than two blocks, you can use the **tar**
