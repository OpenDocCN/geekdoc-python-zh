    其中**选项(S)**是**rsync**命令的有效选项，**源(SRC)**是源文件或目录，**目标(DEST)**是目标路径。


    接下来的五个示例将使用Python3标准库模块，并将Bash shell命令嵌入Python“包装器”（嵌入在Python代码中的Linux shell命令）。这些示例主要使用Python3的**os.system**模块来：


