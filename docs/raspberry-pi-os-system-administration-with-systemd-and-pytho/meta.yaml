    \ Python\n- 2.4 Python3 Syntax\n  - 2.4.1 Printing Text, Comments, Numbers, Grouping\
    \ Operators, and Expressions\n  - 2.4.2 Variables and Naming Conventions\n  -\
    \ 2.4.3 Functions\n  - 2.4.4 Conditional Execution\n  - 2.4.5 Determinate and\
    \ Indeterminate Repetition Structures and Recursion\n  - 2.4.6 File Input and\
