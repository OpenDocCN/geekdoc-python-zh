  md: '* Evaluating an alternate OS: The new OS could be run within a VM, without
    altering the host OS.

    * Server virtualization: Multiple virtual servers, in what are often referred
    to as “containers”, could be run on a single physical server, to utilize more
    fully the hardware resources of the physical server. A cloud computing example
    of this is Amazon Web Services Elastic Cloud Computing (AWS EC2) virtual servers.

    * Duplicating specific environments: A VM could, depending on the virtualization
    software used, be duplicated and installed on multiple hosts, or restored to a
    previously backed-up system state.

    * Creating a protected environment: If a guest OS running on a VM becomes damaged
    in a way that is difficult to repair, such as may occur when testing, the VM can
    be discarded without harm to the host system, and a clean copy used next time.


    Primary actual contemporary virtualization techniques are as follows:


    * Full virtualization: In full virtualization, the VM simulates enough hardware
    to allow a complete “guest” OS, one designed for the same processor instruction
    set architecture (ISA) to be run in isolation. Examples for Linux systems running
    on X86 ISAs or ARM architectures include VirtualBox, Parallels Workstation, Oracle
    VM, Virtual Server, Hyper-V, VMware Workstation, and VMware.

    * Hardware-assisted virtualization: In hardware-assisted virtualization, the hardware
    provides architectural support that facilitates building a VMM and allows guest
    OSs to be run in isolation. Examples of virtualization platforms adapted to such
    hardware include KVM, VMware Workstation, VMware Fusion, Hyper-V, Xen, Oracle
    VM server for SPARC, and VirtualBox.

    * Partial virtualization: In partial virtualization, including address space virtualization,
    the VM simulates multiple instances of much of an underlying hardware environment,
    particularly address spaces.

    * Paravirtualization: In paravirtualization, the VM does not necessarily simulate
    hardware, but instead (or in addition) offers a special application programmer’s
    interface (API) that can only be used by modifying the “guest” OS. For this to
    be possible, the “guest” OS’s source code must be available.

    * OS-level virtualization: In OS-level virtualization, a physical server is virtualized
    at the OS level, enabling multiple isolated and secure virtualized servers to
    run on a single physical server. The “guest” OS environments share the same running
    instance of the OS as the host system. Thus, the same OS kernel is also used to
    implement the “guest” environments, and applications running in a given “guest”
    environment'
