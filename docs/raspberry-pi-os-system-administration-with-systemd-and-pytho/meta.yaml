    \ 2.26\n\nBash 脚本代码\n\n```\n#!/bin/bash\nif [ -d \"/usr/bin\" ]; then\n    echo\
    \ \"/usr/bin is a directory\"\nelse\n    echo \"/usr/bin is not a directory\"\n\
    fi\n```\n\n等效的 Python 代码\n\n```\n#!/usr/bin/python3\nimport os\nif os.path.isdir(\"\
    /usr/bin\"):\n    print (\"/usr/bin is a directory\")\nelse:\n    print (\"/usr/bin\
    \ is not a directory\")\n```\n\n在我们的 Raspberry Pi 系统上，使用 Python 3.9.2，我们使用方式 4（Bash\
