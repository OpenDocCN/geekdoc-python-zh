    \ file **first.py** in this example case):\n\n# Example 2.4\n\n```\n#!/usr/bin/env\
    \ python3\n```\n\nYou must also be sure that you have execute privilege on **first.py**,\
    \ using the **chmod u+x first.py** command. Then, to execute the **first.py**\
