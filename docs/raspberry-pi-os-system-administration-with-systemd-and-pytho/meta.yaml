    # 1.14.2 Managing Memory


    systemd allows you to easily control and set limits on a unit''s memory usage.
    This can be critical in cases where there is a smaller amount of installed memory
    on your Raspberry Pi hardware. To see what percentage of memory a unit is consuming,
    use the **top** command, and examine the column output for %MEM. Given the use-case(s)
    your system has been designed for, if an application or service is consuming too
    much memory, there are two ways you can limit its memory usage.


    The limit specifies how much process and kernel memory can be used by tasks in
    this unit. The limit is a memory size in bytes. If the numerical value is followed
    by K, M, G or T, the specified memory size is parsed as Kilobytes, Megabytes,
    Gigabytes, or Terabytes (with the base 1024), respectively. The special value
    “infinity” means that no memory limit is to be applied.


    The simplest way to achieve this is to put the following directive in the [Service]
    section of the unit’s configuration file:


    ```

    **MemoryLimit=value**

    ```


    Replace value with a limit on maximum memory usage of the processes executed in
    the cgroup. Use suffixes K, M, G, or T to identify Kilobyte,'
  merge: -1
