    \ and also the NFSv4 Access Control Lists (ACLs) model, in Volume 1. We discuss\
    \ system security in general in Section 1.15 below, and follow that up with specific\
    \ details of it in the sub-sections of that section.\n\n### 1.7.1 How to Reveal\
    \ File Access Privileges\n\nThe **ls** command, with the **-l** or **-la**, and\
