    medium, and on the boot/system medium. At this point, you can safely delete the
    new user’s home/login directory on the boot/system medium.


    Followup: Unmounting and Mount on boot


    To unmount the external medium, while in the administrative account, use the following
    command:


    ```

    $ sudo umount /dev/sdb1

    ```


    If you want this user’s home/login directory to mount, and be available after
    reboots of the system, you need the information from the column UUID from Step
    1’s output above, to be able to have this exact medium device mount on subsequent
    reboots of the system. Edit the file /etc/fstab with any editor, for example nano.


    ```

    $ sudo nano /etc/fstab

    ```


    Add the following line at the end of the file. Make sure to replace the UUID and
    the path of the mounted device with what is on your system, not what shows on
    ours here in this example!


    ```

    UUID=04fd2202-8879-46f2-8040-446753ed077c /media/sarwar ext4 defaults 0

    ```


    It’s possible to use /dev/sdb1 instead of UUID=... in the above line in the file,
    but using the UUID ensures that you are mounting this exact external medium, and
    not another one that you could put in the same USB slot on the Raspberry Pi upon
    reboot.


