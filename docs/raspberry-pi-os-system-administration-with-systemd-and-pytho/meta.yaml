    # 1.7.3 Access Privileges for Directories


    The read permission on a directory lets you read the contents of the directory
    (the contents of a directory are the names of ordinary files and directories under
    it), the write permission allows you to create a file in the directory, or delete
    an existing file or sub-directory from it, and the execute permission for a directory
    allows searching the contents of the directory.


    > ***Note***

    Read and write permissions on directories are *not* meaningful without the search
    permission. You must have both read and execute permissions on a directory to
    be able to list the names of files under it. You must have both write and execute
    permissions on a directory to be able to create a file in it.


    In the following commands, the write permission for the directory Bookshelf has
    been turned off. Thus, you cannot create a subdirectory ee345 in this directory
    by using the **mkdir** command or copy a file foo into it. Similarly, as you do
    not have search permission for the directory personal, you cannot use the **cd**
    command to enter (change directory to) this directory. If the directory test had
    a subdirectory, say foobar, for which the execute permission was turned on, you
    still could not change directory to foobar, because search permission for test
    is turned off. Finally, as read permission for the directory personal is turned
    off, you cannot display the names of files and directories in it by using the
    **ls** command, even though search permission on it is turned on.


    $ chmod 600 sample

    $ chmod 500 Bookshelf

    $ chmod 300 personal

