  md: '# In-Chapter Exercises


    1. Type the following commands on your Raspberry Pi system’s command line, and
    note the results. Which ones are syntactically incorrect? Why? (The Bash prompt
    is shown as the $ character in each, and we assume that **file1** and **file2**
    exist)


    ```

    $ la -ls

    $ cat

