    \n## 2.6 总结\n\n我们使用 Python 3.9.2 对 Python3 编程语言进行了广泛的介绍。对于 Python3 初级程序员，我们在三种主要的计算机编程范式——*虚拟化*、*并发*和*持久化*——的背景下，阐述了其所有重要的编程能力和语法结构。我们详细介绍了如何在\
