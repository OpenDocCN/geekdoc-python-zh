    \ >, >=, <>, !=, == | Comparisons, membership, identity |\n| not x | Boolean NOT\
    \ |\n| and | Boolean AND |\n| or | Boolean OR |\n| lambda | Lambda expression\
    \ |\n\nThis is the number of fingers I am holding up:\n\nTo add comments to a\
    \ script file of Python commands, you place the pound sign(#) before (and possibly\
    \ after) everything on the line you want commented. For example, in interactive\
