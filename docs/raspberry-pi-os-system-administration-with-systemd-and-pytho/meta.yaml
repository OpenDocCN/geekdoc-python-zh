    \ man 页中，返回有用的 man 页标题。例如，以下命令在我们的树莓派系统上产生屏幕输出：\n\n```\n$ man -k passwd\nchgpasswd\
    \ (8)          - update group passwords in batch mode\nchpasswd (8)          \
    \ - update passwords in batch mode\nexim4_passwd (5)       - Files in use by the\
    \ Debian exim4 packages\nexim4_passwd_client (5) - Files in use by the Debian\
    \ exim4 packages\nfgetpwent_r (3)        - get passwd file entry reentrantly\n\
    getpwent_r (3)         - get passwd file entry reentrantly\ngpasswd (1)      \
    \      - administer /etc/group and /etc/gshadow\nopenssl-passwd (1ssl)  compute\
    \ password hashes\npam_localuser (8)      - require users to be listed in /etc/passwd\n\
    passwd (1)             - change user password\npasswd (1ssl)          - compute\
    \ password hashes\npasswd (5)             - the password file\npasswd2des (3)\
    \         - RFS password encryption\nupdate-passwd (8)      - safely update /etc/passwd,\
    \ /etc/shadow and\n                        /etc/group\nvncpasswd (1)         \
    \ - VNC Server password utility\nOutput truncated...\n```\n\n### 0.2.6 其他获取帮助的方法\n\
    \n要获取任何特定树莓派操作系统命令功能的简短描述，你可以使用 **whatis** 命令。这类似于 **man -f** 命令。**whatis** 命令的一般语法如下：\n\
    \n**whatis keywords**\n**目的：** 在 whatis 数据库中搜索每个关键字的简要描述\n**输出：** 将每个关键字的一行描述打印到屏幕\n\
    \n以下是使用 **whatis** 的示例——\n两个命令的输出都被截断了。\n\n使用 systemd 和 Python 的树莓派操作系统系统管理\n\n\
    ```\n$ whatis man\nman (7) - macros to format man pages\nman (1) - an interface\
    \ to the on-line\n          reference manuals\n$\n```\n\n你也可以通过在同一个命令行上向 **whatis**\
    \ 命令输入多个参数（参数之间用空格分隔）来获取多个命令的简短描述。以下是此方法的示例：\n\n```\n$ whatis login set setenv\n\
    login (1) - begin session on the system\nlogin (3) - write utmp and wtmp entries\n\
    setenv (3) - change or add an environment variable\nset: nothing appropriate.\n\
    $\n```\n\n以下章节练习要求你使用 **man** 和 **whatis** 命令查找有关 **passwd** 命令的信息。完成练习后，你可以运用所学知识更改你使用的树莓派操作系统上的登录密码。\n\
    \n### 章节练习\n\n- 10. 使用带有 -k 选项的 **man** 命令，显示 **passwd** 命令的简要帮助。这样做将给你一个类似于使用\
    \ **whatis** 命令获得的屏幕显示，但它会显示所有包含字符 passwd 的 apropos 命令名称。\n- 11. 使用 **whatis**\
    \ 命令获取上述 **passwd** 命令的简要描述，然后注意 **whatis passwd** 和 **man -k passwd** 命令之间的区别。\n\
    \n### 0.3 实用命令\n\n有几个重要的命令可以让初学者在使用树莓派操作系统时更有效率。以下章节给出了这类实用命令的示例，并按系统设置、通用实用程序和通信命令进行组织。\n\
    \n### 0.3.1 检查系统设置\n\n**whereis** 命令允许你沿着某些规定的路径搜索，以定位实用程序和命令，例如 shell 程序。**whereis**\
    \ 命令的一般语法如下：\n\n**whereis [options] filename**\n**目的：** 定位命令的二进制文件、源代码和 man 页文件\n\
    **输出：** 首先去除提供的名称中的前导路径名组件和扩展名，然后在屏幕上显示路径名\n\n**常用选项/功能：**\n**-b** 仅搜索二进制文件\n\
    **-s** 仅搜索源代码\n\n例如，如果你在命令行上输入命令 **whereis bash**，你将看到 Bash shell 程序文件本身的路径列表，如下所示：\n\
    \n```\n$ whereis bash\nbash: /bin/bash /etc/bash.bashrc /usr/share/man/man1/bash.1.gz\n\
    ```\n\n请注意，无法使用 **whereis** 命令找到“内置”或内部命令的路径。\n\n首次登录时，能够查看有关你的**用户ID**、你登录的计算机或系统以及该计算机上的操作系统的信息显示非常有用。这些任务可以使用\
    \ **whoami** 命令完成，该命令在屏幕上显示你的**用户ID**。**whoami** 命令的一般语法如下：\n\n**whoami**\n**目的：**\
    \ 显示有效用户 ID\n**输出：** 在标准输出上将你的有效用户 ID 显示为一个名称\n\n以下显示了我们在命令行上输入此命令时系统的响应。\n\n\
    ```\n$ whoami\nbob\n$\n```"
