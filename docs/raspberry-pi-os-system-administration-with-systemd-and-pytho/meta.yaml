    有许多传统的、遗留的方法来实现此数据存储模型的目标，使用诸如Linux磁盘和文件维护命令、实用程序（如mdadm（软件RAID管理器））和Linux卷管理（LVM）等设施。但从我们的角度来看，实现推荐数据存储模型的现代和当代方式是在冗余的额外持久介质上使用ZFS。使用ZFS，你可以获得位级数据完整性、卷管理、所有级别的RAID功能以及防故障备份策略，所有这些都集成在一个实用程序中。


