    the **-d** option is used to specify which printer to use. The option to specify
    the number of copies is **-n** for the **lp** command.


    ```

    $ lp -d spr file1

    request id is spr-983 (1 file(s))

    $ lp -d spr -n 3 sample phones

    request id is spr-984 (2 file(s))

    $

    ```


