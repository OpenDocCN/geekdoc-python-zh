  md: 'most common mistake for beginners is misplacing files. They cannot find the
    file names listed with the **ls** command because they have placed or created
    the files in a directory either above or below the current working directory in
    the file structure. When you create a file, if you have also created a logically
    organized set of directories beneath your own home directory, you will know where
    to store the file. In the following set of commands, we create a directory beneath
    the home directory and use that new directory to store a file.


    To create a new directory beneath the current working directory, you use the **mkdir**
    command. The general syntax for the **mkdir** command is as follows:


    ```

    mkdir [options] dirnames

    Purpose: Creates directory or directories specified in **dirnames**

    Output: New directory or directories

    Commonly used options/features:

    -m MODE Create a directory with given access modes

    -p Create parent directories that don''t exist in the pathnames specified in **dirnames**

    ```


    To create a child, or subdirectory, named **first** under the current working
    directory, type the following:


    ```

    $ mkdir first

    $

    ```


    This command has now created a new subdirectory named **first** under, or as a
    child of, the current working directory. Refer back to Figure 0.1 for a graphical
    description of the directory location of this new subdirectory.


    In order to change the current working directory to this new subdirectory, you
    use the **cd** command. The general syntax for the **cd** command is as follows:


    ```

    cd [directory]

    Purpose: Change the current working directory to **directory** or return to the
    home directory when **directory** is omitted

    Output: New current working directory

    ```


    To change the current working directory to **first** by descending down the path
    structure to the specified directory named **first**, type the following:


    ```

    $ cd first

    $

    ```


    You can always verify what the current working directory is by using the **pwd**
    command. The general syntax of the **pwd** command is as follows:'
