    ```

    #!/bin/bash

    # To backup additional directories, put more pathnames in the

    # following command,

    # separated by spaces, such as /home/bob, /home/bill, etc.

    backup_source=/home/bob/bashtest

    backup_destination=/home/bob/simple_backup

    filename=back1.tgz

    echo "Backing up your bashtest directory"

    tar --create --verbose --gzip --file $backup_destination/$filename \n$backup_source

    echo "Backup Complete"

    ```


    5. Give yourself execute privilege on the file **backup.bash** with the following
