  md: 'pool/path[@snapshot]


    where:

    **pool** Identifies the name of the storage pool that contains the dataset

    **path** A slash-delimited pathname for the dataset component

    **snapshot** An optional component that identifies a snapshot of a dataset


    *Deduplication:* Data deduplication is a method of reducing storage capacity needs
    by eliminating redundant data. Only one unique instance of the data is actually
    retained on storage media. Redundant data is replaced with a pointer to the unique
    data copy.


    *file system:* A ZFS dataset of type file system that is mounted within the standard
    system namespace and behaves like other file systems.


    *Mirror:* A vdev that stores identical copies of data on two or more disks, in
    a variety of ways defined by Redundant Array of Independent Disks (RAID) specifications.
    If any disk in a mirror fails, any other disk in that mirror can provide the same
    data, according to those RAID specifications.


    *Pool:* A logical group of devices describing the layout and physical characteristics
    of the available storage. Disk space for datasets is allocated from a pool.


    *RAIDZ:* A virtual device that stores data and parity on multiple disks, using
    the RAID specifications.


    *Resilvering:* The process of copying data from one device to another device is
    known as resilvering. For example, if a mirror device is replaced or taken offline,
    the data from an up-to-date mirror device is copied to the newly restored mirror
    device. This process is referred to as mirror resynchronization in traditional
    volume management.


    *Slice:* A disk partition created with partitioning software.


    *Snapshot:* A read-only copy of a file system or volume at a given point in time.


    *Vdev (virtual device):* A whole disk, a disk partition, a file, or a collection
    of the previous, usually all of the same type. There is no performance penalty
    for using disk partitions rather than entire disks. The write cache is disabled
    for partitions, thus incurring a performance penalty. Using files as vdevs is
    discouraged, except for experimenting and testing purposes as we do in this chapter
    for beginners! A collection of vdevs is a mirror.


    *Volume:* A dataset that represents a block device. For example, you can create
    a ZFS volume as a swap device.'
