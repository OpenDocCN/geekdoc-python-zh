    \ Conversions, and Sequence Operations\n  - 2.4.9 Tuples\n  - 2.4.10 Sets\n  -\
    \ 2.4.11 Dictionaries\n  - 2.4.12 Generators\n  - 2.4.13 Coroutines\n  - 2.4.14\
    \ Exceptions\n  - 2.4.15 Modules, Global and Local Scope in Functions\n- 2.5 Practical\
    \ Examples\n  - 2.5.1 Another Way of Writing Shell Script Files\n  - 2.5.2 A Basic\
    \ Web Server and User File Maintenance\n  - 2.5.3 Graphical User Interfaces with\
    \ Python3 and tkinter Widgets\n  - 2.5.4 Multi-Threaded Concurrency with Python\n\
    \  - 2.5.5 Talking Threads: The Producer–Consumer Problem Using the queue Module\n\
    - 2.6 Summary\n- 2.7 Ultimate Reference Glossary\n- Appendix 2A: Python Syntax\
    \ and Command Summary\n\n**Questions, Problems, and Projects**\n\n- Chapter 0\n\
    - Chapter 1\n- Chapter 2\n\n**Index**\n\n## Series Preface\n\nThis series of books\
    \ covers the basics of Raspberry Pi Operating System administration, and is geared\
    \ towards a novice user. Each book is a complete, self-contained introduction\
    \ to important system administration tasks, and to other useful programs. The\
    \ foundation of all of them is the systemd super-kernel. They guide the user along\
    \ a path that gives the “why” and “how to” of those important system administration\
    \ topics, and they also present the following essential application facilities:\n\
    \n1. Raspberry Pi OS System administration with systemd, Volume 1\n2. Raspberry\
    \ Pi OS System administration with systemd and Python, Volume 2\n3. Raspberry\
    \ Pi OS Text Editing, git, Virtualization with LXC/LXD, Volume 3\n\nThey can be\
    \ used separately, or together, to fit the learning objectives/pace, and interests\
    \ of the individual, independent learner, or can be adopted in a more formal learning\
    \ environment to supplement and extend the basic knowledge of a Linux operating\
    \ system in a classroom environment that uses the Raspberry Pi OS.\n\nIn addition,\
    \ each book has In-Chapter Exercises throughout, and a Question, Problems, and\
    \ Projects addendum to help reinforce the learning goals of the individual student,\
    \ or reader.\n\nAn online Github site, with further materials and updates, program\
    \ code, solutions to both In-Chapter Exercises and End-of-Chapter Problems, Questions,\
    \ and Projects, plus other supplements, is provided for each volume. It can be\
    \ found at:\n\nwww.github.com/bobk48/RaspberryPiOS\n\nThe fundamental prerequisites\
    \ of each volume are 1) knowledge of how to type a syntactically correct Linux\
    \ command on the command line, 2) having access to a dedicated Raspberry Pi computer\
    \ with the latest Raspberry Pi Operating System already installed and running\
    \ on it, 3) being a privileged user on the system that is able to execute the\
    \ **sudo** command to assume superuser status, and 4) having a basic knowledge\
    \ of how to edit and save text files in the **nano** text editor.\n\nAll instructions\
    \ in these volumes were tested on either a Raspberry Pi 4B, or a Raspberry Pi\
    \ 400, both with 4 GB of memory, and the latest version of the Raspberry Pi OS\
    \ at the time.\n\n![](img/7ffbe025fa2ba956525d0c51169283f3_12_0.png)\n\nTaylor\
    \ & Francis\n\nTaylor & Francis Group\n\nhttp://taylorandfrancis.com\n\n## Volume\
    \ 2 Preface\n\n## Background\n\nThis book is a compendium of easy-to-use, and\
    \ essential Raspberry Pi system administration tasks for the beginner. The Raspberry\
    \ Pi OS is derived from the Debian branch of Linux, and as of this writing, Debian\
    \ Bullseye was the most current version of that operating system. To present the\
    \ system administration topics and commands here, I have selected some very basic\
    \ stuff, and a few more advanced concepts, topics, commands, and details that\
    \ might not appear in a more complete system administration book.\n\nThe overriding\
    \ idea behind system administration of a modern, 21st-century Linux system such\
    \ as the Raspberry Pi OS is the use of systemd to ensure that the Linux kernel\
    \ works efficiently and effectively to provide these three foundation stones of\
    \ computer operation and management: computer system concurrency, virtualization,\
    \ and secure persistence.\n\nAnd this control of the kernel by a “super-kernel”,\
    \ which is what systemd essentially is, must also promote the highest level of\
    \ system performance and speed, given the use cases the computer might be put\
    \ to, and the perceived needs of the target user base that the computer serves.\
    \ Unless that novice user, or even a more seasoned system professional, has not\
    \ only a basic, but also a more complete knowledge of how systemd controls and\
    \ oversees every process and operation of a modern Linux system, they will never\
    \ be able to master administering and implementing the kind of functionality that\
    \ their use case(s) might ultimately require. Particularly for the user base on\
    \ the system, and the demands that user base makes.\n\nCertainly out of the multitude\
    \ of possible topics we could have presented, the ones you find detailed here\
    \ have basically been selected in somewhat of a subjective way. That selective\
    \ way was mainly guided by these concerns:\n\n- a. The secure maintenance, in\
    \ terms of concurrency, virtualization, and persistence, of a single Raspberry\
    \ Pi system that an ordinary novice user can install on her own dedicated hardware.\n\
    - b. How important the topics are, in a perceived ranking of essential system\
    \ administration tasks.\n- c. How systemd plays into the maintenance regimen of\
    \ the Raspberry Pi OS, and the hardware it’s installed on, as chosen by that ordinary\
    \ user.\n- d. The overall pedagogic integration of the selected topics presented\
    \ on system administration with each other."
