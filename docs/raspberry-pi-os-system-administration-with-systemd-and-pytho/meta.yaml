- md: "## 1.5.4 A Method of User and Group Creation on a Second Storage Medium\n\n\
    According to our recommended storage model from Section 1.3.1, item 3, it would\
    \ be advantageous to install the operating system on one bootable medium (preferably\
    \ a fast but not necessarily large-capacity USB3 Solid State Drive [SSD], or a\
    \ USB3-adaptor-connected M.2 PCIe device), and store all of the user data on *another*\
    \ single medium of a similar type, but with much larger capacity, or even some\
    \ kind of array of external media. In this section, we show a simple way of conforming\
    \ to that model when new users are created on your Raspberry Pi OS.\n\nNote that\
    \ this technique does *not* show how to transfer an already-existing user, with\
    \ their entire home directory, over to a newly-added medium. Although we do leave\
    \ that as an In-Chapter Exercise for you to accomplish outside of the scope of\
    \ this section.\n\nThe prerequisites, and the steps we took to accomplish this\
    \ technique, are as follows:\n\n- 0. You have a USB3-mountable medium, formatted\
    \ to ext4, that you want to use for the new user's home directory, and it is mountable\
    \ and recognized by your Raspberry Pi system.\n- 1. The new user in our case is\
    \ named sarwar.\n- 2. The home directory of the administrative user that will\
    \ execute this technique in our case is /home/bob.\n- 3. The home directory of\
    \ the new user in our case will be /media/sarwar.\n- 4. The pathname to the external\
    \ medium, in our case a USB3 thumb drive, is /media/bob/04fd2202-8879-46f2-8040-446753ed077c.\n\
    - 5. We will be putting the new user's login directory on an ext4 file system.\n\
    \nFollow these steps sequentially to achieve the desired result:\n\n- 0. Add the\
    \ external medium to the system. Find out its device name and UUID with the **blkid**\
    \ command, and then unmount it (if indeed it is mounted!) with the command:\n\n\
    \    ```\n    $ sudo umount /media/bob/04fd2202-8879-46f2-8040-446753ed077c\n\
    \    ```\n\n- 1. Show the results of the command in step 0 (in /dev) of unmounting\
    \ the external medium, with the following command:\n\n    ```\n    $ sudo blkid\
    \ -o list\n    ```\n\n    | device | fs_type | label | mount point | UUID |\n\
    \    |---|---|---|---|---|\n    | /dev/sda1 | vfat | boot | /boot | 5EA1-EC88\
    \ |\n    | /dev/sda2 | ext4 | rootfs | / | f0702b0a-e54b-4c34-bd2d-6e52a561898c\
    \ |\n    | /dev/sdb1 | ext4 | | (not mounted) | **04fd2202-8879-46f2-8040-446753ed077c**\
    \ |\n\n    ```\n    $\n    ```\n\n    On our system, it was /dev/sdb1 with UUID\
    \ of **04fd2202-8879-46f2-8040-446753ed077c**, and in the output showed as being\
    \ not mounted.\n\n- 2. Create a new directory on the system in /media for the\
    \ new user.\n\n    ```\n    $ sudo mkdir /media/sarwar\n    ```\n\n- 3. Add the\
    \ new user with the **adduser** command.\n\n    ```\n    $ sudo adduser sarwar\n\
    \    Adding user `sarwar' ...\n    Adding new group `sarwar' (1001) ...\n    Adding\
    \ new user `sarwar' (1001) with group `sarwar' ...\n    Creating home directory\
    \ `/home/sarwar' ...\n    Copying files from `/etc/skel' ...\n    New password:\
    \ **www**\n    Retype new password: **www**\n    passwd: password updated successfully\n\
    \    Changing the user information for sarwar\n    Enter the new value, press\
    \ ENTER for the default\n            Full Name []:\n            Room Number []:\n\
    \            Work Phone []:\n            Home Phone []:\n            Other []:\n\
    \    Is the information correct? [Y/n] Y\n    $\n    ```\n\n    Note that we've\
    \ gone with all of the defaults, except supplying a new password for the new user.\n\
    \n- 4. Mount the external medium as an ext4 file system, at /media/sarwar\n\n\
    \    ```\n    $ sudo mount -t ext4 -o defaults /dev/sdb1 /media/sarwar\n    ```\n\
    \n- 5. Use the **usermod** command to change the new user's home/login directory\
    \ to /media/sarwar\n\n    ```\n    $ sudo usermod --home /media/sarwar sarwar\n\
    \    $\n    ```\n\n- 6. Use the **chown** and **chgrp** commands to change the\
    \ access privileges of the directory /media/sarwar so that the new user can work\
    \ in that directory when logging in.\n\n    ```\n    $ sudo chown sarwar /media/sarwar\n\
    \    $ sudo chgrp sarwar /media/sarwar\n    $\n    ```\n\n- 7. Log into the system\
    \ with the new user’s login name and password. Verify that the current working\
    \ directory upon login is /media/sarwar. Add files to Sarwar’s home directory,\
    \ and note their access privileges.\n\n## Conclusion:\n\nThe new user now has\
    \ their home directory, or login directory, on the external medium, and on the\
    \ boot/system medium. At this point, you can safely delete the new user’s home/login\
    \ directory on the boot/system medium.\n\n### Followup: Unmounting and Mount on\
    \ boot\n\nTo unmount the external medium, while in the administrative account,\
    \ use the following command:\n\n```\n$ sudo umount /dev/sdb1\n```\n\nIf you want\
    \ this user’s home/login directory to mount, and be available after reboots of\
    \ the system, you need the information from the column UUID from Step 1’s output\
    \ above, to be able to have this exact medium device mount on subsequent reboots\
    \ of the system. Edit the file /etc/fstab with any editor, for example nano.\n\
    \n```\n$ sudo nano /etc/fstab\n```\n\nAdd the following line at the end of the\
    \ file. Make sure to replace the UUID and the path of the mounted device with\
    \ what is on your system, not what shows on ours here in this example!\n\n```\n\
    UUID=04fd2202-8879-46f2-8040-446753ed077c /media/sarwar ext4 defaults 0\n```\n\
    \nIt’s possible to use /dev/sdb1 instead of UUID=... in the above line in the\
    \ file, but using the UUID ensures that you are mounting this exact external medium,\
    \ and not another one that you could put in the same USB slot on the Raspberry\
    \ Pi upon reboot.\n\n## In-Chapter Exercise\n\n- 10. Using a hybrid version of\
    \ the above technique, move the home/login directory of another user you have\
    \ previously added to the system, from the boot/system medium to another post-installation\
    \ medium. How would this affect the file system parameters of the files of the\
    \ existing user?\n\n## 1.6 Basic Password Management\n\nIt is often necessary\
    \ for the person responsible for user and group account management, and for obvious\
    \ security reasons, to make changes to passwords. This is accomplished most easily\
    \ with the **passwd** command. We give a few basic examples of the use of this\
    \ command in this section. For a more complete description of the **passwd** command,\
    \ see the man page for the command on your Raspberry Pi system.\n\nTo reset the\
    \ password for a user account, use the following command:\n\n```\n$ sudo passwd\
    \ mansoor\n[sudo] password for bob: QQQ\nEnter new UNIX password: zzz\nRetype\
    \ new UNIX password: zzz\npasswd: password updated successfully\n$\n```\n\nTo\
    \ obtain a brief listing of the options available with the **passwd** command,\
    \ use the following command:\n\n```\n$ sudo passwd -h mansoor\nUsage: passwd [options]\
    \ [LOGIN]\n```\n\nOptions:\n\n- -a, --all report password status on all accounts\n\
    - -d, --delete delete the password for the named account\n- -e, --expire force\
    \ expire the password for the named account\n- -h, --help display this help message\
    \ and exit\n- -k, --keep-tokens change password only if expired\n- -i, --inactive\
    \ INACTIVE set password inactive after expiration to INACTIVE\n- -l, --lock lock\
    \ the password of the named account\n- -n, --mindays MIN_DAYS set minimum number\
    \ of days before password change to MIN_DAYS\n- -q, --quiet quiet mode\n- -r,\
    \ --repository REPOSITORY change password in REPOSITORY repository\n- -R, --root\
    \ CHROOT_DIR directory to chroot into\n- -S, --status report password status on\
    \ the named account\n- -u, --unlock unlock the password of the named account\n\
    - -w, --warndays WARN_DAYS set expiration warning days to WARN_DAYS\n- -x, --maxdays\
    \ MAX_DAYS set maximum number of days before password change to MAX_DAYS"
  mdcn: "## 1.5.4 在第二存储介质上创建用户和组的方法\n\n根据我们在第1.3.1节第3项中推荐的存储模型，将操作系统安装在一个可启动介质上（最好是快速但不一定大容量的USB3固态硬盘[SSD]，或通过USB3适配器连接的M.2\
    \ PCIe设备），并将所有用户数据存储在*另一个*类似类型但容量大得多的单一介质上，甚至某种外部介质阵列上，将是有利的。在本节中，我们展示了一种在你的树莓派操作系统上创建新用户时，符合该模型的简单方法。\n\
    \n请注意，此技术*不*展示如何将已存在的用户及其整个主目录转移到新添加的介质上。尽管我们确实将其作为章内练习留给你在本节范围之外完成。\n\n前提条件以及我们为实现此技术所采取的步骤如下：\n\
    \n- 0. 你有一个可USB3挂载的介质，已格式化为ext4，你想将其用于新用户的主目录，并且它可以被你的树莓派系统挂载和识别。\n- 1. 我们案例中的新用户名为\
    \ sarwar。\n- 2. 我们案例中将执行此技术的管理用户的主目录是 /home/bob。\n- 3. 我们案例中新用户的主目录将是 /media/sarwar。\n\
    - 4. 外部介质的路径名，在我们的案例中是一个USB3拇指驱动器，是 /media/bob/04fd2202-8879-46f2-8040-446753ed077c。\n\
    - 5. 我们将把新用户的登录目录放在一个ext4文件系统上。\n\n按顺序执行以下步骤以达到预期结果：\n\n- 0. 将外部介质添加到系统。使用 **blkid**\
    \ 命令找出其设备名称和UUID，然后使用以下命令卸载它（如果确实已挂载！）：\n\n    ```\n    $ sudo umount /media/bob/04fd2202-8879-46f2-8040-446753ed077c\n\
    \    ```\n\n- 1. 使用以下命令显示步骤0中卸载外部介质的结果（在 /dev 中）：\n\n    ```\n    $ sudo blkid\
    \ -o list\n    ```\n\n    | device | fs_type | label | mount point | UUID |\n\
    \    |---|---|---|---|---|\n    | /dev/sda1 | vfat | boot | /boot | 5EA1-EC88\
    \ |\n    | /dev/sda2 | ext4 | rootfs | / | f0702b0a-e54b-4c34-bd2d-6e52a561898c\
    \ |\n    | /dev/sdb1 | ext4 | | (not mounted) | **04fd2202-8879-46f2-8040-446753ed077c**\
    \ |\n\n    ```\n    $\n    ```\n\n    在我们的系统上，它是 /dev/sdb1，UUID为 **04fd2202-8879-46f2-8040-446753ed077c**，在输出中显示为未挂载。\n\
