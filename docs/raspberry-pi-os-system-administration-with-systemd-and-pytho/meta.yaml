    解决方案的总结如图2.4所示。\n\n### 2.5.5.1 queue模块及其类和方法\n\nPython3中的**queue**模块实现了三个面向对象的队列类，它们仅在条目被检索的顺序上有所不同。在*先进先出*（FIFO）队列中，放入队列的第一个任务是第一个被取出的。在*后进先出*（LIFO）队列中，最近添加的条目是第一个被检索的（类似于“下推”堆栈）。在优先级队列中，条目被排序，值最低的条目首先被检索。"
