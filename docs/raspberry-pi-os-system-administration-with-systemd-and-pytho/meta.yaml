    \n```\n$ cd /etc\n/etc$ more group\nOutput truncated...\nsarwar:x:1002:\ndevelopment:x:1003:sarwar\n\
    /etc $\n```\n\n4. Remove the user sarwar from the group named “development”:\n\
    \n```\n/etc $ sudo deluser sarwar development\nRemoving user `sarwar' from group\
    \ `development' ...\nDone.\n/etc $\n```\n\n5. Verify that sarwar has been removed\
    \ from the group named “development”:\n\n```\n/etc $ more group\nOutput truncated...\n\
    sarwar:x:1002:\ndevelopment:x:1003:\n```\n\n### In-Chapter Exercise\n\n9. You\
    \ have an air-gapped Raspberry Pi in a room. You want only certain users in a\
    \ defined group named “proj” to be able to access files in a directory named “proj1”\
    \ in your account on the file system of that computer. Use the above command line\
    \ commands to add those certain users, and yourself, to the group “proj”. Create\
