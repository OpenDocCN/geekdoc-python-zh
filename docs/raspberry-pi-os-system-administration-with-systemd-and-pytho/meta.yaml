    provides a way of isolating those resources, and therefore allows them to be more
    securely accessed. And adding additional media addresses the administrator''s
    responsibility to backup important data, most critically user data files.


    The first strategy involves providing additional physical media, or additional
    partitions on existing media, to accommodate user data files, or other components
    of your Raspberry Pi OS file system.


    The second strategy involves designing and implementing file and directory access
    permissions on those additional partitions or media, so that process authentication
    through the various forms of process credentialing can be achieved.


    # 1.15.6.1 Persistent Media Allocations For /home


    According to the recommended user data storage model we provided above, you should
    put the /home subdirectories, where all of your user directories are located,
    on its own physical medium. That is a traditional system administration technique
    of designing your file system structure. When you add mount options to a single
    formatted partition on this medium, you can do the following:


    +   * Set the nosuid option to prevent SUID and SGID permission-enabled executable
    programs running from there. Programs that need SUID and SGID permissions should
    not be stored in /home, as a preventative measure.

    * Set the nodev option so no device file located there will be recognized. Device
    files should be stored in /dev, not in /home.

    * Optionally set the noexec option, so no executable programs which are stored
    in /home can be run.


