    or the processes that are generated by executing instances of a program.


    Files/inodes are another form of object, particularly the executable form of file
    objects, and the data structure(s) holding their information. You shouldn’t mix
    this up with file system objects, which we have referred to as either ordinary
    or directory.


    *Object Ownership:* Indicates the owning, user, and group.


    *Object Context:* Security checks done when objects are acted on.


    *Subjects:* An object that is acted upon by another object. Processes are active
    subjects, such as those processes that are created by an **exec()** or **fork()**
    system call from some originating process.


    *Subject Context:* Security checks done when an active subject performs its operations.


    *Action:* What a subject does to an object. This includes reading, writing, creating,
    and deleting files or forking and signaling.


    *Permissions:* Security checks when a subject acts upon an object. Taking the
    subject context, the object context, and the action, and searching one'
