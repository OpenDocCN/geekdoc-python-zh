    \ description of those commands, taken from the man pages on the Raspberry Pi\
    \ OS is as follows:\n\n```\ndeluser, delgroup - remove a user or group from the\
    \ system\n\nSyntax:\ndeluser [options][--force][--remove-home] [--remove-all-files]\n\
