    # 2.6 Summary


    We gave a broad introduction to the Python3 programming language, using Python
    3.9.2. For the beginner Python3 programmer, we illustrated all of its important
    programming capabilities and syntactic structures, in the context of the three
    predominant computer programming paradigms: *virtualization*, *concurrency*, and
    *persistence*. We showed the details of doing an installation of the latest version
    of Python3.X on a Raspberry Pi system, instead of utilizing the default installation
    of it that comes with your Raspberry Pi OS. We gave a brief introduction to Thonny,
    the Python3 IDE. We showed all of Python3’s important basic syntax, including
    numbers and expressions, variables, statements, getting input from the user, functions,
    the procedural/imperative OOP programming models in Python3, functions, modules,
    saving and executing Python3 scripts, string and sequence operations, and error
    handling. We also gave many basic and practical examples, such as another way
    of writing shell script files, such as rewriting Bash and tcsh scripts, basic
    user file maintenance, backing up files, remote copying with the **rsync** command,
    and graphics using tkinter. Finally, we showed how various forms of thread execution
    are achieved in Python3, and how OOP can be deployed to accomplish them.


    # 2.7 Ultimate Reference Glossary


    A simplified and abbreviated glossary of some of the terms we have abstracted
    from the references in Section 2.5 follows:


    **Class:** A template for creating user-defined objects. Class definitions normally
    contain method definitions which operate on instances of the class.'
  - "[PAGE 298]\n\n**Expression**: A piece of syntax which can be evaluated to some\
    \ value. In other words, an expression is an accumulation of expression elements\
    \ like literals, names, attribute access, operators, or function calls, which\
    \ all return a value.\n\nIn contrast to many other languages, not all language\
    \ constructs are expressions. There are also statements which cannot be used as\
    \ expressions, such as **print** or **if**. Assignments are also statements, not\
    \ expressions.\n\n**Immutable**: An object with a fixed value. Immutable objects\
    \ include numbers, strings, and tuples. Such objects cannot be altered. A new\
    \ object has to be created if a different value has to be stored; for example,\
    \ a key in a dictionary.\n\n**Iterable**: An object capable of returning its members\
    \ one at a time. Examples of iterables include all sequence types (such as a list,\
    \ string, and tuple) and some nonsequence types like **dict** and **file** and\
    \ objects of any classes you define with an **\\_\\_iter\\_\\_()** or **\\_\\\
    _getitem\\_\\_()** method. Iterables can be used in a **for** loop and in many\
    \ other places where a sequence is needed. When an iterable object is passed as\
    \ an argument to the built-in function **iter()**, it returns an iterator for\
    \ the object. This iterator is good for one pass over the set of values. When\
    \ using iterables, it is usually not necessary to call **iter()** or deal with\
    \ iterator objects yourself. The **for** statement does that automatically for\
    \ you, creating a temporary unnamed variable to hold the iterator for the duration\
    \ of the loop.\n\n**Lambda**: An anonymous inline function consisting of a single\
    \ expression which is evaluated when the function is called. The syntax to create\
    \ a lambda function is **lambda [arguments]: expression**.\n\n**Method**: A function\
    \ which is defined inside a class body. If called as an attribute of an instance\
    \ of that class, the method will get the instance object as its first argument\
    \ (which is usually called self).\n\n**Mutable**: Mutable objects can change their\
    \ value but keep their class identity.\n\n**Pythonic**: An idea or piece of code\
    \ which closely follows the most common usages of the Python language, rather\
    \ than implementing code using structures common to other languages. For example,\
    \ a common usage in Python is to loop over all elements of an iterable using a\
    \ **for** statement. Many other languages do not have this type of construct,\
    \ so people unfamiliar with Python sometimes use a numerical counter instead:\n\
    \n```\nfor i in range(len(money)):\n    print (money[i])\n```"
  - "[PAGE 299]\n\nThe Pythonic way:\n\nfor bills in money:\n    print (bills)\n\n\
