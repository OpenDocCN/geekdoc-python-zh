    # 2.4.8.2 Sequence Operations


    Three important, and quite useful operations you can perform on sequence types
    of objects are indexing, slicing, and extended slicing. Objects such as strings
    and tuples are immutable and cannot be modified after creation. But, lists can
    be modified with the operators shown in Table 2.5.'
