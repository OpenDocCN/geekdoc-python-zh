    of drives.


    And in some cases, a file system may *not* make use of a persistent storage device
    or medium at all! At this higher level of abstraction, the file system can access,
    use, organize, and represent *any* form of data, whether it is persistent or volatile.
    We use the word volatile here to mean during the transient lifetime of some process
    or service. Of course, systemd and the Linux kernel control all processes and
    services running on the Raspberry Pi. *Pseudo*, and special-purpose file systems
    (sometimes called *synthetic file systems*), which can be thought of as virtual
    file systems, have this kind of characteristic.


    There are also established protocols for connecting to and accessing either physical,
    virtual, or pseudo file systems, in the locations where they may reside. Two examples
    of access protocols that establish and maintain the connections to virtual, network-available
    media and file systems are the Network File System, version 4 (NFSv4), and the
    Internet Small Computer System Interface (iSCSI).


    In this section, we first present an organizing scheme that you can use to think
    about types of media and file systems. A file system may be nominally assigned
    according to what medium it exists on: a directly connected physical medium (such
    as a USB3 SATA disk), a virtual medium (such as Network-Attached Storage or Storage
    Area Networks that use NFSv4 or iSCSI), or as a specialized pseudo-file system
    that is not on a persistent medium at all (such as the cgroups or proc file systems).


    We then go on to give some particular examples of adding directly connected, physical
    media to a Raspberry Pi OS.


    Additionally, we suggest a traditional approach, when using the recommended storage
    model we give in Section 1.3.1, to adding persistent media to your system. This
    is as follows:


    Where you first properly connect the device to the Raspberry Pi via attaching
    it to a USB3 port, partition that medium, manually add a file system to it (typically
    the ext4 file system), and then finally create directories and files in the partition(s)
    on the media. The sections below detail this more traditional approach.


    According to our organizing scheme, a file system can be separated into three
    hierarchically arranged layers that perform very particular functions. These layers,
    arranged from farthest-to-nearest to the actual hardware of the physical medium
    in question, are as follows:


    **The Logical Layer:**

    This layer is used for interaction with user application programs, and the processes
    they consist of, via Linux system calls. It provides the application programming
    interface (API) for file operations, for example system calls to **OPEN**, **CLOSE**,
    **READ**, etc., and connects with the layer below it for processing. The Logical
    Layer achieves efficient file access, logically organized directory'
