    # 1.12.3 Software for Backup and Recovery: Filezilla, SD Card Copier, and git


    There are many commercial software and hardware packages that can be deployed
    to backup and archive your system. One very easy-to-use commercial product that
    allows you to clone entire hard disks in a “broadcast” fashion over a network,
    from a server to one or more machines, is Norton Ghost.

    But the most readily available, useful, and free software facility, available
    through the Pi Menu choice > Preferences > Add/Remove Software on the Raspberry
    Pi OS, that can do a variety of file system backup and recovery, disk recovery,
    and disk cloning operations is FileZilla. We have introduced that software application
    in Volume 1.

    Additionally, the Raspberry Pi menu choice Accessories > SD Card Copier allows
    you to clone the entire microSD card, thus replicating whatever is on your system/boot
    disk at the time you do the copy. Admittedly a brute force approach to backup
    for recovery, it is effective even for copying the microSD card to a USB2 or 3-mounted
    SSD, or other suitable USB medium.

    You can also use the git command, and Github.com, to effectively backup user files.
    We give a verbose description of the git command in Volume 3.

    Of course, if you adhere to our recommended storage strategy of keeping user files
    on media other than the boot/system medium, then whatever strategies you use to
    back those media up, for recovery or archival purposes, apply. You can mix and
    match any of the techniques and facilities we show in the following three sections,
    to suit your requirements, and the specific needs of your selected data storage
    model.


    # 1.12.3.1 FileZilla


    FileZilla is nominally a graphics-based ftp client and server program that can
    use ssh as the tunnel, or conduit between systems. It has a number of useful functions
    and menu choices that allow the system administrator to successfully, confidentially,
    and efficiently backup and restore single files or directories, via a network,
    locally or globally. It is most useful for backing up and restoring single-user
    files and directories. It is not a replacement or substitute for the command line
    facilities shown in the preceding sections.

    Figure 1.10 illustrates the screen display and menus available in the “client”
    version of FileZilla.

    Both client and server, in our case a local machine running the Raspberry Pi OS,
    and a remote Linux machine, must have ssh communications protocol enabled between
    them. You can have login access to an account on the remote server, or you can
    anonymously login as well if that is enabled.'
  merge: -1
  pgno: 139
