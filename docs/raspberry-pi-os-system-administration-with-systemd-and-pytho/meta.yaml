    below.


    Everything we do in this chapter is either done with Thonny, or done on the Bash
    command line. But in most of our work below, we only show the areas of the Thonny
    window known as the “Script Area” and the “Shell Area”. And be aware that Thonny
    has two modes, Regular and Simple. Since our work here is for beginners, we show
    the Simple Mode of operation. That’s the default when you launch Thonny. If you
    want to switch to “Regular Mode”, there’s a text link on the right side of the
    Thonny window (hidden in Figure 2.1 because we’re using Simple Mode, and our window
    display is too narrow to show it in that figure) that would allow you to change
    Thonny to a necessarily more complex display, with more pull-down menu choices
    that go beyond what the Simple Mode gives you.'
- md: "If you want to change to a necessarily more complex, but verbose, way of interacting\
    \ with Python3 via Thonny Regular Mode, we give step-by-step instructions in Section\
    \ 2.3.8.2 that show how to do that.\n\nThere are other IDEs available on the Raspberry\
    \ Pi OS that you can use with Python3. From the Raspberry Pi menu, Programming\
    \ > Geany is one of them. We've found that the Geany IDE is necessarily more complex,\
    \ and useful for the development of C++ programs, and other program systems, but\
    \ feel free to experiment with it for Python3 scripts and program code development.\
    \ We don't show Geany here, but do illustrate its use for C++ and Python3 in Volume\
    \ 3.\n\n## 2.2.1 Launching Thonny, and the Thonny Window\n\nTo launch Thonny,\
    \ from the Raspberry Pi menu, make the choice Programming > Thonny. The Thonny\
    \ window opens onscreen, as shown in Figure 2.1. At the top of the window is a\
    \ row of *Toolbar Area* icons, that allow you to do various operations, such as\
    \ debug or test, load, save, and execute Python program code.\n\nNext, below the\
    \ row of toolbar icons, is the *Script Area*, where you can type in multiple lines\
    \ of Python code, or input an already completed program from a file. Notice that\
    \ line numbers for your program are illustrated in the left margin of the Script\
    \ Area, and above that area in the upper left is a tab naming the current program\
    \ being worked on. In Figure 2.1, it reads <untitled>.\n\nAnd finally, below that\
    \ is the *Python Shell Area*, where the command line prompt >>> from Python is\
    \ found. Here, you can type in one line of Python code, and have it executed when\
    \ you press the Enter key on the keyboard of the Raspberry Pi. Also, error messages,\
    \ or other feedback from Python, are displayed in this area. In Figure 2.1, it\
    \ shows we're running Python 3.9.2, found in /usr/bin/python3. This version of\
    \ Python, and Thonny as well, is dependent upon what release of the Raspberry\
    \ Pi OS you've installed on your system. These versions of Python3, and Thonny,\
    \ are the defaults on the Raspberry Pi OS we're using.\n\n> ***Note***\n> We have\
    \ also tested all of the Python3 shown in this chapter in the latest release of\
    \ Python available at the time this book was written, Python 3.11.3.\n\n## 2.2.2\
    \ Creating and Running a Simple Python3 Program from within Thonny\n\nLet's create\
    \ and execute a simple Python3 program, that has a determinate repetition structure\
    \ in it, and prints some output to the Python3 Shell Area. Launch Thonny on your\
    \ Raspberry Pi, and type the following lines into the Python3 Script Area (making\
    \ sure to press the Enter key on the keyboard after each line.):\n\n```\nprint(\"\
    Count for me, Python!\")\nfor n in range (5):\n    print(\"I'm counting!\", n)\n\
    print(\"I'm done counting!\")\n```\n\nNotice that after the second line, Thonny\
    \ *automatically* inserts a mandatory four-space indentation for the third line!\
    \ That mechanism, of automatic indentation, is critical to the technique of *structured\
    \ programming*, where flow-of-control programming structures are delineated by\
    \ proper indentation.\n\n> ***Note***\n> Thonny achieves that automatic indentation\
    \ for you, because most beginners commit either indentation errors in their programs,\
    \ or syntax errors due to typos.\n> Thonny also automatically indents the fourth\
    \ line, but you can override this indentation by pressing the Delete key on your\
    \ keyboard, to type the fourth line flush left, like the first and second lines.\n\
    \nNow click on the Run Toolbar icon in the Toolbar Area. In the Shell Area, the\
    \ following should be displayed:\n\n```\nCount for me, Python!\nI'm counting!\
    \ 0\nI'm counting! 1\nI'm counting! 2\nI'm counting! 3\nI'm counting! 4\nI'm done\
    \ counting!\n>>>\n```\n\nHow come the count started at zero(0)? That's because\
    \ Python is a zero-indexed system, where counts start at 0, not 1.\n\nNow click\
    \ on the Save icon in the Toolbar Area. In the Save dialog window that appears,\
    \ name this Python3 program **looper.py**, making sure to add the file extension\
    \ **.py** as shown, and designate a folder on your system where you want the program\
    \ to be saved. Then click Save. Once the save is completed, notice that the title\
    \ bar of the Thonny window shows the path to and name of this program you just\
    \ saved, and that the tab at the top of the Script Area now shows the name looper.py.\n\
    \n> ***Note***\n> If you want to run that program in \"Interactive Mode\", outside\
    \ of the Thonny IDE, you can by launching Python3 as we show in a few places below\
    \ in this chapter.\n\n## In-Chapter Exercises\n\n1.  How can you make Python count\
    \ from 1 to 5, using the above program structure?\n2.  How can you clear the program\
    \ from the Script area?\n\nYou're done! In the sections below, we'll cover much\
    \ more of the syntax and structure of a Python3 program. But for now, play around\
    \ with Thonny and this program, and then you can click on the Quit Toolbar icon.\
    \ The next time you run Thonny, this same program will be loaded, unless of course\
    \ you cleared it according to your answer to In-Chapter Exercise 2!\n\n## 2.3\
    \ An Overview of the Python3 Language\n\nComputer programs execute and accomplish\
    \ their objectives in a particular order, from start to finish. They may \"branch\"\
    \ within that order, perhaps to only execute some of their instructions, based\
    \ on certain logical tests or conditions. They may also repeat segments of their\
    \ operation, either for some predetermined number of times, or indeterminately,\
    \ based on changing conditions. Python conforms to this model, and operates using\
    \ the following scheme of levels:\n\n-   Level 1. *Everything* in Python3 programs,\
    \ or scripts, is composed of modular components.\n-   Level 2. These modular components\
    \ contain syntactically correct Python statements.\n-   Level 3. These statements\
    \ contain expressions.\n-   Level 4. The expressions create and manipulate objects.\n\
    \nThe Python3 code development process starts by formulating syntactically correct\
    \ elements at Level 1, and proceeds downwards through the levels sequentially\
    \ until Level 4 is achieved.\n\nIn the Raspberry Pi OS environment, if you are\
    \ presented with a task that requires you to do either script writing or programming,\
    \ the first thing you have to decide is what programming model you are going to\
    \ adopt to accomplish the task. In simple terms, this means using any of the three\
    \ predominant programming models: the procedural/imperative programming model,\
    \ the Object Oriented Programming (OOP) model, or the logic programming model.\
    \ Of course, how well you accomplish the task depends on how much script writing\
    \ or programming experience you have using any, or all, of those models. And perhaps,\
    \ if you are doing this task with a group of people, their experiences and preferences\
    \ count for a great deal as well. But, how you formulate the task in terms of\
    \ any of the models is related, most importantly, to your experience in using\
    \ these models. There are no simple guidelines for applying any of the models\
    \ to the vast number of possible script writing or programming tasks that exist\
    \ in the realm of computer programming.\n\nHowever, the bottom line in the accomplishment\
    \ of your task is how familiar you are with the syntax of the languages that implement\
    \ the model you choose.\n\nThat's why we explain Python3 syntax in detail in this\
    \ chapter. Python3 can utilize all of these programming models, and can, in fact,\
    \ mix the techniques used in the models. We make some commentary on this here,\
    \ and illustrate some simple uses of the models in the next few Sections.\n\n\
    Python3 is a *high-level, structured* (in this case, meaning built of regular\
    \ structured components, like determinate or indeterminate repetition, for example),\
    \ and *interpreted* programming (or scripting) language, as opposed to a low-level,\
    \ compiled language like C, or Java. As stated, it is also a *multi-paradigm*\
    \ programming language, which allows you to use data abstractions from the three\
    \ predominant paradigms. For our purposes, “scripting” and “programming” can be\
    \ thought of as the same thing. So why use a “pure” OOP approach?\n\nInstead of\
    \ totally defining the most fundamental aspects and parts of OOP (which you can\
    \ find descriptions of easily in the extensive literature), we choose to contrast\
    \ and compare it to the more traditional procedural programming method, to give\
    \ you a more intuitive feel for the approach OOP uses.\n\nProcedural/imperative,\
    \ non-OOP programs, as we have noted, can run through their structured, flow-of-control\
    \ operation using the Python3 syntax we show in the sections below. Non-trivial\
    \ programs can possibly be made up of groupings of flow-of-control operations,\
    \ known as procedures, modules, or subroutines. This way of using Python3 syntax,\
    \ since the language “accommodates” the procedural/imperative model, can put together\
    \ a program that emphasizes more traditional algorithms and Abstract Data Types\
    \ (ADT). Simple examples of these two things are the algorithm (or mathematical\
    \ plan) for computing the greatest common factor of two integers, or the definition\
    \ of integers themselves as a certain kind of numerical value, along with the\
    \ prescribed set of possible operations on them.\n\nOne of the biggest problems\
    \ with this approach is that if variables take on a global scope, in a global\
    \ namespace outside of the “container” they are defined in, the assignment of\
    \ values to these can be conflicting and cause errors. That is, in part, why using\
    \ namespaces, as we show in Chapter 1, to essentially isolate processes, is so\
    \ effective. Variables (which are active in any particular process namespace)\
    \ are exclusively, and locally, defined and used.\n\nIn Python3 OOP, this is basically\
    \ done using what is known as “encapsulation”. The idea is that the data, and\
    \ the functions that manipulate the data, *are one entity*. This keeps both objects\
    \ safe from unwanted changes to them from any environment outside the entity.\
    \ This fundamental component of OOP, that combines data with a set of *methods*\
    \ for accessing and managing the data, is called an object. Its data treatment\
    \ model is completely different from the procedural/imperative program model previously\
    \ described.\n\nOf course, it is possible, with the rich set of syntax available\
    \ in Python3, to combine both non-OOP and OOP styles in one program. Python does\
    \ not faithfully implement the functional, or logic, programming structure known\
    \ as *tail recursion*, as does a language such as MIT scheme. But it is capable\
    \ of recursion, as we also show below.\n\n### 2.3.1 Objects and Classes\n\nIf\
    \ you haven’t discovered this yet, our coverage of topics here revolves around\
    \ a little bit of “Why?”, and a lot more “How?” It would be prudent to now cover,\
    \ in an introductory fashion, the “How?” aspect of the"
  mdcn: "如果您想切换到一种必然更复杂但更详尽的方式，通过 Thonny 常规模式与 Python3 进行交互，我们在第 2.3.8.2 节中提供了分步说明，展示如何操作。\n\
    \nRaspberry Pi 操作系统上还有其他可用的 IDE，您可以将它们与 Python3 一起使用。从 Raspberry Pi 菜单中，编程 > Geany\
    \ 就是其中之一。我们发现 Geany IDE 必然更复杂，适用于 C++ 程序和其他程序系统的开发，但您也可以自由尝试用它来开发 Python3 脚本和程序代码。我们在此不展示\
    \ Geany，但在第 3 卷中会说明其用于 C++ 和 Python3 的用法。\n\n## 2.2.1 启动 Thonny 以及 Thonny 窗口\n\
    \n要启动 Thonny，请从 Raspberry Pi 菜单中选择编程 > Thonny。Thonny 窗口将在屏幕上打开，如图 2.1 所示。窗口顶部是一排*工具栏区域*图标，允许您执行各种操作，例如调试或测试、加载、保存和执行\
    \ Python 程序代码。\n\n接下来，在工具栏图标行下方是*脚本区域*，您可以在其中输入多行 Python 代码，或从文件中输入已完成的程序。请注意，您程序的行号显示在脚本区域的左侧边距中，在该区域上方的左上角是一个标签，显示当前正在处理的程序名称。在图\
    \ 2.1 中，它显示为 <untitled>。\n\n最后，在其下方是 *Python Shell 区域*，其中可以找到 Python 的命令行提示符 >>>。在这里，您可以输入一行\
    \ Python 代码，并在按下 Raspberry Pi 键盘上的 Enter 键时执行它。此外，错误消息或来自 Python 的其他反馈也会显示在此区域。在图\
    \ 2.1 中，它显示我们正在运行 Python 3.9.2，位于 /usr/bin/python3。此版本的 Python 以及 Thonny 都取决于您在系统上安装的\
    \ Raspberry Pi 操作系统版本。这些版本的 Python3 和 Thonny 是我们所使用的 Raspberry Pi 操作系统上的默认版本。\n\
    \n> ***注意***\n> 我们还在本书编写时可用的最新版本 Python 3.11.3 中测试了本章中显示的所有 Python3。\n\n## 2.2.2\
    \ 在 Thonny 中创建并运行一个简单的 Python3 程序\n\n让我们创建并执行一个简单的 Python3 程序，该程序包含一个确定的重复结构，并将一些输出打印到\
    \ Python3 Shell 区域。在您的 Raspberry Pi 上启动 Thonny，并在 Python3 脚本区域中输入以下行（确保在每行之后按下键盘上的\
    \ Enter 键）：\n\n```\nprint(\"Count for me, Python!\")\nfor n in range (5):\n  \
    \  print(\"I'm counting!\", n)\nprint(\"I'm done counting!\")\n```\n\n请注意，在第二行之后，Thonny\
    \ *自动*为第三行插入了强制性的四个空格缩进！这种自动缩进机制对于*结构化编程*技术至关重要，其中控制流编程结构通过适当的缩进来界定。\n\n> ***注意***\n\
    > Thonny 为您实现了这种自动缩进，因为大多数初学者在程序中会犯缩进错误，或因拼写错误导致语法错误。\n> Thonny 也会自动缩进第四行，但您可以通过按下键盘上的\
    \ Delete 键来覆盖此缩进，将第四行与第一行和第二行一样左对齐输入。\n\n现在点击工具栏区域中的运行工具栏图标。在 Shell 区域中，应显示以下内容：\n\
    \n```\nCount for me, Python!\nI'm counting! 0\nI'm counting! 1\nI'm counting!\
    \ 2\nI'm counting! 3\nI'm counting! 4\nI'm done counting!\n>>>\n```\n\n为什么计数从零(0)开始？那是因为\
    \ Python 是一个零索引系统，计数从 0 开始，而不是 1。\n\n现在点击工具栏区域中的保存图标。在出现的保存对话框窗口中，将此 Python3 程序命名为\
    \ **looper.py**，确保如所示添加文件扩展名 **.py**，并指定您希望程序保存到系统上的文件夹。然后点击保存。保存完成后，请注意 Thonny\
    \ 窗口的标题栏显示了您刚刚保存的程序的路径和名称，并且脚本区域顶部的标签现在显示名称 looper.py。\n\n> ***注意***\n> 如果您想在\
    \ Thonny IDE 之外的“交互模式”下运行该程序，可以通过启动 Python3 来实现，我们将在本章后面几处进行展示。\n\n## 章节内练习\n\n\
    1.  如何使用上述程序结构让 Python 从 1 数到 5？\n2.  如何从脚本区域清除程序？\n\n您完成了！在下面的章节中，我们将介绍更多关于 Python3\
    \ 程序的语法和结构。但现在，请尝试使用 Thonny 和这个程序，然后您可以点击退出工具栏图标。下次运行 Thonny 时，除非您根据章节内练习 2 的答案清除了它，否则将加载相同的程序！\n\
    \n## 2.3 Python3 语言概述\n\n计算机程序按照特定的顺序从开始到结束执行并完成其目标。它们可能在该顺序内“分支”，也许只执行部分指令，这取决于某些逻辑测试或条件。它们也可能重复其操作的某些部分，要么是预定的次数，要么是不确定的，这取决于变化的条件。Python\
    \ 符合此模型，并使用以下层级方案进行操作：\n\n-   第 1 级。Python3 程序或脚本中的*所有内容*都由模块化组件组成。\n-   第 2 级。这些模块化组件包含语法正确的\
    \ Python 语句。\n-   第 3 级。这些语句包含表达式。\n-   第 4 级。表达式创建和操作对象。\n\nPython3 代码开发过程从在第\
    \ 1 级制定语法正确的元素开始，然后依次向下进行，直到达到第 4 级。\n\n在 Raspberry Pi 操作系统环境中，如果您面临需要编写脚本或编程的任务，您必须首先决定采用哪种编程模型来完成任务。简单来说，这意味着使用三种主要编程模型中的任何一种：过程式/命令式编程模型、面向对象编程\
    \ (OOP) 模型或逻辑编程模型。当然，您完成任务的好坏取决于您使用任何或所有这些模型进行脚本编写或编程的经验。也许，如果您与一群人一起完成此任务，他们的经验和偏好也非常重要。但是，您如何根据任何模型来制定任务，最重要的是与您使用这些模型的经验有关。对于计算机编程领域中大量可能的脚本编写或编程任务，应用任何模型都没有简单的准则。\n\
    \n然而，完成任务的底线是您对实现所选模型的语言的语法有多熟悉。\n\n这就是为什么我们在本章中详细解释 Python3 语法。Python3 可以利用所有这些编程模型，并且实际上可以混合使用这些模型中使用的技术。我们在此对此进行一些评论，并在接下来的几节中说明这些模型的一些简单用法。\n\
    \nPython3 是一种*高级、结构化*（在这种情况下，意味着由规则的结构化组件构建，例如确定性或不确定性重复）和*解释型*编程（或脚本）语言，与 C 或\
    \ Java 等低级编译语言相对。如前所述，它也是一种*多范式*编程语言，允许您使用来自三种主要范式的数据抽象。就我们的目的而言，“脚本”和“编程”可以被视为同一件事。那么为什么要使用“纯粹的”\
    \ OOP 方法呢？\n\n我们选择不完全定义 OOP 最基本的方面和部分（您可以在广泛的文献中轻松找到相关描述），而是将其与更传统的过程式编程方法进行对比和比较，以便让您更直观地了解\
    \ OOP 所使用的方法。\n\n如前所述，非 OOP 的过程式/命令式程序可以使用我们在以下各节中展示的 Python3 语法来运行其结构化的控制流操作。非平凡的程序可能由称为过程、模块或子程序的控制流操作分组组成。这种使用\
    \ Python3 语法的方式，由于该语言“适应”过程式/命令式模型，可以组合成一个强调更传统算法和抽象数据类型 (ADT) 的程序。这两者的一个简单例子是计算两个整数最大公因数的算法（或数学计划），或者将整数本身定义为某种数值类型，以及对其规定的可能操作集。\n\
    \n这种方法最大的问题之一是，如果变量具有全局作用域，在定义它们的“容器”之外的全局命名空间中，对这些变量的赋值可能会冲突并导致错误。这就是为什么使用命名空间（如我们在第\
    \ 1 章中所示）来本质上隔离进程如此有效的原因之一。变量（在任何特定进程命名空间中有效）被排他性地、局部地定义和使用。\n\n在 Python3 OOP\
    \ 中，这基本上是通过所谓的“封装”来完成的。其思想是数据和操作数据的函数*是一个实体*。这使对象免受来自实体外部任何环境的不必要更改。OOP 的这个基本组件将数据与一组用于访问和管理数据的*方法*结合在一起，称为对象。其数据处理模型与先前描述的过程式/命令式程序模型完全不同。\n\
    \n当然，利用 Python3 中丰富的语法，可以在一个程序中结合非 OOP 和 OOP 风格。Python 并不像 MIT scheme 等语言那样忠实地实现称为*尾递归*的函数式或逻辑编程结构。但它能够进行递归，我们也在下面进行了展示。\n\
    \n### 2.3.1 对象和类\n\n如果您还没有发现这一点，我们在此处的主题涵盖围绕着一点“为什么？”，以及更多的“如何？”。现在以介绍性的方式涵盖“如何？”方面将是谨慎的"
