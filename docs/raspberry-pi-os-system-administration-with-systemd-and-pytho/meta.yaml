    and *extended* ACLs. ACL permissions that that can be equivalent to the traditional
    file mode permissions are called *minimal ACLs*. Minimal ACLs have three entries,
    which can be the same as the traditional file permissions. ACLs with more than
    the three entries are called extended ACLs. Extended ACLs also contain a mask
