- md: "## 1.8.6 Adding Disks Using fdisk\n\nA more traditional approach to adding\
    \ media to the system a significant time after installation is covered in this\
    \ section. We conform to our recommended storage model, as in the previous section\
    \ where we implemented it for an additional hard disk added using Gparted. In\
    \ this section, we use the **fdisk** command to partition another disk. The example\
    \ in this section uses an externally mounted USB thumb drive, which is more easily\
    \ added, cheaper, and much more available to the ordinary user as an additional\
    \ storage medium.\n\nThis example can be easily extended to externally mounted\
    \ USB3 SATA SSDs, or other forms of media. In Section 1.9 below, entitled “Installing\
    \ ZFS, and **zpool** and **zfs** Command Syntax”, we give examples of ZFS-based\
    \ redundancy, to illustrate a similar backup strategy with ZFS.\n\n### 1.8.6.1\
    \ Partitioning a Disk Using fdisk\n\nfdisk is a command line, interactive, dialog-driven\
    \ program used to create and manage partition tables on Linux. The following is\
    \ a brief description of fdisk syntax and use:\n\n```\nfdisk – Create and manages\
    \ partition tables\nSyntax: fdisk [options] device\n        fdisk -l [device...]\n\
    \nOutput: New or manipulated partitions on the media device.\n```\n\nCommon Interactive\
    \ Commands:\n\n- **n** Create a new partition. You enter a partition number, starting\
    \ sector, and an ending sector. Both start and end sectors can be specified in\
    \ absolute terms as sector numbers. Pressing the Enter key with no input specifies\
    \ the default value, which is the start of the largest available block for the\
    \ start sector and the end of the same block for the end sector.\n- **p** Display\
    \ basic partition summary data. This includes partition numbers, starting and\
    \ ending sector numbers, partition sizes, fdisk's partition types codes, and partition\
    \ names.\n- **t** Change a single partition's type code. You enter the type code\
    \ using a two-byte hexadecimal number.\n- **w** Write data. Use this command to\
    \ save your changes.\n\nExample:\n$ sudo fdisk /dev/sdb As superuser, run fdisk\
    \ on the disk /dev/sdb\n\n## Example 1.6 Placing a Single Partition on a USB thumb\
    \ drive using fdisk\n\n**Objectives:** To use the fdisk utility to practice placing\
    \ a disk partition, with an ext4 file system on that partition, on a USB thumb\
    \ drive mounted on your Raspberry Pi.\n**Prerequisites:** Having a useable USB\
    \ thumb drive for your system.\n**Requirements:** Do the steps below in the sequence\
    \ presented to complete the requirements of this example.\n\n1. Having previously\
    \ determined that the thumb drive is recognized on your system, and what its logical\
    \ device name is (ours was /dev/sdb), insert it into a USB port. We used an 8\
    \ GB Kingston thumb drive; it's very reliable, and always auto-mounts on Raspberry\
    \ Pi 4B or Pi 400 systems.\n\nOn our Raspberry Pi 400, the thumb drive was auto-mounted.\
    \ Use the following commands to unmount it:\n\n```\n$ sudo umount /dev/sdb1\n\
    ```\n\n2. Use the fdisk command to partition the newly added USB thumb drive,\
    \ making sure to first delete any partitions that are on it. For our Kingston\
    \ USB thumb drive, there was only one default partition on it: a fat32 partition,\
    \ with a msdos partition table.\n\n```\n$ sudo fdisk /dev/sdb\nWelcome to fdisk\
    \ (util-linux 2.36.1).\nChanges will remain in memory only, until you decide to\
    \ write them.\nBe careful before using the write command.\n\nThe device contains\
    \ 'vfat' signature and it will be removed by a write command. See fdisk (8) man\
    \ page and --wipe option for more details.\n\nDevice does not contain a recognized\
    \ partition table.\nCreated a new DOS disklabel with disk identifier 0xa4dcc322.\n\
    \nCommand (m for help): n\nPartition type\n   p   primary (0 primary, 0 extended,\
    \ 4 free)\n   e   extended (container for logical partitions)\nSelect (default\
    \ p): p\nPartition number (1-4, default 1): <Enter>\nFirst sector (2048-60975103,\
    \ default 2048): <Enter>\nLast sector, +/-sectors or +/-size{K,M,G,T,P} (2048-60975103,\
    \ default 60975103): <Enter>\n\nCreated a new partition 1 of type 'Linux' and\
    \ of size 29.1 GiB.\n\nCommand (m for help):\n\nCommand (m for help): p\nDisk\
    \ /dev/sdb1: 29.08 GiB, 31219253248 bytes, 60975104 sectors\nUnits: sectors of\
    \ 1 * 512 = 512 bytes\nSector size (logical/physical): 512 bytes / 512 bytes\n\
    I/O size (minimum/optimal): 512 bytes / 512 bytes\nDisklabel type: dos\nDisk identifier:\
    \ 0xa4dcc322\n\nDevice Boot Start End Sectors Size Id Type\n/dev/sdb1p1 2048 60975103\
    \ 60973056 29.1G 83 Linux\n```\n\nCommand (m for help): **l**\n***A long list\
    \ of types and codes is displayed; we want type 83- Linux!***\n\nCommand (m for\
    \ help): **t**\nSelected partition 1\nHex code or alias (type L to list all):\
    \ **83**\nChanged type of partition 'Linux ' to 'Linux'.\n\nCommand (m for help):\
    \ **p**\nDisk /dev/sdb1: 29.08 GiB, 31219253248 bytes, 60975104 sectors\nUnits:\
    \ sectors of 1 * 512 = 512 bytes\nSector size (logical/physical): 512 bytes /\
    \ 512 bytes\nI/O size (minimum/optimal): 512 bytes / 512 bytes\nDisklabel type:\
    \ dos\nDisk identifier: 0xa4dcc322\n\nDevice Boot Start End Sectors Size Id Type\n\
    /dev/sdb1p1 2048 60975103 60973056 29.1G 83 Linux\n\nCommand (m for help): **w**\n\
    The partition table has been altered.\nCalling ioctl() to re-read partition table.\n\
    Syncing disks.\n$\n\n3. In order for this partition to be usable, you must add\
    \ a file system to it. We would like to add an ext4 file system to the partition.\
    \ To do this, use the **mkfs** command as follows:\n\n```\n$ sudo mkfs -t ext4\
    \ /dev/sdb1\nmke2fs 1.46.2 (28-Feb-2021)\nFound a dos partition table in /dev/sdb1\n\
    Proceed anyway? (y,N) **y**\nCreating file system with 7621888 4k blocks and 1908736\
    \ inodes\nfile system UUID: 894dddbc-b94a-4dc4-9966-66f0a8411b4e\nSuperblock backups\
    \ stored on blocks:\n\t32768, 98304, 163840, 229376, 294912, 819200, 884736, 1605632,\n\
    \t2654208, 4096000\nAllocating group tables: done\nWriting inode tables: done\n\
    Creating journal (32768 blocks): done\nWriting superblocks and file system accounting\
    \ information: done\n$\n```\n\nNow in order to use this partition for data, you\
    \ can create directories, and files in those directories.\n\nConclusion: Using\
    \ the fdisk utility, and the **mkfs** command, we deleted any existing partitions\
    \ on a USB thumb drive, and created a Linux partition on it with an ext4 file\
    \ system.\n\n## In-Chapter Exercises\n\n- 12. Why do you have to remount /dev/sdb1\
    \ in Example 1.6 in order to add directories and files to the disk, and how do\
    \ you achieve remounting? What is the designation of this thumb drive on your\
    \ system, and where is it mounted?\n- 13. Do the steps of Example 1.6 to partition\
    \ a USB thumb drive with a single primary partition, and then add an ext4 file\
    \ system to it. Create directories on the thumb drive.\n- 14. Do the steps of\
    \ Example 1.6 to partition an externally mounted SSD in a USB3 enclosure, placing\
    \ a single primary partition on it, and then add an ext4 file system to it. Create\
    \ directories on the hard drive.\n\n## 1.9 Installing ZFS, and **zpool** and **zfs**\
    \ Command Syntax\n\nThe Zettabyte File System (ZFS) is an advanced journaling\
    \ file system, and volume manager, developed at Sun Microsystems, and has many\
    \ useful functions and facilities for maintaining redundancy and security on server-class\
    \ computers. But it’s also useful for an individual user at home, who wants to\
    \ ensure the same objectives, but on a smaller scale system, such as one using\
    \ Raspberry Pi hardware. The following are the instructions for installing ZFS,\
    \ and the general syntax forms for the **zpool** and **zfs** commands, the two\
    \ premiere ZFS tools. Everything we show in the sections below is done on Ubuntu\
    \ 23.04, running on a Raspberry Pi 4B, the installation of which is shown in Section\
    \ 1.2.4 above. For a more complete description of these two important commands,\
    \ see the man pages for zfs and zpool on an Ubuntu 23.04 system (*after* you have\
    \ installed ZFS according to the instructions given below in Section 1.9.1)."
  mdcn: "## 1.8.6 使用 fdisk 添加磁盘\n\n本节将介绍在系统安装后相当长一段时间内，添加存储介质的一种更传统的方法。我们遵循推荐的存储模型，与上一节中使用\
    \ Gparted 为额外硬盘实现的模型一致。在本节中，我们将使用 **fdisk** 命令对另一块磁盘进行分区。本节的示例使用一个外接的 USB 闪存驱动器，它更容易添加、成本更低，并且对于普通用户来说，作为额外的存储介质更容易获得。\n\
    \n此示例可以轻松扩展到外接的 USB3 SATA SSD 或其他形式的存储介质。在下面的 1.9 节“安装 ZFS 以及 **zpool** 和 **zfs**\
    \ 命令语法”中，我们将提供基于 ZFS 的冗余示例，以说明使用 ZFS 的类似备份策略。\n\n### 1.8.6.1 使用 fdisk 对磁盘进行分区\n\
    \nfdisk 是一个命令行、交互式、对话驱动的程序，用于在 Linux 上创建和管理分区表。以下是 fdisk 语法和用法的简要说明：\n\n```\n\
    fdisk – 创建和管理分区表\n语法：fdisk [选项] 设备\n      fdisk -l [设备...]\n\n输出：在存储设备上新建或操作的分区。\n\
    ```\n\n常用交互命令：\n\n- **n** 创建新分区。你需要输入分区号、起始扇区和结束扇区。起始和结束扇区都可以用扇区号的绝对值指定。按回车键而不输入任何内容则指定默认值，即最大可用块的起始位置作为起始扇区，同一块的结束位置作为结束扇区。\n\
    - **p** 显示基本分区摘要数据。这包括分区号、起始和结束扇区号、分区大小、fdisk 的分区类型代码以及分区名称。\n- **t** 更改单个分区的类型代码。你需要使用两位十六进制数输入类型代码。\n\
    - **w** 写入数据。使用此命令保存你的更改。\n\n示例：\n$ sudo fdisk /dev/sdb 以超级用户身份，在磁盘 /dev/sdb 上运行\
    \ fdisk\n\n## 示例 1.6 使用 fdisk 在 USB 闪存驱动器上放置单个分区\n\n**目标：** 使用 fdisk 工具练习在挂载到你的树莓派上的\
    \ USB 闪存驱动器上放置一个磁盘分区，并在该分区上创建 ext4 文件系统。\n**前提条件：** 拥有一个可用于你系统的 USB 闪存驱动器。\n**要求：**\
    \ 按照下面呈现的顺序执行步骤，以完成此示例的要求。\n\n1.  之前已确定闪存驱动器在你的系统上被识别，并且知道其逻辑设备名称（我们的是 /dev/sdb），将其插入\
    \ USB 端口。我们使用了一个 8 GB 的金士顿闪存驱动器；它非常可靠，并且在 Raspberry Pi 4B 或 Pi 400 系统上总是自动挂载。\n\
    \n在我们的 Raspberry Pi 400 上，闪存驱动器是自动挂载的。使用以下命令卸载它：\n\n```\n$ sudo umount /dev/sdb1\n\
    ```\n\n2.  使用 fdisk 命令对新添加的 USB 闪存驱动器进行分区，确保首先删除其上的任何现有分区。对于我们的金士顿 USB 闪存驱动器，上面只有一个默认分区：一个\
    \ fat32 分区，带有 msdos 分区表。\n\n```\n$ sudo fdisk /dev/sdb\n欢迎使用 fdisk (util-linux\
    \ 2.36.1)。\n更改将仅在内存中保留，直到你决定写入它们。\n在使用写入命令之前请小心。\n\n设备包含 'vfat' 签名，它将被写入命令删除。有关更多详细信息，请参阅\
    \ fdisk (8) 手册页和 --wipe 选项。\n\n设备不包含可识别的分区表。\n已创建一个新的 DOS 磁盘标签，磁盘标识符为 0xa4dcc322。\n\
    \n命令（输入 m 获取帮助）：n\n分区类型\n   p   主分区（0 个主分区，0 个扩展分区，4 个空闲）\n   e   扩展分区（逻辑分区的容器）\n\
    选择（默认 p）：p\n分区号（1-4，默认 1）：<回车>\n起始扇区（2048-60975103，默认 2048）：<回车>\n结束扇区，+/-扇区或\
    \ +/-大小{K,M,G,T,P}（2048-60975103，默认 60975103）：<回车>\n\n已创建一个类型为 'Linux'、大小为 29.1\
    \ GiB 的新分区 1。\n\n命令（输入 m 获取帮助）：\n\n命令（输入 m 获取帮助）：p\n磁盘 /dev/sdb1：29.08 GiB，31219253248\
    \ 字节，60975104 个扇区\n单元：扇区（1 * 512 = 512 字节）\n扇区大小（逻辑/物理）：512 字节 / 512 字节\nI/O 大小（最小/最佳）：512\
    \ 字节 / 512 字节\n磁盘标签类型：dos\n磁盘标识符：0xa4dcc322\n\n设备       启动     起点     终点    扇区\
    \   大小  Id 类型\n/dev/sdb1p1      2048 60975103 60973056  29.1G  83 Linux\n```\n\
    \n命令（输入 m 获取帮助）：**l**\n***显示了很长的类型和代码列表；我们想要类型 83 - Linux！***\n\n命令（输入 m 获取帮助）：**t**\n\
    已选择分区 1\n十六进制代码或别名（输入 L 列出所有）：**83**\n已将分区 'Linux ' 的类型更改为 'Linux'。\n\n命令（输入 m\
    \ 获取帮助）：**p**\n磁盘 /dev/sdb1：29.08 GiB，31219253248 字节，60975104 个扇区\n单元：扇区（1 * 512\
    \ = 512 字节）\n扇区大小（逻辑/物理）：512 字节 / 512 字节\nI/O 大小（最小/最佳）：512 字节 / 512 字节\n磁盘标签类型：dos\n\
    磁盘标识符：0xa4dcc322\n\n设备       启动     起点     终点    扇区   大小  Id 类型\n/dev/sdb1p1 \
    \     2048 60975103 60973056  29.1G  83 Linux\n\n命令（输入 m 获取帮助）：**w**\n分区表已更改。\n\
    调用 ioctl() 重新读取分区表。\n正在同步磁盘。\n$\n\n3.  为了使此分区可用，你必须为其添加文件系统。我们希望在该分区上添加一个 ext4\
    \ 文件系统。为此，请使用 **mkfs** 命令，如下所示：\n\n```\n$ sudo mkfs -t ext4 /dev/sdb1\nmke2fs\
    \ 1.46.2 (28-Feb-2021)\n在 /dev/sdb1 中找到 dos 分区表\n无论如何都要继续？(y,N) **y**\n正在创建具有\
    \ 7621888 个 4k 块和 1908736 个 inode 的文件系统\n文件系统 UUID：894dddbc-b94a-4dc4-9966-66f0a8411b4e\n\
    超级块备份存储在块上：\n\t32768, 98304, 163840, 229376, 294912, 819200, 884736, 1605632,\n\
    \t2654208, 4096000\n分配组表：完成\n写入 inode 表：完成\n创建日志（32768 个块）：完成\n写入超级块和文件系统会计信息：完成\n\
    $\n```\n\n现在，为了使用此分区存储数据，你可以创建目录以及这些目录中的文件。\n\n结论：使用 fdisk 工具和 **mkfs** 命令，我们删除了\
    \ USB 闪存驱动器上的任何现有分区，并在其上创建了一个带有 ext4 文件系统的 Linux 分区。\n\n## 章节内练习\n\n- 12. 为什么在示例\
    \ 1.6 中必须重新挂载 /dev/sdb1 才能向磁盘添加目录和文件，如何实现重新挂载？此闪存驱动器在你的系统上的指定名称是什么，它挂载在哪里？\n-\
    \ 13. 按照示例 1.6 的步骤，对 USB 闪存驱动器进行分区，创建一个主分区，然后在该分区上添加 ext4 文件系统。在闪存驱动器上创建目录。\n\
