    "Why" means deciding on the relative importance of "What" you are backing up.


    "When" means hourly, once a day, once a week, once a month, every time you save
    a particular file, and at what time exactly, like 3 A.M.


    "Where" means on a local medium, like automatically to an externally mounted USB3
    SSD, to Dropbox/Google/Amazon cloud storage, to a USB thumb drive manually, to
    another computer or NAS on your home network via NFSv4, automatically by cron,
    to another kind of attached medium manually, totally, incrementally, to RAID of
    various levels using ZFS, or any variant and combination of the previous.


    "Who" means by the only user on the system, by the initiator or executor, such
    as by cron automatically, by the designated system administrator, either manually
    or semi-automatically, or by an automated process running at Dropbox, Google,
    or Amazon, for example.


    # 1.11.1 A Strategic Synopsis and Overview of File Backup Facilities


    There are several strategies that a single user, or system administrator, can
    use in confidently and efficiently backing up the file components of a Raspberry
    Pi system. Table 1.7 and its included Descriptions, give a basic overview of those
    strategies, and the facilities that implement them on the Raspberry Pi OS. In
    the sections that follow the table, we briefly give details of these facilities.
    The man pages on your system give more complete descriptions, along with command
    options, arguments, and option arguments for all of the Raspberry Pi OS commands
    listed in the Table 1.7.


    # 1.11.2 Linux GNU tar


    A Linux operating system, such as the Raspberry Pi OS, has several utilities that
    allow you to archive your files and directories in a single file, and the **tar**
    command is the most popular, widely used, and traditional method that allows you
    to do this.'
  - '[PAGE 127]


    Raspberry Pi OS System Administration Fundamentals


    111


    TABLE 1.7

    Raspberry Pi OS File Backup Facilities


    | Backup Facility | Description |

    | :--- | :--- |

    | **tar** | Command and options to pack a file or a directory hierarchy as an
    ordinary disk file for backup, archiving, or moving to another location or system.
    **gtar** is the GNU version |

    | **cpio** | Less popular than tar, but with much of the same functionality |

    | **rsync** | A disk space-efficient command to copy files and directories |

    | **dd** | A simple and abbreviated backup utility |

    | **zfs snapshot** | Built-in commands and options in ZFS that offer a variety
    of backup modes |

    | **SD Card Copier** | The built-in backup facility of the Raspberry Pi OS |

    | **git & Github** | Online facility, and command repertoire, to archive code,
    etc. |

    | **Script files** | Administrator or user-written shell scripts or other programming
    language backup systems, that can use all of the above commands in them |

    | **3rd party software** | Many products, both local and online. Obe very useful
    example that is most significant for ordinary use is FileZilla |


    > ***Note***

    Contemporary **tar** on Linux *is* the GNU version.


    The **tar** (short for *tape archive*) utility was originally designed to save
    file systems on tape as a backup, so that files could be recovered in the event
    of a system crash. It is primarily used now to pack a directory hierarchy as an
    ordinary disk file. That disk file can then be either saved for system backup
    purposes locally or remotely, or transmitted to someone via the Internet. It is
    also used commonly with a compression utility, such as **gzip**, via a command
    line option. Doing so saves disk space and transmission time. The saving in disk
    space results primarily from the fact that empty space within a cluster is not
    wasted. A brief description of the **tar** utility follows.


    The GNU version of **tar** has some important functional features, and incorporates
    a more friendly syntax, than traditional UNIX **tar**. Therefore, for beginners
    we only show the “long form” of the GNU-style syntax because it’s more intuitive,
    and easy to understand. Once you get more familiar with **tar**, you may switch
    to the UNIX-style short form at your discretion.


    System administrators normally use a cost-effective archival medium for archiving
    complete file system structures as backups, so that when a system crashes for
    some reason, files can be recovered. Linux-based computer systems normally crash
    for reasons beyond the operating system’s control, such as a microSD card failure,
    or failure of the processor itself. The Raspberry Pi OS rarely causes a system
    to crash, because it’s a well-designed, coded, and tested operating system. In
    a typical commercial installation, backup is done every day during off hours (late
    night or early morning) when the system is not normally in use, with appreciable
    demand placed on it.'
  - '[PAGE 128]


    The general syntax of the **tar** command, shown with GNU-style syntax as opposed
    to traditional UNIX-style syntax, is as follows:


    ```

    tar


    Syntax: tar [operation mode] [operation mode options] [FILE...]


    Purpose: Archive (copy in a particular format) files to, or restore files from,
    an archival medium (which can be an ordinary file). Directories are by default
    archived and restored recursively.

    Output: Archived or restored files or directory structures.

    ```


    **Main Operations and Operation Options in GNU-Style Usage:**


    +   - `--append` Append files to the end of an archive.

    - `--concatenate` Append an archive to the end of another archive.

    - `--compare` Find differences between archive and file system.

    - `--create` Create a new tape and record archive files on it

    - `--delete` Delete from the archive.

    - `--extract` Extract files from an archive.

    - `--help` Display a short option summary.

    - `--list` List the contents of an archive.

    - `--show-defaults` Show built-in defaults for options.

    - `--test-label` Test the archive volume label and then exit.

    - `--update` Append files which are newer than the versions in an archive.

    - `--usage` Display a list of available options.

    - `--version` Display program version and copyright information.


    **Common Options:**


    +   - `--preserve-permissions` Extract information about traditional file permissions.

    - `--acls` Enable POSIX.1e ACL support.

    - `--gzip` Filter the archive through gzip.

    - `--verbose` Verbosely list files processed.

    - `--file ARCHIVE.tar` Send archive to file named ARCHIVE.tar.


    **Command Arguments:**

    FILE... Target, either an archive file, or file object to be archived.


    # **1.11.2.1 Archiving and Restoring Files Using tar**


    A normal Raspberry Pi OS user can archive their own work if they want to. They
    would normally need to do this with file objects related to a project, so that
    they'
  - '[PAGE 129]


    can transfer them to someone via e-mail, ssh, or via mobile secondary storage
    media (USB thumb drive, for example). Or perhaps they would want to retain their
    own file system objects as backups via the same methods.


    The primary reason for making an archive is the convenience of dealing with (sending
    or receiving) a single file instead of a complete directory hierarchy. Without
    an archive, the sender might have to send several files and directories (a file
    structure) that the receiver would have to restore in their correct hierarchical
    structure. Without an archiving facility such as **tar**, depending on the size
    of the files and directory structure, the task of sending, receiving, and reconstructing
    the file structure can be very time consuming.


    There are other file compression facilities, such as the **bzip2**, **gzip**,
    **gunzip**, **gzexe**, **xz**, **zcat**, and **zmore** commands, and we must point
    out that compression saves disk space and transmission time. But compressing small
    files normally does not result in much compression, and storage space. Also, compressing
    files of one cluster in size (the minimum unit of disk storage, i.e. one or more
    sectors) or less does not help save storage media space, even if compression does
    result in smaller files, because the system ends up using one cluster to save
    the compressed file anyway. But if compression does result in a smaller file,
    you do save time in transmitting the compressed version. If the disk block size
    is 512 bytes and a cluster consists of more than two blocks, you can use the **tar**
    command to pack files together in one file, with a 512-byte tar header at the
    beginning of each file, as shown in Figure 1.9.


    ![](img/7ffbe025fa2ba956525d0c51169283f3_129_0.png)


    **FIGURE 1.9**

    tar-Packed File.'
- md: "## 1.11.2.2 Eight Easy tars\n\nIn this section, we show eight of the simplest\
    \ uses of the **tar** command.\n\n1.  Creating an archive:\n\n    This is the\
    \ simplest command to create an archive file from a directory.\n\n    ```bash\n\
    \    $ tar --create --verbose --file archive_name.tar directory_name\n    ```\n\
    \n    where:\n    - **--create** is the operation to create a new archive\n  \
    \  - **--verbose** is the operation to list the files being processed\n    - **--file**\
    \ is the operation that specifies that the file **archive_name.tar** is the name\
    \ of the archive file, and\n    - **directory_name** is the directory you want\
    \ to archive.\n\n2.  Creating an archive and preserving its ACL permissions:\n\
    \n    A simple variation on creating an archive is using an option to preserve\
    \ ACLs that the directory has. ACLs are detailed fully in Volume 1, both the POSIX.1e\
    \ and NFSv4 varieties.\n\n    ```bash\n    $ tar --acls --create --verbose --file\
    \ archive_name.tar directory_name\n    ```\n\n    where:\n    - **--acls** is\
    \ the option to preserve the ACLs that the directory has\n    - **--create** is\
    \ the operation to create a new archive\n    - **--verbose** is the operation\
    \ to list the files being processed\n    - **--file** is the operation that specifies\
    \ that the file **archive_name.tar** is the name of the archive file, and\n  \
    \  - **directory_name** is the directory you want to archive.\n\n3.  Extracting\
    \ an archive:\n\n    This is the simplest command to extract a directory from\
    \ an archive file.\n\n    ```bash\n    $ tar --extract --verbose --file archive_name.tar\n\
    \    ```\n\n    where:\n    - **--extract** is the operation to extract a **directory_name**\
    \ from an archive file\n    - **--verbose** is the operation to list the files\
    \ being processed\n    - **--file** is the operation that specifies that the file\
    \ **archive_name.tar** is the name of the archive file.\n\n    In this simplest\
    \ form, the directory which will be created from the archived file will have the\
    \ same name as the archive file, minus the .tar extension.\n\n4.  Extracting an\
    \ archive and restoring its ACL entries:\n\n    A simple variation on extracting\
    \ an archive is using an option to restore the preserved ACLs that the archive\
    \ file has (if any).\n\n    ```bash\n    $ tar --acls --extract --verbose --file\
    \ archive_name.tar\n    ```\n\n    where:\n    - **--acls** is the option to restore\
    \ the preserved ACLs that the archived file has\n    - **--extract** is the operation\
    \ to extract the archived file\n    - **--verbose** is the operation to list the\
    \ files being processed\n    - **--file** is the operation that specifies that\
    \ the file **archive_name.tar** is the name of the archive file.\n\n    In this\
    \ simplest form variation, the directory which will be created from the archived\
    \ file will have the same name as the archive file, minus the .tar extension.\n\
    \n5.  Listing the contents of an archive:\n\n    This procedure allows you to\
    \ view the contents of an archive file without extracting anything from it.\n\n\
    \    ```bash\n    $ tar --list --verbose --file archive_name.tar\n    ```\n\n\
    \    where:\n    - **--list** is the operation that lists the contents of the\
    \ archive file\n    - **--verbose** is the operation to list the files being processed\n\
    \    - **--file** is the operation that specifies that the file **archive_name.tar**\
    \ is the name of the archive file.\n\n6.  Extracting a single file from an archive\
    \ file:\n\n    The following command extracts only a specific file from an archive\
    \ file.\n\n    ```bash\n    $ tar --extract --verbose --file archive_file.tar\
    \ file_pathname\n    ```\n\n    where:\n    - **--extract** is the operation to\
    \ extract the single file\n    - **--verbose** is the operation to list the files\
    \ being processed\n    - **--file** is the operation that specifies that the file\
    \ **archive_name.tar** is the name of the archive file you are extracting from,\
    \ and\n    - **file_pathname** is the complete pathname specification to the file\
    \ you want to extract inside the archive.\n\n7.  Extracting a single directory\
    \ from an archive file:\n\n    A variation on extracting just a single file from\
    \ an archive, to extract a single directory, along with recursively extracting\
    \ any of its subdirectories and files, specify the directory name that you want\
    \ to extract as follows:\n\n    ```bash\n    $ tar --extract --verbose --file\
    \ archive_file.tar directory_pathname\n    ```\n\n    where:\n    - **--extract**\
    \ is the operation to extract the single file\n    - **--verbose** is the operation\
    \ to list the files being processed\n    - **--file** is the operation that specifies\
    \ that the file **archive_name.tar** is the name of the archive file you are extracting\
    \ from, and\n    - **directory_pathname** is the complete pathname specification\
    \ to the directory you want to extract inside the archive.\n\n8.  Adding a file\
    \ or directory to an existing archive using **--append** option:\n\n    To add\
    \ files to an existing archive, do the following:\n\n    ```bash\n    $ tar --append\
    \ --verbose --file archive_name.tar file_or_directory_name\n    ```\n\n    where:\n\
    \    - **--append** is the operation to add the single file or directory to the\
    \ archive\n    - **--verbose** is the operation to list the files or directories\
    \ being processed\n    - **--file** is the operation that specifies that the file\
    \ **archive_name.tar** is the name of the archive file you are adding files or\
    \ directories to, and\n    - **file_or_directory_name** is the complete pathname\
    \ specification to the file or directory you want to add inside the archive.\n\
    \n## In-Chapter Exercise\n\n21. a. Referring to the abbreviated man page shown\
    \ above, or to the man page for **tar** on your Raspberry Pi system, give a command\
    \ that would create a gzipped archive of a directory named ziptest.\n    b. Give\
    \ a command that would extract the gzipped archive into another directory named\
    \ ziptest2.\n\n## 1.12 Other Raspberry Pi OS Archiving and Backup Facilities\n\
    \nIn addition to the traditional **tar** facility briefly shown in the previous\
    \ section, there are several other facilities and methods a system administrator\
    \ can use to archive and backup individual user accounts, files, file systems,\
    \ and the entire system itself. As stated above, to get a more complete listing\
    \ of the capabilities and options available for the command line facilities shown\
    \ in this, and all other sections, consult the man pages on your system for these\
    \ commands. We briefly describe and give simple examples of some of the more modern\
    \ and useful of these facilities and methods below.\n\n## 1.12.1 rsync\n\nThe\
    \ **rsync** command is a very modern and space-efficient way to backup files and\
    \ directories, particularly from one machine to another, using **ssh** across\
    \ a network. Its operation can also be automated, via the use of systemd scheduling.\n\
    \nIts most important and defining feature is the data transfer “quick check” algorithm\
    \ it uses, which reduces the amount of data transmitted. This is done by sending\
    \ only the differences between the source files, and the same existing destination\
    \ files (if any). If files need to be transferred, because there is a difference\
    \ between source and destination, they are copied, or “synced”, using this algorithm.\
    \ The algorithm looks for files that have changed in size or modification time.\
    \ Changes in the other possible preserved file object attributes (such as permissions,\
    \ or ACLs) are made on the destination file directly when the quick check indicates\
    \ that the destination file needs to be updated in that way.\n\nAn abbreviated\
    \ summary of the **rsync** man page is as follows:\n\n```\nrsync\nSyntax:\nLocal:\
    \ rsync [OPTION...] SRC... [DEST]\nRemote:\n    via remote shell:\n    Pull mode:\
    \ rsync [OPTION...] [USER@]HOST:SRC... [DEST]\n    Push mode: rsync [OPTION...]\
    \ SRC... [USER@]HOST:DEST\n\n    via rsync daemon:\n    Pull mode: rsync [OPTION...]\
    \ [USER@]HOST::SRC... [DEST]\n              rsync [OPTION...] rsync://[USER@]HOST[:PORT]/SRC...\
    \ [DEST]\n    Push mode: rsync [OPTION...] SRC... [USER@]HOST::DEST\n        \
    \      rsync [OPTION...] SRC... rsync://[USER@]HOST[:PORT]/DEST\n```\n\n**Purpose:**\
    \ To transfer files locally or remotely using an efficient and fast data transfer\
    \ algorithm. To copy locally, to/from (push/pull) another host over any remote\
    \ shell, or to/from (push/pull) a remote rsync daemon.\n\n**Output:** Transferred\
    \ files, either locally or remotely.\n\n**Common Options:**\n\n- **-a, --archive**\
    \ archive mode\n- **-A, --acls** preserve ACLs (implies -p)\n- **--delete** delete\
    \ extraneous files from destination dirs\n- **-e, --rsh=COMMAND** specify the\
    \ remote shell to use\n- **--existing** skip creating new files on receiver\n\
    - **-h, --human-readable** output numbers in a human-readable format\n- **-H,\
    \ --hard-links** preserve hard links\n- **-k, --copy-dirlinks** transform symlink\
    \ to dir into referent dir\n- **-K, --keep-dirlinks** treat symlinked dir on receiver\
    \ as dir\n- **-n, --dry-run** perform a trial run with no changes made\n- **-p,\
    \ --perms** preserve permissions\n- **-q, --quiet** suppress non-error messages\n\
    - **-r, --recursive** recursively descend into directories\n- **--remove-source-files**\
    \ sender removes synchronized files (non-directory)\n- **-v, --verbose** increase\
    \ verbosity\n- **-z, --compress** compress file data during the transfer\n\n**Command\
    \ Arguments:**\n\n- **SRC** the source file or directory\n- **DEST** the destination\
    \ path\n\n## 1.12.1.1 rsync Examples\n\nOne of the basic assumptions we are making\
    \ in the following set of examples is that the source is generally a file object\
    \ that is changing over time, such as a directory where you are modifying files\
    \ by adding or deleting them from it, or from its sub-directories. Also, the destination\
    \ is a file object that is unchanging, or fixed over time, such as when you do\
    \ an archival backup. This is usually the case when you are using an archiving\
    \ utility, although as you have seen above with the tar command, the archive (or\
    \ destination) can be added to, or extracted from in various ways.\n\n> **Note**\n\
    > We do not cover more complex, or advanced uses of **rsync**."
