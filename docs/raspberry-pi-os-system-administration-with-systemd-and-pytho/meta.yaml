    \n## 1.5.2 在基于文本的界面中添加和维护组\n\n创建和管理用户账户及组最简单、最有效的方法是使用 Webmin。从 Webmin 的主菜单中，你可以选择“系统\
    \ > 用户和组”来查看、创建和删除两者。我们当然推荐这样做，但对于在控制台或终端窗口中的基于文本的交互，你可以使用 **addgroup** 和 **adduser**\
    \ 命令来管理组。\n以下是如何添加和管理组的示例。\n\n### 示例 1.3 从命令行添加和管理组及用户\n\n**目标：** 添加一个新组，并管理该组中的用户。\n\
    **前提条件：** 已完成示例 1.1 和 1.2，系统上已有默认组。\n**背景：** 基于文本的组管理通过 **addgroup** 命令及其选项来完成。\n\
    **要求：** 按照以下步骤顺序操作，以完成本示例的要求：\n\n1.  使用 **addgroup** 命令创建一个名为 “development” 的组，如下所示：\n\
    \n```\n$ sudo addgroup development\n[sudo] password for bob: GGG\nAdding group\
    \ `development' (GID 1003) ...\nDone.\n$\n```\n\n2.  使用 **adduser** 命令将用户 sarwar\
    \ 添加到名为 “development” 的组中，如下所示：\n\n```\n$ sudo adduser sarwar development\nAdding\
    \ user `sarwar' to group `development' ...\nAdding user sarwar to group development\n\
    Done.\n$\n```\n\n3.  列出系统上的组，并验证 sarwar 是名为 “development” 组的成员：\n\n```\n$ cd /etc\n\
    /etc$ more group\nOutput truncated...\nsarwar:x:1002:\ndevelopment:x:1003:sarwar\n\
    /etc $\n```\n\n4.  将用户 sarwar 从名为 “development” 的组中移除：\n\n```\n/etc $ sudo deluser\
    \ sarwar development\nRemoving user `sarwar' from group `development' ...\nDone.\n\
    /etc $\n```\n\n5.  验证 sarwar 已从名为 “development” 的组中移除：\n\n```\n/etc $ more group\n\
    Output truncated...\nsarwar:x:1002:\ndevelopment:x:1003:\n```\n\n### 章节内练习\n\n\
    9.  你有一个位于房间内的、网络隔离的 Raspberry Pi。你希望只有定义为 “proj” 组中的特定用户才能访问该计算机文件系统上你账户中名为 “proj1”\
    \ 目录中的文件。使用上述命令行命令将这些特定用户以及你自己添加到 “proj” 组。创建 “proj1” 目录。然后，适当地设置你的主目录、“proj1”\
    \ 目录以及放入该目录的任何文件的权限位，以便只有这些特定用户才能读取、写入和执行其中的文件。该房间对公众开放，但要登录计算机，每个用户必须使用她自己的密码。\n\
    \n## 1.5.3 从命令行修改和删除用户账户及组\n\n要使用命令行从系统中有效地删除用户账户或组，请使用 **deluser** 或 **delgroup**\
    \ 命令。以下是从 Raspberry OS 的手册页中摘录的这些命令的简要说明：\n\n```\ndeluser, delgroup - 从系统中移除用户或组\n\
    \n语法：\ndeluser [选项][--force][--remove-home] [--remove-all-files]\n        [--backup]\
    \ [--backup-to DIR] 用户\ndeluser --group [选项] 组\ndelgroup [选项] [--only-if-empty]\
    \ 组\ndeluser [选项] 用户 组\n\n用途：deluser 和 delgroup 根据命令行选项以及 /etc/deluser.conf 和\
    \ /etc/adduser.conf 中的配置信息，从系统中移除用户和组。\n\n常用选项：\n    [--conf FILE] 使用 FILE 代替\
    \ /etc/deluser.conf\n    --version 显示版本和版权信息。\n```\n\n要从命令行修改现有用户账户，你可以使用 **usermod**\
    \ 命令。以下是从 Raspberry OS 的手册页中摘录的该命令的简要说明：\n\n```\nusermod - 修改用户账户\n\n语法：\nusermod\
    \ [选项] 登录名\n\n用途：usermod 修改系统账户文件，以反映为指定登录名在命令行上指定的更改。\n常用选项：\n    -a, --append\n\
    \    将用户添加到补充组。仅与 -G 选项一起使用。\n    -d, --home HOME_DIR\n    用户的新登录目录。\n```"
