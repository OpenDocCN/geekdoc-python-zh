    # 1.10 Configuring a Printer


    There are fundamental and modern methods for adding and configuring a local printer
    on a Raspberry Pi, and printing documents on it, using the Common UNIX Printing
    System (CUPS). We detail these methods *extensively* in Volume 1, Section 1.6,
    entitled “What the Common Unix Printing System Accomplishes”. There we also give
    some additional details of traditional print commands such as **lpadmin**, **lpc**,
    **lpinfo**, **lpmove**, **lpoptions**, **lpq**, **lp**, **lpr**, **lprm**, and
    **lpstat**.


    We review that section here. You can configure and manage a printer for use on
    your Raspberry Pi OS, using the three basic methods. These methods are generally
    applicable to printers that are connected directly to your computer, and this
    most likely is via a USB connection. The three basic methods are:


    +   1. A web-based browser CUPS interface,

    2. Using the Raspberry Pi OS Menu choice Preferences > Print Settings, and

    3. Using the Raspberry Pi OS command line in a terminal.


    The configured printer in all three methods is controlled and managed with the
    Common UNIX Printing System (CUPS).'
