  md: "To summarize the above steps, a user presses a mouse button to signify a graphical\
    \ “pick” in a widget, within an encompassing tkinter-produced frame shown on-screen.\
    \ That choice, or “event”, is recognized by, and acted upon by the tkinter function\
    \ controlling that widget. This event may generate a “request” for graphical service,\
    \ and this request displays the data or graphics within the tkinter frame. A very\
    \ similar situation is present in the X window System Event-Request Model.\n\n\
    # 2.5.3.2.1 Non-Event Driven tkinter\n\nThat brings up some interesting questions:\
    \ What kind of graphics is *not* event driven, and what apps or programs accomplish\
    \ this way of displaying data? Basically static, non-interactive forms of computer\
    \ graphics. Can you name any of those? And, is tkinter able to do this form of\
    \ non-event driven processing, and exactly how?\n\n**Well, here’s an answer to\
    \ that last question.**\nAs we’ve noted, tkinter is primarily designed for event-driven\
    \ graphics programming, where the program responds to user input or system events.\
    \ However, you can also create non-event driven graphics using tkinter by using\
    \ a technique called “animation loops”.\nIn a non-event driven program, you need\
    \ to create your own loop that continuously updates the graphical elements.\n\
    Here’s a basic example of how you can create a non-event driven graphical program\
    \ using tkinter:\n\n```\nimport tkinter as tk\ndef update_graphics():\n    # Update\
    \ your graphical elements here\n    # This function will be called repeatedly\
    \ in the main loop\n    # Example: Move a shape on a canvas\n    canvas.move(shape,\
    \ 1, 0)\n    # Schedule the next update\n    root.after(10, update_graphics) #\
    \ Update every 10 milliseconds\nroot = tk.Tk()\ncanvas = tk.Canvas(root, width=400,\
    \ height=400)\ncanvas.pack()\n# Create a shape on the canvas\nshape = canvas.create_rectangle(50,\
    \ 50, 100, 100, fill='red')\n# Start the update loop\nupdate_graphics()\nroot.mainloop()\n\
    ```\n\nIn the above example, the `update_graphics()` function is called repeatedly\
    \ using the `root.after()` method, which schedules a function to be called after\
    \ a specified delay (in milliseconds). Inside the `update_graphics()` function,"
