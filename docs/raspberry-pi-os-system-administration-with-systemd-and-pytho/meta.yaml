    precision (optional): show specified digits of precision for floats; 6 is default

    type (required): d (decimal int), f (float), s (string), e (float exponential
    notation)

    Examples for x = 123, y = 456.789

    % x --> ... 123

    % x --> 000123

    %8.2f % y --> ... 456.79

    "8.2e" %y--> 4.57e+02

    "-8s"%y "Hello" -> Hello ...

    ```


