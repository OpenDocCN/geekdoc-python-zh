    # 1.15.5.1 System Firewall


    A firewall is a facility that prevents unauthorized access to or from a private
    network or a computer. Firewalls can be implemented in either hardware, software,
    or both. Firewalls are mainly used to halt unauthorized access to a private network
    or intranet, from the Internet. All traffic entering or leaving a single computer,
    or intranet, passes through the firewall, which can look at each message packet
    stream, and block those that do not meet specific security requirements set by
    the system administrator. These requirements are codified in what are known as
    *firewall rules*.'
