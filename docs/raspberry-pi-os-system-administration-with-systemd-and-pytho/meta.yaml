    # 1.8 File Systems, Connections to Persistent Media, and Adding Media to Your
    System


    Question: What is a computer file system?


    > Answer: A way of logically ordering data, so that it is persistent, can be securely
    and easily located very quickly, and then accessed in a consistent way for use.


    Providing data persistence, which is the third primary objective of an operating
    system, in large part involves establishing and maintaining connections to persistent
    media, such as the microSD card that may be the system/boot disk on your hardware.
    Alternative forms of this media, and the file systems found on them, can be physically
    connected via the USB3 ports on the Raspberry Pi itself, such as with SATA SSD''s
    inside external enclosures, or USB3 thumb drives. They can also be some form of
    remote virtual drive, such'
