    you can update your graphical elements as needed. In this case, the example moves
    a rectangle on a canvas by calling the **canvas.move()** method.


    By adjusting the delay passed to **root.after()**, you can control the speed of
    the updates. Smaller delays result in faster updates and smoother animation, but
    they can also consume more system resources.


    Keep in mind that tkinter is not optimized for high-performance graphics or animations!
    For more complex or demanding graphics, you might consider using specialized libraries
    or frameworks such as Pygame or OpenGL.


    # 2.5.3.3 Basic Widget Construction Techniques


    Widgets are constructed images on the screen display, and they have a unique “style”,
    depending on the details of what information, and kind of interactivity you want
    them to participate in. The “style” of a widget is controlled by many complex
    graphical components: the X Window System, the display manager used, and the operating
    system itself. The tkinter module contains two versions of widgets: a default,
    or “generic version”, which makes widgets look the same regardless of what windowing
    system, operating system, or display manager is running. tkinter also implements
    widgets that emulate a particular windowing system, operating system, or display
    manager’s “style”. Which tkinter modules you import determines which widget sets
    are available to generate events and “callbacks”. The standard way of doing this
    uses the module tk to access the “generic” widgets, and the module ttk to access
    the “styled” widgets. You *must* import the tk module, because it allows you to
    create a “root”, or outer-most frame window. You optionally import the ttk module
    if you want the “styled” widgets.


    > ***Note***

    As is done in some of the following examples, you can use both the tk and ttk
    widgets in a GUI Python3 script file.


    To use the “generic” widgets, include the following **import** statement at the
    top of the Python3 script file:


    ```

    import tkinter as tk

    or:

    import tkinter

    ```


    To use the “styled” widgets, include the following **import** statement at the
    top of the Python3 script file:


    ```

    from tkinter import ttk

    ```


    The following two tables list the standard, pre-defined widgets in the tkinter
    module.'
- md: '## 2.5.3.4 General Form of a Widget Call and a Primary Example


    As shown in Section 2.5.3.2, there are several parts to tkinter widget GUI script
    file construction, but the basic parts follow this outline:


    1.  Generating data.

    2.  Constructing your widgets, using a set of universal constructor tools and
    the tkinter widget method set.

    3.  “Hooking” the data of the first part to the widget constructors of the second
    part, all within the context of an infinite (but indeterminately interrupted)
    event-loop.


    In this section, we show the general form of widget instancing. We then show an
    outline of tkinter GUI scripting, and also a primary example of one.


    tkinter widgets can be constructed to display and be hooked up to your Python3
    application code, either using purely OOP, or they can be constructed using a
    procedural/imperative programming approach.


    As stated in Section 2.5.3.2, we choose the latter approach because it’s easier
    for beginners. By the time you do all the examples we present here, you should
    be able to see that OOP is an essential, but not mandatory, part of tkinter GUI
    programming.


    The general form of using a tkinter widget is as follows:


    ```

    >>> widget = Widget.method (master, option=value, option=value,...)

    ```


    where:


    **widget** is the name assigned in your Python3 script to the particular instance
    you are creating and using


    **Widget** is the master instance of a widget class in the tkinter module


    After importing the tkinter module, the first thing you need to do is create an
    object, which is a surrounding frame or window, for the display of your information
    and/or data. This is done by creating a TK object with the following generic line
    of Python code:


    ```

    window_object_name = tkinter.Tk()

    ```


    Then you create widgets you''ve selected for their suitability to your purposes,
    and add them to the frame''s widget hierarchy.

    For example, to create a button widget instance, you would call either the tk
    or ttk Button method. You need to specify the window_object_name as the first
    argument, as follows:


    ```

    cmd_button = tk.Button(window_object_name, text="Some text".)

    ```


    or


    ```

    cmd_button = ttk.Button(application_window, text="Some text".)

    ```


    The arguments needed to create each kind of widget vary, so you should refer to
    the Python3 documentation we specified in Section 2.5.3.2 for each specific widget
    type shown in brief in Table 2.6.

    The following simple example shows a complete tkinter Python script, and the widget
    it creates. You should create, and then execute these six lines of code in Thonny''s
    Script Area, and run it with the Toolbar Run icon, using Way 2 (Script mode).
    Line numbers are shown *for reference only* in the following code.


    ### Example 2.36


    ```

    1 import tkinter

    2 from tkinter import ttk

    3 w = tkinter.Tk()

    4 w.title("Python GUI")

    5 ttk.Label(w,text="My first tkinter gui window").grid(column=0, row=0)

    6 w.mainloop()

    ```


    When this widget was generated on our Raspberry Pi 400, it appeared in the extreme
    upper-left corner of the display screen, just below the raspberry in the Raspberry
    Pi menu, but we could manually move it wherever we wanted on the screen display.

    To close the widget, just click on the "destroy window" button (shown in Figure
    2.2 as the X in the upper right-hand corner of the widget) in your style of GUI
    window in which the widget was created. You may have to expand the window to see
    all of the window manipulation buttons, but we didn''t need to do that on our
    Raspberry Pi 400. The following universal traits


    ![](img/7ffbe025fa2ba956525d0c51169283f3_276_0.png)


    **FIGURE 2.2**

    First Python GUI Display.


    of a tkinter widget GUI script file, that are illustrated in Example 2.36 and
    Figure 2.2, are as follows:


    1.  As specified in Section 2.5.3.2, tkinter programming is event driven, meaning
    you invoke tkinter and put it in a *wait state*, where it waits for an event like
    a mouse button click on the destroy window button, or a keyboard entry, and so
    forth. The widgets you create, and which remain on screen, generally only do so
    while tkinter is waiting for an event to happen, or until you destroy the window.
    You can also construct exit handling events in your script to close the widget
    and its window.

    2.  Lines 1 and 2 import all tkinter modules, and the ttk styled widgets, into
    the current session.

    3.  Line 3 creates the frame within which all widgets will exist, and assigns
    it a name **w**.

    4.  Line 4 gives a title, “Python GUI”, to the frame.

    5.  Line 5 instantiates the ttk *Label method*, assigns it a title “My first tkinter
    gui window”, and then uses the grid geometry manager to position the label in
    the frame **w**. There are three geometry managers available in tkinter: “pack”,
    “grid”, and “place”. The grid geometry manager, which treats every window or frame
    as a table of rows and columns, gives you the greatest control over where widgets
    and their components are placed.

    6.  Line 6 starts off the event-driven loop that tkinter enters, and constructs
    the *Label widget*, with your modifying options, on screen.


    ### In-Chapter Exercise


    44. *If necessary*, install tkinter on your Raspberry Pi system, and do Example
    2.36. Then modify it to execute any other simple widget display you find interesting
    and useful on your system. How can you control exactly where it’s placed on the
    screen display, when the widget is instanced?


    ## 2.5.3.5 Hooking tkinter Widgets to Applications in Python: Examples


    Provided with the widget method set of available core widgets in tkinter, and
    armed with your knowledge of Python programming up to this point in the chapter,
    you are ready to do the following examples. The next simple example allows a user
    to add two real numbers as text, that has been entered interactively, on lines
    inside the widget. Line numbers and comments are for reference only, and are *not*
    executed. We again describe and explain in simple terms what each line in the
    code does. And, as in Example 2.36 above, you can enter the code in Thonny''s
    Script Area, and use the Toolbar Run icon to launch it.


    ### Example 2.37


    ```

    1 import tkinter as tk

    2 from tkinter import ttk

    3 from functools import partial

    # This is the data generating module, which computes the sum.

    4 def add_it(label_result, n1, n2):

    5     num1 = (n1.get())

    6     num2 = (n2.get())

    7     result = float(num1)+float(num2)

    8     label_result.config(text="Sum = %f" % result)

    9     return

    # This "grids" the widget object where indicated, then returns it.

    10 def mkgrid(r, c, w):

    11     w.grid(row=r, column=c, sticky=''news'')

    12     return w

    13 root = tk.Tk()

    14 root.title(''Real Number Adder'')

    # The rest hooks the adder into the grid manager widgets.

    15 add1_lab = mkgrid(0, 0, ttk.Label(root, text="addend 1",anchor=''e''))

    16 add2_lab = mkgrid(1, 0, ttk.Label(root, text="addend 2",anchor=''e''))

    17 add1= mkgrid(0, 1, ttk.Entry(root))

    18 add2= mkgrid(1, 1, ttk.Entry(root))

    19 spacer = mkgrid(0, 2, ttk.Label(root, text=""))

    20 labelResult = ttk.Label(root)

    21 labelResult.grid(row=7, column=2)

    22 add_it = partial(add_it, labelResult, add1, add2)

    23 add_but = mkgrid(1, 2, ttk.Button(root, text="Add them",command=add_it))

    # Starts the root main event loop

    24 root.mainloop()

    ```'
  mdcn: '## 2.5.3.4 控件调用的通用形式与主要示例


    如第 2.5.3.2 节所示，构建 tkinter 控件 GUI 脚本文件包含几个部分，但其基本部分遵循以下大纲：


    1.  生成数据。

    2.  使用一组通用的构造工具和 tkinter 控件方法集来构建你的控件。

    3.  在无限（但不确定中断）的事件循环上下文中，将第一部分的数据“挂钩”到第二部分的控件构造器上。


    在本节中，我们将展示控件实例化的通用形式。然后，我们将展示 tkinter GUI 脚本的概要，并给出一个主要示例。


    tkinter 控件可以被构建以显示并连接到你的 Python3 应用程序代码，可以使用纯面向对象编程（OOP）方式，也可以使用过程式/命令式编程方法构建。


    如第 2.5.3.2 节所述，我们选择后者，因为它对初学者来说更容易。当你完成我们在此处展示的所有示例后，你应该能够看到 OOP 是 tkinter GUI
    编程的一个必要但非强制的部分。


    使用 tkinter 控件的通用形式如下：


    ```

    >>> widget = Widget.method (master, option=value, option=value,...)

    ```


    其中：


    **widget** 是在你的 Python3 脚本中分配给正在创建和使用的特定实例的名称


    **Widget** 是 tkinter 模块中控件类的主实例


    导入 tkinter 模块后，你需要做的第一件事是创建一个对象，即一个外围框架或窗口，用于显示你的信息和/或数据。这可以通过使用以下通用的 Python 代码行创建一个
    TK 对象来完成：


    ```

    window_object_name = tkinter.Tk()

    ```


    然后，你创建为适合你的目的而选择的控件，并将它们添加到框架的控件层次结构中。

    例如，要创建一个按钮控件实例，你可以调用 tk 或 ttk Button 方法。你需要将 window_object_name 作为第一个参数指定，如下所示：


    ```

    cmd_button = tk.Button(window_object_name, text="Some text".)

    ```


    或


    ```

