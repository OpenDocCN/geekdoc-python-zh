    # 1.12.2 Script Files for Backup and Recovery


    User-written script files can be deployed by a Raspberry Pi OS administrator to
    quickly and efficiently do backup and archiving. Whether they are coded in Python
    (or some other scripting language), or in a shell programming language that embeds
    any of the above command line facilities that we''ve shown, they can be used to
    expedite, facilitate, and automate the backup, recovery, and archiving of files,
    directories, or entire file systems.


    Additionally, there are several on-line sources for commercially available backup
    and archiving script files available, but there''s no need for us to justify the
    utility for planning, coding, or maintaining your own script file code base, versus
    using an on-line, ready-made program.


    Following is an example of a Bash shell script files, using a legacy application
    of **tar**.


    Example 1.9 Simple Bash Shell Example for Automating **tar** Backups

    Objective: The following Bash shell script will backup a directory, /home/bob/bashtest,
    to another directory previously created named simple_backup, in a compressed format.

    Procedures: Do the following steps, in the order presented, to complete the requirements
    of this example.


    +   1. Create a sub-directory of your home directory named **bashtest**.

    2. Create another sub-directory of your home directory named **simple_backup**.

    3. Copy some files into the directory **bashtest**.

    4. Use an editor of your choice, such as nano, to create the following file in
    your home directory, and name that file **backup.bash**. Be sure to substitute
    your username for bob in the body of the script file!'
