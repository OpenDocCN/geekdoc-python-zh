    # 1.10.2.4 Configuring CUPS as a Persistent Service Using systemd


    You can use the **systemctl** command to enable or disable the CUPS services on
    your Raspberry Pi OS server, whether that is local or remote.

    Using the **enable** option on the **systemctl** command sets a service to always
    start at boot (be persistent). The following shows exactly how to accomplish this:


    ```

    $ sudo systemctl enable cups.service

    ```


    # 1.10.2.5 Disabling a Service with systemd


    You can use the disable option of the **systemctl** command to keep a service
    from starting at boot. However, it does not immediately stop the service. You
    need to use the **stop** command shown above to achieve stopping the service.
    The following command example shows how to disable a currently enabled service:


    ```

    $ sudo systemctl disable cups.service

    ```


    # 1.11 File System Backup and Recovery


    The general necessity of backing up user and system files on a single-user Raspberry
    Pi system, as a part of an ordinary user’s routine operations, should be obvious,
    even to the beginner. Also, for complex, multi-machine, multi-user systems, it’s
    an absolutely necessary procedure for anyone responsible for the administration
    of those class of systems.

    According to Linux system administration professionals, there is an easy-to-remember
    and important set of considerations you must make when backing up the system,
    as the system administrator. This set of considerations can be posed in simple
    question form as:

    How, What, Why, When, Where, and Who?

    Some of the answers to these simple questions can be dovetailed together, and
    we provide a selected list of example answers as follows:'
