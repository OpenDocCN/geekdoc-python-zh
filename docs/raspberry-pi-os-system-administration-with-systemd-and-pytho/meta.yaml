    # 2.5.4 Multi-Threaded Concurrency with Python


    The first question you must ask yourself about how and why the Raspberry Pi OS
    functions the way it does is: Given the limited resources, and very prodigious
    nature of modern computer hardware, how does an operating system maximize performance
    and efficiency for all users of the system? And furthermore, how can user programs,
    such as Python3 scripts, reflect this technique?'
  merge: -1
  pgno: 280
- img_proc: true
  md: 'The answer for the Raspberry Pi OS is:

    First, by separating the hardware, that is, the SoC CPU and its cores, main memory,
    and peripheral memory, into multiple virtual machinery: in short, via *virtualization*.

    Then, by executing instructions *concurrently* on this virtualized machinery—this
    means not in any particular sequence, and perhaps even all at once.

    Finally, by making sure that the data generated and stored in the file system
    is *persistent* over time.


    Python3, as a Raspberry Pi software tool that creates user programs and scripts,
    can achieve concurrency with a mechanism called *threads*, and the concurrent
    execution of instructions by threads. This is very similar to UNIX and Linux system
    programming with threads.


    Similar to the Linux system programming concurrency facility, Python3 threads
    give you the ability to run several programs concurrently, in a single process.
    When you create one or more threads in your Python3 program, they are executed
    concurrently, independently of each other, and they can share information among
    them because they are using the same resources of a single process. These features
    make Python3 threads useful in creating Python3 applications for such things as
    network programming, and the creation of GUI programs.


    Python3 supports threads on the Raspberry Pi OS, and any other systems that use
    the POSIX threads library (pthreads).

    To quote from from the Python documentation:


    > The Python interpreter is not fully thread-safe. In order to support multi-threaded
    Python programs, there''s a global lock, called the global interpreter lock or
    GIL, that must be held by the current thread before it can safely access Python
    objects. Without the lock, even the simplest operations could cause problems in
    a multi-threaded program: for example, when two threads simultaneously increment
    the reference count of the same object, the reference count could end up being
    incremented only once instead of twice.

    Therefore, the rule exists that only the thread that has acquired the GIL may
    operate on Python objects or call Python/C API functions. In order to emulate
    concurrency of execution, the interpreter regularly tries to switch threads. The
    lock is also released around potentially blocking I/O operations like reading
    or writing a file, so that other Python threads can run in the meantime.


    The takeaway from the above documentation, in terms of Python3 performance, is
    that Python3 threads *cannot* ordinarily take advantage of multiprocessor or multicore
    processor architectures, even the ARM architecture used in the Raspberry Pi''s
    CPU. Thread switching can only occur between the execution of individual bytecodes
    in the Python3 interpreter. The frequency'
  merge: -1
  pgno: 281
- img_proc: true
  md: 'with which the interpreter checks for thread switching is set by the **sys.setcheckinterval()**
    function. By default, the interpreter checks for thread switching after a limited,
    but prescribed, number of bytecode instructions.


    One of the many ways around this impasse is to use various Python3 extension modules.
    The coverage of these is beyond the scope of what we can illustrate here, and
    what is necessary for a beginner to have at her command. But being somewhat familiar
    with Python3 threads is useful even for the beginner.


