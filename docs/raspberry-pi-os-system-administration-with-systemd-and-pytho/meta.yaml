    +   6. Click the down-facing arrow shown in the menu bar in the upper right corner
    of the Gparted screen. Scroll in that bar until you reach the medium you just
    added to the system. If the disk drive you just added doesn''t appear in the Gparted
    listing, you can''t easily use that disk drive. If it does appear, continue to
    the next step. On our Raspberry Pi system, the new medium appeared as /dev/sdb.

    7. Pick that new medium in the menu bar. It is shown in the main Gparted pane.
    Click on that disk in the main Gparted pane. You can now partition and format
    that new disk. In our example it is shown as /dev/sdb, a new disk we inserted
    at step 2. This is shown in Figure 1.5. Notice in that figure that the disk contains
