    \n第一种策略涉及提供额外的物理介质，或现有介质上的额外分区，以容纳用户数据文件或你的 Raspberry Pi OS 文件系统的其他组件。\n\n第二种策略涉及在这些额外分区或介质上设计和实施文件和目录访问权限，以便通过各种形式的进程凭证实现进程身份验证。\n\
