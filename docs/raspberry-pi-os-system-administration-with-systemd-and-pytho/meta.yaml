    )\n```\n\n### TABLE 2.2\nPython Order of Evaluations\n\n| Operator | Description\
    \ |\n| :--- | :--- |\n| () | Parentheses (grouping) |\n| f(args...) | Function\
    \ call |\n| x[index:index] | Slicing |\n| x[index] | Subscription |\n| x.attribute\
    \ | Attribute reference |\n| ** | Exponentiation |\n| ~x | Bitwise not |\n| +x,\
    \ -x | Positive, negative |\n| *, /, % | Multiplication, division, remainder |\n\
    | +, - | Addition, subtraction |\n| <<, >> | Bitwise shifts |\n| & | Bitwise AND\
