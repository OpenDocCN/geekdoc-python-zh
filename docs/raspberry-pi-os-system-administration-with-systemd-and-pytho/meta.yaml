    \ whether the user can gain access to the system itself, but also determines what\
    \ privileges the user has. For example, superuser privilege. Also, the ID is used\
    \ in Discretionary Access Control (DAC), as shown in Section 1.15.2. The password\
    \ file and a hash/salt scheme using a SHA256 hashing algorithm for encrypting\
    \ the password, work together to authenticate a user’s ID. The password file on\
    \ the system, in /etc/passwd, holds user information and works in conjunction\
