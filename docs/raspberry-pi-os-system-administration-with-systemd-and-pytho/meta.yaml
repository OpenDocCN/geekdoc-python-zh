    To format strings in an expression, you can use the % binary operator to format
    values as strings according to a specific format definition. On a line of code,
    on the left of the % operator, put in a format string that has one or more code
    types. On the right of the % sign, put in objects you want to substitute in for
    the types.


    The operator (s % k) produces a formatted string, given a format string s and
    a collection of objects in a tuple or mapping object (dictionary). The string
    s may be a standard or Unicode string. The format string contains two types of
    objects: ordinary characters (which are left unmodified) and conversion specifiers,
    each of which is replaced with a formatted string representing an element of the
    associated tuple or mapping.


    If k is a tuple, the number of conversion specifiers must exactly match the number
    of objects in k. If k is a mapping, each conversion specifier must be associated
    with a valid key name in the mapping, using parentheses. Each conversion specifier
    starts with the % character and ends with one of the conversion characters shown
    in Table 2.4.


    The following example allows you to perform some basic operations on strings,
    such as *concatenating* them (adding their characters together), embedding escape
    sequences in them (to include special characters), finding their lengths (an integer
    representing their length), or *slicing* them (extracting smaller sub-string parts
    of them).


    # TABLE 2.4

    String Formatting Conversions


    | Character | Output Format |

    | :--- | :--- |

    | d, I | Decimal integer or long integer |

    | u | Unsigned integer or long integer |

    | o | Octal integer or long integer |

    | x | Hexadecimal integer or long integer |

    | X | Hexadecimal integer (uppercase letters) |

    | f | Floating point as [-]m.dddddd |

    | e | Floating point as [-]m.dddddde±xx |

    | E | Floating point as [-]m.ddddddE±xx |

    | g, G | Use %e or %E for exponents less than -4 or greater than the precision
    |

    | s | String or any object. The formatting code uses str() to generate strings
    |

