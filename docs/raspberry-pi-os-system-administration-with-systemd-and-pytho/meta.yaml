    # 2.5.2 A Basic Web Server and User File Maintenance


    A very useful, and practical example of using built-in Python3 capabilities on
    your Raspberry Pi system is the **http.server** module, that comes standard with
    Python3. The value of using this module, at least for an ordinary user of a Raspberry
    Pi system, is that you can quickly and easily implement a system service that
    can be programmed, configured, and controlled by that ordinary user.


    Another very useful, and important aspect of an ordinary user''s interaction with
    a Raspberry Pi system, that we cover in Section 2.3.2.2, is how effectively you
    can maintain the files on your system. The Python3 standard library, and many
    user-written libraries and modules, can help you do this efficiently on the Raspberry
    Pi OS. You can utilize the extensive syntax, and the multi-paradigm programming
    capabilities of Python3, to go far beyond the capabilities of doing operating
    system and file maintenance that are available in any of the shell script-creation
    programs.


    User file maintenance consists of creating, saving, organizing, and deleting files
    on your system, in your own account, or globally for the entire system and its
    users.


