  md: 'components in a Python3 script, which is the style of Python3 GUI programming
    shown in all of our examples. It could also be input interactively while the Python3
    GUI script is running. It could use preexisting data generated beforehand by some
    other application, or it could even use a C program that generates data within
    the Python3 environment, while the Python3 script is executing!


    +   2. Widgets are created, and are organized within some encompassing window
    frame, and then displayed on screen to the user. These widget objects are instances
    of master widget classes in tkinter, and contain GUI functions that are selected
    for, and specify particular kinds of responses to user input, and possible data-generating
    application events.


    +   3. There is a “hooking”, or tying together, of the instances from Step 2 that
    utilize “callback” GUI functions to access the data you want to display, or otherwise
    modify. For example, you can use any “callable” Python3 object as a callback.
    These might be ordinary Python3 functions, bound methods, lambda expressions,
    and any other callable object.


    > This is the most critical, and therefore the most useful aspect, of Python GUI
    programming.


    +   4. Steps 2 and 3 exist inside of an infinite event-driven loop, that processes
    user events. When a user event, such as a mouse button press, occurs, the event-driven
    loop invokes the function associated with a specific event.


    +   5. Data is modified or produced with no apparent visible change on screen,
    or with graphical changes occurring on screen. This is the “request” step.


    +   6. The loop continues to wait for events, and process them, until a possible
    termination event happens.


    As we present in Section 2.5.3.3 next, tkinter widgets can be chosen and constructed
    to display and be hooked up to data using OOP, where the widgets are object instances
    of master classes of tkinter widgets. But the style and execution of the Python3
    GUI script file itself can take on a procedural/imperative programming model approach.
    We choose, as much as possible, to show the procedural/imperative approach because
    we feel it’s easier for beginners to understand, and figure out; particularly
    people who are *not* familiar with the OOP model of programming. Python3 does
    *not* have core modules that implement GUI, event-driven-programming. GUI programming
    is implemented using imported modules, such as those from the tkinter toolkit.'
