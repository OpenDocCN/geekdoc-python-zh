    # 1.9.1 Installing ZFS on an Ubuntu System Running on Raspberry Pi Hardware


    Installing ZFS on Ubuntu is a simple, straight forward operation. Use the following
    command-


    ```

    $ sudo apt install zfsutils-linux -y

    Output truncated…

    ```


    After a few minutes, the software is installed. Then, use the following commands
    to verify that ZFS has been installed correctly:


    ```

    $ zfs --version

    zfs-2.1.9-2ubuntu1

    zfs-kmod-2.1.9-2ubuntu1

    $ zpool list

    no pools available

    $

    ```


    # 1.9.2 The Syntax of the zpool and zfs Commands


    Following are the abbreviated syntax of the **zpool** and **zfs** commands, taken
    from the man pages on our system:


    ```

    ********************************************************************************

    zpool

    Syntax:

    zpool subcommand [options] [option arguments] [command arguments]


    Purpose: To create and manage storage pools of virtual devices, such as disk drives


    Commonly used options/features:

    zpool create name vdev          Creates a new pool with name on the specified
    vdev

    zpool create -o copies=2 name   Creates a new pool name with the property copies
    set to 2

    zpool destroy name              Destroys, or removes, a pool name

    zpool list name                 Lists storage space and health of pool name

    zpool scrub name                Verifies that the checksums on pool name are correct

    zpool status name               Displays the status of pool name

    ********************************************************************************

    ```'
  - '[PAGE 107]


    zfs

    Syntax:

    zfs subcommand [options] [option arguments] [command arguments]


    Purpose: To create and manage datasets or file systems mapped to devices such
    as disk drives


    Commonly used options/features:


    zfs create name Creates a dataset with name

    zfs create -o copies=2 name Creates a dataset name with the property copies set
    to 2

    zfs destroy name Destroys, or removes, a dataset name

    zfs list Lists all datasets

    zfs rollback name Returns dataset name to a previous snapshot state


    # 1.9.3 ZFS Terminology


    The following describes the basic terminology used throughout this section, and
    as it applies to ZFS practice in general as well:


    Boot environment: A boot environment is a bootable environment consisting of a
    ZFS root file system and, optionally, other file systems mounted underneath it.
    Exactly one boot environment can be active at a time.


    > ***Warning***: This warning applies at the time of the writing of this book,
    and it is important to realize that if you want to create and use ZFS on any system
    other than for the practice Example 1.7 below, you must have an additional storage
    device, or devices, attached to your hardware. This could be additional externally
    mounted SSDs, M.2 NVM.e devices hard drives, or USB2 or USB3 thumb drives. We
    have found that if you attempt to create zpools on your system or boot disk, this
    will render that disk unbootable!


    Checksum: A 256-bit hash of the data in a file system block. The checksum capability
    can range from the simple and fast fletcher4 (the default) to cryptographically
    strong hashes such as SHA256.


    Clone: A file system whose initial contents are identical to the contents of a
    ZFS snapshot.


    Dataset: A generic name for the following ZFS components: clones, file systems,
    snapshots, and volumes. Each dataset is identified by a unique name in the ZFS
    name space. Datasets are identified using the following format:'
  - '[PAGE 108]


    pool/path[@snapshot]


    where:

    **pool** Identifies the name of the storage pool that contains the dataset

    **path** A slash-delimited pathname for the dataset component

    **snapshot** An optional component that identifies a snapshot of a dataset


    *Deduplication:* Data deduplication is a method of reducing storage capacity needs
    by eliminating redundant data. Only one unique instance of the data is actually
    retained on storage media. Redundant data is replaced with a pointer to the unique
    data copy.


    *file system:* A ZFS dataset of type file system that is mounted within the standard
    system namespace and behaves like other file systems.


    *Mirror:* A vdev that stores identical copies of data on two or more disks, in
    a variety of ways defined by Redundant Array of Independent Disks (RAID) specifications.
    If any disk in a mirror fails, any other disk in that mirror can provide the same
    data, according to those RAID specifications.


    *Pool:* A logical group of devices describing the layout and physical characteristics
    of the available storage. Disk space for datasets is allocated from a pool.


    *RAIDZ:* A virtual device that stores data and parity on multiple disks, using
    the RAID specifications.


    *Resilvering:* The process of copying data from one device to another device is
    known as resilvering. For example, if a mirror device is replaced or taken offline,
    the data from an up-to-date mirror device is copied to the newly restored mirror
    device. This process is referred to as mirror resynchronization in traditional
    volume management.


    *Slice:* A disk partition created with partitioning software.


    *Snapshot:* A read-only copy of a file system or volume at a given point in time.


    *Vdev (virtual device):* A whole disk, a disk partition, a file, or a collection
    of the previous, usually all of the same type. There is no performance penalty
    for using disk partitions rather than entire disks. The write cache is disabled
    for partitions, thus incurring a performance penalty. Using files as vdevs is
    discouraged, except for experimenting and testing purposes as we do in this chapter
    for beginners! A collection of vdevs is a mirror.


    *Volume:* A dataset that represents a block device. For example, you can create
    a ZFS volume as a swap device.'
  - '[PAGE 109]


    ![](img/7ffbe025fa2ba956525d0c51169283f3_109_0.png)


    FIGURE 1.8

    ZFS Components.


    # 1.9.4 How ZFS Works


    The following simplified statement summarizes the operation of ZFS:


    **Create zpool mapped to vdev > Create ZFS file system(s) on zpool > Add files**


    So, simply stated, you create a named zpool first, which at the time it is created
    is mapped or associated with a vdev, such as an external, USB3 medium. Then you
    create one or more file systems in that zpool; you add files to those file systems.
    Finally, you manage the files, file systems, pools, and vdevs using the appropriate
    ZFS commands.


    Working with ZFS is a matter of efficiently and easily managing zpools that have
    vdevs “mapped” to them, and then managing file systems, and their files, in those
    zpools.


    Figure 1.8 shows these relationships between files, datasets (file systems), pools,
    and disks. **Pool 1** has two disks mapped to it, and a dataset with a number
    of files in it. **Pool 2** has a single disk mapped to it, and has a dataset in
    it. This layering of files and datasets, pools, and disks is the basic structure
    of ZFS.


    # 1.9.5 Important ZFS Concepts


    Some very important points have to be made here:'
