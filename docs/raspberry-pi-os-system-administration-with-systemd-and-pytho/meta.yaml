- md: "## ZFS 示例：使用文件模拟磁盘\n\n为了在现有文件系统上练习使用 ZFS，而不是在实际物理介质上部署 ZFS，我们将创建并操作文件来使用重要的\
    \ ZFS 命令。\n\n此外，如果你没有连接 USB3 存储设备，也可以通过此示例来了解 ZFS 是什么。\n\n如果你想在本初步介绍示例中使用已挂载和分区的真实磁盘，请记下其设备名称的完整路径（例如\
    \ /dev/sdb1）。你将销毁这些磁盘上的所有分区信息和数据，因此请确保它们不是必需的！\n\n> ***注意*** 如果你在过程中犯了任何错误，你总是可以通过执行示例末尾显示的清理步骤来重新开始。\n\
    \n**前提条件：** 在你的 Raspberry Pi 硬件上运行的 Ubuntu 系统中安装 ZFS，如第 1.9.1 节所示。\n\n**操作步骤：**\
    \ 按照所示顺序执行以下步骤以完成此示例。\n\n1.  成为 root 用户，然后按如下方式创建四个 128 MB 文件（文件大小至少为 64 MB）：\n\
    \n```\n$ sudo -i\n\nroot@bob-desktop:~#\nroot@bob-desktop:~# truncate --size 128m\
    \ /home/bob/disk1\nroot@bob-desktop:~# truncate --size 128m /home/bob/disk2\n\
    root@bob-desktop:~# truncate --size 128m /home/bob/disk3\nroot@bob-desktop:~#\
    \ truncate --size 128m /home/bob/disk4\n```\n\n使用以下命令检查 /home/bob 目录：\n\n```\n\
    root@bob-desktop:~# ls -lh /home/bob\ntotal 48K\n...\n-rw-r--r-- 1 root root 128M\
    \ May 22 18:47 disk1\n-rw-r--r-- 1 root root 128M May 22 18:47 disk2\n-rw-r--r--\
    \ 1 root root 128M May 22 18:47 disk3\n-rw-r--r-- 1 root root 128M May 22 18:48\
    \ disk4\nOutput truncated...\n```\n\n在此示例中，我们最初创建并使用文件来*模拟*现有文件系统上的磁盘，并将它们命名为\
    \ **disk1**、**disk2**、**disk3** 和 **disk4** 以增强这种错觉。此外，除非另有说明，示例代码中假定当前工作目录为 **/home/bob**。\n\
    \n2.  在创建新池之前，你应该检查是否存在任何现有池，以避免与我们在此处创建的示例池混淆。你可以使用 **zpool list** 命令检查存在哪些池：\n\
    \n```\nroot@bob-desktop:~# **zpool list**\nno pools available\nroot@bob-desktop:~#\n\
    ```\n\n3.  池使用 **zpool create** 创建。我们可以使用文件创建一个单磁盘池，如下所示（你必须使用文件的绝对路径），并检查现在存在的\
    \ zpool：\n\n```\nroot@bob-desktop:~# **zpool create data /home/bob/disk1**\nroot@bob-desktop:~#\
