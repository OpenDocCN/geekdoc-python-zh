  - '[PAGE 37]


    # 0.3.1 Examining System Setups


    The **whereis** command allows you to search along certain prescribed paths to
    locate utility programs and commands, such as shell programs. The general syntax
    of the **whereis** command is as follows:


    **whereis [options] filename**

    **Purpose:** Locate the binary, source, and man page files for a command

    **Output:** The supplied names are first stripped of leading pathname components
    and extensions, then pathnames are displayed on screen


    **Commonly used options/features:**

    **-b** Search only for binaries

    **-s** Search only for source code


    For example, if you type the command **whereis bash** on the command line, you
    will see a list of the paths to the Bash shell program files themselves, as follows:


    ```

    $ whereis bash

    bash: /bin/bash /etc/bash.bashrc /usr/share/man/man1/bash.1.gz

    ```


    Note that the paths to a “built-in”, or internal, command cannot be found with
    the **whereis** command.


    When you first log on, it is useful to be able to view a display of information
    about your **userid**, the computer or system you have logged on to, and the operating
    system on that computer. These tasks can be accomplished with the **whoami** command,
    which displays your **userid** on the screen. The general syntax of the **whoami**
    command is as follows:


    **whoami**

    **Purpose:** Displays the effective user id

    **Output:** Displays your effective user id as a name on standard


    The following shows how our system responded to this command when we typed it
    on the command line.


    ```

    $ whoami

    bob

    $

    ```'
- md: "To find out the IP address of the Raspberry Pi you are working on, you can\
    \ use the **ip** command. The general syntax of the **ip** command is as follows:\n\
    \n**ip [OPTIONS] OBJECT {COMMAND | help}**\n**Purpose:** Show/manipulate routing,\
    \ network devices, interfaces, and tunnels\n**Output:** Information about your\
    \ LAN\n\nTo find out the IP address of the computer you are working on, type the\
    \ following command in a terminal, or console window:\n\n```\n$ ip addr\n1: lo:\
    \ <LOOPBACK,UP,LOWER_UP> mtu 65536 qdisc noqueue state UNKNOWN group default qlen\
    \ 1000\n    link/loopback 00:00:00:00:00:00 brd 00:00:00:00:00:00\n    inet 127.0.0.1/8\
    \ scope host lo\n       valid_lft forever preferred_lft forever\n    inet6 ::1/128\
    \ scope host\n       valid_lft forever preferred_lft forever\n2: eth0: <BROADCAST,MULTICAST,UP,LOWER_UP>\
    \ mtu 1500 qdisc mq state UP group default qlen 1000\n    link/ether dc:a6:32:ee:c6:6b\
    \ brd ff:ff:ff:ff:ff:ff\n    inet 192.168.1.2/24 brd 192.168.1.255 scope global\
    \ dynamic noprefixroute eth0\n       valid_lft 65558sec preferred_lft 54758sec\n\
    \    inet6 fe80::78d9:c72e:75e2:82c/64 scope link\n       valid_lft forever preferred_lft\
    \ forever\n3: wlan0: <BROADCAST,MULTICAST> mtu 1500 qdisc noop state DOWN group\
    \ default qlen 1000\n    link/ether dc:a6:32:ee:c6:6c brd ff:ff:ff:ff:ff:ff\n\
    $\n```\n\nIn the above output, the IP address 192.168.1.2 is the address on the\
    \ LAN of this computer.\n\nThe following In-Chapter Exercises give you the chance\
    \ to use **whereis**, **whoami**, and two other important utility commands, **who**\
    \ and **hostname**, to obtain important information about your system.\n\n## In-Chapter\
    \ Exercises\n\n- 12. Use the **whereis** command to locate binary files for the\
    \ Korn shell, the Bourne shell, the Bourne Again shell, the C shell, and the Z\
    \ shell. Are any of these shell programs not available on your system?\n- 13.\
    \ Use the **whoami** command to find your username on the system that you're using.\
    \ Then use the **who** command to see how your username is listed, along with\
    \ other users of the same system. What is the on-screen format of each user’s\
    \ listing that you obtained with the **who** command? Try to identify the information\
    \ in each field on the same line as your username.\n- 14. Use the **hostname -I**\
    \ command to find out the IP address of host computer you are logged on to, on\
    \ your LAN. Compare this to the output of the **ip addr** command on that same\
    \ system.\n\n## 0.4 Printing Commands\n\nA very useful and common task performed\
    \ by every user of a computer system is the printing of text files at a printer.\
    \ This is accomplished using the configured printer(s) on the local, or a remote,\
    \ system. Printers are controlled and managed with the Common UNIX Printing System\
    \ (CUPS). We show this utility in detail in Chapter 1.\n\nThe common commands\
    \ that perform printing on a Raspberry Pi OS are **lpr** and **lp**. The general\
    \ syntax of the **lpr** command is as follows:\n\n```\nlpr [options] filename\n\
    Purpose: Send files to the printer\nOutput: Files sent to the printer queue as\
    \ print jobs\nCommonly used options/features:\n-P printer Send output to the named\
    \ printer\n-# copies Produce the number of copies indicated for each named file\n\
    ```\n\nThe following **lpr** command accomplishes the printing of the file named\
    \ **order.pdf** at the printer designated on our system as **spr**. Remember that\
    \ no space is necessary between the option (in this case **-P**) and the option\
    \ argument (in this case **spr**).\n\n```\n$ lpr -Pspr order.pdf\n$\n```\n\nThe\
    \ following **lpr** command accomplishes the printing of the file named **memo1**\
    \ at the default printer.\n\n```\n$ lpr memo1\n$\n```\n\nThe following multiple\
    \ command combines the **man** command and the **lpr** command, and ties them\
    \ together with the Raspberry Pi OS pipe (|) redirection character, to print the\
    \ man pages describing the **ls** command at the printer named **hp1200**.\n\n\
    ```\n$ man ls | lpr -Php1200\n$\n```\n\nThe following shows how to perform printing\
    \ tasks using the **lp** command. The general syntax of the **lp** command is\
    \ as follows:\n\n**lp [options][option arguments] file(s)**\n**Purpose:** Submit\
    \ files for printing on a designated system printer, or alter pending print jobs\n\
    **Output:** Printed files or altered print queue\n**Commonly used options/features:**\n\
    **-d destination** Print to the specified destination\n**-n copies** Sets the\
    \ number of copies to print\n\nIn the first command, the file to be printed is\
    \ named **file1**. In the second command, the files to be printed are named **sample**\
    \ and **phones**. Note that the **-d** option is used to specify which printer\
    \ to use. The option to specify the number of copies is **-n** for the **lp**\
    \ command.\n\n```\n$ lp -d spr file1\nrequest id is spr-983 (1 file(s))\n$ lp\
    \ -d spr -n 3 sample phones\nrequest id is spr-984 (2 file(s))\n$\n```\n\n## 0.5\
    \ Chapter Summary\n\nIn this introductory chapter, we covered essential Raspberry\
    \ Pi OS commands that allow a system administrator to do file maintenance, and\
    \ perform other useful operations. This is a mandatory set of essentials that\
    \ even an ordinary, non-administrative user would need to know to work efficiently\
    \ in a character, or text-based interface to the operating system. Text-based\
    \ commands are the predominant means that a system administrator uses to maintain\
    \ the integrity of the system. We gave examples and showed the basic format of\
    \ the following commands and primitives:\n\n## TABLE 0.2 Useful Commands for the\
    \ Beginner\n\n| Command | What It Does |\n| :--- | :--- |\n| **<Ctrl+D>** | Terminates\
    \ a process or command |\n| **alias** | Allows you to create pseudonyms for commands\
    \ |\n| **biff** | Notifies you of new e-mail |\n| **cal** | Displays a calendar\
    \ on screen |\n| **cat** | Allows joining of files |\n| **cd** | Allows you to\
    \ change the current working directory |\n| **cp** | Allows you to copy files\
    \ |\n| **exit** | Ends a shell that you have started |\n| **hostname** | Displays\
    \ the name of the host computer that you are logged on to |\n| **ip** | Displays\
    \ IP information of the current host |\n| **login** | Allows you to log on to\
    \ the computer with a valid username/password pair |\n| **lpr or lp** | Allows\
    \ printing of text files |\n| **ls** | Allows you to display names of files and\
    \ directories in the current working directory |\n| **man** | Allows you to view\
    \ a manual page for a command or topic |\n| **mesg** | Allows or disallows writing\
    \ messages to the screen |\n| **mkdir** | Allows you to create a new directory\
    \ |\n| **more** | Allows viewing of the contents of a file one screen at a time\
    \ |\n| **mv** | Allows you to move the path location of, or rename, files |\n\
    | **passwd** | Allows you to change your password on the computer |\n| **pg**\
    \ | Solaris command that displays one screen of a file at a time |\n| **pwd**\
    \ | Allows you to see the name of the current working directory |\n| **rm** |\
    \ Allows you to delete a file from the file structure |\n| **rmdir** | Allows\
    \ deletion of directories |\n| **talk** | Allows you to send real-time messages\
    \ to other users |\n| **telnet** | Allows you to log on to a computer on a network\
    \ or the Internet |\n| **unalias** | Allows you to undefine pseudonyms for commands\
    \ |\n| **uname** | Displays information about the operating system running the\
    \ computer |\n| **whatis** | Allows you to view a brief description of a command\
    \ |\n| **whereis** | Displays the path(s) to commands and utilities in certain\
    \ key Directories |\n| **who** | Allows you to find out login names of users currently\
    \ on the system |\n| **whoami** | Displays your username |\n| **write** | Allows\
    \ real-time messaging between users on the system |\n\ncat cd cp exit hostname\
    \ -l ip login lp lpr ls man mesg mkdir more mv passwd PATH pwd rm rmdir telnet\
    \ unalias uname whatis whereis who whoami\n\nTable 0.2 summarizes a basic set\
    \ of useful commands necessary for the beginner.\n\n# 1 Raspberry Pi OS System\
    \ Administration Fundamentals\n\n## 1.0 Objectives\n\n- 1. Do various kinds of\
    \ installation of a 64-bit Raspberry Pi OS, onto Raspberry Pi hardware, and do\
    \ a preliminary configuration of those systems and the OS.\n- 2. Illustrate booting\
    \ strategies, and how to gracefully bring the system down.\n- 3. Detail the basics\
    \ of using systemd to manage system services.\n- 4. Add additional users and groups\
    \ to the system, and show how to design and maintain user accounts.\n- 5. Add\
    \ persistent media to the system, in particular externally mounted, USB3 types.\
    \ We also established a framework for connecting and maintaining the file system\
    \ on that media, which classifies the file system as either existing on a physical\
    \ medium (physically connected to the computer), a virtual medium (NFSv4, iSCSI),\
    \ or as a specialized pseudo-file system that was not on a medium at all (cgroups,\
    \ proc).\n- 6. Provide strategies using traditional and generic commands, to backup\
    \ and archive the system files and user files.\n- 7. Update and maintain the operating\
    \ system, and add/upgrade/remove user application package repository software\
    \ to both increase functionality and upgrade existing packages.\n- 8. Monitor\
    \ the performance of the system, and tune it for optimal performance characteristics.\n\
    - 9. Provide strategies for system security to harden the individual Internet-connected\
    \ Raspberry Pi system.\n- 10. Provide network connectivity strategies, both on\
    \ a LAN and the Internet.\n- 11. Give an overview of system virtualization, using\
    \ LXD/LXC."
  mdcn: "要找出你正在使用的树莓派的IP地址，可以使用 **ip** 命令。**ip** 命令的通用语法如下：\n\n**ip [选项] 对象 {命令 |\
    \ 帮助}**\n**用途：** 显示/操作路由、网络设备、接口和隧道\n**输出：** 关于你局域网的信息\n\n要找出你正在使用的计算机的IP地址，请在终端或控制台窗口中输入以下命令：\n\
    \n```\n$ ip addr\n1: lo: <LOOPBACK,UP,LOWER_UP> mtu 65536 qdisc noqueue state\
    \ UNKNOWN group default qlen 1000\n    link/loopback 00:00:00:00:00:00 brd 00:00:00:00:00:00\n\
    \    inet 127.0.0.1/8 scope host lo\n       valid_lft forever preferred_lft forever\n\
    \    inet6 ::1/128 scope host\n       valid_lft forever preferred_lft forever\n\
    2: eth0: <BROADCAST,MULTICAST,UP,LOWER_UP> mtu 1500 qdisc mq state UP group default\
    \ qlen 1000\n    link/ether dc:a6:32:ee:c6:6b brd ff:ff:ff:ff:ff:ff\n    inet\
    \ 192.168.1.2/24 brd 192.168.1.255 scope global dynamic noprefixroute eth0\n \
    \      valid_lft 65558sec preferred_lft 54758sec\n    inet6 fe80::78d9:c72e:75e2:82c/64\
    \ scope link\n       valid_lft forever preferred_lft forever\n3: wlan0: <BROADCAST,MULTICAST>\
    \ mtu 1500 qdisc noop state DOWN group default qlen 1000\n    link/ether dc:a6:32:ee:c6:6c\
    \ brd ff:ff:ff:ff:ff:ff\n$\n```\n\n在上面的输出中，IP地址 192.168.1.2 是这台计算机在局域网上的地址。\n\n\
    以下章节内练习让你有机会使用 **whereis**、**whoami** 以及另外两个重要的实用命令 **who** 和 **hostname**，来获取关于你系统的重要信息。\n\
    \n## 章节内练习\n\n- 12. 使用 **whereis** 命令定位 Korn shell、Bourne shell、Bourne Again shell、C\
    \ shell 和 Z shell 的二进制文件。你的系统上是否有这些 shell 程序不可用？\n- 13. 使用 **whoami** 命令找出你在当前系统上的用户名。然后使用\
    \ **who** 命令查看你的用户名是如何列出的，以及同一系统上的其他用户。你使用 **who** 命令获得的每个用户的屏幕显示格式是什么？尝试识别与你用户名同一行上的每个字段中的信息。\n\
    - 14. 使用 **hostname -I** 命令找出你登录的主机计算机在局域网上的IP地址。将其与同一系统上 **ip addr** 命令的输出进行比较。\n\
    \n## 0.4 打印命令\n\n每个计算机系统用户执行的一项非常有用且常见的任务是在打印机上打印文本文件。这通过使用本地或远程系统上配置的打印机来完成。打印机通过通用UNIX打印系统进行控制和管理。我们将在第1章中详细介绍此实用程序。\n\
    \n在树莓派操作系统上执行打印的常用命令是 **lpr** 和 **lp**。**lpr** 命令的通用语法如下：\n\n```\nlpr [选项] 文件名\n\
    用途：将文件发送到打印机\n输出：作为打印作业发送到打印机队列的文件\n常用选项/功能：\n-P 打印机 将输出发送到指定的打印机\n-# 份数 为每个指定文件生成指定的份数\n\
    ```\n\n以下 **lpr** 命令在我们系统上指定为 **spr** 的打印机上打印名为 **order.pdf** 的文件。请记住，选项（本例中为\
    \ **-P**）和选项参数（本例中为 **spr**）之间不需要空格。\n\n```\n$ lpr -Pspr order.pdf\n$\n```\n\n\
    以下 **lpr** 命令在默认打印机上打印名为 **memo1** 的文件。\n\n```\n$ lpr memo1\n$\n```\n\n以下多命令组合了\
    \ **man** 命令和 **lpr** 命令，并使用树莓派操作系统管道（|）重定向字符将它们连接起来，以在名为 **hp1200** 的打印机上打印描述\
    \ **ls** 命令的手册页。\n\n```\n$ man ls | lpr -Php1200\n$\n```\n\n以下展示了如何使用 **lp** 命令执行打印任务。**lp**\
    \ 命令的通用语法如下：\n\n**lp [选项][选项参数] 文件**\n**用途：** 提交文件以在指定的系统打印机上打印，或更改待处理的打印作业\n\
    **输出：** 已打印的文件或已更改的打印队列\n**常用选项/功能：**\n**-d 目标** 打印到指定的目标\n**-n 份数** 设置要打印的份数\n\
    \n在第一个命令中，要打印的文件名为 **file1**。在第二个命令中，要打印的文件名为 **sample** 和 **phones**。请注意，**-d**\
    \ 选项用于指定使用哪台打印机。对于 **lp** 命令，指定份数的选项是 **-n**。\n\n```\n$ lp -d spr file1\nrequest\
    \ id is spr-983 (1 file(s))\n$ lp -d spr -n 3 sample phones\nrequest id is spr-984\
    \ (2 file(s))\n$\n```\n\n## 0.5 章节总结\n\n在这个介绍性章节中，我们涵盖了基本的树莓派操作系统命令，这些命令允许系统管理员进行文件维护并执行其他有用的操作。这是一套即使是普通非管理员用户也需要了解的必备基础知识，以便在基于字符或文本的操作系统界面中高效工作。基于文本的命令是系统管理员维护系统完整性的主要手段。我们给出了以下命令和原语的示例并展示了其基本格式：\n\
    \n## 表 0.2 初学者实用命令\n\n| 命令 | 功能 |\n| :--- | :--- |\n| **<Ctrl+D>** | 终止进程或命令 |\n\
    | **alias** | 允许你为命令创建别名 |\n| **biff** | 通知你有新电子邮件 |\n| **cal** | 在屏幕上显示日历 |\n\
    | **cat** | 允许连接文件 |\n| **cd** | 允许你更改当前工作目录 |\n| **cp** | 允许你复制文件 |\n| **exit**\
    \ | 结束你启动的 shell |\n| **hostname** | 显示你登录的主机计算机的名称 |\n| **ip** | 显示当前主机的IP信息\
    \ |\n| **login** | 允许你使用有效的用户名/密码对登录计算机 |\n| **lpr 或 lp** | 允许打印文本文件 |\n| **ls**\
    \ | 允许你显示当前工作目录中的文件和目录名称 |\n| **man** | 允许你查看命令或主题的手册页 |\n| **mesg** | 允许或禁止向屏幕写入消息\
    \ |\n| **mkdir** | 允许你创建新目录 |\n| **more** | 允许一次查看一屏文件内容 |\n| **mv** | 允许你移动文件的路径位置或重命名文件\
    \ |\n| **passwd** | 允许你更改计算机上的密码 |\n| **pg** | Solaris 命令，一次显示文件的一屏 |\n| **pwd**\
    \ | 允许你查看当前工作目录的名称 |\n| **rm** | 允许你从文件结构中删除文件 |\n| **rmdir** | 允许删除目录 |\n| **talk**\
    \ | 允许你向其他用户发送实时消息 |\n| **telnet** | 允许你登录到网络或互联网上的计算机 |\n| **unalias** | 允许你取消命令的别名定义\
    \ |\n| **uname** | 显示运行计算机的操作系统信息 |\n| **whatis** | 允许你查看命令的简要描述 |\n| **whereis**\
    \ | 显示命令和实用程序在某些关键目录中的路径 |\n| **who** | 允许你找出当前系统上用户的登录名 |\n| **whoami** | 显示你的用户名\
    \ |\n| **write** | 允许系统上的用户之间进行实时消息传递 |\n\ncat cd cp exit hostname -l ip login\
    \ lp lpr ls man mesg mkdir more mv passwd PATH pwd rm rmdir telnet unalias uname\
    \ whatis whereis who whoami\n\n表 0.2 总结了初学者所需的一套基本实用命令。\n\n# 1 树莓派操作系统系统管理基础\n\
    \n## 1.0 目标\n\n- 1. 在树莓派硬件上执行64位树莓派操作系统的各种安装，并对这些系统和操作系统进行初步配置。\n- 2. 说明启动策略，以及如何优雅地关闭系统。\n\
    - 3. 详细说明使用 systemd 管理系统服务的基础知识。\n- 4. 向系统添加额外的用户和组，并展示如何设计和维护用户账户。\n- 5. 向系统添加持久性媒体，特别是外部挂载的\
    \ USB3 类型。我们还建立了一个连接和维护该媒体上文件系统的框架，该框架将文件系统分类为存在于物理介质上（物理连接到计算机）、虚拟介质（NFSv4、iSCSI）或根本不在介质上的专用伪文件系统（cgroups、proc）。\n\
    - 6. 提供使用传统和通用命令备份和归档系统文件和用户文件的策略。\n- 7. 更新和维护操作系统，并添加/升级/删除用户应用程序包仓库软件，以增加功能并升级现有软件包。\n\
    - 8. 监控系统性能，并调整其以获得最佳性能特性。\n- 9. 提供系统安全策略，以加固单个连接到互联网的树莓派系统。\n- 10. 提供网络连接策略，包括局域网和互联网。\n\
    - 11. 概述使用 LXD/LXC 的系统虚拟化。"
