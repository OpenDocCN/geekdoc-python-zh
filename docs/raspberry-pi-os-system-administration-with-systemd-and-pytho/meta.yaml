    The basic **_thread** module does *not* necessarily require that you program with
    OOP!


    It''s very easy to use if you are accustomed to, and desire to, exclusively structure
    your programs with the procedural/imperative programming model. The procedural/imperative
    model is used by programming languages such as C.


    The **_thread** module provides low-level primitives for working with multiple
    threads of control (also called *lightweight processes* or *tasks*) that share
    their global data space. For synchronization, simple locks (also called *mutexes*)
    are provided within the classes and methods of this module.


