  - "[PAGE 133]\n\n# 1.12 Other Raspberry Pi OS Archiving and Backup Facilities\n\n\
    In addition to the traditional **tar** facility briefly shown in the previous\
    \ section, there are several other facilities and methods a system administrator\
    \ can use to archive and backup individual user accounts, files, file systems,\
    \ and the entire system itself. As stated above, to get a more complete listing\
    \ of the capabilities and options available for the command line facilities shown\
    \ in this, and all other sections, consult the man pages on your system for these\
    \ commands. We briefly describe and give simple examples of some of the more modern\
    \ and useful of these facilities and methods below.\n\n# 1.12.1 rsync\n\nThe **rsync**\
    \ command is a very modern and space-efficient way to backup files and directories,\
    \ particularly from one machine to another, using **ssh** across a network. Its\
    \ operation can also be automated, via the use of systemd scheduling.\n\nIts most\
    \ important and defining feature is the data transfer “quick check” algorithm\
    \ it uses, which reduces the amount of data transmitted. This is done by sending\
    \ only the differences between the source files, and the same existing destination\
    \ files (if any). If files need to be transferred, because there is a difference\
    \ between source and destination, they are copied, or “synced”, using this algorithm.\
    \ The algorithm looks for files that have changed in size or modification time.\
    \ Changes in the other possible preserved file object attributes (such as permissions,\
    \ or ACLs) are made on the destination file directly when the quick check indicates\
    \ that the destination file needs to be updated in that way.\n\nAn abbreviated\
    \ summary of the **rsync** man page is as follows:\n\n```\nrsync\nSyntax:\nLocal:\
    \ rsync [OPTION...] SRC... [DEST]\nRemote:\n    via remote shell:\n    Pull mode:\
    \ rsync [OPTION...] [USER@]HOST:SRC... [DEST]\n    Push mode: rsync [OPTION...]\
    \ SRC... [USER@]HOST:DEST\n\n    via rsync daemon:\n    Pull mode: rsync [OPTION...]\
    \ [USER@]HOST::SRC... [DEST]\n              rsync [OPTION...] rsync://[USER@]HOST[:PORT]/SRC...\
    \ [DEST]\n    Push mode: rsync [OPTION...] SRC... [USER@]HOST::DEST\n        \
    \      rsync [OPTION...] SRC... rsync://[USER@]HOST[:PORT]/DEST\n```"
  - '[PAGE 134]


    **Purpose:** To transfer files locally or remotely using an efficient and fast
    data transfer algorithm. To copy locally, to/from (push/pull) another host over
    any remote shell, or to/from (push/pull) a remote rsync daemon.


    **Output:** Transferred files, either locally or remotely.


    **Common Options:**


    +   - **-a, --archive** archive mode

    - **-A, --acls** preserve ACLs (implies -p)

    - **--delete** delete extraneous files from destination dirs

    - **-e, --rsh=COMMAND** specify the remote shell to use

    - **--existing** skip creating new files on receiver

    - **-h, --human-readable** output numbers in a human-readable format

    - **-H, --hard-links** preserve hard links

    - **-k, --copy-dirlinks** transform symlink to dir into referent dir

    - **-K, --keep-dirlinks** treat symlinked dir on receiver as dir

    - **-n, --dry-run** perform a trial run with no changes made

    - **-p, --perms** preserve permissions

    - **-q, --quiet** suppress non-error messages

    - **-r, --recursive** recursively descend into directories

    - **--remove-source-files** sender removes synchronized files (non-directory)

    - **-v, --verbose** increase verbosity

    - **-z, --compress** compress file data during the transfer


    **Command Arguments:**


    +   - **SRC** the source file or directory

    - **DEST** the destination path


    ****************************************************************************************************


    # 1.12.1.1 rsync Examples


    One of the basic assumptions we are making in the following set of examples is
    that the source is generally a file object that is changing over time, such as
    a directory where you are modifying files by adding or deleting them from it,
    or from its sub-directories. Also, the destination is a file object that is unchanging,
    or fixed over time, such as when you do an archival backup. This is usually the
    case when you are using an archiving utility, although as you have seen above
    with the tar command, the archive (or destination) can be added to, or extracted
    from in various ways.


    > ***Note***

    We do not cover more complex, or advanced uses of **rsync**.'
- md: "We have organized the **rsync** examples below based upon whether they apply\
    \ where both source and destination are on a local machine, or where either the\
    \ source or destination is on a remote machine. The examples may also be divided\
    \ into those that deal with files exclusively, or those that deal with directories\
    \ and files.\n\n## Local Examples:\n\n1.  Using **rsync** to copy a single file\
    \ named **rsynctest** from the source current working directory to the local destination\
    \ directory **/home/bob/USBint**. The files are transferred in \"archive\" mode,\
    \ done using the **-a** option of the command. This ensures that symbolic links,\
    \ devices, attributes, permissions, ownerships, etc. are preserved.\n\n    ```\n\
    \    $ rsync -av rsynctest /home/bob/USBint\n    ```\n\n2.  Copying a single local\
    \ file in compressed form, with the operation feedback presented in human-readable\
    \ form, from the source **backup.tar** (in the current working directory) to the\
    \ destination directory **/home/bob/backup1** which you have permissions on.\n\
    \n    ```\n    $ rsync -zvh backup.tar /home/bob/backup1\n    ```\n\n3.  Using\
    \ **rsync** to copy an entire source directory contents from the directory named\
    \ **syncdir** locally to a destination directory locally named **/usr/home/bob/USBint**.\
    \ The slash at the end the designated source means \"copy the contents of this\
    \ directory\", *not* \"copy the directory by name\".\n\n    ```\n    $ rsync -av\
    \ syncdir/ /usr/home/bob/USBint\n    ```\n\n4.  Copying a single source directory\
    \ **/home/bob/backups** in compressed form, with the operation feedback presented\
    \ in human-readable form, to the destination directory **/home/remote/backups**\
    \ which you have permissions on.\n\n    ```\n    $ rsync -avzh /home/bob/backups\
    \ /home/remote/backups/\n    ```\n\n5.  Copying a single source directory **/home/bob/backups**,\
    \ and its files and sub-directory structure, in compressed form, to the destination\
    \ directory **/home/remote/backups** which you have permissions on.\n\n    ```\n\
    \    $ rsync -zvr /home/bob/backups /home/remote/backups\n    ```\n\n6.  Doing\
    \ a dry-run, where you remove the source files and compress the transmitted file\
    \ object.\n\n    ```\n    $ rsync --dry-run --remove-source-files -zvh backup.tar\
    \ /tmp/backups/backup.tar\n    ```\n\n## Remote Examples:\n\n7.  Copying a single\
    \ directory, named **Music**, from the local machine to a remote machine at **192.168.1.8**\
    \ into bob's home.\n\n    ```\n    $ rsync -avz Music bob@192.168.1.8:/home/bob/\n\
    \    ```\n\n8.  Copying an entire local directory, named **syncdir2**, using ssh,\
    \ to a remote machine at **192.168.0.7** and into the OS X-style directory /Users/b/Linux3e.\n\
    \n    ```\n    $ rsync -av -e ssh syncdir2 bob@192.168.0.7:/Users/b/Linux3e\n\
    \    ```\n\n9.  Copying a remote directory to a local directory.\n\n    ```\n\
    \    $ rsync -avzh root@192.168.0.100:/home/bob/backups /home/bob/temp\n    ```\n\
    \n10. Copying just the contents of the remote directory **/home/bob/Linux2e**,\
    \ updating (sometimes called “syncing”) with the **--existing** option, only the\
    \ existing files at the destination. If the source has new files, which are not\
    \ on the destination, these new files are not put on the destination. The destination\
    \ is signified by the .(period) at the end of the command, which translates to\
    \ the current working directory.\n\n    ```\n    $ rsync -avz --existing bob@192.168.1.2:/home/bob/Linux2e/\n\
    \    ```\n\n11. Copying a single local file, named **backup.tar**, using ssh,\
    \ to a remote machine at **192.168.0.8**\n\n    ```\n    $ rsync -avzhe ssh backup.tar\
    \ bob@192.168.0.8:/home/bob/backups/\n    ```\n\n12. Copying a single remote file\
    \ to the current working directory using ssh.\n\n    ```\n    $ rsync -avzhe ssh\
    \ bob@192.168.0.100:/usr/home/bob/systemctl.log\n    ```\n\n13. Copying only the\
    \ local files in **/home/bob/files** to a remote machine with an IP address of\
    \ **192.168.0.8**. With the **--delete** option present, extraneous files on the\
    \ destination that no longer exist in the source directory, are deleted. The -v\
    \ option ensures that what is being transferred is output. **rsync** using ssh\
    \ on an ephemeral port 32000.\n\n    ```\n    $ rsync -av --delete -e 'ssh -p\
    \ 32000' /home/bob/files/ bob@192.168.0.8:/home/bob/files/\n    ```\n\n## In-Chapter\
    \ Exercises\n\n22. What is the basic assumption in all of the examples above where\
    \ you copy to a remote host?\n23. Do all of the above 13 examples locally on your\
    \ system, and remotely on your LAN, substituting file names, directories, account\
    \ names, and IP addresses as necessary.\n\n## 1.12.2 Script Files for Backup and\
    \ Recovery\n\nUser-written script files can be deployed by a Raspberry Pi OS administrator\
    \ to quickly and efficiently do backup and archiving. Whether they are coded in\
    \ Python (or some other scripting language), or in a shell programming language\
    \ that embeds any of the above command line facilities that we've shown, they\
    \ can be used to expedite, facilitate, and automate the backup, recovery, and\
    \ archiving of files, directories, or entire file systems.\n\nAdditionally, there\
    \ are several on-line sources for commercially available backup and archiving\
    \ script files available, but there's no need for us to justify the utility for\
    \ planning, coding, or maintaining your own script file code base, versus using\
    \ an on-line, ready-made program.\n\nFollowing is an example of a Bash shell script\
    \ files, using a legacy application of **tar**.\n\n### Example 1.9 Simple Bash\
    \ Shell Example for Automating **tar** Backups\n\n**Objective:** The following\
    \ Bash shell script will backup a directory, /home/bob/bashtest, to another directory\
    \ previously created named simple_backup, in a compressed format.\n**Procedures:**\
    \ Do the following steps, in the order presented, to complete the requirements\
    \ of this example.\n\n1.  Create a sub-directory of your home directory named\
    \ **bashtest**.\n2.  Create another sub-directory of your home directory named\
    \ **simple_backup**.\n3.  Copy some files into the directory **bashtest**.\n4.\
    \  Use an editor of your choice, such as nano, to create the following file in\
    \ your home directory, and name that file **backup.bash**. Be sure to substitute\
    \ your username for bob in the body of the script file!\n\n    ```bash\n    #!/bin/bash\n\
    \    # To backup additional directories, put more pathnames in the\n    # following\
    \ command,\n    # separated by spaces, such as /home/bob, /home/bill, etc.\n \
    \   backup_source=/home/bob/bashtest\n    backup_destination=/home/bob/simple_backup\n\
    \    filename=back1.tgz\n    echo \"Backing up your bashtest directory\"\n   \
    \ tar --create --verbose --gzip --file $backup_destination/$filename $backup_source\n\
    \    echo \"Backup Complete\"\n    ```\n\n5.  Give yourself execute privilege\
    \ on the file **backup.bash** with the following command:\n\n    ```\n    $ chmod\
    \ u+x backup.bash\n    $\n    ```\n\n6.  Execute the Bash script with the following\
    \ command:\n\n    ```\n    $ ./backup.bash\n    \"Backing up your bashtest directory\"\
    \n    tar: Removing leading `/' from member names\n    /home/bob/bashtest/\n \
    \   /home/bob/bashtest/nfs_client.txt\n    \"Backup Complete\"\n    $\n    ```\n\
    \n7.  Check that the backup was achieved with the following two commands:\n\n\
    \    ```\n    $ cd simple_backup\n    $ ls -la\n    total 12\n    drwxr-xr-x \
    \ 2 bob bob 4096 May 24 11:46 .\n    drwxr-xr-x 27 bob bob 4096 May 24 11:42 ..\n\
    \    -rw-r--r--  1 bob bob  808 May 24 11:46 back1.tgz\n    $\n    ```\n\n## In-Chapter\
    \ Exercises\n\n24. Give the commands necessary to automate the above script file\
    \ using systemd, to run the backup.bash script at 3:00 AM every day of the week.\
    \ Feel free to modify time, days, and source and destination directories and files,\
    \ so that you can use the script file to backup information important to you on\
    \ your Raspberry Pi system.\n25. How would you “decompress” the file you created\
    \ with backup.bash in another directory?\n\n## 1.12.3 Software for Backup and\
    \ Recovery: Filezilla, SD Card Copier, and git\n\nThere are many commercial software\
    \ and hardware packages that can be deployed to backup and archive your system.\
    \ One very easy-to-use commercial product that allows you to clone entire hard\
    \ disks in a “broadcast” fashion over a network, from a server to one or more\
    \ machines, is Norton Ghost. But the most readily available, useful, and free\
    \ software facility, available through the Pi Menu choice > Preferences > Add/Remove\
    \ Software on the Raspberry Pi OS, that can do a variety of file system backup\
    \ and recovery, disk recovery, and disk cloning operations is FileZilla. We have\
    \ introduced that software application in Volume 1. Additionally, the Raspberry\
    \ Pi menu choice Accessories > SD Card Copier allows you to clone the entire microSD\
    \ card, thus replicating whatever is on your system/boot disk at the time you\
    \ do the copy. Admittedly a brute force approach to backup for recovery, it is\
    \ effective even for copying the microSD card to a USB2 or 3-mounted SSD, or other\
    \ suitable USB medium. You can also use the git command, and Github.com, to effectively\
    \ backup user files. We give a verbose description of the git command in Volume\
    \ 3. Of course, if you adhere to our recommended storage strategy of keeping user\
    \ files on media other than the boot/system medium, then whatever strategies you\
    \ use to back those media up, for recovery or archival purposes, apply. You can\
    \ mix and match any of the techniques and facilities we show in the following\
    \ three sections, to suit your requirements, and the specific needs of your selected\
    \ data storage model.\n\n### 1.12.3.1 FileZilla\n\nFileZilla is nominally a graphics-based\
    \ ftp client and server program that can use ssh as the tunnel, or conduit between\
    \ systems. It has a number of useful functions and menu choices that allow the\
    \ system administrator to successfully, confidentially, and efficiently backup\
    \ and restore single files or directories, via a network, locally or globally.\
    \ It is most useful for backing up and restoring single-user files and directories.\
    \ It is not a replacement or substitute for the command line facilities shown\
    \ in the preceding sections. Figure 1.10 illustrates the screen display and menus\
    \ available in the “client” version of FileZilla. Both client and server, in our\
    \ case a local machine running the Raspberry Pi OS, and a remote Linux machine,\
    \ must have ssh communications protocol enabled between them. You can have login\
    \ access to an account on the remote server, or you can anonymously login as well\
    \ if that is enabled."
