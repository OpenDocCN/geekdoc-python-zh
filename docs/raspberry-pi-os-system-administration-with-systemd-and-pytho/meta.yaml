    # Volume 2 Preface


    # Background


    This book is a compendium of easy-to-use, and essential Raspberry Pi system administration
    tasks for the beginner. The Raspberry Pi OS is derived from the Debian branch
    of Linux, and as of this writing, Debian Bullseye was the most current version
    of that operating system. To present the system administration topics and commands
    here, I have selected some very basic stuff, and a few more advanced concepts,
    topics, commands, and details that might not appear in a more complete system
    administration book.


    The overriding idea behind system administration of a modern, 21st-century Linux
    system such as the Raspberry Pi OS is the use of systemd to ensure that the Linux
    kernel works efficiently and effectively to provide these three foundation stones
    of computer operation and management: computer system concurrency, virtualization,
    and secure persistence.


    And this control of the kernel by a “super-kernel”, which is what systemd essentially
    is, must also promote the highest level of system performance and speed, given
    the use cases the computer might be put to, and the perceived needs of the target
    user base that the computer serves. Unless that novice user, or even a more seasoned
    system professional, has not only a basic, but also a more complete knowledge
    of how systemd controls and oversees every process and operation of a modern Linux
    system, they will never be able to master administering and implementing the kind
    of functionality that their use case(s) might ultimately require. Particularly
    for the user base on the system, and the demands that user base makes.


    Certainly out of the multitude of possible topics we could have presented, the
    ones you find detailed here have basically been selected in somewhat of a subjective
    way. That selective way was mainly guided by these concerns:


    +   a. The secure maintenance, in terms of concurrency, virtualization, and persistence,
    of a single Raspberry Pi system that an ordinary novice user can install on her
    own dedicated hardware.

    b. How important the topics are, in a perceived ranking of essential system administration
    tasks.

    c. How systemd plays into the maintenance regimen of the Raspberry pi OS, and
    the hardware it’s installed on, as chosen by that ordinary user.

    d. The overall pedagogic integration of the selected topics presented on system
    administration with each other.'
