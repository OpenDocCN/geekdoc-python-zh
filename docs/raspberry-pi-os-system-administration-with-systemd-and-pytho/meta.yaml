    See the **systemd-run** man page on your system for more information on options
    and their arguments.


    In order to set a property, such as the % share of the CPU that a service gets,
    you use the **systemctl** command. The general syntax for setting a property of
    a service with **systemctl** is:


    ```

    $ systemctl set-property service_name property=property_value

    ```


    where:

    **service_name** is the name of the service you want to modify the property of,

    **property** is the valid name of a property, and

    **property_value** is an allowable value of the given property.


    See the man page for **systemctl** on your Raspberry Pi system for more information.


    # Example 1.10 Starting a New Service with **systemd-run** and Allocating CPU
    Resources


    **Objectives:** The following example allows you to start three transient services
    in the user.slice, and allocate a larger percentage of the CPU to one of them.
    Therefore, one of them will get more time in the CPU. The program that will be
    running in each'
- md: "## 1.14.1.2.1 Transient Cgroups and Setting Their Resources\n\nExample 1.10\
    \ Creating Transient Cgroups and Modifying Their CPUShare\n\n**Objectives:** To\
    \ create a transient, or temporary, cgroup, by using the **systemd-run** command.\
    \ The basic objectives of the following example will be to create a simple, user-defined\
    \ service, and balance its CPU usage with the **systemctl set-property** command.\
    \ One of the services will be the **top** command, with the **-b** batch option.\n\
    \n**Prerequisites:** That you have superuser privilege on the system.\n\n**Requirements:**\
    \ Do the following steps, in the order presented below.\n\n1.  Execute the following\
    \ **systemd-run** command, with the arguments shown:\n\n```bash\nroot@raspberrypi:~#\
    \ systemd-run --unit=test --slice=user.slice top -b\nRunning as unit: test.service.\n\
    root@raspberrypi:~#\n```\n\n2.  Check the status of the service.\n\n```bash\n\
    root@raspberrypi:~# systemctl status test.service\n  Loaded: loaded (/run/systemd/transient/test.service;\
    \ transient)\n  Transient: yes\n  Active: active (running) since Sat 2023-05-27\
    \ 14:28:26 PDT; 56s ago\n  Main PID: 51751 (top)\n  Tasks: 1 (limit: 3932)\n \
    \ CPU: 574ms\n  CGroup: /user.slice/test.service\n          └─51751 /usr/bin/top\
    \ -b\n\nMay 27 14:29:21 raspberrypi top[51751]: 51645 root 20 0 ...\nOutput truncated...\n\
    root@raspberrypi:~#\n```\n\n3.  Run two more similar transient units, to provide\
    \ a comparison test for the relative setting of CPUShares.\n\n```bash\nroot@raspberrypi:~#\
    \ systemd-run --unit=test2 --slice=user.slice top -b\nRunning as unit: test2.service\n\
    root@raspberrypi:~# systemd-run --unit=test3 --slice=user.slice top -b\nRunning\
    \ as unit: test3.service\nroot@raspberrypi:~#\n```\n\n4.  Use the **systemctl**\
    \ command, and the **set-property** sub-command, to give the user.slice and test.service\
    \ a higher CPU share. Then reload the systemd daemon.\n\n```bash\nroot@raspberrypi:~#\
    \ systemctl set-property user.slice CPUShares=3000\nroot@raspberrypi:~# systemctl\
    \ set-property test.service CPUShares=3000\nroot@raspberrypi:~# systemctl daemon-reload\n\
    root@raspberrypi:~#\n```\n\n5.  Finally, to stop the three transient services\
    \ started above, use the following commands:\n\n```bash\nroot@raspberrypi:~# systemctl\
    \ stop test.service\nroot@raspberrypi:~# systemctl stop test2.service\nroot@raspberrypi:~#\
    \ systemctl stop test3.service\nroot@raspberrypi:~#\n```\n\nConclusion: We used\
    \ **systemd-run** to execute a set of three transient services, then gave one\
    \ of those services a higher CPU priority. We had to use the **systemctl daemon-reload**\
    \ command to basically reload the systemd manager configuration, reload all service\
    \ unit files and other units, and redo the systemd dependency tree. This forces\
    \ the CPUShares changes we made to take effect.\n\n## In-Chapter Exercises\n\n\
    31. Use the **top** command on your system to verify that test.service is actually\
    \ receiving more of a percentage of the CPU time than both services test2, test3,\
    \ and other user.slice services. How much more % time on every cycle through the\
    \ top command output?\n32. If the default CPU allocation number for a process\
    \ is 1024, what do numbers like 3000 (shown in the above **systemctl set-property**\
    \ command) or 100, mean, in terms of relative percentage utilization of the CPU?\
    \ Correlate your answer to this last question to the output of the **top** command.\
    \ Why did we set the CPUShares of user.slice to 3000 also?\n\n## 1.14.1.2.2 Persistent\
    \ Cgroups and Setting Their Resources\n\nExample 1.11 Creating Persistent Cgroups\
    \ and Modifying Their CPUShare and CPUQuota\n\n**Objectives:** To create a persistent,\
    \ or permanent, cgroup, by constructing a service unit file for it in the /etc/systemd/system\
    \ directory. This is the standard location for user-installed and user-defined\
    \ services in systemd, as shown in Volume 1, Chapter 2. The basic objectives of\
    \ the following example will be to create a simple, user-defined service, and\
    \ balance its CPU usage with the same **systemctl set-property** command we have\
    \ shown for transient services in Example 1.10.\n\n**Prerequisites:** Completion\
    \ of Example 1.10, and having superuser privilege on the system.\n\n**Requirements:**\
    \ Do the following steps, in the order presented below.\n\n1.  Use your favorite\
    \ text editor (such as nano) as the root, or superuser, to create and save the\
    \ following text file, named **test4.service**, exactly as shown, in /etc/systemd/system:\n\
    \n```\n[Unit]\nDescription=A test service that uses the sha256sum command.\nAfter=remote-fs.target\
    \ nss-lookup.target\n\n[Service]\nExecStart=/usr/bin/sha256sum /dev/zero\nExecStop=/bin/kill\
    \ -WINCH ${MAINPID}\n\n[Install]\nWantedBy=multi-user.target\n```\n\nThe structure\
    \ and components of the above file are detailed completely in Volume 1, Chapter\
    \ 2.\n\n2.  Now we can start this service, and make it persistent, using the **systemctl**\
    \ command, and its **unit** sub-command. We can also use the **ps** and **systemctl**\
    \ commands, and the unit sub-command **systemctl status**, to monitor valuable\
    \ information about test4.service:\n\n```bash\nroot@raspberrypi:~# systemctl start\
    \ test4.service\n\nroot@raspberrypi:~# systemctl enable test4.service\nCreated\
    \ symlink /etc/systemd/system/multi-user.target.wants....\nOutput truncated...\n\
    root@raspberrypi:~# systemctl status test4.service\n● test4.service - A test service\
    \ that uses the sha256sum command.\n     Loaded: loaded (/etc/systemd/system/test4.service;\
    \ enabled; vendor preset: enabled)\n     Active: active (running) since Sun 2023-05-28\
    \ 06:39:18 PDT; 1min 14s ago\n   Main PID: 62874 (sha256sum)\n      Tasks: 1 (limit:\
    \ 3932)\n     CPU: 1min 13.874s\n    CGroup: /system.slice/test4.service\n   \
    \         └─62874 /usr/bin/sha256sum /dev/zero\n\nMay 28 06:39:18 raspberrypi\
    \ systemd[1]: Started A test service that uses the sha256sum command.\n\nroot@raspberrypi:~#\n\
    root@raspberrypi:~# ps -p 62874 -o pid,comm,cputime,%cpu\nPID COMMAND TIME %CPU\n\
    62874 sha256sum 00:03:35 99.5\nroot@raspberrypi:~# systemctl status 62874 | grep\
    \ CGroup\nCGroup: /system.slice/test4.service\n\nroot@raspberrypi:~#\n```\n\n\
    The valuable information we can see from the **systemctl status** and **ps** commands\
    \ is that this service is consuming 99.5% of the CPU resource on our Raspberry\
    \ Pi 400 system. Also, that its pid is 62874, it is running the command **sha256sum**,\
    \ and it is in the system.slice cgroup.\n\n3.  There are two approaches we can\
    \ take to “throttle” back the amount of CPU resource test4.service consumes. First,\
    \ we can decrease the CPUShares for test4.service, to “throttle” it back to a\
    \ more acceptable value. This change will be persistent across system reboots.\
    \ We can set the value of CPUShares for test4.service to 100 (the value we will\
    \ set in the command below), which will be effective upon all subsequent restarts\
    \ of that service. Second, we can set a maximum quota on CPU consumption for test4.service,\
    \ by changing its CPUQuota property to some lower percentage value.\n\nTo make\
    \ a change in CPUShares or CPUQuota for test4.service that is transient, or temporary\
    \ (non-persistent across restarts or reboots,) add the **--runtime** option to\
    \ the following **systemctl set-property** commands.\nTo throttle back test4.service\
    \ using CPUShares, use the following command:\n\n```bash\nroot@raspberrypi:~#\
    \ systemctl set-property test4.service CPUShares=100\n```\n\nTo throttle back\
    \ test4.service using CPUQuota, use the following command:\n\n```bash\nroot@raspberrypi:~#\
    \ systemctl set-property test4.service CPUQuota=20%\n```\n\nTo make these changes\
    \ effective, use the following commands:\n\n```bash\nroot@raspberrypi:~# systemctl\
    \ daemon-reload\nroot@raspberrypi:~# systemctl restart test4.service\n```\n\n\
    4.  To cleanup your system to stop and remove the test4.service (and test5.service),\
    \ use the following commands:\n\n```bash\nroot@raspberrypi:~# systemctl stop test4.service\n\
    root@raspberrypi:~# systemctl stop test5.service\nroot@raspberrypi:~# rm -r /etc/systemd/system/test4.service\n\
    root@raspberrypi:~# rm -r /etc/systemd/system/test5.service\nroot@raspberrypi:~#\n\
    ```\n\nConclusion: We have successfully created a simple, yet persistent, user-defined\
    \ service, and balanced its CPU usage with the **systemctl** command, and its\
    \ options.\n\n## In-Chapter Exercises\n\n33. Use the **top** command to verify\
    \ the CPU % usage of test4.service after just limiting its CPUShare to 100. What\
    \ is the CPUShare on your system, and why? Is this percentage in agreement with\
    \ the **ps** command percentage shown in the above session? What does the **top**\
    \ command reveal about %CPU usage for test4.service after you have throttled it\
    \ back with the CPUQuota property value of 20% that we show. Do both methods yield\
    \ similar results? Why, or why not?\n34. Create and start another system.slice\
    \ service with the **systemd-run** command, named test5.service, that executes\
    \ the md5sum command. Start it, and make it persistent. Then use the **top** command\
    \ to verify the % CPU of both test4.service and test5.service. What are their\
    \ relative % CPU usages on your system, and why?\n35. How do you stop test4.service\
    \ and test5.service from running?\n\n## 1.14.2 Managing Memory\n\nsystemd allows\
    \ you to easily control and set limits on a unit's memory usage. This can be critical\
    \ in cases where there is a smaller amount of installed memory on your Raspberry\
    \ Pi hardware. To see what percentage of memory a unit is consuming, use the **top**\
    \ command, and examine the column output for %MEM. Given the use-case(s) your\
    \ system has been designed for, if an application or service is consuming too\
    \ much memory, there are two ways you can limit its memory usage.\n\nThe limit\
    \ specifies how much process and kernel memory can be used by tasks in this unit.\
    \ The limit is a memory size in bytes. If the numerical value is followed by K,\
    \ M, G or T, the specified memory size is parsed as Kilobytes, Megabytes, Gigabytes,\
    \ or Terabytes (with the base 1024), respectively. The special value “infinity”\
    \ means that no memory limit is to be applied.\n\nThe simplest way to achieve\
    \ this is to put the following directive in the [Service] section of the unit’s\
    \ configuration file:\n\n```\nMemoryLimit=value\n```\n\nReplace value with a limit\
    \ on maximum memory usage of the processes executed in the cgroup. Use suffixes\
    \ K, M, G, or T to identify Kilobyte, Megabyte, Gigabyte, or Terabyte."
  mdcn: "## 1.14.1.2.1 瞬态 Cgroup 及其资源设置\n\n示例 1.10 创建瞬态 Cgroup 并修改其 CPUShare\n\n**目标：**\
    \ 使用 **systemd-run** 命令创建一个瞬态（或临时）cgroup。以下示例的基本目标是创建一个简单的、用户定义的服务，并使用 **systemctl\
    \ set-property** 命令平衡其 CPU 使用率。其中一个服务将是带有 **-b** 批处理选项的 **top** 命令。\n\n**前提条件：**\
    \ 你在系统上拥有超级用户权限。\n\n**要求：** 按照以下顺序执行步骤。\n\n1.  执行以下 **systemd-run** 命令，并附带所示参数：\n\
    \n```bash\nroot@raspberrypi:~# systemd-run --unit=test --slice=user.slice top\
    \ -b\nRunning as unit: test.service.\nroot@raspberrypi:~#\n```\n\n2.  检查服务的状态。\n\
    \n```bash\nroot@raspberrypi:~# systemctl status test.service\n  Loaded: loaded\
    \ (/run/systemd/transient/test.service; transient)\n  Transient: yes\n  Active:\
    \ active (running) since Sat 2023-05-27 14:28:26 PDT; 56s ago\n  Main PID: 51751\
    \ (top)\n  Tasks: 1 (limit: 3932)\n  CPU: 574ms\n  CGroup: /user.slice/test.service\n\
    \          └─51751 /usr/bin/top -b\n\nMay 27 14:29:21 raspberrypi top[51751]:\
    \ 51645 root 20 0 ...\nOutput truncated...\nroot@raspberrypi:~#\n```\n\n3.  运行另外两个类似的瞬态单元，为\
    \ CPUShares 的相对设置提供对比测试。\n\n```bash\nroot@raspberrypi:~# systemd-run --unit=test2\
    \ --slice=user.slice top -b\nRunning as unit: test2.service\nroot@raspberrypi:~#\
    \ systemd-run --unit=test3 --slice=user.slice top -b\nRunning as unit: test3.service\n\
    root@raspberrypi:~#\n```\n\n4.  使用 **systemctl** 命令及其 **set-property** 子命令，为 user.slice\
    \ 和 test.service 分配更高的 CPU 份额。然后重新加载 systemd 守护进程。\n\n```bash\nroot@raspberrypi:~#\
    \ systemctl set-property user.slice CPUShares=3000\nroot@raspberrypi:~# systemctl\
    \ set-property test.service CPUShares=3000\nroot@raspberrypi:~# systemctl daemon-reload\n\
    root@raspberrypi:~#\n```\n\n5.  最后，要停止上面启动的三个瞬态服务，请使用以下命令：\n\n```bash\nroot@raspberrypi:~#\
    \ systemctl stop test.service\nroot@raspberrypi:~# systemctl stop test2.service\n\
    root@raspberrypi:~# systemctl stop test3.service\nroot@raspberrypi:~#\n```\n\n\
    结论：我们使用 **systemd-run** 执行了一组三个瞬态服务，然后为其中一个服务分配了更高的 CPU 优先级。我们必须使用 **systemctl\
    \ daemon-reload** 命令来基本重新加载 systemd 管理器配置，重新加载所有服务单元文件和其他单元，并重新构建 systemd 依赖树。这迫使我们所做的\
    \ CPUShares 更改生效。\n\n## 章节内练习\n\n31. 在你的系统上使用 **top** 命令验证 test.service 实际上是否比\
    \ test2、test3 以及其他 user.slice 服务获得了更高的 CPU 时间百分比。在 top 命令输出的每个循环中，它多了多少 % 的时间？\n\
    32. 如果一个进程的默认 CPU 分配数是 1024，那么像 3000（如上 **systemctl set-property** 命令所示）或 100\
    \ 这样的数字，对于 CPU 的相对百分比利用率意味着什么？将你对上一个问题的回答与 **top** 命令的输出关联起来。为什么我们也将 user.slice\
    \ 的 CPUShares 设置为 3000？\n\n## 1.14.1.2.2 持久化 Cgroup 及其资源设置\n\n示例 1.11 创建持久化 Cgroup\
    \ 并修改其 CPUShare 和 CPUQuota\n\n**目标：** 通过在 /etc/systemd/system 目录中为其构建一个服务单元文件，来创建一个持久化（或永久）cgroup。这是\
    \ systemd 中用户安装和用户定义服务的标准位置，如第 1 卷第 2 章所示。以下示例的基本目标是创建一个简单的、用户定义的服务，并使用我们在示例 1.10\
    \ 中为瞬态服务展示的相同 **systemctl set-property** 命令来平衡其 CPU 使用率。\n\n**前提条件：** 完成示例 1.10，并在系统上拥有超级用户权限。\n\
    \n**要求：** 按照以下顺序执行步骤。\n\n1.  使用你最喜欢的文本编辑器（如 nano）以 root 或超级用户身份，在 /etc/systemd/system\
    \ 中创建并保存以下名为 **test4.service** 的文本文件，内容如下所示：\n\n```\n[Unit]\nDescription=A test\
    \ service that uses the sha256sum command.\nAfter=remote-fs.target nss-lookup.target\n\
    \n[Service]\nExecStart=/usr/bin/sha256sum /dev/zero\nExecStop=/bin/kill -WINCH\
    \ ${MAINPID}\n\n[Install]\nWantedBy=multi-user.target\n```\n\n上述文件的结构和组件在第 1 卷第\
    \ 2 章中有详细说明。\n\n2.  现在我们可以使用 **systemctl** 命令及其 **unit** 子命令来启动此服务并使其持久化。我们还可以使用\
    \ **ps** 和 **systemctl** 命令，以及 unit 子命令 **systemctl status** 来监控有关 test4.service\
    \ 的有价值信息：\n\n```bash\nroot@raspberrypi:~# systemctl start test4.service\n\nroot@raspberrypi:~#\
    \ systemctl enable test4.service\nCreated symlink /etc/systemd/system/multi-user.target.wants....\n\
    Output truncated...\nroot@raspberrypi:~# systemctl status test4.service\n● test4.service\
    \ - A test service that uses the sha256sum command.\n     Loaded: loaded (/etc/systemd/system/test4.service;\
    \ enabled; vendor preset: enabled)\n     Active: active (running) since Sun 2023-05-28\
    \ 06:39:18 PDT; 1min 14s ago\n   Main PID: 62874 (sha256sum)\n      Tasks: 1 (limit:\
    \ 3932)\n     CPU: 1min 13.874s\n    CGroup: /system.slice/test4.service\n   \
    \         └─62874 /usr/bin/sha256sum /dev/zero\n\nMay 28 06:39:18 raspberrypi\
    \ systemd[1]: Started A test service that uses the sha256sum command.\n\nroot@raspberrypi:~#\n\
    root@raspberrypi:~# ps -p 62874 -o pid,comm,cputime,%cpu\nPID COMMAND TIME %CPU\n\
    62874 sha256sum 00:03:35 99.5\nroot@raspberrypi:~# systemctl status 62874 | grep\
    \ CGroup\nCGroup: /system.slice/test4.service\n\nroot@raspberrypi:~#\n```\n\n\
    我们可以从 **systemctl status** 和 **ps** 命令中看到的有价值信息是，此服务正在消耗我们 Raspberry Pi 400 系统上\
    \ 99.5% 的 CPU 资源。此外，其 pid 是 62874，它正在运行命令 **sha256sum**，并且位于 system.slice cgroup\
    \ 中。\n\n3.  我们可以采取两种方法来“节流”test4.service 消耗的 CPU 资源量。首先，我们可以降低 test4.service 的\
    \ CPUShares，将其“节流”到一个更可接受的值。此更改将在系统重启后持续生效。我们可以将 test4.service 的 CPUShares 值设置为\
    \ 100（我们将在下面的命令中设置的值），这将在该服务的所有后续重启中生效。其次，我们可以通过将其 CPUQuota 属性更改为某个较低的百分比值，为 test4.service\
    \ 设置一个最大 CPU 消耗配额。\n\n要对 test4.service 的 CPUShares 或 CPUQuota 进行瞬态（或临时，跨重启不持久）的更改，请在以下\
    \ **systemctl set-property** 命令中添加 **--runtime** 选项。\n要使用 CPUShares 节流 test4.service，请使用以下命令：\n\
    \n```bash\nroot@raspberrypi:~# systemctl set-property test4.service CPUShares=100\n\
    ```\n\n要使用 CPUQuota 节流 test4.service，请使用以下命令：\n\n```bash\nroot@raspberrypi:~#\
    \ systemctl set-property test4.service CPUQuota=20%\n```\n\n要使这些更改生效，请使用以下命令：\n\
    \n```bash\nroot@raspberrypi:~# systemctl daemon-reload\nroot@raspberrypi:~# systemctl\
    \ restart test4.service\n```\n\n4.  要清理你的系统以停止并移除 test4.service（和 test5.service），请使用以下命令：\n\
    \n```bash\nroot@raspberrypi:~# systemctl stop test4.service\nroot@raspberrypi:~#\
    \ systemctl stop test5.service\nroot@raspberrypi:~# rm -r /etc/systemd/system/test4.service\n\
    root@raspberrypi:~# rm -r /etc/systemd/system/test5.service\nroot@raspberrypi:~#\n\
    ```\n\n结论：我们已成功创建了一个简单但持久的用户定义服务，并使用 **systemctl** 命令及其选项平衡了其 CPU 使用率。\n\n## 章节内练习\n\
    \n33. 使用 **top** 命令验证将 test4.service 的 CPUShare 限制为 100 后的 CPU % 使用率。你系统上的 CPUShare\
    \ 是多少，为什么？这个百分比与上面会话中显示的 **ps** 命令百分比一致吗？在你使用我们展示的 CPUQuota 属性值 20% 将其节流后，**top**\
    \ 命令揭示了 test4.service 的 %CPU 使用率的什么信息？两种方法是否产生相似的结果？为什么，或者为什么不？\n34. 使用 **systemd-run**\
    \ 命令创建并启动另一个 system.slice 服务，命名为 test5.service，该服务执行 md5sum 命令。启动它并使其持久化。然后使用\
    \ **top** 命令验证 test4.service 和 test5.service 的 % CPU。它们在你系统上的相对 % CPU 使用率是多少，为什么？\n\
    35. 你如何停止 test4.service 和 test5.service 的运行？\n\n## 1.14.2 管理内存\n\nsystemd 允许你轻松控制和设置单元内存使用量的限制。在你的\
    \ Raspberry Pi 硬件上安装内存较少的情况下，这可能至关重要。要查看一个单元消耗了内存的百分比，请使用 **top** 命令，并检查 %MEM\
    \ 列的输出。根据你的系统设计的使用场景，如果一个应用程序或服务消耗了太多内存，你可以通过两种方式来限制其内存使用量。\n\n该限制指定了此单元中的任务可以使用多少进程和内核内存。该限制是以字节为单位的内存大小。如果数值后面跟着\
    \ K、M、G 或 T，则指定的内存大小分别被解析为千字节、兆字节、吉字节或太字节（以 1024 为基数）。特殊值“infinity”表示不应用内存限制。\n\
    \n最简单的方法是在单元的配置文件的 [Service] 部分中放入以下指令：\n\n```\nMemoryLimit=value\n```\n\n将 value\
    \ 替换为 cgroup 中执行的进程的最大内存使用量限制。使用后缀 K、M、G 或 T 来标识千字节、兆字节、吉字节或太字节。"
