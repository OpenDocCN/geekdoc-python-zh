    # 2.5.5.3 An Example of the Queue Class Solution to the Producer–Consumer Model


    The following Python3 code brings together much of the syntax and structure from
    this chapter. This final example illustrates a Python3 solution to the producer–consumer
    problem, using an FIFO queue with the **queue.Queue** class, in a multi-threaded
    program. It uses OOP, and the threading module and its methods, to start two threads:
    Producer and Consumer.


    An overview of how we use the Queue class to obtain a solution to the producer–consumer
    problem, taken from the reference material, is as follows:


    > The Producer places a piece of data on the queue using the **.put** method.
    The utility and advantage the queue module is most visible here- **.put** locks
    the queue, checks to see if the queue is full, and calls an internal **.wait()**
    to pause the producer if the queue is full. The Consumer then uses the **.get**
    method to acquire the lock before removing data from the queue, and **.get** checks
    for an empty queue. If the queue is empty, the consumer is put in a wait state.


    **.get()** and **.put()** also implement the notification logic to allow “talking”
    between Producer and Consumer threads.


    What exactly is happening, step-by-step, in the code of Example 2.45 below? A
    brief explanation of the layout of the program, in major summary blocks, and a
    description of the operational heart of the code is as follows:


    **Block 1:**

    This is the initialization part of the program, where the **threading** module,
    sub-module **Thread**, and modules **queue**, **time**, and **random** are imported.
    In this block, we also instance a class of the **queue.Queue** class, and name
    it **q_buffer**.'
