    \n**/data1/bobs/test.txt**\n\nHere's how the path to a file named **test.txt**\
    \ appears on a traditional file system:\n\n**C:\\Users\\bob\\Desktop\\test.txt**\n\
    \nWhen you want a ZFS file system to expand onto more than one disk, for example,\
