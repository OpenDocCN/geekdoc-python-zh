    The first line of defense in system security, and the technique employed almost
    universally across many types of computer system, is password-based authentication.
    The Raspberry Pi OS compares a user-entered password at login for a user’s ID,
    compares the password to a previously established and stored one held in a password
    file for that user, and based on the comparison,'
