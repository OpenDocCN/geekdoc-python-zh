    \ examples, to get practice producing syntactically correct code!\n\nc. You create\
    \ a multi-line Python3 script in your favorite text editor (such as nano), and\
    \ import that file into Thonny's Script Area using the `import` Python command.\
    \ We call this \"Way 3 (Import Script Mode)\", and give an illustrative example\
