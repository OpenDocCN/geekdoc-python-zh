    \ no other existing active zpool can be mapped to that vdev!\n\n2. There are six\
    \ types of vdev in ZFS:\n   a. Disk (default): The physical hard drives in your\
    \ system, usually the whole drive or primary slice.\n   b. File: The absolute\
    \ path of preallocated files/images.\n   c. Raidz1/2/3: Nonstandard distributed\
    \ parity-based software RAID levels.\n   d. Spare: Hard drives marked as a *hot\
    \ spare* for ZFS software RAID.\n   e. Cache: Device used for a level-2 adaptive\
    \ read cache (L2ARC).\n   f. Log: A separate log (SLOG) called the ZFS intent\
    \ log (ZIL).\n\n3. Unlike a traditional file system, where the mount point of\
    \ the file system begins at a particular logical drive letter, the default mount\
    \ point for a zpool is root (/). This is how the path to a file named **test.txt**\
