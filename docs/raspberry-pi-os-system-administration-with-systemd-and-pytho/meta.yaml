    \ to do backups.\n\n## 1.10 Configuring a Printer\n\nThere are fundamental and\
    \ modern methods for adding and configuring a local printer on a Raspberry Pi,\
    \ and printing documents on it, using the Common UNIX Printing System (CUPS).\
    \ We detail these methods *extensively* in Volume 1, Section 1.6, entitled “What\
    \ the Common Unix Printing System Accomplishes”. There we also give some additional\
    \ details of traditional print commands such as **lpadmin**, **lpc**, **lpinfo**,\
    \ **lpmove**, **lpoptions**, **lpq**, **lp**, **lpr**, **lprm**, and **lpstat**.\n\
    \nWe review that section here. You can configure and manage a printer for use\
    \ on your Raspberry Pi OS, using the three basic methods. These methods are generally\
    \ applicable to printers that are connected directly to your computer, and this\
    \ most likely is via a USB connection. The three basic methods are:\n\n- 1. A\
    \ web-based browser CUPS interface,\n- 2. Using the Raspberry Pi OS Menu choice\
    \ Preferences > Print Settings, and\n- 3. Using the Raspberry Pi OS command line\
    \ in a terminal.\n\nThe configured printer in all three methods is controlled\
    \ and managed with the Common UNIX Printing System (CUPS).\n\nIn method 1, a web-based\
    \ browser front end to CUPS allows you to manage printers, print jobs, and other\
    \ configuration settings using intranet connectivity, or over the Internet.\n\n\
    In method 2, the built-in graphical front end to CUPS, accessed via the Raspberry\
    \ Pi Menu > Preferences > Print Settings, which comes with Raspberry Pi OS, achieves\
    \ much of the same functionality as method 1.\n\nIn method 3, there is a completely\
    \ text-based interface for controlling and managing printers from the Raspberry\
    \ Pi OS command line.\n\n### 1.10.1 What the Common UNIX Printing System (CUPS)\
    \ Accomplishes\n\nUsing CUPS is a standard way of printing in both Linux and Unix.\
    \ Since it was developed to provide as many printer definitions as possible, it\
    \ will more than likely enable you to directly connect your model of printer,\
    \ or connect to a print server on your LAN.\n\nIt is basically composed of two\
    \ parts: a scheduler and a filtering system. The scheduler arranges jobs in print\
    \ queues and sends them to the filtering system that translates the print data\
    \ into device driver information for the particular printer you want your documents\
    \ to print on.\n\n### 1.10.2 Managing CUPS Locally with systemd\n\nUsing systemd,\
    \ via the **systemctl** command, allows you to start, stop, reload, or restart\
    \ the CUPS service. This is a higher level of management for your local printers\
    \ via a system service.\n\n#### 1.10.2.1 Starting CUPS Service Using systemd\n\
    \nIn the Raspberry Pi OS, when you attach a new printer via a USB cable to the\
    \ hardware, it will generally be automatically recognized and attached via CUPS.\
    \ If the CUPS service has not already been started, it will be automatically started\
    \ and run in the process of connecting the new printer. But to start the CUPS\
    \ service without having any printers attached or powered on, do the following:\n\
    \nTo start the CUPS service, and check its status, use the following commands:\n\
    \n```\n$ sudo systemctl start cups\n$ sudo systemctl status cups\n• cups.service\
    \ - CUPS Scheduler\n     Loaded: loaded (/lib/systemd/system/cups.service; enabled;\
    \ vendor preset: enabled)\n     Active: active (running) since Thu 2022-10-06\
    \ 00:00:45 PDT; 10h ago\nTriggeredBy: • cups.socket\n• cups.path\nDocs: man:cupsd(8)\n\
    Main PID: 11613 (cupsd)\nStatus: \"Scheduler is running...\"\nTasks: 1 (limit:\
    \ 4164)\nCPU: 33ms\nCGroup: /system.slice/cups.service\n└─11613 /usr/sbin/cupsd\
    \ -l\n\nOct 06 00:00:45 raspberrypi systemd[1]: Starting CUPS Scheduler...\nOct\
    \ 06 00:00:45 raspberrypi systemd[1]: Started CUPS Scheduler.\n```\n\nWe see from\
    \ the output that CUPS is running.\n\n#### 1.10.2.2 Stopping CUPS Service with\
    \ systemd\n\nThe CUPS service can be stopped using the **systemctl stop cups.service**\
    \ command, as follows:\n\n```\n$ sudo systemctl stop cups.service\n```\n\nWhen\
    \ you check the status of the CUPS service after stopping the CUPS service, its\
    \ status is inactive (dead), but still enabled.\n\n> ***Note***\n> “Enabled” is\
    \ systemd jargon that means it will persistently start every time the system is\
    \ rebooted.\n\n#### 1.10.2.3 Restarting, Enabling, or Disabling the CUPS Service\
    \ with systemd\n\nRestarting a service means that a service is stopped and then\
    \ started again. If the service was not currently running, restarting it simply\
    \ starts the service. Use the following command to restart the CUPS service:\n\
    \n```\n$ sudo systemctl restart cups.service\n```\n\nYou can also perform a conditional\
    \ restart of a service using systemctl. A conditional restart only restarts a\
    \ service if it is currently running. Any service in an inactive state is not\
    \ started.\n\n```\n$ sudo systemctl condrestart cups.service\n```\n\nIn the above\
    \ command example, the CUPS service was in an inactive state before the command\
    \ was executed. When the conditional restart is accomplished, no error messages\
    \ appear. The cups daemon was not started because conditional restarts only affect\
    \ active services.\n\nIt is always a good practice to check the status of a service,\
    \ after stopping, starting, or conditionally restarting it.\n\n#### 1.10.2.4 Configuring\
    \ CUPS as a Persistent Service Using systemd\n\nYou can use the **systemctl**\
    \ command to enable or disable the CUPS services on your Raspberry Pi OS server,\
    \ whether that is local or remote.\n\nUsing the **enable** option on the **systemctl**\
    \ command sets a service to always start at boot (be persistent). The following\
    \ shows exactly how to accomplish this:\n\n```\n$ sudo systemctl enable cups.service\n\
    ```\n\n#### 1.10.2.5 Disabling a Service with systemd\n\nYou can use the disable\
    \ option of the **systemctl** command to keep a service from starting at boot.\
    \ However, it does not immediately stop the service. You need to use the **stop**\
    \ command shown above to achieve stopping the service. The following command example\
    \ shows how to disable a currently enabled service:\n\n```\n$ sudo systemctl disable\
    \ cups.service\n```\n\n## 1.11 File System Backup and Recovery\n\nThe general\
    \ necessity of backing up user and system files on a single-user Raspberry Pi\
    \ system, as a part of an ordinary user’s routine operations, should be obvious,\
