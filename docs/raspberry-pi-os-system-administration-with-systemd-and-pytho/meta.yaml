    Introduction:


    Question: Where would this example be most useful?

    Answer: In preparation for implementing our recommended storage model on a ZFS
    zpool, and because you want to learn the basics of ZFS.


    The following example uses the most essential command in ZFS, the **zpool** command,
    with the sub-command **create** applied to a USB thumb drive on an Ubuntu 23.04
    system, installed on a Raspberry Pi 4B. The real power of ZFS can be harnessed
    to common, readily available hardware vdevs that are available on that system,
    by an ordinary user.


    > ***Note***

    If the only thing you want to do is use a USB thumb drive to transfer files (such
    as text files, C program source code, LibreOffice documents, and so on) to and
    from the computer, *you do not have to use the procedures of this example to accomplish
    that!*

    If you make a mistake anywhere along the way, you can always start over by executing
    the cleanup step shown at the end of the example, and then simply begin again.


    Prerequisites:


    +   0. You have installed ZFS on an Ubuntu system, as shown in Section 1.9.1,
    and are using that system on Raspberry Pi hardware.

    1. That you have an expendable USB thumb drive that is usable on that system,
    and already has only one partition, and no data you want to keep on it. More specifically,
    if the USB thumb drive is by default formatted to FAT32 (which most commercially-available
    thumb drives are), then there is a high probability that it will automatically
    mount and show up as an icon on your desktop in the Ubuntu software system. But
    for us, it didn’t. Go figure.2. That there is no zpool named **test3** already
    defined on the primary partition of the USB thumb drive, and there is no zpool
    named **test3** on your Ubuntu system. To find this out, in a terminal window
    type **zpool list** on the command line, after the USB thumb drive has been inserted
    and auto-mounts.

    3. That you can determine the logical device name and the full path to the thumb
    drive using any one of the methods in Section 1.8.4 “Five Quick and Easy Ways
    to Find Out the Logical Device Names of Media”. The full path to our USB thumb
    drive is /dev/sda, and the path to the first partition on it is /dev/sda1. This
    may not be the same designations as the USB thumb drive on your system, but you
    can substitute your logical device designations for them.'
  - '[PAGE 120]


    4. That you have done Examples 1.5 or 1.6, on disk partitioning with Gparted or
    the **fdisk** command.


    Procedure: All commands are shown in **bold** type, and are typed at the command
    line, followed by pressing the <Enter> key on the keyboard.


    +   1. Plug the thumb drive into a USB port on your Ubuntu system. If it’s a fat32-formatted
    USB thumb drive, it should automatically mount and appear as an icon on your system
    desktop. Determine the logical device name of the USB thumb drive, as shown in
    Section 1.8.4. Then, clear any ZFS information off the thumb drive using the following
    command:


    > ***Note***

    On our Ubuntu 23.04 system, the thumb drive did *not* automount, therefore we
    couldn’t unmount it, for obvious reasons!


    ```

    $ sudo zpool labelclear -f /dev/sda1

    $

    ```


    This step is necessary because, if for some reason, this thumb drive had been
    used in a ZFS pool before, you need to clear the ZFS meta-data information from
    the thumb drive so that the old ZFS meta-data information does not conflict with
    what we are going to do in this example.


    +   2. If it is mounted, unmount the thumb drive using the **umount** command:


    ```

    $ sudo umount /dev/sda1

    $

    ```


    At this point, the desktop icon for the USB thumb drive will disappears on your
    system, if the thumb drive automounted!

    It must still show up in an **ls** listing of **/dev** to be useable. If the thumb
    drive is not recognized in **/dev** after the above step has been done, you need
    to use another thumb drive!


    +   3. You can now create a zpool named **test3** on the primary partition on
    the thumb drive you worked on in step 2. To create a zpool on the thumb drive,
    use the following command:


    ```

    $ sudo zpool create -f test3 /dev/sda1

    $

    ```


    We included the **-f** option on **zpool create** to force creation of a ZFS file
    system on partition 1 of the thumb drive, effectively eradicating whatever file
    system was on it.'
