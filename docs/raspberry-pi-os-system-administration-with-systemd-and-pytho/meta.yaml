    to “throttle” it back to a more acceptable value. This change will be persistent
    across system reboots. We can set the value of CPUShares for test4.service to
    100 (the value we will set in the command below), which will be effective upon
    all subsequent restarts of that service. Second, we can set a maximum quota on
    CPU consumption for test4.service, by changing its CPUQuota property to some lower
    percentage value.


    To make a change in CPUShares or CPUQuota for test4.service that is transient,
    or temporary (non-persistent across restarts or reboots,) add the **--runtime**
    option to the following **systemctl set-property** commands.

    To throttle back test4.service using CPUShares, use the following command:


    ```

    root@raspberrypi:~# systemctl set-property test4.service CPUShares=100

    ```


    To throttle back test4.service using CPUQuota, use the following command:


    ```

    root@raspberrypi:~# systemctl set-property test4.service CPUQuota=20%

    ```


    To make these changes effective, use the following commands:


    ```

    root@raspberrypi:~# systemctl daemon-reload

    root@raspberrypi:~# systemctl restart test4.service

    ```


