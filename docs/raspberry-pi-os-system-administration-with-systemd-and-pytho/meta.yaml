    something 是你选择备份的目录的名称。显示你用于执行这些任务的命令行。
- - '##'
  - 1.16 使用 **tar** 命令将你在问题 1.15 中生成的压缩 tar 归档 **~/mybackups/something.tar.gz** 恢复到你主目录下名为
    **mirrors** 的新目录中。显示你用于执行这些任务的命令行。
- - '##'
  - 1.17 在你的 Raspberry Pi 系统上使用 **rsync** 命令，将你的整个主目录（无论它存在于什么介质上）备份到硬件上挂载的 USB 闪存驱动器。
- - '##'
  - 1.18 使用 **rsync** 命令而不是 **tar** 命令重复问题 1.8 至 1.11。
- - '##'
  - 1.19 使用 Pi Menu Accessories > SD Card Copier 选项，将你的 Raspberry Pi OS 启动/系统介质制作成可启动的克隆，克隆到
    USB3 闪存驱动器。确保目标 USB 闪存驱动器具有足够大的容量以实现克隆！要测试克隆，请正常关闭系统，并移除原始启动/系统介质。然后将其替换为克隆的目标介质，并重新启动系统。
