- md: "## Common Options and Commands:\n\nNote: Unless the -h, or --help option is\
    \ given, one of the commands below must be present.\n\nOptions:\n\n- **-d, --download-only**\n\
    \    Download only; package files are only retrieved, not unpacked or installed.\
    \ Configuration Item: APT::Get::Download-Only.\n- **--only-upgrade**\n    Do not\
    \ install new packages; when used in conjunction with install, only-upgrade will\
    \ install upgrades for already installed packages only and ignore requests to\
    \ install new packages.\n- **-q, --quiet**\n    Quiet; produces output suitable\
    \ for logging, omitting progress indicators.\n- **-y, --yes, --assume-yes**\n\
    \    Automatic yes to prompts; assume \"yes\" as answer to all prompts and run\
    \ non-interactively.\n\nCommands:\n\n- **install**\n    install is followed by\
    \ one or more packages desired for installation or upgrading. The /etc/apt/sources.list\
    \ file is used to locate the desired packages.\n- **remove**\n    remove is identical\
    \ to install except that packages are removed instead of installed. Removing a\
    \ package leaves its configuration files on the system.\n- **update**\n    update\
    \ is used to resynchronize the package index files from their sources. The indexes\
    \ of available packages are fetched from the location(s) specified in /etc/apt/sources.list.\n\
    - **upgrade**\n    upgrade is used to install the newest versions of all packages\
    \ currently installed on the system from the sources enumerated in /etc/apt/sources.list.\n\
    \nWe cover the following functions in APT for the Raspberry Pi OS:\n\nInstalling,\
    \ reinstalling, removing, and searching for packages.\nUpgrading and updating\
    \ packages.\n\nIn the Operations below, when we refer to **package_name**, this\
    \ represents any specific named package.\n\n## Operation 1\n\nTo use the apt-cache\
    \ package query function to list available packages on your system, use the following\
    \ command:\n\n```\nroot@raspberrypi:~# apt-cache pkgnames\n```\n\nAlthough this\
    \ listing can be quite long, it is useful to find out if a package has been installed\
    \ on your system. For example, in the nginx example we show below, before you\
    \ try to install a package named “nginx”, it is a good idea to see if it has already\
    \ been installed!\n\n## Operation 2\n\nTo install a package, use the following\
    \ command:\n\n```\nroot@raspberrypi:~# apt-get install package_name\n```\n\n##\
    \ Operation 3\n\nTo remove a package, or the package and its configuration files,\
    \ use the following commands:\n\n```\nroot@raspberrypi:~# apt-get remove package_name\n\
    root@raspberrypi:~# apt-get purge package_name\n```\n\n## Operation 4\n\nTo update\
    \ the package index files from the local sources.list directories (the metadata\
    \ for packages), or upgrade all Debian packages to their latest versions, use\
    \ the following commands:\n\n```\nroot@raspberrypi:~# apt-get update\nroot@raspberrypi:~#\
    \ apt-get upgrade\n```\n\n## Operation 5\n\nTo individually update an installed\
    \ package, by removing it and then reinstalling it use the following command:\n\
    \n```\nroot@raspberrypi:~# apt-get --reinstall install package_name\n```\n\n##\
    \ Operation 6\n\nTo show metadata associated with an installed package on the\
    \ system, use the following command:\n\n```\nroot@raspberrypi:~# apt-cache show\
    \ package_name\n```\n\nFor example, on our Raspberry Pi system, the output of\
    \ this command shows the nginx metadata information:\n\n```\nroot@raspberrypi:~#\
    \ apt-cache show nginx\nPackage: nginx\nVersion: 1.18.0-6.1+deb11u3\nInstalled-Size:\
    \ 102\nMaintainer: Debian Nginx Maintainers <pkg-nginx-maintainers@alioth-lists.debian.net>\n\
    Architecture: all\nDepends: nginx-core (<< 1.18.0-6.1+deb11u3.1~) | nginx-full\
    \ (<< 1.18.0-6.1+deb11u3.1~) | nginx-light (<< 1.18.0-6.1+deb11u3.1~) | nginx-extras\
    \ (<< 1.18.0-6.1+deb11u3.1~), nginx-core (>= 1.18.0-6.1+deb11u3) | nginx-full\
    \ (>= 1.18.0-6.1+deb11u3) | nginx-light (>= 1.18.0-6.1+deb11u3) | nginx-extras\
    \ (>= 1.18.0-6.1+deb11u3)\nDescription-en: small, powerful, scalable web/proxy\
    \ server\nNginx (\"engine X\") is a high-performance web and reverse proxy server\
    \ created by Igor Sysoev. It can be used both as a standalone web server and as\
    \ a proxy to reduce the load on back-end HTTP or mail servers.\n\nOutput truncated...\n\
    ```\n\n## In-Chapter Exercises\n\n- 28. First, install a single package on your\
    \ system from the list you compiled in answer to In-Chapter Exercise 26. above,\
    \ and as detailed in this section. Then, if they haven't already been installed\
    \ by yourself, or a system administrator, use APT on your Raspberry Pi system\
    \ to install the following application packages: gnome-disk-utility 3.38.2, GIMP,\
    \ openssh-server, nginx, and vsftpd. Finally, test each of these applications.\
    \ Do these applications restart after a system reboot? How can you know if they\
    \ would do that, without actually rebooting the system?\n- 29. Use APT on your\
    \ Raspberry Pi system to install application packages that fit your particular\
    \ use-case(s). Go back to your answer to In-Chapter Exercise 26 for a preliminary\
    \ listing of these.\n\n## 1.13.3 Upgrading the Operating System\n\nSimilar to\
    \ our recommendations for the exact, specific details of initially installing\
    \ your system, the minor or major release upgrades of the system itself are very\
    \ dependent on:\n\n1. The specific system you are dealing with.\n2. The versions\
    \ of that system you are trying to upgrade between.\n\nAlthough the Raspberry\
    \ Pi OS uses APT, there is enough variability due to 2, that presenting the exact,\
    \ specific details of upgrading the system is best left to consulting relevant\
    \ online sources at the time you want to do the upgrades. When we wrote this book,\
    \ the upgrade procedure using APT, could be summarized as follows:\n\n1. The following\
    \ APT commands worked for minor release upgrades:\n\n    ```\n    root@raspberrypi:~#\
    \ apt update\n    root@raspberrypi:~# apt upgrade\n    root@raspberrypi:~# apt\
    \ dist-upgrade\n    ```\n\n2. The major upgrade procedure is best done by consulting\
    \ the online documentation at the time you want to do the upgrade, and of course\
    \ is constrained by 1 above.\n\n## In-Chapter Exercise\n\n- 30. Create a document\
    \ which details exactly what steps you must take to upgrade your Raspberry Pi\
    \ system, serving for both minor releases and major releases of the software.\
    \ The scheduling of your procedural steps should reflect, for example, a weekly\
    \ or monthly basis for minor release changes, or at some unspecified interval\
    \ for major release changes. Then, implement the procedures that your document\
    \ specifies.\n\n## 1.14 System and Software Performance Monitoring and Adjustment\n\
    \nThe most important considerations a Raspberry Pi OS administrator (and the ordinary,\
    \ single user on her own computer) has to make, when dealing with system performance,\
    \ revolves around CPU process management, memory management, disk usage/management,\
    \ and network performance. Table 1.8 lists the controlling facilities and functions\
    \ the Raspberry Pi OS provides for system tuning and performance monitoring, most\
    \ notably with the kernel-loadable ZFS component added, if that ever is the stable,\
    \ and easily implemented case.\nThe commands that implement and affect some of\
    \ the functions from Table 1.8 are shown in bold type below. We also include commands\
    \ that allow you to monitor these functions as well. We cover some of these commands\
    \ in the following sections. The systemd-specific commands are covered in detail\
    \ in Volume 1, Chapter 2.\n\n```\ndf, du, free, journalctl, nice, pgrep, ps, renice,\
    \ systemctl, systemd-cgls, systemd-run, top\n```\n\n### TABLE 1.8\nPerformance\
    \ Tuning Functions\n\n| System Component | Control Facility |\n| :--- | :--- |\n\
    | CPU | Nice numbers<br>Process priorities<br>Cgroup management<br>Batch queues<br>Scheduler\
    \ parameters<br>Process resource limits |\n| Memory | Cgroup management<br>Memory\
    \ management parameters<br>Paging space |\n| ZFS vdevs, zpools and I/O (if installed)\
    \ | ZFS pool and file system organization<br>ZFS deduplication, efficiency, optimization<br>I/O\
    \ parameters<br>Zvol creation and administration |\n| Network I/O | Network memory\
    \ buffers<br>Network-related parameters<br>Network infrastructure |\n\n## 1.14.1\
    \ Application-Level Process/Thread Resource Management\n\nThe basic reason for\
    \ monitoring system resources, such as process CPU usage and system memory, in\
    \ terms of how the system is performing given its designed for and intended use-case(s),\
    \ is to allow you to observe, assess, and then gain control, at the application\
    \ level, of how programs important to you are effectively using major components\
    \ of system resources.\n\nFor example, if a particular standard application (such\
    \ as a web server which you have installed from an on-line repository,) or even\
    \ a user-written program’s processes, are consuming too much of CPU or memory\
    \ resources, according to criteria you determine given the use case(s) your system\
    \ is designed or intended for, you can scale back that task’s operation to better\
    \ serve your user base. On the other hand, if those same processes are being under-served,\
    \ or starved for resources, for whatever reason, you can scale up that task’s\
    \ operation as well. There may be some situations where under-service may be caused\
    \ by hardware malfunctions, or illegal intrusion, but we do not cover those situations\
    \ in this section."
