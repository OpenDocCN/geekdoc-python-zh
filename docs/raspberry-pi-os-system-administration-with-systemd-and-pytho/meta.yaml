  md: 'There are some limitations to using Filezilla, however. It’s primarily designed
    as an ftp client and server software, rather than as a dedicated backup tool.
    While it can be used to transfer files between systems, it lacks built-in functionality
    for automated backups. However, you can achieve automatic file backups by utilizing
    external tools in conjunction with FileZilla. Here''s a general approach you can
    consider:


    +   1. Set up a backup tool: Choose a backup software or script that suits your
    needs. There are numerous options available, such as **rsync** triggered by systemd
    systemctl timers. *Ensure that your chosen tool supports automatic scheduling.*

    2. Configure the backup software: Set up the backup software to include the specific
    files and folders you want to back up. Configure the backup destination (e.g.,
    local storage, network drive, cloud storage) and establish the backup schedule
    (e.g., hourly, daily, weekly).

    3. Integrate FileZilla: Use FileZilla to transfer the files to the designated
    backup location. You can manually initiate the transfers, or create a bash script
    file as we show in Example 1.9, for example, that executes the transfers automatically.
    FileZilla Pro and FileZilla Pro CLI provide a command-line interface (CLI) that
    allows you to do script file transfers, *but they''re not free!*

    4. Schedule the backup process: Depending on the backup tool you''ve chosen, use
    its scheduling capabilities to automatically trigger the backup process at regular
    intervals. This ensures that the specified files are backed up periodically.


    By combining a backup tool with FileZilla, and scheduling functionality, you can
    create an automated backup system for your specific files. Remember to consult
    the documentation and resources of your chosen backup software for detailed instructions
    on configuration and automation.


    # 1.12.3.2 SD Card Copier


    There’s system cloning software built right into the Raspberry Pi OS! If you deployed
    the system installation technique shown back in Section 1.2.3, entitled “How to
    Boot from and Run a Raspberry Pi OS from a USB3-mounted SSD”, you can use a hybrid
    form of that method to archive your entire operating system, including the boot
    partition. If the system/boot disk is a microSD card, then you can simply add
    another blank (or not) microSD card into a suitable microSD-to-USB adapter, mount
    it in one of the USB ports on your Raspberry Pi hardware, and then use the Pi
    Menu choice Accessories > SD Card Copier menu choice to clone the current system/boot
    disk to the blank one.'
  merge: -1
  pgno: 141
- img_proc: true
  md: 'And if you followed the technique in Section 1.2.3, and your boot/system medium
    is an externally mounted USB2 or 3 device, like an SSD, you can use the SD Card
    Copier to clone that original SSD onto another one of at least the same, or greater,
    capacity than the original. A couple of words of caution are in order here.


    First, when using the SD Card Copier, make sure you specify the “Copy from Device”,
    and the “Copy to Device” **correctly**. The “Copy from Device” must be the original
    boot/system medium, and the “Copy to Device” can be another equal-or-larger capacity
    medium that is mounted inside of an enclosure, and connected via another USB port
    on the Raspberry Pi hardware. Don’t confuse the two media, or else you’ll end
    up with no usable clone, and no bootable system! When we cloned a boot/system
    SSD, the original and the clone were the exact same 128 GB SSDs, made by Silicon
    Power, mounted in Orico USB3 External Hard Drive enclosures. And we were very
    careful to specify them correctly to the SD Card Copier!


    Second, some manufacturer’s products, even though they’re nominally the same capacity,
    are in fact different. So you should try to ensure this ahead of time.


    The drawback to using this approach is of course that the cloning takes a snapshot
    of the entire system as it exists at *one particular moment in time*. This is
    unlike using the **rsync** command, automated by either cron, or a systemctl timer,
    where the snapshots can be taken *regularly*, and automatically, according to
    some timed schedule.


    # 1.12.3.3 Using git and github to Backup File Systems


    The **git** command and github.com are useful, efficient, and powerful means you
    can use to create a distributed version-control system for your software projects.
    They can also be used as a cloud-based storage and archiving facility, particularly
    if you follow the storage model we recommend in this chapter. That is, if your
    Raspberry Pi OS is installed on one medium, and all of your user data files are
    stored on another persistent medium, such as an additional USB3-mounted SSD.


    Of course, using a private github.com repository for backup and archiving is not
    free. In addition, there are limits to the amount of data that you can store on
    github. Therefore, this method of backup and archiving works best for an ordinary
    user, in a *public* repository at github, with small user data storage requirements.
    Also, if you use another data storage model than what we recommend, the mechanics
    of doing github archiving and backup would be dependent on that data storage model.'
  merge: -1
