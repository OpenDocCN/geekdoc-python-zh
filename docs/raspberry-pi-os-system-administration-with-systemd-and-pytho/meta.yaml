    \ Debian 策略的 UID 和 GID 值，创建带有骨架配置的主目录，运行自定义脚本以及其他功能。adduser 和 addgroup 可以在五种模式之一中运行：\n\
    \n**输出：** 新建或修改的用户账户或组。\n\n**常用选项：**\n    [--quiet] [--debug] [--force-badname]\
