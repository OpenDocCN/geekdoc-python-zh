    \ Debian installation procedure, and then when it’s done, remove the thumb drive\
    \ from the X86 architecture computer, and reboot into the Raspberry Pi Desktop\
    \ from the boot medium you installed it on.\n\nYou now have an X86 architecture\
    \ machine with the Raspberry Pi OS Desktop on it!\n\n## 1.2.3 How to Boot from\
