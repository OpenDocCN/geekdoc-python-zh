    Capabilities are controlled by changes in the traditional **rwx** permissions,
    but can also be set more finely and viewed directly by the **capset** and **getcap**
    system calls.

    See the man page for capabilities on your system for further information about
    capabilities.


    # In-Chapter Exercise


    44. How (and why) do you apply Linux capabilities on the command line? Provide
    an example of this, that you have implemented and tested on your Raspberry Pi
    system.


    # 1.15.3 sudo


    On the Raspberry Pi OS, programs, commands, and files are accessed through user
    and group permissions. Each user has a unique identifier, given as a username,
    or UID. Users belong to unique groups, given either as a group name, or a GID.
    Specific users and groups have permission to access available programs, commands,
    and files.

    The **sudo** program, or command, allows a single command to be run as the root
    user, or superuser, *or even as some other user*. Only the system administrator,
    or root user, can utilize a policy listing file (named *sudoers*) that contains
    commands that each user can execute. So the administrator controls what users
    have what privileges on the system. When any user needs to run a command that
    requires root permissions, that user types **sudo command** in a terminal window
    or console, allowing them to run **command** with root privilege. Then, **sudo**
    consults its permissions list in the policy listing file. If the user has permission
    to run that command, it runs the command. If the user does not have permission
    to run the command, **sudo** denies execution. Running **sudo** does not require
    knowing root''s password, but by default requires entry of the user''s own password
    to execute successfully.

    An example of the use of the sudo command on our Raspberry Pi system is as follows:


    ```

    bob@raspberrypi:~ $ sudo -i

    root@raspberrypi:~#

    root@raspberrypi:~# exit

    bob@raspberrypi:~ $

    ```


    For a more detailed description of the **sudo** command, see Volume 1.

    The **su** command (an abbreviation for "switch user") allows a user to switch
    roles and become the superuser on the system without logging off from their own
    account. You must know the password of the root account if you want to'
  - '[PAGE 176]


    assume the role of root. On a Raspberry Pi system, this command is restricted,
    and you are encouraged to include users that need to have higher levels of privilege
    on the system in the sudoers file. That way they can only execute privileged operations
    on a per-command basis.


    # In-Chapter Exercises


    +   45. Are you included in the sudoers group and file on your Raspberry Pi system?
    How did you find out if you are?

    46. Enter some unprivileged user on your Linux system into the sudoers file. Then
    have them test the **sudo** command and its operation, as we have shown it in
    the above section.

    47. Is the **su** command available for your use on your Raspberry Pi system?
    Why or why not?


    # 1.15.4 Intrusion Detection and Prevention Systems


    A conceptual layout of how malicious activity from outside of the Raspberry Pi
    OS interfaces through the components of a system is given in Figure 1.12. It is
    important to realize that this figure does not specify the multitude of types
    of attack that can intrude upon your system from a LAN or the Internet, but does
    show the arrangement of system components that these attacks can


    ![](img/7ffbe025fa2ba956525d0c51169283f3_176_0.png)'
  - '[PAGE 177]


    target. It also does not show where in the software, kernel, or hardware any defensive
    or preventative mechanisms are placed.


    # In-Chapter Exercises


    +   48. Where would a Russian bot be situated in Figure 1.12?

    49. What is the Red Team Field Manual (RTFM)? What is the Blue Team Field Manual
    (BTFM)? What is Pen testing? Why would you need either or both of these manuals
    in the context of Pen testing?


    An intrusion detection system (IDS) is a software application that monitors a
    network, or a single system, for unauthorized activity, or user protocol violations.
    It is situated on a software-specific interface, and its output is seen using
    log file monitoring. A wide variety of free or commercial IDS, from antivirus
    software to hierarchical systems that monitor the traffic of a backbone network,
    are available. They can be classified as Network Intrusion Detection Systems (NIDS)
    or Host Intrusion Detection Systems (HIDS). An IDS that monitors operating system
    files is an example of a HIDS. An IDS that analyzes incoming network traffic is
    an example of a NIDS. Also, IDS can be classified by detection strategy. The most
    well-known types of detection strategies are signature-based detection (recognizing
    bad patterns, such as malware), and anomaly-based detection (detecting deviations
    from a pre-defined model of “good” traffic, which uses a form of Artificial Intelligence
    (AI). IDS that have some pre-determined and structured response protocol are referred
    to as Intrusion Prevention Systems (IPS).


    A typical network intrusion detection system tries to detect malicious activity,
    such as a brute force attack, a denial of service attack, port scans, or attempts
    to crack into computers by monitoring network traffic.


    Following is a partial listing of some free IDS available for installation, but
    not installed by default, on our Raspberry Pi system:


    +   * AIDE is a HIDS that can monitor and analyse the internals of the operating
    system.

    * Snort is a NIDS which performs packet logging and real-time traffic analysis
    on IP networks.

    * fail2ban is an example of an IPS. One of the configurations it takes is based
    upon malicious activity coming into your system from a LAN, or the Internet, and
    locks out IP addresses that attempt to login via ssh more than five times with
    the wrong password. This prevents brute force attacks through port 22.


    These three IDS are available via APT, or the Raspberry Pi Menu Preferences >
    Add/Remove Software. The best way to find out more about the particulars'
  - '[PAGE 178]


    of installing and configuring them is by reading their online documentation and
    tutorials.


    # In-Chapter Exercises


    +   50. Install one or all of the above IDS packages on your system, using the
    package management system available. How do you deploy fail2ban, and how do you
    control its environment? For example, how do you “unblock” an IP address using
    fail2ban? Test this on your Raspberry Pi system.

    51. What are the capabilities and uses of Wireshark? Give a description of it
    in terms of the IDs we describe above, and then install Wireshark and use it on
    your system.


    # 1.15.5 Linux Security Software


    All larger Linux computer server systems, as well as individual Raspberry Pi desktop
    systems used by an ordinary user, can have several types of network-based and
    host-based security software available to detect malicious activity, protect systems
    and data, support intrusion detection, and the responses to them. They can be
    organized into the following categories:


    +   * Intrusion Detection and Intrusion Prevention Systems

    * Remote Access Software

    * Web Proxies

    * Vulnerability Management Software

    * Authentication Servers

    * Routers

    * Firewalls

    * Network Quarantine Servers


    We covered some of the details of intrusion detection, and also give a more complete
    description of firewalls in the next section.


    # 1.15.5.1 System Firewall


    A firewall is a facility that prevents unauthorized access to or from a private
    network or a computer. Firewalls can be implemented in either hardware, software,
    or both. Firewalls are mainly used to halt unauthorized access to a private network
    or intranet, from the Internet. All traffic entering or leaving a single computer,
    or intranet, passes through the firewall, which can look at each message packet
    stream, and block those that do not meet specific security requirements set by
    the system administrator. These requirements are codified in what are known as
    *firewall rules*.'
