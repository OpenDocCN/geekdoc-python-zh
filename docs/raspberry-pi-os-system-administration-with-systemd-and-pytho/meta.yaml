    \ Python 对象。没有这个锁，即使是最简单的操作也可能在多线程程序中引起问题：例如，当两个线程同时增加同一个对象的引用计数时，引用计数最终可能只增加了一次而不是两次。\n\
    因此，存在这样的规则：只有获取了 GIL 的线程才能操作 Python 对象或调用 Python/C API 函数。为了模拟执行的并发性，解释器会定期尝试切换线程。在可能阻塞的\
    \ I/O 操作（如读写文件）周围也会释放锁，以便其他 Python 线程可以在此期间运行。\n\n从上述文档中，就 Python3 性能而言，关键点是 Python3\
