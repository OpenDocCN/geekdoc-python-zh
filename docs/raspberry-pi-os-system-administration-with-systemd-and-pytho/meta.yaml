    # 1.8.4 Five Quick and Easy Ways to Find Out the Logical Device Names of Media


    Before attaching a new medium to your Raspberry Pi system, it is important to
    know how to determine, in a very quick and easy manner, what the currently installed
    logical device names of the media actually attached and usable on your system
    are. What we mean by “attached and usable” is that the medium is properly connected
    and recognized by the system, and has a device driver that the system can use
    to communicate with it.


    *Before and after*: If you want to find out the logical device name of a newly
    installed medium, use one of the following methods to see what media are on your
    system *before* you add the new one, and then use the same method *after* the
    new one has been added, and note the difference. The different or new logical
    name that appears will be the logical device name of the new medium.


    The five simple methods that follow show how to determine what media are attached,
    and usable on your system, and what the logical device names of those and any
    others you might want to add to your system are.'
  - '[PAGE 95]


    # Method 1


    Change your current working directory to /dev. Type **ls**. A microSD card, for
    example, will show up in the **ls** listing as mmcblk*. The full path to the first
    slice, or partition, on one of these disks is specified as mmcblk0p1. A USB bus
    device, like a thumb drive, would show up in the **ls** listing as sdb, or whatever
    letter designation the system has assigned to it, and the full path to the first
    slice on it would be sdb1. A USB3-mounted SSD will show up as sda, and the first
    slice to it would be sda1. These are exactly what designations appeared in /dev
    on our Raspberry pi 4B and Pi 400.


    # Method 2


    Type **df -hT** on the command line, to find out the file system names and paths
    they are mounted at on your system. On our Raspberry Pi system, when we did this
    to see if a 32 Gb USB thumb drive was recently successfully attached to the system,
    this is the output:


    ```

    $ df -hT

    file system  Type      Size  Used  Avail  Use%  Mounted on

    /dev/root    ext4      439G  11G   406G   3%    /

    devtmpfs     devtmpfs  1.7G  0     1.7G   0%    /dev

    tmpfs        tmpfs     1.9G  0     1.9G   0%    /dev/shm

    tmpfs        tmpfs     759M  1.4M  758M   1%    /run

    tmpfs        tmpfs     5.0M  4.0K  5.0M   1%    /run/lock

    /dev/sda1    vfat      253M  31M   222M   13%   /boot

    tmpfs        tmpfs     380M  28K   380M   1%    /run/user/1000

    /dev/sdb1    ext4      29G   24K   27G    1%    /media/bob/04fd2202-8879-46f2-8040...

    $

    ```


    Notice that our root, or system disk(/dev/root) is 439 GB in size. That''s because
    we''re running this Raspberry Pi 400 from a USB3-mounted SSD with that capacity,
    *not* a microSD card. We address more details of the **df** command in Section
    1.14.3.


    # Method 3


    Very similar to using the **df** command, use the **lsblk -a** command. When we
    used this command and option on our Raspberry Pi system, after we had attached
    the 32 Gb USB thumb drive, we got the following output:'
