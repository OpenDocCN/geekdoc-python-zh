    We use the word volatile here to mean during the transient lifetime of some process
    or service. Of course, systemd and the Linux kernel control all processes and
    services running on the Raspberry Pi. *Pseudo*, and special-purpose file systems
    (sometimes called *synthetic file systems*), which can be thought of as virtual
    file systems, have this kind of characteristic.


    There are also established protocols for connecting to and accessing either physical,
    virtual, or pseudo file systems, in the locations where they may reside. Two examples
    of access protocols that establish and maintain the connections to virtual, network-available
    media and file systems are the Network File System, version 4 (NFSv4), and the
    Internet Small Computer System Interface (iSCSI).


    In this section, we first present an organizing scheme that you can use to think
    about types of media and file systems. A file system may be nominally assigned
    according to what medium it exists on: a directly connected physical medium (such
    as a USB3 SATA disk), a virtual medium (such as Network-Attached Storage or Storage
    Area Networks that use NFSv4 or iSCSI), or as a specialized pseudo-file system
    that is not on a persistent medium at all (such as the cgroups or proc file systems).


    We then go on to give some particular examples of adding directly connected, physical
    media to a Raspberry Pi OS.


    Additionally, we suggest a traditional approach, when using the recommended storage
    model we give in Section 1.3.1, to adding persistent media to your system. This
    is as follows:


    Where you first properly connect the device to the Raspberry Pi via attaching
    it to a USB3 port, partition that medium, manually add a file system to it (typically
    the ext4 file system), and then finally create directories and files in the partition(s)
    on the media. The sections below detail this more traditional approach.


    According to our organizing scheme, a file system can be separated into three
    hierarchically arranged layers that perform very particular functions. These layers,
    arranged from farthest-to-nearest to the actual hardware of the physical medium
    in question, are as follows:


    **The Logical Layer:**

    This layer is used for interaction with user application programs, and the processes
    they consist of, via Linux system calls. It provides the application programming
    interface (API) for file operations, for example system calls to **OPEN**, **CLOSE**,
    **READ**, etc., and connects with the layer below it for processing. The Logical
    Layer achieves efficient file access, logically organized directory operations,
    and provides user-autonomy and security. In Figure 1.3, this layer is represented
    by the ISCSI and Process Inputs blocks at the top of the figure.


    **The Virtual Layer:**

    This layer provides the interface mechanisms for maintaining multiple, simultaneously
    existing implementations of physical and virtual file systems on the same computer.
    For example, it makes possible mounting and transparently using NFSv4, btrfs,
    ext3, ext4, fat32, or ZFS at the same time on the same system, and operating with
    files from all of those implementations as if they were all of the same type.


    The Linux IO (LIO) block shown in Figure 1.3 is known as an iSCSI “target”, and
    represents Virtual Layer connectivity to persistent media from various network
    connections. These connections traditionally use high-speed fiber channel technology
    to create a storage area network (SAN), but most importantly can also be achieved
    using Ethernet and TCP/IP.


    A more detailed architectural scheme of classifying Virtual Layer file systems
    further separates that layer into block-based, network, stackable, pseudo, and
    special purpose categories. In Figure 1.3, many of the different implementations
    of file systems, such as NFSv4, ext4, xfs, btrfs, initramfs, and the procfs, would
    be situated within the Virtual file systems block shown in that diagram. Two very
    contemporary and extremely important virtual file systems are the cgroups file
    system (cgroupsfs) used by systemd, and the userland, block-based file system,
    ZFS.


    **The Physical Layer:**

    This layer is concerned with the physical operation of the persistent storage
    device. It processes physical blocks being read or written. It handles buffering
    and memory management and is responsible for the physical placement of blocks
    in specific locations on the storage medium. The physical file system interacts
    with the device drivers, or with the channels that physical devices communicate
    over. At a certain level of simplification, this layer can be schematically represented
    in Figure 1.3 by the integrated grouping of Block Layer, SCSI Layers, and the
    Physical Device Layer.


    ## 1.8.1 Types of File System and ext4


    Furthermore, and as a very integral part of the operation of the Linux kernel
    as it exists in a transient and volatile state as we have defined it, the pseudo
    and special purpose file systems can be viewed as a series of conduits through
    which the entire system itself “flows”. Thinking along these lines, when the kernel
    is in the CPU and attendant RAM, the kernel code itself is organized as a file
    system. The kernel (or systemd super-kernel) can be viewed as a file system of
    transitory data structures, that maintains the steady state of the hardware and
    software using these conduits exclusively; this achieves the important controlling
    goals of virtualization, concurrency, user-autonomy, security, and the necessary
    archival, long-term data persistence on the file systems that are there to serve
    the user base.


    Over the history of Linux, various file systems have been used to provide speed,
    efficiency, security, and utility to the ordinary user. The most contemporary
    and universal of these, across the three major branches of Linux, is the Linux
    Extended File System (ext). All of the representative downstream releases of Linux
    use it as the default file system.


    The 4th version of ext, ext4, is the current and most robust version so far. It
    has several features, such as large scalability, the ability to map to very large
    disk array sizes, and other very critical features, such as journaling. Following
    is a compact listing of some of the features of ext4:


    1. It can support volumes with sizes up to 1 exabyte, and files with sizes up
    to 16 terabytes.

    2. It uses an “extents” mapping scheme, which replaces block mapping used by earlier
    versions of ext. An extent is a range of contiguous physical blocks.

    3. It is backward-compatible with ext3 and ext2. Therefore ext3 and ext2 file
    systems can be mounted as ext4.

    4. It delays block allocation until data is flushed to disk.

    5. It has an unlimited number of sub-directories that can be created.

    6. It has a multi-block allocator that can make better choices about allocating
    files contiguously on disk.

    7. It provides timestamps, measured in nanoseconds.


    Most importantly, from the perspective of our Raspberry Pi OS recommended data
    storage model, adding a second medium, for example, allows you to keep the operating
    system and the user data on two different physical persistent media. That way,
    if the operating system fails and the system disk is corrupted and unusable, the
    data survives on the user data disk, and can very easily be recovered.


    There are many traditional, legacy methods of achieving the objective of this
    data storage model, using facilities such as Linux disk and file maintenance commands,
    utilities such as mdadm (a software RAID manager), and Linux Volume Management
    (LVM). But from our perspective, the modern and contemporary way of implementing
    the recommended data storage model is using ZFS on redundant additional persistent
    media. With ZFS, you get bit-level data integrity, volume management, RAID capabilities
    at all levels, and a failure-proof backup strategy, all rolled into one utility.


    > ***Note***

    > Unfortunately, at the time this book was written, the Raspberry Pi OS did not
    easily and reliably support the installation and implementation of ZFS. Additionally,
    ZFS works best on systems that have Error Correction Code (ECC) memory.


    ## 1.8.2 Persistent Media and Devices


    There are some very important reasons for adding persistent media to your system,
    aside from conforming to our recommended storage model. Your microSD card may
    be running out of space, or beginning to show signs of failure. In a traditional
    legacy scheme, these situations might involve downtime of the system in order
    to correct the problem. Whereas, with our storage model implementation, and some
    of the facilities shown in the sections below, they can be handled without bringing
    the system down.


