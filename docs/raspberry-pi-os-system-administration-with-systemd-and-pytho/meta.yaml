  md: '# 0.2.3 Creating, Deleting, and Managing Files


    To copy the contents of one file into another file, use the **cp** command. The
    general syntax of the **cp** command is as follows:


    ```

    cp [options] file1 file2

    ```


    **Purpose:** Copy **file1** to **file2**; if **file2** is a directory, make a
    copy of **file1** in this directory

    **Output:** Copied files


    +   **Commonly used options/features:**

    - **-i** If destination exists, prompt before overwriting

    - **-p** Preserve file access modes and modification times on copied files

    - **-r** Recursively copy files and subdirectories


    For example, to make an exact duplicate of the file named **myfile**, with the
    new name **myfile2**, type the following:


    ```

    $ cp myfile myfile2

    $

    ```


    This usage of the **cp** command has two required command arguments. The first
    argument is the source file that already exists and which you want to copy. The
    second argument is the destination file or the name of the file that will be the
    copy. Be aware that many Raspberry Pi OS commands can take plain, ordinary, or
    regular files as arguments, or can take directory files as arguments. This can
    change the basic task accomplished by the command. It is also worth noting that
    not only can file names be arguments, but *pathnames* as well. A pathname is the
    route to any particular place in the file system structure of the operating system.
    This changes the site or location, in the path structure of the file system, of
    operation of the command.


    In order to change the name of a file or directory, you can use the **mv** command.
    The general syntax of the **mv** command is as follows:


    ```

    mv [options] file1 file2

    mv [options] file-list directory

    ```


    **Purpose:** First syntax: Rename **file1** to **file2**

    Second syntax: Move all the files in file-list to directory

    **Output:** Renamed or relocated files


    +   **Commonly used options/features:**

    - **-f** Force the move regardless of the file access modes of the destination
    file

    - **-i** Prompt the user before overwriting the destination'
  merge: -1
  pgno: 23
- img_proc: true
  md: 'In the following usage, the first argument to the **mv** command is the source
    file name, and the second argument is the destination name.


    ```

    $ mv myfile2 renamed_file

    $

    ```


    It is important at this point to notice the use of spaces in Raspberry Pi OS commands.
    What if you obtain a file from a Windows system that has one or more spaces in
    one of the file names? How can you work with this file in Raspberry Pi OS? The
    answer is simple. Whenever you need to use that file name in a command as an argument,
    enclose the file name in double quotes ("). For example, you might obtain a file
    that you have “detached” from an e-mail message from someone on a Windows system,
    such as **latest revisions october.txt**.


    In order to work with this file on a Raspberry Pi OS—that is, to use the file
    name as an argument in a Raspberry Pi OS command—enclose the whole name in double
    quotes. The correct command to rename that file to something shorter would be:


    ```

