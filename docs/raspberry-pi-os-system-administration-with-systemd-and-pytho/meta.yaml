    # 1.2.2 Installing the Raspberry Pi Desktop OS on an Older X86 Architecture PC


    Prerequisites:


    +   1. A USB drive (8 GB or more)

    2. An X86 architecture processor computer to create the USB drive installer on.

    3. A computer to install Raspberry Pi Desktop on.


    > ***Note***

    You can use *one* computer to do both. You have the option to create the installer
    using one computer, and to then install the Raspberry Pi Desktop on that same
    computer.


    +   4. The computer you''re going to install the Raspberry Pi Desktop OS onto
    must be able to boot from a USB thumb drive! That means that you may have to edit
    the boot sequence on that computer, and possibly change the boot device order.


    This section shows how to download and install a 32-bit version of the Raspberry
    Pi OS onto an older computer with an X86 architecture processor, so that you can
    use that PC to run the Raspberry Pi OS. At the time this book was written, specific
    instructions for doing this were found at the website listed in Step 1):


    +   1) Download the Raspberry Pi Desktop

    On a PC, or Linux machine, go to

    www.raspberrypi.org/downloads/raspberry-pi-desktop/

    and download, and save the .iso of the specific version of the software you want
    to install.

    *For our purposes in this book, we downloaded the 32-bit Desktop version of the
    Raspberry Pi OS.*


    +   2) Download and Install Etcher

    From the following website,

    https://etcher.io/

    download and install the Etcher program on your X86 architecture machine. This
    will allow you to take the .iso file you obtained in step 1) and install it on
    a USB thumb drive.'
