- img_proc: true
  md: '# 0.2.1 File and Directory Structure


    When you first open a terminal, or console, window, you are working in the *home
    directory*, or folder, of the autonomous user associated with the username and
    password you used to log into the system with. Whatever directory you are presently
    in is known as the *current working directory*, and there is only one current
    working directory active at any given time. It is helpful to visualize the structure
    of your files and directories using a diagram. Figure 0.1 is an example of a home
    directory and file structure for a user named **bob**. In this figure, directories
    are represented as parallelograms and plain files (e.g., files that contain text
    or binary instructions) are represented as rectangles. A *pathname*, or path,
    is simply a textual way of designating the location of a directory or file in
    the complete file structure of the Raspberry Pi system you are working on.


    For example, the path to the file **myfile2** in Figure 0.1 is `/home/bob/myfile2`.
    The designation of the path begins at the root (/) of the entire file system,
    descends to the folder named **home**, and then descends again to the home directory
    of the user named **bob**.


    ![](img/7ffbe025fa2ba956525d0c51169283f3_20_0.png)


    **FIGURE 0.1**

    Example Directory Structure.'
  merge: -1
