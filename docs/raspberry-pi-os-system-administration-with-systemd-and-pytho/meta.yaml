    1. Install the Gparted Partition Editor software, if it is not already installed
    on your system. This is most efficiently done using the GUI-based Raspberry Pi
    menu Preferences > Add/Remove Software. Also, it would be very efficient to place
    an icon for this software on your desktop.


    2. Properly connect the new media to the system, via either the USB2 or USB3 connectors
    on your Raspberry Pi hardware. USB3 is a faster protocol, and will give you better
    performance when working with or on the new media.


    3. Launch the Gparted Partition Editor, either graphically or from the command
    line, with the command **gparted**. Enter your password in the window that appears.


    4. The Gparted screen opens on screen, as shown in Figure 1.4.


    5. The current media attached to the system appear in the pull-down menu bar at
    the upper right. Make note of all the complete paths to the current disks. For
    example, the boot or root disk might be designated as /dev/mmcblk0 if you''re
    running your system from a microSD card, or /dev/sda if you''re running your system
    from a USB3-attached and mounted SSD, as seen in Figure 1.4.


