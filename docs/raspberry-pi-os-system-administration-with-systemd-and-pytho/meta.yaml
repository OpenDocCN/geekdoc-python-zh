    # 0.2.4 Creating, Deleting, and Managing Directories


    Another critical aspect of file maintenance is the set of procedures and the related
    Raspberry Pi OS commands you use to create, delete, and organize directories in
    your Raspberry Pi OS account on a computer. When moving through the file system,
    you are either ascending or descending to reach the directory you want to use.
    The directory directly above the current working directory is referred to as the
    *parent* of the current working directory. The directory or directories immediately
    under the current working directory are referred to as the *children* of the current
    working directory. The'
