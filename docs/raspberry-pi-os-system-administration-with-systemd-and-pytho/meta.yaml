    You can also ascend to a directory above your home directory, sometimes called
    the parent of your current working directory, by typing the following:


    ```

    $ cd ..

    $

    ```


    In this command, the two periods (..), represent the parent, or branch above the
    current working directory. Don’t forget to type a space character between the
    **d** and the first period. To verify that you have ascended to the parent of
    your home directory, type the following:


    ```

    $ pwd

