  md: '# Raspberry Pi OS System Administration with systemd and Python


    The second in a new series exploring the basics of Raspberry Pi Operating System
    administration, this installment builds on the insights provided in Volume 1 to
    provide a compendium of easy-to-use and essential Raspberry Pi system administration
    for the novice user, with specific focus on Python and Python3.


    The overriding idea behind system administration of a modern, 21st-century Linux
    system such as the Raspberry Pi OS is the use of systemd to ensure that the Linux
    kernel works efficiently and effectively to provide these three foundation stones
    of computer operation and management: computer system concurrency, virtualization,
    and secure persistence. Exercises are included throughout to reinforce the readers''
    learning goals with solutions and example code provided on the accompanying GitHub
    site.


    This book is aimed at students and practitioners looking to maximize their use
    of the Raspberry Pi OS. With plenty of practical examples, projects, and exercises,
    this volume can also be adopted in a more formal learning environment to supplement
    and extend the basic knowledge of a Linux operating system.


    **Robert M. Koretsky** is a retired lecturer in Mechanical Engineering at the
    University of Portland School of Engineering. He previously worked as an automotive
    engineering designer at the Freightliner Corp. in Portland, Oregon. He''s married,
    and has two kids and two grandkids.'
