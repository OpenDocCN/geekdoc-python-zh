    Saving to: ‘Python-3.11.3.tgz’

    ```


    ```

    Python-3.11.3.tgz 100%[===================>] 25.23M 2.06MB/s in 12s


    2023-06-02 06:05:59 (2.16 MB/s) - ‘Python-3.11.3.tgz’ saved [26455738/26455738]

    ```


    ```

    $ tar -zxvf Python-3.11.3.tgz

