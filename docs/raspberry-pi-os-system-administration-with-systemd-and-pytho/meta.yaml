    We have organized the **rsync** examples below based upon whether they apply where
    both source and destination are on a local machine, or where either the source
    or destination is on a remote machine. The examples may also be divided into those
    that deal with files exclusively, or those that deal with directories and files.


    # Local Examples:


    +   1. Using **rsync** to copy a single file named **rsynctest** from the source
    current working directory to the local destination directory **/home/bob/USBint**.
    The files are transferred in "archive" mode, done using the **-a** option of the
    command.

    This ensures that symbolic links, devices, attributes, permissions, ownerships,
    etc. are preserved.


    $ **rsync -av rsynctest /home/bob/USBint**


    2. Copying a single local file in compressed form, with the operation feedback
    presented in human-readable form, from the source **backup.tar** (in the current
    working directory) to the destination directory **/home/bob/backup1** which you
    have permissions on.


    $ **rsync -zvh backup.tar /home/bob/backup1**


    3. Using **rsync** to copy an entire source directory contents from the directory
    named **syncdir** locally to a destination directory locally named **/usr/home/bob/USBint**.
    The slash at the end the designated source means "copy the contents of this directory",
    *not* "copy the directory by name".


    $ **rsync -av syncdir/ /usr/home/bob/USBint**


    4. Copying a single source directory **/home/bob/backups** in compressed form,
    with the operation feedback presented in human-readable form, to the destination
    directory **/home/remote/backups** which you have permissions on.


    $ **rsync -avzh /home/bob/backups /home/remote/backups/**


    5. Copying a single source directory **/home/bob/backups**, and its files and
    sub-directory structure, in compressed form, to the destination directory **/home/remote/backups**
    which you have permissions on.


    $ **rsync -zvr /home/bob/backups /home/remote/backups**'
