    There is another way of running a Python script, which we do *not* use in this\
    \ chapter, but which is useful, and we illustrate it in the next section.\n\n\
    ## 2.3.6.1 Compiling a Script File into Bytecode for Bash Execution\n\nIt is possible\
    \ to run a Python3 script file that you have used the interpreter to compile into\
    \ a portable form of executable code, to execute from the Bash command line. It's\
    \ called the bytecode form. Here's how to do it:\nIn Python, the process of converting\
    \ a script into bytecode is handled by the Python interpreter itself. When you\
    \ run a Python script, the interpreter first compiles it into bytecode before\
    \ executing it. This bytecode is then executed by the Python Virtual Machine (PVM).\n\
    If you want to explicitly generate bytecode from an already-created Python script,\
    \ without using Thonny, or running Python3 itself in a terminal, you can use either\
    \ the **py_compile** module from the Python3 command line, or on the Bash command\
    \ line, with the **-m py_compile** command-line option, to generate the bytecode."
