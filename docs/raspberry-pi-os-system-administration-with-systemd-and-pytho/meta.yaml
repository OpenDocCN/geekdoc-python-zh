    A virtual environment for a computer program, and for an operating system, can
    be simply thought of as a shell within which the program functions autonomously.
    And as we have shown earlier, one of the parts of looking at an operating system
    at a certain level of abstraction, is the ability of the operating system to present
    the illusion of virtual environments. A multi-tasking, multi-programming operating
    system, where all users are presented with this illusion that each individual
    user is working autonomously on her own discreet computer (when in fact many people
    might also working on the same hardware platform), is a basic underlying aspect
    of operating system virtualization. In many respects, and at some other level
    of abstraction, systemd can be thought of as a virtualizing program. It virtualizes
    the Linux kernel, and gives you the illusion that you are working directly with
    it, when in fact you are working in the systemd environment. That way of looking
    at the systemd “super kernel”, and the Linux kernel itself, most importantly assumes
    that the function of these two programs is to help maintain the steady state of
    the hardware and software as the power is turned on, the system is running, or
    it becomes necessary to have the power turned off. In Volume 1, Chapter 2, we
    give a complete and detailed description of systemd and its operation.


    In LXC/LXD containers, any number of different kernels can be running simultaneously
    on one host machine. That means that for LXC/LXD containers, you can be running
    many different distributions of operating systems at the same time on one machine.


    There are other similar virtualization facilities available for the Raspberry
    Pi OS. Docker is another container application suite that allows you to “spin
    up” container instances that are lightweight, in terms of the disk space size
    they occupy. A typical example of one of these lightweight Docker container instances
    is the web server software nginx. In terms of disk space occupied in general,
    the lightest weight facility is a Docker container, the middleweight is an LXC/LXD
    container, and the heavyweight is a VirtualBox guest.


    Both LXC/LXD and Docker rely upon the namespaces system programming API, and the
    clone(2) system call. We briefly mentioned namespaces above.


    ## 1.16.1 Virtualization Applications


    The important application of LXC/LXD containers, in the context of system administration,
    is to provide a measure of system security. For example, it is possible, using
    LXC containers, to isolate a system service or application program in a guest
    operating environment, completely autonomous from the host operating system. A
    service like an SSH server can be run inside of an LXC/LXD container instance,
    and anything that intrudes upon that server and its system space does not intrude
    upon the host operating system space. If LAN or Internet traffic to and from the
    server is compromised in any way, the server can be stopped, restarted, or even
    deleted, without affecting the host operating system. Another example would be
    if a faulty, bug-ridden application program were run in an LXC/LXD container instance,
    it could bring the guest operating system kernel to a halt without in any way
    affecting the host operating system. Those two example cases are probably the
    most useful aspects of maintaining a virtual environment, but there are others.


    In addition, another application of these methodologies is to allow you to use
    and experiment with different operating systems on a single piece of hardware.
    You can play with these other operating systems in a “sandbox” which is isolated
    from your host system, and can access that host system *simultaneously* with the
    virtualized environments.


    ## In-Chapter Exercise


    56. What is KVM, and how does it compare to the virtualization applications we
    describe in this section? Which cloud-based system deploys KVM? Answer this question
    in terms of type of virtualization, size of a virtual machine instances, ease
    of use, and speed of execution of virtual machine instances. Compare these KVM
    criteria to LXC/LXD containers, and Google Cloud and Amazon EC2 instances.


    ## 1.17 Summary


    In this chapter, we use a “learning-by-doing” approach to accomplish the following
    common system administration tasks on the Raspberry Pi OS:


    1. Do various kinds of installation of a 64-bit version onto desktop systems,
    and do a preliminary configuration of those hardware systems and the OS.

    2. Illustrate booting strategies, and how to gracefully bring the system down.

    3. Detail the basics of using systemd to manage system services.

    4. Add additional users and groups to the system, and show how to design and maintain
    user accounts.

    5. Add persistent media to the system, in particular externally mounted USB3 types.
    We also established a framework for connecting and maintaining the file system
    on that media, which classified the file system as either existing on a physical
    medium (physically connected to the computer), a virtual medium (NFSv4, iSCSI),
    or as a specialized pseudo-file system that was not on a medium at all (cgroups,
    proc).

    6. Provide strategies using traditional and generic commands, to backup and archive
    the system files and user files.

    7. Update and maintain the operating system, and add/upgrade/remove user application
    package repository software to both increase functionality and upgrade existing
    packages.

    8. Monitor the performance of the system and tune it for optimal performance characteristics.

    9. Provide strategies for system security to harden the individual desktop computer.

    10. Provide network connectivity strategies, both on a LAN and the Internet.

    11. Give an overview of system virtualization, using LXD/LXC.


    # 2

    ## Python3


    ### 2.0 Objectives


    - To give a quick start into programming with Python3 using Thonny on the Raspberry
    Pi OS

    - To give an overview of the Python3 programming language

    - To cover the basic syntax of Python3

    - To show how to install and run Python3 on a Raspberry Pi system

    - To provide several basic practical examples of using Python3

    - To cover the commands and primitives: python3, Thonny


    ### 2.1 Introduction


    In this chapter, we give a broad introduction to the Python programming language,
    using Python version 3. For the beginner Python3 programmer, we illustrate all
    of its important programming capabilities and syntactic structures, in the context
    of the three predominant computer programming paradigms: virtualization, concurrency,
    and persistence. We first give a brief introduction to Thonny, the Python3 Integrated
    Development Environment (IDE), and then use it throughout the rest of the chapter.
    We show the details of doing an installation of the latest version of Python3.X
    on a Raspberry Pi system, instead of utilizing the default installation that comes
    with the Raspberry Pi OS. We show all of Python3’s critical and basic syntax,
    including numbers and expressions, variables, statements, getting input from the
    user, functions, OOP in Python, modules, saving and executing Python scripts,
    string and sequence operations, and error handling. We also give many basic and
    practical examples, such as another way of writing shell script files, such as
    rewriting Bash and tcsh scripts, basic user file maintenance, backing up files,
    remote copying with the **rsync** command, and graphics using tkinter.


    Finally, we show how thread execution is achieved in Python3, and how OOP can
    be deployed to accomplish it.


    The major component sections of this chapter are as follows:


    - 2.2 A Quick start into Python3 with the Thonny Integrated Development Environment

    - 2.3 An Overview of the Python3 Language

    - 2.4 Python3 Syntax

    - 2.5 Practical Examples


    ## 2.2 A Quick start into Python3 with the Thonny Integrated Development Environment


    The easiest, and quickest, way to use Python3 on the Raspberry Pi is to deploy
    the Thonny Integrated Development Environment (IDE) to interact with Python and
    construct and run program code. This IDE comes pre-installed on the Raspberry
    Pi OS, as does the latest version of Python3 that accompanies your version of
    the Raspberry Pi OS. Thonny is a graphical front end to Python, and as such allows
    the use of toolbar icons, to execute many useful operations expediently, and very
    effectively. This is a somewhat different way of interacting with the Raspberry
    Pi than what we’ve shown previously in Volumes 1 and 2 of this series of books.
    By and large, we’ve used text-based, command line interface operations to perform
    our system administration tasks. Which is *not* to say that in developing Python3
    program code with Thonny, you don’t use text! The Python language implementation
    has a highly structured text syntax and grammar, as you shall see in the sections
    below.


    Everything we do in this chapter is either done with Thonny, or done on the Bash
    command line. But in most of our work below, we only show the areas of the Thonny
    window known as the “Script Area” and the “Shell Area”. And be aware that Thonny
    has two modes, Regular and Simple. Since our work here is for beginners, we show
    the Simple Mode of operation. That’s the default when you launch Thonny. If you
    want to switch to “Regular Mode”, there’s a text link on the right side of the
    Thonny window (hidden in Figure 2.1 because we’re using Simple Mode, and our window
    display is too narrow to show it in that figure) that would allow you to change
    Thonny to a necessarily more complex display, with more pull-down menu choices
    that go beyond what the Simple Mode gives you.'
  mdcn: '将其视为一个独立的系统。在Linux中，LXC和LXD及其衍生的管理系统Docker就是例子。AWS EC2、Google Cloud和iCloud也使用了类似的专有衍生技术。


    计算机程序和操作系统的虚拟环境，可以简单地理解为一个程序在其中自主运行的外壳。正如我们之前所展示的，在某个抽象层次上观察操作系统的一部分，就是操作系统呈现虚拟环境幻觉的能力。一个多任务、多程序的操作系统，让所有用户都产生一种幻觉，即每个用户都在自己独立的计算机上自主工作（而实际上许多人可能在同一个硬件平台上工作），这是操作系统虚拟化的一个基本方面。在许多方面，在另一个抽象层次上，systemd可以被视为一个虚拟化程序。它虚拟化了Linux内核，并给你一种你正在直接与内核交互的幻觉，而实际上你是在systemd环境中工作。这种看待systemd“超级内核”和Linux内核本身的方式，最重要的是假设这两个程序的功能是在电源开启、系统运行或需要关闭电源时，帮助维持硬件和软件的稳定状态。在第一卷第二章中，我们对systemd及其操作进行了完整而详细的描述。


    在LXC/LXD容器中，可以在一台主机上同时运行任意数量的不同内核。这意味着对于LXC/LXD容器，你可以在一台机器上同时运行许多不同的操作系统发行版。


    Raspberry Pi OS还有其他类似的虚拟化设施可用。Docker是另一个容器应用套件，允许你“启动”轻量级的容器实例，就其占用的磁盘空间大小而言。这些轻量级Docker容器实例的一个典型例子是Web服务器软件nginx。就占用的磁盘空间而言，最轻量级的是Docker容器，中等重量的是LXC/LXD容器，重量级的是VirtualBox客户机。


    LXC/LXD和Docker都依赖于命名空间系统编程API和clone(2)系统调用。我们上面简要提到了命名空间。


    ## 1.16.1 虚拟化应用


    LXC/LXD容器在系统管理背景下的重要应用是提供一定程度的系统安全性。例如，使用LXC容器，可以将系统服务或应用程序隔离在客户操作系统环境中，完全独立于主机操作系统。像SSH服务器这样的服务可以在LXC/LXD容器实例内运行，任何侵入该服务器及其系统空间的东西都不会侵入主机操作系统空间。如果进出服务器的局域网或互联网流量以任何方式被破坏，可以停止、重启甚至删除服务器，而不会影响主机操作系统。另一个例子是，如果一个有缺陷、充满错误的应用程序在LXC/LXD容器实例中运行，它可能会使客户操作系统内核停止，而不会以任何方式影响主机操作系统。这两个示例案例可能是维护虚拟环境最有用的方面，但还有其他方面。


    此外，这些方法的另一个应用是允许你在单个硬件上使用和试验不同的操作系统。你可以在一个与主机系统隔离的“沙箱”中玩转这些其他操作系统，并且可以*同时*访问该主机系统和虚拟化环境。


    ## 章节内练习


    56. 什么是KVM，它与我们在本节中描述的虚拟化应用相比如何？哪个基于云的系统部署了KVM？请从虚拟化类型、虚拟机实例大小、易用性和虚拟机实例执行速度等方面回答这个问题。将这些KVM标准与LXC/LXD容器、Google
    Cloud和Amazon EC2实例进行比较。


    ## 1.17 总结


    在本章中，我们采用“边做边学”的方法，在Raspberry Pi OS上完成以下常见的系统管理任务：


    1.  将64位版本安装到桌面系统上，并对这些硬件系统和操作系统进行初步配置。

    2.  说明启动策略，以及如何优雅地关闭系统。

    3.  详细说明使用systemd管理系统服务的基础知识。

    4.  向系统添加额外的用户和组，并展示如何设计和维护用户账户。

    5.  向系统添加持久性媒体，特别是外部挂载的USB3类型。我们还建立了一个连接和维护该媒体上文件系统的框架，将文件系统分类为存在于物理介质上（物理连接到计算机）、虚拟介质（NFSv4、iSCSI）或根本不在介质上的专用伪文件系统（cgroups、proc）。

    6.  提供使用传统和通用命令备份和归档系统文件和用户文件的策略。

    7.  更新和维护操作系统，并添加/升级/删除用户应用程序包仓库软件，以增加功能和升级现有软件包。

    8.  监控系统性能并调整其以获得最佳性能特征。

    9.  提供系统安全策略以加固单个台式计算机。

    10. 提供网络连接策略，包括局域网和互联网。

    11. 概述使用LXD/LXC的系统虚拟化。


    # 2

    ## Python3


    ### 2.0 目标


    -   快速入门使用Raspberry Pi OS上的Thonny进行Python3编程

    -   概述Python3编程语言

    -   涵盖Python3的基本语法

    -   展示如何在Raspberry Pi系统上安装和运行Python3

    -   提供几个使用Python3的基本实用示例

    -   涵盖命令和原语：python3，Thonny


    ### 2.1 简介


    在本章中，我们使用Python版本3对Python编程语言进行广泛介绍。对于Python3初学者程序员，我们在三种主要的计算机编程范式背景下，说明其所有重要的编程能力和语法结构：虚拟化、并发性和持久性。我们首先简要介绍Thonny，Python3集成开发环境（IDE），然后在本章的其余部分使用它。我们展示在Raspberry
    Pi系统上安装最新版本Python3.X的细节，而不是使用Raspberry Pi OS附带的默认安装。我们展示Python3所有关键和基本的语法，包括数字和表达式、变量、语句、从用户获取输入、函数、Python中的OOP、模块、保存和执行Python脚本、字符串和序列操作以及错误处理。我们还提供了许多基本和实用的示例，例如编写shell脚本文件的另一种方式，如重写Bash和tcsh脚本、基本用户文件维护、备份文件、使用**rsync**命令进行远程复制以及使用tkinter进行图形处理。


    最后，我们展示如何在Python3中实现线程执行，以及如何部署OOP来实现它。


    本章的主要组成部分如下：


    -   2.2 使用Thonny集成开发环境快速入门Python3

    -   2.3 Python3语言概述

    -   2.4 Python3语法

    -   2.5 实用示例


    ## 2.2 使用Thonny集成开发环境快速入门Python3


    在Raspberry Pi上使用Python3最简单、最快捷的方法是部署Thonny集成开发环境（IDE）来与Python交互并构建和运行程序代码。这个IDE在Raspberry
    Pi OS上预装，就像你的Raspberry Pi OS版本附带的最新版本Python3一样。Thonny是Python的图形前端，因此允许使用工具栏图标，方便且非常有效地执行许多有用的操作。这是一种与我们在本系列书籍第一卷和第二卷中展示的与Raspberry
    Pi交互方式有些不同的方式。总的来说，我们使用基于文本的命令行界面操作来执行系统管理任务。这*并不是*说在使用Thonny开发Python3程序代码时不使用文本！Python语言实现具有高度结构化的文本语法和语法，正如你将在下面的章节中看到的。


    我们在本章中所做的一切，要么是用Thonny完成的，要么是在Bash命令行上完成的。但在我们下面的大部分工作中，我们只展示Thonny窗口中称为“脚本区域”和“Shell区域”的部分。并且请注意，Thonny有两种模式：常规模式和简单模式。由于我们这里的工作是针对初学者的，我们展示的是简单模式操作。这是你启动Thonny时的默认模式。如果你想切换到“常规模式”，Thonny窗口右侧有一个文本链接（在图2.1中隐藏了，因为我们使用的是简单模式，并且我们的窗口显示太窄，无法在该图中显示），它允许你将Thonny更改为必然更复杂的显示，具有比简单模式提供的更多下拉菜单选项。'
