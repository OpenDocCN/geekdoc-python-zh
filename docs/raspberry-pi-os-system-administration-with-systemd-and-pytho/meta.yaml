    # 1.15 System Security


    There are two meanings of the word “security” relevant here, when referring to
    computers such as the Raspberry Pi. We will consider only one of them.

    The first meaning denotes reliability. In other words, the files and data on the
    disks can be relied upon to be persistent over time. That is the objective of
    not only having persistent media, but also of backing up the operating system
    itself, and the user files and data. For example, if the operating system'
  - "[PAGE 169]\n\ncrashes and cannot be brought back to the exact state it was before\
    \ the crash, the user files and data are archived, secure, and can be recovered\
    \ in total.\n\nThe second meaning denotes free from malicious intrusion by agents\
    \ (such as robotic cracker programs) or objects (such as the processes that are\
    \ the basis of program execution) that do *not* have the authority to access a\
    \ specific part of the system, or any of its components, files, or data. The reasons\
    \ for implementing system security in this second sense, both for an ordinary,\
    \ single-user system, and in a multi-user environment, should be very obvious\
    \ to the beginner. Especially in the light of contemporary privacy issues, and\
    \ the widespread hacking and system penetration forces prevalent on the Internet\
    \ currently.\n\nSince we've already dealt with the issues of persistent media\
    \ in the previous sections, here in this section we deal primarily with the second\
    \ meaning of computer security.\n\nFundamentally, according to this second meaning,\
    \ there are at least four places where you can situate system security measures\
    \ as we show them in this section. They are as follows:\n\n+   1. At the Process\
    \ Level: The process model of the Raspberry Pi OS makes this site most important.\
    \ This model dictates security implemented on processes, via authentication and\
    \ credentialing techniques. Processes that are the basis for program execution,\
    \ and that bridge kernel and user spaces. Examples of these measures are:\n  \
    \  * Setting traditional UNIX permission bits (rwx), the special permission bits\
    \ SUID, SGID, and the sticky bit. The setting of permission bits implies that\
    \ the processes that shell commands create, are the real objects that the permission\
    \ bits files possess are aimed at, or applied to. This is true of everything that\
    \ creates processes in the Raspberry Pi OS, which means user-written programs,\
    \ and all other applications programs and system programs as well.\n    * Deployment\
