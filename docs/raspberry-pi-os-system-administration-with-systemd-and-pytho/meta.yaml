    \ data errors\n```\n\n15. 让我们移除磁盘，然后尝试替换它，以模拟故障：\n\n```\nroot@bob-desktop:~# **rm\
    \ /home/bob/disk1**\nroot@bob-desktop:~# **truncate --size 128m /home/bob/disk1**\n\
    ```\n\n16. 为了在镜像中替换它，我们需要执行以下操作。要附加另一个设备，我们使用 **zpool attach** 指定要附加到的镜像中的现有设备：\n\
    \n```\nroot@bob-desktop:~# **zpool attach data2 /home/bob/disk2 /home/bob/disk1**\n\
    ```\n\n17. 检查池的状态：\n\n```\nroot@bob-desktop:~# **zpool status data2**\npool: data2\n\
    state: ONLINE\nscan: resilvered 206K in 00:00:00 with 0 errors on Tue May 23 06:23:02\
    \ 2023\nconfig:\n\nNAME                     STATE     READ WRITE CKSUM\ndata2\
    \                    ONLINE       0     0     0\n  mirror-0               ONLINE\
    \       0     0     0\n    /home/bob/disk2      ONLINE       0     0     0\n \
    \   /home/bob/disk1      ONLINE       0     0     0\n\nerrors: No known data errors\n\
    ```"
  mdcn: "## ZFS 示例：使用文件模拟磁盘\n\n为了在现有文件系统上练习使用 ZFS，而不是在实际物理介质上部署 ZFS，我们将创建并操作文件来使用重要的\
    \ ZFS 命令。\n\n此外，如果你没有连接 USB3 存储设备，也可以通过此示例来了解 ZFS 是什么。\n\n如果你想在本初步介绍示例中使用已挂载和分区的真实磁盘，请记下其设备名称的完整路径（例如\
    \ /dev/sdb1）。你将销毁这些磁盘上的所有分区信息和数据，因此请确保它们不是必需的！\n\n> ***注意*** 如果你在过程中犯了任何错误，你总是可以通过执行示例末尾显示的清理步骤来重新开始。\n\
    \n**前提条件：** 在你的 Raspberry Pi 硬件上运行的 Ubuntu 系统中安装 ZFS，如第 1.9.1 节所示。\n\n**操作步骤：**\
    \ 按照所示顺序执行以下步骤以完成此示例。\n\n1.  成为 root 用户，然后按如下方式创建四个 128 MB 文件（文件大小至少为 64 MB）：\n\
    \n```\n$ sudo -i\n\nroot@bob-desktop:~#\nroot@bob-desktop:~# truncate --size 128m\
    \ /home/bob/disk1\nroot@bob-desktop:~# truncate --size 128m /home/bob/disk2\n\
    root@bob-desktop:~# truncate --size 128m /home/bob/disk3\nroot@bob-desktop:~#\
    \ truncate --size 128m /home/bob/disk4\n```\n\n使用以下命令检查 /home/bob 目录：\n\n```\n\
    root@bob-desktop:~# ls -lh /home/bob\ntotal 48K\n...\n-rw-r--r-- 1 root root 128M\
    \ May 22 18:47 disk1\n-rw-r--r-- 1 root root 128M May 22 18:47 disk2\n-rw-r--r--\
    \ 1 root root 128M May 22 18:47 disk3\n-rw-r--r-- 1 root root 128M May 22 18:48\
    \ disk4\nOutput truncated...\n```\n\n在此示例中，我们最初创建并使用文件来*模拟*现有文件系统上的磁盘，并将它们命名为\
    \ **disk1**、**disk2**、**disk3** 和 **disk4** 以增强这种错觉。此外，除非另有说明，示例代码中假定当前工作目录为 **/home/bob**。\n\
    \n2.  在创建新池之前，你应该检查是否存在任何现有池，以避免与我们在此处创建的示例池混淆。你可以使用 **zpool list** 命令检查存在哪些池：\n\
    \n```\nroot@bob-desktop:~# **zpool list**\nno pools available\nroot@bob-desktop:~#\n\
    ```\n\n3.  池使用 **zpool create** 创建。我们可以使用文件创建一个单磁盘池，如下所示（你必须使用文件的绝对路径），并检查现在存在的\
    \ zpool：\n\n```\nroot@bob-desktop:~# **zpool create data /home/bob/disk1**\nroot@bob-desktop:~#\
    \ **zpool list**\nNAME   SIZE  ALLOC   FREE  CKPOINT  EXPANDSZ  FRAG  CAP  DEDUP\
    \  HEALTH  ALTROOT\ndata   112M   106K   112M        -         -    2%    -  \
    \ 1.00x  ONLINE  -\n```\n\n4.  现在我们将在新池中创建一个实际文件，检查其大小，并获取其 zpool 列表：\n\n```\n\
    root@bob-desktop:~# **truncate --size 32m /data/data20file**\nroot@bob-desktop:~#\
    \ **ls -lh /data/data20file**\n-rw-r--r-- 1 root root 32M May 22 18:54 /data/data20file\n\
    root@bob-desktop:~# **zpool list**\nNAME   SIZE  ALLOC   FREE  CKPOINT  EXPANDSZ\
    \  FRAG  CAP  DEDUP  HEALTH  ALTROOT\ndata   112M   110K   112M        -     \
    \    -    2%    -   1.00x  ONLINE  -\n```\n\n5.  我们现在将使用 zpool destroy 销毁池 data，并检查现在可用的\
    \ zpool：\n\n```\nroot@bob-desktop:~# **zpool destroy data**\nroot@bob-desktop:~#\
    \ **zpool list**\nNo pools available\n```\n\n6.  **使用文件创建镜像池**\n\n> 由单个磁盘组成的池不提供任何冗余！提供针对物理磁盘故障保护的一种方法是在池中使用镜像磁盘对：\n\
    \n```\nroot@bob-desktop:~# **zpool create data2 mirror /home/bob/disk1 /home/bob/disk2**\n\
    root@bob-desktop:~# **zpool list**\nNAME   SIZE  ALLOC   FREE  CKPOINT  EXPANDSZ\
    \  FRAG  CAP  DEDUP  HEALTH  ALTROOT\ndata2  112M   105K   112M        -     \
    \    -    2%    0%   1.00x  ONLINE  -\n```\n\n7.  要获取有关池 **data2** 的更多信息，我们使用\
    \ **zpool status**：\n\n```\nroot@bob-desktop:~# **zpool status data2**\npool:\
    \ data2\nstate: ONLINE\nconfig:\n\nNAME             STATE     READ WRITE CKSUM\n\
    data2            ONLINE       0     0     0\n  mirror-0       ONLINE       0 \
    \    0     0\n    /home/bob/disk1 ONLINE     0     0     0\n    /home/bob/disk2\
    \ ONLINE     0     0     0\n\nerrors: No known data errors\n```\n\n8.  在 **data2**\
    \ 池中创建一个文件。\n\n```\nroot@bob-desktop:~# **truncate --size 32m /data2/data2file**\n\
    ```\n\n使用以下命令注意向池中添加文件后池的变化：\n\n```\nroot@bob-desktop:~# **zpool list**\nNAME\
    \   SIZE  ALLOC   FREE  CKPOINT  EXPANDSZ  FRAG  CAP  DEDUP  HEALTH  ALTROOT\n\
    data2  112M   154K   112M        -         -    4%    0%   1.00x  ONLINE  -\n\
    ```\n\n磁盘的一部分已被使用，但更重要的是，数据现在冗余地存储在两个磁盘上。\n\n9.  让我们通过用随机数据覆盖第一个“磁盘”标签来测试这种冗余性。如果你使用的是真实介质，如拇指驱动器，你可以将其从计算机上物理移除以实现接下来的操作。\n\
    \n```\nroot@bob-desktop:~# **dd if=/dev/random of=/home/bob/disk1 bs=512 count=1**\n\
    1+0 records in\n1+0 records out\n512 bytes copied, 0.00143395 s, 357 kB/s\n```\n\
    \n10. ZFS 在读写文件时会自动检查错误，但我们可以使用 **zpool scrub** 命令强制进行检查。\n\n```\nroot@bob-desktop:~#\
    \ **zpool scrub data2**\n```\n\n11. 让我们检查池的状态：\n\n```\nroot@bob-desktop:~# **zpool\
    \ status**\npool: data2\nstate: DEGRADED\nstatus: One or more devices could not\
    \ be used because the label is missing or invalid. Sufficient replicas exist for\
    \ the pool to continue functioning in a degraded state.\naction: Replace the device\
    \ using 'zpool replace'.\nsee: https://openzfs.github.io/openzfs-docs/msg/ZFS-8000-4J\n\
    scan: scrub repaired 0B in 00:00:01 with 0 errors on Tue May 23 05:56:49 2023\n\
    config:\n\nNAME                     STATE     READ WRITE CKSUM\ndata2        \
    \            DEGRADED     0     0     0\n  mirror-0               DEGRADED   \
    \  0     0     0\n    /home/bob/disk1      UNAVAIL      0     0     0  corrupted\
    \ data\n    /home/bob/disk2      ONLINE       0     0     0\n\nerrors: No known\
    \ data errors\n```\n\n12. 我们使用 **dd** 命令处理的磁盘显示为 UNAVAIL（不可用）且数据损坏，但整个池没有报告数据错误，我们仍然可以如下读写池：\n\
    \n```\nroot@bob-desktop:~# **truncate --size 32m /data2/data2file2**\nroot@bob-desktop:~#\
    \ **ls -l /data2/**\ntotal 1\n-rw-r--r-- 1 root root 33554432 May 23 05:52 data2file\n\
    -rw-r--r-- 1 root root 33554432 May 23 06:01 data2file2\n```\n\n13. 为了保持冗余性，我们应该用另一个磁盘替换损坏的磁盘。如果你使用的是真实介质，可以使用\
    \ **zpool replace** 命令（zpool 手册页提供了此命令的详细信息）。但是，在此基于文件的示例中，我们只需从镜像中移除磁盘文件并重新创建它。\n\
    \n可以使用 **zpool detach** 命令分离设备，如下所示：\n\n```\nroot@bob-desktop:~# **zpool detach\
    \ data2 /home/bob/disk1**\n```\n\n14. 让我们检查池的状态：\n\n```\nroot@bob-desktop:~# **zpool\
    \ status data2**\npool: data2\nstate: ONLINE\nscan: scrub repaired 0B in 00:00:01\
    \ with 0 errors on Tue May 23 05:56:49 2023\nconfig:\n\nNAME                 \
    \    STATE     READ WRITE CKSUM\ndata2                    ONLINE       0     0\
    \     0\n  /home/bob/disk2        ONLINE       0     0     0\n\nerrors: No known\
    \ data errors\n```\n\n15. 让我们移除磁盘，然后尝试替换它，以模拟故障：\n\n```\nroot@bob-desktop:~# **rm\
    \ /home/bob/disk1**\nroot@bob-desktop:~# **truncate --size 128m /home/bob/disk1**\n\
    ```\n\n16. 为了在镜像中替换它，我们需要执行以下操作。要附加另一个设备，我们使用 **zpool attach** 指定要附加到的镜像中的现有设备：\n\
    \n```\nroot@bob-desktop:~# **zpool attach data2 /home/bob/disk2 /home/bob/disk1**\n\
    ```\n\n17. 检查池的状态：\n\n```\nroot@bob-desktop:~# **zpool status data2**\npool: data2\n\
    state: ONLINE\nscan: resilvered 206K in 00:00:00 with 0 errors on Tue May 23 06:23:02\
    \ 2023\nconfig:\n\nNAME                     STATE     READ WRITE CKSUM\ndata2\
    \                    ONLINE       0     0     0\n  mirror-0               ONLINE\
    \       0     0     0\n    /home/bob/disk2      ONLINE       0     0     0\n \
    \   /home/bob/disk1      ONLINE       0     0     0\n\nerrors: No known data errors\n\
    ```"
