  mdcn: "**queue** 模块的关键特性在于，用于临时阻塞或释放竞争线程的锁和释放机制，是在类的 OOP “公共”方法中实现的，*而无需程序员手动操作！*\n\
    \n为方便起见，我们从 Python 文档中摘录了以下 Queue 类及其异常处理方法的 **queue** 模块定义：\n\n**class queue.Queue(maxsize=0)**\n\
