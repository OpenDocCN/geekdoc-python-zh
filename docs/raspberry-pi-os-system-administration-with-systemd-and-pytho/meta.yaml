  md: '# 1.15.6.2 Securing the File System


    Another important part of securing your Raspberry Pi system is setting proper
    file system security. We covered POSIX1e ACLs in detail in Volume 1, Section 1.14,
    entitled “Raspberry Pi OS POSIX.1e Access Control Lists (ACLs)”.


    # 1.15.7 Process Credentials


    The multi-programming model requires that processes, whether they are generated
    by shell built-ins, external commands, user-written programs, or by any system
    programs that use the **fork**, **exec**, or **execve** system calls, have their
    credentials authenticated before they can make use of objects such as system resources,
    other processes, sockets, or files/inodes.


    Linux systems assign credentials to processes, which associate the process with
    a specific user and a specific group. These credentials are essential in a multi-user
    and multi-programming system because they determine what each process can or cannot
    do in user space and in kernel space, maintaining the autonomy and the security
    of each user''s personal data, and by extension the stability of the system.


    The use of credentials is applied in the process data structure, and in the shared
    resources the processes are trying to access. This is similar to a key and a set
    of tumblers in a lock. Files are the critical resource on the system. Thus, in
    the default ext4 file system, each file is owned by a specific user and belongs
    to a group of users. The owner of a file determines what kind of operations are
    allowed on that file, distinguishing among herself, the file''s user group, and
    all other users on the system. When a process tries to make use of a file, the
    Linux Virtual File System (VFS) always validates whether the access is allowed
    or not, according to the permissions established by the file owner and the process
    credentials. Process credentials and file access permissions are integrated and
    inseparable. This authentication coupling is based upon the forms of file permissions
    we have detailed so far. We have shown that the **chmod** command is the instrument
    for granting these permissions to files and directories.


    # 1.15.7.1 File Permission-Based Mechanisms


    In file-based permission mechanisms, those forms involve managing the basic permission
    bits on files and directories, and the SetUID (SUID), the SetGID (SGID), and sticky
    bit permissions. Examples include setting permissions using DAC on the **/usr/bin/passwd**,
    and **/usr/bin/sudo** commands. Each of these files should maintain their SUID
    permissions, as shown in the following output:'
