    在某些情况下，文件系统可能*完全不*使用持久存储设备或介质！在这种更高层次的抽象中，文件系统可以访问、使用、组织和表示*任何*形式的数据，无论它是持久的还是易失的。我们在这里使用“易失”一词，指的是在某个进程或服务的短暂生命周期内。当然，systemd和Linux内核控制着树莓派上运行的所有进程和服务。*伪*文件系统和特殊用途文件系统（有时称为*合成文件系统*），可以被视为虚拟文件系统，具有这种特性。


