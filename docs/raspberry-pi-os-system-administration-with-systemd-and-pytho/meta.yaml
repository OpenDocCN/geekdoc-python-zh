    # 1.9 Installing ZFS, and **zpool** and **zfs** Command Syntax


    The Zettabyte File System (ZFS) is an advanced journaling file system, and volume
    manager, developed at Sun Microsystems, and has many useful functions and facilities
    for maintaining redundancy and security on server-class computers. But it’s also
    useful for an individual user at home, who wants to ensure the same objectives,
    but on a smaller scale system, such as one using Raspberry Pi hardware. The following
    are the instructions for installing ZFS, and the general syntax forms for the
    **zpool** and **zfs** commands, the two premiere ZFS tools. Everything we show
    in the sections below is done on Ubuntu 23.04, running on a Raspberry Pi 4B, the
    installation of which is shown in Section 1.2.4 above. For a more complete description
    of these two important commands, see the man pages for zfs and zpool on an Ubuntu
    23.04 system (*after* you have installed ZFS according to the instructions given
    below in Section 1.9.1).'
- md: "## 1.9.1 Installing ZFS on an Ubuntu System Running on Raspberry Pi Hardware\n\
    \nInstalling ZFS on Ubuntu is a simple, straight forward operation. Use the following\
    \ command:\n\n```\n$ sudo apt install zfsutils-linux -y\nOutput truncated…\n```\n\
    \nAfter a few minutes, the software is installed. Then, use the following commands\
    \ to verify that ZFS has been installed correctly:\n\n```\n$ zfs --version\nzfs-2.1.9-2ubuntu1\n\
    zfs-kmod-2.1.9-2ubuntu1\n$ zpool list\nno pools available\n$\n```\n\n## 1.9.2\
    \ The Syntax of the zpool and zfs Commands\n\nFollowing are the abbreviated syntax\
    \ of the **zpool** and **zfs** commands, taken from the man pages on our system:\n\
    \n```\n********************************************************************************\n\
    zpool\nSyntax:\nzpool subcommand [options] [option arguments] [command arguments]\n\
    \nPurpose: To create and manage storage pools of virtual devices, such as disk\
    \ drives\n\nCommonly used options/features:\nzpool create name vdev          Creates\
    \ a new pool with name on the specified vdev\nzpool create -o copies=2 name  \
    \ Creates a new pool name with the property copies set to 2\nzpool destroy name\
    \              Destroys, or removes, a pool name\nzpool list name            \
    \     Lists storage space and health of pool name\nzpool scrub name          \
    \      Verifies that the checksums on pool name are correct\nzpool status name\
    \               Displays the status of pool name\n********************************************************************************\n\
    ```\n\n```\nzfs\nSyntax:\nzfs subcommand [options] [option arguments] [command\
    \ arguments]\n\nPurpose: To create and manage datasets or file systems mapped\
    \ to devices such as disk drives\n\nCommonly used options/features:\nzfs create\
    \ name Creates a dataset with name\nzfs create -o copies=2 name Creates a dataset\
    \ name with the property copies set to 2\nzfs destroy name Destroys, or removes,\
    \ a dataset name\nzfs list Lists all datasets\nzfs rollback name Returns dataset\
    \ name to a previous snapshot state\n```\n\n## 1.9.3 ZFS Terminology\n\nThe following\
    \ describes the basic terminology used throughout this section, and as it applies\
    \ to ZFS practice in general as well:\n\n**Boot environment:** A boot environment\
    \ is a bootable environment consisting of a ZFS root file system and, optionally,\
    \ other file systems mounted underneath it. Exactly one boot environment can be\
    \ active at a time.\n\n> ***Warning***: This warning applies at the time of the\
    \ writing of this book, and it is important to realize that if you want to create\
    \ and use ZFS on any system other than for the practice Example 1.7 below, you\
    \ must have an additional storage device, or devices, attached to your hardware.\
    \ This could be additional externally mounted SSDs, M.2 NVMe devices, hard drives,\
    \ or USB2 or USB3 thumb drives. We have found that if you attempt to create zpools\
    \ on your system or boot disk, this will render that disk unbootable!\n\n**Checksum:**\
    \ A 256-bit hash of the data in a file system block. The checksum capability can\
    \ range from the simple and fast fletcher4 (the default) to cryptographically\
    \ strong hashes such as SHA256.\n\n**Clone:** A file system whose initial contents\
    \ are identical to the contents of a ZFS snapshot.\n\n**Dataset:** A generic name\
    \ for the following ZFS components: clones, file systems, snapshots, and volumes.\
    \ Each dataset is identified by a unique name in the ZFS name space. Datasets\
    \ are identified using the following format:\n\n`pool/path[@snapshot]`\n\nwhere:\n\
    - **pool** Identifies the name of the storage pool that contains the dataset\n\
    - **path** A slash-delimited pathname for the dataset component\n- **snapshot**\
    \ An optional component that identifies a snapshot of a dataset\n\n**Deduplication:**\
    \ Data deduplication is a method of reducing storage capacity needs by eliminating\
    \ redundant data. Only one unique instance of the data is actually retained on\
    \ storage media. Redundant data is replaced with a pointer to the unique data\
    \ copy.\n\n**File system:** A ZFS dataset of type file system that is mounted\
    \ within the standard system namespace and behaves like other file systems.\n\n\
    **Mirror:** A vdev that stores identical copies of data on two or more disks,\
    \ in a variety of ways defined by Redundant Array of Independent Disks (RAID)\
    \ specifications. If any disk in a mirror fails, any other disk in that mirror\
    \ can provide the same data, according to those RAID specifications.\n\n**Pool:**\
    \ A logical group of devices describing the layout and physical characteristics\
    \ of the available storage. Disk space for datasets is allocated from a pool.\n\
    \n**RAIDZ:** A virtual device that stores data and parity on multiple disks, using\
    \ the RAID specifications.\n\n**Resilvering:** The process of copying data from\
    \ one device to another device is known as resilvering. For example, if a mirror\
    \ device is replaced or taken offline, the data from an up-to-date mirror device\
    \ is copied to the newly restored mirror device. This process is referred to as\
    \ mirror resynchronization in traditional volume management.\n\n**Slice:** A disk\
    \ partition created with partitioning software.\n\n**Snapshot:** A read-only copy\
    \ of a file system or volume at a given point in time.\n\n**Vdev (virtual device):**\
    \ A whole disk, a disk partition, a file, or a collection of the previous, usually\
    \ all of the same type. There is no performance penalty for using disk partitions\
    \ rather than entire disks. The write cache is disabled for partitions, thus incurring\
    \ a performance penalty. Using files as vdevs is discouraged, except for experimenting\
    \ and testing purposes as we do in this chapter for beginners! A collection of\
    \ vdevs is a mirror.\n\n**Volume:** A dataset that represents a block device.\
    \ For example, you can create a ZFS volume as a swap device.\n\n![ZFS Components.](img/7ffbe025fa2ba956525d0c51169283f3_109_0.png)\n\
    \nFIGURE 1.8\nZFS Components.\n\n## 1.9.4 How ZFS Works\n\nThe following simplified\
    \ statement summarizes the operation of ZFS:\n\n**Create zpool mapped to vdev\
    \ > Create ZFS file system(s) on zpool > Add files**\n\nSo, simply stated, you\
    \ create a named zpool first, which at the time it is created is mapped or associated\
    \ with a vdev, such as an external, USB3 medium. Then you create one or more file\
    \ systems in that zpool; you add files to those file systems. Finally, you manage\
    \ the files, file systems, pools, and vdevs using the appropriate ZFS commands.\n\
    \nWorking with ZFS is a matter of efficiently and easily managing zpools that\
    \ have vdevs \"mapped\" to them, and then managing file systems, and their files,\
    \ in those zpools.\n\nFigure 1.8 shows these relationships between files, datasets\
    \ (file systems), pools, and disks. **Pool 1** has two disks mapped to it, and\
    \ a dataset with a number of files in it. **Pool 2** has a single disk mapped\
    \ to it, and has a dataset in it. This layering of files and datasets, pools,\
    \ and disks is the basic structure of ZFS.\n\n## 1.9.5 Important ZFS Concepts\n\
    \nSome very important points have to be made here:\n\n1. Only one zpool can be\
    \ mapped or associated with any vdev. So if you want to create a zpool on a physical\
    \ hard disk or one of its slices, no other existing active zpool can be mapped\
    \ to that vdev!\n\n2. There are six types of vdev in ZFS:\n   - a. Disk (default):\
    \ The physical hard drives in your system, usually the whole drive or primary\
    \ slice.\n   - b. File: The absolute path of preallocated files/images.\n   -\
    \ c. Raidz1/2/3: Nonstandard distributed parity-based software RAID levels.\n\
    \   - d. Spare: Hard drives marked as a *hot spare* for ZFS software RAID.\n \
    \  - e. Cache: Device used for a level-2 adaptive read cache (L2ARC).\n   - f.\
    \ Log: A separate log (SLOG) called the ZFS intent log (ZIL).\n\n3. Unlike a traditional\
    \ file system, where the mount point of the file system begins at a particular\
    \ logical drive letter, the default mount point for a zpool is root (/). This\
    \ is how the path to a file named **test.txt** appears when it is in the zpool\
    \ named **data1** on the file system named **bobs**:\n\n   **/data1/bobs/test.txt**\n\
    \n   Here's how the path to a file named **test.txt** appears on a traditional\
    \ file system:\n\n   **C:\\Users\\bob\\Desktop\\test.txt**\n\n   When you want\
    \ a ZFS file system to expand onto more than one disk, for example, you add more\
    \ disks to the zpool.\n\n4. A zpool can be enlarged by adding more devices, but\
    \ it cannot be shrunk (at least not at this time)!\n\n## 1.9.6 Basic ZFS Example\n\
    \nIn this section we present an instructive, introductory example of how to work\
    \ with ZFS. It is expected that for you to get the full benefit from it, you do\
    \ it and the attendant In-Chapter Exercises in the order presented.\n\n**Example\
    \ 1.7: The zpool Command: Using Files Instead of Disks as Vdevs**\n\n**Objective:**\
    \ To introduce the **zpool** command, implemented on files instead of disks, and\
    \ to show forms of ZFS pool creation and mirroring.\n\n**Introduction:** A vdev,\
    \ as defined previously, can be a physical device such as a disk drive, a file,\
    \ a single slice on a hard disk drive, or a collection of devices. Before beginning\
    \ to use ZFS on physical"
  mdcn: "## 1.9.1 在运行于树莓派硬件上的 Ubuntu 系统中安装 ZFS\n\n在 Ubuntu 上安装 ZFS 是一个简单直接的操作。请使用以下命令：\n\
    \n```\n$ sudo apt install zfsutils-linux -y\nOutput truncated…\n```\n\n几分钟后，软件安装完成。然后，使用以下命令验证\
    \ ZFS 是否已正确安装：\n\n```\n$ zfs --version\nzfs-2.1.9-2ubuntu1\nzfs-kmod-2.1.9-2ubuntu1\n\
    $ zpool list\nno pools available\n$\n```\n\n## 1.9.2 zpool 和 zfs 命令的语法\n\n以下是\
    \ **zpool** 和 **zfs** 命令的简写语法，摘自我们系统上的手册页：\n\n```\n********************************************************************************\n\
    zpool\nSyntax:\nzpool subcommand [options] [option arguments] [command arguments]\n\
    \nPurpose: To create and manage storage pools of virtual devices, such as disk\
    \ drives\n\nCommonly used options/features:\nzpool create name vdev          Creates\
    \ a new pool with name on the specified vdev\nzpool create -o copies=2 name  \
    \ Creates a new pool name with the property copies set to 2\nzpool destroy name\
    \              Destroys, or removes, a pool name\nzpool list name            \
    \     Lists storage space and health of pool name\nzpool scrub name          \
    \      Verifies that the checksums on pool name are correct\nzpool status name\
    \               Displays the status of pool name\n********************************************************************************\n\
    ```\n\n```\nzfs\nSyntax:\nzfs subcommand [options] [option arguments] [command\
    \ arguments]\n\nPurpose: To create and manage datasets or file systems mapped\
    \ to devices such as disk drives\n\nCommonly used options/features:\nzfs create\
    \ name Creates a dataset with name\nzfs create -o copies=2 name Creates a dataset\
    \ name with the property copies set to 2\nzfs destroy name Destroys, or removes,\
    \ a dataset name\nzfs list Lists all datasets\nzfs rollback name Returns dataset\
    \ name to a previous snapshot state\n```\n\n## 1.9.3 ZFS 术语\n\n以下描述了本节中使用的基本术语，这些术语也普遍适用于\
    \ ZFS 实践：\n\n**启动环境：** 启动环境是一个可启动的环境，由一个 ZFS 根文件系统以及可选的、挂载在其下的其他文件系统组成。同一时间只能有一个启动环境处于活动状态。\n\
    \n> ***警告***：此警告适用于本书撰写之时，重要的是要认识到，如果你想在除下面的实践示例 1.7 之外的任何系统上创建和使用 ZFS，你必须将额外的存储设备（一个或多个）连接到你的硬件上。这可以是额外的外置\
    \ SSD、M.2 NVMe 设备、硬盘驱动器或 USB2 或 USB3 优盘。我们发现，如果你尝试在系统盘或启动盘上创建 zpool，这将导致该磁盘无法启动！\n\
    \n**校验和：** 文件系统块中数据的 256 位哈希值。校验和功能可以从简单快速的 fletcher4（默认）到密码学强度高的哈希（如 SHA256）不等。\n\
    \n**克隆：** 一个初始内容与 ZFS 快照内容完全相同的文件系统。\n\n**数据集：** 以下 ZFS 组件的通用名称：克隆、文件系统、快照和卷。每个数据集在\
    \ ZFS 命名空间中由一个唯一的名称标识。数据集使用以下格式标识：\n\n`pool/path[@snapshot]`\n\n其中：\n- **pool**\
    \ 标识包含该数据集的存储池的名称\n- **path** 数据集组件的以斜杠分隔的路径名\n- **snapshot** 一个可选组件，标识数据集的快照\n\
    \n**去重：** 数据去重是一种通过消除冗余数据来减少存储容量需求的方法。实际上只保留数据的一个唯一实例存储在存储介质上。冗余数据被替换为指向唯一数据副本的指针。\n\
    \n**文件系统：** 一种文件系统类型的数据集，挂载在标准系统命名空间内，其行为与其他文件系统类似。\n\n**镜像：** 一种虚拟设备，它以独立磁盘冗余阵列（RAID）规范定义的多种方式，在两个或多个磁盘上存储相同的数据副本。如果镜像中的任何磁盘发生故障，根据这些\
    \ RAID 规范，该镜像中的任何其他磁盘都可以提供相同的数据。\n\n**池：** 描述可用存储布局和物理特性的设备逻辑组。数据集的磁盘空间从池中分配。\n\
    \n**RAIDZ：** 一种虚拟设备，使用 RAID 规范在多个磁盘上存储数据和奇偶校验信息。\n\n**重同步：** 将数据从一个设备复制到另一个设备的过程称为重同步。例如，如果镜像设备被替换或离线，数据将从最新的镜像设备复制到新恢复的镜像设备。这个过程在传统的卷管理中被称为镜像重新同步。\n\
    \n**切片：** 使用分区软件创建的磁盘分区。\n\n**快照：** 文件系统或卷在给定时间点的只读副本。\n\n**Vdev（虚拟设备）：** 一个完整的磁盘、一个磁盘分区、一个文件，或上述项目的集合，通常所有项目类型相同。使用磁盘分区而不是整个磁盘不会带来性能损失。分区的写缓存被禁用，因此会带来性能损失。不鼓励使用文件作为\
    \ vdev，除非是为了实验和测试目的，就像我们在本章中为初学者所做的那样！vdev 的集合就是一个镜像。\n\n**卷：** 代表块设备的数据集。例如，你可以创建一个\
    \ ZFS 卷作为交换设备。\n\n![ZFS 组件。](img/7ffbe025fa2ba956525d0c51169283f3_109_0.png)\n\
    \n图 1.8\nZFS 组件。\n\n## 1.9.4 ZFS 的工作原理\n\n以下简化的陈述总结了 ZFS 的操作：\n\n**创建映射到 vdev\
    \ 的 zpool > 在 zpool 上创建 ZFS 文件系统 > 添加文件**\n\n因此，简单来说，你首先创建一个命名的 zpool，在创建时它被映射或关联到一个\
    \ vdev，例如一个外置的 USB3 介质。然后你在该 zpool 中创建一个或多个文件系统；你将文件添加到这些文件系统中。最后，你使用适当的 ZFS 命令管理文件、文件系统、池和\
    \ vdev。\n\n使用 ZFS 就是高效且轻松地管理那些有 vdev “映射”到它们的 zpool，然后管理这些 zpool 中的文件系统及其文件。\n\
    \n图 1.8 显示了文件、数据集（文件系统）、池和磁盘之间的这些关系。**池 1** 映射了两个磁盘，并包含一个带有多个文件的数据集。**池 2** 映射了一个磁盘，并包含一个数据集。文件和数据集、池和磁盘的这种分层结构是\
    \ ZFS 的基本结构。\n\n## 1.9.5 重要的 ZFS 概念\n\n这里必须强调一些非常重要的点：\n\n1.  任何 vdev 只能映射或关联一个\
    \ zpool。因此，如果你想在物理硬盘或其某个切片上创建一个 zpool，那么其他任何现有的活动 zpool 都不能映射到该 vdev！\n\n2.  ZFS\
    \ 中有六种类型的 vdev：\n    - a. 磁盘（默认）：你系统中的物理硬盘驱动器，通常是整个驱动器或主分区。\n    - b. 文件：预分配文件/镜像的绝对路径。\n\
    \    - c. Raidz1/2/3：非标准的基于分布式奇偶校验的软件 RAID 级别。\n    - d. 备用盘：标记为 ZFS 软件 RAID *热备用*\
    \ 的硬盘驱动器。\n    - e. 缓存：用于二级自适应读取缓存（L2ARC）的设备。\n    - f. 日志：称为 ZFS 意图日志（ZIL）的独立日志（SLOG）。\n\
    \n3.  与传统文件系统不同（其文件系统的挂载点从特定的逻辑驱动器号开始），zpool 的默认挂载点是根目录（/）。当文件名为 **test.txt**\
    \ 的文件位于名为 **data1** 的 zpool 中名为 **bobs** 的文件系统上时，其路径如下所示：\n\n    **/data1/bobs/test.txt**\n\
    \n    以下是传统文件系统上名为 **test.txt** 的文件的路径：\n\n    **C:\\Users\\bob\\Desktop\\test.txt**\n\
    \n    例如，当你希望 ZFS 文件系统扩展到多个磁盘时，你需要向 zpool 添加更多磁盘。\n\n4.  zpool 可以通过添加更多设备来扩容，但不能缩小（至少目前不能）！\n\
    \n## 1.9.6 基本 ZFS 示例\n\n在本节中，我们将提供一个具有指导意义的入门示例，介绍如何使用 ZFS。预计为了让你从中获得最大收益，你需要按照呈现的顺序完成它以及本章内的配套练习。\n\
    \n**示例 1.7：zpool 命令：使用文件而非磁盘作为 Vdev**\n\n**目标：** 介绍 **zpool** 命令，该命令在文件而非磁盘上实现，并展示\
    \ ZFS 池创建和镜像的形式。\n\n**简介：** 如前所述，vdev 可以是物理设备（如硬盘驱动器）、文件、硬盘驱动器上的单个切片，或设备的集合。在开始在物理设备上使用\
    \ ZFS 之前..."
