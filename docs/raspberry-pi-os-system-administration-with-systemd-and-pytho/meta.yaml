    # 1.2.4 How to Install Ubuntu Desktop onto Raspberry Pi Hardware


    In preparation for showing exterior media additions that can use the Zettabyte
    File System (ZFS), we provide you with a technique in this section that allows
    you to install another operating system, 64-bit Ubuntu 23.04 Desktop, onto either
    a Raspberry Pi 4B or Pi 400 hardware. We do this using a microSD card to boot
    and run the system from.


    Although this presentation might seem antithetical to the theme of the volumes
    of this book (after all, they are about the Raspberry Pi OS!), there is great
    value in learning about ZFS, and its use as a modern file system for Linux, and
    the Raspberry Pi OS itself. Currently, with the upstream operating system (Debian
    Bullseye), and the 6.X Linux kernel, the downstream Raspberry Pi OS does *not
    easily* support the installation of ZFS, especially for beginners. But that will
    more than likely change, particularly when the Raspberry Pi 5 is released, and
    the Raspberry Pi OS version for it stabilizes.


    Background:


    Probably the most popular, and well supported downstream release of the Debian
    family of Linux, is Ubuntu. And Canonical, the stewards of that system, have made
    a concerted effort to not only have the latest release of their software available
    for Raspberry Pi hardware, but also have very strongly supported ZFS on their
    releases. In what follows, we show a step-by-step installation of 64-bit Ubuntu
    23.04 Desktop onto a Raspberry Pi 4B. These steps work just as well for the Pi
    400.


    Prerequisites:


    +   a. A microSD card with a minimum size of 9 GB. We used a 32 GB microSD card.

    b. A Raspberry Pi with a microSD USB-connected card reader and cable, or attached
    drive bay.

    c. A Raspberry Pi 4B or Pi 400 that recognizes the mounted microSD card from the
    above steps!

    d. An HDMI Monitor connected to the Raspberry Pi, and a USB keyboard.


    Requirements: Do the steps below, in the order shown, to complete the requirements
    for this example.


    +   1. At the command line, type the following command:


    ```

    $ sudo snap install rpi-imager

    ```'
