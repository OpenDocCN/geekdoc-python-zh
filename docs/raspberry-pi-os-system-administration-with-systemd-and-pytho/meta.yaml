    \ **ufw limit ssh/tcp** allow rate limiting on ssh to prevent brute-force attacks\n\
    - **ufw delete deny 80/tcp** delete the rule denying tcp connections on port 80\n\
    - **ufw delete 3** delete rule 3, number determined with the status command\n\n\
    We give several **ufw** use case and rules examples in Volume 1, Section 1.16.2.\n\
    \n## 1.15.6 Persistent Media Security\n\nThere are two basic strategies a system\
    \ administrator can take to secure the persistent media, such as SSD, USB3-mounted\
    \ media, and also to harden the file system structure on those media. The actual\
    \ techniques of these two strategies overlap considerably with the other system\
    \ administration tasks we have shown in the other Sections of this chapter.\n\n\
    An example of an overlapping technique is found in the adding of additional media\
    \ to the system, perhaps using ZFS to provide redundancy on these disks per the\
    \ recommended storage model that we have shown. This allows a system administrator\
    \ to segregate the user files and other components of the system. That segregation\
    \ provides a way of isolating those resources, and therefore allows them to be\
    \ more securely accessed. And adding additional media addresses the administrator's\
    \ responsibility to backup important data, most critically user data files.\n\n\
    The first strategy involves providing additional physical media, or additional\
    \ partitions on existing media, to accommodate user data files, or other components\
    \ of your Raspberry Pi OS file system.\n\nThe second strategy involves designing\
    \ and implementing file and directory access permissions on those additional partitions\
    \ or media, so that process authentication through the various forms of process\
    \ credentialing can be achieved.\n\n## 1.15.6.1 Persistent Media Allocations For\
    \ /home\n\nAccording to the recommended user data storage model we provided above,\
    \ you should put the /home subdirectories, where all of your user directories\
    \ are located, on its own physical medium. That is a traditional system administration\
    \ technique of designing your file system structure. When you add mount options\
    \ to a single formatted partition on this medium, you can do the following:\n\n\
    - Set the nosuid option to prevent SUID and SGID permission-enabled executable\
