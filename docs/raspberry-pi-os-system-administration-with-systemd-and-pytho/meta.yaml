    \n你的树莓派是一台片上系统（SoC）计算机，内置了高级精简指令集机器（ARM）芯片，这可能使其与你可能用于计算（无论是教育、商业还是娱乐）的其他传统X-86架构机器有显著不同。因此，在树莓派操作系统安装前后，你所做的考虑也有些不同。以下各节详细说明了这些内容。在撰写本书时，没有简单的方法可以添加RAM，或包含其他总线架构连接到"
