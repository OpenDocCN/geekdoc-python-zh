    \ must have a single line in the file with seven colon-delimited fields that contain\
    \ the configuration for each user. The table, or chart design with its entries,\
    \ determines what is in the file.\n\n## 1.5.2 Adding and Maintaining Groups in\
    \ a Text-Based Interface\n\nThe easiest and most efficient way to create and manage\
    \ user accounts and groups is by using Webmin. From Webmin's main menu, you can\
    \ make the System > Users and Groups choice to view, create, and delete both.\
    \ We certainly recommend that, but for text-based interaction in a console or\
    \ terminal window, you can use the **addgroup** and **adduser** commands to manage\
    \ groups.\nFollowing is an example of how to add and manage groups.\n\n### Example\
    \ 1.3 Adding and managing groups and users from the command line\n\n**Objectives:**\
    \ To add a new group, and manage those users that are in that group.\n**Prerequisites:**\
    \ Having completed Examples 1.1 and 1.2, having default groups available on your\
