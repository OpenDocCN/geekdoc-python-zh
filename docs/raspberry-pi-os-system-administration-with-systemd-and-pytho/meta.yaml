    the default ext4 file system, each file is owned by a specific user and belongs
    to a group of users. The owner of a file determines what kind of operations are
    allowed on that file, distinguishing among herself, the file''s user group, and
    all other users on the system. When a process tries to make use of a file, the
    Linux Virtual File System (VFS) always validates whether the access is allowed
    or not, according to the permissions established by the file owner and the process
    credentials. Process credentials and file access permissions are integrated and
    inseparable. This authentication coupling is based upon the forms of file permissions
    we have detailed so far. We have shown that the **chmod** command is the instrument
    for granting these permissions to files and directories.


    # 1.15.7.1 File Permission-Based Mechanisms


    In file-based permission mechanisms, those forms involve managing the basic permission
    bits on files and directories, and the SetUID (SUID), the SetGID (SGID), and sticky
    bit permissions. Examples include setting permissions using DAC on the **/usr/bin/passwd**,
    and **/usr/bin/sudo** commands. Each of these files should maintain their SUID
    permissions, as shown in the following output:'
- md: '## 1.15.8 Disk Encryption


    When the ordinary user wants to do disk encryption for security purposes, the
    most critical thing is the scope of encryption she wants to implement. For example,
    she can encrypt the entire boot/system medium she is installing Linux on at the
    time she installs the system. Or she can do a post-installation encryption of
    the entire microSD card, selected partitions on it, selected directories, or individual
    files. What governs the scope of encryption depends a great deal on the particular
    use case. It is critical to know why you want to do encryption when considering
    all of the possible strategies of encrypting your persistent media.


    In Volume 1, Section 1.17, entitled “Encrypting Directories and Files Using **tar**
    and **gpg**”, we detail a large-scope encryption strategy. In that section, and
    its sub-sections, we also show how to deploy a smaller-scope encryption strategy
    of encrypting a directory, and a particular important file in your home directory,
    as well as the files on a USB thumb drive.


    ### 1.15.8.1 The Meaning of Encryption


    Encryption uses a very developed science, known as *cryptography*, to implement
    data hiding. Cryptography is used on a Raspberry Pi system to encode data to hide
    it from unprivileged users, and then decrypt, or decode the data for privileged
    users. On the Raspberry Pi OS, the following are some of the objects that can
    be possible targets for encryption:


    - Individual files

    - Volumes or individual partitions

    - Web page connections

    - Network connections

    - Backup file objects on additional hard disks or other media

    - Compressed directories or files


    Encryption/decryption basically uses a variety of mathematical algorithms to treat
    the above targets. These algorithms are called *cryptographic ciphers*. The important
    terms to know when dealing with cryptography are *plain text* and *cypher text*.
    Plain text is the unencrypted, or decrypted format, and cypher text is the encrypted
    format.


    The details of encryption algorithms, their mathematics and complexity, are not
    as useful to the ordinary user as knowing where and when to apply them. That is,
    at the system, whole disk, partition, directory, or individual file levels. And
    also knowing why you want to use them, and carefully reasoning and designing your
    strategies for implementing these algorithms with the common command-line tools.


    ### In-Chapter Exercise


    55. Which of the encryption strategies, entire disk, selected partitions, selected
    directories, or individual files, would you deploy on your Raspberry Pi system,
    and for what specific reasons? After deciding upon one, or even multiple encryption
    strategies on your system that you would want to use, implement those strategies.


    ## 1.16 Virtualization Methodologies


    As stated earlier, the three governing functions that the Linux kernel performs
    in order to maintain the system in a steady state are Virtualization, Concurrency,
    and Persistence. At a certain level of abstraction, the kernel itself, and its
    global resources, are virtualized by systemd. In this section, we introduce namespaces
    and LXC/LXD, which also do forms of “virtualizing”.


    Historically speaking, to perform the kernel functions of Virtualization and Concurrency,
    the multiprogramming paradigm was established. Multiprogramming is a computer
    system model where the computer hardware and software would be shared by several
    programs (and users) running and working on the system simultaneously. This led
    to the need for autonomy and sharing among programs. The needs of multiprogramming
    are closely tied to the concept of “virtual memory” in computers as well. In turn,
    this virtualization of memory is directly related to the virtualization of the
    entire operating system itself, as we describe it in this chapter.


    Computer hardware virtualization is the simulation, to various degrees, of hardware
    platforms, parts of them, or only the functionality required to run one or more
    operating systems (“OSs”). It abstracts and effectively “hides” the physical characteristics
    of the hardware from the users. Traditionally, the software that controlled virtualized
    machines was known as the hypervisor. Currently, the hypervisor is often called
    a Virtual Machine Monitor (VMM).


    Platform virtualization is accomplished on any given hardware by host software
    (the hypervisor), which creates a simulated computer environment, a VM, for its
    guest software. The guest software can be as small as a single user application,
    or even as large as a complete OS. The guest software executes as if it were running
    directly on the physical hardware.


    Virtualization comes with some performance disadvantages, both in resources required
    to run the hypervisor and in reduced performance on the VM guest compared with
    running applications on a non-virtualized host physical machine. A VM can be more
    easily controlled and inspected from outside than a physical one, and its configuration
    is more flexible. This is very useful in kernel development and for teaching OS
    courses. A new VM can be implemented as needed without the need for an up-front
    hardware purchase. A VM can easily be moved from one physical machine to another
    as needed. An unrecoverable fault inside a VM guest does not harm the host system,
    so there is no risk of crashing the host OS.


    Examples of virtualization implementations are as follows:


    - Running one or more applications that are not supported by the host OS: A VM
    running the required guest OS could allow the desired applications to be run,
    without altering the host OS.

    - Evaluating an alternate OS: The new OS could be run within a VM, without altering
    the host OS.

    - Server virtualization: Multiple virtual servers, in what are often referred
    to as “containers”, could be run on a single physical server, to utilize more
    fully the hardware resources of the physical server. A cloud computing example
    of this is Amazon Web Services Elastic Cloud Computing (AWS EC2) virtual servers.

    - Duplicating specific environments: A VM could, depending on the virtualization
    software used, be duplicated and installed on multiple hosts, or restored to a
    previously backed-up system state.

    - Creating a protected environment: If a guest OS running on a VM becomes damaged
    in a way that is difficult to repair, such as may occur when testing, the VM can
    be discarded without harm to the host system, and a clean copy used next time.


    Primary actual contemporary virtualization techniques are as follows:


    - Full virtualization: In full virtualization, the VM simulates enough hardware
    to allow a complete “guest” OS, one designed for the same processor instruction
    set architecture (ISA) to be run in isolation. Examples for Linux systems running
    on X86 ISAs or ARM architectures include VirtualBox, Parallels Workstation, Oracle
    VM, Virtual Server, Hyper-V, VMware Workstation, and VMware.

    - Hardware-assisted virtualization: In hardware-assisted virtualization, the hardware
    provides architectural support that facilitates building a VMM and allows guest
    OSs to be run in isolation. Examples of virtualization platforms adapted to such
    hardware include KVM, VMware Workstation, VMware Fusion, Hyper-V, Xen, Oracle
    VM server for SPARC, and VirtualBox.

    - Partial virtualization: In partial virtualization, including address space virtualization,
    the VM simulates multiple instances of much of an underlying hardware environment,
    particularly address spaces.

    - Paravirtualization: In paravirtualization, the VM does not necessarily simulate
    hardware, but instead (or in addition) offers a special application programmer’s
    interface (API) that can only be used by modifying the “guest” OS. For this to
    be possible, the “guest” OS’s source code must be available.

    - OS-level virtualization: In OS-level virtualization, a physical server is virtualized
    at the OS level, enabling multiple isolated and secure virtualized servers to
    run on a single physical server. The “guest” OS environments share the same running
    instance of the OS as the host system. Thus, the same OS kernel is also used to
    implement the “guest” environments, and applications running in a given “guest”
    environment'
  mdcn: '## 1.15.8 磁盘加密


    当普通用户出于安全目的想要进行磁盘加密时，最关键的是她想要实施的加密范围。例如，她可以在安装系统时加密整个安装Linux的启动/系统介质。或者，她可以在安装后对整个microSD卡、其上的选定分区、选定目录或单个文件进行加密。加密范围的确定很大程度上取决于具体的使用场景。在考虑所有可能的持久化媒体加密策略时，了解你为何要进行加密至关重要。


    在第1卷第1.17节“使用**tar**和**gpg**加密目录和文件”中，我们详细阐述了一种大范围的加密策略。在该节及其子节中，我们还展示了如何部署一种较小范围的加密策略，即加密一个目录以及你主目录中的一个特定重要文件，以及USB拇指驱动器上的文件。


    ### 1.15.8.1 加密的含义


    加密使用一门非常发达的科学，即*cryptography*（密码学），来实现数据隐藏。在树莓派系统上，密码学用于编码数据以将其从非特权用户处隐藏，然后为特权用户解密或解码数据。在树莓派操作系统上，以下是一些可能成为加密目标的对象：


    - 单个文件

    - 卷或单个分区

    - 网页连接

    - 网络连接

    - 附加硬盘或其他介质上的备份文件对象

    - 压缩的目录或文件


    加密/解密基本上使用各种数学算法来处理上述目标。这些算法被称为*cryptographic ciphers*（密码算法）。处理密码学时需要了解的重要术语是*plain
    text*（明文）和*cypher text*（密文）。明文是未加密或已解密的格式，密文是加密后的格式。


    加密算法的细节、其数学原理和复杂性，对于普通用户来说，不如知道何时何地应用它们有用。也就是说，在系统、整个磁盘、分区、目录或单个文件级别上应用。同时也要知道你为何要使用它们，并仔细推理和设计使用常用命令行工具实现这些算法的策略。


    ### 章节内练习


    55. 你会在你的树莓派系统上部署哪种加密策略——整个磁盘、选定分区、选定目录还是单个文件？具体原因是什么？在决定好你想要在系统上使用的一种甚至多种加密策略后，请实施这些策略。


    ## 1.16 虚拟化方法


    如前所述，Linux内核为了维持系统稳定状态而执行的三个主要功能是虚拟化、并发和持久化。在某个抽象层面上，内核本身及其全局资源由systemd进行虚拟化。在本节中，我们介绍命名空间和LXC/LXD，它们也执行某种形式的“虚拟化”。


    从历史上看，为了执行内核的虚拟化和并发功能，建立了多道程序设计范式。多道程序设计是一种计算机系统模型，其中计算机硬件和软件由同时在系统上运行和工作的多个程序（和用户）共享。这导致了程序间自主性和共享的需求。多道程序设计的需求也与计算机中的“虚拟内存”概念紧密相关。反过来，这种内存的虚拟化与整个操作系统本身的虚拟化直接相关，正如我们在本章中所描述的那样。


    计算机硬件虚拟化是对硬件平台、其部分组件，或仅运行一个或多个操作系统（“OS”）所需功能的模拟，程度各异。它抽象并有效地向用户“隐藏”了硬件的物理特性。传统上，控制虚拟机的软件被称为虚拟机监控程序（hypervisor）。目前，虚拟机监控程序通常被称为虚拟机监视器（VMM）。


    平台虚拟化通过主机软件（虚拟机监控程序）在任何给定的硬件上实现，该软件为其客户软件创建一个模拟的计算机环境，即虚拟机（VM）。客户软件可以小到单个用户应用程序，也可以大到完整的操作系统。客户软件执行时就像直接在物理硬件上运行一样。


    虚拟化带来了一些性能上的缺点，既包括运行虚拟机监控程序所需的资源，也包括与在非虚拟化的主机物理机上运行应用程序相比，虚拟机客户机性能的降低。虚拟机比物理机更容易从外部进行控制和检查，其配置也更灵活。这在内核开发和操作系统课程教学中非常有用。可以根据需要实现一个新的虚拟机，而无需预先购买硬件。可以根据需要轻松地将虚拟机从一台物理机移动到另一台。虚拟机客户机内部的不可恢复故障不会损害主机系统，因此不会导致主机操作系统崩溃。


    虚拟化实现的示例如下：


    - 运行主机操作系统不支持的一个或多个应用程序：运行所需客户操作系统的虚拟机可以允许运行所需的应用程序，而无需更改主机操作系统。

    - 评估替代操作系统：新的操作系统可以在虚拟机内运行，而无需更改主机操作系统。

    - 服务器虚拟化：多个虚拟服务器（通常称为“容器”）可以在单个物理服务器上运行，以更充分地利用物理服务器的硬件资源。云计算的一个例子是亚马逊网络服务弹性云计算（AWS
    EC2）虚拟服务器。

    - 复制特定环境：根据所使用的虚拟化软件，虚拟机可以被复制并安装在多个主机上，或恢复到先前备份的系统状态。

    - 创建受保护环境：如果在虚拟机上运行的客户操作系统以难以修复的方式损坏（例如在测试时可能发生的情况），可以丢弃该虚拟机而不会损害主机系统，下次使用干净的副本即可。


    主要的实际当代虚拟化技术如下：


    - 全虚拟化：在全虚拟化中，虚拟机模拟足够的硬件以允许一个完整的“客户”操作系统（为相同处理器指令集架构（ISA）设计）在隔离环境中运行。适用于在X86 ISA或ARM架构上运行的Linux系统的示例包括VirtualBox、Parallels
    Workstation、Oracle VM、Virtual Server、Hyper-V、VMware Workstation和VMware。

    - 硬件辅助虚拟化：在硬件辅助虚拟化中，硬件提供架构支持，便于构建虚拟机监视器，并允许客户操作系统在隔离环境中运行。适应此类硬件的虚拟化平台示例包括KVM、VMware
    Workstation、VMware Fusion、Hyper-V、Xen、Oracle VM server for SPARC和VirtualBox。

    - 半虚拟化：在半虚拟化中，包括地址空间虚拟化，虚拟机模拟底层硬件环境的多个实例，特别是地址空间。

    - 准虚拟化：在准虚拟化中，虚拟机不一定模拟硬件，而是（或另外）提供一个特殊的应用程序编程接口（API），该接口只能通过修改“客户”操作系统来使用。为此，“客户”操作系统的源代码必须可用。

    - 操作系统级虚拟化：在操作系统级虚拟化中，物理服务器在操作系统级别进行虚拟化，使得多个隔离且安全的虚拟化服务器可以在单个物理服务器上运行。“客户”操作系统环境与主机系统共享相同的操作系统运行实例。因此，相同的操作系统内核也用于实现“客户”环境，以及在给定“客户”环境中运行的应用程序'
