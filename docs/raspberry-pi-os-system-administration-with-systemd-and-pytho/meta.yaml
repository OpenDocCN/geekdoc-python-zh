    # 2.4.5 Determinate and Indeterminate Repetition Structures and Recursion


    Using the procedural/imperative model, Python3 can repeat segments of program
    or script file structures in two basic ways: via *determinate repetition structures*
    or *indeterminate repetition structures*. Traditionally, a determinate repetition
    structure is called *counting repetition*, and an indeterminate repetition structure
    is called *logical repetition*. These two methods are implemented with the **for**
    procedural statement, and the **while** procedural statement. Generally, if you
    know ahead of time (for example, at the time you are writing the code) how many
    repetitions of a block of code you want to execute, you use the **for** statement,
    and if you do *not* know (when, for example, you allow the user to input the number
    of repetitions as the script file is run), you use the **while** statement.


    Of course, it is possible to implement the same two ways of repetition by *not*
    using a specific structured programming approach; for example, by using conditional
    execution, and unstructured switching to obtain the same results. This is not
    good practice, and we choose to show the structured approach in Python3.


    Make sure that in the body of statements included in the indeterminate repetition
    block that **while** is executing, the test condition for continued execution
    becomes false. Otherwise, this will result in *infinite repetition*! To halt infinite
    repetition in an executing script file, hold down the <Ctrl> and C keys on the
    keyboard at the same time.


    A note about Python3 style is in order at this point.


