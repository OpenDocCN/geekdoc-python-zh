    输出：归档或恢复的文件或目录结构。

    ```


    **GNU 风格用法中的主要操作和操作选项：**


    - `--append` 将文件附加到归档文件的末尾。

    - `--concatenate` 将一个归档文件附加到另一个归档文件的末尾。

    - `--compare` 查找归档文件和文件系统之间的差异。

    - `--create` 创建一个新的磁带并在其上记录归档文件。

    - `--delete` 从归档文件中删除。

    - `--extract` 从归档文件中提取文件。

    - `--help` 显示简短的选项摘要。

    - `--list` 列出归档文件的内容。

    - `--show-defaults` 显示选项的内置默认值。

    - `--test-label` 测试归档卷标签然后退出。

    - `--update` 附加比归档文件中版本更新的文件。

    - `--usage` 显示可用选项列表。

    - `--version` 显示程序版本和版权信息。


    **常用选项：**


    - `--preserve-permissions` 提取有关传统文件权限的信息。

    - `--acls` 启用 POSIX.1e ACL 支持。

    - `--gzip` 通过 gzip 过滤归档文件。

    - `--verbose` 详细列出处理的文件。

    - `--file ARCHIVE.tar` 将归档文件发送到名为 ARCHIVE.tar 的文件。


    **命令参数：**

    FILE... 目标，可以是归档文件或要归档的文件对象。


    ### 1.11.2.1 使用 tar 归档和恢复文件


    普通的 Raspberry Pi OS 用户如果愿意可以归档自己的工作。他们通常需要对与项目相关的文件对象进行此操作，以便通过电子邮件、ssh 或移动辅助存储介质（例如
    USB 闪存盘）将其传输给某人。或者他们可能希望通过相同的方法保留自己的文件系统对象作为备份。


    制作归档文件的主要原因是处理（发送或接收）单个文件而不是完整目录层次结构的便利性。没有归档文件，发送者可能必须发送多个文件和目录（文件结构），接收者必须将其恢复到正确的层次结构中。没有像
    **tar** 这样的归档设施，根据文件和目录结构的大小，发送、接收和重建文件结构的任务可能非常耗时。


    还有其他文件压缩设施，如 **bzip2**、**gzip**、**gunzip**、**gzexe**、**xz**、**zcat** 和 **zmore**
    命令，我们必须指出压缩可以节省磁盘空间和传输时间。但压缩小文件通常不会产生太多压缩效果和存储空间。此外，压缩大小为一个簇（磁盘存储的最小单位，即一个或多个扇区）或更小的文件无助于节省存储介质空间，即使压缩确实导致文件变小，因为系统最终仍使用一个簇来保存压缩文件。但如果压缩确实导致文件变小，你确实可以节省传输压缩版本的时间。如果磁盘块大小为
    512 字节且一个簇由多个块组成，你可以使用 **tar** 命令将文件打包到一个文件中，每个文件开头有一个 512 字节的 tar 头，如图 1.9 所示。


    ![](img/7ffbe025fa2ba956525d0c51169283f3_129_0.png)


    **图 1.9**

    tar 打包的文件。'
