  md: '# TABLE 2.8

    queue Class Public Methods


    | Methods and Arguments | Description |

    | --- | --- |

    | Queue.qsize() | Obtain the approximate size of the queue. No assurance that
    put() or get() will not block |

    | Queue.empty() | Tests the truth value of an empty queue. No assurance that put()
    or get() will not block |

    | Queue.full() | Tests the truth value of a full queue. No assurance that put()
    or get() will not block |

    | Queue.put(item, block=True, timeout=None) | Adds item into the queue. If block
    is true, and timeout is None, blocking occurs. If timeout is a positive number,
    block occurs at that number of seconds, and the Full exception is raised. If block
    is false, put item on the queue if a space is available. If no space is available
    raise a Full exception, and ignore the timeout |

    | Queue.put_nowait(item) | Same as .put, with arguments item and block=false |

    | Queue.get(block=True, timeout=None) | Delete and return an item from the queue.
    If block is true, and timeout is None, block until an item is available. If timeout
    is a positive number, it blocks at most timeout seconds and raises the Empty exception
    if no item was available within that time. Otherwise (block is false), return
    an item if one is immediately available, else raise the Empty exception (timeout
    is ignored in that case) |

    | Queue.get_nowait() | Equal to .get(False) |

    | Queue.task_done() | Signals that an enqueued task is finished |

    | Queue.join() | Blocks until all items in the queue have been retrieved and processed.
    The count of unfinished tasks goes up or down depending on whether an item is
    added or taken off the queue |


