    \    输出已截断...\n    $ sudo apt upgrade\n    输出已截断...\n\n- 2. 将SSD或其他具有SATA转USB3线缆连接能力的合适设备插入树莓派硬件上的USB3端口。在我们的树莓派400上，USB3端口内部有一个蓝色的卡舌，从外部可见。我们连接了一个128\
    \ GB的Silicon Power SSD，它装在一个Orico SATA转USB免工具外壳中。我们之前在Gparted中格式化了SSD，并在其上创建了一个FAT32分区。\n\
