    # 1.10.2.2 Stopping CUPS Service with systemd


    The CUPS service can be stopped using the **systemctl stop cups.service** command,
    as follows:


    ```

    $ sudo systemctl stop cups.service

    ```


    When you check the status of the CUPS service after stopping the CUPS service,
    its status is inactive (dead), but still enabled.


    > ***Note***

    “Enabled” is systemd jargon that means it will persistently start every time the
    system is rebooted.


    # 1.10.2.3 Restarting, Enabling, or Disabling the CUPS Service with systemd


    Restarting a service means that a service is stopped and then started again. If
    the service was not currently running, restarting it simply starts the service.
    Use the following command to restart the CUPS service:


    ```

    $ sudo systemctl restart cups.service

    ```


    You can also perform a conditional restart of a service using systemctl. A conditional
    restart only restarts a service if it is currently running. Any service in an
    inactive state is not started.


    ```

    $ sudo systemctl condrestart cups.service

    ```


    In the above command example, the CUPS service was in an inactive state before
    the command was executed. When the conditional restart is'
