    \ Linux permissions model. We apply ACLs to file system objects mounted as NFSv4\
    \ “shared” network drives. In addition, we provide an extended example of using\
    \ ACLs on NFSv4 network drives.\n\n## 1.1.1 System Administration the Easy Way\n\
    \nHow can you do the majority of what is shown in this chapter in an easy way?\n\
    Use Webmin.\nWebmin is a modern Linux web browser-based, GUI system administration\
    \ tool that allows you to do many of the system administration tasks shown in\
