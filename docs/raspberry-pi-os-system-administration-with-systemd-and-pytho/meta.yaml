    \ as its first argument (which is usually called self).\n\n**Mutable**: Mutable\
    \ objects can change their value but keep their class identity.\n\n**Pythonic**:\
    \ An idea or piece of code which closely follows the most common usages of the\
    \ Python language, rather than implementing code using structures common to other\
    \ languages. For example, a common usage in Python is to loop over all elements\
    \ of an iterable using a **for** statement. Many other languages do not have this\
