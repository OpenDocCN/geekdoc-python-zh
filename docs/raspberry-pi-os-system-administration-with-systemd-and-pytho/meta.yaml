    # # 1

    Raspberry Pi OS System Administration Fundamentals


    # ## 1.0 Objectives


    +   1. Do various kinds of installation of a 64-bit Raspberry Pi OS, onto Raspberry
    Pi hardware, and do a preliminary configuration of those systems and the OS.

    2. Illustrate booting strategies, and how to gracefully bring the system down.

    3. Detail the basics of using systemd to manage system services.

    4. Add additional users and groups to the system, and show how to design and maintain
    user accounts.

    5. Add persistent media to the system, in particular externally mounted, USB3
    types. We also established a framework for connecting and maintaining the file
    system on that media, which classifies the file system as either existing on a
    physical medium (physically connected to the computer), a virtual medium (NFSv4,
    iSCSI), or as a specialized pseudo-file system that was not on a medium at all
    (cgroups, proc).

    6. Provide strategies using traditional and generic commands, to backup and archive
    the system files and user files.

    7. Update and maintain the operating system, and add/upgrade/remove user application
    package repository software to both increase functionality and upgrade existing
    packages.

    8. Monitor the performance of the system, and tune it for optimal performance
    characteristics.

    9. Provide strategies for system security to harden the individual Internet-connected
    Raspberry Pi system.

    10. Provide network connectivity strategies, both on a LAN and the Internet.

    11. Give an overview of system virtualization, using LXD/LXC.'
- md: "## 1.1 Introduction\n\nThis chapter is central to a major component of Raspberry\
    \ Pi OS use: system administration.\n\nIn order to install, maintain, and effectively\
    \ use a Raspberry Pi system composed of both hardware and software components,\
    \ it is often necessary to perform the set of common tasks shown in the following\
    \ sections. In this chapter, we target an individual, novice user, who performs\
    \ these tasks exclusively for her own use, on her own personal desktop/laptop\
    \ computer. The common tasks may also be performed by an appointed administrator,\
    \ for a more complex system used by many people. It is possible to divide these\
    \ common tasks into those performed by an administrator, and those performed by\
    \ a single user, or a group of ordinary, autonomous users.\n\nEven though we show\
    \ the basics of those common tasks, it is possible to extrapolate from what is\
    \ presented to the wider context of much larger-scaled computer systems, run by\
    \ a system administrator.\n\nAdditionally, at the book website, we provide other\
    \ materials that supplement our presentation of these tasks here in the printed\
    \ book.\n\nIn order to do many of the system administration tasks in this chapter,\
    \ it is absolutely necessary to either have superuser or root user privileges\
    \ on the system. That means you need to know the superuser password, which you\
    \ (or a designated system administrator) can establish at installation of your\
    \ Raspberry Pi system.\n\nBoth the **su** and **sudo** commands are used to execute\
    \ programs and other commands with root permissions. The root user has maximum\
    \ permissions, and can do anything to the system that a system administrator needs\
    \ to. Normal users execute programs and commands with reduced permissions.\n\n\
    To execute something that requires maximum permissions, you must first execute\
    \ the **su** or **sudo** commands. Using the **su** command makes you the super\
    \ user—or root user—when you execute it with no additional options.\n\nYou are\
    \ prompted to enter the root account’s password. Also, the **su** command allows\
    \ you to switch to any user account. If you execute the command **su**, you’ll\
    \ be prompted to enter the password, and the command shell current working directory\
    \ will be your home directory. Once you’re done running commands in the root shell,\
    \ you should type **exit** to leave the root shell and go back to limited-privileges\
    \ mode.\n\n> ***Note***\n> The root shell is *not* the login shell.\n\nIn contrast,\
    \ **sudo** runs a single command with root privileges. When you execute\n\n```\n\
    $ sudo command\n```\n\nthe system prompts you for your current user account’s\
    \ password before running **command**, whatever it happens to be, as the root\
    \ user. In order to use the **sudo** command, you must be part of the sudoers\
    \ group. More information on the **sudo** command, and its details, can be found\
    \ in Volume 1, Section 1.13.\n\nIn our “learning-by-doing” approach, we have selected\
    \ a common set of system administration tasks aimed specifically at an individual\
    \ novice Raspberry Pi OS user, as stated above in Section 1.0.\n\nBesides these\
    \ common tasks we have selected to present, there are numerous extensions, and\
    \ also many additional tasks that Linux system administration encompasses.\n\n\
    You must realize that we have listed all of the tasks above based upon the use\
    \ cases we target.\n\nTo extend some of the system administration topics covered\
    \ in this book so that they are reflective of modern Linux systems, and to anticipate\
    \ other use cases you might have, we provide some additional materials and references\
    \ in this volume, as follows:\n\nIf you want to install another Linux OS, for\
    \ example, Ubuntu, in a virtual environment (such as in a container), so that\
    \ it runs simultaneously with the Raspberry Pi OS on your computer’s hardware,\
    \ we give specific instructions on how to do this in Volume 3, “Raspberry Pi OS\
    \ Text Editors, git, and Virtualization with LXC/LXD”. There we give the specifics\
    \ of efficient ways of installing a “guest” operating systems using LXC/LXD container\
    \ virtualization.\n\nIn Section 1.14.1.2, we show details of the use of Control\
    \ Groups (cgroups) in systemd. cgroup techniques, executed on the command line,\
    \ allow an administrator to more explicitly set and view the limits of the three\
    \ major functions performed by the modern Linux kernel (or the Linux super-kernel,\
    \ systemd): concurrency, virtualization, and persistence.\n\nIn Volume 1, Sections\
    \ 1.14 and 1.15, “Raspberry Pi OS POSIX.1e Access Control Lists (ACL’s)”, and\
    \ “Raspberry Pi OS NFS Server and Client Install, and Setting NFSv4 ACLs on the\
