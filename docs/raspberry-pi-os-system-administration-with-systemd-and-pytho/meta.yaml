    # 2.5.2 A Basic Web Server and User File Maintenance


    A very useful, and practical example of using built-in Python3 capabilities on
    your Raspberry Pi system is the **http.server** module, that comes standard with
    Python3. The value of using this module, at least for an ordinary user of a Raspberry
    Pi system, is that you can quickly and easily implement a system service that
    can be programmed, configured, and controlled by that ordinary user.


    Another very useful, and important aspect of an ordinary user''s interaction with
    a Raspberry Pi system, that we cover in Section 2.3.2.2, is how effectively you
    can maintain the files on your system. The Python3 standard library, and many
    user-written libraries and modules, can help you do this efficiently on the Raspberry
    Pi OS. You can utilize the extensive syntax, and the multi-paradigm programming
    capabilities of Python3, to go far beyond the capabilities of doing operating
    system and file maintenance that are available in any of the shell script-creation
    programs.


    User file maintenance consists of creating, saving, organizing, and deleting files
    on your system, in your own account, or globally for the entire system and its
    users.


    # 2.5.2.1 Web Server Example


    In this section we show an ordinary user how to create and use a web server, using
    a built-in Python3 module.


    # Example 2.30


    A Simple Web Server Implemented in Python3.


    The SimpleHTTPServer module that comes with Python3 is a simple HTTP server that
    provides standard GET and HEAD request handlers. An advantage of using the Python3
    built-in HTTP server is that you don''t have to install'
- md: 'and configure anything! The only thing that you need is to have Python3 installed
    on your system, which it is by default on our Raspberry Pi OS. Step 1. To start
    an HTTP server on port 8000 (which is the default port), type the command:


    ```

    $ python3 -m SimpleHTTPServer

    Serving HTTP on 0.0.0.0 port 8000 (http://0.0.0.0:8000/) ...

    ```


    This will serve files and directories to a browser, whose URL is set to your IP
    address (in the case of the above command, this is 0.0.0.0) and port 8000, where
    the files and directories are located in the current working directory when you
    typed the above command. You can also change the port to some other valid port
    number, for instance 8096, by typing this command:


    ```

    $ python3 -m SimpleHTTPServer 8096

    ```


    Step 2. To share other files and directories on your network, or the Internet,
    in a terminal, change the current directory with the **cd** command into whichever
    directory you wish to have accessible via browsers and HTTP. For example:


    ```

    $ cd /home/bsystebex


    $ python3 -m SimpleHTTPServer

    Serving HTTP on 0.0.0.0 port 8000 (http://0.0.0.0:8000/) ...

    127.0.0.1 -- [11/Jun/2023 12:06:1] "GET / HTTP/".1" 2-0 -

    127.0.0.1 -- [11/Jun/2023 12:06:11] code 404, message File not found

    127.0.0.1 -- [11/Jun/2023 12:06:1] "GET /favicon.ico HTTP/".1" 4-4 -


    Output truncated ...

    ```


    Step 3. Then in a web browser on your Raspberry Pi system, put in either of the
    following two addresses:


    ```

    http://your_ip_address:8000

    ```


    or to the localhost:


    ```

    http://127.0.0.1:8000

    ```


    If you don''t have a valid index.html file in the current working directory, then
    all files and directories in /home/bsystebex will be listed. If there''s a valid
    index.html file in that directory (which in our case, there is), you will see
    the content of that index.html page displayed in the web browser. As long as the
    Python3 HTTP server is running, the terminal will update with messages as they
    are loaded from the server. These messages will be standard http logging information
    (GET and PUSH), 404 errors, IP addresses, dates, times, and a subset of the journal
    messages.


    To terminate the Python HTTP server, in the terminal you launched it from, type
    <Ctrl> + C


    ```

    ^C

    Keyboard interrupt received, exiting.

    $

    ```


