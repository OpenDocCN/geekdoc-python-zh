    An intrusion detection system (IDS) is a software application that monitors a
    network, or a single system, for unauthorized activity, or user protocol violations.
    It is situated on a software-specific interface, and its output is seen using
    log file monitoring. A wide variety of free or commercial IDS, from antivirus
    software to hierarchical systems that monitor the traffic of a backbone network,
    are available. They can be classified as Network Intrusion Detection Systems (NIDS)
    or Host Intrusion Detection Systems (HIDS). An IDS that monitors operating system
    files is an example of a HIDS. An IDS that analyzes incoming network traffic is
    an example of a NIDS. Also, IDS can be classified by detection strategy. The most
    well-known types of detection strategies are signature-based detection (recognizing
    bad patterns, such as malware), and anomaly-based detection (detecting deviations
    from a pre-defined model of “good” traffic, which uses a form of Artificial Intelligence
    (AI). IDS that have some pre-determined and structured response protocol are referred
    to as Intrusion Prevention Systems (IPS).


    A typical network intrusion detection system tries to detect malicious activity,
    such as a brute force attack, a denial of service attack, port scans, or attempts
    to crack into computers by monitoring network traffic.


