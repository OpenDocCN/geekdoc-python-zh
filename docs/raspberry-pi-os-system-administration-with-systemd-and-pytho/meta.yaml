  md: '# Volume 2 Preface


    # Background


    This book is a compendium of easy-to-use, and essential Raspberry Pi system administration
    tasks for the beginner. The Raspberry Pi OS is derived from the Debian branch
    of Linux, and as of this writing, Debian Bullseye was the most current version
    of that operating system. To present the system administration topics and commands
    here, I have selected some very basic stuff, and a few more advanced concepts,
    topics, commands, and details that might not appear in a more complete system
    administration book.


    The overriding idea behind system administration of a modern, 21st-century Linux
    system such as the Raspberry Pi OS is the use of systemd to ensure that the Linux
    kernel works efficiently and effectively to provide these three foundation stones
    of computer operation and management: computer system concurrency, virtualization,
    and secure persistence.


    And this control of the kernel by a “super-kernel”, which is what systemd essentially
    is, must also promote the highest level of system performance and speed, given
    the use cases the computer might be put to, and the perceived needs of the target
    user base that the computer serves. Unless that novice user, or even a more seasoned
    system professional, has not only a basic, but also a more complete knowledge
    of how systemd controls and oversees every process and operation of a modern Linux
    system, they will never be able to master administering and implementing the kind
    of functionality that their use case(s) might ultimately require. Particularly
    for the user base on the system, and the demands that user base makes.


    Certainly out of the multitude of possible topics we could have presented, the
    ones you find detailed here have basically been selected in somewhat of a subjective
    way. That selective way was mainly guided by these concerns:


    +   a. The secure maintenance, in terms of concurrency, virtualization, and persistence,
    of a single Raspberry Pi system that an ordinary novice user can install on her
    own dedicated hardware.

    b. How important the topics are, in a perceived ranking of essential system administration
    tasks.

    c. How systemd plays into the maintenance regimen of the Raspberry pi OS, and
    the hardware it’s installed on, as chosen by that ordinary user.

    d. The overall pedagogic integration of the selected topics presented on system
    administration with each other.'
  merge: -1
  pgno: 13
- img_proc: true
  md: 'e. How well these topics serve to prepare a student for entry into any chosen
    Information Technology or Computer Science profession, or how someone already
    in those professions can use this book to better conform to the best practices
    of that profession. In other words, for educational and continuing education audiences.


    f. To some degree, make it possible to extrapolate these topics (for audiences
    in e) from a single Raspberry Pi system environment to a broader and larger-scaled
    computing environment, such as is found on small-to-medium-sized servers, or to
    cloud-based, virtual computing.


    # How to Read and Use This Book


    ***Note***

    The premise and prerequisite of this book is that you understand what the correct
    form, or structure, of a Linux command is, and how to type one in on the console
    or terminal command line of a Raspberry Pi!


    Just to review that here, the general syntax, or structure of a single Linux command
    (often referred to as a *simple command*) as it is typed on the command line,
    is as follows:


    ```

    $ command [[-option(s)] [option argument(s)] [command argument(s)]

    ```


    where:

    $ is the command line or shell prompt from the Raspberry Pi OS;

    anything enclosed in [] is not always needed;

    **command** is the name of the valid Linux command for that shell in lowercase
    letters;

    **[-option(s)]** is one or more modifiers that change the behavior of command;

    **[option argument(s)]** is one or more modifiers that change the behavior of
    [-option(s)]; and

    **[command argument(s)]** is one or more objects that are affected by **command**.


    Note the following seven essentials:


    +   1. A space separates command, options, option arguments, and command arguments,
    but no space is necessary between multiple option(s) or multiple option arguments.

    2. The order of multiple options or option arguments is irrelevant.

    3. A space character is optional between the option and the option argument.

    4. Always press the <Enter> key to submit the command for interpretation and execution.'
  merge: -1
  pgno: 14
- img_proc: true
  md: '5. Options may be preceded by a single hyphen - or two hyphens --, depending
    on the form of the option. The short form of the option is preceded by a single
    hyphen, the long form of the option is preceded by two hyphens. No space character
    should be placed between hyphen(s) and option(s).


    6. A small percentage of commands (like **whoami**) take *no* options, option
    arguments, or command arguments.


    7. Everything on the command line is case sensitive!


    Also, it is possible, and *very* common, to type *multiple* Linux commands (sometimes
    called *compound commands*, to differentiate them from simple commands) on the
    same command line, before pressing the <Enter> key. The components of a multiple
    Linux command are separated with input and output redirection characters, to channel
    the output of one into the input of another.


    As stated in the Series Preface, the fundamental prerequisites of this volume
    are:


    +   1) Knowledge of how to type a syntactically correct Linux command on the command
    line (as detailed above)

    2) Having access to a dedicated Raspberry Pi computer with the latest Raspberry
    Pi Operating System already installed and running on it

    3) Being a privileged user on the system, and as such, being able to execute the
    **sudo** command to assume superuser status, and

    4) Having a basic knowledge of how to edit and save text files in the **nano**
    text editor. We give no instruction on how to use the nano text editor in this
    volume, but there is a brief overview of it in Volume 3, Raspberry Pi OS Text
    Editing, git, Virtualization with LXC/LXD.


    An online Github site, with further materials and updates, program code, solutions
    to both In-Chapter Exercises and End-of-Chapter Problems, Questions, and Projects,
    plus other supplements, is provided for this book. It can be found at:


    www.github.com/bobk48/RaspberryPiOS


    All command line instructions in this volume were tested on either a Raspberry
    Pi 4B, or a Raspberry Pi 400, both with 4 GB of memory, and the latest version
    of the Raspberry Pi OS at the time.'
