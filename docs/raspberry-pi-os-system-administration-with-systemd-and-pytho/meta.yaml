    \ 是恢复归档文件中保留的 ACL 的选项\n    - **--extract** 是提取归档文件的操作\n    - **--verbose** 是列出正在处理的文件的操作\n\
    \    - **--file** 是指定文件 **archive_name.tar** 作为归档文件名的操作。\n\n    在这种最简单的变体形式中，从归档文件创建的目录将与归档文件同名，但去掉\
    \ .tar 扩展名。\n\n5.  列出归档内容：\n\n    此过程允许你查看归档文件的内容，而无需从中提取任何内容。\n\n    ```bash\n\
    \    $ tar --list --verbose --file archive_name.tar\n    ```\n\n    其中：\n    -\
    \ **--list** 是列出归档文件内容的操作\n    - **--verbose** 是列出正在处理的文件的操作\n    - **--file**\
    \ 是指定文件 **archive_name.tar** 作为归档文件名的操作。\n\n6.  从归档文件中提取单个文件：\n\n    以下命令仅从归档文件中提取特定文件。\n\
    \n    ```bash\n    $ tar --extract --verbose --file archive_file.tar file_pathname\n\
    \    ```\n\n    其中：\n    - **--extract** 是提取单个文件的操作\n    - **--verbose** 是列出正在处理的文件的操作\n\
    \    - **--file** 是指定文件 **archive_name.tar** 作为你正在提取的归档文件名的操作，以及\n    - **file_pathname**\
    \ 是你想要在归档中提取的文件的完整路径名规范。\n\n7.  从归档文件中提取单个目录：\n\n    从归档中仅提取单个文件的一个变体是提取单个目录，同时递归提取其所有子目录和文件，指定你想要提取的目录名称如下：\n\
    \n    ```bash\n    $ tar --extract --verbose --file archive_file.tar directory_pathname\n\
    \    ```\n\n    其中：\n    - **--extract** 是提取单个文件的操作\n    - **--verbose** 是列出正在处理的文件的操作\n\
    \    - **--file** 是指定文件 **archive_name.tar** 作为你正在提取的归档文件名的操作，以及\n    - **directory_pathname**\
    \ 是你想要在归档中提取的目录的完整路径名规范。\n\n8.  使用 **--append** 选项向现有归档添加文件或目录：\n\n    要向现有归档添加文件，请执行以下操作：\n\
    \n    ```bash\n    $ tar --append --verbose --file archive_name.tar file_or_directory_name\n\
    \    ```\n\n    其中：\n    - **--append** 是将单个文件或目录添加到归档的操作\n    - **--verbose**\
    \ 是列出正在处理的文件或目录的操作\n    - **--file** 是指定文件 **archive_name.tar** 作为你正在添加文件或目录的归档文件名的操作，以及\n\
    \    - **file_or_directory_name** 是你想要在归档中添加的文件或目录的完整路径名规范。\n\n## 章内练习\n\n21.\
    \ a. 参考上面显示的简略 man 页面，或参考你 Raspberry Pi 系统上 **tar** 的 man 页面，给出一个命令，该命令将创建一个名为\
    \ ziptest 的目录的 gzip 压缩归档。\n    b. 给出一个命令，该命令将 gzip 压缩归档提取到另一个名为 ziptest2 的目录中。\n\
    \n## 1.12 其他 Raspberry Pi OS 归档和备份设施\n\n除了上一节简要介绍的传统 **tar** 功能外，系统管理员还可以使用其他几种设施和方法来归档和备份单个用户帐户、文件、文件系统以及整个系统本身。如上所述，要获得本节及所有其他节中所示命令行设施的功能和选项的更完整列表，请查阅你系统上这些命令的\
    \ man 页面。下面我们将简要描述并给出一些更现代、更有用的设施和方法的简单示例。\n\n## 1.12.1 rsync\n\n**rsync** 命令是一种非常现代且节省空间的备份文件和目录的方式，特别是通过网络使用\
    \ **ssh** 从一台机器备份到另一台机器。它的操作也可以通过使用 systemd 调度来自动化。\n\n它最重要和最具定义性的特征是它使用的数据传输“快速检查”算法，该算法减少了传输的数据量。这是通过仅发送源文件与相同现有目标文件（如果有的话）之间的差异来完成的。如果文件需要传输，因为源和目标之间存在差异，则使用此算法复制或“同步”它们。该算法查找大小或修改时间已更改的文件。当快速检查表明目标文件需要以这种方式更新时，其他可能保留的文件对象属性（如权限或\
    \ ACL）的更改会直接在目标文件上进行。\n\n**rsync** man 页面的简略摘要如下：\n\n```\nrsync\n语法：\n本地：rsync\
    \ [选项...] 源... [目标]\n远程：\n    通过远程 shell：\n    拉取模式：rsync [选项...] [用户@]主机:源...\
    \ [目标]\n    推送模式：rsync [选项...] 源... [用户@]主机:目标\n\n    通过 rsync 守护进程：\n    拉取模式：rsync\
    \ [选项...] [用户@]主机::源... [目标]\n              rsync [选项...] rsync://[用户@]主机[:端口]/源...\
    \ [目标]\n    推送模式：rsync [选项...] 源... [用户@]主机::目标\n              rsync [选项...] 源...\
    \ rsync://[用户@]主机[:端口]/目标\n```\n\n**目的：** 使用高效快速的数据传输算法在本地或远程传输文件。在本地复制，通过任何远程\
    \ shell 推送/拉取到/从另一台主机，或推送到/从远程 rsync 守护进程。\n\n**输出：** 传输的文件，无论是在本地还是远程。\n\n**常用选项：**\n\
    \n- **-a, --archive** 归档模式\n- **-A, --acls** 保留 ACL（隐含 -p）\n- **--delete** 从目标目录中删除多余的文件\n\
    - **-e, --rsh=命令** 指定要使用的远程 shell\n- **--existing** 跳过在接收方创建新文件\n- **-h, --human-readable**\
    \ 以人类可读的格式输出数字\n- **-H, --hard-links** 保留硬链接\n- **-k, --copy-dirlinks** 将指向目录的符号链接转换为引用的目录\n\
    - **-K, --keep-dirlinks** 将接收方上符号链接的目录视为目录\n- **-n, --dry-run** 执行试运行，不进行任何更改\n\
    - **-p, --perms** 保留权限\n- **-q, --quiet** 抑制非错误消息\n- **-r, --recursive** 递归进入目录\n\
    - **--remove-source-files** 发送方删除已同步的文件（非目录）\n- **-v, --verbose** 增加详细程度\n- **-z,\
    \ --compress** 在传输过程中压缩文件数据\n\n**命令参数：**\n\n- **SRC** 源文件或目录\n- **DEST** 目标路径\n\
    \n## 1.12.1.1 rsync 示例\n\n我们在以下示例集中做出的一个基本假设是，源通常是随时间变化的文件对象，例如一个你正在通过添加或删除文件（或从其子目录中添加或删除文件）来修改文件的目录。此外，目标是随时间不变或固定的文件对象，例如当你进行归档备份时。当你使用归档工具时，这通常是这种情况，尽管正如你上面在\
    \ tar 命令中看到的，归档（或目标）可以以各种方式添加或提取。\n\n> **注意**\n> 我们不涉及 **rsync** 更复杂或更高级的用法。"
