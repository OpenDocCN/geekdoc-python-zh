    \ for installation, but not installed by default, on our Raspberry Pi system:\n\
    \n- AIDE is a HIDS that can monitor and analyse the internals of the operating\
    \ system.\n- Snort is a NIDS which performs packet logging and real-time traffic\
    \ analysis on IP networks.\n- fail2ban is an example of an IPS. One of the configurations\
    \ it takes is based upon malicious activity coming into your system from a LAN,\
    \ or the Internet, and locks out IP addresses that attempt to login via ssh more\
    \ than five times with the wrong password. This prevents brute force attacks through\
    \ port 22.\n\nThese three IDS are available via APT, or the Raspberry Pi Menu\
    \ Preferences > Add/Remove Software. The best way to find out more about the particulars\
    \ of installing and configuring them is by reading their online documentation\
    \ and tutorials.\n\n## In-Chapter Exercises\n\n- 50. Install one or all of the\
    \ above IDS packages on your system, using the package management system available.\
    \ How do you deploy fail2ban, and how do you control its environment? For example,\
    \ how do you “unblock” an IP address using fail2ban? Test this on your Raspberry\
    \ Pi system.\n- 51. What are the capabilities and uses of Wireshark? Give a description\
    \ of it in terms of the IDs we describe above, and then install Wireshark and\
    \ use it on your system.\n\n## 1.15.5 Linux Security Software\n\nAll larger Linux\
    \ computer server systems, as well as individual Raspberry Pi desktop systems\
    \ used by an ordinary user, can have several types of network-based and host-based\
    \ security software available to detect malicious activity, protect systems and\
    \ data, support intrusion detection, and the responses to them. They can be organized\
    \ into the following categories:\n\n- Intrusion Detection and Intrusion Prevention\
    \ Systems\n- Remote Access Software\n- Web Proxies\n- Vulnerability Management\
    \ Software\n- Authentication Servers\n- Routers\n- Firewalls\n- Network Quarantine\
    \ Servers\n\nWe covered some of the details of intrusion detection, and also give\
    \ a more complete description of firewalls in the next section.\n\n### 1.15.5.1\
    \ System Firewall\n\nA firewall is a facility that prevents unauthorized access\
    \ to or from a private network or a computer. Firewalls can be implemented in\
    \ either hardware, software, or both. Firewalls are mainly used to halt unauthorized\
    \ access to a private network or intranet, from the Internet. All traffic entering\
    \ or leaving a single computer, or intranet, passes through the firewall, which\
    \ can look at each message packet stream, and block those that do not meet specific\
    \ security requirements set by the system administrator. These requirements are\
    \ codified in what are known as *firewall rules*.\n\nIn addition to limiting access\
    \ to your computer and network, a firewall is also useful for allowing remote\
    \ access to a private network through secure authentication certificates and logins.\
    \ A common practice is to let a stand-alone computer serve as a single hardware\
    \ firewall to a private network. Hardware firewalls can be purchased as a stand-alone\
    \ product. They can also be found integral to broadband routers. Most hardware\
    \ firewalls will have a minimum of four network connectors to link them to other\
    \ computers, but for larger networks, there are business networking firewall solutions.\n\
    \nThe Raspberry Pi OS uses Uncomplicated Firewall, or **ufw**, to protect the\
    \ system. The default configuration file for its rules is located in `/etc/ufw/ufw.conf`.\
    \ The easiest way for you to find out more about text-based modifications to firewall\
    \ rules is to see the **ufw** man page on your system. We provide an extensive\
    \ section giving the basic details of using the command-line method of modifying\
    \ firewall rules in Volume 1, Section 1.16, entitled “ufw and Netfilter Interface\
    \ in the Raspberry Pi OS”.\n\nIt is not absolutely necessary to change the ufw\
    \ firewall rules, unless your security model, and its impact on your particular\
    \ use case, warrants firewall rule customization. We provide a general overview\
    \ of ufw in the next section.\n\nIn the Raspberry Pi OS, if the firewall is *active*\
    \ (enabled, or running), incoming traffic from the network is usually *blocked*\
    \ until you specify a TCP or UDP port that traffic is allowed to come in on. Also,\
    \ usually all outgoing traffic on all ports is allowed. In the next sections we\
    \ describe the Uncomplicated FireWall (**ufw**).\n\nTo determine whether the firewall\
    \ is active, use the following systemd command on your Raspberry Pi system:\n\n\
    ```\n$ systemctl status ufw\n● ufw.service - Uncomplicated firewall\n     Loaded:\
    \ loaded (/lib/systemd/system/ufw.service; enabled; vendor preset: enabled)\n\
    \     Active: active (exited) since Wed 2023-05-24 15:47:42 PDT; 6 days ago\n\
    \       Docs: man:ufw(8)\n    Process: 157 ExecStart=/lib/ufw/ufw-init start (code=exited,\
