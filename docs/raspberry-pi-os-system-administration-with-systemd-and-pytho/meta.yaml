    \ detail in Volume 1, Section 1.14, entitled “Raspberry Pi OS POSIX.1e Access\
    \ Control Lists (ACLs)”.\n\n## 1.15.7 Process Credentials\n\nThe multi-programming\
    \ model requires that processes, whether they are generated by shell built-ins,\
    \ external commands, user-written programs, or by any system programs that use\
