    # 2.5.5.1 The queue Module and Its Classes and Methods


    The **queue** module in Python3 implements three OOP classes of queue, which differ
    only in the order in which the entries are retrieved. In a *First In First Out*
    (FIFO) queue, the first tasks put into the queue are the first taken out. In a
    *Last In First Out* (LIFO) queue, the most recently added entry is the first retrieved
    (similar to a “push-down” stack). In a priority queue, the entries are sorted,
    and the lowest-valued entry is retrieved first.'
  merge: -1
  pgno: 290
- img_proc: true
  md: 'The critical feature of the **queue** module is that locks, and release mechanisms,
    that temporarily block or free competing threads, are implemented in the OOP “public”
    methods for the classes, *without the programmer having to do it!*


    For your convenience, we present the **queue** module definitions, taken from
    the Python documentation, of the following Queue classes, and their exception
    handling methods:


    **class queue.Queue(maxsize=0)**


    This is the FIFO constructor for a queue. The argument for **maxsize** is an integer
    that defines the largest number of items that can be placed in the queue. Placement
    of items on the queue will be blocked if the **maxsize** has been reached; queued
    items must be consumed to unblock. The queue size default is infinite.


    **class queue.LifoQueue(maxsize=0)**


    This is the LIFO constructor for a queue. The argument for **maxsize** is an integer
    that defines the largest number of items that can be placed in the queue. Placement
    of items on the queue will be blocked if the size has been reached; queued items
    must be consumed to unblock. The queue size default is infinite.


    **class queue.PriorityQueue(maxsize=0)**


    This is the constructor for a prioritized queue. Placement of items on the queue
    will be blocked if the **maxsize** has been reached; queued items must be consumed
    to unblock. The queue size default is infinite. Note that the lowest valued entries
    in the queue are retrieved first (the lowest valued entry is the one returned
    by sorted(list(entries))[0]). Typically entries are tuples of the form- (priority_number,
    data).


    **exception queue.Empty**


    An exception raised when non-blocking .get() or .get_nowait() is called on a Queue
    object which is empty.


    **exception queue.Full**


    An exception raised when non-blocking .put() or .put_nowait() is called on a Queue
    object which is full.


    The three Queue classes provide the public methods described in Table 2.8, which
    has also been taken from the Python3 documentation. Remember that a public method
    is accessible anywhere outside of the class.'
