    The output from the Raspberry Pi OS on the command line shows the pathname to
    the current working directory or folder. As previously stated, this path is a
    textual route through the complete file structure of the computer that Raspberry
    Pi OS is running on, ending in the current working directory. In this example
    of the output, the path starts at /, the root of the file system. Then it descends
    to the directory **home**, a major branch of the file system on the computer running
    Raspberry Pi OS. Then it descends to the directory **bob**, another branch, which
    is the home directory name for the user. Finally, it descends to the branch named
    **first**, the current working directory.


    On some systems, depending on the default settings, another way of determining
    what the current working directory is can be done by simply looking at the command
    line prompt. This prompt may be prefaced with the complete path to the current
    working directory, ending in the current working directory.


    You can ascend back up to the home directory, or the parent of the subdirectory
    **first**, by typing the following:


    ```

    $ cd

    $

    ```


    An alternate way of doing this is to type the following, where the tilde character
    (~) resolves to, or is a substitute for, the specification of the complete path
    to the home directory:


    ```

    $ cd ~

    $

    ```


    To verify that you have now ascended up to the home directory, type the following:


    ```

    $ pwd

    /home/bob

    $

    ```'
