    \ as an NFS shared resource, the default POSIX.1e implementation on Linux would\
    \ not be able to take advantage of the NFSv4 ACL model of that file system. As\
    \ noted above, that restriction is true even if a user were to install a special\
    \ tool, nfs4-acl-tools, in addition to enabling NFS server facilities on the remote\
    \ system, and client facilities on her Linux system. That is necessarily a more\
    \ advanced application of ACLs.\n\nAnother very practical limitation in this respect\
    \ is virtualization with LXC/LXD containers. If you create LXC/LXD containers,\
    \ on the Linux host for those containers, the NFSv4 ACLs could not be used on\
    \ LXD container file objects.\n\nAdditionally, ACLs are *not* retained by the\
