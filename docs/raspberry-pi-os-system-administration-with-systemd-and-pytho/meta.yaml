    \ statements xxxxxxxxx, line up vertically with an indentation of four spaces\
    \ before each block, from left to right.\n\n- 2. Normal order and applicative\
    \ order evaluation: The order of execution of a mathematical expression used by\
    \ Python is PEMDAS: Parentheses (from inner to outer), (from left to right) Exponents,\
    \ Multiplication, Division, Addition, and Subtraction. See Table 2.2 for even\
    \ more details of operator precedence in Python expressions.\n\nThe first thing\
