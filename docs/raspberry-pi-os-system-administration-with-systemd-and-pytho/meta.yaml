    # 2.5.4.2 Python Thread Example Using the OOP Model


    The **threading** module builds higher-level threading interfaces, on top of the
    lower-level **_thread** module. If you want your applications to take advantage
    of the computational power of the multi-core Broadcom CPU in your Raspberry Pi,
    you should use the multi-processing **threading** module. However, **threading**
    is still an appropriate model to deploy if you want to run multiple I/O-bound
    tasks.


    # 2.5.4.3 OOP GUIs and Producer–Consumer Model Threads


    Threads are an extremely integral part of the tk GUI toolkit, which we illustrated
    in Section 2.5.3. This also applies in general to GUI libraries, such as Qt. Since
    many of the functions of a GUI use synchronous I/O, any operation that can block,
    or take a long time to complete, must be spawned to run in parallel, so that the
    central GUI module (the main thread) is always running. Although such spawned
    children can be run as multiple processes, the efficiency and shared environment
    model of threads make them ideal for this role, since they are run in the namespace
    of a single process. Most GUI toolkits do *not* allow multiple threads to update
    the main thread in parallel- updates, and are usually restricted to the main thread.


    The two important points to be made about Python3 threads in a GUI are that the
    main thread handles all screen graphics updates, and that GUI threads must obey
    the synchronization rules established for general thread concurrency according
    to standardized models.


    All threads in a GUI generally follow what is called the *producer–consumer model*.
    Simply put, that’s where one or more objects (the producers) are responsible for
    placing data into some storage pool, and one or more objects (the consumers) are
    responsible for removing data from that pool.


    The drawbacks to the producer–consumer model are as follows:


    +   - The producer(s) cannot add more data than the storage pool can hold.

    - The consumers(s) cannot take from an empty pool.

    - The actions of all objects *must* be synchronized.'
