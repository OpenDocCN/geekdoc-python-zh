- img_proc: true
  md: 'The Physical Layer:

    This layer is concerned with the physical operation of the persistent storage
    device. It processes physical blocks being read or written. It handles buffering
    and memory management and is responsible for the physical placement of blocks
    in specific locations on the storage medium. The physical file system interacts
    with the device drivers, or with the channels that physical devices communicate
    over. At a certain level of simplification, this layer can be schematically represented
    in Figure 1.3 by the integrated grouping of Block Layer, SCSI Layers, and the
    Physical Device Layer.


    # 1.8.1 Types of File System and ext4


    Furthermore, and as a very integral part of the operation of the Linux kernel
    as it exists in a transient and volatile state as we have defined it, the pseudo
    and special purpose file systems can be viewed as a series of conduits through
    which the entire system itself “flows”. Thinking along these lines, when the kernel
    is in the CPU and attendant RAM, the kernel code itself is organized as a file
    system. The kernel (or systemd super-kernel) can be viewed as a file system of
    transitory data structures, that maintains the steady state of the hardware and
    software using these conduits exclusively; this achieves the important controlling
    goals of virtualization, concurrency, user-autonomy, security, and the necessary
    archival, long-term data persistence on the file systems that are there to serve
    the user base.

    Over the history of Linux, various file systems have been used to provide speed,
    efficiency, security, and utility to the ordinary user. The most contemporary
    and universal of these, across the three major branches of Linux, is the Linux
    Extended File System (ext). All of the representative downstream releases of Linux
    use it as the default file system.

    The 4th version of ext, ext4, is the current and most robust version so far. It
    has several features, such as large scalability, the ability to map to very large
    disk array sizes, and other very critical features, such as journaling. Following
    is a compact listing of some of the features of ext4:


    +   1. It can support volumes with sizes up to 1 exabyte, and files with sizes
    up to 16 terabytes.

    2. It uses an “extents” mapping scheme, which replaces block mapping used by earlier
    versions of ext. An extent is a range of contiguous physical blocks.

    3. It is backward-compatible with ext3 and ext2. Therefore ext3 and ext2 file
    systems can be mounted as ext4.

    4. It delays block allocation until data is flushed to disk.

    5. It has an unlimited number of sub-directories that can be created.'
  merge: -1
  pgno: 90
- img_proc: true
  md: '6. It has a multi-block allocator that can make better choices about allocating
    files contiguously on disk.

    7. It provides timestamps, measured in nanoseconds.


    Most importantly, from the perspective of our Raspberry Pi OS recommended data
    storage model, adding a second medium, for example, allows you to keep the operating
    system and the user data on two different physical persistent media. That way,
    if the operating system fails and the system disk is corrupted and unusable, the
    data survives on the user data disk, and can very easily be recovered.


    There are many traditional, legacy methods of achieving the objective of this
    data storage model, using facilities such as Linux disk and file maintenance commands,
    utilities such as mdadm (a software RAID manager), and Linux Volume Management
    (LVM). But from our perspective, the modern and contemporary way of implementing
    the recommended data storage model is using ZFS on redundant additional persistent
    media. With ZFS, you get bit-level data integrity, volume management, RAID capabilities
    at all levels, and a failure-proof backup strategy, all rolled into one utility.


    > ***Note***

    Unfortunately, at the time this book was written, the Raspberry Pi OS did not
    easily and reliably support the installation and implementation of ZFS. Additionally,
    ZFS works best on systems that have Error Correction Code (ECC) memory.


    # 1.8.2 Persistent Media and Devices


    There are some very important reasons for adding persistent media to your system,
    aside from conforming to our recommended storage model. Your microSD card may
    be running out of space, or beginning to show signs of failure. In a traditional
    legacy scheme, these situations might involve downtime of the system in order
    to correct the problem. Whereas, with our storage model implementation, and some
    of the facilities shown in the sections below, they can be handled without bringing
    the system down.


    # 1.8.2.1 Partitioning Schemes and Strategies


    By now, it should be evident to you that the Raspberry Pi OS organizes everything
    in files, and uses a file system to organize those files. A disk partition can
    be most simply defined as a logical area of the disk that holds a file system.

    Once you verify that your Raspberry Pi system can actually recognize and mount
    the additional media, there are several reasons to adopt a particular partitioning
    scheme for a newly added medium. Creating multiple partitions on a disk avoids
    full disk problems by segregating directories into'
  merge: -1
  pgno: 91
- img_proc: true
  md: 'those partitions, and gives the system administrator control over access to
    those directories and partitions. And you can maintain different file system structures
    simultaneously in different partitions.


    When you are adding new media, you have the option of using the traditional method
    of doing disk partitioning with command line utilities such as **fdisk** or **gdisk**,
    or the option of using a GUI-based method, with a utility such as Gparted. We
    showed the basics of using Gparted in Volume 1. And, as we show in the sections
    below, you can implement our recommended data storage model with a traditional
    ext4 file system scheme. We present an example detailing how to do this using
    the traditional ext4 scheme.


    To help the administrator of a Linux system with the task of adding persistent
    media, the following sections will also address these general concerns:


    +   * The availability of software device drivers for the new hardware to be added.

    * How the hardware will be recognized, configured, and deployed on the system.

    * Identification of possible paths to replacement and upgrading of existing hardware,
    within the context of using our recommended data storage model.


    As discussed in Item 3) of Section 1.3.1, our data storage model for a Raspberry
    Pi, used for our deployed models, is capable of mounting and using two or more
    external USB3-mounted media, and that implementation is made possible by what
    we show in the following sub-sections.


    We show a further example of additions of persistent media, and their configuration,
    in Volume 1. That example details creating and managing RAID arrays on the Raspberry
    Pi OS using mdadm. The additions in the traditional ext4-based example shown here
    in Section 1.8.5 will be done for USB3 thumb drives, but can also be easily extended
    to other persistent media, such as USB3-mounted external SSD(s), or M.2 NVMe devices,
    for example.


    External Media Additions:

    Generally, when you add additional media some significant time after you have
    installed the operating system on the Raspberry Pi hardware, you will want to
    partition it. You might even want to create a new partition table on it, create
    one or more partitions, and format those partitions using a standard file system,
    such as ext4. We emphasize and encourage the use of the Gparted GUI-based application
    to do this.


    When you add an external USB2 or 3 medium, such as a thumb drive, or other form
    of persistent storage device, it is generally already formatted'
  merge: -1
  pgno: 92
- img_proc: true
  md: 'to the file system type known as FAT32 (in the case of most popular commercially
    available USB thumb drives), or to some other format depending on the media. Traditionally,
    you can then partition the disk using the **fdisk** command, and add a file system
    to it with the **mkfs** command. We emphasize and encourage the use of **fdisk**,
    or its newer sister, **gdisk**, to do the partitioning if you choose this traditional
    operation.


    Note that safe removal of USB media can be done manually, via a graphical means,
    on the Raspberry Pi. For example, on the desktop, left-click on the icon in the
    upper-right of the menu bar (the icon that looks like an upward-facing arrow with
    a bar underneath it), choose the available medium, and left-click again on the
    medium to eject, or unmount it. Unmounting a USB thumb drive, or other USB-bus
    media, can also be done from the command line with the **umount** command.


    When a USB thumb drive, or other external medium, is automatically mounted, the
    path to it is **/media/your_home_dir/id**, where **your_home_dir** is the name
    of your home directory on the system, and **id** is the disk id number or identifier
    of the medium.


    For example, when we added a USB thumb drive, and created a single primary partition
    on it with Gparted, along with an ext4 file system automatically added to that
    partition at the same time, the newly mounted hard drive was accessed via the
    path:


    **/media/bob/04fd2202-8879-46f2-8040-446753ed077c.**


    # 1.8.3 Preliminary Considerations When Adding New Media


    If you insert a USB thumb drive, or any other USB-mountable media, that you know
    is functioning properly into your Raspberry Pi, and it is *not* recognized, the
    chances are that your operating system does *not* have a device driver available
    to enable communication between the computer and the thumb drive. In that case,
    it might be very prudent to find an alternative medium.


    How do you know if a new disk drive is recognized, and most importantly, is usable
    on your system?


    There are at least three quick and easy ways to know if the new disk drive is
    recognized.


    +   1) If it is a USB thumb drive, and it is formatted to FAT32, it will auto-mount
    itself, and an icon for it will open on the desktop (along with a prompt asking
    you if you want to view of its contents).

    2) In a terminal window, you can use the command **systemctl -f** and watch the
    screen display as you insert the device. It will show that a new device has been
    added (of course, given that the system has'
  merge: -1
  pgno: 93
- img_proc: true
  md: 'drivers for it!), even though in the case of a USB thumb drive, it might be
    formatted to something other than FAT32!


    +   3) Use the before-and-after technique shown in Section 1.8.4 below.


    The same is true when you connect another type of USB-mountable external medium
    properly, but the probability of it *not* being recognized can be lower. The best
    and easiest thing to do in a case when the medium is not recognized is to use
    another device. The Raspberry Pi OS has facilities to find and install device
    drivers on your system for a device, but this process is time consuming, and may
    not be fruitful for the particular device in question, particularly for the beginner.
    Also, it is possible to write a driver for your device, which is even more time
    consuming, and even less fruitful for the beginner. The important thing here is
    that perhaps the USB thumb drive, for example, is *not* formatted to FAT32, but
    that a manufacturer hasn’t supplied the device drivers, or made them available
    to Linux kernel developers.


    In many instances it is important to know the physical device name, the instance
    name, and the logical device name of disk drives on your system, but practically
    speaking, for the Raspberry Pi OS administrator, easily finding out the logical
    device name of a disk drive is most important.


    You may want to add media to your Raspberry Pi system that has been used on another
    computer operating system previously. In that case, the primary and secondary
    examples we show can be deployed to repartition and prepare that hard disk for
    new use with the Raspberry Pi OS.


    # 1.8.4 Five Quick and Easy Ways to Find Out the Logical Device Names of Media


    Before attaching a new medium to your Raspberry Pi system, it is important to
    know how to determine, in a very quick and easy manner, what the currently installed
    logical device names of the media actually attached and usable on your system
    are. What we mean by “attached and usable” is that the medium is properly connected
    and recognized by the system, and has a device driver that the system can use
    to communicate with it.


    *Before and after*: If you want to find out the logical device name of a newly
    installed medium, use one of the following methods to see what media are on your
    system *before* you add the new one, and then use the same method *after* the
    new one has been added, and note the difference. The different or new logical
    name that appears will be the logical device name of the new medium.


    The five simple methods that follow show how to determine what media are attached,
    and usable on your system, and what the logical device names of those and any
    others you might want to add to your system are.'
