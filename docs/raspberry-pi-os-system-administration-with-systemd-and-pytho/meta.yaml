    parameter has to be enabled for the unit.

    The MemoryLimit parameter controls the memory.limit_in_bytes control group parameter.

    To assign a 500 Megabyte memory limit to the test4 service, add a MemoryLimit
    setting in the /etc/systemd/system/test4.service file to include the following:


    ```

    [Service]

    MemoryLimit=500M

