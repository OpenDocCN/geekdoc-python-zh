    users on your system off their default location on a microSD-based /boot/ system
    medium, to a multi-media installation on the same Raspberry Pi. Sketch a detailed
    plan of exactly how you would do this, using the migration of a single user as
    an example. Show all commands you would use to achieve the migration, and successfully
    delete the old / home directory for that user''s account.'
