  - "[PAGE 116]\n\n# 18. Adding to a Mirrored Pool\n\nA very critical systems administration\
    \ procedure accomplished by ZFS is to add media to a pool *without taking it offline*.\
    \ Let's double the size of our **data2** pool:\n\n```\nroot@bob-desktop:~# zpool\
    \ list\n\nNAME    SIZE  ALLOC   FREE  CKPOINT  EXPANDSZ   FRAG  CAP  DEDUP  HEALTH\
    \  ALTROOT\ndata2   112M   126K   112M        -         -     5%    0%  1.00x\
    \  ONLINE  -\n```\n\n# 19. We can use the **zpool add** command to add disks to\
    \ the existing pool.\n\n```\nroot@bob-desktop:~# zpool add data2 mirror /home/bob/disk3\
    \ /home/bob/disk4\nroot@bob-desktop:~# zpool list\n\nNAME    SIZE  ALLOC   FREE\
    \  CKPOINT  EXPANDSZ   FRAG  CAP  DEDUP  HEALTH  ALTROOT\ndata2   224M   184K\
    \   224M        -         -     2%    0%  1.00x  ONLINE  -\n```\n\n# 20. The file\
    \ systems within the pool are always available. If we look at the status now,\
    \ it shows the pool consists of two mirrors:\n\n```\nroot@bob-desktop:~# zpool\
    \ status data2\n  pool: data2\n state: ONLINE\n  scan: resilvered 206K in 00:00:00\
    \ with 0 errors on Tue May 23 06:23:02 2023\nconfig:\n\n\tNAME              STATE\
