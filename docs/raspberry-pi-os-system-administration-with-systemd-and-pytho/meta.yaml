    \ Python 2.7.12 演示了一个对系统管理有用的简单文件维护命令。\n\n## 2.5.3 使用 Python3 和 tkinter 小部件构建图形用户界面\n\
    \n到目前为止，在本章中，我们基本上是通过图形 IDE 以基于文本的方式与 Python3 进行交互，我们在 Thonny 的脚本或 Shell 区域中输入命令，或者在文本编辑器中输入命令，然后执行\
