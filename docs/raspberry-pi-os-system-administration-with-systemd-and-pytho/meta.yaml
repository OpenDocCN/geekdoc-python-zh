    \nOn the Raspberry Pi OS, programs, commands, and files are accessed through user\
    \ and group permissions. Each user has a unique identifier, given as a username,\
    \ or UID. Users belong to unique groups, given either as a group name, or a GID.\
    \ Specific users and groups have permission to access available programs, commands,\
    \ and files.\n\nThe **sudo** program, or command, allows a single command to be\
    \ run as the root user, or superuser, *or even as some other user*. Only the system\
    \ administrator, or root user, can utilize a policy listing file (named *sudoers*)\
    \ that contains commands that each user can execute. So the administrator controls\
    \ what users have what privileges on the system. When any user needs to run a\
    \ command that requires root permissions, that user types **sudo command** in\
    \ a terminal window or console, allowing them to run **command** with root privilege.\
    \ Then, **sudo** consults its permissions list in the policy listing file. If\
    \ the user has permission to run that command, it runs the command. If the user\
    \ does not have permission to run the command, **sudo** denies execution. Running\
    \ **sudo** does not require knowing root's password, but by default requires entry\
    \ of the user's own password to execute successfully.\n\nAn example of the use\
    \ of the sudo command on our Raspberry Pi system is as follows:\n\n```\nbob@raspberrypi:~\
    \ $ sudo -i\nroot@raspberrypi:~#\nroot@raspberrypi:~# exit\nbob@raspberrypi:~\
    \ $\n```\n\nFor a more detailed description of the **sudo** command, see Volume\
    \ 1.\n\nThe **su** command (an abbreviation for \"switch user\") allows a user\
    \ to switch roles and become the superuser on the system without logging off from\
    \ their own account. You must know the password of the root account if you want\
