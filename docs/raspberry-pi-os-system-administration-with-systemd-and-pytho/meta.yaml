    to another kind of attached medium manually, totally, incrementally, to RAID of
    various levels using ZFS, or any variant and combination of the previous.


    "Who" means by the only user on the system, by the initiator or executor, such
    as by cron automatically, by the designated system administrator, either manually
    or semi-automatically, or by an automated process running at Dropbox, Google,
    or Amazon, for example.


    ## 1.11.1 A Strategic Synopsis and Overview of File Backup Facilities


    There are several strategies that a single user, or system administrator, can
    use in confidently and efficiently backing up the file components of a Raspberry
    Pi system. Table 1.7 and its included Descriptions, give a basic overview of those
    strategies, and the facilities that implement them on the Raspberry Pi OS. In
    the sections that follow the table, we briefly give details of these facilities.
    The man pages on your system give more complete descriptions, along with command
    options, arguments, and option arguments for all of the Raspberry Pi OS commands
    listed in the Table 1.7.


    ## 1.11.2 Linux GNU tar


    A Linux operating system, such as the Raspberry Pi OS, has several utilities that
    allow you to archive your files and directories in a single file, and the **tar**
    command is the most popular, widely used, and traditional method that allows you
    to do this.


    Raspberry Pi OS System Administration Fundamentals


    111


    TABLE 1.7

    Raspberry Pi OS File Backup Facilities


    | Backup Facility | Description |

    | :--- | :--- |

    | **tar** | Command and options to pack a file or a directory hierarchy as an
    ordinary disk file for backup, archiving, or moving to another location or system.
    **gtar** is the GNU version |

    | **cpio** | Less popular than tar, but with much of the same functionality |

    | **rsync** | A disk space-efficient command to copy files and directories |

    | **dd** | A simple and abbreviated backup utility |

    | **zfs snapshot** | Built-in commands and options in ZFS that offer a variety
    of backup modes |

    | **SD Card Copier** | The built-in backup facility of the Raspberry Pi OS |

    | **git & Github** | Online facility, and command repertoire, to archive code,
    etc. |

    | **Script files** | Administrator or user-written shell scripts or other programming
    language backup systems, that can use all of the above commands in them |

    | **3rd party software** | Many products, both local and online. One very useful
    example that is most significant for ordinary use is FileZilla |


    > ***Note***

    Contemporary **tar** on Linux *is* the GNU version.


    The **tar** (short for *tape archive*) utility was originally designed to save
    file systems on tape as a backup, so that files could be recovered in the event
    of a system crash. It is primarily used now to pack a directory hierarchy as an
    ordinary disk file. That disk file can then be either saved for system backup
    purposes locally or remotely, or transmitted to someone via the Internet. It is
    also used commonly with a compression utility, such as **gzip**, via a command
    line option. Doing so saves disk space and transmission time. The saving in disk
    space results primarily from the fact that empty space within a cluster is not
    wasted. A brief description of the **tar** utility follows.


    The GNU version of **tar** has some important functional features, and incorporates
    a more friendly syntax, than traditional UNIX **tar**. Therefore, for beginners
    we only show the “long form” of the GNU-style syntax because it’s more intuitive,
    and easy to understand. Once you get more familiar with **tar**, you may switch
    to the UNIX-style short form at your discretion.


    System administrators normally use a cost-effective archival medium for archiving
    complete file system structures as backups, so that when a system crashes for
    some reason, files can be recovered. Linux-based computer systems normally crash
    for reasons beyond the operating system’s control, such as a microSD card failure,
    or failure of the processor itself. The Raspberry Pi OS rarely causes a system
    to crash, because it’s a well-designed, coded, and tested operating system. In
    a typical commercial installation, backup is done every day during off hours (late
    night or early morning) when the system is not normally in use, with appreciable
    demand placed on it.


    The general syntax of the **tar** command, shown with GNU-style syntax as opposed
    to traditional UNIX-style syntax, is as follows:


    ```

    tar


    Syntax: tar [operation mode] [operation mode options] [FILE...]


    Purpose: Archive (copy in a particular format) files to, or restore files from,
    an archival medium (which can be an ordinary file). Directories are by default
    archived and restored recursively.

    Output: Archived or restored files or directory structures.

    ```


    **Main Operations and Operation Options in GNU-Style Usage:**


    - `--append` Append files to the end of an archive.

    - `--concatenate` Append an archive to the end of another archive.

    - `--compare` Find differences between archive and file system.

    - `--create` Create a new tape and record archive files on it.

    - `--delete` Delete from the archive.

    - `--extract` Extract files from an archive.

    - `--help` Display a short option summary.

    - `--list` List the contents of an archive.

    - `--show-defaults` Show built-in defaults for options.

    - `--test-label` Test the archive volume label and then exit.

    - `--update` Append files which are newer than the versions in an archive.

    - `--usage` Display a list of available options.

    - `--version` Display program version and copyright information.


    **Common Options:**


    - `--preserve-permissions` Extract information about traditional file permissions.

    - `--acls` Enable POSIX.1e ACL support.

    - `--gzip` Filter the archive through gzip.

    - `--verbose` Verbosely list files processed.

    - `--file ARCHIVE.tar` Send archive to file named ARCHIVE.tar.


    **Command Arguments:**

    FILE... Target, either an archive file, or file object to be archived.


    ### 1.11.2.1 Archiving and Restoring Files Using tar


    A normal Raspberry Pi OS user can archive their own work if they want to. They
    would normally need to do this with file objects related to a project, so that
    they can transfer them to someone via e-mail, ssh, or via mobile secondary storage
    media (USB thumb drive, for example). Or perhaps they would want to retain their
    own file system objects as backups via the same methods.


    The primary reason for making an archive is the convenience of dealing with (sending
    or receiving) a single file instead of a complete directory hierarchy. Without
    an archive, the sender might have to send several files and directories (a file
    structure) that the receiver would have to restore in their correct hierarchical
    structure. Without an archiving facility such as **tar**, depending on the size
    of the files and directory structure, the task of sending, receiving, and reconstructing
    the file structure can be very time consuming.


    There are other file compression facilities, such as the **bzip2**, **gzip**,
    **gunzip**, **gzexe**, **xz**, **zcat**, and **zmore** commands, and we must point
    out that compression saves disk space and transmission time. But compressing small
    files normally does not result in much compression, and storage space. Also, compressing
    files of one cluster in size (the minimum unit of disk storage, i.e. one or more
    sectors) or less does not help save storage media space, even if compression does
    result in smaller files, because the system ends up using one cluster to save
    the compressed file anyway. But if compression does result in a smaller file,
    you do save time in transmitting the compressed version. If the disk block size
    is 512 bytes and a cluster consists of more than two blocks, you can use the **tar**
    command to pack files together in one file, with a 512-byte tar header at the
    beginning of each file, as shown in Figure 1.9.


