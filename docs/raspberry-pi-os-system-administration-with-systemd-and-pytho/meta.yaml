    \n```\n$ more myfile\nThis is an example of how to use the cat command to add\
    \ plain text to a file\n$\n```\n\nThis is a simple example of the syntax of a\
    \ single Raspberry Pi OS command.\n\nThe general syntax of the **more** command\
    \ is as follows:\n\n```\nmore [options] [file-list]\n```\n\n**Purpose:** Concatenate/display\
    \ the files in **file-list** on the screen, one screen at a time\n**Output:**\
    \ Contents of the files in **file-list** displayed on the screen, one page at\
    \ a time\n**Commonly used options/features:**\n- **+E/str** Start two lines before\
    \ the first line containing str\n- **-nN** Display N lines per screen/page\n-\
    \ **+N** Start displaying the contents of the file at line number N\n\nThe **more**\
