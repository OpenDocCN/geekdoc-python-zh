  - '[PAGE 65]


    # 1.4.3 Preliminary Considerations When Managing System Services with systemd


    The system service manager that is available in our base Raspberry Pi OS is systemd.
    In fact, systemd is the system service manager for all distributions in the three
    major branches of Linux, and all important downstream Linux distributions as well,
    including Raspberry Pi OS.


    We detail system service management with systemd completely in Volume 1, and provide
    several examples there of how to effectively control operating system services
    in a modern systemd-controlled Linux system.


    We first pose a couple of preliminary questions about “system services” on the
    Raspberry Pi OS.


    Question: What is a daemon?


    Answer: Basically a daemon is a background, ongoing process that is not linked
    or controlled by a terminal. Particularly not connected in the usual way to standard
    output or stand error.


    Question: Is a “service” a daemon?


    Answer: Sometimes. More accurately and generally, a service can be a process or
    collection of processes, the overall state of the system, or the state of a physical
    device, a virtual device, a dataset, etc. And as a provider of resources, or a
    collection of an applications’ capabilities, it can have more than one instance.
    For example, the many layered file systems present on the system, or the multiple
    means of remote login to the system.


    # 1.4.4 Further References For System Service Management Using systemd


    In this section we provide further references for the uses of systemd for service
    management, which are presented fully, with numerous examples, in Volumes 1 and
    3. Our primary reference is the example detailed in Volume 1, Example 1.2, of
    how to enable server-side host services for a secure ftp daemon, known as vsftpd.
    That is a complete primary, basic example of using systemd to manage system services.


    In addition, Volume 3, “Raspberry Pi OS Text Editors, git, and Virtualization
    with LXC/LXD”, also shows examples of how you can implement the vsftpd service
    securely inside of an LXC/LXD container.


    As noted in the references, you should be cautious when executing these examples,
    particularly if you are *not* using one of the virtualization methodologies shown
    in Volume 3, and are on an insecure network connected to the Internet. You must
    have root privileges on the computer to execute the examples we show in the above
    references as well.'
  - '[PAGE 66]


    # In-Chapter Exercise


    5. What is the danger of using ftp, telnet, rlogin, or rsh from a remote site
    on the Internet into your home computer?


    # 1.5 User Administration


    The two most important objectives of user administration are service and security.
    First, providing service to ensure that the user base has access to and can fully
    take advantage of the resources that the Raspberry Pi OS can provide. Second,
    securing the files and processes that the user base needs to utilize those resources.
    Later in this chapter we go over some of the security methodologies that a system
    administrator can deploy to keep the system secure. In Volume 3, in the chapter
    entitled “Virtualization with LXC/LXD”, we also show security methods that utilize
    various virtualization technologies such as LXC/LXD containers.


    The traditional Linux technique for providing service and security to users is
    through read, write, and execute (rwx) access privileges, for the individual user,
    the group, or all others (u,g,o) on the system, to specific objects on the system,
    such as directories, or folders, and most importantly, to the files contained
    in them. Designing and implementing user groups, and access privileges for user
    groups, are the most important parts of this technique.


    Certainly, user account and group creation and configuration are the first steps
    in providing maximum service and security to the user base. That is true even
    if you are the only user of the system!


    A very integral part of designing user accounts and groups is the detailed consideration
    given to the recommended user data storage model we showed in Section 1.4.1, item
    3. This is done by securing user files on a second, possibly redundant, storage
    medium, so that they can be kept separate from the operating system boot medium
    itself. It can be practically achieved by properly creating user accounts so that
    they have their home directories on that second hard drive. As we show in Section
    1.8 below, various ways of adding redundant persistent media very easily and effectively
    implement the model.


    We concentrate here on how to manage user accounts and groups on Raspberry Pi
    OS with the **adduser**, **addgroup**, **deluser**, **delgroup**, **newusers**,
    **passwd**, and **usermod** commands. These activities are usually done a significant
    time after the initial installation of your Raspberry Pi system, but can be done
    during installation and initialization of the system as well. Following is Table
    1.2 showing brief descriptions of these commands.'
  - '[PAGE 67]


    # TABLE 1.2

    Basic User Administration Commands


    | Command | Description |

    | :--- | :--- |

    | **adduser** | Add a new user account |

    | **deluser** | Delete a user account |

    | **addgroup** | Add a new group |

    | **delgroup** | Delete a group |

    | **newusers** | Update and create new users in batch mode |

    | **passwd** | Manage user passwords |

    | **usermod** | Modifies user accounts |


    The examples in this section illustrate:


    +   * simple cases of text-based user account creation and configuration,

    * text-based group creation and configuration, and

    * text-based deletion of a user account and a group.


    # In-Chapter Exercise


    6. Make a table or chart of what users and groups need to be added to your system,
    and what their default account parameters and group memberships should be. What
    command can you use to identify all existing groups on the system?


    # 1.5.1 Adding a User and Group in a Text-Based Interface


    The commands **adduser** and **addgroup**, by default, add a “normal” (non-system)
    user or group to the system, using command line options and option arguments.
    They take default configuration information from /etc/adduser.conf. They are a
    more developed front-end for the older, low-level commands, such as **useradd**,
    **groupadd**, and **usermod**. **Adduser** and **addgroup** utilize patented UID
    and GID values for creation of new accounts and groups. By default they create
    a home directory from a skeleton configuration file, etc.


    **adduser** itself is a script file that interfaces to the following commands
    and their functionality:


    ```

    useradd, groupadd, passwd, gpasswd, usermod, chfn, chage, edquota.

    ```'
