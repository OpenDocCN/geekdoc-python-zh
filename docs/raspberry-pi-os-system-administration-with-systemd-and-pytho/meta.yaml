    # 1.15.8.1 The Meaning of Encryption


    Encryption uses a very developed science, known as *cryptography*, to implement
    data hiding. Cryptography is used on a Raspberry Pi system to encode data to hide
    it from unprivileged users, and then decrypt, or decode the data for privileged
    users. On the Raspberry Pi OS, the following are some of the objects that can
    be possible targets for encryption:


    +   - Individual files

    - Volumes or individual partitions

    - Web page connections

    - Network connections

    - Backup file objects on additional hard disks or other media

    - Compressed directories or files


    Encryption/decryption basically uses a variety of mathematical algorithms to treat
    the above targets. These algorithms are called *cryptographic ciphers*. The important
    terms to know when dealing with cryptography are *plain text* and *cypher text*.
    Plain text is the unencrypted, or decrypted format, and cypher text is the encrypted
    format.

    The details of encryption algorithms, their mathematics and complexity, are not
    as useful to the ordinary user as knowing where and when to apply them. That is,
    at the system, whole disk, partition, directory, or individual file levels. And
    also knowing why you want to use them, and carefully reasoning and designing your
    strategies for implementing these algorithms with the common command-line tools.


