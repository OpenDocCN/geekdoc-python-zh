    \ 配置打印机\n\n在 Raspberry Pi 上添加和配置本地打印机并使用通用 UNIX 打印系统（CUPS）在其上打印文档，有基本和现代的方法。我们在第\
    \ 1 卷第 1.6 节“通用 UNIX 打印系统的功能”中*详细*介绍了这些方法。在那里，我们还提供了一些传统打印命令的额外细节，例如 **lpadmin**、**lpc**、**lpinfo**、**lpmove**、**lpoptions**、**lpq**、**lp**、**lpr**、**lprm**\
    \ 和 **lpstat**。\n\n我们在此回顾该节。你可以使用三种基本方法为你的 Raspberry Pi OS 配置和管理打印机。这些方法通常适用于直接连接到计算机的打印机，这很可能是通过\
    \ USB 连接。三种基本方法是：\n\n- 1. 基于 Web 浏览器的 CUPS 界面，\n- 2. 使用 Raspberry Pi OS 菜单选项“首选项\
    \ > 打印设置”，以及\n- 3. 在终端中使用 Raspberry Pi OS 命令行。\n\n所有三种方法中配置的打印机都由通用 UNIX 打印系统（CUPS）控制和管理。\n\
    \n在方法 1 中，CUPS 的基于 Web 浏览器的前端允许你使用局域网连接或通过互联网管理打印机、打印作业和其他配置设置。\n\n在方法 2 中，通过\
    \ Raspberry Pi 菜单 > 首选项 > 打印设置访问的 CUPS 内置图形前端（随 Raspberry Pi OS 提供）实现了与方法 1 大致相同的功能。\n\
    \n在方法 3 中，有一个完全基于文本的界面，用于从 Raspberry Pi OS 命令行控制和管理打印机。\n\n### 1.10.1 通用 UNIX\
    \ 打印系统（CUPS）的功能\n\n使用 CUPS 是 Linux 和 Unix 中打印的标准方式。由于它是为提供尽可能多的打印机定义而开发的，因此它很可能能够让你直接连接你的打印机型号，或连接到局域网上的打印服务器。\n\
    \n它基本上由两部分组成：调度器和过滤系统。调度器在打印队列中安排作业，并将它们发送到过滤系统，该系统将打印数据转换为你希望文档打印在其上的特定打印机的设备驱动程序信息。\n\
    \n### 1.10.2 使用 systemd 本地管理 CUPS\n\n使用 systemd，通过 **systemctl** 命令，允许你启动、停止、重新加载或重启\
    \ CUPS 服务。这是通过系统服务对本地打印机进行更高层次的管理。\n\n#### 1.10.2.1 使用 systemd 启动 CUPS 服务\n\n\
    在 Raspberry Pi OS 中，当你通过 USB 电缆将新打印机连接到硬件时，它通常会被自动识别并通过 CUPS 连接。如果 CUPS 服务尚未启动，它将在连接新打印机的过程中自动启动并运行。但要在没有任何打印机连接或开机的情况下启动\
    \ CUPS 服务，请执行以下操作：\n\n要启动 CUPS 服务并检查其状态，请使用以下命令：\n\n```\n$ sudo systemctl start\
    \ cups\n$ sudo systemctl status cups\n• cups.service - CUPS Scheduler\n     Loaded:\
    \ loaded (/lib/systemd/system/cups.service; enabled; vendor preset: enabled)\n\
    \     Active: active (running) since Thu 2022-10-06 00:00:45 PDT; 10h ago\nTriggeredBy:\
    \ • cups.socket\n• cups.path\nDocs: man:cupsd(8)\nMain PID: 11613 (cupsd)\nStatus:\
    \ \"Scheduler is running...\"\nTasks: 1 (limit: 4164)\nCPU: 33ms\nCGroup: /system.slice/cups.service\n\
    └─11613 /usr/sbin/cupsd -l\n\nOct 06 00:00:45 raspberrypi systemd[1]: Starting\
    \ CUPS Scheduler...\nOct 06 00:00:45 raspberrypi systemd[1]: Started CUPS Scheduler.\n\
    ```\n\n从输出中我们看到 CUPS 正在运行。\n\n#### 1.10.2.2 使用 systemd 停止 CUPS 服务\n\n可以使用 **systemctl\
    \ stop cups.service** 命令停止 CUPS 服务，如下所示：\n\n```\n$ sudo systemctl stop cups.service\n\
    ```\n\n在停止 CUPS 服务后检查其状态时，其状态为非活动（dead），但仍然已启用。\n\n> ***注意***\n> “已启用”是 systemd\
    \ 的术语，意味着它将在每次系统重启时持续启动。\n\n#### 1.10.2.3 使用 systemd 重启、启用或禁用 CUPS 服务\n\n重启服务意味着服务被停止然后再次启动。如果服务当前未运行，重启它只是启动服务。使用以下命令重启\
    \ CUPS 服务：\n\n```\n$ sudo systemctl restart cups.service\n```\n\n你也可以使用 systemctl\
    \ 执行服务的条件重启。条件重启仅在服务当前运行时才重启它。任何处于非活动状态的服务都不会被启动。\n\n```\n$ sudo systemctl condrestart\
    \ cups.service\n```\n\n在上面的命令示例中，CUPS 服务在命令执行前处于非活动状态。当条件重启完成时，不会出现错误消息。cups 守护进程未被启动，因为条件重启仅影响活动服务。\n\
    \n在停止、启动或条件重启服务后，检查其状态始终是一个好习惯。\n\n#### 1.10.2.4 使用 systemd 将 CUPS 配置为持久服务\n\n\
