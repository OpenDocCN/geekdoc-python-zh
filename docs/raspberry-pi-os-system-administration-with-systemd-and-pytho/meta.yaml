    ## 2.5.2.2 Backing Up Your Files


    We will not go into the general necessity of backing up your files on your Raspberry
    Pi system as a part of maintaining that computer system, because the reasons for
    doing that should be pretty obvious to even novice users. According to Linux system
    professionals, there is an easy-to-remember and important set of considerations
    you have to make when backing up the system as an ordinary user, and perhaps even
    as the system administrator. This set of considerations can be posed in simple
    question form as “How, What, Why, When, Where, and Who?” Some of the answers to
    these simple questions can be dovetailed together, and we give a selected list
    of example answers as follows:


    “How” means on the boot/system medium, to Dropbox, to a USB thumb drive manually,
    to another computer on your home network, automatically by cron, systemd, or ZFS,
    to another USB3-connected medium manually, totally, incrementally, via RAID, or
    any variant and combination of all of these.


    “What” means just some of your personal files, all of them, only certain kinds
    of documents, your entire home directory, the whole boot/system medium, multiple
    external media, and so on.


    “Why” means deciding on the relative importance of “What” you are backing up.


    “When” means every five minutes, hourly, once a day, once a week, once a month,
    every time you save a particular file, and at what time exactly, like AM.


    “Where” means very much the same thing as “How”.


    “Who” means you personally, automatically by cron, systemd, or ZFS, the designated
    system administrator, Dropbox.com, or some other commercial backup agent.


    To give you a notion of a prudent strategy to deploy in backing up your own user
    files, the file that contains the words you are reading right now was archived
    in the following manner:


    1. Saved at regular intervals to an SSD, which served as the boot/system medium
    on a Raspberry Pi 400.

    2. Saved periodically to an externally mounted USB3 thumb drive mounted on that
    same Raspberry Pi 400.

    3. Saved periodically to another Raspberry Pi 4B attached to the local area network.


    We will use the **rsync** command to accomplish our backup strategies in this
    section. This command is similar to the **cp** and **rcp** commands, except that
    it is more efficient and faster.


    Most importantly, **rsync** “synchronizes” two files or directory structures so
    that changes in one are reflected in the **rsync** duplicate, either locally between
    mounted media, or remotely over a local area network (LAN) or the Internet.


    It can copy locally or to/from another host over any remote shell, particularly
    **ssh**. It has a large number of options that control every aspect of its behavior
    and permits very flexible specification of the set of files to be copied. The
    **rsync** command finds files that need to be transferred using a “quick check”
    algorithm (by default) that looks for files that have changed in size or in last-modified
    time. We encourage you to consult the **rsync** man page for more information.


    The general forms of the **rsync** command are:


    **Local:**


    **rsync [OPTION(S)...] SRC... [DEST]**


    **Across a network:**


    **Pull: rsync [OPTION(S)...] [USER@]HOST:SRC... [DEST]**

    **Push: rsync [OPTION(S)...] SRC... [USER@]HOST:DEST**


    where **OPTION(S)** are the valid options for the **rsync** command, **SRC** is
    the source file or directory, and **DEST** is the destination path.


    The next five examples will use Python3 standard library modules, and embed Bash
    shell commands in a Python “wrapper” (Linux shell command(s) embedded in Python
    code). The examples primarily use the Python3 **os.system** module to:


    1. Back up a single file on the system medium to a mounted USB thumb drive.

    2. Back up a single directory beneath your home directory on the system medium
    to a directory on a mounted USB thumb drive.

    3. Back up a single directory beneath your home directory on the system medium
    to another network location on your LAN in **Push** mode.

    4. Back up a directory on the system medium to a mounted USB thumb drive in a
    rolling, incremental scheme, that creates “snapshots” of the source directory
    anytime the Python3 script is run.

    5. Customize a system command to show permissions of files in the current working
    directory that match a certain pattern.


    The following simple example shows you how to use Thonny and Python3 to back up
    a single file on your system medium to a USB thumb drive you mounted and attached
    to your file system. It assumes you have an ordinary file in the current working
    directory named **ex28.bash**, and that the destination path on the USB thumb
    drive is **/media/bob/7C87-8F1D**. That path on your Raspberry Pi system will
    be different.


    ### Example 2.31


    ```

    >>>import os

    >>>os.system(''rsync -av ex28.bash /media/bob/7C87-8F1D'')

    sending incremental file list

    ex28.bash


    sent 331 bytes  received 35 bytes  104.57 bytes/sec

    total size is 225  speedup is 0.61

    0

    >>>

    ```


    The following example shows you how to use Thonny and Python3 to back up an entire
    directory on your system medium to the USB thumb drive you have mounted and attached
    to your system. It assumes that Thonny’s current working directory has a subdirectory
    named **__pycache__**, and that the destination path on the USB thumb drive is
    **/media/bob/7C87-8F1D**.


    ### Example 2.32


    ```

    >>>import os

    >>>os.system(''rsync -av __pycache__ /media/bob/7C87-8F1D'')

    sending incremental file list

    __pycache__/

    __pycache__/grepper.cpython-39.pyc

    ```'
