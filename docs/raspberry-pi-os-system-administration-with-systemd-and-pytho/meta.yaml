    \ 池和文件系统组织<br>ZFS 去重、效率、优化<br>I/O 参数<br>Zvol 创建和管理 |\n| 网络 I/O | 网络内存缓冲区<br>网络相关参数<br>网络基础设施\
    \ |\n\n## 1.14.1 应用程序级进程/线程资源管理\n\n监控系统资源（如进程 CPU 使用率和系统内存）的基本原因，是考虑到系统为其设计和预期的用例，允许你在应用程序级别观察、评估并最终控制对你重要的程序如何有效地使用系统资源的主要组件。\n\
    \n例如，如果某个特定的标准应用程序（例如你从在线仓库安装的 Web 服务器）或甚至用户编写的程序的进程，根据你根据系统设计或预期的用例确定的标准，消耗了过多的\
    \ CPU 或内存资源，你可以缩减该任务的操作以更好地服务于你的用户群。另一方面，如果由于任何原因，这些相同的进程未得到充分服务或资源匮乏，你也可以扩大该任务的操作。在某些情况下，服务不足可能是由硬件故障或非法入侵引起的，但我们在本节中不涵盖这些情况。"
