    # 0.4 Printing Commands


    A very useful and common task performed by every user of a computer system is
    the printing of text files at a printer. This is accomplished using the configured
    printer(s) on the local, or a remote, system. Printers are controlled and managed
    with the Common UNIX Printing System (CUPS). We show this utility in detail in
    Chapter 1.


    The common commands that perform printing on a Raspberry Pi OS are **lpr** and
    **lp**. The general syntax of the **lpr** command is as follows:


    ```

    lpr [options] filename

    Purpose: Send files to the printer

    Output: Files sent to the printer queue as print jobs

    Commonly used options/features:

    -P printer Send output to the named printer

    -# copies Produce the number of copies indicated for each named file

    ```


    The following **lpr** command accomplishes the printing of the file named **order.pdf**
    at the printer designated on our system as **spr**. Remember that no space is
    necessary between the option (in this case **-P**) and the option argument (in
    this case **spr**).


    ```

    $ lpr -Pspr order.pdf

    $

    ```


    The following **lpr** command accomplishes the printing of the file named **memo1**
    at the default printer.


    ```

    $ lpr memo1

    $

    ```


    The following multiple command combines the **man** command and the **lpr** command,
    and ties them together with the Raspberry Pi OS pipe (|)'
  - '[PAGE 40]


    redirection character, to print the man pages describing the **ls** command at
    the printer named **hp1200**.


    ```

    $ man ls | lpr -Php1200

    $

    ```


    The following shows how to perform printing tasks using the **lp** command. The
    general syntax of the **lp** command is as follows:


    **lp [options][option arguments] file(s)**

    **Purpose:** Submit files for printing on a designated system printer, or alter
    pending print jobs

    **Output:** rinted files or altered print queue

    **Commonly used options/features:**

    **-d destination** Print to the specified destination

    **-n copies** Sets the number of copies to print


    In the first command, the file to be printed is named **file1**. In the second
    command, the files to be printed are named **sample** and **phones**. Note that
    the **-d** option is used to specify which printer to use. The option to specify
    the number of copies is **-n** for the **lp** command.


    ```

    $ lp -d spr file1

    request id is spr-983 (1 file(s))

    $ lp -d spr -n 3 sample phones

    request id is spr-984 (2 file(s))

    $

    ```


    # 0.5 Chapter Summary


    In this introductory chapter, we covered essential Raspberry Pi OS commands that
    allow a system administrator to do file maintenance, and perform other useful
    operations. This is a mandatory set of essentials that even an ordinary, non-administrative
    user would need to know to work efficiently in a character, or text-based interface
    to the operating system. Text-based commands are the predominant means that a
    system administrator uses to maintain the integrity of the system. We gave examples
    and showed the basic format of the following commands and primitives:'
