    \ microSD 卡的树莓派系统。或者一个普通用户正在存储大文件（如视频或其他类型的媒体文件）的系统。\n传统上，**du** 命令允许你以各种格式获取文件和目录磁盘使用情况的基于文本的摘要。然后，管理员可以根据系统的用例采取措施来减少存储使用量。有关\
    \ **du** 命令的更多信息，请参阅你树莓派系统上 **du** 的手册页。\n\n**df** 命令（df 是 disk free 的缩写）允许你显示调用用户具有读取权限的文件系统的可用存储空间量。**df**\
    \ 通常使用 **-h** 和 **T** 选项调用，这会给出人类可读的输出格式，其中包括文件系统类型。例如，在我们的启动/系统介质是外接 USB3 SSD\
    \ 的树莓派 400 系统上，以下命令提供了有关存储和文件系统布局的信息：\n\n```\n$ df -hT\nfile system  Type    \
    \  Size   Used  Avail  Use%  Mounted on\n/dev/root    ext4      439G   15G   403G\
    \   4%    /\ndevtmpfs     devtmpfs  1.7G   0     1.7G   0%    /dev\ntmpfs    \
