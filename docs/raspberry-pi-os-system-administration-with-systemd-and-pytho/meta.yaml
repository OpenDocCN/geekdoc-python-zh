    \n### 方式3（导入脚本模式）\n\n与方式2（脚本模式）类似，你使用你选择的文本编辑器在Thonny中设置的当前工作目录中创建并保存多个Python命令到一个脚本文件中，可能命名为**first.py**。\n\
    \n在Thonny Shell区域，在那里的Python3命令提示符下，你使用Python3的**import**命令将脚本文件导入Python。使用此模式的一个好理由是，如果你的脚本文件包含函数定义。一个简单的例子如下：\n\
    \n# 示例 2.3\n\n```\n>>>import first\nCount for me, Python!\nI'm counting! 0\nI'm\
