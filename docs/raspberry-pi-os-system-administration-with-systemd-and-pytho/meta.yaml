    >>> for line in os.popen(''ls -la f*''): print(line.rstrip()) #Press Enter twice!

    ...

    -rw-r--r-- 1 bob bob 421 Jun 10 06:47 firstclass.py

    >>>

    ```


    # 2.5 Practical Examples


    To begin this section, it would be helpful for you to read and try to get some
    familiarity with the following two references in the Python online documentation
    for the release of Python you are using. With the purpose of getting a better
    “top-down” overview of how Python is structured.


    +   1. The Python Language Reference— https://docs.python.org/3/reference/

    2. Python standard library, particularly the sys and os modules.


    In the previous sections of this chapter, we provided an overview of the Python3
    language and its syntax via the writing and execution of small (1–25 line) script
    files and functions. In this section, we will detail some of Python3’s practical
    applications in real-world computer programming with larger (25–50 line) user-written
    modules, functions, and scripts.


    As mentioned in Section 2.3.7, Python3 can be used to accomplish tasks revolving
    around shell scripting, systems programming, network and Internet scripting, database
    programming, systems administration scripting, GUI scripting, scientific and math
    programming, and data mining.


    We will begin by writing script files in Python3 that accomplish what Raspberry
    Pi OS shell scripts accomplish, with the goal of familiarizing you with some simple
    practical applications of Python3.'
- md: "## 2.5.1 Another Way of Writing Shell Script Files\n\nIn this section, we do\
    \ *not* go over the basics of shell scripting, but provide methods and practical\
    \ examples (including the rewriting of shell scripts) of how to accomplish what\
    \ shell scripting accomplishes, using Python3 language syntax and structure. The\
    \ advantages of using Python3 are that it is a more robust and extensible language,\
    \ with many more features and capabilities than any of the usual scripting languages,\
    \ like Bash, Tcsh, or csh. One of these features is Python3 OOP, which Bash and\
    \ Tcsh scripts are *not* capable of.\n\n### 2.5.1.1 Rewriting Bash and Tcsh Scripts\n\
    \nWe start with a simple example of a Bash shell script rewritten in Python3.\
    \ The Bash shell script to print out whether a certain directory path exists on\
    \ our file system or not is given first, and then its Python equivalent, is shown\
    \ in Example 2.26. You should run both, using Way 4 (Bash Mode) for the Python3\
    \ code, and run the Bash script on the Raspberry Pi command line in a terminal.\
    \ Shown below are these code samples; you should note the comparative output on\
    \ your system.\n\nExample 2.26\n\nBash script code\n\n```\n#!/bin/bash\nif [ -d\
    \ \"/usr/bin\" ]; then\n    echo \"/usr/bin is a directory\"\nelse\n    echo \"\
    /usr/bin is not a directory\"\nfi\n```\n\nEquivalent Python code\n\n```\n#!/usr/bin/python3\n\
    import os\nif os.path.isdir(\"/usr/bin\"):\n    print (\"/usr/bin is a directory\"\
    )\nelse:\n    print (\"/usr/bin is not a directory\")\n```\n\nOn our Raspberry\
    \ Pi system, using Python 3.9.2, we executed the Python3 code equivalent using\
    \ a variation of the alternative method of Way 4 (Bash Mode). In our nano text\
    \ editor, we created and named the Python equivalent **ex26.py**. We obtained\
    \ the following output (remember to make the Python equivalent executable using\
    \ the **chmod u+x** command!):\n\n```\n$ ./ex26.py\n/usr/bin is a directory\n\
    $\n```\n\nThe important thing to notice about the above Python3 code, and its\
    \ execution, is that:\n\n+   1. A standard library module named **os** is imported\
    \ at the top of the script file.\n2. **os.path** is a nested module that provides\
    \ directory and pathname tools, in addition to those tools in the **os** standard\
    \ library module.\n\n## In-Chapter Exercises\n\n+   37. Give the exact syntax\
    \ you used on the Bash command line to run the Bash shell script shown in Example\
    \ 2.26.\n38. Referring to the online documentation, what other **os** module from\
    \ the standard library can be used to achieve the same thing as the Python3 code\
    \ in Example 2.26?\n39. Edit the Python3 code for Example 2.26, and substitute\
    \ the path **/usr/bin/yyy** for **/usr/bin**. What output from the program do\
    \ you get when you run it after making this change?\n\nAnother simple example\
    \ of a Bash shell script converted to Python is as follows. Again, we ran the\
    \ Python3 script using Way 4 (Bash Mode).\n\n## Example 2.27\n\n### Bash script\
    \ code\n\n```\n#!/bin/bash\necho \"Enter input: \\c\"\nread line\necho \"You entered:\
    \ $line\"\necho \"Enter another line: \\c\"\nread word1 word2 word3\necho \"The\
    \ first word is: $word1:\"\necho \"The second word is: $word2:\"\necho \"The rest\
    \ of the line is: $word3:\"\nexit 0\n```\n\n### Equivalent Python code\n\n```\n\
    #!/usr/bin/python3\nimport sys\ns = input(\"Enter input:\")\nprint (\"You entered:\"\
    , s)\nr = input(\"Enter another line:\")\nwords = r.split()\nprint (\"The first\
    \ word is:\", words[0])\nprint (\"The second word is:\", words[1])\nrest = (r.join(words[2:]))\n\
    print (\"The rest of the line is:\", rest)\nsys.exit() #normal exit status\n```\n\
    \nOn our Raspberry Pi system, using Python 3.9.2, we ran the Python code equivalent,\
    \ using Way 4 (Bash Mode). We named the Python3 equivalent ex27.py. We obtained\
    \ the following output, with the supplied text shown (remember to make the Python3\
    \ equivalent executable using the chmod u+x command!):\n\n```\n$ ./ex27.py\nEnter\
    \ input: Linux rules!\nYou entered: Linux rules!\nEnter another line: Raspberry\
    \ Pi rules!\nThe first word is: Raspberry\nThe second word is: Pi\nThe rest of\
    \ the line is: rules!\nProcess ended with exit code 0.\n$\n```\n\n## In-Chapter\
    \ Exercises\n\n+   40. Give two examples of list indexing or slicing used in Example\
    \ 2.27.\n41. Give two examples of string methods from Example 2.27.\n\nThe following\
    \ is another illustration of taking a Bash shell script and converting it to Python3.\n\
    \n## Example 2.28\n\n### Bash script code\n\n```\n#!/bin/bash\necho \"The command\
    \ name is: $0.\"\necho \"The value of the command line arguments are: $1 $2 $3\
    \ $4 $5 $6 $7 $8 $9.\"\necho \"Another way to display values of all the arguments:\
    \ $@.\"\necho \"Yet another way is: $?\"\nexit 0\n```\n\n### Python code\n\n```\n\
    #!/usr/bin/python3\nimport sys\nx = (sys.argv)\nprint (\"The command name is:\
    \ \", sys.argv[0])\nprint (\"The value of the command line arguments are: \",\
    \ x[1:10])\nprint (\"Another way to display values of all the arguments: \", sys.argv[1:])\n\
    print (\"Yet another way is: \", sys.argv[slice(1,15)])\nsys.exit ()\n```\n\n\
    On our Raspberry Pi system, using the default Bash shell and Python 3.9.2, we\
    \ ran both the Example 2.28 Bash script code, and its Python3 code equivalent\
    \ (using Way 4 [Bash Mode]). We named the Bash version **ex28.bash**, and the\
    \ Python3 equivalent **ex28.py**. We obtained the following output, with the argument\
    \ lists shown (remember to make the Bash script file and its Python equivalent\
    \ executable using the **chmod u+x** command before you run these commands!):\n\
    \n```\n$ ./ex28.bash a b c d e f g h i j k l m n\nThe command name is: ./ex28.bash.\n\
    The value of the command line arguments are: a b c d e f g h i.\nAnother way to\
    \ display values of all the arguments: a b c d e f g h i j k l m n.\nYet another\
    \ way is: a b c d e f g h i j k l m n.\n$\n```\n\n```\n$ ./ex28.py a b c d e f\
    \ g h i j k l m n\nThe command name is: ./ex28.py.\nThe value of the command line\
    \ arguments are: ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h', 'i']\nAnother way to\
    \ display values of all the arguments: ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h',\
    \ 'i', 'j', 'k', 'l', 'm', 'n']\nYet another way is: ['a', 'b', 'c', 'd', 'e',\
    \ 'f', 'g', 'h', 'i', 'j', 'k', 'l', 'm', 'n']\n$\n```\n\nSimilar to the Bash\
    \ shell in syntax and structure, the Tcsh shell has functional capabilities that\
    \ can be implemented easily in Python3. The following is a Tcsh script file, whose\
    \ syntactic structure and program functionality are converted to a Python3 script\
    \ file that you should run using Way 4 (Bash Mode), similar to the above examples\
    \ in this section:\n\n## Example 2.29\n\n### Tcsh shell code\n\n```\n#!/bin/tcsh\n\
    if (($#argv == 0) || ($#argv > 1)) then\n    echo \"Usage: $0 ordinary_file\"\n\
    \    exit 1\nendif\nif (-f $1) then\n    set filename = $argv[1]\n    set fileinfo\
    \ = `ls -il $filename`\n    set inode = $fileinfo[1]\n    set size = $fileinfo[6]\n\
    \    echo \"File Name:   $filename\"\n    echo \"Inode Number:  $inode\"\n   \
    \ echo \"Size (bytes):  $size\"\n    exit 0\nelse\n    echo \"$0: argument must\
    \ be an ordinary file\"\n    exit 1\nendif\n```\n\n### Python code\n\n```\n#!/usr/bin/python3\n\
    import os\nimport sys\nif len(sys.argv) == 1 or len(sys.argv) > 2: #check for\
    \ no/too many args\n    print (\"Usage: \", sys.argv[0], \" ordinary file\")\n\
    \    sys.exit(1)\nif os.path.isfile(sys.argv[1]): #bingo, get stats\n    filename\
    \ = sys.argv[1]\n    fileinfo = os.stat(filename)\n    print (\"Filename inode\
    \ size\")\n    print (\" \")\n    print (filename, fileinfo.st_ino, fileinfo.st_size)\n\
    \    sys.exit(0)\nelse:                    # argument must something else!\n \
    \   print (sys.argv[1], \" argument must be an ordinary file\")\n    sys.exit(1)\n\
    ```\n\nOn our Raspberry Pi system, we ran the Python3 code equivalent using Way\
    \ 4 (Bash Mode). We named the Python3 equivalent ex29.py. We obtained the following\
    \ output, where there was a file named ex29.py in the current working directory,\
    \ but *no* file named **lab1** (remember to make the Bash script file and its\
    \ Python equivalent executable using the **chmod u+x** command!):\n\n```\n$ chmod\
    \ u+x ex29.py\n$ ./ex29.py\nUsage: ./ex29.py ordinary file\n$ ./ex29.py lab1\n\
    lab1 argument must be an ordinary file\n$ ./ex29.py ex29.py\nFilename inode size\n\
    \nex29.py 12452180 572\n$\n```\n\n## 2.5.2 A Basic Web Server and User File Maintenance\n\
    \nA very useful, and practical example of using built-in Python3 capabilities\
    \ on your Raspberry Pi system is the **http.server** module, that comes standard\
    \ with Python3. The value of using this module, at least for an ordinary user\
    \ of a Raspberry Pi system, is that you can quickly and easily implement a system\
    \ service that can be programmed, configured, and controlled by that ordinary\
    \ user.\n\nAnother very useful, and important aspect of an ordinary user's interaction\
    \ with a Raspberry Pi system, that we cover in Section 2.3.2.2, is how effectively\
    \ you can maintain the files on your system. The Python3 standard library, and\
    \ many user-written libraries and modules, can help you do this efficiently on\
    \ the Raspberry Pi OS. You can utilize the extensive syntax, and the multi-paradigm\
    \ programming capabilities of Python3, to go far beyond the capabilities of doing\
    \ operating system and file maintenance that are available in any of the shell\
    \ script-creation programs.\n\nUser file maintenance consists of creating, saving,\
    \ organizing, and deleting files on your system, in your own account, or globally\
    \ for the entire system and its users.\n\n### 2.5.2.1 Web Server Example\n\nIn\
    \ this section we show an ordinary user how to create and use a web server, using\
    \ a built-in Python3 module.\n\n## Example 2.30\n\nA Simple Web Server Implemented\
    \ in Python3.\n\nThe SimpleHTTPServer module that comes with Python3 is a simple\
    \ HTTP server that provides standard GET and HEAD request handlers. An advantage\
    \ of using the Python3 built-in HTTP server is that you don't have to install"
  mdcn: "## 2.5.1 编写 Shell 脚本文件的另一种方式\n\n在本节中，我们*不*介绍 shell 脚本的基础知识，而是提供使用 Python3\
