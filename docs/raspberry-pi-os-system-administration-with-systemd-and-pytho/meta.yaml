    # Series Preface


    This series of books covers the basics of Raspberry Pi Operating System administration,
    and is geared towards a novice user. Each book is a complete, self-contained introduction
    to important system administration tasks, and to other useful programs. The foundation
    of all of them is the systemd super-kernel. They guide the user along a path that
    gives the “why” and “how to” of those important system administration topics,
    and they also present the following essential application facilities:


    +   1) Raspberry Pi OS System administration with systemd, Volume 1

    2) Raspberry Pi OS System administration with systemd and Python, Volume 2

    3) Raspberry Pi OS Text Editing, git, Virtualization with LXC/LXD, Volume 3


    They can be used separately, or together, to fit the learning objectives/pace,
    and interests of the individual, independent learner, or can be adopted in a more
    formal learning environment to supplement and extend the basic knowledge of a
    Linux operating system in a classroom environment that uses the Raspberry Pi OS.


    In addition, each book has In-Chapter Exercises throughout, and a Question, Problems,
    and Projects addendum to help reinforce the learning goals of the individual student,
    or reader.


    An online Github site, with further materials and updates, program code, solutions
    to both In-Chapter Exercises and End-of-Chapter Problems, Questions, and Projects,
    plus other supplements, is provided for each volume. It can be found at:


    www.github.com/bobk48/RaspberryPiOS


    The fundamental prerequisites of each volume are 1) knowledge of how to type a
    syntactically correct Linux command on the command line, 2) having access to a
    dedicated Raspberry Pi computer with the latest Raspberry Pi Operating System
    already installed and running on it, 3) being a privileged user on the system
    that is able to execute the **sudo** command to assume superuser status, and 4)
    having a basic knowledge of how to edit and save text files in the **nano** text
    editor.


    All instructions in these volumes were tested on either a Raspberry Pi 4B, or
    a Raspberry Pi 400, both with 4 GB of memory, and the latest version of the Raspberry
    Pi OS at the time.'
