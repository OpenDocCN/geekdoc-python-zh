    # 2.5.5 Talking Threads: The Producer–Consumer Problem Using the queue Module


    In computing, the *producer–consumer problem* (sometimes called the *bounded-buffer
    problem*) is a classic example of the use of various approaches to the synchronization
    of the execution of multiple threads, or processes. We addressed some of the issues
    involved with the producer–consumer model in Section 2.5.4. In this section, we
    give more details, and a worked example, to further illustrate this important
    computer science concept using Python3.


    The problem concerns two tasks, the “producer” process and the “consumer” process,
    that share a common, fixed-size queue, or storage pool. The producer “produces”
    a piece of data, puts it into the queue and starts producing more data. Simultaneously,
    the consumer is “consuming” the data, i.e., removing it from the queue.


    The solution to the problem, as we present it here, is to make sure that the producer
    will not add data into the queue when it’s full, and that the consumer will not
    try to remove data when the queue is empty. The next time the consumer removes
    an item from the queue, it notifies the producer, which starts to fill the queue
    again. In the same way, the consumer can become idle if it finds the queue is
    empty. The next time the producer puts data into the queue, it activates the idled
    consumer.


    There are a variety of approaches to the solution in Python3, for example, using
    locks, semaphores, event synchronization, condition objects or variables, barriers,
    and the **queue** module. The Python3 **queue** module has three classes that
    facilitate threading, and these are only different in terms of retrieval order
    off the queue: **Queue**, **LifoQueue**, and **PriorityQueue**. It also uses a
    number of Python3 methods, which have within them the “locking/releasing” mechanisms
    that can be applied in order for you to work very efficiently with multi-threaded
    process applications. We choose to implement our example solution in Section 2.5.5.2
    using the **queue** module, with its **Queue** class, and its accompanying Python3
    methods. Section 2.5.5.1 gives a basic overview of the **queue** module, along
    with its classes and methods.'
