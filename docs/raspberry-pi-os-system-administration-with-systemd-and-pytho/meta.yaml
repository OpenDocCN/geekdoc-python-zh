    \ Bash、Tcsh 或 csh）更多的特性和功能。其中一个特性是 Python3 的面向对象编程（OOP），这是 Bash 和 Tcsh 脚本*无法*实现的。\n\
    \n### 2.5.1.1 重写 Bash 和 Tcsh 脚本\n\n我们从一个简单的例子开始，将一个 Bash shell 脚本用 Python3 重写。首先给出用于打印某个目录路径是否存在于我们文件系统中的\
    \ Bash shell 脚本，然后在示例 2.26 中展示其 Python 等效代码。你应该运行这两个脚本，对 Python3 代码使用方式 4（Bash\
