    # 1.7 Determining and Changing File Access Privileges


    Once a user or group account has been added to the system, the next concern of
    a system administrator is how to maintain file access security, in terms of that
    user or group accounts’ permissions to access and utilize system services, and
    all files in general.


    Traditional UNIX and Linux permissions, which define secure access to file objects,
    such as regular files or directories, are the permissions of *read(r)*, *write(w)*,
    and *execute(x)*.


    Additionally, there are other advanced techniques for setting permissions, such
    as setting the setuid, setgid, and sticky bit. Beyond these, the POSIX ACL model
    gives users finer-grained control over file and directory object security. Every
    file object can be thought of as having associated with it an access ACL, that
    controls the discretionary access to that object. For a directory, this ACL is
    referred to as a default ACL. Linux, by default, uses what is known as the POSIX.1e
    ACLS model. We show extensive methods of doing this model using POSIX.1e, and
    also the NFSv4 Access Control Lists (ACLs) model, in Volume 1. We discuss system
    security in general in Section 1.15 below, and follow that up with specific details
    of it in the sub-sections of that section.


    # 1.7.1 How to Reveal File Access Privileges


    The **ls** command, with the **-l** or **-la**, and **-ld**, options can display
    access permissions for an individual named file, or a list of files or directories.'
