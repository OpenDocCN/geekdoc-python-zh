    or more sets of permissions to see whether the subject is granted, or denied permission
    to act in the intended way on the object, given those contexts. In simple terms,
    match subject and object permissions, and let the subject act, or not, on the
    object.


    There are three basic “classes” of permissions. These are:


    +   1. Discretionary Access Control (DAC):


    Sometimes the object will include sets of rules as part of its description. This
    is an “Access Control List” or “ACL”. A file may supply more than one ACL. A traditional
    Linux file, for example, includes a permissions mask that is an abbreviated ACL
    with three fixed classes of subject (“user”, “group”, and “other”), each of which
    may be granted certain privileges (“read”, “write” and “execute”—or whatever those
    map to for the object in question). Linux file permissions do not allow the arbitrary
    specification of subjects, however, and so are of limited use.


    A Linux file might also support a POSIX1e ACL, or an NFSv4 ACL. This is a list
    of rules that grants various permissions to arbitrary subjects.


    +   2. Mandatory Access Control (MAC):


    The system as a whole may have one or more sets of permissions that get applied
    to all subjects and objects, regardless of their source. Security Extended Linux
    (SELinux) is an example of this.


    +   3. Role-Based Access Control (RBAC):


    Rather than use the user ID to find out what access rights users and groups have
    on the system, the Role-Based Access Control (RBAC) model gives access based on
    the role, or roles that a user assumes. The classic RBAC example is the use of
    the **su** or **sudo** commands to grant an unprivileged user root privileges,
    in a transient way. Another example can be found in ZFS, when you execute the
    **zfs** command, and your action is checked to see that the subject issuing the
    command has the role privilege, *even if the user is root*.


    These classes of access control policies determine what action is allowed on what
    object, under what circumstances (DAC, MAC, or Role-Based Access Control [RBAC]),
    and by what subject.


    A permission in the traditional UNIX/Linux sense, for example, is read, write,
    or execute privilege. A subject, for example, can be thought of as an executing
    process. Most importantly, an object can be thought of as a Linux process, since
    everything done on files and the data in them, is done through active processes
    on the system.'
