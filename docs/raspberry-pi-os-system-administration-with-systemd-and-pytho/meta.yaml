    \n解释器检查线程切换的频率由 **sys.setcheckinterval()** 函数设置。默认情况下，解释器在执行有限但规定数量的字节码指令后检查线程切换。\n\
    \n解决这一困境的众多方法之一是使用各种 Python3 扩展模块。这些模块的覆盖范围超出了我们在此所能说明的范围，也超出了初学者需要掌握的必要内容。但对初学者来说，对\
