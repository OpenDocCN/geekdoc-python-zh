    # 1.4.2 systemd and Traditional System Reboot or Shutdown


    systemd is in charge of taking the system from the normal operating condition
    to a power-off state, or to reboot the system. The relevant systemd **systemctl**
    commands, with their options, that achieve shutting the system down or rebooting
    it, and briefly what they accomplish, are shown in Table 1.1. We described these
    commands and the systemd shutdown process further in Volume 1. The systemd shutdown
    path through possible target states, from a normal operating condition, to a powered-off
    state, is described in Figure 1.2.


    Traditionally, the graceful shutdown or reboot procedures can be done graphically
    from the active window system, or from the command line or console window, using
    the **halt** or **shutdown** commands and their options. The **shutdown** command
    has the advantage of allowing you to specify a time when shutdown processes are
    initiated.


    Graceful shutdown procedures are generally done as follows:


    +   1. Shutdown system and user processes

    2. Flush system memory to disk

    3. Unmount file systems

    4. Power off


    TABLE 1.1

    systemd systemctl Shutdown Commands


    | Command | Description |

    | :--- | :--- |

    | **systemctl halt** | Halts the system |

    | **systemctl poweroff** | Powers off the system |

    | **systemctl reboot** | Restarts the system |

    | **systemctl suspend** | Suspends the system |

    | **systemctl hibernate** | Hibernates the system |

    | **systemctl hybrid-sleep** | Hibernates and suspends the system |'
- md: "## 1.4.3 Preliminary Considerations When Managing System Services with systemd\n\
    \nThe system service manager that is available in our base Raspberry Pi OS is\
    \ systemd. In fact, systemd is the system service manager for all distributions\
    \ in the three major branches of Linux, and all important downstream Linux distributions\
    \ as well, including Raspberry Pi OS.\n\nWe detail system service management with\
    \ systemd completely in Volume 1, and provide several examples there of how to\
    \ effectively control operating system services in a modern systemd-controlled\
    \ Linux system.\n\nWe first pose a couple of preliminary questions about “system\
    \ services” on the Raspberry Pi OS.\n\nQuestion: What is a daemon?\n\nAnswer:\
    \ Basically a daemon is a background, ongoing process that is not linked or controlled\
    \ by a terminal. Particularly not connected in the usual way to standard output\
    \ or stand error.\n\nQuestion: Is a “service” a daemon?\n\nAnswer: Sometimes.\
    \ More accurately and generally, a service can be a process or collection of processes,\
    \ the overall state of the system, or the state of a physical device, a virtual\
    \ device, a dataset, etc. And as a provider of resources, or a collection of an\
    \ applications’ capabilities, it can have more than one instance. For example,\
    \ the many layered file systems present on the system, or the multiple means of\
    \ remote login to the system.\n\n## 1.4.4 Further References For System Service\
    \ Management Using systemd\n\nIn this section we provide further references for\
    \ the uses of systemd for service management, which are presented fully, with\
    \ numerous examples, in Volumes 1 and 3. Our primary reference is the example\
    \ detailed in Volume 1, Example 1.2, of how to enable server-side host services\
    \ for a secure ftp daemon, known as vsftpd. That is a complete primary, basic\
    \ example of using systemd to manage system services.\n\nIn addition, Volume 3,\
    \ “Raspberry Pi OS Text Editors, git, and Virtualization with LXC/LXD”, also shows\
    \ examples of how you can implement the vsftpd service securely inside of an LXC/LXD\
    \ container.\n\nAs noted in the references, you should be cautious when executing\
    \ these examples, particularly if you are *not* using one of the virtualization\
    \ methodologies shown in Volume 3, and are on an insecure network connected to\
    \ the Internet. You must have root privileges on the computer to execute the examples\
    \ we show in the above references as well.\n\n### In-Chapter Exercise\n\n5. What\
    \ is the danger of using ftp, telnet, rlogin, or rsh from a remote site on the\
    \ Internet into your home computer?\n\n## 1.5 User Administration\n\nThe two most\
    \ important objectives of user administration are service and security. First,\
    \ providing service to ensure that the user base has access to and can fully take\
    \ advantage of the resources that the Raspberry Pi OS can provide. Second, securing\
    \ the files and processes that the user base needs to utilize those resources.\
    \ Later in this chapter we go over some of the security methodologies that a system\
    \ administrator can deploy to keep the system secure. In Volume 3, in the chapter\
    \ entitled “Virtualization with LXC/LXD”, we also show security methods that utilize\
    \ various virtualization technologies such as LXC/LXD containers.\n\nThe traditional\
    \ Linux technique for providing service and security to users is through read,\
    \ write, and execute (rwx) access privileges, for the individual user, the group,\
    \ or all others (u,g,o) on the system, to specific objects on the system, such\
    \ as directories, or folders, and most importantly, to the files contained in\
    \ them. Designing and implementing user groups, and access privileges for user\
    \ groups, are the most important parts of this technique.\n\nCertainly, user account\
    \ and group creation and configuration are the first steps in providing maximum\
    \ service and security to the user base. That is true even if you are the only\
    \ user of the system!\n\nA very integral part of designing user accounts and groups\
    \ is the detailed consideration given to the recommended user data storage model\
    \ we showed in Section 1.4.1, item 3. This is done by securing user files on a\
    \ second, possibly redundant, storage medium, so that they can be kept separate\
    \ from the operating system boot medium itself. It can be practically achieved\
    \ by properly creating user accounts so that they have their home directories\
    \ on that second hard drive. As we show in Section 1.8 below, various ways of\
    \ adding redundant persistent media very easily and effectively implement the\
    \ model.\n\nWe concentrate here on how to manage user accounts and groups on Raspberry\
    \ Pi OS with the **adduser**, **addgroup**, **deluser**, **delgroup**, **newusers**,\
    \ **passwd**, and **usermod** commands. These activities are usually done a significant\
    \ time after the initial installation of your Raspberry Pi system, but can be\
    \ done during installation and initialization of the system as well. Following\
    \ is Table 1.2 showing brief descriptions of these commands.\n\n### TABLE 1.2\n\
    Basic User Administration Commands\n\n| Command | Description |\n| :--- | :---\
    \ |\n| **adduser** | Add a new user account |\n| **deluser** | Delete a user account\
    \ |\n| **addgroup** | Add a new group |\n| **delgroup** | Delete a group |\n|\
    \ **newusers** | Update and create new users in batch mode |\n| **passwd** | Manage\
    \ user passwords |\n| **usermod** | Modifies user accounts |\n\nThe examples in\
    \ this section illustrate:\n\n- simple cases of text-based user account creation\
    \ and configuration,\n- text-based group creation and configuration, and\n- text-based\
    \ deletion of a user account and a group.\n\n### In-Chapter Exercise\n\n6. Make\
    \ a table or chart of what users and groups need to be added to your system, and\
    \ what their default account parameters and group memberships should be. What\
    \ command can you use to identify all existing groups on the system?\n\n### 1.5.1\
    \ Adding a User and Group in a Text-Based Interface\n\nThe commands **adduser**\
    \ and **addgroup**, by default, add a “normal” (non-system) user or group to the\
    \ system, using command line options and option arguments. They take default configuration\
    \ information from /etc/adduser.conf. They are a more developed front-end for\
    \ the older, low-level commands, such as **useradd**, **groupadd**, and **usermod**.\
    \ **Adduser** and **addgroup** utilize patented UID and GID values for creation\
    \ of new accounts and groups. By default they create a home directory from a skeleton\
    \ configuration file, etc.\n\n**adduser** itself is a script file that interfaces\
    \ to the following commands and their functionality:\n\n```\nuseradd, groupadd,\
    \ passwd, gpasswd, usermod, chfn, chage, edquota.\n```\n\nAn abbreviated listing\
    \ of the syntax of the **adduser** and **addgroup** commands, taken from the man\
    \ page for adduser, is as follows:\n\n```\nadduser, addgroup - add a user or group\
    \ to the system\nSyntax:\n    adduser [options] [--home DIR] [--shell SHELL] [--no-create-home]\n\
    \    [--uid ID] [--firstuid ID] [--lastuid ID] [--ingroup GROUP | --gid ID]\n\
    \    [--disabled-password] [--disabled-login] [--gecos GECOS]\n    [--add_extra_groups]\
    \ [--encrypt-home] user\n\n    adduser --system [options] [--home DIR] [--shell\
    \ SHELL] [--no-create-\n    home] [--uid ID] [--group | --ingroup GROUP | --gid\
    \ ID] [--disabled-\n    password] [--disabled-login] [--gecos GECOS] user\n\n\
    \    addgroup [options] [--gid ID] group\n\n    addgroup --system [options] [--gid\
    \ ID] group\n\n    adduser [options] user group\n```\n\n**Purpose:**\n    adduser\
    \ and addgroup add users and groups to the system according to\n    command line\
    \ options and configuration information in\n    /etc/adduser.conf. They are friendlier\
    \ front ends to the low-level\n    tools like useradd, groupadd, and usermod programs,\
    \ by default choosing\n    Debian policy conformant UID and GID values, creating\
    \ a home directory\n    with skeletal configuration, running a custom script,\
    \ and other features.\n    adduser and addgroup can be run in one of five modes:\n\
    \n**Output:** New or modified user accounts or groups.\n\n**Commonly Used Options:**\n\
    \    [--quiet] [--debug] [--force-badname] [--help|-h] [--version] [--conf FILE]\n\
    \nThe basic, simple usage as superuser of the following **adduser** command,\n\
    does the following five things:\n\n```\n$ sudo adduser username\n```\n\n1. Create\
    \ the user named username.\n2. Create the user's home directory (the default is\
    \ /home/username),\n   and copy the files from /etc/skel into it."
  mdcn: "## 1.4.3 使用 systemd 管理系统服务时的初步考虑\n\n我们基础版 Raspberry Pi OS 中可用的系统服务管理器是 systemd。事实上，systemd\
    \ 是 Linux 三大分支所有发行版以及所有重要下游 Linux 发行版（包括 Raspberry Pi OS）的系统服务管理器。\n\n我们在第一卷中详细介绍了如何使用\
    \ systemd 进行系统服务管理，并提供了多个示例，展示如何在现代 systemd 控制的 Linux 系统中有效控制操作系统服务。\n\n我们首先针对\
    \ Raspberry Pi OS 上的“系统服务”提出几个初步问题。\n\n问题：什么是守护进程？\n\n答案：守护进程基本上是一个后台持续运行的进程，不与终端关联或受其控制。特别是不以通常方式连接到标准输出或标准错误。\n\
    \n问题：“服务”是守护进程吗？\n\n答案：有时是。更准确和普遍地说，服务可以是一个进程或进程集合、系统的整体状态，或者是物理设备、虚拟设备、数据集等的状态。作为资源提供者或应用程序能力的集合，它可以有多个实例。例如，系统上存在的多层文件系统，或远程登录系统的多种方式。\n\
    \n## 1.4.4 使用 systemd 进行系统服务管理的进一步参考\n\n在本节中，我们提供了关于 systemd 用于服务管理的进一步参考，这些内容在第一卷和第三卷中有完整呈现，并包含大量示例。我们的主要参考是第一卷示例\
    \ 1.2 中详细说明的如何为安全的 ftp 守护进程（称为 vsftpd）启用服务器端主机服务。这是一个使用 systemd 管理系统服务的完整基础示例。\n\
    \n此外，第三卷“Raspberry Pi OS 文本编辑器、git 与 LXC/LXD 虚拟化”也展示了如何在 LXC/LXD 容器内安全实现 vsftpd\
    \ 服务的示例。\n\n如参考文献所述，执行这些示例时应谨慎，特别是如果您*未*使用第三卷中展示的虚拟化方法之一，并且处于连接到互联网的不安全网络中。您还必须在计算机上拥有\
    \ root 权限才能执行上述参考文献中展示的示例。\n\n### 章节内练习\n\n5. 从互联网上的远程站点使用 ftp、telnet、rlogin 或\
    \ rsh 连接到您的家用计算机有什么危险？\n\n## 1.5 用户管理\n\n用户管理的两个最重要目标是服务和安全。首先，提供服务以确保用户群能够访问并充分利用\
    \ Raspberry Pi OS 可以提供的资源。其次，保护用户群需要利用这些资源的文件和进程。在本章后面，我们将介绍系统管理员可以部署的一些安全方法以保持系统安全。在第三卷题为“使用\
    \ LXC/LXD 进行虚拟化”的章节中，我们也展示了利用各种虚拟化技术（如 LXC/LXD 容器）的安全方法。\n\n为用户提供服务和安全的传统 Linux\
    \ 技术是通过读、写和执行（rwx）访问权限，针对系统上的特定对象（如目录或文件夹，最重要的是其中包含的文件），为单个用户、组或所有其他用户（u,g,o）设置权限。设计和实现用户组以及用户组的访问权限是该技术最重要的部分。\n\
    \n当然，用户账户和组的创建与配置是为用户提供最大服务和安全的第一步。即使您是系统的唯一用户，也是如此！\n\n设计用户账户和组的一个非常重要的部分是详细考虑我们在第\
    \ 1.4.1 节第 3 项中展示的推荐用户数据存储模型。这是通过将用户文件保存在第二个（可能是冗余的）存储介质上来实现的，以便将它们与操作系统启动介质本身分开。这可以通过正确创建用户账户来实际实现，使它们的主目录位于第二个硬盘驱动器上。正如我们在下面第\
    \ 1.8 节所示，添加冗余持久介质的各种方法可以非常容易且有效地实现该模型。\n\n我们在此集中介绍如何使用 **adduser**、**addgroup**、**deluser**、**delgroup**、**newusers**、**passwd**\
    \ 和 **usermod** 命令在 Raspberry Pi OS 上管理用户账户和组。这些活动通常在 Raspberry Pi 系统初始安装后相当长一段时间进行，但也可以在系统安装和初始化期间进行。以下是表\
    \ 1.2，简要描述了这些命令。\n\n### 表 1.2\n基本用户管理命令\n\n| 命令 | 描述 |\n| :--- | :--- |\n| **adduser**\
    \ | 添加新用户账户 |\n| **deluser** | 删除用户账户 |\n| **addgroup** | 添加新组 |\n| **delgroup**\
    \ | 删除组 |\n| **newusers** | 批量更新和创建新用户 |\n| **passwd** | 管理用户密码 |\n| **usermod**\
    \ | 修改用户账户 |\n\n本节中的示例说明：\n\n- 基于文本的用户账户创建和配置的简单案例，\n- 基于文本的组创建和配置，以及\n- 基于文本的用户账户和组的删除。\n\
    \n### 章节内练习\n\n6. 制作一个表格或图表，列出需要添加到系统中的用户和组，以及他们的默认账户参数和组成员身份。您可以使用什么命令来识别系统上所有现有的组？\n\
    \n### 1.5.1 在基于文本的界面中添加用户和组\n\n命令 **adduser** 和 **addgroup** 默认使用命令行选项和选项参数向系统添加“普通”（非系统）用户或组。它们从\
    \ /etc/adduser.conf 获取默认配置信息。它们是较旧的底层命令（如 **useradd**、**groupadd** 和 **usermod**）的更高级前端。**adduser**\
    \ 和 **addgroup** 使用专有的 UID 和 GID 值来创建新账户和组。默认情况下，它们从骨架配置文件创建主目录等。\n\n**adduser**\
    \ 本身是一个脚本文件，它与以下命令及其功能进行交互：\n\n```\nuseradd, groupadd, passwd, gpasswd, usermod,\
    \ chfn, chage, edquota.\n```\n\n以下是从 adduser 的手册页中提取的 **adduser** 和 **addgroup**\
