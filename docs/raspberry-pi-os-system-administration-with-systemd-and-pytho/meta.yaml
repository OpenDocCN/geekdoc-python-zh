  md: "# 1.12 Other Raspberry Pi OS Archiving and Backup Facilities\n\nIn addition\
    \ to the traditional **tar** facility briefly shown in the previous section, there\
    \ are several other facilities and methods a system administrator can use to archive\
    \ and backup individual user accounts, files, file systems, and the entire system\
    \ itself. As stated above, to get a more complete listing of the capabilities\
    \ and options available for the command line facilities shown in this, and all\
    \ other sections, consult the man pages on your system for these commands. We\
    \ briefly describe and give simple examples of some of the more modern and useful\
    \ of these facilities and methods below.\n\n# 1.12.1 rsync\n\nThe **rsync** command\
    \ is a very modern and space-efficient way to backup files and directories, particularly\
    \ from one machine to another, using **ssh** across a network. Its operation can\
    \ also be automated, via the use of systemd scheduling.\n\nIts most important\
    \ and defining feature is the data transfer “quick check” algorithm it uses, which\
    \ reduces the amount of data transmitted. This is done by sending only the differences\
    \ between the source files, and the same existing destination files (if any).\
    \ If files need to be transferred, because there is a difference between source\
    \ and destination, they are copied, or “synced”, using this algorithm. The algorithm\
    \ looks for files that have changed in size or modification time. Changes in the\
    \ other possible preserved file object attributes (such as permissions, or ACLs)\
    \ are made on the destination file directly when the quick check indicates that\
    \ the destination file needs to be updated in that way.\n\nAn abbreviated summary\
    \ of the **rsync** man page is as follows:\n\n```\nrsync\nSyntax:\nLocal: rsync\
    \ [OPTION...] SRC... [DEST]\nRemote:\n    via remote shell:\n    Pull mode: rsync\
    \ [OPTION...] [USER@]HOST:SRC... [DEST]\n    Push mode: rsync [OPTION...] SRC...\
    \ [USER@]HOST:DEST\n\n    via rsync daemon:\n    Pull mode: rsync [OPTION...]\
    \ [USER@]HOST::SRC... [DEST]\n              rsync [OPTION...] rsync://[USER@]HOST[:PORT]/SRC...\
    \ [DEST]\n    Push mode: rsync [OPTION...] SRC... [USER@]HOST::DEST\n        \
    \      rsync [OPTION...] SRC... rsync://[USER@]HOST[:PORT]/DEST\n```"
  merge: -1
  pgno: 133
- img_proc: true
  md: '**Purpose:** To transfer files locally or remotely using an efficient and fast
    data transfer algorithm. To copy locally, to/from (push/pull) another host over
    any remote shell, or to/from (push/pull) a remote rsync daemon.


    **Output:** Transferred files, either locally or remotely.


    **Common Options:**


    +   - **-a, --archive** archive mode

    - **-A, --acls** preserve ACLs (implies -p)

    - **--delete** delete extraneous files from destination dirs

    - **-e, --rsh=COMMAND** specify the remote shell to use

    - **--existing** skip creating new files on receiver

    - **-h, --human-readable** output numbers in a human-readable format

    - **-H, --hard-links** preserve hard links

    - **-k, --copy-dirlinks** transform symlink to dir into referent dir

    - **-K, --keep-dirlinks** treat symlinked dir on receiver as dir

    - **-n, --dry-run** perform a trial run with no changes made

    - **-p, --perms** preserve permissions

    - **-q, --quiet** suppress non-error messages

    - **-r, --recursive** recursively descend into directories

    - **--remove-source-files** sender removes synchronized files (non-directory)

    - **-v, --verbose** increase verbosity

    - **-z, --compress** compress file data during the transfer


    **Command Arguments:**


    +   - **SRC** the source file or directory

    - **DEST** the destination path


    ****************************************************************************************************


    # 1.12.1.1 rsync Examples


    One of the basic assumptions we are making in the following set of examples is
    that the source is generally a file object that is changing over time, such as
    a directory where you are modifying files by adding or deleting them from it,
    or from its sub-directories. Also, the destination is a file object that is unchanging,
    or fixed over time, such as when you do an archival backup. This is usually the
    case when you are using an archiving utility, although as you have seen above
    with the tar command, the archive (or destination) can be added to, or extracted
    from in various ways.


    > ***Note***

    We do not cover more complex, or advanced uses of **rsync**.'
