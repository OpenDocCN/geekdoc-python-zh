  - '[PAGE 202]


    3. When a particular object of some type is created, that particular object is
    called an *instance* of that type. In general, an object''s identity and type
    cannot be changed. They are known as *immutable*. If an object''s value can be
    modified, the object is said to be *mutable*. An object that refers to other objects
    to obtain value and type is known as a *container*.


    4. Objects can also define their own *attributes*, or characteristics, of the
    data they are comprised of, and even the *methods* used on them. An attribute
    is a property, or value associated with an object. A method is a function internal
    to a class of objects that performs some sort of operation on those objects when
    the method is used or invoked.


    5. Attributes and methods are accessed using the dot(.) operator, as shown in
    the following examples:


    ```

    x = 2 + 4j creates a complex number x.

    A = a.real uses a method known as real to extract the real part (an attribute)
    of a.

    c = [1, 2, 3] creates an instance of type list identified as c of the integers
    1, -2, and -3.

    c.append(7) adds a new element to c using the append method.

    ```


    # 2.3.3 Python References and Releases


