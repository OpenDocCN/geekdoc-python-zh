    \ the proper commands, similarly to what is shown in the follow-up code to the\
    \ **read** function?\n\n## 2.4.14 Exceptions\n\nIt’s worth noting that there are\
    \ some very useful facilities in Thonny that can help you to debug your program\
    \ or script in a “trial run”, step-by-step fashion. Usually these facilities are\
