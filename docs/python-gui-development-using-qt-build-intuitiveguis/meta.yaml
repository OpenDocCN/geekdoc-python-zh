    3. **Preview Mode:** Qt Designer provides a preview mode, allowing developers
    to visualize how the UI will look and behave at runtime.

    4. **Custom Widget Integration:** Qt Designer supports custom widget integration,
    enabling developers to use third-party or custom widgets within their designs.

    5. **Integration with Python:** Qt Designer seamlessly integrates with Python,
    allowing developers to export UI designs as XML files and then load them into
    Python code using PyQt.'
