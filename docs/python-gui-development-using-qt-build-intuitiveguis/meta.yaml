    \ 的 Python 文件，其中包含与你的 UI 设计对应的 Python 代码。\n\n```\npyuic5 my_ui_file.ui -o generated_ui.py\n\
    ```\n\n# **在 Python 代码中使用 `loadUi()` 函数：**\n\n或者，你可以在 Python 代码中使用 `loadUi()`\
    \ 函数来加载 .ui 文件，并动态创建相应的 PyQt 控件和布局。以下是如何使用 `loadUi()` 函数："
