    \nbutton1 = QPushButton('Button 1')\nbutton2 = QPushButton('Button 2')\n\nlayout\
    \ = QVBoxLayout()\nlayout.addWidget(button1)\nlayout.addWidget(button2)\n\nwindow.setLayout(layout)\n\
    window.show()\napp.exec_()\n```\n\n## 事件处理与信号/槽\n\n-   Qt中事件驱动编程简介。\n-   理解用于处理用户交互的信号槽机制。\n\
