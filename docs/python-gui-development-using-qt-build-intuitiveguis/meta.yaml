    \ super().__init__()\n        self.initUI()\n\n    def initUI(self):\n       \
    \ # 创建一个主菜单\n        main_menu = self.menuBar()\n\n        # 创建文件菜单\n        file_menu\
    \ = main_menu.addMenu('File')\n\n        # 为文件菜单创建操作\n        new_action = QAction('New',\
    \ self)\n        open_action = QAction('Open', self)\n        save_action = QAction('Save',\
    \ self)\n\n        # 将操作添加到文件菜单\n        file_menu.addAction(new_action)\n   \
    \     file_menu.addAction(open_action)\n        file_menu.addAction(save_action)\n\
    \nif __name__ == '__main__':\n    app = QApplication([])\n    window = MainWindow()\n\
    \    window.show()\n    app.exec_()\n```\n\n在这个示例中，我们创建了一个带有主菜单栏（`menuBar()`）的\
    \ QMainWindow。我们向主菜单栏添加了一个“File”菜单，并为其填充了三个操作：“New”、“Open”和“Save”。\n\n## 创建工具栏：\n\
