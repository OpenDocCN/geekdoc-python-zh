    \ accept a text parameter. Upon clicking the button, the text `'Button clicked!'`\
    \ is emitted as part of the signal, and the slot receives and prints this text.\n\
    \nSignals and slots are a powerful mechanism for communication between objects\
    \ in a Qt application. By defining signals and connecting them to slots, you can\
