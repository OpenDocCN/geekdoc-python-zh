    is PyInstaller. PyInstaller analyzes your Python code, along with any imported
    libraries, and bundles them into a standalone executable that can be run on target
    systems. To use PyInstaller with PyQt applications, you''ll first need to install
    PyInstaller and then use it to package your application.'
