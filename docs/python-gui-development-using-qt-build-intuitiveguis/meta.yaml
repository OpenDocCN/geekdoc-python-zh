    \ `loadUi()` 函数，该函数加载 .ui 文件并创建文件中定义的相应 PyQt 控件和布局。以下是如何使用 `uic` 模块从 Qt Designer\
    \ 文件生成 Python 代码的方法：\n\n1.  **在 Qt Designer 中保存你的设计：** 在 Qt Designer 中设计你的 GUI\
    \ 并将其保存为 .ui 文件。\n2.  **将 .ui 文件转换为 Python 代码：** 使用 `pyuic5` 命令行工具或在你的 Python\
    \ 代码中使用 `loadUi()` 函数，将 .ui 文件转换为 Python 代码。\n\n# 使用 `pyuic5` 命令行工具：\n\n你可以使用\
