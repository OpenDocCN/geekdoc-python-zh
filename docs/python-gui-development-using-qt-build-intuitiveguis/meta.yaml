    \n## 在主 GUI 线程中处理信号：\n\n要在主 GUI 线程中处理工作线程发出的信号，你可以使用 `connect` 方法将信号连接到主 GUI 线程中的槽方法。以下是如何处理工作线程发出的\
    \ `task_completed` 信号并使用结果更新 UI：\n\n```python\nfrom PyQt5.QtWidgets import QApplication,\
    \ QLabel\n\nclass MainWindow(QLabel):\n    def __init__(self):\n        super().__init__()\n\
    \        self.initUI()\n\n    def initUI(self):\n        self.setText(\"等待任务完成...\"\
