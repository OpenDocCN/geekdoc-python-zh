    \ When the button is clicked, the `on_button_click` method is called, which updates\
    \ the text of the QLabel to 'Button Clicked!'.\n\n### Example: Handling Key Presses\n\
    \nLet's extend our example to handle key presses. We'll define an event handler\
    \ method to respond to key presses and display the pressed key in the QLabel widget.\n\
    \n```python\nfrom PyQt5.QtWidgets import QApplication, QWidget, QLabel, QVBoxLayout\n\
    from PyQt5.QtCore import Qt\n\nclass MainWindow(QWidget):\n    def __init__(self):\n\
