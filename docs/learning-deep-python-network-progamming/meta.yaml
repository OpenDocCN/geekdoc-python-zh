  md: '# HTTP Response


    The http or Hyper Text Transfer Protocol works on client server model. Usually
    the web browser is the client and the computer hosting the website is the server.
    Upon receiving a request from client the server generates a response and sends
    it back to the client in certain format.


    After receiving and interpreting a request message, a server responds with an
    HTTP response message:


    +   - A Status-line

    - Zero or more header (General|Response|Entity) fields followed by CRLF

    - An empty line (i.e., a line with nothing preceding the CRLF)

    - indicating the end of the header fields

    - Optionally a message-body


    The following sections explain each of the entities used in an HTTP response message.


    # Message Status-Line


    A Status-Line consists of the protocol version followed by a numeric status code
    and its associated textual phrase. The elements are separated by space SP characters.


    ```

    Status-Line = HTTP-Version SP Status-Code SP Reason-Phrase CRLF

    ```'
  merge: -1
  pgno: 32
- img_proc: true
  md: '# HTTP Version


    A server supporting HTTP version 1.1 will return the following version information:


    ```

    HTTP-Version = HTTP/1.1

    ```


    # Status Code


    The Status-Code element is a 3-digit integer where first digit of the Status-Code
    defines the class of response and the last two digits do not have any categorization
    role. There are 5 values for the first digit:


    | S.N. | Code and Description |

    |---|---|

    | 1 | **1xx: Informational**<br>It means the request was received and the process
    is continuing. |

    | 2 | **2xx: Success**<br>It means the action was successfully received, understood,
    and accepted. |

    | 3 | **3xx: Redirection**<br>It means further action must be taken in order to
    complete the request. |

    | 4 | **4xx: Client Error**<br>It means the request contains incorrect syntax
    or cannot be fulfilled. |

    | 5 | **5xx: Server Error**<br>It means the server failed to fulfill an apparently
    valid request. |'
