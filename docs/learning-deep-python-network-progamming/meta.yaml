    \ 0        0            4096 Nov 27  2017 pub\n- drwxr-sr-x   88 0      450  \
    \          4096 May 04 19:30 site\n- drwxr-xr-x    9 0        0            4096\
    \ Jan 23  2014 vol\n```\n\nPlease note that this output is specific to the remote\
    \ computer whose details are submitted when the program is run.\n\n## Email Messages\n\
    \nEmail is a service which allows us to send the message in electronic mode over\
    \ the internet. It offers an efficient, inexpensive and real time mean of distributing\
    \ information among people.\n\n## E-Mail Address\n\nEach user of email is assigned\
    \ a unique name for his email account. This name is known as E-mail address. Different\
    \ users can send and receive messages according to the e-mail address.\n\nE-mail\
    \ is generally of the form username@domainname. For example, webmaster@insightbooks.com\
    \ is an e-mail address where webmaster is username and insightbooks.com is domain\
    \ name.\n\n- The username and the domain name are separated by @ (at) symbol.\n\
    - E-mail addresses are not case sensitive.\n- Spaces are not allowed in e-mail\
    \ address.\n\nThe first five lines of an E-mail message is called E-mail header.\
    \ The header part comprises of following fields:\n\n- From\n- Date\n- To\n- Subject\n\
    - CC\n- BCC\n\n## From\n\nThe **From** field indicates the sender's address i.e.\
    \ who sent the e-mail.\n\n## Date\n\nThe **Date** field indicates the date when\
    \ the e-mail was sent.\n\n## To\n\nThe **To** field indicates the recipient’s\
    \ address i.e. to whom the e-mail is sent.\n\n## Subject\n\nThe **Subject** field\
    \ indicates the purpose of e-mail. It should be precise and to the point.\n\n\
    ## CC\n\n**CC** stands for Carbon copy. It includes those recipient addresses\
    \ whom we want to keep informed but not exactly the intended recipient.\n\n##\
    \ BCC\n\n**BCC** stands for Black Carbon Copy. It is used when we do not want\
    \ one or more of the recipients to know that someone else was copied on the message.\n\
    \n## Greeting\n\nGreeting is the opening of the actual message. Eg. Hi Sir or\
    \ Hi Guys etc.\n\n## Text\n\nIt represents the actual content of the message.\n\
    \n## Signature\n\nThis is the final part of an e-mail message. It includes Name\
    \ of Sender, Address, and Contact Number.\n\nPython has EmailMessage class which\
    \ can be used build email messages. This class has the required methods to customize\
    \ different parts of the email message like - the TO and FROM tags, the Subject\
    \ Line as well as the content of the email."
