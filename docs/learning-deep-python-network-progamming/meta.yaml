    \nprint(addrs[netifaces.AF_LINK])\n```\n\nWhen we run the above program, we get\
    \ the following output –\n\n```\n['lo', 'ens33']\n{17: [{'peer': '00:00:00:00:00:00',\
    \ 'addr': '00:00:00:00:00:00'}],\n2: [{'peer': '127.0.0.1', 'addr': '127.0.0.1',\
    \ 'netmask':\n'255.0.0.0'}], 10: [{'addr': '::1', 'netmask':\n'ffff:ffff:ffff:ffff:ffff:ffff:ffff:ffff/128'}]}\n\
    [{'netmask': '255.255.255.0', 'addr': '192.168.232.128',\n'broadcast': '192.168.232.255'}]\n\
    [{'addr': '00:0c:29:ea:13:0a', 'broadcast': 'ff:ff:ff:ff:ff:ff'}]\n```\n\n## Sockets\
    \ Programming\n\nPython provides two levels of access to network services. At\
    \ a low level, you can access the basic socket support in the underlying operating\
    \ system, which allows you to implement clients and servers for both connection-oriented\
    \ and connectionless protocols.\n\nPython also has libraries that provide higher-level\
    \ access to specific application-level network protocols, such as FTP, HTTP, and\
    \ so on.\n\nSockets are the endpoints of a bidirectional communications channel.\
    \ Sockets may communicate within a process, between processes on the same machine,\
    \ or between processes on different continents. We use the socket module in python\
    \ to create and use sockets.\n\nSockets have their own vocabulary –\n\n| Sr.No.\
    \ | Term & Description |\n| :--- | :--- |\n| 1 | **Domain**<br>The family of protocols\
    \ that is used as the transport mechanism. These values are constants such as\
    \ AF_INET, PF_INET, PF_UNIX, PF_X25, and so on. |\n| 2 | **type**<br>The type\
    \ of communications between the two endpoints, typically SOCK_STREAM for connection-oriented\
    \ protocols and SOCK_DGRAM for connectionless protocols. |\n| 3 | **protocol**\
    \ |\n| 4 | **hostname**<br>The identifier of a network interface –<br>- A string,\
    \ which can be a host name, a dotted-quad address, or an IPV6 address in colon\
    \ (and possibly dot) notation<br>- A string \"<broadcast>\", which specifies an\
    \ INADDR_BROADCAST address.<br>- A zero-length string, which specifies INADDR_ANY,\
    \ or<br>- An Integer, interpreted as a binary address in host byte order. |\n\
    | 5 | **port**<br>Each server listens for clients calling on one or more ports.\
    \ A port may be a Fixnum port number, a string containing a port number, or the\
    \ name of a service. |\n\n## The socket Module\n\nTo create a socket, you must\
    \ use the `socket.socket()` function available in `socket` module, which has the\
    \ general syntax –\n\n```python\ns = socket.socket (socket_family, socket_type,\
    \ protocol=0)\n```\n\nHere is the description of the parameters –\n\n- **socket_family**\
    \ – This is either AF_UNIX or AF_INET, as explained earlier.\n- **socket_type**\
    \ – This is either SOCK_STREAM or SOCK_DGRAM.\n- **protocol** – This is usually\
    \ left out, defaulting to 0.\n\nOnce you have *socket* object, then you can use\
    \ required functions to create your client or server program.\n\n## Server Socket\
    \ Methods\n\n| Sr.No. | Method & Description |\n|---|---|\n| 1 | **s.bind()**<br>This\
    \ method binds address (hostname, port number pair) to socket. |\n| 2 | **s.listen()**<br>This\
    \ method sets up and start TCP listener. |\n| 3 | **s.accept()**<br>This passively\
    \ accept TCP client connection, waiting until connection arrives (blocking). |\n\
    \n## Client Socket Methods\n\n| Sr.No. | Method & Description |\n|---|---|\n|\
    \ 1 | **s.connect()**<br>This method actively initiates TCP server connection.\
    \ |\n\n## General Socket Methods\n\n| Sr.No. | Method & Description |\n|---|---|\n\
    | 1 | **s.recv()**<br>This method receives TCP message |\n| 2 | **s.send()**<br>This\
    \ method transmits TCP message |\n| 3 | **s.recvfrom()**<br>This method receives\
    \ UDP message |\n| 4 | **s.sendto()**<br>This method transmits UDP message |\n\
    | 5 | **s.close()**<br>This method closes socket |\n| 6 | **socket.gethostname()**<br>Returns\
    \ the hostname. |\n\n## A Simple Server\n\nTo write Internet servers, we use the\
    \ **socket** function available in socket module to create a socket object. A\
    \ socket object is then used to call other functions to setup a socket server.\n\
    \nNow call **bind(hostname, port)** function to specify a *port* for your service\
    \ on the given host.\n\nNext, call the *accept* method of the returned object.\
    \ This method waits until a client connects to the port you specified, and then\
    \ returns a *connection* object that represents the connection to that client.\n\
    \n```python\n#!/usr/bin/python           # This is server.py file\n\nimport socket\
    \               # Import socket module\n\ns = socket.socket()         # Create\
    \ a socket object\nhost = socket.gethostname() # Get local machine name\nport\
    \ = 12345                # Reserve a port for your service.\ns.bind((host, port))\
    \        # Bind to the port\n\ns.listen(5)                 # Now wait for client\
    \ connection.\nwhile True:\n   c, addr = s.accept()     # Establish connection\
    \ with client.\n   print 'Got connection from', addr\n   c.send('Thank you for\
    \ connecting')\n   c.close()                # Close the connection\n```\n\n##\
    \ A Simple Client\n\nLet us write a very simple client program which opens a connection\
    \ to a given port 12345 and given host. This is very simple to create a socket\
    \ client using Python's *socket* module function.\n\nThe **socket.connect(hostname,\
    \ port)** opens a TCP connection to *hostname* on the *port*. Once you have a\
    \ socket open, you can read from it like any IO object. When done, remember to\
    \ close it, as you would close a file.\n\nThe following code is a very simple\
    \ client that connects to a given host and port, reads any available data from\
    \ the socket, and then exits –\n\n```python\n#!/usr/bin/python           # This\
    \ is client.py file\n\nimport socket               # Import socket module\n\n\
    s = socket.socket()            # Create a socket object\nhost = socket.gethostname()\
    \ # Get local machine name\nport = 12345                # Reserve a port for your\
    \ service.\n\ns.connect((host, port))\nprint s.recv(1024)\ns.close           \
    \           # Close the socket when done\n```\n\nNow run this server.py in background\
    \ and then run above client.py to see the result.\n\n```\n# Following would start\
    \ a server in background.\n$ python server.py &\n\n# Once server is started run\
    \ client as follows:\n$ python client.py\n```\n\nThis would produce following\
    \ result –\n\n```\nGot connection from ('127.0.0.1', 48437)\nThank you for connecting\n\
    ```\n\n## Socket with Public URL\n\nIn the below example we use few methods from\
    \ the socket module to find the address information of server and host name details.\n\
    \n```python\nimport socket\nfrom pprint import pprint\n\n# get server address\n\
    addrinfo = socket.getaddrinfo('insightbooks.com', 'www')\n\npprint(addrinfo)\n\
    \n# get server hostname\nprint socket.gethostname()\n```\n\nWhen we run the above\
    \ program, we get the following output –\n\n```\n[(2, 1, 0, '', ('94.130.81.180',\
    \ 80))]\nDESKTOP-JXYKQCPLP\n```\n\n## HTTP Client\n\nIn the http protocol, the\
    \ request from the client reaches the server and fetches some data and metadata\
    \ assuming it is a valid request. We can analyze this response from the server\
    \ using various functions available in the python requests module. Here the below\
    \ python programs run in the client side and display the result of the response\
    \ sent by the server.\n\n## Get Initial Response\n\nIn the below program the get\
    \ method from requests module fetches the data from a server and it is printed\
    \ in plain text format.\n\n```python\nimport requests\nr = requests.get('https://httpbin.org/')\n\
    print(r.text)[:200]\n```\n\nWhen we run the above program, we get the following\
    \ output –\n\n```\n<!DOCTYPE html >\n<html lang=\"en\">\n<head>\n    <meta charset=\"\
    UTF-8\">\n    <title>httpbin.org</title>\n    <link\nhref=\"https://fonts.googleapis.com/css?family=Open+Sans:400,700|Source+Code+Pro:300,600|Titillium+\n\
    ```\n\n## Get Session Object Response\n\nThe Session object allows you to persist\
    \ certain parameters across requests. It also persists cookies across all requests\
    \ made from the Session instance. If you're making several requests to the same\
    \ host, the underlying TCP connection will be reused.\n\n```python\nimport requests\n\
    s = requests.Session()\n```"
  mdcn: "## 网络接口\n\n当一台机器有多个网络接口时，我们需要跟踪它们的名称、状态等信息。在 Python 中，我们可以列出这些接口及其状态。\n\n\
    ## 示例\n\n在下面的示例中，我们使用 Python 模块 **netifaces**，它提供了接口及其状态的详细信息。所使用的方法非常简单直接。\n\n\
