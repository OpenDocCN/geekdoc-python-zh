    \n### 列出远程目录\n\n我们可以通过使用ftp访问远程系统来列出远程目录的内容。一旦建立连接，我们就可以使用命令以类似于列出本地目录的方式列出目录内容。\n\
    \n```\nfrom ftplib import FTP\ndef main():\n    ftp = FTP('ftp.ibiblio.org')\n\
    \    ftp.login()\n    ftp.cwd('pub/academic/biology/') # 更改为其他主题\n    entries\
    \ = ftp.nlst()\n    ftp.quit()\n\n    print(len(entries), \"entries:\")\n    for\
    \ entry in sorted(entries):\n        print(entry)\n\nif __name__ == '__main__':\n\
    \    main()\n```\n\n当我们运行上述程序时，我们得到以下输出 –\n\n```\n(6, 'entries:')\nINDEX\nREADME\n\
    acedb\ndna-mutations\necology+evolution\nmolbio\n```\n\n## 远程过程调用\n\n远程过程调用系统使你能够使用与调用本地库中函数相同的语法，来调用远程服务器上可用的函数。这在两种情况下很有用。\n\
    \n- 你可以利用多台机器的处理能力，而无需更改调用位于远程系统上的程序的代码。\n- 处理所需的数据仅在远程系统中可用。\n\n因此，在Python中，我们可以将一台机器视为服务器，另一台机器视为客户端，客户端将调用服务器来运行远程过程。在我们的示例中，我们将使用localhost，将其同时用作服务器和客户端。\n\
    \n### 运行服务器\n\nPython语言自带一个内置服务器，我们可以将其作为本地服务器运行。运行此服务器的脚本位于Python安装目录的bin文件夹下，名为classic.py。我们可以在Python提示符下运行它，并检查其是否作为本地服务器运行。\n\
    \n```\npython bin/classic.py\n```\n\n当我们运行上述程序时，我们得到以下输出 –\n\n```\nINFO:SLAVE/18812:server\
