    \ port[, timeout]]) | 连接到给定的主机和端口。默认端口号为 21，由 FTP 协议指定。 |\n| quit() | 关闭连接并退出。\
    \ |\n\n以下是上述一些方法的示例。\n\n## 列出文件\n\n下面的示例使用匿名登录到 FTP 服务器，并列出当前目录的内容。它遍历文件和目录的名称，并将它们存储为一个列表。然后打印出来。\n\
    \n```python\nimport ftplib\n\nftp = ftplib.FTP(\"ftp.nluug.nl\")\nftp.login(\"\
