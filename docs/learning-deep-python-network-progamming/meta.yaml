- md: "## HTTP Version\n\nA server supporting HTTP version 1.1 will return the following\
    \ version information:\n\n```\nHTTP-Version = HTTP/1.1\n```\n\n## Status Code\n\
    \nThe Status-Code element is a 3-digit integer where first digit of the Status-Code\
    \ defines the class of response and the last two digits do not have any categorization\
    \ role. There are 5 values for the first digit:\n\n| S.N. | Code and Description\
    \ |\n|---|---|\n| 1 | **1xx: Informational**<br>It means the request was received\
    \ and the process is continuing. |\n| 2 | **2xx: Success**<br>It means the action\
    \ was successfully received, understood, and accepted. |\n| 3 | **3xx: Redirection**<br>It\
    \ means further action must be taken in order to complete the request. |\n| 4\
    \ | **4xx: Client Error**<br>It means the request contains incorrect syntax or\
