    \ ability through Python Scripts (.rpy) which are executed upon HTTP requests\n\
    - It comes with proxy and reverse-proxy capabilities\n- It supports Virtual Hosts\n\
    - It can even serve Perl, PHP et cetera\n\n## Uploading Data\n\nWe can upload\
    \ data to a server using python's module which handle ftp or File Transfer Protocol.\n\
    \nWe need to install the module **ftplib** to achieve this.\n\n```\npip install\
    \ ftplib\n```\n\n### Using ftplib\n\nIn the below example we use FTP method to\
    \ connect to the server and then supply the user credentials. Next we mention\
    \ the name of the file and the storbinary method to send and store the file in\
    \ the server.\n\n```\nimport ftplib\n\nftp = ftplib.FTP(\"127.0.0.1\")\nftp.login(\"\
    username\", \"password\")\nfile = open('index.html','rb')\nftp.storbinary(\"STOR\
    \ \" + file, open(file, \"rb\"))\nfile.close()\nftp.quit()\n```\n\nWhen we run\
    \ the above program, we observe that a copy of the file has been created in the\
    \ server.\n\n### Using ftpretty\n\nSimilar to ftplib we can use ftpretty to connect\
    \ securely to a remote server and upload file. We can also download file using\
    \ ftpretty. The below program illustrates the same.\n\n```\nfrom ftpretty import\
    \ ftpretty\n\n# Mention the host\nhost = \"127.0.0.1\"\n\n# Supply the credentials\n\
    f = ftppretty(host, user, pass )\n\n# Get a file, save it locally\nf.get('someremote/file/on/server.txt',\
    \ '/tmp/localcopy/server.txt')\n\n# Put a local file to a remote location\n# non-existent\
    \ subdirectories will be created automatically\nf.put('/tmp/localcopy/data.txt',\
    \ 'someremote/file/on/server.txt')\n```\n\nWhen we run the above program, we observe\
    \ that a copy of the file has been created in the server.\n\n## Proxy Server\n\
    \nProxy servers are used to browse to some website through another server so that\
