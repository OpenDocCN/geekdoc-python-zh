    - 它甚至可以提供Perl、PHP等服务\n\n## 上传数据\n\n我们可以使用Python处理FTP（文件传输协议）的模块将数据上传到服务器。\n\n\
    我们需要安装**ftplib**模块来实现这一点。\n\n```\npip install ftplib\n```\n\n### 使用 ftplib\n\n\
