    SALARY = 65000.0\n\nOperation done successfully\n```\n\n## 删除操作\n\n以下 Python 代码展示了如何使用\
    \ DELETE 语句删除任何记录，然后从 COMPANY 表中获取并显示剩余的记录。\n\n```python\n#!/usr/bin/python\n\n\
    import sqlite3\n\nconn = sqlite3.connect('test.db')\nprint \"Opened database successfully\"\
    ;\n\nconn.execute(\"DELETE from COMPANY where ID = 2;\")\nconn.commit()\nprint\
    \ \"Total number of rows deleted :\", conn.total_changes\n\ncursor = conn.execute(\"\
    SELECT id, name, address, salary from COMPANY\")\nfor row in cursor:\n    print\
    \ \"ID = \", row[0]\n    print \"NAME = \", row[1]\n    print \"ADDRESS = \",\
    \ row[2]\n    print \"SALARY = \", row[3], \"\\n\"\n\nprint \"Operation done successfully\"\
    ;\nconn.close()\n```\n\n当执行上述程序时，将产生以下结果。\n\n```\nOpened database successfully\n\
    Total number of rows deleted : 1\nID = 1\nNAME = Paul\nADDRESS = California\n\
    SALARY = 20000.0\n\nID = 3\nNAME = Teddy\nADDRESS = Norway\nSALARY = 20000.0\n\
    \nID = 4\nNAME = Mark\nADDRESS = Rich-Mond\nSALARY = 65000.0\n\nOperation done\
    \ successfully\n```\n\n## Telnet\n\nTelnet 是一种网络协议，它允许一台计算机上的用户登录到同一网络中的另一台计算机。telnet\
    \ 命令与主机名一起使用，然后输入用户凭证。成功登录后，远程用户可以像系统的常规用户一样访问应用程序和数据。当然，一些权限可以由设置和维护系统的系统管理员控制。\n\
    \n在 Python 中，telnet 由 telnetlib 模块实现，该模块包含 Telnet 类，该类具有建立连接所需的方法。在下面的示例中，我们还使用\
    \ getpass 模块来处理登录过程中的密码提示。我们假设连接是建立到一个 Unix 主机。程序中使用的 telnetlib.Telnet 类的各种方法说明如下。\n\
    \n- Telnet.read_until - 读取直到遇到给定字符串 expected，或直到超时秒数过去。\n- Telnet.write - 将字符串写入套接字，将任何\
    \ IAC 字符加倍。如果连接被阻塞，这可能会阻塞。如果连接关闭，可能会引发 socket.error。\n- Telnet.read_all() - 读取所有数据直到\
    \ EOF；阻塞直到连接关闭。\n\n### 示例\n\n```python\nimport getpass\nimport telnetlib\n\nHOST\
    \ = \"http://localhost:8000/\"\nuser = raw_input(\"Enter your remote account:\
    \ \")\npassword = getpass.getpass()\n\ntn = telnetlib.Telnet(HOST)\ntn.read_until(\"\
    login: \")\ntn.write(user + \"\\n\")\nif password:\n    tn.read_until(\"Password:\
    \ \")\n    tn.write(password + \"\\n\")\n\ntn.write(\"ls\\n\")\ntn.write(\"exit\\\
    n\")\n\nprint tn.read_all()\n```\n\n当我们运行上述程序时，会得到以下输出：\n\n```\n- lrwxrwxrwx \
    \   1 0        0               1 Nov 13  2012 ftp -> .\n- lrwxrwxrwx    1 0  \
    \      0               3 Nov 13  2012 mirror -> pub\n- drwxr-xr-x   23 0     \
    \   0            4096 Nov 27  2017 pub\n- drwxr-sr-x   88 0      450         \
    \   4096 May 04 19:30 site\n- drwxr-xr-x    9 0        0            4096 Jan 23\
    \  2014 vol\n```\n\n请注意，此输出特定于运行程序时提交详细信息的远程计算机。\n\n## 电子邮件消息\n\n电子邮件是一种服务，允许我们通过互联网以电子方式发送消息。它提供了一种高效、廉价且实时的信息分发方式。\n\
    \n## 电子邮件地址\n\n每个电子邮件用户都被分配一个用于其电子邮件帐户的唯一名称。此名称称为电子邮件地址。不同的用户可以根据电子邮件地址发送和接收消息。\n\
    \n电子邮件通常采用 username@domainname 的形式。例如，webmaster@insightbooks.com 是一个电子邮件地址，其中\
    \ webmaster 是用户名，insightbooks.com 是域名。\n\n- 用户名和域名由 @（at）符号分隔。\n- 电子邮件地址不区分大小写。\n\
    - 电子邮件地址中不允许有空格。\n\n电子邮件消息的前五行称为电子邮件标头。标头部分包含以下字段：\n\n- 发件人\n- 日期\n- 收件人\n- 主题\n\
    - 抄送\n- 密送\n\n## 发件人\n\n**发件人**字段表示发件人的地址，即谁发送了电子邮件。\n\n## 日期\n\n**日期**字段表示电子邮件发送的日期。\n\
    \n## 收件人\n\n**收件人**字段表示收件人的地址，即电子邮件发送给谁。\n\n## 主题\n\n**主题**字段表示电子邮件的目的。它应该简洁明了。\n\
    \n## 抄送\n\n**抄送**代表 Carbon copy（抄送）。它包括我们希望告知但并非确切预期收件人的收件人地址。\n\n## 密送\n\n**密送**代表\
    \ Black Carbon Copy（密送）。当我们不希望一个或多个收件人知道消息被抄送给其他人时使用。\n\n## 问候语\n\n问候语是实际消息的开头。例如，Hi\
    \ Sir 或 Hi Guys 等。\n\n## 正文\n\n它代表消息的实际内容。\n\n## 签名\n\n这是电子邮件消息的最后一部分。它包括发件人姓名、地址和联系电话。\n\
    \nPython 有 EmailMessage 类，可用于构建电子邮件消息。该类具有定制电子邮件消息不同部分所需的方法，例如 - TO 和 FROM 标签、主题行以及电子邮件的内容。"
