  - '[PAGE 11]


    **Python Documentation Website** – [www.python.org/doc/](http://www.python.org/doc/)


    # Setting up PATH


    Programs and other executable files can be in many directories. Hence, the operating
    systems provide a search path that lists the directories that it searches for
    executables.


    The important features are –


    +   - The path is stored in an environment variable, which is a named string maintained
    by the operating system. This variable contains information available to the command
    shell and other programs.

    - The path variable is named as **PATH** in Unix or **Path** in Windows (Unix
    is case-sensitive; Windows is not).

    - In Mac OS, the installer handles the path details. To invoke the Python interpreter
    from any particular directory, you must add the Python directory to your path.


    # Setting Path at Unix/Linux


    To add the Python directory to the path for a particular session in Unix –


    +   - **In the csh shell** – type setenv PATH "$PATH:/usr/local/bin/python3" and
    press Enter.

    - **In the bash shell (Linux)** – type export PYTHONPATH=/usr/local/bin/python3.4
    and press Enter.

    - **In the sh or ksh shell** – type PATH="$PATH:/usr/local/bin/python3" and press
    Enter.


    **Note** – /usr/local/bin/python3 is the path of the Python directory.'
  - '[PAGE 12]


    # Setting Path at Windows


    To add the Python directory to the path for a particular session in Windows –


    +   - **At the command prompt** – type path %path%;C:\Python and press Enter.


    **Note** – C:\Python is the path of the Python directory


    # Running Python


    There are three different ways to start Python –


    # Interactive Interpreter


    You can start Python from Unix, DOS, or any other system that provides you a command-line
    interpreter or shell window.


    Enter **python** the command line.


    Start coding right away in the interactive interpreter.


    ```

    $python                # Unix/Linux


    or


    python%                # Unix/Linux


    or


    C:>python              # Windows/DOS

    ```


    # Integrated Development Environment


    You can run Python from a Graphical User Interface (GUI) environment as well,
    if you have a GUI application on your system that supports Python.


    +   - **Unix** – IDLE is the very first Unix IDE for Python.'
- md: "## Internet Protocol\n\nThe Internet Protocol is designed to implement a uniform\
    \ system of addresses on all of the Internet-connected computers everywhere and\
    \ to make it possible for packets to travel from one end of the Internet to the\
    \ other. A program like the web browser should be able to connect to a host anywhere\
    \ without ever knowing which maze of network devices each packet is traversing\
    \ on its journey. There are various categories of internet protocols. These protocols\
    \ are created to serve the needs of different types of data communication between\
    \ different computers in the internet.\n\nPython has several modules to handle\
    \ each of these communication scenarios. The methods and functions in these modules\
    \ can do the simplest job of just validating a URL or also the complex job of\
    \ handling the cookies and sessions. In this chapter we will look at the most\
    \ prominent python modules used for internet protocols.\n\n| Protocol | Python\
    \ Module Name | Description |\n| :--- | :--- | :--- |\n| HTTP | urllib.request\
    \ | Opening the HTTP URL |\n| HTTP | urllib.response | Create a response object\
    \ for a url request |\n| HTTP | urllib.parse | To break Uniform Resource Locator\
    \ (URL) strings up in components like (addressing scheme, network location, path\
    \ etc.), |\n| HTTP | urllib.robotparser | It finds out whether or not a particular\
    \ user agent can fetch a URL on the Web site that published the robots.txt file.\
    \ |\n| FTP | ftplib | implements the client side of the FTP protocol. You can\
    \ use this to write Python programs that perform a variety of automated FTP jobs,\
    \ such as mirroring other FTP servers. |\n| POP | poplib | This module defines\
    \ a class, POP3, which encapsulates a connection to a POP3 server to read messages\
    \ from a email server |\n| IMAP | imaplib | This module defines three classes,\
    \ IMAP4, IMAP4_SSL and IMAP4_stream, which encapsulate a connection to an IMAP4\
    \ server to read emails. |\n| SMTP | smtplib | The smtplib module defines an SMTP\
    \ client session object that can be used to send mail to any Internet machine\
    \ with an SMTP listener daemon. |\n| Telnet | telnet | This module provides a\
    \ Telnet class that implements the Telnet protocol to access a server through\
    \ telnet. |\n\nEach of them is discussed in detail in the subsequent chapters.\n\
    \n## IP Address\n\nIP Address (Internet Protocol) is a fundamental networking\
    \ concept that provides address assignation capability in a network. The python\
    \ module **ipaddress** is used extensively to validate and categorize IP address\
    \ to IPV4 and IPV6 type. It can also be used to do comparison of the IP address\
    \ values as well as IP address arithmetic for manipulating the ip addresses.\n\
    \n### Validate the IPV4 Address\n\nThe ip_address function validates the IPV4\
    \ address. If the range of values is beyond 0 to 255, then it throws an error.\n\
    \n```\nprint (ipaddress.ip_address(u'192.168.0.255'))\nprint (ipaddress.ip_address(u'192.168.0.256'))\n\
    ```\n\nWhen we run the above program, we get the following output –\n\n```\n192.168.0.255\n\
    ValueError: u'192.168.0.256' does not appear to be an IPv4 or IPv6 address\n```\n\
    \n### Validate the IPV6 Address\n\nThe ip_address function validates the IPV6\
    \ address. If the range of values is beyond 0 to ffff, then it throws an error.\n\
    \n```\nprint (ipaddress.ip_address(u'FFFF:9999:2:FDE:257:0:2FAE:112D'))\n\n#invalid\
    \ IPV6 address\nprint (ipaddress.ip_address(u'FFFF:10000:2:FDE:257:0:2FAE:112D'))\n\
    ```\n\nWhen we run the above program, we get the following output –\n\n```\nffff:9999:2:fde:257:0:2fae:112d\n\
    ValueError: u'FFFF:10000:2:FDE:257:0:2FAE:112D' does not appear to be an IPv4\
    \ or IPv6 address\n```\n\n### Check the type of IP Address\n\nWe can supply the\
    \ IP address of various formats and the module will be able to recognize the valid\
    \ formats. It will also indicate which category of IP address it is.\n\n```\n\
    print type(ipaddress.ip_address(u'192.168.0.255'))\n\nprint type(ipaddress.ip_address(u'2001:db8::'))\n\
    \nprint ipaddress.ip_address(u'192.168.0.255').reverse_pointer\n\nprint ipaddress.ip_network(u'192.168.0.0/28')\n\
    ```\n\nWhen we run the above program, we get the following output –\n\n```\n255.0.168.192.in-addr.arpa\n\
    192.168.0.0/28\n```\n\n### Comparison of IP Addresses\n\nWe can make a logical\
    \ comparison of the IP addresses finding out if they are equal or not. We can\
    \ also compare if one IP address is greater than the other in its value.\n\n```\n\
    print (ipaddress.IPv4Address(u'192.168.0.2') >\nipaddress.IPv4Address(u'192.168.0.1'))\n\
    print (ipaddress.IPv4Address(u'192.168.0.2') ==\nipaddress.IPv4Address(u'192.168.0.1'))\n\
    print (ipaddress.IPv4Address(u'192.168.0.2') !=\nipaddress.IPv4Address(u'192.168.0.1'))\n\
    ```\n\nWhen we run the above program, we get the following output –\n\n```\nTrue\n\
    False\nTrue\n```\n\n### IP Addresses Arithmetic\n\nWe can also apply arithmetic\
    \ operations to manipulate IP addresses. We can add or subtract integers to an\
    \ IP address. If after addition the value of the last octet goes beyond 255 then\
    \ the previous octet gets incremented to accommodate the value. If the extra value\
    \ can not be absorbed by any of the previous octet then a value error is raised.\n\
    \n```\nprint (ipaddress.IPv4Address(u'192.168.0.2')+1)\n\nprint (ipaddress.IPv4Address(u'192.168.0.253')-3)\n\
    \n# Increases the previous octet by value 1.\nprint (ipaddress.IPv4Address(u'192.168.10.253')+3)\n\
    \n# Throws Value error\nprint (ipaddress.IPv4Address(u'255.255.255.255')+1)\n\
    ```\n\nWhen we run the above program, we get the following output –\n\n```\n192.168.0.3\n\
    192.168.0.250\n192.168.11.0\nAddressValueError: 4294967296 (>= 2**32) is not permitted\n\
    as an IPv4 address\n```\n\n## DNS Look-up\n\nThe IP addresses when translated\
    \ to human readable formats or words become known as domain names. The translation\
    \ of domain names to IP address is managed by the python module **dnspython**.\
    \ This module also provides methods to find out CNAME and MX records.\n\n### Finding\
    \ 'A' Record\n\nIn the below program we find the ip address for the domain using\
    \ the dns.resolver method. Usually this mapping between IP address and domain\
    \ name is also known as 'A' record.\n\n```\nimport dnspython as dns\nimport dns.resolver\n\
    \nresult = dns.resolver.query('insightbook.com', 'A')\nfor ipval in result:\n\
    \    print('IP', ipval.to_text())\n```\n\nWhen we run the above program, we get\
    \ the following output –\n\n```\n('IP', u'94.130.81.180')\n```\n\n### Finding\
    \ CNAME Value\n\nA CNAME record also known as Canonical Name Record is a type\
    \ of record in the Domain Name System (DNS) used to map a domain name as an alias\
    \ for another domain. CNAME records always point to another domain name and never\
    \ directly to an IP address. In the query method below we specify the CNAME parameter\
    \ to get the CNAME value.\n\n```\nimport dnspython as dns\nimport dns.resolver\n\
    result = dns.resolver.query('mail.google.com', 'CNAME')\nfor cnameval in result:\n\
    \    print ' cname target address:', cnameval.target\n```\n\nWhen we run the above\
    \ program, we get the following output –\n\n```\ncname target address: googlemail.l.google.com.\n\
    ```\n\n### Finding MX Record\n\nA MX record also called mail exchanger record\
    \ is a resource record in the Domain Name System that specifies a mail server\
    \ responsible for accepting email messages on behalf of a recipient's domain.\
    \ It also sets the preference value used to prioritizing mail delivery if multiple\
    \ mail servers are available. Similar to above programs we can find the value\
    \ for MX record using the 'MX' parameter in the query method.\n\n```\nresult =\
    \ dns.resolver.query('mail.google.com', 'MX')\nfor exdata in result:\n    print\
    \ ' MX Record:', exdata.exchange.text()\n```\n\nWhen we run the above program,\
    \ we get the following output –\n\n```\nMX Record:    ASPMX.L.GOOGLE.COM.\nMX\
    \ Record:    ALT1.ASPMX.L.GOOGLE.COM.\nMX Record:    ALT2.ASPMX.L.GOOGLE.COM.\n\
    ```\n\nThe above is a sample output and not the exact one."
  mdcn: "## 互联网协议\n\n互联网协议旨在为所有联网计算机建立一个统一的地址系统，并使数据包能够从互联网的一端传输到另一端。像网页浏览器这样的程序应该能够连接到任何地方的主机，而无需知道每个数据包在传输过程中经过了哪些复杂的网络设备路径。互联网协议有多种类别。这些协议的创建是为了满足互联网中不同计算机之间不同类型数据通信的需求。\n\
    \nPython 有多个模块来处理这些通信场景。这些模块中的方法和函数可以完成从简单的 URL 验证到复杂的 Cookie 和会话处理等各种任务。在本章中，我们将介绍用于互联网协议的最著名的\
    \ Python 模块。\n\n| 协议 | Python 模块名 | 描述 |\n| :--- | :--- | :--- |\n| HTTP | urllib.request\
    \ | 打开 HTTP URL |\n| HTTP | urllib.response | 为 URL 请求创建响应对象 |\n| HTTP | urllib.parse\
    \ | 将统一资源定位符（URL）字符串分解为组件，如（寻址方案、网络位置、路径等）。 |\n| HTTP | urllib.robotparser | 它用于确定特定的用户代理是否可以获取发布\
    \ robots.txt 文件的网站上的 URL。 |\n| FTP | ftplib | 实现 FTP 协议的客户端。你可以使用它来编写执行各种自动化 FTP\
    \ 任务的 Python 程序，例如镜像其他 FTP 服务器。 |\n| POP | poplib | 此模块定义了一个类 POP3，它封装了与 POP3\
    \ 服务器的连接，用于从电子邮件服务器读取消息。 |\n| IMAP | imaplib | 此模块定义了三个类：IMAP4、IMAP4_SSL 和 IMAP4_stream，它们封装了与\
    \ IMAP4 服务器的连接，用于读取电子邮件。 |\n| SMTP | smtplib | smtplib 模块定义了一个 SMTP 客户端会话对象，可用于向任何具有\
    \ SMTP 监听守护进程的互联网机器发送邮件。 |\n| Telnet | telnet | 此模块提供了一个 Telnet 类，该类实现了 Telnet\
    \ 协议，用于通过 telnet 访问服务器。 |\n\n后续章节将详细讨论每个模块。\n\n## IP 地址\n\nIP 地址（互联网协议）是一个基本的网络概念，它在网络中提供地址分配功能。Python\
    \ 模块 **ipaddress** 被广泛用于验证 IP 地址并将其分类为 IPv4 和 IPv6 类型。它还可以用于比较 IP 地址值以及进行 IP 地址算术运算以操作\
    \ IP 地址。\n\n### 验证 IPv4 地址\n\n`ip_address` 函数验证 IPv4 地址。如果值的范围超出 0 到 255，则会抛出错误。\n\
    \n```\nprint (ipaddress.ip_address(u'192.168.0.255'))\nprint (ipaddress.ip_address(u'192.168.0.256'))\n\
    ```\n\n运行上述程序时，我们得到以下输出：\n\n```\n192.168.0.255\nValueError: u'192.168.0.256' does\
    \ not appear to be an IPv4 or IPv6 address\n```\n\n### 验证 IPv6 地址\n\n`ip_address`\
    \ 函数验证 IPv6 地址。如果值的范围超出 0 到 ffff，则会抛出错误。\n\n```\nprint (ipaddress.ip_address(u'FFFF:9999:2:FDE:257:0:2FAE:112D'))\n\
    \n#无效的 IPv6 地址\nprint (ipaddress.ip_address(u'FFFF:10000:2:FDE:257:0:2FAE:112D'))\n\
    ```\n\n运行上述程序时，我们得到以下输出：\n\n```\nffff:9999:2:fde:257:0:2fae:112d\nValueError:\
    \ u'FFFF:10000:2:FDE:257:0:2FAE:112D' does not appear to be an IPv4 or IPv6 address\n\
    ```\n\n### 检查 IP 地址类型\n\n我们可以提供各种格式的 IP 地址，该模块能够识别有效格式。它还会指出它属于哪一类 IP 地址。\n\n\
    ```\nprint type(ipaddress.ip_address(u'192.168.0.255'))\n\nprint type(ipaddress.ip_address(u'2001:db8::'))\n\
    \nprint ipaddress.ip_address(u'192.168.0.255').reverse_pointer\n\nprint ipaddress.ip_network(u'192.168.0.0/28')\n\
    ```\n\n运行上述程序时，我们得到以下输出：\n\n```\n255.0.168.192.in-addr.arpa\n192.168.0.0/28\n\
    ```\n\n### IP 地址比较\n\n我们可以对 IP 地址进行逻辑比较，以确定它们是否相等。我们还可以比较一个 IP 地址的值是否大于另一个。\n\n\
    ```\nprint (ipaddress.IPv4Address(u'192.168.0.2') >\nipaddress.IPv4Address(u'192.168.0.1'))\n\
    print (ipaddress.IPv4Address(u'192.168.0.2') ==\nipaddress.IPv4Address(u'192.168.0.1'))\n\
    print (ipaddress.IPv4Address(u'192.168.0.2') !=\nipaddress.IPv4Address(u'192.168.0.1'))\n\
    ```\n\n运行上述程序时，我们得到以下输出：\n\n```\nTrue\nFalse\nTrue\n```\n\n### IP 地址算术运算\n\n我们还可以对\
    \ IP 地址应用算术运算进行操作。我们可以向 IP 地址添加或减去整数。如果相加后最后一个八位字节的值超过 255，则前一个八位字节会递增以容纳该值。如果额外的值无法被任何前一个八位字节吸收，则会引发值错误。\n\
    \n```\nprint (ipaddress.IPv4Address(u'192.168.0.2')+1)\n\nprint (ipaddress.IPv4Address(u'192.168.0.253')-3)\n\
    \n# 将前一个八位字节的值增加 1。\nprint (ipaddress.IPv4Address(u'192.168.10.253')+3)\n\n# 抛出值错误\n\
    print (ipaddress.IPv4Address(u'255.255.255.255')+1)\n```\n\n运行上述程序时，我们得到以下输出：\n\
    \n```\n192.168.0.3\n192.168.0.250\n192.168.11.0\nAddressValueError: 4294967296\
    \ (>= 2**32) is not permitted\nas an IPv4 address\n```\n\n## DNS 查找\n\n当 IP 地址转换为人类可读的格式或单词时，就被称为域名。域名到\
    \ IP 地址的转换由 Python 模块 **dnspython** 管理。该模块还提供了查找 CNAME 和 MX 记录的方法。\n\n### 查找 'A'\
    \ 记录\n\n在下面的程序中，我们使用 `dns.resolver` 方法查找域名的 IP 地址。通常，IP 地址和域名之间的这种映射也称为 'A' 记录。\n\
    \n```\nimport dnspython as dns\nimport dns.resolver\n\nresult = dns.resolver.query('insightbook.com',\
    \ 'A')\nfor ipval in result:\n    print('IP', ipval.to_text())\n```\n\n运行上述程序时，我们得到以下输出：\n\
    \n```\n('IP', u'94.130.81.180')\n```\n\n### 查找 CNAME 值\n\nCNAME 记录，也称为规范名称记录，是域名系统（DNS）中的一种记录类型，用于将域名映射为另一个域名的别名。CNAME\
    \ 记录始终指向另一个域名，而不是直接指向 IP 地址。在下面的查询方法中，我们指定 CNAME 参数以获取 CNAME 值。\n\n```\nimport\
    \ dnspython as dns\nimport dns.resolver\nresult = dns.resolver.query('mail.google.com',\
    \ 'CNAME')\nfor cnameval in result:\n    print ' cname target address:', cnameval.target\n\
    ```\n\n运行上述程序时，我们得到以下输出：\n\n```\ncname target address: googlemail.l.google.com.\n\
    ```\n\n### 查找 MX 记录\n\nMX 记录，也称为邮件交换器记录，是域名系统中的一种资源记录，它指定负责代表收件人域名接受电子邮件的邮件服务器。它还设置了优先级值，用于在多个邮件服务器可用时确定邮件投递的优先级。与上面的程序类似，我们可以在查询方法中使用\
    \ 'MX' 参数来查找 MX 记录的值。\n\n```\nresult = dns.resolver.query('mail.google.com', 'MX')\n\
    for exdata in result:\n    print ' MX Record:', exdata.exchange.text()\n```\n\n\
    运行上述程序时，我们得到以下输出：\n\n```\nMX Record:    ASPMX.L.GOOGLE.COM.\nMX Record:    ALT1.ASPMX.L.GOOGLE.COM.\n\
    MX Record:    ALT2.ASPMX.L.GOOGLE.COM.\n```\n\n以上是示例输出，并非确切输出。"
