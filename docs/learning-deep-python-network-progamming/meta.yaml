  - "[PAGE 59]\n\n# HTTP Client\n\nIn the http protocol, the request from the client\
    \ reaches the server and fetches some data and metadata assuming it is a valid\
    \ request. We can analyze this response from the server using various functions\
    \ available in the python requests module. Here the below python programs run\
    \ in the client side and display the result of the response sent by the server.\n\
    \n# Get Initial Response\n\nIn the below program the get method from requests\
    \ module fetches the data from a server and it is printed in plain text format.\n\
    \n```\nimport requests\nr = requests.get('https://httpbin.org/')\nprint(r.text)[:200]\n\
    ```\n\nWhen we run the above program, we get the following output –\n\n```\n<!DOCTYPE\
    \ html >\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <title>httpbin.org</title>\n\
    \    <link\nhref=\"https://fonts.googleapis.com/css?family=Open+Sans:400,700|Source+Code+Pro:300,600|Titillium+\n\
    ```\n\n# Get Session Object Response\n\nThe Session object allows you to persist\
    \ certain parameters across requests. It also persists cookies across all requests\
    \ made from the Session instance. If you're making several requests to the same\
    \ host, the underlying TCP connection will be reused.\n\n```\nimport requests\n\
    s = requests.Session()\n```"
- md: "## Handling Error\n\nIn case some error is raised because of issue in processing\
    \ the request by the server, the python program can gracefully handle the exception\
    \ raised using the timeout parameter as shown below. The program will wait for\
    \ the defined value of the timeout error and then raise the time out error.\n\n\
    ```python\nrequests.get('http://github.com', timeout=10.001)\n```\n\n## HTTP Server\n\
    \nPython standard library comes with a in-built webserver which can be invoked\
    \ for simple web client server communication. The port number can be assigned\
    \ programmatically and the web server is accessed through this port. Though it\
    \ is not a full featured web server which can parse many kinds of file, it can\
    \ parse simple static html files and serve them by responding them with required\
    \ response codes.\n\nThe below program starts a simple web server and opens it\
    \ up at port 8001. The successful running of the server is indicated by the response\
    \ code of 200 as shown in the program output.\n\n```python\nimport SimpleHTTPServer\n\
    import SocketServer\n\nPORT = 8001\n\nHandler = SimpleHTTPServer.SimpleHTTPRequestHandler\n\
    \nhttpd = SocketServer.TCPServer((\"\", PORT), Handler)\n\nprint \"serving at\
    \ port\", PORT\nhttpd.serve_forever()\n```\n\nWhen we run the above program, we\
    \ get the following output –\n\n```\nserving at port 8001\n127.0.0.1 - - [14/Jun/2018\
    \ 08:34:22] \"GET / HTTP/1.1\" 200 -\n```\n\n## Serving a localhost\n\nIf we decide\
    \ to make the python server as a local host serving only the local host, then\
    \ we can use the following program to do that.\n\n```python\nimport sys\nimport\
    \ BaseHTTPServer\nfrom SimpleHTTPServer import SimpleHTTPRequestHandler\n\nHandlerClass\
    \ = SimpleHTTPRequestHandler\nServerClass  = BaseHTTPServer.HTTPServer\nProtocol\
    \     = \"HTTP/1.0\"\n\nif sys.argv[1:]:\n    port = int(sys.argv[1])\nelse:\n\
    \    port = 8000\nserver_address = ('127.0.0.1', port)\n\nHandlerClass.protocol_version\
    \ = Protocol\nhttpd = ServerClass(server_address, HandlerClass)\n\nsa = httpd.socket.getsockname()\n\
    print \"Serving HTTP on\", sa[0], \"port\", sa[1], \"...\"\nhttpd.serve_forever()\n\
    ```\n\nWhen we run the above program, we get the following output –\n\n```\nServing\
    \ HTTP on 127.0.0.1 port 8000 ...\n```\n\n## Building URLs\n\nThe requests module\
    \ can help us build the URLS and manipulate the URL value dynamically. Any sub-directory\
    \ of the URL can be fetched programmatically and then some part of it can be substituted\
    \ with new values to build new URLs.\n\n### Build_URL\n\nThe below example uses\
    \ **urljoin** to fetch the different subfolders in the URL path. The urljoin method\
    \ is used to add new values to the base URL.\n\n```python\nfrom requests.compat\
    \ import urljoin\nbase='https://stackoverflow.com/questions/3764291'\nprint urljoin(base,'.')\n\
    print urljoin(base,'..')\nprint urljoin(base,'...')\nprint urljoin(base,'/3764299/')\n\
    url_query = urljoin(base,'?vers=1.0')\nprint url_query\nurl_sec = urljoin(url_query,'#section-5.4')\n\
    print url_sec\n```\n\nWhen we run the above program, we get the following output\
    \ –\n\n```\nhttps://stackoverflow.com/questions/\nhttps://stackoverflow.com/\n\
    https://stackoverflow.com/questions/...\nhttps://stackoverflow.com/3764299/\n\
    https://stackoverflow.com/questions/3764291?vers=1.0\nhttps://stackoverflow.com/questions/3764291?vers=1.0#section-5.4\n\
    ```\n\n### Split the URLS\n\nThe URLs can also be split into many parts beyond\
    \ the main address. The additional parameters which are used for a specific query\
    \ or tags attached to the URL are separated by using the urlparse method as shown\
    \ below.\n\n```python\nfrom requests.compat import urlparse\nurl1 = 'https://docs.python.org/2/py-modindex.html#cap-f'\n\
    url2='https://docs.python.org/2/search.html?q=urlparse'\nprint urlparse(url1)\n\
    print urlparse(url2)\n```\n\nWhen we run the above program, we get the following\
    \ output –\n\n```\nParseResult(scheme='https', netloc='docs.python.org', path='/2/py-modindex.html',\
    \ params='', query='', fragment='cap-f')\nParseResult(scheme='https', netloc='docs.python.org',\
    \ path='/2/search.html', params='', query='q=urlparse', fragment='')\n```\n\n\
    ## WebForm Submission\n\nOften the interaction with a webpage needs some data\
    \ to be submitted to the server through the forms present in the html page. These\
    \ webforms are typically used for processes like signing up for a new account\
    \ or supplying some information like name or roll number to retrieve the result\
    \ of an examination. The **requests** module handles this gracefully using the\
    \ POST method with the required parameters.\n\n### Example\n\nIn the below example\
    \ we use the sign up form of a website by supplying the userid and password value.\
    \ After the submission of the values we print the response.\n\n```python\nimport\
    \ requests\n\nID_USERNAME = 'signup-user-name'\nID_PASSWORD = 'signup-user-password'\n\
    USERNAME = 'username'\nPASSWORD = 'yourpassword'\nSIGNUP_URL = 'http://codepad.org/login'\n\
    def submit_form():\n    \"\"\"Submit a form\"\"\"\n    payload = {ID_USERNAME\
    \ : USERNAME, ID_PASSWORD : PASSWORD,}\n\n    resp = requests.get(SIGNUP_URL)\n\
    \    print \"Response to GET request: %s\" %resp.content\n\n    resp = requests.post(SIGNUP_URL,\
    \ payload)\n    print \"Headers from a POST request response: %s\" %resp.headers\n\
    #print \"HTML Response: %s\" %resp.read()\n\nif __name__ == '__main__':\n    submit_form()\n\
    ```\n\nWhen we run the above program, we get the following output –\n\n```\nResponse\
    \ to GET request: <!DOCTYPE html>\n<html>\n<head>\n    <meta http-equiv=\"content-type\"\
    \ content=\"text/html; charset=UTF-8\">\n    <meta HTTP-EQUIV=\"Pragma\" CONTENT=\"\
    no-cache\">\n    <meta HTTP-EQUIV=\"Expires\" CONTENT=\"-1\">\n    <title>Login\
    \ - codepad</title>\n    <link href=\"/main.css\" media=\"screen\" rel=\"stylesheet\"\
    \ type=\"text/css\" />\n    <style type=\"text/css\">\n    </style>\n    <script\
    \ src='https://www.google.com/recaptcha/api.js'></script>\n    <script>\n    \
    \    function onRecaptcha(token) {\n            document.getElementById(\"editor-form\"\
    ).submit();\n        }\n    </script>\n</head>\n<body >\n.....................\n\
    ```\n\n## Databases and SQL\n\nThe Python programming language has powerful features\
    \ for database programming. Python supports various databases like SQLite, MySQL,\
    \ Oracle, Sybase, PostgreSQL, etc. Python also supports Data Definition Language\
    \ (DDL), Data Manipulation Language (DML) and Data Query Statements. The Python\
    \ standard for database interfaces is the Python DB-API. Most Python database\
    \ interfaces adhere to this standard.\n\nHere is the list of available Python\
    \ database interfaces: [Python Database Interfaces and APIs](https://www.tutorialspoint.com/python/python_database_access.htm).\
    \ You must download a separate DB API module for each database you need to access.\n\
    \nIn this chapter we will see the use of SQLite database in python programming\
    \ language. It is done by using python’s inbuilt, sqlite3 module. You should first\
    \ create a connection object that represents the database and then create some\
    \ cursor objects to execute SQL statements.\n\n### Connect To Database\n\nFollowing\
    \ Python code shows how to connect to an existing database. If the database does\
    \ not exist, then it will be created and finally a database object will be returned.\n\
    \n```python\n#!/usr/bin/python\n\nimport sqlite3\n\nconn = sqlite3.connect('test.db')\n\
    \nprint \"Opened database successfully\";\n```\n\nHere, you can also supply database\
    \ name as the special name **:memory:** to create a database in RAM. Now, let’s\
    \ run the above program to create our database **test.db** in the current directory.\
    \ You can change your path as per your requirement. Keep the above code in sqlite.py\
    \ file and execute it as shown below. If the database is successfully created,\
    \ then it will display the following message.\n\n```\n$chmod +x sqlite.py\n$./sqlite.py\n\
    Open database successfully\n```\n\n### Create a Table\n\nFollowing Python program\
    \ will be used to create a table in the previously created database.\n\n```python\n\
    #!/usr/bin/python\n\nimport sqlite3\n\nconn = sqlite3.connect('test.db')\nprint\
    \ \"Opened database successfully\";\n\nconn.execute('''CREATE TABLE COMPANY\n\
    \        (ID INT PRIMARY KEY     NOT NULL,\n        NAME           TEXT    NOT\
    \ NULL,\n        AGE            INT     NOT NULL,\n        ADDRESS        CHAR(50),\n\
    \        SALARY         REAL);''')\nprint \"Table created successfully\";\n\n\
    conn.close()\n```\n\nWhen the above program is executed, it will create the COMPANY\
    \ table in your **test.db** and it will display the following messages –\n\n```\n\
    Opened database successfully\nTable created successfully\n```"
  mdcn: "## 错误处理\n\n如果服务器在处理请求时出现错误导致异常，Python程序可以使用`timeout`参数优雅地处理抛出的异常，如下所示。程序将等待定义的超时时间值，然后抛出超时错误。\n\
    \n```python\nrequests.get('http://github.com', timeout=10.001)\n```\n\n## HTTP服务器\n\
    \nPython标准库内置了一个Web服务器，可用于简单的Web客户端-服务器通信。端口号可以通过编程方式分配，Web服务器通过此端口访问。虽然它不是一个功能齐全的Web服务器，无法解析多种类型的文件，但它可以解析简单的静态HTML文件，并通过响应所需的响应码来提供服务。\n\
    \n以下程序启动一个简单的Web服务器，并在端口8001上打开它。服务器成功运行的标志是响应码200，如程序输出所示。\n\n```python\nimport\
    \ SimpleHTTPServer\nimport SocketServer\n\nPORT = 8001\n\nHandler = SimpleHTTPServer.SimpleHTTPRequestHandler\n\
    \nhttpd = SocketServer.TCPServer((\"\", PORT), Handler)\n\nprint \"serving at\
    \ port\", PORT\nhttpd.serve_forever()\n```\n\n当我们运行上述程序时，会得到以下输出 –\n\n```\nserving\
    \ at port 8001\n127.0.0.1 - - [14/Jun/2018 08:34:22] \"GET / HTTP/1.1\" 200 -\n\
    ```\n\n## 服务本地主机\n\n如果我们决定将Python服务器设置为仅服务本地主机的本地主机，那么我们可以使用以下程序来实现。\n\n```python\n\
    import sys\nimport BaseHTTPServer\nfrom SimpleHTTPServer import SimpleHTTPRequestHandler\n\
    \nHandlerClass = SimpleHTTPRequestHandler\nServerClass  = BaseHTTPServer.HTTPServer\n\
    Protocol     = \"HTTP/1.0\"\n\nif sys.argv[1:]:\n    port = int(sys.argv[1])\n\
    else:\n    port = 8000\nserver_address = ('127.0.0.1', port)\n\nHandlerClass.protocol_version\
    \ = Protocol\nhttpd = ServerClass(server_address, HandlerClass)\n\nsa = httpd.socket.getsockname()\n\
    print \"Serving HTTP on\", sa[0], \"port\", sa[1], \"...\"\nhttpd.serve_forever()\n\
    ```\n\n当我们运行上述程序时，会得到以下输出 –\n\n```\nServing HTTP on 127.0.0.1 port 8000 ...\n\
    ```\n\n## 构建URL\n\n`requests`模块可以帮助我们构建URL并动态操作URL值。可以通过编程方式获取URL的任何子目录，然后将其部分替换为新值以构建新的URL。\n\
    \n### 构建URL\n\n以下示例使用**urljoin**来获取URL路径中的不同子文件夹。urljoin方法用于向基础URL添加新值。\n\n```python\n\
    from requests.compat import urljoin\nbase='https://stackoverflow.com/questions/3764291'\n\
    print urljoin(base,'.')\nprint urljoin(base,'..')\nprint urljoin(base,'...')\n\
    print urljoin(base,'/3764299/')\nurl_query = urljoin(base,'?vers=1.0')\nprint\
    \ url_query\nurl_sec = urljoin(url_query,'#section-5.4')\nprint url_sec\n```\n\
    \n当我们运行上述程序时，会得到以下输出 –\n\n```\nhttps://stackoverflow.com/questions/\nhttps://stackoverflow.com/\n\
    https://stackoverflow.com/questions/...\nhttps://stackoverflow.com/3764299/\n\
    https://stackoverflow.com/questions/3764291?vers=1.0\nhttps://stackoverflow.com/questions/3764291?vers=1.0#section-5.4\n\
    ```\n\n### 拆分URL\n\nURL也可以被拆分成多个部分，超出主地址之外。用于特定查询或附加到URL的标签的附加参数，可以使用`urlparse`方法进行分离，如下所示。\n\
    \n```python\nfrom requests.compat import urlparse\nurl1 = 'https://docs.python.org/2/py-modindex.html#cap-f'\n\
    url2='https://docs.python.org/2/search.html?q=urlparse'\nprint urlparse(url1)\n\
    print urlparse(url2)\n```\n\n当我们运行上述程序时，会得到以下输出 –\n\n```\nParseResult(scheme='https',\
    \ netloc='docs.python.org', path='/2/py-modindex.html', params='', query='', fragment='cap-f')\n\
    ParseResult(scheme='https', netloc='docs.python.org', path='/2/search.html', params='',\
    \ query='q=urlparse', fragment='')\n```\n\n## Web表单提交\n\n通常，与网页的交互需要通过HTML页面中的表单向服务器提交一些数据。这些Web表单通常用于注册新账户或提供姓名或学号等信息以检索考试结果等过程。**requests**模块使用POST方法和所需参数优雅地处理此问题。\n\
    \n### 示例\n\n在下面的示例中，我们通过提供用户ID和密码值来使用网站的注册表单。提交值后，我们打印响应。\n\n```python\nimport\
    \ requests\n\nID_USERNAME = 'signup-user-name'\nID_PASSWORD = 'signup-user-password'\n\
    USERNAME = 'username'\nPASSWORD = 'yourpassword'\nSIGNUP_URL = 'http://codepad.org/login'\n\
    def submit_form():\n    \"\"\"Submit a form\"\"\"\n    payload = {ID_USERNAME\
    \ : USERNAME, ID_PASSWORD : PASSWORD,}\n\n    resp = requests.get(SIGNUP_URL)\n\
    \    print \"Response to GET request: %s\" %resp.content\n\n    resp = requests.post(SIGNUP_URL,\
    \ payload)\n    print \"Headers from a POST request response: %s\" %resp.headers\n\
    #print \"HTML Response: %s\" %resp.read()\n\nif __name__ == '__main__':\n    submit_form()\n\
    ```\n\n当我们运行上述程序时，会得到以下输出 –\n\n```\nResponse to GET request: <!DOCTYPE html>\n\
    <html>\n<head>\n    <meta http-equiv=\"content-type\" content=\"text/html; charset=UTF-8\"\
    >\n    <meta HTTP-EQUIV=\"Pragma\" CONTENT=\"no-cache\">\n    <meta HTTP-EQUIV=\"\
    Expires\" CONTENT=\"-1\">\n    <title>Login - codepad</title>\n    <link href=\"\
    /main.css\" media=\"screen\" rel=\"stylesheet\" type=\"text/css\" />\n    <style\
    \ type=\"text/css\">\n    </style>\n    <script src='https://www.google.com/recaptcha/api.js'></script>\n\
    \    <script>\n        function onRecaptcha(token) {\n            document.getElementById(\"\
    editor-form\").submit();\n        }\n    </script>\n</head>\n<body >\n.....................\n\
    ```\n\n## 数据库和SQL\n\nPython编程语言具有强大的数据库编程功能。Python支持多种数据库，如SQLite、MySQL、Oracle、Sybase、PostgreSQL等。Python还支持数据定义语言（DDL）、数据操作语言（DML）和数据查询语句。Python数据库接口的标准是Python\
