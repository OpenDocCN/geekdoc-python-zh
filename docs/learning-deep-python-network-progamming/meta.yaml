    Following Python code shows how to connect to an existing database. If the database
    does not exist, then it will be created and finally a database object will be
    returned.


    ```

    #!/usr/bin/python


    import sqlite3


    conn = sqlite3.connect(''test.db'')


    print "Opened database successfully";

    ```


    Here, you can also supply database name as the special name **:memory:** to create
    a database in RAM. Now, let’s run the above program to create our database **test.db**
    in the current directory. You can change your path as per your'
