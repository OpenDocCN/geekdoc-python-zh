- md: '## Preface


    Python Network Programming is about using python as a programming language to
    handle computer networking requirements. For example, if we want to create and
    run a local web server or automatically download some files from a URL with a
    pattern.


    This book is designed for Computer Science graduates as well as Software Professionals
    who are willing to learn Network programming in simple and easy steps using Python
    as a programming language.


    You should have a basic knowledge of writing code in Python programming language,
    using any python IDE and execution of Python programs.


    ## Network Programming Introduction


    As python’s versatility as a programming language grown over the years, we find
    that python is very suitable in the world of network programming too. With growth
    in cloud computing, network programming has become even a more hot topic and python
    has a big role to play. Below are the few important reasons for python’s use as
    a preferred language for network Programming.


    ## Socket programming


    Sockets are the links through which the client and servers communicate with each
    other. For example when a browser is opened a socket is automatically created
    to connect with the server. Python has a socket module which can be used to implement
    various socket functionalities like binding an address or starting a listener
    port. Socket programming is fundamental to computer networking and python handles
    it well.


    ## Client programming


    The client is the computer which requests for information and waits for the response.
    Python programs can be written to validate many client-side actions like parsing
    a URL, sending parameters with the URL while submitting a request, connect to
    a alternate URL if access to one URL becomes unsuccessful etc. These programs
    are run in the client programs and handle all the communication needs with the
    server even without using a browser. For example – you can provide an URL to the
    python program for downloading a file and it will get done by the program itself
    without taking help from the browser program.


    ## Building web servers


    It is possible to create simple web servers which are good enough to run websites
    using python as a programming language. Python already has some inbuilt web servers
    which can be tweaked to achieve some additional functionalities needed.


    The **SimpleHTTPServer** module provides the functionalities of a web server out
    of the box and you can start running it from the local python installation. In
    python 3 it is named as **http.server**. **CherryPy** and **Tornado** are examples
    of webservers written in python which run as good as non python well known web
    servers like Apache or Ngnix.


    ## Web Scrapping


    One of the important reasons python became famous is the its dominance among the
    languages used for scrapping the web. Its data structure and network access abilities
    makes it ideal for visiting webpages and download their data automatically. And
    if there is some API connectivity available for the target website, then python
    will handle it even more easily through its program structures.


    ## Web Frame works


    Web Frame works makes application development easy and fast by offering pre-defined
    structures and modularity. The developer has to do minimal coding to leverage
    those existing libraries and customize a little to achieve the goal. **Django**
    and **Flask** are two famous ones which have seen much commercial use even though
    they are opensource.


    ## Getting Geo Locations


    Python has libraries which handle geographical data. It can find name of the business
    addresses if the latitude and longitude is known and vice versa. Of course it
    takes help of other map provider’s data like google maps. Python’s capability
    for networking truly extends even to different geographic boundaries !


    ## Network Environment


    Python 3 is available for Windows, Mac OS and most of the flavors of Linux operating
    system. Even though Python 2 is available for many other OSs, Python 3 support
    either has not been made available for them or has been dropped.


    ## Local Environment Setup


    Open a terminal window and type "python" to find out if it is already installed
    and which version is installed.


    ## Getting Python


    ### Windows platform


    Binaries of latest version of Python 3 (Python 3.5.1) are available on [this download
    page](https://www.python.org/downloads/windows/).


    The following different installation options are available.


    - Windows x86-64 embeddable zip file

    - Windows x86-64 executable installer

    - Windows x86-64 web-based installer

    - Windows x86 embeddable zip file

    - Windows x86 executable installer

    - Windows x86 web-based installer


    **Note** – In order to install Python 3.5.1, minimum OS requirements are Windows
    7 with SP1. For versions 3.0 to 3.4.x Windows XP is acceptable.


    ### Linux platform


    Different flavors of Linux use different package managers for installation of
    new packages.


    On Ubuntu Linux, Python 3 is installed using the following command from the terminal.


    ```

    $sudo apt-get install python3-minimal

    ```


    ### Installation from source


    Download Gzipped source tarball from Python''s download URL - https://www.python.org/ftp/python/3.5.1/Python-3.5.1.tgz


    ```

    Extract the tarball

    tar xvfz Python-3.5.1.tgz

    Configure and Install:

    cd Python-3.5.1

    ./configure --prefix = /opt/python3.5.1

    make

    sudo make install

    ```


    ### Mac OS


    Download Mac OS installers from this URL - https://www.python.org/downloads/mac-osx/


    - Mac OS X 64-bit/32-bit installer – python-3.5.1-macosx10.6.pkg

    - Mac OS X 32-bit i386/PPC installer – python-3.5.1-macosx10.5.pkg


    Double click this package file and follow the wizard instructions to install.


    The most up-to-date and current source code, binaries, documentation, news, etc.,
    is available on the official website of Python –


    **Python Official Website** – https://www.python.org/


    You can download Python documentation from the following site. The documentation
    is available in HTML, PDF and PostScript formats.


    **Python Documentation Website** – [www.python.org/doc/](http://www.python.org/doc/)


    ## Setting up PATH


    Programs and other executable files can be in many directories. Hence, the operating
    systems provide a search path that lists the directories that it searches for
    executables.


    The important features are –


    - The path is stored in an environment variable, which is a named string maintained
    by the operating system. This variable contains information available to the command
    shell and other programs.

    - The path variable is named as **PATH** in Unix or **Path** in Windows (Unix
    is case-sensitive; Windows is not).

    - In Mac OS, the installer handles the path details. To invoke the Python interpreter
    from any particular directory, you must add the Python directory to your path.


    ## Setting Path at Unix/Linux


    To add the Python directory to the path for a particular session in Unix –


    - **In the csh shell** – type setenv PATH "$PATH:/usr/local/bin/python3" and press
    Enter.

    - **In the bash shell (Linux)** – type export PYTHONPATH=/usr/local/bin/python3.4
    and press Enter.

    - **In the sh or ksh shell** – type PATH="$PATH:/usr/local/bin/python3" and press
    Enter.


    **Note** – /usr/local/bin/python3 is the path of the Python directory.


    ## Setting Path at Windows


    To add the Python directory to the path for a particular session in Windows –


    - **At the command prompt** – type path %path%;C:\Python and press Enter.


    **Note** – C:\Python is the path of the Python directory


    ## Running Python


    There are three different ways to start Python –


    ### Interactive Interpreter


    You can start Python from Unix, DOS, or any other system that provides you a command-line
    interpreter or shell window.


    Enter **python** the command line.


    Start coding right away in the interactive interpreter.


    ```

    $python                # Unix/Linux


    or


    python%                # Unix/Linux


    or


    C:>python              # Windows/DOS

    ```


    ### Integrated Development Environment


    You can run Python from a Graphical User Interface (GUI) environment as well,
    if you have a GUI application on your system that supports Python.


    - **Unix** – IDLE is the very first Unix IDE for Python.'
  mdcn: '## 前言


    《Python网络编程》是关于使用Python作为编程语言来处理计算机网络需求的书籍。例如，如果我们想要创建并运行一个本地Web服务器，或者从具有特定模式的URL自动下载一些文件。


    本书面向计算机科学专业的毕业生以及软件专业人士，旨在帮助他们通过简单易学的步骤，使用Python作为编程语言来学习网络编程。


    你应该具备使用Python编程语言编写代码、使用任何Python IDE以及执行Python程序的基础知识。


    ## 网络编程简介


    随着Python作为编程语言的多功能性逐年增长，我们发现Python在网络编程领域也非常适用。随着云计算的发展，网络编程已成为一个更热门的话题，而Python在其中扮演着重要角色。以下是Python被首选为网络编程语言的一些重要原因。


    ## Socket编程


    Socket是客户端和服务器之间相互通信的链接。例如，当打开浏览器时，会自动创建一个Socket来连接服务器。Python有一个socket模块，可用于实现各种Socket功能，如绑定地址或启动监听端口。Socket编程是计算机网络的基础，而Python能很好地处理它。


    ## 客户端编程


    客户端是请求信息并等待响应的计算机。可以编写Python程序来验证许多客户端操作，例如解析URL、在提交请求时随URL发送参数、如果访问某个URL失败则连接到备用URL等。这些程序在客户端程序中运行，即使不使用浏览器也能处理与服务器的所有通信需求。例如——你可以向Python程序提供一个URL来下载文件，程序本身就能完成下载，无需借助浏览器程序。


    ## 构建Web服务器


    使用Python作为编程语言，可以创建足以运行网站的简单Web服务器。Python已经内置了一些Web服务器，可以通过调整来实现所需的额外功能。


    **SimpleHTTPServer** 模块开箱即用地提供了Web服务器的功能，你可以从本地Python安装中启动它。在Python 3中，它被命名为 **http.server**。**CherryPy**
    和 **Tornado** 是用Python编写的Web服务器示例，它们的运行性能与Apache或Ngnix等非Python的知名Web服务器一样好。


    ## 网页抓取


    Python变得著名的一个重要原因是在用于网页抓取的语言中占据主导地位。其数据结构和网络访问能力使其非常适合访问网页并自动下载其数据。如果目标网站提供了API连接，那么Python通过其程序结构可以更轻松地处理。


    ## Web框架


    Web框架通过提供预定义的结构和模块化，使应用程序开发变得简单快捷。开发者只需编写最少的代码即可利用这些现有库，并进行少量定制以实现目标。**Django**
    和 **Flask** 是两个著名的框架，尽管它们是开源的，但已被广泛用于商业用途。


    ## 获取地理位置


    Python有处理地理数据的库。如果已知经纬度，它可以找到商业地址的名称，反之亦然。当然，它需要借助其他地图提供商的数据，如谷歌地图。Python的网络能力确实延伸到了不同的地理边界！


    ## 网络环境


    Python 3可用于Windows、Mac OS和大多数Linux操作系统版本。尽管Python 2可用于许多其他操作系统，但Python 3对它们的支持要么尚未提供，要么已被放弃。


    ## 本地环境设置


    打开终端窗口并输入"python"以检查是否已安装以及安装的版本。


    ## 获取Python


    ### Windows平台


    最新版本的Python 3（Python 3.5.1）的二进制文件可在此[下载页面](https://www.python.org/downloads/windows/)获取。


    以下提供不同的安装选项。


    - Windows x86-64 可嵌入zip文件

    - Windows x86-64 可执行安装程序

    - Windows x86-64 基于Web的安装程序

    - Windows x86 可嵌入zip文件

    - Windows x86 可执行安装程序

    - Windows x86 基于Web的安装程序


    **注意** – 要安装Python 3.5.1，最低操作系统要求是带有SP1的Windows 7。对于3.0到3.4.x版本，Windows XP是可接受的。


    ### Linux平台


    不同的Linux发行版使用不同的包管理器来安装新软件包。


    在Ubuntu Linux上，可以使用以下终端命令安装Python 3。


    ```

    $sudo apt-get install python3-minimal

    ```


    ### 从源代码安装


    从Python的下载URL下载Gzipped源代码tarball - https://www.python.org/ftp/python/3.5.1/Python-3.5.1.tgz


    ```

    解压tarball

    tar xvfz Python-3.5.1.tgz

    配置并安装：

    cd Python-3.5.1

    ./configure --prefix = /opt/python3.5.1

    make

    sudo make install

    ```


    ### Mac OS


    从此URL下载Mac OS安装程序 - https://www.python.org/downloads/mac-osx/


    - Mac OS X 64位/32位安装程序 – python-3.5.1-macosx10.6.pkg

    - Mac OS X 32位 i386/PPC安装程序 – python-3.5.1-macosx10.5.pkg


    双击此软件包文件并按照向导说明进行安装。


    最新和当前的源代码、二进制文件、文档、新闻等，可在Python的官方网站上获取——


    **Python官方网站** – https://www.python.org/


    你可以从以下网站下载Python文档。文档提供HTML、PDF和PostScript格式。


    **Python文档网站** – [www.python.org/doc/](http://www.python.org/doc/)


    ## 设置PATH


    程序和其他可执行文件可能位于多个目录中。因此，操作系统提供了一个搜索路径，列出了它搜索可执行文件的目录。


    重要特性是——


    - 路径存储在一个环境变量中，这是一个由操作系统维护的命名字符串。此变量包含命令shell和其他程序可用的信息。

    - 路径变量在Unix中命名为 **PATH**，在Windows中命名为 **Path**（Unix区分大小写；Windows不区分）。

    - 在Mac OS中，安装程序处理路径详情。要从任何特定目录调用Python解释器，必须将Python目录添加到你的路径中。


    ## 在Unix/Linux上设置路径


    要在Unix中为特定会话将Python目录添加到路径——


    - **在csh shell中** – 输入 setenv PATH "$PATH:/usr/local/bin/python3" 并按Enter。

    - **在bash shell（Linux）中** – 输入 export PYTHONPATH=/usr/local/bin/python3.4 并按Enter。

    - **在sh或ksh shell中** – 输入 PATH="$PATH:/usr/local/bin/python3" 并按Enter。


    **注意** – /usr/local/bin/python3 是Python目录的路径。


    ## 在Windows上设置路径


    要在Windows中为特定会话将Python目录添加到路径——


    - **在命令提示符下** – 输入 path %path%;C:\Python 并按Enter。


    **注意** – C:\Python 是Python目录的路径


    ## 运行Python


    有三种不同的方式启动Python——


    ### 交互式解释器


    你可以从Unix、DOS或任何其他提供命令行解释器或shell窗口的系统启动Python。


    在命令行输入 **python**。


    在交互式解释器中立即开始编码。


    ```

    $python                # Unix/Linux


    或


    python%                # Unix/Linux


    或


    C:>python              # Windows/DOS

    ```


    ### 集成开发环境


    如果你的系统上有支持Python的图形用户界面（GUI）应用程序，你也可以从GUI环境中运行Python。


    - **Unix** – IDLE是第一个用于Python的Unix IDE。'
