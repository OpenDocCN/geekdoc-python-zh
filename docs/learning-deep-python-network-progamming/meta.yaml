    Disallow: /videos/*\nDisallow: /*/*_question_bank/*\nDisallow: ///*/*/*/*/src/*\n\
    \n200\n```\n\n## HTTP Headers\n\nThe request and response between client and server\
    \ involves header and body in the message. Headers contain protocol specific information\
    \ that appear at the beginning of the raw message that is sent over TCP connection.\
    \ The body of the message is separated from headers using a blank line.\n\n##\
    \ Example of Headers\n\nThe headers in the http response can be categorized into\
    \ following types. Below is a description of the header and an example.\n\n##\
    \ Cache-Control\n\nThe Cache-Control general-header field is used to specify directives\
    \ that MUST be obeyed by all the caching system. The syntax is as follows:\n\n\
    ```\nCache-Control : cache-request-directive|cache-response-directive\n```\n\n\
    An HTTP client or server can use the **Cache-control** general header to specify\
    \ parameters for the cache or to request certain kinds of documents from the cache.\
    \ The caching directives are specified in a comma-separated list. For example:\n\
    \n```\nCache-control: no-cache\n```\n\n## Connection\n\nThe Connection general-header\
    \ field allows the sender to specify options that are desired for that particular\
    \ connection and must not be communicated by proxies over further connections.\
    \ Following is the simple syntax for using connection header:\n\n```\nConnection\
    \ : \"Connection\"\n```\n\nHTTP/1.1 defines the \"close\" connection option for\
    \ the sender to signal that the connection will be closed after completion of\
    \ the response. For example:\n\n```\nConnection: close\n```\n\nBy default, HTTP\
    \ 1.1 uses persistent connections, where the connection does not automatically\
    \ close after a transaction. HTTP 1.0, on the other hand, does not have persistent\
    \ connections by default. If a 1.0 client wishes to use persistent connections,\
    \ it uses the **keep-alive** parameter as follows:\n\n```\nConnection: keep-alive\n\
    ```\n\n## Date\n\nAll HTTP date/time stamps MUST be represented in Greenwich Mean\
    \ Time (GMT), without exception. HTTP applications are allowed to use any of the\
    \ following three representations of date/time stamps:\n\n```\nSun, 06 Nov 1994\
    \ 08:49:37 GMT ; RFC 822, updated by RFC 1123\nSunday, 06-Nov-94 08:49:37 GMT\
