  - "[PAGE 21]\n\n# DNS Look-up\n\nThe IP addresses when translated to human readable\
    \ formats or words become known as domain names. The translation of domain names\
    \ to IP address is managed by the python module **dnspython**. This module also\
    \ provides methods to find out CNAME and MX records.\n\n# Finding 'A' Record\n\
    \nIn the below program we find the ip address for the domain using the dns.resolver\
    \ method. Usually this mapping between IP address and domain name is also known\
    \ as 'A' record.\n\n```\nimport dnspython as dns\nimport dns.resolver\n\nresult\
    \ = dns.resolver.query('insightbook.com', 'A')\nfor ipval in result:\n    print('IP',\
    \ ipval.to_text())\n```\n\nWhen we run the above program, we get the following\
    \ output –\n\n```\n('IP', u'94.130.81.180')\n```\n\n# Finding CNAME Value\n\n\
    A CNAME record also known as Canonical Name Record is a type of record in the\
    \ Domain Name System (DNS) used to map a domain name as an alias for another domain.\
    \ CNAME records always point to another domain name and never directly to an IP\
    \ address. In the query method below we specify the CNAME parameter to get the\
    \ CNAME value.\n\n```\nimport dnspython as dns\nimport dns.resolver\nresult =\
    \ dns.resolver.query('mail.google.com', 'CNAME')\nfor cnameval in result:\n```"
  - "[PAGE 22]\n\n```\nprint ' cname target address:', cnameval.target\n```\n\nWhen\
    \ we run the above program, we get the following output –\n\n```\ncname target\
    \ address: googlemail.l.google.com.\n```\n\n# Finding MX Record\n\nA MX record\
    \ also called mail exchanger record is a resource record in the Domain Name System\
    \ that specifies a mail server responsible for accepting email messages on behalf\
    \ of a recipient's domain. It also sets the preference value used to prioritizing\
    \ mail delivery if multiple mail servers are available. Similar to above programs\
    \ we can find the value for MX record using the 'MX' parameter in the query method.\n\
    \n```\nresult = dns.resolver.query('mail.google.com', 'MX')\nfor exdata in result:\n\
    \    print ' MX Record:', exdata.exchange.text()\n```\n\nWhen we run the above\
    \ program, we get the following output –\n\n```\nMX Record:    ASPMX.L.GOOGLE.COM.\n\
    MX Record:    ALT1.ASPMX.L.GOOGLE.COM.\nMX Record:    ALT2.ASPMX.L.GOOGLE.COM.\n\
    ```\n\nThe above is a sample output and not the exact one."
- md: "## Routing\n\nRouting is the mechanism of mapping the URL directly to the code\
    \ that creates the webpage. It helps in better management of the structure of\
    \ the webpage and increases the performance of the site considerably and further\
    \ enhancements or modifications become really straight forward. In python routing\
    \ is implemented in most of the web frameworks. We will see the examples from\
    \ **flask** web framework in this chapter.\n\n### Routing in Flask\n\nThe **route()**\
    \ decorator in Flask is used to bind an URL to a function. As a result when the\
    \ URL is mentioned in the browser, the function is executed to give the result.\
    \ Here, URL '/hello' rule is bound to the **hello_world()** function. As a result,\
    \ if a user visits **http://localhost:5000/** URL, the output of the **hello_world()**\
    \ function will be rendered in the browser.\n\n```python\nfrom flask import Flask\n\
    app = Flask(__name__)\n\n@app.route('/')\ndef hello_world():\n    return 'Hello\
    \ insightbooks'\n\nif __name__ == '__main__':\n    app.run()\n```\n\nWhen we run\
    \ the above program, we get the following output –\n\n```\n* Serving Flask app\
    \ \"flask_route\" (lazy loading)\n* Environment: production\n  WARNING: Do not\
    \ use the development server in a production environment.\n  Use a production\
    \ WSGI server instead.\n* Debug mode: off\n* Running on http://127.0.0.1:5000/\
    \ (Press CTRL+C to quit)\n127.0.0.1 - - [06/Aug/2018 08:48:45] \"GET / HTTP/1.1\"\
    \ 200 -\n127.0.0.1 - - [06/Aug/2018 08:48:46] \"GET /favicon.ico HTTP/1.1\" 404\
    \ -\n127.0.0.1 - - [06/Aug/2018 08:48:46] \"GET /favicon.ico HTTP/1.1\" 404 -\n\
    ```\n\nWe open the browser and point to the URL **http://localhost:5000/** to\
    \ see the result of the function being executed.\n\n![](img/ff1fe0ce40257840cfd331dc7575dd85_24_0.png)\n\
    \n### Using URL Variables\n\nWe can pass on URL variables using route to build\
    \ URLS on the fly. For this we use the url_for() function which accepts name of\
    \ the function as the first argument and the rest of the arguments as variable\
    \ part of the URL rule.\n\nIn the below example we pass the function names as\
    \ arguments to the url_for function and print out the result when those lines\
    \ are executed.\n\n```python\nfrom flask import Flask, url_for\napp = Flask(__name__)\n\
    \n@app.route('/')\ndef index(): pass\n\n@app.route('/login')\ndef login(): pass\n\
    \n@app.route('/user/')\ndef profile(username): pass\n\nwith app.test_request_context():\n\
    \    print url_for('index')\n    print url_for('index', _external=True)\n    print\
    \ url_for('login')\n    print url_for('login', next='/')\n    print url_for('profile',\
    \ username='insightbooks')\n```\n\nWhen we run the above program, we get the following\
    \ output –\n\n```\n/\nhttp://localhost/\n/login\n/login?next=%2F\n/user/insightbooks%20Point\n\
    ```\n\n### Redirects\n\nWe can use the redirect function to redirect the user\
    \ to another URL using routing. We mention the new URL as a return value of the\
    \ function which should redirect the user. This is helpful when we temporarily\
    \ divert the users to a different page when we are modifying an existing webpage.\n\
    \n```python\nfrom flask import Flask, abort, redirect, url_for\napp = Flask(__name__)\n\
    \n@app.route('/')\ndef index():\n    return redirect(url_for('login'))\n\n@app.route('/login')\n\
    def login():\n    abort(401)\n#     this_is_never_executed()\n```\n\nWhen the\
    \ above code is executed, the base URL goes to login page which uses the abort\
    \ function so that the code for login page is never executed.\n\n## HTTP Requests\n\
    \nThe http or Hyper Text Transfer Protocol works on client server model. Usually\
    \ the web browser is the client and the computer hosting the website is the server.\
    \ In python we use the requests module for creating the http requests. It is a\
    \ very powerful module which can handle many aspects of http communication beyond\
    \ the simple request and response data. It can handle authentication, compression/decompression,\
    \ chunked requests etc.\n\nAn HTTP client sends an HTTP request to a server in\
    \ the form of a request message which includes following format:\n\n- A Request-line\n\
    - Zero or more header (General|Request|Entity) fields followed by CRLF\n- An empty\
    \ line (i.e., a line with nothing preceding the CRLF) indicating the end of the\
    \ header fields\n- Optionally a message-body\n\nThe following sections explain\
    \ each of the entities used in an HTTP request message.\n\n### Request-Line\n\n\
    The Request-Line begins with a method token, followed by the Request-URI and the\
    \ protocol version, and ending with CRLF. The elements are separated by space\
    \ SP characters.\n\n```\nRequest-Line = Method SP Request-URI SP HTTP-Version\
    \ CRLF\n```\n\nLet's discuss each of the parts mentioned in the Request-Line.\n\
    \n### Request Method\n\nThe request **method** indicates the method to be performed\
    \ on the resource identified by the given **Request-URI**. The method is case-sensitive\
    \ and should always be mentioned in uppercase. The following table lists all the\
    \ supported methods in HTTP/1.1.\n\n| S.N. | Method and Description |\n| :---\
    \ | :--- |\n| 1 | **GET**<br>The GET method is used to retrieve information from\
    \ the given server using a given URI. Requests using GET should only retrieve\
