    Date

    The **Date** field indicates the date when the e-mail was sent.


    To

    The **To** field indicates the recipient’s address i.e. to whom the e-mail is
    sent.


    Subject

    The **Subject** field indicates the purpose of e-mail. It should be precise and
    to the point.


    CC

    **CC** stands for Carbon copy. It includes those recipient addresses whom we want
    to keep informed but not exactly the intended recipient.


    BCC

    **BCC** stands for Black Carbon Copy. It is used when we do not want one or more
    of the recipients to know that someone else was copied on the message.


    Greeting

    Greeting is the opening of the actual message. Eg. Hi Sir or Hi Guys etc.


    Text

    It represents the actual content of the message.


    Signature

    This is the final part of an e-mail message. It includes Name of Sender, Address,
    and Contact Number.


    Python has EmailMessage class which can be used build email messages. This class
    ahs the required methods to customize different parts of the email message like
    - the TO and FROM tags, the Subject Line as well as the content of the email.'
