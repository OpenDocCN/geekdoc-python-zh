  md: '# Important Features


    +   - It can run any Python web applications running on WSGI.

    - It can handle static files and it can just be used to serve files and folders
    alone.

    - It is thread-pooled.

    - It comes with support for SSL.

    - It is an easy to adapt, easy to use pure-Python alternative which is robust
    and reliable.


    # Twisted Web


    It is a web server that comes with the Twisted networking library. Whereas Twisted
    itself is "an event-driven networking engine", the Twisted Web server runs on
    WSGI and it is capable of powering other Python web applications.


    # Important Features


    +   - It runs WSGI Python applications

    - It can act like a Python web server framework, allowing you to program it with
    the language for custom HTTP serving purposes

    - It offers simple and fast prototyping ability through Python Scrips (.rpy) which
    are executed upon HTTP requests

    - It comes with proxy and reverse-proxy capabilities

    - It supports Virtual Hosts

    - • It can even serve Perl, PHP et cetera'
