    \ the following output –\n\n```\nhttps://pixabay.com/en/photos/?q=river&min_width=800&min_height=600\n\
    &order=popular\n```\n\n## Request Status Codes\n\nAfter receiving and interpreting\
    \ a request message, a server responds with an HTTP response message. The response\
    \ message has a Status-Code. It is a 3-digit integer where first digit of the\
    \ Status-Code defines the class of response and the last two digits do not have\
    \ any categorization role. There are 5 values for the first digit:\n\nStatus Codes\n\
    \n| S.N. | Code and Description |\n| :--- | :--- |\n| 1 | **1xx: Informational**<br><br>It\
    \ means the request was received and the process is continuing. |\n| 2 | **2xx:\
    \ Success**<br><br>It means the action was successfully received, understood,\
    \ and accepted. |\n| 3 | **3xx: Redirection**<br><br>It means further action must\
    \ be taken in order to complete the request. |\n| 4 | **4xx: Client Error**<br><br>It\
    \ means the request contains incorrect syntax or cannot be fulfilled. |\n| 5 |\
    \ **5xx: Server Error**<br><br>It means the server failed to fulfill an apparently\
    \ valid request. |\n\n## Successful Response\n\nIn the below example we access\
    \ a file from a url and the response is successful. So the status code returned\
    \ is 200.\n\n```python\nimport urllib3\nhttp = urllib3.PoolManager()\n\nresp =\
    \ http.request('GET', 'http://insightbooks.com/robots.txt')\nprint resp.data\n\
    \n# get the status of the response\nprint resp.status\n```\n\nWhen we run the\
    \ above program, we get the following output –\n\n```\nUser-agent: *\nDisallow:\
    \ /tmp\nDisallow: /logs\nDisallow: /rate/*\nDisallow: /cgi-bin/*\nDisallow: /videotutorials/video_course_view.php?*\n\
    Disallow: /videotutorials/course_view.php?*\nDisallow: /videos/*\nDisallow: /*/*_question_bank/*\n\
    Disallow: ///*/*/*/*/src/*\n\n200\n```\n\n## Unsuccessful Response\n\nIn the below\
    \ example we access a file from a url which does not exist. The response is unsuccessful.\
    \ So the status code returned is 403.\n\n```python\nimport urllib3\nhttp = urllib3.PoolManager()\n\
    \nresp = http.request('GET', 'http://insightbooks.com/robot.txt')\nprint resp.data\n\
    \n# get the status of the response\nprint resp.status\n```\n\nWhen we run the\
    \ above program, we get the following output –\n\n```\n<!DOCTYPE HTML PUBLIC \"\
    -//IETF//DTD HTML 2.0//EN\">\n<html><head>\n<title>403 Forbidden</title>\n</head><body>\n\
    <h1>Forbidden</h1>\n<p>You don't have permission to access /robot.txt\non this\
    \ server.</p>\n</body></html>\n\n403\n```\n\n## HTTP Authentication\n\nAuthentication\
    \ is the process of determining if the request has come from a valid user who\
    \ has the required privileges to use the system. In the world of computer networking\
    \ this is a very vital requirement as many systems keep interacting with each\
    \ other and proper mechanism needs to ensure that only valid interactions happen\
    \ between these programs.\n\nThe python module names **requests** has in-built\
    \ feature to call various APIs provided by the serving web apps along with the\
    \ user credentials. These credentials have to be embedded in the calling program.\
    \ If the APIs verify it successfully then a valid login happens.\n\n## Installing\
    \ Requests\n\nWe install the required python module named requests for running\
    \ the authentication program.\n\n```\npip install requests\n```\n\n## Authenticating\
    \ to Github\n\nBelow we see a simple authentication mechanism involving only the\
    \ username and the password. A successful response indicates valid login.\n\n\
    ```python\nimport requests\nr = requests.get('https://api.github.com/user', auth=('user',\
    \ 'pass'))\nprint r\n```\n\nWhen we run the above program, we get the following\
    \ output –\n\n## Authenticating to Twitter\n\nWe can also run a program to use\
    \ twitter's api and make a successful login by using the following code. We use\
    \ the OAuth1 method available in the requests module to process the parameters\
    \ required by Twitter API. As we can see the requests module is capable of handling\
    \ more complex authentication mechanism involving keys and tokens rather than\
    \ just the username and password mechanism.\n\n```python\nimport requests\nfrom\
    \ requests_oauthlib import OAuth1\n\nurl = 'https://api.twitter.com/1.1/account/verify_credentials.json'\n\
    auth = OAuth1('YOUR_APP_KEY', 'YOUR_APP_SECRET',\n              'USER_OAUTH_TOKEN',\
    \ 'USER_OAUTH_TOKEN_SECRET')\n\nrequests.get(url, auth=auth)\n```\n\nWhen we run\
    \ the above program, we get the following output –\n\n```json\n{\n    \"errors\"\
    : [\n        {\n            \"code\": 215,\n            \"message\": \"Bad Authentication\
    \ data.\"\n        }\n    ]\n}\n```\n\nBut using the proper values for OAuth1\
    \ parameters you get a successful response.\n\n## HTTP Data Download\n\nWe can\
    \ download data from a server using python's module which handle ftp or File Transfer\
    \ Protocol. We can also read the data and later save it to the local system.\n\
    \nWe need to install the module **ftplib** to achieve this.\n\n```\npip install\
    \ ftplib\n```\n\n## Fetching the Files\n\nWe can fetch a specific file by using\
    \ the **getfile** method. This method moves a copy of the file from the remote\
    \ system to the local system from where the ftp connection was initiated.\n\n\
    ```python\nimport ftplib\nimport sys\n\ndef getFile(ftp, filename):\n    try:\n\
    \        ftp.retrbinary(\"RETR \" + filename ,open(filename, 'wb').write)\n  \
    \  except:\n        print \"Error\"\n\nftp = ftplib.FTP(\"ftp.nluug.nl\")\nftp.login(\"\
    anonymous\", \"ftplib-example-1\")\n\nftp.cwd('/pub/')          # change directory\
    \ to /pub/\ngetFile(ftp,'README.nluug')\n\nftp.quit()\n```\n\nWhen we run the\
    \ above program, we find the file README.nluug to be present in the local system\
    \ from where the connection was initiated.\n\n## Reading the Data\n\nIn the below\
    \ example we use the module urllib2 to read the required portion of the data which\
    \ we can copy and save it to local system.\n\n```python\nimport urllib2\nresponse\
    \ = urllib2.urlopen('http://www.insightbooks.com/python')\nhtml = response.read(200)\n\
    print html\n```\n\nWhen we run the above program, we get the following output\
    \ –\n\n```html\n<!DOCTYPE html>\n<!--[if IE 8]><html class=\"ie ie8\"> <![endif]-->\n\
    <!--[if IE 9]><html class=\"ie ie9\"> <![endif]-->\n<!--[if gt IE 9]><!--> <html>\
    \ <!--<![endif]-->\n<head>\n<!-- Basic -->\n<meta charset=\"ut\n```\n\n## Connection\
    \ Re-use\n\nWhen a client makes a valid request to a server, a temporary connection\
    \ is established between them to complete the sending and receiving process. But\
    \ there are scenarios where the connection needs to be kept alive as there is\
    \ need of automatic requests and responses between the programs which are communicating.\
    \ Take for example an interactive webpage. After the webpage is loaded there is\
    \ a need of submitting a form data or downloading further CSS and JavaScript components.\
    \ The connection needs to be kept alive for faster performance and an unbroken\
    \ communication between the client and the server.\n\nPython provides **urllib3**\
    \ module which had methods to take care of connection reuse between a client and\
    \ a server. In the below example we create a connection and make multiple requests\
    \ by passing different parameters with the GET request. We receive multiple responses\
    \ but we also count the number of connection that has been used in the process.\
    \ As we see the number of connection does not change implying the reuse of the\
    \ connection.\n\n```python\nfrom urllib3 import HTTPConnectionPool\n\npool = HTTPConnectionPool('ajax.googleapis.com',\
    \ maxsize=1)\nr = pool.request('GET', '/ajax/services/search/web',\n         \
    \        fields={'q': 'python', 'v': '1.0'})\nprint 'Response Status:', r.status\n\
    \n# Header of the response\nprint 'Header: ',r.headers['content-type']\n\n# Content\
    \ of the response\nprint 'Python: ',len(r.data)\n\nr = pool.request('GET', '/ajax/services/search/web',\n\
    \                 fields={'q': 'php', 'v': '1.0'})\n```"
