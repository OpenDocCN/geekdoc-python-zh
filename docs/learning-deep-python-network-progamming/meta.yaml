    result = Connection('xyz.com').run('uname -s')\nmsg = \"Ran {.command!r} on {.connection.host},\
    \ got stdout:\\n{.stdout}\"\nprint(msg.format(result))\n```\n\nWhen we run the\
    \ above program, we get the following output:\n\n```\nLinux\n```\n\nThis is a\
    \ sample result which will depend on the server.\n\n## FTP\n\n**FTP** or File\
    \ Transfer Protocol is a well-known network protocol used to transfer files between\
    \ computers in a network. It is created on client server architecture and can\
    \ be used along with user authentication. It can also be used without authentication\
    \ but that will be less secure. FTP connection which maintains a current working\
    \ directory and other flags, and each transfer requires a secondary connection\
    \ through which the data is transferred. Most common web browsers can retrieve\
    \ files hosted on FTP servers.\n\n### The Methods in FTP class\n\nIn python we\
    \ use the module **ftplib** which has the below required methods to list the files\
    \ as we will transfer the files.\n\n| Method | Description |\n|---|---|\n| pwd()\
    \ | Current working directory. |\n| cwd() | Change current working directory to\
