    \ intended to provide a simple mechanism for transition from HTTP/1.1 to some\
    \ other, incompatible protocol.\n\n## Warning\n\nThe *Warning* general-header\
    \ is used to carry additional information about the status or transformation of\
    \ a message which might not be reflected in the message. A response may carry\
    \ more than one Warning header.\n\n```\nWarning : warn-code SP warn-agent SP warn-text\
    \ SP warn-date\n```\n\n## Example\n\nIn the below example we use the urllib2 module\
