    \n```\n- lrwxrwxrwx     1 504      450              14 Nov 02  2007 FreeBSD ->\
    \ os/BSD/FreeBSD\n- lrwxrwxrwx     1 504      450              20 Nov 02  2007\
    \ ImageMagick -> graphics/ImageMagick\n- lrwxrwxrwx     1 504      450       \
    \       13 Nov 02  2007 NetBSD -> os/BSD/NetBSD\n- lrwxrwxrwx     1 504      450\
    \              14 Nov 02  2007 OpenBSD -> os/BSD/OpenBSD\n- -rw-rw-r--     1 504\
    \      450              932 Jan 04  2015 README.nluug\n- -rw-r--r--     1 504\
    \      450              2023 May 03  2005 WhereToFindWhat.txt\n- drwxr-sr-x  \
    \   2 0        450              4096 Jan 26  2008 av\n- drwxrwsr-x     2 0   \
    \     450              4096 Aug 12  2004 comp\n```\n\n## Fetching the Files\n\n\
    After getting the list of files as shown above, we can fetch a specific file by\
    \ using the **getfile** method. This method moves a copy of the file from the\
    \ remote system to the local system from where the ftp connection was initiated.\n\
    \n```python\nimport ftplib\nimport sys\n\ndef getFile(ftp, filename):\n    try:\n\
    \        ftp.retrbinary(\"RETR \" + filename ,open(filename, 'wb').write)\n  \
    \  except:\n        print \"Error\"\n\nftp = ftplib.FTP(\"ftp.nluug.nl\")\nftp.login(\"\
    anonymous\", \"ftplib-example-1\")\n\nftp.cwd('/pub/')           # change directory\
    \ to /pub/\ngetFile(ftp,'README.nluug')\n\nftp.quit()\n```\n\nWhen we run the\
    \ above program, we find the file README.nluug to be present in the local system\
    \ from where the connection was initiated.\n\n## SFTP\n\nSFTP is also known as\
    \ the SSH File Transfer Protocol. It is a network protocol that provides file\
    \ access, file transfer, and file management over any reliable data stream. The\
    \ program is run over a secure channel, such as SSH, that the server has already\
    \ authenticated the client, and that the identity of the client user is available\
    \ to the protocol.\n\nThe **pysftp** module is a simple interface to SFTP. The\
    \ module offers high level abstractions and task based routines to handle the\
    \ SFTP needs. So we install the module into our python environment with the below\
    \ command.\n\n```\npip install pysftp\n```\n\n## Example\n\nIn the below example\
    \ we login to a remote server using sftp and then get and put some file in that\
    \ directory.\n\n```python\nimport pysftp\n\nwith pysftp.Connection('hostname',\
    \ username='me',\n    password='secret') as sftp:\n\n    with sftp.cd('/allcode'):\
    \           # temporarily chdir to allcode\n        sftp.put('/pycode/filename')\
    \    # upload file to allcode/pycode on remote\n        sftp.get('remote_file')\
    \         # get a remote file\n```\n\nWhen we run the above code we are able to\
    \ see the list of files present in the allcode directory and also put and get\
    \ some file in that directory.\n\n## Web Servers\n\nPython is versatile enough\
    \ to create many types of applications and programs that drive the internet or\
    \ other computer networks. One important aspect of internet is the web servers\
    \ that are at the root of the client server model. In this chapter we will see\
    \ few web servers which are created using pure python language.\n\n## Gunicorn\n\
    \nGunicorn is a stand-alone web server which has a central master process tasked\
    \ with managing the initiated worker processes of differing types. These worker\
    \ processes then handle and deal with the requests directly. And all this can\
    \ be configured and adapted to suit the diverse needs of production scenarios.\n\
    \n### Important Features\n\n- It supports WSGI and can be used with any WSGI running\
    \ Python application and framework\n- It can also be used as a drop-in replacement\
    \ for Paster (ex: Pyramid), Django's Development Server, web2py, etc\n- Offers\
    \ the choice of various worker types/configurations and automatic worker process\
    \ management\n- HTTP/1.0 and HTTP/1.1 (Keep-Alive) support through synchronous\
    \ and asynchronous workers\n- Comes with SSL support\n- Extensible with hooks\n\
    \n## CherryPy WSGI Server\n\nCherryPy is a self contained web framework as it\
    \ can run on its own without the need of additional software. It has its own WSGI,\
    \ HTTP/1.1-compliant web server. As it is a WSGI server, it can be used to serve\
    \ any other WSGI Python application as well, without being bound to CherryPy's\
    \ application development framework."
