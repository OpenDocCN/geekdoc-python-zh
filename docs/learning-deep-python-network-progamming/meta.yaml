  md: "# # Routing\n\nRouting is the mechanism of mapping the URL directly to the\
    \ code that creates the webpage. It helps in better management of the structure\
    \ of the webpage and increases the performance of the site considerably and further\
    \ enhancements or modifications become really straight forward. In python routing\
