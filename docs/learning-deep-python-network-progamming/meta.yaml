    # Telnet


    Telnet is a type of network protocol which allows a user in one computer to logon
    to another computer which also belongs to the same network. The telnet command
    is used along with the host name and then the user credentials are entered. Upon
    successful login the remote user can access the applications and data in a way
    similar to the regular user of the system. Of course some privileges can be controlled
    by the administrator of the system who sets up and maintains the system.


    In Python telnet is implemented by the module telnetlib which has the Telnet class
    which has the required methods to establish the connection. In the below example
    we also use the getpass module to handle the password prompt as part of the login
    process. Also we assume the connection is made to a unix host. The various methods
    from telnetlib.Telnet class used in the program are explained below.


    +   - Telnet.read_until - Read until a given string, expected, is encountered
    or until timeout seconds have passed.

    - Telnet.write - Write a string to the socket, doubling any IAC characters. This
    can block if the connection is blocked. May raise socket.error if the connection
    is closed.

    - Telnet.read_all() - Read all data until EOF; block until connection closed.


    # Example


    ```

    import getpass

    import telnetlib


    HOST = "http://localhost:8000/"

    user = raw_input("Enter your remote account: ")

    password = getpass.getpass()


    tn = telnetlib.Telnet(HOST)

    ```'
