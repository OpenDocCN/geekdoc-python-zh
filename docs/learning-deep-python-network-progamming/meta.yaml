    ```\n\n## Directory Listing\n\nPython can be used to get the list of content from\
    \ a directory. We can make program to list the content of directory which is in\
    \ the same machine where python is running. We can also login to the remote system\
    \ and list the content from the remote directory.\n\n### Listing Local Directory\n\
    \nIn the below example we use the listdir() method to get the content of the current\
    \ directory. To also indicate the type of the content like file or directory,\
    \ we use more functions to evaluate the nature of the content.\n\n```\nfor name\
    \ in os.listdir('.'):\n    if os.path.isfile(name): print 'file: ', name\n   \
    \ elif os.path.isdir(name): print 'dir: ', name\n    elif os.path.islink(name):\
    \ print 'link: ', name\n    else: print 'unknown', name\n```\n\nWhen we run the\
    \ above program, we get the following output –\n\n```\nfile: abcl.htm\ndir: allbooks\n\
    link: ulink\n```\n\nPlease note the content above is specific to the system where\
    \ the python program was run. The result will vary depending on the system and\
    \ its content.\n\n### Listing Remote Directory\n\nWe can list the content of the\
    \ remote directory by using ftp to access the remote system. Once the connection\
    \ is established we can use commands that will list the directory contents in\
    \ a way similar to the listing of local directories.\n\n```\nfrom ftplib import\
    \ FTP\ndef main():\n    ftp = FTP('ftp.ibiblio.org')\n    ftp.login()\n    ftp.cwd('pub/academic/biology/')\
    \ # change to some other subject\n    entries = ftp.nlst()\n    ftp.quit()\n\n\
    \    print(len(entries), \"entries:\")\n    for entry in sorted(entries):\n  \
    \      print(entry)\n\nif __name__ == '__main__':\n    main()\n```\n\nWhen we\
    \ run the above program, we get the following output –\n\n```\n(6, 'entries:')\n\
    INDEX\nREADME\nacedb\ndna-mutations\necology+evolution\nmolbio\n```\n\n## Remote\
    \ Procedure Call\n\nRemote Procedure Call (RPC) system enables you to call a function\
    \ available on a remote server using the same syntax which is used when calling\
    \ a function in a local library. This is useful in two situations.\n\n- You can\
    \ utilize the processing power from multiple machines using rpc without changing\
    \ the code for making the call to the programs located in the remote systems.\n\
    - The data needed for the processing is available only in the remote system.\n\
    \nSo in python we can treat one machine as a server and another machine as a client\
    \ which will make a call to the server to run the remote procedure. In our example\
    \ we will take the localhost and use it as both a server and client.\n\n### Running\
    \ a Server\n\nThe python language comes with an in-built server which we can run\
    \ as a local server. The script to run this server is located under the bin folder\
    \ of python installation and named as classic.py. We can run it in the python\
    \ prompt and check its running as a local server.\n\n```\npython bin/classic.py\n\
    ```\n\nWhen we run the above program, we get the following output –\n\n```\nINFO:SLAVE/18812:server\
    \ started on [127.0.0.1]:18812\n```\n\n### Running a Client\n\nNext we run the\
    \ client using the rpyc module to execute a remote procedure call. In the below\
    \ example we execute the print function in the remote server.\n\n```\nimport rpyc\n\
    conn = rpyc.classic.connect(\"localhost\")\nconn.execute(\"print('Hello from insightbooks')\"\
    )\n```"
  mdcn: "## 重要特性\n\n- 它可以运行任何基于WSGI的Python Web应用程序。\n- 它可以处理静态文件，也可以单独用于提供文件和文件夹服务。\n\
    - 它采用线程池架构。\n- 它内置SSL支持。\n- 它是一个易于适配、易于使用的纯Python替代方案，既健壮又可靠。\n\n## Twisted Web\n\
    \n它是一个随Twisted网络库一起提供的Web服务器。Twisted本身是“一个事件驱动的网络引擎”，而Twisted Web服务器运行在WSGI之上，能够驱动其他Python\
