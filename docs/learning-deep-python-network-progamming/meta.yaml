  md: '# HTTP Requests


    The http or Hyper Text Transfer Protocol works on client server model. Usually
    the web browser is the client and the computer hosting the website is the server.
    IN python we use the requests module for creating the http requests. It is a very
    powerful module which can handle many aspects of http communication beyond the
    simple request and response data. It can handle authentication, compression/decompression,
    chunked requests etc.


    An HTTP client sends an HTTP request to a server in the form of a request message
    which includes following format:


    +   - A Request-line

    - Zero or more header (General|Request|Entity) fields followed by CRLF

    - An empty line (i.e., a line with nothing preceding the CRLF) indicating the
    end of the header fields

    - Optionally a message-body


    The following sections explain each of the entities used in an HTTP request message.


    # Request-Line


    The Request-Line begins with a method token, followed by the Request-URI and the
    protocol version, and ending with CRLF. The elements are separated by space SP
    characters.


    ```

    Request-Line = Method SP Request-URI SP HTTP-Version CRLF

    ```


    Let''s discuss each of the parts mentioned in the Request-Line.


    # Request Method


    The request **method** indicates the method to be performed on the resource identified
    by the given **Request-URI**. The method is case-sensitive and should'
  merge: -1
  pgno: 27
- img_proc: true
  md: 'always be mentioned in uppercase. The following table lists all the supported
    methods in HTTP/1.1.


    | S.N. | Method and Description |

    | :--- | :--- |

    | 1 | **GET**


    The GET method is used to retrieve information from the given server using a given
    URI. Requests using GET should only retrieve data and should have no other effect
    on the data. |

    | 2 | **HEAD**


    Same as GET, but it transfers the status line and the header section only. |

    | 3 | **POST**


    A POST request is used to send data to the server, for example, customer information,
    file upload, etc. using HTML forms. |

    | 4 | **PUT**


    Replaces all the current representations of the target resource with the uploaded
    content. |

    | 5 | **DELETE**


    Removes all the current representations of the target resource given by URI. |'
  merge: -1
