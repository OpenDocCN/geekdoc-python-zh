    这是一个示例结果，具体取决于服务器。\n\n## FTP\n\n**FTP** 或文件传输协议，是一种著名的网络协议，用于在网络中的计算机之间传输文件。它基于客户端-服务器架构创建，可以与用户身份验证一起使用。也可以在没有身份验证的情况下使用，但安全性会降低。FTP\
    \ 连接维护当前工作目录和其他标志，每次传输都需要一个用于传输数据的辅助连接。大多数常见的 Web 浏览器可以检索托管在 FTP 服务器上的文件。\n\n\
    ### FTP 类中的方法\n\n在 Python 中，我们使用 **ftplib** 模块，它包含以下所需方法，用于列出文件，因为我们将要传输文件。\n\n\
    | 方法 | 描述 |\n|---|---|\n| pwd() | 当前工作目录。 |\n| cwd() | 将当前工作目录更改为 path。 |\n| dir([path[,...[,cb]])\
