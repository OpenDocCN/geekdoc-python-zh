  md: '# RSS Feed


    RSS (Rich Site Summary) is a format for delivering regularly changing web content.
    Many news-related sites, weblogs and other online publishers syndicate their content
    as an RSS Feed to whoever wants it. In python we take help of the below package
    to read and process these feeds.


    ```

    pip install feedparser

    ```


    # Feed Structure


    In the below example we get the structure of the feed so that we can analyze further
    about which parts of the feed we want to process.


    ```

    import feedparser

    NewsFeed =

    feedparser.parse("https://timesofindia.indiatimes.com/rssfeedstopstories.cms")

    entry = NewsFeed.entries[1]


    print entry.keys()

    ```


    When we run the above program, we get the following output –


    ```

    [''summary_detail'', ''published_parsed'', ''links'', ''title'', ''summary'',

    ''guidislink'', ''title_detail'', ''link'', ''published'', ''id'']

    ```


    # Feed Title and Posts


    In the below example we read the title and head of the rss feed.


    ```

    import feedparser


    NewsFeed =

    feedparser.parse("https://timesofindia.indiatimes.com/rssfeedstopstories.cms")


    print ''Number of RSS posts :'', len(NewsFeed.entries)

    ```'
