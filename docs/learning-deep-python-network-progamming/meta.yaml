    \ socket 支持，这允许你为面向连接和无连接的协议实现客户端和服务器。\n\nPython 还提供了库，可以更高层次地访问特定的应用层网络协议，例如\
    \ FTP、HTTP 等。\n\nSocket 是双向通信通道的端点。Socket 可以在进程内、同一机器上的进程之间，或不同大陆上的进程之间进行通信。我们使用\
    \ Python 中的 socket 模块来创建和使用 socket。\n\nSocket 有其专用术语：\n\n| 序号 | 术语与描述 |\n| :---\
    \ | :--- |\n| 1 | **域**<br>用作传输机制的协议族。这些值是常量，如 AF_INET、PF_INET、PF_UNIX、PF_X25\
    \ 等。 |\n| 2 | **类型**<br>两个端点之间的通信类型，对于面向连接的协议通常是 SOCK_STREAM，对于无连接的协议是 SOCK_DGRAM。\
    \ |\n| 3 | **协议** |\n| 4 | **主机名**<br>网络接口的标识符——<br>- 一个字符串，可以是主机名、点分十进制地址，或冒号（可能带点）表示的\
    \ IPv6 地址<br>- 字符串 \"<broadcast>\"，指定一个 INADDR_BROADCAST 地址。<br>- 零长度字符串，指定 INADDR_ANY，或<br>-\
    \ 一个整数，被解释为以主机字节序表示的二进制地址。 |\n| 5 | **端口**<br>每个服务器监听一个或多个端口上的客户端调用。端口可以是 Fixnum\
    \ 端口号、包含端口号的字符串，或服务名称。 |\n\n## socket 模块\n\n要创建一个 socket，你必须使用 `socket` 模块中可用的\
    \ `socket.socket()` 函数，其通用语法为：\n\n```python\ns = socket.socket (socket_family,\
    \ socket_type, protocol=0)\n```\n\n以下是参数说明：\n\n- **socket_family** – 这是 AF_UNIX\
    \ 或 AF_INET，如前所述。\n- **socket_type** – 这是 SOCK_STREAM 或 SOCK_DGRAM。\n- **protocol**\
    \ – 通常省略，默认为 0。\n\n一旦你有了 *socket* 对象，就可以使用所需的函数来创建你的客户端或服务器程序。\n\n## 服务器 Socket\
    \ 方法\n\n| 序号 | 方法与描述 |\n|---|---|\n| 1 | **s.bind()**<br>此方法将地址（主机名、端口号对）绑定到 socket。\
    \ |\n| 2 | **s.listen()**<br>此方法设置并启动 TCP 监听器。 |\n| 3 | **s.accept()**<br>此方法被动接受\
    \ TCP 客户端连接，等待连接到达（阻塞）。 |\n\n## 客户端 Socket 方法\n\n| 序号 | 方法与描述 |\n|---|---|\n|\
    \ 1 | **s.connect()**<br>此方法主动发起与 TCP 服务器的连接。 |\n\n## 通用 Socket 方法\n\n| 序号 | 方法与描述\
    \ |\n|---|---|\n| 1 | **s.recv()**<br>此方法接收 TCP 消息 |\n| 2 | **s.send()**<br>此方法发送\
    \ TCP 消息 |\n| 3 | **s.recvfrom()**<br>此方法接收 UDP 消息 |\n| 4 | **s.sendto()**<br>此方法发送\
    \ UDP 消息 |\n| 5 | **s.close()**<br>此方法关闭 socket |\n| 6 | **socket.gethostname()**<br>返回主机名。\
    \ |\n\n## 一个简单的服务器\n\n要编写互联网服务器，我们使用 socket 模块中可用的 **socket** 函数来创建一个 socket 对象。然后使用该\
    \ socket 对象调用其他函数来设置 socket 服务器。\n\n现在调用 **bind(hostname, port)** 函数，为你的服务在给定主机上指定一个\
    \ *端口*。\n\n接下来，调用返回对象的 *accept* 方法。此方法会等待，直到有客户端连接到你指定的端口，然后返回一个表示与该客户端连接的 *connection*\
    \ 对象。\n\n```python\n#!/usr/bin/python           # 这是 server.py 文件\n\nimport socket\
    \               # 导入 socket 模块\n\ns = socket.socket()         # 创建一个 socket 对象\n\
    host = socket.gethostname() # 获取本地主机名\nport = 12345                # 为你的服务预留一个端口。\n\
    s.bind((host, port))        # 绑定到该端口\n\ns.listen(5)                 # 现在等待客户端连接。\n\
    while True:\n   c, addr = s.accept()     # 与客户端建立连接。\n   print 'Got connection\
    \ from', addr\n   c.send('Thank you for connecting')\n   c.close()           \
    \     # 关闭连接\n```\n\n## 一个简单的客户端\n\n让我们编写一个非常简单的客户端程序，它打开一个到给定端口 12345 和给定主机的连接。使用\
    \ Python 的 *socket* 模块函数创建 socket 客户端非常简单。\n\n**socket.connect(hostname, port)**\
    \ 打开一个到 *hostname* 上 *port* 的 TCP 连接。一旦你打开了一个 socket，你就可以像读取任何 IO 对象一样从中读取数据。完成后，记得关闭它，就像关闭文件一样。\n\
    \n以下代码是一个非常简单的客户端，它连接到给定的主机和端口，从 socket 读取任何可用数据，然后退出：\n\n```python\n#!/usr/bin/python\
    \           # 这是 client.py 文件\n\nimport socket               # 导入 socket 模块\n\n\
    s = socket.socket()            # 创建一个 socket 对象\nhost = socket.gethostname() #\
    \ 获取本地主机名\nport = 12345                # 为你的服务预留一个端口。\n\ns.connect((host, port))\n\
    print s.recv(1024)\ns.close                      # 完成后关闭 socket\n```\n\n现在在后台运行这个\
    \ server.py，然后运行上面的 client.py 来查看结果。\n\n```\n# 以下命令将在后台启动服务器。\n$ python server.py\
    \ &\n\n# 服务器启动后，按如下方式运行客户端：\n$ python client.py\n```\n\n这将产生以下结果：\n\n```\nGot\
    \ connection from ('127.0.0.1', 48437)\nThank you for connecting\n```\n\n## 使用公共\
    \ URL 的 Socket\n\n在下面的示例中，我们使用 socket 模块中的几个方法来查找服务器的地址信息和主机名详情。\n\n```python\n\
    import socket\nfrom pprint import pprint\n\n# 获取服务器地址\naddrinfo = socket.getaddrinfo('insightbooks.com',\
    \ 'www')\n\npprint(addrinfo)\n\n# 获取服务器主机名\nprint socket.gethostname()\n```\n\n\
    运行上述程序后，我们得到以下输出：\n\n```\n[(2, 1, 0, '', ('94.130.81.180', 80))]\nDESKTOP-JXYKQCPLP\n\
    ```\n\n## HTTP 客户端\n\n在 HTTP 协议中，来自客户端的请求到达服务器，并假设它是一个有效请求，然后获取一些数据和元数据。我们可以使用\
    \ Python requests 模块中提供的各种函数来分析来自服务器的这个响应。下面的 Python 程序在客户端运行，并显示服务器发送的响应结果。\n\
    \n## 获取初始响应\n\n在下面的程序中，requests 模块中的 get 方法从服务器获取数据，并以纯文本格式打印出来。\n\n```python\n\
    import requests\nr = requests.get('https://httpbin.org/')\nprint(r.text)[:200]\n\
    ```\n\n运行上述程序后，我们得到以下输出：\n\n```\n<!DOCTYPE html >\n<html lang=\"en\">\n<head>\n\
    \    <meta charset=\"UTF-8\">\n    <title>httpbin.org</title>\n    <link\nhref=\"\
    https://fonts.googleapis.com/css?family=Open+Sans:400,700|Source+Code+Pro:300,600|Titillium+\n\
    ```\n\n## 获取会话对象响应\n\nSession 对象允许你跨请求持久化某些参数。它还持久化从 Session 实例发出的所有请求的 cookies。如果你向同一主机发出多个请求，底层的\
    \ TCP 连接将被重用。\n\n```python\nimport requests\ns = requests.Session()\n```"
