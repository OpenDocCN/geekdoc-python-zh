  mdcn: "## 路由\n\n路由是将 URL 直接映射到创建网页的代码的机制。它有助于更好地管理网页结构，并显著提升网站性能，使得后续的增强或修改变得非常直接。在\
    \ Python 中，大多数 Web 框架都实现了路由。本章我们将以 **Flask** Web 框架为例进行讲解。\n\n### Flask 中的路由\n\
    \nFlask 中的 **route()** 装饰器用于将 URL 绑定到一个函数。因此，当浏览器中访问该 URL 时，该函数将被执行并返回结果。这里，URL\
    \ 规则 '/hello' 被绑定到了 **hello_world()** 函数。因此，如果用户访问 **http://localhost:5000/**\
    \ 这个 URL，**hello_world()** 函数的输出将会在浏览器中渲染。\n\n```python\nfrom flask import Flask\n\
    app = Flask(__name__)\n\n@app.route('/')\ndef hello_world():\n    return 'Hello\
    \ insightbooks'\n\nif __name__ == '__main__':\n    app.run()\n```\n\n当我们运行上述程序时，会得到以下输出：\n\
    \n```\n* Serving Flask app \"flask_route\" (lazy loading)\n* Environment: production\n\
    \  WARNING: Do not use the development server in a production environment.\n \
    \ Use a production WSGI server instead.\n* Debug mode: off\n* Running on http://127.0.0.1:5000/\
    \ (Press CTRL+C to quit)\n127.0.0.1 - - [06/Aug/2018 08:48:45] \"GET / HTTP/1.1\"\
    \ 200 -\n127.0.0.1 - - [06/Aug/2018 08:48:46] \"GET /favicon.ico HTTP/1.1\" 404\
    \ -\n127.0.0.1 - - [06/Aug/2018 08:48:46] \"GET /favicon.ico HTTP/1.1\" 404 -\n\
    ```\n\n我们打开浏览器并指向 URL **http://localhost:5000/**，即可看到函数执行的结果。\n\n![](img/ff1fe0ce40257840cfd331dc7575dd85_24_0.png)\n\
    \n### 使用 URL 变量\n\n我们可以使用路由传递 URL 变量来动态构建 URL。为此，我们使用 `url_for()` 函数，它接受函数名作为第一个参数，其余参数作为\
    \ URL 规则的可变部分。\n\n在下面的例子中，我们将函数名作为参数传递给 `url_for` 函数，并在执行这些行时打印出结果。\n\n```python\n\
    from flask import Flask, url_for\napp = Flask(__name__)\n\n@app.route('/')\ndef\
    \ index(): pass\n\n@app.route('/login')\ndef login(): pass\n\n@app.route('/user/')\n\
    def profile(username): pass\n\nwith app.test_request_context():\n    print url_for('index')\n\
    \    print url_for('index', _external=True)\n    print url_for('login')\n    print\
    \ url_for('login', next='/')\n    print url_for('profile', username='insightbooks')\n\
    ```\n\n当我们运行上述程序时，会得到以下输出：\n\n```\n/\nhttp://localhost/\n/login\n/login?next=%2F\n\
    /user/insightbooks%20Point\n```\n\n### 重定向\n\n我们可以使用 `redirect` 函数通过路由将用户重定向到另一个\
    \ URL。我们将新的 URL 作为应该重定向用户的函数的返回值。当我们修改现有网页时，需要临时将用户引导到另一个页面，这会很有帮助。\n\n```python\n\
    from flask import Flask, abort, redirect, url_for\napp = Flask(__name__)\n\n@app.route('/')\n\
    def index():\n    return redirect(url_for('login'))\n\n@app.route('/login')\n\
    def login():\n    abort(401)\n#     this_is_never_executed()\n```\n\n当执行上述代码时，基础\
    \ URL 会跳转到登录页面，该页面使用了 `abort` 函数，因此登录页面的代码永远不会被执行。\n\n## HTTP 请求\n\nHTTP 或超文本传输协议基于客户端-服务器模型工作。通常，Web\
    \ 浏览器是客户端，托管网站的计算机是服务器。在 Python 中，我们使用 `requests` 模块来创建 HTTP 请求。这是一个非常强大的模块，可以处理\
    \ HTTP 通信的许多方面，而不仅仅是简单的请求和响应数据。它可以处理身份验证、压缩/解压缩、分块请求等。\n\nHTTP 客户端以请求消息的形式向服务器发送\
    \ HTTP 请求，该消息包含以下格式：\n\n-   一个请求行\n-   零个或多个头部字段（通用|请求|实体），后跟 CRLF\n-   一个空行（即，CRLF\
    \ 前没有任何内容的行），表示头部字段结束\n-   可选的消息体\n\n以下各节将解释 HTTP 请求消息中使用的每个实体。\n\n### 请求行\n\n\
    请求行以方法标记开始，后跟请求 URI 和协议版本，最后以 CRLF 结束。各元素之间用空格 SP 字符分隔。\n\n```\nRequest-Line =\
    \ Method SP Request-URI SP HTTP-Version CRLF\n```\n\n让我们讨论请求行中提到的每个部分。\n\n###\
    \ 请求方法\n\n请求 **方法** 指示对给定 **Request-URI** 标识的资源要执行的操作。该方法区分大小写，并且应始终以大写形式提及。下表列出了\
    \ HTTP/1.1 中支持的所有方法。\n\n| 序号 | 方法和描述 |\n| :--- | :--- |\n| 1 | **GET**<br>GET\
    \ 方法用于使用给定的 URI 从给定服务器检索信息。使用 GET 的请求应该只检索数据，而不应对数据产生其他影响。 |\n| 2 | **HEAD**<br>与\
    \ GET 相同，但只传输状态行和头部部分。 |\n| 3 | **POST**<br>POST 请求用于向服务器发送数据，例如，使用 HTML 表单发送客户信息、文件上传等。\
    \ |\n| 4 | **PUT**<br>用上传的内容替换目标资源的所有当前表示。 |\n| 5 | **DELETE**<br>删除 URI 给出的目标资源的所有当前表示。\
    \ |\n| 6 | **CONNECT**<br>建立到由给定 URI 标识的服务器的隧道。 |\n| 7 | **OPTIONS**<br>描述目标资源的通信选项。\
    \ |\n| 8 | **TRACE**<br>执行消息回环测试，沿着到目标资源的路径。 |\n\n### 请求 URI\n\n请求 URI 是一个统一资源标识符，用于标识要应用请求的资源。以下是用于指定\
    \ URI 的最常用形式：\n\n```\nRequest-URI = \"*\" | absoluteURI | abs_path | authority\n\
    ```\n\n| 序号 | 方法和描述 |\n| --- | --- |\n| 1 | 星号 * 用于 HTTP 请求不适用于特定资源，而是适用于服务器本身的情况，并且仅在使用的方法不一定适用于资源时才允许。例如：<br>**OPTIONS\
    \ * HTTP/1.1** |\n| 2 | **absoluteURI** 用于向代理发出 HTTP 请求时。代理被要求转发请求或从有效缓存中提供服务，并返回响应。例如：<br>**GET\
    \ http://www.w3.org/pub/WWW/TheProject.html HTTP/1.1** |\n| 3 | 请求 URI 最常见的形式用于标识源服务器或网关上的资源。例如，希望直接从源服务器检索资源的客户端将创建到主机\
    \ \"www.w3.org\" 端口 80 的 TCP 连接，并发送以下行：<br>**GET /pub/WWW/TheProject.html HTTP/1.1**<br>**Host:\
    \ www.w3.org**<br>请注意，绝对路径不能为空；如果原始 URI 中没有，则必须将其指定为 \"/\"（服务器根目录）。 |\n\n### 使用\
    \ Python requests\n\n我们将使用 `requests` 模块来学习 HTTP 请求。\n\n```\npip install requests\n\
    ```\n\n在下面的例子中，我们看到一个简单的 GET 请求案例，并打印出响应结果。我们选择只打印前 300 个字符。\n\n```python\n# How\
    \ to make http request\nimport requests as req\nr = req.get('http://www.insightbooks.com/python/')\n\
    print(r.text)[0:300]\n```\n\n当我们运行上述程序时，会得到以下输出：\n\n```\n<!DOCTYPE html>\n<!--[if\
    \ IE 8]><html class=\"ie ie8\"> <![endif]-->\n<!--[if IE 9]><html class=\"ie ie9\"\
    > <![endif]-->\n<!--[if gt IE 9]><!-->     <html> <!--<![endif]-->\n<head>\n<!--\
    \ Basic -->\n<meta charset=\"utf-8\">\n<title>Python insightbooks</title>\n<meta\
    \ name=\"description\" content=\"Python insightbooks\n```\n\n## HTTP 响应\n\nHTTP\
    \ 或超文本传输协议基于客户端-服务器模型工作。通常，Web 浏览器是客户端，托管网站的计算机是服务器。服务器在收到客户端的请求后，会生成响应并以特定格式发送回客户端。\n\
    \n在接收并解释请求消息后，服务器会用 HTTP 响应消息进行响应：\n\n-   一个状态行\n-   零个或多个头部字段（通用|响应|实体），后跟 CRLF\n\
    -   一个空行（即，CRLF 前没有任何内容的行），表示头部字段结束\n-   可选的消息体\n\n以下各节将解释 HTTP 响应消息中使用的每个实体。\n\
    \n### 消息状态行\n\n状态行由协议版本、数字状态代码及其相关的文本短语组成。各元素之间用空格 SP 字符分隔。\n\n```\nStatus-Line\
    \ = HTTP-Version SP Status-Code SP Reason-Phrase CRLF\n```"
