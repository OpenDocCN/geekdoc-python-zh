    \ format\n```\n\n## Transfer-Encoding\n\nThe *Transfer-Encoding* general-header\
    \ field indicates what type of transformation has been applied to the message\
    \ body in order to safely transfer it between the sender and the recipient. This\
    \ is not the same as content-encoding because transfer-encodings are a property\
    \ of the message, not of the entity-body. The syntax of Transfer-Encoding header\
    \ field is as follows:\n\n```\nTransfer-Encoding: chunked\n```\n\nAll transfer-coding\
    \ values are case-insensitive.\n\n## Upgrade\n\nThe *Upgrade* general-header allows\
    \ the client to specify what additional communication protocols it supports and\
    \ would like to use if the server finds it appropriate to switch protocols. For\
