  md: "# DNS Look-up\n\nThe IP addresses when translated to human readable formats\
    \ or words become known as domain names. The translation of domain names to IP\
    \ address is managed by the python module **dnspython**. This module also provides\
    \ methods to find out CNAME and MX records.\n\n# Finding 'A' Record\n\nIn the\
    \ below program we find the ip address for the domain using the dns.resolver method.\
    \ Usually this mapping between IP address and domain name is also known as 'A'\
    \ record.\n\n```\nimport dnspython as dns\nimport dns.resolver\n\nresult = dns.resolver.query('insightbook.com',\
    \ 'A')\nfor ipval in result:\n    print('IP', ipval.to_text())\n```\n\nWhen we\
    \ run the above program, we get the following output –\n\n```\n('IP', u'94.130.81.180')\n\
    ```\n\n# Finding CNAME Value\n\nA CNAME record also known as Canonical Name Record\
    \ is a type of record in the Domain Name System (DNS) used to map a domain name\
    \ as an alias for another domain. CNAME records always point to another domain\
    \ name and never directly to an IP address. In the query method below we specify\
    \ the CNAME parameter to get the CNAME value.\n\n```\nimport dnspython as dns\n\
    import dns.resolver\nresult = dns.resolver.query('mail.google.com', 'CNAME')\n\
    for cnameval in result:\n```"
