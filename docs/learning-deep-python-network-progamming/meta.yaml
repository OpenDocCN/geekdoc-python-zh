    # Databases and SQL


    The Python programming language has powerful features for database programming.
    Python supports various databases like SQLite, MySQL, Oracle, Sybase, PostgreSQL,
    etc. Python also supports Data Definition Language (DDL), Data Manipulation Language
    (DML) and Data Query Statements. The Python standard for database interfaces is
    the Python DB-API. Most Python database interfaces adhere to this standard.


    Here is the list of available Python database interfaces: [Python Database Interfaces
    and APIs](https://www.tutorialspoint.com/python/python_database_access.htm). You
    must download a separate DB API module for each database you need to access.


    In this chapter we will see the use of SQLite database in python programming language.
    It is done by using python’s inbuilt, sqlite3 module. You should first create
    a connection object that represents the database and then create some cursor objects
    to execute SQL statements.


