  md: "# Proxy Server\n\nProxy servers are used to browse to some website through\
    \ another server so that the browsing remains anonymous. It can also be used to\
    \ bypass the blocking of specific IP addresses.\n\nWe use the urlopen method from\
    \ the urllib module to access the website by passing the proxy server address\
    \ as a parameter.\n\n# Example\n\nIn the below example we use a proxy address\
    \ to access the website twitter.com for anonymous access. The response status\
    \ of OK proves the successful access through a proxy server.\n\n```\nimport urllib\n\
    URL = 'https://www.twitter.com'\nPROXY_ADDRESS = \"265.24.11.6:8080\"\nif __name__\
    \ == '__main__':\n    resp = urllib.urlopen(URL, proxies = {\"http\" : PROXY_ADDRESS})\n\
    print \"Proxy server returns response headers: %s \" %resp.headers\n```\n\nWhen\
    \ we run the above program, we get the following output –\n\n```\nProxy server\
