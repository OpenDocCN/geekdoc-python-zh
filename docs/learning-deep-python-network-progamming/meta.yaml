    &order=popular\n```\n\n## 请求状态码\n\n服务器在接收并解析请求消息后，会用HTTP响应消息进行回复。响应消息中包含一个状态码。它是一个三位整数，其中状态码的第一位数字定义了响应的类别，而后两位数字则没有分类作用。第一位数字有5种取值：\n\
    \n状态码\n\n| 序号 | 代码与描述 |\n| :--- | :--- |\n| 1 | **1xx：信息性**<br><br>表示请求已收到，处理过程正在进行。\
    \ |\n| 2 | **2xx：成功**<br><br>表示操作已被成功接收、理解和接受。 |\n| 3 | **3xx：重定向**<br><br>表示必须采取进一步操作才能完成请求。\
    \ |\n| 4 | **4xx：客户端错误**<br><br>表示请求包含错误的语法或无法被满足。 |\n| 5 | **5xx：服务器错误**<br><br>表示服务器未能满足一个显然有效的请求。\
    \ |\n\n## 成功响应\n\n在下面的示例中，我们从一个URL访问一个文件，响应是成功的。因此返回的状态码是200。\n\n```python\nimport\
    \ urllib3\nhttp = urllib3.PoolManager()\n\nresp = http.request('GET', 'http://insightbooks.com/robots.txt')\n\
    print resp.data\n\n# 获取响应状态\nprint resp.status\n```\n\n当我们运行上述程序时，会得到以下输出 –\n\n\
    ```\nUser-agent: *\nDisallow: /tmp\nDisallow: /logs\nDisallow: /rate/*\nDisallow:\
    \ /cgi-bin/*\nDisallow: /videotutorials/video_course_view.php?*\nDisallow: /videotutorials/course_view.php?*\n\
    Disallow: /videos/*\nDisallow: /*/*_question_bank/*\nDisallow: ///*/*/*/*/src/*\n\
    \n200\n```\n\n## 不成功响应\n\n在下面的示例中，我们访问一个不存在的URL文件。响应不成功。因此返回的状态码是403。\n\n```python\n\
    import urllib3\nhttp = urllib3.PoolManager()\n\nresp = http.request('GET', 'http://insightbooks.com/robot.txt')\n\
    print resp.data\n\n# 获取响应状态\nprint resp.status\n```\n\n当我们运行上述程序时，会得到以下输出 –\n\n\
    ```\n<!DOCTYPE HTML PUBLIC \"-//IETF//DTD HTML 2.0//EN\">\n<html><head>\n<title>403\
    \ Forbidden</title>\n</head><body>\n<h1>Forbidden</h1>\n<p>You don't have permission\
    \ to access /robot.txt\non this server.</p>\n</body></html>\n\n403\n```\n\n##\
    \ HTTP认证\n\n认证是确定请求是否来自有权使用系统的合法用户的过程。在计算机网络世界中，这是一个至关重要的要求，因为许多系统需要相互交互，必须有适当的机制来确保这些程序之间只发生合法的交互。\n\
    \nPython模块**requests**内置了调用服务端Web应用提供的各种API的功能，并支持用户凭证。这些凭证必须嵌入到调用程序中。如果API验证成功，则会发生有效的登录。\n\
    \n## 安装Requests\n\n我们安装所需的Python模块requests来运行认证程序。\n\n```\npip install requests\n\
    ```\n\n## 认证到Github\n\n下面我们看到一个仅涉及用户名和密码的简单认证机制。成功的响应表示登录有效。\n\n```python\nimport\
    \ requests\nr = requests.get('https://api.github.com/user', auth=('user', 'pass'))\n\
    print r\n```\n\n当我们运行上述程序时，会得到以下输出 –\n\n## 认证到Twitter\n\n我们也可以运行一个程序来使用Twitter的API，并通过以下代码实现成功登录。我们使用requests模块中可用的OAuth1方法来处理Twitter\
    \ API所需的参数。如我们所见，requests模块能够处理更复杂的认证机制，涉及密钥和令牌，而不仅仅是用户名和密码机制。\n\n```python\n\
    import requests\nfrom requests_oauthlib import OAuth1\n\nurl = 'https://api.twitter.com/1.1/account/verify_credentials.json'\n\
    auth = OAuth1('YOUR_APP_KEY', 'YOUR_APP_SECRET',\n              'USER_OAUTH_TOKEN',\
    \ 'USER_OAUTH_TOKEN_SECRET')\n\nrequests.get(url, auth=auth)\n```\n\n当我们运行上述程序时，会得到以下输出\
    \ –\n\n```json\n{\n    \"errors\": [\n        {\n            \"code\": 215,\n\
    \            \"message\": \"Bad Authentication data.\"\n        }\n    ]\n}\n\
    ```\n\n但是，如果为OAuth1参数使用正确的值，你将获得成功的响应。\n\n## HTTP数据下载\n\n我们可以使用Python处理FTP（文件传输协议）的模块从服务器下载数据。我们也可以读取数据并将其保存到本地系统。\n\
    \n我们需要安装模块**ftplib**来实现这一点。\n\n```\npip install ftplib\n```\n\n## 获取文件\n\n我们可以使用**getfile**方法获取特定文件。此方法将文件的副本从远程系统移动到发起FTP连接的本地系统。\n\
    \n```python\nimport ftplib\nimport sys\n\ndef getFile(ftp, filename):\n    try:\n\
    \        ftp.retrbinary(\"RETR \" + filename ,open(filename, 'wb').write)\n  \
    \  except:\n        print \"Error\"\n\nftp = ftplib.FTP(\"ftp.nluug.nl\")\nftp.login(\"\
    anonymous\", \"ftplib-example-1\")\n\nftp.cwd('/pub/')          # 切换目录到 /pub/\n\
    getFile(ftp,'README.nluug')\n\nftp.quit()\n```\n\n当我们运行上述程序时，会发现文件README.nluug已存在于发起连接的本地系统中。\n\
    \n## 读取数据\n\n在下面的示例中，我们使用模块urllib2来读取所需部分的数据，然后可以将其复制并保存到本地系统。\n\n```python\n\
    import urllib2\nresponse = urllib2.urlopen('http://www.insightbooks.com/python')\n\
    html = response.read(200)\nprint html\n```\n\n当我们运行上述程序时，会得到以下输出 –\n\n```html\n\
    <!DOCTYPE html>\n<!--[if IE 8]><html class=\"ie ie8\"> <![endif]-->\n<!--[if IE\
    \ 9]><html class=\"ie ie9\"> <![endif]-->\n<!--[if gt IE 9]><!--> <html> <!--<![endif]-->\n\
    <head>\n<!-- Basic -->\n<meta charset=\"ut\n```\n\n## 连接重用\n\n当客户端向服务器发出有效请求时，它们之间会建立一个临时连接以完成发送和接收过程。但在某些场景下，由于通信程序之间需要自动的请求和响应，连接需要保持活跃。例如一个交互式网页。网页加载后，需要提交表单数据或下载更多的CSS和JavaScript组件。为了更快的性能和客户端与服务器之间不间断的通信，连接需要保持活跃。\n\
    \nPython提供了**urllib3**模块，其中包含处理客户端和服务器之间连接重用的方法。在下面的示例中，我们创建一个连接，并通过在GET请求中传递不同的参数来发出多个请求。我们收到了多个响应，同时也统计了在此过程中使用的连接数量。如我们所见，连接数量没有变化，这意味着连接被重用了。\n\
    \n```python\nfrom urllib3 import HTTPConnectionPool\n\npool = HTTPConnectionPool('ajax.googleapis.com',\
    \ maxsize=1)\nr = pool.request('GET', '/ajax/services/search/web',\n         \
    \        fields={'q': 'python', 'v': '1.0'})\nprint 'Response Status:', r.status\n\
    \n# 响应头\nprint 'Header: ',r.headers['content-type']\n\n# 响应内容\nprint 'Python:\
    \ ',len(r.data)\n\nr = pool.request('GET', '/ajax/services/search/web',\n    \
    \             fields={'q': 'php', 'v': '1.0'})\n```"
