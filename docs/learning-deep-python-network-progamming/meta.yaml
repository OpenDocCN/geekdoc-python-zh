  md: '# SMTP


    Simple Mail Transfer Protocol (SMTP) is a protocol, which handles sending an e-mail
    and routing e-mail between mail servers.


    Python provides **smtplib** module, which defines an SMTP client session object
    that can be used to send mails to any Internet machine with an SMTP or ESMTP listener
    daemon.


    An SMTP object has an instance method called **sendmail**, which is typically
    used to do the work of mailing a message. It takes three parameters –


    +   - The *sender* – A string with the address of the sender.

    - The *receivers* – A list of strings, one for each recipient.

    - The *message* – A message as a string formatted as specified in the various
    RFCs.


    # Example


    Here is a simple way to send one e-mail using Python script. Try it once –


    ```

    #!/usr/bin/python3


    import smtplib


    sender = ''from@fromdomain.com''

    receivers = [''to@todomain.com'']


    message = """From: From Person <from@fromdomain.com>

    To: To Person <to@todomain.com>

    Subject: SMTP e-mail test


    This is a test e-mail message.

    """

    ```'
