    \ after pop: [10, 13, 89]\n```\n\n## 21. Python 元组\n\n## 21.1 Python 元组\n\n元组是另一种类似于列表的序列数据类型。元组由逗号分隔的多个值组成。然而，与列表不同，元组是**用圆括号括起来的**。\n\
    \n**列表和元组的主要区别是：**\n\n列表用方括号（ [ ] ）括起来，其元素和大小可以更改，而元组用圆括号（ ( ) ）括起来，不能更新。\n\n\
