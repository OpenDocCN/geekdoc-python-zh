- md: '## Datatype


    Type represents the kind of value and determines how the value can be used.

    Standard built-in data types:


    - I. None

    - II. Numeric

    - III. Sequences

    - IV. Sets

    - V. Mapping


    ## I. None


    Is a special constant. It is a null value. It is not the same as false.


    ## II. Numeric


    Number data type stores numeric values. 4 numerical types:


    - 1. int (signed integers)

    - 2. long (long integers, they can also be represented in octal and hexadecimal)

    - 3. float (floating point real values)

    - 4. complex (complex numbers)


    1. **int** (signed integers) - holds signed integers of non-limited length.


    ```

    Syntax: a=int(input("values"))    #get the integer value

