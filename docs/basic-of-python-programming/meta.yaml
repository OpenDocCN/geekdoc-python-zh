    Syntax:    a=long(input("values"))    #get the long value

    ```


    **Example:**


    ```

    a= -0x19323L

    print(a)

    ```


    **Output:** -0x19323L    #print long values


    3. **float** (floating point real values) - holds floating precision numbers and
    it''s accurate upto 15 decimal places.


    **Syntax:** a=float(input("values")) #get the float value


    **Example:**


    ```

    a= 3.14

    print(a)

    ```


    **Output:** 3.14 #print float value


    4. **COMPLEX** (holds complex numbers - It is the combination of imaginary part
