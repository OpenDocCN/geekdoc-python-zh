- md: "class is one of Python's **keywords**. The interpreter uses keywords to recognize\
    \ the structure of the program, and they cannot be used as variable names.\n\n\
    **Reserved Words:**\nPython has these keywords:\n\n- False\n- class\n- finally\n\
    - is\n- return\n- None\n- continue\n- for\n- lambda\n- try\n- True\n- def\n- from\n\
    - nonlocal\n- while\n- and\n- del\n- global\n- not\n- with\n- as\n- elif\n- if\n\
    - or\n- yield\n- assert\n- else\n- import\n- pass\n- break\n- except\n- in\n-\
    \ raise\n\n## 6. Expression and Statements\n\n**6.1** An **expression** is a combination\
    \ of values, variables, and operators. A value all by itself is considered an\
    \ expression, and so is a variable, so the following are all legal expressions:\n\
    \n```\n>>> 42\n42        #print the values\n>>> n\n17        #get the values for\
    \ n\n>>> n + 25    #add the both values\n42        #result of above expression\n\
    ```\n\nWhen you type an expression at the prompt, the interpreter **evaluates**\
    \ it, which means that it finds the value of the expression. In this example,\
    \ n has the value 17 and n + 25 has the value 42.\n\nevaluating an expression\
    \ is not quite the same thing as printing a value.\n\n```\n>>> message = 'Hello,\
    \ World!'\n>>> message\n'Hello, World!'\n>>> print message\nHello, World!\n```\n\
    \nWhen the Python interpreter displays the value of an expression, it uses the\
    \ same format you would use to enter a value. In the case of strings, that means\
    \ that it includes the quotation marks. But if you use a print statement, Python\
    \ displays the contents of the string without the quotation marks.\n\n**6.2 A\
    \ statement** is a unit of code that has an effect, like creating a variable or\
    \ displaying a value.\n\n```\n>>> n = 17\n>>> print(n)\n```\n\nThe first line\
    \ is an assignment statement that gives a value to n. The second line is a print\
    \ statement that displays the value of n.\nWhen we type a statement, the interpreter\
    \ **executes** it, which means that it does whatever the statement says. In general,\
    \ statements don't have values.\n\n### Types of Statements in Python:\n\n- **Simple\
    \ Statement:** Simple statements are comprised within a single logical line. Several\
    \ simple statements may occur on a single line separated by semicolons.\n\nThe\
    \ syntax for simple statements is:\n`Simple_stmt ::= expression_stmt`\n\n- **Expression\
    \ Statement:** Expression statements are used to compute and write a value, or\
    \ to call a procedure (a function that returns no meaningful result; in Python,\
    \ procedures return the value None). Other uses of expression statements are allowed\
    \ and occasionally useful.\n\nThe syntax for an expression statement is:\n`expression_stmt\
    \ ::= expression_list`\n\n- **Assignment Statement:** Assignment statements are\
    \ used to (re)bind names to values and to modify attributes or items of mutable\
    \ objects:\n\nThe syntax for an assignment statement is:\n`assignment_stmt ::=\
    \ (target_list \"=\")+ (expression_list | yield_expression)`\n\nAn assignment\
    \ statement evaluates the expression list (remember that this can be a single\
    \ expression or a comma-separated list, the latter yielding a tuple) and assigns\
    \ the single resulting object to each of the target lists, from left to right.\n\
    \n- **The Pass Statement**: pass is a null operation — when it is executed, nothing\
    \ happens. It is useful as a placeholder when a statement is required syntactically,\
    \ but no code needs to be executed, for example:\n  `pass_stmt ::= \"pass\"`\n\
    \  `def f(arg): pass  # a function that does nothing (yet)`\n  `class C: pass\
    \  # a class with no methods (yet)`\n\n- **The Del Statement**: Deletion of a\
    \ target list recursively deletes each target, from left to right. Deletion of\
    \ a name removes the binding of that name from the local or global namespace,\
    \ depending on whether the name occurs in a global statement in the same code\
    \ block. If the name is unbound, a NameError exception will be raised.\n\nThe\
    \ syntax for a Del statement is:\n`del_stmt ::= \"del\" target_list`\n\n## 7.\
    \ TUPLE ASSIGNMENT\n\nA tuple is a sequence of immutable Python objects. Tuples\
    \ are sequences, just like lists. The differences between tuples and lists are,\
    \ the tuples cannot be changed unlike lists and tuples use parentheses, whereas\
    \ lists use square brackets. Creating a tuple is as simple as putting different\
    \ comma-separated values. Optionally you can put these comma-separated values\
    \ between parentheses also. For example –\n\n```\ntup1 = ('physics', 'chemistry',\
    \ 1997, 2000);\ntup2 = (1, 2, 3, 4, 5 );\ntup3 = \"a\", \"b\", \"c\", \"d\";\n\
    ```\n\n### 7.1 Accessing Values in Tuples\n\nTo access values in tuple, use the\
    \ square brackets for slicing along with the index or indices to obtain value\
    \ available at that index. For example –\n\n```\ntup1 = ('physics', 'chemistry',\
    \ 1997, 2000);\ntup2 = (1, 2, 3, 4, 5, 6, 7 );\n\nprint \"tup1[0]: \", tup1[0]\n\
    print \"tup2[1:5]: \", tup2[1:5]\n```\n\n**Output:** When the above code is executed,\
    \ it produces the following result\n\n```\ntup1[0]: physics\ntup2[1:5]: [2, 3,\
    \ 4, 5]\n```\n\n### 7.2 Deleting Tuple Elements\n\nRemoving individual tuple elements\
    \ is not possible. To explicitly remove an entire tuple, just use the **del**\
    \ statement.\n\n```\ntup = ('physics', 'chemistry', 1997, 2000);\nprint tup\n\
    del tup;\nprint \"After deleting tup : \"\nprint tup\n```\n\nThis produces the\
    \ following result. Note an exception raised, this is because after **del tup**\
    \ tuple does not exist any more.\n\n### 7.3 Modify a Tuple Element\n\nBecause\
    \ tuples are immutable, we can't modify the elements. But you can replace one\
    \ tuple with another.\nExample:\n\n```\n>>> t = ('a', 'b', 'c', 'd', 'e')\n>>>\
    \ t[0] = 'A'\nTypeError: object doesn't support item assignment\n\n>>> t = ('A',)\
    \ + t[1:]    #replacing element 'a' as 'A'\n>>> t    # Print t\n('A', 'b', 'c',\
    \ 'd', 'e')    # output as be followed and modification done in first element\n\
    ```\n\n### 7.4 Indexing, Slicing, and Matrixes\n\nBecause tuples are sequences,\
    \ indexing and slicing work the same way for tuples as they do for strings. Assuming\
    \ following input -\n\n```\nL = ('spam', 'Spam', 'SPAM!')\n```\n\n| Python Expression\
    \ | Results | Description |\n| :--- | :--- | :--- |\n| L[2] | 'SPAM!' | Offsets\
    \ start at zero |\n| L[-2] | 'Spam' | Negative: count from the right |\n| L[1:]\
    \ | ['Spam', 'SPAM!'] | Slicing fetches sections |\n\n## 8. OPERATORS & PRECEDENCE\
    \ OF OPERATORS\n\nPython Operators:\n\n### 8.1 Definition:\n\nOperators are special\
    \ symbols in Python that carry out arithmetic or logical computation. The value\
    \ that the operator operates on is called the operand.\n\nExample:\n\n```\n>>>\
    \ 2+3\n5\n```\n\nHere, + is the operator that performs addition. 2 and 3 are the\
    \ operands and 5 is the output of the operation.\n\n### 8.2 Types of Operator:\n\
    \n- Arithmetic Operators\n- Comparison (Relational) Operators\n- Logical (Boolean)\
    \ Operators\n- Assignment Operators\n- Bitwise Operators\n- Membership operators\n\
    - Identity operators\n- Unary operators\n- Boolean Operators\n\n### 8.2.1 Arithmetic\
    \ Operators\n\nArithmetic operators are used to perform mathematical operations\
    \ like addition, subtraction, multiplication etc.\n\n| Operator | Meaning | Example\
    \ |\n| :--- | :--- | :--- |\n| + | Add two operands or unary plus | x + y = 30\
    \ (x=20, y=10) |\n| - | Subtract right operand from the left or unary minus |\
    \ x - y = 10 |\n| * | Multiply two operands | x * y = 200 |\n| / | Divide left\
    \ operand by the right one (always results into float) | x / y = 2 |\n| % | Modulus\
    \ - remainder of the division of left operand by the right | x % y = 0 (remainder\
    \ of x/y) |\n| // | Floor division - division that results into whole number adjusted\
    \ to the left in the number line | (x=9, y=2) x//y=4; -11/3=-4 |\n| ** | Exponent\
    \ - left operand raised to the power of right | x**y (x to the power y) |\n\n\
    ### 8.2.2 Relational Operators / Comparison operators\n\nComparison operators\
    \ are used to compare values. It either returns True or False according to the\
    \ condition.\n\n| Operator | Meaning | Example |\n| :--- | :--- | :--- |\n| >\
    \ | Greater than - True if left operand is greater than the right | x > y, True\
    \ |\n| < | Less than - True if left operand is less than the right | x < y, False\
    \ |\n| == | Equal to - True if both operands are equal | x == y, False |\n| !=\
    \ | Not equal to - True if operands are not equal | x != y, True |\n| >= | Greater\
    \ than or equal to - True if left operand is greater than or equal to the right\
    \ | x >= y, False |\n| <= | Less than or equal to - True if left operand is less\
    \ than or equal to the right | x <= y, False |\n\n### 8.2.3 Logical (Boolean)\
    \ Operator\n\nLogical operators are the and, or, not operators. It is mainly used\
    \ to check the values which is true or false."
  mdcn: "`class` 是 Python 的**关键字**之一。解释器使用关键字来识别程序结构，它们不能用作变量名。\n\n**保留字：**\nPython\
    \ 拥有以下关键字：\n\n- False\n- class\n- finally\n- is\n- return\n- None\n- continue\n\
    - for\n- lambda\n- try\n- True\n- def\n- from\n- nonlocal\n- while\n- and\n- del\n\
    - global\n- not\n- with\n- as\n- elif\n- if\n- or\n- yield\n- assert\n- else\n\
    - import\n- pass\n- break\n- except\n- in\n- raise\n\n## 6. 表达式与语句\n\n**6.1**\
    \ **表达式**是值、变量和运算符的组合。一个单独的值本身就被视为一个表达式，变量也是如此，因此以下都是合法的表达式：\n\n```\n>>> 42\n\
    42        #打印值\n>>> n\n17        #获取 n 的值\n>>> n + 25    #将两个值相加\n42        #上述表达式的结果\n\
    ```\n\n当你在提示符处输入一个表达式时，解释器会**求值**它，这意味着它会计算出表达式的值。在这个例子中，`n` 的值是 17，`n + 25` 的值是\
    \ 42。\n\n对表达式求值与打印值并不完全相同。\n\n```\n>>> message = 'Hello, World!'\n>>> message\n\
    'Hello, World!'\n>>> print message\nHello, World!\n```\n\n当 Python 解释器显示表达式的值时，它使用与你输入值时相同的格式。对于字符串，这意味着它包含引号。但如果你使用\
    \ `print` 语句，Python 会显示字符串的内容而不带引号。\n\n**6.2 语句**是具有某种效果的代码单元，例如创建变量或显示值。\n\n\
    ```\n>>> n = 17\n>>> print(n)\n```\n\n第一行是一个赋值语句，它给 `n` 赋值。第二行是一个打印语句，它显示 `n`\
    \ 的值。\n当我们输入一个语句时，解释器会**执行**它，这意味着它会执行语句所要求的操作。通常，语句没有值。\n\n### Python 中的语句类型：\n\
    \n- **简单语句：** 简单语句包含在单个逻辑行中。多个简单语句可以出现在一行中，用分号分隔。\n\n简单语句的语法是：\n`Simple_stmt ::=\
    \ expression_stmt`\n\n- **表达式语句：** 表达式语句用于计算并写入一个值，或调用一个过程（一个不返回有意义结果的函数；在 Python\
    \ 中，过程返回值 `None`）。表达式语句的其他用法是允许的，并且偶尔有用。\n\n表达式语句的语法是：\n`expression_stmt ::= expression_list`\n\
    \n- **赋值语句：** 赋值语句用于（重新）将名称绑定到值，并修改可变对象的属性或元素：\n\n赋值语句的语法是：\n`assignment_stmt\
    \ ::= (target_list \"=\")+ (expression_list | yield_expression)`\n\n赋值语句对表达式列表求值（请记住，这可以是单个表达式或逗号分隔的列表，后者生成一个元组），并将单个结果对象从左到右分配给每个目标列表。\n\
    \n- **Pass 语句**：`pass` 是一个空操作——当它被执行时，什么也不会发生。当语法上需要一个语句但不需要执行任何代码时，它作为占位符很有用，例如：\n\
    \  `pass_stmt ::= \"pass\"`\n  `def f(arg): pass  # 一个（暂时）什么都不做的函数`\n  `class\
    \ C: pass  # 一个（暂时）没有方法的类`\n\n- **Del 语句**：删除目标列表会递归地从左到右删除每个目标。删除一个名称会从局部或全局命名空间中移除该名称的绑定，具体取决于该名称是否出现在同一代码块的\
    \ `global` 语句中。如果该名称未绑定，将引发 `NameError` 异常。\n\nDel 语句的语法是：\n`del_stmt ::= \"del\"\
    \ target_list`\n\n## 7. 元组赋值\n\n元组是不可变的 Python 对象的序列。元组是序列，就像列表一样。元组和列表之间的区别在于，元组不能像列表那样被更改，并且元组使用圆括号，而列表使用方括号。创建元组就像放置不同的逗号分隔值一样简单。你也可以选择将这些逗号分隔的值放在圆括号中。例如\
    \ –\n\n```\ntup1 = ('physics', 'chemistry', 1997, 2000);\ntup2 = (1, 2, 3, 4,\
    \ 5 );\ntup3 = \"a\", \"b\", \"c\", \"d\";\n```\n\n### 7.1 访问元组中的值\n\n要访问元组中的值，请使用方括号进行切片，并使用索引或索引范围来获取该索引处的值。例如\
    \ –\n\n```\ntup1 = ('physics', 'chemistry', 1997, 2000);\ntup2 = (1, 2, 3, 4,\
    \ 5, 6, 7 );\n\nprint \"tup1[0]: \", tup1[0]\nprint \"tup2[1:5]: \", tup2[1:5]\n\
    ```\n\n**输出：** 当执行上述代码时，会产生以下结果\n\n```\ntup1[0]: physics\ntup2[1:5]: [2, 3, 4,\
    \ 5]\n```\n\n### 7.2 删除元组元素\n\n无法删除单个元组元素。要显式删除整个元组，只需使用 **del** 语句。\n\n```\n\
    tup = ('physics', 'chemistry', 1997, 2000);\nprint tup\ndel tup;\nprint \"After\
    \ deleting tup : \"\nprint tup\n```\n\n这会产生以下结果。注意引发了一个异常，这是因为 **del tup** 之后元组不再存在。\n\
    \n### 7.3 修改元组元素\n\n因为元组是不可变的，所以我们不能修改元素。但你可以用另一个元组替换一个元组。\n示例：\n\n```\n>>> t\
    \ = ('a', 'b', 'c', 'd', 'e')\n>>> t[0] = 'A'\nTypeError: object doesn't support\
    \ item assignment\n\n>>> t = ('A',) + t[1:]    #将元素 'a' 替换为 'A'\n>>> t    # 打印\
    \ t\n('A', 'b', 'c', 'd', 'e')    # 输出如下，并且第一个元素已被修改\n```\n\n### 7.4 索引、切片和矩阵\n\
    \n因为元组是序列，所以索引和切片对元组的工作方式与对字符串相同。假设输入如下 -\n\n```\nL = ('spam', 'Spam', 'SPAM!')\n\
    ```\n\n| Python 表达式 | 结果 | 描述 |\n| :--- | :--- | :--- |\n| L[2] | 'SPAM!' | 偏移量从零开始\
    \ |\n| L[-2] | 'Spam' | 负数：从右边开始计数 |\n| L[1:] | ['Spam', 'SPAM!'] | 切片获取部分 |\n\
    \n## 8. 运算符与运算符优先级\n\nPython 运算符：\n\n### 8.1 定义：\n\n运算符是 Python 中执行算术或逻辑计算的特殊符号。运算符操作的值称为操作数。\n\
    \n示例：\n\n```\n>>> 2+3\n5\n```\n\n这里，`+` 是执行加法的运算符。`2` 和 `3` 是操作数，`5` 是运算的结果。\n\
    \n### 8.2 运算符类型：\n\n- 算术运算符\n- 比较（关系）运算符\n- 逻辑（布尔）运算符\n- 赋值运算符\n- 位运算符\n- 成员运算符\n\
    - 身份运算符\n- 一元运算符\n- 布尔运算符\n\n### 8.2.1 算术运算符\n\n算术运算符用于执行加法、减法、乘法等数学运算。\n\n| 运算符\
    \ | 含义 | 示例 |\n| :--- | :--- | :--- |\n| + | 两个操作数相加或一元加 | x + y = 30 (x=20, y=10)\
    \ |\n| - | 左操作数减去右操作数或一元减 | x - y = 10 |\n| * | 两个操作数相乘 | x * y = 200 |\n| / |\
    \ 左操作数除以右操作数（结果总是浮点数） | x / y = 2 |\n| % | 取模 - 左操作数除以右操作数的余数 | x % y = 0 (x/y\
    \ 的余数) |\n| // | 地板除 - 结果为整数的除法，在数轴上向左调整 | (x=9, y=2) x//y=4; -11/3=-4 |\n| **\
    \ | 指数 - 左操作数的右操作数次幂 | x**y (x 的 y 次幂) |\n\n### 8.2.2 关系运算符 / 比较运算符\n\n比较运算符用于比较值。它根据条件返回\
    \ True 或 False。\n\n| 运算符 | 含义 | 示例 |\n| :--- | :--- | :--- |\n| > | 大于 - 如果左操作数大于右操作数则为\
    \ True | x > y, True |\n| < | 小于 - 如果左操作数小于右操作数则为 True | x < y, False |\n| ==\
    \ | 等于 - 如果两个操作数相等则为 True | x == y, False |\n| != | 不等于 - 如果操作数不相等则为 True | x\
    \ != y, True |\n| >= | 大于或等于 - 如果左操作数大于或等于右操作数则为 True | x >= y, False |\n| <=\
