    \ 'xyz')\n```\n\n## 21.4 删除元组元素\n\n无法删除单个元组元素。当然，将不需要的元素排除在外，重新组合另一个元组是没问题的。\n\
    \n要显式删除整个元组，只需使用 **del** 语句。例如：\n\n```python\ntup = ('physics', 'chemistry', 1997,\
