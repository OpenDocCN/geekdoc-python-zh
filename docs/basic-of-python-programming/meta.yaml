    # 12.4.Flow of Execution:


    +   - To ensure that a function is defined before its first use, you have to know
    the order statements run in, which is called the **flow of execution**.

    - Execution always begins at the first statement of the program. Statements are
    run one at a time, in order from top to bottom.

    - Function definitions do not alter the flow of execution of the program, but
    remember that statements inside the function don''t run until the function is
    called.

    - A function call is like a detour in the flow of execution. Instead of going
    to the next statement, the flow jumps to the body of the function, runs the statements
    there, and then comes back to pick up where it left off.'
