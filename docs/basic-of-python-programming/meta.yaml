  mdcn: "## 16.5. 递归\n\n递归是一种编程或编码问题的方式，其中函数在其主体中一次或多次调用自身。通常，它会返回该函数调用的返回值。如果一个函数定义满足递归条件，我们称这个函数为递归函数。\n\
    \n**终止条件：**\n递归函数必须终止才能在程序中使用。如果每次递归调用都能使问题的解决方案缩小并朝着基本情况推进，那么递归函数就会终止。基本情况是指无需进一步递归即可解决问题的情况。如果调用中未满足基本情况，递归可能导致无限循环。\n\
    \n示例：\n4! = 4 * 3!\n3! = 3 * 2!\n2! = 2 * 1\n\n替换计算出的值，我们得到以下表达式\n4! = 4 * 3 *\
