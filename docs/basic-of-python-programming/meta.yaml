    \ <<, >> | Shift Operators | 6 << 3 |\n\n## Conditional Statements\n\n### 14.3.\
    \ SIMPLE IF\n\nA simple ‘if’ statement executes the statements only if the condition\
    \ is true. It executes a set of statements conditionally, based on the value of\
    \ a logical expression.\n\n**Syntax:**\n\n```\nIf expression:\n    Statement1\n\
    \    Statement2\n```\n\nWhen a Boolean expression is evaluated it produces either\
    \ a value of true or false. If the expression evaluates true the same amount of\
    \ indented statement(s) following is will be executed. This group of the statement(s)\
    \ is called a block.\n\n![](img/4aa708f460680cceb72f1a30f9e0d0fa_89_0.png)\n\n\
    ```\nExample program: To check given number is odd\nNum = int(input(\"Enter the\
    \ number\"))\nRem=Num%2\nif(Rem==1)\n    print(\"Entered Number is odd\")\nOutput:\n\
    Enter the Number 35\nEntered Number is odd\n```\n\n### IF ELSE\n\nA second form\
    \ of the if statement is “alternative execution” in which there are two possibilities\
    \ and the condition determines which one runs. The syntax looks like this:\n\n\
    ```\nif (condition):\n    Statement1\nelse:\n    Statement2\n```\n\nThe alternatives\
    \ are called branches, because they are branches in the flow of execution.\n\n\
    ![](img/4aa708f460680cceb72f1a30f9e0d0fa_90_0.png)\n\nExample program: To check\
    \ given number is positive or negative\n\n```\nNum = int(input(\"Enter the number\"\
    ))\nif(Num>0):\n    print(\"Entered number is positive\")\nelse:\n    print(\"\
    Entered Number is negative\")\n```\n\nOutput:\nEnter the Number 40\nEntered Number\
    \ is positive\nEnter the Number -50\nEntered Number is negative\n\n### CHAINED\
    \ CONDITIONAL\n\nSometimes there are more than two possibilities and we need more\
    \ than two branches. One way to express a computation like that is a chained conditional:\n\
    \nSyntax:\n\n```\nIf (condition):\n    Statement1\nelif (condition):\n    Statement2\n\
    elif (Condition):\n    Statement 3\nelse:\n    Statement4\n```\n\nElif is an abbreviation\
    \ of “else if”. Again exactly one branch will run. There is no limit on the number\
    \ of elif statements. If there is an else clause, it has to be at the end but\
    \ there doesn’t have to be one. Suppose if condition has to satisfy two or more\
    \ condition then we have to use ‘and’ operator to check the condition of both\
    \ the expressions.\n\n![](img/4aa708f460680cceb72f1a30f9e0d0fa_92_0.png)\n\nExample:\
    \ Grade allocation\n\n```\nm1,m2,m3=eval(input(\"Enter mark1,mark2, mark3 separated\
