    \ = [5,2,9]\nprocessList(aList)\n```\n\n# Function Arguments (Refer Unit-II)\n\
    \n## 16.3. SCOPE\n\nAll variables in a program may not be accessible at all locations\
    \ in that program. This depends on where you have declared a variable.\n\nThe\
    \ scope of a variable determines the portion of the program where you can access\
    \ a particular identifier. There are two basic scopes of variables in Python -\n\
    \n- Global variables – Variables defined outside have a global scope.\n- Local\
    \ variables - Variables that are defined inside a function body have a local scope.\n\
    \nThis means that local variables can be accessed only inside the function in\
