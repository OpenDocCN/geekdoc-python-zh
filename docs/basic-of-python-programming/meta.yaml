    ## 22. Python Dictionary\n\n### 22.1 Python Dictionary\n\nPython's dictionaries\
    \ are kind of hash table type. They work like associative arrays or hashes found\
    \ in Perl and consist of key-value pairs. A dictionary key can be almost any Python\
    \ type, but are usually numbers or strings. Values, on the other hand, can be\
    \ any arbitrary Python object.\n\nDictionaries are enclosed by **curly braces\
    \ ({ })** and values can be assigned and accessed using **square braces ([])**.\
    \ For example -\n\n```\ndict = {}\ndict['one'] = \"This is one\"\ndict[2]    =\
    \ \"This is two\"\ntinydict = {'name': 'john', 'code': 6734, 'dept': 'sales'}\n\
    print (dict['one'])     # Prints value for 'one' key\nprint (dict[2])        \
    \ # Prints value for 2 key\nprint (tinydict)        # Prints complete dictionary\n\
    print (tinydict.keys()) # Prints all the keys\nprint (tinydict.values()) # Prints\
    \ all the values\n```\n\nThis produce the following result -\n\n```\nThis is one\n\
    This is two\n{'dept': 'sales', 'code': 6734, 'name': 'john'}\n['dept', 'code',\
    \ 'name']\n['sales', 6734, 'john']\n```\n\nDictionaries have no concept of order\
    \ among elements. It is incorrect to say that the elements are \"out of order\"\
    ; they are simply unordered.\n\n### 22.2 Updating Dictionary\n\nYou can update\
    \ a dictionary by adding a new entry or a key-value pair, modifying an existing\
    \ entry, or deleting an existing entry as shown below in the simple example -\n\
    \n```\ndict = {'Name': 'Zara', 'Age': 7, 'Class': 'First'}\n\ndict['Age'] = 8;\
    \ # update existing entry\ndict['School'] = \"DPS School\"; # Add new entry\n\n\
    print \"dict['Age']: \", dict['Age']\nprint \"dict['School']: \", dict['School']\n\
    ```\n\nWhen the above code is executed, it produces the following result -\n\n\
    ```\ndict['Age']: 8\ndict['School']: DPS School\n```\n\n### 22.3 Delete Dictionary\
    \ Elements\n\nYou can either remove individual dictionary elements or clear the\
    \ entire contents of a dictionary. You can also delete entire dictionary in a\
    \ single operation.\n\nTo explicitly remove an entire dictionary, just use the\
    \ **del** statement. Following is a simple example -\n\n```\ndict = {'Name': 'Zara',\
    \ 'Age': 7, 'Class': 'First'}\n\ndel dict['Name']; # remove entry with key 'Name'\n\
    dict.clear();     # remove all entries in dict\ndel dict ;        # delete entire\
    \ dictionary\n\nprint \"dict['Age']: \", dict['Age']\n\nprint \"dict['School']:\
    \ \", dict['School']\n```\n\nThis produces the following result. Note that an\
    \ exception is raised because after **del dict** dictionary does not exist any\
    \ more -\n\n```\ndict['Age']:\nTraceback (most recent call last):\n  File \"test.py\"\
    , line 8, in <module>\n    print \"dict['Age']: \", dict['Age'];\nTypeError: 'type'\
    \ object is unsubscriptable\n```\n\n### 22.4 Properties of Dictionary Keys\n\n\
    Dictionary values have no restrictions. They can be any arbitrary Python object,\
    \ either standard objects or user-defined objects. However, same is not true for\
    \ the keys.\n\nThere are two important points to remember about dictionary keys\
    \ -\n\n- (a) More than one entry per key not allowed. Which means no duplicate\
    \ key is allowed. When duplicate keys encountered during assignment, the last\
    \ assignment wins. For example -\n\n```\ndict = {'Name': 'Zara', 'Age': 7, 'Name':\
    \ 'Manni'}\n\nprint \"dict['Name']: \", dict['Name']\n```\n\nWhen the above code\
    \ is executed, it produces the following result -\n\n```\ndict['Name']: Manni\n\
    ```\n\n- (b) Keys must be immutable. Which means you can use strings, numbers\
    \ or tuples as dictionary keys but something like ['key'] is not allowed. Following\
    \ is a simple example:\n\n```\ndict = {['Name']: 'Zara', 'Age': 7}\n\nprint \"\
    dict['Name']: \", dict['Name']\n```\n\nWhen the above code is executed, it produces\
    \ the following result -\n\n```\nTraceback (most recent call last):\n  File \"\
    test.py\", line 3, in <module>\n    dict = {['Name']: 'Zara', 'Age': 7};\nTypeError:\
    \ list objects are unhashable\n```\n\n### 22.5 Built-in Dictionary Functions &\
    \ Methods\n\nPython includes the following dictionary functions -\n\n| SN | Function\
    \ with Description |\n|---|---|\n| 1 | **cmp(dict1, dict2)**<br>Compares elements\
    \ of both dict. |\n| 2 | **len(dict)**<br>Gives the total length of the dictionary.<br>This\
    \ would be equal to the number of items in the dictionary. |\n| 3 | **str(dict)**<br>Produces\
    \ a printable string representation of a dictionary |\n| 4 | **type(variable)**<br>Returns\
    \ the type of the passed variable.<br>If passed variable is dictionary, then it\
    \ would return a dictionary type. |\n\nPython includes following dictionary methods\
    \ -\n\n| SN | Methods with Description |\n|---|---|\n| 1 | **dict.clear()**<br>Removes\
    \ all elements of dictionary *dict* |\n| 2 | **dict.copy()**<br>Returns a shallow\
    \ copy of dictionary *dict* |\n| 3 | **dict.fromkeys()**<br>Create a new dictionary\
    \ with keys from seq and values set to value. |\n| 4 | **dict.get(key, default=None)**<br>For\
    \ key key, returns value or default if key not in dictionary |\n| 5 | **dict.has_key(key)**<br>Returns\
    \ true if key in dictionary dict, false otherwise |\n| 6 | **dict.items()**<br>Returns\
    \ a list of dict's (key, value) tuple pairs |\n| 7 | **dict.keys()**<br>Returns\
    \ list of dictionary dict's keys |\n| 8 | **dict.setdefault(key, default=None)**<br>Similar\
    \ to get(), but will set dict[key]=default if key is not already in dict |\n|\
    \ 9 | **dict.update(dict2)**<br>Adds dictionary dict2's key-values pairs to dict\
