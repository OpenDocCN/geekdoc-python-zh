    # And This Book is Dedicated to Millions of Peoples who love programming and who
    motivate themselves


    # INTRODUCTION


    Python is a high-level, versatile, and easy-to-learn programming language known
    for its simplicity and readability. It was created by Guido van Rossum and first
    released in 1991. Python is widely used for various applications, including web
    development, data analysis, scientific computing, automation, artificial intelligence,
    and more.


    Here''s a brief introduction to some key aspects of Python:


    **Readability:** Python''s syntax is designed to be clear and readable, making
    it an excellent choice for beginners and experienced programmers. It uses indentation
    (whitespace) to define code blocks, which enforces clean and consistent formatting.


    **Interpreted Language:** Python is an interpreted language, which means you can
    write and run code without the need for a separate compilation step. This makes
    development faster and more flexible.


    **Dynamically Typed:** Python uses dynamic typing, meaning you don''t need to
    declare the data type of a variable explicitly. The type is determined at runtime,
    making the language more flexible.


    **High-Level Language:** Python provides high-level abstractions that simplify
    complex tasks. This can help you write code more quickly and with fewer errors.


    **Large Standard Library:** Python comes with a comprehensive standard library
    that includes modules for various tasks, such as working with files, regular expressions,
    network communication, and more. This library reduces the need to write custom
    code for many common tasks.


    # TABLE OF CONTENT


    | S.No | Content | Page No |

    |---|---|---|

    | 1. | Title Page | 1 |

    | 2. | Copyright | 2 |

    | 3. | Epigraph | 3 |

    | 4. | Dedication | 4 |

    | 5. | Introduction | 5 |

    | 6. | Chapter 1 | 6 |

    | 7. | Chapter 2 | 37 |

    | 8. | Chapter 3 | 56 |


    # CHAPTER I - DATA, EXPRESSIONS, STATEMENTS


    Python interpreter and interactive mode; values and types: int, float, boolean,
    string, and list; variables, expressions, statements, tuple assignment, precedence
    of operators, comments; modules and functions, function definition and use, flow
    of execution, parameters and arguments; Illustrative programs: exchange the values
    of two variables, circulate the values of n variables, distance between two points.


    # What is a program?


    A **program** is a sequence of instructions that specifies how to perform a computation.
    The computation might be something mathematical, such as solving a system of equations
    or finding the roots of a polynomial, but it can also be a symbolic computation,
    such as searching and replacing text in a document or something graphical, like
    processing an image or playing a video.


    The details look different in different languages, but a few basic instructions
    appear in just about every language:


    **input:** Get data from the keyboard, a file, the network, or some other device.


    **output:** Display data on the screen, save it in a file, send it over the network,
    etc.


    **math:** Perform basic mathematical operations like addition and multiplication.


    **conditional execution:** Check for certain conditions and run the appropriate
    code.


    # Running Python:


    One of the challenges of getting started with Python is that you might have to
    install Python and related software on your computer. If you are familiar with
    your operating system, and especially if you are comfortable with the command-line
    interface, you will have no trouble installing Python. There are two versions
    of Python, called Python 2 and Python 3.


    # Topic: 1 PYTHON INTERPRETER AND INTERACTIVE MODE


    ## 1.1 Python Interpreter:


    The Python **interpreter** is a program that reads and executes Python code. Depending
    on your environment, you might start the interpreter by clicking on an icon, or
    by typing python on a command line. When it starts, you should see output like
    this:


    ```

    Python 3.4.0 (default, Jun 19 2015, 14:20:21)

    [GCC 4.8.2] on linux

    Type "help", "copyright", "credits" or "license" for more information.

    ```


    The first three lines contain information about the interpreter and the operating
    system it''s running on.


    The last line is a **prompt** that indicates that the interpreter is ready for
    you to enter code. If you type a line of code and hit Enter, the interpreter displays
    the result:


    ```

    >>> 1 + 1

    2

    ```


    The interpreter operates somewhat like the Unix shell: when called with standard
    input connected to a tty device, it reads and executes commands interactively;
    when called with a file name argument or with a file as standard input, it reads
    and executes a *script* from that file.


    A second way of starting the interpreter is `python -c command [arg] ...`, which
    executes the statement(s) in *command*, analogous to the shell''s `-c` option.
    Since Python statements often contain spaces or other characters that are special
    to the shell, it is usually advised to quote *command* in its entirety with single
    quotes.


    ## 1.2 Python Interactive Mode:


    Interactive mode is a command line shell which gives immediate feedback for each
    statement, while running previously fed statements in active memory. As new lines
    are fed into the interpreter, the fed program is evaluated both in part and in
    whole.


    Interactive mode is a good way to play around and try variations on syntax.


    On macOS or linux, open a terminal and simply type "python". On Windows, bring
    up the command prompt and type "py", or start an interactive Python session by
    selecting "Python (command line)", "IDLE", or similar program from the task bar
    / app menu. IDLE is a GUI which includes both an interactive mode and options
    to edit and run files.


    - The `>>>` is Python''s way of telling you that you are in interactive mode.

    - In interactive mode what you type is immediately run.


    Example interactive session:


    ```

    >>> 5

    5

    >>> print(5*7)

    35

    >>> "hello" * 4

    ''hello hello hello hello''

    >>> "hello".__class__

    <type ''str''>

    ```


    Instead of Python exiting when the program is finished, you can use the `-i` flag
    to start an interactive session. This can be very useful for debugging and prototyping.


    ```

    python -i hello.py

    ```


    To start Python''s interactive help, type "help()" at the prompt.


    ```

    >>> help()

    ```


    You will be presented with a greeting and a quick introduction to the help system.
    Notice that the prompt will change from ">>>" (three right angle brackets) to
    "help>". You can access the different portions of help simply by typing in modules,
    keywords, or topics. You can obtain help on a given topic simply by adding a string
    in quotes, such as help("object").


    ```

    >>> help("string")

    ```


    # Topic 2: VALUES AND TYPES


    **Value:** One of the basic units of data, like a number or string, that a program
    manipulates.


    **Identifier:** Python identifier is a name given to a function, class, variable,
    module, or other objects used in program. (uses letters both uppercase, lowercase,
    digits)


    **Keywords:** are reserved words that have standard and predefined meaning in
    python language. These cannot be changed and are the basic blocks for program
    statements.'
