    ## 13. ILLUSTRATIVE PROBLEMS\n\n### 1. Exchange The Values of Two Variables\n\n\
    **Description:**\n\nThe problem is simple. We have to read two variables. Using\
    \ a temporary variable, We can swap the two variable values. The value of first\
    \ variable is to be copied to a temporary variable, then the second variable can\
    \ be copied to first variable. Now the temporary variable can be copied in to\
    \ the second variable. Hence, both the variable are swapped.\n\n**Algorithm:**\n\
    \n- Step 1: Start\n- Step 2: Read the elements x,y\n- Step 3: Copy value of x\
    \ to temp\n- Step 4: Copy value of y to x\n- Step 5: Copy value of Temp to y\n\
    - Step 6: Stop\n\n**Example:**\n\nConsider two variable X=10,Y=20\n\n```\n1. temp=x\
    \  #temp is 10\n2. x=y     #now, x is 20\n3. y=temp  #y is 10\n```\n\nThus the\
    \ values of variable are swapped.\n\n**Procedure in python:**\n\n```python\nx=int(input(\"\
    Enter the Values for X:\"))\ny=int(input(\"Enter the values for Y:\"))\ntemp =\
    \ x\nx = y\ny = temp\nprint(' The value of x after swapping:{}'.format(x))\nprint('\
    \ The value of y after swapping:{}'.format(y))\n```\n\n**Output:**\n\n```\nEnter\
    \ the Values for X: 7\nEnter the values for Y: 10\nThe value of x after swapping:10\n\
