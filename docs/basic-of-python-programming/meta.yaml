    ### 3.3 连接变量


    你可以将不同的数据类型如字符串和数字连接在一起。例如，我们将 `python` 与数字 `99` 连接。一旦整数被声明为字符串，它就可以连接 `python`
    + **str("99")** = `python99` 在输出中。


    ```

    a="python"

    b = 99

    print a+str(b)

    ```


    ## 4 局部变量和全局变量


    ### 4.1 局部变量：


    在 Python 中，在特定函数或方法中声明的变量称为局部变量


    ### 4.2 全局变量：


    在 Python 中，全局声明的变量，如果我们想在程序的其余部分使用相同的变量，则称为全局变量


