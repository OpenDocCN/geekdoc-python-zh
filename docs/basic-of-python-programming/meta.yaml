    \ List Mutability\n\n```python\n# List Mutable Example\nColors_List = [\"red\"\
    , \"green\", \"blue\", \"purple\"]\nprint(\"Original List:\", Colors_List)\nColors_List[0]\
    \ = \"pink\"\nColors_List[-2] = \"orange\"\nprint(Colors_List)\n```\n\nOutput:\n\
    ```\nOriginal List: ['red', 'green', 'blue', 'purple']\n['pink', 'green', 'orange',\
    \ 'purple']\n```\n\n## 20.9 Aliasing\n\nSame object or list being referenced by\
    \ two variables means aliasing. For example list Nos_List is referenced by another\
    \ variable temp_list. Changes made in temp_list will be reflected in Nos_List\
    \ too. It is safer to avoid aliasing when you are working with mutable objects.\n\
    \n## Example for List Aliasing\n\n```python\n# List Aliasing Example\nNos_List\
    \ = [1, 2, 3, 4]\n# temp_list is Alias\nTemp_list = Nos_List\nprint(\"temp_list:\
    \ \", Temp_list)\n\n# Alias changed will change original too\nTemp_list.append(5)\n\
    print(\"Nos_List after change in temp: \", Nos_List)\n```\n\nOutput:\n```\ntemp_list:\
    \ [1, 2, 3, 4]\nNos_List after change in temp: [1, 2, 3, 4, 5]\n```\n\n## 20.10\
    \ Cloning Lists\n\nCloning creates a new list with same values under another name.\
    \ Taking any slice of a list creates a new list.\n\n## Example for List Cloning\n\
    \n```python\n# List Cloning Example\nFruits = [\"apples\", \"pear\", \"grapes\"\
    , \"orange\", \"mango\"]\n# Aliasing list gives it another name\nFruit_List =\
    \ Fruits\n# Copying a complete slice CLONES and creates a new list\nCloneFruit\
    \ = Fruit_List[:]\n\n# Does not affect original list\nCloneFruit.append(\"Banana\"\
    )\n\n# Affects the original list\nFruit_List[1] = \"Lemon\"\n\nprint(\"Original\
    \ list:\", Fruits)\nprint(\"Alias List:\", Fruit_List)\nprint(\"Clone List:\"\
    , CloneFruit)\n```\n\nOutput:\n```\nOriginal list: ['apples', 'Lemon', 'grapes',\
    \ 'orange', 'mango']\nAlias List: ['apples', 'Lemon', 'grapes', 'orange', 'mango']\n\
    Clone List: ['apples', 'pear', 'grapes', 'orange', 'mango', 'Banana']\n```\n\n\
    ## 20.11 List Parameters\n\nLists can be passed as arguments to functions. The\
    \ list arguments are always passed by reference only. Hence changes made to list\
    \ in the scope of function are permanent and visible outside the function block\
    \ too.\n\n## Example for List Parameters\n\n```python\n# List parameters in Python\n\
    # function to add element at the end\ndef push(stack, No, Top):\n    stack.append(No)\n\
    \    Top = Top + 1\n    return\n\n# Function to remove and get element at the\
    \ end\ndef pop():\n    return Nos_Stack.pop()\n\nNos_Stack = []\nTop = 0\n\npush(Nos_Stack,\
    \ 10, Top)\npush(Nos_Stack, 13, Top)\npush(Nos_Stack, 89, Top)\npush(Nos_Stack,\
    \ -9, Top)\n\nprint(\"Nos_Stack after pushes : \", Nos_Stack)\nTop = Top - 1\n\
    \n# Removing recent element\ntop_item = pop()\nprint(\"Nos_Stack after pop: \"\
    , Nos_Stack)\n```\n\nOutput:\n```\nNos_Stack after pushes : [10, 13, 89, -9]\n\
    Nos_Stack after pop: [10, 13, 89]\n```\n\n## 21. Python Tuples\n\n## 21.1 Python\
    \ Tuples\n\nA tuple is another sequence data type that is similar to the list.\
    \ A tuple consists of a number of values separated by commas. Unlike lists, however,\
    \ tuples are **enclosed within parentheses**.\n\n**The main differences between\
    \ lists and tuples are:**\n\nLists are enclosed in brackets ( [ ] ) and their\
    \ elements and size can be changed, while tuples are enclosed in parentheses (\
    \ ( ) ) and cannot be updated.\n\nTuples can be thought of as **read-only** lists.\
    \ For example -\n\n```python\ntuple = ('abcd', 786, 2.23, 'john', 70.2)\ntinytuple\
    \ = (123, 'john')\n\nprint(tuple)          # Prints complete tuple\nprint(tuple[0])\
    \       # Prints first element of the tuple\nprint(tuple[1:3])     # Prints elements\
    \ starting from 2nd till 3rd\nprint(tuple[2:])      # Prints elements starting\
    \ from 3rd element\nprint(tinytuple * 2)  # Prints tuple two times\nprint(tuple\
    \ + tinytuple) # Prints concatenated tuple\n```\n\nThis produces the following\
    \ result -\n\n```\n('abcd', 786, 2.23, 'john', 70.200000000000003)\nabcd\n(786,\
    \ 2.23)\n(2.23, 'john', 70.200000000000003)\n(123, 'john', 123, 'john')\n('abcd',\
    \ 786, 2.23, 'john', 70.200000000000003, 123, 'john')\n```\n\nThe following code\
    \ is invalid with tuple, because we attempted to update a tuple, which is not\
    \ allowed. Similar case is possible with lists -\n\n```python\ntuple = ('abcd',\
    \ 786, 2.23, 'john', 70.2)\nlist = ['abcd', 786, 2.23, 'john', 70.2]\ntuple[2]\
    \ = 1000  # Invalid syntax with tuple\nlist[2] = 1000   # Valid syntax with list\n\
    ```\n\n## 21.2 Accessing Values in Tuples\n\nTo access values in tuple, use the\
    \ square brackets for slicing along with the index or indices to obtain value\
    \ available at that index. For example -\n\n```python\ntup1 = ('physics', 'chemistry',\
    \ 1997, 2000)\ntup2 = (1, 2, 3, 4, 5, 6, 7)\n\nprint(\"tup1[0]: \", tup1[0])\n\
    print(\"tup2[1:5]: \", tup2[1:5])\n```\n\nWhen the above code is executed, it\
    \ produces the following result -\n\n```\ntup1[0]: physics\ntup2[1:5]: [2, 3,\
    \ 4, 5]\n```\n\n## 21.3 Updating Tuples\n\nTuples are immutable which means you\
    \ cannot update or change the values of tuple elements. You are able to take portions\
    \ of existing tuples to create new tuples as the following example demonstrates\
    \ -\n\n```python\ntup1 = (12, 34.56)\ntup2 = ('abc', 'xyz')\n\n# Following action\
    \ is not valid for tuples\n# tup1[0] = 100;\n\n# So let's create a new tuple as\
    \ follows\ntup3 = tup1 + tup2\nprint(tup3)\n```\n\nWhen the above code is executed,\
    \ it produces the following result -\n\n```\n(12, 34.56, 'abc', 'xyz')\n```\n\n\
    ## 21.4 Delete Tuple Elements\n\nRemoving individual tuple elements is not possible.\
    \ There is, of course, nothing wrong with putting together another tuple with\
    \ the undesired elements discarded.\n\nTo explicitly remove an entire tuple, just\
    \ use the **del** statement. For example:\n\n```python\ntup = ('physics', 'chemistry',\
    \ 1997, 2000)\n\nprint(tup)\ndel tup\nprint(\"After deleting tup : \")\nprint(tup)\n\
    ```\n\nThis produces the following result. Note an exception raised, this is because\
    \ after **del tup** tuple does not exist any more -\n\n```\n('physics', 'chemistry',\
    \ 1997, 2000)\nAfter deleting tup :\nTraceback (most recent call last):\n  File\
    \ \"test.py\", line 9, in <module>\n    print(tup)\nNameError: name 'tup' is not\
    \ defined\n```\n\n## 21.5 Basic Tuples Operations\n\nTuples respond to the + and\
    \ * operators much like strings; they mean concatenation and repetition here too,\
    \ except that the result is a new tuple, not a string.\n\nIn fact, tuples respond\
    \ to all of the general sequence operations we used on strings in the prior chapter\
    \ –\n\n| Python Expression | Results | Description |\n| :--- | :--- | :--- |\n\
    | len((1, 2, 3)) | 3 | Length |\n| (1, 2, 3) + (4, 5, 6) | (1, 2, 3, 4, 5, 6)\
    \ | Concatenation |\n| ('Hi!',) * 4 | ('Hi!', 'Hi!', 'Hi!', 'Hi!') | Repetition\
    \ |\n| 3 in (1, 2, 3) | True | Membership |\n| for x in (1, 2, 3): print(x) |\
    \ 1 2 3 | Iteration |\n\n## 21.6 Indexing, Slicing, and Matrixes\n\nBecause tuples\
    \ are sequences, indexing and slicing work the same way for tuples as they do\
    \ for strings. Assuming following input -\n\n```python\nL = ('spam', 'Spam', 'SPAM!')\n\
    ```\n\n| Python Expression | Results | Description |\n| :--- | :--- | :--- |\n\
    | L[2] | 'SPAM!' | Offsets start at zero |\n| L[-2] | 'Spam' | Negative: count\
    \ from the right |\n| L[1:] | ['Spam', 'SPAM!'] | Slicing fetches sections |\n\
    \n## 21.7 Built-in Tuple Functions\n\nPython includes the following tuple functions\
    \ -\n\n| SN | Function with Description |\n|---|---|\n| 1 | **cmp(tuple1, tuple2)**<br>Compares\
    \ elements of both tuples. |\n| 2 | **len(tuple)**<br>Gives the total length of\
    \ the tuple. |\n| 3 | **max(tuple)**<br>Returns item from the tuple with max value.\
    \ |\n| 4 | **min(tuple)**<br>Returns item from the tuple with min value. |\n|\
    \ 5 | **tuple(seq)**<br>Converts a list into tuple. |"
