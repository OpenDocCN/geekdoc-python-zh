    \ 的 y 次幂 |\n| 7. | Python getattr() | 返回对象的命名属性值 |\n\n## 示例\n\n```python\n# 随机整数\n\
    integer = -20\nprint('Absolute value of -20 is:', abs(integer))\n\n# 随机浮点数\nfloating\
