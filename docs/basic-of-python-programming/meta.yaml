    -   Python 中的每个值都有一个数据类型。Python 中不同的数据类型有数字、列表、元组、字符串、字典等。变量可以用任何名称甚至字母如 a、aa、abc
    等来声明。

    -   变量即使在声明一次后也可以重新声明

    -   在 Python 中，你不能直接将字符串与数字连接，你需要将它们声明为单独的变量，然后才能将数字与字符串连接

    -   要删除变量，使用关键字 `del`


    ### 3.1. 如何声明和使用变量


    我们将声明变量 `a` 并打印它


    ```

    a=100

    print a

    ```


    变量的输出应该是 `100`


