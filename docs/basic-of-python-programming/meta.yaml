- md: "## 16.5. RECURSION\n\nRecursion is a way of programming or coding a problem,\
    \ in which a function calls itself one or more times in its body. Usually, it\
    \ is returning the return value of this function call. If a function definition\
    \ fulfils the condition of recursion, we call this function a recursive function.\n\
    \n**Termination condition:**\nA recursive function has to terminate to be used\
    \ in a program. A recursive function terminates, if with every recursive call\
    \ the solution of the problem is downsized and moves towards a base case. A base\
    \ case is a case, where the problem can be solved without further recursion. A\
    \ recursion can lead to an infinite loop, if the base case is not met in the calls.\n\
    \nExample:\n4! = 4 * 3!\n3! = 3 * 2!\n2! = 2 * 1\n\nReplacing the calculated values\
    \ gives us the following expression\n4! = 4 * 3 * 2 * 1\n\n```python\ndef factorial(n):\n\
    \    print(\"factorial has been called with n = \" + str(n))\n    if n == 1:\n\
    \        return 1\n    else:\n        res = n * factorial(n-1)\n        print(\"\
    intermediate result for \", n, \" * factorial(\",n-1, \"): \",res)\n        return\
    \ res\nprint(factorial(5))\n```\n\nThis Python script outputs the following results:\n\
    factorial has been called with n = 5\nfactorial has been called with n = 4\nfactorial\
