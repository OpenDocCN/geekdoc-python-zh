    we call this function a recursive function.


    **Terminationcondition:**

    A recursive function has to terminate to be used in a program. A recursive function
    terminates, if with every recursive call the solution of the problem is downsized
    and moves towards a base case. A base case is a case, where the problem can be
    solved without further recursion. A recursion can lead to an infinite loop, if
    the base case is not met in the calls.


    Example:

    4! = 4 * 3!

    3! = 3 * 2!

    2! = 2 * 1'
