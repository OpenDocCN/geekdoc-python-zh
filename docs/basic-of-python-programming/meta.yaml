- md: "## 12.2.2 Python Built-in Function\n\nThe Python interpreter has a number of\
    \ functions that are always available for use. These functions are called built-in\
    \ functions. For example, print() function prints the given object to the standard\
    \ output device (screen) or to the text stream file. In Python there are 68 built-in\
    \ functions. Some of them are listed below.\n\n| S.No | Method | Description |\n\
    |---|---|---|\n| 1. | Python abs() | returns absolute value of a number |\n| 2.\
    \ | Python ascii() | Returns String Containing Printable Representation |\n| 3.\
    \ | Python bool() | Converts a Value to Boolean |\n| 4. | Python input() | reads\
    \ and returns a line of string |\n| 5. | Python print() | Prints the Given Object\
    \ |\n| 6. | Python pow() | returns x to the power of y |\n| 7. | Python getattr()\
    \ | returns value of named attribute of an object |\n\n## Example\n\n```python\n\
    # random integer\ninteger = -20\nprint('Absolute value of -20 is:', abs(integer))\n\
    \n# random floating number\nfloating = -30.33\nprint('Absolute value of -30.33\
    \ is:', abs(floating))\n```\n\n## Output\n\nAbsolute value of -20 is: 20\nAbsolute\
    \ value of -30.33 is: 30.33\n\nHere abs is a built-in function which prints the\
    \ absolute value for the given number.\n\n## 12.3 Function Definition and Use\n\
    \nYou can define functions to provide the required functionality. Here are simple\
    \ rules to define a function in Python.\n\n- Function blocks begin with the keyword\
    \ def followed by the function name and parentheses (( )).\n- Any input parameters\
    \ or arguments should be placed within these parentheses. You can also define\
    \ parameters inside these parentheses.\n- The first statement of a function can\
    \ be an optional statement - the documentation string of the function or docstring.\n\
    - The code block within every function starts with a colon (:) and is indented.\n\
    - The statement return [expression] exits a function, optionally passing back\
    \ an expression to the caller. A return statement with no arguments is the same\
    \ as return None.\n\n## Syntax\n\n```python\ndef functionname( parameters ):\n\
    \    \"function_docstring\"\n    function_suite\n    return [expression]\n```\n\
    \n## 12.3.1 Adding a New Function\n\nA function definition specifies the name\
    \ of a new function and the sequence of statements that run when the function\
    \ is called. Here is an example:\n\n```python\ndef print_lyrics():\n    print(\"\
    I'm a lumberjack, and I'm okay.\")\n    print(\"I sleep all night and I work all\
    \ day.\")\n```\n\ndef is a keyword that indicates that this is a function definition.\
    \ The name of the function is print_lyrics. The rules for function names are the\
    \ same as for variable names: letters, numbers and underscore are legal, but the\
    \ first character can't be a number. You can't use a keyword as the name of a\
    \ function, and you should avoid having a variable and a function with the same\
    \ name.\n\nThe empty parentheses after the name indicate that this function doesn't\
    \ take any arguments.\n\nThe first line of the function definition is called the\
    \ header; the rest is called the body. The header has to end with a colon and\
    \ the body has to be indented. By convention, indentation is always four spaces.\
    \ The body can contain any number of statements.\n\nThe strings in the print statements\
    \ are enclosed in double quotes. Single quotes and double quotes do the same thing;\
    \ most people use single quotes except in cases like this where a single quote\
    \ (which is also an apostrophe) appears in the string.\n\n## 12.4 Flow of Execution\n\
    \n- To ensure that a function is defined before its first use, you have to know\
    \ the order statements run in, which is called the **flow of execution**.\n- Execution\
    \ always begins at the first statement of the program. Statements are run one\
    \ at a time, in order from top to bottom.\n- Function definitions do not alter\
    \ the flow of execution of the program, but remember that statements inside the\
    \ function don't run until the function is called.\n- A function call is like\
    \ a detour in the flow of execution. Instead of going to the next statement, the\
    \ flow jumps to the body of the function, runs the statements there, and then\
    \ comes back to pick up where it left off.\n- Python is good at keeping track\
    \ of where it is, so each time a function completes, the program picks up where\
    \ it left off in the function that called it. When it gets to the end of the program,\
    \ it terminates.\n- When you read a program, you don't always want to read from\
    \ top to bottom. Sometimes it makes more sense if you follow the flow of execution.\n\
    \n## Example Program for Flow of Execution\n\n```python\n1. def pow(b, p):\n2.\
    \   y = b ** p\n3.   return y\n4.\n5. def square(x):\n6.   a = pow(x, 2)\n7. \
    \  return a\n8.\n9. n = 5\n10. result = square(n)\n11. print(result)\n```\n\n\
    **Output: 25**\n\nFlow of execution of above program:\nExecution are denoted by\
    \ line 1, 5, 9, 10, 5, 6, 1, 2, 3, 6, 7, 10, 11.\n\n## 12.5 Parameters and Arguments\n\
    \nA function can take parameters which are just values you supply to the function\
    \ so that the function can do something utilizing those values. These parameters\
    \ are just like variables except that the values of these variables are defined\
    \ when we call the function and are not assigned values within the function itself.\n\
    \nParameters are specified within the pair of parentheses in the function definition,\
    \ separated by commas. When we call the function, we supply the values in the\
    \ same way. Note the terminology used - the names given in the function definition\
    \ are called parameters whereas the values you supply in the function call are\
    \ called arguments.\n\nInside the function, the arguments are assigned to variables\
    \ called parameters. Here is a definition for a function that takes an argument:\n\
    \n```python\ndef print_twice(bruce):\n    print(bruce)\n    print(bruce)\n```\n\
    \nThis function assigns the argument to a parameter named bruce. When the function\
    \ is called, it prints the value of the parameter (whatever it is) twice.\n\n\
    This function works with any value that can be printed.\n\n```python\n>>> print_twice('Spam')\n\
    Spam\nSpam\n>>> print_twice(42)\n42\n42\n>>> print_twice(math.pi)\n3.14159265359\n\
    3.14159265359\n```\n\nThe same rules of composition that apply to built-in functions\
    \ also apply to programmer defined functions, so we can use any kind of expression\
    \ as an argument for print_twice:\n\n```python\n>>> print_twice('Spam '*4)\nSpam\
    \ Spam Spam Spam\nSpam Spam Spam Spam\n>>> print_twice(math.cos(math.pi))\n-1.0\n\
    -1.0\n```\n\nThe argument is evaluated before the function is called, so in the\
    \ examples the expressions 'Spam '*4 and math.cos(math.pi) are only evaluated\
    \ once.\n\n## 12.5.1 Function Arguments\n\nYou can call a function by using the\
    \ following types of formal arguments:\n\n- Required arguments\n- Keyword arguments\n\
    - Default arguments\n- Variable-length arguments\n\n## Required Arguments\n\n\
    Required arguments are the arguments passed to a function in correct positional\
    \ order. Here, the number of arguments in the function call should match exactly\
    \ with the function definition.\n\nTo call the function printme(), you definitely\
    \ need to pass one argument, otherwise it gives a syntax error as follows.\n\n\
    ## Example\n\n```python\n#!/usr/bin/python3\n# Function definition is here\ndef\
    \ printme( str ):\n    \"This prints a passed string into this function\"\n  \
    \  print (str)\n    return\n\n# Now you can call printme function\nprintme()\n\
    ```\n\nWhen the above code is executed, it produces the following result:\n\n\
    ```\nTraceback (most recent call last):\n  File \"test.py\", line 11, in <module>\n\
    \    printme();\nTypeError: printme() takes exactly 1 argument (0 given)\n```\n\
    \n## Keyword Arguments\n\nKeyword arguments are related to the function calls.\
    \ When you use keyword arguments in a function call, the caller identifies the\
    \ arguments by the parameter name.\n\nThis allows you to skip arguments or place\
    \ them out of order because the Python interpreter is able to use the keywords\
    \ provided to match the values with parameters. You can also make keyword calls\
    \ to the printme() function in the following ways.\n\n## Example\n\n```python\n\
    #!/usr/bin/python3\n\n# Function definition is here\ndef printinfo( name, age\
    \ ):\n    \"This prints a passed info into this function\"\n    print (\"Name:\
    \ \", name)\n    print (\"Age \", age)\n    return\n\n# Now you can call printinfo\
    \ function\nprintinfo( age = 50, name = \"miki\" )\n```\n\nWhen the above code\
    \ is executed, it produces the following result:\n\n```\nName: miki\nAge 50\n\
    ```\n\n## Default Arguments"
