    \ Trace the following:\n\n```\ndef processNumber(x):\n    x=72\n    return x+3\n\
    # main\ny=54\nres = processNumber(y)\n```\n\n- **Pass-by-Reference** parameter\
    \ passing-- a *reference* to the actual parameter is sent to the function. When\
