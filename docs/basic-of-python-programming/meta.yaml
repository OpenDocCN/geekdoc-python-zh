    Average=\",avg)\nif(avg>=90):\n    print(\"Grade=O\")\nelif(avg>=80):\n    print(\"\
    Grade=A\")\nelif(avg>=70):\n    print(\"Grade=B\")\nelif(avg>=60):\n    print(\"\
    Grade=C\")\nelse:\n    print(\"Fail\")\n```\n\nOutput\nEnter mark1, mark2,mark3\
    \ separated by comma: 50,60,70\nTotal=180\nAverage=60.0\nGrade=C\n\n### NESTED\
    \ CONDITIONAL\n\nOne conditional can also be nested within another. We could have\
    \ written the example in the previous section like this:\n\n```\nif x == y:\n\
    \    print('x and y are equal')\nelse: if x < y:\n    print('x is less than y')\n\
    else:\n    print('x is greater than y')\n```\n\nThe outer conditional contains\
    \ two branches. The first branch contains a simple statement. The second branch\
    \ contains another if statement, which has two branches of its own. Those two\
    \ branches are both simple statements, although they could have been conditional\
    \ statements as well. Although the indentation of the statements makes the structure\
    \ apparent, nested conditionals become difficult to read very quickly.\n\nLogical\
    \ operators often provide a way to simplify nested conditional statements. For\
    \ example, we can rewrite the following code using a single conditional:\n\n```\n\
    if 0 < x:\n    if x < 10:\n        print('x is a positive single-digit number.')\n\
    ```\n\nThe print statement runs only if we make it past both conditionals, so\
    \ we can get the same effect with the and operator:\n\n```\nif 0 < x and x < 10:\n\
    \    print('x is a positive single-digit number.')\n```\n\n## 15. ITERATIONS /\
    \ LOOPING / REPETITIVE STATEMENTS\n\nMany algorithms make it necessary for a programming\
    \ language to have a construct which makes it possible to carry out a sequence\
    \ of statements repeatedly. The code within the loop, i.e. the code carried out\
    \ repeatedly is called the body of the loop.\n\nPython supplies two different\
    \ kinds of loops:\n\n- the while loop and\n- the for loop.\n\n### 15.1. while\n\
    \nA **while** loop statement in Python programming language repeatedly executes\
    \ a target statement as long as a given condition is true.\n\nThe syntax of a\
    \ **while** loop in Python programming language is -\n\n```\nwhile expression:\n\
    \    statement(s)\n```\n\nHere, **statement(s)** may be a single statement or\
    \ a block of statements. The **condition** may be any expression, and true is\
    \ any non-zero value. The loop iterates while the condition is true. When the\
    \ condition becomes false, program control passes to the line immediately following\
    \ the loop.\n\nIn Python, all the statements indented by the same number of character\
    \ spaces after a programming construct are considered to be part of a single block\
    \ of code. Python uses indentation as its method of grouping statements.\n\n![](img/4aa708f460680cceb72f1a30f9e0d0fa_96_0.png)\n\
    \nHere, key point of the while loop is that the loop might not ever run. When\
    \ the condition is tested and the result is false, the loop body will be skipped\
    \ and the first statement after the while loop will be executed.\n\n```\nExample\
    \ Program: to print the reverse of a number\n\nNum=int(input(\"Enter the number\"\
    ))\n\nRev=0\n\nwhile(Num>0):\n    Digit=Num%10\n    Rev=Rev*10+Digit\n    Num=Num//10\n\
    \nPrint(\"Reverse of digits of integer is\",Rev)\n```\n\nOutput:\n\nEnter the\
    \ number 123\n\nReverse of digits of integer is 321\n\nPython supports to have\
    \ an **else** statement associated with a loop statement.\n\n- If the **else**\
    \ statement is used with a **for** loop, the **else** statement is executed when\
    \ the loop has exhausted iterating the list.\n- If the **else** statement is used\
    \ with a **while** loop, the **else** statement is executed when the condition\
    \ becomes false.\n\n```\nExample Program: to print the value which is less than\
    \ 5\ncount = 0\nwhile count < 5:\n    print count, \"is less than 5\"\n    count\
    \ = count + 1\nelse:\n    print count, \"is not less than 5\"\nOutput:\n0 is less\
    \ than 5\n1 is less than 5\n2 is less than 5\n3 is less than 5\n4 is less than\
    \ 5\n5 is not less than 5\n```\n\n### 15.2. Loop\n\nIt is entry controlled loop.\
    \ In Python, for loop is used to iterate over the items of any sequence including\
    \ the Python list,string,tuple. The for loop is also used to access elements from\
    \ a container using built-in function range().\n\nSyntax:\n\n```\nfor variable_name\
    \ in sequence:\n    Statement1\n    Statement2\n```\n\nVariable_name – it indicates\
    \ target variable which will set a new value for each iteration of the loop\n\n\
    Sequence – a sequence of values that will be assigned to the target variable variable_name.\n\
    Statement – Block of program statements.\n\nAnother way of using for loop,\nSyntax:\n\
    \n```\nfor variable_name in range(initial,final,stepvalue):\n    statement1\n\
    \    statement2\n```\n\nconditions for range function:\n\n- Initial value: set\
    \ the starting value for the loop. The default start value is 0.\n- Final value:\
    \ set the last value for the loop. End value is mandatory. the value of final\
    \ is = final value -1\n- Step value: indicate the number of steps needed to increment\
    \ or decrement value. Default step value is +1.\n\nVarious looping techniques\
    \ with range function:\n\n- range(5) → 0,1,2,3,4\n- range(1,5) → 1,2,3,4"
  mdcn: "## 14.2. 运算符\n\n这些操作（运算符）可应用于所有数值类型：\n\n| 运算符 | 描述 | 示例 |\n| :--- | :---\
    \ | :--- |\n| +, - | 加法，减法 | 10 - 3 |\n| *, /, % | 乘法，除法，取模 | 27 % 7 结果：6 |\n\
    | // | 截断除法（也称为地板除法或向下取整除法）。此除法的结果是结果的整数部分，即小数部分被截断（如果有的话）。如果被除数和除数都是整数，结果也将是整数。\
    \ | >>> 10 // 3 3 >>> 10.0 // 3 3.0 >>> |\n| | 如果被除数或除数是浮点数，结果将是截断后的浮点数结果。 | |\n\
    | +x, -x | 一元减和一元加（代数符号） | -3 |\n| ~x | 按位取反 | ~3 - 4 结果：-8 |\n| ** | 幂运算 | 10\
    \ ** 3 结果：1000 |\n| or, and, not | 布尔或，布尔与，布尔非 | (a or b) and c |\n| in | “属于”\
    \ | 1 in [3, 2, 1] |\n| <, <=, >, >=, !=, == | 常用的比较运算符 | 2 <= 3 |\n| \\|, &,\
    \ ^ | 按位或，按位与，按位异或 | 6 ^ 3 |\n| <<, >> | 移位运算符 | 6 << 3 |\n\n## 条件语句\n\n### 14.3.\
    \ 简单 IF\n\n一个简单的‘if’语句仅在条件为真时执行语句。它根据逻辑表达式的值有条件地执行一组语句。\n\n**语法：**\n\n```\nIf\
    \ expression:\n    Statement1\n    Statement2\n```\n\n当布尔表达式被求值时，它会产生一个真值或假值。如果表达式求值为真，紧随其后的相同缩进量的语句将被执行。这组语句被称为一个代码块。\n\
    \n![](img/4aa708f460680cceb72f1a30f9e0d0fa_89_0.png)\n\n```\n示例程序：检查给定数字是否为奇数\n\
    Num = int(input(\"Enter the number\"))\nRem=Num%2\nif(Rem==1)\n    print(\"Entered\
    \ Number is odd\")\n输出：\nEnter the Number 35\nEntered Number is odd\n```\n\n###\
    \ IF ELSE\n\nif语句的第二种形式是“替代执行”，其中存在两种可能性，条件决定运行哪一种。语法如下：\n\n```\nif (condition):\n\
    \    Statement1\nelse:\n    Statement2\n```\n\n这些替代方案被称为分支，因为它们是执行流程中的分支。\n\n\
    ![](img/4aa708f460680cceb72f1a30f9e0d0fa_90_0.png)\n\n示例程序：检查给定数字是正数还是负数\n\n```\n\
    Num = int(input(\"Enter the number\"))\nif(Num>0):\n    print(\"Entered number\
    \ is positive\")\nelse:\n    print(\"Entered Number is negative\")\n```\n\n输出：\n\
    Enter the Number 40\nEntered Number is positive\nEnter the Number -50\nEntered\
    \ Number is negative\n\n### 链式条件\n\n有时存在超过两种可能性，我们需要超过两个分支。表达此类计算的一种方式是链式条件：\n\
    \n语法：\n\n```\nIf (condition):\n    Statement1\nelif (condition):\n    Statement2\n\
    elif (Condition):\n    Statement 3\nelse:\n    Statement4\n```\n\nElif 是 “else\
    \ if” 的缩写。同样，只有一个分支会运行。`elif` 语句的数量没有限制。如果有 `else` 子句，它必须位于最后，但并非必须存在。假设 if 条件需要满足两个或更多条件，那么我们必须使用\
    \ ‘and’ 运算符来检查两个表达式的条件。\n\n![](img/4aa708f460680cceb72f1a30f9e0d0fa_92_0.png)\n\
    \n示例：成绩分配\n\n```\nm1,m2,m3=eval(input(\"Enter mark1,mark2, mark3 separated by\
    \ comma:\"))\ntotal=m1+m2+m3\navg=total/3\nprint(\"Total=\",total)\nprint(\"Average=\"\
    ,avg)\nif(avg>=90):\n    print(\"Grade=O\")\nelif(avg>=80):\n    print(\"Grade=A\"\
    )\nelif(avg>=70):\n    print(\"Grade=B\")\nelif(avg>=60):\n    print(\"Grade=C\"\
    )\nelse:\n    print(\"Fail\")\n```\n\n输出\nEnter mark1, mark2,mark3 separated by\
    \ comma: 50,60,70\nTotal=180\nAverage=60.0\nGrade=C\n\n### 嵌套条件\n\n一个条件也可以嵌套在另一个条件内部。我们可以将上一节的示例改写如下：\n\
    \n```\nif x == y:\n    print('x and y are equal')\nelse: if x < y:\n    print('x\
    \ is less than y')\nelse:\n    print('x is greater than y')\n```\n\n外部条件包含两个分支。第一个分支包含一个简单语句。第二个分支包含另一个\
    \ if 语句，该语句本身又有两个分支。这两个分支都是简单语句，尽管它们也可以是条件语句。虽然语句的缩进使结构显而易见，但嵌套条件很快就会变得难以阅读。\n\
    \n逻辑运算符通常提供了一种简化嵌套条件语句的方法。例如，我们可以使用单个条件重写以下代码：\n\n```\nif 0 < x:\n    if x < 10:\n\
    \        print('x is a positive single-digit number.')\n```\n\nprint 语句仅在我们通过两个条件时才运行，因此我们可以使用\
    \ and 运算符获得相同的效果：\n\n```\nif 0 < x and x < 10:\n    print('x is a positive single-digit\
    \ number.')\n```\n\n## 15. 迭代 / 循环 / 重复语句\n\n许多算法使得编程语言必须具有一种结构，使得能够重复执行一系列语句。循环内的代码，即重复执行的代码，被称为循环体。\n\
    \nPython 提供了两种不同类型的循环：\n\n- while 循环和\n- for 循环。\n\n### 15.1. while\n\nPython\
    \ 编程语言中的 **while** 循环语句只要给定条件为真，就重复执行目标语句。\n\nPython 编程语言中 **while** 循环的语法是 -\n\
    \n```\nwhile expression:\n    statement(s)\n```\n\n这里，**statement(s)** 可以是单个语句或一组语句。**condition**\
    \ 可以是任何表达式，true 是任何非零值。当条件为真时，循环进行迭代。当条件变为假时，程序控制传递到循环之后的下一行。\n\n在 Python 中，编程结构后缩进相同字符空格的所有语句都被视为单个代码块的一部分。Python\
    \ 使用缩进作为其分组语句的方法。\n\n![](img/4aa708f460680cceb72f1a30f9e0d0fa_96_0.png)\n\n这里，while\
    \ 循环的关键点是循环可能根本不会运行。当测试条件且结果为假时，循环体将被跳过，while 循环之后的第一条语句将被执行。\n\n```\n示例程序：打印数字的反转\n\
    \nNum=int(input(\"Enter the number\"))\n\nRev=0\n\nwhile(Num>0):\n    Digit=Num%10\n\
    \    Rev=Rev*10+Digit\n    Num=Num//10\n\nPrint(\"Reverse of digits of integer\
    \ is\",Rev)\n```\n\n输出：\n\nEnter the number 123\n\nReverse of digits of integer\
    \ is 321\n\nPython 支持将 **else** 语句与循环语句关联。\n\n- 如果 **else** 语句与 **for** 循环一起使用，则当循环耗尽迭代列表时，**else**\
    \ 语句被执行。\n- 如果 **else** 语句与 **while** 循环一起使用，则当条件变为假时，**else** 语句被执行。\n\n```\n\
    示例程序：打印小于5的值\ncount = 0\nwhile count < 5:\n    print count, \"is less than 5\"\
    \n    count = count + 1\nelse:\n    print count, \"is not less than 5\"\n输出：\n\
    0 is less than 5\n1 is less than 5\n2 is less than 5\n3 is less than 5\n4 is less\
    \ than 5\n5 is not less than 5\n```\n\n### 15.2. for 循环\n\n它是入口控制循环。在 Python 中，for\
    \ 循环用于遍历任何序列的项，包括 Python 列表、字符串、元组。for 循环也用于使用内置函数 `range()` 从容器中访问元素。\n\n语法：\n\
    \n```\nfor variable_name in sequence:\n    Statement1\n    Statement2\n```\n\n\
    Variable_name – 它表示目标变量，该变量将在循环的每次迭代中设置一个新值。\n\nSequence – 将被赋值给目标变量 variable_name\
    \ 的值序列。\n\nStatement – 程序语句块。\n\n使用 for 循环的另一种方式，\n语法：\n\n```\nfor variable_name\
    \ in range(initial,final,stepvalue):\n    statement1\n    statement2\n```\n\n\
    range 函数的条件：\n\n- 初始值：设置循环的起始值。默认起始值为 0。\n- 终止值：设置循环的最后一个值。终止值是必需的。final 的值 =\
    \ 终止值 - 1。\n- 步长值：指示增加或减少值所需的步数。默认步长值为 +1。\n\n使用 range 函数的各种循环技术：\n\n- range(5)\
    \ → 0,1,2,3,4\n- range(1,5) → 1,2,3,4"
