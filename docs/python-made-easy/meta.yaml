    # # 19

    ## VISUALIZATION IN PYTHON


    # ## 19.1 Visualization


    > "A Picture is worth a thousand words". Robert G Barnard


    There cannot be a better way of explaining visualization for a data scientist
    or anyone, who is working on data. A data set, small or big, when represented
    by an image, a graph or a chart, it communicates the meaning to the analyst as
    well as to anyone else the same is presented. Data visualization plays an essential
    role in the representation of both small and large-scale data.


    # ### 19.1.1 Importance of Data Visualization


    One of the key skills of a data scientist is the ability to tell a compelling
    story. To first understand the data to write that story, the analyst visualizes
    the data in many forms, until the raw data starts making sense to him. The patterns
    in the data emerge better in the form of visuals.


    Hence, learning how to leverage a software tool to visualize data will enable
    you to extract information, better understand the data, and make more effective
    decisions.


    Python has vast and rich resources for anyone and everyone, for visualizing the
    data. There are numerous libraries which allow and assist in making and presenting
    all kind of images and charts. We will have a look at some of the most important
    ones in this chapter, but we will look at the basics of data visualization first.'
