  mdcn: "## 8.4 集合\n\nPython 还包含一种用于集合的数据类型。集合是一个无重复元素的无序集合。基本用途包括成员测试和消除重复条目。集合对象还支持数学运算，如并集、交集、差集和对称差集。\n\
