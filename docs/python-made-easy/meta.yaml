- md: "## 20.17 Summary: Matplotlib is the most popular visualization library, and\
    \ also one of the oldest one for Python. We saw how it was based on MATPLOTLIB,\
    \ but also how now it has grown much beyond that. You got introduced to the two\
    \ popular interfaces, pyplot, and OOP. In this chapter, we focused on the pyplot\
    \ interface. We saw step by step process, right from creating a blank figure,\
    \ axes and then plotting single or multiple subplots. The anatomy of the figure\
    \ or plot is a very revealing and important concept. The use of a function to\
    \ repeat similar plots can be very helpful when you start working with data. Further,\
    \ we saw the finer aspects of the plots, like formatting the axis, labels, and\
    \ styles. Plotting with matplotlib is overwhelming at times for a beginner, but\
    \ once you get a hang of the basics, then the most complex of the plots can also\
    \ be understood and creating, one step at a time.\n\n## 21 VISUALIZATION MATPLOTLIB\
    \ O-O INTERFACE AND SAMPLE PLOTS\n\nThis chapter aims to show the beginning, middle,\
    \ and end of a single visualization using Matplotlib. We'll begin with some raw\
    \ data and end by saving a figure of a customized visualization. Along the way,\
    \ we'll try to highlight some neat features and best-practices using Matplotlib.\
    \ In short, we will see the life-cycle of a plot<sup>92</sup>, from the beginning\
    \ (creating figure) to end (saved on your machine).\n\n### 21.1 Object-Oriented\
    \ API vs. Pyplot\n\nMatplotlib has two interfaces. The first is an object-oriented\
    \ (OO) interface. In this case, we utilize an instance of axes.Axes to render\
    \ visualizations on an instance of the figure.Figure.\n\nThe second is based on\
    \ MATLAB and uses a state-based interface. This is encapsulated in the pyplot\
    \ module. We saw the pyplot interface in some detail in the previous chapter.\n\
    \nMost of the terms are straightforward but the main thing to remember is that:\
    \ The figure is the final image that may contain 1 or more Axes.\n\n- The Axes\
    \ represent an individual plot (don't confuse this with the word \"axis\", which\
    \ refers to the x/y axis of a plot).\n\nWe call methods that do the plotting directly\
    \ from the Axes, which gives us much more flexibility and power in customizing\
    \ our plot.\n\n**Note:** In general, try to use the object-oriented interface\
    \ over the pyplot interface if you want more flexibility and power in customizing\
    \ your plot.\n\n### 21.2 Our data\n\nWe will use the following dictionary \"data\"\
    \ as the data to plot. The values and keys of this dictionary are made as two\
    \ lists and assigned to two variables. You will see how they are used for the\
    \ plot.\n\n```\nIn [1]: import numpy as np\n        import matplotlib.pyplot as\
    \ plt\n        from matplotlib.ticker import FuncFormatter\n\n        data = {'Barton\
    \ LLC': 109438.50,\n                'Frami, Hills and Schmidt': 103569.59,\n \
    \               'Fritsch, Russel and Anderson': 112214.71,\n                'Jerde-Hilpert':\
    \ 112591.43,\n                'Keeling LLC': 100934.30,\n                'Koepp\
    \ Ltd': 103660.54,\n                'Kulas Inc': 137351.96,\n                'Trantow-Barrows':\
    \ 123381.38,\n                'White-Trantow': 135841.99,\n                'Will\
    \ LLC': 104437.60}\n\n        group_data = list(data.values())\n        group_names\
    \ = list(data.keys())\n        group_mean = np.mean(group_data)\n```\n\n### 21.3\
    \ First Step\n\nThis data is naturally visualized as a barplot, with one bar per\
    \ group. To do this with the object-oriented approach, we'll first generate an\
    \ instance of figure.Figure and axes.Axes. The Figure is like a canvas, and the\
    \ Axes is a part of that canvas on which we will make a particular visualization.\
    \ A figure may have multiple Axes, but we are going to create just one for now.\n\
    \n```\nIn [2]: fig, ax = plt.subplots()\n```\n\nNow that we have an Axes instance,\
    \ we can plot on top of it.\n\n```\nIn [3]: fig, ax = plt.subplots()\n       \
    \ ax.barh(group_names, group_data)\n\nOut[3]: <BarContainer object of 10 artists>\n\
    ```\n\n### 21.4 Controlling the Styles\n\nThere are many styles available in Matplotlib\
    \ to let you tailor your visualization to your needs. To see a list of styles,\
    \ we can use style.\n\n```\nIn [4]: print(plt.style.available)\n\nOut[4]: ['bmh',\
    \ 'classic', 'dark_background', 'fast', 'fivethirtyeight', 'ggplot', 'grayscale',\
    \ 'seaborn-bright', 'seaborn-colorblind', 'seaborn-dark-palette', 'seaborn-dark',\
    \ 'seaborn-darkgrid', 'seaborn-deep', 'seaborn-muted', 'seaborn-notebook', 'seaborn-paper',\
    \ 'seaborn-pastel', 'seaborn-poster', 'seaborn-talk', 'seaborn-ticks', 'seaborn-white',\
    \ 'seaborn-whitegrid', 'seaborn', 'Solarize_Light2', 'tableau-colorblind10', '_classic_test']\n\
    ```\n\nThe list above gives names of all the styles available to us for use. We\
    \ will use one of them with the following:\n\n```\nIn [5]: plt.style.use(\"ggplot\"\
    )\n```\n\nNow let's plot the chart again to see how it works.\n\n```\nIn [6]:\
    \ fig, ax = plt.subplots()\n        ax.barh(group_names, group_data)\n\nOut[6]:\
    \ <BarContainer object of 10 artists>\n```\n\nThe style controls many things,\
    \ such as color, linewidths, backgrounds, etc.\n\n### 21.5 Customizing the Plot\n\
    \nNow we've got a plot with the general look that we want, so let's fine-tune\
    \ it so that it's ready for print. First, let's rotate the labels on the x-axis\
    \ so that they show up more clearly. We can gain access to these labels with the\
    \ axes.Axes.get_xticklabels() method:\n\n```\nlabels = ax.get_xticklabels()\n\
    ```\n\nNow we are going to set the property of many items at once. The pyplot.setp()\
    \ function is going to be useful for this purpose. This function will take a list\
    \ (or many lists) of Matplotlib objects, and attempt to set some style elements\
    \ of each one.\n\n```\nIn [7]: fig, ax = plt.subplots()\n        ax.barh(group_names,\
    \ group_data)\n        labels = ax.get_xticklabels()\n        plt.setp(labels,\
    \ rotation=45, horizontalalignment='right')\n\nOut[7]: [None, None, None, None,\
    \ None, None, None, None, None, None, None, None, None, None, None, None, None,\
    \ None, None, None]\n```\n\nNext, we'll add labels to the plot. To do this with\
    \ the OO interface, we can use the **axes.Axes.set()** method to set properties\
    \ of this Axes object.\n\n```\nIn [8]: fig, ax = plt.subplots()\n        ax.barh(group_names,\
    \ group_data)\n        labels = ax.get_xticklabels()\n        plt.setp(labels,\
    \ rotation=45, horizontalalignment='right')\n        ax.set(xlim=[-10000, 140000],\
    \ xlabel='Total Revenue', ylabel='Company', title='Company Revenue')\n\nOut[8]:\
    \ [Text(0, 0.5, 'Company'), (-10000, 140000), Text(0.5, 0, 'Total Revenue'), Text(0.5,\
    \ 1.0, 'Company Revenue')]\n```\n\nWe can also adjust the size of this plot using\
    \ the **pyplot.subplots()** function. We can do this with the **figsize** kwarg.\n\
    \n> **Note:** While indexing in NumPy follows the form (row, column), the figsize\
    \ kwarg follows the form (width, height). This follows conventions in visualization,\
    \ which unfortunately are different from those of linear algebra.\n\n```\nIn [9]:\
    \ fig, ax = plt.subplots(figsize=(4, 4))\n        ax.barh(group_names, group_data)\n\
    \        labels = ax.get_xticklabels()\n        plt.setp(labels, rotation=45,\
    \ horizontalalignment='right')\n        ax.set(xlim=[-10000, 140000], xlabel='Total\
    \ Revenue', ylabel='Company', title='Company Revenue')\n\nOut[9]: [Text(0, 0.5,\
    \ 'Company'), (-10000, 140000), Text(0.5, 0, 'Total Revenue'), Text(0.5, 1.0,\
    \ 'Company Revenue')]\n```\n\nOur x-axis labels are in dollars, and the figures\
    \ are large. We can edit them or alter them in formatting to suit better visuals.\
    \ For labels, we can specify custom formatting guidelines in the form of functions\
    \ by using the **ticker.FuncFormatter** class. Below we'll define a function that\
    \ takes an integer as input, and returns a string as an output.\n\n```\nIn [10]:\
    \ def currency(x, pos):\n             \"\"\"The two args are the value and tick\
    \ position\"\"\"\n             if x >= 1e6:\n                 s = '${:1.1f}M'.format(x*1e-6)\n\
    \             else:\n                 s = '${:1.0f}K'.format(x*1e-3)\n       \
    \      return s\n\n         formatter = FuncFormatter(currency)\n```\n\nWe can\
    \ then apply this formatter to the labels on our plot. To do this, we'll use the\
    \ **xaxis** attribute of our axis. This lets you perform actions on a specific\
    \ axis on our plot.\n\n```\nIn [11]: fig, ax = plt.subplots(figsize=(8, 5))\n\
    \         ax.barh(group_names, group_data)\n         labels = ax.get_xticklabels()\n\
    \         plt.setp(labels, rotation=45, horizontalalignment='right')\n       \
    \  ax.set(xlim=[-10000, 140000], xlabel='Total Revenue', ylabel='Company', title='Company\
    \ Revenue')\n         ax.xaxis.set_major_formatter(formatter)\n```"
  mdcn: "## 20.17 总结：Matplotlib 是最流行的可视化库，也是 Python 中最古老的库之一。我们了解了它如何基于 MATPLOTLIB，以及现在它如何发展得远超于此。你接触了两个流行的接口：pyplot\
    \ 和面向对象接口。在本章中，我们重点介绍了 pyplot 接口。我们逐步了解了从创建空白图形、坐标轴，到绘制单个或多个子图的整个过程。图形或绘图的解剖结构是一个非常有启发性和重要的概念。当你开始处理数据时，使用函数来重复绘制相似的图表会非常有帮助。此外，我们还了解了绘图的精细方面，比如格式化坐标轴、标签和样式。对于初学者来说，使用\
    \ matplotlib 绘图有时会让人不知所措，但一旦掌握了基础，最复杂的图表也能被理解并创建出来，只需一步一步来。\n\n## 21 可视化 MATPLOTLIB\
    \ 面向对象接口与示例绘图\n\n本章旨在展示使用 Matplotlib 进行单次可视化的开始、中间和结束过程。我们将从一些原始数据开始，最终保存一个自定义可视化的图形。在此过程中，我们将尝试突出介绍一些使用\
    \ Matplotlib 的巧妙功能和最佳实践。简而言之，我们将看到一个绘图<sup>92</sup>的生命周期，从开始（创建图形）到结束（保存在你的机器上）。\n\
    \n### 21.1 面向对象 API 与 Pyplot\n\nMatplotlib 有两个接口。第一个是面向对象（OO）接口。在这种情况下，我们利用 axes.Axes\
    \ 的实例在 figure.Figure 的实例上渲染可视化。\n\n第二个基于 MATLAB，并使用基于状态的接口。这被封装在 pyplot 模块中。我们在上一章中已经详细介绍了\
    \ pyplot 接口。\n\n大多数术语都很直接，但主要要记住的是：图形是最终的图像，可能包含一个或多个坐标轴。\n\n- 坐标轴代表单个绘图（不要与“axis”一词混淆，后者指的是绘图的\
    \ x/y 轴）。\n\n我们直接从坐标轴调用绘图方法，这为我们定制绘图提供了更大的灵活性和能力。\n\n**注意：** 通常，如果你想在定制绘图时获得更大的灵活性和能力，建议使用面向对象接口而不是\
    \ pyplot 接口。\n\n### 21.2 我们的数据\n\n我们将使用以下字典 \"data\" 作为要绘制的数据。这个字典的值和键被制成两个列表并分配给两个变量。你将看到它们如何用于绘图。\n\
    \n```\nIn [1]: import numpy as np\n        import matplotlib.pyplot as plt\n \
    \       from matplotlib.ticker import FuncFormatter\n\n        data = {'Barton\
    \ LLC': 109438.50,\n                'Frami, Hills and Schmidt': 103569.59,\n \
    \               'Fritsch, Russel and Anderson': 112214.71,\n                'Jerde-Hilpert':\
    \ 112591.43,\n                'Keeling LLC': 100934.30,\n                'Koepp\
    \ Ltd': 103660.54,\n                'Kulas Inc': 137351.96,\n                'Trantow-Barrows':\
    \ 123381.38,\n                'White-Trantow': 135841.99,\n                'Will\
    \ LLC': 104437.60}\n\n        group_data = list(data.values())\n        group_names\
    \ = list(data.keys())\n        group_mean = np.mean(group_data)\n```\n\n### 21.3\
    \ 第一步\n\n这些数据自然地可视化为条形图，每个组一个条形。使用面向对象方法来实现这一点，我们将首先生成一个 figure.Figure 和 axes.Axes\
    \ 的实例。图形就像一块画布，坐标轴是画布的一部分，我们将在其上进行特定的可视化。一个图形可以有多个坐标轴，但我们现在只创建一个。\n\n```\nIn [2]:\
    \ fig, ax = plt.subplots()\n```\n\n现在我们有了一个坐标轴实例，就可以在其上进行绘图了。\n\n```\nIn [3]:\
    \ fig, ax = plt.subplots()\n        ax.barh(group_names, group_data)\n\nOut[3]:\
    \ <BarContainer object of 10 artists>\n```\n\n### 21.4 控制样式\n\nMatplotlib 中有许多可用的样式，可以让你根据需要定制可视化。要查看样式列表，我们可以使用\
    \ style。\n\n```\nIn [4]: print(plt.style.available)\n\nOut[4]: ['bmh', 'classic',\
    \ 'dark_background', 'fast', 'fivethirtyeight', 'ggplot', 'grayscale', 'seaborn-bright',\
    \ 'seaborn-colorblind', 'seaborn-dark-palette', 'seaborn-dark', 'seaborn-darkgrid',\
    \ 'seaborn-deep', 'seaborn-muted', 'seaborn-notebook', 'seaborn-paper', 'seaborn-pastel',\
    \ 'seaborn-poster', 'seaborn-talk', 'seaborn-ticks', 'seaborn-white', 'seaborn-whitegrid',\
    \ 'seaborn', 'Solarize_Light2', 'tableau-colorblind10', '_classic_test']\n```\n\
    \n上面的列表给出了我们可以使用的所有样式的名称。我们将使用以下方式应用其中一个样式：\n\n```\nIn [5]: plt.style.use(\"ggplot\"\
    )\n```\n\n现在让我们再次绘制图表，看看效果如何。\n\n```\nIn [6]: fig, ax = plt.subplots()\n     \
    \   ax.barh(group_names, group_data)\n\nOut[6]: <BarContainer object of 10 artists>\n\
    ```\n\n样式控制着许多东西，比如颜色、线宽、背景等。\n\n### 21.5 定制绘图\n\n现在我们得到了一个具有我们想要的总体外观的图表，所以让我们对其进行微调，使其适合打印。首先，让我们旋转\
    \ x 轴上的标签，使其显示得更清晰。我们可以通过 axes.Axes.get_xticklabels() 方法访问这些标签：\n\n```\nlabels\
    \ = ax.get_xticklabels()\n```\n\n现在我们将一次性设置多个项目的属性。pyplot.setp() 函数对此很有用。这个函数将接受一个（或多个）Matplotlib\
    \ 对象的列表，并尝试设置每个对象的一些样式元素。\n\n```\nIn [7]: fig, ax = plt.subplots()\n        ax.barh(group_names,\
    \ group_data)\n        labels = ax.get_xticklabels()\n        plt.setp(labels,\
    \ rotation=45, horizontalalignment='right')\n\nOut[7]: [None, None, None, None,\
    \ None, None, None, None, None, None, None, None, None, None, None, None, None,\
    \ None, None, None]\n```\n\n接下来，我们将为绘图添加标签。使用面向对象接口，我们可以使用 **axes.Axes.set()**\
    \ 方法来设置此坐标轴对象的属性。\n\n```\nIn [8]: fig, ax = plt.subplots()\n        ax.barh(group_names,\
    \ group_data)\n        labels = ax.get_xticklabels()\n        plt.setp(labels,\
    \ rotation=45, horizontalalignment='right')\n        ax.set(xlim=[-10000, 140000],\
    \ xlabel='Total Revenue', ylabel='Company', title='Company Revenue')\n\nOut[8]:\
    \ [Text(0, 0.5, 'Company'), (-10000, 140000), Text(0.5, 0, 'Total Revenue'), Text(0.5,\
    \ 1.0, 'Company Revenue')]\n```\n\n我们还可以使用 **pyplot.subplots()** 函数调整此绘图的大小。我们可以通过\
    \ **figsize** 关键字参数来实现。\n\n> **注意：** 虽然 NumPy 中的索引遵循（行，列）的形式，但 figsize 关键字参数遵循（宽度，高度）的形式。这遵循了可视化中的惯例，不幸的是，这与线性代数的惯例不同。\n\
    \n```\nIn [9]: fig, ax = plt.subplots(figsize=(4, 4))\n        ax.barh(group_names,\
    \ group_data)\n        labels = ax.get_xticklabels()\n        plt.setp(labels,\
    \ rotation=45, horizontalalignment='right')\n        ax.set(xlim=[-10000, 140000],\
    \ xlabel='Total Revenue', ylabel='Company', title='Company Revenue')\n\nOut[9]:\
    \ [Text(0, 0.5, 'Company'), (-10000, 140000), Text(0.5, 0, 'Total Revenue'), Text(0.5,\
    \ 1.0, 'Company Revenue')]\n```\n\n我们的 x 轴标签是美元，而且数字很大。我们可以编辑它们或更改其格式以获得更好的视觉效果。对于标签，我们可以使用\
    \ **ticker.FuncFormatter** 类以函数的形式指定自定义格式化准则。下面我们将定义一个函数，该函数接受一个整数作为输入，并返回一个字符串作为输出。\n\
    \n```\nIn [10]: def currency(x, pos):\n             \"\"\"The two args are the\
    \ value and tick position\"\"\"\n             if x >= 1e6:\n                 s\
    \ = '${:1.1f}M'.format(x*1e-6)\n             else:\n                 s = '${:1.0f}K'.format(x*1e-3)\n\
    \             return s\n\n         formatter = FuncFormatter(currency)\n```\n\n\
    然后我们可以将此格式化器应用于我们绘图上的标签。为此，我们将使用坐标轴的 **xaxis** 属性。这允许你对绘图上的特定坐标轴执行操作。\n\n```\n\
    In [11]: fig, ax = plt.subplots(figsize=(8, 5))\n         ax.barh(group_names,\
    \ group_data)\n         labels = ax.get_xticklabels()\n         plt.setp(labels,\
    \ rotation=45, horizontalalignment='right')\n         ax.set(xlim=[-10000, 140000],\
    \ xlabel='Total Revenue', ylabel='Company', title='Company Revenue')\n       \
    \  ax.xaxis.set_major_formatter(formatter)\n```"
