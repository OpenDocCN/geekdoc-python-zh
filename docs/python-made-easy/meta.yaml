    \n```\nIn [32]:  'day ' + str('1')\n```\n\n```\nOut[32]:  'day 1'\n```\n\n## 4.12\
    \ 分支\n\nPython提供**if**语句，允许根据条件进行分支。也可以执行多个**elif**检查，后跟一个可选的else子句。**if**语句可以与任何真值评估一起使用。\n\
    \n```\nIn [33]:  i = 5\n         if i<4: print('i is less than 4')\n         elif\
    \ i<7: print ('i is less than 7')\n         else:\n             print ('i is greater\
    \ than 7')\n```\n\ni is less than 7\n\n## 4.13 逻辑行与物理行\n\n**物理行**是你编写程序时*看到*的行。**逻辑行**是Python*视为*单条语句的行。Python隐式地假设每个*物理行*对应一个*逻辑行*。\n\
    \n通过一些例子可以更容易地理解这一点。\n\n```\nIn [34]:  print ('Hello Word')\n\n         2+3\n\
    ```\n\nHello Word\n\nOut[34]:  5\n\n这里，Print ('Hello World') 既是一个物理行，也是一个逻辑行。同样，2\
    \ + 3 是另一个物理行，也是一个逻辑行。\n\n这一定会引发一个问题：那么这两者有何不同？\n\n```\nIn [35]:  # Here are 2\
    \ Physical as well as 2 Logical\n         # Lines again i = 5\n         print(i)\n\
    ```\n\n5\n\n```\nIn [36]:  # But Here, there is only one Physical line,\n    \
