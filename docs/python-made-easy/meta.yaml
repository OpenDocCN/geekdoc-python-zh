  md: 'Step 1: Start

    Step 2: Type 2 + 2

    Step 3: Press Enter

    Step 4: Stop


    The algorithm is made of 3 kinds of statements. Any combination of these 3 kinds
    can be present in an algorithm.


    +   1. Sequence Statements

    2. Selection Statements

    3. Looping or Iterating Statements


    # 1.3.2.1 Sequence Statements


    In these Programs, one statement is executed after another, sequentially.


    The above two examples, making the tea and calculating 2+2, both are examples
    of Sequence statements. Let’s take on more examples.


    **Example** Calculate the age of a person given his year of birth.


    Step 1: Start

    Step 2: Take the year of birth and Store in YOB.

    Step 3: Take the current year and store it in CY.

    Step 4: Subtract YOB from CY and save in Age.

    Step 5: Print Age.

    Step 6: Stop


    # 1.3.2.2 Selection Statements'
  merge: -1
  pgno: 56
- img_proc: true
  md: 'In these Programs, some part of the program is executed based on a certain
    condition being fulfilled or not. If the condition is fulfilled, the computer
    will execute one part of the program, and if the condition is not fulfilled, the
    other part of the program is executed.


    **Example** Write an algorithm to check if a person has a fever or not. Condition
    is, its fever if the temperature is above 99 Degree Fahrenheit.


    +   Step 1: Start

    Step 2: Take the temperature and Store in TEMP.

    Step 3: Check the TEMP value. If it’s more than 99 Degree Fahrenheit, then go
    to step 4, otherwise, go to Step 5.

    Step 4: Print "He has Fever" and go to step 6.

    Step 5: Print "He does not has Fever".

    Step 6: Stop


    # 1.3.2.3 Looping or Iterating Statements


    In some programs, certain steps are executed again and again, based on a conditional
    test. These repetitions are called iterations. The iteration is done using one
    or more looping techniques. Hence this kind of program is called Looping or Iterating
    statements.


    **Example** Print all the numbers from 1 to 10.


    +   Step 1: Start

    Step 2: Store 1 in i.

    Step 3: Check if value of i <= 10. If yes, go to step 4. If False, go to step
    7.

    Step 4: Print i.'
