    \n```\nplot([x], y, [fmt],*, data = None, **kwargs) 或\nplot([x], y, [fmt], [x2],\
    \ y2, [fmt2], ..., **kwargs)\n```\n\n点或线节点的坐标由 x, y 给出。可选参数 **fmt** 是定义基本格式（如颜色、标记和线型）的一种便捷方式。它是下面章节中描述的一种快捷字符串表示法。以下几行解释了简单的\
