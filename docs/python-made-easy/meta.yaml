  md: '# The Emergence of Statistics


    # 1663


    In London, John Graunt carries out the first recorded experiment in statistical
    data analysis. By recording information about mortality, he theorized that he
    can design an early warning system for the bubonic plague ravaging Europe.


    # 1865


    The term “**business intelligence**” is used by Richard Millar Devens in his Encyclopedia
    of Commercial and Business Anecdotes, describing how the banker Henry Furnese
    achieved an advantage over competitors by collecting and analyzing information
    relevant to his business activities in a structured manner. This is thought to
    be the first study of a business putting data analysis to use for commercial purposes.


    # 1880


    The US Census Bureau has a problem – it estimates that it will take it 8 years
    to crunch all the data collected in the 1880 census, and it is predicted that
    the data generated by the 1890 census will take over 10 years, meaning it will
    not even be ready to look at until it is outdated by the 1900 census. In 1881
    a young engineer employed by the bureau – Herman Hollerith – produces what will
    become known as the Hollerith Tabulating Machine. Using punch cards, he reduces
    10 years’ work to three months and achieves his place in history as the father
    of modern automated computation. The company he founds will go on to become known
    as IBM.


