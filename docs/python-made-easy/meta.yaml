  md: 'Let us dive a bit deeper into understanding the **iterators** In many ways,
    the object returned by **range()** behaves as if it is a **list**, but it isn''t.


    It is an object which returns the successive items of the desired sequence when
    you **iterate** over it, but it doesn''t make the list, thus saving space.


    We say such an object is *iterable*, that is, suitable as a target for functions
    and constructs that expect something from which they can obtain successive items
    until the supply is exhausted.


    We have seen that the **for** statement is such an iterator. The function **list()**
    is another; it creates lists from iterable:


    ```

    In [14]: list(range(5))

    Out[14]: [0, 1, 2, 3, 4]

    ```


    In later chapters, we will see more functions that return iterable and take iterable
    as an argument.


