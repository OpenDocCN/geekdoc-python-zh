    Let''s open up Anaconda Command Prompt, and try out a few commands.

    The Anaconda command prompt looks like and behaves as a terminal window. This
    will show the base directly where Anaconda and in turn the Python Interpreter
    is installed. The way we did it, installed for "user" rather than "all users (which
    required admin privilege)", it will show the prompt as


    ```

    C:\Users\yourusername>

    ```


    Let''s go ahead and launch the Python interpreter. We''ll use the **Python** command.


    To run python, just type **python** and press **enter**.


    Let''s halt here, and see what information we just received on our terminal screen.


    We can now see which version of Python is installed and ready to use. Also, now
    the command line has changed to


    ```

    >>>

    ```


