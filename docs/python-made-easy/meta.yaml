    # 18.1 Creating new Columns from old ones


    Let us create 1 more column. The columns **hwy** and **cty** are mileage in miles
    per gallon when the car is being driven on a highway or a city respectively. Let
    us create one more column, which will tell us the ratio of "highway Mileage" vs
    "city Mileage".


    ```

    In [2]: mpg["hwy_vs_cty"] = mpg["hwy"] / mpg["cty"]


    mpg.head()

    ```


    Out[2]:


    | manufacturer | model | displ | year | cyl | trans | drv | cty | hwy | fl | class
    | hwy_vs_cty |

    |---|---|---|---|---|---|---|---|---|---|---|---|

    | audi | a4 | 1.8 | 1999 | 4 | auto(l5) | f | 18 | 29 | p | compact | 1.611111
    |

    | audi | a4 | 1.8 | 1999 | 4 | manual(m5) | f | 21 | 29 | p | compact | 1.380952
    |

    | audi | a4 | 2.0 | 2008 | 4 | manual(m6) | f | 20 | 31 | p | compact | 1.550000
    |

    | audi | a4 | 2.0 | 2008 | 4 | auto(av) | f | 21 | 30 | p | compact | 1.428571
    |

    | audi | a4 | 2.8 | 1999 | 6 | auto(l5) | f | 16 | 26 | p | compact | 1.625000
    |


    Note that we did the operation with the column label, only once. And it got applied
    to all the elements in the column. This is the power of pandas. You do not need
    to use a loop to iterate each of the rows!


    # 18.2 Deleting columns from the DataFrame


    There might be some variables in the data, which are not necessary for operations,
    and you do not need them. You can delete the entire column with ease, and change
    the DataFrame.


