- md: "## 9.2.1.4 str() vs repr()\n\nIn Python, `str()` and `repr()` both are used\
    \ to get a string representation of an object. Spot the difference in the example\
    \ below:\n\n```python\nIn [23]: s = 'Hello, Geeks.'\n         print(str(s))\n\
    \         print(str(3.0/11.0))\n```\n\n```\nHello, Geeks.\n0.2727272727272727\n\
    ```\n\n```python\nIn [24]: s = 'Hello, Geeks.'\n         print(repr(s))\n    \
    \     print(repr(3.0/11.0))\n```\n\n```\n'Hello, Geeks.'\n0.2727272727272727\n\
    ```\n\nFrom the above output, we can see if we print string using `repr()` function\
    \ then it prints with a pair of quotes.\n\nFollowing are differences:\n- **str()**\
    \ is used for creating output for end-user while **repr()** is mainly used for\
    \ debugging and development.\n- **repr's** goal is to be **unambiguous** and **str's**\
    \ is to be **readable**. For example, if we suspect a float has a small rounding\
    \ error, **repr** will show us while **str** may not.\n- **repr()** computes the\
    \ \"**official**\" string representation of an object (a representation that has\
    \ all information about the object) and **str()** is used to compute the \"**informal**\"\
    \ string representation of an object (a representation that is useful for printing\
    \ the object).\n\nLet's understand this by an example:\n\n```python\nIn [25]:\
    \ import datetime\n         today = datetime.datetime.now()\n         # Prints\
    \ readable format for date-time object\n         print(str(today))\n         #\
    \ prints the official format of date-time object\n         print(repr(today))\n\
    ```\n\n```\n2020-05-31 17:26:36.783561\ndatetime.datetime(2020, 5, 31, 17, 26,\
    \ 36, 783561)\n```\n\n**str()** displays today's date in a way that the user can\
    \ understand the date and time.\n\n**repr()** prints \"official\" representation\
    \ of a date-time object (means using the \"official\" string representation we\
    \ can reconstruct the object).\n\n## 9.2.1.5 Old string formatting\n\nThe `%`\
    \ operator can also be used for string formatting. It interprets the left argument\
    \ much like a `sprintf()`-style format string to be applied to the right argument\
    \ and returns the string resulting from this formatting operation. For example:\n\
    \n```python\nIn [26]: import math\n         print('The value of pi is approximately\
    \ %abs.' % math.pi)\n```\n\n```\nThe value of pi is approximately 3.141592653589793bs.\n\
    ```\n\n```python\nIn [27]: import math\n         print('The value of pi is approximately\
    \ %.3f.' % math.pi)\n```\n\n```\nThe value of pi is approximately 3.142.\n```\n\
    \n## 9.3 Reading and Writing Files\n\n**open()** returns a file object, and is\
    \ most commonly used with two arguments: **open(filename, mode)**.\n\n```python\n\
    f = open('workfile', 'w')\n```\n\nThe first argument is a string containing the\
    \ filename. The second argument is another string containing a few characters\
    \ describing how the file will be used. The mode can be:\n- `'r'` when the file\
    \ will only be read,\n- `'w'` for only writing (an existing file with the same\
    \ name will be erased),\n- `'a'` opens the file for appending; any data are written\
    \ to the file is automatically added to the end.\n- `'r+'` opens the file for\
    \ both reading and writing.\n\nThe mode argument is optional; `'r'` will be assumed\
    \ if it's omitted.\n\nNormally, files are opened in text mode that means, you\
    \ read and write strings from and to the file, which are encoded in a specific\
    \ encoding.\n\nFull syntax of **open()** is as below:\n```python\nopen(file, mode='r',\
    \ buffering=-1, encoding=None, errors=None, newline=None, closefd=True, opener=None)\n\
    ```\n\nThe default option in *mode* is `'r'`. Have a look at all other options\
    \ in the table below.\n\n| Character | Meaning |\n| :--- | :--- |\n| 'r' | open\
    \ for reading (default) |\n| 'w' | open for writing, truncating the file first\
    \ |\n| 'x' | open for exclusive creation, failing if the file already exists |\n\
    | 'a' | open for writing, appending to the end of the file if it exists |\n| 'b'\
    \ | binary mode |\n| 't' | text mode (default) |\n| '+' | open a disk file for\
    \ updating (reading and writing) |\n\nFigure 9-2 Modes Available to open a file\
    \ in python\n\nIt is good practice to use the **with** keyword when dealing with\
    \ file objects. The advantage is that the file is properly closed after its suite\
    \ finishes, even if an exception is raised at some point.\n\n```python\nwith open('workfile')\
    \ as f:\n    read_data = f.read()\n```\n\nIf you're not using the **with** keyword,\
    \ then you should call **f.close()** to close the file and immediately free up\
    \ any system resources used by it.\n\n### 9.3.1 Methods of File Objects\n\nThe\
    \ rest of the examples in this section will assume that a file object called `f`\
    \ has already been created.\n\nTo read a file's contents, call **f.read(size)**,\
    \ which reads some quantity of data and returns it as a string (in text mode)\
    \ or bytes object (in binary mode).\n\n**Size** is an optional numeric argument.\
    \ When the size is omitted or negative, the entire contents of the file will be\
    \ read and returned; it's your problem if the file is twice as large as your machine's\
    \ memory.\n\nOtherwise, at most size characters (in text mode) or size bytes (in\
    \ binary mode) are read and returned. If the end of the file has been reached,\
    \ **f.read()** will return an empty string (`''`).\n\n```python\n>>> f.read()\n\
    'This is the entire file.\\n'\n>>> f.read()\n''\n```\n\n**f.readline()** reads\
    \ a single line from the file. This method keeps on reading the next line, each\
    \ time it runs.\n\n```python\n>>> f.readline()\n'This is the first line of the\
    \ file.\\n'\n>>> f.readline()\n'Second line of the file\\n'\n>>> f.readline()\n\
    ''\n```\n\nFor reading lines from a file, you can loop over the file object. This\
    \ is memory efficient, fast, and leads to simple code:\n\n```python\n>>> for line\
    \ in f:\n...     print(line, end='')\n...\nThis is the first line of the file.\n\
    Second line of the file\n```\n\nIf you want to read all the lines of a file in\
    \ a list you can also use **list(f)** or **f.readlines()**.\n\n**f.write(string)**\
    \ writes the contents of *string* to the file, returning the number of characters\
    \ written.\n\n```python\n>>> f.write('This is a test\\n')\n15\n```\n\nOther types\
    \ of objects need to be converted – either to a string (in text mode) or a bytes\
    \ object (in binary mode) – before writing them:\n\n```python\n>>> s = str(value)\
    \  # convert the tuple to string\n>>> f.write(s)\n18\n```\n\n### 9.3.2 Creating\
    \ a file and Writing in it\n\nWe have seen above, how to open, read, and write\
    \ a file in python. I invite you to try a very easy example with me here. We will\
    \ create a file, write some text into it, close it, and then open the file to\
    \ read it here.\n\n```python\nIn [28]: # writing some text and passing it to a\
    \ variable\n         story = '''\nLets write a small story.\nThere was a curious\
    \ student. He wanted to learn Python.\nHis age was... Well, how does it matter.\n\
    One can be student at any age.\nLets say, he was a good student and within a short\
    \ time, learnt all about programming and python. He combined that with his business\
    \ acumen, and became a good data scientist.\n'''\n\n         # Creating a new\
    \ text file\n         f = open(\"small_story.txt\", mode=\"w\")\n```\n\nAs we\
    \ ran the above line of code, we created a new file named `small_story.txt`. You\
    \ may go in your base folder and see it for yourself. That will be a blank file\
    \ as of now because we have not written anything in the file yet.\n\nLet's write\
    \ in the file now. We will use our story we just wrote above, and write that text\
    \ into our newly created file.\n\n```python\nIn [29]: # writing text \"story\"\
    \ in the file \"f\"\n         f.write(story)  # the result gives the number of\
    \ characters written on the file \"f\"\n```\n\n```\nOut[29]: 337\n```\n\n```python\n\
    In [30]: f.close()\n```\n\n### 9.3.3 Opening a file and Reading its contents\n\
    \nIt's interesting to see how the same function creates the file and opens it\
    \ too. Only difference if you notice carefully, is of the \"mode=\". The details\
    \ of which are already described in the table above.\n\n```python\nIn [31]: #\
    \ default open is read only\n         f = open(\"small_story.txt\", mode='r')\n\
    ```\n\n```python\nIn [32]: # now only calling the variable by its name, will not\
    \ give the contents of the file.\n         # It will only give the memory location\
    \ of the file.\n         f\n```\n\n```\nOut[32]: <_io.TextIOWrapper name='small_story.txt'\
    \ mode='r' encoding='cp1252'>\n```\n\nTo read the contents of the file, use the\
    \ `read()` method.\n\n```python\nIn [33]: f.read()\n```\n\n```\nOut[33]: '\\nLets\
    \ write a small story.\\nThere was a curious student. He wanted to learn Python.\
    \ \\nHis age was... Well, how does it matter. One can be student at any age. \\\
    nLets say, he was a good student and within a short time, learnt all about \\\
    nprogramming and python. He combined that with his business acumen, and became\
    \ \\na good data scientist.\\n'\n```\n\nWe can also pass the contents to a variable.\n\
    \n### 9.3.4 Reading Line by Line\n\nWe can read the content, one line at a time.\n\
    \n```python\nIn [34]: f = open(\"small_story.txt\")\n         f.readline()\n```\n\
    \n```\nOut[34]: '\\n'\n```\n\n```python\nIn [35]: f.readline()\n```\n\n```\nOut[35]:\
    \ 'Lets write a small story.\\n'\n```\n\n```python\nIn [36]: f.readline(12)\n\
    ```"
  mdcn: "## 9.2.1.4 str() 与 repr()\n\n在 Python 中，`str()` 和 `repr()` 都用于获取对象的字符串表示。请看下面示例中的区别：\n\
    \n```python\nIn [23]: s = 'Hello, Geeks.'\n         print(str(s))\n         print(str(3.0/11.0))\n\
    ```\n\n```\nHello, Geeks.\n0.2727272727272727\n```\n\n```python\nIn [24]: s =\
    \ 'Hello, Geeks.'\n         print(repr(s))\n         print(repr(3.0/11.0))\n```\n\
    \n```\n'Hello, Geeks.'\n0.2727272727272727\n```\n\n从上面的输出可以看出，如果使用 `repr()` 函数打印字符串，它会带有一对引号。\n\
    \n以下是它们的区别：\n- **str()** 用于为最终用户创建输出，而 **repr()** 主要用于调试和开发。\n- **repr** 的目标是**明确无误**，而\
    \ **str** 的目标是**可读性**。例如，如果我们怀疑一个浮点数有微小的舍入误差，**repr** 会显示出来，而 **str** 可能不会。\n\
    - **repr()** 计算对象的“**官方**”字符串表示（一种包含对象所有信息的表示），而 **str()** 用于计算对象的“**非正式**”字符串表示（一种对打印对象有用的表示）。\n\
    \n让我们通过一个例子来理解：\n\n```python\nIn [25]: import datetime\n         today = datetime.datetime.now()\n\
    \         # 打印日期时间对象的可读格式\n         print(str(today))\n         # 打印日期时间对象的官方格式\n\
    \         print(repr(today))\n```\n\n```\n2020-05-31 17:26:36.783561\ndatetime.datetime(2020,\
    \ 5, 31, 17, 26, 36, 783561)\n```\n\n**str()** 以用户能理解日期和时间的方式显示今天的日期。\n\n**repr()**\
    \ 打印日期时间对象的“官方”表示（意味着使用这个“官方”字符串表示我们可以重建该对象）。\n\n## 9.2.1.5 旧式字符串格式化\n\n`%` 运算符也可用于字符串格式化。它解释左侧参数的方式类似于\
    \ `sprintf()` 风格的格式字符串，该字符串将应用于右侧参数，并返回此格式化操作产生的字符串。例如：\n\n```python\nIn [26]:\
    \ import math\n         print('The value of pi is approximately %abs.' % math.pi)\n\
    ```\n\n```\nThe value of pi is approximately 3.141592653589793bs.\n```\n\n```python\n\
    In [27]: import math\n         print('The value of pi is approximately %.3f.'\
    \ % math.pi)\n```\n\n```\nThe value of pi is approximately 3.142.\n```\n\n## 9.3\
    \ 读写文件\n\n**open()** 返回一个文件对象，最常与两个参数一起使用：**open(filename, mode)**。\n\n```python\n\
    f = open('workfile', 'w')\n```\n\n第一个参数是包含文件名的字符串。第二个参数是另一个字符串，包含几个描述文件将如何使用的字符。模式可以是：\n\
    - `'r'` 表示文件将只被读取，\n- `'w'` 表示只写入（同名的现有文件将被擦除），\n- `'a'` 打开文件用于追加；任何写入文件的数据都会自动添加到末尾。\n\
    - `'r+'` 打开文件用于读写。\n\n模式参数是可选的；如果省略，则假定为 `'r'`。\n\n通常，文件以文本模式打开，这意味着你从文件读取字符串和向文件写入字符串，这些字符串以特定编码进行编码。\n\
    \n**open()** 的完整语法如下：\n```python\nopen(file, mode='r', buffering=-1, encoding=None,\
    \ errors=None, newline=None, closefd=True, opener=None)\n```\n\n*mode* 中的默认选项是\
    \ `'r'`。请查看下表中的所有其他选项。\n\n| 字符 | 含义 |\n| :--- | :--- |\n| 'r' | 打开用于读取（默认） |\n\
