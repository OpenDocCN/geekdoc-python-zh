    \ ```python\n    >>> plot(x1, y1, 'g^', x2, y2, 'g-')\n    ```\n    在这种情况下，任何额外的关键字参数都适用于所有数据集。此外，此语法不能与\
    \ `data` 参数结合使用。\n\n## 20.7.3 设置样式格式\n对于每一对 `x`、`y` 参数，有一个可选的第三个参数，即格式字符串，用于指示绘图的颜色和线型。格式字符串的字母和符号来自\
