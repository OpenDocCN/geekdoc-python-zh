    \ think of the search for attributes inherited from a parent class as depth-first,\
    \ left-to-right, not searching twice in the same class where there is an overlap\
    \ in the hierarchy. Thus, if an attribute is not found in DerivedClassName, it\
    \ is searched for in Base1, then (recursively) in the base classes of Base1, and\
    \ if it was not found there, it was searched for in Base2, and so on.\n\n```\n\
