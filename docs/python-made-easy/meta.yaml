    ...

    229     True

    230     True

    231     True

    232     True

    233     True

    Name: class, Length: 234, dtype: bool

    ```


    Also, notice that this series is of the same length as the original DataFrame
    object. It shows that for every column, there is one **True** or **False** value.


    Now, such a Series of boolean values can be used to filter the DataFrame by putting
    it in between the selection brackets []. Only rows for which the value is **True**
    will be selected.


    This way, only the rows where the car type or "class" was "midsize" is selected,
    and now it''s a new DataFrame called "midsize". Let us see how many midsize cars
