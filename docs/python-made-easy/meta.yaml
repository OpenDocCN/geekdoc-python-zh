    n a, b = 0, 1 while a < n: print(a, end='' '') a, b = b, a+b print() def fib2(n):
    # return Fibonacci series up to n result = [] a, b = 0, 1 while a < n: result.append(a)
    a, b = b, a+b return result

    ```


    Now let me explain what we just did.


    We created a module, named "**fibo**".


    This module, *fibo* has two user defined functions in it. In essence, we could
    have defined the functions "**fib()**" and "**fib2()**" here as well. But as I
    said earlier, they would have been lost as soon as we close the interpreter.


    What if we want to use these functions regularly?


    We create a script, save it with a "filename" and file extension ".py", and voila...
    There''s your new module. Ready to be used at your'
