    \ at a time. Normally a function is somewhat more complex.\n\nNow we will get\
    \ to know other aspects of user-defined functions.\n\n### 6.4.3 Setting Parameters\
    \ and arguments\n\nYou are thirsty, and when you go to a lemonade (nimbu-pani\
