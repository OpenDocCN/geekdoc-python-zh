    # 13.6 Packages The package is a collection of Modules.


    Packages can be easily understood with the analogy of how we store our data on
    our computers. We use different kinds of folders (or directories) for different
    types of files. E.g. we have music files in one folder, and photos in another.
    We may have subfolders within the main folders. Analogous to this, Python has
    Packages for folders (or directories) and modules for files.


    As our application program (or project) grows larger with lots of modules, we
    place similar modules in one package and different modules in different packages.
    This makes the project manageable and conceptually clear.


    Similarly, as the directory can have subdirectories and files, the same way, packages
    can have sub-packages and modules. A directory must contain a file named **\_\_init\_\_.py**
    for python to treat it as a package. This file contains the initialization code
    for that package.


    Packages are a way of structuring many packages and modules which helps in a well-organized
    hierarchy of data set, making the directories and modules easy to access.


    Packages are a way of structuring Python''s module namespace by using "dotted
    module names". For example, the module name **A.B**'
