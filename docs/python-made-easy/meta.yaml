    \n**a** 是要被重塑的数组。\n\n**newshape:** 是你想要的新形状。你可以指定一个整数或一个整数元组。如果你指定一个整数，结果将是一个该长度的数组。形状应与原始形状兼容。\n\
    \n**order:** C 表示使用类似 C（C 编程语言，也是默认值）的索引顺序读写元素，F 表示使用类似 Fortran 的索引顺序读写元素。（这是一个可选参数，不需要指定。）\n\
    \n### 为数组添加轴\n\n可以使用 **np.newaxis** 和 **np.expand_dims()** 来增加数组的维度。\n\n使用 **np.newaxis**\
    \ 每使用一次，就会使你的数组维度增加一维。这意味着一个 **1D** 数组将变成一个 **2D** 数组，一个 **2D** 数组将变成一个 **3D**\
    \ 数组，依此类推。\n\n对于我们的例子，我们从这个数组开始：\n\n```python\nIn [46]: a = np.array([1, 2, 3,\
