    # 6.4.1 Why Create Functions?


    A natural question comes to mind, why shall we write separate functions at all?
    Why not put the entire logic into one function? Well, the following points may
    clarify the issue better.


    +   - By writing functions, users avoid rewriting the same code over and over.
    Suppose your program has a code chunk that calculates the "rate of interest".
    If later in the program you want to calculate the rate of interest for a different
    principal amount and time period, you will not like it if you have to write the
    same instructions all over again. Instead, you would prefer to jump to a "chunk
    of code" that calculates interest and then jump back to the place from where you
    left off. This chunk of code is nothing but a function.

    - Writing different functions rather than combining all logic in one is a better
    approach because it gives a modular structure to the program. Different functions
    can be used in the same situations'
