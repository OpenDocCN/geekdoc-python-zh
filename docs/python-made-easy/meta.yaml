- md: "## 8.4 Sets\n\nPython also includes a data type for sets. A set is an unordered\
    \ collection with no duplicate elements. Basic uses include membership testing\
    \ and eliminating duplicate entries. Set objects also support mathematical operations\
    \ like union, intersection, difference, and symmetric difference.\n\n**Definition:**\
    \ A Set is an unordered collection data type that is iterable, mutable, and has\
    \ no duplicate elements. Python's set class represents the mathematical notion\
    \ of a set.<sup>41</sup>\n\nAs the sets are unordered, the items in sets cannot\
    \ be accessed through reference to an INDEX.\n\nCurly braces or the **set()**\
    \ function can be used to create sets.\n\n**Note:** To create an empty set you\
    \ have to use **set()**, not **{}**; the latter creates an empty dictionary, a\
    \ data structure that we discuss in the next section.\n\n```\nIn [58]: colours\
    \ = {'red', 'black','blue','orange',\n            'red', 'pink', 'white', 'black'}\n\
    \n        # in the colours set, there are some\n        # duplicates when we created\
    \ the set.\n        #See how they are removed when the set is\n        # called\
    \ or printed colours\n```\n\n```\nOut[58]: {'black', 'blue', 'orange', 'pink',\
    \ 'red',\n          'white'}\n```\n\n```\nIn [59]: # fast membership testing for\
    \ sets 'red' in\n        colours\n```\n\n```\nOut[59]: True\n```\n\n```\nIn [60]:\
    \ 'purple' in colours\n```\n\n```\nOut[60]: False\n```\n\n### 8.4.1 Demonstration\
    \ of set operations\n\nThe sets support the set operations of mathematical sets.\n\
    \n```\nIn [61]: # Demonstrate set operations on unique\n        letters from two\
    \ words a =\n        set('abracadabra') b = set('alacazam')\n```\n\n```\nIn [62]:\
    \ a # unique letters in a\n```\n\n```\nOut[62]: {'a', 'b', 'c', 'd', 'r'}\n```\n\
    \n```\nIn [63]: b # unique letters in b\n```\n\n```\nOut[63]: {'a', 'c', 'l',\
    \ 'm', 'z'}\n```\n\n```\nIn [64]: # just for comparison, what happens in a\nlist\
    \ for the same text, and how sets weed\nout duplicates?\n\ntriallist = list('abracadabra')\
    \ triallist #\nall the alphabets of 'abracadabra' are\nretained as it is and in\
    \ order of\noccurrence in a list\n```\n\n```\nOut[64]: ['a', 'b', 'r', 'a', 'c',\
    \ 'a', 'd', 'a',\n'b', 'r', 'a']\n```\n\n```\nIn [65]: a - b # Letters in a but\
    \ not in b\n```\n\n```\nOut[65]: {'b', 'd', 'r'}\n```\n\n```\nIn [66]: a | b #\
    \ Letters in a or b or both\n```\n\n```\nOut[66]: {'a', 'b', 'c', 'd', 'l', 'm',\
    \ 'r', 'z'}\n```\n\n```\nIn [67]: a & b # Letters in both a and b\n```\n\n```\n\
    Out[67]: {'a', 'c'}\n```\n\n```\nIn [68]: a ^ b # letters in a or b but not both\n\
    Out[68]: {'b', 'd', 'l', 'm', 'r', 'z'}\n```\n\nSimilarly to list comprehensions,\
    \ set comprehensions are also supported:\n\n```\nIn [69]: a = {x for x in 'abracadabra'\
    \ if x not in 'abc'}\na\nOut[69]: {'d', 'r'}\n```\n\n### 8.4.2 Set Methods\n\n\
    Almost all list methods are also applicable to sets. Sets are not ordered, hence\
    \ methods using index do not apply to sets.\n\nI want you to try all the list\
    \ methods on a set, and see for yourself what a set can be used, iterated, and\
    \ modified.\n\nBelow are the Methods for sets, and you may notice, there are additional\
    \ methods, which are based on mathematical set operations.<sup>42</sup>\n\n| Method\
    \ | Description |\n|---|---|\n| add() | Adds an element to the set |\n| copy()\
    \ | Returns a copy of the set |\n| clear() | Removes all the elements from the\
    \ set |\n| discard() | Remove the specified item |\n| pop() | Removes an element\
    \ from the set |\n| remove() | Removes the specified element |\n| symmetric_difference()\
    \ | Returns a set with the symmetric differences of two sets |\n| symmetric_difference_update()\
    \ | inserts the symmetric differences from this set and another |\n| union() |\
    \ Return a set containing the union of sets |\n| difference() | Returns a set\
    \ containing the difference between two or more sets |\n| difference_update()\
    \ | Removes the items in this set that are also included in another, specified\
    \ set |\n| update() | Update the set with the union of this set and others |\n\
    | intersection() | Returns a set, that is the intersection of two other sets |\n\
    | intersection_update() | Removes the items in this set that are not present in\
    \ other, specified set(s) |\n| isdisjoint() | Returns whether two sets have an\
    \ intersection or not |\n| issubset() | Returns whether another set contains this\
    \ set or not |\n| issuperset() | Returns whether this set contains another set\
    \ or not |\n\n## 8.5 Dictionaries\n\nDictionary is another built-in data type\
    \ in Python. This is an unordered collection of data values.\n\nIn a real-life\
    \ dictionary, there is a \"Key\", i.e. the word or item which is explained in\
