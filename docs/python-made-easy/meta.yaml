    \ np.meshgrid(X, Y)\nR = np.sqrt(X**2 + Y**2)\nZ = np.sin(R)\n\n# Plot the surface.\n\
    surf = ax.plot_surface(X, Y, Z, cmap=cm.coolwarm,\n                       linewidth=0,\
    \ antialiased=False)\n\n# Customize the z-axis.\nax.set_zlim(-1.01, 1.01)\nax.zaxis.set_major_locator(LinearLocator(10))\n\
    ax.zaxis.set_major_formatter(FormatStrFormatter('%.02f'))\n\n# Add a color bar\
    \ that maps values to colors.\nfig.colorbar(surf, shrink=0.5, aspect=5)\n\nplt.show()\n\
    ```\n\n![](img/6423827abd996243bbfb7c0196b2aea4_634_0.png)\n\n## 21.9.4 饼图\n\n\
    `pie()`函数允许你创建饼图。可选功能包括自动标注面积百分比、将一个或多个楔形从饼图中心分离出来以及阴影效果。仔细查看附带的代码，它仅用几行代码就生成了此图。\n\
    \n除了基本的饼图外，此演示还展示了一些可选功能：\n- 切片标签\n- 自动标注百分比\n- 使用\"explode\"偏移切片\n- 投影阴影\n- 自定义起始角度\n\
    \n关于自定义起始角度的说明：默认的**startangle**为0，这将使\"Frogs\"切片从正x轴开始。此示例设置startangle = 90，使所有内容逆时针旋转90度，青蛙切片从正y轴开始。\n\
    \n```python\nimport matplotlib.pyplot as plt\n\n# Pie chart, where the slices\
    \ will be ordered and plotted counter-clockwise:\nlabels = 'Frogs', 'Hogs', 'Dogs',\
    \ 'Logs'\nsizes = [15, 30, 45, 10]\nexplode = (0, 0.1, 0, 0)  # only \"explode\"\
    \ the 2nd slice (i.e. 'Hogs')\n\nfig1, ax1 = plt.subplots()\nax1.pie(sizes, explode=explode,\
    \ labels=labels, autopct='%1.1f%%',\n        shadow=True, startangle=90)\nax1.axis('equal')\
    \  # Equal aspect ratio ensures that pie is drawn as a circle.\n\nplt.show()\n\
    ```\n\n![](img/6423827abd996243bbfb7c0196b2aea4_636_0.png)\n\n图 21-14\n\n## 21.9.5\
    \ 子图示例\n\n许多绘图类型可以在一个图形中组合，以创建强大而灵活的数据表示。\n\n```python\nimport matplotlib.pyplot\
    \ as plt\nimport numpy as np\n\nnp.random.seed(19680801)\ndata = np.random.randn(2,\
    \ 100)\n\nfig, axs = plt.subplots(2, 2, figsize=(5, 5))\naxs[0, 0].hist(data[0])\n\
    axs[1, 0].scatter(data[0], data[1])\naxs[0, 1].plot(data[0], data[1])\naxs[1,\
    \ 1].hist2d(data[0], data[1])\n\nplt.show()\n```\n\n![](img/6423827abd996243bbfb7c0196b2aea4_637_0.png)\n\
    \n图 21-15\n\n## 21.10 总结\n\n我们在本章学习了可视化的许多方面，这张图片总结了所有内容。这张图片由[pbpython.com](http://pbpython.com)提供，它也启发了本章的概念，并且已被包含在matplotlib官方教程中。\n\
    \n下图中变量的名称可能会有所不同。\n\n## matplotlib自定义示例\n\n```python\nfig, (ax0, ax1) = plt.subplots(nrows=1,\
    \ ncols=2, sharey=True, figsize=(7, 4))\n\nfig.suptitle('2014 Sales Analysis',\
    \ fontsize=14, fontweight='bold')\n```\n\n```python\ntop_10.plot(kind='barh',\
    \ y='Sales',\n            x='Name', ax=ax0)\n```\n\n```python\ntop_10.plot(kind='barh',\
    \ y='Purchases',\n            x='Name', ax=ax1)\n```\n\n![](img/6423827abd996243bbfb7c0196b2aea4_638_0.png)\n\
    \n```python\nax1.axvline(x=avg, color='b',\n           label='Average',\n    \
    \       linestyle='--',\n           linewidth=1)\n```\n\n```python\nax0.set_xlim([-10000,\
    \ 140000])\n```\n\n```python\nax0.set(title='Revenue', xlabel='Total Revenue',\
    \ ylabel='Customers')\n```\n\n```python\nax1.set(title='Units',\n        xlabel='Total\
    \ Units', ylabel='')\n```\n\n```python\nfig.savefig('sales.png', transparent=False,\
    \ dpi=80, bbox_inches=\"tight\")\n```\n\npbpython.com\n\n图 21-16 matplotlib-pbpython-example.png\n\
