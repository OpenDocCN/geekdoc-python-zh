    We can filter rows based on some criteria, expressed by operators, expressing
    relationships.


    E.g. if we want to filter only "midsize" cars.


    ```

    In [27]: midsize = mpg[mpg["class"] == "midsize"]


    midsize.head()

    ```


    Out[27]:


    | | manufacturer | model | displ | year | cyl | trans | drv | cty | hwy | fl |
    class |

    |---|---|---|---|---|---|---|---|---|---|---|---|

    | 15 | audi | a6 quattro | 2.8 | 1999 | 6 | auto(l5) | 4 | 15 | 24 | p | midsize
    |

    | 16 | audi | a6 quattro | 3.1 | 2008 | 6 | auto(s6) | 4 | 17 | 25 | p | midsize
    |

    | 17 | audi | a6 quattro | 4.2 | 2008 | 8 | auto(s6) | 4 | 16 | 23 | p | midsize
    |

    | 32 | chevrolet | malibu | 2.4 | 1999 | 4 | auto(l4) | f | 19 | 27 | r | midsize
    |

    | 33 | chevrolet | malibu | 2.4 | 2008 | 4 | auto(l4) | f | 22 | 30 | r | midsize
    |


    Let''s understand what happened here.


    When we passed the condition, **mpg["class"] == "midsize"**, it gives a pandas
    series of boolean values. In other words, it checks the condition for each row
    in the column **class** and returns **True** or **False**, based on if the condition
    is met or not. So it returns **True** for each column which has "midsize" and
    **False** if it''s otherwise.


    Let us see it below:


    ```

    In [28]: mpg["class"] == "midsize"

    ```'
