  mdcn: "## 算法的现实示例\n\n编写一个泡茶的算法。原料是水、糖、牛奶和茶叶，用于制作两杯茶。\n\n- 步骤 1：开始\n- 步骤 2：取一个装有一杯水的锅。\n\
    - 步骤 3：点燃炉灶，将锅放在上面。\n- 步骤 4：将水烧开。\n- 步骤 5：在沸水中加入两汤匙糖和两汤匙茶叶。\n- 步骤 6：向沸腾的混合物中加入一杯牛奶。\n\
    - 步骤 7：将锅中的内容物煮沸一分钟。\n- 步骤 8：关闭炉灶。\n- 步骤 9：用筛子过滤掉茶叶。\n- 步骤 10：将茶倒入杯中并上桌。\n- 步骤\
    \ 11：停止\n\n## 算法的计算示例\n\n编写一个计算 2+2 得到结果 4 的算法。\n\n- 步骤 1：开始\n- 步骤 2：输入 2 + 2\n\
    - 步骤 3：按回车键\n- 步骤 4：停止\n\n算法由 3 种语句组成。任何算法中都可以存在这 3 种语句的组合。\n\n1. 顺序语句\n2. 选择语句\n\
    3. 循环或迭代语句\n\n### 1.3.2.1 顺序语句\n\n在这些程序中，一个语句在另一个语句之后按顺序执行。\n\n上面的两个例子，泡茶和计算 2+2，都是顺序语句的例子。让我们再看一个例子。\n\
    \n**示例** 计算一个人的年龄，已知其出生年份。\n\n- 步骤 1：开始\n- 步骤 2：获取出生年份并存储在 YOB 中。\n- 步骤 3：获取当前年份并存储在\
    \ CY 中。\n- 步骤 4：用 CY 减去 YOB 并将结果保存在 Age 中。\n- 步骤 5：打印 Age。\n- 步骤 6：停止\n\n### 1.3.2.2\
    \ 选择语句\n\n在这些程序中，程序的某些部分根据某个条件是否满足来执行。如果条件满足，计算机将执行程序的一部分；如果条件不满足，则执行程序的另一部分。\n\
    \n**示例** 编写一个算法来检查一个人是否发烧。条件是，如果温度高于 99 华氏度，则为发烧。\n\n- 步骤 1：开始\n- 步骤 2：获取温度并存储在\
    \ TEMP 中。\n- 步骤 3：检查 TEMP 值。如果大于 99 华氏度，则转到步骤 4，否则转到步骤 5。\n- 步骤 4：打印 \"He has\
    \ Fever\" 并转到步骤 6。\n- 步骤 5：打印 \"He does not have Fever\"。\n- 步骤 6：停止\n\n### 1.3.2.3\
    \ 循环或迭代语句\n\n在某些程序中，某些步骤根据条件测试被一遍又一遍地执行。这些重复称为迭代。迭代使用一种或多种循环技术完成。因此，这类程序被称为循环或迭代语句。\n\
    \n**示例** 打印从 1 到 10 的所有数字。\n\n- 步骤 1：开始\n- 步骤 2：将 1 存储在 i 中。\n- 步骤 3：检查 i 的值是否\
    \ <= 10。如果是，转到步骤 4。如果为假，转到步骤 7。\n- 步骤 4：打印 i。\n- 步骤 5：将 i 的值增加 1。\n- 步骤 6：转到步骤\
    \ 3。\n- 步骤 7：停止\n\n在这个例子中，步骤 3 到 5 被迭代，直到步骤 3 中的条件满足。一旦返回假，循环结束。\n\n### 1.3.3\
    \ 流程图\n\n算法可以使用一些符号以图形形式编写。这种图形表示称为流程图。\n\n流程图有一些用于表示功能的标准符号。下表列出了这些符号。\n\n| 符号\
