- md: "## 12.2.2 The AssertionError Exception\n\nInstead of waiting for a program\
    \ to fail midway, we can make an assertion in Python. We **assert** that a certain\
    \ condition is met. If the condition which we are asserting turns out to be True,\
    \ the program can continue. But in case the condition turns out to be False, you\
    \ can have the program throw an **AssertionError** exception.\n\n```\nNameError\
    \ Traceback (most recent call last)\n<ipython-input-7-72c183edb298> in <module>\n\
    ----> 1 raise NameError('HiThere')\n\nNameError: HiThere\n```\n\nNotice in the\
    \ examples above that **raise** is forcing an exception, and not any exception,\
    \ but the one \"specified\" to occur. The sole argument to raise indicates the\
    \ exception to be raised. This must be either an exception instance or an exception\
    \ class (a class that derives from Exception).\n\n```\nIn [8]: x = \"Python\"\n\
    \n#if condition returns True, then nothing happens:\n\nassert x == \"Python\"\n\
    ```\n\n```\nIn [9]: #if condition returns False, AssertionError is raised:\n\n\
    assert x == \"Julia\"\n```\n\n```\nAssertionError Traceback (most recent call\
    \ last)\n<ipython-input-9-28c8b221d28d> in <module>\n      1 #if condition returns\
    \ False, AssertionError is raised:\n      2 \n----> 3 assert x == \"Julia\"\n\n\
    AssertionError:\n```\n\nThe assert keyword is used when debugging code.\nThe assert\
    \ keyword lets you test if a condition in your code returns True, if not, the\
    \ program will raise an **AssertionError**.\nYou can write a message to be written\
    \ if the code returns False, check the example below:\n\n```\nIn [10]: x = \"\
    Python\"\n\n        #if condition returns False, AssertionError is raised:\n\n\
    \        assert x == \"Julia\", \"x should be 'Python'\"\n```\n\n```\nAssertionError\
    \ Traceback (most recent call last)\n<ipython-input-10-c4bdd07152aa> in <module>\n\
    \      3 #if condition returns False, AssertionError is raised:\n      4 \n---->\
    \ 5 assert x == \"Julia\", \"x should be 'Python'\"\n\nAssertionError: x should\
    \ be 'Python'\n```\n\n## 12.3 Handling Exceptions\n\n### 12.3.1 try and except\
    \ statements\n\nThe **try** and **except** block in Python are used to catch and\
    \ handle exceptions respectively. Python executes code that follows the try statement\
    \ as a \"normal\" part of the program. The code that follows the **except** statement\
    \ is the program's response to any exceptions in the preceding **try** clause.\n\
    \n![](img/6423827abd996243bbfb7c0196b2aea4_401_0.png)\n\nFigure 12-1 try and except\
    \ block of code\n\nAs we saw earlier, Python will throw an exception error when\
    \ syntactically correct code runs into an error. If unhandled, this exception\
    \ error will crash the program. How your program responds to exceptions is determined\
    \ by the **except** clause.\n\nThe following example can help you understand the\
    \ **try** and **except** block:\n\n```\nIn [12]: while True:\n    try:\n     \
    \   x = int(input(\"Please enter a number: \"))\n        break\n    except ValueError:\n\
    \        print(\"Oops! That was no valid number. Try again...\")\n```\n\n```\n\
    Please enter a number: T\nOops! That was no valid number. Try again...\nPlease\
    \ enter a number: 5\n```\n\nThe try statement works as follows.\n\n1. First, the\
    \ **try** clause (the statement(s) between the **try** and **except** keywords)\
    \ is executed.\n2. If no exception occurs, the **except** clause is skipped and\
    \ execution of the **try** statement is finished.\n3. If an exception occurs during\
    \ the execution of the **try** clause, the rest of the clause is skipped. Then\
    \ if its type matches the exception named after the **except** keyword, the **except**\
    \ clause is executed, and then execution continues after the **try** statement.\n\
    4. If an exception occurs which does not match the exception named in the **except**\
    \ clause, it is passed on to outer **try** statements; if no handler is found,\
    \ it is an unhandled exception and execution stops with a message as shown above.\n\
    \nA **try** statement may have more than one **except** clause, to specify handlers\
    \ for different exceptions. At most one handler will be executed. Handlers only\
    \ handle exceptions that occur in the corresponding **try** clause, not in other\
    \ handlers of the same **try** statement.\n\nAn **except** clause may name multiple\
    \ exceptions as a parenthesized tuple, for example:\n\n```\nexcept (RuntimeError,\
    \ TypeError, NameError):\n```\n\n**Warning**: Catching Exception hides all errors,\
    \ even those which are completely unexpected. This is why you should avoid bare\
    \ **except** clauses in your Python programs. Instead, you'll want to refer to\
    \ specific exception classes you want to catch and handle.\n\n### 12.3.2 The else\
    \ clause\n\nThe **try-except** statement has an optional else clause, which, when\
    \ present, must follow all except clauses. It is useful for code that must be\
    \ executed if the try clause does not raise an exception.\n\nIn other words, using\
    \ the **else** block, you can instruct a program to execute a certain block of\
    \ code, only in case of no exceptions. The use of the **else** clause is better\
    \ than adding additional code to the **try** clause because it avoids accidentally\
    \ catching an exception that wasn't raised by the code being protected by the\
    \ **try-except** statement.\n\n![](img/6423827abd996243bbfb7c0196b2aea4_403_0.png)\n\
    \n```\nIn [13]: import sys\n    for arg in sys.argv[1:]:\n        try:\n     \
    \       f = open(arg, 'r')\n        except OSError:\n            print('cannot\
    \ open', arg)\n        else:\n            print(arg, 'has',\n                \
    \  len(f.readlines()), 'lines')\n                  f.close()\n```\n\n```\ncannot\
    \ open -f\nC:\\Users\\nilabhnishchhal\\AppData\\Roaming\\jupyter\\runtime\\kernel-39ffd819-807e-\n\
    4869-95d1-683d61028d75.json has 12 lines\n```\n\nException handlers don't just\
    \ handle exceptions if they occur immediately in the try clause, but also if they\
    \ occur inside functions that are called (even indirectly) in the try clause.\
    \ For example:\n\n```\nIn [14]: def this_fails():\n            x = 1/0\n     \
    \   try:\n            this_fails()\n        except ZeroDivisionError as err:\n\
    \            print('Handling run-time error:', err)\n```\n\n```\nHandling run-time\
    \ error: division by zero\n```\n\n## 12.4 Defining Clean-up Actions\n\nThe **try**\
    \ statement has another optional clause which is intended to define clean-up actions\
    \ that must be executed under all circumstances. For example:\n\n```\nIn [15]:\
    \ try:\n            raise KeyboardInterrupt\n        finally:\n            print('Goodbye,\
    \ world! ')\n```\n\n```\nGoodbye, world!\n--------------------------------------------------------------------------------\n\
    KeyboardInterrupt                Traceback (most recent call last)\n<ipython-input-15-7786db0b9fd1>\
    \ in <module>\n      1 try:\n----> 2     raise KeyboardInterrupt\n      3 finally:\n\
    \      4     print('Goodbye, world!')\n\nKeyboardInterrupt:\n```\n\nNotice that\
    \ though there is an exception, the last statement (in the **finally** block)\
    \ was executed.\n\n![](img/6423827abd996243bbfb7c0196b2aea4_405_0.png)\n\nIf a\
    \ **finally** clause is present, the **finally** clause will execute as the last\
    \ task before the **try** statement completes. The **finally** clause runs whether\
    \ or not the **try** statement produces an exception. The following points discuss\
    \ more complex cases when an exception occurs:\n\n1. If an exception occurs during\
    \ the execution of the **try** clause, the exception may be handled by an **except**\
    \ clause. If the exception is not handled by an **except** clause, the exception\
    \ is re-raised after the **finally** clause has been executed.\n2. An exception\
    \ could occur during the execution of an **except** or **else** clause. Again,\
    \ the exception is re-raised after the **finally** clause has been executed.\n\
    3. If the **try** statement reaches a **break, continue** or **return** statement,\
    \ the **finally** clause will execute just prior to the **break, continue** or\
    \ **return** statement’s execution.\n4. If a **finally** clause includes a **return**\
    \ statement, the returned value will be the one from the **finally** clause’s\
    \ **return** statement, not the value from the **try** clause’s **return** statement.\n\
    \n## 12.5 Summary\n\nIn this chapter, you noticed the difference between syntax\
    \ errors and exceptions, you also learned about various ways to raise, catch,\
    \ and handle exceptions in Python. In this chapter, you saw the following options:\n\
    \n- **raise** allows you to throw an exception at any time.\n- **assert** enables\
    \ you to verify if a certain condition is met or not. If the condition is not\
    \ met, it throws an exception.\n- With the **try** clause, all statements are\
    \ executed until the program encounters an exception.\n- If there are exceptions\
    \ encountered in the **try** clause, **except** catches and handles the exception(s)."
  mdcn: "## 12.2.2 AssertionError 异常\n\n与其等待程序在中途失败，我们可以在 Python 中进行断言。我们**断言**某个条件成立。如果我们断言的条件结果为\
    \ True，程序可以继续执行。但如果条件结果为 False，你可以让程序抛出一个 **AssertionError** 异常。\n\n```\nNameError\
    \ Traceback (most recent call last)\n<ipython-input-7-72c183edb298> in <module>\n\
    ----> 1 raise NameError('HiThere')\n\nNameError: HiThere\n```\n\n请注意上面的示例，**raise**\
    \ 是在强制引发一个异常，而且不是任何异常，而是“指定”要发生的异常。`raise` 的唯一参数指定了要引发的异常。这必须是一个异常实例或一个异常类（一个派生自\
    \ Exception 的类）。\n\n```\nIn [8]: x = \"Python\"\n\n#if condition returns True,\
    \ then nothing happens:\n\nassert x == \"Python\"\n```\n\n```\nIn [9]: #if condition\
    \ returns False, AssertionError is raised:\n\nassert x == \"Julia\"\n```\n\n```\n\
    AssertionError Traceback (most recent call last)\n<ipython-input-9-28c8b221d28d>\
    \ in <module>\n      1 #if condition returns False, AssertionError is raised:\n\
    \      2 \n----> 3 assert x == \"Julia\"\n\nAssertionError:\n```\n\n`assert` 关键字在调试代码时使用。\n\
    `assert` 关键字让你测试代码中的某个条件是否返回 True，如果不是，程序将引发一个 **AssertionError**。\n你可以编写一条消息，当代码返回\
    \ False 时显示，查看下面的示例：\n\n```\nIn [10]: x = \"Python\"\n\n        #if condition\
    \ returns False, AssertionError is raised:\n\n        assert x == \"Julia\", \"\
    x should be 'Python'\"\n```\n\n```\nAssertionError Traceback (most recent call\
    \ last)\n<ipython-input-10-c4bdd07152aa> in <module>\n      3 #if condition returns\
    \ False, AssertionError is raised:\n      4 \n----> 5 assert x == \"Julia\", \"\
    x should be 'Python'\"\n\nAssertionError: x should be 'Python'\n```\n\n## 12.3\
    \ 处理异常\n\n### 12.3.1 try 和 except 语句\n\nPython 中的 **try** 和 **except** 块分别用于捕获和处理异常。Python\
    \ 将 `try` 语句之后的代码作为程序的“正常”部分执行。**except** 语句之后的代码是程序对前面 **try** 子句中任何异常的响应。\n\n\
    ![](img/6423827abd996243bbfb7c0196b2aea4_401_0.png)\n\n图 12-1 try 和 except 代码块\n\
    \n正如我们之前看到的，当语法正确的代码运行时遇到错误，Python 会抛出异常错误。如果未处理，这个异常错误将导致程序崩溃。你的程序如何响应异常由 **except**\
    \ 子句决定。\n\n以下示例可以帮助你理解 **try** 和 **except** 块：\n\n```\nIn [12]: while True:\n\
    \    try:\n        x = int(input(\"Please enter a number: \"))\n        break\n\
    \    except ValueError:\n        print(\"Oops! That was no valid number. Try again...\"\
    )\n```\n\n```\nPlease enter a number: T\nOops! That was no valid number. Try again...\n\
    Please enter a number: 5\n```\n\n`try` 语句的工作原理如下。\n\n1. 首先，执行 **try** 子句（即 **try**\
    \ 和 **except** 关键字之间的语句）。\n2. 如果没有异常发生，则跳过 **except** 子句，`try` 语句执行完毕。\n3. 如果在执行\
    \ **try** 子句期间发生异常，则跳过该子句的其余部分。然后，如果其类型与 **except** 关键字后指定的异常匹配，则执行 **except**\
    \ 子句，然后继续执行 `try` 语句之后的代码。\n4. 如果发生的异常与 **except** 子句中指定的异常不匹配，则将其传递给外层的 **try**\
    \ 语句；如果没有找到处理程序，则它是一个未处理的异常，执行将停止并显示如上所示的消息。\n\n一个 `try` 语句可以有多个 **except** 子句，以指定不同异常的处理程序。最多执行一个处理程序。处理程序只处理在相应\
    \ **try** 子句中发生的异常，而不是同一 `try` 语句的其他处理程序中的异常。\n\n一个 **except** 子句可以将多个异常命名为一个带括号的元组，例如：\n\
    \n```\nexcept (RuntimeError, TypeError, NameError):\n```\n\n**警告**：捕获 Exception\
    \ 会隐藏所有错误，甚至是完全意想不到的错误。这就是为什么你应该避免在 Python 程序中使用裸 **except** 子句。相反，你应该引用你想要捕获和处理的具体异常类。\n\
    \n### 12.3.2 else 子句\n\n`try-except` 语句有一个可选的 else 子句，如果存在，必须跟在所有 except 子句之后。它对于必须在\
    \ try 子句未引发异常时执行的代码很有用。\n\n换句话说，使用 **else** 块，你可以指示程序仅在没有异常的情况下执行某个代码块。使用 **else**\
    \ 子句比在 **try** 子句中添加额外代码更好，因为它避免了意外捕获未被 `try-except` 语句保护的代码引发的异常。\n\n![](img/6423827abd996243bbfb7c0196b2aea4_403_0.png)\n\
    \n```\nIn [13]: import sys\n    for arg in sys.argv[1:]:\n        try:\n     \
    \       f = open(arg, 'r')\n        except OSError:\n            print('cannot\
    \ open', arg)\n        else:\n            print(arg, 'has',\n                \
    \  len(f.readlines()), 'lines')\n                  f.close()\n```\n\n```\ncannot\
    \ open -f\nC:\\Users\\nilabhnishchhal\\AppData\\Roaming\\jupyter\\runtime\\kernel-39ffd819-807e-\n\
    4869-95d1-683d61028d75.json has 12 lines\n```\n\n异常处理程序不仅处理在 try 子句中立即发生的异常，也处理在\
    \ try 子句中调用（即使是间接调用）的函数内部发生的异常。例如：\n\n```\nIn [14]: def this_fails():\n      \
    \      x = 1/0\n        try:\n            this_fails()\n        except ZeroDivisionError\
    \ as err:\n            print('Handling run-time error:', err)\n```\n\n```\nHandling\
    \ run-time error: division by zero\n```\n\n## 12.4 定义清理操作\n\n`try` 语句有另一个可选子句，旨在定义必须在所有情况下执行的清理操作。例如：\n\
