    # 本书的预期内容


    # 关于本书


    本书是编程和数据分析的入门书籍，使用 Python 作为初学者的首选语言。它教你如何在你的机器上安装 Python 和其他必要的软件，如何用 Python
    编写程序，并进一步教你使用 Python 编程语言制作自己的应用程序。本书还详细介绍了用于数据分析和可视化的 Python 库，如 Numpy、Pandas
    和 Matplotlib。你还将接触到 Python 的其他一些库，如用于图像修改的 Pillow、用于创建 GUI 的 Tkinter 以及用于与操作系统交互的
    OS。本书的核心是从基础到中级水平教授你 Python 语言，并在此过程中，重点是将 Python 基础知识应用于解决现实世界的问题。


    # 如何使用本书以获得最佳效果


    本书采用主动学习的方法。我为完全初学者编写了它，假设你没有任何编程经验。因此，从本书的最开始开始，并按照书中的建议安装软件和库。之后，在你选择的与 Python
    交互的软件上多加练习。我更喜欢使用 Jupyter Notebook，并强烈推荐它。


    你将学习如何在代码中编写注释的方法，这些注释被解释器视为“注释”。'
