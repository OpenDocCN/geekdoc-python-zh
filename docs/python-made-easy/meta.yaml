  md: '# 6.3.1 Some Built-in function Definitions There are some built-in functions,
    which we will be using more frequently than others. Let us see the definition
    of some such functions.


    Inside the parentheses, the type of object which goes in the function as an argument
    is mentioned.


    **abs(x)** Return the absolute value of a number. The argument may be an integer
    or a floating-point number. If the argument is a complex number, its magnitude
    is returned.


    **any(iterable)** Return True if any element of the iterable is true. If the iterable
    is empty, return False.


    **chr(i)** Return the string representing a character whose Unicode code point
    is the integer i. For example, chr(97) returns the string ''a'', while chr(8364)
    returns the string ''€''. This is the inverse of ord().


    **dir([object])** Without arguments, return the list of names in the current local
    scope. With an argument, attempt to return a list of valid attributes for that
    object.


    **float([x])** Return a floating point number constructed from a number or string
    x.


    **help([object])** Invoke the built-in help system. (This function is intended
    for interactive use.) If no argument is given, the interactive help system starts
    on the interpreter console. If the argument is a string, then the string is looked
    up as the name of a module, function, class, method, keyword, or documentation
    topic, and a help page is printed on the console. If the argument is any other
    kind of object, a help page on the object is generated.'
