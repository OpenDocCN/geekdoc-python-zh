    # 4.9 Order of Evaluation in Python


    You would remember the order of evaluation in a mathematical equation. BODMAS
    (Brackets, Of, Division, Multiplication, Addition, and Subtraction, in order from
    left to right).


    Similarly, Python has its own **Operator precedence**<sup>27</sup>


    The following table summarizes the operator precedence in Python, from lowest
    precedence (least binding) to highest precedence (most binding). Operators in
    the same box have the same precedence. Unless the syntax is explicitly given,
    operators are binary. Operators in the same box group left to right (except for
    exponentiation, which groups from right to left).


    | Operator | Description |

    |---|---|

    | lambda | Lambda expression |

    | if-else | Conditional expression |

    | or | Boolean OR |

    | and | Boolean AND |

    | not x | Boolean NOT |

    | in, not in, is, is not, <, <=, >, >=, !=, == | Comparisons, including membership
    tests and identity tests |

    | ^ | Bitwise XOR |

    | & | Bitwise AND |'
