    ## 2.7 IPyhton Qt Console<sup>17</sup>


    A rich Qt-based console for working with Jupyter kernels, supporting rich media
    output, session export, and more.


    The Qtconsole is a very lightweight application that largely feels like a terminal
    but provides several enhancements only possible in a GUI, such as inline figures,
    proper multiline editing with syntax highlighting, graphical call tips, and more.


    ![](img/6423827abd996243bbfb7c0196b2aea4_111_0.png)


    Figure 2-15 A Qt Console for IPython


    To get acquainted with the Qt console, type ? to see a quick introduction of its
    main features.


    The Qt frontend has hand-coded emacs-style bindings for text navigation. This
    is not yet configurable.


    The IPython Console allows you to execute commands and enter, interact with and
    visualize data inside any number of fully-featured IPython interpreters. Each
    console is executed in a separate process, allowing you to run scripts, interrupt
    execution and restart or terminate a shell without affecting the others and easily
    test your code in a clean environment without disrupting your primary session.


    > **Tip**


    Since the Qt console tries hard to behave like a terminal, by default it immediately
    executes single lines of input that are complete. If you want to force multiline
    input, hit Ctrl-Enter at the end of the first line instead of Enter, and it will
    open a new line for input. At any point in a multiline block, you can force its
    execution (without having to go to the bottom) with Shift-Enter.


