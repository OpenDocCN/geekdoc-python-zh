    \ 5 * 3 + 2 # result * divisor + remainder\nOut[9]: 17\n```\n\nWith Python, it\
    \ is possible to use the ** operator to calculate powers:\n\n```\nIn [10]: 5 **\
    \ 2 # 5 squared\nOut[10]: 25\n```\n\n```\nIn [11]: 2 ** 7 # 2 to the power of\
    \ 7\nOut[11]: 128\n```\n\nThe equal sign (=) is used to assign a value to a variable.\
    \ Afterward, no result is displayed before the next interactive prompt:\n\n```\n\
    In [12]: width = 20\n        height = 5 * 9\n```\n\n# Notice that here when we\
    \ run these lines, there will be no output.\n\n### 3.3.2 Strings\n\nBesides numbers,\
    \ Python can also manipulate strings, which can be expressed in several ways.\
    \ They can be enclosed in single quotes ('...') or double quotes (\"...\") with\
    \ the same result. \"\\\" can be used to escape quotes:\n\n```\nIn [13]: 'python\
    \ strings' #single quotes\nOut[13]: 'python strings'\nIn [14]: 'doesn\\'t' # use\
    \ \\ ' to escape the single quote...\nOut[14]: \"doesn't\"\nIn [15]: \"doesn't\"\
    \ # ...or use double quotes instead\nOut[15]: \"doesn't\"\n```\n\nIn the interactive\
    \ interpreter, the output string is enclosed in quotes and special characters\
    \ are escaped with backslashes. While this might sometimes look different from\
    \ the input (the enclosing quotes could change), the two strings are equivalent.\
    \ The string is enclosed in double-quotes if the string contains a single quote\
    \ and no double quotes, otherwise, it is enclosed in single quotes.\n\nThe **print()**\
    \ function produces a more readable output, by omitting the enclosing quotes and\
    \ by printing escaped and special characters:\n\n```\nIn [16]:  '\"Isn\\'t,\"\
    \ they said.'\n```\n\n```\nOut[16]:  '\"Isn\\'t,\" they said.'\n```\n\n```\nIn\
    \ [17]:  print('\"Isn\\'t,\" they said.')\n```\n\n```\n\"Isn't,\" they said.\n\
    ```\n\nIf you don't want characters prefaced by \"\\\" to be interpreted as special\
    \ characters, you can use raw strings by adding an r before the first quote:\n\
    \n```\nIn [18]:  print('C:\\some\\name') # here \\n means newline!\n```\n\n```\n\
    C:\\some ame\n```\n\n```\nIn [19]:  print(r'C:\\some\\name') # note the r before\
    \ the quote\n```\n\n```\nC:\\some\\name\n```\n\n### Concatenation and Repetition\n\
    \nStrings can be concatenated (glued together) with the + operator, and repeated\
    \ with *. To remember this, it is simple. + operator adds, and * operator multiplies\
    \ (see example)\n\n```\nIn [20]:  'a'+'b'\n```\n\n```\nOut[20]:  'ab'\n```\n\n\
    ```\nIn [21]:  't'*5\n```\n\n```\nOut[21]:  'ttttt'\n```\n\n```\nIn [22]:  'no'*3+'dip'\n\
    ```\n\n```\nOut[22]: 'nononodip'\n```\n\nTwo or more string literals (i.e. the\
    \ ones enclosed between quotes) next to each other are automatically concatenated.\n\
    \n```\nIn [23]: 'nil' 'abh'\n```\n\n```\nOut[23]: 'nilabh'\n```\n\nThis feature\
    \ is particularly useful when you want to break long strings\n\n```\nIn [24]:\
    \ text = ('Put several strings within parentheses-'\n'-to have them joined together.')\n\
    text\n```\n\n```\nOut[24]: 'Put several strings within parentheses--to have them\
    \ joined together.'\n```\n\n### 3.3.2.2 Indexing\n\nStrings can be indexed (subscripted),\
    \ with the first character having index 0. There is no separate character type;\
    \ a character is simply a string of size one.\n\n| p | y | t | h | o | n |\n|---|---|---|---|---|---|\n\
    | 0 | 1 | 2 | 3 | 4 | 5 |\n| -6 | -5 | -4 | -3 | -2 | -1 |\n\nThe first row of\
    \ numbers gives the position of the indices 0...6 in the string; the second row\
    \ gives the corresponding negative indices. The slice from i to j consists of\
    \ all characters between the edges labeled i and j, respectively.\n\n```\nIn [25]:\
    \ word = 'Python'\n        word[0] # character in position 0\n```\n\n```\nOut[25]:\
    \ 'P'\n```\n\n```\nIn [26]: word[5] # character in position 5\n```\n\n```\nOut[26]:\
    \ 'n'\n```\n\nIndices may also be negative numbers, to start counting from the\
    \ right:\n\n```\nIn [27]: word[-4]\n```\n\n```\nOut[27]: 't'\n```\n\nNote that\
    \ since -0 is the same as 0, negative indices start from -1.\n\n### 3.3.2.3 Slicing\n\
    \nIn addition to indexing, slicing is also supported. While indexing is used to\
    \ obtain individual characters, slicing allows you to obtain substring:\n\n```\n\
    In [28]: word[0:2] # characters from position 0 (included) to 2 (excluded)\n```\n\
    \n```\nOut[28]: 'Py'\n```\n\n```\nIn [29]: word[2:5] # characters from position\
    \ 2 (included) to 5 (excluded)\n```\n\n```\nOut[29]: 'tho'\n```\n\nNote how the\
    \ start is always included, and the end always excluded. This makes sure that\
    \ **s[:i] + s[i:]** is always equal to **s**\n\n```\nIn [30]: word[:2]+word[2:]\n\
    Out[30]: 'Python'\n```\n\n```\nIn [31]: word[:4]+word[4:]\nOut[31]: 'Python'\n\
    ```\n\nSlice indices have useful defaults; an omitted first index defaults to\
    \ zero, an omitted second index defaults to the size of the string being sliced.\n\
    \nOne way to remember how slices work is to think of the indices as pointing between\
    \ characters, with the left edge of the first character numbered 0. Then the right\
    \ edge of the last character of a string of n characters has index n, for example:\n\
    \n![](img/6423827abd996243bbfb7c0196b2aea4_145_0.png)\n\n*Figure 3-6 python-slicing\
    \ The first row of numbers gives the position of the indices 0...6 in the string;\
    \ the second row gives the corresponding negative indices. The slice from i to\
    \ j consists of all characters between the edges labeled i and j, respectively.*\n\
    \nPython strings cannot be changed — they are immutable. Therefore, assigning\
    \ to an indexed position in the string results in an error. So, if you try to\
    \ assign a new value in the string, it will give you an error.\n\n```\nIn [32]:\
    \ word[2] = '1'\n```\n\n```\n---------------------------------------------------------------------------\n\
    TypeError                                 Traceback (most recent call last)\n\
    <ipython-input-32-27e525a0336b> in <module>\n----> 1 word[2] = 'l'\n\nTypeError:\
    \ 'str' object does not support item assignment\n```\n\nIf you need a new string,\
    \ you need to create a new one.\n\n```\nIn [33]: # The built-in function len()\
    \ returns the\n        # length of a string: len(word)\n```\n\n```\nOut[33]: 6\n\
    ```\n\n```\nIn [34]: s = 'supercalifragilisticexpialidocious'\n        len(s)\n\
    ```\n\n```\nOut[34]: 34\n```\n\n## 4.4 Syntax of Code in Python\n\nStatement Instructions\
    \ written in the source code for execution are called statements. There are different\
    \ types of statements in Python, like Assignment statement, Conditional statement,\
    \ Looping statements, etc. These all help the user to get the required output.\
    \ For example, n = 20 is an assignment statement.\n\n![](img/6423827abd996243bbfb7c0196b2aea4_147_0.png)\n\
    \n**Figure 3-7 Statement in Python** Statement can be single-line or multi-Line\
    \ Statements. The Multiline Statements can be extended to more than one line using\
    \ parentheses (), braces {}, square brackets [], semi-colon (;), continuation\
    \ character slash (\\). When the programmer needs to do long calculations and\
    \ the statements cannot fit into one line, he can make use of these characters.\n\
    \nSome examples of a statement are as below for ease of understanding of the concepts\
    \ mentioned above.\n\n```\n#Declared using Continuation Character (\\):\ns = 1\
    \ + 2 + 3 + \\\n    4 + 5 + 6 + \\\n    7 + 8 + 9\n#Declared using parentheses\
    \ () :\nn = (1 * 2 * 3 + 7 + 8 + 9)\n\n#Declared using square brackets [] :\n\
    footballer = ['MESSI',\n              'NEYMAR',\n              'SUAREZ']\n#Declared\
    \ using braces {} :\nx = {1 + 2 + 3 + 4 + 5 + 6 +\n    7 + 8 + 9}\n\n# Multiple\
    \ Statements in one line, Declared using semicolons(;) :\nflag = 2; ropes = 3;\
    \ pole = 4\n```"
