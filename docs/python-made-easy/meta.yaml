    \n# 6 FUNCTIONS\n\nThe Functions make programs easier and more readable. The function\
    \ is in simple terms, a block of code that runs only when it’s called, and it\
    \ has a name. Well, this is too easy an explanation, but it’s entirely true too.\n\
    \nFunctions help the programmer to avoid writing the same lines of codes, again\
    \ and again.\n\n## 6.1 Defining Functions\n\nThe first question, which needs answer\
    \ here is: What is a Function?\n\nIn Python, a function is a group of related\
    \ statements that performs a specific task.\n\nWith help of the functions, we\
    \ break our program into smaller and modular chunks. As our program grows larger\
    \ and larger, functions become more and more necessary to keep it organized and\
    \ manageable.\n\nLike everything else in Python, a Function is also an Object.\n\
    \nYou can pass data, known as a **parameter** into a function. A function can\
    \ return data as result. To call a function, use the function's name followed\
    \ by parentheses **()**. e.g. **len(x)** function gives length of the parameter\
    \ **x**.\n\n## 6.2 Types of Function\n\nBroadly, they are of two types:\n- Built-in\
    \ Functions: They are predefined, and can be called directly.\n- User-Defined\
    \ Functions: A user-defined function object is created by a function definition.\
    \ It should be called with arguments containing the same number of items as the\
    \ function's formal parameter.\n\nHere, when we talk about **Defining Functions**,\
    \ we are essentially talking about **User Defined Functions**.\n\n## 6.3 Built-in\
    \ Functions\n\nThe Python interpreter has several functions and types built into\
    \ it that are always available. They are listed here in alphabetical order.\n\n\
    We have already seen and used many of these. for eg. **print()**, **int()**, **input()**,\
    \ **len()** etc.\n\n| Built-in Functions | | | | |\n|---|---|---|---|---|\n| abs()\
    \ | delattr() | hash() | memoryview() | set() |\n| all() | dict() | help() | min()\
    \ | setattr() |\n| any() | dir() | hex() | next() | slice() |\n| ascii() | divmod()\
    \ | id() | object() | sorted() |\n| bin() | enumerate() | input() | oct() | staticmethod()\
    \ |\n| bool() | eval() | int() | open() | str() |\n| breakpoint() | exec() | isinstance()\
    \ | ord() | sum() |\n| bytearray() | filter() | issubclass() | pow() | super()\
    \ |\n| bytes() | float() | iter() | print() | tuple() |\n| callable() | format()\
    \ | len() | property() | type() |\n| chr() | frozenset() | list() | range() |\
    \ vars() |\n| classmethod() | getattr() | locals() | repr() | zip() |\n| compile()\
    \ | globals() | map() | reversed() | __import__() |\n| complex() | hasattr() |\
    \ max() | round() | |\n\n## 6.3.1 Some Built-in function Definitions\n\nThere\
    \ are some built-in functions, which we will be using more frequently than others.\
    \ Let us see the definition of some such functions.\n\nInside the parentheses,\
    \ the type of object which goes in the function as an argument is mentioned.\n\
    \n**abs(x)** Return the absolute value of a number. The argument may be an integer\
    \ or a floating-point number. If the argument is a complex number, its magnitude\
    \ is returned.\n\n**any(iterable)** Return True if any element of the iterable\
    \ is true. If the iterable is empty, return False.\n\n**chr(i)** Return the string\
    \ representing a character whose Unicode code point is the integer i. For example,\
