  md: '**id(object)** Return the “identity” of an object. This is an integer that
    is guaranteed to be unique and constant for this object during its lifetime. Two
    objects with non-overlapping lifetimes may have the same **id()** value. CPython
    implementation detail: This is the address of the object in memory.


    **input([prompt])** If the prompt argument is present, it is written to standard
    output without a trailing newline.


    **int([x])** Return an integer object constructed from a number or string x.


    **isinstance(object, classinfo)** Return True if the object argument is an instance
    of the classinfo argument or a (direct, indirect, or virtual) subclass thereof.
    If the object is not an object of the given type, the function always returns
    False.


    **len(s)** Return the length (the number of items) of an object. The argument
    may be a sequence (such as a string, bytes, tuple, list, or range) or a collection
    (such as a dictionary, set, or frozen set).


    **map(function, iterable, ...)** Return an iterator that applies a function to
    every item of iterable, yielding the results. If additional iterable arguments
    are passed, the function must take that many arguments and is applied to the items
    from all iterables in parallel. With multiple iterables, the iterator stops when
    the shortest iterable is exhausted.


    **max(arg1, arg2, *args[, key])** Return the largest item in an iterable or the
    largest of two or more arguments.


    **min(arg1, arg2, *args[, key])** Return the smallest item in an iterable or the
    smallest of two or more arguments.


    **open(file)** Open file and return a corresponding file object.'
