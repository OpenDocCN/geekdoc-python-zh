  md: 'When Amazon and Flipkart make sales based on showing you things you might be
    interested to buy, it’s using data to make that decision.


    When politicians worldwide chose to use social media and use their data for social
    profiling, they are using data to make crucial decisions like which candidate,
    which locality, and what strategies to win.


    When Google Maps gives you how is the traffic on each route, they are using real-time
    data, or live data to make that decision for you.


    When the share market analysts are predicting the future prices of scripts and
    Sensex, they are using data analysis.


    Now, more than ever, the field of data analysis and all its allied fields, become
    more and more lucrative, day by day. As we become digital in every aspect of life,
    we are generating more data per second, which our parents used to generate in
    their lifetime. This data is used to make crucial decisions, both in real-time
    and retrospect.


    In simple words, **Data Science** is the study of data so that the data makes
    sense and gives usable insights. It is not a certain thing or one field, but its
    combination of various disciplines that are focusing on analyzing data and providing
    intelligent results or best solutions out of them.


    **DATA SCIENCE** is the area of study which involves extracting insights from
    huge amounts of data by using various scientific methods, algorithms, and processes.
    It helps to discover hidden patterns from the raw data.


