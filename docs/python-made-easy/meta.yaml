    3. **conda** tool installs binary packages, rather than requiring compile resources
    like pip - again, handy if you have limited privileges for installing necessary
    libraries.

    4. More or less eliminates the headaches of trying to figure out which version/release
    of package X is compatible with which version/release of package Y, both of which
    are required for the install of package Z

    5. Comes either in full-meal-deal version, with NumPy, Scipy, PyQt, Spyder IDE,
    etc. or in a somewhat minimal or ala-carte way (miniconda) where you can choose
    what you need and install what you want.

    6. No risk of messing up required system libraries


    ### 2.4.3 Installing Anaconda on Windows<sup>15</sup>


    - Download the Anaconda installer (https://www.anaconda.com/download/#windows).

    - Double click the installer to launch.


    > **Note**


    To prevent permission errors, do not launch the installer from the Favorites folder.


    If you encounter issues during installation, temporarily disable your anti-virus
    software during install, then re-enable it after the installation concludes. If
    you installed for all users, uninstall Anaconda and re-install it for your “user
    only” and try again.


    - Click Next.

    - Read the licensing terms and click “I Agree”.

    - Select an install for “Just Me” unless you’re installing for all users (which
    requires Windows Administrator privileges) and click Next.

    - Select a destination folder to install Anaconda and click the Next button. See
    *FAQ*


    > **Note**


    Install Anaconda to a directory path that does not contain spaces or Unicode characters.


    Do not install as Administrator unless admin privileges are required.


    ![](img/6423827abd996243bbfb7c0196b2aea4_97_0.png)


    Figure 2-2 Destination Folder


    - Choose whether to add Anaconda to your PATH environment variable. We recommend
    not adding Anaconda to the PATH environment variable since this can interfere
    with other software. Instead, use Anaconda software by opening Anaconda Navigator
    or the Anaconda Prompt from the Start Menu.


    ![](img/6423827abd996243bbfb7c0196b2aea4_98_0.png)


    Figure 2-3 Install Options


    - Choose whether to register Anaconda as your default Python. Unless you plan
    on installing and running multiple versions of Anaconda, or multiple versions
    of Python, accept the default and leave this box checked.

    - Click the Install button. If you want to watch the packages Anaconda is installing,
    click Show Details.

    - Click the Next button.

    - Optional: To install PyCharm for Anaconda, click on the link to https://www.anaconda.com/pycharm.


    ![](img/6423827abd996243bbfb7c0196b2aea4_99_0.png)


    Figure 2-4 Installation Options


    Or to install Anaconda without PyCharm, click the Next button.

    After a successful installation, you will see the “Thanks for installing Anaconda”
    dialog box:


    ![](img/6423827abd996243bbfb7c0196b2aea4_99_1.png)


    Figure 2-5 Installation Complete


    - If you wish to read more about Anaconda Cloud and how to get started with Anaconda,
    check the boxes “Learn more about Anaconda Cloud” and “Learn how to get started
    with Anaconda”. Click the Finish button.

    - After your install is complete, verify it by opening Anaconda Navigator, a program
