    \n## 15.9 数组的形状和大小\n\n`ndarray.ndim` 会告诉你数组的轴数或维度数。\n\n**ndarray.size** 会告诉你数组的元素总数。这是数组形状各元素的乘积。\n\
    \n**ndarray.shape** 会显示一个整数元组，表示沿数组每个维度存储的元素数量。例如，如果你有一个2行3列的二维数组，你的数组形状就是 (2,\
