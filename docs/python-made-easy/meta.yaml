    # 1 INTRODUCTION TO DATA SCIENCE AND PROGRAMMING BASICS


    ## 1.1 Introduction to Data Science


    Philosophers and Wise people of all the parts in the world, since ages immemorable,
    have debated over, what will rule the world?


    Is it the **Material** or the **Belief**?


    Certainly, they never thought about **Data**.


    Data has revolutionized the industry in no lesser way than Electricity did. It
    has already caused **Digital Revolution** which is like a self-fulfilling prophecy.
    It’s an engine, which feeds itself and runs on it.


    Don''t be alarmed. This, like all sciences, has potential for both good, and evil.
    But this is by no means a new science. The advent of computers and the huge data-crunching
    capabilities has given it a boost it needed.


    Today, Data rules the world, literally. The data may not be the King, but it’s
    Kingmaker in all aspects of life. This claim may sound too farfetched or too stretched,
    but it''s not. It’s Real, Now and Here.


    When Amazon and Flipkart make sales based on showing you things you might be interested
    to buy, it’s using data to make that decision.


    When politicians worldwide chose to use social media and use their data for social
    profiling, they are using data to make crucial decisions like which candidate,
    which locality, and what strategies to win.


    When Google Maps gives you how is the traffic on each route, they are using real-time
    data, or live data to make that decision for you.


    When the share market analysts are predicting the future prices of scripts and
    Sensex, they are using data analysis.


    Now, more than ever, the field of data analysis and all its allied fields, become
    more and more lucrative, day by day. As we become digital in every aspect of life,
    we are generating more data per second, which our parents used to generate in
    their lifetime. This data is used to make crucial decisions, both in real-time
    and retrospect.


    In simple words, **Data Science** is the study of data so that the data makes
    sense and gives usable insights. It is not a certain thing or one field, but its
    combination of various disciplines that are focusing on analyzing data and providing
    intelligent results or best solutions out of them.


    **DATA SCIENCE** is the area of study which involves extracting insights from
    huge amounts of data by using various scientific methods, algorithms, and processes.
    It helps to discover hidden patterns from the raw data.


    This is an interdisciplinary field that helps us extract knowledge from structured
    or unstructured data.


    ### 1.1.1 Why Data Science?


    Data science or data-driven science enables better decision making, pattern discovery,
    predictive analysis, and visual representation for better communication from raw
    data. It lets us:


    - Guides us towards the right Questions.

    - Shows the leading cause of a problem.

    - Helps find patterns amidst random-looking raw data.

    - Prepare models for predictive analysis.

    - Visualize and communicate the results via graphs, dashboards, etc.

    - Permits to make intelligence ability in machines.

    - Customer loyalty can be tested using sentiment analysis.

    - It enables us to make better and faster decisions.

    - Helps us to recommend the right product to the right customer to enhance your
    business.


    ### 1.1.2 Components of Data Science


    - Data Mining

    - Data Analytics

    - Data Engineering

    - Visualization

    - Statistical Analysis'
