    Figure 16-4 NumPy Broadcasting NumPy understands that the multiplication should
    happen with each cell. That concept is called **broadcasting**. Broadcasting is
    a mechanism that allows NumPy to perform operations on arrays of different shapes.
    The dimensions of your array must be compatible, for example, when the dimensions
    of both arrays are equal or when one of them is 1. If the dimensions are not compatible,
    you will get a ValueError.


