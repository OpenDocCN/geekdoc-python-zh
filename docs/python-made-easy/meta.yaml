    The final bill amount is 19000.0 and discount is 1000.0\n```\n\n### 5.2.3 if -\
    \ elif - else 语句\n\n从名称本身就可以看出，elif 是 else 和 if 的组合。这个语句的流程图将使这个概念更容易理解。\n\n![图\
    \ 5-4 if-elif-else 流程图](img/6423827abd996243bbfb7c0196b2aea4_214_0.png)\n\n```\n\
    In [6]: x = int(input(\"Please enter an integer: \"))\n        # using input()\
