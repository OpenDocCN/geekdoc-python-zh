- md: "## 21.9.3 Three Dimensional Plotting\n\nThe mplot3d toolkit has support for\
    \ simple 3d graphs including surface, wireframe, scatter, and bar charts.\n\n\
    I am plotting a 3D surface colored with the coolwarm color map. The surface is\
    \ made opaque by using **antialiased=False**. Also demonstrating the LinearLocator\
    \ and custom formatting for the z-axis tick labels.\n\n```python\nimport matplotlib.pyplot\
    \ as plt\nfrom matplotlib import cm\nfrom matplotlib.ticker import LinearLocator,\
    \ FormatStrFormatter\nfrom mpl_toolkits.mplot3d import Axes3D\nimport numpy as\
    \ np\n\nfig = plt.figure()\nax = fig.add_subplot(projection='3d')\n\n# Make data.\n\
    X = np.arange(-5, 5, 0.25)\nY = np.arange(-5, 5, 0.25)\nX, Y = np.meshgrid(X,\
    \ Y)\nR = np.sqrt(X**2 + Y**2)\nZ = np.sin(R)\n\n# Plot the surface.\nsurf = ax.plot_surface(X,\
    \ Y, Z, cmap=cm.coolwarm,\n                       linewidth=0, antialiased=False)\n\
    \n# Customize the z-axis.\nax.set_zlim(-1.01, 1.01)\nax.zaxis.set_major_locator(LinearLocator(10))\n\
    ax.zaxis.set_major_formatter(FormatStrFormatter('%.02f'))\n\n# Add a color bar\
    \ that maps values to colors.\nfig.colorbar(surf, shrink=0.5, aspect=5)\n\nplt.show()\n\
    ```\n\n![](img/6423827abd996243bbfb7c0196b2aea4_634_0.png)\n\n## 21.9.4 Pie Chart\n\
    \nThe pie() function allows you to create pie charts. Optional features include\
    \ auto-labeling the percentage of area, exploding one or more wedges from the\
    \ center of the pie, and a shadow effect. Take a close look at the attached code,\
    \ which generates this figure in just a few lines of code.\n\nIn addition to the\
    \ basic pie chart, this demo shows a few optional features:\n- slice labels\n\
    - auto-labeling the percentage\n- offsetting a slice with \"explode\"\n- drop-shadow\n\
    - custom start angle\n\nNote about the custom start angle: The default **startangle**\
    \ is 0, which would start the \"Frogs\" slice on the positive x-axis. This example\
    \ sets startangle = 90 such that everything is rotated counter-clockwise by 90\
    \ degrees, and the frog slice starts on the positive y-axis.\n\n```python\nimport\
    \ matplotlib.pyplot as plt\n\n# Pie chart, where the slices will be ordered and\
    \ plotted counter-clockwise:\nlabels = 'Frogs', 'Hogs', 'Dogs', 'Logs'\nsizes\
    \ = [15, 30, 45, 10]\nexplode = (0, 0.1, 0, 0)  # only \"explode\" the 2nd slice\
    \ (i.e. 'Hogs')\n\nfig1, ax1 = plt.subplots()\nax1.pie(sizes, explode=explode,\
    \ labels=labels, autopct='%1.1f%%',\n        shadow=True, startangle=90)\nax1.axis('equal')\
    \  # Equal aspect ratio ensures that pie is drawn as a circle.\n\nplt.show()\n\
    ```\n\n![](img/6423827abd996243bbfb7c0196b2aea4_636_0.png)\n\nFigure 21-14\n\n\
