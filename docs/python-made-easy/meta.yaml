    \ |\n| ... | ... | ... | ... |\n| 886 | Montvila, Rev. Juozas | male | 27.0 |\n\
    | 887 | Graham, Miss. Margaret Edith | female | 19.0 |\n| 888 | Johnston, Miss.\
    \ Catherine Helen \"Carrie\" | female | NaN |\n| 889 | Behr, Mr. Karl Howell |\
    \ male | 26.0 |\n| 890 | Dooley, Mr. Patrick | male | 32.0 |\n\n```\n[891 rows\
    \ x 3 columns]\n```\n\n```\nIn [26]: dataset2 = titanic[[\"Name\", \"Pclass\"\
    ,\n        \"Cabin\"]]\n```\n\n### dataset2\n\nOut[26]:\n\n| | Name | Pclass |\
    \ Cabin |\n|---|---|---|---|\n| 0 | Braund, Mr. Owen Harris | 3 | NaN |\n| 1 |\
    \ Cumings, Mrs. John Bradley (Florence Briggs Th... | 1 | C85 |\n| 2 | Heikkinen,\
    \ Miss. Laina | 3 | NaN |\n| 3 | Futrelle, Mrs. Jacques Heath (Lily May Peel)\
    \ | 1 | C123 |\n| 4 | Allen, Mr. William Henry | 3 | NaN |\n| ... | ... | ...\
    \ | ... |\n| 886 | Montvila, Rev. Juozas | 2 | NaN |\n| 887 | Graham, Miss. Margaret\
    \ Edith | 1 | B42 |\n| 888 | Johnston, Miss. Catherine Helen \"Carrie\" | 3 |\
    \ NaN |\n| 889 | Behr, Mr. Karl Howell | 1 | C148 |\n| 890 | Dooley, Mr. Patrick\
    \ | 3 | NaN |\n\n[891 rows x 3 columns]\n\nNow we have two sets of DataFrame,\
    \ with 891 rows each, and one column of common identifier in each of them. When\
    \ we merge the two, Pandas will read the common identifier in both the DataFrames,\
    \ and join the rows accordingly. We use **pd.merge()** function for this operation.\n\
    \n```\nIn [27]: merged_dataset = pd.merge(dataset1,\n                        \
    \        dataset2, how=\"left\", on= \"Name\")\n\n        merged_dataset\n```\n\
    \nOut[27]:\n\n| | Name | Sex | Age | Pclass | Cabin |\n|---|---|---|---|---|---|\n\
    | 0 | Braund, Mr. Owen Harris | male | 22.0 | 3 | NaN |\n| 1 | Cumings, Mrs. John\
    \ Bradley (Florence Briggs Th... | female | 38.0 | 1 | C85 |\n| 2 | Heikkinen,\
    \ Miss. Laina | female | 26.0 | 3 | NaN |\n| 3 | Futrelle, Mrs. Jacques Heath\
    \ (Lily May Peel) | female | 35.0 | 1 | C123 |\n| 4 | Allen, Mr. William Henry\
    \ | male | 35.0 | 3 | NaN |\n| ... | ... | ... | ... | ... | ... |\n| 886 | Montvila,\
    \ Rev. Juozas | male | 27.0 | 2 | NaN |\n| 887 | Graham, Miss. Margaret Edith\
    \ | female | 19.0 | 1 | B42 |\n| 888 | Johnston, Miss. Catherine Helen \"Carrie\"\
    \ | female | NaN | 3 | NaN |\n| 889 | Behr, Mr. Karl Howell | male | 26.0 | 1\
    \ | C148 |\n| 890 | Dooley, Mr. Patrick | male | 32.0 | 3 | NaN |\n\n[891 rows\
    \ x 5 columns]\n\nYou can see that the merged_dataset has the same 891 rows and\
    \ 5 columns (3+3 - 1 common column).\n\nBoth tables have the column \"Name\" in\
    \ common which is used as a key to combining the information. By choosing the\
    \ left join, only the Names available in the \"dataset1\" (left) table, will end\
    \ up in the resulting table. Eventually, here the same names are there in both\
    \ the datasets, but it's particularly useful when you are doing some real-life\
    \ data joining and you have to decide which table will take lead over the other\
    \ in terms of common identifier selection.\n\n## 18.8 Summary:\n\nCreate a new\
    \ column by assigning the output to the DataFrame with a new column name in between\
    \ the []. Operations are element-wise, no need to loop over rows. Use **rename**\
    \ with a dictionary or function to rename row labels or column names. Aggregation\
    \ statistics can be calculated on entire columns or rows. **groupby** provides\
    \ the power of the split-apply-combine pattern. **value_counts** is a convenient\
    \ shortcut to count the number of entries in each category of a variable. Sorting\
    \ by one or more columns is supported by **sort_values**. Multiple tables can\
    \ be concatenated both columns as row-wise using the **concat** function. For\
    \ database-like merging/joining of tables, use the **merge** function.\n\n# 19\n\
    ## VISUALIZATION IN PYTHON\n\n### 19.1 Visualization\n\n> \"A Picture is worth\
    \ a thousand words\". Robert G Barnard\n\nThere cannot be a better way of explaining\
    \ visualization for a data scientist or anyone, who is working on data. A data\
    \ set, small or big, when represented by an image, a graph or a chart, it communicates\
    \ the meaning to the analyst as well as to anyone else the same is presented.\
    \ Data visualization plays an essential role in the representation of both small\
    \ and large-scale data.\n\n### 19.1.1 Importance of Data Visualization\n\nOne\
    \ of the key skills of a data scientist is the ability to tell a compelling story.\
    \ To first understand the data to write that story, the analyst visualizes the\
    \ data in many forms, until the raw data starts making sense to him. The patterns\
    \ in the data emerge better in the form of visuals.\n\nHence, learning how to\
    \ leverage a software tool to visualize data will enable you to extract information,\
    \ better understand the data, and make more effective decisions.\n\nPython has\
    \ vast and rich resources for anyone and everyone, for visualizing the data. There\
    \ are numerous libraries which allow and assist in making and presenting all kind\
    \ of images and charts. We will have a look at some of the most important ones\
    \ in this chapter, but we will look at the basics of data visualization first.\n\
    \n### 19.1.2 Basic Visualization\n\nData Used for this chapter, air quality data\
    \ about NO2, made available by openaq and using the py-openaq package. The \"\
    air_quality_no2.csv\" data set provides NO2 values for the measurement stations\
    \ FR04014, BETR801, and London Westminster in respectively Paris, Antwerp, and\
    \ London.\n\nThis is one of the most used data set for teaching the basics of\
    \ data manipulation and data science.\n\nYou can download it from the link below:\n\
    \nhttps://github.com/nilabhnishchhal/Python-Made-Easy/blob/master/air_quality_no2.csv\n\
    \nThis is a Github repository link. When you open this, you will see the \"raw\"\
    \ tab. Right-click on that, and use the \"Save link as..\" option. Save the file\
    \ in the base folder of your machine, and change the file extension to .csv.\n\
    \nNow you have the data set \"air_quality_no2.csv\" on your machine's base folder.\
    \ Let's start working on it.\n\nLet us first read the data in python, using pandas\
    \ and we will use Matplotlib to create the plots. Hence, following the convention,\
    \ we will import all the dependencies at the beginning itself.\n\n```\nIn [1]:\
    \ import pandas as pd\n        import matplotlib.pyplot as plt\n        %matplotlib\
    \ inline\n```\n\n> Note: The %matplotlib inline is a magic command which tells\
    \ the Jupyter notebook to render the plots and images in the notebook itself."
  mdcn: "如果你使用过任何电子表格程序，比如 Excel，你会认出这就是通过匹配列，将一行行数据上下合并的过程。\n\n## 18.7.2 使用公共标识符进行连接\n\
    \n如果你使用过像 Microsoft Excel 这样的电子表格程序，你可能需要使用 \"Vlookup\" 函数，通过一个公共标识符来连接两个不同表中的列。这个标识符就是我们在\
    \ Excel 中进行 \"查找\" 的依据。在这里，这种方法更加强大和灵活。\n\n如果你注意到 mpg 数据集，你会发现没有一个列具有唯一值。因此，使用其中任何一个进行连接都会导致错误。所以，我们将在这里使用泰坦尼克号数据集，但将其拆分为两个新的数据集，每个包含选定的列，以演示如何使用公共标识符将它们连接起来。\n\
