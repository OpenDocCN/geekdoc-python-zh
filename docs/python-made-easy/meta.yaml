  - '[PAGE 26]


    # About this Book


    This book is an introduction to Programming and Data Analytics and uses Python
    as the choice of language for the beginners. It teaches how to install Python
    and other requisite software on your machine, how to write a program in python,
    and goes on to teach you to make your own application using the python programming
    language. The book also gives a good idea about python libraries used for data
    analytics and visualization, like Numpy, Pandas, and Matplotlib in detail. You
    will also be introduced to some other libraries of Python like Pillow for image
    modification, Tkinter for GUI creation, and OS for interacting with the operating
    system. This book’s core is to teach you Python language from basics to intermediate
    level and along the way, the focus is on the application of the same to solve
    real-world problems using Python fundamentals.


    # How to use this book for the best results


    This book takes an active learning approach. I have written it for the very beginners,
    assuming you do not have any experience of programming. Hence, start with the
    very beginning of the book, and install the software and libraries as advised
    in the book. After that, practice some more on the choice of your software which
