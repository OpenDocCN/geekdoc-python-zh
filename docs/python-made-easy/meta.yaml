  mdcn: "我们使用这些**变量**，借助表达式来计算矩形的面积和周长。我们将表达式**长度 * 宽度**的结果存储在变量**面积**中，然后使用打印函数将其输出。\n\
    \n在第二种情况下，我们直接在打印函数中使用表达式**2 * (长度 + 宽度)**的值。\n\n另外，请注意Python如何漂亮地格式化输出。即使我们没有在'**矩形的面积是**'和变量**面积**之间指定空格，Python也会自动为我们添加，从而得到整洁美观的输出，程序也因此更具可读性（因为我们无需担心输出字符串中的空格问题）。这是Python如何让程序员生活更轻松的一个例子。\n\
    \n## 4.10 动态类型\n\n在Python中，尽管变量指向的值有类型，但变量本身在定义时没有严格的类型。你可以重用同一个变量来指向不同类型的对象。将变量视为与对象相关联的\"\
    标签\"可能会有所帮助。\n\n```\nIn [29]: six = 6\n       six\nOut[29]: 6\n```\n\n```\nIn\
    \ [30]: six = 'six'\n       six\nOut[30]: 'six'\n```\n\n## 4.11 强类型\n\n虽然Python允许你在类型上非常灵活，但你仍然必须清楚这些类型是什么。某些操作需要特定类型的参数。\n\
    \n```\nIn [31]:  'day'+1\n```\n\n```\n---------------------------------------------------------------------------\n\
