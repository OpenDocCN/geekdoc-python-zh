    ```\nOut[38]: 24\n```\n\n要找出数组的形状，运行：\n\n```python\nIn [39]: array_example.shape\n\
    ```\n\n```\nOut[39]: (3, 2, 4)\n```\n\n## 15.10 使用 arr.reshape() 重塑\n\n`reshape()`（一个方法）可以在不改变数据的情况下赋予数组新的形状。只需记住，当你使用\
    \ reshape 方法时，你想要生成的数组需要与原始数组具有相同的元素数量。如果你从一个有12个元素的数组开始，你需要确保你的新数组也总共有12个元素。\n\
    \n如果你从这个数组开始：\n\n```python\nIn [40]: a = np.arange(6)\n         print(a)\n```\n\
    \n```\n[0 1 2 3 4 5]\n```\n\n你可以使用 **reshape()** 来重塑你的数组。例如，你可以将这个数组重塑为一个有三行两列的数组：\n\
    \n```python\nIn [41]: b = a.reshape(3, 2)\n         print(b)\n```\n\n```\n[[0\
    \ 1]\n [2 3]\n [4 5]]\n```\n\n我们上面看到了 **reshape()** 方法。Reshape 也是一个**函数**，它也有一些可选参数。它被用作\
    \ **np.reshape()**。\n\n```python\nIn [42]: np.reshape(a, newshape=(2, 3))\n```\n\
