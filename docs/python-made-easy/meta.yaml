    \ | 14 |\n| Simon | 8 | 9 | 9 | 26 |\n| Rohit | 8 | 3 | 5 | 16 |\n| Sunil | 9\
    \ | 4 | 2 | 15 |\n\n### 17.6.2 Column Deletion in DataFrame\n\nAs easy it was\
