    \ 如何在Python中编写注释？为什么它们很重要？\n12. 如何改变Python中的求值顺序？\n13. 逻辑行和物理行有什么区别？\n\n### 4.15.2\
    \ 判断正误：\n\n1. Python中的变量获取分配给它们的值。\n2. 在Python中，创建变量之前，你需要先定义其类型。\n3. x = 38 和\
    \ x == 38 在Python中不是同一回事。\n4. 我们在Python中对对象执行操作。\n5. Python关键字可以用作变量名。\n6. 自定义数据结构比内置对象更高效。\n\
