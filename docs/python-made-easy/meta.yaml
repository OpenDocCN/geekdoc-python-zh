    \      4      10\nMathew      5       6\nSimon       8       9\nRohit       8\
    \       3\nSunil       9       4\n```\n\nNow we can view who purchased what fruit\
    \ in how much quantity.\n\n### 17.5.3 Series from DataFrame\n\nThere are two series\
    \ in the DataFrame \"purchase\". They are named after their column labels. We\
