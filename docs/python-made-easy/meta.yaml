- md: "Statements are the building blocks of any program. These are the actions that\
    \ you want your program to take. Without statements, there cannot be any program.\
    \ Each statement consists of keywords, expressions, and operators.\n\n## 3.4.1.1\
    \ Terminating a Statement\nIn Python, the end of the line means the end of the\
    \ statement. We saw above, how to write a statement in more than one line.\n\n\
    Semicolon Can Optionally Terminate a Statement. Sometimes it can be used to put\
    \ multiple statements on a single line.\n\ne.g.\n\nMultiple Statements in one\
    \ line, Declared using semicolons (;): `flag = 2; ropes = 3; pole = 4`\n\n## 3.4.2\
    \ Variables and Assignment\nOne of the most powerful features of a programming\
    \ language is the ability to manipulate variables. A variable is a name that refers\
    \ to a value. Please note that the variable only refers to the value, to which\
    \ it is assigned. It doesn't become equal to that value. The moment it is assigned\
    \ to another value, the old assignment becomes null and void automatically.\n\n\
    The assignment statement creates new variables and gives them values:\n\n```\n\
    In [35]: # We are assigning the value of 45 to variable a\n         a = 45\n\n\
    \         # and then print a\n         print(a)\n```\n```\n45\n```\n\n```\nIn\
    \ [36]: #now we assign same variable a another value\n         a = 3+2\n\n   \
    \      # and then print a again\n         print(a)\n```\n```\n5\n```\n\nYou would\
    \ notice that a takes a new value as soon as its assigned new value, and in the\
    \ order of assignment.\n\n## 3.4.3 Variable names and keywords\nYou shall choose\
    \ the name of the variable which has some meaning to the data. For example, when\
    \ working with a sales data of stores in Mumbai, the variable name Sales_mumbai\
    \ makes sense. This is obviously not a rule but goes a long way in making the\
    \ code readable. And because you might need to use the variable name number of\
    \ times in the code, it helps you as a programmer as well to use relatable and\
    \ meaningful names.\n\nVariable names can be of any length and can contain both\
    \ alphabets and numbers. They can be of uppercase or lowercase, but the same name\
    \ in different cases are different variables, as you must remember, Python is\
    \ **case sensitive** language. Now some rules for naming variables.\n\n- It must\
    \ start with a letter (not numbers)\n- The underscore (_) can appear in a name.\
    \ It is used to connect two or more words of a variable, as space is not allowed.\n\
    - Python Keywords cannot be used as variable names. Python has these keywords:\n\
    \n| and | def | exec | if | not | return |\n|---|---|---|---|---|---|\n| assert\
    \ | del | finally | import | or | try |\n| break | elif | for | in | pass | while\
    \ |\n| class | else | from | is | print | yield |\n| continue | except | global\
    \ | lambda | raise | |\n\nKeep this list for reference.\n\nIf you give a variable\
    \ an illegal name, you get a syntax error: So I am giving a list of 10 names,\
    \ you have to identify and see which of them cannot be legally a variable in python.\n\
    \n| 2nd_wife | man_vs_wild | \"national geographic\" | data_science | sudhir22\
    \ |\n|---|---|---|---|---|\n| python123 | class | global | tomorrow | Sundar_ban\
    \ |\n\nSee for yourself, by assigning some random values to these names, and running\
    \ them to check if they are accepted or throw a syntax error.\n\n## 3.4.4 Expressions\n\
    An expression is a blend of values, variables, and operators. When you type an\
    \ expression on the command line, the interpreter assesses it and displays the\
    \ outcome:\n\n```\nIn [37]: 2+3\nOut[37]: 5\n```\n\nEven though expressions contain\
    \ values, variables, and operators, not every expression contains all of these\
    \ elements. A value all by itself is considered an expression, and so is a variable.\n\
    \n```\nIn [38]: 15\nOut[38]: 15\n```\n\n```\nIn [39]: a\nOut[39]: 5\n```\n\nEvaluating\
    \ an expression is not the same thing as printing its value. This will become\
    \ clearer with a string example.\n\n```\nIn [40]: 'Hello World! '\nOut[40]: 'Hello\
    \ World! '\n```\n\n```\nIn [41]: print('Hello World! ')\nHello World!\n```\n\n\
    When the Python interpreter shows the value of an expression, it uses the same\
    \ format you would use to enter a value. In the case of strings, that means that\
    \ it includes the quotation marks. But if you use a print statement, Python displays\
    \ the contents of the string without the quotation marks.\n\n## 3.5 First Steps\
    \ towards Programming<sup>22</sup>\nOf course, we can use Python for more complicated\
    \ tasks than adding two and two together. For instance, we can write an initial\
    \ sub-sequence of the Fibonacci series as follows:\n\n```\nIn [42]: # Fibonacci\
    \ series:\n         # the sum of two elements defines the next\n         a = 0\n\
    \         b = 1\n         while a < 10:\n             print(a)\n             a,\
    \ b = b, a+b\n```\n```\n0\n1\n1\n2\n3\n5\n8\n```\n\nLet us play around with this\
    \ simple code we just wrote. This time we will change the way variables **a**\
    \ and **b** are assigned. The values will be the same, but this way Python lets\
    \ you reduce the number of lines of code. Also, we will change one small condition\
    \ to show how it affects the result.\n\n```\nIn [43]: # Same Fibonacci series:\n\
    \         # the sum of two elements defines the next\n         a, b = 0, 1\n \
    \        while a < 15:\n             print(a)\n             a, b = b, a+b\n```\n\
    ```\n0\n1\n1\n2\n3\n5\n8\n13\n```\n\nDid you notice that these lines of the program\
    \ ran the same way as the earlier one? Also, you would have noticed how the upper\
    \ limit of \"**a**\" is now 15, and hence one more result **13** is printed.\n\
    \nThis example introduces several new features.\n\n1. The first line contains\
    \ multiple assignments: the variables \"**a**\" and \"**b**\" simultaneously get\
    \ the new values 0 and 1. On the last line, this is used again, demonstrating\
    \ that the expressions on the right-hand side are all evaluated first before any\
    \ of the assignments take place. The right-hand side expressions are evaluated\
    \ from the left to the right.\n2. The while loop executes as long as the condition\
    \ (here: **a < 10** which we later modified to **a<15**) remains true. In Python,\
    \ any non-zero integer value is true; zero is false. The condition may also be\
    \ a string or list value, in fact, any sequence; anything with a non-zero length\
    \ is true, empty sequences are false. The test used in the example is a simple\
    \ comparison. The standard comparison operators are written the same as in : <\
    \ (less than), > (greater than), == (equal to), <= (less than or equal to), >=\
    \ (greater than or equal to) and != (not equal to).\n3. The body of the loop is\
    \ **indented**: indentation is Python's way of grouping statements. At the interactive\
    \ prompt (in a terminal window), you have to type a tab or space(s) for each indented\
    \ line. In practice you will prepare more complicated input for Python with a\
    \ text editor; all decent text editors have an auto-indent facility. When a compound\
    \ statement is entered interactively, it must be followed by a blank line to indicate\
    \ completion (since the parser cannot guess when you have typed the last line).\
    \ Note that each line within a basic block must be indented by the same amount.\n\
    4. The **print()** function writes the value of the argument(s) it is given. It\
    \ differs from just writing the expression you want to write (as we did earlier\
    \ in the calculator examples) in the way it handles multiple arguments, floating\
    \ point quantities, and strings. Strings are printed without quotes, and space\
    \ is inserted between items, so you can format things nicely, like this:\n\n```\n\
    In [44]:  i = 256*256\n          print('The value of i is', i)\n```\n```\nThe\
    \ value of i is 65536\n```\n\n## 3.5.1 More about Print()\nWe will now see some\
    \ very important and powerful concepts using the print() as an excuse for our\
    \ ease. As print() is one of the functions you are going to use the most, mastering\
    \ it is an added bonus.\n\nTill now we have seen **print()** function prints whatever\
    \ Argument we give inside the parenthesis. There's more to it. Let us see the\
    \ **print()** function under an X-Ray.\n\nThe actual Syntax of **print()** is\
    \ as below.\n\n```\nprint(*objects, sep=' ', end='\\n', file=sys.stdout, flush=False)\n\
    ```\n\nThis allows me to introduce two more basic concepts of Python programming.\n\
    \n- Arguments (at times represented as **args.**)\n- Keyword Arguments (at times\
    \ represented as **kwargs.**)\n\nAs we have done until now, we will understand\
    \ these complex concepts in the easiest way. This means, there might be some omissions,\
    \ but we will try to capture the essence here for starters.\n\n**Arguments** are\
    \ anything that we pass in the function. Like, string or variable are the arguments,\
    \ which we pass in the **print()** function. Where there is more than one variable\
    \ to be passed, and while defining the function you do not know how many variables\
    \ may be needed as the argument of the function in the future, we use the special\
    \ syntax **\\*args**. Here, the \\* symbolizes that we may pass any number of\
    \ variables, and **args** is just a convention for better readability of the code.\
    \ It can be replaced by any other word, which makes it more meaningful. As you\
    \ can see, in the syntax of **print()** function, **\\*objects** are there instead\
    \ of **\\*args**. Now you know that it means, there can be more than one object\
    \ (variables, strings, class, or any other object) that can be passed in the **print()**\
    \ function.\n\n**Keyword Arguments** are the argument where you provide a **name**\
    \ to the variable as you pass it into the function. Hold this thought. We will\
    \ learn it by using the **print()** function syntax above.\n\nDo you notice the\
    \ **sep=**, **end=**, **file=**, and **flush=?** in the **print()** syntax? These\
    \ are **Keyword** arguments. And as I just mentioned in para"
  mdcn: "语句是任何程序的基本构建块。它们是你希望程序执行的操作。没有语句，就不可能有任何程序。每条语句由关键字、表达式和运算符组成。\n\n## 3.4.1.1\
    \ 终结一条语句\n在 Python 中，行的结束意味着语句的结束。我们在上面已经看到了如何将一条语句写在多行中。\n\n分号可以有选择地终结一条语句。有时，它可以用来在单行上放置多条语句。\n\
    \n例如：\n\n使用分号（;）在单行上声明多条语句：`flag = 2; ropes = 3; pole = 4`\n\n## 3.4.2 变量和赋值\n\
    编程语言最强大的特性之一是操作变量的能力。变量是引用一个值的名称。请注意，变量只是引用被赋予它的值。它并不等于那个值。一旦它被赋予另一个值，旧的赋值就会自动失效。\n\
    \n赋值语句创建新变量并为其赋值：\n\n```\nIn [35]: # 我们将值 45 赋给变量 a\n         a = 45\n\n     \
    \    # 然后打印 a\n         print(a)\n```\n```\n45\n```\n\n```\nIn [36]: # 现在我们给同一个变量\
    \ a 赋另一个值\n         a = 3+2\n\n         # 然后再次打印 a\n         print(a)\n```\n```\n\
    5\n```\n\n你会注意到，一旦 a 被赋予新值，它就会立即采用新值，并且按照赋值的顺序。\n\n## 3.4.3 变量名和关键字\n你应该选择对数据有意义的变量名。例如，当处理孟买商店的销售数据时，变量名\
    \ Sales_mumbai 是有意义的。这显然不是一条规则，但对于提高代码的可读性大有帮助。而且因为你可能需要在代码中多次使用变量名，使用相关且有意义的名称对你作为程序员也有帮助。\n\
    \n变量名可以是任意长度，可以包含字母和数字。它们可以是大写或小写，但同名不同大小写是不同的变量，你必须记住，Python 是**区分大小写**的语言。现在是一些命名变量的规则。\n\
    \n- 它必须以字母开头（不能是数字）\n- 下划线（_）可以出现在名称中。它用于连接变量的两个或多个单词，因为不允许使用空格。\n- Python 关键字不能用作变量名。Python\
    \ 有这些关键字：\n\n| and | def | exec | if | not | return |\n|---|---|---|---|---|---|\n\
    | assert | del | finally | import | or | try |\n| break | elif | for | in | pass\
    \ | while |\n| class | else | from | is | print | yield |\n| continue | except\
    \ | global | lambda | raise | |\n\n请保留此列表以备参考。\n\n如果你给变量一个非法的名称，你会得到一个语法错误：所以我列出\
    \ 10 个名称，你需要识别并查看其中哪些在 Python 中不能合法地作为变量名。\n\n| 2nd_wife | man_vs_wild | \"national\
    \ geographic\" | data_science | sudhir22 |\n|---|---|---|---|---|\n| python123\
    \ | class | global | tomorrow | Sundar_ban |\n\n自己试试看，给这些名称赋一些随机值，然后运行它们，检查它们是否被接受或抛出语法错误。\n\
    \n## 3.4.4 表达式\n表达式是值、变量和运算符的混合体。当你在命令行上输入一个表达式时，解释器会评估它并显示结果：\n\n```\nIn [37]:\
    \ 2+3\nOut[37]: 5\n```\n\n尽管表达式包含值、变量和运算符，但并非每个表达式都包含所有这些元素。一个单独的值被认为是一个表达式，变量也是如此。\n\
    \n```\nIn [38]: 15\nOut[38]: 15\n```\n\n```\nIn [39]: a\nOut[39]: 5\n```\n\n评估表达式与打印其值不是一回事。通过一个字符串示例，这一点会变得更清楚。\n\
    \n```\nIn [40]: 'Hello World! '\nOut[40]: 'Hello World! '\n```\n\n```\nIn [41]:\
    \ print('Hello World! ')\nHello World!\n```\n\n当 Python 解释器显示表达式的值时，它使用与你输入值相同的格式。对于字符串，这意味着它包含引号。但如果你使用\
    \ print 语句，Python 会显示字符串的内容而不带引号。\n\n## 3.5 编程的第一步<sup>22</sup>\n当然，我们可以用 Python\
    \ 来完成比将两个二加在一起更复杂的任务。例如，我们可以编写斐波那契数列的初始子序列，如下所示：\n\n```\nIn [42]: # 斐波那契数列：\n\
    \         # 两个元素的和定义下一个元素\n         a = 0\n         b = 1\n         while a <\
    \ 10:\n             print(a)\n             a, b = b, a+b\n```\n```\n0\n1\n1\n\
    2\n3\n5\n8\n```\n\n让我们玩一下我们刚刚编写的这段简单代码。这次我们将改变变量 **a** 和 **b** 的赋值方式。值将保持不变，但这种方式\
    \ Python 让你减少代码行数。此外，我们将改变一个小条件来展示它如何影响结果。\n\n```\nIn [43]: # 相同的斐波那契数列：\n   \
    \      # 两个元素的和定义下一个元素\n         a, b = 0, 1\n         while a < 15:\n       \
    \      print(a)\n             a, b = b, a+b\n```\n```\n0\n1\n1\n2\n3\n5\n8\n13\n\
    ```\n\n你注意到这些程序行的运行方式与之前相同吗？另外，你可能已经注意到 \"**a**\" 的上限现在是 15，因此多打印了一个结果 **13**。\n\
    \n这个例子引入了几个新特性。\n\n1. 第一行包含多个赋值：变量 \"**a**\" 和 \"**b**\" 同时获得新值 0 和 1。在最后一行，这再次被使用，演示了右侧的表达式在任何赋值发生之前都会先被评估。右侧的表达式从左到右进行评估。\n\
    2. while 循环只要条件（这里是：**a < 10**，我们后来修改为 **a<15**）保持为真就会执行。在 Python 中，任何非零整数值都是真；零是假。条件也可以是字符串或列表值，实际上，任何序列；任何具有非零长度的东西都是真，空序列是假。示例中使用的测试是一个简单的比较。标准比较运算符的写法与以下相同：<（小于）、>（大于）、==（等于）、<=（小于或等于）、>=（大于或等于）和\
    \ !=（不等于）。\n3. 循环体是**缩进的**：缩进是 Python 对语句进行分组的方式。在交互式提示符（在终端窗口中），你必须为每个缩进的行输入制表符或空格。在实践中，你将使用文本编辑器为\
    \ Python 准备更复杂的输入；所有体面的文本编辑器都有自动缩进功能。当交互式输入复合语句时，它后面必须跟一个空行以表示完成（因为解析器无法猜测你何时输入了最后一行）。请注意，基本块内的每一行必须缩进相同的量。\n\
    4. **print()** 函数写入其给定参数的值。它与直接写你想写的表达式（就像我们之前在计算器示例中所做的那样）的不同之处在于它处理多个参数、浮点数和字符串的方式。字符串打印时不带引号，并且在项目之间插入空格，因此你可以很好地格式化内容，像这样：\n\
    \n```\nIn [44]:  i = 256*256\n          print('The value of i is', i)\n```\n```\n\
    The value of i is 65536\n```\n\n## 3.5.1 关于 Print() 的更多信息\n我们现在将看到一些非常重要和强大的概念，以\
    \ print() 作为我们方便的借口。由于 print() 是你将最常使用的函数之一，掌握它是一个额外的奖励。\n\n到目前为止，我们已经看到 **print()**\
    \ 函数打印我们在括号内给出的任何参数。它还有更多内容。让我们在 X 光下看看 **print()** 函数。\n\n**print()** 的实际语法如下。\n\
    \n```\nprint(*objects, sep=' ', end='\\n', file=sys.stdout, flush=False)\n```\n\
    \n这让我可以介绍 Python 编程的另外两个基本概念。\n\n- 参数（有时表示为 **args.**）\n- 关键字参数（有时表示为 **kwargs.**）\n\
