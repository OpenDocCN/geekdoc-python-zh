    Here is a quick overview of the available operators:


    These Operators are used to assign some value to the variables. It is important
    to regard the = operator to mean **assign** rather than **equals** to avoid confusion
    with the == equality operator.


    In the example above, the variable named **a** is assigned the value that is contained
    in the variable named **b**, so that becomes the new value stored in the variable
    **a**.


    In the table example, the += operator first adds the value contained in variable
    **a** to the value obtained in variable **b**. It then assigns the result to become
