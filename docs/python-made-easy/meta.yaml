    \ %（取模）运算符用于找出两个数的除法是否产生余数。\n\n### 4.15.3 编写你自己的代码：\n\n1. 彼得的月薪是12000。如果他每月储蓄工资的20%，编写代码计算他年底的总储蓄额。\n\
