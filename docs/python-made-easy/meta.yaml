    ### Tkinter 简介


    Tkinter 是 Python 拥有的众多 GUI 框架之一，但它是唯一内置于 Python 标准库中的框架。这意味着 Tkinter 随 Python
    标准提供，无需单独安装。为了介绍 Tkinter，我们将制作一个非常小的基于 GUI 的应用。我们将称之为 "Hello World!" 应用。首先看看这段代码，运行并查看结果，然后我们将学习
    Tkinter 的基础知识。


    ```python

    from tkinter import *


    window = Tk()

    window.title("Trial App")

    window.geometry("250x250")

    label_1 = Label(window, text = "Hello World! ")

    label_1.pack()

    window.mainloop()

    ```


    上面的代码运行时，将在一个连续循环中运行，并打开一个新窗口。如果你在这里看不到那个窗口弹出，请查看桌面的任务栏。在那里你会看到一个新窗口已打开。它将是一个小窗口，就像我在这里的图片中展示的那样。


    ![](img/6423827abd996243bbfb7c0196b2aea4_431_0.png)


    - 我们刚刚在运行上面的代码时创建的 GUI 界面在桌面任务栏上显示如下。

    - 注意 **In[ ]** 中的 *。它表示代码正在运行。代码的最后一行有 **mainloop()** 方法。这使代码在 GUI 窗口打开时保持在无限循环中运行。一旦你关闭
    GUI 窗口，这个 * 将被一个数字替换，表示代码已完成运行。

    - 与上面类似。这表示网页正忙。这是因为 GUI 窗口已打开且循环正在运行。


    这就是我们创建的 GUI 窗口。这是一个独立的窗口，独立于网页。你可以拖动它、最小化它、最大化它，并通过顶部的三个按钮关闭它。


    让我们更近距离地看看 GUI。


    ![](img/6423827abd996243bbfb7c0196b2aea4_432_0.png)


    图 14-3 first_app_screenshot


    如你所见，这还没有任何功能，只是一个普通的画布。想象它是你用来玩耍的画布，你可以在上面放置任何东西。我们现在就要这样做。


    ## 14.2 Tkinter 基础


    Tkinter 非常易于使用，并且本质上是模块化的，因此非常适合 Python 的面向对象编程方法。要使其运行，有 6 个非常基本的步骤，这些步骤可以重复任意次数。


    - 导入 Tkinter（到现在你已经相当了解如何以及导入 Python 中的模块了）

    - 创建你的基础或根或窗口（名称可以是任何）对象

    - 更改窗口的标题（这完全是可选的）

    - 创建小部件（有许多小部件，我们将看到其中一些）

    - 将小部件放在屏幕上的窗口中（使用 **.pack()**，或 **.grid()** 或 **.place()**）

    - 使用 **.mainloop()** 方法运行无限循环。


    ![](img/6423827abd996243bbfb7c0196b2aea4_433_0.png)


    图 14-4 tkinter_steps_to_code


    如果你记得遵循上述 Tkinter 基础知识，剩下的就轻而易举了。当然，有大量的附加选项和属性，其中一些我们将在本章后面看到。但这个基础总是被遵循，其余的是在此基础上的附加内容。


    ## 14.3 货币转换器 GUI 窗口


    让我们创建我们想要制作的货币转换器的 GUI 窗口。现在，我们只打算制作 GUI 窗口，它还不是真正的转换器。我们将一步一步地看，首先是 GUI，然后是制作普通转换器的代码。最后，我们将这两者结合起来，制作基于
    GUI 的货币转换器。


    ### 14.3.1 使用 .pack()


    ```python

    from tkinter import *

    # 创建基础窗口，并将其传递给变量名 root

    root = Tk()

    # 重命名标题

    root.title("Currency Converter")

    # 创建我们的 Label 小部件。

    label_1 = Label(root, text = " Input the Amount for Conversion", font = "arial
    12 bold", borderwidth = 10)

    label_2 = Label(root, text = " Convert From Currency :", font = "arial 10", borderwidth
    = 10)

    label_3 = Label(root,text = " Convert to Currency :", font = "arial 10", borderwidth
    = 10 )

    label_4 = Label(root,text = " Converted Amount :", font = "arial 10", borderwidth
    = 10 )

    output = Label(root, text = "Print the output here", font = "arial 10", borderwidth
    = 10)

    # 创建我们的 Entry 框小部件。

    Enter_1 = Entry(root, borderwidth = 5 )

    Enter_2 = Entry(root, borderwidth = 5 )

    Enter_3 = Entry(root, borderwidth = 5 )

    # 创建我们的 Button 小部件。

    my_button = Button(root, text = " CONVERT",

    font = "arial 10", borderwidth = 5 )

    # 将小部件放到根窗口上

    label_1.pack()

    label_2.pack()

    label_3.pack()

    label_4.pack()

    output.pack()

    Enter_1.pack()

    Enter_2.pack()

    Enter_3.pack()

    my_button.pack()

    # 运行循环以激活 GUI

    root.mainloop()

    ```


