    # 20.8.2 Format Strings (fmt) str, optional. This is short for the format string.
    Format strings are just an abbreviation for quickly setting basic line properties.
    This argument cannot be passed as a keyword.


    A format string consists of a part for color, marker, and line: `fmt = ''[marker][line][color]''`


    Each of them is optional. If not provided, the value from the style cycle is used.
    Exception: If the line is given, but no marker, the data will be a line without
    markers. Other combinations such as [color][marker][line] are also supported but
    note that their parsing may be ambiguous.


