    # 13.2 More on Modules A module can contain executable statements as well as function
    definitions. These statements are intended to initialize the module. They are
    executed only the first time the module name is encountered in an import statement.


    Function definitions are also ''statements'' that are ''executed''; the execution
    of a module-level function definition enters the function name in the module''s
    global symbol table.


    Each module has its own private symbol table, which is used as the global symbol
    table by all functions defined in the module. Thus, the author of a module can
    use global variables in the module without worrying about accidental clashes with
    a user''s global variables.⁶²'
