  md: '# 4.3.2 Advantages of Built-in Objects


    The built-in objects make one very important aspect of Python being a "High-Level
    Language". In low-level languages, like C or C++, most of the work goes into *implementing
    Objects* or creating Data Structures. There, the programmer needs to define an
    Object type, lay out memory structure, and manage memory allocations, and so on.
    These tedious and error-prone jobs take the focus away from the real thing, **Problem-solving**.


    In most of the Python Programs, all this hard, tedious, and repetitive work is
    done away with. Because, Python provides Powerful object types as built in the
    language, that most of the time, there is no need to code object implementation
    before Problem-solving.


