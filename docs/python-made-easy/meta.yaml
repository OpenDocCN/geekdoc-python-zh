    10. 打印所有小于 300 的 9 的倍数。（提示：你可以使用 range 函数）\n\n# 6 函数\n\n函数使程序更易于理解和阅读。函数简单来说，就是一段只有在被调用时才会运行的代码块，并且它有一个名字。嗯，这个解释太简单了，但完全正确。\n\
    \n函数帮助程序员避免一遍又一遍地编写相同的代码行。\n\n## 6.1 定义函数\n\n这里需要回答的第一个问题是：什么是函数？\n\n在 Python\
    \ 中，函数是一组执行特定任务的相关语句。\n\n借助函数，我们将程序分解成更小、更模块化的块。随着我们的程序变得越来越大，函数对于保持其组织性和可管理性变得越来越必要。\n\
    \n就像 Python 中的其他一切一样，函数也是一个对象。\n\n你可以将数据（称为**参数**）传递给一个函数。函数可以返回数据作为结果。要调用一个函数，使用函数名后跟括号\
    \ **()**。例如，**len(x)** 函数给出参数 **x** 的长度。\n\n## 6.2 函数类型\n\n广义上，它们分为两种类型：\n- 内置函数：它们是预定义的，可以直接调用。\n\
    - 用户定义函数：用户定义的函数对象由函数定义创建。调用它时，应包含与函数形式参数数量相同的参数项。\n\n这里，当我们谈论**定义函数**时，我们本质上是在谈论**用户定义函数**。\n\
    \n## 6.3 内置函数\n\nPython 解释器内置了多个函数和类型，它们始终可用。这里按字母顺序列出。\n\n我们已经看到并使用了其中许多。例如 **print()**、**int()**、**input()**、**len()**\
    \ 等。\n\n| 内置函数 | | | | |\n|---|---|---|---|---|\n| abs() | delattr() | hash()\
    \ | memoryview() | set() |\n| all() | dict() | help() | min() | setattr() |\n\
    | any() | dir() | hex() | next() | slice() |\n| ascii() | divmod() | id() | object()\
    \ | sorted() |\n| bin() | enumerate() | input() | oct() | staticmethod() |\n|\
    \ bool() | eval() | int() | open() | str() |\n| breakpoint() | exec() | isinstance()\
