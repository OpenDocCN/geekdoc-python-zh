- md: '## 2.12 Exercise:


    ### 2.12.1 Answer the following:


    1. Python is open-source software. Is it the same as being a freeware?

    2. Are all freeware software Open source? If not, what is the difference?

    3. Python supports dynamic typing. What do you understand by dynamic typing?

    4. Recall 5 Most popular programming languages for Data Scientists?

    5. What is the strength of Python over C programming language?

    6. Python is portable software. What does "portability" means in this context?

    7. What is the difference in being "Extensible" and being "Embeddable"?

    8. What is the meaning of IDE? How is it different from Terminal?

    9. How do you open an existing Jupyter notebook? How is it different from opening
    a pdf or text file?

    10. How are the "markdown cell" different from "code cell" in Jupyter notebook?
    What are their purposes?


    ### 2.12.2 True or False:


    - Python programming language was named after the snake species of Python.

    - Python is a high level and general-purpose language.

    - Python is compiled and not interpreted.

    - Two + Two = Four in Python.

    - The IPython console is the same as the terminal window.

    - Plots outputted in the Jupyter notebook are viewed inside the notebook itself.

    - Chrome and Firefox browsers come bundled with the Anaconda package.

    - "Simple is better than Complex" is one of the philosophies of Python.

    - FLOSS means Free / Libre and Open Source Software.

    - Python supports ONLY Object-Oriented programming.


    ### 2.12.3 Things to do:


    - Try and experience some basic terminal commands.

    - Try the same line of codes or mathematical operations in Terminal, IDE, and
    Jupyter Notebook. Feel the difference of use and the way the result is outputted
    in them.

    - Search and learn about the magic commands in IPython and Jupyter notebooks.

    - Install the Anaconda package as instructed in this chapter and Launch Spyder
    IDE. Familiarize yourself with the layout and functionalities.

    - Launch Jupyter Notebook. Familiarize yourself with the layout and functionalities.
    Appreciate its clean layout and inbuilt cell features.


    # 3 PYTHON BASICS


    ## 3.1 Running Python


