    \n图 20-15\n\n你可能想知道为什么 x 轴范围是 0-3，而 y 轴范围是 1-4。如果你向 **plot()** 命令提供单个列表或数组，matplotlib\
    \ 会将其视为 y 值的序列，并自动为你生成 x 值。由于 python 的 range 从 0 开始，默认的 x 向量与 y 具有相同的长度，但从 0 开始。因此\
    \ x 数据是 [0, 1, 2, 3]。\n\n**plot()** 是一个多功能的命令，可以接受任意数量的参数。例如，要绘制 x 对 y 的图，你可以发出命令：\n\
    \n```\nIn [15]: plt.plot([1, 2, 3, 4], [1, 4, 9, 16])\n```\n\n```\nOut[15]: [<matplotlib.lines.Line2D\
