    # 13.6.2 Calling a package to use⁶⁸


    To use a package, we need to import it first. Users of the package can import
    individual modules from the package. For example, to **import** the module **echo**
    inside the subpackage **effects**, which is inside the package **sound: import
    sound.effects.echo** This loads the submodule **sound.effects.echo**. Now, when
    we want to use the function **echofilter** (which is in module **echo**), we need
    to call the function in following'
- md: 'fashion. You may notice that the package and the module must be referenced
    with its full name.


    ```

    sound.effects.echo.echofilter(input, output, delay=0.7, atten=4)

    ```


    This sounds cumbersome or lengthy and is prone to errors while writing long codes.
    Good news is, there is an alternative way of importing the submodule: `from sound.effects
    import echo`. This also loads the submodule `echo` and makes it available without
    its package prefix, so it can be used as follows: `echo.echofilter(input, output,
    delay=0.7, atten=4)`. There is yet another variation to import the desired function
    or variable directly: `from sound.effects.echo import echofilter`. Again, this
    loads the submodule `echo`, but this makes its function `echofilter()` directly
    available: `echofilter(input, output, delay=0.7, atten=4)`.


    **Note** that when using `from package import item`, the item can be either a
    submodule (or subpackage) of the package or some other name defined in the package,
    like a function, class, or variable. The import statement first tests whether
    the item is defined in the package; if not, it assumes it is a module and attempts
    to load it. If it fails to find it, an ImportError exception is raised.


    On the other hand, when using syntax like `import item.subitem.subsubitem`, each
    item except for the last must be a package; the last item can be a module or a
    package but can''t be a class or function or variable defined in the previous
    item.


    ## 13.6.3 Popular Packages in Python⁶⁹


    Python is one of the most popular languages used by data scientists and software
    developers alike for data science tasks. One of the strengths of Python is the
    publicly available packages by various contributors around the world.


    It''s possible to work with data in vanilla Python, but there are quite a few
    open-source libraries that make Python data tasks much, much easier.


    As we saw, packages are there to manage similar modules and files, which perform
    specific kinds of tasks. So, we will get introduced to some packages, divided
    into three major data science domains.


    1.  Data Mining

    2.  Data Processing and Modeling

    3.  Data Visualization


    ### 1. Data Mining


    **Scrapy** One of the most popular Python data science libraries, Scrapy helps
    to build crawling programs (spider bots) that can retrieve structured data from
    the web – for example, URLs or contact info. It''s a great tool for scraping data
    used in, for example, Python machine learning models.


    Developers use it for gathering data from APIs. This full-fledged framework follows
    the Don''t Repeat Yourself principle in the design of its interface. As a result,
    the tool inspires users to write universal code that can be reused for building
    and scaling large crawlers.


    ### Data Processing and Modeling


    **NumPy** NumPy (Numerical Python) is a perfect tool for scientific computing
    and performing basic and advanced array operations.


    The library offers many handy features performing operations on n-arrays and matrices
    in Python. It helps to process arrays that store values of the same data type
    and makes performing math operations on arrays (and their vectorization) easier.
    In fact, the vectorization of mathematical operations on the NumPy array type
    increases performance and accelerates the execution time.


    3.  **SciPy** This useful library includes modules for linear algebra, integration,
    optimization, and statistics. Its main functionality was built upon NumPy, so
    its arrays make use of this library. SciPy works great for all kinds of scientific
    programming projects (science, mathematics, and engineering). It offers efficient
    numerical routines such as numerical optimization, integration, and others in
    submodules. The extensive documentation makes working with this library really
    easy.


    4.  **Pandas** Pandas is a library created to help developers work with "labeled"
    and "relational" data intuitively. It''s based on two main data structures: "Series"
    (one-dimensional, like a list of items) and "Data Frames" (two-dimensional, like
    a table with multiple columns). Pandas allow converting data structures to DataFrame
    objects, handling missing data, and adding/deleting columns from DataFrame, imputing
    missing files, and plotting data with histogram or plot box. It''s a must-have
    for data wrangling, manipulation, and visualization.


    5.  **SciKit-Learn** This is an industry standard for data science projects based
    in Python. Scikits is a group of packages in the SciPy Stack that were created
    for specific functionalities – for example, image processing. Scikit-learn uses
    the math operations of SciPy to expose a concise interface to the most common
    machine learning algorithms.


    Data scientists use it for handling standard machine learning and data mining
    tasks such as clustering, regression, model selection, dimensionality reduction,
    and classification. Another advantage? It comes with quality documentation and
    offers high performance.


    6.  **TensorFlow** TensorFlow is a popular Python framework for machine learning
    and deep learning, which was developed at Google Brain. It''s the best tool for
    tasks like object identification, speech recognition, and many others. It helps
    in working with artificial neural networks that need to handle multiple data sets.
    The library includes various layer-helpers (tflearn, tf-slim, skflow), which make
    it even more functional. TensorFlow is constantly expanded with its new releases
    – including fixes in potential security vulnerabilities or improvements in the
    integration of TensorFlow and GPU.


    ### Data Visualization


    **Matplotlib** This is a standard data science library that helps to generate
    data visualizations such as two-dimensional diagrams and graphs (histograms, scatterplots,
    and non-Cartesian coordinate’s graphs). Matplotlib is one of those plotting libraries
    that are useful in data science projects — it provides an object-oriented API
    for embedding plots into applications.


    It''s thanks to this library that Python can compete with scientific tools like
    MatLab or Mathematica. However, developers need to write more code than usual
    while using this library for generating advanced visualizations. Note that popular
    plotting libraries work seamlessly with Matplotlib.


    8.  **Seaborn** Seaborn is based on Matplotlib and serves as a useful Python machine
    learning tool for visualizing statistical models – heatmaps and other types of
    visualizations that summarize data and depict the overall distributions. When
    using this library, you get to benefit from an extensive gallery of visualizations
    (including complex ones like time series, joint plots, and violin diagrams).


    9.  **Bokeh** This library is a great tool for creating interactive and scalable
    visualizations inside browsers using JavaScript widgets. Bokeh is fully independent
    of Matplotlib. It focuses on interactivity and presents visualizations through
    modern browsers – similarly to Data-Driven Documents (d3.js). It offers a set
    of graphs, interaction abilities (like linking plots or adding JavaScript widgets),
    and styling.


    10. **Plotly** This web-based tool for data visualization that offers many useful
    out-of-box graphics – you can find them on the Plot.ly website. The library works
    very well in interactive web applications. Its creators are busily expanding the
    library with new graphics and features for supporting multiple linked views, animation,
    and crosstalk integration.


    In the coming chapters, we will work with some of these packages to do various
    data science and analysis tasks. Meanwhile, you can look up for them and know
    them better. After all, "A Mason must know his tools well, so does a Data Scientist".


