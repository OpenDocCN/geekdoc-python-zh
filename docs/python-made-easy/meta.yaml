    \ to .loc function, there is another function .iloc which takes integer arguments\
    \ and returns the row as a series. That integer shall be the index of that row.\n\
    \n```\nIn [12]: purchase.iloc[2]\n```\n\n```\nOut[12]: apples    8\n        bananas\
    \   9\n        Total    17\n        Name: Simon, dtype: int64\n```\n\n### 17.7.2\
    \ Row Slice (Multiple Row Selection)\n\nMultiple rows can be selected by using\
