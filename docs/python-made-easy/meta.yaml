  - "[PAGE 476]\n\n```\nIn [91]: d[0,0] = 9999\n        a                # d doesn't\
    \ change anything within a\n```\n\n```\nOut[91]: array([[  0,  10,  10,   3],\
    \ [1234,  10,  10,   7], [  8,  10,  10,  11]])\n```\n\nSometimes copy should\
    \ be called after slicing if the original array is not required anymore. For example,\
    \ suppose **a** is a huge intermediate result and the final result **b** only\
    \ contains a small fraction of **a**, a deep copy should be made when constructing\
    \ **b** with slicing:\n\n```\nIn [92]: a = np.arange(int(1e8)) b = a[:100].copy()\n\
    \        del a                # the memory of ``a`` can be released.\n```\n\n\
    If **b = a[:100]** is used instead, **a** is referenced by **b** and will persist\
    \ in memory even if **del a** is executed.\n\n# 15.15 How does a NumPy array look\
    \ like in real life?\n\nWe have seen till now what a NumPy array is, and how it\
    \ can be created from various data types. But when I was introduced to NumPy for\
    \ the first time, I kept on thinking for days, how is it important. Everyone says\
    \ that NumPy is the most important library, but it seemed like only matrix operations,\
    \ that too on matrices created by us only, for learning. How is it going to help\
    \ me solve real-world problems?\n\nWhen I got an answer to this question, I was\
    \ pretty excited. I was excited to see that almost everything which we analyze\
    \ in daily life"
  - '[PAGE 477]


    when converted to a format that computer can understand, it takes multi-dimensional
    array format (which is what NumPy array format is).


    So let me introduce you to some of these objects and their representation in a
    matrix format. The images being used in this section are with courtesy from Jay
    Alammar<sup>74</sup> from his blog, which can be accessed from the following link.


    [http://jalammar.github.io/visual-numpy/](http://jalammar.github.io/visual-numpy/)


    Think of all the data types you’ll need to work upon and build models around (spreadsheets,
    images, audio...etc). So many of them are perfectly suited for representation
    in an n-dimensional array: **Tables and Spreadsheets** A spreadsheet or a table
    of values is a two-dimensional matrix. Each sheet in a spreadsheet can be its
    own variable. The most popular abstraction in python for those is the pandas DataFrame,
    which uses NumPy and builds on top of it.


    ![](img/6423827abd996243bbfb7c0196b2aea4_477_0.png)


    .2 Figure 15-9 excel-to-pandas **Audio and Timeseries** *An audio file is a one-dimensional
    array of samples. Each sample is a number representing a tiny chunk of the audio
    signal. CD-quality audio may have 44,100 samples per second and each sample is
    an integer between -32767 and 32768. Meaning if you have a ten-seconds WAVE file
    of CD-quality, you can load it in a NumPy array with length 10 * 44,100 = 441,000
    samples. Want to extract the first second of audio? simply load the file into
    a NumPy array that we’ll call audio, and get audio[:44100].*'
