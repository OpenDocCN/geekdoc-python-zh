- md: '## 2.2.7.4 Jython


    Supports – Up to Python 2.7


    Formerly known as JPython, Jython is an implementation of Python that runs on
    the Java platform. Written in Java and Python, Jython converts Python code into
    Java bytecode and hence allows Python code to run on any machine having a JVM.


    Jython provides support for both static and dynamic compilation. An important
    feature of the popular Python interpreter is that it allows importing as well
    as using any Java class like a Python module.


    Whether you need to interface with an existing Java codebase or write Python code
    for the JVM, you can place your bet on Jython.


    ## 2.2.7.5 PyPy


    Supports – Up to Python 2.7, Python 3.5 and Python 3.6


    PyPy is a fast, compliant alternative implementation of the Python programming
    language. The Python interpreter is implemented in RPython, which is a restricted
    statically-typed subset of the Python programming language.


    Featuring a JIT compiler, PyPy supports C, CLI, and JVM back-ends. The foremost
    goal of PyPy is to offer maximum compatibility with the reference CPython implementation
    while enhancing the performance at the same time.


    PyPy is used by Python developers looking to enhance the performance of some specific
    Python code. According to the *official PyPy website*, the popular Python interpreter
    is about 4.4 times faster than CPython.


    ## 2.2.7.6 PythonNet


    *Supports – Python 2.6 to Python 3.5*


    PythonNet offers near-seamless integration of a native Python installation with
    the .NET CLR. Its approach can be considered to be inverse to that of the one
    followed by the IronPython.


    Together with Mono, PythonNet allows a native Python installation on a non-Windows
    operating system to operating within the .NET framework. It is possible to operate
    PythonNet alongside IronPython without any issues.


    ## 2.2.7.7 Stackless Python


    Supports – Up to Python 3.7


    CPython and other popular Python interpreters depend on the C call for its stack.
    However, this isn’t the case with Stackless Python interpreter.


    Although Stackless Python uses the C stack, it is cleared between function calls.
    Hence, the Python interpreter doesn’t depend on the C call for its stack. Like
    CPython, Stackless Python is written using C and Python.


    In addition to providing support for threads, Stackless Python offers support
    for communication channels, coroutines, pre-compiled binaries, round-robin scheduling,
    task serialization, and tasklets.


    Perhaps the most important feature of Stackless Python is microthreads. The feature
    helps in avoiding much of the overhead associated with the typical operating system
    threads.


    The above introduction to the interpreters is for your better understanding of
