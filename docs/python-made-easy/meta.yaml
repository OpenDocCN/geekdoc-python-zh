    by an image, a graph or a chart, it communicates the meaning to the analyst as
    well as to anyone else the same is presented. Data visualization plays an essential
    role in the representation of both small and large-scale data.


    # ### 19.1.1 Importance of Data Visualization


    One of the key skills of a data scientist is the ability to tell a compelling
    story. To first understand the data to write that story, the analyst visualizes
    the data in many forms, until the raw data starts making sense to him. The patterns
    in the data emerge better in the form of visuals.


    Hence, learning how to leverage a software tool to visualize data will enable
