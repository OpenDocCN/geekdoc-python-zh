    You can document the computational process in a literate way, alternating descriptive
    text with code, using rich text. In IPython this is accomplished by marking up
    text with the Markdown language. The corresponding cells are called Markdown cells.
    The Markdown language provides a simple way to perform this text markup, that
    is, to specify which parts of the text should be emphasized (italics), bold, form
    lists, etc.


    If you want to provide structure for your document, you can use markdown headings.
    Markdown headings consist of 1 to 6 hash # signs followed by a space and the title
    of your section. The markdown heading will be converted to a clickable link for
    a section of the notebook. It is also used as a hint when exporting to other document
    formats, like PDF.


    When a Markdown cell is executed, the Markdown code is converted into the corresponding
    formatted rich text. Markdown allows arbitrary HTML code for formatting.


    Within Markdown cells, you can also straightforwardly include mathematics, using
    standard LaTeX notation: for inline mathematics and for displayed mathematics.
    When the Markdown cell is executed, the LaTeX portions are automatically rendered
    in the HTML output as equations with high-quality typography. This is made possible
    by MathJax, which supports a large subset of LaTeX functionality.


    ## 2.9.11 Raw cells


    Raw cells provide a place in which you can write output directly. Raw cells are
    not evaluated by the notebook. When passed through nbconvert_, raw cells arrive
    in the destination format unmodified. For example, you can type full LaTeX into
    a raw cell, which will only be rendered by LaTeX after conversion by nbconvert.


    ## 2.9.12 Basic workflow


    The normal workflow in a notebook is, then, quite similar to a standard IPython
    session, with the difference that you can edit cells in-place multiple times until
    you obtain the desired results, rather than having to rerun separate scripts with
    the **%run magic command**.


    Typically, you will work on a computational problem in pieces, organizing related
    ideas into cells, and moving forward once previous parts work correctly. This
    is much more convenient for interactive exploration than breaking up a computation
    into scripts that must be executed together, as was previously necessary, especially
    if parts of them take a long time to run.


    To interrupt a calculation that is taking too long, use the: GUI label: **Kernel**,
    GUI label: **Interrupt** menu option or the **“i,i”** keyboard shortcut. Similarly,
    to restart the whole computational process, use the: GUI label: **Kernel**, GUI
    label: **Restart** menu option, or **0,0** shortcut.


    A notebook may be downloaded as a **.ipynb** file or converted to several other
    formats using the menu option: GUI label: **File**, GUI label: **Download as**.


    ## 2.9.13 Keyboard shortcuts


    All actions in the notebook can be performed with the mouse, but keyboard shortcuts
    are also available for the most common ones. The essential shortcuts to remember
    are the following:


    **Shift-Enter**: run cell


    Execute the current cell, show any output, and jump to the next cell below. If
    Shift-Enter is invoked on the last cell, it makes a new cell below. This is equivalent
    to clicking the: GUI label: **Cell**, GUI label: **Run** menu item, or the Play
    button in the toolbar.


    **Esc**: Command mode


    In command mode, you can navigate around the notebook using keyboard shortcuts.


    **Enter:** Edit mode


    In edit mode, you can edit the text in cells.


    **H** (When in Command Mode): Gives a list of all other Keyboard Shortcuts.


    ## 2.9.14 Plotting


    One major feature of the Jupyter notebook is the ability to display plots that
    are the output of running code cells. The IPython kernel is designed to work seamlessly
    with the matplotlib_ plotting library to provide this functionality. Specific
    plotting library integration is a feature of the kernel.


    ## 2.9.15 Browser Compatibility


    The Jupyter Notebook aims to support the latest versions of these browsers:


    - 1. Chrome

    - 2. Safari

    - 3. Firefox

    - 4. Edge


    Using Safari with HTTPS and an untrusted certificate is known to not work (web
    sockets will fail).


    ## 2.10 What to use?


    We saw four ways to use Python or run codes in Python. Each comes with its advantages.
    Also, most of the experienced programmers use all of them, depending on the kind
    of project they are working on or the need of the hour. Let us have a brief comparison
    for usage.


    **Terminal** window is the starting and most basic way to run python, as we saw
    earlier. But it''s certainly not the most elegant way. To write long codes and
    run here is quite cumbersome, and debugging them in the terminal is not an easy
    task. We will use the terminal very occasionally, for very specific purposes,
    as and when the need arises.


    **IPython Qt Console** is a very lightweight application that largely feels like
    a terminal but provides many enhancements only possible in a GUI, such as inline
    figures, proper multiline editing with syntax highlighting, graphical calltips,
    and more. They can be used as a clean way to test your codes or scripts. The benefits
    of the console are however also available in the IDE. So when we are using IDE,
    console kind of looks obsolete.


    **Spyder IDE** is the application most programmers use to write, debug, and test
    runs the line of codes. Here we can run the codes either line by line, or club
    them in a cell and run the entire cell together. We will learn this in detail
    when we get to use it. Also, we have results printed in front of us, and the graphs
    as well as the objects are available to be viewed in another window. This is where
    you will like to work once you get a hand of Python. It is worthwhile to mention
    that this is not the only IDE for python. There are many other available, but
    we will use this as this comes as default with Anaconda and is second to none
    in terms of functionalities.


    **Jupyter Notebook** is a web-based interactive computing platform. The notebook
    combines live code, equations, narrative text, visualizations, interactive dashboards,
    and other media. This becomes a very useful tool when the data being analyzed
    also needs to be presented (which is the case most of the time). You can write
    codes, and descriptions, create charts and give explanations, all in one place.


    All the above run the Python language and the syntax is the same on all these.
    They are just interfaces to Python Kernel. Which one to use depends on what is
    the proficiency of the user and what kind of output does he desire.


    I use Spyder as the IDE of choice and Jupyter Notebook for presenting the complete
    analysis.


    > Fun Fact: This book is written using Jupyter Notebook, Entirely.


    ## 2.11 SUMMARY:


    This chapter introduces you to the magical world of Python. Python as a programming
    language has no equals. This is simple, versatile, and still, at the same time,
    very dedicated to specific tasks like Data Analytics, Data Munging, and Machine
    learning.


    In this chapter, we learned about What Python is, what does it stand for and why
    do the programmers love it so much. We also learned the easiest and most powerful
    way to install and use Python, i.e. thru Anaconda Navigator. We learned how to
    install Anaconda which automatically installs Python on your machine.


    We also got introduced to Python Consoles, Spyder, and Jupyter Notebook.


    These are the tools, without which we will not be able to learn and practice further.
    Hence, it''s strongly recommended that you install and get hang of the tools we
    learned in this chapter.'
  mdcn: '其类型可以通过工具栏上的下拉菜单（初始为“Code”）或通过参考：**键盘快捷键 <keyboard-shortcuts>** 来更改。


    有关在笔记本中可以执行的不同操作的更多信息，请参阅示例集合。


    ## 2.9.9 代码单元格


    代码单元格允许你编辑和编写新代码，并提供完整的语法高亮和制表符补全功能。你使用的编程语言取决于内核，默认内核（IPython）运行 Python 代码。


    当执行代码单元格时，其中包含的代码会被发送到与笔记本关联的内核。计算返回的结果随后会作为单元格的输出显示在笔记本中。输出不仅限于文本，还可以是许多其他形式，包括
    Matplotlib 图形和 HTML 表格（例如，在 Pandas 数据分析包中使用）。这被称为 IPython 的富显示能力。


    ## 2.9.10 Markdown 单元格


    你可以使用富文本，以一种文学化的方式记录计算过程，交替使用描述性文本和代码。在 IPython 中，这是通过使用 Markdown 语言标记文本来实现的。相应的单元格称为
    Markdown 单元格。Markdown 语言提供了一种简单的方法来进行这种文本标记，即指定文本的哪些部分应该被强调（斜体）、加粗、形成列表等。


    如果你想为文档提供结构，可以使用 Markdown 标题。Markdown 标题由 1 到 6 个井号 # 后跟一个空格和你的章节标题组成。Markdown
    标题将被转换为笔记本中某个章节的可点击链接。在导出为其他文档格式（如 PDF）时，它也被用作提示。


    当执行 Markdown 单元格时，Markdown 代码会被转换为相应的格式化富文本。Markdown 允许使用任意 HTML 代码进行格式化。


    在 Markdown 单元格中，你还可以直接使用标准 LaTeX 符号来包含数学公式：用于行内数学公式和显示数学公式。当执行 Markdown 单元格时，LaTeX
    部分会自动在 HTML 输出中渲染为具有高质量排版的方程式。这由 MathJax 实现，它支持 LaTeX 功能的很大一部分。


    ## 2.9.11 原始单元格


    原始单元格提供了一个可以直接写入输出的地方。原始单元格不会被笔记本评估。当通过 nbconvert_ 传递时，原始单元格会原封不动地到达目标格式。例如，你可以在原始单元格中输入完整的
    LaTeX，它只会在 nbconvert 转换后由 LaTeX 渲染。


    ## 2.9.12 基本工作流程


    因此，笔记本中的正常工作流程与标准的 IPython 会话非常相似，不同之处在于你可以多次就地编辑单元格，直到获得所需的结果，而不必使用 **%run 魔术命令**
    重新运行单独的脚本。


    通常，你会分部分处理一个计算问题，将相关的想法组织到单元格中，并在前面的部分正确运行后继续前进。这比将计算分解成必须一起执行的脚本要方便得多，尤其是当其中某些部分运行时间很长时。


    要中断一个耗时过长的计算，请使用：GUI 标签：**Kernel**，GUI 标签：**Interrupt** 菜单选项或 **“i,i”** 键盘快捷键。同样，要重新启动整个计算过程，请使用：GUI
    标签：**Kernel**，GUI 标签：**Restart** 菜单选项，或 **0,0** 快捷键。


    笔记本可以下载为 **.ipynb** 文件，或使用菜单选项：GUI 标签：**File**，GUI 标签：**Download as** 转换为其他几种格式。


    ## 2.9.13 键盘快捷键


    笔记本中的所有操作都可以通过鼠标执行，但最常用的操作也有键盘快捷键可用。需要记住的基本快捷键如下：


    **Shift-Enter**：运行单元格


    执行当前单元格，显示任何输出，并跳转到下方的下一个单元格。如果在最后一个单元格上使用 Shift-Enter，它会在下方创建一个新单元格。这等同于单击：GUI
    标签：**Cell**，GUI 标签：**Run** 菜单项，或工具栏中的播放按钮。


    **Esc**：命令模式


    在命令模式下，你可以使用键盘快捷键在笔记本中导航。


    **Enter：** 编辑模式


    在编辑模式下，你可以编辑单元格中的文本。


    **H**（在命令模式下时）：显示所有其他键盘快捷键的列表。


    ## 2.9.14 绘图


    Jupyter Notebook 的一个主要功能是能够显示运行代码单元格的输出图表。IPython 内核旨在与 matplotlib_ 绘图库无缝协作以提供此功能。特定的绘图库集成是内核的一个特性。


    ## 2.9.15 浏览器兼容性


    Jupyter Notebook 旨在支持这些浏览器的最新版本：


    - 1. Chrome

    - 2. Safari

    - 3. Firefox

    - 4. Edge


    已知使用带有 HTTPS 和不受信任证书的 Safari 无法工作（Web 套接字会失败）。


    ## 2.10 使用哪个？


    我们看到了四种使用 Python 或在 Python 中运行代码的方法。每种方法都有其优点。此外，大多数经验丰富的程序员都会根据他们正在处理的项目类型或当前需求使用所有这些方法。让我们简要比较一下它们的用途。


    **终端**窗口是运行 Python 的起点和最基本的方式，正如我们之前所见。但它肯定不是最优雅的方式。在这里编写和运行长代码相当繁琐，在终端中调试它们也不是一件容易的事。我们只会偶尔使用终端，用于非常特定的目的，视需要而定。


    **IPython Qt 控制台**是一个非常轻量级的应用程序，很大程度上感觉像一个终端，但提供了许多只有在 GUI 中才可能实现的增强功能，例如内联图形、带有语法高亮的正确多行编辑、图形化调用提示等。它们可以作为测试代码或脚本的一种简洁方式。然而，控制台的好处在
    IDE 中也可用。因此，当我们使用 IDE 时，控制台看起来有点过时了。


    **Spyder IDE** 是大多数程序员用来编写、调试和测试运行代码行的应用程序。在这里，我们可以逐行运行代码，或者将它们组合在一个单元格中并一起运行整个单元格。当我们开始使用它时，我们将详细学习这一点。此外，结果会打印在我们面前，图形和对象也可以在另一个窗口中查看。一旦你熟悉了
    Python，你就会喜欢在这里工作。值得一提的是，这不是 Python 的唯一 IDE。还有许多其他可用的 IDE，但我们将使用这个，因为它随 Anaconda
    默认提供，并且在功能方面无与伦比。


    **Jupyter Notebook** 是一个基于 Web 的交互式计算平台。该笔记本结合了实时代码、方程式、叙述性文本、可视化、交互式仪表板和其他媒体。当需要分析的数据还需要呈现时（大多数情况下都是如此），这成为一个非常有用的工具。你可以在一个地方编写代码、描述、创建图表并给出解释。


    以上所有方法都运行 Python 语言，并且在所有这些方法中语法是相同的。它们只是 Python 内核的接口。使用哪一个取决于用户的熟练程度以及他期望什么样的输出。


    我使用 Spyder 作为首选 IDE，使用 Jupyter Notebook 来呈现完整的分析。


    > 有趣的事实：这本书完全使用 Jupyter Notebook 编写。


    ## 2.11 总结：


    本章向你介绍了 Python 的神奇世界。Python 作为一种编程语言无与伦比。它简单、通用，并且同时非常专注于特定任务，如数据分析、数据整理和机器学习。


    在本章中，我们了解了 Python 是什么，它代表什么，以及为什么程序员如此喜爱它。我们还学习了安装和使用 Python 最简单、最强大的方法，即通过 Anaconda
    Navigator。我们学习了如何安装 Anaconda，它会自动在你的机器上安装 Python。


    我们还介绍了 Python 控制台、Spyder 和 Jupyter Notebook。


    这些是我们无法进一步学习和实践的工具。因此，强烈建议你安装并掌握我们在本章中学到的工具。'
