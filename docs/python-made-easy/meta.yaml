    \ 17-3 Series in a DataFrame in Pandas\n\n## 17.5 DataFrame\n\n### 17.5.1 Creating\
    \ a DataFrame\n\nThere are many ways to create a DataFrame.\n\nA pandas DataFrame\
    \ can be created using various inputs like:\n\n- Lists\n- dict\n- Series\n- NumPy\
    \ ndarrays\n- Another DataFrame\n\nLet's create it from a python dictionary here.\
    \ It's a dictionary of fruit purchases from a grocery shop.\n\n```\nIn [1]: data\
    \ = {\n        \"apples\":[4, 5, 8, 8, 9],\n        \"bananas\":[10, 6, 9, 3,\
    \ 4]\n    }\n\n    data\n```\n\n```\nOut[1]: {'apples': [4, 5, 8, 8, 9], 'bananas':\
    \ [10, 6, 9, 3, 4]}\n```\n\nThe data frame constructor in pandas is **pd.DataFrame()**.\
    \ Let's use this to create our DataFrame. But before doing anything else, we need\
