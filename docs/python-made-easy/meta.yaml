  mdcn: "## 3.5.1 参数与关键字参数\n\n如上所述，它们带有一个**名称**，而等号右侧的值是分配给它的值。你在语法中看到的值是**默认**值。这意味着，如果你没有分配不同的值，将传递默认值，并且不会出现语法错误。\n\
    \n现在，理解了参数和关键字参数，让我们来理解**print()**语法的含义，以及如何灵活运用它。\n\n**语法：** `print(*objects,\
    \ sep=' ', end='\\n', file=sys.stdout, flush=False)`\n\n**参数：**\n\n- **\\*objects**：任意对象，数量不限。打印前会转换为字符串。\n\
    - **sep=' '**：（可选）指定如果有多个对象时，如何分隔它们。默认值是空格，由' '指定。\n- **end='\\n'**：（可选）指定在末尾打印什么。默认值是**换行符**，由'\\\
    n'指定。\n- **file=sys.stdout**：（可选）一个具有write(string)方法的对象。如果省略，将使用默认的**sys.stdout**，它会在屏幕上打印对象。\n\
    - **flush=False**：（可选）一个布尔值，指定输出是刷新（True）还是缓冲（False）。默认为False。\n\n现在让我们来实践一下。注意以下代码行中的变化。为了更好地理解，我们将使用之前编写的同一个简单的斐波那契数列代码。\n\
    \n```\nIn [45]: # Same Fibonacci series # the sum of two elements defines the\
    \ next a, b = 0, 1\nwhile a < 15: print(a, end=',') a, b = b, a+b\n```\n\n0,1,1,2,3,5,8,13,\n\
    \n现在，你可以在各种程序中自行尝试其他**关键字参数**，看看它们如何改变输出。\n\n## 3.5.2 一种很酷的打印输出方式\n\n这不是一个概念，而是向你介绍一种打印结果或任何语句的很酷的方式。你将在后面的字符串格式化部分作为概念学习这个。但在那之前，你完全可以先尝试一下，玩玩看。\n\
    \n```\nIn [46]: a = 5\n        b = 6\n        ab = 5*6\n\n        print(\"when\
    \ {} is multiplied by {}, the result is {}\".format(a, b, ab))\n```\n\nwhen 5\
    \ is multiplied by 6, the result is 30\n\n```\nIn [47]: # One string variant name\
    \ = \"Nilabh\"\n        lastname = \"Nishchhal\"\n        place = \"Mumbai\"\n\
    \n        print(\"{} {} lives in {}\".format(name, lastname, place))\n```\n\n\
    Nilabh Nishchhal lives in Mumbai\n\n在上面的两个例子中，当变量的值改变时，输出也会相应改变。这将在接下来的章节中成为一个非常有用的工具。\n\
    \n## 3.5.3 强大的print()绘制基本形状\n\n我们已经看到了print的用法及其语法。下面让我展示一个非常简单的技巧。让我们用基本代码画一个三角形。\n\
    \n```\nIn [48]: print(\"      /|\")\n        print(\"     / |\")\n        print(\"\
    \    /  |\")\n        print(\"   /   |\")\n        print(\"  /    |\")\n     \
    \   print(\" /____|\")\n```\n\n![](img/6423827abd996243bbfb7c0196b2aea4_158_0.png)\n\
    \n这是一种非常基础和简单的制作形状的方法。在接下来的章节中，当我们学习循环和控制流语句时，我们将制作一些更有趣的形状。这样，我们也将了解循环是如何工作的。\n\
    \n这个三角形只是对未来内容的一个预览。\n\n## 3.6 故障排除<sup>23</sup>\n\n当我们的代码没有给出预期的结果，或者根本没有给出结果时，就需要进行故障排除。当代码没有给出结果时，它可能会抛出一个错误。Python中的错误信息非常详细，能准确指出错误是什么以及错误在哪里。\n\
    \n对于编程新手来说，看到错误信息是很常见的。他们的倾向是不假思索地立即关闭它，然后盯着自己的代码，仿佛问题会自动解决一样。虽然逐行检查代码最终会让你找到问题，但错误信息可以为你提供一条解决问题的捷径。\n\
    \n我们将在这里看到最常发生的三种主要错误类型。\n\n- 语法错误\n- 运行时错误\n- 语义错误\n\n![](img/6423827abd996243bbfb7c0196b2aea4_159_0.png)\n\
