    # 18.9 Working with mathematical formulas The ease of implementing mathematical
    formulas that work on arrays is one of the things that make NumPy so widely used
    in the scientific Python community.


    For example, this is the mean square error formula (a central formula used in
    supervised machine learning models that deal with regression):


    $MeanSquareError = \frac{1}{n} \sum_{i=1}^{n} (Y\_prediction_i - Y_i)^2$


    Figure 16-14 Mean Square Error Implementing this formula is simple and straightforward
    in NumPy: `error = (1/n) * np.sum(np.square(predictions - labels))`


    Figure 16-15 Mean Square Error implementation What makes this work so well is
    that predictions and labels can contain one or a thousand values. They only need
    to be the same size.


    You can visualize it this way:


    ![](img/6423827abd996243bbfb7c0196b2aea4_502_0.png)'
