    \ see a few small snippets of it.\n\n## 17.6 Columns in DataFrame\n\n### 17.6.1\
    \ New Column in DataFrame\n\nColumns can be added to an existing DataFrame. This\
    \ can be done with a simple assignment.\n\n```\nIn [7]: purchase[\"oranges\"]\
