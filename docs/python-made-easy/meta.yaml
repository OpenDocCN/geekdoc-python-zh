    * * * * *\n * * * *\n  * * *\n   * *\n    *\n```\n\n## 7.2 数字图案\n\n我们使用 * 创建图案的方式，同样可以使用任何其他符号来完成。都是一样的。但当涉及到数字时，数字可以进行其他操作，而像\
