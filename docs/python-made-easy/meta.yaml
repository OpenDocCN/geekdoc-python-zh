- md: "## 5 CONTROL FLOW STATEMENTS\n\n### 5.1 Control Flow Tools\n\nAs we saw in\
    \ the previous chapter, the simple code we wrote was executed in the order in\
    \ which it was written, i.e., the executions follow the top-down flow or order.\n\
    \nWhat if we want to change or alter the flow?\n\nWhat if we want one block of\
    \ codes to be executed before the other one, depending on the conditions?\n\n\
    What if you want your program to take some decisions and do different things depending\
    \ on different situations? E.g., printing \"Even Number\" or \"Odd Number\" depending\
    \ on the number entered.\n\nFor all these, and much more, the Control Flow tools\
    \ become handy. They are the very basics of any Programming Language, and Python\
    \ has the following tools at its disposal.\n\n![Figure 5-1 Control-Flow-Tools](img/6423827abd996243bbfb7c0196b2aea4_209_0.png)\n\
    \n**if Statements**\n\n**if Statement**\n\nThe *if* statement is used to check\
    \ a condition: if the condition is true, the block of statements (called the if-block)\
    \ is executed.\n\n**Syntax:**\n\n**if** condition followed by a colon. The code\
    \ block of **if** statement comes in the next line, and it must be **indented**.\
    \ The indentation tells Python that this block of code is for the **if** statement.\n\
    \n```\nif condition:\n    do work\n```\n\nThe last line, **end if**, is not written.\
    \ The statement ends itself. You will see that in the example coming below. Let\
    \ me explain this by a flow chart how these control *flows*.\n\n![Figure 5-2 if\
    \ statement flowchart](img/6423827abd996243bbfb7c0196b2aea4_210_0.png)\n\nTry\
    \ the following code in your Jupyter Notebook or IPython. For your practice, you\
    \ may try different inputs to see different results.\n\n```\nIn [1]: if 8>5: print(\"\
    8 is greater than 5\")\n```\n\nOutput:\n```\n8 is greater than 5\n```\n\nLet's\
    \ see one more example of what happens when the condition is not true.\n\n```\n\
    In [2]: if 8<5: print(\"8 is less than 5\")\n```\n\nAs you saw, this gives no\
    \ output. As the **if** condition was not fulfilled, the **if** code block was\
    \ not executed. The program ends itself.\n\nBut most of the time, there will be\
    \ something to be done if the condition is not true, or in other words, if the\
    \ condition is false. For that, we have **if-else** statement.\n\nLet us see the\
    \ use of if statement to solve a real-life problem.\n\n**Real-Life Situation:**\
    \ There was a sale going on during the festive season in the mall. If you purchase\
    \ electronic goods, a discount of 20% is offered provided the purchase amount\
    \ is more than 50000. A customer purchases any number of items, and the total\
    \ amount for each item combined is input through the keyboard, write a program\
    \ to calculate the total bill amount to be paid.\n\n**Solution:**\n\n```\nIn [3]:\
    \ a = int(input(\"Total amount for all items purchased:\"))\n        discount\
    \ = 0\n        if a > 50000:\n            discount = (a * 20)/100\n        bill_amount\
    \ = a - discount\n        print(\"Total Bill amount to be paid is {} and discount\
    \ offered is {}\".format(bill_amount, discount))\n```\n\nOutput:\n```\nTotal amount\
    \ for all items purchased: 80000\nTotal Bill amount to be paid is 64000.0 and\
    \ discount offered is 16000.0\n```\n\n### 5.2.2 if - else Statement\n\n**The if\
    \ statement is used to check a condition:** *if* the condition is true, we run\
    \ a block of statements (called the if-block), *else* we process another block\
    \ of statements (called the else-block). The else clause is optional.\n\n```\n\
    if condition:\n    do work\nelse:\n    do something else\n```\n\n**Syntax:**\n\
    \n**if** condition followed by a colon. The code block of **if** statement comes\
    \ in the next line, and it must be **indented**. The indentation tells Python\
    \ that this block of code is for the **if** statement. Then the **else** comes\
    \ in another line, without indentation, followed by a colon. The code block of\
    \ **else** statement comes in the next line, and it must be **indented**. The\
    \ indentation tells Python that this block of code is for the **else** statement.\n\
    \n![Figure 5-3 if else statement](img/6423827abd996243bbfb7c0196b2aea4_212_0.png)\n\
    \nTry the following code in your Jupyter Notebook or IPython. For your practice,\
    \ we have used **input()** function here, which asks for users' input. You may\
    \ try different inputs to see different results.\n\n```\nIn [4]: num = int(input(\"\
    Enter a number: \"))\n        if num > 11:\n            print(\"{} is greater\
    \ than 11\".format(num))\n        else:\n            print(\"{} is smaller than\
    \ 11\".format(num))\n```\n\nOutput:\n```\nEnter a number: 15\n15 is greater than\
    \ 11\n```\n\nLet us see the use of if-else statement to solve a real-life problem.\n\
    \n**Real-Life Situation:** There was a sale going on during festive season in\
    \ the mall. If you purchase clothes and fashion accessories (FA), a discount of\
    \ 20% is offered if the purchase amount is more than 25000, otherwise, a flat\
    \ discount of 5% is offered. A customer purchases any number of items, and the\
    \ total amount for each item combined is input through the keyboard, write a program\
    \ to calculate the total bill amount to be paid.\n\n**Solution:**\n\n```\nIn [5]:\
    \ a = int(input(\"Total amount for clothes and FA purchased: \"))\n        if\
    \ a > 25000:\n            discount = (a * 20)/100\n        else:\n           \
    \ discount = (a * 5)/100\n        bill_amount = a - discount\n        print(\"\
    The final bill amount is {} and discount is {}\".format(bill_amount, discount))\n\
    ```\n\nOutput:\n```\nTotal amount for clothes and FA purchased: 20000\nThe final\
    \ bill amount is 19000.0 and discount is 1000.0\n```\n\n### 5.2.3 if - elif -\
    \ else Statement\n\nIt's evident from the name itself, elif is combination of\
    \ else and if. The flow chart of this statement will make the concept easy to\
    \ understand.\n\n![Figure 5-4 if-elif-else flowchart](img/6423827abd996243bbfb7c0196b2aea4_214_0.png)\n\
    \n```\nIn [6]: x = int(input(\"Please enter an integer: \"))\n        # using\
    \ input() function here, which asks for user input.\n        if x < 0:\n     \
    \       print('Negative Number')\n        elif x == 0:\n            print('Zero')\n\
    \        elif x == 1:\n            print('Single')\n        else:\n          \
    \  print('More')\n```\n\nOutput:\n```\nPlease enter an integer: 4\nMore\n```\n\
    \nThere can be zero or more **elif** parts, and the else part is optional. The\
    \ keyword ‘elif’ is short for ‘else if’, and is useful to avoid excessive indentation.\n\
    \nLet us see the use of the if-elif-elif statement to solve a real-life problem.\n\
    \n**Real-Life Situation:** There is a company that employs people all over the\
    \ country. The HR department categorizes cities based on population in 3 categories:\
    \ A, B, and C. Based on the class of the city, house rent allowance (HRA) varies,\
    \ as below:\n- A Class city - 30% of Basic salary\n- B Class city - 20% of Basic\
    \ salary\n- C Class city - 10% of Basic salary\n\nThe basic salary and class of\
    \ the city for an employee are being entered by keyboard input. Calculate the\
    \ HRA payable for that employee.\n\n**Solution:**\n\n```\nIn [7]: name = \"Nilabh\"\
    \n        basic_salary = int(input(\"Basic Salary of {} is Rs \".format(name)))\n\
    \        city_class = input(\"{} lives in class of city: \".format(name))\n  \
    \      if city_class == (\"a\" or \"A\"):\n            HRA = (basic_salary * 30)/100\n\
    \        elif city_class == (\"b\" or \"B\"):\n            HRA = (basic_salary\
    \ * 20)/100\n        elif city_class == (\"c\" or \"C\"):\n            HRA = (basic_salary\
    \ * 10)/100\n        print(\"The HRA for {} is {} as he lives in {} Class of City\"\
    .format(name, HRA, city_class))\n```\n\nOutput:\n```\nBasic Salary of Nilabh is\
    \ Rs 100000\nNilabh lives in class of city: b\nThe HRA for Nilabh is 20000.0 as\
    \ he lives in b Class of City\n```\n\nThe **elif** and **else** statements must\
    \ also have a colon at the end of the logical line followed by their corresponding\
    \ block of statements (with proper indentation, of course). You can have another\
    \ if statement inside the **if-block** of an **if** statement and so on - this\
    \ is called a **nested if statement**.\n\n### 5.3 for Statements (for loop)\n\n\
    The for statement in Python iterates over the items of any sequence (a list or\
    \ a string), in the order that they appear in the sequence.\n\nLoops are used\
    \ in programming to repeat a specific block of code.\n\n> **Note:** Iteration\
    \ means the repetition of a process or utterance.\n\n![Figure 5-5 for_loop](img/6423827abd996243bbfb7c0196b2aea4_217_0.png)\n\
    \n```\nIn [8]: # Measure some strings:\n        words = ['cat', 'window', 'defenestrate']\n\
    \        for w in words:\n            print(w, len(w))\n```\n\nOutput:\n```\n\
    cat 3\nwindow 6\ndefenestrate 12\n```\n\nHere, in the statement, **for w in words:**,\
    \ w is just a notation, and doesn't have a meaning of the original alphabet. What\
    \ it means is, you may write anything there. The same example is with another\
    \ such notation **i**.\n\n```\nIn [9]: # Measure some strings:\n        words\
    \ = ['cat', 'window', 'defenestrate']\n        for i in words:\n            print(i,\
    \ len(i))\n```\n\nOutput:\n```\ncat 3\n```"
  mdcn: "## 5 控制流语句\n\n### 5.1 控制流工具\n\n正如我们在上一章所看到的，我们编写的简单代码是按照其编写顺序执行的，即执行遵循自上而下的流程或顺序。\n\
    \n如果我们想要改变或调整流程怎么办？\n\n如果我们想根据条件，让一个代码块在另一个之前执行怎么办？\n\n如果你想让你的程序根据不同的情况做出一些决定并执行不同的操作呢？例如，根据输入的数字打印“偶数”或“奇数”。\n\
    \n对于所有这些以及更多需求，控制流工具就变得非常方便。它们是任何编程语言的基础，而 Python 拥有以下可用的工具。\n\n![图 5-1 控制流工具](img/6423827abd996243bbfb7c0196b2aea4_209_0.png)\n\
    \n**if 语句**\n\n**if 语句**\n\n*if* 语句用于检查一个条件：如果条件为真，则执行语句块（称为 if 块）。\n\n**语法：**\n\
    \n**if** 条件后跟一个冒号。**if** 语句的代码块位于下一行，并且必须**缩进**。缩进告诉 Python 这个代码块是用于 **if** 语句的。\n\
    \n```\nif condition:\n    do work\n```\n\n最后一行 **end if** 不需要写。语句会自行结束。你将在下面的例子中看到这一点。让我通过流程图解释这些控制*流*是如何工作的。\n\
    \n![图 5-2 if 语句流程图](img/6423827abd996243bbfb7c0196b2aea4_210_0.png)\n\n在你的 Jupyter\
    \ Notebook 或 IPython 中尝试以下代码。为了练习，你可以尝试不同的输入以查看不同的结果。\n\n```\nIn [1]: if 8>5:\
    \ print(\"8 is greater than 5\")\n```\n\n输出：\n```\n8 is greater than 5\n```\n\n\
    让我们再看一个当条件不为真时会发生什么的例子。\n\n```\nIn [2]: if 8<5: print(\"8 is less than 5\")\n\
    ```\n\n正如你所看到的，这没有输出。因为 **if** 条件未满足，所以 **if** 代码块没有被执行。程序自行结束。\n\n但大多数时候，如果条件不为真，或者换句话说，如果条件为假，会有其他事情需要处理。为此，我们有\
    \ **if-else** 语句。\n\n让我们看看如何使用 if 语句来解决一个实际问题。\n\n**实际情况：** 节日期间商场正在促销。如果你购买电子产品，且购买金额超过\
    \ 50000，则可享受 20% 的折扣。一位顾客购买了任意数量的商品，每件商品的总金额通过键盘输入，编写一个程序来计算需要支付的总账单金额。\n\n**解决方案：**\n\
    \n```\nIn [3]: a = int(input(\"Total amount for all items purchased:\"))\n   \
    \     discount = 0\n        if a > 50000:\n            discount = (a * 20)/100\n\
    \        bill_amount = a - discount\n        print(\"Total Bill amount to be paid\
    \ is {} and discount offered is {}\".format(bill_amount, discount))\n```\n\n输出：\n\
    ```\nTotal amount for all items purchased: 80000\nTotal Bill amount to be paid\
    \ is 64000.0 and discount offered is 16000.0\n```\n\n### 5.2.2 if - else 语句\n\n\
    **if 语句用于检查一个条件：** *如果*条件为真，我们执行一个语句块（称为 if 块），*否则*我们处理另一个语句块（称为 else 块）。else\
    \ 子句是可选的。\n\n```\nif condition:\n    do work\nelse:\n    do something else\n```\n\
    \n**语法：**\n\n**if** 条件后跟一个冒号。**if** 语句的代码块位于下一行，并且必须**缩进**。缩进告诉 Python 这个代码块是用于\
    \ **if** 语句的。然后 **else** 出现在另一行，没有缩进，后跟一个冒号。**else** 语句的代码块位于下一行，并且必须**缩进**。缩进告诉\
    \ Python 这个代码块是用于 **else** 语句的。\n\n![图 5-3 if else 语句](img/6423827abd996243bbfb7c0196b2aea4_212_0.png)\n\
    \n在你的 Jupyter Notebook 或 IPython 中尝试以下代码。为了练习，我们在这里使用了 **input()** 函数，它会请求用户输入。你可以尝试不同的输入以查看不同的结果。\n\
