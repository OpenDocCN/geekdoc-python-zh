  md: '# ABOUT THE AUTHOR


    Nilabh Nishchhal is a technology graduate and masters in Management from tier
    1 institutes of India. He is passionate about technology, automobiles, coaching,
    educating, and _ shing for information out of an ocean of data. He works as a
    full time marketing professional and he takes pride in guiding and coaching college
    students, both in engineering and management. He serves as a judge at SAE Baja,
    India’s biggest automobile extravaganza of college students.


    His passion for deriving meaningful business decisions from data drew him to R
    and Python. When he is not over-thinking about solving key business problems,
    he indulges in running marathons, swimming, and cycling. He is a Super Randenneur
    (prestigious outdoor cycling title) and sports enthusiast.


    He lives in Mumbai and presently working on two more books on Python, one on Business
    Decision making from Data and 2nd, Mastering Data Visualization using Python.
    He further plans to write similar books in data analytics using R.


