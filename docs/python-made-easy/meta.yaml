  md: '# 2.1.2 Python Origin


    Python was conceived in the late 1980s by Guido van Rossum at Centrum Wiskunde
    & Informatica (CWI) in the Netherlands as a successor to the ABC language. Its
    implementation began in December 1989. Van Rossum continued as Python''s lead
    developer until July 12, 2018, when he announced his "permanent vacation" from
    his responsibilities as Python''s Benevolent Dictator for Life, a title the Python
    community bestowed upon him to reflect his long-term commitment as the project''s
    chief decision-maker. In January 2019, active Python core developers elected Brett
    Cannon, Nick Coghlan, Barry Warsaw, Carol Willing, and van Rossum to a five-member
    "Steering Council" to lead the project.


    Python 2.0 was released on 16 October 2000 with many major new features, including
    a cycle-detecting garbage collector and support for Unicode.


    Python 3.0 was released on 3 December 2008. It was a major revision of the language
    that is not completely backward-compatible. Many of its major features were backported
    to Python 2.6.x and 2.7.x version series. Releases of Python 3 include the 2to3
    utility, which automates (at least partially) the translation of Python 2 code
    to Python 3.


    Python 2.7''s end-of-life date was initially set in 2015 then postponed to 2020
    out of concern that a large body of existing code could not easily be forward-ported
    to Python 3. In January 2017, Google announced work on a Python 2.7 to Go trans
    compiler to improve performance under concurrent workloads.


    By the way, the language is named after the BBC show “Monty Python’s Flying Circus”
    and has nothing to do with reptiles. Making'
