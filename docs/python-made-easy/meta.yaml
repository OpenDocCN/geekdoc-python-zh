  mdcn: "## 6.4 用户自定义函数\n\n这是大多数编程语言最强大的工具之一，它允许用户编写自己的函数。这为程序员提供了无限的机会，可以为重复性任务创建可重用的代码。\n\
    \n内置函数是有限的。当程序员需要使用一个不在内置函数库中的函数时，他就会创建一个。这个用户创建的函数被称为**用户自定义函数**。\n\n为了更好地理解这一点，让我们创建自己的函数。\n\
    \n### 6.4.1 为什么要创建函数？\n\n一个自然的问题会浮现：为什么我们要编写单独的函数？为什么不把所有逻辑都放在一个函数里？嗯，以下几点可能有助于更好地阐明这个问题。\n\
    \n-   通过编写函数，用户可以避免一遍又一遍地重写相同的代码。假设你的程序中有一段计算“利率”的代码块。如果在程序的后面，你想为不同的本金和时间周期计算利率，你肯定不希望不得不重新编写所有相同的指令。相反，你会更愿意跳转到一个计算利息的“代码块”，然后跳回到你离开的地方。这个代码块就是一个函数。\n\
    -   编写不同的函数，而不是将所有逻辑合并在一个函数中，是更好的方法，因为它为程序提供了模块化结构。不同的函数可以在相同的情况下再次使用，但如果所有逻辑都合并在一个函数中，那么对于属于该大函数一部分的相同工作，我们又需要编写另一段代码。\n\
    -   将代码分离到函数中，使程序更容易设计和理解。如果程序的操作可以被划分为独立的活动，并且每个活动被放置在不同的函数中，这也使得独立编写和检查代码变得容易。\n\
    \n### 6.4.2 创建和调用函数\n\n与所有函数代码一样，创建或定义函数的方式有其自己的语法。语法非常简单。\n\n```\ndef function_name():\n\
    \    body of the function\n```\n\n当我们编写一个 **def()** 语句时，Python 解释器就知道我们将要定义一个函数。很明显，“def”是“define”的缩写。现在我们必须给我们的函数一个唯一的名称。在\
    \ **def** 之后是**函数名**，后面跟着一对括号()，然后是一个冒号 :。从下一行开始，是**函数体**。它以一个**缩进**开始，这告诉 Python\
    \ 这些代码块构成了函数体。函数体就是函数将要执行的代码行。\n\n我们给函数起的名字必须是唯一的，就像变量一样。我们可以给函数起任何名字，但我们必须确保遵守\
    \ Python 语言的规则。此外，我们应该给函数起一个与其执行的操作相关的名字，换句话说，要有意义。这将帮助阅读我们代码的其他程序员轻松理解它的作用。\n\
    \n让我们创建或定义一个简单的函数，来理解我们刚刚学到的概念。\n\n```\nIn [1]: def greeting():\n            print(\"\
    Good Morning\")\n```\n\n现在，在你自己的机器上编写上面定义函数 \"greetings\" 的代码行，并运行它。\n\n你得到任何输出了吗？\n\
    \n嗯，你不会得到！\n\n这是因为我们只是定义了我们的函数。我们还没有调用它。\n\n让我们用一个类比来理解这一点。假设，我刚刚教了你如何跳舞。但要让你跳舞，我需要叫你“我们跳舞吧”。同样，通过定义一个函数，我们教会了计算机执行一些任务。但要让那个任务完成，我们需要调用该函数。在\
    \ Python 中，我们通过在括号对后输入函数名来调用函数。\n\n让我们看看。\n\n```\nIn [2]: # 让我们调用函数 greeting()\n\
    \        greeting()\n```\n\n> Good Morning\n\n你一定在想，为什么我们要编写一个函数来完成本可以用一行代码就能实现的事情。这是一个简单的函数，是为了一步一步地教你。通常，函数会稍微复杂一些。\n\
    \n现在我们将了解用户自定义函数的其他方面。\n\n### 6.4.3 设置参数和实参\n\n你口渴了，当你去一个柠檬水（nimbu-pani 或 nimb-soda）摊位时，你会得到两个选择。如果你愿意花\
    \ 5 卢比，你会得到 Nimbu-Pani，但如果你准备多花一点，比如 10 卢比，你可能会升级到 Nimbu-Soda Masala。\n\n![](img/6423827abd996243bbfb7c0196b2aea4_242_0.png)\n\
    \n> 图 6-1 柠檬水摊位示例\n\n每次你都可以获得不同的体验。花 5 卢比，你得到 nimbu-pani；花 10 卢比，你得到 Nimbu masala\
    \ soda。你需要告诉摊主，你需要这两种产品中的哪一种。根据你的需求，他会为你服务。\n\n类似地，在编程中，不同的用户（输入）需要不同的输出。函数帮助我们做到这一点。让我们在一个函数中模拟我们的柠檬苏打水摊位。\n\
    \n```\nIn [3]: def lemonade_stall():\n            print(\"Nimbu Pani Which is\
    \ made of\")\n            print(\"Lemon Juice\")\n            print(\"Water\"\
    )\n            print(\"Salt\")\n            print(\"Sugar\")\n            print(\"\
    Nimbu Soda Masala Which is made of\")\n            print(\"Lemon Juice\")\n  \
    \          print(\"Club Soda\")\n            print(\"Salt\")\n            print(\"\
    Sugar\")\n            print(\"Secret Spice\")\n```\n\n现在，当我们调用我们的 \"lemonade_stall\"\
    \ 函数时，我们得到什么？\n\n```\nIn [4]: lemonade_stall()\n```\n\n```\nNimbu Pani Which is\
    \ made of\nLemon Juice\nWater\nSalt\nSugar\nNimbu Soda Masala Which is made of\n\
    Lemon Juice\nClub Soda\nSalt\nSugar\nSecret Spice\n```\n\n#### 6.4.3.1 参数\n\n\
    我们得到了柠檬水和柠檬苏打水两种。\n\n如果我们想在支付 5 卢比时只得到柠檬水，在支付 10 卢比时得到柠檬苏打水，该怎么办？\n我们将以一种让函数知道区别的的方式来定义它。\n\
    \n```\nIn [5]: # 我将通过将 l 和 s 大写来稍微改变函数名。\n```\n\n**id(object)** 返回对象的“身份标识”。这是一个整数，在对象的生命周期内保证是唯一且恒定的。两个生命周期不重叠的对象可能具有相同的\
    \ **id()** 值。CPython 实现细节：这是对象在内存中的地址。\n\n**input([prompt])** 如果存在 prompt 参数，则将其写入标准输出，不带尾随换行符。\n\
    \n**int([x])** 返回一个从数字或字符串 x 构造的整数对象。\n\n**isinstance(object, classinfo)** 如果\
    \ object 参数是 classinfo 参数的实例或其（直接、间接或虚拟）子类，则返回 True。如果 object 不是给定类型的对象，函数始终返回\
    \ False。\n\n**len(s)** 返回对象的长度（项目数量）。参数可以是序列（如字符串、字节、元组、列表或范围）或集合（如字典、集合或冻结集合）。\n\
    \n**map(function, iterable, ...)** 返回一个迭代器，该迭代器将函数应用于 iterable 的每个项目，产生结果。如果传递了额外的\
    \ iterable 参数，函数必须接受那么多参数，并应用于所有可迭代对象的项目。使用多个可迭代对象时，当最短的可迭代对象耗尽时，迭代器停止。\n\n**max(arg1,\
    \ arg2, *args[, key])** 返回可迭代对象中的最大项，或两个或多个参数中的最大项。\n\n**min(arg1, arg2, *args[,\
    \ key])** 返回可迭代对象中的最小项，或两个或多个参数中的最小项。\n\n**open(file)** 打开文件并返回相应的文件对象。\n\n**ord(c)**\
    \ 给定一个表示单个 Unicode 字符的字符串，返回表示该字符 Unicode 码位的整数。例如，ord('a') 返回整数 97，ord('€')（欧元符号）返回\
    \ 8364。这是 **chr()** 的逆操作。\n\n**print(*objects, sep=' ', end='\\n', file=sys.stdout,\
    \ flush=False)** 将对象打印到文本流文件，用 sep 分隔，后跟 end。sep、end、file 和 flush（如果存在）必须作为关键字参数给出。所有非关键字参数都像\
    \ str() 一样转换为字符串并写入流，用 sep 分隔，后跟 end。sep 和 end 都必须是字符串；它们也可以是 None，这意味着使用默认值。如果没有给出对象，print()\
    \ 将只写入 end。\n\n**repr(object)** 返回一个包含对象可打印表示形式的字符串。\n\n**reversed(seq)** 返回一个反向迭代器。\n\
    \n**round(number[, ndigits])** 返回四舍五入到小数点后 **ndigits** 位精度的数字。如果省略 ndigits 或为\
    \ None，则返回最接近其输入的整数。\n\n**sorted(iterable, *, key=None, reverse=False)** 从 iterable\
    \ 中的项目返回一个新的排序列表。\n\n**type(object)** 带有一个参数时，返回对象的类型。"
