    # 15.1 Welcome to NumPy!


    **NumPy (Numerical Python)** is an open-source Python library that''s used in
    almost every field of science and engineering. It''s the universal'
  merge: -1
  pgno: 447
- img_proc: true
  md: 'standard for working with numerical data in Python, and it''s at the core of
    the scientific Python and PyData ecosystems. NumPy users include everyone from
    beginning coders to experienced researchers doing state-of-the-art scientific
    and industrial research and development. The NumPy API (Application Programming
    Interface) is used extensively in Pandas, SciPy, Matplotlib, scikit-learn, scikit-image,
    and most other data science and scientific Python packages.


    The base of NumPy is the **ndarray**. Unlike generic python, which has many data
    structures to work upon, NumPy has just one. A multidimensional array and various
    derived objects, which also include matrix (remember from high school algebra)
    data structures.


    NumPy introduces **ndarray**, a homogeneous n-dimensional array object, and also
    methods to efficiently operate on it. NumPy can be used to perform a wide variety
    of mathematical operations on arrays. It adds powerful data structures to Python
    that guarantee efficient calculations with arrays and matrices and it supplies
    an enormous library of high-level mathematical functions that operate on these
    arrays and matrices.


    # 15.2 Installing NumPy As NumPy is not part of basic python, we need to install
    it separately. The good thing is, it’s open-source library, and hence, free for
    all, always.


