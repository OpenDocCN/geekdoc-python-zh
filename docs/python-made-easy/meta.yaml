    ```


    The r preceding the title string is important -- it signifies that the string
    is a raw string and not to treat backslashes as python escapes. matplotlib has
    a built-in TeX expression parser and layout engine and ships its math fonts. Thus
    you can use mathematical text across platforms without requiring a TeX installation.
