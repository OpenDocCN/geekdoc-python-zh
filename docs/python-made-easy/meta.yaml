    \ floating point number\nOut[5]: 1.6\n```\n\nThe integer numbers (e.g. **2, 4,\
    \ 20**) have type **int**, the ones with a fractional part (e.g. **5.0, 1.6**)\
    \ have type **float**. We will see more about numeric types later in the book.\n\
    \nDivision (/) always returns a **float**. To do floor division and get an integer\
    \ result (discarding any fractional result) you can use the // operator; to calculate\
    \ the remainder you can use %:\n\n```\nIn [6]: 17 / 3 # classic division returns\
    \ a float\nOut[6]: 5.666666666666667\n```\n\n```\nIn [7]: 17 // 3 # floor division\
    \ discards the fractional part\nOut[7]: 5\n```\n\n```\nIn [8]: 17 % 3 # the %\
