    ```


    ### 13.2 关于模块的更多信息


    模块可以包含可执行语句以及函数定义。这些语句旨在初始化模块。它们仅在模块名在 import 语句中首次遇到时执行。


    函数定义也是被 ''执行'' 的 ''语句''；模块级函数定义的执行会将函数名放入模块的全局符号表中。


    每个模块都有自己的私有符号表，该表被模块中定义的所有函数用作全局符号表。因此，模块的作者可以在模块中使用全局变量，而无需担心与用户的全局变量意外冲突。


    ### 13.3 导入模块


    #### 13.3.1 从其他模块导入模块


    我们已经看到了导入任何模块的简单方法。


    模块也可以导入其他模块，这些模块位于模块脚本内部。通常（但不是必需的）将所有 import 语句放在模块（或脚本）的开头。导入的模块名被放入导入模块的全局符号表中。


    #### 13.3.2 直接从模块导入名称


    import 语句有一个变体，它将名称从模块直接导入到导入模块的符号表中。例如：


    ```

    In [8]:    from fibo import fib

    ```


    ```

