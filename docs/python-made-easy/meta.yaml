  md: '# 18.1 Creating new Columns from old ones


    Let us create 1 more column. The columns **hwy** and **cty** are mileage in miles
    per gallon when the car is being driven on a highway or a city respectively. Let
    us create one more column, which will tell us the ratio of "highway Mileage" vs
    "city Mileage".


    ```

    In [2]: mpg["hwy_vs_cty"] = mpg["hwy"] / mpg["cty"]


    mpg.head()

    ```


    Out[2]:


    | manufacturer | model | displ | year | cyl | trans | drv | cty | hwy | fl | class
    | hwy_vs_cty |

