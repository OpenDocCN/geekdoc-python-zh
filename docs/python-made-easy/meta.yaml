    \ 中使用面向对象编程范式。随着你对这门学科的深入，它们的效用将变得更加明显。\n\n### 11.1.1 面向对象编程简介\nPython 支持不同的编程方法。解决编程问题的一种流行方法是通过创建对象。这被称为面向对象编程。\n\
    \n![](img/6423827abd996243bbfb7c0196b2aea4_364_0.png)\n\n图 11-1 面向对象编程\n面向对象编程，简称\
    \ OOP，是一种编程范式，它提供了一种构建程序的方式，使得属性和行为被捆绑到单个对象中。\n\n换句话说，OOP 是一种对具体的、现实生活中的事物（如汽车）以及事物之间的关系（如学院与学生、球员与教练等）进行建模的方法。OOP\
    \ 将现实世界的事物建模为软件中的对象。这些对象拥有一些与之关联的数据，并且可以执行某些功能。\n\n另一种常见的编程范式是**过程式编程**。在那里，我们像流程图或食谱一样逐步组织程序。有以代码块和函数形式存在的步骤，它们按顺序执行以完成特定任务。\n\
    \n![](img/6423827abd996243bbfb7c0196b2aea4_365_0.png)\n\n图 11-2 面向过程编程\n在我们迄今为止编写的所有程序中，我们都是围绕函数来设计程序的，即操作数据的语句块。这被称为面向过程的编程方式。还有另一种组织程序的方式，那就是将数据和功能组合并包装在一个称为对象的东西里。这被称为面向对象编程范式。大多数时候你可以使用过程式编程，但在编写大型程序或遇到更适合这种方法的问题时，你可以使用面向对象编程技术。⁵⁰\n\
    \n1.2. 对象有两个特征：属性和行为\n例如，一个人作为一个**类**，具有**属性**，如姓名、年龄、身高、体重、地址等，以及**行为**，如行走、说话、睡觉、吃饭等。\n\
    \n### 11.1.2 类概念简介\n\n![](img/6423827abd996243bbfb7c0196b2aea4_366_0.png)\n\n\
    图 11-3 面向对象编程\n正如我们之前看到的，Python 中的一切都是对象。\n\nPython 中的数据结构（数字、字符串、列表等）旨在表示简单的事物，比如一个人的名字、年龄或薪水、颜色以及其他类似的东西。\n\
    \n如果我们想表示更复杂的东西呢？例如，表示一个人的详细信息，他的名字、年龄、薪水、教育资格和员工 ID。我们可以创建一个列表，将所有这些细节记录在一个地方。这样一个列表的例子是\
    \ [\"nilabh\", 34, 50000, graduate, 9469]\n\n现在，这只是一个人。如果我们有公司里 100 名员工的这些详细信息呢？如何查看某些人的年龄或资格是否缺失？如果我们想为这些人添加一些其他属性呢？如果我们想对所有这些人执行某些操作呢？\n\
    \n需要将这些数据组织到一起。这正是**类**的作用。\n\n类用于创建新的**用户定义**数据结构，其中包含关于某事物的信息。在我们上面的例子中，我们可以创建一个\
    \ **Employee()** 类来组织公司所有员工的信息，并且还可以对他们执行一些操作或功能。\n\n需要注意的是，类只提供结构。它是一个**蓝图**，展示某物应如何定义，但它本身不提供任何实际内容。Employee()\
    \ 类可能规定定义员工需要姓名、资格和年龄，但它不会说明特定员工的姓名、资格或年龄是什么。\n\n记住，**类**是**蓝图**。\n\n广义上讲，类内部有两种类型的对象。\n\
    \n-   实例对象\n-   方法对象\n\n实例对象可以理解为具有**属性**。\n\n方法对象可以理解为具有**行为**。\n\n这些只是为了提供一个类比，而不是技术定义。一旦你很好地理解了概念，你就会深入理解这些。同时，为了使学习更容易，你可以带着上述类比，慢慢跟我一起走。\n\
    \n现在让我们深入探讨我们刚刚看到的三个对象。\n\n### 11.2 类对象、实例对象、方法对象\n\n**类对象**\n**类**是对象的**蓝图**。\n\
    \n我们可以把类想象成一个带有标签的员工档案。它包含关于姓名、联系电话、部门、年龄、员工 ID 等的所有详细信息。基于这些描述，我们可以了解员工的情况。在这里，员工是一个对象。\n\
    \n将**类**想象成某物应如何存在的*想法*会很有帮助。\n\n空白的身份证相当于类对象。公司里会有成百上千这样的员工。他们的数据，在这个模板中，将被组织在\
    \ **Employee** 类中。\n\n| 员工身份证 | |\n|---|---|\n| | **公司名称：Python Enterprises**\n\
    部门：\n出生日期：\n电话号码：\n*紧急情况下请致电：* |\n| **名** | |\n| **姓** | |\n| 员工编号 # | 签名 |\n\n\
    *图 11-4 类作为蓝图 - 员工身份证*\n\n在 Python 中创建一个新的类对象非常容易。要创建一个名为 Employee 的类，只需运行以下两行代码。\n\
    \n```\nIn [1]: class Employee: pass\n```\n\n我们刚刚创建了一个名为 *Employee* 的类。\n\n不多不少。"
