- md: "If you have used any spreadsheet program like Excel, you will identify this\
    \ as combining rows, one over the other, by matching the columns.\n\n## 18.7.2\
    \ Joining using common Identifier\n\nIf you would have used a spreadsheet program\
    \ like Microsoft Excel, you might have to use the \"Vlookup\" function to join\
    \ the column from two different tables, using one common identifier. That is the\
    \ identifier that we \"lookup\" to in the Excel. Here, it's much more powerful\
    \ and flexible.\n\nIf you notice in the mpg data set, there is not a single column\
    \ that has unique values. Hence, joining using any of them will throw errors.\
    \ Hence we will use the titanic data set here but split it into two new data sets,\
    \ with select columns, to demonstrate how they can be joined using the common\
    \ identifier.\n\nWe will use the \"Name\" as a common identifier.\n\nYou can download\
    \ it from the link below:\n\nhttps://github.com/nilabhnishchhal/Python-Made-Easy/blob/master/titanic.csv\n\
    \nThis is a Github repository link. When you open this, you will see the \"raw\"\
    \ tab. Right-click on that, and use the \"Save link as..\" option. Save the file\
    \ in the base folder of your machine, and change the file extension to **.csv**.\n\
    \nNow you have the data set titanic.csv on your machine's base folder. Let us\
    \ start working on it.\n\n```\nIn [24]: titanic = pd.read_csv(\"titanic.csv\"\
    )\n\ntitanic.head()\n```\n\n```\nOut[24]:\n   PassengerId  Survived  Pclass  \\\
    n0            1         0       3   \n1            2         1       1   \n2 \
    \           3         1       3   \n3            4         1       1   \n4   \
    \         5         0       3   \n\n                                         \
    \       Name     Sex   Age  SibSp  \\n0                            Braund, Mr.\
    \ Owen Harris    male  22.0      1   \n1  Cumings, Mrs. John Bradley (Florence\
    \ Briggs Th...  female  38.0      1   \n2                             Heikkinen,\
    \ Miss. Laina  female  26.0      0   \n3       Futrelle, Mrs. Jacques Heath (Lily\
    \ May Peel)  female  35.0      1   \n4                           Allen, Mr. William\
    \ Henry    male  35.0      0   \n\n   Parch            Ticket     Fare Cabin Embarked\n\
    0      0         A/5 21171   7.2500   NaN        S\n1      0          PC 17599\
    \  71.2833   C85        C\n2      0  STON/O2. 3101282   7.9250   NaN        S\n\
    3      0            113803  53.1000  C123        S\n4      0            373450\
    \   8.0500   NaN        S\n```\n\n```\nIn [25]: dataset1 = titanic[[\"Name\",\
    \ \"Sex\", \"Age\"]]\n        dataset1\n```\n\n```\nOut[25]:\n```\n\n| | Name\
    \ | Sex | Age |\n|---|---|---|---|\n| 0 | Braund, Mr. Owen Harris | male | 22.0\
    \ |\n| 1 | Cumings, Mrs. John Bradley (Florence Briggs Th... | female | 38.0 |\n\
    | 2 | Heikkinen, Miss. Laina | female | 26.0 |\n| 3 | Futrelle, Mrs. Jacques Heath\
