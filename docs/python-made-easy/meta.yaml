    \ that many arguments and is applied to the items from all iterables in parallel.\
    \ With multiple iterables, the iterator stops when the shortest iterable is exhausted.\n\
    \n**max(arg1, arg2, *args[, key])** Return the largest item in an iterable or\
    \ the largest of two or more arguments.\n\n**min(arg1, arg2, *args[, key])** Return\
    \ the smallest item in an iterable or the smallest of two or more arguments.\n\
    \n**open(file)** Open file and return a corresponding file object.\n\n**ord(c)**\
    \ Given a string representing one Unicode character, return an integer representing\
    \ the Unicode code point of that character. For example, ord('a') returns the\
