    class\"] == \"midsize\"\n```\n\n```\nOut[28]:\n0       False\n1       False\n\
    2       False\n3       False\n4       False\n...\n229     True\n230     True\n\
    231     True\n232     True\n233     True\nName: class, Length: 234, dtype: bool\n\
    ```\n\nAlso, notice that this series is of the same length as the original DataFrame\
    \ object. It shows that for every column, there is one **True** or **False** value.\n\
    \nNow, such a Series of boolean values can be used to filter the DataFrame by\
    \ putting it in between the selection brackets []. Only rows for which the value\
    \ is **True** will be selected.\n\nThis way, only the rows where the car type\
    \ or \"class\" was \"midsize\" is selected, and now it's a new DataFrame called\
    \ \"midsize\". Let us see how many midsize cars were there out of 234 total cars.\n\
    \n```\nIn [29]: midsize.shape\n```\n\n```\nOut[29]: (41, 11)\n```\n\nThere are\
    \ 41 midsize cars among 234 cars on the list. (There are 41 rows in the new DataFrame).\n\
    \nThe other conditional operators like (>, ==, !=, <, <=,... ) will also work\
    \ for filtering the rows.\n\nTo use more than one condition, we can use the \"\
    |\" and \"&\" operators.\n\nI want to filter the SUVs which are of the 1999 year.\n\
    \n```\nIn [30]: suv_99 = mpg[(mpg[\"class\"] == \"suv\") &\n            (mpg[\"\
    year\"] == 1999)]\n\nsuv_99.head()\n```\n\nOut[30]:\n\n| | manufacturer | model\
    \ | displ | year | cyl | trans | drv | cty | hwy | fl | class |\n|---|---|---|---|---|---|---|---|---|---|---|---|\n\
    | 21 | chevrolet | c1500 suburban 2wd | 5.7 | 1999 | 8 | auto(l4) | r | 13 | 17\
    \ | r | suv |\n| 30 | chevrolet | k1500 tahoe 4wd | 5.7 | 1999 | 8 | auto(l4)\
    \ | 4 | 11 | 15 | r | suv |\n| 31 | chevrolet | k1500 tahoe 4wd | 6.5 | 1999 |\
    \ 8 | auto(l4) | 4 | 14 | 17 | d | suv |\n| 57 | dodge | durango 4wd | 3.9 | 1999\
    \ | 6 | auto(l4) | 4 | 13 | 17 | r | suv |\n| 61 | dodge | durango 4wd | 5.2 |\
    \ 1999 | 8 | auto(l4) | 4 | 11 | 16 | r | suv |\n\n**Note:** When combining multiple\
    \ conditional statements, each condition must be surrounded by parentheses **()**.\
    \ Moreover, you can not use **or/and** but need to use the **or** operator **|**\
    \ and the **and** operator **&**.\n\n### 17.12.3 Selecting both Rows and Columns\n\
    \nHow do I select specific rows and columns from a DataFrame?\n\n![](img/6423827abd996243bbfb7c0196b2aea4_529_0.png)\n\
    \nLet us select the names of the model of the cars which were manufactured after\
    \ 2000.\n\n```\nIn [31]: model_99 = mpg.loc[mpg[\"year\"] > 2000 ,\n         \
    \   \"model\"]\n\nmodel_99.head()\n```\n\n```\nOut[31]:\n2        a4\n3      \
    \  a4\n6        a4\n9    a4 quattro\n10   a4 quattro\nName: model, dtype: object\n\
    ```\n\nIn this case, a subset of both rows and columns is made in one go, and\
    \ just using selection brackets [] is not sufficient anymore. The **loc/iloc**\
    \ operators are required in front of the selection brackets []. When using **loc/iloc**,\
    \ the part before the comma is the rows you want, and the part after the comma\
    \ is the columns you want to select.\n\nWhen using the column names, row labels,\
    \ or a condition expression, use the **loc** operator in front of the selection\
    \ brackets []. For both the part before and after the comma, you can use a single\
    \ label, a list of labels, a slice of labels, a conditional expression, or a colon\
    \ :. Using a colon specifies you want to select all rows or columns.\n\nWhat if\
    \ we want to select some rows or columns based on their index numbers? In that\
    \ case, we use **.iloc[]**.\n\nLet's select rows 8 till 19 and columns 4 to 7.\n\
    \n```\nIn [32]: mpg.iloc[8:19 , 4:7]\n```\n\n```\n   cyl      trans drv\n8   \
    \ 4   auto(l5)   4\n9    4  manual(m6)  4\n10   4   auto(s6)   4\n11   6   auto(l5)\
    \   4\n12   6  manual(m5)  4\n13   6   auto(s6)   4\n14   6  manual(m6)  4\n15\
    \   6   auto(l5)   4\n16   6   auto(s6)   4\n17   8   auto(s6)   4\n18   8   auto(l4)\
    \   r\n```\n\nAgain, a subset of both rows and columns is made in one go, and\
    \ just using selection brackets [] is not sufficient anymore. When specifically\
    \ interested in certain rows and/or columns based on their position in the table,\
    \ use the **iloc** operator in front of the selection brackets [].\n\n## 17.13\
    \ Summary:\n\nIn this chapter, we got introduced to another useful package of\
    \ Python, which is a public library, based on NumPy. Pandas is one of the most\
    \ useful packages for data analysis. Import the package, aka import pandas as\
    \ **pd**. A table of data is stored as a pandas DataFrame. Each column in a DataFrame\
    \ is a Series. You can do things by applying a method to a DataFrame or Series.\
    \ Getting data into pandas from many different file formats or data sources is\
