    # 6.1 Defining Functions The first question, which needs answer here is: What
    is a Function?


    In Python, a function is a group of related statements that performs a specific
    task.33


    With help of the functions, we break our program into smaller and modular chunks.
    As our program grows larger and larger, functions become more and more necessary
    to keep it organized and manageable.


    Like everything else in Python, a Function is also an Object.


    You can pass data, known as a **parameter** into a function. A function can return
    data as result. To call a function, use the function''s name followed by parentheses
    **()**. e.g. **len(x)** function gives length of the parameter **x**.'
