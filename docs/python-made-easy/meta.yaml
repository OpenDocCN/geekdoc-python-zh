- md: '## 20 VISUALIZATION USING MATPLOTLIB.PYPLOT


    In this and the next two chapters, we will see how Matplotlib can be used for
    creating various visualization charts and graphs, and even images, in Python.
    The Matplotlib documentation and tutorials are the best way to start learning
    the visualization essentials in Python. They start to form basic and go up to
    some advanced stuff as well. This chapter and the next chapter covering visualization
    rely heavily on Matplotlib tutorials, and I will like to give credits to them
    for this amazing learning experience they have created for the users.⁸⁶


    But before we get into the nitty-gritty of Matplotlib codes, let’s understand
    the origin or Matplotlib, and the thought behind this library.


    ## 20.1 Introduction and History⁸⁷


    Matplotlib was originally written by John D. Hunter, since then it has an active
    development community, and is distributed under a BSD-style license.


    **Note:** The following introductory text was written in 2008 by John D. Hunter
    (1968-2012), the original author of Matplotlib.


    Matplotlib is a library for making 2D plots of arrays in Python. Although it has
    its origins in emulating the MATLAB graphics commands, it is independent of MATLAB
    and can be used in a Pythonic, object-oriented way. Although Matplotlib is written
    primarily in pure Python, it makes heavy use of NumPy and other extension code
    to provide good performance even for large arrays.


    Matplotlib is designed with the philosophy that you should be able to create simple
    plots with just a few commands, or just one! If you want to see a histogram of
    your data, you shouldn''t need to instantiate objects, call methods, set properties,
    and so on; it should just work.


    - The Matplotlib code is conceptually divided into three parts: **The pylab interface**
    is the set of functions provided by matplotlib.pylab which allows the user to
    create plots with code quite similar to MATLAB figure generating code.

    - **The Matplotlib frontend or Matplotlib API** is the set of classes that do
    the heavy lifting, creating and managing figures, text, lines, plots, and so on.
    This is an abstract interface that knows nothing about output.

    - **The backends** are device-dependent drawing devices, aka renderers, that transform
    the frontend representation to hardcopy or a display device.

    - **Matplotlib''s original logo (2003 -- 2008).**


    ![](img/6423827abd996243bbfb7c0196b2aea4_573_0.png)


    Figure 20-1 Matplotlib''s original logo (2003 -- 2008) Matplotlib logo (2008 -
    present).


    ![](img/6423827abd996243bbfb7c0196b2aea4_574_0.png)


    Figure 20-2 Matplotlib logo (2008 - present) **How to use Matplotlib?**


    This chapter contains a more in-depth guide for using Matplotlib. We will start
    with the very basics.


    Matplotlib graphs your data on **Figures** (i.e., windows, Jupyter widgets, etc.),
    each of which can contain one or more Axes (i.e., an area where points can be
    specified in terms of x-y coordinates (or theta-r in a polar plot, or x-y-z in
    a 3D plot, etc.). The simplest way of creating a *figure* with axes is using **pyplot.subplots**.
    We can then use **Axes.plot** to draw some data on the axes:


    ```

    In [1]: import matplotlib.pyplot as plt import numpy as np

    ```


    ```

    In [2]: fig, ax = plt.subplots() # Create a figure containing a single axes.

    ```


    ![](img/6423827abd996243bbfb7c0196b2aea4_574_1.png)


    Figure 20-3 Matplotlib Figure Object with single Axes The above line of code creates
    two objects and assigns them to "fig" and "ax" variables respectively. Let us
    see what those two objects are by calling the variables.


    ```

    In [3]:    fig

    ```


    ```

    Out[3]:

    ```


    ![](img/6423827abd996243bbfb7c0196b2aea4_575_0.png)


    ```

    In [4]:    ax

    ```


    ```

    Out[4]:    <matplotlib.axes._subplots.AxesSubplot at

    0x1ab25c03708>

    ```


    So we have created a "figure" here. As you see, its just a blank canvas, on which
    you can draw your graph. So let us start drawing. The other object is the **axes**
    object, on which the plots will be made.


    ```

    In [5]:    fig, ax = plt.subplots() # Create a figure

    containing a single axes.

    ax.plot([1, 2, 3, 4], [1, 4, 2, 3]) # Plot

    some data on the axes.

    ```


    ```

    Out[5]:    [<matplotlib.lines.Line2D at 0x1ab27a5d248>]

    ```


    ![](img/6423827abd996243bbfb7c0196b2aea4_576_0.png)


    Figure 20-5 Line Plot on the Axes object Many other plotting libraries or languages
    do not require you to explicitly create an axes.


    You can do the same in Matplotlib: for each Axes graphing method, there is a corresponding
    function in the **matplotlib.pyplot** module that performs that plot on the "current"
    axes, creating that axes (and its parent figure) if they don''t exist yet. So
    the previous example can be written more shortly as


    ```

    In [6]: plt.plot([1, 2, 3, 4], [1, 4, 2, 3]) # Matplotlib plot.

    ```


    ```

    Out[6]: [<matplotlib.lines.Line2D at 0x1ab27de7f48>]

    ```


    ![](img/6423827abd996243bbfb7c0196b2aea4_576_1.png)


    Figure 20-6 Line Plot using plt.plot method **The Matplotlib Object Hierarchy**
    *One very important Matplotlib concept is its object hierarchy.*


    The outermost container for a matplotlib graphic is the Figure object, which can
    contain multiple Axes objects. The name Axes can be a little confusing for beginners.
    An Axes object or the Axes is the individual Plot or the individual Graph. It''s
    not the plural of the “axis” which it may sound like.


    You can imagine the Figure object as a box-like container holding one or more
    Axes (actual plots). Then comes the smaller objects, which are below the Axes
    in the hierarchy, such as tick marks, individual lines, legends, and text boxes.
    Almost every "element" of a chart is its own Python object, which can be manipulated,
    all the way down to the ticks and labels:88


    ![](img/6423827abd996243bbfb7c0196b2aea4_577_0.png)


    Figure 20-7 matplotlib Object Hierarchy **Types of inputs to plotting functions**
    *All of plotting functions expect **numpy.array** or **numpy.ma.masked_array**
    as input. Classes that are ''array-like'' such as **pandas data objects** and
    **numpy.matrix** may or may not work as intended. It is best to convert these
    to **numpy.array** objects prior to plotting.*


    For example, to convert a pandas.DataFrame


    ```

    a = pandas.DataFrame(np.random.rand(4,5), columns = list(''abcde'')) a_asarray
    = a.values

    ```


    And to convert a numpy.matrix


    ```

    b = np.matrix([[1, 2], [3, 4]]) b_asarray = np.asarray(b)

    ```


    ## 20.3 Parts of a Figure Now, let''s have a deeper look at the components of
    a Matplotlib figure.⁸⁹


    ![](img/6423827abd996243bbfb7c0196b2aea4_578_0.png)


    Figure 20-8 Anatomy of Matplotlib Figure **Figure** The whole figure. The figure
    keeps track of all the child **Axes**, a smattering of ''special'' artists (titles,
    figure legends, etc), and the **canvas**. (Don''t worry too much about the canvas,
    it is crucial as it is the object that does the drawing to get you your plot,
    but as the user, it is more-or-less invisible to you). A figure can contain any
    number of **Axes**, but will typically have at least one.


    The easiest way to create a new figure is with **pyplot**:


    ```

    In [7]: fig = plt.figure() # an empty figure with no Axes

    fig, ax = plt.subplots() # a figure with a single Axes

    fig, axs = plt.subplots(2, 2) # a figure with a 2x2 grid of Axes

    ```


    ![](img/6423827abd996243bbfb7c0196b2aea4_579_0.png)


    Figure 20-9 Empty figure with no Axes


    ![](img/6423827abd996243bbfb7c0196b2aea4_579_1.png)


    Figure 20-10 Figure with 4 Axes in 2x2 grid It''s convenient to create the axes
    together with the figure, but you can also add axes, later on, allowing for more
    complex axes layouts.


    ### 20.3.2 Axes


    This is what you think of as ''a plot'', it is the region of the image with the
    data space. A given figure can contain many Axes, but a given Axes object can
    only be in one Figure. The Axes contains two (or three in the case of 3D) Axis
    objects (be aware of the difference between Axes and Axis) which take care of
    the data limits (the data limits can also be controlled via the axes.Axes.set_xlim()
    and axes.Axes.set_ylim() methods). Each Axes has a title (set via set_title()),
    an x-label (set via set_xlabel()), and a y-label set via set_ylabel()).


    The Axes class and its member functions are the primary entry point to working
    with the OO interface.


    ### 20.3.3 Axis


    These are the number-line-like objects. They take care of setting the graph limits
    and generating the ticks (the marks on the axis) and ticklabels (strings labeling
    the ticks). The location of the ticks is determined by a Locator object and the
    ticklabel strings are formatted by a Formatter. The combination of the correct
    Locator and'
  mdcn: '## 20 使用 MATPLOTLIB.PYPLOT 进行可视化


    在本章及接下来的两章中，我们将了解如何在 Python 中使用 Matplotlib 创建各种可视化图表、图形甚至图像。Matplotlib 的文档和教程是学习
    Python 可视化基础知识的最佳途径。它们从基础内容开始，逐步深入到一些高级主题。本章及下一章关于可视化的讲解很大程度上依赖于 Matplotlib 教程，我谨在此向他们为用户创造的这绝佳学习体验表示感谢。⁸⁶


    但在深入 Matplotlib 代码的细节之前，让我们先了解一下 Matplotlib 的起源以及这个库背后的设计理念。


    ## 20.1 简介与历史⁸⁷


    Matplotlib 最初由 John D. Hunter 编写，此后一直拥有活跃的开发社区，并在 BSD 风格的许可证下分发。


    **注意：** 以下介绍性文字由 Matplotlib 的原作者 John D. Hunter (1968-2012) 于 2008 年撰写。


    Matplotlib 是一个用于在 Python 中绘制二维数组图形的库。虽然它起源于模仿 MATLAB 的图形命令，但它独立于 MATLAB，并且可以以
    Pythonic 的、面向对象的方式使用。尽管 Matplotlib 主要用纯 Python 编写，但它大量使用了 NumPy 和其他扩展代码，即使对于大型数组也能提供良好的性能。


    Matplotlib 的设计理念是，你应该能够只用几个命令，甚至一个命令，就能创建简单的图形。如果你想查看数据的直方图，你不需要实例化对象、调用方法、设置属性等等；它应该直接就能工作。


    - Matplotlib 代码在概念上分为三个部分：**pylab 接口**是 matplotlib.pylab 提供的一组函数，允许用户使用与 MATLAB
    图形生成代码非常相似的代码来创建图形。

    - **Matplotlib 前端或 Matplotlib API** 是执行繁重工作的类集合，用于创建和管理图形、文本、线条、绘图等。这是一个抽象接口，对输出一无所知。

    - **后端**是设备相关的绘图设备，也称为渲染器，它们将前端表示转换为硬拷贝或显示设备。

    - **Matplotlib 的原始标志（2003 -- 2008）。**


    ![](img/6423827abd996243bbfb7c0196b2aea4_573_0.png)


    图 20-1 Matplotlib 的原始标志（2003 -- 2008）Matplotlib 标志（2008 - 至今）。


    ![](img/6423827abd996243bbfb7c0196b2aea4_574_0.png)


    图 20-2 Matplotlib 标志（2008 - 至今）**如何使用 Matplotlib？**


    本章包含一个更深入的 Matplotlib 使用指南。我们将从最基础的内容开始。


    Matplotlib 将你的数据绘制在 **图形**（即窗口、Jupyter 小部件等）上，每个图形可以包含一个或多个坐标轴（即一个可以用 x-y 坐标（或极坐标图中的
    theta-r，或三维图中的 x-y-z 等）指定点的区域）。创建带有坐标轴的 *图形* 最简单的方法是使用 **pyplot.subplots**。然后我们可以使用
    **Axes.plot** 在坐标轴上绘制一些数据：


    ```

    In [1]: import matplotlib.pyplot as plt import numpy as np

    ```


    ```

    In [2]: fig, ax = plt.subplots() # 创建一个包含单个坐标轴的图形。

    ```


    ![](img/6423827abd996243bbfb7c0196b2aea4_574_1.png)


    图 20-3 带有单个坐标轴的 Matplotlib 图形对象 上面的代码行创建了两个对象，并将它们分别赋值给 "fig" 和 "ax" 变量。让我们通过调用变量来看看这两个对象是什么。


    ```

    In [3]:    fig

    ```


    ```

    Out[3]:

    ```


    ![](img/6423827abd996243bbfb7c0196b2aea4_575_0.png)


    ```

    In [4]:    ax

    ```


    ```

    Out[4]:    <matplotlib.axes._subplots.AxesSubplot at

    0x1ab25c03708>

    ```


    所以我们在这里创建了一个 "图形"。如你所见，它只是一个空白画布，你可以在上面绘制图形。那么让我们开始绘制吧。另一个对象是 **坐标轴** 对象，绘图将在此对象上进行。


    ```

    In [5]:    fig, ax = plt.subplots() # 创建一个包含单个坐标轴的图形。

    ax.plot([1, 2, 3, 4], [1, 4, 2, 3]) # 在坐标轴上绘制一些数据。

    ```


    ```

    Out[5]:    [<matplotlib.lines.Line2D at 0x1ab27a5d248>]

    ```


    ![](img/6423827abd996243bbfb7c0196b2aea4_576_0.png)


    图 20-5 在坐标轴对象上的折线图 许多其他绘图库或语言不需要你显式地创建坐标轴。


    你也可以在 Matplotlib 中这样做：对于每个 Axes 绘图方法，在 **matplotlib.pyplot** 模块中都有一个对应的函数，该函数在
    "当前" 坐标轴上执行该绘图，如果坐标轴（及其父图形）尚不存在，则会创建它们。因此，前面的示例可以更简洁地写成


    ```

    In [6]: plt.plot([1, 2, 3, 4], [1, 4, 2, 3]) # Matplotlib 绘图。

    ```


    ```

    Out[6]: [<matplotlib.lines.Line2D at 0x1ab27de7f48>]

    ```


    ![](img/6423827abd996243bbfb7c0196b2aea4_576_1.png)


    图 20-6 使用 plt.plot 方法的折线图 **Matplotlib 对象层次结构** *一个非常重要的 Matplotlib 概念是其对象层次结构。*


    Matplotlib 图形的最外层容器是 Figure 对象，它可以包含多个 Axes 对象。Axes 这个名字对初学者来说可能有点令人困惑。一个 Axes
    对象或 Axes 是单个绘图或单个图形。它不是 "axis"（轴）的复数形式，尽管听起来可能像。


    你可以将 Figure 对象想象成一个盒子状的容器，里面装着一个或多个 Axes（实际的绘图）。然后是更小的对象，它们在层次结构中位于 Axes 之下，例如刻度线、单条线、图例和文本框。图表的几乎每个
    "元素" 都是它自己的 Python 对象，可以被操作，一直到刻度和标签：88


    ![](img/6423827abd996243bbfb7c0196b2aea4_577_0.png)


    图 20-7 matplotlib 对象层次结构 **绘图函数的输入类型** *所有绘图函数都期望 **numpy.array** 或 **numpy.ma.masked_array**
    作为输入。像 **pandas 数据对象** 和 **numpy.matrix** 这样的 ''类数组'' 类型可能按预期工作，也可能不工作。最好在绘图前将它们转换为
    **numpy.array** 对象。*


    例如，转换一个 pandas.DataFrame


    ```

    a = pandas.DataFrame(np.random.rand(4,5), columns = list(''abcde'')) a_asarray
    = a.values

    ```


    转换一个 numpy.matrix


    ```

    b = np.matrix([[1, 2], [3, 4]]) b_asarray = np.asarray(b)

    ```


    ## 20.3 图形的组成部分 现在，让我们更深入地了解 Matplotlib 图形的组成部分。⁸⁹


    ![](img/6423827abd996243bbfb7c0196b2aea4_578_0.png)


    图 20-8 Matplotlib 图形的解剖 **图形** 整个图形。图形跟踪所有子 **Axes**、一些 ''特殊'' 艺术家（标题、图形图例等）以及
    **画布**。（不要过于担心画布，它至关重要，因为它是绘制图形以获得你的绘图的对象，但作为用户，它对你来说或多或少是不可见的）。一个图形可以包含任意数量的
    **Axes**，但通常至少有一个。


    创建新图形最简单的方法是使用 **pyplot**：


    ```

    In [7]: fig = plt.figure() # 一个没有 Axes 的空图形

    fig, ax = plt.subplots() # 一个带有单个 Axes 的图形

    fig, axs = plt.subplots(2, 2) # 一个带有 2x2 网格 Axes 的图形

    ```


    ![](img/6423827abd996243bbfb7c0196b2aea4_579_0.png)


    图 20-9 没有 Axes 的空图形


    ![](img/6423827abd996243bbfb7c0196b2aea4_579_1.png)


    图 20-10 带有 2x2 网格中 4 个 Axes 的图形 将坐标轴与图形一起创建很方便，但你也可以稍后添加坐标轴，从而允许更复杂的坐标轴布局。


    ### 20.3.2 坐标轴


    这就是你认为的 ''一个绘图''，它是图像中具有数据空间的区域。一个给定的图形可以包含多个坐标轴，但一个给定的坐标轴对象只能在一个图形中。坐标轴包含两个（在三维情况下是三个）轴对象（注意
    Axes 和 Axis 之间的区别），它们负责处理数据限制（数据限制也可以通过 axes.Axes.set_xlim() 和 axes.Axes.set_ylim()
    方法控制）。每个坐标轴都有一个标题（通过 set_title() 设置）、一个 x 标签（通过 set_xlabel() 设置）和一个 y 标签（通过 set_ylabel()
    设置）。


