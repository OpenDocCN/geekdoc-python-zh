    ### 2.9.1 简介


    Notebook 将基于控制台的交互式计算方法扩展到一个全新的方向，提供了一个适合捕获整个计算过程的基于 Web 的应用程序：开发、记录和执行代码，以及交流结果。Jupyter
    notebook 结合了两个组件：


    一个 Web 应用程序：一个基于浏览器的工具，用于交互式创作结合了解释性文本、数学、计算及其丰富媒体输出的文档。


    ![](img/6423827abd996243bbfb7c0196b2aea4_119_0.png)


