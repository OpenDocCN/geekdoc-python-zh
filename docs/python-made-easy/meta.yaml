    \ 处理 |\n| (菱形) | 判断框 |\n| (箭头) | 控制流 |\n| (圆形) | 连接符 |\n\n## 图 1-4 流程图符号\n\n让我们看一个流程图的例子。\n\
    \n**示例** 编写程序来检查一个数字是偶数还是奇数。\n\n![](img/6423827abd996243bbfb7c0196b2aea4_59_0.png)\n\
    \n## 图 1-5 奇偶数选择流程图\n\n我们在数据科学简介中稍微谈到了编程语言。现在让我们理解它们是什么？它们与我们说和写的语言有何相似之处，又有何不同？\n\
    \n### 1.3.4 什么是编程语言？\n\n当我们想给计算机发出指令时，我们使用编程语言。有数百种编程语言。就像人类语言一样，不同的编程语言有不同的规则（语法）和含义（语义）。我们在不同的语言中使用不同的单词、拼写和发音来表达相同的单词，同样，相同的信息在不同的语言中写法也大不相同。\n\
    \n为了展示编程语言如何改变以及改变什么，我将向你展示一个例子，同一个程序或指令，用不同的语言编写。你自己会注意到其中的差异。\n\n## C++ 中的 \"\
    Hello World!\" 程序\n\n```\n#include <iostream>\n\nint main() {\n    std::cout <<\
    \ \"Hello World!\";\n    return 0;\n}\n```\n\n## Java 中的 \"Hello World!\" 程序\n\
    \n```\nclass HelloWorld {\n    public static void main(String[] args) {\n    \
    \    System.out.println(\"Hello, World!\");\n    }\n}\n```\n\n## Python 中的 \"\
    Hello World!\" 程序\n\n```\nprint(\"Hello World !\")\n```\n\n这是许多语言中最简单的代码行，因此大多数时候被用来展示。我不期望你理解程序是如何编写或执行的，因为我们稍后会讲到。至于现在，让我们强调一下语言之间语法的差异。\n\
    \n首先，看看名为 C++ 的编程语言。上面的图片将展示我们如何让程序在运行时显示 Hello world。我希望你只注意该语言中使用的语法。这包括围绕 Hello,\
    \ world 单词的**双引号**，语句末尾使用的**分号**，以及在闭合**花括号**之前有一个 **return** 关键字。所有这些都是 C++ 编程语言语法或规则的一部分。\n\
    \n第二个例子是用名为 Java 的编程语言编写的。这是当今移动应用和其他软件开发中最流行的语言之一。注意我们如何使用 Java 显示 Hello world!。注意不同语法的使用。\n\
    \n另外，看看用另一种名为 Python 的编程语言编写的同一个 Hello World! 程序。这是数据科学和机器学习环境中最流行的语言之一。注意这里的语法完全不同，而且更干净、更简单。\n\
    \n你一定在想，为什么要用这么多编程语言把事情复杂化。为什么不用一种所有人都使用的编程语言呢？原因是，所有的编程语言都有其优点和缺点。有些非常适合制作网站，而有些则用于制作移动应用程序，还有一些则用于处理非常复杂的数学计算。\n\
    \n无论你选择哪种**编程语言**，计算机都不理解它。计算机理解一种非常不同的语言，那就是**机器语言**。机器语言对我们来说很难直接编写，因为它非常复杂，并且主要由一系列数字组成。这就是为什么我们称这些编程语言为**高级语言**，因为它们更接近实际的人类语言。我很快会告诉你高级语言是如何转换为机器语言的，以及为什么你完全不需要担心它。\n\
    \n### 1.3.5 什么是源代码？\n\n源代码是所有编程语言的程序员编写的内容。它是我们给计算机的指令，用纯文本编写。纯文本中没有粗体、斜体或下划线等格式。因此，像\
    \ MS Word、Libre Office 或 Google Docs 这样的文字处理器不是编写源代码的合适软件。因为当我们在文字处理器中书写时，它们默认会在文本中嵌入其他信息，如字体类型、缩进或粗体/斜体，或任何其他格式，这使得它们不是纯文本。源代码必须是实际的字符。\n\
    \n相反，你可以使用**文本编辑器**。在所有 Windows PC 中，记事本是默认的。Mac 用户可以使用 TextEdit。还有很多其他文本编辑器可用。所以要记住的一点是，**富文本格式**不适合源代码，只有**纯文本**才适合。\n\
    \n现在，你准备好编写你的第一个计算机程序或源代码了吗？\n\n我们将编写长期以来用于教授初学者的同一个程序。\"Hello World!\" 程序。我们现在将使用\
    \ Python 语言语法。"
