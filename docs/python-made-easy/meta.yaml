    \n这允许函数/参数在不同时间使用不同类型的实体。\n\n在面向对象编程中，多态允许一个引用特定类的特定对象，以类似于引用完全不同类的另一个对象的方式被使用。\n\
    \n与许多其他流行的面向对象编程语言（如 Java）不同，Python 不支持编译时多态或方法重载。如果一个类或 Python 脚本有多个同名方法，最后定义的方法将覆盖之前的方法。\n\
    \n因此，我们可以说 Python 不支持方法多态。\n\n## 11.8 抽象与封装\n\n抽象和封装是面向对象编程的四个基本概念中的两个。另外两个是继承和多态。\n\
    \n**抽象**意味着隐藏复杂性，只显示对象的基本特征。所以从某种意义上说，抽象意味着隐藏真正的实现，而我们作为用户，只知道如何使用它。\n\n一个现实世界的例子是我们使用的任何物体，比如我们无休止使用的手机，而不关心或知道其内部发生了什么。\n\
    \n我们不会在这里深入探讨抽象的概念，也不会看它在 Python 中是如何实现的。如果这增加了你的好奇心，请随意进一步探索。\n\n**封装**是面向对象编程的基本概念之一。它描述了将数据和处理数据的方法包装在一个单元中的想法。这限制了直接访问变量和方法，并可以防止数据的意外修改。为了防止意外更改，对象的变量只能通过对象的方法来更改。这些类型的变量被称为私有变量。\n\
    \n在使用类和处理敏感数据时，为程序中使用的所有变量提供全局访问并不是一个好的选择。**封装**为我们提供了一种访问所需变量的方式，而无需让程序完全访问这些变量中的任何一个。\n\
    \n类是封装的一个例子，因为它封装了所有数据，包括成员函数、变量等。\n\n考虑一个现实生活中的封装例子，在政府中，有不同的部委或部门，如财政部、国防部、内政部、外交部等。财政部处理所有财务问题，并保存所有与财务相关的数据记录。同样，国防部处理所有与国防相关的活动，并保存所有与国防相关的交易记录。现在可能出现这样一种情况：由于某种原因，财政部的一名官员需要特定月份所有关于国防采购的数据。在这种情况下，他不允许直接访问国防部的数据。他必须首先联系国防部的其他官员，然后请求他提供特定数据。这就是**封装**。在这里，国防部的数据和可以操作它们的员工被包装在一个名为“国防部”的单一名称下。使用封装也隐藏了数据。在这个例子中，任何部门（如国防、财政或外交事务）的数据都对其他任何部门隐藏。\n\
    \n在 Python 术语中，我们可以将它们理解为不同的**类**及其数据，作为各自财政部类或国防部类的不同实例和方法。\n\n## 11.9 如何控制访问\n\
    \n如果类内部的一切都是公共的，那么在 Python 中如何进行访问控制以及如何实现适当的封装？\n\n### 11.9.1 私有变量\n\nPython\
    \ 中不存在只能从对象内部访问的“私有”实例变量。但是，大多数 Python 代码遵循一个约定：以单下划线开头的名称（例如 _spam）应被视为 API 的非公共部分（无论是函数、方法还是数据成员）。它应被视为实现细节，可能会在不通知的情况下更改。\n\
    \n这里有 3 种类型的变量。\n\n1.  公有\n2.  受保护\n3.  私有\n\n当我们在 Python 类中命名变量时，它们本质上是**公有**变量。例如\
    \ **self.name = name**。要使其成为**受保护**变量，需要在变量名前放置一个下划线。例如 **self._name = name**。受保护变量可以被超类的子类访问。\n\
    \n要使其成为**私有**变量，需要在变量名前放置两个下划线。例如 **self.__name = name**。私有变量不能被超类的子类访问。\n\n##\
    \ 11.10 总结\n\n本章向你介绍了面向对象编程和 Python 中类的概念。这些是非常强大的工具，会经常被引用。你看到了 Python 中一切皆为对象。学习了如何定义和初始化类，创建其实例对象。看到了类内部定义的函数如何作为该类对象的方法工作。然后我们学习了类的一个非常重要的概念：继承和多重继承。我们还触及了多态、抽象和封装。最后，我们学习了私有、受保护和公有变量以及它们的使用方法。\n\
