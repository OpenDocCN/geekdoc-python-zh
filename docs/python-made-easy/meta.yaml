    \ in <module>\n----> 1 5/0\n\nZeroDivisionError: division by zero\n```\n\nHere\
    \ the syntax is correct, but the interpreter or python doesn't know how to divide\
    \ something by \"0\". Hence, the program runs but runs into error. This is a type\
    \ of Runtime Error.\n\n### 3.6.3 Semantic Errors\n\nSemantic or logic errors are\
    \ problems with the design of your program. These usually do not produce any error\
    \ message, but instead, cause your program to behave incorrectly. These types\
    \ of errors can be tricky to track down.\n\nThese errors are often caused by accidentally\
