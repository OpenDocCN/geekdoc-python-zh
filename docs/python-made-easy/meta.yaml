    \ into python environment, you get acquainted with your data by cleaning, transforming,\
    \ and analyzing it.\n\nFor example, say you want to explore a dataset stored in\
    \ **CSV** format on your computer. Pandas will extract the data from that **CSV**\
    \ file into a **DataFrame** and then let you do things like:\n\n- Calculate statistics\
    \ and answer questions about the data, like\n    - What's the average, median,\
