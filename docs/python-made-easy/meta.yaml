  - 20.17 总结：Matplotlib 是最流行的可视化库，也是 Python 中最古老的库之一。我们了解了它如何基于 MATPLOTLIB，以及现在它如何发展得远超于此。你接触了两个流行的接口：pyplot
    和面向对象接口。在本章中，我们重点介绍了 pyplot 接口。我们逐步了解了从创建空白图形、坐标轴，到绘制单个或多个子图的整个过程。图形或绘图的解剖结构是一个非常有启发性和重要的概念。当你开始处理数据时，使用函数来重复绘制相似的图表会非常有帮助。此外，我们还了解了绘图的精细方面，比如格式化坐标轴、标签和样式。对于初学者来说，使用
    matplotlib 绘图有时会让人不知所措，但一旦掌握了基础，最复杂的图表也能被理解并创建出来，只需一步一步来。
