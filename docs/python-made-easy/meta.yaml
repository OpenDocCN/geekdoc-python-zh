    # 11.5 Inheritance Inheritance is a powerful feature in object-oriented programming.


    Its meaning is similar to what it means in the Literal English language i.e. to
    inherit something from a parent. Here, the child class (or derived class) inherits
    the attributes and methods from its parent class (or base class).


    It refers to defining a new class with little or no modification to an existing
    class. The new class is called derived (or child) class and the one from which
    it inherits is called the base (or parent) class.


    Inheritance enables us to define a class that takes all the functionality from
    the parent class. We can further add more to the derived class as well.


    Inheritance is considered one of the most important aspects of OOP because it
    serves the feature of reusability, thus making the piece of code more reliable.'
  merge: -1
  pgno: 377
