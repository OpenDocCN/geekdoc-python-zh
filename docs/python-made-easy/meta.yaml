    ### 2.8.1.2 IPython Console


    ![](img/6423827abd996243bbfb7c0196b2aea4_115_0.png)


    Figure 2-17 IDE editor split horizontal


    The IPython Console allows you to execute commands and enter, interact with and
    visualize data inside any number of fully-featured **IPython** interpreters. Each
    console is executed in a separate process, allowing you to run scripts, interrupt
    execution and restart or terminate a shell without affecting the others or Spyder
    itself, and easily test your code in a clean environment without disrupting your
    primary session.


    ![](img/6423827abd996243bbfb7c0196b2aea4_116_0.png)


