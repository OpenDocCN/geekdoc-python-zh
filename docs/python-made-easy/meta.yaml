    )\n            print(\"Lemon Juice\")\n            print(\"Club Soda\")\n    \
    \        print(\"Salt\")\n            print(\"Sugar\")\n            print(\"Secret\
    \ Spice\")\n```\n\nNow when we call our \"lemonade_stall\" function, what do we\
    \ get?\n\n```\nIn [4]: lemonade_stall()\n```\n\n```\nNimbu Pani Which is made\
    \ of\nLemon Juice\nWater\nSalt\nSugar\nNimbu Soda Masala Which is made of\nLemon\
    \ Juice\nClub Soda\nSalt\nSugar\nSecret Spice\n```\n\n#### 6.4.3.1 Parameter\n\
    \nWe get both, Lemon water as well as Lemon soda.\n\nWhat if we want only lemon\
    \ water when the amount paid is Rs 5 and Lemon soda when the amount paid is Rs\
    \ 10?\nWe will define the function in a way that it knows the difference.\n\n\
    ```\nIn [5]: # I will change the function name slightly by making the l and s\
    \ upper case.\n```\n\n**id(object)** Return the “identity” of an object. This\
    \ is an integer that is guaranteed to be unique and constant for this object during\
    \ its lifetime. Two objects with non-overlapping lifetimes may have the same **id()**\
    \ value. CPython implementation detail: This is the address of the object in memory.\n\
    \n**input([prompt])** If the prompt argument is present, it is written to standard\
    \ output without a trailing newline.\n\n**int([x])** Return an integer object\
    \ constructed from a number or string x.\n\n**isinstance(object, classinfo)**\
    \ Return True if the object argument is an instance of the classinfo argument\
    \ or a (direct, indirect, or virtual) subclass thereof. If the object is not an\
    \ object of the given type, the function always returns False.\n\n**len(s)** Return\
    \ the length (the number of items) of an object. The argument may be a sequence\
    \ (such as a string, bytes, tuple, list, or range) or a collection (such as a\
    \ dictionary, set, or frozen set).\n\n**map(function, iterable, ...)** Return\
