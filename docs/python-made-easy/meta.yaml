    \ ord() 的逆操作。\n\n**dir([object])** 不带参数时，返回当前本地作用域中的名称列表。带参数时，尝试返回该对象的有效属性列表。\n\
    \n**float([x])** 返回一个从数字或字符串 x 构造的浮点数。\n\n**help([object])** 调用内置帮助系统。（此函数旨在用于交互式使用。）如果未给出参数，则交互式帮助系统在解释器控制台启动。如果参数是字符串，则将该字符串作为模块、函数、类、方法、关键字或文档主题的名称进行查找，并在控制台上打印帮助页面。如果参数是任何其他类型的对象，则会生成关于该对象的帮助页面。"
