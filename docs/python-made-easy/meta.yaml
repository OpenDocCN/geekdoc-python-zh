- md: '## 1.1.9 Prerequisites for Data Science


    ### Programming


    Some level of programming is required to execute a successful data science project.
    The most common programming languages are Python, and R. Python is especially
    popular because it’s easy to learn, and it supports multiple libraries for data
    science and ML.


    ### Statistics


    Statistics are at the core of data science. A sturdy handle on statistics can
    help you extract more intelligence and obtain more meaningful results.


    ### Databases


    A capable data scientist, you need to understand how databases work, how to manage
    them, and how to extract data from them.


    ### Modeling


    Mathematical models enable you to make quick calculations and predictions based
    on what you already know about the data. Modeling is also a part of ML and involves
    identifying which algorithm is the most suitable to solve a given problem and
    how to train these models.


    ## 1.1.10 Data Science Jobs Roles


    Most prominent Data Scientist job titles are:


    - 1. Data Scientist

    - 2. Data Engineer

    - 3. Data Analyst

    - 4. Statistician

    - 5. Data Architect

    - 6. Data Admin

    - 7. Business Analyst

    - 8. Data/Analytics Manager


    Let''s learn what each role entails in detail:


    ### Data Scientist:


    **Role:**


    A Data Scientist is a professional who manages enormous amounts of data to come
    up with compelling business visions by using various tools, techniques, methodologies,
    algorithms, etc.


    **Languages:**

    R, SAS, Python, SQL, Hive, Matlab, Pig, Spark


    ### Data Engineer:


    **Role:**

    The role of a data engineer is of working with large amounts of data. He develops,
    constructs, tests, and maintains architectures like large scale processing systems
    and databases.


    **Languages:**

    SQL, Hive, R, SAS, Matlab, Python, Java, Ruby, C++, and Perl


    ### Data Analyst:


    **Role:**

    A data analyst is responsible for mining vast amounts of data. He or she will
    look for relationships, patterns, trends in data. Later he or she will deliver
    compelling reporting and visualization for analyzing the data to make the most
    viable business decisions.


    **Languages:**

    R, Python, HTML, JS, C, C++, SQL


    ### Statistician:


    **Role:**

    The statistician collects, analyses, understand qualitative and quantitative data
    by using statistical theories and methods.


    **Languages:**

    SQL, R, Matlab, Tableau, Python, Perl, Spark, and Hive


    ### Data Administrator:


    **Role:**

    Data admin should ensure that the database is accessible to all relevant users.
    He also makes sure that it is performing correctly and is being kept safe from
    hacking.


    **Languages:**

    Ruby on Rails, SQL, Java, C#, and Python


    ### Business Analyst:


    **Role:**

    This professional needs to improves business processes. He/she as an intermediary
    between the business executive team and the IT department.


    **Languages:**

    SQL, Tableau, Power BI and, Python


    **Note:** Did you notice which language or languages are common to all roles?


    ## 1.2 Summary of Data Science Introduction


    Data Science has been the buzz word lately, getting entry into all aspects of
    life and business. What started as using computers to speed up what humans couldn’t
    do in years, to finish in minutes, has now become a different ball game altogether
    in the last decade. Now, Data science is a major stream in itself and a very attractive
    one.


    You have had an idea by now, what is it and what is expected of data science.
    But trust me when I say, we have not even seen the tip of the iceberg. The possibilities
    are infinite, literally.


    Some very recent and very exciting technologies which are based around data science
    are Self Driving cars, Personal Digital Assistants (Alexa, Google Assistant, Siri,
    etc.), Live traffic and directions on Digital Maps, and of course, the personalized
    shopping experience.


    These are exciting times to be a data scientist. But only knowing the possibilities
    is no fun, is it?


    So, let’s get our hands dirty, and learn how to write programs, that will use
    the data to provide us meaningful insights.


    ## 1.3 Basics of Computer Programming


    Let me share something with you. I was also not very comfortable hearing **Programming**
    not very long ago. Fortunately, I decided to take these heads on, and as it turned
    out, there is nothing to fear about. The only problem I faced was, not lack of
    reading material (in fact, the opposite is true. There is so much of reading material
    that it is overwhelming.), but where to start and what is the right path to tread.


    That is what I am going to help you with. I will hold your hand and walk with
    you on this exciting journey to start a new chapter in your learning experience.
    Let’s learn how to talk to your computer, which is essentially what **Computer
    Programming** is.


    ### 1.3.1 What is Programming?


    We all have experienced the end result of computer programming. When we play our
    favorite games on mobile or computers, open any mobile application or computer
    software, take a digital image, see photos on any screen or even send an email.
    Computer programs are running in the background, doing all the work, which we
    never see.


    The computer is an obedient servant, but not a very wise one. They understand
    exactly what we tell them, nothing more, and nothing less. Hence, when we give
    them instruction (by way of programs), these instructions must be **specific**
    and **sequential**.


    The most suited analogy I can think of is a recipe. Let’s take an easy recipe
    to make bread (chapati or baked bread, or both). There are only a few ingredients
    like flour, water, and yeast (in case of baking). Each ingredient must be in a
    **specific** proportion. You put one cup of water instead of half cup and the
    dough is too runny to hold its shape. In the same way, the instructions we give
    to the computer must be specific to get the desired results. The computers are
    very literal. They try to execute our commands exactly. If we give them bad instructions,
    the commands may not run at all. Or worse, it can have a bug or it can crash altogether.


    The other characteristic of a computer program is, they are **sequential**, just
    like the steps in a recipe. The order of the steps will determine the final product.
    What if, while making a chapati, we put it on fire directly, instead of heating
    them on a hot plate (Tava) for some time? They will simply break and lose shape.
    Similarly, What if the flour was first put in the oven, and then water was added
    to make the dough? The cooked flour will not make the dough. Order of action matters.
    The same thing can be said about programming. It''s all about giving computers
    the right instructions and the correct sequence of steps to produce the desired
    result.


    So, to recap, programming is how we communicate with the computer. Its characteristics
    are instructions that are specific and sequential. And just like a recipe, when
    we get our programs right, we get to enjoy the final product.


    In simple terms, Programming is ideas converted into ''step by step'' instructions
    that a computer can understand. This step by step instruction is called an **algorithm**.


    ### 1.3.2 Computer Algorithm


    In order to instruct the computer to do anything, the instruction must be written
    in form of a **computer program**. To write a computer program, you have to tell
    the computer step by step, exactly what you want it to do. The computer then runs
    or executes the program and follows it step by step, to complete the task.


    When you are telling the computer what to do, you also tell it *how* to do it.
    This how is the computer algorithm.


    **Definition:** In computer science, an algorithm is a finite sequence of well-defined,
    computer-implementable instructions, typically to solve a problem or to perform
    a computation. Algorithms are always unambiguous and are used as specifications
    for performing calculations, data processing, automated reasoning, and other tasks.


    In computer systems, an algorithm is an instance of logic written in software
    by software developers, to be effective for the intended target'
  mdcn: '## 1.1.9 数据科学的前提条件


    ### 编程


    要成功执行一个数据科学项目，需要具备一定的编程能力。最常见的编程语言是 Python 和 R。Python 尤其受欢迎，因为它易于学习，并且支持多种用于数据科学和机器学习的库。


    ### 统计学


    统计学是数据科学的核心。扎实掌握统计学可以帮助你提取更多信息，并获得更有意义的结果。


    ### 数据库


    作为一名有能力的数据科学家，你需要了解数据库的工作原理、如何管理数据库以及如何从中提取数据。


    ### 建模


    数学模型使你能够根据已有的数据知识进行快速计算和预测。建模也是机器学习的一部分，涉及确定哪种算法最适合解决给定问题以及如何训练这些模型。


    ## 1.1.10 数据科学的工作角色


    最突出的数据科学家职位头衔包括：


    - 1. 数据科学家

    - 2. 数据工程师

    - 3. 数据分析师

    - 4. 统计学家

    - 5. 数据架构师

    - 6. 数据管理员

    - 7. 业务分析师

    - 8. 数据/分析经理


    让我们详细了解一下每个角色的职责：


    ### 数据科学家：


    **职责：**


    数据科学家是管理海量数据的专业人士，他们使用各种工具、技术、方法论、算法等，提出引人注目的商业见解。


    **使用的语言：**

    R, SAS, Python, SQL, Hive, Matlab, Pig, Spark


    ### 数据工程师：


    **职责：**

    数据工程师的角色是处理海量数据。他负责开发、构建、测试和维护大规模处理系统和数据库等架构。


    **使用的语言：**

    SQL, Hive, R, SAS, Matlab, Python, Java, Ruby, C++, and Perl


    ### 数据分析师：


    **职责：**

    数据分析师负责挖掘海量数据。他或她会寻找数据中的关系、模式和趋势。之后，他或她将提供引人注目的报告和可视化，以分析数据并做出最可行的商业决策。


    **使用的语言：**

    R, Python, HTML, JS, C, C++, SQL


    ### 统计学家：


    **职责：**

    统计学家使用统计理论和方法收集、分析和理解定性与定量数据。


    **使用的语言：**

    SQL, R, Matlab, Tableau, Python, Perl, Spark, and Hive


    ### 数据管理员：


    **职责：**

    数据管理员应确保所有相关用户都能访问数据库。他还需确保数据库运行正常，并防止其受到黑客攻击。


    **使用的语言：**

    Ruby on Rails, SQL, Java, C#, and Python


    ### 业务分析师：


    **职责：**

    这位专业人士需要改进业务流程。他/她是业务执行团队和 IT 部门之间的桥梁。


    **使用的语言：**

    SQL, Tableau, Power BI and, Python


    **注意：** 你注意到哪种或哪些语言是所有角色共有的了吗？


    ## 1.2 数据科学导论总结


    数据科学是近来的热门词汇，已渗透到生活和商业的方方面面。它最初是利用计算机将人类需要数年才能完成的工作加速到几分钟内完成，而在过去十年里，这已经完全变成了另一回事。现在，数据科学本身已成为一个主要且极具吸引力的领域。


    到现在为止，你已经对数据科学是什么以及对它的期望有了一些概念。但请相信我，我们甚至还没有看到冰山一角。可能性是无限的，字面意义上的无限。


    一些非常近期且令人兴奋的、基于数据科学的技术包括自动驾驶汽车、个人数字助理（Alexa、Google Assistant、Siri 等）、数字地图上的实时交通和路线，当然，还有个性化的购物体验。


    现在是成为一名数据科学家的激动人心的时代。但仅仅知道可能性并不有趣，不是吗？


    所以，让我们动手实践，学习如何编写程序，利用数据为我们提供有意义的见解。


    ## 1.3 计算机编程基础


    让我和你分享一些事情。不久前，我听到**编程**这个词时也感到不太自在。幸运的是，我决定迎难而上，结果发现，这没什么好怕的。我面临的唯一问题不是缺乏阅读材料（事实上恰恰相反。阅读材料多到让人应接不暇。），而是从哪里开始以及正确的学习路径是什么。


    这正是我要帮助你的地方。我将牵着你的手，与你一起踏上这段激动人心的旅程，在你的学习经历中开启新的篇章。让我们学习如何与你的计算机对话，这本质上就是**计算机编程**。


    ### 1.3.1 什么是编程？


    我们都体验过计算机编程的最终成果。当我们在手机或电脑上玩喜欢的游戏，打开任何手机应用或电脑软件，拍摄数字照片，在任何屏幕上查看照片，甚至发送电子邮件时。计算机程序都在后台运行，完成所有我们从未见过的工作。


    计算机是一个顺从的仆人，但并不十分明智。它们完全理解我们告诉它们的内容，不多也不少。因此，当我们给它们指令（通过程序）时，这些指令必须是**具体的**和**按顺序的**。


    我能想到的最贴切的类比是食谱。让我们拿一个简单的面包食谱（印度薄饼或烤面包，或两者兼有）为例。只有几种原料，如面粉、水和酵母（如果是烘焙的话）。每种原料都必须是**特定**的比例。你放一杯水而不是半杯，面团就会太稀而无法成型。同样，我们给计算机的指令必须具体，才能得到预期的结果。计算机非常字面化。它们试图完全执行我们的命令。如果我们给它们错误的指令，命令可能根本无法运行。或者更糟的是，它可能会出现错误或完全崩溃。


    计算机程序的另一个特点是，它们是**按顺序的**，就像食谱中的步骤一样。步骤的顺序将决定最终产品。如果在制作印度薄饼时，我们直接把它放在火上，而不是先在热板（Tava）上加热一会儿，会怎么样？它们会直接碎裂并失去形状。同样，如果先把面粉放进烤箱，然后再加水和面，会怎么样？煮熟的面粉无法做成面团。行动的顺序很重要。编程也是如此。关键在于给计算机正确的指令和正确的步骤顺序，以产生预期的结果。


    所以，总结一下，编程是我们与计算机沟通的方式。它的特点是指令具体且按顺序。就像食谱一样，当我们正确编写程序时，我们就能享受最终成果。


    简单来说，编程是将想法转化为计算机可以理解的“逐步”指令。这种逐步指令被称为**算法**。


    ### 1.3.2 计算机算法


    为了指示计算机做任何事情，指令必须以**计算机程序**的形式编写。要编写计算机程序，你必须一步一步地告诉计算机，你希望它做什么。然后计算机运行或执行程序，并逐步遵循它来完成任务。


    当你告诉计算机做什么时，你也告诉了它*如何*做。这个“如何”就是计算机算法。


    **定义：** 在计算机科学中，算法是一系列定义明确、可由计算机执行的指令的有限序列，通常用于解决问题或执行计算。算法总是明确无误的，并被用作执行计算、数据处理、自动推理和其他任务的规范。


    在计算机系统中，算法是软件开发者用软件编写的逻辑实例，旨在对预期目标有效'
