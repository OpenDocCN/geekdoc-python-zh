    for data analysis. Import the package, aka import pandas as **pd**. A table of
    data is stored as a pandas DataFrame. Each column in a DataFrame is a Series.
    You can do things by applying a method to a DataFrame or Series. Getting data
    into pandas from many different file formats or data sources is supported by **read_***
    functions. Exporting data out of pandas is provided by different **to_***methods.
    The **head/tail/info** methods and the **dtypes** attribute are convenient for
    a first check. When selecting subsets of data, square brackets [] are used. Inside
    these brackets, you can use a single column/row label, a list of column/row labels,
    a slice of labels, a conditional expression, or a colon. Select specific rows
    and/or columns using **loc** when using the row and column names. Select specific
    rows and/or columns using **iloc** when using the positions in the table. You
    can assign new values to a selection based on **loc/iloc**.'
