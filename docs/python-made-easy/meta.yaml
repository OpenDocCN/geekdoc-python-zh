    图 20-14\n\n我们看的是非常简单的例子，你可能认为对于如此简单的任务，“函数”方法有些小题大做。但这只是为了说明这个过程。一旦图表开始变得稍微复杂一些，函数的一次性投入就会带来多次回报。\n\
    \n## 20.6 Pyplot<sup>90</sup>\n\n**matplotlib.pyplot** 是一组命令式函数，使 matplotlib 的工作方式类似于\
    \ MATLAB。每个 **pyplot** 函数都会对图形进行一些更改：例如，创建一个图形、在图形中创建一个绘图区域、在绘图区域中绘制一些线条、用标签装饰绘图等。\n\
    \n在 **matplotlib.pyplot** 中，各种状态在函数调用之间得以保留，因此它会跟踪诸如当前图形和绘图区域之类的信息，并且绘图函数被定向到当前坐标轴（请注意，这里的“axes”以及文档中的大多数地方指的是图形的坐标轴部分，而不是严格的数学术语“多个轴”）。\n\
    \n**注意：** pyplot API 通常不如面向对象 API 灵活。你在这里看到的大多数函数调用也可以作为 Axes 对象的方法来调用。\n\n使用\
    \ pyplot 生成可视化非常快捷：\n\n```\nIn [14]: import matplotlib.pyplot as plt plt.plot([1,\
