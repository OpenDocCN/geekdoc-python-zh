- md: "## 20.7.1 Plotting labeled data\nThere's a convenient way for plotting objects\
    \ with labeled data (i.e. data that can be accessed by index obj['y']). Instead\
    \ of giving the data in x and y, you can provide the object in the data parameter\
    \ and just give the labels for x and y:\n\n```python\n>>> plot('xlabel', 'ylabel',\
    \ data=obj)\n```\n\nAll indexable objects are supported. This could e.g. be a\
    \ dict, a pandas.DataFrame or a structured numpy array.\n\n## 20.7.2 Plotting\
    \ multiple sets of data\nThere are various ways to plot multiple sets of data.\n\
    \n1.  The most straight forward way is just to call the plot multiple times. Example:\n\
    \    ```python\n    >>> plot(x1, y1, 'bo')\n    >>> plot(x2, y2, 'go')\n    ```\n\
    2.  Alternatively, if your data is already a 2d array, you can pass it directly\
    \ to x, y. A separate data set will be drawn for every column. Example: an array\
    \ a where the first column represents the x values and the other columns are the\
    \ y columns:\n    ```python\n    >>> plot(a[0], a[1:])\n    ```\n3.  The third\
    \ way is to specify multiple sets of [x], y, [fmt] groups:\n    ```python\n  \
    \  >>> plot(x1, y1, 'g^', x2, y2, 'g-')\n    ```\n    In this case, any additional\
    \ keyword argument applies to all datasets. Also, this syntax cannot be combined\
    \ with the data parameter.\n\n## 20.7.3 Formatting the style\nFor every x, y pair\
    \ of arguments, there is an optional third argument which is the format string\
    \ that indicates the color and line type of the plot. The letters and symbols\
    \ of the format string are from MATLAB, and you concatenate a color string with\
    \ a line style string. The default format string is 'b-', which is a solid blue\
    \ line. In the next example, we are doing two changes in the plot:\n- Replacing\
    \ the solid blue line with red dots\n- Setting the size of the axis\n\n```python\n\
    In [16]:  plt.plot([1, 2, 3, 4], [1, 4, 9, 16], 'ro')\n         plt.axis([0, 6,\
    \ 0, 20])\n         plt.show()\n```\n\n![](img/6423827abd996243bbfb7c0196b2aea4_591_0.png)\n\
    \nFigure 20-17\n\nThe **axis()** command in the example above takes a list of\
    \ [xmin, xmax, ymin, ymax] and specifies the viewport of the axes.\n\nIf matplotlib\
    \ were limited to working with lists, it would be fairly useless for numeric processing.\
    \ Generally, you will use NumPy arrays. In fact, all sequences are converted to\
    \ NumPy arrays internally. The example below illustrates plotting several lines\
    \ with different format styles in one command using arrays.\n\n```python\nIn [17]:\
    \ import numpy as np\n         # evenly sampled time at 200ms intervals\n    \
    \     t = np.arange(0., 5., 0.2)\n         # red dashes, blue squares, and green\
    \ triangles\n         plt.plot(t, t, 'r--', t, t**2, 'bs', t, t**3, 'g^')\n  \
    \       plt.show()\n```\n\n![](img/6423827abd996243bbfb7c0196b2aea4_592_0.png)\n\
    \nFigure 20-18\n\nLet's now decode the **plot()** function by understanding its\
    \ parameters and what it returns.\n\n## 20.8 plot(parameters)<sup>91</sup>\n\n\
    ### 20.8.1 x, y\nThese are array-like or scalars. x / y is the horizontal/vertical\
    \ coordinates of the data points. If you do not provide x values, then they are\
    \ taken as default. The default value is range(len(y)). Commonly, these parameters\
    \ are 1D arrays.\n\nThey can also be scalars, or two-dimensional (in that case,\
    \ the columns represent separate data sets).\n\nThese arguments cannot be passed\
    \ as keywords.\n\n### 20.8.2 Format Strings (fmt)\nstr, optional. This is short\
    \ for the format string. Format strings are just an abbreviation for quickly setting\
    \ basic line properties. This argument cannot be passed as a keyword.\n\nA format\
    \ string consists of a part for color, marker, and line: `fmt = '[marker][line][color]'`\n\
    \nEach of them is optional. If not provided, the value from the style cycle is\
    \ used. Exception: If the line is given, but no marker, the data will be a line\
    \ without markers. Other combinations such as [color][marker][line] are also supported\
    \ but note that their parsing may be ambiguous.\n\n#### 20.8.2.1 Markers\n\n|\
    \ character | description |\n| :--- | :--- |\n| '.' | point marker |\n| ',' |\
    \ pixel marker |\n| 'o' | circle marker |\n| 'v' | triangle_down marker |\n| '^'\
    \ | triangle_up marker |\n| '<' | triangle_left marker |\n| '>' | triangle_right\
    \ marker |\n| '1' | tri_down marker |\n| '2' | tri_up marker |\n| '3' | tri_left\
    \ marker |\n| '4' | tri_right marker |\n| 's' | square marker |\n| 'p' | pentagon\
    \ marker |\n| '*' | star marker |\n| 'h' | hexagon1 marker |\n| 'H' | hexagon2\
    \ marker |\n| '+' | plus marker |\n| 'x' | x marker |\n| 'D' | diamond marker\
    \ |\n| 'd' | thin_diamond marker |\n| '/' | vline marker |\n| '_' | hline marker\
    \ |\n\n#### 20.8.2.2 Line Styles\n\n| character | description |\n| :--- | :---\
    \ |\n| '-' | solid line style |\n| '--' | dashed line style |\n| '-.' | dash-dot\
    \ line style |\n| ':' | dotted line style |\n\n#### 20.8.2.3 Colors\nThe supported\
    \ color abbreviations are the single letter codes\n\n| character | color |\n|\
    \ :--- | :--- |\n| 'b' | blue |\n| 'g' | green |\n| 'r' | red |\n| 'c' | cyan\
    \ |\n| 'm' | magenta |\n| 'y' | yellow |\n| 'k' | black |\n| 'w' | white |\n\n\
    # Example format strings:\n\n```python\n'b'       # blue markers with default\
    \ shape\n'or'      # red circles\n'-g'      # green solid line\n'--'      # dashed\
    \ line with the default color\n'^k:'     # black triangle_up markers connected\
    \ by a dotted line\n```\n\n### 20.8.3 data\nIndexable object, optional. An object\
    \ with labeled data. If given, provide the label names to plot in x and y.\n\n\
    ## 20.9 plot() Returns\nThe plot function returns lines.\n\nThe line can have\
    \ both a solid linestyle connecting all the vertices and a marker at each vertex.\
    \ Additionally, the drawing of the solid line is influenced by the drawstyle,\
    \ e.g., one can create \"stepped\" lines in various styles.\n\n## 20.10 plot(**kwargs)\n\
    These are keyword arguments used for line2D properties. They are optional. kwargs\
    \ are used to specify properties like a line label (for auto legends), linewidth,\
    \ antialiasing, marker face color. Example:\n\n```python\n>>> plot([1, 2, 3],\
    \ [1, 2, 3], 'go-', label='line 1', linewidth=2)\n>>> plot([1, 2, 3], [1, 4, 9],\
    \ 'rs', label='line 2')\n```\n\nIf you make multiple lines with one plot command,\
    \ the kwargs apply to all those lines.\n\nHere is a list of most useful Line2D\
    \ properties:\n\n| Property | Description |\n| :--- | :--- |\n| alpha | float\
    \ or None |\n| animated | bool |\n| antialiased or aa | bool |\n| color or c |\
    \ color |\n| contains | callable |\n| data | (2, N) array or two 1D arrays |\n\
    | drawstyle or ds | {'default', 'steps', 'steps-pre', 'steps-mid', 'steps-post'},\
    \ default: 'default' |\n| figure | Figure |\n| fillstyle | {'full', 'left', 'right',\
    \ 'bottom', 'top', 'none'} |\n| gid | str |\n| label | object |\n| linestyle or\
    \ ls | {'-', '--', '-.', ':', '', (offset, on-off-seq), ...} |\n| linewidth or\
    \ lw | float |\n| marker | marker style |\n| markeredgecolor or mec | color |\n\
    | markeredgewidth or mew | float |\n| markerfacecolor or mfc | color |\n| markersize\
    \ or ms | float |\n| pickradius | float |\n| url | str |\n| visible | bool |\n\
    | xdata | **1D array** |\n| ydata | **1D array** |\n\n# Plotting with keyword\
    \ strings\nThere are some instances where you have data in a format that lets\
    \ you access particular variables with strings. For example, with numpy.recarray\
    \ or pandas.DataFrame.\n\nMatplotlib allows you to provide such an object with\
    \ the data keyword argument. If provided, then you may generate plots with the\
    \ strings corresponding to these variables.\n\n```python\nIn [18]: data = {'a':\
    \ np.arange(50), 'c':\n            np.random.randint(0, 50, 50), 'd':\n      \
    \      np.random.randn(50)}\n        data['b'] = data['a'] + 10 *\n        np.random.randn(50)\n\
    \        data['d'] = np.abs(data['d']) * 100\n\n        plt.scatter('a', 'b',\
    \ c='c', s='d',\n        data=data)\n        plt.xlabel('entry a')\n        plt.ylabel('entry\
    \ b')\n        plt.show()\n```\n\n![](img/6423827abd996243bbfb7c0196b2aea4_599_0.png)\n\
    \nFigure 20-19\n\n## 20.11 Plotting with categorical variables\nIt is also possible\
    \ to create a plot using categorical variables. Matplotlib allows you to pass\
    \ categorical variables directly to many plotting functions. For example:\n\n\
    ```python\nnames = ['group_a', 'group_b', 'group_c']\nvalues = [1, 10, 100]\n\n\
    plt.figure(figsize=(9, 3))\nplt.subplot(131)  # Subplot(1 row, 3 columns, 1st\
    \ object)\nplt.bar(names, values)\nplt.subplot(132)  # Subplot(1 row, 3 columns,\
    \ 2nd object)\n```"
  mdcn: "## 20.7.1 绘制带标签的数据\n有一种便捷的方法可以绘制带标签数据的对象（即可以通过索引 `obj['y']` 访问的数据）。无需在 `x`\
    \ 和 `y` 中提供数据，你可以在 `data` 参数中提供对象，然后只需给出 `x` 和 `y` 的标签：\n\n```python\n>>> plot('xlabel',\
    \ 'ylabel', data=obj)\n```\n\n所有可索引的对象都受支持。例如，可以是字典、`pandas.DataFrame` 或结构化的 `numpy`\
    \ 数组。\n\n## 20.7.2 绘制多组数据\n有多种方法可以绘制多组数据。\n\n1.  最直接的方法是多次调用 `plot`。示例：\n    ```python\n\
    \    >>> plot(x1, y1, 'bo')\n    >>> plot(x2, y2, 'go')\n    ```\n2.  或者，如果你的数据已经是二维数组，你可以直接将其传递给\
    \ `x`、`y`。每一列将绘制一个独立的数据集。示例：一个数组 `a`，其中第一列代表 `x` 值，其他列是 `y` 列：\n    ```python\n\
