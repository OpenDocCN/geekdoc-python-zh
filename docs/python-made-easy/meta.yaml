    ### 2.8.1.3 Variable Explorer


    The Variable Explorer shows the namespace contents (all global object references,
    such as variables, functions, modules, etc.) of the currently selected IPython
    Console session, and allows you to interact with them through a variety of GUI-based
    editors.


    ![](img/6423827abd996243bbfb7c0196b2aea4_117_0.png)


    ### 2.8.1.4 Help


    You can use the **Help** pane to find, render, and display rich documentation
    for any object with a docstring, including modules, classes, functions, and methods.
    Help can be retrieved both by static analysis of open files in the **Editor**
    or by dynamically inspecting an object in an **IPython Console**.


    You can trigger help by manually entering the object''s name into the Object box,
    pressing the configurable help shortcut (Ctrl-I by default), or even automatically
    if desired when on typing a left parenthesis "(" after a function or method name.
    Automatic help can be individually enabled for both the Editor and the Console
    under Preferences ▶ Help +   Automatic Connections, and turned on and off dynamically
    via the lock icon in the top right corner of the Help pane.


    ## 2.9 Jupyter Notebook


    ### 2.9.1 Introduction


    The notebook extends the console-based approach to interactive computing in a
    qualitatively new direction, providing a web-based application suitable for capturing
    the whole computation process: developing, documenting, and executing code, as
    well as communicating the results. The Jupyter notebook combines two components:


    A web application: a browser-based tool for interactive authoring of documents
    that combine explanatory text, mathematics, computations, and their rich media
    output.


    ![](img/6423827abd996243bbfb7c0196b2aea4_119_0.png)


