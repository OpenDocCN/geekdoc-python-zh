    # 9.3 Reading and Writing Files


    **open()** returns a file object, and is most commonly used with two arguments:
    **open(filename, mode)**.


    ```

    f = open(''workfile'', ''w'') The first argument is a string containing the filename.
    The second argument is another string containing a few characters describing how
    the file will be used. The mode can be: ''r'' when the file will only be read,
    ''w'' for only writing (an existing file with the same name will be erased), ''a''
    opens the file for appending; any data are written to the file is automatically
    added to the end.

    ```


    +   4. ''r+'' opens the file for both reading and writing.


    The mode argument is optional; ''r'' will be assumed if it''s omitted.


    Normally, files are opened in text mode that means, you read and write strings
    from and to the file, which are encoded in a specific encoding.


    Full syntax of **open()** is as below: open(file, mode=''r'', buffering=-1, encoding=None,
    errors=None, newline=None, closefd=True, opener=None) The default option in *mode*
    is ''r''. Have a look at all other options in the table below.'
