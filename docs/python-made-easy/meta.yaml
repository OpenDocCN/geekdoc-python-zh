    **Encapsulation** is one of the fundamental concepts in object-oriented programming
    (OOP). It describes the idea of wrapping data and the methods that work on data
    within one unit. This puts restrictions on accessing variables and methods directly
    and can prevent the accidental modification of data. To prevent accidental change,
    an object''s variable can only be changed by an object''s method. Those types
    of variables are known as a private variable.


    When working with classes and dealing with sensitive data, providing global access
    to all the variables used within the program is not a good choice. **Encapsulation**
    offers a way for us to access the required variables without providing the program
    full-fledged access to any of those variables.


