  mdcn: '与许多强大的库兼容。当我们今天谈论 Python 2 时，通常指的是 Python 2.7 版本，因为这是最常用的版本。然而，Python 2.7
    被视为一种遗留语言，其持续开发（目前主要是错误修复）将在 2020 年完全停止。


    ## 2.3.3 Python 3


    Python 3 被视为 Python 的未来，是当前正在开发的语言版本。作为一次重大修订，Python 3 于 2008 年底发布，旨在解决和修正该语言先前版本的内在设计缺陷。Python
    3 开发的重点是清理代码库并消除冗余，明确执行给定任务只有一种方式。Python 3.0 的主要修改包括将 `print` 语句更改为内置函数、改进整数除法方式以及提供更多
    Unicode 支持。起初，由于该语言与 Python 2 不向后兼容，需要人们决定使用哪个版本，Python 3 的采用速度较慢。此外，许多软件包库仅适用于
    Python 2，但随着 Python 3 背后的开发团队重申 Python 2 支持将有终止日期，更多的库已被移植到 Python 3。Python 3
    采用率的增加可以从现在提供 Python 3 支持的 Python 软件包数量中看出，在撰写本文时，这包括了 360 个最受欢迎的 Python 软件包中的
    339 个。


    ## 2.3.4 关键差异


    虽然 Python 2.7 和 Python 3 共享许多相似的功能，但不应认为它们完全可以互换。尽管你可以在任一版本中编写良好的代码和有用的程序，但值得理解的是，在代码语法和处理方面会有一些相当大的差异。


    ## 2.4 如何安装和使用 Python


    可以从以下链接下载并安装独立的 Python。


    下载最新版本的 Python - https://www.python.org/downloads/


    使用此方法，你将只安装 Python 软件及其解释器。但你需要单独下载并安装 Python IDE、Python 控制台、Jupyter Notebook
    以及许多 Python 软件包。


    有一种更高效的方法。我们将采用这种方法。唯一的缺点是，当你安装独立的 Python 时，它占用的内存空间较少（显然，因为它缺少其他软件）。


    我们将使用 Anaconda Python 发行版。让我们下载并安装它。以下是分步指南。


    ### 2.4.1 Anaconda Python 发行版


    Anaconda 软件包是安装 Python 和其他支持软件包最简单、最常用的方法。它是免费提供的，易于安装。


    开源的 Anaconda 发行版是在 Linux、Windows 和 Mac OS X 上进行 Python/R 数据科学和机器学习的最简单方式。在全球拥有超过
    1100 万用户，它是开发、测试和在单机上训练的行业标准，使个人数据科学家能够：


    1.  快速下载 1500 多个 Python/R 数据科学软件包

    2.  使用 Conda 管理库、依赖项和环境

    3.  使用 scikit-learn、TensorFlow 和 Theano 开发和训练机器学习和深度学习模型

    4.  使用 Dask、NumPy、pandas 和 Numba 以可扩展性和高性能分析数据

    5.  使用 Matplotlib、Bokeh、Datashader 和 Holoviews 可视化结果


    ### 2.4.2 为什么选择 Anaconda？


    1.  用户级安装你想要的 Python 版本

    2.  能够完全独立于系统库或管理员权限安装/更新软件包

    3.  **conda** 工具安装二进制软件包，而不是像 pip 那样需要编译资源——同样，如果你安装必要库的权限有限，这很方便。

    4.  基本上消除了试图弄清楚哪个版本/发行版的软件包 X 与哪个版本/发行版的软件包 Y 兼容的麻烦，而这两者都是安装软件包 Z 所必需的

    5.  提供完整版本，包含 NumPy、Scipy、PyQt、Spyder IDE 等，或者提供某种最小化或按需选择的方式（miniconda），你可以选择你需要的并安装你想要的。

    6.  没有搞乱所需系统库的风险


    ### 2.4.3 在 Windows 上安装 Anaconda<sup>15</sup>


    -   下载 Anaconda 安装程序 (https://www.anaconda.com/download/#windows)。

    -   双击安装程序启动。


    > **注意**


    为防止权限错误，请不要从“收藏夹”文件夹启动安装程序。


    如果在安装过程中遇到问题，请在安装期间暂时禁用防病毒软件，安装完成后重新启用。如果你为所有用户安装，请卸载 Anaconda 并仅为“仅限用户”重新安装，然后重试。


    -   单击“下一步”。

    -   阅读许可条款并单击“我同意”。

    -   选择“仅为我”安装，除非你要为所有用户安装（这需要 Windows 管理员权限），然后单击“下一步”。

    -   选择安装 Anaconda 的目标文件夹，然后单击“下一步”按钮。参见 *常见问题解答*


    > **注意**


    将 Anaconda 安装到不包含空格或 Unicode 字符的目录路径。


    除非需要管理员权限，否则不要以管理员身份安装。


    ![](img/6423827abd996243bbfb7c0196b2aea4_97_0.png)


    图 2-2 目标文件夹


    -   选择是否将 Anaconda 添加到你的 PATH 环境变量。我们建议不要将 Anaconda 添加到 PATH 环境变量，因为这可能会干扰其他软件。相反，通过从“开始”菜单打开
    Anaconda Navigator 或 Anaconda Prompt 来使用 Anaconda 软件。


    ![](img/6423827abd996243bbfb7c0196b2aea4_98_0.png)


    图 2-3 安装选项


    -   选择是否将 Anaconda 注册为你的默认 Python。除非你计划安装和运行多个版本的 Anaconda 或多个版本的 Python，否则接受默认设置并保持此框选中。

    -   单击“安装”按钮。如果你想查看 Anaconda 正在安装的软件包，请单击“显示详细信息”。

    -   单击“下一步”按钮。

    -   可选：要为 Anaconda 安装 PyCharm，请单击链接 https://www.anaconda.com/pycharm。


    ![](img/6423827abd996243bbfb7c0196b2aea4_99_0.png)


    图 2-4 安装选项


    或者，要安装不带 PyCharm 的 Anaconda，请单击“下一步”按钮。

    安装成功后，你将看到“感谢安装 Anaconda”对话框：


    ![](img/6423827abd996243bbfb7c0196b2aea4_99_1.png)


    图 2-5 安装完成


    -   如果你想了解更多关于 Anaconda Cloud 以及如何开始使用 Anaconda 的信息，请勾选“了解更多关于 Anaconda Cloud”和“了解如何开始使用
    Anaconda”框。单击“完成”按钮。

    -   安装完成后，通过打开 Anaconda Navigator（Anaconda 附带的程序）来验证它：从 Windows 开始菜单中，从最近添加的项目中选择快捷方式
    Anaconda Navigator，或输入“Anaconda Navigator”。如果 Navigator 打开，则表示你已成功安装 Anaconda。如果没有，请检查你是否完成了上述每个步骤，然后参阅我们的帮助页面。


    ![](img/6423827abd996243bbfb7c0196b2aea4_100_0.png)


    图 2-6 Anaconda Navigator


    你可以探索以下链接，获取有关如何为你的操作系统安装 Anaconda 的文档。


    https://docs.anaconda.com/anaconda/install/windows/

    https://docs.anaconda.com/anaconda/install/mac-os/

    https://docs.anaconda.com/anaconda/install/linux/


    ### 2.4.4 在 macOS 上安装 Anaconda<sup>16</sup>


    你可以使用图形安装程序（“向导”）或下面的命令行（“手动”）说明来安装 Anaconda。如果不确定，请选择图形安装。


    ## macOS 图形安装


    -   下载适用于你的 Python 版本的图形 macOS 安装程序 ([https://www.anaconda.com/downloads#macos](https://www.anaconda.com/downloads#macos))。

    -   双击下载的文件并单击继续以开始安装。

    -   回答“介绍”、“自述文件”和“许可”屏幕上的提示。

    -   单击“安装”按钮，将 Anaconda 安装到你的主用户目录（推荐）：


    ![](img/6423827abd996243bbfb7c0196b2aea4_102_0.png)


