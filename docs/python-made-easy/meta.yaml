    ## 2.5 Running Python on Terminal


    Though this is the most efficient way of running any software, including Python
    on your Computer (irrespective whether Mac OS or Windows or Linux), we will only
    see this once and mastering the terminal commands are out of the scope of this
    book. Though it’s cool to master operating the computer thru terminal, the GUI
    (Graphical user interface) was developed with a purpose. So, the new users and
    those who are not so deep into computers can also use the full functionalities.
    So we will essentially see how python works in the terminal, and then move on
    to dedicated Python console (IPyhton), IDE (Integrated Development Environment-
    Spyder) or Integrated Notebook Program (Jupyter Notebook).


    The Terminal is an application that lets you run commands to explore directories,
    execute scripts, and yes, work with Python.


    A console (or ‘terminal’, or ‘command prompt’) is a textual way to interact with
    your OS, just as the ‘desktop’, in conjunction with your mouse, is the graphical
    way to interact with your system.


    **In Mac OS,** to open up Terminal, we''re going to go to our Finder, then applications.
    Go to utilities and open up Terminal. You can also do this with a shortcut by
    typing command + space, and then spelling out terminal and hitting Enter.


    **In Windows PC**, this is called command prompt (CMD).

    OR in any of the operating system, open the Anaconda command prompt. See the highlighted
    box on the left side of the picture below.


    ![](img/6423827abd996243bbfb7c0196b2aea4_107_0.png)


