    Now let’s try out a simple math problem in Python.


    **Two plus two.**


    First, we''ll try it with the way we will ask in normal English - **what is two
    plus two?**


    Let’s Ask Python.


    (I prefer if you have opened the command prompt window and working alongside.
    That way you will learn firsthand)


    You can see this message **SyntaxError: invalid syntax.**


    Recall that **syntax** refers to the rules of a programming language. Syntax errors
    happen when you write code that breaks the expected rules. In this case, we wrote
    our code in plain English. But the interpreter doesn''t understand *English*,
    it understands only *Python*. Let''s try this again.


    This time we will type **2+2** (don''t forget to press enter to run)


    And we get our answer as **4**.


    That''s because **2+2** is a valid Python expression.


