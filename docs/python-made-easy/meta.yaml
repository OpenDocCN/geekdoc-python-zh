    \ \"dataset1\"（左表）中存在的名称才会出现在结果表中。最终，这里两个数据集中的名称是相同的，但当你进行一些真实世界的数据连接，并且必须决定在公共标识符选择方面哪个表占主导地位时，这种方法特别有用。\n\
    \n## 18.8 总结：\n\n通过将输出赋值给 DataFrame 并在 [] 之间指定新列名来创建新列。操作是按元素进行的，无需遍历行。使用 **rename**\
    \ 配合字典或函数来重命名行标签或列名。聚合统计可以在整个列或行上计算。**groupby** 提供了拆分-应用-合并模式的强大功能。**value_counts**\
    \ 是计算变量每个类别中条目数量的便捷快捷方式。**sort_values** 支持按一列或多列排序。多个表可以使用 **concat** 函数按行或按列进行连接。对于类似数据库的表合并/连接，请使用\
    \ **merge** 函数。\n\n# 19\n## PYTHON 中的可视化\n\n### 19.1 可视化\n\n> \"一图胜千言\"。Robert\
    \ G Barnard\n\n对于数据科学家或任何处理数据的人来说，没有比这更好的方式来解释可视化了。一个数据集，无论大小，当用图像、图表或图形表示时，它向分析师以及任何看到它的人传达了意义。数据可视化在表示小规模和大规模数据方面都起着至关重要的作用。\n\
    \n### 19.1.1 数据可视化的重要性\n\n数据科学家的关键技能之一是讲述引人入胜故事的能力。为了首先理解数据以编写那个故事，分析师会以多种形式可视化数据，直到原始数据开始对他有意义。数据中的模式以视觉形式更好地显现出来。\n\
    \n因此，学习如何利用软件工具来可视化数据，将使你能够提取信息，更好地理解数据，并做出更有效的决策。\n\nPython 为任何人和每个人提供了丰富而庞大的资源来可视化数据。有许多库允许并协助制作和呈现各种图像和图表。我们将在本章中介绍一些最重要的库，但首先我们将了解数据可视化的基础知识。\n\
    \n### 19.1.2 基础可视化\n\n本章使用的数据是关于 NO2 的空气质量数据，由 openaq 提供，并使用 py-openaq 包。\"air_quality_no2.csv\"\
    \ 数据集提供了位于巴黎、安特卫普和伦敦的测量站 FR04014、BETR801 和 London Westminster 的 NO2 值。\n\n这是用于教授数据操作和数据科学基础知识的最常用数据集之一。\n\
    \n你可以从下面的链接下载它：\n\nhttps://github.com/nilabhnishchhal/Python-Made-Easy/blob/master/air_quality_no2.csv\n\
    \n这是一个 Github 仓库链接。当你打开它时，你会看到 \"raw\" 标签页。右键单击该标签页，使用 \"Save link as..\" 选项。将文件保存到你机器的基础文件夹中，并将文件扩展名更改为\
    \ .csv。\n\n现在你的机器基础文件夹中就有了 \"air_quality_no2.csv\" 数据集。让我们开始处理它。\n\n让我们首先使用 pandas\
    \ 在 python 中读取数据，并使用 Matplotlib 创建绘图。因此，按照惯例，我们将在开始时导入所有依赖项。\n\n```\nIn [1]: import\
    \ pandas as pd\n        import matplotlib.pyplot as plt\n        %matplotlib inline\n\
    ```\n\n> 注意：%matplotlib inline 是一个魔法命令，它告诉 Jupyter notebook 在 notebook 本身中渲染绘图和图像。"
