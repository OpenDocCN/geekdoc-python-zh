    ### 2.9.2 Web 应用程序的主要功能


    在浏览器中编辑代码，具有自动语法高亮、缩进和制表符补全/自省功能。能够从浏览器执行代码，计算结果附加到生成它们的代码上。使用丰富媒体表示（如 HTML、LaTeX、PNG、SVG
    等）显示计算结果。例如，可以内联包含由 Matplotlib 库渲染的出版级图表。使用 Markdown 标记语言在浏览器中编辑富文本，可以为代码提供注释，不限于纯文本。能够轻松地在
    markdown 单元格中使用 LaTeX 包含数学符号，并由 MathJax 原生渲染。


    ### 2.9.3 Notebook 文档


    Notebook 文档包含交互式会话的输入和输出，以及伴随代码但不打算执行的附加文本。通过这种方式，notebook 文件可以作为会话的完整计算记录，将可执行代码与解释性文本、数学和结果对象的丰富表示交织在一起。这些文档内部是
    JSON 文件，并以 **.ipynb** 扩展名保存。由于 JSON 是纯文本格式，它们可以进行版本控制并与同事共享。


    Notebook 可以通过 nbconvert 命令导出为多种静态格式，包括 HTML（例如，用于博客文章）、restructured Text、LaTeX、PDF
    和幻灯片。


    此外，任何可从公共 URL 获取的 **.ipynb** notebook 文档都可以通过 Jupyter Notebook Viewer (nbviewer)
    共享。此服务从 URL 加载 notebook 文档并将其渲染为静态网页。因此，结果可以与同事共享，或作为公共博客文章发布，而其他用户无需自己安装 Jupyter
    notebook。实际上，nbviewer 只是作为 Web 服务的 nbconvert，因此你可以使用 nbconvert 进行自己的静态转换，而不依赖于
    nbviewer。


