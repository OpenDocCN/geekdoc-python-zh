- md: "## Real-life Example of an algorithm\n\nWrite an algorithm on how to make tea.\
    \ Ingredients are water, sugar, milk, and tea leaves to make two cups of tea.\n\
    \n- Step 1: Start\n- Step 2: Take a pan with one cup of water in it.\n- Step 3:\
    \ Light the burner and put the pan on it.\n- Step 4: Bring the water to a boil.\n\
    - Step 5: Add two tablespoon sugar and two tablespoon Tea leaves in the boiling\
    \ water.\n- Step 6: Add one cup of milk to the boiling mixture.\n- Step 7: Boil\
    \ the contents in the pan for one minute.\n- Step 8: Switch off the burner.\n\
    - Step 9: Filter the tea leaves from tea using a sieve.\n- Step 10: Pour the tea\
    \ in cups and serve it.\n- Step 11: Stop\n\n## Computation Example of an algorithm\n\
    \nWrite an algorithm of how to sum 2+2 to give 4 as result.\n\n- Step 1: Start\n\
    - Step 2: Type 2 + 2\n- Step 3: Press Enter\n- Step 4: Stop\n\nThe algorithm is\
    \ made of 3 kinds of statements. Any combination of these 3 kinds can be present\
    \ in an algorithm.\n\n1. Sequence Statements\n2. Selection Statements\n3. Looping\
    \ or Iterating Statements\n\n### 1.3.2.1 Sequence Statements\n\nIn these Programs,\
    \ one statement is executed after another, sequentially.\n\nThe above two examples,\
    \ making the tea and calculating 2+2, both are examples of Sequence statements.\
    \ Let’s take on more examples.\n\n**Example** Calculate the age of a person given\
    \ his year of birth.\n\n- Step 1: Start\n- Step 2: Take the year of birth and\
    \ Store in YOB.\n- Step 3: Take the current year and store it in CY.\n- Step 4:\
    \ Subtract YOB from CY and save in Age.\n- Step 5: Print Age.\n- Step 6: Stop\n\
    \n### 1.3.2.2 Selection Statements\n\nIn these Programs, some part of the program\
    \ is executed based on a certain condition being fulfilled or not. If the condition\
    \ is fulfilled, the computer will execute one part of the program, and if the\
    \ condition is not fulfilled, the other part of the program is executed.\n\n**Example**\
    \ Write an algorithm to check if a person has a fever or not. Condition is, its\
    \ fever if the temperature is above 99 Degree Fahrenheit.\n\n- Step 1: Start\n\
    - Step 2: Take the temperature and Store in TEMP.\n- Step 3: Check the TEMP value.\
    \ If it’s more than 99 Degree Fahrenheit, then go to step 4, otherwise, go to\
    \ Step 5.\n- Step 4: Print \"He has Fever\" and go to step 6.\n- Step 5: Print\
    \ \"He does not have Fever\".\n- Step 6: Stop\n\n### 1.3.2.3 Looping or Iterating\
    \ Statements\n\nIn some programs, certain steps are executed again and again,\
    \ based on a conditional test. These repetitions are called iterations. The iteration\
    \ is done using one or more looping techniques. Hence this kind of program is\
    \ called Looping or Iterating statements.\n\n**Example** Print all the numbers\
    \ from 1 to 10.\n\n- Step 1: Start\n- Step 2: Store 1 in i.\n- Step 3: Check if\
    \ value of i <= 10. If yes, go to step 4. If False, go to step 7.\n- Step 4: Print\
    \ i.\n- Step 5: Increase the value of i by 1.\n- Step 6: Go to Step 3.\n- Step\
    \ 7: Stop\n\nIn this example, Steps 3 to 5 are iterated until the condition in\
    \ step 3 is fulfilled. Once it returns false, the loop ends.\n\n### 1.3.3 Flowchart\n\
    \nThe algorithms can be written in graphical form, using some symbols. This graphical\
    \ representation is known as a flowchart.\n\nFlowcharts have some standard symbols\
    \ for representation of functions. The same are tabulated below.\n\n| Symbols\
    \ | Functions |\n| :---: | :---: |\n| (Oval) | Start/stop |\n| (Parallelogram)\
    \ | Input/output |\n| (Rectangle) | Processing |\n| (Diamond) | Decision Box |\n\
    | (Arrow) | Flow of Control |\n| (Circle) | Connector |\n\n## Figure 1-4 Flowchart\
    \ Symbols\n\nLet us see an example of a flowchart.\n\n**Example** Write the program\
    \ to check if a number is even number or odd number.\n\n![](img/6423827abd996243bbfb7c0196b2aea4_59_0.png)\n\
    \n## Figure 1-5 Even Odd Number selection flowchart\n\nWe talked about programming\
    \ languages a bit in the data science introduction. Let’s now understand what\
