- md: '## 1.1.3 History of Data Science


    Data science in its present avatar is old wine in a new bottle. Or saying old
    *Jinn* in a new bottle may be more apt.


    The collection of data and drawing a meaningful conclusion from it is not a recent
    phenomenon. If we look at the real sense of it, the collection of data happened
    since prehistoric times. The numbers used by the original herders, who needed
    to count their cattle. Those were the first data sets. The form might have been
    different, so would be scale, but they would have made decisions of life and death
    based on these data.


    | Animal | Count |

    | :--- | :--- |

    | Sheep | **23** |

    | Cows | **11** |

    | Goats | **31** |


    ## 1.1.4 Ancient History of Data¹


    ### C 18,000 BCE


    The earliest of human storing and analyzing data dates back to C 18,000 BCE. The
    Ishango Bone was discovered in 1960 in what is now Uganda and is thought to be
    one of the earliest pieces of evidence of prehistoric data storage. Paleolithic
    tribespeople would mark notches into sticks or bones, to keep track of trading
    activity or supplies. They would compare sticks and notches to carry out rudimentary
    calculations, enabling them to make predictions such as how long their food supplies
    would last.


    ### C 2400 BCE


    The abacus – the first dedicated device constructed specifically for performing
    calculations – comes into use in Babylon. The first libraries also appeared around
    this time, representing our first attempts at mass data storage.


    ## 1.1.5 Modern History of Data²


    ### The Emergence of Statistics


    #### 1663


    In London, John Graunt carries out the first recorded experiment in statistical
    data analysis. By recording information about mortality, he theorized that he
    can design an early warning system for the bubonic plague ravaging Europe.


    #### 1865


    The term “**business intelligence**” is used by Richard Millar Devens in his Encyclopedia
    of Commercial and Business Anecdotes, describing how the banker Henry Furnese
    achieved an advantage over competitors by collecting and analyzing information
    relevant to his business activities in a structured manner. This is thought to
    be the first study of a business putting data analysis to use for commercial purposes.


    #### 1880


    The US Census Bureau has a problem – it estimates that it will take it 8 years
    to crunch all the data collected in the 1880 census, and it is predicted that
    the data generated by the 1890 census will take over 10 years, meaning it will
    not even be ready to look at until it is outdated by the 1900 census. In 1881
    a young engineer employed by the bureau – Herman Hollerith – produces what will
    become known as the Hollerith Tabulating Machine. Using punch cards, he reduces
    10 years’ work to three months and achieves his place in history as the father
    of modern automated computation. The company he founds will go on to become known
    as IBM.


    ### The Early Days of Modern Data Storage


    #### 1926


    Interviewed by Colliers magazine, inventor Nikola Tesla states that when wireless
    technology is “perfectly applied the whole Earth will be converted into a huge
    brain, which in fact it is, all things being particles of a real and rhythmic
    whole ... and the instruments through which we shall be able to do this will be
    amazingly simple compared to our present telephone. A man will be able to carry
    one in his vest pocket.”


    #### 1928


    Fritz Pfleumer, a German-Austrian engineer, invents a method of storing information
    magnetically on tape. The principles he develops are still in use today, with
    the vast majority of digital data being stored magnetically on computer hard disks.


    ### The Start of Large Data Centers


    #### 1965


    The US Government plans the world’s first data center to store 742 million tax
    returns and 175 million sets of fingerprints on magnetic tape.


    ### The Emergence of the Internet


    #### 1991


    Computer scientist Tim Berners-Lee announced the birth of what would become the
    Internet as we know it today.


    #### 1997


    Google Search debuts and for the next 20 years, its name became shorthand for
    searching the internet for data.


    The same year, the journal Data Mining and Knowledge Discovery is launched; the
    reversal of the order of the two terms in its title reflecting the ascendance
    of “data mining” as the more popular way to designate “extracting information
    from large databases.”


    #### 2000


    Python 2.0 was released on 16 October 2000 with many major new features, including
    a cycle-detecting garbage collector and support for Unicode.


    #### 2010


    Eric Schmidt, executive chairman of Google, tells a conference that as much data
    is now being created every two days, as was created from the beginning of human
    civilization to the year 2003.


    #### 2011


    The McKinsey report states that by 2018 the US will face a shortfall of between
    140,000 and 190,000 professional data scientists, and states that issues including
    privacy, security, and intellectual property will have to be resolved before the
    full value of Big Data will be realized.


    #### 2012


    September 2012 Tom Davenport and D.J. Patil publish “Data Scientist: The Sexiest
    Job of the 21st Century” in the Harvard Business Review.


    #### 2014


    The rise of mobile machines – as for the first time, more people are using mobile
    devices to access digital data, than office or home computers. 88% of business
    executives surveyed by GE working with Accenture report that big data analytics
    is a top priority for their business.


    ## 1.1.6 Present and Future of Data Science


    - Artificial Intelligence is the realm focusing on the creation of intelligent
    machines that work and react like humans. AI as a study dates back to 1936 when
    Alan Turing build first AI-powered machines. Despite quite a long history, today
    AI in most areas is not yet able to completely replace a human. And the competition
    of AI with humans in chess, and data encryption are two sides of the same coin.

    - Machine learning is a creating tool for extracting knowledge from data. In ML
    models can be trained on data independently or in stages: training with a teacher,
    which is, having human-prepared data or training without a teacher, working with
    spontaneous, noisy data.

    - Deep learning is the creation of multi-layer neural networks in areas where
    more advanced or fast analysis is needed and traditional machine learning cannot
    cope. “Depth” provides more than one hidden layer of neurons in the network that
    conducts mathematical calculations.

    - Big Data — work with huge amounts of often unstructured data. The specifics
    of the sphere are tools and systems capable of withstanding high loads.


    ## 1.1.7 What does a Data Scientist do?


    A data scientist analyzes business data to extract meaningful insights. In other
    words, a data scientist solves business problems through a series of steps, including:


    - Ask the right questions to understand the problem

    - Gather data from multiple sources — enterprise data, public data, etc.

    - Process raw data and convert it into a format suitable for analysis

    - Feed the data into the analytic system — ML algorithm or a statistical model

    - Prepare the results and insights to share with the appropriate stakeholders


    These lead him to answer many compelling questions, some examples are as below:


    - Fraud Detection and detection of anomalies. E.g. change in patterns of withdrawal
    or expenditure of a customer credit card.

    - Targeted and personalized marketing — personal e-mail newsletters, recommendation
    systems on e-commerce websites.

    - Metric forecasts — performance indicators, quality of advertising campaigns,
    and other activities.

    - Decision-making scoring — process large amounts of data and help to make a decision,
    for example, on granting a loan based on credit scores.

    - Predictive modeling - Prediction of a meteorite colliding with earth, based
    on astronomical data.


    These are only a few of the various things a data scientist does.


    ## 1.1.8 How does he do it?


    We will learn that in the due course of this book, step by step. But the same
    is summarized in the diagram below.'
  mdcn: '## 1.1.3 数据科学的历史


    当今的数据科学，不过是旧瓶装新酒。或者说，用“旧精灵装新瓶”来比喻可能更为贴切。


    数据的收集并从中得出有意义的结论，并非近期才出现的现象。从其真正意义上看，数据的收集自史前时代就已开始。最早的牧民需要清点他们的牲畜，所使用的数字便是最早的数据集。形式可能不同，规模也各异，但他们正是基于这些数据做出关乎生死的决定。


    | 动物 | 数量 |

    | :--- | :--- |

    | 绵羊 | **23** |

    | 牛 | **11** |

    | 山羊 | **31** |


    ## 1.1.4 数据的古代史¹


    ### 约公元前18,000年


    人类存储和分析数据的最早实践可追溯至约公元前18,000年。1960年在现今乌干达地区发现的伊尚戈骨，被认为是史前数据存储的最早证据之一。旧石器时代的部落居民会在木棍或骨头上刻下刻痕，以记录交易活动或物资储备。他们会比较木棍和刻痕来进行基础计算，从而做出预测，例如他们的食物储备还能维持多久。


    ### 约公元前2400年


    算盘——第一种专门为执行计算而制造的专用工具——开始在巴比伦使用。第一批图书馆也大约在此时出现，代表了我们对大规模数据存储的首次尝试。


    ## 1.1.5 数据的近代史²


    ### 统计学的兴起


    #### 1663年


    在伦敦，约翰·格朗特进行了有记录的首次统计数据分析实验。通过记录死亡率信息，他提出理论，认为可以设计一个早期预警系统来应对当时肆虐欧洲的腺鼠疫。


    #### 1865年


    理查德·米勒·德文斯在其《商业与商业轶事百科全书》中首次使用了“**商业智能**”一词，描述了银行家亨利·弗内斯如何通过以结构化方式收集和分析与其商业活动相关的信息，从而获得竞争优势。这被认为是企业将数据分析用于商业目的的首个研究案例。


    #### 1880年


    美国人口普查局遇到了一个问题——据估计，处理1880年人口普查收集的所有数据需要8年时间，而预计1890年人口普查产生的数据将需要超过10年，这意味着在1900年人口普查使其过时之前，这些数据甚至还没来得及查看。1881年，该局的一位年轻工程师——赫尔曼·霍尔瑞斯——发明了后来被称为霍尔瑞斯制表机的设备。利用穿孔卡片，他将10年的工作量缩短至三个月，并因此确立了其作为现代自动计算之父的历史地位。他创立的公司后来成为了IBM。


    ### 现代数据存储的早期


    #### 1926年


    在接受《科利尔》杂志采访时，发明家尼古拉·特斯拉表示，当无线电技术“被完美应用时，整个地球将被改造成一个巨大的大脑，事实上它本就是，万物都是一个真实且有节奏的整体的组成部分……而我们将能够实现这一点的工具，与我们现有的电话相比，将简单得惊人。一个人将能够把它装在马甲口袋里随身携带。”


    #### 1928年


    德裔奥地利工程师弗里茨·普弗莱默发明了一种将信息磁性存储在磁带上的方法。他所开发的原理至今仍在使用，绝大多数数字数据都以磁性方式存储在计算机硬盘上。


    ### 大型数据中心的开端


    #### 1965年


    美国政府规划了世界上第一个数据中心，用于在磁带上存储7.42亿份纳税申报单和1.75亿套指纹。


    ### 互联网的出现


    #### 1991年


    计算机科学家蒂姆·伯纳斯-李宣布了后来成为我们今天所知的互联网的诞生。


    #### 1997年


    谷歌搜索首次亮相，在接下来的20年里，其名称成为在互联网上搜索数据的代名词。


    同年，《数据挖掘与知识发现》期刊创刊；其标题中两个术语顺序的颠倒，反映了“数据挖掘”作为指代“从大型数据库中提取信息”这一更流行方式的崛起。


    #### 2000年


    Python 2.0于2000年10月16日发布，带来了许多重要的新特性，包括循环检测垃圾回收器和对Unicode的支持。


    #### 2010年


    谷歌执行董事长埃里克·施密特在一次会议上表示，如今每两天产生的数据量，相当于从人类文明开始到2003年所产生的数据总量。


    #### 2011年


    麦肯锡报告指出，到2018年，美国将面临14万至19万专业数据科学家的短缺，并指出在充分实现大数据价值之前，必须解决包括隐私、安全和知识产权在内的问题。


    #### 2012年


    2012年9月，汤姆·达文波特和D.J.·帕蒂尔在《哈佛商业评论》上发表了《数据科学家：21世纪最性感的职业》一文。


    #### 2014年


    移动设备的兴起——首次出现使用移动设备访问数字数据的人数超过使用办公室或家用电脑的人数。通用电气与埃森哲合作调查的88%的企业高管表示，大数据分析是他们业务的首要任务。


    ## 1.1.6 数据科学的现在与未来


    - 人工智能是专注于创造能够像人类一样工作和反应的智能机器的领域。作为一门学科，人工智能的研究可追溯至1936年艾伦·图灵制造出第一台人工智能驱动的机器。尽管历史相当悠久，但如今人工智能在大多数领域仍无法完全替代人类。人工智能与人类在国际象棋和数据加密方面的竞争，是同一枚硬币的两面。

    - 机器学习是从数据中提取知识的创造工具。在机器学习中，模型可以独立或分阶段地在数据上进行训练：有教师训练，即使用人类准备的数据；或无教师训练，即处理自发、带噪声的数据。

    - 深度学习是在需要更高级或快速分析、而传统机器学习无法应对的领域中，创建多层神经网络。“深度”意味着网络中存在不止一个隐藏神经元层来进行数学计算。

    - 大数据——处理海量的、通常是结构化程度不高的数据。该领域的特点是拥有能够承受高负载的工具和系统。


    ## 1.1.7 数据科学家做什么？


    数据科学家分析业务数据以提取有意义的见解。换句话说，数据科学家通过一系列步骤来解决业务问题，包括：


    - 提出正确的问题以理解问题

    - 从多个来源收集数据——企业数据、公共数据等

    - 处理原始数据并将其转换为适合分析的格式

    - 将数据输入分析系统——机器学习算法或统计模型

    - 准备结果和见解，以便与相关利益相关者分享


    这些步骤引导他回答许多引人入胜的问题，以下是一些例子：


    - 欺诈检测和异常检测。例如，客户信用卡的取款或消费模式发生变化。

    - 定向和个性化营销——个人电子邮件通讯、电子商务网站上的推荐系统。

    - 指标预测——绩效指标、广告活动质量及其他活动。

    - 决策评分——处理大量数据并帮助做出决策，例如，根据信用评分决定是否批准贷款。

    - 预测建模——基于天文数据预测陨石撞击地球。


    这些只是数据科学家所做工作的冰山一角。


    ## 1.1.8 他是如何做到的？


    我们将在本书的后续章节中逐步学习。但下图对其进行了总结。'
