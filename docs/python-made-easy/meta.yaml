    现在我们有了两个 DataFrame 集，每个都有 891 行，并且每个都包含一个公共标识符列。当我们合并这两个 DataFrame 时，Pandas 会读取两个\
    \ DataFrame 中的公共标识符，并相应地连接行。我们使用 **pd.merge()** 函数来执行此操作。\n\n```\nIn [27]: merged_dataset\
