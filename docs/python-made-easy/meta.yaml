    # 20.6 Pyplot<sup>90</sup>


    **matplotlib.pyplot** is a collection of command style functions that make matplotlib
    work like MATLAB. Each **pyplot** function makes some change to a figure: e.g.,
    creates a figure, creates a plotting area in a figure, plots some lines in a plotting
    area, decorates the plot with labels, etc.


    In **matplotlib.pyplot** various states are preserved across function calls so
    that it keeps track of things like the current figure and plotting area, and the
    plotting functions are directed to the current axes (please note that "axes" here
    and in most places in the documentation refers to the axes part of a figure and
    not the strict mathematical term for more than one axis).'
