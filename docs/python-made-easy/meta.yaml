  md: "Matplotlib is a library for making 2D plots of arrays in Python. Although it\
    \ has its origins in emulating the MATLAB graphics commands, it is independent\
    \ of MATLAB and can be used in a Pythonic, object-oriented way. Although Matplotlib\
    \ is written primarily in pure Python, it makes heavy use of NumPy and other extension\
    \ code to provide good performance even for large arrays.\n\nMatplotlib is designed\
    \ with the philosophy that you should be able to create simple plots with just\
    \ a few commands, or just one! If you want to see a histogram of your data, you\
    \ shouldn't need to instantiate objects, call methods, set properties, and so\
    \ on; it should just work.\n\n+   - The Matplotlib code is conceptually divided\
    \ into three parts: **The pylab interface** is the set of functions provided by\
    \ matplotlib.pylab which allows the user to create plots with code quite similar\
    \ to MATLAB figure generating code.\n  - **The Matplotlib frontend or Matplotlib\
    \ API** is the set of classes that do the heavy lifting, creating and managing\
    \ figures, text, lines, plots, and so on. This is an abstract interface that knows\
    \ nothing about output.\n  - **The backends** are device-dependent drawing devices,\
    \ aka renderers, that transform the frontend representation to hardcopy or a display\
    \ device.\n- **Matplotlib's original logo (2003 -- 2008).**\n\n![](img/6423827abd996243bbfb7c0196b2aea4_573_0.png)\n\
