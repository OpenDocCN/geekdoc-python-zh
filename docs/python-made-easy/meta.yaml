    NameError: name ''fibo'' is not defined

    ```


    如你所见，没有内置函数 "fib" 可用。现在我们将调用我们刚刚创建的模块。


    要调用该模块，我们需要导入它。现在进入 Python 解释器并使用以下命令导入此模块：


    ```

    In [3]:    import fibo

    ```


    这不会将 **fibo** 中定义的函数名称直接放入当前符号表；它只将模块名 *fibo* 放入其中。使用模块名，你可以访问这些函数：


