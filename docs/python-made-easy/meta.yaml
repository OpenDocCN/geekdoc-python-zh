    ## 2.1.4 Philosophy of Python


    The language''s core philosophy is summarized in the document The *Zen of Python
    (PEP 20)*<sup>8</sup>, which includes aphorisms such as:


    - Beautiful is better than ugly

    - Explicit is better than implicit

    - Simple is better than complex

    - Complex is better than complicated

    - Readability counts


    ## 2.2 Advantage of Python over other languages


    ### 2.2.1 Simple


    Python is as simple as "Disciplined English". What I mean here is, it''s not like
    an alien language, which a normal person cannot understand.


    But at the same time, some discipline is required. Reading a python code feels
    like reading English. Simplicity is one of the core strengths of Python. Hence,
    it allows us to focus more on the solution, rather than the syntax of the coding
    language. It is not something to cheer about?


    ### 2.2.2 Easy to learn


    As you will see further in the book, Python is an extremely easy language to get
    started with. Its syntax is extremely simple.


    ### 2.2.3 Free and Open Source


    Python is FREE. As we will see in the next few pages, where we download and install
    Python, it’s Completely Free. There are no hidden charges for usage or distribution
    of your work.


    Python is a case of a FLOSS (Free/Libré and Open Source Software). In basic terms,
    you can openly circulate duplicates of this product, read its source code, make
    changes to it, and use bits of it in new free projects. FLOSS depends on the idea
    of a network that shares information. This is one reason why Python is so acceptable
    - it has been made and is continually improved by a network that simply needs
    to see a superior Python.


    ### 2.2.4 High-Level Language


    A high-level programing language is one, in which you need not worry about many
    details, which you need when using a low-level programming language. For example,
    in Python, you need not worry about low-level details such as managing the memory
    used by your program. In simple terms, Low-Level languages are closer to the hardware
    than are high-level programming languages, which are closer to human languages.


    ### 2.2.5 Portable


    Portable means, Python can be used on different kinds of machines, independent
    of hardware or operating system constraints. Due to its Open Source nature, it
    has been ported to many platforms. Python can be used on Windows, GNU/Linux, Macintosh,
    Solaris, Palm OS, PlayStation, Sharp Zaurus, Windows CE, and PocketPC!


    ### 2.2.6 Interpreted


    When you write a program in a language like C or C++, it is converted from the
    source language i.e. C or C++ code is converted to Binary codes (0s and 1s), because
    that is the language computer understands. This process is done using a compiler.
    When the program is run, the linker/loader software copies the program to memory
    and starts running it.


    Python, on the other hand, doesn''t need the compilation to Binary. The program
    is run directly from the source code. Inside, Python changes over the source code
    into an intermediate form called bytecodes and afterward translates this into
    the native language of the computer and then runs it.


    How does this help you?


    - No need to worry about compiling the program.

    - No need to worry if the proper libraries are linked and loaded or not.

    - This makes the Python Programs much more portable i.e. simply copying the program
    on another computer works seamlessly.


    Being the quickest developing programming language in 2020, there is no shortage
    of interpreters for Python. Let’s get a quick understanding of an interpreter.


    ### 2.2.7 Python Interpreter


    #### What is an Interpreter?


    By definition, an interpreter is a type of computer program that directly executes
    the instructions written in some programming or scripting language. By direct
    execution, we mean that it doesn''t require the instructions to be compiled into
    a machine language program first.


    Let’s move on to the brief summary of 7 of the most popular Python interpreters:


    #### 2.2.7.1 IPython


    ![](img/6423827abd996243bbfb7c0196b2aea4_82_0.png)


    When you install Python directly, the default interpreter also gets installed.
    You can start the default interpreter by typing “python” in your computer’s terminal.
    When the interpreter loads, Python codes can be run using the interpreter in the
    terminal. Although this is the default, the Python interpreter has its limitations.
    For example, the Python interpreter does not provide proper indentation, syntax
    highlighting, tab completion, and much more which other interpreters provide.


    IPython is an alternative Python interpreter. This is an interactive shell that
    is used for computing in Python. It has many more useful features over the default
    Python interpreter.


    Later in this chapter, you are going to learn how to install Python using Anaconda
    distribution, in the step by step guide. There we will be installing IPython using
    the Python Anaconda distribution. When we will install Python via Anaconda, IPython
    will automatically be installed.


    Ipython comes with Jupyter Notebook, which is the most commonly used tool for
    Python programming beginners.


    #### 2.2.7.2 CPython


    ![](img/6423827abd996243bbfb7c0196b2aea4_83_0.png)


    Supports – Up to Python 3.7


    It is the default and most widely-used implementation of the Python programming
    language. Written in C and Python, CPython is an interpreter that offers a foreign
    function interface with C and other programming languages.


    CPython can also be classified as a compiler because it converts the Python code
    into bytecode before interpreting the same. It uses a GIL, Global Interpreter
    Lock, which can pose a limitation as it disables the concurrent Python threads
    for a process.


    As the reference implementation of Python, CPython offers the most compatibility
    with Python packages and C extension modules. As such, all versions of the Python
    programming language are implemented in C.


    CPython is the only option for using Python packages that rely on C extensions
    to function properly. Targeting CPython is a must if one wishes to reach the widest
    possible audience for a program developed in the Python programming language.


    #### 2.2.7.3 IronPython


    ![](img/6423827abd996243bbfb7c0196b2aea4_84_0.png)


    Supports – Up to Python 2.7


    An implementation of the Python programming language for the .NET framework, IronPython
    uses both Python and .NET framework libraries. It can also expose Python code
    to other languages pertaining to the .NET framework.


    IronPython provides support for dynamic compilation and comes with an interactive
    console. Using the Python interpreter allows *Python scripts* to interact with
    .NET objects. With the Python Tools for Visual Studio, IronPython comes directly
    integrated into the Visual Studio IDE.


    #### 2.2.7.4 Jython'
