    | Operator | Description |

    | :--- | :--- |

    | `<<`, `>>` | Shifts |

    | `+`, `-` | Addition and subtraction |

    | `*`, `@`, `/`, `//`, `%` | Multiplication, matrix multiplication, division,
    floor division, remainder |

    | `+x`, `-x`, `~x` | Positive, negative, bitwise NOT |

    | `**` | Exponentiation |

    | `await x` | Await expression |

    | `x[index]`, `x[index:index]`, `x(arguments...)`, `x.attribute` | Subscription,
    slicing, call, attribute reference |

    | `(expressions...)`, `[expressions...]`, `{key: value...}`, `{expressions...}`
    | Binding or tuple display, list display, dictionary display, set display |


    # 4.9.1 Changing the Order of Evaluation


    To make the expressions more readable, we shall use parentheses. For example,
    `2 + (3 * 4)` is definitely easier to understand than `2 + 3 * 4` which requires
    knowledge of the operator precedence. As with everything else, the parentheses
    should be used reasonably (do not overdo it) and should not be redundant, as in
    `(2 + (3 * 4))`.


    Using parentheses gives an additional advantage - it helps us to change the order
    of evaluation. For example, if you want an addition to be evaluated before multiplication
    in an expression, then you can write it like `(2 + 3) * 4`.


    # 4.9.2 Associativity'
  - '[PAGE 199]


    Operators are usually associated from left to right. This means that operators
    with the same precedence are evaluated in a left to right manner. For example,
    2 + 3 + 4 is evaluated as (2 + 3) + 4.


    # 4.9.3 Area of Rectangle


    Let us write our first code, to understand all the concepts we understood till
    now. This will also alienate any fear, whatsoever you have, till now, for how
    easy it''s to write a code in Python. As I said earlier, it''s as easy as writing
    a statement in English, with some discipline.


    ```

    In [28]: # Area of a Rectangle


    Length = 5


    Breadth = 8


    Area = Length * Breadth print("Area of the Rectangle is", Area)


    print("perimeter of the rectangle is", 2* (Length + Breadth))

    ```


    Area of the Rectangle is 40

    perimeter of the rectangle is 26


    Let us decode this small code we just wrote.

    The length and breadth of the rectangle are stored in variables by the same name.
    But there is a **catch**. **length** is not the same as **Length**.

    Always remember, Python is Case Sensitive. Hence, the **length** is different
    from **Length** which in turn is different from **LENGTH**.'
