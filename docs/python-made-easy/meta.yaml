- md: '## 4.3 Objects


    Most simplistically, the following statement summarizes what we do in Python.


    **We perform operations on Objects.**


    Examples of simple operations are addition, Multiplication of numbers (Objects),
    or Concatenation of strings (Objects).


    In Python, data takes the form of **Objects**. The objects can be either built-in
    objects that Python provides or objects that we create using Python Classes.


    Understanding what an Object is, for now, let''s understand that "it''s just a
    piece of memory", with values and set of operations attached to it. We will come
    to the formal definition later on in the chapter.


    As we will see, everything in Python is an **Object**. Be it the simple numbers,
    or the Operations being performed on them. For the Python Script, they all are
    Objects. Now, recall, Python is also an OOP or Object-Oriented Programming.


    An important characteristic of the Python language is that its object model is
    very consistent. Every data structure, number, string, class, function, module,
    etc exist in the Python interpreter in their own respective "container" which
    is referred to as a Python object. Each object has an associated type (e.g., integer,
    string, etc.) and internal data.


    In practice, this makes the language very flexible, as even functions can be treated
    like any other object.


    ### 4.3.1 Classification of Objects


    - 1. Built-in Objects

    - 2. User-defined Objects


    They can also be classified as


    - 1. Mutable Object

    - 2. Immutable Objects


    The below table shows the Built-in Objects, their examples, and whether they are
    Mutable or Immutable.


    | Object type | Examples | Mutable or Immutable? |

    | :--- | :--- | :--- |

    | **Numbers** | 1234, 3.1415, 3+4j, 0b111, Decimal(), Fraction() | **Immutable**
    |

    | **Strings** | ''nilabh'', "Bob''s" | **Immutable** |

    | **Lists** | [1,[2,''three''],4.5], list(range(10)) | **Mutable** |

    | **Dictionaries** | {''food'':''spam'',''taste'':''yum''}, dict(hours=10) | **Mutable**
    |

    | **Tuples** | (1,''spam'',4,''U''), tuple(''spam'') | **Immutable** |

    | **Sets** | set(''abc''), {''a'',''b'',''c''} | **Mutable** |

    | **Boolean** | 0, 1 | **Immutable** |

    | **Program unit types** | Functions, modules, classes | |


    ### 4.3.2 Advantages of Built-in Objects


    The built-in objects make one very important aspect of Python being a "High-Level
    Language". In low-level languages, like C or C++, most of the work goes into *implementing
    Objects* or creating Data Structures. There, the programmer needs to define an
    Object type, lay out memory structure, and manage memory allocations, and so on.
    These tedious and error-prone jobs take the focus away from the real thing, **Problem-solving**.


    In most of the Python Programs, all this hard, tedious, and repetitive work is
    done away with. Because, Python provides Powerful object types as built in the
    language, that most of the time, there is no need to code object implementation
    before Problem-solving.


    Let me give a real-life analogy to make this point easier to understand.


    When making a Bridge, there are two approaches. One is, make everything from the
    scratch, every time i.e. every pillar is cast, the slabs on the pillars cast one
    by one, making it tedious and time taking. This is the approach of Low-Level Languages.
    Building everything from Scratch.


    ![](img/6423827abd996243bbfb7c0196b2aea4_173_0.png)


    Figure 4-1 Bridge-Built-from-Scratch


    ![](img/6423827abd996243bbfb7c0196b2aea4_174_0.png)


    Figure 4-2 Bridge-Built-joining-OBJECTS


    The second approach is, using Pre-Cast Materials. Here, the pillars, the slabs,
    and all other structural things are precast. They are just brought to the place
    where the bridge is being built and joined together. This is a non-tedious, Time
    effective, and less error-prone approach. This is the approach Python takes. The
    objects here, are pre-cast. They are defined already and the user needs not to
    create all the objects he needs from scratch. This saves a lot of time, effort,
    and reduces error.


    Unless there is a need for special processing that built-in types don''t provide,
    it is almost always better off using a built-in object instead of implementing
    your own. Here are some reasons why:


    - 1. Built-in objects make programs easy to write.

    - 2. Built-in objects are components of extensions.

    - 3. Built-in objects are often more efficient than custom data structures.

    - 4. Built-in objects are a standard part of the language.


    In other words, not only do built-in object types make programming easier, but
    they''re also more powerful and efficient than most of what can be created from
    scratch. Regardless of whether you implement new object types, built-in objects
    form the core of every Python program.


    ### 4.3.3 Object''s Identity, values, and types


    Objects are Python''s abstraction for data. Any data in a Python program is represented
    either by objects or by relations between objects.


    You may think of an Object, as a combination of 3 things.


    - Identity

    - Type

    - Value


    Every object has an identity, a type, and a value.


    An object''s identity never changes once it has been created. That becomes the
    object''s **address in memory**. In Python, every Object''s Identity (or Address
    in memory) is represented by a number. You can see that number by using the **id()**
    function.


    ```

    In [5]: a = 5 # a is a variable, which is assigned value 5. Here "a = 5" is the
    object.


    id(a) # The number which comes as output represents the "Address in Memory" or
    the Identity of the Object.


    Out[5]: 140703750332944

    ```


    An object''s type determines the operations that the object supports and also
    defines the possible values for objects of that type. The **type()** function
    returns an object''s type. Like its identity, an object''s **type** is also unchangeable.


    Let us see some examples of "type of Objects" we saw in the table above. We will
    learn more about these distinct types of objects in later chapters.


    ```

    In [6]: type(a) # a is assigned 5, which is an Integer. So, the type of object
    is "int"

    ```


    ```

    Out[6]: int

    ```


    ```

    In [7]: type(''nilabh'') # str means String.

    ```


    ```

    Out[7]: str

    ```


    ```

    In [8]: type(3.5)

    ```


    ```

    Out[8]: float

    ```


    ```

    In [9]: type([''x'',''yz'',''abc'']) # list containing 3 strings

    ```


    ```

    Out[9]: list

    ```


    ```

    In [10]: type([''x'',''y'', 1 ]) # list containing 2 strings and one number

    ```


    ```

    Out[10]: list

    ```


    ```

    In [11]: type({''food'':''spam'',''taste'':''yum''}) # dictionary

    ```


    ```

    Out[11]: dict

    ```


    There are some other types as well, which you shall see using **type()** function
    in your Jupyter notebook by yourself.


    ### 4.3.4 Mutable and Immutable Objects<sup>24</sup>


    The **value** of some objects can change. Objects whose value can change are said
    to be **mutable**; objects whose value is unchangeable once they are created are
    called **immutable**. An object''s mutability is determined by its type; for instance,
    numbers, strings, and tuples are immutable, while dictionaries and lists are mutable.


    Some objects contain references to other objects; these are called **containers**.
    Examples of containers are **tuples**, **lists**, and **dictionaries**. The references
    are part of a container''s value. In most cases, when we talk about the value
    of a container, we imply the values, not the identities of the contained objects;
    however, when we talk about the mutability of a container, only the identities
    of the immediately contained objects are implied. So, if an immutable container
    (like a tuple) contains a reference to a mutable object, its value changes if
    that mutable object is changed. (The value of an immutable container object that
    contains a reference to a mutable object can change when the latter''s value is
    changed; however, the container is still considered immutable, because the collection
    of objects it contains cannot be changed. So, immutability is not strictly the
    same as having an unchangeable value, it is more subtle.)


    **The standard type hierarchy**<sup>25</sup>


    Below is a list of the types that are built into Python. Using the **type()**
