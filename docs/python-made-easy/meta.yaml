    # 15.6.1 NumPy Array (ndarray)


    You might occasionally hear an array referred to as "ndarray", which is shorthand
    for "N-dimensional array". An N-dimensional array is simply an array with any
    number of dimensions. You might also hear 1-D, or one-dimensional array, 2-D,
    or two-dimensional array, and so on. The NumPy ndarray class is used to represent
    both matrices and vectors.


    **A vector** is an array with a single dimension (there''s no difference between
    row and column vectors).


    **A matrix** refers to an array with two dimensions.


    For **3-D or higher** dimensional arrays, the term **tensor** is also commonly
    used.


    # 16.6.2 Attributes of Array


    An array is usually a fixed-size container of items of the same type and size.
    The number of dimensions and items in an array is defined by its shape. The shape
    of an array is a tuple of non-negative integers that specify the sizes of each
    dimension.


    In NumPy, dimensions are called **axes**. This means that if you have a 2D array
    that looks like this:


    ```

    [[0., 0., 0.], [1., 1., 1.]]

    ```


    Your array has 2 axes. The first axis has a length of 2 and the second axis has
    a length of 3.'
  - '[PAGE 454]


    Just like in other Python container objects, the contents of an array can be accessed
    and modified by indexing or slicing the array. Unlike the typical container objects,
    different arrays can share the same data, so changes made on one array might be
    visible in another.


    # 15.7 How to create a basic array To create a NumPy array, you can use the function
    np.array().


    All you need to do to create a simple array is pass a list to it.


    ```

    import numpy as np a = np.array([1, 2, 3])

    ```


