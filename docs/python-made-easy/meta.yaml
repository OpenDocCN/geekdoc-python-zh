    Congratulations...


    You have written your first Source code.


    Source code can be one line or as simple as we just wrote, or it can be thousands
    of lines and extremely complex ones. It depends on the need or the purpose of
    your program.


    Now let us save our source code. Every Programming language has its file type
    or extension. By default, the text editor will save it as **.txt** or text file.
    But we will save it as the python extension, as we wrote the source code for python.
    The extension for the Python file is **.py**. So let us save this file as Hello_World.py.


    Now we know how to write our source code, and save it too. It''s time that we
    need to learn how to translate it to the language that the computer understands,
    Machine Language.


    ## 1.3.6 How to Run the Source Code?


    You just wrote your first source code. Now it’s time to run it.


    Let''s try the way we normally run the things on our computer. By double-clicking
    on the file.


    What happened?


    The file simply opened as a text file, or in some cases, it will ask for which
    program to use to open it, and if you use Notepad, again it will open as a text
    file. That is something you didn''t expect. This is kind of anticlimax... Is it?


    What is the point of a source code, which doesn''t run?


    The reason is simple. The code is not in the language the machine understands,
    and we have neither "**compiled**" nor "**interpreted**" the source code. You
    must be more confused because you have never heard of any of these in computer
    programming parlance.


    Let me explain.


    There are majorly 3 ways to translate source code into machine code:


    - 1. Compile it

    - 2. Interpret it

    - 3. Combination of both


    **Compiling** and **Interpreting** a source code is a very complex process, and
    we will not go into technical details of what goes beneath the hood. But I will
    certainly give you a fair idea of what these terms mean in simple language. Let
    us understand this by this analogy.


    ## 1.3.7 Compiler


    The compiler is a program that converts the source code to the machine code.


    Let''s take this example.


    You write a letter to your friend back home in English, and that friend understands
    only Hindi. So, you write the letter in English and use a *translator* software
    to translate the English letter into Hindi Letter. In similar ways, the compiler
    *translates* or rather *compiles* the source code from **high-level programming
    language** to **machine language**.


    ![](img/6423827abd996243bbfb7c0196b2aea4_65_0.png)


    Figure 1-6 Translator from English to Hindi


    ![](img/6423827abd996243bbfb7c0196b2aea4_65_1.png)


    Figure 1-7 Compiler from High Level Programming Language to Machine Language


    The above image is an oversimplification of a very complex process, which we are
    not getting too deep into purposefully. That is beyond our scope for this book.
    If you are curious, you may look up for "compilers" online and you will get ample
    material to quench your thirst.


    ## 1.3.8 Interpreter


    In computer programming, an interpreter is a computer program that directly executes
    instructions written in a programming language, without requiring them previously
    to have been compiled into a machine language program.


    Taking forward the earlier analogy, the letter you wrote to your friend in English,
    who understands only Hindi. Instead of translating the letter to Hindi, you send
    the English letter to him. He then, in turn, calls for an *Interpreter* to come
    to him, and explain the meaning of the letter to him, line by line. Every time,
    when wants to re-read the letter, he needs to call the *interpreter* to read the
    letter for him.


    This is essentially what computer interpreters do: they process your source code
    each times its run, line by line, and it''s required for the user to have the
    needed interpreter available on their machine.


    Some programming languages are known as Compiled languages, like C, C++, and Objective
    C. Some other programming languages are Interpreted languages, like PHP, JavaScript,
    etc.


    And then there are some programming languages, which use the combination of both.
    E.g. Python, Java, C#.


    ### 1.3.8.1 Comparison between Compiler and Interpreter


    - 1) Both compilers and interpreters convert source code (text files) into Machine
    language. The basic difference is that a compiler system generates a stand-alone
    machine code program, while an interpreter system instead performs the actions
    described by the high-level program.

    - 2) Once a program is compiled, its source code is not required for running the
    code. But for the interpreted programs, we need the source code to run the program
    every time.

    - 3) Generally, the interpreted programs run slower than the compiled programs.


    So, we need additional steps to run our source code on our computers.


    We are going to use Python language here, and you need not worry about how to
    use the Compiler or Interpreter. When we install the Python software (or any programming
    language software), the interpreter is also installed along-with. And it does
    the magic on its own, which we need not worry about.


    ## 1.3.9 What is IDE (Integrated Development Environment)


    You can write your entire program, as you wrote your first source code, in a text
    editor. But that is not the most effective or the most elegant way of doing it.


    There are special software for specific tasks. For example, when we need to work
    with data and tables and calculations, we use spreadsheet programs (like Microsoft
    Excel), and we use PowerPoint for presentations. We open word processors for creating
    or opening word documents. Similarly, there are IDE (Integrated Development Environment)
    for writing computer programs (or codes as they call it). They provide the special
    tools needed to write, debug, and compile code.


    As we are going to work on Python, we will use the IDEs which support Python.
    There is no dearth of IDEs for Python, and you can use any. But I will recommend
    to walk with me and start with the standard software, for ease of installation
    and usage. In all probabilities, you may continue with them for life, as they
    are very capable software packages.


    The IDE we will use is **Spyder**. We will download and install it a bit later,
    but I will introduce you to the same so that you will appreciate the efficiency
    and elegance an IDE brings to code writing (or Computer Programming).


    ## 1.3.10 Spyder (Scientific Python Development Environment) IDE


    **Spyder**, the **Scientific Python Development Environment**, is a free integrated
    development environment (IDE) that is included with Anaconda (Packaged software
    for Python - we will learn about it in the next chapter). It includes editing,
    introspection, debugging, and interactive testing features.


    We will learn about how to use Spyder in detail in the coming chapters, but here
    we will look at it with the perspective, as to how IDE is better than a normal
    text editor.


    The picture above shows the typical screen of Spyder. The area on left, in the
    black frame, is the editor pane. This is equivalent to the text editor window.
    Here we type our program in plain text.


    The first thing which comes to attention is the difference between our simple
    text editor and a more sophisticated IDE. There are line numbers on the left side
    of our source code editor. This allows us to more quickly reference individual
    statements in our code. There''s also the use of color, known as syntax highlighting,
    to aid in pointing out important keywords and improve the readability of our code.
    And finally, notice how you can even preview what your code will look like when
    compiled and run on a real device. Definitely a great tool to improve your coding
    process.


    ![](img/6423827abd996243bbfb7c0196b2aea4_69_0.png)


    ## 1.4 Summary:


    We got introduced to the exciting world of Data science, and we saw, though the
    nomenclature and technology have changed the entire game, our ancestors also valued
    the importance of data analysis. Statistics is the backbone of all data related
    decision making. Brute computing power has made things possible, which were only
    theoretical few decades back.


    We also saw what kind of work a data scientist does, and how is he similar and
    different, both, from data analysts or data miners or other data related professionals.
    We also noticed how Python is the one language that commonly features in all data
    science-related fields.'
