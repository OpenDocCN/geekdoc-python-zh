- md: 'Anything which comes after “#” is passed by the python interpreter as a comment,
    and not run as part of code.


    Going ahead, you shall read the book and keep your Jupyter notebook open at all
    times, so that you may practice the codes, right from the very beginning to get
    a good grasp on the language fundamentals. Also, you will get confidence when
    you see the result on your computer. I will also upload all the codes used in
    this book in my Github account, and the link for the same is provided in the book
    for your ready reference.


    At the end of every chapter, there is a theory questionnaire, True and False statements
    and real-life problems to be solved by your programming skills learned thus far.
    I strongly recommend practicing the same along the way. In addition to these,
    there are 3 real-life projects to learn from. Try to solve the problems on your
    own machine and see the results coming to life on your own.


    In the later part of the book, you will be introduced to the data analytics ecosystem
    in Python. There you will see the real-life data sets being used for learning
    of fundamentals. The data sets are available as csv (comma separated values) files
    in my Github account, and the chapters start with the introduction of how to download
    the same. You must download the data sets, and practice them along the book to
    get a total grasp on the fundamentals of Numpy, Pandas, and Visualization using
    Matplotlib.


    ## What this book contains


    This book comprises of 21 chapters. The chapters are in such order that you learn
    one concept after the other, in increasing order of complexity. So that, even
    for an absolute beginner, it becomes as easy as reading his/her mother tongue.


    **Chapter 1** introduces you to the basics of programming and also gives an insight
    into the exciting world of data analytics. Even if you have prior programming
    language experience, I will suggest you skim thru this chapter for interesting
    analogies regarding the basics of computer programming. You will learn the simplified
    introduction to complex concepts like an interpreter, compiler, and IDE. You will
    also learn about the different roles of data scientists and analysts, along with
    skill sets required to perform the same.


    **Chapter 2** introduces you to Python Programming Language. This chapter teaches
    you to install the python software thru the Anaconda package. You will then be
    introduced to Ipython, Spyder, Jupyter notebook, and see python in action for
    the first time.


    **Chapter 3** introduces you to the Python interface, how to use it, and get you
    started with your first simple source codes. Here you will also learn about the
    syntax of python source code.


    **Chapter 4** teaches you about the variables and objects in Python. Then you
    will see the hierarchy of operations and also get introduced to the operators
    in python.


    **Chapter 5** takes you to the looping techniques and introduces the control flow
    statements in Python.


    **Chapter 6** is all about functions in pythons. Here you will learn about how
    to use the built-in functions, wat all functions are there, and also to write
    your own user-defined function. Along with functions, you will be introduced to
    the generators.


    **Chapter 7** is your first project which makes you sharpen your skill you have
    learned so far. You will create patterns using loops and then write a function
    to do a repetitive job.


    **Chapter 8** is all about the data structure that Python provides to its users.
    You will learn strings, lists, tuples, sets, and dictionaries in detail. You will
    also learn about looping techniques on all types of sequences.


    **Chapter 9** teaches you how to import the text file in python, operate on it,
    and save files created or modified in Python. This will also give insight into
    Input and Output techniques in Python.


    **Chapter 10** is your second Project. This is a real-life project which you all
    can relate to. Also in this project, you will get introduced to the image processing
    library of Pillow. This project is about automating your tasks using Python and
    save time and energy for more creative works.


    **Chapter 11** introduces the concept of class and Object-Oriented Programming
    in detail.


    **Chapter 12** teaches you what kind of errors you may face and how to troubleshoot.
    Also, you will learn how to handle errors using the exception methods.


    **Chapter 13** teaches you all about the modules and packages in Python. You will
    learn how to create your own modules, then call them to action and use the publically
    available modules and libraries.


    **Chapter 14** is your third project. Here you will get to learn about the python
    library Tkinter, using which you will create the GUI (Graphical User Interface)
    based application to solve real-life problems. You will also learn to use the
    API method of data import, directly and repetitively from websites.


    Chapter 15 and 16 will teach you all about Numpy. You will get introduced to this
    most widely used library of Python and learn how to use its revolutionary ndarray
    for data handling or all types. i.e from spreadsheets to audio files, to image
    files and beyond.


    Chapter 17 and 18 will teach you how to import data using Pandas and convert it
    to DataFrame. Subsequently, you will learn various operations on this data.


    Chapter 19 introduces the various visualization tools and techniques available
    in Python including simple but powerful visualization using pandas.


    Chapters 20 and 21 take your visualization journey to another level. You will
    learn all about Matplotlib and its visualization prowess. You will see various
    example codes and graphs to suit all your needs.


    ## FOREWORD


    Nilabh as I know him is filled with enthusiasm, vitality, and a keen desire to
    express himself. Ever since I’ve known him, he has had all the tell-tale signs
    of being an exceptional teacher and a guide. Back in our engineering days, there
    were just a handful of people I would engage in engineering discussions, and Nilabh
    was right at the top of that list! In over 15+ years of knowing him, I have always
    admired him for his unique combination of traits - his propensity to go deep into
    a subject and yet, having the patience to listen to an opposing view all-the-wile
    not losing sight of real-world practical applications. Today, as I write this
    foreword to his book on Python, I am delighted to see him bring the same virtues
    of intense rigor, authentic simplicity, and firm resolve in delivering value to
    his readers.


    It is no secret that the world is undergoing an accelerated transformation, especially
    powered by technology. At the very heart of these industrial disruptions are the
    rise of machine learning and artificial intelligence. What makes this book on
    Python so important is that it provides a road-map of learning for someone with
    minimal or no coding experience. Being proficient in Python sets the stage for
    anyone to take part in the machine learning revolution.


    I remember my first days as a beginner to coding and Python and how I personally
    struggled to come to terms with several concepts in data structures, referring
    to the right library or even doing simple NumPy operations. The problem with most
    literature on Python is that it is fragmented and it does not consider a non-coding
    background of the reader. What Nilabh has done with this book is that he has built
    a simple path for beginners to become thorough professionals. The “introduction
    to programming” section allays concerns of beginners who have no prior experience
    in software.


    I found the content flow of the book to be very relevant and pragmatic. Case in
    point: The book starts with the very basics of installing and using the software,
    which is often a very frustrating first step. Although there are many ways to
    install and use Python, but using Anaconda, as suggested here, is probably the
    most effective way ahead for a beginner.


    For the advanced programmer, the books offer vivid details along with practical
    examples and corollaries. For instance, objects and operations in Python, followed
    with control flow statements, give a firm foothold in one’s grasp of Python. Few
    areas of this book that deserve specific merit include Functions, the concept
    of Classes, Data Structure, and Sequences, and the creation of Modules and Packages.


    Today, there exist hundreds of libraries of Python, and any python expert worth
    his/her salt should be able to leverage them. Leveraging NumPy & Pandas libraries
    alone can save months, if not years, of hard work for a savvy coder. I’m happy
    to see Nilabh cover NumPy & Pandas extensively.


    A crucial aspect of data analysis which most books on python fail to cover extensively
    is data visualization. But Nilabh covered it in full detail, including various
    visualization libraries and Matplotlib. A firm grasp of visualization can help
    a programmer transition to future managerial roles.


    The confidence one can get after getting one’s hands dirty in code cannot be compared
    to any amount of theoretical understanding on the subject matter. This book follows
    an active learning approach that inspires the reader to explore and experiment
    rather than merely read and theorize. It aligns with my own belief that the best
    way to learn to code is a hands-on approach.'
  mdcn: '任何在“#”之后的内容都会被Python解释器视为注释，而不会作为代码的一部分执行。


    接下来，你将阅读本书，并始终保持Jupyter笔记本打开，以便从最开始就练习代码，从而很好地掌握语言基础。同时，当你在电脑上看到运行结果时，也会获得信心。我还会将本书中使用的所有代码上传到我的Github账户，相关链接已在书中提供，方便你随时参考。


    每章末尾都设有理论问卷、判断题以及需要运用你迄今所学的编程技能解决的实际问题。我强烈建议你边学边练。除此之外，还有3个实际项目可供学习。请尝试在自己的机器上解决问题，并亲眼看到结果呈现。


    在本书的后半部分，你将接触到Python的数据分析生态系统。在那里，你将看到用于学习基础知识的真实数据集。这些数据集以csv（逗号分隔值）文件的形式存放在我的Github账户中，各章节开头会介绍如何下载它们。你必须下载这些数据集，并跟随本书进行练习，以全面掌握Numpy、Pandas以及使用Matplotlib进行可视化的核心基础。


    ## 本书内容


    本书包含21章。章节顺序经过精心安排，让你能够循序渐进地学习，复杂度逐步提升。因此，即使是完全的初学者，也能像阅读母语一样轻松理解。


    **第1章**将带你了解编程基础，并深入探索激动人心的数据分析世界。即使你有编程经验，我也建议你浏览本章，其中关于计算机编程基础的类比非常有趣。你将学习到关于解释器、编译器和IDE等复杂概念的简化介绍。你还将了解数据科学家和分析师的不同角色，以及执行这些角色所需的技能组合。


    **第2章**将向你介绍Python编程语言。本章将教你如何通过Anaconda包安装Python软件。然后，你将接触Ipython、Spyder、Jupyter笔记本，并首次看到Python的实际运行。


    **第3章**将介绍Python界面、如何使用它，并让你开始编写第一个简单的源代码。在这里，你还将学习Python源代码的语法。


    **第4章**将教你Python中的变量和对象。然后，你将了解操作的层次结构，并初步接触Python中的运算符。


    **第5章**将带你学习循环技术，并介绍Python中的控制流语句。


    **第6章**将全面讲解Python中的函数。你将学习如何使用内置函数、有哪些可用函数，以及如何编写自己的用户定义函数。除了函数，你还将接触生成器。


    **第7章**是你的第一个项目，旨在巩固你迄今所学的技能。你将使用循环创建图案，然后编写一个函数来执行重复性任务。


    **第8章**将全面介绍Python为用户提供的数据结构。你将详细学习字符串、列表、元组、集合和字典。你还将学习针对所有类型序列的循环技术。


    **第9章**将教你如何在Python中导入文本文件、对其进行操作，以及保存在Python中创建或修改的文件。这也将让你了解Python中的输入和输出技术。


    **第10章**是你的第二个项目。这是一个与大家生活息息相关的实际项目。在这个项目中，你还将接触Pillow图像处理库。本项目旨在教你如何使用Python自动化任务，从而节省时间和精力，用于更具创造性的工作。


    **第11章**将详细介绍类和面向对象编程的概念。


    **第12章**将教你可能遇到的错误类型以及如何进行故障排除。此外，你将学习如何使用异常处理方法来处理错误。


    **第13章**将全面讲解Python中的模块和包。你将学习如何创建自己的模块，然后调用它们，并使用公开可用的模块和库。


    **第14章**是你的第三个项目。在这里，你将学习Python的Tkinter库，并使用它创建基于GUI（图形用户界面）的应用程序来解决实际问题。你还将学习如何使用API方法，直接且重复地从网站导入数据。


    第15章和第16章将全面讲解Numpy。你将接触这个Python中最广泛使用的库，并学习如何使用其革命性的ndarray来处理各种类型的数据，即从电子表格到音频文件、图像文件等等。


    第17章和第18章将教你如何使用Pandas导入数据并将其转换为DataFrame。随后，你将学习对这些数据进行各种操作。


    第19章将介绍Python中可用的各种可视化工具和技术，包括使用pandas进行简单而强大的可视化。


    第20章和第21章将把你的可视化之旅提升到新的高度。你将全面了解Matplotlib及其强大的可视化能力。你将看到各种示例代码和图表，以满足你的所有需求。


    ## 前言


    我所认识的尼拉布（Nilabh）充满热情、活力和强烈的自我表达欲望。自从我认识他以来，他就具备了成为一名杰出教师和导师的所有特质。在我们当年的工程学习生涯中，我只会与少数几个人讨论工程问题，而尼拉布正是其中的佼佼者！在认识他超过15年的时间里，我一直钦佩他独特的品质组合——他既能深入钻研一个主题，又有耐心倾听反对意见，同时始终不忘现实世界的实际应用。今天，在我为他这本关于Python的书撰写前言时，我欣喜地看到他将同样的严谨、朴实和坚定的决心带给了读者，致力于为他们创造价值。


    众所周知，世界正在经历加速变革，尤其是在技术的推动下。这些产业变革的核心是机器学习和人工智能的兴起。这本关于Python的书之所以如此重要，是因为它为编码经验极少或没有经验的人提供了一条学习路线图。精通Python为任何人参与机器学习革命奠定了基础。


    我记得我刚开始学习编码和Python时的日子，以及我个人在理解数据结构的几个概念、查找正确的库甚至进行简单的NumPy操作时所经历的挣扎。大多数Python文献的问题在于它们内容零散，没有考虑到读者可能没有编码背景。尼拉布通过这本书所做的，是为初学者构建了一条通往专业精通的简单路径。“编程入门”部分消除了没有软件经验的初学者的顾虑。


    我发现本书的内容编排非常贴切且务实。一个典型的例子是：本书从安装和使用软件的最基础知识开始，而这通常是令人沮丧的第一步。尽管安装和使用Python的方法有很多，但正如本书所建议的，使用Anaconda可能是初学者最有效的入门方式。


    对于高级程序员，本书提供了生动的细节以及实际的例子和推论。例如，Python中的对象和操作，以及控制流语句，为掌握Python打下了坚实的基础。本书中值得特别提及的几个部分包括函数、类的概念、数据结构和序列，以及模块和包的创建。


    如今，存在数百个Python库，任何称职的Python专家都应该能够利用它们。仅仅利用NumPy和Pandas库，就能为精明的程序员节省数月甚至数年的艰苦工作。我很高兴看到尼拉布广泛地涵盖了NumPy和Pandas。


    数据分析的一个关键方面，也是大多数Python书籍未能充分涵盖的，就是数据可视化。但尼拉布对此进行了详尽的介绍，包括各种可视化库和Matplotlib。扎实掌握可视化可以帮助程序员向未来的管理角色转型。


    在代码实践中获得的信心，是任何理论理解都无法比拟的。本书采用主动学习的方法，鼓励读者探索和实验，而不仅仅是阅读和理论化。这与我自己的信念一致：学习编码的最佳方式是动手实践。'
