    ## 7. 映射


    这些表示由任意索引集索引的对象有限集。下标表示法 **a[k]** 从映射 **a** 中选择由 **k** 索引的项目；这可以在表达式中使用，也可以作为赋值或
    **del** 语句的目标。内置函数 **len()** 返回映射中的项目数。


    目前只有一个内置映射类型：


    ## 字典


    这些表示由几乎任意值索引的对象有限集。唯一不能作为键的值类型是包含列表或字典或其他可变类型的值，这些类型是通过值而不是对象标识进行比较的，原因是字典的高效实现要求键的哈希值保持不变。用作键的数字类型遵循数字比较的正常规则：如果两个数字比较相等（例如，1
    和 1.0），则它们可以互换使用来索引同一个字典条目。


    字典是可变的；它们可以通过 `{...}` 表示法创建。


    `{"brand": "Ford", "model": "Mustang", "year": 1964}` 是 Python 中字典的一个示例。


    ## 8. 可调用类型


    这些是可以应用函数调用操作的类型：


    ## 用户定义函数


    用户定义的函数对象由函数定义创建（在后面的章节中详细解释）。它应该用一个包含与函数形式参数列表相同数量项目的参数列表来调用。


    ## 实例方法


    实例方法对象结合了一个类、一个类实例和任何可调用对象（通常是用户定义的函数）。


    ## 内置函数


    函数是一段仅在调用时运行的代码。你可以将数据（称为参数）传递给函数。函数可以返回数据作为结果。内置函数的示例包括 `len()` 和 `math.sin()`（math
    是一个标准内置模块）。


    要调用函数，请使用函数名称后跟括号。例如，`len()` 是一个函数，它返回字符串的长度作为结果。


    ## 内置方法


    这实际上是内置函数的另一种伪装。Python 方法类似于函数，但它附加到一个对象上。我们在对象上调用一个方法，它可能会对该对象进行更改。因此，方法属于一个类。内置方法的一个示例是
    **alist.append()**，假设 alist 是一个列表对象。


    > **注意：**

    > * Python 方法是在对象上调用的，这与函数不同。

    > * 相反，我们调用 Python 函数相当通用——我们不会在任何对象上调用它。

    > * 由于我们在对象上调用方法，因此它可以访问其中的数据。

    > * 方法可能会改变对象的状态，但 Python 函数通常只对其进行操作，然后打印某些内容或返回一个值。


    ## 类


    类是可调用的。类提供了一种将数据和功能捆绑在一起的方法。创建一个新类会创建一种新的对象类型，允许创建该类型的新实例。每个类实例都可以附加属性以维护其状态。类实例也可以有方法（由其类定义）来修改其状态。


    ## 9. 模块


    将模块视为与代码库相同。一个包含你希望包含在应用程序中的函数集的文件。要创建模块，只需将你想要的代码保存在扩展名为 .py 的文件中。现在我们可以使用我们刚刚创建的模块，通过使用
    import 语句。


    模块可以包含函数（如前所述），也可以包含所有类型的变量（数组、字典、对象等）。模块是 Python 代码的基本组织单元，由导入系统创建，该系统通过 import
    语句或调用 **importlib.import_module()** 和内置 **import()** 等函数来调用。


    ## 4.5 Python 中的对象操作


    到目前为止，我们已经学习了所有理论知识。现在我们将开始将其付诸实践。我们将从最简单的任务开始。Python 中的输入和打印。请注意：这里的打印是指在 Python
    中打印输出，而不是从打印机打印硬拷贝。


    ```

    In [18]: 14+26 # 整数加法

    Out[18]: 40

    ```


    ```

    In [19]: 1.5*4 # 浮点数乘法

    Out[19]: 6.0

    ```


    ```

    In [20]: 2**100 # 2 的 100 次方

    Out[20]: 1267650600228229401496703205376

    ```


    ```

    In [21]: 4/2 # 除法总是返回浮点数

    Out[21]: 2.0

    ```


    ```

    In [22]: 5>4 # 布尔运算符

    Out[22]: True

    ```


    在上面的单元格中，我们看到了简单的算术运算，这些运算可以使用 Jupyter Notebook、Spyder IDE 或控制台在 Python 中无缝完成。


    这里需要注意几点


    - 我们没有明确要求打印答案。一旦单元格运行，它们就会自动打印出来。

    - # 后面写的文本被忽略了。它不被视为代码的一部分。

    - 因此，在代码中 # 后面写注释是一个好习惯，可以使程序更具**可读性**。


    ## 4.6 运算符<sup>26</sup>


    你编写的大多数语句（逻辑行）都将包含表达式。表达式的一个简单示例是 **2 + 3**。表达式可以分解为运算符和操作数。运算符是执行某些功能的东西，可以由符号（如
    +）或特殊关键字表示。运算符需要一些数据来操作，这些数据称为操作数。在这种情况下，**2** 和 **3** 是操作数。


    我们将详细查看运算符的工作原理，但在此之前，我将它们分为 4 大类。


    ### 4.6.1 算术运算符


    | 运算符 | 操作 |

    | :--- | :--- |

    | + | 加法（求和） |

    | - | 减法（减） |

    | * | 乘法 |

    | / | 除法 |

    | % | 取模 |

    | // | 整除 |

    | ** | 幂运算（指数） |


    以下是可用运算符的快速概览：


    ### +（加）

    - 将两个对象相加

    - 4 + 3 得到 7。''a'' + ''b'' 得到 ''ab''。


    ### -（减）

    - 从一个数中减去另一个数；如果缺少第一个操作数，则假定为零。

    - -2.8 得到一个负数，70 - 34 得到 36。


    ### *（乘）

    - 返回两个数的乘积，或返回字符串重复多次的结果。

    - 2 * 3 得到 6。

    - ''ta'' * 3 得到 ''tatata''。


    ### **（幂）

    - x**y 返回 x 的 y 次方。2**3 返回 8。


    ### /（除）

    - x/y 将 x 除以 y。13 / 3 得到 4.333333333333333。


    ### //（整除）

    - x//y 将 x 除以 y，并将结果向下舍入到最接近的整数值。请注意，如果其中一个值是浮点数，你将得到一个浮点数。

    - 13 // 3 得到 4

    - -13 // 3 得到 -5

    - 9//1.81 得到 4.0


    ### %（取模）

    - 返回除法的余数。13 % 3 得到 1。

    - -25.5 % 2.25 得到 1.5。


    ### 4.6.2 赋值运算符


    | 运算符 | 操作 | 等价形式 |

    | :--- | :--- | :--- |

    | = | a = b | a = b |

    | += | a += b | a = (a + b) |

    | -= | a -= b | a = (a - b) |

    | *= | a *= b | a = (a * b) |

    | /= | a /= b | a = (a / b) |

    | %= | a %= b | a = (a % b) |

    | //= | a //= b | a = (a // b) |

    | **= | a **= b | a = (a ** b) |


    以下是可用运算符的快速概览：


    这些运算符用于为变量赋值。重要的是将 = 运算符理解为**赋值**而不是**等于**，以避免与 == 相等运算符混淆。


    在上面的示例中，名为 **a** 的变量被赋予包含在名为 **b** 的变量中的值，因此该值成为存储在变量 **a** 中的新值。


    在表格示例中，+= 运算符首先将变量 **a** 中包含的值与变量 **b** 中获得的值相加。然后将结果赋值给变量 **a**，使其成为存储的新值。


    所有其他运算符的工作方式相同，首先对两个值进行算术运算，然后将该运算的结果赋值给第一个变量，使其成为其新的存储值。


    使用 %= 运算符时，第一个操作数“a”除以第二个操作数“b”，然后将该运算的**余数**赋值给变量“a”。


    ### 4.6.3 比较运算符


    | 运算符 | 操作 |

    | --- | --- |

    | == | 相等 |

    | != | 不相等 |

    | > | 大于 |

    | < | 小于 |

    | >= | 大于或等于 |

    | <= | 小于或等于 |'
