    \nPython将它们视为2个不同的行（逻辑行），而程序员，也就是你，将其视为一个物理行。\n\n那么我们在这里学到了什么？\n\n如果你想在单个物理行上指定多个逻辑行，那么你必须使用分号（;）显式地指定这一点，分号表示一个逻辑行/语句的结束。\n\
