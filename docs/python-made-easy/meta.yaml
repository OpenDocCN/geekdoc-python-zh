  md: 'programming approaches. One of the popular approaches to solve a programming
    problem is by creating objects. This is known as Object-Oriented Programming (OOP).


    ![](img/6423827abd996243bbfb7c0196b2aea4_364_0.png)


    Figure 11-1 Object oriented programming Object-oriented Programming, or OOP for
    short, is a programming paradigm that provides a means of structuring programs
    so that properties and behaviors are bundled into individual objects.


    In other words, OOP is an approach for modeling concrete, real-life things like
    cars as well as relations between things like college and students, player and
    coach, etc. OOP models real-world things as objects in the software. These objects
    have some data associated with them, and they can perform certain functions.


    Another common programming paradigm is **Procedural programming**. There we organize
    the program like a step by step flow chart or recipe. There are steps in the form
    of blocks of codes, and functions, which are in a sequence to perform a certain
    task.'
