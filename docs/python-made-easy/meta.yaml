    All the other operators work in the same way by making the arithmetical operation
    between the two values first and then assigning the result of that operation to
    the first variable so that it becomes its new stored value.


    With the %= operator, the first operand “a” is divided by the second operand “b”,
    then the **remainder** of that operation is assigned to the variable “a”.


