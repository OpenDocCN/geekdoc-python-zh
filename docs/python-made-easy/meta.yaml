    \ + purchase[\"bananas\"]\n\npurchase\n```\n\n![](img/6423827abd996243bbfb7c0196b2aea4_515_1.png)\n\
    \n## 17.7 Rows in DataFrame\n\n### 17.7.1 Row Selection\n\nThe rows in a DataFrame\
