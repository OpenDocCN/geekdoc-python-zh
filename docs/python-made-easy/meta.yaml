- md: "## 6.4 User-defined functions\n\nThis is one of the most powerful tools of\
    \ most of the programming languages, that they allow the user to write their own\
    \ functions. This gives the programmer limitless opportunity to create reusable\
    \ codes for their repetitive tasks.\n\nThere are limited in-built functions. When\
    \ a programmer needs to use one which is not available in the in-built function\
    \ library, he creates one. This user created function is called a **User Defined\
    \ Function**.\n\nTo understand this better, let’s create our own function.\n\n\
    ### 6.4.1 Why Create Functions?\n\nA natural question comes to mind, why shall\
    \ we write separate functions at all? Why not put the entire logic into one function?\
    \ Well, the following points may clarify the issue better.\n\n- By writing functions,\
    \ users avoid rewriting the same code over and over. Suppose your program has\
    \ a code chunk that calculates the \"rate of interest\". If later in the program\
    \ you want to calculate the rate of interest for a different principal amount\
    \ and time period, you will not like it if you have to write the same instructions\
    \ all over again. Instead, you would prefer to jump to a \"chunk of code\" that\
    \ calculates interest and then jump back to the place from where you left off.\
    \ This chunk of code is nothing but a function.\n- Writing different functions\
    \ rather than combining all logic in one is a better approach because it gives\
    \ a modular structure to the program. Different functions can be used in the same\
    \ situations again, but if the entire logic is combined in one function, then\
    \ again for the same work which is part of the larger function, we need to write\
    \ another chunk of code.\n- Separating the code into functions makes the program\
    \ easier to design and understand. It also makes it easy to write and check the\
    \ codes independently, if the operation of a program can be divided into separate\
    \ activities and each activity placed in a different function.\n\n### 6.4.2 Creating\
    \ and Calling a function\n\nLike all function codes, the way to create or define\
    \ functions has its own syntax. The syntax is very simple.\n\n```\ndef function_name():\n\
    \    body of the function\n```\n\nWhen we write a **def()** statement, the python\
    \ interpreter understands that we are going to define a function. It's quite obvious\
    \ that \"def\" is a short form of \"define\". Now we have to give our function\
    \ a unique name. After **def** comes the **name of the function**, followed by\
    \ a pair of parentheses(), which is followed by a colon :. In the next line onwards,\
    \ comes the **body of the function**. It starts with an **indentation** which\
    \ tells python that these code blocks make the body of the function. Body of function\
    \ is nothing but the lines of codes that the function is going to execute.\n\n\
    The name we give our function shall be unique, just like variables. We can name\
    \ our function anything, but we have to make sure we respect the rules of the\
    \ Python language. Also, we shall name the function which is relatable to the\
    \ action it performs, or in other words, it's meaningful. This will help other\
    \ programmers who read our code to easily understand what it stands for.\n\nLet's\
    \ create or define a simple function to understand the concepts we just learned.\n\
    \n```\nIn [1]: def greeting():\n            print(\"Good Morning\")\n```\n\nNow\
    \ write the above lines of code which defines the function \"greetings\" in your\
    \ own machine, and run it.\n\nDid you get any output?\n\nWell, you won't!\n\n\
