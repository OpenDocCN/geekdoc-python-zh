- md: '## Sets


    These represent a mutable set. They are created by the built-in **set()** constructor
    and can be modified afterward by several methods, such as **add()**.


    `{"apple", "banana", "cherry"}` is an example of a set.


    ## Frozen sets


    These represent an immutable set. They are created by the built-in **frozenset()**
    constructor. As a frozenset is immutable and hashable, it can be used again as
    an element of another set, or as a dictionary key.


    > **Note:** Sets are unordered, so the items will appear in random order. In Python,
    sets are written with curly brackets. You cannot access items in a set by referring
    to an index since sets are unordered the items has no index.


    ## 7. Mappings


    These represent finite sets of objects indexed by arbitrary index sets. The subscript
    notation **a[k]** selects the item indexed by **k** from the mapping **a**; this
    can be used in expressions and as the target of assignments or **del** statements.
    The built-in function **len()** returns the number of items in a mapping.


    There is currently a single intrinsic mapping type:


    ## Dictionaries


    These represent finite sets of objects indexed by nearly arbitrary values. The
    only types of values not acceptable as keys are values containing lists or dictionaries
    or other mutable types that are compared by value rather than by object identity,
    the reason being that the efficient implementation of dictionaries requires a
    key''s hash value to remain constant. Numeric types used for keys obey the normal
    rules for numeric comparison: if two numbers compare equal (e.g., 1 and 1.0) then
    they can be used interchangeably to index the same dictionary entry.


    Dictionaries are mutable; they can be created by the `{...}` notation.


    `{"brand": "Ford", "model": "Mustang", "year": 1964}` is an example of a dictionary
    in python.


    ## 8. Callable types


    These are the types to which the function call operation can be applied:


    ## User-defined functions


    A user-defined function object is created by a function definition (explained
    in detail in later chapters). It should be called with an argument list containing
    the same number of items as the function''s formal parameter list.


    ## Instance methods


    An instance method object combines a class, a class instance, and any callable
    object (normally a user-defined function).


    ## Built-in functions


    A function is a block of code that only runs when it is called. You can pass data,
    known as parameters, into a function. A function can return data as a result.
    Examples of built-in functions are `len()` and `math.sin()` (math is a standard
    built-in module).


    To call a function, use the function name followed by a parenthesis. e.g. `len()`
    is a function that gives the length of the string as result.


    ## Built-in methods


    This is actually a different disguise of a built-in function. Python method is
    like a function, except it is attached to an object. We call a method on an object,
    and it possibly makes changes to that object. A method, then, belongs to a class.
    An example of a built-in method is **alist.append()**, assuming alist is a list
    object.


    > **Note:**

    > * Python method is called on an object, unlike a function.

    > * Conversely, we call Python function quite generically- we don''t call it on
    any object.

    > * Since we call a method on an object, it can access the data within it.

    > * A method may alter an object''s state, but Python function usually only operates
    on it, and then prints something or returns a value.


    ## Classes


    Classes are callable. Classes provide a means of bundling data and functionality
    together. Creating a new class creates a new type of object, allowing new instances
    of that type to be made. Each class instance can have attributes attached to it
    for maintaining its state. Class instances can also have methods (defined by its
    class) for modifying its state.


    ## 9. Modules


    Consider a module to be the same as a code library. A file containing a set of
    functions you want to include in your application. To create a module just save
    the code you want in a file with the file extension .py Now we can use the module
    we just created, by using the import statement.


    The module can contain functions, as already described, but also variables of
    all types (arrays, dictionaries, objects, etc) Modules are a basic organizational
    unit of Python code and are created by the import system as invoked either by
    the import statement or by calling functions such as **importlib.import_module()**
    and built-in **import()**.


    ## 4.5 Operations on objects in python


    Till now, we have learned all in theory. Now we will start putting the same in
    practice. We will start with the simplest of tasks. Typing and Printing in Python.
    Word of caution: Printing here means Printing Output in Python, not printing a
    hard copy from the printer.


    ```

    In [18]: 14+26 # Integer addition

    Out[18]: 40

    ```


    ```

    In [19]: 1.5*4 # Float multiplication

    Out[19]: 6.0

    ```


    ```

    In [20]: 2**100 # 2 to the power 100

    Out[20]: 1267650600228229401496703205376

    ```


    ```

    In [21]: 4/2 # division always returns a floating point number

    Out[21]: 2.0

    ```


    ```

    In [22]: 5>4 # Boolean operator

    Out[22]: True

    ```


    In the above cells, we saw simple arithmetic operations, which can be seamlessly
    done in Python, using Jupyter Notebook, or Spyder IDE or console.


    Few things to be noticed here


    - We did not ask answers to be printed explicitly. They got printed on their own
    once the cell was run.

    - The text written after a # is passed. It''s not considered part of the code.

    - Hence, it is a good practice to write comments after # in codes, to make the
    program more **readable**.


    ## 4.6 Operators<sup>26</sup>


    Most statements (logical lines) that you write will contain expressions. A simple
    example of an expression is **2 + 3**. An expression can be broken down into operators
    and operands. Operators are functionality that does something and can be represented
    by symbols such as + or by special keywords. Operators require some data to operate
    on and such data are called operands. In this case, **2** and **3** are the operands.


    We will see how operators work in detail, but before that, I will divide them
    into 4 broad groups.


    ### 4.6.1 Arithmetic Operators


    | Operator | Operation |

    | :--- | :--- |

    | + | Addition (Sum) |

    | - | Subtraction (Minus) |

    | * | Multiplication |

    | / | Division |

    | % | Modulo |

    | // | Floor Division |

    | ** | To the Power (Exponent) |


    Here is a quick overview of the available operators:


    ### + (plus)

    - Adds two objects

    - 4 + 3 gives 7 . ''a'' + ''b'' gives ''ab'' .


    ### - (minus)

    - Gives the subtraction of one number from the other; if the first operand is
    absent it is assumed to be zero.

    - -2.8 gives a negative number and 70 - 34 gives 36.


    ### * (multiply)

    - Gives the multiplication of the two numbers or returns the string repeated that
    many times.

    - 2 * 3 gives 6.

    - ''ta'' * 3 gives ''tatata'' .


    ### ** (power)

