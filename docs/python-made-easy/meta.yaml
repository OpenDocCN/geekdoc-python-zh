    \ **How to save and load NumPy objects** You will, at some point, want to save\
    \ your arrays to disk and load them back without having to re-run the code. Fortunately,\
    \ there are several ways to save and load objects with NumPy. The **ndarray**\
    \ objects can be saved to and loaded from the disk files with **loadtxt** and\
    \ **savetxt** functions that handle normal text files, load and save functions\
    \ that handle NumPy binary files with a **.npy** file extension, and a **savez**\
    \ function that handles NumPy files with a **.npz** file extension.\n\nThe **.npy**\
    \ and **.npz** files store data, shape, **dtype**, and other information required\
    \ to reconstruct the **ndarray** in a way that allows the array to be correctly\
    \ retrieved, even when the file is on another machine with different architecture.\n\
    \nIf you want to store a single **ndarray** object, store it as a **.npy** file\
    \ using **np.save**. If you want to store more than one **ndarray** object in\
    \ a single file, save it as a **.npz** file using **np.savez**. You can also save\
    \ several arrays into a single file in **compressed npz** format with **savez_compressed**."
