    ## 2 INTRODUCTION TO PYTHON


    ### 2.1 What is Python?


    Python is a Free and Open Source, **interpreted, high-level, general-purpose**
    programming language.


    Created by Guido van Rossum and first released in 1991. It supports multiple programming
    paradigms, including structured (particularly procedural) object-oriented, and
    functional programming. Its language constructs and object-oriented approach aim
    to help programmers write clear, logical code for small and large-scale projects.³


