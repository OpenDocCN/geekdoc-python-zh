- md: "## 9.2 Output\n\nThere are several ways to present the output of a program\
    \ in Python. The data can be printed in a human-readable form on-screen, or written\
    \ to a file for future use. This chapter will discuss some of the possibilities.\n\
    \nWe have already seen the **print()** function and its syntax. Now we will look\
    \ at some more methods to output the results.\n\n### 9.2.1 Fancier Output Formatting<sup>46</sup>\n\
    \nSo far we've encountered two ways of writing values: expression statements and\
    \ the **print()** function.\n\nOften you'll want more control over the formatting\
    \ of your output than simply printing space-separated values. There are several\
    \ ways to format output. One such example is:\n\n```\nIn [4]: Name = \"nilabh\"\
    \n       Year = 1998\n\n       f'{Name} was born in {Year}'\n\nOut[4]: 'nilabh\
    \ was born in 1998'\n```\n\n#### 9.2.1.1 Formatted String Literals\n\nFormatted\
    \ string literals (also called f-strings for short) let you include the value\
    \ of Python expressions inside a string by prefixing the string with “f” or “F”\
    \ and writing expressions as {expression}.\n\nThe following example prints value\
    \ of pi in the string format desired by user:\n\n```\nIn [5]: import math print(f'The\
    \ value of pi is approximately {math.pi}')\n```\n\nThe value of pi is approximately\
    \ 3.141592653589793\n\nAn optional format specifier can follow the expression.\
    \ This allows greater control over how the value is formatted. The following example\
    \ rounds Pi to three places after the decimal:\n\n```\nIn [6]: import math print(f'The\
    \ value of pi is approximately {math.pi:.3f}')\n```\n\nThe value of pi is approximately\
    \ 3.142\n\nPassing an integer after the ':' will cause that field to be a minimum\
    \ number of characters wide. This is useful for making columns line up. In the\
    \ example below, we will see how it affects the output.\n\n```\nIn [7]: # without\
    \ any integer after ':'\ntable = {'Sjoerd': 4127, 'Jack': 4098, 'Dcab': 7678}\n\
    for name, phone in table.items():\n    print(f'{name} ==> {phone}')\n```\n\nSjoerd\
    \ ==> 4127\nJack ==> 4098\nDcab ==> 7678\n\n```\nIn [8]: # Passing an integer\
    \ after the ':' will cause that field to be a minimum number of\ntable = {'Sjoerd':\
    \ 4127, 'Jack': 4098,\n'Dcab': 7678}\nfor name, phone in table.items():\n    print(f'{name:10}\
    \ ==> {phone:10}')\n```\n\n```\nSjoerd ==> 4127\nJack ==> 4098\nDcab ==> 7678\n\
    ```\n\nOther modifiers can be used to convert the value before it is formatted.\
    \ '!a' applies ascii(), '!s' applies str(), and '!r' applies repr():\n\n```\n\
    In [9]:   animals = 'eels'\n         print(f'My hovercraft is full of {animals}.')\n\
    \         # use of `!r`\n\n         print(f'My hovercraft is full of\n{animals!r}.')\n\
    ```\n\n```\nMy hovercraft is full of eels.\nMy hovercraft is full of 'eels'.\n\
    ```\n\nFor further reference on these format specifications and further details\
    \ of them, see the reference guide for the format specification Mini Language\
    \ on this link: https://docs.python.org/3.7/library/string.html#formatspec\n\n\
    #### 9.2.1.2 The String format() Method\n\nBasic usage of the str.format() method\
    \ looks like this:\n\n```\nIn [10]: print('We are the {} who say \"{}!\"'.format('knights',\
    \ 'Ni'))\n```\n\nWe are the knights who say \"Ni!\"\n\nThe brackets and characters\
    \ within them (called format fields) are replaced with the objects passed into\
    \ the **str.format()** method. A number in the brackets can be used to refer to\
    \ the position of the object passed into the **str.format()** method.\n\n```\n\
    In [11]: print('{0} and {1}'.format('spam', 'eggs'))\n        print('{1} and {0}'.format('spam',\
    \ 'eggs'))\n```\n\nspam and eggs eggs and spam\n\nIf keyword arguments are used\
    \ in the **str.format()** method, their values are referred to by using the name\
    \ of the argument.\n\n```\nIn [12]: print('This {food} is {adjective}.'.format(food='spam',\n\
    \        adjective='absolutely horrible'))\n```\n\nThis spam is absolutely horrible.\n\
    \nPositional and keyword arguments can be arbitrarily combined:\n\n```\nIn [13]:\
    \ print('The story of {0}, {1}, and {other}.'.format('Bill',\n        'Manfred',\
    \ other='Georg'))\n```\n\nThe story of Bill, Manfred, and Georg.\n\nIf you have\
    \ a long format string that you don't want to split up, it would be nice if you\
    \ could reference the variables to be formatted by name instead of by position.\
    \ This can be done by simply passing the **dict** and using square brackets '[]'\
    \ to access the keys\n\n```\nIn [14]: table = {'Sjoerd': 4127, 'Jack': 4098,\n\
    \            'Dcab': 8637678}\n\n        print('Jack: {0[Jack]:d}; Sjoerd:\n \
    \       {0[Sjoerd]:d}; Dcab:\n        {0[Dcab]:d}'.format(table))\n```\n\n**Jack:\
    \ 4098; Sjoerd: 4127; Dcab: 8637678**\n\nYou must be wondering, what these **d**\
    \ are doing after :. They convert the data into **some format** you want to and\
    \ then print it. Observe the tweak in the code here, and see the change in result\
    \ for yourself.\n\n```\nIn [15]: table = {'Sjoerd': 4127, 'Jack': 4098,\n    \
    \        'Dcab': 8637678}\n\n        print('Jack: {0[Jack]:d}; Sjoerd:\n     \
    \   {0[Sjoerd]:c}; Dcab:\n        {0[Dcab]:b}'.format(table))\n```\n\n**Jack:\
    \ 4098; Sjoerd: □; Dcab: 100000111100110011101110**\n\n# What just happened here?\n\
    \nI am not giving you a straight answer. But if you are curious, I will lead you\
    \ to the place, where you will not only get your answer but also get so many more\
    \ variations like the one above.\n\nVisit https://docs.python.org/3.7/library/string.html#formatspec\n\
    \nNow continuing with the original example.\n\nThe same output could also be done\
    \ by passing the table as keyword arguments with the '**' notation.\n\n```\nIn\
    \ [16]: table = {'Sjoerd': 4127, 'Jack': 4098,\n            'Dcab': 8637678}\n\
    \n        print('Jack: {Jack:d}; Sjoerd: {Sjoerd:d};\n        Dcab: {Dcab:d}'.format(**table))\n\
    ```\n\nJack: 4098; Sjoerd: 4127; Dcab: 8637678\n\nThis is particularly useful\
    \ in combination with the built-in function **vars()**, which returns a dictionary\
    \ containing all local variables. As an example, the following lines produce a\
    \ tidily-aligned set of columns giving integers and their squares and cubes:\n\
    \n```\nIn [17]: for x in range(1, 11): print('{0:2d} {1:3d}\n        {2:4d}'.format(x,\
    \ x*x, x*x*x))\n```\n\n1  1  1\n2  4  8\n3  9  27\n4  16  64\n5  25  125\n6  36\
    \  216\n7  49  343\n8  64  512\n9  81  729\n10 100 1000\n\n#### 9.2.1.3 Manual\
    \ String Formatting\n\nHere's the same table of squares and cubes, formatted manually:\n\
    \n```\nIn [18]: for x in range(1, 11):\n            print(repr(x).rjust(2),\n\
    \            repr(x*x).rjust(3),repr(x*x*x).rjust(4))\n```\n\n```\n 1   1   1\n\
    \ 2   4   8\n 3   9  27\n 4  16  64\n 5  25 125\n 6  36 216\n 7  49 343\n 8  64\
    \ 512\n 9  81 729\n10 100 1000\n```\n\n(Note that the one space between each column\
    \ was added by the way **print()** works: it always adds spaces between its arguments.)\
    \ The **str.rjust()** method of string objects right-justifies a string in a field\
    \ of a given width by padding it with spaces on the left. There are similar methods\
    \ **str.ljust()** and **str.center()**. These methods do not write anything, they\
    \ just return a new string.\n\nThere is another method, **str.zfill()**, which\
    \ pads a numeric string on the left with zeros. It understands about plus and\
    \ minus signs:\n\n```\nIn [19]: '12'.zfill(5)\n```\n\n```\nOut[19]: '00012'\n\
    ```\n\n```\nIn [20]: '-12'.zfill(5)\n```\n\n```\nOut[20]: '-0012'\n```\n\n```\n\
    In [21]: '-3.14'.zfill(7)\n```"
  mdcn: "## 9.2 输出\n\n在 Python 中，有多种方式可以呈现程序的输出。数据可以以人类可读的形式打印在屏幕上，也可以写入文件以供将来使用。本章将讨论其中一些可能性。\n\
    \n我们已经见过 **print()** 函数及其语法。现在，我们将探讨更多输出结果的方法。\n\n### 9.2.1 更花哨的输出格式化<sup>46</sup>\n\
    \n到目前为止，我们已经遇到了两种写入值的方式：表达式语句和 **print()** 函数。\n\n通常，你希望对输出的格式有更多控制，而不仅仅是打印空格分隔的值。有几种格式化输出的方法。其中一个例子是：\n\
    \n```\nIn [4]: Name = \"nilabh\"\n       Year = 1998\n\n       f'{Name} was born\
    \ in {Year}'\n\nOut[4]: 'nilabh was born in 1998'\n```\n\n#### 9.2.1.1 格式化字符串字面值\n\
    \n格式化字符串字面值（也简称为 f-字符串）允许你通过在字符串前加上 \"f\" 或 \"F\" 并将表达式写为 {expression}，将 Python\
    \ 表达式的值包含在字符串中。\n\n以下示例以用户期望的字符串格式打印圆周率的值：\n\n```\nIn [5]: import math print(f'The\
    \ value of pi is approximately {math.pi}')\n```\n圆周率的值约为 3.141592653589793\n\n\
    表达式后面可以跟一个可选的格式说明符。这允许对值的格式化方式有更大的控制。以下示例将圆周率四舍五入到小数点后三位：\n\n```\nIn [6]: import\
    \ math print(f'The value of pi is approximately {math.pi:.3f}')\n```\n圆周率的值约为\
    \ 3.142\n\n在 ':' 后传递一个整数将使该字段成为最小字符宽度。这对于使列对齐很有用。在下面的示例中，我们将看到它如何影响输出。\n\n```\n\
    In [7]: # 在 ':' 后没有整数\ntable = {'Sjoerd': 4127, 'Jack': 4098, 'Dcab': 7678}\n\
    for name, phone in table.items():\n    print(f'{name} ==> {phone}')\n```\nSjoerd\
    \ ==> 4127\nJack ==> 4098\nDcab ==> 7678\n\n```\nIn [8]: # 在 ':' 后传递一个整数将使该字段成为最小字符宽度\n\
    table = {'Sjoerd': 4127, 'Jack': 4098,\n'Dcab': 7678}\nfor name, phone in table.items():\n\
    \    print(f'{name:10} ==> {phone:10}')\n```\n```\nSjoerd ==> 4127\nJack ==> 4098\n\
    Dcab ==> 7678\n```\n\n可以使用其他修饰符在格式化之前转换值。'!a' 应用 ascii()，'!s' 应用 str()，'!r' 应用\
    \ repr()：\n\n```\nIn [9]:   animals = 'eels'\n         print(f'My hovercraft is\
    \ full of {animals}.')\n         # 使用 `!r`\n\n         print(f'My hovercraft is\
    \ full of\n{animals!r}.')\n```\n```\nMy hovercraft is full of eels.\nMy hovercraft\
    \ is full of 'eels'.\n```\n\n有关这些格式规范及其更多细节的进一步参考，请参阅此链接上的格式规范迷你语言参考指南：https://docs.python.org/3.7/library/string.html#formatspec\n\
    \n#### 9.2.1.2 字符串 format() 方法\n\n**str.format()** 方法的基本用法如下所示：\n\n```\nIn [10]:\
    \ print('We are the {} who say \"{}!\"'.format('knights', 'Ni'))\n```\nWe are\
    \ the knights who say \"Ni!\"\n\n括号及其内部的字符（称为格式字段）将被替换为传递给 **str.format()** 方法的对象。括号中的数字可用于引用传递给\
    \ **str.format()** 方法的对象的位置。\n\n```\nIn [11]: print('{0} and {1}'.format('spam',\
    \ 'eggs'))\n        print('{1} and {0}'.format('spam', 'eggs'))\n```\nspam and\
    \ eggs eggs and spam\n\n如果在 **str.format()** 方法中使用关键字参数，则通过使用参数的名称来引用它们的值。\n\n\
    ```\nIn [12]: print('This {food} is {adjective}.'.format(food='spam',\n      \
    \  adjective='absolutely horrible'))\n```\nThis spam is absolutely horrible.\n\
    \n位置参数和关键字参数可以任意组合：\n\n```\nIn [13]: print('The story of {0}, {1}, and {other}.'.format('Bill',\n\
    \        'Manfred', other='Georg'))\n```\nThe story of Bill, Manfred, and Georg.\n\
    \n如果你有一个不想拆分的长格式字符串，如果你能按名称而不是按位置引用要格式化的变量，那就太好了。这可以通过简单地传递 **dict** 并使用方括号 '[]'\
    \ 来访问键来完成。\n\n```\nIn [14]: table = {'Sjoerd': 4127, 'Jack': 4098,\n         \
    \   'Dcab': 8637678}\n\n        print('Jack: {0[Jack]:d}; Sjoerd:\n        {0[Sjoerd]:d};\
    \ Dcab:\n        {0[Dcab]:d}'.format(table))\n```\n**Jack: 4098; Sjoerd: 4127;\
    \ Dcab: 8637678**\n\n你一定想知道，这些 **d** 在 : 后面是做什么的。它们将数据转换为你想要的**某种格式**，然后打印出来。观察这里代码的调整，并亲自看看结果的变化。\n\
    \n```\nIn [15]: table = {'Sjoerd': 4127, 'Jack': 4098,\n            'Dcab': 8637678}\n\
    \n        print('Jack: {0[Jack]:d}; Sjoerd:\n        {0[Sjoerd]:c}; Dcab:\n  \
    \      {0[Dcab]:b}'.format(table))\n```\n**Jack: 4098; Sjoerd: □; Dcab: 100000111100110011101110**\n\
    \n# 这里发生了什么？\n\n我不会直接给你答案。但如果你好奇，我会引导你到一个地方，在那里你不仅能得到答案，还能得到更多像上面那样的变体。\n\n访问\
    \ https://docs.python.org/3.7/library/string.html#formatspec\n\n现在继续原来的示例。\n\n\
    相同的输出也可以通过使用 '**' 符号将 table 作为关键字参数传递来完成。\n\n```\nIn [16]: table = {'Sjoerd':\
    \ 4127, 'Jack': 4098,\n            'Dcab': 8637678}\n\n        print('Jack: {Jack:d};\
    \ Sjoerd: {Sjoerd:d};\n        Dcab: {Dcab:d}'.format(**table))\n```\nJack: 4098;\
    \ Sjoerd: 4127; Dcab: 8637678\n\n这与内置函数 **vars()** 结合使用特别有用，该函数返回一个包含所有局部变量的字典。例如，以下几行生成一组整齐对齐的列，给出整数及其平方和立方：\n\
    \n```\nIn [17]: for x in range(1, 11): print('{0:2d} {1:3d}\n        {2:4d}'.format(x,\
    \ x*x, x*x*x))\n```\n1  1  1\n2  4  8\n3  9  27\n4  16  64\n5  25  125\n6  36\
    \  216\n7  49  343\n8  64  512\n9  81  729\n10 100 1000\n\n#### 9.2.1.3 手动字符串格式化\n\
    \n这是相同的平方和立方表，手动格式化：\n\n```\nIn [18]: for x in range(1, 11):\n            print(repr(x).rjust(2),\n\
    \            repr(x*x).rjust(3),repr(x*x*x).rjust(4))\n```\n```\n 1   1   1\n\
    \ 2   4   8\n 3   9  27\n 4  16  64\n 5  25 125\n 6  36 216\n 7  49 343\n 8  64\
    \ 512\n 9  81 729\n10 100 1000\n```\n（请注意，每列之间的一个空格是由 **print()** 的工作方式添加的：它总是在其参数之间添加空格。）字符串对象的\
    \ **str.rjust()** 方法通过在左侧填充空格，将字符串在给定宽度的字段中右对齐。还有类似的方法 **str.ljust()** 和 **str.center()**。这些方法不写入任何内容，它们只返回一个新字符串。\n\
    \n还有另一个方法 **str.zfill()**，它在数字字符串的左侧填充零。它理解加号和减号：\n\n```\nIn [19]: '12'.zfill(5)\n\
    ```\n```\nOut[19]: '00012'\n```\n```\nIn [20]: '-12'.zfill(5)\n```\n```\nOut[20]:\
    \ '-0012'\n```\n```\nIn [21]: '-3.14'.zfill(7)\n```"
