    ## 21.7 Text Formatting on Plot\n\nNow we will see how to format various text\
    \ elements on the plot. Matplotlib gives you unlimited scope to change the font\
    \ size, position(text location), annotation, color, etc of the various text elements\
    \ used on the plot. We will see a few of them in action now. They are particularly\
    \ useful in giving the final touch to the plot before saving it for publishing\
    \ or printing or sharing.\n\nMatplotlib has extensive text support, including\
    \ support for mathematical expressions, truetype support for raster and vector\
    \ outputs, newline separated text with arbitrary rotations and Unicode support.\
    \ Because it embeds fonts directly in output documents, e.g., for postscript or\
    \ PDF, what you see on the screen is what you get in the hardcopy.\n\n### 21.7.1\
    \ Basic Text commands\n\nThe following commands are used to create text in the\
    \ pyplot interface and the object-oriented API:\n\n| pyplot API | OO API | description\
    \ |\n|---|---|---|\n| text | text | Add text at an arbitrary location of the Axes.\
    \ |\n| Annotate | annotate | Add an annotation, with an optional arrow, at an\
    \ arbitrary location of the Axes. |\n| xlabel | set_xlabel | Add a label to the\
    \ Axes's x-axis. |\n| ylabel | set_ylabel | Add a label to the Axes's y-axis.\
    \ |\n| title | set_title | Add a title to the Axes. |\n| figtext | text | Add\
    \ text at an arbitrary location of the Figure. |\n| suptitle | suptitle | Add\
    \ a title to the Figure. |\n\nAll of these functions create and return a Text\
    \ instance, which can be configured with a variety of font and other properties.\
    \ The example below shows all of these commands in action.\n\n```python\nIn [13]:\
    \ fig = plt.figure() ax =\n    fig.add_subplot(111)\n    fig.subplots_adjust(top=0.85)\
    \ # Set titles\n    for the figure and the subplot respectively\n    fig.suptitle('bold\
    \ figure suptitle',\n    fontsize=14, fontweight='bold')\n    ax.set_title('axes\
    \ title')\n    ax.set_xlabel('xlabel')\n    ax.set_ylabel('ylabel') # Set both\
    \ x- and\n    y-axis limits to [0, 10] instead of default\n    [0, 1]\n    ax.axis([0,\
    \ 10, 0, 10]) ax.text(3, 8,\n    'boxed italics text in data coords',\n    style='italic',\
    \ bbox={'facecolor': 'red',\n    'alpha': 0.5, 'pad': 10}) ax.text(2, 6,\n   \
    \ r'an equation: $E=mc^2$', fontsize=15)\n    ax.text(3, 2, 'unicode: Institut\
    \ für\n    Festkörperphysik') ax.text(0.95, 0.01,\n    'colored text in axes coords',\n\
    \    verticalalignment='bottom',\n    horizontalalignment='right',\n    transform=ax.transAxes,\
    \ color='green',\n    fontsize=15) ax.plot([2], [1], 'o')\n    ax.annotate('annotate',\
    \ xy=(2, 1), xytext=\n    (3, 4), arrowprops=dict(facecolor='black',\n    shrink=0.05))\
    \ plt.show()\n```\n\nNow we will see some of these and some more options in our\
    \ bar chart which we started working upon.\n\n```python\nIn [14]: # Create the\
