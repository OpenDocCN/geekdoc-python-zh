    3.  编写一个程序，从用户那里接受一个日期（日、月和年），如果未提供合法值，则引发适当的错误。显示适当的消息，直到用户输入正确的值。

    4.  创建一个 **Person** 类，用于存储一个人的个人信息（由你选择）。确保在接受数据时，不正确的输入得到妥善处理。


    ## 13 模块和包


    ### 13.1 模块


    如果你退出 Python 解释器并再次进入，你所做的定义（函数和变量）将会丢失。因此，如果你想编写一个稍长的程序，最好使用文本编辑器（如记事本或其他任何文本编辑器软件）来准备解释器的输入，然后使用该文件作为输入来运行它。这被称为创建一个*脚本*。


    随着你的程序变长，你可能希望将其拆分为多个文件以便于维护。


    你还可能希望在多个程序中使用一个方便的函数，而不必将其定义复制到每个程序中。


    为了支持这一点，Python 提供了一种将定义放在文件中并在脚本或交互式解释器实例中使用它们的方法。这样的文件称为模块；模块中的定义可以导入到其他模块或主模块中（主模块是在顶层执行的脚本和计算器模式中你可以访问的变量集合）。


    #### 13.1.1 模块的定义：模块是包含 Python 定义和语句的文件。文件名是模块名加上后缀 .py。


    在编程中，模块是一段具有特定功能的软件。例如，在构建视频游戏时，一个模块负责游戏逻辑，另一个模块负责在屏幕上绘制游戏。每个模块都是一个不同的文件，可以单独编辑。


    在模块内部，模块的名称（作为字符串）作为全局变量 "**name**" 的值可用。例如，使用你最喜欢的文本编辑器（我使用标准的记事本）在当前目录中创建一个名为
    fibo.py 的文件，内容如下：


    提示：使用记事本时，使用扩展名 ".py" 并另存为 "所有文件" 而不是 "文本文档"。使用 ANSI 编码。


    ```

    In [1]: # Fibonacci numbers module def fib(n): # write Fibonacci series up to
    n a, b = 0, 1 while a < n: print(a, end='' '') a, b = b, a+b print() def fib2(n):
    # return Fibonacci series up to n result = [] a, b = 0, 1 while a < n: result.append(a)
    a, b = b, a+b return result

    ```


    现在让我解释一下我们刚才做了什么。


    我们创建了一个名为 "**fibo**" 的模块。


    这个模块 *fibo* 有两个用户定义的函数。本质上，我们也可以在这里定义函数 "**fib()**" 和 "**fib2()**"。但正如我之前所说，一旦我们关闭解释器，它们就会丢失。


    如果我们想定期使用这些函数怎么办？


    我们创建一个脚本，将其保存为 "文件名" 和文件扩展名 ".py"，然后瞧... 你的新模块就准备好了。随时可以使用。Python 有数千个内置模块，我们很快就会学到。同时，知道如何根据需要创建模块非常方便，经常用到。


    现在，在我们调用新模块来协助我们之前，让我们看看 "fib" 函数的作用，而不调用新创建的模块：


    ```

    In [2]:    fibo.fib(1000)

    ```


