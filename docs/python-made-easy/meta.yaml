    There are 3 types of Variables here.


    +   1. Public Protected Private When we name the variables in a python class,
    by nature they are **public** variables. e.g. **self.name = name** To make this
    **Protected** Variable, one _ is placed before the variable name. e.g **self._name
    = name**. The protected variable can be accessed by the subclasses of the superclass.


    To make this **Private** variable, two __ are placed before the variable name.
    eg. **self.__name = name**. The private variable can not be accessed by the subclasses
    of the superclass.


