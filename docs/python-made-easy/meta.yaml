  md: '# 1.3.8 Interpreter


    In computer programming, an interpreter is a computer program that directly executes
    instructions written in a programming language, without requiring them previously
    to have been compiled into a machine language program.


    Taking forward the earlier analogy, the letter you wrote to your friend in English,
    who understands only Hindi. Instead of translating the letter to Hindi, you send
    the English letter to him. He then, in turn, calls for an *Interpreter* to come
    to him, and explain the meaning of the letter to him, line by line. Every time,
    when wants to re-read the letter, he needs to call the *interpreter* to read the
    letter for him.


    This is essentially what computer interpreters do: they process your source code
    each times its run, line by line, and it''s required for the user to have the
    needed interpreter available on their machine.


    Some programming languages are known as Compiled languages, like C, C++, and Objective
    C. Some other programming languages are Interpreted languages, like PHP, JavaScript,
    etc.


    And then there are some programming languages, which use the combination of both.
    E.g. Python, Java, C#.


    # 1.3.8.1 Comparison between Compiler and Interpreter


    +   1) Both compilers and interpreters convert source code (text files) into Machine
    language. The basic difference is that a compiler system generates a stand-alone
    machine code program, while an interpreter system instead performs the actions
    described by the high-level program.'
