- md: "## Calendar widget\n\nThe PyQt5 widget `QCalendarWidget` offers a monthly calendar\
    \ view and allows users to select a date. Events, appointments, and other time-based\
    \ information can be displayed using the above widget. Numerous customization\
    \ options are available for the widget, including choosing the first day of the\
    \ week, specifying a minimum and maximum date range, and enabling or disabling\
    \ certain dates. Programmatic retrieval of the selected date or range is also\
    \ possible or through signals emitted by the widget.\n\n## Important properties\n\
    \nLet us explore some important properties now.\n\n### selectedDate\n\nThis property\
    \ view will hold the currently selected date, which must be within the `dateRange`\
    \ specified by the `minimumDate` and `maximumDate` property of `QCalendarWidget`\
    \ object. Refer to the following *Figure 9.22*:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_551_0.png)\n\
    \n**Figure 9.22:** *Image depicting selectedDate property of QCalendarWidget in\
    \ Qt Designer*\n\n### minimumDate\n\nThe minimum date of the currently specified\
    \ date range of **QCalendarWidget** object is held by this property. Refer to\
    \ the following *Figure 9.23*:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_552_0.png)\n\
    \n*Figure 9.23:* Image depicting minimumDate property of QCalendarWidget in Qt\
    \ Designer\n\n### maximumDate\n\nThe maximum date of the currently specified date\
    \ range of **QCalendarWidget** object is held by this property. Refer to the following\
    \ *Figure 9.24*:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_553_0.png)\n\n**Figure\
    \ 9.24:** Image depicting maximumDate property of QCalendarWidget in Qt Designer\n\
    \n### firstDayOfWeek\n\nThis property will get or set the first day of the week\
    \ in the QCalendarWidget object. Refer to the following Figure 9.25:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_553_1.png)\n\
    \n**Figure 9.25:** Image depicting firstDayOfWeek property of QCalendarWidget\
    \ in Qt Designer\n\n### gridVisible\n\nThis property will get or set the visibility\
    \ in the grid lines in the QCalendarWidget object. Refer to the following Figure\
    \ 9.26:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_553_2.png)\n\n**Figure 9.26:**\
    \ *Image depicting gridVisible property of QCalendarWidget in Qt Designer*\n\n\
    ### selectionMode\n\nThis property will hold the selection type the user can make\
    \ in the **QCalendarWidget** object. The user will be unable to select the dates\
    \ on **NoSelection** or can select a date within the minimum and maximum allowed\
    \ dates on **SingleSelection**. Refer to the following *Figure 9.27*:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_554_0.png)\n\
    \n**Figure 9.27:** *Image depicting selectionMode property of QCalendarWidget\
    \ in Qt Designer*\n\n### horizontalHeaderFormat\n\nThis property will get or set\
    \ the format of the horizontal header. Refer to the following *Figure 9.28*:\n\
    \n![](img/9ef0c0b339dea43dffe3f61f95760762_554_1.png)\n\n**Figure 9.28:** *Image\
    \ depicting horizontalHeaderFormat property of QCalendarWidget in Qt Designer*\n\
    \n### verticalHeaderFormat\n\nThis property will get or set the format of the\
    \ vertical header. Refer to the following *Figure 9.29*:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_554_2.png)\n\
    \n**Figure 9.29:** Image depicting verticalHeaderFormat property of QCalendarWidget\
    \ in Qt Designer\n\n### navigationBarVisible\n\nThis property will determine whether\
    \ the navigation bar is to be displayed or not in the QCalendarWidget object.\
    \ Refer to the following Figure 9.30:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_555_0.png)\n\
    \n**Figure 9.30:** Image depicting navigationBarVisible property of QCalendarWidget\
    \ in Qt Designer\n\n### dateEditEnabled\n\nThis property determines whether the\
    \ date edit popup is enabled or not. Refer to the following Figure 9.31:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_555_1.png)\n\
    \n**Figure 9.31:** Image depicting dateEditEnabled property of QCalendarWidget\
    \ in Qt Designer\n\n### dateEditAcceptDelay\n\nThis property specifies the time\
    \ delay (default value is 1500 in milliseconds) the date edit will remain active\
    \ following the most recent user input. The popup is closed once the time has\
    \ elapsed, thus accepting the date specified in the date edit. Refer to the following\
    \ Figure 9.32:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_555_2.png)\n\n**Figure\
    \ 9.32:** Image depicting dateEditAcceptDelay property of QCalendarWidget in Qt\
    \ Designer\n\n## Important methods/signals\n\nJust prepend the word *set* in the\
    \ properties of the above widget, and we will get the required methods. We will\
    \ discuss an important signal in this section.\n\n### selectionChanged()\n\nThis\
    \ signal is emitted when the user changes the currently selected date in the `QCalendarWidget`\
    \ object.\n\nNow, we shall see an example of `QCalendarWidget`.\n\nThe details\
    \ of file names are given in the following *Table 9.3*:\n\n| S No. | Qt Designer\
    \ file name (.ui) | Converting the QtDesigner file name to Python file (.py) |\
    \ Creating another file and importing converted Python file in Qt Designer |\n\
    | :--- | :--- | :--- | :--- |\n| 1. | calendarwidget_eg1.ui | calendarwidget_eg1.py\
    \ | run_calendarwidget_eg1.py |\n\n**Table 9.3:** Details of file names\n\nThe\
    \ Qt Designer file is shown in *Figure 9.33*:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_557_0.png)\n\
    \n**Figure 9.33:** Qt Designer file : CalendarWidget/calendarwidget_eg1.ui\n\n\
    > **Note:** The above .ui file is covered in Path: CalendarWidget/calendarwidget_eg1.ui\n\
    \nConsider the following code of run_calendarwidget_eg1.py:\n\n```python\nimport\
    \ sys\nfrom PyQt5.QtWidgets import QMainWindow, QApplication\nfrom calendarwidget_eg1\
    \ import *\n\nclass MyCalendarWidget(QMainWindow):\n    def __init__(self):\n\
    \        super().__init__()\n        self.myui = Ui_MainWindow()\n        self.myui.setupUi(self)\n\
    \n        # Connect the calendar's selectionChanged\n        # signal to the update_label\
    \ method\n        self.myui.calendarWidget.selectionChanged.connect(self.my_display_date)\n\
    \n        self.show()\n\n    # Define a method to set the label object text\n\
    \    # with the selected date\n    def my_display_date(self):\n        self.myui.mylbl.setText('Selected\
    \ date is: {}'.format(self.myui.calendarWidget.selectedDate().toString()))\n\n\
    if __name__ == \"__main__\":\n    app = QApplication(sys.argv)\n    screen = MyCalendarWidget()\n\
    \    screen.show()\n    sys.exit(app.exec_())\n```\n\n**Output:**\nRefer to the\
    \ following *Figure 9.34*:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_559_0.png)\n\
    \n**Figure 9.34:** Default output of CalendarWidget/run_calendarwidget_eg1.py\n\
    \n**Case:** When any date is selected from the QCalendarWidget object, the selected\
    \ date will be displayed in the label widget.\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_560_0.png)\n\
    \n**Figure 9.35:** Output of CalendarWidget/run_calendarwidget_eg1.py when any\
    \ date is selected from the QCalendar widget object\n\n> **Note:** The preceding\
    \ code is covered in program name: CalendarWidget/run_calendarwidget_eg1.py\n\n\
    ## LCD number\n\nThe PyQt5 widget `QLCDNumber` shows a numerical value in a seven-segment\
    \ LCD display. In GUI forms, it is commonly used to display numerical data, such\
    \ as sensor, timer, and other measurements. As a `QFrame` subclass, `QLCDNumber`\
    \ offers a number of methods and properties to control the LCD display’s appearance\
    \ and behavior.\n\n## Important properties\n\nLet us check some important properties\
    \ now.\n\n### smallDecimalPoint\n\nThis property will hold the decimal point style\
    \ of **QLCDNumber** object. The default value is **False**, indicating that the\
    \ decimal point is displayed as a large dot. When set to **True**, the decimal\
    \ point is displayed as a small dot. Refer to the following *Figure 9.36*:\n\n\
    ![](img/9ef0c0b339dea43dffe3f61f95760762_561_0.png)\n\n*Figure 9.36*: Image depicting\
    \ smallDecimalPoint property of QLCDNumber in Qt Designer\n\n### digitCount\n\n\
    This property will set the current number of digits displayed in the **QLCDNumber**\
    \ object. The default value is **5**. Refer to the following *Figure 9.37*:\n\n\
    ![](img/9ef0c0b339dea43dffe3f61f95760762_561_1.png)\n\n*Figure 9.37*: Image depicting\
    \ digitCount property of QLCDNumber in Qt Designer\n\n### mode\n\nThis property\
    \ will set the current display mode of the **QLCDNumber** object which can be\
    \ hexadecimal, decimal, octal or binary. The default value is **Dec**. Refer to\
    \ the following *Figure 9.38*:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_561_2.png)\n\
    \n*Figure 9.38*: Image depicting mode property of QLCDNumber in Qt Designer\n\n\
    ### segmentStyle"
  mdcn: "## 日历控件\n\nPyQt5 控件 `QCalendarWidget` 提供月历视图，并允许用户选择日期。可以使用上述控件显示事件、约会和其他基于时间的信息。该控件提供了众多自定义选项，包括选择一周的第一天、指定最小和最大日期范围，以及启用或禁用某些日期。可以通过编程方式检索选定的日期或范围，也可以通过控件发出的信号来实现。\n\
    \n## 重要属性\n\n现在让我们探讨一些重要的属性。\n\n### selectedDate\n\n此属性视图将保存当前选定的日期，该日期必须在 `QCalendarWidget`\
    \ 对象的 `minimumDate` 和 `maximumDate` 属性指定的 `dateRange` 内。请参考以下 *图 9.22*：\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_551_0.png)\n\
    \n**图 9.22：** *描绘 Qt Designer 中 QCalendarWidget 的 selectedDate 属性的图像*\n\n### minimumDate\n\
    \n此属性保存 **QCalendarWidget** 对象当前指定日期范围的最小日期。请参考以下 *图 9.23*：\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_552_0.png)\n\
    \n*图 9.23：* 描绘 Qt Designer 中 QCalendarWidget 的 minimumDate 属性的图像\n\n### maximumDate\n\
    \n此属性保存 **QCalendarWidget** 对象当前指定日期范围的最大日期。请参考以下 *图 9.24*：\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_553_0.png)\n\
    \n**图 9.24：** 描绘 Qt Designer 中 QCalendarWidget 的 maximumDate 属性的图像\n\n### firstDayOfWeek\n\
    \n此属性将获取或设置 QCalendarWidget 对象中一周的第一天。请参考以下图 9.25：\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_553_1.png)\n\
    \n**图 9.25：** 描绘 Qt Designer 中 QCalendarWidget 的 firstDayOfWeek 属性的图像\n\n### gridVisible\n\
    \n此属性将获取或设置 QCalendarWidget 对象中网格线的可见性。请参考以下图 9.26：\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_553_2.png)\n\
    \n**图 9.26：** *描绘 Qt Designer 中 QCalendarWidget 的 gridVisible 属性的图像*\n\n### selectionMode\n\
    \n此属性将保存用户在 **QCalendarWidget** 对象中可以进行的选择类型。用户在 **NoSelection** 模式下将无法选择日期，或者在\
    \ **SingleSelection** 模式下可以选择最小和最大允许日期范围内的一个日期。请参考以下 *图 9.27*：\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_554_0.png)\n\
    \n**图 9.27：** *描绘 Qt Designer 中 QCalendarWidget 的 selectionMode 属性的图像*\n\n###\
