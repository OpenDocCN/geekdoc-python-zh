    \ inside the class QWidget.\n- In RAP4, we are displaying the GUI form of 398\
    \ (width) by 229 (height) pixels at position (0,0) on the screen. It can be displayed\
    \ anywhere on the screen by changing the xpos and ypos which is at present set\
    \ at (0,0).\n- In RAP5, we are setting the title of our GUI form, that is, window\
    \ as *User Credentials App*.\n- In RAP6, we are creating a QLabel object `mylbl1`\
    \ for using in our GUI form and passing the text as **Enter your username:** and\
    \ **self** as parameters, whose default display will be at the top left position.\n\
    - In RAP7, we are creating an instance of `QFont` class and setting the QLabel\
    \ object `mylbl1` font family as Calibri, font size as 10, and font-weight as\
    \ Bold. For boldness control to be fine, we have set weight as 75.\n- In RAP8,\
    \ the QLabel object `mylbl1` is placed at position 14 pixels towards the right\
    \ and 50 pixels below from (0,0).\n- In RAP9, we are creating a QLabel object\
    \ `mylbl2` to use in our GUI form and passing the text **Enter your password:**\
    \ and self as parameters.\n- In RAP10, we are creating an instance of `QFont`\
    \ class and setting the QLabel object `mylbl2`, font family as Calibri, font size\
    \ as 10, and font weight as Bold. For boldness control to be fine, we have set\
    \ weight as 75.\n- In RAP11, the QLabel object `mylbl2` is placed at position\
    \ 14 pixels towards the right and 120 pixels below from (0,0).\n- In RAP12, we\
    \ are creating a QLineEdit object `mylineedit1` whose default display will be\
    \ at the top left position.\n- In RAP13, the QLineEdit object `mylineedit1` is\
    \ placed at position 210 pixels towards the right and 50 pixels below from (0,0).\n\
    - In RAP14, we are creating a QLineEdit object `mylineedit2` whose default display\
    \ will be at the top left position.\n- In RAP15, the QLineEdit object `mylineedit2`\
    \ is placed at position 210 pixels towards the right and 120 pixels below from\
    \ (0,0).\n- In RAP16, we are creating an instance of QPushButton object `mybtn`\
    \ whose default display will be at the top left position, and passing a parameter\
    \ self indicates that the pushbutton is part of the GUI form.\n- In RAP17, the\
    \ text for the QPushButton object mybtn is set as Confirm and will get displayed\
    \ on the GUI form.\n- In RAP18, the QPushButton object mybtn is placed at position\
    \ 140 pixels towards the right and 180 pixels below from (0,0).\n\nAbsolute positioning\
    \ is quite simple but there are some limitations, such as the follows:\n\n- The\
    \ widget’s size and position will not be changing even if the GUI form will be\
    \ resized. Refer to Figure 2.3:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_72_0.png)\n\
    \n**Figure 2.3:** *Intact position of widgets on resizing*\n\nWe can see from\
    \ Figure 2.3, that even on resizing the GUI form, the widget’s size and position\
    \ are still the same.\n\n- If we are creating any application using absolute positioning,\
    \ the layout may be different on various platforms.\n- In some cases, there may\
    \ be requirements of redesigning the form. In such cases, layout modification\
    \ will be tedious and time-consuming.\n\nThe reader should understand the concepts\
    \ of absolute positioning, before knowing about widgets placement using layout\
    \ classes.\n\n## Widgets placement using layout classes\n\nAPI of PyQt5 has a\
    \ more elegant way of widgets positioning by providing layout classes which we\
    \ will learn in subsequent sections.\n\n## QBoxLayout\n\nSuppose in our application,\
    \ there is a requirement to organize or arrange widgets either horizontally or\
    \ vertically. In such cases, we will use **QBoxLayout** class. The two basic layout\
    \ management classes for arranging the widgets either horizontally or vertically\
    \ are **QHBoxLayout** and **QVBoxLayout**. First, we will see the code for arranging\
    \ the widgets in a row, side-by-side, using **QHBoxLayout** with the usage of\
