    # 献词


    献给我的父母

    **Dr. Surendra Kumar Chandrakar** 和 **Smt. Bhuneshwari Chandrakar**

    兄弟

    **Shri Pranav Chandrakar,**

    嫂子

    **Smt. Silky Chandrakar**

    献给我的妻子

    **Smt. Priyanka Chandrakar**

    以及我可爱的儿子

    **Master Yathartha Chandrakar**

    - Saurabh Chandrakar


    献给我的父母

    **Smt. Kamal B. Bahadure** 和 **Late Bhaskarrao M. Bahadure**

    献给我的岳父母

    **Smt. Saroj R. Lokhande** 和 **Shri Ravikant A. Lokhande**

    以及我的妻子

    **Shilpa N. Bahadure**

    以及美丽的女儿们

    > **Nishita** 和 **Mrunmayee**

    以及我所有的亲爱的学生们

    - Dr. Nilesh Bhaskarrao Bahadure


    # 关于作者


    - **Saurabh Chandrakar** 是**印度重型电力设备有限公司**（BHEL）海得拉巴分部的研发工程师（副经理）。他获得了BHEL海得拉巴运营部门最佳执行奖。最近，他因其在电力变压器冗余复合监测系统项目中的工作，获得了享有盛誉的BHEL卓越奖（Anusandhan类别）。他拥有23项版权和3项已授权专利。此外，他还提交了4项专利申请。此外，他在知名出版机构出版了5本书，包括BPB新德里（*《使用Python的编程技术》、《人人皆可用的Python》、《使用tkinter和python构建现代图形用户界面》*）、Scitech
    Publications金奈（*《使用matlab的编程技术》*）和IK International出版社（*《微控制器与嵌入式系统设计》*）。此外，他还推出了一门BPB视频课程，题为“*首次玩转基础与高级Python概念，以及针对不同Python认证考试的完整指南，尽在一本手册中。*”


    - **Dr. Nilesh Bhaskarrao Bahadure** 于2000年获得印度布巴内斯瓦尔KIIT大学（被认定为大学）电子工程学士学位，2005年获得数字电子学硕士学位，2017年获得电子学博士学位。他目前是印度马哈拉施特拉邦浦那西孟加拉国际大学（被认定为大学）（SIU）那格浦尔分校Symbiosis技术学院（SIT）计算机科学与工程系的副教授。他拥有超过20年的经验。Bahadure博士是IE(I)、IETE、ISTE、ISCA、SESI、ISRS和IAENG等专业组织的终身会员。他在知名国际期刊和会议上发表了40多篇文章，并出版了五本书。他是许多索引期刊的审稿人，如IEEE
    Access、IET、Springer、Elsevier、Wiley等。他的研究兴趣领域包括传感器技术、物联网和生物医学图像处理。


    # 关于审稿人


    **Prasenjeet Damodar Patil** 目前在浦那M.I.T A.D.T大学计算学院担任副教授。他完成了印度桑格利Walchand工程学院的电子与通信工程学士学位和电子学硕士学位。他于2018年获得电子与通信工程博士学位。Prasanjeet拥有超过14年的教学经验，并在知名期刊上发表了16篇以上论文。他的研究兴趣包括计算电磁学在集成光学、物联网和数字图像处理中的应用。


    # 致谢


    - 首先，我要感谢大家选择本书。本书是为初学者读者编写的。首先，我借此机会向我的导师“Prof. Nilesh Bahadure Sir”致以问候和感谢，感谢他激励我，并始终就Python相关主题充分传达他的专业知识。我非常感谢能成为他的门生。我感谢他对我的信任，始终支持我并推动我取得更多成就。他总是提醒我“千里之行，始于足下”这句话。


    我的父母Dr. Surendra Kumar Chandrakar和Smt. Bhuneshwari Chandrakar，我的兄弟Shri Pranav
    Chandrakar，我的嫂子Silky Chandrakar，我挚爱的妻子Mrs. Priyanka Chandrakar，我可爱的儿子Yathartha
    Chandrakar，以及我所有的朋友们，多年来一直激励着我并给予我信心。最后但同样重要的是，我要向BPB Publications的工作人员表示诚挚的感谢，感谢他们的贡献和见解，使本书的部分内容得以实现。


    — Saurabh Chandrakar


    - 我很荣幸能感谢浦那西孟加拉国际大学校长Dr. S. B. Mujumdar，以及比莱Beekay Industries和BIT Trust主席Shri.
    Vijay Kumar Gupta，感谢他的鼓励和支持。我感谢我的导师，布巴内斯瓦尔KIIT大学（被认定为大学）电子工程学院院长Dr. Arun Kumar
    Ray，以及苏拉特SVNIT的Dr. Anupam Shukla。我要感谢Symbiosis协会首席董事、浦那西孟加拉国际大学副校长Dr. Vidya Yeravdekar，浦那西孟加拉国际大学副校长Dr.
    Ramakrishnan Raman，浦那西孟加拉国际大学工程学院院长Dr. Ketan Kotecha，以及那格浦尔SIT的Dr. Nitin Rakesh，感谢他们在本书编写过程中给予的建议和鼓励。


    我还要感谢戈尔哈布尔SGU航空工程系主任Dr. Sanjeev Khandal，我的好友、浦那MIT ADT大学副教授Dr. Prasenjeet D. Patil，以及那格浦尔Symbiosis技术学院的同事们，感谢他们在整个项目中提供的宝贵建议和大量鼓励。


    我感谢泰米尔纳德邦坦贾武尔SASTRA大学高级助理教授Prof. Dr. N. Raju，感谢他在写作过程中的支持、协助以及宝贵的建议。


    我还要感谢比尔布尔BIT高级副教授Dr. Ravi M. Potdar和赖布尔BIT副教授Dr. Md. Khwaja Mohiddin，感谢他们在整个项目中提供的宝贵建议和鼓励。编写一本精美、平衡且内容丰富的书籍并非一两天或一个月的工作；它需要大量的时间、耐心以及数小时的辛勤工作。非常感谢我的家人、我的父母、妻子、孩子和亲友们，感谢他们的亲切支持。没有他们以及他们的信任和支持，编写这本经典著作将只是一个梦想。我也要感谢我的学生们，他们总是'
