- md: "## CHAPTER 2\nGetting Insights of Layout Management\n\n## Introduction\n\n\
    Any application can be created by just dragging and dropping the widgets in our\
    \ GUI form from the widget box of Qt Designer. It may look good when we are using\
    \ multiple widgets on the same GUI form and creating an application. We can place\
    \ the widgets in any location on the GUI form, without giving a notion of their\
    \ appearance. However, it may look shabby if we do not place it in a proper location\
    \ on the GUI form, with any arrangement of widgets. Such an arrangement leads\
    \ to the concept of layout management; an approach to place the widgets on our\
    \ GUI form. All professional GUI application forms creation uses the concept of\
    \ layout managers as it is important for the user to create an application with\
    \ a nice look. If we want to organize our widgets, the preferred approach is to\
    \ manage the layout with layout managers. Therefore, whenever there is a requirement\
    \ to arrange widgets on a GUI form, we will use the methods present inside the\
    \ class of layout manager. The space between parent and child widgets can be properly\
    \ utilized in a GUI form and is useful for communicating between them.\n\nLet\
    \ us start learning the different ways for layout management in PyQt5. We will\
    \ be creating the same application user credentials app (*appearance only*) but\
    \ now, with the usage of the concept of layouts.\n\n## Structure\n\nIn this chapter,\
    \ we will learn the following topics:\n\n- Widgets placement using absolute positioning\n\
    - Widgets placement using layout classes\n  - QHBoxLayout\n    - QHBoxLayout\n\
    \    - QVBoxLayout\n  - QGridLayout\n    - Basic QGridLayout\n    - QGridLayout\
    \ Span\n    - QGridLayout Stretch\n  - QFormLayout\n\n## Objectives\n\nAfter studying\
    \ this chapter, the reader will learn about widgets placement using absolute positioning\
    \ approach. Then, we shall see widgets placement using layout classes, beginning\
    \ with learning how to organize widgets either horizontally or vertically using\
    \ **QBoxLayout** class. We will also explore how to arrange the widgets in a row,\
    \ side-by-side using **QHBoxLayout** with the usage of methods viz **addStretch**,\
    \ **addWidget**, **addLayout**. Alternatively, we will also look into arranging\
    \ the widgets vertically with **addStretch** method using **QVBoxLayout**. Then,\
    \ we shall look into arranging widgets in a grid of rows and columns using **QGridLayout**.\
    \ Finally, we will look into creating an application using **QFormLayout**. In\
    \ the end, we can confidently create “User Credential App” application using absolute\
    \ positioning , **QBoxLayout**, **QGridLayout** and **QFormLayout** class.\n\n\
    **Figure 1.19:** *When username is empty*\n\nThe control will be then returned\
    \ after clicking the **ok** button. This message on the new window is possible\
    \ due to QMessageBox widget.\n\nIn RUCA8, we are then checking whether text inside\
    \ `lineEdit_password` is empty or not. This indicates that `lineEdit_username`\
    \ is not empty. If `lineEdit_password` is empty, then the message **Password cannot\
    \ be empty!** is displayed as informative text in a new window, on clicking the\
    \ **Confirm** button, as shown in *Figure 1.20*:\n\n**Figure 1.20:** *When password\
    \ is empty*\n\nWe can see that the text `hello` is written in `lineEdit_username`\
    \ widget. The control will be then returned after clicking the **ok** button.\n\
    \nIn RUCA9, we are checking whether text of `lineEdit_username` and `lineEdit_password`\
    \ matches or not. If it matches, then the text with **Welcome** message will pop\
    \ up in new window, as shown in *Figure 1.21*:\n\n**Figure 1.21:** *When username\
