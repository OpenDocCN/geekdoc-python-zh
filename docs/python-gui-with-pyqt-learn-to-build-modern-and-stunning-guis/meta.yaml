    ## Introduction


    After discussing button widgets, we shall now move on to our next topic, which
    is about Item Views in Qt Designer. There has to be some approach for accessing,
    managing, and displaying the data to the user. So, based on the software design
    pattern of **Model-View-Controller (MVC)**, PyQt5 utilizes the same architecture
    of Model/View. The data from the data source will be accessed by the model and
