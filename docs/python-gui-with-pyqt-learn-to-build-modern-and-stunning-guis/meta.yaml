    # # QFormLayout


    Whenever there is a requirement to create an application in 2-column form where
    each row consists of a label (first column) associated with an entry field (second
    column), then we can use QFormLayout. An important overloaded method which is
    most commonly used in QFormLayout, will be the addRow() method, which is described
    as follows:


    +   - addRow(QLabel, QWidget): This method will add a row containing the label
    and its widget in the second column.

    - addRow(QWidget): This method will add a row containing the widget spanning 2
    columns and stretching it to a GUI form.

    - addRow(QLayout): This method will add a specified layout spanning both columns,
    or we can say that it will be used for nesting the layouts.

    - addRow(QLabel, QLayout): This method will add a row containing the label and
    its child layout in the second column.'
