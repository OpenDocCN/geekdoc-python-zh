    \ and importing the converted Python file from Qt Designer |\n|---|---|---|---|\n\
    | 1 | checkbutton_eg1.ui | checkbutton_eg1.py | run_checkbutton_eg1.py |\n\n**Table\
    \ 4.5:** Details of the file names\n\nThe Qt Designer file `checkbutton_eg1.ui`\
    \ is shown in the following figure:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_212_0.png)\n\
    \n**Figure 4.34:** Qt Designer file: checkbutton_eg1.ui\n\n> **Note:** The above\
    \ .ui file is covered in Path: Check_Box_Button/checkbutton_eg1.ui.\n\nConsider\
