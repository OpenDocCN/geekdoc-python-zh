    # Table view


    A table view is implemented to display items from a model using `QTableView`.
    It is one of the Model/View frameworks of PyQt5. To show data provided by models
    derived from the `QAbstractItemModel` class, `QTableView` implements the interfaces'
  - '[PAGE 280]


    defined by the `QAbstractItemView` class. The `QTableView` widget from PyQt5 will
    be used to build spreadsheets and tables. The rows and columns will be creating
    the Tables. Cells are formed where rows and columns intersect. The `TableView`
    widget allows editing and interaction with each cell. The table view receives
    instructions on how to populate and format the table cells from the `rowCount()`,
    `columnCount()`, and `data()` methods for the item model.


    # Important properties


    Let us now check some important properties.


    # showGrid


    This property will decide whether the grid is to be displayed or not. The grid
    will be drawn when checked, or else there will be no grid. The default value is
    set to **True**. Refer to the following *Figure 5.30*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_280_0.png)


    **Figure 5.30:** *Image depicting showGrid property of QTableView widget in Qt
    Designer*


    # gridStyle


    The pen style is set for drawing the grid using the `gridStyle` property. From
    the list of options shown in the following *Figure 5.31*, the user may choose
    any option:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_280_1.png)


    **Figure 5.31:** *Image depicting gridStyle property of QTableView widget in Qt
    Designer*'
  - '[PAGE 281]


    # sortingEnabled


    The default value is unchecked, which means sorting is disabled for the `QTableView`
    widget. When checked, the sorting will be enabled. Refer to the following *Figure
    5.32*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_281_0.png)


    *Figure 5.32*: Image depicting sortingEnabled property of QTableView widget in
    Qt Designer


    # wordWrap


    The default value is **True** indicating that the item text will be wrapped at
    necessary word breaks, and otherwise not. Refer to the following *Figure 5.33*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_281_1.png)


    *Figure 5.33*: Image depicting wordWrap property of QTableView widget in Qt Designer


    # cornerButtonEnabled


    The default value is **True**, indicating that the top-left corner button will
    be enabled. When clicked, all the cells in the `QTableView` widget will be selected.
    Refer to the following *Figure 5.33*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_281_2.png)


    *Figure 5.34*: Image depicting cornerButtonEnabled property of QTableView widget
    in Qt Designer


