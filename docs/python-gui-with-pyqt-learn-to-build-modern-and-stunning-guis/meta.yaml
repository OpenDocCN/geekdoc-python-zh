- md: "## Conclusion\n\nIn this chapter, we learned how to arrange the widgets using\
    \ absolute positioning and layout classes. We saw different approaches of creating\
    \ “User Credential App” application using absolute positioning, **QBoxLayout**,\
    \ **QGridLayout** and **QFormLayout** Class.\n\nThis chapter is important to understand,\
    \ since in forthcoming chapters, we will be displaying multiple applications using\
    \ all these concepts. We will write the code on how to arrange the widgets by\
    \ applying drag and drop of widgets from Widget Box and using toolbar icons to\
    \ arrange the layouts for creating our application.\n\n## Points to remember\n\
    \n- We can position the widgets in a GUI form using the absolute positioning approach\
    \ with help of the `move(x,y)` method.\n- We can arrange the widgets either horizontally\
    \ or vertically using `QBoxLayout` class. The widgets can be arranged in a row\
    \ side by side using `QHBoxLayout` with the usage of methods viz `addStretch`,\
    \ `addWidget`, `addLayout`.\n- An empty stretchable box can be created using `addStretch`\
    \ method.\n- The widgets can be arranged in a grid of rows and columns using `QGridLayout`.\n\
    - The default value of rowspan and colspan is 1 in `QGridLayout` span.\n- `setColumnStretch`\
    \ and `setRowStretch` will generally focus on the stretch factor of column/row.\n\
    - Using `QFormLayout`, we can create an application in 2-column form where each\
    \ row consists of a label (first column) associated with an entry field (second\
    \ column).\n\n## Questions\n\n1. Enlist the importance of layout management in\
    \ GUI designing.\n2. Draw and explain the coordinate system of GUI form using\
    \ absolute positioning.\n3. Explain in detail, widgets placement using absolute\
    \ positioning.\n4. Explain in detail the placement of the widget using layout\
    \ classes.\n5. Explain the following:\n    a. QHBoxLayout\n    b. QHBoxLayout\n\
    \    c. QHBoxLayout with addstretch\n    d. QVBoxLayout\n    e. QGridLayout\n\
    \    f. QFormLayout\n\n## Join our book’s Discord space\n\nJoin the book's Discord\
    \ Workspace for Latest updates, Offers, Tech happenings around the world, New\
    \ Release and Sessions with the Authors:\nhttps://discord.bpbonline.com\n\n# CHAPTER\
    \ 3\nGetting Insights of Events,\nSignals and Slots\n\n## Introduction\n\nPyQt5,\
    \ a Python framework for desktop application development, relies on the concept\
    \ of events, signals, and slots to create interactive user interfaces. Events\
    \ are fundamental to this system, representing user actions (like button clicks\
    \ or keyboard input) and system events. Signals act as intermediaries, informing\
    \ the application when a particular event occurs. Meanwhile, slots are functions\
    \ or methods connected to signals, defining the application’s response to those\
    \ events. By linking signals to slots, developers can precisely control how their\
    \ applications react to user interactions and other events, ultimately enabling\
    \ the creation of dynamic, responsive, and user-friendly desktop applications\
    \ in Python. This understanding is crucial for both beginners and experienced\
    \ PyQt5 developers, empowering them to build applications that seamlessly adapt\
    \ to user actions and system changes.\n\n## Structure\n\nIn this chapter, we will\
    \ discuss the following topics:\n\n- Introduction to Events, Signals and Slots\n\
    - Usage of Toolbar icons in Qt Designer\n- Signal slot examples in Qt Designer\n\
    \n## Objectives\n\nAfter reading this chapter, the reader will get to know about\
    \ Events, Signals, and Slots in PyQt5, and creating useful desktop applications\
    \ using these concepts. Firstly, we shall see a GUI form application creation\
    \ in Qt Designer by tracking the mouse movements. We will change the background\
    \ color of the **QPushButton** widget by tracking the left and right mouse clicks.\
    \ Various examples will be shown of how a signal is linked to a slot, in order\
    \ to create a simple user interface application by toying with **QPushButton**\
    \ widget. Finally, we shall see how connections can be created with an object,\
    \ signals, and slots for layouts and widgets, which can be connected using Edit\
    \ Signals/Slots with various case study examples. So, in this chapter, we will\
    \ be dealing exclusively with various events, signals, and slot concepts. Moreover,\
    \ we will be learning signal/slot editor usage in Qt Designer.\n\n## Introduction\
    \ to Events, Signals, and Slots\n\nAny GUI application created using widgets will\
    \ act as an event source. In response to at least one event, every widget is designed\
    \ in such a way that it will emit a signal. To explain in simpler terms, when\
    \ user interaction with the widget will occur, then the notifications will pop\
    \ out from the widgets. However, it is not a rule. In addition, it may also send\
    \ data about what happened. To perform any action, as the signal itself is not\
    \ enough, it must be connected to a slot. In a GUI application, the slot must\
    \ be connected to a signal. Any function or method can be used in a GUI application\
    \ as a slot. We can also say that it is used for the signal receiver. There are\
    \ various built-in slots by many PyQt5 widgets, which we will learn while creating\
    \ applications.\n\nLet us first see the most common event that every widget may\
    \ experience. It is related to the mouse. Let us try to use our mouse, prompting\
    \ some action to perform on either, by using left click, right-click, hover, and\
    \ so on?\nWe are creating a GUI form using Qt Designer with the file name **MouseEvents_Eg1.ui**\
    \ as shown in the following *Figure 3.1*:\n\n*Figure 3.1*: Qt Designer file: MouseEvents_Eg1.ui\n\
    \n> **Note:** The above .ui file is covered in Path:\n**MouseEvents_Eg1_files/MouseEvents_Eg1.ui**\n\
    \nWe will then convert this .ui file into a Python .py file using the following\
    \ command:\n\n```\npyuic5 MouseEvents_Eg1.ui -o MouseEvents_Eg1.py\n```\n\n> **Note:**\
    \ The .ui and .py files of every example discussed in the chapter, will be available\
    \ in the code bundle. Only the Python code of the file name preceding run_ will\
    \ be displayed with comments at the important line for discussion.\n\nAnother\
    \ Python file has been created with the name **run_MouseEvents_Eg1.py** as follows:\n\
    \n```python\nimport sys\n\nfrom PyQt5.QtWidgets import QMainWindow, QApplication\n\
    # RME_1\n\nfrom MouseEvents_Eg1 import *# RME_2\n\nfrom PyQt5.QtCore import Qt\n\
    \nclass MyMainWindow(QMainWindow):\n    def __init__(self):\n        super().__init__()\n\
    \        self.myui = Ui_MouseEvents_Eg1()\n        self.myui.setupUi(self)\n \
    \       self.setMouseTracking(True)# RME_3\n        self.myui.hover_mouse_btn_2.leaveEvent\
    \ = lambda e:\n            self.myui.hover_mouse_btn_2.setStyleSheet(\"background-color\
