  md: 'help of Property Editor apply layouts to widgets, apply spacers, and so on.


    +   2. **Edit Signals/Slots**: In **Edit Signals/Slots**, connections can be created
    with an object, and signals and slots for layouts and widgets can be connected.
    If the above icon is clicked, **Widget Box** is disabled, and on clicking on the
    Edit widgets, the **Widget Box** will be enabled again. With the help of the simple
    signals and slots mechanism in Qt, the objects in a GUI form can be connected.


    +   3. **Edit Buddies**: In **Edit** Buddies, we are starting the connections
    at label widgets as the widgets in a GUI form will be similar to the editing mode
    of signals and slots. Here, each `label` widget providing a shortcut should be
    connected with an input widget like `QTextEdit` or `QLineEdit`. It is important
    to know that for each label, only one buddy connection can be defined.


    Next to **Edit** buddies, is the **Edit Tab Order** (one highlighted in a transparent
    rectangular box), which will be used if there is a requirement to set the order
    for focusing widgets on pressing the *Tab* key as per ease of requirement.


