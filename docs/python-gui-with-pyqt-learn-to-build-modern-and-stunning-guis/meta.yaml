  md: '# About the Authors


    +   - **Saurabh Chandrakar** is a Research & Development Engineer (Dy. Manager)
    at **Bharat Heavy Electricals Limited** (BHEL) Hyderabad. He is the winner of
    the best executive award on Operations Division by BHEL Hyderabad. Recently, he
    has been awarded the prestigious BHEL Excellence Award under Anusandhan category
    for Redundant Composite Monitoring System of Power Transformers project. He has
    23 copyrights and 3 patent granted. Additionally, he has 4 patents filed. Moreover,
    he has published 5 books in reputed publications such as BPB New Delhi (*Programming
    Techniques using Python, Python for everyone. Building Modern GUIs with tkinter
    and python*), Scitech Publications Chennai (*Programming Techniques using matlab*)
    and IK International publishers (*Microcontrollers and Embedded System Design*).
    Additionally, he has also launched one video course on BPB titled “*First Time
    Play with Basic, Advanced Python concepts and complete guide for different python
    certification exams all in one umbrella.*”


    +   - **Dr. Nilesh Bhaskarrao Bahadure** received the Bachelor of Engineering
    degree in Electronics Engineering in 2000, the Master of Engineering degree in
    Digital Electronics in 2005, and the Ph.D. degree in Electronics in 2017 from
    KIIT Deemed to be University, Bhubaneswar, India. He is currently an'
  merge: -1
  pgno: 7
- img_proc: true
  md: Associate Professor in the Department of Computer Science and Engineering at
    Symbiosis Institute of Technology (SIT), Nagpur, Symbiosis International (Deemed
    University) (SIU), Pune, Maharashtra, India. He has more than 20 years of experience.
    Dr. Bahadure is a life member of IE(I), IETE, ISTE, ISCA, SESI, ISRS, and IAENG
    professional organizations. He has published more than 40 articles in reputed
    international journals and conferences, and has five books to his credit. He is
    the reviewer of many indexed journals such as IEEE Access, IET, Springer, Elsevier,
    Wiley and so on. His research interests are in the areas of Sensor Technology,
    the Internet of Things, and Biomedical Image Processing.
  merge: -1
  pgno: 8
- img_proc: true
  md: '# # About the Reviewer


    **Prasenjeet Damodar Patil** is currently working as an Associate Professor at
    the School of Computing, M.I.T A.D.T University, Pune. He has completed his B.E.
    in E&TC Engg. and M. Tech. in Electronics from Walchand College of Engineering
    Sangli, India. He did his Ph.D. in E&TC Engineering in 2018. Prasanjeet has 14+
    years of teaching experience and has published more than 16 papers in reputed
    Journals. His research interest includes Computational Electromagnetics applications
    in Integrated Optics, IoT, and digital Image Processing.'
