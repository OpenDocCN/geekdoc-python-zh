  md: '# Important properties


    Apart from the properties of 3 classes (QObject, QWidget and QAbstractButton),
    there are some other properties of the QToolButton widget, and they are explained
    as follows:


    # popupMode


    Refer to the following *Figure 4.12*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_188_0.png)


    *Figure 4.12*: Image depicting popupMode property of QToolButton widget in Qt
    Designer


    Using this property, a menu containing a menu set or some action list will be
    described as well as how it will pop up for Tool Buttons. There are 3 constants:


    +   - **DelayedPopup**: Here, the menu will be displayed on first pressing and
    then holding the Tool Button widget down for some time duration. One of the common
    examples we see is the usage of the back button in the web browser where a menu
    depicting the current history list will be displayed, if the user will press and
    then hold the button down. This is the default value to be displayed.

    - **MenuButtonPopup**: If we use this constantly, then a special arrow is displayed
    in the Tool Button widget indicating that a menu is present and will be displayed
    on pressing the arrow part of the button.

    - **InstantPopup**: If we use this constantly, then the menu will be displayed
    instantly with no delay on pressing the Tool Button widget.'
