    # Plain Text Edit


    QPlainTextEdit widget is a multi-line text editor that makes it simple to view
    and edit plain text in PyQt5. Line numbers, text wrapping, undo/redo, and copy/paste
    are among the few features it offers. The setPlainText() method can be used to
    style the text, and the toPlainText() method can be used to retrieve it. If there
    is an application requirement to display plain text content, then we need to use
    the QPlainTextEdit widget. Otherwise, if there is a requirement to display formatted
    text, use QTextEdit widget.


    # Important properties


    Maximum properties are similar to that of the Text Edit widget. The other extra
    properties are explained in the following section.


    # plainText


    This property will hold the plain text displayed in the QPlainTextEdit object.
    The text displayed in the QPlainTextEdit can be either get or set using this property.
    By default, this object contains an empty string. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_470_0.png)


    Figure 8.63: Image depicting plainText property of QPlainTextEdit in Qt Designer'
  - '[PAGE 471]


    # maximumBlockCount


    This property will determine the maximum number of blocks visible in the `QPlainTextEdit`
    object. An unlimited number of blocks can be contained by the `QPlainTextEdit`
    object if the value is set as **0** or **-1**. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_471_0.png)


    *Figure 8.64: Image depicting maximumBlockCount property of QPlainTextEdit in
    Qt Designer*


    # backgroundVisible


    This property determines whether the palette background is visible outside of
    the document area. The default value is **False**. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_471_1.png)


    *Figure 8.65: Image depicting backgroundVisible property of QPlainTextEdit in
    Qt Designer*


    # centerOnScroll


    This property will determine whether the cursor will be centered on the screen
    when `QPlainTextEdit` object is scrolled. The default value is **False**. The
    text will always be seen in the middle of the widget if the value is **True**,
    which centers the view. When the value is set to **False**, the view scrolls normally
    and the text moves up or down as the widget is scrolled. Refer to the following
    figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_471_2.png)


    *Figure 8.66: Image depicting centerOnScroll property of QPlainTextEdit in Qt
    Designer*


