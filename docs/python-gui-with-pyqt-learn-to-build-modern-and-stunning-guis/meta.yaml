    # LCD number


    The PyQt5 widget `QLCDNumber` shows a numerical value in a seven-segment LCD display.
    In GUI forms, it is commonly used to display numerical data, such as sensor, timer,
    and other measurements. As a `QFrame` subclass, `QLCDNumber` offers a number of
    methods and properties to control the LCD display’s appearance and behavior.


    # Important properties


    Let us check some important properties now.


    # smallDecimalPoint'
