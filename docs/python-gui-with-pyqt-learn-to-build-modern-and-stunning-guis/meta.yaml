    column to sort by.


    +   - `takeTopLevelItem(index)`: This method is used to remove an item from the
    `QTreeWidget` object at the specified index parameter and return it. Otherwise,
    it will return `None`. The index parameter is the index of the item to be removed.

    - `setColumnCount(columns)`: The number of columns displayed in the `QTreeWidget`
    object is specified using this method.


    # Important signals


    Some signals are as follows:


    +   - `itemActivated(item,column)`: When an item is activated (double-clicked
    or pressed when the *Enter* key is pressed), this signal is emitted. The item
    parameter is the activated item and the column parameter is the column of the
    item.

    - `itemChanged(item,column)`: When an item''s data has been changed, this signal
    is emitted. The item parameter is the changed item and the column parameter is
    the column of the item.

    - `itemClicked(item,column)`: When an item is clicked, this signal is emitted.
    The item parameter is the clicked item and the column parameter is the column
    of the item.

    - `itemCollapsed(item)`: When an item is collapsed (its children are hidden),
    this signal is emitted. The item parameter is the collapsed item.

    - `itemDoubleClicked(item,column)`: When an item is double-clicked, this signal
    is emitted. The item parameter is'
