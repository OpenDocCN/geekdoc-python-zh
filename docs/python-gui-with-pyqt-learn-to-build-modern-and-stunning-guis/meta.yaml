    # sizeAdjustPolicy


    Using this property, we can set the policy on how the scroll area size changes
    when the view port size is changed. The default value is **AdjustIgnored**. Refer
    to the following [Table 5.7](#table-57):


    | S No. | Different sizeAdjustPolicy constants | Description |

    | :--- | :--- | :--- |

    | 1 | **AdjustIgnored** | The scroll area will not alter its earlier behavior
    as it will not make adjustments. |

    | 2 | **AdjustToContents** | The scroll area will continuously change to fit the
    viewport. |

    | 3 | **AdjustToContentsOnFirstShow** | The first time the scroll area is displayed,
    it will adjust to its viewport. |


    **Table 5.7:** Different sizeAdjustPolicy constants


    The property image in Qt Designer is shown in the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_294_1.png)


