    +   - **insertPlainText(text)**: The specified argument **text** of type string
    is inserted as plain text into the **QTextEdit** object at the current cursor
    position.

    - **setCurrentFont(f)**: The selected text font or text at the cursor position
    is changed to argument **f**, a **QFont** object.

    - **clear()**: This method will delete all the text in the **QTextEdit** object.

    - **setPlainText(text)**: This method will replace the current text in the **QTextEdit**
    object with the specified **text** formatted as plain text.

    - **setHtml(text)**: This method will replace the current text in the **QTextEdit**
    object with the specified **text** formatted by providing an HTML interface. The
    interpretation of input text will be as rich text in HTML format.


    Just prepend **set** to all the properties discussed, followed by the parameters.
    This will add to the list of methods. We have discussed only a few methods.


    # Important signals


    Some important signals are as follows:


    +   - **textChanged()**: This signal is emitted when the text in the **QTextEdit**
    object is changed.

    - **undoAvailable(b)**: This signal is emitted when the availability of an undo
    operation changes. Parameter **b** is a Boolean value indicating whether an undo
    operation is available.

    - **redoAvailable(b)**: This signal is emitted when the availability of a redo
    operation changes. Parameter **b** is a Boolean value indicating whether a redo
    operation is available.'
  - '[PAGE 464]


    +   - **copyAvailable(b)**: This signal is emitted when the availability of a
    copy operation changes. Parameter **b** is a Boolean value indicating whether
    a copy operation is available.


