- md: '## enabled


    As the name suggests, it decides whether the widget will be enabled or not. It
    is checked in Qt Designer by default for every widget.


    Property image in Qt Designer can be seen in the following figure:


    **Figure 4.53:** Image depicting enabled property in Qt Designer


    ## geometry


    Relative to its parent, this property holds the widget’s geometry. In Qt Designer,
    we have x, y, width and height where:


    - **X:** x coordinate of the widget relative to its parent on GUI form.

    - **Y:** y coordinate of the widget relative to its parent on GUI form.

    - **Width:** Widget width.

    - **Height:** Widget height.


    Property image in Qt Designer can be seen in the following figure:


    **Figure 4.54:** Image depicting geometry property


    ## sizePolicy


    This property which got from the class **QSizePolicy** will tell the widget’s
    willingness to be resized, meaning either stretch or shrink in various ways. Generally,
    **QSizePolicy** contains 2 stretch factors and 2 independent size policy which
    can be retrieved using **horizontalPolicy()**, **verticalPolicy()**, **horizontalStretch()**
    and **verticalStretch()** functions. We can use **setHeightForWidth()** function
    for indication of widget’s **sizeHint()** whether it is width-dependent or not.
    The **horizontalStretch()** and **verticalStretch()** will return the horizontal
    and vertical stretch factor of **sizePolicy()** respectively.


    Different sizing types when constructing either horizontal or vertical **SizePolicy**
    are shown in the following table:


    | S No. | Constant | Value | Details |

    | :--- | :--- | :--- | :--- |

    | 1 | Fixed | **0** | Widget’s size is fixed and can never be grown or shrink,
    that is, it cannot be stretched and remains at its **sizeHint()**. |

    | 2 | Minimum | **GrowFlag** | Here, **sizeHint()** is smallest possible widget
    size and can grow bigger if necessary. |

    | 3 | Maximum | **ShrinkFlag** | Here, **sizeHint()** is maximum possible widget
    size and can shrink if necessary. |

    | 4 | Preferred | **GrowFlag** **ShrinkFlag** | Here, **sizeHint()** can be best
    preferred which can either grow or shrink if necessary. |

    | 5 | MinimumExpanding | **GrowFlag** **ExpandFlag** | Here, the widget makes
    use of extra space for getting as much possible space as the **sizeHint()** is
    minimal and sufficient. |

    | 6 | Expanding | **GrowFlag** **ShrinkFlag** **ExpandFlag** | Here, the widget
    makes use of extra space for getting as much possible space as the **sizeHint()**
    is of sensible size, but widget can be shrunk if necessary and can be useful.
    |

    | 7 | Ignored | **GrowFlag** **ShrinkFlag** **IgnoredFlag** | Here, the widget
    will get as much space as possible as **sizeHint()** is ignored. |


    **Table 4.8:** *Different sizing types when constructing either horizontal or
    vertical SizePolicy*


    These components will be present as a comboBox item in Qt Designer. Property image
    in Qt Designer can be seen in the following figure:


    **Figure 4.55:** *Image depicting sizePolicy property in Qt Designer*


    ## minimumSize


    From the name, we can guess that this property will hold the minimum size of the
    widget. The default value will have size with value as 0 for both width and height.
    The minimum permissible height is restricted to this default value.

    Property image in Qt Designer can be seen in the following figure:


    **Figure 4.56:** *Image depicting minimumSize property in Qt Designer*


    ## maximumSize


    From the name, we can guess that this property will hold the maximum size of the
    widget. The default value will have size with value as **16777215** for both **width**
    and **height**. The maximum permissible width is restricted to this default value.

    Property image in Qt Designer can be seen in the following figure:


    **Figure 4.57:** *Image depicting maximumSize property in Qt Designer*


    ## sizeIncrement


    This property will hold the widget size increment whose default values will be
    0 for both width and height. **baseSize()** will be kept as basis and the size
    increment will be done vertically and horizontally in terms of **sizeIncrement.height()**
    pixels and **sizeIncrement.width()** pixels respectively.

    Property image in Qt Designer can be seen in the following figure:


    *Figure 4.58: Image depicting sizeIncrement property in Qt Designer*


    ## baseSize


    This property will hold the widget base size whose default values will be 0 for
    both width and height. Here, proper widget size will be calculated on defining
    **sizeIncrement()** by the widget.

    Property image in Qt Designer can be seen in the following figure:


    *Figure 4.59: Image depicting baseSize property in Qt Designer*


    ## palette


    There are 3 color groups under this palette property namely Active, Disabled,
    and Inactive. The Active group will have keyboard focus for the window, Inactive
    group is for other windows; and as for Disabled group, from the name itself, we
    can guess that it is for widgets which are disabled and are often called grayed
    out. Active and inactive groups mostly look the same in most styles, while the
    color groups for each widget state are contained under **QPalette** class.

    Property image in Qt Designer can be seen in the following figure:


    *Figure 4.60: Image depicting palette property in Qt Designer*


    ## font


    This property will be used to set the font for the widget. We can set the **Family**,
    **Point Size** and make the text **Bold**, **Italic**, **Underline** the text,
    **Strikeout** the text, spacing between the letters using kerning and making the
    text look readable and smoother on the screen.

    Property image in Qt Designer can be seen in the following figure:


    *Figure 4.61: Image depicting font property in Qt Designer*


    ## cursor


    This property will hold the cursor of the widget, that is, whatever cursor will
    be chosen from the pre-defined cursor list objects, the same will be displayed
    on widget focus, that is, when it is over the widget. The default cursor object
    is Arrow.

    Property image in Qt Designer can be seen in the following figure:


    **Figure 4.62:** *Image depicting cursor property in Qt Designer*


    ## mouseTracking


    From this property, we can enable/disable the `mouseTracking` for the widget.
    It is disabled by default and while the mouse is moved when at least one mouse
    button is pressed, the mouse move events are received by the widget. When enabled,
    the mouse move events are received by the widget irrespective of whether buttons
    pressed or not.

    Property image in Qt Designer can be seen in the following figure:


    **Figure 4.63:** *Image depicting mouseTracking property in Qt Designer*


    ## tabletTracking


    From this property, we can enable/disable the `tabletTracking` for the widget.
    It is disabled by default. When at least one stylus button is being pressed or
    there is contact connected between the stylus and tablet, the tablet move events
    are received by the widget. When it is enabled, the tablet move events are received
    by the widget even on hovering in close proximity.

    Property image in Qt Designer can be seen in the following figure:


    **Figure 4.64:** *Image depicting tabletTracking property in Qt Designer*


    ## focusPolicy


    This property defines the keyboard focus acceptance on the widget. There are different
    types of **focusPolicy**:


    - **NoFocus:** The keyboard focus is not at all accepted on the widget.

    - **TabFocus:** The keyboard focus acceptance on the widget is done by tabbing.

    - **ClickFocus:** The keyboard focus acceptance on the widget is done by clicking.

    - **StrongFocus:** The keyboard focus acceptance on the widget is done by both
