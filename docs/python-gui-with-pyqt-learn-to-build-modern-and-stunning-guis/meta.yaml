    # ## Dock widget


    **QDockWidget** class allows users to add dockable windows to a main window. It
    offers a container widget that may be floated as a separate window or docked to
    the sides of a main window. The **QDockWidget** is capable of supporting features,
    including floating windows, movable and closable tabs. It is frequently used to
    provide users the ability to arrange the application’s interface layout to meet
    their demands.


    The idea of dock widgets, commonly referred to as tool palettes or utility windows,
    is presented by **QDockWidget**. Dock windows are secondary windows that are placed
    in a **QMainWindow**''s dock widget area around the central widget. A title bar
    and content area make up a **QDockWidget**. The window'
  merge: -1
