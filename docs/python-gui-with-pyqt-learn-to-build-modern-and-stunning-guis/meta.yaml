    # sizePolicy


    This property which got from the class **QSizePolicy** will tell the widget’s
    willingness to be resized, meaning either stretch or shrink in various ways. Generally,
    **QSizePolicy** contains 2 stretch factors and 2 independent size policy which
    can be retrieved using **horizontalPolicy()**, **verticalPolicy()**, **horizontalStretch()**
    and **verticalStretch()** functions. We can use **setHeightForWidth()** function
    for indication of widget’s **sizeHint()** whether it is width-dependent or not.
    The **horizontalStretch()** and **verticalStretch()** will return the horizontal
    and vertical stretch factor of **sizePolicy()** respectively.


    Different sizing types when constructing either horizontal or vertical **SizePolicy**
    are shown in the following table:


    | S No. | Constant | Value | Details |

    | :--- | :--- | :--- | :--- |

    | 1 | Fixed | **0** | Widget’s size is fixed and can never be grown or shrink,
    that is, it cannot be stretched and remains at its **sizeHint()**. |

    | 2 | Minimum | **GrowFlag** | Here, **sizeHint()** is smallest possible widget
    size and can grow bigger if necessary. |

    | 3 | Maximum | **ShrinkFlag** | Here, **sizeHint()** is maximum possible widget
    size and can shrink if necessary. |'
