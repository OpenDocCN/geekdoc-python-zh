    | S No. | Different selectionBehavior constants | Description |

    |---|---|---|

    | 1 | **SelectItems** | Single item will be selected. |

    | 2 | **SelectRows** | Items with only rows will be selected. |

    | 3 | **SelectColumns** | Items with only columns will be selected. |


    **Table 5.11:** *Different selectionBehavior constants*


    The property image in Qt Designer is shown in the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_301_0.png)


    **Figure 5.58:** *Image depicting selectionBehavior property in Qt Designer*


