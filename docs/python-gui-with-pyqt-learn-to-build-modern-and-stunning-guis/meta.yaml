  md: '# Acknowledgements


    +   o First and foremost, I would like to thank you all for selecting this book.
    It has been written with the beginner reader in mind. First of all, I take this
    opportunity to greet and thank my mentor "Prof. Nilesh Bahadure Sir" for motivating
    me and always communicating his expertise fully on topics related to Python. I
    am very thankful for being his protégé. I appreciate his belief in me for always
    standing behind me and pushing me to achieve more. The phrase "Journey of a Thousand
    Miles Begins with a Single Step" is something he always reminds me of.


    My parents, Dr. Surendra Kumar Chandrakar and Smt. Bhuneshwari Chandrakar, my
    brother, Shri Pranav Chandrakar, my sister-in-law Silky Chandrakar, my beloved
    wife, Mrs. Priyanka Chandrakar, my adorable son Yathartha Chandrakar, and all
    of my friends have inspired me and given me confidence over the years. Last but
