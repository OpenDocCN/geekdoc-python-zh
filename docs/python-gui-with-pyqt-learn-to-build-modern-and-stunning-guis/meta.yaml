    \nif __name__ == '__main__':\n    myapp = QApplication(sys.argv)\n    mywindow\
    \ = MySignalSlot_Window()# SS_9\n    sys.exit(myapp.exec_())\n```\n\n## 输出：\n\n\
    输出可以在图 3.8 和 3.9 中看到，下面有不同的情况：\n\n### 情况-1：当点击文本为“Btn1”的按钮时\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_139_0.png)\n\
