    **图 4.62：** *展示 Qt Designer 中 cursor 属性的图像*


    ## mouseTracking


    通过此属性，我们可以启用/禁用控件的 `mouseTracking`。默认情况下是禁用的，当鼠标在至少一个鼠标按钮被按下时移动，控件会接收鼠标移动事件。启用后，无论是否按下按钮，控件都会接收鼠标移动事件。

