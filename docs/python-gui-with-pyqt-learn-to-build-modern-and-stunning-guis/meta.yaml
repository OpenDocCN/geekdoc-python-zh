    \n## Spin Box\n\nPyQt5 中的 Spin Box 控件允许用户通过按键盘的上、下箭头键或点击 **Up** 和 **Down** 按钮来选择一个值。用户可以直接输入数值，这些数值会显示在文本框中。此控件支持整数，并且可能是在指定范围内选择数值的一种便捷方式。\n\
    \n### 重要属性\n\n一些重要的属性将在下一节中讨论。\n\n#### wrapping\n\n当 **QSpinBox** 对象达到或触及最小值或最大值时，此属性决定它是否应该循环。要启用循环，将其设置为\
