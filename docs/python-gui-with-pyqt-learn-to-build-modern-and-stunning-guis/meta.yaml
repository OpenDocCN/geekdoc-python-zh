    # QAbstractScrollArea


    In QAbstractScrollArea class (common for all the model-based item views widgets
    of Qt Designer), there is a viewport (area contents providing a central widget)
    that is scrolled. There is a vertical and horizontal scroll bar next to the viewport.
    The viewport expands when a scrollbar is hidden to cover the available space and
    shrinks when it is visible again to make its room.


    # verticalScrollBarPolicy


    Using this property, we can set the policy for the vertical scrollbar. The default
    value is **ScrollBarAsNeeded**. Users may choose either of the other options **ScrollBarAlwaysOff**
    and **ScrollBarAlwaysOn**.


    The property image in Qt Designer is shown in the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_293_0.png)


    *Figure 5.44: Image depicting verticalScrollBarPolicy property in Qt Designer*


    # horizontalScrollBarPolicy


    Using this property, we can set the policy for the horizontal Scrollbar. The default
    value is **ScrollBarAsNeeded**. User may choose either of the other options **ScrollBarAlwaysOff**
    and **ScrollBarAlwaysOn** as well.


    The property image in Qt Designer is shown in the following figure:'
