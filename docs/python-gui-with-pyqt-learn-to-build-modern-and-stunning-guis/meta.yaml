    ## Spin Box\n\nA Spin Box widget in PyQt5 allows the user to choose a value by\
    \ pressing the Up and Down arrow keys of the keyboard or by clicking the **Up**\
    \ and **Down** button. The values can be typed directly by the user and are displayed\
    \ in the textbox. This widget supports integer numbers and may find a convenient\
    \ way to choose within a specified range.\n\n### Important properties\n\nSome\
    \ important properties are discussed in the next section.\n\n#### wrapping\n\n\
    When the **QSpinBox** object hits or reaches its minimum or maximum value, this\
    \ property determines whether or not it should wrap around. To enable wrapping,\
    \ set it to **True**; to disable it, set it to **False** (default value). Refer\
    \ to the following figure:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_479_0.png)\n\
    \n*Figure 8.71: Image depicting wrapping property of QSpinBox in Qt Designer*\n\
    \n#### frame\n\nThis property will determine whether **QSpinBox** object should\
    \ have a frame or not. The default value is set as **checked**. Refer to the following\
    \ figure:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_479_1.png)\n\n*Figure 8.72:\
    \ Image depicting frame property of QSpinBox in Qt Designer*\n\n#### alignment\n\
    \nThis property will set the content alignment within the **QSpinBox** object.\
    \ Refer to the following figure:\n\n| alignment | AlignLeft, AlignVCenter |\n\
