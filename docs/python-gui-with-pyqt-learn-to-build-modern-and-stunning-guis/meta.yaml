  md: '# Important properties


    The properties of QTreeWidget are similar to the QTreeView properties seen in
    the previous chapter. Apart from these properties, the only other property which
    is added is columnCount property. This property will return the number of columns
    count in the QTreeWidget. Default value is set to 1. We can also set the column
    count by using the setColumnCount(count) method. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_326_0.png)


    Figure 6.14: Image depicting columnCount property of QTreeWidget in Qt Designer


    # Important methods


    Let us now go over some important methods:


    +   - clear(): All the items from the QTreeWidget object will be removed as it
    will be permanently deleted.

    - addTopLevelItem(item): A top-level item can be added to the QTreeWidget object
    using this method. The QTreeWidgetItem or one of its subclass can be the item
    parameter.

    - currentItem(): The current item in the QTreeWidget object (the one that is selected
    and has focus) is returned by this method.

    - selectedItems(): This method will return a list of all selected non-hidden items
    in the QTreeWidget object.

    - setHeaderLabels(labels): This method is used to set the header labels (list
    of strings) for each column of the QTreeWidget object.

    - sortItems(column,order): This function uses the specified column and orders
    to sort the items in the QTreeWidget'
