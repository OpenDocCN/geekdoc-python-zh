    # Points to remember


    +   - A **QGroupBox** is a widget from the Qt GUI library that acts as a container
    to group other widgets together and is visually distinguished from other widgets
    by a title and a frame.

    - A **QScrollArea** widget in PyQt5 is a container widget that provides scrolling
    capabilities for the child widget contents within a frame.

    - A toolbox is a widget that shows a column of tabs stacked one on top of the
    other, with the current item showing up below the active tab.

    - A tab widget offers a tab bar and a **page area** where pages associated with
    each tab can be shown.

    - A **QFrame** widget is used to group widgets together and provide a visual separation
    between them.

    - The fundamental building blocks for creating **Graphical User Interfaces (GUI)**
    in PyQt5 is **QWidgets** which are visual components that can be displayed on
    the screen and can be interacted by the user.

    - For the purpose of displaying **Numerous Document Windows (MDI)** in a single
    window, PyQt5''s **QMdiArea** widget acts as a container widget. Each MDI window
    can be moved, resized, and closed on its own without affecting any other windows.'
