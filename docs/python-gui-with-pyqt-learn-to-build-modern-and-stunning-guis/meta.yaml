    # Points to remember


    +   - **Item Widgets** will be used for creating complex, interactive user interfaces
    which are both user friendly and visually appealing.

    - The `QListWidget` is a straightforward **List Widget** that shows a list of
    things in a single column. Clicking on the list''s header will allow user to sort
    the list, add or remove items from it, and add or remove items from it.

    - A more complicated widget that shows an item tree is called `QTreeWidget`. The
    tree can be expanded and collapsed to reveal or conceal the child objects, and
    things can be nested inside of other items.

    - A table widget that displays a table of things is called `QTableWidget`. The
    table can have as many rows and columns and all the items in the table can be
    edited.

    - All three widgets offer ways to programmatically add, remove, and modify objects.'
