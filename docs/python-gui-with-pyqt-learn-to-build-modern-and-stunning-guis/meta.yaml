    There is one more property, namely tristate.


    # tristate


    This property when set to True, will make the QCheckBox widget behave as a tri-state
    checkbox. The default state is False.


    # Important methods


    Some important methods are as follows:


    +   - isChecked(): Using this method, Boolean value will be returned if the QCheckBox
    widget is selected.

    - setChecked(): Using this method, we can select/deselect the QCheckBox widget
    based on the Boolean value passed.

    - text(): Using this method, we can retrieve the text of QCheckBox widget.

    - setText(): Using this method, will set the text of QCheckBox widget.

    - setIcon(): Using this method, an icon will be displayed with QCheckBox widget.

    - setTriState(): When Boolean value is passed as True, we are adding third state
    to QCheckBox widget which is neither True or False.


    # Important signals


    The signals are similar to QPushButton widget. In addition to it, we have stateChanged(int)
    signal, which will return the QCheckBox widget’s check state. Refer to Figure
