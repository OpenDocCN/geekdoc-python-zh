    # Scroll area


    A `QScrollArea` widget in PyQt5 is a container widget that provides scrolling
    capabilities for the child widget contents within a frame. It can be used to display
    large or complex content, such as a picture, a table, or a written document, that
    is too big to fit in a single viewport. When a child widget is larger than the
    viewport, the `QScrollArea` widget automatically adds scroll bars.


    # Important properties'
