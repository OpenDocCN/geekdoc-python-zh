- md: "## QBoxLayout\n\nIn QBX9, an instance of QHBoxLayout is created with the object\
    \ name myhbox2. The spacing between the items when arranged horizontally is 60.\
    \ An empty stretchable box is created using addStretch for filling up the blank\
    \ space. Label object mylbl2 will be added to the box layout object myhbox2. LineEdit\
    \ object mylineedit2 will be added to the box layout object myhbox2.\n- In QBX10,\
    \ an instance of QHBoxLayout is created with an object name myhbox3. An empty\
    \ stretchable box is created using addStretch for filling up the blank space.\
    \ Push button object mylbl2 will be added to the box layout object myhbox2.\n\
    - In QBX11, an instance of QVBoxLayout is being created with the object name myvbox.\
    \ It will be acting as a container for arranging the layouts (QHBoxLayout) vertically\
    \ from top to bottom.\n- In QBX13, we are adding a layout myhbox1 to the QVBoxLayout\
    \ object myvbox.\n- In QBX15, we are adding a layout myhbox2 to the QVBoxLayout\
    \ object myvbox.\n- In QBX17, we are adding a layout myhbox3 to the QVBoxLayout\
    \ object myvbox.\n- In QBX18, we are setting the main layout of the GUI form.\
    \ In other words, we are setting the vertical layout to the GUI form.\n\nThis\
    \ is all about layout management using QBoxLayout.\n\n## QGridLayout\n\nSuppose\
    \ in our application, there is a requirement to arrange widgets in a grid of rows\
    \ and columns. In that case, we must know about QGridLayout. It is one of the\
    \ most universal layout classes for arranging the widgets in pairs, where each\
    \ widget will have a relative position, and will be arranged in a grid of rows\
    \ and columns. Its application ranges from adding buttons, while creating a calculator\
    \ app or making a virtual keypad and so on. The pair of coordinates for arranging\
    \ the widgets and placing them on the cell should be zero based integer numbers.\n\
    \n**QGridLayout** will leave the cell empty if no widgets are added to a given\
    \ cell. We will use overloaded implementations of the **addWidget** method if\
    \ we are adding widgets to a grid layout:\n\n- `addWidget(self, QWidget, int row,\
    \ int column)`: This method will add a widget at defined row and column.\n- `addWidget(self,\
    \ QWidget, int row, int column, int rowSpan, int columnSpan, alignment)`: This\
    \ method will add a widget at defined row and column spanning multiple rows or\
    \ columns or both. Alignment is an optional argument whose default value is 0,\
    \ meaning that the entire cell will be filled by the widget.\n\nLet us see some\
    \ of the examples using QGridLayout.\n\n### Basic QGridLayout\n\nObserve the following\
    \ code:\n\n```python\nimport sys\nfrom PyQt5.QtWidgets import QWidget, QApplication,\
    \ QLabel, QGridLayout # GLEG1_1\nfrom PyQt5 import QtGui\n\nclass GridLayout_Eg1(QWidget):\n\
    \    def __init__(self):\n        super().__init__()\n        self.display_widgets()\n\
    \        self.setGeometry(0, 0, 398, 229)\n        self.setWindowTitle('Basic\
    \ GridLayout example') #GLEG1_2\n        self.show()\n\n    def display_widgets(self):\n\
    \        # writing the grid portion\n        mygrid_layout = QGridLayout()# GLEG1_3\n\
    \        self.setLayout(mygrid_layout)# GLEG1_4\n\n        for outer in range(4):\n\
    \            for lower in range(3):\n                mylbl = QLabel('Label' +\
    \ str(outer) + str(lower),self)# GLEG1_5\n                myfont = QtGui.QFont()\n\
    \                myfont.setFamily(\"Calibri\")\n                myfont.setPointSize(10)\n\
    \                myfont.setBold(True)\n                myfont.setWeight(75)\n\
    \                mylbl.setFont(myfont)\n                mygrid_layout.addWidget(mylbl,\
    \ outer, lower)# GLEG1_6\n\nif __name__ == '__main__':\n    myapp = QApplication(sys.argv)\n\
    \    mywindow = GridLayout_Eg1()\n    sys.exit(myapp.exec_())\n```\n\n**Output:**\n\
    The output can be seen in the following Figure 2.16:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_97_0.png)\n\
    \n**Figure 2.16:** *Output of Chap2_Example10.py*\n\n> **Note:** The preceding\
    \ code is covered in Program Name: **Chap2_Example10.py**\n\n- In **GLEG1_1**,\
    \ first import the sys module for accessing the command line arguments. Then we\
    \ will be importing from the class which creates desktop-style UIs of PyQt5 package,\
    \ that is, **QtWidgets**, for creating an empty GUI and an application handler,\
    \ that is, **QApplication**. In addition to it, we are also importing other widgets\
    \ such as **QLabel** and **QGridLayout**.\n- In **GLEG1_2**, we are setting the\
    \ title of our GUI form, that is, window, as **Basic GridLayout example**.\n-\
    \ In **GLEG1_3**, an instance of **QGridLayout** is created with the object name\
    \ as **mygrid_layout**.\n- In **GLEG1_4**, we are setting the main layout of the\
    \ GUI form. In other words, we are setting the Grid layout to the GUI form.\n\
    - In **GLEG1_5**, an instance of **QLabel** object **mylbl** is created, and setting\
    \ **QLabel** object font family is Calibri, font size is 10, and font-weight is\
    \ Bold. For boldness control to be fine, we have set weight as 75.\n- In **GLEG1_6**,\
    \ we are adding a **QLabel** widget at the defined row and column. The first row\
    \ will be 0 and then the widget will be added to columns 0, 1, and 2. That is\
    \ why we have appended the Label text with rows and columns for better identification\
    \ to the reader.\n\n- GLEG1_5 and GLEG1_6 will be repeated 11 times more than\
    \ the initial count. Now, we will see another example of spanning in GridLayout.\n\
    \n### QGridLayout span\n\nIn QGridLayout span, the default value of rowspan and\
    \ colspan is 1. If a positive value is mentioned, then the cell widget will extend\
    \ to that value. If it is -1, then the extension will be done either to the right\
    \ or bottom edge.\n\nObserve the following code:\n\n```python\nimport sys\n\n\
    from PyQt5.QtWidgets import QWidget, QApplication,\nQLabel, QGridLayout, QPushButton\
    \ # GLEG2_1\n\nfrom PyQt5 import QtGui\n\nclass GridLayout_Eg2(QWidget):\n   \
    \ def __init__(self):\n        super().__init__()\n        self.display_widgets()\n\
    \        self.setGeometry(0, 0, 398, 229)\n        self.setWindowTitle('GridLayout\
    \ with span')# GLEG2_2\n        self.show()\n\n    def display_widgets(self):\n\
    \        # writing the grid portion\n        mygrid_layout = QGridLayout()\n \
    \       self.setLayout(mygrid_layout)\n\n        mybtn1 = QPushButton(\"Row Spanning\
    \ merging 2 rows\")\n        mygrid_layout.addWidget(mybtn1, 0,0, 2,1)# GLEG2_3\n\
    \n        mybtn2 = QPushButton(\"Column Spanning\")\n        mygrid_layout.addWidget(mybtn2,\
    \ 2,0, 1,3)# GLEG2_4\n\n        for outer in range(3,5):\n            for lower\
    \ in range(3,5):\n                mylbl = QLabel('Label' + str(outer) + str(lower),self)#\
    \ GLEG2_5\n                myfont = QtGui.QFont()\n                myfont.setFamily(\"\
    Calibri\")\n                myfont.setPointSize(10)\n                myfont.setBold(True)\n\
    \                myfont.setWeight(75)\n                mylbl.setFont(myfont)\n\
    \                mygrid_layout.addWidget(mylbl, outer, lower)# GLEG2_6\n\nif __name__\
    \ == '__main__':\n    myapp = QApplication(sys.argv)\n    mywindow = GridLayout_Eg2()\n\
    \    sys.exit(myapp.exec_())\n```\n\n**Output:**\nThe output can be seen in the\
    \ following Figure 2.17:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_100_0.png)\n\
    \n**Figure 2.17:** *Output of Chap2_Example11.py*\n\n> **Note:** The preceding\
    \ code is covered in Program Name: **Chap2_Example11.py**\n\n- In GLEG2_1, first\
    \ import the sys module for accessing the command line arguments. Then, we will\
    \ be importing from the class which creates desktop-style UIs of PyQt5 package,\
    \ that is, QtWidgets, for creating an empty GUI and an application handler, that\
