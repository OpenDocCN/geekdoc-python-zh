    \n## Tree widget\n\nThe PyQt5 library's **QTreeWidget** class offers a **treeView**\
    \ widget for displaying data in a hierarchical structure. It supports multiple\
    \ columns and custom items, and the user can expand and collapse branches to view\
    \ and edit items. Data can be displayed using it, including a file system, database,\
    \ or list of items with parent-child relationships. The **QTreeWidget** class\
    \ utilizes a default model to hold items, each of which is a **QTreeWidgetItem**,\
    \ and is based on Qt's Model/View architecture.\n\n## Important properties\n\n\
    The properties of QTreeWidget are similar to the QTreeView properties seen in\
    \ the previous chapter. Apart from these properties, the only other property which\
    \ is added is columnCount property. This property will return the number of columns\
    \ count in the QTreeWidget. Default value is set to 1. We can also set the column\
    \ count by using the setColumnCount(count) method. Refer to the following figure:\n\
    \nFigure 6.14: Image depicting columnCount property of QTreeWidget in Qt Designer\n\
    \n## Important methods\n\nLet us now go over some important methods:\n\n- clear():\
    \ All the items from the QTreeWidget object will be removed as it will be permanently\
    \ deleted.\n- addTopLevelItem(item): A top-level item can be added to the QTreeWidget\
    \ object using this method. The QTreeWidgetItem or one of its subclass can be\
    \ the item parameter.\n- currentItem(): The current item in the QTreeWidget object\
    \ (the one that is selected and has focus) is returned by this method.\n- selectedItems():\
    \ This method will return a list of all selected non-hidden items in the QTreeWidget\
    \ object.\n- setHeaderLabels(labels): This method is used to set the header labels\
    \ (list of strings) for each column of the QTreeWidget object.\n- sortItems(column,order):\
    \ This function uses the specified column and orders to sort the items in the\
    \ QTreeWidget object. The order parameter is a `Qt.SortOrderenum` (`Qt.AscendingOrder`\
    \ or `Qt.DescendingOrder`), and the column parameter is an integer that specifies\
    \ the column to sort by.\n- `takeTopLevelItem(index)`: This method is used to\
    \ remove an item from the `QTreeWidget` object at the specified index parameter\
    \ and return it. Otherwise, it will return `None`. The index parameter is the\
    \ index of the item to be removed.\n- `setColumnCount(columns)`: The number of\
    \ columns displayed in the `QTreeWidget` object is specified using this method.\n\
    \n## Important signals\n\nSome signals are as follows:\n\n- `itemActivated(item,column)`:\
    \ When an item is activated (double-clicked or pressed when the *Enter* key is\
    \ pressed), this signal is emitted. The item parameter is the activated item and\
    \ the column parameter is the column of the item.\n- `itemChanged(item,column)`:\
    \ When an item's data has been changed, this signal is emitted. The item parameter\
    \ is the changed item and the column parameter is the column of the item.\n- `itemClicked(item,column)`:\
    \ When an item is clicked, this signal is emitted. The item parameter is the clicked\
    \ item and the column parameter is the column of the item.\n- `itemCollapsed(item)`:\
    \ When an item is collapsed (its children are hidden), this signal is emitted.\
    \ The item parameter is the collapsed item.\n- `itemDoubleClicked(item,column)`:\
    \ When an item is double-clicked, this signal is emitted. The item parameter is\
    \ the double-clicked item and the column parameter is the column of the item.\n\
    - **itemEntered(item,column)**: When the mouse-cursor enters an item, this signal\
    \ is emitted. The item parameter is the entered item and the column parameter\
    \ is the column of the item.\n- **itemExpanded(item)**: This signal is emitted\
    \ when an item is expanded (its children are shown). The item parameter is the\
    \ expanded item.\n- **itemPressed(item,column)**: When an item is pressed, this\
    \ signal is emitted. The item parameter is the pressed item and the column parameter\
    \ is the column of the item.\n\nNow, we shall see an example of **QTreeWidget**.\n\
    \nThe details of the file names are as shown in the following *Table 6.2*:\n\n\
    | S No. | Qt Designer File Name (.ui) | Converting the Qt Designer file name to\
