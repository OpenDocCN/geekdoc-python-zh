    \ will be changed by 10. Refer to the following figure:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_510_3.png)\n\
    \n*Figure 8.125: Image depicting pageStep property of QDial in Qt Designer*\n\n\
