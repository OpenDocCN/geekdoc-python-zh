    # Important methods of QAbstractItemView base class


    Let us now check some important methods:


    +   - **setModel(model)**: We can set the view model when this method is called.

    - **setItemDelegate(delegate)**: We can set an item delegate for the model/view
    framework of the view.

    - **setIconSize(size)**: The icon size can be set using this method.

    - **setDragEnabled(bool)**: When the bool value is set as **True**, we can drag
    the items around in the view.'
  merge: -1
  pgno: 266
- img_proc: true
  md: '+   - **setAcceptDrops(bool)**: When the bool value is set as **True**, we
    can drop the items into the view.

    - **setAlternatingRowColors(bool)**: The view background will be drawn with alternating
    colors when the bool value is **True**.

    - **setCurrentIndex(index)**: Using this method, the item at the index specified
    will be set as the current item.

    - **update(index)**: The area at the specified index will be updated.

    - **clearSelection()**: Here, all the selected items will be deselected.

    - **selectAll()**: All the items in the view will be selected.


    # Important signal of QAbstractItemView base class


    In all the above signals listed, the signal will be emitted when:


    +   - **pressed(index)**: An item at the index is pressed using the mouse button.

    - **entered(index)**: The item at the index is entered by the mouse cursor. Mouse
    tracking is turned on for use.

    - **activated(index)**: The user activates the item at the index.

    - **clicked(index)**: An item in the view is clicked with the left mouse button
    as specified by the index.

    - **doubleClicked(index)**: An item in the view is double-clicked by the mouse
    button as specified by the index.


