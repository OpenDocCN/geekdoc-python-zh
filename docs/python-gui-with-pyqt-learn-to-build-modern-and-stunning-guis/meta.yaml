    # CHAPTER 2

    Getting Insights of Layout Management


    # Introduction


    Any application can be created by just dragging and dropping the widgets in our
    GUI form from the widget box of Qt Designer. It may look good when we are using
    multiple widgets on the same GUI form and creating an application. We can place
    the widgets in any location on the GUI form, without giving a notion of their
    appearance. However, it may look shabby if we do not place it in a proper location
    on the GUI form, with any arrangement of widgets. Such an arrangement leads to
    the concept of layout management; an approach to place the widgets on our GUI
    form. All professional GUI application forms creation uses the concept of layout
    managers as it is important for the user to create an application with a nice
    look. If we want to organize our widgets, the preferred approach is to manage
    the layout with layout managers. Therefore, whenever there is a requirement to
    arrange widgets on a GUI form, we will use the methods present inside the class
    of layout manager. The space between parent and child widgets can be properly
    utilized in a GUI form and is useful for communicating between them.


    Let us start learning the different ways for layout management in PyQt5. We will
    be creating the same application user credentials'
