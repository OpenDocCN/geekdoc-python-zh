    # # TextEdit


    The PyQt5 widget `QTextEdit` offers a multi-line text area for editing and displaying
    documents in plain text or HTML. It includes undo and redo capability and extensive
    text formatting options like bold, italic, and underlining. It can be utilized
    to develop simple text editors, email clients, and other programs that require
    the ability to edit and display text.


    # ## Important properties


    Let us check some important properties now.


    # ### autoFormatting


    This property will determine enabling of automatic formatting features like text
    completion, spelling correction, and so on, of the `QTextEdit` object. The default
    value is **AutoNone**. For enabling all automatic formatting, the user may select
    **AutoAll**. Refer to the following figure:'
