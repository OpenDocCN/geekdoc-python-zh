    The concept of the QPushButton widget should be clear by now. We shall see our
    next widget which is the Tool Button widget.


    ## Tool Button


    Often, there comes a requirement for selecting commands or actions by providing
    quick access buttons. In such cases, we will be using Tool Buttons which are most
    commonly used in the QToolBar widget. We generally see an icon itself instead
    of text in a Tool Button widget.


    ## Important properties


    Apart from the properties of 3 classes (QObject, QWidget and QAbstractButton),
    there are some other properties of the QToolButton widget, and they are explained
    as follows:


    ### popupMode


    Refer to the following *Figure 4.12*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_188_0.png)


    *Figure 4.12*: Image depicting popupMode property of QToolButton widget in Qt
    Designer


    Using this property, a menu containing a menu set or some action list will be
    described as well as how it will pop up for Tool Buttons. There are 3 constants:


    - **DelayedPopup**: Here, the menu will be displayed on first pressing and then
    holding the Tool Button widget down for some time duration. One of the common
    examples we see is the usage of the back button in the web browser where a menu
    depicting the current history list will be displayed, if the user will press and
    then hold the button down. This is the default value to be displayed.

    - **MenuButtonPopup**: If we use this constantly, then a special arrow is displayed
    in the Tool Button widget indicating that a menu is present and will be displayed
    on pressing the arrow part of the button.

    - **InstantPopup**: If we use this constantly, then the menu will be displayed
    instantly with no delay on pressing the Tool Button widget.


    ### toolButtonStyle


    Refer to the following *Figure 4.13*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_189_0.png)


    *Figure 4.13*: Image depicting toolButtonStyle property of QToolButton widget
    in Qt Designer


    This property of the `QToolButton` widget will decide what to display on the Tool
    Button: whether text only or icon only or text beside the icon or text below the
    icon. We can see that the default value is **ToolButtonIconOnly**. If there is
    a requirement to follow the system settings, then set the above property with
    **ToolButtonFollowStyle**. The rest of the selections are self-explanatory.


    ### autoRaise


    Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_189_1.png)


    *Figure 4.14*: Image depicting autoRaise property of QToolButton widget in Qt
    Designer


    Using this property, we can enable the **autoRaise**. It is disabled, by default.


    ### arrowType


    Refer to the following *Figure 4.15*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_190_0.png)


    **Figure 4.15:** Image depicting arrowType property of QToolButton widget in Qt
    Designer


    On using this property, there is a choice available for the user whether to display
    an arrow instead of an icon.


    ## Important methods


    Some of the important methods of QToolButton widget are as follows:


    - **setAutoRaise():** Using this method, we can check or uncheck the **autoRaise**
    feature of QToolButton widget.

    - **setPopupMode():** Using this method, we can describe the popup menu way with
    the QToolButton widget.

    - **setToolButtonStyle():** Using this method, we can set the display style of
    the QToolButton widget, that is, whether to display either text only or icon only
    or text beside the icon or text below the icon.

    - **setMenu():** Using this method, based on the QToolButton widget''s popup Mode,
    the given menu can be associated with the QToolButton widget.


    ## Important signals


    The signals are similar to the QPushButton widget. In addition to it, we have
    triggered signal which will be fired only if we add some QAction connected to
    the QToolButton widget using addAction() method, that is, when action is triggered,
    signal will be emitted. Refer to the following *Figure 4.16*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_191_0.png)


    **Figure 4.16:** *Signals in QToolButton widget in Qt Designer*


    This **QToolButton** widget is widely seen in day/today various applications like
    creating a Notepad, Wordpad, Paint and so on.


    Let us create one simple application to understand this **QToolButton** widget.


