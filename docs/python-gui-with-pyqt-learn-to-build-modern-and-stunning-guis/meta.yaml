    **Figure 5.40:** *Image depicting frameShape property in Qt Designer*\n\n## frameShadow\n\
    \nIn order to give a 3D effect to frames, the shadow type can be set using this\
    \ property. User may choose any of the following from the availability, which\
    \ is **Plain**, **Raised**, or **Sunken**:\n\n| S No. | frameShadow availability\
    \ | Description |\n| :--- | :--- | :--- |\n| 1. | **Plain** | There is no 3-D\
    \ effect, and when drawn with the WindowText color palette, the frame and contents\
    \ seem level with the surroundings. |\n| 2. | **Raised** | Draws a 3D raised line\
    \ using the light and dark colors in the current color group, giving the appearance\
    \ that the frame and its contents are raised. |\n| 3. | **Sunken** | Draws a 3D\
    \ raised line using the light and dark colors in the current color group, giving\
    \ the appearance that the frame and its contents are sunken. The default value\
