    \ widget is checked.\n- In `RBEG1_7`, will display the text of `QRadioButton`\
    \ widget which is checked in the `QLabel` display widget.\n\n## Check Box\n\n\
    Whenever there is a requirement to use a selectable button and select more than\
    \ one option, then we shall choose `QCheckBox` widget from Widget Box. The appearance\
    \ of this widget is a rectangular box before the text label. Unlike `QRadioButton`\
    \ widget, by default, this widget is not mutually exclusive. However, we can restrict\
    \ the choice to only one of the items by adding to the `QButtonGroup`.\n\n## Important\
    \ properties\n\nIt contains properties of three classes:\n\n- `QObject`\n- `QWidget`\n\
    - `QAbstractButton`\n\nThere is one more property, namely tristate.\n\n## tristate\n\
    \nThis property when set to True, will make the QCheckBox widget behave as a tri-state\
    \ checkbox. The default state is False.\n\n## Important methods\n\nSome important\
    \ methods are as follows:\n\n- isChecked(): Using this method, Boolean value will\
    \ be returned if the QCheckBox widget is selected.\n- setChecked(): Using this\
    \ method, we can select/deselect the QCheckBox widget based on the Boolean value\
    \ passed.\n- text(): Using this method, we can retrieve the text of QCheckBox\
    \ widget.\n- setText(): Using this method, will set the text of QCheckBox widget.\n\
    - setIcon(): Using this method, an icon will be displayed with QCheckBox widget.\n\
    - setTriState(): When Boolean value is passed as True, we are adding third state\
    \ to QCheckBox widget which is neither True or False.\n\n## Important signals\n\
    \nThe signals are similar to QPushButton widget. In addition to it, we have stateChanged(int)\
    \ signal, which will return the QCheckBox widget’s check state. Refer to Figure\
