    - **StrongFocus：** 通过 Tab 键切换和点击来接受控件的键盘焦点。

    - **WheelFocus：** 当鼠标滚轮移动时，控件将接受焦点。


    Qt Designer 中的属性图像如下图所示：


    **图 4.65：** *展示 Qt Designer 中 focusPolicy 属性的图像*


    ## contextMenuPolicy


    此属性描述了控件显示上下文菜单的方式。此属性的默认值是 **DefaultContextMenu**。我们可以将其他值设置为 **NoContextMenu**、**ActionsContextMenu**、**CustomContextMenu**
    和 **PreventContextMenu**。


