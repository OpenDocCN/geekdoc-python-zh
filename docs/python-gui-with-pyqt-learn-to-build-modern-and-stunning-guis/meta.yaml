    # ## Spin Box


    A Spin Box widget in PyQt5 allows the user to choose a value by pressing the Up
    and Down arrow keys of the keyboard or by clicking the **Up** and **Down** button.
    The values can be typed directly by the user and are displayed in the textbox.
    This widget supports integer numbers and may find a convenient way to choose within
    a specified range.


    # ### Important properties


    Some important properties are discussed in the next section.


    # #### wrapping'
