- md: 'creating interactive user interfaces. The primary objective of this chapter
    is to help you understand their properties, functionality, and customization options.
    Understanding and using the many widget classes and components offered by the
    Qt framework for displaying and manipulating data in a tabular or list-based manner
    is the primary goal of discussing **Item View** widgets in Qt Designer. Qt Designer''s
    **Item View** widgets, such as `QTableView`, `QTreeView`, and `QListView`, are
    effective tools for presenting data in an organized and ordered way.


    ## Data presentation


    **Item View** widgets can be used to present data in a graphical and user-friendly
    manner. Users can use these widgets to display data in simple list formats (`QListView`),
    hierarchical tree structures (`QTreeView`), or rows and columns (`QTableView`).
    Data editing and manipulation are capabilities that are already built into **Item
    View** widgets. The user can add, remove, or alter objects to interact with the
    data shown in the widgets and can also design behaviors and set properties for
    these activities using Qt Designer. Since the user can alter their appearance
    and behavior and may also design unique user interfaces suited to their requirements,
    item views are entirely adjustable. The Model-View architecture, a key Qt idea
    for separating data representation (model) from the visual display (view) and
    user interaction (delegate), is also introduced to the user. The user may better
    understand the ideas of models, views, and delegates as well as how they interact
    by learning about item view widgets. The important properties of `QFrame`, `QAbstractScrollArea`,
    and `QAbstractItemView` are covered with images at the end as add-on information.


    ## List view


    It is one of the Model/View frameworks of PyQt5. In the **QListView** class, we
    can store the items as an icon collection or as a non-hierarchical list. There
    will be a display of items in a **listview** using either **ListMode** or **IconMode**,
    and the current view mode is determined using **viewMode()**. In a **QListView**,
    widget items can be spaced/laid or can be rendered as small or large icons.


    ## Important properties


    Let us check some important properties.


    ### movement


    This property describes the movement of items in a **QListView** widget. There
    are three options:


    - If the user selects **Static**, there will be no movement of items.

    - If the user selects **Free**, there will be drag and drop of items to any position
    in the **QListView** widget.

    - If the user selects **Snap**, there will be a drag and drop of items to the
    notional grid positions denoted by the **gridSize** parameter.


    Refer to the following *Figure 5.2*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_262_0.png)


    *Figure 5.2:* Image depicting movement property of QListView widget in Qt Designer


    ### flow


    Using this property, we can set the direction for the layout of the items. By
    default, the items are laid out in the **QListView** widget from top to bottom.
    Items can also be laid out from left to right. Refer to the following *Figure
    5.3*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_263_0.png)


    *Figure 5.3*: Image depicting flow property of QListView widget in Qt Designer


    ### isWrapping


    We can set the items layout wrapping when checked, using this property. Default
    value is **False**. Refer to the following *Figure 5.4*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_263_1.png)


    *Figure 5.4*: Image depicting isWrapping property of QListView widget in Qt Designer


    ### resizeMode


    Using this property, we can decide the layout of the items again by resizing of
    `QListView` widget. By default, the value is Fixed, that is, on resizing of `QListView`
    widget, the items will not be laid out, whereas they will be laid out again when
    set to **Adjust**. Refer to the following *Figure 5.5*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_263_2.png)


    *Figure 5.5*: Image depicting resizeMode property of QListView widget in Qt Designer


    ### layoutMode


    Using this property, we can determine if the items’ layout should be delayed or
    happen immediately. So, the items’ layout happens all at once when set to **SinglePass**
    or in batches of **batchSize** items when set to **Batched**. Refer to the following
    *Figure 5.6*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_264_0.png)


    *Figure 5.6*: Image depicting layoutMode property of QListView widget in Qt Designer


    ### spacing


    Whenever there is a requirement to pad an empty space size around an item, we
    can use this property. By default, its value is set to **0**. Refer to the following
    *Figure 5.7*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_264_1.png)


    *Figure 5.7*: Image depicting spacing property of QListView widget in Qt Designer


    ### gridSize


    We can set the grid size using this property, by setting the width and height
    in which items are laid out. The default value of width and height is **0** indicating
    no grid. Refer to the following *Figure 5.8*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_264_2.png)


    *Figure 5.8*: Image depicting gridSize property of QListView widget in Qt Designer


    ### viewMode


    The view mode of `QListView` widget is set using this property. When set to **ListMode**,
    drag and drop is disabled, as the default movement will be Static. When set to
    **IconMode**, drag and drop is enabled, as the default movement will be Free.
    Refer to the following *Figure 5.9*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_265_0.png)


    *Figure 5.9:* Image depicting viewMode property of QListView widget in Qt Designer


    ### modelColumn


    This property will set the visibility of the column in the model. The default
    value is **0**, indicating the display of the first column in the model. Refer
    to the following *Figure 5.10*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_265_1.png)


    *Figure 5.10:* Image depicting modelColumn property of QListView widget in Qt
    Designer


    ### uniformItemSizes


    When set to **True**, all the items in the QListView widget will have the same
    size. The default value is **False**. Refer to the following *Figure 5.11*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_265_2.png)


    *Figure 5.11:* Image depicting uniformItemSizes property of QListView widget in
    Qt Designer


    ### batchSize


    When the `layoutMode` value is set to batch, in each batch, we can set the number
    of items. The default value is set to **100**. Refer to the following *Figure
    5.12*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_265_3.png)


    *Figure 5.12:* Image depicting batchSize property of QListView widget in Qt Designer


    ### wordWrap


    The item text is wrapped at word breaks as needed if this parameter is set to
    **True**. Refer to the following *Figure 5.13*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_266_0.png)


    *Figure 5.13:* Image depicting wordWrap property of QListView widget in Qt Designer


    ### selectionRectVisible


    The selection rectangle is visible when set to **True**, or else it will be invisible.
    The default value is **False**. Refer to the following *Figure 5.14*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_266_1.png)


    *Figure 5.14:* Image depicting selectionRectVisible property of QListView widget
    in Qt Designer


    ## Important methods of QAbstractItemView base class


    Let us now check some important methods:


    - **setModel(model)**: We can set the view model when this method is called.

    - **setItemDelegate(delegate)**: We can set an item delegate for the model/view
    framework of the view.

    - **setIconSize(size)**: The icon size can be set using this method.

    - **setDragEnabled(bool)**: When the bool value is set as **True**, we can drag
    the items around in the view.

    - **setAcceptDrops(bool)**: When the bool value is set as **True**, we can drop
    the items into the view.

    - **setAlternatingRowColors(bool)**: The view background will be drawn with alternating
    colors when the bool value is **True**.

    - **setCurrentIndex(index)**: Using this method, the item at the index specified
    will be set as the current item.

    - **update(index)**: The area at the specified index will be updated.

    - **clearSelection()**: Here, all the selected items will be deselected.

    - **selectAll()**: All the items in the view will be selected.


    ## Important signal of QAbstractItemView base class


    In all the above signals listed, the signal will be emitted when:


    - **pressed(index)**: An item at the index is pressed using the mouse button.

    - **entered(index)**: The item at the index is entered by the mouse cursor. Mouse
    tracking is turned on for use.

    - **activated(index)**: The user activates the item at the index.

    - **clicked(index)**: An item in the view is clicked with the left mouse button
    as specified by the index.

    - **doubleClicked(index)**: An item in the view is double-clicked by the mouse
    button as specified by the index.


    Now, we shall see an example of a `ListView` widget.

