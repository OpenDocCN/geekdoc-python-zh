    # Points to remember


    +   - Item views are powerful tools for presenting data in a table-like format.

    - Because item views are so completely adjustable, user can alter their appearance
    and behavior to suit your particular requirements.

    - A fundamental Qt idea for separating data representation (model) from the visual
    display (view) and user interaction (delegate) is the Model-View architecture.

    - The model/view architecture is the foundation of item views. Thus, the model,
    the view, and the delegate are three distinct elements that work together to show
    data. The data is provided by the model, shown by the view, and interacted with
    by the user is handled by the delegate.'
