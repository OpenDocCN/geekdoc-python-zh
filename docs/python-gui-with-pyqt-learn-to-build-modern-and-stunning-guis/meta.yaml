    \nNote: The preceding code is covered in Program Name: User Credential App/user_credential_app.py\n\
    \nSo, here we can convert a .ui file into .py file. This '-o' in pyuic5 command\
    \ which we had run here, stands for --output, that is, writing the generated Python\
    \ code to user_credential_app.py file.\n\n> Note: Since this is our first time\
    \ looking into .ui and Python script code .py file, we have learned whole process.\
    \ From the next time, whenever we will be creating any application form, then\
    \ you will find the .ui and .py file in the source code bundle. We will only be\
    \ displaying the actual usage code by creating a new Python file, which we will\
    \ learn shortly by using the above automated generated code .py file.\n\nOne of\
    \ the most important points to note after converting .ui file to .py file, is\
    \ that **the modification of the Python code generated must not be done manually**.\
    \ This is since any modification done will be overwritten the next time we will\
    \ be creating .py file from .ui file, when running using pyuic5 command.\n\n##\
    \ 7. It is now time to create a new Python file called run_user_credential_app.py.\
    \ Here, we will be importing user_credential_app.py file and write some code into\
    \ it such that when username and password is matched/unmatched, some message will\
    \ be displayed to the user. Refer to the following code:\n\n```python\nimport\
    \ sys\nfrom PyQt5.QtWidgets import QWidget, QApplication, QMessageBox # RUCA1\n\
    from user_credential_app import * # RUCA2\n\nclass MyWidget(QWidget):\n    def\
