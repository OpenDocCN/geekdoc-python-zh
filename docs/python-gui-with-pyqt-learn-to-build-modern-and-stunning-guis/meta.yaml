    \ **文件**、**编辑**、**窗体视图**、**设置**、**窗口** 和 **帮助** 选项，用于与用户交互。\n2. **工具栏：** 我们可以使用菜单栏管理的内容也可以使用工具栏来复制。图标代替文本放置以供用户交互。它为最常用的功能提供了快捷图标。在此\
    \ Qt Designer 工具栏中，有 **编辑控件**、**编辑信号/槽**、**编辑伙伴** 和 **编辑 Tab 键顺序** 等选项。我们将通过一些示例演示来使用所有这些功能。\n\
    3. **控件箱：** 这是 Qt Designer 最重要的区域之一。它位于 Qt Designer 窗口的左侧。有一个控件和布局的列表，提供了创建出色\
    \ GUI 表单的灵活性，你可以通过拖放将其放置到 GUI 的任何位置。我们将详细研究所有这些控件和布局。\n4. **对象查看器 (OI)：** OI 位于\
    \ Qt Designer 窗口的右侧，它以层次结构方式显示表单中使用的对象列表及其布局显示。\n5. **属性编辑器：** 在 OI 下方，有一个属性编辑器停靠控件。在此停靠控件中，我们可以根据需要更改控件、布局或窗口的属性。\n\
    6. **动作编辑器：** 在属性编辑器下方，有信号/槽编辑器、动作编辑器和资源浏览器：\n    a. 在 **信号/槽编辑器** 中，可以根据需要创建、删除或编辑对象之间的信号和槽。需要注意的是，在使用控件时，无法进行完全配置，因为它需要用户进行一定量的编码才能获得最终结果。\n\
    \    b. 在 **动作编辑器** 中，我们可以创建新动作和删除动作。此外，*已使用* 列有一个可复选选项，我们可以在“**文本列**”下输入文本，在“**快捷键列**”下提供快捷键，在“**可复选列**”下使其可复选，以及在“**提示列**”下提供工具提示。此动作编辑器将允许我们处理动作。\n\
    \    c. 当需要管理应用程序中的资源（如图像、图标、翻译文件和任何二进制文件）时，我们将使用 **资源浏览器。** 我们将通过示例来学习这个。\n\n\
    ## 用户凭证应用演示\n\n最后，让我们看看 Qt Designer 的第一个示例。我们将创建一个用户凭证应用程序，其中将提示用户输入用户名和密码。如果两者匹配，我们将显示一些消息。这个示例非常重要，需要理解，因为首先，我们将通过简单的拖放来显示它们，**不使用布局和间隔符的概念**。然后我们将学习布局和间隔符的概念。请参考以下\
    \ *图 1.16*：\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_54_0.png)\n\n*图 1.16：未使用布局和间隔符的用户凭证应用*\n\
    \n创建用户凭证应用的步骤如下：\n\n1. 我们已选择新模板为 **控件** 来创建用户凭证应用 GUI 表单。\n2. 首先，从显示控件停靠区拖动 2\
    \ 个 **标签** 控件并将其放到 GUI 表单上。我们正在更改这些 **标签** 控件的一些属性。首先是 **text** 属性，我们已分别将其文本更改为\
    \ **请输入您的用户名：** 和 **请输入您的密码：**。接下来，我们更改了 **font** 属性。此外，我们还使用 **objectName** 属性将它们的对象名称更改为\
    \ **mylbl_username** 和 **mylbl_password**。\n3. 然后，从控件箱拖动 2 个 **行编辑** 控件并将其放到 GUI\
    \ 表单上。使用 **objectName** 属性，它们的名称已更改为 **lineEdit_username** 和 **lineEdit_password**。\n\
    4. 最后，将一个 **按钮** 控件拖入 GUI 表单，并使用其 **text** 属性将其文本更改为 **确认**。然后，使用 **objectName**\
    \ 属性，其名称已更改为 **mybtn_confirm**。\n5. 现在，我们将此 GUI 表单保存为 \"user_credential_app.ui\"\
    。这个 .ui 文件实际上是一个 XML 文件，它描述了表单信息，即控件、布局等。简单来说，我们可以理解 Qt Designer 独立于任何编程语言，它不会生成任何编程语言的代码，而是生成基于\
    \ XML 的 .ui 文件，因为它易于理解。\n\n**user_credential_app.ui** 文件内的数据内容如下：\n\n```xml\n\
    <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<ui version=\"4.0\">\n <class>Form</class>\n\
