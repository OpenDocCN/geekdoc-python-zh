    form that we will learn is, using the absolute positioning. We can place the widgets
    in any position in a GUI form by specifying explicitly the size or position values
    for each widget in pixels. It is mainly used in the applications where there is
    a requirement to size values and set positions of the widgets which have to be
    accommodated within other widgets. Widgets can be positioned in a GUI form using
    the absolute positioning approach, with the help of `move(x,y)` method.


