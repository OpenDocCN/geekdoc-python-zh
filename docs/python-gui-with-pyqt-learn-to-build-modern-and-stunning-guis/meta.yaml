    \ depicting placeholderText property of QLineEdit in Qt Designer\n\n## cursorMoveStyle\n\
    \nWe can set the way or movement style of the cursor in the **QLineEdit** object.\
    \ Refer to the following figure:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_447_0.png)\n\
    \n**Figure 8.32:** Image depicting cursorMoveStyle property of QLineEdit in Qt\
