    \ following figure:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_459_0.png)\n\n\
    **Figure 8.45:** Image depicting undoRedoEnabled property of QTextEdit in Qt Designer\n\
    \n## lineWrapMode\n\nThis property will hold the mode of line wrap and determine\
