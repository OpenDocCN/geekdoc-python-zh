- md: '## CHAPTER 8

    Getting Insights of Input Widgets in Qt Designer


    ## Introduction


    Input widgets for PyQt5 are necessary because they provide users with an approach
    to input data into PyQt5 applications. As they allow user interaction and data
    input, these widgets are an essential component of creating a **Graphical User
    Interface (GUI)** for an application.


    There are different ways to input data into the input widgets provided by PyQt5,
    including text input, number input, date/time input, and drop-down list selection.
    The developer may easily create a user-friendly interface and collect data from
    the user thanks to these widgets. Additionally, input widgets are a crucial component
    of modern applications since they let users enter and manipulate data in various
    ways. Different input widgets present in Qt Designer are shown in the following
    figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_426_0.png)


    **Figure 8.1:** *Different input widgets of Qt Designer*


    We shall discuss the importance of each input widget one by one.


    ## Structure


    In this chapter, we will discuss the following topics:


    - Combo Box

    - Font Combo Box

    - Line Edit

    - Text Edit

    - Plain Text Edit

    - Spin Box

    - Double Spin Box

    - Date Time Edit

    - Dial

    - QScrollBar

    - QSlider

    - Key Sequence Edit


    ## Objectives


    After reading this chapter, the reader will have a thorough understanding of many
    input widgets that are available and how to utilize them effectively to create
    interactive user interfaces. By the end of this chapter, readers will have a solid
    understanding of input widgets, including **QLineEdit**, **QSpinBox**, **QComboBox**,
    **QTextEdit**, and so on, as well as their corresponding characteristics, functionality,
    and customization choices.


    The main objective of this chapter is to give readers the knowledge needed to
    incorporate these input widgets into their designs so that users may enter data,
    select options, and interact with the program. The use of input validation methods,
    processing user input events, and linking signals and slots to accomplish the
    required functionality are also covered for the benefit of the readers. The readers
    will be able to develop simple and user-friendly interfaces that effectively collect
    user input and deliver a smooth user experience by mastering input widgets in
    Qt Designer. Moreover, we shall explore practical examples with useful comments
    at the required locations for all the input widgets in Qt Designer.


    ## Combo Box


    The combination of button and popup list is **QComboBox** widget. Users can choose
    an option from a drop-down list of options using the **QComboBox** widget in PyQt5.
    It is a frequently used widget for choosing items from a list. We can manually
    enter items or use a model to fill out the **QComboBox** widget. Along with text
    items, icons may also be displayed. Drop-down lists with different properties
    and options can be created using PyQt5''s **QComboBox** which is a component of
    the **PyQt5.QtWidgets** package. The ability to make the widget editable, set
    the current item, set the maximum number of visible items, and the option to control
    the insertion policy are some noteworthy properties and options.


    ### Important properties


    Let us go over some important properties:


    ### editable


    This property will determine whether the **QComboBox** object can be edited by
    the user or not. The default value is **False**. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_428_0.png)


    **Figure 8.2:** *Image depicting editable property of QComboBox in Qt Designer*


    ### currentText


    The current text displayed in the **QComboBox** object is returned using this
    property. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_428_1.png)


    **Figure 8.3:** *Image depicting currentText property of QComboBox in Qt Designer*


    ### currentIndex


    The default value is **-1**, and this property will return the index of the current
    item selected in the **QComboBox** object. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_429_0.png)


    **Figure 8.4:** *Image depicting currentIndex property of QComboBox in Qt Designer*


    ### maxVisibleItems


    The maximum number of items to be displayed in the drop-down lists of the **QComboBox**
    object can be set with the help of the above property. The default value is **10**.
    Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_429_1.png)


    **Figure 8.5:** *Image depicting maxVisibleItems property of QComboBox in Qt Designer*


    ### maxCount


    Using this property, the maximum number of items to be added to the **QComboBox**
    object can be set. The default value is **2147483647**. Refer to the following
    figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_429_2.png)


    **Figure 8.6:** *Image depicting maxCount property of QComboBox in Qt Designer*


    ### insertPolicy


    User can set the policy where items are to appear in the **QComboBox** object.
    The default value is **InsertAtBottom**. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_429_3.png)


    **Figure 8.7:** *Image depicting insertPolicy property of QComboBox in Qt Designer*


    ### sizeAdjustPolicy


    The rules policy can be set using this property for the QComboBox object to adjust
    its size when the list items change. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_430_0.png)


    **Figure 8.8:** *Image depicting sizeAdjustPolicy property of QComboBox in Qt
    Designer*


    ### minimumContentsLength


    We can determine the fitting of the minimum number of characters into the QComboBox
    object. The default value is 0. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_430_1.png)


    **Figure 8.9:** *Image depicting minimumContentsLength property of QComboBox in
    Qt Designer*


    ### iconSize


    The icon size to be displayed in the QComboBox object can be set using this property.
    Refer to the following figure:


    | iconSize | 20 x 20 |

    | :--- | :--- |

    | Width | 20 |

    | Height | 20 |


    **Figure 8.10:** *Image depicting iconSize property of QComboBox in Qt Designer*


    ### duplicatesEnabled


    This Boolean property will determine whether duplicates are enabled in the QComboBox
    object. The default value is set to **False**. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_431_0.png)


    **Figure 8.11:** *Image depicting duplicatesEnabled property of QComboBox in Qt
    Designer*


    ### frame


    When set to True, the QComboBox object draws itself inside a frame, else draws
    itself without any frame. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_431_1.png)


    **Figure 8.12:** *Image depicting frame property of QComboBox in Qt Designer*


    ### modelColumn


    Using this property, we can set the column of the model used for populating the
    QComboBox object. The default value is 0. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_431_2.png)


    **Figure 8.13:** *Image depicting modelColumn property of QComboBox in Qt Designer*


    ### Important methods


    Some important methods are as follows:


    - `addItem(text[,userData = None])`: Using this method, the items will be added
    to the list of existing items in the QComboBox object with the given text and
    optional **userData** argument.

    - `addItems(texts)`: This method will add a list of strings in the given texts
    to the QComboBox object.

    - `clear()`: This method will remove all items from the QComboBox object.

    - `count()`: This method will return the number of items in the QComboBox object.

    - `currentText()`: This method will return the current Text of the QComboBox object.

    - `currentIndex()`: This method will return the current Item index in the QComboBox
    object.

    - `setItemText(index, Text)`: Using this method, the text of an item is changed
    at a specified index in the QComboBox object.


    ### Important signals


    Some important signals are as follows:


    - `activated(index)`: This signal is emitted when an item in the QComboBox object
    is activated, either by using the keyboard to select or by clicking on it. The
    signal carries an argument index as a parameter, which is the index of the activated
    item.

    - `currentIndexChanged(index)`: This signal is emitted whenever the QComboBox''s
    object current index changes. The new index is carried by the signal as an argument
    index.

    - `highlighted(index)`: This signal is emitted when a QComboBox''s object item
    is highlighted, either by hovering the mouse over it or by using the keyboard
    to navigate to it. The index of the highlighted item is the argument index that
    is carried by the signal.


    Now, we shall see an example of the QComboBox widget.'
  mdcn: '## 第8章

    深入了解 Qt Designer 中的输入部件


    ## 简介


    PyQt5 的输入部件是必要的，因为它们为用户提供了一种向 PyQt5 应用程序输入数据的方法。由于这些部件允许用户交互和数据输入，它们是为应用程序创建**图形用户界面
    (GUI)** 的基本组件。


    有多种方式可以将数据输入到 PyQt5 提供的输入部件中，包括文本输入、数字输入、日期/时间输入和下拉列表选择。借助这些部件，开发者可以轻松创建用户友好的界面并从用户那里收集数据。此外，输入部件是现代应用程序的关键组成部分，因为它们允许用户以各种方式输入和操作数据。Qt
    Designer 中存在的不同输入部件如下图所示：


    ![](img/9ef0c0b339dea43dffe3f61f95760762_426_0.png)


    **图 8.1：** *Qt Designer 的不同输入部件*


    我们将逐一讨论每个输入部件的重要性。


    ## 结构


    在本章中，我们将讨论以下主题：


    - 组合框

    - 字体组合框

    - 行编辑器

    - 文本编辑器

    - 纯文本编辑器

    - 旋转框

    - 双精度旋转框

    - 日期时间编辑器

    - 旋钮

    - QScrollBar

    - QSlider

    - 按键序列编辑器


    ## 目标


    阅读本章后，读者将透彻理解许多可用的输入部件，以及如何有效地利用它们来创建交互式用户界面。在本章结束时，读者将对输入部件有扎实的理解，包括 **QLineEdit**、**QSpinBox**、**QComboBox**、**QTextEdit**
    等，以及它们相应的特性、功能和自定义选项。


    本章的主要目标是为读者提供必要的知识，以便将这些输入部件整合到他们的设计中，从而使用户能够输入数据、选择选项并与程序交互。为了读者的利益，本章还涵盖了输入验证方法的使用、处理用户输入事件以及连接信号和槽以实现所需功能。通过掌握
    Qt Designer 中的输入部件，读者将能够开发出简单且用户友好的界面，有效地收集用户输入并提供流畅的用户体验。此外，我们将通过实际示例来探讨 Qt Designer
    中所有输入部件，并在需要的位置提供有用的注释。


    ## 组合框


    按钮和弹出列表的组合是 **QComboBox** 部件。用户可以使用 PyQt5 中的 **QComboBox** 部件从下拉选项列表中选择一个选项。它是一个常用的部件，用于从列表中选择项目。我们可以手动输入项目，也可以使用模型来填充
    **QComboBox** 部件。除了文本项目外，还可以显示图标。可以使用 PyQt5 的 **QComboBox** 创建具有不同属性和选项的下拉列表，它是
    **PyQt5.QtWidgets** 包的一部分。一些值得注意的属性和选项包括：使部件可编辑、设置当前项目、设置最大可见项目数以及控制插入策略的选项。


    ### 重要属性


    让我们回顾一些重要的属性：


    ### editable


    此属性将决定 **QComboBox** 对象是否可以被用户编辑。默认值为 **False**。请参考下图：


    ![](img/9ef0c0b339dea43dffe3f61f95760762_428_0.png)


    **图 8.2：** *展示 Qt Designer 中 QComboBox 可编辑属性的图片*


    ### currentText


    此属性返回 **QComboBox** 对象中当前显示的文本。请参考下图：


    ![](img/9ef0c0b339dea43dffe3f61f95760762_428_1.png)


    **图 8.3：** *展示 Qt Designer 中 QComboBox currentText 属性的图片*


    ### currentIndex


    默认值为 **-1**，此属性将返回 **QComboBox** 对象中当前选定项目的索引。请参考下图：


    ![](img/9ef0c0b339dea43dffe3f61f95760762_429_0.png)


    **图 8.4：** *展示 Qt Designer 中 QComboBox currentIndex 属性的图片*


    ### maxVisibleItems


    借助上述属性，可以设置 **QComboBox** 对象下拉列表中要显示的最大项目数。默认值为 **10**。请参考下图：


    ![](img/9ef0c0b339dea43dffe3f61f95760762_429_1.png)


    **图 8.5：** *展示 Qt Designer 中 QComboBox maxVisibleItems 属性的图片*


    ### maxCount


    使用此属性，可以设置要添加到 **QComboBox** 对象的最大项目数。默认值为 **2147483647**。请参考下图：


    ![](img/9ef0c0b339dea43dffe3f61f95760762_429_2.png)


    **图 8.6：** *展示 Qt Designer 中 QComboBox maxCount 属性的图片*


    ### insertPolicy


    用户可以设置项目在 **QComboBox** 对象中出现的策略。默认值为 **InsertAtBottom**。请参考下图：


    ![](img/9ef0c0b339dea43dffe3f61f95760762_429_3.png)


    **图 8.7：** *展示 Qt Designer 中 QComboBox insertPolicy 属性的图片*


    ### sizeAdjustPolicy


    可以使用此属性为 QComboBox 对象设置规则策略，以便在列表项目更改时调整其大小。请参考下图：


    ![](img/9ef0c0b339dea43dffe3f61f95760762_430_0.png)


    **图 8.8：** *展示 Qt Designer 中 QComboBox sizeAdjustPolicy 属性的图片*


    ### minimumContentsLength


    我们可以确定适合 QComboBox 对象的最小字符数。默认值为 0。请参考下图：


    ![](img/9ef0c0b339dea43dffe3f61f95760762_430_1.png)


    **图 8.9：** *展示 Qt Designer 中 QComboBox minimumContentsLength 属性的图片*


    ### iconSize


    可以使用此属性设置要在 QComboBox 对象中显示的图标大小。请参考下图：


    | iconSize | 20 x 20 |

    | :--- | :--- |

    | 宽度 | 20 |

    | 高度 | 20 |


    **图 8.10：** *展示 Qt Designer 中 QComboBox iconSize 属性的图片*


    ### duplicatesEnabled


    此布尔属性将决定是否在 QComboBox 对象中启用重复项。默认值设置为 **False**。请参考下图：


    ![](img/9ef0c0b339dea43dffe3f61f95760762_431_0.png)


    **图 8.11：** *展示 Qt Designer 中 QComboBox duplicatesEnabled 属性的图片*


    ### frame


    当设置为 True 时，QComboBox 对象会在框架内绘制自身，否则在没有框架的情况下绘制自身。请参考下图：


    ![](img/9ef0c0b339dea43dffe3f61f95760762_431_1.png)


    **图 8.12：** *展示 Qt Designer 中 QComboBox frame 属性的图片*


    ### modelColumn


    使用此属性，我们可以设置用于填充 QComboBox 对象的模型的列。默认值为 0。请参考下图：


    ![](img/9ef0c0b339dea43dffe3f61f95760762_431_2.png)


    **图 8.13：** *展示 Qt Designer 中 QComboBox modelColumn 属性的图片*


    ### 重要方法


    一些重要的方法如下：


    - `addItem(text[,userData = None])`：使用此方法，项目将使用给定的文本和可选的 **userData** 参数添加到 QComboBox
    对象的现有项目列表中。

    - `addItems(texts)`：此方法将把给定文本中的字符串列表添加到 QComboBox 对象。

    - `clear()`：此方法将从 QComboBox 对象中移除所有项目。

    - `count()`：此方法将返回 QComboBox 对象中的项目数量。

    - `currentText()`：此方法将返回 QComboBox 对象的当前文本。

    - `currentIndex()`：此方法将返回 QComboBox 对象中当前项目的索引。

    - `setItemText(index, Text)`：使用此方法，可以更改 QComboBox 对象中指定索引处项目的文本。


    ### 重要信号


    一些重要的信号如下：


    - `activated(index)`：当 QComboBox 对象中的项目被激活时（通过使用键盘选择或单击它），会发出此信号。信号携带一个参数 index，它是被激活项目的索引。

    - `currentIndexChanged(index)`：每当 QComboBox 对象的当前索引发生变化时，就会发出此信号。新索引由信号作为参数 index
    携带。

    - `highlighted(index)`：当 QComboBox 对象的项目被高亮显示时（通过将鼠标悬停在其上或使用键盘导航到它），会发出此信号。被高亮显示项目的索引是信号携带的参数
    index。


    现在，我们将看一个 QComboBox 部件的示例。'
