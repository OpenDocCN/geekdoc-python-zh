    \nThe widgets base class, which can have a frame, is provided by **QFrame** class.\
    \ A frame shape and a shadow style that will be used to distinguish the frame\
    \ from neighboring widgets, visually, make up the frame style. We shall now delve\
    \ into their important properties.\n\n## frameShape\n\nThis property will set\
    \ the available **frameShape** value to the user from the frame style. Users may\
    \ choose any of the frame shapes from the available list. The default value is\
    \ **StyledPanel** in Qt Designer, and then drag and drop any **ItemView** widget\
    \ in a GUI form. Different frame shapes value available to the user are as follows:\n\
    \n| S No. | Frame shapes availability | Description |\n| :--- | :--- | :--- |\n\
    | 1 | **NoFrame** | Nothing will be drawn. |\n| 2 | **Box** | A box will be drawn\
    \ around its contents. |\n| 3 | **Panel** | A panel will be drawn for making the\
    \ appearance of contents either sunken or raised. |\n| 4 | **StyledPanel** | A\
    \ rectangular panel will be drawn with a look depending on the current GUI style\
    \ with an appearance either as sunken or raised. |\n| 5 | **HLine** | A horizontal\
    \ line will be drawn which frames nothing (use as a separator) |\n| 6 | **VLine**\
    \ | A vertical line will be drawn which frames nothing (use as a separator) |\n\
    | 7 | **WinPanel** | When used, the linewidth will be specified to 2 pixels and\
    \ using this, a rectangular panel will be drawn similar to Windows 2000 with appearance\
    \ either as sunken or raised. |\n\n**Table 5.5:** *Different frame shapes value\
    \ available to the user*\n\nThe property image in Qt Designer is shown in the\
