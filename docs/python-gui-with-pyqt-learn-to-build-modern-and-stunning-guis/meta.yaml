    Some important signals are as follows:


    +   - **textEdited()**: This signal is emitted whenever the text is modified by
    the user, including additions or deletions in the **QLineEdit** object.

    - **textChanged()**: This signal is emitted whenever any **QLineEdit** object
    text is changed, including changes made programmatically.

    - **editingFinished()**: This signal is emitted when the user completes editing
    the text in the **QLineEdit** object by pressing the *Enter* key or leaving the
    widget.

    - **returnPressed()**: This signal is emitted by pressing the *Enter* key while
    editing the text in the **QLineEdit** object.

    - **selectionChanged()**: This signal is emitted when the selected text in the
    **QLineEdit** object is changed.

    - **cursorPositionChanged()**: This signal is emitted when the cursor is moved
    and its position is changed in the **QLineEdit** object.'
