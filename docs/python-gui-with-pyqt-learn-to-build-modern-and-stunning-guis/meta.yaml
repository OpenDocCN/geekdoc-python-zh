- md: '## autoScroll


    This property is set to **True** by default and the **QAbstractItemView** widget
    will automatically scroll its contents if the user moves it within 16 pixels of
    the viewport edge.

    The property image in Qt Designer is shown in the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_295_0.png)


    **Figure 5.47:** *Image depicting autoScroll property in Qt Designer*


    ## autoScrollMargin


    The area size will be set using this property when auto-scrolling is enabled.
    The default value is 16 pixels.

    The property image in Qt Designer is shown in the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_295_1.png)


    **Figure 5.48:** *Image depicting autoScrollMargin property in Qt Designer*


    ## editTriggers


    When checked, actions of **QAbstractItemView** widget will initiate item editing.
    **DoubleClicked** and **EditKeyPressed** are checked by default and are combined
    using the OR operator. Different constants are shown in the following Table 5.8:


    | S No. | Different editTriggers constants | Description |

    | :--- | :--- | :--- |

    | 1 | **NoEditTriggers** | No editing is allowed. |

    | 2 | **CurrentChanged** | When the current item changes, editing begins. |

    | 3 | **DoubleClicked** | When an item is double-clicked, editing begins. |

    | 4 | **SelectedClicked** | When an already selected item is clicked, editing
    begins. |

    | 5 | **EditKeyPressed** | When the platform edit key is pressed over an item,
    editing begins. |

    | 6 | **AnyKeyPressed** | When any key is pressed over an item, editing begins.
    |

    | 7 | **AllEditTriggers** | All aforementioned actions begin editing. |


    **Table 5.8:** *Different editTriggers constants*


    The property image in Qt Designer is shown in the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_296_0.png)


    **Figure 5.49:** *Image depicting editTriggers property in Qt Designer*


    ## tabKeyNavigation


    When set, item navigation with tab and back tab is enabled. The property image
    in Qt Designer is shown in the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_296_1.png)


    **Figure 5.50:** *Image depicting tabKeyNavigation property in Qt Designer*


    ## showDropIndicator


    When set, the drop indicator is visible in `QAbstractItemView` widget while dragging
    and dropping objects.

    The property image in Qt Designer is shown in the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_297_0.png)


    **Figure 5.51:** *Image depicting showDropIndicator property in Qt Designer*


    ## dragEnabled


    When set, the `QAbstractItemView` widget supports dragging of its own items.

    The property image in Qt Designer is shown in the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_297_1.png)


    **Figure 5.52:** *Image depicting dragEnabled property in Qt Designer*


    ## dragDropOverwriteMode


    Using this property, we can set the drag-and-drop behavior of the `QAbstractItemView`
    widget. When set to **True**, dropping the selected data will replace the item''s
    existing data, whereas on moving, the data will clear the item. When the data
    is dropped and set to **False**, the selected data will be added as a new item.
    The item is also removed when the data is moved. It is unchecked by default.

    The property image in Qt Designer is shown in the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_297_2.png)


    **Figure 5.53:** *Image depicting dragDropOverwriteMode property in Qt Designer*


    ## dragDropMode


    This property explains various drag-and-drop actions that the `QAbstractItemView`
    widget can take.

    Different constants are shown in the following Table 5.9:


    | S No. | Different dragDropMode constants | Description |

    |---|---|---|

    | 1 | **NoDragDrop** | Dragging or dropping is not supported. |

    | 2 | **DragOnly** | Dragging of its own items are supported by **QAbstractItemView**
    widget. |

    | 3 | **DropOnly** | Dropping is supported by **QAbstractItemView** widget. |

    | 4 | **DragDrop** | Both dragging and dropping is supported by **QAbstractItemView**
    widget. |

    | 5 | **InternalMove** | Only move operations are accepted and not copy from itself
    by **QAbstractItemView** widget. |


    **Table 5.9:** *Different dragDropMode constants*


    The property image in Qt Designer is shown in the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_298_0.png)


    **Figure 5.54:** *Image depicting dragDropMode property in Qt Designer*


    ## defaultDropAction


    Using this property, we can set the default drop action used in the **QAbstractItemView**
    widget. When the supported actions support **CopyAction** and the property is
    not set, the drop action is **CopyAction**.


    The property image in Qt Designer is shown in the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_299_0.png)


    **Figure 5.55:** *Image depicting defaultDropAction property in Qt Designer*


    ## alternatingRowColors


    When set to **True**, using Base and **AlternateBase** color, the item background
    will be drawn. If set to **False** using Base color, which is the default value,
    only the item background will be drawn.


    The property image in Qt Designer is shown in the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_299_1.png)


    **Figure 5.56:** *Image depicting alternatingRowColors property in Qt Designer*


    ## selectionMode


    Using this property, the user can decide whether to select one item or many items
    and in many item selections, whether continuous range of items must be selected
    or not. Refer to the following Table 5.10:


    | S No. | Different selectionMode constants | Description |

    | :--- | :--- | :--- |

    | 1 | **NoSelection** | There is no selection of items. |

    | 2 | **SingleSelection** | Any item that was already picked by the user is unselected
    when they select an item. By pressing down the *Ctrl* key while clicking the selected
    item, the user can deselect the item. |

    | 3 | **MultiSelection** | Any item selected by the user in a usual way, the selection
    status is toggled for that item leaving the other items alone. On dragging the
    mouse over multiple items, they can be toggled. |

    | 4 | **ExtendedSelection** | For any item selected by the user in the usual way,
    a new item is selected after clearing the selection.<br><br>On pressing the *Ctrl*
    Key with an item click, there will be toggling of clicked items, leaving other
    items untouched.<br><br>On pressing the *Shift* Key with an item click, depending
    on the clicked item state, there will be a selection or no selection for all items
    between the current item and the clicked item.<br><br>On dragging the mouse multiple
    items, selection can be done. |

    | 5 | **ContiguousSelection** | For any item selected by the user in a usual way,
    a new item is selected after clearing the selection.<br><br>On pressing *Shift*
    Key with an item click, depending on the clicked item state, there will be selection
    or no selection for all items between the current item and the clicked item. |


    **Table 5.10:** *Different selectionMode constants*


    The property image in Qt Designer is shown in the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_300_0.png)


    **Figure 5.57:** *Image depicting selectionMode property in Qt Designer*


    ## selectionBehavior


    QAbstractItemView widget will set the selection behavior using this property.
