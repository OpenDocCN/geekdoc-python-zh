    # # Font Combo Box


    In PyQt5, a `QFontComboBox` widget is a combobox that enables users to select
    a font family from a list of system fonts. The `currentFontChanged()` signal is
    sent when a font is selected from a drop-down list of font family names displayed
    by the widget. Along with two `QToolButtons` for bold and italic formatting and
    a `QComboBox` for adjusting font size, `QFontComboBox` is frequently used in toolbars.


    # ## Important properties


    Let us go over some important properties now.


    # ### writingSystem


    The writing system of the fonts to be displayed in the `QFontComboBox` object
    is held using this property. Refer to the following figure:


    | writingSystem | Any |

    |---|---|'
