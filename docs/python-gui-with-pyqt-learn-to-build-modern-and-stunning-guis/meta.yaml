    # Column view


    One of the parts of Qt’s Model/View framework illustrates a model in many `QListViews`,
    one for each tree hierarchy. Moreover, it is coined as list cascading. In order
    to display data provided by models derived from the `QAbstractItemModel` class,
    `QColumnView` implements the interfaces described by the `QAbstractItemView` class.


    # Important properties


    Let us now check some important properties.


    # resizeGripsVisible


    This property will decide whether resize grips are experienced by list views or
    not. The default value is set to **True**. Refer to the following *Figure 5.37*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_286_0.png)


    *Figure 5.37: Image depicting resizeGripsVisible property of QColumnView widget
    in Qt Designer*


