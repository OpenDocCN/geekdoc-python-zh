    # QFrame


    The widgets base class, which can have a frame, is provided by **QFrame** class.
    A frame shape and a shadow style that will be used to distinguish the frame from
    neighboring widgets, visually, make up the frame style. We shall now delve into
    their important properties.


    # frameShape


    This property will set the available **frameShape** value to the user from the
    frame style. Users may choose any of the frame shapes from the available list.
    The default value is **StyledPanel** in Qt Designer, and then drag and drop any
    **ItemView** widget in a GUI form. Different frame shapes value available to the
    user are as follows:


    | S No. | Frame shapes availability | Description |

    | :--- | :--- | :--- |

    | 1 | **NoFrame** | Nothing will be drawn. |

    | 2 | **Box** | A box will be drawn around its contents. |

    | 3 | **Panel** | A panel will be drawn for making the appearance of contents
    either sunken or raised. |

    | 4 | **StyledPanel** | A rectangular panel will be drawn with a look depending
    on the current GUI style with an appearance either as sunken or raised. |

    | 5 | **HLine** | A horizontal line will be drawn which frames nothing (use as
    a separator) |

    | 6 | **VLine** | A vertical line will be drawn which frames nothing (use as a
    separator) |'
