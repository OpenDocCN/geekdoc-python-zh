    \n*图 8.72：展示 Qt Designer 中 QSpinBox 的 frame 属性的图片*\n\n#### alignment\n\n此属性将设置\
    \ **QSpinBox** 对象内的内容对齐方式。参考下图：\n\n| alignment | AlignLeft, AlignVCenter |\n|\
    \ :--- | :--- |\n| 水平 | AlignLeft |\n| 垂直 | AlignVCenter |\n\n*图 8.73：展示 Qt Designer\
    \ 中 QSpinBox 的 alignment 属性的图片*\n\n#### readOnly\n\n当设置为 **True** 时，此属性将允许 **QSpinBox**\
