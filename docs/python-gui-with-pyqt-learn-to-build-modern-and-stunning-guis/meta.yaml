    # CHAPTER 7

    Getting Insights of Containers in Qt Designer


    # Introduction


    In order to organize and properly position child widgets within a parent widget,
    PyQt5 container widgets are used. These container widgets determine the position
    and size of child widgets within the parent widget and allow for the creation
    of a layout. If there were no container widgets, child widgets might not be properly
    arranged, overlap, or be hidden on the screen. Container widgets allow easy layout
    manipulation, such as the alignment of widgets to the left or right or the change
    of space between the widgets. We have already learned about layout management
    previously. In this chapter, we shall concentrate on different PyQt5 container
    widgets of Qt Designer as shown in the following *Figure 7.1*:'
  - '[PAGE 357]


    ![](img/9ef0c0b339dea43dffe3f61f95760762_357_0.png)


    **Figure 7.1:** *Different container widgets of Qt Designer*


    The **QObject** and **QWidget** class of different container widgets are similar
    to that of button type class. We shall see multiple useful properties of different
    Qt Designer container widgets one by one.


