  md: '+   - A push button widget is a rectangle button that, when clicked, does a
    certain operation. It can be used to do a number of things, such open a file,
    close a window, or submit a form, and it can have text or an icon.

    - A small, rectangular button known as a Tool Button widget is used to access
    a particular tool or feature. In toolbars, Tool Buttons are frequently utilized,
    and they can be used for a range of tasks like cutting, pasting, or zooming in
    and out.

    - A rectangular button that can be used to pick one or more alternatives is known
    as a check button widget. A checkbox is checked when it is clicked, and it is
    unchecked when it is clicked again. Check boxes are frequently used to let users
    choose from a variety of options, such as the languages or functionality they
    want to use.

    - A Radio Button widget is a circular button that enables users to choose one
    item from a list of choices. All other Radio Buttons in the group are deselected
    when a Radio Button is clicked, which selects it. Radio Buttons are frequently
    used to let users choose just one option, like the font size or the background
    color.

    - A rectangle button that triggers an action when pressed, is known as a Command
    Link Button widget. While it resembles a Push Button, its look is distinct. Command
    Link Buttons are frequently used to make it clear to users what will happen when
    they click the button.

    - Give buttons a description in the text. The text should make it crystal obvious
    as to what will happen when the button is clicked.

    - For buttons, use icons. In addition to helping to identify the function of the
    button, icons can improve the visual'
