    \n在此示例中，我们使用了 *水平* 和 *垂直* 线，它们是线条类。这些线通常用作分隔符，在视觉上划分 GUI 页面的各个部分。它们可用于将相关的小部件分组在一起，使表单更有条理且更易于导航。\n\
    \n## 文本浏览器\n\nPyQt5 的 **QTextBrowser** 类提供了一个具有超文本导航功能的富文本浏览器。用户可以通过点击链接和选择文本来与文本进行交互，它用于显示格式化的文本，包括图像和链接。只读的\
    \ **QTextBrowser** 类扩展了 **QTextEdit** 类，并提供了更多用于显示和导航超文本的功能。它支持多种文本类型，包括纯文本、HTML\
    \ 和 Markdown。可以使用 **层叠样式表 (CSS)** 和内联 HTML 标签来设置文本样式。\n\n## 重要属性\n\n它包含 **QTextEdit**\
