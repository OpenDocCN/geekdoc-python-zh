    \ 中 QTextBrowser 源属性的图片\n\n## searchPaths\n\n此属性将保存 QTextBrowser 对象用于搜索资源（如图像和文档）的搜索路径。请参考以下\
    \ *图 9.16*：\n\n**图 9.16：** 展示 Qt Designer 中 QTextBrowser 源 searchPaths 的图片\n\n\
    ## openExternalLinks\n\n此属性决定指向外部 URL 的链接是在 QTextBrowser 对象内打开还是作为单独的应用程序打开。默认值为\
    \ **False**。请参考以下 *图 9.17*：\n\n**图 9.17：** 展示 Qt Designer 中 QTextBrowser openExternalLinks\
    \ 属性的图片\n\n## openLinks\n\n根据此属性，如果用户尝试使用鼠标或键盘激活链接，QTextBrowser 应自动打开这些链接。默认值为\
    \ **True**。请参考以下 *图 9.18*：\n\n**图 9.18：** 展示 Qt Designer 中 QTextBrowser openLinks\
    \ 属性的图片\n\n## 重要方法/信号\n\n让我们来看一些重要的方法和信号：\n\n- `isBackwardAvailable()`：如果 `QTextBrowser`\
