    \ name will be the same for creating an object of different classes, which we\
    \ will be creating in all these examples.\n\nWe can see that we have created an\
    \ application user credentials app without the usage of any layout management,\
    \ that is, without any arranging of widgets in our UI form. Now, in the next chapter,\
    \ we will study how to create the same application by using layout management.\n\
    \n## Conclusion\n\nIn this chapter, we learned about the difference between PyQt5\
