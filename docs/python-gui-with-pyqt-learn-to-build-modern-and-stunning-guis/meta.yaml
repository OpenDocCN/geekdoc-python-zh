    \    myapp = QApplication(sys.argv)\n    mywindow = Absolute_Position()\n    sys.exit(myapp.exec_())\n\
    ```\n\n## Output:\n\nThe output can be seen in the following [Figure 2.2](Figure\
    \ 2.2):\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_70_0.png)\n\n**Figure 2.2:**\
    \ *Output of Chap2_Example1.py*\n\n> **Note:** The preceding code is covered in\
    \ Program Name: Chap2_Example1.py\n\nOn comparing with the original user credentials\
    \ app, (refer to [Figure 2.2](#figure-22)), we can see that there is hardly any\
    \ difference between the original code and the one we wrote using absolute positioning.\
    \ Now, let us understand the code.\n\n- In RAP1, first import the sys module for\
