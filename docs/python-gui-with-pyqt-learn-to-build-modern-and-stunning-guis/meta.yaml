    # Important methods


    Some important methods are as follows:


    +   - `addSubWindow(widget[, flags=Qt.WindowFlags()])`: This method will add the
    widget as a new sub-window to the `MdiArea` which will override the flags set
    on the widget when `WindowFlags` are non-zero.

    - `removeSubWindow(widget)`: This method will reduce the widget (which can be
    either an internal widget of a sub-window or a `QMdiSubWindow`) from the `MdiArea`.

    - `activeSubWindow()`: A pointer is returned to the current active sub-window
    else, `None` is returned if no window is currently active.

    - `cascadeSubWindows()`: This method will arrange all sub-windows in a cascading
    pattern.'
  - '[PAGE 410]


    +   - **tileSubWindows()**: This method will arrange all sub-windows in a tiled
    pattern.

    - **closeActiveSubWindow()**: The currently active sub-window is closed using
    this method.

    - **SubWindowList([order = CreationOrder])**: A list of sub-windows is returned
    in the **QMdiArea** object. The default order is the **CreationOrder**, which
    means sorting will be done in the order in which they were inserted into the workspace.

    - **setWidget()**: Using this method, a **QWidget** is set as an internal widget
    of a **QMdiSubWindow** instance.


    # Important signals


    Let us go over some important signals now:


    # subWindowActivated(arg__1)


    When a sub-window within the MDI area becomes the active window, the **subWindowActivated**
    signal in **QMdiArea** object is emitted. **arg__1** refers to the newly active
    sub-window.


