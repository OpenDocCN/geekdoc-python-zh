- md: "## Radio Button\n\nThis widget will mainly be used when we need to select only\
    \ one option from multiple options of a GUI form. We can provide some text label\
    \ with any selectable button. If any of the **QRadioButton** widget is selected,\
    \ then there will be deselection of the previously selected button since it is\
    \ auto-exclusive by default. We mostly used the above widget with **QButtonGroup**\
    \ or **QGroupBox**.\n\n## Important properties\n\nIt contains properties of 3\
    \ classes:\n\n- **QObject**\n- **QWidget**\n- **QAbstractButton**\n\n## Important\
    \ methods\n\nSome important methods are as follows:\n\n- **isChecked()**: Using\
    \ this method, Boolean value will be returned if the **QRadioButton** widget is\
    \ selected.\n- **setChecked()**: Using this method, we can select/deselect the\
    \ QRadioButton widget based on the Boolean value passed.\n- **text()**: Using\
    \ this method, we can retrieve the text of QRadioButton widget.\n- **setText()**:\
    \ From the name we can guess that using this method, will set the text of QRadioButton\
    \ widget.\n- **setIcon()**: Using this method, an icon will be displayed with\
    \ QRadioButton widget.\n\n## Important signals\n\nThe signals are similar to QPushButton\
    \ widget. Refer to Figure 4.27:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_204_0.png)\n\
    \nLet us create one simple application to understand this QRadioButton widget.\
    \ The details of file names are as shown in the following Table 4.3:\n\n| S No.\
    \ | Qt Designer File Name (.ui) | Converting the QtDesigner file name to Python\
    \ file (.py) | Creating another Python file and importing the converted Python\
    \ file from Qt Designer |\n| :--- | :--- | :--- | :--- |\n| 1 | radiobutton_eg1.ui\
    \ | radiobutton_eg1.py | run_radiobutton_eg1.py |\n\nThe Qt Designer file **radiobutton_eg1.ui**\
    \ is shown in the following figure:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_205_0.png)\n\
    \n**Figure 4.28:** Qt Designer file: radiobutton_eg1.ui\n\n> **Note:** The above\
    \ .ui file is covered in Path: Radio_Button/radiobutton_eg1.ui.\n\nConsider the\
    \ following code of **run_radiobutton_eg1.py**:\n\n```python\nimport sys\nfrom\
    \ PyQt5.QtWidgets import QMainWindow, QApplication\nfrom radiobutton_eg1 import\
    \ * # RBEG1_1\n\nclass MyForm(QMainWindow):\n    def __init__(self):\n       \
    \ super().__init__()\n        self.ui = Ui_MainWindow()\n        self.ui.setupUi(self)\n\
    \n        self.ui.rbtn_apple.toggled.connect(lambda:self.myselfcheck(self.ui.rbtn_apple))\
    \ # RBEG1_2\n        self.ui.rbtn_orange.toggled.connect(lambda:self.myselfcheck(self.ui.rbtn_orange))\
    \ # RBEG1_3\n        self.ui.rbtn_banana.toggled.connect(lambda:self.myselfcheck(self.ui.rbtn_banana))\
    \ # RBEG1_4\n        self.show()\n\n    def myselfcheck(self, myradiobutton):\
