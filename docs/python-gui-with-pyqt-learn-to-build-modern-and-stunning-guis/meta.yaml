    creating interactive user interfaces. The primary objective of this chapter is
    to help you understand their properties, functionality, and customization options.
    Understanding and using the many widget classes and components offered by the
    Qt framework for displaying and manipulating data in a tabular or list-based manner
    is the primary goal of discussing **Item View** widgets in Qt Designer. Qt Designer''s
    **Item View** widgets, such as `QTableView`, `QTreeView`, and `QListView`, are
    effective tools for presenting data in an organized and ordered way.


    # Data presentation


    **Item View** widgets can be used to present data in a graphical and user-friendly
    manner. Users can use these widgets to display data in simple list formats (`QListView`),
    hierarchical tree structures (`QTreeView`), or rows and columns (`QTableView`).
    Data editing and manipulation are capabilities that are already built into **Item
    View** widgets. The user can add, remove, or alter objects to interact with the
    data shown in the widgets and can also design behaviors and set properties for
    these activities using Qt Designer. Since the user can alter their appearance
    and behavior and may also design unique user interfaces suited to their requirements,
    item views are entirely adjustable. The Model-View architecture, a key Qt idea
    for separating data representation (model) from the visual display (view) and
    user interaction (delegate), is also introduced to the user. The user may better
    understand the ideas of models, views, and delegates as well as how they interact
    by learning about item view widgets. The important properties of `QFrame`, `QAbstractScrollArea`,
    and `QAbstractItemView` are covered with images at the end as add-on information.


