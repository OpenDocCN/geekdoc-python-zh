    \ | run_groupboxWidget_eg1.py |\n\n**表7.1**：文件名详情\n\nQt Designer文件如下图所示：\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_362_0.png)\n\
    \n**图7.7：** Qt Designer文件：GroupBox/groupboxWidget_eg1.ui\n\n> **注意：上述.ui文件位于路径：GroupBox/groupboxWidget_eg1.ui**\n\
