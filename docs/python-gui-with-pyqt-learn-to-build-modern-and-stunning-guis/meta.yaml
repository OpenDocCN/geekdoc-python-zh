    \n当此属性设置为 **True** 时，将使 `QTextEdit` 对象中的文本为只读，即无法编辑。默认值为 **False**。请参考下图：\n\n\
    ![](img/9ef0c0b339dea43dffe3f61f95760762_460_0.png)\n\n**图 8.48：** 描绘 Qt Designer\
