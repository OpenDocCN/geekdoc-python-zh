  md: '# CHAPTER 5

    Getting Insights of Item Views in Qt Designer


    # Introduction


    After discussing button widgets, we shall now move on to our next topic, which
    is about Item Views in Qt Designer. There has to be some approach for accessing,
    managing, and displaying the data to the user. So, based on the software design
    pattern of **Model-View-Controller (MVC)**, PyQt5 utilizes the same architecture
    of Model/View. The data from the data source will be accessed by the model and
    will provide data to the view. This view will present the items stored in a model
    and reflect the changes to the data in the model. The data editing in the model
    will be handled by the delegate, who will also be responsible for items drawn
    in the view. You may visit the website at [https://doc.qt.io](https://doc.qt.io),
    where a plethora of information on PyQt5 functions and properties is provided.


    Our main focus in this chapter will be on learning about `QListView`, `QTreeView`,
    `QTableView`, and `QColumnView`. We will be focusing on properties and some useful
    methods. All these widgets are available under **Item Views** in Qt Designer,
    as shown in the following figure. The user can select any of the'
  merge: -1
  pgno: 259
- img_proc: true
  md: 'widgets under **Item Views** and drag and drop in a GUI form. Please refer
    to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_260_0.png)


    **Figure 5.1:** *Different Item Views (ModelBased) in Qt Designer*


    The base class for these widgets is an abstract class **QAbstractItemView**, which
    provides support for header management and item selection. We have already seen
    **QObject** and **QWidget** classes when dealing with Button type widgets. The
    same applies to **Item Views** widgets, too. There are other classes we will be
    discussing about, such as **QFrame**, **QAbstractScrollArea**, and **QAbstractItemView**
    class, which will be discussed at the end of this chapter. Moreover, we will also
    discuss **QStandardItemModel** at the end, which provides a standard item-based
    approach for working with the model.


    # Structure


    In this chapter, we will learn the following topics:


    +   - List view

    - Tree view

    - Table view

    - Column view


    # Objectives


    After reading this chapter, the reader will get to know about **Item Views** in
    Qt Designer, which are commonly used for'
  merge: -1
  pgno: 260
- img_proc: true
  md: 'creating interactive user interfaces. The primary objective of this chapter
    is to help you understand their properties, functionality, and customization options.
    Understanding and using the many widget classes and components offered by the
    Qt framework for displaying and manipulating data in a tabular or list-based manner
    is the primary goal of discussing **Item View** widgets in Qt Designer. Qt Designer''s
    **Item View** widgets, such as `QTableView`, `QTreeView`, and `QListView`, are
    effective tools for presenting data in an organized and ordered way.


    # Data presentation


    **Item View** widgets can be used to present data in a graphical and user-friendly
    manner. Users can use these widgets to display data in simple list formats (`QListView`),
    hierarchical tree structures (`QTreeView`), or rows and columns (`QTableView`).
    Data editing and manipulation are capabilities that are already built into **Item
    View** widgets. The user can add, remove, or alter objects to interact with the
    data shown in the widgets and can also design behaviors and set properties for
    these activities using Qt Designer. Since the user can alter their appearance
    and behavior and may also design unique user interfaces suited to their requirements,
    item views are entirely adjustable. The Model-View architecture, a key Qt idea
    for separating data representation (model) from the visual display (view) and
    user interaction (delegate), is also introduced to the user. The user may better
    understand the ideas of models, views, and delegates as well as how they interact
    by learning about item view widgets. The important properties of `QFrame`, `QAbstractScrollArea`,
    and `QAbstractItemView` are covered with images at the end as add-on information.


    # List view'
