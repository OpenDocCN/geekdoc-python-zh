    # Text browser


    A rich text browser with hypertext navigation capabilities is offered by PyQt5’s
    **QtextBrowser** class. The user can interact with the text by clicking on links
    and selecting the text, and it is used to display formatted text, including images
    and links. The read-only **QtextBrowser** class extends the **QtextEdit** class
    and offers more functionality for displaying and navigating hypertext. It supports
    a number of text types, including plain text, HTML, and Markdown. **Cascading
    Style Sheets (CSS)** and inline HTML tags can be used to style the text.


