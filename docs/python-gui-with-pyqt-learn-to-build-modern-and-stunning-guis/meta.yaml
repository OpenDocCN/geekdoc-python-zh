    通过此属性，我们可以启用/禁用控件的 `tabletTracking`。默认情况下是禁用的。当至少一个手写笔按钮被按下或手写笔与数位板之间存在接触时，控件会接收数位板移动事件。启用后，即使在近距离悬停时，控件也会接收数位板移动事件。

