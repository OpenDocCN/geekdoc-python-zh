    # Tool Button


    Often, there comes a requirement for selecting commands or actions by providing
    quick access buttons. In such cases, we will be using Tool Buttons which are most
    commonly used in the QToolBar widget. We generally see an icon itself instead
    of text in a Tool Button widget.'
