    a user interface. By dragging the toolbox item from the Containers area of the
    widget box onto the form in Qt Designer, the toolbox widget may be added to a
    form. A toolbox is a widget that shows a column of tabs stacked one on top of
    the other, with the current item showing up below the active tab. Each tab has
    a certain index location within the tab column. A **QWidget** is an item in a
    tab. The column of tabbed widget items is provided by the **QToolBox** class.


