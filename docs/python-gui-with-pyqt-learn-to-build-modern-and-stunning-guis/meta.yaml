    # QGridLayout


    Suppose in our application, there is a requirement to arrange widgets in a grid
    of rows and columns. In that case, we must know about QGridLayout. It is one of
    the most universal layout classes for arranging the widgets in pairs, where each
    widget will have a relative position, and will be arranged in a grid of rows and
    columns. Its application ranges from adding buttons, while creating a calculator
    app or making a virtual keypad and so on. The pair of coordinates for arranging
    the widgets and placing'
