    \ widget is the `QMdiArea` widget. The `QMdiSubWindow` class is represented by\
    \ the child windows in this section. Any `QWidget` may be chosen to serve as the\
    \ internal widget for the `subWindow` object. In the MDI area, sub-windows may\
    \ be set up in a tiled or cascading pattern.\n\n## Important properties\n\nLet\
