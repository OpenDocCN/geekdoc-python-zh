    # Tree view


    One of the parts of Qt''s Model/View framework creates a tree representation of
    items from the model. In order to display data provided by models descended from
    the `QAbstractItemModel` class, `QTreeView` implements the interfaces described
    by the `QAbstractItemView` class. The model/view architecture ensures that as
    the model changes, the tree view''s contents are updated. A tree view''s default
    model/view implementation is offered by the `QTreeView` class.


    # Important properties'
