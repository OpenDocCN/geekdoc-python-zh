    # # Important properties


    Apart from the properties of 2 classes (**QObject** and **QWidget**), there are
    some other properties of **QDialogButtonBox** widget, which will be discussed
    as follows.


    # ## orientation


    Using this property, we can set the orientation of **QDialogButtonBox** widget
    to either **Horizontal** or **Vertical**. The default value is horizontal. If
    Horizontal is selected, then buttons will be laid side by side. If Vertical is
    selected, then buttons will be laid out stacked on top of each other. Refer to
    the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_228_1.png)


    **Figure 4.45:** *Image depicting orientation property of QDialogButtonBox in
    Qt Designer*


    # ## standardButtons'
  - '[PAGE 229]


    From a list of standard buttons, we can choose any of them based on our application.
    This returns the enum value of standard buttons corresponding to the given button.
    By default, **Ok** and **Cancel** standard buttons are checked and will be displayed
    in a GUI form, when drag and dropped from Widget Box. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_229_0.png)


    *Figure 4.46:* Image depicting standardButtons property of QDialogButtonBox in
    Qt Designer


    # centerButtons


    When checked, the buttons in the `QDialogButtonBox` widget will be centered. It
    is unchecked by default. This property will determine whether the buttons in the
    button box object are centered horizontally or not. This property can be used
    to create dialog boxes that are more visually appealing.


    # Important methods


    The various important methods are:'
  - '[PAGE 230]


    +   - **addButton (button)**: Using this method, standard button can be added
    to the QDialogButtonBox widget if valid. Zero will be returned and will not be
    added to the QDialogButtonBox widget if button is invalid.

    - **addButton (button, role)**: Using this method, the button can be added to
    the QDialogButtonBox widget with role specified. The button will not be added
    when the role is invalid. Already added button will be removed and with a new
    role will be added again.

    - **setOrientation (Orientation)**: Using this method, we can set the orientation
    of the QDialogButtonBox widget to either horizontal or vertical.

    - **setStandardButtons (buttons)**: Using this method, we can set the collection
    of standard Buttons in the QDialogButtonBox widget.


    # Important signals


    The important signals of QDialogButtonBox is mentioned in the figure below.


    ![](img/9ef0c0b339dea43dffe3f61f95760762_230_0.png)


    **Figure 4.47:** *Image depicting QDialogButtonBox signals in Qt Designer*


    **accepted()**:When the user clicks on a button that accepts the dialog , then
    this signal will be emitted. This include buttons such as **Ok**, **Yes** Or **Save**.'
  - '[PAGE 231]


    **rejected():** When the user clicks on a button that rejects the dialog , then
    this signal will be emitted. This include buttons such as **Cancel**, **No** or
    **Close**.


    **clicked(QAbstractButton*):** When the user clicks on any button in the buttonbox,
    then this signal will be emitted. It takes a parameter which is a pointer to the
    button that was clicked.


    **helpRequested:** When the user clicks on a button that has the *HelpRole* role,
    then this signal will be emitted. This include buttons such as **Help**, **?**
    or **More Information**.


