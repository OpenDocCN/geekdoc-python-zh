    # alignment


    We can set the alignment of the title within the `QScrollArea` object''s frame
    either vertically or horizontally. Users can choose multiple options from either
    of these alignments. Refer to the following figure:


    | alignment | AlignLeft, AlignVCenter |

    | :--- | :--- |

    | Horizontal | AlignLeft |

    | Vertical | AlignVCenter |


    **Figure 7.12:** *Image depicting alignment property of QScrollArea in Qt Designer*


    # Important methods


    Some important methods are as follows:


    +   - `setWidget(widget)`: We can set the widget contained within the scroll area.
    The widget will be destroyed when the scroll area is deleted, as it becomes a
    child of the scroll area.

    - `setWidgetResizable(resizable)`: Using this method, we can set the widget contained
    within the scroll area to be resized to fit the area.'
