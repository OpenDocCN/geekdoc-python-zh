    # Line Edit


    One of the most commonly used single-line text editors of Qt Designer is `QLineEdit`
    widget. It is frequently used to display text or to accept text input from users.
    Various properties, including font, input mask, placeholder text, and so on, can
    be changed. Additionally, it offers signals like `editingFinished` and `textChanged`
    that are emitted when a user interacts with the widget.


    # Important properties


    Let us go over some important properties now.


    # inputMask


    This property defines a string that specifies a validation input mask. A valid
    input format is defined by the mask, such as any phone number, IP Address, date,
    and so on. An empty string is returned if no mask is set. Some of the different
    mask characters and meanings can be found in the following [Table 8.3](Table 8.3):'
  merge: -1
  pgno: 442
- img_proc: true
  md: '| Mask Characters | Meaning |

    |---|---|

    | 9 | Character of the Number category that is required such as 0–9. |

    | 0 | Character of the Number category that is permitted but not required |

    | D | Character of the Number category that is required and greater than zero,
    such as 1–9. |

    | d | Character of the Number category that is permitted but not required and
    greater than zero, such as 1–9. |

    | A | Character of the Letter category that is required such as A-Z or a-z. |

    | a | Character of the Letter category that is permitted but not required |

    | N | Character of the Number or Letter category that is required such as 0-9,
    A-Z, a-z. |

    | n | Character of the Number or Letter category that is permitted but not required
    |

    | X | Any non-blank character is required. |

    | x | Any non-blank character is permitted but not required. |

    | # | +/- sign or character of the number category is permitted but not required.
    |

    | H | Requirement of the hexadecimal character A-F, a-f , 0-9. |

    | h | Hexadecimal character is permitted but not required. |

    | B | Requirement of the binary character 0-1. |

    | b | Binary character is permitted but not required. |

    | < | Makes all the alphabetic characters to lowercase. |

    | > | Makes all the alphabetic characters to uppercase. |

    | ! | Case conversion is switched off. |

    | \ | Special character escapes for using them as separators. |

    | {} | A user-defined character is represented to define a custom character set.
    |'
