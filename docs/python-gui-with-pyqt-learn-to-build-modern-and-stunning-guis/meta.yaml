  md: '# CHAPTER 4

    Getting Insights of Button Widgets in Qt Designer


    # Introduction


    In this chapter, we shall see our next anticipated topic for discussion, revolving
    around Button widgets in Qt Designer. The different buttons present in Qt Designer
    include **Push Button**, **Tool Button**, **Radio Button**, **Check Box**, **Command
    Link Button**, and **Dialog Button Box**. We will be discussing all these widgets
    in detail, including their description, importance and useful properties, methods/functions,
    and signals with examples. Our entire flow of discussion will not only be restricted
    to this chapter, and the same pattern will be followed in the explanation of other
    widgets of Qt Designer in the remaining chapters. All these button types will
    be available, as shown in the following *Figure 4.1*, in the Widget Box where
    the user can select any of the widgets under button types of Qt Designer and drag
    and drop in a GUI form. Please refer to the following figure:'
  merge: -1
  pgno: 170
- img_proc: true
  md: '![](img/9ef0c0b339dea43dffe3f61f95760762_171_0.png)


    **Figure 4.1:** *Different buttons type in Qt Designer*


    Now, without any further delay, let us learn about different Button widgets. These
    Button widgets will come into handy when the user wants to interact with the GUI
    form widgets and waits for some kind of feedback. Icons or text can be displayed
    in PyQt5 using these Button widgets. The base class for Button widgets is **QAbstractButton**
    which provides checkable (toggle) buttons and Push Buttons support.


    # ## Structure


    In this chapter, we will discuss the following topics:


    +   - Push Button

    - Tool Button

    - Radio Button

    - Check Box

    - Command Link Button

    - Dialog Button Box

    - Common properties for Button widgets


    # ## Objectives


    After reading this chapter, the reader will get to know about Button widgets,
    which are commonly used for creating'
  merge: -1
  pgno: 171
- img_proc: true
  md: 'interactive user interfaces. The primary objective of this chapter is to understand
    their properties, functionality, and customization options. By exploring the features
    and settings related to Button widgets, we can effectively design and implement
    user-friendly interfaces in our Qt applications. Qt Designer offers a number of
    different Button widgets, including **CheckBox**, **PushButton**, **ToolButton**,
    **Radio Button**, **Command Link Button** and so on. We shall explore description,
    properties, important methods, important signals and an application example with
    output display of each Button widget in detail. The important properties of **QObject**,
    **QWidget** and **QAbstractButton** are covered with images at the end as an add-on
    information. The same concept of common properties will be applicable for all
    further chapters.


    # Push Button


    One of the most used widgets in PyQt5 without which we cannot imagine creating
    an application, is none other than a simple Button which is the Push Button. **QPushButton**
    class which represents a Button is imported from **PyQt5.QtWidgets** module. We
    have seen different buttons in various applications such as **OK**, **Cancel**,
    **Yes**, **No**, **Help** and so on. Generally, we can display simple text to
    the user or any icon using a Push Button. Its shape is rectangular. Just remember,
    whenever we need to prompt some action to be done in the background of application
    using some click operation, the first widget which comes to your mind must be
    the Push Button.


    # Important properties


    There are multiple properties that will be discussed. Just drag and drop a simple
    Push Button from Widget Box. Under **Property Editor**, we will see different
    properties which are headed under **QObject**, **QWidget**, **QAbstractButton**,
    and **QPushButton**. For all Qt objects, **QObject** class is the base class.
    Under this,'
  merge: -1
  pgno: 172
- img_proc: true
  md: 'we have the `objectName` property where some name is provided by the user.
    The name may be changed based on the requirement.


    > **Note:** It is important to know that properties for QObject, QWidget and QAbstractButton
    classes are common to all Button types, except the Dialog Button Box widget. Under
    this Dialog Button Box widget, we have the properties for QObject and QWidgetclasses
    only. In fact, every widget in Qt Designer will have the properties for QObject
    and QWidgetclasses.


    **The properties common for different Button widgets, that is, QObject, QWidget
    and QAbstractButton class are discussed at the end of this chapter.**


    Apart from the properties of these 3 classes, there are some other properties
    of the **QPushButton** widget, as can be seen in the following *Figure 4.2*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_173_0.png)


    *Figure 4.2:* Other QPushButton Properties apart from properties of 3 classes
    (QObject, QWidget and QAbstractButton)


    # autoDefault


    This property will enable the `autoDefault` Button property in a **QPushButton**
    widget. If the parent is **QDialog** for buttons, then this property default value
    is **True**. Otherwise, it is **False**. Auto-default button may have a larger
    size as it is drawn with some extra frames of 3 pixels or more.


    # default


    From this property, we can decide whether **QPushButton** widget has a `default`
    Button property or not. It is disabled by default.


    When the user presses *Enter* button from keyboard, the dialog''s `default` button
    will automatically be pressed when'
  merge: -1
  pgno: 173
- img_proc: true
  md: 'this property will be enabled, that is, set to True but with an exception.
    If the **autoDefault** button is present and has *focus*, then this **autoDefault**
    button is pressed. If there is an **autodefault** button but no **default** button,
    then pressing *Enter* will press an **autodefault** button that has focus. If
    no button has focus, then pressing *Enter* will press the next **autodefault**
    button in the focus chain. We can see the behavior of the **default** button only
    in dialogs. From the keyboard, we can use a spacebar for clicking buttons when
    it has focus. If the property is set to False on the current **default** button,
    then a new **default** button will be automatically assigned the next time the
    **QPushButton** widget in the dialog will receive focus.


    # flat


    This property will decide whether to raise the button border or not. It is unchecked
    by default. Unless the button is pressed, most styles will not paint the background
    when checked.


    # Important methods


    Some important methods of **QPushButton** widget are as follows:


    +   - **isChecked()**: Using this method, we will get the **QPushButton** widget
    Boolean state.

    - **setCheckable()**: Using this method, we can distinguish the pressed and released
    state of the **QPushButton** widget when set to True.

    - **text()**: Using this method, we will get the text from the **QPushButton**
    widget.

    - **setText()**: Using this method, the text will be assigned to the **QPushButton**
    widget.

    - **setDefault()**: Using this method, the **QPushButton** widget will be set
    as default.'
  merge: -1
  pgno: 174
- img_proc: true
  md: '+   - **setIcon()**: Using this method, an icon will be assigned to the **QPushButton**
    widget.

    - **setEnabled()**: On using this method, if set to False, the signal will not
    be emitted from the **QPushButton** widget as it will be disabled.

    - **toggle()**: From this method, there will be a change of state in the **QPushButton**
    widget as it will toggle between checkable states.


    # Important signals


    The signals which can be used with this **QPushButton** widget, are shown in the
    following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_175_0.png)


    *Figure 4.3: Signals in QPushButton widget in Qt Designer*


    +   - **pressed()**: This signal will be emitted when the left mouse button in
    **QPushButton** widget is pressed.

    - **released()**: This signal will be emitted when the left mouse button in **QPushButton**
    widget is released.

    - **clicked()**: This signal will be emitted when the **QPushButton** widget is
    clicked.

    - **toggled()**: This signal will be emitted when the **QPushButton** widget state
    is changed.


    Now, we shall see an example of the **QPushButton** widget where we see its usage
    of properties, methods, and signals.'
