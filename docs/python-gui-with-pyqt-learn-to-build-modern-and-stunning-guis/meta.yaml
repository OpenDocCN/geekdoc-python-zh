    \n## QAbstractScrollArea\n\nIn QAbstractScrollArea class (common for all the model-based\
    \ item views widgets of Qt Designer), there is a viewport (area contents providing\
    \ a central widget) that is scrolled. There is a vertical and horizontal scroll\
