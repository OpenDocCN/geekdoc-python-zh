    # Text browser


    A rich text browser with hypertext navigation capabilities is offered by PyQt5’s
    **QtextBrowser** class. The user can interact with the text by clicking on links
    and selecting the text, and it is used to display formatted text, including images
    and links. The read-only **QtextBrowser** class extends the **QtextEdit** class
    and offers more functionality for displaying and navigating hypertext. It supports
    a number of text types, including plain text, HTML, and Markdown. **Cascading
    Style Sheets (CSS)** and inline HTML tags can be used to style the text.


    # Important properties


    It contains properties of **QtextEdit**. The other properties are discussed in
    the following sections.


    # Source


    The URL of the current document displayed in the **QtextBrowser** object can be
    set or obtained using this property. Both the **source()** method and **setSource()**
    method can be used to get and set it. Refer to the following *Figure 9.15*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_545_0.png)'
  - '[PAGE 546]


    **Figure 9.15:** *Image depicting source property of QTextBrowser in Qt Designer*


    # searchPaths


    This property will hold the search paths used by the QTextBrowser object to search
    for resources such as images and documents. Refer to the following *Figure 9.16*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_546_0.png)


    **Figure 9.16:** *Image depicting source searchPaths of QTextBrowser in Qt Designer*


    # openExternalLinks


    This property determines whether links that lead to external URLs should be opened
    within QTextBrowser object or as a separate application. The default value is
    **False**. Refer to the following *Figure 9.17*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_546_1.png)


    **Figure 9.17:** *Image depicting openExternalLinks property of QTextBrowser in
    Qt Designer*


    # openLinks


    If the user attempts to activate links using the mouse or keyboard, QTextBrowser
    should automatically open those links, according to this property. The default
    value is **True**. Refer to the following *Figure 9.18*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_546_2.png)


    **Figure 9.18:** *Image depicting openLinks property of QTextBrowser in Qt Designer*'
