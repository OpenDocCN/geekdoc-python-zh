    \ e:\n            self.myui.hover_mouse_btn_2.setStyleSheet(\"background-color\
    \ : violet\")  # RME_5\n        self.show()\n\n    def mousePressEvent(self, e):\
    \ # RME_6\n        if e.button() == Qt.LeftButton:# RME_7\n            self.myui.lm_click_btn_2.setStyleSheet(\"\
    background-color : green\")# RME_8\n        if e.button() == Qt.RightButton:#\
    \ RME_9\n            self.myui.rm_click_btn_2.setStyleSheet(\"background-color\
    \ : red\")# RME_10\n\n    def mouseDoubleClickEvent(self, e):# RME_11\n      \
    \  if e.button() == Qt.LeftButton:# RME_12\n            self.myui.left_double_click_btn_2.setStyleSheet(\"\
    background-color : yellow\")# RME_13\n\nif __name__ == '__main__':\n    myapp\
    \ = QApplication(sys.argv)\n    mywindow = MyMainWindow()# RME_14\n    sys.exit(myapp.exec_())\n\
    ```\n\n**Output:**\nThe output can be seen in Figures 3.2 to 3.6 with different\
    \ cases below:\n\n## Case-1: When mouse is getting entered in Button with text\
    \ “Mouse Hover”\n\n*Figure 3.2: Case-1 Output of MouseEventArgs_Eg1_files/run_MouseEventArgs_Eg1.py*\n\
    \n## Case-2: When mouse is leaving in Button with text “Mouse Hover”"
  mdcn: "## 结论\n\n在本章中，我们学习了如何使用绝对定位和布局类来排列控件。我们看到了使用绝对定位、**QBoxLayout**、**QGridLayout**\
    \ 和 **QFormLayout** 类创建“用户凭证应用”的不同方法。\n\n理解本章内容很重要，因为在接下来的章节中，我们将使用所有这些概念来展示多个应用程序。我们将编写代码，通过从控件箱拖放控件以及使用工具栏图标来排列布局，从而创建我们的应用程序。\n\
    \n## 要点回顾\n\n- 我们可以使用绝对定位方法，借助 `move(x,y)` 方法在 GUI 表单中定位控件。\n- 我们可以使用 `QBoxLayout`\
    \ 类将控件水平或垂直排列。使用 `QHBoxLayout` 可以将控件并排排列成一行，使用的方法包括 `addStretch`、`addWidget` 和\
    \ `addLayout`。\n- 可以使用 `addStretch` 方法创建一个空的可伸缩框。\n- 可以使用 `QGridLayout` 将控件排列成行和列的网格。\n\
    - 在 `QGridLayout` 的 span 中，rowspan 和 colspan 的默认值为 1。\n- `setColumnStretch` 和\
    \ `setRowStretch` 通常用于设置列/行的伸缩因子。\n- 使用 `QFormLayout`，我们可以创建一个两列形式的应用程序，其中每一行包含一个标签（第一列）和一个关联的输入字段（第二列）。\n\
    \n## 问题\n\n1. 列举布局管理在 GUI 设计中的重要性。\n2. 绘制并解释使用绝对定位的 GUI 表单坐标系统。\n3. 详细解释使用绝对定位放置控件。\n\
    4. 详细解释使用布局类放置控件。\n5. 解释以下内容：\n    a. QHBoxLayout\n    b. QHBoxLayout\n    c.\
    \ 带有 addstretch 的 QHBoxLayout\n    d. QVBoxLayout\n    e. QGridLayout\n    f.\
    \ QFormLayout\n\n## 加入我们的书籍 Discord 空间\n\n加入书籍的 Discord 工作区，获取最新更新、优惠、全球科技动态、新书发布以及与作者的交流会：\n\
    https://discord.bpbonline.com\n\n# 第 3 章\n深入了解事件、信号和槽\n\n## 简介\n\nPyQt5 是一个用于桌面应用程序开发的\
    \ Python 框架，它依赖于事件、信号和槽的概念来创建交互式用户界面。事件是这个系统的基础，代表用户操作（如按钮点击或键盘输入）和系统事件。信号充当中介，在特定事件发生时通知应用程序。而槽是连接到信号的函数或方法，定义了应用程序对这些事件的响应。通过将信号连接到槽，开发人员可以精确控制应用程序如何响应用户交互和其他事件，最终能够在\
    \ Python 中创建动态、响应迅速且用户友好的桌面应用程序。这种理解对于 PyQt5 的初学者和经验丰富的开发人员都至关重要，使他们能够构建能够无缝适应用户操作和系统变化的应用程序。\n\
    \n## 结构\n\n在本章中，我们将讨论以下主题：\n\n- 事件、信号和槽简介\n- 在 Qt Designer 中使用工具栏图标\n- Qt Designer\
    \ 中的信号槽示例\n\n## 目标\n\n阅读本章后，读者将了解 PyQt5 中的事件、信号和槽，并学习如何使用这些概念创建有用的桌面应用程序。首先，我们将通过跟踪鼠标移动在\
    \ Qt Designer 中创建一个 GUI 表单应用程序。我们将通过跟踪鼠标左键和右键点击来更改 **QPushButton** 控件的背景颜色。将展示各种示例，说明如何将信号链接到槽，以便通过操作\
    \ **QPushButton** 控件来创建简单的用户界面应用程序。最后，我们将了解如何为布局和控件创建与对象、信号和槽的连接，这些连接可以使用“编辑信号/槽”功能通过各种案例研究示例进行连接。因此，在本章中，我们将专门处理各种事件、信号和槽的概念。此外，我们还将学习在\
    \ Qt Designer 中使用信号/槽编辑器。\n\n## 事件、信号和槽简介\n\n使用控件创建的任何 GUI 应用程序都将充当事件源。为了响应至少一个事件，每个控件都被设计为能够发出信号。简单来说，当用户与控件发生交互时，控件会弹出通知。然而，这不是硬性规定。此外，它还可能发送关于发生了什么的数据。要执行任何操作，仅靠信号本身是不够的，它必须连接到一个槽。在\
    \ GUI 应用程序中，槽必须连接到信号。任何函数或方法都可以在 GUI 应用程序中用作槽。我们也可以说它用于信号接收器。许多 PyQt5 控件都有各种内置槽，我们将在创建应用程序时学习它们。\n\
    \n让我们首先看看每个控件都可能经历的最常见的事件。它与鼠标有关。让我们尝试使用我们的鼠标，通过左键单击、右键单击、悬停等操作来提示执行某些操作？\n我们正在使用\
    \ Qt Designer 创建一个 GUI 表单，文件名为 **MouseEvents_Eg1.ui**，如下图 *图 3.1* 所示：\n\n*图 3.1*：Qt\
    \ Designer 文件：MouseEvents_Eg1.ui\n\n> **注意：** 上述 .ui 文件位于路径：\n**MouseEvents_Eg1_files/MouseEvents_Eg1.ui**\n\
    \n然后，我们将使用以下命令将此 .ui 文件转换为 Python .py 文件：\n\n```\npyuic5 MouseEvents_Eg1.ui -o\
    \ MouseEvents_Eg1.py\n```\n\n> **注意：** 本章讨论的每个示例的 .ui 和 .py 文件都将在代码包中提供。只有文件名以\
    \ run_ 开头的 Python 文件的代码会显示出来，并在重要行处添加注释以供讨论。\n\n已创建另一个名为 **run_MouseEvents_Eg1.py**\
    \ 的 Python 文件，如下所示：\n\n```python\nimport sys\n\nfrom PyQt5.QtWidgets import QMainWindow,\
    \ QApplication\n# RME_1\n\nfrom MouseEvents_Eg1 import *# RME_2\n\nfrom PyQt5.QtCore\
    \ import Qt\n\nclass MyMainWindow(QMainWindow):\n    def __init__(self):\n   \
    \     super().__init__()\n        self.myui = Ui_MouseEvents_Eg1()\n        self.myui.setupUi(self)\n\
    \        self.setMouseTracking(True)# RME_3\n        self.myui.hover_mouse_btn_2.leaveEvent\
    \ = lambda e:\n            self.myui.hover_mouse_btn_2.setStyleSheet(\"background-color\
