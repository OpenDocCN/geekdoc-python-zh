    Now, we will look at another example of **QHBoxLayout**, but this time with **addStretch**
    method.


    # QHBoxLayout with addstretch


    The syntax of **addStretch** is:


    ```

    QHBoxLayout.addStretch(size)

    ```


    Here, **size** can be an integer number say -1,0 or 1, ...


    So, an empty stretchable box can be created using **addStretch** and is a nice
    way for filling up the blank space.'
