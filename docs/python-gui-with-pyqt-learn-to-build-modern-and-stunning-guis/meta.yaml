- md: "## Dialog Button Box\n\nWhenever there is a requirement to use standard buttons\
    \ (like **OK**, **Cancel**, **Ignore**, **Yes**, **No** and so on) in a layout\
    \ automatically on a GUI form, then we can go for `QDialogButtonBox` widget. We\
    \ can also create buttons and add them to the button box. But this will be a tedious\
    \ process. We can see that even in Qt Designer, there are options for selecting\
    \ a template as shown in the following figure:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_228_0.png)\n\
    \n**Figure 4.44:** *Qt Designer template for dialog with buttons bottom as well\
    \ as right*\n\n### Important properties\n\nApart from the properties of 2 classes\
    \ (**QObject** and **QWidget**), there are some other properties of **QDialogButtonBox**\
    \ widget, which will be discussed as follows.\n\n### orientation\n\nUsing this\
    \ property, we can set the orientation of **QDialogButtonBox** widget to either\
    \ **Horizontal** or **Vertical**. The default value is horizontal. If Horizontal\
    \ is selected, then buttons will be laid side by side. If Vertical is selected,\
    \ then buttons will be laid out stacked on top of each other. Refer to the following\
    \ figure:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_228_1.png)\n\n**Figure 4.45:**\
    \ *Image depicting orientation property of QDialogButtonBox in Qt Designer*\n\n\
    ### standardButtons\n\nFrom a list of standard buttons, we can choose any of them\
    \ based on our application. This returns the enum value of standard buttons corresponding\
    \ to the given button. By default, **Ok** and **Cancel** standard buttons are\
    \ checked and will be displayed in a GUI form, when drag and dropped from Widget\
    \ Box. Refer to the following figure:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_229_0.png)\n\
    \n*Figure 4.46:* Image depicting standardButtons property of QDialogButtonBox\
    \ in Qt Designer\n\n### centerButtons\n\nWhen checked, the buttons in the `QDialogButtonBox`\
    \ widget will be centered. It is unchecked by default. This property will determine\
    \ whether the buttons in the button box object are centered horizontally or not.\
    \ This property can be used to create dialog boxes that are more visually appealing.\n\
    \n### Important methods\n\nThe various important methods are:\n\n- **addButton\
    \ (button)**: Using this method, standard button can be added to the QDialogButtonBox\
    \ widget if valid. Zero will be returned and will not be added to the QDialogButtonBox\
    \ widget if button is invalid.\n- **addButton (button, role)**: Using this method,\
    \ the button can be added to the QDialogButtonBox widget with role specified.\
    \ The button will not be added when the role is invalid. Already added button\
    \ will be removed and with a new role will be added again.\n- **setOrientation\
    \ (Orientation)**: Using this method, we can set the orientation of the QDialogButtonBox\
    \ widget to either horizontal or vertical.\n- **setStandardButtons (buttons)**:\
    \ Using this method, we can set the collection of standard Buttons in the QDialogButtonBox\
    \ widget.\n\n### Important signals\n\nThe important signals of QDialogButtonBox\
    \ is mentioned in the figure below.\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_230_0.png)\n\
    \n**Figure 4.47:** *Image depicting QDialogButtonBox signals in Qt Designer*\n\
    \n**accepted()**: When the user clicks on a button that accepts the dialog, then\
    \ this signal will be emitted. This include buttons such as **Ok**, **Yes** Or\
    \ **Save**.\n\n**rejected():** When the user clicks on a button that rejects the\
    \ dialog, then this signal will be emitted. This include buttons such as **Cancel**,\
    \ **No** or **Close**.\n\n**clicked(QAbstractButton*):** When the user clicks\
    \ on any button in the buttonbox, then this signal will be emitted. It takes a\
    \ parameter which is a pointer to the button that was clicked.\n\n**helpRequested:**\
    \ When the user clicks on a button that has the *HelpRole* role, then this signal\
    \ will be emitted. This include buttons such as **Help**, **?** or **More Information**.\n\
    \nLet us create one simple application to understand this **QCommandLinkButton**\
    \ widget.\n\nThe details of file names are as shown in the following table:\n\n\
    | S No. | Qt Designer File Name (.ui) | Converting the QtDesigner file name to\
    \ Python file (.py) | Creating another Python file and importing the converted\
    \ Python file from Qt Designer |\n| :--- | :--- | :--- | :--- |\n| 1 | dialogbuttonbox_eg1.ui\
    \ | dialogbuttonbox_eg1.py | run_dialogbuttonbox_eg1.py |\n\n**Table 4.7:** *Details\
    \ of the file names*\n\nThe Qt Designer file `dialogbuttonbox_eg1.ui` is shown\
    \ in the following figure:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_232_0.png)\n\
    \n**Figure 4.48:** Qt Designer file :dialogbuttonbox_eg1.ui\n\n> **Note:** The\
    \ above .ui file is covered in Path: Dialog_Button/run_dialogbuttonbox_eg1.ui.\n\
    \nConsider the following code of **run_dialogbuttonbox_eg1.py**:\n\n```python\n\
    import sys\nfrom PyQt5.QtWidgets import QMainWindow, QApplication\nfrom dialogbuttonbox_eg1\
    \ import *\nimport webbrowser# importing webbrowser module\n\nclass MyDialogButtonBox(QMainWindow):\n\
    \    def __init__(self):\n        super().__init__()\n        self.myui = Ui_MainWindow()\n\
    \        self.myui.setupUi(self)\n        # will act when OK button is clicked\
    \ and\n        # displayinfo method is executed\n        self.myui.buttonBox.accepted.connect(self.displayinfo)\n\
    \        # will act when close button is clicked and\n        # will close the\
    \ GUI form\n        self.myui.buttonBox.rejected.connect(self.close)\n       \
    \ # will act when help button is clicked\n        self.myui.buttonBox.helpRequested.connect(lambda:\n\
    \            webbrowser.open(\"https://auth0.com/blog/username-\n            password-authentication/\"\
    ))\n        self.show()\n\n    def displayinfo(self):\n        if self.myui.lineEdit_2.text()\
    \ == \"1234\": #\n            # will check whether password is 1234\n        \
    \    # will display the message to the user\n            self.myui.lbl_display.setText(\"\
    Username\n            with \" + self.myui.lineEdit.text() + \" has login\n   \
    \         successfully\")\n        else:\n            # will display wrong password\
    \ if 1234\n            # is not typed\n            self.myui.lbl_display.setText(\"\
    Wrong Password:\")\n\nif __name__==\"__main__\":\n    app = QApplication(sys.argv)\n\
    \    w = MyDialogButtonBox()\n    w.show()\n    sys.exit(app.exec_())\n```\n\n\
    ### Output:\n\nThe output can be seen in the following figure:\n\n**Case-1: When\
    \ wrong password is entered and Ok button is clicked.**\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_235_0.png)\n\
    \n*Figure 4.49: Case-1 Output of Dialog_Button/ run_dialogbuttonbox_eg1.py*\n\n\
    **Case-2: When correct password is entered and Ok button is clicked.**\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_236_0.png)\n\
    \n*Figure 4.50:* Case-2 Output of Dialog_Button/ run_dialogbuttonbox_eg1.py\n\n\
    **Case-3: When Close button is clicked, GUI form is closed.**\n\n**Case-4: When\
    \ Help button is clicked and if internet is connected, then the above page with\
    \ link [https://auth0.com/blog/username-password-authentication/](https://auth0.com/blog/username-password-authentication/)\
    \ will be opened**\n\n> Note: The preceding code is covered in Program Name: Dialog_Button/run_dialogbuttonbox_eg1.py\n\
    \n## Common properties for Button widgets\n\nWe will be discussing each property\
    \ of Button widgets which are common among each other. Here, we will drag **Push\
    \ Button** widget from the Widget Box into the GUI form and will select and explain\
    \ the properties which are common among Button widgets. When we will be using\
    \ the term widget, just imagine that we are talking about **Push Button** widget.\
    \ But the same may be applied to other widgets too. Refer to the following figure:\n\
    \n![](img/9ef0c0b339dea43dffe3f61f95760762_237_0.png)\n\n**Figure 4.51:** *Image\
    \ depicting only Push Button Widget on a GUI form*\n\nLet us go over **QObject**\
    \ which are common for all the widgets of Qt Designer. The **QObject** is the\
    \ base class for all Qt classes and provides a number of features like Property\
    \ system for getting and setting the properties of objects, Object trees for creating\
    \ hierarchies of objects, Threading as objects can be safely used from multiple\
    \ threads, signals, slots, event handling etc. which will have already discussed\
    \ in our previous chapter.\n\n### objectName\n\nEvery widget will have **objectName**\
