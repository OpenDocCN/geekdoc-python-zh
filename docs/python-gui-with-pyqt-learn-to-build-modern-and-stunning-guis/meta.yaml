    \ radiobutton with text as Banana is clicked\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_208_1.png)\n\
    \n**Figure 4.32:** *Case-4 Output of run_radiobutton_eg1.py*\n\n> **Note:** The\
    \ preceding code is covered in Program Name: Radio_Button/run_radiobutton_eg1.py.\n\
    \nLet us understand the code:\n\n- In `RBEG1_1`, from `radiobutton_eg1.py` Python\
    \ file we are importing all the members of a module.\n- In `RBEG1_2`, we are connecting\
