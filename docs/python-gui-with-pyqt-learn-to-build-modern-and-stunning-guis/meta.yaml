    # CHAPTER 1

    Introduction to PyQt5 and Qt Designer Tool


    # Introduction


    In our previously launched book *Building Modern GUIs with tkinter and Python*,
    we learned how to create GUI forms using the Tk interface library. Now, we will
    be looking at another approach to create the same GUI forms using one of the most
    popular cross-platform libraries, known as PyQt5 library, which was developed
    by Riverbank Computing. A robust and cross-platform graphical toolkit called Qt
    has a Python binding called PyQt5. Python is a well-known and simple-to-learn
    programming language, and with PyQt5 developers, we can simply construct GUI applications
    using Python. With PyQt5, a visual layout tool called Qt Designer is included.
    Without having to write any code explicitly, it enables developers to construct
    GUI layouts quickly and easily by dragging and dropping widgets onto a canvas.
    Additionally, Qt Designer offers a selection of editable widgets that may be used
    to design distinctive user interfaces with eye-catching visuals.


    # Structure


    In this chapter, we will discuss the following topics:


    +   - Comparison of PyQt5 with tkinter library

    - PyQt5 framework installation

    - First GUI form creation using PyQt5 without using class

    - GUI form creation using PyQt5 by using class

    - Installation of Qt Designer tool with pre-defined templates

    - Components of Qt Designer

    - User Credential App Demo


    # Objectives


    By the end of this chapter, the reader will be able to compare the powerful and
    cross-platform toolkit graphical PyQt5, with the tkinter library. We shall see
    how to install the PyQt5 framework installation, along with the creation of a
    basic GUI form using PyQt5, first without, and then using the class. Moreover,
    we will be looking into the components inside Qt Designer along with different
    pre-defined templates. Finally, we will be creating a user credential app, initially
    focusing on the view in Qt Designer (.ui file which is a XML file), then converting
    it into a Python code (.py) using pyuic5 command, and finally creating a new Python
    file, which will be importing the Python code for user interface design and adding
    some useful logic to create a basic login application for the user.'
- md: '## Comparison of PyQt5 with tkinter library


    There are numerous Qt classes in a set of Python modules, which are compatible
    with many operating systems such as iOS, Windows, Linux, Unix, Android, and so
    on, which is a part of the top-level Python package, that is, PyQt5 library. Qt5
    in PyQt5 stands for **Qt version 5**. This library provides us the advantage of
    Python binding with the Qt C++ toolkit. An important point to note is that under
    the **GNU General Public License (GNU GPL or GPL)** v3 license, the PyQt5 license
    is being released. One may wonder that if we have already learned about tkinter,
    then why we should learn about PyQt5 as well? To better understand this, let us
    check the advantages of PyQt5 over other library packages such as tkinter:


    - **Flexibility in coding:** In order to establish simple communication between
    objects, there is a concept of signals and slots, which gives us flexibility for
    GUI programming using PyQt5, when dealing with events.

    - **More than GUI toolkit:** Using PyQt5, we can build entire applications using
    its graphics, printer support, networking, database access, and so on. It is like
    an application framework.

    - **Numerous UI components:** PyQt5 offers numerous widgets such as QLabel, QButton,
    QCombobox, and so on, such that each widget has some basic image well suited in
    all the platforms. Numerous advanced widgets are also available on the topic in
    this library.

    - **Numerous study resources:** If there is no documentation, then you might wonder
    what the point of learning is. PyQt5 comes with a rich array of documentation
    since it is one of the most commonly used Python packages for GUI creation.

    - **Easy to understand:** We can easily use previous knowledge of either Python,
    Qt or C++, thus making PyQt5 easy to understand.

    - **Preferred choice of GUI developers:** Due to simplicity and ease of use, many
    GUI developers opt for functionalities that come with PyQt5 to develop their own
    applications.

    - **GUI widget appearance:** The appearance of PyQt5 is nice and pleasing to the
    eyes.


    Now, we may wonder which library to choose to create GUI forms using PyQt5 or
    tkinter. This generally depends on user application and the willingness to learn
    and explore. *Table 1.1* further shows the differences between the libraries:


    | Fundamental points | PyQt5 | tkinter |

    | :--- | :--- | :--- |

    | Licensing | Commercial license is applicable if not complying to provide an
    application to the end user under GPL license. | It is free if needed to supply
    commercially. |

    | Library | Vast | Small compared to PyQt5. |

    | Understanding time | More | Less |

    | Widgets appearance | Nice and modern look | Orthodox and quite old-fashioned
    |

    | Provision of advanced widgets | Yes | No |

    | Interfacing with other designer tool | Yes, Qt Designer | Qt Designer is not
    there for tkinter |

    | Default supply of inbuilt libraries | No, we need to install it separately |
    Yes, as it comes along with default standard Python library |

    | Concept of signals and slots for communication | Yes | No |


    ## Table 1.1: Differences between libraries PyQt5 and tkinter


    You can decide which library to choose to create GUI forms, depending on your
    application. We will later discuss how to create a **UI form** using Qt Designer
    in detail, as well as the widgets associated with it and the Python code with
    logic written by importing the auto-code generated by creating the UI form in
    detail.


    ## PyQt5 framework installation


    The Python version we will be using for discussing PyQt5 will be 3.7.3. (You can
    try working with new version as on today, that is, 3.11.5 dated Aug 24, 2023)
    From the location where we have installed our Python, first type the command `python
    --version` to check the version installed and then type the following command
    to install pyqt5:


    ```

    pip install pyqt5

    ```


    Refer to *Figure 1.1*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_42_0.png)


    Once installed, we can verify the installation of PyQt5 under Python site-packages
    folder, as shown in *Figure 1.2*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_42_1.png)


    We can check some of the modules present in PyQt5. If we do not get any error,
    then we can again cross verify that PyQt5 is successfully installed, as shown
    in *Figure 1.3*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_42_2.png)


    ## First GUI form creation using PyQt5 without using class


    Now, we shall see a basic UI form creation using PyQt5 without using class. This
    is quite important. As you might have realized, most of the UI forms which we
    will be creating will be using the concept of class and object. It is highly recommended
    that you go through the concept of class before moving further in this chapter.
    It is well explained in our previous books, *Programming Techniques using Python*
    and *Python for Everyone*. Here, we will only focus on our basic UI form creation.
    So, without any further delay, let us start. Refer to the following code which
    can be checked in some IEDs like VSCode, Spyder, Anaconda and so on:


    ```

    import sys # L1


    from PyQt5.QtWidgets import QWidget, QApplication # L2


    myapp = QApplication(sys.argv) # L3


    mywindow = QWidget() # L4


    mywindow.show() # L5


    sys.exit(myapp.exec_()) # L6

    ```


    **Output:**

    The output can be seen in the following *Figure 1.4*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_43_0.png)


    *Figure 1.4: Output of Chap1_Example1.py*


    > Note: The preceding code is covered in Program Name: Chap1_Example1.py


    You will be surprised that by writing few lines of code, we can create our GUI
    form, and that too, as fully functional. Now let us see the explanation of this
    code, line by line.

    In L1, we are first importing the `sys` module for accessing the command line
    arguments.


    In L2, we are importing from class, which creates desktop style UIs of PyQt5 package,
    that is, Qt Widgets. QWidget is used for creating an empty GUI and QApplication
    is nothing but an application handler. We can see that from the above statement,
    we are importing the modules for creating the GUI form.


    In L3, we are creating an instance, that is, object of QApplication class using
    the variable name myapp and passing command-line parameters list sys.argv to the
    application. When we are sure that we will be passing command line parameters
    to control Qt form through shell launching or during the course of interface automating,
    we can pass this as an argument to QApplication class, or else we can pass as
    an empty list as:


    ```

    myapp = QApplication([])

    ```


    In L4, we are creating an object of QWidget class using the variable name mywindow.
    This QWidget class is the parent class of all the User Interface objects in Qt.
    The top-level window is created by not passing any parameter to the QWidget class.


    In L5, in order to make the widgets visible after creating the object of QWidget
    class, we must call show() method with the object. Now, you may wonder what will
    happen if we do not call this show method. Since after running the application,
    there is no way to close or quit it, show() will be called to simply display widgets.


    In L6, for implementing parallel execution, PyQt5 uses an event-loop mechanism
    as it is largely written in C++, So, to start up the event-loop mechanism, we
    are calling myapp.exec_() method, which will be held by the application object.
    Some will even think that at some places, we have seen myapp.exec. This exec was
    a reserved word in Python 2. So, to avoid the naming conflict with this reserved
    word, we are using exec_() in PyQt5. Therefore, when there will be a requirement
    by the user to close the GUI, this myapp.exec_() will allow the control to pass
    over to Qt to terminate the application. Just try using Ctrl + C to terminate
    the application as done in our Python programs. You will find out that the application
    will not be terminated. Now, if we want our code to return gracefully and not
    to raise SystemExit exception, this event loop mechanism functionality is to be
    wrapped in a function and should return from the place where we intend to use
    sys.exit. Therefore, any exceptions that may be thrown or might occur, must exit
    cleanly using the following statement:


    ```

    sys.exit(myapp.exec_())

    ```


    You will be wondering that in the above code, many classes start with a capital
    letter Q so that it can be distinguished from other namespaces.


    We can resize the window, drag it around to any conformable place, maximize it
    or close it. Just make sure that do not use the following, as it is best to avoid
    wild imports:


    ```

    from PyQt5.QtWidgets import *

    ```


    One important point to observe is that the GUI form comes up with the default
    title **Python** and with default size.


    Now, let us put some of our own title text in Python GUI form:


    ```

    import sys


    from PyQt5.QtWidgets import QWidget, QApplication


    myapp = QApplication(sys.argv)


    mywindow = QWidget()


    mywindow.setWindowTitle(''Basic GUI Form'') # BG1

    ```'
  mdcn: '## PyQt5与tkinter库的比较


    Python模块集合中包含众多Qt类，这些类兼容多种操作系统，如iOS、Windows、Linux、Unix、Android等，它们是顶级Python包的一部分，即PyQt5库。PyQt5中的Qt5代表**Qt版本5**。该库为我们提供了Python与Qt
    C++工具包绑定的优势。需要注意的一个重要点是，PyQt5是在**GNU通用公共许可证（GNU GPL或GPL）** v3许可下发布的。你可能会想，如果我们已经学习了tkinter，为什么还要学习PyQt5呢？为了更好地理解这一点，让我们来看看PyQt5相对于其他库包（如tkinter）的优势：


    - **编码灵活性：** 为了在对象之间建立简单的通信，存在信号和槽的概念，这使我们在使用PyQt5处理事件时，进行GUI编程具有灵活性。

    - **不仅仅是GUI工具包：** 使用PyQt5，我们可以利用其图形、打印机支持、网络、数据库访问等功能构建完整的应用程序。它就像一个应用框架。

    - **丰富的UI组件：** PyQt5提供了众多小部件，如QLabel、QButton、QCombobox等，每个小部件都有一些基本图像，适合所有平台。该库中还提供了许多关于此主题的高级小部件。

    - **丰富的学习资源：** 如果没有文档，你可能会怀疑学习的意义。PyQt5附带了丰富的文档，因为它是用于GUI创建的最常用的Python包之一。

    - **易于理解：** 我们可以轻松地利用之前对Python、Qt或C++的知识，从而使PyQt5易于理解。

    - **GUI开发者的首选：** 由于简单易用，许多GUI开发者选择PyQt5提供的功能来开发自己的应用程序。

    - **GUI小部件外观：** PyQt5的外观美观且赏心悦目。


    现在，我们可能会想知道应该选择哪个库来使用PyQt5或tkinter创建GUI表单。这通常取决于用户的应用程序以及学习和探索的意愿。*表1.1*进一步展示了这些库之间的差异：


    | 基本要点 | PyQt5 | tkinter |

    | :--- | :--- | :--- |

    | 许可证 | 如果不遵守在GPL许可下向最终用户提供应用程序，则适用商业许可。 | 如果需要商业供应，则是免费的。 |

    | 库 | 庞大 | 相比PyQt5较小 |

    | 理解时间 | 较多 | 较少 |

    | 小部件外观 | 美观且现代 | 传统且相当过时 |

    | 提供高级小部件 | 是 | 否 |

    | 与其他设计工具接口 | 是，Qt Designer | tkinter没有Qt Designer |

    | 默认提供内置库 | 否，我们需要单独安装 | 是，因为它随默认标准Python库一起提供 |

    | 用于通信的信号和槽概念 | 是 | 否 |


    ## 表1.1：PyQt5和tkinter库之间的差异


    你可以根据你的应用程序来决定选择哪个库创建GUI表单。我们稍后将详细讨论如何使用Qt Designer创建**UI表单**，以及与之相关的小部件和通过导入创建UI表单生成的自动代码编写的Python逻辑代码。


    ## PyQt5框架安装


    我们将用于讨论PyQt5的Python版本是3.7.3。（你可以尝试使用截至今天的新版本，即2023年8月24日的3.11.5）从我们安装Python的位置开始，首先输入命令`python
    --version`检查已安装的版本，然后输入以下命令安装pyqt5：


    ```

    pip install pyqt5

    ```


    参考*图1.1*：


    ![](img/9ef0c0b339dea43dffe3f61f95760762_42_0.png)


    安装后，我们可以在Python site-packages文件夹下验证PyQt5的安装，如*图1.2*所示：


    ![](img/9ef0c0b339dea43dffe3f61f95760762_42_1.png)


    我们可以检查PyQt5中存在的一些模块。如果我们没有收到任何错误，那么我们可以再次交叉验证PyQt5是否成功安装，如*图1.3*所示：


    ![](img/9ef0c0b339dea43dffe3f61f95760762_42_2.png)


    ## 不使用类使用PyQt5创建第一个GUI表单


    现在，我们将看到一个不使用类使用PyQt5创建基本UI表单的例子。这非常重要。正如你可能已经意识到的，我们将创建的大多数UI表单都将使用类和对象的概念。强烈建议你在继续本章之前了解类的概念。这在我们之前的书籍《使用Python的编程技术》和《Python入门》中有很好的解释。在这里，我们将只关注基本的UI表单创建。那么，事不宜迟，让我们开始吧。参考以下代码，可以在一些IDE如VSCode、Spyder、Anaconda等中检查：


    ```

    import sys # L1


    from PyQt5.QtWidgets import QWidget, QApplication # L2


    myapp = QApplication(sys.argv) # L3


    mywindow = QWidget() # L4


    mywindow.show() # L5


    sys.exit(myapp.exec_()) # L6

    ```


    **输出：**

    输出可以在下面的*图1.4*中看到：


    ![](img/9ef0c0b339dea43dffe3f61f95760762_43_0.png)


    *图1.4：Chap1_Example1.py的输出*


    > 注意：前面的代码包含在程序名称：Chap1_Example1.py中


    你会惊讶地发现，通过编写几行代码，我们就可以创建我们的GUI表单，而且是完全功能的。现在让我们逐行解释这段代码。

    在L1中，我们首先导入`sys`模块以访问命令行参数。


    在L2中，我们从PyQt5包中创建桌面风格UI的类导入，即Qt Widgets。QWidget用于创建一个空的GUI，而QApplication不过是一个应用程序处理器。我们可以从上面的语句中看到，我们导入了用于创建GUI表单的模块。


    在L3中，我们使用变量名myapp创建QApplication类的一个实例，即对象，并将命令行参数列表sys.argv传递给应用程序。当我们确定将通过shell启动或在界面自动化过程中传递命令行参数来控制Qt表单时，我们可以将其作为参数传递给QApplication类，否则我们可以传递一个空列表，如下所示：


    ```

    myapp = QApplication([])

    ```


    在L4中，我们使用变量名mywindow创建QWidget类的一个对象。这个QWidget类是Qt中所有用户界面对象的父类。通过不向QWidget类传递任何参数来创建顶级窗口。


    在L5中，为了在创建QWidget类的对象后使小部件可见，我们必须使用对象调用show()方法。现在，你可能想知道如果我们不调用这个show方法会发生什么。由于运行应用程序后，没有办法关闭或退出它，将调用show()来简单地显示小部件。


    在L6中，为了实现并行执行，PyQt5使用事件循环机制，因为它主要是用C++编写的，所以，为了启动事件循环机制，我们调用myapp.exec_()方法，该方法将由应用程序对象持有。有些人甚至会认为在某些地方，我们见过myapp.exec。这个exec在Python
    2中是一个保留字。因此，为了避免与这个保留字的命名冲突，我们在PyQt5中使用exec_()。因此，当用户需要关闭GUI时，这个myapp.exec_()将允许控制权传递给Qt以终止应用程序。只需尝试使用Ctrl
    + C来终止应用程序，就像在我们的Python程序中所做的那样。你会发现应用程序不会被终止。现在，如果我们希望我们的代码优雅地返回而不是引发SystemExit异常，这个事件循环机制功能应该被包装在一个函数中，并且应该从我们打算使用sys.exit的地方返回。因此，任何可能抛出或发生的异常，必须使用以下语句干净地退出：


    ```

    sys.exit(myapp.exec_())

    ```


    你会想知道在上面的代码中，许多类以大写字母Q开头，以便与其他命名空间区分开来。


    我们可以调整窗口大小，将其拖动到任何舒适的位置，最大化它或关闭它。只需确保不要使用以下内容，因为最好避免通配符导入：


    ```

    from PyQt5.QtWidgets import *

    ```


    一个需要观察的重要点是，GUI表单带有默认标题**Python**和默认大小。


    现在，让我们在Python GUI表单中放入一些我们自己的标题文本：


    ```

    import sys


    from PyQt5.QtWidgets import QWidget, QApplication


    myapp = QApplication(sys.argv)


    mywindow = QWidget()


    mywindow.setWindowTitle(''Basic GUI Form'') # BG1

    ```'
