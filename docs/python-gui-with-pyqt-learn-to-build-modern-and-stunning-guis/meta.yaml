    # ## Double Spin Box


    This `QDoubleSpinBox` class in PyQt5 allows the user to choose a value by either
    using the up or down arrow keys from the keyboard or directly entering the text
    field. It is a spinbox widget for supporting double-type values.


    # ## Important properties


    The properties of the Double Spin Box widget are similar to that of the Spin Box
    Widget. It has a decimals property instead of `displayIntegerBase` and properties
    of minimum, maximum, value, and `singleStep` is of type double.


    # ### decimals


    This property will specify the number of decimal places to be displayed in the
    `QDoubleSpinBox` object, that is, precision. Refer to the following figure:


    | decimals | 2 |

    |---|---|'
