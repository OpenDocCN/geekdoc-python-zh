- md: "## calendarPopup\n\nWhen a user clicks on the `QDateTimeEdit` widget, this\
    \ property determines whether or not a calendar pop-up is shown. When the pop-up\
    \ is enabled, the user can choose a date from the calendar, and the `QDateTimeEdit`\
    \ widget will update accordingly. Refer to the following figure:\n\n| | |\n|---|---|\n\
    | calendarPopup | ☐ |\n\n**Figure 8.114:** *Image depicting calendarPopup property\
    \ of QDateTimeEdit in Qt Designer*\n\n## currentSectionIndex\n\nThe `QDateTimeEdit`\
    \ widget's currently active section index is returned by this property. Refer\
    \ to the following figure:\n\n| | |\n|---|---|\n| currentSectionIndex | 0 |\n\n\
    **Figure 8.115:** *Image depicting currentSectionIndex property of QDateTimeEdit\
    \ in Qt Designer*\n\n## timeSpec\n\nThe `QDateTimeEdit` widget's time specification,\
    \ which establishes the time zone and whether daylight saving time is used, is\
    \ set by this property. Local time, **Coordinated Universal Time (UTC)**, or a\
    \ particular time zone can all be specified as the time specification. Refer to\
    \ the following figure:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_503_0.png)\n\
    \n**Figure 8.116:** Image depicting timeSpec property of QDateTimeEdit in Qt Designer\n\
    \n## Important methods/signals\n\nAll the properties of the above widget if prepended\
    \ with the word `set` can be used as methods. We shall discuss the important ones:\n\
    \n- `dateTime()`: This method will return the currently selected date and time\
    \ as a `QDateTime` object.\n- `setMaximumDateTime(dt)`: This method will set the\
    \ maximum date and time which can be set in the `QDateTimeEdit` object by taking\
    \ the `QDateTime` object as a parameter.\n- `dateChanged(date)`: This signal is\
    \ emitted when the date in the `QDateTimeEdit` object changes. Here, the `date`\
    \ argument is a `QDate` object representing the new date.\n- `dateTimeChanged(dateTime)`:\
    \ This signal is emitted when the date and time in the `QDateTimeEdit` object\
    \ is changed. Here, the `dateTime` argument is a `QDateTime` object representing\
    \ the new date and time.\n- `timeChanged(time)`: This signal is emitted when time\
    \ in the `QDateTimeEdit` object is changed. Here, the `time` argument is a `QTime`\
    \ object representing the new time.\n\nNow, we shall see an example of the `QDateTimeEdit`\
    \ widget.\nThe details of file names are given in the following *Table 8.9*:\n\
    \n| S No. | Qt Designer File Name (.ui) | Converting the Qt Designer file name\
    \ to Python file (.py) | Creating another Py file and importing converted Python\
    \ from Qt Designer |\n| :--- | :--- | :--- | :--- |\n| 1 | datetimeedit_eg1.ui\
    \ | datetimeedit_eg1.py | run_datetimeedit_eg1.py |\n\nTable 8.9: Details of file\
    \ names\n\nThe Qt Designer file is shown in the following figure:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_504_0.png)\n\
    \nFigure 8.117: Qt Designer file: DateorTimeEdit/datetimeedit_eg1.ui\n\n> Note:\
    \ The above .ui file is covered in Path: DateorTimeEdit/datetimeedit_eg1.ui\n\n\
    Consider the following code of run_datetimeedit_eg1.py:\n\n```python\nimport sys\n\
