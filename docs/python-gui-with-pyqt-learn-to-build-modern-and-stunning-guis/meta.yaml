    ## 前言


    本书旨在向几乎没有或完全没有Python图形用户界面（GUI）编程经验的读者介绍如何使用名为PyQt5的GUI工具包的Python绑定。GUI应用程序可以使用任何编程语言创建，无论是VB.Net、C#.Net等。在本书中，我们将学习如何使用PyQt5创建GUI应用程序。读者将获得必要的基础知识和技能，以便开始编写代码，在Python语言中创建GUI应用程序。我们将使用Qt中称为Qt
    Designer的图形工具来创建用户界面。通过掌握PyQt5，读者可以将这些知识应用于解决现实世界的问题，并根据自己的需求创建各种有用的应用程序。


    本书的第一部分涵盖了PyQt5库和Qt Designer工具的整体布局。然后，我们将深入了解布局管理、事件驱动编程的概念及其在Python编程上下文中的实现，包括信号和槽概念的使用。最后，在本书的后半部分，我们将深入了解与按钮、容器项视图、容器、输入和显示小部件相关的各种小部件。


    本书涵盖了广泛的主题，从不同小部件的基本定义到各种带有详细解释代码的已解决示例。总的来说，本书为初学者提供了一个坚实的基础，使他们能够开始使用PyQt5库和Qt
    Designer布局工具进行Python GUI培训的旅程。


    本书分为**9章**。各章描述如下。


    ## 第1章：PyQt5和Qt Designer工具简介


    - 本章将首先比较功能强大且跨平台的图形工具包PyQt5与tkinter库。你将学习如何安装PyQt5框架，以及如何在不使用类和使用类的情况下使用PyQt5创建基本的GUI表单。我们将探索Qt
    Designer内部的组件以及不同的预定义模板。在本章的后半部分，我们将首先在Qt Designer中创建一个用户凭证应用程序（关注视图，.ui文件是一个XML文件），然后使用pyuic5命令将其转换为Python代码（.py），最后创建一个新的Python文件，该文件将导入用于用户界面设计的Python代码，并添加一些有用的逻辑来为用户创建一个基本的登录应用程序。


    ## 第2章：深入了解布局管理


    - 本章将涵盖使用绝对定位方法放置小部件的概念。我们将看到使用布局类放置小部件，首先我们将了解如何使用QHBoxLayout类水平或垂直组织小部件。我们将探索如何使用QHBoxLayout以及addStretch、addWidget、addLayout等方法将小部件并排排列在一行中。或者，我们将研究使用QVBoxLayout的addStretch方法垂直排列小部件。然后，我们将找出使用QGridLayout在行和列的网格中排列小部件的方法。此外，我们将研究使用QFormLayout创建应用程序。最后，我们将有信心使用绝对定位、QHBoxLayout、QGridLayout和QFormLayout类创建“用户凭证应用程序”。


    ## 第3章：深入了解事件、信号和槽


    - 本章将探讨事件驱动编程的概念，以及如何在Python编程上下文中使用信号和槽来实现它。上一章将指导我们利用信号和槽来创建和管理事件。我们将发现如何定义信号并将其连接到槽，以便我们的程序能够以有用的方式响应事件。我们还将研究各种事件和信号，以及如何使用它们来创建交互式用户界面或处理外部输入。


    ## 第4章：深入了解Qt Designer中的按钮小部件


    - 本章将涵盖按钮小部件的概念，这些小部件通常用于创建交互式用户界面，并帮助理解它们的属性、功能和自定义选项。通过探索与按钮小部件相关的特性和设置，用户可以在我们的Qt应用程序中有效地设计和实现用户友好的界面。Qt
    Designer提供了多种不同的按钮小部件，包括CheckBox、Push Button、Tool Button、Radio Button、Command
    Link Button等，并将详细探讨每种按钮小部件的描述、属性、重要方法、重要信号以及带有输出显示的应用程序示例。QObject、QWidget和QAbstractButton的重要属性将在最后以图像形式作为附加信息进行介绍。


    ## 第5章：深入了解Qt Designer中的项视图


    - 本章将涵盖Qt Designer中项视图的概念，这些视图通常用于创建用户交互界面。我们将研究它们的属性、功能和自定义选项。我们将探索Qt Designer的项视图小部件，如QTableView、QTreeView和QListView，它们是有效以有组织和有序方式呈现数据的工具。用户可以使用这些小部件以简单列表格式（QListView）、分层树结构（QTreeView）或行和列（QTableView）显示数据。


    ## 第6章：深入了解Qt Designer中的项小部件（基于项）


    - 本章将涵盖Qt Designer中项小部件的概念，这些小部件通常用于创建交互式用户界面。我们将尝试理解它们的属性、功能、自定义选项，并全面掌握如何在Qt
    Designer环境中创建和操作基于项的小部件。用户将能够利用基于项小部件的强大功能创建动态、交互式的用户界面，并将发现不同的特性和特征来个性化小部件的外观和行为，例如列表小部件、树小部件和表格小部件。为了促进用户交互并实现功能，用户将学习管理与基于项小部件相关的事件和信号。


    ## 第7章：深入了解Qt Designer中的容器


    - 本章将涵盖Qt Designer提供的容器小部件的概念、它们的特性以及如何自定义它们以设计美观且用户友好的界面。用户将研究各种容器小部件类型，并获得每个小部件提供的具体特性和功能的知识。他们将了解什么是容器小部件以及它们如何工作、其不同类型、用于创建布局的用途，并且还将探索自定义容器小部件的外观。


    ## 第8章：深入了解Qt Designer中的输入小部件


    - 本章将处理许多可用输入小部件的概念，以及如何有效地利用它们来创建交互式用户界面。用户将对输入小部件（包括QLineEdit、QSpinBox、QComboBox、QTextEdit等）及其相应的特性、功能和自定义选项有扎实的理解。他们都将体验到将这些输入小部件整合到设计中所需的知识，以便他们可以输入数据、选择选项，'
