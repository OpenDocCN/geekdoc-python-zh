    - Usage of Toolbar icons in Qt Designer

    - Signal slot examples in Qt Designer


    # Objectives


    After reading this chapter, the reader will get to know about Events, Signals,
    and Slots in PyQt5, and creating useful desktop applications using these concepts.
    Firstly, we shall see a GUI form application creation in Qt Designer by tracking
    the mouse movements. We will change the background color of the **QPushButton**
    widget by tracking the left and right mouse clicks. Various examples will be shown
    of how a signal is linked to a slot, in order to create a simple user interface
    application by toying with **QPushButton** widget. Finally, we shall see how connections
    can be created with an object, signals, and slots for layouts and widgets, which
    can be connected using Edit Signals/Slots with various case study examples. So,
    in this chapter, we will be dealing exclusively with various events, signals,
    and slot concepts. Moreover, we will be learning signal/slot editor usage in Qt
    Designer.


    # Introduction to Events, Signals, and Slots


    Any GUI application created using widgets will act as an event source. In response
    to at least one event, every widget is designed in such a way that it will emit
    a signal. To explain in simpler terms, when user interaction with the widget will
    occur, then the notifications will pop out from the widgets. However, it is not
    a rule. In addition, it may also send data about what happened. To perform any
    action, as the signal itself is not enough, it must be connected to a slot. In
    a GUI application, the slot must be connected to a signal. Any function or method
    can be used in a GUI application as a slot. We can also say that it is used for
    the signal receiver. There are various built-in slots by many PyQt5 widgets, which
    we will learn while creating applications.'
