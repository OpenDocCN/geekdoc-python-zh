    # ## Date/Time Edit


    The `QDateTimeEdit` widget in the PyQt5 library will allow the user to select
    and edit date and time values. Numerous display formats, such as date-only, time-only,
    and date-time'
  - '[PAGE 498]


    displays, are supported by `QDateTimeEdit`. The user has the choice of selecting
    values from a calendar pop-up or entering them manually into the widget. A useful
    set of controls for adjusting values is also included by the widget, including
    up and down buttons for incrementing and decrementing the date and time. Additionally,
    `QDateTimeEdit` provides various input validation and user interaction features,
    including read-only displays, the ability to step through values incrementally,
    minimum and maximum dates and times, and so on.


    # Important properties


    Let us discuss some important properties now.


    # dateTime


    This property will hold the date and time set in the `QDateTimeEdit` object. The
    default value is set to the start of 2000CE and can only be set to a valid `QDateTime`
    value. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_498_0.png)


    *Figure 8.103: Image depicting dateTime property of QDateTimeEdit in Qt Designer*


    # date


    This property will hold the date that is currently set in the widget. The default
    value is set to the date of **1st Jan 2000**. The object is `QDate`. Refer to
    the following figure:'
  - '[PAGE 499]


    ![](img/9ef0c0b339dea43dffe3f61f95760762_499_0.png)


    **Figure 8.104:** *Image depicting date property of QDateTimeEdit in Qt Designer*


    # time


    This property will hold the time that is currently set in the widget. The default
    value contains the time of **00:00:00** and 0 milliseconds. The object is `QTime`.
    Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_499_1.png)


    **Figure 8.105:** *Image depicting time property of QDateTimeEdit in Qt Designer*


    # maximumDateTime


    This property will hold the maximum date and time values that are allowed to be
    set for the `QDateTimeEdit` object. The `minimumDateTime` is adjusted on setting
    this property. Only this property can be set to a valid `QDateTime` value. The
    end of **9999** CE is the latest date that is accepted. The default value is **23:59:59**
    and 999 milliseconds for the time. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_499_2.png)'
