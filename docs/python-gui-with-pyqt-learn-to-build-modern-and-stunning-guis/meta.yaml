    # MDI Area


    The `QMdiArea` widget provides an area where **Multiple Document Interface (MDI)**
    windows can be displayed. In order to build each window separately for displaying
    many windows at once, **Single Document Interface (SDI)** can be used. Since each
    window may have its own menu system, toolbar, and so on, this requires extra memory
    resources. Applications that use the MDI interface use less memory. The sub-windows
    are arranged in relation to one another inside the main container, naming the
    container widget as `QMdiArea`. Typically, the `QMainWindow` object''s center
    widget is the `QMdiArea` widget. The `QMdiSubWindow` class is represented by the
    child windows in this section. Any `QWidget` may be chosen to serve as the internal
    widget for the `subWindow` object. In the MDI area, sub-windows may be set up
    in a tiled or cascading pattern.


    # Important properties


    Let us now go over some important properties as follows:


    # background


    The background brush for the workspace area can be set by using this property.
    By default, it is a grey color. Refer to the following figure:'
  - '[PAGE 407]


    ![](img/9ef0c0b339dea43dffe3f61f95760762_407_0.png)


    **Figure 7.45:** *Image depicting background property of QMdiArea widget in Qt
    Designer*


    # activationOrder


    The ordering criteria in which the sub-windows are activated are specified using
    this property. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_407_1.png)


    **Figure 7.46:** *Image depicting activationOrder property of QMdiArea widget
    in Qt Designer*


    # viewMode


    This property specifies the mode in which the sub-windows are displayed within
    the `QMdiArea` object. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_407_2.png)


    **Figure 7.47:** *Image depicting viewMode property of QMdiArea widget in Qt Designer*'
  - '[PAGE 408]


    # documentMode


    This property specifies whether the Document/View architecture should be used
    by the `QMdiArea` object or not. The `QMdiArea` object will manage its sub-windows
    using this architecture if it is enabled. By default, it is **unchecked**. Refer
    to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_408_0.png)


    **Figure 7.48:** Image depicting `documentMode` property of `QMdiArea` widget
    in Qt Designer


    # tabsClosable


    This property specifies whether the tabs of sub-windows in the `QMdiArea` object
    should have a close button or not. By default, it is set to **False**. Refer to
    the following figure:


