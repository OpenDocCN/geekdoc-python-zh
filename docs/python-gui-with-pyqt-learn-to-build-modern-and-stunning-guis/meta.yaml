    \n## Progress bar\n\nIn PyQt5, the QProgressBar widget is used to display an operation’s\
    \ progress. It is often used to display the status of a task when the user must\
    \ wait for the operation to finish, such as a file download or data transfer.\
    \ The QProgressBar widget provides a visual indication that displays the operation’s\
    \ progress. The progress bar grows in length as long as the operation progresses.\
    \ Additionally, the widget provides a label that may be used to display a message\
    \ which describes the operation being performed. A horizontal or vertical progress\
    \ bar is provided by the QProgressBar widget.\n\n## Important properties\n\nLet\
    \ us check some important properties now.\n\n### minimum\n\nThis property will\
    \ hold the minimum value of the **QProgressBar** object. The default value is\
    \ **0**. Refer to the following *Figure 9.45*:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_567_0.png)\n\
    \n*Figure 9.45*: Image depicting minimum property of QProgressBar in Qt Designer\n\
    \n### maximum\n\nThis property will hold the maximum value of the **QProgressBar**\
    \ object. The default value is **100**. Refer to the following *Figure 9.46*:\n\
    \n![](img/9ef0c0b339dea43dffe3f61f95760762_567_1.png)\n\n*Figure 9.46*: Image\
    \ depicting maximum property of QProgressBar in Qt Designer\n\n### value\n\nThis\
    \ property will hold the current value of the **QProgressBar** object. The default\
    \ value is **24**. Refer to the following *Figure 9.47*:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_567_2.png)\n\
    \n*Figure 9.47*: Image depicting value property of QProgressBar in Qt Designer\n\
    \n### alignment\n\nThis property will represent the alignment of the **QProgressBar**\
    \ object. User may choose the options for both horizontal and vertical alignment.\
    \ Refer to the following *Figure 9.48*:\n\n| alignment | AlignLeft, AlignVCenter\
    \ |\n| :--- | :--- |\n| Horizontal | AlignLeft |\n| Vertical | AlignVCenter |\n\
    \n**Figure 9.48:** Image depicting alignment property of QProgressBar in Qt Designer\n\
    \n### textVisible\n\nThis property will determine whether QProgressBar object’s\
    \ value should be displayed as text or not. The default value is **True**. Refer\
    \ to the following *Figure 9.49*:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_568_0.png)\n\
    \n**Figure 9.49:** Image depicting textVisible property of QProgressBar in Qt\
    \ Designer\n\n### orientation\n\nThis property will represent the orientation\
    \ of the QProgressBar object, which can be set to either horizontal or vertical.\
    \ The default value is **Horizontal**. Refer to the following *Figure 9.50*:\n\
    \n![](img/9ef0c0b339dea43dffe3f61f95760762_568_1.png)\n\n**Figure 9.50:** Image\
    \ depicting orientation property of QProgressBar in Qt Designer\n\n### invertedAppearance\n\
    \nThis property will determine whether the appearance of QProgressBar object should\
    \ be inverted or not. The default value is **False**. Refer to the following *Figure\
    \ 9.51*:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_568_2.png)\n\n**Figure 9.51:**\
    \ Image depicting invertedAppearance property of QProgressBar in Qt Designer\n\
    \n### textDirection\n\nThis property will have no impact on the horizontal **QProgressBar**\
    \ object and will hold the text reading direction on vertical **QProgressBar**\
    \ object. The default value is **TopToBottom**. Refer to the following *Figure\
    \ 9.52*:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_569_0.png)\n\n*Figure 9.52*:\
    \ Image depicting textDirection property of QProgressBar in Qt Designer\n\n###\
    \ format\n\nThis property will represent the **QProgressBar** object's text format\
