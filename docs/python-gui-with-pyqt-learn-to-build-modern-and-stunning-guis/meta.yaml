    ![](img/9ef0c0b339dea43dffe3f61f95760762_458_0.png)


    **Figure 8.42:** *Image depicting autoFormatting property of QTextEdit in Qt Designer*


    # ## tabChangeFocus


    On pressing the *Tab* key, this property determines whether the focus will be
    changed to the next widget or a tab character is inserted into the `QTextEdit`
    object. The default value is **False**. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_458_1.png)


    **Figure 8.43:** *Image depicting tabChangeFocus property of QTextEdit in Qt Designer*


    # ## documentTitle


    This property will hold the document title parsed from the text. For a newly created
    empty document, this property contains an empty string by default. Refer to the
    following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_458_2.png)


    **Figure 8.44:** *Image depicting documentTitle property of QTextEdit in Qt Designer*


    # ## undoRedoEnabled


    This property will determine whether functionality, like undo and redo, is enabled.
    The default value is **True**. Refer to the'
