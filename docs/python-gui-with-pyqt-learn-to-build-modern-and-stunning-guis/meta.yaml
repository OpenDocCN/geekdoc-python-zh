    After reading this chapter, the reader will have a thorough knowledge of the many
    container widgets offered by Qt Designer, their features, and how to customize
    them to design aesthetically pleasing and user-friendly interfaces. The user will
    investigate various container widget types and will obtain knowledge of the precise
    features and capabilities provided by each widget and an understanding of the
    real-world uses for them. Users will learn what container widgets are, how they
    work, their different types, and their usage to create layouts. We will also explore
    customizing the appearance of container widgets. The idea of signal-slot connections
    will also be explained, and users will learn how to connect signals that widgets
    within container widgets send to slots in order to handle user interactions and
    implement desired functionality. The user will be able to use layout managers
    to create the layouts they want since they will have a thorough understanding
    of the attributes and customization options available for each container widget.
    To ensure that readers have a firm understanding of container widgets in Qt Designer,
    the chapter will also feature practical examples and exercises.


    # Group Box


    A QGroupBox is a widget from the Qt GUI library that acts as a container to group
    other widgets together and is visually distinguished from other widgets by a title
    and a frame. It can be used to organize related widgets into a single unit, simplifying
    the interface’s comprehension and navigation. The QGroupBox can be exclusive,
    which means that only one Group Box in a parent container can be checked at a
    time, as well as checkable, which indicates that it can be checked or unchecked
    by the user. Any widget from the PyQt5 can be added into the QGroupBox object.


    # Important properties'
  - '[PAGE 359]


    Let us go over some important properties now.


    # title


    We can set the text that appears in the **QGroupBox** object title bar. Refer
    to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_359_0.png)


    *Figure 7.2: Image depicting title property of QGroupBox in Qt Designer*


    # alignment


    We can set the alignment of the title within the **QGroupBox** object’s frame
    either vertically or horizontally. Users can choose multiple options from either
    of these alignments. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_359_1.png)


    *Figure 7.3: Image depicting alignment property of QGroupBox in Qt Designer*


    # flat


    We can set the appearance to be either a frame or painted flat of **QGroupBox**
    object. By default, it is disabled. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_359_2.png)


    *Figure 7.4: Image depicting flat property of QGroupBox in Qt Designer*


    # checkable'
  - '[PAGE 360]


    We can make the **QGroupBox** object title checkable with the help of this property.
    The title is displayed with the help of a checkbox instead of an ordinary label
    if set to **True**. The **QGroupBox** object''s children are enabled if checked
    else disabled. By default, it is set to **False**. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_360_0.png)


    *Figure 7.5: Image depicting checkable property of QGroupBox in Qt Designer*


    # checked


    This property will be used only if the checkable property is set to **True** for
    the **QGroupBox** object. By default, it is unchecked and disabled. But if the
    **QGroupBox** object checkable property is set to **True**, this will also be
    set to **True**. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_360_1.png)


    *Figure 7.6: Image depicting checked property of QGroupBox in Qt Designer*


    # Important methods


    Let us now go over some important methods:


    +   - **setTitle(title)**: We can set the text that appears in the **QGroupBox**
    object title bar with the help of this method. It will have a keyboard shortcut
    if the title text contains an & followed by a letter.

    - **setCheckable(checkable)**: If set to **True**, **QGroupBox** object is checkable.

    - **isCheckable()**: Will return **True** if **QGroupBox** object is checkable
    else **False**.

    - **setAlignment(alignment)**: We can set the alignment of **QGroupBox** object.'
  - '[PAGE 361]


    +   - **setFlat(flat)**: Using this method, we can set the appearance to be either
    frame or painted flat of **QGroupBox** object.

    - **isChecked()**: Will return **True** if **QGroupBox** object is checked else,
    **False**.


    # Important signals


    Some important signals are as follows:


    +   - **clicked([checked = False])**: Signal is emitted when the **QGroupBox**
    object is clicked.

    - **toggled(arg__1)**: Signal is emitted whenever the check status of the **QGroupBox**
    object changes and the new state is passed as a parameter (**True** for checked,
    **False** for unchecked).


