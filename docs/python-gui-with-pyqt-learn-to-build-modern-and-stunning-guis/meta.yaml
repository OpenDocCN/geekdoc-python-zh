    \ QtGui\n\nclass Absolute_Position(QWidget): # RAP2\n    def __init__(self):\n\
    \        super().__init__()\n        self.display_widgets() # RAP3\n        self.setGeometry(0,\
    \ 0, 398, 229)  # RAP4\n        self.setWindowTitle('User Credentials App') #\
