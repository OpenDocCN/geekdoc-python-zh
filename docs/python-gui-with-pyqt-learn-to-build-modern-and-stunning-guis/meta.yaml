    # Dial


    PyQt5, a Python library for building graphical user interfaces, has a `QDial`
    widget. A circular dial called `QDial` can be rotated to choose a value from a
    specified range. It provides a convenient method for the user to change a numerical
    value, like a brightness or volume setting. `QDial`''s features, including the
    value range, the number of notches, the dial''s appearance, and how it behaves
    to drags and clicks, can all be changed. `QDial` behaves similarly to a slider
    because it derives from `QAbstractSlider`.


    # Important properties


    The properties of `QAbstractSlider` are discussed in the next section.'
  - '[PAGE 510]


    # minimum


    This property will set the minimum value of the `QDial` object. The default value
    is **0**. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_510_0.png)


    *Figure 8.122: Image depicting minimum property of QDial in Qt Designer*


    # maximum


    This property will set the maximum value of the `QDial` object. The default value
    is **99**. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_510_1.png)


    *Figure 8.123: Image depicting maximum property of QDial in Qt Designer*


    # singleStep


    This property will hold the step size for single steps of the `QDial` object.
    The default value is **1**. If this property is set as 5, then on rotating the
    `QDial` object, the ‘value’ property will be changed by 5. Refer to the following
    figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_510_2.png)


    *Figure 8.124: Image depicting singleStep property of QDial in Qt Designer*


    # pageStep


    This property will hold the step size for page steps of the `QDial` object. The
    default value is **10**. If this property is set as 10, then on clicking the background
    of the `QDial` object, the ‘value’ property will be changed by 10. Refer to the
    following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_510_3.png)


    *Figure 8.125: Image depicting pageStep property of QDial in Qt Designer*'
