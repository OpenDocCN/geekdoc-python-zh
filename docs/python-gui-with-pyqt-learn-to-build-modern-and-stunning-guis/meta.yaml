    # Important methods


    Let us now go over some important methods:


    +   - clear(): All the items from the QListWidget object will be removed as it
    will be permanently deleted.

    - insertItem(row, item): The QListWidgetItem object will be inserted at the position
    specified by the row (integer).

    - addItem(): Either a QListWidgetItem object or string will be added to the QListWidget
    object.

    - addItems(labels): Items with a list of strings will be inserted at the end of
    the QListWidget object.

    - setCurrentItem(item, command): Programmatically, we can set the currently selected
    item to the QListWidgetItem object with/without the usage of selection flags,
    that is, using the command parameter.

    - sortItems([order=Qt.AscendingOrder]): QListWidget items will be arranged according
    to the specified order.


    # Important signals


    Some signals are as follows:


    +   - currentItemChanged(): The signal is emitted whenever the current item changes
    of the QListWidget object.

    - itemClicked(): The signal is emitted whenever an item in the QListWidget object
    is clicked.


    Now, we shall see an example of QListWidget.

