    # List widget


    **List widget** is a classic item-based interface for adding and removing items.
    It has a list view similar to the one supplied by `QListView`, provided by the
    convenience class `QListWidget`. An item-based interface to add or delete items
    from a list is the `QListWidget` class. The list''s items are all `QListWidgetItem`
    objects. Each `QListWidgetItem` in the list is managed by `QListWidget` using
    an internal model. The multi-selectability feature can be set for the `QListWidget`
    object.


    # Important properties


    We have already seen the different `QListView` properties in the previous chapter.
    The same properties apply here too. Apart from these properties, we shall discuss
    `QListWidget` properties.


    # currentRow


    The current item''s row is set using this property. The row may also be selected
    depending on the active selection mode. Default value is -1. Refer to the following
    figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_310_0.png)


    **Figure 6.2:** Image depicting currentRow property of QListWidget in Qt Designer


    # sortingEnabled


    The default value is unchecked and when set to true, this property will decide
    that sorting is enabled for the list. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_310_1.png)'
