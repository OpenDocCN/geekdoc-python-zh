    # MDI Area


    The `QMdiArea` widget provides an area where **Multiple Document Interface (MDI)**
    windows can be displayed. In order to build each window separately for displaying
    many windows at once, **Single Document Interface (SDI)** can be used. Since each
    window may have its own menu system, toolbar, and so on, this requires extra memory
    resources. Applications that use the MDI interface use less memory. The sub-windows
    are arranged in relation to one another inside the main container, naming the
    container widget as `QMdiArea`. Typically, the `QMainWindow` object''s center
    widget is the `QMdiArea` widget. The `QMdiSubWindow` class is represented by the
    child windows in this section. Any `QWidget` may be chosen to serve as the internal
    widget for the `subWindow` object. In the MDI area, sub-windows may be set up
    in a tiled or cascading pattern.


    # Important properties


