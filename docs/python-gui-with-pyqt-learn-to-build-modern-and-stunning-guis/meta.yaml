- md: "## Conclusion\n\nIn this chapter, we have learned an in-depth understanding\
    \ of events, signals, and slots in PyQt5 and demonstrated their practical application\
    \ in creating desktop applications. The user has learned how to develop useful\
    \ GUI form applications using Qt Designer and track mouse movements to trigger\
    \ events such as changing the background color of a QPushButton widget. Through\
    \ numerous examples, the concept of linking signals to slots has been illustrated,\
    \ enabling the creation of simple user interface applications using the QPushButton\
    \ widget.\n\nAdditionally, the chapter explored the creation of connections between\
    \ Objects, signals, and slots for layouts and widgets, highlighting their versatility\
    \ in Edit Signals/Slots. The presented case study examples further reinforce the\
    \ knowledge and skills acquired throughout the chapter, which will empower the\
    \ user to leverage these concepts effectively in their own PyQt5 projects.\n\n\
    ## Points to remember\n\n- Events serve as notifications that something has occurred.\
    \ A button click is an example of an event.\n- Objects emit signals to notify\
    \ other objects that something has happened. For instance, when a button object\
    \ is clicked, a signal may be emitted.\n- When a signal is emitted, functions\
    \ called slots are activated. For instance, when a button object is clicked, a\
    \ slot may be called.\n- Signals and slots can be connected/disconnected to each\
    \ other at any time.\n- Edit widgets, Signals/Slots, and Buddies are all important\
    \ Qt Designer elements that can assist designers in developing user interfaces\
    \ that are more effective and efficient.\n- Users may edit widgets to change their\
    \ characteristics in the user interface. When changing the size, color, or other\
    \ characteristics of widgets, this can be helpful.\n- The use of buddies allows\
    \ users to synchronize two widgets at all times. For example, the text in the\
    \ text box will always be displayed in the label if a text box and a label is\
    \ connected using this method.\n\n## Questions\n\n1. Explain the role of events,\
    \ signals, and slots for GUI designing in Qt Designer.\n2. Explain signal/slot\
    \ Editor usage in Qt Designer.\n3. Show and explain the GUI form using Qt Designer\
    \ for mouse operation.\n4. Explain the following with their usage in GUI designing:\n\
    \   a. Edit Widgets\n   b. Edit Signals/Slots\n   c. Edit Buddies\n5. Explain\
    \ the toolbar icons of Qt Designer and highlight their importance in GUI designing.\n\
    6. Write a short note on Edit Tab Order in Qt Designer.\n7. Explain signal and\
    \ slot connections in Qt Designer with some case studies.\n\n## Join our book’s\
    \ Discord space\n\nJoin the book's Discord Workspace for Latest updates, Offers,\
    \ Tech happenings around the world, New Release and Sessions with the Authors:\n\
    \nhttps://discord.bpbonline.com\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_169_0.png)\n\
    \n# CHAPTER 4\nGetting Insights of Button Widgets in Qt Designer\n\n## Introduction\n\
    \nIn this chapter, we shall see our next anticipated topic for discussion, revolving\
    \ around Button widgets in Qt Designer. The different buttons present in Qt Designer\
    \ include **Push Button**, **Tool Button**, **Radio Button**, **Check Box**, **Command\
    \ Link Button**, and **Dialog Button Box**. We will be discussing all these widgets\
    \ in detail, including their description, importance and useful properties, methods/functions,\
    \ and signals with examples. Our entire flow of discussion will not only be restricted\
    \ to this chapter, and the same pattern will be followed in the explanation of\
    \ other widgets of Qt Designer in the remaining chapters. All these button types\
    \ will be available, as shown in the following *Figure 4.1*, in the Widget Box\
    \ where the user can select any of the widgets under button types of Qt Designer\
    \ and drag and drop in a GUI form. Please refer to the following figure:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_171_0.png)\n\
    \n**Figure 4.1:** *Different buttons type in Qt Designer*\n\nNow, without any\
    \ further delay, let us learn about different Button widgets. These Button widgets\
    \ will come into handy when the user wants to interact with the GUI form widgets\
    \ and waits for some kind of feedback. Icons or text can be displayed in PyQt5\
    \ using these Button widgets. The base class for Button widgets is **QAbstractButton**\
    \ which provides checkable (toggle) buttons and Push Buttons support.\n\n## Structure\n\
    \nIn this chapter, we will discuss the following topics:\n\n- Push Button\n- Tool\
    \ Button\n- Radio Button\n- Check Box\n- Command Link Button\n- Dialog Button\
    \ Box\n- Common properties for Button widgets\n\n## Objectives\n\nAfter reading\
    \ this chapter, the reader will get to know about Button widgets, which are commonly\
    \ used for creating interactive user interfaces. The primary objective of this\
    \ chapter is to understand their properties, functionality, and customization\
    \ options. By exploring the features and settings related to Button widgets, we\
    \ can effectively design and implement user-friendly interfaces in our Qt applications.\
    \ Qt Designer offers a number of different Button widgets, including **CheckBox**,\
    \ **PushButton**, **ToolButton**, **Radio Button**, **Command Link Button** and\
    \ so on. We shall explore description, properties, important methods, important\
    \ signals and an application example with output display of each Button widget\
    \ in detail. The important properties of **QObject**, **QWidget** and **QAbstractButton**\
    \ are covered with images at the end as an add-on information. The same concept\
    \ of common properties will be applicable for all further chapters.\n\n## Push\
    \ Button\n\nOne of the most used widgets in PyQt5 without which we cannot imagine\
    \ creating an application, is none other than a simple Button which is the Push\
    \ Button. **QPushButton** class which represents a Button is imported from **PyQt5.QtWidgets**\
    \ module. We have seen different buttons in various applications such as **OK**,\
    \ **Cancel**, **Yes**, **No**, **Help** and so on. Generally, we can display simple\
    \ text to the user or any icon using a Push Button. Its shape is rectangular.\
    \ Just remember, whenever we need to prompt some action to be done in the background\
    \ of application using some click operation, the first widget which comes to your\
    \ mind must be the Push Button.\n\n## Important properties\n\nThere are multiple\
    \ properties that will be discussed. Just drag and drop a simple Push Button from\
    \ Widget Box. Under **Property Editor**, we will see different properties which\
    \ are headed under **QObject**, **QWidget**, **QAbstractButton**, and **QPushButton**.\
    \ For all Qt objects, **QObject** class is the base class. Under this, we have\
    \ the `objectName` property where some name is provided by the user. The name\
    \ may be changed based on the requirement.\n\n> **Note:** It is important to know\
    \ that properties for QObject, QWidget and QAbstractButton classes are common\
    \ to all Button types, except the Dialog Button Box widget. Under this Dialog\
    \ Button Box widget, we have the properties for QObject and QWidget classes only.\
    \ In fact, every widget in Qt Designer will have the properties for QObject and\
    \ QWidget classes.\n\n**The properties common for different Button widgets, that\
    \ is, QObject, QWidget and QAbstractButton class are discussed at the end of this\
    \ chapter.**\n\nApart from the properties of these 3 classes, there are some other\
    \ properties of the **QPushButton** widget, as can be seen in the following *Figure\
    \ 4.2*:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_173_0.png)\n\n*Figure 4.2:*\
    \ Other QPushButton Properties apart from properties of 3 classes (QObject, QWidget\
    \ and QAbstractButton)\n\n## autoDefault\n\nThis property will enable the `autoDefault`\
    \ Button property in a **QPushButton** widget. If the parent is **QDialog** for\
    \ buttons, then this property default value is **True**. Otherwise, it is **False**.\
    \ Auto-default button may have a larger size as it is drawn with some extra frames\
    \ of 3 pixels or more.\n\n## default\n\nFrom this property, we can decide whether\
    \ **QPushButton** widget has a `default` Button property or not. It is disabled\
    \ by default.\n\nWhen the user presses *Enter* button from keyboard, the dialog's\
    \ `default` button will automatically be pressed when"
  mdcn: "## 结论\n\n在本章中，我们深入学习了PyQt5中的事件、信号和槽，并展示了它们在创建桌面应用程序中的实际应用。用户已学习如何使用Qt Designer开发有用的GUI表单应用程序，并跟踪鼠标移动以触发事件，例如更改QPushButton部件的背景颜色。通过大量示例，阐明了将信号连接到槽的概念，从而能够使用QPushButton部件创建简单的用户界面应用程序。\n\
    \n此外，本章还探讨了为布局和部件创建对象、信号和槽之间的连接，强调了它们在“编辑信号/槽”中的多功能性。所呈现的案例研究示例进一步巩固了本章所获得的知识和技能，这将使用户能够在自己的PyQt5项目中有效地利用这些概念。\n\
    \n## 要点回顾\n\n-   事件作为通知，表明某事已经发生。按钮点击就是一个事件示例。\n-   对象发出信号以通知其他对象某事已经发生。例如，当按钮对象被点击时，可能会发出一个信号。\n\
    -   当信号被发出时，称为槽的函数会被激活。例如，当按钮对象被点击时，可能会调用一个槽。\n-   信号和槽可以随时相互连接/断开连接。\n-   编辑部件、信号/槽和伙伴都是重要的Qt\
    \ Designer元素，可以帮助设计师开发更有效、更高效的用户界面。\n-   用户可以编辑部件以更改其在用户界面中的特性。当更改部件的大小、颜色或其他特性时，这会很有帮助。\n\
    -   使用伙伴允许用户始终同步两个部件。例如，如果使用此方法连接文本框和标签，则文本框中的文本将始终显示在标签中。\n\n## 问题\n\n1.  解释事件、信号和槽在Qt\
    \ Designer中用于GUI设计的作用。\n2.  解释Qt Designer中信号/槽编辑器的用法。\n3.  展示并解释使用Qt Designer进行鼠标操作的GUI表单。\n\
    4.  解释以下内容及其在GUI设计中的用途：\n    a. 编辑部件\n    b. 编辑信号/槽\n    c. 编辑伙伴\n5.  解释Qt Designer的工具栏图标，并强调它们在GUI设计中的重要性。\n\
    6.  简要介绍Qt Designer中的“编辑Tab顺序”。\n7.  结合一些案例研究，解释Qt Designer中的信号和槽连接。\n\n## 加入本书的Discord空间\n\
    \n加入本书的Discord工作区，获取最新更新、优惠、全球科技动态、新书发布以及与作者的交流会：\n\nhttps://discord.bpbonline.com\n\
    \n![](img/9ef0c0b339dea43dffe3f61f95760762_169_0.png)\n\n# 第4章\n深入了解Qt Designer中的按钮部件\n\
    \n## 简介\n\n在本章中，我们将讨论下一个预期的主题，围绕Qt Designer中的按钮部件展开。Qt Designer中存在的不同按钮包括**下推按钮**、**工具按钮**、**单选按钮**、**复选框**、**命令链接按钮**和**对话框按钮框**。我们将详细讨论所有这些部件，包括它们的描述、重要性和有用的属性、方法/函数以及带示例的信号。我们的整个讨论流程不仅限于本章，在后续章节解释Qt\
    \ Designer的其他部件时，也将遵循相同的模式。所有这些按钮类型都将可用，如下面的*图4.1*所示，位于部件箱中，用户可以选择Qt Designer按钮类型下的任何部件，并将其拖放到GUI表单中。请参考下图：\n\
    \n![](img/9ef0c0b339dea43dffe3f61f95760762_171_0.png)\n\n**图4.1：** *Qt Designer中不同的按钮类型*\n\
    \n现在，事不宜迟，让我们来了解不同的按钮部件。当用户希望与GUI表单部件交互并等待某种反馈时，这些按钮部件将派上用场。可以使用这些按钮部件在PyQt5中显示图标或文本。按钮部件的基类是**QAbstractButton**，它提供了可选中（切换）按钮和下推按钮的支持。\n\
    \n## 结构\n\n在本章中，我们将讨论以下主题：\n\n-   下推按钮\n-   工具按钮\n-   单选按钮\n-   复选框\n-   命令链接按钮\n\
    -   对话框按钮框\n-   按钮部件的通用属性\n\n## 目标\n\n阅读本章后，读者将了解常用于创建交互式用户界面的按钮部件。本章的主要目标是理解它们的属性、功能和自定义选项。通过探索与按钮部件相关的特性和设置，我们可以有效地设计和实现Qt应用程序中用户友好的界面。Qt\
    \ Designer提供了多种不同的按钮部件，包括**复选框**、**下推按钮**、**工具按钮**、**单选按钮**、**命令链接按钮**等。我们将详细探讨每种按钮部件的描述、属性、重要方法、重要信号以及带输出显示的应用示例。**QObject**、**QWidget**和**QAbstractButton**的重要属性将在最后以图片形式作为附加信息进行介绍。通用属性的概念将适用于所有后续章节。\n\
    \n## 下推按钮\n\nPyQt5中最常用的部件之一，没有它我们无法想象创建应用程序，那就是简单的按钮——下推按钮。表示按钮的**QPushButton**类从**PyQt5.QtWidgets**模块导入。我们在各种应用程序中见过不同的按钮，例如**确定**、**取消**、**是**、**否**、**帮助**等。通常，我们可以使用下推按钮向用户显示简单的文本或任何图标。它的形状是矩形的。请记住，每当我们需要通过某种点击操作提示应用程序后台执行某些操作时，您首先想到的部件必须是下推按钮。\n\
    \n## 重要属性\n\n将讨论多个属性。只需从部件箱拖放一个简单的下推按钮。在**属性编辑器**下，我们将看到不同的属性，这些属性在**QObject**、**QWidget**、**QAbstractButton**和**QPushButton**下分类。对于所有Qt对象，**QObject**类是基类。在此之下，我们有`objectName`属性，用户可以提供一些名称。该名称可以根据需要进行更改。\n\
    \n> **注意：** 需要了解的是，QObject、QWidget和QAbstractButton类的属性对于所有按钮类型都是通用的，对话框按钮框部件除外。在此对话框按钮框部件下，我们只有QObject和QWidget类的属性。实际上，Qt\
