    \n## 日期/时间编辑\n\nPyQt5 库中的 `QDateTimeEdit` 控件允许用户选择和编辑日期和时间值。`QDateTimeEdit` 支持多种显示格式，例如仅日期、仅时间和日期时间显示。用户可以选择从日历弹出窗口中选择值，也可以手动输入到控件中。该控件还包含一组用于调整值的有用控件，包括用于递增和递减日期和时间的向上和向下按钮。此外，`QDateTimeEdit`\
    \ 提供了各种输入验证和用户交互功能，包括只读显示、逐步递增/递减值的能力、最小和最大日期时间等等。\n\n### 重要属性\n\n现在让我们讨论一些重要的属性。\n\
    \n### dateTime\n\n此属性将保存在 `QDateTimeEdit` 对象中设置的日期和时间。默认值设置为公元 2000 年的开始，并且只能设置为有效的\
    \ `QDateTime` 值。参考下图：\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_498_0.png)\n\
    \n*图 8.103：描绘 Qt Designer 中 QDateTimeEdit 的 dateTime 属性的图像*\n\n### date\n\n此属性将保存控件中当前设置的日期。默认值设置为\
    \ **2000 年 1 月 1 日**。该对象是 `QDate`。参考下图：\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_499_0.png)\n\
    \n**图 8.104：** *描绘 Qt Designer 中 QDateTimeEdit 的 date 属性的图像*\n\n### time\n\n此属性将保存控件中当前设置的时间。默认值包含\
    \ **00:00:00** 和 0 毫秒。该对象是 `QTime`。参考下图：\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_499_1.png)\n\
    \n**图 8.105：** *描绘 Qt Designer 中 QDateTimeEdit 的 time 属性的图像*\n\n### maximumDateTime\n\
    \n此属性将保存允许为 `QDateTimeEdit` 对象设置的最大日期和时间值。设置此属性时会调整 `minimumDateTime`。此属性只能设置为有效的\
