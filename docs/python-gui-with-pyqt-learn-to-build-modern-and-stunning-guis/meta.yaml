    Calibri\")\n        myfont.setPointSize(10)\n        myfont.setBold(True)\n  \
    \      myfont.setWeight(75)\n        mylbl2.setFont(myfont)\n        mylbl2.move(14,\
    \ 120) # RAP11\n\n        mylineedit1 = QLineEdit(self) # RAP12\n        mylineedit1.move(210,\
