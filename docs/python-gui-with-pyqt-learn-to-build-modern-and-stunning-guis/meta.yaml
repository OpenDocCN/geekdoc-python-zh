    This property will hold the mode of line wrap and determine the way the text will
    be wrapped when it reaches the end of the line. The default mode is **WidgetWidth**,
    and the words will be wrapped at the right edge of the **QTextEdit** object. Refer
    to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_459_1.png)


    **Figure 8.46:** Image depicting lineWrapMode property of QTextEdit in Qt Designer


    # lineWrapColumnOrWidth


    This property will determine the position (width in pixels or columns) depending
