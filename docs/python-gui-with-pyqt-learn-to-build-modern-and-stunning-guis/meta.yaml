    \ = Ui_Form() # RUCA3\n        self.myui.setupUi(self) # RUCA4\n        self.myui.mybtn_confirm.clicked.connect(self.myuser_credentials_check)\n\
    \        self.show() # RUCA6\n\n    def myuser_credentials_check(self):\n    \
    \    if(self.myui.lineEdit_username.text() == \"\"): # RUCA7\n            QMessageBox.information(self,\
    \ \"Enter Username\", \"Username cannot be empty\")\n            return\n\n  \
    \      if(self.myui.lineEdit_username.text() != \"\" and self.myui.lineEdit_password.text()\
    \ == \"\"):\n            QMessageBox.information(self, \"Enter Password\", \"\
    Password cannot be empty\")\n            return\n\n        if(self.myui.lineEdit_username.text()\
    \ == self.myui.lineEdit_password.text()):\n            QMessageBox.information(self,\
    \ \"Credentials check\", \"Welcome\", QMessageBox.Ok)\n        else:\n       \
    \     QMessageBox.information(self, \"Credentials check\", \"Invalid Credentials\"\
    , QMessageBox.Ok)\n\nif __name__ == '__main__':\n    myapp = QApplication(sys.argv)\
    \ # RUCA10\n    mywindow = MyWidget() # RUCA11\n    sys.exit(myapp.exec_()) #\
    \ RUCA12\n```\n\n> Note: The preceding code is covered in Program Name: User Credential\
    \ App/run_user_credential_app.py\n\nLet us now understand the explanation of the\
    \ source code.\n\nIn RUCA1, after importing the sys module for accessing the command\
    \ line arguments, we are importing from class, which creates desktop style UIs\
    \ of PyQt5 package, that is, QtWidgets. QWidget is used for creating an empty\
    \ GUI and an application handler, that is, QApplication. In addition to it, we\
    \ are also importing a widget for creating dialogs, which is, QMessageBox. We\
    \ will be learning about this later. For your information right now, we are displaying\
    \ a pop up window with some informative text to the user.\n\nWe have created a\
    \ new Python file run_user_credential_app.py to utilize Ui_Form class, which was\
    \ created using pyuic5 command from Qt Designer .ui file. Here, MyWidget class\
    \ will inherit from Ui_Form class. So in RUCA2, from user_credential_app Python\
    \ file, we are importing all the members of a module.\n\nIn RUCA3, we are creating\
    \ an instance of Ui_Form class.\n\nFor representing organization of widgets in\
    \ a UI, a widget tree is built on the parent widget Form by the method setupUi\
    \ of the class Ui_Form. This generated class contains a method called setupUi\
    \ that configures the widgets and layout in accordance with the data in the .ui\
    \ file. When the Python code is run, the instance of the top-level widget class\
    \ receives a call to the setupUi method, which initialises all the widgets and\
    \ configures the layout in accordance with the data in the .ui file. The graphical\
    \ user interface of the application is essentially created using this method.\
    \ There is also a retranslateUi method for translating the interface, that is,\
    \ for multi-language support logic handling, regarding how the text is to be displayed\
    \ in the GUI. In RUCA4, we are passing a single positional argument self.\n\n\
