    \ + \" is selected\") # RBEG1_7\n\nif __name__==\"__main__\":\n    app = QApplication(sys.argv)\n\
    \    w = MyForm()\n    w.show()\n    sys.exit(app.exec_())\n```\n\n## Output:\n\
    \nRefer to the following *Figure 4.29*:\n\n### Case-1: Default output initially\
