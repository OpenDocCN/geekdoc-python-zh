    \n*Figure 7.24: Image depicting tabShape property of QTabWidget in Qt Designer*\n\
    \n### currentIndex\n\nWe can determine the index position of the current tab page\
    \ of **QTabWidget** object. Default value is -1 if there are no tabs in the **QTabWidget**\
    \ object. Refer to the following figure:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_382_0.png)\n\
    \n**Figure 7.25:** *Image depicting currentIndex property of QTabWidget in Qt\
    \ Designer*\n\n### iconSize\n\nWe can determine the icon size on the tab bar,\
    \ which is a **QSize** object. Refer to the following figure:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_382_1.png)\n\
    \n**Figure 7.26:** *Image depicting iconSize property of QTabWidget in Qt Designer*\n\
    \n### elideMode\n\nWhen there is insufficient space to display items for a specific\
    \ tab bar size, this property determines how items should be elided. Possible\
