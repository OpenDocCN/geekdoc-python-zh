    using this, a rectangular panel will be drawn similar to Windows 2000 with appearance
    either as sunken or raised. |


    **Table 5.5:** *Different frame shapes value available to the user*


    The property image in Qt Designer is shown in the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_291_0.png)


    **Figure 5.40:** *Image depicting frameShape property in Qt Designer*


    # # frameShadow


    In order to give a 3D effect to frames, the shadow type can be set using this
    property. User may choose any of the following from the availability, which is
    **Plain**, **Raised**, or **Sunken**:


    | S No. | frameShadow availability | Description |

    | :--- | :--- | :--- |

    | 1. | **Plain** | There is no 3-D effect, and when drawn with the WindowTextcolor
    palette, the frame and contents seem level with the surroundings. |

    | 2. | **Raised** | Draws a 3D raised line using the light and dark colors in
    the current color group, giving the appearance that the frame and its contents
    are raised. |

    | 3. | **Sunken** | Draws a 3D raised line using the light and dark colors in
    the current color group, giving the appearance that the frame and its contents
    are sunken. The default value is sunken in Qt Designer when dragging and dropping
    any ItemView widget in a GUI form. |'
