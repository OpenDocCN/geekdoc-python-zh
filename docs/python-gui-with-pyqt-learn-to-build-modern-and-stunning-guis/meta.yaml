    \ and then with the class. We saw various components inside Qt Designer, along\
    \ with different pre-defined templates. We created a user credential app by initially\
    \ focusing on view in Qt Designer (.ui file), which was then converted into a\
    \ Python code (.py) using `pyuic5` command. Finally, a new Python file was written\
