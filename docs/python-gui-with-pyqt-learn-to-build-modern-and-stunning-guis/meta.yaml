    \n**图 5.61：** *展示 Qt Designer 中 verticalScrollMode 属性的图像*\n\n## horizontalScrollMode\n\
    \n此属性将设置 `QAbstractItemView` 控件项目内容在水平方向上的滚动方式。滚动可以按项目或按像素进行。\n该属性在 Qt Designer\
    \ 中的图像如下所示：\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_302_2.png)\n\n**图 5.62：**\
    \ *展示 Qt Designer 中 horizontalScrollMode 属性的图像*\n\n## QStandardItemModel\n\n它是一个模型/视图类，也是\
    \ PyQt5 中模型/视图框架的一个组件。`QStandardItem` 为 `QStandardItemModel` 提供项目。此模型在任何支持该接口的视图（如\
    \ `QListView`、`QTableView` 和 `QTreeView`）中提供数据。\n\n通常，我们从一个空的 `QStandardItemModel`\
    \ 开始，使用 `appendRow()` 方法向模型添加项目，并在需要列表或树时使用 `item()` 方法访问单个项目。为了将项目排列成模型所代表的表格，我们通常向\
    \ `QStandardItemModel` 构造函数提供表格的尺寸并执行 `setItem()`。借助 `setHorizontalHeaderLabels()`\
    \ 和 `setVerticalHeaderLabels()`，我们可以设置模型的标题标签。\n\n可以使用 `findItems()` 方法搜索模型中的项目，并使用\
