    ## verticalScrollMode\n\nThis property will set the scrolling of `QAbstractItemView`\
    \ widget item contents in the vertical direction. Scrolling can be performed either\
    \ per item or per pixel.\nThe property image in Qt Designer is shown in the following\
    \ figure:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_302_1.png)\n\n**Figure 5.61:**\
    \ *Image depicting verticalScrollMode property in Qt Designer*\n\n## horizontalScrollMode\n\
    \nThis property will set the scrolling of `QAbstractItemView` widget item contents\
    \ in the horizontal direction. Scrolling can be performed either per item or per\
    \ pixel.\nThe property image in Qt Designer is shown in the following figure:\n\
    \n![](img/9ef0c0b339dea43dffe3f61f95760762_302_2.png)\n\n**Figure 5.62:** *Image\
    \ depicting horizontalScrollMode property in Qt Designer*\n\n## QStandardItemModel\n\
    \nIt is a Model/View Class and a component of the Model/View Framework in PyQt5.\
    \ `QStandardItem` provides the items in a `QStandardItemModel`. Data is provided\
    \ by this model in any view which supports the interface such as `QListView`,\
    \ `QTableView` and `QTreeView`.\n\nTypically, we start with an empty `QStandardItemModel`\
    \ and use `appendRow()` method to add items to the model and `item()` method to\
    \ access individual items when you want a list or tree. To arrange items into\
    \ a table that your model represents, we normally supply the table's dimensions\
    \ to the `QStandardItemModel` constructor and execute `setItem()`. With the help\
    \ of `setHorizontalHeaderLabels()` and `setVerticalHeaderLabels()`, we may set\
    \ the header labels of our model.\n\nThe model can be searched for items using\
    \ `findItems()` and sorted using `sort()` methods.\n\nTo remove all elements from\
    \ the model, we can use the `clear()` method.\n\nPlease refer to the link [https://doc.qt.io](https://doc.qt.io)\
    \ for more information. Examples are already demonstrated while explaining different\
    \ views.\n\n## Conclusion\n\nIn this chapter, we learned about in-depth understanding\
    \ of Item view widgets, including `QTableView`, `QTreeView`, and `QListView` which\
    \ have proven to be effective tools for presenting data in an ordered and structured\
    \ way. List formats, hierarchical tree structures, and tabular representations\
    \ are just a few of the alternatives they provided for data presentation. These\
    \ widgets are efficient in presenting data in a graphical and user-friendly manner.\
    \ Additionally, data editing and modification features are included in item view\
    \ widgets. Users can quickly add, remove, or change items to interact with the\
    \ data displayed. The user interface is made more interactive by allowing users\
    \ to specify behaviors and change parameters for these actions using Qt Designer.\
    \ Additionally, the Model-View architecture, a crucial Qt concept, was presented\
    \ in this chapter. The user became familiar with models, views, and delegates\
    \ as well as learned how to interact by learning item view widgets. The Model-View\
    \ architecture can be used to build and implement applications with the use of\
    \ this information. The chapter concluded with more details, illustrated with\
    \ useful illustrations, on key QFrame, QAbstractScrollArea, and QAbstractItemView\
    \ features. In conclusion, the goal of this chapter on item view widgets in Qt\
    \ Designer to explain the qualities, features, and customization possibilities\
    \ was successfully attained.\n\n## Points to remember\n\n- Item views are powerful\
    \ tools for presenting data in a table-like format.\n- Because item views are\
    \ so completely adjustable, user can alter their appearance and behavior to suit\
    \ your particular requirements.\n- A fundamental Qt idea for separating data representation\
    \ (model) from the visual display (view) and user interaction (delegate) is the\
    \ Model-View architecture.\n- The model/view architecture is the foundation of\
    \ item views. Thus, the model, the view, and the delegate are three distinct elements\
    \ that work together to show data. The data is provided by the model, shown by\
    \ the view, and interacted with by the user is handled by the delegate.\n- Items\
    \ can be viewed in a wide variety of ways. QTableView, QListView, and QTreeView\
    \ are the most popular varieties. Data can be shown with these widgets in a tree,\
    \ table, or list format accordingly.\n- QTreeView: This tree view widget uses\
    \ a hierarchical manner to present data.\n- QTableView: This table view widget\
    \ uses a tabular layout to present data.\n- QListView: This list view widget uses\
    \ a list format to display data.\n- QColumnView: This widget displays data in\
    \ a columnar format for displaying a variety of data types, including strings,\
    \ integers, and dates.\n\n## Questions\n\n1. Describe Item Views in Qt Designer.\n\
    2. Explain the following:\n   a. QListView\n   b. QTreeView\n   c. QTableView\n\
    \   d. QColumnView\n   e. Describe QFrame, QAbstractScrollArea, and QAbstractItemView\n\
    3. State the function of the list view widget in Qt Designer.\n4. List and explain\
    \ the important properties QListView widget.\n5. Explain the following:\n   a.\
    \ resizeMode\n   b. layoutMode\n   c. spacing\n   d. gridSize\n   e. viewMode\n\
    \   f. wordWrap\n6. State the function of the tree view widget in Qt Designer.\n\
    7. State the function of the table view widget in Qt Designer.\n8. Explain the\
    \ important properties of the table view widget in Qt Designer.\n9. State the\
    \ function of the column view widget in Qt Designer.\n10. Explain the important\
    \ properties of the column view widget in Qt Designer.\n11. Explain the following:\n\
    \    a. autoExpandDelay\n    b. indentation\n    c. rootIsDecorated\n    d. uniformRowHeights\n\
    \n## Join our book’s Discord space\n\nJoin the book's Discord Workspace for Latest\
    \ updates, Offers, Tech happenings around the world, New Release and Sessions\
    \ with the Authors:\n\nhttps://discord.bpbonline.com\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_307_0.png)\n\
    \n# CHAPTER 6\nGetting Insights of Item Based Widgets in Qt Designer\n\n## Introduction\n\
    \nIn the previous chapter, we discussed different item views in PyQt5. In this\
    \ chapter, we will focus on **Item Widgets**. Our primary focus in this chapter\
    \ will be on learning about **List Widget**, **Tree Widget**, and **Table Widget**.\
    \ We will be focusing on properties and some useful methods. All these widgets\
    \ are available under **Item Widgets** in Qt Designer, as shown in the following\
    \ *Figure 6.1*, where the user can select any of the widgets under **Item Widgets**\
    \ and drag and drop in a GUI form.\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_308_0.png)\n\
    \n*Figure 6.1:* Different Item Widgets (Item Based) in Qt Designer\n\nWe have\
    \ already seen about `QObject` and `QWidget` classes when we were dealing with\
    \ button type widgets. The same applies to **Item Widgets** too. We have already\
    \ discussed other classes about `QFrame`, `QAbstractScrollArea`, and `QAbstractItemView`\
    \ class in the previous chapter. The **Item Widgets** have all these range of\
    \ properties. But the default values may differ from widget to widget. Now, we\
    \ shall be discussing 3 item widgets and their properties.\n\n## Structure\n\n\
    In this chapter, we will discuss the following topics:\n\n- List widget\n- Tree\
    \ widget\n- Table widget\n\n## Objectives\n\nAfter reading this chapter, the reader\
    \ will get to know about **Item Widgets** in Qt Designer which are commonly used\
    \ for creating interactive user interfaces. The primary objective of this chapter\
    \ is to understand their properties, functionality, customization options and\
    \ to gain a thorough knowledge of how to create and operate item-based widgets\
    \ within the Qt Designer environment. After completion of this chapter, user will\
    \ be able to create dynamic, interactive user interfaces using the power of item-based\
    \ widgets. They will discover different features and characteristics to personalize\
    \ the look and behavior of widgets viz **List Widget**, **Tree Widget** and **Table\
    \ Widget**. To facilitate user interaction and implement functionality, readers\
    \ will learn how to manage the events and signals connected to item-based widgets.\
    \ The reader will be well-equipped to develop complex yet user-friendly interfaces\
    \ in Qt Designer utilizing item-based widgets. In the end, solved examples of\
    \ **Item Widgets** will be well discussed."
