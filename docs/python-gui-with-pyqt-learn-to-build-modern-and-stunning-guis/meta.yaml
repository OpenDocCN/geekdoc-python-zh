    ![](img/9ef0c0b339dea43dffe3f61f95760762_1_0.png)


    Saurabh Chandrakar

    Dr. Nilesh Bhaskarrao Bahadure


    # Python GUI with PyQt


    Learn to build modern and stunning GUIs in Python with PyQt5 and Qt Designer


    **Saurabh Chandrakar**


    **Dr. Nilesh Bhaskarrao Bahadure**


    ![](img/9ef0c0b339dea43dffe3f61f95760762_3_0.png)


    www.bpbonline.com


