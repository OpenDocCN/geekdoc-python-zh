    \n# Setting the allowed dock widget areas\ndockWidget.setAllowedAreas(QtCore.Qt.LeftDockWidgetArea\
    \ | QtCore.Qt.RightDockWidgetArea)\n\n# Adding a pushbutton to the dock widget\n\
    mybtn = QtWidgets.QPushButton(\"This is a dock widget\")\ndockWidget.setWidget(mybtn)\n\
    \n# Adding the dock widget to the main window\nmymainWindow.addDockWidget(QtCore.Qt.LeftDockWidgetArea,\
    \ dockWidget)\n\n# Checking if the dock widget is floating\nif dockWidget.isFloating():\n\
    \    print(\"Dock widget is floating\")\n    print('-'*50)\nelse:\n    print(\"\
    Dock widget is docked\")\n\nprint('-'*50)\n\n# Connecting to the allowedAreasChanged\
    \ signal\ndockWidget.allowedAreasChanged.connect(lambda myallowedAreas: print(\"\
    Allowed areas changed to\", myallowedAreas))\n\n# Connecting to the dockLocationChanged\
    \ signal\ndockWidget.dockLocationChanged.connect(lambda myarea: print(\"Dock location\
    \ changed to\", myarea))\n\n# Connecting to the featuresChanged signal\ndockWidget.featuresChanged.connect(lambda\
    \ myfeatures: print(\"Features changed to\", myfeatures))\n\n# Connecting to the\
    \ topLevelChanged signal\ndockWidget.topLevelChanged.connect(lambda mytopLevel:\
    \ print(\"Top level changed to\", mytopLevel))\n\n# Connecting to the visibilityChanged\
    \ signal\ndockWidget.visibilityChanged.connect(lambda myvisible: print(\"Visibility\
    \ changed to\", myvisible))\n\n# Setting the dock widget floating\ndockWidget.setFloating(True)\n\
    \nmymainWindow.show()\n\nsys.exit(myapp.exec_())\n```\n\n## 输出：\n\n请参考下图：\n\n\
    ![](img/9ef0c0b339dea43dffe3f61f95760762_421_0.png)\n\n> 注意：前面的代码在程序名 run_dockWidget_eg1.py\
    \ 中有介绍。\n\n## 结论\n\n在本章中，我们深入了解了 Qt Designer 提供的许多容器部件。读者现在对每个部件的功能和能力有了很好的理解，以及如何自定义它们以设计美观且用户友好的界面。\n\
    \n读者特别了解了什么是容器部件以及它们如何工作，不同类型的容器部件，如何使用容器部件创建布局，以及如何自定义容器部件的外观。\n\n此外，读者还了解了信号-槽连接，如何将容器部件内的部件发送的信号连接到槽，以及如何使用布局管理器创建我们想要的布局。\n\
    为了确保读者牢固掌握 Qt Designer 中的容器部件，本章还提供了实际示例和练习。\n\n## 要点回顾\n\n- **QGroupBox** 是来自\
    \ Qt GUI 库的一个部件，它充当容器将其他部件分组在一起，并通过标题和边框在视觉上与其他部件区分开来。\n- PyQt5 中的 **QScrollArea**\
    \ 部件是一个容器部件，它为框架内的子部件内容提供滚动功能。\n- 工具箱是一个部件，它显示一列垂直堆叠的选项卡，当前项显示在活动选项卡下方。\n- 选项卡部件提供一个选项卡栏和一个\
    \ **页面区域**，可以在其中显示与每个选项卡关联的页面。\n- **QFrame** 部件用于将部件分组在一起，并在它们之间提供视觉分隔。\n- 在 PyQt5\
    \ 中创建 **图形用户界面 (GUI)** 的基本构建块是 **QWidgets**，它们是可以在屏幕上显示并与用户交互的可视组件。\n- 为了在单个窗口中显示\
    \ **多文档窗口 (MDI)**，PyQt5 的 **QMdiArea** 部件充当容器部件。每个 MDI 窗口都可以独立移动、调整大小和关闭，而不会影响任何其他窗口。\n\
    - 可停靠窗口可以使用 `QDockWidget` 类添加到主窗口。\n\n## 问题\n\n1. PyQt5 容器部件用于什么目的？请详细解释。\n2.\
    \ 解释 Qt Designer 的不同容器部件。\n3. 解释 Qt Designer 的 `QObject` 和 `QWidget` 类。\n4. 简要介绍\
    \ PyQt5 中的容器。\n5. 解释 Qt Designer 中分组框的重要性和用途。\n6. 解释 Qt Designer 中分组框的重要属性。\n\
    7. 解释 Qt Designer 中分组框可用的重要信号。\n8. 解释 Qt Designer 中滚动区域的用途。\n9. 解释 Qt Designer\
    \ 中滚动区域的重要属性。\n10. 解释 Qt Designer 中堆叠部件的用途。\n11. 解释 Qt Designer 中堆叠部件的重要属性。\n\
    12. 解释 Qt Designer 中 `FrameWidget` 的用途。\n13. 解释 Qt Designer 中 `FrameWidget` 的重要属性。\n\
    14. 解释 **多文档界面 (MDI)** 及其在 Qt Designer 中的重要性。\n15. 哪个部件用于将可停靠窗口添加到主窗口？请详细解释。\n\
    16. 解释 Qt Designer 中停靠部件的重要属性。"
