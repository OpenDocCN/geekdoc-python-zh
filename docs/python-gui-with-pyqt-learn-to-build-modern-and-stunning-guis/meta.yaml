    \ are activated are specified using this property. Refer to the following figure:\n\
    \n![](img/9ef0c0b339dea43dffe3f61f95760762_407_1.png)\n\n**Figure 7.46:** *Image\
    \ depicting activationOrder property of QMdiArea widget in Qt Designer*\n\n###\
    \ viewMode\n\nThis property specifies the mode in which the sub-windows are displayed\
    \ within the `QMdiArea` object. Refer to the following figure:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_407_2.png)\n\
    \n**Figure 7.47:** *Image depicting viewMode property of QMdiArea widget in Qt\
    \ Designer*\n\n### documentMode\n\nThis property specifies whether the Document/View\
    \ architecture should be used by the `QMdiArea` object or not. The `QMdiArea`\
    \ object will manage its sub-windows using this architecture if it is enabled.\
    \ By default, it is **unchecked**. Refer to the following figure:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_408_0.png)\n\
    \n**Figure 7.48:** Image depicting `documentMode` property of `QMdiArea` widget\
