    ## Stacked widget\n\nIn PyQt5, a stacked widget is a means to organize several\
    \ widgets into a single container, each only displays one widget at a time. It\
    \ is comparable to a **QTabWidget** but offers more layout and appearance flexibility.\
    \ The **QtWidgets** module's stacked widget can be used to arrange multiple widgets\
    \ in a stacked layout. **QStackedWidget** can be constructed and populated with\
    \ various child widgets (pages).\n\n## Important properties\n\n**QStackedWidget**\
    \ contains **QFrame** class properties which we have already discussed on Item\
    \ Views (*Chapter 5, Getting Insights of Item Views in Qt Designer*). Apart from\
    \ that, it has **currentIndex** property.\n\n### currentIndex\n\nWe can determine\
    \ the widget’s index position which is visible. Value is -1 if there is no current\
    \ widget. Refer to the following figure:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_393_0.png)\n\
    \n## Important methods\n\nSome important methods are as follows:\n\n- **addWidget(QWidget)**:\
    \ This method will take a QWidget object as an argument and append it to the QStackedWidget\
    \ object, which will return the index position.\n- **count()**: The number of\
    \ widgets contained by the QStackedWidget object is returned.\n- **currentWidget()**:\
    \ This method will return the current widget, which is displayed in the QStackedWidget\
    \ object, and will return None if there are no child widgets.\n\n## Important\
    \ signals\n\nSome important signals are as follows.\n\n### currentChanged(arg__1)\n\
    \nThis signal is emitted when the current widget in the stack changes of QStackedWidget\
