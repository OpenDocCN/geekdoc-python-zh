- md: "After reading this chapter, the reader will have a thorough knowledge of the\
    \ many container widgets offered by Qt Designer, their features, and how to customize\
    \ them to design aesthetically pleasing and user-friendly interfaces. The user\
    \ will investigate various container widget types and will obtain knowledge of\
    \ the precise features and capabilities provided by each widget and an understanding\
    \ of the real-world uses for them. Users will learn what container widgets are,\
    \ how they work, their different types, and their usage to create layouts. We\
    \ will also explore customizing the appearance of container widgets. The idea\
    \ of signal-slot connections will also be explained, and users will learn how\
    \ to connect signals that widgets within container widgets send to slots in order\
    \ to handle user interactions and implement desired functionality. The user will\
    \ be able to use layout managers to create the layouts they want since they will\
    \ have a thorough understanding of the attributes and customization options available\
    \ for each container widget. To ensure that readers have a firm understanding\
    \ of container widgets in Qt Designer, the chapter will also feature practical\
    \ examples and exercises.\n\n## Group Box\n\nA QGroupBox is a widget from the\
    \ Qt GUI library that acts as a container to group other widgets together and\
    \ is visually distinguished from other widgets by a title and a frame. It can\
    \ be used to organize related widgets into a single unit, simplifying the interface’s\
    \ comprehension and navigation. The QGroupBox can be exclusive, which means that\
    \ only one Group Box in a parent container can be checked at a time, as well as\
    \ checkable, which indicates that it can be checked or unchecked by the user.\
    \ Any widget from the PyQt5 can be added into the QGroupBox object.\n\n## Important\
    \ properties\n\nLet us go over some important properties now.\n\n### title\n\n\
    We can set the text that appears in the **QGroupBox** object title bar. Refer\
    \ to the following figure:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_359_0.png)\n\
    \n*Figure 7.2: Image depicting title property of QGroupBox in Qt Designer*\n\n\
    ### alignment\n\nWe can set the alignment of the title within the **QGroupBox**\
    \ object’s frame either vertically or horizontally. Users can choose multiple\
    \ options from either of these alignments. Refer to the following figure:\n\n\
    ![](img/9ef0c0b339dea43dffe3f61f95760762_359_1.png)\n\n*Figure 7.3: Image depicting\
    \ alignment property of QGroupBox in Qt Designer*\n\n### flat\n\nWe can set the\
    \ appearance to be either a frame or painted flat of **QGroupBox** object. By\
    \ default, it is disabled. Refer to the following figure:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_359_2.png)\n\
    \n*Figure 7.4: Image depicting flat property of QGroupBox in Qt Designer*\n\n\
    ### checkable\n\nWe can make the **QGroupBox** object title checkable with the\
    \ help of this property. The title is displayed with the help of a checkbox instead\
    \ of an ordinary label if set to **True**. The **QGroupBox** object's children\
    \ are enabled if checked else disabled. By default, it is set to **False**. Refer\
    \ to the following figure:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_360_0.png)\n\
    \n*Figure 7.5: Image depicting checkable property of QGroupBox in Qt Designer*\n\
    \n### checked\n\nThis property will be used only if the checkable property is\
    \ set to **True** for the **QGroupBox** object. By default, it is unchecked and\
    \ disabled. But if the **QGroupBox** object checkable property is set to **True**,\
    \ this will also be set to **True**. Refer to the following figure:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_360_1.png)\n\
    \n*Figure 7.6: Image depicting checked property of QGroupBox in Qt Designer*\n\
    \n## Important methods\n\nLet us now go over some important methods:\n\n- **setTitle(title)**:\
    \ We can set the text that appears in the **QGroupBox** object title bar with\
    \ the help of this method. It will have a keyboard shortcut if the title text\
    \ contains an & followed by a letter.\n- **setCheckable(checkable)**: If set to\
    \ **True**, **QGroupBox** object is checkable.\n- **isCheckable()**: Will return\
    \ **True** if **QGroupBox** object is checkable else **False**.\n- **setAlignment(alignment)**:\
    \ We can set the alignment of **QGroupBox** object.\n- **setFlat(flat)**: Using\
    \ this method, we can set the appearance to be either frame or painted flat of\
    \ **QGroupBox** object.\n- **isChecked()**: Will return **True** if **QGroupBox**\
    \ object is checked else, **False**.\n\n## Important signals\n\nSome important\
    \ signals are as follows:\n\n- **clicked([checked = False])**: Signal is emitted\
    \ when the **QGroupBox** object is clicked.\n- **toggled(arg__1)**: Signal is\
    \ emitted whenever the check status of the **QGroupBox** object changes and the\
    \ new state is passed as a parameter (**True** for checked, **False** for unchecked).\n\
    \nNow, we shall see an example of **QGroupBox** widget.\nThe details of the file\
    \ names are given in the following *Table 7.1*:\n\n| S No. | Qt Designer file\
    \ name (.ui) | Converting the QtDesigner file name to Python file (.py) | Creating\
    \ another file and importing converted Python file in Qt Designer |\n| :--- |\
    \ :--- | :--- | :--- |\n| 1 | groupboxWidget_eg1.ui | groupboxWidget_eg1.py |\
    \ run_groupboxWidget_eg1.py |\n\n**Table 7.1**: Details of file names\n\nThe Qt\
    \ Designer file is shown in the following figure:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_362_0.png)\n\
    \n**Figure 7.7:** Qt Designer file: GroupBox/groupboxWidget_eg1.ui\n\n> **Note:\
    \ The above .ui file is covered in Path: GroupBox/groupboxWidget_eg1.ui**\n\n\
    Consider the following code of run_groupboxWidget_eg1.py:\n\n```python\nimport\
    \ sys\nfrom PyQt5.QtWidgets import QMainWindow, QApplication\nfrom groupboxWidget_eg1\
    \ import *\n\nclass MyGroupBoxWidget(QMainWindow):\n    def __init__(self):\n\
    \        super().__init__()\n        self.myui = Ui_MainWindow()\n        self.myui.setupUi(self)\n\
    \        self.myui.groupBox.setCheckable(True)\n        self.myui.groupBox.setChecked(False)\n\
    \n        # Connect the group box's toggled signal to the handle_toggled slot\n\
    \        self.myui.groupBox.toggled.connect(self.mytoggle)\n\n        self.show()\n\
    \n    def mytoggle(self, mychecked):\n        print(mychecked)\n        # Updating\
    \ the label based on GroupBox checked status\n        if mychecked:\n        \
    \    self.myui.lbl1.setText(\"Label1 On\")\n            self.myui.lbl1.setStyleSheet(\"\
    QLabel { color : green; }\")\n            self.myui.lbl2.setText(\"Label2 Off\"\
    )\n            self.myui.lbl2.setStyleSheet(\"QLabel { color : red; }\")\n   \
    \     else:\n            self.myui.lbl2.setText(\"Label2 On\")\n            self.myui.lbl2.setStyleSheet(\"\
    QLabel { color : green; }\")\n            self.myui.lbl1.setText(\"Label1 Off\"\
    )\n            self.myui.lbl1.setStyleSheet(\"QLabel { color : red; }\")\n\nif\
    \ __name__==\"__main__\":\n    app = QApplication(sys.argv)\n    w = MyGroupBoxWidget()\n\
    \    w.show()\n    sys.exit(app.exec_())\n```\n\n## Output:\n\n### Default Case\
    \ on running initially\n\nRefer to the following figure:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_364_0.png)\n\
    \n**Figure 7.8:** *Output of GroupBox/run_groupboxWidget_eg1.py*\n\n> **Note:**\
    \ The preceding code is covered in Program Name: **GroupBox/run_groupboxWidget_eg1.py**\n\
    \nWe are providing the **QGroupBox** object checkable status with initial state\
    \ as unchecked.\n\n### Case-1: When the QGroupBox object is checked:\n\nWhen the\
    \ QGroupBox object is checked, then Label1 text is set to Label1 On, and the color\
