    ## Preface


    The purpose of this book is to introduce readers with little to no programming
    experience in Python Graphical User Interface (GUI) to use Python binding for
    the GUI toolkit called PyQt5. A GUI application can be created in any programming
    language, whether VB.Net, C#.Net etc. In this book, we will see how to create
    a GUI application using PyQt5. The readers will get the foundational knowledge
    and skills necessary to start writing code for creating a GUI app in Python language.
    We will use a Graphical tool for creating user interfaces in Qt called Qt Designer.
    By mastering PyQt5, readers can apply this knowledge to solve real-world problems
    and create various useful applications according to their needs.


    The first part of the book covers PyQt5 library and the overall layout of Qt Designer
    tool. Then we will see some insights into layout management and the concept of
    event-driven programming and its implementation in the context of Python programming
    with the usage of the concept of signals and slots. Finally, in the later part
    of the book, we shall see an insight into various widgets related to buttons,
    container item views, container, input, and display widgets.


    This book covers a wide range of topics, from the basic definitions of different
    widgets to various solved examples with well-explanatory code. Overall, the book
    provides a solid foundation for beginners to start their journey for getting trained
    in Python GUI using the PyQt5 library along with the Qt Designer layout tool.


    This book is divided into **9 chapters**. Each chapter description is listed as
    follows.


    ## Chapter 1: Introduction to PyQt5 and Qt Designer Tool


    - This chapter will start by comparing powerful and cross-platform toolkit graphical
    PyQt5 with the tkinter library. You will learn how to install PyQt5 framework
    installation along with the creation of a basic GUI form using PyQt5 without and
    with using the class. We shall explore the components inside Qt Designer along
    with different pre-defined templates. In the latter half of the chapter, we will
    create a user credential app initially focusing on view in Qt Designer (.ui file,
    which is an XML file), then converting it into a python code (.py) using pyuic5
    command and finally creating a new python file which will be importing the python
    code for user interface design and adding some useful logic to create a basic
    Login application for the user.


    ## Chapter 2: Getting Insights of Layout Management


    - This chapter will cover the concept of widgets placement using absolute positioning
    approach. We shall see widgets placement using layout classes where initially
    we will see how to organize widgets either horizontally or vertically using QHBoxLayout
    class. We will explore how to arrange the widgets in a row side by side using
    QHBoxLayout with the usage of methods viz addStretch, addWidget, addLayout. Alternatively,
    we will look into arranging the widgets vertically with addStretch method using
    QVBoxLayout. Then we shall find out arranging widgets in a grid of rows and columns
    using QGridLayout. Also, we will look into creating an application using QFormLayout.
    In the end, we will be confident to create "User Credential App" application using
    absolute positioning, QHBoxLayout, QGridLayout and QFormLayout class.


    ## Chapter 3: Getting Insights of Events, Signals and Slots


    - This chapter will explore the concept of event-driven programming and how it
    is implemented in the context of Python programming using signals and slots. The
    above chapter will guide us through utilizing signals and slots to create and
    manage events. We will discover how to define signals and connect them to slots
    so that our program can respond to events in a useful way. We will also investigate
    various events and signals and how to use them to create interactive user interfaces
    or handle external inputs.


    ## Chapter 4: Getting Insights of Button Widgets in Qt Designer


    - This chapter will cover the concept of button widgets which are commonly used
    for creating interactive user interfaces and make them understand their properties,
    functionality, and customization options. By exploring the features and settings
    related to button widgets, user can effectively design and implement user-friendly
    interfaces in our Qt applications. Qt Designer offers a number of different button
    widgets, including CheckBox, Push Button, Tool Button, Radio Button, Command Link
    Button etc and shall explore description, properties, important methods, important
    signals and an application example with output display of each button widget in
    detail. The important properties of QObject, QWidget and QAbstractButton will
    be covered with images at the end as an addon information.


    ## Chapter 5: Getting Insights of Item Views in Qt Designer


    - This chapter will cover the concept of Item Views in Qt Designer which are commonly
    used for creating user interactive interfaces. We will look into their properties,
    functionality, and customization options. We will explore Qt Designer''s item
    view widgets, like QTableView, QTreeView, and QListView, which are effective tools
    for presenting data in an organised and ordered way. User can use these widgets
    to display data in simple list formats (QListView), hierarchical tree structures
    (QTreeView), or rows and columns (QTableView).


    ## Chapter 6: Getting Insights of Item Widgets (Item-Based) in Qt Designer


    - This chapter will cover the concept of Item Widgets in Qt Designer which are
    commonly used for creating interactive user interfaces. We shall look to understand
    their properties, functionality, customization options and also will gain a thorough
    grasp of how to create and operate item-based widgets within the Qt Designer environment.
    User will be able to create dynamic, interactive user interfaces using the power
    of item-based widgets and will also discover different features and characteristics
    to personalize the look and behavior of widgets viz list widget, tree widget and
    table widget. In order to facilitate user interaction and implement functionality,
    user will learn to manage the events and signals connected to item-based widgets.


    ## Chapter 7: Getting Insights of Containers in Qt Designer


    - This chapter will cover the concept of container widgets offered by Qt Designer,
    their features, and how to customize them to design aesthetically pleasing and
    user-friendly interfaces. User will investigate various container widget types
    and will obtain knowledge of the precise features and capabilities provided by
    each widget. They will get to know what container widgets are and how they work,
    its different types, its usage to create layouts and shall also explore customizing
    appearance of container widgets.


    ## Chapter 8: Getting Insights of Input Widgets in Qt Designer


    - This chapter will deal with concept of many input widgets available and how
    to utilize them effectively to create interactive user interfaces. Users will
    have a solid understanding of input widgets including QLineEdit, QSpinBox, QComboBox,
    QTextEdit etc. as well as their corresponding characteristics, functionality,
    and customization choices. They all shall experience the knowledge needed to incorporate
    these input widgets into their designs so that they may enter data, select options,'
