  md: 'is comparable to QTableView but offers more efficient data-handling techniques.
    QTableWidgetItem provides the items for a QTableWidget.


    # Important properties


    The properties of QTableWidget are similar to the QTableView properties seen in
    the previous chapter. Apart from these properties, the only other 2 properties
    which are added are as follows.


    # rowCount


    This property will return the number of rows in the QTableWidget object. We can
    set the number of rows by passing an integer value to this property. The default
    value is set to 0. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_341_0.png)


    **Figure 6.22:** Image depicting rowCount property of QTableWidget in Qt Designer


    # columnCount


    This property will return the number of columns in the QTableWidget object. We
    can set the number of columns by passing an integer value to this property. The
    default value is set to 0. Refer to the following figure:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_341_1.png)


    **Figure 6.23:** Image depicting columnCount property of QTableWidget in Qt Designer


    # Important methods


    Let us now go over some important methods:'
