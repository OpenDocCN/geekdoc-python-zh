    # Important methods


    Some important methods are as follows:


    +   - `setWidget(widget)`: We can set the widget contained within the scroll area.
    The widget will be destroyed when the scroll area is deleted, as it becomes a
    child of the scroll area.

    - `setWidgetResizable(resizable)`: Using this method, we can set the widget contained
    within the scroll area to be resized to fit the area.'
