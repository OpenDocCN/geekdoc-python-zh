    # # Tree widget


    The PyQt5 library''s **QTreeWidget** class offers a **treeView** widget for displaying
    data in a hierarchical structure. It supports multiple columns and custom items,
    and the user can expand and collapse branches to view and edit items. Data can
    be displayed using it, including a file system, database, or list of items with
    parent-child relationships. The **QTreeWidget** class utilizes a default model
    to hold items, each of which is a **QTreeWidgetItem**, and is based on Qt''s Model/View
    architecture.'
