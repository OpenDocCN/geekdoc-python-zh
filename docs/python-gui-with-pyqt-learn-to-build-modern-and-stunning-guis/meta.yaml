    \n### minimumDate\n\n此属性将保存 QDateTimeEdit 对象的最小日期。默认值是 **1752 年 9 月 14 日**。参考下图：\n\
    \n| minimumDate | 14-09-1752 |\n|---|---|\n\n**图 8.109：** 描绘 Qt Designer 中 QDateTimeEdit\
