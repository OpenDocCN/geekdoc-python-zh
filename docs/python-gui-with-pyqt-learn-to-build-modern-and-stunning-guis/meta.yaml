    # First GUI form creation using PyQt5 without using class


    Now, we shall see a basic UI form creation using PyQt5 without using class. This
    is quite important. As you might have realized, most of the UI forms which we
    will be creating will be using the concept of class and object. It is highly recommended
    that you go through the concept of class before moving further in this chapter.
    It is well explained in our previous books, *Programming Techniques using Python*
    and *Python for Everyone*. Here, we will only focus on our basic UI form creation.
    So, without any further delay, let us start. Refer to the following code which
    can be checked in some IEDs like VSCode, Spyder, Anaconda and so on:


    ```

    import sys # L1


    from PyQt5.QtWidgets import QWidget, QApplication # L2


    myapp = QApplication(sys.argv) # L3


    mywindow = QWidget() # L4


    mywindow.show() # L5


    sys.exit(myapp.exec_()) # L6

    ```


