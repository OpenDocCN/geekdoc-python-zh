    This is just one example. We will study many more as we progress with the chapter.
    Let us now concentrate on understanding the concepts of signals and slots.


    `QObject` class will be deriving `PyQt` Widget, and each widget in response to
    one or more events, will emit `signal`. To perform an action, this `Signal` will
    be connected to `slot`. The `slot` can be a function/method which will be callable.


    A widget emitting a signal is done using the following most convenient way:


    ```

    widget.signal.connect(slot_function/slot_method)

    or

    QtCore.QObject.connect(widget,

    QtCore.SIGNAL(''signalname''),slot_function/slot_method)

    ```


    Just imagine the widget to be an instance of a `QPushButton` say `btn1`. Consider
    the signal to be clicked; that is when the button is clicked, it must be connected
    to a slot function/method, say `mydef_slot`. This can be achieved by 2 approaches:


    ```

    btn1.clicked.connect(mydef_slot)

    or

    QtCore.QObject.connect(btn1, QtCore.SIGNAL("clicked()"), mydef_slot)

    ```


    But there is no support for the `connect()` method of `QObject` class in PyQt5,
    in order to have a connection between signal and slot.'
