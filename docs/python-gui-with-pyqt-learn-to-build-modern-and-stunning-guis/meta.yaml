    - Points to remember\n- Questions\n\n## Index\n\n## CHAPTER 1\nIntroduction to\
    \ PyQt5 and Qt Designer Tool\n\n## Introduction\n\nIn our previously launched\
    \ book *Building Modern GUIs with tkinter and Python*, we learned how to create\
    \ GUI forms using the Tk interface library. Now, we will be looking at another\
    \ approach to create the same GUI forms using one of the most popular cross-platform\
    \ libraries, known as PyQt5 library, which was developed by Riverbank Computing.\
    \ A robust and cross-platform graphical toolkit called Qt has a Python binding\
    \ called PyQt5. Python is a well-known and simple-to-learn programming language,\
    \ and with PyQt5 developers, we can simply construct GUI applications using Python.\
    \ With PyQt5, a visual layout tool called Qt Designer is included. Without having\
    \ to write any code explicitly, it enables developers to construct GUI layouts\
    \ quickly and easily by dragging and dropping widgets onto a canvas. Additionally,\
    \ Qt Designer offers a selection of editable widgets that may be used to design\
    \ distinctive user interfaces with eye-catching visuals.\n\n## Structure\n\nIn\
    \ this chapter, we will discuss the following topics:\n\n- Comparison of PyQt5\
    \ with tkinter library\n- PyQt5 framework installation\n- First GUI form creation\
    \ using PyQt5 without using class\n- GUI form creation using PyQt5 by using class\n\
    - Installation of Qt Designer tool with pre-defined templates\n- Components of\
    \ Qt Designer\n- User Credential App Demo\n\n## Objectives\n\nBy the end of this\
    \ chapter, the reader will be able to compare the powerful and cross-platform\
    \ toolkit graphical PyQt5, with the tkinter library. We shall see how to install\
    \ the PyQt5 framework installation, along with the creation of a basic GUI form\
    \ using PyQt5, first without, and then using the class. Moreover, we will be looking\
    \ into the components inside Qt Designer along with different pre-defined templates.\
    \ Finally, we will be creating a user credential app, initially focusing on the\
    \ view in Qt Designer (.ui file which is a XML file), then converting it into\
    \ a Python code (.py) using pyuic5 command, and finally creating a new Python\
    \ file, which will be importing the Python code for user interface design and\
    \ adding some useful logic to create a basic login application for the user."
