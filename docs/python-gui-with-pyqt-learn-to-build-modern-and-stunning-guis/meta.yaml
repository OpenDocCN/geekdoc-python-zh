    one option, then we shall choose `QCheckBox` widget from Widget Box. The appearance
    of this widget is a rectangular box before the text label. Unlike `QRadioButton`
    widget, by default, this widget is not mutually exclusive. However, we can restrict
    the choice to only one of the items by adding to the `QButtonGroup`.


