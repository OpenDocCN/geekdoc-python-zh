- md: "## segmentStyle\n\nThis property will set the style of the **QLCDNumber** object.\
    \ Raised segments filled with background color are produced when style is **Outline**\
    \ filled. Raised segments filled with foreground color are produced when style\
    \ is **Filled** (default value). Flat segments filled with foreground color are\
    \ produced when style is **Flat**. Refer to the following *Figure 9.39*:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_562_0.png)\n\
    \n*Figure 9.39:* Image depicting segmentStyle property of QLCDNumber in Qt Designer\n\
    \n## value\n\nThis property will set the numeric value displayed in the **QLCDNumber**\
    \ object. Value can be integer or float value. Refer to the following *Figure\
    \ 9.40*:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_562_1.png)\n\n*Figure 9.40:*\
    \ Image depicting value property of QLCDNumber in Qt Designer\n\n## intValue\n\
    \nThis property will be truncated to the nearest integer to the current value\
    \ displayed by the **QLCDNumber** object. Refer to the following *Figure 9.41*:\n\
    \n![](img/9ef0c0b339dea43dffe3f61f95760762_562_2.png)\n\n*Figure 9.41:* Image\
    \ depicting intValue property of QLCDNumber in Qt Designer\n\n## Important methods/signals\n\
    \nAn important method/signal is the following:\n\n### display(num)\n\nThis method\
    \ will set the numeric value displayed in the QLCDNumber object. The parameter\
    \ num can be of integer or double type.\n\nNow, we shall see an example of QLCDNumber\
    \ widget.\nThe details of file names are given in Table 9.4:\n\n| S No. | Qt Designer\
