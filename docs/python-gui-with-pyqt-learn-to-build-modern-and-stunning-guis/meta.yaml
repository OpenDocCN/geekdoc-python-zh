    ## Points to remember


    - Users can choose from a drop-down list of options in the `QComboBox` widget
    in PyQt5. Since it displays the item that is now selected, it occupies the least
    amount of screen space. A list of every item that is currently accessible is shown
    when the user clicks on the widget. After then, the user can choose an item from
    the list.

    - A `QFontComboBox` widget is a `combobox` that enables users to select a font
    family from a list of system fonts.

    - `QLineEditWidget` is used to display text or to accept text input from users.

    - `QTextEdit` offers a multi-line text area for editing and displaying documents
    in plain text or HTML.

    - A multi-line text editor that makes it simple to view and edit plain text is
    the **QPlainTextEdit** widget.

    - A Spin Box widget in PyQt5 allows the user to choose a value by pressing the
    Up and Down arrow keys of the keyboard or by clicking the Up and Down button.

    - The **QDoubleSpinBox** widget is a **spinbox** widget supporting double-type
    values.

    - The **QDateTimeEdit** widget will allow the user to select and edit date and
    time values supporting display formats, such as date-only, time-only, and date-time
    displays.

    - A circular dial called **QDial** can be rotated to choose a value from a specified
    range which provides a convenient method for the user to change a numerical value,
    like brightness or volume setting.

    - **QKeySequence** will allow the user to select a keyboard shortcut.


