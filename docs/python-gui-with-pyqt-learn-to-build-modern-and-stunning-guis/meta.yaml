    \ widgets in a single window. A tab widget offers a tab bar and a page area where\
    \ pages associated with each tab can be shown. The tab bar is displayed above\
    \ the page area by default, although different configurations are available. By\
    \ clicking on the tabs at the widget’s top, the user can navigate between various\
    \ pages of widgets. The tabs can be moved around and removed as needed, and each\
    \ tab has a separate widget inside. Additionally, the **QTabWidget** class has\
    \ signals and slots for controlling the current tab.\n\n### Important properties\n\
    \nSome important properties are as follows:\n\n### tabPosition\n\nWe can determine\
    \ the tab’s position in the **QTabWidget** object using this property. Possible\
    \ values can be chosen from the drop-down menu, as the default value is **North**.\
    \ Refer to the following figure:\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_381_0.png)\n\
    \n*Figure 7.23: Image depicting tabPosition property of QTabWidget in Qt Designer*\n\
    \n### tabShape\n\nWe can determine the tab’s shape using the above property from\
    \ **QTabWidget** object. Default value is rounded as possible values can be chosen\
