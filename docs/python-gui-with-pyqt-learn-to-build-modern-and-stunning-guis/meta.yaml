  mdcn: "## 表 8.3：掩码字符及其含义\n\n请参考下图：\n\n![](img/9ef0c0b339dea43dffe3f61f95760762_444_0.png)\n\
    \n图 8.22：展示 Qt Designer 中 QLineEdit 的 inputMask 属性的图片\n\n## text\n\nQLineEdit\
