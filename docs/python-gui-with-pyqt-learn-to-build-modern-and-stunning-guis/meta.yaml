    \        super().__init__()\n        self.ui = Ui_MainWindow()\n        self.ui.setupUi(self)\n\
    \        self.myfruits = {'apple':0, 'orange':0, 'banana':0, 'pear':0} # CBEG1_2\n\
    \n        self.ui.chk_Apple.stateChanged.connect(lambda:self.myselfcheck(self.ui.chk_Apple))\
    \ # CBEG1_3\n        self.ui.chk_Orange.stateChanged.connect(lambda:self.myselfcheck(self.ui.chk_Orange))\
    \ # CBEG1_4\n        self.ui.chk_Banana.stateChanged.connect(lambda:self.myselfcheck(self.ui.chk_Banana))\
    \ # CBEG1_5\n        self.ui.chk_Pear.stateChanged.connect(lambda:self.myselfcheck(self.ui.chk_Pear))\
    \ # CBEG1_6\n        self.show()\n\n    def myselfcheck(self, mychkbutton): #\
    \ CBEG1_7\n        if self.ui.chk_Apple.text() == \"Apple\" :  # CBEG1_8\n   \
    \         if self.ui.chk_Apple.isChecked(): # CBEG1_9\n                self.myfruits['apple']\
    \ = 1\n            else:\n                self.myfruits['apple'] = 0\n```"
  mdcn: "## 单选按钮\n\n此控件主要用于需要在GUI表单的多个选项中仅选择一个选项的场景。我们可以为任何可选择的按钮提供一些文本标签。如果选中了任何一个**QRadioButton**控件，由于其默认是自动排他的，之前选中的按钮将会被取消选中。我们通常将上述控件与**QButtonGroup**或**QGroupBox**一起使用。\n\
    \n## 重要属性\n\n它包含3个类的属性：\n\n- **QObject**\n- **QWidget**\n- **QAbstractButton**\n\
