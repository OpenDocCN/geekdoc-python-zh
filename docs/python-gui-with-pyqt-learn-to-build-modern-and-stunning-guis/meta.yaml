  md: '+   - **setItem(int row, int column, QTableWidgetItem)**: This method will
    set the item at a specified row and column position in the **QTableWidget** object.
    The item may be an object of the class **QTableWidgetItem** or one of its subclasses.

    - **item(int row, int column)**: The item is returned as a **QTableWidget** object
    at a specified row and column position if set otherwise returns **None**.

    - **setCellWidget(int row, int column, QWidget)**: This method sets a widget that
    is to be displayed in the cell at a specified row and column position in the **QTableWidget**
    object. This can be useful to display data types such as a push button or a checkbox.

    - **cellWidget(int row, int column)**: This method returns a widget as a **QWidget**
    object at a specified row and column position in the **QTableWidgetItem** object.

    - **removeRow(int row)**: This method will remove a row from the **QTableWidget**
    object where the row number is passed as an argument.

    - **removeColumn(int column)**: This method will remove a column from the **QTableWidget**
    object where the column number is passed as an argument.

    - **sortItems(int column[,order=Qt.AscendingOrder])**: This method sorts the rows
    in the **QTableWidget** object based on the values in a specified column where
    the column number and the sort order (ascending or descending) are passed as arguments.

    - **clear()**: Using this method, all the items and widgets are removed from the
    **QTableWidget** object.


    # Important signals


    Some signals are as follows:'
  merge: -1
  pgno: 342
- img_proc: true
  md: '+   - **itemSelectionChanged()**: The signal is emitted when the selection
    in the QTableWidget object is changed.

    - **cellClicked(row,column)**: The signal is emitted when the cell in the QTableWidget
    object is clicked and takes the row and column of the clicked cell as arguments.

    - **cellDoubleClicked(row,column)**: The signal is emitted when the cell in the
    QTableWidget object is double-clicked and takes the row and column of the double-clicked
    cell as arguments.

    - **cellChanged(row,column)**: The signal is emitted when the cell in the QTableWidget
    object is changed and takes the row and column of the changed cell as arguments.

    - **cellEntered(row,column)**: The signal is emitted when the user enters a cell
    in the QTableWidget object and takes the row and column of the entered cell as
    arguments. The **cellEntered** signal is only triggered when the **QTableWidget**
    object has the focus, which occurs when the user clicks inside or tabs to the
    object.

    - **cellPressed(row,column)**: The signal is emitted when the user presses a cell
    in the QTableWidget object and takes the row and column as arguments.


