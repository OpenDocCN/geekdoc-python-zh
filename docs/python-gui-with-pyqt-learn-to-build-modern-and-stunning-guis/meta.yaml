    ## Conclusion


    In this chapter, we have learned in-depth understanding of Button widgets in Qt
    Designer. Button widgets are widely used for creating interactive user interfaces,
    and their properties, functionality, and customization options have been thoroughly
    explained. By exploring the features and settings related to Button widgets, the
    user can effectively design and implement user-friendly interfaces in their Qt
    Applications. Qt Designer offers a variety of Button widgets, including **CheckBox**,
    **Push Button**, **Tool Button**, **Radio Button**, and **Command Link Button**,
    each serving a specific purpose. Moreover, we have seen different Dialog Button
    Box present in Qt Designer. The chapter explores the description, properties,
    important methods, and signals associated with each button widget. Additionally,
    an application example with an output display is provided to illustrate the practical
    implementation of Button widgets. Furthermore, the chapter covers the important
    properties of **QObject**, **QWidget**, and **QAbstractButton**, which are relevant
    to Button widgets. These properties are supplemented with images to enhance understanding.


    In the next chapter, we will learn about **Item Views** in Qt Designer, which
    are commonly used for creating interactive user interfaces. We will learn how
    data will be presented in the form of list, hierarchical tree structures and tabular
    representations.


    ## Points to remember


    - A push button widget is a rectangle button that, when clicked, does a certain
    operation. It can be used to do a number of things, such open a file, close a
    window, or submit a form, and it can have text or an icon.

    - A small, rectangular button known as a Tool Button widget is used to access
    a particular tool or feature. In toolbars, Tool Buttons are frequently utilized,
    and they can be used for a range of tasks like cutting, pasting, or zooming in
    and out.

    - A rectangular button that can be used to pick one or more alternatives is known
    as a check button widget. A checkbox is checked when it is clicked, and it is
    unchecked when it is clicked again. Check boxes are frequently used to let users
    choose from a variety of options, such as the languages or functionality they
    want to use.

    - A Radio Button widget is a circular button that enables users to choose one
    item from a list of choices. All other Radio Buttons in the group are deselected
    when a Radio Button is clicked, which selects it. Radio Buttons are frequently
    used to let users choose just one option, like the font size or the background
    color.

    - A rectangle button that triggers an action when pressed, is known as a Command
    Link Button widget. While it resembles a Push Button, its look is distinct. Command
    Link Buttons are frequently used to make it clear to users what will happen when
    they click the button.

    - Give buttons a description in the text. The text should make it crystal obvious
    as to what will happen when the button is clicked.

    - For buttons, use icons. In addition to helping to identify the function of the
    button, icons can improve the visual appeal of buttons.

    - Group similar buttons together. Users will find it simpler to locate the buttons
    they require as a result.

    - For buttons, stick to a consistent look. This will contribute to your application
    having a cohesive look and feel.


