    # Calendar widget


    The PyQt5 widget `QCalendarWidget` offers a monthly calendar view and allows users
    to select a date. Events, appointments, and other time-based information can be
    displayed using the above widget. Numerous customization options are available
    for the widget, including choosing the first day of the week, specifying a minimum
    and maximum date range, and enabling or disabling certain dates. Programmatic
    retrieval of the selected date or range is also possible or through signals emitted
    by the widget.


    # Important properties


    Let us explore some important properties now.


    # selectedDate


    This property view will hold the currently selected date, which must be within
    the `dateRange` specified by the `minimumDate` and `maximumDate` property of `QCalendarWidget`
    object. Refer to the following *Figure 9.22*:


    ![](img/9ef0c0b339dea43dffe3f61f95760762_551_0.png)


    **Figure 9.22:** *Image depicting selectedDate property of QCalendarWidget in
    Qt Designer*'
