  md: '# # Optimizing Memory Usage


    One of the key advantages of using typed arrays over generic lists is their more
    efficient memory usage. Typed arrays store data of a single data type, whereas
    lists can hold values of mixed types, resulting in higher memory consumption.


    Let''s compare the memory usage of a list and an array containing the same data:


    ```

    python

    import sys

    import array


    # Create a list of integers

    int_list = [1, 2, 3, 4, 5]

    print(f"Size of integer list: {sys.getsizeof(int_list)} bytes")


    # Create an array of integers

    int_array = array.array(''i'', [1, 2, 3, 4, 5])

    print(f"Size of integer array: {sys.getsizeof(int_array)} bytes")

    ```'
