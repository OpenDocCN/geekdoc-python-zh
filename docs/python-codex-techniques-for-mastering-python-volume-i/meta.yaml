    exec(code)

    # Output: Hello, World!

    ```


    在此示例中，我们使用 `"exec"` 模式编译一个简单的 `print` 语句。然后，我们将生成的 `code` 对象传递给 `exec()` 函数，后者执行编译后的代码。


