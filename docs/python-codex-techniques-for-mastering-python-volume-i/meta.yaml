    \ [1, 2, 3, 4, 5]\n```\n\nTo access an element by index, you can use square brackets:\n\
    \n```python\nprint(my_list[0]) # Output: 1\n```\n\nAppending an element to the\
    \ end of the list is an O(1) operation:\n\n```python\nmy_list.append(6)\nprint(my_list)\
    \ # Output: [1, 2, 3, 4, 5, 6]\n```\n\nInserting an element at a specific index,\
    \ however, is an O(n) operation, as it requires shifting all the subsequent elements:\n\
    \n```python\nmy_list.insert(2, 10)\nprint(my_list) # Output: [1, 2, 10, 3, 4,\
    \ 5, 6]\n```\n\n## Implementing Linked Lists in Python\n\nTo implement a linked\
    \ list in Python, we'll create a `Node` class to represent each individual node,\
    \ and a `LinkedList` class to manage the overall structure.\n\n```python\nclass\
    \ Node:\n    def __init__(self, data):\n        self.data = data\n        self.next\
    \ = None\n\nclass LinkedList:\n    def __init__(self):\n        self.head = None\n\
    \n    def append(self, data):\n        new_node = Node(data)\n        if self.head\
    \ is None:\n            self.head = new_node\n            return\n        last_node\
