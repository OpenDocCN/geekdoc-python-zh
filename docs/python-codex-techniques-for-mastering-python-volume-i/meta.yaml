    ```\n\n### 第 6 步：使用员工管理系统\n\n现在所有部分都已就绪，让我们创建一些员工，看看系统是如何工作的：\n\n```python\n#\
    \ 创建员工数据库\ndb = EmployeeDatabase()\n\n# 添加员工\ndb.add_employee(\"emp001\", \"John\
    \ Doe\", \"manager\", \"salary\", salary=5000.0)\ndb.add_employee(\"emp002\",\
    \ \"Jane Smith\", \"secretary\", \"hourly\", hour_rate=25.0)\ndb.add_employee(\"\
    emp003\", \"Bob Johnson\", \"sales\", \"commission\",\n                salary=3000.0,\
    \ commission_rate=0.1)\n\n# 获取员工并让他们工作\nfor employee_id, employee_data in db.all_employees().items():\n\
    \    employee = Employee(employee_id, db)\n    print(employee.work(40))\n    print(f\"\
    Payroll for {employee.name}: ${employee.calculate_payroll():.2f}\")\n```\n\n这个示例展示了\
    \ `EmployeeDatabase` 和 `Employee` 类如何使用组合来管理不同的员工角色及其关联的工资策略。通过封装具体的角色和工资策略行为，我们可以轻松添加新的角色或策略，而无需修改核心的\
    \ `Employee` 类。\n\n## 结论\n\n在本教程中，我们探讨了如何在 Python 中使用组合来构建灵活且可维护的设计。通过分离关注点和封装行为，我们创建了一个能够轻松适应新角色和工资策略，而无需修改核心功能的员工管理系统。\n\
    \n- **组合优于继承**：尽可能使用组合而不是继承，因为它能让你的代码库更具灵活性和模块化。\n- **封装**：将行为和数据封装在特定的类中，并提供定义良好的接口与之交互。\n\
    - **抽象**：使用抽象基类和接口来定义共同行为，并在相关类之间强制执行一致的 API。\n- **适应性**：设计你的系统，使其能轻松适应不断变化的需求，例如添加新的员工角色或工资策略。"
