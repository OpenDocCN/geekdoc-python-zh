  - "[PAGE 201]\n\nIn these examples, the Boolean expression is evaluated first, and\
    \ then the or operator is applied based on the truth value of the first operand.\
    \ If the first operand is True, the or operation returns the first operand, regardless\
    \ of the second operand's value. If the first operand is False, the or operation\
    \ returns the second operand.\n\n# Short-Circuit Evaluation\n\nPython's or operator\
    \ also employs short-circuit evaluation, which means that it stops evaluating\
    \ operands as soon as the final result can be determined. This can be particularly\
    \ useful when working with more complex objects or functions that may have side\
    \ effects.\n\n```\n# Short-circuit evaluation\ndef expensive_operation():\n  \
    \  print(\"Performing expensive operation...\")\n    return 42\n\nprint(True or\
    \ expensive_operation())  # Output: True\nprint(False or expensive_operation())\
