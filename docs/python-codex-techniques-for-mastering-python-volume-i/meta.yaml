    yay!\")\n```\n\nThis code is not very scalable, as you would need to add more\
    \ `or` statements every time you want to add a new friend to the list. Instead,\
    \ you can use a more Pythonic approach:\n\n```\nguest = \"Peter\"\nfriends = [\
    \ \"Mia\" , \"John\" , \"Linda\" , \"Peter\" ]\n```"
