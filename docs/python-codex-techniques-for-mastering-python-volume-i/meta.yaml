    Size of integer array: 48 bytes


    As you can see, the `array` object uses less memory than the `list` object, even
    though they both contain the same data. This difference becomes more pronounced
    as the size of the data structure grows, making typed arrays a better choice for
    large datasets.


    Additionally, the compact nature of typed arrays can improve performance in certain
    scenarios, as the data is stored in a more cache-friendly manner.


    # Integrating Strings and Typed Arrays


    Strings and typed arrays can be used together to create powerful data processing
    pipelines. For example, you can use a typed array to store binary data, such as
