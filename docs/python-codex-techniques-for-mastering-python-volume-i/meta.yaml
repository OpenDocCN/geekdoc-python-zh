    \ `random.choice()` 函数从各自的列表中随机选择动词、形容词、冠词和介词。这确保了每首生成的诗歌都将具有独特的词语组合，从而产生更加多样化和有趣的输出。你可以通过引入更多功能来进一步增强诗歌生成器，例如：\n\
