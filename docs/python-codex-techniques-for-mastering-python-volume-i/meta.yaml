    # # Installing Requirements


    > > I''m not a great programmer; I''m just a good programmer with great habits.
    --Kent Beck


    # ## Introduction


    When working on a Python project, it''s essential to ensure that all the necessary
    dependencies are installed correctly. This process is known as "installing Python
    requirements" and is a crucial step in setting up a development environment. By
    installing the required packages, you can ensure that your project runs smoothly
    and consistently across different systems.


    In this tutorial, we''ll walk through the process of installing Python requirements,
    starting from the basics and progressing to more advanced techniques. We''ll cover
    topics such as creating a virtual environment, pinning dependencies, and installing
    packages from a requirements file. By the end of this guide, you''ll'
  - '[PAGE 183]


    have a solid understanding of how to manage your Python project''s dependencies
    and ensure a reliable development workflow.


    # ## Setting up a Virtual Environment


    Before we dive into installing requirements, it''s important to set up a virtual
    environment. Virtual environments allow you to isolate your project''s dependencies,
    ensuring that they don''t conflict with other projects or the system''s global
    Python installation.


    To create a virtual environment, you can use the built-in `venv` module in Python.

    Open your terminal or command prompt and follow these steps:


    ```

    # Create a new virtual environment

    python3 -m venv my_project_env

    # Activate the virtual environment

    source my_project_env/bin/activate

    ```


    Now, your terminal should show the name of your virtual environment, indicating
    that you''re working within the isolated environment.'
  - '[PAGE 184]


    # Pinning Dependencies


    When you install packages for your project, it''s a good practice to "pin" the
    specific versions of those packages. Pinning dependencies ensures that your project
    will use the same versions of the packages, even if newer versions are released
    later. This helps maintain consistency and reproducibility across different environments.


    You can pin your dependencies by creating a [requirements.txt](https://docs.python.org/3/glossary.html#term-requirements-file)
    file. This file will list all the packages your project requires, along with their
    specific versions. Here''s an example:


    ```

    django== 3.2.5

    requests== 2.26.0

    pandas== 1.3.2

    ```


    You can generate this file using the [pip freeze](https://pip.pypa.io/en/stable/cli/pip_freeze/)
    command:


    ```

    pip freeze > requirements.txt

    ```'
  - '[PAGE 185]


    This command will create a requirements.txt file in the current directory, containing
    the list of installed packages and their versions.


    # Installing Requirements


    Now that you have your requirements.txt file, you can install the required packages
    using the pip install command. In your terminal, run the following command:


    ```

    pip install -r requirements.txt

    ```


    This command tells pip to read the requirements.txt file and install all the listed
    packages. The -r flag stands for "requirements" and tells pip to read the file.


    If you''re starting a new project and only have the requirements.txt file, you
    can recreate the entire development environment by running the above command.
    This will install all the necessary packages, ensuring that your project has the
    correct dependencies.'
