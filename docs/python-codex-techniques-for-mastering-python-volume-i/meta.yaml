    # Getting Started with OrderedDict


    To use OrderedDict , you first need to import it from the collections module:


    ```

    from collections import OrderedDict

    ```


    You can create an OrderedDict in the same way as a regular dictionary, but the
    order of the items will be preserved:


    ```

    # Create an OrderedDict

    ordered_dict = OrderedDict()

    ordered_dict[''apple''] = 1

    ```'
