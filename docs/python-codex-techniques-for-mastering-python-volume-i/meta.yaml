  md: '# __repr__ vs __str__ : When to Use Each


    The main differences between __repr__() and __str__() are:


    +   - __str__() should provide a human-readable string representation of the object,
    focusing on the most important aspects.

    - __repr__() should provide a detailed, unambiguous string representation that
    can be used to recreate the object.


    In general, you should always implement both __repr__() and __str__() in your
    classes. The __str__() method will be used when the object is printed or converted
    to a string, while the __repr__() method will be used when you need a more detailed
    representation, such as when debugging or logging.


    If you only implement one of the methods, Python will use the other as a fallback.


    Specifically, if you only implement __str__() , Python will use it for both string
    conversions.


