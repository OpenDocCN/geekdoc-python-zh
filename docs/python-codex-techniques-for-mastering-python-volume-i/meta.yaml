  md: '# Customizing the Cache Replacement Policy


    The `LRUCache` class in the provided implementation uses the Least Recently Used
    (LRU) policy to evict items from the cache when the capacity is reached. However,
    you may want to explore other cache replacement policies, such as First-In-First-Out
    (FIFO) or Most Recently Used (MRU).


    To implement a different cache replacement policy, you can modify the `put` method
    of the `LRUCache` class. For example, to implement a FIFO policy, you can use
    a regular `dict` instead of an `OrderedDict` and remove the oldest item when the
    cache size exceeds the capacity.


    # Handling Mutable Arguments


    The current implementation of the `lru_cache` decorator uses a string representation
    of the function arguments as the cache key. This approach works well for immutable
    arguments, but it may not be suitable for mutable arguments, as their string representation
    can change over time.'
