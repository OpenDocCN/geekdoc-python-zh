- md: "## Flexible Designs\n\n> The function of good software is to make the complex\
    \ appear to be simple. --Grady Booch\n\n## Introduction\n\nAs software systems\
    \ grow in complexity, the need for flexible and maintainable designs becomes increasingly\
    \ important. Python, with its emphasis on simplicity and readability, provides\
    \ powerful tools and design patterns that can help developers create flexible\
    \ and adaptable applications. One such approach is the use of composition, which\
    \ allows for the dynamic assembly of objects and the encapsulation of behavior.\n\
    \nIn this tutorial, we will explore how to leverage composition in Python to build\
    \ flexible and modular designs. We will start by reviewing the key Python libraries\
    \ and frameworks relevant to this topic, then dive into a step-by-step project\
    \ that demonstrates the power of composition. By the end of this guide, you will\
    \ have a solid understanding of how to apply composition to create more robust\
    \ and adaptable Python applications.\n\n## Relevant Python Libraries and Frameworks\n\
    \nBefore we begin our project, let's briefly review some of the Python libraries\
    \ and frameworks that can be useful when working with flexible designs:\n\n- **abc\
    \ (Abstract Base Classes)**: The `abc` module in Python's standard library provides\
    \ a way to define abstract base classes, which can be used to enforce a common\
    \ interface for a group of related classes.\n- **typing**: The `typing` module\
    \ in Python 3.5+ introduces type annotations, which can help improve the maintainability\
    \ and flexibility of your code by making it easier to understand and reason about.\n\
    - **Design Patterns**: While not a specific library, design patterns like Composition,\
    \ Decorator, and Adapter can be extremely useful when building flexible and modular\
    \ Python applications.\n- **dataclasses**: Introduced in Python 3.7, the `dataclasses`\
    \ module provides a way to define data-focused classes with less boilerplate code,\
    \ which can be useful when working with composition.\n- **attrs**: The attrs library\
    \ is a popular alternative to dataclasses that provides a similar functionality,\
    \ with additional features and customization options.\n\nNow that we've reviewed\
    \ the relevant tools, let's dive into our project.\n\n## Project: Flexible Employee\
    \ Management System\n\nIn this project, we will build a flexible employee management\
    \ system that uses composition to manage different employee roles and their associated\
    \ payroll policies.\n\n### Step 1: Set up the Project\n\nFirst, let's create a\
    \ new Python file called `main.py` and import the necessary modules:\n\n```python\n\
    from abc import ABC, abstractmethod\nfrom dataclasses import dataclass\nfrom typing\
    \ import Dict, Callable\n```\n\n### Step 2: Define the Employee Role Classes\n\
    \nWe'll start by creating a base `Role` class and then define specific role classes\
    \ that inherit from it:\n\n```python\nclass Role(ABC):\n    @abstractmethod\n\
    \    def perform_duties(self, hours: int) -> str:\n        pass\n\nclass ManagerRole(Role):\n\
    \    def perform_duties(self, hours: int) -> str:\n        return f\"The manager\
    \ worked for {hours} hours.\"\n\nclass SecretaryRole(Role):\n    def perform_duties(self,\
    \ hours: int) -> str:\n        return f\"The secretary worked for {hours} hours.\"\
    \n\n# Add more role classes as needed\n```\n\n### Step 3: Implement the Payroll\
    \ Policies\n\nNext, we'll define the payroll policies that will be associated\
    \ with each employee:\n\n```python\n@dataclass\nclass PayrollPolicy:\n    hours_worked:\
    \ int = 0\n\n    def track_work(self, hours: int):\n        self.hours_worked\
    \ += hours\n\nclass SalaryPolicy(PayrollPolicy):\n    salary: float\n\n    def\
    \ calculate_payroll(self) -> float:\n        return self.salary\n\nclass HourlyPolicy(PayrollPolicy):\n\
    \    hour_rate: float\n\n    def calculate_payroll(self) -> float:\n        return\
    \ self.hours_worked * self.hour_rate\n\nclass CommissionPolicy(SalaryPolicy):\n\
    \    commission_rate: float\n\n    def calculate_payroll(self) -> float:\n   \
    \     base_pay = super().calculate_payroll()\n        commission_pay = self.hours_worked\
    \ // 5 * self.commission_rate\n        return base_pay + commission_pay\n```\n\
    \n### Step 4: Create the Employee Database\n\nNow, let's build the `EmployeeDatabase`\
    \ class, which will manage the employees and their associated roles and payroll\
    \ policies:\n\n```python\nclass EmployeeDatabase:\n    def __init__(self):\n \
    \       self._employees: Dict[str, Dict] = {}\n        self._roles: Dict[str,\
    \ type[Role]] = {\n            \"manager\": ManagerRole,\n            \"secretary\"\
    : SecretaryRole,\n            # Add more roles as needed\n        }\n        self._payroll_policies:\
    \ Dict[str, type[PayrollPolicy]] = {\n            \"salary\": SalaryPolicy,\n\
    \            \"hourly\": HourlyPolicy,\n            \"commission\": CommissionPolicy,\n\
    \        }\n\n    def add_employee(self, employee_id: str, name: str, role_id:\
    \ str, payroll_policy_id: str, **payroll_policy_args):\n        role_class = self._roles[role_id]\n\
    \        payroll_policy_class = self._payroll_policies[payroll_policy_id]\n  \
    \      payroll_policy = payroll_policy_class(**payroll_policy_args)\n        self._employees[employee_id]\
    \ = {\n            \"name\": name,\n            \"role\": role_class(),\n    \
    \        \"payroll_policy\": payroll_policy,\n        }\n\n    def get_employee(self,\
    \ employee_id: str) -> Dict:\n        return self._employees[employee_id]\n\n\
    \    def all_employees(self) -> Dict[str, Dict]:\n        return self._employees\n\
    ```\n\n### Step 5: Implement the Employee Class\n\nFinally, let's create the `Employee`\
    \ class, which will use the `EmployeeDatabase` to manage the employees:\n\n```python\n\
    class Employee:\n    def __init__(self, employee_id: str, database: EmployeeDatabase):\n\
    \        employee_data = database.get_employee(employee_id)\n        self.name\
    \ = employee_data[\"name\"]\n        self.role = employee_data[\"role\"]\n   \
    \     self.payroll_policy = employee_data[\"payroll_policy\"]\n\n    def work(self,\
    \ hours: int) -> str:\n        duties = self.role.perform_duties(hours)\n    \
    \    self.payroll_policy.track_work(hours)\n        return duties\n\n    def calculate_payroll(self)\
    \ -> float:\n        return self.payroll_policy.calculate_payroll()\n```\n\n###\
    \ Step 6: Use the Employee Management System\n\nNow that we have all the pieces\
    \ in place, let's create some employees and see how the system works:\n\n```python\n\
    # Create the employee database\ndb = EmployeeDatabase()\n\n# Add employees\ndb.add_employee(\"\
    emp001\", \"John Doe\", \"manager\", \"salary\", salary=5000.0)\ndb.add_employee(\"\
    emp002\", \"Jane Smith\", \"secretary\", \"hourly\", hour_rate=25.0)\ndb.add_employee(\"\
    emp003\", \"Bob Johnson\", \"sales\", \"commission\",\n                salary=3000.0,\
    \ commission_rate=0.1)\n\n# Get employees and make them work\nfor employee_id,\
    \ employee_data in db.all_employees().items():\n    employee = Employee(employee_id,\
    \ db)\n    print(employee.work(40))\n    print(f\"Payroll for {employee.name}:\
    \ ${employee.calculate_payroll():.2f}\")\n```\n\nThis example demonstrates how\
    \ the `EmployeeDatabase` and `Employee` classes use composition to manage different\
    \ employee roles and their associated payroll policies. By encapsulating the specific\
    \ role and payroll policy behavior, we can easily add new roles or policies without\
    \ modifying the core `Employee` class.\n\n## Conclusion\n\nIn this tutorial, we\
    \ explored how to use composition in Python to build flexible and maintainable\
    \ designs. By separating concerns and encapsulating behavior, we were able to\
    \ create an employee management system that can easily accommodate new roles and\
    \ payroll policies without modifying the core functionality.\n\n- **Composition\
    \ over Inheritance**: Favor composition over inheritance when possible, as it\
    \ allows for more flexibility and modularity in your codebase.\n- **Encapsulation**:\
    \ Encapsulate behavior and data within specific classes, and provide well-defined\
    \ interfaces for interacting with them.\n- **Abstraction**: Use abstract base\
    \ classes and interfaces to define common behavior and enforce a consistent API\
    \ across related classes.\n- **Adaptability**: Design your system to be easily\
    \ adaptable to changing requirements, such as the addition of new employee roles\
    \ or payroll policies."
