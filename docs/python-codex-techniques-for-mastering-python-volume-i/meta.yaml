    \n```python\na = None\nb = 0\nc = 2\nvar2 = a or b or c\nprint(var2)  # Output:\
    \ 2\n```\n\nHere, since a is None, the or operator evaluates b, which is also\
    \ 0. It then evaluates c and assigns its value (2) to var2.\n\n### Handling Missing\
    \ Return Values\n\nAnother common use case is handling missing return values from\
