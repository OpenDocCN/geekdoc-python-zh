    In this example, the `@unique` decorator ensures that each enumeration member
    has a unique value, preventing the creation of aliases.


    # # Using a Functional API


    In addition to the class-based approach, the `enum` module also provides a functional
    API for creating enumerations. This can be useful when you need more control over
    the enumeration creation process:


    ```

    from enum import Enum, auto


    Coin = Enum(''Coin'', [''PENNY'', ''NICKEL'', ''DIME'', ''QUARTER''])

    ```'
