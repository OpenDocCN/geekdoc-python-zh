  md: '# Comparing and Sorting Enumerations


    Enumeration members can be compared using the standard comparison operators (
    < , > , <= , >= , == , != ). The comparison is based on the underlying integer
    values of the members:


    ```

    print(DayOfWeek.MONDAY < DayOfWeek.FRIDAY)  # Output: True

    print(DayOfWeek.SATURDAY >= DayOfWeek.SUNDAY)  # Output: False


    sorted_days = sorted(DayOfWeek)

    print(sorted_days)  # Output: [DayOfWeek.MONDAY, DayOfWeek.TUESDAY, DayOfWeek.WEDNESDAY,
    DayOfWeek.THURSDAY, DayOfWeek.FRIDAY, DayOfWeek.SATURDAY, DayOfWeek.SUNDAY]

    ```


    In the second example, we use the `sorted()` function to sort the enumeration
    members based on their underlying values.'
