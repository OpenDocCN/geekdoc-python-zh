    Before we dive into exception handling, it''s important to understand the difference
    between syntax errors and exceptions.


    # **Syntax Errors :**


    Syntax errors occur during the parsing phase, when Python is trying to interpret
    the code you''ve written. These errors happen when the code doesn''t follow the
    language''s grammar rules, such as missing a colon, misspelling a keyword, or
    having unmatched parentheses. Syntax errors prevent your code from even running,
    as Python cannot understand what you''re trying to do.


    ```

    print( 3 / 0 )) # SyntaxError: unmatched '')''

    ```


    # **Exceptions :**


    Exceptions, on the other hand, occur during the execution of your code. They happen
    when something goes wrong while your program is running, even if the code is syntactically
    correct. Examples include trying to divide by zero, accessing an index out of
    range, or opening a file that doesn''t exist.


    ```

    print( 3 / 0 ) # ZeroDivisionError: division by zero

    ```'
