  md: '```

    python

    WEDNESDAY = 3

    THURSDAY = 4

    FRIDAY = 5

    SATURDAY = 6

    SUNDAY = 7

    ```


    In this example, we''ve created an enumeration called `DayOfWeek` that has seven
    members, each representing a day of the week. Each member is assigned a unique
    integer value, starting from 1.


    You can access the members of the enumeration using attribute notation:


    ```

    python

    print(DayOfWeek.MONDAY)  # Output: DayOfWeek.MONDAY

    print(DayOfWeek.FRIDAY)  # Output: DayOfWeek.FRIDAY

    ```


    The `Enum` class provides several useful properties and methods for working with
    enumerations, such as `name` and `value` :


    ```

    python

    print(DayOfWeek.MONDAY.name)  # Output: ''MONDAY''

    print(DayOfWeek.MONDAY.value)  # Output: 1

    ```'
