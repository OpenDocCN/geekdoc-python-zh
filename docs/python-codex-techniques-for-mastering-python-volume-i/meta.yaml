    \n# 理解元组\n\n另一方面，元组也是项目的有序集合，但它们是**不可变的**，这意味着你无法在创建后修改它们的元素。元组用圆括号 `()` 表示，并且和列表一样，可以包含不同数据类型的元素。\n\
