    ```\n\nIn this example, the evaluate_expression() function takes a mathematical\
    \ expression as a string, evaluates it using eval(), and returns the result. The\
    \ function also restricts the execution environment by allowing access only to\
    \ the math module, which provides common mathematical functions and constants.\n\
    \n## Conclusion\n\nIn this tutorial, you've learned how to use the eval() function\
    \ in Python to dynamically evaluate expressions. You've explored the basic usage\
