  md: "# # Using Automatic Values\n\nIf you don't need to specify the values for your\
    \ enumeration members, you can let Python assign them automatically:\n\n```\n\
    python\nclass Suit(Enum):\n    CLUBS = auto()\n    DIAMONDS = auto()\n    HEARTS\
    \ = auto()\n    SPADES = auto()\n\nprint(Suit.CLUBS.value)  # Output: 1\nprint(Suit.DIAMONDS.value)\
    \ # Output: 2\nprint(Suit.HEARTS.value) # Output: 3\nprint(Suit.SPADES.value)\
    \ # Output: 4\n```\n\nIn this example, we've used the `auto()` function to automatically\
    \ assign unique integer values to each enumeration member."
  merge: -1
  pgno: 482
- img_proc: true
  md: "# Allowing Aliases\n\nSometimes, you might want to have multiple names (aliases)\
    \ for the same enumeration member. You can achieve this by using the `@unique`\
    \ decorator provided by the `enum` module:\n\n```\nfrom enum import Enum, unique\n\
    \n@unique\nclass CardRank(Enum):\n    ACE = 1\n    TWO = 2\n    THREE = 3\n  \
    \  FOUR = 4\n    FIVE = 5\n    SIX = 6\n    SEVEN = 7\n    EIGHT = 8\n    NINE\
    \ = 9\n```"
