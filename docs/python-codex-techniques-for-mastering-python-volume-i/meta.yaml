    ```


    # Putting It All Together


    Now that you''ve learned the basic turtle graphics commands, let''s put them together
    to create a simple program that draws a house:


    ```python

    import turtle


    # Create a turtle and a screen

    s = turtle.Screen()

    t = turtle.Turtle()


    # Draw the house

    t.forward(200)

    t.left(90)

    t.forward(200)

    t.left(90)

    t.forward(200)

    t.left(90)

    t.forward(200)

    t.left(90)


    # Draw the roof

    t.left(45)

    t.forward(141.42)

    t.left(90)

    t.forward(141.42)

    t.left(45)


    # Move the turtle to a new position

    t.penup()

    t.goto(50, 100)

    t.pendown()


    # Draw a door

    t.forward(50)

    t.left(90)

    t.forward(100)

    t.left(90)

    t.forward(50)

    t.left(90)

    t.forward(100)


    # Keep the screen open until it''s closed

    turtle.done()

    ```


