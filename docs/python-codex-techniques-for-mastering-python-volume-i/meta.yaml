    \ `help()` function to display the docstring:\n\n```\nhelp(say_hello)\n```\n\n\
    This will produce the same output as accessing the `__doc__` attribute directly.\n\
    \n# Docstring Formatting and Structure\n\nDocstrings should follow a consistent\
    \ format to ensure they are easy to read and understand. The standard for Python\
    \ docstrings is defined in PEP 257, which recommends the following structure:\n\
    \n+   - Summary Line : A brief one-line summary of the object's purpose.\n- Blank\
    \ Line : A blank line separating the summary from the rest of the docstring."
