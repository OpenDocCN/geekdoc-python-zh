    \ `@lru_cache` 装饰器来包装 `fibonacci` 函数。`capacity` 参数将缓存的最大容量设置为128项。当我们调用 `fibonacci`\
    \ 函数时，结果会被缓存，后续使用相同参数的调用将直接从缓存中获取，从而显著提升性能，尤其是对于较大的输入值。\n\n## 高级功能与优化\n\n### 自定义缓存替换策略\n\
    \n所提供的实现中的 `LRUCache` 类使用了最近最少使用（LRU）策略，在缓存容量达到上限时淘汰项目。然而，你可能想探索其他缓存替换策略，例如先进先出（FIFO）或最近最多使用（MRU）。\n\
    \n要实现不同的缓存替换策略，你可以修改 `LRUCache` 类的 `put` 方法。例如，要实现FIFO策略，你可以使用常规的 `dict` 而不是 `OrderedDict`，并在缓存大小超过容量时删除最旧的项目。\n\
    \n### 处理可变参数\n\n当前 `lru_cache` 装饰器的实现使用函数参数的字符串表示作为缓存键。这种方法适用于不可变参数，但对于可变参数可能不合适，因为它们的字符串表示会随时间变化。\n\
    \n### 处理可变参数\n\n要处理可变参数，你可以使用不同的方法来生成缓存键，例如使用参数的元组或能够处理可变数据结构的自定义哈希函数。\n\n###\
    \ 集成时间过期\n\n在某些情况下，你可能希望缓存条目在一定时间后过期，而不仅仅依赖LRU策略。为此，你可以修改 `LRUCache` 类，为每个缓存条目存储最后访问时间，并删除已过期的条目。\n\
    \n或者，你可以创建一个单独的装饰器，将LRU缓存与基于时间的过期机制结合起来，如下例所示：\n\n```python\nfrom time import\
    \ time\nfrom functools import wraps\n\ndef lru_cache_with_expiration(capacity:\
    \ int, expiration_time: float):\n    def decorator(func):\n        cache = LRUCache(capacity)\n\
    \        cache_expiration = {}\n\n        @wraps(func)\n        def wrapper(*args,\
    \ **kwargs):\n            key = str(args) + str(kwargs)\n            if key in\
    \ cache and key in cache_expiration and time() - cache_expiration[key] < expiration_time:\n\
    \                return cache.get(key)\n            result = func(*args, **kwargs)\n\
    \            cache.put(key, result)\n            cache_expiration[key] = time()\n\
    \            return result\n\n        return wrapper\n    return decorator\n```\n\
    \n在此示例中，`lru_cache_with_expiration` 装饰器接受一个额外的 `expiration_time` 参数，它指定了缓存条目有效的最大时间（以秒为单位）。该装饰器维护一个单独的字典\
    \ `cache_expiration` 来跟踪每个缓存条目的最后访问时间，并在返回缓存值之前检查过期时间。\n\n## 结论\n\n在本教程中，你学习了如何在Python中使用\
    \ `OrderedDict` 和自定义装饰器实现LRU缓存。你已经看到LRU缓存如何显著提升应用程序的性能，特别是对于计算成本高昂的函数或数据查找。\n\n\
