    import array


    # Create a binary array

    binary_data = array.array(''B'', [0x01, 0x02, 0x03, 0x04, 0x05])


    # Convert the binary array to a bytes object

    binary_bytes = binary_data.tobytes()

    print(binary_bytes)  # Output: b''\x01\x02\x03\x04\x05''


    # Perform string operations on the binary data

    binary_string = binary_bytes.decode(''ascii'')

