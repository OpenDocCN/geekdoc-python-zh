    \n## 步骤 4：测试和优化诗歌生成器\n\n在继续开发诗歌生成器时，彻底测试你的代码并针对性能和可读性进行优化非常重要。以下是一些建议：\n\n- **测试脚本**：多次运行该脚本并检查生成的诗歌，确保它们语法正确且多样化。\n\
