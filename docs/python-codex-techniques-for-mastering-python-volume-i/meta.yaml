- img_proc: true
  md: "To demonstrate a practical use case for `OrderedDict`, let's implement a dictionary-based\
    \ queue. A queue is a first-in-first-out (FIFO) data structure, and we can use\
    \ an `OrderedDict` to maintain the order of the elements.\n\n```\nfrom collections\
    \ import OrderedDict\n\nclass DictQueue:\n    def __init__(self):\n        self.queue\
    \ = OrderedDict()\n\n    def enqueue(self, item):\n        self.queue[f\"item_{len(self.queue)}\"\
    ] = item\n\n    def dequeue(self):\n        if not self.queue:\n            return\
    \ None\n        first_key = next(iter(self.queue))\n        item = self.queue.pop(first_key)\n\
    \        return item\n\n    def __len__(self):\n        return len(self.queue)\n\
    ```"
