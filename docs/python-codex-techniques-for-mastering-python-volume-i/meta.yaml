    \ empty list\n        if self.head is None:\n            return\n\n        # If\
    \ the head node itself holds the key to be deleted\n        if self.head.data\
    \ == key:\n            self.head = self.head.next\n            return\n\n    \
    \    # Traverse the list to find the node before the node with the given key\n\
    \        current = self.head\n        while current.next:\n            if current.next.data\
    \ == key:\n                current.next = current.next.next\n                return\n\
    \            current = current.next\n\n        # If key was not present in the\
    \ list\n        print(f\"Key {key} not found in the linked list\")\n```\n\nIn\
    \ this implementation, we have the following operations:\n\n- `append(data)` :\
