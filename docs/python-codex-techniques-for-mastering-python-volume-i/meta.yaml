  - '[PAGE 24]


    Sometimes, you may want to control the execution environment more strictly, either
    to limit access to certain resources or to provide a specific set of variables
    and functions for the evaluated expression. You can do this by using the optional
    `globals` and `locals` arguments of the `eval()` function.


    The `globals` argument allows you to pass a dictionary of global variables that
    should be available to the evaluated expression. The `locals` argument allows
    you to pass a dictionary of local variables. Here''s an example:


    ```

    # Define some global and local variables

    global_vars = {"x" : 5 , "y" : 10 }

    local_vars = {"a" : 2 , "b" : 3 }

    expression = "x + y + a * b"

    result = eval(expression, globals=global_vars, locals=local_vars)

    print(result) # Output: 21

    ```


    In this example, the expression `"x + y + a * b"` is evaluated using the `global_vars`
    and `local_vars` dictionaries to control the available variables.


