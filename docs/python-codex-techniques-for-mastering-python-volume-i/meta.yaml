- md: "## 复数\n\n> 加速计算机的最佳方法是使其提升 9.8 m/s²。--Anonymous\n\n## 引言\n\n复数是数学中的一个基本概念，在各种科学和工程领域都有应用。在\
    \ Python 中，复数是一种内置的数据类型，允许开发者轻松地对这些数字进行操作和处理。\n\n复数由两部分组成：实部和虚部。虚部由虚数单位表示，在数学中记为\
    \ `i` 或 `j`。在 Python 中，虚数单位用字母 `j` 表示。\n\n在 Python 中理解和使用复数在以下领域特别有用：\n\n- **信号处理**：复数在信号处理算法中被广泛使用，例如傅里叶分析和数字滤波器设计。\n\
    - **量子计算**：复数是量子力学和量子计算数学表述的关键组成部分。\n- **电气工程**：复数用于表示和分析交流电路，包括阻抗、导纳和功率计算。\n\
    - **数值分析**：许多数值算法，如求根方法和迭代技术，都依赖复数运算。\n\n在本教程中，你将学习如何在 Python 中使用复数，包括创建、操作以及对它们执行各种操作。\n\
    \n## 设置和安装\n\nPython 内置了对复数的支持，因此无需安装任何额外的包。你可以立即在 Python 代码中使用复数。\n\n## 创建复数\n\
    \n在 Python 中创建复数有两种方法：\n\n使用 `complex()` 函数：\n\n```\nz1 = complex( 2 , 3 )\nprint(z1)\
    \ # 输出: (2+3j)\n```\n\n使用复数字面语法：\n\n```\nz2 = 2 + 3j\nprint(z2) # 输出: (2+3j)\n\
    ```\n\n这两种方法都创建了一个实部为 2，虚部为 3 的复数。\n\n## 访问实部和虚部\n\n你可以使用 `.real` 和 `.imag` 属性分别访问复数的实部和虚部：\n\
    \n```\npython\nz = 2 + 3j\nprint(z.real)  # 输出: 2.0\nprint(z.imag)  # 输出: 3.0\n\
    ```\n\n请注意，即使复数是用整数值创建的，实部和虚部也作为浮点数返回。\n\n## 复数的共轭\n\n复数的共轭是通过改变虚部的符号得到的。你可以使用\
    \ `.conjugate()` 方法计算复数的共轭：\n\n```\npython\nz = 2 + 3j\nconjugate_z = z.conjugate()\n\
    print(conjugate_z)  # 输出: (2-3j)\n\n```\n\n## 算术运算\n\n复数支持标准算术运算：加法、减法、乘法和除法。\n\
    \n```\npython\nz1 = 2 + 3j\nz2 = 4 - 1j\n\naddition = z1 + z2\nprint(addition)\
    \  # 输出: (6+2j)\n\nsubtraction = z1 - z2\nprint(subtraction)  # 输出: (-2+4j)\n\n\
    multiplication = z1 * z2\nprint(multiplication)  # 输出: (8+11j)\n\ndivision = z1\
    \ / z2\nprint(division)  # 输出: (0.5416666666666666+0.8333333333333334j)\n```\n\
    \n请注意，复数的除法运算是有定义的，但不支持地板除（`//`）和取模（`%`）运算符。\n\n## 指数运算\n\n```\nz = 2 + 3j\npower\
    \ = z ** 2\nprint(power)  # 输出: (-5+12j)\n```\n\n## 优化和调试策略\n\n在 Python 中使用复数时，你可能会遇到需要优化代码或调试问题的情况。以下是一些建议：\n\
    \n- **避免不必要的计算**：如果不需要完整的复数表示，可以通过仅对实部或虚部单独执行操作来优化代码，而不创建复数。\n- **使用 NumPy 进行高效操作**：如果要处理大型复数数组或矩阵，请考虑使用\
    \ NumPy 库，它为复数运算提供了高度优化的函数和操作。\n- **利用内置方法和属性**：Python 的内置复数支持提供了方便的方法和属性，如 `.real`、`.imag`\
    \ 和 `.conjugate()`，它们可以简化你的代码并使其更具可读性。\n- **调试复数问题**：在使用复数时，请注意潜在的舍入错误或精度问题，尤其是在执行除法或指数运算时。使用打印语句或调试器来检查代码各阶段复数的值。\n\
    \n## 结论\n\n在本教程中，你学习了如何在 Python 中使用复数。你探索了创建复数的各种方法、访问其实部和虚部、计算其共轭以及对其执行算术运算。通过理解\
    \ Python 内置复数支持的功能，你可以在科学、工程或数值计算项目中利用这一强大的数据类型。\n\n## 使用常见对象\n\n> 对于一项成功的技术，现实必须优先于公共关系，因为大自然不会被愚弄。--Richard\
    \ Feynman\n\n## 引言\n\n在 Python 中，一切都是对象——从整数和字符串等简单数据类型，到列表和字典等更复杂的结构。理解如何有效地利用这些常见对象是任何\
    \ Python 程序员的一项关键技能。本教程将指导你学习如何在 Python 中使用常见对象，从对象真值的基础知识到短路求值和默认参数值等更高级的技巧。\n\
    \n在本教程结束时，你将具备将常见的 Python 对象自信地融入项目的知识和实践示例，从而编写出更高效、可读性更强且更易于维护的代码。\n\n## 在常见对象上使用\
    \ Python 或运算符\n\n在 Python 中，`or` 运算符不仅可以用于布尔表达式，还可以用于其他对象。理解这种行为的关键在于知道 Python\
    \ 中所有对象都有一个与之关联的真值。\n\n```\npython\n# 布尔表达式\nprint(True or False) # 输出: True\n\
    print(False or True) # 输出: True\n\n# 对象\nprint(3 or 7) # 输出: 3\nprint('' or 19)\
    \ # 输出: 19\nprint([] or ()) # 输出: ()\nprint(18 or False) # 输出: 18\n\n```\n\n在对象上使用\
    \ `or` 运算符的规则如下：\n\n- 如果第一个操作数求值为 `True`，`or` 操作返回第一个操作数。\n- 如果第一个操作数求值为 `False`，`or`\
    \ 操作返回第二个操作数。\n\n这意味着 `or` 运算符可用于提供默认值、处理缺失数据或在备选方案之间进行选择，如上述示例所示。\n\n## 混合布尔表达式和对象\n\
    \n当在 `or` 语句中组合布尔表达式和对象时，行为会变得有点复杂，但仍然遵循相同的基本原则。\n\n```\npython\n# 混合布尔表达式和对象\n\
