    # Exporting Jupyter Notebooks


    Jupyter Notebooks support exporting to a variety of formats, making it easy to
    share your work with others or integrate it into different workflows. Let''s explore
    the available export options:


    # Using the File Menu


    The easiest way to export a Jupyter Notebook is through the File menu. Simply
    go to File > Download As and select the desired format from the list. The available
    options include:


    +   - **LaTeX (.tex)** : Export the notebook as a LaTeX document, which can be
    further compiled into a PDF.'
  - '[PAGE 410]


    +   - **PDF (.pdf)**: Export the notebook directly as a PDF file.

    - **Reveal.js slides (.html)**: Export the notebook as an HTML presentation using
    the Reveal.js library.

    - **Markdown (.md)**: Export the notebook as a Markdown file, which can be easily
    integrated into other documents or published on platforms like GitHub.

    - **reStructuredText (.rst)**: Export the notebook as a reStructuredText file,
    another popular markup language.

    - **Executable script (.py)**: Export the notebook as a Python script, which can
    be run independently of the Jupyter environment.


    # ## Using the nbconvert Tool


    Jupyter Notebooks also provide a command-line tool called nbconvert that allows
    you to convert notebooks to various formats. This can be particularly useful if
    you need to automate the export process or if you prefer working in a terminal
    environment.


    To use nbconvert, open a terminal or command prompt and navigate to the directory
    containing your Jupyter Notebook. Then, run the following command:'
  - '[PAGE 411]


    ```

    jupyter nbconvert --to <format> <notebook_name>.ipynb

    ```


    Replace <format> with the desired output format (e.g., html , pdf , markdown ,
    latex ) and <notebook_name> with the name of your Jupyter Notebook file.


    For example, to export a notebook named **my_notebook.ipynb** to HTML, you would
    run:


    ```

    jupyter nbconvert --to html my_notebook.ipynb

    ```


    This will generate an HTML file in the same directory as your notebook.


