    ## Compiling Expressions


    > For a successful technology, reality must take precedence over public relations,
    for nature cannot be fooled. --Richard Feynman


    ### Introduction


    In Python, the ability to evaluate expressions dynamically is a powerful feature
    that can be leveraged in a variety of applications. One way to achieve this is
    by using the built-in `eval()` function, which allows you to evaluate a string
    as a valid Python expression. However, there are situations where you may want
    more control over the compilation and execution of these expressions. This is
    where the `compile()` function comes into play.


    The `compile()` function in Python allows you to pre-compile an expression into
    a code object, which can then be passed to `eval()` or `exec()` for execution.
    This approach offers several benefits, such as improved performance, the ability
    to inspect the compiled code, and enhanced security measures.


    In this tutorial, we will explore the process of compiling expressions in Python,
    covering the usage of the `compile()` function, the different compilation modes,
    and how to leverage compiled code objects. By the end of this guide, you will
    have a solid understanding of how to incorporate compiled expressions into your
    Python projects.


    ## Setting up the Project


    To get started, ensure that you have Python installed on your system. No additional
    libraries or frameworks are required for this tutorial, as we will be using the
    built-in `compile()` and `eval()` functions.


    You can verify your Python installation by opening a Python interpreter and checking
    the version:


    ```python

    import sys

    print(sys.version)

    ```


    This should display the version of Python installed on your system.


    ## Compiling Expressions


    The `compile()` function in Python is used to pre-compile an expression, statement,
    or a block of code into a code object. The function takes three mandatory arguments:


    - `source` : The source code to be compiled, either as a string or an AST (Abstract
    Syntax Tree) object.

    - `filename` : The name of the file from which the code was read. This is used
    for error messages and debugging. For expressions compiled with `eval()`, you
    can use `"<string>"`.

    - `mode` : The compilation mode, which can be `"eval"`, `"exec"`, or `"single"`.


    Here''s an example of compiling a simple expression:


    ```python

    expression = "2 + 3"

    code_obj = compile(expression, "<string>", "eval")

    result = eval(code_obj)

    print(result) # Output: 5

    ```


    In this example, we first define the expression "2 + 3" as a string. We then use
    the `compile()` function to create a code object `code_obj` from the expression,
    specifying "<string>" as the filename and "eval" as the compilation mode.


    Finally, we pass the `code_obj` to the `eval()` function, which evaluates the
    compiled expression and returns the result, which is 5.


    ## Compilation Modes


    The `compile()` function supports three different compilation modes:


    - **eval**: This mode compiles the source into an expression that can be evaluated
    by the `eval()` function.

    - **exec**: This mode compiles the source into a code object that can be executed
    by the `exec()` function. This mode can handle both expressions and statements.

    - **single**: This mode is similar to the **exec** mode, but it is designed for
    interactive use. It compiles a single interactive statement.


    Here''s an example of using the **exec** mode:


    ```python

    code = compile("print(''Hello, World!'')", "<string>", "exec")

    exec(code)

    # Output: Hello, World!

    ```


    In this example, we compile a simple `print` statement using the `"exec"` mode.
    We then pass the resulting `code` object to the `exec()` function, which executes
    the compiled code.


    ## Inspecting Compiled Code


    One of the benefits of using `compile()` is the ability to inspect the compiled
    code object. Each code object has various attributes that provide information
    about the compiled code, such as the names of variables and functions used.


