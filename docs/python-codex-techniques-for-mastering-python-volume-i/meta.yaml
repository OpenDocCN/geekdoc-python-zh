    ```\n\n通过使用 `lst=None` 作为默认参数，然后检查 `lst` 是否为 `None` 来创建新列表，你可以确保每次函数调用都获得一个全新的列表实例。\n\
    \n## 结论\n\n在本教程中，你已经学习了如何利用 `or` 运算符处理 Python 的非布尔上下文。你了解了如何赋值默认值、处理缺失的返回值、优化条件表达式以及管理可变默认参数。\n\
    \n请记住，Python 中的 `or` 运算符是一个强大的工具，可以帮助你编写更简洁、可读性更高、更健壮的代码。通过理解如何在非布尔上下文中使用它，你可以将你的\
    \ Python 编程技能提升到新的水平。\n\n## 比较列表与链表\n\n> 在软件世界里，当你开始使用别人的软件时，你就生活在他的世界里，遵循他的哲学。——理查德·斯托曼\n\
    \n### 引言\n\n在数据结构的世界中，列表与链表的选择可能会对你的 Python 程序的性能和效率产生重大影响。这两种数据结构各有其独特的优点和缺点，理解它们之间的差异对于在设计应用程序时做出明智的决策至关重要。\n\
    \n本教程将探讨 Python 中列表和链表的关键差异，重点介绍它们各自的性能特征和适用场景。在本指南结束时，你将对何时选择一种数据结构而非另一种有扎实的理解，并了解如何在你的\
    \ Python 项目中实现这两种结构。\n\n### Python 列表：概述\n\n在 Python 的默认实现（即 CPython）中，列表在内存中表示为一个对象数组。这意味着列表的元素存储在连续的内存块中，从而允许高效的随机访问。\n\
    \n列表的主要优势是它们通过索引访问元素的时间是常数时间，即 O(1) 时间复杂度。这使得列表非常适合需要快速检索或更新数据结构中特定位置的项目的场景。\n\
    \n然而，列表也有一些限制。从列表的中间或开头插入或删除元素可能很慢，因为它需要移动底层数组中的所有后续元素。此操作的时间复杂度为 O(n)，其中 n 是列表中的元素数量。\n\
    \n### 链表：一种替代方法\n\n与列表相反，链表在内存中不是由连续的数组表示的。相反，链表由单个节点组成，每个节点包含一个数据元素和一个指向序列中下一个节点的引用（指针）。\n\
    \n链表的主要优势是其高效的插入和删除操作，特别是在列表的开头或结尾。在链表的头部或尾部添加新节点是一个 O(1) 操作，因为它只需要更新周围节点的指针。\n\
    \n然而，权衡之处在于，在链表中访问特定索引的元素是一个 O(n) 操作，因为你需要从头遍历链表到所需位置。这使得链表在随机访问方面不如列表高效。\n\n\
    ## 项目设置\n\n打开你首选的代码编辑器并创建一个新的 Python 文件，例如 `list_vs_linked_list.py`。\n\n## 在 Python\
    \ 中实现列表\n\n列表是内置的数据结构，提供了广泛的功能。你可以这样创建一个新列表：\n\n```python\nmy_list = [1, 2, 3,\
    \ 4, 5]\n```\n\n要通过索引访问元素，你可以使用方括号：\n\n```python\nprint(my_list[0]) # Output:\
    \ 1\n```\n\n将元素追加到列表末尾是一个 O(1) 操作：\n\n```python\nmy_list.append(6)\nprint(my_list)\
    \ # Output: [1, 2, 3, 4, 5, 6]\n```\n\n但是，在特定索引处插入元素是一个 O(n) 操作，因为它需要移动所有后续元素：\n\
    \n```python\nmy_list.insert(2, 10)\nprint(my_list) # Output: [1, 2, 10, 3, 4,\
    \ 5, 6]\n```\n\n## 在 Python 中实现链表\n\n为了在 Python 中实现链表，我们将创建一个 `Node` 类来表示每个单独的节点，以及一个\
    \ `LinkedList` 类来管理整体结构。\n\n```python\nclass Node:\n    def __init__(self, data):\n\
    \        self.data = data\n        self.next = None\n\nclass LinkedList:\n   \
    \ def __init__(self):\n        self.head = None\n\n    def append(self, data):\n\
    \        new_node = Node(data)\n        if self.head is None:\n            self.head\
    \ = new_node\n            return\n        last_node = self.head\n        while\
    \ last_node.next:\n            last_node = last_node.next\n        last_node.next\
    \ = new_node\n\n    def prepend(self, data):\n        new_node = Node(data)\n\
    \        new_node.next = self.head\n        self.head = new_node\n\n    def insert_after(self,\
    \ prev_node, data):\n        if prev_node is None:\n            print(\"Previous\
    \ node must be in the linked list\")\n            return\n        new_node = Node(data)\n\
    \        new_node.next = prev_node.next\n        prev_node.next = new_node\n\n\
    \    def remove(self, key):\n        # Handle empty list\n        if self.head\
    \ is None:\n            return\n\n        # If the head node itself holds the\
    \ key to be deleted\n        if self.head.data == key:\n            self.head\
    \ = self.head.next\n            return\n\n        # Traverse the list to find\
    \ the node before the node with the given key\n        current = self.head\n \
    \       while current.next:\n            if current.next.data == key:\n      \
    \          current.next = current.next.next\n                return\n        \
    \    current = current.next\n\n        # If key was not present in the list\n\
    \        print(f\"Key {key} not found in the linked list\")\n```\n\n在这个实现中，我们有以下操作：\n\
    \n- `append(data)` : 在链表末尾添加一个新节点。\n- `prepend(data)` : 在链表开头添加一个新节点。\n- `insert_after(prev_node,\
    \ data)` : 在给定的先前节点之后插入一个新节点。\n- `remove(key)` : 移除第一个具有给定数据值的节点。\n\n这些操作的时间复杂度如下：\n\
    \n- `append(data)` : O(n)，其中 n 是链表中的节点数。\n- `prepend(data)` : O(1)，因为它只需要更新头指针。\n\
    - `insert_after(prev_node, data)` : O(1)，因为它只需要更新新节点和先前节点的指针。\n- `remove(key)`\
