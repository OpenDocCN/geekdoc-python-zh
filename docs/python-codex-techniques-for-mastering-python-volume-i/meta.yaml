  md: 'With the models defined, we can now interact with the database using SQLAlchemy''s
    ORM. Let''s start by creating a session and performing some basic CRUD operations.


    ```

    python

    from sqlalchemy import create_engine

    from sqlalchemy.orm import sessionmaker


    # Create the database engine

    engine = create_engine(''sqlite:///library.db'')


    # Create a session

    Session = sessionmaker(bind=engine)

    session = Session()


    # Create a new author

    author = Author(first_name=''Stephen'', last_name=''King'')

    session.add(author)

    session.commit()


    # Create a new book

    book = Book(title=''The Shining'', author=author)

    session.add(book)

    session.commit()

    ```'
