    expression = "math.sin(math.pi / 4)"

    result = evaluate_expression(expression)

    print(result) # Output: 0.7071067811865476

    ```


    In this example, the evaluate_expression() function takes a mathematical expression
    as a string, evaluates it using eval(), and returns the result. The function also
    restricts the execution environment by allowing access only to the math module,
    which provides common mathematical functions and constants.


    # Conclusion


    In this tutorial, you''ve learned how to use the eval() function in Python to
    dynamically evaluate expressions. You''ve explored the basic usage of eval(),
