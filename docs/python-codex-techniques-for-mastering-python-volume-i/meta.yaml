    \ the land.\"\n    return poem\n\n# Generate and print a poem\npoem = generate_poem()\n\
    print(poem)\n```\n\n在这个初始实现中，我们使用 `random.sample()` 函数从名词列表中随机选择三个名词。然后，我们使用占位变量表示其他词类，将这些名词组装成一首简单的两行诗。\n\
    \n## 步骤 3：完善诗歌生成器\n\n为了提高生成诗歌的质量和多样性，让我们在 `generate_poem()` 函数中添加更多逻辑：\n\n```python\n\
    def generate_poem():\n    noun1, noun2, noun3 = random.sample(nouns, 3)\n    verb1\
