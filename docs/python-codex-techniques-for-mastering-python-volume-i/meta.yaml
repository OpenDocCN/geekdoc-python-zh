    \ and start writing your code. Alternatively, you can use an interactive Python\
    \ environment like the Python shell or a Jupyter Notebook.\n\n### Assigning Default\
    \ Values\n\nOne common use case for non-boolean contexts is assigning default\
    \ values to variables. Imagine you have a variable `a` that should have a value,\
    \ but in case it doesn't, you want to assign a fallback value stored in `b`. You\
    \ can achieve this using the `or` operator:\n\n```python\na = None\nb = 2\n\n\
    var1 = a or b\nprint(var1)  # Output: 2\n```\n\nIn this example, since a is None,\
    \ the or operator evaluates b and assigns its value (2) to var1.\n\nYou can also\
