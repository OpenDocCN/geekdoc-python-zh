  - '[PAGE 187]


    # Dependency Resolution


    Sometimes, your project''s dependencies may conflict with each other or with the
    system''s global packages. In such cases, you can use tools like `pip-compile`
    from the `pip-tools` package to resolve these conflicts and generate a consistent
    `requirements.txt` file.


    ```

    pip install pip-tools

    pip-compile requirements.in

    ```


    The `pip-compile` command reads the `requirements.in` file (which can be more
    readable than the generated `requirements.txt`) and generates a `requirements.txt`
    file with the resolved dependencies.


    # Continuous Integration (CI)'
