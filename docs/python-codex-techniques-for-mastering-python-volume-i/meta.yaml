    \ `Dog` 类。\n\n```python\nclass Dog:\n    def __init__(self, name, breed):\n  \
    \      self.name = name\n        self.breed = breed\n\n    def bark(self):\n \
    \       print(f\"{self.name} the {self.breed} says: Woof!\" )\n```\n\n在这个 `Dog`\
    \ 类中，我们定义了一个 `__init__` 方法，该方法用 `name` 和 `breed` 属性初始化对象。我们还添加了一个 `bark` 方法，它使用狗的名字和品种打印一条消息。\n\
    \n现在，让我们创建一个 Dog 类的实例并调用它的 bark 方法：\n\n```python\ndog = Dog( \"Buddy\" , \"Labrador\"\
    \ )\ndog.bark() # Output: Buddy the Labrador says: Woof!\n```\n\n### 继承与行为重写\n\
    \n在 Dog 类的基础上，让我们创建一个继承自 Dog 的 GuideDog 类，并添加额外的功能。\n\n```python\nclass GuideDog(Dog):\n\
    \    def __init__(self, name, breed, owner):\n        super().__init__(name, breed)\n\
    \        self.owner = owner\n\n    def bark(self):\n        print(f\"{self.name}\
    \ the {self.breed} guide dog says: Woof! I'm guiding {self.owner}.\")\n\n    def\
    \ guide(self):\n        print(f\"{self.name} is guiding their owner, {self.owner}.\"\
    )\n```\n\n在这个例子中，GuideDog 类继承自 Dog 类，这使其能够访问 name 和 breed 属性以及 bark 方法。然而，我们重写了\
    \ bark 方法以提供更具体的消息，并且还添加了一个新的 guide 方法。\n\n让我们创建一个 GuideDog 类的实例，看看它如何表现：\n\n\
    ```python\nguide_dog = GuideDog( \"Buddy\" , \"Labrador\" , \"Alice\" )\nguide_dog.bark()\
    \ # Output: Buddy the Labrador guide dog says: Woof! I'm guiding Alice.\nguide_dog.guide()\
    \ # Output: Buddy is guiding their owner, Alice.\n```\n\n### 组合：构建功能层\n\n除了继承，Python\
    \ 类还支持组合，这允许我们通过组合多个类来创建复杂的系统。让我们通过构建一个 `FarmAnimal` 类和一个管理 `FarmAnimal` 实例集合的\
    \ `Farm` 类来探索这个概念。\n\n```python\nclass FarmAnimal:\n    def __init__(self, name,\
    \ species):\n        self.name = name\n        self.species = species\n\n    def\
    \ make_sound(self):\n        if self.species == \"cow\":\n            print(f\"\
    {self.name} the {self.species} says: Moo!\")\n        elif self.species == \"\
    sheep\":\n            print(f\"{self.name} the {self.species} says: Baa!\")\n\
    \        elif self.species == \"chicken\":\n            print(f\"{self.name} the\
