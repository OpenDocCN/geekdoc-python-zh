    : \"launch\",\n            \"program\": \"${file}\",\n            \"console\"\
    : \"integratedTerminal\"\n        }\n    ]\n}\n```\n\nWith this configuration,\
    \ you can start the debugger by pressing `F5` or clicking the **Debug** icon in\
    \ the left-hand sidebar, and then selecting the **Python: Current File** option.\n\
    \n## Debugging Complex Features and Optimizing Code\n\nAs your Python project\
