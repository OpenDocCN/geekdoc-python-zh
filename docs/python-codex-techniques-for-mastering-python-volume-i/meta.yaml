    - **typing**：Python 3.5+ 中的 `typing` 模块引入了类型注解，通过使代码更易于理解和推理，有助于提高代码的可维护性和灵活性。\n\
    - **设计模式**：虽然不是特定的库，但组合、装饰器、适配器等设计模式在构建灵活、模块化的 Python 应用程序时非常有用。\n- **dataclasses**：在\
