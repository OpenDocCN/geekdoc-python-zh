    # Memory Allocation


    Lists in Python are implemented using arrays, which require contiguous memory
    allocation. This can be a limitation when dealing with large datasets, as the
    underlying array needs to be resized periodically, which can be a costly operation.


    Linked lists, on the other hand, use dynamic memory allocation for each node,
    allowing them to grow and shrink more efficiently without the need for resizing.
    This can be beneficial in scenarios where the size of the data structure is not
    known in advance or is subject to frequent changes.


