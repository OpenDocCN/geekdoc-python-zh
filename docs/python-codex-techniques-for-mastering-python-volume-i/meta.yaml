    ```\n\n### 第 3 步：实现工资策略\n\n接下来，我们将定义将与每个员工关联的工资策略：\n\n```python\n@dataclass\n\
    class PayrollPolicy:\n    hours_worked: int = 0\n\n    def track_work(self, hours:\
    \ int):\n        self.hours_worked += hours\n\nclass SalaryPolicy(PayrollPolicy):\n\
    \    salary: float\n\n    def calculate_payroll(self) -> float:\n        return\
    \ self.salary\n\nclass HourlyPolicy(PayrollPolicy):\n    hour_rate: float\n\n\
