    print(queue.dequeue()) # Output: ''apple''

    print(len(queue)) # Output: 2

    ```


    In this example, we use an `OrderedDict` to store the queue items. The `enqueue()`
    method adds a new item to the end of the queue, and the `dequeue()` method removes
