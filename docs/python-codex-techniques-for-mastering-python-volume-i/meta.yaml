    \ 和 `species` 属性。`Farm` 类管理一个 `FarmAnimal` 实例的集合，提供了添加新动物和让所有动物发出声音的方法。\n\n让我们创建一个农场并添加一些动物：\n\
    \n```python\nfarm = Farm()\nfarm.add_animal(FarmAnimal(\"Bessie\", \"cow\"))\n\
