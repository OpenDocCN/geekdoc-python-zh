- img_proc: true
  md: "Let's explore some practical examples of how to apply the DRY principle in\
    \ Python.\n\n# Example 1: Avoiding Repetitive Conditional Checks\n\nSuppose you\
    \ have a list of friends and you want to check if a guest is one of them. A naive\
    \ approach might look like this:\n\n```\nguest = \"Peter\"\n\n# Bad: Repeated\
