    \ : 1 , 2 : 1 })\n    fib_memoized( 3 , { 1 : 1 , 2 : 1 , 3 : 2 })\n    fib_memoized(\
    \ 4 , { 1 : 1 , 2 : 1 , 3 : 2 , 4 : 3 })\n    fib_memoized( 5 , { 1 : 1 , 2 :\
    \ 1 , 3 : 2 , 4 : 3 })\n\nStep 9 :\n    fib_memoized( 3 , { 1 : 1 , 2 : 1 , 3\
    \ : 2 })\n    fib_memoized( 4 , { 1 : 1 , 2 : 1 , 3 : 2 , 4 : 3 })\n    fib_memoized(\
    \ 5 , { 1 : 1 , 2 : 1 , 3 : 2 , 4 : 3 })\n\nStep 10 :\n    fib_memoized( 4 , {\
    \ 1 : 1 , 2 : 1 , 3 : 2 , 4 : 3 })\n    fib_memoized( 5 , { 1 : 1 , 2 : 1 , 3\
    \ : 2 , 4 : 3 })\n\nStep 11 :\nfib_memoized( 5 ,{ 1 :1 ,2 :1 ,3 :2 ,4 :3 ,5 :5\
    \ })\n```\n\n在这个可视化中，你可以看到记忆化算法如何通过在执行新计算之前检查 `memo` 字典来避免冗余计算。例如，在计算 `fib_memoized(3)`\
    \ 时，函数首先检查结果是否已存在于 `memo` 字典中，结果是存在的（值为 2）。这使得函数能够返回缓存的结果，而无需进行额外的递归调用。\n\n通过使用记忆化，斐波那契算法的整体时间复杂度从指数级（O(2^n)）降低到线性级（O(n)），使其在处理大输入值时效率大大提高。\n\
    \n## 结论\n\n在本教程中，我们以斐波那契数列为例，探讨了记忆化的概念以及它如何用于优化递归算法。\n\n我们首先实现了一个简单的递归斐波那契函数，并使用调用栈图可视化了其执行过程。这使我们理解了朴素递归方法由于大量冗余计算而导致的低效性。\n\
    \n然后，我们介绍了记忆化的概念，并实现了一个记忆化的斐波那契函数。通过可视化记忆化算法的执行过程，我们看到了缓存先前结果如何显著提高算法的性能。\n\n\
