    \ __str__() in the Person class:\n\n```python\nclass Person:\n    def __init__(self,\
    \ name, age):\n        self.name = name\n        self.age = age\n    def __str__(self):\n\
    \        return f\"{self.name} ({self.age})\"\n```\n\nNow, when we create a Person\
