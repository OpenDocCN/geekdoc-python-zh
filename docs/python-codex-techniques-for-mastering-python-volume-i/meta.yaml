    # Basic Usage of eval()'
  - '[PAGE 22]


    The eval() function in Python takes a single argument: a string representing a
    valid Python expression. When you call eval() with this string, it will execute
    the expression and return the result. Here''s a simple example:


    ```

    expression = "2 + 3 * 4"

    result = eval(expression)

    print(result) # Output: 14

    ```


    In this case, the string "2 + 3 * 4" is evaluated as a Python expression, and
    the result, 14, is stored in the result variable.


    You can also use eval() to evaluate more complex expressions, including variables
    and function calls:


    ```

    x = 5

    y = 10

    expression = "x + y"

    result = eval(expression)

    print(result) # Output: 15

    ```'
