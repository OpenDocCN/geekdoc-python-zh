- img_proc: true
  md: "Enumeration members can be used in control flow statements, such as if and\
    \ match (introduced in Python 3.10):\n\n```\n\nday = DayOfWeek.MONDAY\n\nif day\
    \ == DayOfWeek.MONDAY:\n    print(\"It's the beginning of the week!\")\nelif day\
    \ == DayOfWeek.FRIDAY:\n    print(\"It's the end of the week!\")\n\nmatch day:\n\
    \    case DayOfWeek.MONDAY:\n        print(\"It's the beginning of the week!\"\
    )\n    case DayOfWeek.FRIDAY:\n        print(\"It's the end of the week!\")\n\
    \    case _:\n        print(\"It's a weekday.\")\n\n```\n\nIn these examples,\
    \ we're comparing the day variable to the enumeration members to perform different\
    \ actions based on the day of the week."
