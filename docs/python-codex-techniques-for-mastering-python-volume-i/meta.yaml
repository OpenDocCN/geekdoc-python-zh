  md: "Docstrings in Python are defined using triple-quoted string literals, either\
    \ single quotes `'''` or double quotes `\"\"\"`. They can be placed immediately\
    \ after the definition of a Python object, such as a function, class, or module.\
    \ The docstring is then accessible through the `__doc__` attribute of the object.\n\
    \nLet's explore the `__doc__` attribute in more detail:\n\n```\nprint(say_hello.__doc__)\n\
    ```\n\nThis will output the docstring we defined for the `say_hello()` function:\n\
    \n```\nA simple function to say hello.\n\nThis function takes a name as input\
    \ and returns a greeting message.\n\nArgs:\n    name (str): The name of the person\
    \ to greet.\n```"
  merge: -1
