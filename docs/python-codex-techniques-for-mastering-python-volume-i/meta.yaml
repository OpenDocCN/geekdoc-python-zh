- img_proc: true
  md: 'The **name** property returns the name of the enumeration member, while the
    **value** property returns the associated value (in this case, an integer).


    You can also compare enumeration members using the standard comparison operators:


    ```

    print(DayOfWeek.MONDAY < DayOfWeek.FRIDAY)  # Output: True

    print(DayOfWeek.SATURDAY >= DayOfWeek.SUNDAY)  # Output: False

    ```


    These comparisons are based on the underlying integer values of the enumeration
    members.


    # Creating More Enumerations


    In addition to the basic enumeration we created earlier, the **Enum** class provides
    several ways to customize the creation of enumerations. Let''s explore some of
    these options.'
