  md: '# Documenting vs. Commenting Code


    Before we dive into the process of documenting your Python code, it''s essential
    to understand the distinction between documenting and commenting. While both serve
    important purposes, they have distinct audiences and objectives.


    **Commenting :**

    Commenting your code is primarily intended to aid fellow developers in understanding
    the purpose, logic, and implementation details of your code. Comments provide
    contextual information that helps guide the reader through the code, explaining
    the "why" behind certain design decisions or approaches. They are typically short,
    concise statements that are embedded directly within the code.


    **Documenting :**

    Documenting your code, on the other hand, is focused on describing the functionality
    and usage of your code to end-users or potential users. This includes providing
    information about the overall purpose of your project, how to install and use
    your software, and detailed explanations of the various modules, classes, and
    functions within your codebase. Documenting is often done in a separate document,
    such as a README file or an online documentation website, and is intended to be
    a more comprehensive and user-oriented resource.'
  merge: -1
  pgno: 266
- img_proc: true
  md: '# Commenting Your Python Code


    Commenting your Python code is a fundamental practice that should be adopted from
    the very beginning of your project. Here are some guidelines and best practices
    for effective commenting:


    # Commenting Basics


    +   - Use the # symbol to denote a comment in Python.

    - Keep comments concise and to the point, typically no more than a few sentences.

    - Align comments with the code they are describing, placing them directly above
    or to the right of the relevant code.

    - Avoid redundant information that can be inferred from the code itself.

    - Use consistent formatting and capitalization for your comments.'
