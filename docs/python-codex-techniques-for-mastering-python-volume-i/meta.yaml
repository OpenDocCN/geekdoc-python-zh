    If the first operand evaluates to True , the or operation returns the first operand.

    If the first operand evaluates to False , the or operation returns the second
    operand.


    This means that the or operator can be used to provide default values, handle
    missing data, or choose between alternatives, as demonstrated in the examples
    above.


    # # Mashing Boolean Expressions and Objects


    When you combine Boolean expressions and objects in an or statement, the behavior
    becomes a bit more complex, but still follows the same underlying principles.


    ```

