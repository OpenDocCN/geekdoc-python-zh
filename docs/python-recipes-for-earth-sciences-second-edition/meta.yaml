- md: "## 7.4 The 30 Arc-Second Elevation Model GTOPO30\n\nThe *Global 30 Arc-Second\
    \ Elevation Data* (GTOPO30) is a 30 arc-second (i.e., about 1 km) global digital\
    \ elevation data set that contains only elevation data and no bathymetry data.\
    \ The data set was developed by the Earth Resources Observation System Data Center\
    \ and is available from the USGS EarthExplorer website at\n\nhttps://earthexplorer.usgs.gov\n\
    \nThe EarthExplorer website can be used to search for, preview, and download satellite\
    \ images, aerial photographs, and cartographic products through the U.S. Geological\
    \ Survey (USGS). The GTOPO30 data set is located in the *Digital Elevation* category.\
    \ On this website, we first select the desired map section in the *Search Criteria*\
    \ either by entering the coordinates of the four corners of the map or by zooming\
    \ into the area of interest and selecting *Use Map*. As an example, we can enter\
    \ the coordinates of the Suguta Valley in the northern Kenya rift (2°37.58\"N\
    \ 36°33'47.06\"E). We then choose *GTOPO30* from the *Digital Elevation* collection\
    \ as the *Data Set* and click *Results*, which produces a list of records together\
    \ with a toolbar for previewing and downloading data. In our example, we find\
    \ a single data set *GT30E020N40*, which was acquired on 1 December 1996 and is\
    \ centered at 15°N 40°E. We need to register with the USGS website, log in, and\
    \ then download the data set as both a 55.0 MB GeoTIFF and a 24.9 MB DEM, the\
    \ latter of which is provided as a 26.1 MB compressed zip file. After decompressing\
    \ the file *gt30e020n40_dem.zip*, we obtain eight files that contain the raw data\
    \ and header files in various formats. The file also provides a GIF image of a\
    \ shaded relief display of the data.\n\nImporting the GTOPO30 data into the workspace\
    \ is simple. We rename the files by removing *gt30* from the file name in the\
    \ unzipped collection and use\n\n```python\nimport numpy as np\nfrom matplotlib\
    \ import cm\nfrom matplotlib.colors import LightSource\nimport matplotlib.pyplot\
    \ as plt\nfrom matplotlib.colors import ListedColormap\n\nwith open('e020n40.dem')\
    \ as fid:\n    rectype = np.dtype('>i2')\n    GTOPO30 = np.fromfile(fid, dtype=rectype)\n\
    GTOPO30 = np.reshape(GTOPO30, (6000, 4800))\nGTOPO30 = np.flipud(GTOPO30)\nGTOPO30[GTOPO30<0]\
    \ = 0\n```\n\nto import the data. This script reads the data from the tile *e020n40*\
    \ (without a file extension) at full resolution (i.e., scale factor = 1) in the\
    \ array GTOPO30, which has dimensions of 1,200 by 1,200 cells. The coordinate\
    \ system is defined using the *lon/lat* limits listed above. The resolution is\
    \ 30 arc seconds, which corresponds to 1/120 of a degree:\n\n```python\nlon =\
    \ np.linspace(20,60,4800)\nlat = np.linspace(-10,40,6000)\nLON,LAT = np.meshgrid(lon,lat)\n\
    ```\n\nWe need to reduce the upper limits by 1/120 in order to obtain an array\
    \ of similar dimensions to the GTOPO30 array. A grayscale image can be generated\
    \ from the elevation data using *pcolormesh()*. The fourth power of the *colormap\
    \ gray_r* is used to darken the map, and the colormap is then flipped vertically\
    \ in order to obtain dark colors for high elevations and light colors for low\
    \ elevations (instead of the other way around):\n\n```python\ngray_r = plt.colormaps['gray_r']\n\
    newcolors = gray_r(np.linspace(0,1,256))\nnewcolors = newcolors**4\nnewcmp = ListedColormap(newcolors)\n\
    \nplt.figure()\nplt.axes(aspect='equal',\n    xlim=(30,40),\n    ylim=(-5,5))\n\
    plt.pcolormesh(LON,LAT,GTOPO30,\n    cmap=newcmp,\n    shading='auto')\nplt.colorbar()\n\
    plt.show()\n```\n\nThis script opens a new figure window and generates a gray\
    \ surface, which is displayed in an overhead view. We again plot the digital topography\
    \ as a surface plot with angled lighting using a code similar to the one used\
    \ in Sect. 7.4:\n\n```python\nplt.figure()\nfig,ax2 = plt.subplots(subplot_kw={\"\
    projection\":\"3d\"})\nax2.set_box_aspect((1,1,0.2))\nls = LightSource(270,45)\n\
    rgb = ls.shade(GTOPO30,\n    cmap=cm.hsv,\n    vert_exag=1,\n    blend_mode='hsv')\n\
    ax2.plot_surface(LON[600:1800,1200:2400],\n    LAT[600:1800,1200:2400],\n```\n\
    \nFig. 7.2 Display from the ETOPO 2022 elevation data. ETOPO 2022 is a global\
    \ relief model with 15 arc-second resolution that seamlessly integrates topographic\
    \ and bathymetric data. (Data from NOAA-NCEI 2022).\n\n```python\nplt.figure()\n\
    fig,ax2 = plt.subplots(subplot_kw={\"projection\":\"3d\"})\nve = 500\nax2.set_box_aspect((1,1,ve/1850))\n\
    ls = LightSource(270,45)\nrgb = ls.shade(ETOPO1,\n    cmap=cm.jet,\n    vert_exag=ve/1850,\n\
    \    blend_mode='hsv')\nax2.plot_surface(LON,LAT,ETOPO1,\n    rstride=1,\n   \
    \ cstride=1,\n    linewidth=0,\n    facecolors=rgb,\n    antialiased=False,\n\
    \    shade=True)\nax2.tick_params(axis='both',\n    labelsize=6)\nax2.view_init(30,15-90)\n\
    ax2.grid(False)\nfig.savefig('etopo1.png',dpi=300)\nplt.show()\n```\n\nThe function\
    \ `LightSource()` is used to create a light source from a specific azimuth and\
    \ elevation. We use `vert_exag` for vertical exaggeration in order to emphasize\
    \ the vertical features of the surface plot, and we use `blend_mode='hsv'` to\
    \ combine the colormapped data values with the illumination intensity. The actual\
    \ surface plot is then created with `surface()` using the `rgb` object created\
    \ by `shade()` as `facecolors`. It is important to note that `rstride` and `cstride`\
    \ define the number of rows and columns of ETOPO1 that will be used to render\
    \ the graph. If we choose 1 (i.e., full resolution), rendering takes very long,\
    \ and we should therefore use a larger value (e.g., 5, as above) to resample the\
    \ data set vertically and horizontally by this factor in order to reduce the rendering\
    \ time.\n\nWe can also use `makecpt()`, `Figure()`, and `grdview()` from the *PyGMT*\
    \ package, which makes use of the *xarray* package:\n\n```python\nds = xr.DataArray(data=ETOPO1,\n\
    \    dims=['lat','lon'],\n    coords={'lat':lat,'lon':lon})\nframe = ['xa1f0.25','ya1f0.25','wSEnZ']\n\
    pygmt.makecpt(\n    cmap='geo',\n    series=f'-6000/4000/10',\n    continuous=True)\n\
    \nfig = pygmt.Figure()\nfig.grdview(grid=ds,\n    perspective=[150,30],\n    frame=frame,\n\
    \    projection='M15c',\n    zsize='4c',\n    surftype='i',\n    plane='-6000+gazure',\n\
    \    shading=0)\nfig.basemap(\n    perspective=True,\n    rose='jTL+w3c+l+o-2c/-1c')\n\
    fig.colorbar(perspective=True,\n    position='JMR+o2c/0c+w10c',\n    frame=['a2000'])\n\
    fig.show()\n```\n\nThis script first uses `makecpt()` to choose the geo colormap\
    \ from *PyGMT* that is appropriate for elevation data since this function relates\
    \ land and sea colors to hypsometry and bathymetry, respectively. The function\
    \ then uses `grdview()` to display the actual surface plot and to define the perspective,\
    \ the frame, and the projection. We add a rose that points to geographic north\
    \ with `basemap()` and a colorbar using `colorbar()`.\n\nWe next look at an example\
    \ of an ETOPO 2022 relief model (NOAA-NCEI 2022), which has four times the resolution\
    \ (i.e., 15 arc seconds) of the ETOPO1 data set (i.e., 1 arc minute, equivalent\
    \ to 60 arc seconds) used above (Amanete and Eakins 2009). As with its predecessors,\
    \ this data set is available in both Ice Surface and Bedrock versions, which portray\
    \ the top layer of the ice sheets covering Greenland and Antarctica, respectively,\
    \ and the bedrock below. On the above website, we click on *Launch Grid Extract*\
    \ to create and download spatial subsets of data from the Ice Surface and Bedrock\
    \ versions of ETOPO 2022. There, we click the *select a dataset...* drop-down\
    \ menu to select the *ETOPO_2022 (Bedrock; 15 arcseconds)*. Then, we click on\
    \ the *Area of Interest* button to specify an area of interest, such as a latitude\
    \ of *North: 22* (i.e., 22°N) and *South: 1* (i.e., 1°N) and a longitude between\
    \ *West: 33* (i.e., 33°E) and *East: 58* (i.e., 58°E), which covers the eastern\
    \ African coast. Negative latitude and longitude values are assigned to the Southern\
    \ and Western Hemispheres, respectively. Clicking *Download Data* opens a new\
    \ browser window, from which we can save the file *exportImage.tiff* to our hard\
    \ disk. The file *exportImage.tiff* is a GeoTIFF file that contains georeferencing\
    \ information embedded in a TIFF file. We can retrieve this information by typing\n\
    \n```python\nginfo = rasterio.open('exportImage.tiff')\n```\n\nwhich yields the\
    \ array *ginfo*, which contains the width, the height, and the bounds among numerous\
    \ other pieces of information. Typing\n\n```python\nprint(ginfo.width)\nprint(ginfo.height)\n\
    print(ginfo.bounds)\n```\n\nyields\n\n```\n6000\n5040\nBoundingBox(left=33.0,\
    \ bottom=1.0, right=58.0, top=22.0)\n```\n\nWe can read the digital elevation\
    \ model using\n\n```python\nA = ginfo.read()\n```\n\nWe can display the data using\
    \ *show()* by typing\n\n```python\nfig = plt.figure()\nrasterio.plot.show(A,\n\
    \                  cmap=cm.terrain,\n                  vmin=0,vmax=4000)\nfig.savefig('etopo2.png',dpi=300)\n\
    plt.show()\n```"
  mdcn: "## 7.4 30弧秒高程模型 GTOPO30\n\n*全球30弧秒高程数据*（GTOPO30）是一个30弧秒（即约1公里）的全球数字高程数据集，仅包含高程数据，不含水深数据。该数据集由地球资源观测系统数据中心开发，可从美国地质调查局（USGS）的EarthExplorer网站获取：\n\
    \nhttps://earthexplorer.usgs.gov\n\nEarthExplorer网站可用于搜索、预览和下载美国地质调查局（USGS）的卫星图像、航空照片和制图产品。GTOPO30数据集位于*数字高程*类别下。在该网站上，我们首先在*搜索标准*中选择所需的地图区域，可以通过输入地图四角的坐标，或通过放大到感兴趣区域并选择*使用地图*来完成。例如，我们可以输入肯尼亚北部裂谷苏古塔谷的坐标（2°37.58\"\
    N 36°33'47.06\"E）。然后，我们从*数字高程*集合中选择*GTOPO30*作为*数据集*，并点击*结果*，这将生成一个记录列表以及用于预览和下载数据的工具栏。在我们的示例中，我们找到一个名为*GT30E020N40*的数据集，它于1996年12月1日获取，中心点位于15°N\
    \ 40°E。我们需要在美国地质调查局网站上注册、登录，然后将该数据集下载为55.0 MB的GeoTIFF文件和24.9 MB的DEM文件，后者以26.1\
    \ MB的压缩zip文件形式提供。解压文件*gt30e020n40_dem.zip*后，我们得到八个文件，其中包含各种格式的原始数据和头文件。该文件还提供了一个数据的阴影浮雕显示GIF图像。\n\
    \n将GTOPO30数据导入工作区很简单。我们通过从解压集合中的文件名中移除*gt30*来重命名文件，并使用\n\n```python\nimport numpy\
    \ as np\nfrom matplotlib import cm\nfrom matplotlib.colors import LightSource\n\
    import matplotlib.pyplot as plt\nfrom matplotlib.colors import ListedColormap\n\
    \nwith open('e020n40.dem') as fid:\n    rectype = np.dtype('>i2')\n    GTOPO30\
    \ = np.fromfile(fid, dtype=rectype)\nGTOPO30 = np.reshape(GTOPO30, (6000, 4800))\n\
    GTOPO30 = np.flipud(GTOPO30)\nGTOPO30[GTOPO30<0] = 0\n```\n\n来导入数据。此脚本以全分辨率（即比例因子\
    \ = 1）从图块*e020n40*（无文件扩展名）读取数据到数组GTOPO30中，该数组的维度为1,200 x 1,200个单元格。坐标系使用上面列出的*经度/纬度*范围定义。分辨率为30弧秒，相当于1/120度：\n\
    \n```python\nlon = np.linspace(20,60,4800)\nlat = np.linspace(-10,40,6000)\nLON,LAT\
    \ = np.meshgrid(lon,lat)\n```\n\n我们需要将上限减少1/120，以获得与GTOPO30数组维度相似的数组。可以使用*pcolormesh()*从高程数据生成灰度图像。使用*gray_r*颜色映射表的四次方来使地图变暗，然后垂直翻转颜色映射表，以获得高海拔为深色、低海拔为浅色的效果（而不是相反）：\n\
    \n```python\ngray_r = plt.colormaps['gray_r']\nnewcolors = gray_r(np.linspace(0,1,256))\n\
    newcolors = newcolors**4\nnewcmp = ListedColormap(newcolors)\n\nplt.figure()\n\
    plt.axes(aspect='equal',\n    xlim=(30,40),\n    ylim=(-5,5))\nplt.pcolormesh(LON,LAT,GTOPO30,\n\
    \    cmap=newcmp,\n    shading='auto')\nplt.colorbar()\nplt.show()\n```\n\n此脚本打开一个新的图形窗口并生成一个灰色表面，以俯视图显示。我们再次使用类似于第7.4节中使用的代码，将数字地形绘制为带有角度光照的曲面图：\n\
    \n```python\nplt.figure()\nfig,ax2 = plt.subplots(subplot_kw={\"projection\":\"\
    3d\"})\nax2.set_box_aspect((1,1,0.2))\nls = LightSource(270,45)\nrgb = ls.shade(GTOPO30,\n\
    \    cmap=cm.hsv,\n    vert_exag=1,\n    blend_mode='hsv')\nax2.plot_surface(LON[600:1800,1200:2400],\n\
    \    LAT[600:1800,1200:2400],\n```\n\n图 7.2 基于ETOPO 2022高程数据的显示。ETOPO 2022是一个具有15弧秒分辨率的全球地形模型，无缝集成了地形和水深数据。（数据来自NOAA-NCEI\
    \ 2022）。\n\n```python\nplt.figure()\nfig,ax2 = plt.subplots(subplot_kw={\"projection\"\
    :\"3d\"})\nve = 500\nax2.set_box_aspect((1,1,ve/1850))\nls = LightSource(270,45)\n\
    rgb = ls.shade(ETOPO1,\n    cmap=cm.jet,\n    vert_exag=ve/1850,\n    blend_mode='hsv')\n\
    ax2.plot_surface(LON,LAT,ETOPO1,\n    rstride=1,\n    cstride=1,\n    linewidth=0,\n\
    \    facecolors=rgb,\n    antialiased=False,\n    shade=True)\nax2.tick_params(axis='both',\n\
    \    labelsize=6)\nax2.view_init(30,15-90)\nax2.grid(False)\nfig.savefig('etopo1.png',dpi=300)\n\
    plt.show()\n```\n\n函数`LightSource()`用于从特定的方位角和仰角创建光源。我们使用`vert_exag`进行垂直夸张，以强调曲面图的垂直特征，并使用`blend_mode='hsv'`将颜色映射的数据值与光照强度相结合。然后使用`surface()`创建实际的曲面图，使用`shade()`创建的`rgb`对象作为`facecolors`。需要注意的是，`rstride`和`cstride`定义了用于渲染图形的ETOPO1的行数和列数。如果我们选择1（即全分辨率），渲染将非常耗时，因此我们应该使用更大的值（例如，如上所述的5）来对数据集进行垂直和水平重采样，以减少渲染时间。\n\
    \n我们还可以使用*PyGMT*包中的`makecpt()`、`Figure()`和`grdview()`，该包利用了*xarray*包：\n\n```python\n\
    ds = xr.DataArray(data=ETOPO1,\n    dims=['lat','lon'],\n    coords={'lat':lat,'lon':lon})\n\
    frame = ['xa1f0.25','ya1f0.25','wSEnZ']\npygmt.makecpt(\n    cmap='geo',\n   \
    \ series=f'-6000/4000/10',\n    continuous=True)\n\nfig = pygmt.Figure()\nfig.grdview(grid=ds,\n\
    \    perspective=[150,30],\n    frame=frame,\n    projection='M15c',\n    zsize='4c',\n\
    \    surftype='i',\n    plane='-6000+gazure',\n    shading=0)\nfig.basemap(\n\
    \    perspective=True,\n    rose='jTL+w3c+l+o-2c/-1c')\nfig.colorbar(perspective=True,\n\
    \    position='JMR+o2c/0c+w10c',\n    frame=['a2000'])\nfig.show()\n```\n\n此脚本首先使用`makecpt()`从*PyGMT*中选择适合高程数据的geo颜色映射表，因为此函数将陆地和海洋颜色分别与高程测量和水深测量相关联。然后，该函数使用`grdview()`显示实际的曲面图，并定义透视、框架和投影。我们使用`basemap()`添加一个指向地理北方的指北针，并使用`colorbar()`添加一个色标。\n\
    \n接下来，我们看一个ETOPO 2022地形模型（NOAA-NCEI 2022）的示例，其分辨率是上面使用的ETOPO1数据集（即1弧分，相当于60弧秒）的四倍（即15弧秒）（Amanete\
    \ and Eakins 2009）。与其前身一样，该数据集提供冰面和基岩两种版本，分别描绘覆盖格陵兰岛和南极洲的冰盖顶层及其下方的基岩。在上述网站上，我们点击*启动网格提取*以创建并下载来自ETOPO\
    \ 2022冰面和基岩版本的数据空间子集。在那里，我们点击*选择数据集...*下拉菜单以选择*ETOPO_2022（基岩；15弧秒）*。然后，我们点击*感兴趣区域*按钮以指定一个感兴趣区域，例如纬度*北：22*（即22°N）和*南：1*（即1°N），经度在*西：33*（即33°E）和*东：58*（即58°E）之间，覆盖了非洲东海岸。负纬度和负经度值分别分配给南半球和西半球。点击*下载数据*会打开一个新的浏览器窗口，我们可以从中将文件*exportImage.tiff*保存到硬盘。文件*exportImage.tiff*是一个GeoTIFF文件，其中包含嵌入在TIFF文件中的地理参考信息。我们可以通过输入以下命令检索此信息：\n\
    \n```python\nginfo = rasterio.open('exportImage.tiff')\n```\n\n这将生成数组*ginfo*，其中包含宽度、高度和边界等众多信息。输入\n\
    \n```python\nprint(ginfo.width)\nprint(ginfo.height)\nprint(ginfo.bounds)\n```\n\
    \n将得到\n\n```\n6000\n5040\nBoundingBox(left=33.0, bottom=1.0, right=58.0, top=22.0)\n\
    ```\n\n我们可以使用以下命令读取数字高程模型：\n\n```python\nA = ginfo.read()\n```\n\n我们可以通过输入以下命令使用*show()*显示数据：\n\
    \n```python\nfig = plt.figure()\nrasterio.plot.show(A,\n                  cmap=cm.terrain,\n\
    \                  vmin=0,vmax=4000)\nfig.savefig('etopo2.png',dpi=300)\nplt.show()\n\
    ```"
