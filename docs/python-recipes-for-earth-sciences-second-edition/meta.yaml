    \ that contain changes in the central tendency (e.g., mean, median, or mode) and\
    \ dispersion (e.g., range, variance, or quantiles) in the middle of the time series\
    \ (Fig. 5.35 and 5.36). The time axis runs from 0.1 to 500 kyr, at a sampling\
    \ interval of 0.1 kyr. At 250 kyr the mean of the normally distributed data changes\
    \ abruptly from 1.0 to 3.0, while the standard deviation remains unchanged (Fig.\
    \ 5.35 a):\n\n```python\nimport numpy as np\nimport matplotlib.pyplot as plt\n\
    from scipy import stats\n\nnp.random.seed(0)\nt=np.linspace(0.1,500,5000)\n\n\
    y1=0.1*np.random.normal(1,0.5,t.size)\ny2=0.1*np.random.normal(3,0.5,t.size)\n\
    \ny=y1\ny[int(np.size(t)/2):int(np.size(t))]=y2[int(np.size(t)/2):int(np.size(t))]\n\
    ```\n\n![](img/f6c4e7e52658f332a1ff43bb13764e42_237_0.png)\n\nFig. 5.36 Detecting\
    \ abrupt transitions in the measures of dispersion in a synthetic dust flux record\
    \ for the last 500 kyr. The data set comprises 5,000 data points and thus has\
    \ a temporal resolution of 0.1 kyr. a Synthetic data set of Gaussian-distributed\
    \ noise. After 250 kyr, the standard deviation of the data shifts toward a different\
    \ value. b Result of an Ansari–Bradley test for three different lengths of the\
    \ paired sliding windows (i.e., 300, 500 and 1,000 data points, equivalent to\
    \ 30, 50 and 100 kyr, respectively). The length of the window clearly influences\
    \ the amplitudes and widths of the test statistic maxima, whereas the location\
    \ of the transition in the standard deviation is well defined.\n\nWe first use\
    \ a Mann–Whitney test with paired sliding windows of three different lengths to\
    \ detect any abrupt changes in the median. We choose sliding window lengths of\
    \ 300, 500, and 1,000 data points. In other words, in each step, we apply the\
    \ Mann–Whitney test to two samples of 150 data points each, to two samples of\
    \ 250 data points each, and to two samples of 500 data points each. Note that\
    \ when running a Mann–Whitney test on different sets of data, the length of the\
    \ window needs to be adjusted to the length of the time series as well as to the\
    \ required accuracy with which the transition in the mean is to be identified:\n\
    \n```python\nw=np.array([300,500,1000])\n```\n\nWe use the function `ranksum`\
    \ introduced in Sect. 3.11 to perform the Mann–Whitney test (Fig. 5.35 a):\n\n\
    ```python\nmwreal=np.ones((np.size(w),np.size(t)))\n\nfor j in range(0,int(np.size(w))):\n\
    \    for i in range(int(w[j]/2),int(np.size(y)-w[j]/2)):\n        h,p=stats.ranksums(y[int(i-w[j]/2):int(i)],\n\
    \                           y[int(i+1):int(i+w[j]/2+1)])\n        mwreal[j,i]=p\n\
    \nmwreal=np.transpose(mwreal)\n```\n\nWe can compare the results in a single Figure\
    \ Window (Fig. 5.35):\n\n```python\nplt.figure()\nplt.axes(position=[0.1,0.5,0.8,0.3])\n\
    plt.plot(t,y)\nplt.axes(position=[0.1,0.1,0.8,0.3])\nplt.plot(t,np.log(mwreal))\n\
    plt.legend(['300','500','1000'])\nplt.show()\n```\n\nThe result of the Mann–Whitney\
    \ test reveals that the length of the window influences the amplitudes and widths\
    \ of the maxima of the test statistic, whereas the location of the transition\
    \ in the mean is well defined (Fig. 5.35 b).\n\nWe next use an Ansari–Bradley\
    \ test for the same three different lengths of paired sliding windows (i.e., 300,\
    \ 500, and 1,000 data points) to detect any abrupt changes in the standard deviation.\
    \ We use the function `ansaribradley` introduced in Sect. 3.12 to perform the\
    \ Ansari–Bradley test. The time axis runs from 0.1 to 500 kyr at sampling intervals\
    \ of 0.1 kyr. At 250 kyr, the standard deviation of the log-normally distributed\
    \ data changes abruptly from 0.5 to 1.3, while the mean changes from 1 to 1.5\
    \ (Fig. 5.36 a):\n\n```python\nnp.random.seed(0)\nt=np.linspace(0.1,500,5000)\n\
    \ny1=np.random.lognormal(1.5,1.3,t.size)\ny2=np.random.lognormal(1,0.5,t.size)\n\
    \ny=y1\ny[int(np.size(t)/2):int(np.size(t))]=y2[int(np.size(t)/2):int(np.size(t))]\n\
    ```\n\nWe now use the Ansari–Bradley test (Fig. 5.36 b):\n\n```python\nw=np.array([300,500,1000])\n\
    \nabreal=np.ones((np.size(w),np.size(t)))\n\nfor j in range(0,int(np.size(w))):\n\
    \    for i in range(int(w[j]/2),int(np.size(y)-w[j]/2)):\n        h,p=stats.ansari(y[int(i-w[j]/2):int(i)],\n\
    \                         y[int(i+1):int(i+w[j]/2+1)])\n        abreal[j,i]=p\n\
    abreal=np.transpose(abreal)\n```\n\nWe can compare the results in a single Figure\
    \ Window using (Fig. 5.36):\n\n```python\nplt.figure()\nplt.axes(position=[0.1,0.5,0.8,0.3])\n\
    plt.plot(t,y)\nplt.axes(position=[0.1,0.1,0.8,0.3])\nplt.plot(t,np.log(abreal))\n\
    plt.legend(['300','500','1000'])\nplt.show()\n```\n\nThe result of the Ansari–Bradley\
    \ test reveals that the length of the window influences the amplitudes and widths\
    \ of the maxima of the test statistic, whereas the location of the transition\
    \ in the standard deviation is well defined (Fig. 5.36 b).\n\n## 5.13 Describing\
    \ Gradual Transitions in Time Series\n\nDetecting, measuring and classifying transitions\
    \ in climate time series is one of the most important task in modern time series\
    \ analysis (Mudelsee 2000, Trauth et al. 2018, 2021b). We can statistically analyze\
    \ climate records for the amplitude, duration, and midpoint of a climate transition\
    \ using different methods. First, we fit a sigmoid function with m=4 parameters\
    \ a, b, c, and d\n\n$$x_{fit}(t) = a + \\frac{b}{1 + e^{-d(t-c)}}, \\text{ for\
    \ } -\\infty < t < +\\infty$$\n\nto the records $x_i$ with $1<i<n$ and n data\
    \ points using nonlinear least squares fitting. The sigmoid function (in its normalized\
    \ representation) is a monotonic s-shaped curve that is often referred to as a\
    \ smooth version of a step function. The sigmoid function is bounded by two horizontal\
    \ asymptotes $x_{fit}(t) \\rightarrow 0$ and 1 as $t \\rightarrow -\\infty$ and\
    \ $+\\infty$, respectively. It has a bell-shaped first derivative curve and exactly\
    \ one inflection point (parameter c), which can be interpreted as the midpoint\
    \ of the transition. Second, we statistically re-analyze these records and fit\
    \ a ramp function again with m=4 parameters $x_1$, $x_2$, $t_1$, and $t_2$\n\n\
    $$x_{fit}(t) = \\begin{cases} x_1, & \\text{for } t \\le t_1 \\\\ x_1 + (t - t_1)(x_2\
    \ - x_1)/(t_2 - t_1), & \\text{for } t_1 < t \\le t_2 \\\\ x_2, & \\text{for }\
    \ t > t_2 \\end{cases}$$\n\nto the n data points. The monotonic ramp-shaped curve\
    \ has two horizontal pieces and an inclined piece that are connected by two abrupt\
    \ changes of direction and that have a discontinuous first derivative.\n\nOur\
    \ example data set comprises 100 data points y for the period from t=0 to t=100,\
    \ with a linear transition from y=0 to y=1 and a midpoint at t=50. The linear\
    \ transition within the synthetic time series starts at t=46 and ends at t=55\
    \ and has a slope of 1/10 and a y-intercept of -4.5. The y-values of the synthetic\
    \ data sets are also superimposed with additive independent Gaussian noise with\
    \ a mean of 0 and a standard deviation of 0.1. Such a data set can be generated\
    \ with the following script:\n\n```python\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\nfrom scipy.optimize import curve_fit\nfrom numpy.random import default_rng\n\
    \nnp.random.seed(0)\ndata1=np.linspace(1,100,100)\ndata2=np.zeros(len(data1))\n\
    data2[45:54]=1/10*data1[45:54] - 4.5\ndata2[55:100]=1\ndata2=data2+0.1*np.random.normal(0,1,len(data2))\n\
    ```\n\nThe synthetic data sets are then analyzed using the function `curve_fit`.\
    \ We first fit a sigmoid function with four parameters a, b, c, and d\n\n```python\n\
    def func1(x,a,b,c,d):\n    return a+b*((1+np.exp(-d*(x-c)))**(-1))\n```\n\nbefore\
    \ we use `curve_fit` to find the best values for a, b, c, and d in a least squares\
    \ sense,\n\n```python\npopt1,pcov1=curve_fit(func1,data1,data2)\nprint(popt1)\n\
    ```\n\nwhich yields\n\n```\n[1.0061 -0.9890 51.5734 -0.3652]\n```\n\nNext, we\
    \ use the same function to fit a ramp function to the data. Since there is no\
    \ ready-to-use ramp function available, we type\n\n```python\ndef func2(x,t1,t2,x1,x2):\n\
    \    y=np.zeros(len(x))\n    for i in range(0,len(x)):\n        if x[i]<t1:\n\
    \            y[i]=x1\n```"
