    \    (len(x)*ofac), ((2*intv)**(-1))/\n    (len(x)*ofac))\n```\n\nwhere int is\
    \ the mean sampling interval. We can now compute the normalized Lomb–Scargle periodogram\
    \ px as a function of the angular frequency wrun by translating the equations\
    \ above for τ and P_x into Python code:\n\n```\npx=np.zeros(np.shape(f))\nfor\
    \ k in range(1,len(f)):\n    wrun=2*np.pi*f[k]\n    tau=(1/2*wrun)*math.atan2(sum(np.sin(2*wrun*t)),\n\
    \        sum(np.cos(2*wrun*t)))\n    px[k]=1/(2*np.var(x,ddof=1))* \\n       \
    \ ((sum(np.multiply((x-np.mean(x)),\n        np.cos(wrun*(t-tau)))))**2 /\n  \
    \      sum((np.cos(wrun*(t-tau)))**2) +\n        (sum(np.multiply((x-np.mean(x)),\n\
    \        np.sin(wrun*(t-tau)))))**2 /\n        sum((np.sin(wrun*(t-tau)))**2))\n\
