  md: '# 4.2 Correlation Coefficients


    We can compare the sensitivity of Pearson''s correlation coefficient with that
    of both Spearman''s correlation coefficient and Kendall''s correlation coefficient
    using `pearsonr()`, `spearmanr()`, and `kendalltau()` from the `stats` module
    of the `SciPy` package. In contrast to `corrcoef()`, these functions do not calculate
    correlation arrays (or matrices) that we can use later (e.g., in Chap. 9) when
    calculating correlations within multivariate data sets. We type.


    ```

    rp,rppvalue=stats.pearsonr(x,y)

    rs,rspvalue=stats.spearmanr(x,y)

    rk,rkpvalue=stats.kendalltau(x,y)

    print(rp)

    print(rs)

    print(rk)

    ```


    which yields


    ```

    0.9248815580753484

    -0.17298387096774195

    -0.12258064516129034

    ```


    We can observe that the alternative measures of correlation result in reasonable
    values, in contrast to the overestimated value for Pearson''s correlation coefficient,
    which mistakenly suggests a strong interdependency between the variables. Although
    outliers are easy to identify in a bivariate scatter, erroneous values can be
    easily overlooked in large multivariate data sets (Chap. 9).


    Various methods exist for calculating the significance of Pearson''s correlation
    coefficient. The function `pearsonr()` also includes the possibility of evaluating
    the quality of the result. The *p*-value is the probability of obtaining a correlation
    that is at least as large as the observed value when the true correlation is zero.
    If the *p*-value is small, then the correlation coefficient *r* is significant.
    Typing


    ```

    rp,rppvalue=stats.pearsonr(x,y)

    print(rp,rppvalue)

    ```


    yields


    ```

    0.9248815580753484 1.0489538147952255e-13

    ```


    In our example, the *p*-value `rppvalue` is close to zero, which suggests that
    the correlation coefficient is significant. We can conclude from this experiment
    that this particular significance test fails to detect correlations that can be
    attributed to an outlier. We can therefore next try an alternative *t*-test statistic
    to determine the significance of the correlation between *x* and *y*. According
    to this test, we can reject the null hypothesis, that is, that there is no correlation
    if the calculated *t* is larger than the critical *t* (*n*−2 degrees of freedom,
    *α*=0.05). Typing'
