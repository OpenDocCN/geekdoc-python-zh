    \ and 20 kyr, respectively. The plot shows the onset of the 40 kyr cycle at around\
    \ 450 kyr.](img/f6c4e7e52658f332a1ff43bb13764e42_200_0.png)\n\n## 5.8 Thomson’s\
    \ Multitaper Method\n\n*Thomson’s multitaper method* calculates the power spectrum\
    \ of the time series $x(t)$ with $n$ data points by averaging multiple tapered\
    \ periodograms (Thomson 1982, Percival and Walden 1993) (Sect. 5.4). A taper is\
    \ a window function $w(k)$, similar to the one used to suppress spectral leakage\
    \ (Sect. 5.5), which is multiplied element by element with the time series $x(t)$.\
    \ Averaging a large number of such tapered periodograms helps to increase the\
    \ signal-to-noise ratio of the spectrum and to suppress spectral leakage. Since\
    \ the window functions $w(k)$ used by Thomson’s multitaper method are pairwise\
    \ orthogonal, the tapered spectrum estimates are statistically independent, and\
    \ the averaged periodograms therefore represent an unbiased estimate of the true\
    \ spectrum. In his original publication, David J. Thomson used discrete prolate\
    \ spherical sequences as window functions $w(k)$ to treat both bias and smoothing\
    \ problems that had previously been found by David S. Slepian (Slepian 1978).\
    \ The method therefore has a similar goal to Welch’s method, which was introduced\
    \ in Sect. 5.5 in order to provide an unbiased estimate of the true spectrum with\
    \ an improved signal-to-noise ratio (SNR). In Welch’s method, the statistical\
    \ independence of the averaged spectra is achieved by calculating the spectra\
    \ from (possibly overlapping) segments of the time series. Thomson's multitaper\
    \ method instead averages the spectra of variants of the entire time series, which\
    \ were previously multiplied with pairwise orthogonal *Slepian* tapers.\n\nThe\
    \ first example below compares the calculation of a spectrum of a sinusoidal signal\
    \ without noise using Thomson's multitaper method on the one hand with the calculation\
    \ using Schuster's periodogram method on the other hand (Sect. 5.4). First, we\
    \ create a time axis t that runs from 1/Fs=2 to 500 in steps of 1/Fs=2 (i.e.,\
    \ the sampling frequency is Fs=2) and transpose it so that the elements of t appear\
    \ in a column instead of a row. We then compute a synthetic signal x by adding\
    \ three sine waves with periods τ₁=50 (f₁=0.02), τ₂=15 (f₂≈0.07), and τ₃=5 (f₃=0.2).\
    \ The corresponding amplitudes are A₁=2, A₂=1, and A₃=0.5:\n\n```python\nimport\
    \ numpy as np\nimport matplotlib.pyplot as plt\nfrom scipy import signal\n\nFs\
    \ = 2\nNs = 3\nt = np.linspace(1/Fs,500,500*Fs)\nt = np.transpose(t)\n\nnp.random.seed(0)\n\
    x = 2*np.sin(2*np.pi*t/50) + \\\n    np.sin(2*np.pi*t/15) + \\\n    0.5*np.sin(2*np.pi*t/5)\n\
    \nplt.figure()\nplt.plot(t,x)\nplt.axis([0,100,-4,4])\nplt.show()\n```\n\nWe can\
    \ calculate the power spectrum with Schuster's periodogram method by using `periodogram()`:\n\
    \n```python\nf,Pxx = signal.periodogram(x,fs = Fs,nfft = t.size)\n\nplt.figure()\n\
    plt.plot(f,Pxx)\nplt.axis([0,1,0,np.max(Pxx)])\nplt.show()\n```\n\nIn our example,\
    \ the periodogram is calculated for t.size frequencies but is reduced to half\
    \ due to the Nyquist criterion (Fig. 5.7). Next, we calculate Thomson's multitaper\
    \ power spectral density (PSD) estimate for t.size/2 frequencies using the time-half-bandwidth\
    \ product nw=4 in order to control the frequency resolution when computing a PSD\
    \ estimate using nseq=np.floor(2*nw-1)=7 slepian tapers as window functions. Increasing\
    \ nw reduces the frequency resolution but increases the signal-to-noise ratio,\
    \ as in the second example below, where the time series is overlaid with noise.\
    \ We first use dpss() to compute nseq=7 Slepian tapers, where the function's name\
    \ stands for discrete prolate spheroidal sequences. We next simply use the script\
    \ from Sects. 5.3 to calculate nseq=7 periodograms, which we then average in order\
    \ to calculate Thomson's multitaper PSD estimate Pxxmt:\n\n```python\nnw = 4\n\
    n = int(np.floor(2*nw-1))\ndps_seq = signal.windows.dpss(t.size,nw,n)\n\nfmt =\
    \ np.zeros((n,int(t.size/2 + 1)))\nPxxmt = np.zeros((n,int(t.size/2+1)))\nfor\
    \ i in range(0,n):\n    fmt[i,:],Pxxmt[i,:]=signal.periodogram(x,fs=Fs,\n    \
    \    window=dps_seq[i,:],nfft=t.size)\n\nfmt=np.mean(fmt,axis=0)\nPxxmt=np.mean(Pxxmt,axis=0)\n\
    \nplt.figure()\nplt.plot(fmt,Pxxmt)\nplt.axis([0,1,0,np.max(Pxxmt)])\nplt.show()\n\
    ```\n\nAs we can see, Thomson's multitaper PSD estimate is significantly smoother,\
    \ which results in the greater visibility of the maximum at f₂≈0.07.\n\nThe second\
    \ example below compares the calculation of a spectrum of a sinusoidal signal\
    \ with noise using Thomson's multitaper method on the one hand with that using\
    \ Schuster's periodogram method on the other hand (Sect. 5.4). First, we create\
    \ a time axis t that runs from 1/Fs=2 to 500 in steps of 1/Fs=2 (i.e., the sampling\
    \ frequency is Fs=2) and transpose it so that the elements of t appear in a column\
    \ instead of a row. We then compute a synthetic signal x by adding three sine\
    \ waves with periods τ₁=50 (f₁=0.02), τ₂=15 (f₂≈0.07), and τ₃=5 (f₃=0.2) and additive\
    \ Gaussian noise with the standard deviation Ns. The corresponding amplitudes\
    \ are A₁=2, A₂=1, and A₃=0.5, respectively:"
