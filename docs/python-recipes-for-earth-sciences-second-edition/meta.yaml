    ## 4 双变量统计


    ### 4.1 引言


    双变量分析用于更好地理解两个变量 $x$ 和 $y$ 之间的关系，例如化石的长度和宽度、火山玻璃的钠和钾含量，或沉积岩芯中的有机质含量。当两个变量在同一对象上测量时，$x$
    通常被确定为*自变量*，$y$ 被确定为*因变量*。如果两个变量都是在实验中产生的，那么实验者操纵的变量被描述为自变量。在某些情况下，两个变量都没有被操纵，因此都不是自变量。


    双变量统计用于描述两个变量之间关系的强度，可以使用单一指标，例如用于线性关系的皮尔逊相关系数，也可以使用通过回归分析得到的方程（图4.1）。描述变量 $x$
    和 $y$ 之间关系的方程可用于在用于回归分析的原始数据值范围内，从任意 $x$ 值预测 $y$ 响应。如果其中一个变量难以测量，这一点尤为重要。在这种情况下，首先通过在小型训练数据集上进行回归分析来确定两个变量之间的关系。然后，回归方程可用于计算第二个变量。


    本章首先在第4.2节介绍相关系数，然后在第4.3节和第4.9至4.10节解释广泛使用的线性和非线性回归分析方法。第4.4至4.8节还解释了几种用于评估回归分析中不确定性的附加方法。所有方法都通过合成示例进行说明，因为此类示例为评估最终结果提供了极好的手段。对于双变量分析，我们使用
    *NumPy* (https://numpy.org) 和 *Matplotlib* 包 (https://matplotlib.org)，以及 *SciPy*
    库 (https://scipy.org)，它们包含了所有必要的例程。


