    \ The script first evaluates whether A is less than B and–if it is–then displays\
    \ the message A is less than B in the Console. We can expand the if statement\
    \ by introducing else, which provides an alternative statement if the expression\
    \ is not true. For example, typing\n\n```\nA = 1\nB = 2\nif A < B:\n    print('A\
    \ is less than B')\nelse:\n    print('A is not less than B')\n```\n\nyields\n\n\
    ```\nA is less than B\n```\n\nAlternatively, we can use else together with a second\
    \ if statement to introduce a second expression to be evaluated, as shown in the\
    \ following example:\n\n```\nA = 1\nB = 2\nif A < B:\n    print('A is less than\
    \ B')\nelse:\n    if A >= B:\n        print('A is not less than B')\n```\n\nThese\
    \ for loops and if statements are extensively used in the subsequent chapters\
