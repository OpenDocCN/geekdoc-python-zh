- img_proc: true
  md: 'where $n_a$ and $n_b$ are the sample sizes and $s_a^2$ and $s_b^2$ are the
    variances of the two samples $a$ and $b$, respectively. The null hypothesis can
    be rejected if the measured $t$-value is higher than the critical $t$-value, which
    depends on the number of degrees of freedom $\Phi = n_a + n_b - 2$ and the significance
    level $\alpha$. The one-tailed test is used to test against the alternative hypothesis
    that the mean of the first sample is either smaller or larger than the mean of
    the second sample at a significance level of 5% (or 0.05). The one-tailed test
    would require modifying the equation above by replacing the absolute value of
    the difference between the means with the actual difference between the means.
    The two-tailed $t$-test is used when the means are not equal at a 5% significance
    level, that is, when it makes no difference which of the means is larger. In this
    case, the significance level is halved, that is, 2.5% is used to compute the critical
    $t$-value.


    We can now load two example data sets from two independent series of measurements.
