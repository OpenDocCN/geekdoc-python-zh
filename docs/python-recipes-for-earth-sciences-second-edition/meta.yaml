    # 3.6 Hypothesis Testing


    The following sections deal with methods used to draw conclusions from the statistical
    sample. These methods can then be applied to the larger population of interest
    (hypothesis testing) (Sects. 3.6 to 3.12). All hypothesis tests share the same
    concept and terminology. The null hypothesis is an assertion about the population
    that describes the absence of a statistically significant characteristic or effect,
    whereas an alternative hypothesis is a contrasting assertion. A hypothesis test
    can be performed as either a one-tailed (one-sided) or a two-tailed (two-sided)
    test (Fig. 3.13). The term tail stems from the concept of tailing off the data
    to the far left or far right of a probability density function, for instance,
    as in the standard normal distribution'
