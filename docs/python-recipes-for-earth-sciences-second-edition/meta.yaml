    ## 前言


    《地球科学Python食谱》一书旨在帮助本科生、研究生、博士生、博士后研究人员以及专业人士，快速解决地球科学中常见的数据分析问题。本书提供了最少的理论背景，并通过示例演示了所有描述方法的应用。本书基于我多年前编写的广受欢迎的《地球科学MATLAB食谱》一书，该书现已出版第6版（Springer
    2024）。这本新书的构想是，以W.H. Press、S.A. Teukolsky、W.T. Vetterling和B.P. Flannery所著经典《数值食谱》（剑桥大学出版社，2007年）的精神，将MATLAB书中的文本翻译成另一种日益流行的编程语言。


    本书包含Python脚本，可用于通过简单统计、时间序列分析、地统计学和图像处理来解决地球科学中的典型问题。它还演示了选定的高级数据分析技术的应用，如非线性时间序列分析、自适应滤波、自助法和地形分析。补充电子材料（可通过Springer
    Link在线获取）包括本书中的示例数据和Python命令。Python代码可以轻松修改，以用于读者自己的数据和项目。


    选择使用Python软件——它已有30多年历史——是因为它不仅为大多数数据分析方法提供了大量现成的算法，还允许修改和扩展现有程序，并能开发新软件。然而，在使用任何Python特定函数之前，大多数方法都使用非常简单的代码进行介绍。因此，使用Python替代品的读者也会发现本书的价值。


    为了从本书中获得最大收益，读者需要能够访问Python软件，并在阅读时能够执行这些食谱。Python食谱会在屏幕上生成各种图形，这些图形未在印刷版中显示。不过，这本教程式的书包含大量插图，因此即使不实际运行代码，也可以通读全文。


    在计算机上运行Python。我使用Python 3.8.8开发了这些食谱，但大多数食谱也适用于早期版本的软件，但不适用于Python 2。虽然参加数据分析课程的本科生可能希望通读全书，但经验更丰富的读者可能只选择参考某一特定方法来解决特定问题。因此，下文概述了本书的概念和各章内容，以便具有不同需求的读者更容易使用。


    - 第1章——本章介绍样本和总体的一些基本概念。它还将各种类型的数据以及可以使用这些数据回答的问题与后续章节中描述的方法联系起来。

    - 第2章——本章为地球科学家提供了Python的教程式入门。已经熟悉该软件的读者建议直接进入后续章节。

    - 第3章和第4章——这两章涵盖单变量和双变量统计的基础知识。它们包含统计学的基本概念，并介绍了高级主题，如重采样方案和交叉验证。已经熟悉基础统计学的读者可能希望跳过这些章节。

    - 第5章和第6章——希望处理时间序列的读者建议阅读这两章。时间序列分析和信号处理密切相关。在第二版中，第5章现在以关于傅里叶变换的新章节开始，随后是基于它的方法。后续章节（其中一些是多年前撰写的）已修订以形成教学序列。第5章还包括一个关于Thomson多锥度方法的新章节。

    - 第7章和第8章——我建议通读这两章，因为空间数据和图像的处理方法有很多共同之处。此外，在地球科学中，空间数据和图像经常结合使用，例如，将卫星图像投影到数字高程模型上。第7章已更新，例如，考虑了用于数字地形模型的数据集的变化，如分辨率为15弧秒的新ETOPO
    2022。关于网格化和等值线的第7.6节和第7.7节已修订和更新。第8章现在包含一个关于从图像中去除周期性噪声的章节，以及一个扩展的关于量化显微图像中木炭的章节。第8.13节在本书Python版本的前一版中不存在，现已添加。

    - 第9章——地球科学中的数据集通常具有许多变量和许多数据点。多元方法应用于各种大型数据集，包括卫星图像数据。任何对多元方法特别感兴趣的读者，建议在进入本章之前先阅读第3章和第4章。关于主成分分析的第9.2节和关于对数比变换的第9.7节也已更新和扩展。

    - 第10章——分析圆形和球形数据的方法在地球科学中广泛使用。例如，构造地质学家测量和分析'
