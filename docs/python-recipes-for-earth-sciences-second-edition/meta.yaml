    +   - *sample size* – As in any statistical procedure, the largest possible sample
    is required in order to obtain a reliable estimate. For variography, the number
    of samples should be greater than 100 (and ideally, greater than 150) (Webster
    and Oliver 2007). For smaller sample numbers, a maximum likelihood variogram should
    be computed (Pardo-Igúzquiza and Dowd 1997).

    - *sampling design* – In order to obtain a good estimation close to the origin
    of the variogram, the sampling design should include observations over small distances.
    This can be achieved by means of a nested design (Webster and Oliver 2007). Other
    possible designs have been evaluated by Olea (1984).

    - *anisotropy* – Thus far, we have assumed that the structure of spatial correlation
    is independent of direction. We have calculated *omnidirectional variograms* while
    ignoring the direction of the separation vector *h*. In a more thorough analysis,
    the variogram should be discretized not only in distance, but also in direction
    (directional bins). By plotting *directional variograms* (usually in four directions),
    we are sometimes able to observe different ranges (*geometric anisotropy*), different
    scales (*zonal anisotropy*), and different shapes (which indicate a trend). Treating
    anisotropy requires a highly interactive graphical user interface, which lies
    beyond the scope of the present book (see the VarioWin software by Pannatier 1996).'
