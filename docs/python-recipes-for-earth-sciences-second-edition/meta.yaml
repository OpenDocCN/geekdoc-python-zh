    is not invertible. Since this system yields equal responses for different input
    signals, such as y=4 for input x=-2 and x=+2, the input x cannot be reconstructed
    from the output y. A similar situation can also occur in linear systems, such
    as


    ```

    x=np.linspace(1,100,100)

    y=np.zeros(x.shape)


    plt.figure()

    plt.plot(x,y)

