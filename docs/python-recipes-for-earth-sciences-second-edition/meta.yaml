- md: "## 7.3.2 变异函数估计量\n\n变异函数估计量由实验变异函数推导而来，用于概括其集中趋势（类似于从单变量观测中推导的描述性统计量，见第3.2节）。经典的变异函数估计量是\n\
    \n![](img/f6c4e7e52658f332a1ff43bb13764e42_339_0.png)\n\n在特定距离类别（或区间）内平均的经验变异函数，这些类别由滞后间隔的倍数定义。分离距离的分类如图7.19所示。变异函数估计量通过以下公式计算：\n\
    \n$$\\gamma_E(h) = \\frac{1}{2 * N(h)} \\cdot \\sum_{i=1}^{N(h)} (z_{x_i} - z_{x_{i+h}})^2$$\n\
    \n其中 $N(h)$ 是滞后间隔 $h$ 内的点对数量。\n\n我们首先需要确定一个合适的滞后间隔 $h$。如果采样是在规则网格上进行的，则可以使用网格单元的长度。如果样本间距不均匀（如本例），则点对的平均最小分离距离是滞后间隔的一个良好起点（Webster\
    \ and Oliver 2007）。为了计算点对之间的平均最小分离距离，我们需要将滞后数组 D 对角线上的零替换为 NaN；否则，平均最小分离距离将为零。输入\n\
    \n```python\nD2 = D*(np.diag(x*np.nan)+1)\nD2m = np.zeros(len(D2))\n```\n\n![](img/f6c4e7e52658f332a1ff43bb13764e42_340_0.png)\n\
    \n图7.19 等间距观测的分离距离分类。滞后间隔为 $h_1$，而 $h_2, h_3$ 等是滞后间隔的倍数。\n\n```python\nfor i in\
    \ range(0,len(D2)):\n    D2m[i] = np.nanmin(D2[i])\nlag = np.mean(D2m)\nprint(lag)\n\
    ```\n\n得到\n\n```\n8.010698943460342\n```\n\n由于估计的变异函数值随着分离距离的增加而变得更加不稳定，因此在计算中设置最大分离距离限制非常重要。根据经验法则，最大分离距离的一半是变异分析的合适限制。我们通过输入以下代码获得半最大距离和最大滞后数：\n\
    \n```python\nhmd = np.max(D)/2\nmax_lags = int(np.floor(hmd/lag))\nprint(hmd)\n\
    print(max_lags)\n```\n\n得到\n\n```\n130.19008189950569\n16\n```\n\n然后，通过输入以下代码对分离距离进行分类并计算经典变异函数估计量：\n\
    \n```python\nLAGS = np.ceil(D2/lag)\n\nDE = np.zeros(max_lags)\nPN = np.zeros(max_lags)\n\
    GE = np.zeros(max_lags)\n\nfor i in range(1,max_lags+1):\n    SEL = (LAGS == i)\n\
    \    DE[i-1] = np.mean(D[SEL])\n    PN[i-1] = np.sum(SEL)/2\n    GE[i-1] = np.mean(G[SEL])\n\
    ```\n\n其中 SEL 是由 LAG 中的滞后类别定义的选择数组，DE 是平均滞后距离，PN 是点对数量，GE 是变异函数估计量。我们现在可以通过输入以下代码绘制经典变异函数估计量（即变异函数与平均分离距离的关系图）以及总体方差：\n\
    \n```python\nplt.figure()\nplt.plot(DE,GE,\n    marker='o',\n    markerfacecolor\
    \ = [0.6,0.6,0.6],\n    linestyle='none')\n\nvar_z = np.var(z,ddof=1)\nxl = np.max(DE)*1.1\n\
    yl = 1.1*max(GE)\nb = np.array([0,xl])\nc = np.array([var_z,var_z])\n\nplt.plot(b,c,'r--')\n\
    plt.axis(np.array([0,xl,0,yl]))\nplt.xlabel('Averaged distance between observations')\n\
    plt.ylabel('Averaged semivariance')\nplt.show()\n```\n\n图7.20中的变异函数表现出典型的模式。在小分离距离（靠近原点）处值较低，然后随着距离增加而增加，直到达到一个接近总体方差的平台（*基台值*）。这些结果表明，空间过程在短距离上相关，但在长距离上不相关。空间依赖性的范围称为*变程*，定义为变异函数达到基台值时的分离距离。\n\
    \n*变异函数模型*是拟合到变异函数估计量的参数曲线。这类似于频率分布拟合（见第3.13节），其中频率分布由分布类型及其参数（例如，具有均值和方差的正态分布）建模。出于理论原因，只有\n\
    \n![](img/f6c4e7e52658f332a1ff43bb13764e42_342_0.png)\n\n具有特定性质的函数才应被用作变异函数模型。常见的*授权模型*有球状模型，\n\
    \n$$\\gamma_{sph}(h) = \\begin{cases} c \\cdot \\left(1.5 \\cdot \\frac{h}{a}\
    \ - 0.5 \\left(\\frac{h}{a}\\right)^3\\right), & \\text{for } 0 \\leq h \\leq\
    \ a \\\\ c, & \\text{for } h > a \\end{cases}$$\n\n指数模型，\n\n$$\\gamma_{exp}(h)\
    \ = c \\cdot \\left(1 - \\exp\\left(-3 \\cdot \\frac{h}{a}\\right)\\right)$$\n\
    \n以及线性模型，\n\n$$\\gamma_{lin}(h) = b \\cdot h$$\n\n其中 $c$ 是基台值，$a$ 是变程，$b$ 是斜率（对于线性模型）。更多模型可以在相关已发表的文献中找到。如果将变异函数模型拟合到变异函数估计量，则必须调整参数\
    \ $c$ 以及 $a$ 或 $b$。\n\n*块金效应*是一种特殊的变异函数模型。在实践中，当将变异函数外推到零分离距离时，我们经常在y轴上观察到一个正截距。这被称为块金效应，是由测量误差以及由于采样间隔过大而未被捕获的小尺度波动（*块金*）引起的。我们有时会根据实验室重复测量的方差或其他先验知识对最小块金效应有所预期。关于块金效应的更多细节可以在\
    \ Cressie (1990, 1993) 和 Kitanidis (1997) 中找到。如果存在块金效应，可以将其添加到变异函数模型中。带有块金效应的指数模型如下所示：\n\
    \n$$\\gamma_{exp+nug}(h) = c_0 + c \\cdot \\left( 1 - \\exp\\left(-3 \\cdot \\\
    frac{h}{a}\\right) \\right)$$\n\n其中 $c_0$ 是块金效应。\n\n我们甚至可以组合变异函数模型（例如，两个具有不同变程和基台值的球状模型）。这些组合称为*嵌套模型*。在变异函数建模过程中，嵌套模型的组成部分被视为空间结构，应解释为地质过程的结果。在讨论变异函数建模的进一步方面之前，我们首先将一些模型拟合到我们的数据。我们从一个没有块金效应的球状模型开始，然后添加一个指数模型和一个线性模型，两者都带有块金方差：\n\
    \n```python\nplt.figure()\nplt.plot(DE,GE,\n    marker='o',\n    markerfacecolor\
    \ = [0.6,0.6,0.6],\n    linestyle='none')\nvar_z = np.var(z,ddof=1)\nxl = np.max(DE)*1.1\n\
    yl = 1.1*max(GE)\nb = np.array([0, xl])\nc = np.array([var_z,var_z])\nplt.plot(b,c,'r--')\n\
    plt.axis(np.array([0,xl,0,yl]))\nplt.xlabel('Averaged distance between observations')\n\
    plt.ylabel('Averaged semivariance')\n\nnugget = 0\nsill = 0.803\nrang = 45.9\n\
    lags = np.arange(0,max(DE),1)\nGsph = nugget + (sill*(1.5*lags/rang - \\\n   \
    \ 0.5*(lags/rang)**3)*(lags<=rang) + \\\n    sill*(lags>rang))\n```"
