- md: "## Signal Processing\n\n### 6.1 Introduction\n\nSignal processing involves\
    \ techniques for manipulating a signal in order to minimize the effects of noise,\
    \ to correct all kinds of unwanted distortions, and to separate out various components\
    \ of interest. Most signal processing algorithms include the design and realization\
    \ of filters. A *filter* can be described as a system that transforms signals.\
    \ *System theory* provides the mathematical background for filter design and realization.\
    \ A filter has an input and an output, with the *output signal y(t)* being modified\
    \ with respect to the *input signal x(t)* (Fig. 6.1). The *signal transformation*\
    \ can be carried out through a mathematical process known as *convolution* or–if\
    \ filters are involved–as *filtering*.\n\nThis chapter deals with the design and\
    \ realization of *digital filters* with the help of a computer. However, many\
    \ natural processes resemble *analog filters* that record natural events in geological\
    \ archives. A single rainfall event is not documented in lake sediments because\
    \ the short duration and low-amplitude signal of the event in the sediments (e.g.,\
    \ a short-term change in the chemical composition of the sediments) are strongly\
    \ attenuated in the well-mixed water body before they are archived in the sediments.\
    \ Bioturbation also introduces serious signal distortions (e.g., changes in the\
    \ amplitude and phase of the signal), such as in deep sea sediments, where it\
    \ leads to apparent phase shifts in the oxygen isotope signal of individual foraminifera\
    \ species (e.g., Trauth 2013). In addition to such natural filters, the field\
    \ collection and sampling of geological data alters and smooths the data with\
    \ respect to its original form. For example, a finite sized sediment sample is\
    \ integrated over a certain period of time, which smooths the natural signal.\n\
