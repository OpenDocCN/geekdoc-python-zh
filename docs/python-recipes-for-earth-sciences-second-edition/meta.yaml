    # 5.3 Fourier Transforms FT, DFT and FFT


    The *Fourier Series* (FS) helps to decompose periodic functions into a sum of
    sinusoids (Fourier 1807, 1822). The *Fourier transform* (FT) is an extension of
    the Fourier series that is used to decompose non-periodic functions into sinusoids.
    The FT uses *Euler''s formula*, named after Swiss mathematician Leonard Euler,
    which provides a relationship between trigonometric functions (i.e., sine and
    cosine functions) and the complex exponential function


    $$e^{i\omega} = \cos(\omega) + i \cdot \sin(\omega)$$


    where $\omega$ is the frequency in radians, with $\omega=2\pi f$ (Fig. 5.4). If
    $x(t)$ represents a continuous function of time, such as the periodically changing
    solar radiation in one place on Earth, then the complex-valued Fourier transform
    $X$ as a function of the frequency $f$ is


    $$X(f) = \int_{-\infty}^{\infty} x(t)e^{i2\pi ft} dt$$


    This notation is preferred over trigonometric notation simply because it is much
    more compact and can be easily calculated using the Euler representation (Muller
    and MacDonald 2000). The spectral power $P$ is then defined as the square of the
    Fourier amplitude $X(f)$:


    $$P(f) = |X(f)|^2$$


    Real data $x$ are never continuous in time; instead, they are sampled at certain
    times $t_k$. Furthermore, the data $x(t_k)$ are only available in a limited interval,
    that is, between $t_0$ and $t_{M-1}$. The *discrete Fourier transform* (DFT) –as
    opposed to the continuous Fourier transform (FT)–converts such a time series $x(t_k)$
    into a discrete Fourier (or frequency) series $X(f_k)$:


    $$X(f_k) = \sum_{k=0}^{n-1} x(t_k)e^{2\pi i f_k / f_s}$$


    The *fast Fourier transform* (FFT) was introduced by Cooley and Tukey (1965).
    It is a numerical algorithm that reduces the number of operations, essentially,
    $n$


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_166_0.png)'
  - '[PAGE 167]


    complex multiplications and $n-1$ additions--in order to calculate the DFT of
    a time series $x(t)$ with $2n$ data points from $n^2$ to $n \log(n)$, where $n$
    must be a power of two. This reduction is achieved by splitting the time series
    $x(t)$ with $2n$ data points into two time series with only $n$ data points, the
    calculation of which requires only one fourth of the operations. This splitting
    and calculation of the DFT can be repeated several times, which further reduces
    the number of operations and thus also the computing time of the FFT.


    One of the most common effects of sampling is aliasing (Fig. 5.5). This term refers
    to the misinterpretation of a sine wave with a frequency $f$, which is higher
    than the sampling frequency $f_s$, as a sine wave with an alias frequency $f_a$,
    which is lower than the sampling frequency. We can calculate $f_a$ using


    $$f_a = |f - f_s \cdot \text{round}(f/f_s)|$$


    where round stands for rounding to the nearest integer. The effect of aliasing
    can be avoided by applying the Nyquist–Shannon sampling theorem, according to
    which the sampling frequency $f_s$ must be at least twice the frequency of interest
    (Whittaker 1915; Shannon 1948). Spectral representations of signals are therefore
    shown at half the sampling frequency ($f_s/2$) (i.e., the Nyquist frequency $f_{Nyq}$)
    (Whittaker 1915; Shannon 1948).


    The following Python example illustrates the analogy between the Euler function
    and trigonometric functions as well as the use of the fast Fourier transform to
    calculate the Fourier spectrum of a periodic signal both with and without noise.
    Note that the following script uses $\mathbf{j}$ as the imaginary unit. We should
    therefore not use it as a loop counter in a for loop. Furthermore, it is recommended
    that $1\mathbf{j}$ be used instead of just $\mathbf{j}$ for robustness. We first
    define the noise level Ns (i.e., the standard deviation of the Gaussian noise)
    and the sampling frequency Fs, and we then create a time axis t by typing


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_167_0.png)


    **Fig. 5.5** Graphical illustration of the aliasing effect. If a signal with a
    frequency $f$ of 0.5 (blue line) is sampled with a low sampling frequency $f_s=0.3125$
    (red stems and circles), a signal with a lower aliasing frequency $f_a$ of 0.125
    is produced (yellow line) (modified from Trauth 2021b).'
