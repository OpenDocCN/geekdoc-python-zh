    \n我们关注的是元素1a和元素1b，它们对沉积物有贡献，并被元素1c稀释。我们简单地创建三个变量，每个变量具有一个特征但不同的周期，周期分别为2、5和20。正弦变量元素1a和元素1b（以毫克为单位）的振幅为1，而稀释变量元素1c的振幅为2。这些变量以0.1的间隔在0.1到20的周期内采样，产生一个包含200个值的时间序列。我们为元素1a、元素1b和元素1c各添加5毫克，确保所有绝对值都大于0，这在成分数据中不会出现（图9.10\
    \ a）：\n\n```python\nt = np.linspace(0.1,20,200)\nt = np.transpose(t)\n\nelement1a\
    \ = np.sin(2*np.pi*t/2) + 5\nelement1b = np.sin(2*np.pi*t/5) + 5\nelement1c =\
    \ 2*np.sin(2*np.pi*t/20) + 5\n\nplt.figure()\nplt.plot(t,element1a,\n    color=colors[0,:])\n\
    plt.plot(t,element1b,\n    color=colors[1,:])\nplt.plot(t,element1c,\n    color=colors[3,:])\n\
    plt.legend(['1a','1b','1c'])\nplt.title('Absolute Amount of 1a-c (mg)')\nplt.show()\n\
    ```\n\n我们计算元素1a、元素1b和元素1c的百分比（即，我们创建单个元素浓度与所有元素浓度总和的比值）。这个过程创建了封闭数据（即，数据现在表示为比例，并加到固定的100%总和）：element1a+element1b+element1c=100%。元素1a和元素1b现在都受到元素1c引起的稀释的影响。这些元素显示出一个主要的正弦长期趋势，但这并非真实情况（如第一幅图所示）（图9.10\
    \ b）：\n\n```python\nelement1a_perc = element1a/(element1a+element1b+element1c)\n\
    element1b_perc = element1b/(element1a+element1b+element1c)\nelement1c_perc = element1c/(element1a+element1b+element1c)\n\
    ```\n\n```python\nplt.figure()\nplt.plot(t,element1a_perc,\n    color=colors[0,:])\n\
    plt.plot(t,element1b_perc,\n    color=colors[1,:])\nplt.plot(t,element1c_perc,\n\
    \    color=colors[3,:])\nplt.legend(['1a','1b','1c'])\nplt.title('Relative Concentration\
    \ of 1a-c (%)')\nplt.show()\n```\n\n我们现在建立了元素1a/元素1b和元素1b/元素1a之间的比值，两者都独立于元素1c。注意符号的变化和振幅的差异。元素1a/元素1b和元素1b/元素1a的比值没有显示出任何由元素1c稀释效应引起的趋势证据。然而，这两条曲线并不相同（即，元素1a/元素1b和元素1b/元素1a不对称）（参见Weltje和Tjallingii\
