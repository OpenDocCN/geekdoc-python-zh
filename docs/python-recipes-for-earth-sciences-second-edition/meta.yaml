  md: '8.2 Data Storage


    349


    Compared with the 1 bit and 8 bit representations of raster data, 24 bit storage
    certainly requires much more computer memory. In the case of very large data sets,
    such as satellite images and digital elevation models, a user should therefore
    think carefully about the most suitable way of storing the data. The default floating
    point data type in Python is the 64 bit array, which allows for storing the sign
    of a number (bit 63), the exponent (bits 62 to 52), and roughly 16 significant
    decimal digits between approximately 10^-308 and 10^+308 (bits 51 to 0). However,
    Python also works with other data types (e.g., 1 bit, 8 bit, and 24 bit raster
    data) in order to save memory space.


    The amount of memory required for storing a raster image depends on the data type
    and the dimensions of the image. These image dimensions can be described by the
    number of pixels, which is the number of rows multiplied by the number of columns
    of the 2D array. Let us assume an image of 729 by 713 pixels, such as the one
    we use in the following section. If each pixel needs 8 bits to store a grayscale
    value, the memory required by the data is 729·713·8=4,158,216 bits (or 519,777
    bytes). This number is exactly what we obtain by typing whos in the Command Window.
    Common prefixes for bytes include kilo, mega, giga, and so forth:


    ```

    bit = 1 or 0 (b)

    8 bits = 1 byte (B)

    1024 bytes = 1 kilobyte (kB)

    1024 kilobytes = 1 megabyte (MB)

    1024 megabytes = 1 gigabyte (GB)

    1024 gigabytes = 1 terabyte (TB)

    ```


    Note that in data communication, 1 kilobit=1000 bits, while in data storage, 1
    kilobyte=1024 bytes. A 24 bit image (known as true color image) then requires
    three times the memory needed to store an 8 bit image, or 1,559,331 bytes=1,559,331/1,024
    kilobytes (kB)≈1523 kB≈1,559,331/1024²=1.487 megabytes (MB).


    However, the dimensions of an image are often given not by the total number of
    pixels, but by the length and height of the image as well as by its resolution.
    The resolution of an image is the number of pixels per inch (ppi) or dots per
    inch (dpi) it contains. The standard resolution of a computer display remained
    at 72 dpi for a long time, but modern displays have a higher resolution, such
    as 96 dpi or even higher. In fact, the 5K display (on which this very sentence
    is being written) has~218 dpi. Thus, a 17 inch display with a 72 dpi resolution
    displays 1024 by 768 pixels. If the display is used for images of a different
    (lower or higher) resolution, the image is resampled in order to match the display''s
    resolution. For scanning and printing, a resolution of 300 or 600 dpi is enough
    in most applications. However, scanned images are often scaled for large printouts
    and therefore often have higher resolutions, such as 2400 dpi. The image used
    in the next section has a width of 25.2 cm (or 9.92 inches) and a height of 25.7
    cm (or 10.12 inches). The resolution of the image is 72 dpi. The total number
    of pixels is therefore'
