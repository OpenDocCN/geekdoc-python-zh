    \n## 5.3 傅里叶变换 FT、DFT 和 FFT\n\n*傅里叶级数* (FS) 有助于将周期函数分解为正弦函数之和 (Fourier 1807, 1822)。*傅里叶变换*\
    \ (FT) 是傅里叶级数的扩展，用于将非周期函数分解为正弦函数。FT 使用*欧拉公式*，该公式以瑞士数学家莱昂哈德·欧拉的名字命名，它提供了三角函数（即正弦和余弦函数）与复指数函数之间的关系\n\
    \n$$e^{i\\omega} = \\cos(\\omega) + i \\cdot \\sin(\\omega)$$\n\n其中 $\\omega$\
    \ 是以弧度为单位的频率，$\\omega=2\\pi f$（图 5.4）。如果 $x(t)$ 表示时间的连续函数，例如地球上某地周期性变化的太阳辐射，那么作为频率\
    \ $f$ 函数的复值傅里叶变换 $X$ 为\n\n$$X(f) = \\int_{-\\infty}^{\\infty} x(t)e^{i2\\pi ft}\
    \ dt$$\n\n这种表示法优于三角表示法，仅仅因为它更紧凑，并且可以使用欧拉表示法轻松计算 (Muller and MacDonald 2000)。谱功率\
    \ $P$ 被定义为傅里叶振幅 $X(f)$ 的平方：\n\n$$P(f) = |X(f)|^2$$\n\n真实数据 $x$ 在时间上从来不是连续的；相反，它们是在特定时间\
    \ $t_k$ 采样的。此外，数据 $x(t_k)$ 仅在有限区间内可用，即在 $t_0$ 和 $t_{M-1}$ 之间。*离散傅里叶变换* (DFT) ——与连续傅里叶变换\
    \ (FT) 相对——将这样的时间序列 $x(t_k)$ 转换为离散傅里叶（或频率）级数 $X(f_k)$：\n\n$$X(f_k) = \\sum_{k=0}^{n-1}\
    \ x(t_k)e^{2\\pi i f_k / f_s}$$\n\n*快速傅里叶变换* (FFT) 由 Cooley 和 Tukey (1965) 引入。它是一种数值算法，通过将具有\
    \ $2n$ 个数据点的时间序列 $x(t)$ 分割成两个仅具有 $n$ 个数据点的时间序列，将计算 DFT 所需的操作数（本质上是 $n$ 次复数乘法和\
    \ $n-1$ 次加法）从 $n^2$ 减少到 $n \\log(n)$，其中 $n$ 必须是 2 的幂。这种分割和 DFT 的计算可以重复多次，从而进一步减少操作数，进而减少\
    \ FFT 的计算时间。\n\n采样最常见的效应之一是混叠（图 5.5）。这个术语指的是将频率 $f$ 高于采样频率 $f_s$ 的正弦波误解为频率 $f_a$\
    \ 低于采样频率的混叠频率正弦波。我们可以使用以下公式计算 $f_a$\n\n$$f_a = |f - f_s \\cdot \\text{round}(f/f_s)|$$\n\
    \n其中 round 表示四舍五入到最接近的整数。可以通过应用奈奎斯特-香农采样定理来避免混叠效应，根据该定理，采样频率 $f_s$ 必须至少是感兴趣频率的两倍\
    \ (Whittaker 1915; Shannon 1948)。因此，信号的频谱表示显示在采样频率的一半处（$f_s/2$）（即奈奎斯特频率 $f_{Nyq}$）(Whittaker\
    \ 1915; Shannon 1948)。\n\n以下 Python 示例说明了欧拉函数与三角函数之间的类比，以及使用快速傅里叶变换计算有噪声和无噪声周期信号的傅里叶频谱。请注意，以下脚本使用\
    \ $\\mathbf{j}$ 作为虚数单位。因此，我们不应在 for 循环中将其用作循环计数器。此外，为了稳健性，建议使用 $1\\mathbf{j}$\
    \ 而不仅仅是 $\\mathbf{j}$。我们首先定义噪声水平 Ns（即高斯噪声的标准差）和采样频率 Fs，然后通过输入以下内容创建时间轴 t\n\n![](img/f6c4e7e52658f332a1ff43bb13764e42_167_0.png)\n\
    \n**图 5.5** 混叠效应的图示说明。如果频率 $f$ 为 0.5 的信号（蓝线）以较低的采样频率 $f_s=0.3125$（红色茎线和圆圈）进行采样，则会产生频率\
    \ $f_a$ 为 0.125 的较低混叠频率信号（黄线）（修改自 Trauth 2021b）。"
