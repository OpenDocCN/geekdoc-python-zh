    # 2.9 Basic Visualization Tools


    The *Matplotlib* package provides numerous Python routines for displaying data
    as graphics. This section introduces the most important graphics functions. The
    graphics can be modified, printed, and exported for editing with graphics software
    other than Python. The simplest function that produces a graph of a variable y
    versus another variable x is `plot()`. First, we define two one-dimensional arrays
    x and y, where y is the sine of x. Array x contains 21 values between 0 and 2π
    with π/10 increments, whereas y is the element by element sine of x:


    ```

    import numpy as np

    import matplotlib.pyplot as plt


    x = np.linspace(0, 2*np.pi, 21)

    y = np.sin(x)

    ```


    These two commands result in two arrays with 21 elements each. Since the two arrays
    x and y have the same length, we can use `plot()` to produce a linear 2D graph
    of y against x, as shown below:'
  - '[PAGE 63]


    ```

    plt.plot(x,y)

    ```


    However, the most general way of plotting is to first create a figure window using
    `figure()`, to then use `plot()` to initiate plotting, and to finally display
    the actual graphic using `show()`. In particular, if we display subplots or multiple
    graphics objects, we need `show()` to see the graphic:


    ```

    plt.figure()

    plt.plot(x,y)

    plt.show()

    ```


    We may wish to plot two different curves in a single plot, such as the sine and
    the cosine of x in different colors. The command


    ```

    x = np.linspace(0,2*np.pi,21)

    y1 = np.sin(x)

    y2 = np.cos(x)


    plt.figure()

    plt.plot(x,y1,''--'',x,y2,''-'')

    plt.show()

    ```


    creates a dashed blue line that displays the sine of x and a solid orange line
    that represents the cosine of this array (Fig.2.4). If we wish to create plots
    in separate windows, we again use `figure()` to create a new window that displays
    the cosine of x after displaying the sine of x:


    ```

    plt.figure()

    plt.plot(x,y1,''--'')

    plt.show()


    plt.figure()

    plt.plot(x,y2,''-'')

    plt.show()

    ```


    We can also display the sine of x as a line plot and the cosine of x as a bar
    plot using


    ```

    plt.figure()

    plt.plot(x,y1,''r--'')

    plt.bar(x,y2,color=''b'')

    plt.show()

    ```


    This command plots y1 versus x as a dashed red line using ''r--'', whereas y2
    versus x is shown as a group of blue vertical bars. Alternatively, we can plot
