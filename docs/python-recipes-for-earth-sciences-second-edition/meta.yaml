    \ `coeffs=coef_` and `interc=intercept_`. Both coefficients of course match (almost)\
    \ exactly with the original coefficients of the synthetic data since we have no\
    \ noise. Because we have only three variables, we can display the results in a\
    \ three-dimensional plot. We begin by creating a rectangular grid for the first\
    \ two variables `var1` and `var2` using `meshgrid()`, and we next calculate the\
    \ predicted values for the third variable `var3` using `coeffs` and `interc`.\
    \ We then use `plot_surface()` to display the linear regression plane of the model,\
    \ and we use `plot()` to plot the measurements as red points with a marker size\
    \ of 30 points:\n\n```\nvar1 = np.linspace(0.20,0.45,26)\nvar2 = np.linspace(0.17,0.23,7)\n\
    Var1,Var2 = np.meshgrid(var1,var2)\nVar3 = interc + coeffs[0]*Var1 + coeffs[1]*Var2\n\
    \nfig, ax = plt.subplots(subplot_kw={\"projection\": \"3d\"})\nax.plot_surface(Var1,Var2,Var3,\n\
    \    rstride=1, cstride=1,\n    linewidth=0,\n    alpha=0.3,\n    antialiased=True,\n\
    \    shade=True)\nfor i in range(0,len(data)):\n    plt.plot(data[i,0],data[i,1],data[i,2],\n\
    \        marker='o',\n        color=(0.1,0.3,0.8))\nax.view_init(30,70-90)\nplt.show()\n\
    ```\n\nSince the data set is noise-free, the data points all lie on the linear\
    \ regression plane. This changes if we introduce normally distributed noise with\
    \ a standard deviation of 2.4:"
