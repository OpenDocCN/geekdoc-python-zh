    ```\n\nWe may wish to plot two different curves in a single plot, such as the\
    \ sine and the cosine of `x` in different colors. The command\n\n```python\nx\
    \ = np.linspace(0, 2 * np.pi, 21)\ny1 = np.sin(x)\ny2 = np.cos(x)\n\nplt.figure()\n\
    plt.plot(x, y1, '--', x, y2, '-')\nplt.show()\n```\n\ncreates a dashed blue line\
    \ that displays the sine of `x` and a solid orange line that represents the cosine\
    \ of this array (Fig. 2.4). If we wish to create plots in separate windows, we\
