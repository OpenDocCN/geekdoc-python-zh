    plt.ylabel(''Autocorrelation'')

    plt.show()

    ```


    We then use `rfft()` to compute the discrete Fourier transform (DFT) of the full
    autocorrelation series corrxx, the power spectral density Pxx, and the corresponding
    frequency axis f using the code from Sect. 5.3:


    ```

