    # 5.4 Schuster''s Periodogram Method


    The periodogram was the first method of numerical spectral analysis. It was invented
    by Arthur Schuster (1851 to 1934) for studying magnetic storms, climates, and
    other phenomena (Schuster 1898). Although better methods exist, it remains very
    popular in climate time series analysis applications, partly because its statistical
    properties are very well understood (Whittle 1952, MacDonald 1989, Muller and
    MacDonald 2000, Trauth 2021b). Since Schuster''s publication, the periodogram
    has been criticized–mostly wrongly–by many statisticians, and this criticism has
    unfortunately also found its way into the field of paleoclimatology. The problem
    with the periodogram is that while the frequency resolution increases, the signal-to-noise
    ratio of the spectrum does not improve with increasing sample size (Muller and
    MacDonald 2000).


    Therefore, other methods have been developed, such as the Blackman–Tukey method
    (Sect. 5.5) and Thomson''s multitaper method (Sect. 5.8), with which the signal-to-noise
    ratio improves with increasing sample size, but with the disadvantage of a lower
    frequency resolution. As described very aptly by Muller and MacDonald (2000),
    however, the method is the most useful method to apply if the time series to be
    analyzed are dominated by a few simple periodic phenomena, as the linear model
    of orbital control on global climate suggests.


    The periodogram is simply the squared absolute Fourier transform of the time series
    $x(t_k)$


    $$P(f_k) = \frac{1}{n} \left| \sum_{k=0}^{n-1} x(t_k) e^{i 2 \pi f_k t_k / f_s}
    \right|^2$$


    for the Nyquist range $-1/2\Delta t < f < +1/2\Delta t$, the sampling frequency
    $f_s$, and the length of the time series $n$.


