    \ be imported into another software package, such as Adobe Photoshop.\n\n# 7.6\
    \ Gridding and Contouring\n\nThe previous data sets were all stored in evenly\
    \ spaced two-dimensional arrays. However, most data in the earth sciences are\
    \ obtained from irregular sampling patterns. The data are therefore unevenly spaced\
    \ and need to be interpolated in order to allow a smooth and continuous surface\
    \ to be computed from our measurements in the field. *Surface estimation* is typically\
    \ carried out in two major steps (Fig. 7.5): First, the number of *control points*\
    \ needs to be selected, and second, the value of the variable of interest needs\
    \ to be estimated for the *grid points*.\n\nControl points are unevenly spaced\
    \ field measurements, such as the thickness of sandstone units at different outcrops\
    \ or the concentration of a chemical tracer in water wells. The data are generally\
    \ represented as *xyz* triplets, where *x* and *y* are spatial coordinates and\
    \ *z* is the variable of interest. In such cases, most gridding methods require\
    \ continuous and unique data. However, spatial variables in the earth sciences\
    \ are often discontinuous and not spatially unique: For example, the sandstone\
    \ unit may be faulted or folded. Furthermore, gridding requires spatial autocorrelation,\
    \ that is, the neighboring data points should be correlated with one another through\
    \ a specific relationship. There is no point in making a surface estimation if\
    \ the *z* variables are random and have no autocorrelation.\n\nVarious techniques\
    \ exist for selecting the control points that are used to calculate a grid point.\
    \ Most methods make arbitrary assumptions about the autocorrelation of the *z*-variable.\
    \ For example, the 2D variants of the linear and spline interpolation methods\
    \ introduced in Sect. 5.6 use a fixed number of control points to calculate the\
    \ area pieces from polynomials. The *nearest neighbor criterion* includes all\
    \ control points within a circular neighborhood of the grid point, and the"
  - '[PAGE 302]


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_302_0.png)


    radius of the circle is specified by the user (Fig. 7.5 a). Since the degree of
    spatial autocorrelation likely decreases with increasing distance from the grid
    point, considering too many distant control points at once likely leads to erroneous
    results when computing values for these grid points. On the other hand, using
    radii that are too small may limit the total control points used in calculating
    the grid point values to a very small number, thereby resulting in a highly error-prone
    estimate of the modeled surface.


    In another technique, all control points are connected in a triangular network
    (Fig. 7.5 b). Every grid point is located within the triangular area formed by
    three control points. The z-value of the grid point is computed from the z-values
    of the control points at the vertices of the triangle. A modification of this
    form of gridding also uses the three points at the vertices of the three adjoining
    triangles. *Kriging* (which is introduced in Sect. 7.10) is an alternative approach
    for selecting control points and is often regarded as the ultimate method of gridding.
    Some users even use the term *geostatistics* as a synonym. Kriging is a method
    for quantifying spatial autocorrelation and hence for quantifying the dimension
    of the circle used to select the control points. More sophisticated versions of
    kriging use an elliptical area instead of a circle.


    As mentioned above, the second step in surface estimation is the actual computation
    of the z-values for the grid points. The *arithmetic mean* of the measured z-values
    at the control points


    ```

    $$\bar{z} = \frac{1}{n} \sum_{i=1}^{n} z_i$$

    ```'
  - '[PAGE 303]


    provides the easiest way of computing the values at the grid points. This is a
    particularly useful method if there are only a limited number of control points.
    If the study area is well covered by control points and the distance between these
    points is highly variable, the *z*-values of the grid points should be computed
    using a *weighted mean*. This involves weighting the *z*-values at the control
    points by the inverse of the distance $d_i$ from the grid points:


    $$\vec{z} = \frac{\sum_{i=1}^{n} (z_i/d_i)}{\sum_{i=1}^{n} (1/d_i)}$$


    Depending on the spatial scaling relationship of the variable *z*, the inverse
    of the square root of the distance (rather than simply the inverse of the distance)
    may be used to weight the *z*-values. Fitting 2D *splines* to the control points
    offers another method for computing the grid point values and is commonly used
    in the earth sciences. Most routines used in surface estimation involve *bicubic
    polynomial splines*, that is, a third-degree 2D polynomial is fitted to at least
    six adjacent control points. The final surface is a composite that comprises different
    portions of these splines.


    One of the advantages of square meshes is also one of their disadvantages: Due
    to the equidistance between these meshes, the memory requirement per area is the
    same everywhere (and thus also in areas with a low density of control points and
    little variation in the variables of interest). One way of overcoming this problem
    is by using triangular meshes instead of square meshes. These triangular meshes
    are calculated by *triangulation* from the irregularly distributed control points.
    There are several different methods for calculating such *triangulated irregular
    networks* (TINs), one of which is *Delaunay triangulation*. In this method, the
    points are linked to triangles such that no other points are contained within
    a circle on which the three vertices of the triangle are present.


    The *SciPy* package contains several interpolation methods. We first use the bicubic
    spline, which interpolates the data in two dimensions using a spline, that is,
    a third-degree 3D polynomial is fitted to at least six adjacent control points,
    thereby resulting in a surface (and its first derivative) that is continuous.
    This gridding method is particularly well suited for producing smooth surfaces
    from noisy data sets with unevenly distributed control points. As an example,
    we use synthetic *xyz* data that represent the vertical distance between the surface
    of an imaginary stratigraphic horizon that has been displaced by a normal fault
    on the one hand and by a reference surface on the other hand. The foot wall of
    the fault shows roughly horizontal strata, whereas the hanging wall is characterized
    by two large sedimentary basins. The *xyz* data are irregularly distributed and
    thus need to be interpolated to a regular grid. These *xyz* data are stored as
    a three-column table in a file named *normalfault.txt*:'
