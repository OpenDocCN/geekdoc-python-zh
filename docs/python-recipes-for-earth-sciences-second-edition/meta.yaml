    - *number of pairs and the lag interval* – When calculating the classic variogram
    estimator, more than 30 pairs of points (and ideally, more than 50) should be
    used per lag interval (Webster and Oliver 2007) due to the estimator''s sensitivity
    to outliers. If there are fewer pairs, the lag interval should be increased. The
    lag spacing does not necessarily need to be uniform and can be chosen individually
    for each distance class. It is also possible to work with overlapping classes,
    in which case, the *lag width* (*lag tolerance*) must be defined. However, increasing
    the lag width can cause unnecessary smoothing and a resulting loss of detail.
    The separation distance and the lag width must therefore be chosen with care.
    Another option is to use a more robust variogram estimator (Cressie 1990, 1993;
    Deutsch and Journal 1998).


