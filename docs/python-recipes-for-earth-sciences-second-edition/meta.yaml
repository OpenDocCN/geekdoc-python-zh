    hence called the normalized Lomb–Scargle Fourier transform. The term *normalized*
    refers to the factor $s^2$ in the denominator of the equation for the periodogram.


    Scargle (1982) showed that the Lomb–Scargle periodogram has an exponential probability
    distribution with a mean equal to one assuming that the noise is Gaussian distributed.
    The probability that $P_s(\omega)$ lies between some positive quantity $z$ and
    $z+dz$ is $\exp(-z)dz$. If we scan $m$ independent frequencies, the probability
    that none of them has a value larger than $z$ is $(1-\exp(-z))^m$. We can therefore
    compute the false alarm probability of the null hypothesis (i.e., the probability
    that a given peak in the periodogram is not significant) (Press et al. 2007):


    $$P(> z) \equiv 1 - (1 - e^{-z})^m$$


    Press et al. (2007) also suggested using the Nyquist criterion (Sect. 5.2) to
    determine the number of independent frequencies $m$ assuming that the data are
    evenly spaced. In this case, the appropriate value for the number of independent
    frequencies is $m=2n$, where $n$ is the length of the time series.


    The following Python code is based on the equations above for the Lomb–Scargle
    normalized periodogram. We first load the synthetic data that were generated in
