    \ \\times 2$协方差矩阵的两个特征向量$PC_1$和$PC_2$定义（图9.1）。由于第一主成分$PC_1$穿过数据散点的长轴，且新原点是双变量均值，因此$PC_1$可以用来描述大部分方差，而$PC_2$只贡献少量的额外信息。在此变换之前，需要两个轴$x_1$和$x_2$来描述数据集，但现在可以通过舍弃第二轴$PC_2$来降低数据维度，而不会丢失太多信息，如图9.1所示。\n\
    \n由于该方法产生的信号$PC_1$和$PC_2$是线性不相关的，因此该方法也被称为*白化*，因为这一特性是白噪声的特征。成功应用此方法的一个重要前提是数据服从高斯分布。尽管分离出的信号是不相关的，但它们仍然可能是相互依赖的（即，它们可能保留非线性相关性）。例如，如果数据不服从高斯分布，PCA因此无法产生有用的结果，就会出现这种现象。独立成分分析（ICA）就是为这类任务开发的，它将$p$个独立变量（随后是非线性不相关的）从$p$个相关变量中分离出来（第9.3节）。\n\
    \n这个过程现在可以扩展到任意数量的变量和样本。让我们假设一个数据集，它包含对$n$个样本的$p$个变量的测量值，存储在一个$n \\times p$的数组$X$中：\n\
    \n$$X = \\begin{pmatrix} x_{11} & x_{12} & \\dots & x_{1p} \\\\ x_{21} & x_{22}\
    \ & \\dots & x_{2p} \\\\ \\vdots & \\vdots & & \\vdots \\\\ x_{n1} & x_{n2} &\
    \ \\dots & x_{np} \\end{pmatrix}$$\n\n数组$X$的列表示$p$个变量，行表示$n$个样本。在旋转轴并移动原点后，新的坐标$Y_j$可以通过以下公式计算：\n\
    \n$$Y_1 = a_{11}X_1 + a_{12}X_2 + \\dots + a_{1p}X_p$$\n$$Y_2 = a_{21}X_1 + a_{22}X_2\
    \ + \\dots + a_{2p}X_p$$\n$$\\vdots$$\n$$Y_p = a_{p1}X_1 + a_{p2}X_2 + \\dots\
    \ + a_{pp}X_p$$\n\n第一主成分$PC_1$（用$Y_1$表示）包含最高的方差，而$PC_2$包含第二高的方差，依此类推。所有的$PCs$一起包含了数据集的全部方差。然而，这种方差主要集中在前几个$PCs$中，它们包含了数据集的大部分信息内容。因此，为了降低数据维度，通常会忽略最后的$PCs$。上述方程中的因子$a_{ij}$是*主成分载荷*，它们的值代表了原始变量对新$PCs$的相对贡献。如果变量$X_j$在$PC_1$中的载荷$a_{ij}$接近于零，则该变量的影响很小，而较高的正或负$a_{ij}$值则表明有很强的影响。通过原始变量$X_j$的线性组合（由载荷加权）计算出的新变量值$Y_j$被称为*主成分得分*。\n\
    \nPCA通常用于解混（或分离）变量$X$，这些变量是独立源变量$S$的线性组合，\n\n$$X = A^T \\cdot S$$\n\n其中$A$是混合矩阵。PCA的目标是确定（尽管不是定量地）源变量$S$（由主成分得分$Y_j$表示）和混合矩阵$A$（由主成分载荷$a_{ij}$表示）。如果原始变量$X$的概率分布是高斯分布，那么解混此类变量的效果最好，并且只有在这种情况下，主成分才是完全线性去相关的。然而，地球科学中的数据通常不服从高斯分布，因此应使用替代方法——如独立成分分析（ICA）（第9.3节）。例如，高光谱数据中的辐射亮度和反射率值通常不服从高斯分布，因此在遥感应用中，ICA而非PCA被广泛用于对光谱波段进行去相关。使用PCA的例子包括评估沉积物来源（如下例所述）、解混玄武岩的地幔橄榄岩源区，以及对卫星图像进行多光谱分类。\n\
    \n第一个示例说明了不使用`PCA()`而是使用`cov()`来计算$p=2$维数据集的$p \\times p$协方差矩阵，然后使用`eig()`来计算该矩阵的$p$个特征向量和$p$个特征值的PCA。接下来我们假设一个数据集，它包含对$n$个样本的$p$个变量的测量值，存储在一个名为`data`的$n\
    \ \\times p$数组中。作为一个例子，我们可以创建一个具有强线性相关性的双变量数据集，包含2×30个数据点，并叠加了正态分布的噪声：\n\n```python\n\
