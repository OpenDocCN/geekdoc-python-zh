- md: '## 7 Spatial Data


    ### 7.1 Introduction


    Most data in the earth sciences are spatially distributed either as *vector data*
    (i.e., points, lines, polygons; e.g., river networks, coastlines) or as *raster
    data* (i.e., square grids, triangular grids; e.g., gridded topography). Vector
    data are generated by digitizing map objects, such as drainage networks or outlines
    of lithologic units. Raster data can be obtained directly from a satellite sensor
    output, but gridded data can also be interpolated from irregularly distributed
    field sampling (gridding).


    Section 7.2 introduces vector data using coastline data as an example. The acquisition
    and handling of raster data are then illustrated using digital topographic data
    in Sects. 7.3 to 7.5. The availability and use of digital elevation data have
    increased considerably since the early 1990s. With a resolution of 5 arc minutes
    (i.e., about 9 km), ETOPO5 was one of the first data sets available for topography
    and bathymetry. In October 2001, it was replaced by ETOPO2, which has a resolution
    of 2 arc minutes (i.e., about 4 km), and in March 2009, ETOPO1—which has a resolution
    of 1 arc minutes (i.e., about 2 km)—became available. The latest member of the
    ETOPO family is the ETOPO 2022 data set, which has a resolution of 15 arc seconds.
    There is also a data set for topography called GTOPO30, which was completed in
    1996 and has a horizontal grid spacing of 30 arc seconds (i.e., about 1 km). More
    recently, the 30 and 90 m resolution data from the Shuttle Radar Topography Mission
    (SRTM) have replaced the older data sets in most scientific studies.


    The second part of this chapter deals with the computation of continuous surfaces
    from unevenly spaced data and with the statistics of spatial data. In the earth
    sciences, most data are collected in an irregular pattern. Access to rock samples
    is


    **Supplementary Information** The online version contains supplementary material
    available at https://doi.org/10.1007/978-3-031-56906-7_7.


    where `kron()` returns the Kronecker tensor product of `yn1` and `yn1''` (which
    is a matrix formed by taking all possible products between the elements of `yn1`
    and `yn1''`) and `eig()` returns the eigenvector of `k`. This yields


    ```

    0.0013492697467229055

    ```


    We now run the adaptive filter `canc()` for 20 iterations and use the value of
    `u` from above:


    ```

    z,e,mer,w=canc(yn1,yn2,0.0013,5,20)

    ```


    The output arguments from `canc()` are the filtered primary signal `z`, the extracted
    noise `e`, the mean squared error `mer` for the number of iterations it performed
    with step size `u`, and the filter weights `w` for each data point in `yn1` and
    `yn2`. The plot of the mean squared error `mer`


    ```

    plt.figure()

    plt.plot(mer)

    plt.show()

    ```


    illustrates the performance of the adaptive filter, although the chosen step size
    (`u=0.0013`) clearly results in a relatively rapid convergence. In most examples,
    a smaller step size decreases the rate of convergence but improves the quality
    of the final result. We therefore reduce `u` and run the filter again with further
    iterations:


    ```

    z,e,mer,w=canc(yn1,yn2,0.0001,5,20)

    ```


    The plot of the mean squared error `mer` against the iterations


    ```

    plt.figure()

    plt.plot(mer)

    plt.show()

    ```


    now converges after about six iterations. In practice, the user should vary the
    input arguments `u` and `l` in order to obtain the optimum result. We can now
    compare the output signal with the original noise-free signal:


    ```

    plt.figure()

    plt.plot(x,y,''b'',x,z,''r'')

    plt.show()

    ```


    This plot demonstrates that the noise level of the signal has been reduced dramatically
    by the filter. Next, the plot


    ```

    plt.figure()

    plt.plot(x,e,''r'')

    plt.show()

    ```


    shows the noise extracted from the signal. Using the last output argument of `canc()`,
    we can calculate and display the mean filter weights of the final iteration from
    `w`:


    ```

    wmean=np.mean(w,axis=0)


    plt.figure()

    plt.plot(wmean)

    plt.show()

    ```


    The frequency characteristic of the filter provides a more illustrative representation
    of the effect of the filter,


    ```

    f,h=signal.freqz(wmean,1,worN=1024,fs=10)


    plt.figure()

    plt.plot(f,np.abs(h))

    plt.show()

    ```


    which shows that it is a lowpass filter with a relatively smooth transition band.
    This means that it does not have the quality of a recursive filter that was designed,
    for example, using the Butterworth approach. However, the filter weights are calculated
    in an optimization process rather than being chosen arbitrarily.


    The strength of an adaptive filter lies in its ability to filter a time series
    with a variable signal-to-noise ratio along the time axis. Since the filter weight
    array W is updated for each individual data point, these filters are even used
    in real-time applications, such as in telecommunications systems. We can examine
    this behavior through an example in which the signal-to-noise ratio in the middle
    of the time series (x=500) is reduced from about 10% to zero:


    ```

    x=np.linspace(0,100,1001)

    y=np.sin(x)

    rng=default_rng(0)

    yn1=y+0.5*rng.standard_normal(y.shape)

    yn2=y+0.5*rng.standard_normal(y.shape)

    yn1[501:]=y[501:]

    yn2[501:]=y[501:]


    plt.figure()

    plt.plot(x,yn1,x,yn2)

    plt.show()

    ```


    The value of `u` is again computed by


    ```

    k=np.kron(yn1,np.transpose(yn1[None]))

    w,v=lanalg.eig(k)

    u=1 / np.max(w)

    print(u)

    ```


    which yields


    ```

    0.0016086744408774288

    ```


    We now run the adaptive filter `canc()` for 20 iterations and use the value of
    `u` from above:


    ```

    z,e,mer,w=canc(yn1,yn2,0.0013,5,20)

    ```


    The plot of the mean squared error `mer` versus the number of performed iterations
    with step size `u`


    ```

    plt.figure()

    plt.plot(mer)

    plt.show()

    ```


    illustrates the performance of the adaptive filter, although the chosen step size
    `u=0.0016` clearly results in a relatively rapid convergence. Again, we can now
    compare the output signal with the original noise-free signal:


    ```

    plt.figure()

    plt.plot(x,y,''b'',x,z,''r'')

    plt.show()

    ```


    This plot reveals that the filter output `y` is almost the same as the noise-free
    signal `x`. The plot


    ```

    plt.figure()

    plt.plot(x,e,''r'')

    plt.show()

    ```


    shows the noise extracted from the signal. Here, we can observe some signal components
    that have been erroneously removed by the filter in error from the noise-free
    segment of the time series beyond the change point in the signal-to-noise ratio.
    Using the last output argument of `canc()`, we can calculate and display the filter
    weights `w` of the final iteration,


    ```

    X=np.linspace(1,5,5)

    Y=np.linspace(2,999,997)

    X, Y=np.meshgrid(X, Y)

    W=w[2:999,0:]


    plt.figure()

    fig,ax=plt.subplots(subplot_kw={"projection":"3d"})

    surf=ax.plot_surface(X,Y,W,cmap=cm.coolwarm)

    ax.view_init(60,100-90)

    plt.show()

    ```


    which nicely shows the adaptation of the filter weights before and after the change
    in the signal-to-noise ratio. We plot only the middle part of `w` because the
    edges `1 : (l-1) / 2` and `end- (l-1) / 2 : end` are all zero due to the filter
    length of `l`. We can also use this example to demonstrate the effect that the
    values of `u` and `l` have on the performance of the adaptive filter. In theory,
    a smaller `u` leads to more accurate results, but the rapid adaptation to a changing
    signal-to-noise ratio does not work well. Larger values of `l` also yield better
    results, but the number of data points that are lost through the filtering process
    increases by `(l-1) / 2`.


    The application of this algorithm has been demonstrated with duplicate oxygen
    isotope records from ocean sediments (Trauth 1998). The work by Trauth (1998)
    illustrates the use not only of the modified LMS algorithm, but also of another
    type of adaptive filter–namely the recursive least squares (RLS) algorithm–in
    various different environments (Trauth 1998; Haykin 2014).


    ## References


