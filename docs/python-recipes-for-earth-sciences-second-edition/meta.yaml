  md: '# 4.3 Classical Linear Regression Analysis


    Linear regression offers another way of describing the relationship between the
    two variables $x$ and $y$. While Pearson''s correlation coefficient provides only
    a rough measure of a linear trend, linear models obtained via regression analysis
    allow for arbitrary $y$-values to be predicted for any given value of $x$ within
    the data range. Statistically testing the significance of the linear model provides
    some insights into the accuracy of these predictions.


    *Classical regression* assumes that $y$ responds to $x$ and that the entire dispersion
    in the data set is contained within the $y$-value (Fig. 4.4). That means that
    $x$ is then the independent variable (also known as the predictor variable, or
    the regressor). The values of $x$ are defined by the experimenter and are often
    regarded as being free of errors. An example is the location $x$ within a sediment
    core from which the variable $y$ has been measured. The dependent variable $y$
    contains errors because its magnitude cannot be determined accurately. Linear
    regression minimizes the deviations $\Delta y$ between the data points $xy$ and
    the value $y$ predicted by the best fit line $y = b_0 + b_1x$ using a least squares
    criterion. The basic equation for a general linear model is


    $$y = b_0 + b_1x$$


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_140_0.png)


    **Fig. 4.4** Linear regression. Whereas classical regression minimizes the $\Delta
    y$ deviations, reduced major axis regression minimizes the triangular area $0.5
    \cdot (\Delta x \Delta y)$ between the data points and the regression line, where
    $\Delta x$ and $\Delta y$ are the distances between the predicted and the true
    $x$- and $y$-values, respectively. The intercept of the line with the $y$-axis
    is $b_0$, and the slope is $b_1$. These two parameters define the equation of
    the regression line.'
  merge: -1
  pgno: 140
- img_proc: true
  md: 'where $b_0$ and $b_1$ are the regression coefficients. The value of $b_0$ is
    the y-intercept, and $b_1$ is the slope of the line. The squared sum of the $\Delta
    y$ deviations to be minimized is


    $$\sum_{i=1}^{n} (\Delta y_i)^2 = \sum_{i=1}^{n} (y_i - (b_0 + b_1 x_i))^2$$


    Partially differentiating the right-hand term in the equation and setting it to
    zero yields a simple equation for the regression coefficient $b_1$:


    $$b_1 = \frac{\sum_{i=1}^{n} (x_i - \bar{x})(y_i - \bar{y})}{\sum_{i=1}^{n} (x_i
    - \bar{x})^2}$$


    The regression line passes through the data centroid defined by the sample means,
    and we can therefore compute the other regression coefficient $b_0$ using the
    univariate sample means and the slope $b_1$ computed earlier:


    $$b_0 = \bar{y} - b_1 \bar{x}$$


    As an example, let us again load the synthetic age–depth data from the file *agedepth_1.txt*.
    We can define two new variables `meters` and `age` and generate a scatter plot
    of the data (Fig. 4.5):


