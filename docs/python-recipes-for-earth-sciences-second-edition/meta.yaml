    \ area are the most likely source of the relatively drab-colored upper part of\
    \ the varves.\n\n## 9.3 Independent Component Analysis (by N. Marwan)\n\nPrincipal\
    \ component analysis (PCA) is the standard method for unmixing (or separating)\
    \ mixed variables (Sect. 9.2). Such analyses produce signals that are linearly\
    \ uncorrelated, and the method is therefore also called *whitening* because this\
    \ property is characteristic of *white noise*. Although the separated signals\
    \ are uncorrelated, they can still be interdependent (i.e., they may retain a\
    \ nonlinear correlation). This phenomenon arises, for example, when data are not\
    \ Gaussian distributed and PCA consequently does not yield good results. *Independent\
    \ component analysis* (ICA) was developed for this type of task; it separates\
    \ the variables *X* into independent variables *S*, which are then nonlinearly\
    \ uncorrelated. In order to perform an ICA (according to the central limit theorem),\
    \ the mixture of standardized random numbers must be Gaussian distributed. ICA\
    \ algorithms therefore use a criterion that estimates how Gaussian the combined\
    \ distribution of the independent components is (Hyvärinen 1999). The less Gaussian\
    \ this distribution is, the more independent the individual components are.\n\n\
    According to the linear mixing model, $p$ independent variables $X = (x_1, x_2,\
    \ \\dots, x_p)$ are linearly mixed in $n$ measurements:\n\n$$X = A^T \\cdot S$$\n\
    \nWe are interested in the source variables $S$ and in the mixing matrix $A$ (see\
    \ Sect. 9.2). This task is perhaps analogous to being at a party in which many\
    \ people are carrying on independent conversations: We can hear a mixture of the\
    \ conversations but cannot distinguish them individually. We could perhaps install\
    \ some microphones and use them to separate out the individual conversations.\
    \ This dilemma is therefore sometimes known as the *cocktail party problem*. Officially,\
    \ however, it is called *blind source separation*, which is defined by\n\n$$S\
    \ = W^T X$$\n\nwhere $W^T$ is the separation matrix required to reverse the mixing\
    \ and obtain the original signals. In the earth sciences, we encounter similar\
    \ problems, for example, if we want to determine the relative contributions of\
    \ different source rocks to basin sediments (as we did for PCA), but this time\
    \ with the possibility that there are nonlinear dependencies in the data and that\
    \ the data are not Gaussian distributed (Sect. 9.2).\n\nWe again create a synthetic\
    \ data set consisting of thirty total measurements (i.e., the proportions of each\
    \ of the three minerals) from the thirty sediment samples. In contrast to the\
    \ PCA example, however, the temporal variation in the source rocks is not Gaussian\
    \ distributed; rather, it is uniformly distributed since we use `rng.uniform()`\
    \ instead of `standard_normal()` to create the pseudorandom numbers:\n\n```\n\
    import scipy\nimport numpy as np\nimport matplotlib.pyplot as plt\nfrom sklearn.decomposition\
    \ import PCA\n\nrng = np.random.default_rng(0)\ns1 = rng.uniform(0,10,30)\ns2\
    \ = rng.uniform(0,7,30)\ns3 = rng.uniform(0,12,30)\n```\n\nWe use the same mixing\
    \ equation as in the PCA example to create the three columns of $x$ (which correspond\
    \ to the three minerals) by linearly mixing source rocks s1, s2, and s3 (Fig.\
    \ 9.5):\n\n![](img/f6c4e7e52658f332a1ff43bb13764e42_441_0.png)\n\nFig. 9.5 Sample\
    \ input for independent component analysis. The relative proportions of three\
    \ minerals in 30 sediment samples reflect temporal variations in the contributions\
    \ of the three source rocks within the catchment of a sedimentary basin.\n\n```\n\
    x = np.zeros((30,3))\nx[:,0] = 15.4+ 7.2*s1+10.5*s2+2.5*s3\nx[:,1] = 124.0-8.73*s1+\
    \ 0.1*s2+2.6*s3\nx[:,2] = 100.0+5.25*s1- 6.5*s2+3.5*s3\nx = x + 3.8*rng.standard_normal(np.shape(x))\n\
    ```\n\nBy displaying histograms of the data, we see that the data are not Gaussian\
    \ distributed:\n\n```\nfig, ax = plt.subplots(3)\nax[0].hist(x[:,0])\nax[1].hist(x[:,1])\n\
    ax[2].hist(x[:,2])\nplt.show()\n```\n\nWe then display the proportions of the\
    \ minerals in the thirty samples as a time series:\n\n```\nplt.figure()\nplt.plot(x)\n\
    plt.grid(True)\nplt.legend(('Min1','Min2','Min3'))\nplt.xlabel('Sample ID')\n\
    plt.ylabel('Quantity')\nplt.show()\n```\n\nWe begin by unmixing the variables\
    \ using PCA. We calculate the principal components pcs, the mixing matrix a_pca,\
    \ and the whitening matrix w_pca using\n\n```\npca = PCA(n_components=3)\npca.fit(x)\n\
    \nnewx = pca.transform(x)\nnewx = newx/np.std(newx, 0, ddof=1)\n\npcs = pca.components_\n\
    variances = pca.explained_variance_\n\na_pca = np.dot(pcs, np.sqrt(np.diag(variances)))\n\
    w_pca = np.dot(np.linalg.inv(np.sqrt(np.diag(variances))), pcs)\n```\n\nThe pre-whitening\
    \ reduces the process of unmixing into independent components ($S$) to a problem\
    \ of finding a suitable rotation matrix $B$ that can be applied to the variables\
    \ $X_{PC}$:\n\n$$S = B^T X_{PC}$$\n\nWe need to find a rotation matrix $B$ such\
    \ that the variables $S$ have a completely non-Gaussian distribution. There are\
    \ several possibilities for implementing such a non-Gaussian criterion, such as\
    \ minimizing or maximizing the excess kurtosis\n\n$$\\gamma = E(x^4) - 3(E(x^2))^2$$\n\
    \nbecause this excess kurtosis $\\gamma$ for normally distributed data is zero.\
    \ $E$ stands for the expected value (i.e., the mean value) of $x$. Note that the\
    \ excess kurtosis differs from the kurtosis: The excess kurtosis is the kurtosis\
    \ minus three since the kurtosis of Gaussian-distributed data is three (Sect.\
    \ 3.2) but the excess kurtosis of such a distribution is zero. To find a $B$ that\
    \ ensures a minimum or maximum excess kurtosis, a learning algorithm can be used\
    \ that finds the fixed points of the learning rule:\n\n$$E(x(B^T x)^3) - 3||B||^2\
    \ B + f(||B||^2)B = 0$$\n\nThe FastICA algorithm by Hyvärinen (1999)–which is\
    \ based on a fixed point iteration scheme–is an efficient algorithm for solving\
    \ this problem. The learning rule is reduced in this example to the form\n\n$$B(k)\
    \ = E(x(B(k-1)^T x)^3) - 3B(k-1)$$"
