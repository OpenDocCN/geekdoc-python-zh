    \ GSHHG database consists of the older GSHHS shoreline database (Soluri and Woodson\
    \ 1990; Wessel and Smith 1996), with the poor-quality Antarctica data having been\
    \ replaced by more accurate data from Bohlander and Scambos (2007) and with rivers\
    \ and borders having been taken from the CIA World Data Bank II (WDBII) (Gorny\
    \ 1977). GSHHG data can be downloaded from the SOEST server\n\nhttp://www.soest.hawaii.edu/pwessel/gshhg/index.html\n\
