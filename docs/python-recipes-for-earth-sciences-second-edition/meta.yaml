    I1                  729 x 713 x 3      1559331      uint8\n\nUpper bound on total\
    \ bytes  =      1559331\n```\n\nThe details indicate that the image is stored\
    \ as a 729-by-713-by-3 array, which represents one 729-by-713 array for each of\
