    # 7.5 The Shuttle Radar Topography Mission SRTM


    The *Shuttle Radar Topography Mission* (SRTM) was an 11-day mission of the Space
    Shuttle *Endeavour* in February 2000 that used a radar system to map the Earth''s
    surface (Farr and Kobrick 2000; Farr et al. 2007). SRTM was an international project
    spearheaded by the National Geospatial-Intelligence Agency (NGA) and the National
    Aeronautics and Space Administration (NASA). Detailed information on the SRTM
    project (including a gallery of images and a data users forum) can be accessed
    on NASA''s website:


    ```

    https://www2.jpl.nasa.gov/srtm/

    ```


    The data were processed at the Jet Propulsion Laboratory. They are distributed
    through the United States Geological Survey''s (USGS) National Map Viewer and
    Download Platform:


    ```

    https://www.usgs.gov/core-science-systems/ngp/tnm-delivery/

    ```'
