    \ the northern Kenya rift and was acquired on 16 July 2013. Original image courtesy\
    \ of the NASA EO-1 Mission.\n\n## 8.7 The Normalized Difference Vegetation Index\
    \ NDVI\n\nPlant pigments reflect near-infrared light (i.e., 700 to 1100 nm), whereas\
    \ they strongly absorb visible light (i.e., 400 to 700 nm) for use in photosynthesis.\
    \ The *normalized difference vegetation index* (NDVI) is an index used to map\
    \ living green vegetation that is calculated with the formula\n\n$$NDVI = \\frac{(NIR\
    \ - R)}{(NIR + R)}$$\n\nusing the spectral reflectance measurements acquired in\
    \ the near-infrared (*NIR*) and red (R) spectral bands. The index can be measured\
    \ with ground-based spectral cameras as well as by using drones, aircraft, or\
    \ satellites. The cameras that are used are normally very expensive, but some\
    \ rather inexpensive alternatives are now available, including the AgroCam (https://www.agrocam.eu)\
    \ and the MAPIR Survey Camera (https://www.mapir.camera). These cameras are used\
    \ in professional applications, but due to their low prices, they are also suitable\
    \ for student exercises.\n\nSince the MAPIR cameras (which are manufactured by\
    \ Peau Productions, Inc., in San Diego, CA, USA) have the same size and shape\
    \ as the popular GoPro camera system, they can make use of all the GoPro accessories,\
    \ such as memory cards, camera mounts, and housings. We built an inexpensive multispectral\
    \ array consisting of four cameras that contain the recorded wavelengths in their\
    \ product designations: NDVI Red+NIR (650 and 850 nm), Blue (450 nm), Green (550\
    \ nm), and Visible Light RGB (~370 to 650 nm).\n\nThe following example explains\
    \ how to acquire images with MAPIR cameras, how to import and process the images\
    \ with Python, and how to calculate the NDVI in order to detect vegetation in\
    \ an image. When editing images from the MAPIR Survey2 NDVI camera, we learn a\
    \ lot about how cameras actually capture and store images. This is important in\
    \ order to be able to correctly import the images into Python, to process them,\
    \ and to compute the corresponding NDVI images. Failing to correctly complete\
    \ any of these three steps yields an image that can be immediately seen to be\
    \ unsatisfactory.\n\nThe following script uses information about the camera provided\
    \ on the manufacturer's website (https://www.mapir.camera). The example does not\
    \ include any camera calibration and uses an auto white balance rather than a\
    \ true white balance with a white reference. According to the MAPIR website's\
    \ information on *Calibrating Images in QGIS with MAPIR Plugin*, the Survey2 cameras\
    \ capture 16 bit RAW photos, which means that there are 16 bit pixels with intensity\
    \ values ranging from 0 to 65,535. When the camera saves a JPEG file, it compresses\
    \ the image, thereby leaving a range of only 0 to 255. We first define a file\
    \ name and the size of the image:\n\n```\nimport cv2\nimport numpy as np\nimport\
    \ rasterio as rasterio\nimport matplotlib.pyplot as plt\nfrom matplotlib.colors\
    \ import ListedColormap\nfrom skimage import color\nfrom skimage import exposure\n\
    from skimage import io\nfrom skimage import feature\nfrom skimage import transform\n\
    from skimage import draw\n\nfilename = '2017_0328_110031_007.RAW';\nrow = 3456;\n\
    col = 4608;\n```\n\nAccording to the MAPIR specification page for the Survey2\
    \ NDVI camera, the device uses a Sony Exmor IMX206 16MP (Bayer RGB), which is\
    \ important information required for correctly loading the images in Python. However,\
    \ the sensor specification page at Sony, Inc., indicates that the sensor actually\
    \ acquires 12 bit images, which is in line with information received via email\
    \ from the software engineer at Peau Productions, Inc., in March 2017 but is not\
    \ in line with what is stated on the company's website. With the support of this\
    \ software engineer, our own research, and readers of Stack Overflow (http://stackoverflow.com),\
    \ we managed to solve the problem: If we read the data in a uint16 array in Python,\
    \ reshape it to (row, col), and display the image, we find that we have arrived\
    \ at the correct solution:\n\n```\nwith open(filename) as fid:\n    I1 = np.fromfile(fid,dtype='<u2')\n\
    \nI1 = np.reshape(I1, (row,col))\n```\n\nIn this code, the data type `<u2` stands\
    \ for little-endian 2 byte (or 16 bit) unsigned integers. The MAPIR Survey2 NDVI\
    \ camera measures red (660 nm) and near-infrared (850 nm) radiances for the NDVI\
    \ calculation. However, our red and infrared data are nowhere to be found in the\
    \ grayscale image. The Sony sensor is a single-chip sensor that stores the three\
    \ colors (i.e., red, green, and blue) in a single array I1, which is displayed\
    \ as a grayscale image using the default gray colormap in Python. Most cameras\
    \ have single-chip sensors, as is even the case with single-lens reflex cameras\
    \ (SLRs), which can store images in the RAW format (in addition to in the JPEG\
    \ format) by using lossy compression. More expensive three-sensor cameras also\
    \ exist that use separate sensors for the filtered red, green, and blue color\
    \ ranges.\n\nSingle-chip cameras store RGB images on their single chips using\
    \ the Bayer mosaic, which was named after Bryce Bayer (1929 to 2012), a research\
    \ scientist at Eastman Kodak (see http://en.wikipedia.org for more information\
    \ on Bayer mosaics) (Fig. 8.5). Bayer's idea was to use filters and to direct\
    \ the individual colors of red, green, and blue onto individual sensor pixels,\
    \ which are usually in an RGGB arrangement because the human eye reacts more sensitively\
    \ to green than to red or blue. Due to the Bayer mosaic, SLRs with 16 MP resolution\
    \ (e.g., that of our Sony chip) do not really take 16 MPs; rather, they take only\
    \ 4 MPs each for red and blue (25% each) and 8 MPs for green (50%), and they then\
    \ interpolate each of the three colors to 16 MPs.\n\nThe RAW format provided by\
    \ SLRs therefore does not mean that the colors are stored in full resolution,\
    \ but rather that the images are not compressed (e.g., by using the JPEG algorithm).\
    \ Using Python instead, we can import and process the image with its original\
    \ resolution (i.e., 4 MPs each for red and blue and 8 MPs for green). Alternatively,\
    \ we can demosaic the image in the same way that an SLR does, for example, by\
    \ using the Python function `cvtColor()`. Demosaicing the image converts a Bayer\
    \ pattern-encoded image into a true color (RGB) image using gradient-corrected\
    \ linear interpolation. According to the MAPIR website, the red (660 nm) radiance\
    \ is stored in the red image channel, the near-infrared (850 nm) radiance is stored\
    \ in the blue image channel, and no information is stored in the green channel.\n\
    \nWhen using `imshow()` to display I2 as a true color RGB image, we find blue\
    \ hues in areas with high reflection in the NIR spectral band (and hence also\
    \ denser living green vegetation), whereas all other areas with low NIR values\
    \ are more red in color:\n\n```\nI2 = cv2.cvtColor(I1, cv2.COLOR_BAYER_BG2RGB)\n\
    I2 = exposure.rescale_intensity(I2,\n    out_range='uint8')\n\nplt.figure()\n\
    io.imshow(I2)\nplt.axis('off')\nplt.show()\n```\n\nTo improve the contrast of\
    \ the image, we can apply adaptive histogram equalization:\n\n```\nI3 = np.zeros(np.shape(I2))\n\
    I3[:,:,0] = exposure.equalize_adapthist(I2[:,:,0],\n    clip_limit=0.01, nbins=256)\n\
