    ## 3.6 假设检验


    以下章节讨论用于从统计样本中得出结论的方法。这些方法随后可应用于更广泛的目标总体（假设检验）（第 3.6 至 3.12 节）。所有假设检验都共享相同的概念和术语。原假设是关于总体的陈述，描述不存在统计上显著的特征或效应，而备择假设则是与之相对的陈述。假设检验可以作为单尾（单侧）或双尾（双侧）检验进行（图
    3.13）。术语“尾”源于将数据尾部延伸到概率密度函数最左侧或最右侧的概念，例如，在标准正态分布中


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_93_0.png)


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_93_1.png)


    **图 3.13** 标准正态分布图，其中 **a** 为单临界区域，**b** 为双临界区域，显示为阴影区域，总共包含曲线下面积的 5%。


    用于曼-惠特尼检验和安萨里-布拉德利检验（第 3.11 和 3.12 节）。例如，曼-惠特尼检验比较两个数据集的中位数。单尾曼-惠特尼检验用于在 5%（或
    0.05）的显著性水平下检验备择假设，即第一个样本的中位数小于或大于第二个样本的中位数。当在 5% 显著性水平下中位数不相等时，即无论哪个中位数更大都无关紧要时，使用双尾曼-惠特尼检验。在这种情况下，显著性水平减半，即使用
    2.5% 而不是 5%。假设检验的 *p* 值是在原假设下，观察到比从样本计算出的检验统计量值更大的值的概率（图 3.14）。*显著性水平 α* 是控制检验结果的概率阈值。如果
    *p* 值小于 α，则可以拒绝原假设。如果 *p*<0.05，则检验结果被认为是 *显著的*，如果 *p*<0.01，则被认为是 *高度显著的*。


