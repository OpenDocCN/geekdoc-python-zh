    \ 含有角闪石、辉石和斜长石的岩浆岩；(2) 以萤石、闪锌矿和方铅矿的存在为特征的热液脉，以及一些长石（即斜长石和钾长石）和石英；(3) 含有长石、石英和粘土矿物的砂岩单元。从该沉积序列的不同层位采集了十个样品，每个样品包含这些矿物的不同比例。首先，可以计算样品对之间的距离。函数`pdist()`提供了许多不同的距离度量，例如欧几里得距离或曼哈顿（或城市街区）距离。我们使用默认设置，即欧几里得距离：\n\
    \n```python\nimport numpy as np\nfrom matplotlib import cm\nimport matplotlib.pyplot\
