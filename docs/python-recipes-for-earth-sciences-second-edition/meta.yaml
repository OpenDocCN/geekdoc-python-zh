    \ 独立成分分析（作者：N. Marwan）\n\n主成分分析（PCA）是分离（或分离）混合变量的标准方法（第9.2节）。此类分析产生线性不相关的信号，因此该方法也称为*白化*，因为这一特性是*白噪声*的特征。尽管分离的信号是不相关的，但它们仍然可能是相互依赖的（即，它们可能保留非线性相关性）。例如，当数据不是高斯分布且PCA因此不能产生良好结果时，就会出现这种现象。*独立成分分析*（ICA）就是为此类任务开发的；它将变量*X*分离为独立变量*S*，这些变量在非线性上是不相关的。为了执行ICA（根据中心极限定理），标准化随机数的混合必须是高斯分布的。因此，ICA算法使用一个标准来估计独立成分的联合分布有多接近高斯分布（Hyvärinen，1999）。该分布越不接近高斯分布，各个成分就越独立。\n\
    \n根据线性混合模型，$p$个独立变量$X = (x_1, x_2, \\dots, x_p)$在$n$次测量中线性混合：\n\n$$X = A^T \\\
    cdot S$$\n\n我们感兴趣的是源变量$S$和混合矩阵$A$（参见第9.2节）。这个任务或许类似于在一个派对上，许多人正在进行独立的对话：我们可以听到对话的混合声，但无法单独区分它们。我们或许可以安装一些麦克风，用它们来分离出各个对话。因此，这个困境有时被称为*鸡尾酒会问题*。然而，正式名称是*盲源分离*，其定义为\n\
