    # 10.8 The Graphical Representation of Spherical Data


    There are many ways to display spherical data. However, since we always present
    data in two dimensions (i.e., either on a sheet of paper or on a computer screen),
    we need to convert them into one of many available projections. Python does not
    offer many functions for displaying or processing spherical data, especially not
    in a form commonly used in the earth sciences. The only exception lies with functions
    such as those used to display geographic data on a globe, some of which we use
    here.


    We begin by using synthetic data for longitude `lon` and latitude `lat`, which
    are calculated using `vmises()`. We first reset the random number generator using
    `random.seed(0)` and define the sample size `n`. We then define the mean of the
    `lon` and `lat` values in degrees, convert both values into radians, define the
    concentration parameter `kappa`, and use `vmises()` (which is included in the
    electronic supplement of this book) to calculate n=100 values for `lon` and `lat`.
    Finally, we convert the `lon` and `lat` values into degrees:


    ```

    import numpy as np

    from vmises import vmises

    import scipy.stats as stats

    import matplotlib.pyplot as plt

    from numpy.random import default_rng


    n=100;

    np.random.seed(0)

    mu_lon_degrees=10

    mu_lat_degrees=35

    mu_lon_radians=np.pi*mu_lon_degrees/180

    mu_lat_radians=np.pi*mu_lat_degrees/180

    kappa_lon=10

    kappa_lat=10

    lon_radians=vmises(n,mu_lon_radians,kappa_lon)

    lat_radians=vmises(n,mu_lat_radians,kappa_lat)

    ```'
