    plt.plot(meters, age,\n    marker='o',\n    linestyle='none')\nfor i in range(0,\
    \ 30):\n    j_meters = meters\n    j_age = age\n    j_meters = np.delete(j_meters,\
    \ i)\n    j_age = np.delete(j_age, i)\n    p = np.polyfit(j_meters, j_age, 1)\n\
    \    pval = np.poly1d(p)\n    plt.plot(meters, pval(meters),\n        color=(0.8,\
    \ 0.5, 0.3),\n        linewidth=0.1)\n    p_age = pval(meters)\n    p_error[i,\
    \ 0:] = p_age[i] - age[i]\nplt.show()\n```\n\nIn the ideal case, the prediction\
