- md: "## 5.12 Detecting Abrupt Transitions in Time Series\n\nA number of methods\
    \ are available for detecting abrupt changes in time series in the time domain.\
    \ An example of such a method that is suitable for use in climate time series\
    \ is the *rampfit method* (Mudelsee and Stattegger 1997, Mudelsee 2000), and examples\
    \ that are suitable for use in the frequency domain are the *evolutionary power\
    \ spectrum* and the *wavelet power spectrum* (e.g., Lau and Weng 1995, Mackenzie\
    \ et al. 2001). In most cases, trends and events in both the time and frequency\
    \ domains are detected by computing the statistical parameters of the data (e.g.,\
    \ measures of central tendency and dispersion) that are contained in a *sliding\
    \ window* of length (or width) *L*. The precision of these parameters depends\
    \ on the length of the window. In other words, an accurate value for the mean\
    \ and the variance is obtained if L is large. However, a larger window reduces\
    \ the accuracy of the estimated changes in these parameters. This problem is often\
    \ referred to as *Grenander’s uncertainty principle of statistics* (Grenander\
    \ 1958). Performing a statistical test to assess differences in central tendency\
    \ and dispersion between two different sliding windows, however, partly overcomes\
    \ this problem provided that only the locations of sharp transitions in statistical\
    \ parameters are required.\n\nThe classic *t*-test and *F*-test statistics are\
    \ often used to compare the means and the variances of two sets of measurements\
    \ and could therefore be used to detect changes in the location and dispersion\
    \ between two sliding windows. These two tests, however, make the basic assumption\
    \ that the samples come from a population with a Gaussian distribution (Sects.\
    \ 3.7 and 3.8). The non-parametric Mann–Whitney and Ansari–Bradley tests provide\
    \ a solution to this problem that is independent of the distribution (Sects. 3.11\
    \ and 3.12). The Mann–Whitney test (Mann and Whitney 1947, Lepage 1971) performs\
    \ a two-sided rank-sum test of the null hypothesis that two samples come from\
    \ continuous distributions with identical medians against the alternative that\
    \ they do not have identical medians. On the other hand, the Ansari–Bradley test\
    \ performs a two-sided test of the hypothesis that two independent samples come\
    \ from the same distribution against the alternative that they come from distributions\
    \ that have the same medians and shapes but different dispersions (Ansari and\
    \ Bradley 1960, Lepage 1971). This latter method has been successfully applied\
    \ to records of terrigenous dust flux preserved in marine sediments offshore of\
    \ subtropical West Africa, in the eastern Mediterranean Sea, and in the Arabian\
    \ Sea in order to detect trends, rhythms, and events in the African Plio–Pleistocene\
    \ climate (Trauth et al. 2009).\n\nform a triangle. Such a triangular configuration\
    \ remains along the phase space trajectory if the dynamic is highly regular (i.e.,\
    \ recurring states remain recurring over a long period of time). However, if the\
    \ dynamic is chaotic, then parts of the phase space trajectory that were initially\
    \ close subsequently diverge, and the triangular configuration breaks down even\
    \ though the corresponding triple nodes might remain interconnected for some time.\
    \ The probability of finding triangles is therefore higher for regular dynamics\
    \ and lower for chaotic dynamics. This explanation is, of course, rather simplified,\
    \ but a theoretically substantiated explanation can be found in Donner et al.\
    \ (2011).\n\nIn order to calculate the probability that triples also form triangles,\
    \ we need to compute the number of connected triples and the number of triangles,\
    \ which can be achieved directly from the recurrence plot by excluding the main\
    \ diagonal:\n\n```\nA=R - np.eye(len(R))\n```\n\nThe number of triangles and triples\
    \ is then\n\n```\nnumTripl=np.sum(np.matmul(A,A))\nnumTria=np.trace(np.matmul(A,np.matmul(A,A)))\n\
    ```\n\nFinally, the transitivity coefficient is the ratio\n\n```\nTrans=numTria/numTripl\n\
    print(Trans)\n```\n\nwhich yields\n\n```\n0.6459486011860506\n```\n\nThis number\
    \ means that the system does not have regular dynamics (which would yield a transitivity\
    \ coefficient close to one).\n\nIn order to detect changes in the dynamics, the\
    \ RQA can be computed for moving windows. The RQA of moving windows can be calculated\
    \ in two ways: either 1) by calculating the RQA measures for windows that move\
    \ along a single, global RP or 2) by calculating individual RPs for windows that\
    \ move along the original time series. If nonstationarities or trends are not\
    \ part of the main focus of the analysis, approach (2) helps to find transitions\
    \ that ignore these nonstationarities. However, if detecting overall (global,\
    \ long-scale) changes is of interest (e.g., to test for nonstationarity), the\
    \ recurrence conditions should be kept constant over time (thereby allowing the\
    \ global RP of the whole time series to be considered), and approach (1) should\
    \ be selected (Marwan 2011). The selected window size needs to be small enough\
    \ to ensure a good temporal resolution but large enough to cover typical variations\
    \ (e.g., several cycles) in order to find recurrences.\n\n![](img/f6c4e7e52658f332a1ff43bb13764e42_232_0.png)\n\
    \nFig. 5.32 Time series of the synthetic data used in the example of quantitative\
    \ measures of recurrence plots.\n\nIn our example, we choose a moving window length\
    \ of 150 data points and an overlap of 20% (Fig. 5.32):\n\n```\nw=150\n```\n\n\
    We then calculate the recurrence rate RR and the transitivity coefficient Trans\
    \ within these moving windows (Figs. 5.33 and 5.34):\n\n```\nTrans=np.zeros(len(R)-w)\n\
    RR=np.zeros(len(R)-w)\nfor i in range(0,len(R)-w,int(w/5)):\n    subR=R[i:i+w,i:i+w]\n\
    \    RR[i]=np.mean(subR)\n    subA=A[i:i+w,i:i+w]\n    numTripl=np.sum(np.matmul(subA,subA))\n\
    \    numClosTria=np.trace(np.matmul(subA,\n        np.matmul(subA,subA)))\n  \
    \  Trans[i]=numClosTria/numTripl\n\nplt.figure()\nplt.plot(t[int(w/2):int(w/2)+len(RR):int(w/5)],\n\
    \    RR[0:-1:int(w/5)],\n    label='Recurrence rate')\nplt.plot(t[int(w/2):int(w/2)+len(RR):int(w/5)],\n\
    \    Trans[0:-1:int(w/5)],\n    label='Transitivity coefficient')\n```\n\n![](img/f6c4e7e52658f332a1ff43bb13764e42_233_0.png)\n\
    \nFig. 5.33 Recurrence plot of the synthetic data shown in Fig. 5.30 using an\
    \ embedding of $m=5$ and $\\tau=3$ and applying a threshold of $\\varepsilon=1.2$.\n\
    \n```\npython\nplt.xlabel('Time')\nplt.legend()\n```\n\nThe RQA measures show\
    \ a clear transition within the higher autocorrelation section. At this point,\
    \ the measures have higher values, which reflects the higher density of black\
    \ dots, the changing neighborhood configuration due to the autocorrelation, and\
    \ the change in the dynamics of the system. The presence of these higher values\
    \ can be used to detect such a change in autocorrelation (e.g., as a precursor\
    \ to a *tipping point*) and to ultimately predict the tipping point itself. The\
    \ two empty quadrants interfere with the moving window directly at the change\
    \ point that occurs at time 1,000, thereby leading to a sudden decrease in the\
    \ *RR* measure.\n\nIn order to reliably interpret the variations in the recurrence\
    \ measures, a statistical test should be applied (Marwan 2011). Other, more complex\
    \ measures that quantify additional aspects of the dynamics (e.g., predictability\
    \ or laminar phases) are included in the Cross Recurrence Plot Toolbox for MATLAB,\
    \ which is available at.\n\n```\nhttp://tocsy.pik-potsdam.de/CRPtoolbox/\n```\n\
    \nBivariate and multivariate extensions of recurrence plots allow nonlinear correlation\
    \ tests and synchronization analyses to be carried out. A detailed introduction\
    \ to methods based on recurrence plots can be found on the following website:\n\
    \n```\nhttp://www.recurrence-plot.tk\n```\n\nRecurrence plots have already been\
    \ used to analyze many problems in the earth sciences. Comparing the dynamics\
    \ of modern precipitation data with paleo-rainfall data that have been inferred\
    \ from annually layered lake sediments in the northwestern Argentine Andes serves\
    \ as a good example of such analyses (Marwan et al. 2003). In this example, the\
