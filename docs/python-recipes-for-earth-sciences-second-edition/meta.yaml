    plt.legend(handles=[line1,line2])\nplt.title('Log-Ratio of Elements log(1a/1b)\
    \ and log(1b/1a)')\nplt.show()\n```\n\nIn the second example, we examine the influence\
    \ of the dilution in the frequency domain and the effect of Aitchison's log-ratio\
    \ transformation on the results of the spectral analyses. The example is quite\
    \ relevant because spectral analyses are often carried out on data sets with clear\
    \ dilution effects and spurious correlations with the aim of establishing a connection\
    \ between orbital forcing and environmental changes. It is possible that a causal\
    \ relationship between an environmental parameter and orbitally driven insolation\
    \ variations is claimed, but the orbital cycle–which is observed in the time series\
    \ of the environmental parameter–is a pure artifact of the closed sum effect.\
    \ We use a similar example as above, but with a slightly longer time series so\
    \ that we can obtain a good result in the spectral analysis.\n\nFirst, we again\
    \ create three variables (measured in milligrams) with three different cycles\
    \ of 2, 5, and 20, respectively. The variables are again sampled with an interval\
    \ of 0.1, but this time in the period from 0.1 to 100, which produces a time series\
    \ of 1,000 values:\n\n```\nt = np.linspace(0.1,100,1000)\nt = np.transpose(t)\n\
    \nelement1a = np.sin(2*np.pi*t/2) + 5\nelement1b = np.sin(2*np.pi*t/5) + 5\nelement1c\
    \ = 2*np.sin(2*np.pi*t/20) + 5\n```\n\nThen, we calculate the percentages of the\
    \ elements by typing\n\n```\nelement1a_perc = element1a/(element1a+ \\n    element1b+element1c)\n\
    element1b_perc = element1b/(element1a+ \\n    element1b+element1c)\nelement1c_perc\
