    The function minput () has four stages. In the first stage, the user enters the
    limits of the coordinate axes as reference points for the image. The image is
    then imported into the workspace and displayed on the screen. The third stage
    uses ginput to define the upper-left and lower-right corners of the image. In
    the fourth stage, the relationship between the coordinates of the two corners
    on the figure window and the reference coordinate system is used to compute the
