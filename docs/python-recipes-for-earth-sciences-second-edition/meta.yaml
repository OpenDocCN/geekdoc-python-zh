    \n## 7.3 15弧秒全球地形模型 ETOPO 2022\n\n*15弧秒全球地形模型* (ETOPO 2022) 是一个全球地形和水深数据数据库，位于规则的15弧秒网格上（即约0.5公里）(NOAA-NCEI\
    \ 2022)。ETOPO 2022数据库取代了较旧的ETOPO1、ETOPO2和ETOPO5全球地形网格，但这些旧版本仍然可用。ETOPO 2022汇编了来自多种来源的数据。可以从NOAA国家环境信息中心\
    \ (NCEI) 网站下载：\n\nhttps://www.ncei.noaa.gov/products/etopo-global-relief-model\n\
    \n较旧的数据集仅提供全球网格。例如，当前数据集的上一个前身——ETOPO1数据集 (Amante and Eakins 2009)——可以作为312 MB的地理参考图像下载。我们使用此数据集的一个摘录作为示例，该示例是使用类似于下面用于当前ETOPO\
    \ 2022数据集的网络工具生成的 (NOAA-NCEI 2022)。数据存储在文件*etopo1_bedrock.asc*中，包含以下数据：\n\n```\n\
    ncols         1801\nnrows         2401\nxllcorner     29.991666666667\nyllcorner\
    \     -20.008333333333\ncellsize      0.016666666667\n294 299 293 288 285 282\
    \ ...\n237 241 245 266 264 274 ...\n259 263 267 262 263 266 ...\n310 306 300 294\
    \ 296 291 ...\n348 346 352 356 353 353 ...\n381 383 381 381 382 381 ...\n(续)\n\
    ```\n\n文件头记录了数据数组的大小（例如，我们的示例中有1,801列和2,401行）、左下角的坐标（例如，约x=20，y=–20）以及单元格大小（例如，~0.0167\
    \ = 1/60度纬度和经度，或1弧分）。较旧版本的ETOPO1数据集以及其他类似数据集也可能包含表示数据空白的–32,768标志。我们通过在前五行开头输入#来注释掉文件头：\n\
    \n```\n#ncols         1801\n#nrows         2401\n#xllcorner     29.991666666667\n\
    #yllcorner     -20.008333333333\n#cellsize      0.016666666667\n294 299 293 288\
    \ 285 282 ...\n237 241 245 266 264 274 ...\n259 263 267 262 263 266 ...\n310 306\
    \ 300 294 296 291 ...\n348 346 352 356 353 353 ...\n381 383 381 381 382 381 ...\n\
    (续)\n```\n\n我们将文件保存为*etopo1_data_python.txt*，然后将数据加载到工作区：\n\n```\nimport numpy\
    \ as np\nimport pygmt as pygmt\nimport xarray as xr\nfrom matplotlib import cm\n\
    import matplotlib.pyplot as plt\nfrom matplotlib.colors import LightSource\nimport\
    \ rasterio as rasterio\nimport rasterio.plot\n\nETOPO1 = np.loadtxt('etopo1_data_python.txt')\n\
    ```\n\n接下来，我们使用`flipud()`上下翻转数组，以根据Python约定更改数据数组的索引：\n\n```\nETOPO1 = np.flipud(ETOPO1)\n\
    ```\n\n最后，我们通过打印该区域的最小和最大高程来测试数据是否已正确存储在工作区中：\n\n```\nprint(np.max(ETOPO1))\n\
    print(np.min(ETOPO1))\n```\n\n在此示例中，该区域的最大高程为5,677米，最小高程为-5,859米。参考面是海平面（即0米）。我们现在使用`meshgrid()`定义一个坐标系，利用左下角位于南纬20°、东经30°的信息。分辨率为1弧分，对应于1/60度：\n\
    \n```\nlon = np.linspace(30,60,1801)\nlat = np.linspace(-20,20,2401)\nLON,LAT\
    \ = np.meshgrid(lon,lat)\n```\n\n现在，我们使用`pcolormesh()`从高程数据生成彩色表面：\n\n```\nplt.figure()\n\
    ax1 = plt.axes(aspect='equal')\nplt.pcolormesh(LON,LAT,ETOPO1,\n    cmap='jet',\n\
    \    shading='gouraud')\nplt.colorbar()\nplt.show()\n```\n\n此脚本打开一个新的图形窗口，使用颜色映射`jet`生成彩色表面，并使用`gouraud`生成*Gouraud*着色。表面通过一组色阶突出显示，并以俯视图显示。一种绘制数字地形的壮观方式是使用*Matplotlib*包`colors`模块中的`LightSource()`创建带有角度光照的表面图（图7.2）："
