    plt.bar(v,n)\nplt.show()\n```\n\n我们使用`GaussianMixture()`将具有k个分量的高斯混合分布拟合到数据。该函数使用*期望最大化（EM）算法*通过最大似然拟合模型。EM算法由Dempster等人（1977）引入，是一种迭代方法，在执行期望步和最大化步之间交替进行。期望步根据分布的当前估计计算对数似然的期望。最大化步计算使期望步中计算的期望对数似然最大化的参数。函数`GaussianMixture()`创建一个*GaussianMixture*类的对象gm。我们现在可以确定一维中的两个分量的高斯混合分布。输入：\n\
