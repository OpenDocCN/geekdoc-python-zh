    io.show()\n```\n\n最后，我们可以定义一个任意阈值 `th`（例如 0.4），用于将植被（显示为白色像素）与其他材料（显示为灰色像素）分开。然后我们将\
    \ NDVI > 0.4 的部分显示为绿色，较低值显示为白色（图 8.6）：\n\n![](img/f6c4e7e52658f332a1ff43bb13764e42_386_0.png)\n\
    \n```python\nth = 0.4\nndvit = np.copy(ndvi)\nfor i in range(0,row):\n    for\
