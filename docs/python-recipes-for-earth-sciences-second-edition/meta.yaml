- md: '## Data Analysis in the Earth Sciences


    ### 1.1 Introduction


    Earth scientists make observations and gather data about the natural processes
    that operate on planet Earth. They formulate and test hypotheses on the forces
    that have acted on a particular region to create its structure, and they also
    make predictions about future changes to the planet. All of these steps in exploring
    the Earth involve acquiring and analyzing numerical data. An earth scientist therefore
    needs to have a firm understanding of statistical and numerical methods as well
    as the ability to utilize relevant computer software packages in order to be able
    to analyze the acquired data.


    This book introduces some of the most important methods of data analysis employed
    in the earth sciences and illustrates their use through examples with the Python
    software package. These examples can then be used as recipes for analyzing the
    reader''s own data after the reader has understood the application of the examples
    with synthetic data. This introductory chapter deals with data acquisition in
    Sect. 1.2, the various types of data in Sect. 1.3, and the appropriate methods
    for analyzing earth science data in Sect. 1.4. We therefore first explore the
    characteristics of typical data sets and subsequently investigate the various
    ways of analyzing data using Python.


    ### 1.2 Data Collection


    Most data sets in the earth sciences have a very limited sample size and also
    contain a large number of uncertainties. Such data sets are typically used to
    describe rather large natural phenomena, such as a granite body, a large landslide,
    or a widespread sedimentary unit. The methods described in this book aim to find
    a way of predicting the characteristics of a larger *population* from a much smaller
    *sample* (Fig. 1.1).


    It is important to note that depending on the population of interest in the research
    context, a sample obtained in the field (e.g., a piece of granite) is not necessarily
    identical to what is later described as a statistical sample. If the object of
    study is the chemical composition of a granite sample, then the sample is the
    collection of replicate measurements taken on subsamples of the granite. If, however,
    the researcher is more interested in the chemical composition of the entire granite
    body, then the sample consists of the chemical composition of several (preferably
    representative) rock samples from this granite body.


    In any case, choosing an appropriate sampling strategy is the first step toward
    obtaining a good data set. Developing a successful strategy for field sampling
    requires making decisions on the *sample size* and the *spatial sampling scheme*.
    The sample size (again for the rock sample) is determined by the sample''s volume
    and/or weight or (for the statistical sample) by the number of rock samples collected
    from a granite body. If the population is heterogeneous, the sample needs to be
    large enough to represent the population''s variability; however, samples should
    also be as small as possible in order to minimize the time and costs involved
    in their analysis. Collecting smaller pilot samples is recommended prior to defining
    a suitable sample size.


    The design of the spatial sampling scheme is dependent on the availability of
    outcrops or other materials that are suitable for sampling (Fig. 1.2). Sampling
    in quarries typically leads to clustered data, whereas sampling along road cuts,
    shoreline cliffs, or steep gorges results in one-dimensional traverse sampling
    schemes. A more uniform sampling pattern can be designed in which there is 100%
    exposure or in which there are no financial limitations. A regular sampling scheme
    results in a gridded distribution of sample locations, whereas a uniform sampling
    strategy includes the random location of a sampling point within a grid square.
    Although these sampling schemes might be expected to provide superior methods
    for sample collection, evenly spaced sampling locations tend to miss small-scale
    variations in the area, such as thin mafic dykes within a granite body or the
    spatially restricted presence of a particular type of fossil.


    The correct sampling strategy depends on the objectives of the investigation,
    the type of analysis required, and the desired level of confidence in the results.
    Once a suitable sampling strategy has been chosen, the quality of the sample can
    be influenced by several factors, thereby resulting in samples that are not truly
    representative of the larger population. Chemical or physical alteration, contamination
    by other materials, or displacement by natural or anthropogenic processes may
    all result in erroneous results and interpretations. It is therefore recommended
    that the quality of the samples, the employed method of data analysis, and the
    validity of the conclusions drawn from the analysis be tested at each stage of
    the investigation.


    ### 1.3 Data Types


    Most earth science data sets consist of numerical measurements, although some
    information, such as fossils and minerals, can also be represented by a list of
    names (Fig. 1.3). The available methods for data analysis may require certain
    types of data in the earth sciences. These types of data include:


    - *nominal data*—Information in the earth sciences is sometimes presented as a
    list of names, such as the various fossil species collected from a limestone bed
    or the minerals identified in a thin section of rock. In some studies, these data
    are converted into a binary representation, that is, *one* for present and *zero*
    for absent. Special statistical methods are available for analyzing such data
    sets.

    - *ordinal data*—These are numerical data that represent observations that can
    be ranked but for which the intervals along the scale are irregularly spaced.
    The hardness scale created by German mineralogist Friedrich Mohs (1773 to 1839)
    is one example of an ordinal scale. The hardness value indicates the material''s
    resistance to scratching. Diamond has a hardness of 10, whereas the value for
    talc is 1, but in terms of absolute hardness, diamond (hardness 10) is four times
    harder than corundum (hardness 9) and six times harder than topaz (hardness 8).
    The Modified Mercalli Scale, which attempts to categorize the effects of earthquakes,
    is another example of an ordinal scale and ranks earthquakes from intensity I
    (barely felt) to intensity XII (total destruction) (Richter 1958).

    - *ratio data*—These data are characterized by a constant length of successive
    intervals and therefore offer a great advantage over ordinal data. The zero point
    is the natural termination of the data scale. This type of data allows for either
    discrete or continuous data sampling. Examples of such data sets include length
    and weight data.

    - *interval data*—These are ordered data that have a constant length of successive
    intervals but for which the data scale is not terminated by zero. Temperatures
    in °C and °F represent an example of this data type even though arbitrary zero
    points exist for both scales. This type of data may be sampled continuously or
    in discrete intervals.


    In addition to these standard data types, earth scientists frequently encounter
    special kinds of data, such as:


    - *closed data*—These data are expressed as proportions that add to a fixed total,
    such as 100%. Compositional data (e.g., the element composition of rock samples)
    represent the majority of closed data.

    - *spatial data*—These data are collected in a 2D or 3D study area. The spatial
    distribution of a certain fossil species, the spatial variation in the thickness
    of a sandstone bed, and the distribution of tracer concentrations in groundwater
    are examples of this type of data, which is likely the most important data type
    in the earth sciences.

    - *directional data*—These data are expressed in angles. Examples include the
    strike and dip of bedding, the orientation of elongated fossils, and the flow
    direction of lava. This is another very common type of data in the earth sciences.


    Most of these different types of data require specialized methods of analysis,
    some of which are outlined in the section below.


    ### 1.4 Methods of Data Analysis


    Data analysis uses precise characteristics of small samples to hypothesize about
    the general phenomenon of interest. Determining which particular method to use
    for analyzing the data depends on the data type and the project requirements.
    The various methods available include:


    - *univariate methods*—Each variable is assumed to be independent of the others
    and is explored individually. The data are presented as a list of numbers that
    represent a series of points on a scaled line. Univariate statistical methods
    include collecting information about the variable, such as the minimum and maximum
    values, the average, and the dispersion about the average. This information is
    then used to infer the underlying processes that are responsible for variations
    in the data. Examples include the effects of chemical weathering on the sodium
    content of volcanic glass shards and the influence of specific environmental factors
    on the size of snail shells within a sediment layer.

    - *bivariate methods*—Two variables are investigated together in order to detect
    relationships between them. For example, the correlation coefficient may be calculated
    in order to investigate whether there is a linear relationship between two variables.
    Alternatively, bivariate regression analysis may be used to find'
  mdcn: '## 地球科学中的数据分析


    ### 1.1 引言


    地球科学家对地球上的自然过程进行观测并收集数据。他们针对作用于特定区域并塑造其结构的力提出并检验假设，同时也对地球的未来变化做出预测。探索地球的这些步骤都涉及获取和分析数值数据。因此，地球科学家需要牢固掌握统计和数值方法，并具备使用相关计算机软件包的能力，以便能够分析所获取的数据。


    本书介绍了地球科学中一些最重要的数据分析方法，并通过Python软件包的示例来说明其应用。读者在理解了这些使用合成数据的示例应用后，可以将其作为分析自己数据的范例。本导论章节在第1.2节讨论数据获取，第1.3节讨论数据类型，第1.4节讨论分析地球科学数据的适当方法。因此，我们首先探讨典型数据集的特征，随后研究使用Python分析数据的各种方法。


    ### 1.2 数据收集


    地球科学中的大多数数据集样本量非常有限，并且包含大量不确定性。此类数据集通常用于描述相当大的自然现象，例如一个花岗岩体、一次大型滑坡或一个广泛分布的沉积单元。本书描述的方法旨在寻找一种方法，从一个小得多的*样本*（图1.1）来预测一个更大*总体*的特征。


    需要注意的是，根据研究背景中关注的总体，在野外获得的样本（例如一块花岗岩）不一定等同于后来被描述为统计样本的东西。如果研究对象是花岗岩样本的化学成分，那么样本就是对花岗岩子样本进行重复测量的集合。然而，如果研究者更感兴趣的是整个花岗岩体的化学成分，那么样本则由来自该花岗岩体的几个（最好是具有代表性的）岩石样本的化学成分组成。


    无论如何，选择合适的采样策略是获得良好数据集的第一步。制定成功的野外采样策略需要就*样本量*和*空间采样方案*做出决定。样本量（再次针对岩石样本）由样本的体积和/或重量决定，或者（对于统计样本）由从花岗岩体采集的岩石样本数量决定。如果总体是异质的，样本需要足够大以代表总体的变异性；然而，样本也应尽可能小，以最小化分析所需的时间和成本。建议在确定合适的样本量之前，先收集较小的试点样本。


    空间采样方案的设计取决于露头或其他适合采样的材料的可用性（图1.2）。在采石场采样通常导致聚集数据，而沿着道路切面、海岸悬崖或陡峭峡谷采样则导致一维横断面采样方案。在露头100%出露或没有经济限制的情况下，可以设计更均匀的采样模式。规则采样方案导致样本位置呈网格状分布，而均匀采样策略则包括在网格方块内随机设置采样点。尽管这些采样方案可能被认为是更优的样本收集方法，但等间距的采样位置往往会遗漏该区域的小尺度变化，例如花岗岩体内的薄基性岩脉或某种特定化石在空间上的有限分布。


    正确的采样策略取决于调查目标、所需的分析类型以及对结果的期望置信水平。一旦选择了合适的采样策略，样本的质量可能受到多种因素的影响，从而导致样本不能真正代表更大的总体。化学或物理蚀变、其他材料的污染，或自然及人为过程的位移都可能导致错误的结果和解释。因此，建议在调查的每个阶段都测试样本质量、所采用的数据分析方法以及从分析中得出的结论的有效性。


    ### 1.3 数据类型


    大多数地球科学数据集由数值测量组成，尽管一些信息，如化石和矿物，也可以用名称列表来表示（图1.3）。可用的数据分析方法可能需要地球科学中的某些数据类型。这些数据类型包括：


    - *名义数据*——地球科学中的信息有时以名称列表的形式呈现，例如从石灰岩层中采集的各种化石物种，或在岩石薄片中鉴定出的矿物。在一些研究中，这些数据被转换为二进制表示，即存在为*1*，不存在为*0*。有特殊的统计方法可用于分析此类数据集。

    - *序数数据*——这些是数值数据，代表可以排序的观测值，但其尺度上的间隔是不规则的。德国矿物学家弗里德里希·莫斯（1773-1839）创建的硬度等级就是序数尺度的一个例子。硬度值表示材料抵抗划痕的能力。钻石的硬度为10，而滑石的值为1，但就绝对硬度而言，钻石（硬度10）比刚玉（硬度9）硬四倍，比黄玉（硬度8）硬六倍。试图对地震影响进行分类的修订麦加利地震烈度表是序数尺度的另一个例子，它将地震从烈度I（几乎感觉不到）到烈度XII（完全摧毁）进行排序（Richter
    1958）。

    - *比率数据*——这些数据的特点是连续区间的长度恒定，因此比序数数据具有很大优势。零点是数据尺度的自然终点。这种类型的数据允许离散或连续的数据采样。此类数据集的例子包括长度和重量数据。

    - *区间数据*——这些是有序数据，具有恒定的连续区间长度，但其数据尺度不以零为终点。摄氏度和华氏度的温度代表了这种数据类型的一个例子，尽管两种尺度都存在任意的零点。这种类型的数据可以连续采样或以离散区间采样。


    除了这些标准数据类型外，地球科学家经常遇到特殊类型的数据，例如：


    - *封闭数据*——这些数据表示为总和为固定总数（如100%）的比例。成分数据（例如岩石样本的元素组成）构成了封闭数据的大部分。

    - *空间数据*——这些数据是在二维或三维研究区域中收集的。某种化石物种的空间分布、砂岩层厚度的空间变化以及地下水中示踪剂浓度的分布都是这种数据类型的例子，这可能是地球科学中最重要的数据类型。

    - *方向数据*——这些数据以角度表示。例子包括岩层的走向和倾向、细长化石的定向以及熔岩的流动方向。这是地球科学中另一种非常常见的数据类型。


    大多数这些不同类型的数据需要专门的分析方法，其中一些将在下一节中概述。


    ### 1.4 数据分析方法


    数据分析利用小样本的精确特征来推断感兴趣的一般现象。确定使用哪种特定方法来分析数据取决于数据类型和项目要求。可用的各种方法包括：


    - *单变量方法*——假设每个变量独立于其他变量，并单独进行探索。数据以数字列表的形式呈现，代表标度线上的一系列点。单变量统计方法包括收集有关变量的信息，例如最小值和最大值、平均值以及围绕平均值的离散度。然后利用这些信息来推断导致数据变化的潜在过程。例子包括化学风化对火山玻璃碎片钠含量的影响，以及特定环境因素对沉积层内蜗牛壳大小的影响。

    - *双变量方法*——同时研究两个变量以检测它们之间的关系。例如，可以计算相关系数以研究两个变量之间是否存在线性关系。或者，可以使用双变量回归分析来寻找'
