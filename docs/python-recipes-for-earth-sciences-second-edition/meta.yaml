    # 10.5 Testing for the Randomness of Circular Data


    The first test for directional data compares the data set with a uniform distribution.
    Directional data that follow a uniform distribution are purely random (i.e., there
    is no preference for any one direction). We use the $\chi^2$-test (Sect. 3.8)
    to compare the empirical frequency distribution with the theoretical uniform distribution.
    We first load our sample data:


    ```

    import numpy as np

    from scipy import stats

    import matplotlib.pyplot as plt


    data_degrees_1=np.loadtxt(''directional_1.txt'')

    ```


    We then use `histogram()` to count the number of observations within 12 classes,
    each of which has a width of 30°:


    ```

    e=np.linspace(0,360,13)

    counts, e=np.histogram(data_degrees_1,bins=e)

    ```


    The expected number of observations is 200/12, where 200 is the total number of
    observations and 12 is the number of classes:


    ```

    expect=200/12*np.ones(12)

    ```


    The $\chi^2$-test explores the squared differences between the observed and expected
    frequencies. The quantity $\chi^2$ is defined as the sum of these squared differences
    divided by the expected frequencies,


    ```

    chi2cal=np.sum((counts-expect)**2/expect)

    print(chi2cal)

    ```'
