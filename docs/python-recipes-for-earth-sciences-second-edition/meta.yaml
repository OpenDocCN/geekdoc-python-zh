    \n然后使用`curve_fit`函数分析合成数据集。我们首先拟合一个具有四个参数a、b、c和d的sigmoid函数\n\n```python\ndef func1(x,a,b,c,d):\n\
    \    return a+b*((1+np.exp(-d*(x-c)))**(-1))\n```\n\n然后我们使用`curve_fit`在最小二乘意义上找到a、b、c和d的最佳值，\n\
    \n```python\npopt1,pcov1=curve_fit(func1,data1,data2)\nprint(popt1)\n```\n\n得到\n\
    \n```\n[1.0061 -0.9890 51.5734 -0.3652]\n```\n\n接下来，我们使用相同的函数将斜坡函数拟合到数据。由于没有现成的斜坡函数可用，我们输入\n\
    \n```python\ndef func2(x,t1,t2,x1,x2):\n    y=np.zeros(len(x))\n    for i in range(0,len(x)):\n\
    \        if x[i]<t1:\n            y[i]=x1\n```"
