    # Signal Processing


    # 6


    # 6.1 Introduction


    Signal processing involves techniques for manipulating a signal in order to minimize
    the effects of noise, to correct all kinds of unwanted distortions, and to separate
    out various components of interest. Most signal processing algorithms include
    the design and realization of filters. A *filter* can be described as a system
    that transforms signals. *System theory* provides the mathematical background
    for filter design and realization. A filter has an input and an output, with the
    *output signal y(t)* being modified with respect to the *input signal x(t)* (Fig.
    6.1). The *signal transformation* can be carried out through a mathematical process
    known as *convolution* or–if filters are involved–as *filtering*.


    This chapter deals with the design and realization of *digital filters* with the
    help of a computer. However, many natural processes resemble *analog filters*
    that record natural events in geological archives. A single rainfall event is
    not documented in lake sediments because the short duration and low-amplitude
    signal of the event in the sediments (e.g., a short-term change in the chemical
    composition of the sediments) are strongly attenuated in the well-mixed water
    body before they are archived in the sediments. Bioturbation also introduces serious
    signal distortions (e.g., changes in the amplitude and phase of the signal), such
    as in deep sea sediments, where it leads to apparent phase shifts in the oxygen
    isotope signal of individual foraminifera species (e.g., Trauth 2013). In addition
    to such natural filters, the field collection and sampling of geological data
    alters and smooths the data with respect to its original form. For example, a
    finite sized sediment sample is integrated over a certain period of time, which
    smooths the natural signal.


    **Supplementary Information** The online version contains supplementary material
    available at https://doi.org/10.1007/978-3-031-56906-7_6.


    © The Author(s), under exclusive license to Springer Nature Switzerland AG 2024

    M. H. Trauth, *Python Recipes for Earth Sciences*, Springer Textbooks in Earth
    Sciences, Geography and Environment, https://doi.org/10.1007/978-3-031-56906-7_6'
- md: "Similarly, the measurement of magnetic susceptibility in a sediment core with\
    \ the help of a loop sensor introduces substantial smoothing since the loop response\
    \ is integrated over a section of the core.\n\nThe characteristics of these natural\
    \ filters are often difficult to determine, whereas numerical filters are designed\
    \ with well-defined characteristics. In addition, artificial filters are time\
    \ invariant in most cases, whereas natural filters (e.g., mixing within the water\
    \ body of a lake or bioturbation at the water–sediment interface) may vary with\
    \ time. An easy way of describing or predicting the effect of a filter is by exploring\
    \ the output signal of a simple input signal, such as a sine wave, a square wave,\
    \ a sawtooth function, a ramp function, or a step function. Although there is\
    \ an endless variety of such input signals, most systems or filters are described\
    \ by their impulse response, that is, by the output signal resulting from a unit\
    \ impulse as the input signal.\n\nThis chapter proceeds with Sect. 6.2 on generating\
    \ periodic signals, trends, and noise, which takes its cue from Sec. 5.2 of the\
    \ previous chapter. Sect. 6.3 then considers linear time invariant systems and\
    \ provides a mathematical background for filters. The subsequent Sect. 6.4 to\
    \ 6.9 deal with the design, realization, and application of linear time invariant\
    \ filters. Sect. 6.10 considers the use of adaptive filters, which were originally\
    \ developed for use in the telecommunications industry. These adaptive filters\
    \ automatically extract noise-free signals from duplicate measurements of the\
    \ same object. Such filters can be used in a large number of applications, such\
    \ as in removing noise from duplicate paleoceanographic time series and in improving\
    \ the signal-to-noise ratio of parallel color intensity transects across varved\
    \ lake sediments (see Chap. 5, Fig. 5.1). Adaptive filters are also widely used\
    \ in geophysics for noise canceling. For signal processing, we use the NumPy (https://numpy.org)\
    \ and Matplotlib (https://matplotlib.org) packages, and the SciPy (https://scipy.org)\
    \ library, which contain all the necessary routines.\n\n## 6.2 Generating Signals\n\
    \nPython provides numerous tools for generating basic signals that can be used\
    \ to illustrate the effects of filters. In Chap. 5, we generated a signal by adding\
    \ together three sine waves with different amplitudes and periods:\n\n```python\n\
    import numpy as np\nimport matplotlib.pyplot as plt\n\nt = np.linspace(1, 100,\
    \ 100)\nx = 2 * np.sin(2 * np.pi * t / 50) + \\\n    np.sin(2 * np.pi * t / 10)\
    \ + \\\n    0.5 * np.sin(2 * np.pi * t / 5)\n\nplt.figure()\nplt.plot(t, x)\n\
    plt.axis(np.array([0, 100, -4, 4]))\nplt.show()\n```\n\nFrequency selective filters\
    \ are used to remove specific frequency bands from the data. As an example, we\
    \ can design a filter that suppresses the portion of the signal with a periodicity\
    \ of τ=10 while leaving the other two cycles unaffected. The effects of such filters\
    \ on simple periodic signals can also be used to predict signal distortions caused\
    \ by natural filters.\n\nA *step function* is another basic input signal that\
    \ can be used to explore filter characteristics. Step functions describe the transition\
    \ from a value of one toward a value of zero at a specific time. The function\
    \ `step()` draws a stairstep graph of the elements of x.\n\n```python\nt = np.linspace(1,\
    \ 100, 100)\nx = np.ones(100)\nx[50:100] = np.zeros(50)\n\nplt.figure()\nplt.step(t,\
    \ x)\nplt.axis(np.array([0, 100, -2, 2]))\nplt.show()\n```\n\nThis signal can\
    \ be used to study the effects of a filter on a sudden transition. An abrupt climate\
    \ change could be regarded as an example. Most natural filters tend to smooth\
    \ such a transition and to distribute it over a longer time period.\n\nA *unit\
    \ impulse* is the third important signal type that we use in the following examples.\
    \ This signal equals zero at all times except at a single data point, where it\
    \ equals one. The function `stem()` plots the data sequence x as stems from the\
    \ t-axis using circles for the data values:\n\n```python\nt = np.linspace(1, 100,\
    \ 100)\nx = np.zeros(100)\nx[49] = 1\n\nplt.figure()\nplt.stem(t, x)\nplt.axis(np.array([0,\
    \ 100, -4, 4]))\nplt.show()\n```\n\nThe unit impulse is the most popular synthetic\
    \ signal used to study the performance of a filter. The output signal of the filter\
    \ (i.e., the impulse response) describes the characteristics of the filter very\
    \ well. Moreover, the output signal of a linear time invariant filter can be described\
    \ by the superposition of impulse responses that have been scaled by multiplying\
    \ the output signal of the filter by the amplitude of the input signal.\n\n##\
    \ 6.3 Linear Time Invariant Systems\n\nFilters can be described as systems with\
    \ an input $x(t)$ and an output $y(t)$. We therefore first describe the characteristics\
    \ of systems in general before subsequently considering filters. Important characteristics\
    \ of a system include\n\n- *continuity* – A system with continuous input $x(t)$\
    \ and output $y(t)$ is a continuous system. Most natural systems are continuous.\
    \ However, after sampling natural signals, we obtain discrete data series and\
    \ model these natural systems as discrete systems with discrete input signals\
    \ and output signals.\n- *linearity* – For linear systems, the output signal $y(t)$\
    \ of the linear combination of several input signals $x_i(t)$ where\n\n$$x(t)\
    \ = k_1x_1(t) + k_2x_2(t)$$\n\nis the same as the linear combination of the output\
    \ signals $y_i(t)$:\n\n$$y(t) = k_1y_1(t) + k_2y_2(t)$$\n\nImportant properties\
    \ of linearity are scaling and additivity (*superposition*), which allow the input\
    \ signal and output signal to be multiplied by a constant $k_i$ either before\
    \ or after transformation. Superposition allows additive components of the input\
    \ signal to be extracted and transformed separately. Fortunately, many natural\
    \ systems follow a linear pattern of behavior. Complex linear signals (e.g., additive\
    \ harmonic components) can be separated out and transformed independently. Milankovitch\
    \ cycles provide an example of linear superposition in paleoclimate records, although\
    \ there is an ongoing debate about the validity of this theory. Numerous nonlinear\
    \ systems that do not possess the properties of scaling and additivity also exist\
    \ in nature. An example of a linear system is\n\n```python\nimport numpy as np\n\
    import matplotlib.pyplot as plt\nx = np.linspace(1, 100, 100)\ny = 2 * x\n\nplt.figure()\n\
    plt.plot(x, y)\nplt.show()\n```\n\nwhere x is the input signal and y is the output\
    \ signal. An example of a nonlinear system is\n\n```python\nx = np.linspace(1,\
    \ 100, 100)\ny = x**2\n\nplt.figure()\nplt.plot(x, y)\nplt.show()\n```\n\n- *time\
    \ invariance* – The output signal y(t) does not change as a result of a delay\
    \ in the input signal x(t+i); instead, the system characteristics remain constant\
    \ over time. Unfortunately, natural systems often change their characteristics\
    \ over time. For instance, benthic mixing (or bioturbation) depends on various\
    \ environmental variables (e.g., nutrient supply), and the system's properties\
    \ consequently vary over time. In such a case, it is difficult to determine the\
    \ actual input signal of the system using the output signal (e.g., when extracting\
    \ the actual climate signal from a bioturbated sedimentary record).\n- *invertibility*\
    \ – An invertible system is a system in which the original input x(t) can be reproduced\
    \ from the system's output y(t). This is an important property if unwanted signal\
    \ distortions are to be corrected, in which case the known system is inverted,\
    \ and the output signal is then used to reconstruct the undisturbed input signal.\
    \ For example, a core logger that measures magnetic susceptibility with a loop\
    \ sensor integrates the signal over a specific core interval; the sensitivity\
    \ is highest at the position of the loop and decreases both down-core and up-core.\
    \ This system is invertible, that is, we can compute the input signal x(t) from\
    \ the output signal y(t) by inverting the system. The inverse of the linear system\
    \ above is\n\n```python\nx = np.linspace(1, 100, 100)\ny = 0.5 * x\n\nplt.figure()\n\
    plt.plot(x, y)\nplt.show()\n```"
