- md: '## 10.1 Introduction


    Methods for analyzing *circular and spherical data* are widely used in the earth
    sciences. Structural geologists, for example, measure and analyze the orientation
    of striated slickensides on fault planes. Circular statistics is also commonly
    used in paleomagnetic applications. Microstructural investigations include analyzing
    grain shapes and quartz *c*-axis orientations in thin sections, and paleoenvironmentalists
    reconstruct paleocurrent directions from the alignments of elongated fossil shells
    (Fig. 10.1). There are two types of directional data in the earth sciences: directional
    data sensu stricto and oriented data. Directional data (e.g., the paleocurrent
    direction of a river as documented by flute marks, or the flow direction of a
    glacier as indicated by glacial striae) have a true polarity, whereas oriented
    data describe axial data and lines (e.g., the orientation of joints) without any
    sense of direction.


    A number of useful publications are available on the statistical analysis of directional
    data, such as the books by Fisher (1993) and Mardia and Jupp (1999) as well as
    chapters on the subject in the books by Swan and Sandilands (1995) and Davis (2002).
    Python is not the first choice for analyzing directional data since it does not
    provide the relevant functions, such as algorithms that can be used to compute
    the probability density function of a *von Mises distribution* or to run Rayleigh''s
    test for the significance of a mean direction. Earth scientists have therefore
    developed numerous stand-alone programs with which to analyze such data, including
    the excellent desktop and smartphone software developed by Richard W. Allmendinger,
    structural geologist and professor emeritus at Cornell University (Allmendinger
    et al. 2017; Allmendinger 2019),


    **Supplementary Information** The online version contains supplementary material
    available at https://doi.org/10.1007/978-3-031-56906-7_10.


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_476_0.png)


    **Fig. 10.1** *Orthoceras* fossils from an outcrop at Neptuni Acrar near Byxelkrok
    on Öland, Sweden. *Orthoceras* is a cephalopod with a straight shell that lived
    in the Ordovician era about 450 million years ago. Such elongated, asymmetric
    objects tend to orient themselves in the most hydrodynamically stable position
    and therefore indicate paleocurrent directions. The statistical analysis of cephalopod
    orientations at Neptuni Acrar reveals a significant southerly paleocurrent direction,
    which is in line with paleogeographic reconstructions.


    http://www.geo.cornell.edu/geology/faculty/RWA/programs.html


    and Néstor Cardozo, who did his PhD with Allmendinger and is now at the University
    of Stavanger:


    http://www.ux.uis.no/~nestor/work/programs.html


    On Cardozo''s website, we can also find numerous MATLAB functions from the book
    *Structural Geology Algorithms* by Allmendinger and Cardozo together with Donald
    M. Fisher (Allmendinger et al. 2012). Another interesting collection of MATLAB
    functions for directional data can be found in Philipp Berens'' Circular Statistics
    Toolbox, available for download from the MATLAB File Exchange (Berens 2009).


    The following tutorial on the analysis of directional data is independent of these
    tools. It provides simple Python codes for displaying directional data, for computing
    the von Mises distribution, and for running simple statistical tests. Section
    10.2 introduces rose diagrams as the most widely used method for displaying directional
    data. Subsequently, Sects. 10.3 and 10.4 have a similar concept to Chap. 3 (on
    univariate statistics) and cover the use of empirical and theoretical distributions
    for describing directional data. Then, Sects. 10.5 to 10.7 describe the three
    most important tests for directional data: namely tests for the randomness of
    circular data, for the significance of a mean direction, and for the difference
    between two sets of circular data. Finally, Sects. 10.8 and 10.9 describe the
    graphical representation and statistics of spherical data. For the analysis of
    directional data, we use the *NumPy* (https://numpy.org) and *Matplotlib* packages
    (https://matplotlib.org), and the *SciPy* library (https://scipy.org), which contain
    all the necessary routines.


    ## 10.2 The Graphical Representation of Circular Data


    The classic way of displaying directional data is in a rose diagram, which is
    a histogram for measurements of angles. In contrast to a bar histogram, in which
    the height of the bars is proportional to the frequency, a rose diagram comprises
    segments of a circle in which the radius of each sector is proportional to the
    frequency. We use synthetic data to illustrate two types of rose diagrams that
    are used to display directional data. We first load a set of directional data
    from the file *directional_1.txt*:


    ```python

    import numpy as np

    import matplotlib.pyplot as plt


    data_degrees_1=np.loadtxt(''directional_1.txt'')

    ```


    The data set contains two hundred measurements of angles (in degrees, or °, for
    short). We need to convert all measurements into radians before plotting the data.
    We then bin the data using `histogram()` and display the counts in a rose diagram.
    This is achieved by first selecting the polar projection in `subplot()` and then
    plotting a bar chart in the polar coordinate system:


    ```python

    data_radians_1=np.pi*data_degrees_1/180


    e=np.linspace(0,2*np.pi,13)

    v=np.linspace(2*np.pi/24,2*np.pi-2*np.pi/24,12)

    n,e=np.histogram(data_radians_1,bins=e)

    ```


    ```python

    plt.figure()

    ax=plt.subplot(projection=''polar'')

    ax.bar(v,n,width=2*np.pi/12)

    ax.set_xticks(e[0:12])

    plt.show()

    ```


    This rose diagram counts in a counterclockwise direction, with zero degrees lying
    along the x-axis of the coordinate graph. In the earth sciences, the angles increase
    in a clockwise direction, with 0° indicating due north, 90° indicating due east,
    and so on. We use set_theta_offset(np.pi/2) to rotate the rose diagram by 90°
    (or π/2) and set_theta_direction(-1) to reverse the direction of the rose diagram.
    We also select the ticks at the values of the class boundaries e (i.e., 0°, 30°,
    60°, ...) using set_xticks() (Fig. 10.2):


    ```python

    plt.figure()

    ax=plt.subplot(projection=''polar'')

    ax.bar(v,n,width=2*np.pi/12)

    ax.set_xticks(e[0:12])

    ax.set_theta_offset(np.pi/2)

    ax.set_theta_direction(-1)

    plt.show()

    ```


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_478_0.png)


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_479_0.png)


    Fig. 10.3 Modification of the rose diagram scaled to the square root of the class
    frequency. This modification avoids increasing the area of the arc segments with
    the increasing square of the frequency and thus also avoids causing directions
    that are twice as frequent as others to appear to be four times as frequent as
    the others.


    The area of the arc segments increases with the increasing square of the frequency,
    and directions that are twice as frequent as others thus appear to be four times
    as prominent as the others. In a modification the rose diagram is therefore scaled
    to the square root of the class frequency (Fig. 10.3):


    ```python

    plt.figure()

    ax=plt.subplot(projection=''polar'')

    ax.bar(v,np.sqrt(n),width=2*np.pi/12)

    ax.set_xticks(e[0:12])

    ax.set_theta_offset(np.pi/2)

    ax.set_theta_direction(-1)

    plt.show()

    ```


    This plot satisfies all conventions in the earth sciences.


    ## 10.3 Empirical Distributions of Circular Data


    This section introduces the statistical measures used to describe empirical distributions
    of directional data. The characteristics of directional data are described by
    measures of central tendency and dispersion, which is similar to the statistical
    characterization of univariate data sets (Chap. 3). Let us assume that we have
    collected a number of angular measurements, such as fossil alignments. The collection
    of data can be written as


    $$\theta_1, \theta_2, \theta_3, \ldots, \theta_n$$


    which contains $n$ observations $\theta_i$. Sine and cosine values are computed
    for each direction $\theta_i$ and are then used to compute the *resultant (or
    mean) direction* for the set of angular data (Fisher 1993; Mardia and Jupp 1999):


    $$x_r = \sum \sin \theta_i$$


    $$y_r = \sum \cos \theta_i$$


    The resultant direction of the data set is


    $$\overline{\theta} = \tan (x_r / y_r)$$


    and the resultant length is


    $$R = \sqrt{(x_r^2 + y_r^2)}$$


    The resultant length clearly depends on the dispersion of the data. Normalizing
    the resultant length to the number of observations yields the mean resultant length:


    $$\overline{R} = R/n$$


    The value of the mean resultant length decreases with increasing dispersion (Fig.
    10.4). The *circular variance* is then the difference between one and the mean
    resultant length and is therefore often used as a measure of dispersion for directional
    data:


    $$\sigma_0 = 1 - \overline{R}$$


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_480_0.png)


    **Fig. 10.4** The resultant length $R$ of a sample decreases with increasing dispersion
    of the data $\theta_i$. Modified from Swan and Sandilands (1995).'
  mdcn: '## 10.1 引言


    分析*圆形和球形数据*的方法在地球科学中应用广泛。例如，构造地质学家会测量和分析断层面上条痕擦痕的走向。圆形统计学也常用于古地磁研究。微观结构研究包括分析薄片中的颗粒形状和石英*c*轴取向，而古环境学家则通过拉长的化石壳体的排列方向来重建古水流方向（图10.1）。地球科学中的方向数据有两种类型：狭义的方向数据和定向数据。方向数据（例如，由槽模记录的河流古流向，或由冰川擦痕指示的冰川流动方向）具有真实的极性，而定向数据描述的是没有方向感的轴向数据和线（例如，节理的走向）。


    关于方向数据的统计分析，已有许多有用的出版物可供参考，例如Fisher（1993）以及Mardia和Jupp（1999）的著作，以及Swan和Sandilands（1995）和Davis（2002）著作中关于该主题的章节。Python并非分析方向数据的首选工具，因为它不提供相关功能，例如可用于计算*冯·米塞斯分布*概率密度函数或运行雷利检验以确定平均方向显著性的算法。因此，地球科学家开发了众多独立程序来分析此类数据，包括由康奈尔大学荣休教授、构造地质学家Richard
    W. Allmendinger开发的优秀桌面和智能手机软件（Allmendinger等，2017；Allmendinger，2019），


    **补充信息** 在线版本包含补充材料，可访问 https://doi.org/10.1007/978-3-031-56906-7_10。


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_476_0.png)


    **图 10.1** 来自瑞典厄兰岛Byxelkrok附近Neptuni Acrar露头的*直角石*化石。*直角石*是一种生活在约4.5亿年前奥陶纪的、具有直壳的头足类动物。这种细长、不对称的物体倾向于以最稳定的水动力位置定向，因此可以指示古水流方向。对Neptuni
    Acrar头足类动物取向的统计分析揭示了一个显著的向南古水流方向，这与古地理重建结果一致。


    http://www.geo.cornell.edu/geology/faculty/RWA/programs.html


    以及Néstor Cardozo，他曾与Allmendinger合作攻读博士学位，现任职于斯塔万格大学：


    http://www.ux.uis.no/~nestor/work/programs.html


    在Cardozo的网站上，我们还可以找到Allmendinger、Cardozo与Donald M. Fisher合著的《构造地质学算法》一书中的众多MATLAB函数（Allmendinger等，2012）。另一个关于方向数据的有趣MATLAB函数集合可以在Philipp
    Berens的圆形统计工具箱中找到，可从MATLAB文件交换中心下载（Berens，2009）。


    以下关于方向数据的分析教程独立于这些工具。它提供了用于显示方向数据、计算冯·米塞斯分布以及运行简单统计检验的简单Python代码。第10.2节介绍了作为最广泛使用的方向数据显示方法的玫瑰图。随后，第10.3和10.4节与第3章（关于单变量统计）的概念类似，涵盖了使用经验分布和理论分布来描述方向数据。然后，第10.5至10.7节描述了方向数据的三个最重要的检验：即圆形数据的随机性检验、平均方向的显著性检验以及两组圆形数据之间的差异检验。最后，第10.8和10.9节描述了球形数据的图形表示和统计。对于方向数据的分析，我们使用*NumPy*（https://numpy.org）和*Matplotlib*包（https://matplotlib.org），以及*SciPy*库（https://scipy.org），它们包含了所有必要的例程。


    ## 10.2 圆形数据的图形表示


    显示方向数据的经典方式是玫瑰图，它是角度测量的直方图。与条形直方图（其中条形的高度与频率成正比）不同，玫瑰图由圆的扇形组成，每个扇形的半径与频率成正比。我们使用合成数据来说明用于显示方向数据的两种类型的玫瑰图。我们首先从文件*directional_1.txt*加载一组方向数据：


    ```python

    import numpy as np

    import matplotlib.pyplot as plt


    data_degrees_1=np.loadtxt(''directional_1.txt'')

    ```


    该数据集包含两百个角度测量值（以度为单位，简称°）。在绘制数据之前，我们需要将所有测量值转换为弧度。然后，我们使用`histogram()`对数据进行分箱，并在玫瑰图中显示计数。这是通过首先在`subplot()`中选择极坐标投影，然后在极坐标系中绘制条形图来实现的：


    ```python

    data_radians_1=np.pi*data_degrees_1/180


    e=np.linspace(0,2*np.pi,13)

    v=np.linspace(2*np.pi/24,2*np.pi-2*np.pi/24,12)

    n,e=np.histogram(data_radians_1,bins=e)

    ```


    ```python

    plt.figure()

    ax=plt.subplot(projection=''polar'')

    ax.bar(v,n,width=2*np.pi/12)

    ax.set_xticks(e[0:12])

    plt.show()

    ```


    这个玫瑰图按逆时针方向计数，零度位于坐标图的x轴上。在地球科学中，角度按顺时针方向增加，0°表示正北，90°表示正东，依此类推。我们使用set_theta_offset(np.pi/2)将玫瑰图旋转90°（或π/2），并使用set_theta_direction(-1)反转玫瑰图的方向。我们还使用set_xticks()选择类边界值e（即0°、30°、60°、...）处的刻度（图10.2）：


    ```python

    plt.figure()

    ax=plt.subplot(projection=''polar'')

    ax.bar(v,n,width=2*np.pi/12)

    ax.set_xticks(e[0:12])

    ax.set_theta_offset(np.pi/2)

    ax.set_theta_direction(-1)

    plt.show()

    ```


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_478_0.png)


    ![](img/f64e7e52658f332a1ff43bb13764e42_479_0.png)


    图 10.3 按类频率的平方根缩放的玫瑰图的修改。这种修改避免了弧形段的面积随频率的平方增加而增加，从而也避免了使频率是其他方向两倍的方向看起来是其他方向的四倍。


    弧形段的面积随频率的平方增加而增加，因此频率是其他方向两倍的方向看起来比其他方向突出四倍。因此，在一种修改中，玫瑰图按类频率的平方根缩放（图10.3）：


    ```python

    plt.figure()

    ax=plt.subplot(projection=''polar'')

    ax.bar(v,np.sqrt(n),width=2*np.pi/12)

    ax.set_xticks(e[0:12])

    ax.set_theta_offset(np.pi/2)

    ax.set_theta_direction(-1)

    plt.show()

    ```


    此图满足地球科学中的所有惯例。


    ## 10.3 圆形数据的经验分布


    本节介绍用于描述方向数据经验分布的统计度量。方向数据的特征由集中趋势和离散度的度量来描述，这与单变量数据集的统计表征（第3章）类似。假设我们收集了一些角度测量值，例如化石排列方向。数据集合可以写成


    $$\theta_1, \theta_2, \theta_3, \ldots, \theta_n$$


    其中包含$n$个观测值$\theta_i$。为每个方向$\theta_i$计算正弦和余弦值，然后用于计算角度数据集的*合向量（或平均）方向*（Fisher，1993；Mardia和Jupp，1999）：


    $$x_r = \sum \sin \theta_i$$


    $$y_r = \sum \cos \theta_i$$


    数据集的合向量方向为


    $$\overline{\theta} = \tan (x_r / y_r)$$


    合向量长度为


    $$R = \sqrt{(x_r^2 + y_r^2)}$$


    合向量长度显然取决于数据的离散度。将合向量长度除以观测数进行归一化，得到平均合向量长度：


    $$\overline{R} = R/n$$


    平均合向量长度的值随离散度的增加而减小（图10.4）。*圆形方差*是1与平均合向量长度之差，因此常被用作方向数据的离散度度量：


    $$\sigma_0 = 1 - \overline{R}$$


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_480_0.png)


    **图 10.4** 样本的合向量长度$R$随数据$\theta_i$离散度的增加而减小。修改自Swan和Sandilands（1995）。'
