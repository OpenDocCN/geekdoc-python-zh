    \ close to the origin therefore yield similar kriging results if the sampling\
    \ points are regularly distributed. However, if the objective is to describe the\
    \ spatial structures, the situation is quite different. It then becomes important\
    \ to find a model that is suitable over all lags and to accurately determine the\
    \ sill and the range. A collection of geological case studies in Rendu and Readdy\
    \ (1982) shows how process knowledge and variography can be interlinked. Good\
    \ guidelines for variogram modeling are provided by Gringarten and Deutsch (2001)\
    \ and by Webster and Oliver (2007).\n\nWe next briefly discuss a number of other\
    \ aspects of variography:\n\n![Fig. 7.21 Variogram estimator (blue circles), population\
    \ variance (red line), as well as spherical, exponential, and linear models (yellow,\
    \ purple, and green lines, respectively).](img/f6c4e7e52658f332a1ff43bb13764e42_345_0.png)\n\
    \n- *sample size* – As in any statistical procedure, the largest possible sample\
    \ is required in order to obtain a reliable estimate. For variography, the number\
    \ of samples should be greater than 100 (and ideally, greater than 150) (Webster\
    \ and Oliver 2007). For smaller sample numbers, a maximum likelihood variogram\
    \ should be computed (Pardo-Igúzquiza and Dowd 1997).\n- *sampling design* – In\
    \ order to obtain a good estimation close to the origin of the variogram, the\
    \ sampling design should include observations over small distances. This can be\
    \ achieved by means of a nested design (Webster and Oliver 2007). Other possible\
    \ designs have been evaluated by Olea (1984).\n- *anisotropy* – Thus far, we have\
