    \ Python 中的数据类型\n\n在计算机上，我们使用有限数量（例如 32 或 64 位）的零和一来描述数字，即所谓的二进制系统。因此，可表示的数字总数是有限的，这与实数的无限总数形成对比。在一个\
    \ 64 位系统中，有 2^64（或约 1.8447·10^19）个不同的数字。这些浮点数的排列方式使得在零附近的密度最大，并向负无穷和正无穷方向递减，以支持精度和范围之间的权衡。\n\
    \n为了演示实数和浮点数之间的区别，考虑 x=4/3 的值，我们可以将其写为 1.3333333...（即一个无限循环小数 3）。我们可以在 Python\
    \ 中输入以下代码来表示 4/3：\n\n```\nimport numpy as np\nimport matplotlib.pyplot as plt\n\
