    +   - *time series analysis*—These methods investigate data sequences as a function
    of time. The time series is decomposed into a long-term trend, a systematic component
    (e.g., periodic, cyclic, rhythmic), and an irregular component (e.g., random,
    stochastic). A widely used technique for describing the cyclic components of a
    time series is spectral analysis. Examples of the application of these techniques
    include investigations of cyclic climatic variations in sedimentary rocks and
    analyses of seismic data.

    - *signal processing*—This method includes all techniques used for manipulating
    a signal in order to minimize the effects of noise with the aim of correcting
    all kinds of unwanted distortions or of separating various components of interest.
    Signal processing includes designing and realizing filters as well as the application
    the application of these filters to the data. These methods are widely used in
    combination with time series analysis, for example, to increase the signal-to-noise
    ratio in climate time series, in digital images, or in geophysical data.

    - *spatial analysis*—This is the analysis of variables in 2D or 3D space, and
    two or three of the required variables are hence coordinate numbers. Spatial analysis
    includes descriptive tools for investigating the spatial patterns of geographically
    distributed data. Other techniques involve using spatial regression analysis to
    detect spatial trends. Spatial analysis also includes 2D and 3D interpolation
    techniques, which help to estimate surfaces that represent the predicted continuous
    distribution of the variable throughout an area. Examples include analyzing drainage
    systems, identifying old landscape forms, and analyzing lineaments in tectonically
    active regions.

    - *image processing*—Processing and analyzing images have become increasingly
    important activities in the earth sciences. These methods involve importing &
    exporting, compressing & decompressing, and displaying images. Image processing
    also aims to enhance images for improved intelligibility and to manipulate images
    in order to increase the signal-to-noise ratio. Advanced techniques are used to
    extract specific features or to analyze shapes and textures, such as for counting
    mineral grains or fossils in microscopic images. Another important application
    of image processing lies in the use of satellite remote sensing to map certain
    types of rocks, soils, and vegetation as well as to measure other variables, such
    as soil moisture, rock weathering, and erosion.

    - *multivariate analysis*—These methods involve observing and analyzing more than
    one statistical variable at a time. Since graphically representing multidimensional
    data sets is difficult, most of these methods include dimension reduction. Multivariate
    methods are widely used with geochemical data, such as in tephrochronology, in
    which volcanic ash layers are correlated via the geochemical fingerprinting of
    glass shards. Another important use lies in comparing species assemblages in ocean
    and lake sediments for reconstructing paleoenvironments.'
