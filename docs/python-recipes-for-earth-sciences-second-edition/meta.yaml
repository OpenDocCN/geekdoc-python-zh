    \ A TIFF should be able to perform on all computer platforms; unfortunately, however,\
    \ numerous modifications to the TIFF have evolved in subsequent years, resulting\
    \ in incompatibilities. The TIFF is therefore now often jokingly referred to as\
    \ the *Thousands of Incompatible File Formats*.\n- *PostScript* (PS) and *Encapsulated\
    \ PostScript* (EPS)–The PS format was developed by John Warnock at PARC, the Xerox\
