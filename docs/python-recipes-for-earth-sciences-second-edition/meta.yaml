    ax[2].set_title(''IC3'')

    ax2 = ax[2].twinx()

    ax2.plot(-s2, ''C1'')

    plt.show()

    ```


    ICA identifies the source signals almost perfectly. We can also notice that the
    descending order of the ICs is different from the initial order of s1, s2, and
    s3 due to the commutativity of addition. In real-world examples, of course, the
    order of the ICs is not relevant. Furthermore, the exact signs and amplitudes
    do not match the original values, and ICA therefore yields only semi-quantitative
    results, as was also the case for PCA. Finally, we can actually compute the mixing
    matrix a_ica and the separation matrix w_ica using


    ```

    a_ica = np.dot(a_pca, B)

    w_ica = np.dot(B.T, w_pca)

    ```


    The mixing matrix a_ica can be used to estimate the proportions of the separated
    variables in our measurements. The components $a_{ij}$ of the mixing matrix a_ica
    correspond to the principal component loadings, which were introduced in Sect.
    9.2.'
