- md: '## 3.9 The χ²-Test


    Karl Pearson''s χ²-test involves comparing distributions, thereby allowing two
    distributions to be tested for derivation from the same population (Pearson 1900).
    This test is independent of the distribution that is used and can therefore be
    utilized to test the hypothesis that the observations were drawn from a specific
    theoretical distribution.


    Let us assume that we have a data set that consists of multiple chemical measurements
    from a sedimentary unit. We could use the χ²-test to test the null hypothesis
    that these measurements can be described by a Gaussian distribution with a typical
    central value and a random dispersion around it. The n data are grouped into K
    classes, where n should be above 30. The frequencies within the classes Oₖ should
    not be lower than four and should certainly never be zero. The appropriate test
    statistic is then


    $$\hat{\chi}^2 = \sum_{k=1}^{K} \frac{(O_k - E_k)^2}{E_k}$$


    where $E_k$ are the frequencies expected from the theoretical distribution (Fig.
    3.15). The null hypothesis can be rejected if the measured χ²-value is higher
    than the critical χ²-value, which depends on the number of degrees of freedom
    $\phi = K-Z$, where $K$ is the number of classes and $Z$ is the number of parameters
    that describe the theoretical distribution plus the number of variables (e.g.,
    $Z=2+1$ for the mean and the variance from a Gaussian distribution of a data set
    for a single variable and $Z=1+1$ for a Poisson distribution for a single variable).


    As an example, we can test the hypothesis that our organic carbon measurements
    that are contained in *organicmatter_one.txt* follow a Gaussian distribution.
    We must first load the data into the workspace and compute the frequency distribution
    n_obs for the data measurements using eight classes:


    ```python

    import numpy as np

    import matplotlib.pyplot as plt

    from scipy import stats


    corg = np.loadtxt(''organicmatter_one.txt'')

    ```


    **Fig. 3.15** Principles of a χ²-test. The null hypothesis that the two distributions
    are identical cannot be rejected if the measured χ² is lower than the critical
    χ². The χ² depends on $\phi = K-Z$, where $K$ is the number of classes and $Z$
    is the number of parameters that describe the theoretical distribution plus the
    number of variables. In the example, the critical χ²(φ=5, α=0.05) is 11.0705.
    Since the measured χ²=5.7602 is below the critical χ², we cannot reject the null
    hypothesis. In our example, we can conclude that the sample distribution is not
    significantly different from a Gaussian distribution.


    ```python

    n_obs,e = np.histogram(corg,bins=8)

    v = np.diff(e[0:2])*0.5+e[0:-1]

    ```


    We then use `norm.pdf()` to create the expected frequency distribution `n_exp`
    with the mean and standard deviation of the data in `corg`:


    ```python

    n_exp = stats.norm.pdf(v,np.mean(corg),np.std(corg,ddof=1))

    ```


    The data need to be scaled so that they are similar to the original data set:


    ```python

    n_exp = n_exp/np.sum(n_exp)

    n_exp = np.sum(n_obs)*n_exp

    ```


    The first command normalizes the observed frequencies `n_exp` to a total of one.
    The second command scales the expected frequencies `n_exp` to the sum of `n_obs`.
    We can now display both histograms for comparison:


    ```python

    plt.figure()

    plt.subplot(1,2,1)

    plt.bar(v,n_obs,color=''r'')

    plt.subplot(1,2,2)

    plt.bar(v,n_exp,color=''b'')

    plt.show()

    ```


    An alternative way of plotting the data in `corg` is to use a normal probability
    plot:


    ```python

    stats.probplot(corg,dist=''norm'',plot=plt)

    ```


    The function `probplot()` plots the data in `corg` with blue circles superimposed
    with a red line, which represents the normal distribution. If the data in `corg`
    are indeed normally distributed, they will all fall on the red line. In our example,
    the data seem to agree well with the line, except for the tails of the normal
    distribution.


    Visually inspecting these plots reveals that the empirical distribution is similar
    to the theoretical distribution. However, we advise using a more quantitative
    approach to test the hypothesis of similarity. The χ²-test explores the squared
    differences between the observed and expected frequencies. The quantity `chi2calc`
    is the sum of the squared differences divided by the expected frequencies. Typing


    ```python

    chi2calc = np.sum((n_obs-n_exp)**2/n_exp)

    print(chi2calc)

    ```


    yields


    ```

    7.285412350787187

    ```


    The critical `chi2crit` value can be calculated using the `chi2inv` value. The
    χ²-test requires the number of degrees of freedom $\phi$. In our example, we test
    the hypothesis that the data have a Gaussian distribution, that is, we estimate
    the two parameters $\mu$ and $\sigma$. The number of degrees of freedom is $\phi
    = 8-(2+1)=5$. We can now test our hypothesis at a 5% significance level. The function
    `chi2.ppf()` computes the inverse of the χ² CDF with parameters specified by $\phi$
    for the corresponding probabilities. Typing


    ```python

    chi2crit = stats.chi2.ppf(1-0.05,5)

    print(chi2crit)

    ```


    yields


    ```

    11.070497693516351

    ```


    Since the critical `chi2crit` value of 11.0705 is well above the measured `chi2calc`
    value of 7.2854, we cannot reject the null hypothesis without another cause. We
    can therefore conclude that our data follow a Gaussian distribution. Alternatively,
    we can apply `chisquare()` to the sample. The command


    ```python

    chisq,p = stats.chisquare(n_obs,n_exp,ddof=0,axis=0)

    print(chisq)

    print(p)

    ```


    yields


    ```

    7.285412350787187

    0.39978002411496866

    ```


    The result means that we cannot reject the null hypothesis without another cause
    at a 5% significance level. The p-value of 0.3998 (or ~40%, which is much greater
    than the significance level) means that the chances of observing either the same
    result or a more extreme result from similar experiments in which the null hypothesis
    is true would be 3,998 in 10,000.


    ## 3.10 The Kolmogorov–Smirnov Test


    The *Kolmogorov–Smirnov* (or *K–S*) *test* (introduced by Andrei N. Kolmogorov
    and Nikolai W. Smirnov) is similar to the χ²-test in that it also involves comparing
    distributions and thereby allows two distributions to be tested for derivation
    from the same population (Kolmogorov 1933, Smirnov 1939). This test is independent
    of the type of distribution that is used and can therefore be used to test the
    hypothesis that the observations were drawn from a specific theoretical distribution.


    Let us again assume that we have a data set that consists of multiple chemical
    measurements from a sedimentary unit. We can use the K-S test to test the null
    hypothesis that these measurements can be described by a Gaussian distribution
    with a typical central value (the mean) and a random dispersion around the mean
    (the standard deviation). The appropriate test statistic is then


    $KS = max|F_n(x) - F(x)|$


    where $F_n(x)$ is the cumulative frequency distribution of the $n$ measurements
    and $F(x)$ is the cumulative frequency distribution expected from the theoretical
    distribution. The null hypothesis can be rejected if the measured $KS$ value is
    higher than the critical $KS$ value.


    As an example, we can again test the hypothesis that our organic carbon measurements
    that are contained in *organicmatter_one.txt* follow a Gaussian distribution.
    We must first load and standardize the data in order to have a mean of zero and
    a standard deviation of one:


    ```python

    import numpy as np

    import matplotlib.pyplot as plt

    from scipy import stats


    corg = np.loadtxt(''organicmatter_one.txt'')

    corg = (corg-np.mean(corg))/np.std(corg,ddof=1)

    ```


    We can then compute the cumulative frequency distribution `cn_obs` of `corg`:


    ```python

    corg = np.sort(corg)

    cn_obs = np.arange(1,len(corg)+1)/len(corg)

    ```


    We next use `norm.cdf()` to create the cumulative frequency distribution that
    is expected from the theoretical distribution `cn_exp` with a mean of zero and
    a standard deviation of one:


    ```python

    cn_exp = stats.norm.cdf(corg)

    ```


    The test statistic is the maximum difference between the two cumulative frequency
    distributions `cn_obs` and `cn_exp`,


    ```python

    kscalc = max(cn_obs-cn_exp)

    print(kscalc)

    ```


