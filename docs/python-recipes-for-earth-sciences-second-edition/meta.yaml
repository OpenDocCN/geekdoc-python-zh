    Fig. 3.6 Probability density function f(x) of a Poisson distribution with different
    values for λ : a λ = 0.5 and b λ = 2.


    # 3.4.4 Normal or Gaussian Distribution


    When p = 0.5 (symmetric, no skew) and n → ∞, the binomial distribution approaches
    a normal or Gaussian distribution defined by the mean μ and the standard deviation
    σ (Fig. 3.7). The probability density function of a normal distribution is


    $$f(x) = \frac{1}{\sigma \sqrt{2\pi}} \exp\left(-\frac{1}{2}\left(\frac{x - \mu}{\sigma}\right)^2\right)$$


    and the cumulative distribution function is


    $$F(x) = \frac{1}{\sigma \sqrt{2\pi}} \int_{-\infty}^{x} \exp\left(-\frac{1}{2}\left(\frac{x
    - \mu}{\sigma}\right)^2\right) dy$$


    The normal distribution is therefore used when the mean is both the most frequent
    and the most likely value. The probability of deviations is equal in either direction
    and decreases with increasing distance from the mean.


    The standard normal distribution is a special member of the normal distribution
    family that has a mean of zero and a standard deviation of one. We can transform
    the equation for a normal distribution by substituting z = (x - μ)/σ. The probability
    density function of this distribution is


    $$f(x) = \frac{1}{\sqrt{2\pi}} \exp\left(-\frac{z^2}{2}\right)$$


    This definition of the normal distribution is often called the z-distribution.'
