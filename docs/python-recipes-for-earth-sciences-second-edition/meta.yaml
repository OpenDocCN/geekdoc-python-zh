- img_proc: true
  md: 'represented as the linear sum of a periodic component $x_p(t_k)$, a trend $x_{tr}(t_k)$,
    and random noise $x_{ns}(t_k)$:


    $$x(t_k) = x_p(t_k) + x_{tr}(t_k) + x_{ns}(t_k)$$


    The decomposition of a climate signal into periodic, trend, and noise components
    (shown above) corresponds to the definition of climate in terms of trend and variability,
    which was developed at the end of the nineteenth century (Brückner 1890; Hann
    1901; Köppen 1931). Mudelsee (2014) added an extremal component $x_e(t_k)$ both
    to facilitate the analysis and to recognize the growing importance of climate
    extremes as documented, for example, in the Fourth Assessment Report by the IPCC
    (Solomon et al. 2007). The long-term component $x_{tr}(t_k)$ is a linear or higher-degree
    trend that can be removed by fitting a polynomial of a certain degree and subtracting
    the values of this polynomial from the data (see Chap. 4). Methods for removing
    noise $x_{ns}(t_k)$ are described in Chap. 6. The periodic (or, in a mathematically
    less rigorous sense, cyclic) component $x_p(t_k)$ can be approximated by a linear
    combination of sine (or cosine) waves that have different amplitudes $A_i$, frequencies
    $f_i$, and phase angles $\psi_i$:


    $$x_p(t_k) = \sum_i A_i \cdot \sin(2\pi f_i t_k - \psi_i)$$


    The phase angle $\psi$ helps in detecting temporal shifts between signals of the
    same frequency. Two signals $x$ and $y$ with the same period are out of phase
    unless the difference between $\psi_x$ and $\psi_y$ is equal to zero (Fig. 5.2).


    The frequency $f$ of a periodic signal is the inverse of the period $\tau$. The
    *Nyquist frequency* $f_{nyq}$ is half the sampling frequency $f_s$ and represents
    the maximum frequency that the data can produce. This frequency—which was defined
    by American mathematician Claude Elwood Shannon and named after Swedish–American
    electrical engineer Harry Nyquist—prevents the phenomenon of *aliasing* in time
    discrete systems. Aliasing means that ambiguities occur in digital signals if
    the sampling frequency is too low. As an example, audio compact disks (CDs) are
    sampled at frequencies of 44,100 Hz (Hz, where 1 Hz = 1 cycle per second), but
    the corresponding Nyquist frequency is 22,050 Hz, which is the highest frequency
    a CD player can theoretically produce. The performance limitations of anti-alias
    filters used by CD players further reduce the frequency band and result in a cutoff
    frequency of around 20,050 Hz, which is the true upper frequency limit of a CD
    player.


    We can now generate synthetic signals in order to illustrate the use of time series
    analysis tools. When using synthetic data, we know in advance what features the
    time series contains (e.g., periodic or random components), and we can introduce
    a linear trend and/or gaps into the time series. The user will encounter plenty
    of examples of the possible effects of varying the parameter settings as well
    as potential artifacts and errors that can result from applying spectral analysis
    tools. We begin with simple data and then apply the methods to more complex time
    series. The first example illustrates how to generate a basic synthetic data series
    that is characteristic of earth science data. First, we create a time axis $\tau$
    that'
