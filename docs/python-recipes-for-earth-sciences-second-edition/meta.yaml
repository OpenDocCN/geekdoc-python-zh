    \ as plt\nfrom skimage import io, exposure\nfrom skimage import transform as tf\n\
    \nfilename = 'AST_L1A_003_03082003080706_03242003202838.hdf'\n```\n\nThe package\
    \ `pyhdf` contains various tools for importing and processing files stored in\
