    The most popular measures of dispersion are the range, variance, and standard
    deviation. We have already used the range to define the midpoints of the classes.
    The range is the difference between the highest and lowest values in the data
    set. Typing


    ```

    print(np.max(corg) - np.min(corg))

    ```


    yields


    ```

    5.1447210000000005

    ```


    The variance is the average of the squared deviation of each number from the mean
    of a data set. Typing


    ```

    print(np.var(corg, ddof=1))

    ```


    yields


    ```

    1.3595162670031486

    ```


    Note that we must use ddof=1, which stands for delta degrees of freedom. By default,
    ddof is zero, and we must therefore change it to one if we wish to calculate the
    sample variance with n-1 degrees of freedom. The standard deviation is the square
    root of the variance. Typing


    ```

    print(np.std(corg, ddof=1))

    ```


    yields


    ```

    1.165982961712198

    ```


    again using ddof=1. When using skew() to describe the shape of the distribution,
    we observe a slightly negative skew. Typing


    ```

    print(stats.skew(corg))

    ```


    yields


    ```

    -0.25291964917461346

    ```


    Finally, the tailedness of the distribution is described by the kurtosis. The
    result of kurtosis() according to both Pearson''s (fisher=False) and Fisher''s
    (fisher=True) formula


    ```

    print(stats.kurtosis(corg, fisher=False))

    print(stats.kurtosis(corg, fisher=True))

    ```


    is


    ```

    2.466996016707096

    -0.5330039832929039

    ```


    which suggests that our distribution produces fewer and less extreme outliers
    than does the normal distribution since its Pearson kurtosis is less than three
    and its Fisher kurtosis is negative.


    Most of these functions have corresponding versions for data sets that contain
    gaps, such as `nanmean()` and `nanstd()`, which treat NaNs as missing values.
    To illustrate the use of these functions, we introduce a gap into our data set
    and compute the mean using both `mean()` and `nanmean()` for comparison. Typing


    ```

    corg[25] = np.NaN

    print(np.mean(corg))

    ```


    yields


    ```

    nan

    ```


    whereas typing


    ```

    print(np.nanmean(corg))

    ```


    yields


    ```

    12.336529722033896

    ```


    In this example, `mean()` follows the rule that all operations with NaNs result
    in NaNs, whereas `nanmean()` simply skips the missing value and computes the mean
    of the remaining data.


    As a second example, we now explore a data set characterized by a striking skew.
    The data represent 120 microprobe analyses on glass shards that were hand-picked
    from volcanic ash. The volcanic glass was affected by chemical weathering at an
    initial stage, and the shards therefore exhibit glass hydration and sodium depletion
    in some sectors. We can study the distribution of sodium (in wt%) in the 120 analyses
    using the same procedure as above. The data are stored in the file *sodiumcontent_one.txt*:


    ```

    sodium = np.loadtxt(''sodiumcontent_one.txt'')

    ```


    As a first step, we recommend always displaying the data as a histogram. The square
    root of 120 suggests 11 classes, and we therefore display the data by typing


    ```

    plt.figure()

