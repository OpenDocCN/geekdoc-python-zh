    We can again apply the filter to the signal using `lfilter()`. Frequency selective
    filters such as lowpass, highpass, bandpass, and bandstop filters are designed
    to suppress certain frequency bands, but phase shifts should be avoided. The function
    `filtfilt()` provides zero phase shift forward and reverse digital filtering.
    After filtering in the forward direction, the filtered sequence is reversed and
    runs back through the filter. The magnitude of the signal is not affected by this
    operation since it is either 0% or 100% of the initial amplitude depending on
    the frequency. Any phase shifts introduced by the filter are canceled out by the
    forward and reverse application of the same filter. This function also helps in
    overcoming the problems with the causal indexing of filters in Python by eliminating
    the phase differences between the causal and non-causal versions of the same filter.
    Filtering and then plotting the results clearly illustrates the effects of the
    filter:


    ```

    xf12=signal.filtfilt(b12,a12,x12)


    plt.figure()

    plt.plot(t,x12,color=''b'')

    plt.plot(t,xf12,color=''r'')

    plt.axis(np.array([0,200,-4,4]))

    plt.show()

    ```


    We might now wish to design a new filter with a more rapid transition from passband
    to stopband. Such a filter requires a higher order, that is, it needs a larger
    number of filter weights a12 and b12. We can now create a 15-order Butterworth
    filter as an alternative to the filter above:


    ```

    b13,a13=signal.butter(15,0.1,btype=''lowpass'',fs=1)


