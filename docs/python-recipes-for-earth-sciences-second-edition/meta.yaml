    delta_{ik})}$$\n\nThis measure can be intuitively understood with respect to recurrences\
    \ in the phase space. We can identify a recurrence of states vai a network link:\
    \ Close points on the phase space trajectory are connected by a link. Three connected\
    \ points form a triple, but only if all three points recur close to one another\
