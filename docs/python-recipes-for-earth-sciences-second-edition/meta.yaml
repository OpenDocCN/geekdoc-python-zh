- md: "## 2.4 Array Manipulation\n\nPython provides a wide range of functions with\
    \ which to manipulate arrays. This section introduces the most important functions\
    \ for array manipulation, and these functions are used later in the book. We begin\
    \ by clearing the workspace, importing the NumPy package as np and the NumPy module\
    \ for masked arrays as ma in order to be able work with arrays with missing or\
    \ invalid entries, and creating two arrays A and B by typing\n\n```\n%reset -f\n\
    \nimport numpy as np\nimport numpy.ma as ma\n\nA = np.array([[2,4,3],[9,3,-1]])\n\
    print(A)\n\nB = np.array([[1,9,3],[6,6,3]])\nprint(B)\n```\n\nwhich yields\n\n\
    ```\n[[ 2  4  3]\n [ 9  3 -1]]\n\n[[1 9 3]\n [6 6 3]]\n```\n\nWhen we work with\
    \ arrays, we sometimes need to concatenate two or more arrays into one single\
    \ array. We can use `concatenate(arrays,axis=0)` to concatenate arrays A and B\
    \ along the first dimension (i.e., along the rows) by using `axis=0`. Alternatively,\
    \ we can use `vstack()` to concatenate arrays A and B vertically. By typing either\n\
    \n```\nC = ma.concatenate([A,B],axis=0)\nprint(C)\n```\n\nor\n\n```\nC = ma.vstack([A,B])\n\
    print(C)\n```\n\nwe obtain (in both cases)\n\n```\n[[ 2 4  3]\n [ 9 3 -1]\n [\
    \ 1 9  3]\n [ 6 6  3]]\n```\n\nSimilarly, we can concatenate arrays horizontally,\
    \ that is, along the second dimension (i.e., along the columns) using `axis=1`.\
    \ Typing\n\n```\nD = ma.concatenate([A,B],axis=1)\nprint(D)\n```\n\nor instead\
    \ using `hstack()`\n\n```\nD = ma.hstack([A,B])\nprint(D)\n```\n\nyields (in both\
    \ cases)\n\n```\n[[ 2 4  3 1 9 3]\n [ 9 3 -1 6 6 3]]\n```\n\nWhen working with\
    \ satellite images, we often concatenate three spectral bands into three-dimensional\
    \ arrays using the colors red, green, and blue (RGB) (Sects. 2.5 and 8.4). Since\
    \ `concatenate()` allows the use of `axis=2`, we use `dstack()` to concatenate\
    \ arrays A and B along the third dimension by typing\n\n```\nE = ma.dstack([A,B])\n\
    print(E)\n```\n\nwhich yields\n\n```\n[[[ 2 1]\n  [ 4 9]\n  [ 3 3]]\n\n [[ 9 6]\n\
    \  [ 3 6]\n  [-1 3]]]\n```\n\nTyping\n\n```\nnp.whos()\n```\n\nyields\n\n| Name\
    \ | Shape | Bytes | Type |\n|------|-------|-------|------|\n| A | 2 x 3 | 48\
    \ | int64 |\n| B | 2 x 3 | 48 | int64 |\n| D | 2 x 6 | 96 | int64 |\n| C | 4 x\
    \ 3 | 96 | int64 |\n\nwhich indicates that we have now created a three-dimensional\
    \ array, as revealed by the resulting size of 2-by-3-by-2. Alternatively, we can\
    \ use\n\n```\nprint(E.shape)\n```\n\nwhich yields\n\n```\n(2, 3, 2)\n```\n\nwhich\
    \ tells us that the array has 2 rows, 3 columns, and 2 layers in the third dimension.\
    \ Using len instead of shape()\n\n```\nprint(len(E))\n```\n\nyields\n\n```\n2\n\
    ```\n\nwhich tells us the first dimension of the array only. Hence, `len()` is\
    \ normally used to determine the length of a one-dimensional array (or vector),\
    \ such as the evenly spaced time axis c, which was created in Sect. 2.3.\n\nPython\
    \ uses an array indexing that includes the [0,0] element in the upper-left corner.\
    \ Other types of data that are imported into Python may follow a different indexing\
    \ convention. As an example, digital terrain models (introduced in Sects. 7.3\
    \ to 7.5) are often indexed differently and therefore need to be flipped in an\
    \ up-down direction, or in other words, about a horizontal axis. Alternatively,\
    \ we can flip arrays in a left-right direction (i.e., about a vertical axis).\
    \ We can use `flipud()` for flipping in an up-down direction and `fliplr()` for\
    \ flipping in a left-right direction, as in\n\n```\nF = np.flipud(A)\nprint(F)\n\
    \nF = np.fliplr(A)\nprint(F)\n```\n\nwhich yields\n\n```\n[[ 9 3 -1]\n [ 2 4 \
    \ 3]]\n\n[[ 3 4 2]\n [-1 3 9]]\n```\n\nIn more complex examples, we can use `roll(a,shift,axis=1)`\
    \ to circularly shift (i.e., rotate) arrays by `shift` positions along the axis\
    \ `axis=1` while bearing in mind that the first axis is `axis=0` in Python. For\
    \ example, we can shift array A by one position along the second axis (i.e., along\
    \ the columns) by typing\n\n```\nG = np.roll(A,1,axis=1)\nprint(G)\n```\n\nwhich\
    \ yields\n\n```\n[[ 3 2 4]\n [-1 9 3]]\n```\n\nWe can also use `reshape()` to\
    \ completely reshape the array. The result is an m-by-n array H whose elements\
    \ are taken column-wise from A. As an example, we can create a 3-by-2 array from\
    \ A by typing\n\n```\nH = np.reshape(A,np.array([3,2]),order='F')\nprint(H)\n\
    ```\n\nwhich yields\n\n```\n[[ 2  3]\n [ 9  3]\n [ 4 -1]]\n```\n\nwhere order='F'\
    \ is an instruction for reading/writing the elements using Fortran-like index\
    \ order, with the first index changing fastest and the last index changing slowest.\n\
    \nAnother important way of manipulating arrays is by sorting their elements. As\
    \ an example, we can use sort(C,axis=0) with axis=0 to sort the elements of C\
    \ in ascending order along the first axis (i.e., along the rows). Typing\n\n```\n\
    print(C)\nI = np.sort(C,axis=0)\nprint(I)\n```\n\nyields\n\n```\n[[2 4  3]\n [9\
    \ 3 -1]\n [1 9  3]\n [6 6  3]]\n\n[[1 3 -1]\n [2 4  3]\n [6 6  3]\n [9 9  3]]\n\
    ```\n\nThe function argsort() can be used to sort the rows of C according to the\
    \ second column C[:,1]. Typing\n\n```\nprint(C)\nJ = C[C[:,1].argsort()]\nprint(J)\n\
    ```\n\nyields\n\n```\n[[2 4  3]\n [9 3 -1]\n [1 9  3]\n [6 6  3]]\n\n[[9 3 -1]\n\
    \ [2 4 3]\n [6 6 3]\n [1 9 3]]\n```\n\nArray manipulation also includes making\
    \ comparisons of arrays, for example, by testing whether elements in A are also\
    \ found in B by using `isin()`. Typing\n\n```\nprint(A)\nprint(B)\n\nK = np.isin(A,B)\n\
    print(K)\n```\n\nyields\n\n```\n[[False False True]\n [True  True  False]]\n```\n\
    \nwith `False` indicating that the element `A[i,j]` is not in B and `True` indicating\
    \ that the element `A[i,j]` is in B. We can also locate elements within A for\
    \ which a statement is true. For example, we can locate elements with values of\
    \ less than zero and replace them with NaNs by typing\n\n```\nL = A\nL = L.astype(float)\n\
    L[np.where(L<0)] = np.NaN\nprint(L)\n```\n\nwhich yields (in both cases)\n\n```\n\
    [[ 2. 4. 3.]\n [ 9. 3. nan]]\n```\n\nThis is very useful when working with digital\
    \ elevation models for which values below sea level are not relevant. Alternatively,\
    \ we can replace data voids other than NaNs, such as -32,768, which is often used\
    \ as a void with digital terrain models (Sects. 7.3 to 7.5). We can then determine\
    \ which elements of an array are NaNs by typing\n\n```\nM = np.isnan(L)\nprint(M)\n\
    ```\n\nwhich yields\n\n```\n[[False False False]\n [False False True]]\n```\n\n\
    with NaNs indicated by True and non-NaN values indicated by False. Which of the\
    \ elements in array A are unique can be determined by typing\n\n```\nN = np.unique(A)\n\
    print(N)\n```\n\nwhich returns\n\n```\n[-1 2 3 4 9]\n```\n\nwhich are the same\
    \ values as in A but with no repetitions. The value of 3 occurs twice in A, and\
    \ the number of elements in N is therefore one less than in A.\n\n## 2.5 Data\
    \ Types in Python\n\nOn a computer, we describe numbers with a finite (e.g., 32\
    \ or 64) total of zeros and ones, that is, with the so-called binary system. The\
    \ total of representable numbers is therefore finite, in contrast to the total\
    \ number of real numbers. In a 64 bit system, there are 2^64 (or ~1.8447·10^19)\
    \ different numbers. These floating point numbers are arranged such that the density\
    \ is greatest around zero and decreases in the direction of minus infinity and\
    \ plus infinity in order to support a trade-off between precision and range.\n\
    \nTo demonstrate the difference between real numbers and floating point numbers,\
    \ consider the value of x=4/3, which we can write as 1.3333333... (i.e., with\
    \ an infinitely repeating decimal of 3). We can write 4/3 in Python by typing\n\
    \n```\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport matplotlib.image\
    \ as mpimg\nfrom datetime import date\n\nprint(4/3)\n```\n\nwhich yields\n\n```\n\
    1.3333333333333333\n```\n\nAs we can see, Python rounds the value of 4/3 to the\
    \ next floating point number. Real numbers are continuous, whereas floating point\
    \ numbers are not. The result of our calculation can therefore fall within the\
    \ gap between two floating point numbers; it is then rounded to the next floating\
    \ point number and is therefore not exact.\n\nConverting decimals into binaries\
    \ (and back) is not difficult. As an example, let us convert 25.1 into a binary\
    \ representation. This number has an integer part of 25 and a fractional part\
    \ of 0.1, which are converted separately. First, let us convert the integer part\
    \ by typing\n\n```\n2^7 2^6 2^5 2^4 2^3 2^2 2^1 2^0\n128 64 32 16 8 4 2 1\n0 0\
    \ 0 1 1 0 0 1 binary number\n(power of 2)\n16 8 1 = 25 decimal number\n(power\
    \ of 10)\n```\n\nAs we can see, we divide the number 25 into a sum of powers of\
    \ two instead of powers of ten as in the decimal system. Alternatively, we can\
    \ calculate the binary representation using\n\n```\n25/2 = 12 remainder 1\n12/2\
    \ = 6 remainder 0\n6/2 = 3 remainder 0\n3/2 = 1 remainder 1\n1/2 = 0 remainder\
    \ 1 (results in a zero therefore stop)\n```\n\nThe remainders are the binaries,\
    \ which are arranged in reverse order such that the first remainder becomes the\
    \ least significant digit (LSD) and the last remainder becomes the most significant\
    \ digit (MSD). In our example, the integer part of the number 25.1 corresponds\
    \ to the binary representation 11,001, or to a normalized floating point number\
    \ of 1.1001 · 2^4.\n\nWe next convert the fractional part 0.1 into a binary representation.\
    \ Unfortunately, 0.1 is one of the many examples that have an infinitely repeating\
    \ binary representation. This is because 0.1 lies between two floating point numbers.\
    \ In base 10, it is 1.0 · 10^-1, but in base 2, it is\n\n```\n.0001100110011001100110011001100110011...\n\
    ```\n\nwhich is calculated by multiplying 0.1 by two, taking the decimal as the\
    \ digit, taking the fraction as the starting point for the next step, repeating\
    \ the process until we obtain either 0 or a periodic number, and then reading\
    \ the binary number starting from the top, as shown below:\n\n```\n0.1 * 2 = 0.2\
    \ -> 0\n0.2 * 2 = 0.4 -> 0\n0.4 * 2 = 0.8 -> 0\n0.8 * 2 = 1.6 -> 1\n```"
