    \n## 8.10 基于显微图像的粒度分析\n\n识别、测量和计数图像中的颗粒是图像分析的经典应用。地球科学中的例子包括粒度分析、花粉计数以及根据岩石薄片确定矿物组成。对于粒度分析，任务是识别单个颗粒，测量其大小，然后统计每个粒级的颗粒数量。使用图像分析的原因在于其能够在短时间内以相对较低的成本对大量样本进行自动化分析。通常使用三种不同的方法来识别和计数图像中的对象：1）使用分水岭分割算法的基于区域的分割，2）使用霍夫变换的目标检测，以及3）使用颜色差异进行阈值处理以分离对象。Gonzalez和Woods（2018）在其优秀著作的第三版中详细描述了这些方法。我们利用两个示例来演示如何使用图像处理来识别、测量和计数颗粒。在本节中，我们演示了分水岭分割在粒度分析中的应用，在第8.9节中，我们介绍了阈值处理作为量化显微图像中木炭的方法。\n\
    \n以下示例涵盖了使用分水岭分割算法对对象进行分割、测量和计数（图8.11）。我们首先读取一张不同大小的粗岩屑颗粒图像，并将其存储在变量I1中。图像大小为284×367像素，由于宽度为3厘米，因此高度为3厘米×284/367＝2.32厘米。我们输入\n\
    \nimport cv2\nimport numpy as np\nimport matplotlib.pyplot as plt\nfrom scipy\
    \ import ndimage as ndi\nfrom skimage import color\nfrom skimage import exposure\n\
    from skimage import io\nfrom skimage import feature\nfrom skimage import measure\n\
    from skimage import segmentation\n\nI1 = io.imread('grainsize.tif')\nix = 3.\n\
    iy = 284*3/367\n\nplt.figure()\nio.imshow(I1,\n    extent=[0,ix,0,iy])\nplt.title('Original\
    \ image')\nplt.axis('off')\nplt.show()\n\n![](img/f6c4e7e52658f332a1ff43bb13764e42_401_0.png)\n\
    \n**图8.11** 显微图像自动粒度分析的结果：**a** 原始灰度图像，**b** 调整强度值后的图像，**c** 转换为二值图像后的图像，以及**d**\
    \ 使用分水岭分割算法检测到对象的图像。\n\n其中`ix`和`iy`表示用于将图像I1校准到厘米尺度的坐标轴。当包括与图像边界重叠的三个颗粒时，此图像中计数的真实对象数为236，因此在以下练习中忽略此数字。我们可以使用`rgb2gray()`拒绝图像的颜色信息，并将图像I1转换为灰度：\n\
    \nI2 = color.rgb2gray(I1)\n\nplt.figure()\nio.imshow(I2,\n    extent=[0,ix,0,iy])\n\
    plt.title('Grayscale image')\nplt.axis('off')\nplt.show()\n\n此灰度图像I2的对比度相对较低。因此，我们使用`rescale_intensity()`调整图像强度值，这增加了新图像I3的对比度：\n\
    \nI3 = exposure.rescale_intensity(I2,\n    out_range='uint8')\n\nplt.figure()\n\
    io.imshow(I3,\n    extent=[0,ix,0,iy])\nplt.title('Adjusted intensity values')\n\
    plt.axis('off')\nplt.show()\n\n函数`threshold()`通过阈值处理将无背景图像I3转换为二值图像I4。如果阈值为0，则图像全白；如果阈值为255，则图像全黑。我们手动更改阈值值，直到获得合理的结果。我们发现50是一个合适的阈值：\n\
    \nthresh,I4 = cv2.threshold(I3,\n    50,255,cv2.THRESH_BINARY)\n\nplt.figure()\n\
    io.imshow(I4,\n    extent=[0,ix,0,iy])\nplt.title('Binary image')\nplt.axis('off')\n\
    plt.show()\n\n接下来，我们使用分水岭分割算法来分离图像中的颗粒。地貌学中的分水岭是分隔对相邻流域水文预算有贡献区域的山脊（参见第7.10节）。分水岭分割将相同的方法应用于灰度图像，这些方法用于在数字高程模型中分离流域。在此应用中，灰度值被解释为数字高程模型中的高程，其中分水岭随后分离两个感兴趣的对象。\n\
    \n通常用于识别属于特定对象的像素的标准是最近邻距离。我们使用`distance_transform_edt()`执行的距离变换，该变换为每个像素分配一个数字，该数字是该像素与I4中最近非零像素之间的距离：\n\
    \ndistance = ndi.distance_transform_edt(I4)\n\n该函数使用*欧几里得距离*来计算最近邻距离。距离矩阵现在在对象像素中包含正的非零值，在其他地方包含零。我们使用此信息创建一个掩码："
