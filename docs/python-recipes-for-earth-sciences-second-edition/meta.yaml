    in °C and °F represent an example of this data type even though arbitrary zero
    points exist for both scales. This type of data may be sampled continuously or
    in discrete intervals.


    In addition to these standard data types, earth scientists frequently encounter
    special kinds of data, such as


    +   - *closed data*—These data are expressed as proportions that add to a fixed
    total, such as 100%. Compositional data (e.g., the element composition of rock
    samples) represent the majority of closed data.

    - *spatial data*—These data are collected in a 2D or 3D study area. The spatial
    distribution of a certain fossil species, the spatial variation in the thickness
    of a sandstone bed, and the distribution of tracer concentrations in groundwater
    are examples of this type of data, which is likely the most important data type
    in the earth sciences.

    - *directional data*—These data are expressed in angles. Examples include the
    strike and dip of bedding, the orientation of elongated fossils, and the flow
    direction of lava. This is another very common type of data in the earth sciences.


    Most of these different types of data require specialized methods of analysis,
    some of which are outlined in the section below.


    # 1.4 Methods of Data Analysis


    Data analysis uses precise characteristics of small samples to hypothesize about
    the general phenomenon of interest. Determining which particular method to use
    for analyzing the data depends on the data type and the project requirements.
    The various methods available include


    +   - *univariate methods*—Each variable is assumed to be independent of the others
    and is explored individually. The data are presented as a list of numbers that
    represent a series of points on a scaled line. Univariate statistical methods
    include collecting information about the variable, such as the minimum and maximum
    values, the average, and the dispersion about the average. This information is
    then used to infer the underlying processes that are responsible for variations
    in the data. Examples include the effects of chemical weathering on the sodium
    content of volcanic glass shards and the influence of specific environmental factors
    on the size of snail shells within a sediment layer.

    - *bivariate methods*—Two variables are investigated together in order to detect
    relationships between them. For example, the correlation coefficient may be calculated
    in order to investigate whether there is a linear relationship between two variables.
    Alternatively, bivariate regression analysis may be used to find'
- md: 'an equation that describes the relationship between the two variables. An example
    of a bivariate plot is the *Harker Diagram*, which is one of the oldest methods
    of visualizing geochemical data from igneous rocks and simply plots the concentrations
    of oxides of chemical elements against SiO$_2$ (Harker 1909).


    - *time series analysis*—These methods investigate data sequences as a function
    of time. The time series is decomposed into a long-term trend, a systematic component
    (e.g., periodic, cyclic, rhythmic), and an irregular component (e.g., random,
    stochastic). A widely used technique for describing the cyclic components of a
    time series is spectral analysis. Examples of the application of these techniques
    include investigations of cyclic climatic variations in sedimentary rocks and
    analyses of seismic data.

    - *signal processing*—This method includes all techniques used for manipulating
    a signal in order to minimize the effects of noise with the aim of correcting
    all kinds of unwanted distortions or of separating various components of interest.
    Signal processing includes designing and realizing filters as well as the application
    of these filters to the data. These methods are widely used in combination with
    time series analysis, for example, to increase the signal-to-noise ratio in climate
    time series, in digital images, or in geophysical data.

    - *spatial analysis*—This is the analysis of variables in 2D or 3D space, and
    two or three of the required variables are hence coordinate numbers. Spatial analysis
    includes descriptive tools for investigating the spatial patterns of geographically
    distributed data. Other techniques involve using spatial regression analysis to
    detect spatial trends. Spatial analysis also includes 2D and 3D interpolation
    techniques, which help to estimate surfaces that represent the predicted continuous
    distribution of the variable throughout an area. Examples include analyzing drainage
    systems, identifying old landscape forms, and analyzing lineaments in tectonically
    active regions.

    - *image processing*—Processing and analyzing images have become increasingly
    important activities in the earth sciences. These methods involve importing &
    exporting, compressing & decompressing, and displaying images. Image processing
    also aims to enhance images for improved intelligibility and to manipulate images
    in order to increase the signal-to-noise ratio. Advanced techniques are used to
    extract specific features or to analyze shapes and textures, such as for counting
    mineral grains or fossils in microscopic images. Another important application
    of image processing lies in the use of satellite remote sensing to map certain
    types of rocks, soils, and vegetation as well as to measure other variables, such
    as soil moisture, rock weathering, and erosion.

    - *multivariate analysis*—These methods involve observing and analyzing more than
    one statistical variable at a time. Since graphically representing multidimensional
    data sets is difficult, most of these methods include dimension reduction. Multivariate
    methods are widely used with geochemical data, such as in tephrochronology, in
    which volcanic ash layers are correlated via the geochemical fingerprinting of
    glass shards. Another important use lies in comparing species assemblages in ocean
    and lake sediments for reconstructing paleoenvironments.

    - *analysis of directional data*—Methods of analyzing circular and spherical data
    are widely used in the earth sciences. Structural geologists measure and analyze
    the orientation of slickensides (or striae) on a fault plane. Moreover, circular
    statistical methods are common in paleomagnetic studies, and microstructural investigations
    include the analysis of grain shapes and quartz *c*-axis orientations in thin
    sections of rocks.


    Some of these methods of data analysis require applying numerical methods, such
    as interpolation techniques. While the following text deals mainly with statistical
    techniques, it also introduces several numerical methods that are commonly used
    in the earth sciences.


