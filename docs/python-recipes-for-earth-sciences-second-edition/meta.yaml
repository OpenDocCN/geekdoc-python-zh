    \ which is related to a period of 5, which is again the relative phase shift of\
    \ 1 between the two synthetic sine waves.\n\n## 5.6 Interpolating and Analyzing\
    \ Unevenly Spaced Data\n\nWe can now use our experience in analyzing evenly spaced\
    \ data to run a spectral analysis on unevenly spaced data. Such data are very\
    \ common in the earth sciences, for example, in the field of paleoceanography,\
    \ where deep sea cores are typically sampled at constant depth intervals. The\
    \ transformation of evenly spaced length variable data into time variable data\
    \ in an environment with changing length–time ratios results in unevenly spaced\
    \ time series. Most methods of time series analysis, however, require evenly spaced\
    \ time axes, which is why we have to convert an unevenly spaced time series into\
    \ a time series with an evenly spaced time axis using *interpolation*. The aim\
    \ of interpolation for *x(t)* data is to calculate the *x*-values for an evenly\
    \ spaced *t*-vector from unevenly spaced *x(t)* measurements.\n\nNumerous methods\
    \ exist for interpolating unevenly spaced sequences of data or time series (Fig.\
    \ 5.13 a). *Linear interpolation* predicts the *x*-values by drawing a straight\
    \ line between two neighboring measurements and calculating the *x*-value at the\
    \ appropriate point along the line. However, this method has its limitations because\
    \ it assumes linear transitions in the data, which introduces a number of artifacts\
    \ (including the loss of high-frequency components of the signal) and limits the\
    \ data range to that of the original measurements. Alternatively, *nearest neighbor\
    \ interpolation* simply selects the value of the nearest measurement without including\
    \ the values of other measurements in any calculation. The method is very simple\
    \ since no new values need to be calculated. It is therefore much faster than\
    \ all other methods, especially for very large data sets (e.g., long time series,\
    \ large spatial data sets, and images), but it produces a very angular result.\n\
    \n*Cubic spline interpolation* is another method of interpolating data that are\
    \ unevenly spaced. Cubic splines are piecewise continuously differentiable curves\
    \ that require at least four data points for each step. An advantage of the method\
    \ is that it preserves the high-frequency information contained in the data. However,\
    \ steep gradients in the data sequence–which typically occur adjacent to extreme\
    \ minima and maxima–could cause spurious amplitudes in the interpolated time series\
    \ (Fig. 5.13 b). A variant that solves this problem is the *piecewise cubic Hermite\
    \ interpolating polynomial (PCHIP)*, which is named after French mathematician\
    \ Charles Hermite (1822 to 1901) (Fritsch and Carlson 1980). The interpolated\
    \ values are determined by shape-preserving piecewise cubic interpolation, which\
    \ avoids spurious amplitudes in the interpolated time series. This is achieved\
    \ by waiving the piecewise continuous differentiability; in other words, abrupt\
    \ changes in direction are accepted (e.g., near the neighboring measurement at\
    \ −1.215 and −1.3 in Fig. 5.13 b) such that the curves between the measurements\
    \ are always monotonous (i.e., increasing or decreasing) (e.g., between −1.3 and\
    \ −1.4688 in Fig. 5.13 b). Since all these (and other) interpolation techniques\
    \ might introduce artifacts into the data, it is always advisable 1) to keep the\
    \ total number of data points constant before and after interpolation, 2) to report\
    \ the method employed for estimating the evenly spaced data sequence, and 3) to\
    \ explore the effect of interpolation on the variance of the data.\n\nAfter this\
    \ short introduction, we can demonstrate these methods with a simple example (Fig.\
    \ 5.13). We generate a synthetic time series x1 from the values of a 5th-degree\
    \ polynomial with zeros +5, -4, +3, -2, and +1 by typing\n\nimport numpy as np\n\
    from scipy import signal\nfrom scipy import interpolate\nimport matplotlib.pyplot\
    \ as plt\n\nt1 = np.linspace(-20, 20, 401)\nx1 = 0.01 * (t1 - 5) * (t1 + 4) *\
    \ (t1 - 3) * (t1 + 2) * (t1 - 1)\n\nThe time series x1 has a rather high resolution,\
    \ that is, it has one value each along the time axis t1 running from -20 to +20,\
    \ with intervals of 0.01. However, this high resolution is mainly needed for graphical\
    \ representation. Our actual measured values x2, which follow the 5th-degree polynomial,\
