    \ = gray_r(np.linspace(0,1,256))\nnewcolors = newcolors**1\nnewcmp = ListedColormap(newcolors)\n\
    \nplt.figure()\nplt.axes(aspect='equal')\nplt.pcolormesh(LON,LAT,SRTM,\n    cmap=newcmp,\n\
    \    shading='auto')\nplt.colorbar()\nplt.show()\n```\n\nThis script opens a new\
