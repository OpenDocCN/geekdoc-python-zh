    42.913054               0.024642

    (cont''d)

    ```


    The NaNs help to identify break points in the data (Sect. 7.2). *Raster data*
    are stored as 2D or 3D arrays. The elements of these arrays represent variables
    such as the altitude of a grid point above sea level, annual rainfall, or (in
    the case of an image) color intensity values:


    ```

    174 177 180 182 182 182

    165 169 170 168 168 170

    171 174 173 168 167 170

    184 186 183 177 174 176

    191 192 190 185 181 181

    189 190 190 188 186 183

    ```


    Raster data can be visualized as 3D plots. The *x*- and *y*-values are the indices
    of the 2D array or of any other reference frame, and *z* is the numerical value
    of the elements of the array (see also Chap. 7). The numerical values contained
    in the 2D array can be displayed as a pseudocolor plot, which is a rectangular
    array of cells with colors determined by a *colormap*. A colormap is an *m*-by-3
    array of real'
