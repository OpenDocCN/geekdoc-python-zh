- img_proc: true
  md: 'characterization of univariate data sets (Chap. 3). Let us assume that we have
    collected a number of angular measurements, such as fossil alignments. The collection
    of data can be written as


    $$\theta_1, \theta_2, \theta_3, \ldots, \theta_n$$


    which contains $n$ observations $\theta_i$. Sine and cosine values are computed
    for each direction $\theta_i$ and are then used to compute the *resultant (or
    mean) direction* for the set of angular data (Fisher 1993; Mardia and Jupp 1999):


    $$x_r = \sum \sin \theta_i$$


    $$y_r = \sum \cos \theta_i$$


    The resultant direction of the data set is


    $$\overline{\theta} = \tan (x_r / y_r)$$


    and the resultant length is


    $$R = \sqrt{(x_r^2 + y_r^2)}$$


    The resultant length clearly depends on the dispersion of the data. Normalizing
    the resultant length to the number of observations yields the mean resultant length:


    $$\overline{R} = R/n$$


    The value of the mean resultant length decreases with increasing dispersion (Fig.
    10.4). The *circular variance* is then the difference between one and the mean
    resultant length and is therefore often used as a measure of dispersion for directional
    data:


    $$\sigma_0 = 1 - \overline{R}$$


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_480_0.png)


    **Fig. 10.4** The resultant length $R$ of a sample decreases with increasing dispersion
    of the data $\theta_i$. Modified from Swan and Sandilands (1995).'
