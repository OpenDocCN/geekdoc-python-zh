- img_proc: true
  md: "```\nplt.title('Flow accumulation')\nplt.show()\n```\n\nThe plot displays areas\
    \ with high flow accumulation in shades of blue and areas with low flow accumulation\
    \ (which usually correspond to ridges) in shades of red. We use a logarithmic\
    \ scale to map the flow accumulation in order to obtain a better representation\
    \ of the results. The simplified algorithm introduced here for calculating flow\
    \ accumulation can be used to analyze sloping terrains in DEMs. In flat terrains,\
    \ in which the slope approaches zero, no flow direction can be generated by our\
    \ algorithm, and flow accumulation thus stops. Such situations require more advanced\
    \ algorithms that can perform analyses on completely flat terrain. These more\
    \ advanced algorithms also include sink-filling routines for avoiding spurious\
    \ sinks that interrupt flow accumulation. Small depressions can be filled by smoothing,\
    \ as we did at the beginning of this section.\n\nThe first part of this section\
    \ dealt with primary relief attributes. Secondary attributes of a DEM are functions\
    \ of two or more primary attributes. Examples of these secondary attributes include\
    \ the wetness index and the stream power index. The *wetness index* for a cell\
    \ is the log of the ratio between the area of the catchment for that particular\
    \ cell and the tangent of its slope:\n\n$$weti = log\\left(\\frac{1+flowac}{tan(slp)}\\\
    right)$$\n\nThe term $1+flowac$ avoids the problems associated with calculating\
    \ the logarithm of zero when $flowac=0$. The wetness index is used to predict\
    \ the soil water content (*saturation*) that results from lateral water movement.\
    \ The potential for water logging is usually highest in the lower parts of catchments,\
    \ where the slopes are gentler. Flat areas with a large upslope area have a high\
    \ wetness index compared with steep areas with small catchments. The wetness index\
    \ $weti$ is computed and displayed by typing\n\n```\nweti = np.log((1+flowac)/np.tan(np.pi*slp/180))\n\
    \nplt.figure()\nplt.axes(aspect='equal')\nplt.pcolor(weti,\n           cmap=cm.jet_r)\n\
    plt.colorbar()\nplt.title('Wetness index')\nplt.show()\n```\n\nIn this plot, blue\
    \ colors represent high values for the wetness index, while red colors represent\
    \ low values (Fig. 7.15 f). In our example, soils in the southeast are the most\
    \ likely to have high water content due both to the runoff from the large central\
    \ valley and to the flatness of the terrain."
