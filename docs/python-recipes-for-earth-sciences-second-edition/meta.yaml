    The bicubic spline interpolation described in this section provides a solution
    to most gridding problems. However, different applications in the earth sciences
    require different methods of interpolation, and each application has its own problems.
    The next section compares bicubic spline interpolation with other gridding methods
    and summarizes their strengths and weaknesses.


    # 7.7 Comparison of Methods and Potential Artifacts


    The first method we want to take a closer look at is *bilinear interpolation*
    for gridding unevenly spaced data. Bilinear interpolation is an extension of the
    one-dimensional technique of linear interpolation introduced in Sect. 5.6. In
    the two-dimensional case, linear interpolation is first performed in one direction,
    and then in the other direction. Although the bilinear method appears to be one
    of the simplest interpolation techniques and might thus not be expected to yield
    serious artifacts or distortions in the data, the opposite is true because the
    method has a number of disadvantages. As a result, other methods are preferred
    in many applications.


