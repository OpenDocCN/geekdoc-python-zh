    \    theta, dists, num_peaks=15, min_distance=20)\n\nyintcs = dists * np.array([np.cos(theta),\n\
    \    np.sin(theta)])\nyintcs = np.transpose(yintcs)\nslopes = np.tan(theta + np.pi\
    \ / 2)\n```\n\nThis information can now be used to display the lines on the image:\n\
