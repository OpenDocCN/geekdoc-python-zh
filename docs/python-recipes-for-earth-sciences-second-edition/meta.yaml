    \ that we can only take 12 measurements, which are stored in data,\n\n```\nimport\
    \ numpy as np\nimport matplotlib.pyplot as plt\nfrom numpy.random import default_rng\n\
    from scipy import stats\n\nsamplesize = 12\nsqrtsamplesize = np.sqrt(samplesize)\n\
    rng = np.random.default_rng(0)\ndata = 3.4 + 1.5*rng.standard_normal(samplesize)\n\
    print(data)\n```\n\nwhich yields\n\n```\n[3.58859533 3.20184271 4.36063398 3.55735018\n\
