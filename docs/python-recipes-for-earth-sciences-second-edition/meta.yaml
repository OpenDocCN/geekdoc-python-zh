    \ngrads = np.arctan(grads)/np.pi*180.\n```\n\nSince a central cell can have several\
    \ downslope neighbors, water can flow in several directions. This phenomenon is\
    \ called *divergent flow*. Early flow accumulation algorithms were based on the\
    \ single flow direction method (known as the D8 method; Fig. 7.14), which allows\
    \ flow to only one of the cell's eight neighboring cells. However, this method\
