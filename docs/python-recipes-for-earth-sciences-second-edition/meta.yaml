    # ## 8.7 The Normalized Difference Vegetation Index NDVI


    Plant pigments reflect near-infrared light (i.e., 700 to 1100 nm), whereas they
    strongly absorb visible light (i.e., 400 to 700 nm) for use in photosynthesis.
    The *normalized difference vegetation index* (NDVI) is an index used to map living
    green vegetation that is calculated with the formula


    $$NDVI = \frac{(NIR - R)}{(NIR + R)}$$


    using the spectral reflectance measurements acquired in the near-infrared (*NIR*)
    and red (R) spectral bands. The index can be measured with ground-based spectral
    cameras as well as by using drones, aircraft, or satellites. The cameras that
    are used are normally very expensive, but some rather inexpensive alternatives
    are now available, including the AgroCam (https://www.agrocam.eu) and the MAPIR
    Survey Camera (https://www.mapir.camera). These cameras are used in professional
    applications, but due to their low prices, they are also suitable for student
    exercises.


    Since the MAPIR cameras (which are manufactured by Peau Productions, Inc., in
    San Diego, CA, USA) have the same size and shape as the popular GoPro camera system,
    they can make use of all the GoPro accessories, such as memory cards,'
