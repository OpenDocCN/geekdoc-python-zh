    # 5.12 Detecting Abrupt Transitions in Time Series


    A number of methods are available for detecting abrupt changes in time series
    in the time domain. An example of such a method that is suitable for use in climate
    time series is the *rampfit method* (Mudelsee and Stattegger 1997, Mudelsee 2000),
    and examples that are suitable for use in the frequency domain are the *evolutionary
    power spectrum* and the *wavelet power spectrum* (e.g., Lau and Weng 1995, Mackenzie
    et al. 2001). In most cases, trends and events in both the time and frequency
    domains are detected by computing the statistical parameters of the data (e.g.,
    measures of central tendency and dispersion) that are contained in a *sliding
    window* of length (or width) *L*. The precision of these parameters depends on
    the length of the window. In other words, an accurate value for the mean and the
    variance is obtained if L is large. However, a larger window reduces the accuracy
    of the estimated changes in these parameters. This problem is often referred to
    as *Grenander’s uncertainty principle of statistics* (Grenander 1958). Performing
    a statistical test to assess differences in central tendency and dispersion between
    two different sliding windows, however, partly overcomes this problem provided
    that only the locations of sharp transitions in statistical parameters are required.


    The classic *t*-test and *F*-test statistics are often used to compare the means
    and the variances of two sets of measurements and could therefore be used to detect
    changes in the location and dispersion between two sliding windows. These two
    tests, however, make the basic assumption that the samples come from a population
    with a Gaussian distribution (Sects. 3.7 and 3.8). The non-parametric Mann–Whitney
    and Ansari–Bradley tests provide a solution to this problem that is independent
    of the distribution (Sects. 3.11 and 3.12). The Mann–Whitney test (Mann and Whitney
    1947, Lepage 1971) performs a two-sided rank-sum test of the null hypothesis that
    two samples come from continuous distributions with identical medians against
    the alternative that they do not have identical medians. On the other hand, the
    Ansari–Bradley test performs a two-sided test of the hypothesis that two independent
    samples come from the same distribution against the alternative that they come
    from distributions that have the same medians and shapes but different dispersions
    (Ansari and Bradley 1960, Lepage 1971). This latter method has been successfully
    applied to records of terrigenous dust flux preserved in marine sediments offshore
    of subtropical West Africa, in the eastern Mediterranean Sea, and in the Arabian
    Sea in order to detect trends, rhythms, and events in the African Plio–Pleistocene
    climate (Trauth et al. 2009).'
