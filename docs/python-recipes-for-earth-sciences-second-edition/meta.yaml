    # 5.7 The Spectrogram (Sonogram, Sonograph) Method


    The amplitude of spectral peaks usually varies with time. This is particularly
    true for paleoclimate time series. Paleoclimate records usually show trends not
    only in the mean and the variance, but also in the relative contributions of rhythmic
    components, such as the Milankovitch cycles in marine δ¹⁸O records. Evolutionary
    power spectra–also known as *sonograms*, *sonographs*, or *spectrograms*–were
    introduced by Kay Electric Co. in 1951 and can map such changes in the frequency
    domain. The spectrogram method is a modification of the Fourier-based methods
    that computes the spectrum of overlapping segments of the time series. These overlapping
    segments are relatively short compared with the windowed segments used by the
    Welch method, which is used to increase the signal-to-noise ratio of power spectra
    (Welch, 1967). The evolutionary power spectrum method therefore uses the *short-time
    Fourier transform* (STFT) instead of the *fast Fourier transform* (FFT). The output
    of the evolutionary power spectrum is the short-'
