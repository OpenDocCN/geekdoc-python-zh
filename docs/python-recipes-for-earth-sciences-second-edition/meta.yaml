  md: '# Signal Processing


    # 6


    # 6.1 Introduction


    Signal processing involves techniques for manipulating a signal in order to minimize
    the effects of noise, to correct all kinds of unwanted distortions, and to separate
    out various components of interest. Most signal processing algorithms include
    the design and realization of filters. A *filter* can be described as a system
    that transforms signals. *System theory* provides the mathematical background
    for filter design and realization. A filter has an input and an output, with the
    *output signal y(t)* being modified with respect to the *input signal x(t)* (Fig.
    6.1). The *signal transformation* can be carried out through a mathematical process
    known as *convolution* or–if filters are involved–as *filtering*.


    This chapter deals with the design and realization of *digital filters* with the
    help of a computer. However, many natural processes resemble *analog filters*
    that record natural events in geological archives. A single rainfall event is
    not documented in lake sediments because the short duration and low-amplitude
    signal of the event in the sediments (e.g., a short-term change in the chemical
    composition of the sediments) are strongly attenuated in the well-mixed water
    body before they are archived in the sediments. Bioturbation also introduces serious
    signal distortions (e.g., changes in the amplitude and phase of the signal), such
    as in deep sea sediments, where it leads to apparent phase shifts in the oxygen
    isotope signal of individual foraminifera species (e.g., Trauth 2013). In addition
    to such natural filters, the field collection and sampling of geological data
    alters and smooths the data with respect to its original form. For example, a
    finite sized sediment sample is integrated over a certain period of time, which
    smooths the natural signal.


    **Supplementary Information** The online version contains supplementary material
    available at https://doi.org/10.1007/978-3-031-56906-7_6.


    © The Author(s), under exclusive license to Springer Nature Switzerland AG 2024

    M. H. Trauth, *Python Recipes for Earth Sciences*, Springer Textbooks in Earth
    Sciences, Geography and Environment, https://doi.org/10.1007/978-3-031-56906-7_6'
  merge: -1
  pgno: 245
- img_proc: true
  md: '![](img/f6c4e7e52658f332a1ff43bb13764e42_246_0.png)


    Similarly, the measurement of magnetic susceptibility in a sediment core with
    the help of a loop sensor introduces substantial smoothing since the loop response
    is integrated over a section of the core.


    The characteristics of these natural filters are often difficult to determine,
    whereas numerical filters are designed with well-defined characteristics. In addition,
    artificial filters are time invariant in most cases, whereas natural filters (e.g.,
    mixing within the water body of a lake or bioturbation at the water–sediment interface)
    may vary with time. An easy way of describing or predicting the effect of a filter
    is by exploring the output signal of a simple input signal, such as a sine wave,
    a square wave, a sawtooth function, a ramp function, or a step function. Although
    there is an endless variety of such input signals, most systems or filters are
    described by their impulse response, that is, by the output signal resulting from
    a unit impulse as the input signal.


    This chapter proceeds with Sect. 6.2 on generating periodic signals, trends, and
    noise, which takes its cue from Sec. 5.2 of the previous chapter. Sect. 6.3 then
    considers linear time invariant systems and provides a mathematical background
    for filters. The subsequent Sect. 6.4 to 6.9 deal with the design, realization,
    and application of linear time invariant filters. Sect. 6.10 considers the use
    of adaptive filters, which were originally developed for use in the telecommunications
    industry. These adaptive filters automatically extract noise-free signals from
    duplicate measurements of the same object. Such filters can be used in a large
    number of applications, such as in removing noise from duplicate paleoceanographic
    time series and in improving the signal-to-noise ratio of parallel color intensity
    transects across varved lake sediments (see Chap. 5, Fig. 5.1). Adaptive filters
    are also widely used in geophysics for noise canceling. For signal processing,
    we use the NumPy (https://numpy.org) and Matplotlib (https://matplotlib.org) packages,
    and the SciPy (https://scipy.org) library, which contain all the necessary routines.


    # 6.2 Generating Signals


    Python provides numerous tools for generating basic signals that can be used to
    illustrate the effects of filters. In Chap. 5, we generated a signal by adding
    together three sine waves with different amplitudes and periods:'
