    ax2.plot(t, x3,color='b')\nax2.plot(t,y4,color='r')\nplt.show()\n```\n\nor in\
    \ a single plot\n\n```python\nplt.figure()\nplt.plot(t, x3,color='b')\nplt.plot(t,y3,color='g')\n\
    plt.plot(t,y4,color='r',\n    linestyle=':')\nplt.show()\n```\n\nreveals that\
    \ the results from using convolve() are identical with those from using lfilter()\
    \ except at the upper end of the data array. These observations are important\
    \ for our next steps in signal processing, particularly if we are interested in\
    \ leads and lags between various components of signals.\n\n## 6.6 Recursive and\
    \ Nonrecursive Filters\n\nWe now expand the nonrecursive filters by adding a recursive\
    \ component such that the output signal y(t_n) depends not only on the input signal\
    \ x(t_n), but also on previous values of the output signal y(t_{n-1}), y(t_{n-2}),\
    \ y(t_{n-3}), and so on. This filter requires not only the nonrecursive filter\
    \ weights b_i, but also the recursive filter weights a_i (Fig. 6.2), and it can\
    \ be described by the difference equation\n\n$$y(t) = \\sum_{k=-N_1}^{N_2} b_k\
    \ \\cdot x(t-k) - \\sum_{k=1}^{M} a_k \\cdot y(t-k)$$\n\n![Fig. 6.2 Schematic\
    \ of a linear time invariant filter with an input signal x(t) and an output signal\
    \ y(t). The filter is characterized by its weights a_i and b_i and by the delay\
    \ elements T. Nonrecursive filters require only nonrecursive weights b_i, whereas\
    \ recursive filters also require recursive filter weights a_i.](img/f6c4e7e52658f332a1ff43bb13764e42_258_0.png)\n\
    \nThis is a non-causal version of the difference equation, but Python again uses\
    \ causal indexing\n\n$$y(t) = \\sum_{k=0}^{N} b_k \\cdot x(t-k) - \\sum_{k=1}^{M}\
    \ a_k \\cdot y(t-k)$$\n\nwith known problems in the design of zero phase filters.\
    \ The larger of the two quantities M on one hand and N_1 + N_2 or N on the other\
    \ hand is the order of the filter.\n\nWe use the same synthetic input signal x5\
    \ as in the previous example to illustrate the performance of a recursive filter:\n\
    \n```python\nimport numpy as np\nimport scipy.signal as signal\nimport matplotlib.pyplot\
    \ as plt\nfrom numpy.random import default_rng\n\nt=np.linspace(1,100,100)\nrng=default_rng(0)\n\
    x5=rng.standard_normal((100))\n```\n\nThis input signal is then filtered using\
    \ a recursive filter with a set of weights a5 and b5,\n\n```python\nb5=np.array([0.0048,0.0193,0.0289,0.0193,0.0048])\n\
    a5=np.array([1.0000,-2.3695,2.3140,-1.0547,0.1874])\n\nm5=len(b5)\n\ny5=signal.lfilter(b5,a5,x5)\n\
    ```\n\nand the output signal y5 is corrected for the phase\n\n```python\ny5[0:len(y5)-m5+1]\
    \ = y5[np.arange(int((m5-1)/2),\n    len(y5)-int((m5-1)/2))]\ny5[len(y5)-m5+1:len(y5)]\
    \ = np.zeros((1,m5-1))\n```\n\nWe can now plot the results:\n\n```python\nplt.figure()\n\
    plt.plot(t, x5, color='b')\nplt.plot(t, y5, color='r')\nplt.show()\n```\n\nThis\
    \ filter clearly changes the signal. The output signal contains only low-frequency\
    \ components, and all higher frequencies have been eliminated. A comparison of\
    \ the periodograms for the input signal and the output signal reveals that all\
    \ frequencies above f=0.1 (corresponding to a period of τ=10) have been suppressed:\n\
    \n```python\nf, Pxx = signal.periodogram(x5, fs=1, nfft=128)\nf, Pyy = signal.periodogram(y5,\
    \ fs=1, nfft=128)\n\nplt.figure()\nplt.plot(f, Pxx, color='b')\nplt.plot(f, Pyy,\
    \ color='r')\nplt.grid\nplt.xlabel('Frequency')\nplt.ylabel('Power')\nplt.show()\n\
    ```\n\nWe have now designed a frequency selective filter, that is, a filter that\
    \ eliminates certain frequencies while leaving other frequencies relatively unaffected.\
    \ The next section introduces tools that are used both to characterize a filter\
    \ in the time and frequency domains and to predict the effect of a frequency selective\
    \ filter on arbitrary signals.\n\n## 6.7 Impulse Response\n\nThe impulse response\
    \ is a very convenient way of describing the characteristics of a filter (Fig.\
    \ 6.3). The impulse response h is useful in LTI systems, in which the convolution\
    \ of the input signal x(t) with h is used to obtain the output signal y(t):\n\n\
    $$y(t) = \\sum_{k=-N_1}^{N_2} h_k \\cdot x(t-k)$$\n\n![Fig. 6.3 Transformation\
    \ of **a** a unit impulse for computing **b** the impulse response of a system.\
    \ The impulse response is often used to describe and predict the performance of\
    \ a filter.](img/f6c4e7e52658f332a1ff43bb13764e42_260_0.png)\n\nThe values of\
    \ the impulse response $h$ can be shown to be identical to the filter weights\
    \ in nonrecursive filters, but not in recursive filters. The convolution equation\
    \ above is often written in a short form:\n\n$$y(t) = h(t) * x(t)$$\n\nIn many\
    \ examples, convolution in the time domain is replaced with a simple multiplication\
    \ of the Fourier transforms $H(f)$ and $X(f)$ in the frequency domain:\n\n$$Y(f)\
    \ = H(f) \\cdot X(f)$$\n\nThe output signal $y(t)$ in the time domain is then\
    \ obtained via a reverse Fourier transform of $Y(f)$. Signals are often convolved\
    \ in the frequency domain rather than in the time domain due to the relative simplicity\
    \ of the multiplication. However, the Fourier transformation itself introduces\
    \ a number of artifacts and distortions, and convolution in the frequency domain\
    \ is therefore not without problems. In the following examples, we apply the convolution\
    \ only in the time domain.\n\nFirst, we generate a unit impulse:\n\n```python\n\
    import numpy as np\nimport scipy.signal as signal\nimport matplotlib.pyplot as\
    \ plt\n\nt = np.linspace(0, 20, 21)\nx6 = np.zeros(21)\nx6[10] = 1\n\nplt.figure()\n\
    plt.stem(t, x6, basefmt='k-')\n```"
