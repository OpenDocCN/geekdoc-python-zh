    time series, which were previously multiplied with pairwise orthogonal *Slepian*
    tapers.


    The first example below compares the calculation of a spectrum of a sinusoidal
    signal without noise using Thomson''s multitaper method on the one hand with the
    calculation using Schuster''s periodogram method on the other hand (Sect. 5.4).
    First, we create a time axis t that runs from 1/Fs=2 to 500 in steps of 1/Fs=2
    (i.e., the sampling frequency is Fs=2) and transpose it so that the elements of
    t appear in a column instead of a row. We then compute a synthetic signal x by
    adding three sine waves with periods τ₁=50 (f₁=0.02), τ₂=15 (f₂≈0.07), and τ₃=5
    (f₃=0.2). The corresponding amplitudes are A₁=2, A₂=1, and A₃=0.5:


    ```

    import numpy as np

