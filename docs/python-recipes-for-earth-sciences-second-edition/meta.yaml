- md: "## 8.4 Importing, Processing, and Exporting Landsat Images\n\nThe Landsat project\
    \ is a satellite remote sensing program that is jointly managed by the U.S. National\
    \ Aeronautics and Space Administration (NASA) and the U.S. Geological Survey (USGS).\
    \ The project began with the launch of the Landsat 1 satellite (originally known\
    \ as Earth Resources Technology Satellite 1) on 23 July 1972. According to the\
    \ program’s website, the latest in a series of successors is the Landsat 9 satellite,\
    \ which was launched on 27 September 2021. The satellite has two sensors: the\
    \ Operational Land Imager (OLI) and the Thermal Infrared Sensor (TIRS). These\
    \ two sensors provide coverage of the global landmass at spatial resolutions of\
    \ 30 m (visible, NIR, SWIR), 100 m (thermal), and 15 m (panchromatic) (Ochs et\
    \ al. 2009; Irons et al. 2011). General information concerning the Landsat program\
    \ can be obtained from the following website:\n\n```\nhttp://landsat.gsfc.nasa.gov/\n\
    ```\n\nLandsat data–together with data from other NASA satellites–can be obtained\
    \ from the following website:\n\n```\nhttps://earthexplorer.usgs.gov\n```\n\n\
    On the latter website, we first select the desired map section in the *Search\
    \ Criteria* either by entering the coordinates of the four corners of the map\
    \ or by zooming into the area of interest and selecting *Use Map*. As an example,\
    \ we can enter the coordinates 4°42′40.72″N 36°51′10.47″E, which locate the center\
    \ of the Chew Bahir basin in the southern Ethiopian rift. We then choose *L8 OLI/TIRS*\
    \ from the *Landsat Archive* as the *Data Set* and click *Results*, which produces\
    \ a list of records along with a toolbar for previewing and downloading data.\
    \ By clicking the *Show Browse Overlay* button, we can examine the images for\
    \ cloud cover. We then find the cloud-free image\n\n```\nEntity ID: LC81690572013358LGN00\n\
    Coordinates: 4.33915,36.76225\nAcquisition Date: 24-DEC-13\nPath: 169\nRow: 57\n\
    ```\n\ntaken on 24 December 2013. We need to register with the USGS website, log\
    \ in, and download the Level 1 GeoTIFF Data Product (897.5 MB), which is then\
    \ stored in the file `LC81690572013358LGN00.tar.gz`. The `.tar.gz` archive contains\
    \ separate files for each spectral band as well as a metadata file that contains\
    \ information about the data. We use Band 4 (red; 640 to 670 nm), Band 3 (green;\
    \ 530 to 590 nm), and Band 2 (blue; 450 to 510 nm), each of which has a 30 m resolution.\
    \ We can import the 118.4 MB TIFF files using\n\n```\nimport numpy as np\nimport\
    \ matplotlib.pyplot as plt\nfrom skimage import exposure\nfrom skimage import\
    \ io\nfrom skimage import filters\n\nI1 = io.imread('LC81690572013358LGN00_B2.TIF')\n\
    I2 = io.imread('LC81690572013358LGN00_B3.TIF')\nI3 = io.imread('LC81690572013358LGN00_B4.TIF')\n\
    ```\n\nTyping\n\n```\nnp.who()\n```\n\nreveals that the data are in an unsigned\
    \ 16 bit `uint16` format, that is, the maximum range of the data values lies between\
    \ 0 and 2^16-1=65,535:\n\n```\nName          Shape             Bytes         Type\n\
    =====================================================\nI1            7771 x 7611\
    \       118290162     uint16\nI2            7771 x 7611       118290162     uint16\n\
    I3            7771 x 7611       118290162     uint16\n\nUpper bound on total bytes\
    \  =     354870486\n```\n\nFor quantitative analyses, these digital number (DN)\
    \ values need to be converted into radiance and reflectance values, which is beyond\
    \ the scope of this book. Radiance is the power density scattered from the Earth\
    \ in a particular direction and is expressed in units of watts per square meter\
    \ per steradian (i.e., Wm⁻² sr⁻¹) (Richards 2013). The radiance values need to\
    \ be corrected for atmospheric and topographic effects in order to obtain earth\
    \ surface reflectance percentages. The Landsat 8 Handbook provides the necessary\
    \ information on these conversions:\n\nhttps://www.usgs.gov/media/files/landsat-8-data-users-handbook\n\
    \nHowever, we use Landsat 8 data to create an RGB composite of Bands 4, 3, and\
    \ 2 for use in fieldwork. Since the image has a relatively low level of contrast,\
    \ we use `equalize_adapthist()` to perform *contrast limited adaptive histogram\
    \ equalization (CLAHE)* (Zuiderveld 1994). Unlike `equalize_hist()`, which we\
    \ used before, `equalize_adapthist()` works on small regions (or tiles) of the\
    \ image rather than on the entire image. The neighboring tiles are then combined\
    \ using bilinear interpolation in order to eliminate edge effects:\n\n```\nI1\
    \ = exposure.equalize_adapthist(I1,\n    clip_limit=0.1,nbins=256)\nI2 = exposure.equalize_adapthist(I2,\n\
    \    clip_limit=0.1,nbins=256)\nI3 = exposure.equalize_adapthist(I3,\n    clip_limit=0.1,nbins=256)\n\
    ```\n\nUsing `clip_limit` with a real scalar between 0 and 1 limits the contrast\
    \ enhancement. Higher numbers result in increased contrast, and the default value\
    \ is 0.01. Using a `clip_limit` of 0.1 yields good results. The three bands are\
    \ concatenated into a 24 bit RGB image using `dstack()`:\n\n```\nI = np.dstack([I1,I2,I3])\n\
    ```\n\nWe only display the section of the image that contains the Chew Bahir basin\
    \ (using axes limits), and we hide the coordinate axes:\n\n```\nI8 = exposure.rescale_intensity(I,\n\
    \    out_range='uint8')\n\nplt.figure()\nplt.imshow(I8)\nplt.xlim([3000,5000])\n\
    plt.ylim([1000,4000])\nplt.show()\n```\n\nThe function `rescale_intensity()` from\
    \ the *exposure* module of the *scikit-image* package does two things for us:\
    \ First, it returns images after stretching or shrinking their intensity levels\
    \ in order to improve the contrast. Second, it converts the data from any type\
    \ into `uint8` without rolling the values around the value range [0, 255], as\
    \ occurs when using `uint8()` from the *NumPy* package (see Chap. 2.5). To export\
    \ the processed image, we use the command\n\n```\nio.imsave('chewbahirbasin.tif',\n\
    \    I8[999:4000,2999:5000])\n```\n\nThis command saves the RGB composite as the\
    \ TIFF file *chewbahirbasin.tif* (about 18 MB) in the working directory, which\
    \ can then be processed using other software, such as Adobe Photoshop.\n\nAccording\
    \ to the USGS Landsat website, Landsat data are among the most geometrically and\
    \ radiometrically corrected data available. Data anomalies do occasionally occur,\
    \ however, and the most common types are listed on the USGS website:\n\nhttps://www.usgs.gov/land-resources/nli/landsat/landsat-known-issues\n\
    \nWe explore one of these types of anomalies as an example: namely artifacts known\
    \ as *Single Event Upsets* (SEUs), which cause anomalously high values in the\
    \ image and are similar to *Impulse Noise* (IN), which is also described on the\
    \ same website. These anomalies occur in some—but not all—Landsat images, and\
    \ similarly anomalous high or low values can also occur in other satellite images.\
    \ We therefore use part of a Landsat 7 image that covers an area in the southern\
    \ Ethiopian rift and that was acquired by the satellite's Enhanced Thematic Mapper\
    \ (ETM+) instrument. We can load and display the image using\n\n```\nI1 = io.imread('ethiopianrift_blue.tif')\n\
    I1 = exposure.rescale_intensity(I1)\n\nplt.figure()\nio.imshow(I1, cmap='gray')\n\
    plt.title('Original image')\nplt.axis('off')\nio.show()\n```\n\nImage I1 shows\
    \ numerous randomly distributed anomalously high or low values as well as a parallel\
    \ track of paired anomalies in the right half. We first apply a 10-by-10 pixel\
    \ median filter to the image (see Sect. 8.8):\n\n```\nI2 = filters.median(I1,\n\
    \    np.ones((9,9)), mode='reflect')\n\nplt.figure()\nio.imshow(I2, cmap='gray')\n\
    plt.title('Median filtered image')\nplt.axis('off')\nio.show()\n```\n\nThe median-filtered\
    \ version of image I2 is, of course, very smooth compared with the original image\
    \ I1; however, we would lose a lot of detail if we used this version of the image.\
    \ We next subtract the median-filtered image I2 from the original image I1, which\
    \ yields image I3:\n\nAs an example of colormaps, we can use `hot` from the list\
    \ above by typing\n\n```\nprint(cm.hot(range(16)))\nnewhot = cm.get_cmap(cm.hot,16)\n\
    newhot = cm.hot(np.linspace(0,1,16))\nnewhot = ListedColormap(newhot)\n\nplt.figure()\n\
    plt.imshow(I3,cmap=newhot)\nplt.axis('off')\nplt.show()\n```\n\nin order to display\
    \ the image with a black–red–yellow–white colormap. Typing\n\n```\nedit(cm.hot)\n\
    ```\n\nreveals that `hot()` is a function that creates an *m*-by-4 array containing\
    \ floating point values between 0 and 1. We can additionally design our own colormaps\
    \ either by manually creating an *m*-by-3 array or by creating another function\
    \ similar to `hot()`. As an example, we can also use random numbers\n\n```\nnp.random.seed(0)\n\
    newrnd = np.random.rand(16,3)\no1 = np.ones((len(newrnd),1))\nnewrnd = np.append(newrnd,o1,axis=1)\n\
    newrnd = ListedColormap(newrnd)\n\nplt.figure()\nplt.imshow(I3,cmap=newrnd)\n\
    plt.axis('off')\nplt.show()\n```\n\nto display the image I3 with random colors.\
    \ Finally, we can create an indexed color image of three different colors that\
    \ are displayed with a simple colormap of full-intensity red, green, and blue:\n\
