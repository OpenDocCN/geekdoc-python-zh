    \ requires the degrees of freedom $\\Phi$. In our example, we test the hypothesis\
    \ that the data are uniformly distributed, that is, we estimate only one parameter\
    \ (Sect. 3.5). The number of degrees of freedom is therefore $\\Phi = 25 - (1\
    \ + 1) = 23$. We test the hypothesis at a $p = 5\\%$ significance level. The function\
    \ `chi2.ppf()` computes the inverse of the $\\chi^2$ CDF with parameters specified\
    \ by $\\Phi$ for the corresponding probabilities in $p$,\n\n```\nchi2_theo = stats.chi2.ppf(1-0.05,\
