    \ reached. We begin with a value of zero for this criterion:\n\n```\ndiv = 0\n\
    ```\n\nThe *fixed point iteration scheme* consists of two steps: a symmetric orthogonalization\
    \ and the application of the learning rule. The divergence criterion $\\text{div}$\
    \ is updated with each iteration step and is tested in order to stop the iteration\
    \ process as soon as the divergence criterion has been reached. Since Python works\
    \ with floating point numbers, $\\text{div}$ does not actually reach zero, and\
    \ we therefore allow $(1-\\text{div})$ to fall below the floating point relative\
    \ accuracy $\\text{eps}(1)$ (or $\\text{eps}$ without input argument 1 since the\
    \ default input for $\\text{eps}$ is 1), which is about $2.2204\\text{e-}16$ and\
    \ is therefore close to zero (see Sect. 2.5):\n\n```\nwhile (1-div) > np.spacing(1):\n\
    \    B = np.dot(B,np.real(scipy.linalg.sqrtm(\n        np.linalg.inv(np.dot(B.T,\
    \ B)))))\n\n    div = np.min(np.abs(np.diag(np.dot(B.T,BOld))))\n    BOld = B\n\
