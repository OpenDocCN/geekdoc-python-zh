    \ the power spectrum and the probabilities (Fig. 5.19):\n\n```\nplt.figure()\n\
    plt.plot(f,px)\nplt.xlabel('Frequency')\nplt.ylabel('Power')\nplt.show()\n\nplt.figure()\n\
