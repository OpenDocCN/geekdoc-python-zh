- img_proc: true
  md: "The aspect changes abruptly along the ridges of the mountain ranges, where\
    \ neighboring drainage basins are separated by *watersheds*. The *scikit-image*\
    \ package includes `watershed()` for detecting these drainage divides and for\
    \ ascribing numerical labels to each catchment area, starting with one:\n\n```\n\
    watersh = watershed(SRTM,\n    markers=None,\n    watershed_line=True)\n```\n\n\
    The catchment areas are displayed in a pseudocolor plot in which each area is\
    \ assigned a color from the colormap hsv (Fig. 7.15 d) according to its numerical\
    \ label:\n\n```\nplt.figure()\nplt.axes(aspect='equal')\nplt.pcolor(watersh,\n\
    \    cmap=cm.hsv)\nplt.colorbar()\nplt.title('Watershed')\nplt.show()\n```\n\n\
    The watersheds are represented by a series of red pixels. As in this example,\
    \ `watershed()` often generates unrealistic results since watershed algorithms\
    \ are sensitive to local minima, which act as spurious sinks and are potential\
    \ locations of spurious areas of internal drainage. These minima should thus be\
    \ borne in mind during any subsequent computation of hydrological characteristics\
    \ from the DEM.\n\n*Flow accumulation* (also called the *specific catchment area*\
    \ or *upslope contributing area*) is defined as the number of cells (that define\
    \ an uphill area) that contribute runoff to a particular cell (Fig. 7.15). In\
    \ contrast to the local variables of slope and aspect, flow accumulation can only\
    \ be determined from the global neighborhood. The principal operation is to add\
    \ cell inflows from topographically higher neighboring cells starting from the\
    \ specified cell and working up to the watersheds. Before adding together the\
    \ outflows from each cell, we need to determine the gradient of each individual\
    \ cell toward each neighboring cell, which is indexed by N. The array N contains\
    \ indices for the eight adjacent cells according to the Python convention, as\
    \ shown in Fig. 7.14. We make use of `roll()` to access the neighboring cells.\
    \ For a two-dimensional array Z, `roll()` circularly shifts the values in the\
    \ array Z by r rows and c columns. The individual gradients are calculated by\n\
    \n$$grad = \\frac{z_{r+y, c+x} - z_{r,c}}{h}$$"
