    \ section introduces an alternative approach for quality estimation that is much\
    \ more commonly used than the resampling methods.\n\n## 4.7 Cross-Validation\n\
    \nA third method for testing the quality of the result of a regression analysis\
    \ involves *cross-validation*. With cross-validation, the regression line is computed\
    \ using *n*–1 data points. The *n*th data point is predicted, and the discrepancy\
    \ between the prediction and the actual value is computed. Subsequently, the mean\
    \ of the discrepancies between the actual and predicted values is determined.\n\
    \nIn this example, the cross-validation is computed for $n=30$ data points. The\
    \ resulting 30 regression lines, which are each computed using $n-1=29$ data points,\
    \ display some dispersion in their slopes and y-axis intercepts:\n\n```python\n\
    import numpy as np\nimport matplotlib.pyplot as plt\n\nagedepth = np.loadtxt('agedepth_1.txt')\n\
    \nmeters = agedepth[0:, 0]\nage = agedepth[0:, 1]\n\np = np.polyfit(meters, age,\
