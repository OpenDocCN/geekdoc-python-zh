    # # Time Series Analysis 5


    # ## 5.1 Introduction


    *Time series analysis* is used to investigate the temporal behavior of a variable
    $x(t)$. Examples include investigations into long-term records of mountain uplift,
    sea level fluctuations, orbitally induced insolation variations (and their influence
    on the glacial–interglacial cycles), millennium-scale variations in the atmosphere–ocean
    system, the effect of the El Niño–Southern Oscillation on tropical rainfall and
    sedimentation (Fig. 5.1), and tidal influences on noble gas emissions from boreholes.
    The temporal pattern of a sequence of events can be random, clustered, cyclic,
    or chaotic. Time series analysis provides various tools with which to detect these
    temporal patterns. Understanding the underlying processes that produced the observed
    data allows us to predict future values of a variable. For time series analysis,
    we use the *NumPy* (https://numpy.org) and *Matplotlib* packages (https://matplotlib.org),
    and the *SciPy* library (https://scipy.org), which contain all the necessary routines.


    Section 5.2 discusses signals in general and contains a technical description
    of how to generate synthetic signals for time series analysis. The use of spectral
    analysis both to detect cyclicities in a single time series (i.e., auto-spectral
    analysis) and to determine the relationship between two time series as a function
    of frequency (i.e., cross-spectral analysis) is then demonstrated in Sects. 5.3
    to 5.10. Section 5.11 provides an overview of nonlinear techniques, with special
    attention given to recurrence plots. Finally, Sects. 5.12 and 5.13 introduce methods
    for detecting abrupt and gradual transitions in central tendency and dispersion
    in time series.'
