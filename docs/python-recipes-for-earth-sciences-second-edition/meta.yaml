  - "[PAGE 297]\n\noverhead view). Since SRTM data contain a large amount of noise,\
    \ we first smooth the data via an arbitrary 9-by-9 pixel moving average filter\
    \ using convolve2d(). Contrary to the discussion of running means in Chap. 6.8,\
    \ the side effects of the running means are not important at this point. The new\
    \ array is then stored in SRTM_FILTERED:\n\n```\nB = 1/81 * np.ones((9,9))\nSRTM_FILTERED\
    \ = signal.convolve2d(SRTM,B,mode='same')\n```\n\nThe corresponding shaded relief\
    \ map is generated using\n\n```\nplt.figure()\nplt.axes(aspect='equal')\nplt.pcolormesh(LON,LAT,SRTM_FILTERED,\n\
    \    cmap=newcmp,\n    shading='auto')\nplt.colorbar()\nplt.show()\n```\n\nNeighboring\
    \ SRTM tiles overlap one line or column, which we must delete when merging SRTM\
    \ data sets. We use the Baringo basin in Kenya as an example, which is covered\
    \ by two SRTM tiles. We first load the two SRTM data sets from the files *N00E036.hgt*\
    \ and *N00E035.hgt*, as described previously:\n\n```\nwith open('N00E035.hgt')\
    \ as fid:\n    rectype = np.dtype('>i2')\n    SRTM1 = np.fromfile(fid,dtype=rectype)\n\
