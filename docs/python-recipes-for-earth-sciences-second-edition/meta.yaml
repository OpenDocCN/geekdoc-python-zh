    ## 3.4 理论分布


    我们现在描述了样本的经验频率分布。直方图是描述变量 $x$ 频率分布的一种便捷方式。如果我们对变量进行足够多次的采样，并且输出范围很窄，我们就会得到一个非常平滑的直方图版本。无限次的测量
    $n \rightarrow \infty$ 和无限小的类别宽度会产生随机变量的*概率密度函数*（PDF）。概率分布密度 $f(x)$ 定义了变量取值等于
    $x$ 的概率。$f(x)$ 的积分归一化为 1，即观测总数为 1。*累积分布函数*（CDF）是离散 PDF 频率的总和或连续 PDF 的积分。累积分布函数
    $F(x)$ 是变量取值小于或等于 $x$ 的概率。


    下一步，我们需要找到适合前一节描述的经验分布的适当理论分布。因此，本节介绍最重要的理论分布并描述其应用。


    ### 3.4.1 均匀分布


    *均匀*或*矩形分布*是一种具有恒定概率的分布（图 3.4）。相应的概率密度函数为


    ```

    $f(x) = 1/n = const.$

    ```


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_82_0.png)


    其中随机变量 $x$ 可以取 $n$ 个可能值中的任何一个。累积分布函数为


    $F(x) = x \cdot 1/n$


    概率密度函数归一化为 1，


    $\sum_{-\infty}^{+\infty} f(x)dx = 1$


    即所有概率之和为 1。因此，累积分布函数的最大值为 1：


    $F(x)_{max} = 1$


    一个例子是掷一个有 $n=6$ 个面的骰子。像骰子面这样的离散变量只能取可数个数值 $x$。每个面的概率是 1/6。此分布的概率密度函数为


    $f(x) = 1/6$


    相应的累积分布函数为


    $F(x) = x \cdot 1/6$


    其中 $x$ 仅取离散值（即 $x=1, 2, ..., 6$）。


    ### 3.4.2 二项分布


    *二项分布*给出了在 $n$ 次试验中成功 $x$ 次的离散概率，其中任何给定试验的成功概率为 $p$（图 3.5）。二项分布的概率密度函数为


    $f(x) = \binom{n}{x} p^x (1-p)^{n-x}$


    累积分布函数为


    $F(x) = \sum_{i=1}^{x} \binom{n}{i} p^i (1-p)^{n-i}$


    其中


    $\binom{n}{i} = \frac{n!}{i!(n-i)!}$


    二项分布有两个参数 $n$ 和 $p$。此分布应用的一个例子可以在确定钻探取水的可能结果时找到。让我们假设钻探成功的概率为 0.1，即 10%。在总共 $n=10$
    口井中，有 $x=3$ 口井成功的概率是'
