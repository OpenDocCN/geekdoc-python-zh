    the same number of digits. Second, the number of digits after rounding is defined
    by the measurement uncertainty. Third, we need to search for the first non-zero
    digit in the measurement uncertainty starting from the left. If this digit is
    greater than 2, then it is the rounding digit; if this digit is 1 or 2, then the
    next digit to the right is the rounding digit. Fourth, the measurement uncertainty
    is always rounded up. In our example, the first digit of the measurement uncertainty
