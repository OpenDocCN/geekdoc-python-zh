    gl = ax.gridlines(crs=ccrs.PlateCarree(),\n    draw_labels=True,\n    linewidth=0.5)\n\
    gl.xlocator = mticker.FixedLocator([-15,0,15,30,45,60])\ngl.ylocator = mticker.FixedLocator([-30,-15,0,15,30])\n\
    plt.show()\n```\n\nWe can see that the data set in *coastline_data.txt* contains\
    \ only the outline of the African continent because the data in the original GSHHS\
    \ data set are sorted by continent. The data set provided in *CartoPy* also shows\
    \ the coastlines of the area surrounding Africa.\n\n# 7.3 The 15 Arc-Second Global\
    \ Relief Model ETOPO 2022\n\nThe *15 Arc-Second Global Relief Model* (ETOPO 2022)\
    \ is a global database of topographic and bathymetric data on a regular 15 arc-second\
