- md: "## 7.6 Gridding and Contouring\n\nThe previous data sets were all stored in\
    \ evenly spaced two-dimensional arrays. However, most data in the earth sciences\
    \ are obtained from irregular sampling patterns. The data are therefore unevenly\
    \ spaced and need to be interpolated in order to allow a smooth and continuous\
    \ surface to be computed from our measurements in the field. *Surface estimation*\
    \ is typically carried out in two major steps (Fig. 7.5): First, the number of\
    \ *control points* needs to be selected, and second, the value of the variable\
    \ of interest needs to be estimated for the *grid points*.\n\nControl points are\
    \ unevenly spaced field measurements, such as the thickness of sandstone units\
    \ at different outcrops or the concentration of a chemical tracer in water wells.\
    \ The data are generally represented as *xyz* triplets, where *x* and *y* are\
    \ spatial coordinates and *z* is the variable of interest. In such cases, most\
    \ gridding methods require continuous and unique data. However, spatial variables\
    \ in the earth sciences are often discontinuous and not spatially unique: For\
    \ example, the sandstone unit may be faulted or folded. Furthermore, gridding\
    \ requires spatial autocorrelation, that is, the neighboring data points should\
    \ be correlated with one another through a specific relationship. There is no\
    \ point in making a surface estimation if the *z* variables are random and have\
    \ no autocorrelation.\n\nVarious techniques exist for selecting the control points\
    \ that are used to calculate a grid point. Most methods make arbitrary assumptions\
    \ about the autocorrelation of the *z*-variable. For example, the 2D variants\
    \ of the linear and spline interpolation methods introduced in Sect. 5.6 use a\
    \ fixed number of control points to calculate the area pieces from polynomials.\
    \ The *nearest neighbor criterion* includes all control points within a circular\
    \ neighborhood of the grid point, and the radius of the circle is specified by\
    \ the user (Fig. 7.5 a). Since the degree of spatial autocorrelation likely decreases\
    \ with increasing distance from the grid point, considering too many distant control\
    \ points at once likely leads to erroneous results when computing values for these\
    \ grid points. On the other hand, using radii that are too small may limit the\
    \ total control points used in calculating the grid point values to a very small\
    \ number, thereby resulting in a highly error-prone estimate of the modeled surface.\n\
    \nIn another technique, all control points are connected in a triangular network\
    \ (Fig. 7.5 b). Every grid point is located within the triangular area formed\
    \ by three control points. The z-value of the grid point is computed from the\
    \ z-values of the control points at the vertices of the triangle. A modification\
    \ of this form of gridding also uses the three points at the vertices of the three\
    \ adjoining triangles. *Kriging* (which is introduced in Sect. 7.10) is an alternative\
    \ approach for selecting control points and is often regarded as the ultimate\
    \ method of gridding. Some users even use the term *geostatistics* as a synonym.\
    \ Kriging is a method for quantifying spatial autocorrelation and hence for quantifying\
    \ the dimension of the circle used to select the control points. More sophisticated\
    \ versions of kriging use an elliptical area instead of a circle.\n\nAs mentioned\
    \ above, the second step in surface estimation is the actual computation of the\
    \ z-values for the grid points. The *arithmetic mean* of the measured z-values\
    \ at the control points\n\n$$\\bar{z} = \\frac{1}{n} \\sum_{i=1}^{n} z_i$$\n\n\
    provides the easiest way of computing the values at the grid points. This is a\
    \ particularly useful method if there are only a limited number of control points.\
    \ If the study area is well covered by control points and the distance between\
    \ these points is highly variable, the *z*-values of the grid points should be\
    \ computed using a *weighted mean*. This involves weighting the *z*-values at\
    \ the control points by the inverse of the distance $d_i$ from the grid points:\n\
    \n$$\\vec{z} = \\frac{\\sum_{i=1}^{n} (z_i/d_i)}{\\sum_{i=1}^{n} (1/d_i)}$$\n\n\
    Depending on the spatial scaling relationship of the variable *z*, the inverse\
    \ of the square root of the distance (rather than simply the inverse of the distance)\
    \ may be used to weight the *z*-values. Fitting 2D *splines* to the control points\
    \ offers another method for computing the grid point values and is commonly used\
    \ in the earth sciences. Most routines used in surface estimation involve *bicubic\
    \ polynomial splines*, that is, a third-degree 2D polynomial is fitted to at least\
    \ six adjacent control points. The final surface is a composite that comprises\
    \ different portions of these splines.\n\nOne of the advantages of square meshes\
    \ is also one of their disadvantages: Due to the equidistance between these meshes,\
    \ the memory requirement per area is the same everywhere (and thus also in areas\
    \ with a low density of control points and little variation in the variables of\
    \ interest). One way of overcoming this problem is by using triangular meshes\
    \ instead of square meshes. These triangular meshes are calculated by *triangulation*\
    \ from the irregularly distributed control points. There are several different\
    \ methods for calculating such *triangulated irregular networks* (TINs), one of\
    \ which is *Delaunay triangulation*. In this method, the points are linked to\
    \ triangles such that no other points are contained within a circle on which the\
    \ three vertices of the triangle are present.\n\nThe *SciPy* package contains\
    \ several interpolation methods. We first use the bicubic spline, which interpolates\
    \ the data in two dimensions using a spline, that is, a third-degree 3D polynomial\
    \ is fitted to at least six adjacent control points, thereby resulting in a surface\
    \ (and its first derivative) that is continuous. This gridding method is particularly\
    \ well suited for producing smooth surfaces from noisy data sets with unevenly\
    \ distributed control points. As an example, we use synthetic *xyz* data that\
    \ represent the vertical distance between the surface of an imaginary stratigraphic\
    \ horizon that has been displaced by a normal fault on the one hand and by a reference\
    \ surface on the other hand. The foot wall of the fault shows roughly horizontal\
    \ strata, whereas the hanging wall is characterized by two large sedimentary basins.\
    \ The *xyz* data are irregularly distributed and thus need to be interpolated\
    \ to a regular grid. These *xyz* data are stored as a three-column table in a\
    \ file named *normalfault.txt*:\n\nWe can also create and assign the colormap\
    \ `gist_earth` by making it appropriate for elevation data since it relates land\
    \ and sea colors to hypsometry and bathymetry, respectively (Fig. 7.4):\n\n```python\n\
    plt.figure()\nfig,ax2 = plt.subplots(subplot_kw={\"projection\":\"3d\"})\nax2.set_box_aspect((2,1,0.1))\n\
    ax2.set_xlim((35,37))\nax2.set_ylim((-1,0))\nax2.set_zlim((1500,3500))\nls = LightSource(270,45)\n\
    rgb = ls.shade(SRTM,\n    cmap=cm.gist_earth,\n    vert_exag=1,\n    blend_mode='soft',\n\
    \    vmin=0,\n    vmax=np.max(SRTM_FILTERED))\nax2.contour(LON,LAT,SRTM_FILTERED+1,\n\
    \    levels=v,\n    linewidths=0.3,\n    colors='w',\n    linestyles='solid')\n\
    ax2.plot_surface(LON,LAT,SRTM_FILTERED,\n    rstride=5,\n    cstride=5,\n    linewidth=0,\n\
    \    facecolors=rgb,\n    antialiased=False,\n    shade=True,\n    vmin=1500,\n\
    \    vmax=4000)\nax2.tick_params(axis='both',\n    labelsize=6)\nax2.grid(False)\n\
    plt.savefig('srtm_python.png',dpi=300)\nplt.show()\n```\n\n**Fig. 7.4** Display\
    \ from the filtered SRTM elevation data set. The plot uses shading, which is very\
    \ popular in 3D computer graphics and creates a combined diffuse and specular\
    \ reflection on surfaces. (Data from Farr and Kobrick (2000), Farr et al. (2007)).\n\
    \nThe SRTM data set was recently revised again, as described on the USGS website\n\
    \n```\nhttps://www.usgs.gov/centers/eros/science/usgs-eros-archive-digital-elevation-shuttle-radar-topography-mission-srtm-1\n\
    ```\n\nAccording to the information on this website, the latest release of the\
    \ SRTM data set is offered in three versions: (1) SRTM Non-Void Filled, (2) SRTM\
    \ Void Filled, and (3) SRTM 1 Arc-Second Global. The data are available for download\
    \ from\n\n```\nhttps://earthexplorer.usgs.gov\n```\n\nThe EarthExplorer website\
    \ can be used to search for, preview, and download satellite images, aerial photographs,\
    \ and cartographic products through the U.S. Geological Survey (USGS). The SRTM\
    \ data set is located in the *Digital Elevation* category. On this website, we\
    \ first select the desired map section in the *Search Criteria* either by entering\
    \ the coordinates of the four corners of the map or by zooming into the area of\
    \ interest and selecting *Use Map*. As an example, we can enter the coordinates\
    \ of the Suguta Valley in the northern Kenya rift (2°8′37.58″N 36°33′47.06″E).\
    \ We then choose *SRTM* from the *Digital Elevation* collection as the *Data Set*\
    \ and click *Results*, which produces a list of records together with a toolbar\
    \ for previewing and downloading data. In our example, we find a single data set\
    \ *SRTM1S01E036V3*, which was acquired on 11 February 2000 and is centered at\
    \ 0.5°N 36.5°E. We need to register with the USGS website, log in, and then download\
    \ the data set as a 24.76 MB GeoTIFF. The GeoTIFF file contains georeferencing\
    \ information embedded in a TIFF file. We can retrieve this information by typing\n\
    \n```python\nginfo = rasterio.open('s01_e036_1arc_v3.tif')\n```\n\nwhich yields\
    \ the array `ginfo`, which contains the width, the height, and the bounds among\
    \ numerous other pieces of information. We can read the digital elevation model\
    \ using\n\n```python\nA = ginfo.read()\n```\n\nWe can display the data using `show()`\
    \ by typing\n\n```python\nfig = plt.figure()\nrasterio.plot.show(A,\n        \
    \          cmap=cm.terrain,\n                  vmin=0,vmax=4000)\nfig.savefig('srtmimage.png',dpi=300)\n\
    plt.show()\n```\n\nThe new file `srtmimage.png` has a size of 1.3 MB and can now\
    \ be imported into another software package, such as Adobe Photoshop."
  mdcn: "## 7.6 网格化与等值线绘制\n\n之前的数据集都存储在均匀间隔的二维数组中。然而，地球科学中的大多数数据来自不规则的采样模式。因此，数据是不均匀分布的，需要进行插值，以便能够从我们野外测量数据中计算出平滑且连续的表面。*表面估计*通常分两个主要步骤进行（图7.5）：首先，需要选择*控制点*的数量；其次，需要为*网格点*估算目标变量的值。\n\
    \n控制点是不均匀分布的野外测量值，例如不同露头处砂岩单元的厚度或水井中化学示踪剂的浓度。数据通常表示为*xyz*三元组，其中*x*和*y*是空间坐标，*z*是目标变量。在这种情况下，大多数网格化方法要求数据是连续且唯一的。然而，地球科学中的空间变量往往是不连续且非空间唯一的：例如，砂岩单元可能被断层切割或发生褶皱。此外，网格化要求空间自相关，即相邻数据点应通过特定关系相互关联。如果*z*变量是随机的且没有自相关性，那么进行表面估计就没有意义。\n\
    \n存在多种技术用于选择计算网格点所用的控制点。大多数方法对*z*变量的自相关性做出任意假设。例如，第5.6节介绍的线性插值和样条插值方法的二维变体，使用固定数量的控制点通过多项式计算区域块。*最近邻准则*包括网格点圆形邻域内的所有控制点，圆的半径由用户指定（图7.5\
    \ a）。由于空间自相关程度可能随着与网格点距离的增加而降低，因此在计算这些网格点的值时，同时考虑过多的远距离控制点很可能导致错误的结果。另一方面，使用过小的半径可能会将计算网格点值所用的总控制点数量限制在非常少的范围内，从而导致对建模表面的估计误差很大。\n\
    \n在另一种技术中，所有控制点通过三角网络连接（图7.5 b）。每个网格点都位于由三个控制点形成的三角形区域内。网格点的*z*值由三角形顶点处控制点的*z*值计算得出。这种网格化形式的一种改进也使用相邻三个三角形的顶点处的三个点。*克里金法*（在第7.10节介绍）是一种选择控制点的替代方法，通常被视为网格化的终极方法。一些用户甚至将*地质统计学*作为其同义词。克里金法是一种量化空间自相关性的方法，因此也量化了用于选择控制点的圆的维度。更复杂的克里金法版本使用椭圆形区域代替圆形。\n\
    \n如上所述，表面估计的第二步是实际计算网格点的*z*值。控制点处测量*z*值的*算术平均值*\n\n$$\\bar{z} = \\frac{1}{n} \\\
    sum_{i=1}^{n} z_i$$\n\n提供了计算网格点值的最简单方法。如果控制点数量有限，这是一种特别有用的方法。如果研究区域被控制点良好覆盖，并且这些点之间的距离变化很大，则应使用*加权平均值*计算网格点的*z*值。这涉及根据网格点到控制点的距离$d_i$的倒数对控制点处的*z*值进行加权：\n\
    \n$$\\vec{z} = \\frac{\\sum_{i=1}^{n} (z_i/d_i)}{\\sum_{i=1}^{n} (1/d_i)}$$\n\n\
    根据变量*z*的空间尺度关系，可以使用距离的平方根的倒数（而不仅仅是距离的倒数）来对*z*值进行加权。将二维*样条*拟合到控制点提供了计算网格点值的另一种方法，在地球科学中常用。表面估计中使用的大多数程序涉及*双三次多项式样条*，即至少将一个三次二维多项式拟合到六个相邻的控制点。最终表面是由这些样条的不同部分组成的复合体。\n\
    \n方形网格的一个优点也是其缺点：由于这些网格之间的等距性，每个区域的内存需求都是相同的（因此在控制点密度低且目标变量变化小的区域也是如此）。克服这个问题的一种方法是使用三角形网格代替方形网格。这些三角形网格是通过对不规则分布的控制点进行*三角剖分*计算得出的。计算这种*不规则三角网*（TINs）有几种不同的方法，其中之一是*Delaunay三角剖分*。在这种方法中，点被连接成三角形，使得三角形三个顶点所在的圆内不包含其他点。\n\
    \n*SciPy*包包含多种插值方法。我们首先使用双三次样条，它使用样条对数据进行二维插值，即至少将一个三次三维多项式拟合到六个相邻的控制点，从而产生一个连续的表面（及其一阶导数）。这种网格化方法特别适合从具有不均匀分布控制点的噪声数据集中生成平滑表面。作为一个例子，我们使用合成的*xyz*数据，这些数据表示一个假想地层界面的表面（该界面一方面被正断层位移，另一方面与参考面）之间的垂直距离。断层的下盘显示大致水平的地层，而上盘则以两个大型沉积盆地为特征。*xyz*数据是不规则分布的，因此需要插值到规则网格上。这些*xyz*数据以三列表格的形式存储在名为*normalfault.txt*的文件中：\n\
    \n我们还可以创建并分配颜色映射`gist_earth`，使其适合高程数据，因为它将陆地和海洋颜色分别与高程测量和水深测量相关联（图7.4）：\n\n```python\n\
    plt.figure()\nfig,ax2 = plt.subplots(subplot_kw={\"projection\":\"3d\"})\nax2.set_box_aspect((2,1,0.1))\n\
    ax2.set_xlim((35,37))\nax2.set_ylim((-1,0))\nax2.set_zlim((1500,3500))\nls = LightSource(270,45)\n\
    rgb = ls.shade(SRTM,\n    cmap=cm.gist_earth,\n    vert_exag=1,\n    blend_mode='soft',\n\
    \    vmin=0,\n    vmax=np.max(SRTM_FILTERED))\nax2.contour(LON,LAT,SRTM_FILTERED+1,\n\
    \    levels=v,\n    linewidths=0.3,\n    colors='w',\n    linestyles='solid')\n\
    ax2.plot_surface(LON,LAT,SRTM_FILTERED,\n    rstride=5,\n    cstride=5,\n    linewidth=0,\n\
    \    facecolors=rgb,\n    antialiased=False,\n    shade=True,\n    vmin=1500,\n\
    \    vmax=4000)\nax2.tick_params(axis='both',\n    labelsize=6)\nax2.grid(False)\n\
    plt.savefig('srtm_python.png',dpi=300)\nplt.show()\n```\n\n**图7.4** 来自滤波后SRTM高程数据集的显示。该图使用了阴影效果，这在3D计算机图形学中非常流行，并在表面上创建了漫反射和镜面反射的组合。（数据来自Farr和Kobrick\
