    \ EarthExplorer (https://earthexplorer.usgs.gov) 网站免费下载。我们使用两张图像（分别于 2018 年 5\
    \ 月 22 日和 29 日获取），从中加载计算 NDVI 所需的 650 nm (B04) 和 850 nm (B08) 光谱波段：\n\n```python\n\
    filename1 = 'T32UQD_20180522T102031_B04_10m.jp2'\nfilename2 = 'T32UQD_20180522T102031_B08_10m.jp2'\n\
