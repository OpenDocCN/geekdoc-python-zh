  - "[PAGE 472]\n\n```\nplt.figure()\nplt.axes(position=[0.1,0.15,0.35,0.75])\nplt.plot([1,2,3],A)\n\
    plt.legend(['Sand','Lehm','Ton','Wasser'])\nplt.axes(position=[0.55,0.15,0.35,0.75])\n\
    plt.plot([1,2,3],B)\nplt.legend(['Sand','Lehm','Ton'])\nplt.show()\n```\n\nWe\
    \ can see this effect by calculating the correlation matrix (note that the values\
    \ in Tab. 2, the correlation matrix of Scientist B are slightly different in the\
    \ paper) by typing\n\n```\ncorr_A = np.corrcoef(np.transpose(A))\nprint(corr_A)\n\
    corr_B = np.corrcoef(np.transpose(B))\nprint(corr_B)\n```\n\nwhich yields\n\n\
    ```\n[[ 1.000e+00 5.000e-01 7.661e-17 -9.820e-01]\n [ 5.000e-01 1.000e+00 -8.660e-01\
    \ -6.547e-01]\n [ 7.662e-17 -8.660e-01 1.000e+00 1.890e-01]\n [-9.820e-01 -6.547e-01\
    \ 1.890e-01 1.000e+00]]\n[[ 1.         -0.5583      -0.0675    ]\n [-0.5583  \
    \    1.         -0.7901    ]\n [-0.0675     -0.7901      1.        ]]]\n```\n\n\
    As stated above, the joint positive trend of *Sand* and *Lehm* in the analysis\
    \ of Scientist A is removed after removing the negative trend in *Wasser* content\
    \ via drying the samples by Scientist B. We correct the dilution effect by calculating\
    \ the log-ratios according to the principles of John Aitchison\n\n```\nlrA = np.zeros(A.shape)\n\
    lrA[:,0] = np.log(A[:,0]/A[:,1]);\nlrA[:,1] = np.log(A[:,0]/A[:,2]);\nlrA[:,2]\
    \ = np.log(A[:,1]/A[:,2]);\n\nlrB = np.zeros(B.shape)\nlrB[:,0] = np.log(B[:,0]/B[:,1]);\n\
    lrB[:,1] = np.log(B[:,0]/B[:,2]);\nlrB[:,2] = np.log(B[:,1]/B[:,2]);\n```\n\n\
    and display the data by typing (Fig. 9.12 b)"
  - "[PAGE 473]\n\n```\nplt.figure()\nplt.axes(position=[0.1,0.15,0.35,0.75])\nplt.plot([1,2,3],lrA[:,0:3])\n\
    plt.legend(['Sand','Lehm','Ton'])\nplt.axes(position=[0.55,0.15,0.35,0.75])\n\
    plt.plot([1,2,3],lrB[:,0:3])\nplt.legend(['Sand','Lehm','Ton','Wasser'])\nplt.show()\n\
    ```\n\nAs we can see, the data sets are now identical, with no differences in\
    \ the correlations. We can also test this result by calculating the correlation\
    \ matrices of log-ratios that are almost identical,\n\n```\ncorr_lrA = np.corrcoef(np.transpose(lrA[:,0:3]))\n\
    print(corr_lrA)\ncorr_lrB = np.corrcoef(np.transpose(lrB[:,0:3]))\nprint(corr_lrB)\n\
    ```\n\nwhich yields\n\n```\n[[ 1.00000000e+00 1.89453103e-17 -7.37737470e-01]\n\
    \ [ 1.89453103e-17 1.00000000e+00 6.75087717e-01]\n [-7.37737470e-01 6.75087717e-01\
    \ 1.00000000e+00]]\n[[ 1.00000000e+00 4.24369142e-18 -7.30565053e-01]\n [ 4.24369142e-18\
    \ 1.00000000e+00 6.82843103e-01]\n [-7.30565053e-01 6.82843103e-01 1.00000000e+00]]\n\
    ```\n\nThis process results in approximately the same, true, and expected correlations.\n\
    These three examples clearly show how significant the closed sum effect is for\
    \ closed data. The possible diluting effect of single variables must be carefully\
    \ examined, especially in cause-and-effect studies on compositional data because\
    \ such studies are often performed, for example, in paleoclimatology. Aitchison's\
    \ log-ratio transformation is thus a possible pre-treatment of data sets before\
    \ multivariate statistical analyses are performed on compositional data (e.g.,\
    \ Sects. 9.2 to 9.6).\n\n# References\n\nAitchison J (1984) The statistical analysis\
    \ of geochemical composition. Math Geol 16(6):531–564\nAitchison J (1986, reprinted\
    \ 2003) The statistical analysis of compositional data. The Blackburn Press, Caldwell\n\
    Aitchison J (1999) Logratios and natural laws in compositional data analysis.\
    \ Math Geol 31(5):563–580\nBirks HJB, Gordon AD (1985) Numerical methods in quaternary\
    \ pollen analysis. Academic Press, London"
