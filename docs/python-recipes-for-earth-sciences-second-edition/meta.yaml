    \n```python\nprint(100*np.sum(np.sum(I4==0))/np.sum(np.sum(I5==0)))\n```\n\n因此得到\n\
    \n```\n13.672022985345837\n```\n\n这个结果表明，大约 13% 的筛分样品是木炭。作为下一步，我们可以通过选择不同的阈值来量化样品中的其他成分（例如，介形虫或矿物颗粒）。\n\
    \n## 8.12 基于形状的图像对象检测\n\n根据形状对图像中的对象进行计数是一项非常耗时的任务。这有时是针对圆形对象进行的，例如，为了推断过去的海面温度而计数浮游有孔虫壳，为了推断过去湖水的化学成分而计数硅藻壳，或者为了确定物种组合而计数花粉粒，这些组合可用于重建区域气温和降水。确定的线性对象包括航空照片和卫星图像中的断层（以推导一个区域的现今应力场）以及薄片中的年层（例如，纹泥）（以建立年分辨率的地层学）。\n\
    \n*霍夫变换*——以 Paul VC Hough 1962 年的相关专利命名——是一种流行的技术，用于根据形状检测图像中的对象。霍夫变换最初用于检测线性特征，但在获得专利后不久，它就被推广用于识别任何形状的对象（Duda\
    \ and Hart 1972; Ballard 1981）。Gonzalez 和 Woods (2018) 的著作包含了对霍夫变换及其在检测图像中对象方面应用的全面介绍。根据作者对该方法的介绍，霍夫变换分两步进行：第一步，使用边缘检测器从图像中提取边缘特征（例如，明显的沉积层或花粉粒的轮廓）。第二步，识别出追踪这些边缘特征的直线（或任何其他形状的对象）。*scikit-image*\
    \ 包包含使用霍夫变换来检测直线或圆形对象的函数。\n\n经典的霍夫变换用于检测图像中的直线。在应用任何类型的边缘检测器之后，我们得到一个二值图像，其中边缘是黑色像素，之间是白色像素。接下来，我们使用直线到原点的欧几里得距离\
    \ $\\rho$ 以及从原点到直线上最近点的向量的角度 $\\theta$ 来描述通过给定黑色像素的直线（图 8.13 a）：\n\n$$\n\\rho\
    \ = x \\cos \\theta + y \\sin \\theta\n$$\n\n通过边缘特征的特定像素 $(x_i, y_i)$ 的所有直线族在\
    \ $(\\theta, \\rho)$ 参数空间中显示为一条正弦曲线（图 8.13 b）。两条这样的正弦曲线的交点 $(\\theta', \\rho')$\
    \ 对应于通过边缘特征的两个不同像素 $(x_1, y_1)$ 和 $(x_2, y_2)$ 的直线。接下来，我们在霍夫变换中搜索 $n$ 个点 $(x_i,\
    \ y_i)$，其中许多直线相交，因为这些点定义了追踪边缘特征的直线。检测圆而不是直线的工作原理类似，使用圆心的坐标和半径代替 $\\rho$ 和 $\\\
    theta$。"
