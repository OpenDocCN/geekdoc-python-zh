    \ density function y on the bar plot of the original histogram of data:\n\n```\n\
    plt.figure()\nplt.bar(v,n)\nplt.plot(x,y,color='r')\nplt.show()\n```\n\nThe object\
    \ gm also contains information on the relative mixing proportions of the two distributions\
