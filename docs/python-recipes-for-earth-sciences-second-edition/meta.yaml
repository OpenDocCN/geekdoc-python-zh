    \nwhich yields\n\n[2.]\n\nwhich suggests that the new sample is a member of the\
    \ 2nd type of granite.\n\n# 9.5 Cluster Analysis\n\n*Cluster analysis* creates\
    \ groups of objects that are very similar to one another compared with other individual\
    \ objects or groups of objects. This method first computes the *similarity* or\
    \ (alternatively) the *dissimilarity* (or *distance*) between all pairs of objects.\
    \ It then ranks the groups according to their similarity (or distance from one\
    \ another) before finally creating a hierarchical tree, which is visualized as\
    \ a *dendrogram*. The grouping of objects can be useful in the earth sciences,\
    \ for example, when making correlations within volcanic ash layers (Hermanns et\
    \ al. 2000) or comparing different microfossil assemblages (Birks and Gordon 1985).\n\
    \nNumerous methods exist for calculating the similarity or (alternatively) the\
    \ dissimilarity (or distance) between two data vectors. Let us define two data\
    \ sets consisting of multiple measurements from the same object. These data can\
    \ be described by vectors:\n\n$X_1 = (x_{11}, x_{12}, \\dots, x_{1p})$\n\n$X_2\
    \ = (x_{21}, x_{22}, \\dots, x_{2p})$"
