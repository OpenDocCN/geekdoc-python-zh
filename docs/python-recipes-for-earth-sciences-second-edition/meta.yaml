  mdcn: "## 5.12 时间序列中突变的检测\n\n在时域中，有多种方法可用于检测时间序列的突变。其中一种适用于气候时间序列的方法是*斜率拟合法*（Mudelsee\
    \ and Stattegger 1997, Mudelsee 2000），而适用于频域的方法则包括*演化功率谱*和*小波功率谱*（例如，Lau and Weng\
    \ 1995, Mackenzie et al. 2001）。在大多数情况下，时域和频域中的趋势与事件是通过计算包含在长度（或宽度）为*L*的*滑动窗口*内的数据的统计参数（例如，集中趋势和离散度的度量）来检测的。这些参数的精度取决于窗口的长度。换句话说，如果L较大，则可以获得均值和方差的准确值。然而，较大的窗口会降低对这些参数变化估计的精度。这个问题通常被称为*格伦南德统计不确定性原理*（Grenander\
    \ 1958）。不过，如果只需要确定统计参数发生急剧变化的位置，那么通过执行统计检验来评估两个不同滑动窗口在集中趋势和离散度上的差异，可以在一定程度上克服这个问题。\n\
    \n经典的*t*检验和*F*检验统计量常用于比较两组测量值的均值和方差，因此可用于检测两个滑动窗口在位置和离散度上的变化。然而，这两个检验都基于样本来自高斯分布总体的基本假设（第3.7节和第3.8节）。非参数的曼-惠特尼检验和安萨里-布拉德利检验为这个问题提供了一种与分布无关的解决方案（第3.11节和第3.12节）。曼-惠特尼检验（Mann\
    \ and Whitney 1947, Lepage 1971）执行双侧秩和检验，其原假设是两个样本来自具有相同中位数的连续分布，备择假设是它们不具有相同的中位数。另一方面，安萨里-布拉德利检验执行双侧检验，其原假设是两个独立样本来自同一分布，备择假设是它们来自具有相同中位数和形状但离散度不同的分布（Ansari\
    \ and Bradley 1960, Lepage 1971）。后一种方法已成功应用于保存在西非亚热带近海、东地中海和阿拉伯海的海洋沉积物中的陆源粉尘通量记录，以检测非洲上新世-更新世气候中的趋势、周期和事件（Trauth\
    \ et al. 2009）。\n\n形成一个三角形。如果动力学高度规则（即，重复状态在长时间内保持重复），则这种三角形配置会沿着相空间轨迹保持。然而，如果动力学是混沌的，那么最初接近的相空间轨迹部分随后会发散，即使相应的三节点可能在一段时间内保持连接，三角形配置也会瓦解。因此，对于规则动力学，找到三角形的概率更高，而对于混沌动力学则更低。当然，这个解释相当简化，但可以在Donner\
    \ et al. (2011)中找到理论上充分的解释。\n\n为了计算三元组也形成三角形的概率，我们需要计算连接的三元组数量和三角形数量，这可以通过排除主对角线直接从递归图中实现：\n\
    \n```\nA=R - np.eye(len(R))\n```\n\n三角形和三元组的数量则为\n\n```\nnumTripl=np.sum(np.matmul(A,A))\n\
    numTria=np.trace(np.matmul(A,np.matmul(A,A)))\n```\n\n最后，传递性系数是比值\n\n```\nTrans=numTria/numTripl\n\
    print(Trans)\n```\n\n其结果为\n\n```\n0.6459486011860506\n```\n\n这个数字意味着系统不具有规则动力学（规则动力学的传递性系数会接近1）。\n\
    \n为了检测动力学的变化，可以对移动窗口计算递归定量分析。移动窗口的递归定量分析可以通过两种方式计算：1）对沿着单个全局递归图移动的窗口计算递归定量分析度量，或2）对沿着原始时间序列移动的窗口计算各自的递归图。如果非平稳性或趋势不是分析的主要关注点，方法（2）有助于找到忽略这些非平稳性的转变。然而，如果检测整体（全局、大尺度）变化是关注点（例如，检验非平稳性），则应保持递归条件随时间不变（从而允许考虑整个时间序列的全局递归图），并应选择方法（1）（Marwan\
    \ 2011）。所选窗口大小需要足够小以确保良好的时间分辨率，但又要足够大以覆盖典型的变异（例如，几个周期），以便找到递归。\n\n![](img/f6c4e7e52658f332a1ff43bb13764e42_232_0.png)\n\
    \n图 5.32 用于递归图定量度量示例的合成数据时间序列。\n\n在我们的示例中，我们选择移动窗口长度为150个数据点，重叠率为20%（图 5.32）：\n\
    \n```\nw=150\n```\n\n然后我们计算这些移动窗口内的递归率RR和传递性系数Trans（图 5.33 和 5.34）：\n\n```\nTrans=np.zeros(len(R)-w)\n\
    RR=np.zeros(len(R)-w)\nfor i in range(0,len(R)-w,int(w/5)):\n    subR=R[i:i+w,i:i+w]\n\
    \    RR[i]=np.mean(subR)\n    subA=A[i:i+w,i:i+w]\n    numTripl=np.sum(np.matmul(subA,subA))\n\
    \    numClosTria=np.trace(np.matmul(subA,\n        np.matmul(subA,subA)))\n  \
    \  Trans[i]=numClosTria/numTripl\n\nplt.figure()\nplt.plot(t[int(w/2):int(w/2)+len(RR):int(w/5)],\n\
    \    RR[0:-1:int(w/5)],\n    label='Recurrence rate')\nplt.plot(t[int(w/2):int(w/2)+len(RR):int(w/5)],\n\
    \    Trans[0:-1:int(w/5)],\n    label='Transitivity coefficient')\n```\n\n![](img/f6c4e7e52658f332a1ff43bb13764e42_233_0.png)\n\
    \n图 5.33 图 5.30 所示合成数据的递归图，使用嵌入维度 $m=5$ 和延迟 $\\tau=3$，并应用阈值 $\\varepsilon=1.2$。\n\
    \n```\npython\nplt.xlabel('Time')\nplt.legend()\n```\n\n递归定量分析度量显示在高自相关部分内存在一个明显的转变。在这一点上，度量值较高，这反映了黑点密度更高、由于自相关导致的邻域配置变化以及系统动力学的变化。这些较高值的存在可用于检测此类自相关变化（例如，作为*临界点*的前兆），并最终预测临界点本身。两个空象限在时间1,000处发生的转变点直接干扰了移动窗口，从而导致*RR*度量突然下降。\n\
    \n为了可靠地解释递归度量的变化，应应用统计检验（Marwan 2011）。其他更复杂的度量，用于量化动力学的额外方面（例如，可预测性或层流相），包含在MATLAB的交叉递归图工具箱中，该工具箱可在以下地址获取。\n\
    \n```\nhttp://tocsy.pik-potsdam.de/CRPtoolbox/\n```\n\n递归图的双变量和多变量扩展允许进行非线性相关检验和同步分析。关于基于递归图的方法的详细介绍可在以下网站找到：\n\
    \n```\nhttp://www.recurrence-plot.tk\n```\n\n递归图已被用于分析地球科学中的许多问题。将现代降水数据与从阿根廷西北部安第斯山脉的年层湖泊沉积物中推断出的古降水数据进行动力学比较，是此类分析的一个很好的例子（Marwan\
