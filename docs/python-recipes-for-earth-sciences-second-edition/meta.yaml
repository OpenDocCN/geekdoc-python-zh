  - "[PAGE 400]\n\n# 8.10 Grain Size Analysis from Microscopic Images\n\nIdentifying,\
    \ measuring, and counting particles in an image are the classic applications of\
    \ image analysis. Examples from the earth sciences include grain size analysis,\
    \ counting pollen grains, and determining the mineral composition of rocks from\
    \ thin sections. For grain size analysis, the task is to identify individual particles,\
    \ to measure their sizes, and then to count the number of particles per size class.\
    \ The reason for using image analysis lies in its ability to perform automated\
    \ analyses of large sets of samples in a short period of time and at relatively\
    \ low costs. Three different approaches are commonly used to identify and count\
    \ objects in an image: 1) region-based segmentation using the watershed segmentation\
    \ algorithm, 2) object detection using the Hough transform, and 3) thresholding\
    \ using color differences to separate objects. Gonzalez and Woods (2018) describe\
    \ these methods in great detail in the 3rd edition of their excellent book. We\
    \ utilize two examples in order to demonstrate how image processing can be used\
    \ to identify, measure, and count particles. In this section, we demonstrate an\
    \ application of watershed segmentation in grain size analysis, and in Sect. 8.9,\
    \ we introduce thresholding as a method for quantifying charcoal in microscopic\
    \ images.\n\nThe following example covers segmenting, measuring, and counting\
    \ objects using the watershed segmentation algorithm (Fig. 8.11). We first read\
    \ an image of coarse lithic grains of different sizes and store it in variable\
    \ I1. The size of the image is 284·367 pixels, and since the width is 3 cm, the\
    \ height is 3 cm·284/367＝2.32 cm. We type\n\n```\nimport cv2\nimport numpy as\
    \ np\nimport matplotlib.pyplot as plt\nfrom scipy import ndimage as ndi\nfrom\
    \ skimage import color\nfrom skimage import exposure\nfrom skimage import io\n\
    from skimage import feature\nfrom skimage import measure\nfrom skimage import\
    \ segmentation\n\nI1 = io.imread('grainsize.tif')\nix = 3.\niy = 284*3/367\n\n\
    plt.figure()\nio.imshow(I1,\n    extent=[0,ix,0,iy])\nplt.title('Original image')\n\
    plt.axis('off')\nplt.show()\n```"
  - "[PAGE 401]\n\n![](img/f6c4e7e52658f332a1ff43bb13764e42_401_0.png)\n\n**Fig. 8.11**\
    \ Results from the automated grain size analysis of a microscopic image: **a**\
    \ original grayscale image, **b** image after adjusting intensity values, **c**\
    \ image after conversion into a binary image, and **d** image with objects detected\
    \ using a watershed segmentation algorithm.\n\nwhere `ix` and `iy` denote the\
    \ coordinate axes used to calibrate image I1 to a centimeter scale. The true number\
    \ of objects counted in this image is 236 when including the three grains that\
    \ overlap the borders of the image, and this number is therefore ignored in the\
    \ following exercise. We can reject the color information of the image and convert\
    \ image I1 into grayscale using `rgb2gray()`:\n\n```\nI2 = color.rgb2gray(I1)\n\
    \nplt.figure()\nio.imshow(I2,\n    extent=[0,ix,0,iy])\nplt.title('Grayscale image')\n\
    plt.axis('off')\nplt.show()\n```\n\nThis grayscale image I2 has a relatively low\
    \ level of contrast. We therefore use `rescale_intensity()` to adjust the image\
    \ intensity values, which increases the contrast in the new image I3:"
  - "[PAGE 402]\n\n```\nI3 = exposure.rescale_intensity(I2,\n    out_range='uint8')\n\
    \nplt.figure()\nio.imshow(I3,\n    extent=[0,ix,0,iy])\nplt.title('Adjusted intensity\
    \ values')\nplt.axis('off')\nplt.show()\n```\n\nThe function `threshold()` converts\
    \ the background-free image I3 into a binary image I4 via thresholding. If the\
    \ threshold is 0, the image is all white, whereas if the threshold is 255, the\
    \ image is all black. We manually change the threshold value until we obtain a\
    \ reasonable result. We find 50 to be a suitable threshold:\n\n```\nthresh,I4\
    \ = cv2.threshold(I3,\n    50,255,cv2.THRESH_BINARY)\n\nplt.figure()\nio.imshow(I4,\n\
    \    extent=[0,ix,0,iy])\nplt.title('Binary image')\nplt.axis('off')\nplt.show()\n\
    ```\n\nWe next use the watershed segmentation algorithm to separate the grains\
    \ in the image. Watersheds in geomorphology are ridges that divide areas that\
    \ contribute to the hydrological budget of adjacent catchments (see Sect. 7.10).\
    \ Watershed segmentation applies the same methods to grayscale images that are\
    \ used to separate catchments in digital elevation models. In this application,\
    \ the grayscale values are interpreted as elevations in a digital elevation model\
    \ in which the watershed then separates the two objects of interest.\n\nThe criterion\
    \ commonly used to identify pixels that belong to a particular object is the nearest\
    \ neighbor distance. We use the distance transform performed by `distance_transform_edt()`,\
    \ which assigns to each pixel a number that is the distance between the pixel\
    \ and the nearest non-zero pixel in I4:\n\n```\ndistance = ndi.distance_transform_edt(I4)\n\
    ```\n\nThe function uses *Euclidean distances* to compute the nearest neighbor\
    \ distances. The distance matrix now contains positive non-zero values in the\
    \ object pixels and contains zeros elsewhere. We use this information to create\
    \ a mask:"
- md: "## 8.11 Quantifying Charcoal in Microscopic Images\n\nQuantifying the composition\
    \ of substances in the earth sciences (e.g., the mineral composition of a rock\
    \ in thin sections or the amount of charcoal in sieved sediment samples) is facilitated\
    \ by the use of image processing methods. *Thresholding* provides a simple solution\
    \ to problems associated with segmenting objects within an image that have different\
    \ coloration or grayscale values. During the thresholding process, pixels with\
    \ an intensity value greater than a threshold value are marked as object pixels\
    \ (e.g., pixels that represent charcoal in an image), and the rest are marked\
    \ as background pixels (e.g., all other substances). The threshold value is usually\
    \ defined manually by visually inspecting the image histogram, but numerous automated\
    \ algorithms are also available.\n\nAs an example, we next analyze an image of\
    \ a sieved lake sediment sample from Lake Nakuru, Kenya (Fig. 8.12). The image\
    \ shows abundant light-gray oval ostracod shells and some mineral grains as well\
    \ as gray plant remains and black charcoal fragments. We use thresholding to separate\
    \ the dark charcoal particles and count the pixels of these particles after segmentation.\
    \ After determining the number of pixels for all objects that can be distinguished\
    \ from the background by thresholding, we use a lower threshold value to determine\
    \ the ratio of the number of pixels that represent charcoal to the number of pixels\
    \ that represent all particles in the sample (i.e., in order to determine the\
    \ percentage of charcoal in the sample).\n\nWe read the image of size 1500 by\
    \ 1500 pixels and assume that the width and height of the square image are both\
    \ one centimeter:\n\n```python\nimport cv2\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\nfrom skimage import color\nfrom skimage import exposure\nfrom skimage\
    \ import io\n\nI1 = io.imread('lakesediment.jpg')\nix = 1\niy = 1\n\nplt.figure()\n\
    io.imshow(I1,\n    extent=[0,ix,0,iy])\nplt.xlabel('Centimeter')\nplt.ylabel('Centimeter')\n\
    plt.title('Original image')\nio.show()\n```\n\nThe RGB color image is then converted\
    \ into a grayscale image using rgb2gray:\n\n```python\nI2 = color.rgb2gray(I1)\n\
    \nplt.figure()\nio.imshow(I2,\n    extent=[0,ix,0,iy])\nplt.xlabel('Centimeter')\n\
    plt.ylabel('Centimeter')\nplt.title('Grayscale')\nio.show()\n```\n\nSince the\
    \ image contrast is relatively low, we use rescale_intensity() to adjust the image\
    \ intensity values. This increases the contrast in the new image I3:\n\n```python\n\
    I3 = exposure.rescale_intensity(I2,\n    out_range='uint8')\n\nplt.figure()\n\
    io.imshow(I3,\n    extent=[0,ix,0,iy])\nplt.xlabel('Centimeter')\nplt.ylabel('Centimeter')\n\
    plt.title('Better contrast')\nio.show()\n```\n\nThe function `threshold()` converts\
    \ the image I4 into a binary image I6 via thresholding. If the threshold is 0,\
    \ the image is all white, whereas if the threshold is 255, the image is all black.\
    \ We manually change the threshold value until we obtain a reasonable result.\
    \ In our example, a threshold of 43 produces good results for identifying charcoal\
    \ fragments:\n\n```python\nthresh, I4 = cv2.threshold(I3,\n    43,255,cv2.THRESH_BINARY)\n\
    I4 = exposure.rescale_intensity(I6,\n    out_range='uint8')\n\nplt.figure()\n\
    io.imshow(I4,\n    extent=[0,ix,0,iy],\n    cmap='gray')\nplt.xlabel('Centimeter')\n\
