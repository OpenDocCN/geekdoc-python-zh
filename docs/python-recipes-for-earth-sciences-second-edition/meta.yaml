    plt.xlabel('Real Value')\nplt.ylabel('Predicted Value')\nplt.axis('square')\n\
    plt.show()\n```\n\n# 9.7 Aitchison’s Log-Ratio Transformation\n\nAnyone who has\
    \ ever dealt with the statistical analysis of compositional data must have stumbled\
    \ across John Aitchison’s (1926 to 2016) log-ratio transformation. The Scottish\
    \ statistician spent much of his career dealing with the statistics of such data.\
    \ Indeed, he wrote the famous book *The Statistical Analysis of Compositional\
    \ Data* and published multiple papers on the topic (Aitchison 1984, 1986, 1999,\
