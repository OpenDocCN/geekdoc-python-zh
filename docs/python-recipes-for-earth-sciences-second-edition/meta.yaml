    # 4.7 Cross-Validation


    A third method for testing the quality of the result of a regression analysis
    involves *cross-validation*. With cross-validation, the regression line is computed
    using *n*–1 data points. The *n*th data point is predicted, and the discrepancy
    between the prediction and the actual value is computed. Subsequently, the mean
    of the discrepancies between the actual and predicted values is determined.


