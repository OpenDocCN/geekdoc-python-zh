    from skimage import io, exposure

    from skimage import transform as tf


    filename = ''AST_L1A_003_03082003080706_03242003202838.hdf''

    ```


    The package `pyhdf` contains various tools for importing and processing files
    stored in the *hierarchical data format* (HDF). Information about the file can
    be obtained with `info()`,


    ```

    file = SD(filename)

    file.info()

    ```


    which yields


    ```

    (194, 10)

