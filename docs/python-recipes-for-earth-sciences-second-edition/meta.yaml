    # 5.11 Nonlinear Time Series Analysis (by N. Marwan)


    The methods described in the previous sections were used to detect linear relationships
    in data. However, natural processes on the Earth are often complex and chaotic,
    and methods based on linear techniques may therefore yield unsatisfactory results.
    New techniques for nonlinear data analysis that are derived from chaos theory
    have become increasingly popular in recent decades. Such methods have been used
    to describe nonlinear behavior, for example, by defining the scaling laws and
    fractal dimensions of natural processes (Turbotte 1997; Kantz and Schreiber 1997).
    However, most methods of nonlinear data analysis require either long or stationary
    data series, and these requirements are rarely satisfied in the earth sciences.
    While most nonlinear techniques work well on synthetic data, these methods are
    unable to describe the nonlinear behavior of real data.


    During recent decades, recurrence plots have become highly popular in science
    and engineering as a new method of nonlinear data analysis (Eckmann et al. 1987,
    Marwan 2007). Recurrence is a fundamental property of dissipative dynamical systems.'
