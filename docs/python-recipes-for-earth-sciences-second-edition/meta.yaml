    ```\n\n然后我们使用以下代码自助法计算相关系数\n\n```\nind = np.linspace(0,19,30,dtype=int)\nrhos1000\
    \ = np.zeros((1000,4))\nfor i in range(1000):\n    indices = np.random.choice(ind,\n\
    \        size=30,\n        replace=True)\n    r = np.reshape(np.corrcoef(meters[indices],\n\
    \        age[indices]),(1,4))\n    rhos1000[i,:] = r\n\nplt.figure()\nplt.hist(rhos1000[:,1],bins=30)\n\
    plt.show()\n```\n\nrhos1000 的大部分值落在区间 [0.92, 0.98] 内。由于重采样数据集（在我们的例子中）的相关系数近似服从正态分布，我们可以使用它们的均值作为真实相关系数的良好估计。输入\n\
    \n```\nprint(np.mean(rhos1000))\n```\n\n输出\n\n```\n0.9672350831170088\n```\n\n\
    这个值与我们最初的结果 r=0.9563 相似，但现在我们对结果的有效性有了信心。然而，在我们的例子中，年龄-深度数据的自助法相关系数估计值的分布是相当偏斜的，因为其上限固定为\
    \ 1。尽管如此，自助法是评估双变量分析中皮尔逊相关系数可靠性的宝贵工具。\n\n## 4.3 经典线性回归分析\n\n线性回归提供了描述两个变量 $x$\
    \ 和 $y$ 之间关系的另一种方式。虽然皮尔逊相关系数仅提供了线性趋势的粗略度量，但通过回归分析获得的线性模型允许在数据范围内为任何给定的 $x$ 值预测任意的\
    \ $y$ 值。对线性模型进行统计显著性检验，可以深入了解这些预测的准确性。\n\n*经典回归*假设 $y$ 对 $x$ 做出响应，并且数据集中的所有离散性都包含在\
    \ $y$ 值中（图 4.4）。这意味着 $x$ 是自变量（也称为预测变量或回归变量）。$x$ 的值由实验者定义，通常被视为无误差。一个例子是沉积岩芯中测量变量\
    \ $y$ 的位置 $x$。因变量 $y$ 包含误差，因为其大小无法精确确定。线性回归使用最小二乘准则，最小化数据点 $xy$ 与最佳拟合线 $y = b_0\
    \ + b_1x$ 预测值 $y$ 之间的偏差 $\\Delta y$。一般线性模型的基本方程为\n\n$$y = b_0 + b_1x$$\n\n![](img/f6c4e7e52658f332a1ff43bb13764e42_140_0.png)\n\
    \n**图 4.4** 线性回归。经典回归最小化 $\\Delta y$ 偏差，而约化主轴回归最小化数据点与回归线之间的三角形面积 $0.5 \\cdot\
    \ (\\Delta x \\Delta y)$，其中 $\\Delta x$ 和 $\\Delta y$ 分别是预测值与真实 $x$ 和 $y$ 值之间的距离。直线与\
    \ $y$ 轴的截距为 $b_0$，斜率为 $b_1$。这两个参数定义了回归线的方程。\n\n其中 $b_0$ 和 $b_1$ 是回归系数。$b_0$ 的值是\
    \ y 截距，$b_1$ 是直线的斜率。需要最小化的 $\\Delta y$ 偏差的平方和为\n\n$$\\sum_{i=1}^{n} (\\Delta y_i)^2\
    \ = \\sum_{i=1}^{n} (y_i - (b_0 + b_1 x_i))^2$$\n\n对方程右边项进行偏微分并令其为零，得到回归系数 $b_1$\
    \ 的简单方程：\n\n$$b_1 = \\frac{\\sum_{i=1}^{n} (x_i - \\bar{x})(y_i - \\bar{y})}{\\\
    sum_{i=1}^{n} (x_i - \\bar{x})^2}$$\n\n回归线通过由样本均值定义的数据质心，因此我们可以使用单变量样本均值和先前计算的斜率\
    \ $b_1$ 来计算另一个回归系数 $b_0$：\n\n$$b_0 = \\bar{y} - b_1 \\bar{x}$$\n\n作为示例，让我们再次从文件\
    \ *agedepth_1.txt* 加载合成的年龄-深度数据。我们可以定义两个新变量 `meters` 和 `age`，并生成数据的散点图（图 4.5）：\n\
    \n![](img/f6c4e7e52658f332a1ff43bb13764e42_141_0.png)\n\n**图 4.5** 线性回归结果。该图显示了原始数据点（圆圈）、回归线（实线）和回归的误差范围（虚线）。请注意，95%\
    \ 预测区间实际上是弯曲的，尽管在示例中它们几乎看起来像直线。\n\n```\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\n\nagedepth=np.loadtxt('agedepth_1.txt')\n\nmeters=agedepth[0:,0]\nage=agedepth[0:,1]\n\
    ```\n\n双变量散点图中的线性趋势以及大于 $r=0.9$ 的相关系数表明 `meters` 和 `age` 之间存在强线性依赖关系。用地质学术语来说，这意味着沉积速率随时间保持恒定。我们现在可以尝试将线性模型拟合到数据，这将帮助我们预测没有年龄数据的沉积层的年龄。函数\
    \ `polyfit()` 计算一个特定次数的多项式 $p(x)$ 的系数，该多项式以最小二乘意义拟合数据 $y$。在我们的例子中，我们将一个一次（线性）多项式拟合到数据。输入\n\
    \n```\np=np.polyfit(meters,age,1)\nprint(p)\n```\n\n输出\n\n```\n[ 5.36669965 21.7607019]\n\
    ```\n\n其中 `p` 是一个行向量，包含按降幂排列的多项式系数。由于我们使用的是合成数据，我们知道斜率和 $y$ 截距的值。估计的斜率（5.3667）和\
    \ $y$ 截距（21.7607）与真实值 5.6 和 20 分别吻合良好。数据和拟合线都可以绘制在同一张图上：\n\n```\nplt.figure()\n\
    plt.plot(meters,age,\n    marker='o',\n    linestyle='none')\nplt.plot(meters,p[0]*meters+p[1],\n\
    \    color=(0.8,0.5,0.3))\nplt.show()\n```\n\n除了使用回归线方程，我们也可以使用 `poly1d()` 来计算\
    \ $y$ 值：\n\n```\npval=np.poly1d(p)\n\nplt.figure()\nplt.plot(meters,age,\n   \
    \ marker='o',\n    linestyle='none')\nplt.plot(meters,pval(meters),\n    color=(0.8,0.5,0.3))\n\
    plt.show()\n```\n\n系数 p(x) 和通过线性回归获得的方程现在可用于预测任何给定 x 值的 y 值。然而，我们只能在线性模型拟合的深度区间内进行此操作，即在\
    \ 0 到 20 米之间。例如，深度 17 米处沉积物的年龄由下式给出\n\n```\nprint(pval(17))\n```\n\n输出\n\n```\n\
    112.99459593875632\n```\n\n这个结果表明，深度 17 米处的沉积物年龄约为 113 千年。\n\n## 4.4 分析残差\n\n\
    当我们比较预测值与实际或观测值的差异时，我们正在进行残差分析。残差的统计信息为拟合到数据的模型质量提供了有价值的信息。例如，残差中的趋势表明模型未能完全描述数据。在这种情况下，应将更复杂的模型（例如，更高次的多项式）拟合到数据。理想情况下，残差是纯随机的，即它们应服从均值为零的高斯分布。因此，我们通过目视检查直方图并采用第\
