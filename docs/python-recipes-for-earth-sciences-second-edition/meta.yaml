    # 5.6 Interpolating and Analyzing Unevenly Spaced Data


    We can now use our experience in analyzing evenly spaced data to run a spectral
    analysis on unevenly spaced data. Such data are very common in the earth sciences,
    for example, in the field of paleoceanography, where deep sea cores are typically
    sampled at constant depth intervals. The transformation of evenly spaced length
    variable data into time variable data in an environment with changing length–time
    ratios results in unevenly spaced time series. Most methods of time series analysis,
    however, require evenly spaced time axes, which is why we have to convert an unevenly
    spaced time series into a time series with an evenly spaced time axis using *interpolation*.
    The aim of interpolation for *x(t)* data is to calculate the *x*-values for an
    evenly spaced *t*-vector from unevenly spaced *x(t)* measurements.


    Numerous methods exist for interpolating unevenly spaced sequences of data or
    time series (Fig. 5.13 a). *Linear interpolation* predicts the *x*-values by drawing
    a straight line between two neighboring measurements and calculating the *x*-value
    at the appropriate point along the line. However, this method has its limitations
    because it assumes linear transitions in the data, which introduces a number of
    artifacts (including the loss of high-frequency components of the signal) and
    limits the data range to that of the original measurements. Alternatively, *nearest
    neighbor interpolation* simply selects the value of the nearest measurement without
    including the values of other measurements in any calculation. The method is very
    simple since no new values need to be calculated. It is therefore much faster
    than all other methods, especially for very large data sets (e.g., long time series,
    large spatial data sets, and images), but it produces a very angular result.


    *Cubic spline interpolation* is another method of interpolating data that are
    unevenly spaced. Cubic splines are piecewise continuously differentiable curves
    that require at least four data points for each step. An advantage of the method
    is that it preserves the high-frequency information contained in the data. However,
    steep gradients in the data sequence–which typically occur adjacent to extreme
    minima and maxima–could cause spurious amplitudes in the interpolated time series
    (Fig. 5.13 b). A variant that solves this problem is the *piecewise cubic Her-*'
