    ## 3.6 Hypothesis Testing


    The following sections deal with methods used to draw conclusions from the statistical
    sample. These methods can then be applied to the larger population of interest
    (hypothesis testing) (Sects. 3.6 to 3.12). All hypothesis tests share the same
    concept and terminology. The null hypothesis is an assertion about the population
    that describes the absence of a statistically significant characteristic or effect,
    whereas an alternative hypothesis is a contrasting assertion. A hypothesis test
    can be performed as either a one-tailed (one-sided) or a two-tailed (two-sided)
    test (Fig. 3.13). The term tail stems from the concept of tailing off the data
    to the far left or far right of a probability density function, for instance,
    as in the standard normal distribution


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_93_0.png)


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_93_1.png)


    **Fig. 3.13** Plot of a standard normal distribution with **a** one and **b**
    two critical regions, which are shown as shaded areas that contain a total of
    5% of the area under the curve.


    used in the Mann–Whitney and Ansari–Bradley tests (Sects. 3.11 and 3.12). As an
    example, the Mann–Whitney test compares the medians of two data sets. The one-tailed
    Mann–Whitney test is used to test against the alternative hypothesis that the
    median of the first sample is either smaller or larger than the median of the
    second sample at a significance level of 5% (or 0.05). The two-tailed Mann–Whitney
    test is used when the medians are not equal at a 5% significance level, that is,
    when it makes no difference which of the medians is larger. In this case, the
    significance level is halved, that is, 2.5% is used instead of 5%. The *p*-value
    of a hypothesis test is the probability (under the null hypothesis) of observing
    larger values for the test statistic than those calculated from the sample (Fig.
    3.14). The *significance level α* is the threshold of probability that controls
    the outcome of the tests. If the *p*-value is smaller than α, the null hypothesis
    can be rejected. The outcome of the test is regarded as *significant* if *p*<0.05
    and as *highly significant* if *p*<0.01.


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_94_0.png)


    We can display the standard normal distribution for the one-tailed test by typing


    ```python

    import numpy as np

    import matplotlib.pyplot as plt

    from scipy import stats


    x = np.arange(-4,4,0.001)

    pdf = stats.norm.pdf(x,0.,1.)


    plt.figure()

    plt.plot(x,pdf,color=''k'')

    xint = x[np.where(x>stats.norm.ppf(0.95,0.,1.))]

    pdfint = pdf[np.where(x>stats.norm.ppf(0.95,0.,1.))]

    plt.fill_between(xint,pdfint)

    plt.show()

    ```


    which yields a plot with one blue tail to the right in which the 5% area is shaded
    (Fig. 3.13 a). Similarly, we can display the standard normal distribution for
    the two-tailed test by typing


    ```python

    x = np.arange(-4,4,0.001)

    pdf = stats.norm.pdf(x,0.,1.)


    plt.figure()

    plt.plot(x,pdf,color=''k'')

    xint1 = x[np.where(x<stats.norm.ppf(0.05/2,0.,1.))]

    xint2 = x[np.where(x>stats.norm.ppf(1-0.05/2,0.,1.))]

    pdfint1 = pdf[np.where(x<stats.norm.ppf(0.05/2,0.,1.))]

    pdfint2 = pdf[np.where(x>stats.norm.ppf(1-0.05/2,0.,1.))]

    plt.fill_between(xint1,pdfint1,color=(0.3,0.5,0.8))

    plt.fill_between(xint2,pdfint2,color=(0.3,0.5,0.8))

    plt.show()

    ```


    which yields a plot with two blue tails (one to the left and one to the right)
    in which the 2.5% areas are shaded (Fig. 3.13 b).


    Note that we cannot prove the null hypothesis: In other words, *not guilty* is
    not the same as *innocent*. In practice, we design hypotheses based on our data,
    we test them, and we then continue to work with those we could not show to be
    false. The inherent possibility of proving a hypothesis to be false is therefore
    an important requirement of our hypotheses.


    The next sections introduce the most important hypothesis tests for earth science
    applications: the two-sample *t*-test for comparing the means of two data sets,
    the two-sample *F*-test for comparing the variances of two data sets, and both
    the $\chi^2$-test and the Kolmogorov–Smirnov test for comparing distributions
    (Sects. 3.7 to 3.10). The Mann–Whitney and Ansari–Bradley tests are alternatives
    to the *t*-test and *F*-test, respectively, for comparing the medians and dispersions,
    respectively, of two data sets without requiring a normality assumption for the
    underlying population (Sects. 3.11 and 3.12).


    ## 3.7 The t-Test


    *Student''s t-test* was created by William S. Gosset (Student 1908) and compares
    the means of two distributions. The *one-sample t-test* is used to test the hypothesis
    that the mean of a Gaussian-distributed population has a value specified in the
    null hypothesis. The *two-sample t-test* is employed to test the hypothesis that
    the means of two Gaussian distributions are identical. In the following text,
    the two-sample t-test is introduced in order to demonstrate hypothesis testing.
    Let us assume that two independent sets of $n_a$ and $n_b$ measurements have been
    carried out on the same object–for instance, measurements on two sets of rock
    samples taken from two separate outcrops. The t-test can be used to determine
    whether both samples come from the same population, such as the same lithologic
    unit (null hypothesis), or from two different populations (alternative hypothesis).
    Both sample distributions must be Gaussian, and the variances for the two sets
    of measurements should be similar. The appropriate test statistic for the difference
    between the two means is then


    $$t = \frac{|\overline{a} - \overline{b}|}{\sqrt{\frac{n_a+n_b}{n_a n_b} \cdot
    \frac{(n_a-1)\cdot s_a^2+(n_b-1)\cdot s_b^2}{n_a+n_b-2}}}$$


    where $n_a$ and $n_b$ are the sample sizes and $s_a^2$ and $s_b^2$ are the variances
    of the two samples $a$ and $b$, respectively. The null hypothesis can be rejected
    if the measured $t$-value is higher than the critical $t$-value, which depends
    on the number of degrees of freedom $\Phi = n_a + n_b - 2$ and the significance
    level $\alpha$. The one-tailed test is used to test against the alternative hypothesis
    that the mean of the first sample is either smaller or larger than the mean of
    the second sample at a significance level of 5% (or 0.05). The one-tailed test
    would require modifying the equation above by replacing the absolute value of
    the difference between the means with the actual difference between the means.
    The two-tailed $t$-test is used when the means are not equal at a 5% significance
    level, that is, when it makes no difference which of the means is larger. In this
    case, the significance level is halved, that is, 2.5% is used to compute the critical
    $t$-value.


    We can now load two example data sets from two independent series of measurements.
    The first example shows the performance of the two-sample $t$-test on two distributions
    with means of 25.5 and 25.3 and standard deviations of 1.3 and 1.5, respectively:


