- md: "## 8.12 Shape-Based Object Detection in Images\n\nFor our first example, we\
    \ use these functions to detect the thin layers of pure white diatomite within\
    \ exposed varved sediments in the Quebrada de Cafayate in Argentina as these sediments\
    \ were also used as examples in previous sections (Trauth et al. 1999, 2003) (Fig.\
    \ 8.8). The quality of the image is not perfect, which is why we cannot expect\
    \ optimal results. We first read the cropped version of the laminated sediment\
    \ from Sect. 8.8 and store it in variable I1. The size of the image is 1047 by\
    \ 1691 pixels, which consist of three colors (i.e., red, green, and blue):\n\n\
    ```python\nimport cv2\nimport numpy as np\nimport matplotlib.pyplot as plt\nfrom\
    \ skimage import color\nfrom skimage import exposure\nfrom skimage import io\n\
    from skimage import feature\nfrom skimage import transform\nfrom skimage import\
    \ draw\n\nI1 = io.imread('varves_cropped.tif')\n\nplt.figure()\nio.imshow(I1)\n\
    plt.axis('off')\nio.show()\n```\n\nWe can reject the color information of the\
    \ image and convert I1 into grayscale using `rgb2gray()`:\n\n```python\nI2 = color.rgb2gray(I1)\n\
    \nplt.figure()\nio.imshow(I2)\nplt.axis('off')\nio.show()\n```\n\nWe then use\
    \ `equalize_adapthist()` to perform *contrast limited adaptive histogram equalization*\
    \ (CLAHE) in order to enhance the contrast in the image (Zuiderveld 1994):\n\n\
    ```python\nI3 = exposure.equalize_adapthist(I2,\n    clip_limit=0.1, nbins=256)\n\
    \nplt.figure()\nio.imshow(I3)\nplt.axis('off')\nio.show()\n```\n\nIn this case,\
    \ `clip_limit` limits the contrast enhancement using a real scalar from 0 to 1,\
    \ with higher numbers resulting in greater contrast (the default value is 0.01).\
    \ Using a `clip_limit` of 0.1 yields good results. Using `threshold()` then converts\
    \ image I3 into a binary image I4 via thresholding. We manually change the threshold\
    \ value until we obtain a reasonable result and find 0.55 to be a suitable threshold:\n\
    \n```python\nthresh, I4 = cv2.threshold(I3,\n    0.55, 1., cv2.THRESH_BINARY)\n\
    I4 = exposure.rescale_intensity(I4,\n    out_range='uint8')\n\nplt.figure()\n\
    io.imshow(I4)\nplt.axis('off')\nio.show()\n```\n\nThe function `hough_line()`\
    \ implements the Hough transform in order to return the Hough transform accumulator\
    \ H, the angles `theta` at which the transform was computed (in radians), and\
    \ the distance values `dists`:\n\n```python\nH, theta, dists = transform.hough_line(I4)\n\
    ```\n\nWe then display the Hough transform accumulator H using\n\n```python\n\
