- img_proc: true
  md: "Other primary relief attributes (e.g., the *aspect*, the *plan*, the *profile*,\
    \ and the *tangential curvature*) can be derived in a similar way using finite\
    \ differences (Wilson and Gallant 2000). The function `gradient()` calculates\
    \ the slope and aspect of a data grid `z` in degrees above the horizontal and\
    \ degrees clockwise from north. Since the SRTM digital elevation model is sampled\
    \ on a 3 arc-second grid, 60 · 60/3 = 1,200 elements of the DEM correspond to\
    \ one degree of longitude or latitude. For simplicity, we ignore the actual coordinates\
    \ of the SRTM subset in this example and instead use the indices of the DEM elements:\n\
    \n```\nx,y = np.gradient(SRTM)\n\nslp = np.sqrt(x**2+y**2)/90\nslp = np.arctan(slp)*180./np.pi\n\
    asp = np.arctan2(x,y)\nasp = asp*180./np.pi\nasp[asp<0] = asp[asp<0]+360\n```\n\
    \nWe then display a pseudocolor plot of the DEM slope in degrees (Fig. 7.15 b):\n\
    \n```\nplt.figure()\nplt.axes(aspect='equal')\nplt.pcolor(slp,\n    cmap=cm.jet)\n\
    plt.colorbar()\nplt.title('Slope')\nplt.show()\n```\n\nFlat areas are common on\
    \ the summits and on the valley floors. The southeastern and south-southwestern\
    \ sectors are also relatively flat. The steepest slopes are concentrated in the\
    \ center of the area and in the southwestern sector. Next, a pseudocolor plot\
    \ of the aspect is generated (Fig. 7.15 c):\n\n```\nplt.figure()\nplt.axes(aspect='equal')\n\
    plt.pcolor(asp,\n    cmap=cm.jet)\nplt.colorbar()\nplt.title('Aspect')\nplt.show()\n\
    ```\n\nThis plot displays the aspect in degrees clockwise from north. For instance,\
    \ mountain slopes facing north are displayed in red, and east-facing slopes are\
    \ displayed in green."
