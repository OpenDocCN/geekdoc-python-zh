    \ the file identifier `fid`, which is then used to read the binaries from the\
    \ file using the data type `>i2` for big-endian 2 byte (or 16 bit) integers and\
    \ to write them in the array `SRTM` using `fromfile()`. The array first needs\
    \ to be reshaped to (1201, 1201) using `reshape()` and then flipped vertically\
    \ using `flipud()`. We next change the data type to 64 bit floating point numbers\
    \ using `astype()`, and the -32,768 flag for data voids can be replaced by the\
    \ global mean elevation using `mean()`:\n\n```\nSRTM = SRTM.astype(float)\nSRTM[SRTM==-32768]\
    \ = np.mean(SRTM)\n```\n\nFinally, we test whether the data are now correctly\
    \ stored in the workspace by printing the minimum and maximum elevations of the\
    \ area:\n\n```\nnp.max(SRTM)\nnp.min(SRTM)\n```\n\nIn our example, the maximum\
    \ elevation of the area is 3,992 m above sea level, and the minimum is 1,504 m.\
    \ A coordinate system can be defined using the information that the lower-left\
    \ corner is `s01e036`. The resolution is 3 arc seconds, which corresponds to 1/1,200\
    \ of a degree:\n\n```\nlon = np.linspace(36,37,1201)\nlat = np.linspace(-1,0,1201)\n\
    LON,LAT = np.meshgrid(lon,lat)\n```\n\nA shaded grayscale map can be generated\
    \ from the elevation data using `pcolormesh()`, which displays a shaded surface\
