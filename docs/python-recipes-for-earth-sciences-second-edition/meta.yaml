    \n$$x_{fit}(t) = a + \\frac{b}{1 + e^{-d(t-c)}}, \\text{ for } -\\infty < t <\
    \ +\\infty$$\n\n拟合到具有n个数据点的记录$x_i$（$1<i<n$）。sigmoid函数（在其归一化表示中）是一条单调的S形曲线，通常被称为阶跃函数的平滑版本。sigmoid函数以两条水平渐近线为界，当$t\
    \ \\rightarrow -\\infty$和$+\\infty$时，$x_{fit}(t) \\rightarrow 0$和1。它具有钟形的一阶导数曲线和恰好一个拐点（参数c），该拐点可解释为突变的中点。其次，我们对这些记录进行统计重新分析，并再次拟合具有m=4个参数$x_1$、$x_2$、$t_1$和$t_2$的斜坡函数\n\
    \n$$x_{fit}(t) = \\begin{cases} x_1, & \\text{for } t \\le t_1 \\\\ x_1 + (t -\
    \ t_1)(x_2 - x_1)/(t_2 - t_1), & \\text{for } t_1 < t \\le t_2 \\\\ x_2, & \\\
    text{for } t > t_2 \\end{cases}$$\n\n到n个数据点。单调的斜坡形曲线有两个水平段和一个倾斜段，它们通过两个方向的突然变化连接，并且具有不连续的一阶导数。\n\
