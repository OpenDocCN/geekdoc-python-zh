    \ in some situations. In our example, we illustrate the use of a multiple flow\
    \ direction method, which allows flow from a central cell to multiple neighboring\
    \ cells. The proportion of the total outflow that is assigned to a neighboring\
    \ cell is dependent on the gradient between the central cell and that particular\
    \ neighboring cell. Even though multiple flow methods produce more realistic results\
    \ in most situations, they tend to result in dispersion in valleys, where the\
    \ flow should be more concentrated. A weighting factor $w$ is therefore introduced,\
    \ which controls the relationship between the outflows:\n\n> $$flow_i = \\frac{grad_i^w}{\\\
    sum_{i=1}^8 grad_i^w} \\text{for} \\quad grad_i^w < 0$$\n\nA recommended value\
    \ for $w$ is 1.1 because higher values would concentrate the flow in the direction\
    \ of the steepest slope, while $w=0$ would result in extreme dispersion. In the\
    \ following sequence of commands, we first select the gradients that are less\
    \ than zero and then multiply these gradients by the weighting.\n\n```\nw = 1.1\n\
    flow = (grads*(-1*grads<0.))**w\n```\n\nWe then sum the upslope gradients along\
