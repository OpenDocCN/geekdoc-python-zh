    For linear geostatistics, the observations $z$ should be Gaussian distributed.
    This is usually only tested by visually inspecting the histogram because statistical
    tests are often too sensitive if the number of samples exceeds about 100. It is
    also possible to calculate the skewness and kurtosis of the data by typing


