    io.imshow(I3[:,:,2])\nplt.axis('off')\nplt.title('NIR')\nio.show()\n```\n\nWe\
    \ then perform a white balance in order to correct any unrealistic color casts.\
    \ To do so, we need a reference card (usually gray), which is placed within the\
    \ image and used as a reference for the white balance. Alternatively, we can perform\
    \ a fully automated white balance (as we do here) by dividing the values of each\
    \ individual channel by the mean of the values of the individual colors meanR,\
    \ meanG, and meanB and multiplying the values of each channel by the mean value\
    \ of the values of all channels meanGray:\n\n```python\nI3G = color.rgb2gray(I3)\n\
    meanR = np.mean(I3[:,:,0])\nmeanG = np.mean(I3[:,:,1])\nmeanB = np.mean(I3[:,:,2])\n\
    meanGray = np.mean(I3G)\nI3W = np.zeros(np.shape(I3))\nI3W[:,:,0] = I3[:,:,0]*meanGray/meanR\n\
    I3W[:,:,1] = I3[:,:,1]*meanGray/meanG\nI3W[:,:,2] = I3[:,:,2]*meanGray/meanB\n\
    ```\n\nNext, we calculate the NDVI using\n\n```python\nI4 = np.copy(I3W)\nndvi\
    \ = (I4[:,:,2]-I4[:,:,0])/(I4[:,:,2]+I4[:,:,0])\n\nndvi = exposure.rescale_intensity(ndvi,\n\
    \    out_range='uint8')\n\nplt.figure()\nio.imshow(ndvi,\n    cmap='gray')\nplt.axis('off')\n\
    io.show()\n```\n\nAlternatively, we can display the NDVI as a pseudocolor plot\
    \ using the colormap jet:\n\n```python\nndvi = exposure.rescale_intensity(ndvi,\n\
    \    out_range='uint8')\n\nplt.figure()\nio.imshow(ndvi,\n    cmap='jet')\nplt.axis('off')\n\
    io.show()\n```\n\nFinally, we can define an arbitrary threshold th (e.g., 0.4)\
    \ for separating vegetation (displayed as white pixels) from other materials (displayed\
    \ as gray pixels). We then display NDVI>0.4 in green and the lower values in white\
    \ (Fig. 8.6):\n\n![](img/f6c4e7e52658f332a1ff43bb13764e42_386_0.png)\n\n```python\n\
    th = 0.4\nndvit = np.copy(ndvi)\nfor i in range(0,row):\n    for j in range(0,col):\n\
    \        if ndvit[i,j] < th:\n            ndvit[i,j] = 0\n\nndvicmap = np.array([[1,1,1,1],\n\
    \    [0.5,0.6,0.3,1]])\nnewrgb = ListedColormap(ndvicmap)\n\nthresh, ndvitth =\
    \ cv2.threshold(ndvit,\n    150,255,cv2.THRESH_BINARY)\nplt.figure()\nio.imshow(ndvitth,cmap=newrgb)\n\
    plt.axis('off')\nio.show()\n```\n\nWe can also calculate the NDVI from satellite\
    \ data that include the red and near-infrared spectral bands. *Sentinel-2* is\
    \ a system of four satellites designed to make terrestrial observations for a\
    \ variety of tasks, including forest monitoring as well as mapping land surface\
    \ changes and the impact of natural disasters. The data can be downloaded free\
    \ of charge from the USGS EarthExplorer (https://earthexplorer.usgs.gov) website.\
    \ We use two images (acquired on 22 and 29 May 2018, respectively), from which\
    \ we load the 650 nm (B04) and 850 nm (B08) spectral bands, respectively, which\
    \ are required to calculate the NDVI:\n\n```python\nfilename1 = 'T32UQD_20180522T102031_B04_10m.jp2'\n\
    filename2 = 'T32UQD_20180522T102031_B08_10m.jp2'\nfilename3 = 'T32UQD_20180529T101031_B04_10m.jp2'\n\
    filename4 = 'T32UQD_20180529T101031_B08_10m.jp2'\nimg1 = rasterio.open(filename1)\n\
    img2 = rasterio.open(filename2)\nimg3 = rasterio.open(filename3)\nimg4 = rasterio.open(filename4)\n\
    B04_22 = img1.read(1)\nB08_22 = img2.read(1)\nB04_29 = img3.read(1)\nB08_29 =\
    \ img4.read(1)\n```\n\nWe clip the image of the Berlin–Brandenburg area to the\
    \ area of the city of Potsdam, Germany, by typing\n\n```python\nB04_22 = B04_22[8500:9500,6500:7500]\n\
    B08_22 = B08_22[8500:9500,6500:7500]\nB04_29 = B04_29[8500:9500,6500:7500]\nB08_29\
    \ = B08_29[8500:9500,6500:7500]\n```\n\nNext, we convert the uint16 data into\
    \ float64 for the calculations:\n\n```python\nB04_22 = np.float64(B04_22)\nB08_22\
    \ = np.float64(B08_22)\nB04_29 = np.float64(B04_29)\nB08_29 = np.float64(B08_29)\n\
    ```\n\nTo display the images, we first calculate the 5% and 95% percentiles\n\n\
    ```python\nB04_22_05 = np.quantile(B04_22,0.05)\nB04_22_95 = np.quantile(B04_22,0.95)\n\
    B08_22_05 = np.quantile(B08_22,0.05)\nB08_22_95 = np.quantile(B08_22,0.95)\nB04_29_05\
    \ = np.quantile(B04_29,0.05)\nB04_29_95 = np.quantile(B04_29,0.95)\nB08_29_05\
    \ = np.quantile(B08_29,0.05)\nB08_29_95 = np.quantile(B08_29,0.95)\n```\n\nand\
    \ then calculate the NDVI values for both images by typing\n\n```python\nNDVI_22\
    \ = (B08_22-B04_22)/(B08_22+B04_22)\nNDVI_29 = (B08_29-B04_29)/(B08_29+B04_29)\n\
    ```\n\nAs an example, we display the 650 nm and 850 nm spectral bands of the image\
    \ acquired on 22 May 2018 as grayscale images and display the NDVI map as a color\
    \ image, both using the colormap jet,\n\n```python\nplt.figure()\nB04_22_X = exposure.rescale_intensity(B04_22,\n\
    \    in_range=(B04_22_05,B04_22_95),\n    out_range='uint16')\nplt.imshow(B04_22_X,\n\
    \    cmap='gray')\nplt.colorbar()\nplt.axis('off')\nplt.title('650 nm')\nplt.show()\n\
    ```\n\n```python\nplt.figure()\nB08_22_X = exposure.rescale_intensity(B08_22,\n\
    \    in_range=(B08_22_05,B08_22_95),\n    out_range='uint16')\nplt.imshow(B08_22_X,\n\
    \    cmap='gray')\nplt.colorbar()\nplt.axis('off')\nplt.title('850 nm')\nplt.show()\n\
    ```\n\n```python\nplt.figure()\nNDVI_22_X = exposure.rescale_intensity(NDVI_22,\n\
    \    out_range=(0,1))\nplt.imshow(NDVI_22_X,\n    cmap='jet')\nplt.colorbar()\n\
    plt.axis('off')\nplt.title('NDVI 22 May 2018')\nplt.show()\n```\n\nand we save\
    \ the image in a PNG file:\n\n```python\nplt.savefig('sentinel_ndiv_1_vs1.png',dpi=300)\n\
    ```\n\nThen, we calculate the difference between the NDVI maps of the two images\
    \ (acquired on 22 and 29 May 2018, respectively), and we again save the image\
    \ in a PNG file:\n\n```python\nDNDVI = NDVI_22 - NDVI_29\n```\n\n```python\nplt.figure()\n\
    B04_22_X = exposure.rescale_intensity(B04_22,\n    in_range=(B04_22_05,B04_22_95),\n\
    \    out_range='uint16')\nplt.imshow(B04_22_X,\n    cmap='gray')\nplt.colorbar()\n\
    plt.axis('off')\nplt.title('650 nm')\nplt.show()\n```\n\n```python\nplt.figure()\n\
    B08_22_X = exposure.rescale_intensity(B08_22,\n    in_range=(B08_22_05,B08_22_95),\n\
    \    out_range='uint16')\nplt.imshow(B08_22_X,\n           cmap='gray')\nplt.colorbar()\n\
    plt.axis('off')\nplt.title('850 nm')\nplt.show()\n\nplt.figure()\nDNDVI_X = exposure.rescale_intensity(DNDVI,\n\
    \    in_range=(-0.2,0.2),\n    out_range=(0,1))\nplt.imshow(DNDVI_X,\n    cmap='jet')\n\
    plt.colorbar()\nplt.axis('off')\nplt.title('Difference NDVI 22 to 29 May 2018')\n\
    plt.show()\n```\n\n![](img/f6c4e7e52658f332a1ff43bb13764e42_390_0.png)\n\n**Fig.\
    \ 8.7** NDVI maps of Sentinel-2 images of the Berlin–Brandenburg area clipped\
    \ to the area of the city of Potsdam, Germany, taken a on 22 May 2018 and b on\
    \ 29 May 2018, as well as c the difference between the two NDVI images, which\
    \ display the progression in seasonal greening.\n\nThe resulting image very nicely\
    \ displays the progression in seasonal greening (Fig. 8.7).\n\n## 8.8 Image Enhancement,\
    \ Correction, and Rectification\n\nThis section introduces some fundamental tools\
    \ for image enhancement, correction, and rectification. As an example, we use\
    \ an image of varved sediments deposited around 33 kyrs ago in a landslide-dammed\
    \ lake in the Quebrada de Cafayate in Argentina (25°58.900'S 65°45.676'W) (Trauth\
    \ et al. 1999, 2003). The diapositive was taken on 1 October 1996 with a film-based\
    \ single-lens reflex (SLR) camera. A 30-by-20 cm print was made from the slide,\
    \ which was scanned using a flatbed scanner and saved as a 394 kB JPEG file. We\
    \ use this image as an example because it demonstrates some problems that we can\
    \ solve with the help of image enhancement (Fig. 8.8).\n\n![](img/f6c4e7e52658f332a1ff43bb13764e42_391_0.png)\n\
    \n**Fig. 8.8** Results of image enhancements: **a** original image, **b** image\
    \ with intensity values adjusted using `rescale_intensity()`, **c** image with\
    \ enhanced contrast using `equalize_adapthist()`, and **d** image after filtering\
    \ with a 20-by-20 pixel filter with the shape of a Gaussian probability density\
    \ function with a mean of zero and a standard deviation of 10 using `gaussian()`.\n\
    \nWe can read and decompress the file `varves_original.jpg` by typing\n\n```python\n\
    import numpy as np\nimport skimage as ski\nimport matplotlib.pyplot as plt\nfrom\
    \ skimage import io, exposure, filters\n\nI1 = io.imread('varves_original.jpg')\n\
    ```\n\nwhich yields a 24 bit RGB image array `I1` in the Python workspace. Typing\n\
    \n```python\nnp.who()\n```\n\nyields"
  mdcn: "我们现在可以显示红光和近红外波段：\n\n```python\nplt.figure()\nplt.subplot(1,2,1)\nio.imshow(I3[:,:,0])\n\
