    ![](img/f6c4e7e52658f332a1ff43bb13764e42_179_0.png)


    Fig. 5.10 Principle of Welch''s power spectral analysis. The time series is first
    divided into overlapping segments; the power spectrum for each segment is then
    computed, and all spectra are averaged in order to improve the signal-to-noise
    ratio of the power spectrum.


    The Blackman–Tukey method uses the complex Fourier transform $X_{xy}(f)$ of the
    cross-correlation sequence $corr_{xy}(k)$,


    $$X_{xy}(f) = \sum_{k=0}^{m} corr_{xy}(k) e^{i2\pi fk/f_s}$$'
  - '[PAGE 180]


    where $m$ is the maximum lag and $f_s$ is the sampling frequency. The absolute
    value of the complex Fourier transform $X_{xy}(f)$ is the cross-spectrum, while
    the angle of $X_{xy}(f)$ represents the phase spectrum. The phase difference is
    important in calculating leads and lags between two signals, which is a measure
    often used to propose causalities between two processes that have been documented
    by the signals. The correlation between two spectra can be calculated by means
    of the coherence:


    $$C_{xy} = \frac{|X_{xy}(f)|^2}{X_{xx}(f)X_{yy}(f)}$$


    The coherence is a real number between 0 and 1, where 0 indicates no correlation
    and 1 indicates maximum correlation between $x(t)$ and $y(t)$ at frequency $f$.
    A certain degree of coherence is an important precondition for computing phase
    shifts between two signals.


    The next example demonstrates the calculation of a Blackman–Tukey spectrum with
    Python. First, we create a time axis $t$ that runs from $1/F_s=1$ to 1000 in steps
    of $1/F_s=1$ (i.e., the sampling frequency is $F_s=1$), and we then transpose
    it so that the elements of $t$ appear in a column instead of a row. We next compute
    a synthetic signal $x$ by adding three sine waves with periods $\tau_1=50$ ($f_1=0.02$),
    $\tau_2=15$ ($f_2 \approx 0.07$), and $\tau_3=5$ ($f_3=0.2$). The corresponding
    amplitudes are $A_1=2$, $A_2=1$, and $A_3=0.5$, respectively:


    ```

    import numpy as np

    import matplotlib.pyplot as plt

    from scipy import signal


    Fs=1

    t=np.linspace(1/Fs,1000,1000*Fs)


    x= 2*np.sin(2*np.pi*t/50)+\n    np.sin(2*np.pi*t/15)+\n    0.5*np.sin(2*np.pi*t/5)

    ```


    We again generate a signal xns that contains additive noise and a signal xt superimposed
    with a linear trend with a slope of 0.005:


    ```

    np.random.seed(0)

    xns=x+2.5*np.random.randn(np.size(x))

    xt=x+0.005*t


    plt.plot(t,xns)

    ```'
