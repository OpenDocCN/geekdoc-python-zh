    # 2.1 Introduction


    Python is an interpreted programming language that was developed by Guido van
    Rossum in the late 1980s and first publicly released in 1991 (http://www.python.org).
    It is a free and open-source language that is promoted, projected, and advanced
    by the Python Software Foundation (PSF), which was founded in 2001 (http://www.python.org/psf).
    According to its website, the PSF is a non-profit corporation that holds the intellectual
    property rights to the Python programming language. Members of the PSF are individuals
    who have made significant contributions to language''s development, including
    original developer and PSF President G. von Rossum. In addition, numerous companies
    are both members and sponsors of the PSF, including Google, Microsoft, Amazon,
    Meta/Facebook, Netflix, and Huawei (https://www.python.org/psf/sponsors).


    Python is used in many application domains, including in web development, in performing
    mathematical calculations, in analyzing and visualizing data, and in facilitating
    the writing of new software programs. The advantage of this software is that it
    combines comprehensive math and graphics functions with a powerful high-level
    language. Python users have developed numerous extensions (packages) during the
    past several decades (https://pypi.org). While some packages suffer from buggy
    codes and dubious authorship, other Python packages have generally been of relatively
    high quality depending on the development time, the size of the developer community,
    and the package distribution. It is important to note that neither the Python
    Software Foundation nor the developers of the packages offer a warranty and that
    there is no professional support and no claim to complete or up-to-date documentation.
    The PSF makes Python available to licensees on an


