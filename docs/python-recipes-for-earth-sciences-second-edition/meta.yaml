    \ dimensions (m, 1), or a row vector, that is, an array with a single row and\
    \ dimensions (1, n). The if statement evaluates a logical expression and executes\
    \ a group of commands if the expression is true. In the example, the if statement\
    \ selects either m or n depending on whether m==1 is false or true. Here, the\
    \ double equal sign (==) makes element by element comparisons between the variables\
