    # 3.8 The F-Test


    The two-sample *F*-test discussed by Snedecor and Cochran (1989) compares the
    variances $s_a^2$ and $s_b^2$ of two distributions in which $s_a^2 > s_b^2$. An
    example can be found when comparing the natural heterogeneity of two samples based
    on replicated measurements. The sample sizes $n_a$ and $n_b$ should be above 30.
    Both the sample and the population distribution must be Gaussian. The appropriate
    test statistic with which to compare the variances is then


    $$F = \frac{s_a^2}{s_b^2}$$


