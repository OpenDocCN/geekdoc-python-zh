    \n## 5.8 汤姆森多锥法\n\n*汤姆森多锥法*通过平均多个加锥周期图（Thomson 1982, Percival and Walden 1993）（第5.4节）来计算具有n个数据点的时间序列$x(t)$的功率谱。锥是一种窗函数$w(k)$，类似于用于抑制频谱泄漏的窗函数（第5.5节），它与时间序列$x(t)$逐元素相乘。平均大量这样的加锥周期图有助于提高频谱的信噪比并抑制频谱泄漏。由于汤姆森多锥法使用的窗函数$w(k)$是两两正交的，因此加锥频谱估计在统计上是独立的，因此平均周期图代表了真实频谱的无偏估计。在其原始出版物中，David\
    \ J. Thomson使用离散长球序列作为窗函数$w(k)$，以处理David S. Slepian先前发现的偏差和平滑问题（Slepian 1978）。因此，该方法与第5.5节介绍的Welch方法具有相似的目标，即提供真实频谱的无偏估计并提高信噪比（SNR）。在Welch方法中，通过计算时间序列（可能重叠的）段的频谱来实现平均频谱的统计独立性。而汤姆森多锥法则平均整个时间序列变体的频谱，这些变体先前已与两两正交的*Slepian*锥相乘。\n\
    \n下面的第一个例子比较了使用汤姆森多锥法计算无噪声正弦信号频谱与使用舒斯特周期图法计算频谱（第5.4节）。首先，我们创建一个时间轴t，从1/Fs=2到500，步长为1/Fs=2（即采样频率Fs=2），并将其转置，使t的元素按列而不是行出现。然后，我们通过添加三个正弦波来计算合成信号x，周期分别为τ₁=50\
    \ (f₁=0.02)、τ₂=15 (f₂≈0.07)和τ₃=5 (f₃=0.2)。相应的振幅为A₁=2、A₂=1和A₃=0.5：\n\n```python\n\
    import numpy as np\nimport matplotlib.pyplot as plt\nfrom scipy import signal\n\
    \nFs = 2\nNs = 3\nt = np.linspace(1/Fs,500,500*Fs)\nt = np.transpose(t)\n\nnp.random.seed(0)\n\
    x = 2*np.sin(2*np.pi*t/50) + \\\n    np.sin(2*np.pi*t/15) + \\\n    0.5*np.sin(2*np.pi*t/5)\n\
    \nplt.figure()\nplt.plot(t,x)\nplt.axis([0,100,-4,4])\nplt.show()\n```\n\n我们可以使用`periodogram()`通过舒斯特周期图法计算功率谱：\n\
    \n```python\nf,Pxx = signal.periodogram(x,fs = Fs,nfft = t.size)\n\nplt.figure()\n\
    plt.plot(f,Pxx)\nplt.axis([0,1,0,np.max(Pxx)])\nplt.show()\n```\n\n在我们的例子中，周期图是针对t.size个频率计算的，但由于奈奎斯特准则而减半（图5.7）。接下来，我们使用时间-半带宽积nw=4来计算汤姆森多锥功率谱密度（PSD）估计，以控制使用nseq=np.floor(2*nw-1)=7个slepian锥作为窗函数计算PSD估计时的频率分辨率。增加nw会降低频率分辨率但提高信噪比，如下一个例子所示，其中时间序列叠加了噪声。我们首先使用`dpss()`计算nseq=7个Slepian锥，该函数的名称代表离散长球序列。接下来，我们简单地使用第5.3节的脚本计算nseq=7个周期图，然后对其进行平均以计算汤姆森多锥PSD估计Pxxmt：\n\
    \n```python\nnw = 4\nn = int(np.floor(2*nw-1))\ndps_seq = signal.windows.dpss(t.size,nw,n)\n\
    \nfmt = np.zeros((n,int(t.size/2 + 1)))\nPxxmt = np.zeros((n,int(t.size/2+1)))\n\
    for i in range(0,n):\n    fmt[i,:],Pxxmt[i,:]=signal.periodogram(x,fs=Fs,\n  \
