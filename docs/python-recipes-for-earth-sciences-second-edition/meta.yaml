  md: 'If x is real (as in our example), then Xxx is symmetric, with the first (1+nfft/2)
    values in Xxx being unique and all other values being symmetrically redundant.
    The power spectral density is defined as Pxx2 = (abs(Xxx)**2)/Fs/len(x), where
    Fs is the sampling frequency:


    ```

    Pxx2=np.abs(Xxx)**2/Fs/len(x)

    ```


    We now drop the redundant part of the power spectrum and use only the first (1+nfft/2)
    points. We also multiply the power spectral density Pxx2 by two in order to keep
    the same energy as in the symmetric spectrum except for the first data point:


    ```

    Pxx=np.hstack((Pxx2[0],2*Pxx2[1:int(nfft/2)]))

    ```


    The corresponding frequency axis runs from 0 to Fs/2 in Fs/(nfft-1) steps, where
    Fs/2 is the Nyquist frequency:


    ```

    f=np.arange(0,Fs/2,Fs/(nfft-1))

    ```


    We then plot the power spectral density Pxx in the Nyquist frequency range from
    0 to Fs/2, which ranges from 0 to 2/2=1 in our example. The Nyquist frequency
    range corresponds to the first 512 (or nfft/2) data points. We can plot the power
    spectral density over the frequency by typing


    ```

    plt.figure()

    plt.plot(f,Pxx)

    plt.grid

    plt.axis(np.array([0,Fs/2,0,np.amax(Pxx)]))

    plt.show()

    ```


    The graphical output shows that there are three major peaks at the positions of
    the original frequencies of the three sine waves (i.e., 1/50, 1/15, and 1/5).
    Alternatively, we can also plot the power spectral density over the period by
    typing


    ```

    plt.figure()

    plt.plot(1/f,Pxx)

    plt.grid

    plt.axis(np.array([0,70,0,np.amax(Pxx)]))

    plt.show()

    ```


    and we observe the three periods of 50, 15, and 5, as expected. Since the values
    on the x-axis of this plot are not evenly spaced (in contrast to those on the
    frequency axis), we find that the long periods are poorly resolved, and a broad
    peak appears at a period of 50 in the graphics.'
