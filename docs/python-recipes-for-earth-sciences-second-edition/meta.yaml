    \ integral,\n\n$$W(b, a) = \\frac{1}{a^{1/2}} \\int \\psi^* \\left( \\frac{t -\
    \ b}{a} \\right) x(t) \\mathrm{d}t$$\n\nwhere $\\psi^*$ is the complex conjugate\
    \ of $\\psi$. There are many mother wavelets available in the literature, such\
    \ as the classic *Haar* wavelet, the *Morlet* wavelet, and the *Daubechies* wavelet.\
    \ The most popular wavelet in the earth sciences is the Morlet wavelet, which\
    \ was introduced by French geophysicist Jean Morlet (1931 to 2007) and is defined\
    \ by\n\n$$\\psi_0(\\eta) = \\pi^{-1/4} exp(i\\omega_0\\eta) exp(-\\eta^2/2)$$\n\
    \nwhere $\\eta$ is the time and $\\omega_0$ is the wave number (Torrence and Compo\
