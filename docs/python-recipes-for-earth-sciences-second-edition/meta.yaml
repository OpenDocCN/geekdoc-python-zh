- img_proc: true
  md: "We are interested in element1a and element1b, which contribute to a sediment\
    \ and are diluted by element1c. We simply create three variables, each of which\
    \ has a characteristic but different cycle with periods of 2, 5, and 20, respectively.\
    \ The sinusoidal variables element1a and element1b (measured in milligrams) have\
    \ an amplitude of one, whereas the diluting variable element1c has an amplitude\
    \ of two. The variables are sampled with an interval of 0.1 in the period from\
    \ 0.1 to 20, which produces a time series of 200 values. We add 5 mg each to element1a,\
    \ element1b and element1c making sure that all absolute values are>0, which does\
    \ not occur with compositional data (Fig. 9.10 a):\n\n```\nt = np.linspace(0.1,20,200)\n\
    t = np.transpose(t)\n\nelement1a = np.sin(2*np.pi*t/2) + 5\nelement1b = np.sin(2*np.pi*t/5)\
    \ + 5\nelement1c = 2*np.sin(2*np.pi*t/20) + 5\n\nplt.figure()\nplt.plot(t,element1a,\n\
    \    color=colors[0,:])\nplt.plot(t,element1b,\n    color=colors[1,:])\nplt.plot(t,element1c,\n\
    \    color=colors[3,:])\nplt.legend(['1a','1b','1c'])\nplt.title('Absolute Amount\
    \ of 1a-c (mg)')\nplt.show()\n```\n\nWe calculate the percentages of element1a,\
    \ element1b, and element1c (i.e., we create ratios of the concentrations of the\
    \ individual elements and the sum of the concentrations of all elements). This\
    \ process creates closed data (i.e., the data are now expressed as proportions\
    \ and add to a fixed total of 100 percent): element1a+element1b+element1c=100%.\
    \ Both element1a and element1b are now affected by the dilution caused by element1c.\
    \ These elements show a major sinusoidal long-term trend that is not real (as\
    \ is shown by the first figure) (Fig. 9.10 b):\n\n```\nelement1a_perc = element1a/(element1a+\
    \ \\n    element1b+element1c)\nelement1b_perc = element1b/(element1a+ \\n    element1b+element1c)\n\
    element1c_perc = element1c/(element1a+ \\n    element1b+element1c)\n```"
  merge: -1
