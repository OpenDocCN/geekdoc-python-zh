- md: "## 5.11 Nonlinear Time Series Analysis (by N. Marwan)\n\nThe methods described\
    \ in the previous sections were used to detect linear relationships in data. However,\
    \ natural processes on the Earth are often complex and chaotic, and methods based\
    \ on linear techniques may therefore yield unsatisfactory results. New techniques\
    \ for nonlinear data analysis that are derived from chaos theory have become increasingly\
    \ popular in recent decades. Such methods have been used to describe nonlinear\
    \ behavior, for example, by defining the scaling laws and fractal dimensions of\
    \ natural processes (Turbotte 1997; Kantz and Schreiber 1997). However, most methods\
    \ of nonlinear data analysis require either long or stationary data series, and\
    \ these requirements are rarely satisfied in the earth sciences. While most nonlinear\
    \ techniques work well on synthetic data, these methods are unable to describe\
    \ the nonlinear behavior of real data.\n\nDuring recent decades, recurrence plots\
    \ have become highly popular in science and engineering as a new method of nonlinear\
    \ data analysis (Eckmann et al. 1987, Marwan 2007). Recurrence is a fundamental\
    \ property of dissipative dynamical systems. Although small disturbances in such\
    \ systems can cause exponential divergence in the systems’ states, after some\
    \ time, the systems return to a state that is close to a former state before again\
    \ passing through a similar evolution. Recurrence plots allow such recurrent behavior\
    \ of dynamical systems to be visually portrayed. The method is now widely accepted\
    \ as a useful tool in the nonlinear analysis of short and nonstationary data sets.\n\
    \n### 5.11.1 Phase Space Portrait\n\nThe behavior of a complex dynamical system\
    \ (e.g., the process of sedimentation in a lake) is determined by many variables,\
    \ such as the properties of the water body and the sediment beneath the lake,\
    \ the organisms living in the lake and its surroundings, precipitation (with high\
    \ rainfall causing increased weathering and erosion in the catchment area), evaporation\
    \ (with higher evaporation resulting, e.g., in higher potassium concentrations\
    \ in the sediment), and wind speed (which can transport more solid particles into\
    \ the lake). Analyzing the properties of such a dynamical system and the time-varying\
    \ interaction between the system’s components requires keeping a record of these\
    \ state variables over time. Since there are usually no ancient records available\
    \ of a system’s state variables (e.g., precipitation, evaporation, or wind speed),\
    \ we must instead rely on indirect indicators (proxies) that have been preserved\
    \ in natural archives. A proxy record is obtained by sampling a single variable\
    \ of a multi-dimensional dynamical system, which is equivalent to projecting the\
    \ dynamics of a complex system onto a single axis. Considering the example of\
    \ sediment in a paleolake, the sampled variable could be a time series $x(t)$\
    \ of potassium concentrations along a lake sediment core that represents a natural\
    \ archive of past states of the lake system.\n\nOne way to unfold the dynamics\
    \ of a multi-dimensional system from a one-dimensional time series $x(t)$ is through\
    \ time delay *embedding*, which preserves the dynamic characteristics of the system\
    \ (Packard et al. 1980). Such a one-dimensional time series–which is based on\
    \ a single variable–contains information about the system and its state variables\
    \ from which a complete reconstruction of the entire system can be made. In other\
    \ words, since the potassium concentration is a result of a complex interplay\
    \ between unknown environmental variables (e.g., precipitation, evaporation, and\
    \ wind velocity), analyzing the temporal variations in this environmental proxy\
    \ helps us to understand the properties of the paleolake and the time-varying\
    \ interactions between its components. The embedding of the time series $x(t)$\
    \ in a three-dimensional ($m = 3$) *phase space*, for example, means that three\
    \ successive values $x(t)$, $x(t + \\tau)$, and $x(t + 2\\tau)$ with a temporal\
    \ separation $\\tau$ are represented as a point in a three-dimensional coordinate\
    \ system (i.e., the phase space) (Packard et al. 1980). The *phase space portrait*\
    \ displays the embedded time series of observations as a trajectory $\\vec{y}(t)\
    \ = [x(t), x(t + \\tau), x(t + 2\\tau)]^T$ in the phase space. The phase space\
    \ trajectory represents the path over which the system evolves.\n\nIn order to\
    \ familiarize ourselves with wavelet power spectra, we can calculate a continuous\
    \ wavelet transform (CWT) of the synthetic data used in Sect. 5.6. We first load\
    \ the synthetic data contained in file *series3.txt* while bearing in mind that\
    \ the data contain periodicities of 100, 40, and 20 kyr as well as additive Gaussian\
    \ noise and that they are unevenly spaced about the time axis:\n\n```python\n\
    series3=np.loadtxt('series3.txt')\n```\n\nAs with the Fourier transform (Sects.\
    \ 5.3 to 5.7) and in contrast to the Lomb–Scargle algorithm (Sect. 5.9), the wavelet\
    \ transform requires evenly spaced data, and we therefore interpolate the data\
    \ using `interp1d()`:\n\n```python\nt=np.arange(0.,996.+3.,3.)\nfun=interpolate.interp1d(series3[:,0],\n\
    \    series3[:,1],kind='linear')\nseries3L=fun(t)\n```\n\nIf our time series has\
    \ a trend, we need to remove this trend before running the wavelet analysis (see\
    \ Sect. 5.4):\n\n```python\nseries3L=signal.detrend(series3L)\n```\n\nWe then\
    \ use cwt() with the data series series3L and the inverse of our sampling interval\
    \ as the sampling frequency. In our example, the sampling interval is 3, and the\
    \ sampling frequency is therefore 1/3. The output of cwt() using a Morlet wavelet\
    \ is the wavelet transform cwtmatr:\n\n```python\nfs=1/3\nfreqs=np.linspace(0.001,fs/2,1000)\n\
    w0=6\nwidths=w0*fs/(2.*np.pi*freqs)\ncwtmatr=signal.cwt(series3L,\n    signal.morlet2,widths,w=w0)\n\
    ```\n\nWe now display the wavelet power spectrum. We can change the limits of\
    \ the axes, the colormap, and many other things. We can see cycles with frequencies\
    \ of 0.01/kyr (corresponding to a period of 100 kyr), 0.025/kyr (40 kyr), and\
    \ 0.05/kyr (20 kyr). The great thing about wavelet power spectra is that they\
    \ display an evolutionary spectrum, that is, they display the appearance and disappearance\
    \ of cycles over time:\n\n```python\nplt.contourf(t,freqs,np.abs(cwtmatr),\n \
    \   cmap='viridis')\nplt.colorbar()\nplt.xlabel('Time (kyr)')\nplt.ylabel('Frequency\
    \ (1/kyr)')\nplt.xlim([0,1000])\nplt.ylim([0.,0.07])\nplt.show()\n```\n\nWe now\
    \ display the same plot with periods instead of frequencies on the y-axis. We\
    \ can see cycles with a period of 100 kyr, 40 kyr, and 20 kyr (Fig. 5.22):\n\n\
    ```python\nperiods=1/freqs\nplt.contourf(t,periods,np.abs(cwtmatr),\n    cmap='viridis')\n\
    plt.colorbar()\nplt.xlabel('Time (kyr)')\nplt.ylabel('Frequency (1/kyr)')\nplt.xlim([0,1000])\n\
    plt.ylim([0.,200])\nplt.show()\n```\n\nWe can also display the same plot using\
    \ `pcolormesh()` instead of `contourf()` (Fig. 5.23):\n\n```python\nplt.pcolormesh(t,\
    \ periods, np.abs(cwtmatr),\n               cmap='viridis')\nplt.colorbar()\n\
    plt.xlabel('Time (kyr)')\nplt.ylabel('Period (kyr)')\nplt.xlim([0, 1000])\nplt.ylim([0.,\
    \ 200])\nplt.show()\n```\n\nCompared with the windowed power spectrum method,\
    \ the wavelet power spectrum clearly shows a much higher resolution on both the\
    \ time and frequency axes. Instead of dividing the time series into overlapping\
    \ segments and computing the power spectrum for each segment, the wavelet transform\
    \ uses short packets of waves that better map temporal changes in the cyclicities.\
    \ However, the disadvantage of both the windowed power spectrum and the wavelet\
    \ power spectrum is that they require evenly spaced data. The Lomb–Scargle method\
    \ overcomes this problem but has limitations in its ability to map temporal changes\
    \ in the frequency domain (as is also the case with the power spectrum method)."
  mdcn: "## 5.11 非线性时间序列分析（作者：N. Marwan）\n\n前面章节描述的方法用于检测数据中的线性关系。然而，地球上的自然过程往往是复杂且混沌的，因此基于线性技术的方法可能无法得出令人满意的结果。近几十年来，源自混沌理论的非线性数据分析新技术日益流行。此类方法已被用于描述非线性行为，例如，通过定义自然过程的标度律和分形维数（Turbotte\
    \ 1997; Kantz and Schreiber 1997）。然而，大多数非线性数据分析方法需要较长或平稳的数据序列，而这些要求在地球科学中很少得到满足。虽然大多数非线性技术在合成数据上表现良好，但这些方法无法描述真实数据的非线性行为。\n\
    \n近几十年来，递归图作为一种新的非线性数据分析方法，在科学和工程领域变得非常流行（Eckmann et al. 1987, Marwan 2007）。递归是耗散动力系统的一个基本属性。尽管此类系统中的微小扰动可能导致系统状态呈指数级发散，但经过一段时间后，系统会返回到接近之前的状态，然后再次经历类似的演化过程。递归图允许将动力系统的这种递归行为可视化。该方法现在被广泛接受为分析短时和非平稳数据集的非线性分析的有用工具。\n\
    \n### 5.11.1 相空间图\n\n一个复杂动力系统（例如，湖泊中的沉积过程）的行为由许多变量决定，例如水体和湖底沉积物的性质、生活在湖泊及其周围的生物、降水（高降雨量会导致流域内风化和侵蚀加剧）、蒸发（例如，较高的蒸发会导致沉积物中钾浓度升高）以及风速（风速可以将更多固体颗粒输送到湖中）。分析这样一个动力系统的性质以及系统各组成部分之间随时间变化的相互作用，需要记录这些状态变量随时间的变化。由于通常没有古代系统状态变量（例如，降水、蒸发或风速）的记录可用，我们必须依赖于保存在自然档案中的间接指标（代用指标）。代用记录是通过采样多维动力系统的单个变量获得的，这相当于将复杂系统的动力学投影到单个轴上。以古湖泊沉积物为例，采样的变量可以是沿湖泊沉积岩芯的钾浓度时间序列\
    \ $x(t)$，它代表了湖泊系统过去状态的自然档案。\n\n从一维时间序列 $x(t)$ 展开多维系统动力学的一种方法是通过时间延迟*嵌入*，它保留了系统的动态特性（Packard\
    \ et al. 1980）。这种基于单个变量的一维时间序列包含了关于系统及其状态变量的信息，从中可以完整地重建整个系统。换句话说，由于钾浓度是未知环境变量（例如，降水、蒸发和风速）之间复杂相互作用的结果，分析这一环境代用指标的时间变化有助于我们了解古湖泊的性质及其各组成部分之间随时间变化的相互作用。例如，将时间序列\
    \ $x(t)$ 嵌入到三维（$m = 3$）*相空间*中，意味着三个连续值 $x(t)$、$x(t + \\tau)$ 和 $x(t + 2\\tau)$（时间间隔为\
    \ $\\tau$）被表示为三维坐标系（即相空间）中的一个点（Packard et al. 1980）。*相空间图*将嵌入的观测时间序列表示为相空间中的轨迹\
    \ $\\vec{y}(t) = [x(t), x(t + \\tau), x(t + 2\\tau)]^T$。相空间轨迹代表了系统演化的路径。\n\n为了熟悉小波功率谱，我们可以计算第\
    \ 5.6 节中使用的合成数据的连续小波变换（CWT）。我们首先加载文件 *series3.txt* 中包含的合成数据，同时记住数据包含 100、40 和\
    \ 20 kyr 的周期性以及加性高斯噪声，并且它们在时间轴上分布不均匀：\n\n```python\nseries3=np.loadtxt('series3.txt')\n\
    ```\n\n与傅里叶变换（第 5.3 至 5.7 节）类似，而与 Lomb-Scargle 算法（第 5.9 节）不同，小波变换要求数据均匀分布，因此我们使用\
    \ `interp1d()` 对数据进行插值：\n\n```python\nt=np.arange(0.,996.+3.,3.)\nfun=interpolate.interp1d(series3[:,0],\n\
    \    series3[:,1],kind='linear')\nseries3L=fun(t)\n```\n\n如果我们的时间序列存在趋势，我们需要在运行小波分析之前去除该趋势（参见第\
    \ 5.4 节）：\n\n```python\nseries3L=signal.detrend(series3L)\n```\n\n然后我们使用 cwt()，输入数据序列\
    \ series3L 和采样间隔的倒数作为采样频率。在我们的例子中，采样间隔是 3，因此采样频率是 1/3。使用 Morlet 小波的 cwt() 输出是小波变换\
    \ cwtmatr：\n\n```python\nfs=1/3\nfreqs=np.linspace(0.001,fs/2,1000)\nw0=6\nwidths=w0*fs/(2.*np.pi*freqs)\n\
    cwtmatr=signal.cwt(series3L,\n    signal.morlet2,widths,w=w0)\n```\n\n我们现在显示小波功率谱。我们可以更改坐标轴的限制、颜色映射以及许多其他内容。我们可以看到频率为\
    \ 0.01/kyr（对应于 100 kyr 的周期）、0.025/kyr（40 kyr）和 0.05/kyr（20 kyr）的周期。小波功率谱的优点在于它们显示的是演化谱，即它们显示了周期随时间的出现和消失：\n\
    \n```python\nplt.contourf(t,freqs,np.abs(cwtmatr),\n    cmap='viridis')\nplt.colorbar()\n\
    plt.xlabel('Time (kyr)')\nplt.ylabel('Frequency (1/kyr)')\nplt.xlim([0,1000])\n\
    plt.ylim([0.,0.07])\nplt.show()\n```\n\n我们现在显示相同的图，但 y 轴使用周期而不是频率。我们可以看到周期为 100\
    \ kyr、40 kyr 和 20 kyr 的周期（图 5.22）：\n\n```python\nperiods=1/freqs\nplt.contourf(t,periods,np.abs(cwtmatr),\n\
    \    cmap='viridis')\nplt.colorbar()\nplt.xlabel('Time (kyr)')\nplt.ylabel('Frequency\
    \ (1/kyr)')\nplt.xlim([0,1000])\nplt.ylim([0.,200])\nplt.show()\n```\n\n我们也可以使用\
    \ `pcolormesh()` 代替 `contourf()` 来显示相同的图（图 5.23）：\n\n```python\nplt.pcolormesh(t,\
    \ periods, np.abs(cwtmatr),\n               cmap='viridis')\nplt.colorbar()\n\
    plt.xlabel('Time (kyr)')\nplt.ylabel('Period (kyr)')\nplt.xlim([0, 1000])\nplt.ylim([0.,\
    \ 200])\nplt.show()\n```\n\n与窗口化功率谱方法相比，小波功率谱在时间和频率轴上都显示出明显更高的分辨率。小波变换不是将时间序列分成重叠的段并计算每段的功率谱，而是使用短波包，能更好地映射周期性随时间的变化。然而，窗口化功率谱和小波功率谱的缺点是它们都需要均匀分布的数据。Lomb-Scargle\
    \ 方法克服了这个问题，但在映射频域内随时间变化的能力方面存在局限性（功率谱方法也是如此）。"
