    A flat-topped or multiple-peaked distribution suggests that there is more than
    one population present in the data set. If these populations can be related to
    particular areas, they should be treated separately. Another reason for the existence
    of multiple peaks can be due to the preferential sampling of areas with high and/or
    low values. This usually happens as a result of some a priori knowledge and is
    referred to as a cluster effect. Dealing with a cluster effect is described in
    Deutsch and Journel (1998) and in Isaaks and Srivastava (1990).


    Most problems arise from positive skewness, that is, if the distribution has a
    long tail to the right. According to Webster and Oliver (2007), root transformation
    should be considered if the skewness is between 0.5 and 1, and logarithmic transformation
