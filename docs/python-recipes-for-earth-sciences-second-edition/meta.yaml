  md: "However, we use Landsat 8 data to create an RGB composite of Bands 4, 3, and\
    \ 2 for use in fieldwork. Since the image has a relatively low level of contrast,\
    \ we use `equalize_adapthist()` to perform *contrast limited adaptive histogram\
    \ equalization (CLAHE)* (Zuiderveld 1994). Unlike `equalize_hist()`, which we\
    \ used before, `equalize_adapthist()` works on small regions (or tiles) of the\
    \ image rather than on the entire image. The neighboring tiles are then combined\
    \ using bilinear interpolation in order to eliminate edge effects:\n\n```\nI1\
    \ = exposure.equalize_adapthist(I1,\n    clip_limit=0.1,nbins=256)\nI2 = exposure.equalize_adapthist(I2,\n\
    \    clip_limit=0.1,nbins=256)\nI3 = exposure.equalize_adapthist(I3,\n    clip_limit=0.1,nbins=256)\n\
    ```\n\nUsing `clip_limit` with a real scalar between 0 and 1 limits the contrast\
    \ enhancement. Higher numbers result in increased contrast, and the default value\
    \ is 0.01. Using a `clip_limit` of 0.1 yields good results. The three bands are\
    \ concatenated into a 24 bit RGB image using `dstack()`:\n\n```\nI = np.dstack([I1,I2,I3])\n\
    ```\n\nWe only display the section of the image that contains the Chew Bahir basin\
    \ (using axes limits), and we hide the coordinate axes:\n\n```\nI8 = exposure.rescale_intensity(I,\n\
    \    out_range='uint8')\n\nplt.figure()\nplt.imshow(I8)\nplt.xlim([3000,5000])\n\
    plt.ylim([1000,4000])\nplt.show()\n```\n\nThe function `rescale_intensity()` from\
    \ the *exposure* module of the *scikit-image* package does two things for us:\
    \ First, it returns images after stretching or shrinking their intensity levels\
    \ in order to improve the contrast. Second, it converts the data from any type\
    \ into `uint8` without rolling the values around the value range [0, 255], as\
    \ occurs when using `uint8()` from the *NumPy* package (see Chap. 2.5). To export\
    \ the processed image, we use the command\n\n```\nio.imsave('chewbahirbasin.tif',\n\
    \    I8[999:4000,2999:5000])\n```"
