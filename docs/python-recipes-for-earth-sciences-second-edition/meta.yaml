    # 7.10.4 Kriging


    We now interpolate our observations to a regular grid using *ordinary point kriging*,
    which is the most popular kriging method. Ordinary point kriging uses a weighted
    average of the neighboring points to estimate the value of an unobserved point,


    $$\widehat{z}_{x_0} = \sum_{i}^{n} \lambda_i \cdot z_{x_i}$$


    where $\lambda_i$ are the weights that must be estimated. The sum of the weights
    should be equal to one in order to guarantee that the estimates are unbiased:


    $$\sum_{i}^{n} \lambda_i = 1$$


    The expected (average) error for the estimation must be zero, that is,


    $$E\left(\widehat{z}_{x_0} - z_{x_0}\right) = 0$$


    where $z_{x_0}$ is the true (but unknown) value. We can use the equations above
    to algebraically compute the mean squared error in terms of the variogram,


    $$E\left(\left(\widehat{z}_{x_0} - z_{x_0}\right)^2\right) = 2 \sum_{i=1}^{n}
    \lambda_i \gamma(x_i, x_0) - \sum_{i=1}^{n} \sum_{j=1}^{n} \lambda_i \lambda_j
    \gamma(x_i, x_j)$$


    where $E$ is the estimation, or *kriging variance* (which must be minimized);
    $\gamma(x_i, x_0)$ is the variogram (semivariance) between the data points and
    the unobserved points; $\gamma(x_i, x_j)$ is the variogram between the data points
    $x_i$ and $x_j$; and $\lambda_i$ and $\lambda_j$ are the weights of the $i$th
    and $j$th data points, respectively.


    For kriging, we must minimize this equation (a quadratic objective function) in
    order to satisfy the condition that the sum of the weights be equal to one (linear'
  merge: -1
