  md: 'asymmetric, it shifts the signal along the time axis, that is, it introduces
    a phase shift.


    The general mathematical representation of the filtering process is the convolution


    $$y(t) = \sum_{k=-N_1}^{N_2} b_k \cdot x(t-k)$$


    where $b_k$ is the array of *filter weights* and $N_1+N_2$ is the *filter order*,
    which is the length of the filter reduced by one. Filters with five weights (as
    in our example) have an order of four. In contrast to this format, Python uses
    the engineering standard for indexing filters, that is, filters are always defined
    as causal. The convolution used by Python is therefore


    $$y(t) = \sum_{k=0}^{N} b_k \cdot x(t-k)$$


    where $N$ is the order of the filter. Several of the frequency domain tools provided
    by Python cannot simply be applied to non-causal filters that were designed for
    applications in the earth sciences. Phase corrections are therefore commonly carried
    out in order to simulate non-causality. For example, frequency selective filters--which
    are introduced in Sect. 6.9--can be applied using `filtfilt()`, which provides
    zero phase forward and reverse filtering.


    The functions `convolve()` and `lfilter()`, which provide digital filtering in
    Python, are best illustrated in terms of a simple running mean. The $n$ elements
    of the array $x(t_1), x(t_2), x(t_3), ..., x(t_n)$ are replaced with the arithmetic
    means of subsets of the input signal. For instance, a running mean over three
    elements computes the mean of the values of the input signal $x(t_{n-1}), x(t_n),
    x(t_{n+1})$ in order to obtain the output signal $y(t_n)$. We can illustrate this
