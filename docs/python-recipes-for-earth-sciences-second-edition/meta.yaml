    plt.axis('off')\nplt.title('Difference NDVI 22 to 29 May 2018')\nplt.show()\n\
    ```\n\n![](img/f6c4e7e52658f332a1ff43bb13764e42_390_0.png)\n\n**图 8.7** Sentinel-2\
    \ 图像的 NDVI 图，显示柏林-勃兰登堡地区裁剪至德国波茨坦市区域，分别拍摄于 a) 2018 年 5 月 22 日和 b) 2018 年 5 月 29\
