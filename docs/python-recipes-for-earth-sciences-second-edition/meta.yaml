  mdcn: "## 8.11 在显微图像中量化木炭\n\n在地球科学中，量化物质的组成（例如，岩石薄片中的矿物组成或筛分沉积物样品中的木炭含量）可以通过使用图像处理方法来实现。*阈值分割*为解决图像中具有不同颜色或灰度值的对象分割问题提供了一种简单的方案。在阈值分割过程中，强度值大于阈值的像素被标记为对象像素（例如，图像中代表木炭的像素），其余像素被标记为背景像素（例如，所有其他物质）。阈值通常通过目视检查图像直方图来手动定义，但也存在许多自动化算法。\n\
    \n例如，我们接下来分析一张来自肯尼亚纳库鲁湖的筛分湖泊沉积物样品图像（图 8.12）。图像显示了大量浅灰色的椭圆形介形虫壳、一些矿物颗粒，以及灰色的植物残体和黑色的木炭碎片。我们使用阈值分割来分离深色的木炭颗粒，并在分割后计算这些颗粒的像素数。在确定了所有可以通过阈值分割与背景区分开的对象的像素数之后，我们使用一个较低的阈值来确定代表木炭的像素数与代表样品中所有颗粒的像素数之比（即，为了确定样品中木炭的百分比）。\n\
    \n我们读取一张尺寸为 1500 x 1500 像素的图像，并假设这个方形图像的宽度和高度均为一厘米：\n\n```python\nimport cv2\n\
