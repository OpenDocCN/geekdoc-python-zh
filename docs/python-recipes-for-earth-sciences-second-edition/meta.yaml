  md: "# 8.10 Grain Size Analysis from Microscopic Images\n\nIdentifying, measuring,\
    \ and counting particles in an image are the classic applications of image analysis.\
    \ Examples from the earth sciences include grain size analysis, counting pollen\
    \ grains, and determining the mineral composition of rocks from thin sections.\
    \ For grain size analysis, the task is to identify individual particles, to measure\
    \ their sizes, and then to count the number of particles per size class. The reason\
    \ for using image analysis lies in its ability to perform automated analyses of\
    \ large sets of samples in a short period of time and at relatively low costs.\
    \ Three different approaches are commonly used to identify and count objects in\
    \ an image: 1) region-based segmentation using the watershed segmentation algorithm,\
    \ 2) object detection using the Hough transform, and 3) thresholding using color\
    \ differences to separate objects. Gonzalez and Woods (2018) describe these methods\
    \ in great detail in the 3rd edition of their excellent book. We utilize two examples\
    \ in order to demonstrate how image processing can be used to identify, measure,\
    \ and count particles. In this section, we demonstrate an application of watershed\
    \ segmentation in grain size analysis, and in Sect. 8.9, we introduce thresholding\
    \ as a method for quantifying charcoal in microscopic images.\n\nThe following\
    \ example covers segmenting, measuring, and counting objects using the watershed\
    \ segmentation algorithm (Fig. 8.11). We first read an image of coarse lithic\
    \ grains of different sizes and store it in variable I1. The size of the image\
    \ is 284·367 pixels, and since the width is 3 cm, the height is 3 cm·284/367＝2.32\
    \ cm. We type\n\n```\nimport cv2\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\nfrom scipy import ndimage as ndi\nfrom skimage import color\nfrom skimage\
    \ import exposure\nfrom skimage import io\nfrom skimage import feature\nfrom skimage\
    \ import measure\nfrom skimage import segmentation\n\nI1 = io.imread('grainsize.tif')\n\
    ix = 3.\niy = 284*3/367\n\nplt.figure()\nio.imshow(I1,\n    extent=[0,ix,0,iy])\n\
    plt.title('Original image')\nplt.axis('off')\nplt.show()\n```"
