    \ first column and first row of the grid, the second subplot (`p=2`) is in the\
    \ second column of the first row, and so on:\n\n```python\nplt.figure()\nplt.subplot(2,\
    \ 1, 1)\nplt.plot(x, y1, 'r--')\nplt.subplot(2, 1, 2)\nplt.bar(x, y2, color='b')\n\
    plt.show()\n```\n\nIn our example, the figure window is divided into two rows\
