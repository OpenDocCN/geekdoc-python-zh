    import numpy as np\nimport matplotlib.pyplot as plt\n\nx = np.linspace(0, 2 *\
    \ np.pi, 21)\ny = np.sin(x)\n```\n\nThese two commands result in two arrays with\
    \ 21 elements each. Since the two arrays `x` and `y` have the same length, we\
    \ can use `plot()` to produce a linear 2D graph of `y` against `x`, as shown below:\n\
    \n```python\nplt.plot(x, y)\n```\n\nHowever, the most general way of plotting\
    \ is to first create a figure window using `figure()`, to then use `plot()` to\
    \ initiate plotting, and to finally display the actual graphic using `show()`.\
    \ In particular, if we display subplots or multiple graphics objects, we need\
