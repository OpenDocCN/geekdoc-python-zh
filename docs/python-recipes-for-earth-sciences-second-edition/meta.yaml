  - "[PAGE 283]\n\noften restricted to natural outcrops (e.g., shoreline cliffs or\
    \ the walls of a gorge) or to anthropogenic outcrops (e.g., road cuttings, quarries,\
    \ or drill cores). Sections 7.6 and 7.7 on interpolating such unevenly spaced\
    \ data illustrate the use of the most important gridding routines and outline\
    \ potential pitfalls when using these methods. Sections 7.8 to 7.10 introduce\
    \ various methods for statistically analyzing spatial data, including applying\
    \ statistical tests to point distributions in Sect. 7.8, analyzing digital elevation\
    \ models in Sect. 7.9, and providing an overview of geostatistics and kriging\
    \ in Sect. 7.10.\n\nThis chapter requires the *NumPy* (https://numpy.org), *Matplotlib*\
    \ (https://matplotlib.org), *Rasterio* (https://rasterio.readthedocs.io), *GDAL*\
    \ (https://gdal.org/api/python.html), *scikit-image* (https://scikit-image.org),\
