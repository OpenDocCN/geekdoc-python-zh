    \ book by Kantz and Schreiber (1997) on nonlinear data analysis is recommended\
    \ for gaining more detailed information on these methods. Either phase space trajectories\
    \ or their reconstructions are also necessary for constructing recurrence plots\
    \ (Fig. 5.27).\n\n# 5.11.2 Recurrence Plots\n\nA common feature of dynamical systems\
    \ is the property of *recurrence*. Patterns in the recurring states of a system\
    \ reflect typical system characteristics, whose descriptions contribute to our\
    \ understanding of the system's dynamics. In our example, a recurrence of changes\
    \ in the state variables of precipitation, evaporation, and wind speed could lead\
    \ to similar (albeit not identical) conditions in the"
