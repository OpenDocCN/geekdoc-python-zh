    Next, we examine a case for which our value $y$ depends on $j$ measured variables
    $x_1, x_2, \dots$ and their $j$ uncertainties $s_1, s_2, \dots$, which we use
    to calculate $y$ and its uncertainty $s$. We can use Gauss''s law of error propagation
    to calculate $s$ if the uncertainties $s_1, s_2, \dots$ are not independent of
    one another,


    $$s = \sqrt{\sum_{j=1}^{m} \left( \frac{\partial y}{\partial x_j} \cdot s_j \right)^2
    + 2 \sum_{j=1}^{m-1} \sum_{k=j+1}^{m} \left( \frac{\partial y}{\partial x_j} \right)
    \left( \frac{\partial y}{\partial x_k} \right) \cdot s(x_j x_k)}$$


    where $\partial y/\partial x_j$ is the partial derivative of $y$ with respect
    to the $j$th variable $x_j$, $s_j$ is the standard deviation of this variable,
    and $s(x_j x_k)$ is the covariance of the uncertainties of variables $x_j$ and
    $x_k$ (e.g., Taylor 1997, page 212). If the variables are not dependent on one
    another, the covariance term is zero, and the equation is reduced to


    $$s = \sqrt{\sum_{j=1}^{m} \left( \frac{\partial y}{\partial x_j} \cdot s_j \right)^2}$$


    Python is a great tool with which to simulate error propagation. As an example,
    we can use the software to estimate the uncertainty in the difference $y$ between
    the measurements of two quantities $x_1$ and $x_2$ based on their individual uncertainties
    $s_1$ and $s_2$. The experiment reveals the difference in uncertainty when the
    measurements are dependent on one another and when they are independent. We can
    define a large sample size of 100,000,000 measurements in order to yield very
    precise values for the errors:


    ```

    samplesize = 100000000

    ```


    To calculate both the difference $y$ between $x_1$ and $x_2$ and the error in
    this difference, we use two Gaussian distributions with mean values of 6.3 and
    3.4 and with standard deviations of 1.2 and 1.5, respectively. We calculate the
    difference between the means of the two distributions based on the assumption
    that the two distributions are dependent on each other,


    $$\bar{y} = \overline{x_1} - \overline{x_2}$$


    which yields


    $$\bar{y} = 6.3 - 3.4 = 2.9$$


    with the real variables $x_1$ and $x_2$ having standard deviations of $s_1$ and
    $s_2$, respectively, and a covariance of $s(x_1 x_2)$. If we solve the equation
    for Gauss''s law of error propagation from above for our example of a difference
    between the two means, we then obtain


    $$s_f = \sqrt{s_1^2 + s_2^2 - 2 \cdot (x_1 x_2)}$$'
