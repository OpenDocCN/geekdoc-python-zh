  md: "where $b_i$ are the $n+1$ regression coefficients of the linear model. The\
    \ linearity in the term multiple linear regression refers to the fact that the\
    \ response variable is a linear function of the predictor variables. The regression\
    \ coefficients are estimated by minimizing the mean squared difference between\
    \ the predicted and true values of the response variable $y$. An example that\
    \ is commonly used in the earth sciences is the quality of crude oil, which is\
    \ assumed to be linearly dependent on the age of the sediment, the burial depth,\
    \ and the temperature. In practice, the plausibility of the assumption of linearity\
    \ must first be examined. If this assumption is probably true, several methods\
    \ of multiple linear regression are available.\n\nAs a first example, we create\
    \ a noise-free synthetic data set with three variables Var1, Var2, and Var3. We\
    \ wish to uncover the influence of variables Var1 and Var2 on variable Var3. Variables\
    \ Var1 and Var2 are therefore the predictor variables, and variable Var3 is the\
    \ response variable. The linear relationship between the response variable and\
