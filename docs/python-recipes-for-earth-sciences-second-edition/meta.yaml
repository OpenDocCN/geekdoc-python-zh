    ## 多元统计


    ### 9.1 引言


    多元分析用于理解和描述任意数量变量之间的关系。地球科学家经常处理多元数据集，例如微体化石组合、火山灰层的地球化学指纹或沉积序列的粘土矿物含量。此类多元数据集由对
    $n$ 个对象测量的 $p$ 个变量组成，通常存储在 $n$ 行 $p$ 列的数组中：


    $$X = \begin{pmatrix} x_{11} & x_{12} & \dots & x_{1p} \\ x_{21} & x_{22} & \dots
    & x_{2p} \\ \vdots & \vdots & & \vdots \\ x_{n1} & x_{n2} & \dots & x_{np} \end{pmatrix}$$


    数组的行代表 $n$ 个对象，列代表 $p$ 个变量。样本集中第 2 个对象的特征由数据数组第二行中的向量描述：


    $$X_2 = (x_{21} \ x_{22} \ \dots \ x_{2p})$$


    例如，让我们考虑一个火山灰层玻璃碎片的微探针分析数据集。变量是 $p$ 种化学元素，对象是 $n$ 个灰样。研究的目的是通过它们的地球化学指纹来关联灰层。


    大多数多元方法试图克服与此类数据集相关的主要困难，即数据可视化问题。虽然单变量或双变量数据集的特征可以通过直观检查二维直方图或 *xy* 图（第 3 章）来轻松探索，但三变量数据集的图形显示需要将数据点的三维分布投影到二维显示上。想象或显示更多变量是不可能的。解决高维数据集可视化问题的一个方法是减少维度。有几种方法可以将数据集中高度相关的变量分组在一起，并探索减少后的组数。


    减少维度的经典方法是 *主成分分析*（PCA）和 *因子分析*（FA）。这些方法寻求数据集中最大方差的方向，并将这些方向用作新的坐标轴。用新的变量组替换现有变量的优势在于这些组是不相关的。因此，这些方法用于分离（或分离）混合变量。此外，新变量通常有助于解释多元数据集，因为它们经常包含有关导致数据点分布的过程的有价值信息。在岩浆岩的地球化学分析中，该方法定义的组通常包含在某些矿物晶格中具有相似大小离子和相似位置的化学元素。例如硅酸盐中的
    Si$^{4+}$ 和 Al$^{3+}$，以及 Fe$^{2+}$ 和 Mg$^{2+}$。


    第二类重要的多元方法旨在根据相似性对对象进行分组。例如，*聚类分析*（CA）通常用于关联火山灰层，如上例所示。火山灰年代学试图通过其地球化学指纹来关联火山灰。当与来自关键灰层的几个放射性年龄测定相结合时，该方法允许在包含这些灰层的不同沉积序列之间进行关联（例如，Westgate
    等人，1998；Hermanns 等人，2000）。聚类分析也用于微体古生物学领域，例如，用于比较不同的微体化石组合（例如，Birks 和 Gordon，1985）。


    第三类方法涉及对观测进行分类。人类倾向于对周围的事物进行分类，尽管自然界很少划分为离散的类别。分类（或归类）是有用的，因为它可以帮助决策者在钻探油井或将化石归入特定属或种时采取必要的预防措施以降低风险。大多数分类方法基于具有两个选项的布尔逻辑做出决策，即真或假，就像在显微镜图像中使用阈值识别木炭一样（第
    8.11 节）。或者，模糊逻辑（本书未解释）是二元布尔逻辑的推广，适用于许多现实世界中渐进过渡是合理的决策问题（Zadeh 1965，MathWorks 2023a）。


    以下章节介绍多元统计最重要的技术。首先，*主成分分析*（PCA）和 *聚类分析*（CA）分别在第 9.2 节和第 9.5 节中介绍，*独立成分分析*（ICA）（PCA
    的非线性扩展）在第 9.3 节中概述。第 9.4 节介绍 *判别分析*（DA），这是一种流行的方法'
