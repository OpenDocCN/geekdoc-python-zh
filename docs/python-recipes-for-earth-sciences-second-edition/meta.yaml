    Geophysical Time- or Space Series Data. Computers & Geosciences 14(4):467–480

    - Haykin S (2014) Adaptive Filter Theory–Fifth Edition. Prentice Hall, Englewood
    Cliffs, New Jersey

    - Kalman R, Bucy R (1961) New Results in Linear Filtering and Prediction Theory.
    ASME Tans. Ser. D Jour. Basic Eng. 83:95–107

    - Trauth MH (1998) Noise Removal from Duplicate Paleoceanographic Time-Series:
    The Use of Adaptive Filtering Techniques. Mathematical Geology 30(5):557–574

    - Trauth MH (2013) TURBO2: A MATLAB Simulation to Study the Effects of Bioturbation
    on Paleoceanographic Time Series. Computers and Geosciences, 61:1–10

