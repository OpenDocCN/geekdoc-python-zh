  md: '# 7.8.3 Test for Clustering


    Point distributions in the earth sciences are often clustered (Fig. 7.9 d). We
    use a *nearest neighbor criterion* to test a spatial distribution for clustering.
    Davis (2002) published an excellent work on nearest neighbor analysis that summarizes
    the work of a number of other authors. Moreover, Swan and Sandilands (1996) present
    a simplified description of this analysis. The test for clustering computes the
    distances $d_i$ that separate all possible pairs of nearest points in the field.
    The *observed mean nearest neighbor distance* is


    $$\bar{d} = \frac{1}{n} \sum_{i=1}^{n} d_i$$


    where $n$ is the total number of points (or objects) in the field. The arithmetic
    mean of all distances between possible pairs is related to the area covered by
    the map. This relationship is expressed by the *expected mean nearest neighbor
    distance*, which is


    $$\bar{\delta} = \frac{1}{2} \sqrt{A/n}$$


    where $A$ is the area covered by the map. Small values for this ratio then suggest
    clustering, whereas large values indicate regularity (or uniformity). The test
    uses a Z-statistic (Sect. 3.4), which is


    $$Z = \frac{\bar{d} - \bar{\delta}}{s_e}$$


    where $s_e$ is the standard error of the mean nearest neighbor distance, which
    is defined as


    $$s_e = \frac{0.26136}{\sqrt{n^2/A}}$$


    The null hypothesis of *randomness* is tested against two alternative hypotheses:
    *clustering* on the one hand, and *uniformity* or *regularity* on the other hand
    (Fig. 7.9). The Z-statistic has critical values of 1.96 and -1.96 at a significance
    level of 5%. If -1.96 < Z < +1.96, we cannot reject the null hypothesis that the
    data are randomly distributed. If Z < -1.96, we can reject the null hypothesis
    and accept the first alternative hypothesis of clustering. If Z > +1.96, we can
    also reject the null hypothesis but accept the second alternative hypothesis of
    uniformity or regularity.


    As an example, we again use the synthetic data analyzed in the previous examples:


    ```

    np.random.seed(0)

    data = 10 * np.random.rand(100, 2)

    ```'
