    Fig. 9.10 Demonstration of Aitchison''s log-ratio transformation being used to
    overcome the closed sum problem of closed data: **a** absolute values of element1a,
    element1b, and element1c; **b** relative amounts of element1a, element1b, and
    element1c, which shows the closed sum problem; **c** ratios of element1a/element1b
    and element1b/element1a, which are both independent of element1c; and **d** log-ratios
    according to Aitchison (1986, 2003), which are identical except for their sign
    and thus overcome the closed sum problem.'
