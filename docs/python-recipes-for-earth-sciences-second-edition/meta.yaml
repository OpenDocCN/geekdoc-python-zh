    ax2 = ax1.twinx()\nline1, = ax1.plot(t,ratio12,\n    color=colors[0,:],\n    label='1a/1b')\n\
    line2, = ax2.plot(t,ratio21,\n    color=colors[1,:],\n    label='1b/1a')\nax2.invert_yaxis()\n\
