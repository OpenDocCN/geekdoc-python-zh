    that use a Lambert projection (Fig. 10.6):


    ```

    plt.figure()

    ax=plt.subplot(projection=''lambert'')

    ax.scatter(lon_radians,lat_radians,c=zc)

    ax.grid()

    plt.show()

    ```


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_494_0.png)


    Fig. 10.6 Display of spherical data using the lambert map projection with subplot().'
  - '[PAGE 495]


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_495_0.png)


    Alternatively, we can also use a *Mollweide* projection (Fig. 10.7):


    ```

    plt.figure()

    ax=plt.subplot(projection=''mollweide'')

    ax.scatter(lon_radians,lat_radians,c=zc)

    ax.grid()

    plt.show()

    ```


    Finally, we display the data in a rectilinear coordinate system:


    ```

    plt.figure()

    plt.scatter(lon,lat,c=zc)

    plt.show()

    ```


    This simple method of presentation might be the preferred option in some applications.


    # 10.9 The Statistics of Spherical Data


    The statistical analysis of spherical data is a vast topic. Since Python offers
    very little support for analyzing this type of data, we remain very brief here.
    More detailed articles on this topic can be found in the book by Mardia and Jupp
    (1999). The following section demonstrates how to calculate the mean, the standard
    deviation, and the standard distance of geographic points. It also introduces
    a Python function for calculating a frequency distribution for geographic points
    using equirectangular bins.'
  - '[PAGE 496]


    First, we again create synthetic data using vmises(), which is included in the
    electronic supplement of the present book:


    ```

    import numpy as np

    from vmises import vmises

    import scipy.stats as stats

    import matplotlib.pyplot as plt

    from numpy.random import default_rng


    n=500;

    np.random.seed(0)

    mu_lon_degrees=10

    mu_lat_degrees=35

    mu_lon_radians=np.pi*mu_lon_degrees/180

    mu_lat_radians=np.pi*mu_lat_degrees/180

    kappa_lon=10

    kappa_lat=10

    lon_radians=vmises(n,mu_lon_radians,kappa_lon)

    lat_radians=vmises(n,mu_lat_radians,kappa_lat)

    lon=180*lon_radians/np.pi

    lat=180*lat_radians/np.pi

    ```


    Next, we calculate the data density c with gaussian_kde():


    ```

    c=stats.gaussian_kde([lon,lat])

    ```


    We then calculate the grid coordinates grid_coords and a color value zc for each
    data point (lon, lat) according to the kernel density c:


    ```

    grid_coords=np.append(lon.reshape(-1,1), \n    lat.reshape(-1,1),axis=1)

    zc=256*c(grid_coords.T) / np.max(c(grid_coords.T))

    ```


    We subsequently calculate the median of the (lon, lat) coordinates using the Earth''s
    arithmetic mean radius r of 6,371 km by typing


    ```

    r=6371

    x=r*np.cos(lat_radians)*np.cos(lon_radians)

    y=r*np.cos(lat_radians)*np.sin(lon_radians)

    z=r*np.sin(lat_radians)


    x_median=np.median(x)

    y_median=np.median(y)

    z_median=np.median(z)

    ```'
