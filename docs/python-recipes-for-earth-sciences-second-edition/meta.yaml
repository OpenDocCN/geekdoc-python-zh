  md: "These data are elevation values in meters above sea level that were sampled\
    \ on a 3 arc-second (or a 90 m) grid. The SRTM data contain small-scale spatial\
    \ disturbances and noise that could cause problems when computing a drainage pattern.\
    \ We therefore filter the data with a two-dimensional moving average filter using\
    \ `convolve2d()`. The filter calculates a spatial running mean of 3 by 3 elements.\
    \ We use only the SRTM(750:850, 700:800) subset of the original data set in order\
    \ to reduce computation time. We also remove the data at the edges of the DEM\
    \ in order to eliminate filter artifacts:\n\n```\nF = 1/9 * np.ones((3,3))\nSRTM\
    \ = signal.convolve2d(SRTM[749:850,699:800],\n    F,mode='same')\nSRTM = SRTM[1:99,1:99]\n\
    ```\n\nThe DEM is displayed as a pseudocolor plot using `pcolor()` and the colormap\
    \ `cm.terrain`, which assigns a colormap that is appropriate for elevation data\
    \ since it relates land and sea colors to hypsometry and bathymetry, respectively:\n\
    \n```\nplt.figure()\nplt.axes(aspect='equal')\nplt.pcolor(SRTM,\n    cmap=cm.terrain)\n\
    plt.colorbar()\nplt.title('Elevation [m]')\nplt.show()\n```\n\nThe DEM indicates\
    \ a horseshoe-shaped mountain range surrounding a valley that slopes down toward\
    \ the southeast (Fig. 7.15 a).\nThe SRTM subset is now analyzed for slope and\
    \ aspect. When working with DEMs on a regular grid, the slope and aspect can be\
    \ estimated using centered finite differences in a local 3-by-3 neighborhood.\
    \ Fig. 7.13 shows a local neighborhood using the Python indexing convention. To\
    \ calculate the slope and aspect, we need two finite differences in the DEM elements\
    \ $z$ in the $x$ and $y$ directions, namely\n\n$$z_x = \\frac{z_{r,c-1} - z_{r,c+1}}{2h}$$\n\
    \nand\n\n$$z_y = \\frac{z_{r-1,c} - z_{r+1,c}}{2h}$$\n\nwhere $h$ is the cell\
    \ size and has the same units as the elevation. Using the finite differences,\
    \ the slope is then calculated by\n\n$$slp_{DF} = \\sqrt{z_x^2 + z_y^2}$$"
