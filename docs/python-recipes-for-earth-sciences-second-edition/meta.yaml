    ```\n\n输出结果为：\n\n```\n[[False False True]\n [True  True  False]]\n```\n\n其中 `False`\
    \ 表示元素 `A[i,j]` 不在 B 中，`True` 表示元素 `A[i,j]` 在 B 中。我们还可以定位 A 中满足特定条件的元素。例如，我们可以定位值小于零的元素并将其替换为\
    \ NaN，输入：\n\n```\nL = A\nL = L.astype(float)\nL[np.where(L<0)] = np.NaN\nprint(L)\n\
    ```\n\n输出结果为：\n\n```\n[[ 2. 4. 3.]\n [ 9. 3. nan]]\n```\n\n这在处理数字高程模型时非常有用，因为低于海平面的值通常不相关。或者，我们也可以替换除\
    \ NaN 之外的其他数据空值，例如 -32,768，这在数字地形模型（第 7.3 至 7.5 节）中经常被用作空值。然后，我们可以通过输入以下代码确定数组中的哪些元素是\
