    # 8.5 Importing and Georeferencing Terra ASTER Images


    In Sect. 8.3, we used a processed ASTER image that we had downloaded from the
    ASTER website. In this section, we use raw data from the sensor. The ASTER sensor
    is mounted on the Terra satellite, which was launched in 1999 as part of the Earth
    Observing System (EOS) series of multi-national NASA satellites (Abrams and Hook
    2002). ASTER stands for *Advanced Spaceborne Thermal Emission and Reflection Radiometer*
    and provides high-resolution (15 to 90 m) images of the Earth in 14 bands, including
    three visible to near-infrared bands (VNIR Bands 1 to 3), six short-wave infrared
    bands (SWIR Bands 4 to 9), and five thermal (or long-wave) infrared bands (TIR
    Bands 10 to 14). ASTER images are used to map the temperature, emissivity, and
    reflectance of the Earth’s surface. The 3rd VNIR'
  merge: -1
  pgno: 370
- img_proc: true
  md: 'band is recorded twice: once with the sensor pointing directly downward (Band
    3N, where *N* stands for *nadir*, from the Arabic word for *opposite*), as it
    does for all other channels, and a second time with the sensor angled backward
    at 27.6° (Band 3B, where *B* stands for *backward-looking*). These two bands are
    used to generate ASTER digital elevation models (DEMs).


    The ASTER instrument produces two types of data: Level 1A (L1A) data and Level
    1B (L1B) data (Abrams and Hook 2002). Whereas L1A data are reconstructed, unprocessed
    instrument data, L1B data are radiometrically and geometrically corrected. Any
    data that ASTER has already acquired are available and can be obtained from the
    following website:


    ```

    https://earthexplorer.usgs.gov

    ```


    As an example, we now process an image of an area in Kenya that shows Lake Naivasha
    (0°46′31.38″S 36°22′17.31″E). Level 1A data are stored in two files:


    ```

    AST_L1A_003_03082003080706_03242003202838.hdf

    AST_L1A_003_03082003080706_03242003202838.hdf.met

    ```


    The first file (116 MB) contains the actual raw data, while the second file (102
    kB) contains the header together with all sorts of information about the data.
    We save both files in our working directory. Since the file name is very long,
    we first save it in `filename` and then use `filename` instead of the long file
    name. We then need to modify only this single line of Python code if we want to
    import and process other satellite images:


    ```

    import numpy as np

    from osgeo import gdal

    from pyhdf.SD import SD

