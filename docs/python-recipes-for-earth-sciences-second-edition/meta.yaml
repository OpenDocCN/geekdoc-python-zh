    The values of the impulse response $h$ can be shown to be identical to the filter
    weights in nonrecursive filters, but not in recursive filters. The convolution
    equation above is often written in a short form:


    $$y(t) = h(t) * x(t)$$


    In many examples, convolution in the time domain is replaced with a simple multiplication
    of the Fourier transforms $H(f)$ and $X(f)$ in the frequency domain:


    $$Y(f) = H(f) \cdot X(f)$$


    The output signal $y(t)$ in the time domain is then obtained via a reverse Fourier
    transform of $Y(f)$. Signals are often convolved in the frequency domain rather
    than in the time domain due to the relative simplicity of the multiplication.
