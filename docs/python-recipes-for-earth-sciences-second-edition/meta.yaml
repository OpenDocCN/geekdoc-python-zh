  - '[PAGE 231]


    form a triangle. Such a triangular configuration remains along the phase space
    trajectory if the dynamic is highly regular (i.e., recurring states remain recurring
    over a long period of time). However, if the dynamic is chaotic, then parts of
    the phase space trajectory that were initially close subsequently diverge, and
    the triangular configuration breaks down even though the corresponding triple
    nodes might remain interconnected for some time. The probability of finding triangles
    is therefore higher for regular dynamics and lower for chaotic dynamics. This
    explanation is, of course, rather simplified, but a theoretically substantiated
    explanation can be found in Donner et al. (2011).


    In order to calculate the probability that triples also form triangles, we need
    to compute the number of connected triples and the number of triangles, which
    can be achieved directly from the recurrence plot by excluding the main diagonal:


    ```

    A=R - np.eye(len(R))

    ```


    The number of triangles and triples is then


    ```

    numTripl=np.sum(np.matmul(A,A))

    numTria=np.trace(np.matmul(A,np.matmul(A,A)))

    ```


    Finally, the transitivity coefficient is the ratio


    ```

    Trans=numTria/numTripl

    print(Trans)

    ```


    which yields


    ```

    0.6459486011860506

    ```


    This number means that the system does not have regular dynamics (which would
    yield a transitivity coefficient close to one).


    In order to detect changes in the dynamics, the RQA can be computed for moving
    windows. The RQA of moving windows can be calculated in two ways: either 1) by
    calculating the RQA measures for windows that move along a single, global RP or
    2) by calculating individual RPs for windows that move along the original time
    series. If nonstationarities or trends are not part of the main focus of the analysis,
    approach (2) helps to find transitions that ignore these nonstationarities. However,
    if detecting overall (global, long-scale) changes is of interest (e.g., to test
    for nonstationarity), the recurrence conditions should be kept constant over time
    (thereby allowing the global RP of the whole time series to be considered), and
    approach (1) should be selected (Marwan 2011). The selected window size needs
    to be small enough to ensure a good temporal resolution but large enough to cover
    typical variations (e.g., several cycles) in order to find recurrences.'
