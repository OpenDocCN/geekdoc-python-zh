    x=np.loadtxt('series3.txt',usecols=1)\n```\n\nWe then generate a frequency axis\
    \ $f$. Since the Lomb–Scargle method is not able to deal with the frequency of\
    \ zero (i.e., with an infinite period), we start at a frequency value that is\
