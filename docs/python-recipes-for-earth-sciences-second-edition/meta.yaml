    - Widrow B, Glover JR, McCool JM, Kaunitz J, Williams CS, Hearn RH, Zeidler JR,
    Dong E, Goodlin RC (1975) Adaptive Noise Cancelling: Principles and Applications.
    Proc. IEEE 63(12):1692–1716

    - Wiener N (1949) Extrapolation, Interpolation and Smoothing of Stationary Time
