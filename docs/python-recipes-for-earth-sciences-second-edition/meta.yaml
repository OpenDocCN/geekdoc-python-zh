  md: "# 8.13 Digitizing from the Screen\n\nOn-screen digitization is a widely used\
    \ image processing technique. While practical digitizer tablets exist in all formats\
    \ and sizes, most people prefer digitizing vector data from the screen. Examples\
    \ of this type of application include digitizing river networks and catchment\
    \ areas on topographic maps, digitizing the outlines of lithologic units on geological\
    \ maps, digitizing landslide distributions on satellite images, and digitizing\
    \ mineral grain distributions in microscopic images. The digitization procedure\
    \ consists of the following steps: The image is first imported into the workspace.\
    \ A coordinate system is then defined, thereby allowing the objects of interest\
    \ to be entered by moving a cursor or crosshair onto the image and clicking the\
    \ mouse button. The result is a two-dimensional array of xy data, such as the\
    \ longitudes and latitudes of the corner points of a polygon or the coordinates\
    \ of the objects of interest in a particular area.\n\nThe function `ginput()`\
    \ from the `matplotlib` package allows for graphical input from the screen using\
    \ a mouse. It is generally used to select points, such as specific data points,\
    \ from a figure created by an arbitrary graphics function, such as `plot`. The\
    \ function `ginput()` is often used for interactive plotting, that is, the digitized\
    \ points appear on the screen after they have been selected. The disadvantage\
    \ of the function is that it does not provide coordinate referencing on an image.\
    \ We therefore use a modified version of the function, which allows an image to\
    \ be referenced to an arbitrary rectangular coordinate system. We save the following\
    \ code for this modified version of the function `ginput()` in the text file `minput.py`:\n\
    \n```\ndef minput(x = None):\n\n    import numpy as np\n    import matplotlib.pyplot\
    \ as plt\n    from skimage import io\n\n    xmin = input('Specify xmin! ')\n \
    \   xmax = input('Specify xmax! ')\n    ymin = input('Specify ymin! ')\n    ymax\
    \ = input('Specify ymax! ')\n\n    xmin = float(xmin)\n    xmax = float(xmax)\n\
    \    ymin = float(ymin)\n    ymax = float(ymax)\n\n    B = io.imread(x)\n    a,b,c\
    \ = B.shape\n```"
