    \ 24 bit RGB images. We first read the data:\n\n```\naster = gdal.Open('HDF4_SDS:UNKNOWN:\"\
    AST_L1A_003_\\n    '03082003080706_03242003202838.hdf\":31')\nI1 = aster.ReadAsArray()\n\
    aster = gdal.Open('HDF4_SDS:UNKNOWN:\"AST_L1A_003_\\n    '03082003080706_03242003202838.hdf\"\
    :20')\nI2 = aster.ReadAsArray()\naster = gdal.Open('HDF4_SDS:UNKNOWN:\"AST_L1A_003_\\\
    n    '03082003080706_03242003202838.hdf\":9')\nI3 = aster.ReadAsArray()\n```\n\
    \nThese commands generate three 8 bit image arrays, each of which represents the\
    \ intensity within a certain infrared (IR) frequency band of a 4200-by-4100 pixel\
    \ image. We are not using the data for quantitative analyses and we therefore\
