    # 4.2 Correlation Coefficients


    Another alternative to Pearson''s correlation coefficient is *Kendall''s tau rank
    correlation coefficient*, which was proposed by British statistician Maurice Kendall
    (1907 to 1983). This coefficient is also a non-parametric measure of correlation,
    similar to Spearman''s rank correlation coefficient (Kendall 1938). Kendall''s
    tau rank correlation coefficient compares the ranks of the numerical values in
    $x$ and $y$, which means that there is a total of $0.5 n(n-1)$ pairs to compare.
    Pairs of observations $(x_i, y_i)$ and $(x_j, y_j)$ are said to be concordant
    if the ranks for both observations are the same, and they are said to be discordant
    if the ranks are not the same. The sample Kendall''s tau rank correlation coefficient
    is defined as


    $$\tau = \frac{(P - Q)}{\frac{1}{2}n(n - 1)}$$


    where $P$ is the number of concordant pairs and $Q$ is the number of discordant
    pairs. Kendall''s correlation coefficient typically has a lower value than does
    Spearman''s correlation coefficient.


    The following example illustrates the use of the correlation coefficients and
    highlights potential pitfalls when using these measures of linear trends. The
    example also illustrates the resampling methods that can be used to explore the
    confidence level of the estimate for $\rho$. The synthetic data consist of two
    variables: the age of a sediment in kiloyears (kyr) before present (BP), and the
    depth below the sediment–water interface in meters. An advantage of using synthetic
    data sets is that we are able to fully understand the linear model behind the
    data.


    The data are represented as two columns contained in the file *agedepth_1.txt*.
    These data were generated using a series of thirty random levels below the sediment
    surface. The linear relationship $age = 5.6*meters + 20$ was used to compute noise-free
    values for the variable age. This is the equation of a straight line with a slope
