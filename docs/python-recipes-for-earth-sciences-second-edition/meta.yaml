    Pxx2=np.abs(Xxx)**2/Fs/len(corrxx)

    Pxx=np.hstack((Pxx2[0],2*Pxx2[1:int(nfft/2)]))

    f=np.arange(0,Fs/2,Fs/(nfft-1))

    ```'
