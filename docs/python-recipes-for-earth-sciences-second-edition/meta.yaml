  md: '# Image Processing


    # 8


    # 8.1 Introduction


    Computer graphics are stored and processed as either vector or raster data. Most
    of the data encountered in the previous chapter were vector data, such as points,
    lines, and polygons. Examples of vector data include drainage networks, the outlines
    of geological units, sampling locations, and topographic contours. In Chap. 7,
    coastlines were stored in a vector format, while bathymetric and topographic data
    were saved in a raster format. Vector and raster data are often combined in a
    single data set, for instance, when displaying the course of a river on a satellite
    image. Raster data are often converted into vector data by digitizing points,
    lines, or polygons. Conversely, vector data are sometimes transformed into raster
    data.


    Images are generally represented as raster data, that is, as a 2D or 3D array
    of color intensities. Images are everywhere in the earth sciences. Field geologists
    use aerial photos and satellite images to identify lithologic units, tectonic
    structures, landslides, and other features within a study area. Geomorphologists
    use such images to analyze drainage networks, river catchments, and vegetation
    or soil types. Moreover, a great variety of image processing methods are used
    to analyze images from thin sections, to automatically identify objects, and to
    measure varve thicknesses.


    This chapter is concerned with analyzing and displaying image data. The various
    ways that raster data can be stored on the computer are first explained in Sect.
    8.2. The main tools for importing, manipulating, and exporting image data are
    then presented in Sect. 8.3. This knowledge is next used to process and geo-reference
    satellite images in Sects. 8.4 to 8.6. Section 8.7 demonstrates how to calculate
    the normalized difference vegetation index (NDVI) from both handheld cameras and
    satellite images. Sections 8.8 and 8.9 deal with importing, enhancing,


