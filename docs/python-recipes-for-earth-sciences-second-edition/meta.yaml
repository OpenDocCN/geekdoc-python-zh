    # 5.10 The Wavelet Power Spectrum


    Section 5.7 demonstrated the use of a modification to the power spectrum method
    for mapping changes in cyclicity over time. A similar modification was applied
    to the Lomb–Scargle method, which would have the advantage of being able to be
    applied to unevenly spaced data (Sect. 5.9). However, both methods assume that
    the data are composites of sine and cosine waves that are globally uniform in
    time and that have infinite time spans. The evolutionary power spectrum method
    divides the time series into overlapping segments and computes the Fourier transform
    of these segments. In order to avoid spectral leakage, the data are multiplied
    by windows that are smooth bell-shaped curves with positive values (Sect. 5.5).
    The higher the temporal resolution of the evolutionary power spectrum, the lower
    the accuracy of the result. Moreover, short time windows contain a large number
    of high-frequency cycles, whereas the low-frequency cycles are underrepresented.


    In contrast to the Fourier transform, the *wavelet transform* uses base functions
    (*wavelets*) that have smooth ends per se (Lau and Weng 1995; Mackenzie et al.
    2001). Wavelets are small packets of waves that are defined by a specific'
  - "[PAGE 212]\n\nfrequency and that decay toward either end. Since wavelets can\
    \ be stretched and translated across both frequency and time with a flexible resolution,\
    \ and they can easily map changes in the time–frequency domain.\n\nA wavelet transformation\
    \ mathematically decomposes a signal $x(t)$ into elementary functions $\\psi_{a,b}(t)$\
    \ derived from a *mother wavelet* $\\psi(t)$ via dilation and translation,\n\n\
    $$\\psi_{a,b} = \\frac{1}{a^{1/2}} \\psi \\left( \\frac{t - b}{a} \\right)$$\n\
    \nwhere $b$ denotes the position (translation) and $a$ (>0) denotes the scale\
    \ (dilation) of the wavelet (Lau and Weng 1995). The wavelet transform of the\
