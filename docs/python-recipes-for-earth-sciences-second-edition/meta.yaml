  md: "# 8.5 Importing and Georeferencing Terra ASTER Images\n\nin order to create\
    \ a georeferenced RGB composite of Bands 3N, 2, and 1, which are used in fieldwork.\
    \ We first use a contrast limited adaptive histogram equalization method to enhance\
    \ the contrast in the image by typing\n\n```\nI1 = exposure.equalize_adapthist(I1)\n\
    I2 = exposure.equalize_adapthist(I2)\nI3 = exposure.equalize_adapthist(I3)\n```\n\
    \nand then concatenate the result into a 24 bit RGB image using `dstack()`:\n\n\
    ```\nnaivasha_rgb = np.dstack([I1,I2,I3])\n```\n\nAs with the previous examples,\
    \ the 4200-by-4100-by-3 array can now be displayed using\n\n```\nnaivasha_rgb\
    \ = exposure.rescale_intensity(naivasha_rgb,\n    out_range='uint8')\nplt.figure()\n\
    io.imshow(naivasha_rgb)\nio.imsave('naivasha.tif',naivasha_rgb)\nplt.axis('off')\n\
    ```\n\nThis command saves the RGB composite as the TIFF file *naivasha.tif* (~52\
    \ MB) in the working directory, and the file can then be processed using other\
    \ software, such as Adobe Photoshop. The processed ASTER image does not yet have\
    \ a coordinate system and therefore needs to be tied to a geographical reference\
    \ frame (*georeferencing*). The header of the HDF file can be used to extract\
    \ the geodetic coordinates of the four corners of the image contained in *scenefourcorners*:\n\
    \n```\nUL = [-0.319922,36.214332]\nLL = [-0.878267,36.096003]\nUR = [-0.400443,36.770406]\n\
    LR = [-0.958743,36.652213]\n```\n\nFrom these coordinates, we can calculate the\
    \ `movingpoints` with respect to the original image by typing\n\n```\nmovingpoints\
    \ = np.array([\n    [0.,4100.*(UL[1]-LL[1])/(UR[1]-LL[1])],\n    [4200.*(UL[0]-LL[0])/(UL[0]-LR[0]),0.],\n\
    \    [4200.*(UL[0]-UR[0])/(UL[0]-LR[0]),4100.],\n    [4200.,4100.*(LR[1]-LL[1])/(UR[1]-LL[1])]])\n\
    ```"
  merge: -1
  pgno: 373
- img_proc: true
  md: "The four corners of the image correspond to the pixels in the four corners\
    \ of the original image, which we store in a variable named `fixedpoints`:\n\n\
    ```\nfixedpoints = np.array([\n    [0.,0.],\n    [4200.,0.],\n    [0.,4100.],\n\
    \    [4200.,4100.]])\n\nfixedpoints = np.fliplr(fixedpoints)\nmovingpoints = np.fliplr(movingpoints)\n\
    ```\n\nThe function `estimate_transform()` now takes the pairs of control points\
    \ (i.e., `movingpoints` and `fixedpoints`) and uses them to infer a spatial transformation\
    \ matrix `tform`. We use an affine transformation with `affine`, which preserves\
    \ points, straight lines, and planes and also keeps parallel lines parallel after\
    \ transforming the image:\n\n```\ntform = tf.estimate_transform('affine',movingpoints,fixedpoints)\n\
    ```\n\nFinally, the affine transformation can be applied to the original RGB composite\
    \ `naivasha_rgb` using `warp()` in order to obtain a georeferenced version of\
    \ the satellite image `newnaivasha_rgb` with the same size as `naivasha_rgb` using\
    \ `tform`:\n\n```\nnewnaivasha_rgb = tf.warp(naivasha_rgb,tform)\n```\n\nThe georeferenced\
    \ image is displayed with coordinates on the axes and with a superimposed grid\
    \ (Fig. 8.3). By default, `imshow()` inverts the latitude axis when images are\
    \ displayed. To invert the latitude axis direction back to normal, we need to\
    \ use `invert_yaxis()` by typing.\n\n```\nplt.figure()\nio.imshow(np.flipud(newnaivasha_rgb),\n\
    \    extent=[36.096003,36.770406,-0.319922,-0.958743])\nax=plt.gca()\nax.invert_yaxis()\n\
    plt.xlabel('Longitude')\nplt.ylabel('Latitude')\nplt.savefig('newnaivasha_rgb.png')\n\
    io.show()\n```\n\nThis code also exports the image as the JPEG file `naivasha_georef.jpg`."
