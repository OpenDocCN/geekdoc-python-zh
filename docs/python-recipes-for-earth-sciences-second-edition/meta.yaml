  md: 'The following tutorial on the analysis of directional data is independent of
    these tools. It provides simple Python codes for displaying directional data,
    for computing the von Mises distribution, and for running simple statistical tests.
    Section 10.2 introduces rose diagrams as the most widely used method for displaying
    directional data. Subsequently, Sects. 10.3 and 10.4 have a similar concept to
    Chap. 3 (on univariate statistics) and cover the use of empirical and theoretical
    distributions for describing directional data. Then, Sects. 10.5 to 10.7 describe
    the three most important tests for directional data: namely tests for the randomness
    of circular data, for the significance of a mean direction, and for the difference
    between two sets of circular data. Finally, Sects. 10.8 and 10.9 describe the
    graphical representation and statistics of spherical data. For the analysis of
    directional data, we use the *NumPy* (https://numpy.org) and *Matplotlib* packages
    (https://matplotlib.org), and the *SciPy* library (https://scipy.org), which contain
    all the necessary routines.


    # 10.2 The Graphical Representation of Circular Data


    The classic way of displaying directional data is in a rose diagram, which is
    a histogram for measurements of angles. In contrast to a bar histogram, in which
    the height of the bars is proportional to the frequency, a rose diagram comprises
    segments of a circle in which the radius of each sector is proportional to the
    frequency. We use synthetic data to illustrate two types of rose diagrams that
    are used to display directional data. We first load a set of directional data
    from the file *directional_1.txt*:


    ```

    import numpy as np

    import matplotlib.pyplot as plt


    data_degrees_1=np.loadtxt(''directional_1.txt'')

    ```


    The data set contains two hundred measurements of angles (in degrees, or °, for
    short). We need to convert all measurements into radians before plotting the data.
    We then bin the data using `histogram()` and display the counts in a rose diagram.
    This is achieved by first selecting the polar projection in `subplot()` and then
    plotting a bar chart in the polar coordinate system:


    ```

    data_radians_1=np.pi*data_degrees_1/180


    e=np.linspace(0,2*np.pi,13)

    v=np.linspace(2*np.pi/24,2*np.pi-2*np.pi/24,12)

    n,e=np.histogram(data_radians_1,bins=e)

    ```'
