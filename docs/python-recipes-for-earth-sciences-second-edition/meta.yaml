  md: "The function `LightSource()` is used to create a light source from a specific\
    \ azimuth and elevation. We use `vert_exag` for vertical exaggeration in order\
    \ to emphasize the vertical features of the surface plot, and we use `blend_mode='hsv'`\
    \ to combine the colormapped data values with the illumination intensity. The\
    \ actual surface plot is then created with `surface()` using the `rgb` object\
    \ created by `shade()` as `facecolors`. It is important to note that `rstride`\
    \ and `cstride` define the number of rows and columns of ETOPO1 that will be used\
    \ to render the graph. If we choose 1 (i.e., full resolution), rendering takes\
    \ very long, and we should therefore use a larger value (e.g., 5, as above) to\
    \ resample the data set vertically and horizontally by this factor in order to\
    \ reduce the rendering time.\n\nWe can also use `makecpt()`, `Figure()`, and `grdview()`\
    \ from the *PyGMT* package, which makes use of the *xarray* package:\n\n```\n\
    ds = xr.DataArray(data=ETOPO1,\n    dims=['lat','lon'],\n    coords={'lat':lat,'lon':lon})\n\
    frame = ['xa1f0.25','ya1f0.25','wSEnZ']\npygmt.makecpt(\n    cmap='geo',\n   \
    \ series=f'-6000/4000/10',\n    continuous=True)\n\nfig = pygmt.Figure()\nfig.grdview(grid=ds,\n\
    \    perspective=[150,30],\n    frame=frame,\n    projection='M15c',\n    zsize='4c',\n\
    \    surftype='i',\n    plane='-6000+gazure',\n    shading=0)\nfig.basemap(\n\
    \    perspective=True,\n    rose='jTL+w3c+l+o-2c/-1c')\nfig.colorbar(perspective=True,\n\
    \    position='JMR+o2c/0c+w10c',\n    frame=['a2000'])\nfig.show()\n```\n\nThis\
    \ script first uses `makecpt()` to choose the geo colormap from *PyGMT* that is\
    \ appropriate for elevation data since this function relates land and sea colors\
    \ to hypsometry and bathymetry, respectively. The function then uses `grdview()`\
    \ to display the actual surface plot and to define the perspective, the frame,\
    \ and the projection. We add a rose that points to geographic north with `basemap()`\
    \ and a colorbar using `colorbar()`."
