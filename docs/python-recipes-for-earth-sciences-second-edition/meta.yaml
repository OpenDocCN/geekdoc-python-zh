    \ 和 meanB）的平均值，然后将每个通道的值乘以所有通道值的平均值（meanGray）：\n\n```python\nI3G = color.rgb2gray(I3)\n\
    meanR = np.mean(I3[:,:,0])\nmeanG = np.mean(I3[:,:,1])\nmeanB = np.mean(I3[:,:,2])\n\
    meanGray = np.mean(I3G)\nI3W = np.zeros(np.shape(I3))\nI3W[:,:,0] = I3[:,:,0]*meanGray/meanR\n\
    I3W[:,:,1] = I3[:,:,1]*meanGray/meanG\nI3W[:,:,2] = I3[:,:,2]*meanGray/meanB\n\
    ```\n\n接下来，我们使用以下公式计算 NDVI：\n\n```python\nI4 = np.copy(I3W)\nndvi = (I4[:,:,2]-I4[:,:,0])/(I4[:,:,2]+I4[:,:,0])\n\
    \nndvi = exposure.rescale_intensity(ndvi,\n    out_range='uint8')\n\nplt.figure()\n\
