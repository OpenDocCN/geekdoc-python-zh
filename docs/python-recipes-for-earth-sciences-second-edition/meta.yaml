    \ of several procedures for analyzing and estimating spatially dependent variables,\
    \ which Matheron called geostatistics. Matheron also coined the term kriging for\
    \ spatial interpolation via geostatistical methods.\n\n# 7.10.1 Theoretical Background\n\
    \nA basic assumption in geostatistics is that a spatiotemporal process is composed\
    \ of both deterministic and stochastic components (Fig. 7.16). The deterministic\
    \ components can be global or local trends (sometimes called drifts). The stochastic\
