  md: 'of univariate or bivariate data sets can be easily explored by visually inspecting
    a 2D histogram or an *xy* plot (Chap. 3), the graphical display of a three-variable
    data set requires projecting the 3D distribution of data points onto a two-dimensional
    display. It is impossible to imagine or display a larger number of variables.
    One solution to the problem of visualizing high-dimensional data sets is to reduce
    the number of dimensions. Several methods exist for grouping together highly correlated
    variables contained within a data set and for exploring the reduced number of
    groups.


    The classic methods of reducing the number of dimensions are *principal component
    analysis* (PCA) and *factor analysis* (FA). These methods seek the directions
    of maximum variance in a data set and use these directions as new coordinate axes.
    The advantage of replacing existing variables with new groups of variables is
    that the groups are uncorrelated. These methods are therefore used for unmixing
    (or separating) mixed variables. Moreover, the new variables can often assist
    in interpreting a multivariate data set since they frequently contain valuable
    information on the processes responsible for the distribution of the data points.
    In a geochemical analysis of magmatic rocks, the groups defined by the method
    usually contain chemical elements with similarly sized ions in similar locations
    within the lattices of certain minerals. Examples include Si$^{4+}$ and Al$^{3+}$
    as well as Fe$^{2+}$ and Mg$^{2+}$ in silicates.


    A second important suite of multivariate methods aims at grouping objects by their
    similarity. As an example, *cluster analysis* (CA) is often used to correlate
    volcanic ash layers, such as those in the example above. Tephrochronology attempts
    to correlate tephra by means of their geochemical fingerprints. When combined
    with a few radiometric age determinations from key ash layers, this method allows
    for correlations between different sedimentary sequences that contain these ash
    layers (e.g., Westgate et al. 1998; Hermanns et al. 2000). Cluster analysis is
    also used in the field of micropaleontology, for example, to compare different
    microfossil assemblages (e.g., Birks and Gordon 1985).


    A third group of methods is concerned with classifying observations. Humans tend
    to want to classify the things around them even though nature rarely falls into
    discrete classes. Classification (or categorization) is useful because it can,
    for example, help decision-makers to take the necessary precautions to reduce
    risks when drilling an oil well or when assigning fossils to a particular genus
    or species. Most classification methods make decisions based on Boolean logic
    with two options, that is, true or false, as in the use of a threshold value for
    identifying charcoal in microscope images (Sect. 8.11). Alternatively, fuzzy logic
    (which is not explained in this book) is a generalization of binary Boolean logic
    with respect to many real-world problems in decision-making in which gradual transitions
    are reasonable (Zadeh 1965, MathWorks 2023a).


    The following sections introduce the most important techniques of multivariate
    statistics. To begin, *principal component analysis* (PCA) and *cluster analysis*
    (CA) are introduced in Sects. 9.2 and 9.5, respectively, and *independent component
    analysis* (ICA) (which is a nonlinear extension of PCA) is outlined in Sect. 9.3.
    Section 9.4 introduces *discriminant analysis* (DA), which is a popular method
    of'
