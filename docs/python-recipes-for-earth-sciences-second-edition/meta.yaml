    (e.g., more than 1,000 km²), spherical distances instead of Pythagorean distances
    should be calculated from a planar Cartesian coordinate system.


    # 7.10.4 Kriging


    We now interpolate our observations to a regular grid using *ordinary point kriging*,
    which is the most popular kriging method. Ordinary point kriging uses a weighted
    average of the neighboring points to estimate the value of an unobserved point,


    $$\widehat{z}_{x_0} = \sum_{i}^{n} \lambda_i \cdot z_{x_i}$$


    where $\lambda_i$ are the weights that must be estimated. The sum of the weights
    should be equal to one in order to guarantee that the estimates are unbiased:


    $$\sum_{i}^{n} \lambda_i = 1$$


    The expected (average) error for the estimation must be zero, that is,


    $$E\left(\widehat{z}_{x_0} - z_{x_0}\right) = 0$$


    where $z_{x_0}$ is the true (but unknown) value. We can use the equations above
    to algebraically compute the mean squared error in terms of the variogram,


    $$E\left(\left(\widehat{z}_{x_0} - z_{x_0}\right)^2\right) = 2 \sum_{i=1}^{n}
    \lambda_i \gamma(x_i, x_0) - \sum_{i=1}^{n} \sum_{j=1}^{n} \lambda_i \lambda_j
    \gamma(x_i, x_j)$$


    where $E$ is the estimation, or *kriging variance* (which must be minimized);
    $\gamma(x_i, x_0)$ is the variogram (semivariance) between the data points and
    the unobserved points; $\gamma(x_i, x_j)$ is the variogram between the data points
    $x_i$ and $x_j$; and $\lambda_i$ and $\lambda_j$ are the weights of the $i$th
    and $j$th data points, respectively.


    For kriging, we must minimize this equation (a quadratic objective function) in
    order to satisfy the condition that the sum of the weights be equal to one (linear'
  - '[PAGE 347]


    constraint). This optimization problem can be solved using a Lagrange multiplier
    $\nu$, which results in a *linear kriging system* of $n+1$ equations and $n+1$
    unknowns:


    $$\sum_{i=1}^{n} \lambda_i \gamma(x_i, x_j) + \nu = \gamma(x_i, x_0)$$


    After obtaining the weights $\lambda_i$, the kriging variance is given by


    $$\sigma^2(x_0) = \sum_{i=1}^{n} \lambda_i \gamma(x_i, x_0) + \nu(x_0)$$


    The kriging system can also be presented in array notation,


    $$G\_mod \cdot E = G\_R$$


    where


    $$G\_mod = \begin{bmatrix} 0 & \gamma(x_1, x_2) & \dots & \gamma(x_1, x_n) & 1
    \ \gamma(x_2, x_1) & 0 & \dots & \gamma(x_2, x_n) & 1 \ \vdots & \vdots & \vdots
    & \vdots & \vdots \ \gamma(x_n, x_1) & \gamma(x_n, x_2) & \dots & 0 & 1 \ 1 &
    1 & \dots & 1 & 0 \end{bmatrix}$$


    is the array of the coefficients (i.e., these are the modeled variogram values
    for the pairs of observations). Note that on the diagonal of the array (where
    the separation distance is zero), the value of $\gamma$ disappears.


    $$E = \begin{bmatrix} \lambda_1 \ \lambda_2 \ \vdots \ \lambda_n \ \nu \end{bmatrix}$$


    is the vector of the unknown weights and the Lagrange multiplier.


    $$G\_R = \begin{bmatrix} \gamma(x_1, x_0) \ \gamma(x_2, x_0) \ \vdots \ \gamma(x_n,
    x_0) \ 1 \end{bmatrix}$$


    is the right-hand-side vector. To obtain the weights and the Lagrange multiplier,
    the array $G\_mod$ is inverted:


    $$E = G\_mod^{-1} \cdot G\_R$$'
