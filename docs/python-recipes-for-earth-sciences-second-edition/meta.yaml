  md: 'In contrast to random errors, which can be determined by evaluating repeated
    measurements, *systematic errors* ($s_s$) are much more difficult to detect and
    quantify. They are usually consistent downward or upward deviations in measured
    values caused by an incorrectly calibrated instrument. The equation


    $$s_s = \mu - \bar{x}$$


    expresses systematic errors as the difference between the (usually unknown) population
    mean (or *true value*) $\mu$ and the sample mean of the measurements (Fig. 3.17).


    As an example, when I was a student in a mapping course, a professor asked us
    perform measurements with his geological compass. Each student did their best,
    but the professor commented that each reading was *wrong*. He was obviously bored
    with the beginner''s course and had thus simply adjusted the scale on his compass
    by five degrees in order to challenge the students. None of us dared to question
    the accuracy of the professor''s compass, and all of our readings were therefore
    incorrect because they included a five degree systematic error (apart from any
    random errors). As there was no possibility to detect this error on the device
    itself, repeated measurements with another device would have allowed the systematic
    error to be detected and eliminated. If we know the random and systematic errors
    of a measurement, we can indicate the *precision* and *accuracy* of our data.
    Precise measurements are consistent about the mean, but the *true value* may be
    different from the mean value of the measurements due to systematic errors that
    limit accuracy. Increasing the sample size $n$ increases the precision, but not
    the accuracy.


    We can now turn to a simple Python experiment in order to gain a better understanding
    of measurement uncertainties. After clearing the workspace and resetting


