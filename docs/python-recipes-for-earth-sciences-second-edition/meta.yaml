  md: '# 7.8 Statistics of Point Distributions


    This section deals with the statistical distribution of objects within an area,
    which may help to explain the relationship between these objects and the properties
    of the area (Fig. 7.9). For instance, the spatial concentration of hand axes in
    an archaeological site may suggest that a larger population of hominins once lived
    in that area. As another example, the clustered distribution of fossils may document
    environmental conditions that were favorable to particular organisms that have
    been preserved as fossils. Furthermore, the alignment of volcanoes may help in
    mapping tectonic structures concealed beneath the Earth''s surface.


    Various methods for statistically analyzing point distributions are introduced
    below. We first consider a test for a uniform spatial distribution of objects
    followed by a test for a random spatial distribution and finally by a simple test
    for a clustered distribution of objects.


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_314_0.png)'
  merge: -1
  pgno: 314
