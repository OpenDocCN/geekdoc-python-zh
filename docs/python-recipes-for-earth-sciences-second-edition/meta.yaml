    ## 3.7 t 检验


    *Student''s t 检验* 由 William S. Gosset (Student 1908) 创建，用于比较两个分布的均值。*单样本 t 检验*
    用于检验高斯分布总体的均值是否具有原假设中指定的值。*双样本 t 检验* 用于检验两个高斯分布的均值是否相同。在下文中，将介绍双样本 t 检验以演示假设检验。让我们假设对同一对象进行了两组独立的
    $n_a$ 和 $n_b$ 次测量——例如，对来自两个不同露头的两组岩石样本进行的测量。t 检验可用于确定两个样本是否来自同一总体，例如同一岩性单元（原假设），或来自两个不同的总体（备择假设）。两个样本分布都必须是高斯分布，并且两组测量的方差应该相似。那么，用于检验两个均值差异的适当检验统计量是


    $$t = \frac{|\overline{a} - \overline{b}|}{\sqrt{\frac{n_a+n_b}{n_a n_b} \cdot
    \frac{(n_a-1)\cdot s_a^2+(n_b-1)\cdot s_b^2}{n_a+n_b-2}}}$$


    其中 $n_a$ 和 $n_b$ 是样本量，$s_a^2$ 和 $s_b^2$ 分别是两个样本 $a$ 和 $b$ 的方差。如果测量的 $t$ 值高于临界
    $t$ 值，则可以拒绝原假设，临界 $t$ 值取决于自由度 $\Phi = n_a + n_b - 2$ 和显著性水平 $\alpha$。单尾检验用于在 5%（或
    0.05）的显著性水平下检验备择假设，即第一个样本的均值小于或大于第二个样本的均值。单尾检验需要修改上述方程，将均值差的绝对值替换为均值的实际差值。当在 5%
    显著性水平下均值不相等时，即无论哪个均值更大都无关紧要时，使用双尾 $t$ 检验。在这种情况下，显著性水平减半，即使用 2.5% 来计算临界 $t$ 值。


