    \ = np.quantile(B08_22,0.95)\nB04_29_05 = np.quantile(B04_29,0.05)\nB04_29_95\
    \ = np.quantile(B04_29,0.95)\nB08_29_05 = np.quantile(B08_29,0.05)\nB08_29_95\
    \ = np.quantile(B08_29,0.95)\n```\n\n然后通过输入以下命令计算两张图像的 NDVI 值：\n\n```python\n\
    NDVI_22 = (B08_22-B04_22)/(B08_22+B04_22)\nNDVI_29 = (B08_29-B04_29)/(B08_29+B04_29)\n\
    ```\n\n作为示例，我们将 2018 年 5 月 22 日获取的图像的 650 nm 和 850 nm 光谱波段显示为灰度图像，并将 NDVI 图显示为彩色图像，两者均使用\
    \ `jet` 颜色映射：\n\n```python\nplt.figure()\nB04_22_X = exposure.rescale_intensity(B04_22,\n\
    \    in_range=(B04_22_05,B04_22_95),\n    out_range='uint16')\nplt.imshow(B04_22_X,\n\
    \    cmap='gray')\nplt.colorbar()\nplt.axis('off')\nplt.title('650 nm')\nplt.show()\n\
