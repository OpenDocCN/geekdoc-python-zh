    # 5.10 The Wavelet Power Spectrum


    Section 5.7 demonstrated the use of a modification to the power spectrum method
    for mapping changes in cyclicity over time. A similar modification was applied
    to the Lomb–Scargle method, which would have the advantage of being able to be
    applied to unevenly spaced data (Sect. 5.9). However, both methods assume that
    the data are composites of sine and cosine waves that are globally uniform in
    time and that have infinite time spans. The evolutionary power spectrum method
    divides the time series into overlapping segments and computes the Fourier transform
    of these segments. In order to avoid spectral leakage, the data are multiplied
    by windows that are smooth bell-shaped curves with positive values (Sect. 5.5).
    The higher the temporal resolution of the evolutionary power spectrum, the lower
    the accuracy of the result. Moreover, short time windows contain a large number
    of high-frequency cycles, whereas the low-frequency cycles are underrepresented.


    In contrast to the Fourier transform, the *wavelet transform* uses base functions
    (*wavelets*) that have smooth ends per se (Lau and Weng 1995; Mackenzie et al.
    2001). Wavelets are small packets of waves that are defined by a specific'
  merge: -1
  pgno: 211
- img_proc: true
  md: "frequency and that decay toward either end. Since wavelets can be stretched\
    \ and translated across both frequency and time with a flexible resolution, and\
    \ they can easily map changes in the time–frequency domain.\n\nA wavelet transformation\
    \ mathematically decomposes a signal $x(t)$ into elementary functions $\\psi_{a,b}(t)$\
    \ derived from a *mother wavelet* $\\psi(t)$ via dilation and translation,\n\n\
    $$\\psi_{a,b} = \\frac{1}{a^{1/2}} \\psi \\left( \\frac{t - b}{a} \\right)$$\n\
    \nwhere $b$ denotes the position (translation) and $a$ (>0) denotes the scale\
    \ (dilation) of the wavelet (Lau and Weng 1995). The wavelet transform of the\
    \ signal $x(t)$ about the mother wavelet $\\psi(t)$ is defined as the convolution\
    \ integral,\n\n$$W(b, a) = \\frac{1}{a^{1/2}} \\int \\psi^* \\left( \\frac{t -\
    \ b}{a} \\right) x(t) \\mathrm{d}t$$\n\nwhere $\\psi^*$ is the complex conjugate\
    \ of $\\psi$. There are many mother wavelets available in the literature, such\
    \ as the classic *Haar* wavelet, the *Morlet* wavelet, and the *Daubechies* wavelet.\
    \ The most popular wavelet in the earth sciences is the Morlet wavelet, which\
    \ was introduced by French geophysicist Jean Morlet (1931 to 2007) and is defined\
    \ by\n\n$$\\psi_0(\\eta) = \\pi^{-1/4} exp(i\\omega_0\\eta) exp(-\\eta^2/2)$$\n\
    \nwhere $\\eta$ is the time and $\\omega_0$ is the wave number (Torrence and Compo\
    \ 1998). The wave number is the number of oscillations within the wavelet itself.\
    \ We can easily compute a discrete version of the Morlet wavelet wave by translating\
    \ the equation above into Python code, where `eta` is the non-dimensional time\
    \ and `w0` is the wave number. Changing `w0` produces wavelets with different\
    \ wave numbers. Note that it is important not to use `i` for an index in `for`\
    \ loops since it is used here for the imaginary unit (Fig. 5.21):\n\n```\nimport\
    \ numpy as np\nimport scipy.signal as signal\nfrom scipy import interpolate\n\
    import matplotlib.pyplot as plt\n\neta=np.arange(-10,10+0.1,0.1)\nw0=6\nwave=np.multiply(np.multiply(np.pi**(-1/4),\n\
    \    np.exp(1j*w0*eta)),np.exp(-eta**2/2))\n\nplt.figure()\nplt.plot(eta,wave)\n\
    plt.xlabel('Position')\n```"
