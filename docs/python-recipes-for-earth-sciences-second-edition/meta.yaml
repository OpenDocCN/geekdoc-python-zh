    \ 255，则图像全黑。我们手动更改阈值，直到获得合理的结果。在我们的示例中，阈值为 43 时，识别木炭碎片的效果很好：\n\n```python\nthresh,\
    \ I4 = cv2.threshold(I3,\n    43,255,cv2.THRESH_BINARY)\nI4 = exposure.rescale_intensity(I6,\n\
    \    out_range='uint8')\n\nplt.figure()\nio.imshow(I4,\n    extent=[0,ix,0,iy],\n\
