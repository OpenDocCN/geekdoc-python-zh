    \ after displaying the sine of `x`:\n\n```python\nplt.figure()\nplt.plot(x, y1,\
    \ '--')\nplt.show()\n\nplt.figure()\nplt.plot(x, y2, '-')\nplt.show()\n```\n\n\
    We can also display the sine of `x` as a line plot and the cosine of `x` as a\
    \ bar plot using\n\n```python\nplt.figure()\nplt.plot(x, y1, 'r--')\nplt.bar(x,\
    \ y2, color='b')\nplt.show()\n```\n\nThis command plots `y1` versus `x` as a dashed\
    \ red line using `'r--'`, whereas `y2` versus `x` is shown as a group of blue\
    \ vertical bars. Alternatively, we can plot both graphics in the same figure window\
