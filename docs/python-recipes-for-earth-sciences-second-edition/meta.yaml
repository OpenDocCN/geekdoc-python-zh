    \            '1b/(1a+1b+1c)'))\nplt.xlabel('Frequency')\nplt.ylabel('Power')\n\
    plt.show()\n\n因此，我们再次使用element1a_perc和element1b_perc的比率ratio12和ratio21来消除element1c的稀释效应。如我们所见，周期为20的周期在ratio12和ratio21的周期图中不再出现：\n\
    \nratio12 = signal.detrend(ratio12)\nratio21 = signal.detrend(ratio21)\nf,Pxxpr12\
    \ = signal.periodogram(ratio12,10,\n                                nfft=ratio12.size)\n\
