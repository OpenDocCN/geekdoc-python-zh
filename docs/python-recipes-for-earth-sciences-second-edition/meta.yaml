    plt.plot(data[0:,0],data[0:,1],\n         color='k',\n         linewidth=0.3)\n\
    ax.set_extent([-20,61,-40,40],\n              ccrs.PlateCarree())\ngl = ax.gridlines(crs=ccrs.PlateCarree(),\n\
