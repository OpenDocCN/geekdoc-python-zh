    \n在第二个例子中，我们研究了稀释在频域中的影响以及艾奇逊对数比变换对谱分析结果的影响。这个例子非常相关，因为谱分析经常在具有明显稀释效应和虚假相关性的数据集上进行，目的是建立轨道驱动与环境变化之间的联系。可能会声称环境参数与轨道驱动的日照变化之间存在因果关系，但环境参数时间序列中观察到的轨道周期纯粹是封闭和效应的产物。我们使用与上面类似的例子，但时间序列稍长，以便在谱分析中获得良好的结果。\n\
    \n首先，我们再次创建三个变量（以毫克为单位），分别具有2、5和20三个不同的周期。这些变量再次以0.1的间隔采样，但这次是在0.1到100的周期内，产生一个包含1000个值的时间序列：\n\
    \n```python\nt = np.linspace(0.1,100,1000)\nt = np.transpose(t)\n\nelement1a =\
    \ np.sin(2*np.pi*t/2) + 5\nelement1b = np.sin(2*np.pi*t/5) + 5\nelement1c = 2*np.sin(2*np.pi*t/20)\
    \ + 5\n```\n\n然后，我们通过输入以下命令计算元素的百分比\n\n```python\nelement1a_perc = element1a/(element1a+element1b+element1c)\n\
    element1b_perc = element1b/(element1a+element1b+element1c)\nelement1c_perc = element1c/(element1a+element1b+element1c)\n\
    ```\n\n同样，元素`element1a_perc`和`element1b_perc`显示出显著的正弦长期趋势，这并非真实情况，而是稀释元素`element1c_perc`影响的结果。因此，我们再次构建比值`ratio12`和`ratio21`，现在两者都独立于`element1c_perc`，输入以下命令\n\
