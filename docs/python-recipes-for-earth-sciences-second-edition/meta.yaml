    1909）进行作图。


    - *时间序列分析*——这些方法将数据序列作为时间的函数进行研究。时间序列被分解为长期趋势、系统性成分（例如，周期性、循环性、节律性）和不规则成分（例如，随机性、随机性）。一种广泛用于描述时间序列循环成分的技术是频谱分析。这些技术的应用实例包括研究沉积岩中的周期性气候变化和分析地震数据。

    - *信号处理*——该方法包括用于处理信号的所有技术，旨在最小化噪声的影响，以校正各种不需要的失真或分离各种感兴趣的成分。信号处理包括设计和实现滤波器，以及将这些滤波器应用于数据。这些方法通常与时间序列分析结合使用，例如，用于提高气候时间序列、数字图像或地球物理数据中的信噪比。

    - *空间分析*——这是对二维或三维空间中变量的分析，因此所需的两个或三个变量是坐标数。空间分析包括用于研究地理分布数据空间模式的描述性工具。其他技术涉及使用空间回归分析来检测空间趋势。空间分析还包括二维和三维插值技术，这些技术有助于估算代表变量在整个区域内预测连续分布的表面。实例包括分析排水系统、识别古老的地貌形态以及分析构造活跃区域的线性特征。

    - *图像处理*——处理和分析图像已成为地球科学中日益重要的活动。这些方法涉及图像的导入与导出、压缩与解压缩以及显示。图像处理还旨在增强图像以提高可理解性，并处理图像以提高信噪比。高级技术用于提取特定特征或分析形状和纹理，例如在显微图像中计数矿物颗粒或化石。图像处理的另一个重要应用是利用卫星遥感来绘制某些类型的岩石、土壤和植被图，并测量其他变量，如土壤湿度、岩石风化和侵蚀。

    - *多元分析*——这些方法涉及同时观察和分析多个统计变量。由于图形化表示多维数据集很困难，大多数这些方法都包含降维。多元方法广泛应用于地球化学数据，例如在火山灰年代学中，通过玻璃碎片的地球化学指纹来关联火山灰层。另一个重要用途是比较海洋和湖泊沉积物中的物种组合，以重建古环境。

    - *方向数据分析*——分析圆形和球形数据的方法在地球科学中被广泛使用。构造地质学家测量和分析断层面上擦痕（或条痕）的方位。此外，圆形统计方法在古地磁研究中很常见，微观结构研究包括分析岩石薄片中颗粒的形状和石英*c*轴的方位。


    其中一些数据分析方法需要应用数值方法，例如插值技术。虽然以下文本主要涉及统计技术，但也介绍了地球科学中常用的几种数值方法。


