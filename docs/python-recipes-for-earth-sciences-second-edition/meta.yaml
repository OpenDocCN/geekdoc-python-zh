    \ multi-dimensional arrays; https://docs.xarray.dev), and *Cartopy* packages (https://scitools.org.uk/cartopy),\
    \ and the *SciPy* library (https://scipy.org).\n\n# 7.2 The Global Geography Database\
    \ GSHHG\n\nThe *Global Self-consistent, Hierarchical, High-resolution Geography*\
    \ (GSHHG) database is an amalgamation of two public domain databases that was\
    \ created by Paul Wessel (SOEST, University of Hawaii, Honolulu, HI, USA) and\
    \ Walter Smith (NOAA Laboratory for Satellite Altimetry, Silver Spring, MD, USA)\
    \ (Wessel and Smith 1996). The GSHHG database consists of the older GSHHS shoreline\
    \ database (Soluri and Woodson 1990; Wessel and Smith 1996), with the poor-quality\
    \ Antarctica data having been replaced by more accurate data from Bohlander and\
    \ Scambos (2007) and with rivers and borders having been taken from the CIA World\
    \ Data Bank II (WDBII) (Gorny 1977). GSHHG data can be downloaded from the SOEST\
    \ server\n\nhttp://www.soest.hawaii.edu/pwessel/gshhg/index.html\n\nin three different\
    \ formats (i.e., as Generic Mapping Tools (GMT) files, as ESRI shapefiles, or\
    \ as native binary files) and in a wide range of spatial resolutions. As an example,\
    \ we can import the longitude/latitude coordinates from an ASCII file extracted\
    \ from the data set using\n\n```\nimport numpy as np\nimport cartopy.crs as ccrs\n\
    import matplotlib.pyplot as plt\nimport matplotlib.ticker as mticker\nfrom cartopy.mpl.ticker\
    \ import (LongitudeFormatter,\n                                LatitudeFormatter,\n\
    \                                LongitudeLocator,\n                         \
    \       LatitudeLocator)\n\ndata = np.loadtxt('coastline_data.txt')\n```"
