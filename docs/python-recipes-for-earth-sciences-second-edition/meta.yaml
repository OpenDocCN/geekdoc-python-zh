    \ * \\n    (np.max(data[:,1])-np.min(data[:,1]))\nexpectednearest = 0.5 * np.sqrt(maparea/len(data))\n\
    print(expectednearest)\n```\n\nwhich yields\n\n```\n0.49268341482387124\n```\n\
    \nIn our example, the expected mean nearest neighbor distance expectednearest\
    \ is 0.4927. Finally, we compute the standard error of the mean nearest neighbor\
    \ distance se,\n\n```\nse = 0.26136/np.sqrt(len(data)**2/maparea)\nprint(se)\n\
    ```"
