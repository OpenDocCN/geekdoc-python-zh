- img_proc: true
  md: 'The first principal component $PC_1$ (which is denoted by $Y_1$) contains the
    highest variance, while $PC_2$ contains the second-highest variance, and so forth.
    All the $PCs$ together contain the full variance of the data set. However, this
    variance is largely concentrated in the first few $PCs$, which include most of
    the information content of the data set. The last $PCs$ are therefore generally
    ignored in order to reduce the dimensions of the data. The factors $a_{ij}$ in
    the equations above are the *principal component loadings*, and their values represent
    the relative contributions of the original variables to the new $PCs$. If the
    loading $a_{ij}$ of a variable $X_j$ in $PC_1$ is close to zero, then the influence
    of this variable is low, whereas a high positive or negative $a_{ij}$ suggests
    a strong influence. The new values $Y_j$ of the variables computed from the linear
    combinations of the original variables $X_j$ (weighted by the loadings) are called
    the *principal component scores*.


    PCA is commonly used to unmix (or separate) variables $X$, which are a linear
    combination of independent source variables $S$,


    $$X = A^T \cdot S$$


    where $A$ is the mixing matrix. PCA aims to determine (albeit not quantitatively)
    both the source variables $S$ (represented by the principal component scores $Y_j$)
    and the mixing matrix $A$ (represented by the principal component loadings $a_{ij}$).
    Unmixing such variables works best if the probability distribution of the original
    variables $X$ is a Gaussian distribution, and only in such cases are the principal
    components completely linearly decorrelated. However, data in the earth sciences
    are often not Gaussian distributed, and alternative methods–such as independent
    component analysis (ICA)–should therefore be used instead (Sect. 9.3). For example,
    radiance and reflectance values from hyperspectral data are often not Gaussian
    distributed, and ICA rather than PCA is therefore widely used in remote sensing
    applications to decorrelate spectral bands. Examples in which PCA is used include
    assessing sediment provenance (as described in the example below), unmixing peridotite
    mantle sources of basalts, and multispectrally classifying satellite images.


    The first example illustrates PCA without using `PCA()` and instead using `cov()`
    to calculate the $p$-by-$p$ covariance matrix of a $p=2$ dimensional data set
    and then using `eig()` to calculate the $p$ eigenvectors and $p$ eigenvalues of
    this matrix. We next assume a data set that consists of measurements of $p$ variables
    from $n$ samples that are stored in an $n$-by-$p$ array called `data`. As an example,
    we can create a bivariate data set of 2-by-30 data points and with a strong linear
    correlation that is overlaid with normally distributed noise:


    ```

    import numpy as np

    import numpy.linalg as linalg

    from matplotlib import cm

    import matplotlib.pyplot as plt

    from numpy.random import default_rng

    from sklearn.decomposition import PCA

    ```'
