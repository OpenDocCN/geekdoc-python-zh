  - "[PAGE 291]\n\n# 7.4 The 30 Arc-Second Elevation Model GTOPO30\n\nThe *Global\
    \ 30 Arc-Second Elevation Data* (GTOPO30) is a 30 arc-second (i.e., about 1 km)\
    \ global digital elevation data set that contains only elevation data and no bathymetry\
    \ data. The data set was developed by the Earth Resources Observation System Data\
    \ Center and is available from the USGS EarthExplorer website at\n\nhttps://earthexplorer.usgs.gov\n\
    \nThe EarthExplorer website can be used to search for, preview, and download satellite\
    \ images, aerial photographs, and cartographic products through the U.S. Geological\
    \ Survey (USGS). The GTOPO30 data set is located in the *Digital Elevation* category.\
    \ On this website, we first select the desired map section in the *Search Criteria*\
    \ either by entering the coordinates of the four corners of the map or by zooming\
    \ into the area of interest and selecting *Use Map*. As an example, we can enter\
    \ the coordinates of the Suguta Valley in the northern Kenya rift (2°37.58\"N\
    \ 36°33'47.06\"E). We then choose *GTOPO30* from the *Digital Elevation* collection\
    \ as the *Data Set* and click *Results*, which produces a list of records together\
    \ with a toolbar for previewing and downloading data. In our example, we find\
    \ a single data set *GT30E020N40*, which was acquired on 1 December 1996 and is\
    \ centered at 15°N 40°E. We need to register with the USGS website, log in, and\
    \ then download the data set as both a 55.0 MB GeoTIFF and a 24.9 MB DEM, the\
    \ latter of which is provided as a 26.1 MB compressed zip file. After decompressing\
    \ the file *gt30e020n40_dem.zip*, we obtain eight files that contain the raw data\
    \ and header files in various formats. The file also provides a GIF image of a\
    \ shaded relief display of the data.\n\nImporting the GTOPO30 data into the workspace\
    \ is simple. We rename the files by removing *gt30* from the file name in the\
    \ unzipped collection and use\n\n```\nimport numpy as np\nfrom matplotlib import\
    \ cm\nfrom matplotlib.colors import LightSource\nimport matplotlib.pyplot as plt\n\
    from matplotlib.colors import ListedColormap\n\nwith open('e020n40.dem') as fid:\n\
    \    rectype = np.dtype('>i2')\n    GTOPO30 = np.fromfile(fid, dtype=rectype)\n\
    GTOPO30 = np.reshape(GTOPO30, (6000, 4800))\nGTOPO30 = np.flipud(GTOPO30)\nGTOPO30[GTOPO30<0]\
    \ = 0\n```\n\nto import the data. This script reads the data from the tile *e020n40*\
    \ (without a file extension) at full resolution (i.e., scale factor = 1) in the\
    \ array GTOPO30, which"
  - "[PAGE 292]\n\nhas dimensions of 1,200 by 1,200 cells. The coordinate system is\
    \ defined using the *lon/lat* limits listed above. The resolution is 30 arc seconds,\
    \ which corresponds to 1/120 of a degree:\n\n```\nlon = np.linspace(20,60,4800)\n\
    lat = np.linspace(-10,40,6000)\nLON,LAT = np.meshgrid(lon,lat)\n```\n\nWe need\
    \ to reduce the upper limits by 1/120 in order to obtain an array of similar dimensions\
    \ to the GTOPO30 array. A grayscale image can be generated from the elevation\
    \ data using *pcolormesh()*. The fourth power of the *colormap gray_r* is used\
    \ to darken the map, and the colormap is then flipped vertically in order to obtain\
    \ dark colors for high elevations and light colors for low elevations (instead\
    \ of the other way around):\n\n```\ngray_r = plt.colormaps['gray_r']\nnewcolors\
    \ = gray_r(np.linspace(0,1,256))\nnewcolors = newcolors**4\nnewcmp = ListedColormap(newcolors)\n\
    \nplt.figure()\nplt.axes(aspect='equal',\n    xlim=(30,40),\n    ylim=(-5,5))\n\
    plt.pcolormesh(LON,LAT,GTOPO30,\n    cmap=newcmp,\n    shading='auto')\nplt.colorbar()\n\
    plt.show()\n```\n\nThis script opens a new figure window and generates a gray\
    \ surface, which is displayed in an overhead view. We again plot the digital topography\
    \ as a surface plot with angled lighting using a code similar to the one used\
    \ in Sect. 7.4:\n\n```\nplt.figure()\nfig,ax2 = plt.subplots(subplot_kw={\"projection\"\
    :\"3d\"})\nax2.set_box_aspect((1,1,0.2))\nls = LightSource(270,45)\nrgb = ls.shade(GTOPO30,\n\
    \    cmap=cm.hsv,\n    vert_exag=1,\n    blend_mode='hsv')\nax2.plot_surface(LON[600:1800,1200:2400],\n\
    \    LAT[600:1800,1200:2400],\n```"
- md: "## 7.5 The Shuttle Radar Topography Mission SRTM\n\nThe *Shuttle Radar Topography\
    \ Mission* (SRTM) was an 11-day mission of the Space Shuttle *Endeavour* in February\
    \ 2000 that used a radar system to map the Earth's surface (Farr and Kobrick 2000;\
    \ Farr et al. 2007). SRTM was an international project spearheaded by the National\
    \ Geospatial-Intelligence Agency (NGA) and the National Aeronautics and Space\
    \ Administration (NASA). Detailed information on the SRTM project (including a\
    \ gallery of images and a data users forum) can be accessed on NASA's website:\n\
    \n```\nhttps://www2.jpl.nasa.gov/srtm/\n```\n\nThe data were processed at the\
    \ Jet Propulsion Laboratory. They are distributed through the United States Geological\
    \ Survey's (USGS) National Map Viewer and Download Platform:\n\n```\nhttps://www.usgs.gov/core-science-systems/ngp/tnm-delivery/\n\
    ```\n\nAt one time, the raw data could be downloaded as *int16* data from a USGS\
    \ server, though this server is no longer available:\n\n```\nhttp://dds.cr.usgs.gov/srtm/\n\
    ```\n\nThe directory contained zipped files of SRTM DEMs from various areas of\
    \ the world, which were processed by the SRTM global processor and sampled at\
    \ resolutions of 1 arc second (SRTM-1, 30 m grid) and 3 arc seconds (SRTM-3, 90\
    \ m grid). As an example, we downloaded the 1.7 MB file *s01e036.hgt.zip* from\n\
    \n```\nhttp://dds.cr.usgs.gov/srtm/version2_1/SRTM3/Africa/\n```\n\nwhich contains\
    \ SRTM-3 data from the Kenya Rift Valley in eastern Africa. All elevations are\
    \ in meters and are referenced to the WGS84 EGM96 geoid, which is documented at\n\
    \n```\nhttp://earth-info.nga.mil/GandG/wgs84/index.html\n```\n\nThe name of this\
    \ file refers to the longitude and latitude of the lower-left (southwest) pixel\
    \ of the tile, that is, to a latitude one degree south and a longitude 36 degrees\
    \ east. SRTM-3 data contain 1,201 lines and 1,201 rows, with similar numbers of\
    \ overlapping rows and columns. After downloading *S01E036.hgt.zip*, we first\
    \ decompress the file and save *S01E036.hgt* in our working directory. The digital\
    \ elevation model is provided as 16 bit signed integer data in a simple binary\
    \ raster. The bit order is *big-endian* (Motorola's standard), which means that\
    \ the most significant bit comes first. The data are imported into the workspace\
    \ using\n\n```python\nimport numpy as np\nimport numpy.ma as ma\nfrom scipy import\
    \ signal\nfrom matplotlib import cm\nfrom matplotlib.colors import LightSource\n\
    import matplotlib.pyplot as plt\nfrom matplotlib.colors import ListedColormap\n\
    import rasterio as rasterio\nimport rasterio.plot\n\nwith open('S01E036.hgt')\
    \ as fid:\n    rectype = np.dtype('>i2')\n    SRTM = np.fromfile(fid,dtype=rectype)\n\
    \nSRTM = np.reshape(SRTM, (1201,1201))\nSRTM = np.flipud(SRTM)\n```\n\nThis script\
    \ opens the file `s01e036.hgt` using `open()` and defines the file identifier\
    \ `fid`, which is then used to read the binaries from the file using the data\
    \ type `>i2` for big-endian 2 byte (or 16 bit) integers and to write them in the\
    \ array `SRTM` using `fromfile()`. The array first needs to be reshaped to (1201,\
    \ 1201) using `reshape()` and then flipped vertically using `flipud()`. We next\
    \ change the data type to 64 bit floating point numbers using `astype()`, and\
    \ the -32,768 flag for data voids can be replaced by the global mean elevation\
    \ using `mean()`:\n\n```python\nSRTM = SRTM.astype(float)\nSRTM[SRTM==-32768]\
    \ = np.mean(SRTM)\n```\n\nFinally, we test whether the data are now correctly\
    \ stored in the workspace by printing the minimum and maximum elevations of the\
    \ area:\n\n```python\nnp.max(SRTM)\nnp.min(SRTM)\n```\n\nIn our example, the maximum\
    \ elevation of the area is 3,992 m above sea level, and the minimum is 1,504 m.\
    \ A coordinate system can be defined using the information that the lower-left\
    \ corner is `s01e036`. The resolution is 3 arc seconds, which corresponds to 1/1,200\
    \ of a degree:\n\n```python\nlon = np.linspace(36,37,1201)\nlat = np.linspace(-1,0,1201)\n\
    LON,LAT = np.meshgrid(lon,lat)\n```\n\nA shaded grayscale map can be generated\
    \ from the elevation data using `pcolormesh()`, which displays a shaded surface\
    \ with simulated lighting:\n\n```python\ngray_r = plt.colormaps['gray_r']\nnewcolors\
    \ = gray_r(np.linspace(0,1,256))\nnewcolors = newcolors**1\nnewcmp = ListedColormap(newcolors)\n\
    \nplt.figure()\nplt.axes(aspect='equal')\nplt.pcolormesh(LON,LAT,SRTM,\n    cmap=newcmp,\n\
    \    shading='auto')\nplt.colorbar()\nplt.show()\n```\n\nThis script opens a new\
    \ figure window and generates both a shaded relief map (using interpolated shading)\
    \ and a gray colormap (which is displayed in an overhead view). Since SRTM data\
    \ contain a large amount of noise, we first smooth the data via an arbitrary 9-by-9\
    \ pixel moving average filter using convolve2d(). Contrary to the discussion of\
    \ running means in Chap. 6.8, the side effects of the running means are not important\
    \ at this point. The new array is then stored in SRTM_FILTERED:\n\n```python\n\
    B = 1/81 * np.ones((9,9))\nSRTM_FILTERED = signal.convolve2d(SRTM,B,mode='same')\n\
    ```\n\nThe corresponding shaded relief map is generated using\n\n```python\nplt.figure()\n\
    plt.axes(aspect='equal')\nplt.pcolormesh(LON,LAT,SRTM_FILTERED,\n    cmap=newcmp,\n\
    \    shading='auto')\nplt.colorbar()\nplt.show()\n```\n\nNeighboring SRTM tiles\
    \ overlap one line or column, which we must delete when merging SRTM data sets.\
    \ We use the Baringo basin in Kenya as an example, which is covered by two SRTM\
    \ tiles. We first load the two SRTM data sets from the files *N00E036.hgt* and\
    \ *N00E035.hgt*, as described previously:\n\n```python\nwith open('N00E035.hgt')\
    \ as fid:\n    rectype = np.dtype('>i2')\n    SRTM1 = np.fromfile(fid,dtype=rectype)\n\
    \nwith open('N00E036.hgt') as fid:\n    rectype = np.dtype('>i2')\n    SRTM2 =\
    \ np.fromfile(fid,dtype=rectype)\n```\n\nWe next reshape and flip the data sets\
    \ up and down:\n\n```python\nSRTM1 = np.reshape(SRTM1,(1201,1201))\nSRTM1 = np.flipud(SRTM1)\n\
    SRTM2 = np.reshape(SRTM2,(1201,1201))\nSRTM2 = np.flipud(SRTM2)\n```\n\nWe eliminate\
    \ the overlapping (identical) column in the first tile SRTM1 and concatenate it\
    \ horizontally with the second tile SRTM2 using concatenate(). Then we replace\
    \ the gaps with the global mean elevation:\n\n```python\nSRTM = ma.concatenate([SRTM1[:,:1200],SRTM2],axis=1)\n\
    \nSRTM = SRTM.astype(float)\nSRTM[SRTM==-32768] = np.mean(SRTM)\n```\n\nWe then\
    \ smooth the data using a running mean:\n\n```python\nB = 1/25 * np.ones((5,5))\n\
    SRTM_FILTERED = signal.convolve2d(SRTM,B,mode='same')\n```\n\nSubsequently, we\
    \ define a coordinate grid and contour levels (see Sect. 7.7):\n\n```python\n\
    lon = np.linspace(35,37,2401)\nlat = np.linspace(-1,0,1201)\nLON,LAT = np.meshgrid(lon,lat)\n\
    v = np.array([700,800,900,1000,1100,1200,\n              1300,1500,2500,3000])\n\
    ```\n\nThe script below yields a great display of the data using a code similar\
    \ to the one used in Sects. 7.3 and 7.4. Note the use of set_box_aspect() to reduce\
    \ the length of the z-axis:\n\n```python\nplt.figure()\nfig,ax2 = plt.subplots(subplot_kw={\"\
    projection\":\"3d\"})\nax2.set_box_aspect((2,1,0.1))\nax2.set_xlim((35,37))\n\
    ax2.set_ylim((-1,0))\nax2.set_zlim((1500,3500))\nls = LightSource(270,45)\nrgb\
    \ = ls.shade(SRTM,\n               cmap=cm.hsv,\n               vert_exag=1,\n\
    \               blend_mode='soft',\n               vmin=0,\n               vmax=np.max(SRTM_FILTERED))\n\
    ax2.plot_surface(LON,LAT,SRTM_FILTERED,\n                 rstride=1,\n       \
    \          cstride=1,\n                 linewidth=0,\n                 facecolors=rgb,\n\
    \                 antialiased=False,\n                 shade=True,\n```\n\nAs\
    \ in Sect. 7.3, we can create a much more appealing graphic using the functions\
    \ from the *PyGMT* package (Fig. 7.3):\n\n```python\nGTOPO30 = np.float64(GTOPO30)\n\
    \nds = xr.DataArray(data=GTOPO30,\n    dims=['lat','lon'],\n    coords={'lat':lat,'lon':lon})\n\
    frame = ['xal1f0.25','yal1f0.25','wSEnZ']\npygmt.makecpt(\n    cmap='geo',\n \
    \   series=f'-6000/4000/10',\n    continuous=True)\n\nfig = pygmt.Figure()\nfig.grdview(grid=ds,\n\
    \    perspective=[150,30],\n    frame=frame,\n    projection='M15c',\n    zsize='4c',\n\
    \    surftype='i',\n    plane='-6000+gazure',\n    shading=0)\nfig.basemap(\n\
    \    perspective=True,\n    rose='jTL+w3c+l+o10c/12c')\nfig.colorbar(perspective=True,\n\
    \    position='JMR+o2c/0c+w10c',\n    frame=['a2000'])\nfig.savefig('gtopo30_python.png',dpi=300)\n\
    fig.show()\n```\n\nThis script first uses `makecpt()` to choose the geo colormap\
    \ from *PyGMT* that is appropriate for elevation data. The script then uses `grdview()`\
    \ to display the actual surface plot as well as to define the perspective, the\
    \ frame, and the projection of the graphic. We add a compass rose that points\
    \ to geographic north using `basemap()` and a colorbar using `colorbar()`. We\
    \ again export the graph as a PNG file with a resolution of 300 dpi to the file\
    \ *gtopo30_python.png*."
  mdcn: "## 7.5 航天飞机雷达地形测绘任务（SRTM）\n\n*航天飞机雷达地形测绘任务*（SRTM）是2000年2月航天飞机*奋进号*执行的一项为期11天的任务，该任务利用雷达系统绘制地球表面地图（Farr\
