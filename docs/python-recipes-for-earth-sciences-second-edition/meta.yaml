    \ 2018 年 5 月 22 日和 29 日获取）的 NDVI 图之间的差异，并将图像保存为 PNG 文件：\n\n```python\nDNDVI =\
    \ NDVI_22 - NDVI_29\n```\n\n```python\nplt.figure()\nB04_22_X = exposure.rescale_intensity(B04_22,\n\
