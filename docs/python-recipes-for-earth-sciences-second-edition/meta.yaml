    B08_22 = np.float64(B08_22)\nB04_29 = np.float64(B04_29)\nB08_29 = np.float64(B08_29)\n\
    ```\n\n为了显示图像，我们首先计算 5% 和 95% 分位数：\n\n```python\nB04_22_05 = np.quantile(B04_22,0.05)\n\
