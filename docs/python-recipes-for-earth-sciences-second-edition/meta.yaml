    on the computer is covered in Sect. 2.2, Python syntax is covered in Sects. 2.3
    and 2.4, data storage and handling are covered in Sects. 2.5 and 2.6, programming
    is covered in Sects. 2.7 and 2.8, and visualization is covered in Sect. 2.9. We
    recommend that the reader go through the entire chapter in order to acquire solid
    foundational knowledge of the software before proceeding to the following chapters
    of the book. A more detailed introduction can be found in the Python Beginner''s
    Guide on the Python website, where we can also find the documentation, a list
    of numerous Python-based books, and access to the Python community. Another important
    resource for solving Python problems is Stackoverflow (https://stackoverflow.com),
    where users of Python and other programming languages can discuss problems and
