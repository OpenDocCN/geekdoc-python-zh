    The output signal y is zero for all values of the input signal x, and the output
    signal therefore does not contain any information about the input signal.


    +   - causality – The system response depends only on present and past values
    of the input signal x(0), x(-1), ..., whereas future values of the input signal
    x(+1), x(+2), ... have no effect on the output signal y(0). All real-time systems
    (e.g., telecommunications systems) must be causal since they cannot have future
    values of the input signal available to them. All systems and filters in Python
    are indexed as causal. In the earth sciences, however, numerous non-causal filters
    are used. The filtering of images and signals that have been extracted from sediment
    cores is an example for which future values of the input signal are available
    at the time of filtering. Output signals must be delayed after filtering in order
    to compensate for the differences between causal and non-causal indexing.

    - stability – A system is stable if the output signal y(t) of a finite input signal
    x(t) is also finite. Stability is critical in filter design, where filters often
    have the disadvantage of provoking divergent output signals. In such cases, the
    filter design must be revised and improved.


    Linear time invariant (LTI) systems are very popular as a special type of filter.
    Such systems have all the advantages described above and are also easy to design
    and use in many applications. Sect. 6.4 to 6.9 below describe the design, realization,
    and application of LTI-type filters for extracting specific frequency components
    from signals. These filters are mainly used to reduce the noise level in'
