    When we specify the result, a number of rules apply regarding how many digits
    to specify. First, the measured value and the measurement uncertainty must have
    the same number of digits. Second, the number of digits after rounding is defined
    by the measurement uncertainty. Third, we need to search for the first non-zero
    digit in the measurement uncertainty starting from the left. If this digit is
    greater than 2, then it is the rounding digit; if this digit is 1 or 2, then the
    next digit to the right is the rounding digit. Fourth, the measurement uncertainty
    is always rounded up. In our example, the first digit of the measurement uncertainty
    is 2, and we therefore use the first digit to the right of the decimal point (i.e.,
    7) as the rounding digit. The result of our measurements is therefore 4.4±2.8
    g per ton, which suggests that the true value falls within this interval with
    a~68% probability. As we can easily see from our synthetic example, this value
    deviates considerably from the original value of 3.4±1.5 (which we defined at
    the beginning) due to the small sample size of n=12. However, the true value of
    3.4 still falls within the interval of 4.4±2.8 g per ton.


    Increasing the sample size, however, dramatically improves the result since the
    error of the mean depends on the number of measurements,


