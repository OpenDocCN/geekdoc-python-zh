    # 5.11.1 Phase Space Portrait


    The behavior of a complex dynamical system (e.g., the process of sedimentation
    in a lake) is determined by many variables, such as the properties of the water
    body and the sediment beneath the lake, the organisms living in the lake and its
    surroundings, precipitation (with high rainfall causing increased weathering and
    erosion in the catchment area), evaporation (with higher evaporation resulting,
    e.g., in higher potassium concentrations in the sediment), and wind speed (which
    can transport more solid particles into the lake). Analyzing the properties of
    such a dynamical system and the time-varying interaction between the system’s
    components requires keeping a record of these state variables over time. Since
    there are usually no ancient records available of a system’s state variables (e.g.,
    precipitation, evaporation, or wind speed), we must instead rely on indirect indicators
    (proxies) that have been preserved in natural archives. A proxy record is obtained
    by sampling a single variable of a multi-dimensional dynamical system, which is
    equivalent to projecting the dynamics of a complex system onto a single axis.
    Considering the example of sediment in a paleolake, the sampled variable could
    be a time series $x(t)$ of potassium concentrations along a lake sediment core
    that represents a natural archive of past states of the lake system.


    One way to unfold the dynamics of a multi-dimensional system from a one-dimensional
    time series $x(t)$ is through time delay *embedding*, which preserves the dynamic
    characteristics of the system (Packard et al. 1980). Such a one-dimensional time
    series–which is based on a single variable–contains information about the system
    and its state variables from which a complete reconstruction of the entire system
    can be made. In other words, since the potassium concentration is a result of
    a complex interplay between unknown environmental variables (e.g., precipitation,
    evaporation, and wind velocity), analyzing the temporal variations in this environmental
    proxy helps us to understand the properties of the paleolake and the time-varying
    interactions between its components. The embedding of the time series $x(t)$ in
    a three-dimensional ($m = 3$) *phase space*, for example, means that three successive
    values $x(t)$, $x(t + \tau)$, and $x(t + 2\tau)$ with a temporal separation $\tau$
    are represented as a point in a three-dimensional coordinate system (i.e., the
    phase space) (Packard et al. 1980). The *phase space portrait* displays the embedded
    time series of observations as a trajectory $\vec{y}(t) = [x(t), x(t + \tau),
    x(t + 2\tau)]^T$ in the phase space. The phase space trajectory represents the
    path over which the'
