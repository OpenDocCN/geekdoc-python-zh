    Since RGB images are represented by integer values between 0 and 255 for each
    color, we convert the 64 bit double-precision values into unsigned 8 bit integers
    using `uint8()` (Sect. 8.2):


    ```

    I = np.uint8(I)

    ```


    The function `uint8()` rounds the values in I to the nearest integer. Any values
    that are outside the range of [0, 255] are rolled around from 0 to 255 (i.e.,
    `np.uint8(-3)` is 253). This behavior is different from that of the corresponding
    MATLAB function `uint8`, which assigns values outside the range of [0, 255] to
    the nearest endpoint (i.e., either 0 or 255). To avoid rolling, we instead use
    `rescale_intensity()` from the `exposure` module of the `scikit-image` package
    (see Chap. 8.4). Typing


    ```

    np.who()

    ```


    yields


    | Name | Shape | Bytes | Type |

    |---|---|---|---|

    | I1 | 100 x 100 | 80000 | float64 |

    | I2 | 100 x 100 | 80000 | float64 |

    | I3 | 100 x 100 | 80000 | float64 |

    | I | 100 x 100 x 3 | 30000 | uint8 |


    Since 8 bits can be used to store 256 different values, this data type can be
    used to store integer values between 0 and 255, whereas using `int8` to create
    signed 8 bit integers generates values between -128 and +127. The value of zero
    requires one bit, and there is therefore no space left in which to store +128.
    Finally, `imshow()` can be used to display the three-dimensional array as a true
    color image:


    ```

    plt.figure()

    plt.imshow(I)

    plt.show()

    ```


    In so doing, the `Matplotlib` function `figure()` creates a new figure, `imshow()`
    initializes the display of the image, `show()` actually displays the current figure,
    and `IPython` returns the prompt indicating readiness to accept further commands.


