    images (in order to derive the present-day stress field of an area) and annual
    layers (e.g., varves) in thin sections (in order to establish an annually resolved
    stratigraphy).


    The *Hough transform*—which was named after Paul VC Hough’s related 1962 patent—is
    a popular technique with which to detect objects within images based on their
    shapes. The Hough transform was originally used to detect linear features, but
    soon after being patented, it became generalized for use in identifying objects
    of any shape (Duda and Hart 1972; Ballard 1981). The book by Gonzalez and Woods
    (2018) contains a comprehensive introduction to the Hough transform and to its
