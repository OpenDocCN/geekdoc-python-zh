- md: "The *stream power index* is another important secondary relief attribute that\
    \ is frequently used in hillslope hydrology, geomorphology, soil science, and\
    \ related disciplines. As a measure of stream power, it provides an indication\
    \ of the potential for sediment transport and erosion by water. The stream power\
    \ index is defined as the product of the catchment area for a specific cell and\
    \ the tangent of the slope of that cell:\n\n$$spi = flowac \\cdot tan(slp)$$\n\
    \nThe potential for erosion is high when large quantities of water (calculated\
    \ via flow accumulation) are fast flowing due to an extreme slope. The following\
    \ series of commands computes and displays the stream power index:\n\n```\nspi\
    \ = flowac*np.tan(np.pi*slp/180)\n\nplt.figure()\nplt.axes(aspect='equal')\nplt.pcolor(np.log(1+spi),\n\
    \    cmap=cm.jet)\nplt.colorbar()\nplt.title('Stream power index')\nplt.show()\n\
    ```\n\nWetness and stream power indices are particularly useful in high-resolution\
    \ terrain analysis, that is, in digital elevation models sampled at intervals\
    \ of less than 30 m. In our terrain analysis example, we calculated weti and spi\
    \ from a medium resolution DEM, and we must expect a degree of scale dependency\
    \ in these attributes.\n\nThis section illustrated the use of basic tools for\
    \ analyzing digital elevation models. A more detailed introduction to digital\
    \ terrain modeling is given in the book by Wilson & Gallant (2000). Furthermore,\
    \ the article by Freeman (1991) provides a comprehensive summary of digital terrain\
    \ analysis, including an introduction to the use of advanced algorithms for flow\
    \ accumulation.\n\n## 7.10 Geostatistics and Kriging (by R. Gebbers)\n\n*Geostatistics*\
    \ describes the autocorrelation of one or more variables in 1D, 2D, or 3D space,\
    \ or even in 4D space–time, in order to make predictions for unobserved locations,\
    \ to obtain information on the accuracy of these predictions, or to reproduce\
    \ spatial variability and uncertainty. The shape, range, and direction of the\
    \ spatial autocorrelation are described by a *variogram*, which is the main tool\
    \ used in linear geostatistics. The origins of geostatistics in its current form\
    \ can be traced back to the early 1950s, when South African mining engineer Daniel\
    \ G. Krige first published an interpolation method based on the spatial dependency\
    \ of samples. In the 1960s and 1970s, French mathematician Georges Matheron developed\
    \ the theory of regionalized variables, which provides the theoretical foundations\
    \ for Krige's more practical methods. This theory forms the basis of several procedures\
    \ for analyzing and estimating spatially dependent variables, which Matheron called\
    \ geostatistics. Matheron also coined the term kriging for spatial interpolation\
    \ via geostatistical methods.\n\n### 7.10.1 Theoretical Background\n\nA basic\
    \ assumption in geostatistics is that a spatiotemporal process is composed of\
    \ both deterministic and stochastic components (Fig. 7.16). The deterministic\
    \ components can be global or local trends (sometimes called drifts). The stochastic\
    \ component comprises both a purely random component and an autocorrelated component.\
    \ The autocorrelated component suggests that on average, closer observations are\
    \ more similar to one another than are more widely separated observations. This\
    \ behavior is described by a variogram in which squared differences between observations\
    \ are plotted against the separation distances of the observations. Krige's fundamental\
    \ idea was to use the variogram for interpolation as a means of determining the\
    \ amount of influence that neighboring observations have when predicting values\
    \ for unobserved locations. Basic linear geostatistics includes two main procedures:\
    \ variography for modeling a variogram, and kriging for interpolation.\n\n###\
    \ 7.10.2 Preceding Analysis\n\nBecause linear geostatistics as presented in this\
    \ book is a parametric method, its underlying assumptions need to be tested by\
    \ a preceding analysis. As with other parametric methods, linear geostatistics\
    \ is sensitive to outliers and to deviations from a normal distribution. We first\
    \ open the data file geost_dat.txt, which contains xyz data triplets, and we then\
    \ plot the sampling locations. This allows us to test the point distribution and\
    \ to detect any major errors in the data coordinates x and y:\n\n```\nimport numpy\
    \ as np\nfrom numpy import linalg\nfrom scipy import stats\nimport matplotlib.pyplot\
    \ as plt\n\ndata = np.loadtxt('geost_dat.txt')\nx = data[:,0]\ny = data[:,1]\n\
    z = data[:,2]\n\nplt.figure()\nplt.plot(data[:,0],data[:,1],\n    marker='o',\n\
    \    markeredgcolor=(0.3,0.5,0.8),\n    markerfacecolor='none',\n    linestyle='none')\n\
    plt.show()\n```\n\nThe range of the observations $z$ can be tested by typing\n\
    \n```\nprint(np.min(z))\nprint(np.max(z))\n```\n\nwhich yields\n\n```\n3.7198573\n\
    7.8459703\n```\n\nFor linear geostatistics, the observations $z$ should be Gaussian\
    \ distributed. This is usually only tested by visually inspecting the histogram\
    \ because statistical tests are often too sensitive if the number of samples exceeds\
    \ about 100. It is also possible to calculate the skewness and kurtosis of the\
    \ data by typing\n\n```\nplt.hist(z)\nprint(stats.skew(z))\nprint(stats.kurtosis(z,fisher=True))\n\
    ```\n\nwhich yields\n\n```\n0.2568129442682396\n-0.4780014841875708\n```\n\nA\
    \ flat-topped or multiple-peaked distribution suggests that there is more than\
    \ one population present in the data set. If these populations can be related\
    \ to particular areas, they should be treated separately. Another reason for the\
    \ existence of multiple peaks can be due to the preferential sampling of areas\
    \ with high and/or low values. This usually happens as a result of some a priori\
    \ knowledge and is referred to as a cluster effect. Dealing with a cluster effect\
    \ is described in Deutsch and Journel (1998) and in Isaaks and Srivastava (1990).\n\
    \nMost problems arise from positive skewness, that is, if the distribution has\
    \ a long tail to the right. According to Webster and Oliver (2007), root transformation\
    \ should be considered if the skewness is between 0.5 and 1, and logarithmic transformation\
    \ should be considered if the skewness exceeds 1. A general transformation formula\
    \ is\n\n> $$z^* = \\begin{cases} ((z+m)^k - 1)/k, & \\text{for } k \\neq 0 \\\\\
    \ \\log(z+m), & \\text{for } k = 0 \\end{cases}$$\n\nfor $\\min(z)+m>0$. This\
    \ is known as the Box–Cox transform, which has the special case $k=0$ when a logarithm\
    \ transformation is used. In the logarithm transformation, $m$ should be added\
    \ if $z$ is zero or negative. Interpolation results of power-transformed values\
    \ can be back-transformed directly after kriging. The back-transformation of log-transformed\
    \ values is slightly more complicated and is explained later. The procedure is\
    \ known as *log-normal kriging* and can be important because log-normal distributions\
    \ are not uncommon in geology. Other transformations in geostatistics are discussed\
    \ in Deutsch and Journel (1998) and in Remy et al. (2006). The transformation\
    \ of compositional data is discussed in Sect. 9.7.\n\n### 7.10.3 Variography with\
    \ the Classic Variogram\n\nA variogram describes the spatial dependency of referenced\
    \ observations in a unidimensional or multidimensional space. Since the true variogram\
    \ of the spatial process is usually unknown, it must be estimated from observations.\
    \ This procedure is called variography and begins with calculating the *experimental\
    \ variogram* from the raw data. In the next step, the experimental variogram is\
    \ summarized by the *variogram estimator*. The variography then concludes by fitting\
    \ a variogram model to the variogram estimator. The experimental variogram is\
    \ calculated as the differences between pairs of observed values and is dependent\
    \ on the *separation vector* $h$ (Fig. 7.17). The classic experimental variogram\
    \ is defined by the *semivariance*\n\n$$\\gamma(h) = 0.5 \\cdot (z_x - z_{x+h})^2$$\n\
    \nwhere $z_x$ is the observed value at location $x$ and $z_{x+h}$ is the observed\
    \ value at another point at a distance $h$ from $x$. The length of the separation\
    \ vector $h$ is called the *lag distance* (or simply the *lag*). The correct term\
    \ for $\\gamma(h)$ is the *semivariogram* (or *semivariance*), where *semi* refers\
    \ to the fact that $\\gamma(h)$ is half the variance of the differences between\
    \ $z_x$ and $z_{x+h}$. Nevertheless, $\\gamma(h)$ is the variance per point, with\
    \ points being considered in pairs (Webster and Oliver 2007). However, by convention,\
    \ $\\gamma(h)$ is termed a *variogram* instead of a semivariogram, which is a\
    \ convention that we follow for the rest of this section. To calculate the experimental\
    \ variogram, we first need to group pairs of observations. This is achieved by\
    \ typing\n\n```\nX1,X2 = np.meshgrid(x,x)\n```"
  mdcn: "*流能指数*是另一个重要的次级地形属性，常用于山坡水文学、地貌学、土壤科学及相关学科。作为水流能量的度量，它指示了水流搬运沉积物和侵蚀的潜力。流能指数定义为特定栅格的汇水面积与该栅格坡度正切值的乘积：\n\
    \n$$spi = flowac \\cdot tan(slp)$$\n\n当大量水流（通过汇流累积计算）因陡坡而快速流动时，侵蚀潜力较高。以下命令序列用于计算并显示流能指数：\n\
    \n```\nspi = flowac*np.tan(np.pi*slp/180)\n\nplt.figure()\nplt.axes(aspect='equal')\n\
    plt.pcolor(np.log(1+spi),\n    cmap=cm.jet)\nplt.colorbar()\nplt.title('Stream\
    \ power index')\nplt.show()\n```\n\n湿度指数和流能指数在高分辨率地形分析中特别有用，即在采样间隔小于30米的数字高程模型中。在我们的地形分析示例中，我们从中等分辨率DEM计算了湿度指数和流能指数，因此必须考虑这些属性存在一定程度的尺度依赖性。\n\
    \n本节说明了用于分析数字高程模型的基本工具的使用。关于数字地形建模的更详细介绍，请参阅Wilson和Gallant（2000）的著作。此外，Freeman（1991）的文章对数字地形分析进行了全面总结，包括介绍用于汇流累积的高级算法。\n\
    \n## 7.10 地统计学与克里金法（作者：R. Gebbers）\n\n*地统计学*描述了一个或多个变量在1D、2D或3D空间，甚至在4D时空中的自相关性，以便对未观测位置进行预测、获取这些预测的精度信息，或重现空间变异性与不确定性。空间自相关的形状、范围和方向由*变异函数*描述，这是线性地统计学中使用的主要工具。地统计学以其当前形式的起源可以追溯到20世纪50年代初，当时南非矿业工程师Daniel\
    \ G. Krige首次发表了一种基于样本空间依赖性的插值方法。在20世纪60年代和70年代，法国数学家Georges Matheron发展了区域化变量理论，为Krige更实用的方法提供了理论基础。该理论构成了分析和估计空间依赖变量的若干程序的基础，Matheron将其称为地统计学。Matheron还创造了“克里金法”一词，指通过地统计方法进行空间插值。\n\
    \n### 7.10.1 理论背景\n\n地统计学的一个基本假设是，时空过程由确定性成分和随机性成分组成（图7.16）。确定性成分可以是全局或局部趋势（有时称为漂移）。随机性成分包括纯随机成分和自相关成分。自相关成分表明，平均而言，距离较近的观测值彼此更相似，而距离较远的观测值则差异更大。这种行为由变异函数描述，其中观测值之间的平方差与观测值之间的分离距离作图。Krige的基本思想是利用变异函数进行插值，以此确定相邻观测值在预测未观测位置值时的影响程度。基本线性地统计学包括两个主要程序：用于建模变异函数的变异函数分析，以及用于插值的克里金法。\n\
    \n### 7.10.2 前置分析\n\n由于本书中介绍的线性地统计学是一种参数方法，因此需要通过前置分析来检验其基本假设。与其他参数方法一样，线性地统计学对异常值和偏离正态分布的情况敏感。我们首先打开数据文件geost_dat.txt，其中包含xyz数据三元组，然后绘制采样位置图。这使我们能够检验点分布并检测数据坐标x和y中的任何重大错误：\n\
    \n```\nimport numpy as np\nfrom numpy import linalg\nfrom scipy import stats\n\
    import matplotlib.pyplot as plt\n\ndata = np.loadtxt('geost_dat.txt')\nx = data[:,0]\n\
    y = data[:,1]\nz = data[:,2]\n\nplt.figure()\nplt.plot(data[:,0],data[:,1],\n\
    \    marker='o',\n    markeredgcolor=(0.3,0.5,0.8),\n    markerfacecolor='none',\n\
    \    linestyle='none')\nplt.show()\n```\n\n可以通过输入以下命令来检验观测值$z$的范围：\n\n```\nprint(np.min(z))\n\
    print(np.max(z))\n```\n\n输出结果为：\n\n```\n3.7198573\n7.8459703\n```\n\n对于线性地统计学，观测值$z$应服从高斯分布。通常仅通过目视检查直方图来检验，因为当样本数量超过约100时，统计检验往往过于敏感。也可以通过输入以下命令计算数据的偏度和峰度：\n\
    \n```\nplt.hist(z)\nprint(stats.skew(z))\nprint(stats.kurtosis(z,fisher=True))\n\
    ```\n\n输出结果为：\n\n```\n0.2568129442682396\n-0.4780014841875708\n```\n\n平顶或多峰分布表明数据集中存在多个总体。如果这些总体与特定区域相关，则应分别处理。多峰存在的另一个原因可能是对高值和/或低值区域的优先采样。这通常是由于某些先验知识造成的，称为聚类效应。处理聚类效应的方法在Deutsch和Journel（1998）以及Isaaks和Srivastava（1990）中有描述。\n\
    \n大多数问题源于正偏态，即分布具有向右的长尾。根据Webster和Oliver（2007），如果偏度在0.5到1之间，应考虑平方根变换；如果偏度超过1，应考虑对数变换。通用变换公式为：\n\
    \n> $$z^* = \\begin{cases} ((z+m)^k - 1)/k, & \\text{for } k \\neq 0 \\\\ \\log(z+m),\
    \ & \\text{for } k = 0 \\end{cases}$$\n\n其中$\\min(z)+m>0$。这被称为Box–Cox变换，其特例是当$k=0$时使用对数变换。在对数变换中，如果$z$为零或负数，则应加上$m$。幂变换值的插值结果可以在克里金法后直接进行反变换。对数变换值的反变换稍微复杂一些，将在后面解释。该过程称为*对数正态克里金法*，可能很重要，因为对数正态分布在地质学中并不少见。地统计学中的其他变换在Deutsch和Journel（1998）以及Remy等人（2006）中有讨论。成分数据的变换在第9.7节讨论。\n\
    \n### 7.10.3 使用经典变异函数进行变异函数分析\n\n变异函数描述了在单维或多维空间中参考观测值的空间依赖性。由于空间过程的真实变异函数通常未知，必须从观测值中估计。此过程称为变异函数分析，首先从原始数据计算*实验变异函数*。下一步，通过*变异函数估计量*对实验变异函数进行概括。然后，通过将变异函数模型拟合到变异函数估计量来完成变异函数分析。实验变异函数计算为观测值对之间的差异，并依赖于*分离向量*$h$（图7.17）。经典实验变异函数由*半方差*定义：\n\
    \n$$\\gamma(h) = 0.5 \\cdot (z_x - z_{x+h})^2$$\n\n其中$z_x$是位置$x$处的观测值，$z_{x+h}$是距离$x$为$h$的另一点处的观测值。分离向量$h$的长度称为*滞后距离*（或简称*滞后*）。$\\\
    gamma(h)$的正确术语是*半变异函数*（或*半方差*），其中*半*指的是$\\gamma(h)$是$z_x$和$z_{x+h}$之间差异方差的一半。尽管如此，$\\\
    gamma(h)$是每点的方差，点被视为成对考虑（Webster和Oliver 2007）。然而，按照惯例，$\\gamma(h)$被称为*变异函数*而不是半变异函数，我们在本节的其余部分遵循这一惯例。为了计算实验变异函数，我们首先需要对观测值对进行分组。这可以通过输入以下命令实现：\n\
    \n```\nX1,X2 = np.meshgrid(x,x)\n```"
