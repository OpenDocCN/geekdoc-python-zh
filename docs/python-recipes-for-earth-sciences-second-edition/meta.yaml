    # 9.2 Principal Component Analysis


    *Principal component analysis* (PCA) detects linear dependencies between *p* variables
    and replaces groups of linearly correlated variables with *p* uncorrelated variables,
    which are referred to as the *principal components* (PCs) (Fig. 9.1). PCA–which
    was first introduced by Karl Pearson (1901) and was further developed by Harold
    Hotelling (1931)–is the standard method used in the linear


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_421_0.png)'
  - '[PAGE 422]


    unmixing (or separating) of mixed variables. PCA is equivalent to fitting a $p$-dimensional
    ellipsoid to a data set of $p$ variables, where the $p$ eigenvectors of the $p$-by-$p$
    covariance matrix in the data set are the axes of the ellipsoid. PCA is therefore
    one of the eigenvector methods. The $p$ eigenvalues represent the distribution
    of the variance between each of the eigenvectors.


    The performance of PCA is best illustrated with a bivariate data set of the two
    variables $x_1$ and $x_2$ that exhibit a strong linear correlation by fitting
    a two-dimensional ellipse to the data with two eigenvectors $PC_1$ and $PC_2$
    from the 2-by-2 covariance matrix of the data set (Fig. 9.1). Since the first
    principal component $PC_1$ passes through the long axis of the data scatter and
    the new origin is the bivariate mean, $PC_1$ can be used to describe most of the
    variance, while $PC_2$ contributes only a small amount of additional information.
    Prior to this transformation, two axes $x_1$ and $x_2$ had been required to describe
    the data set, but it is now possible to reduce the dimensions of the data by dropping
    the second axis $PC_2$ without losing very much information, as shown in Fig.
    9.1.


    Since this method produces signals $PC_1$ and $PC_2$, which are linearly uncorrelated,
    the method is also called *whitening* because this property is characteristic
    of white noise. An important prerequisite for successfully applying this method
    is that the data be Gaussian distributed. Although the separated signals are uncorrelated,
    they can still be interdependent (i.e., they can retain a nonlinear correlation).
    This phenomenon arises, for example, if the data are not Gaussian distributed
    and PCA consequently does not yield useful results. Independent component analysis
    (ICA) was developed for this type of task as it separates the $p$ independent
    variables (which are then nonlinearly uncorrelated) from the $p$ dependent variables
    (Sect. 9.3).


    This process can now be expanded to an arbitrary number of variables and samples.
    Let us assume a data set that consists of measurements of $p$ variables from $n$
    samples stored in an $n$-by-$p$ array $X$:


    ```

    $$X = \begin{pmatrix} x_{11} & x_{12} & \dots & x_{1p} \ x_{21} & x_{22} & \dots
    & x_{2p} \ \vdots & \vdots & & \vdots \ x_{n1} & x_{n2} & \dots & x_{np} \end{pmatrix}$$

    ```


    The columns of the array $X$ represent the $p$ variables, and the rows represent
    the $n$ samples. After rotating the axis and moving the origin, the new coordinates
    $Y_j$ can be computed by


    ```

    $$Y_1 = a_{11}X_1 + a_{12}X_2 + \dots + a_{1p}X_p$$

    $$Y_2 = a_{21}X_1 + a_{22}X_2 + \dots + a_{2p}X_p$$

    $$\vdots$$

    $$Y_p = a_{p1}X_1 + a_{p2}X_2 + \dots + a_{pp}X_p$$

    ```'
  - '[PAGE 423]


    The first principal component $PC_1$ (which is denoted by $Y_1$) contains the
    highest variance, while $PC_2$ contains the second-highest variance, and so forth.
    All the $PCs$ together contain the full variance of the data set. However, this
    variance is largely concentrated in the first few $PCs$, which include most of
    the information content of the data set. The last $PCs$ are therefore generally
    ignored in order to reduce the dimensions of the data. The factors $a_{ij}$ in
    the equations above are the *principal component loadings*, and their values represent
    the relative contributions of the original variables to the new $PCs$. If the
    loading $a_{ij}$ of a variable $X_j$ in $PC_1$ is close to zero, then the influence
    of this variable is low, whereas a high positive or negative $a_{ij}$ suggests
    a strong influence. The new values $Y_j$ of the variables computed from the linear
    combinations of the original variables $X_j$ (weighted by the loadings) are called
    the *principal component scores*.


    PCA is commonly used to unmix (or separate) variables $X$, which are a linear
    combination of independent source variables $S$,


    $$X = A^T \cdot S$$


    where $A$ is the mixing matrix. PCA aims to determine (albeit not quantitatively)
    both the source variables $S$ (represented by the principal component scores $Y_j$)
    and the mixing matrix $A$ (represented by the principal component loadings $a_{ij}$).
    Unmixing such variables works best if the probability distribution of the original
    variables $X$ is a Gaussian distribution, and only in such cases are the principal
    components completely linearly decorrelated. However, data in the earth sciences
    are often not Gaussian distributed, and alternative methods–such as independent
    component analysis (ICA)–should therefore be used instead (Sect. 9.3). For example,
    radiance and reflectance values from hyperspectral data are often not Gaussian
    distributed, and ICA rather than PCA is therefore widely used in remote sensing
    applications to decorrelate spectral bands. Examples in which PCA is used include
    assessing sediment provenance (as described in the example below), unmixing peridotite
    mantle sources of basalts, and multispectrally classifying satellite images.


    The first example illustrates PCA without using `PCA()` and instead using `cov()`
    to calculate the $p$-by-$p$ covariance matrix of a $p=2$ dimensional data set
    and then using `eig()` to calculate the $p$ eigenvectors and $p$ eigenvalues of
    this matrix. We next assume a data set that consists of measurements of $p$ variables
    from $n$ samples that are stored in an $n$-by-$p$ array called `data`. As an example,
    we can create a bivariate data set of 2-by-30 data points and with a strong linear
    correlation that is overlaid with normally distributed noise:


