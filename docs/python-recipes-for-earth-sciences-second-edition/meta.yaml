    plt.axes(aspect='equal')\nplt.pcolor(asp,\n    cmap=cm.jet)\nplt.colorbar()\n\
    plt.title('Aspect')\nplt.show()\n```\n\nThis plot displays the aspect in degrees\
    \ clockwise from north. For instance, mountain slopes facing north are displayed\
    \ in red, and east-facing slopes are displayed in green.\n\nThe aspect changes\
    \ abruptly along the ridges of the mountain ranges, where neighboring drainage\
