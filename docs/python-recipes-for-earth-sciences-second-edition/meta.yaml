    \n```python\nb3 = np.array([1,1,1,1,1])/5\nm3 = len(b3)\n```\n\nThe input signal\
    \ can be convolved using `convolve()`:\n\n```python\ny3 = np.convolve(x3, b3,\
    \ 'same')\n```\n\nWe next follow a similar procedure with `lfilter()` and compare\
    \ the result with that obtained using `convolve()`. In contrast to `convolve()`\
    \ without using same, `lfilter()` yields an output signal with the same length\
    \ as the input signal. Unfortunately, `lfilter()` assumes that the filter is causal.\
    \ This is of great importance in electrical engineering, where filters are often\
    \ applied in real time. In the earth sciences, however, the entire signal is available\
    \ in most applications at the time of processing the data. The data series is\
    \ filtered by\n\n```python\ny4 = signal.lfilter(b3, 1, x3)\n```\n\nand the phase\
    \ correction is then carried out using\n\n```python\ny4[0:len(y4)-m3+1] = y4[np.arange(int((m3-1)/2),\n\
    \    len(y4)-int((m3-1)/2))]\ny4[len(y4)-m3+1:len(y4)] = np.zeros((1,m3-1))\n\
    ```\n\nwhich works only for an odd number of filter weights. This command simply\
