    # Univariate Statistics


    # 3


    # 3.1 Introduction


    The statistical properties of a single variable are investigated by means of univariate
    analysis. Such a variable could, for example, be the organic carbon content of
    deep sea sediments, the size of grains in a sandstone layer, or the age of sanidine
    crystals in volcanic ash. The size of *samples* that we collect from a larger
    *population* is often limited by financial and logistical constraints. The methods
    of univariate statistics assist us in drawing from the sample conclusions that
    apply to the population as a whole. For univariate analysis, we use the *NumPy*
    (https://numpy.org), *Matplotlib* (https://matplotlib.org), *SciPy* (https://scipy.org),
    and *scikit-learn* packages (https://scikit-learn.org), which contain all the
    necessary routines.


    We first describe the characteristics of the sample using statistical measures
    and compute an *empirical distribution* (*descriptive statistics*) in Sects. 3.2
    and 3.3. A brief introduction is provided on the most important statistical measures
    (e.g., the *measures of central tendency and dispersion*), followed by Python
    examples. We then select a *theoretical distribution* that shows similar characteristics
    to the empirical distribution in Sects. 3.4 and 3.5. A suite of theoretical distributions
    is introduced and their potential applications are outlined prior to using Python
    tools to explore these distributions. We then examine whether the theoretical
    distribution is a suitable model for the empirical distribution (*hypothesis testing*)
    before drawing conclusions from the sample that can be applied to the larger population
    of interest in Sects. 3.6 to 3.12. Sect. 3.13 introduces methods used to fit distributions
    to our own data sets. Finally, Sect. 3.14 provides a very brief introduction to
    the basics of error analysis.


    **Supplementary Information** The online version contains supplementary material
    available at https://doi.org/10.1007/978-3-031-56906-7_3.


    © The Author(s), under exclusive license to Springer Nature Switzerland AG 2024

    M. H. Trauth, *Python Recipes for Earth Sciences*, Springer Textbooks in Earth
    Sciences, Geography and Environment, https://doi.org/10.1007/978-3-031-56906-7_3'
