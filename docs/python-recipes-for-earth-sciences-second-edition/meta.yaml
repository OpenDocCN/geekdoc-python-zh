    使用本书时，重要的是要记住它基于一本使用MATLAB进行地球科学数据分析的书。我们已尽力尽可能贴近MATELAB原书的教学理念和文本，即使这对某些Python用户来说可能显得不寻常或笨拙。另一方面，对于许多因各种原因从MATLAB转向Python的用户来说，这种教学理念将是熟悉的。这些用户和我一样，熟悉MATLAB，并首先在Python中寻找类似的解决方案，而不是从头开始编写Python代码。这种情况非常常见，并反映在许多Python包中，例如NumPy和Matplotlib，它们与MATLAB工具箱高度相似，甚至函数名称和输入参数都相同。


    将两本书并排阅读的读者会注意到，我直接翻译了代码，以使数值和图形输出尽可能相似。然而，由于MATLAB和Python使用不同的随机数生成器，结果并不总是彼此匹配。在这些情况下，生成合成数据后，Python示例中使用了MATLAB生成的样本文件以重现结果。在MATLAB产生零结果而Python产生略微不同于零的结果（例如-3.0552e-17）的情况下，也可能存在一些差异。这些差异可能是由于许多Python包中浮点误差缓解措施不够严格造成的。


    细心的读者还会注意到，在某些情况下，Python生成的图形与本书前半部分的插图之间存在细微差异。这也是由于此处使用的随机数生成器提供不同的结果，并且并非所有使用的随机数生成器都可以重置。因此，某些结果（例如，自助法结果）在不同运行之间会有所不同。然而，这些图形至少在定性上反映了统计、时间序列分析和信号处理的结果。对于本书的后半部分，图形是重新创建的，以反映Matplotlib和PyGMT等图形包输出的特性，这无疑带来了一些非常好的结果。


    我基于MATLAB脚本编写了Python脚本，尽我所知，并得到了以下提到的同事的支持。但是，我无法提供任何保证，特别是在使用Python和Python包等本身不提供保证的软件时。例如，我发现Python和MATLAB的结果之间存在一些差异，我将其归因于某些Python包的轻微浮点问题，例如在计算中使用非常小的值而不是（正确地）零。我在文本中已标记了这些差异。我建议读者在将代码应用于真实示例之前，始终使用合成示例进行测试（无论是使用Python还是MATLAB），因为用户在使用浮点数时也可能犯自己的错误。


