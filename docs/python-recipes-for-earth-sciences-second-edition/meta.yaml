    plt.show()\n\nplt.figure()\nplt.plot(x, y2, '-')\nplt.show()\n```\n\n我们还可以使用以下命令将\
    \ `x` 的正弦值显示为折线图，将 `x` 的余弦值显示为条形图：\n\n```python\nplt.figure()\nplt.plot(x, y1,\
    \ 'r--')\nplt.bar(x, y2, color='b')\nplt.show()\n```\n\n此命令使用 `'r--'` 将 `y1` 相对于\
    \ `x` 绘制为红色虚线，而 `y2` 相对于 `x` 显示为一组蓝色垂直条。或者，我们可以使用 `subplot()` 在同一个图形窗口中但在不同的绘图中绘制两个图形。语法\
    \ `subplot(m, n, p)` 将图形窗口划分为 `m` 行 `n` 列的网格，并在 `p` 指定的位置创建坐标轴。这里，第一个子图（`p=1`）位于网格的第一列和第一行，第二个子图（`p=2`）位于第一行的第二列，依此类推：\n\
    \n```python\nplt.figure()\nplt.subplot(2, 1, 1)\nplt.plot(x, y1, 'r--')\nplt.subplot(2,\
    \ 1, 2)\nplt.bar(x, y2, color='b')\nplt.show()\n```\n\n在我们的示例中，图形窗口被划分为两行一列。二维线性图显示在图形窗口的上半部分，条形图出现在下半部分。或者，我们也可以使用\
    \ `subplots()` 而不是 `subplot()` 来创建图形窗口 `fig` 以及两个坐标轴 `ax1` 和 `ax2`。如果我们使用 `subplots()`，则不需要\
    \ `figure()` 和 `show()`：\n\n```python\nfig, (ax1, ax2) = plt.subplots(2, 1)\n\
    ax1.plot(x, y1, 'r--')\nax2.bar(x, y2, color='b')\n```\n\n对图形的一个重要修改是通过缩放坐标轴来实现的。默认情况下，Python\
    \ 使用接近数据最小值和最大值的坐标轴限制。然而，使用 `axis()` 命令允许使用包含值 `[xmin, xmax, ymin, ymax]` 的数组来更改比例设置，例如\n\
    \n```python\nplt.figure()\nplt.plot(x, y1, 'r--')\nplt.axis(np.array([0, np.pi,\
    \ -1, 1]))\nplt.show()\n```\n\n函数 `axis()` 接受 `xmin`、`xmax`、`ymin` 和 `ymax` 的值，可以是使用\
    \ `array()` 的 `ndarray` 数据类型，也可以是使用以下方式的列表：\n\n```python\nplt.figure()\nplt.plot(x,\
    \ y1, 'r--')\nplt.axis([0, np.pi, -1, 1])\nplt.show()\n```\n\n或者使用以下方式的元组（第 2.5\
    \ 节）：\n\n```python\nplt.figure()\nplt.plot(x, y1, 'r--')\nplt.axis((0, np.pi,\
    \ -1, 1))\nplt.show()\n```\n\n这是多种解决方案中可能的一个例子，我们在本书中使用不同的解决方案。无论如何，代码将 x 轴的限制设置为\
    \ 0 和 π，而 y 轴的限制设置为默认值 -1 和 +1。`axis()` 的重要选项包括\n\n```python\nplt.figure()\nplt.plot(x,\
    \ y1, 'r--')\nplt.axis('square')\nplt.show()\n```\n\n这使得 x 轴和 y 轴长度相同，以及\n\n```python\n\
    plt.figure()\nplt.plot(x, y1, 'r--')\nplt.axis('equal')\nplt.show()\n```\n\n这使得\
    \ x 轴和 y 轴上的各个刻度增量长度相同。函数 `grid()` 向当前绘图添加网格，而 `title()`、`xlabel()` 和 `ylabel()`\
    \ 允许定义标题并将标签应用于 x 轴和 y 轴：\n\n```python\nplt.figure()\nplt.plot(x, y1, 'r--')\n\
    plt.title('My first plot')\nplt.xlabel('x-axis')\nplt.ylabel('y-axis')\nplt.grid()\n\
    plt.show()\n```\n\n使用 *Matplotlib* 包进行绘图的最复杂方式（类似于 MATLAB 的面向对象语法）是通过输入\n\n```python\n\
    fig = plt.figure(\n    facecolor=(0.9, 0.9, 0.9))\nax = plt.axes(\n    title='My\
    \ first plot',\n    xlabel='x-axis',\n    ylabel='y-axis')\nax.plot(x, y1,\n \
    \   markersize=15,\n    marker='s',\n    linewidth=2)\nax.grid()\nplt.show()\n\
    ```\n\n这再次使用了 `figure()`、`plot()` 和 `show()` 等函数来创建和显示图形。然而，其中一些函数，如 `plot()`，设置了许多图形属性，如\
    \ `markersize`、`marker` 和 `linewidth`，以自定义绘图。此外，这些函数还可以创建对象，如 `fig` 和 `ax`，这些对象稍后可以被其他函数调用以进行进一步修改，例如在我们的示例中的图形窗口和坐标轴。这些是\
    \ *Matplotlib* 包中包含的 Python 函数如何用于创建和编辑绘图的一些示例。更多图形函数将在本书的后续章节中介绍。\n\n## 参考文献\n\
