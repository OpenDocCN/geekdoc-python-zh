  md: "This command saves the RGB composite as the TIFF file *chewbahirbasin.tif*\
    \ (about 18 MB) in the working directory, which can then be processed using other\
    \ software, such as Adobe Photoshop.\n\nAccording to the USGS Landsat website,\
    \ Landsat data are among the most geometrically and radiometrically corrected\
    \ data available. Data anomalies do occasionally occur, however, and the most\
    \ common types are listed on the USGS website:\n\nhttps://www.usgs.gov/land-resources/nli/landsat/landsat-known-issues\n\
    \nWe explore one of these types of anomalies as an example: namely artifacts known\
    \ as *Single Event Upsets* (SEUs), which cause anomalously high values in the\
    \ image and are similar to *Impulse Noise* (IN), which is also described on the\
    \ same website. These anomalies occur in some—but not all—Landsat images, and\
    \ similarly anomalous high or low values can also occur in other satellite images.\
    \ We therefore use part of a Landsat 7 image that covers an area in the southern\
    \ Ethiopian rift and that was acquired by the satellite's Enhanced Thematic Mapper\
    \ (ETM+) instrument. We can load and display the image using\n\n```\nI1 = io.imread('ethiopianrift_blue.tif')\n\
    I1 = exposure.rescale_intensity(I1)\n\nplt.figure()\nio.imshow(I1, cmap='gray')\n\
    plt.title('Original image')\nplt.axis('off')\nio.show()\n```\n\nImage I1 shows\
    \ numerous randomly distributed anomalously high or low values as well as a parallel\
    \ track of paired anomalies in the right half. We first apply a 10-by-10 pixel\
    \ median filter to the image (see Sect. 8.8):\n\n```\nI2 = filters.median(I1,\n\
    \    np.ones((9,9)), mode='reflect')\n\nplt.figure()\nio.imshow(I2, cmap='gray')\n\
    plt.title('Median filtered image')\nplt.axis('off')\nio.show()\n```\n\nThe median-filtered\
    \ version of image I2 is, of course, very smooth compared with the original image\
    \ I1; however, we would lose a lot of detail if we used this version of the image.\
    \ We next subtract the median-filtered image I2 from the original image I1, which\
    \ yields image I3:"
