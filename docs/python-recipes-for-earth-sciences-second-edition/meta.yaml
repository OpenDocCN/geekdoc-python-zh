    When the number of trials is $n \to \infty$ and the success probability is $p
    \to 0$, the binomial distribution approaches a *Poisson distribution* with a single
    parameter $\lambda = n \cdot p$ (Fig. 3.6) (Poisson 1837). This works well for
    $n > 100$ and $p < 0.05$ (or 5%). We therefore use the Poisson distribution for
    processes characterized by extremely low occurrence, such as earthquakes, volcanic
    eruptions, storms, and floods. The probability density function is


    $$f(x) = \frac{e^{-\lambda} \lambda^x}{x!}$$


    and the cumulative distribution function is


    $$F(x) = \sum_{i=0}^{x} \frac{e^{-\lambda} \lambda^i}{i!}$$


    The single parameter $\lambda$ describes both the mean and the variance of this
    distribution.


    ## 3.4.4 Normal or Gaussian Distribution


    When $p = 0.5$ (symmetric, no skew) and $n \to \infty$, the binomial distribution
    approaches a normal or Gaussian distribution defined by the mean $\mu$ and the
    standard deviation $\sigma$ (Fig. 3.7). The probability density function of a
    normal distribution is


    $$f(x) = \frac{1}{\sigma \sqrt{2\pi}} \exp\left(-\frac{1}{2}\left(\frac{x - \mu}{\sigma}\right)^2\right)$$


    and the cumulative distribution function is


    $$F(x) = \frac{1}{\sigma \sqrt{2\pi}} \int_{-\infty}^{x} \exp\left(-\frac{1}{2}\left(\frac{x
    - \mu}{\sigma}\right)^2\right) dy$$


    The normal distribution is therefore used when the mean is both the most frequent
    and the most likely value. The probability of deviations is equal in either direction
    and decreases with increasing distance from the mean.


    The standard normal distribution is a special member of the normal distribution
    family that has a mean of zero and a standard deviation of one. We can transform
    the equation for a normal distribution by substituting $z = (x - \mu)/\sigma$.
    The probability density function of this distribution is


    $$f(x) = \frac{1}{\sqrt{2\pi}} \exp\left(-\frac{z^2}{2}\right)$$


    This definition of the normal distribution is often called the z-distribution.


    ## 3.4.5 Logarithmic Normal (or Log-Normal) Distribution


    Logarithmic normal (or log-normal) distribution is used when the data have a lower
    limit, such as with mean annual precipitation or the frequency of earthquakes
    (Fig. 3.8). In such cases, distributions are usually characterized by major skewness,
    which is best described by a logarithmic normal distribution. The probability
    density function of this distribution is


    $$f(x) = \frac{1}{\sigma \sqrt{2\pi} x} \exp\left(-\frac{1}{2}\left(\frac{\ln
    x - \mu}{\sigma}\right)^2\right)$$


    and the cumulative distribution function is


    $$F(x) = \frac{1}{\sigma \sqrt{2\pi}} \int_{-\infty}^{x} \frac{1}{y} \exp\left(-\frac{1}{2}\left(\frac{\ln
    y - \mu}{\sigma}\right)^2\right) dy$$


    where $x>0$. The distribution can be described by two parameters: the mean $\mu$
    and the standard deviation $\sigma$. However, the formulas for the mean and the
    standard deviation are different from those used for normal distributions. In
    practice, the values of $x$ are logarithmized, the mean and the standard deviation
    are computed using the formulas for a normal distribution, and the empirical distribution
    is then compared with a normal distribution.


    ## 3.4.6 Student''s t-Distribution


    Student''s t-distribution was first introduced by William S. Gosset (1876 to 1937),
    who needed a distribution for small samples (Fig. 3.9). Gosset was an employee
    of the Irish Guinness Brewery and wished to publish his research results anonymously.
    He thus published his t-distribution under the pseudonym Student (Student 1908).
    The probability density function is


    $$f(x) = \frac{\Gamma\left(\frac{\Phi+1}{2}\right)}{\Gamma\left(\frac{\Phi}{2}\right)}
    \frac{1}{\sqrt{\Phi\pi}} \frac{1}{\left(1+\frac{x^2}{\Phi}\right)^{\frac{\Phi+1}{2}}}$$


    where $\Gamma$ is the Gamma function,


    $$\Gamma(x) = \lim_{n \to \infty} \frac{n! n^{x-1}}{x(x+1)(x+2)\dots(x+n-1)}$$


    which can be written as


    $$\Gamma(x) = \int_{0}^{\infty} e^{-y} y^{x-1} dy$$


    if $x>0$. The single parameter $\phi$ of the t-distribution is the number of degrees
    of freedom. In the analysis of univariate data, this distribution has $n-1$ degrees
    of freedom, where $n$ is the sample size. As $\phi \to \infty$, the t-distribution
    converges toward the standard normal distribution. Since the t-distribution approaches
    the normal distribution for $\phi>30$, it is rarely used for distribution fitting.
    However, the t-distribution is used for hypothesis testing using the t-test (Sect.
    3.7).


    ## 3.4.7 Fisher''s F-Distribution


    The F-distribution was named after statistician Sir Ronald Fisher (1890 to 1962).
    It is used for hypothesis testing via the F-test (Sect. 3.8). The F-distribution
    has a relatively complex probability density function (Fig. 3.10),


    $$f(x) = \frac{\Gamma\left(\frac{\Phi_1+\Phi_2}{2}\right)\left(\frac{\Phi_1}{\Phi_2}\right)^{\frac{\Phi_1}{2}}}{\Gamma(\Phi_1/2)\Gamma(\Phi_2/2)}
    x^{\frac{\Phi_1-2}{2}} \left(1 + \frac{\Phi_1}{\Phi_2}x\right)^{-\frac{\Phi_1+\Phi_2}{2}}$$


    where $x>0$ and $\Gamma$ is again the Gamma function. The two parameters $\Phi_1$
    and $\Phi_2$ are the numbers of degrees of freedom.


    ## 3.4.8 $\chi^2$- (or Chi-Squared-) Distribution


    The $\chi^2$-distribution was introduced by Friedrich Helmert (1876) and Karl
    Pearson (1900). This distribution has important applications in statistical hypothesis
    testing (Sect. 3.9). The probability density function of the $\chi^2$-distribution
    is


    $$f(x) = \frac{1}{2^{\Phi/2}\Gamma(\Phi/2)} x^{\frac{\Phi-2}{2}} e^{-\frac{x}{2}}$$


    where $x>0$; otherwise, $f(x)=0$. Once again, $\Gamma$ is the Gamma function,
    and $\Phi$ is the number of degrees of freedom (Fig. 3.11).


    ## 3.5 Examples of Theoretical Distributions


    We use `norm.pdf()` and `norm.cdf()` to compute the probability density function
    and the cumulative distribution function of a Gaussian distribution with mu=12.3448
    and sigma=1.1660 evaluated for the values in x in order to compare the results
    with those of our sample data set:


    ```python

    import numpy as np

    import matplotlib.pyplot as plt

    from scipy import stats


    mu = 12.3448

    sigma = 1.166


    x = np.arange(5,20+0.001,0.001)

    pdf = stats.norm.pdf(x,mu,sigma)

    cdf = stats.norm.cdf(x,mu,sigma)


    plt.figure()

    plt.plot(x,pdf,x,cdf)

    plt.show()

    ```


    We can use these functions to familiarize ourselves with the properties of distributions.
    This will be important when testing hypotheses in the following sections. The
    test statistics used in these sections follow the theoretical frequency distributions
    introduced in the previous sections of this chapter. In particular, the integral
    (or, in the discrete case, the sum) of the theoretical distribution within a certain
    range $a \leq x \leq b$ is of great importance as it helps in calculating the
    probability that a measurement falls within this range.


