  - "[PAGE 462]\n\nwhich is available from the author, and updated versions are now\
    \ available for download at CoDAWeb:\n\n```\nhttp://www.compositionaldata.com\n\
    ```\n\nAitchison’s log-ratio transformation overcomes the closed sum problem of\
    \ closed data (i.e., data that are expressed as proportions and added to a fixed\
    \ total, such as 100%). The closed sum problem causes spurious negative correlations\
    \ between pairs of variables in multivariate data sets, which are avoided by logarithmizing\
    \ ratios of these variables. As an example, multiproxy data in paleoclimate studies\
    \ are often closed data (i.e., they are very much influenced by dilution effects).\
    \ In the simplest example, this could be a mixture of three components that together\
    \ make up 100% of a sediment. Let us imagine that one of the components is now\
    \ constant (i.e., the same amount of this component is always delivered per unit\
    \ time). Since the total of all three components is always 100%, the other two\
    \ components are necessarily anticorrelated: If one goes up, the other two must\
    \ go down by the same total amount.\n\nUsing ratios helps in overcoming the problem\
    \ that the magnitudes of compositional data are actually ratios whose denominators\
    \ are the sums of the concentrations of all constituents (see Davis 2003 for a\
    \ short summary of Aitchison’s log-ratio transformation). However, the product–moment\
    \ covariances of ratios are awkward to manipulate and result in complicated products\
    \ and quotients. John Aitchison therefore suggested taking the logarithms of these\
    \ ratios and thereby also taking advantage of the simple properties of the logarithmic\
    \ function, for example, log(x/y)=log(x)–log(y) and hence also log(x/y)=–log(y/x).\
    \ This process allows for reducing the number of covariances that are necessary\
    \ to describe the data set (Aitchison 2003, pages 65 to 66).\n\nBelow is a simple\
    \ example that illustrates the closed sum problem of a system with three variables\
    \ and the use of ratios as well as log-ratios to overcome the problem of spurious\
    \ correlations between pairs of variables. First, we clear the workspace and choose\
    \ colors for the plots:\n\n```\nimport numpy as np\nfrom scipy import stats\n\
    from scipy import signal\nimport matplotlib.pyplot as plt\n\ncolors = np.array([\n\
    \    [0,114,189],\n    [217,83,25],\n    [237,177,32],\n    [126,47,142],\n])/255\n\
    ```"
- md: "## 9.10 Demonstration of Aitchison's log-ratio transformation being used to\
    \ overcome the closed sum problem of closed data: **a** absolute values of element1a,\
    \ element1b, and element1c; **b** relative amounts of element1a, element1b, and\
    \ element1c, which shows the closed sum problem; **c** ratios of element1a/element1b\
    \ and element1b/element1a, which are both independent of element1c; and **d**\
    \ log-ratios according to Aitchison (1986, 2003), which are identical except for\
    \ their sign and thus overcome the closed sum problem.\n\nWe are interested in\
    \ element1a and element1b, which contribute to a sediment and are diluted by element1c.\
    \ We simply create three variables, each of which has a characteristic but different\
    \ cycle with periods of 2, 5, and 20, respectively. The sinusoidal variables element1a\
    \ and element1b (measured in milligrams) have an amplitude of one, whereas the\
    \ diluting variable element1c has an amplitude of two. The variables are sampled\
    \ with an interval of 0.1 in the period from 0.1 to 20, which produces a time\
    \ series of 200 values. We add 5 mg each to element1a, element1b and element1c\
    \ making sure that all absolute values are > 0, which does not occur with compositional\
    \ data (Fig. 9.10 a):\n\n```python\nt = np.linspace(0.1,20,200)\nt = np.transpose(t)\n\
    \nelement1a = np.sin(2*np.pi*t/2) + 5\nelement1b = np.sin(2*np.pi*t/5) + 5\nelement1c\
    \ = 2*np.sin(2*np.pi*t/20) + 5\n\nplt.figure()\nplt.plot(t,element1a,\n    color=colors[0,:])\n\
    plt.plot(t,element1b,\n    color=colors[1,:])\nplt.plot(t,element1c,\n    color=colors[3,:])\n\
    plt.legend(['1a','1b','1c'])\nplt.title('Absolute Amount of 1a-c (mg)')\nplt.show()\n\
    ```\n\nWe calculate the percentages of element1a, element1b, and element1c (i.e.,\
    \ we create ratios of the concentrations of the individual elements and the sum\
    \ of the concentrations of all elements). This process creates closed data (i.e.,\
    \ the data are now expressed as proportions and add to a fixed total of 100 percent):\
    \ element1a+element1b+element1c=100%. Both element1a and element1b are now affected\
    \ by the dilution caused by element1c. These elements show a major sinusoidal\
    \ long-term trend that is not real (as is shown by the first figure) (Fig. 9.10\
    \ b):\n\n```python\nelement1a_perc = element1a/(element1a+element1b+element1c)\n\
    element1b_perc = element1b/(element1a+element1b+element1c)\nelement1c_perc = element1c/(element1a+element1b+element1c)\n\
    ```\n\n```python\nplt.figure()\nplt.plot(t,element1a_perc,\n    color=colors[0,:])\n\
    plt.plot(t,element1b_perc,\n    color=colors[1,:])\nplt.plot(t,element1c_perc,\n\
    \    color=colors[3,:])\nplt.legend(['1a','1b','1c'])\nplt.title('Relative Concentration\
    \ of 1a-c (%)')\nplt.show()\n```\n\nWe have now established ratios between element1a/element1b\
    \ and of element1b/element1a, both of which are independent of element1c. Note\
    \ the change of sign and the difference in amplitude. The ratios of element1a/element1b\
    \ and element1b/element1a do not show any evidence of a trend caused by the dilution\
    \ effect of element1c. However, the two curves are not identical (i.e., element1a/element1b\
    \ and element1b/element1a are not symmetric) (see Weltje and Tjallingii 2008,\
    \ page 426) (Fig. 9.10 c):\n\n```python\nratio12 = element1a_perc/element1b_perc\n\
    ratio21 = element1b_perc/element1a_perc\n\nplt.figure()\nax1 = plt.subplot()\n\
    ax2 = ax1.twinx()\nline1, = ax1.plot(t,ratio12,\n    color=colors[0,:],\n    label='1a/1b')\n\
    line2, = ax2.plot(t,ratio21,\n    color=colors[1,:],\n    label='1b/1a')\nax2.invert_yaxis()\n\
    plt.legend(handles=[line1,line2])\nplt.title('Ratio of Elements 1a/1b and 1b/1a')\n\
    plt.show()\n```\n\nWe now display log-ratios in line with Aitchison (1986, 2003).\
    \ The log-ratios log(element1a/element1b) and log(element1b/element1a) are identical\
    \ except for the sign. It therefore makes no difference whether we use log(element1a/element1b)\
    \ or log(element1b/element1a), for instance, when running further statistical\
    \ analyses on the data (Fig. 9.10 d):\n\n```python\nratio12log = np.log10(ratio12)\n\
    ratio21log = np.log10(ratio21)\n```\n\n```python\nplt.figure()\nax1 = plt.subplot()\n\
    ax2 = ax1.twinx()\nline1, = ax1.plot(t,ratio12log,\n    color=colors[0,:],\n \
    \   label='log(1a/1b)')\nline2, = ax2.plot(t,ratio21log,\n    color=colors[1,:],\n\
    \    linestyle='--',\n    label='log(1b/1a)')\nax2.invert_yaxis()\nplt.legend(handles=[line1,line2])\n\
    plt.title('Log-Ratio of Elements log(1a/1b) and log(1b/1a)')\nplt.show()\n```\n\
    \nIn the second example, we examine the influence of the dilution in the frequency\
    \ domain and the effect of Aitchison's log-ratio transformation on the results\
    \ of the spectral analyses. The example is quite relevant because spectral analyses\
    \ are often carried out on data sets with clear dilution effects and spurious\
    \ correlations with the aim of establishing a connection between orbital forcing\
    \ and environmental changes. It is possible that a causal relationship between\
    \ an environmental parameter and orbitally driven insolation variations is claimed,\
    \ but the orbital cycle–which is observed in the time series of the environmental\
    \ parameter–is a pure artifact of the closed sum effect. We use a similar example\
    \ as above, but with a slightly longer time series so that we can obtain a good\
    \ result in the spectral analysis.\n\nFirst, we again create three variables (measured\
    \ in milligrams) with three different cycles of 2, 5, and 20, respectively. The\
    \ variables are again sampled with an interval of 0.1, but this time in the period\
    \ from 0.1 to 100, which produces a time series of 1,000 values:\n\n```python\n\
    t = np.linspace(0.1,100,1000)\nt = np.transpose(t)\n\nelement1a = np.sin(2*np.pi*t/2)\
    \ + 5\nelement1b = np.sin(2*np.pi*t/5) + 5\nelement1c = 2*np.sin(2*np.pi*t/20)\
    \ + 5\n```\n\nThen, we calculate the percentages of the elements by typing\n\n\
    ```python\nelement1a_perc = element1a/(element1a+element1b+element1c)\nelement1b_perc\
    \ = element1b/(element1a+element1b+element1c)\nelement1c_perc = element1c/(element1a+element1b+element1c)\n\
    ```\n\nAgain, elements `element1a_perc` and `element1b_perc` show a significant\
    \ sinusoidal long-term trend that is not real and that is instead the result of\
    \ the influence of the diluting element `element1c_perc`. We therefore again build\
    \ ratios `ratio12` and `ratio21`, which are now both independent of `element1c_perc`\
    \ by typing\n\n```python\nratio12 = element1a_perc/element1b_perc\nratio21 = element1b_perc/element1a_perc\n\
    ```\n\nSince `ratio12` and `ratio21` are not symmetrical, we calculate log-ratios\
    \ instead of ratios according to the principles of Aitchison (1986, 2003):\n\n\
    ```python\nratio12log = np.log10(ratio12)\nratio21log = np.log10(ratio21)\n```\n\
    \nWe first use `detrend()` to remove a possible long-term trend (but in any case,\
    \ the mean value of 5) before calculating periodograms (see Sect. 5.4). As expected,\
    \ the periodograms show one cycle per variable, as we defined at the beginning\
    \ (Fig. 9.11 a):\n\n```python\nelement1a = signal.detrend(element1a)\nelement1b\
    \ = signal.detrend(element1b)\nelement1c = signal.detrend(element1c)\n\nf,Pxx1a\
    \ = signal.periodogram(element1a,10,nfft=t.size)\nf,Pxx1b = signal.periodogram(element1b,10,nfft=t.size)\n\
    f,Pxx1c = signal.periodogram(element1c,10,nfft=t.size)\n\nplt.figure()\nplt.axes(xlim=(0,1))\n\
    plt.plot(f,abs(Pxx1a))\nplt.plot(f,abs(Pxx1b))\nplt.plot(f,abs(Pxx1c))\nplt.legend(('1a','1b','1c'))\n\
    plt.xlabel('Frequency')\nplt.ylabel('Power')\nplt.show()\n```\n\nHowever, after\
    \ converting the absolute values of the variables (in milligrams) into percentages,\
    \ we observe a strong closed sum effect. Due to the diluting effect of `element1c`\
    \ on both `element1a_perc` and `element1b_perc`, the latter two elements now show\
    \ a clear cycle of 20, which should actually only occur in variable `element1c`\
    \ (Fig. 9.11 b):\n\n**Fig. 9.11** Influence of the dilution effect and the effect\
    \ of Aitchison's log-ratio transformation in the frequency domain: **a** periodogram\
    \ of the original data that has been detrended in order to remove the mean; **b**\
    \ periodogram of the percentages, with strong closed sum effects in the frequency\
    \ domain; and **c** periodogram after applying Aitchison's log-ratio transformation\
    \ in order to remove the closed sum effect."
  mdcn: "## 9.10 演示艾奇逊对数比变换如何用于克服封闭数据的封闭和问题：**a** 元素1a、元素1b和元素1c的绝对值；**b** 元素1a、元素1b和元素1c的相对含量，显示了封闭和问题；**c**\
