    \n输出结果为：\n\n```\n1.3333333333333333\n```\n\n正如我们所看到的，Python 将 4/3 的值四舍五入到下一个浮点数。实数是连续的，而浮点数则不是。因此，我们的计算结果可能落在两个浮点数之间的间隙中；然后它会被四舍五入到下一个浮点数，因此不是精确的。\n\
    \n将十进制数转换为二进制数（反之亦然）并不困难。例如，让我们将 25.1 转换为二进制表示。这个数的整数部分是 25，小数部分是 0.1，它们分别进行转换。首先，我们通过输入以下代码转换整数部分：\n\
    \n```\n2^7 2^6 2^5 2^4 2^3 2^2 2^1 2^0\n128 64 32 16 8 4 2 1\n0 0 0 1 1 0 0 1\
    \ 二进制数\n(2的幂)\n16 8 1 = 25 十进制数\n(10的幂)\n```\n\n正如我们所看到的，我们将数字 25 分解为 2 的幂的和，而不是像十进制系统中那样分解为\
    \ 10 的幂。或者，我们可以使用以下方法计算二进制表示：\n\n```\n25/2 = 12 余数 1\n12/2 = 6 余数 0\n6/2 = 3 余数\
    \ 0\n3/2 = 1 余数 1\n1/2 = 0 余数 1 (结果为零，因此停止)\n```\n\n余数就是二进制数，它们按相反的顺序排列，使得第一个余数成为最低有效位（LSD），最后一个余数成为最高有效位（MSD）。在我们的例子中，数字\
    \ 25.1 的整数部分对应于二进制表示 11,001，或者对应于一个标准化的浮点数 1.1001 · 2^4。\n\n接下来，我们将小数部分 0.1 转换为二进制表示。不幸的是，0.1\
    \ 是许多具有无限循环二进制表示的例子之一。这是因为 0.1 位于两个浮点数之间。在 10 进制中，它是 1.0 · 10^-1，但在 2 进制中，它是\n\
    \n```\n.0001100110011001100110011001100110011...\n```\n\n这是通过将 0.1 乘以 2，取整数部分作为数字，取小数部分作为下一步的起点，重复此过程直到我们得到\
    \ 0 或一个循环数，然后从顶部开始读取二进制数来计算的，如下所示：\n\n```\n0.1 * 2 = 0.2 -> 0\n0.2 * 2 = 0.4 ->\
    \ 0\n0.4 * 2 = 0.8 -> 0\n0.8 * 2 = 1.6 -> 1\n```"
