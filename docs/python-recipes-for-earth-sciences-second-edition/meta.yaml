    print(y4[0:5])\n```\n\nyields\n\n```\n[0.1268 0.14778 0.04065 0.08782 0.3750]\n\
    [0.1268 0.14778 0.04065 0.08782 0.3750]\n```\n\nwhich is the lower end of the\
    \ output signal. We can see that both arrays y3 and y4 contain the same elements.\
    \ We now explore the upper end of the data array, where\n\n```python\nprint(y3[94:])\n\
    print(y4[94:])\n```\n\nyields the output signal\n\n```\n[0.05479 0.02424 -0.0969\
    \ -0.42716 -0.63345 -0.66565]\n[0.05479 0.02424 0. 0. 0. 0.]\n```\n\nThe arrays\
    \ are identical up to element y(end-m3+1), but the second array (y4) contains\
