    The critical $\chi^2$-value can be calculated using `chi2.ppf()`. The $\chi^2$-test
    requires the degrees of freedom $\chi$. In our example, we test the hypothesis
    that the data are uniformly distributed (i.e., we estimate one parameter). Since
    the number of classes is 12, the number of degrees of freedom is $\Phi = 12-1-1
    = 10$. We test our hypothesis at a $p=5\%$ significance level. The function `chi2.ppf()`
    computes the inverse of the cumulative distribution function (CDF) of the $\chi^2$-distribution,
    with numbers of parameters specified by $\Phi$ for the corresponding probabilities
    in $p$,


    ```

    chi2crit = stats.chi2.ppf(1-0.05,12-1-1)

    print(chi2crit)

