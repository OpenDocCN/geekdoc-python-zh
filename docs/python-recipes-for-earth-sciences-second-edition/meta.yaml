    plt.show()\n```\n\n我们现在根据艾奇逊（1986, 2003）展示对数比。对数比log(element1a/element1b)和log(element1b/element1a)除符号外完全相同。因此，例如，在对数据进行进一步统计分析时，使用log(element1a/element1b)还是log(element1b/element1a)没有区别（图9.10\
