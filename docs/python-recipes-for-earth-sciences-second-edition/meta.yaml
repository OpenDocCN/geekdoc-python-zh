    # 10.4 Theoretical Distributions of Circular Data


    As in Chap. 3, the next step in a statistical analysis is to find a suitable theoretical
    distribution that we fit to the empirical distribution that was visualized and
    described in the previous section. The classic theoretical distribution for describing
    directional data is the von Mises distribution, which is named after Austrian
    mathematician Richard Edler von Mises (1883 to 1953). The probability density
    function of a von Mises distribution is


    $$f(\theta) = \frac{1}{2\pi I_0(\kappa)} e^{\kappa \cos(\theta - \mu)}$$


    where μ is the mean direction and κ is the concentration parameter (Mardia and
    Jupp 1999) (Fig. 10.5). The term $I_0(\kappa)$ is the zero-order modified Bessel
    function'
