    ## 8.9 Removing Periodic Noise from Images


    Images can be overlaid with a variety of noise, which is most often caused by
    problems in the image acquisition process. In most examples, this is random noise
    caused by problems with the sensor in low-light conditions. Another type of noise–which
    superimposes periodic rather than random disturbances on the image–occurs, for
    example, when electromagnetic fields interfere with the digital camera’s recording
    system. Such disturbances are widespread, especially in laboratories at research
    institutions where a large number of electronic devices are in operation. The
    search for the source of the noise is often tedious, time-consuming and costly.
    Therefore, users of digital camera systems may be tempted to correct the interference
    in the image.


    There are a number of ways to remove noise from the image, such as by using a
    two-dimensional band-pass filter operating in the time domain similar to the one-dimensional
    filters introduced in Chap. 6.9. This filter removes a frequency band that contains
    the frequency of the periodic noise, but it may also remove actual image information.
    The filter is designed with the usual methods, which are additionally presented
    in Chap. 6.9, but it has the disadvantages discussed there. Instead, we can also
    Fourier transform the image in two dimensions, locate the periodic noise in the
    spectrum, and replace the corresponding values of the power spectral density with,
    for example, the value of zero. When researching solutions, several variants can
    be found that are more or less elegant and flawless, and a very good solution
    by Ray Phan is available as *Answer 1* to a question on Stackoverflow.


    As an example, we use a microscopic image taken to quantify charcoal from lake
    sediment using the method introduced in Sect. 8.13. The sediment was taken from
    a long sediment core collected in the Chew Bahir basin in the southern Ethiopian
    rift (Foerster et al. 2022) (Fig. 8.9). Unfortunately, the image shows periodic
