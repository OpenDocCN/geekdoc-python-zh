  md: '# 8.6 Processing and Exporting EO-1 Hyperion Images


    Typing


    ```

    np.who()

    ```


    shows how the hyperspectral image is stored in the workspace:


    | Name | Shape | Bytes | Type |

    |---|---|---|---|

    | HYP | 3189 x 242 x 256 | 395129856 | int16 |

    | Upper bound on total bytes = | | 395129856 | |


    These details indicate that the image is stored as a 3,189-by-242-by-256 array,
    which represents a 3,189-by-256 array for each of the 242 spectral bands. The
    listing of the current variables in the workspace also includes the information
    *int16* (i.e., each array element represents one pixel and contains signed 16
    bit integers). We need to permute the array in order to move the bands to the
    third dimension by typing


    ```

    HYP = HYP.transpose(0,2,1)

    ```


    We next need to determine the radiance values from the digital number (DN) values
    in HYP. The radiance is the power density scattered from the Earth in a particular
    direction and uses the units of watts per square meter per steradian (Wm⁻² sr⁻¹)
    (Richards 2013). The EO-1 User Guide (v. 2.3) provides the necessary information
    on these conversions in its *Frequently Asked Questions* (FAQ) section (Beck 2003).
    According to this document, the radiance HYPR for the visible and near-infrared
    (VNIR) bands (i.e., Bands 1 to 70) is calculated by dividing the digital number
    in HYP by 40. The radiance for the shortwave infrared (SWIR) bands (i.e., Bands
    71 to 242) is calculated by dividing HYP by 80:


    ```

    HYPR = np.copy(HYP)

    HYPR[:,:,0:70] = HYPR[:,:,0:70]/40

    HYPR[:,:,70:242] = HYPR[:,:,70:242]/80

    ```


    For quantitative analyses, the radiance values HYPR need to be corrected for atmospheric
    and topographic effects. This correction–which yields earth surface reflectance
    values (in percentages)–is beyond the scope of the present book. The EO-1 User
    Guide (v. 2.3) again explains several methods of converting radiance values into
    reflectance values (Beck 2003).


    We instead process the Hyperion image in order to create a georeferenced RGB composite
    of Bands 29, 23, and 16 for use in fieldwork. The header file *EO1H1690582013197110KF.HDR*
    contains–inter alia–the wavelengths corresponding to the 242 spectral bands in
    lines 258 to 288. We can copy and paste these lines'
