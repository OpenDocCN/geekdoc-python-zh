    # 5.8 Thomson’s Multitaper Method


    *Thomson’s multitaper method* calculates the power spectrum of the time series
    $x(t)$ with $n$ data points by averaging multiple tapered periodograms (Thomson
    1982, Percival and Walden 1993) (Sect. 5.4). A taper is a window function $w(k)$,
    similar to the one used to suppress spectral leakage (Sect. 5.5), which is multiplied
    element by element with the time series $x(t)$. Averaging a large number of such
    tapered periodograms helps to increase the signal-to-noise ratio of the spectrum
    and to suppress spectral leakage. Since the window functions $w(k)$ used by Thomson’s
    multitaper method are pairwise orthogonal, the tapered spectrum estimates are
    statistically independent, and the averaged periodograms therefore represent an
    unbiased estimate of the true spectrum. In his original publication, David J.
    Thomson used discrete prolate spherical sequences as window functions $w(k)$ to
    treat both bias and smoothing problems that had previously been found by David
    S. Slepian (Slepian 1978). The method therefore has a similar goal to Welch’s
    method, which was introduced in Sect. 5.5 in order to provide an unbiased estimate
    of the true spectrum with an improved signal-to-noise ratio (SNR). In Welch’s
    method, the statistical independence of the averaged spectra is achieved by calculating
    the spectra from (possibly overlapping) segments of the time series.'
