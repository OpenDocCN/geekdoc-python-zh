    \ times $t_k$:\n\n$$x(t_k) = x(t_1), x(t_2), \\ldots, x(t_n)$$\n\nIf the time\
    \ interval between any two successive observations $x(t_k)$ and $x(t_{k+1})$ is\
    \ constant, the time series is said to be equally spaced, and the sampling interval\
    \ is\n\n$$\\Delta t = t_{k+1} - t_k$$\n\nThe sampling frequency $f_s$ is the inverse\
    \ of the sampling interval $\\Delta t$. We generally try to sample at regular\
    \ time intervals, or constant sampling frequencies, but in many earth science\
    \ examples, this is not possible. As an example, imagine deep sea sediments sampled\
    \ at five-centimeter intervals along a sediment core. Radiometric age determinations\
    \ at certain levels in the sediment core have revealed substantial fluctuations\
    \ in sedimentation rates. Despite the even spacing of the samples along the sediment\
    \ core, these samples are not equally spaced on the time axis. Hence, the quantity\n\
    \n$$\\Delta t = T/n$$\n\n(where $T$ is the full length of the time series and\
    \ $n$ is the number of data points) represents only an average sampling interval.\
    \ In general, a time series $x(t_k)$ can be represented as the linear sum of a\
    \ periodic component $x_p(t_k)$, a trend $x_{tr}(t_k)$, and random noise $x_{ns}(t_k)$:\n\
    \n$$x(t_k) = x_p(t_k) + x_{tr}(t_k) + x_{ns}(t_k)$$\n\nThe decomposition of a\
    \ climate signal into periodic, trend, and noise components (shown above) corresponds\
