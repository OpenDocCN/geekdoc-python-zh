    Quantifying the composition of substances in the earth sciences (e.g., the mineral
    composition of a rock in thin sections or the amount of charcoal in sieved sediment
    samples) is facilitated by the use of image processing methods. *Thresholding*
    provides a simple solution to problems associated with segmenting objects within
    an image that have different coloration or grayscale values. During the thresholding
    process, pixels with an intensity value greater than a threshold value are marked
    as object pixels (e.g., pixels that represent charcoal in an image), and the rest
    are marked as background pixels (e.g., all other substances). The threshold value
    is usually defined manually by visually inspecting the image histogram, but numerous
    automated algorithms are also available.


