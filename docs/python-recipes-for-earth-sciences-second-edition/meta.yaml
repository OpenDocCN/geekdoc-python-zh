    # 3.4.6 Student''s t-Distribution


    Student''s t-distribution was first introduced by William S. Gosset (1876 to 1937),
    who needed a distribution for small samples (Fig. 3.9). Gosset was an employee
    of the Irish Guinness Brewery and wished to publish his research results anonymously.
    He thus published his t-distribution under the pseudonym Student (Student 1908).
    The probability density function is


    $$f(x) = \frac{\Gamma\left(\frac{\Phi+1}{2}\right)}{\Gamma\left(\frac{\Phi}{2}\right)}
    \frac{1}{\sqrt{\Phi\pi}} \frac{1}{\left(1+\frac{x^2}{\Phi}\right)^{\frac{\Phi+1}{2}}}$$


    where $\Gamma$ is the Gamma function,


    $$\Gamma(x) = \lim_{n \to \infty} \frac{n! n^{x-1}}{x(x+1)(x+2)\dots(x+n-1)}$$


    which can be written as


    $$\Gamma(x) = \int_{0}^{\infty} e^{-y} y^{x-1} dy$$


    if $x>0$. The single parameter $\phi$ of the t-distribution is the number of degrees
    of freedom. In the analysis of univariate data, this distribution has $n-1$ degrees
    of freedom, where $n$ is the sample size. As $\phi \to \infty$, the t-distribution
    converges toward the standard normal distribution. Since the t-distribution approaches
    the normal distribution for $\phi>30$, it is rarely used for distribution fitting.
    However, the t-distribution is used for hypothesis testing using the t-test (Sect.
    3.7).'
