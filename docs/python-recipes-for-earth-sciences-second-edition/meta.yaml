    \ - z_{r+1,c}}{2h}$$\n\nwhere $h$ is the cell size and has the same units as the\
    \ elevation. Using the finite differences, the slope is then calculated by\n\n\
    $$slp_{DF} = \\sqrt{z_x^2 + z_y^2}$$\n\nOther primary relief attributes (e.g.,\
    \ the *aspect*, the *plan*, the *profile*, and the *tangential curvature*) can\
    \ be derived in a similar way using finite differences (Wilson and Gallant 2000).\
