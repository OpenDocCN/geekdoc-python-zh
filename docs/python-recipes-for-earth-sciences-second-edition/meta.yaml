    \n```\n[[0.5488135  0.71518937 0.60276338 0.54488318]\n [0.4236548  0.64589411\
    \ 0.43758721 0.891773  ]\n [0.96366276 0.38344152 0.79172504 0.52889492]]\n```\n\
    \n默认情况下，输出采用8位数字的缩放定点格式（例如，A的[0, 0]元素为0.5488135），但计算结果的64位精度在四舍五入到8位后保持不变。然而，将数据类型从*double*转换为32位*单精度*会影响精度。输入\n\
    \n```\nB = np.single(A)\nprint(B)\n```\n\n输出\n\n```\n[[0.5488135  0.71518934 0.60276335\
