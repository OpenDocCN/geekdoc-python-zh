    # 3.4.5 Logarithmic Normal (or Log-Normal) Distribution


    Logarithmic normal (or log-normal) distribution is used when the data have a lower
    limit, such as with mean annual precipitation or the frequency of earthquakes
    (Fig. 3.8). In such cases, distributions are usually characterized by major skewness,
    which is best described by a logarithmic normal distribution. The probability
    density function of this distribution is


    ```

    $$f(x) = \frac{1}{\sigma \sqrt{2\pi} x} exp\left(-\frac{1}{2}\left(\frac{lnx -
    \mu}{\sigma}\right)^2\right)$$

    ```


    and the cumulative distribution function is


    ```

    $$F(x) = \frac{1}{\sigma \sqrt{2\pi}} \int_{-\infty}^{x} \frac{1}{y} exp\left(-\frac{1}{2}\left(\frac{lny
    - \mu}{\sigma}\right)^2\right) dy$$

    ```


    where x>0. The distribution can be described by two parameters: the mean μ and
    the standard deviation σ. However, the formulas for the mean and the standard
    deviation are different from those used for normal distributions. In practice,
    the values of x are logarithmized, the mean and the standard deviation are computed
    using the formulas for a normal distribution, and the empirical distribution is
    then compared with a normal distribution.'
