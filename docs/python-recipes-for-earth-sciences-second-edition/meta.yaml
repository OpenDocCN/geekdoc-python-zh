    # 5.11 Nonlinear Time Series Analysis (by N. Marwan)


    The methods described in the previous sections were used to detect linear relationships
    in data. However, natural processes on the Earth are often complex and chaotic,
    and methods based on linear techniques may therefore yield unsatisfactory results.
    New techniques for nonlinear data analysis that are derived from chaos theory
    have become increasingly popular in recent decades. Such methods have been used
    to describe nonlinear behavior, for example, by defining the scaling laws and
    fractal dimensions of natural processes (Turbotte 1997; Kantz and Schreiber 1997).
    However, most methods of nonlinear data analysis require either long or stationary
    data series, and these requirements are rarely satisfied in the earth sciences.
    While most nonlinear techniques work well on synthetic data, these methods are
    unable to describe the nonlinear behavior of real data.


    During recent decades, recurrence plots have become highly popular in science
    and engineering as a new method of nonlinear data analysis (Eckmann et al. 1987,
    Marwan 2007). Recurrence is a fundamental property of dissipative dynamical systems.'
  - '[PAGE 217]


    cal systems. Although small disturbances in such systems can cause exponential
    divergence in the systems’ states, after some time, the systems return to a state
    that is close to a former state before again passing through a similar evolution.
    Recurrence plots allow such recurrent behavior of dynamical systems to be visually
    portrayed. The method is now widely accepted as a useful tool in the nonlinear
    analysis of short and nonstationary data sets.


    # 5.11.1 Phase Space Portrait


    The behavior of a complex dynamical system (e.g., the process of sedimentation
    in a lake) is determined by many variables, such as the properties of the water
    body and the sediment beneath the lake, the organisms living in the lake and its
    surroundings, precipitation (with high rainfall causing increased weathering and
    erosion in the catchment area), evaporation (with higher evaporation resulting,
    e.g., in higher potassium concentrations in the sediment), and wind speed (which
    can transport more solid particles into the lake). Analyzing the properties of
    such a dynamical system and the time-varying interaction between the system’s
    components requires keeping a record of these state variables over time. Since
    there are usually no ancient records available of a system’s state variables (e.g.,
    precipitation, evaporation, or wind speed), we must instead rely on indirect indicators
    (proxies) that have been preserved in natural archives. A proxy record is obtained
    by sampling a single variable of a multi-dimensional dynamical system, which is
    equivalent to projecting the dynamics of a complex system onto a single axis.
    Considering the example of sediment in a paleolake, the sampled variable could
    be a time series $x(t)$ of potassium concentrations along a lake sediment core
    that represents a natural archive of past states of the lake system.


    One way to unfold the dynamics of a multi-dimensional system from a one-dimensional
    time series $x(t)$ is through time delay *embedding*, which preserves the dynamic
    characteristics of the system (Packard et al. 1980). Such a one-dimensional time
    series–which is based on a single variable–contains information about the system
    and its state variables from which a complete reconstruction of the entire system
    can be made. In other words, since the potassium concentration is a result of
    a complex interplay between unknown environmental variables (e.g., precipitation,
    evaporation, and wind velocity), analyzing the temporal variations in this environmental
    proxy helps us to understand the properties of the paleolake and the time-varying
    interactions between its components. The embedding of the time series $x(t)$ in
    a three-dimensional ($m = 3$) *phase space*, for example, means that three successive
    values $x(t)$, $x(t + \tau)$, and $x(t + 2\tau)$ with a temporal separation $\tau$
    are represented as a point in a three-dimensional coordinate system (i.e., the
    phase space) (Packard et al. 1980). The *phase space portrait* displays the embedded
    time series of observations as a trajectory $\vec{y}(t) = [x(t), x(t + \tau),
    x(t + 2\tau)]^T$ in the phase space. The phase space trajectory represents the
    path over which the'
- md: "system's state evolves over time. The reconstructed phase space (which is reconstructed\
    \ via embedding) is not exactly the same as the original phase space (i.e., the\
    \ true variables that describe the lake), but its topological properties are preserved\
    \ provided that the *embedding dimension* is sufficiently large (Packard et al.\
    \ 1980; Takens 1981).\n\nAs an example, we now explore the phase space portrait\
    \ of a periodic process. We first create the position vector x1 and the velocity\
    \ vector x2:\n\n```python\nimport numpy as np\nfrom scipy import interpolate\n\
    import matplotlib.pyplot as plt\nimport scipy.spatial.distance as distance\n\n\
    t=np.arange(0,3*np.pi+np.pi/10,np.pi/10)\nx1=np.sin(t)\nx2=np.cos(t)\n```\n\n\
    The phase space portrait\n\n```python\nplt.figure()\nplt.plot(x1, x2)\nplt.xlabel('x_1')\n\
    plt.ylabel('x_2')\nplt.show()\n```\n\nis a circle, which suggests an exact recurrence\
    \ of each state after one complete cycle (Fig. 5.24). Through time delay embedding,\
    \ we can reconstruct this phase space portrait using only a single observation\
    \ (e.g., a velocity vector) and a time delay of five, which corresponds to one\
    \ fourth of the period of a pendulum:\n\n```python\ntau=5\nplt.figure()\nplt.plot(x2[:-tau],\
    \ x2[tau:])\nplt.xlabel('x_1')\nplt.ylabel('x_2')\n```\n\nAs we can see, the reconstructed\
    \ phase space is almost the same as the original phase space. We next compare\
    \ this phase space portrait with that of a typical nonlinear system: the *Lorenz\
    \ system* (Lorenz 1963). Weather patterns often do not change in a predictable\
    \ manner. In 1963, Edward Lorenz introduced a simple three-dimensional model for\
    \ describing the chaotic behavior exhibited by turbulence in the atmosphere. The\
    \ variables that define the Lorenz system are the intensity of atmospheric convection,\
    \ the temperature difference between ascending and descending currents, and the\
    \ distortion of the vertical temperature profiles from linearity. Small variations\
    \ in the initial conditions can cause dramatically divergent weather patterns—a\
    \ behavior often referred to as the *butterfly effect*. The dynamics of the Lorenz\
    \ system are described by three coupled nonlinear differential equations:\n\n\
    $$\\frac{dx}{dt} = s(y(t) - x(t))$$\n\n$$\\frac{dy}{dt} = -x(t)z(t) + rx(t) -\
    \ y(t)$$\n\n$$\\frac{dz}{dt} = x(t)y(t) - bz(t)$$\n\nIntegrating the differential\
    \ equations yields a simple Python code for computing the *xyz* triplets of the\
    \ Lorenz system. We use *s* = 10, *r* = 28, and *b* = 8/3 as system parameters\
    \ for controlling the chaotic behavior, and the time delay is *dt* = 0.01. The\
    \ initial values for the position vectors are *x1* = 8, *x2* = 9, and *x3* = 25.\
    \ However, these values can be changed to any other values, which of course then\
    \ also changes the behavior of the system:\n\n```python\ndt=0.01\ns=10\nr=28\n\
