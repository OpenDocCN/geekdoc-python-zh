    # 5.13 Describing Gradual Transitions in Time Series


    Detecting, measuring and classifying transitions in climate time series is one
    of the most important task in modern time series analysis (Mudelsee 2000, Trauth
    et al. 2018, 2021b). We can statistically analyze climate records for the amplitude,
    duration, and midpoint of a climate transition using different methods. First,
    we fit a sigmoid function with m=4 parameters a, b, c, and d


    $$x_{fit}(t) = a + \frac{b}{1 + e^{-d(t-c)}}, for -\infty < t < +\infty$$


    to the records $x_i$ with $1<i<n$ and n data points using nonlinear least squares
    fitting. The sigmoid function (in its normalized representation) is a monotonic
    s-shaped curve that is often referred to as a smooth version of a step function.
    The sigmoid function is bounded by two horizontal asymptotes $x_{fit}(t) \rightarrow
    0$ and 1 as $t \rightarrow -\infty$ and $+\infty$, respectively. It has a bell-shaped
    first derivative curve and exactly one inflection point (parameter c), which can
    be interpreted as the midpoint of the transition. Second, we statistically re-analyze
    these records and fit a ramp function again with m=4 parameters $x_1$, $x_2$,
    $t_1$, and $t_2$


    $$x_{fit}(t) = \begin{cases} x_1, for t \le t_1 \ x_1 + (t - t_1)(x_2 - x_1)/(t_2
    - t_1), for t_1 < t \le t_2 \ x_2, for t > t_2 \end{cases}$$


    to the n data points. The monotonic ramp-shaped curve has two horizontal pieces
    and an inclined piece that are connected by two abrupt changes of direction and
    that have a discontinuous first derivative.


    Our example data set comprises 100 data points y for the period from t=0 to t=100,
    with a linear transition from y=0 to y=1 and a midpoint at t=50. The linear transition
    within the synthetic time series starts at t=46 and ends at t=55 and has a slope
    of 1/10 and a y-intercept of -4.5. The y-values of the synthetic data'
