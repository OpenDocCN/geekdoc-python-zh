- md: "## 2.6 Data Storage and Handling\n\nThis section deals with how to store, import,\
    \ and export data with Python. Many of the data formats typically used in the\
    \ earth sciences must be converted before being analyzed with Python. Alternatively,\
    \ the software provides several import routines for reading many binary data formats\
    \ in the earth sciences, such as those used to store digital elevation models\
    \ and satellite data. Newer functions in Python are capable of importing mixed\
    \ data types (e.g., text, integers, and floating point numbers) from a single\
    \ file into the workspace.\n\nA computer generally stores data as *binary digits*,\
    \ or *bits*, for short. A bit is analogous to a two-way switch with two states:\
    \ *on* = 1, and *off* = 0. These bits are joined together to form larger groups,\
    \ such as *bytes* (which consist of 8 bits) in order to store more complex types\
    \ of data. These groups of bits are then used to encode data, such as numbers\
    \ or characters. Unfortunately, different computer systems and software use different\
    \ schemes for encoding data. Exchanging binary data between different computer\
    \ platforms and software can therefore be difficult.\n\nVarious formats for exchanging\
    \ data have been developed in recent decades. The classic example of a data format\
    \ that can be used with different computer platforms and software is the *American\
    \ Standard Code for Information Interchange (ASCII)*, which was first published\
    \ in 1963 by the American Standards Association (ASA). As a 7 bit code, ASCII\
    \ consists of $2^7 = 128$ characters (codes 0 to 127). Whereas ASCII-1963 lacked\
    \ lowercase letters, in the ASCII-1967 update, lowercase letters as well as various\
    \ control characters (e.g., escape and line feed) and symbols (e.g., brackets\
    \ and mathematical operators) were also included. Since then, a number of variants\
    \ have appeared in order to facilitate the exchange of text written in languages\
    \ other than English. Such variants include the expanded ASCII, which contains\
    \ 255 codes, including the Latin-1 encoding.\n\nThe simplest way to exchange data\
    \ between a certain piece of software and Python is by using the ASCII format.\
    \ Although some packages (e.g., *Pandas*) provide various functions for reading\
    \ binary files, such as Microsoft Excel files, most data arrive in the form of\
    \ ASCII files. Consider a simple data set stored in a table, such as.\n\n```\n\
    SampleID  Percent C  Percent S\n101        0.3657     0.0636\n102        0.2208\
    \     0.1135\n103        0.5353     0.5191\n104        0.5009     0.5216\n105\
    \        0.5415     -999\n106        0.501      -999\n```\n\nThe first row contains\
    \ the names of the variables, and the columns provide the percentages of carbon\
    \ and sulfur in each sample. The absurd value of -999 indicates missing data in\
    \ the data set. Two things must be changed in order to convert this table into\
    \ Python format: First, Python uses `NaN` or `nan` as the representation for *Not-a-Number*,\
    \ which can be used to mark missing data or gaps. Second, the hash character (#)\
    \ should be added at the beginning of the first line. This hash character is used\
    \ to indicate non-executable text within the body of a program. This text is normally\
    \ used to include comments in the code, as in the following example:\n\n```\n\
    #SampleID  Percent C    Percent S\n101        0.3657       0.0636\n102       \
    \ 0.2208       0.1135\n103        0.5353       0.5191\n104        0.5009     \
    \  0.5216\n105        0.5415       NaN\n106        0.501        NaN\n```\n\nPython\
    \ ignores any text that appears after the hash character and continues processing\
    \ the next line. After editing this table in a text editor, such as the *Spyder\
    \ Editor*, it can be saved as an ASCII text file *geochem.txt* in the current\
    \ working directory (Fig. 2.2). Python can now import the data from this file\
    \ with the `loadtxt()` command:\n\n![](img/f6c4e7e52658f332a1ff43bb13764e42_51_0.png)\n\
    \n**Fig. 2.2** Screenshot of *Spyder Editor* that shows the content of the file\
