    io.imshow(I3,\n    extent=[0,ix,0,iy])\nplt.title('Adjusted intensity values')\n\
    plt.axis('off')\nplt.show()\n```\n\nThe function `threshold()` converts the background-free\
    \ image I3 into a binary image I4 via thresholding. If the threshold is 0, the\
    \ image is all white, whereas if the threshold is 255, the image is all black.\
    \ We manually change the threshold value until we obtain a reasonable result.\
    \ We find 50 to be a suitable threshold:\n\n```\nthresh,I4 = cv2.threshold(I3,\n\
    \    50,255,cv2.THRESH_BINARY)\n\nplt.figure()\nio.imshow(I4,\n    extent=[0,ix,0,iy])\n\
    plt.title('Binary image')\nplt.axis('off')\nplt.show()\n```\n\nWe next use the\
    \ watershed segmentation algorithm to separate the grains in the image. Watersheds\
    \ in geomorphology are ridges that divide areas that contribute to the hydrological\
    \ budget of adjacent catchments (see Sect. 7.10). Watershed segmentation applies\
    \ the same methods to grayscale images that are used to separate catchments in\
    \ digital elevation models. In this application, the grayscale values are interpreted\
    \ as elevations in a digital elevation model in which the watershed then separates\
    \ the two objects of interest.\n\nThe criterion commonly used to identify pixels\
    \ that belong to a particular object is the nearest neighbor distance. We use\
    \ the distance transform performed by `distance_transform_edt()`, which assigns\
    \ to each pixel a number that is the distance between the pixel and the nearest\
    \ non-zero pixel in I4:\n\n```\ndistance = ndi.distance_transform_edt(I4)\n```\n\
    \nThe function uses *Euclidean distances* to compute the nearest neighbor distances.\
    \ The distance matrix now contains positive non-zero values in the object pixels\
    \ and contains zeros elsewhere. We use this information to create a mask:"
