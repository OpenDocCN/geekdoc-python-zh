    \n## 8.6 处理和导出EO-1 Hyperion图像\n\n*地球观测-1*（EO-1）任务卫星是美国国家航空航天局（NASA）和美国地质调查局（USGS）新千年计划的一部分。该任务始于2000年11月21日卫星发射，并于2017年3月30日停止运行。EO-1有两个传感器：先进陆地成像仪（ALI）（具有九个多光谱波段，空间分辨率为30米，以及一个全色波段，分辨率为10米）和高光谱传感器（Hyperion）（具有220个波段，波长范围在430至2400纳米之间）（Mandl等人，2002年；Line，2012年）。关于EO-1计划的一般信息可以从以下网站获取：\n\
    \nhttps://nssdc.gsfc.nasa.gov/nmc/spacecraft/display.action?id=2000-075A\n\nHyperion数据（以及其他NASA卫星的数据）可从以下网站免费获取：\n\
    \nhttps://earthexplorer.usgs.gov\n\n在后一个网站上，我们首先在*搜索条件*中选择所需的地图区域，可以通过输入地图四个角的坐标，或者通过放大到感兴趣的区域并选择*使用地图*来完成。例如，我们输入坐标2°8'37.58\"\
    N 36°33'47.06\"E，到达肯尼亚北部裂谷的苏古塔谷中心。然后，我们从*EO-1*集合中选择*Hyperion*作为*数据集*，并点击*结果*，这将生成一个记录列表以及一个用于预览和下载数据的工具栏。点击*显示浏览叠加*按钮允许我们检查图像的云量。在叠加层中，我们可以找到无云的图像\n\
    \n```\nEntity ID: EO1H1690582013197110KF_PF2_01\nAcquisition Date: 16-JUL-13\n\
    Target Path: 169\nTarget Row: 58\n```\n\n该图像拍摄于2013年7月16日。与之前一样，我们需要在USGS网站上注册、登录，然后下载经过辐射校正（但未进行几何校正）的1级R（L1R）产品（215.3\
    \ MB），然后将其存储在文件*EO1H1690582013197110KF_1R.ZIP*中。.ZIP存档包含一个元数据文件（.MET）、一个联邦地理数据委员会（FGDC）元数据文件（.fgdc）、一个HDF数据集文件（.L1R）和多个辅助文件。EO-1用户指南提供了一些关于这些文件数据格式的有用信息（Barry，2001年；Beck，2003年）。我们可以使用以下代码从文件*EO1H1690582013197110KF.L1R*导入数据：\n\
    \n```\nimport numpy as np\nimport matplotlib.pyplot as plt\nfrom skimage import\
    \ io, exposure\nfrom pyhdf.SD import SD\n\nheaderfile = 'EO1H1690582013197110KF.hdr'\n\
