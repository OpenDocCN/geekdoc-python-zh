    ```

    5.662788932499999

    5.97410535

    [6.54074771]

    ```


    The mean of the data is lower than the median, which is in turn lower than the
    mode. We observe a strong negative skewness, as expected from our data. Typing


    ```

    print(stats.skew(sodium))

    ```


