    \     4.1472,\n     5.1338])\nfun = interpolate.interp1d(t1, x1)\nx2 = fun(t2)\n\
    \nLet us imagine that we do not know the underlying function (i.e., the 5th-degree\
    \ polynomial) and try to estimate it using linear, nearest neighbor and spline\
    \ interpolation. To do this, we first create (for the purpose of graphing) a time\
    \ axis t3 between -6 and +6, with intervals of 0.05. We then use interp1d() with\
    \ the three methods linear, nearest, and cubic by typing\n\nt3 = np.linspace(-6,\
    \ 6, 241)\nfun = interpolate.interp1d(t2, x2, kind='linear',\n               \
