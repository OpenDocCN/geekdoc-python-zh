    Numerous formats are available for saving vector and raster data in a file, and
    each format has its own particular advantages and disadvantages. The choice of
    one format over another in an application depends both on the way the images are
    to be used in a project and on whether they are to be analyzed quantitatively.
    The most popular formats for storing vector and raster data are


    +   - *CompuServe Graphics Interchange Format* (GIF)–This format was developed
    in 1987 for raster images that use a fixed 8 bit colormap of 256 colors. The GIF
    uses compression without losing data. It was designed for fast transfer rates
    over the Internet. The limited number of colors means that it is not the right
    format for the smooth color transitions used in aerial photos or satellite images.
    However, the format is often used for line art, maps, cartoons, and logos (http://www.compuserve.com).

    - *Portable Network Graphics* (PNG)–Developed in 1994, this image format is used
    as an alternative to the GIF. It is similar to the GIF in that it also uses a
    fixed 8 bit colormap of 256 colors. Alternatively, grayscale images of 1 to 16
    bits can be stored, as can 24 bit and 48 bit color images. The PNG format uses
    compression without losing data, and the employed method is better than that used
    for GIF images.

    - *Tagged Image File Format* (TIFF)–This format was jointly designed by the Aldus
    Corporation and Microsoft in 1986 with the goal of becoming an industry standard
    for exchanging image files. A TIFF file includes an image file header, a directory,
    and the data in all available graphics and image file formats. Some TIFF files
    even contain vector and raster versions of the same picture as well as images
    at different resolutions and with different colormaps. The main advantage of TIFF
    files was originally their portability. A TIFF should be able to perform on all
    computer platforms; unfortunately, however, numerous modifications to the TIFF
    have evolved in subsequent years, resulting in incompatibilities. The TIFF is
    therefore now often jokingly referred to as the *Thousands of Incompatible File
    Formats*.

    - *PostScript* (PS) and *Encapsulated PostScript* (EPS)–The PS format was developed
    by John Warnock at PARC, the Xerox research institute. Warnock was also co-founder
    of Adobe Systems, where the EPS format was created. The PostScript vector format
    would never have become an industry standard without Apple Computers. In 1985,
    Apple needed a typesetter quality controller for the new Apple LaserWriter printer
    and the Macintosh operating system, and the company thus adopted the PostScript
    format. The third partner in the history of PostScript was Aldus, which developed
    the PageMaker software and is now part of Adobe Systems. The combination of Aldus
    PageMaker software, the PS format, and the Apple LaserWriter printer led to the
    creation of desktop publishing. The EPS format was then developed by Adobe Systems
    as a standard file format for importing and exporting PS files. Whereas a PS file
    is generally a single-page format that contains either an illustration or a text,
    the purpose of'
  - '[PAGE 359]


    an EPS file is to also allow other pages to be included (e.g., a file that can
    contain any combination of text, graphics and images) (http://www.adobe.com).


    +   - In 1986, the *Joint Photographic Experts Group* (JPEG) was founded for the
    purpose of developing various standards for image compression. Although the name
    JPEG stands for the committee, it is now widely used as the name of an image compression
    format and a file format. This compression involves grouping pixel values into
    8-by-8 blocks and transforming each block with a discrete cosine transform. As
    a result, all unnecessary high-frequency information is deleted, which makes this
    compression method irreversible. The advantage of the JPEG format is the availability
    of a three-channel 24 bit true color version, which allows images with smooth
    color transitions to be stored. The new JPEG 2000 format uses a wavelet transform
    instead of a cosine transform (Sect. 5.10) (http://www.jpeg.org).


    +   - *Portable Document Format* (PDF)–The PDF, which was also designed by Adobe
    Systems, is now a true self-contained cross-platform document. PDF files contain
    different types of content, which include text as well as vector and raster graphics.
    The newer versions of PDFs can also contain interactive content, such as hyperlinks,
    animated objects, audio, and video. These files are highly compressed, thereby
    allowing for fast Internet download. Adobe Systems provides Acrobat Reader free
    of charge for all computer platforms so that PDF files can be read (http://www.adobe.com).


    # 8.3 Importing, Processing, and Exporting Images


    We first need to learn how to read an image from a graphics file in the workspace.
    As an example, we use a satellite image that shows a 10.5-km-by-11-km subarea
    in northern Chile:


