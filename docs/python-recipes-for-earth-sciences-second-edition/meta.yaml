  md: 'There are a number of ways to remove noise from the image, such as by using
    a two-dimensional band-pass filter operating in the time domain similar to the
    one-dimensional filters introduced in Chap. 6.9. This filter removes a frequency
    band that contains the frequency of the periodic noise, but it may also remove
    actual image information. The filter is designed with the usual methods, which
    are additionally presented in Chap. 6.9, but it has the disadvantages discussed
    there. Instead, we can also Fourier transform the image in two dimensions, locate
    the periodic noise in the spectrum, and replace the corresponding values of the
    power spectral density with, for example, the value of zero. When researching
    solutions, several variants can be found that are more or less elegant and flawless,
    and a very good solution by Ray Phan is available as *Answer 1* to a question
    on Stackoverflow.


