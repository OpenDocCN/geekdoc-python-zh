    We next need to determine the radiance values from the digital number (DN) values
    in HYP. The radiance is the power density scattered from the Earth in a particular
    direction and uses the units of watts per square meter per steradian (Wm⁻² sr⁻¹)
    (Richards 2013). The EO-1 User Guide (v. 2.3) provides the necessary information
    on these conversions in its *Frequently Asked Questions* (FAQ) section (Beck 2003).
    According to this document, the radiance HYPR for the visible and near-infrared
    (VNIR) bands (i.e., Bands 1 to 70) is calculated by dividing the digital number
    in HYP by 40. The radiance for the shortwave infrared (SWIR) bands (i.e., Bands
    71 to 242) is calculated by dividing HYP by 80:


    ```

