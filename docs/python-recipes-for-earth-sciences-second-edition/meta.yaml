    \ for detecting these drainage divides and for ascribing numerical labels to each\
    \ catchment area, starting with one:\n\n```\nwatersh = watershed(SRTM,\n    markers=None,\n\
    \    watershed_line=True)\n```\n\nThe catchment areas are displayed in a pseudocolor\
