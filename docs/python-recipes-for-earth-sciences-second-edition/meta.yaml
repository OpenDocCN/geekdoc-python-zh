    ## 8.9 从图像中去除周期性噪声


    图像可能被各种噪声覆盖，这通常是由图像采集过程中的问题引起的。在大多数示例中，这是由低光照条件下传感器问题引起的随机噪声。另一种类型的噪声——在图像上叠加周期性而非随机干扰——例如，当电磁场干扰数码相机的记录系统时就会发生。这种干扰很普遍，尤其是在研究机构的实验室中，那里有大量的电子设备在运行。寻找噪声源通常既乏味又耗时且成本高昂。因此，数码相机系统的用户可能倾向于校正图像中的干扰。


    有多种方法可以从图像中去除噪声，例如使用在时域中运行的二维带通滤波器，类似于第 6.9 节中介绍的一维滤波器。该滤波器移除包含周期性噪声频率的频带，但它也可能移除实际的图像信息。该滤波器使用通常的方法设计，这些方法在第
    6.9 节中另有介绍，但它具有那里讨论的缺点。相反，我们也可以对图像进行二维傅里叶变换，在频谱中定位周期性噪声，并将功率谱密度的相应值替换为，例如，零值。在研究解决方案时，可以找到多种或多或少优雅且无瑕疵的变体，Ray
