    \nplt.figure()\nplt.axes(xlim=(0,1))\nplt.plot(f,abs(Pxxpr12))\nplt.plot(f,abs(Pxxpr21))\n\
    plt.legend(('1a/1b',\n            '1b/1a'))\nplt.xlabel('Frequency')\nplt.ylabel('Power')\n\
    plt.show()\n\n同样，基于上述原因，建议使用对数比率而非比率，尽管由于周期图的定性性质，其对周期图的影响很小（图9.11 c）：\n\nratio12log\
    \ = signal.detrend(ratio12log)\nratio21log = signal.detrend(ratio21log)\nf,Pxxlr12\
    \ = signal.periodogram(ratio12log,10,\n                                nfft=ratio12.size)\n\
    f,Pxxlr21 = signal.periodogram(ratio21log,10,\n                              \
    \  nfft=ratio21.size)\n\nplt.figure()\nplt.axes(xlim=(0,1))\nplt.plot(f,abs(Pxxlr12))\n\
    plt.plot(f,abs(Pxxlr21))\nplt.legend(('log(1a/1b)',\n            'log(1b/1a)'))\n\
    plt.xlabel('Frequency')\nplt.ylabel('Power')\nplt.show()\n\n根据作者所述，样本位于数组的行中，列在科学家A的数据集中是*Sand*、*Lehm*、*Ton*和*Wasser*，但在科学家B的数据集中只有*Sand*、*Lehm*和*Ton*。科学家A和科学家B对*Sand*、*Lehm*和*Ton*获得相同的值，但在将它们归一化为1后，在科学家A的分析中*Sand*和*Lehm*呈正相关，而在科学家B的分析中呈负相关。然而，根据我的解释，这是由于在科学家A的分析中，样本1到3中*Wasser*含量的减少产生了稀释效应，使得*Sand*和*Lehm*共同呈现正趋势，即在科学家B的分析中移除*Wasser*含量后，它们略微向负趋势旋转。换句话说，在干燥后，将科学家A和科学家B的值都归一化为1，无论是否包含*Wasser*，都会产生不同的效果：\n\
    \nA = np.array([\n    [0.1,0.2,0.1,0.6],\n    [0.2,0.1,0.2,0.5],\n    [0.3,0.3,0.1,0.3]\n\
    \    ]);\n\nB = np.array([\n    [0.25,0.50,0.25],\n    [0.40,0.20,0.40],\n   \
    \ [0.43,0.43,0.14]\n    ]);\n\n我们可以通过输入以下代码来计算相关系数\n\nr,pvalue = stats.pearsonr(A[:,0],A[:,1])\n\
    print(r)\nr,pvalue = stats.pearsonr(B[:,0],B[:,1])\nprint(r)\n\n得到\n\n0.4999999999999997\n\
    -0.5582820220872051\n\n这显示了科学家A和科学家B数据集中相关系数的不同符号。我们可以通过输入以下代码来显示数据（图9.12 a）。\n\
    \n![](img/f6c4e7e52658f332a1ff43bb13764e42_471_0.png)\n\n图9.12 a 在Sand、Lehm和Ton（英文：sand、loam和clay）的三组分系统中，根据Aitchison（1999，2003）的观点，由Wasser（英文：water）产生的稀释效应导致的伪相关，以及b相应的对策（数据来自Pawlowsky-Glahn和Egozcue\
    \ 2013）。详细描述见正文。\n\nplt.figure()\nplt.axes(position=[0.1,0.15,0.35,0.75])\nplt.plot([1,2,3],A)\n\
    plt.legend(['Sand','Lehm','Ton','Wasser'])\nplt.axes(position=[0.55,0.15,0.35,0.75])\n\
    plt.plot([1,2,3],B)\nplt.legend(['Sand','Lehm','Ton'])\nplt.show()\n\n我们可以通过计算相关矩阵来观察这种效应（注意，表2中科学家B的相关矩阵的值在论文中略有不同），输入以下代码\n\
    \ncorr_A = np.corrcoef(np.transpose(A))\nprint(corr_A)\ncorr_B = np.corrcoef(np.transpose(B))\n\
    print(corr_B)\n\n得到\n\n[[ 1.000e+00 5.000e-01 7.661e-17 -9.820e-01]\n [ 5.000e-01\
    \ 1.000e+00 -8.660e-01 -6.547e-01]\n [ 7.662e-17 -8.660e-01 1.000e+00 1.890e-01]\n\
    \ [-9.820e-01 -6.547e-01 1.890e-01 1.000e+00]]\n[[ 1.         -0.5583      -0.0675\
    \    ]\n [-0.5583      1.         -0.7901    ]\n [-0.0675     -0.7901      1.\
    \        ]]]\n\n如上所述，在科学家A的分析中*Sand*和*Lehm*的共同正趋势，在科学家B通过干燥样本移除*Wasser*含量的负趋势后被消除了。我们根据John\
    \ Aitchison的原理，通过计算对数比率来校正稀释效应：\n\nlrA = np.zeros(A.shape)\nlrA[:,0] = np.log(A[:,0]/A[:,1]);\n\
    lrA[:,1] = np.log(A[:,0]/A[:,2]);\nlrA[:,2] = np.log(A[:,1]/A[:,2]);\n\nlrB =\
    \ np.zeros(B.shape)\nlrB[:,0] = np.log(B[:,0]/B[:,1]);\nlrB[:,1] = np.log(B[:,0]/B[:,2]);\n\
    lrB[:,2] = np.log(B[:,1]/B[:,2]);\n\n并通过输入以下代码来显示数据（图9.12 b）\n\nplt.figure()\n\
    plt.axes(position=[0.1,0.15,0.35,0.75])\nplt.plot([1,2,3],lrA[:,0:3])\nplt.legend(['Sand','Lehm','Ton'])\n\
    plt.axes(position=[0.55,0.15,0.35,0.75])\nplt.plot([1,2,3],lrB[:,0:3])\nplt.legend(['Sand','Lehm','Ton','Wasser'])\n\
    plt.show()\n\n如我们所见，数据集现在是相同的，相关性没有差异。我们也可以通过计算几乎相同的对数比率相关矩阵来验证这一结果：\n\ncorr_lrA\
    \ = np.corrcoef(np.transpose(lrA[:,0:3]))\nprint(corr_lrA)\ncorr_lrB = np.corrcoef(np.transpose(lrB[:,0:3]))\n\
    print(corr_lrB)\n\n得到\n\n[[ 1.00000000e+00 1.89453103e-17 -7.37737470e-01]\n [\
    \ 1.89453103e-17 1.00000000e+00 6.75087717e-01]\n [-7.37737470e-01 6.75087717e-01\
    \ 1.00000000e+00]]\n[[ 1.00000000e+00 4.24369142e-18 -7.30565053e-01]\n [ 4.24369142e-18\
    \ 1.00000000e+00 6.82843103e-01]\n [-7.30565053e-01 6.82843103e-01 1.00000000e+00]]\n\
    \n这个过程产生了近似相同、真实且符合预期的相关性。\n这三个例子清楚地表明了闭合和效应对闭合数据的重要性。必须仔细研究单个变量可能的稀释效应，特别是在对成分数据进行因果研究时，因为此类研究经常在古气候学等领域进行。因此，Aitchison的对数比率变换是在对成分数据进行多元统计分析（例如，第9.2至9.6节）之前，对数据集进行预处理的一种可能方法。\n\
