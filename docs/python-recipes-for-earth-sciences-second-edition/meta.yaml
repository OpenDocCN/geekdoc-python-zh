    \ as an alternative to the GIF. It is similar to the GIF in that it also uses\
    \ a fixed 8 bit colormap of 256 colors. Alternatively, grayscale images of 1 to\
    \ 16 bits can be stored, as can 24 bit and 48 bit color images. The PNG format\
    \ uses compression without losing data, and the employed method is better than\
    \ that used for GIF images.\n- *Tagged Image File Format* (TIFF)–This format was\
    \ jointly designed by the Aldus Corporation and Microsoft in 1986 with the goal\
    \ of becoming an industry standard for exchanging image files. A TIFF file includes\
    \ an image file header, a directory, and the data in all available graphics and\
    \ image file formats. Some TIFF files even contain vector and raster versions\
