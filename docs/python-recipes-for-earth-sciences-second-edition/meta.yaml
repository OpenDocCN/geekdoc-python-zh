    # 7.5 The Shuttle Radar Topography Mission SRTM


    The *Shuttle Radar Topography Mission* (SRTM) was an 11-day mission of the Space
    Shuttle *Endeavour* in February 2000 that used a radar system to map the Earth''s
    surface (Farr and Kobrick 2000; Farr et al. 2007). SRTM was an international project
    spearheaded by the National Geospatial-Intelligence Agency (NGA) and the National
    Aeronautics and Space Administration (NASA). Detailed information on the SRTM
    project (including a gallery of images and a data users forum) can be accessed
    on NASA''s website:


    ```

    https://www2.jpl.nasa.gov/srtm/

    ```


    The data were processed at the Jet Propulsion Laboratory. They are distributed
    through the United States Geological Survey''s (USGS) National Map Viewer and
    Download Platform:


    ```

    https://www.usgs.gov/core-science-systems/ngp/tnm-delivery/

    ```'
  - "[PAGE 295]\n\nAt one time, the raw data could be downloaded as *int16* data from\
    \ a USGS server, though this server is no longer available:\n\n```\nhttp://dds.cr.usgs.gov/srtm/\n\
    ```\n\nThe directory contained zipped files of SRTM DEMs from various areas of\
    \ the world, which were processed by the SRTM global processor and sampled at\
    \ resolutions of 1 arc second (SRTM-1, 30 m grid) and 3 arc seconds (SRTM-3, 90\
    \ m grid). As an example, we downloaded the 1.7 MB file *s01e036.hgt.zip* from\n\
    \n```\nhttp://dds.cr.usgs.gov/srtm/version2_1/SRTM3/Africa/\n```\n\nwhich contains\
    \ SRTM-3 data from the Kenya Rift Valley in eastern Africa. All elevations are\
    \ in meters and are referenced to the WGS84 EGM96 geoid, which is documented at\n\
    \n```\nhttp://earth-info.nga.mil/GandG/wgs84/index.html\n```\n\nThe name of this\
    \ file refers to the longitude and latitude of the lower-left (southwest) pixel\
    \ of the tile, that is, to a latitude one degree south and a longitude 36 degrees\
    \ east. SRTM-3 data contain 1,201 lines and 1,201 rows, with similar numbers of\
    \ overlapping rows and columns. After downloading *S01E036.hgt.zip*, we first\
    \ decompress the file and save *S01E036.hgt* in our working directory. The digital\
    \ elevation model is provided as 16 bit signed integer data in a simple binary\
    \ raster. The bit order is *big-endian* (Motorola's standard), which means that\
    \ the most significant bit comes first. The data are imported into the workspace\
    \ using\n\n```\nimport numpy as np\nimport numpy.ma as ma\nfrom scipy import signal\n\
    from matplotlib import cm\nfrom matplotlib.colors import LightSource\nimport matplotlib.pyplot\
