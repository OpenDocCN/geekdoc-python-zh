    \ across both frequency and time with a flexible resolution, and they can easily\
    \ map changes in the time–frequency domain.\n\nA wavelet transformation mathematically\
    \ decomposes a signal $x(t)$ into elementary functions $\\psi_{a,b}(t)$ derived\
    \ from a *mother wavelet* $\\psi(t)$ via dilation and translation,\n\n$$\\psi_{a,b}\
