    \ the Hough transform.\n\n```python\nI1 = io.imread('pollen.jpg')\nI1 = I1[::2,\
    \ ::2, :]\n\nplt.figure()\nio.imshow(I1)\nplt.axis('off')\nio.show()\n```\n\n\
    We can then reject the color information of the image and use the red color only:\n\
    \n```python\nI2 = I1[:, :, 1]\n\nplt.figure()\nio.imshow(I2)\nplt.axis('off')\n\
