    method. From a sample with n data points, n subsamples with n−1 data points are
    taken. The parameters of interest (e.g., the regression coefficients) are calculated
    for each of the subsamples. The mean and dispersion of the coefficients are then
    computed. The disadvantage of this method is the limited number of n'
