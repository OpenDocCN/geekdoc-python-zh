    According to the linear mixing model, $p$ independent variables $X = (x_1, x_2,
    \dots, x_p)$ are linearly mixed in $n$ measurements:


    $$X = A^T \cdot S$$


    We are interested in the source variables $S$ and in the mixing matrix $A$ (see
    Sect. 9.2). This task is perhaps analogous to being at a party in which many people
    are carrying on independent conversations: We can hear a mixture of the conversations
    but cannot distinguish them individually. We could perhaps install some microphones
    and use them to separate out the individual conversations. This dilemma is therefore
    sometimes known as the *cocktail party problem*. Officially, however, it is called
    *blind source separation*, which is defined by


    $$S = W^T X$$


    where $W^T$ is the separation matrix required to reverse the mixing and obtain
    the original signals. In the earth sciences, we encounter similar problems, for
    example, if we want to determine the relative contributions of different source
    rocks to basin sediments (as we did for PCA), but this time with the possibility
    that there are nonlinear dependencies in the data and that the data are not Gaussian
