    plt.plot(x,y,\n    marker='o',\n    linestyle='none')\nplt.show()\n\nr=np.corrcoef(x,y)\n\
    print(r)\n```\n\nyields\n\n```\n[[1.         0.3415448]\n [0.3415448 1.      \
    \  ]]\n```\n\nIncreasing the absolute $(x, y)$ values for this outlier results\
    \ in a dramatic increase in the correlation coefficient. Typing\n\n```python\n\
    x[30]=10\ny[30]=10\n\nplt.figure()\nplt.plot(x,y,\n        marker='o',\n     \
    \   linestyle='none')\nplt.show()\n\nr=np.corrcoef(x,y)\nprint(r)\n```\n\nyields\n\
    \n```\n[[1.         0.74130704]\n [0.74130704 1.        ]]\n```\n\nwhich reaches\
    \ a value close to $r=1$ if the outlier has a value of $(x, y) = (20,20)$. Typing\n\
    \n```python\nx[30]=20\ny[30]=20\n\nplt.figure()\nplt.plot(x,y,\n        marker='o',\n\
    \        linestyle='none')\nplt.show()\n\nr=np.corrcoef(x,y)\nprint(r)\n```\n\n\
    yields\n\n```\n[[1.         0.92488156]\n [0.92488156 1.        ]]\n```\n\nWe\
    \ can compare the sensitivity of Pearson's correlation coefficient with that of\
    \ both Spearman's correlation coefficient and Kendall's correlation coefficient\
    \ using `pearsonr()`, `spearmanr()`, and `kendalltau()` from the `stats` module\
    \ of the `SciPy` package. In contrast to `corrcoef()`, these functions do not\
    \ calculate correlation arrays (or matrices) that we can use later (e.g., in Chap.\
    \ 9) when calculating correlations within multivariate data sets. We type.\n\n\
    ```python\nrp,rppvalue=stats.pearsonr(x,y)\nrs,rspvalue=stats.spearmanr(x,y)\n\
    rk,rkpvalue=stats.kendalltau(x,y)\nprint(rp)\nprint(rs)\nprint(rk)\n```\n\nwhich\
    \ yields\n\n```\n0.9248815580753484\n-0.17298387096774195\n-0.12258064516129034\n\
    ```\n\nWe can observe that the alternative measures of correlation result in reasonable\
    \ values, in contrast to the overestimated value for Pearson's correlation coefficient,\
    \ which mistakenly suggests a strong interdependency between the variables. Although\
    \ outliers are easy to identify in a bivariate scatter, erroneous values can be\
    \ easily overlooked in large multivariate data sets (Chap. 9).\n\nVarious methods\
    \ exist for calculating the significance of Pearson's correlation coefficient.\
    \ The function `pearsonr()` also includes the possibility of evaluating the quality\
    \ of the result. The *p*-value is the probability of obtaining a correlation that\
    \ is at least as large as the observed value when the true correlation is zero.\
    \ If the *p*-value is small, then the correlation coefficient *r* is significant.\
    \ Typing\n\n```python\nrp,rppvalue=stats.pearsonr(x,y)\nprint(rp,rppvalue)\n```\n\
    \nyields\n\n```\n0.9248815580753484 1.0489538147952255e-13\n```\n\nIn our example,\
    \ the *p*-value `rppvalue` is close to zero, which suggests that the correlation\
    \ coefficient is significant. We can conclude from this experiment that this particular\
    \ significance test fails to detect correlations that can be attributed to an\
    \ outlier. We can therefore next try an alternative *t*-test statistic to determine\
    \ the significance of the correlation between *x* and *y*. According to this test,\
    \ we can reject the null hypothesis, that is, that there is no correlation if\
    \ the calculated *t* is larger than the critical *t* (*n*−2 degrees of freedom,\
    \ *α*=0.05). Typing\n\n```python\ntcalc=rp * ((len(x)-2)/(1-rp**2))**0.5\ntcrit=stats.t.ppf(1-0.05,len(x)-2)\n\
    print(tcalc)\nprint(tcrit)\n```\n\nyields\n\n```\n13.09814600608973\n1.6991270265334972\n\
    ```\n\nThis result indeed indicates that we can reject the null hypothesis, and\
    \ there is therefore no correlation.\n\nAs alternatives to detecting outliers,\
    \ *resampling schemes* and *surrogates* (e.g., the *bootstrap* or *jackknife*\
    \ methods) represent powerful tools for assessing the statistical significance\
    \ of the results. These techniques are particularly useful when scanning large\
    \ multivariate data sets for outliers (see Chap. 9). Resampling schemes repeatedly\
    \ resample the original data set of *n* data points either by choosing *n*−1 subsamples\
    \ *n* times (the jackknife) or by choosing an arbitrary set of subsamples with\
    \ *n* data points *with replacement* (the bootstrap). The statistics of these\
    \ subsamples provide better information on the characteristics of the population\
    \ than do the statistical parameters (e.g., mean, standard deviation, correlation\
    \ coefficients) computed from the full data set. This code allows for resampling\
    \ our bivariate data set, including the outlier (*x*, *y*) = (20, 20):\n\n```python\n\
    ind = np.linspace(0,30,31,\n    dtype=int)\nrhos1000 = np.zeros((1000,4))\nfor\
    \ i in range(1000):\n    indices = np.random.choice(ind,\n        size=31,\n \
    \       replace=True)\n    r = np.reshape(np.corrcoef(x[indices],\n        y[indices]),(1,4))\n\
    \    rhos1000[i,:] = r\n```\n\nThis code first resamples the data one thousand\
    \ times; it then calculates the correlation coefficient for each new subsample\
    \ and stores the result in the variable rhos1000. Since corrcoef() delivers a\
    \ 2-by-2 array (as mentioned above), rhos1000 has dimensions 1,000-by-4 (i.e.,\
    \ 1,000 values for each element of the 2-by-2 array). Plotting the histogram of\
