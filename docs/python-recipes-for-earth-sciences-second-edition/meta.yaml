    For quantitative analyses, these digital number (DN) values need to be converted
    into radiance and reflectance values, which is beyond the scope of this book.
    Radiance is the power density scattered from the Earth in a particular direction
    and is expressed in units of watts per square meter per steradian (i.e., Wm⁻²
    sr⁻¹) (Richards 2013). The radiance values need to be corrected for atmospheric
    and topographic effects in order to obtain earth surface reflectance percentages.
    The Landsat 8 Handbook provides the necessary information on these conversions:


    https://www.usgs.gov/media/files/landsat-8-data-users-handbook'
