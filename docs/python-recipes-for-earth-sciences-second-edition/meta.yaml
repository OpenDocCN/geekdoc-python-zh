    # 8.12 Shape-Based Object Detection in Images


    Counting objects within images based on their shapes is a highly time-consuming
    task. This is sometimes carried out for round objects, for example, when counting
    planktonic foraminifera shells in order to infer past sea surface temperatures,
    when counting diatom frustules in order to infer the past chemical composition
    of lake water, or when counting pollen grains in order to determine species assemblages,
    which can be used to reconstruct regional air temperature and precipitation. The
    linear objects that are determined include faults in aerial photos and satellite
    images (in order to derive the present-day stress field of an area) and annual
    layers (e.g., varves) in thin sections (in order to establish an annually resolved
    stratigraphy).


    The *Hough transform*—which was named after Paul VC Hough’s related 1962 patent—is
    a popular technique with which to detect objects within images based on their
    shapes. The Hough transform was originally used to detect linear features, but
    soon after being patented, it became generalized for use in identifying objects
    of any shape (Duda and Hart 1972; Ballard 1981). The book by Gonzalez and Woods
    (2018) contains a comprehensive introduction to the Hough transform and to its
    applications in detecting objects within images. According to the authors’ introduction
    to the method, the Hough transform is performed in two steps: In the first step,
    an edge detector is used to extract edge features (e.g., distinct sediment layers
    or the outlines of pollen grains) from an image. In the second step, lines (or
    objects of any other shape) that trace these edge features are identified. The
    *scikit-image* package contains functions that use the Hough transform to detect
    lines or circular objects.


    The classic Hough transform is used to detect lines in images. After applying
    an edge detector of any kind, we end up with a binary image that has black pixels
    on the edges and white pixels in between. We next describe the lines through a
    given black pixel using the Euclidean distance $\rho$ between the line and the
    origin and using the angle $\theta$ of the vector from the origin to the closest
    point on the line (Fig. 8.13 a):


    ```

    $\rho = x \cos \theta + y \sin \theta$

    ```


    The family of all lines passing through this particular pixel $(x_i, y_i)$ of
    an edge feature is displayed as a sinusoidal curve in the $(\theta, \rho)$ parameter
    space (Fig. 8.13 b). The intersection point $(\theta'', \rho'')$ of two such sinusoidal
    curves corresponds to the line that passes through two different pixels $(x_1,
    y_1)$ and $(x_2, y_2)$ of an edge feature. Next, we search for $n$ points $(x_i,
    y_i)$ in the Hough transform in which many lines intersect since these points
    define the line that traces an edge feature. Detecting circles instead of lines
    works in a similar manner by using the coordinates of the center of the circle
    and its radius instead of $\rho$ and $\theta$.'
