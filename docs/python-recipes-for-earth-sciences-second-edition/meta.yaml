    We begin by unmixing the variables using PCA. We calculate the principal components
    pcs, the mixing matrix a_pca, and the whitening matrix w_pca using


    ```

    pca = PCA(n_components=3)

    pca.fit(x)


    newx = pca.transform(x)

    newx = newx/np.std(newx, 0, ddof=1)


    pcs = pca.components_

    variances = pca.explained_variance_


    a_pca = np.dot(pcs, np.sqrt(np.diag(variances)))

    w_pca = np.dot(np.linalg.inv(np.sqrt(np.diag(variances))), pcs)

    ```


    The pre-whitening reduces the process of unmixing into independent components
    ($S$) to a problem of finding a suitable rotation matrix $B$ that can be applied
    to the variables $X_{PC}$:


    $$S = B^T X_{PC}$$


    We need to find a rotation matrix $B$ such that the variables $S$ have a completely
    non-Gaussian distribution. There are several possibilities for implementing such
    a non-Gaussian criterion, such as minimizing or maximizing the excess kurtosis


    $$\gamma = E(x^4) - 3(E(x^2))^2$$


    because this excess kurtosis $\gamma$ for normally distributed data is zero. $E$
    stands for the expected value (i.e., the mean value) of $x$. Note that the excess
    kurtosis differs from the kurtosis: The excess kurtosis is the kurtosis minus
    three since the kurtosis of Gaussian-distributed data is three (Sect. 3.2) but
    the excess kurtosis of such a distribution is zero. To find a $B$ that ensures
    a minimum or maximum excess kurtosis, a learning algorithm can be used that finds
    the fixed points of the learning rule:


    $$E(x(B^T x)^3) - 3||B||^2 B + f(||B||^2)B = 0$$


    The FastICA algorithm by Hyvärinen (1999)–which is based on a fixed point iteration
    scheme–is an efficient algorithm for solving this problem. The learning rule is
    reduced in this example to the form


    $$B(k) = E(x(B(k-1)^T x)^3) - 3B(k-1)$$'
