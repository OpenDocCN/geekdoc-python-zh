    \nplt.figure()\nplt.plot(f,Pxx)\nplt.show()\n\nplt.figure()\nplt.plot(t, x14,color='b')\n\
    plt.plot(t,xf14,color='r')\nplt.axis(np.array([0,200,-4,4]))\nplt.show()\n```\n\
    \nThe plots show the effect of this filter. The frequency band between 0.05 and\
    \ 0.15– and therefore also the frequency of 0.1–has been successfully removed\
    \ from the signal."
- md: '## 6.10 Adaptive Filtering


    The fixed filters used in the previous sections led to the basic assumption that
    the signal degradation is known and does not change with time. However, *a priori*
    knowledge of the signal and noise statistical characteristics is not usually available
    in most applications. In addition, both the noise level and the variance of the
    genuine signal can be highly nonstationary with respect to time, such as with
    stable isotope records during a glacial–interglacial transition. Fixed filters
    therefore cannot be used in a nonstationary environment in which there is no knowledge
    of the signal-to-noise ratio.


    Adaptive filters—which are widely used in the telecommunications industry—could
    help in overcoming these problems. An adaptive filter is an inverse modeling process
    that iteratively adjusts its own weights automatically without requiring any *a
    priori* knowledge of the signal or the noise. Operating an adaptive filter involves
    (1) a filtering process whose purpose is to produce an output signal in response
    to a sequence of data and (2) an adaptive process that provides a mechanism for
    adaptively controlling the filter weights (Haykin 2014).


    In most practical applications, the adaptive process is oriented toward minimizing
    an estimation error. The estimation error signal $e$ at an instant $i$ is defined
    as the difference between the desired response signal $d_i$ and the actual output
    signal $y_i$, which is the filtered version of an input signal $x_i$, as shown
    by


    $$e_i = d_i - y_i$$


    where $i = 1, 2, \dots, n$ and $n$ is the length of the input signal. In the case
    of a nonrecursive filter that is characterized by an array of filter weights $W$
    with $f$ elements, the output signal $y_i$ is given by the inner product of the
    transposed array $W$ and the input signal $X_i$:


    $$y_i = W^T \cdot X_i$$


    The choice of the desired response signal $d$ that is used in the adaptive process
    depends on the application. Traditionally, $d$ is a signal composed of a signal
    $s$ and random noise $n_0$. The signal $x$ contains noise $n_1$ that is uncorrelated
    with the signal $s$ but correlated in some unknown way with noise $n_0$. In noise
    canceling systems, the practical objective is to produce an output signal $y$
    that is a best fit to the desired response signal $d$ in the least squares sense.


    Different approaches have been developed for solving this multivariate minimum
    error optimization problem (e.g., Widrow and Hoff 1960; Widrow et al. 1975; Haykin
    2014). The selection of one algorithm over another is influenced by various factors,
    including the rate of convergence (i.e., the number of adaptive steps required
    for the algorithm to converge close enough to an optimum solution), the misadjustment
    (i.e., the measure of the amount by which the final value of the mean squared
    error deviates from the minimum squared error of an optimal filter; e.g., Wiener
    1949; Kalman and Bucy 1961), and the tracking (i.e., the capability of the filter
    to work in a nonstationary environment and to track changing statistical characteristics
    of the input signal) (Haykin 2014).


    The simplicity of the least-mean-square (LMS) algorithm—which was originally developed
    by Widrow and Hoff (1960)—has made it the benchmark against which other adaptive
    filtering algorithms are tested. For applications in the earth sciences, we use
    a variant of this filter to extract the noise from two signals $S$ and $X$, both
    of which contain the same signal $s$, but with uncorrelated noises $n_1$ and $n_2$
    (Hattingh 1988). As an example, we can consider a simple duplicate set of measurements
    of the same material, such as two parallel stable isotope records from the same
    foraminifera species. We would expect two time series, each with $n$ elements
    and that contain the same desired signal overlayed with different, uncorrelated
    noise. The first record is used as the primary input signal $S$,


    $$S = (s_1, s_2, \dots, s_n)$$


    and the second record is used as the reference input signal $X$:


    $$X = (x_1, x_2, \dots, x_n)$$


    As demonstrated by Hattingh (1988), the desired noise-free signal can be extracted
    by filtering the reference input signal $X$ using the primary input signal $S$
    as the desired response signal $d$. The minimum error optimization problem is
    solved by the least-mean-square norm. The mean squared error $e_i^2$ is a second-order
    function of the weights in the nonrecursive filter. The dependency of $e_i^2$
    on the unknown weights $W$ may be seen as a multidimensional paraboloid with a
    uniquely defined minimum point. The weights that correspond to the minimum point
    on this error surface define the optimal Wiener solution (Wiener 1949). The value
    that is computed for the weight array $W$ using the LMS algorithm represents an
    estimator whose expected value approaches the Wiener solution as the number of
    iterations approaches infinity (Haykin 2014). Gradient methods are used to reach
    the minimum point on the error surface. To simplify the optimization problem,
    Widrow and Hoff (1960) developed an approximation for the required gradient function
    that can be computed directly from the data. This leads to a simple relationship
    for updating the filter weight array $W$:


    $$W_{i+1} = W_i + 2 \cdot u \cdot e_i \cdot X_i$$


    The new set of filter weights $W_{i+1}$ is based on the previous set $W_i$ plus
    a term that is the product of a bounded step size (or convergence factor) $u$,
    a function of the input signal $X_i$, and a function of the error signal $e_i$.
    In other words, the error $e_i$ calculated from the previous step is fed back
    into the system in order to update the filter weights for the next step (Fig.
    6.6). The fixed convergence factor $u$ regulates the speed and stability of the
    adaptation. A low value of $u$ ensures a higher level of accuracy, but more data
    are needed to enable the filter to reach the optimum solution. In the modified
    version of the LMS algorithm by Hattingh (1988), this problem is overcome by processing
    the data in a loop such that the filter can have another chance to improve its
    own weights and adapt to changes in the data.


    In the following example, which introduces `canc`, each of these loop runs is
    called an iteration, and many loop runs are required if optimal results are to
    be achieved. This algorithm extracts the noise-free signal from two arrays $\mathbf{x}$
    and $\mathbf{s}$,


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_276_0.png)


    Fig. 6.6 Schematic of an adaptive filter. Each iteration involves a new estimate
    of the filter weights $W_{i+1}$ based on the previous set of filter weights $W_i$
    plus a term that is the product of a bounded step size $u$, a function of the
    input signal $X_i$, and a function of the error signal $e_i$. In other words,
    the error $e_i$ calculated in the previous step is fed back into the system in
    order to update filter weights for the next step (modified from Trauth 1998).


    which contain the correlated signals and uncorrelated noise. As an example, we
    generate two signals yn1 and yn2, which contain the same sine wave but different
    Gaussian noise:


    ```python

    import numpy as np

    from numpy import linalg as linalg

    from canc import canc

    from matplotlib import cm

    import scipy.signal as signal

    import matplotlib.pyplot as plt

    from numpy.random import default_rng


    x=np.linspace(0,100,1001)

    y=np.sin(x)

    rng=default_rng(0)

    yn1=y+0.5*rng.standard_normal(y.shape)

    yn2=y+0.5*rng.standard_normal(y.shape)


    plt.figure()

    plt.plot(x,yn1,x,yn2)

    plt.show()

    ```


    The algorithm `canc()` formats both signals, feeds them into the filter loop,
    corrects the signals for phase shifts, and formats the signals for the output
    arguments. The required input arguments are the signals `x` and `s`, the step
    size `u`, the filter length `l`, and the number of iterations `iter`. In our example,
    the two noisy signals are yn1 and yn2. We make an arbitrary choice of a filter
    with l = 5 filter weights. A value of u in the range of 0<u<1/λ_max (where λ_max
    is the largest eigenvalue of the autocorrelation matrix for the reference input
    signal) leads to reasonable results (Haykin 2014) (Fig. 6.7). The value of u is
    computed using


    ```python

    k=np.kron(yn1,np.transpose(yn1[None]))

    w,v=linalg.eig(k)

    u=1/np.max(w)

    print(u)

    ```


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_277_0.png)


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_277_1.png)


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_277_2.png)


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_277_3.png)


    Fig. 6.7 Output signal of the adaptive filter. a The duplicate records that have
    been corrupted by uncorrelated noise are fed into the adaptive filter with 5 weights
    with a convergence factor of 0.0001. After 20 iterations, the filter yields b
    the learning curve, c the noise-free record, and d the noise extracted from the
    duplicate records.'
  mdcn: '## 6.10 自适应滤波


    前几节中使用的固定滤波器基于一个基本假设：信号衰减是已知的且不随时间变化。然而，在大多数应用中，通常无法获得信号和噪声统计特性的*先验*知识。此外，噪声水平和真实信号的方差都可能随时间高度非平稳，例如在冰期-间冰期过渡期间的稳定同位素记录。因此，在不知道信噪比的非平稳环境中，无法使用固定滤波器。


    自适应滤波器——在电信行业被广泛使用——可能有助于克服这些问题。自适应滤波器是一种逆建模过程，它能自动迭代调整自身的权重，而无需任何关于信号或噪声的*先验*知识。操作自适应滤波器涉及（1）一个滤波过程，其目的是根据数据序列产生输出信号，以及（2）一个自适应过程，它提供了一种机制来自适应地控制滤波器权重（Haykin
    2014）。


    在大多数实际应用中，自适应过程旨在最小化估计误差。时刻 $i$ 的估计误差信号 $e$ 定义为期望响应信号 $d_i$ 与实际输出信号 $y_i$ 之差，后者是输入信号
    $x_i$ 的滤波版本，如公式所示：


    $$e_i = d_i - y_i$$


    其中 $i = 1, 2, \dots, n$，$n$ 是输入信号的长度。对于一个由包含 $f$ 个元素的滤波器权重数组 $W$ 表征的非递归滤波器，输出信号
    $y_i$ 由转置数组 $W$ 和输入信号 $X_i$ 的内积给出：


    $$y_i = W^T \cdot X_i$$


    自适应过程中使用的期望响应信号 $d$ 的选择取决于具体应用。传统上，$d$ 是由信号 $s$ 和随机噪声 $n_0$ 组成的信号。信号 $x$ 包含与信号
    $s$ 不相关但与噪声 $n_0$ 以某种未知方式相关的噪声 $n_1$。在噪声消除系统中，实际目标是产生一个输出信号 $y$，使其在最小二乘意义上最接近期望响应信号
    $d$。


    已经开发了不同的方法来解决这个多元最小误差优化问题（例如，Widrow and Hoff 1960; Widrow et al. 1975; Haykin
    2014）。选择一种算法而非另一种会受到多种因素的影响，包括收敛速度（即算法收敛到足够接近最优解所需的自适应步数）、失调（即最终均方误差值偏离最优滤波器最小方差的程度的度量；例如，Wiener
    1949; Kalman and Bucy 1961）以及跟踪能力（即滤波器在非平稳环境中工作并跟踪输入信号统计特性变化的能力）（Haykin 2014）。


    最小均方（LMS）算法——最初由 Widrow 和 Hoff（1960）开发——因其简单性已成为测试其他自适应滤波算法的基准。对于地球科学的应用，我们使用该滤波器的一个变体来从两个信号
    $S$ 和 $X$ 中提取噪声，这两个信号都包含相同的信号 $s$，但带有不相关的噪声 $n_1$ 和 $n_2$（Hattingh 1988）。例如，我们可以考虑对同一材料进行的简单重复测量，比如来自同一有孔虫物种的两个平行稳定同位素记录。我们期望得到两个时间序列，每个序列包含
    $n$ 个元素，并且包含叠加了不同、不相关噪声的相同期望信号。第一条记录用作主要输入信号 $S$，


    $$S = (s_1, s_2, \dots, s_n)$$


    第二条记录用作参考输入信号 $X$：


    $$X = (x_1, x_2, \dots, x_n)$$


    正如 Hattingh（1988）所证明的，可以通过使用主要输入信号 $S$ 作为期望响应信号 $d$ 来滤波参考输入信号 $X$，从而提取出期望的无噪声信号。最小误差优化问题通过最小均方范数来解决。均方误差
    $e_i^2$ 是非递归滤波器中权重的二阶函数。$e_i^2$ 对未知权重 $W$ 的依赖性可以看作是一个具有唯一定义的最小点的多维抛物面。对应于该误差曲面上最小点的权重定义了最优维纳解（Wiener
    1949）。使用 LMS 算法为权重数组 $W$ 计算出的值代表一个估计器，当迭代次数趋于无穷时，其期望值趋近于维纳解（Haykin 2014）。梯度方法用于到达误差曲面上的最小点。为了简化优化问题，Widrow
    和 Hoff（1960）开发了一种可以直接从数据计算所需梯度函数的近似方法。这导致了一个用于更新滤波器权重数组 $W$ 的简单关系式：


    $$W_{i+1} = W_i + 2 \cdot u \cdot e_i \cdot X_i$$


    新的滤波器权重集 $W_{i+1}$ 基于前一个权重集 $W_i$ 加上一项，该项是有界步长（或收敛因子）$u$、输入信号 $X_i$ 的函数和误差信号 $e_i$
    的函数的乘积。换句话说，从前一步计算出的误差 $e_i$ 被反馈到系统中，以便为下一步更新滤波器权重（图 6.6）。固定的收敛因子 $u$ 调节自适应的速度和稳定性。较低的
    $u$ 值确保更高的精度，但需要更多数据才能使滤波器达到最优解。在 Hattingh（1988）修改的 LMS 算法版本中，通过循环处理数据来克服这个问题，使滤波器有机会再次改进其权重并适应数据的变化。


    在下面介绍 `canc` 的示例中，每次循环运行称为一次迭代，如果要达到最佳结果，需要进行多次循环运行。该算法从两个数组 $\mathbf{x}$ 和 $\mathbf{s}$
    中提取无噪声信号，


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_276_0.png)


    图 6.6 自适应滤波器示意图。每次迭代都涉及基于前一组滤波器权重 $W_i$ 加上一项（该项是有界步长 $u$、输入信号 $X_i$ 的函数和误差信号 $e_i$
    的函数的乘积）对滤波器权重 $W_{i+1}$ 的新估计。换句话说，前一步计算出的误差 $e_i$ 被反馈到系统中，以便为下一步更新滤波器权重（修改自 Trauth
    1998）。


    这两个数组包含相关信号和不相关噪声。例如，我们生成两个信号 yn1 和 yn2，它们包含相同的正弦波但不同的高斯噪声：


    ```python

    import numpy as np

    from numpy import linalg as linalg

    from canc import canc

    from matplotlib import cm

    import scipy.signal as signal

    import matplotlib.pyplot as plt

    from numpy.random import default_rng


    x=np.linspace(0,100,1001)

    y=np.sin(x)

    rng=default_rng(0)

    yn1=y+0.5*rng.standard_normal(y.shape)

    yn2=y+0.5*rng.standard_normal(y.shape)


    plt.figure()

    plt.plot(x,yn1,x,yn2)

    plt.show()

    ```


    算法 `canc()` 格式化两个信号，将它们输入滤波器循环，校正信号的相位偏移，并格式化信号以用于输出参数。所需的输入参数是信号 `x` 和 `s`、步长
    `u`、滤波器长度 `l` 和迭代次数 `iter`。在我们的示例中，两个带噪声的信号是 yn1 和 yn2。我们任意选择一个具有 l = 5 个滤波器权重的滤波器。在
    0<u<1/λ_max（其中 λ_max 是参考输入信号自相关矩阵的最大特征值）范围内的 u 值会导致合理的结果（Haykin 2014）（图 6.7）。u
    的值使用以下代码计算：


    ```python

    k=np.kron(yn1,np.transpose(yn1[None]))

    w,v=linalg.eig(k)

    u=1/np.max(w)

    print(u)

    ```


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_277_0.png)


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_277_1.png)


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_277_2.png)


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_277_3.png)


    图 6.7 自适应滤波器的输出信号。a 被不相关噪声破坏的重复记录被输入到具有 5 个权重、收敛因子为 0.0001 的自适应滤波器中。经过 20 次迭代后，滤波器产生
    b 学习曲线，c 无噪声记录，以及 d 从重复记录中提取的噪声。'
