  md: "We then reset the random number generator using `random.seed(0)` and calculate\
    \ n pseudorandom numbers (in °) using the algorithm created by Best and Fisher\
    \ (1979):\n\n```\nnp.random.seed(0)\ntau=1+(1+4*kappa**2)**0.5\nrho=(tau - (2*tau)**0.5)/(2*kappa)\n\
