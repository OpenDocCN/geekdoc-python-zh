  mdcn: '## 7 空间数据


    ### 7.1 引言


    地球科学中的大多数数据在空间上分布，要么是*矢量数据*（即点、线、多边形；例如，河网、海岸线），要么是*栅格数据*（即方形网格、三角形网格；例如，网格化地形）。矢量数据是通过数字化地图对象（如水系网络或岩性单元轮廓）生成的。栅格数据可以直接从卫星传感器输出获取，但网格化数据也可以从不规则分布的野外采样中插值得到（网格化）。


    第7.2节以海岸线数据为例介绍矢量数据。然后，第7.3至7.5节使用数字地形数据说明栅格数据的获取和处理。自20世纪90年代初以来，数字高程数据的可用性和使用量已显著增加。分辨率为5弧分（即约9公里）的ETOPO5是最早可用的地形和水深数据集之一。2001年10月，它被分辨率为2弧分（即约4公里）的ETOPO2取代，2009年3月，分辨率为1弧分（即约2公里）的ETOPO1开始可用。ETOPO系列的最新成员是ETOPO
    2022数据集，其分辨率为15弧秒。还有一个名为GTOPO30的地形数据集，于1996年完成，水平网格间距为30弧秒（即约1公里）。最近，航天飞机雷达地形任务（SRTM）的30米和90米分辨率数据已在大多数科学研究中取代了较旧的数据集。


    本章的第二部分涉及从不均匀间隔数据计算连续表面以及空间数据的统计。在地球科学中，大多数数据是以不规则模式收集的。岩石样本的获取


    **补充信息** 在线版本包含补充材料，可访问 https://doi.org/10.1007/978-3-031-56906-7_7。


    其中 `kron()` 返回 `yn1` 和 `yn1''` 的克罗内克张量积（这是一个通过取 `yn1` 和 `yn1''` 元素之间所有可能乘积形成的矩阵），`eig()`
    返回 `k` 的特征向量。这得出


    ```

    0.0013492697467229055

    ```


    我们现在运行自适应滤波器 `canc()` 20次迭代，并使用上面的 `u` 值：


    ```

    z,e,mer,w=canc(yn1,yn2,0.0013,5,20)

    ```


    `canc()` 的输出参数是滤波后的主信号 `z`、提取的噪声 `e`、以其执行的迭代次数和步长 `u` 计算的均方误差 `mer`，以及 `yn1` 和
    `yn2` 中每个数据点的滤波器权重 `w`。均方误差 `mer` 的图


    ```

    plt.figure()

    plt.plot(mer)

    plt.show()

    ```


    说明了自适应滤波器的性能，尽管所选步长（`u=0.0013`）显然导致了相对较快的收敛。在大多数示例中，较小的步长会降低收敛速度，但会提高最终结果的质量。因此，我们减小
    `u` 并使用更多迭代再次运行滤波器：


    ```

    z,e,mer,w=canc(yn1,yn2,0.0001,5,20)

    ```


    均方误差 `mer` 与迭代次数的关系图


    ```

    plt.figure()

    plt.plot(mer)

    plt.show()

    ```


    现在在大约六次迭代后收敛。在实践中，用户应改变输入参数 `u` 和 `l` 以获得最佳结果。我们现在可以将输出信号与原始无噪声信号进行比较：


    ```

    plt.figure()

    plt.plot(x,y,''b'',x,z,''r'')

    plt.show()

    ```


    该图表明，滤波器已显著降低了信号的噪声水平。接下来，图


    ```

    plt.figure()

    plt.plot(x,e,''r'')

    plt.show()

    ```


    显示从信号中提取的噪声。使用 `canc()` 的最后一个输出参数，我们可以计算并显示最后一次迭代中来自 `w` 的平均滤波器权重：


    ```

    wmean=np.mean(w,axis=0)


    plt.figure()

    plt.plot(wmean)

    plt.show()

    ```


    滤波器的频率特性提供了滤波器效果的更直观表示，


    ```

    f,h=signal.freqz(wmean,1,worN=1024,fs=10)


    plt.figure()

    plt.plot(f,np.abs(h))

    plt.show()

    ```


    这表明它是一个具有相对平滑过渡带的低通滤波器。这意味着它不具备例如使用巴特沃斯方法设计的递归滤波器的质量。然而，滤波器权重是在优化过程中计算的，而不是任意选择的。


    自适应滤波器的优势在于其能够过滤沿时间轴具有可变信噪比的时间序列。由于滤波器权重数组 W 是为每个单独的数据点更新的，因此这些滤波器甚至用于实时应用，例如电信系统。我们可以通过一个示例来检查这种行为，其中时间序列中间（x=500）的信噪比从大约10%降低到零：


    ```

    x=np.linspace(0,100,1001)

    y=np.sin(x)

    rng=default_rng(0)

    yn1=y+0.5*rng.standard_normal(y.shape)

    yn2=y+0.5*rng.standard_normal(y.shape)

    yn1[501:]=y[501:]

    yn2[501:]=y[501:]


    plt.figure()

    plt.plot(x,yn1,x,yn2)

    plt.show()

    ```


    `u` 的值再次通过以下方式计算


    ```

    k=np.kron(yn1,np.transpose(yn1[None]))

    w,v=lanalg.eig(k)

    u=1 / np.max(w)

    print(u)

    ```


    这得出


    ```

    0.0016086744408774288

    ```


    我们现在运行自适应滤波器 `canc()` 20次迭代，并使用上面的 `u` 值：


    ```

    z,e,mer,w=canc(yn1,yn2,0.0013,5,20)

    ```


    均方误差 `mer` 与以步长 `u` 执行的迭代次数的关系图


    ```

    plt.figure()

    plt.plot(mer)

    plt.show()

    ```


    说明了自适应滤波器的性能，尽管所选步长 `u=0.0016` 显然导致了相对较快的收敛。同样，我们现在可以将输出信号与原始无噪声信号进行比较：


    ```

    plt.figure()

    plt.plot(x,y,''b'',x,z,''r'')

    plt.show()

    ```


    该图显示滤波器输出 `y` 几乎与无噪声信号 `x` 相同。图


    ```

    plt.figure()

    plt.plot(x,e,''r'')

    plt.show()

    ```


    显示从信号中提取的噪声。在这里，我们可以观察到一些信号分量，在信号信噪比变化点之后的无噪声时间段中，被滤波器错误地移除了。使用 `canc()` 的最后一个输出参数，我们可以计算并显示最后一次迭代的滤波器权重
    `w`，


    ```

    X=np.linspace(1,5,5)

    Y=np.linspace(2,999,997)

    X, Y=np.meshgrid(X, Y)

    W=w[2:999,0:]


    plt.figure()

    fig,ax=plt.subplots(subplot_kw={"projection":"3d"})

    surf=ax.plot_surface(X,Y,W,cmap=cm.coolwarm)

    ax.view_init(60,100-90)

    plt.show()

    ```


    这很好地显示了滤波器权重在信噪比变化前后的适应性。我们只绘制 `w` 的中间部分，因为由于滤波器长度为 `l`，边缘 `1 : (l-1) / 2` 和 `end-
    (l-1) / 2 : end` 都是零。我们也可以使用这个示例来演示 `u` 和 `l` 的值对自适应滤波器性能的影响。理论上，较小的 `u` 会导致更准确的结果，但对变化信噪比的快速适应效果不佳。较大的
    `l` 值也会产生更好的结果，但通过滤波过程丢失的数据点数量会增加 `(l-1) / 2`。


    该算法的应用已在海洋沉积物的重复氧同位素记录中得到证明（Trauth 1998）。Trauth（1998）的工作不仅说明了改进的LMS算法的使用，还说明了另一种自适应滤波器——即递归最小二乘（RLS）算法——在各种不同环境中的使用（Trauth
    1998; Haykin 2014）。


