    # 3.12 The Ansari–Bradley Test


    The Ansari–Bradley test was introduced by Abdur R. Ansari and Ralph A. Bradley
    (1960) and can be used to determine whether two samples come from the same distribution
    (null hypothesis) or whether they come from distributions with the same median
    and shape but different dispersions (e.g., the variances) (alternative hypothesis).
    In contrast to the F-test, which compares the dispersions of normally distributed
    data, the Ansari–Bradley test compares dispersions without requiring a normality
    assumption for the underlying population, that is, it is a non-parametric hypothesis
    test.


    The test requires that the samples have similar medians, which can be achieved
    by subtracting the medians from the samples. The test combines both sets of measurements
    (i.e., samples 1 and 2) and arranges them together in ascending order. There are
    different ways to calculate the test statistic $A_n$. Here, we use the method
    given by Hedderich and Sachs (2012, page 463),


    $$A_n = \sum_{i=1}^{n} \left( \frac{n+1}{2} - \left| i - \frac{n+1}{2} \right|
    \right) V_i$$


    where the value of the indicator function $V_i$ is 1 for values from sample 1
    and 0 for values from sample 2. The test statistic is therefore equal to the sum
    of the absolute values of the deviations from the mean value $(n+1)/2$ (Hedderich
    and Sachs 2012). The data are first concatenated and sorted (as in the Mann–Whitney
    test introduced in Sect. 3.11). Subsequently, the smallest and largest values
    are assigned rank 1, the'
- md: "second-smallest and second-largest values are assigned rank 2, and so forth.\
    \ The smaller the $A_n$, the larger the dispersion of the values between the two\
    \ samples 1 and 2. Again, the ranking of the data may also be corrected for tied\
    \ values, as was previously carried out in the Mann–Whitney test. For $n \\leq\
    \ 0$, we can find the critical values for the test statistic $A_n$ in Table 3.1\
    \ in the open-access article by Ansari and Bradley (1960). For larger values of\
    \ $n$, we use the standard normal distribution,\n\n$$z = \\frac{A_n - \\mu_{A_n}}{\\\
    sqrt{\\sigma_{A_n}^2}}$$\n\nwith\n\n$$\\mu_{A_n} = \\begin{cases} \\frac{1}{4}n_1(n+2),\
    \ & \\text{if } n \\text{ is even} \\\\ \\frac{1}{4}n_1(n+1)^2/n, & \\text{if\
    \ } n \\text{ is odd} \\end{cases}$$\n\n$$\\sigma_{A_n} = \\begin{cases} n_1n_2(n^2-4)/(48(n-1)),\
    \ & \\text{if } n \\text{ is even} \\\\ n_1n_2(n+1)(n^2+3)/(48n^2), & \\text{if\
    \ } n \\text{ is odd} \\end{cases}$$\n\nwhich is again from Hedderich and Sachs\
    \ (2012, page 463). The null hypothesis can be rejected if the absolute measured\
    \ z-value is higher than the absolute critical z-value, which depends on the significance\
    \ level $\\alpha$.\n\nOur first example uses the Ansari–Bradley test to determine\
    \ whether two samples data1 and data2 (each consisting of eight measurements)\
    \ come from the same distribution (null hypothesis) or from distributions with\
    \ the same median and shape but different dispersions (alternative hypothesis).\
