    plt.figure()\nplt.plot(meters,age,\n    marker='o',\n    linestyle='none')\nplt.show()\n\
    ```\n\nWe can observe a strong linear trend in the plot, which suggests some interdependency\
    \ between the two variables `meters` and `age`. This trend can be described by\
    \ Pearson's correlation coefficient $r$, where $r=1$ indicates a perfect positive\
    \ correlation (i.e., age increases with meters), $r=0$ suggests no correlation,\
    \ and $r=-1$ indicates a perfect negative correlation. We use `corrcoef()` to\
    \ compute Pearson's correlation coefficient,\n\n```python\nr=np.corrcoef(meters,age)\n\
    print(r)\n```\n\nwhich results in the following output:\n\n```\n[[1.         0.956335]\n\
    \ [0.956335 1.        ]]\n```\n\nThe function `corrcoef()` calculates an array\
    \ (or matrix) of Pearson's correlation coefficients for all possible combinations\
    \ of the two variables `age` and `meters`. The value $r=0.9563$ suggests that\
    \ the two variables `age` and `meters` are strongly dependent on each other.\n\
    \nHowever, Pearson's correlation coefficient is highly sensitive to outliers,\
    \ as illustrated by the following example. Let us generate a normally distributed\
    \ cluster of thirty data points with a mean of zero and a standard deviation of\
    \ one. In order to obtain identical data values, we reset the random number generator\
    \ using 0 as the seed:\n\n```python\nrng=default_rng(0)\nx=rng.standard_normal((30))\n\
    y=rng.standard_normal((30))\n\nplt.figure()\nplt.plot(x,y,\n    marker='o',\n\
    \    linestyle='none')\nplt.show()\n```\n\nTyping\n\n```python\nr=np.corrcoef(x,y)\n\
    print(r)\n```\n\nyields\n\n```\n[[ 1.          -0.33210663]\n [-0.33210663   1.\
    \        ]]\n```\n\nAs expected, the correlation coefficient for these random\
    \ data is very low. We now introduce a single outlier into the data set in the\
    \ form of an exceptionally high (x, y) value in which x = y. The correlation coefficient\
    \ for the bivariate data set, including the outlier (x, y) = (5, 5), is much larger\
