    The critical $\chi^2$-value can be calculated using `chi2.ppf()`. The $\chi^2$-test
    requires the degrees of freedom $\Phi$. In our example, we test the hypothesis
    that the data are uniformly distributed (i.e., we estimate one parameter). Since
    the number of classes is 12, the number of degrees of freedom is $\Phi = 12-1-1
    = 10$. We test our hypothesis at a $p=5\%$ significance level. The function `chi2.ppf()`
    computes the inverse of the cumulative distribution function (CDF) of the $\chi^2$-distribution,
    with numbers of parameters specified by $\Phi$ for the corresponding probabilities
    in $p$,


    ```

    chi2crit = stats.chi2.ppf(1-0.05,12-1-1)

    print(chi2crit)

    ```


    which yields


    ```

    18.307038053275146

    ```


    Since the critical $\chi^2$ of 18.3070 is well below the measured $\chi^2$ of
    748.6000, we can reject the null hypothesis and conclude that our data do not
    follow a uniform distribution (i.e., they are not randomly distributed).


    ## 10.6 Testing for the Significance of a Mean Direction


    Once we have measured a set of directional data in the field, we may wish to know
    whether the data document a prevailing direction. We can find out using Rayleigh''s
    test for the significance of a mean direction (Mardia 1972; Mardia and Jupp 1999).
    This test uses the mean resultant length introduced in Sect. 10.3, which increases
    as the preferred direction increases:


    $$\bar{R} = \frac{1}{n} \sqrt{\left(\sum \sin \theta_i\right)^2 + \left(\sum \cos
    \theta_i\right)^2}$$


    The data show a preferred direction if the calculated mean resultant length is
    below a critical value (Mardia 1972) (Tab. 10.1). As an example, we again load
    the data contained in the file *directional_1.txt*:


    ```

