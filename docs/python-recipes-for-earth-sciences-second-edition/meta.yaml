  - "[PAGE 225]\n\nWe begin with the assumption that the phase space is only one-dimensional.\
    \ We use `pdist()` to calculate a list D of pairwise distances between all points\
    \ from the phase space trajectory. The function `squareform()` converts the list\
    \ D into a symmetric distance matrix S:\n\n```\nn=len(series1L)\n\nD=distance.pdist(np.tile(series1L,\
    \ (2,1)).T)\nS=distance.squareform(D);\n```\n\nWe can now plot the distance matrix\
    \ for the data set,\n\n```\nplt.figure()\nplt.imshow(S,\n    origin='lower')\n\
    plt.xlabel('Time')\nplt.ylabel('Time')\nplt.show()\n```\n\nwhere a colorbar provides\
    \ a quantitative measure of the distances between states (Fig. 5.29). We now apply\
    \ a threshold ε to the distance matrix in order to generate the black/white recurrence\
    \ plot (Fig. 5.30):\n\n```\nplt.figure()\nplt.imshow(S<1,\n    cmap='gray_r',\n\
    \    origin='lower')\nplt.xlabel('Time')\nplt.ylabel('Time')\nplt.show()\n```\n\
    \nBoth plots reveal periodically recurring patterns. The distances between these\
    \ patterns represent the cycles contained in the time series. The most important\
    \ periodic patterns have periods of 200 and 100 kyr, respectively. The 200 kyr\
    \ period is the most obvious due to the superposition of the 100 and 40 kyr cycles,\
    \ which are common divisors of 200 kyr. Moreover, there are smaller substructures\
    \ within the recurrence plot that have periods of 40 and 20 kyr, respectively.\n\
    As a second example, we now apply the method of recurrence plots to the Lorenz\
    \ system. We again generate xyz triplets from the coupled differential equations:\n\
    \n```\ndt=0.01\ns=10\nr=28\nb=8/3\n```"
