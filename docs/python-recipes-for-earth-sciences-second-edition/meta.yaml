    ## 10.7 两组方向数据差异检验


    让我们考虑文件*directional_1.txt*和*directional_2.txt*中的两组测量数据。我们希望比较这两组方向数据，并检验它们没有显著差异的原假设。我们使用Watson-Williams检验来检验两个平均方向的相似性，


    $$F = \left(1 + \frac{3}{8\kappa}\right) \frac{(n-2)(R_A + R_B - R_T)}{n - R_A
    - R_B}$$


    其中$\kappa$是集中参数，$R_A$和$R_B$分别是样本A和B的合成向量长度，$R_T$是合并样本的合成向量长度（Watson and Williams
    1956; Mardia and Jupp 1999）。集中参数可以通过$R_T$从表中获得（Batschelet 1981; Gumbel et al.
    1953; 表10.2）。计算出的$F$值与标准$F$表（第3.8节）中的临界值进行比较。如果计算出的$F$值小于临界$F$值（该值取决于自由度$\Phi_a
    = 1$和$\Phi_b = n-2$以及显著性水平$\alpha$），则两个平均方向没有显著差异。两个样本都必须服从von Mises分布（第10.4节）。


    我们使用两个合成的方向数据集来说明如何应用此检验。我们首先加载数据并将度数转换为弧度：


