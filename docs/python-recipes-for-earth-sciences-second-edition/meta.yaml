- md: "## 9.7 Aitchison’s Log-Ratio Transformation\n\nAnyone who has ever dealt with\
    \ the statistical analysis of compositional data must have stumbled across John\
    \ Aitchison’s (1926 to 2016) log-ratio transformation. The Scottish statistician\
    \ spent much of his career dealing with the statistics of such data. Indeed, he\
    \ wrote the famous book *The Statistical Analysis of Compositional Data* and published\
    \ multiple papers on the topic (Aitchison 1984, 1986, 1999, 2003). The paper was\
    \ associated with the MATLAB 5 software package CODA, which is available from\
    \ the author, and updated versions are now available for download at CoDAWeb:\n\
    \n```\nhttp://www.compositionaldata.com\n```\n\nAitchison’s log-ratio transformation\
    \ overcomes the closed sum problem of closed data (i.e., data that are expressed\
    \ as proportions and added to a fixed total, such as 100%). The closed sum problem\
    \ causes spurious negative correlations between pairs of variables in multivariate\
    \ data sets, which are avoided by logarithmizing ratios of these variables. As\
    \ an example, multiproxy data in paleoclimate studies are often closed data (i.e.,\
    \ they are very much influenced by dilution effects). In the simplest example,\
    \ this could be a mixture of three components that together make up 100% of a\
    \ sediment. Let us imagine that one of the components is now constant (i.e., the\
    \ same amount of this component is always delivered per unit time). Since the\
    \ total of all three components is always 100%, the other two components are necessarily\
    \ anticorrelated: If one goes up, the other two must go down by the same total\
    \ amount.\n\nUsing ratios helps in overcoming the problem that the magnitudes\
    \ of compositional data are actually ratios whose denominators are the sums of\
    \ the concentrations of all constituents (see Davis 2003 for a short summary of\
    \ Aitchison’s log-ratio transformation). However, the product–moment covariances\
    \ of ratios are awkward to manipulate and result in complicated products and quotients.\
    \ John Aitchison therefore suggested taking the logarithms of these ratios and\
    \ thereby also taking advantage of the simple properties of the logarithmic function,\
    \ for example, log(x/y)=log(x)–log(y) and hence also log(x/y)=–log(y/x). This\
    \ process allows for reducing the number of covariances that are necessary to\
    \ describe the data set (Aitchison 2003, pages 65 to 66).\n\nBelow is a simple\
    \ example that illustrates the closed sum problem of a system with three variables\
    \ and the use of ratios as well as log-ratios to overcome the problem of spurious\
    \ correlations between pairs of variables. First, we clear the workspace and choose\
    \ colors for the plots:\n\n```python\nimport numpy as np\nfrom scipy import stats\n\
    from scipy import signal\nimport matplotlib.pyplot as plt\n\ncolors = np.array([\n\
    \    [0,114,189],\n    [217,83,25],\n    [237,177,32],\n    [126,47,142],\n])/255\n\
    ```\n\nFig. 9.9 Linear regression model of a synthetic data set with three variables\
    \ and random noise.\n\n![](img/f6c4e7e52658f332a1ff43bb13764e42_458_0.png)\n\n\
    ```python\nalpha=0.3,\nantialiased=True,\nshade=True)\nfor i in range(0,len(data)):\n\
    \    plt.plot(data[i,0],data[i,1],data[i,2],\n             marker='o',\n     \
    \        color=(0.1,0.3,0.8))\nax.view_init(30,70-90)\nplt.show()\n```\n\nand\
    \ observe some differences between the data and the regression plane if we rotate\
    \ the graph in three dimensions using the tool *Rotate 3D* on the toolbar of the\
    \ figure window.\n\nAs a second example, we use laboratory data from the Sherwood\
    \ Sandstone Group in England that suggest that intergranular permeability (as\
    \ the response variable) is mainly influenced by porosity and matrix conductivity\
    \ (as predictor variables) and that other variables have less influence. This\
    \ example was discussed in detail in an article by Olorunfemi (1985) and was used\
    \ as an example in the textbook by Swan and Sandilands (1995). The data for 40\
    \ rock samples from the Sherwood Sandstone Group were taken from M.O. Olorunfemi’s\
    \ publication and are stored in the file *sherwoodsandstone.txt*. We load the\
    \ data from the file by typing\n\n```python\ndata = np.loadtxt('sherwoodsandstone.txt')\n\
    ```\n\nThe five columns of the array `data` contain the numerical values of the\
    \ petrophysical measures of permeability (in m/s), porosity (without a physical\
    \ unit), matrix conductivity (in S/m), true formation factor (without a physical\
    \ unit), and induced polarization (in %). We also load the sample IDs (from Olorunfemi\
    \ 1985) from the file *sherwoodsandstone_samples.txt* using `readlines()` and\
    \ save them in the list `samples`:\n\n```python\nwith open('sherwoodsandstone_samples.txt')\
    \ as f:\n    samples = f.readlines()[8:]\n```\n\nWe next create another list that\
    \ contains the variable names: Perm for permeability, Porosity for porosity, MaCo\
    \ for matrix conductivity, TrFF for true formation factor, and InPo for induced\
    \ polarization:\n\n```python\nvariables = (['Perm',\n    'Porosity',\n    'MaCo',\n\
    \    'TrFF',\n    'InPo'])\n```\n\nWe then display the variables in a plot that\
    \ includes a legend. Since the values of the variables are very small, we plot\
    \ the logarithm of the values instead of the true values:\n\n```python\ndepth\
    \ = np.linspace(1,40,40)\nplt.figure()\nfor i in range(5):\n    plt.plot(np.log(data[:,i]),depth,\n\
    \        linestyle = 'none',\n        marker = 's')\nplt.legend(variables)\nplt.show()\n\
    ```\n\nWe subsequently calculate the coefficients beta of the multiple linear\
    \ regression model using LinearRegression.fit(),\n\n```python\nbeta = linear_model.LinearRegression().\
    \ \\\n    fit(data[:,1:6],data[:,0])\nbeta.score(data[:,1:6],data[:,0])\ncoeffs\
    \ = beta.coef_\ninterc = beta.intercept_\nprint(coeffs)\nprint(interc)\n```\n\n\
    which yields.\n\n```\n[ 5.06357746e+01 -3.30900095e+02\n -1.78566908e-01 -4.52634500e-01]\n\
    0.1586815190858486\n```\n\nwhich indicates that only porosity and matrix conductivity\
    \ influence the permeability of the Sherwood Sandstone Group, as the two larger\
    \ coefficients (i.e., 50.6358 and -330.9000) suggest.\n\nThere are multiple ways\
    \ of examining the quality of the result. For example, we can examine the residuals\
    \ of the model using\n\n```python\nres = data[:,0] - beta.predict(data[:,1:6])\n\
    \nplt.figure()\nplt.plot(res,depth,\n    linestyle='none',\n    marker='s')\n\
    plt.show()\n```\n\nwhich suggests that measurements above 9 are outliers, as is\
    \ also shown in the residual histogram:\n\n```python\ne = np.linspace(-6,12,7)\n\
    \nfig,ax = plt.subplots()\nplt.hist(res,bins=e)\nplt.axis(np.array([-6,12,0,25]))\n\
    ax.set_xticks(np.linspace(-6,12,7))\nplt.show()\n```\n\nThe linear regression\
    \ model can now be used to predict the permeability of a new sample from the values\
    \ of the other petrophysical variables. The effect that each predictor variable\
    \ has on the model can be examined in many different ways. Let us, for example,\
    \ calculate the linear regression model based on the first 34 values only using\n\
    \n```python\nbeta = linear_model.LinearRegression(). \\\n    fit(data[0:35,1:6],data[0:35,0])\n\
    beta.score(data[:,1:6],data[:,0])\ncoeffs = beta.coef_\ninterc = beta.intercept_\n\
    print(coeffs)\nprint(interc)\n```\n\nwhile keeping the half-open interval [0,35)\
    \ (or [0:35]) in mind. We can then we predict the remaining five values using\n\
    \n```python\ndata_pred = beta.predict(data[35:,1:6])\nprint(data_pred)\n```\n\n\
    which yields\n\n```\n[5.27453296 4.88171822 2.33299313 4.88200648 5.79731973]\n\
    ```\n\nThe model now enables us to calculate the mean squared error and the coefficient\
    \ of determination using\n\n```python\nprint(\"Mean squared error: %.2f\" \\\n\
    \      % mean_squared_error(data[35:,0],data_pred))\n\nprint(\"Coefficient of\
    \ determination: %.2f\" \\\n      % r2_score(data[35:,0],data_pred))\n```\n\n\
    which yields\n\n```\nMean squared error: 4.92\nCoefficient of determination: 0.18\n\
    ```\n\nFinally, we can plot the predicted vs. real value for all data points using\n\
    \n```python\nplt.figure()\nfor i in range(5):\n    plt.plot(data[35:,0],data_pred,\n\
    \             linestyle='none',\n             marker='s',\n             color=(0.8,0.3,0.1))\n\
    plt.plot([0,7],[0,7],\n         linestyle=':',\n         color='k')\nplt.axis(np.array([0,7,0,7]))\n\
    plt.xlabel('Real Value')\nplt.ylabel('Predicted Value')\nplt.axis('square')\n\
    plt.show()\n```"
  mdcn: "## 9.7 艾奇逊对数比变换\n\n任何处理过成分数据统计分析的人，都必定会接触到约翰·艾奇逊（1926-2016）的对数比变换。这位苏格兰统计学家毕生致力于此类数据的统计研究。事实上，他撰写了著名的《成分数据分析》一书，并发表了多篇相关论文（Aitchison\
    \ 1984, 1986, 1999, 2003）。该论文与MATLAB 5软件包CODA相关联，该软件包可从作者处获取，更新版本现已可在CoDAWeb下载：\n\
    \n```\nhttp://www.compositionaldata.com\n```\n\n艾奇逊对数比变换克服了封闭数据（即表示为比例并加总到固定总量的数据，例如100%）的封闭和问题。封闭和问题会导致多元数据集中变量对之间出现虚假的负相关，而通过对这些变量的比值取对数可以避免这一问题。例如，古气候研究中的多指标数据通常是封闭数据（即它们受稀释效应影响很大）。在最简单的例子中，这可能是由三个组分构成的沉积物混合物，三者总和为100%。假设其中一个组分的量是恒定的（即单位时间内输送的该组分量始终相同）。由于三个组分的总量始终为100%，另外两个组分必然呈负相关：如果一个增加，另外两个必须以相同的总量减少。\n\
    \n使用比值有助于克服成分数据的量级实际上是比值的问题，其分母是所有组分浓度的总和（关于艾奇逊对数比变换的简要概述，请参见Davis 2003）。然而，比值的乘积-矩协方差难以处理，并导致复杂的乘积和商。因此，约翰·艾奇逊建议对这些比值取对数，从而利用对数函数的简单性质，例如，log(x/y)=log(x)–log(y)，因此也有log(x/y)=–log(y/x)。这一过程减少了描述数据集所需的协方差数量（Aitchison\
    \ 2003, 第65至66页）。\n\n下面是一个简单的例子，说明了一个具有三个变量的系统的封闭和问题，以及使用比值和对数比来克服变量对之间虚假相关问题的方法。首先，我们清除工作区并为绘图选择颜色：\n\
    \n```python\nimport numpy as np\nfrom scipy import stats\nfrom scipy import signal\n\
    import matplotlib.pyplot as plt\n\ncolors = np.array([\n    [0,114,189],\n   \
    \ [217,83,25],\n    [237,177,32],\n    [126,47,142],\n])/255\n```\n\n图9.9 一个包含三个变量和随机噪声的合成数据集的线性回归模型。\n\
    \n![](img/f6c4e7e52658f332a1ff43bb13764e42_458_0.png)\n\n```python\nalpha=0.3,\n\
    antialiased=True,\nshade=True)\nfor i in range(0,len(data)):\n    plt.plot(data[i,0],data[i,1],data[i,2],\n\
    \             marker='o',\n             color=(0.1,0.3,0.8))\nax.view_init(30,70-90)\n\
    plt.show()\n```\n\n并使用图形窗口工具栏上的*旋转3D*工具在三维空间中旋转图形，观察数据与回归平面之间的一些差异。\n\n作为第二个例子，我们使用来自英格兰舍伍德砂岩组的实验室数据，这些数据表明粒间渗透率（作为响应变量）主要受孔隙度和基质电导率（作为预测变量）的影响，而其他变量的影响较小。这个例子在Olorunfemi（1985）的一篇文章中进行了详细讨论，并被用作Swan和Sandilands（1995）教科书中的一个例子。来自舍伍德砂岩组的40个岩石样品的数据取自M.O.\
    \ Olorunfemi的出版物，并存储在文件*sherwoodsandstone.txt*中。我们通过输入以下命令从文件加载数据：\n\n```python\n\
    data = np.loadtxt('sherwoodsandstone.txt')\n```\n\n数组`data`的五列包含岩石物理测量值的数值：渗透率（单位：m/s）、孔隙度（无物理单位）、基质电导率（单位：S/m）、真实地层因子（无物理单位）和感应极化率（单位：%）。我们还使用`readlines()`从文件*sherwoodsandstone_samples.txt*加载样品ID（来自Olorunfemi\
    \ 1985），并将其保存在列表`samples`中：\n\n```python\nwith open('sherwoodsandstone_samples.txt')\
    \ as f:\n    samples = f.readlines()[8:]\n```\n\n接下来，我们创建另一个包含变量名的列表：Perm代表渗透率，Porosity代表孔隙度，MaCo代表基质电导率，TrFF代表真实地层因子，InPo代表感应极化率：\n\
    \n```python\nvariables = (['Perm',\n    'Porosity',\n    'MaCo',\n    'TrFF',\n\
    \    'InPo'])\n```\n\n然后，我们在一个包含图例的图中显示这些变量。由于变量的值非常小，我们绘制的是值的对数而不是真实值：\n\n```python\n\
    depth = np.linspace(1,40,40)\nplt.figure()\nfor i in range(5):\n    plt.plot(np.log(data[:,i]),depth,\n\
    \        linestyle = 'none',\n        marker = 's')\nplt.legend(variables)\nplt.show()\n\
    ```\n\n随后，我们使用LinearRegression.fit()计算多元线性回归模型的系数beta，\n\n```python\nbeta = linear_model.LinearRegression().\
    \ \\\n    fit(data[:,1:6],data[:,0])\nbeta.score(data[:,1:6],data[:,0])\ncoeffs\
    \ = beta.coef_\ninterc = beta.intercept_\nprint(coeffs)\nprint(interc)\n```\n\n\
    得到结果：\n\n```\n[ 5.06357746e+01 -3.30900095e+02\n -1.78566908e-01 -4.52634500e-01]\n\
    0.1586815190858486\n```\n\n这表明只有孔隙度和基质电导率影响舍伍德砂岩组的渗透率，因为两个较大的系数（即50.6358和-330.9000）表明了这一点。\n\
    \n有多种方法可以检查结果的质量。例如，我们可以使用以下代码检查模型的残差：\n\n```python\nres = data[:,0] - beta.predict(data[:,1:6])\n\
    \nplt.figure()\nplt.plot(res,depth,\n    linestyle='none',\n    marker='s')\n\
    plt.show()\n```\n\n这表明测量值大于9的是异常值，残差直方图也显示了这一点：\n\n```python\ne = np.linspace(-6,12,7)\n\
    \nfig,ax = plt.subplots()\nplt.hist(res,bins=e)\nplt.axis(np.array([-6,12,0,25]))\n\
    ax.set_xticks(np.linspace(-6,12,7))\nplt.show()\n```\n\n现在，线性回归模型可用于根据其他岩石物理变量的值预测新样品的渗透率。每个预测变量对模型的影响可以通过多种不同的方式进行检验。例如，让我们仅使用前34个值计算线性回归模型：\n\
    \n```python\nbeta = linear_model.LinearRegression(). \\\n    fit(data[0:35,1:6],data[0:35,0])\n\
    beta.score(data[:,1:6],data[:,0])\ncoeffs = beta.coef_\ninterc = beta.intercept_\n\
    print(coeffs)\nprint(interc)\n```\n\n同时记住半开区间[0,35)（或[0:35]）。然后我们可以使用以下代码预测剩余的五个值：\n\
    \n```python\ndata_pred = beta.predict(data[35:,1:6])\nprint(data_pred)\n```\n\n\
    得到结果：\n\n```\n[5.27453296 4.88171822 2.33299313 4.88200648 5.79731973]\n```\n\n\
    现在，该模型使我们能够使用以下代码计算均方误差和决定系数：\n\n```python\nprint(\"Mean squared error: %.2f\"\
    \ \\\n      % mean_squared_error(data[35:,0],data_pred))\n\nprint(\"Coefficient\
    \ of determination: %.2f\" \\\n      % r2_score(data[35:,0],data_pred))\n```\n\
    \n得到结果：\n\n```\nMean squared error: 4.92\nCoefficient of determination: 0.18\n\
    ```\n\n最后，我们可以使用以下代码绘制所有数据点的预测值与真实值：\n\n```python\nplt.figure()\nfor i in range(5):\n\
    \    plt.plot(data[35:,0],data_pred,\n             linestyle='none',\n       \
    \      marker='s',\n             color=(0.8,0.3,0.1))\nplt.plot([0,7],[0,7],\n\
    \         linestyle=':',\n         color='k')\nplt.axis(np.array([0,7,0,7]))\n\
    plt.xlabel('Real Value')\nplt.ylabel('Predicted Value')\nplt.axis('square')\n\
    plt.show()\n```"
