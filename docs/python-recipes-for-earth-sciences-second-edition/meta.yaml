    - 1986年，*联合图像专家小组* (JPEG) 成立，旨在制定各种图像压缩标准。虽然JPEG代表该委员会，但现在它被广泛用作一种图像压缩格式和文件格式的名称。这种压缩涉及将像素值分组为8x8的块，并对每个块进行离散余弦变换。结果，所有不必要的高频信息被删除，这使得这种压缩方法不可逆。JPEG格式的优势在于提供了三通道24位真彩色版本，允许存储具有平滑颜色过渡的图像。新的JPEG\
    \ 2000格式使用小波变换代替余弦变换（第5.10节）(http://www.jpeg.org)。\n- *便携式文档格式* (PDF) – PDF同样由Adobe\
    \ Systems设计，现在是一个真正的独立跨平台文档。PDF文件包含不同类型的内容，包括文本以及矢量和栅格图形。较新版本的PDF还可以包含交互式内容，如超链接、动画对象、音频和视频。这些文件高度压缩，从而允许快速的互联网下载。Adobe\
    \ Systems为所有计算机平台免费提供Acrobat Reader，以便可以阅读PDF文件 (http://www.adobe.com)。\n\n##\
    \ 8.3 图像的导入、处理与导出\n\n我们首先需要学习如何从图形文件中读取图像到工作区。以一个卫星图像为例，它显示了智利北部一个10.5公里×11公里的子区域：\n\
    \nhttps://asterweb.jpl.nasa.gov/gallery/images/unconform.jpg\n\n文件 *unconform.jpg*\
    \ 是一张经过处理的Terra ASTER卫星图像，可以从NASA网站免费下载。我们首先将此图像保存在工作目录中。命令\n\n```\nimport numpy\
    \ as np\nfrom matplotlib import cm\nimport matplotlib.pyplot as plt\nfrom skimage\
    \ import color\nfrom skimage import exposure\nfrom skimage import io\nfrom matplotlib.colors\
    \ import ListedColormap\n\nI1 = io.imread('unconform.jpg')\n```\n\n读取并解压JPEG文件，将数据作为24位RGB图像数组导入，并存储在变量I1中。命令\n\
    \n```\nnp.who()\n```\n\n显示RGB数组在工作区中的存储方式：\n\n```\nName                Shape \
    \             Bytes        Type\n=================================================================\n\
    I1                  729 x 713 x 3      1559331      uint8\n\nUpper bound on total\
    \ bytes  =      1559331\n```\n\n详细信息表明图像存储为729×713×3的数组，代表红、绿、蓝三种颜色各一个729×713的数组。工作区中当前变量的列表还包括信息\
    \ *uint8*，即每个数组元素代表一个像素，包含8位整数。这些整数表示0（即最小强度）到255（即最大强度）之间的强度值。例如，以下是红色数据数组左上角的一个区域：\n\
    \n```\nprint(I1[49:55,49:55,0])\n```\n\n输出为\n\n```\n[[174 177 180 182 182 182]\n\
    \ [165 169 170 168 168 170]\n [171 174 173 168 167 170]\n [184 186 183 177 174\
    \ 176]\n [191 192 190 185 181 181]\n [189 190 190 188 186 183]]\n```\n\n我们现在可以使用\
    \ `imshow()` 查看图像。\n\n```\nplt.figure()\nio.imshow(I1)\nplt.axis('off')\nio.show()\n\
    ```\n\n来自 *scikit-image* 包，它会打开一个新的图形窗口，显示图像的RGB合成图（图8.1）。与RGB图像相比，灰度图像只需要一个二维数组来存储所有必要信息。因此，我们使用命令\
    \ `rgb2gray()`（即RGB转灰度）将RGB图像转换为灰度图像：\n\n![](img/f6c4e7e52658f332a1ff43bb13764e42_361_0.png)\n\
    \n**图 8.1** 文件 *unconform.jpg* 中包含的RGB真彩色图像。在将JPEG文件解压并读取为729×713×3的数组后，Python使用\
    \ *imshow()* 解释并显示RGB合成图。原始图像由NASA/GSFC/METI/ERSDAC/JAROS和美国/日本ASTER科学团队提供。\n\n\
    ```\nI2 = color.rgb2gray(I1)\n```\n\n新的工作区列表现在显示为\n\n```\nName               \
    \ Shape              Bytes        Type\n=================================================================\n\
    I1                  729 x 713 x 3      1559331      uint8\nI2                \
    \  729 x 713          4158216      float64\n\nUpper bound on total bytes = 5717547\n\
    ```\n\n可以观察到24位RGB和8位灰度数组之间的差异。命令\n\n```\nplt.figure()\nio.imshow(I2)\nplt.axis('off')\n\
    io.show()\n```\n\n显示结果。很容易在单独的图形窗口中看到两幅图像之间的差异。接下来，我们处理灰度图像。首先，我们计算强度值分布的直方图：\n\
    \n```\nn,v = exposure.histogram(I2,nbins=256)\n```\n\n```\nplt.figure()\nplt.plot(v,n)\n\
    plt.show()\n```\n\n增强此类图像对比度的一种简单技术是变换直方图以获得灰度的均匀分布：\n\n```\nI3 = exposure.equalize_hist(I2)\n\
    ```\n\n```\nn,v = exposure.histogram(I3,nbins=256)\n```\n\n```\nplt.figure()\n\
    plt.plot(v,n)\nplt.show()\n```\n\n我们可以再次使用以下命令查看差异\n\n```\nplt.figure()\nio.imshow(I3)\n\
    plt.axis('off')\nio.show()\n```\n\n并将结果保存到新文件中：\n\n```\nplt.imsave('unconform_gray.jpg',I3,cmap=plt.cm.gray)\n\
    ```\n\n我们也可以通过在控制台中输入以下命令来列出内置的调色板\n\n```\nplt.colormaps()\n```\n\n输出为\n\n```\n\
    ['magma',\n 'inferno',\n```"
