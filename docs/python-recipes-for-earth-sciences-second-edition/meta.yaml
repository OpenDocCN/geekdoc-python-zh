    y_1)$ and $(x_2, y_2)$ of an edge feature. Next, we search for $n$ points $(x_i,
    y_i)$ in the Hough transform in which many lines intersect since these points
    define the line that traces an edge feature. Detecting circles instead of lines
    works in a similar manner by using the coordinates of the center of the circle
