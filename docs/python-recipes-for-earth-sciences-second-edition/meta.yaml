    ```\n\nTo print the SDS names (i.e., the IDs and the data fields), we use\n\n\
    ```\nfor idx,sds in enumerate(datasets_dic.keys()):\n    print(idx)\n    print(sds)\n\
    ```\n\nTo acquire a list of all 194 data sets, we use the commands shown below.\
    \ Again, the first half of the name is the subdata set name, such as HDF4......:9,\
    \ which is followed by the descriptor, such as [13x3] SatellitePosition VNIR_Band1\
    \ (64 bit floating-point):\n\n```\nasterfile = gdal.Open(filename)\naster_sds\
    \ = asterfile.GetSubDatasets()\nprint(aster_sds)\n```\n\nWe then choose Numbers\
    \ 9, 20, and 31 as example data sets from the list above, which contains ImageData\
    \ of *vnir_Band3n*, *vnir_Band2*, and *vnir_Band1*, each of which typically contains\
    \ a lot of information about the lithology (including soils), vegetation, and\
