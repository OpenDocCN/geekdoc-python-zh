    reveals that the data are in an unsigned 16 bit `uint16` format, that is, the
    maximum range of the data values lies between 0 and 2^16-1=65,535:


    ```

    Name          Shape             Bytes         Type

    =====================================================

    I1            7771 x 7611       118290162     uint16

    I2            7771 x 7611       118290162     uint16

    I3            7771 x 7611       118290162     uint16


