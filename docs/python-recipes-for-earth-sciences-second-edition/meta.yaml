  md: '# 7.8.1 Test for Uniform Distribution


    In order to illustrate the test for uniform distribution, we first need to compute
    some synthetic data (Fig. 7.10). The function `random.rand()` computes uniformly
    distributed pseudorandom numbers drawn from a uniform distribution within the
    interval [0,1]. We compute xy data using `random.rand()` and multiply the data
    by ten in order to obtain data within the interval [0,10]:


    ```

    import numpy as np

    from scipy import stats

    import matplotlib.pyplot as plt

    from scipy.special import factorial

    import scipy.spatial.distance as distance


    np.random.seed(0)

    data = 10 * np.random.rand(100,2)

    ```


    We can use the χ²-test introduced in Sect. 3.9 to test the null hypothesis that
    the data have a uniform distribution. The xy data are now organized into 25 classes
    that are square subareas with dimensions of 2-by-2. This definition of classes
