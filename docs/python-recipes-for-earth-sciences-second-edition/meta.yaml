  md: "```\na,b = np.shape(SRTM)\ngrads = np.zeros((a,b,8))\n\nfor c in range(1,9,2):\n\
    \    grads[:,:,c] = np.roll(SRTM,N[c,0],axis=0)\n    grads[:,:,c] = np.roll(grads[:,:,c],N[c,1],axis=1)\n\
    \    grads[:,:,c] = (grads[:,:,c]-SRTM)/np.sqrt(2*90**2)\n\nfor c in range(0,8,2):\n\
    \    grads[:,:,c] = np.roll(SRTM,N[c,0],axis=0)\n    grads[:,:,c] = np.roll(grads[:,:,c],N[c,1],axis=1)\n\
    \    grads[:,:,c] = (grads[:,:,c]-SRTM)/90\n\ngrads = np.arctan(grads)/np.pi*180.\n\
    ```\n\nSince a central cell can have several downslope neighbors, water can flow\
    \ in several directions. This phenomenon is called *divergent flow*. Early flow\
    \ accumulation algorithms were based on the single flow direction method (known\
    \ as the D8 method; Fig. 7.14), which allows flow to only one of the cell's eight\
    \ neighboring cells. However, this method cannot model divergences in ridge areas\
    \ and tends to produce parallel flow lines in some situations. In our example,\
    \ we illustrate the use of a multiple flow direction method, which allows flow\
    \ from a central cell to multiple neighboring cells. The proportion of the total\
    \ outflow that is assigned to a neighboring cell is dependent on the gradient\
    \ between the central cell and that particular neighboring cell. Even though multiple\
    \ flow methods produce more realistic results in most situations, they tend to\
    \ result in dispersion in valleys, where the flow should be more concentrated.\
    \ A weighting factor $w$ is therefore introduced, which controls the relationship\
    \ between the outflows:\n\n> $$flow_i = \\frac{grad_i^w}{\\sum_{i=1}^8 grad_i^w}\
    \ \\text{for} \\quad grad_i^w < 0$$\n\nA recommended value for $w$ is 1.1 because\
    \ higher values would concentrate the flow in the direction of the steepest slope,\
    \ while $w=0$ would result in extreme dispersion. In the following sequence of\
    \ commands, we first select the gradients that are less than zero and then multiply\
    \ these gradients by the weighting.\n\n```\nw = 1.1\nflow = (grads*(-1*grads<0.))**w\n\
    ```\n\nWe then sum the upslope gradients along the third dimension of the flow\
    \ array. Replacing all upslope gradient values of 0 with a value of 1 avoids the\
    \ problems created by trying to divide by zero:\n\n```\nupssum = np.sum(flow,axis=2)\n\
    upssum[upssum==0] = 1\n```"
  merge: -1
  pgno: 330
- img_proc: true
  md: "We divide the flows by upssum in order to obtain fractional weights that add\
    \ to a total of one. This is achieved separately for each layer of the 3D flow\
    \ array using a for loop:\n\n```\nfor i in range(0,8):\n    flow[:,:,i] = flow[:,:,i]*(flow[:,:,i]>0)/upssum\n\
    ```\n\nThe 2D array inflowsum stores the intermediate inflow totals for each iteration.\
    \ These intermediate totals are then summed in order to reach a figure for the\
    \ total accumulated flow flowac at the end of each iteration. The initial values\
    \ for inflowsum and flowac are obtained through upssum:\n\n```\ninflowsum = upssum\n\
    flowac = upssum\n```\n\nAnother 3D array, inflow, is now needed in which to store\
    \ the total intermediate inflow from all neighbors:\n\n```\ninflow = grads*0\n\
    ```\n\nFlow accumulation is terminated when there is no inflow. When translating\
    \ this information into Python code, we use a conditional while loop that terminates\
    \ if sum(inflowsum) == 0. The number of non-zero entries in inflowsum decreases\
    \ during each loop. This is achieved by alternately updating inflow and inflowsum.\
    \ Here, inflowsum is updated with the intermediate inflow of the neighboring cells,\
    \ which are weighted by flow under the condition that all neighboring cells be\
    \ contributing cells (i.e., where grads are positive). Where not all neighboring\
    \ cells are contributing cells, the intermediate inflowsum is reduced, as is inflow.\
    \ The flow accumulation flowac increases through consecutive summations of the\
    \ intermediate inflowsum:\n\n```\nwhile np.sum(inflowsum)>0:\n    for i in range(0,8):\n\
    \        inflow[:,:,i] = np.roll(inflowsum,N[i,0],axis=0)\n        inflow[:,:,i]\
    \ = np.roll(inflow[:,:,i],N[i,1],axis=1)\n    inflowsum = np.sum(inflow*flow*grads>0,2)\n\
    \    flowac = flowac + inflowsum\n```\n\nWe display the result as a pseudocolor\
    \ plot with log-scaled values (Fig. 7.15 e):\n\n```\nplt.figure()\nplt.axes(aspect='equal')\n\
    plt.pcolor(np.log(1+flowac),\n           cmap=cm.jet_r)\nplt.colorbar()\n```"
