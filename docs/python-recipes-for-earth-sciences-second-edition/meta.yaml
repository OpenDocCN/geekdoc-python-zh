  mdcn: "## 9.5 聚类分析\n\n*聚类分析*旨在创建一组组彼此非常相似的对象，这些对象与其他单个对象或对象组相比具有显著差异。该方法首先计算所有对象对之间的*相似性*或（另一种方式）*相异性*（或*距离*）。然后，它根据对象组之间的相似性（或距离）对其进行排序，最终创建一个层次树，并将其可视化为*树状图*。对象的分组在地球科学中非常有用，例如，在火山灰层内建立相关性（Hermanns\
    \ et al. 2000）或比较不同的微化石组合（Birks and Gordon 1985）。\n\n计算两个数据向量之间的相似性或（另一种方式）相异性（或距离）的方法有很多。让我们定义两个数据集，它们由来自同一对象的多次测量组成。这些数据可以用向量描述：\n\
    \n$X_1 = (x_{11}, x_{12}, \\dots, x_{1p})$\n\n$X_2 = (x_{21}, x_{22}, \\dots,\
    \ x_{2p})$\n\n任何两个样本向量之间最常用的相异性（或距离）度量是\n\n- *欧几里得距离*——这仅仅是描述多变量空间中两个测量值的两点之间的最短距离：\n\
    \n$$\\Delta_{12} = \\sqrt{(x_{11} - x_{21})^2 + (x_{12} - x_{22})^2 + \\dots +\
    \ (x_{1p} - x_{2p})^2}$$\n\n欧几里得距离无疑是最直观的相异性度量。然而，在由多种不同类型变量组成的异质数据集中，一个更好的替代方案是\n\
    \n- *曼哈顿（或城市街区）距离*——在曼哈顿市，必须沿着垂直的街道行走，而不能斜穿街区。因此，曼哈顿距离是所有差值的总和：\n\n$$\\Delta_{12}\
    \ = |x_{11} - x_{21}| + |x_{12} - x_{22}| + \\dots + |x_{1p} - x_{2p}|$$\n\n相似性度量包括\n\
    \n- *相关相似性系数*——该度量使用皮尔逊线性积矩相关系数来计算两个对象之间的相似性：\n\n$$r_{X_1X_2} = \\frac{\\sum_{i=1}^{n}\
    \ (x_{1i} - \\bar{x}_1)(x_{2i} - \\bar{x}_2)}{(n - 1)s_{X_1}s_{X_2}}$$\n\n如果研究者对测量对象的变量之间的比率感兴趣，则使用此度量。然而，皮尔逊相关系数对异常值高度敏感，应谨慎使用（另见第4.2节）。\n\
    \n- *内积相似性指数*——将数据向量的长度归一化为1，并计算它们的*内积*，可以得到另一个重要的相似性指数，该指数常用于转换函数应用。在此示例中，将一组具有已知环境偏好的现代植物或动物组合与化石样本进行比较，以重建过去的环境条件：\n\
    \n$$s_{12} = \\frac{1}{|X_1|} \\frac{1}{|X_2|} (x_{11}x_{12} \\dots x_{1p}) \\\
    begin{pmatrix} x_{21} \\\\ x_{22} \\\\ \\vdots \\\\ x_{2p} \\end{pmatrix}$$\n\n\
    内积相似性在0到1之间变化。零值表示没有相似性，值为1表示最大相似性。\n\n执行聚类分析的第二步是根据相似性对组进行排序，并构建一个层次树，该树被可视化为树状图。大多数聚类算法只是将相似性或相异性（或距离）最高的两个对象连接起来。在后续步骤中，最相似的对象对或簇被迭代地连接。簇（每个簇由对象组组成）之间的差异描述方式不同，具体取决于数据类型和应用：\n\
    \n- *K*-均值聚类使用多个*K*簇的多变量均值之间的欧几里得距离作为对象组之间差异的度量。如果数据表明存在一个被随机噪声包围的真实均值，则使用此距离。或者，\n\
    - *k*-最近邻聚类使用最近邻的欧几里得距离作为此差异的度量。如果数据集中存在无法归因于随机噪声的自然异质性，则使用此度量。\n\n在应用聚类算法之前，评估数据属性非常重要。首先应考虑变量的绝对值。例如，来自火山灰的地球化学样品可能显示SiO₂含量约为77%，而Na₂O含量仅为3.5%，但Na₂O含量可能被认为更重要。在这种情况下，需要对数据进行转换，使其均值等于零（*均值中心化*）。通过*标准化*（即，将数据标准化为均值等于零，方差等于一）来校正方差和均值的差异。通过使用*Aitchison对数比变换*（Aitchison\
