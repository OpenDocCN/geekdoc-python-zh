  md: '# 3.4 Theoretical Distributions


    We have now described the empirical frequency distribution of our sample. A histogram
    is a convenient way to depict the frequency distribution of the variable $x$.
    If we sample the variable sufficiently often and the output ranges are narrow,
    we obtain a very smooth version of the histogram. An infinite number of measurements
    $n \rightarrow \infty$ and an infinitely small class width produce the random
    variable''s *probability density function* (PDF). The probability distribution
    density $f(x)$ defines the probability that the variable has a value equal to
    $x$. The integral of $f(x)$ is normalized to unity, that is, the total number
    of observations is one. The *cumulative distribution function* (CDF) is the sum
    of the frequencies of a discrete PDF or the integral of a continuous PDF. The
    cumulative distribution function $F(x)$ is the probability that the variable has
    a value less than or equal to $x$.


    As a next step, we need to find appropriate theoretical distributions that fit
    the empirical distributions described in the previous section. The present section
    therefore introduces the most important theoretical distributions and describes
    their application.


    # 3.4.1 Uniform Distribution


    A *uniform* or *rectangular distribution* is a distribution that has a constant
    probability (Fig. 3.4). The corresponding probability density function is


    ```

    $f(x) = 1/n = const.$

    ```


    ![](img/f6c4e7e52658f332a1ff43bb13764e42_82_0.png)'
  merge: -1
  pgno: 82
- img_proc: true
  md: 'where the random variable $x$ has any of $n$ possible values. The cumulative
    distribution function is


    $F(x) = x \cdot 1/n$


    The probability density function is normalized to unity,


    $\sum_{-\infty}^{+\infty} f(x)dx = 1$


    that is, the sum of all probabilities is one. The maximum value of the cumulative
    distribution function is therefore one:


    $F(x)_{max} = 1$


    An example is a rolling die with $n=6$ faces. A discrete variable such as the
    faces of a die can only take a countable number of values $x$. The probability
    of each face is 1/6. The probability density function of this distribution is


    $f(x) = 1/6$


    The corresponding cumulative distribution function is


    $F(x) = x \cdot 1/6$


    where $x$ takes only discrete values (i.e., $x=1, 2, ..., 6$).


    # 3.4.2 Binomial Distribution


    A *binomial distribution* gives the discrete probability of $x$ successes out
    of $n$ trials, with a probability $p$ of success in any given trial (Fig. 3.5).
    The probability density function of a binomial distribution is


    $f(x) = \binom{n}{x} p^x (1-p)^{n-x}$


    The cumulative distribution function is


    $F(x) = \sum_{i=1}^{x} \binom{n}{i} p^i (1-p)^{n-i}$


    where


    $\binom{n}{i} = \frac{n!}{i!(n-i)!}$


    The binomial distribution has two parameters $n$ and $p$. An example of the application
    of this distribution can be found when determining the likely outcome of drilling
    for water. Let us assume that the probability of drilling success is 0.1, or 10%.
    The probability of $x=3$ successful wells out of a total number of $n=10$ wells
    is'
