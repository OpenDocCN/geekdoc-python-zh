    plt.show()


    n, e = np.histogram(sodium,bins=11)

    v = np.diff(e[0:2]) * 0.5 + e[0:-1]

    ```


    The histogram of this data set–which uses a larger number of classes–illustrates
    the distortion produced in the frequency distribution by this single outlier by
