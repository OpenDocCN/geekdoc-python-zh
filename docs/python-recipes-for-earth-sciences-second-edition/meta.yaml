    ```

    16.63794532

    16.973911

    [17.02385664 17.45143718]

    ```


    The mean of the data is 16.64, the median is 16.94, and there are two modes (i.e.,
    two bars of the same height in the histogram) of 17.02 and 17.45, respectively.
    We now introduce a single, very low value of 7.0 wt% in addition to the 50 measurements
