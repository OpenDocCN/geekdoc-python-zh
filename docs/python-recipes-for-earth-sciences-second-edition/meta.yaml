    \ were evenly spaced over the same time interval. The following code uses the\
    \ input argument `hifac`, which is defined by Press et al. (2007) as `hifac=fhi/fnyq`.\n\
    \n```python\nintv=np.mean(np.diff(t))\nofac=4\n```"
