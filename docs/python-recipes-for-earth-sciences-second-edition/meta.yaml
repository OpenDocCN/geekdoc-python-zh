    lake (e.g., the depth and size of the lake, the alkalinity and the salinity of
    the lake water, the species assemblage in the water body, or diagenesis in the
    sediment). A recurrence plot (RP) is a graphical display of such recurring states
    of the system that is calculated from the distance (e.g., the Euclidean distance)
    between all pairs of phase space vectors $\vec{y}(t)$ within a threshold value
    $\varepsilon$ (Marwan et al. 2007):


    ```

    $$R_{i,j} = \begin{cases} 0, & \| x_i - x_j \| > \varepsilon \ 1, & \| x_i - x_j
    \| \leq \varepsilon \end{cases}$$

    ```


    If the distance between two states at times $i$ and $j$ is smaller than a given
    threshold $\varepsilon$, the value of the recurrence matrix $R$ is one; otherwise,
    it is zero. This analysis is therefore a pairwise test of all states. For $n$
    states, we compute $n^2$ tests. The recurrence plot is then the two-dimensional
    display of the $n$-by-$n$ matrix, where black pixels represent $R_{i,j}=1$ and
    white pixels indicate $R_{i,j}=0$, and with a coordinate system that represents
    two time axes. Such recurrence plots can help in creating'
- md: "## 5.11.3 Recurrence Quantification\n\nThe structure of recurrence plots can\
    \ also be described by a suite of quantitative measures in a *recurrence quantification\
    \ analysis* (RQA). Several measures are based on the distribution of the lengths\
    \ of diagonal or vertical lines as well as on the *local proximity configuration*.\
    \ These measures can be used to trace hidden transitions within a dynamical process.\
    \ As an example, we next consider two measures: the recurrence rate and the transitivity\
    \ coefficient. The *recurrence rate* is the density of points in the recurrence\
    \ plot and corresponds to the recurrence probability of the system. The *transitivity\
    \ coefficient* has its roots in graph theory and characterizes the regularity\
    \ (or complexity) of the system.\n\nFor our example, we can consider a time series\
    \ of normally distributed (Gaussian) noise with a transition in the mean at time\
    \ 1,000 and a change in autocorrelation prior to this transition (starting at\
    \ time 800). Importantly, neither the mean nor the variances change in the precursor\
    \ region, and conventional methods are also unable to find such a change:\n\n\
    ```python\nnp.random.seed(20)\nn=1000\nx=np.random.uniform(0,1,n)\n\nx=np.concatenate((np.zeros(n),np.ones(n)))\n\
    x=x+np.random.normal(0,0.3,len(x))\nfor i in range(n-round(n/5),n):\n    x[i]=0.9*x[i-1]+0.5*x[i]+0.02\n\
    x=x/np.std(x,ddof=1)\n\nt=np.arange(0,len(x))\n\nplt.figure()\nplt.plot(t, x)\n\
    plt.xlabel('Time')\n```\n\nWe first embed the time series and then calculate the\
    \ recurrence plot:\n\n```python\nn=len(x)\ntau=2\nm=2\nn2=n - tau*(m-1)\n\ns=np.zeros((n2,m))\n\
    for mi in range(0,m):\n    s[:,mi]=x[np.arange(0,n2)+tau*mi]\n```\n\n```python\n\
    D=distance.pdist(s)\nS=distance.squareform(D)\nR=S<0.5\n\nplt.imshow(R,\n    extent=[0,n2,0,n2],\n\
    \    cmap='gray_r',\n    origin='lower')\nplt.xlabel('Time')\nplt.ylabel('Time')\n\
    plt.show()\n```\n\nThe RP shows two blocks of randomly distributed points, each\
    \ of which marks times when the system randomly returns to a similar state. In\
    \ random noise, similar states frequently recur, but without any regularity, except\
    \ for the main diagonal line (i.e., the line of identity). The two blocks of the\
    \ RP mark the transition at time 1,000. The states before this change point differ\
    \ strongly from the states after the change point, as is represented by the almost\
    \ empty lower-right and upper-left quadrants of the RP. However, the preceding\
    \ increase in autocorrelation between times 800 and 1,000 is not clearly visible\
    \ in the RP even though it appears slightly denser. In this situation, quantifying\
    \ the structures in the RP could prove beneficial.\n\nTo calculate the recurrence\
    \ rate, we can simply compute the mean of the matrix R,\n\n```python\nRR=np.mean(R)\n\
    print(RR)\n```\n\nwhich yields\n\n```\n0.10654648642636631\n```\n\nThe probability\
    \ that the system will return to a randomly selected previous state is therefore\
    \ about 10%.\n\nThe transitivity coefficient is a graph theoretical measure of\
    \ the probability that three connected network nodes (i.e., triples) are completely\
    \ interconnected (i.e., that they form a closed triangle):\n\n$$\\tau = \\frac{\\\
    sum_{i,j,k}^N A_{ij}A_{jk}A_{ik}}{\\sum_{i,j,k=1}^N A_{ij}A_{ik}(1-\\delta_{ik})}$$\n\
    \nThis measure can be intuitively understood with respect to recurrences in the\
    \ phase space. We can identify a recurrence of states via a network link: Close\
    \ points on the phase space trajectory are connected by a link. Three connected\
    \ points form a triple, but only if all three points recur close to one another\
    \ and thus"
  mdcn: "## 5.11.3 递归量化分析\n\n递归图的结构也可以通过一套定量指标在*递归量化分析*（RQA）中进行描述。其中一些指标基于对角线或垂直线长度的分布，以及*局部邻近构型*。这些指标可用于追踪动态过程中隐藏的转变。作为示例，我们接下来考虑两个指标：递归率和传递性系数。*递归率*是递归图中点的密度，对应于系统的递归概率。*传递性系数*源于图论，用于表征系统的规则性（或复杂性）。\n\
    \n对于我们的示例，我们可以考虑一个正态分布（高斯）噪声的时间序列，该序列在时间点1,000处均值发生转变，并且在此转变之前（从时间点800开始）自相关性发生变化。重要的是，在前兆区域中，均值和方差均未发生变化，传统方法也无法发现此类变化：\n\
    \n```python\nnp.random.seed(20)\nn=1000\nx=np.random.uniform(0,1,n)\n\nx=np.concatenate((np.zeros(n),np.ones(n)))\n\
    x=x+np.random.normal(0,0.3,len(x))\nfor i in range(n-round(n/5),n):\n    x[i]=0.9*x[i-1]+0.5*x[i]+0.02\n\
    x=x/np.std(x,ddof=1)\n\nt=np.arange(0,len(x))\n\nplt.figure()\nplt.plot(t, x)\n\
    plt.xlabel('Time')\n```\n\n我们首先对时间序列进行嵌入，然后计算递归图：\n\n```python\nn=len(x)\ntau=2\n\
    m=2\nn2=n - tau*(m-1)\n\ns=np.zeros((n2,m))\nfor mi in range(0,m):\n    s[:,mi]=x[np.arange(0,n2)+tau*mi]\n\
    ```\n\n```python\nD=distance.pdist(s)\nS=distance.squareform(D)\nR=S<0.5\n\nplt.imshow(R,\n\
    \    extent=[0,n2,0,n2],\n    cmap='gray_r',\n    origin='lower')\nplt.xlabel('Time')\n\
    plt.ylabel('Time')\nplt.show()\n```\n\n该递归图显示了两个随机分布点的块，每个块都标记了系统随机返回到相似状态的时间。在随机噪声中，相似状态频繁递归，但除了主对角线（即恒等线）外，没有任何规律性。递归图的两个块标记了在时间点1,000处的转变。变化点之前的状态与变化点之后的状态差异显著，这体现在递归图右下角和左上角几乎为空的象限中。然而，时间点800到1,000之间自相关性的先前增加在递归图中并不明显，尽管它看起来略显密集。在这种情况下，量化递归图中的结构可能被证明是有益的。\n\
    \n为了计算递归率，我们可以简单地计算矩阵R的平均值，\n\n```python\nRR=np.mean(R)\nprint(RR)\n```\n\n其结果为\n\
    \n```\n0.10654648642636631\n```\n\n因此，系统返回到随机选择的先前状态的概率约为10%。\n\n传递性系数是一个图论指标，用于衡量三个相连的网络节点（即三元组）完全互连（即形成一个封闭三角形）的概率：\n\
    \n$$\\tau = \\frac{\\sum_{i,j,k}^N A_{ij}A_{jk}A_{ik}}{\\sum_{i,j,k=1}^N A_{ij}A_{ik}(1-\\\
    delta_{ik})}$$\n\n这个指标可以直观地理解为相空间中的递归。我们可以通过网络链接来识别状态的递归：相空间轨迹上接近的点通过链接连接。三个相连的点形成一个三元组，但只有当这三个点彼此接近地递归时，它们才构成一个三元组，因此"
