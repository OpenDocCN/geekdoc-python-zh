    divergence in the systems’ states, after some time, the systems return to a state
    that is close to a former state before again passing through a similar evolution.
    Recurrence plots allow such recurrent behavior of dynamical systems to be visually
    portrayed. The method is now widely accepted as a useful tool in the nonlinear
