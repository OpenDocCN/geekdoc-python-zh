    \ sea colors to hypsometry and bathymetry, respectively:\n\n```\nplt.figure()\n\
    plt.axes(aspect='equal')\nplt.pcolor(SRTM,\n    cmap=cm.terrain)\nplt.colorbar()\n\
    plt.title('Elevation [m]')\nplt.show()\n```\n\nThe DEM indicates a horseshoe-shaped\
    \ mountain range surrounding a valley that slopes down toward the southeast (Fig.\
    \ 7.15 a).\nThe SRTM subset is now analyzed for slope and aspect. When working\
    \ with DEMs on a regular grid, the slope and aspect can be estimated using centered\
    \ finite differences in a local 3-by-3 neighborhood. Fig. 7.13 shows a local neighborhood\
