    # 4.9.1 Nonlinear and Weighted Regression


    Many bivariate data sets in the earth sciences follow a more complex trend than
    a simple linear or curvilinear trend. Classic examples of nonlinear trends include
    the exponential decay of radionuclides and the exponential growth of algae populations.
    In such cases, Python provides various tools for fitting nonlinear models to the
    data. An easy-to-use routine for fitting such models is nonlinear regression using
    `curve_fit()`. To demonstrate the use of `curve_fit()`, we generate a bivariate
    data set in which one variable is exponentially correlated with a second variable.
    We first generate evenly spaced values between 0.5 and 3 at intervals of 0.1 and
    add some Gaussian noise with a standard deviation of 0.2 in order to make the
    data unevenly spaced. The resulting 26 data points are sorted and stored in `data1`:'
