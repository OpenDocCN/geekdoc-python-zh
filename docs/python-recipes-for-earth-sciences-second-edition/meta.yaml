    \ as plt\nfrom scipy.optimize import curve_fit\nfrom numpy.random import default_rng\n\
    \nnp.random.seed(0)\ndata1=np.linspace(1,100,100)\ndata2=np.zeros(len(data1))\n\
    data2[45:54]=1/10*data1[45:54] - 4.5\ndata2[55:100]=1\ndata2=data2+0.1*np.random.normal(0,1,len(data2))\n\
    ```\n\nThe synthetic data sets are then analyzed using the function `curve_fit`.\
    \ We first fit a sigmoid function with four parameters a, b, c, and d\n\n```\n\
    def func1(x,a,b,c,d):\n    return a+b*((1+np.exp(-d*(x-c)))**(-1))\n```\n\nbefore\
    \ we use `curve_fit` to find the best values for a, b, c, and d in a least squares\
