    \ spherical distances instead of Pythagorean distances should be calculated from\
    \ a planar Cartesian coordinate system.\n\n## 7.10.4 Kriging\n\nWe now interpolate\
    \ our observations to a regular grid using *ordinary point kriging*, which is\
