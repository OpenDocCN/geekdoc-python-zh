    Converting decimals into binaries (and back) is not difficult. As an example,
    let us convert 25.1 into a binary representation. This number has an integer part
    of 25 and a fractional part of 0.1, which are converted separately. First, let
    us convert the integer part by typing


    ```

    2^7 2^6 2^5 2^4 2^3 2^2 2^1 2^0

    128 64 32 16 8 4 2 1

    0 0 0 1 1 0 0 1 binary number

    (power of 2)

    16 8 1 = 25 decimal number

    (power of 10)

    ```


    As we can see, we divide the number 25 into a sum of powers of two instead of
    powers of ten as in the decimal system. Alternatively, we can calculate the binary
    representation using


    ```

    25/2 = 12 remainder 1

    12/2 = 6 remainder 0

    6/2 = 3 remainder 0

    3/2 = 1 remainder 1

    1/2 = 0 remainder 1 (results in a zero therefore stop)

    ```


    The remainders are the binaries, which are arranged in reverse order such that
    the first remainder becomes the least significant digit (LSD) and the last remainder
    becomes the most significant digit (MSD). In our example, the integer part of
    the number 25.1 corresponds to the binary representation 11,001, or to a normalized
    floating point number of 1.1001 · 2^4.


    We next convert the fractional part 0.1 into a binary representation. Unfortunately,
    0.1 is one of the many examples that have an infinitely repeating binary representation.
    This is because 0.1 lies between two floating point numbers. In base 10, it is
    1.0 · 10^-1, but in base 2, it is


    ```

    .0001100110011001100110011001100110011...

    ```


    which is calculated by multiplying 0.1 by two, taking the decimal as the digit,
    taking the fraction as the starting point for the next step, repeating the process
    until we obtain either 0 or a periodic number, and then reading the binary number
    starting from the top, as shown below:


    ```

    0.1 * 2 = 0.2 -> 0

    0.2 * 2 = 0.4 -> 0

    0.4 * 2 = 0.8 -> 0

    0.8 * 2 = 1.6 -> 1

