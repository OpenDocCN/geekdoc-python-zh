- md: "## Question 60\n\nInheritance. Suppose you have the following class:\n\n```python\n\
    class Pet:\n    name = 'Luna'\n    def __init__(self, name):\n        self.name\
    \ = name\n\n    def __str__(self):\n        return f'My name is {self.name}.'\n\
    \nclass Dog(Pet):\n    name = 'Max'\n    def __init__(self, name):\n        super().__init__(name)\n\
    ```\n\nWhat is the output of the following code?\n\n```python\nrex = Dog('Rex')\n\
    print(rex.name)\nprint(Pet.name)\nprint(Dog.name)\n```\n\n- 1. Rex\n- 2. Luna\n\
    - 3. Luna\n- 4. Rex\n- 5. Rex\n- 6. Rex\n- 7. Rex\n- 8. Luna\n- 9. Max\n- 10.\
    \ (Correct)\n- 11. Rex\n- 12. Luna\n- 13. Rex\n\n## Explanation\n\nWhen you try\
    \ to access any object's entity, Python will try to (in this order):\n\n- find\
    \ it inside the object itself;\n- find it in all classes involved in the object's\
    \ inheritance line from bottom to top; If both of the above fail, an exception\
    \ AttributeError is raised.\n\n## Question 61\n\nSelect all true statements about\
    \ importing modules/packages. (select 2)\n\n- When a file is imported as a module,\
    \ its `__name__` variable is set to `__main__`.\n- When a module is imported,\
    \ its content is implicitly executed by Python. It gives the module the chance\
    \ to initialize some of its internal aspects.\n- (Correct)\n- The initialization\
    \ during importing module takes place only once, when the first import occurs.\
    \ Python remembers the imported modules and silently omits all subsequent imports.\n\
    - (Correct)\n- When you run a file directly, its `__name__` variable is set to\
    \ the file's name (without .py extension).\n\n## Explanation\n\nWhen a file is\
    \ imported as a module, its `__name__` variable is set to `__main__`. -> False.\
    \ It's set to the file's name (without .py extension).\n\nWhen you run a file\
    \ directly, its `__name__` variable is set to the file's name (without .py extension).\
    \ -> False. It's set to `__main__`.\n\n## Question 62\n\nHow to check the pip\
    \ version from the terminal (Windows system)? The `>` character stands for a command\
    \ prompt. (select 3)\n\n- 1. `> python -m pip --version`\n- 2. (Correct)\n- 3.\
    \ `> pip --version`\n- 4. (Correct)\n- 5. `> py -m pip --version`\n- 6. (Correct)\n\
    - 7. `> pip --V`\n\n## Question 63\n\nWhen opening a file, what mode will you\
    \ use to read the data from the file?\n\n- 1. `mode='r'`\n- 2. (Correct)\n- 3.\
    \ `mode='b'`\n- 4. `mode='w'`\n- 5. `mode='wb'`\n\n## Explanation\n\n- `'r'` open\
    \ for reading (default)\n- `'w'` open for writing, truncating the file first\n\
    - `'x'` open for exclusive creation, failing if the file already exists\n- `'a'`\
    \ open for writing, appending to the end of file if it exists\n- `'b'` binary\
    \ mode\n- `'t'` text mode (default)\n- `'+'` open for updating (reading and writing)\n\
    \nhttps://docs.python.org/3/library/functions.html#open\n\n## Question 64\n\n\
    Select all true statements about pip tool.\n\n- It's a command-line tool.\n- (Correct)\n\
    - There are two different pip implementations, one for Python 2 and the other\
    \ for Python 3.\n- (Correct)\n- It's always available because it's installed along\
    \ with Python.\n- It's a GUI tool.\n\n## Explanation\n\npip is the package installer\
    \ for Python. You can use it to install packages from the Python Package Index\
    \ and other indexes.\n\nhttps://pip.pypa.io/en/stable/\n\n## Question 65\n\nThe\
    \ meaning of the keyword parameter is determined by…\n\n- its connection with\
    \ existing variables.\n- its position within the argument list.\n- its value.\n\
    - the argument's name specified along with its value.\n- (Correct)\n\n## Question\
    \ 66\n\nWhat is the output of the following print function?\n\n```python\nprint(\n\
    \    \"\"\"Python is a high-level, interpreted,\\ngeneral-purpose \"\"\"\n   \
    \ \"\"\"programming language.\"\"\"\n)\n```\n\n- 1. Python is a high-level, interpreted,\n\
    - 2.\n- 3. general-purpose programming language.\n- 4. Python is a high-level,\
    \ interpreted, general-purpose programming language.\n- 5. Python is a high-level,\
    \ interpreted,\\ngeneral-purpose programming language.\n- 6. Python is a high-level,\
    \ interpreted,\n- 7. general-purpose programming language.\n- 8. (Correct)\n\n\
    ## Question 67\n\nSelect all true statements about tuples. (select 2)\n\n- You\
    \ can append elements to tuples.\n- Tuples cannot contain other tuples.\n- Each\
    \ tuple element may be of a different type (i.e., integers, strings, booleans,\
    \ etc.)\n- (Correct)\n- Tuples are ordered and unchangeable (immutable) collections\
    \ of data.\n- (Correct)\n\n## Explanation\n\nTuples can contain other tuples.\n\
    You cannot append elements to tuples.\n\n## Question 68\n\nWhich built-in function\
