    # Question 55


    The code variable is given:


    ```

    code = ''cnjn-vebb-ffvb''

    ```


    We need to transform this variable so that all letters are uppercase:


    ```

    ''CNJN-VEBB-FFVB''

    ```


    What text method should you use in this case? Select correct answers. (select
    2)


    +   1. code.to_upper()

    2. code.upper()

    3. (Correct)

    4. code.title()

    5. code.capitalize()

    6. str.upper(code)

    7. (Correct)


    Explanation


    str.upper() - return a copy of the string with all the cased characters converted
    to uppercase. Note that s.upper().isupper() might be False if s contains uncased
    characters or if the Unicode category of the resulting character(s) is not “Lu”
    (Letter, uppercase), but e.g. “Lt” (Letter, titlecase).


    https://docs.python.org/3/library/stdtypes.html#str.upper'
