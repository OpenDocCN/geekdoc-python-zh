    \ when an exception occurs?\n\n- all matching branches\n- any of the matching\
    \ branches\n- the first matching branch\n- (Correct)\n- the last matching branch\n\
    \n## Explanation\n\nThe `try` statement specifies exception handlers and/or cleanup\
    \ code for a group of statements:\n\n```\ntry_stmt ::= try1_stmt | try2_stmt\n\
    try1_stmt ::= \"try\" \":\" suite\n             (\"except\" [expression [\"as\"\
    \ identifier]] \":\" suite)+\n             [\"else\" \":\" suite]\n          \
    \   [\"finally\" \":\" suite]\ntry2_stmt ::= \"try\" \":\" suite\n           \
    \  \"finally\" \":\" suite\n```\n\nhttps://docs.python.org/3/reference/compound_stmts.html#the-try-statement\n\
    \n## Question 41\n\nSelect all true statements about conditional statement in\
    \ Python. (select 2)\n\n- The keyword `elif` is short for 'else if'.\n- (Correct)\n\
    - There can be at most one `elif` part in a conditional statement.\n- The following\
    \ conditional statement is correct:\n    `print('some value'): if 'data'`\n- The\
    \ `else` part is optional in the conditional statement.\n- (Correct)\n\n## Explanation\n\
    \nThe `if` statement is used for conditional execution:\n\n```\nif_stmt ::=  \"\
    if\" assignment_expression \":\" suite\n            (\"elif\" assignment_expression\
    \ \":\" suite)*\n            [\"else\" \":\" suite]\n```\n\nIt selects exactly\
    \ one of the suites by evaluating the expressions one by one until one is found\
    \ to be true; then that suite is executed (and no other part of the `if` statement\
    \ is executed or evaluated). If all expressions are false, the suite of the `else`\
    \ clause, if present, is executed.\n\nhttps://docs.python.org/3/tutorial/controlflow.html#if-statements\n\
    \n## Question 42\n\nWhat is the result of the following code snippet?\n\n```python\n\
