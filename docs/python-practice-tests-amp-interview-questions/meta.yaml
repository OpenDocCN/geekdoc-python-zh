  mdcn: "## 问题 10\n\n在类实现中，`self` 是什么意思？\n\n-   `self` 这个词代表一个类。如果我们创建一个绑定到整个类的方法，我们会将\
    \ `self` 作为类方法的第一个参数传递。\n-   `self` 这个词代表类的一个实例。使用 `self` 关键字，我们可以在 Python 中访问类的属性和方法。`self`\
    \ 这个名字只是一个约定。在实现一个实例方法时，`self` 必须作为方法的第一个参数传递。（正确）\n-   `self` 这个词是 Python 的一个关键字。\n\
    \n## 解释\n\n通常，方法的第一个参数被称为 `self`。这仅仅是一个约定：`self` 这个名字对 Python 来说没有任何特殊含义。然而，请注意，如果不遵循这个约定，你的代码对其他\
    \ Python 程序员来说可能可读性较差，而且可以想象，可能会编写一个依赖于这种约定的类浏览器程序。\n\nhttps://docs.python.org/3/tutorial/classes.html\n\
    \n## 问题 11\n\n由 lambda 表达式定义的函数是什么？\n\n-   用 lambda 表达式定义的函数是一个匿名函数（一个没有定义名称的函数）。这个函数可以接受任意数量的参数，并且可以包含任意数量的语句。\n\
    -   用 lambda 表达式定义的函数是一个匿名函数（一个没有定义名称的函数）。这个函数只能有一个参数，并且只能有一条语句。\n-   用 lambda\
    \ 表达式定义的函数是一个匿名函数（一个没有定义名称的函数）。这个函数可以接受任意数量的参数，但它只能有一条语句。（正确）\n\n## 解释\n\nLambda\
    \ 表达式（有时称为 lambda 形式）用于创建匿名函数。表达式 `lambda parameters: expression` 会生成一个函数对象。\n\
    \nhttps://docs.python.org/3/reference/expressions.html#lambda\n\n## 问题 12\n\n\
    以下代码片段的输出是什么？\n\n```\nvar1 = var2 = var3 = 10\nprint(var1, var2, var3, sep='-')\n\
    ```\n\n1. 10-10-10\n2. (正确)\n3. 10 10 10\n4. True-True-10\n5. var1-var2-var3\n\
    \n## 问题 13\n\n在 Python 中，用于检查两个值是否不相等的运算符编码为：\n\n1. not ==\n2. ==\n3. <>\n4. !=\
    \ (正确)\n\n## 解释\n\n`!=` - 返回一个布尔值，表示两个表达式是否不相等。\n\n## 问题 14\n\n当你尝试运行以下代码时会发生什么？\n\
    \n```\nprint(Welcome to the world of Python!)\n```\n\n-   这段代码将在控制台打印 `Welcome\
    \ to the world of Python!`。\n-   这段代码将引发 `SyntaxError` 异常。（正确）\n-   这段代码将引发 `NameError`\
    \ 异常。\n-   这段代码将引发 `TypeError` 异常。\n\n## 问题 15\n\n以下代码返回什么？\n\n```\nisinstance(True,\
    \ int)\n```\n\n1. False\n2. True (正确)\n3. None\n4. class\n\n## 解释\n\n`isinstance(object,\
    \ classinfo)` - 如果 `object` 参数是 `classinfo` 参数的实例，或者是其（直接、间接或虚拟）子类的实例，则返回 `True`。如果\
    \ `object` 不是给定类型的对象，该函数始终返回 `False`。\n\nhttps://docs.python.org/3/library/functions.html#isinstance\n\
    \n## 问题 16\n\n你可以使用哪个内置函数来检查给定对象是否具有特定的属性/方法？\n\n1. `setattr()`\n2. `getattr()`\n\
    3. `hasattr()` (正确)\n4. `attr()`\n\n## 解释\n\n`hasattr(object, name)` - 参数是一个对象和一个字符串。如果该字符串是对象属性之一的名称，则结果为\
    \ `True`，否则为 `False`。\n\nhttps://docs.python.org/3/library/functions.html#hasattr\n\
    \n## 问题 17\n\n以下代码的预期输出是什么？\n\n```\nimport math\n\ntry:\n    print(math.sqrt(-9))\n\
    except ValueError:\n    print('The number cannot be negative.')\nelse:\n    print('The\
    \ operation was performed successfully.')\nfinally:\n    print('The end.')\n```\n\
    \n1. 3.0\n2. The operation was performed successfully.\n3. The end.\n4. 3.0\n\
    5. The number cannot be negative.\n6. The end.\n7. The number cannot be negative.\n\
    8. The number cannot be negative.\n9. The end.\n10. (正确)\n\n## 解释\n\n`math` 模块提供了对\
    \ C 标准定义的数学函数的访问。\n\nhttps://docs.python.org/3/library/math.html\n\n## 问题 18\n\
    \n执行以下代码的预期结果是什么？\n\n```\nexpression = '1.3 + 2.7'\nprint(eval(expression) + float('4.5'))\n\
    ```\n\n-   这段代码将引发 `ValueError` 异常。\n-   8.0\n-   这段代码将引发 `TypeError` 异常。\n- \
    \  8.5 (正确)\n\n## 问题 19\n\n哪个版本的代码更可取？\n\n```\nx, y = 1, 0\n\ntry:\n    x / y\n\
    except Exception as e:\n    print(e)\nx, y = 1, 0\n\ntry:\n    x / y\nexcept ValueError\
    \ as e:\n    print(e)\nx, y = 1, 0\n\ntry:\n    x / y\nexcept ZeroDivisionError\
    \ as e:\n    print(e)\n(Correct)\nx, y = 1, 0\n\ntry:\n    x / y\nexcept TypeError\
    \ as e:\n    print(e)\n```\n\n## 解释\n\nPython 之禅：显式优于隐式。\n\nhttps://docs.python.org/3/tutorial/errors.html#handling-exceptions\n\
    \n## 问题 20\n\n以下程序的预期行为是什么？\n\n```\ni = 0\nflag = False\n\nwhile True:\n    if\
    \ i >= 10:\n        flag = True\n        break\n    i += 1\n\nprint(i)\n```\n\n\
    -   这段代码将在控制台输出 11。\n-   这段代码将进入无限循环。\n-   这段代码将在控制台输出 10。（正确）\n-   这段代码将在控制台输出\
    \ `True`。\n\n## 解释\n\n```\nbreak_stmt ::= \"break\"\n```\n\n`break` 在语法上只能嵌套在\
    \ `for` 或 `while` 循环中，但不能嵌套在该循环内的函数或类定义中。\n它会终止最近的封闭循环，如果循环有可选的 `else` 子句，则会跳过该子句。\n\
    \nhttps://docs.python.org/3/reference/simple_stmts.html#the-break-statement\n\n\
    ## 问题 21\n\n如果用户输入 0，以下代码片段的输出是什么？\n\n```\ntry:\n    val = int(input('Enter a\
    \ value: '))\n    print(val / len(val))\nexcept ZeroDivisionError:\n    print('ZeroDivisionError\
    \ raised...')\nexcept:\n    print('Bad input...')\n```\n\n-   这段代码将引发 `ValueError`\
    \ 异常并在控制台输出 `Bad input...`。\n-   这段代码将引发 `TypeError` 异常并在控制台输出 `Bad input...`。（正确）\n\
    -   这段代码将引发 `ZeroDivisionError` 异常并在控制台输出 `ZeroDivisionError raised...`。\n-  \
    \ 0.0\n\n## 解释\n\n```\nval = int(input('Enter a value: ')) -> '0'\nprint(val /\
    \ len(val)) -> print('0' / len('0')) -> 它将引发 TypeError 异常。\n```\n\n## 问题 22\n\n\
    以下代码的结果是什么？\n\n```\nclass Book:\n    language = 'ENG'\n    is_ebook = True\n\n\
    \    def set_title(self, value):\n        if not isinstance(value, str):\n   \
    \         raise TypeError(\n                'The value of the title attribute\
    \ must be of str '\n                'type.'\n            )\n        self.title\
    \ = value\n\nbook = Book()\nbook.set_title('Inferno')\nbook.year = 2020\nbook.subtitle\
    \ = None\nprint(book.__dict__)\n```\n\n1. `{'title': 'Inferno', 'year': 2020,\
    \ 'subtitle': None}` (正确)\n2. `{}`\n3. `{'title': 'Inferno'}`\n4. `{'language':\
    \ 'ENG', 'is_ebook': True, 'title': 'Inferno', 'year': 2020, 'subtitle': None}`\n\
    \n## 解释\n\n`isinstance(object, classinfo)` - 如果 `object` 参数是 `classinfo` 参数的实例，或者是其（直接、间接或虚拟）子类的实例，则返回\
    \ `True`。如果 `object` 不是给定类型的对象，该函数始终返回 `False`。\n\nhttps://docs.python.org/3/library/functions.html#isinstance\n\
    \n## 问题 23\n\n如果用户分别输入 3 和 7，以下代码片段的输出是什么？\n\n```\nnum1 = input()\nnum2 = input()\n\
