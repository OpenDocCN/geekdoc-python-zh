    \ are no such operators in Python.\n- The / operator does a normal division, and\
    \ the // operator does an integer division. (Correct)\n- The // operator does\
    \ a normal division, and the / operator does an integer division.\n- These operators\
    \ can be used interchangeably.\n\nExplanation\n\nThe / (division) and // (floor\
    \ division) operators yield the quotient of their arguments. The numeric arguments\
    \ are first converted to a common type. Division of integers yields a float, while\
