  md: "# Question 60\n\nInheritance. Suppose you have the following class:\n\n```\n\
    class Pet:\n    name = 'Luna'\n    def __init__(self, name):\n        self.name\
    \ = name\n\n    def __str__(self):\n        return f'My name is {self.name}.'\n\
    \nclass Dog(Pet):\n    name = 'Max'\n    def __init__(self, name):\n        super().__init__(name)\n\
    ```\n\nWhat is the output of the following code?\n\n```\nrex = Dog('Rex')\nprint(rex.name)\n\
    print(Pet.name)\nprint(Dog.name)\n```\n\n+   1. Rex\n2. Luna\n3. Luna\n4. Rex\n\
    5. Rex\n6. Rex\n7. Rex\n8. Luna\n9. Max\n10. (Correct)\n11. Rex\n12. Luna\n13.\
    \ Rex"
  merge: -1
  pgno: 69
- img_proc: true
  md: '# Explanation


    When you try to access any object''s entity, Python will try to (in this order):


    +   - find it inside the object itself;

    - find it in all classes involved in the object''s inheritance line from bottom
    to top; If both of the above fail, an exception AttributeError is raised.'
