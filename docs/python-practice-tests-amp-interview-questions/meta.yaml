    - Convert a list to a tuple and back to a list.\n\n## Question 43\n\nThe following\
    \ list is given:\n\n```\nstream = ['0343', '5-355', '5452', None]\n```\n\nIs it\
    \ possible to sort the above list with the list.sort() method?\n\n- Yes.\n- No,\
    \ because a list that contains None cannot be sorted.\n- (Correct)\n- No, because\
    \ the lists contain objects of type str that cannot be sorted.\n\n## Question\
    \ 44\n\nWhat types of loops are available in Python? (select 2)\n\n- 1. for\n\
    - 2. (Correct)\n- 3. while\n- 4. (Correct)\n- 5. do while\n- 6. do until\n\n##\
    \ Question 45\n\nLet's consider the following problem. A list of numbers is given:\n\
    \n```\nnumbers = [1, 2, 3, 4, 5, 6]\n```\n\nOur task is to leave only even numbers\
    \ in the list. We may be tempted to write the following code:\n\n```\nfor i in\
    \ numbers:\n    if i % 2 != 0 and i < len(numbers):\n        del numbers[i]\n\
    ```\n\nThis solution is incorrect because we iterate over the object from which\
    \ we remove elements (this causes some element skips in the iterable object and\
    \ results in a wrong answer).\n\nSelect the obtained numbers list.\n\n- 1. [3,\
    \ 4, 6, 7, 8]\n- 2. [1, 3, 4, 6, 7]\n- 3. []\n- 4. [1, 3, 4, 6, 7, 8]\n- 5. (Correct)\n\
    \n## Explanation\n\nCorrect implementation (Iterating over the copy of the list):\n\
    \n```\nfor i in numbers[:]:\n    if i % 2 != 0 and i < len(numbers):\n       \
    \ del numbers[i]\n```\n\n## Question 46\n\nWhat is the output of the following\
    \ code?\n\n```\nclass Container:\n    pass\n\nclass TemperatureControlledContainer(Container):\n\
    \    pass\n\nclass RefrigeratedContainer(TemperatureControlledContainer):\n  \
    \  pass\n\nfor cls in RefrigeratedContainer.__mro__:\n    print(cls.__name__)\n\
    ```\n\n- 1. RefrigeratedContainer\n- 2. TemperatureControlledContainer\n- 3. Container\n\
    - 4. object\n- 5. (Correct)\n- 6. object\n- 7. Container\n- 8. TemperatureControlledContainer\n\
    - 9. RefrigeratedContainer\n- 10. RefrigeratedContainer\n- 11. TemperatureControlledContainer\n\
    - 12. RefrigeratedContainer\n- 13. TemperatureControlledContainer\n- 14. Container\n\
    \n## Explanation\n\nMRO - Method Resolution Order\n\nhttps://www.python.org/download/releases/2.3/mro/\n\
    \n## Question 47\n\nA function definition...\n\n- must be placed after the first\
