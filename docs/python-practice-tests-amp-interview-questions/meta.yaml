    \n## 解释\n\n步骤：\n\n```\nnum1 = input() -> '3'\nnum2 = input() -> '7'\nprint(num1\
    \ + num2) -> print('3' + '7') -> print('37')\n```\n\n## 问题 24\n\n什么是 PEP8？\n\n\
