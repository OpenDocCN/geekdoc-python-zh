- md: "## Question 36\n\nWhat does *args mean in function?\n\n- The special *args\
    \ syntax is most commonly used in function definitions. It is used to pass a variable\
    \ number of arguments to a function - arguments that do not have a specific name.\
    \ (Correct)\n- Python does not have a *args syntax.\n- The special *args syntax\
    \ is most commonly used in function definitions. It is used to pass a variable\
    \ number of arguments to a function - arguments with specific names.\n\n## Explanation\n\
    \nA function can be called with an arbitrary number of arguments. These arguments\
    \ will be wrapped up in a tuple. Before the variable number of arguments, zero\
    \ or more normal arguments may occur. Example:\n\n```\ndef write_multiple_items(file,\
    \ separator, *args):\n    file.write(separator.join(args))\n```\n\nNormally, these\
    \ variadic arguments will be last in the list of formal parameters, because they\
    \ scoop up all remaining input arguments that are passed to the function. Any\
    \ formal parameters which occur after the *args parameter are ‘keyword-only’ arguments,\
    \ meaning that they can only be used as keywords rather than positional arguments.\n\
    \nhttps://docs.python.org/3/tutorial/controlflow.html#arbitrary-argument-lists\n\
    \n## Question 37\n\nWhat is the output of the following snippet?\n\n```\nprint(True\
    \ > False, True < False, True == False)\n```\n\n1. False True False\n2. True False\
    \ False\n3. (Correct)\n4. None None None\n5. 1 0 0\n6. Boolean values cannot be\
    \ compared with each other and the TypeError will be raised.\n\n## Question 38\n\
    \nThe following list is given:\n\n```\nheaders = ['open', 'high', 'low', 'close',\
    \ 'volume']\n```\n\nHow do you combine headers list items into a single string\
    \ using a comma (see below):\n\n```\n'open,high,low,close,volume'\n```\n\n1. ','.join(headers)\n\
    2. (Correct)\n3. ' '.join(headers)\n4. list.join(headers, ',')\n5. headers.join(',')\n\
    \n## Explanation\n\nstr.join(iterable) returns a string which is the concatenation\
    \ of the strings in iterable.\n\nhttps://docs.python.org/3/library/stdtypes.html#str.join\n\
