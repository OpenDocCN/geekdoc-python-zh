    \ be placed anywhere inside the code after the first invocation.\n- cannot be\
    \ placed among other code.\n\n## Question 48\n\nWhat function will you use to\
    \ get input from the user?\n\n- 1. print()\n- 2. input()\n- 3. (Correct)\n- 4.\
    \ stdin()\n- 5. read()\n\n## Explanation\n\ninput([prompt]) - if the prompt argument\
    \ is present, it is written to standard output without a trailing newline. The\
    \ function then reads a line from input, converts it to a string (stripping a\
    \ trailing newline), and returns that.\n\nhttps://docs.python.org/3/library/functions.html#input\n\
    \n## Question 49\n\nIn Python * operator represents multiplication, for example:\n\
    \n```\n8 * 6 -> 48\n4 * 0.5 -> 2.0\n```\n\nBut Python has the ability to use the\
    \ same operator against completely different kinds of data (like numbers vs. strings).\
    \ It is called overloading. What is the result of the following snippet of code?\n\
    \n```\nprint(3 * True)\nprint(False * 2)\nprint('4' * 6)\nprint(['1', '0'] * 3)\n\
    ```\n\n- 1. 3\n- 2. 0\n- 3. 48\n- 4. ['1', '0', '1', '0', '1', '0']\n- 5. 3\n\
    - 6. 0\n- 7. 444444\n- 8. ['3', '0']\n- This code will raise the TypeError exception.\n\
    - 9. 3\n- 10. 0\n- 11. 444444\n- 12. ['1', '0', '1', '0', '1', '0']\n- 13. (Correct)\n\
    \n## Explanation\n\nThe * operator needs a string and a number as arguments. In\
    \ this case, the order doesn't matter - you can put the number before the string,\
    \ or vice versa, the result will be the same - a new string created by the n-th\
    \ replication of the argument's string.\n\n## Question 50\n\nThe following two\
    \ lists are given:\n\n```\nstocks_1 = ['TSLA', 'MSFT', 'AMZN']\nstocks_2 = ['AAPL',\
    \ 'NVDA']\n```\n\nHow do you combine these lists into one (see below)? (select\
    \ 3)\n\nExpected output:\n\n```\n['TSLA', 'MSFT', 'AMZN', 'AAPL', 'NVDA']\n```\n\
    \n- 1. stocks_1.extend(stocks_2)\n- 2. (Correct)\n- 3. [*stocks_1, *stocks_2]\n\
    - 4. (Correct)\n- 5. [**stocks_1, **stocks_2]\n- 6. stocks_1 + stocks_2\n- 7.\
    \ (Correct)\n\n## Question 51\n\nWhich variables below are incorrectly defined?\
    \ (select 4)\n\n- 1. var1 = 100\n- 2. __year = [24, 53, 65, 12]\n- 3. _year =\
    \ [24, 53, 65, 12]\n- 4. 2020_year = [24, 53, 65, 12]\n- 5. (Correct)\n- 6. class\
    \ = 'English Course'\n- 7. (Correct)\n- 8. if = 30\n- 9. (Correct)\n- 10. def\
    \ = 'This is a short definition of sth.'\n- 11. (Correct)\n\n## Explanation\n\n\
    The variable name cannot start with a digit.\nif, class, def - these are keywords\
    \ in Python and cannot be used as variable names.\n\n## Question 52\n\nLet's assume\
    \ that in our working directory we have virtual environment called dev-env. Where\
