    \ an instance method, self must be passed as the first argument of the method.\
    \ (Correct)\n- The word self is a Python keyword.\n\n## Explanation\n\nOften,\
    \ the first argument of a method is called self. This is nothing more than a convention:\
    \ the name self has absolutely no special meaning to Python. Note, however, that\
    \ by not following the convention your code may be less readable to other Python\
    \ programmers, and it is also conceivable that a class browser program might be\
    \ written that relies upon such a convention.\n\nhttps://docs.python.org/3/tutorial/classes.html\n\
    \n## Question 11\n\nWhat is a function defined by a lambda expression?\n\n- A\
    \ function defined with a lambda expression is an anonymous function (a function\
    \ that has no defined name). This function can take any number of arguments and\
    \ can take any number of instructions.\n- A function defined with a lambda expression\
    \ is an anonymous function (a function that has no defined name). This function\
    \ can only have one argument and can only have one statement.\n- A function defined\
    \ with a lambda expression is an anonymous function (a function that has no defined\
    \ name). This function can take any number of arguments, but it can only have\
    \ one statement. (Correct)\n\n## Explanation\n\nLambda expressions (sometimes\
    \ called lambda forms) are used to create anonymous functions. The expression\
    \ lambda parameters: expression yields a function object.\n\nhttps://docs.python.org/3/reference/expressions.html#lambda\n\
