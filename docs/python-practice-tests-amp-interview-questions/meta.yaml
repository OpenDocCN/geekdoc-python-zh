    \n步骤：\n\n```python\nnumbers = list(range(5)) -> [0, 1, 2, 3, 4]\nnumbers.insert(0,\
    \ 1) -> [1, 0, 1, 2, 3, 4]\ndel numbers[3] -> [1, 0, 1, 3, 4]\n```\n\nlist.insert(i,\
    \ x) - 在给定位置插入一个项目。第一个参数是要在其之前插入的元素的索引，因此 a.insert(0, x) 在列表开头插入，而 a.insert(len(a),\
