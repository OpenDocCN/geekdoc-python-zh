    Missing first self argument.\n\n```python\nclass Pet:\n    def init(self, name):\n\
    \        self.name = name\n```\nIncorrect method name. Should be `__init__`.\n\
    \n```python\nclass Pet:\n    def __init__(self, name):\n        name = name\n\
    ```\nIncorrect instance variable assignment (without `self.name`).\n\n## Question\
