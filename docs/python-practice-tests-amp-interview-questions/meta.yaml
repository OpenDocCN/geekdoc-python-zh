    def max(iterable):\n    if len(iterable) > 0:\n        return len(iterable)\n\n\
    print(max([4, 2, 7]))\n```\n\n- 1. 2\n- 2. None\n- 3. 7\n- 4. 3\n- 5. （正确）\n\n\
    ## 问题 28\n\n当一个类派生自另一个类时，它们的关系被称为...\n\n- 抽象。\n- 继承。\n- （正确）\n- 封装。\n- 多态。\n\n\
    ## 问题 29\n\n以下 `Vehicle` 类实现如下：\n\n```python\nclass Vehicle:\n    fleet = 0\n\
    \    def __init__(self, brand):\n        self.brand = brand\n```\n\n以下代码片段的结果是什么？\n\
    \n```python\nvehicle = Vehicle('Tesla')\nprint(hasattr(Vehicle, 'brand'))\nprint(hasattr(vehicle,\
    \ 'brand'))\n```\n\n- 1. False\n- 2. False\n- 3. True\n- 4. False\n- 5. True\n\
    - 6. True\n- 7. False\n- 8. True\n- 9. （正确）\n\n### 解释\n\n`print(hasattr(Vehicle,\
    \ 'brand'))` - False。它是实例属性。\n`print(hasattr(vehicle, 'brand'))` - True。\n\n`hasattr(object,\
    \ name)` - 参数是一个对象和一个字符串。如果字符串是对象属性之一的名称，则结果为 `True`，否则为 `False`。（这是通过调用 `getattr(object,\
    \ name)` 并查看是否引发 `AttributeError` 来实现的。）\n\nhttps://docs.python.org/3/library/functions.html#hasattr\n\
    \n## 问题 30\n\n如果用户分别输入 8 和 5，以下代码片段的输出是什么？\n\n```python\nvar1 = input()\nvar2\
    \ = int(input())\nprint(var1 * var2)\n```\n\n- 1. 85\n- 2. 88888\n- 3. （正确）\n\
    - 4. 40\n- 5. 此代码将引发 `TypeError` 异常。\n- 6. 55555555\n- 7. 此代码将引发 `SyntaxError`\
    \ 异常。\n\n### 解释\n\n```python\nvar1 = input() -> '8'\nvar2 = int(input()) -> 5\n\
    print(var1 * var2) -> print('8' * 5) -> print('88888')\n```\n\n## 问题 31\n\n当你引用一个尚未定义的变量时，会引发什么异常？\n\
    \n- 1. `IndexError`\n- 2. `KeyError`\n- 3. `NameError`\n- 4. （正确）\n- 5. `SyntaxError`\n\
    \n### 解释\n\n当找不到本地或全局名称时，会引发 `NameError`。这仅适用于非限定名称。关联的值是一个错误消息，包含无法找到的名称。\n\n\
    https://docs.python.org/3/library/exceptions.html#NameError\n\n## 问题 32\n\n`__init__()`\
    \ 方法是做什么的？\n\n- 此方法在实例创建后立即运行，允许你初始化此实例的状态（设置某些属性、验证属性的值等）。\n- （正确）\n- 此方法是对象的正式表示。\n\
    - 此方法用于实现迭代器。\n- 此方法是对象的非正式表示。\n\n### 解释\n\n`object.__init__(self[, ...])` - 在实例创建后（通过\
    \ `__new__()`）调用，但在返回给调用者之前。参数是传递给类构造函数表达式的参数。\n\n如果基类有一个 `__init__()` 方法，派生类的\
    \ `__init__()` 方法（如果有的话）必须显式调用它，以确保正确初始化实例的基类部分；例如：`super().__init__([args...])`。\n\
    \nhttps://docs.python.org/3/reference/datamodel.html#object.__init__\n\n## 问题\
    \ 33\n\n执行了以下操作：\n\n```python\na = [1, 2, 3, 4, 5]\nb = a\nb[:] = [3, 6]\n```\n\
    \n选择正确答案。\n\n- 1. `a = [1, 2, 3, 4, 5]`\n- 2. `b = [3, 6]`\n- 3. `a = [1, 2, 3,\
    \ 4, 5]`\n- 4. `b = [1, 2, 3, 4, 5]`\n- 5. `a = [3, 6]`\n- 6. `b = [3, 6]`\n-\
    \ 7. （正确）\n- 8. `a = [1, 2, 3, 4, 5]`\n- 9. `b = [1, 2, 3, 4, 5, 3, 6]`\n\n解释\n\
    \n`a` 和 `b` 是同一个列表。\n\n## 问题 34\n\n如果 `try:` 块内有一个 `finally:` 分支，我们可以说：\n\n- 如果没有引发异常，`finally:`\
    \ 分支将不会执行。\n- 当没有 `else:` 分支时，`finally:` 分支将被执行。\n- `finally:` 分支将始终被执行。\n- （正确）\n\
    - 如果任何 `except:` 分支被执行，`finally:` 分支将不会被执行。\n\n### 解释\n\n`try` 语句为一组语句指定异常处理程序和/或清理代码：\n\
    \n```\ntry_stmt ::= try1_stmt | try2_stmt\ntry1_stmt ::= \"try\" \":\" suite\n\
    \             (\"except\" [expression [\"as\" identifier]] \":\" suite)+\n   \
    \          [\"else\" \":\" suite]\n             [\"finally\" \":\" suite]\ntry2_stmt\
    \ ::= \"try\" \":\" suite\n             \"finally\" \":\" suite\n```\n\nhttps://docs.python.org/3/reference/compound_stmts.html#the-try-statement\n\
    \n## 问题 35\n\n你将使用什么指令来捕获异常？\n\n- 1. `catch`\n- 2. `throw`\n- 3. `assert`\n- 4.\
    \ `raise`\n- 5. `try... except...`\n- 6. （正确）\n\n### 解释\n\n`try` 语句为一组语句指定异常处理程序和/或清理代码：\n\
    \n```\ntry_stmt ::= try1_stmt | try2_stmt\ntry1_stmt ::= \"try\" \":\" suite\n\
    \             (\"except\" [expression [\"as\" identifier]] \":\" suite)+\n   \
    \          [\"else\" \":\" suite]\n             [\"finally\" \":\" suite]\ntry2_stmt\
    \ ::= \"try\" \":\" suite\n             \"finally\" \":\" suite\n```\n\nhttps://docs.python.org/3/tutorial/errors.html#handling-exceptions"
