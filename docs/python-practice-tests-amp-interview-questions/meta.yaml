  md: '# Question 67


    Select the correct answer about the continue statement. (select 2)


    +   - There is no continue statement in Python.

    - continue may only occur syntactically nested in a for or while loop, but not
    nested in a function or class definition within that loop.

    - (Correct)

    - The continue statement terminates the loop that contains it. Program control
    flows to the statements immediately after the loop body.

    - The continue statement is used to skip the rest of the code inside the loop
    for the current iteration only. The loop does not end but continues with the next
    iteration.

    - (Correct)


    # Explanation


    ```

    continue_stmt ::= "continue"

    ```


    continue may only occur syntactically nested in a for or while loop, but not nested
    in a function or class definition within that loop. It continues with the next
    cycle of the nearest enclosing loop.


    https://docs.python.org/3/tutorial/controlflow.html#break-and-continue-statements-and-else-clauses-on-loops

