    2. False True

    3. False False

    4. True True

    5. (Correct)


    # Explanation


    ```

    var1 = False

    var2 = True

    var1 = var1 or var2 -> False or True -> True

    var2 = var1 and var2 -> True and True -> True

    var1 = var1 or var2 -> True or True -> True

    ```


    Hence:


    ```

    var1 = True

    var2 = True

    ```'
