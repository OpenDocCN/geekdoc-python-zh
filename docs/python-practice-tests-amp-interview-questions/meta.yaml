    - 4. 4\n- 5. 2\n- 6. 10\n- 7. 10\n- 8. 4\n- 9. (Correct)\n\n## Explanation\n\n\
    The `while` statement is used for repeated execution as long as an expression\
    \ is true:\n\n```\nwhile_stmt ::= \"while\" assignment_expression \":\" suite\n\
    \             [\"else\" \":\" suite]\n```\n\nThis repeatedly tests the expression\
    \ and, if it is true, executes the first suite; if the expression is false (which\
    \ may be the first time it is tested) the suite of the `else` clause, if present,\
    \ is executed and the loop terminates.\n\nhttps://docs.python.org/3/reference/compound_stmts.html#the-while-statement\n\
    \n## Question 43\n\nThe following class is given:\n\n```python\nclass Interview:\
