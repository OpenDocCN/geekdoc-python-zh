    \ are a convenient way to insert debugging assertions into a program:\n\n```\n\
    assert_stmt ::= \"assert\" expression [\",\" expression]\n```\n\nhttps://docs.python.org/3/reference/simple_stmts.html#the-assert-statement\n\
    \n## Question 26\n\nWhat is the result of the following code snippet?\n\n```\n\
    var = 50\n\nif var == 50:\n    print(f'var = {var}')\nif var % 10 == 0:\n    print(f'var\
    \ % 10 = {var % 10}')\nif var > 10:\n    print('var > 10')\nelse:\n    print('end')\n\
    ```\n\n1. end\n2. var = 50\n3. var % 10 = 0\n4. var > 10\n5. (Correct)\n6. var\
    \ = 50\n7. var % 10 = 0\n8. var > 10\n9. end\n10. var = 50\n\n## Question 27\n\
    \nThe following dictionaries are given:\n\n```\nstocks_1 = {'MSFT': 280.0, 'AAPL':\
    \ 146.39, 'TSLA': 644.22}\nstocks_2 = {'AMZN': 3573.0, 'NVDA': 726.44}\n```\n\n\
    We want to combine them into one. Select correct answers. (select 3)\n\n- stocks_1.update(stocks_2)\n\
    \  - (Correct)\n- Python 3.5.0 or higher:\n  - {**stocks_1, **stocks_2}\n  - (Correct)\n\
    - Python 3.9.0 or higher:\n  - stocks_1 | stocks_2\n  - (Correct)\n- stocks_1\
    \ + stocks_2\n\n## Explanation\n\ndict.update([other]) - updates the dictionary\
    \ with the key/value pairs from other, overwriting existing keys. Return None.\n\
    \nhttps://docs.python.org/3/library/stdtypes.html#dict.update\n\n## Question 28\n\
    \nConsider the basic form of the following instruction:\n\n```\ntry:\n    ...\n\
    except:\n    ...\n```\n\nSelect the correct statement.\n\n- Python tries to execute\
    \ the code that follows the try statement as normal part of the program. If an\
    \ exception is not raised in the try block, the code following the except statement\
    \ is executed.\n- Python tries to execute the code that follows the try statement\
    \ as normal part of the program. When an exception is raised in the try block,\
    \ the code following the except statement is executed.\n  - (Correct)\n- Python\
    \ tries to execute the code that follows the try statement as normal part of the\
    \ program. When an exception is raised in a try block, the code following the\
    \ except statement is not executed.\n\n## Explanation\n\nThe try statement specifies\
    \ exception handlers and/or cleanup code for a group of statements:\n\n```\ntry_stmt\
    \ ::= try1_stmt | try2_stmt\ntry1_stmt ::= \"try\" \":\" suite\n             (\"\
    except\" [expression [\"as\" identifier]] \":\" suite)+\n             [\"else\"\
    \ \":\" suite]\n             [\"finally\" \":\" suite]\ntry2_stmt ::= \"try\"\
    \ \":\" suite\n             \"finally\" \":\" suite\n```\n\nhttps://docs.python.org/3/reference/compound_stmts.html#the-try-statement\n\
    \n## Question 29\n\nSelect correct answers about the break statement. (select\
    \ 2)\n\n- The break statement is used to skip the rest of the code inside the\
    \ loop for the current iteration only. The loop does not end but continues with\
    \ the next iteration.\n- The break statement terminates the loop that contains\
    \ it. Program control flows to the statements immediately after the loop.\n  -\
    \ (Correct)\n- If the break statement is in a nested loop (a loop inside another\
    \ loop), the break statement will end the innermost loop.\n  - (Correct)\n- The\
    \ break statement doesn't exist in Python.\n\n## Explanation\n\nThe break statement,\
    \ like in C, breaks out of the innermost enclosing for or while loop.\n\nhttps://docs.python.org/3/tutorial/controlflow.html#break-and-continue-statements-and-else-clauses-on-loops\n\
    \n## Question 30\n\nWhat is a local variable?\n\n- A local variable is a variable\
    \ that is available in the global scope.\n- A local variable is a variable that\
    \ is declared using the nonlocal keyword.\n- A local variable is a variable that\
    \ is declared using the global keyword.\n- A local variable is a variable that\
    \ is available in the local scope.\n  - (Correct)\n\n## Question 31\n\nWhat is\
    \ the result of the following code snippet?\n\n```\ndata_stream = \"\"\nwhile\
    \ data_stream:\n    print('data received')\nelse:\n    print('data not received')\n\
    ```\n\n- This code will output data not received to the console.\n  - (Correct)\n\
    - This code will raise SyntaxError exception. You cannot use else clause with\
    \ while loop.\n- This code will output data received to the console.\n- This code\
    \ will go into an infinite loop.\n\n## Explanation\n\nThe while statement is used\
