  md: '# Question 69


    What is a global variable?


    +   - A global variable is a variable that is available in the enclosing scope.

    - A global variable is a variable that is available in the global scope.

    - (Correct)

    - A global variable is any variable defined inside a function.

    - A global variable is any variable defined inside a class.


    # Explanation


    ```

    global_stmt ::= "global" identifier ("," identifier)*

    ```


    The global statement is a declaration which holds for the entire current code
    block. It means that the listed identifiers are to be interpreted as globals.
    It would be impossible to assign to a global variable without global, although
    free variables may refer to globals without being declared global.


    https://docs.python.org/3/reference/simple_stmts.html#the-global-statement'
  merge: -1
