  md: '# Question 70


    Select true statements about the `__repr__()` method. (select 3)


    +   - The `__repr__()` method returns the formal representation of the object
    as a string.

    - (Correct)

    - If possible, the returned string should be a valid Python expression that can
    be used to reconstruct the object.

    - (Correct)

    - The `__repr__()` method is always called when the `str()` function is called.

    - The `__repr__()` method is called when the `repr()` function is called.

    - (Correct)


    # Explanation


    object.`__repr__`(self) - called by the `repr()` built-in function to compute
    the “official” string representation of an object. If at all possible, this should
    look like a valid Python expression that could be used to recreate an object with
    the same value (given an appropriate environment).


    https://docs.python.org/3/reference/datamodel.html#object.__repr__'
