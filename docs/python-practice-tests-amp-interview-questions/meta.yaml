    \ apply to?\n\n- 1. func()\n- 2. gen()\n- 3. next()\n- 4. (Correct)\n- 5. iter()\n\
    \n## Explanation\n\nnext(iterator[, default]) - retrieve the next item from the\
    \ iterator by calling its __next__() method. If default is given, it is returned\
    \ if the iterator is exhausted, otherwise StopIteration is raised.\n\nhttps://docs.python.org/3/library/functions.html#next\n\
    \n## Question 42\n\nWhat is the easiest way to remove duplicates from the list?\n\
    \n- Use the list.remove_duplicates() method.\n- Convert a list to a dictionary\
