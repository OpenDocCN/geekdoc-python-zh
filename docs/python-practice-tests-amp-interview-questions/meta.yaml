  md: '# Question 61


    Select all true statements about importing modules/packages. (select 2)


    +   - When a file is imported as a module, its __name__ variable is set to __main__.

    - When a module is imported, its content is implicitly executed by Python. It
    gives the module the chance to initialize some of its internal aspects.

    - (Correct)

    - The initialization during importing module takes place only once, when the first
    import occurs. Python remembers the imported modules and silently omits all subsequent
    imports.

    - (Correct)

    - When you run a file directly, its __name__ variable is set to the file''s name
    (without .py extension).


    # Explanation


    When a file is imported as a module, its __name__ variable is set to __main__.
    -> False. It''s set to the file''s name (without .py extension).


    When you run a file directly, its __name__ variable is set to the file''s name
    (without .py extension). -> False. It''s set to __main__.'
