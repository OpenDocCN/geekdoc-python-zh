    \n# ## Prerequisites\n\nRun - \"pip install PyPDF2\"\n\n# ## How to run the script\n\
    \nIt can be executed by running \"python merge_pdfs.py\"\n\n**Requirements:**\n\
    **PyPDF2==1.26.0**\n\n**Source Code:**\n\n```\n#!/usr/bin/env python\n\nfrom PyPDF2\
    \ import PdfFileMerger\n\n\n# By appending in the end\ndef by_appending():\n \
    \   merger = PdfFileMerger()\n    # Either provide file stream\n    f1 = open(\"\
    samplePdf1.pdf\", \"rb\")\n    merger.append(f1)\n    # Or direct file path\n\
    \    merger.append(\"samplePdf2.pdf\")\n\n    merger.write(\"mergedPdf.pdf\")\n\
    \n\n# By inserting at after an specified page no.\ndef by_inserting():\n    merger\
    \ = PdfFileMerger()\n    merger.append(\"samplePdf1.pdf\")\n    merger.merge(0,\
    \ \"samplePdf2.pdf\")\n    merger.write(\"mergedPdf1.pdf\")\n```"
