    Songs grabbed:{len(s)}\")\n        except:\n            print(f\"some exception\
    \ at {name}: {c}\")\n\n# Function Call\nget_lyrics(artists, 3)\n```\n\n## 4. Merge\
    \ CSV files\n\nWith the help of the following simple python script, one would\
