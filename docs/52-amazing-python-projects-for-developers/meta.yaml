    \ 'left', 'left']) # Press the left arrow key 4 times.\n>>> pyautogui.keyUp('shift')\
    \ # Let go of the Shift key.\n```\n\n```python\n>>> pyautogui.hotkey('ctrl', 'c')\
    \ # Press the Ctrl-C hotkey combination.\n```\n\n```python\n>>> pyautogui.alert('This\
    \ is the message to display.') # Make an alert box appear and pause the program\
    \ until OK is clicked.\n```\n\n**Source Code:**\n\n```python\nimport pyautogui\n\
    import time\n\n# time to change tabs from editor to paint;\ntime.sleep(10)\n\n\
    # it will remain clicked till program ends;\npyautogui.click()\n\n# can be varied\
    \ according to convenience\ndistance = 250\n\nwhile distance > 0:\n    # right\n\
    \    pyautogui.dragRel(distance, 0, duration = 0.1)\n    distance -= 5\n\n   \
    \ # down\n    pyautogui.dragRel(0, distance, duration = 0.1)\n\n    # left\n \
