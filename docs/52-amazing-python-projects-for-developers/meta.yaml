  md: "# 13. Noise Reduction\n\nNoise Reduction Script\nImplementing a feature that\
    \ helps to filter an audio file by reducing the background noise similar to \"\
    Audacity\".\n\n# ## Libraries used\n\nFirstly import the following python libraries\n\
    \n+   * NumPy\n* scipy.io.wavfile\n* Matplotlib\n* Os\n\nSave the audio files\
    \ and your code in the same folder\nRun the python code\n\n# ## Detailed explanation\
    \ of method used for \"Noise Reduction Script\"\n\n+   * Imported the required\
    \ libraries (NumPy, scipy.io.wavfile, and Matplotlib)\n* Read the input audio\
    \ file using scipy.io.wavfile library\n* Converting the audio file into an array\
    \ containg all the information of the given audio file and intiallizing the frame\
    \ value.\n* Calculating the first fourier transform of each window of the noisy\
    \ audio file\n* Subtracting the noise spectral mean from input spectral, and istft\
    \ (Inverse Short-Time Fourier Transform)\n* Finally getting an audio file with\
    \ reduction in the background noise at a much higher extent\n\n**Requirements:**\n\
    **matplotlib==3.2.2**\n**numpy==1.18.5**\n**scipy==1.5.0**\n\n**Source Code:**\n\
    \n```\n# Spectral Subtraction: Method used for noise reduction\nimport scipy.io.wavfile\
    \ as wav\nimport numpy as np\nimport matplotlib.pyplot as plt\n\nfile = input(\"\
    Enter the file path: \")\nsr, data = wav.read(file)\nfl = 400 #frame_length\n\
    frames = [] #empty list\nfor i in range(0,int(len(data)/(int(fl/2))-1)):\n   \
    \ arr = data[int(i*int(fl/2)):int(i*int(fl/2)+fl)]\n    frames.append(arr) #appending\
    \ each array data into the frames list\n```"
  merge: -1
  pgno: 35
- img_proc: true
  md: "```\nframes = np.array(frames)  #converting the frames list into an array\n\
    ham_window = np.hamming(fl)  #using np.hamming\nwindowed_frames = frames*ham_window\
    \  #multiplying frames array with ham_window\ndft = []  #empty list containing\
    \ fft of windowed_frames\nfor i in windowed_frames:\n    dft.append(np.fft.fft(i))\
    \  #now taking the first fourier transform of each window\ndft = np.array(dft)\
    \ #converting dft into array\n\ndft_mag_spec = np.abs(dft)  #converting dft into\
    \ absolute values\ndft_phase_spec = np.angle(dft)  #finding dft angle\nnoise_estimate\
    \ = np.mean(dft_mag_spec,axis=0)  #mean\nnoise_estimate_mag = np.abs(noise_estimate)\
    \  #absolute value\n\nestimate_mag = (dft_mag_spec-2*noise_estimate_mag)  #subtraction\
    \ method\nestimate_mag[estimate_mag<0]=0\nestimate = estimate_mag*np.exp(1j*dft_phase_spec)\
    \ #calculating the final estimate\nift = []  #taking ift as input list containing\
    \ inverse fourier transform of estimate\nfor i in estimate:\n    ift.append(np.fft.ifft(i))\
    \  #appending in ift list\n\nclean_data = []\nclean_data.extend(ift[0][:int(fl/2)])\
    \  #extending clean_data containg ift list\nfor i in range(len(ift)-1):\n    clean_data.extend(ift[i][int(fl/2):]+ift[i+1][:int(fl/2)])\n\
    clean_data.extend(ift[-1][int(fl/2):])  #extending clean_data containing ift list\n\
    clean_data = np.array(clean_data) #converting it into array\n\n#finally plotting\
    \ the graph showing the diffrence in the noise\nfig = plt.figure(figsize=(8,5))\n\
    ax = plt.subplot(1,1,1)\nax.plot(np.linspace(0,64000,64000),data,label='Original',color=\"\
    orange\")\nax.plot(np.linspace(0,64000,64000),clean_data,label='Filtered',color=\"\
    purple\")\nax.legend(fontsize=12)\nax.set_title('Spectral Subtraction Method',\
    \ fontsize=15)\nfilename = os.path.basename(file)\ncleaned_file = \"(Filtered_Audio)\"\
    +filename  #final filtered audio\nwav.write(cleaned_file,rate=sr, data = clean_data.astype(np.int16))\n\
    plt.savefig(filename+\"(Spectral Subtraction graph).jpg\") #saved file name as\
    \ audio.wav(Spectral Subtraction graph).jpg\n```"
