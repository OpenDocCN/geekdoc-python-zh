    \    next(csv_reader)\n        for lines in csv_reader:\n            msg = MIMEMultipart()\
    \ # create a message\n            # add in the actual person name to the message\
    \ template\n            message = message_template.substitute(PERSON_NAME=row[0],MATH=row[2],\n\
    \                                                  ENG=row[3],SCI=row[4])\n  \
    \          print(message)\n            # setup the parameters of the message\n\
    \            msg['From']=MY_ADDRESS\n            msg['To']=lines[1]\n        \
    \    msg['Subject']=\"Mid term grades\"\n            # add in the message body\n\
    \            msg.attach(MIMEText(message, 'plain'))\n            # send the message\
    \ via the server set up earlier.\n            s.send_message(msg)\n          \
    \  del msg\n    # Terminate the SMTP session and close the connection\n    s.quit()\n\
    if __name__ == '__main__':\n    main()\n```\n\n## 46. Send Emails from CSV File\n\
    \nThis project contains a simple bulk email script\nwhich sends the same message\
    \ to a list of recipients.\n\n### Dependencies\n\nThis project only requires the\
    \ Python standard library\n(more specifically, the `csv`, `email`, and `smtplib`\
    \ modules).\n\n### Running the script\n\nThe script requires two configuration\
    \ files:\n\n- `emails.csv` should contain the email addresses to send the message\
    \ to.\n- `credentials.txt` should contain your SMTP server login credentials,\n\
    \  with your user name and your password on separate lines,\n  with no additional\
    \ whitespace or other decorations.\n\nThe project's directory contains two example\
    \ files which you'll\nprobably both want and need to edit.\n\nOnce you have these\
    \ files set up, simply\n\n```\npython Send_emails.py\n```\n\n### Development ideas\n\
    \nA proper email sender would use `Cc:` or `Bcc:` and send the same\nmessage just\
    \ once.\n\nDon't play frivolously with this; your email provider,\nand/or the\
    \ recipient's,\nmay have automatic filters which quickly block anyone who sends\n\
    multiple identical messages.\n\nThe script simply hardcodes the conventions for\
    \ Gmail.com.\nOther providers may use a different port number and authentication\
    \ regime.\n\n**Source Code:**\n\n```\nimport csv\nfrom email.message import EmailMessage\n\
    import smtplib\n\ndef get_credentials(filepath):\n    with open(\"credentials.txt\"\
    , \"r\") as f:\n        email_address = f.readline()\n        email_pass = f.readline()\n\
    \    return (email_address, email_pass)\n\ndef login(email_address, email_pass,\
