    # Module 2 Project 11-20\n\n## 11. News Updater with Voice\n\n### Get News API\
    \ key From HERE:\n[NewsAPI](https://newsapi.org/)\n\n### Add Your API Key:\n\n\
    ```python\nnewsapi = NewsApiClient(api_key='Add it Here')\n```\n\n### Dependencies:\n\
    \n*Newsapi*\n\n```\npip install newsapi\n```\n\n*pyttsx3*\n\n```\npip install\
    \ pyttsx3\n```\n\n*pyaudio*\n\n```\npip install pyaudio\n```\n\n### Source Code:\n\
    \n```python\nfrom newsapi import NewsApiClient\nimport pyttsx3\nimport speech_recognition\
    \ as sr\nfrom time import sleep\n\nengine = pyttsx3.init('sapi5')\nvoices = engine.getProperty('voices')\n\
    engine.setProperty('voice',voices[1].id)\n\ndef speak(audio):\n    engine.say(audio)\n\
    \    engine.runAndWait()\n\ndef new():\n    newsapi = NewsApiClient(api_key=\"\
    \")# Add your api key\n    data = newsapi.get_top_headlines(q='corona',country='in',\n\
    \                                    language='en',\n                        \
    \            page_size=5)\n\n    at = data['articles']\n\n    for x,y in enumerate(at):\n\
    \        print(f'{x} {y[\"description\"]}')\n        speak(f'{x} {y[\"description\"\
    ]}')\n\n    speak(\"that's it for now i'll updating you in some time \")\n\n\n\
