- md: "## 23. Plagiarism Checker\n\nPlagiarism Checker\n\n### How it works\n\n- In\
    \ order to compute the similarity between two text documents, the textual raw\
    \ data is transformed into vectors.\n- Then it is transformed into arrays of numbers\
    \ and then from that by using a basic knowledge vector to compute the similarity\
    \ between them.\n\n### Dependencies\n\n- Install scikit-learn by:\n\n```\n$ pip\
    \ install scikit-learn\n```\n\n### Running the app\n\n- There are four text documents\
    \ in the repository.\n- Basically the code will compare all the .txt files and\
    \ check for any similarity.\n\n```\n$ python plagiarism.py\n```\n\nSource code:\n\
    \n```python\n# OS Module for loading paths of textfiles. TfidfVectorizer to perform\
    \ word embedding on the textual data and cosine similarity to compute the plagiarism.\n\
    import os\nfrom sklearn.feature_extraction.text import TfidfVectorizer\nfrom sklearn.metrics.pairwise\
    \ import cosine_similarity\nstudent_files = [doc for doc in os.listdir() if doc.endswith('.txt')]\n\
    student_notes = [open(File).read() for File in student_files]\n# Two lambda functions,\
    \ one to convert the text to arrays of numbers and the other one to compute the\
    \ similarity between them.\n\ndef vectorize(Text): return TfidfVectorizer().fit_transform(Text).toarray()\n\
    \ndef similarity(doc1, doc2): return cosine_similarity([doc1, doc2])\n\n# Vectorize\
    \ the Textual Data\nvectors = vectorize(student_notes)\ns_vectors = list(zip(student_files,\
    \ vectors))\n\n# computing the similarity among students\ndef check_plagiarism():\n\
    \    plagiarism_results = set()\n    global s_vectors\n    for student_a, text_vector_a\
    \ in s_vectors:\n        new_vectors = s_vectors.copy()\n        current_index\
    \ = new_vectors.index((student_a, text_vector_a))\n        del new_vectors[current_index]\n\
    \        for student_b, text_vector_b in new_vectors:\n            sim_score =\
    \ similarity(text_vector_a, text_vector_b)[0][1]\n            student_pair = sorted((student_a,\
    \ student_b))\n            score = (student_pair[0], student_pair[1], sim_score)\n\
    \            plagiarism_results.add(score)\n    return plagiarism_results\nfor\
    \ data in check_plagiarism():\n    print(data)\n```\n\n## 24. Pomodoro Clock with\
