    \ have to access `django.contrib.auth.models.User`). To avoid such this redundancy,\
    \ you can bring one, many or all of the variables and functions into the global\
    \ scope. `from os.path import exists` allows you to use the function `exists()`\
    \ without having to prepend it with `os.path` all the time.\n\nIf you'd like to\
