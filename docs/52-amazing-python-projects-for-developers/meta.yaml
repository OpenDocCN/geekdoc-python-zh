    \ import EmailMessage\nimport smtplib\n\ndef get_credentials(filepath):\n    with\
    \ open(\"credentials.txt\", \"r\") as f:\n        email_address = f.readline()\n\
    \        email_pass = f.readline()\n    return (email_address, email_pass)\n\n\
    def login(email_address, email_pass, s):\n    s.ehlo()\n    # start TLS for security\n\
    \    s.starttls()\n    s.ehlo()\n    # Authentication\n    s.login(email_address,\
    \ email_pass)\n    print(\"login\")\n\ndef send_mail():\n    s = smtplib.SMTP(\"\
    smtp.gmail.com\", 587)\n    email_address, email_pass = get_credentials(\"./credentials.txt\"\
    )\n    login(email_address, email_pass, s)\n\n    # message to be sent\n    subject\
    \ = \"Welcome to Python\"\n    body = \"\"\"Python is an interpreted, high-level,\n\
    \    general-purpose programming language.\\n\n    Created by Guido van Rossum\
    \ and first released in 1991,\n    Python's design philosophy emphasizes code\
    \ readability\\n\n    with its notable use of significant whitespace\"\"\"\n\n\
    \    message = EmailMessage()\n    message.set_content(body)\n    message['Subject']\
    \ = subject\n\n    with open(\"emails.csv\", newline=\"\") as csvfile:\n     \
    \   spamreader = csv.reader(csvfile, delimiter=\" \", quotechar=\"|\")\n     \
    \   for email in spamreader:\n            s.send_message(email_address, email[0],\
    \ message)\n            print(\"Send To \" + email[0])\n\n    # terminating the\
    \ session\n```"
