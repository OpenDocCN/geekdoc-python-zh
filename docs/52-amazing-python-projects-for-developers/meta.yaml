- md: "## 3. Lyrics Download\n\nThis script can be used to download lyrics of any\
    \ number of songs, by any number of Artists, until the API Limit is met.\n\nThe\
    \ script uses [Genius API](https://docs.genius.com/). It is a dedicated platform\
    \ meant for music only.\n\n### Setup Instruction\n\n- You need an API client,\
    \ (it's free) follow the steps [here](https://docs.genius.com/).\n- `pip install\
    \ lyricsgenius` to install dedicated package.\n- Good to go, follow guidelines\
    \ mentioned as comments in code.\n- The script is pretty much interactive, ensure\
    \ you follow the guidelines.\n\n### Source Code:\n\n```python\nimport lyricsgenius\
    \ as lg\n\n# File for writing the Lyrics\nfilename = input('Enter a filename:\
    \ ') or 'Lyrics.txt'\nfile = open(filename, \"w+\")\n\n# Acquire a Access Token\
    \ to connect with Genius API\ngenius = lg.Genius(\n    'Client_Access_Token_Goes_Here',\n\
    \    # Skip song listing\n    skip_non_songs=True,\n    # Terms that are redundant\
    \ song names with same lyrics, e.g. Old Town Raod and Old Town Road Remix\n  \
    \  # have same lyrics\n    excluded_terms=[\"(Remix)\", \"(Live)\"],\n    # In\
    \ order to keep headers like [Chorus], [Bridge] etc.\n    remove_section_headers=True)\n\
    \n# List of Artist and Maximum Songs\ninput_string = input(\"Enter name of Artists\
    \ separated by spaces: \")\nartists = input_string.split(\" \")\n\ndef get_lyrics(arr,\
    \ max_song):\n    \"\"\"\n    Returns: Number of songs grabbed by Function\n \
    \   Saves : Text File with Lyrics\n    Parameters :\n        arr : Artist\n  \
    \      max_song : Number of maximum songs to be grabbed\n    \"\"\"\n    # Write\
    \ lyrics of k songs by each artist in arr\n    c = 0\n    # A counter\n    for\
    \ name in arr:\n        try:\n            songs = (genius.search_artist(name,\n\
    \                                          max_songs=max_song,\n             \
    \                             sort='popularity')).songs\n            s = [song.lyrics\
