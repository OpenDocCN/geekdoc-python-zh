  md: '# 50. SINE vs COSINE


    ```

    import numpy as np

    import matplotlib.pyplot as plot

    # Get x values of the sine wave

    time = np.linspace(-2*np.pi, 2*np.pi, 256, endpoint=True)

    # Amplitude of the sine wave is sine of a variable like time

    amplitude_sin = np.sin(time)

    amplitude_cos = np.cos(time)

    # Plot a sine wave using time and amplitude obtained for the sine wave

    plot.plot(time, amplitude_sin)

    plot.plot(time, amplitude_cos)

    # Give a title for the sine wave plot

    plot.title(''Sine & Cos wave'')

    # Give x axis label for the sine wave plot

    plot.xlabel(''Time'')

    # Give y axis label for the sine wave plot

    plot.ylabel(''Amplitude'')

    plot.grid(True, which=''both'')

    plot.axhline(y=0, color=''k'')

    plot.show()

    ```


    # 51. Website Blocker


    # Website Blocker


    ## Description


    This is a script that aims to implement a website blocking utility for Windows-based
    systems. It makes use of the computer''s hosts files and runs it as a background
    process, preventing access to the sites entered by the user in array format.


    ## Third-party libraries required:


    The project requires Python''s datetime library only


    ## Importing the Libraries:


    Open Command Prompt on your computer and type the following:

    On the script''s console, type:

    `import time`

    `from datetime import datetime as dt`


    ## Running the Script:


    After opening the script in your Python IDE, execute the code so that you get
    the console output window. Open your browser and try to visit the websites you
    blocked. When the script runs successfully, you will see `This site can''t be
    reached` error on the browser.'
  merge: -1
  pgno: 134
- img_proc: true
  md: "**Note:**\n\n> > In some systems, access to the computers's hosts files maybe\
    \ denied by default to prevent malware attacks. So the script while executing\
    \ may show an error while modifying the hosts files.\n> `Please visit [here](https://www.technipages.com/windows-access-denied-when-modifying-hosts-or-lmhosts-file)\
    \ for a brief readup on how to solve the issue.`\n\n# ## Output:\n\n# ##### This\
    \ is how the browser acts when you try to visit the website that you blocked:\n\
    \n![](img/2d09155385e2d53be8e53bc9b9a3735b_135_0.png)\n\n<p><em>The acess will\
    \ be denied to all the mentioned sites as per you changes the list </em></p>\n\
    \n# **Source Code:**\n\n```\nimport time\nfrom datetime import datetime as dt\n\
    \n# Windows host file path\nhostsPath = r\"C:\\Windows\\System32\\drivers\\etc\\\
    hosts\"\nredirect = \"127.0.0.1\"\n\n# Add the website you want to block, in this\
    \ list\nwebsites = [\n    \"www.youtube.com\", \"youtube.com\", \"www.facebook.com\"\
    ,\n    \"facebook.com\"\n]\nwhile True:\n    # Duration during which, website\
    \ blocker will work\n    if dt(dt.now().year,\n          dt.now().month,\n   \
    \       dt.now().day, 9) < dt.now() < dt(dt.now().year,\n                    \
    \                      dt.now().month,\n                                     \
    \     dt.now().day, 18):\n        print(\"Access denied to Website\")\n      \
    \  with open(hostsPath, 'r+') as file:\n            content = file.read()\n  \
    \          for site in websites:\n                if site in content:\n      \
    \              pass\n                else:\n                    file.write(redirect\
    \ + \" \" + site + \"\\n\")\n```"
  merge: -1
  pgno: 135
- img_proc: true
  md: "```\nelse:\n    with open(hostsPath, 'r+') as file:\n        content = file.readlines()\n\
    \    file.seek(0)\nfor line in content:\n    if not any(site in line for site\
    \ in websites):\n        file.write(line)\n    file.truncate()\nprint(\"Allowed\
    \ access!\")\ntime.sleep(5)\n```"
