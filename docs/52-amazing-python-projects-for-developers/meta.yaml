    \        if elem.name == 'h1':\n            j+=1\n            fin += f'\\n\\n{header[j].text.upper()}'\n\
    \            continue\n        fin += f'\\n{purify(str(elem))}'\n    return fin\n\
    \n# function to save file in the current directory\ndef save_file(fin):\n    if\
