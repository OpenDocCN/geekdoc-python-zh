    \ restart your device\n\n### Power Options\n\nThis script shuts down or restarts\
    \ your computer.\n\n### Prerequisites\n\nNone\n\n### How to run the script\n\n\
    Steps on how to run the script along with suitable examples.\n\n1. Type the following\
    \ on the command line:\n   ```\n   python PowerOptions.py\n   ```\n2. Press enter\
    \ and wait for prompt. Type “r” to restart or “s” to shut down.\n\nExample:\n\
    ```\npython PowerOptions.py\nUse 'r' for restart and 's' for shutdown: r\n```\n\
    \n**Source Code:**\n\n```python\nimport os\nimport platform\n\ndef shutdown():\n\
    \    if platform.system() == \"Windows\":\n        os.system('shutdown -s')\n\
    \    elif platform.system() == \"Linux\" or platform.system() == \"Darwin\":\n\
    \        os.system(\"shutdown -h now\")\n    else:\n        print(\"Os not supported!\"\
    )\n\ndef restart():\n    if platform.system() == \"Windows\":\n        os.system(\"\
    shutdown -t 0 -r -f\")\n    elif platform.system() == \"Linux\" or platform.system()\
    \ == \"Darwin\":\n        os.system('reboot now')\n    else:\n        print(\"\
    Os not supported!\")\n\ncommand = input(\"Use 'r' for restart and 's' for shutdown:\
    \ \").lower()\n\nif command == \"r\":\n    restart()\nelif command == \"s\":\n\
    \    shutdown()\nelse:\n    print(\"Wrong letter\")\n```\n\n## 50. SINE vs COSINE\n\
    \n```python\nimport numpy as np\nimport matplotlib.pyplot as plot\n# Get x values\
    \ of the sine wave\ntime = np.linspace(-2*np.pi, 2*np.pi, 256, endpoint=True)\n\
    # Amplitude of the sine wave is sine of a variable like time\namplitude_sin =\
    \ np.sin(time)\namplitude_cos = np.cos(time)\n# Plot a sine wave using time and\
    \ amplitude obtained for the sine wave\nplot.plot(time, amplitude_sin)\nplot.plot(time,\
    \ amplitude_cos)\n# Give a title for the sine wave plot\nplot.title('Sine & Cos\
    \ wave')\n# Give x axis label for the sine wave plot\nplot.xlabel('Time')\n# Give\
    \ y axis label for the sine wave plot\nplot.ylabel('Amplitude')\nplot.grid(True,\
    \ which='both')\nplot.axhline(y=0, color='k')\nplot.show()\n```\n\n## 51. Website\
    \ Blocker\n\n### Description\n\nThis is a script that aims to implement a website\
    \ blocking utility for Windows-based systems. It makes use of the computer's hosts\
    \ files and runs it as a background process, preventing access to the sites entered\
    \ by the user in array format.\n\n### Third-party libraries required:\n\nThe project\
    \ requires Python's `datetime` library only.\n\n### Importing the Libraries:\n\
    \nOpen Command Prompt on your computer and type the following:\nOn the script's\
    \ console, type:\n```python\nimport time\nfrom datetime import datetime as dt\n\
    ```\n\n### Running the Script:\n\nAfter opening the script in your Python IDE,\
    \ execute the code so that you get the console output window. Open your browser\
    \ and try to visit the websites you blocked. When the script runs successfully,\
    \ you will see `This site can't be reached` error on the browser.\n\n**Note:**\n\
    \n> In some systems, access to the computer's hosts files maybe denied by default\
    \ to prevent malware attacks. So the script while executing may show an error\
    \ while modifying the hosts files.\n> Please visit [here](https://www.technipages.com/windows-access-denied-when-modifying-hosts-or-lmhosts-file)\
    \ for a brief readup on how to solve the issue.\n\n### Output:\n\nThis is how\
    \ the browser acts when you try to visit the website that you blocked:\n\n![](img/2d09155385e2d53be8e53bc9b9a3735b_135_0.png)\n\
    \n*The access will be denied to all the mentioned sites as per you changes the\
    \ list.*\n\n**Source Code:**\n\n```python\nimport time\nfrom datetime import datetime\
    \ as dt\n\n# Windows host file path\nhostsPath = r\"C:\\Windows\\System32\\drivers\\\
    etc\\hosts\"\nredirect = \"127.0.0.1\"\n\n# Add the website you want to block,\
    \ in this list\nwebsites = [\n    \"www.youtube.com\", \"youtube.com\", \"www.facebook.com\"\
    ,\n    \"facebook.com\"\n]\nwhile True:\n    # Duration during which, website\
    \ blocker will work\n    if dt(dt.now().year,\n          dt.now().month,\n   \
    \       dt.now().day, 9) < dt.now() < dt(dt.now().year,\n                    \
    \                      dt.now().month,\n                                     \
    \     dt.now().day, 18):\n        print(\"Access denied to Website\")\n      \
    \  with open(hostsPath, 'r+') as file:\n            content = file.read()\n  \
    \          for site in websites:\n                if site in content:\n      \
    \              pass\n                else:\n                    file.write(redirect\
    \ + \" \" + site + \"\\n\")\n```"
