    \ = pd.concat([pd.read_csv(f) for f in all_filenames ])\ncombined_csv.to_csv(\
    \ \"combined_csv.csv\", index=False, encoding='utf-8-sig')\n```\n\n## 5. Merge\
    \ pdfs\n\nA simple python script which when executed merges two pdfs\n\n### Prerequisites\n\
    \nRun - \"pip install PyPDF2\"\n\n### How to run the script\n\nIt can be executed\
    \ by running \"python merge_pdfs.py\"\n\n**Requirements:**\n**PyPDF2==1.26.0**\n\
    \n**Source Code:**\n\n```python\n#!/usr/bin/env python\n\nfrom PyPDF2 import PdfFileMerger\n\
    \n\n# By appending in the end\ndef by_appending():\n    merger = PdfFileMerger()\n\
