    \n## 模块 4 项目 31-40\n\n## 31. 随机密码生成器\n\n##### 这个简单的项目是使用 Python 库函数如 `string`\
    \ 和 `random` 制作的。\n\n-   `string.ascii_letters`\n    -   下述 ascii_lowercase 和\
