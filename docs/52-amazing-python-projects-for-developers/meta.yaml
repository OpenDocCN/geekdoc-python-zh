    bs=BeautifulSoup(html.text,'html.parser')\nexcept:\n    print('Unknown Error!!!')\n\
    finally:\n    csv_file.close()\n```"
- md: "## 43. Scraping Medium Articles\n\nWell [Medium](https://medium.com/) is a\
    \ website containing great articles and used by many programmers.\nThis script\
    \ asks the user for the url of a medium article, scrapes it's text and saves it\
    \ to a text file into a folder named scraped_articles in the same directory.\n\
    There are 3 text files in the folder scraped_articles as an example of how the\
    \ article is scraped.\n\n### Prerequisites\n\n`pip` install the modules given\
    \ in requirements.txt\nHave a working network connection on the device\n\n###\
    \ How to run the script\n\nRun it like any other python file\n\n**Requirement:**\n\
    **beautifulsoup4==4.9.1**\n**requests==2.23.0**\n\n**Source Code:**\n\n```\nimport\
    \ os\nimport sys\nimport requests\nimport re\nfrom bs4 import BeautifulSoup\n\n\
    # switching to current running python files directory\nos.chdir('\\'.join(__file__.split('/')[:-1]))\n\
    \n# function to get the html of the page\ndef get_page():\n    global url\n  \
    \  url = input('Enter url of a medium article: ')\n    # handling possible error\n\
    \    if not re.match(r'https?://medium.com/',url):\n        print('Please enter\
    \ a valid website, or make sure it is a medium article')\n        sys.exit(1)\n\
    \    res = requests.get(url)\n    res.raise_for_status()\n    soup = BeautifulSoup(res.text,\
    \ 'html.parser')\n    return soup\n\n# function to remove all the html tags and\
    \ replace some with specific strings\ndef purify(text):\n    rep = {\"<br>\":\
    \ \"\\n\", \"<br/>\": \"\\n\", \"<li>\": \"\\n\"}\n    rep = dict((re.escape(k),\
    \ v) for k, v in rep.items())\n    pattern = re.compile(\"|\".join(rep.keys()))\n\
    \    text = pattern.sub(lambda m: rep[re.escape(m.group(0))], text)\n    text\
    \ = re.sub('\\<.*?\\>', '', text)\n    return text\n\n# function to compile all\
    \ of the scraped text in one string\ndef collect_text(soup):\n    fin = f'url:\
    \ {url}\\n\\n'\n    main = (soup.head.title.text).split('|')\n    global title\n\
    \    title = main[0].strip()\n    fin += f'Title: {title.upper()}\\n{main[1].strip()}'\n\
    \n    header = soup.find_all('h1')\n    j = 1\n\n    try:\n        fin += '\\\
    n\\nINTRODUCTION\\n'\n        for elem in list(header[j].previous_siblings)[::-1]:\n\
    \            fin += f'\\n{purify(str(elem))}'\n    except:\n        pass\n\n \
