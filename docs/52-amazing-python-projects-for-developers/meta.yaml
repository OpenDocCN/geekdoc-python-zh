    \n-   `string.octdigits`\n    -   字符串 <kbd>01234567</kbd>。\n\n-   `string.punctuation`\n\
    \    -   在 C 语言区域设置中被视为标点字符的 ASCII 字符串：`!\"#$%&'()*+,-./:;<=>?@[\\]^_{|}~`\n\n\
    **Python-密码生成器源代码：**\n\n```python\nimport random\nimport string\n\ntotal = string.ascii_letters\
    \ + string.digits + string.punctuation\nlength = 16\n\npassword = \"\".join(random.sample(total,\
    \ length))\n\nprint(password)\n```\n\n**Random_password_gen 源代码：**\n\n```python\n\
    import random\nimport math\n\nalpha = \"abcdefghijklmnopqrstuvwxyz\"\nnum = \"\
    0123456789\"\nspecial = \"@#$%&*\"\n\n# pass_len=random.randint(8,13) #无需用户输入\n\
    pass_len = int(input(\"Enter Password Length\"))\n\n# 根据 50-30-20 公式确定密码长度\nalpha_len\
    \ = pass_len//2\nnum_len = math.ceil(pass_len*30/100)\nspecial_len = pass_len-(alpha_len+num_len)\n\
    \npassword = []\n\ndef generate_pass(length, array, is_alpha=False):\n    for\
    \ i in range(length):\n        index = random.randint(0, len(array) - 1)\n   \
    \     character = array[index]\n        if is_alpha:\n            case = random.randint(0,\
    \ 1)\n            if case == 1:\n                character = character.upper()\n\
    \        password.append(character)\n\n# 字母密码\ngenerate_pass(alpha_len, alpha,\
    \ True)\n# 数字密码\ngenerate_pass(num_len, num)\n# 特殊字符密码\ngenerate_pass(special_len,\
