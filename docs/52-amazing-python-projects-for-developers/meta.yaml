    \    # Authentication\n    s.login(email_address, email_pass)\n    print(\"login\"\
    )\n\ndef send_mail():\n    s = smtplib.SMTP(\"smtp.gmail.com\", 587)\n    email_address,\
    \ email_pass = get_credentials(\"./credentials.txt\")\n    login(email_address,\
