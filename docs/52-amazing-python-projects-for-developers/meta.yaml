- md: "# 52 Amazing Python Projects For Developers\n\nEDCORNER LEARNING\n\n# 52 Amazing\
    \ Python Projects For Developers\n\nEdcorner Learning\n\n# Table of Contents\n\
    \n**Introduction**\n\n**Module 1 Project 1 -10**\n\n- 1. LinkedIn Email Scraper\n\
    - 2. Cricbuzz scrapper\n- 3. Lyrics Download\n- 4. Merge CSV files\n- 5. Merge\
    \ pdfs\n- 6. Message Spam Detection\n- 7. Movie Information Scraper\n- 8. Movie\
    \ Info Telegram Bot\n- 10. Music Player with Python\n\n**Module 2 Project 11-20**\n\
    \n- 11. News Updater with Voice\n- 12. News Scraper\n- 13. Noise Reduction\n-\
    \ 14. NSE Stock Data\n- 15. Number Guessing Game\n- 16. Files-Sorter\n- 17. PageSpeed\n\
    - 18. Paint App\n- 19. Password Manager\n- 20. Password Manager GUI\n\n**Module\
    \ 3 Projects 21-30**\n\n- 21. PDF & Image Text Reader That Can Speak\n- 22. PDF-To-CSV\
    \ Converter\n- 23. Plagiarism Checker\n- 24. Pomodoro Clock with GUI\n- 25. Pyduku\n\
    - 26. PYQT5 Password Generator\n- 27. Python Auto Draw\n- 28. Pyweather\n- 29.\
    \ QR code generator using Python\n- 30. Racing Bar Chart Animation\n\n**Module\
    \ 4 Projects 31-40**\n\n- 31. Random Password Generator\n- 32. Random Wikipedia\
    \ Article\n- 33. Random word from list\n- 34. High Quality YouTube Video Downloader\n\
    - 35. Raspberry-Pi-Sonoff\n- 36. Recursive Password Generator\n- 37. Reddit Scraper\
    \ without API\n- 38. Reduce Image Size\n- 39. Rock Paper Scissors Game\n- 40.\
    \ Room Security Using Laptop Webcam\n\n**Module 5 Projects 41-50**\n\n- 41. Scrape\
    \ News From HackerNews website\n- 42. Quote Scraper\n- 43. Scraping Medium Articles\n\
    - 44. Screen Recorder\n- 45. Send Email With Python\n- 46. Send Emails from CSV\
    \ File\n- 47. Send Text\n- 48. Set Alarm\n- 49. Shutdown or restart your device\n\
    - 50. SINE vs COSINE\n\n51. Website Blocker\n\n52. SMS Automation\n\nHow to download\
    \ this project:\n\n# Introduction\n\nPython is a general-purpose interpreted,\
    \ interactive, object-oriented, and a powerful programming language with dynamic\
    \ semantics. It is an easy language to learn and become expert. Python is one\
    \ among those rare languages that would claim to be both easy and powerful. Python's\
    \ elegant syntax and dynamic typing alongside its interpreted nature makes it\
    \ an ideal language for scripting and robust application development in many areas\
    \ on giant platforms.\n\nPython helps with the modules and packages, which inspires\
    \ program modularity and code reuse. The Python interpreter and thus the extensive\
    \ standard library are all available in source or binary form for free of charge\
    \ for all critical platforms and can be freely distributed. Learning Python doesn't\
    \ require any pre-requisites. However, one should have the elemental understanding\
    \ of programming languages.\n\n**This Book consist of 52 Python Projects for All\
    \ Developers/Students to practice different projects and scenarios. Use these\
    \ learnings in professional tasks or daily learning projects.**\n\n**At the end\
    \ of this book, you can download all this projects by using our link.**\n\nAll\
    \ 52 projects are divided into different modules, every project is special in\
    \ its own way of performing daily task by a developer. Every project has its source\
    \ codes which learners can copy and practice/use on their own systems. If there\
    \ is special requirement for any projects, its already mentioned in the book.\n\
    \nHappy learning!!\n\n# Module 1 Project 1 -10\n\n## 1. LinkedIn Email Scraper\n\
    \n### Prerequisites:\n\n- 1. Do `pip install -r requirements.txt` to make sure\
    \ you have the necessary libraries.\n- 2. Make sure you have a **chromedriver**\
    \ installed and added to PATH.\n- 3. Have the **URL** to your desired LinkedIn\
    \ post ready (*make sure the post has some emails in the comments section*)\n\
    - 4. Have your **LinkedIn** account credentials ready\n\n### Executing Application\n\
    \n- 1. Replace the values of the URL, email and password variables in the code\
    \ with your own data\n- 2. Either hit **run** if your IDE has the option or just\
    \ type in `python main.py` in the terminal.\n- 3. The names and corresponding\
    \ email address scraped from the post should appear in the **emails.csv** file.\n\
    \n**Requirements:**\n**selenium**\n**email-validator**\n\n### Source Code:\n\n\
    ```python\nfrom selenium import webdriver\nfrom email_validator import validate_email,\
    \ EmailNotValidError\nimport csv\n\ndef LinkedInEmailScraper(userEmail, userPassword):\n\
    \    emailList = {}\n\n    browser = webdriver.Chrome()\n    # example => 'https://www.linkedin.com/posts/faangpath_hiring-womxn-ghc2020-activity-6721287139721650176-QFCV/'\n\
    \    url = '[INSERT URL TO LINKEDIN POST]'\n    browser.get(url) # visits page\
    \ of the desired post\n\n    browser.implicitly_wait(5)\n\n    commentDiv = browser.find_element_by_xpath(\n\
    \        '/html/body/main/section[1]/section[1]/div/div[3]/a[2]'\n    ) # finds\
    \ comment button\n    loginLink = commentDiv.get_attribute('href')\n    browser.get(loginLink)\n\
    \n    email = browser.find_element_by_xpath('//*[@id=\"username\"]')\n    password\
    \ = browser.find_element_by_xpath('//*[@id=\"password\"]')\n    email.send_keys(userEmail)\
    \ # inputs email in email field\n    password.send_keys(userPassword) # inputs\
    \ password in password field\n    submit = browser.find_element_by_xpath(\n  \
    \      '//*[@id=\"app__container\"]/main/div[3]/form/div[3]/button')\n    submit.submit()\
    \ # submits form\n\n    browser.implicitly_wait(5)\n\n    commentSection = browser.find_element_by_css_selector(\n\
    \        '.comments-comments-list') # finds the comments section\n\n    for _\
    \ in range(\n        3\n    ): # this can also be set to any number or \"while\
    \ True\" if you want it to search through the whole comment section of the post\n\
    \        try:\n            moreCommentsButton = commentSection.find_element_by_class_name(\n\
    \                'comments-comments-list__show-previous-container'\n         \
    \   ).find_element_by_tag_name('button')\n            moreCommentsButton.click()\n\
    \            browser.implicitly_wait(5)\n        except:\n            print('End\
    \ of checking comments')\n            break\n\n    browser.implicitly_wait(20)\n\
    \n    comments = commentSection.find_elements_by_tag_name(\n        'article')\
    \ # finds all individual comments\n\n    for comment in comments:\n        try:\n\
    \            commenterName = comment.find_element_by_class_name(\n           \
    \     'hoverable-link-text') # finds name of commenter\n            commentText\
    \ = comment.find_element_by_tag_name('p')\n            commenterEmail = commentText.find_element_by_tag_name(\n\
    \                'a').get_attribute('innerHTML') # finds email of commenter\n\
    \            # validates email address\n            validEmail = validate_email(commenterEmail)\n\
    \            commenterEmail = validEmail.email\n        except:\n            continue\n\
    \n        emailList[commenterName.get_attribute('innerHTML')] = commenterEmail\n\
    \n    browser.quit()\n    return emailList\n\ndef DictToCSV(input_dict):\n   \
    \ \"\"\"\n    Converts dictionary into csv\n    \"\"\"\n    with open('./LinkedIn\
    \ Email Scraper/emails.csv', 'w') as f:\n        f.write('name,email\\n')\n  \
    \      for key in input_dict:\n            f.write('%s,%s\\n' % (key, input_dict[key]))\n\
    \        f.close()\n\nif __name__ == '__main__':\n    userEmail = '[INSERT YOUR\
    \ EMAIL ADDRESS FOR LINKEDIN ACCOUNT]'\n    userPassword = '[INSERT YOUR PASSWORD\
    \ FOR LINKEDIN ACCOUNT]'\n\n    emailList = LinkedInEmailScraper(userEmail, userPassword)\n\
    \    DictToCSV(emailList)\n```\n\n## 2. Cricbuzz scrapper\n\nThis python script\
    \ will scrap cricbuzz.com to get live scores of the matches.\n\n### Setup\n\n\
    - Install the dependencies\n\n    `pip install -r requirements.txt`\n- Run the\
    \ file\n\n    `python live_score.py`\n\n**Requirement:**\nbeautifulsoup4==4.9.3\n\
    bs4==0.0.1\npypiwin32==223\npywin32==228\nsoupsieve==2.0.1\n\nurllib3==1.26.5\n\
    win10toast==0.9\n\n```python\nfrom urllib.request import urlopen, Request\nfrom\
    \ bs4 import BeautifulSoup\nfrom win10toast import ToastNotifier\nimport time\n\
    \nURL = 'http://www.cricbuzz.com/cricket-match/live-scores'\n\ndef notify(title,\
    \ score):\n    # Function for Windows toast desktop notification\n    toaster\
    \ = ToastNotifier()\n    # toaster.show_toast(score, \"Get! Set! GO!\", duration=5,icon_path='cricket.ico')\n\
    \    toaster.show_toast(\"CRICKET LIVE SCORE\",\n                       score,\n\
    \                       duration=30,\n                       icon_path='ipl.ico')\n\
    \nwhile True:\n    request = Request(URL, headers={'User-Agent': 'XYZ/3.0'})\n\
    \    response = urlopen(request, timeout=20).read()\n```"
  mdcn: "# 52个令人惊叹的Python项目，献给开发者\n\nEDCORNER LEARNING\n\n# 52个令人惊叹的Python项目，献给开发者\n\
    \nEdcorner Learning\n\n# 目录\n\n**简介**\n\n**模块一 项目 1-10**\n\n- 1. LinkedIn邮箱抓取器\n\
    - 2. Cricbuzz数据抓取器\n- 3. 歌词下载器\n- 4. 合并CSV文件\n- 5. 合并PDF文件\n- 6. 垃圾短信检测器\n- 7.\
