    \ # up\n    pyautogui.dragRel(0, -distance, duration = 0.1)\n```\n\n## 28. Pyweather\n\
    \nPython Script that forecasts the weather of any given city\n\n**Source Code:**\n\
    \n```python\n# Importing required modules\nimport requests, json\n\n# enter your\
    \ API key from openweathermap.org here\napi_key = 'Your API key goes here'\n\n\
    # base url to store url from api\nbase_url = \"http://api.openweathermap.org/data/2.5/weather?\"\
    \n\n# input city name here\ncity_name = input('Enter city name: ')\n\ncomplete_url\
    \ = base_url + 'appid=' + api_key + '&q=' + city_name\nresponse = requests.get(complete_url)\n\
    x = response.json()\n\n# checking validity of city name\nif x['cod'] != '404':\n\
    \    y = x['main']\n    current_temperature = y['temp']\n    current_pressure\
    \ = y['pressure']\n    current_humidity = y['humidity']\n    z = x['weather']\n\
    \    weather_description = z[0]['description']\n    q = x['wind']\n    wind_speed\
    \ = q['speed']\n    wind_direction = q['deg']\n    k = x['clouds']\n    cloudliness\
    \ = k['all']\n\n    print(\"Temperature (in Kelvin) = \" + str(current_temperature)\
    \ + \"\\n Atmospheric Pressure (in hPa) = \" + str(current_pressure) + \"\\n Humidity\
    \ (in percentage) = \" + str(current_humidity) + \"\\n Wind Speed (in m/s) = \"\
    \ + str(wind_speed) + \"\\n Wind Direction (in degrees) = \" + str(wind_direction)\
    \ + \"\\n Cloudliness (in percentage) = \" + str(cloudliness) + \"\\n Weather\
    \ Description = \" + str(weather_description))\nelse:\n    print(\"City Not Found\"\
    )\n```\n\n## 29. QR code generator using Python\n\nThis script take a link of\
    \ any URL and generate a QR code corresponding to it.\n\n### Library Used\n\n\
    - qrcode\n\n#### To install required external modules\n\n- Run `pip install qrcode`\n\
    \n#### How to run the script\n\n- Provide your desired URL in the script\n- Execute\
    \ `python3 generate_qrcode.py`\n\n**Source Code:**\n\n```python\nimport qrcode\n\
    \ninput_URL = \"https://www.google.com/\"\n\nqr = qrcode.QRCode(\n    version=1,\n\
    \    error_correction=qrcode.constants.ERROR_CORRECT_L,\n    box_size=15,\n  \
    \  border=4,\n)\n\nqr.add_data(input_URL)\nqr.make(fit=True)\n\nimg = qr.make_image(fill_color=\"\
    red\", back_color=\"white\")\nimg.save(\"url_qrcode.png\")\n\nprint(qr.data_list)\n\
    ```\n\n## 30. Racing Bar Chart Animation\n\n### Packages Needed\n\n**Make sure\
    \ you are using a python virtual environment**\n\n```bash\npip install jupyterlab\n\
    ```\n\n```bash\npip install pandas\n```\n\n```bash\npip install requests\n```\n\
    \nOR\n\n```bash\npip install -r requirements.txt\n```\n\n### Requirements\n\n\
    jupyterlab==2.2.2\nmatplotlib==3.3.0\nnotebook==6.1.1\nnumpy==1.19.1\npandas==1.1.0\n\
    requests==2.24.0\n\n**Source Code File:**\n\n![](img/2d09155385e2d53be8e53bc9b9a3735b_94_0.png)\n\
    \n## Module 4 Projects 31-40\n\n## 31. Random Password Generator\n\n##### THIS\
    \ SIMPLE PROJECT WAS MADE USING PYTHON LIBRARY FUNCTIONS LIKE `string` & `random`.\n\
    \n- `string.ascii_letters`\n  - The concatenation of the ascii_lowercase and ascii_uppercase\
    \ constants described below. This value is not locale-dependent.\n\n- `string.ascii_lowercase`\n\
    \  - The lowercase letters <kbd>abcdefghijklmnopqrstuvwxyz</kbd>. This value is\
    \ not locale-dependent and will not change.\n\n- `string.ascii_uppercase`\n  -\
    \ The uppercase letters <kbd>ABCDEFGHIJKLMNOPQRSTUVWXYZ</kbd>. This value is not\
    \ locale-dependent and will not change.\n\n- `string.digits`\n  - The string <kbd>0123456789</kbd>.\n\
    \n- `string.hexdigits`\n  - The string <kbd>0123456789abcdefABCDEF</kbd>.\n\n\
    - `string.octdigits`\n  - The string <kbd>01234567</kbd>.\n\n- `string.punctuation`\n\
    \  - String of ASCII characters which are considered punctuation characters in\
    \ the C locale: `!\"#$%&'()*+,-./:;<=>?@[\\]^_{|}~`\n\n**Python-Password Generator\
    \ Source Code:**\n\n```python\nimport random\nimport string\n\ntotal = string.ascii_letters\
    \ + string.digits + string.punctuation\nlength = 16\n\npassword = \"\".join(random.sample(total,\
    \ length))\n\nprint(password)\n```\n\n**Random_password_gen Source Code:**\n\n\
    ```python\nimport random\nimport math\n\nalpha = \"abcdefghijklmnopqrstuvwxyz\"\
    \nnum = \"0123456789\"\nspecial = \"@#$%&*\"\n\n# pass_len=random.randint(8,13)\
    \ #without User Input\npass_len = int(input(\"Enter Password Length\"))\n\n# length\
    \ of password by 50-30-20 formula\nalpha_len = pass_len//2\nnum_len = math.ceil(pass_len*30/100)\n\
    special_len = pass_len-(alpha_len+num_len)\n\npassword = []\n\ndef generate_pass(length,\
    \ array, is_alpha=False):\n    for i in range(length):\n        index = random.randint(0,\
    \ len(array) - 1)\n        character = array[index]\n        if is_alpha:\n  \
    \          case = random.randint(0, 1)\n            if case == 1:\n          \
    \      character = character.upper()\n        password.append(character)\n\n#\
    \ alpha password\ngenerate_pass(alpha_len, alpha, True)\n# numeric password\n\
    generate_pass(num_len, num)\n# special Character password\ngenerate_pass(special_len,\
    \ special)\n# shuffle the generated password list\nrandom.shuffle(password)\n\
    # convert List To string\ngen_password = \"\"\nfor i in password:\n    gen_password\
    \ = gen_password + str(i)\nprint(gen_password)\n```\n\n## 32. Random Wikipedia\
    \ Article\n\nAn application to save any random article from Wikipedia to a text\
    \ file.\n\nUse:\n`pip install htmlparser` and `pip install beautifulsoup4`\n\n\
    **Requirements:**\n**HTMLParser==0.0.2**\n\n**Source Code:**\n\n```python\nfrom\
    \ bs4 import BeautifulSoup\nimport requests\n\n# Trying to open a random wikipedia\
    \ article\n# Special:Random opens random articles\nres = requests.get(\"https://en.wikipedia.org/wiki/Special:Random\"\
    )\nres.raise_for_status()\n\n# pip install htmlparser\nwiki = BeautifulSoup(res.text,\
    \ \"html.parser\")\n\nr = open(\"random_wiki.txt\", \"w+\", encoding='utf-8')\n\
    \n# Adding the heading to the text file\nheading = wiki.find(\"h1\").text\n\n\
    r.write(heading + \"\\n\")\nfor i in wiki.select(\"p\"):\n    # Optional Printing\
    \ of text\n    # print(i.getText())\n    r.write(i.getText())\n\nr.close()\nprint(\"\
    File Saved as random_wiki.txt\")\n```"
