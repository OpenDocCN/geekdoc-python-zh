    \ open(fname, 'w', encoding='utf8') as outfile:\n        outfile.write(fin)\n\
    \    print(f'File saved in directory {fname}')\n\n# driver code\nif __name__ ==\
    \ '__main__':\n    fin = collect_text(get_page())\n    save_file(fin)\n```\n\n\
    ## 44. Screen Recorder\n\nIt records the computer screen.\n\n### Modules Used\n\
    \n- time\n- PIL\n- numpy\n- cv2\n\n### How it works\n\n- While Running the script\
    \ it captures the screen frames.\n- Then it returns the screen record with realtime\
    \ changes.\n\n**Source Code:**\n\n```\nimport cv2\nimport numpy as np\nfrom PIL\
    \ import ImageGrab\nimport time\n\ndef screenrecorder():\n    fourcc = cv2.VideoWriter_fourcc(*'XVID')\n\
    \    name = int(round(time.time() * 1000))\n    name = '{}.avi'.format(name)\n\
    \    out = cv2.VideoWriter(name, fourcc, 5.0, (1920, 1080))\n\n    while True:\n\
    \        img = ImageGrab.grab()\n        img_np = np.array(img)\n        frame\
