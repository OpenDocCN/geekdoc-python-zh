- md: '## FADE AN LED WITH PWM


    In this project, I’ll show you how to use pulse width modulation to control the
    intensity of the light that comes out of an LED in this case, just like in the
    previous examples of conditionality connected to GPIO 21.


    ![](img/610f3057ec812c0d14bb9f163e39f201_181_0.png)


    Now, talking about the hardware, before we move on to the software side, just
    wanted to remind you that on the ESP32, you’re looking here at the pin layout
    chart. Just zoom out for a second.


    ![](img/610f3057ec812c0d14bb9f163e39f201_182_0.png)


    You can see that any GPIO with a tilde next to its pin is capable in this case.
    For this example, I’m using GPIO 21, which is capable. So as long as there is
    a tilde next to the pin that you want to use and it is free, it’s not occupied
    with something else, then you can apply PWM function to it.


    ![](img/610f3057ec812c0d14bb9f163e39f201_182_1.png)


    All right, let’s have a look at the script here, so I have created a little demonstration
    file called fade.py. As you can see, it’s on my computer file system. I haven’t
    copied it over to the ESP32 yet. Having a quick look at it, I am going to be using,
    of course, the machine module to control the PWM and of course, the documentation
    being right here and also using a function called range that comes with the standard
    MicroPython and Python libraries and its documentation link.


    ![](img/610f3057ec812c0d14bb9f163e39f201_183_0.png)


    Having a quick look at those two resources, you can see that the PWM functionality
    is part of the machine module and you can use this notation to create a PWM object.
    You basically just call it. Then you pass on the GPIO that you want to use. You
    can read or set the frequency of your PWM channel. The default is 1000. So if
    you don’t set it, the default of 1000 is going to be used and then you can set
    its duty cycle by calling the duty function and putting the duty cycle just a
    number between zero and 1023. As you can see here in the documentation, if you
    don’t pass a parameter in the function, then this would return the current duty
    cycle. So you can always check to see what it is before you change it. It’s another
    example here of how you can create a PWM object and set both its frequency and
    its duty cycle in one function like that.


    ![](img/610f3057ec812c0d14bb9f163e39f201_183_1.png)


    So I’m using the PWM functionality. First of all up here, I’m just going with
    the default, I’m just setting the pin to be GPIO 21 and then down here in the
    infinite loop using the while True loop, I’ve got a couple of loops. The first
    one is counting up for the duty cycle from zero to 1023 in step five and then
    calling the duty cycle and setting the duty cycle according to what it is inside
    the loop. And then the second one I’m counting down, that’s where the range function
    is useful. I’m counting down from 1023 to zero in step, negative five minus five
    each time going for a little sleep and then continuing with the loop.


    ![](img/610f3057ec812c0d14bb9f163e39f201_184_0.png)


    So the built-in function range looks like this. It’s got overloaded functions.
    The first one just has one parameter, the stop. So if you go for range and then
    you give it a number, then it will count from zero up to that number in step one.
    The alternative is to go for this function here, which requires three parameters:
    start, stop, and then the step, which is the one that I’m using right here. That
    makes it easy to count from a number to any other number using any step that you
    want. All right.


    ![](img/610f3057ec812c0d14bb9f163e39f201_185_0.png)


    So I’m going to upload this as a copy to the MicroPython device. It’s called fade.py.
    All right, and loaded into Thonny just to get rid of the one stored on the local
    filesystem, so don’t confuse it with this.


    ![](img/610f3057ec812c0d14bb9f163e39f201_185_1.png)


    And I’m going to press the run button to get it to start. And then you get the
    LED on and off. To speed things up a little, which case I will need to interrupt.


    ![](img/610f3057ec812c0d14bb9f163e39f201_186_0.png)


    Before I can make any changes to the sketch and then let’s make that say 15 and
    minus 15 and save and play again. You can see that it now fades on and off faster,
    so you can either change the step parameter or reduce or increase the sleep amount
    of time, and that will have an effect on the speed with which the on and off happens.
    All right. That was easy enough. Let’s move on to the next project where I show
    you how to read the state of a button, and we do that in a few variations, a few
    different ways by which you can read the state of the button.


    ## READ A BUTTON WITH LOOP


    In this project, you have to read the state of the momentary button. I’m going
    to show you how to do that, using three different examples each time to bring
    a different capability of the ESP32 through MicroPython to achieve the same thing.


    ![](img/610f3057ec812c0d14bb9f163e39f201_187_0.png)


    But each time with a bit more efficiency across the three examples, the hardware
    is not going to change. In all cases, I have the ESP32 to have a momentary button.
    You can see that it is connected to GPIO 4, this pin right here. And I am using
    the ESP32 internal pull-up so that I don’t need to use an additional wire to bring
    up the unpressed state of the button to high. I would use the internal pull-up
    register for that. And I also have a wire here that will bring the state of the
    button to low when it’s pressed. So that’s what will be detecting. To show an
    effect of the button press, I’ve got an LED in here, just like in the previous
    projects, that is connected to GPIO 21 and that’s about it with the hardware.


    ![](img/610f3057ec812c0d14bb9f163e39f201_187_1.png)


    In the first example that I’ll show you in this project, I am reading the state
    of the button in the simplest possible way by using an infinite loop here. So
    I’m using the while loop and passing True as its permanent state so that the program
    is going to be locked inside this block. So constantly it will be using this instruction
    to read the value of the button and if it is low, represented by zero here. So
    logical state is low because you can see that the pressed state of the button
    is pushed down to zero volts, then will turn the LED on and will stay there for
    ten milliseconds. And if the state of the button is not zero, it’s one because
    of the internal pull-up, then will turn the LED off. A couple of other things
    in this sketch worth talking about: I have used this expression here to declare
    the object of the button and you can see that I’m using the Pin constructor, just
    like I did with the Pin constructor for the LED here. But in this case, I’ve got
    three arguments. The first one is the GPIO. The second one indicates that this
    is going to be an input and then the third one activates the internal pull-up.


    ![](img/610f3057ec812c0d14bb9f163e39f201_188_0.png)


    To learn more about the Pin constructor, have a look at this link here, which
    will take you to this page in the quick reference for the ESP32 on the MicroPython
    website. And it shows you an example of how to use these functions. And again,
    if you want even more information, then good to have a look at the machine.Pin
    class, which is this page right here. This is it.


    ![](img/610f3057ec812c0d14bb9f163e39f201_189_0.png)


    And you can see the constructors. In my example, I’m using this constructor here
    to create an object for the GPIO number 4 in our case. Then for mode, I’m using
    Pin.IN as opposed to Pin.OUT for the LED. This Pin.IN is for the button. And then
    we also have the pull-up, stuff like that. So Pin.PULL_UP is a way to turn on
    the pull-up resistor you can see. And like the other, you know, you can also have
    the pull-down resistor if you use Pin.PULL_DOWN and that’s about it. The rest
    can be omitted and they will just take the default values. Another new thing that
    I’m using here is the ticks_ms function. You can see that I’m using that down
    here. I’m importing it from utime. So from MicroPython’s version of the time Python
    module. So this function here, you can get more information about it right there.
    It gives us the number of milliseconds since we have powered up the ESP32. And
    that’s because we want to see information about the moment that I pressed on the
    button and I’m bringing out the number of milliseconds since the ESP32 was powered
    up when I pressed the button right here. OK, let’s try this out. So at the moment,
    I’ve loaded the script from my computer disk and my computer file system.'
  mdcn: '## 使用PWM实现LED渐变效果


    在本项目中，我将向您展示如何使用脉冲宽度调制来控制LED的亮度，就像之前的条件语句示例一样，连接到GPIO 21。


    ![](img/610f3057ec812c0d14bb9f163e39f201_181_0.png)


    现在，在讨论软件部分之前，先谈谈硬件。我想提醒您，在ESP32上，您看到的是引脚布局图。请先缩小视图。


    ![](img/610f3057ec812c0d14bb9f163e39f201_182_0.png)


    您可以看到，任何引脚旁边带有波浪号的GPIO在此情况下都具备PWM功能。在本示例中，我使用的是GPIO 21，它具备此功能。因此，只要您想使用的引脚旁边有波浪号，并且它未被其他功能占用，您就可以对其应用PWM功能。


    ![](img/610f3057ec812c0d14bb9f163e39f201_182_1.png)


    好的，让我们看看这里的脚本。我创建了一个名为`fade.py`的演示文件。如您所见，它目前在我的计算机文件系统中，尚未复制到ESP32上。快速浏览一下，我将使用`machine`模块来控制PWM，相关文档就在这里。同时，我还将使用MicroPython和Python标准库自带的`range`函数，其文档链接如下。


    ![](img/610f3057ec812c0d14bb9f163e39f201_183_0.png)


    快速查看这两个资源，您可以看到PWM功能是`machine`模块的一部分。您可以使用这种表示法来创建一个PWM对象。基本上只需调用它，然后传入您想使用的GPIO。您可以读取或设置PWM通道的频率，默认值是1000。因此，如果您不设置它，将使用默认值1000。然后，您可以通过调用`duty`函数并设置一个0到1023之间的数字来设置其占空比。正如您在文档中看到的，如果在函数中不传入参数，它将返回当前的占空比。因此，您总可以在更改之前检查一下当前值。这里还有另一个示例，展示如何在一个函数中同时创建PWM对象并设置其频率和占空比。


    ![](img/610f3057ec812c0d14bb9f163e39f201_183_1.png)


    所以，我正在使用PWM功能。首先，在这里，我使用默认设置，将引脚设置为GPIO 21。然后，在下面的无限循环中，使用`while True`循环，我设置了几个循环。第一个循环将占空比从0以步长5递增到1023，然后调用`duty`函数，根据循环内的值设置占空比。第二个循环是递减的，这就是`range`函数派上用场的地方。我以步长-5（每次减5）从1023递减到0，每次循环后短暂休眠，然后继续循环。


    ![](img/610f3057ec812c0d14bb9f163e39f201_184_0.png)


    内置函数`range`看起来像这样。它有重载的函数。第一个只有一个参数`stop`。因此，如果您使用`range`并给它一个数字，它将从0以步长1计数到该数字。另一种方式是使用这个需要三个参数的函数：`start`、`stop`和`step`，也就是我在这里使用的那个。这使得从一个数字计数到另一个数字变得容易，可以使用任何您想要的步长。好的。


    ![](img/610f3057ec812c0d14bb9f163e39f201_185_0.png)


    所以，我将把这个文件作为副本上传到MicroPython设备。它叫做`fade.py`。好的，并在Thonny中加载它，以替换本地文件系统中的那个，这样就不会混淆了。


    ![](img/610f3057ec812c0d14bb9f163e39f201_185_1.png)


    我将按下运行按钮来启动它。然后您会看到LED亮起和熄灭。为了加快速度，我需要中断它。


    ![](img/610f3057ec812c0d14bb9f163e39f201_186_0.png)


    在我对程序进行任何更改之前，让我们把步长改为15和-15，保存并再次运行。您可以看到它现在亮灭得更快了。因此，您可以更改步长参数，或者减少/增加休眠时间，这将影响亮灭的速度。好的，这很简单。让我们进入下一个项目，在那里我将向您展示如何读取按钮的状态，我们将通过几种不同的方式来实现。


    ## 使用循环读取按钮状态


    在本项目中，您需要读取瞬时按钮的状态。我将向您展示如何做到这一点，使用三个不同的示例，每次通过MicroPython利用ESP32的不同功能来实现相同的目标。


    ![](img/610f3057ec812c0d14bb9f163e39f201_187_0.png)


    但在三个示例中，效率会逐步提高。硬件不会改变。在所有情况下，ESP32都连接了一个瞬时按钮。您可以看到它连接到GPIO 4，就是这个引脚。我使用ESP32的内部上拉电阻，这样我就不需要额外的导线将按钮未按下状态拉高。为此，我将使用内部上拉电阻。我还有一根导线，当按钮按下时，会将按钮状态拉低到低电平。这就是我们将要检测的信号。为了显示按钮按下的效果，我在这里连接了一个LED，就像之前的项目一样，它连接到GPIO
    21。硬件部分就这些了。


    ![](img/610f3057ec812c0d14bb9f163e39f201_187_1.png)


    在本项目中我将展示的第一个示例中，我以最简单的方式读取按钮状态，即使用一个无限循环。因此，我使用`while`循环，并传入`True`作为其永久状态，这样程序将被锁定在这个代码块内。它将不断使用这条指令读取按钮的值，如果它是低电平（这里用0表示），因为您可以看到按钮按下状态被拉低到0伏，那么将打开LED并保持十毫秒。如果按钮状态不是零，而是1（由于内部上拉），那么将关闭LED。这个程序中还有其他几点值得讨论：我使用了这个表达式来声明按钮对象，您可以看到我使用了`Pin`构造函数，就像我为LED使用`Pin`构造函数一样。但在这里，我有三个参数。第一个是GPIO。第二个表示这将是一个输入，第三个激活内部上拉电阻。


    ![](img/610f3057ec812c0d14bb9f163e39f201_188_0.png)


    要了解更多关于`Pin`构造函数的信息，请查看此链接，它将带您到MicroPython网站上ESP32快速参考的这个页面。它向您展示了如何使用这些函数的示例。同样，如果您想要更多信息，最好查看`machine.Pin`类，就是这个页面。


    ![](img/610f3057ec812c0d14bb9f163e39f201_189_0.png)


    您可以看到构造函数。在我的示例中，我使用这个构造函数为我们的GPIO 4创建一个对象。对于模式，我使用`Pin.IN`，而不是用于LED的`Pin.OUT`。这个`Pin.IN`是用于按钮的。然后我们还有上拉电阻之类的东西。`Pin.PULL_UP`是开启上拉电阻的一种方式。同样，如果您使用`Pin.PULL_DOWN`，也可以有下拉电阻。其余参数可以省略，它们将采用默认值。我在这里使用的另一个新东西是`ticks_ms`函数。您可以看到我在这里使用它。我从`utime`导入它，也就是从MicroPython版本的Python
    `time`模块导入。关于这个函数，您可以在那里找到更多信息。它给出了自ESP32上电以来的毫秒数。这是因为我想看到我按下按钮那一刻的信息，我在这里输出了自ESP32上电以来的毫秒数。好的，让我们试试这个。目前，我已经从我的计算机磁盘和文件系统加载了脚本。'
