- md: '## OLED SH1106 I2C


    Like in the previous project, you learned how to use this 0.96-inch display, which
    is based on the SSD1306 controller chip.


    And in this project, I’ll show you a slightly larger display again, a 1.3-inch
    display, using the SH1106 controller chip. I’m going to use the exact same connections
    between the screen and the ESP32. I’m using the I2C interface, which involves
    the SDA and SCL pins going to GPIO 25 and 26. Now, unlike our previous experiment
    with the SSD1306 display, I was able to get this display to work both with software
    I2C and hardware I2C. And of course, hardware I2C, which is more efficient with
    resources. So in this demonstration here, I’m using the hardware interface instead
    of the software interface.


    Now, in terms of the driver Python library that I’m using here, I found a really
    good one which is available at this location right here. And you can see its source
    code right here, really well documented up in the header. This library allows
    you to use this screen both with the SPI or the I2C interface. The module that
    I’ve got here, of course, only provides pins for the I2C interface, and that’s
    how I’m using it here. But in a way, the library does allow you to use the same
    OLED display with the SH1106 controller, you know, using the SPI connection if
    the module you’re using breaks out those pins.


    Right. We may come back to this source code in a minute. Let’s go back to the
    example script. There’s information about the connections right here. You can
    go ahead and wire up your screen. Just change this to software or hardware I2C
    because they both work fine.


    Now, down here in the actual code, I’m importing the I2C and Pin modules as well
    as the driver code. And you can see that I’m creating the I2C object by using
    the minimal version of the constructor. I’m just passing the ID of the hardware
    interface being 1.


    Just to remind you, if you go to the MicroPython documentation, you’ll see that
    the I2C ID 1 channel means that SDA is connected to GPIO 25 and SCL to GPIO 26,
    which is how I’ve done the wiring here. So that’s all the code you need in order
    to create the I2C object. I also mentioned that I have tried software I2C and
    that works as well. I’ve just commented out that code in case you want to use
    it. It’s a very flexible library.


    Then in line 41, we are creating the display object by calling the SH1106 constructor.


    You can search for that constructor function in the source code and you’ll be
    taken to this. And you can see the initialization function and its parameters:
    the width, the height, the I2C object. I’m not sure what this is, but I’m just
    going to go with the default of None.


    And finally, you’ve got the address here. So you’ve got the display object here
    and then initialize it. And the `contrast` leads to True if you want to minimize
    the power consumption. But of course, make sure that the display is awake by passing
    False to the `sleep` function.


    Then we’ll start printing out some various test text or patterns. In this case,
    turn the screen to black by passing 0, which means all the pixels are turned off.
    Then I’m writing a bit of text here at this location. This is X and Y.


    You can see if you search for `text`, you can see the function right here. This
    is actually the frame buffer implementation of the `text` function. So you’ve
    got a bit of text printed out and then we call `show` to bring this drawing out
    of the buffer and implement it and show it onto the screen.


    Go to sleep for a second, then fill the screen by turning all the lights on so
    that we light up the whole screen. Then I’m going to print out a bit of text.
    But this time I’m going to print it in black and turn off its pixels. You can
    also rotate the screen so that you can have the screen pointing upside down if
    you need, depending on the orientation. So this is something that the library
    for the SSD1306 in the previous project did not provide us with, such a `rotate`
    function. So we can flip things around and then we can print a rectangle. And
    in this case here, I’m filling the screen by printing multiple rectangles. Each
    one is larger than the previous until it eventually fills the whole screen.


    And then finally, I’ve got a little bit of an animation going on here. I’ve got
    a little box that is travelling from the left end of the screen to the right and
    then back to the left, which is what you can see happening right here. The little
    box there is bouncing off the sides of the screen.


    I’m going to hit Control-C to stop the program from running and then I’m going
    to start from the beginning so we can see what is going on until we get to see
    the bouncing ball segment.


    You’re testing one, two, inverted. It’s a box in the middle and then the full
    screen, the gradual full screen. And finally, the bouncing ball is an example
    of a simple animation. Now this is happening using hardware I2C, so that’s an
    efficient way to drive this screen.


    ## OLED SSD1315 I2C


    Hi, welcome back. In this project, I’ll show you how to use this 0.96-inch OLED
    display with the SSD1315 controller, which I happen to have implemented as a Seeed
    Studio Grove component. You can see its markings here. It’s probably the only
    OLED display that I have with a marking of its controller on the board itself,
    which makes it very easy to identify.


    So since this is a Grove component, I use a Grove cable and then a bunch of jumper
    wires to connect it to the ESP32, which I’m going to use these little pins to
    attach it back into my breadboard, which stays put. Right. So I use the exact
    same pin assignments and wiring as in the previous project. This is a 3.3-volt
    display.


    So the VCC is connected to the 3.3-volt rail. Then for I2C, as you can see here
    as well in the information they provided at the head of the sample script, SDA
    is connected to GPIO 25, and SCL to GPIO 26.


    Now, similarly to this display here, the 0.96-inch OLED display with the SSD1306
    controller.'
  mdcn: '## OLED SH1106 I2C


    和之前的项目一样，你已经学会了如何使用这款基于SSD1306控制芯片的0.96英寸显示屏。


    在这个项目中，我将向你展示一款稍大一些的显示屏，即1.3英寸的显示屏，它使用的是SH1106控制芯片。我将使用与屏幕和ESP32之间完全相同的连接方式。我使用的是I2C接口，这涉及到将SDA和SCL引脚分别连接到GPIO
    25和GPIO 26。现在，与我们之前使用SSD1306显示屏的实验不同，我发现这款显示屏既可以使用软件I2C，也可以使用硬件I2C工作。当然，硬件I2C在资源利用上更高效。因此，在这个演示中，我使用的是硬件接口而不是软件接口。


    关于我在这里使用的驱动Python库，我发现了一个非常好的库，你可以在这里找到它。你可以在这里看到它的源代码，头部的文档非常完善。这个库允许你通过SPI或I2C接口使用这款屏幕。我手头的模块当然只提供了I2C接口的引脚，我也是这样使用的。但某种程度上，这个库确实允许你使用相同的带有SH1106控制器的OLED显示屏，如果你使用的模块引出了那些引脚，你也可以使用SPI连接。


