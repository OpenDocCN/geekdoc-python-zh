- md: '## USING THONNY IDE WITH BBC MICROBIT


    In this lesson, I can show you how to run a simple program on the BBC Micro:bit
    that scrolls a "Hello World" text on the 8x8 bitmap display on the back of the
    micro:bit, and of course, that using MicroPython and Thonny IDE.


    So essentially, I have here already connected the micro:bit onto my computer.


    If I use Thonny, once you do that, go to Options and ensure that MicroPython (BBC
    micro:bit) is selected as the interpreter for this session and then select the
