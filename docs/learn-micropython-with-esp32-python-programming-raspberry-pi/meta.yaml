    ID，这是 number_one 存储的内存位置。number_two 和 sum 也有堆。栈中的内存是空的，隐藏内存是堆和栈都存储在 RAM 中的地方。Python
    特别地以不同方式使用堆和栈。所以据说两者都是 RAM 的一部分。但在内存中，Python 将存储全局变量。你可以在这里看到，number_one 是一个全局变量，存储在这个远程位置，0x3ffb0，这与堆中的这个
    ID 匹配，它的值是 1.5，正如在脚本的第三行所分配的那样。同样，第四行声明并初始化了变量 number_two，你可以在这里看到。这是它的值，在 RAM
    中，就在这里的堆中。同样，这里是 Python 存储其全局变量的地方。你有 sum，它是后来创建的，其内容是 number_one 和 number_two
    相加的结果。我们栈中没有任何东西，因为我们没有任何函数。


