    \ [2X16 LCD DISPLAY WITH PCF8574 - PART 1 HARDWARE I2C](2X16 LCD DISPLAY WITH\
    \ PCF8574 - PART 1 HARDWARE I2C)\n- [2X16 LCD DISPLAY WITH PCF8574 - PART 2 SOFTWARE\
    \ I2C](2X16 LCD DISPLAY WITH PCF8574 - PART 2 SOFTWARE I2C)\n- [OLED SSD1306 I2C](OLED\
    \ SSD1306 I2C)\n- [OLED SH1106 I2C](OLED SH1106 I2C)\n- [OLED SSD1315 I2C](OLED\
    \ SSD1315 I2C)\n- [NEOPIXELS](NEOPIXELS)\n- [MAX7219 8X8 MATRIX DISPLAY - PART\
    \ 1 RANDOM PIXELS](MAX7219 8X8 MATRIX DISPLAY - PART 1 RANDOM PIXELS)\n- [MAX7219\
    \ 8X8 MATRIX DISPLAY - PART 2 TEXT](MAX7219 8X8 MATRIX DISPLAY - PART 2 TEXT)\n\
    \n## WHAT IS MICROPYTHON AND PYTHON FOR MICROCONTROLLER\n\nSo some of you might\
    \ think micro pies and what is this super tiny snake or maybe something to do\
    \ with Monte Python or so the triple E spectrum realized his ranking of the most\
    \ used programming languages in 2018.\n\n![](img/610f3057ec812c0d14bb9f163e39f201_4_0.png)\n\
    \nAnd it’s very interesting. Python is on the top and it says a 100% coverage\
    \ shrink. it’s in the web, it’s on your desktop computer and it’s now, already,\
    \ also used on microcontrollers. And what I find quite interesting is that assembly\
    \ entered into top. This year, which means probably because of the internet of\
    \ things that are programmed with assembly.\n\n## What is MicroPython?\n\n- **lean**\
    \ and **efficient** rewrite of **Python**\n- Includes complete parser, compiler,\
    \ virtual machine, runtime system and garbage collector\n- **byte code** or **native\
    \ machine code**\n- Supports **inline assembler**\n- **Compilation on the chip**\n\
    - **REPL** (read, evaluate, print – loop)\n\n![](img/610f3057ec812c0d14bb9f163e39f201_5_0.png)\n\
    \nSo micro Piven is a fully reimplementation of Python and it leads to be lean\
    \ and efficient to run on a microcontroller because you couldn’t be just using\
    \ Python as you know, from your desktop computer. It needs. it was rewritten from\
    \ sketch to fit on the microcontroller. It has a virtual machine and a runtime\
    \ system with garbage collection and everything you need to make it really efficient.\
    \ There’s bike code or native machine code you can use with. The micropython and\
    \ is also in support for Atlanta smaller. when you have a project where you like\
    \ to use Python, because you want to get it up easy, but you need to make it more\
    \ efficient in some, your tiny bits. There’s also Atlanta San Francisco Portland.\
    \ The compilation happens on the chip. it’s not compile your program. You write\
    \ as the compile on your desktop sheen, it’s complete compact on the hardware\
    \ use. as late as I have this fantastic camera over here, I will show you some\
    \ demos.\n\n## How everything started\n\n![](img/610f3057ec812c0d14bb9f163e39f201_6_0.png)\n\
    \nhow easily can use microbiomes and how did this start? How me one think of having\
    \ a high level, really high level scripting language to run on a director and\
    \ a microcontroller about five years ago, Damion George at the time, working at\
    \ Cambridge university thought, oh, this would be fantastic to control my little\
    \ robots with Python because it’s easy. And I know, and I don’t need to interact\
    \ with all the low-level stuff. he had the idea, let’s run a Kickstarter because\
    \ at that time everybody was doing it and I would really like to see how it is\
    \ to do a Kickstarter as well. , And he wanted to think maybe other people will\
    \ be interested in having him. And he would like to have an open source community\
    \ around it to support the project. Because as we think open source is very important\
    \ because I profit from it every day and we want to give something back. this\
    \ means micropython is open source. Everybody is welcome to contribute and it’s,\
    \ it’s open to everybody.\n\n## 5 years in\n\n- **GitHub**\n  7 000+ Stars, 200+\
    \ contributors, 2 000+ forks\n  42 Releases v1.9.4 with code coverage 99.2%\n\
    - **In the UK all 11-12 year old children got a BBC Micro:Bit**\n- **Development\
    \ boards**\n  shipping with MicroPython pre-installed from different companies\n\
    \  Adafruit (CircuitPython), PyCom, OpenMV...\n- **2nd Generation of pyboards\
    \ ready to launch**\n\n![](img/610f3057ec812c0d14bb9f163e39f201_7_0.png)\n\n![](img/610f3057ec812c0d14bb9f163e39f201_7_1.png)\n\
    \nSo this was about five years ago and today. Uh, up till today, a lot has happened\
    \ when you look at our guitar page, they have more than 7,000 stars and more than\
    \ 200 contributors. Very interesting is that the contributors come out of different\
    \ areas. they are makers, but they are also people that work as embedded developers\
    \ in the industry because they saw the benefit of. a high level language, which\
    \ you can start up making it run up easy and focus on the bottlenecks of your\
    \ actual project. And there are also more than 2000. Which means a lot of people\
    \ are working on it. me of you might have known the BBC microbit. That’s also\
    \ one project in the UK. They were given about a million of these little PCB margins\
    \ to the children in the UK to get them up and running quite early in the education\
    \ process. Python is taught in school in the UK and. This also, there are other\
    \ languages support as well, but microbiome is also on it. Then there are a lot\
    \ of different development bolts. For example, other fruit has its own micro Python\
    \ part. That’s called circuit Python. if you want to try microbiomes and you have\
    \ a wide range of development boards, and there is all, of course, the official\
    \ micropython board, the piebald. Which I’m going to show you today because there’s\
    \ always an advantage on having your own hardware, because you all know the saying,\
    \ if you’re serious about your software, you should do your own"
  mdcn: "# 使用ESP32学习MicroPython\n\nPython编程、树莓派、MicroPython模块、BME280环境传感器、Max7219\
    \ 8x8矩阵显示屏、MicroPython项目及更多内容\n\n![](img/610f3057ec812c0d14bb9f163e39f201_0_0.png)\n\
    \n作者：Jansa Selvam\n\n## 目录\n\n- [什么是MicroPython和用于微控制器的Python](WHAT IS MICROPYTHON\
    \ AND PYTHON FOR MICROCONTROLLER)\n- [什么是uPython以及为什么你应该关注它](WHAT IS UPYTHON AND\
    \ WHY SHOULD YOU CARE)\n- [你需要的软件](SOFTWARE YOU WILL NEED)\n- [你需要的硬件](HARDWARE\
    \ YOU WILL NEED)\n- [如何充分利用这个项目](HOW TO GET THE MOST OUT OF THIS PROJECT)\n- [获取项目的演示脚本](GET\
    \ THE DEMO SCRIPTS FOR THE PROJECT)\n- [uPython与CPython对比](UPYTHON VS CPYTHON)\n\
    - [uPython资源](UPYTHON RESOURCES)\n- [uPython兼容开发板](UPYTHON COMPATIBLE BOARDS)\n\
    - [使用Thonny IDE进行Python开发入门](GETTING STARTED WITH THONNY IDE FOR PYTHON)\n- [如何将MicroPython固件安装到你的ESP32](HOW\
    \ TO INSTALL THE MICROPYTHON FIRMWARE TO YOUR ESP32)\n- [设置解释器](SETTING AN INTERPRETER)\n\
    - [如何编写和执行MicroPython程序](HOW TO WRITE AND EXECUTE A MICROPYTHON PROGRAM)\n- [Thonny\
    \ IDE的其他视图](OTHER VIEWS IN THONNY IDE)\n- [Thonny IDE与树莓派Pico配合使用](THONNY IDE\
    \ WITH RASPBERRY PI PICO)\n- [使用Thonny IDE与BBC Micro:bit](USING THONNY IDE WITH\
    \ BBC MICROBIT)\n- [Thonny IDE高级配置](THONNY IDE ADVANCED CONFIGURATION)\n- [在PyPI上查找Python包](FIND\
    \ PYTHON PACKAGES AT PYPI)\n- [MicroPython Shell](THE MICROPYTHON SHELL)\n- [如何中断正在运行的程序](HOW\
    \ TO INTERRUPT A RUNNING PROGRAM)\n- [如何在启动时运行程序](HOW TO RUN A PROGRAM AT BOOT)\n\
    - [如何调试MicroPython程序](HOW TO DEBUG MICROPYTHON PROGRAM)\n- [关于MicroPython模块](ABOUT\
    \ MICROPYTHON MODULES)\n- [内置模块](BUILT-IN MODULES)\n- [社区模块](COMMUNITY MODULES)\n\
    - [如何安装外部模块](HOW TO INSTALL AN EXTERNAL MODULE)\n- [使用循环控制LED闪烁](BLINK AN LED\
    \ WITH LOOP)\n- [使用PWM控制LED渐变](FADE AN LED WITH PWM)\n- [使用循环读取按钮](READ A BUTTON\
    \ WITH LOOP)\n- [使用硬件中断读取按钮](READ A BUTTON WITH HARDWARE INTERRUPT)\n- [使用定时器中断读取按钮](READ\
    \ A BUTTON WITH TIMER INTERRUPT)\n- [读取电位器](READ A POTENTIOMETER)\n- [DHT22环境传感器](DHT22\
    \ ENVIRONMENT SENSOR)\n- [BME280环境传感器](BME280 ENVIRONMENT SENSOR)\n- [ESP32内置触摸传感器](ESP32\
    \ INTERNAL TOUCH SENSOR)\n- [ADXL335模拟加速度计](ADXL335 ANALOG ACCELEROMETER)\n- [HC-SR04超声波距离传感器](HC-SR04\
    \ ULTRASONIC DISTANCE SENSOR)\n- [使用PCF8574的2X16 LCD显示屏 - 第1部分 硬件I2C](2X16 LCD\
    \ DISPLAY WITH PCF8574 - PART 1 HARDWARE I2C)\n- [使用PCF8574的2X16 LCD显示屏 - 第2部分\
    \ 软件I2C](2X16 LCD DISPLAY WITH PCF8574 - PART 2 SOFTWARE I2C)\n- [OLED SSD1306\
    \ I2C](OLED SSD1306 I2C)\n- [OLED SH1106 I2C](OLED SH1106 I2C)\n- [OLED SSD1315\
    \ I2C](OLED SSD1315 I2C)\n- [NeoPixels](NEOPIXELS)\n- [MAX7219 8X8矩阵显示屏 - 第1部分\
    \ 随机像素](MAX7219 8X8 MATRIX DISPLAY - PART 1 RANDOM PIXELS)\n- [MAX7219 8X8矩阵显示屏\
    \ - 第2部分 文本](MAX7219 8X8 MATRIX DISPLAY - PART 2 TEXT)\n\n## 什么是MicroPython和用于微控制器的Python\n\
    \n所以你们中的一些人可能会想，MicroPython是什么？这个超级小的蛇是什么？或者可能和Monty Python有关？IEEE Spectrum在2018年发布了最常用编程语言的排名。\n\
    \n![](img/610f3057ec812c0d14bb9f163e39f201_4_0.png)\n\n这非常有趣。Python位居榜首，并且显示了100%的增长率。它存在于网络上，在你的台式电脑上，现在也已经用于微控制器。我觉得非常有趣的是，汇编语言今年进入了前十名，这可能是因为物联网设备是用汇编语言编程的。\n\
    \n## 什么是MicroPython？\n\n- **精简**且**高效**的**Python**重写版本\n- 包含完整的解析器、编译器、虚拟机、运行时系统和垃圾回收器\n\
    - **字节码**或**原生机器码**\n- 支持**内联汇编**\n- **在芯片上编译**\n- **REPL**（读取、求值、打印 - 循环）\n\n\
    ![](img/610f3057ec812c0d14bb9f163e39f201_5_0.png)\n\n所以MicroPython是Python的完全重新实现，它被设计得精简高效，以便在微控制器上运行，因为你不能像在台式电脑上那样直接使用Python。它需要从头开始重写以适应微控制器。它有一个虚拟机和一个运行时系统，带有垃圾回收以及你需要让它真正高效运行的一切。你可以使用字节码或原生机器码。MicroPython还支持内联汇编。当你有一个项目想使用Python，因为你希望它容易上手，但你需要在某些微小的部分让它更高效时，它也支持内联汇编。编译发生在芯片上。你写的程序不是在你的台式电脑上编译，而是在你使用的硬件上编译。我这里有一个很棒的摄像头，我会给你们展示一些演示。\n\
    \n## 一切是如何开始的\n\n![](img/610f3057ec812c0d14bb9f163e39f201_6_0.png)\n\n使用MicroPython有多容易？这一切是如何开始的？大约五年前，Damien\
    \ George当时在剑桥大学工作，他想，哦，用Python来控制我的小机器人会很棒，因为它很容易。我知道，我不需要与所有底层的东西交互。他有了这个想法，让我们在Kickstarter上发起一个项目，因为当时每个人都在做，我也很想看看做Kickstarter是什么感觉。他想也许其他人也会有兴趣拥有它。他希望建立一个开源社区来支持这个项目。因为我们认为开源非常重要，因为我每天都从中受益，我们想回馈一些东西。这意味着MicroPython是开源的。欢迎每个人贡献，它对每个人开放。\n\
    \n## 五年之后\n\n- **GitHub**\n  7000+ Stars，200+贡献者，2000+ forks\n  42个版本，v1.9.4版本代码覆盖率达99.2%\n\
    - **在英国，所有11-12岁的孩子都得到了一个BBC Micro:bit**\n- **开发板**\n  不同公司提供预装MicroPython的开发板\n\
    \  Adafruit (CircuitPython), PyCom, OpenMV...\n- **第二代pyboard即将发布**\n\n![](img/610f3057ec812c0d14bb9f163e39f201_7_0.png)\n\
    \n![](img/610f3057ec812c0d14bb9f163e39f201_7_1.png)\n\n这大约是五年前的事了，而今天。呃，直到今天，已经发生了很多事情。如果你看我们的GitHub页面，他们有超过7000个星标和超过200个贡献者。非常有趣的是，贡献者来自不同的领域。他们是创客，但也有在行业里从事嵌入式开发的人，因为他们看到了高级语言的好处，你可以轻松启动并运行它，专注于你实际项目的瓶颈。还有超过2000个fork，这意味着很多人在致力于它。你们中的一些人可能知道BBC\
    \ Micro:bit。这也是英国的一个项目。他们向英国的孩子们分发了大约一百万个这样的小PCB板，让他们在教育过程的早期就能上手并运行。Python在英国的学校里教授，虽然也支持其他语言，但MicroPython也在其中。然后有很多不同的开发板。例如，Adafruit有自己的MicroPython版本，叫做CircuitPython。如果你想尝试MicroPython，你有很多开发板可以选择，当然还有官方的MicroPython板，pyboard。我今天将向你们展示它，因为拥有自己的硬件总是有优势的，因为你们都知道那句话，如果你对你的软件是认真的，你应该使用自己的硬件。"
