    所以我现在就要这样做。我要从之前的项目中复制代码，然后粘贴在这里。它将保留之前提交的代码原样。我要把它粘贴在这里，然后保存这个文件。


    现在，我要做的是断开计算机电缆、USB电缆，然后用一根连接到电源的电缆替换它。这个是电池电源，插上它，你可以看到LED在闪烁，这意味着我的.py脚本中的代码正在被执行。所以这是第一种方法。让我把我的Richard重新连接到我的计算机上，现在让我们看看会发生什么。


