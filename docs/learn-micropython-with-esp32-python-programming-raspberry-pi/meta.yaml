- md: '## READ A BUTTON WITH HARDWARE INTERRUPT


    Welcome back. In the previous project, you learned how to read the state of the
    button in the simplest possible way.


    As you can see here, we just use a while true infinite loop. And in it we just
    take a reading of the button, fairly painful, and then act accordingly. The problem
    with this method, of course, is that you’ve got an infinite loop here that looks
    at the execution of the program in it. It’s not a very efficient way to use your
    hardware.


    In this project, I want to show you an alternative which is more efficient and
    allows us to read the state of the button using a hardware interrupt. So in this
    line here, line 58, I have to find an IRQ and interrupt request on button pin
    and have configured it in a way that is very efficient. So what I’m saying here
    to the trigger is the falling edge of the signal that is produced by the button.
    So when you press the button, the voltage on your pin falls from high to low,
    and that is the IRQ falling edge which is detected and triggers this interrupt.
    And when this edge, the falling edge is detected, then the interrupt is calling
    this routine here, a function, the button and this pressed underscore ISR, interrupt
    service routine or handler, which branches the program inside this function and
    again act accordingly. We’ll get to this in a minute in order to display the LED
    lighting up. When I press the button, I’m still using a while loop here. It’s
    just the easiest way just to demonstrate the interaction between an ISR and then
    a different part of your program. And I’m also demonstrating the ability of ISR
    and other parts of your program to communicate using global variables in this
    case.


    Now let’s have a look at some of the details. You can see up here in line 36,
    I am importing the Pin function, disable IRQ and enable IRQ functions from the
    machine module. And again, the sleep in there from the time module. I’m starting
    by creating the object as usual, and then the pin object, which is exactly what
    we did in the previous example. Same thing here. Nothing has changed. Then I’m
    declaring a couple of variables. This is the button pressed variable. It allows
    the IRQ routine, the ISR recorded here, handler, to communicate with other parts
    of my program. So when a button is pressed, then I update this variable here.
    You can see it is updated here and then used here to determine whether the LED
    should be turned on or off. I also have an integer, like a numerical variable
    here that keeps track of how many times the button has been pressed before it’s
    reset. So you can play around with those variables as well. Now, inside the definition
    of the routine that will be called by the IRQ, you can see that it requires one
    parameter. And this is the object that has caused the IRQ and this is passed by
    the IRQ routine here as well. And I’m using this object here to print out some
    information about what is it that has caused the IRQ. You see I’m taking pin and
    exactly what it is and passing it into the button pin global variable, which is
    then printed out down here so I can get some information about the object that
    caused the IRQ. A couple of other interesting things that are happening in here
    is, first, that I am calling the disable IRQ routine, which, as you can probably
    guess, will disable further IRQs. So when I press the button, the first thing
