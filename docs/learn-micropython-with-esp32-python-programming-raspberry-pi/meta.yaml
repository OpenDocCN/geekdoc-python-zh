- md: '## NEOPIXELS


    In this project, I’ll show you how to use the NeoPixels, which are individually
    addressable RGB LEDs. In this example, I’m using a module from Adafruit that contains
    eight NeoPixels. The nice thing about NeoPixels is that the MicroPython firmware
    contains a built-in driver. So there’s nothing else that you need to install and
    there’s nothing else you need to Google around and find. So you simply import
    the `neopixel` module and you’re ready to go. And here’s the example here, which
    I also referenced in my example script.


    In terms of the way that it is connected, the pixel to the ESP32, I’m just going
    to unplug it so we can see in the back there are four pins, but really just three
    pins that you need to connect: the ground, the data input pin, and the 5V pin.
    So obviously 5V goes to the final pin on the right, ground to ground. And for
    the data pin, you can choose whichever port you want. In my case, I’ve connected
    to GPIO 13, which is not even close to the 5V pin, it makes it easier to make
    short length connections. All right. Have a look at the example sketch. Here are
    the connections that I’m using in this example.


    Have got links to the appropriate documentation for the pixel driver and having
    a look at the header of my program. I’m importing the various modules, including
