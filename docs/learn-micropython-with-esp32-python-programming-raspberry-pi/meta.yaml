    - [ABOUT MICROPYTHON MODULES](ABOUT MICROPYTHON MODULES)\n- [BUILT-IN MODULES](BUILT-IN\
    \ MODULES)\n- [COMMUNITY MODULES](COMMUNITY MODULES)\n- [HOW TO INSTALL AN EXTERNAL\
    \ MODULE](HOW TO INSTALL AN EXTERNAL MODULE)\n- [BLINK AN LED WITH LOOP](BLINK\
