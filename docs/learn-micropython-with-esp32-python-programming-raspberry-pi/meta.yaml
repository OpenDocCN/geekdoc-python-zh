    所以这是需要记住的事情。当你有一个包含像那样的无限循环的脚本时，你需要记住按Control+C来重新获得对设备的控制。所以第一种方法只是简单地将你的代码复制到文件中，然后它将执行包含的代码。但更好的方法是使用import。因为我们已经有了我们想要在启动时执行的代码在一个单独的文件中，我们不想真的复制到boot中。


