    我相信这里有这个文件，所以我将上传它。现在它在这里，那个引用实际上是正确的，它会工作。好的。


    所以我要从我的计算机上拔掉数据线，然后从电池室带上电源线。看，它工作了。让我们重新连接到Sony，就像电源，像两台计算机，USB电缆。而医院现在也被锁定在无限循环中。所以我要点击停止按钮来重启后端。


    然后Control+C？停止执行，我们重新获得了控制权。


    好的，所以让我们看看这两种方法，你可以通过它们在ESP32上通电时自动运行程序。我想在本节中向你展示的最后一件事是如何使用phony I.D.对你的Python脚本进行简单的调试。我们将在下一个项目中这样做。'
