  mdcn: '## NEOPIXELS


    在本项目中，我将向你展示如何使用NeoPixels，这是一种可独立寻址的RGB LED。在这个示例中，我使用的是Adafruit的一个模块，其中包含八个NeoPixels。NeoPixels的优点在于，MicroPython固件内置了驱动程序。因此，你无需安装其他任何东西，也不必四处搜索查找。你只需导入`neopixel`模块，就可以开始了。这里有一个示例，我在示例脚本中也引用了它。


    关于连接方式，像素到ESP32的连接，我先把它拔下来，这样我们就能看到背面有四个引脚，但实际上你只需要连接三个引脚：地线、数据输入引脚和5V引脚。显然，5V连接到最右边的引脚，地线接地。至于数据引脚，你可以选择任意端口。在我的例子中，我连接到了GPIO
    13，它离5V引脚很远，这样更容易进行短距离连接。好了。看看示例草图。这是我在这个示例中使用的连接方式。


    我已经链接了像素驱动程序的相应文档，并查看了程序的头部。我导入了各种模块，包括`random`，因为正如你在这里看到的，会出现随机的颜色模式。我在这里为数据输入引脚创建了`Pin`对象，然后将其传递给`NeoPixel`构造函数，以便在我的示例中创建像素对象。正如我所说，我使用的是Adafruit的一个模块，上面有八个NeoPixels。因此，这里的代码数字八是`NeoPixel`构造函数的第二个参数。


    一旦你有了像素对象，你就可以将其视为一个数组，并独立寻址每个NeoPixels。所以在这个例子中，我针对第一个像素，索引零，并向它传递一个颜色。因此，正如我所说，你可以独立寻址这些NeoPixels中的每一个。我稍后会在这个展示中实际操作一下。


    设置完单个像素后，你调用`write`函数，然后每个像素都会显示配置的颜色。在缓冲区中，我在这里调用了`show`，但当然，什么也没做，因为我还没有设置任何东西。所以我也会把那行注释掉。所以在这个例子中，我们直接进入这个无限循环。我有一个`for`循环，它会循环并独立编程每个NeoPixels。然后对于循环结构中出来的每个NeoPixels
    `x`，我为每个RGB（红、绿、蓝）选择一种颜色。我这里从0到10，以保持像素发出的光的强度较低。


    最大值是255，但在室内光照条件下，几乎不可能直视实际的像素而不伤眼睛。NeoPixels是非常强大的光源。所以即使在大白天你也能看到它们。但如果你打算在室内使用你的NeoPixels，只需通过使用较小的RGB数值来稍微降低亮度。好了。所以我正在为每个NeoPixels编程一个随机颜色。一旦我完成循环并且所有像素都编程完毕，我就调用`write`函数，这会将信息传递给实际的NeoPixels并创建那种颜色。我停留在那里60毫秒，然后进行一个类似的循环，关闭所有像素，这样我就能看到15毫秒的瞬间照明效果。只是为了制造那种闪烁的效果。如果你有兴趣创建不同的图案，可以尝试一些其他不同的效果。这就是这个随机颜色生成器在八NeoPixel模块上的效果。


