    earlier in 2021, selling for around five dollars. And it’s powered by the brand
    new RP2040 microcontroller. This microcontroller was actually designed by the
    Raspberry Pi Foundation. And very quickly, several new boards came out that are
    based on the same microcontroller, like the Feather 2040, the Tiny 2040. All of
    them can run the MicroPython firmware. And the Raspberry Pi Foundation provides
    excellent documentation through its website. I find that compared to the Pyboard
    and the ESP boards, it is much harder to find MicroPython device drivers for the
    Raspberry Pi Pico. It’s still a new board, so I expect that this is going to change.
    The Raspberry Pi Pico is an excellent, simple board. It doesn’t have any wireless
    communications capability, but I think that this is a case where simplicity is
    an advantage. Along with the BBC Micro:bit, the Raspberry Pi Pico is probably
    the easiest way to learn MicroPython.


    ## BBC Micro:bit


    - Designed for Education.

    - Lots of on-board peripherals.

    - Excellent MicroPython implementation.


    ![](img/610f3057ec812c0d14bb9f163e39f201_50_0.png)


    Next up is probably the BBC Micro:bit. So the BBC Micro:bit is a small board designed
    specifically for education. It uses a Nordic nRF52833 application processor and
    contains an impressive array of built-in peripherals, such as an LED matrix display,
    a touch sensor, a microphone, a couple of buttons, and an accelerometer. It also
    has a 2.4 GHz transceiver that students can experiment with to create a simple
