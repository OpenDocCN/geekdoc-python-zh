    sum 变量，然后我们调用了函数 add_numbers。所以本质上程序从这里跳到这里，然后我们到第五行并执行它。现在，如果我运行这个程序，看看会发生什么。程序执行后，我们没有真正看到的一件事是栈中发生了什么，如果有的话。栈，正如我之前所说，是
    Python 跟踪其在程序中位置的地方。当我们必须从程序的一部分跳转到函数内部继续执行程序时，栈特别有用。因此，Python 需要知道函数执行完成后返回到哪里，它需要跟踪栈内的调用源，并能够看到它开始被填充。'
