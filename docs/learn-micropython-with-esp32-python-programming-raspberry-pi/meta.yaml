- md: 'It is easy to integrate various components with the ESP32 for MicroPython projects
    and for those that will be using several external libraries. Just like with the
    Arduino, there are libraries for an extensive range of components like sensors,
    motors and displays. You can find information about the specific libraries that
    you need for each mini project in the relevant project. And that''s about it,
    that''s it with the software requirements. When you are ready, please continue
    with the next section where I''ll talk about the hardware you will be using this
    week.


    ## HARDWARE YOU WILL NEED


    To successfully complete the projects in this course, you''ll need a few easy
    to get hardware components. If you''ve completed my advanced step-by-step courses,
    you probably already have everything that you need. So let''s have a look at the
    required hardware now.


    ### An ESP32 board


    - Any ESP32 board will work.

    - We''ll install the MicroPython firmware.

    - Learn how to use the MicroPython REPL.

    - Learn how to write and run MicroPython programs.


    Of course, you need an ESP32 to develop and it really doesn''t matter which one.
    I have tested the MicroPython scripts from this course in a variety of generic
    ESP32 boards, and they all worked fine. Now, one of the boards I''m using in this
    course is so generic that it doesn''t even have any model information printed
    on it. It''s a 19-pin board with the ESP-WROOM-32 designation on the MCU package.


    ### Simple components


    - LED.

    - Resistors.

    - Button.

    - Potentiometer.


    For the first round of experiments, we''ll use an LED with its current limiting
    resistor, a button and a potentiometer. For the button, we''ll use an internal
    pull-up resistor to simplify the external circuitry so you don''t need an additional
    resistor for the button.


    ### Sensors


    - DHT22 environment sensor.

    - BME280 environment sensor.

    - ADXL335 analog accelerometer.

    - HC-SR04 ultrasonic distance sensor.


    Next, we''re going to work with sensors. So in the section on sensors, you''ll
    experiment with the DHT22, the BME280, the ADXL335, which is an analog accelerometer,
    and the HC-SR04 ultrasonic distance sensor.


    ### Displays


    - 2x16 LCD with PCF8574 I²C.

    - 0.96" OLED I2C SSD1306.

    - 1.3" OLED I2C SH1106.

    - 0.96" OLED I2C SSD1315.

    - Neopixels.

    - 8x8 LED matrix with the MAX7219.


    Then we are going to move on to the displays section. The section on displays
    is quite busy with several different devices included in your kit. We''ll be testing
    them in experiments with the OLED screens. There are three options to choose from,
    but I particularly like the displays with the SH1106 driver because they work
    well with both the hardware and the software I2C options. The driver is pretty
    good. In this section, we also experiment with a 2x16 I2C LCD screen, which is
    based on the PCF8574 parallel to I2C converter. We are also playing around with
    NeoPixel modules. So I''m using one that has eight individual addressable LEDs
    and an 8x8 LED matrix, which is driven by the MAX7219 module.


    And we are also going to experiment with motors. You need a 5V mini servo motor
    and a 5V mini DC motor. To drive the DC motor, you need the L298N motor controller.
    And that''s it with the hardware requirements. When you are ready, please continue
    with the next section. We''ll talk a little bit about a few simple things that
    you can do to make the most out of this course.


    ## HOW TO GET THE MOST OUT OF THIS PROJECT


    I''d like to say a few things that I believe will help you get in the right state
    of mind so that the time that you spend on this course is both effective and enjoyable.


    Learning anything worthwhile takes time. Plan for your learning and set time aside
    for this specific activity in your busy schedule. Without dedicated time, you''ll
    feel that you have to rush your way through the projects, making the experience
    stressful. Learning under stress is not an effective way to learn. On the contrary,
    without planning to learn, you will not learn. So be in control of your learning
    through planning. I suggest that you plan to complete one section in one sitting.
    For most sections, you''ll be able to comfortably complete them within one hour.
    Of course, if you have more time, consider scheduling enough time to complete
    more than one section. I find that I learn best when I can dedicate big, uninterrupted
    blocks of time to a project, and I believe that this is true for most people.
    That''s because big, uninterrupted blocks of time also reduce the overall duration
    of the project, because they allow you to reduce the amount of time needed to
    change your mental context from whatever you happen to be doing to the context
    of the project or the course. It goes without saying, but I''ll say it anyway:
    plan well to learn well.


    Each project has one or two, but no more than two, learning outcomes and usually
    an equal number of practical outcomes. Do not proceed to the next project until
    you have succeeded in both understanding the learning outcomes of the current
    project and achieving the practical outcomes of the project. If you proceed without
    completing the learning and practical outcomes of a project, you''ll be hit with
    an obstacle later and you''ll have to come back and try again. Of course, it''s
    OK to peek ahead, but be mindful that previous projects will need to be completed
    first.


    OK, that''s it with the introductory set of projects. It''s now time for you to
    roll up your sleeves and start making. Are you ready? Please continue with the
    next section and project when you are.


    ## GET THE DEMO SCRIPTS FOR THE PROJECT


    Typing is boring and error prone. I''ve already done all the typing and fixed
    all the typos, so you don''t have to. You can download a single zip file that
    contains all of the scripts that I''ve demonstrated in the course. Just point
    your browser to this URL and download and expand the zip file. Feel free to test
    out those scripts and modify them.


    ## MICROPYTHON VS CPYTHON


    As you know by now, MicroPython and CPython are two different programming languages.
    MicroPython has copied CPython as faithfully as possible to create a high-level
    programming experience for microcontrollers. There are differences between the
    two languages, which I would like to summarize in the next few minutes.


    Now, the differences between MicroPython and CPython are documented in detail
    on the MicroPython website. There you can find a full list of those differences,
    as well as code examples that demonstrate them. In this project, I will mention
    only some of those differences that I believe are more relevant for the purposes
    of this course.


    So let''s begin with syntax. In CPython, you can do things like forget to put
    a space between a literal number and a keyword to form an expression, and it will
    be OK. CPython has enough flexibility to forgive mistakes like this. The same
    mistake in MicroPython, however, will generate a syntax error. MicroPython developers
    had to throw away the logic needed to deal with tab-based indentation like that
    in order to make it fit in the limited storage of the target devices.'
