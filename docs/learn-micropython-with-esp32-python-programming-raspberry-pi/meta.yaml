    \nMicroPython 文档侧重于 MicroPython 特有的主题。因为 MicroPython 的语法、语言和编程哲学源自 Python，所以你需要不时地参考\
    \ Python 文档。例如，如果你不记得如何初始化一个元组，那么你可以快速在 Python 文档中查找。你可以在 docs.python.org/3 找到它，然后点击语言参考链接。\n\
