- md: 'project. We’ll take a closer look at the boards that can use MicroPython.


    ![](img/610f3057ec812c0d14bb9f163e39f201_47_0.png)


    And let’s start with the original Pyboard. The Pyboard is the board that Damien
    George designed to run MicroPython for his Kickstarter project in 2014. The Pyboard
    contains an STM32 microcontroller chip, which is based on an ARM Cortex-M CPU.
    It has one thousand twenty-four kilobytes of flash memory and one hundred ninety-two
    kilobytes of RAM. It also features a micro SD card slot for an expanded file system,
    an accelerometer, a real-time clock, a programmable LCD, twenty-nine GPIOs, and
    two digital-to-analog converters, among other things. Then you have the Pyboard
    D. Pyboard D also uses an STM32 microcontroller, but has a different form factor
    that makes it easier to integrate into projects. It has more flash and RAM, capability
    for external flash, as well as Wi-Fi and Bluetooth connectivity, and improvements
    across the board. The Pyboard is the golden standard for what a MicroPython device
    looks like.


    ## Espressif ESP-based boards


    - ESP8266

    - ESP32

    - Powerful, low cost, full-featured.


    ![](img/610f3057ec812c0d14bb9f163e39f201_48_0.png)


    ![](img/610f3057ec812c0d14bb9f163e39f201_48_1.png)


    ![](img/610f3057ec812c0d14bb9f163e39f201_48_2.png)


    OK, then of course we have the ESP family of devices. The ESP32 and the ESP8266
    are almost fully supported by MicroPython, apart from the lack of Bluetooth support,
    for example, for the ESP32. In the previous project, ESP32-specific libraries
    are documented on the main MicroPython documentation website. Next to the Pyboard,
    the ESP32 and ESP8266 seem to have the widest range of community-contributed MicroPython
    libraries. This means that there is a good chance that you’ll be able to find
    a device driver for your favorite display or sensor. At the time of writing this,
    Bluetooth is not supported, and this is because of how much memory this implementation
    would require. Wi-Fi, however, as you probably already know, is fully functional.
    So apart from Bluetooth, almost all of the end-user features on the ESP32 can
    be used in MicroPython: timers, CPUs, ADC, Wi-Fi, I2C, SPI, sleep, and the digital
    converters. All of those work. It’s even possible to read the internal temperature
    sensor. The ESP32 is the microcontroller that I have chosen to use in this course
    because of the excellent MicroPython implementation, the richness of its hardware,
    and my familiarity with it from previous projects.


    ## RP2040 boards


    - Raspberry Pi Pico

    - Feather 2040

    - ItsyBitsy 2040

    - Tiny 2040

    - Etc.


    ![](img/610f3057ec812c0d14bb9f163e39f201_49_0.png)


