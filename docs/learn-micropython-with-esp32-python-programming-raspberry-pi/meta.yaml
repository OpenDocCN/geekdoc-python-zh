- md: '## MicroPython 概述


    MicroPython 的一个关键特性是能够使用 `uasyncio` 库在测试代码中广泛演示异步计算。其次，除了 MicroPython 标准库之外，还有无数由用户贡献并发布在
    GitHub 和 PyPI（Python 包索引，类似于 CPython）等在线仓库上的库。MicroPython 有一个简单的机制来包含外部代码程序。在本课程中，我将向你展示如何查找和使用这些外部库，它们使得将屏幕和传感器等硬件组件集成到你的
    MicroPython 项目中变得轻而易举。


    第三，MicroPython 能够访问目标设备上的一个小文件系统。这个文件系统使得存储你的 MicroPython 程序、支持库文件以及任意文件（例如用于存储传感器数据或网络和
    IoT 服务凭证的文本文件，甚至是位图图像文件）成为可能。你希望在屏幕上显示它们，例如，我将在本课程后面展示一个类似的例子。在本课程中，我准备了几个示例，演示如何在
    ESP32 上使用文件系统。


    最后，第六点，MicroPython 有一个简单的命令行 Python 工具，允许你在目标设备上运行脚本或访问文件系统。这个工具叫做 `mpremote`。在本课程中，我们不会使用这个工具，因为
    Thonny IDE 内置了对多种目标设备（包括 ESP32）的 MicroPython 支持。然而，我想提到 `mpremote`，因为它对你来说是有用的，值得了解。


    让我们现在来谈谈在各种硬件目标上运行 MicroPython。正如你可能已经知道的，MicroPython 可以在许多不同的微控制器上运行。硬件的多样性意味着并非所有
    MicroPython 代码都能在不修改的情况下跨设备工作。通常，在跨不同目标共享 MicroPython 代码时，有两点需要记住：


    1.  大多数使用 MicroPython 标准库函数和语言核心的代码无需任何修改即可工作。语言语法、保留关键字、控制结构以及来自这些标准库的函数（例如用于数学的
    `math` 模块、用于基本操作系统服务的 `os` 模块以及用于时间和日期相关功能的 `time` 模块）将在所有 MicroPython 硬件目标上工作。这一点无需担心。

    2.  另一方面，任何在特定微控制器上独特实现的功能都需要在 MicroPython 中进行独特的实现。例如，数字引脚功能在 ESP32 等设备上的实现方式与在树莓派上的实现方式不同。有些树莓派引脚能做的事情，ESP32
    可能做不到。网络接口、SPI 接口、模数转换器等功能在不同开发板上的实现方式也类似。这些差异反映在每个开发板的 MicroPython 实现中。因此，除了标准库之外，MicroPython
    还有专门为每个受支持的开发板实现的库。你应该花点时间研究你的目标设备的特定库，以便了解有哪些功能可用，哪些不可用。因此，你可以充分利用你所选择的设备的特定能力。


    还有一点，当我谈到这个时，并非所有设备功能都可以通过 MicroPython 访问。例如，在 ESP32 的 MicroPython 固件中，没有对蓝牙的支持。没有蓝牙模块，即使你知道
    ESP32 具备蓝牙功能。但是有对 Wi-Fi 的支持。这只是你无法使用 MicroPython 使用的一个功能示例。


    好的，现在让我们通过回到 MicroPython 最重要的属性来总结这个项目。MicroPython 和 Python 一样，被设计为可读性高。它读起来几乎像自然语言。在这里，你可以看到一个代码片段的示例，我从本课程后面即将出现的一个项目中提取出来的。即使你以前从未见过
    MicroPython 代码，也许你甚至从未编程过，你也应该能够理解这段代码片段大致在做什么。你可以推断出这段代码片段应该做什么。你确实需要对电子学有基本的了解。例如，像
    `pin` 和 `pin.pull_up` 这样的关键词可能没有太大意义。然而，MicroPython 的语言入门门槛很低。本质上，它比 C 或 C++ 等语言的入门门槛低得多。这是
    Python 变得如此流行以及 MicroPython 自 2014 年 Kickstarter 活动以来获得巨大支持和普及的首要原因。


    好了，关于这个项目就到这里。在本课程第一部分的接下来几个项目中，我涵盖了一些准备工作主题，包括软件和硬件要求以及如何充分利用本课程。请务必在继续第二部分（专注于
    MicroPython）之前观看这些项目。


    ## 你需要的软件


    要完成本课程中的所有项目，你需要一个编程编辑器、与你的微控制器匹配的 MicroPython 固件以及一些与各个迷你项目要求匹配的 MicroPython
    库。请花一分钟时间观看这个项目，了解更多关于所需软件的信息。


    让我们从 IDE 开始。你可以使用任何文本编辑器编写 MicroPython 和 Python 程序。你当然不需要任何花哨、昂贵或复杂的东西。Python
    程序员经常使用集成开发环境，这些环境为他们提供了丰富的工具集，包括语法高亮、调试和轻松访问 Python 控制台等功能。你可能听说过像带有 PyDev 扩展的
    Eclipse、带有各种 Python 包的 Sublime Text 以及带有 Python 语言扩展的 Atom 这样的 IDE。因为我们将使用 MicroPython，我们需要能够做的不仅仅是编写和编辑程序。我们还需要能够安装或更新目标微控制器上的
    MicroPython 固件，访问文件系统以便通过 MicroPython 层上传和下载文件，当然，还需要能够执行基本操作，如重置开发板或运行程序。所有这些都可以通过一组工具（每个工具做一件事）来完成，或者通过使用
    Thonny 来完成。Thonny 是一个免费的、开源的 Python IDE，它集成了对 MicroPython 和几种微控制器（包括 ESP32）的支持。你可以把
    Thonny 对于 MicroPython 的作用，想象成 Arduino IDE 对于 Arduino 开发板的作用。Thonny 是为教育而设计的，因此它旨在简单易用且易于学习。它只做基础功能，并且做得很好。在你的计算机上安装
    Thonny IDE 非常容易。我们将在第三部分开始使用 Thonny，但你可以随时从 thonny.org 下载最新可用版本并立即安装到你的计算机上。当然，它适用于
    Windows、Mac OS 和 Linux。


    现在让我们转向固件。要在 ESP32 上使用 MicroPython，你必须首先在微控制器上安装 MicroPython 固件。固件将启用 MicroPython
    解释器并为我们提供 REPL。每个独立的微控制器都有自己的 MicroPython 固件文件。你可以从 MicroPython 网站下载合适的固件。但要小心，你需要为你的微控制器选择合适的版本。对于同一个微控制器，可能有多个版本。对于
    ESP32，选择最新的通用但稳定的 1.x 固件。也有不稳定的版本可用，其中包含新的实验性功能，但当然它可能无法在你的微控制器上可靠地按预期工作，所以只有在你真正知道自己在做什么的情况下才使用不稳定的固件。如果你使用的是带有
    SPIRAM 的 ESP32，你可以使用稳定的、通用的 SPIRAM 版本的固件。现在不用担心做这个。我在第三部分准备了一个项目，在那里我将详细向你展示如何操作。接下来是库。'
