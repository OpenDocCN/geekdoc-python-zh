    ## 如何充分利用本项目


    我想说几点，我相信这将帮助你调整到正确的心态，使你花在本课程上的时间既有效又愉快。


    学习任何有价值的东西都需要时间。规划你的学习，并在你繁忙的日程中为这项特定活动留出时间。没有专门的时间，你会觉得必须匆忙完成项目，使体验变得紧张。在压力下学习不是一种有效的学习方式。相反，没有计划的学习，你将学不到东西。因此，通过规划来掌控你的学习。我建议你计划一次完成一个部分。对于大多数部分，你应该能在一小时内轻松完成。当然，如果你有更多时间，可以考虑安排足够的时间来完成多个部分。我发现当我能够将大块的、不被打断的时间投入到一个项目中时，我学得最好，我相信对大多数人来说都是如此。这是因为大块的、不被打断的时间也能减少项目的整体持续时间，因为它们允许你减少从你碰巧在做的任何事情切换到项目或课程上下文所需的时间。不言而喻，但我还是要说：规划好才能学好。


