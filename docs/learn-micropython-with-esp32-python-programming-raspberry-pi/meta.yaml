    在本节中，我们将向您展示几种中断正在运行程序的方法，实际上内容会比单纯中断程序稍多一些。我将向您展示如何使用软重置功能重启您的ESP32，以及如何从Thonny断开连接并断开开发板。


    LDA的阴极朝向接地，让我把它放回原位。好的。当您完全在命令行环境中操作时，假设我们现在不是在Thonny中进行，因此我们无法访问这里的文件浏览器，那么您需要熟悉的一个模块是`os`，即操作系统模块。


