    I create the `Pin` object here for the data input pin and then I’m passing that
    over to the `NeoPixel` constructor so that I can create the pixel object in my
    example. As I said, I’m using a module from Adafruit that contains eight NeoPixels
    on it. Hence the code number eight here, the second parameter of the `NeoPixel`
    constructor.


    Once you have the pixel object, you can treat it as an array and address each
    one of the NeoPixels individually. So this example here, I’m going for the first
    pixel, index zero, and I’m passing a color to it. And therefore, as I said, you
    can individually address each one of these NeoPixels. I’m actually going to do
    this in a moment on this show down here.


    Once you finish with setting the individual pixels, you call the `write` function
    and then each pixel will display the configured color. In the buffer, I’m calling
    `show` here, but of course, not doing anything because I haven’t set anything.
    So I’m just going to comment that out as well. So in this example, we just go
