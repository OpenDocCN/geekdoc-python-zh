    \ IN THONNY IDE)\n- [THONNY IDE WITH RASPBERRY PI PICO](THONNY IDE WITH RASPBERRY\
    \ PI PICO)\n- [USING THONNY IDE WITH BBC MICROBIT](USING THONNY IDE WITH BBC MICROBIT)\n\
    - [THONNY IDE ADVANCED CONFIGURATION](THONNY IDE ADVANCED CONFIGURATION)\n- [FIND\
