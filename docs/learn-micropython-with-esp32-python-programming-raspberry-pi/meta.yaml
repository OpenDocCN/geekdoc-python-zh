- md: '## DHT22 ENVIRONMENT SENSOR


    Hi and welcome to a new section in this course. In this section, you learn how
    to use a variety of sensors, typical sensors that you are likely to want to connect
    to your ESP32. We''ll start this project with a look at the DHT22, since this
    sensor is not only very popular (obviously you probably have one in your kit already),
    but also because the ability to use MicroPython firmware already comes with a
    driver for this sensor.


    So there’s nothing else that you would need to import or to install. And therefore
    it makes it a very good choice for being our first sensor. So I have connected
    this sensor on my breadboard. Let''s remove it.


    We can take a closer look. So I’ve got my sensor looking at it from the front
    where the grill is. Number one is power. I’ve connected that to 3.3 volts power.
    To the other side, you’ve got the ground pin. It goes to ground, of course. Pin
    number three, this one right here, is not connected to anything. Just leave it
    floating. And then pin number two, this pin, is the data pin that I have connected
    by this jumper wire to the chip here. GPIO 4, that I have connected it to. Just
    notice that it is not in 04, actually put in 18, so it’s fixed it on the fly right
    there. OK, so I’m going to plug the sensor back on my breadboard and have a look
    at the sketch. Now, I’ve got some information on how to connect your sensor.


    You could use DHT22 or DHT11 for this experiment. Either one will work and the
    driver for either one is available in the MicroPython firmware. I’ve got information
    about this right here. Let''s start with this. So go to this URL.


    And it will take you to the MicroPython documentation. And I’m looking at the
    ESP32 quick reference. And down here you’ll see the DHT driver. You can choose
    between the 11 or the 22. Just tell it which pin your data pin is connected to,
    which GPIO pin of the sensor it’s connected to, and then you can take a measurement
    by calling the measure function. And then you can read out temperature and humidity
    by calling the appropriately named functions. Very easy.


    So in my sketch, this looks like that. I have imported the module, importing the
    Pin and Timer functions from the machine module. This is where I create my DHT22
    object. And then as you’ve learned in previous projects, I’m using a timer. I’ve
    given it a period of 5000 milliseconds or five seconds. This is because the sensor
    is quite slow and it takes a couple of seconds to recover. Each call takes a couple
    of seconds to complete. So five seconds seems like a reasonable amount of time
    to wait before the next measurement. And every time this clock ticks or every
    time this clock expires, I call the take_measurement function right here, which
    calls the measure function. And then I’m printing out temperature and humidity
    like this. Very easy. So let’s try this out.


    Right now, I’m looking at this script as stored on my computer file system. So
    I am going to save a copy. And you can see that my device is connected, but it
    does not appear in the file list. I’m just going to click on Stop.


    To wake it up and make the connection, that’s why I got confused. I thought that
    it was connected, but it wasn''t. So here I am going to now save a copy to the
    MicroPython device.


    And I use the same name, dht.py. Let’s try this with lower case. OK.


    And play. Wait for five seconds. And the first measurement appears here. Right.
    Out of curiosity, let’s see if the plot works. So the plot doesn’t work because
    it can’t figure out the values here that are coming out. I’m just going to turn
    this off and stop the execution and stop plotting.


    And I’m just going to remove the values that save. And start again. Now the plotter
    can show the two values graphically. Of course, I’m just sending through the numbers
    instead of numbers followed by the symbol of the value. I’m going to play around
    with the plotter as well in a later project. Well, we’ll have a look at the accelerometer.
    All right, good.


    I’m going to put the symbols for the units back because that’s how I’d like to
    keep my sketch. Right. So this was quite easy, as you can see, because the driver
    is part of the firmware.


    In the next project, I''ll show you how to use the BME280 sensor, which requires
    an external driver. For this, I''ll show you how to find and install this driver
    before you can use it.


    ## BME280 ENVIRONMENT SENSOR


    But in this project, I show you how to use the BME280 with your ESP32 using MicroPython.


    Now, unlike in the previous project where we learned how to use the DHT22 using
    a driver that comes with the MicroPython firmware, the BME280 does not have an
    integrated driver, which means that you need to go out to find one that works
    with your setup and then import it into your ESP32, store it in the flash memory
    so that your script can use it. So this is the main difference between the approach
    that we used in the previous project with the DHT22 and the one that we use now
    with the BME280: we’re going to use a third-party MicroPython driver for this
    sensor.


    In most cases, this is the approach that you have to take with pretty much any
    other peripheral for your ESP32. You’ll have to use Google or some other search
    engine to look for an available driver for the device that you want to use.


    In my case, I find that awesome-micropython.com contains an excellent list of
    drivers or libraries for MicroPython. Not all of them work in my experience. But
    you’ve got a good chance that whatever hardware you want to use, you will find
    a MicroPython driver in this list. In particular for the BME280, you could look
    for sensors and scroll around.


    Here you’ll find that the BME280 has a few options. So there’s the BME280, there’s
    the BMP180, there’s a BME280 with the BME680. There’s another one here. So there’s
    a bunch of potentially working drivers here. There’s no sure way to know which
    one is actually going to work, because some of these, for example, may have been
    written in the past for previous versions of the MicroPython firmware. They may
    not be working perfectly for your current setup. So it’s a matter of just trying
    out some of those and figuring out which one eventually works.


    In my case, I found that this one works perfectly with my setup, with my ESP32,
    and I believe that it is this one here, perhaps. That check. Now that. Not this
    one either. It’s by Robert HH. Like this one here. So the name here does not really
    indicate the author or the source, but as a matter of trial and error, eventually
    you will find the one that works for you. So once you have access to the source
    code of the driver that you want to use, the process includes taking a copy of
    the driver.


    So in my case, I have determined through a lot of trial and error that bme280_float.py
    is the driver that works. You want to go and copy the raw version of this driver.
    Just copy the whole text. Then you can go and create a new file. Paste the code
    in. Then go ahead and save it on the device.'
  mdcn: '## DHT22 环境传感器


    大家好，欢迎来到本课程的新章节。在本节中，你将学习如何使用各种传感器，这些是你很可能想要连接到 ESP32 的典型传感器。我们将从 DHT22 开始这个项目，因为这款传感器不仅非常流行（显然你的套件里可能已经有一个了），而且因为
    MicroPython 固件本身已经包含了这款传感器的驱动程序。


    因此，你无需导入或安装任何其他东西。这使得它成为我们第一个传感器的绝佳选择。我已经将这个传感器连接在了我的面包板上。让我们把它取下来。


    我们可以仔细看看。从正面（有格栅的一面）看我的传感器。引脚 1 是电源。我已将其连接到 3.3 伏电源。另一侧是接地引脚。它当然连接到地。引脚 3，就是这个，没有连接任何东西。让它悬空即可。然后是引脚
    2，这个引脚是数据引脚，我通过这根跳线将其连接到这里的芯片。我将其连接到了 GPIO 4。注意，它实际上不是 04，而是接到了 18，所以我在这里即时修正了。好的，现在我要把传感器插回面包板，然后看看代码草图。现在，我有一些关于如何连接传感器的信息。


    你可以使用 DHT22 或 DHT11 进行此实验。两者都可以工作，并且 MicroPython 固件中都提供了相应的驱动程序。我这里有相关信息。我们从这里开始。请访问这个
    URL。


    它会带你到 MicroPython 文档。我正在查看 ESP32 快速参考。在这里你会看到 DHT 驱动程序。你可以选择 11 或 22。只需告诉它你的数据引脚连接到哪个引脚，即传感器的哪个
    GPIO 引脚，然后你就可以通过调用 `measure` 函数来进行测量。然后你可以通过调用相应命名的函数来读取温度和湿度。非常简单。


    在我的代码草图中，看起来像这样。我导入了模块，从 `machine` 模块导入了 `Pin` 和 `Timer` 函数。这是我创建 DHT22 对象的地方。然后，正如你在之前的项目中学到的，我使用了一个定时器。我将其周期设置为
    5000 毫秒或五秒。这是因为传感器相当慢，需要几秒钟才能恢复。每次调用都需要几秒钟才能完成。所以五秒似乎是一个合理的等待时间，然后再进行下一次测量。每次这个时钟滴答作响或每次这个时钟到期，我都会调用这里的
    `take_measurement` 函数，该函数调用 `measure` 函数。然后我像这样打印出温度和湿度。非常简单。让我们试试看。


    现在，我正在查看存储在我计算机文件系统上的这个脚本。所以我将保存一份副本。你可以看到我的设备已连接，但它没有出现在文件列表中。我只需点击“停止”。


    为了唤醒它并建立连接，这就是我刚才困惑的地方。我以为它已连接，但实际上没有。所以现在我要将一份副本保存到 MicroPython 设备。


    我使用相同的名称 `dht.py`。让我们用小写字母试试。好的。


    然后点击播放。等待五秒。第一次测量结果就出现在这里。好的。出于好奇，我们看看绘图功能是否有效。绘图功能不工作，因为它无法识别这里输出的值。我将关闭它，停止执行，并停止绘图。


    我将移除保存的值。然后重新开始。现在绘图仪可以图形化地显示这两个值。当然，我只是发送数字，而不是数字后跟值的符号。我将在后面的项目中也尝试使用绘图仪。嗯，我们将看看加速度计。好的。


    我将把单位符号加回去，因为这是我希望保持我的代码草图的方式。好的。正如你所见，这相当容易，因为驱动程序是固件的一部分。


    在下一个项目中，我将向你展示如何使用 BME280 传感器，这需要一个外部驱动程序。为此，我将向你展示如何在使用之前找到并安装这个驱动程序。


    ## BME280 环境传感器


    但在这个项目中，我将向你展示如何使用 MicroPython 将 BME280 与你的 ESP32 一起使用。


    现在，与我们之前学习如何使用 MicroPython 固件自带的驱动程序来使用 DHT22 的项目不同，BME280 没有集成驱动程序，这意味着你需要去寻找一个适用于你的设置的驱动程序，然后将其导入到你的
    ESP32 中，存储在闪存中，以便你的脚本可以使用它。所以这是我们之前在 DHT22 项目中使用的方法与现在在 BME280 项目中使用的方法的主要区别：我们将为此传感器使用第三方
    MicroPython 驱动程序。


    在大多数情况下，这是你必须为 ESP32 的几乎所有其他外设采取的方法。你将不得不使用 Google 或其他搜索引擎来寻找适用于你想要使用的设备的可用驱动程序。


    就我而言，我发现 awesome-micropython.com 包含一个优秀的 MicroPython 驱动程序或库列表。根据我的经验，并非所有驱动程序都能工作。但你有很大机会，无论你想使用什么硬件，你都会在这个列表中找到
    MicroPython 驱动程序。特别是对于 BME280，你可以查找传感器并滚动浏览。


    在这里你会发现 BME280 有几个选项。有 BME280，有 BMP180，有 BME280 和 BME680 的组合。这里还有另一个。所以这里有一堆可能工作的驱动程序。没有确切的方法知道哪一个最终会工作，因为其中一些，例如，可能是过去为
    MicroPython 固件的早期版本编写的。它们可能无法在你当前的设置中完美工作。所以这只是一个尝试其中一些并找出最终哪一个对你有效的问题。


    就我而言，我发现这个驱动程序与我的设置、我的 ESP32 完美配合，我相信可能是这个。那个勾选。现在那个。也不是这个。是 Robert HH 的。像这个。所以这里的名称并没有真正指示作者或来源，但通过反复试验，你最终会找到适合你的那个。所以一旦你获得了你想要使用的驱动程序的源代码，这个过程包括复制一份驱动程序。


    所以就我而言，我通过大量试错确定 `bme280_float.py` 是有效的驱动程序。你需要去复制这个驱动程序的原始版本。只需复制整个文本。然后你可以去创建一个新文件。粘贴代码。然后继续将其保存在设备上。'
