- md: "## Core language: functions\n\nError messages for methods may display unexpected\
    \ argument counts.\n\nuPython counts “self” as an argument.\n\nCPython doesn’t.\n\
    \n```\nCPython\n>>> a = Calculator(1) # Requires 2 arguments\nTraceback (most\
    \ recent call last):\n  File \"<pyshell>\", line 1, in <module>\nTypeError: __init__()\
    \ missing 1 required positional argument: 'num2'\n```\n\n```\nuPython\n>>> a =\
    \ Calculator(1) # Requires 2 arguments\nTraceback (most recent call last):\n \
    \ File \"<stdin>\", line 1, in <module>\nTypeError: function takes 3 positional\
    \ arguments but 2 were given\n```\n\n![](img/610f3057ec812c0d14bb9f163e39f201_40_0.png)\n\
    \nAnother example of the differences between the two languages is how the self\
    \ keyword is handled when self is used in a function in Python. It does not count\
    \ it as an additional argument, but MicroPython does. As a result, if you provide\
    \ an incorrect number of arguments to a function that contains the self keyword,\
    \ then the error message you will get in Python will be different to what you\
    \ get in MicroPython. I’ve got an example here. You can see this example. I’m\
    \ calling the same function Calculator both in Python and MicroPython, and I’m\
    \ passing a single argument. I should have passed two arguments, but I made a\
    \ mistake. It’s just a single argument here. You can see them encoding the exact\
    \ same function with the same parameters. But the messages that are coming back\
    \ to indicate the error are different. So, see, Python is telling me that I’ve\
    \ got one required argument missing, whereas MicroPython is telling me that in\
    \ total there are supposed to be three arguments and I’ve only given two. In fact,\
    \ I’ve given one. So you can see that the message that is coming through here\
    \ in Python can be a bit confusing, which can throw you off and cause you to delay\
    \ your debugging. As long as you are aware of the situation with the self keyword,\
    \ I think you’ll be able to get past issues like this.\n\n![](img/610f3057ec812c0d14bb9f163e39f201_41_0.png)\n\
    \nHere’s another subtle difference that has to do with formatting. In this particular\
    \ example of a floating point number, when you print out formatted floating point\
    \ numbers, the result may differ between MicroPython and CPython. Here, printing\
    \ out this floating number and using the same exact commands between MicroPython\
    \ and CPython (MicroPython being MicroPython), you can see that what comes out\
    \ is different in each occasion. In this case, the `g` operator, when used with\
    \ CPython, applies the exponential format to a number in the output. The `g` operator\
    \ differs between the two implementations.\n\n![](img/610f3057ec812c0d14bb9f163e39f201_41_1.png)\n\
    \nOK, next example of differences is the string. CPython, as you may know, contains\
    \ powerful string manipulation functions and not all of them are available on\
    \ MicroPython. Two examples are `startswith` and `endswith`. These allow you to\
    \ check if a string starts or ends with a specific character or string of characters.\
    \ In MicroPython, these functions only work in their basic format without the\
    \ start and end index parameters. In the example here in this slide, you can see\
    \ that the call to the `endswith` function fails when we use it with the three\
    \ parameters, but works with a single parameter. In Python, no problem, either\
    \ one will just work properly and as expected.\n\n![](img/610f3057ec812c0d14bb9f163e39f201_42_0.png)\n\
    \nAll right, next up. We’ve got JSON. And this course will use the MicroPython\
    \ JSON module to work with Internet of Things services. Unlike, say, Python and\
    \ the Python version of the JSON module, MicroPython does not throw an exception\
    \ if an object is not serializable. And this means that if your program receives\
    \ a JSON document from a Web service that is not valid, you will not be able to\
    \ deal with it gracefully using an exception handler. You will have to deal with\
    \ this manually or your program will just crash. All right, so these were just\
    \ some of the subtle differences between CPython and the MicroPython implementation\
    \ and of course, there are many more. The best place again, to learn about them\
    \ and about the changes is the Python documentation. In the next project, I’ll\
    \ show you some of the best online resources for MicroPython. And these are the\
    \ resources that you’ll want to watch so that we can access them anytime that\
    \ you work with MicroPython.\n\n## UPYTHON RESOURCES\n\nMicroPython is relatively\
    \ new. Nevertheless, continuing that tradition set by Python, it is very well\
    \ documented. In this project, we show you some of the best online, free and community\
    \ supported resources that I use. I guarantee that these resources will save you\
    \ time and help you as you are taking your first steps with MicroPython.\n\n![](img/610f3057ec812c0d14bb9f163e39f201_43_0.png)\n\
    \nMicroPython.org is the home of the MicroPython language on the Web. This is\
    \ where you can find MicroPython firmware for the supported boards, links to the\
    \ documentation, a discussion forum and a store from where you can purchase Pyboards.\
    \ I’ve prepared a separate project where I discuss supported hardware as opposed\
    \ to any hardware related questions. For now in this course we’ll be spending\
    \ a lot of time browsing the documentation and I’ll talk about that shortly. I\
    \ do encourage you to sign up for an account to the MicroPython Forum where you\
    \ can participate in relevant discussions. The forums, including the one dedicated\
    \ to the ESP32, is very busy with multiple new discussion threads almost daily.\n\
    \n![](img/610f3057ec812c0d14bb9f163e39f201_44_0.png)\n\nAs I mentioned a minute\
    \ or so ago, we’ll be spending a lot of time browsing through the MicroPython\
    \ documentation. The documentation website is hosted at docs.micropython.org.\
    \ It contains details about the Python libraries, the language and implementation.\
    \ In almost every case, the documentation provides a detailed definition of every\
    \ function and class, as well as simple examples of how to use it. The documentation\
    \ covers the Python standard libraries and MicroPython specific libraries as well\
    \ as libraries specific to the Pyboard, WiPy, ESP8266 and ESP32 boards.\n\n![](img/610f3057ec812c0d14bb9f163e39f201_44_1.png)\n\
    \nThe MicroPython documentation focuses on topics specific to MicroPython. Because\
    \ the MicroPython syntax, language and programming philosophy comes from Python,\
    \ you’ll need to refer to the Python documentation from time to time. For example,\
    \ if you don’t remember how to initiate a tuple, then you can quickly look it\
    \ up in the Python documentation. You’ll find this at docs.python.org/3 and then\
    \ click on the language reference link.\n\n![](img/610f3057ec812c0d14bb9f163e39f201_45_0.png)\n\
    \nMicroPython, as with Python, has a substantial library of packages created by\
    \ its community of programmers. A repository where you can find many of those\
    \ packages is the Python Package Index at pypi.org. The Python Package Index contains\
    \ packages designed for CPython and MicroPython. So you need to be a little careful\
    \ when you search. Often packages written in MicroPython indicate that in the\
    \ title. So, for example, a MicroPython package for the DHT12 sensor can be found\
    \ by searching for “MicroPython DHT12” to distinguish it from other packages written\
    \ for other platforms, such as a Python package that works on the Raspberry Pi\
    \ computer. Of course, even when you find a package that specifically indicates\
    \ it is written for MicroPython, you need to check that it supports your hardware\
    \ target. Not all of them do. OK.\n\n![](img/610f3057ec812c0d14bb9f163e39f201_46_0.png)\n\
    \nThen we’ve got Awesome MicroPython, and that’s an awesome name, by the way.\
    \ And that’s a curated list of libraries for MicroPython specifically. That’s\
    \ unlike the Python Package Index that we looked at a minute ago. In most cases,\
    \ when I’m hunting for a MicroPython library, I go to Awesome MicroPython first.\
    \ The curated list contains libraries grouped according to their purpose. You’ll\
    \ find libraries for IoT and connectivity, communications, displays like the OLED\
    \ and LCD, GPIO and input/output, libraries for all kinds of sensors, schedules,\
    \ storage and much more. But as with the Python Package Index, once you find a\
    \ library that looks promising, you need to take a closer look and ensure that\
    \ it will work with your microcontroller of choice. This information is not always\
    \ readily available in the library documentation. In many cases you’ll have to\
    \ download the library and test it on your device just to make sure that it is\
    \ compatible with it. OK, that’s about it with suggested resources. There is one\
    \ more project in this section before we get started with the first hands-on activity.\
    \ In the next project, I’ll talk about the microcontroller boards that are compatible\
    \ with MicroPython.\n\n## UPYTHON COMPATIBLE BOARDS\n\nWhen MicroPython was first\
    \ published in 2014, only one board supported it: the original Pyboard. A few\
    \ years later, this month of Python support for a wide range of microcontrollers,\
    \ including the ESP32, which is the one that we’ll be using in this course. In\
    \ this"
  mdcn: "## 核心语言：函数\n\n方法的错误信息可能会显示意外的参数数量。\n\nuPython 将“self”计为一个参数。\n\nCPython 则不会。\n\
    \n```\nCPython\n>>> a = Calculator(1) # Requires 2 arguments\nTraceback (most\
    \ recent call last):\n  File \"<pyshell>\", line 1, in <module>\nTypeError: __init__()\
    \ missing 1 required positional argument: 'num2'\n```\n\n```\nuPython\n>>> a =\
    \ Calculator(1) # Requires 2 arguments\nTraceback (most recent call last):\n \
    \ File \"<stdin>\", line 1, in <module>\nTypeError: function takes 3 positional\
    \ arguments but 2 were given\n```\n\n![](img/610f3057ec812c0d14bb9f163e39f201_40_0.png)\n\
    \n这两种语言的另一个差异体现在 Python 函数中使用 `self` 关键字时的处理方式。Python 不会将其计为额外的参数，但 MicroPython\
    \ 会。因此，如果你向一个包含 `self` 关键字的函数传递了错误数量的参数，那么你在 Python 和 MicroPython 中得到的错误信息将会不同。这里有一个例子。你可以看到这个例子。我在\
    \ Python 和 MicroPython 中调用了同一个函数 `Calculator`，并且只传递了一个参数。我本应传递两个参数，但我犯了个错误。这里只传递了一个参数。你可以看到它们编码了具有相同参数的完全相同的函数。但返回的指示错误的信息却不同。所以，你看，Python\
    \ 告诉我缺少一个必需的参数，而 MicroPython 告诉我总共应该有三个参数，而我只给了两个。实际上，我只给了一个。所以你可以看到，Python 中返回的这个信息可能会有点令人困惑，这可能会误导你并导致你调试延迟。只要你意识到\
    \ `self` 关键字的这种情况，我认为你就能克服这类问题。\n\n![](img/610f3057ec812c0d14bb9f163e39f201_41_0.png)\n\
    \n这里还有另一个与格式相关的细微差别。在这个浮点数的特定示例中，当你打印格式化的浮点数时，MicroPython 和 CPython 之间的结果可能不同。在这里，打印这个浮点数并在\
    \ MicroPython 和 CPython 之间使用完全相同的命令（MicroPython 就是 MicroPython），你可以看到每次输出的结果都不同。在这种情况下，`g`\
    \ 操作符在与 CPython 一起使用时，会对输出中的数字应用指数格式。`g` 操作符在这两种实现中有所不同。\n\n![](img/610f3057ec812c0d14bb9f163e39f201_41_1.png)\n\
    \n好的，下一个差异示例是字符串。如你所知，CPython 包含强大的字符串处理函数，但并非所有函数在 MicroPython 中都可用。两个例子是 `startswith`\
    \ 和 `endswith`。这些函数允许你检查一个字符串是否以特定的字符或字符序列开头或结尾。在 MicroPython 中，这些函数只能在基本格式下工作，不支持\
    \ `start` 和 `end` 索引参数。在这个幻灯片的示例中，你可以看到当我们使用三个参数调用 `endswith` 函数时会失败，但使用单个参数时则可以工作。在\
    \ Python 中，没有问题，两种方式都能正常工作并符合预期。\n\n![](img/610f3057ec812c0d14bb9f163e39f201_42_0.png)\n\
    \n好的，接下来。我们有 JSON。本课程将使用 MicroPython 的 JSON 模块来处理物联网服务。与 Python 及其 JSON 模块不同，如果对象不可序列化，MicroPython\
    \ 不会抛出异常。这意味着如果你的程序从 Web 服务接收到一个无效的 JSON 文档，你将无法使用异常处理程序优雅地处理它。你必须手动处理，否则你的程序就会崩溃。好的，这些只是\
    \ CPython 和 MicroPython 实现之间的一些细微差别，当然还有更多。了解它们和相关变化的最佳地方仍然是 Python 文档。在下一个项目中，我将向你展示一些关于\
    \ MicroPython 的最佳在线资源。这些是你想要关注的资源，以便在你使用 MicroPython 时随时可以访问它们。\n\n## UPYTHON\
