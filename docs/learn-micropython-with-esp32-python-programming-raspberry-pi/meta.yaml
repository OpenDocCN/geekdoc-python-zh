  mdcn: '所以只需双击 Operator 文件夹查看其内容。你会看到这里有三到四个可用的函数。


    首先要做的是将模块导入到你的程序中，以便使用它。最简单的方法是声明你要使用新的 math 模块，但具体来说是要导入 operator。如果你直接写 `import
    math`，那么你会导入 math 目录下的所有文件；但如果你只想使用 operator 文件中的函数，可以写 `from math import operator`，即从
    math 目录导入 operator 文件（无需扩展名）。输入后，现在我们就可以这样使用 ADD 函数了：`operator.add(2, 3)` 将这两个数字相加，结果是
    5。那 `operator.pow` 呢？2 的 3 次方是 8，以此类推。你也可以进行减法运算。它的使用方式与我刚才在屏幕上演示的完全相同，你可以用同样的方法将库文件或模块文件导入到你的
    ESP32 中。


    在结束这个项目和本节之前，我还想向你展示一下，如果你只需要其中一个文件而不需要全部文件时可以怎么做。


    即使你没有导入它们，它们可能不会占用 RAM，但会占用宝贵的闪存空间。所以也许你并不需要全部文件。


    假设你只想要 operator 函数。那么我们来清理一下，从我的设备中删除这个目录。


    然后我可以只上传我想要存储在 micro python 设备上的单个 operator 文件。


    它会出现在这里，与其他文件处于同一级别，这次不在目录内。实际上，我需要执行一次软重置来重启我的 ESP32 并清除内存。


    好的。现在从全新的状态开始，我想导入 operator，所以只需写 `import operator`。现在我就可以使用 operator 中的函数了，再次查看文件内容，就像之前一样，你可以写
    `operator.add(2, 3)`，结果会是 5。有几种方法可以做到这一点，但实际上在几乎所有情况下，你都可以使用这种方法将模块导入到你的 ESP32
    中，以便在屏幕上或通过 Python 文件使用。


    ## 用循环闪烁 LED


    大家好，欢迎来到本课程的新章节。本节是我第一次进行实践演示，向你展示如何将 micro python 与各种外设一起使用。


    当然，我们将从经典的闪烁示例开始，在本节和下一个项目中进行。在开始之前，有几件事要说明，因为如我所说，这是第一次实践演示。我想和你谈谈我是如何设置这些实验的，包括硬件方面和我们使用的软件。在硬件方面，首先，我将使用一个通用的
    ESP32 开发板。这个是每边有 19 个引脚的那种。这块板子没什么特别的，是我在 eBay 上找到的一个便宜货。它是一个通用的 ESP32，当你下载并安装固件时，在
    Thonny 中也会看到它。我目前没有使用外部闪存之类的东西。对于外设，我使用了两块板子并排放置，这样我就有了双倍的空间。你可以看到，我已经将电源轨连接到了
    3.3 伏引脚。就是这个引脚，以及接地引脚，我将这些引脚连接到了地线轨和 3.3 伏轨，并且再次用导线连接了额外的两个电源轨。此外，只要可能，我会在这里贴上一个标签，上面写着组件（比如
    LED 或后来的电位器或按钮）所连接的引脚编号。这样你只需要查看任何项目框架，就能看到特定组件连接在哪里。说了这么多，我要把我的 ESP32 连接到板子上，并连接
    USB 线。


    好的，让我们看看软件方面的情况。通常，每个实验我都会从 Thonny 的一个空白页开始，像这样，什么都没加载。你可以看到，我通常将脚本放在本地目录中，然后你可以在
    Thonny 中导航。你可以导航到你从课程的 GitHub 仓库下载脚本的目录，在大多数情况下，就像这里一样。我会打开示例脚本，


    浏览一下，熟悉它的运行方式。然后我会……有几种方法可以将脚本复制到你的 ESP32 上。一种方法是打开一个新文件，然后将本地文件的内容复制到新文件中，


    然后从这里你可以将其保存到你的 ESP32 上，我稍后会这样做。另一种方法是，你可以关闭这个，另一种方法是转到“文件”，然后选择“保存副本”。然后，只要你的
    ESP32 已连接，它就会给你一个选项，将副本保存到设备上或本地计算机文件系统上。让我们看看这些。


    你可以看到我的 ESP32 是通过 USB 连接的，但它还没有出现在 Thonny 中。所以我将点击这里的这个按钮来触发设备的连接。现在，默认情况下，当你将
    micro python 固件上传到你的 ESP32 时，唯一存在的文件是 boot.py 文件，它看起来像这样，通常什么都不做。我不会对 boot.py
    做任何操作，因为我想能够点击这里的“运行当前脚本”按钮，按 F5 来任意执行存储在我的 ESP32 上的 Python 脚本，而不是必须通过上电来触发 boot.py
    中的代码。但请记住，一旦你对脚本的运行感到满意，你总是可以将该脚本的名称更改为 boot.py，这样你只需给 ESP32 上电就能执行它了。


    好的。现在我们已经连接了 ESP32 micro python 设备，你可以在这里的 Thonny 中看到它的文件系统列表，那么我可以继续第二步，将我的脚本复制到
    ESP32 上。我将遵循复制方法。所以我将选择“保存副本”，然后选择“Python 设备”，并给它相同的名称。我会输入它，并给它与本地计算机文件系统上保存的文件相同的名称。所以这实际上是
    blink_01.py。现在它出现在这里，我将双击打开它。这是我的第二个标签页，显示的是存储在我的 ESP32 设备上的 Python 脚本。为了突出两个文件存储位置的不同，你可以看到本地文件系统（计算机文件系统）的文件名没有方括号，而
    ESP32 上的文件（存储在 ESP32 文件系统上的文件）的文件名周围有方括号。现在你可以删除本地文件系统的副本，只使用存储在 ESP32 上的那个。


    对于每个演示文件，我试图在其头部提供足够的文档。通常，头部会像这样：包含演示脚本的编号和标题、功能描述、组件列表，然后是文档。这里我们使用了 `Pin` 和
    `sleep` 函数，所以你可以在提供的链接中找到关于这两个函数的文档。以 `sleep` 函数为例，这很有趣，你点击这个链接，或者将其复制到浏览器中，它会带你到
    micro python 文档站点的相应部分。现在，这个函数很有趣，因为这是标准 Python（或 CPython）的 time 模块。它前面有 `u`，表示这是
    time 模块的 micro python 版本。完整的 CPython time 模块和 `utime` 模块之间的区别在于，`utime` 模块经过优化，可以在
    micro python 设备上更好地、更高效地工作。它缺少一些函数，在内存使用方面更高效，因此我们将使用 `utime` 而不是 `time` 来引入延迟，正如你在这里看到的，我有一个
    while 循环，我在这里设置了一个延迟，以便让 ESP32 的 LED 闪烁。类似地，对于 `Pin` GPIO 服务器，我将使用 ESP32 文档中的这部分。


    你可以在这里看到 `Pin` 和 `GPIO`。这是如何在 ESP32 上使用 micro python 使用引脚的一个例子。'
