    \nMicroPython.org 是 MicroPython 语言在网上的主页。在这里你可以找到支持的开发板的 MicroPython 固件、文档链接、讨论论坛以及可以购买\
    \ Pyboards 的商店。我准备了一个单独的项目来讨论支持的硬件，而不是任何与硬件相关的问题。目前在本课程中，我们将花大量时间浏览文档，我稍后会谈到这一点。我确实鼓励你注册一个\
