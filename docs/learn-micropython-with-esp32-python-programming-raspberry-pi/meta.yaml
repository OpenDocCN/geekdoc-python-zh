    The example in which I’m using the hardware timer is really a variation of the
    hardware interrupt in the example.


    And you ought to know how to use the hardware timer from an earlier example with
    the LED, which you can see here in this script as we have defined the timer down
    here in lines three, four and thirty five. So in this project, basically taking
    these scripts and putting them together and creating a hybrid that looks like
    this. So what’s happening here is that I’ve got a timer which has a period of
    50 milliseconds and this is a periodic timer.


    So it fires every 50 milliseconds and each time it fires, it will call the interrupt
    service routine called button_on_timer which is right here. What it does is to
    check the state of the button. And if it is pressed, then it will update these
    variables here. At the same time, we’ve got the while loop infinite loop constantly
    checking for the value stored inside the global button_pressed and button_event
    variables. And if it is true, then it will turn on the LCD and wait here for a
    second. It’s a very simple way of going about reading the state of a button, taking
    advantage of an interrupt. In terms of efficiency, I’m not quite sure which of
    these two is more efficient, it’s hard really to say. I would say that the hardware
    interrupt is perhaps more efficient from the point of view that you don’t occupy
    a hardware timer to keep firing every 50 milliseconds and calling the interrupt
    service routine. In this example here with the hardware interrupt, the ISR is
    only called when the button is actually pressed.


    But in this example here, I thought that this way of using the hardware timer
    is interesting and worthwhile dedicating a project for it. Let’s have a quick
    look at the beginning. There’s nothing new really here. We import the appropriate
    functions from the machine and time modules, define the LED, define the button
    with its pull-up resistor. We’ve got our button_pressed variable, the interrupt
    service routine with a global keyword so that the button_pressed and button_event
    variables are global and then we can make changes to those variables from inside
    the ISR. Then when the ISR is called, we check for the value of the button and
    if it is down, meaning that button is pressed so the value returned by value()
    is going to be false or zero. Remember that we’ve got this wire here which grounds
    the button value when it’s pressed and therefore GPIO four will read a low value
    or false value in the Python speak. So button is pressed. In this case, you update
    the variables. We also store the event object in the event variable. Otherwise
    button is false. And notice that I have declared the button_on_timer function
    before I create and initialize the hardware timer because I need to pass it to
    the timer via this callback parameter. And if I call the ISR before it’s actually
    declared, you’re going to get an error message by the compiler when you try to
    compile and run the script. After that, we’ve got the while True, which constantly
    checks for the value stored in the button_on_pressed variable and then it just
    turns on the LED and keeps it on for one second. Otherwise, it will turn it off.
    All right. So I’m going to make a copy of this script onto the device. I will
    call it button_timer.py. And let’s run it. OK. And it stays on for one second
    and you can see the event with it, we’re passing and printing out here, starting
    the button and it’s called event variable, which is created up here. And it’s
    really its origins are the event parameter that is passed by the timer handler
    up to the ISR. And when you print out, this is what you get. Okay, so that’s about
    it with a button, you know enough now to be able to use buttons in your sketches.
    Now there’s one more project in this section, which is the next one in which I’ll
    show you how to use a potentiometer and make use of the analog to digital converter.


    ## READ A POTENTIOMETER


    Hi, welcome to the last project in this section. In this project, I’ll show you
    how to read a value from a potentiometer and then use it to drive the PWM. Using
    a regular 10 kilo-ohm potentiometer, I have connected it to pin 34 right here.
    And I’ve got one pin going to the 3.3 volt power rail and the other one to ground.
    Let’s have a look at the sketch. There’s a couple of interesting things happening
    here.


    First of all, as you can see here in my notes, we will be using the ADC, the analog
    to digital converter, to take readings from the potentiometer, and then we’ll
    convert those readings to an appropriate PWM value. Now, the thing to remember
    is that by default, ADC produces values 12 bits, which means that the range of
    an ADC value goes from zero to four thousand and ninety five. And as you’ve seen
    in the previous section, the PWM values have 10 bits in width, so values ranging
    from zero to one thousand and twenty three. And therefore we need to do a little
    calculation to scale the ADC value into a PWM value. And this calculation is simply
    divide the range of the PWM by the range of the ADC and that will give us the
    scaling factor, which happens to be zero point twenty four, probably closer to
    zero point twenty five.


    But OK. And we’ll see what values come out later. And that means that you just
    multiply whatever comes out of the ADC by zero point twenty four and that will
    give you a new value that is within the range. I also have the documentation for
    the ADC here.


    I’m going to refer to this in a moment. And there’s also documentation for a built-in
    Python function called int() that converts floating point numbers into integers.
    Again, we need to make this conversion from floating point to integer in the sketch
    as you’ll see in a moment. Let’s have a look at the script. So we need to first
    import ADC, Pin and PWM from the machine module and sleep from the time module.
    Here I’m using sleep, which allows me to define a sleep time in seconds instead
    of milliseconds of time.sleep_ms in some of the previous scripts. In line thirty
    nine, I create the PWM object on pin twenty one. Just to make it easy for me to
    remember that this is connected to GPIO twenty one. And for the ADC I’m using
    pin thirty four as I said earlier and using the ADC constructor to create the
    object.


    Now here’s one interesting way to configure the attenuation of your ADC. The analog
    to digital converter is to use the atten() function. You can find out what the
    available attenuation levels are by having a look at the documentation, the hyperlink
    to right here.


    Let’s check it out. It is this section of the document and there is the atten()
    function and these are the available attenuations. So zero dB, two and a half
    decibel, six and eleven. And I’ve gone for the eleven decibel attenuation which
    gives me maximum input voltage up to three point six volts. So depending on what
    it is that you are connecting, you can choose the appropriate attenuation. You
    can also control the width of your analog to digital converter. I’m not doing
    that here. I’m just leaving it to its default, twelve bits. You can see you can
    go for nine, ten, eleven, twelve bits for the width.


    OK, and moving on now, I’ve got an infinite loop here, while True, start by taking
    a reading of the potentiometer, using the read() function, then I multiply it
    by the scaling factor, zero point twenty four that I calculated up here. And that
    gives me a floating point that I need to convert to an integer using the int()
    function. And I store the result in pwm_val and then in line 47 I print out those
    two numbers so I can see the original and the scaled number, then use that to
    set the duty cycle for the PWM. And then take a little nap for zero point one
