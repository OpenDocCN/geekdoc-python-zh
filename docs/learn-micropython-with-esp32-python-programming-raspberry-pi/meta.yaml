  mdcn: '## 如何调试 MicroPython 程序


    和之前的项目一样，我向你展示了如何在写入完成后自动执行脚本。


    ![](img/610f3057ec812c0d14bb9f163e39f201_126_0.png)


    我们通过在程序中添加一些代码来实现这一点。当然，如果你不希望这种情况实际发生，并且希望在通电时执行任何代码，那么请确保此文件中没有可执行代码。或者，你可以直接删除此文件，并在需要时重新创建它。


    ![](img/610f3057ec812c0d14bb9f163e39f201_126_1.png)


    所以，我现在要把它放一边。在这个项目中，也就是本节的最后一个项目，我想向你展示一些在调试和排除 MicroPython 脚本故障时非常有用的技巧。我这里有
    Blink 脚本，为了帮助我排除故障，我做的第一件事就是使用 `print` 语句。如果你来自 Arduino 世界，那么你会熟悉我们如何在那里使用 `print`
    语句来尝试弄清楚在运行时，也就是在我们的脚本或草图执行期间发生了什么。这里的原理是相似的。我再次使用 `print` 语句，在这种情况下，打印出这个特定对象发生了什么，并打印出它的值。


    ![](img/610f3057ec812c0d14bb9f163e39f201_127_0.png)


    所以当我运行当前脚本时，你可以看到它在这里是开启的，然后我得到一个值为 1，当它开启时，得到 0，依此类推。所以这告诉我 LED 对象的行为符合我的预期。


    ![](img/610f30f3057ec812c0d14bb9f163e39f201_127_1.png)


    所以控制它既简单又清晰。另一件你可以做的事情是阅读 Python 在出现问题时提供的全面且通常很有用的错误消息。Python 解释器实际上非常擅长提供有关脚本执行过程中出了什么问题的信息。首先，看几个例子。


    ![](img/610f3057ec812c0d14bb9f163e39f201_128_0.png)


    假设我们试图访问一个不存在的引脚。所以这只是一个无心之失。将脚本发送到第 2 行，你会看到一个相当清晰的错误行。我们试图对一个无效的引脚执行某些操作。所以这很容易解决，对吧？你必须查看引脚参数，并弄清楚，你知道，哪些引脚对
    ESP32 是有效的。如果你手边有引脚图，那么你就知道没有 211 号引脚，你可能指的是 21 号，也就是我的 LED 连接的地方。其他参数也是如此。


    ![](img/610f3057ec812c0d14bb9f163e39f201_129_0.png)


    在这个例子中是引脚参数。假设我们只有 `Pin.IN` 和 `Pin.OUT` 作为我们试图创建的引脚对象类型的常量。如果你在这里有一个拼写错误，同样，这将生成一个相当准确的错误消息，说你在第
    4 行试图创建一个不存在的类型的对象。`Pin`，不存在，所以你可以继续修复它。


    ![](img/610f3057ec812c0d14bb9f163e39f201_129_1.png)


    任何拼写错误通常都会生成一个准确的消息，或者你可以看到在这种情况下，它说第 13 行，这不是很准确。显然在脚本的末尾，它将错误指向脚本的末尾，但这里的名称错误更合适。它为你提供了更多线索来找出问题所在。所以最初，我们会看第
    13 行。你不会在那里发现任何奇怪的东西。你查看错误消息的其余部分，它会引导你找到问题所在。所以你可能需要仔细评估整个错误消息，以便追溯，直到你能找出问题所在。所以对于像拼写错误这样的事情，通常从解释器返回的错误消息具有非常好的准确性。


    ![](img/610f3057ec812c0d14bb9f163e39f201_130_0.png)


