    ADC and your potentiometer using MicroPython.'
  mdcn: '此外，还有如何使用硬件中断，如本例所示。


    我使用硬件定时器的示例实际上是前面硬件中断示例的一个变体。


    你应该从之前关于LED的示例中了解如何使用硬件定时器，你可以在本脚本中看到，我们在第3、4和35行定义了定时器。因此，在这个项目中，基本上是将这些脚本组合在一起，创建一个如图所示的混合体。这里发生的事情是，我有一个周期为50毫秒的定时器，这是一个周期性定时器。


    所以它每50毫秒触发一次，每次触发时，它都会调用名为`button_on_timer`的中断服务例程，就在这里。它的作用是检查按钮的状态。如果按钮被按下，它就会更新这里的这些变量。同时，我们有一个`while`循环，即无限循环，不断检查存储在全局变量`button_pressed`和`button_event`中的值。如果为真，它就会打开LCD并在这里等待一秒钟。这是一种非常简单的读取按钮状态的方法，利用了中断。在效率方面，我不太确定这两种方法中哪一种更高效，真的很难说。我认为硬件中断可能更高效，从某种意义上说，你不需要占用一个硬件定时器来每50毫秒持续触发并调用中断服务例程。在这个使用硬件中断的示例中，ISR仅在按钮实际被按下时才被调用。


    但在这个示例中，我认为这种使用硬件定时器的方式很有趣，值得专门用一个项目来展示。让我们快速看一下开头。这里没有什么新内容。我们从`machine`和`time`模块导入相应的函数，定义LED，定义带有上拉电阻的按钮。我们有`button_pressed`变量，中断服务例程使用`global`关键字，以便`button_pressed`和`button_event`变量是全局的，这样我们就可以在ISR内部修改这些变量。然后当ISR被调用时，我们检查按钮的值，如果它被按下，意味着按钮被按下，那么`value()`返回的值将是`False`或零。记住，我们这里有这根线，当按钮被按下时，它会将按钮值接地，因此GPIO
    4将读取到一个低值或Python中的`False`值。所以按钮被按下。在这种情况下，你更新变量。我们还将事件对象存储在`event`变量中。否则按钮为`False`。注意，我在创建和初始化硬件定时器之前声明了`button_on_timer`函数，因为我需要通过这个`callback`参数将其传递给定时器。如果我在实际声明之前调用ISR，当你尝试编译和运行脚本时，编译器会给你一条错误信息。之后，我们有`while
    True`，它不断检查存储在`button_on_pressed`变量中的值，然后它就打开LED并保持一秒钟。否则，它会将其关闭。好的。我将把这个脚本复制到设备上。我将把它命名为`button_timer.py`。让我们运行它。好的。它保持亮了一秒钟，你可以看到事件，我们在这里传递并打印出来，启动按钮，它被称为`event`变量，是在这里创建的。它的真正来源是定时器处理程序传递给ISR的`event`参数。当你打印出来时，你会得到这个。好的，关于按钮就讲到这里，你现在有足够的知识可以在你的草图中使用按钮了。本节还有一个项目，也就是下一个，我将向你展示如何使用电位器并利用模数转换器。


    ## 读取电位器


    嗨，欢迎来到本节的最后一个项目。在这个项目中，我将向你展示如何从电位器读取值，然后用它来驱动PWM。使用一个普通的10千欧电位器，我将其连接到这里的引脚34。我有一个引脚连接到3.3伏电源轨，另一个接地。让我们看看草图。这里有几个有趣的事情发生。


    首先，正如你在我的笔记中看到的，我们将使用ADC，即模数转换器，从电位器读取读数，然后我们将这些读数转换为适当的PWM值。现在，需要记住的是，默认情况下，ADC产生12位的值，这意味着ADC值的范围从零到四千零九十五。正如你在上一节中看到的，PWM值的宽度为10位，因此值范围从零到一千零二十三。因此，我们需要进行一些计算，将ADC值缩放为PWM值。这个计算很简单，就是用PWM的范围除以ADC的范围，这将给我们缩放因子，恰好是零点二十四，可能更接近零点二十五。


    但是好的。我们稍后会看到输出的值是多少。这意味着你只需将ADC输出的任何值乘以零点二十四，就会得到一个在范围内的新值。我这里也有ADC的文档。


    我稍后会参考这个。还有一个内置Python函数`int()`的文档，它将浮点数转换为整数。同样，我们将在草图中进行从浮点到整数的转换，你稍后会看到。让我们看看脚本。所以我们需要首先从`machine`模块导入`ADC`、`Pin`和`PWM`，从`time`模块导入`sleep`。这里我使用`sleep`，它允许我以秒为单位定义睡眠时间，而不是之前一些脚本中的`time.sleep_ms`的毫秒。在第39行，我在引脚21上创建PWM对象。只是为了让我更容易记住这是连接到GPIO
    21。对于ADC，我使用引脚34，正如我之前所说，并使用ADC构造函数创建对象。


    现在这里有一个配置ADC衰减的有趣方法。模数转换器是使用`atten()`函数。你可以通过查看文档来了解可用的衰减级别，这里的超链接。


    让我们看看它。这是文档的这一部分，有`atten()`函数，这些是可用的衰减。所以是0分贝、2.5分贝、6分贝和11分贝。我选择了11分贝的衰减，这给了我最大3.6伏的输入电压。因此，根据你连接的是什么，你可以选择适当的衰减。你还可以控制模数转换器的宽度。我这里没有这样做。我只是将其保留为默认值，12位。你可以看到你可以选择9、10、11、12位作为宽度。


    好的，现在继续，我这里有一个无限循环，`while True`，首先使用`read()`函数读取电位器的值，然后乘以我在这里计算的缩放因子零点二十四。这给了我一个浮点数，我需要使用`int()`函数将其转换为整数。我将结果存储在`pwm_val`中，然后在第47行打印出这两个数字，这样我就可以看到原始值和缩放后的数字，然后用它来设置PWM的占空比。然后小睡零点一秒，好吗？让我们试试这个，我将把脚本的副本放到设备上。我将把它命名为`pot_pwm.py`。是的，但是这个脚本的一个早期版本，双击它，你打开它，你能去掉另外两个吗？这确实让我困惑，我到底在上传哪个脚本到我的ESP32。这是我想要上传的那个。所以我们开始吧。你可以看到电位器的当前值。让我们朝一个方向移动它。然后你看到LED在移动，它变得越来越暗，它熄灭了，让我们走向另一个极端。尝试在单一角度下做到这一点，很简单，好的，在这种情况下上升，这是最大值，你可以看到电位器在四千零九十五时是九百八十二，这意味着也许我可以将这个因子增加到这么多，这将允许我在不超过的情况下达到完整的PWM周期范围。所以保存并播放。所以一千零二十三点二十五的缩放因子，效果完美。好的。这就是你如何使用ADC和你的电位器，使用MicroPython。'
