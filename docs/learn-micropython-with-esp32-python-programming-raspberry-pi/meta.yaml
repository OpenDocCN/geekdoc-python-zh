  mdcn: '## 使用硬件中断读取按钮


    欢迎回来。在上一个项目中，你学习了如何以最简单的方式读取按钮的状态。


    如你所见，我们这里只使用了一个 `while true` 无限循环。在循环中，我们只是读取按钮的状态，这相当费力，然后根据状态执行相应操作。当然，这种方法的问题在于，这里有一个无限循环，程序的执行都在其中。这不是一种高效利用硬件的方式。


    在这个项目中，我想向你展示一种更高效的替代方案，它允许我们使用硬件中断来读取按钮的状态。所以，在这一行，第58行，我设置了一个IRQ（中断请求）在按钮引脚上，并以一种非常高效的方式进行了配置。我在这里告诉触发器的是按钮产生的信号的下降沿。因此，当你按下按钮时，引脚上的电压从高电平下降到低电平，这就是被检测到并触发此中断的IRQ下降沿。当检测到这个下降沿时，中断会调用这里的这个例程，一个函数
    `button_pressed_ISR`，即中断服务例程或处理程序，它将程序分支到这个函数内部，并再次执行相应操作。我们稍后会讲到这个，以便显示LED点亮。当我按下按钮时，我这里仍然使用了一个
    `while` 循环。这只是演示中断服务例程与程序其他部分之间交互的最简单方式。同时，我也在演示中断服务例程与程序其他部分使用全局变量进行通信的能力。


    现在让我们来看一些细节。你可以看到在上面的第36行，我从 `machine` 模块导入了 `Pin` 函数、`disable_irq` 和 `enable_irq`
    函数。同样，从 `time` 模块导入了 `sleep`。我像往常一样开始创建对象，然后是引脚对象，这和我们在上一个示例中所做的完全一样。这里也是一样，没有任何变化。然后我声明了几个变量。这是
    `button_pressed` 变量。它允许IRQ例程，也就是这里记录的ISR（中断服务例程）或处理程序，与我程序的其他部分进行通信。因此，当按钮被按下时，我更新这个变量。你可以看到它在这里被更新，然后在这里被用来确定LED应该打开还是关闭。我还有一个整数，或者说数值变量，用来跟踪按钮在重置前被按下的次数。所以你也可以尝试调整这些变量。现在，在IRQ将调用的例程定义中，你可以看到它需要一个参数。这是导致IRQ的对象，它由IRQ例程传递到这里。我在这里使用这个对象来打印一些关于是什么导致了IRQ的信息。你看，我获取
    `pin` 并确切知道它是什么，然后将其传递给 `button_pin` 全局变量，该变量随后在这里打印出来，这样我就可以获得关于导致IRQ的对象的一些信息。这里发生的其他一些有趣的事情是，首先，我调用了
    `disable_irq` 例程，你可能猜到了，它将禁用进一步的IRQ。所以当我按下按钮时，发生的第一件事就是禁用IRQ。当ISR函数忙于处理时，任何进一步的按钮按下都将被忽略，直到我在ISR的最后重新启用IRQ。所以当我完成处理现有IRQ所需的操作后，我会重新启用它，以便ESP32可以检测到下一次按钮按下。这里还有一些其他有趣的事情，对你来说可能有点不寻常，那就是我在这里使用了
    `global` 关键字，所以你可以看到发生了什么，当然，对于像 `button_pressed` 这样的变量，我已经在程序的开头声明了它。所以你会期望这个变量已经是全局的，因为它已经在程序的开头声明了，但事实上，它不是。在使用
    `global` 关键字将其转换为我可以修改的变量之前，我无法在这个上下文中对这个变量进行任何更改。我这里有一个链接，提供了更多关于此的信息。如果你好奇这是如何工作的，如果你不使用这个关键字，那么当你尝试修改存储在此变量中的值时，你会得到一个语法错误，或者在第53行得到一个错误消息。所以对程序不同部分中使用的其他两个变量做同样的事情。`button_pin`
    和 `press_count`，你可以看到所有这些变量都在上面声明了。我仍然需要使用 `global` 关键字才能对它们进行更改。好的，然后我只是将导致IRQ的对象存储到
    `button_pressed` 中，将对象存储到 `button_pin` 中，然后将按下计数器增加一。然后我在这里关闭函数。你有一个无限循环，类似于Arduino中的
    `loop` 函数，它只是不断地循环执行其中的任何代码。在这种情况下，它不断地检查存储在 `button_pressed` 变量中的值。当它为真时，你会进入内部，将其改为假，打开LED，打印两条消息，将计数器清零，重置计数器，并让LED保持亮半秒钟。如果它不为真，那么它会关闭LED，就是这样。所以我要将这个程序的副本保存到我的电脑上，然后按Control+C停止执行。好的。然后再次尝试，保存一个Python副本，你可以称之为。我倾向于称之为
    `interrupt`。为什么？好的，我关闭这两个，不是那个，我需要打开程序的中断版本，就是这个。现在我已经在目标MicroPython设备上打开了程序，我将运行它。然后。


    按下按钮，它工作了。也保持亮半秒钟。好的。这里需要注意的一点是，在以“Button pressed”开头的消息中，就在这里，你可以看到 `button_pin`
    的输出，也就是这个变量，它包含了导致中断的对象，它显示为 `pin 15`。如果你有来自不同引脚的多个中断，那么你总是可以区分是哪个按钮或哪个中断触发了你的中断服务例程。好的，关于使用硬件中断的按钮示例就到这里。我想在下一个项目中向你展示同一个示例的另一个变体，这次涉及使用定时器中断。让我们来看看。


    ## 使用定时器中断读取按钮


    就像在这个示例中一样，我将向你展示如何使用硬件定时器读取按钮的状态。提醒一下，在同一个练习的前两个变体中，你学习了如何使用无限循环读取按钮的状态，就像这个示例一样。'
