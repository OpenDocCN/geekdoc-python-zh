- md: '## MicroPython for product development!


    **PRO**

    - productivity

    - traceability

    - testability

    - portability

    - licensing

    - support


    **CON**

    - increased hardware resources

    - lack of developer skills regarding scripting languages


    So as I know, this is the maker, uh, track. But when you think about it making
    a product or really designing something for that’s be used in a couple of thousand
    times, so MicroPython that can help you with the product development in productivity
    traceability, because the, the code and the different firmware releases are very,
    like, it’s very well maintained in the open so people can work together, fix problems,
    and the community can, can profit from that. It makes the test that testability
    easier as I’ve shown you before, there are more than 200 different developers
    involved and they come all from different areas and sometimes you get these ideas
    from people you have not even thought about because that’s the main thing they
    do. And so that’s really fantastic to see how everybody makes each makes each
    other better. Then the license of MicroPython is the MIT license, which is very
    flexible too. You can use MicroPython, but you don’t have to have everything open
    source. You can build on it and close up the thing that makes your product that
    generates the profit for your company. For example, and yeah, as I said, as the
    support in general, the Python community is quite open and it’s the MicroPython
    as well. The disadvantages, again, you might have increased hardware resources.
    If it can use a smaller microcontroller, which is obviously cheaper, but it’s
    too small to fit MicroPython and you cannot use it. This needs to be like, you
    always have to look at the time you need to pay for your. That’s the actual hardware
    and software development compared to the price of the hardware you’re using in
    your, in your product. And sometimes it isn’t this area, still people don’t use
    Python, they still use C or even assembler or the low level languages for, for
    designing and programming with microcontrollers.


    ## WHAT IS MICROPYTHON AND WHY SHOULD YOU CARE


    Hi and welcome back. In this project, I’ll talk about MicroPython and I talk about
    its written to exist, how it relates to Python and about some of its most important
    characteristics.


    Around 2014, Damien George published a new programming language for microcontrollers
    called MicroPython. This publication was a successful completion of an ambitious
    Kickstarter project that began in 2013. At the time, microcontroller programming
    was dominated by the C language. If you are familiar with that, then you know
    what it looks like. On a microcontroller like the C is not very difficult to learn,
    however, things do get more complicated as programs get bigger. As microcontrollers
    started becoming more and more powerful, more people started being interested
    in them and to be programming them. Many of them were first time programmers and
    this included people in all age brackets. So Damien wanted to create a language
    that would work on a microcontroller that would be much easier to learn and use
    than C. He didn’t want to reinvent the wheel, so he chose Python as his prototype.
    His challenge then was to create a language that can mimic Python, but that can
    also run on the bare metal of a microcontroller, not without an operating system.
    And that’s how MicroPython came about. And here’s a description of the language
    from the MicroPython website. And the emphasis in both characters is mine. So
    MicroPython is a lean and efficient implementation of the Python three programming
    language that includes a small subset of the Python standard library and is optimized
    to run on microcontrollers and in constrained environments.


    Now, because MicroPython contains the word Python, it is easy to become confused
    and think that MicroPython is simply a smaller version of Python. It is the same
    confusion that I constantly see between Java and JavaScript, while Python and
    MicroPython have a similar name. They are totally different languages with a different
    set of goals and implementation. I talk more about the differences between Python
    and MicroPython in a later project, but for now I just want to make sure that
    you are not confused by the similarity in the name.


    What MicroPython has taken from Python is the language architecture, its programming
    philosophy for code readability and a huge pool of programmers that already know
    how to use Python. Pythonistas can quickly become MicroPythonistas and write programs
    for microcontrollers. According to the TIOBE popularity of programming language
    index, Python is the most popular programming language in the world with a 30
    percent share. This index is calculated based on the amount of searching that
    is done on Google for programming, language, tutorials and resources. And as a
    comparison, it’s interesting to see that C/C++ that is used by the boards ranks
    around fifth place in this index. This popularity translates to a Python universe
    that is filled with all the documentation, libraries and community support you
    ever need. MicroPython is as easy as Python to learn, and it follows Python tradition
    for excellent development tools and documentation. In this course you see me constantly
    browsing through the Python code. The documentation as well as many of the excellent
    libraries we’ll be using. In terms of tools, you have many choices. In this course,
    in particular, we’ll be using Thonny, but you can also choose tools such as uPyCraft,
    and the new Mu. What I really like about Thonny is that it’s a full Python IDE
    on its own merit with excellent debugging tools, but also that fully supports
    MicroPython on the ESP32, as well as other target boards like the Raspberry Pi
    Pico and the BBC micro:bit. Another big advantage of the MicroPython language
    is that once you learn it, you can use your skills across multiple hardware targets.
    At the time I’m recording this project, MicroPython has support for the original
    mainboard version one and the Pyboard, as well as third party boards such as the
    STM32 NUCLEO and Discovery Boards, The Pyboard, the Raspberry Pi Pico, the WiPy,
    the ESP8266 and ESP32, the TinyPICO and the BBC micro:bit I mentioned earlier
    and this was just a partial list.


    ## MicroPython features


    1. Aims to implement the Python 3.4 (CPython) standard for language and syntax.

    2. MicroPython standard library implements a subset of the CPython standard library
    (marked with the "u" prefix).

    3. The REPL interactive prompt (read-eval-print-loop) is available in MicroPython.

    4. Easy to install and use third-party code packages. Many available on PyPI.

    5. Support for on-device filesystems.

    6. Simple command line tool to interact with a MicroPython device: pyboard.py


    Now let’s take a quick tour of MicroPython’s most important features. First and
    most important for anyone new to this language is that MicroPython aims to implement
    the Python 3.4 (with a little bit of 3.5) standard for language and syntax. This
    simply means that anyone who already programs in Python 3 will be able to start
    programming in MicroPython immediately. Python 3 reserved keywords, operators,
    functions and the infamous white space incantation is faithfully implemented in
    MicroPython. Second, because MicroPython targets embedded computers and microcontrollers,
    it is not possible to implement the Python standard library with all of its modules
    and methods. There’s simply not enough storage on IoT devices for that. Therefore,
    MicroPython implements a selected subset of CPython standard library, and even
    that is implemented with emphasis in efficiency. MicroPython versions of Python
    libraries have a name with the `u` or lowercase `u` the letter prefix. So that
    allows you to distinguish which is which. Whenever you see a MicroPython library
    with a `u` letter prefix, know that it’s a more efficient version or optimized
    version of the original CPython library implemented for MicroPython devices. MicroPython
    has an interactive interpretive mode, also known as REPL. REPL stands for Read-Eval-Print
    Loop. Think of it as a command line for Python. It can use this command line to
    issue Python instructions or even code blocks. The REPL will evaluate the Python
    code immediately, and the MicroPython REPL is fully featured with the intent of
    the completion ability to interrupt the running program with Ctrl-C to invoke
    a soft reset and so on. There’s also a paste mode, and you can also use the underscore
    variable that stores the output of the previous.'
  mdcn: '## MicroPython 用于产品开发！


    **优点**

    - 生产力

    - 可追溯性

    - 可测试性

    - 可移植性

    - 许可证

    - 支持


    **缺点**

    - 增加硬件资源需求

    - 开发者缺乏脚本语言相关技能


    据我所知，这是创客赛道。但仔细想想，当你在制造产品，或者真正设计一个将被使用成千上万次的东西时，MicroPython 可以在生产力、可追溯性方面帮助你进行产品开发，因为代码和不同的固件版本在开源社区中维护得非常好，人们可以一起协作、修复问题，社区也能从中受益。正如我之前展示的，它使测试更容易，有超过
    200 位不同的开发者参与其中，他们来自不同领域，有时你会从意想不到的人那里获得灵感，因为这正是他们擅长的事情。看到大家如何互相促进、共同进步，真的非常棒。MicroPython
    的许可证是 MIT 许可证，也非常灵活。你可以使用 MicroPython，但不必将所有东西都开源。你可以在此基础上构建，并将为公司产生利润的产品部分闭源。例如，总的来说，Python
    社区非常开放，MicroPython 也是如此。缺点方面，你可能需要增加硬件资源。如果它能使用更小的微控制器，那显然更便宜，但可能太小而无法运行 MicroPython，你就无法使用它。这需要权衡，你必须考虑为实际硬件和软件开发所支付的时间成本，与产品中使用的硬件价格相比。有时在这个领域，人们仍然不使用
    Python，他们仍然使用 C 甚至汇编或底层语言来设计和编程微控制器。


    ## 什么是 MicroPython 以及为什么你应该关注它


    大家好，欢迎回来。在这个项目中，我将谈论 MicroPython，谈谈它的存在意义，它与 Python 的关系，以及它的一些最重要的特性。


    大约在 2014 年，Damien George 发布了一种用于微控制器的新编程语言，名为 MicroPython。这次发布是一个雄心勃勃的 Kickstarter
    项目的成功完成，该项目始于 2013 年。当时，微控制器编程主要由 C 语言主导。如果你熟悉 C 语言，那么你知道它是什么样子的。在微控制器上使用 C 语言并不难学，然而，随着程序变得越来越大，事情确实会变得更复杂。随着微控制器变得越来越强大，越来越多的人开始对它们感兴趣并对其进行编程。其中许多人是第一次编程，这包括各个年龄段的人。因此，Damien
    想创造一种能在微控制器上运行的语言，它比 C 语言更容易学习和使用。他不想重新发明轮子，所以他选择了 Python 作为原型。他当时的挑战是创造一种能够模拟
    Python，但也能在微控制器的裸金属上运行的语言，而不是在操作系统之上。这就是 MicroPython 的由来。以下是 MicroPython 网站上对该语言的描述。其中的强调部分是我加的。MicroPython
    是 Python 3 编程语言的一个精简高效的实现，包含 Python 标准库的一个小子集，并针对在微控制器和受限环境中运行进行了优化。


    现在，因为 MicroPython 包含 "Python" 这个词，很容易混淆，认为 MicroPython 只是 Python 的一个更小版本。这种混淆就像我经常看到的
    Java 和 JavaScript 之间的混淆一样，尽管 Python 和 MicroPython 名字相似，但它们是完全不同的语言，有着不同的目标和实现。我将在后面的项目中更详细地讨论
    Python 和 MicroPython 之间的区别，但现在我只想确保你不会因为名字的相似性而感到困惑。


    MicroPython 从 Python 借鉴的是其语言架构、注重代码可读性的编程哲学，以及庞大的、已经知道如何使用 Python 的程序员群体。Python
    开发者可以很快成为 MicroPython 开发者，并为微控制器编写程序。根据 TIOBE 编程语言流行度指数，Python 是世界上最流行的编程语言，占有
    30% 的份额。该指数是基于 Google 上对编程语言、教程和资源的搜索量计算的。作为对比，有趣的是，开发板上使用的 C/C++ 在该指数中排名大约第五。这种流行度转化为一个充满你所需的所有文档、库和社区支持的
    Python 生态系统。MicroPython 和 Python 一样容易学习，并且遵循 Python 在优秀开发工具和文档方面的传统。在本课程中，你会看到我不断浏览
    Python 代码、文档以及我们将要使用的许多优秀库。在工具方面，你有很多选择。特别是在本课程中，我们将使用 Thonny，但你也可以选择 uPyCraft
    和新的 Mu 等工具。我真正喜欢 Thonny 的地方在于，它本身就是一个功能齐全的 Python IDE，拥有出色的调试工具，同时也完全支持 ESP32
    上的 MicroPython，以及其他目标板，如 Raspberry Pi Pico 和 BBC micro:bit。MicroPython 语言的另一个巨大优势是，一旦你学会了它，你就可以将你的技能应用于多种硬件目标。在我录制这个项目时，MicroPython
    支持最初的主板版本一和 Pyboard，以及第三方开发板，如 STM32 NUCLEO 和 Discovery 开发板、Pyboard、Raspberry
    Pi Pico、WiPy、ESP8266 和 ESP32、TinyPICO 以及我之前提到的 BBC micro:bit，而这还只是部分列表。


    ## MicroPython 特性


    1. 旨在实现 Python 3.4 (CPython) 的语言和语法标准。

    2. MicroPython 标准库实现了 CPython 标准库的一个子集（以 "u" 前缀标记）。

    3. MicroPython 中提供 REPL 交互式提示符（读取-求值-打印循环）。

    4. 易于安装和使用第三方代码包。许多包可在 PyPI 上找到。

    5. 支持设备上的文件系统。

    6. 简单的命令行工具，用于与 MicroPython 设备交互：pyboard.py


    现在让我们快速浏览一下 MicroPython 最重要的特性。首先，对于任何这门语言的新手来说最重要的是，MicroPython 旨在实现 Python 3.4（以及部分
    3.5）的语言和语法标准。这简单意味着任何已经会用 Python 3 编程的人都可以立即开始用 MicroPython 编程。Python 3 的保留关键字、运算符、函数以及那令人头疼的空白符规则都在
    MicroPython 中得到了忠实的实现。其次，由于 MicroPython 面向嵌入式计算机和微控制器，不可能实现包含所有模块和方法的 Python 标准库。物联网设备上根本没有足够的存储空间来容纳它。因此，MicroPython
    实现了 CPython 标准库的一个精选子集，而且即使是这个子集，也是以效率为重点来实现的。Python 库的 MicroPython 版本名称带有 `u`
    或小写 `u` 字母前缀。这样你就可以区分它们。每当你看到一个带有 `u` 字母前缀的 MicroPython 库时，要知道它是为 MicroPython
    设备实现的原始 CPython 库的更高效或优化版本。MicroPython 有一个交互式解释模式，也称为 REPL。REPL 代表 Read-Eval-Print
    Loop（读取-求值-打印循环）。可以把它想象成 Python 的命令行。你可以使用这个命令行来发出 Python 指令甚至代码块。REPL 会立即求值 Python
    代码，MicroPython REPL 功能齐全，具有补全能力、可以使用 Ctrl-C 中断正在运行的程序以调用软重置等等。还有一个粘贴模式，你也可以使用下划线变量来存储上一次的输出。'
