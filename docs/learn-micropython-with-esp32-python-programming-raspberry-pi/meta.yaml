    ## 获取项目的演示脚本


    打字很无聊且容易出错。我已经完成了所有的打字并修正了所有的拼写错误，所以你不必这样做。你可以下载一个包含我在课程中演示的所有脚本的zip文件。只需将你的浏览器指向此URL，下载并解压zip文件。随意测试这些脚本并修改它们。


    ## MICROPYTHON 与 CPYTHON


    正如你现在所知，MicroPython和CPython是两种不同的编程语言。MicroPython尽可能忠实地复制了CPython，为微控制器创建了高级编程体验。这两种语言之间存在差异，我想在接下来的几分钟内总结一下。


    现在，MicroPython和CPython之间的差异在MicroPython网站上有详细记录。在那里你可以找到这些差异的完整列表，以及演示它们的代码示例。在本项目中，我将只提及我认为与本课程目的更相关的一些差异。


    那么，让我们从语法开始。在CPython中，你可以做这样的事情：忘记在字面数字和关键字之间加空格来形成一个表达式，这没问题。CPython有足够的灵活性来原谅这样的错误。然而，在MicroPython中，同样的错误会产生语法错误。MicroPython开发人员不得不丢弃处理基于制表符缩进的逻辑，以便使其适应目标设备有限的存储空间。'
