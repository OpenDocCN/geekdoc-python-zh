    device. I’ll call it pot_pwm.py. Yes, but an earlier version of this script, to
    double click on it, you open it up, can you get rid of the other two? So that
    does confuse me as to which script I’m uploading to my ESP32. And this is the
    one that I want to upload. So let’s do it. You go right, you can see the current
    values for the potentiometer. Let’s move it in one direction. Then you saw moving
    the LED, it’s becoming fainter, it goes off, let’s go to the other extreme. Trying
    to do this in a single angle, simple, all right, going up in this case, and that’s
    the maximum, you can see that the potentiometer is at four thousand ninety five
    is nine hundred and eighty two, which means maybe I can increase this factor by
    maybe as much and that will allow me to go for the full PWM cycle extent without
    going over it. So save and play. So one thousand twenty three point twenty five
