  md: '# What is MicroPython?


    +   - **lean** and **efficient** rewrite of **Python**

    - Includes complete parser, compiler, virtual machine, runtime system and garbage
    collector

    - **byte code** or **native machine code**

    - Supports **inline assembler**

    - **Compilation on the chip**

    - **REPL** (read, evaluate, print – loop)


    ![](img/610f3057ec812c0d14bb9f163e39f201_5_0.png)


    So micro Piven is a fully reimplementation of Python and it leads to be lean and
    efficient to run on a microcontroller because you couldn’t be just using Python
    as you know, from your desktop computer. It needs. it was rewritten from sketch
    to fit on the microcontroller. It has a virtual machine and a runtime system with
    garbage collection and everything you need to make it really efficient. There’s
    bike code or native machine code you can use with. The micropython and is also
    in support for Atlanta smaller. when you have a project where you like to use
    Python, because you want to get it up easy, but you need to make it more efficient
    in some, your tiny bits. There’s also Atlanta San Francisco Portland. The compilation
    happens on the chip. it’s not compile your program. You write as the compile on
    your desktop sheen, it’s complete compact on the hardware use. as late as I have
