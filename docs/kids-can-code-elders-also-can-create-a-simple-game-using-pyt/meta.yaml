    \n## 第二部分：新游戏：新冠战士\n\n我们将使用“pygame”来编码“新冠战士”游戏。使用“pygame”编码游戏时，你可以使用“IDLE Python”、“PyCharm”或任何其他环境。你可以从“python.org”网站下载“IDLE\
    \ Python”。在我编写本书时，可用的最新版本是 Python 3.9。\n\n![](img/46a01ff08700d90f9b7f7df8d7f949e6_47_0.png)\n\
    \n“pygame”包含许多模块，有助于在 Python 中进行游戏编程。如果尚未安装，你将无法使用它进行编码。如果你使用的是“IDLE Python”，可以在“pip”的帮助下安装它。“pip”是一个标准的包管理系统，用于安装用\
