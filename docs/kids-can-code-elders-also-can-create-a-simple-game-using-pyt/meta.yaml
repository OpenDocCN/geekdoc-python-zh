    \n图片显示出来了，但部分蓝色屏幕没有被覆盖。图片screen-a.png的尺寸只有800X600像素，而我们的屏幕是900x700像素。假设我们的屏幕尺寸是1400x700像素。那么，这就会成为一个真正的问题。我们必须处理这个问题，以便图像能够覆盖整个屏幕。为此，我们将在image.load()命令中使用‘transform\
