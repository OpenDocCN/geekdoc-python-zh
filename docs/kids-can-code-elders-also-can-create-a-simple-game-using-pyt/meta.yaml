  - '[PAGE 40]


    responds Player responds Player responds Player responds Either might win Either
    might win


    Computer wins or game ends in ‘Tie’

    The computer must make a maximum of 5 moves.


    Move 1: Opening, centre(Box 5 ) is the most favoured, next favoured is one of
    the four corners. To avoid the monotony of the computer always opening with an
    advantage, we can choose option by random selection from the centre and the corner
    boxes.


    Move 2: Computer can check if the centre is already taken and if not, take it.
    If the centre is already taken by computer, go for the adjacent box in the diagonal,
    row, or column position where the third box is vacant.


    Move 3: If the computer can complete a line and win, go for that box. Else prevent
    the player from completing a line by occupying the unoccupied box in the line.
    Else, move to occupy an adjacent box to open a line.


    Move 4: Move 3 steps can be repeated.

    Move 5: If the game moves up to this, only one box would be left and just occupy
    it!

    How do we implement it?


    We have decided as mentioned above to make the first choice from the ‘favoured’
    five positions namely, the centre and four corner boxes by random selection. For
    this a list is defined as below:


    ```

    ch_list_1 = [1,3,5,7,9]

    ```


    We can also create a list to monitor the boxes which are open at the beginning
    of each turn.


    ```

    ch_list = []

    ```


    The game grid is verified at the beginning of each turn and the list is updated.
    This is implemented through a ‘for loop’.'
