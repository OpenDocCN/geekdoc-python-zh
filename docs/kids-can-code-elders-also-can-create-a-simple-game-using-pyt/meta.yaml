    \ Since I have a game concept around corona virus, I have named both the directory\
    \ and the script file(program file) ‘corona’. A separate directory will help you\
    \ to identify and track your files easily.\n\n## Let us start coding\n\nOpen the\
    \ program file. Let us start coding.\n\n‘pygame’ has many modules. Some of them\
    \ must be specifically initialized but some need not be. ‘pygame.init()’ takes\
    \ care of this requirement and all modules are initialised.\n\n```\n#set up the\
    \ environment\nimport pygame\npygame.init()\n```\n\n## Setting up a game window\n\
    \nAll games are played on a defined window or a screen. So, we need to draw a\
    \ screen. The size of the screen is expressed in terms of pixels like 500 pixels\
    \ wide and 600 pixels high. Let us create a window under the name, ‘screen’ :\n\
    \n```\nScreen = pygame.display.set_mode((500,600))\n```\n\nA window, 500 pixels\
    \ wide and 600 pixels high, will be displayed. If you give (0,0) as argument to\
    \ ‘set_mode’, the screen will occupy the whole window.\n\n## Screen frozen/stuck\n\
    \nSome of you might have experienced stuck/ frozen screens. It may not be possible\
    \ to close the screen even. If you are in such a situation, open the windows ‘Task\
    \ Manager’ and park it on your task bar. (You can also open it by pressing ‘ctrl+alt+del’\
    \ combination at any point). You can see the running processes listed. Task Manager\
    \ has two views, ‘More details’ and ‘Fewer details’(Please see the left bottom\
    \ corner button, it is a toggle). Open with more details. You can see listing\
    \ for Python related items. Keep the Python Shell related entry which represents\
    \ the program file. Select and close the other Python related entry. Your game\
    \ screen window will be closed now.\n\n![](img/46a01ff08700d90f9b7f7df8d7f949e6_53_0.png)\n\
    \n## Setting up a game loop\n\nThe game loop controls the flow of the game. So\
    \ long as some actions are to be repeated, controls remain within the loop. A\
    \ condition, ‘running = True’ is set while entering the loop and once the task\
    \ is completed, or an input is received to quit, the condition is reset as ‘running\
    \ = False’ which makes the program to exit the loop.\n\nNow let us see how the\
    \ code would look like up to now.\n\n```\n#set up the environment\nimport pygame\n\
    pygame.init()\n\n#set up a screen\nscreen = pygame.display.set_mode((500,600))\n\
    \n#set up a game loop\n\nrunning = True\nwhile running:\n    for event in pygame.event.get():\n\
    \        if event.type == pygame.QUIT:\n            running = False\n\n# quit\
    \ the game\npygame.quit()\n```\n\nThe screen will be displayed, and when you click\
    \ the close sign marked by ‘X’ at the top right corner of the screen, the loop\
    \ will be exited. The program reads the next line ‘pygame.quit()’ function and\
    \ exits the game. ‘pygame.init()’ initializes all ‘pygame’ modules whereas ‘pygame.quit()’\
    \ closes all ‘pygame’ modules and quits.\n\nPlease note that the word ‘screen’\
    \ used is a variable and not a keyword. You can use any variable. We have used\
    \ the word ‘screen’ for the ease of identification. We can change the colour of\
    \ our screen by using a method, ‘fill’. Python uses (R,G,B) colour scheme. The\
    \ maximum saturation a colour can go up to is 255. When all the colours have the\
    \ maximum saturation of ‘255’, the colour is white and when it is ‘0’, the colour\
    \ is black.\n\n```\nWHITE = (255,255,255)\nBLACK = (0,0,0)\nRED = (255,0,0)\n\
    GREEN = (0,255,0)\nBLUE = (0,0,255)\n```\nOther colours are created by a combination\
    \ of these shades.\n\nThe default colour of our ‘screen’ is black. You can change\
    \ the colour of the screen using a method. A method is almost similar to a function.\
    \ A method belongs to an object and is called on it. For example, ‘screen.fill’,\
    \ where ‘screen’ is the object and ‘fill’ is the method. We can change the colour\
    \ to green by the following command:\n\n```\nscreen.fill(0,255,0)\n```\n\nA detailed\
    \ colour code guide is available at the following site:\nhttps://www.rapidtables.com/web/color/RGB_Color.html\n\
    \nYou can choose any colour from the palette, and it will give the RGB colour\
    \ code. You can experiment with changing the size and colour of the screen.\n\
    We can store the colors in variables instead of giving the triplet code every\
    \ time, to specify colour!\nLet us do it! By convention, capital letters are used\
    \ for variables representing values which do not change.\n\n```\n#colour\nRED\
    \     =(255,0,0)\nGREEN   = (0,255,0)\nBLUE    = (0,0,255)\nWHITE   = (255,255,255)\n\
    BLACK   = (0,0,0)\n\n#set up a screen\nscreen = pygame.display.set_mode((600,600))\n\
    screen.fill((GREEN))\n```\n\nYou can replace the RGB code (0,255,0) with the variable\
    \ ‘GREEN’ now defined.\n\n## Customising the screen"
