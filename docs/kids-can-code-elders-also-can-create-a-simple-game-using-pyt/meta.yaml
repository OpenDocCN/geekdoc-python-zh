    BLACK = (0,0,0)

    RED = (255,0,0)

    GREEN = (0,255,0)

    BLUE = (0,0,255)

    Other colours are created by a combination of these shades.


    The default colour of our ‘screen’ is black. You can change the colour of the
    screen using a method. A method is almost similar to a function. A method belongs
    to an object and is called on it. For example, ‘screen.fill’, where ‘screen’ is
    the object and ‘fill’ is the method. We can change the colour to green by the
    following command:


    ```

    screen.fill(0,255,0)

    ```


    A detailed colour code guide is available at the following site:

    https://www.rapidtables.com/web/color/RGB_Color.html


    You can choose any colour from the palette, and it will give the RGB colour code.
    You can experiment with changing the size and colour of the screen.

    We can store the colors in variables instead of giving the triplet code every
    time, to specify colour!

    Let us do it! By convention, capital letters are used for variables representing
    values which do not change.


    ```

    #colour

    RED     =(255,0,0)

    GREEN   = (0,255,0)

    BLUE    = (0,0,255)

    WHITE   = (255,255,255)

    BLACK   = (0,0,0)


    #set up a screen

    screen = pygame.display.set_mode((600,600))

    screen.fill((GREEN))

    ```


    You can replace the RGB code (0,255,0) with the variable ‘GREEN’ now defined.


