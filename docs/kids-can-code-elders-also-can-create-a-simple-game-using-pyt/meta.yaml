  mdcn: "## 'If'、'elif'、'else' 条件语句：\n\n**'if'**、**'elif'** 和 **'else'** 关键字用于检查条件。检查单个条件时使用\
    \ **'if'**。检查多个条件时，需与 **'if'** 结合使用 **'elif'** 和 **'else'**。在一个代码块中，你可以使用任意多个\
    \ **'elif'**，但只能使用一个 **'else'**。\n\n在查看我们如何在“井字棋”游戏程序中使用这些条件之前，让我们先看一个简单的例子。\n\
    \n```python\nno_of_cars = int(input(\"How many cars did Jose purchase? : \"))\n\
    \nif no_of_cars == 1:\n    print(\"Jose has only one car\")\nelif no_of_cars ==\
    \ 2:\n    print(\"Jose has 2 cars\")\nelif no_of_cars == 3:\n    print(\"Jose\
    \ has 3 cars\")\nelse:\n    print(\"Jose has more than 3 cars !\")\n```\n\n以下是三种不同输入的结果：\n\
    \n```\n>>> \n================================ RESTART: C:\\Users\\PREMARA\nHow\
    \ many cars did Jose purchase? : 1\nJose has only one car !\n>>> \n================================\
    \ RESTART: C:\\Users\\PREMARA\nHow many cars did Jose purchase? : 3\nJose has\
    \ 3 cars.\n>>> \n================================ RESTART: C:\\Users\\PREMARA\n\
    How many cars did Jose purchase? : 5\nJose has more than 3 cars !\n```\n\n现在让我们看几个来自我们程序的例子：\n\
    \n```python\nnum_seconds = 5\nfor countdown in reversed(range(num_seconds + 1)):\n\
    \    if countdown > 0:\n        print(countdown, end='.....', flush = True)\n\
    \        time.sleep(1)\n    else:\n        print('Go!')\n```\n\n这里，'if' 和 'else'\
    \ 结合使用，作为 'for 循环' 的一部分。让我们看看这个 5 秒倒计时是如何实现的。数字范围被反转，带有后缀 '.....' 的数字从 5 打印到 1，每次间隔一秒。当倒计时达到\
    \ 1 时，程序退出 'if' 条件，'else' 条件开始生效，并打印 'Go'。\n\n在 **`check_for_winner`** 函数中，使用了十六个条件来确定获胜者。一个是\
    \ **`if`** 条件，其余十五个是 **`elif`** 条件。如果有获胜者，具有默认值 `None` 的变量 **`winner`** 会被相应地修改，变量\
    \ **`game_still_going`** 的值会被更改为 `False`。\n你可以观察到，在游戏中还有许多其他场合使用了 **`if`**、**`elif`**\
    \ 和 **`else`** 条件。\n\n## 全局变量和局部变量\n\n### 示例 1：\n\n```python\n# This function\
    \ uses global variable x which is outside the\n# function\ndef test():\n    print(x)\n\
    \n# Global scope\nx = \"Hello, world!\"\ntest()\n```\n\n输出：\nHello, world!\n\n\
    ### 示例 2：\n\n```python\n# This function uses variable x inside, hence uses it\n\
