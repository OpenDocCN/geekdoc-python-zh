    \n“PyCharm”是由捷克公司 JetBrains 开发的 Python 集成开发环境。其社区版是免费的，非常适合我们的需求。你可以从以下网站下载：https://www.jetbrains.com/\
    \ 。\n（请参见下图）\n\n![](img/46a01ff08700d90f9b7f7df8d7f949e6_49_0.png)\n\n## 让我们看看如何加载“pygame”。\n\
    \n在“PyCharm”屏幕上，点击：\n文件 > 设置 > 项目 > 项目解释器\n将打开一个窗口，列出可用的包。在这里我们可以看到列出了“pip”和“setuptools”，但没有列出“pygame”包。\n\
    \n![](img/46a01ff08700d90f9b7f7df8d7f949e6_50_0.png)\n\n在下面的屏幕中，请查看以“package”开头的行末尾的“+”号。点击它，将出现一个列表。从中选择“pygame”，然后点击窗口底部的“Install\
    \ package”按钮。“pygame”现在将被安装。\n\n![](img/46a01ff08700d90f9b7f7df8d7f949e6_51_0.png)\n\
    \n我们现在准备好编码了。我们将逐步进行编程。让我们首先熟悉一下基础知识。\n\n在这个阶段，我更喜欢使用“IDLE Python”来工作。你可以选择任何环境。\n\
    \n## 创建一个新文件夹\n\n请在你访问 Python 的目录中创建一个新文件夹。在这个文件夹中，你可以打开你的 Python 程序文件并开始编码。由于我有一个围绕冠状病毒的游戏概念，我将目录和脚本文件（程序文件）都命名为“corona”。一个单独的目录将帮助你轻松识别和跟踪你的文件。\n\
    \n## 让我们开始编码\n\n打开程序文件。让我们开始编码。\n\n“pygame”有许多模块。其中一些必须专门初始化，但有些则不需要。“pygame.init()”处理了这个需求，所有模块都会被初始化。\n\
    \n```\n#设置环境\nimport pygame\npygame.init()\n```\n\n## 设置游戏窗口\n\n所有游戏都在一个定义的窗口或屏幕上进行。因此，我们需要绘制一个屏幕。屏幕的大小以像素为单位表示，例如\
    \ 500 像素宽和 600 像素高。让我们创建一个名为“screen”的窗口：\n\n```\nScreen = pygame.display.set_mode((500,600))\n\
    ```\n\n将显示一个 500 像素宽、600 像素高的窗口。如果你将 (0,0) 作为参数传递给“set_mode”，屏幕将占据整个窗口。\n\n##\
    \ 屏幕冻结/卡住\n\n你们中的一些人可能遇到过屏幕卡住/冻结的情况。甚至可能无法关闭屏幕。如果你遇到这种情况，请打开 Windows 的“任务管理器”并将其固定在任务栏上。（你也可以随时按“ctrl+alt+del”组合键打开它）。你可以看到列出的正在运行的进程。任务管理器有两个视图，“更多详细信息”和“更少详细信息”（请参见左下角的按钮，这是一个切换开关）。以更多详细信息打开。你可以看到与\
    \ Python 相关的项目列表。保留代表程序文件的 Python Shell 相关条目。选择并关闭其他与 Python 相关的条目。你的游戏屏幕窗口现在将关闭。\n\
    \n![](img/46a01ff08700d90f9b7f7df8d7f949e6_53_0.png)\n\n## 设置游戏循环\n\n游戏循环控制游戏的流程。只要某些操作需要重复，控制权就保留在循环内。进入循环时设置一个条件“running\
    \ = True”，一旦任务完成或收到退出输入，条件就被重置为“running = False”，这使程序退出循环。\n\n现在让我们看看到目前为止代码会是什么样子。\n\
    \n```\n#设置环境\nimport pygame\npygame.init()\n\n#设置屏幕\nscreen = pygame.display.set_mode((500,600))\n\
    \n#设置游戏循环\n\nrunning = True\nwhile running:\n    for event in pygame.event.get():\n\
    \        if event.type == pygame.QUIT:\n            running = False\n\n# 退出游戏\n\
    pygame.quit()\n```\n\n屏幕将被显示，当你点击屏幕右上角标有“X”的关闭符号时，循环将退出。程序读取下一行“pygame.quit()”函数并退出游戏。“pygame.init()”初始化所有“pygame”模块，而“pygame.quit()”关闭所有“pygame”模块并退出。\n\
    \n请注意，使用的单词“screen”是一个变量，而不是关键字。你可以使用任何变量。我们使用“screen”是为了便于识别。我们可以使用“fill”方法来改变屏幕的颜色。Python\
    \ 使用 (R,G,B) 颜色方案。一种颜色的最大饱和度可以达到 255。当所有颜色的最大饱和度为“255”时，颜色为白色；当为“0”时，颜色为黑色。\n\n\
    ```\nWHITE = (255,255,255)\nBLACK = (0,0,0)\nRED = (255,0,0)\nGREEN = (0,255,0)\n\
    BLUE = (0,0,255)\n```\n其他颜色是通过这些色调的组合创建的。\n\n我们“screen”的默认颜色是黑色。你可以使用一个方法来改变屏幕的颜色。方法与函数非常相似。方法属于一个对象并在其上调用。例如，“screen.fill”，其中“screen”是对象，“fill”是方法。我们可以通过以下命令将颜色更改为绿色：\n\
    \n```\nscreen.fill(0,255,0)\n```\n\n详细的颜色代码指南可在以下网站找到：\nhttps://www.rapidtables.com/web/color/RGB_Color.html\n\
    \n你可以从调色板中选择任何颜色，它会给出 RGB 颜色代码。你可以尝试改变屏幕的大小和颜色。\n我们可以将颜色存储在变量中，而不是每次都给出三元组代码来指定颜色！\n\
    让我们这样做！按照惯例，大写字母用于表示值不会改变的变量。\n\n```\n#颜色\nRED     =(255,0,0)\nGREEN   = (0,255,0)\n\
    BLUE    = (0,0,255)\nWHITE   = (255,255,255)\nBLACK   = (0,0,0)\n\n#设置屏幕\nscreen\
    \ = pygame.display.set_mode((600,600))\nscreen.fill((GREEN))\n```\n\n你现在可以用定义的变量“GREEN”替换\
    \ RGB 代码 (0,255,0)。\n\n## 自定义屏幕"
