- md: "# Kids can code, Elders also can\n\nCreate a simple game using Python\n\nPREMARAJAN\
    \ M K\n\n![](img/46a01ff08700d90f9b7f7df8d7f949e6_0_0.png)\n\n# Kids can code,\
    \ Elders also can\n\nCreate a simple game using Python\n\nPREMARAJAN M K\n\n![](img/46a01ff08700d90f9b7f7df8d7f949e6_1_0.png)\n\
    \n# Table of Contents\n\n**Part I: The game ‘Tic-tac-toe’**\n\n- Let’s plunge:\
    \ 4\n- The game design 4\n- Coding of the game 5\n- Time – Local time and countdown\
    \ 7\n- Python time module 7\n- Countdown 8\n- Display board 9\n- Random number\
    \ generation 11\n- The remaining functions 14\n- Python concepts used in this\
    \ game 22\n- Take on the challenge !! 35\n- Make it a two-player game! 35\n- Make\
    \ the computer think! 38\n- How to create an executable from your program 44\n\
    \n**Part-II: New Game: Corona Warriors**\n\n- Create a new folder 49\n- Let us\
    \ start coding 49\n- Setting up a game window 49\n- Screen frozen/stuck 50\n-\
    \ Setting up a game loop 51\n- Customising the screen 53\n- Placing objects on\
    \ the screen 53\n- Location of objects 54\n- Drawing an object on the screen 54\n\
    - Placing an image on the screen 56\n- Loading game assets 57\n- Creating a background\
    \ image for the screen 59\n- The Plot 61\n- Movement of virus on the screen 61\n\
    - Keeping the virus within the boundaries 62\n- Random number generation 63\n\
    - Replication of viruses 63\n- Movement of ‘man’ 65\n- Equipping the ‘man’ with\
    \ a laser gun 66\n- Collision detection 68\n- Maintaining the score board 70\n\
    - Providing firing sound 71\n- What happens when the whole green mask turns red?\
    \ 74\n- Problem resolution 84\n- The challenges 87\n- Epilogue 88\n- Acknowledgements\
    \ 89\n- Pygame- Code for the game ‘Corona Warriors’(235 lines) 90\n\n# Preface\n\
    \nThe power of imitating!\n\nI am talking about people beginning to learn coding.\
    \ Observe the children. Children start singing by imitating, dancing by imitating,\
    \ speaking by imitating- almost every skill by imitating. The grammar and nuances\
    \ come later.\n\nFor learning coding also, you do not have to wait to learn every\
    \ piece of its grammar. Get going, start doing small, small things. Learn things\
    \ on the go. When you start enjoying the small, small wins, you will be fueled,\
    \ and you will surmount every obstacle.\n\nSo, take the plunge now!\nPremarajan\n\
    \n# Part I: The game ‘Tic-tac-toe’\n\n# Let’s plunge:\n\nLet us try to learn some\
    \ basic concepts of Python along with coding of the game of Tic-Tac-Toe. The game\
    \ rules for Tic-Tac-Toe are:\n\n- The game board of 9 cells is formed by a grid\
    \ of 3 rows and 3 columns.\n- Two players choose and mark the cells by turn.\n\
    - Whoever completes a continuous row, column or diagonal first, wins.\n- A player\
    \ cannot select a cell which has already been marked.\n- If all cells get marked\
    \ without either of the player not winning, the game is a ‘Tie’.\n- Let us consider\
    \ a game played against the computer. Let us assign ‘X’ to the computer and ‘O’\
    \ to the player for marking their choices.\n\n# The game design\n\n- Make the\
    \ ‘Game Board’\n- Display the game rules\n- Display the board\n- Choose one player\
    \ and open the game\n- Select the cell and mark it\n- Test if the selection is\
    \ valid\n- Test if the input is in range\n- Test if the input is valid\n- Test\
    \ if the cell is already taken\n- Mark the cell chosen and pass the turn till\
    \ either wins or cells are exhausted\n- Ending of the game\n- “X” wins\n- “O”\
    \ wins\n- Tie\n- Declare the result\n- Option to start a new game or to exit\n\
    \n# Coding of the game\n\nLet us head to coding of the game straight away.\n\n\
    ```python\n#environment\n\nimport time\nimport random\n\n#define variables\nboard\
    \ = [1,2,3,4,5,6,7,8,9]\ngame_still_going = True\n\nline1 = \"+---------+---------+---------+\"\
    \nline2 = \"|         |         |         |\"\n\n#definitions\n\ndef beg_game():\n\
    \    global winner\n    winner = None\n\n    print('''                       \
    \  *Tic-Tac-Toe!*\n\n            These are the rules:\n\n            You are playing\
    \ against the computer.\n            The computer will open the game by\n    \
    \        placing \"X\" at it's choice position.\n            You are assigned\
    \ \"O\" for placing your\n            choices.The columns are from 1 to 9\n  \
    \          from top left to right.\n\n            Best of luck! Let us begin....''')\n\
    \    print(\" \"*2)\n\n#implement countdown\n\n    num_seconds = 5\n    for countdown\
    \ in reversed(range(num_seconds + 1)):\n        if countdown > 0:\n          \
    \  print(countdown, end='.....', flush = True)\n            time.sleep(1)\n  \
    \      else:\n            print('Go!')\n    print(\" \"*2)\n```\n\n```python\n\
    def display_board():\n    pass\ndef my_turn():\n    pass\ndef your_turn():\n \
    \   pass\ndef check_winner():\n    pass\ndef check_if_tie():\n    pass\ndef play_game():\n\
    \    print(time.ctime())\n    beg_game()\n    display_board()\n    input()\n\n\
    play_game()\n```\n\nThe above code defines the structure of the game. We have\
    \ imported two modules, ‘*time*’ and ‘*random*’ and defined the variables **‘game_still_going’**,\
    \ **‘board’**, **‘line1’** and **‘line2’**. We have completed coding of the function\
    \ **‘beg_game()’**. In this function, we have defined a global variable, **‘winner’**\
    \ and it has been given a value ‘None’. This variable has been defined as ‘*global*’\
    \ so that if the game has to be replayed before exiting, the value will be initialized.\
    \ This also contains the instructions for playing the game and an invitation to\
    \ play. This includes a ‘5-0’ countdown to signal the start of the game as well.\n\
    \nThis is followed by defining the functions, **display_board()**, **my_turn()**,\
    \ **your_turn()**, **check_winner()** and **check_if_tie()**. While we have defined\
    \ the structure, we have not written the codes for any of the functions, other\
    \ than a statement ‘pass’. We have placed a pass statement under each of these\
    \ functions, so that no error will be displayed on account of non-completion of\
    \ the respective codes.\n\nThen the function **‘play_game()’** is introduced.\
    \ There, we have added the code for printing the local time and called the function\
    \ ‘beg_game()’. We have also called the function ‘display_board()’. However at\
    \ this stage, there is nothing to be displayed. We have also called the built-in\
    \ function ‘input()’ in the last line so that the screen waits for the input before\
    \ exiting the program. Once we press enter, the program will be exited. Finally,\
    \ we call the function ‘play_game()’.\n\nOn executing the code that we have completed\
    \ so far; we get the following output:\n\n![](img/46a01ff08700d90f9b7f7df8d7f949e6_10_0.png)\n\
    \n# Time – Local time and countdown\n\n## Python time module\n\nTo make available,\
    \ the functions relating to time, we must import the time module first. Python\
    \ works on the concept of ‘epoch’ which starts from January 1<sup>st</sup>, 1970,\
    \ 00.00.00. If we ask for the time(>>>time.time()), python gives the number of\
    \ seconds elapsed starting from the ‘epoch’. If we want the local time, we must\
    \ convert the seconds elapsed. We can use the following function for this:"
  mdcn: "# 孩子能编程，长者也能\n\n使用Python创建一个简单游戏\n\nPREMARAJAN M K\n\n![](img/46a01ff08700d90f9b7f7df8d7f949e6_0_0.png)\n\
    \n# 孩子能编程，长者也能\n\n使用Python创建一个简单游戏\n\nPREMARAJAN M K\n\n![](img/46a01ff08700d90f9b7f7df8d7f949e6_1_0.png)\n\
    \n# 目录\n\n**第一部分：游戏‘井字棋’**\n\n- 让我们开始吧：4\n- 游戏设计 4\n- 游戏编码 5\n- 时间 – 本地时间与倒计时\
    \ 7\n- Python time模块 7\n- 倒计时 8\n- 显示棋盘 9\n- 随机数生成 11\n- 剩余函数 14\n- 本游戏使用的Python概念\
    \ 22\n- 接受挑战！！ 35\n- 将其变成双人游戏！ 35\n- 让计算机思考！ 38\n- 如何从你的程序创建可执行文件 44\n\n**第二部分：新游戏：新冠战士**\n\
    \n- 创建新文件夹 49\n- 让我们开始编码 49\n- 设置游戏窗口 49\n- 屏幕冻结/卡住 50\n- 设置游戏循环 51\n- 自定义屏幕 53\n\
    - 在屏幕上放置对象 53\n- 对象的位置 54\n- 在屏幕上绘制对象 54\n- 在屏幕上放置图像 56\n- 加载游戏资源 57\n- 为屏幕创建背景图像\
    \ 59\n- 剧情 61\n- 病毒在屏幕上的移动 61\n- 将病毒保持在边界内 62\n- 随机数生成 63\n- 病毒的复制 63\n- ‘人’的移动\
    \ 65\n- 为‘人’配备激光枪 66\n- 碰撞检测 68\n- 维护记分板 70\n- 提供射击音效 71\n- 当整个绿色面具变红时会发生什么？ 74\n\
    - 问题解决 84\n- 挑战 87\n- 尾声 88\n- 致谢 89\n- Pygame- 游戏‘新冠战士’的代码（235行） 90\n\n# 前言\n\
    \n模仿的力量！\n\n我指的是那些开始学习编程的人。观察孩子们。孩子们通过模仿开始唱歌，通过模仿跳舞，通过模仿说话——几乎每项技能都是通过模仿学会的。语法和细微差别是后来才有的。\n\
    \n对于学习编程，你也不必等到学会它的每一部分语法。开始行动，从小事做起。边做边学。当你开始享受小小的胜利时，你就会充满动力，克服每一个障碍。\n\n所以，现在就行动起来吧！\n\
    Premarajan\n\n# 第一部分：游戏‘井字棋’\n\n# 让我们开始吧：\n\n让我们尝试在编码井字棋游戏的同时学习一些Python的基本概念。井字棋的游戏规则是：\n\
    \n- 由3行3列网格组成的9个单元格构成游戏棋盘。\n- 两名玩家轮流选择并标记单元格。\n- 谁先完成连续的一行、一列或一条对角线，谁就获胜。\n- 玩家不能选择已经被标记的单元格。\n\
    - 如果所有单元格都被标记，但没有任何玩家获胜，则游戏为‘平局’。\n- 让我们考虑一个与计算机对战的游戏。我们将‘X’分配给计算机，将‘O’分配给玩家来标记他们的选择。\n\
    \n# 游戏设计\n\n- 制作‘游戏棋盘’\n- 显示游戏规则\n- 显示棋盘\n- 选择一名玩家并开始游戏\n- 选择单元格并标记它\n- 测试选择是否有效\n\
    - 测试输入是否在范围内\n- 测试输入是否有效\n- 测试单元格是否已被占用\n- 标记所选单元格并传递回合，直到一方获胜或单元格用完\n- 游戏结束\n\
    - “X”获胜\n- “O”获胜\n- 平局\n- 宣布结果\n- 选择开始新游戏或退出\n\n# 游戏编码\n\n让我们直接进入游戏的编码。\n\n```python\n\
    #environment\n\nimport time\nimport random\n\n#define variables\nboard = [1,2,3,4,5,6,7,8,9]\n\
    game_still_going = True\n\nline1 = \"+---------+---------+---------+\"\nline2\
    \ = \"|         |         |         |\"\n\n#definitions\n\ndef beg_game():\n \
    \   global winner\n    winner = None\n\n    print('''                        \
    \ *Tic-Tac-Toe!*\n\n            These are the rules:\n\n            You are playing\
    \ against the computer.\n            The computer will open the game by\n    \
    \        placing \"X\" at it's choice position.\n            You are assigned\
    \ \"O\" for placing your\n            choices.The columns are from 1 to 9\n  \
    \          from top left to right.\n\n            Best of luck! Let us begin....''')\n\
    \    print(\" \"*2)\n\n#implement countdown\n\n    num_seconds = 5\n    for countdown\
    \ in reversed(range(num_seconds + 1)):\n        if countdown > 0:\n          \
    \  print(countdown, end='.....', flush = True)\n            time.sleep(1)\n  \
    \      else:\n            print('Go!')\n    print(\" \"*2)\n```\n\n```python\n\
    def display_board():\n    pass\ndef my_turn():\n    pass\ndef your_turn():\n \
    \   pass\ndef check_winner():\n    pass\ndef check_if_tie():\n    pass\ndef play_game():\n\
    \    print(time.ctime())\n    beg_game()\n    display_board()\n    input()\n\n\
    play_game()\n```\n\n上面的代码定义了游戏的结构。我们导入了两个模块，‘*time*’和‘*random*’，并定义了变量**‘game_still_going’**、**‘board’**、**‘line1’**和**‘line2’**。我们已经完成了函数**‘beg_game()’**的编码。在这个函数中，我们定义了一个全局变量**‘winner’**，并将其赋值为‘None’。这个变量被定义为‘*global*’，以便在退出前需要重新开始游戏时，该值会被初始化。这还包含了玩游戏的说明和邀请。这包括一个‘5-0’倒计时来标志游戏的开始。\n\
    \n接下来是定义函数**display_board()**、**my_turn()**、**your_turn()**、**check_winner()**和**check_if_tie()**。虽然我们定义了结构，但除了一个‘pass’语句外，我们还没有为任何函数编写代码。我们在每个函数下放置了一个pass语句，这样就不会因为相应代码未完成而显示错误。\n\
    \n然后引入了函数**‘play_game()’**。在那里，我们添加了打印本地时间的代码，并调用了函数‘beg_game()’。我们还调用了函数‘display_board()’。然而在这个阶段，没有什么可以显示的。我们还在最后一行调用了内置函数‘input()’，以便屏幕在退出程序前等待输入。一旦我们按下回车键，程序就会退出。最后，我们调用了函数‘play_game()’。\n\
    \n执行我们目前完成的代码后；我们得到以下输出：\n\n![](img/46a01ff08700d90f9b7f7df8d7f949e6_10_0.png)\n\
    \n# 时间 – 本地时间与倒计时\n\n## Python time模块\n\n为了提供与时间相关的函数，我们必须首先导入time模块。Python基于‘epoch’的概念工作，它从1970年1月1<sup>st</sup>日，00.00.00开始。如果我们请求时间(>>>time.time())，Python会给出从‘epoch’开始经过的秒数。如果我们想要本地时间，我们必须转换经过的秒数。我们可以使用以下函数来实现："
