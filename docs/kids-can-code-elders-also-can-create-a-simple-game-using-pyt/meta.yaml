    After the first move by the computer, the player responds. Now 7 boxes are left,
    and the computer again chooses a random box from the ‘ch_list_1’. The player responds
    and 5 boxes are left. Now the chances to win or lose open up and the computer
    has to apply intelligence.


    The game is won or lost across 3 rows, 3 columns or two diagonals. The computer
    must see if there is a chance to win on any of these lines for either player before
    it responds.


    To monitor the game board grid, we can break it into 8 lists as given below:


    ```

    row1 =[ board[0],board[1],board[2]]

    row2 = [board[3],board[4],board[5]]

    row3 = [board[6],board[7],board[8]]

    column1 = [board[0],board[3],board[6]]

    column2 = [board[1],board[4],board[7]]

    column3 = [board[2],board[5],board[8]]

    diag1 = [board[0],board[4],board[8]]

    diag2 = [board[2],board[4],board[6]]

    ```


    The computer first verifies line by line whether there is any line where it has
    already marked two boxes and the third one is empty.


    In that case it goes for the empty box and wins the game. If this is not true,
    the computer verifies whether the opponent has any line with two boxes claimed,
    with the third one empty.


    In that case, it goes for the empty box to prevent a win by the opponent. If both
    these cases are not true, computer chooses from the ‘ch_list’ at random. Now,
    the player responds, and 3 boxes are left. The procedure at ‘5 boxes left’ is
    repeated. Once the opponent responds, only one box would be left and the computer
    must necessarily take it. To implement these changes, you have to incorporate
    necessary changes in the function ‘my_turn()’ in our program.'
