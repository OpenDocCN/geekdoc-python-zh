- md: "## How to create an executable from your program\n\nHaving successfully completed\
    \ the Tic-Tac-Toe game program, let us see how our python program file could be\
    \ converted to an executable file so that this could be run on platforms other\
    \ than python. For converting .py file to a .exe file, ‘pyinstaller’ is used.\
    \ It comes with the ‘IDLE Python’ package and might have already been installed\
    \ in your computer. Otherwise, you can install it now. If you are in the python\
    \ shell, you can easily go the operating system.\n\n![](img/46a01ff08700d90f9b7f7df8d7f949e6_45_0.png)\n\
    \nThe above commands will take you to the operating system. There you can execute\
    \ the command as given below to install ‘pyinstaller’.\nC:\\Users\\AppData\\Local\\\
    Programs\\Python>py -m pip install pyinstaller If it is already installed, the\
    \ system will give you the message that ‘ the requirement is already met’. Otherwise,\
    \ it will install ‘pyinstaller’.\n(Information on ‘pyinstaller’ can be had from\
    \ the following website:\nhttp://www.pyinstaller.org/)\n\n‘handle_turn()’ and\
    \ ‘flip_player()’ !\n\n- Make changes in the function ‘play_game()’ !\n\nThis\
    \ is how the ‘play_game()’ function would look now:\n\n```\ndef play_game():\n\
    \    global game_still_going, winner\n    global board\n    board = [1,2,3,4,5,6,7,8,9]\n\
    \n    print(time.ctime())\n    beg_game()\n    display_board()\n    while game_still_going:\n\
    \        begin = time.time()\n        handle_turn(current_player)\n        check_winner()\n\
    \        check_if_tie()\n        flip_player()\n```\n\nJust invoke “play_game()”\
    \ and go on!\n\nMake the computer think!\n\nLet us consider the game of ‘Tic-TacToe’\
    \ which we first coded. Here, one plays against the ‘computer’. The computer chooses\
    \ its options by generating random numbers. It does not apply any ‘intelligence’\
    \ and hence, sometimes, the computer surrenders meekly. it does not provide any\
    \ challenge or thrill of gaming! Let us try to make it more enjoyable by giving\
    \ some ‘brain’ to the computer.\n\nLet us consider the game situation. The game\
    \ is played in a nine-box grid numbered from 1 to 9.\n\n1 2 3\n4 5 6\n7 8 9\n\n\
    The game goes like this (Computer goes first): First move by computer Second move\
    \ by computer Third move by computer Fourth move by computer Fifth move by computer\
    \ Player responds Player responds Player responds Player responds Either might\
    \ win Either might win\n\nComputer wins or game ends in ‘Tie’\nThe computer must\
    \ make a maximum of 5 moves.\n\nMove 1: Opening, centre(Box 5 ) is the most favoured,\
    \ next favoured is one of the four corners. To avoid the monotony of the computer\
    \ always opening with an advantage, we can choose option by random selection from\
    \ the centre and the corner boxes.\n\nMove 2: Computer can check if the centre\
    \ is already taken and if not, take it. If the centre is already taken by computer,\
    \ go for the adjacent box in the diagonal, row, or column position where the third\
    \ box is vacant.\n\nMove 3: If the computer can complete a line and win, go for\
    \ that box. Else prevent the player from completing a line by occupying the unoccupied\
    \ box in the line. Else, move to occupy an adjacent box to open a line.\n\nMove\
    \ 4: Move 3 steps can be repeated.\nMove 5: If the game moves up to this, only\
    \ one box would be left and just occupy it!\nHow do we implement it?\n\nWe have\
    \ decided as mentioned above to make the first choice from the ‘favoured’ five\
    \ positions namely, the centre and four corner boxes by random selection. For\
    \ this a list is defined as below:\n\n```\nch_list_1 = [1,3,5,7,9]\n```\n\nWe\
    \ can also create a list to monitor the boxes which are open at the beginning\
    \ of each turn.\n\n```\nch_list = []\n```\n\nThe game grid is verified at the\
    \ beginning of each turn and the list is updated. This is implemented through\
    \ a ‘for loop’.\n\nAfter the first move by the computer, the player responds.\
    \ Now 7 boxes are left, and the computer again chooses a random box from the ‘ch_list_1’.\
    \ The player responds and 5 boxes are left. Now the chances to win or lose open\
    \ up and the computer has to apply intelligence.\n\nThe game is won or lost across\
    \ 3 rows, 3 columns or two diagonals. The computer must see if there is a chance\
    \ to win on any of these lines for either player before it responds.\n\nTo monitor\
    \ the game board grid, we can break it into 8 lists as given below:\n\n```\nrow1\
    \ =[ board[0],board[1],board[2]]\nrow2 = [board[3],board[4],board[5]]\nrow3 =\
    \ [board[6],board[7],board[8]]\ncolumn1 = [board[0],board[3],board[6]]\ncolumn2\
    \ = [board[1],board[4],board[7]]\ncolumn3 = [board[2],board[5],board[8]]\ndiag1\
    \ = [board[0],board[4],board[8]]\ndiag2 = [board[2],board[4],board[6]]\n```\n\n\
    The computer first verifies line by line whether there is any line where it has\
    \ already marked two boxes and the third one is empty.\n\nIn that case it goes\
    \ for the empty box and wins the game. If this is not true, the computer verifies\
    \ whether the opponent has any line with two boxes claimed, with the third one\
    \ empty.\n\nIn that case, it goes for the empty box to prevent a win by the opponent.\
    \ If both these cases are not true, computer chooses from the ‘ch_list’ at random.\
    \ Now, the player responds, and 3 boxes are left. The procedure at ‘5 boxes left’\
    \ is repeated. Once the opponent responds, only one box would be left and the\
    \ computer must necessarily take it. To implement these changes, you have to incorporate\
    \ necessary changes in the function ‘my_turn()’ in our program.\n\nThe following\
    \ new variables are introduced to facilitate game board box selection by the computer:\n\
    \n- Ch_list_1\n- row1\n- row2\n- row3\n- column1\n- column2\n- column3\n- diag1\n\
    - diag2\n\nBased on the number of boxes remaining on the board, the computer adopts\
    \ different methods for selection of boxes. The first two choices are purely based\
    \ on the availability of elements in the variable ‘ch_list_1’ with first preference\
    \ to the central box(Box No.5).\nThe code is given below:\n\n```\ndef my_turn():\n\
    \    global game_still_going\n    ch_list = []\n    ch_list_l = [1,3,5,7,9]\n\n\
    \    row1 =[ board[0],board[1],board[2]]\n    row2 = [board[3],board[4],board[5]]\n\
    \    row3 = [board[6],board[7],board[8]]\n    column1 = [board[0],board[3],board[6]]\n\
    \    column2 = [board[1],board[4],board[7]]\n    column3 = [board[2],board[5],board[8]]\n\
    \    diag1 = [board[0],board[4],board[8]]\n    diag2 = [board[2],board[4],board[6]]\n\
    \n    print(\"Now it is my turn...\")\n    valid = False\n\n    while not valid:\n\
    \        for i in range(0,9):\n            if board[i] != \"X\" and board[i] !=\
    \ \"O\":\n                ch_list.append(board[i])\n\n        if len(ch_list)\
    \ == 9:\n            position = random.choice(ch_list_l)\n\n        elif len(ch_list)==\
    \ 7:\n            print(\"Remaining choices:\",ch_list)\n            if board[4]\
    \ != \"X\" and board[4] != \"O\":\n                position = 5\n            elif\
    \ board[0] != \"X\" and board[0] != \"O\":\n                position = 1\n   \
    \         elif board[2] != \"X\" and board[2] != \"O\":\n                position\
    \ = 3\n            elif board[6] != \"X\" and board[6] != \"O\":\n           \
    \     position = 7\n            elif board[8] != \"X\" and board[8] != \"O\":\n\
    \                position = 9\n```\n\nNext selection will be at `len(ch_list)\
    \ == 5` and then `len(ch_list) ==3` and the final choice is compulsory as that\
    \ is the last element.\n\n```\nelif len(ch_list) == 5:\n\n    print(\"Remaining\
    \ choices :\",ch_list)\n\n    if row1.count(\"X\")== 2 and row1.count(\"O\") ==\
    \ 0:\n\n        if board[0] == \"X\" and board[2] == \"X\":\n            position\
    \ = 2\n\n        if board[0] == \"X\" and board[1] == \"X\":\n            position\
    \ = 3\n\n        if board[1] == \"X\" and board[2] ==\"X\":\n            position\
    \ = 1\n\n    elif row2.count(\"X\")== 2 and row2.count(\"O\") == 0:\n```\n\nLook\
    \ at the code relating to row1, and complete row2. Then set-up ‘elif’ for row3,\
    \ columns and diagonals.\n\nNext check is when ‘len(ch_list) == 3’, as shown below.\
    \ Use the same logic and complete it.\n\n```\nelif len(ch_list) == 3:\n\n    print(\"\
    Remaining choices :\",ch_list)\n\n    if row1.count(\"X\")== 2 and row1.count(\"\
    O\") == 0:\n\n        if board[0] == \"X\" and board[2] == \"X\":\n          \
    \  position = 2\n\n        if board[0] == \"X\" and board[1] == \"X\":\n     \
    \       position = 3\n\n        if board[1] == \"X\" and board[2] ==\"X\":\n \
    \           position = 1\n\n    elif row2.count(\"X\")== 2 and row2.count(\"O\"\
    ) == 0:\n```\n\nThe skeleton for these checks and the remaining code for the function\
    \ ‘my_turn()’ starting with ‘else’ is given below. Complete it and test the code.\n\
    \nYou are now ready !\nIt will work !\nI am sure you will be able to improve on\
    \ this!\nGo ahead and try !"
  mdcn: "## 如何从你的程序创建可执行文件\n\n成功完成井字棋游戏程序后，让我们看看如何将Python程序文件转换为可执行文件，以便在非Python平台上运行。要将.py文件转换为.exe文件，需要使用‘pyinstaller’。它随‘IDLE\
    \ Python’软件包一起提供，可能已经安装在你的计算机上。否则，你现在可以安装它。如果你在Python shell中，可以轻松进入操作系统。\n\n![](img/46a01ff08700d90f9b7f7df8d7f949e6_45_0.png)\n\
    \n上述命令将带你进入操作系统。在那里，你可以执行以下命令来安装‘pyinstaller’。\nC:\\Users\\AppData\\Local\\Programs\\\
    Python>py -m pip install pyinstaller 如果已经安装，系统会给你‘the requirement is already met’的消息。否则，它将安装‘pyinstaller’。\n\
    （关于‘pyinstaller’的信息可以从以下网站获取：\nhttp://www.pyinstaller.org/）\n\n‘handle_turn()’和‘flip_player()’！\n\
    \n- 修改‘play_game()’函数！\n\n现在‘play_game()’函数将如下所示：\n\n```\ndef play_game():\n \
    \   global game_still_going, winner\n    global board\n    board = [1,2,3,4,5,6,7,8,9]\n\
    \n    print(time.ctime())\n    beg_game()\n    display_board()\n    while game_still_going:\n\
    \        begin = time.time()\n        handle_turn(current_player)\n        check_winner()\n\
    \        check_if_tie()\n        flip_player()\n```\n\n只需调用“play_game()”并继续！\n\
    \n让计算机思考！\n\n让我们考虑我们最初编码的‘井字棋’游戏。在这里，玩家与‘计算机’对战。计算机通过生成随机数来选择其选项。它不应用任何‘智能’，因此有时计算机会轻易认输。它不提供任何挑战或游戏的刺激！让我们尝试通过给计算机一些‘大脑’来使其更有趣。\n\
    \n让我们考虑游戏情况。游戏在一个编号为1到9的九宫格中进行。\n\n1 2 3\n4 5 6\n7 8 9\n\n游戏过程如下（计算机先走）：计算机第一步\
    \ 计算机第二步 计算机第三步 计算机第四步 计算机第五步 玩家回应 玩家回应 玩家回应 玩家回应 任一方可能获胜 任一方可能获胜\n\n计算机获胜或游戏以‘平局’结束\n\
    计算机最多必须走5步。\n\n第一步：开局，中心（第5格）是最受青睐的，其次是四个角落之一。为了避免计算机总是以优势开局的单调性，我们可以从中心和角落格子中随机选择。\n\
    \n第二步：计算机可以检查中心是否已被占用，如果没有，则占据它。如果中心已被计算机占据，则前往对角线、行或列位置中第三个格子为空的相邻格子。\n\n第三步：如果计算机可以完成一条线并获胜，则前往该格子。否则，通过占据该线中未被占用的格子来阻止玩家完成一条线。否则，移动到相邻格子以打开一条线。\n\
    \n第四步：可以重复第三步的步骤。\n第五步：如果游戏进行到这一步，只剩下一个格子，只需占据它！\n我们如何实现它？\n\n我们决定如上所述，从‘受青睐’的五个位置（即中心和四个角落格子）中随机选择第一个选择。为此，定义了一个列表如下：\n\
    \n```\nch_list_1 = [1,3,5,7,9]\n```\n\n我们还可以创建一个列表来监控每回合开始时开放的格子。\n\n```\nch_list\
    \ = []\n```\n\n在每回合开始时验证游戏网格并更新列表。这通过‘for循环’实现。\n\n计算机走第一步后，玩家回应。现在剩下7个格子，计算机再次从‘ch_list_1’中随机选择一个格子。玩家回应，剩下5个格子。现在获胜或失败的机会出现，计算机必须应用智能。\n\
    \n游戏在3行、3列或两条对角线上获胜或失败。计算机在回应之前必须查看这些线中是否有任何一方有机会获胜。\n\n为了监控游戏棋盘网格，我们可以将其分解为8个列表，如下所示：\n\
    \n```\nrow1 =[ board[0],board[1],board[2]]\nrow2 = [board[3],board[4],board[5]]\n\
    row3 = [board[6],board[7],board[8]]\ncolumn1 = [board[0],board[3],board[6]]\n\
    column2 = [board[1],board[4],board[7]]\ncolumn3 = [board[2],board[5],board[8]]\n\
    diag1 = [board[0],board[4],board[8]]\ndiag2 = [board[2],board[4],board[6]]\n```\n\
    \n计算机首先逐行验证是否有任何线它已经标记了两个格子，而第三个格子为空。\n\n在这种情况下，它前往空格子并赢得游戏。如果这不是真的，计算机验证对手是否有任何线有两个格子被占据，第三个格子为空。\n\
    \n在这种情况下，它前往空格子以阻止对手获胜。如果这两种情况都不成立，计算机从‘ch_list’中随机选择。现在，玩家回应，剩下3个格子。重复‘剩下5个格子’时的程序。一旦对手回应，只剩下一个格子，计算机必须占据它。要实现这些更改，你必须在程序中的‘my_turn()’函数中进行必要的更改。\n\
    \n引入了以下新变量以方便计算机选择游戏棋盘格子：\n\n- Ch_list_1\n- row1\n- row2\n- row3\n- column1\n\
    - column2\n- column3\n- diag1\n- diag2\n\n根据棋盘上剩余的格子数量，计算机采用不同的方法选择格子。前两个选择完全基于变量‘ch_list_1’中元素的可用性，首先优先选择中心格子（第5格）。\n\
    代码如下：\n\n```\ndef my_turn():\n    global game_still_going\n    ch_list = []\n\
    \    ch_list_l = [1,3,5,7,9]\n\n    row1 =[ board[0],board[1],board[2]]\n    row2\
    \ = [board[3],board[4],board[5]]\n    row3 = [board[6],board[7],board[8]]\n  \
    \  column1 = [board[0],board[3],board[6]]\n    column2 = [board[1],board[4],board[7]]\n\
    \    column3 = [board[2],board[5],board[8]]\n    diag1 = [board[0],board[4],board[8]]\n\
    \    diag2 = [board[2],board[4],board[6]]\n\n    print(\"Now it is my turn...\"\
    )\n    valid = False\n\n    while not valid:\n        for i in range(0,9):\n \
    \           if board[i] != \"X\" and board[i] != \"O\":\n                ch_list.append(board[i])\n\
    \n        if len(ch_list) == 9:\n            position = random.choice(ch_list_l)\n\
    \n        elif len(ch_list)== 7:\n            print(\"Remaining choices:\",ch_list)\n\
    \            if board[4] != \"X\" and board[4] != \"O\":\n                position\
    \ = 5\n            elif board[0] != \"X\" and board[0] != \"O\":\n           \
    \     position = 1\n            elif board[2] != \"X\" and board[2] != \"O\":\n\
    \                position = 3\n            elif board[6] != \"X\" and board[6]\
    \ != \"O\":\n                position = 7\n            elif board[8] != \"X\"\
    \ and board[8] != \"O\":\n                position = 9\n```\n\n接下来的选择将在`len(ch_list)\
    \ == 5`时进行，然后是`len(ch_list) ==3`，最后的选择是强制性的，因为那是最后一个元素。\n\n```\nelif len(ch_list)\
    \ == 5:\n\n    print(\"Remaining choices :\",ch_list)\n\n    if row1.count(\"\
    X\")== 2 and row1.count(\"O\") == 0:\n\n        if board[0] == \"X\" and board[2]\
    \ == \"X\":\n            position = 2\n\n        if board[0] == \"X\" and board[1]\
    \ == \"X\":\n            position = 3\n\n        if board[1] == \"X\" and board[2]\
    \ ==\"X\":\n            position = 1\n\n    elif row2.count(\"X\")== 2 and row2.count(\"\
    O\") == 0:\n```\n\n查看与row1相关的代码，并完成row2。然后为row3、列和对角线设置‘elif’。\n\n接下来的检查是在‘len(ch_list)\
    \ == 3’时，如下所示。使用相同的逻辑并完成它。\n\n```\nelif len(ch_list) == 3:\n\n    print(\"Remaining\
    \ choices :\",ch_list)\n\n    if row1.count(\"X\")== 2 and row1.count(\"O\") ==\
    \ 0:\n\n        if board[0] == \"X\" and board[2] == \"X\":\n            position\
    \ = 2\n\n        if board[0] == \"X\" and board[1] == \"X\":\n            position\
    \ = 3\n\n        if board[1] == \"X\" and board[2] ==\"X\":\n            position\
    \ = 1\n\n    elif row2.count(\"X\")== 2 and row2.count(\"O\") == 0:\n```\n\n这些检查的框架以及‘my_turn()’函数中从‘else’开始的剩余代码如下所示。完成它并测试代码。\n\
    \n你现在准备好了！\n它会工作的！\n我相信你能够改进它！\n继续尝试吧！"
