    # How to create an executable from your program


    Having successfully completed the Tic-Tac-Toe game program, let us see how our
    python program file could be converted to an executable file so that this could
    be run on platforms other than python. For converting .py file to a .exe file,
    ‘pyinstaller’ is used. It comes with the ‘IDLE Python’ package and might have
    already been installed in your computer. Otherwise, you can install it now. If
    you are in the python shell, you can easily go the operating system.


    ![](img/46a01ff08700d90f9b7f7df8d7f949e6_45_0.png)


    The above commands will take you to the operating system. There you can execute
    the command as given below to install ‘pyinstaller’.

    C:\Users\AppData\Local\Programs\Python>py -m pip install pyinstaller If it is
    already installed, the system will give you the message that ‘ the requirement
    is already met’. Otherwise, it will install ‘pyinstaller’.

    (Information on ‘pyinstaller’ can be had from the following website:

