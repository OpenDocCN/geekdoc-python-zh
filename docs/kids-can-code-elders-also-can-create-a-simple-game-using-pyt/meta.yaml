    \ '**else**' can be used.\n\nBefore having a look at how we have used these conditions\
    \ in our 'Tic-Tac-Toe' game program, let us see a simple example.\n\n```python\n\
    no_of_cars = int(input(\"How many cars did Jose purchase? : \"))\n\nif no_of_cars\
    \ == 1:\n    print(\"Jose has only one car\")\nelif no_of_cars == 2:\n    print(\"\
    Jose has 2 cars\")\nelif no_of_cars == 3:\n    print(\"Jose has 3 cars\")\nelse:\n\
    \    print(\"Jose has more than 3 cars !\")\n```\n\nHere is the result of 3 different\
    \ inputs:\n\n```\n>>> \n================================ RESTART: C:\\Users\\\
    PREMARA\nHow many cars did Jose purchase? : 1\nJose has only one car !\n>>> \n\
    ================================ RESTART: C:\\Users\\PREMARA\nHow many cars did\
    \ Jose purchase? : 3\nJose has 3 cars.\n>>> \n================================\
    \ RESTART: C:\\Users\\PREMARA\nHow many cars did Jose purchase? : 5\nJose has\
    \ more than 3 cars !\n```\n\nNow let us see a few examples from our program:\n\
    \n```python\nnum_seconds = 5\nfor countdown in reversed(range(num_seconds + 1)):\n\
    \    if countdown > 0:\n        print(countdown, end='.....', flush = True)\n\
    \        time.sleep(1)\n    else:\n        print('Go!')\n```\n\nHere ‘if’ and\
    \ ‘else’ are used in conjunction, as part of a ‘for loop’. Let us see how this\
    \ 5-seconds count down is implemented. The number range is reversed and the numbers\
    \ with a trailer ‘.....’ are printed from 5 through 1 with a delay of one second.\
    \ When the countdown reaches 1, the program exits the ‘if’ condition and ‘else’\
    \ condition becomes operational and ‘Go’ is printed.\n\nIn the **`check_for_winner`**\
    \ function, sixteen conditions are used to determine the winner. One is an **`if`**\
    \ condition and the remaining fifteen are **`elif`** conditions. If there is a\
    \ winner, the variable **`winner`** with a default value of `None` is modified\
    \ accordingly and the value of the variable **`game_still_going`** is altered\
    \ as `False`.\nYou can observe that there are many other occasions in the game\
    \ where **`if`**, **`elif`** and **`else`** conditions are used.\n\n## Global\
    \ variables and local variables\n\n### Example 1:\n\n```python\n# This function\
    \ uses global variable x which is outside the\n# function\ndef test():\n    print(x)\n\
    \n# Global scope\nx = \"Hello, world!\"\ntest()\n```\n\nOutput:\nHello, world!\n\
    \n### Example 2:\n\n```python\n# This function uses variable x inside, hence uses\
    \ it\n# throws up an error since referenced before assignment\ndef test():\n \
    \   print(x)\n    x = \"This is strange!\"\n\n# Global scope\nx = \"Hello, world!\"\
    \ntest()\n```\n\nOutput:\nUnboundLocalError: local variable 'x' referenced before\
    \ assignment\n\n### Example 3:\n\n```python\n# This function has a variable x\
    \ inside the function also appropriately assigned\ndef test():\n    x = \"This\
    \ is strange!\"\n    print(x)\n\nx = \"Hello, world!\"\ntest()\nprint(x)\n```\n\
    \nOutput:\n\n**This is strange!**\n**Hello, world!**\n\n(Prints as assigned inside\
    \ the function on calling the function and prints as assigned outside on a print\
    \ command following function call)\n\n### Example 4:\n\n```python\n# This function\
    \ has a variable x inside the function, but it has been defined as global\ndef\
    \ test():\n    global x\n    x = \"This is strange!\"\n    print(x)\n\nx = \"\
    Hello, world!\"\ntest()\nprint(x)\n```\n\nOutput:\n\n**This is strange!**\n**This\
    \ is strange!**\n\n(Since the variable is defined as global, it can carry the\
    \ value outside)\n\n```python\n# This function has a variable x inside the function,\
