    \ stock_data.resample('M').mean()\n\nprint(monthly_data.head())\n```\n\n## 用于金融数值计算的NumPy\n\
    \nNumPy是Python科学计算的基础包。它提供了一个高性能的多维数组对象以及用于处理这些数组的工具。\n\n**核心特性：**\n\n- **数组**：NumPy数组在存储和操作数据方面比Python列表更高效。\n\
    - **数学函数**：NumPy提供了全面的数学函数，用于对数组执行计算。\n\n**示例**：使用NumPy进行投资组合优化计算。\n\n```python\n\
    import numpy as np\n\n# 示例投资组合：在四种资产中的投资比例\nportfolio_weights = np.array([0.25,\
    \ 0.25, 0.25, 0.25])\n\n# 四种资产的历史收益率\nasset_returns = np.array([0.12, 0.10, 0.14,\
