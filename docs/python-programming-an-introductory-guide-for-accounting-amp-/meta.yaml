    }\n\n# Convert the data into a pandas DataFrame\ndf = pd.DataFrame(data)\n\n#\
    \ Set the 'Year' column as the index\ndf.set_index('Year', inplace=True)\n\n#\
    \ Plotting cash flow components over time\nplt.figure(figsize=(10, 6))\nsns.set_style(\"\
    whitegrid\")\n\n# Plot Operating Cash Flow\nplt.plot(df.index, df['Operating Cash\
    \ Flow'], marker='o', label='Operating Cash Flow')\n\n# Plot Investing Cash Flow\n\
    plt.plot(df.index, df['Investing Cash Flow'], marker='o', label='Investing Cash\
    \ Flow')\n\n# Plot Financing Cash Flow\nplt.plot(df.index, df['Financing Cash\
    \ Flow'], marker='o', label='Financing Cash Flow')\n\nplt.title('Cash Flow Analysis\
