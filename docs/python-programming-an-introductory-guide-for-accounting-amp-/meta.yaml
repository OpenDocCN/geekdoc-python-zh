    ![](img/06593fa16f7e492d6a21a097c8c32f6f_582_0.png)


    Python Code


    ```python

    import matplotlib.pyplot as plt

    import numpy as np


    # Generating synthetic data for the annual returns of different investments

    np.random.seed(0)


