    \ 'Investing Cash Flow', 'Financing Cash Flow', 'Net Cash Flow']])\n```\n\n此程序执行以下步骤：\n\
    \n1.  数据准备：从包含5年期间经营活动现金流、投资活动现金流和筹资活动现金流的示例现金流量表数据开始。\n2.  创建DataFrame：将数据转换为pandas\
