- img_proc: true
  md: '+   - Primary Colors: Red, blue, and yellow. These colors cannot be created
    by mixing other colors.

    - Secondary Colors: Green, orange, and purple. These are created by mixing primary
    colors.

    - Tertiary Colors: The result of mixing primary and secondary colors, such as
    blue-green or red-orange.


    # Color Selection Principles


    +   1. Contrast: Use contrasting colors to differentiate data points or elements.
    High contrast improves readability but use it sparingly to avoid overwhelming
    the viewer.

    2. Complementary Colors: Opposite each other on the color wheel, such as blue
    and orange. They create high contrast and are useful for emphasizing differences.

    3. Analogous Colors: Adjacent to each other on the color wheel, like blue, blue-green,
    and green. They''re great for illustrating gradual changes and creating a harmonious
    look.

    4. Monochromatic Colors: Variations in lightness and saturation of a single color.
    This scheme is effective for minimizing distractions and focusing attention on
    data structures rather than color differences.

    5. Warm vs. Cool Colors: Warm colors (reds, oranges, yellows) tend to pop forward,
    while cool colors (blues, greens) recede. This can be used to create a sense of
    depth or highlight specific data points.'
