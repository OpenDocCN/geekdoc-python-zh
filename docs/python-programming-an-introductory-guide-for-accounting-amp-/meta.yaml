    ## 第5章：金融数据的探索性数据分析（EDA）


    EDA的核心在于可视化与统计分析相结合的双重方法，这种方法使分析师能够观察到数据表层之外的内容。直方图、散点图和箱线图等可视化工具揭示了金融数据集中的分布、变异性和潜在异常值。同时，统计量——均值、中位数、众数、偏度和峰度——提供了对数据集中趋势和离散程度的数值概览。


    ## 可视化技术：深入探讨


