    Fig 1.


    ![](img/06593fa16f7e492d6a21a097c8c32f6f_564_0.png)'
  - '[PAGE 565]


    +   - Primary Colors: Red, blue, and yellow. These colors cannot be created by
    mixing other colors.

    - Secondary Colors: Green, orange, and purple. These are created by mixing primary
    colors.

    - Tertiary Colors: The result of mixing primary and secondary colors, such as
    blue-green or red-orange.


    # Color Selection Principles


    +   1. Contrast: Use contrasting colors to differentiate data points or elements.
    High contrast improves readability but use it sparingly to avoid overwhelming
    the viewer.

    2. Complementary Colors: Opposite each other on the color wheel, such as blue
    and orange. They create high contrast and are useful for emphasizing differences.

    3. Analogous Colors: Adjacent to each other on the color wheel, like blue, blue-green,
    and green. They''re great for illustrating gradual changes and creating a harmonious
    look.

    4. Monochromatic Colors: Variations in lightness and saturation of a single color.
    This scheme is effective for minimizing distractions and focusing attention on
    data structures rather than color differences.

    5. Warm vs. Cool Colors: Warm colors (reds, oranges, yellows) tend to pop forward,
    while cool colors (blues, greens) recede. This can be used to create a sense of
    depth or highlight specific data points.'
- md: '## Tips for Applying Color in Data Visualization


    -   **Accessibility:** Consider color blindness by avoiding problematic color
    combinations (e.g., red-green) and using texture or shapes alongside color to
    differentiate elements.

    -   **Consistency:** Use the same color to represent the same type of data across
    all your visualizations to maintain coherence and aid in understanding.

    -   **Simplicity:** Limit the number of colors to avoid confusion. A simpler color
    palette is usually more effective in conveying your message.

    -   **Emphasis:** Use bright or saturated colors to draw attention to key data
    points and muted colors for background or less important information.


    ## Tools for Color Selection


    -   **Color Wheel Tools:** Online tools like Adobe Color or Coolors can help you
    choose harmonious color schemes based on the color wheel principles.

    -   **Data Visualization Libraries:** Many libraries have built-in color palettes
    designed for data viz, such as Matplotlib''s "cividis" or Seaborn''s "husl".


    Effective color selection in data visualization is both an art and a science.
    By understanding and applying the principles of the color wheel, contrast, and
    color harmony, you can create visualizations that are not only visually appealing
    but also communicate your data''s story clearly and effectively.


    ## DATA VISUALIZATION GUIDE


    Next let''s define some common data visualization graphs in finance.


    1.  **Time Series Plot:** Ideal for displaying financial data over time, such
    as stock price trends, economic indicators, or asset returns.


    ### Time Series Plot of Stock Prices Over a Year


    ![](img/06593fa16f7e492d6a21a097c8c32f6f_568_0.png)


    Python Code


    ```python

    import matplotlib.pyplot as plt

    import pandas as pd

    import numpy as np


    # For the purpose of this example, let''s create a random time series data

    # Assuming these are daily stock prices for a year


    np.random.seed(0)


    dates = pd.date_range(''20230101'', periods=365)

    prices = np.random.randn(365).cumsum() + 100 # Random walk + starting price of
    100


    # Create a DataFrame

    df = pd.DataFrame({''Date'': dates, ''Price'': prices})


    # Set the Date as Index

    df.set_index(''Date'', inplace=True)


    # Plotting the Time Series

    plt.figure(figsize=(10,5))

    plt.plot(df.index, df[''Price''], label=''Stock Price'')

    plt.title(''Time Series Plot of Stock Prices Over a Year'')

    plt.xlabel(''Date'')

    plt.ylabel(''Price'')

    plt.legend()

    plt.tight_layout()

    plt.show()

    ```


    2.  **Correlation Matrix:** Helps to display and understand the correlation between
    different financial variables or stock returns using color-coded cells.


    ### Correlation Matrix of Stock Returns


    ![](img/06593fa16f7e492d6a21a097c8c32f6f_571_0.png)


    ### Python Code


    ```python

    import matplotlib.pyplot as plt

    import seaborn as sns

    import numpy as np


    # For the purpose of this example, let''s create some synthetic stock return data

    np.random.seed(0)


    # Generating synthetic daily returns data for 5 stocks

    stock_returns = np.random.randn(100, 5)


    # Create a DataFrame to simulate stock returns for different stocks

    tickers = [''Stock A'', ''Stock B'', ''Stock C'', ''Stock D'', ''Stock E'']

    df_returns = pd.DataFrame(stock_returns, columns=tickers)


    # Calculate the correlation matrix

    corr_matrix = df_returns.corr()


    # Create a heatmap to visualize the correlation matrix

    plt.figure(figsize=(8, 6))

    sns.heatmap(corr_matrix, annot=True, cmap=''coolwarm'', fmt=".2f", linewidths=.05)

    plt.title(''Correlation Matrix of Stock Returns'')

    plt.show()

    ```


    3.  **Histogram:** Useful for showing the distribution of financial data, such
    as returns, to identify the underlying probability distribution of a set of data.


    ![](img/06593fa16f7e492d6a21a097c8c32f6f_573_0.png)


    ### Python Code


    ```python

    import matplotlib.pyplot as plt

    import numpy as np


    # Let''s assume we have a dataset of stock returns which we''ll simulate with
    a normal distribution

    np.random.seed(0)

    stock_returns = np.random.normal(0.05, 0.1, 1000) # mean return of 5%, standard
    deviation of 10%


    # Plotting the histogram

    plt.figure(figsize=(10, 6))

    plt.hist(stock_returns, bins=50, alpha=0.7, color=''blue'')


    # Adding a line for the mean

    plt.axvline(stock_returns.mean(), color=''red'', linestyle=''dashed'', linewidth=2)


    # Annotate the mean value

    plt.text(stock_returns.mean() * 1.1, plt.ylim()[1] * 0.9, f''Mean: {stock_returns.mean():.2%}'')


    # Adding title and labels

    plt.title(''Histogram of Stock Returns'')

    plt.xlabel(''Returns'')

    plt.ylabel(''Frequency'')


    # Show the plot

    plt.show()

    ```


    4.  **Scatter Plot:** Perfect for visualizing the relationship or correlation
    between two financial variables, like the risk vs. return profile of various assets.


    ### Scatter Plot of Two Variables


    ![](img/06593fa16f7e492d6a21a097c8c32f6f_576_0.png)


    ### Python Code


    ```python

    import matplotlib.pyplot as plt

    import numpy as np


    # Generating synthetic data for two variables

    np.random.seed(0)


    x = np.random.normal(5, 2, 100) # Mean of 5, standard deviation of 2

    y = x * 0.5 + np.random.normal(0, 1, 100) # Some linear relationship with added
    noise


    # Creating the scatter plot

    plt.figure(figsize=(10, 6))

    plt.scatter(x, y, alpha=0.7, color=''green'')


    # Adding title and labels

    plt.title(''Scatter Plot of Two Variables'')

    plt.xlabel(''Variable X'')

    plt.ylabel(''Variable Y'')


    # Show the plot

    plt.show()

    ```


    5.  **Bar Chart:** Can be used for comparing financial data across different categories
    or time periods, such as quarterly sales or earnings per share.


    ![](img/06593fa16f7e492d6a21a097c8c32f6f_578_0.png)


    ### Python Code


    ```python

    import matplotlib.pyplot as plt

    import numpy as np


    # Generating synthetic data for quarterly sales

    quarters = [''Q1'', ''Q2'', ''Q3'', ''Q4'']

    sales = np.random.randint(50, 100, size=4)  # Random sales figures between 50
    and 100 for each quarter


    # Creating the bar chart

    plt.figure(figsize=(10, 6))

    plt.bar(quarters, sales, color=''purple'')


    # Adding title and labels

    plt.title(''Quarterly Sales'')

    plt.xlabel(''Quarter'')

    plt.ylabel(''Sales (in millions)'')


    # Show the plot

    plt.show()

    ```


    6.  **Pie Chart:** Although used less frequently in professional financial analysis,
    it can be effective for representing portfolio compositions or market share.


    ![](img/06593fa16f7e492d6a21a097c8c32f6f_580_0.png)


    ### Python Code


    ```python

    import matplotlib.pyplot as plt


    # Generating synthetic data for portfolio composition

    labels = [''Stocks'', ''Bonds'', ''Real Estate'', ''Cash'']

    sizes = [40, 30, 20, 10] # Portfolio allocation percentages


