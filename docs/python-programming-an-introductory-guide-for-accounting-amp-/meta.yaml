    are qualitative in nature and represent categories rather than numeric values.
    Directly incorporating these into our models without preprocessing will lead to
    errors since machine learning algorithms, including linear regression, inherently
    require numerical input.


    The process of converting these categorical variables into a format that can be
    provided to ML algorithms is known as encoding. One common technique is one-hot
    encoding, which scikit-learn facilitates through the `OneHotEncoder` class. This
    method creates binary columns for each category of the variable, with a value
    of 1 where the category is present and 0 otherwise.


