- md: "## RATIO ANALYSIS\n\nRatio analysis uses key financial ratios, such as liquidity\
    \ ratios, profitability ratios, and leverage ratios, to assess a company's financial\
    \ health and performance. These ratios provide insights into various aspects of\
    \ the company's operational efficiency.\n\n```python\nimport pandas as pd\n\n\
    # Sample financial data\ndata = {\n    'Item': ['Total Current Assets', 'Total\
