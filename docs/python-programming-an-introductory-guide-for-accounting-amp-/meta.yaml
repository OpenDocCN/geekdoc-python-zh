- img_proc: true
  md: 'The reinforcement learning process involves an agent that interacts with its
    environment in discrete time steps. At each time step, the agent receives the
    environment''s state, selects and performs an action, and in return, receives
    a reward and the new state from the environment. This sequence of state, action,
    reward, and new state (S, A, R, S'') forms the fundamental feedback loop for learning.
    The ultimate goal is to develop a policy—a strategy for selecting actions based
    on states—that maximizes the cumulative reward over time, typically referred to
    as the return.


    In finance, reinforcement learning has been applied to various domains, including
