    plt.grid(True)\nplt.show()\n\n# Calculate and display Net Cash Flow\ndf['Net Cash\
    \ Flow'] = df['Operating Cash Flow'] + df['Investing Cash Flow'] + df['Financing\
    \ Cash Flow']\n\nprint(\"Cash Flow Analysis:\")\nprint(df[['Operating Cash Flow',\
    \ 'Investing Cash Flow', 'Financing Cash Flow', 'Net Cash Flow']])\n```\n\nThis\
    \ program performs the following steps:\n\n1. Data Preparation: It starts with\
    \ sample cash flow statement data, including operating cash flow, investing cash\
    \ flow, and financing cash flow over a 5-year period.\n2. DataFrame Creation:\
    \ Converts the data into a pandas DataFrame and sets the 'Year' as the index for\
