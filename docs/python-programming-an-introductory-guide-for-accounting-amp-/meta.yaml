  md: "# # BROWNIAN MOTION\n## (WIENER PROCESS)\n\n+   - Definition: A continuous-time\
    \ stochastic process, \\(W(t)\\), with \\(W(0) = 0\\), that has independent and\
    \ normally distributed increments with mean 0 and variance \\(t\\).\n- Properties:\n\
    \    - Stationarity: The increments of the process are stationary.\n    - Martingale\
    \ Property: \\(W(t)\\) is a martingale.\n    - Quadratic Variation: The quadratic\
    \ variation of \\(W(t)\\) over an interval \\([0, t]\\) is \\(t\\).\n\n# ### Problem:\n\
    \nConsider a stock whose price \\(S(t)\\) evolves according to the dynamics of\
    \ geometric Brownian motion. The differential equation describing the stock price\
