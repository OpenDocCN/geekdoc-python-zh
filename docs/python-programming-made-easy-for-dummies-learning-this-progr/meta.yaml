    \ |\n| -= | 左操作数减去右操作数。然后将结果分配给左操作数。 |\n| *= | 左右操作数相乘。然后将结果分配给左操作数。 |\n| /= |\
    \ 左操作数除以右操作数。然后将结果分配给左操作数。 |\n| %= | 计算两个操作数的模。然后将结果分配给左操作数。 |\n| **= | 对两个操作数执行指数计算。然后将结果值分配给左操作数。\
    \ |\n| //= | 对操作数执行整除。然后将结果值分配给左操作数。 |\n\n### 比较运算符或关系运算符\n\n| 运算符 | 描述 |\n| :---\
    \ | :--- |\n| == | 如果两个操作数具有相同的值，则条件为真。 |\n| != | 如果两个操作数不具有相同的值，则条件为真。 |\n| <>\
