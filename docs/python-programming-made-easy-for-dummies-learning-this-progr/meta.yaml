    \ of how a command works.`\n\n## 退出 Python\n\n如果你想在玩了几个小时编程语言后关闭命令行，有两种标准方法可以做到这一点。还有其他关闭\
    \ Python 的方法，但建议你使用流行的方法，以确保下次使用时 Python 能正常运行。这些方法如下：\n`quit()` 和 `exit()`\n\
    这些指令将关闭当前的 Python 会话。这些命令最棒的地方在于它们可以接受一个可选参数。例如，你可以使用 `quit(5)` 或 `exit(5)` 来关闭\
    \ Python，同时 `ERRORLEVEL` 变量达到数值五。\n\n为了说明如何优雅地退出 Python，请执行以下步骤：\n\n1. 打开终端或命令提示符。\n\
    2. 输入 `python` 然后按回车键。\n3. 输入 `quit()`。\n\n## 编写你的第一个程序\n\n新手通常将应用程序开发视为某种形式的火箭科学或只有电脑极客才能理解的魔法。他们不明白的是，他们也可以利用计算机编程的力量。\n\
    构建程序遵循独特的开发阶段。它不仅仅是一系列相互关联的步骤，但对于像你这样的初学者来说并不太复杂。在你完成本章后，你将能够扩展不需要魔杖的简单程序。\n与其他任务一样，人们使用工具来构建复杂的应用程序。幸运的是，Python\
    \ 不需要工具来编写应用程序。然而，使用 IDLE 使 Python 程序员更容易简化编码系统并更快地处理信息和记录。\n\n### IDLE 的使用\n\n\
