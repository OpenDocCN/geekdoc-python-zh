- md: "## How Python works.\n\nInstructions tell the computer what to do. They're\
    \ a sequence of steps in a coded system. That is accomplished by way of typing\
    \ instructions that Python is familiar with. In reaction, Python translates those\
    \ instructions into instructions that can be understood by the computer. As an\
    \ instance, the command `print()` displays the result of this system on the display.\n\
    \nTo give you a quick example of how commands work, execute the following steps\
    \ using your command-line interface:\n\n1. Open the command-line version using\
    \ any of the enumerated options within the preceding phase of this chapter.\n\
    2. At the command line, type the following:\n   `print(\"This is an example of\
    \ how a command works.\")`\n3. Press enter to signify the end of the command.\
    \ The command line will then display:\n   `This is an example of how a command\
    \ works.`\n\n## Exiting Python\n\nIn case you want to shut the command line after\
    \ several hours of playing with the programming language, there are two standard\
    \ methods with which to do that. There are other techniques to close Python, however\
    \ it is encouraged that you use the popular method to ensure that Python will\
    \ behave normally the subsequent time you use it. Those methods are as follows:\n\
    `quit()` and `exit()`\nThose instructions will close down the current Python session.\
    \ The best thing about said commands is that they can take an optional argument.\
    \ For example, you can use `quit(5)` or `exit(5)` to close down Python while the\
    \ `ERRORLEVEL` variable reaches a numeric value of five.\n\nTo illustrate how\
    \ to exit Python nicely, perform the subsequent technique:\n\n1. Open a terminal\
