- md: "## Operators\n\nPython has seven primary kinds of operators. They're constructs\
    \ manipulating operand values. They are symbols that tell the interpreter to carry\
    \ out a sure operation. You have read approximately operators in chapter 4. In\
    \ this chapter, you'll learn about mathematics, assignment, comparison, bitwise,\
    \ logical, identity, and membership operators.\n\n### Mathematics Operators\n\n\
    | Operator | Description |\n| :--- | :--- |\n| Addition ( + ) | It performs addition\
    \ of values. |\n| Subtraction ( - ) | It performs subtraction of values, subtracting\
    \ the second operand from the first one. |\n| Multiplication ( * ) | It plays\
    \ multiplication of values. |\n| Division ( / ) | It plays division of values,\
    \ dividing the first operand by way of the second. |\n| Modulus ( % ) | It plays\
    \ division of values, dividing the primary operand by way of the second one. Then,\
    \ it returns the rest. |\n| Exponent ( ** ) | It plays exponential calculation\
    \ on all the operators worried. |\n| Ground Division ( // ) | It performs division\
    \ of values, dividing the operands. But, it removes the decimal factors when the\
    \ end result has been acquired. |\n\n### Assignment Operators\n\n| Operator |\
    \ Description |\n| :--- | :--- |\n| = | Values are assigned beginning from the\
    \ proper to the left operands. |\n| += | The left and right operands are introduced.\
    \ The end result is then allocated to the left operand. |\n| -= | The proper operand\
    \ is subtracted from the left operand. The result is then allocated to the left\
    \ operand. |\n| *= | The left and proper operands are improved. The result is\
    \ then allocated to the left operand. |\n| /= | The left operand is divided with\
    \ the proper operand. The end result is then allotted to the left operand. |\n\
    | %= | The modulus of both operands is determined. The result is then allocated\
    \ to the left operand. |\n| **= | Exponential computation is carried out on each\
    \ operators. The ensuing cost is then assigned to the left operand. |\n| //= |\
    \ Ground division is executed at the operands. The ensuing cost is then assigned\
    \ to the left operand. |\n\n### Comparison Operators or Relational Operators\n\
