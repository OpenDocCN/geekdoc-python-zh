    \ does not see the letters. Instead, each letter inside the double quote is represented\
    \ by a unique number. For instance, the letter A is represented by 65 such that\
    \ when you type the command: ord(\"A\") the command will give 65 as the output.\
    \ You can try other letters to check their numerical equivalent. Since the computer\
    \ can't process letters, you will have to convert strings to numbers. In this\
    \ case, you can use the commands float() or int(). For instance: ThisInt = int(\"\
    6766\") assigns the integer 6766 and not the string 6766 to the variable thisInt.\
    \ Python also allows users to convert numbers to string equivalents by using the\
    \ command str(). For example: ThisString = str(67.6766) creates a string that\
    \ contains the value 67.6766 before assigning it to the variable thisString. This\
    \ allows programmers to go back and forth in converting letters to numbers or\
    \ vice versa before storing the value in a variable.\n\n## Date and Time\n\nAlmost\
    \ every application requires date and time for it to work effectively. It paces\
    \ which tasks should be done at which particular date and time. Since the computer\
    \ only understands numbers, the concept of date and time does not exist as far\
    \ as the computers are concerned. The only way for them to be able to interact\
    \ with inputs of dates and time is if they are converted into readable values\
    \ that can be stored in variables. The command import datetime allows programmers\
    \ to access date and time. In order to get the current time from the clocks inside\
    \ the computer, you can use the command datetime.datetime.now(). For example,\
    \ if the date is June 12, 2015 and the time is 4:00 in the morning and you typed\
    \ in: datetime.datetime.now() the said command will respond with the following\
    \ output: datetime.datetime(2015, 6, 12, 4, 0, 0, 0). Since this output can be\
    \ hard to read and interpret, you can arrange the output by using: str(datetime.datetime.now().date()).\
    \ One of the upsides of Python is that the language has a time() command which\
    \ can be used to get the exact time. The following reserved words can also be\
    \ used to evaluate their corresponding exact values: microsecond, second, minute,\
    \ hour, year, month and day.\n\n## Performing Repetitive Tasks\n\nThis book has\
    \ given concise examples on how to perform a single loop task. There are instances\
    \ however when an application might require constant and continuous evaluation\
    \ until it reaches a certain point where a desired value is reached and therefore,\
    \ evaluated. Python allows the performance of repetitive tasks using the for statement.\n\
    \n### For Statement\n\nFor Python users, the for statement is the first command\
    \ that beginners need to learn. Almost all known conventional computer languages\
    \ use for statements. For statements determine how many times loops will be executed\
    \ in the program. Unlike the succeeding loop commands, the number of repetitions\
    \ in the for loop is already determined.\n\nHere's an example of a for statement:\
    \ for Alpha in \"Good Morning, Python!\":\nThe command is introduced by the keyword\
    \ for. The next word is the variable which will contain an assigned value. In\
    \ the example, the name of the variable is Alpha. The word in signals the start\
    \ of the string, \"Good Morning, Python!\". The colon caps the whole command.\n\
    \nThe next line must be indented to signify that all indented commands under the\
    \ for statement will serve as the instruction loop that the computer will follow\
    \ as part of the for loop.\n\nIn order to create a basic for loop, consider the\
    \ following:\n1. Open the Python Edit window.\n2. Key in the example code block\
    \ below:\n\n```python\nAlphaNum = 1\nfor Alpha in \"Good Morning!\":\n    print(\"\
    Letter \", AlphaNum, \" is \", Alpha)\n    AlphaNum += 1\n```\n\nThis example\
    \ uses the variable AlphaNum given a beginning value of 1 which is adjusted in\
    \ the loop by adding 1 in every cycle. Each letter is then stored in the variable\
    \ Alpha.\n\n3. Run the module.\n\nThe Python Shell window pops out and displays\
    \ the output:\nLetter 1 is G\nLetter 2 is o\nLetter 3 is o\nLetter 4 is d\nLetter\
    \ 5 is\nLetter 6 is M\nLetter 7 is o\nLetter 8 is r\nLetter 9 is n\nLetter 10\
    \ is i\nLetter 11 is n\nLetter 12 is g\nLetter 13 is !\n\n## Break Statement\n\
    \nNow if you need to create a program that discriminates an exception in order\
    \ to break the loop, you will need to learn how to use the break statement. For\
    \ example, in manufacturing mobile phones, a specific part ran out of supply,\
    \ the whole process must stop and wait for the depleted part to restock. The break\
    \ clause allows the statement to break out of the loop. For example:\n1. Open\
    \ a Python Edit window.\n2. Key in the following code:\n\n```python\nStandard\
    \ = input(\"Input a word with less than ten (10) characters: \")\nAlphaNum = 1\n\
    for Word in Standard:\n    print(\"Letter \", AlphaNum, \" is \", Word)\n    AlphaNum\
    \ += 1\n    if AlphaNum > 10:\n        print(\"The string is too lengthy!\")\n\
    \        break\n```\n\nThis example creates the variable Standard in which the\
    \ customers are allowed to input at most ten characters. If this system discovers\
    \ that it has performed the loop more than ten times, it stops and displays an\
    \ error message saying that, \"The string is simply too lengthy!\" The if assertion\
    \ provides the condition that needs to be fulfilled with the break statement."
  mdcn: "在最大结构中，整数可以处理-9,223,372,036,854,775,808到其有效对应值之间的任何数字。这个数量是64位整数的最大值。\n`int`变量具有有趣的功能，这些功能因基数类型而异，例如：(a)\
    \ 仅使用1和0的二进制（Base 2），(b) 使用0到7数字的八进制（Base 8），(c) 类似于十进制系统的十进制（Base 10），(d) 使用0到9数字和字母A到F作为数字的十六进制（Base\
    \ 16）。\n当告诉Python应用特殊的基数系统时，你只需上传0然后是一个特殊的对应字母到范围。以下是Python用来表示基数系统转换的字母：\nB –\
    \ 二进制（Base 2）\nO – 八进制（Base 8）\nX – 十六进制（Base 16）\n例如，`0b1100`是二进制，`0o741`是八进制，`0x123aa`是十六进制。此外，要将它们的值转换为其他基数，你可以使用以下指令：\n\
    `bin()` – 二进制\n`oct()` – 八进制\n`hex()` – 十六进制\n\n## 2. 浮点值\n\nPython将任何带有小数点的数字（即使只是`.0`）视为浮点值。如前面的例子所示，`5.0`不是整数；相反，它是一个浮点数。没有必要担心，因为一旦一个数字有小数部分，它就是一个浮点数。这也意味着这种数据存储在`float`数据类型中。浮点值相对于整数的主要优势是其更大的存储空间，允许存储非常大或非常小的值。这并不意味着它有无限的存储空间。实际上，它可以包含高达1.7976931348623157\
    \ × 10^308和低至± 2.2250738585072014 × 10^-308的值。\n\n有几种方法可以使用浮点值赋值。第一种是直接赋值，第二种是使用上面提供的科学记数法。理解负指数提供等效的分数。\n\
    \n## 3. 复数\n\n也许从基础数学中回顾一下，复数是由一个虚数和一个实数配对组成的数字。这通常用于以下领域：(a) 动态系统，(b) 计算机图形学，(c)\
    \ 量子力学，(d) 流体动力学和(e) 电气工程。\n\n复数还有许多其他用途。由于Python是少数能够处理复数的编程语言之一，这些领域的人们熟悉这种编程语言。\n\
    \n## 布尔值\n\nPython有一种方法可以产生一个直接的答案，这个答案可以是真或假。事实上，计算机可以被指示遵循一个称为布尔代数的数学分支。尽管在乔治·布尔的时代（布尔代数由此得名）还没有计算机，但如今许多计算机语言在编写算法以做出决策或响应时都依赖于所述数学。事实上，布尔代数自1854年以来就存在，远在第一台现代计算机出现之前。\n\
    如果程序员需要布尔代数，他们参考`bool`数据类型。变量只能包含两个响应值：真或假。这种数据类型允许程序员使用上述响应赋值。例如：\n`MyBool =\
    \ 15 < 3.2`\n将给出一个由值`False`表示的响应，因为15不小于3.2。\n\n## 字符串\n\n这种数据类型类似于代表确切含义的单词，使人类更容易在日常生活中使用它。字符串是一组字符（不一定是可理解的单词），由双引号连接在一起。例如：\n\
    `ThisString = \"I love to learn the Python language!\"`\n此命令将短语\"I love to learn\
    \ the Python language!\"赋值给变量`thisString`。为了让你理解计算机如何理解这个命令，你应该知道计算机看不到字母。相反，双引号内的每个字母都由一个唯一的数字表示。例如，字母A由65表示，因此当你输入命令：`ord(\"\
    A\")`时，该命令将输出65。你可以尝试其他字母来检查它们的数字等效值。由于计算机无法处理字母，你必须将字符串转换为数字。在这种情况下，你可以使用命令`float()`或`int()`。例如：`ThisInt\
    \ = int(\"6766\")`将整数6766而不是字符串6766赋值给变量`thisInt`。Python还允许用户使用命令`str()`将数字转换为字符串等效值。例如：`ThisString\
    \ = str(67.6766)`创建一个包含值67.6766的字符串，然后将其赋值给变量`thisString`。这允许程序员在将值存储在变量中之前，在将字母转换为数字或反之亦然之间来回转换。\n\
    \n## 日期和时间\n\n几乎每个应用程序都需要日期和时间才能有效工作。它安排任务应在哪个特定日期和时间完成。由于计算机只理解数字，日期和时间的概念在计算机方面不存在。它们能够与日期和时间输入交互的唯一方法是将它们转换为可读的值，这些值可以存储在变量中。命令`import\
    \ datetime`允许程序员访问日期和时间。为了从计算机内部的时钟获取当前时间，你可以使用命令`datetime.datetime.now()`。例如，如果日期是2015年6月12日，时间是凌晨4:00，你输入：`datetime.datetime.now()`，该命令将响应以下输出：`datetime.datetime(2015,\
    \ 6, 12, 4, 0, 0, 0)`。由于此输出可能难以阅读和解释，你可以使用：`str(datetime.datetime.now().date())`来安排输出。Python的优点之一是该语言有一个`time()`命令，可用于获取确切时间。以下保留字也可用于评估其相应的精确值：`microsecond`、`second`、`minute`、`hour`、`year`、`month`和`day`。\n\
    \n## 执行重复任务\n\n本书提供了关于如何执行单个循环任务的简洁示例。然而，有时应用程序可能需要持续和连续的评估，直到达到某个点，达到期望的值并因此进行评估。Python允许使用`for`语句执行重复任务。\n\
    \n### For语句\n\n对于Python用户来说，`for`语句是初学者需要学习的第一个命令。几乎所有已知的传统计算机语言都使用`for`语句。`for`语句确定程序中循环将执行多少次。与后续的循环命令不同，`for`循环中的重复次数已经确定。\n\
    \n这是一个`for`语句的例子：`for Alpha in \"Good Morning, Python!\":`\n该命令由关键字`for`引入。下一个单词是将包含赋值的变量。在示例中，变量的名称是`Alpha`。单词`in`表示字符串\"\
    Good Morning, Python!\"的开始。冒号结束整个命令。\n\n下一行必须缩进，以表示`for`语句下所有缩进的命令将作为计算机将遵循的指令循环，作为`for`循环的一部分。\n\
    \n为了创建一个基本的`for`循环，请考虑以下步骤：\n1. 打开Python编辑窗口。\n2. 输入下面的示例代码块：\n\n```python\nAlphaNum\
    \ = 1\nfor Alpha in \"Good Morning!\":\n    print(\"Letter \", AlphaNum, \" is\
    \ \", Alpha)\n    AlphaNum += 1\n```\n\n此示例使用变量`AlphaNum`，其初始值为1，在循环中通过每次循环加1进行调整。然后每个字母存储在变量`Alpha`中。\n\
    \n3. 运行模块。\n\nPython Shell窗口弹出并显示输出：\nLetter 1 is G\nLetter 2 is o\nLetter 3 is\
    \ o\nLetter 4 is d\nLetter 5 is\nLetter 6 is M\nLetter 7 is o\nLetter 8 is r\n\
    Letter 9 is n\nLetter 10 is i\nLetter 11 is n\nLetter 12 is g\nLetter 13 is !\n\
    \n## Break语句\n\n现在，如果你需要创建一个程序来区分异常以中断循环，你需要学习如何使用`break`语句。例如，在制造手机时，如果某个特定部件供应耗尽，整个过程必须停止并等待耗尽的部件补充库存。`break`子句允许语句跳出循环。例如：\n\
    1. 打开一个Python编辑窗口。\n2. 输入以下代码：\n\n```python\nStandard = input(\"Input a word with\
    \ less than ten (10) characters: \")\nAlphaNum = 1\nfor Word in Standard:\n  \
    \  print(\"Letter \", AlphaNum, \" is \", Word)\n    AlphaNum += 1\n    if AlphaNum\
    \ > 10:\n        print(\"The string is too lengthy!\")\n        break\n```\n\n\
    此示例创建变量`Standard`，用户最多可以输入十个字符。如果此系统发现它已执行循环超过十次，它将停止并显示错误消息，指出\"The string is\
    \ simply too lengthy!\"。`if`断言提供了需要满足的条件，以及`break`语句。"
