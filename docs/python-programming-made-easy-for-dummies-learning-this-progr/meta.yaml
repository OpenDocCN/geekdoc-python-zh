    \ 可以执行以下与 Python 相关的任务：(a) 编写 Python 代码，(b) 保存和运行 Python 数据和文件，(c) 执行简单的编辑，如复制、剪切和粘贴，(d)\
    \ 浏览和发现特定的 Python 文档，(e) 通过执行调试策略来消除错误，以及 (f) 突出显示和理解来自独特文本数据的重要代码和关键字。\n上述大多数功能都可以使用命令行界面执行，但这需要时间和精力。例如，你可以使用命令行界面执行调试方法，但这是以手动且容易出错的方式执行的。这使得使用\
    \ IDLE 的难度降低了好几倍。\n\n### 开发程序\n\n既然你已经熟悉了 Python 系统，是时候创建你的第一个 Python 程序了。在开发一个程序时，你可以通过打开一个新窗口来输入你的指令开始。输入命令后，你可以将文件保存在存储设备中，该设备将作为运行程序的数据库。\n\
    \n1. **启动新窗口**\n   Python Shell 窗口是一个交互式窗口，它提供对系统中输入的每个命令的即时反馈。Python 是一个静态环境，允许你输入命令并保存它们以供将来使用。\n\
    \   要打开一个新窗口，请点击：\n   `File` ⇨ `New File`\n   编辑窗口的使用与文本编辑器非常相似。它还可以访问基本命令，包括剪切、复制和粘贴。按回车键不会执行命令，而是将你带到特定的命令行。\n\
    \n2. **输入命令**\n   使用你武器库中的操作命令，只需在平台提供的空间中输入命令。\n\n3. **保存文件**\n   在你能够运行文件之前，你需要保存文件。这是系统在你出错时冻结代码的方式。这保证了代码的安全性和完整性。在找出哪里出了问题、发现错误、进行重要修正时，通常第一步是保存文档。这使得系统更容易运行程序并查看可能的错误点。\n\
    \n保存文件时，请遵循以下方式：\n`File` ⇥ `Save`\n这将打开“另存为”对话框。默认情况下，编辑窗口选择与应用程序安装文件夹相关联的目标文件夹。鉴于此文件夹包含\
    \ Python 代码，经验丰富的程序员会创建文件夹来存储软件代码。\n在文件名部分，填入你想要的程序名称。例如，如果你想将其命名为：`MyFirstProject`\n\
    \n### 运行程序\n\n为了确定编码程序的成功，你应该能够运行它们。Python 将尝试翻译代码并从解释中执行许多计算机功能。\nPython 的优势之一是它提供了多种运行程序的方法。要运行你的程序，请点击：\n\
    `Run` ⇥ `Run Module`\n一个新的 Python Shell 窗口将打开以显示输出。\n\n## 第 4 章。Python 数据类型\n\n\
    为了有效地处理事实，Python 将输入信息分类为多个类别。这些类别作为信息存储区域，可以在 Python 平台运行时随时访问。此外，这还在修改特定事实位时为准则提供了形状。否则，系统可能无法工作。\n\
    \n### 变量\n\n与代数类似，变量包含分配给它们的特定值。在编写更复杂的程序代码时，将记录保存在变量中至关重要。\n在 Python 中，变量是一种存储容器，每次你想使用或处理其中保存的记录时都可以访问它。例如，如果你需要用户输入他们的姓氏，你可以创建一个变量来存储与他们姓氏相对应的输入。\n\
    为了让他们更容易完成工作，程序员使用变量来确保从最终用户收集的统计数据是安全的。任何形式的事实，从日期和时间、数字和字母，都可以保存在变量中。\n为了将统计数据放入变量中，你需要创建一个使用赋值运算符\
    \ `=` 的命令。例如，如果你想将数字 3 分配给变量 `defVar`，请输入 `defVar = 3` 然后按回车键。\n\n### 数字类型\n\n\
    如果在算术中，数字 5 和 5.0 是相同的，但 Python 对它们的看法不同。为了使 Python 能够处理这种多样性，它知道 5 和 5.0 经历不同的记录处理策略。以下是你应该熟悉的数字类型：\n\
    \n1. **整数**\n   整数是任何完整的数字。例如，5 是一个完整的数字，但由于小数部分，5.0 不是一个完整的数字。在这种情况下，Python 知道\
    \ 5 是一个整数，因此可以通过 `int` 数据类型来表征。\n   与变量类似，数字类型，特别是整数，在容量方面有限制。如果候选者尝试处理超出 Python\
    \ 正常限制的值，将会发生错误。"
