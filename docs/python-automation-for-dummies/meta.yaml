  - '[PAGE 313]


    To use Hugging Face, even for free, you''ll need to first set up a free account.
    Then you''ll need an API token, which is basically the same thing as an API key.
    You can get one at https://huggingface.co/settings/tokens after you set up your
    account.


    Chapter 9 discusses APIs and API keys in detail.


    I''ll show you a complete script for generating images from Hugging Face in a
    moment. But to get started with this script, set up a folder and virtual environment
    as you normally would. Activate your virtual environment, and enter the following
    command to install all the required dependencies:


    ```

    pip install gradio requests Pillow python-dotenv

    ```


    In keeping with security best practices (and good habits), I suggest you also
    create a .env file and store your API key there. Figure 15-8 shows an example.


    ![](img/10d8e89b301a0e7452bff4d402265e78_313_0.png)


    The API key in Figure 15-8 is fake and used only as an example. Make sure to put
    your own API key in your own .env file.


    Here''s all the code for the script to generate images using a Hugging Face model.
    As in the previous code example, I use gradio to provide a nice graphical interface
    that can show the generated image.


    ```

