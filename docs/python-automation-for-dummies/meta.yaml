    \ you see in this book use considerable exception handling to prevent unforeseen\
    \ problems from causing a program to crash unexpectedly. This principle emphasizes\
    \ writing robust, reliable programs that always handle errors properly and gracefully.\
    \ In other words, a script should always alert the user to any error condition\
    \ in a way that allows the user (or a programmer, if you’re still writing the\
    \ code) to remedy the situation.\n\nPerhaps the best way to explain this is with\
    \ a super simple example where a script just asks for two numbers and then returns\
    \ the result of the first number divided by the second number:\n\n```\n# Bad example:\
    \ Ignoring errors\nnumber1 = float(input(\"Enter the first number: \"))\nnumber2\
    \ = float(input(\"Enter the second number: \"))\nresult = number1 / number2  #\
