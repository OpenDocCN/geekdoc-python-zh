    \n让我们聚焦于自动化——本书的主题。在自动化方面，Python是超级明星。无论你使用Linux、macOS还是Windows，Python都能完美运行。只需编写一次自动化脚本，它就能在任何地方运行。无需为不同的系统重复造轮子。\n\
