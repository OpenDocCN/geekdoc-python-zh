- md: "Amazon, Google, Meta, Microsoft, PayPal, Salesforce, Shopify, Stripe, Twilio,\
    \ and X (formerly Twitter) are just a few of the major tech companies offering\
    \ REST APIs to developers. Many of those companies offer REST APIs specifically\
    \ for AI. Major players in the AI world offering REST APIs include Anthropic,\
    \ DeepSeek, Hugging Face, OpenAI, Stability AI, xAI, and others.\n\n> Not all\
    \ REST APIs are free. However, many offer a free tier so you can learn and test\
    \ your code for free.\n\nAny script that interacts with a REST API is likely to\
    \ use the `requests` library. That's not part of the standard library. When you're\
    \ writing Python code to interact with a REST API, make sure to create and activate\
    \ a virtual environment. Enter a `pip install requests` command in the Terminal.\
    \ Include an `import requests` command in your code.\n\n## Making API requests\n\
    \nA REST API request happens when your Python code requests information from a\
    \ REST API on the internet. Each request gets a response that includes a status\
    \ code to indicate whether the request succeeded or failed.\n\nYou can make five\
    \ main types of requests:\n\n| Type of Request | What It Does |\n|---|---|\n|\
    \ GET | Retrieves data from a server. GET is used to fetch information only. This\
    \ is the most common type of request when you're interacting with AI. It returns\
    \ status code 200 (OK) on success. |\n| POST | Sends data to the server to create\
    \ a new resource. POST is typically used with databases to insert a new record\
    \ into a database table. It returns status code 201 (Created) on success. |\n\
    | PUT | Updates an existing resource with new data. PUT is typically used to change\
    \ a record in a database table. It returns 200 (OK) or 204 (No Content) on success.\
    \ |\n| DELETE | Removes a resource from the server. DELETE is typically used to\
    \ delete a record from a database. It returns 204 (No Content) on success. |\n\
    | PATCH | Partially updates a resource, such as a single field in a database record.\
    \ It returns 200 (OK) or 204 (No Content) on success. |\n\n> Don't worry if you're\
    \ not already familiar with database terminology like tables and records. That\
    \ knowledge isn't required for Python or Python automation.\n\nThere is no hard-and-fast\
    \ rule that applies to every REST API request, but most include at least some\
    \ of the following components:\n\n- **URL/endpoint:** The URL to which the request\
    \ is sent (for example, https://api.example.com/data).\n- **Headers (optional):**\
    \ A dict of metadata sent with the request, which may include things like authentication\
    \ tokens or API keys.\n- **Query parameters (optional):** Key-value pairs appended\
    \ to the URL or passed as a dictionary (for example, params={\"key\": \"value\"\
    }).\n- **Response handling:** Code that processes the server's response (for example,\
    \ .json() to parse JSON or response.status_code to check for success).\n\nThe\
    \ documentation for the REST API will tell you the URL/endpoint to which you'll\
    \ send your request. For example, to get the current weather for any location,\
    \ use the URL https://api.openweathermap.org/data/2.5/weather.\n\nYou must include\
    \ your API key in a parameter named `appid`. You can send numerous optional parameters.\
    \ For example, if you want to get the weather for a city in the United States,\
    \ and you want the temperature expressed in degrees Fahrenheit, use the `q` parameter\
    \ to specify the city and state and use the `units` parameter with the value \"\
    imperial\" for Fahrenheit.\n\nSpecify the URL to which you'll send the request\
    \ (as specified in the OpenWeatherMap API documentation). In this example, let's\
    \ assume you have the key in the .env file, as shown in the \"Making API requests\"\
    \ section, earlier in this chapter, assigned to the name WEATHER_API_KEY as follows:\n\
    \n```\nWEATHER_API_KEY=8c21435c4317367221435aac09bf4c1d\n```\n\n> The API key\
    \ shown in the example isn't a valid one — it's just an example. Make sure to\
    \ get your own API key from https://openweathermap.org and use that key to try\
    \ out the code.\n\nHere is a more complete example that includes the `import os`\
    \ and `load_dotenv` code needed to access the .env file, followed by a complete\
    \ REST API request for OpenWeatherMap, with lots of comments to explain what's\
    \ going on:\n\n```python\nfrom dotenv import load_dotenv\nimport os\n\n# Load\
    \ the .env file\nload_dotenv()\n\n# Retrieve the API key from the environment\
    \ variable\nAPI_KEY = os.getenv(\"WEATHER_API_KEY\")\n\n# OpenWeatherMap API endpoint\
    \ for current weather data\nurl = \"https://api.openweathermap.org/data/2.5/weather\"\
    \n\n# Put parameters in a dictionary.\nparams = {\n    \"appid\": API_KEY,\n \
    \   \"q\": \"San Diego, CA USA\",\n    \"units\": \"imperial\"  # Change to \"\
    metric\" if Celsius is preferred\n}\n\n# Send a GET request to the API endpoint\
    \ with the defined parameters\nresponse = requests.get(url, params=params)\n```\n\
    \nThat last line sends the actual API request. The response from the API will\
    \ be placed in the variable named response.\n\n## Parsing API responses\n\nAfter\
    \ you send an API request, the server sends a response, usually within a few seconds,\
    \ depending on what you've requested. In the code in the preceding section, that\
    \ response is stored in a variable named `response`. Let's assume I follow that\
    \ line of code with two `print` statements — one to print the data type of the\
    \ response and the other to print the actual response, like this:\n\n```python\n\
    response = requests.get(url, params=params)\nprint(type(response))\nprint(response)\n\
    ```\n\nRunning the script, and assuming you get a valid response, displays the\
    \ following in the Terminal:\n\n```\n<class 'requests.models.Response'>\n<Response\
    \ [200]>\n```\n\nThe data type, `requests.models.Response`, indicates that the\
    \ response is a Response object from the `requests` library. The `200` is the\
    \ status code, indicating that the transaction was successful. Perhaps you're\
    \ now wondering where the actual data, the weather in the requested city, is located.\n\
    \nA more realistic way to handle the data would be to use an `if` statement to\
    \ verify that the transaction was successful first. If it was, use `response.json()`,\
    \ a method of the `requests` library, to convert the response to a Python dictionary.\
    \ Then print the data type and contents of the response, as follows:\n\n```python\n\
    response = requests.get(url, params=params)\n# Check if the request was successful\n\
    if response.status_code == 200:\n    # Parse the response JSON into a Python dictionary\n\
    \    data = response.json()\n    print(type(data))\n    print(data)\n```\n\nIn\
    \ the Terminal, the output looks like this:\n\n```\n<class 'dict'>\n{'coord':\
    \ {'lon': -117.1573, 'lat': 32.7153}, 'weather': [{'id': 804, 'main':\n'Clouds',\
    \ 'description': 'overcast clouds', 'icon': '04n'}], 'base':\n'stations', 'main':\
    \ {'temp': 59.02, 'feels_like': 58.28, 'temp_min': 57.29,\n'temp_max': 60.6, 'pressure':\
    \ 1014, 'humidity': 78, 'sea_level': 1014, 'grnd_\nlevel': 1010, 'visibility':\
    \ 10000, 'wind': {'speed': 5.75, 'deg': 320},\n'clouds': {'all': 100}, 'dt': 1746187856,\
    \ 'sys': {'type': 2, 'id': 2095167,\n'country': 'US', 'sunrise': 1746190812, 'sunset':\
    \ 1746239447}, 'timezone':\n-25200, 'id': 5391811, 'name': 'San Diego', 'cod':\
    \ 200}\n```\n\nThe `<class 'dict'>` tells you that the data variable contains\
    \ a Python dictionary. The second line is all the data received from the OpenWeatherMap\
    \ REST API, which includes much more information than just the temperature. For\
    \ example, 'lon' is the longitude, 'lat' is the latitude, and 'temp' is the current\
    \ temperature. There's also visibility, clouds, humidity, sunrise, sunset . .\
    \ . all kinds of information. You can refer to the OpenWeatherMap API documentation\
    \ for anything you don't understand.\n\nRealistically, you're probably going to\
    \ want to display the information in a more user-friendly way. But I wanted to\
    \ show you how you can \"inspect\" the true nature of the response from the REST\
    \ API, so that, in your own code, you can figure out how to retrieve information\
    \ from a REST API, pick apart the response, and then choose what you want to show\
