    \ initial definition `def` statement.\n\nSubsequent code in your script can *call*\
    \ the function by name followed by parentheses.\n\nMost functions accept one or\
    \ more parameters as input. Code within the function then performs some operation\
    \ on that input and returns a single value as the result. Here's an example where\
    \ a function named `calculate_area` accepts two values: `width` and `height` (presumably\
    \ of a rectangle). Code inside the function then multiplies `width` and `height`\
    \ to calculate the area of the rectangle and stores it in a variable named `area`.\
    \ The value of `area` is then returned to the calling code in the last line, `return\
    \ area`.\n\n```\n# A function to calculate and return the area of a rectangle\n\
