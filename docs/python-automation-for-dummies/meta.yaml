  md: 'This message is unnerving when you’re intending to write Python code. But keep
    in mind that VS Code is a generic code editor, not tied to any one programming
    language and not tied to any specific version of Python.


    When you first open VS Code, in Windows, you can use `py` as a stand-in for the
    `python` command; use `python3` on macOS. For example, in the VS Code Terminal,
    entering the command `py -V` on Windows or `python3 -V` on macOS will reveal the
    current Python version.


    To select a Python version choose View: Command Palette. If you don’t see the
    option to select an interpreter, type **sel** and then click Python: Select Interpreter.
    Then click whichever Python version displays as Recommended (unless you regularly
    work with multiple Python versions and have good reason to choose some older version
    of Python).


    Using the `python` command directly at the command line in VS Code won’t work
    until you activate a virtual environment. If you’ve already created one, its folder
    name will be visible in VS Code’s Explorer pane (see Figure 17–1). You don’t need
    to create another virtual environment if the current project already has one.


    ![](img/10d8e89b301a0e7452bff4d402265e78_343_0.png)


    If you haven’t yet created a virtual environment, create one. In Windows you can
    enter the following command:


    ```

    bash

    py -m venv .venv

    ```


    In Linux or macOS, use the following:


    ```

    bash

    python3 -m venv .venv

    ```'
