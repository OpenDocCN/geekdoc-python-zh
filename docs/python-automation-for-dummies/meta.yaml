- md: '## Backing Up Files


    Backing up files is a critical practice to prevent data loss. A backup is a copy
    of your important data that you can restore if the original files are lost, corrupted,
    or accidentally deleted.


    There are several common methods for backing up files:


    -   **Copy to an external drive:** This involves manually copying files to a USB
    flash drive, external hard drive, or other removable storage media.

    -   **Use cloud storage services:** Services like Google Drive, Dropbox, or OneDrive
    allow you to upload files to remote servers, making them accessible from any device
    with an internet connection.

    -   **Use backup software:** Many operating systems include built-in backup tools
    (like Windows Backup or Time Machine for macOS) that can automate the process
    of creating and managing backups.

    -   **Create a system image:** This is a complete snapshot of your entire system,
    including the operating system, applications, and all files. It can be used to
    restore your computer to a specific point in time.


    When creating a backup, it''s important to follow the **3-2-1 rule**:


    -   Keep at least **3** copies of your data.

    -   Store the copies on **2** different types of media (e.g., an external hard
    drive and a cloud service).

    -   Keep **1** copy offsite (e.g., in the cloud or at a different physical location).


    Regularly testing your backups by performing a test restore is also essential
    to ensure they are working correctly and that you can recover your data when needed.'
  mdcn: '## 备份文件


    备份文件是防止数据丢失的关键实践。备份是您重要数据的副本，当原始文件丢失、损坏或意外删除时，您可以恢复这些数据。


    备份文件有几种常见方法：


    -   **复制到外部驱动器：** 这涉及将文件手动复制到USB闪存驱动器、外部硬盘驱动器或其他可移动存储介质。

    -   **使用云存储服务：** 像Google Drive、Dropbox或OneDrive这样的服务允许您将文件上传到远程服务器，使其可以从任何有互联网连接的设备访问。

    -   **使用备份软件：** 许多操作系统包含内置的备份工具（如Windows备份或macOS的时间机器），可以自动化创建和管理备份的过程。

    -   **创建系统映像：** 这是您整个系统的完整快照，包括操作系统、应用程序和所有文件。它可用于将计算机恢复到特定时间点。


    创建备份时，遵循**3-2-1规则**非常重要：


    -   至少保留**3**份数据副本。

    -   将副本存储在**2**种不同类型的介质上（例如，外部硬盘驱动器和云服务）。

    -   保留**1**份异地副本（例如，在云端或不同的物理位置）。


    定期通过执行测试恢复来测试您的备份也至关重要，以确保它们正常工作，并且您可以在需要时恢复数据。'
