  md: '# Collecting account information


    To send emails automatically, you’ll need some technical information about your
    email account. Typically, you can find this by logging into your email account
    via a web browser and searching its documentation or settings or by asking AI.
    To set up an automation script for your own email, you’ll need the following information
    about your email account and service provider:


    +   » **Username:** The username you use to log into your email account

    » **Password:** The password you use to log into your email account

    » **Email address:** Could be the same as your username

    » **Simple Mail Transfer Protocol (SMTP) server address:** A URL for sending email
    messages (typically something like smtp.gmail.com or smtp-mail.outlook.com)

    » **SMTP port:** Typically 587 for Transport Layer Security (TLS) or 465 for Secure
    Sockets Layer (SSL)


    SMTP is a standard protocol used for sending emails across the internet. It’s
    used by popular email services, including Gmail, Microsoft Outlook, Proton Mail,
    Yahoo! Mail, and many others.


    TLS is a newer, more secure protocol for internet encryption. It uses port 587.
    SSL is older and less secure and uses port 465.


    # Creating a .env file


    Putting passwords and other sensitive data directly into your Python code risks
    exposing that information to others, if you share your code or post it to GitHub.
    You’re better off putting that information in a .env file in the same folder as
    your code, and not sharing it with your source code.


    To create a .env file, first create your project folder normally. Create and activate
    a virtual environment. Enter the following command in the Terminal to install
    the dotenv module:


    ```

    pip install python-dotenv

    ```


    If you’re using VS Code, create the .env file the same way you’d create a new
    script. But don’t use a .py extension. Instead, just name the file .env with no
    extension. You can then create variables and values for your account information
    like the example shown in Figure 12–1.'
