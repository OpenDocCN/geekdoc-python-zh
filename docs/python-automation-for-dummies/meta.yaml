- md: '## Introduction


    Welcome to *Python Automation For Dummies*, the book designed to help you find
    out all about Python and the many things you can do with Python to automate tedious,
    mundane, and time-consuming computer tasks.


    ### About This Book


    You don''t need to read this book cover-to-cover to benefit. Instead, you can
    treat it more like a reference for building Python automation scripts and apps
    as needed, just by flipping to any example in the book and using the code provided
    in that section. Of course, I always explain the code so you understand what''s
    going on. That knowledge, in turn, will grow and help you come up with your own
    creative solutions to automation tasks and other apps.


    This is not a textbook on the Python language. I don''t attempt to teach you every
    nook and cranny of the Python language. There are plenty of books available for
    that, including *Python All-in-One for Dummies* and *Python Essentials For Dummies*
    (published by Wiley), both of which I wrote with John Shovic.


    For convenience, the kinds of tasks and code you''ll use often are summed up in
    Part 1 of this book. When you need a quick reminder on a fundamental task, such
    as starting a new app from scratch, you''ll find all the steps there. Common error
    messages and such are covered in Chapter 17, so you can get clarification and
    advice in a jiffy.


    When something in Python leaves you stumped, use this book as a reference, paging
    through the table of contents or index to the spot that deals with that bit of
    information.


    Within this book, you may note that some web addresses break across two lines
    of text. If you''re reading this book in print and want to visit one of these
    web pages, simply key in the web address exactly as it''s noted in the text, pretending
    as though the line break doesn''t exist. If you''re reading this as an e-book,
    you''ve got it easy — just click the web address to be taken directly to the web
    page.


    ### Foolish Assumptions


    This book doesn''t assume you''re already an accomplished software engineer with
    years of experience writing Python code. I do assume that you''re tech savvy enough
    to understand common tech jargon like *files*, *folders*, *icons*, *copy*, *paste*,
    *gigabytes*, and so forth.


    If I assume too much, there are plenty of resources available to you to fill in
    the blanks. Artificial intelligence (AI) is usually your best bet for getting
    quick definitions and answers to tech questions. Any free AI will do. In Windows,
    you can use Copilot. On a Mac, you can use Apple Intelligence. Or you can use
    any AI that includes a free tier such as ChatGPT at https://chatgpt.com.


    ### Icons Used in This Book


    Throughout this book, I use icons in the margin to point out content that''s perhaps
    a little offbeat relative to the main flow of the text. Here''s the kind of content
    each icon represents:


    - **TIP**: The Tip icon alerts you to juicy information that makes computing easier
    — a time-saver or shortcut that''s worth keeping in mind, for example.

    - **REMEMBER**: Don''t forget to remember these important points because you''re
    likely to need the information often. These are usually items that are easy to
    forget but well worth remembering.

    - **WARNING**: When an operation could have unpleasant consequences that aren''t
    easily undone, the Warning icon alerts you to the dangers and tells you how to
    avoid that danger. Always pay attention to this icon.

    - **TECHNICAL STUFF**: I use the Technical Stuff icon when I get into the weeds
    on a particular subject. You can ignore anything marked with this icon without
    missing the main point.


    ### Beyond the Book


    In addition to the material in the print or e-book you''re reading right now,
    this product also comes with a free access-anywhere Cheat Sheet that covers Python
    data types and keywords, arithmetic and string operators, assignment operators,
    and more. To get this Cheat Sheet, simply go to www.dummies.com and enter **Python
    Automation For Dummies Cheat Sheet** in the Search box.


    In addition, I provide all the source code for this book at www.dummies.com/go/pythonautomationfd.
    Finally, at that same URL you’ll find a bonus chapter called “Managing and Speeding
    Up the Big Jobs.”


    ### Where to Go from Here


    Where you go from here is up to you! If you need a specific automation script,
    go to the section that describes the script you need to see *all* of the code
    for that script — not a lengthy tutorial on how to write the script. If you’re
    new to Python and you don’t have a lot of experience writing Python code, Chapter
    1 is a great place to start.


    ## 1 Getting Started with Python Automation


    **IN THIS PART . . .**


    - Get Python onto your computer.

    - Download a free editor to write Python code.

    - Run your Python code.

    - Master main components of Python for automation.


    **IN THIS CHAPTER**


    - Deciding on a programming language

    - Mastering Python language basics

    - Getting up and running with Python


    ### Chapter 1

    Automating with Python


    Welcome to Python automation! In this chapter, you explore why Python is the ideal
    language for automating mundane, time-consuming computer tasks. If you’ve ever
    found yourself stuck doing the same boring computer chores over and over — like
    renaming a bazillion files, sorting through spreadsheets, or downloading stuff
    from the web — Python may just become your new best friend. It’s a programming
    language that’s easy to pick up, even if you’re not a tech wizard, and it’s perfect
    for automating those mind-numbing tasks that eat up your time. Think of Python
    as a trusty robot assistant: You tell it what to do in plain, simple words (well,
    code), and it does your work in no time at all.


    What makes Python so great for automation is the fact that it has a little something
    for everyone. Python has built-in tools to handle all sorts of everyday tasks
    — like managing files, crunching data, bossing around your computer — and a huge
    pile of free add-ons (called *libraries*) can do even fancier things, like scraping
    websites or sending emails. You don’t need to be a coding genius to get started
    — just a few lines of Python can save you hours of clicking and typing. So, whether
    you’re organizing your music collection or taming a messy inbox, Python’s got
    your back, making life a whole lot easier with a few friendly commands.


    ### THINKING LIKE A SOFTWARE ENGINEER: PUTTING ARTIFICIAL INTELLIGENCE TO WORK
    FOR YOU


    Writing Python automation requires writing computer code. This book isn''t a replacement
    for a beginner''s tutorial on the entire Python language. Instead, it''s a collection
    of Python automation scripts, designed to automate and simplify mundane, time-consuming
    computer tasks.


    These days, most software engineers (people who write computer code for a living)
    use artificial intelligence (AI) to help with writing code. Sure, you''ll hear
    many software engineers complain that AI can''t write code as well as they can,
    but that sentiment may be rooted in feeling threatened.


    In addition to writing code, AI can easily answer any questions that come up along
    the way as you''re using this book. If I throw some terminology at you that leaves
    you scratching your head, ask AI to explain things. If some code leaves you stymied,
    show the code to AI and ask it to explain the code to you.


    You can even tell AI to write an entire script for you, doing exactly what a script
    in this book does. But don''t be surprised if the code you get from AI looks different
    from what''s in this book. Python offers many tools and techniques for accomplishing
    any task. There''s no telling exactly how AI will generate code to perform some
    feat. If AI gives you a script that looks nothing like the script in this book,
    that doesn''t mean one is right and the other is wrong — you probably just have
    two scripts that do the same thing in different ways. That''s not unusual. They
    say there''s more than one way to bake a cake. Likewise, there''s more than one
    way to write a script to accomplish some task.


    ### Choosing a Programming Language


    There are many programming languages in the world. They have names like C#, Go,
    Java, JavaScript, Python, and TypeScript, to name a few. The TIOBE Index (www.tiobe.com/tiobe-index)
    consistently ranks Python as the most popular language of our time.


    JavaScript is great for creating web apps, but it''s rarely used for anything
    else. Python excels at AI and automation. In fact, Python has so many ready-to-use
    modules designed for automation that it would probably be crazy to use any language
    *other* than Python for the kinds of automation scripts you''ll see throughout
    this book.'
