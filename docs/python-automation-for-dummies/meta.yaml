  md: 'Adding a `.gitignore` file to your project won''t affect how your Python code
    works. The `.gitignore` file just prevents any files or folders listed in its
    contents from being pushed to a GitHub repository if you decide to share your
    Python code with the world using GitHub.


    # Using an API key in your script


    To use the API from the `.env` file in your code, you need to `pip install python-dotenv`
    into your virtual environment. Then include all the following lines near the top
    of your Python script:


    ```

    from dotenv import load_dotenv

    import os


    # Load the .env file

    load_dotenv()


    # Get the API key

    api_key = os.getenv("SAMPLE_API_KEY")

    ```


    The variable to the left of `=` `os.getenv` can be any valid Python variable name
    you like, but make sure the name inside the parentheses and quotation marks after
    `os.getenv` exactly matches the name you gave to the API key inside the `.env`
    file.


    Throughout the rest of your code, use the variable name at the left side of that
    line (`api_key` in the example) anywhere you need to provide your API key. You''ll
    see an example in the "Making API requests" section in this chapter.


    # Handling JSON Data


    JavaScript Object Notation (JSON) is a data format used for storing and exchanging
    data. The *JavaScript* part of the name is just because its syntax resembles JavaScript,
    which uses lots of curly braces (`{}`). JSON is widely supported across programming
    languages and platforms, and it''s commonly used in APIs, as well as for configuration
    files and data storage.'
