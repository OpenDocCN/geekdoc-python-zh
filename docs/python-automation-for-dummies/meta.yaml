  md: "# Submitting a form with Enter\n\nIn addition to typing text into text boxes,\
    \ you typically want your script to submit the text. On page with multiple controls,\
    \ you generally do this by clicking a Submit button. However, just pressing Enter\
    \ after typing your text often works, too, especially with pages that offer a\
    \ single text box like search engines and artificial intelligence (AI) chatbots.\n\
    \nThe Wikipedia site used in the previous script has no Submit button. To search\
    \ the site, you can type your search prompt and press Enter. The script uses the\
    \ following line of code to press Enter while the cursor is still in the Search\
    \ box:\n\n```\nsearch_box.send_keys(Keys.RETURN)\n```\n\nTo use the script with\
    \ another website, first make sure you’re using Chrome as your browser, or adjust\
    \ the imports and set the `driver` variable near the top of the script to your\
    \ preferred browser. Then use the `main()` function shown next to specify your\
