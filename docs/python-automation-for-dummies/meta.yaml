  md: "+   IN THIS CHAPTER\n\n* Getting and storing API keys\n* Working with JSON\
    \ data\n* Making sense of REST APIs\n* Checking out a REST API script\n\n# Chapter\
    \ 9\nInteracting with APIs\n\nMuch of the interaction between your Python scripts\
    \ and internet content will take place through an application programming interface\
    \ (API). To gain access to an API, you typically have to sign up with the API\
    \ provider and obtain an API key, which is a unique code provided by an API provider\
    \ to identify you and your app. Keys are strings of characters and numbers, 20\
    \ to 50 characters in length.\n\nIn this chapter, I show you how to obtain API\
    \ keys, store them safely, and use them with Python to take advantage of internet\
    \ API services. I also show you how to use JSON to format data when interacting\
    \ with APIs.\n\n# Obtaining API Keys\n\nTo obtain an API key, you typically need\
    \ to sign up with the API provider and request access. The steps are usually something\
    \ like this:\n\n+   1. **Go to the website of the API provider, and create a user\
    \ account or sign into your existing account.**\n2. **Navigate to the API section\
    \ of the provider's website.**\n   It's often under a heading like Developer Portal\
    \ or API Dashboard."
  merge: -1
  pgno: 192
- img_proc: true
  md: "+   3. Follow the onscreen instructions to generate an API key.\n   You may\
    \ need to create a project or application on the site.\n4. Agree to the API's\
    \ Terms of Service.\n   After it's generated, your unique API key will be displayed\
    \ on the screen.\n5. Copy the API key and store it a secure place on your own\
    \ computer.\n\n> It may take a couple of hours or more for a new API key to be\
    \ activated for use. Check the documentation on the site where you got the key.\
    \ Watch for any email messages about how long to wait before testing the key.\n\
    \n> Don't share your API key with others or expose the key to the public. Doing\
    \ so could allow others to access the API under your identity to abuse or misuse\
    \ the service. If you're paying for an API service, others using the service on\
    \ your dime could end up costing you a lot of money. (See the next section for\
    \ tips on safely storing your API keys.)\n\n> Not all API keys are free. In this\
    \ chapter, I focus on APIs that were free at the time of this writing, because\
    \ I know people don't always want to set up a paid account when they're just trying\
    \ to learn. But things change, so I apologize in advance if I unwittingly send\
    \ you someplace that asks for payment.\n\n# Safely Storing API Keys\n\nIt's important\
    \ to keep your API keys private, because they identify your account. You don't\
    \ want imposters misusing an API under your identity. If you ever do start using\
    \ paid services, you don't want to be paying for other people to use your account\
    \ either.\n\nUsing a `.env` file is a common way to use API keys without putting\
    \ the key in your Python code. A `.env` file is just a simple text file with the\
    \ name `.env` and no extension. In that file, you can give the key a variable\
    \ name of your own choosing. That way, you can show only the variable name, not\
    \ the actual key, in your code. So, if you share your code with others, your key\
    \ is still hidden.\n\nAs you may know, a variable whose value never changes is\
    \ referred to as a *constant* in Python and other programming languages. Because\
    \ your API key won't change as your script is running, it's actually a constant\
    \ in your code. Though not required, it's customary to show constant names in\
    \ all uppercase letters (to distinguish"
