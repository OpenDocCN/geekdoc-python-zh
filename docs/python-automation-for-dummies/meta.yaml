    \ / Error Messages\", interactive=False)\n\n    generate_btn.click(\n        gradio_generate,\n\
    \        inputs=prompt,\n        outputs=[output_image, status]\n    )\n```\n\n\
    ```\nif __name__ == \"__main__\":\n    demo.launch()\n```"
- md: "Running the script shows the following in the Terminal:\n\n```\n* Running on\
    \ local URL:  http://127.0.0.1:7860\n```\n\nTo see the web page, you need to browse\
    \ to the URL shown in the first line. On Windows or Linux, you can just Ctrl+click\
    \ the underlined link. On macOS, ⌘+click the link. Your default web browser should\
    \ open, showing a page that looks like Figure 15-7.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_309_0.png)\n\
    \nWhen the web page opens, type your image prompt, click Generate, and wait a\
    \ few seconds. When you see the image, you can download a copy by clicking the\
    \ Download icon near the upper-right corner of the image control.\n\n> The official\
    \ documentation for gradio can be found on the Gradio website at www.gradio.app/docs.\n\
    \nAll the controls on the web page are created using this block of code. Note\
    \ that in the imports section near the top of the script, I use the line `import\
    \ gradio as gr` to import gradio, so `gr` is an abbreviated name I can use in\
    \ the rest of the code to reference gradio.\n\n```\n# Create the interface with\
    \ text boxes, buttons, and image output.\nwith gr.Blocks() as demo:\n    gr.Markdown(\"\
    # Python AI Image Generator\")\n    prompt = gr.Textbox(label=\"Enter your image\
    \ prompt\")\n    generate_btn = gr.Button(\"Generate\")\n    output_image = gr.Image(label=\"\
    Generated Image\")\n    status = gr.Textbox(label=\"Status / Error Messages\"\
    , interactive=False)\n```\n\nThe first line creates a `gr.Blocks` object, which\
    \ is basically a collection of controls on a web page. In this case, that block\
    \ is named `demo`. `gr.Markdown()` shows the page title. `gr.Textbox()` shows\
    \ the text box and label \"Enter your image prompt\". `gr.Button()` creates the\
    \ button. The `gr.Image()` creates the image control that will display the generated\
    \ image (when available).\n\nThe last text box, named `status`, shows progress\
    \ indicators and error messages. It's not interactive because it's not intended\
    \ as a box where the user enters text, but rather as a way for the script to show\
    \ information.\n\nThen comes the following block of code:\n\n```\ngenerate_btn.click(\n\
    \    gradio_generate,\n    inputs=prompt,\n    outputs=[output_image, status]\n\
    )\n```\n\nThat block of code tells Python what to do when the user clicks the\
    \ `generate_btn` button. When clicked, the button calls a function named `gradio_generate()`\
    \ (which I show you in a moment). It passes into that function whatever prompt\
    \ the user typed into the prompt text box. The last line, `outputs=[output_image,\
    \ status]`, indicates that the function will generate two outputs: one named `output_image`\
    \ (which will be the generated image), and the other named `status` (a text message\
    \ indicating status or an error message).\n\nThe very last line of code, `demo.launch()`,\
    \ is what assembles the web page that the browser shows and then displays the\
    \ instructions to access that page at the URL `http://127.0.0.1:7860`.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_310_0.png)\n\
    \nIn the web browser, you can right-click an empty spot on the generated web page\
    \ and choose View Page Source (or the equivalent option in your browser) to see\
    \ the Hypertext Markup Language (HTML), Cascading Style Sheets (CSS), and JavaScript\
    \ that Python generated from your `gradio` code.\n\nSo, how does the rest work?\
    \ Recall that clicking the Generate button calls a function named `gradio_generate()`\
    \ and passes in the user's prompt as input. That function, in turn, does some\
    \ quick exception handling to ensure that the prompt isn't empty.\n\n```\n# Call\
    \ function to generate the image, then show results on page.\ndef gradio_generate(prompt):\n\
    \    if not prompt.strip():\n        yield None, gr.update(value=\"Prompt cannot\
    \ be empty.\")\n        return\n    yield None, gr.update(value=\"Starting generation...\"\
    )\n    for image, status in generate_image(prompt, status_box=None):\n       \
    \ yield image, status\n```\n\nNote the use of the keyword `yield` in that function.\
    \ The word `yield` is a gradio keyword that creates a generator function that\
    \ can return multiple values. In other words, it supports *streaming outputs*\
    \ (where a function can return different values over time), which is exactly what\
    \ you need if you want to show a progress indicator as a function is running.\n\
    \nIn this example, the `yield` keyword returns two values each time it's called.\
    \ The first value is placed in the image placeholder, where the generated image\
    \ appears, after it's completed. The second value is displayed in the status box,\
    \ which keeps the user informed of status or any error messages.\n\nIn the `gradio_generate()`\
    \ function, this first `yield` line is as follows:\n\n```\nyield None, gr.update(value=\"\
    Prompt cannot be empty.\")\n```\n\nIt shows nothing (`None`) in the image box,\
    \ and an error message (\"Prompt cannot be empty.\") in the status text box if\
    \ the user didn't provide a prompt. Otherwise, the following line executes:\n\n\
    ```\nyield None, gr.update(value=\"Starting generation...\")\n```\n\nThis line\
    \ still leaves the image box empty. But the status text box displays the text\
    \ to tell the user that image generation has started.\n\nThe next line sets up\
    \ a `for` loop to call the function named in `generate_image()` repeatedly. The\
    \ `prompt` parameter is the user's prompt for creating the image. The `status_box`\
    \ parameter gets `None` as input, because there is no status to report at this\
    \ moment in time.\n\n```\nfor image, status in generate_image(prompt, status_box=None):\n\
    ```\n\nWithin that loop, `yield image, status` simply updates that image box and\
    \ status box as the `generate_image()` function is running.\n\nThe `generate_image()`\
    \ function does the actual image generation. There's considerable exception handling\
    \ in that function to manage unforeseen problems. In fact, for any one image the\
    \ `retries=3` parameter will give the AI three chances to fully generate the image\
    \ before giving up. The most important lines of code in the `generate_image()`\
    \ function are the following:\n\n```\nif response.status_code == 200:\n    status_box\
    \ = gr.update(value=\"Image generated.\")\n    yield Image.open(io.BytesIO(response.content)),\
    \ status_box\n    return\n```\n\nThe response code of 200 indicates that no errors\
    \ have occurred and an image was returned. When that happens, the `status_box`\
    \ text is set to \"Image generated.\", and the generated image is displayed in\
    \ the image box via `Image.open(io.BytesIO(response.content))` where `response.content`\
    \ is the content of what the AI image generator returned to the calling code.\n\
    \n> ![TIP](icon) As a user, after the image appears in the browser, you can hover\
    \ the mouse pointer over the image and click Download to save a copy.\n\nBe aware\
    \ that closing the browser window doesn't end the Python script. To get back to\
    \ a normal command line, click inside VS Code's Terminal window and press Ctrl+C\
    \ or ⌘+C on macOS, to interrupt the current session and end the script.\n\n##\
    \ Hitting up Hugging Face\n\nHugging Face (https://huggingface.co) is a popular\
    \ website for sharing AI models and applications that you're free to use. They\
    \ offer an inference API that you can access via Python to generate AI text and\
    \ images using a variety of models.\n\nUnfortunately, you can't use Hugging Face\
    \ to generate images entirely for free. They do offer a free tier where you can\
    \ generate a few images using a script like the one shown in this chapter, so\
    \ at least you can learn some things and try out your code for free. But if you\
    \ want to continue using Hugging Face AI, you'll need to set up a paid account.\
    \ See the Hugging Face website for more information on switching to a paid account\
    \ if you run out of free credits and want to pursue this type of coding further.\n\
    \nTo use Hugging Face, even for free, you'll need to first set up a free account.\
    \ Then you'll need an API token, which is basically the same thing as an API key.\
    \ You can get one at https://huggingface.co/settings/tokens after you set up your\
    \ account.\n\nChapter 9 discusses APIs and API keys in detail.\n\nI'll show you\
    \ a complete script for generating images from Hugging Face in a moment. But to\
    \ get started with this script, set up a folder and virtual environment as you\
    \ normally would. Activate your virtual environment, and enter the following command\
    \ to install all the required dependencies:\n\n```\npip install gradio requests\
    \ Pillow python-dotenv\n```\n\nIn keeping with security best practices (and good\
    \ habits), I suggest you also create a .env file and store your API key there.\
    \ Figure 15-8 shows an example.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_313_0.png)\n\
    \nThe API key in Figure 15-8 is fake and used only as an example. Make sure to\
    \ put your own API key in your own .env file.\n\nHere's all the code for the script\
    \ to generate images using a Hugging Face model. As in the previous code example,\
    \ I use gradio to provide a nice graphical interface that can show the generated\
    \ image.\n\n```\n# hugging_face.py\n# pip install gradio requests Pillow python-dotenv\n\
    import gradio as gr\nimport requests\nfrom PIL import Image\nimport io\nimport\
    \ os\nfrom dotenv import load_dotenv\n\n# Get API token from https://huggingface.co/settings/tokens.\n\
    ```"
  mdcn: "运行脚本后，终端会显示以下内容：\n\n```\n* Running on local URL:  http://127.0.0.1:7860\n\
    ```\n\n要查看网页，你需要浏览第一行显示的URL。在Windows或Linux上，你可以直接按住Ctrl键并点击带下划线的链接。在macOS上，则按住⌘键并点击链接。你的默认网页浏览器应该会打开，显示一个类似图15-7的页面。\n\
    \n![](img/10d8e89b301a0e7452bff4d402265e78_309_0.png)\n\n网页打开后，输入你的图像提示词，点击“生成”，然后等待几秒钟。当你看到图像时，可以通过点击图像控件右上角附近的下载图标来下载一份副本。\n\
    \n> Gradio的官方文档可以在Gradio网站 www.gradio.app/docs 上找到。\n\n网页上的所有控件都是使用这段代码块创建的。请注意，在脚本顶部的导入部分，我使用了\
    \ `import gradio as gr` 这一行来导入gradio，因此 `gr` 是我在代码其余部分中用来引用gradio的缩写名称。\n\n```\n\
    # 使用文本框、按钮和图像输出创建界面。\nwith gr.Blocks() as demo:\n    gr.Markdown(\"# Python AI\
    \ Image Generator\")\n    prompt = gr.Textbox(label=\"Enter your image prompt\"\
    )\n    generate_btn = gr.Button(\"Generate\")\n    output_image = gr.Image(label=\"\
    Generated Image\")\n    status = gr.Textbox(label=\"Status / Error Messages\"\
    , interactive=False)\n```\n\n第一行创建了一个 `gr.Blocks` 对象，它基本上是网页上控件的集合。在这个例子中，这个块被命名为\
    \ `demo`。`gr.Markdown()` 显示页面标题。`gr.Textbox()` 显示文本框和标签“Enter your image prompt”。`gr.Button()`\
    \ 创建按钮。`gr.Image()` 创建图像控件，用于显示生成的图像（当可用时）。\n\n最后一个名为 `status` 的文本框显示进度指示器和错误消息。它不是交互式的，因为它不是设计为用户输入文本的框，而是脚本显示信息的一种方式。\n\
    \n然后是以下代码块：\n\n```\ngenerate_btn.click(\n    gradio_generate,\n    inputs=prompt,\n\
    \    outputs=[output_image, status]\n)\n```\n\n这段代码块告诉Python当用户点击 `generate_btn`\
    \ 按钮时该做什么。点击时，按钮会调用一个名为 `gradio_generate()` 的函数（我稍后会展示给你）。它将用户输入到提示文本框中的任何提示传递给该函数。最后一行\
    \ `outputs=[output_image, status]` 表示该函数将生成两个输出：一个名为 `output_image`（将是生成的图像），另一个名为\
    \ `status`（表示状态或错误消息的文本消息）。\n\n代码的最后一行 `demo.launch()` 负责组装浏览器显示的网页，然后显示访问该页面的说明，URL为\
    \ `http://127.0.0.1:7860`。\n\n![](img/10d8e89b301a0e7452bff4d402265e78_310_0.png)\n\
    \n在网页浏览器中，你可以右键点击生成的网页上的空白处，然后选择“查看页面源代码”（或你浏览器中的等效选项），以查看Python从你的 `gradio` 代码生成的超文本标记语言（HTML）、层叠样式表（CSS）和JavaScript。\n\
    \n那么，其余部分是如何工作的呢？回想一下，点击“生成”按钮会调用一个名为 `gradio_generate()` 的函数，并将用户的提示作为输入传递进去。该函数反过来进行一些快速的异常处理，以确保提示不为空。\n\
    \n```\n# 调用函数生成图像，然后在页面上显示结果。\ndef gradio_generate(prompt):\n    if not prompt.strip():\n\
    \        yield None, gr.update(value=\"Prompt cannot be empty.\")\n        return\n\
    \    yield None, gr.update(value=\"Starting generation...\")\n    for image, status\
    \ in generate_image(prompt, status_box=None):\n        yield image, status\n```\n\
    \n注意该函数中关键字 `yield` 的使用。`yield` 是一个gradio关键字，它创建一个可以返回多个值的生成器函数。换句话说，它支持*流式输出*（函数可以随时间返回不同的值），这正是你想在函数运行时显示进度指示器所需要的。\n\
    \n在这个例子中，`yield` 关键字每次被调用时返回两个值。第一个值被放入图像占位符中，生成的图像在完成后会出现在那里。第二个值显示在状态框中，用于让用户了解状态或任何错误消息。\n\
    \n在 `gradio_generate()` 函数中，第一个 `yield` 行如下：\n\n```\nyield None, gr.update(value=\"\
    Prompt cannot be empty.\")\n```\n\n如果用户没有提供提示，它会在图像框中显示无内容（`None`），并在状态文本框中显示错误消息（“Prompt\
    \ cannot be empty.”）。否则，执行以下行：\n\n```\nyield None, gr.update(value=\"Starting\
    \ generation...\")\n```\n\n这一行仍然让图像框保持为空。但状态文本框会显示文本，告诉用户图像生成已经开始。\n\n下一行设置了一个\
    \ `for` 循环，以重复调用名为 `generate_image()` 的函数。`prompt` 参数是用户创建图像的提示。`status_box` 参数接收\
    \ `None` 作为输入，因为此时没有状态需要报告。\n\n```\nfor image, status in generate_image(prompt,\
    \ status_box=None):\n```\n\n在该循环内，`yield image, status` 仅在 `generate_image()`\
    \ 函数运行时更新图像框和状态框。\n\n`generate_image()` 函数执行实际的图像生成。该函数中有大量的异常处理来管理不可预见的问题。事实上，对于任何一张图像，`retries=3`\
    \ 参数将给AI三次机会来完全生成图像，然后才会放弃。`generate_image()` 函数中最重要的代码行如下：\n\n```\nif response.status_code\
    \ == 200:\n    status_box = gr.update(value=\"Image generated.\")\n    yield Image.open(io.BytesIO(response.content)),\
    \ status_box\n    return\n```\n\n响应代码200表示没有发生错误，并且返回了一张图像。当这种情况发生时，`status_box`\
    \ 文本被设置为“Image generated.”，并通过 `Image.open(io.BytesIO(response.content))` 在图像框中显示生成的图像，其中\
    \ `response.content` 是AI图像生成器返回给调用代码的内容。\n\n> ![TIP](icon) 作为用户，图像出现在浏览器中后，你可以将鼠标指针悬停在图像上，然后点击“下载”来保存一份副本。\n\
    \n请注意，关闭浏览器窗口并不会结束Python脚本。要返回到正常的命令行，请点击VS Code的终端窗口内部，然后按Ctrl+C或在macOS上按⌘+C，以中断当前会话并结束脚本。\n\
    \n## 访问 Hugging Face\n\nHugging Face (https://huggingface.co) 是一个流行的网站，用于共享你可以自由使用的AI模型和应用程序。他们提供了一个推理API，你可以通过Python访问它，使用各种模型生成AI文本和图像。\n\
    \n不幸的是，你不能完全免费地使用Hugging Face来生成图像。他们确实提供了一个免费层级，你可以使用本章所示的脚本生成一些图像，所以至少你可以免费学习一些东西并尝试你的代码。但如果你想继续使用Hugging\
    \ Face AI，你需要设置一个付费账户。有关切换到付费账户的更多信息，请参阅Hugging Face网站，如果你用完了免费额度并想进一步探索这类编码。\n\
    \n要使用Hugging Face，即使是免费使用，你也需要先设置一个免费账户。然后你需要一个API令牌，它基本上与API密钥相同。你可以在设置账户后，在\
    \ https://huggingface.co/settings/tokens 获取一个。\n\n第9章详细讨论了API和API密钥。\n\n我稍后会向你展示一个完整的脚本，用于从Hugging\
    \ Face生成图像。但要开始使用这个脚本，请像往常一样设置一个文件夹和虚拟环境。激活你的虚拟环境，并输入以下命令安装所有必需的依赖项：\n\n```\n\
    pip install gradio requests Pillow python-dotenv\n```\n\n为了遵循安全最佳实践（和良好习惯），我建议你创建一个\
    \ .env 文件并在其中存储你的API密钥。图15-8显示了一个示例。\n\n![](img/10d8e89b301a0e7452bff4d402265e78_313_0.png)\n\
    \n图15-8中的API密钥是假的，仅用作示例。请确保将你自己的API密钥放入你自己的 .env 文件中。\n\n以下是使用Hugging Face模型生成图像的脚本的全部代码。与之前的代码示例一样，我使用gradio提供一个漂亮的图形界面，可以显示生成的图像。\n\
    \n```\n# hugging_face.py\n# pip install gradio requests Pillow python-dotenv\n\
    import gradio as gr\nimport requests\nfrom PIL import Image\nimport io\nimport\
    \ os\nfrom dotenv import load_dotenv\n\n# 从 https://huggingface.co/settings/tokens\
    \ 获取API令牌。\n```"
