  - "[PAGE 20]\n\nThere's a lot to like about Python — and many reasons to learn Python\
    \ beyond automation. For one, many people regard Python as the easiest language\
    \ for many beginners to learn. Python's syntax is clean and simple — it reads\
    \ almost like English.\n\nYou're never stuck without information with Python.\
    \ There are endless tutorials, forums, and free *libraries* (premade code you\
    \ can borrow) to help you out. Virtually every modern AI chatbot is perfectly\
    \ capable of writing Python code for you and answering any questions about Python\
    \ that pop into your head.\n\nPython lets you write short, powerful code. What\
    \ may take 20 lines in another language often takes just a few lines in Python.\
    \ That means less typing and fewer mistakes to try to ferret out. Plus, modern\
    \ AI can debug your existing code as easily as it can write code for you.\n\n\
    Let's zoom in on automation — the topic of this book. When it comes to automation,\
    \ Python is a superstar. Whether you're on Linux, macOS, or Windows, Python works\
    \ like a charm. Write your automation script once, and it'll run anywhere. No\
    \ need to reinvent the wheel for different systems.\n\nWith Python, you can write\
    \ a quick script to handle many tasks in minutes. Although the following code\
    \ below may not mean much to you right now, it illustrates how you can take a\
    \ daunting task, like renaming hundreds of files in a folder, with just a few\
    \ lines of code:\n\n```\nimport os\nfor filename in os.listdir(\".\"):\n    os.rename(filename,\
    \ filename.replace(\"old\", \"new\"))\n```\n\nTiny bits of code like that can\
    \ handle big automation tasks.\n\nBeyond file tasks, Python plays nice with application\
    \ programming interface (APIs; define here), databases, Microsoft Excel files,\
    \ and AI. If you're automating something like “Check my email, grab attachments,\
    \ and update a spreadsheet,” Python can tie it all together smoothly.\n\nAPIs\
    \ allow Python to interact with AI and other powerful online capabilities, without\
    \ your having to reinvent the wheel or host huge files on your own computer. APIs\
    \ are a hallmark of modern computing, and you definitely want to use a programming\
    \ language that makes API access easy."
  - "[PAGE 21]\n\n![](img/10d8e89b301a0e7452bff4d402265e78_21_0.png)\n\nLearning Python\
    \ is like giving yourself a superpower. Python is easy to start, endlessly useful,\
    \ and when it comes to automation, unbeatable. You’ll save time, impress your\
    \ friends (or boss), and maybe even have some fun along the way. Perhaps best\
    \ of all, Python is completely free.\n\nHave I convinced you to choose Python\
    \ yet?\n\n# Understanding Python Syntax\n\nEvery language has certain rules of\
    \ syntax that outline how you must arrange words in order for them to make sense.\
    \ Like, “Teddy, jump three times!” If you say it all jumbled up, or leave out\
    \ words, like “Jump Teddy three,” Teddy may get confused and not know what to\
    \ do. In programming, syntax is the same thing — you need to order the words so\
    \ the computer understands what you want. Syntax is just the rules for putting\
    \ words and symbols in the right order.\n\nSome programming languages require\
    \ lots of punctuation, in addition to words, as part of their syntax. That gets\
    \ tiresome and makes learning more difficult. I’ll give you a simple example —\
    \ a piece of code that checks whether a number is even or odd and prints a message\
    \ — in both JavaScript and Python.\n\nJavaScript seems very “busy” with parentheses,\
    \ curly brackets, and semicolons:\n\n```\nfunction checkEvenOrOdd(number) {\n\
    \    if (number % 2 === 0) {\n        console.log(\"The number \" + number + \"\
    \ is even!\");\n    } else {\n        console.log(\"The number \" + number + \"\
    \ is odd!\");\n    }\n}\n\ncheckEvenOrOdd(7);\n```\n\nThat code looks like something\
    \ written by aliens. But that’s what a JavaScript requires. You’ve got:\n\n+ \
    \  » Curly brackets {} to wrap the function and the if...else blocks.\n» Parentheses\
    \ () for the function definition and the if condition.\n» A semicolon (;) at the\
    \ end of each line (JavaScript loves semicolons)."
  - "[PAGE 22]\n\nNow here's the same thing in Python:\n\n```\ndef check_even_or_odd(number):\n\
    \    if number % 2 == 0:\n        print(f\"The number {number} is even!\")\n \
    \   else:\n        print(f\"The number {number} is odd!\")\n\ncheck_even_or_odd(7)\n\
    ```\n\nGranted, it's still not plain English. But it's much, much cleaner and\
    \ simpler. Here's what's special about Python:\n\n+   » No curly brackets! Python\
    \ uses *indentation* (those spaces at the start of lines) to know what's inside\
    \ the function or if...else. It's like the code is breathing — it looks airy and\
    \ neat.\n» Fewer parentheses — only needed for the function definition, not the\
    \ if condition.\n» No semicolons — Python doesn't need them, so the code is less\
    \ cluttered.\n\n> As an experienced instructor who has taught thousands of software\
    \ developers, I can assure that all the curly brackets and semicolons are the\
    \ toughest things for beginners to get used to — they're among the main things\
    \ that drive people away from learning to code. Learning Python first lets you\
    \ dodge that bullet.\n\n# Getting Python\n\nPython is super lightweight and doesn't\
    \ demand much from your hardware, which is one reason it's so popular. Think of\
    \ this as the “minimum stuff” your computer needs to run Python and get started\
    \ with coding or automation.\n\n# Identifying the hardware requirements\n\nYou\
    \ can run Python on almost any modern computer. That doesn't include mobile devices\
    \ like phones and tablets, but it does include most desktops and laptops. Here's\
    \ what you'll need at the bare minimum:\n\n+   » Python works on Linux, macOS,\
    \ Windows (7, 8, 10, or 11), and even some mobile systems. Basically, if it's\
    \ a computer from the last 10 to 15 years, you're good!"
