- md: "## Calculating a file hash\n\nTo calculate a hash digest for any one file,\
    \ this script uses the `calculate_file_hash()` function. The `file_path` parameter\
    \ passed to the function will always be the path to the file to hash.\n\n```python\n\
    def calculate_file_hash(file_path):\n    # Calculate hash for a given file.\n\
    \    hasher = hashlib.md5()\n    with open(file_path, \"rb\") as f:\n        #\
    \ Read the file in chunks.\n        while chunk := f.read(8192):\n           \
    \ hasher.update(chunk)\n    return hasher.hexdigest()\n```\n\nThe line `hasher\
    \ = hashlib.md5()` creates an object named `hasher` that will be used to calculate\
    \ the hash using MD5. That MD5 hash works well for comparing files. But if you're\
    \ familiar with hashing and need to use another algorithm, you can replace that\
    \ line with any of the following:\n\n- `hasher = hashlib.sha256()`\n- `hasher\
    \ = hashlib.sha512()`\n- `hasher = hashlib.sha1()`\n- `hasher = hashlib.blake2b()`\n\
    - `hasher = hashlib.blake2s()`\n\n![](img/10d8e89b301a0e7452bff4d402265e78_117_0.png)\n\
    \nSome of the other hashing algorithms are slower but more secure than MD5. However,\
    \ when your goal is simply to compare files on your own system and you aren't\
    \ trying to find malicious actors attempting to intentionally forge files, MD5\
    \ is generally considered sufficient.\n\nThe line that reads `with open(file_path,\
    \ \"rb\") as f` opens the file to hash in *read binary* mode, which allows for\
    \ byte-by-byte reading of the file. The line `while chunk := f.read(8192)` sets\
    \ up a loop that reads 8,192 bytes (8KB) at a time from the file.\n\nEach 8KB\
    \ chunk of the file is stored in a variable named `chunk`. Then `hasher.update(chunk)`\
    \ updates the overall calculation for the latest 8KB. When the loop is finished,\
    \ the entire hash digest is complete, and the last line in the function, `return\
    \ hasher.hexdigest()`, returns that value to the calling function.\n\n## Finding\
    \ duplicate files\n\nThe `find_duplicates()` function does the actual searching\
    \ for duplicate files. As it does, it populates a dictionary named `file_hashes`\
    \ and a list named `duplicates`.\n\n```python\ndef find_duplicates(root_dir, recursive=True):\n\
    \    # Find duplicate files based on file content.\n    search_method = Path(root_dir).rglob\
    \ if recursive else Path(root_dir).glob\n    file_hashes = {}  # Maps hash to\
    \ file paths\n    duplicates = []   # List of duplicate file paths\n\n    for\
    \ file in search_method(\"*\"):\n        # Ensure it's a file.\n        if file.is_file():\n\
    \            file_hash = calculate_file_hash(file)\n            if file_hash in\
    \ file_hashes:\n                duplicates.append(file)\n                print(f\"\
    Duplicate found: {file} (same as {file_hashes[file_hash]})\")\n            else:\n\
    \                file_hashes[file_hash] = file\n    return duplicates\n```\n\n\
    Each row in the `file_hashes` dictionary contains a file's hash digest, followed\
    \ by a colon, and then the path to the file that produced that hash, as in the\
    \ following example:\n\n```python\n{\n    'abc123': Path('C:/Users/Alan/Documents/Practice\
    \ Duplicates/file1.txt'),\n    'def456': Path('C:/Users/Alan/Documents/Practice\
    \ Duplicates/file2.txt'),\n    'abc123': Path('C:/Users/Alan/Documents/Practice\
    \ Duplicates/file3.txt')\n}\n```\n\nIn the preceding code, I use short strings\
    \ like `abc123` and `def456` to represent the hash digest. In reality, each hash\
    \ digest is 30 characters in length, not just six characters.\n\nEach time a hash\
    \ digest is completed, the following lines of code check whether the hash already\
    \ exists in the dictionary. If it does, the path of the file that produced the\
    \ hash digest is added to the `duplicates` list.\n\n```python\nif file_hash in\
    \ file_hashes:\n    duplicates.append(file)\n```\n\nIn other words, if the file\
    \ is identical to a previously hashed file (because its hash digest is the same),\
    \ then the path to that duplicate file is added to the duplicates list. So, the\
    \ duplicates list ends up being paths to files that are duplicates of other files.\
    \ It may look something like this:\n\n```python\n[\nPath('C:/Users/Alan/Documents/Practice\
    \ Duplicates/file3.txt')\n]\n```\n\nWhen the `def find_duplicates()` function\
    \ has finished, it returns the list of duplicate file paths to the function that\
    \ called it.\n\n## Deleting duplicate files\n\nSo far, the script hasn't actually\
    \ sent anything to the trash. The duplicates list just contains a list of paths\
    \ to files that are duplicates. The `trash_duplicates()` function takes care of\
    \ moving the duplicate files to the trash, using the `send2trash` module:\n\n\
    ```python\ndef trash_duplicates(duplicates):\n    # Send duplicate files to the\
    \ trash.\n    for file in duplicates:\n        try:\n            send2trash(str(file))\
    \  # Safely send the file to the trash.\n            print(f\"Sent to trash: {file}\"\
    )\n        except Exception as e:\n            print(f\"Failed to trash {file}:\
    \ {e}\")\n```\n\n> Using the `send2trash` module is safer than permanently deleting\
    \ the file immediately, because it gives the user a chance to review the file\
    \ to be deleted.\n\n## Tweaking the find duplicates script\n\nTo use the script\
    \ for deleting duplicates, define the path to your starting directory in the `main()`\
    \ function by assigning a value to the `root_dir` variable.\n\n> I've used a folder\
    \ named Practice Duplicates in my Windows Documents folder. Make sure to use the\
    \ correct syntax for your operating system (for example, /users/alan/Practice\
    \ Duplicates for macOS).\n\n```python\ndef main():\n    # Root directory to scan\
    \ for duplicates\n    root_dir = r\"C:\\Users\\Alan\\Documents\\Practice Duplicates\"\
    \n    # Set to False for non-recursive scanning.\n    recursive = True\n```\n\n\
    If you want to include subdirectories in your search, leave the `recursive` variable\
    \ set to `True`. Otherwise, you can set the `recursive` variable to `False` to\
    \ exclude subdirectories.\n\nKeep in mind that the duplicate files aren't deleted\
    \ from your system. They'll be in the Trash or Recycle Bin for your review.\n\n\
    ## Compressing Files\n\nThe next automation script compresses any file types from\
    \ any directory or directory tree. The original files remain intact. You can use\
    \ the Zip files for sharing with others or for backups. Here's the script in its\
    \ entirety:\n\n```python\n#compress_files.py\n# This script compresses any file\
    \ types into a Zip file.\nimport os\nfrom pathlib import Path\nimport zipfile\n\
    from datetime import datetime\n\ndef compress_files(root_dir, output_path, file_types,\
    \ recursive):\n    try:\n        # Create Zip file name from current datetime.\n\
    \        current_time = datetime.now().strftime(\"%Y%m%d_%H%M%S\")\n        filename\
    \ = f\"{current_time}.zip\"\n\n        # Ensure output directory exists.\n   \
    \     base_path = Path(output_path)\n        base_path.mkdir(parents=True, exist_ok=True)\n\
    \n        # Join the path with the filename.\n        output_zip = base_path /\
    \ filename\n\n        # Verify root directory exists.\n        if not Path(root_dir).exists():\n\
    \            raise FileNotFoundError(f\"Source directory '{root_dir}' does not\
    \ exist\")\n\n        # Check if you have write permissions for output directory.\n\
    \        if not base_path.is_dir() or not os.access(base_path, os.W_OK):\n   \
    \         raise PermissionError(f\"No write permission for output directory: {output_path}\"\
    )\n\n        search_method = Path(root_dir).rglob if recursive else Path(root_dir).glob\n\
    \n        with zipfile.ZipFile(output_zip, 'w', compression=zipfile.ZIP_DEFLATED)\
    \ as zipf:\n            files_added = False\n            for file in search_method(\"\
    *\"):\n                if file.is_file() and file.suffix.lower() in file_types:\n\
    \                    try:\n                        zipf.write(file, file.relative_to(root_dir))\n\
    \                        print(f\"Added to archive: {file}\")\n              \
    \          files_added = True\n                    except PermissionError:\n \
    \                       print(f\"Warning: No permission to access file: {file}\"\
    )\n                        continue\n                    except OSError as e:\n\
    \                        print(f\"Warning: Failed to add file {file}: {str(e)}\"\
    )\n                        continue\n\n            if not files_added:\n     \
    \           print(\"Warning: No files matching specified types were found\")\n\
    \n        return output_zip\n\n    except FileNotFoundError as e:\n        print(f\"\
    Error: {str(e)}\")\n        return None\n    except PermissionError as e:\n  \
    \      print(f\"Error: {str(e)}\")\n        return None\n    except zipfile.BadZipFile\
    \ as e:\n        print(f\"Error: Failed to create Zip file: {str(e)}\")\n    \
    \    return None\n    except Exception as e:\n        print(f\"Unexpected error\
    \ occurred: {str(e)}\")\n        return None\n\ndef main():\n    try:\n      \
    \  # Directory to compress files from\n```"
  mdcn: "## 计算文件哈希值\n\n要计算任意文件的哈希摘要，此脚本使用 `calculate_file_hash()` 函数。传递给该函数的 `file_path`\
