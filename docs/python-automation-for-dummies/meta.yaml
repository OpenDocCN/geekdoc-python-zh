  md: "# Creating your watermark image\n\nTo prevent your watermark image from obscuring\
    \ content in your document, use very light colors in the image. Ideally, ensure\
    \ the image has a transparent background. You can remove the background from an\
    \ image using Preview on macOS computers or Photos on Windows. Optionally, use\
    \ any free AI tool that allows you to remove image backgrounds.\n\nIf the watermark\
    \ is obscuring text, you may also want to reduce the opacity of the image foreground.\
    \ If you don't have a graphics editor with that capability, you can use the free\
    \ Photopea editor at www.photopea.com. These are the steps:\n\n+   1. Open your\
    \ image in Photopea.\n2. Click the image layer in Photopea.\n   If you just opened\
    \ the image, the image layer is labeled Background in the layers list.\n3. Set\
    \ the Opacity to 30%, as shown in Figure 8-1.\n4. To save the image, choose File\
    \ > Export As > PNG.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_187_0.png)\n\n\
    You may want to experiment with a few different opacities to determine what works\
    \ best for you. Consider saving different opacities with different filenames,\
    \ such as `Watermark_20pct.png` for an image with 20 percent opacity, so you can\
    \ try out different images and see what works best for your document."
