- md: '## Pressing hotkeys


    Pressing hotkeys is a fundamental way to interact with software and operating
    systems efficiently. By pressing a specific combination of keys, you can execute
    commands, navigate interfaces, and perform actions without using a mouse. This
    method is often faster and can significantly improve productivity once you become
    familiar with the relevant shortcuts.


    Common hotkey combinations include:

    - **Ctrl + C** to copy selected text or files.

    - **Ctrl + V** to paste the copied content.

    - **Ctrl + Z** to undo the last action.

    - **Ctrl + S** to save the current document or file.

    - **Alt + Tab** to switch between open applications on Windows.

    - **Cmd + Space** to open Spotlight Search on macOS.


    Learning and using hotkeys can streamline your workflow and make your interaction
    with technology more intuitive and powerful.'
  mdcn: '## 按下快捷键


    按下快捷键是高效与软件和操作系统交互的基本方式。通过按下特定的按键组合，你可以执行命令、导航界面并执行操作，而无需使用鼠标。这种方法通常更快，并且一旦你熟悉了相关的快捷键，就能显著提高工作效率。


    常见的快捷键组合包括：

    - **Ctrl + C** 用于复制选中的文本或文件。

    - **Ctrl + V** 用于粘贴复制的内容。

    - **Ctrl + Z** 用于撤销上一步操作。

    - **Ctrl + S** 用于保存当前文档或文件。

    - **Alt + Tab** 用于在 Windows 上切换已打开的应用程序。

    - **Cmd + Space** 用于在 macOS 上打开聚焦搜索。


    学习和使用快捷键可以简化你的工作流程，并使你与技术的交互更加直观和强大。'
