    ` | 2025 |\n| %y | Year without century (two digits, 00–99) | `f\"{dt.strftime('%y')}\"\
    ` | 25 |\n| %m | Month as zero-padded number (01–12) | `f\"{dt.strftime('%m')}\"\
    ` | 03 |\n| %B | Full month name | `f\"{dt.strftime('%B')}\"` | March |\n| %b\
