    \ Image.open(watermark_path) as img:\n            img_width, img_height = img.size\n\
    \n        # Scale the image dimensions by the magnification percentage.\n    \
    \    scaled_width = img_width * magnification / 100\n        scaled_height = img_height\
    \ * magnification / 100\n\n        # Compute the centered position using scaled\
    \ dimensions.\n        x = (page_width - scaled_width) / 2\n        y = (page_height\
    \ - scaled_height) / 2\n\n        buffer = BytesIO()\n        c = canvas.Canvas(buffer,\
    \ pagesize=(page_width, page_height))\n        # Draw the image with scaled dimensions.\n\
