- md: "## Using mkdir for subfolders\n\nSo far, the script has done a lot of work\
    \ picking apart text to come up with a folder name, such as `png` for PNG files.\
    \ So, how and when does it actually create the subfolder? It does so in the next\
    \ `try` block, using `.mkdir(exist=True)`.\n\n```python\n# Create the folder if\
    \ it doesn't exist.\ntry:\n    new_folder.mkdir(exist_ok=True)\nexcept Exception\
    \ as e:\n    print(f\"Error creating folder '{new_folder}': {e}\")\n    continue\n\
    ```\n\nThat `.mkdir()` is a method of `pathlib`, the same module we've been using\
    \ to walk directory trees. The argument `exist_ok=True` tells Python that if the\
    \ directory already exists, `mkdir()` should do nothing and silently continue\
    \ without raising an error. Python creates the directory only if the directory\
    \ doesn't already exist. The `try: except:` is just to cover any other unforeseen\
    \ error, such as having insufficient permissions to create a subfolder within\
    \ the current folder.\n\nThe script then creates a variable named `new_file_path`,\
    \ which is the new folder name followed by `/` and the filename:\n\n```python\n\
    # Define the new file path.\nnew_file_path = new_folder / file_path.name\n```\n\
    \n## Moving files with shutil\n\nAt this point, a subfolder with a name that matches\
    \ the current file's extension exists. So, the next step is to simply move the\
    \ current file into that folder. The following code uses the `.move()` method\
    \ of `shutil` for that task:\n\n```python\n# Move the file.\ntry:\n    shutil.move(str(file_path),\
    \ str(new_file_path))\n    print(f\"Moved '{file_path.name}' to '{extension}'\
    \ folder\")\nexcept Exception as e:\n    print(f\"Error moving '{file_path.name}':\
    \ {e}\")\n```\n\nThe line that reads `shutil.move(str(file_path), str(new_file_path))`\
    \ moves the file. The `print()` statement that follows simply shows that fact\
    \ onscreen, so you get some feedback as the script is running. The exception handling\
    \ is there only to catch unexpected errors, which would usually involve insufficient\
    \ permissions in the current folder.\n\nDespite all the code for navigating the\
    \ folder and catching exceptions, the actual folder creating and moving the file\
    \ is really just two lines of code that use `mkdir()` from `pathlib` and `.move()`\
    \ from `shutil`.\n\n## Making the script your own\n\nTo use the script in your\
    \ own work, you can simply set parameters in the `main()` function. Keep in mind\
    \ that I intentionally left out recursion on this script, because it has such\
    \ a huge impact on the directory in which it’s running. So, basically, your main\
    \ option is to specify in which directory you want to organize files in one of\
    \ the subsequent lines.\n\nI’ve shown syntax for Linux, macOS, and Windows paths\
    \ in the code, and I’ve commented out the ones I didn’t use, so you can see them\
    \ as examples. You’ll want to do the same, by commenting out the two paths you\
    \ don’t want to use, and defining your path using the proper syntax for your operating\
    \ system.\n\n```python\ndef main():\n    # Specify your directory. I'm using a\
    \ Windows path as an example.\n    directory = r\"C:\\Users\\Alan\\Documents\\\
    Practice\\Organize\"\n    # If you're using macOS, use a path like this:\n   \
    \ # directory = \"/Users/Alan/Documents/Practice/Organize\"\n    # If you're using\
    \ Linux, use a path like this:\n    # directory = \"/home/Alan/Documents/Practice/Organize\"\
    \n```\n\nThe rest of the code you can leave unchanged, because it just presents\
    \ a little text onscreen, runs the script, shows some text onscreen, and calls\
    \ the `organize_files()` function to do the actual work.\n\n## Renaming Files\
    \ in Bulk\n\nThe next script allows you to rename files in bulk in a single directory\
    \ or an entire directory tree. It’s handy when you have a lot of auto-generated\
    \ filenames that look like `_7f729bae-9c77-4ce1-8e84-bafc8ae741cb.png` or some\
    \ other random name. You can rename all the files so they match the folder name.\
    \ Optionally, you can provide a filename of your choosing, like `Beach.png`. The\
    \ files will be given that name followed by a number in parentheses, such as `Beach\
    \ (1).png`, `Beach (2).png`, and so forth.\n\n> Don't attempt to change filename\
    \ extensions with this script. Filename extensions indicate the file type and\
    \ should never be changed arbitrarily.\n\nAs an alternative to renaming all the\
    \ files in the folder, you can specify a pattern. For example, the pattern `\"\
    _*\"` will rename only files whose first character is an underscore. The pattern\
    \ `\"*.txt\"` will rename only files that have a `.txt` extension.\n\n> There\
    \ is no Undo for this massive renaming. So, as always, your best bet is to put\
    \ a copy of all the folders and files you want to rename inside a `Practice` folder.\
    \ That way, if you make a mistake and mess up your filenames, you still have the\
    \ originals in their original location. Here's the entire script:\n\n```python\n\
    from pathlib import Path\n\ndef rename_files(root_dir, pattern, recursive, preferred_name):\n\
    \    try:\n        root_path = Path(root_dir)\n        # If None is provided for\
    \ preferred_name, use the folder name.\n        rename_to_folder = True if preferred_name\
    \ is None else False\n\n        # Check if the root directory exists.\n      \
