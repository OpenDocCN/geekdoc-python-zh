    \ | 6 |\n| 3 | / | Division | 6/2 | 3 |\n| 3 | // | Floor division | 7//2 | 3\
    \ |\n| 3 | % | Modulus (remainder) | 7%2 | 1 |\n| 4 | + | Addition | 2+3 | 5 |\n\
    | 4 | + | String concatenation | 'a'+'b' | 'ab' |\n| 4 | - | Subtraction | 5-2\
    \ | 3 |\n\nOperators that have the same order of operations are executed left\
