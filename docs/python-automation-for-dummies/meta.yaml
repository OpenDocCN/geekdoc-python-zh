    # FileNotFoundError


    If your Python code needs to access a file, but that file can''t be found in the
    specified location, Python throws a `FileNotFoundError`. Here are the most common
    causes of this error:


    +   - You misspelled the filename in your code.

    - The file doesn''t exist in the specified directory.


