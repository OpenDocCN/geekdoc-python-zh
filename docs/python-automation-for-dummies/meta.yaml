    # Activating a virtual environment


    Creating a virtual environment doesn''t activate the virtual environment. You
    always want to make sure your virtual environment is activated before you start
    working on your script or run a script. That you''ll do in the Terminal window
    of VS Code. The command prompt in the Terminal should still show the path of the
    workspace root folder. Enter one of the commands to run the activate script within
    that folder, depending on your operating system:


    ```

