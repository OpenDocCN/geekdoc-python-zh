  md: '# Loading drivers for your browser


    One of the first steps to creating a script to interact with a web page is to
    import the correct drivers for that browser. I''ll provide a few simple scripts
    that you can try out yourself, to illustrate the syntax. But be aware that each
    script only opens the browser, navigates to www.google.com, and then holds the
    browser window open until you press Enter on VS Code''s Terminal window.


    > WARNING

    You can only use a web browser that''s installed on your computer. You can''t
    simulate an uninstalled browser using selenium.


    Here''s a script that loads the correct drivers for Chrome, which you can try
    if you have Chrome installed on your computer.


    ```

    # pip install selenium webdriver-manager

    from selenium import webdriver

    from selenium.webdriver.chrome.service import Service

    from webdriver_manager.chrome import ChromeDriverManager


    # Set up the Chrome WebDriver.

    driver = webdriver.Chrome(service=Service(ChromeDriverManager().install()))


    # Open https://www.google.com in Chrome.

    driver.get("https://www.google.com")


    # Keep the browser open until the user presses Enter.

    input("Press Enter to close the browser...")

    driver.quit()

    ```


    Here''s the same script, but this one uses Edge as the browser:


    ```

    # pip install selenium webdriver-manager

    from selenium import webdriver

    from selenium.webdriver.edge.service import Service

    from webdriver_manager.microsoft import EdgeChromiumDriverManager


    # Set up the Microsoft Edge WebDriver.

    driver = webdriver.Edge(service=Service(EdgeChromiumDriverManager().install()))


    # Open https://www.google.com in Edge.

    driver.get("https://www.google.com")

    ```'
