    \ Using list comprehension\n\nIn Python, nested loops can create complex, deeply\
    \ nested code. When dealing with lists, Python’s list comprehension can greatly\
    \ simplify things. *List comprehension* is a concise way to create a new list\
    \ by applying an expression to each item in an existing list (or another iterable,\
    \ like `tuple` or `range`) and (optionally) filtering items based on a condition.\
    \ It’s a flat and readable alternative to using loops for list creation. Here’s\
    \ the syntax for list comprehension:\n\n```\npython\nnew_list = [expression for\
