  md: 'There is no hard-and-fast rule that applies to every REST API request, but
    most include at least some of the following components:


    +   » **URL/endpoint:** The URL to which the request is sent (for example, https://api.example.com/data).

    » **Headers (optional):** A dict of metadata sent with the request, which may
    include things like authentication tokens or API keys.

    » **Query parameters (optional):** Key-value pairs appended to the URL or passed
    as a dictionary (for example, params={"key": "value"}).

    » **Response handling:** Code that processes the server''s response (for example,
    .json() to parse JSON or response.status_code to check for success).


    The documentation for the REST API will tell you the URL/endpoint to which you''ll
    send your request. For example, to get the current weather for any location, use
    the URL https://api.openweathermap.org/data/2.5/weather.


    You must include your API key in a parameter named `appid`. You can send numerous
    optional parameters. For example, if you want to get the weather for a city in
    the United States, and you want the temperature expressed in degrees Fahrenheit,
    use the `q` parameter to specify the city and state and use the `units` parameter
    with the value "imperial" for Fahrenheit.


    Specify the URL to which you''ll send the request (as specified in the OpenWeatherMap
    API documentation). In this example, let''s assume you have the key in the .env
    file, as shown in the "Making API requests section, earlier in this chapter, assigned
    to the name WEATHER_API_KEY as follows:


    ```

    WEATHER_API_KEY=8c21435c4317367221435aac09bf4c1d

    ```


    > The API key shown in the example isn''t a valid one — it''s just an example.
    Make sure to get your own API key from https://openweathermap.org and use that
    key to try out the code.


    Here is a more complete example that includes the `import os` and `load_dotenv`
    code needed to access the .env file, followed by a complete REST API request for
    OpenWeatherMap, with lots of comments to explain what''s going on:


    ```

