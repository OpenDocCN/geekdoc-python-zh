- md: '## Creating your watermark image


    To prevent your watermark image from obscuring content in your document, use very
    light colors in the image. Ideally, ensure the image has a transparent background.
    You can remove the background from an image using Preview on macOS computers or
    Photos on Windows. Optionally, use any free AI tool that allows you to remove
    image backgrounds.


    If the watermark is obscuring text, you may also want to reduce the opacity of
    the image foreground. If you don''t have a graphics editor with that capability,
    you can use the free Photopea editor at www.photopea.com. These are the steps:


    1. Open your image in Photopea.

    2. Click the image layer in Photopea. If you just opened the image, the image
    layer is labeled Background in the layers list.

    3. Set the Opacity to 30%, as shown in Figure 8-1.

    4. To save the image, choose File > Export As > PNG.


    ![](img/10d8e89b301a0e7452bff4d402265e78_187_0.png)


    You may want to experiment with a few different opacities to determine what works
    best for you. Consider saving different opacities with different filenames, such
    as `Watermark_20pct.png` for an image with 20 percent opacity, so you can try
    out different images and see what works best for your document.


    ## Adapting the script to your needs


    To adapt this script to your own needs, set paths to your PDF and watermark image
    in the `main()` function. As always, remember to use the correct syntax for your
    operating system. Here are examples using Windows paths.


    ```

    # Path to your existing PDF to which you''ll add watermarks

    pdf_file_path = R"C:\Users\Alan\Documents\Practice\PDFs\practice.pdf"

    # Path to your watermark image file

    watermark_image_path = R"C:\Users\Alan\Documents\Practice\PDFs\watermark.png"

    # Set magnification value (for example, 80 for 80 percent)

    magnification = 100

    ```


    If the watermark image is too large or too small, when placed in the PDF, use
    the `magnification` variable to adjust the size. For example, setting the `magnification`
    variable to 50 will shrink the image to 50 percent its size. Setting `magnification`
    to 200 doubles the size of the watermark image.


    # 3 Automating the Internet


    ## IN THIS PART . . .


    - Master application programming interfaces (APIs) and JavaScript Object Notation
    (JSON) for online interaction.

    - Automate web browsers.

    - Scrape web pages for code and content.

    - Automate email and Short Message Service (SMS) text messages.

    - Automate social media contents and metrics.


    ## IN THIS CHAPTER


    - Getting and storing API keys

    - Working with JSON data

    - Making sense of REST APIs

    - Checking out a REST API script


    # Chapter 9 Interacting with APIs


    Much of the interaction between your Python scripts and internet content will
    take place through an application programming interface (API). To gain access
    to an API, you typically have to sign up with the API provider and obtain an API
    key, which is a unique code provided by an API provider to identify you and your
    app. Keys are strings of characters and numbers, 20 to 50 characters in length.


    In this chapter, I show you how to obtain API keys, store them safely, and use
    them with Python to take advantage of internet API services. I also show you how
    to use JSON to format data when interacting with APIs.


    ## Obtaining API Keys


    To obtain an API key, you typically need to sign up with the API provider and
    request access. The steps are usually something like this:


    1. **Go to the website of the API provider, and create a user account or sign
    into your existing account.**

    2. **Navigate to the API section of the provider''s website.** It''s often under
    a heading like Developer Portal or API Dashboard.

    3. Follow the onscreen instructions to generate an API key. You may need to create
    a project or application on the site.

    4. Agree to the API''s Terms of Service. After it''s generated, your unique API
    key will be displayed on the screen.

    5. Copy the API key and store it a secure place on your own computer.


    > It may take a couple of hours or more for a new API key to be activated for
    use. Check the documentation on the site where you got the key. Watch for any
    email messages about how long to wait before testing the key.


    > Don''t share your API key with others or expose the key to the public. Doing
    so could allow others to access the API under your identity to abuse or misuse
    the service. If you''re paying for an API service, others using the service on
    your dime could end up costing you a lot of money. (See the next section for tips
    on safely storing your API keys.)


    > Not all API keys are free. In this chapter, I focus on APIs that were free at
    the time of this writing, because I know people don''t always want to set up a
    paid account when they''re just trying to learn. But things change, so I apologize
    in advance if I unwittingly send you someplace that asks for payment.


    ## Safely Storing API Keys


    It''s important to keep your API keys private, because they identify your account.
    You don''t want imposters misusing an API under your identity. If you ever do
    start using paid services, you don''t want to be paying for other people to use
    your account either.


    Using a `.env` file is a common way to use API keys without putting the key in
    your Python code. A `.env` file is just a simple text file with the name `.env`
    and no extension. In that file, you can give the key a variable name of your own
    choosing. That way, you can show only the variable name, not the actual key, in
    your code. So, if you share your code with others, your key is still hidden.


    As you may know, a variable whose value never changes is referred to as a *constant*
    in Python and other programming languages. Because your API key won''t change
    as your script is running, it''s actually a constant in your code. Though not
    required, it''s customary to show constant names in all uppercase letters (to
    distinguish constants from variables). So, if you decide on a name like Weather_API_Key
    for your variable name, you could actually type the name in all uppercase letters,
    like this:


    ```

    WEATHER_API_KEY=8c21435c4317367221435aac09bf4c1d

    ```


    You can put as many API keys as you like into a .env file. Just make sure each
    has a unique name. Here are the steps for adding an API key to a Python project
    in Visual Studio Code (VS Code):


    1. Open your Python project folder in VS Code.

    2. Create and activate a virtual environment if you haven''t already done so.
    See Chapter 2 for complete instructions.

    3. Touch the mouse pointer to the project folder name at the top of the Explorer
    pane and click New File, or choose File > New File from the menu bar.

    4. Name the file .env. Don''t use any spaces or a filename extension — just type
    the name as shown.

    5. With the file open in the editor, type a name for the key (usually in all uppercase
    letters) followed by an equal sign (=) and the API key. Figure 9-1 shows an example.

    6. Close and save the .env file.


    ![](img/10d8e89b301a0e7452bff4d402265e78_194_0.png)


    The API key must be a valid key that you got from the provider. The one shown
    in Figure 9-1 is just an example and won''t work in real life. Make sure you use
    your own API key.


    ## OTHER WAYS TO SECURE API KEYS


    Instead of storing API keys in a .env file, you can store keys with the operating
    system''s environment variables, or use a cloud-based service like Amazon Web
    Services (AWS) Secrets Manager (https://aws.amazon.com/secrets-manager), Microsoft
    Azure Key Vault (https://azure.microsoft.com/en-us/products/key-vault), or Google
    Cloud Secret Manager (https://cloud.google.com/security/products/secret-manager).
    I won''t go into detail on those options, because this is a book about Python
    automation, not API key management, but feel free to explore them on your own
    by searching the web or asking an artificial intelligence (AI) about them.


    ## Creating a .gitignore file


    If there is any chance you''ll upload the project to GitHub, be sure to include
    a .gitignore file with .env included in it to prevent your key from being shared
    with your Python code. You can also include the .venv filename in that .gitignore
    file, so users can create their own virtual environment for their own system after
    they download your code.


    > I cover virtual environments and the .venv file in Chapter 2.


    Adding a .gitignore file to a VS Code project is the same as adding any other
    file. Just create a new file, as you did with .env, but name this one .gitignore
    with no spaces and no filename extension. When the file is open in the editor,
    just type in .env and .venv, each on its own line, as shown in Figure 9-2.


