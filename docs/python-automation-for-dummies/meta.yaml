    \ second line may seem insignificant. But when you're working at a professional\
    \ level and dealing with thousands of lines of code, small changes like that add\
    \ up.\n\nHere's another example:\n\n```\n# Clunky and repetitive\nmy_dict = {\"\
    a\": 1, \"b\": 2}\nif \"c\" in my_dict:\n```"
