  md: "Using a simple function removes the added step of instantiating an object first.\
    \ You can get a result with a single line of code:\n\n```\nresult = process_data([1,\
    \ 2, 3])\n```\n\nThe latter approach is more practical and avoids the “purity”\
    \ of trying to strictly follow a paradigm like OOP.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_340_0.png)\n\
    \nUsing classes makes sense when creating application programming interfaces (APIs)\
    \ and larger modules that involve a lot of data input and output. There would\
    \ be nothing impractical about using a class that way. This principle is more\
    \ about using classes for small, general procedures that are easily handled with\
