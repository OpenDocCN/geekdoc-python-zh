  md: "Like a Python data dictionary, JSON consists of key-value pairs where each\
    \ item of data has a name and a value. The value can be a string, a number, a\
    \ Boolean, an array (list), an object, or null. Each key-value pair is enclosed\
    \ in curly braces.\n\n```\n{\n    \"username\": \"Alice\",\n    \"age\": 25,\n\
    \    \"is_student\": true,\n    \"hobbies\": [\"reading\", \"hiking\"],\n    \"\
    address\": {\n        \"street\": \"123 Main St\",\n        \"city\": \"Boston\"\
    \n    }\n}\n```\n\nEach name in this example (\"username\", \"age\", \"is_student\"\
    , \"hobbies\", and \"address\") is a *key*. Each key has a *value* to the right\
    \ of the colon. Here's some information about each key in that example:\n\n+ \
    \  - The \"username\" key contains a string.\n- The \"age\" key contains a number.\n\
    - The \"hobbies\" key contains an *array* (list).\n- The \"address\" key contains\
    \ an object.\n\nBecause the entire block of JSON data is sometimes referred to\
    \ as a JSON object, the \"address\" key may also be referred to as a *nested object*\
    \ (because it's contained with the larger JSON object). The address is unique\
    \ in that it's a dictionary object in its own right, containing two keys of its\
    \ own, one named \"street\" and the other named \"city\". Each of the other keys\
    \ only contains one value (like age, which contains the value 18).\n\nPython doesn't\
    \ have a JSON data type, so JSON data in Python code is often stored as a string.\
    \ When defining such strings, it's important to use single-quotes (') to enclose\
    \ the entire string, because each key name inside that string must be enclosed\
    \ in double quotation marks for JSON. A JSON string containing just two key-value\
    \ pairs in Python looks like this:\n\n```\njson_string = '{\"username\": \"Alice\"\
    , \"age\": 25}'\n```"
