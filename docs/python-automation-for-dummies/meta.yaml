    \ HTML 标签被高亮显示，如图 10-2 所示。在这个例子中，我右键单击了维基百科页面上的搜索框。高亮显示的标签包括 id=\"searchInput\"\
    ，这表明该控件的 id 是 \"searchInput\"。\n\n> 如果你使用当前的网络浏览器找不到控件的 id，可以尝试使用 Edge 或 Chrome\
