    \ as e: Catches any exception and stores the exception object in a variable named\
    \ e. Use print(f\"An error occurred: {e}\") to display the error object text.\n\
    \nCustom exceptions are classes you create yourself using the class keyword and\
    \ (Exception). The syntax for defining such a class is:\n\n```\nclass Exceptionname(Exception):\n\
    ```\n\nReplace Exceptionname with a name of your own choosing (as long as it doesn't\
    \ match any of the existing built-in exception names). As with regular classes,\
    \ Python suggests using an initial uppercase letter in the class name to identify\
    \ the code as a class. The word Exception in parentheses means your class will\
    \ inherit the capabilities of all exceptions from the Exception class that's built\
    \ into the Python language.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_75_0.png)\n\
    \nUsing exception handling in scripts is a best practice for writing Python scripts.\
    \ You'll see many examples throughout the automation scripts in this book.\n\n\
    The following script asks the user to enter two numbers. The try block checks\
    \ for various errors and displays appropriate error messages so that the script\
    \ can keep running without crashing, regardless of what the user enters.\n\n```\n\
    # Function to ask for two numbers, handle exceptions, and divide.\ndef divide_numbers():\n\
    \    try:\n        # Get input from user\n        num1 = input(\"Enter the first\
    \ number: \")\n        num2 = input(\"Enter the second number: \")\n\n       \
    \ # Convert user entries to floats\n        number1 = float(num1)\n        number2\
    \ = float(num2)\n\n        # Perform division\n        result = number1 / number2\n\
    \n    # Handle exception if user inputs non-numeric values.\n    except ValueError:\n\
    \        print(\"Error: Please enter valid numbers\")\n        return None\n```"
  - "[PAGE 76]\n\n```\n# Handle exception if second number is zero.\nexcept ZeroDivisionError:\n\
    \    print(\"Error: Cannot divide by zero\")\n    return None\n\n# Handle any\
    \ other exceptions that may occur.\nexcept Exception as e:\n    print(f\"Unexpected\
    \ error occurred: {str(e)}\")\n    return None\n\n# This block executes only if\
    \ no exceptions occur.\nelse:\n    print(f\"The division was successful!\")\n\
    \    return result\n\n# This block always executes, regardless of exceptions.\n\
    finally:\n    print(\"Calculation attempt completed\")\n\n# Main function to run\
    \ the division calculator function.\ndef main():\n    print(\"Welcome to the Division\
    \ Calculator!\")\n    result = divide_numbers()\n\n    if result is not None:\n\
    \        print(f\"Result: {result}\")\n    print(\"Thank you for using the calculator!\"\
    )\n\n# Call the main function to start the program.\nif __name__ == \"__main__\"\
    :\n    main()\n```\n\nHere's how the script works:\n\n+   >> **try**: Contains\
    \ the code that may raise exceptions. In this example, the `try` block asks the\
    \ user to enter two numbers. Then the code attempts to convert whatever the user\
