  - '[PAGE 77]


    +   - ZeroDivisionError: Raised if the second number is zero.

    - Exception: Raised for any other unexpected error.


    +   >> else: Executes only if no exceptions occur. Prints a success message and
    returns a result.

    >> finally: Executes no matter what. Prints a completion message.


    The script contains a second function named `main()` that displays a welcome message
    and then calls the `divide_numbers()` function. Whatever that function returns
    is stored in a variable named `result`. If `result` is anything other than `None`,
    that result is displayed. Then, no matter what, the script shows the text "Thank
    you for using the calculator!"


    The very last block calls the `main()` function, which, in turn, runs the entire
    script.


    Throughout Python, you''ll see variable names and values that start and end with
    double underscores like `__init__` and `__name__` and `__main__`. These are sometimes
    called *dunder names* (dunder being short for *double underline*). They''re built-in
    variable names that have special meaning in Python. The common use of them is
    this statement, shown near the end of the previous sample code:


    ```

    if __name__ == "__main__":

    ```


    `__name__` is a special, built-in variable that automatically gets its value when
    you run Python code. In a script that you run directly (for example, using the
    Run Python File icon in VS Code or a `python` command followed by the script''s
    filename), the `__name__` variable gets the value `__main__`.


    In code that''s imported into a script with an `import` statement, the `__name__`
    variable gets the value of the imported module''s name, never `__main__`. Using
    `if __name__ == "__main__":` ensures that any code indented below the `if` statement
    is executed only when that script is executed directly, not when it''s imported
    into another script that was run directly.


    ![](img/10d8e89b301a0e7452bff4d402265e78_77_0.png)


    The last code example in this chapter is typical in that it allows you to organize
    code into functions, each of which performs a specific task and returns a value.
    Then it calls functions, as needed at the end, but only if the current script
    was run directly and not imported as a module via `import` statements.'
- md: '## 2 Automating Common Computer Tasks


    ### IN THIS PART . . .


    - Automate and organize files and folders.

    - Back up files, find duplicates, and delete old files.

    - Manage files for images and videos.

    - Automate the mouse, the keyboard, and typing text.

    - Automate the office and office apps.


    ### IN THIS CHAPTER


    - Talking the talk

    - Playing it safe with automation scripts

    - Walking through directory trees

    - Grouping files according to file type

    - Batch file naming


    ## Chapter 4

    ## Automating Files and Folders


    Many automation scripts save you time and effort by navigating through folders
    and files to make changes to files. Python offers many tools and techniques for
    working with *directories* (folders) and files. Three modules are key:


    - **os**: Provides ways to interact with the operating system (Linux, macOS, Windows)
    including navigating folders and files, and working with paths and environment
    variables

    - **shutil**: Utilities for copying, moving, renaming, and deleting folders and
    files

    - **pathlib**: Provides a newer, object-oriented way to work with folders and
    files, making it easier to create scripts that work on any operating system


    These modules are part of the standard library, which means they''re built in.
    When you want to use any of these modules, you don''t need to `pip install` them.
    Instead, just put your `import` statement(s) right at the top of your code.


    *Note:* Like the rest of the world, I use the terms *directory* and *folder* interchangeably,
    because they mean the same thing: a container for storing files.


    ## Demystifying the Buzzwords


    Most people probably use File Explorer in Windows or Finder on macOS to work with
    files and folders.


    In Windows, File Explorer directories are indicated by manila file folder icons
    (hence, the name *folder*). In the File Explorer navigation pane, built-in folders
    like Desktop, Downloads, Documents, Pictures, and Videos may not look like folder
    icons, but those are all folders.


    Files are indicated by document icons, or by a thumbnail image if the file is
    an image or video. The path to the current folder is shown in the Address Bar
    at the top of the window in a friendly format, such as *Alan Simpson > Documents
    > Practice* (see Figure 4-1).


    ![](img/10d8e89b301a0e7452bff4d402265e78_81_0.png)


    **FIGURE 4-1:** Windows File Explorer.


    > 💡 **TIP**

    > If you click after the last named folder in the Windows Address Bar’s friendly
    path, you’ll see the path converted to a format more suitable for writing code.
    So, typically, you can just copy and paste that path into your code — though,
    in Python, you’ll have to change it a little, as I explain in the “Drives, directories,
    folders, and files” section, later in this chapter.


    On macOS, you use Finder to navigate folders and files. Directories are indicated
    by folder icons. Files are indicated by document icons or a thumbnail image for
    images and videos. The path to the current folder is displayed near the bottom
    of the Finder window, such as *Macintosh HD > Users > alan > Practice* (see Figure
    4-2). That path is a little misleading because, from Python’s perspective, the
    *actual* path is Users/username/Practice.


    ![](img/10d8e89b301a0e7452bff4d402265e78_82_0.png)


    **FIGURE 4-2:** macOS Finder.


    > Folders under iCloud in Finder''s navigation pane are read-only in relation
    to Python code. So, if you''re on a Mac, you''re better off creating your Practice
    folder under your username under Macintosh HD. Copy the files you intend to modify
    to that Practice folder first, for safety. The path to a folder named Practice
    under your username will look like /Users/Alan/Practice without Documents as part
    of the name.


    ## Drives, directories, folders, and files


    Working with files and folders in code requires working with paths. A path is
    the path required to get to a certain file or folder. For example, in Windows,
    a path may look something like this:


    ```

    C:\Users\Alan\Documents\Practice\photo.jpg

    ```


    The path above refers to a file named photo.jpg. To get to that file you need
    to navigate to the C: drive, and then down through the folders named Users, Alan,
    Documents, and Practice.


    In a Windows path, the C: is the disk drive (the actual storage device). The names
    that follow, separated by backslashes (\), are folder and subfolder names. If
    the path leads to a specific file in the last folder, the filename is at the end
    of the path. The filename always ends with an extension, like .jpg, to indicate
    the file type and to differentiate it from a folder name.


    In Linux and macOS, paths omit the drive name and just start with a folder name.
    On macOS, I recommend putting your `Practice` folder under your username, rather
    than in the `Documents` folder, because the `Documents` folder under iCloud is
    read-only to Python. Use forward slashes (/) rather than backslashes to separate
    folder names in the path. If the path is to a specific file, the filename comes
    last in the path, and it always has a filename extension. Here''s an example of
    a path on macOS:


    ```

    /Users/Alan/Practice/photo.jpg

    ```


    You don''t need a drive letter like `C:`, because the path always refers to the
    main startup disk (named Macintosh HD in Finder, by default).


    ![](img/10d8e89b301a0e7452bff4d402265e78_83_0.png)


    When you right-click a file in any folder and choose Get Info in Finder, you''ll
    see a path like `Macintosh HD > Users > username > Practice` (it''s in the General
    section, next to Where). Right-click that path and choose Copy As Pathname. The
    Clipboard will contain the proper path, so when you paste it into your code, it
    will be the correct pathname for your code in the format `/Users/username/Practice`.


    For Linux, you usually start the path with `/home` which is the `root` (top) folder
    of the entire directory tree. Unlike on macOS, there''s rarely a `Users` subfolder
    in Linux. So, the Linux path will look more like this:


    ```

    /home/Alan/Practice/photo.jpg

    ```


    ## Absolute versus relative paths


    All the paths shown in the preceding section are *absolute paths*, because they
    all start at the top of the directory tree, indicated by `/` on macOS and Linux,
    and by `C:\` in Windows.


    In Python, you can use relative paths, which are always expressed relative to
    the current working directory. Two symbols are used for relative paths:


    - `.`: Refers to the current working directory

    - `..`: Refers to the parent of the current working directory


    For example, if the current working directory in Windows is `C:\Users\Alan\Documents\Practice`:


    - `.` refers to `C:\Users\Alan\Documents\Practice`

    - `..` refers to `C:\Users\Alan\Documents`


    If the current working directory on macOS is /Users/Alan/Practice:


    ```

    . refers to /Users/Alan/Practice

    .. refers to /Users/Alan

    ```


    ## Backslashes in Windows paths


    Windows paths use single backslashes to separate folder names and filenames in
    paths. Python uses the backslash in strings as an escape character, giving special
    meaning to the character that follows the backslash. Here are some examples:


    | Code | Description |

    |---|---|

    | \n | Newline (ends the current line, or inserts a blank line when used alone)
    |

    | \t | Tab (inserts a tab character) |

    | \" | A literal quotation mark embedded in a string |

    | \'' | A literal apostrophe (single quotation mark) embedded in a string |

    | \\ | A literal backslash embedded in a string |


    In Python code, use `\\` as a separator in a string like the following, when you''re
    storing a variable:


    ```

    path = "C:\\Users\\Alan\\Documents\\Practice"

    ```


    Optionally, you can define the string as a raw string by prefixing the first quotation
    mark with a lowercase r like this:


    ```

    directory = r"C:\Users\Alan\Documents\Practice"

    ```


    If you''re using pathlib, you can pass the variable directly into pathlib.Path
    without worrying about the backslashes. In the preceding example, the Windows
    path is stored in a variable named directory. If you import Path from pathlib,
    you can write:


    ```

    from pathlib import Path

    directory = r"C:\Users\Alan\Documents\Practice"

    directory = Path(directory)

    ```'
  mdcn: '## 2 自动化常见计算机任务


    ### 本部分内容...


    - 自动化并组织文件和文件夹。

    - 备份文件、查找重复项并删除旧文件。

    - 管理图像和视频文件。

    - 自动化鼠标、键盘和文本输入。

    - 自动化办公及办公应用程序。


    ### 本章内容


    - 术语解析

    - 安全使用自动化脚本

    - 遍历目录树

    - 按文件类型分组文件

    - 批量文件重命名


    ## 第4章

    ## 自动化文件和文件夹


    许多自动化脚本通过导航文件夹和文件来修改文件，从而为你节省时间和精力。Python 提供了许多用于处理*目录*（文件夹）和文件的工具和技术。其中三个模块是关键：


    - **os**：提供与操作系统（Linux、macOS、Windows）交互的方式，包括导航文件夹和文件，以及处理路径和环境变量。

    - **shutil**：用于复制、移动、重命名和删除文件夹及文件的实用工具。

    - **pathlib**：提供了一种更新的、面向对象的方式来处理文件夹和文件，使得创建能在任何操作系统上运行的脚本变得更加容易。


    这些模块是标准库的一部分，这意味着它们是内置的。当你想使用其中任何一个模块时，不需要 `pip install` 它们。只需将你的 `import` 语句放在代码的最顶部即可。


    *注意：* 和世界上其他人一样，我将 *directory* 和 *folder* 这两个术语互换使用，因为它们意思相同：都是存储文件的容器。


    ## 揭开术语的神秘面纱


    大多数人可能使用 Windows 中的文件资源管理器或 macOS 中的访达来处理文件和文件夹。


    在 Windows 中，文件资源管理器中的目录由米色文件夹图标表示（因此得名 *folder*）。在文件资源管理器的导航窗格中，像桌面、下载、文档、图片和视频这样的内置文件夹可能看起来不像文件夹图标，但它们都是文件夹。


    文件由文档图标表示，如果是图像或视频文件，则由缩略图表示。当前文件夹的路径以友好的格式显示在窗口顶部的地址栏中，例如 *Alan Simpson > Documents
    > Practice*（参见图 4-1）。


    ![](img/10d8e89b301a0e7452bff4d402265e78_81_0.png)


    **图 4-1：** Windows 文件资源管理器。


    > 💡 **提示**

    > 如果你在 Windows 地址栏友好路径的最后一个命名文件夹后点击，你会看到路径转换为更适合编写代码的格式。因此，通常你可以直接将该路径复制并粘贴到你的代码中——不过，在
    Python 中，你需要稍微修改一下，正如我在本章后面的“驱动器、目录、文件夹和文件”部分所解释的那样。


    在 macOS 上，你使用访达来导航文件夹和文件。目录由文件夹图标表示。文件由文档图标或图像和视频的缩略图表示。当前文件夹的路径显示在访达窗口底部附近，例如
    *Macintosh HD > Users > alan > Practice*（参见图 4-2）。这个路径有点误导性，因为从 Python 的角度来看，*实际*路径是
    Users/username/Practice。


    ![](img/10d8e89b301a0e7452bff4d402265e78_82_0.png)


    **图 4-2：** macOS 访达。


    > 访达导航窗格中 iCloud 下的文件夹对于 Python 代码是只读的。因此，如果你使用 Mac，最好在 Macintosh HD 下你的用户名下创建你的
    Practice 文件夹。为了安全起见，请先将你打算修改的文件复制到该 Practice 文件夹。你用户名下名为 Practice 的文件夹路径将类似于 /Users/Alan/Practice，其中不包含
    Documents 作为名称的一部分。


    ## 驱动器、目录、文件夹和文件


    在代码中处理文件和文件夹需要处理路径。路径是到达某个特定文件或文件夹所需的路径。例如，在 Windows 中，路径可能看起来像这样：


    ```

    C:\Users\Alan\Documents\Practice\photo.jpg

    ```


    上面的路径指向一个名为 photo.jpg 的文件。要到达该文件，你需要导航到 C: 驱动器，然后依次进入名为 Users、Alan、Documents 和
    Practice 的文件夹。


    在 Windows 路径中，C: 是磁盘驱动器（实际的存储设备）。后面由反斜杠 (\) 分隔的名称是文件夹和子文件夹的名称。如果路径指向最后一个文件夹中的特定文件，则文件名位于路径的末尾。文件名总是以扩展名结尾，例如
    .jpg，以指示文件类型并将其与文件夹名区分开来。


    在 Linux 和 macOS 中，路径省略了驱动器名称，直接以文件夹名开头。在 macOS 上，我建议将你的 `Practice` 文件夹放在你的用户名下，而不是
    `Documents` 文件夹中，因为 iCloud 下的 `Documents` 文件夹对于 Python 是只读的。在路径中使用正斜杠 (/) 而不是反斜杠来分隔文件夹名。如果路径指向特定文件，则文件名位于路径的末尾，并且总是有文件名扩展名。以下是
    macOS 上路径的示例：


    ```

    /Users/Alan/Practice/photo.jpg

    ```


    你不需要像 `C:` 这样的驱动器号，因为路径总是指向主启动盘（在访达中默认名为 Macintosh HD）。


    ![](img/10d8e89b301a0e7452bff4d402265e78_83_0.png)


    当你在任何文件夹中右键单击一个文件并在访达中选择“显示简介”时，你会看到类似 `Macintosh HD > Users > username > Practice`
    的路径（它在“通用”部分，位于“位置”旁边）。右键单击该路径并选择“拷贝为路径名”。剪贴板将包含正确的路径，因此当你将其粘贴到代码中时，它将是代码中正确格式的路径名，格式为
    `/Users/username/Practice`。


    对于 Linux，你通常以 `/home` 开头，这是整个目录树的 `root`（顶层）文件夹。与 macOS 不同，Linux 中很少有 `Users`
    子文件夹。因此，Linux 路径看起来更像这样：


    ```

    /home/Alan/Practice/photo.jpg

    ```


    ## 绝对路径与相对路径


    上一节中显示的所有路径都是*绝对路径*，因为它们都从目录树的顶部开始，在 macOS 和 Linux 中用 `/` 表示，在 Windows 中用 `C:\`
    表示。


    在 Python 中，你可以使用相对路径，它们总是相对于当前工作目录表示。相对路径使用两个符号：


    - `.`：指当前工作目录

    - `..`：指当前工作目录的父目录


    例如，如果 Windows 中的当前工作目录是 `C:\Users\Alan\Documents\Practice`：


    - `.` 指 `C:\Users\Alan\Documents\Practice`

    - `..` 指 `C:\Users\Alan\Documents`


    如果 macOS 上的当前工作目录是 /Users/Alan/Practice：


    ```

    . 指 /Users/Alan/Practice

    .. 指 /Users/Alan

    ```


    ## Windows 路径中的反斜杠


    Windows 路径使用单个反斜杠来分隔路径中的文件夹名和文件名。Python 在字符串中使用反斜杠作为转义字符，赋予其后跟字符特殊含义。以下是一些示例：


    | 代码 | 描述 |

    |---|---|

    | \n | 换行符（结束当前行，或单独使用时插入空行） |

    | \t | 制表符（插入制表符） |

    | \" | 嵌入字符串中的字面引号 |

    | \'' | 嵌入字符串中的字面撇号（单引号） |

    | \\ | 嵌入字符串中的字面反斜杠 |


    在 Python 代码中，当你存储变量时，在字符串中使用 `\\` 作为分隔符，如下所示：


    ```

    path = "C:\\Users\\Alan\\Documents\\Practice"

    ```


    或者，你可以通过在第一个引号前加上小写 r 将字符串定义为原始字符串，如下所示：


    ```

    directory = r"C:\Users\Alan\Documents\Practice"

    ```


    如果你使用 pathlib，你可以将变量直接传递给 pathlib.Path，而无需担心反斜杠。在前面的示例中，Windows 路径存储在名为 directory
    的变量中。如果你从 pathlib 导入 Path，你可以这样写：


    ```

    from pathlib import Path

    directory = r"C:\Users\Alan\Documents\Practice"

    directory = Path(directory)

    ```'
