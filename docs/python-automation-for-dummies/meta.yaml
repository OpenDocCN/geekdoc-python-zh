    \ code avoids unnecessary complexity, favoring straight-forward solutions.\n>>\
    \ **Expressiveness:** Beautiful code leverages Python's features to convey intent\
    \ clearly and concisely.\n>> **Maintainability:** Beautiful code is easier to\
    \ debug, extend, and collaborate on.\n\nIn contrast, ugly code sacrifices these\
    \ qualities for quick fixes, clever tricks, or overengineered solutions that obscure\
    \ intent.\n\nSometimes being beautiful is simply a matter of using fewer words.\
    \ For example, the following code below uses an `if` statement to determine whether\
