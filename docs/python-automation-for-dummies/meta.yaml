    ```\n\n你应该能够通过输入命令 ollama list 来验证 tinyllama 是否已安装。\n\n要设置你的 Python 项目，像往常一样创建你的文件夹和虚拟环境。激活你的虚拟环境，并在终端中输入以下命令以安装\
