    \ `return hasher.hexdigest()` 将该值返回给调用函数。\n\n## 查找重复文件\n\n`find_duplicates()`\
    \ 函数执行实际的重复文件查找工作。在此过程中，它会填充一个名为 `file_hashes` 的字典和一个名为 `duplicates` 的列表。\n\n\
    ```python\ndef find_duplicates(root_dir, recursive=True):\n    # Find duplicate\
