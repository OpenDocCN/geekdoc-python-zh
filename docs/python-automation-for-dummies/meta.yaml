- md: "## Warming Up to a Local Chatbot\n\nYou can run popular AI models like DeepSeek-R1,\
    \ Gemma 3 from Google, Meta Llama 3, Qwen locally on your computer without internet\
    \ access or paid subscriptions. These models can answer questions, generate text,\
    \ analyze images, summarize data, help with coding, and more. Running these models\
    \ is a great way to practice and learn AI coding.\n\nOllama, an open-source tool\
    \ that lets you run powerful AI large language models (LLMs) directly on your\
    \ own computer, is one of the best tools for this. To use Ollama effectively,\
    \ your system should have a minimum of 8GB of RAM and at least 100GB of free disk\
    \ space — LLM files can be huge. If your system includes an NVIDIA, AMD, or Apple\
    \ Silicon graphics processing unit (GPU), or a neural processing unit — Ollama\
    \ will use it automatically to accelerate performance. If you're using a CPU-only\
    \ system, Ollama still functions, but processing may be significantly slower.\n\
    \n> If you're using a CPU-only system, you'll get better performance from models\
    \ with 1 to 7 billion parameters (1B–7B). TinyLlama 1.1B, Phi-2, and Mistral 7B\
    \ are popular smaller models.\n\nFor Python, there's an Ollama module that makes\
    \ it relatively easy to write Python code to interact with the local models you\
    \ download via Ollama. But before you start writing any Python code, you'll need\
    \ to download and install the Ollama app, which allows you to download models.\
    \ Let's start there.\n\n## Installing and running Ollama\n\nThe first step to\
    \ using Ollama is to download and install it on your computer. You can find versions\
    \ for Linux, macOS, and Windows at https://ollama.com/download. You download and\
    \ install it just like any other app.\n\nAfter Ollama is installed, you can run\
    \ it from the Windows Start menu, the macOS Launchpad, or however you normally\
    \ launch apps on Linux. Ollama runs as a *background process*, which means you\
    \ won't see any open windows or Taskbar/Dock icons while it's running. However,\
    \ you may see a tiny llama icon in the Windows Notification Area (see Figure 15-2)\
    \ or on the macOS menu bar (near the Wi-Fi, battery, and other icons on the right).\n\
    \nThe llama icon means Ollama is running\n\n![](img/10d8e89b301a0e7452bff4d402265e78_294_0.png)\n\
    \nFIGURE 15-2: Ollama running in the background.\n\n## Downloading AI models with\
    \ Ollama\n\nWhen Ollama is running in the background, you can interact with Ollama\
    \ through a command-line interface (CLI). In other words, you can interact with\
    \ it through the Terminal window in VS Code on any computer.\n\nThough not required,\
    \ you can also access Ollama from a command line outside of VS Code. On Windows,\
    \ you can use Command Prompt or PowerShell. On macOS or Linux, use the Terminal\
    \ app.\n\nTo verify that Ollama is running and available, you can check its version\
    \ number by entering the command `ollama --version` (see Figure 15-3). Optionally,\
    \ use your web browser to browse to 127.0.0.1:11434 (a local address) and you'll\
    \ see the message `Ollama is running`. If Ollama isn't running, entering `ollama\
    \ serve` at the command line should start it.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_295_0.png)\n\
    \nTo use an AI model locally, first you have to download it. In the Terminal,\
    \ enter the command `ollama pull` followed by a space and the name of the model\
    \ you want to download. For example, entering the following command will download\
    \ the popular `llama3.2` model:\n\n```\nbash\nollama pull llama3.2\n```\n\nMake\
    \ sure you spell the model name correctly in your command. Browse to `ollama.com`\
    \ and click the Models link to see the available models and their names. I mention\
    \ it because many have weird names that are easy to misspell.\n\nThe models tend\
    \ to be large; each one may take a minute or more to download. If at any time\
    \ you want to check to see which models you've already downloaded, enter the command\
    \ `ollama list`, as shown in Figure 15-4; you can see the sizes of the models\
    \ I've downloaded.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_295_1.png)\n\n\
    ### Building a simple local chatbot\n\nA chatbot is a form of AI in which you\
    \ submit a question or prompt, and AI returns an answer. ChatGPT, Claude, Google\
    \ Gemini, Grok, Meta AI, and Microsoft Copilot are all examples of modern chatbots.\
    \ You can create your own, albeit relatively simple, chatbot with a downloaded\
    \ Ollama model and just a few lines of Python code.\n\nKeep in mind that if your\
    \ computer doesn't have a powerful GPU — such as an NVIDIA card or Apple Silicon\
    \ chip such as the M1 Ultra, M2 Ultra, M3, or M4, or AMD MI-series chip — running\
    \ AI models locally can be painfully slow. For this example, I recommend downloading\
    \ a smaller model, tinyllama, which runs at a decent speed even without high-end\
    \ hardware. That way, you can get some hands-on experience writing Python code\
    \ to interact with AI no matter what hardware you're using.\n\nTo download tinyllama,\
    \ make sure Ollama is running on your computer. Then at any command line, enter\
    \ the following:\n\n```\nollama pull tinyllama\n```\n\nYou should be able to verify\
    \ that tinyllama is installed by entering the command ollama list.\n\nTo set up\
    \ your Python project, create your folder and virtual environment as usual. Activate\
    \ your virtual environment and enter the following command in the Terminal to\
    \ install the ollama Python module:\n\n```\npip install ollama\n```\n\nHere's\
    \ all the code for the simple chatbot:\n\n```\n# simple_chatbot.py\n# pip install\
    \ ollama\nimport ollama\n\n# Must be a model you have pulled with Ollama\nmodel\
    \ = \"tinyllama\"\nprint(\"\\nSimple Ollama Chatbot (model: tinyllama)\")\nprint(\"\
    Type your prompt, or 'quit' to exit.\\n\")\nwhile True:\n    # Get prompt from\
    \ user.\n    prompt = input(\"You: \").strip()\n    if prompt.lower() == \"quit\"\
    :\n        print(\"Goodbye!\")\n        break\n    try:\n        # Get response\
    \ from the Ollama model.\n        response = ollama.chat(model=model, messages=[{\"\
    role\": \"user\",\n        \"content\": prompt}], stream=False)\n        print(\"\
    Bot:\", response[\"message\"][\"content\"])\n    except Exception as e:\n    \
    \    print(f\"Error: {e}\")\n```\n\nI'll step through key components of the code\
    \ next.\n\nThe `import ollama` line is required to load the `ollama` module to\
    \ simplify interacting with Ollama models from Python. The line `model = \"tinyllama\"\
    ` indicates which Ollama model you want to use. This must be a model you've already\
    \ downloaded using `ollama pull`.\n\nThe line `prompt = input(\"You: \").strip()`\
    \ puts the word `You` on the screen as a prompt (you can change that to any text\
    \ you want). Then the script does nothing until the user types a prompt and presses\
    \ `Enter`. When that happens, the user's text is stored in the variable named\
    \ `prompt`, with any leading and trailing spaces removed by the `.strip()` method.\n\
    \nThe next line sends that prompt to the chatbot, waits for a response, and stores\
    \ the response in a variable named `response`:\n\n```\nresponse = ollama.chat(model=model,\
    \ messages=[{\"role\": \"user\", \"content\": prompt}], stream=False)\n```\n\n\
    Let's dissect that line:\n\n| Code | Description |\n| :--- | :--- |\n| `ollama.chat`\
    \ | Uses the `chat` method of the `ollama` module to send a prompt to the AI model\
    \ and accept the resulting reply |\n| `model=model` | Tells `ollama` to use the\
    \ model previously stored in the variable named `model` (`tinyllama` in this example)\
    \ |\n| `messages=` | Defines a dictionary of information about the prompt |\n\
    | `\"role\": \"user\"` | Indicates that the prompt is coming from a human user\
    \ rather than another model or system |\n| `\"content\": prompt` | Defines the\
    \ content of the prompt being sent as the text currently stored in the variable\
    \ named `prompt` |\n| `stream=False` | Ensures that the response is returned all\
    \ at once, rather than in chunks, which makes it easier to store that information\
    \ in the variable named `response` |\n\nThis is a super simple chatbot that doesn't\
    \ remember conversations, which may feel strange if you've been using conversation\
    \ AI online for a while. But you can add some conversational ability to your own\
    \ Python AI apps, as I explain in the next section."
