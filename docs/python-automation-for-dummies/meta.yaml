    # Schedule a task daily at a specific time (for example, 8:00 AM).

    schedule.every().day.at("08:00").do(job)

    ```


    Here''s an example of scheduling at 9:30 AM every weekday:


    ```

    # Schedule a task every weekday at a specific time (for example, Monday through
    Friday at 9:30 AM).

    schedule.every().monday.at("09:30").do(job)

    schedule.every().tuesday.at("09:30").do(job)

    schedule.every().wednesday.at("09:30").do(job)

    schedule.every().thursday.at("09:30").do(job)

    schedule.every().friday.at("09:30").do(job)

    ```


    You have a lot of leeway in how often you want to run your scheduled task. However,
    the `schedule` module isn''t the only game in town for scheduling tasks. In the
    next section, I introduce you to the APScheduler module, which can also schedule
    tasks and has a few extra tricks up its sleeve in terms of specifying schedules.


    # Using the APScheduler Module


    The `schedule` module is a popular and relatively easy way to schedule tasks with
    Python. But out in the corporate world, many people use APScheduler (which stands
    for *Advanced Python Scheduler*). It works similarly to `schedule` but offers
    more flexibility for specifying dates and times for running tasks. APScheduler
    also lets you avoid the awkward `while True` loop in the previous script.


    > APScheduler is not part of the Python standard library. So, if you intend to
    use it in a script, make sure to `pip install APScheduler` first.'
