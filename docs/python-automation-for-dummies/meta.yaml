    \n## 定义 Python 函数\n\n你遇到的大部分 Python 代码都会被组织成 Python 函数。函数是编程中的基本工具，允许你编写可重用、有组织且高效的代码。*函数*是一个执行特定任务的代码块，可以在需要时重复使用。可以把它想象成一个食谱：你定义一次步骤，然后就可以随时使用它，而无需重写所有内容。\n\
    \n在 Python 中，函数使用 `def` 关键字定义。基本结构如下：\n\n```\ndef function_name(parameters):\n\
    \    # 代码块（函数执行的操作）\n    return result  # 可选：返回一个值\n```\n\n`def` 这个词是 *define*（定义）的缩写，它告诉\
    \ Python 将后面的代码视为一个函数。代码不会立即执行。相反，脚本中的其他代码可以随时调用该函数来执行其代码。\n\n*function_name*\
    \ 部分是你自定义的名称。使用小写字母和下划线，而不是空格。名称应描述函数的功能，例如 `calculate_area` 或 `authenticate_user`。\n\
    \n*parameters*（参数）是可选的，它们是变量名，可以在调用函数时接收数据。\n\n`return` 语句标记函数的结束。*result* 是可选的；它是一个变量名，包含返回给调用代码的任何数据。如果你省略\
    \ *result*，函数将返回 `None`。\n\n与其他代码块一样，缩进至关重要。函数的所有代码，包括 `return` 语句，都必须缩进在初始定义\
    \ `def` 语句的下方。\n\n脚本中的后续代码可以通过函数名后跟圆括号来*调用*该函数。\n\n大多数函数接受一个或多个参数作为输入。函数内的代码然后对该输入执行某些操作，并返回一个值作为结果。下面是一个例子，其中名为\
    \ `calculate_area` 的函数接受两个值：`width` 和 `height`（假设是矩形的宽和高）。函数内的代码将 `width` 和 `height`\
    \ 相乘以计算矩形的面积，并将其存储在名为 `area` 的变量中。然后在最后一行 `return area` 中，将 `area` 的值返回给调用代码。\n\
    \n```\n# 一个计算并返回矩形面积的函数\ndef calculate_area(width, height):\n    area = width\
    \ * height\n    return area\n```\n\n定义之后，后续代码可以调用该函数，将值传递给其参数，并将结果存储在一个变量中。以下代码调用\
    \ `calculate_area` 函数，传入值 `5` 和 `10`，然后将结果存储在名为 `rectangle_area` 的变量中。\n\n```\n\
    # 调用 calculate_area 函数。\nside_a = 5\nside_b = 10\nrectangle_area = calculate_area(side_a,\
    \ side_b)\n```\n\n函数在大多数 Python 代码中被大量使用，因为它们允许将大型脚本分解成更小、更易于管理的部分。\n\n## 为参数定义默认值\n\
    \n你可以为参数定义默认值。如果在调用函数时未提供参数值，则使用默认值。下面是一个例子，其中变量的默认值被设置为字符串 \"friend\"：\n\n```\n\
    def greet(name=\"friend\"):\n    greeting = \"Hi, \" + name\n    return greeting\n\
    ```\n\n以下是调用该函数并为参数提供值 \"John\" 的示例：\n\n```\nprint(greet(\"John\"))\n```\n\n执行该代码的结果是：\n\
    \n```\nHi, John.\n```\n\n以下是一个未传递任何参数值的示例。注意，你仍然必须包含圆括号，如 `greet()`。只是不在圆括号内放置任何内容：\n\
    \n```\nprint(greet())\n```\n\n该代码显示：\n\n```\nHi, friend\n```\n\n默认值被用来替代缺失的参数值。\n\
    \n## 在 Python 函数中使用类型提示\n\nPython 还允许你在函数定义中使用类型提示。这些主要是为了给阅读代码的人提供信息，以了解应向函数传递什么或函数返回什么。在参数列表中使用冒号后跟类型名称来指示参数的数据类型。使用箭头（通过输入连字符和紧角括号形成）来指示函数返回值的数据类型。\n\
    \n例如，在以下函数中，`quantity` 预期为整数，`unit_price` 为浮点数。函数返回一个浮点数：\n\n```\ndef calculate_total(quantity:\
    \ int, unit_price: float) -> float:\n    return quantity * unit_price\n```\n\n\
    为了保持大型应用程序的组织性和易于理解，最好让每个函数执行单一任务，并且只返回一个值或不返回任何值。你将在本书中看到许多例子。主要观点是：保持函数简单，即使最大的应用程序也能变成相对简单的代码块的集合。\n\
    \n## 创建类和对象\n\n函数是组织代码的一种方式。类是另一种方式。在编码中，我们使用类来管理对象。`object`（对象）是关于一个项目的信息单元。例如，代表应用程序用户的一个对象可能包含有关该用户的用户名\
    \ (`user_name`)、电子邮件地址 (`email_address`)、注册日期 (`date_enrolled`)、登录状态 (`is_logged_in`)\
    \ 和其他信息。将所有这些信息与用户关联为一个对象，可以更容易地跟踪和管理用户数据。\n\n`class`（类）是一段允许你创建对象的代码。例如，要在你的应用程序中拥有用户对象，你需要定义一个\
    \ `User` 类，该类精确地定义了与每个用户关联的数据。该类还允许你创建用户对象。该类还可以包含方法，这些方法类似于函数，但专门设计用于与用户对象一起使用。\n\
    \n将代码组织成类有时被称为面向对象编程（OOP）。你可能已经听说过这个术语与其他编程语言（如 Java）相关。\n\nPython 中的类使用 `class`\
    \ 关键字定义。与变量不同，类的名称通常以大写字母开头。类就像一个用于创建对象的工厂。在类内部，你定义一个 `constructor`（构造函数），它允许你定义哪些变量（称为\
    \ `instance variables`（实例变量）或 `properties`（属性））与每个对象关联。你可以在类内部定义函数。然而，这些函数只能由使用该类创建的对象访问；它们被称为\
    \ `methods`（方法），以区别于常规函数。\n\n以下是一个名为 `User` 的示例类，它表示每个用户将拥有一个 `user_name`、`email_address`\
    \ 和 `date_joined`。该类包含一个方法，当"
