    \    except FileNotFoundError:\n        print(f\"Error: {filename} not found.\"\
    )\n        return None, 0\n\n    if not lines:\n        print(f\"Warning: {filename}\
    \ is empty before attempting to post.\")\n        return None, 0\n\n    # Retrieve\
    \ the first line and remove it from the file.\n    question = lines[0].strip()\n\
    \    remaining_questions = len(lines) - 1\n\n    with open(filename, \"w\") as\
    \ file:\n        file.writelines(lines[1:])\n\n    return question, remaining_questions\n\
    \n# Function to post to X using the question text from the specified file\ndef\
    \ post_to_x(filename):\n    question, remaining = process_file(filename)\n   \
    \ if question is None:\n        print(\"No question available for posting.\")\n\
    \        return\n\n    try:\n        response = client.create_tweet(text=question)\n\
    \        print(f\"Successfully posted to X: {question}\")\n        print(f\"Posted:\
    \ {question}\")\n    except tweepy.TweepyException as e:\n        print(f\"Error\
    \ posting to X: {str(e)}\")\n        if \"429\" in str(e):\n            print(\"\
    Warning: Rate limit reached. Waiting for reset...\")\n        elif \"403\" in\
    \ str(e):\n            print(\"Error: Forbidden. Check app permissions or credentials.\"\
    )\n        elif \"401\" in str(e):\n            print(\"Error: Unauthorized. Verify\
    \ API credentials.\")\n        return\n\n    print(f\"Number of questions left\
    \ in {filename}: {remaining}\")\n\n# Main loop to run the scheduler\ndef main():\n\
    \    # Define the filename of the file containing questions.\n    content_filename\
    \ = \"questions.txt\"\n    # Define how many hours between each post.\n    interval_hours\
    \ = 4\n\n    # Schedule the post every interval_hours hours.\n    schedule.every(interval_hours).hours.do(lambda:\
    \ post_to_x(content_filename))\n    print(f\"Scheduled posts every {interval_hours}\
    \ hour(s) using file: {content_filename}\")\n\n    print(\"Starting X posting\
