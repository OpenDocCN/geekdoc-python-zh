    \n```\n# age 变量被赋予一个数值。\nage = 20\n\n# status 变量的值取决于 age 变量的值。\nstatus = \"adult\"\
    \ if age >= 18 else \"minor\"\nprint(status)\n```\n\n## 使用 match 进行决策\n\nPython\
    \ 3.10 版本新增了 `match` 语句，作为处理多种可能性决策的另一种方式。`match` 语句是一个代码块，以 `match` 关键字开头，后跟一个变量名。其下方通常是两个或多个缩进的\
    \ `case` 语句，每个 `case` 语句后跟一个值和一个冒号。每个 `case` 语句下方缩进的一行或多行代码，仅在 `case` 语句中的值与变量的值匹配时才会执行。\n\
    \n在 `match` 代码块的底部，你可以使用 `case _:` —— 下划线代表一个*通配符*，它匹配之前所有 `case` 都未涵盖的任何情况。这就像一个\
    \ `else`，仅在前面所有 `case` 语句都不为真时执行。\n\n以下代码展示了一个相对简单的例子，其中 `day` 变量包含一个零到六之间的数字：\n\
    \n```\n# 定义一个名为 day 的变量，并为其赋值 0-6。\nday = 6\n\nmatch day:\n    case 1:\n     \
    \   print(\"Monday\")\n    case 2:\n        print(\"Tuesday\")\n    case 3:\n\
    \        print(\"Wednesday\")\n    case 4:\n        print(\"Thursday\")\n    case\
    \ 5:\n        print(\"Friday\")\n    # 以下 case 仅在前面所有 case 都不为真时执行。\n    case\
    \ _:\n        print(\"Weekend\")\n```\n\n你可以使用表 3-5 中的比较和逻辑运算符来设置更复杂的条件。为了代码更紧凑，可以使用按位与运算符\
    \ (`&`) 表示“与”，使用按位或运算符 (`|`) 表示“或”。\n\n以下代码展示了一个例子，其中第一个 `case` 语句在 `day` 变量包含工作日（星期一、星期二、星期三、星期四或星期五）时为\
    \ `True`。第二个 `case` 语句在 `day` 变量包含星期六或星期日时为 `True`。带有下划线 (`_`) 的通配符 `case` 语句在前面所有\
    \ `case` 语句都不为 `True` 时为 `True`。`day.lower()` 表达式将星期名称全部转换为小写，以匹配 `case` 语句中的字母。\n\
    \n```\n# 将一个星期名称（字符串）赋值给 day 变量。\nday = \"Tuesday\"\n# 根据转换为小写的 day 值进行决策。\nmatch\
    \ day.lower():\n    # 管道运算符 (|) 表示 \"或\"。\n    case \"monday\" | \"tuesday\" |\
    \ \"wednesday\" | \"thursday\" | \"friday\":\n        print(\"Weekday\")\n   \
    \ case \"saturday\" | \"sunday\":\n        print(\"Weekend\")\n    case _:\n \
