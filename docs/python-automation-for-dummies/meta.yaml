    # Finding elements to scrape


    You need to look at the HTML code of a page to find a way to identify the elements
    you want to scrape from the page. The easiest way to do that is to right-click
    the item in your browser and choose Inspect. In this example, you would discover
    that each book is enclosed in `<article>...</article>` tags with a Cascading Style
    Sheets (CSS) class of "product_pod", like this:


    ```

    <article class="product_pod">...</article>

    ```


    Within those tags, the title of the book is enclosed in `<a>...</a>` tags after
    a title= attribute inside the `<a>...</a>` tags:


    ```

    <a href="catalogue/tipping-the-velvet_999/index.html" title="Tipping the Velvet">Tipping
    the Velvet</a>

    ```


    The price of the book is inside a paragraph with a style class of `price_color`:


    ```

    <p class="price_color">£53.74</p>

    ```


    Books to Scrape contains 50 pages of sample books you can access and scrape data
    from. So, how do you get through all 50 pages and scrape just the book titles
