    \          schedule.run_pending()\n            time.sleep(60)  # Check every minute\n\
    \        except Exception as e:\n            print(f\"Error in scheduler loop:\
    \ {str(e)}\")\n            time.sleep(300)  # Wait 5 minutes before retrying on\
    \ error.\n\nif __name__ == \"__main__\":\n    try:\n        main()\n    except\
    \ KeyboardInterrupt:\n        print(\"Script terminated by user\")\n    except\
    \ Exception as e:\n        print(f\"Unexpected error: {str(e)}\")\n```\n\nThat’s\
    \ a lot of code, but as always, much of it is exception handling, to prevent the\
    \ script from crashing due to unforeseen problems, like an incomplete .env file\
    \ or questions.txt file.\n\n## Making the script your own\n\nAs written, the `post_to_x.py`\
    \ script posts one line of text at a time from a file named `questions.txt`. Make\
    \ sure that file is in the same folder as your script and that each line contains\
    \ one question. To avoid duplication, the script removes the question from the\
    \ file right after posting. Keep an eye on that file and replenish it with new\
    \ questions from time to time to keep your content fresh.\n\nIf you prefer to\
    \ name your file something other than `questions.txt`, make sure you change the\
    \ following line of code in the `main()` function to your chosen filename:\n\n\
    ```python\ncontent_filename = \"questions.txt\"\n```\n\nAs written, the script\
    \ posts once every four hours, as long as the script is running and there are\
    \ questions in the `questions.txt` file.\n\n> Posting too quickly can cause X's\
    \ bot police to disable your account. Be sure to limit your script to posting\
    \ 10 or 15 posts an hour.\n\n## Creating Content for Your Posts\n\nIf you're having\
    \ trouble coming up with things to write about for your social media, consider\
    \ the fact that you can always use AI to generate posts for you. You can generate\
    \ posts on any topic, using any AI chatbot, and store them in a file similar to\
    \ `questions.txt` to post them automatically using the same code. There's really\
    \ no need to write a Python script to generate such content — it's probably faster\
    \ and easier to just do it interactively.\n\nFor example, browse to ChatGPT (https://chatgpt.com),\
    \ Grok (https://x.ai), or the website of any other chatbot. Type your prompt in\
    \ a way that specifies what you want your posts to be about and how many posts\
    \ you want. Use wording like that shown in Figure 13-2 so the text is easily copied\
    \ to a text file.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_260_0.png)\n\nAfter\
    \ all of your posts have been generated, click the Copy button to copy them all.\
    \ Typically, the Copy icon looks like two sheets of paper. It may be at the bottom\
    \ of the generated output, as shown in Figure 13–3, or at the top, depending on\
    \ which AI chatbot you use to generate your posts.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_261_0.png)\n\
    \nIf you already have your automatic posting script written, like the `auto_post.py`\
    \ script from the previous section, open that project in your code editor (VS\
    \ Code in our example). Create a new text file in the same folder as the script\
    \ itself. Name it anything you like. I’ll name this one `content.txt`. Paste in\
    \ the posts you copied from your chatbot. Then close and save the file.\n\nFinally,\
    \ just make sure your auto-posting script knows to use that file to find your\
    \ posts. In the `post_to_x.py` script from the previous section, look for this\
    \ one line of code:\n\n```python\ncontent_filename = \"questions.txt\"\n```\n\n\
    Now change it to reflect the name of the file you just created. For example, if\
    \ you named it `content.txt`, change that line to:\n\n```python\ncontent_filename\
    \ = \"content.txt\"\n```\n\n## Tracking Performance Metrics\n\nUsing Python automation\
    \ to track performance metrics helps individuals, businesses, and marketers optimize\
    \ their social media strategy. Automating performance metrics with Python saves\
    \ time and eliminates boring repetitive tasks by eliminating the need for manual\
    \ tracking of data such as user engagement, growth trends, or content performance.\
    \ Python enables you to collect data daily, hourly, or at any interval you like.\n\
    \nFor a working example, I'll show you a script that can collect metrics from\
    \ Instagram. As with other internet-related scripts, this will involve using an\
    \ API with your current social media account. The same basic logic can be applied\
    \ to any social media site. Feel free to use AI to adapt the code to whatever\
    \ sites you intend to use.\n\n## Getting Instagram API access\n\nTo best automate\
    \ Instagram, you should set up a business account. A business account gives you\
    \ access to the Instagram Graph API, which provides richer data for performance\
    \ metrics.\n\nIf you already have a personal Instagram account, you can convert\
    \ it to a business account for free. Doing so provides access to Instagram Insights\
    \ and other performance metrics that aren't available with a personal account.\n\
    \nIf you need help converting your account, log into Instagram and use Meta's\
    \ help resources or Meta AI to find step-by-step instructions.\n\nNext, you'll\
    \ need an API key. Go to the Meta for Developers website (https://developers.facebook.com)\
    \ and log in with your Facebook credentials. Create a developer account; then\
    \ go to the Developer Dashboard and register a new app, selecting Instagram as\
    \ the product. Choose the Instagram Graph API as the API your app will use.\n\n\
    After you've completed all these steps, you'll receive two keys: an Instagram\
    \ Business Account ID and an Access Token. Save them in a safe place and keep\
    \ them private. You'll need them for your Python script (see the next section).\n\
    \n## Setting up your script\n\nCreate your project folder and create and activate\
    \ a virtual environment. The script I show you here uses three modules that aren't\
    \ part of the Python standard library."
