    \n## IndexError（索引错误）\n\n在 Python 中，当你尝试使用超出范围的索引访问序列（如列表、元组或字符串）中的元素时，就会发生 `IndexError`。简单来说，你试图访问序列中不存在的位置。例如，假设你有一个包含五个项目的列表，而你的代码要求获取第六个项目。Python\
    \ 将抛出 `IndexError` 异常，因为不存在第六个项目。\n\n在 Python（以及大多数编程语言）中，列表中的第一个项目始终是项目 0（零），而不是\
    \ 1（一）。我们人类通常不会这样思考。例如，你可能认为以下代码完全合法：\n\n```python\nfruits = ['Apple', 'Banana',\
    \ 'Cherry']\nprint(fruits[3])\n```\n\n运行该代码会产生以下错误消息：\n\n```\nIndexError: list\
    \ index out of range\n```\n\n你可能期望 `fruits[3]` 是 `Cherry`，即列表中的第三个项目。但 Python\
    \ 并非如此看待它。Python 是这样看待的：\n\n```python\nfruits[0] = 'Apple'\nfruits[1] = 'Banana'\n\
    fruits[2] = 'Cherry'\n```\n\n就 Python 而言，不存在 `fruits[3]`。这就是代码生成错误的原因。\n\n解决此问题的一种方法是，在处理列表时，尽量避免使用带有\
    \ `range()` 或其他某种计数器的循环。使用此语法遍历列表的最简单方法（永远不会遇到 `IndexError`，因为它为列表中的每个项目重复一次，并且知道从\
    \ 0 开始）如下所示：\n\n```python\nfruits = ['Apple', 'Banana', 'Cherry']\nfor fruit in\
    \ fruits:\n    print(fruit)\n```\n\n你可以使用列表推导式更紧凑地完成此操作，如下所示：\n\n```python\nfruits\
    \ = ['Apple', 'Banana', 'Cherry']\n[print(fruit) for fruit in fruits]\n```\n\n\
    如果你需要在遍历列表时保持计数器运行，可以使用 Python 的 `enumerate`，它允许你自动为列表中的每个项目分配一个数字。例如，看看这段代码：\n\
    \n```python\nmy_list = ['apple', 'banana', 'cherry']\nfor index, value in enumerate(my_list,\
    \ start=1):\n    print(f\"Index: {index}. {value}\")\n```\n\n这里的语法使用了一个 `for`\
    \ 循环，其中 `index`（一个计数器）和 `value`（列表中的一个项目）是变量名。`enumerate` 这个词让 Python 知道你希望 `index`\
    \ 成为一个计数器。`my_list` 这个名字是对原始列表的引用。`start=1` 让 Python 知道你希望从 1 开始计数。该代码的输出是：\n\n\
    ```\n1. apple\n2. banana\n3. cherry\n```\n\nPython（以及大多数其他编程语言）从 0 开始列表，而不是从 1\
    \ 开始，因为计算机以这种方式处理列表更有效率。如果你使用 `enumerate` 而不指定 `start=1`，项目将从 0 开始编号。\n\n![](img/10d8e89b301a0e7452bff4d402265e78_349_0.png)\n\
    \n## KeyError（键错误）\n\n在 Python 中，当你尝试访问字典中不存在的键时，就会发生 `KeyError`。可以将字典想象成现实世界中的词典：你查找一个单词（`key`）以找到其定义（`value`）。如果该单词不在词典中，你将一无所获。在\
    \ Python 中，尝试访问不存在的键会引发 `KeyError`。\n\n这是一个简单的示例，其中名为 `my_dict` 的字典包含两个键——一个名为\
    \ \"name\"，另一个名为 \"age\"。每个键都分配了一个值——\"name\" 对应 \"Annabelle\"，\"age\" 对应 65。该代码后面跟着三个\
    \ `print` 语句，尝试显示字典中的数据：\n\n```python\n# 一个简单的字典\nmy_dict = {\"name\": \"Annabelle\"\
    , \"age\": 65}\n\nprint(my_dict[\"name\"])\nprint(my_dict[\"age\"])\nprint(my_dict[\"\
    gender\"])\n```\n\n运行该代码会产生以下输出：\n\n```\nAnnabelle\n65\n...\nKeyError: 'gender'\n\
    ```\n\n发生 `KeyError` 是因为没有名为 \"gender\" 的键，只有名为 \"name\" 和 \"age\" 的键。\n\n如果你正在处理由其他代码生成的键，你并不总是能很好地控制字典。你可以使用\
    \ `.get()` 方法来请求一个键值，并在键不存在时指定一个默认值。这样，你总能为一个键获得某个值，而不会冒着使整个脚本崩溃的风险。这是代码的一个修改版本，其中如果\
    \ \"gender\" 键缺失，\"gender\" 的值将变为 \"not specified\"。\n\n```python\n# 一个简单的字典\n\
    my_dict = {'name': 'Annabelle', 'age': 65}\n\nprint(my_dict['name'])\nprint(my_dict['age'])\n\
    print(my_dict.get('gender', 'not specified'))\n```\n\n现在看看以下代码：\n\n```python\n\
    # 一个简单的字典\nmy_dict = {'name': 'Annabelle', 'age': 65}\n\nprint(my_dict[name])\n\
    print(my_dict[age])\n```\n\n乍一看，这段代码可能看起来完全没问题。但运行它会产生一个 `NameError`。为什么？因为 `print`\
    \ 语句将 `name` 和 `age` 视为变量名（没有引号），而不是键名。你可以通过添加引号轻松修复此错误：\n\n```python\nprint(my_dict['name'])\n\
    print(my_dict['age'])\n```\n\n如果你正在处理大量导入的 JavaScript 对象表示法（JSON）数据，而这些数据并不总是像你希望的那样可靠，并且你想用\
