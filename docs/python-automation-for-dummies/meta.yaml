  md: "So, how does the rest work? Recall that clicking the Generate button calls\
    \ a function named `gradio_generate()` and passes in the user's prompt as input.\
    \ That function, in turn, does some quick exception handling to ensure that the\
    \ prompt isn't empty.\n\n```\n# Call function to generate the image, then show\
