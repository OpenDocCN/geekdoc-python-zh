    # Using APScheduler with dates and times


    One big advantage APScheduler has over schedule is the ability to specify dates
    and times for running tasks, rather than just intervals. To do this, use the cron
    keyword in place of interval. The syntax is as follows:


    ```

    scheduler.add_job(job, ''cron'', [year=], [month=], [day=], [week=], [day_of_week=],
    [hour=], [minute=], [second=], [start_date=], [end_date=], [timezone=], [jitter=],
    **kwargs)

    ```


    You can omit any parameters in square brackets that you don''t need. Examples
    are probably the easiest way to understand how to phrase things, so I''ll show
    you a bunch of them next.


    Here''s a line of code to run a job every day at 8:00 AM:


    ```

    scheduler.add_job(job, ''cron'', hour=8, minute=0)

    ```


    If you want to run a job several times an hour, you can use */ with minute= to
    specify an interval. For example, here''s a line of code that will run a job every
    15 minutes:


    ```

    scheduler.add_job(job, ''cron'', minute=''*/15'')

    ```


    Here''s one that runs a job once a week, every Wednesday at noon:


    ```

    scheduler.add_job(my_job, ''cron'', day_of_week=''wed'', hour=12)

    ```


    ![](img/10d8e89b301a0e7452bff4d402265e78_279_0.png)


    When you''re using the day_of_week parameter, you can use either numbers (0 through
    6, where 0 is Sunday), or day name abbreviations in quotation marks (''sun'',
    ''mon'', ''tue'', ''wed'', ''thu'', ''fri'', ''sat'') to specify days. Use commas
    to specify multiple values.'
  - '[PAGE 280]


    Here''s a line of code to run a job every Monday, Wednesday, and Friday at noon:


    ```

    scheduler.add_job(job, ''cron'', day_of_week=''mon,wed,fri'', hour=12)

    ```


    You can describe the days of the week as numbers, if you prefer, like this:


    ```

    scheduler.add_job(job, ''cron'', day_of_week=''1,3,5'', hour=12)

    ```


    This next line of code runs a task once a month at midnight on the first day of
    each month:


    ```

    scheduler.add_job(job, ''cron'', day=1, hour=0, minute=0)

    ```


    > When using the day= parameter, specify the day of the month as a number, between
    1 and 31.


    APScheduler really gives you a lot of flexibility for scheduling. Here''s an example
    where you run a task on the 1st and 15th of every month at midnight:


    ```

    scheduler.add_job(job, ''cron'', day=''1,15'', hour=0, minute=0)

    ```


    With the day= parameter, you can use ''last'' to specify the last day of each
    month. Here''s an example to run a task at 11:59 PM on the last day of every month:


    ```

    scheduler.add_job(job, ''cron'', day=''last'', hour=23, minute=59)

    ```


    To run a task on the first and last days of the month, use 1 for the first day
    and ''last'' for the last day, like this:


    ```

    scheduler.add_job(job, ''cron'', day=''1,last'', hour=12)

    ```


    If you want to run something hourly, set the hour parameter to ''*''. For example,
    the following code runs a task at noon every Saturday and Sunday:


    ```

    scheduler.add_job(job, ''cron'', day_of_week=''sat,sun'', hour=''*'')

    ```


    Here''s a line of code that runs a task every 30 seconds on weekdays during business
    hours (8 AM to 5 PM).


    ```

    scheduler.add_job(job, ''cron'', day_of_week=''mon-fri'', hour=''8-17'', second=''*/30'')

    ```


    There''s almost no limit to how you can schedule things with APScheduler, which
    is a great thing for automation.'
  - "[PAGE 281]\n\n> If you’re having a hard time specifying your schedule, consider\
    \ asking artificial intelligence (AI) for help. Phrase your prompt as “Using Python\
    \ APScheduler, how can I specify . . . ” and then express the schedule you want\
    \ in plain language.\n\nSo far, I’ve shown you examples of calling a single simple\
    \ function according to a schedule. That same strategy works for calling multiple\
    \ functions on different schedules. Again, I’ll use very simple functions to focus\
    \ on the scheduling code. In the following code, you can see how three different\
    \ `scheduler.add_job()` statements allow the script to execute code in the three\
    \ different functions on three different schedules:\n\n```\n# multi_functions.py\n\
    # pip install apscheduler\nfrom apscheduler.schedulers.blocking import BlockingScheduler\n\
    \ndef job1():\n    print(\"job1 - Press Ctrl+C in Terminal to stop\")\n\ndef job2():\n\
    \    print(\"job2\")\n\ndef job3():\n    print(\"job3\")\n\nif __name__ == \"\
    __main__\":\n    scheduler = BlockingScheduler()\n\n    # Schedule job1 to run\
    \ every ten seconds.\n    scheduler.add_job(job1, 'interval', seconds=10)\n\n\
    \    # Schedule job2 to run every 30 seconds.\n    scheduler.add_job(job2, 'interval',\
    \ seconds=30)\n\n    # Schedule job3 to run every one minute.\n    scheduler.add_job(job3,\
    \ 'interval', minutes=1)\n\n    try:\n        # Keep the script running.\n   \
    \     scheduler.start()\n    except (KeyboardInterrupt, SystemExit):\n       \
    \ scheduler.shutdown()\n```"
- md: "## Automating Python Scripts\n\nIf you’re running large Python scripts on a\
    \ schedule, the thought of putting all the code from each script into a function\
    \ may concern you. If you prefer to keep each task in its own script (its own\
    \ .py file), you can still use the same techniques as I outline earlier to set\
    \ up your schedule. Then just have each function run an external script.\n\nTo\
    \ illustrate how it works, let’s assume I have three scripts named script01.py,\
    \ script02.py, and script03.py. Of course, you have as few, or as many, scripts\
    \ as you like. Exactly what each script does isn’t important. All that matters\
    \ for this example is that each script does something that’s useful for you when\
    \ you run it.\n\nThere are two ways to run external scripts on a schedule. You\
    \ can use the subprocess module, which I show you first, or you can import the\
    \ scripts, which I show you later in this section.\n\n## Running scripts as subprocesses\n\
    \nThe subprocess module, which is part of the Python standard library, is a great\
    \ tool for running code outside of a Python script. In addition to external .py\
    \ files, subprocess can run shell scripts (.bat, .cmd, and .sh files) and executables\
    \ (.exe in Windows).\n\n![](img/10d8e89b301a0e7452bff4d402265e78_282_0.png)\n\n\
    The subprocess module can run virtually any external code, though on a Mac you\
    \ may need to grant permission. Refer to the subprocess documentation at https://docs.python.org/3/library/subprocess.html\
    \ for details. Or ask any AI for help with the specific file type you intend to\
    \ run with subprocess.\n\nThe easiest way to run multiple scripts is still to\
    \ create a function for each job. But instead of having the function contain all\
    \ the code to perform the task, the function just calls the script by its filename\
    \ (and path, if the script isn’t in the same folder as the scheduler script).\n\
    \nHere’s an example where the scheduler runs three scripts named script01.py,\
    \ script02.py, and script03.py, each on its own script, using code similar to\
    \ the last example in the previous section.\n\n```\n# multi_scripts.py\n# pip\
    \ install apschedule\nfrom apscheduler.schedulers.blocking import BlockingScheduler\n\
    import subprocess\n\ndef job1():\n    run_external_script('script01.py')\n\ndef\
    \ job2():\n    run_external_script('script02.py')\n\ndef job3():\n    run_external_script('script03.py')\n\
    \ndef run_external_script(script_path):\n    try:\n        # Run the external\
    \ script.\n        result = subprocess.run(\n            [\"python\", script_path],\
    \ # Command as a list\n            capture_output=True,     # Capture stdout and\
    \ stderr.\n            text=True,               # Return strings, not bytes.\n\
    \            check=True               # Raise error on nonzero exit code.\n  \
    \      )\n        # Show script output.\n        print(\"Output:\", result.stdout)\n\
    \        # print(\"Error (if any):\", result.stderr)\n        # print(\"Return\
    \ code:\", result.returncode)\n    except subprocess.CalledProcessError as e:\n\
    \        print(f\"Error running script: {e}\")\n        print(\"Error output:\"\
    , e.stderr)\n    except FileNotFoundError:\n        print(f\"Script or Python\
    \ executable not found: {script_path}\")\n\nif __name__ == \"__main__\":\n   \
    \ scheduler = BlockingScheduler()\n\n    # Schedule job1 to run every ten seconds.\n\
    \    scheduler.add_job(job1, 'interval', seconds=10)\n\n    # Schedule job2 to\
    \ run every 30 seconds.\n    scheduler.add_job(job2, 'interval', seconds=30)\n\
    \n    # Schedule job3 to run every one minute.\n    scheduler.add_job(job3, 'interval',\
    \ minutes=1)\n\n    try:\n        # Keep the script running.\n        scheduler.start()\n\
    \    except (KeyboardInterrupt, SystemExit):\n        scheduler.shutdown()\n```\n\
    \nLet’s take a look at some specifics in the code. The `import subprocess` line\
    \ near the top imports the `subprocess` module. That’s part of the Python standard\
    \ library, so you don’t need to `pip install` it. The `subprocess` module allows\
    \ you to run external code.\n\nThe script still contains three functions named\
    \ `job1`, `job2`, and `job3`, but as you can see, each of them uses this syntax\
    \ to run one of the external scripts — `script01.py`, `script02.py`, and `script03.py`\
    \ — using syntax like this:\n\n```\nrun_external_script('script01.py')\n```\n\n\
    ![](img/10d8e89b301a0e7452bff4d402265e78_284_0.png)\n\nThe sample code assumes\
    \ the external scripts are in the same folder as the scheduling script. If yours\
    \ are in separate folders, make sure you include the path to the external folder\
    \ in front of the filename.\n\nThat `run_external_script()` name refers to the\
    \ function by the same name in the code:\n\n```\ndef run_external_script(script_path):\n\
    \    try:\n        # Run the external script.\n        result = subprocess.run(\n\
    \            [\"python\", script_path], # Command as a list\n            capture_output=True,\
    \     # Capture stdout and stderr.\n            text=True,               # Return\
    \ strings, not bytes.\n            check=True               # Raise error on nonzero\
    \ exit code.\n        )\n        # Show script output.\n        print(\"Output:\"\
    , result.stdout)\n        # print(\"Error (if any):\", result.stderr)\n      \
    \  # print(\"Return code:\", result.returncode)\n    except subprocess.CalledProcessError\
    \ as e:\n        print(f\"Error running script: {e}\")\n        print(\"Error\
    \ output:\", e.stderr)\n    except FileNotFoundError:\n        print(f\"Script\
    \ or Python executable not found: {script_path}\")\n```\n\nI’ve included exception\
    \ handling in that script to gracefully handle any unforeseen errors. This next\
    \ code is the part that actually runs the external script:\n\n```\nresult = subprocess.run(\n\
    \    [\"python\", script_path], # Command as a list\n    capture_output=True,\
    \     # Capture stdout and stderr.\n    text=True,               # Return strings,\
    \ not bytes.\n    check=True               # Raise error on nonzero exit code.\n\
    )\n```\n\nThe line that reads `[\"python\", script_path]` basically says to use\
    \ Python to run whatever script name was passed into the function (`script_path`).\
    \ The line that reads `capture_output=True` captures any output that the script\
    \ puts out through `print()` commands or error messages (but it doesn't display\
    \ that output immediately). The `text=True` line ensures that any script output\
    \ is stored as simple strings and not bytes. The `check=True` line prevents any\
    \ errors in the script from stopping the scheduler script, so the error can be\
    \ handled by the scheduler script.\n\nNotice how the preceding function starts\
    \ with `result=`. Any output from that function is stored in the `result` object.\
    \ If you need to see any of that output, you can use standard `print()` statements\
    \ with reference to the data you want.\n\nNext, I'm only showing `stdout` (standard\
    \ output, from `print()` statements). But you can uncomment the other `print()`\
    \ statements below to see any error messages (`stderr`) and an exit code (`returncode`),\
    \ where 0 is a normal exit:\n\n```\nprint(\"Output:\", result.stdout)\n# print(\"\
    Error (if any):\", result.stderr)\n# print(\"Return code:\", result.returncode)\n\
    ```\n\nMost of the rest of the code is just the scheduling code and some extra\
    \ exception handling for running external scripts.\n\n## Running scripts as imports\n\
    \nIn the interest of being complete, I'll show you another way to run external\
    \ scripts from Python, using the `import` statement. Personally, I recommend that\
    \ you use `subprocess` from the previous example, where you can capture output\
    \ from each script, and even run non-Python scripts and executables.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_285_0.png)\n\
    \nThe `subprocess` module is safer than `import`, because it spawns a new operating\
    \ system process for each external script, so there's no chance of collision between\
    \ variables and such. It more closely resembles how things work when you manually\
    \ start each script yourself.\n\nTo use the `import` statement, each script you\
    \ want to run should have a `main()` function that kicks off the script execution.\
    \ At the bottom, include an `if __name__ == \"__main__\"` block to prevent the\
    \ script from running when you import it rather than run it. Here's an example:\n\
    \n```\n# script01.py\n# Super-simple example to test scheduling\n\ndef main():\n\
    \    print(\"Script01.py, press Ctrl+C in Terminal to stop\")\n\nif __name__ ==\
    \ \"__main__\":\n    main()\n```\n\nNext I'll show you an APScheduler example\
    \ similar to others you've seen in this chapter. But this one actually imports\
    \ the Python scripts to run. Then it executes each one using *scriptname*.main()\
    \ (where *scriptname* is the same as the filename without the .py extension):\n\
    \n```\n# multi_imports.py\n# pip install apschedule\nfrom apscheduler.schedulers.blocking\
    \ import BlockingScheduler\n# Import script01.py through script03.py.\nimport\
    \ script01, script02, script03\n\ndef job1():\n    script01.main()\n\ndef job2():\n\
    \    script02.main()\n\ndef job3():\n    script03.main()\n\nif __name__ == \"\
    __main__\":\n    scheduler = BlockingScheduler()\n\n    # Schedule job1 to run\
    \ every ten seconds.\n    scheduler.add_job(job1, 'interval', seconds=10)\n\n\
    \    # Schedule job2 to run every 30 seconds.\n    scheduler.add_job(job2, 'interval',\
    \ seconds=30)\n\n    # Schedule job3 to run every one minute.\n    scheduler.add_job(job3,\
    \ 'interval', minutes=1)\n```"
  mdcn: "## 自动化 Python 脚本\n\n如果你按计划运行大型 Python 脚本，可能会担心将每个脚本的所有代码都放入一个函数中。如果你更喜欢将每个任务保留在自己的脚本（即自己的\
    \ .py 文件）中，你仍然可以使用我之前概述的相同技术来设置计划。然后只需让每个函数运行一个外部脚本。\n\n为了说明其工作原理，假设我有三个名为 script01.py、script02.py\
    \ 和 script03.py 的脚本。当然，你可以拥有任意数量的脚本。每个脚本具体做什么并不重要。对于这个示例，重要的是每个脚本在运行时都能为你做一些有用的事情。\n\
    \n有两种方法可以按计划运行外部脚本。你可以使用 `subprocess` 模块（我首先向你展示），或者你可以导入脚本（我将在本节后面向你展示）。\n\n\
    ## 作为子进程运行脚本\n\n`subprocess` 模块是 Python 标准库的一部分，是在 Python 脚本之外运行代码的绝佳工具。除了外部 .py\
    \ 文件，`subprocess` 还可以运行 shell 脚本（.bat、.cmd 和 .sh 文件）和可执行文件（Windows 中的 .exe）。\n\
    \n![](img/10d8e89b301a0e7452bff4d402265e78_282_0.png)\n\n`subprocess` 模块几乎可以运行任何外部代码，但在\
    \ Mac 上你可能需要授予权限。有关详细信息，请参阅 https://docs.python.org/3/library/subprocess.html\
    \ 上的 `subprocess` 文档。或者向任何 AI 寻求帮助，以了解你打算用 `subprocess` 运行的特定文件类型。\n\n运行多个脚本最简单的方法仍然是为每个作业创建一个函数。但函数不包含执行任务的所有代码，而是通过文件名（如果脚本与调度器脚本不在同一文件夹中，则还包括路径）来调用脚本。\n\
    \n下面是一个示例，调度器使用与上一节最后一个示例类似的代码，运行三个名为 script01.py、script02.py 和 script03.py 的脚本，每个脚本都在自己的文件中。\n\
    \n```\n# multi_scripts.py\n# pip install apschedule\nfrom apscheduler.schedulers.blocking\
    \ import BlockingScheduler\nimport subprocess\n\ndef job1():\n    run_external_script('script01.py')\n\
    \ndef job2():\n    run_external_script('script02.py')\n\ndef job3():\n    run_external_script('script03.py')\n\
    \ndef run_external_script(script_path):\n    try:\n        # Run the external\
    \ script.\n        result = subprocess.run(\n            [\"python\", script_path],\
    \ # Command as a list\n            capture_output=True,     # Capture stdout and\
    \ stderr.\n            text=True,               # Return strings, not bytes.\n\
    \            check=True               # Raise error on nonzero exit code.\n  \
    \      )\n        # Show script output.\n        print(\"Output:\", result.stdout)\n\
    \        # print(\"Error (if any):\", result.stderr)\n        # print(\"Return\
    \ code:\", result.returncode)\n    except subprocess.CalledProcessError as e:\n\
    \        print(f\"Error running script: {e}\")\n        print(\"Error output:\"\
    , e.stderr)\n    except FileNotFoundError:\n        print(f\"Script or Python\
    \ executable not found: {script_path}\")\n\nif __name__ == \"__main__\":\n   \
    \ scheduler = BlockingScheduler()\n\n    # Schedule job1 to run every ten seconds.\n\
    \    scheduler.add_job(job1, 'interval', seconds=10)\n\n    # Schedule job2 to\
    \ run every 30 seconds.\n    scheduler.add_job(job2, 'interval', seconds=30)\n\
    \n    # Schedule job3 to run every one minute.\n    scheduler.add_job(job3, 'interval',\
    \ minutes=1)\n\n    try:\n        # Keep the script running.\n        scheduler.start()\n\
    \    except (KeyboardInterrupt, SystemExit):\n        scheduler.shutdown()\n```\n\
    \n让我们看看代码中的一些细节。顶部的 `import subprocess` 行导入了 `subprocess` 模块。这是 Python 标准库的一部分，因此你不需要\
    \ `pip install` 它。`subprocess` 模块允许你运行外部代码。\n\n该脚本仍然包含三个名为 `job1`、`job2` 和 `job3`\
    \ 的函数，但正如你所看到的，每个函数都使用此语法来运行一个外部脚本——`script01.py`、`script02.py` 和 `script03.py`——使用如下语法：\n\
    \n```\nrun_external_script('script01.py')\n```\n\n![](img/10d8e89b301a0e7452bff4d402265e78_284_0.png)\n\
    \n示例代码假设外部脚本与调度脚本在同一文件夹中。如果你的脚本在不同的文件夹中，请确保在文件名前包含外部文件夹的路径。\n\n`run_external_script()`\
    \ 名称指的是代码中同名的函数：\n\n```\ndef run_external_script(script_path):\n    try:\n   \
    \     # Run the external script.\n        result = subprocess.run(\n         \
    \   [\"python\", script_path], # Command as a list\n            capture_output=True,\
    \     # Capture stdout and stderr.\n            text=True,               # Return\
    \ strings, not bytes.\n            check=True               # Raise error on nonzero\
    \ exit code.\n        )\n        # Show script output.\n        print(\"Output:\"\
    , result.stdout)\n        # print(\"Error (if any):\", result.stderr)\n      \
    \  # print(\"Return code:\", result.returncode)\n    except subprocess.CalledProcessError\
    \ as e:\n        print(f\"Error running script: {e}\")\n        print(\"Error\
    \ output:\", e.stderr)\n    except FileNotFoundError:\n        print(f\"Script\
    \ or Python executable not found: {script_path}\")\n```\n\n我在该脚本中包含了异常处理，以优雅地处理任何不可预见的错误。接下来的代码是实际运行外部脚本的部分：\n\
    \n```\nresult = subprocess.run(\n    [\"python\", script_path], # Command as a\
    \ list\n    capture_output=True,     # Capture stdout and stderr.\n    text=True,\
    \               # Return strings, not bytes.\n    check=True               # Raise\
    \ error on nonzero exit code.\n)\n```\n\n读取 `[\"python\", script_path]` 的行基本上是说使用\
    \ Python 运行传入函数的任何脚本名称（`script_path`）。读取 `capture_output=True` 的行捕获脚本通过 `print()`\
    \ 命令或错误消息输出的任何内容（但它不会立即显示该输出）。`text=True` 行确保任何脚本输出都存储为简单字符串而不是字节。`check=True`\
    \ 行防止脚本中的任何错误停止调度器脚本，以便调度器脚本可以处理错误。\n\n注意前面的函数如何以 `result=` 开头。该函数的任何输出都存储在 `result`\
    \ 对象中。如果你需要查看任何输出，可以使用标准 `print()` 语句并引用你想要的数据。\n\n接下来，我只显示 `stdout`（标准输出，来自 `print()`\
    \ 语句）。但你可以取消注释下面的其他 `print()` 语句以查看任何错误消息（`stderr`）和退出代码（`returncode`），其中 0 表示正常退出：\n\
    \n```\nprint(\"Output:\", result.stdout)\n# print(\"Error (if any):\", result.stderr)\n\
    # print(\"Return code:\", result.returncode)\n```\n\n其余大部分代码只是调度代码和一些用于运行外部脚本的额外异常处理。\n\
    \n## 作为导入运行脚本\n\n为了完整性，我将向你展示另一种从 Python 运行外部脚本的方法，使用 `import` 语句。就个人而言，我建议你使用上一个示例中的\
    \ `subprocess`，你可以捕获每个脚本的输出，甚至可以运行非 Python 脚本和可执行文件。\n\n![](img/10d8e89b301a0e7452bff4d402265e78_285_0.png)\n\
    \n`subprocess` 模块比 `import` 更安全，因为它为每个外部脚本生成一个新的操作系统进程，因此变量等不会发生冲突。它更接近于你手动启动每个脚本时的工作方式。\n\
    \n要使用 `import` 语句，你要运行的每个脚本都应该有一个 `main()` 函数来启动脚本执行。在底部，包含一个 `if __name__ ==\
