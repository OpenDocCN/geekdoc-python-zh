    \ screen in that app. You'll also want to make sure you always maximize the app\
    \ window, so the screen coordinates are always the same whenever finding the locations\
    \ of items and when running the script.\n\nTo locate coordinates of elements onscreen,\
    \ use the PyAutoGUI MouseInfo app. To run it, make sure you're in a virtual environment\
    \ where you've already installed PyAutoGUI, and create a script named `pyautogui_mouseinfo.py`\
    \ (or something similar that doesn't conflict with any imports), and add the following\
    \ code:\n\n```python\n# pyautogui_mouseinfo.py\n# Make sure you pip install pyautogui.\n\
    import pyautogui\n# Open the MouseInfo window.\npyautogui.mouseInfo()\n```\n\n\
    Comments in code are always optional. The comments in the preceding code are just\
    \ there for reminders.\n\nRun that script using the Run Python File button in\
    \ VS Code, as usual. You should see a window that looks like Figure 7-2 on your\
    \ screen. As you move the mouse pointer around the screen, the XY Position field\
    \ shows the XY coordinates at the tip of the mouse pointer.\n\n![Figure 7-2: The\
    \ MouseInfo window.](img/10d8e89b301a0e7452bff4d402265e78_154_0.png)\n\nYou can\
    \ jot down the name and X, Y coordinate of whatever the mouse pointer is touching\
    \ as you go along. Optionally, you can click Log XY in the MouseInfo app, and\
    \ then, within 3 seconds, move the mouse pointer to the position you want to measure.\
    \ A log file will record the X, Y coordinate for you. However, there won't be\
    \ any descriptive text, so you'll probably want to jot that down as you go along.\n\
    \nWhen you've finished measuring, click Save Log in the MouseInfo app. By default,\
    \ the file will be named `mouseInfoLog.txt` and likely saved in the same folder\
    \ as"
