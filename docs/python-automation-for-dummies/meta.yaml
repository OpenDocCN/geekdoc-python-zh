- md: "## Installing Python on Windows\n\nAs you can see in the figure, I was using\
    \ Windows, so the website offered that automatically.\n\n3. Click the button that\
    \ shows the current version number.\nIn Figure 1-1, the version is 3.13.2, but\
    \ the number you see may be different.\n4. Open the folder to which you downloaded\
    \ Python.\nThis is usually your Downloads folder.\n5. Double-click the icon of\
    \ the downloaded file.\n6. Follow the onscreen instructions to Install (or Upgrade\
    \ Now if you're given that option).\n\n![](img/10d8e89b301a0e7452bff4d402265e78_24_0.png)\n\
    \n## Installing Python on Linux\n\nMost Linux distributions come with Python preinstalled\
    \ (usually Python 3). There are many different Linux distributions (or distros),\
    \ including Arch, Debian, Fedora, and Ubuntu. I can't give step-by-step instructions\
    \ for each. But a good starting point may be to determine whether you already\
    \ have Linux installed and, if so, which version. You should be able to do so\
    \ following these steps:\n\n1. Press Ctrl+Alt+T to open the Terminal.\n2. Type\
    \ the following and press Enter:\n   ```\n   python3 --version\n   ```\n   If\
    \ the command returns something like Python 3.12.2, Python is installed. If you\
    \ get an error, try the following command:\n   ```\n   python --version\n   ```\n\
    \   If you get an error message on both tries, or you want a newer version of\
    \ Python, you can still install Python from the Python website. Download and install\
    \ the Gzipped source tarball or XZ compressed source tarball file. Or check the\
    \ documentation for your specific Linux distribution for recommendations. Optionally,\
    \ you can also ask any AI for recommendations related to your specific Linux distro.\n\
    \n## In This Chapter\n\n- Choosing and installing a code editor\n- Creating and\
    \ using virtual environments\n- Starting a new project\n- Using Python scripts\n\
    \n# Chapter 2\n## Choosing a Code Editor\n\nTo write Python code, you need a code\
    \ editor. If you've been coding with Python for a while and you already have a\
    \ preferred editor, you're welcome to stick with that. If you're just starting\
    \ out with Python, I recommend Visual Studio Code (VS Code for short), which is\
    \ the editor I use in this book. VS Code is the most widely used code editor in\
    \ the world, and it's very well suited to Python coding.\n\nOn a personal front,\
    \ I also use VS Code to write code in Cascading Style Sheets (CSS), Hypertext\
    \ Markup Language (HTML), and JavaScript, the main languages for creating websites\
    \ and web apps. If you're thinking about learning that kind of coding, VS Code\
    \ will serve you well there, too.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_26_0.png)\n\
    \nThe hardware requirements for VS Code are minimal. Here's a quick rundown:\n\
    \n- **Operating system:** Linux 64-bit distro (for example, Ubuntu 16.04+, Debian\
    \ 9+, Fedora 24+, and so on); macOS 10.15 (Catalina) or later; or Windows 7, 8.1,\
    \ 10, or 11 (32-bit or 64-bit).\n- **Processor:** 1.6 GHz or faster (for example,\
    \ Intel Core 2 Duo, AMD Athlon 64 X2, Apple M1, or better).\n- **Random access\
    \ memory (RAM):** 1GB (Linux or Windows) or 512MB (macOS). But 4GB or more is\
    \ better.\n- **Storage:** About 200MB to 300MB for the basic installation.\n-\
    \ **Display:** At least 1,024 x 768 resolution.\n\nMost modern computers exceed\
    \ those requirements considerably.\n\n## Installing VS Code\n\nTo use VS Code\
    \ as your code editor, the first step is to download and install it. This is basically\
    \ a matter of browsing to https://code.visualstudio.com and following the onscreen\
    \ instructions. Here are step-by-step instructions — but remember, websites can\
    \ change at any time, so if something is different for you, just follow any onscreen\
    \ instructions you see:\n\n1. **Browse to** https://code.visualstudio.com.\n2.\
    \ **Click Download for Windows, Download for macOS, or Download for Linux** depending\
    \ on which operating system you're using.\n3. **Open the folder to which you downloaded\
    \ the file** (usually your Downloads folder).\n4. **Double-click the icon for\
    \ the downloaded file** (the filename usually starts with VSCode).\n\nIf you're\
    \ using Windows, follow the onscreen instructions. When you get to the page about\
    \ additional tasks, feel free to check or uncheck any boxes based on your preferences.\
    \ I typically set up mine as shown in Figure 2-1.\n\nIf you're using macOS, drag\
    \ the Visual Studio Code.app file that was extracted from the downloaded Zip file\
    \ to your Applications folder.\n\nVS Code should be installed at this point. In\
    \ Windows, you should be able to Start it from your Start menu (you may have to\
    \ search for it on the menu if it's not readily apparent). If you opted for a\
    \ Desktop icon, double-click that icon to open VS Code. When VS Code is running,\
    \ you can right-click its icon in the taskbar and choose Pin to Taskbar so you\
    \ can easily start it right from the taskbar in the future.\n\nOn a Mac, you should\
    \ be able to start VS Code from its icon in Launchpad or from the Applications\
    \ folder. If you see a warning about VS Code being downloaded from the internet,\
    \ go ahead and open it anyway. When VS Code is running, you can right-click its\
    \ icon in the Dock and choose Options ⌥ Keep in Dock for easy access in the future.\n\
    \n![](img/10d8e89b301a0e7452bff4d402265e78_28_0.png)\n\nFIGURE 2-1: Additional\
    \ options for Windows.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_28_1.png)\n\
    \nVS Code offers free artificial intelligence (AI) in the form of Copilot. The\
    \ first time you start VS Code, you may see the option to set up Copilot for free.\
    \ It's a great tool to help with learning to code. You'll need a GitHub account\
    \ to enable it. If you have a GitHub account, you can set up Copilot now; otherwise,\
    \ you can skip that option for the time being and come back to it later.\n\nVS\
    \ Code will likely default to a dark theme, which you're welcome to use if you\
    \ prefer. However, throughout this book, I use a light theme, because the images\
    \ just look better on paper that way. To choose your own theme, click Settings\
    \ in VS Code (the gear icon in the lower-left corner) and choose Themes : Color\
    \ Theme. I use the Light Modern theme throughout this book.\n\nThe bar of icons\
    \ at the left side of VS Code (see Figure 2-2) is called the Activity Bar. It\
    \ contains icons you'll use often. To see the name of any icon, just hover the\
    \ mouse pointer over the icon. In the next section, you'll use the Extensions\
    \ icon to add Python extensions to VS Code.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_29_0.png)\n\
    \nFIGURE 2-2: The Activity Bar in VS Code. Hover the mouse pointer over any icon\
    \ to see its name.\n\n## Installing Python Extensions\n\nTo write Python code\
    \ in VS Code, you’ll need to install the VS Code Python extensions. Follow these\
    \ steps:\n\n1. Click Extensions in the VS Code Activity Bar (shown near the mouse\
    \ pointer in Figure 2-2).\n2. In the Search box near the top of the left pane,\
    \ type Python.\n3. Find Python by Microsoft (it has more than 100 million downloads)\
    \ and click its Install button (see Figure 2-3).\n\nDon’t worry about other Python\
    \ extensions.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_29_1.png)\n\nFIGURE\
    \ 2-3: Install the Python extension from Microsoft.\n\nIt should take only a few\
    \ seconds to install the extension. When it's done, remove the search term *Python*\
    \ from the Search box to see all your installed extensions. That list should now\
    \ include Pylance, Python, and Python Debugger, as shown in Figure 2-4 (all three\
    \ are included in the download).\n\n![](img/10d8e89b301a0e7452bff4d402265e78_30_0.png)\n\
    \n> REMEMBER\n> If you hit a snag in VS Code, or you're just wondering how to\
    \ do something, feel free to ask AI for help. Virtually all modern AI chatbots\
    \ can tell you anything you want to know about VS Code.\n\n## Creating a Folder\
    \ for a New Project\n\nWhether you're writing a small automation script or a large\
    \ app, you'll be working on a project. In Python, it's always a good idea to put\
    \ each project in its own folder. That folder is referred to as the *workspace\
    \ folder* in VS Code. Before we go any further, let's create a new empty folder\
    \ so that you can see all the steps involved:\n\n1. **Close VS Code if it's still\
    \ open.**\n   In Windows or Linux, choose File > Exit from the VS Code menu bar.\
    \ In macOS, choose Code > Quit Visual Studio Code from the VS Code menu bar."
