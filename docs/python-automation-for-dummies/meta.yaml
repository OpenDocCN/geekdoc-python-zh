  md: "The latter code uses the `sum()` function, which is a more Pythonic way to\
    \ handle summation than a loop. For a beginner, the second version may look advanced,\
    \ but it's actually simpler when you learn basic Python constructs like `range`\
    \ and `sum`. It avoids extra logic and is easier to maintain.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_332_0.png)\n\
    \nShortcut methods like `sum()` are sometimes referred to as *idioms* in Python.\
    \ Writing code that way is sometimes referred to as *idiomatic programming*. If\
    \ you're interested in exploring other idioms, consider asking an AI for examples\
    \ of Python idiomatic programming.\n\n# Flat Is Better than Nested\n\nAs you probably\
    \ know by now, code indentations are critical in Python. Unlike other languages\
    \ that use `{` and `}` or other characters to delimit blocks of code, Python relies\
    \ entirely on indentation level. At times, the indentations can become so deep\
    \ that it's difficult to read and follow the code.\n\nThis principle means avoiding\
    \ deeply nested layers of logic, such as multiple levels of loops, conditionals,\
    \ or function calls, because *flat* (less nested) code is easier to read, understand,\
    \ and maintain. Complex conditionals (nested `if` statements) and nested loops\
    \ often contribute to deep indentations, so we'll look at alternatives in the\
    \ next sections.\n\n# Flattening nested conditionals\n\nAs an example of nested\
    \ conditionals, consider this next function, named `check_discount()`. It accepts\
