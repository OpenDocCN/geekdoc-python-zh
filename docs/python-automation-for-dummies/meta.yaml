    \n# Understanding REST APIs\n\nMost modern APIs today are Representational State\
    \ Transfer (REST) APIs, all of which follow the same standards and rules for accessing\
    \ information via the internet. REST APIs use the Hypertext Transfer Protocol\
    \ (HTTP), the same as all websites, to allow a *client* (your Python script or\
    \ any other app) to access another app on a server on the internet, which can\
    \ provide useful information.\n\nREST is a stateless API, meaning there is no\
    \ open connection between the client and the server during a transaction. Your\
    \ app sends a request to an endpoint — typically, a web Uniform Resource Locator\
    \ (URL) that starts with `https://`. The server sends back a response containing\
    \ the information you requested. That response is typically data in JSON format,\
    \ discussed in the previous section."
