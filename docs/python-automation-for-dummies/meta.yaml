  md: '# Parsing and serializing JSON data


    In Python, the dictionary (dict) data type is better suited to dealing with name–value
    pairs than the string (str) data type. So Python includes a built-in `json` module,
    which simplifies converting between dictionaries and JSON strings. The `json`
    module is built in, so you just need to include `import json` near the top of
    your code to use the module. No need to `pip install` the module.


    The `json` module contains methods to *parse* and *serialize* JSON data. Let’s
    start by defining those two buzzwords:


    > » **Parsing JSON:** Parsing refers to the process of converting a JSON string
    into a Python object, such as a dict, list, str, int, float, bool, or None.


    » **Serializing JSON:** Serializing is the process of converting a Python object
    (for example, a dict, list, str, int, float, bool, or None) into a JSON-formatted
    string or writing it to a file as JSON data.


    Four methods are contained within the `json` module for parsing and serializing
    JSON data:


    | Method | What It Does |

    |---|---|

    | `json.loads()` | Parses a JSON-formatted string into a Python object (for example,
    dict or list) |

    | `json.dumps()` | Converts a Python object into a JSON-formatted string |

    | `json.load()` | Reads JSON data from a file into a Python object |

    | `json.dump()` | Writes a Python object to a file as JSON |


    The first two methods, `.loads` and `.dumps`, allow you to work with JSON strings.
    Here’s an example of using `json.loads()` to parse a JSON string into a Python
    object:


    ```

    import json

    # Create a JSON string.

    json_string = ''{"username": "Alice", "age": 25}''

    print(json_string)

    print(type(json_string))


    # Parse JSON string to Python object

    python_obj = json.loads(json_string)


    print(python_obj)  # Output: {''name'': ''Alice'', ''age'': 25}

    print(type(python_obj))  # Output: <class ''dict''>

    ```'
