    \ running a job every five minutes:\n\n```\nscheduler.add_job(job, 'interval',\
    \ minutes=5)\n```\n\nHere's an example of running a job every two hours:\n\n```\n\
    scheduler.add_job(my_job, 'interval', hours=2)\n```\n\nHere's an example of running\
    \ a job every three days:\n\n```\nscheduler.add_job(my_job, 'interval', days=3)\n\
    ```"
