- md: "Adding a `.gitignore` file to your project won't affect how your Python code\
    \ works. The `.gitignore` file just prevents any files or folders listed in its\
    \ contents from being pushed to a GitHub repository if you decide to share your\
    \ Python code with the world using GitHub.\n\n## Using an API key in your script\n\
    \nTo use the API from the `.env` file in your code, you need to `pip install python-dotenv`\
    \ into your virtual environment. Then include all the following lines near the\
    \ top of your Python script:\n\n```\nfrom dotenv import load_dotenv\nimport os\n\
    \n# Load the .env file\nload_dotenv()\n\n# Get the API key\napi_key = os.getenv(\"\
    SAMPLE_API_KEY\")\n```\n\nThe variable to the left of `=` `os.getenv` can be any\
    \ valid Python variable name you like, but make sure the name inside the parentheses\
    \ and quotation marks after `os.getenv` exactly matches the name you gave to the\
    \ API key inside the `.env` file.\n\nThroughout the rest of your code, use the\
    \ variable name at the left side of that line (`api_key` in the example) anywhere\
    \ you need to provide your API key. You'll see an example in the \"Making API\
    \ requests\" section in this chapter.\n\n## Handling JSON Data\n\nJavaScript Object\
    \ Notation (JSON) is a data format used for storing and exchanging data. The *JavaScript*\
    \ part of the name is just because its syntax resembles JavaScript, which uses\
    \ lots of curly braces (`{}`). JSON is widely supported across programming languages\
    \ and platforms, and it's commonly used in APIs, as well as for configuration\
    \ files and data storage.\n\nLike a Python data dictionary, JSON consists of key-value\
    \ pairs where each item of data has a name and a value. The value can be a string,\
    \ a number, a Boolean, an array (list), an object, or null. Each key-value pair\
    \ is enclosed in curly braces.\n\n```\n{\n    \"username\": \"Alice\",\n    \"\
    age\": 25,\n    \"is_student\": true,\n    \"hobbies\": [\"reading\", \"hiking\"\
    ],\n    \"address\": {\n        \"street\": \"123 Main St\",\n        \"city\"\
    : \"Boston\"\n    }\n}\n```\n\nEach name in this example (\"username\", \"age\"\
    , \"is_student\", \"hobbies\", and \"address\") is a *key*. Each key has a *value*\
    \ to the right of the colon. Here's some information about each key in that example:\n\
    \n- The \"username\" key contains a string.\n- The \"age\" key contains a number.\n\
    - The \"hobbies\" key contains an *array* (list).\n- The \"address\" key contains\
    \ an object.\n\nBecause the entire block of JSON data is sometimes referred to\
    \ as a JSON object, the \"address\" key may also be referred to as a *nested object*\
    \ (because it's contained with the larger JSON object). The address is unique\
    \ in that it's a dictionary object in its own right, containing two keys of its\
    \ own, one named \"street\" and the other named \"city\". Each of the other keys\
    \ only contains one value (like age, which contains the value 18).\n\nPython doesn't\
    \ have a JSON data type, so JSON data in Python code is often stored as a string.\
    \ When defining such strings, it's important to use single-quotes (') to enclose\
    \ the entire string, because each key name inside that string must be enclosed\
    \ in double quotation marks for JSON. A JSON string containing just two key-value\
    \ pairs in Python looks like this:\n\n```\njson_string = '{\"username\": \"Alice\"\
    , \"age\": 25}'\n```\n\n## Parsing and serializing JSON data\n\nIn Python, the\
    \ dictionary (dict) data type is better suited to dealing with name–value pairs\
    \ than the string (str) data type. So Python includes a built-in `json` module,\
    \ which simplifies converting between dictionaries and JSON strings. The `json`\
    \ module is built in, so you just need to include `import json` near the top of\
    \ your code to use the module. No need to `pip install` the module.\n\nThe `json`\
    \ module contains methods to *parse* and *serialize* JSON data. Let’s start by\
    \ defining those two buzzwords:\n\n> **Parsing JSON:** Parsing refers to the process\
    \ of converting a JSON string into a Python object, such as a dict, list, str,\
    \ int, float, bool, or None.\n\n> **Serializing JSON:** Serializing is the process\
    \ of converting a Python object (for example, a dict, list, str, int, float, bool,\
    \ or None) into a JSON-formatted string or writing it to a file as JSON data.\n\
    \nFour methods are contained within the `json` module for parsing and serializing\
    \ JSON data:\n\n| Method | What It Does |\n|---|---|\n| `json.loads()` | Parses\
    \ a JSON-formatted string into a Python object (for example, dict or list) |\n\
    | `json.dumps()` | Converts a Python object into a JSON-formatted string |\n|\
    \ `json.load()` | Reads JSON data from a file into a Python object |\n| `json.dump()`\
    \ | Writes a Python object to a file as JSON |\n\nThe first two methods, `.loads`\
    \ and `.dumps`, allow you to work with JSON strings. Here’s an example of using\
    \ `json.loads()` to parse a JSON string into a Python object:\n\n```\nimport json\n\
    # Create a JSON string.\njson_string = '{\"username\": \"Alice\", \"age\": 25}'\n\
    print(json_string)\nprint(type(json_string))\n\n# Parse JSON string to Python\
    \ object\npython_obj = json.loads(json_string)\n\nprint(python_obj)  # Output:\
    \ {'name': 'Alice', 'age': 25}\nprint(type(python_obj))  # Output: <class 'dict'>\n\
    ```\n\nRunning that code produces the following output in the Terminal:\n\n```\n\
    json\n{\"username\": \"Alice\", \"age\": 25}\n<class 'str'>\n{'username': 'Alice',\
    \ 'age': 25}\n<class 'dict'>\n```\n\nThe output tells you that the first item\
    \ is a string (<class 'str'>) in Python. The second item is a Python dictionary\
    \ (<class 'dict'>) because the .loads method converted the original string to\
    \ a Python dictionary.\n\nThis next code does the opposite — it serializes a Python\
    \ dictionary object into a Python string:\n\n```\nimport json\n\n# Create a Python\
    \ dictionary object\npython_obj = {\"username\": \"Alice\", \"age\": 25}\nprint(python_obj)\n\
    print(type(python_obj))\n\n# Serialize the Python dictionary to a JSON string\n\
    json_string = json.dumps(python_obj)\n\nprint(json_string)\nprint(type(json_string))\n\
    ```\n\n## Reading and writing JSON files\n\nPython makes quick work of saving\
    \ dictionary data to data files via the .dump method of the json module. In your\
    \ Python code, you can start with a dict object, which is the preferred object\
    \ type for storing name–value pairs. The syntax for using .dump is as follows:\n\
    \n```\nwith open(\"filename\", \"w\") as file:\n    json.dump(dictionary, file)\n\
    ```\n\nReplace filename with the name of the file in which you want to store the\
    \ JSON object. Use a .json filename extension to best identify the file type.\
    \ If you don't specify a path, the file will be created in the same folder as\
    \ the code in which you're running Python. Here's an example of a complete script:\n\
    \n```\nimport json\n\n# Create a Python dictionary object\npython_dictionary =\
    \ {\n    \"username\": \"Alice\",\n    \"age\": 25,\n    \"is_student\": True,\n\
    \    \"hobbies\": [\"reading\", \"hiking\"],\n    \"address\": {\n        \"street\"\
    : \"123 Main St\",\n        \"city\": \"Boston\"\n    }\n}\n\n# Serialize to a\
    \ JSON file\nwith open(\"data.json\", \"w\") as file:\n    json.dump(python_dictionary,\
    \ file)\n```\n\nThe script starts by creating a Python dictionary that contains\
    \ several key-value pairs and data types. Then it stores that dictionary data\
    \ serialized into JSON format in a file named data.json. That file contains the\
    \ same data as a JSON object, as shown in Figure 9-3.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_200_0.png)\n\
    \nNext, let's look at a script that does the opposite of the preceding script\
    \ in that it reads the data.json file and imports its data into a Python dictionary.\
    \ To make it realistic, I've included some exception handling for bad or missing\
    \ files. I've also included some code to display each item from the dictionary\
    \ on a separate line in the Terminal:\n\n```\nimport json\n\n# Step 1: Open and\
    \ read the JSON file\ntry:\n    with open(\"data.json\", \"r\") as file:\n   \
    \     # Step 2: Parse JSON file into a Python dictionary using json.load()\n \
    \       user_data = json.load(file)\n\n# Step 3: Print the data type and contents\
    \ to verify\nprint(\"Type of data:\", type(user_data))\nprint(\"Username:\", user_data[\"\
    username\"])\nprint(\"Age:\", user_data[\"age\"])\nprint(\"Is Student:\", user_data[\"\
    is_student\"])\nprint(\"Hobbies:\", user_data[\"hobbies\"])\nprint(\"City:\",\
    \ user_data[\"address\"][\"city\"])\n\nexcept FileNotFoundError:\n    print(\"\
    Error: The file 'data.json' was not found.\")\nexcept json.JSONDecodeError as\
    \ e:\n    print(\"Error: Invalid JSON format in 'data.json' -\", e)\nexcept KeyError\
    \ as e:\n    print(\"Error: Missing key in dictionary -\", e)\n```\n\nAssuming\
    \ the `data.json` file exists and is the one shown in Figure 9-3, the output from\
    \ that code is as follows:\n\n```\nType of data: <class 'dict'>\nUsername: Alice\n\
    Age: 25\nIs Student: True\nHobbies: ['reading', 'hiking']\nCity: Boston\n```\n\
    \nThe `<class 'dict'>` in the output tells you that the data read from the file\
    \ is in a Python dictionary. Subsequent `print` statements display individual\
    \ items of data from the dictionary.\n\n## Understanding REST APIs\n\nMost modern\
    \ APIs today are Representational State Transfer (REST) APIs, all of which follow\
    \ the same standards and rules for accessing information via the internet. REST\
    \ APIs use the Hypertext Transfer Protocol (HTTP), the same as all websites, to\
    \ allow a *client* (your Python script or any other app) to access another app\
    \ on a server on the internet, which can provide useful information.\n\nREST is\
    \ a stateless API, meaning there is no open connection between the client and\
    \ the server during a transaction. Your app sends a request to an endpoint — typically,\
    \ a web Uniform Resource Locator (URL) that starts with `https://`. The server\
    \ sends back a response containing the information you requested. That response\
    \ is typically data in JSON format, discussed in the previous section."
  mdcn: "在你的项目中添加一个`.gitignore`文件不会影响你的Python代码的运行方式。`.gitignore`文件只是防止其内容中列出的任何文件或文件夹被推送到GitHub仓库，如果你决定使用GitHub与世界分享你的Python代码的话。\n\
    \n## 在脚本中使用API密钥\n\n要在代码中使用`.env`文件中的API，你需要在虚拟环境中`pip install python-dotenv`。然后在Python脚本的顶部附近包含以下所有行：\n\
    \n```\nfrom dotenv import load_dotenv\nimport os\n\n# Load the .env file\nload_dotenv()\n\
    \n# Get the API key\napi_key = os.getenv(\"SAMPLE_API_KEY\")\n```\n\n`=` `os.getenv`左侧的变量可以是任何你喜欢的有效Python变量名，但请确保`os.getenv`后括号和引号内的名称与你在`.env`文件中为API密钥指定的名称完全匹配。\n\
    \n在代码的其余部分中，在任何需要提供API密钥的地方使用该行左侧的变量名（示例中为`api_key`）。你将在本章的“发出API请求”部分看到一个示例。\n\
    \n## 处理JSON数据\n\nJavaScript对象表示法（JSON）是一种用于存储和交换数据的数据格式。名称中的*JavaScript*部分只是因为其语法类似于JavaScript，后者使用大量花括号（`{}`）。JSON在各种编程语言和平台中得到广泛支持，通常用于API，以及配置文件和数据存储。\n\
    \n与Python数据字典类似，JSON由键值对组成，其中每个数据项都有一个名称和一个值。值可以是字符串、数字、布尔值、数组（列表）、对象或null。每个键值对都包含在花括号中。\n\
    \n```\n{\n    \"username\": \"Alice\",\n    \"age\": 25,\n    \"is_student\":\
    \ true,\n    \"hobbies\": [\"reading\", \"hiking\"],\n    \"address\": {\n   \
    \     \"street\": \"123 Main St\",\n        \"city\": \"Boston\"\n    }\n}\n```\n\
    \n此示例中的每个名称（\"username\"、\"age\"、\"is_student\"、\"hobbies\"和\"address\"）都是一个*键*。每个键的冒号右侧都有一个*值*。以下是该示例中每个键的一些信息：\n\
    \n- \"username\"键包含一个字符串。\n- \"age\"键包含一个数字。\n- \"hobbies\"键包含一个*数组*（列表）。\n- \"\
    address\"键包含一个对象。\n\n因为整个JSON数据块有时被称为JSON对象，所以\"address\"键也可能被称为*嵌套对象*（因为它包含在更大的JSON对象中）。address的独特之处在于它本身就是一个字典对象，包含两个自己的键，一个名为\"\
    street\"，另一个名为\"city\"。其他每个键只包含一个值（如age，包含值18）。\n\nPython没有JSON数据类型，因此Python代码中的JSON数据通常存储为字符串。定义此类字符串时，使用单引号（'）括起整个字符串很重要，因为JSON中该字符串内的每个键名都必须用双引号括起来。Python中仅包含两个键值对的JSON字符串如下所示：\n\
    \n```\njson_string = '{\"username\": \"Alice\", \"age\": 25}'\n```\n\n## 解析和序列化JSON数据\n\
    \n在Python中，字典（dict）数据类型比字符串（str）数据类型更适合处理名称-值对。因此Python包含一个内置的`json`模块，它简化了字典和JSON字符串之间的转换。`json`模块是内置的，所以你只需要在代码顶部附近包含`import\
    \ json`即可使用该模块。无需`pip install`该模块。\n\n`json`模块包含用于*解析*和*序列化*JSON数据的方法。让我们先定义这两个流行术语：\n\
    \n> **解析JSON：** 解析是指将JSON字符串转换为Python对象（如dict、list、str、int、float、bool或None）的过程。\n\
    \n> **序列化JSON：** 序列化是将Python对象（例如dict、list、str、int、float、bool或None）转换为JSON格式的字符串或将其作为JSON数据写入文件的过程。\n\
    \n`json`模块中包含四种用于解析和序列化JSON数据的方法：\n\n| 方法 | 功能 |\n|---|---|\n| `json.loads()`\
    \ | 将JSON格式的字符串解析为Python对象（例如dict或list） |\n| `json.dumps()` | 将Python对象转换为JSON格式的字符串\
    \ |\n| `json.load()` | 从文件读取JSON数据到Python对象 |\n| `json.dump()` | 将Python对象作为JSON写入文件\
    \ |\n\n前两种方法`.loads`和`.dumps`允许你处理JSON字符串。以下是使用`json.loads()`将JSON字符串解析为Python对象的示例：\n\
    \n```\nimport json\n# Create a JSON string.\njson_string = '{\"username\": \"\
    Alice\", \"age\": 25}'\nprint(json_string)\nprint(type(json_string))\n\n# Parse\
    \ JSON string to Python object\npython_obj = json.loads(json_string)\n\nprint(python_obj)\
    \  # Output: {'name': 'Alice', 'age': 25}\nprint(type(python_obj))  # Output:\
    \ <class 'dict'>\n```\n\n运行该代码会在终端中产生以下输出：\n\n```\njson\n{\"username\": \"Alice\"\
    , \"age\": 25}\n<class 'str'>\n{'username': 'Alice', 'age': 25}\n<class 'dict'>\n\
    ```\n\n输出告诉你第一项是Python中的字符串（<class 'str'>）。第二项是Python字典（<class 'dict'>），因为.loads方法将原始字符串转换为Python字典。\n\
    \n接下来的代码执行相反的操作——它将Python字典对象序列化为Python字符串：\n\n```\nimport json\n\n# Create a\
    \ Python dictionary object\npython_obj = {\"username\": \"Alice\", \"age\": 25}\n\
    print(python_obj)\nprint(type(python_obj))\n\n# Serialize the Python dictionary\
    \ to a JSON string\njson_string = json.dumps(python_obj)\n\nprint(json_string)\n\
    print(type(json_string))\n```\n\n## 读写JSON文件\n\nPython通过json模块的.dump方法可以轻松地将字典数据保存到数据文件。在你的Python代码中，可以从dict对象开始，这是存储名称-值对的首选对象类型。使用.dump的语法如下：\n\
    \n```\nwith open(\"filename\", \"w\") as file:\n    json.dump(dictionary, file)\n\
    ```\n\n将filename替换为你想要存储JSON对象的文件名。使用.json文件扩展名以最好地标识文件类型。如果未指定路径，文件将在运行Python的代码所在的同一文件夹中创建。以下是完整脚本的示例：\n\
    \n```\nimport json\n\n# Create a Python dictionary object\npython_dictionary =\
    \ {\n    \"username\": \"Alice\",\n    \"age\": 25,\n    \"is_student\": True,\n\
    \    \"hobbies\": [\"reading\", \"hiking\"],\n    \"address\": {\n        \"street\"\
    : \"123 Main St\",\n        \"city\": \"Boston\"\n    }\n}\n\n# Serialize to a\
    \ JSON file\nwith open(\"data.json\", \"w\") as file:\n    json.dump(python_dictionary,\
    \ file)\n```\n\n该脚本首先创建一个包含多个键值对和数据类型的Python字典。然后将该字典数据序列化为JSON格式并存储在名为data.json的文件中。该文件包含与JSON对象相同的数据，如图9-3所示。\n\
    \n![](img/10d8e89b301a0e7452bff4d402265e78_200_0.png)\n\n接下来，让我们看一个与前面脚本相反的脚本，它读取data.json文件并将其数据导入Python字典。为了使其更真实，我包含了一些针对错误或缺失文件的异常处理。我还包含了一些代码，用于在终端中将字典中的每个项目显示在单独的行上：\n\
    \n```\nimport json\n\n# Step 1: Open and read the JSON file\ntry:\n    with open(\"\
    data.json\", \"r\") as file:\n        # Step 2: Parse JSON file into a Python\
    \ dictionary using json.load()\n        user_data = json.load(file)\n\n# Step\
    \ 3: Print the data type and contents to verify\nprint(\"Type of data:\", type(user_data))\n\
    print(\"Username:\", user_data[\"username\"])\nprint(\"Age:\", user_data[\"age\"\
    ])\nprint(\"Is Student:\", user_data[\"is_student\"])\nprint(\"Hobbies:\", user_data[\"\
    hobbies\"])\nprint(\"City:\", user_data[\"address\"][\"city\"])\n\nexcept FileNotFoundError:\n\
    \    print(\"Error: The file 'data.json' was not found.\")\nexcept json.JSONDecodeError\
    \ as e:\n    print(\"Error: Invalid JSON format in 'data.json' -\", e)\nexcept\
    \ KeyError as e:\n    print(\"Error: Missing key in dictionary -\", e)\n```\n\n\
    假设`data.json`文件存在且是图9-3所示的文件，则该代码的输出如下：\n\n```\nType of data: <class 'dict'>\n\
    Username: Alice\nAge: 25\nIs Student: True\nHobbies: ['reading', 'hiking']\nCity:\
    \ Boston\n```\n\n输出中的`<class 'dict'>`告诉你从文件读取的数据是Python字典格式。随后的`print`语句显示了字典中的各个数据项。\n\
    \n## 理解REST API\n\n当今大多数现代API都是表述性状态转移（REST）API，它们都遵循相同的标准和规则，通过互联网访问信息。REST API使用超文本传输协议（HTTP），与所有网站相同，允许*客户端*（你的Python脚本或任何其他应用程序）访问互联网上服务器上的另一个应用程序，该应用程序可以提供有用的信息。\n\
    \nREST是一种无状态API，这意味着在事务期间客户端和服务器之间没有打开的连接。你的应用程序向端点发送请求——通常是一个以`https://`开头的网络统一资源定位符（URL）。服务器发回包含你请求的信息的响应。该响应通常是JSON格式的数据，如前一节所述。"
