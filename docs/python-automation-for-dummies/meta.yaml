    \n# 第3章\n自动化Python基础\n\n在本章中，你将发现编写Python代码的概念、命令和结构。如果你是一位经验丰富的Python开发者，这些内容对你来说大部分不会是新闻。如果你有其他编程语言的经验，这些术语和概念将会很熟悉——你只是在学习Python的实现方式。而如果你是编写代码的新手，*所有*这些内容都将是全新的。\n\
