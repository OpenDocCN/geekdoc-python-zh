    \ | 12,345.68 |\n\n## 处理日期和时间\n\nPython 没有用于处理日期和时间的数据类型，但它有强大的内置模块来帮助处理它们。主要的内置模块名为\
    \ `datetime`。要使用它，请在脚本顶部包含以下语句：\n\n```\nfrom datetime import datetime\n```\n\n\
    ![](img/10d8e89b301a0e7452bff4d402265e78_56_0.png)\n\n请注意，前面的代码是 `from datetime\
    \ import datetime`，而不是仅仅 `import datetime`。这允许你在变量赋值中定义日期而无需重复 `.datetime`。如果我使用\
    \ `import datetime` 作为第一行代码，第二行将需要是 `dt = datetime.datetime(2026, 11, 28, 15,\
    \ 30, 0)` 才能工作。没什么大不了的。但这是一个常见的语法，所以我在这里用它作为示例。\n\n要从 `datetime` 获取值，你通常在 `variablename\
    \ =` 后面跟着 `datetime.`，然后是指定你想要什么的代码。例如，看看下面的内容：\n\n```\nfrom datetime import datetime\n\
    current_time = datetime.now()\nprint(current_time)\n```\n\n运行该代码会产生类似这样的输出，但日期和时间是根据你计算机的内部时钟的当前时间：\n\
    \n```\n2025-04-12 10:10:51.644321\n```\n\n要创建你自己的日期和时间，请使用语法 `datetime.date(year,\
