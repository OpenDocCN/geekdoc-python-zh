  md: '# Handling Exceptions


    No matter how good your code is, people using your code can make errors that could
    potentially crash your script. For example, perhaps your code asks the user for
    a number. But the user inputs a string instead. Such a simple error could stop
    your script in its tracks and display some arcane technical error message to your
    user.


    Handling errors that could cause your script to crash is called *exception handling*.
    The technique allows your script to keep running smoothly and hide any technical
    error messages from your user.


    Use `try`, `except`, `else`, and `finally` keywords to handle exceptions in your
    code. Here''s the basic structure:


    +   » `try`: The block of code you want to monitor for exceptions

    » `except`: The block that runs if a specific exception occurs, specifying how
    to handle it

    » `else` (optional): Runs if no exception occurs in the `try` block

    » `finally` (optional): Runs no matter what, whether an exception occurred or
    not (useful for cleanup tasks)


    Also related to exception handling, but not limited to being inside a `try` block
    is the `raise` keyword, which explicitly *raises* (triggers) an exception in your
    code. It allows you to signal that an error or exception condition has occurred.
    You can raise built-in exceptions or custom exceptions defined in your own code.
    Python has about 30 built-in exceptions, including the following:


    +   » `TypeError`: Raised when an operation or function is applied to an object
    of inappropriate type (for example, adding a string and an integer).

    » `ImportError`: Raised when an `import` statement fails to find or load a module.

    » `ModuleNotFoundError`: Raised when a module cannot be found (for example, `import
    nonexistent_module`).

    » `FileNotFoundError`: Raised when a file or directory is requested but doesn''t
    exist (for example, `open("missing.txt")`).

    » `PermissionError`: Raised when an operation lacks sufficient permissions (for
    example, trying to write to a read-only file).

    » `EOFError`: Raised when trying to read beyond the end of a file or input stream.'
