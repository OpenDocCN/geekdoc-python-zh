    \ The loop also stops searching right after it finds 3. It's an efficient way\
    \ to search a list, because the loop doesn't need to analyze every item in the\
    \ list before determining whether the 3 is found.\n\n> Indentation is critical\
    \ in Python, and none of the loops above will work unless the code is properly\
    \ indented. Code that executes inside a loop must be indented under the `for`\
    \ statement, and code that executes when the `if` condition proves true must be\
    \ indented under the `if` statement.\n\n# Making Decisions\n\nVirtually all Python\
    \ scripts involve decision-making (also called *branching*) so code only executes\
