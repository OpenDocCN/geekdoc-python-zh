    # Watermarking PDFs


    Watermarking PDFs is a common procedure, sometimes done to protect intellectual
    property, establish ownership, and prevent misuse by deterring unauthorized copying,
    distribution, or alteration, particularly of sensitive or confidential materials.


    ![](img/10d8e89b301a0e7452bff4d402265e78_184_0.png)


    Watermarks also serve branding purposes by embedding logos or names, reinforce
    document status with labels like *Draft* or *Confidential*, and enable tracking
    of distribution through unique identifiers to trace leaks or unauthorized sharing,
    providing a visible layer of security and control while maintaining the document’s
    content.


    In this section, you create a script that can open any existing PDF and add a
    watermark to each page of the document. The script saves the watermarked file
    with the original filename with `_watermarked` appended to the filename, so you
    retain your original document.


    The script uses `reportlab` and `PyPDF2` to manage the PDF, and `Pillow` to get
    the dimensions of your image. After you create and activate your virtual environment,
    make sure to enter this command at the Terminal to install those modules (if they’re
    not already installed):


    ```

    bash

    pip install reportlab PyPDF2 Pillow

    ```


    First, let me show you the entire script. I explain how to adapt it to your own
    needs in the sections that follow.


    ```

    python

    # watermark_pdf.py

    # pip install reportlab PyPDF2 Pillow

    import os

    import sys

    from pathlib import Path

    from io import BytesIO

    from PIL import Image

    from reportlab.pdfgen import canvas

    from PyPDF2 import PdfReader, PdfWriter

    ```'
