    \ code to allow such looping to work.\n\n```\nfrom pathlib import Path\n# Specify\
    \ the directory path (you can change this to your desired directory).\ndirectory\
    \ = Path(r\"C:\\Users\\Alan\\Documents\\Practice\") # Windows example\n#directory\
    \ = Path(\"/Users/Alan/Practice\") # Mac example\n```"
