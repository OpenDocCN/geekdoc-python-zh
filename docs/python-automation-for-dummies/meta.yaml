    \n### 表 3-3 算术和字符串连接运算符\n\n| 优先级 | 运算符 | 描述 | 示例 | 结果 |\n|---|---|---|---|---|\n\
    | 1 | ( ) | 括号（分组） | (2+3)*4 | 20 |\n| 2 | ** | 幂运算 | 2**3 | 8 |\n| 3 | * | 乘法\
    \ | 2*3 | 6 |\n| 3 | / | 除法 | 6/2 | 3 |\n| 3 | // | 整除 | 7//2 | 3 |\n| 3 | % |\
    \ 取模（余数） | 7%2 | 1 |\n| 4 | + | 加法 | 2+3 | 5 |\n| 4 | + | 字符串连接 | 'a'+'b' | 'ab'\
    \ |\n| 4 | - | 减法 | 5-2 | 3 |\n\n具有相同运算顺序的运算符在表达式中从左到右执行。`+` 运算符在与字符串一起使用时，只是将字符串连接成一个字符串。例如，在下面的示例中，`user_name`\
    \ 变量包含 Sarah。然后将其与字符串 \"Hello, \"（末尾包含一个空格）连接，形成一个名为 `greeting` 的新字符串，其中包含 Hello,\
    \ Sarah。\n\n```\n# Combining strings with the + operator\nuser_name = \"Sarah\"\
