    \ here: The user doesn’t enter two valid numbers, or the user enters a zero for\
    \ the divisor number. Here’s the same code with exception handling added to gracefully\
    \ handle both kinds of errors:\n\n```\ntry:\n    number1 = float(input(\"Enter\
    \ the first number: \"))\n    number2 = float(input(\"Enter the second number:\
    \ \"))\n```"
