  md: "By keeping your code sparse, you make it easier for yourself (and others) to\
    \ understand and maintain it later.\n\n# Readability Counts\n\nThis principle\
    \ emphasizes that code should be written in a way that is easy for humans to read\
    \ and understand, prioritizing clarity over cleverness or complexity. Think in\
    \ terms of people reading your code (teammates in a programming team, or your\
    \ future self). If you work in a team, consider junior developers who are new\
    \ to the project and not already familiar with how your team does things. Focus\
    \ on\n\n+   » **Clarity over obscurity:** Use meaningful variable names, clear\
    \ structure, and straightforward logic.\n» **Human-first design:** Code is read\
    \ more often than it's written, so optimize for the reader's comprehension.\n\
    » **Pythonic style:** Follow all the guidelines in this chapter to develop a consistent\
    \ style like you've seen throughout this book.\n\nFor readability by humans, descriptive\
    \ names for variables probably contribute more to readability than any other factor.\
    \ For example, take a look at the following code. It's not so clear or obvious\
    \ what the code is doing:\n\n```\ndef x(y):\n    z=0\n    for i in y:\n      \
    \  z+=i\n    return z/len(y)\n```\n\nThe purpose of the code becomes much more\
    \ apparent when you replace short one-letter variable names with more descriptive\
    \ names:\n\n```\ndef calculate_average(numbers):\n    total = 0\n    for number\
    \ in numbers:\n        total += number\n    return total / len(numbers)\n```"
