    # Finding text boxes to fill


    On web pages, controls like text boxes are defined in Hypertext Markup Language
    (HTML) using tags like those shown in Table 10-1.


    TABLE 10-1 Common HTML Tags for Controls on Web Pages


    | HTML Tag | Control Type |

    | :--- | :--- |

    | `<input type="text">` | Text box |

    | `<input type="search">` | Text box used for searches |

    | `<textarea>` | Multiline text box |

    | `<select>` | Drop-down list |

    | `<input type="radio">` | Radio button |

    | `<input type="checkbox">` | Check box |

    | `<input type="submit">` | Submit button for a form |


    Most controls will have an id, which appears inside the tag as id= followed by
    the identifier. For example, here''s a tag for a text box control with an id of
    "prompt":


    ```

    <input type="text" id="prompt">

    ```


    The Submit button for a form may or may not have an id. But its tab is always
    `<input type="submit">`, so you can typically refer to it using syntax that identifies
    a Submit button, as you''ll see a little later in this section.


    The id of a control isn''t usually obvious just from looking at a web page. Typically,
    you can right-click the control and choose Inspect. A panel opens the HTML tag
    for the control highlighted, as shown in Figure 10-2. In this example, I right-clicked
    the Search box on Wikipedia''s page. The highlighted tag includes id="searchInput",
    which shows that the control''s id is "searchInput".


    > If you can''t find the id of a control using your current web browser, try visiting
    the same page with Edge or Chrome to see if you get better results.'
