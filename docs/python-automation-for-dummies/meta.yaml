    \ get confused and not know what to do. In programming, syntax is the same thing\
    \ — you need to order the words so the computer understands what you want. Syntax\
    \ is just the rules for putting words and symbols in the right order.\n\nSome\
    \ programming languages require lots of punctuation, in addition to words, as\
    \ part of their syntax. That gets tiresome and makes learning more difficult.\
    \ I’ll give you a simple example — a piece of code that checks whether a number\
    \ is even or odd and prints a message — in both JavaScript and Python.\n\nJavaScript\
    \ seems very “busy” with parentheses, curly brackets, and semicolons:\n\n```\n\
    function checkEvenOrOdd(number) {\n    if (number % 2 === 0) {\n        console.log(\"\
    The number \" + number + \" is even!\");\n    } else {\n        console.log(\"\
    The number \" + number + \" is odd!\");\n    }\n}\n\ncheckEvenOrOdd(7);\n```\n\
    \nThat code looks like something written by aliens. But that’s what a JavaScript\
    \ requires. You’ve got:\n\n- Curly brackets {} to wrap the function and the if...else\
    \ blocks.\n- Parentheses () for the function definition and the if condition.\n\
    - A semicolon (;) at the end of each line (JavaScript loves semicolons).\n\nNow\
    \ here's the same thing in Python:\n\n```\ndef check_even_or_odd(number):\n  \
    \  if number % 2 == 0:\n        print(f\"The number {number} is even!\")\n   \
    \ else:\n        print(f\"The number {number} is odd!\")\n\ncheck_even_or_odd(7)\n\
    ```\n\nGranted, it's still not plain English. But it's much, much cleaner and\
