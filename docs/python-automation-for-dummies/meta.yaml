    # Making immutable lists with tuples


    The data types I explain in the previous sections cover just about anything you''ll
    ever need to do in Python or any other programming language for that matter. But
    Python does have some more advanced data types, which are sometimes used in more
    advanced apps.


    ![](img/10d8e89b301a0e7452bff4d402265e78_51_0.png)


    A `tuple` (`tuple`) is a data type that''s like a list, but with one big difference:
    Tuples are *immutable*, meaning that after you define a tuple in your code, other
    code in the script can''t change any values or rearrange values. To indicate that
    a list of values is a tuple rather than a list, enclose the values in parentheses
    rather than square brackets.


    The main reason tuples exist is because the computer can work with them faster
    than it can work with lists because no considerations for possible changes need
    to be made. Also, tuples are secure in the sense that, after the list is defined,
    nothing in the code can change the list. Here is an example of a tuple:


    ```

    ny_coordinates = (40.7128, -74.0060)  # map coordinates for New York

    ```


    As with lists, the values in a tuple are numbered starting at 0. Even though you
    use parentheses, rather than square brackets, you still use square brackets to
    access items in the list. In the following code, a variable named `latitude` receives
    the value 40.7128 and a variable named `longitude` receives the value -74.0060:


    ```

    latitude = ny_coordinates[0]  # first value in tuple 40.7128

    longitude = ny_coordinates[1]  # second value in tuple -74.0060

    ```


