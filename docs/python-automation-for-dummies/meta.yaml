    # Deleting Old and Temporary Files


    This script can delete old and temporary files. In fact, it can delete files of
    any age, which, of course, could be dangerous. To play it safe, we won''t let
    this script actually delete any files. Instead, we''ll have it send the files
    to the trash — that is, to the Recycle Bin in Windows or to the Trash on Linux
    or macOS. That way, you can review all the files, and recover any files you want
    to keep before deleting them forever.


    Luckily, sending to the trash is easy thanks to the `send2trash` module. This
    cross-platform module determines which operating system your code is running on
    and then sends the file to the appropriate location. You don''t have to worry
    about any of that in your own code.'
