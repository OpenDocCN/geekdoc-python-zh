    # Finding and Removing Duplicate Files


    Finding duplicate files isn’t always easy, because how can you be sure two files
    are exactly the same? The answer to that question, in the computer world, is by
    *hashing* the files. Hashing produces a *digest* of the file, which is a string
    of characters. No two files will produce the same digest, unless the files are
    identical.'
