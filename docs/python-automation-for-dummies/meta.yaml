    # 第三部分 自动化互联网


    ## 本部分内容...


    -   掌握用于在线交互的应用程序编程接口（API）和 JavaScript 对象表示法（JSON）。

    -   自动化网络浏览器。

    -   抓取网页以获取代码和内容。

    -   自动化电子邮件和短信（SMS）文本消息。

    -   自动化社交媒体内容和指标。


    ## 本章内容


    -   获取和存储 API 密钥

    -   处理 JSON 数据

    -   理解 REST API

    -   查看一个 REST API 脚本示例


    # 第 9 章 与 API 交互


    你的 Python 脚本与互联网内容之间的大部分交互将通过应用程序编程接口（API）进行。要访问 API，你通常需要向 API 提供商注册并获取一个 API
    密钥，这是 API 提供商提供的一串唯一代码，用于识别你和你的应用程序。密钥是由字符和数字组成的字符串，长度在 20 到 50 个字符之间。


    在本章中，我将向你展示如何获取 API 密钥、安全地存储它们，以及如何使用 Python 来利用互联网 API 服务。我还将向你展示如何在与 API 交互时使用
    JSON 来格式化数据。


    ## 获取 API 密钥


    要获取 API 密钥，你通常需要向 API 提供商注册并请求访问权限。步骤通常如下：


    1.  **访问 API 提供商的网站，创建一个用户账户或登录你现有的账户。**

    2.  **导航到提供商网站的 API 部分。** 它通常位于“开发者门户”或“API 仪表板”等标题下。

    3.  按照屏幕上的说明生成 API 密钥。你可能需要在网站上创建一个项目或应用程序。

    4.  同意 API 的服务条款。生成后，你唯一的 API 密钥将显示在屏幕上。

    5.  复制 API 密钥并将其存储在你自己计算机上的安全位置。


    > 新的 API 密钥可能需要几个小时或更长时间才能激活使用。请查看你获取密钥的网站上的文档。注意任何关于测试密钥前需要等待多长时间的电子邮件消息。


    > 不要与他人分享你的 API 密钥或将密钥暴露给公众。这样做可能会让其他人以你的身份访问 API，从而滥用或误用该服务。如果你为 API 服务付费，其他人使用你的账户可能会让你花费大量金钱。（有关安全存储
    API 密钥的提示，请参阅下一节。）


    > 并非所有 API 密钥都是免费的。在本章中，我专注于在撰写本文时免费的 API，因为我知道人们在学习时并不总是想设置付费账户。但事情会变化，所以如果我不小心将你引导到需要付费的地方，我提前表示歉意。


    ## 安全存储 API 密钥


    保护你的 API 密钥私密性很重要，因为它们标识了你的账户。你不想让冒名顶替者以你的身份滥用 API。如果你确实开始使用付费服务，你也不想为别人使用你的账户付费。


    使用 `.env` 文件是一种常见的方法，可以避免将密钥放在你的 Python 代码中。`.env` 文件只是一个名为 `.env` 且没有扩展名的简单文本文件。在该文件中，你可以为密钥指定一个自己选择的变量名。这样，你可以在代码中只显示变量名，而不是实际的密钥。因此，如果你与他人分享代码，你的密钥仍然是隐藏的。


    如你所知，在 Python 和其他编程语言中，值永不改变的变量被称为 *常量*。因为你的 API 密钥在脚本运行时不会改变，所以它实际上是代码中的一个常量。虽然不是必需的，但习惯上将常量名称全部大写（以区分常量和变量）。因此，如果你决定使用像
    Weather_API_Key 这样的变量名，你实际上可以将名称全部大写，如下所示：


    ```

    WEATHER_API_KEY=8c21435c4317367221435aac09bf4c1d

    ```


    你可以在 .env 文件中放入任意数量的 API 密钥。只需确保每个密钥都有一个唯一的名称。以下是在 Visual Studio Code (VS Code)
    中将 API 密钥添加到 Python 项目的步骤：


    1.  在 VS Code 中打开你的 Python 项目文件夹。

    2.  如果你还没有这样做，请创建并激活一个虚拟环境。完整说明请参见第 2 章。

    3.  将鼠标指针悬停在资源管理器窗格顶部的项目文件夹名称上，然后单击“新建文件”，或从菜单栏中选择“文件” > “新建文件”。

    4.  将文件命名为 .env。不要使用任何空格或文件扩展名——只需按所示输入名称。

    5.  在编辑器中打开文件后，输入密钥的名称（通常全部大写），后跟等号 (=) 和 API 密钥。图 9-1 显示了一个示例。

    6.  关闭并保存 .env 文件。


    ![](img/10d8e89b301a0e7452bff4d402265e78_194_0.png)


    API 密钥必须是你从提供商处获得的有效密钥。图 9-1 中显示的只是一个示例，在实际使用中无效。请确保使用你自己的 API 密钥。


    ## 其他保护 API 密钥的方法


    除了将 API 密钥存储在 .env 文件中，你还可以将密钥存储在操作系统的环境变量中，或使用基于云的服务，如 Amazon Web Services (AWS)
    Secrets Manager (https://aws.amazon.com/secrets-manager)、Microsoft Azure Key Vault
    (https://azure.microsoft.com/en-us/products/key-vault) 或 Google Cloud Secret Manager
    (https://cloud.google.com/security/products/secret-manager)。我不会详细介绍这些选项，因为这是一本关于
    Python 自动化的书，而不是 API 密钥管理，但你可以通过搜索网络或询问人工智能（AI）来自行探索它们。


    ## 创建 .gitignore 文件


    如果你有可能将项目上传到 GitHub，请务必包含一个 .gitignore 文件，并在其中包含 .env，以防止你的密钥与 Python 代码一起被共享。你也可以在该
    .gitignore 文件中包含 .venv 文件名，这样用户在下载你的代码后可以为他们自己的系统创建自己的虚拟环境。


    > 我在第 2 章中介绍了虚拟环境和 .venv 文件。


    将 .gitignore 文件添加到 VS Code 项目与添加任何其他文件相同。只需创建一个新文件，就像你创建 .env 一样，但将此文件命名为 .gitignore，不要有空格和文件扩展名。当文件在编辑器中打开时，只需输入
    .env 和 .venv，每个占一行，如图 9-2 所示。


    ![](img/10d8e89b301a0e7452bff4d402265e78_195_0.png)'
