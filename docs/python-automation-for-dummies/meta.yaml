    a little offbeat relative to the main flow of the text. Here''s the kind of content
    each icon represents:


    +   - **TIP**: The Tip icon alerts you to juicy information that makes computing
    easier — a time-saver or shortcut that''s worth keeping in mind, for example.

    - **REMEMBER**: Don''t forget to remember these important points because you''re
    likely to need the information often. These are usually items that are easy to
    forget but well worth remembering.

