    # Chapter 12

    Automating Email and Text Messages


    In this chapter, you explore Python automation for email and text messages. You
    can use these scripts to automate marking emails, send newsletters, remind people
    of upcoming appointments, and more.


    For sending email messages, you''ll need an email account and the built-in smtp
    module. You can send plain-text messages or messages formatted with HTML. If your
    email recipient addresses are in an app, you can export them to a simple text
    file and have Python send an email to every address in that file.


    For text messaging, you''ll need an account with the ability to send Short Message
    Service (SMS) messages, which you''ll access through an application programming
    interface (API). I take you through all the necessary steps using the popular
    Twilio service for sending bulk text messages. That service includes a free tier,
    so you can learn without spending any additional money.


    # Sending Bulk Email Automatically


    Sending email can be a great way to keep in touch with subscribers, customers,
    followers, or any other group of people for whom you''ve acquired email addresses.
    You can send reminders, newsletters, invitations, product announcements, or whatever
    works for your business or organization. To get started, you''ll need to gather
    some information about your email account.'
