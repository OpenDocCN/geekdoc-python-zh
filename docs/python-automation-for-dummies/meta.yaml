    \ import datetime\ncurrent_time = datetime.now()\nprint(current_time)\n```\n\n\
    Running that code produces output that looks something like this, but with the\
    \ current date and time according to your computer's internal clock:\n\n```\n\
    2025-04-12 10:10:51.644321\n```\n\nTo create your own dates and times, use the\
    \ syntax `datetime.date(year, month, day)`. For example, this line stores 12/25/2026\
    \ in a variable named `my_date`:\n\n```\nmy_date = datetime.date(2026, 12, 25)\
    \  # Year, Month, Day\n```\n\nTo specify both a date and a time use the syntax\
    \ `datetime.datetime(year, month, day, hour, minute)`. Use the 24-hour clock for\
    \ the hour (for example, 15 for 3:00 p.m.). Here's an example where we're setting\
    \ a variable named `deadline` to November 30, 2026, at 3:30 p.m.:\n\n```\ndeadline\
    \ = datetime.datetime(2026, 11, 30, 15, 30)\n```\n\nTo make dates and times easier\
    \ for people to read, you can use `strftime()` with the directives shown in Table\
