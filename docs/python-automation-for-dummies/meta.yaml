  md: 'The Pillow module works with raster images, which have extensions like .bmp,
    .gif, .jpeg, .jpg, .png, .psd, .raw, .tif, .tiff, and .webp. It won''t work with
    vector images, which have extensions like .ai, .cdr, .eps, .pdf, and .svg.


    This script provides four methods for processing any number of images:


    +   >> crop(): Crops image using specified coordinates

    >> flip(): Flips image horizontally or vertically

    >> resize(): Changes image dimensions

    >> rotate(): Rotates image by specified degrees


    Each operation is defined in its own method. This script uses pathlib to walk
    directories that contain the files to process.


    Because we''ve defined a class for the script, the functions defined with the
    def keyword are treated as methods and called using the .methodname() syntax.


    # Resizing images


    The resize method handles resizing of images. It accepts four parameters: self,
    width, height, and output_suffix. The self parameter is the image being resized.
    The width and height parameters are integers specifying the width and height to
    which to resize. You can set just the width or just the height, set the opposite
    side to None to resize along one dimension, and automatically calculate the opposite
    side''s size to maintain the image aspect ratio.


    The optional output suffix parameter adds _resized to the filename of the resized
    image, so the original file retains its original filename. If you want to use
    some word other than _resized as the addition to the name, you can pass that as
    a string to override the default:


    ```

    def resize(self, width, height, output_suffix="_resized"):

    ```


    Much of the code in the function is for calculating the image size. To retain
    the aspect ratio, you specify only width or height. As usual, there''s also some
    exception handling. The actual resizing of the image and saving the resized image
    happens in this code:


    ```

    # Perform resize

    resized_image = img.resize((new_width, new_height), Image.Resampling.LANCZOS)

    ```'
