    # # Installing and running Ollama


    The first step to using Ollama is to download and install it on your computer.
    You can find versions for Linux, macOS, and Windows at https://ollama.com/download.
    You download and install it just like any other app.


    After Ollama is installed, you can run it from the Windows Start menu, the macOS
    Launchpad, or however you normally launch apps on Linux. Ollama runs as a *background
    process*, which means you won''t see any open windows or Taskbar/Dock icons while
    it''s running. However, you may see a tiny llama icon in the Windows Notification
    Area (see Figure 15-2) or on the macOS menu bar (near the Wi-Fi, battery, and
    other icons on the right).


    The llama icon means Ollama is running


    ![](img/10d8e89b301a0e7452bff4d402265e78_294_0.png)


    FIGURE 15-2: Ollama running in the background.


    # # Downloading AI models with Ollama


    When Ollama is running in the background, you can interact with Ollama through
    a command-line interface (CLI). In other words, you can interact with it through
    the Terminal window in VS Code on any computer.


    Though not required, you can also access Ollama from a command line outside of
    VS Code. On Windows, you can use Command Prompt or PowerShell. On macOS or Linux,
    use the Terminal app.


    To verify that Ollama is running and available, you can check its version number
    by entering the command `ollama --version` (see Figure 15-3). Optionally, use
    your web browser to browse to 127.0.0.1:11434 (a local address) and you''ll see
    the message `Ollama is running`. If Ollama isn''t running, entering `ollama serve`
    at the command line should start it.'
