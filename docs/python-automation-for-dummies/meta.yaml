  md: '# TypeError


    In Python, a `TypeError` occurs when you try to perform an operation on a data
    type that isn''t supported for that operation. Think of it as Python saying, “I
    don''t know how to do this with these types of values!” It''s one of the most
    common errors you''ll encounter when first learning Python.


    Confusing strings and numbers are one of the most common `TypeError` mistakes.
    Here''s a simple example:


    ```

    # Code that causes TypeError

    x = "5"

    y = 10

    result = x + y

    ```


    Running that code produces the following error:


    ```

    TypeError: can only concatenate str (not "int") to str

    ```


    The problem here is that the `x` variable is defined as a string (because it''s
