    \ type (Pages, Google Docs, Notepad, TextEdit), and leave that window open.\n\
    2. Open VS Code if you haven't already.\n3. In your script, set a timer to pause\
    \ code execution before the script runs, to give yourself time to switch windows.\n\
    \   For example, `time.sleep(5)` pauses for five seconds.\n4. Run your script\
    \ in the usual manner in VS Code.\n5. Switch to the window in which you want the\
    \ script to type.\n   If the script will be typing into a form, click inside the\
    \ first form field.\n\n> When using a script to fill in a form, it's best to use\
    \ the Tab key to move from one field to the next. That way, you don't need to\
    \ know the exact screen position of each field in which you want to type.\n\n\
    # Controlling the typing speed\n\nTo type text with PyAutoGUI, use the `.write()`\
    \ method. The text will type at lightning speed. Here's an example:\n\n```\npyautogui.write(\"\
    Hello World\")\n```\n\nIf you need to slow down the typing, add an `interval=`\
    \ parameter and the number of seconds to pause between each typed character. For\
    \ example, if you want to delay by half a second, type the code like this:\n\n\
    ```\npyautogui.write(\"Hello World\", interval=0.5)\n```\n\n# Typing long passages\
    \ of text\n\nIf you want to type long passages of text with line breaks and such,\
    \ your best bet it to put that text in a variable first. Then put the name of\
    \ the variable between the parentheses, without quotation marks.\n\n> Python allows\
    \ you to put long passages of text with line breaks inside triple quotation makes.\
    \ Although it's often used for lengthy comments, you can also store long passages\
    \ of text with line breaks using triple quotation marks. You can use either double\
    \ quotation marks, like `\"\"\"` or single quotation marks like `'''`. Just make\
    \ sure you use the same type to start and end the text."
  - "[PAGE 159]\n\nFor example, here's a long passage of text that contains line breaks,\
    \ stored in a variable named `long_message`. The `pyautogui.write()` statement\
    \ types the text with a tenth of a second delay between each character:\n\n```\n\
    long_message = \"\"\"Enclose longer passages of text like this,\nwith line breaks\
    \ if you like, inside triple quotation marks.\nThen to have Python type the text,\
    \ put the variable\nname inside the parentheses of .write().\"\"\"\npyautogui.write(long_message,\
    \ interval=0.1)\n```\n\n# Pressing special keys\n\nTo type special keys, like\
    \ Enter or Tab, use `pyautogui.press()` with the name of the key to press, in\
    \ quotation marks, inside the parentheses. The key names include \"enter\", \"\
    tab\", \"space\", \"backspace\", \"delete\", \"esc\", \"win\", \"up\", \"down\"\
    , \"left\", \"right\", \"f1\", \"f2\", \"f3\", \"f4\", \"f5\", \"f6\", \"f7\"\
    , \"f8\", \"f9\", \"f10\", \"f11\", \"f12\", \"home\", \"end\", \"pageup\", and\
    \ \"pagedown\".\n\nAs an example, here's some code to type some text, press Enter,\
    \ press Tab, type some more text, press Enter, and type one more line of text:\n\
    \n```\npyautogui.write(\"This is a line of text.\")\npyautogui.press(\"enter\"\
    )\npyautogui.press(\"tab\")\npyautogui.write(\"This line is indented.\")\npyautogui.press(\"\
    enter\")\npyautogui.write(\"One final line of text.\")\n```\n\nThe output is three\
    \ lines of text with the middle line indented, like this:\n\n```\nThis is a line\
    \ of text.\n    This line is indented.\nOne final line of text.\n```\n\n# Pressing\
    \ hotkeys\n\nPyAutoGUI offers a `hotkeys()` method for typing shortcut keys that\
    \ often involve two or more key presses. That includes the Shift, Ctrl, Alt, and\
    \ Windows keys in Windows (typed as \"shift\", \"ctrl\", \"alt\", and \"win\"\
    \ in PyAutoGUI). On macOS, you can use the Command, Option, and Control keys (typed\
    \ as \"command\", \"option\", and \"ctrl\" on a Mac)."
- md: "## Detecting the operating system\n\nIf you ever want to write an app that\
    \ presses shortcut keys correctly both on Windows and on macOS, you can use the\
    \ `platform` module with `.system` to detect on which operating system the script\
    \ is running. You don't need to `pip install` that module — just import it into\
    \ your script. For example, here's some code that uses `Ctrl+key` shortcuts when\
    \ running on Windows, and `Command+key` shortcuts when running on macOS.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_160_0.png)\n\
    \nThe code refers to macOS as Darwin because the platform module prioritizes the\
    \ kernel name over the operating system name. macOS is a Unix-like operating system,\
    \ which, at its core, uses a kernel named Darwin to handle interaction between\
    \ hardware and software.\n\n```python\nimport pyautogui\nimport platform\n\npyautogui.FAILSAFE\
    \ = True\npyautogui.PAUSE = 0.1\n\n# Select, copy, and paste the text on a Mac.\n\
    if platform.system() == 'Darwin':\n    # Select all in current document.\n   \
    \ pyautogui.hotkey('command', 'a')\n    # Copy selected text.\n    pyautogui.hotkey('command',\
    \ 'c')\n    # Move to the end of the document.\n    pyautogui.hotkey('command',\
    \ 'down')\n    # Move to the next line.\n    pyautogui.press('enter')\n    # Paste\
    \ the copied text.\n    pyautogui.hotkey('command', 'v')\n# Select, copy, and\
    \ paste the text on Windows.\nelif platform.system() == 'Windows':\n    # Select\
    \ all in current document.\n    pyautogui.hotkey('ctrl', 'a')\n    # Copy selected\
    \ text.\n    pyautogui.hotkey('ctrl', 'c')\n    # Move to end of document.\n \
    \   pyautogui.hotkey('ctrl', 'end')\n    # Move to the next line.\n    pyautogui.press('enter')\n\
    \    # Paste the copied text.\n    pyautogui.hotkey('ctrl', 'v')\n```\n\nThe shortcut\
    \ keys for Linux generally duplicate those for Windows. If you want to support\
    \ Linux, you can probably get away with changing `elif platform.system() == 'Windows':`\
    \ to `else:` to cover both Windows and Linux. There are multiple GUIs for Linux,\
    \ including GNOME, KDE Plasma, XFCE, Cinnamon, and others. You may want to test\
    \ things out on whichever GUI you're using, just to be sure.\n\n## Detecting Keystrokes\n\
    \nWhenever you're running a Python script in VS Code, you can press Ctrl+C to\
    \ stop code execution, but only if VS Code (or whatever editor/Terminal you're\
    \ using) is in the active window. If you're using Python to automate other apps,\
    \ you may want to be able to detect keystrokes from other windows. The `pynput`\
    \ module lets Python detect keystrokes on the operating system level. In other\
    \ words, `pynput` can detect keystrokes from windows other than the window from\
    \ which you launched your Python script.\n\nThe `pynput` module isn't part of\
    \ the standard library. Make sure you `pip install pynput` to your virtual environment\
    \ before creating scripts that import that module.\n\nAs with PyAutoGUI used in\
    \ this chapter, you'll need to enable Accessibility features on a Mac for `pynput`\
    \ to work. See \"Granting Permissions on a Mac,\" earlier in this chapter, for\
    \ details.\n\nTo illustrate how `pynput` works, the following script will stop\
    \ the currently running Python script from any open window in Linux, macOS, or\
    \ Windows when the user presses the Escape key (`esc` in the code):\n\n```python\n\
    # listen_esc.py\n# You must pip install pynput for this to work.\nfrom pynput\
    \ import keyboard\nimport sys\n\ndef on_press(key):\n    # Check if the Esc key\
    \ is pressed.\n    if key == keyboard.Key.esc:\n        print(f'Esc key detected!\
    \ Stopping the script...')\n        # Stop the listener and exit the script\n\
    \        sys.exit(0)\n\n# Set up the keyboard listener.\nprint(f'Press Esc in\
    \ any window to stop')\nwith keyboard.Listener(on_press=on_press) as listener:\n\
    \    listener.join()\n```\n\nNotice the function named `on_press(key)`. Whenever\
    \ the preceding script is running, the `key` parameter in parentheses receives\
    \ the last key pressed on the keyboard, no matter what window you're in. The line\
    \ that reads `if key == keyboard.Key.esc` is True when you press Esc, so the function\
    \ simply prints a little feedback and stops script execution with `sys.exit(0)`.\n\
    \nThe most complicated code is probably `with keyboard.Listener(on_press=on_press)`,\
    \ which creates a `pynput` listener that can detect every key pressed at the keyboard.\
    \ The `on_press=on_press` bit says to call the function named `on_press` every\
    \ time a key is pressed. Whatever key was pressed is then passed to that function\
    \ as the `key` parameter.\n\nThe `as listener` part simply names that keyboard\
    \ listener `listener`. The `listener.join()` activates the listener by temporarily\
    \ blocking the Python script from being the only one listening for keystrokes,\
    \ so the listener can monitor keystrokes globally, across all open windows. That\
    \ listener stays in effect until `sys.exit(0)` terminates the Python script, which\
    \ also terminates the listener.\n\n## Creating Your Own Keyboard Shortcuts\n\n\
    If you want to create custom shortcut keys that you can call from any app or window,\
    \ you can use `pynput` (described earlier) to listen for the key combinations.\
    \ Try not to replace commonly used shortcuts, like Ctrl+C or ⌘+C for Copy in Windows\
    \ or Mac, respectively, or things could become very confusing when you're calling\
    \ your Python script rather than doing the shortcut key's original task!\n\nIf\
    \ you're targeting a specific app for your shortcut key action, you can ask artificial\
    \ intelligence (AI) whether the shortcut key you're planning to use already has\
    \ some role in that app.\n\nFor unknown reasons, `pynput` doesn't always play\
    \ nicely with Microsoft Word. If you're looking to create shortcut keys for Windows,\
    \ consider using a macro in Word instead. If you don't know how, just ask any\
    \ AI.\n\nIn this next script, we'll use `pynput` to listen for the shortcut key.\
    \ We'll also allow you to end the script by pressing the Escape key. So basically,\
    \ after you start the script, you can go to any other app and use the shortcut\
    \ key to type your text, as long as the script is running. Press Escape to end\
    \ the script and stop listening for the shortcut key.\n\nFirst, I'll show you\
    \ the entire script; then I'll explain how it works.\n\n```python\n# shortcut_key.py\n\
    # pip install pynput and pyautogui\nfrom pynput import keyboard\nimport pyautogui\n\
    import sys\nimport platform\nimport time\n\n# Define hotkeys for typing boilerplate\
    \ text.\nwindows_hotkey = '<ctrl>+<alt>+t'\nmac_hotkey = '<cmd>+<shift>+t'\n#\
    \ Define boilerplate text and hotkeys for Windows, Mac.\nboilerplate_text = \"\
    \"\"Hello, this text was typed by pynput!\n    You can make this any length and\
    \ any number of lines.\"\"\"\n\ndef type_boilerplate():\n    time.sleep(0.5)\n\
    \    pyautogui.write(boilerplate_text, interval=0.05)\n\ndef exit_script():\n\
    \    print(\"Esc pressed. Exiting...\")\n    sys.exit(0)\n\ndef main():\n    #\
    \ Set up the hotkey based on the operating system.\n    system = platform.system()\n\
    \    # Mac shortcut key\n    if system == 'Darwin':\n        hotkey = mac_hotkey\n\
    \    else:\n        # Windows/Linux shortcut key\n        hotkey = windows_hotkey\n\
    \n    # Set up the hotkeys dictionary and what each calls.\n    hotkeys = {\n\
    \        hotkey: type_boilerplate,\n        '<esc>': exit_script\n    }\n    #\
    \ Start listening.\n    print(f\"Listening for {hotkey}. Press Esc to end...\"\
    )\n    with keyboard.GlobalHotKeys(hotkeys) as listener:\n        listener.join()\n\
    \nif __name__ == '__main__':\n    try:\n        main()\n    except KeyboardInterrupt:\n\
    \        print(\"\\nExiting...\")\n        sys.exit(0)\n```\n\nThe following block\
    \ of code is where you define your hotkeys. You can define as many hotkeys as\
    \ you want. I've done two — one for typing boilerplate text and one for exiting\
    \ the script. If you want to support both macOS and Windows, you'll have to define\
    \ hotkeys for each, as I've done here:\n\n```python\n# Define hotkeys for typing\
    \ boilerplate text.\nwindows_hotkey = '<ctrl>+<alt>+t'\nmac_hotkey = '<cmd>+<shift>+t'\n\
    ```\n\nI've set up Ctrl+Alt+T for the Windows hotkey and ⌘+Shift+T for the Mac.\
    \ That key combination isn't used for anything important, as far as I know. So,\
    \ I'm not replacing some commonly used shortcut key with my own.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_164_0.png)\n\
    \nThe syntax requires that the modifier keys `ctrl`, `alt`, and `cmd` (command)\
    \ be enclosed in angle brackets, while the regular letter `t` isn't in angle brackets.\n\
    \nFor my example, I'm going to have the shortcut key type some text into whatever\
    \ app I happen to be using. Frequently typed text is sometimes called *boilerplate\
    \ text*, so I've used the variable name `boilerplate_text` to hold mine. You can\
    \ type any"
  mdcn: "## 检测操作系统\n\n如果你曾想编写一个在 Windows 和 macOS 上都能正确按下快捷键的应用程序，可以使用 `platform` 模块的\
    \ `.system` 方法来检测脚本运行的操作系统。你无需 `pip install` 该模块——只需将其导入脚本即可。例如，以下代码在 Windows\
    \ 上运行时使用 `Ctrl+键` 快捷键，在 macOS 上运行时使用 `Command+键` 快捷键。\n\n![](img/10d8e89b301a0e7452bff4d402265e78_160_0.png)\n\
    \n代码中将 macOS 称为 Darwin，是因为 `platform` 模块优先使用内核名称而非操作系统名称。macOS 是一个类 Unix 操作系统，其核心使用名为\
    \ Darwin 的内核来处理硬件与软件之间的交互。\n\n```python\nimport pyautogui\nimport platform\n\n\
    pyautogui.FAILSAFE = True\npyautogui.PAUSE = 0.1\n\n# 在 Mac 上选择、复制和粘贴文本。\nif platform.system()\
    \ == 'Darwin':\n    # 在当前文档中全选。\n    pyautogui.hotkey('command', 'a')\n    # 复制选中的文本。\n\
    \    pyautogui.hotkey('command', 'c')\n    # 移动到文档末尾。\n    pyautogui.hotkey('command',\
    \ 'down')\n    # 移动到下一行。\n    pyautogui.press('enter')\n    # 粘贴复制的文本。\n    pyautogui.hotkey('command',\
    \ 'v')\n# 在 Windows 上选择、复制和粘贴文本。\nelif platform.system() == 'Windows':\n    #\
    \ 在当前文档中全选。\n    pyautogui.hotkey('ctrl', 'a')\n    # 复制选中的文本。\n    pyautogui.hotkey('ctrl',\
    \ 'c')\n    # 移动到文档末尾。\n    pyautogui.hotkey('ctrl', 'end')\n    # 移动到下一行。\n \
    \   pyautogui.press('enter')\n    # 粘贴复制的文本。\n    pyautogui.hotkey('ctrl', 'v')\n\
    ```\n\nLinux 的快捷键通常与 Windows 相同。如果你想支持 Linux，只需将 `elif platform.system() == 'Windows':`\
    \ 改为 `else:` 即可同时覆盖 Windows 和 Linux。Linux 有多种图形界面，包括 GNOME、KDE Plasma、XFCE、Cinnamon\
    \ 等。你可能需要在你使用的图形界面上进行测试，以确保一切正常。\n\n## 检测按键\n\n在 VS Code 中运行 Python 脚本时，你可以按 Ctrl+C\
    \ 停止代码执行，但前提是 VS Code（或你使用的任何编辑器/终端）处于活动窗口。如果你使用 Python 自动化其他应用程序，你可能需要能够检测来自其他窗口的按键。`pynput`\
    \ 模块允许 Python 在操作系统层面检测按键。换句话说，`pynput` 可以检测来自启动 Python 脚本窗口以外的其他窗口的按键。\n\n`pynput`\
    \ 模块不属于标准库。在创建导入该模块的脚本之前，请确保已通过 `pip install pynput` 将其安装到你的虚拟环境中。\n\n与本章中使用的\
    \ PyAutoGUI 一样，你需要在 Mac 上启用辅助功能才能使 `pynput` 正常工作。详情请参阅本章前面的“在 Mac 上授予权限”。\n\n\
    为了说明 `pynput` 的工作原理，以下脚本将在用户按下 Escape 键（代码中为 `esc`）时，从 Linux、macOS 或 Windows 的任何打开窗口中停止当前运行的\
    \ Python 脚本：\n\n```python\n# listen_esc.py\n# 你必须 pip install pynput 才能使其工作。\n\
    from pynput import keyboard\nimport sys\n\ndef on_press(key):\n    # 检查是否按下了 Esc\
    \ 键。\n    if key == keyboard.Key.esc:\n        print(f'检测到 Esc 键！正在停止脚本...')\n\
    \        # 停止监听器并退出脚本\n        sys.exit(0)\n\n# 设置键盘监听器。\nprint(f'在任意窗口中按 Esc\
    \ 键以停止')\nwith keyboard.Listener(on_press=on_press) as listener:\n    listener.join()\n\
    ```\n\n注意名为 `on_press(key)` 的函数。每当上述脚本运行时，括号中的 `key` 参数会接收键盘上最后按下的键，无论你处于哪个窗口。当按下\
    \ Esc 时，`if key == keyboard.Key.esc` 这行代码为 True，因此该函数只需打印一些反馈信息，并使用 `sys.exit(0)`\
    \ 停止脚本执行。\n\n最复杂的代码可能是 `with keyboard.Listener(on_press=on_press)`，它创建了一个 `pynput`\
    \ 监听器，可以检测键盘上按下的每个键。`on_press=on_press` 部分表示每次按键时都调用名为 `on_press` 的函数。然后，按下的任何键都会作为\
    \ `key` 参数传递给该函数。\n\n`as listener` 部分只是将该键盘监听器命名为 `listener`。`listener.join()`\
    \ 通过暂时阻止 Python 脚本成为唯一监听按键的程序来激活监听器，以便监听器可以跨所有打开窗口全局监控按键。该监听器将一直有效，直到 `sys.exit(0)`\
    \ 终止 Python 脚本，这也会终止监听器。\n\n## 创建你自己的键盘快捷键\n\n如果你想创建可以从任何应用程序或窗口调用的自定义快捷键，可以使用前面描述的\
    \ `pynput` 来监听按键组合。尽量不要替换常用的快捷键，例如 Windows 或 Mac 上分别用于复制的 Ctrl+C 或 ⌘+C，否则当你调用\
    \ Python 脚本而不是执行快捷键的原始任务时，可能会变得非常混乱！\n\n如果你的快捷键操作针对特定应用程序，你可以询问人工智能（AI）你计划使用的快捷键在该应用程序中是否已有其他用途。\n\
    \n出于未知原因，`pynput` 并不总是能与 Microsoft Word 良好配合。如果你想为 Windows 创建快捷键，可以考虑改用 Word 中的宏。如果你不知道如何操作，只需询问任何\
