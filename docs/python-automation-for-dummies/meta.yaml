    \ Exception as e:\n        print(f\"Unexpected error: {e}\")\n\ndef main():\n\
    \    # Replace with the path to your video file.\n    video_path = r\"C:\\Users\\\
    Alan\\Documents\\Practice\\Extract Frames\\example.mp4\"\n    # Replace with the\
    \ desired interval in seconds.\n    interval = 10.0  # Interval in seconds\n\n\
    \    # Call the function to extract frames.\n    extract_frames(video_path, interval)\n\
    \nif __name__ == \"__main__\":\n    main()\n```\n\nLike our other scripts, this\
    \ one contains exception handling to exit the script gracefully with an error\
    \ message if the script doesn't have sufficient permissions to save images, or\
    \ some other unforeseen problem occurs.\n\nThe bulk of the work is handled by\
    \ the script named `extract_frames()`, defined in the following line:\n\n```python\n\
    def extract_frames(video_path, interval):\n```\n\nThe `video_path` parameter should\
    \ be the path to the video file from which you want to extract frames (not a folder).\
    \ The interval should be expressed in seconds, such as 0.5 to extract one frame\
    \ per half-second of video, or 10 to extract one frame every 10 seconds.\n\nVideos\
    \ protected by digital rights management (DRM) systems are encrypted to prevent\
    \ unauthorized access or copying. Attempting to open such a video with OpenCV\
    \ will likely generate an error, to protect the copyrighted material.\n\n## Importing\
    \ modules for video extraction\n\nThis script uses OpenCV (short for Open Source\
    \ Computer Vision Library), which is a free, open-source software library for\
    \ computer vision and image processing used across a variety of languages. The\
    \ import statement shows as simply `import cv2`. But that's misleading. For this\
    \ script to work, you'll need to create and activate your virtual environment.\
    \ Then use this command in the Terminal to import the OpenCV library for Python:\n\
    \n```\npip install opencv-python\n```\n\nWhen you run the script, extracted images\
    \ are stored in a subfolder in the same folder as the initial video. That subfolder's\
    \ name will be the same as the video's filename, without the filename extension\
    \ and with the word `_frames` appended. For example, if you extract frames from\
    \ a video named `example.mp4`, images will be in a subfolder named `example_frames`\
    \ as shown in Figure 6-1.\n\nThe code to open the video is:\n\n```python\ncap\
    \ = cv2.VideoCapture(video_path)\n```\n\nSubsequent code then gets the video's\
    \ frames per second (fps) from the video's properties and calculates a frame interval\
    \ for extractions using this code. The `saved_count` variable is initialized to\
    \ zero and is used to count saved frames, and ensure each has a unique filename\
    \ (for example, `0001.png`, `0002.png`, and so forth):\n\n```python\nfps = cap.get(cv2.CAP_PROP_FPS)\n\
    frame_interval = int(fps * interval)\n\nsaved_count = 0\n```\n\n## Looping through\
    \ a video\n\nThe main action for the frame extraction starts with a loop that\
    \ goes through each frame. The loop doesn't stop until it hits the end of the\
    \ video. That loop is defined by the following code:\n\n```python\nfor ret, frame\
    \ in iter(lambda: cap.read(), (False, None)):\n```\n\nThat's quite a mouthful\
    \ and not your typical for loop. The ret variable remains True each time the loop\
    \ reads a frame. When the loop reaches the end of the video, ret returns False\
    \ and ends the loop. The frame variable is the actual frame that was read.\n\n\
    The line that reads `lambda: cap.read()` keeps calling an anonymous function named\
    \ `read()`, as long as there are still frames to read. The `(False, None)` at\
    \ the end of that line causes the loop to stop when ret becomes False, and frame\
    \ becomes None, because there are no more frames in the video.\n\nAnonymous functions\
    \ are occasionally used in Python where functions are passed as arguments to simplify\
    \ syntax and make calls inline (within a line of other Python code).\n\nInside\
    \ the loop, the following if statement determines whether the current frame is\
    \ at the specified time interval:\n\n```python\nif cap.get(cv2.CAP_PROP_POS_FRAMES)\
    \ % frame_interval == 0:\n    saved_count += 1\n    frame_filename = output_path\
    \ / f\"frame_{saved_count:06d}.png\"\n```\n\nIf the condition is True, `saved_count`\
    \ is incremented, and the frame is given an output path and filename based on\
    \ that count.\n\nThe .png extension in the code saves each frame as a .png file.\
    \ You can change that to save in other formats, including .bmp, .jpeg, .jpg, .tif,\
    \ .tiff, and .webp.\n\nFinally, these two lines actually save the image file,\
    \ and also provide some feedback onscreen so you can see the progress as the script\
    \ is running:\n\n```python\ncv2.imwrite(str(frame_filename), frame)\nprint(f\"\
    Saved frame {saved_count:06d}\")\n```\n\nWhen the loop reaches the end of the\
    \ video, the following lines are executed.\n\n```python\n# Release resources\n\
    cap.release()\nprint(f\"Extracted {saved_count} frames to '{output_dir}'\\n\"\
    )\n```\n\nThe `cap.release()` closes the video stream and frees up resources being\
    \ used by the video. Then the `print()` statement shows a completion message onscreen."
