    \ and other files that don't support transparency. That third line is necessary\
    \ to avoid an error that would prevent the file from being converted. The transparent\
    \ color will be changed to white in the converted image.\n\n## ABOUT RGB, RGBA,\
    \ AND LA\n\nRGB (which stands for *Red, Green, Blue*), RGBA (which stands for\
    \ *Red, Green, Blue, Alpha*), and LA (which stands for *Luminance, Alpha*) are\
    \ *image modes* (sometimes called *color modes* or *color models*).\n\n- RGB supports\
    \ virtually any color, but it does not support transparency.\n- RGBA adds the\
