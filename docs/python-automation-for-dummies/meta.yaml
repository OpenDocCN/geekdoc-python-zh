  md: "Here's a script much like the first example — it calls a function named job()\
    \ every ten seconds, but it uses APScheduler rather than the simple schedule module:\n\
    \n```\n# basic_apscheduler.py\n# pip install apscheduler\nfrom apscheduler.schedulers.blocking\
    \ import BlockingScheduler\n\ndef job():\n    print(\"Task executed! Press Ctrl+C\
    \ in Terminal to stop the script.\")\n\nscheduler = BlockingScheduler()\nscheduler.add_job(job,\
    \ 'interval', seconds=10)\n\nif __name__ == '__main__':\n    try:\n        scheduler.start()\n\
    \    except (KeyboardInterrupt, SystemExit):\n        print(\"Scheduler stopped\"\
    )\n        scheduler.shutdown()\n```\n\nThis script uses `from apscheduler.schedulers.blocking\
    \ import BlockingScheduler` because APScheduler is actually a collection of modules\
    \ offering many capabilities. For basic scheduling, you need only the BlockingScheduler,\
    \ so importing just that one module is more efficient.\n\nLet's look at the script\
    \ in detail. The function named job() simply displays some text on the screen,\
    \ so we can verify the script is working when we test it. Then come these two\
    \ lines:\n\n```\nscheduler = BlockingScheduler()\nscheduler.add_job(job, 'interval',\
    \ seconds=10)\n```\n\nThe first line simply executes BlockingScheduler to create\
    \ an object named scheduler. Throughout the rest of the code, the name scheduler\
    \ refers to that instance of BlockingScheduler. After it's defined, you can schedule\
    \ jobs to run using syntax like the following:\n\n```\nscheduler.add_job(job,\
    \ 'interval', seconds=10)\n```\n\nIn that line of code, job refers to the job()\
    \ function, and 'interval' specifies that we want to schedule the job to run at\
    \ regular intervals. As you probably guessed, seconds=10 says to run the job every\
    \ ten seconds. That line of code doesn't actually get the process going — it just\
    \ defines what the schedule will be."
