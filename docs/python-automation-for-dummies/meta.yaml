- md: "## Handling Exceptions\n\nNo matter how good your code is, people using your\
    \ code can make errors that could potentially crash your script. For example,\
    \ perhaps your code asks the user for a number. But the user inputs a string instead.\
    \ Such a simple error could stop your script in its tracks and display some arcane\
    \ technical error message to your user.\n\nHandling errors that could cause your\
    \ script to crash is called *exception handling*. The technique allows your script\
    \ to keep running smoothly and hide any technical error messages from your user.\n\
    \nUse `try`, `except`, `else`, and `finally` keywords to handle exceptions in\
    \ your code. Here's the basic structure:\n\n- `try`: The block of code you want\
    \ to monitor for exceptions\n- `except`: The block that runs if a specific exception\
    \ occurs, specifying how to handle it\n- `else` (optional): Runs if no exception\
    \ occurs in the `try` block\n- `finally` (optional): Runs no matter what, whether\
    \ an exception occurred or not (useful for cleanup tasks)\n\nAlso related to exception\
    \ handling, but not limited to being inside a `try` block is the `raise` keyword,\
    \ which explicitly *raises* (triggers) an exception in your code. It allows you\
    \ to signal that an error or exception condition has occurred. You can raise built-in\
    \ exceptions or custom exceptions defined in your own code. Python has about 30\
    \ built-in exceptions, including the following:\n\n- `TypeError`: Raised when\
    \ an operation or function is applied to an object of inappropriate type (for\
    \ example, adding a string and an integer).\n- `ImportError`: Raised when an `import`\
    \ statement fails to find or load a module.\n- `ModuleNotFoundError`: Raised when\
    \ a module cannot be found (for example, `import nonexistent_module`).\n- `FileNotFoundError`:\
    \ Raised when a file or directory is requested but doesn't exist (for example,\
    \ `open(\"missing.txt\")`).\n- `PermissionError`: Raised when an operation lacks\
    \ sufficient permissions (for example, trying to write to a read-only file).\n\
    - `EOFError`: Raised when trying to read beyond the end of a file or input stream.\n\
    - `ValueError`: Raised when a function gets an argument of the right type but\
    \ an inappropriate value (for example, `int(\"abc\")`).\n- `Exception as e`: Catches\
    \ any exception and stores the exception object in a variable named `e`. Use `print(f\"\
    An error occurred: {e}\")` to display the error object text.\n\nCustom exceptions\
    \ are classes you create yourself using the `class` keyword and `(Exception)`.\
    \ The syntax for defining such a class is:\n\n```python\nclass Exceptionname(Exception):\n\
    ```\n\nReplace `Exceptionname` with a name of your own choosing (as long as it\
    \ doesn't match any of the existing built-in exception names). As with regular\
    \ classes, Python suggests using an initial uppercase letter in the class name\
    \ to identify the code as a class. The word `Exception` in parentheses means your\
    \ class will inherit the capabilities of all exceptions from the `Exception` class\
    \ that's built into the Python language.\n\nUsing exception handling in scripts\
    \ is a best practice for writing Python scripts. You'll see many examples throughout\
    \ the automation scripts in this book.\n\nThe following script asks the user to\
    \ enter two numbers. The `try` block checks for various errors and displays appropriate\
    \ error messages so that the script can keep running without crashing, regardless\
    \ of what the user enters.\n\n```python\n# Function to ask for two numbers, handle\
    \ exceptions, and divide.\ndef divide_numbers():\n    try:\n        # Get input\
    \ from user\n        num1 = input(\"Enter the first number: \")\n        num2\
    \ = input(\"Enter the second number: \")\n\n        # Convert user entries to\
    \ floats\n        number1 = float(num1)\n        number2 = float(num2)\n\n   \
    \     # Perform division\n        result = number1 / number2\n\n    # Handle exception\
    \ if user inputs non-numeric values.\n    except ValueError:\n        print(\"\
    Error: Please enter valid numbers\")\n        return None\n\n    # Handle exception\
    \ if second number is zero.\n    except ZeroDivisionError:\n        print(\"Error:\
    \ Cannot divide by zero\")\n        return None\n\n    # Handle any other exceptions\
    \ that may occur.\n    except Exception as e:\n        print(f\"Unexpected error\
    \ occurred: {str(e)}\")\n        return None\n\n    # This block executes only\
    \ if no exceptions occur.\n    else:\n        print(f\"The division was successful!\"\
    )\n        return result\n\n    # This block always executes, regardless of exceptions.\n\
    \    finally:\n        print(\"Calculation attempt completed\")\n\n# Main function\
    \ to run the division calculator function.\ndef main():\n    print(\"Welcome to\
    \ the Division Calculator!\")\n    result = divide_numbers()\n\n    if result\
    \ is not None:\n        print(f\"Result: {result}\")\n    print(\"Thank you for\
    \ using the calculator!\")\n\n# Call the main function to start the program.\n\
    if __name__ == \"__main__\":\n    main()\n```\n\nHere's how the script works:\n\
    \n- **try**: Contains the code that may raise exceptions. In this example, the\
    \ `try` block asks the user to enter two numbers. Then the code attempts to convert\
    \ whatever the user entered into two floating-point numbers and perform division\
    \ on them.\n- **except**: Handles specific exceptions that may occur:\n    - `ValueError`:\
    \ Raised if the user enters a value that can't be converted to a float (such as\
    \ a string).\n    - `ZeroDivisionError`: Raised if the second number is zero.\n\
    \    - `Exception`: Raised for any other unexpected error.\n- **else**: Executes\
    \ only if no exceptions occur. Prints a success message and returns a result.\n\
    - **finally**: Executes no matter what. Prints a completion message.\n\nThe script\
    \ contains a second function named `main()` that displays a welcome message and\
    \ then calls the `divide_numbers()` function. Whatever that function returns is\
    \ stored in a variable named `result`. If `result` is anything other than `None`,\
    \ that result is displayed. Then, no matter what, the script shows the text \"\
    Thank you for using the calculator!\"\n\nThe very last block calls the `main()`\
    \ function, which, in turn, runs the entire script.\n\nThroughout Python, you'll\
    \ see variable names and values that start and end with double underscores like\
    \ `__init__` and `__name__` and `__main__`. These are sometimes called *dunder\
    \ names* (dunder being short for *double underline*). They're built-in variable\
    \ names that have special meaning in Python. The common use of them is this statement,\
    \ shown near the end of the previous sample code:\n\n```python\nif __name__ ==\
    \ \"__main__\":\n```\n\n`__name__` is a special, built-in variable that automatically\
    \ gets its value when you run Python code. In a script that you run directly (for\
    \ example, using the Run Python File icon in VS Code or a `python` command followed\
    \ by the script's filename), the `__name__` variable gets the value `__main__`.\n\
    \nIn code that's imported into a script with an `import` statement, the `__name__`\
    \ variable gets the value of the imported module's name, never `__main__`. Using\
    \ `if __name__ == \"__main__\":` ensures that any code indented below the `if`\
    \ statement is executed only when that script is executed directly, not when it's\
    \ imported into another script that was run directly.\n\nThe last code example\
    \ in this chapter is typical in that it allows you to organize code into functions,\
    \ each of which performs a specific task and returns a value. Then it calls functions,\
    \ as needed at the end, but only if the current script was run directly and not\
    \ imported as a module via `import` statements."
  mdcn: "## 处理异常\n\n无论你的代码写得多么好，使用你代码的人仍可能犯错，这些错误有可能导致你的脚本崩溃。例如，也许你的代码要求用户输入一个数字，但用户却输入了一个字符串。这样一个简单的错误就可能让你的脚本戛然而止，并向用户显示一些晦涩的技术错误信息。\n\
    \n处理可能导致脚本崩溃的错误被称为*异常处理*。这项技术能让脚本持续平稳运行，并向用户隐藏任何技术错误信息。\n\n使用 `try`、`except`、`else`\
    \ 和 `finally` 关键字来处理代码中的异常。其基本结构如下：\n\n- `try`：你想要监控异常的代码块\n- `except`：当特定异常发生时运行的代码块，指定如何处理该异常\n\
    - `else`（可选）：如果 `try` 块中没有发生异常，则运行此块\n- `finally`（可选）：无论是否发生异常，此块都会运行（适用于清理任务）\n\
    \n与异常处理相关，但不仅限于在 `try` 块内部使用的还有 `raise` 关键字，它用于在代码中显式地*引发*（触发）一个异常。它允许你发出信号，表明发生了错误或异常情况。你可以引发内置异常或你自己代码中定义的自定义异常。Python\
    \ 有大约 30 个内置异常，包括以下几种：\n\n- `TypeError`：当操作或函数应用于不适当类型的对象时引发（例如，将字符串和整数相加）。\n\
    - `ImportError`：当 `import` 语句无法找到或加载模块时引发。\n- `ModuleNotFoundError`：当找不到模块时引发（例如，`import\
    \ nonexistent_module`）。\n- `FileNotFoundError`：当请求的文件或目录不存在时引发（例如，`open(\"missing.txt\"\
    )`）。\n- `PermissionError`：当操作缺乏足够权限时引发（例如，尝试写入只读文件）。\n- `EOFError`：当尝试读取超出文件或输入流末尾时引发。\n\
    - `ValueError`：当函数获得正确类型但值不合适的参数时引发（例如，`int(\"abc\")`）。\n- `Exception as e`：捕获任何异常，并将异常对象存储在名为\
    \ `e` 的变量中。使用 `print(f\"An error occurred: {e}\")` 来显示错误对象文本。\n\n自定义异常是你使用 `class`\
    \ 关键字和 `(Exception)` 自己创建的类。定义此类的语法是：\n\n```python\nclass Exceptionname(Exception):\n\
    ```\n\n将 `Exceptionname` 替换为你自己选择的名称（只要它不与任何现有的内置异常名称匹配）。与常规类一样，Python 建议在类名中使用首字母大写来标识代码为一个类。括号中的\
    \ `Exception` 一词意味着你的类将继承 Python 语言内置的 `Exception` 类的所有异常能力。\n\n在脚本中使用异常处理是编写\
    \ Python 脚本的最佳实践。你将在本书的自动化脚本中看到许多示例。\n\n以下脚本要求用户输入两个数字。`try` 块检查各种错误并显示适当的错误信息，以便无论用户输入什么，脚本都能继续运行而不会崩溃。\n\
    \n```python\n# 用于请求两个数字、处理异常并进行除法运算的函数。\ndef divide_numbers():\n    try:\n   \
    \     # 从用户获取输入\n        num1 = input(\"Enter the first number: \")\n        num2\
    \ = input(\"Enter the second number: \")\n\n        # 将用户输入转换为浮点数\n        number1\
    \ = float(num1)\n        number2 = float(num2)\n\n        # 执行除法\n        result\
    \ = number1 / number2\n\n    # 处理用户输入非数值时的异常。\n    except ValueError:\n      \
    \  print(\"Error: Please enter valid numbers\")\n        return None\n\n    #\
    \ 处理第二个数字为零时的异常。\n    except ZeroDivisionError:\n        print(\"Error: Cannot\
    \ divide by zero\")\n        return None\n\n    # 处理可能发生的任何其他异常。\n    except Exception\
    \ as e:\n        print(f\"Unexpected error occurred: {str(e)}\")\n        return\
    \ None\n\n    # 仅当没有异常发生时才执行此块。\n    else:\n        print(f\"The division was\
    \ successful!\")\n        return result\n\n    # 无论是否发生异常，此块都会执行。\n    finally:\n\
    \        print(\"Calculation attempt completed\")\n\n# 运行除法计算器函数的主函数。\ndef main():\n\
    \    print(\"Welcome to the Division Calculator!\")\n    result = divide_numbers()\n\
    \n    if result is not None:\n        print(f\"Result: {result}\")\n    print(\"\
    Thank you for using the calculator!\")\n\n# 调用主函数以启动程序。\nif __name__ == \"__main__\"\
    :\n    main()\n```\n\n以下是该脚本的工作原理：\n\n- **try**：包含可能引发异常的代码。在此示例中，`try` 块要求用户输入两个数字。然后代码尝试将用户输入的任何内容转换为两个浮点数并执行除法运算。\n\
    - **except**：处理可能发生的特定异常：\n    - `ValueError`：如果用户输入的值无法转换为浮点数（例如字符串），则引发此异常。\n\
    \    - `ZeroDivisionError`：如果第二个数字为零，则引发此异常。\n    - `Exception`：对于任何其他意外错误引发此异常。\n\
    - **else**：仅当没有异常发生时执行。打印成功消息并返回结果。\n- **finally**：无论是否发生异常都会执行。打印完成消息。\n\n该脚本包含第二个名为\
    \ `main()` 的函数，它显示欢迎消息，然后调用 `divide_numbers()` 函数。该函数返回的任何内容都存储在名为 `result` 的变量中。如果\
    \ `result` 不是 `None`，则显示该结果。然后，无论发生什么，脚本都会显示文本 \"Thank you for using the calculator!\"\
    。\n\n最后一个代码块调用 `main()` 函数，该函数进而运行整个脚本。\n\n在整个 Python 中，你会看到以双下划线开头和结尾的变量名和值，如\
    \ `__init__`、`__name__` 和 `__main__`。这些有时被称为 *dunder 名称*（dunder 是 *double underline*\
    \ 的缩写）。它们是内置变量名，在 Python 中具有特殊含义。它们的常见用法是以下语句，如前面示例代码末尾所示：\n\n```python\nif __name__\
    \ == \"__main__\":\n```\n\n`__name__` 是一个特殊的内置变量，当你运行 Python 代码时，它会自动获取其值。在你直接运行的脚本中（例如，使用\
    \ VS Code 中的运行 Python 文件图标或 `python` 命令后跟脚本文件名），`__name__` 变量会获得值 `__main__`。\n\
    \n在通过 `import` 语句导入到脚本中的代码中，`__name__` 变量会获得被导入模块的名称，永远不会是 `__main__`。使用 `if __name__\
    \ == \"__main__\":` 确保 `if` 语句下方缩进的任何代码仅在该脚本直接执行时运行，而不是在它被导入到另一个直接运行的脚本中时运行。\n\
    \n本章的最后一个代码示例是典型的，它允许你将代码组织成函数，每个函数执行特定任务并返回一个值。然后根据需要在末尾调用函数，但仅当当前脚本是直接运行而不是通过\
    \ `import` 语句作为模块导入时才执行。"
