    # Using arithmetic and string operators


    By far, the most-used operators are the arithmetic and string operators, shown
    in Table 3-3. These operators are used for addition, subtraction, multiplication,
    division, exponentiation, and string concatenation. The order shown in the table
    is also the order of operations, as defined in standard math. You may have learned
    it as PEMDAS (Parentheses, Exponents, Multiplication, Division, Addition, Subtraction)
    in school.'
