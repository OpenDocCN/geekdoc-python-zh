    \ second keeps the CPU freed up to do other tasks required by apps you may be\
    \ using at the time. So, the scheduler runs “in the background,” so to speak,\
    \ occasionally taking a peek into the queue to see if any scheduled tasks need\
    \ to run. But in the meantime, you can be doing other things with the computer\
    \ because the scheduler isn't hogging all the CPU time.\n\nOf course, in real\
    \ life, you probably don't want to really run the script “forever.” You may want\
    \ to stop it to work with the code. That's where the `try...except` comes in.\
    \ To stop the script, you can simply press Ctrl+C.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_274_0.png)\n\
