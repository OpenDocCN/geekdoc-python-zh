    # Dealing with Dates and Times


    Python doesn''t have a data type for working with dates and times, but it does
    have powerful built-in modules to help with them. The main built-in module is
    named `datetime`. To use it, include the following statement at the top of your
    script:


    ```

    from datetime import datetime

    ```


    ![](img/10d8e89b301a0e7452bff4d402265e78_56_0.png)


    Notice that the preceding code is `from datetime import datetime`, rather than
    just `import datetime`. That allows you to define a date without repeating `.datetime`
    in the variable assignment. Had I used `import datetime` as the first line of
    code, the second line would have needed to be `dt = datetime.datetime(2026, 11,
    28, 15, 30, 0)` in order to work. Not a big deal. But it''s a common syntax, so
    I used it here as an example.


    To get values from `datetime`, you typically follow `variablename =` with `datetime.`,
    followed by code specifying exactly what you want. For example, take a look at
    the following:


    ```

    from datetime import datetime

    current_time = datetime.now()

    print(current_time)

    ```


    Running that code produces output that looks something like this, but with the
    current date and time according to your computer''s internal clock:


    ```

    2025-04-12 10:10:51.644321

    ```


    To create your own dates and times, use the syntax `datetime.date(year, month,
    day)`. For example, this line stores 12/25/2026 in a variable named `my_date`:


    ```

    my_date = datetime.date(2026, 12, 25)  # Year, Month, Day

    ```


    To specify both a date and a time use the syntax `datetime.datetime(year, month,
    day, hour, minute)`. Use the 24-hour clock for the hour (for example, 15 for 3:00
    p.m.). Here''s an example where we''re setting a variable named `deadline` to
    November 30, 2026, at 3:30 p.m.:


    ```

    deadline = datetime.datetime(2026, 11, 30, 15, 30)

    ```'
