  md: '# Creating a virtual environment


    The command to create a virtual environment is, technically, `python -m venv`
    followed by a name for the virtual environment. But, of course, that `python`
    command may fail, so you''ll have to use the `py` alias in Windows or the `python3`
    alias in Linux or macOS to get it to work.


