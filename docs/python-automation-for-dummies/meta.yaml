    \n在Python中，`SyntaxError`通常是代码中的拼写错误。`SyntaxError`不是你想捕获的异常。相反，你需要在每个`SyntaxError`发生时修复它。通常，VS\
    \ Code会显示一条红色波浪线或其他标记，以指示错误在代码中的位置。错误信息本身可能提供额外信息。\n\n这是一个简单的函数，乍一看可能完全合法：\n\n\
    ```\ndef calculate_sum(a, b)\n    result = a + b\n    return result\n```\n\n当你运行包含该函数的代码时，你会得到一条错误信息，内容为“SyntaxError:\
    \ expected ':'”。Python语法要求以`def`开头的行必须以冒号（`:`）结尾，而示例函数缺少了这个冒号。这里的修正方法很简单，只需在需要的地方添加冒号，如下所示：\n\
    \n```\ndef calculate_sum(a, b):\n    result = a + b\n    return result\n```\n\n\
    这是另一个错误可能不那么明显的例子：\n\n```\ndef greet(name):\n    message = \"Hello, \" + name\
    \ +\n    return message\n```\n\n运行该代码会产生错误“SyntaxError: invalid syntax”。VS Code还告诉我错误在第2行，并在该行末尾显示一条红色波浪线。这里的问题是最后一个+没有将任何内容附加到字符串上，因此应该删除最后一个+。修正后的代码如下：\n\
    \n```\ndef greet(name):\n    message = \"Hello, \" + name\n    return message\n\
    ```\n\n![](img/10d8e89b301a0e7452bff4d402265e78_346_0.png)\n\nVS Code通常会在可能包含SyntaxError的错误代码附近显示一条红色波浪线。将鼠标指针悬停在该波浪线上会提供有关错误的一些信息。然后，你可以点击错误文本附近的“快速修复”（如果可用）来获取帮助以解决问题。\n\
    \n### NameError\n\n在Python中，当你通过名称调用某个东西（函数、变量或其他任何东西），但该名称不存在时，就会发生NameError。看看以下代码：\n\
    \n```\ndef sum_nums(numlist):\n    return sum(numlist)\n\nif __name__ == \"__main__\"\
    :\n    numlist = [34, 7, -5, 22.4]\n    result = sumnums(numlist)\n    print(result)\n\
    ```\n\n运行该代码会显示一条错误信息：\n\n```\nNameError: name 'sumnums' is not defined. Did you\
    \ mean: 'sum_nums'?\n```\n\n错误在于第一行将函数名定义为sum_nums（带下划线）。随后的代码result = sumnums(numlist)试图调用sumnums（无下划线），因此该名称无法识别。解决方法很简单，只需使用其定义的名称调用函数：result\
    \ = sum_nums(numlist)。\n\n![](img/10d8e89b301a0e7452bff4d402265e78_346_1.png)\n\
    \n在Python中，名称区分大小写。调用函数时，请确保使用与创建函数时在def语句中使用的大写/小写字母相同。\n\n### TypeError\n\n\
    在Python中，当你尝试对某个数据类型执行不支持的操作时，就会发生`TypeError`。可以将其理解为Python在说：“我不知道如何用这些类型的值来做这件事！”这是你刚开始学习Python时最常遇到的错误之一。\n\
    \n混淆字符串和数字是最常见的`TypeError`错误之一。这里有一个简单的例子：\n\n```\n# 导致TypeError的代码\nx = \"5\"\
    \ny = 10\nresult = x + y\n```\n\n运行该代码会产生以下错误：\n\n```\nTypeError: can only concatenate\
    \ str (not \"int\") to str\n```\n\n这里的问题是变量`x`被定义为字符串（因为它被引号括起来）。Python不允许你将字符串与数字连接。你必须将`x`和`y`都设为数字（通过去掉5周围的引号）或将它们都设为字符串，例如\"\
    5\"和\"10\"。\n\n这是另一个`TypeError`的例子：\n\n```\nextended_price= 98.99\nprint (len(extended_price))\n\
    ```\n\n此代码的错误信息是`TypeError: object of type 'float' has no len()`。变量`extended_price`是`float`数据类型，因为它的值是一个带小数点的数字，没有用引号括起来。`len()`函数返回字符串的长度，如果你试图获取数字的长度，就会导致错误。\n\
    \n如果你打算在运行代码时允许用户输入自己的数据，你可以在`try...except`块中同时使用`TypeError`和`ValueError`来捕获这两种类型的错误。（`ValueError`是正确的数据类型，但值错误，例如当期望正数时输入了负数。）以下代码展示了一个用户可以输入总销售价格和税率的示例。然后代码调用一个名为`total_with_tax`的函数将销售税加到总额中，但请注意末尾附近的`try...except`块，用于在出现`ValueError`和`TypeError`异常时捕获它们："
