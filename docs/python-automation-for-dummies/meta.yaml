  md: '# Automating Python Scripts


    If you’re running large Python scripts on a schedule, the thought of putting all
    the code from each script into a function may concern you. If you prefer to keep
    each task in its own script (its own .py file), you can still use the same techniques
    as I outline earlier to set up your schedule. Then just have each function run
    an external script.


    To illustrate how it works, let’s assume I have three scripts named script01.py,
    script02.py, and script03.py. Of course, you have as few, or as many, scripts
    as you like. Exactly what each script does isn’t important. All that matters for
    this example is that each script does something that’s useful for you when you
    run it.


    There are two ways to run external scripts on a schedule. You can use the subprocess
    module, which I show you first, or you can import the scripts, which I show you
    later in this section.


    # Running scripts as subprocesses


    The subprocess module, which is part of the Python standard library, is a great
    tool for running code outside of a Python script. In addition to external .py
    files, subprocess can run shell scripts (.bat, .cmd, and .sh files) and executables
    (.exe in Windows).


    ![](img/10d8e89b301a0e7452bff4d402265e78_282_0.png)


    The subprocess module can run virtually any external code, though on a Mac you
    may need to grant permission. Refer to the subprocess documentation at https://docs.python.org/3/library/subprocess.html
    for details. Or ask any AI for help with the specific file type you intend to
    run with subprocess.


    The easiest way to run multiple scripts is still to create a function for each
    job. But instead of having the function contain all the code to perform the task,
    the function just calls the script by its filename (and path, if the script isn’t
    in the same folder as the scheduler script).


    Here’s an example where the scheduler runs three scripts named script01.py, script02.py,
    and script03.py, each on its own script, using code similar to the last example
    in the previous section.


    ```

    # multi_scripts.py

    # pip install apschedule

    from apscheduler.schedulers.blocking import BlockingScheduler

    import subprocess

    ```'
