    ## 使用循环\n\n循环在所有编程语言中都很常见。它们用于多次重复一行或多行代码。你可以使用它们一次访问列表中的项目、驱动器上的文件夹或文件夹中的文件。Python\
    \ 提供了两种主要类型的循环：`for` 循环和 `while` 循环。\n\n## 使用 for 循环\n\n`for` 循环在计数或有已知数量的项目需要迭代时很有用。循环为序列中的每个项目执行一段代码块。语法如下：\n\
    \n```\nfor variable in sequence:\n    # Code to repeat\n```\n\n将 `variable` 替换为你选择的变量名。此值在循环的每次迭代中计数。将\
