  md: '# Writing and Running Python Scripts


    The goal of everything we''ve done so far is to set things up to create a Python
    app or script. The word *app* is short for *application*, and it typically refers
    to larger commercial apps requiring dozens of files of code. In Python, it''s
    common to refer to single-file apps as *scripts*. Most automation projects in
    this book only require one file of code, so I use the word *script* more than
    *app*. But regardless of whether you call it a script or an app, each one requires
    its own workspace folder and virtual environment.


    In this section, I show you how to write and run a Python script.


    # Writing a Python script


    Now it''s time to write your first Python script. If you''ve been following along,
    you have the `First Python` workspace folder open in VS Code, and your `.venv`
    virtual environment is activated. You''re ready to create your first script. Each
    script is just a file within the workspace root folder. That file must have a
    `.py` extension. The filename itself should follow the same rules as Python variable
    names. In short:


    +   >> Use all lowercase letters.

    >> Use a lowercase letter (not a number or underscore) for the first character.

    >> Use an underscore (_) instead of a space.

    >> Don''t use any special characters (for example, !, @, #, -, and so on).

    >> Don''t use names of built-in modules (for example, sys, os, math, random, datetime,
    io, and so on).

    >> Make the name as descriptive as possible and always use the .py extension.


    Table 2-1 shows examples of good and bad filenames, where the third column indicates
    what''s wrong in the bad example.


    TABLE 2-1 Good and Bad Python Filenames

    | Good Filename | Bad Filename | Why It''s Bad |

    | :--- | :--- | :--- |

    | main.py | Main.py | It has an uppercase letter. |

    | calculate_stats.py | math.py | It has the same name as a built-in module. |

    | file_reader.py | File Reader.py | It has uppercase letters and a space. |

    | process_images.py | 9images.py | It starts with a number. |'
