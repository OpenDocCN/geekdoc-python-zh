- md: "## Opening a project's folder in VS Code\n\nWhether you're starting a new project,\
    \ or returning to an existing project you've already started, the first step will\
    \ be to open the project folder in VS Code.\n\n> If you're using Windows, you\
    \ may be able to right-click the folder's icon and choose Open With VS Code or\
    \ Show More Options > Open with Code to open VS Code and the folder simultaneously.\n\
    \nRegardless of what operating system you're using, you can follow these steps\
    \ to open your project folder in VS Code:\n\n1. **Open VS Code.**\n2. **Near the\
    \ top of the Activity Bar at the left, click Explorer.**\n3. **Click Open Folder.**\n\
    4. **Navigate to the folder's parent directory, click the folder's icon, and click\
    \ Open.**\n5. **If you see a message about trusting the folder, choose Yes, I\
    \ Trust the Authors (because you are the author!).**\n\nThe Explorer pane remains\
    \ open. The name of the folder you opened appears near the top of that pane (see\
    \ Figure 2-5). That folder is the project's *root folder*, also known as the *workspace\
    \ folder* in VS Code. All the subfolders and files that make up your project will\
    \ be contained within that workspace folder.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_32_0.png)\n\
    \nFIGURE 2-5: A project folder open in the Explorer pane.\n\n> Clicking the root\
    \ folder name in VS Code expands and collapses it to show or hide files in that\
    \ folder. Usually, you want it expanded to see subfolders and files contained\
    \ within your project.\n\n## Selecting your Python version\n\nBefore you start\
    \ doing any actual work with Python, it's a good idea to know what version of\
    \ Python (if any) is currently active. So, the first thing you may want to do\
    \ after opening a folder in VS Code is follow these steps:\n\n1. **From the VS\
    \ Code menu bar, choose View > Command Palette.**\n   If you prefer, press Ctrl+Shift+P\
    \ in Windows or ⌘+Shift+P in macOS. Pressing F1 may also work.\n2. **Type sel\
    \ and click Python: Select Python Interpreter from the drop-down menu, as shown\
    \ in Figure 2-6.**\n3. **Click the Recommended Python interpreter, as shown in\
    \ Figure 2-7, if you have multiple versions from which to choose.**\n\nYou won't\
    \ see anything on the screen indicating which Python interpreter you've chosen,\
    \ but don't worry: I show you how to determine that, using the Terminal, in the\
    \ next section.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_33_0.png)\n\nFIGURE\
    \ 2-6: Selecting a Python interpreter.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_33_1.png)\n\
    \nFIGURE 2-7: Choose the Recommended Python interpreter.\n\nIn this chapter, I\
    \ had you select the Recommended interpreter in case you're just getting started\
    \ with Python and just want to use the latest Python version. In practice, some\
    \ projects require specific Python versions, so VS Code lets you pick one each\
    \ time you start it. You won't need this for this book, but I'm mentioning it\
    \ because choosing a specific version helps advanced developers.\n\n## Opening\
    \ the Terminal in VS Code\n\nMuch of the time when working with Python, you'll\
    \ use the Terminal pane. The Terminal provides a *command line interface* (CLI)\
    \ for entering commands from the keyboard. You can open the Terminal from the\
    \ menu, or shortcut keys, as follows:\n\n- Choose View > Terminal from the menu\
    \ bar.\n- Press F1, or press Ctrl+` in Windows or Command+` in macOS. ` is the\
    \ backtick character, usually to the left of the number 1 on the keyboard.\n\n\
    The Terminal opens near the bottom of the VS Code window, looking something like\
    \ Figure 2-8 (in Windows). The PS and path you see are the *command prompt*, where\
    \ you type your commands.\n\n22 PART 1 Getting Started with Python Automation\n\
    \n![](img/10d8e89b301a0e7452bff4d402265e78_34_0.png)\n\nIn Linux and macOS, the\
    \ command prompt will be different, but don't worry about that right now. I explain\
    \ more after we activate a virtual environment a little later in this chapter.\
    \ However, it's worth noting that you're not stuck with whatever happens to be\
    \ showing as your default command line shell. You can use the drop-down arrow\
    \ next to the current shell name to choose a different command line shell if you\
    \ like.\n\nYou always want to know what Python version you're using in VS Code,\
    \ and the Terminal lets you find out, as I explain in the next section.\n\n##\
    \ Checking your Python version\n\nTo see what Python version you're currently\
    \ using, you can enter either the command `python --version` or `python -V` (the\
    \ case matters here). But until you've set up a virtual environment (see the next\
    \ section), that command may give you an error message. The trick to get around\
    \ that may seem strange, but here it is:\n\n- In Windows, use `py` rather than\
    \ `python` at the command.\n- In Linux or macOS, use `python3` rather than `python`\
    \ as the command.\n\nThe reason for this weirdness has to do with the operating\
    \ system PATH that determines how system commands (which are run from the operating\
    \ system) have been treated in the past, and the fact that different projects\
    \ may require different Python versions. Both `py` and `python3` are *aliases*\
    \ for the python command and will use whatever python version is currently available.\
    \ In VS Code, that's the Python version you chose when choosing Python: Select\
    \ Python Interpreter from the command palette (see \"Selecting your Python version,\"\
    \ earlier in this chapter).\n\nPython code is case-sensitive, meaning you can't\
    \ use uppercase and lowercase letters interchangeably. You must use the same uppercase\
    \ and lowercase letters shown in this book for things to work as described in\
    \ this book.\n\nWhen VS Code tells you it doesn't recognize `python` as a command,\
    \ you can still determine your Python version using the following:\n\n- In Windows,\
    \ enter the command `py --version` or `py -V` to determine your Python version.\n\
    - In Linux or macOS, enter the command `python3 --version` or `python3 -V` to\
    \ determine your Python version.\n\nAfter you type the appropriate command and\
    \ press Enter, the current Python version will show just under the command you\
    \ typed, as shown in Figure 2-9.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_35_0.png)\n\
    \nAfter you've set up and activated a virtual environment, the `python` command\
    \ will work as expected. Let's get started on the whole business of virtual environments\
    \ now.\n\n## Using Virtual Environments\n\nEvery Python script or app should live\
    \ in its own folder (its *workspace folder*) for organization and portability.\
    \ Each one also needs its own virtual environment, specifying the Python version\
    \ and module dependencies, to run correctly. This setup lets you execute the script\
    \ on any computer — Linux, macOS, Windows — regardless of the system's Python\
    \ version or installed modules.\n\nAt first, the process of creating a virtual\
    \ environment may seem like a bit of a pain. But you get used to it, and the advantages\
    \ are well worth the tiny effort it takes to create and activate a virtual environment.\n\
    \n## Creating a virtual environment\n\nThe command to create a virtual environment\
    \ is, technically, `python -m venv` followed by a name for the virtual environment.\
    \ But, of course, that `python` command may fail, so you'll have to use the `py`\
    \ alias in Windows or the `python3` alias in Linux or macOS to get it to work.\n\
    \nThe `-m` is a *flag* that tells Python to run a module named `venv` as a script,\
    \ rather than as a module (which is something we normally add to existing scripts\
    \ rather than run directly). That name, `venv` is short for *virtual environment*.\n\
    \nYou also need to give the virtual environment a name. The virtual environment\
    \ is stored in a subfolder under the workspace folder name. You can name your\
    \ virtual environment anything you like, but `.venv` is a common name. That `.venv`\
    \ name offers several advantages over some name you choose at random:\n\n- The\
    \ dot in `.venv` signals to other developers that the folder contains configuration\
    \ or utility information and is not part of the actual Python code.\n- Many modern\
    \ editors like VS Code and PyCharm recognize `.venv` as a virtual environment\
    \ and auto-detect it for Python interpreter selection, reducing setup steps.\n\
    - On Unix-like systems (Linux, macOS), files and folders starting with a dot are\
    \ hidden unless the user specifically knows how to look for them. That prevents\
    \ less experienced users from messing about in the `.venv` folder without knowing\
    \ what they're doing.\n\nIn short, you can think of using `.venv` as the virtual\
    \ environment folder name a \"best practice,\" and the consistency will make it\
    \ easier to recognize its purpose at a glance.\n\nTo create a virtual environment\
    \ named `.venv`, open the VS Code Terminal and enter the appropriate command:\n\
    \n- **Windows:** `py -m venv .venv`\n- **Linux or macOS:** `python3 -m venv .venv`\n\
    \nYou won't get any feedback in the Terminal after you press Enter. But if you\
    \ look at the Explorer pane, you'll probably see the `.venv` folder icon under\
    \ the root of your workspace folder, `First Python` in our working example. You\
    \ may also see the message shown in Figure 2-10 pop up in the lower-right corner\
    \ of VS Code."
  mdcn: "## 在 VS Code 中打开项目文件夹\n\n无论你是开始一个新项目，还是返回一个已开始的现有项目，第一步都是在 VS Code 中打开项目文件夹。\n\
    \n> 如果你使用的是 Windows，你可能可以右键单击文件夹图标，然后选择“通过 VS Code 打开”或“显示更多选项” > “通过 Code 打开”，以同时打开\
    \ VS Code 和该文件夹。\n\n无论你使用什么操作系统，都可以按照以下步骤在 VS Code 中打开你的项目文件夹：\n\n1.  **打开 VS\
    \ Code。**\n2.  **在左侧活动栏顶部附近，单击“资源管理器”。**\n3.  **单击“打开文件夹”。**\n4.  **导航到该文件夹的父目录，单击该文件夹的图标，然后单击“打开”。**\n\
    5.  **如果你看到一条关于信任该文件夹的消息，请选择“是的，我信任作者”（因为你自己就是作者！）。**\n\n资源管理器窗格将保持打开状态。你打开的文件夹名称会显示在该窗格的顶部附近（参见图\
    \ 2-5）。该文件夹就是项目的*根文件夹*，在 VS Code 中也称为*工作区文件夹*。构成你项目的所有子文件夹和文件都将包含在此工作区文件夹中。\n\n\
    ![](img/10d8e89b301a0e7452bff4d402265e78_32_0.png)\n\n图 2-5：在资源管理器窗格中打开的项目文件夹。\n\
    \n> 在 VS Code 中单击根文件夹名称可以展开和折叠它，以显示或隐藏该文件夹中的文件。通常，你需要将其展开以查看项目中包含的子文件夹和文件。\n\n\
    ## 选择你的 Python 版本\n\n在开始使用 Python 进行任何实际工作之前，最好先了解当前激活的是哪个版本的 Python（如果有的话）。因此，在\
    \ VS Code 中打开文件夹后，你可能想做的第一件事是按照以下步骤操作：\n\n1.  **从 VS Code 菜单栏中，选择“视图” > “命令面板”。**\n\
    \    如果你愿意，可以在 Windows 中按 Ctrl+Shift+P，或在 macOS 中按 ⌘+Shift+P。按 F1 也可能有效。\n2. \
    \ **输入 `sel`，然后从下拉菜单中单击“Python: 选择 Python 解释器”，如图 2-6 所示。**\n3.  **如果你有多个版本可供选择，请单击“推荐的\
    \ Python 解释器”，如图 2-7 所示。**\n\n屏幕上不会显示任何内容来指示你选择了哪个 Python 解释器，但不用担心：我将在下一节中向你展示如何使用终端来确定这一点。\n\
    \n![](img/10d8e89b301a0e7452bff4d402265e78_33_0.png)\n\n图 2-6：选择 Python 解释器。\n\
    \n![](img/10d8e89b301a0e7452bff4d402265e78_33_1.png)\n\n图 2-7：选择推荐的 Python 解释器。\n\
    \n在本章中，我让你选择推荐的解释器，以防你刚开始使用 Python 并且只想使用最新的 Python 版本。在实践中，一些项目需要特定的 Python 版本，因此\
    \ VS Code 允许你在每次启动时选择一个。本书不需要这个，但我提到它是因为选择特定版本有助于高级开发者。\n\n## 在 VS Code 中打开终端\n\
    \n使用 Python 时，大部分时间你会使用终端窗格。终端提供了一个*命令行界面* (CLI)，用于通过键盘输入命令。你可以通过菜单或快捷键打开终端，如下所示：\n\
    \n- 从菜单栏中选择“视图” > “终端”。\n- 按 F1，或在 Windows 中按 Ctrl+`，或在 macOS 中按 Command+`。` 是反引号字符，通常在键盘上数字\
    \ 1 的左侧。\n\n终端在 VS Code 窗口底部附近打开，看起来类似于图 2-8（在 Windows 中）。你看到的 PS 和路径是*命令提示符*，你可以在其中输入命令。\n\
    \n22 第 1 部分 Python 自动化入门\n\n![](img/10d8e89b301a0e7452bff4d402265e78_34_0.png)\n\
    \n在 Linux 和 macOS 中，命令提示符会有所不同，但现在不用担心这个。我将在本章稍后激活虚拟环境后进行更多解释。然而，值得注意的是，你并不局限于当前显示的默认命令行\
    \ shell。如果你愿意，可以使用当前 shell 名称旁边的下拉箭头来选择不同的命令行 shell。\n\n你总是想知道在 VS Code 中使用的是哪个\
    \ Python 版本，而终端可以让你找出答案，正如我在下一节中解释的那样。\n\n## 检查你的 Python 版本\n\n要查看你当前使用的 Python\
    \ 版本，可以输入命令 `python --version` 或 `python -V`（这里大小写很重要）。但在你设置虚拟环境之前（参见下一节），该命令可能会给你一条错误消息。解决这个问题的技巧可能看起来很奇怪，但方法如下：\n\
    \n- 在 Windows 中，在命令中使用 `py` 而不是 `python`。\n- 在 Linux 或 macOS 中，使用 `python3` 而不是\
    \ `python` 作为命令。\n\n这种奇怪现象的原因与操作系统 PATH 有关，它决定了过去如何处理系统命令（从操作系统运行的命令），以及不同项目可能需要不同\
    \ Python 版本的事实。`py` 和 `python3` 都是 python 命令的*别名*，将使用当前可用的任何 python 版本。在 VS Code\
    \ 中，这就是你在命令面板中选择“Python: 选择 Python 解释器”时选择的 Python 版本（参见本章前面的“选择你的 Python 版本”）。\n\
    \nPython 代码区分大小写，这意味着你不能互换使用大写和小写字母。你必须使用本书中显示的相同大小写字母，才能使事情按本书所述的方式工作。\n\n当 VS\
    \ Code 告诉你它无法识别 `python` 作为命令时，你仍然可以使用以下方法确定你的 Python 版本：\n\n- 在 Windows 中，输入命令\
    \ `py --version` 或 `py -V` 来确定你的 Python 版本。\n- 在 Linux 或 macOS 中，输入命令 `python3\
    \ --version` 或 `python3 -V` 来确定你的 Python 版本。\n\n在你输入适当的命令并按 Enter 后，当前的 Python\
    \ 版本将显示在你输入的命令下方，如图 2-9 所示。\n\n![](img/10d8e89b301a0e7452bff4d402265e78_35_0.png)\n\
    \n在你设置并激活虚拟环境后，`python` 命令将按预期工作。现在让我们开始处理虚拟环境的整个过程。\n\n## 使用虚拟环境\n\n每个 Python\
    \ 脚本或应用程序都应该位于自己的文件夹（其*工作区文件夹*）中，以便于组织和可移植性。每个脚本还需要自己的虚拟环境，指定 Python 版本和模块依赖项，才能正确运行。这种设置允许你在任何计算机（Linux、macOS、Windows）上执行脚本，无论系统的\
    \ Python 版本或已安装的模块如何。\n\n起初，创建虚拟环境的过程可能看起来有点麻烦。但你会习惯的，而且创建和激活虚拟环境所带来的好处完全值得付出这点微小的努力。\n\
    \n## 创建虚拟环境\n\n从技术上讲，创建虚拟环境的命令是 `python -m venv`，后跟虚拟环境的名称。但是，当然，那个 `python` 命令可能会失败，所以你必须在\
    \ Windows 中使用 `py` 别名，或在 Linux 或 macOS 中使用 `python3` 别名才能使其工作。\n\n`-m` 是一个*标志*，它告诉\
    \ Python 将名为 `venv` 的模块作为脚本运行，而不是作为模块（我们通常将其添加到现有脚本中而不是直接运行）。名称 `venv` 是 *virtual\
    \ environment*（虚拟环境）的缩写。\n\n你还需要给虚拟环境一个名称。虚拟环境存储在工作区文件夹名称下的一个子文件夹中。你可以将你的虚拟环境命名为任何你喜欢的名字，但\
    \ `.venv` 是一个常见的名字。与你随机选择的某个名字相比，`.venv` 这个名字有几个优点：\n\n- `.venv` 中的点号向其他开发人员发出信号，表明该文件夹包含配置或实用程序信息，而不是实际\
    \ Python 代码的一部分。\n- 许多现代编辑器，如 VS Code 和 PyCharm，将 `.venv` 识别为虚拟环境，并自动检测它以进行 Python\
    \ 解释器选择，从而减少设置步骤。\n- 在类 Unix 系统（Linux、macOS）上，以点开头的文件和文件夹是隐藏的，除非用户特别知道如何查找它们。这可以防止经验不足的用户在不知道自己在做什么的情况下弄乱\
    \ `.venv` 文件夹。\n\n简而言之，你可以将使用 `.venv` 作为虚拟环境文件夹名称视为一种“最佳实践”，这种一致性将使你一眼就能更容易地识别其用途。\n\
    \n要创建一个名为 `.venv` 的虚拟环境，请打开 VS Code 终端并输入适当的命令：\n\n- **Windows：** `py -m venv\
    \ .venv`\n- **Linux 或 macOS：** `python3 -m venv .venv`\n\n按 Enter 后，你不会在终端中得到任何反馈。但如果你查看资源管理器窗格，你可能会在你的工作区文件夹根目录下看到\
    \ `.venv` 文件夹图标，在我们的工作示例中是 `First Python`。你也可能会看到图 2-10 所示的消息在 VS Code 的右下角弹出。"
