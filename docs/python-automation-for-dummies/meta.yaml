    , \"\", \"Grape\"]\n# 打印水果列表。\nfor fruit in fruits:\n    if fruit==\"\":\n   \
    \     continue\n    print(fruit)\nprint(\"All Done\")\n```\n\n与 `break` 不同，这段代码跳过了打印空字符串，但在退出前继续处理列表中的其余项目。因此，输出如下：\n\
    \n```\nApple\nBanana\nGrape\nAll Done\n```\n\n`else` 关键字不会阻止循环执行。相反，如果 `for` 循环遍历了所有项目并且没有遇到\
    \ `break`，那么 `else` 块中的代码就会运行。如果循环因 `break` 而提前退出，则 `else` 块会被跳过。这对于想要确认循环已完全完成，或在搜索序列后处理“未找到”情况的场景非常有用。\n\
    \n```\nnumbers = [1, 2, 3, 4, 5]\ntarget = 6\nfor num in numbers:\n    if num\
