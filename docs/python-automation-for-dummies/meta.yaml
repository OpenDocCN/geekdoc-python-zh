    \ \"minor\"\nprint(status)\n```\n\n## Deciding with match\n\nPython version 3.10\
    \ added the `match` statement as another way to handle decision-making when there\
    \ are multiple possibilities. The `match` statement is a block of code that starts\
    \ with `match` followed by a variable name. Below that are generally two or more\
    \ indented `case` statements followed by values and a colon. Indented below each\
    \ `case` statement is one or more lines of code that execute only if the value\
    \ in the `case` statement matches the value of the variable.\n\nAt the bottom\
    \ of the `match` block you can use `case _:` — the underscore represents a *wildcard*\
    \ that matches anything that wasn't already covered in a previous case. It's like\
    \ an `else` that executes only if none of the previous case statements proved\
    \ true.\n\nThe following code shows a relatively simple example in which the `day`\
    \ variable contains a number between zero and six:\n\n```\n# Define a variable\
    \ named day and assign it number 0-6.\nday = 6\n\nmatch day:\n    case 1:\n  \
    \      print(\"Monday\")\n    case 2:\n        print(\"Tuesday\")\n    case 3:\n\
    \        print(\"Wednesday\")\n    case 4:\n        print(\"Thursday\")\n    case\
    \ 5:\n        print(\"Friday\")\n    # The following case executes only if no\
    \ previous case proved true.\n    case _:\n        print(\"Weekend\")\n```\n\n\
    You can use comparison and logical operators from Table 3-5 to set up more complex\
    \ conditions. For more compact code, use the Bitwise ampersand (&) for and and\
    \ the Bitwise pipe (|) for or.\n\nThe following code shows an example where the\
    \ first `case` statement proves `True` if the `day` variable contains a weekday\
    \ (Monday, Tuesday, Wednesday, Thursday, or Friday). The second `case` statement\
    \ proves `True` if the `day` variable contains Saturday or Sunday. The wildcard\
    \ `case` statement with the underscore (`_`) proves `True` if no previous `case`\
    \ statement proved `True`. The `day.lower()` expression makes the day name all\
    \ lowercase to match the letters in the `case` statements.\n\n```\n# Assign a\
    \ day name (string) to the day variable.\nday = \"Tuesday\"\n# Make a decision\
    \ based on the day value converted to lowercase.\nmatch day.lower():\n    # The\
    \ pipe operator (|) represents \"or.\"\n    case \"monday\" | \"tuesday\" | \"\
    wednesday\" | \"thursday\" | \"friday\":\n        print(\"Weekday\")\n    case\
    \ \"saturday\" | \"sunday\":\n        print(\"Weekend\")\n    case _:\n      \
    \  print(\"I don't recognize that day\")\n# Any code from this point on is outside\
    \ the match block.\n```\n\n## Defining Python Functions\n\nMuch of the Python\
    \ code you encounter will be organized into Python functions. Functions are a\
    \ fundamental tool in programming, allowing you to write reusable, organized,\
    \ and efficient code. A *function* is a block of code that performs a specific\
    \ task and can be reused whenever needed. Think of it like a recipe: You define\
    \ the steps once, and then you can use it anytime without rewriting everything.\n\
    \nIn Python, functions are defined using the `def` keyword. Here's the basic structure:\n\
    \n```\ndef function_name(parameters):\n    # Code block (what the function does)\n\
    \    return result  # Optional: Returns a value\n```\n\nThe word `def` is short\
    \ for *define*, and it tells Python to treat the following code as a function.\
    \ The code isn't executed immediately. Instead, other code in the script can call\
    \ the function at any time to execute its code.\n\nThe *function_name* part is\
    \ a name you make up. Use lowercase letters and underscores instead of spaces.\
    \ The name should describe what the function does, such as `calculate_area` or\
    \ `authenticate_user`.\n\nThe *parameters* are optional and are names of variables\
    \ that can receive data when the function is called.\n\nThe `return` statement\
    \ marks the end of the function. The *result* is optional; it's the name of a\
    \ variable that contains any data sent back to the code that called the function.\
    \ If you omit *result*, the function returns `None`).\n\nAs with other blocks\
    \ of code, indentations are critical. All code that's part of the function, including\
    \ the `return` statement, must be indented below the initial definition `def`\
    \ statement.\n\nSubsequent code in your script can *call* the function by name\
    \ followed by parentheses.\n\nMost functions accept one or more parameters as\
    \ input. Code within the function then performs some operation on that input and\
    \ returns a single value as the result. Here's an example where a function named\
    \ `calculate_area` accepts two values: `width` and `height` (presumably of a rectangle).\
    \ Code inside the function then multiplies `width` and `height` to calculate the\
    \ area of the rectangle and stores it in a variable named `area`. The value of\
    \ `area` is then returned to the calling code in the last line, `return area`.\n\
    \n```\n# A function to calculate and return the area of a rectangle\ndef calculate_area(width,\
    \ height):\n    area = width * height\n    return area\n```\n\nAfter it's defined,\
    \ subsequent code can call the function, pass values into its parameters, and\
    \ store the result in a variable. The following code calls the `calculate_area`\
    \ function, passing in the values `5` and `10`, and then storing the result in\
    \ a variable named `rectangle_area`.\n\n```\n# Calling the calculate area function.\n\
    side_a = 5\nside_b = 10\nrectangle_area = calculate_area(side_a, side_b)\n```\n\
    \nFunctions are used heavily in most Python code, because they allow a large script\
    \ to be broken down into smaller, more manageable chunks.\n\n## Defining default\
    \ values for parameters\n\nYou can define default values for parameters. The default\
    \ is used if you call the function without providing a value for a parameter.\
    \ Here's an example where the default value for a variable is set to the string\
    \ \"friend\":\n\n```\ndef greet(name=\"friend\"):\n    greeting = \"Hi, \" + name\n\
    \    return greeting\n```\n\nHere's an example of calling the function, and providing\
    \ the value \"John\" for the parameter:\n\n```\nprint(greet(\"John\"))\n```\n\n\
    The result of executing that code is:\n\n```\nHi, John.\n```\n\nHere's an example\
    \ where I don't pass in anything for the parameter. Note that you still have to\
    \ include the parentheses as in greet(). You just don't put anything inside the\
    \ parentheses:\n\n```\nprint(greet())\n```\n\nThat code displays:\n\n```\nHi,\
    \ friend\n```\n\nThe default value is used in place of the missing parameter value.\n\
    \n## Using type hints in Python functions\n\nPython also allows you to use type\
    \ hints in function definitions. These are mainly informative to people reading\
    \ the code to understand what to pass into the function or what the function returns.\
    \ Use a colon followed by a type name inside the parameter list to indicate a\
    \ data type for parameters. Use an arrow (formed by typing a hyphen and a tight\
    \ angle bracket) to indicate the data type of what the function returns.\n\nFor\
    \ example, in the following function, `quantity` is expected to be an integer,\
    \ and `unit_price` is a floating-point number. The function returns a floating-point\
    \ number:\n\n```\ndef calculate_total(quantity: int, unit_price: float) -> float:\n\
    \    return quantity * unit_price\n```\n\nTo keep large apps organized and easy\
    \ to understand, it's best for each function to perform a single task and return\
    \ only one value or no value at all. You'll see many examples throughout this\
    \ book. The main point being: Keep functions simple to make even the largest apps\
    \ into collections of relatively simple chunks of code.\n\n## Creating Classes\
    \ and Objects\n\nFunctions are one way to organize code. Classes are another.\
    \ In coding we use classes to manage objects. An `object` is a unit of information\
    \ about one item. For example, an object representing a user of an app may include\
    \ data about that user's username (`user_name`), email address (`email_address`),\
    \ enrollment date (`date_enrolled`), login status (`is_logged_in`), and other\
    \ information. Keeping all that information associated with the user as a single\
    \ object makes it easier to keep track of and manage the user data.\n\nA `class`\
    \ is a chunk of code that allows you to create objects. For example, to have user\
    \ objects in your app, you'd define a `User` class that defines exactly what data\
    \ is associated with each user. The class also allows you to create user objects.\
    \ The class can also contain methods, which are like functions, but designed specifically\
    \ for use with user objects.\n\nOrganizing code into classes is sometimes called\
    \ object-oriented programming (OOP). You may have already heard that term in relation\
    \ to other programming languages such as Java.\n\nClasses in Python are defined\
    \ using the `class` keyword. Unlike variables, the name of a class usually starts\
    \ with an uppercase letter. A class is like a factory used to create objects.\
    \ Within a class, you define a `constructor`, which lets you define which variables,\
    \ called `instance variables` (or `properties`), to associate with each object.\
    \ You can define functions inside a class. However, these functions are accessible\
    \ only to objects that you create using the class; they're called `methods` to\
    \ distinguish them from regular functions.\n\nHere's a sample class named `User`\
    \ that says each user will have a `user_name`, `email_address`, and `date_joined`.\
    \ The class contains one method, which, when"
