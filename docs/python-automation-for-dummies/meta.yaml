    # Making the script your own


    As written, the `post_to_x.py` script posts one line of text at a time from a
    file named `questions.txt`. Make sure that file is in the same folder as your
    script and that each line contains one question. To avoid duplication, the script
    removes the question from the file right after posting. Keep an eye on that file
    and replenish it with new questions from time to time to keep your content fresh.


    If you prefer to name your file something other than `questions.txt`, make sure
    you change the following line of code in the `main()` function to your chosen
    filename:


    ```

    content_filename = "questions.txt"

    ```


    As written, the script posts once every four hours, as long as the script is running
    and there are questions in the `questions.txt` file.


    > Posting too quickly can cause X''s bot police to disable your account. Be sure
    to limit your script to posting 10 or 15 posts an hour.


    # Creating Content for Your Posts


    If you''re having trouble coming up with things to write about for your social
    media, consider the fact that you can always use AI to generate posts for you.
    You can generate posts on any topic, using any AI chatbot, and store them in a
    file similar to `questions.txt` to post them automatically using the same code.
    There''s really no need to write a Python script to generate such content — it''s
    probably faster and easier to just do it interactively.


    For example, browse to ChatGPT (https://chatgpt.com), Grok (https://x.ai), or
    the website of any other chatbot. Type your prompt in a way that specifies what
    you want your posts to be about and how many posts you want. Use wording like
    that shown in Figure 13-2 so the text is easily copied to a text file.


