  - "[PAGE 127]\n\nThe decompression script works like others in this chapter in terms\
    \ or walking through folders and files. The main work takes place in a function\
    \ named `decompress_files()`, which accepts two parameters: `directory_path` (the\
    \ path to the directory that contain files to unzip), and `recursive` (a Boolean\
    \ that should be set to `True` if you want to decompress files in subdirectories\
    \ or `False` to skip subdirectories).\n\n```\ndef decompress_files(directory_path,\
    \ recursive):\n```\n\nAs usual, there's lots of exception handling to exit the\
    \ script gracefully if unexpected errors occur. In the following sections, I focus\
    \ on what's unique to this script.\n\n# Unzipping files with Python\n\nThe main\
    \ meat of this script is in this code:\n\n```\n# Open and extract zip file\nwith\
    \ zipfile.ZipFile(path, \"r\") as zipf:\n    # Check if zip file is valid\n  \
    \  if zipf.testzip() is not None:\n        print(f\"Warning: {path.name} appears\
    \ to be corrupted\")\n        continue\n\n    # Extract all contents\n    zipf.extractall(output_dir)\n\
    ```\n\nThe line that reads `with zipfile.ZipFile(path, \"r\") as zipf` opens the\
    \ file at `path` as a Zip archive in read mode (\"r\"). That `path` file will\
    \ always point to a Zip file because of the way `pathutil` is walking the current\
    \ directory. The `as zipf` just provides the simple name `zipf` that subsequent\
    \ code can use to refer to the open Zip file.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_127_0.png)\n\
    \nNext, the `.testzip()` method runs a quick check on the file to ensure it's\
    \ not corrupted. That method returns `None` if there are no problems with the\
    \ file. If `.testzip()` returns anything other than `None`, that indicates a corrupted\
    \ file, and the script won't attempt to decompress the file. Instead, it prints\
    \ an error message.\n\nAssuming everything has gone well so far, the next code\
    \ runs and the file is decompressed using the `.extractall()` method of `zipfile`\
    \ in this one line of code:\n\n```\nzipf.extractall(output_dir)\n```"
