    5.  **选择“允许远程自动化”复选框，如图 10-1 所示。**\n\n![](img/10d8e89b301a0e7452bff4d402265e78_210_0.png)\n\
    \n6.  **关闭对话框。**\n7.  **关闭 Safari。**\n\n启用远程自动化后，你应该能够运行脚本来打开 Safari，导航到 www.google.com，并保持浏览器窗口打开，直到你在\
    \ VS Code 的终端窗口中按 Enter 键结束脚本。\n\n## 查找要填写的文本框\n\n在网页上，像文本框这样的控件是使用超文本标记语言（HTML）中的标签定义的，如表\
