    \ `if...else`, ternary operator, and a `match` (as of version 3.10 of Python).\
    \ You'll mostly use comparison and logical operators (refer to Table 3-5) to define\
    \ a condition that evaluates to either `True` or `False`.\n\n# Deciding with if.\
    \ . .else\n\nThe most common way to make decisions in Python is the `if...else`\
    \ block of code. Indentation is critical in these blocks. Code that's indented\
    \ under an `if` statement executes only when the `if` condition proves true. Code\
    \ indented under an `else` statement executes only when the `if` condition proves\
    \ false.\n\nLet's start with a simple example where a variable named `age` receives\
    \ some numeric value. In the code below, the `if` statement prints one thing if\
