    \ fix each `SyntaxError` as it occurs. Often, VS Code will show a wavy red underline\
    \ or other marker to show that the error is located in the code. The error message\
    \ itself may provide additional information.\n\nHere's a simple function that,\
    \ at first glance, may seem perfectly legitimate:\n\n```\ndef calculate_sum(a,\
    \ b)\n    result = a + b\n    return result\n```\n\nWhen you run the code that\
    \ contains that function, you'll get an error message that reads \"SyntaxError:\
    \ expected ':'\". Python syntax requires that you end a line that starts with\
    \ `def` with a colon (`:`), and the sample function is missing that. The correction\
    \ here is to simply add the colon where it's required, as shown here:\n\n```\n\
    def calculate_sum(a, b):\n    result = a + b\n    return result\n```\n\nHere's\
    \ another example where the error may not be apparent at first glance:\n\n```\n\
    def greet(name):\n    message = \"Hello, \" + name +\n    return message\n```"
