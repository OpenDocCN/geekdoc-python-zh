    \n## 使用赋值运算符\n\n使用 Python 赋值运算符为变量赋值。之前，我提供了使用 `=` 运算符为变量赋值的示例。例如，`user_name =\
    \ \"Sarah\"` 将字符串值 Sarah 赋给名为 `user_name` 的变量。表 3-4 显示了赋值运算符。在示例列中，分号分隔两行独立的代码。结果列显示了执行这两行代码的结果。\n\
