    # Chapter 17

    Top Ten Python Error Messages


    When it comes to tech creativity, error messages are just a fact of life, especially
    when you''re first learning Python and programming. Error messages appear onscreen
    to alert you when something is wrong. They''re usually good at pinpointing the
    problem, but not so good at telling you what to do about it.


    This chapter presents the ten most common Python error messages and what to do
    to fix the problem and get back on track. Of course, you can also get help from
    artificial intelligence (AI). When asking AI about a problem with your code, include
    the code that''s giving you problems in your prompt. Often AI can spot and fix
    the error quite quickly.


    # Command Not Found


    When you''re first learning Python, you may often see the following error message
    in VS Code''s Terminal:


    ```

    command not found: python

    ```'
