    \nNotice that the preceding code is `from datetime import datetime`, rather than\
    \ just `import datetime`. That allows you to define a date without repeating `.datetime`\
    \ in the variable assignment. Had I used `import datetime` as the first line of\
    \ code, the second line would have needed to be `dt = datetime.datetime(2026,\
    \ 11, 28, 15, 30, 0)` in order to work. Not a big deal. But it's a common syntax,\
