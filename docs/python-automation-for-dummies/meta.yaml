  md: '+   IN THIS CHAPTER


    * Automating with the schedule and APScheduler modules

    * Running scripts as subprocesses and imports


    # Chapter 14

    Scheduling Tasks


    Python is well-suited to scheduling tasks to run at specific dates and times,
    as well as at regular intervals. You can schedule system tasks like backups and
    logging. You can also schedule internet-related tasks like web scraping, email,
    and social media posting.


    In this chapter, you learn about two libraries that are particularly well-suited
    to scheduling: schedule and APScheduler. First, I show you the features of each.
    Then I provide specific examples of how to use them to schedule Python automation
    tasks.


    # Using the Schedule Module


    A popular module used for scheduling is aptly named schedule. The schedule module
    isn''t part of the Python standard library. So, if you intend to use it in a script,
    make sure to create and activate your virtual environment and enter this command
    at the command prompt in the Terminal:


    ```

    pip install schedule

    ```


    You can use the schedule library to run tasks at specific times or at regular
    intervals. A simple way to get started is to write some simple scripts that just
    print some feedback in the Terminal, on schedule, so you know that your code works.'
  merge: -1
  pgno: 272
- img_proc: true
  md: "Here's a simple script that just displays some feedback in the Terminal every\
    \ ten seconds, to show you the basic syntax and structure of such a script:\n\n\
    ```\n# basic_schedule.py\n# pip install schedule\nimport schedule\nimport time\n\
    \n# Function to be scheduled\ndef job():\n    print(\"Task executed! Press Ctrl+C\
    \ in Terminal to stop the script.\")\n\n# Schedule the job every ten seconds.\n\
    schedule.every(10).seconds.do(job)\n\n# Main loop to run scheduled tasks with\
    \ keyboard interrupt handling\ntry:\n    while True:\n        schedule.run_pending()\n\
    \        time.sleep(1)  # Prevent high CPU usage.\nexcept KeyboardInterrupt:\n\
    \    print(\"\\nScript terminated by user.\")\n```\n\nThe first function in the\
    \ script, `job()`, displays some text on the screen when called. For testing and\
    \ feedback purposes. When you run the script, you'll see that message appear every\
    \ ten seconds. This is the line of code that sets up the scheduler to call the\
    \ `job()` function every ten seconds:\n\n```\nschedule.every(10).seconds.do(job)\n\
    ```\n\nNotice that when I'm using the `schedule` module, I refer to the function\
    \ as `job` without the parentheses — in other words, `job` rather than `job()`.\
    \ It may seem counterintuitive, because we usually call functions with those parentheses\
    \ in the names. But in this syntax, I'm not calling on the function to return\
    \ a value immediately — I'm simply telling the scheduler the name of the function\
    \ to call when it starts running.\n\nBelow the line that defines the scheduled\
    \ interval is a peculiar `while True` loop, inside an exception handler. You may\
    \ be thinking that because `True` is always true, that loop will run forever.\
    \ You're correct, and that's what we want in this case. Without the loop, the\
    \ script would just end before the first ten seconds were up, and the script would\
    \ do nothing. I explain why next."
  merge: -1
  pgno: 273
- img_proc: true
  md: "# Understanding how the schedule module works\n\nThe line `schedule.every(10).seconds.do(job)`\
    \ never actually runs the job. Instead, every ten seconds, it updates the scheduled\
    \ job list (or *queue* as it's sometimes called) to say, “Please run the job when\
    \ you get a chance.” That prevents the scheduled task from trying to run when\
    \ the central processing unit (CPU) is busy doing something else.\n\nTo actually\
    \ run scheduled tasks that are ready to go, use the following line of code:\n\n\
    ```\nschedule.run_pending()\n```\n\nSo, it really takes two lines of code to run\
    \ scheduled tasks: one to set up the schedule, which simply lets the computer\
    \ know that the task is to be run at its earliest convenience, and the second\
    \ to actually run tasks that are waiting in the queue.\n\nNow let's look at the\
    \ entire loop for running scheduled tasks, along with the exception handler:\n\
    \n```\n# Main loop to run scheduled tasks with keyboard interrupt handling\ntry:\n\
