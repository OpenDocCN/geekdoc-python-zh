    # ModuleNotFoundError


    The `ModuleNotFoundError` happens when you try to import a module that doesn’t
    exist, either because you misspelled the filename or because the module isn’t
    part of the Python standard library and you haven’t yet installed the module to
    the active virtual environment. This error can also happen when a filename in
    the VS Code Explorer pane is the same as a module name, but with a `.py` extension.
    For example, maybe you’re trying to use `matplotlib` as a module, but you have
    a file named `matplotlib.py` in the current folders.


    The simplest example could be a misspelling or case error. For example:


    ```

    python

    import OS

    ```


    That one line of code can fail because you need to spell the name with all lower-case
    letters, as in:


    ```

    python

    import os

    ```


    Here’s another example where the code looks perfectly fine, but it generates a
    `ModuleNotFoundError`:


    ```

    python

    import requests

    ```


    Here the problem is likely that `requests` isn’t part of the Python standard library.
    The `requests` module needs to be installed before you use it in your code. If
    you haven’t already done so, you should create a virtual environment. Activate
    your virtual environment, and then enter the command `pip install requests` to
    bring that module into the virtual environment.


    If you’ve created a virtual environment in the past, activate the virtual environment,
    and then enter the command `pip list` in the Terminal. If you don’t see `requests`
    listed in the results, `pip install requests` into the active virtual environment.'
