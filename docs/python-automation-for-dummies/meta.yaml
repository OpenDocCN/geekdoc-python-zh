    \ `duplicates` 列表中。\n\n```python\nif file_hash in file_hashes:\n    duplicates.append(file)\n\
    ```\n\n换句话说，如果该文件与之前已计算哈希值的文件相同（因为它们的哈希摘要相同），那么该重复文件的路径就会被添加到重复文件列表中。因此，重复文件列表最终包含的是其他文件的重复文件的路径。它可能看起来像这样：\n\
