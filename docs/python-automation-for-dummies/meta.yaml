    \ a super simple example where a script just asks for two numbers and then returns\
    \ the result of the first number divided by the second number:\n\n```\n# Bad example:\
    \ Ignoring errors\nnumber1 = float(input(\"Enter the first number: \"))\nnumber2\
    \ = float(input(\"Enter the second number: \"))\nresult = number1 / number2  #\
    \ This crashes if number2 is 0.\nprint(f\"Result: {result}\")\n```\n\nThe script\
    \ works fine, as long as the user enters two valid numbers and the second number\
    \ isn’t zero — but that’s not the Pythonic way. There are two possible error conditions\
    \ here: The user doesn’t enter two valid numbers, or the user enters a zero for\
    \ the divisor number. Here’s the same code with exception handling added to gracefully\
    \ handle both kinds of errors:\n\n```\ntry:\n    number1 = float(input(\"Enter\
    \ the first number: \"))\n    number2 = float(input(\"Enter the second number:\
    \ \"))\n```"
  - "[PAGE 341]\n\n```\nresult = number1 / number2\nprint(f\"Result: {result}\")\n\
    except ZeroDivisionError:\n    print(\"Error: You cannot divide by zero!\")\n\
    except ValueError:\n    print(\"Error: Please enter valid numbers!\")\n```\n\n\
    Catching and explaining each potential error prevents the script from crashing\
    \ with an obscure error message.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_341_0.png)\n\
    \nChapter 17 covers many common Python errors and includes examples of using exception\
    \ handling to manage those errors.\n\nLet's look at another example. Here's some\
    \ code to open a file named sample_data.csv (in the same folder as the script).\
    \ It does not handle potential errors.\n\n```\n# Bad example: Ignoring errors\n\
    file_name = \"sample_data.csv\"\nwith open(file_name, 'r') as file:\n    content\
    \ = file.read()\nprint(content)\n```\n\nThis script, like any script that accesses\
    \ external files, is prone to problems where the file doesn't exist at the specified\
    \ location, or the script needs to write something to a file but doesn't have\
    \ sufficient permissions from the operating system. Adding some basic exception\
    \ handling to the script solves both problems, informing the user exactly what\
    \ will happen if the script is unable to perform its task:\n\n```\ntry:\n    file_name\
    \ = \"sample_data.csv\"\n    with open(file_name, 'r') as file:\n        content\
    \ = file.read()\n    print(content)\nexcept FileNotFoundError:\n    print(f\"\
    Error: The file '{file_name}' was not found!\")\nexcept PermissionError:\n   \
    \ print(\"Error: You don't have permission to read this file!\")\n```\n\nIf you're\
    \ a beginning programmer, take some time to learn about exception handling, and\
    \ especially the more common exceptions. Chapter 3 describes the basics of exception\
    \ handling. Chapter 17 lists the ten most common error messages and includes examples\
    \ of using exception handling to prevent such errors from crashing your code."
- md: "## Chapter 17\n### Top Ten Python Error Messages\n\nWhen it comes to tech creativity,\
    \ error messages are just a fact of life, especially when you're first learning\
    \ Python and programming. Error messages appear onscreen to alert you when something\
    \ is wrong. They're usually good at pinpointing the problem, but not so good at\
    \ telling you what to do about it.\n\nThis chapter presents the ten most common\
    \ Python error messages and what to do to fix the problem and get back on track.\
    \ Of course, you can also get help from artificial intelligence (AI). When asking\
    \ AI about a problem with your code, include the code that's giving you problems\
    \ in your prompt. Often AI can spot and fix the error quite quickly.\n\n### Command\
    \ Not Found\n\nWhen you're first learning Python, you may often see the following\
    \ error message in VS Code's Terminal:\n\n```\ncommand not found: python\n```\n\
    \nThis message is unnerving when you’re intending to write Python code. But keep\
    \ in mind that VS Code is a generic code editor, not tied to any one programming\
    \ language and not tied to any specific version of Python.\n\nWhen you first open\
    \ VS Code, in Windows, you can use `py` as a stand-in for the `python` command;\
    \ use `python3` on macOS. For example, in the VS Code Terminal, entering the command\
    \ `py -V` on Windows or `python3 -V` on macOS will reveal the current Python version.\n\
    \nTo select a Python version choose View: Command Palette. If you don’t see the\
    \ option to select an interpreter, type **sel** and then click Python: Select\
    \ Interpreter. Then click whichever Python version displays as Recommended (unless\
    \ you regularly work with multiple Python versions and have good reason to choose\
    \ some older version of Python).\n\nUsing the `python` command directly at the\
    \ command line in VS Code won’t work until you activate a virtual environment.\
    \ If you’ve already created one, its folder name will be visible in VS Code’s\
    \ Explorer pane (see Figure 17–1). You don’t need to create another virtual environment\
    \ if the current project already has one.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_343_0.png)\n\
    \nIf you haven’t yet created a virtual environment, create one. In Windows you\
    \ can enter the following command:\n\n```\nbash\npy -m venv .venv\n```\n\nIn Linux\
    \ or macOS, use the following:\n\n```\nbash\npython3 -m venv .venv\n```\n\nAfter\
    \ the virtual environment is created, make sure to activate it. In Windows, enter\
    \ the following command in the Terminal:\n\n```\n.venv\\scripts\\activate\n```\n\
    \nIn Linux or macOS, enter this command:\n\n```\nsource .venv/bin/activate\n```\n\
    \nBoth of these activation examples assume the virtual environment folder is named\
    \ .venv. If you've named yours differently, use your name in place of .venv in\
    \ your own command. If it still doesn't work in Windows, try using activate.ps1\
    \ rather than activate at the end of the command.\n\nAfter it's activated, the\
    \ name of the virtual environment (.venv in this example) will show as part of\
    \ the command line in VS Code. VS Code will now recognize python as a recognized\
    \ command, and it will use whatever Python version is associated with that virtual\
    \ environment. So, on either macOS or Windows, you can enter the following command\
    \ in the Terminal to determine your working Python version (make sure to use an\
    \ uppercase letter V):\n\n```\npython -V\n```\n\nYou can also get the current\
    \ Python version using the following command (all lowercase):\n\n```\npython --version\n\
    ```\n\n### No Module Named . . .\n\nIf you run a Python script and see this error\
    \ message, it usually means you're trying to import a module that isn't part of\
    \ the Python standard library and isn't available in your virtual environment.\n\
    \nIf you already have a virtual environment for your project, activate it (.venv/scripts/activate\
    \ on Windows, source .venv/bin/activate on macOS). Then try running the script\
    \ again. If it still fails, most likely you never used pip install to install\
    \ the module to your virtual environment. You can pip install it into your active\
    \ virtual environment, if you want, and that should resolve the problem.\n\nIf\
    \ you've never created a virtual environment for your project, you should do so\
    \ first. Then activate that environment, and `pip install` any dependencies you'll\
    \ need that aren't part of the Python standard library.\n\n> If you're not sure\
    \ about a module, you can always ask AI about it, including whether you need to\
    \ `pip install` it and how to write the `import` statement in your code.\n\n>\
    \ A related error, `ModuleNotFoundError`, is covered later in this chapter. You\
    \ may want to look at that section for clues as well.\n\n### SyntaxError\n\nIn\
    \ Python, a `SyntaxError` is typically a typographical error in your code. A `SyntaxError`\
    \ isn't an exception that you want to catch. Instead, you need to fix each `SyntaxError`\
    \ as it occurs. Often, VS Code will show a wavy red underline or other marker\
    \ to show that the error is located in the code. The error message itself may\
    \ provide additional information.\n\nHere's a simple function that, at first glance,\
    \ may seem perfectly legitimate:\n\n```\ndef calculate_sum(a, b)\n    result =\
    \ a + b\n    return result\n```\n\nWhen you run the code that contains that function,\
    \ you'll get an error message that reads \"SyntaxError: expected ':'\". Python\
    \ syntax requires that you end a line that starts with `def` with a colon (`:`),\
    \ and the sample function is missing that. The correction here is to simply add\
    \ the colon where it's required, as shown here:\n\n```\ndef calculate_sum(a, b):\n\
    \    result = a + b\n    return result\n```\n\nHere's another example where the\
    \ error may not be apparent at first glance:\n\n```\ndef greet(name):\n    message\
    \ = \"Hello, \" + name +\n    return message\n```\n\nRunning that code produces\
    \ the error \"SyntaxError: invalid syntax\". VS Code also tells me that the error\
    \ is in line 2, and it shows a wavy red line at the end of that line. The problem\
    \ here is that the last + isn't appending anything to the string, so that last\
    \ + should be removed. The corrected code is simply as follows:\n\n```\ndef greet(name):\n\
    \    message = \"Hello, \" + name\n    return message\n```\n\n![](img/10d8e89b301a0e7452bff4d402265e78_346_0.png)\n\
    \nVS Code usually shows a red wavy line near bad code that may contain a SyntaxError.\
    \ Touching the mouse pointer to that wavy line provides some information about\
    \ the error. You can then click Quick Fix (if available) near the error text to\
    \ get help fixing the problem.\n\n### NameError\n\nIn Python, a NameError occurs\
    \ when you call something (a function, a variable, or whatever) by name, but that\
    \ name doesn't exist. Take a look at the following code:\n\n```\ndef sum_nums(numlist):\n\
    \    return sum(numlist)\n\nif __name__ == \"__main__\":\n    numlist = [34, 7,\
    \ -5, 22.4]\n    result = sumnums(numlist)\n    print(result)\n```\n\nRunning\
    \ that code displays an error message that reads:\n\n```\nNameError: name 'sumnums'\
    \ is not defined. Did you mean: 'sum_nums'?\n```\n\nThe error is that the first\
    \ line defines the function name as sum_nums (with an underscore). The subsequent\
    \ code result = sumnums(numlist) attempts to call sumnums (no underscore), so\
    \ that name isn't recognized. The solution is to simply call the function by its\
    \ defined name, result = sum_nums(numlist).\n\n![](img/10d8e89b301a0e7452bff4d402265e78_346_1.png)\n\
    \nNames are case-sensitive in Python. When calling a function, make sure to use\
    \ the same uppercase/lowercase letters you used in the def statement when creating\
    \ the function.\n\n### TypeError\n\nIn Python, a `TypeError` occurs when you try\
    \ to perform an operation on a data type that isn't supported for that operation.\
    \ Think of it as Python saying, “I don't know how to do this with these types\
    \ of values!” It's one of the most common errors you'll encounter when first learning\
    \ Python.\n\nConfusing strings and numbers are one of the most common `TypeError`\
    \ mistakes. Here's a simple example:\n\n```\n# Code that causes TypeError\nx =\
    \ \"5\"\ny = 10\nresult = x + y\n```\n\nRunning that code produces the following\
    \ error:\n\n```\nTypeError: can only concatenate str (not \"int\") to str\n```\n\
    \nThe problem here is that the `x` variable is defined as a string (because it's\
    \ enclosed in quotation marks). Python doesn't allow you to join a string to a\
    \ number. You would either have to make both `x` and `y` numbers (by removing\
    \ the quotation marks around 5) or make them both strings, as in \"5\" and \"\
    10\".\n\nHere's another example of a `TypeError`:\n\n```\nextended_price= 98.99\n\
    print (len(extended_price))\n```\n\nThe error message for this code is `TypeError:\
    \ object of type 'float' has no len()`. The variable `extended_price` is the `float`\
    \ data type, because its value is a number with a decimal point, not enclosed\
    \ in quotation marks. The `len()` function returns the length of a string and\
    \ causes an error if you try to get the length of a number.\n\nIf you're going\
    \ to allow users to put in their own data while running your code, you can use\
    \ both `TypeError` and `ValueError` in a `try...except` block to catch either\
    \ type of error. (A `ValueError` is the correct data type, but a bad value, such\
    \ as a negative number when a positive number is expected.) The following code\
    \ shows an example where the user can input a total sale price and tax rate. The\
    \ code then calls a function named `total_with_tax` to add sales tax to the total,\
    \ but notice the `try...except` block near the end, to catch both `ValueError`\
    \ and `TypeError` exceptions if they arise:"
  mdcn: "## 第17章\n### 十大Python错误信息\n\n谈到技术创造力，错误信息是生活中不可避免的一部分，尤其是在你刚开始学习Python和编程时。错误信息会出现在屏幕上，提醒你出了问题。它们通常能准确指出问题所在，但在告诉你如何解决方面却不太擅长。\n\
    \n本章介绍了十种最常见的Python错误信息，以及如何修复问题并重回正轨。当然，你也可以向人工智能（AI）寻求帮助。当向AI询问代码问题时，请在提示中包含有问题的代码。通常，AI能相当快速地发现并修复错误。\n\
    \n### 命令未找到\n\n当你刚开始学习Python时，可能会经常在VS Code的终端中看到以下错误信息：\n\n```\ncommand not found:\
    \ python\n```\n\n当你打算编写Python代码时，这条信息会让人不安。但请记住，VS Code是一个通用的代码编辑器，不绑定任何特定的编程语言，也不绑定任何特定版本的Python。\n\
    \n首次打开VS Code时，在Windows系统中，你可以使用`py`作为`python`命令的替代；在macOS系统中则使用`python3`。例如，在VS\
