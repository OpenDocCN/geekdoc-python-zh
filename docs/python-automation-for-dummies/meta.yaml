    Operators that have the same order of operations are executed left to right in
    an expression. The + operator, when used with strings, simply joins the strings
    into one string. For example, in the following example, the user_name variable
    contains Sarah. That''s then joined to the string "Hello, " (which includes a
    space at the end), to form a new string named Greeting that contains Hello, Sarah.


    ```

    # Combining strings with the + operator

    user_name = "Sarah"

    greeting = "Hello, " + user_name

    print(greeting)

    ```


    People sometimes use Please Excuse My Dear Aunt Sally (PEMDAS) as a mnemonic for
    memorizing order of operations. PEMDAS stands for parentheses, exponents, multiplication,
    division, addition, subtraction, which is the order in which operations should
    be performed.


