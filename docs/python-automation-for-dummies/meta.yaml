    \    click_submit = False\n```\n\nI show you how to write a script that clicks\
    \ Submit to submit a form later in this chapter. That’s more likely to happen\
    \ on pages with multiple input controls, so I’ll start by looking at a script\
    \ that fills multiple text boxes.\n\n# Filling Multiple Text Boxes\n\nLet’s talk\
