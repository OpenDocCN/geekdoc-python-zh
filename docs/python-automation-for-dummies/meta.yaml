- md: "your pyautogui_mouseinfo.py script. In VS Code, you can see the contents of\
    \ that folder just by clicking the mouseInfoLog.txt.\n\n## Using mouse control\
    \ with a specific app\n\nThe automated mouse action you get from PyAutoGUI always\
    \ runs in the *active window* (whatever app is in the forefront on the screen).\
    \ Any time you want to use PyAutoGUI in a specific app, first open that app and\
    \ maximize its window, to ensure the X, Y coordinates of elements on the screen\
    \ are consistent.\n\nWhen your app is open, you can open VS Code (or whatever\
    \ code editor you're using) and start your Python script. You can give yourself\
    \ a couple seconds to bring the other app to the screen by using a timer to pause\
    \ the Python script before it takes control of the mouse, so you have time to\
    \ bring the app of interest back onto the screen by clicking its Dock or Taskbar\
    \ icon.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_155_0.png)\n\nLater in this\
    \ chapter, I show you how to use a command like `time(5)` to pause the Python\
    \ script in the example script.\n\n## Trying out mouse control\n\nThere is no\
    \ universal screen we can all access for me to use as an example to illustrate\
    \ a practical example of mouse control. But here's a sample script with lots of\
    \ comments to illustrate methods for moving the mouse and clicking on the screen\
    \ no matter what's showing on the screen at the moment:\n\n```python\n# move_mouse.py\n\
    # Must pip install pyautogui.\nimport pyautogui\nimport time\n\n# FailSafe is\
    \ True by default, set here for clarity.\npyautogui.FAILSAFE = True\n# Add a 2-second\
    \ pause after each pyautogui command.\npyautogui.PAUSE = 2\n\ndef mouse_operations():\n\
    \    try:\n        # Get screen size for reference.\n        screen_width, screen_height\
    \ = pyautogui.size()\n        print(f\"Screen size: {screen_width}x{screen_height}\"\
    )\n\n        # Get center of screen.\n        center_x, center_y = screen_width\
    \ // 2, screen_height // 2\n        print(f\"Center of screen: ({center_x}, {center_y})\"\
    )\n\n        # Moving the mouse\n        print(\"Moving mouse pointer to center\
    \ of screen...\")\n        pyautogui.moveTo(center_x, center_y, duration=1)\n\n\
    \        # Move in a square to 90 percent of the screen.\n        print(\"Moving\
    \ the mouse pointer in a square...\")\n        pyautogui.moveTo(.1*screen_width,\
    \ .1*screen_height)\n        pyautogui.moveTo(.9*screen_width, .1*screen_height,\
    \ duration=1)\n        pyautogui.moveTo(.9*screen_width, .9*screen_height, duration=1)\n\
    \        pyautogui.moveTo(.1*screen_width, .9*screen_height, duration=1)\n   \
    \     pyautogui.moveTo(.1*screen_width, .1*screen_height, duration=1)\n\n    \
    \    # Move to the center of the screen.\n        print(\"Moving back to center\
    \ of the screen...\")\n        pyautogui.moveTo(center_x, center_y, duration=1)\n\
    \n        # Move relative to current position.\n        print(\"Moving mouse pointer\
    \ 300 pixels left and 100 pixels up...\")\n        pyautogui.moveRel(-300, -100,\
    \ duration=1)\n\n        # Clicking\n        print(\"Performing a left click...\"\
    )\n        pyautogui.click()\n        pyautogui.press('esc')\n        time.sleep(1)\n\
    \n        # Double-clicking\n        print(\"Performing a double click...\")\n\
    \        pyautogui.doubleClick()\n        pyautogui.press('esc')\n        time.sleep(1)\n\
    \n        # Right-clicking\n        print(\"Performing a right click...\")\n \
    \       pyautogui.rightClick()\n        time.sleep(1)\n\n        # Pressing keys\n\
    \        print(\"Pressing Escape to close any context menu...\")\n        pyautogui.press('esc')\n\
    \n        # Scrolling (not universally supported)\n        print(\"Scrolling toward\
    \ bottom...\")\n        pyautogui.scroll(-2000)\n        time.sleep(3)\n\n   \
    \     print(\"Scrolling toward top...\")\n        pyautogui.scroll(4000)\n   \
    \     time.sleep(3)\n\n        print(\"All operations completed successfully!\\\
    n\")\n\n    except pyautogui.FailSafeException:\n        print(\"\\nScript aborted\
    \ by moving mouse to corner.\\n\")\n    except Exception as e:\n        print(f\"\
    An error occurred: {e}\")\n\nif __name__ == \"__main__\":\n    message = \"Script\
    \ will start in 5 seconds.\\n\"\n    message += \"To cancel, move the mouse pointer\
    \ to any corner.\"\n    print(f\"\\n\\n{message}\")\n\n    # Pause for 5 seconds\
    \ before calling the function.\n    time.sleep(5)\n    mouse_operations()\n```\n\
    \nNear the top of that script, the line that reads `import time` allows you to\
    \ set timers to delay execution of the next line of code. The `time` module is\
    \ in the standard library, so you don't need to `pip install` it. Near the bottom\
    \ of the script, the line that reads `time.sleep(5)` pauses execution for five\
    \ seconds, giving you a few seconds to prepare the screen when you want to run\
    \ a script on a specific app or document on the screen.\n\n## Typing Text with\
    \ Python\n\nPyAutoGUI can simulate human keyboard input by typing text and pressing\
    \ shortcut keys. It types at the current cursor position in the active window,\
    \ just like when you type yourself. That will likely be VS Code if you run a script\
    \ from VS Code. If you don't want PyAutoGUI to type inside your Python script,\
    \ here's a way you can test it safely:\n\n1.  Open Microsoft Word or any other\
    \ app in which you normally type (Pages, Google Docs, Notepad, TextEdit), and\
    \ leave that window open.\n2.  Open VS Code if you haven't already.\n3.  In your\
    \ script, set a timer to pause code execution before the script runs, to give\
    \ yourself time to switch windows.\n    For example, `time.sleep(5)` pauses for\
    \ five seconds.\n4.  Run your script in the usual manner in VS Code.\n5.  Switch\
    \ to the window in which you want the script to type.\n    If the script will\
    \ be typing into a form, click inside the first form field.\n\n> When using a\
    \ script to fill in a form, it's best to use the Tab key to move from one field\
    \ to the next. That way, you don't need to know the exact screen position of each\
    \ field in which you want to type.\n\n### Controlling the typing speed\n\nTo type\
    \ text with PyAutoGUI, use the `.write()` method. The text will type at lightning\
    \ speed. Here's an example:\n\n```python\npyautogui.write(\"Hello World\")\n```\n\
    \nIf you need to slow down the typing, add an `interval=` parameter and the number\
    \ of seconds to pause between each typed character. For example, if you want to\
    \ delay by half a second, type the code like this:\n\n```python\npyautogui.write(\"\
    Hello World\", interval=0.5)\n```\n\n### Typing long passages of text\n\nIf you\
    \ want to type long passages of text with line breaks and such, your best bet\
    \ it to put that text in a variable first. Then put the name of the variable between\
    \ the parentheses, without quotation marks.\n\n> Python allows you to put long\
    \ passages of text with line breaks inside triple quotation marks. Although it's\
    \ often used for lengthy comments, you can also store long passages of text with\
    \ line breaks using triple quotation marks. You can use either double quotation\
    \ marks, like `\"\"\"` or single quotation marks like `'''`. Just make sure you\
    \ use the same type to start and end the text.\n\nFor example, here's a long passage\
    \ of text that contains line breaks, stored in a variable named `long_message`.\
    \ The `pyautogui.write()` statement types the text with a tenth of a second delay\
    \ between each character:\n\n```python\nlong_message = \"\"\"Enclose longer passages\
    \ of text like this,\nwith line breaks if you like, inside triple quotation marks.\n\
    Then to have Python type the text, put the variable\nname inside the parentheses\
    \ of .write().\"\"\"\npyautogui.write(long_message, interval=0.1)\n```\n\n###\
    \ Pressing special keys\n\nTo type special keys, like Enter or Tab, use `pyautogui.press()`\
    \ with the name of the key to press, in quotation marks, inside the parentheses.\
    \ The key names include \"enter\", \"tab\", \"space\", \"backspace\", \"delete\"\
    , \"esc\", \"win\", \"up\", \"down\", \"left\", \"right\", \"f1\", \"f2\", \"\
    f3\", \"f4\", \"f5\", \"f6\", \"f7\", \"f8\", \"f9\", \"f10\", \"f11\", \"f12\"\
    , \"home\", \"end\", \"pageup\", and \"pagedown\".\n\nAs an example, here's some\
    \ code to type some text, press Enter, press Tab, type some more text, press Enter,\
    \ and type one more line of text:\n\n```python\npyautogui.write(\"This is a line\
    \ of text.\")\npyautogui.press(\"enter\")\npyautogui.press(\"tab\")\npyautogui.write(\"\
    This line is indented.\")\npyautogui.press(\"enter\")\npyautogui.write(\"One final\
    \ line of text.\")\n```\n\nThe output is three lines of text with the middle line\
    \ indented, like this:\n\n```\nThis is a line of text.\n    This line is indented.\n\
    One final line of text.\n```\n\n### Pressing hotkeys\n\nPyAutoGUI offers a `hotkeys()`\
    \ method for typing shortcut keys that often involve two or more key presses.\
    \ That includes the Shift, Ctrl, Alt, and Windows keys in Windows (typed as \"\
    shift\", \"ctrl\", \"alt\", and \"win\" in PyAutoGUI). On macOS, you can use the\
    \ Command, Option, and Control keys (typed as \"command\", \"option\", and \"\
    ctrl\" on a Mac)."
  mdcn: "你的 `pyautogui_mouseinfo.py` 脚本。在 VS Code 中，你只需点击 `mouseInfoLog.txt` 即可查看该文件夹的内容。\n\
    \n## 在特定应用中使用鼠标控制\n\n从 PyAutoGUI 获得的自动鼠标操作始终在*活动窗口*（屏幕上处于最前台的任何应用）中运行。任何时候你想在特定应用中使用\
    \ PyAutoGUI，首先打开该应用并最大化其窗口，以确保屏幕上元素的 X、Y 坐标保持一致。\n\n当你的应用打开后，你可以打开 VS Code（或你正在使用的任何代码编辑器）并启动你的\
    \ Python 脚本。你可以给自己几秒钟时间，通过使用计时器在 Python 脚本控制鼠标之前暂停它，这样你就有时间通过点击 Dock 或任务栏图标将感兴趣的应用重新带回屏幕。\n\
    \n![](img/10d8e89b301a0e7452bff4d402265e78_155_0.png)\n\n在本章后面，我将向你展示如何在示例脚本中使用\
    \ `time(5)` 这样的命令来暂停 Python 脚本。\n\n## 尝试鼠标控制\n\n没有一个我们可以共同访问的通用屏幕，让我用作示例来演示鼠标控制的实际应用。但这里有一个带有大量注释的示例脚本，用于说明无论当前屏幕上显示什么，如何移动鼠标和点击屏幕的方法：\n\
    \n```python\n# move_mouse.py\n# 必须 pip install pyautogui。\nimport pyautogui\n\
    import time\n\n# FailSafe 默认为 True，此处设置以明确。\npyautogui.FAILSAFE = True\n# 在每个\
    \ pyautogui 命令后添加 2 秒暂停。\npyautogui.PAUSE = 2\n\ndef mouse_operations():\n   \
    \ try:\n        # 获取屏幕尺寸作为参考。\n        screen_width, screen_height = pyautogui.size()\n\
    \        print(f\"Screen size: {screen_width}x{screen_height}\")\n\n        #\
    \ 获取屏幕中心。\n        center_x, center_y = screen_width // 2, screen_height // 2\n\
    \        print(f\"Center of screen: ({center_x}, {center_y})\")\n\n        # 移动鼠标\n\
    \        print(\"Moving mouse pointer to center of screen...\")\n        pyautogui.moveTo(center_x,\
    \ center_y, duration=1)\n\n        # 移动鼠标指针画一个正方形，范围为屏幕的 90%。\n        print(\"\
    Moving the mouse pointer in a square...\")\n        pyautogui.moveTo(.1*screen_width,\
    \ .1*screen_height)\n        pyautogui.moveTo(.9*screen_width, .1*screen_height,\
    \ duration=1)\n        pyautogui.moveTo(.9*screen_width, .9*screen_height, duration=1)\n\
    \        pyautogui.moveTo(.1*screen_width, .9*screen_height, duration=1)\n   \
    \     pyautogui.moveTo(.1*screen_width, .1*screen_height, duration=1)\n\n    \
    \    # 移动到屏幕中心。\n        print(\"Moving back to center of the screen...\")\n \
    \       pyautogui.moveTo(center_x, center_y, duration=1)\n\n        # 相对于当前位置移动。\n\
    \        print(\"Moving mouse pointer 300 pixels left and 100 pixels up...\")\n\
    \        pyautogui.moveRel(-300, -100, duration=1)\n\n        # 点击\n        print(\"\
    Performing a left click...\")\n        pyautogui.click()\n        pyautogui.press('esc')\n\
    \        time.sleep(1)\n\n        # 双击\n        print(\"Performing a double click...\"\
    )\n        pyautogui.doubleClick()\n        pyautogui.press('esc')\n        time.sleep(1)\n\
    \n        # 右键点击\n        print(\"Performing a right click...\")\n        pyautogui.rightClick()\n\
    \        time.sleep(1)\n\n        # 按键\n        print(\"Pressing Escape to close\
    \ any context menu...\")\n        pyautogui.press('esc')\n\n        # 滚动（并非普遍支持）\n\
    \        print(\"Scrolling toward bottom...\")\n        pyautogui.scroll(-2000)\n\
    \        time.sleep(3)\n\n        print(\"Scrolling toward top...\")\n       \
    \ pyautogui.scroll(4000)\n        time.sleep(3)\n\n        print(\"All operations\
    \ completed successfully!\\n\")\n\n    except pyautogui.FailSafeException:\n \
    \       print(\"\\nScript aborted by moving mouse to corner.\\n\")\n    except\
    \ Exception as e:\n        print(f\"An error occurred: {e}\")\n\nif __name__ ==\
    \ \"__main__\":\n    message = \"Script will start in 5 seconds.\\n\"\n    message\
    \ += \"To cancel, move the mouse pointer to any corner.\"\n    print(f\"\\n\\\
    n{message}\")\n\n    # 在调用函数前暂停 5 秒。\n    time.sleep(5)\n    mouse_operations()\n\
    ```\n\n在该脚本顶部附近，`import time` 这行代码允许你设置计时器来延迟下一行代码的执行。`time` 模块位于标准库中，因此你不需要 `pip\
    \ install` 它。在脚本底部附近，`time.sleep(5)` 这行代码会暂停执行五秒钟，当你想在屏幕上的特定应用或文档上运行脚本时，这能给你几秒钟时间来准备屏幕。\n\
    \n## 使用 Python 输入文本\n\nPyAutoGUI 可以通过输入文本和按快捷键来模拟人类键盘输入。它在活动窗口的当前光标位置输入，就像你自己输入一样。如果你从\
    \ VS Code 运行脚本，那很可能就是 VS Code。如果你不想让 PyAutoGUI 在你的 Python 脚本内部输入，这里有一种安全测试的方法：\n\
    \n1.  打开 Microsoft Word 或你通常输入的任何其他应用（Pages、Google Docs、记事本、TextEdit），并保持该窗口打开。\n\
    2.  如果尚未打开，请打开 VS Code。\n3.  在你的脚本中，设置一个计时器在脚本运行前暂停代码执行，以便你有时间切换窗口。\n    例如，`time.sleep(5)`\
    \ 会暂停五秒钟。\n4.  在 VS Code 中以通常方式运行你的脚本。\n5.  切换到你希望脚本输入的窗口。\n    如果脚本将输入到表单中，请点击第一个表单字段内部。\n\
    \n> 当使用脚本填写表单时，最好使用 Tab 键从一个字段移动到下一个字段。这样，你就不需要知道每个你想输入的字段的确切屏幕位置。\n\n### 控制输入速度\n\
    \n要使用 PyAutoGUI 输入文本，请使用 `.write()` 方法。文本将以闪电般的速度输入。以下是一个示例：\n\n```python\npyautogui.write(\"\
    Hello World\")\n```\n\n如果你需要减慢输入速度，请添加 `interval=` 参数和每个输入字符之间暂停的秒数。例如，如果你想延迟半秒，请这样编写代码：\n\
    \n```python\npyautogui.write(\"Hello World\", interval=0.5)\n```\n\n### 输入长段文本\n\
    \n如果你想输入带有换行符等的长段文本，最好的方法是先将该文本放入一个变量中。然后将变量名放在括号内，不要加引号。\n\n> Python 允许你将带有换行符的长段文本放在三引号内。虽然它通常用于冗长的注释，但你也可以使用三引号存储带有换行符的长段文本。你可以使用双引号，如\
    \ `\"\"\"`，或单引号，如 `'''`。只需确保你使用相同类型的引号开始和结束文本。\n\n例如，这是一个包含换行符的长段文本，存储在名为 `long_message`\
    \ 的变量中。`pyautogui.write()` 语句在每个字符之间延迟十分之一秒来输入文本：\n\n```python\nlong_message =\
    \ \"\"\"Enclose longer passages of text like this,\nwith line breaks if you like,\
    \ inside triple quotation marks.\nThen to have Python type the text, put the variable\n\
    name inside the parentheses of .write().\"\"\"\npyautogui.write(long_message,\
    \ interval=0.1)\n```\n\n### 按下特殊键\n\n要输入特殊键，如 Enter 或 Tab，请使用 `pyautogui.press()`，并在括号内用引号括起要按的键名。键名包括\
    \ \"enter\"、\"tab\"、\"space\"、\"backspace\"、\"delete\"、\"esc\"、\"win\"、\"up\"\
    、\"down\"、\"left\"、\"right\"、\"f1\"、\"f2\"、\"f3\"、\"f4\"、\"f5\"、\"f6\"、\"f7\"\
    、\"f8\"、\"f9\"、\"f10\"、\"f11\"、\"f12\"、\"home\"、\"end\"、\"pageup\" 和 \"pagedown\"\
    。\n\n例如，以下是一些代码，用于输入一些文本，按 Enter，按 Tab，输入更多文本，按 Enter，然后输入最后一行文本：\n\n```python\n\
    pyautogui.write(\"This is a line of text.\")\npyautogui.press(\"enter\")\npyautogui.press(\"\
    tab\")\npyautogui.write(\"This line is indented.\")\npyautogui.press(\"enter\"\
    )\npyautogui.write(\"One final line of text.\")\n```\n\n输出是三行文本，中间一行缩进，如下所示：\n\
    \n```\nThis is a line of text.\n    This line is indented.\nOne final line of\
    \ text.\n```\n\n### 按下热键\n\nPyAutoGUI 提供了一个 `hotkeys()` 方法，用于输入通常涉及两次或多次按键的快捷键。这包括\
    \ Windows 中的 Shift、Ctrl、Alt 和 Windows 键（在 PyAutoGUI 中分别输入为 \"shift\"、\"ctrl\"\
    、\"alt\" 和 \"win\"）。在 macOS 上，你可以使用 Command、Option 和 Control 键（在 Mac 上分别输入为 \"\
    command\"、\"option\" 和 \"ctrl\"）。"
