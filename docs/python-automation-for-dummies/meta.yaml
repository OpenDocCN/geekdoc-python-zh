- md: "## 5 The Part of Tens\n\n## IN THIS PART . . .\n\nAppreciate the top ten Zen\
    \ of Python aphorisms.\n\nKnow what to do with the top ten error messages.\n\n\
    +   IN THIS CHAPTER\n\n* Writing beautiful code\n* Keeping things clean and simple\n\
    * Handling errors gracefully so your scripts don't crash\n\n## Chapter 16\nTop\
    \ Ten Zen of Python Guidelines\n\nThe Zen of Python is a philosophy of writing\
    \ code that emphasizes clarity, simplicity, and practicality — code that’s easy\
    \ for you, and perhaps other developers, to understand, modify, and maintain.\
    \ Being Pythonic means writing code that adheres to the Zen of Python principles.\n\
    \nThe Zen of Python consists of 19 aphorisms or principles. Entering the command\
    \ `import this` at a Python command prompt lists these 19 aphorisms, but you won’t\
    \ get any details or examples that way. In this chapter, I go through the top\
    \ ten Zen of Python principles, with some explanations and examples to give you\
    \ a better understanding.\n\n## Beautiful Is Better than Ugly\n\nThis principle\
    \ emphasizes that code should be aesthetically pleasing, readable, and elegant,\
    \ prioritizing clarity and simplicity over convoluted or messy solutions. In the\
    \ context of Python, “beautiful” code is intuitive, maintainable, and aligns with\
    \ the language’s idiomatic style, whereas “ugly” code is overly complex, hard\
    \ to read, or unnecessarily obscure.\n\nSo, what are some things that can make\
    \ code beautiful? Think in terms of being able to read and instantly understand\
    \ its intent. Think in terms of:\n\n+   >> **Readability:** Beautiful code is\
    \ easy to understand at a glance, even for someone unfamiliar with the project.\n\
    >> **Simplicity:** Beautiful code avoids unnecessary complexity, favoring straight-forward\
    \ solutions.\n>> **Expressiveness:** Beautiful code leverages Python's features\
    \ to convey intent clearly and concisely.\n>> **Maintainability:** Beautiful code\
    \ is easier to debug, extend, and collaborate on.\n\nIn contrast, ugly code sacrifices\
    \ these qualities for quick fixes, clever tricks, or overengineered solutions\
    \ that obscure intent.\n\nSometimes being beautiful is simply a matter of using\
    \ fewer words. For example, the following code below uses an `if` statement to\
    \ determine whether the length of a list is greater than zero:\n\n```\nmy_list=[1,2,3,4,5]\n\
    if len(my_list)>0:\n    print(\"list is not empty\")\n```\n\nTechnically, there's\
    \ nothing wrong with the code, and it will run as expected. However, Python automatically\
    \ makes any empty list return `False` when you refer to the list by name in an\
    \ `if` statement. The name of a non-empty list always returns `True`. So, you\
    \ could make that code more beautiful by taking advantage of that fact, like this:\n\
    \n```\nmy_list=[1,2,3,4,5]\nif my_list:\n    print(\"list is not empty\")\n```\n\
    \nThat tiny change on the second line may seem insignificant. But when you're\
    \ working at a professional level and dealing with thousands of lines of code,\
    \ small changes like that add up.\n\nHere's another example:\n\n```\n# Clunky\
    \ and repetitive\nmy_dict = {\"a\": 1, \"b\": 2}\nif \"c\" in my_dict:\n    value\
    \ = my_dict[\"c\"]\nelse:\n    value = 0\nprint(value)\n```\n\nAgain, that code\
    \ works as written. It creates a dictionary named my_dict and populates it with\
    \ two keys named \"a\" and \"b\", giving each key a value. Then an if statement\
    \ checks to see whether the dictionary contains a key named \"c\" and assigns\
    \ c a value of 0 if that key doesn't exist.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_324_0.png)\n\
    \nIf you're wondering whether there's a more beautiful way to write some code\
    \ you already have, consider copying and pasting the code into artificial intelligence\
    \ (AI), and asking whether there is a more beautiful or Pythonic way to write\
    \ that code.\n\nA more elegant way to handle this example would be to use Python's\
    \ .get() method, which allows you to assign a default value to any missing key,\
    \ on the fly. For example, the following example does exactly what the previous\
    \ code does, but with fewer lines, making it more beautiful:\n\n```\n# Clean and\
    \ succinct using get()\nmy_dict = {\"a\": 1, \"b\": 2}\nvalue = my_dict.get(\"\
    c\", 0)\nprint(value)\n```\n\nThis version is beautiful because it's simpler,\
    \ cleaner, and easier to read.\n\nLet's look at an example where I create a function\
    \ named check_number that returns True if a positive number is passed in; otherwise,\
    \ it returns False:\n\n```\ndef check_number(n):\n    if n > 0:\n        return\
    \ True\n    else:\n        if n <= 0:\n            return False\n```\n\nThe code,\
    \ as written, works properly and contains no errors. But here's a more beautiful\
    \ version of the function that also returns True if a positive number is passed\
    \ in or False for any other number:\n\n```\ndef is_positive(number):\n    return\
    \ number > 0\n```\n\nThe latter function is more beautiful because its name, `is_positive`,\
    \ is more descriptive than `check_number` in terms of what the function does and\
    \ returns. The parameter name, `number`, is more descriptive than just using `n`\
    \ as a variable name. Performing the test and returning a value is handled by\
    \ the single line `return number > 0`, as an alternative to the complex `if...else`\
    \ statement.\n\nHere's one more example where we use some code to create a list\
    \ of numbers. The additional code creates a second list, containing only even\
    \ numbers from the original list:\n\n```\nmy_list = [1, 2, 3, 4, 5]\nnew_list\
    \ = []\nfor i in range(len(my_list)):\n    if my_list[i] % 2 == 0:\n        new_list.append(my_list[i])\n\
    print(new_list)\n```\n\nThe code works fine as is, but it's bulky and difficult\
    \ to read. It isn't very pretty to look at either. The following code accomplishes\
    \ the same thing with far fewer lines and no indentations:\n\n```\nnumbers = [1,\
    \ 2, 3, 4, 5]\neven_numbers = [num for num in numbers if num % 2 == 0]\nprint(even_numbers)\n\
    ```\n\nNot only is the latter code more succinct and easier to read, but using\
    \ names like `numbers` and `even_numbers` helps to make the code more readable\
    \ and easier to understand — and, thus, more beautiful!\n\n## Explicit Is Better\
    \ than Implicit\n\nThis principle is a way of saying that code should clearly\
    \ express its intent, avoiding hidden or assumed behavior. Implicit code relies\
    \ on defaults, side effects, or unclear assumptions, which can obscure meaning\
    \ and lead to errors. Explicit code, by contrast, makes actions, types, and intentions\
    \ obvious, improving readability and maintainability.\n\nTo clarify the difference\
    \ between explicit and implicit consider the following:\n\n> >> **Explicit code**\
    \ clearly states what the code does, using precise names, types, or operations.\n\
    \n> >> **Implicit code** relies on defaults, magic behavior, or context that isn't\
    \ immediately obvious to all developers.\n\nBeing explicit encourages writing\
    \ code that is self-documenting and predictable, reducing the need for developers\
    \ to guess or dig into documentation to understand it.\n\nLet's work through an\
    \ example of making code more explicit. We'll start with this \"ugly\" code (referring\
    \ to the preceding section):\n\n```\ndef tot(x,y):\n    st =x * y\n    return\
    \ x + st\n```\n\nThe code works — it returns the original value of x with `st`\
    \ added, where `st` is that x value multiplied by y. But what exactly does that\
    \ get us? Here's a rewrite of the code that's more explicit in terms of what the\
    \ code does:\n\n```\ndef total_with_tax(total_sale,sales_tax_rate):\n    return\
    \ round((1 + sales_tax_rate) * total_sale, 2)\n```\n\nIt's easier to tell what's\
    \ going on in this version. The function name, `total_with_tax`, gives you a hint\
    \ as to what the function returns. The names `total_sale` and `sales_tax_rate`\
    \ are much more explicit than x and y, and they give you some clue as to what\
    \ to pass into the function.\n\nIntentionally using abbreviations and single-letter\
    \ variable names to keep your code compact works against explicitness. Follow\
    \ PEP 8 guidelines (https://peps.python.org/pep-0008) and use all lowercase variable\
    \ names that are meaningful, with underscores in place of spaces, to keep your\
    \ code's meaning explicit.\n\nTo add the sales tax amount to the total sale, the\
    \ function adds the sales tax rate (say, 0.07) to 1, and then multiples that value\
    \ by the total sale, a simple and accurate way to add sales tax to `total_sale`.\
    \ The code is more descriptive just by using better names for things. But we can\
    \ do more to make the code even more explicit.\n\n### Using type hints\n\nPython\
    \ doesn't require you to declare a type for every value you create. Instead, it\
    \ uses *dynamic typing*, where you simply enter a value (for example, 10, 123.45,\
    \ or \"Hello\") and Python figures out its data type automatically. Although this\
    \ feature is convenient, it can make code harder to read because the type isn't\
    \ explicitly shown."
  mdcn: "## 5 十大精选\n\n## 本部分概览...\n\n领略十大 Python 之禅格言。\n\n掌握十大错误信息的应对之道。\n\n+   本章内容\n\
    \n* 编写优美的代码\n* 保持代码整洁与简洁\n* 优雅地处理错误，避免脚本崩溃\n\n## 第16章\n十大 Python 之禅准则\n\nPython\
    \ 之禅是一种编程哲学，强调清晰、简洁和实用——编写易于你（或许还有其他开发者）理解、修改和维护的代码。遵循 Python 风格，意味着编写的代码符合 Python\
    \ 之禅的原则。\n\nPython 之禅包含19条格言或原则。在 Python 命令提示符下输入 `import this` 命令，即可列出这19条格言，但这样无法获得详细解释或示例。本章将介绍十大\
    \ Python 之禅原则，并辅以解释和示例，助你深入理解。\n\n## 优美胜于丑陋\n\n此原则强调代码应具有美感、可读性和优雅性，优先考虑清晰简洁，而非复杂或混乱的解决方案。在\
    \ Python 语境中，“优美”的代码直观、易维护，符合语言惯用风格；而“丑陋”的代码则过于复杂、难以阅读或不必要地晦涩。\n\n那么，哪些因素能让代码变得优美？试着从能否一眼读懂其意图的角度思考。可以从以下方面考虑：\n\
    \n+   >> **可读性：** 优美的代码一目了然，即使对项目不熟悉的人也能轻松理解。\n>> **简洁性：** 优美的代码避免不必要的复杂性，倾向于直接明了的解决方案。\n\
    >> **表达力：** 优美的代码利用 Python 的特性，清晰而简洁地传达意图。\n>> **可维护性：** 优美的代码更易于调试、扩展和协作。\n\n\
    相比之下，丑陋的代码为了快速修复、巧妙技巧或过度工程化的解决方案而牺牲了这些品质，从而掩盖了真实意图。\n\n有时，优美仅仅意味着使用更少的代码。例如，下面的代码使用\
    \ `if` 语句判断列表长度是否大于零：\n\n```\nmy_list=[1,2,3,4,5]\nif len(my_list)>0:\n    print(\"\
    list is not empty\")\n```\n\n从技术上讲，这段代码没有问题，运行结果也符合预期。然而，在 Python 中，当在 `if` 语句中直接引用列表名时，空列表会自动返回\
    \ `False`，而非空列表名则总是返回 `True`。因此，你可以利用这一特性，让代码变得更优美，像这样：\n\n```\nmy_list=[1,2,3,4,5]\n\
    if my_list:\n    print(\"list is not empty\")\n```\n\n第二行的微小改动看似无关紧要。但当你在专业层面工作，处理成千上万行代码时，这样的小改动会积少成多。\n\
    \n再看一个例子：\n\n```\n# 笨拙且重复\nmy_dict = {\"a\": 1, \"b\": 2}\nif \"c\" in my_dict:\n\
    \    value = my_dict[\"c\"]\nelse:\n    value = 0\nprint(value)\n```\n\n同样，这段代码按原样运行正常。它创建了一个名为\
    \ my_dict 的字典，并填充了两个键 \"a\" 和 \"b\"，为每个键赋值。然后，if 语句检查字典是否包含名为 \"c\" 的键，如果该键不存在，则将\
    \ c 赋值为 0。\n\n![](img/10d8e89b301a0e7452bff4d402265e78_324_0.png)\n\n如果你想知道是否有更优美的方式来编写已有的代码，可以考虑将代码复制粘贴到人工智能（AI）中，并询问是否有更优美或更\
    \ Pythonic 的方式来编写该代码。\n\n处理此示例更优雅的方式是使用 Python 的 .get() 方法，它允许你为任何缺失的键动态分配一个默认值。例如，以下示例实现了与前面代码完全相同的功能，但行数更少，因此更优美：\n\
    \n```\n# 使用 get() 实现简洁明了\nmy_dict = {\"a\": 1, \"b\": 2}\nvalue = my_dict.get(\"\
    c\", 0)\nprint(value)\n```\n\n这个版本之所以优美，是因为它更简单、更整洁、更易于阅读。\n\n让我们看一个例子，我创建了一个名为\
    \ check_number 的函数，如果传入正数则返回 True；否则返回 False：\n\n```\ndef check_number(n):\n \
    \   if n > 0:\n        return True\n    else:\n        if n <= 0:\n          \
    \  return False\n```\n\n这段代码按原样运行正常，没有错误。但这里有一个更优美的函数版本，同样在传入正数时返回 True，其他数字则返回\
    \ False：\n\n```\ndef is_positive(number):\n    return number > 0\n```\n\n后者更优美，因为其函数名\
    \ `is_positive` 比 `check_number` 更能描述函数的功能和返回值。参数名 `number` 比仅使用 `n` 作为变量名更具描述性。执行测试和返回值由单行\
    \ `return number > 0` 处理，替代了复杂的 `if...else` 语句。\n\n再看一个例子，我们使用一些代码创建一个数字列表。额外的代码创建第二个列表，仅包含原始列表中的偶数：\n\
    \n```\nmy_list = [1, 2, 3, 4, 5]\nnew_list = []\nfor i in range(len(my_list)):\n\
    \    if my_list[i] % 2 == 0:\n        new_list.append(my_list[i])\nprint(new_list)\n\
    ```\n\n这段代码运行正常，但冗长且难以阅读，看起来也不太美观。以下代码用更少的行数和没有缩进的方式实现了相同的功能：\n\n```\nnumbers\
    \ = [1, 2, 3, 4, 5]\neven_numbers = [num for num in numbers if num % 2 == 0]\n\
    print(even_numbers)\n```\n\n后者不仅更简洁、更易读，而且使用像 `numbers` 和 `even_numbers` 这样的名称有助于提高代码的可读性和易理解性——因此，也更优美！\n\
    \n## 明确胜于含糊\n\n此原则意在说明代码应清晰表达其意图，避免隐藏或假设的行为。含糊的代码依赖于默认值、副作用或不明确的假设，这可能会掩盖含义并导致错误。相比之下，明确的代码使操作、类型和意图显而易见，从而提高可读性和可维护性。\n\
    \n为了阐明明确与含糊的区别，请考虑以下几点：\n\n> >> **明确的代码** 清晰地说明代码的功能，使用精确的名称、类型或操作。\n\n> >> **含糊的代码**\
    \ 依赖于默认值、魔法行为或并非所有开发者都能立即理解的上下文。\n\n明确性鼓励编写自文档化且可预测的代码，减少开发者猜测或深入查阅文档以理解代码的需要。\n\
    \n让我们通过一个例子来使代码更明确。我们从这段“丑陋”的代码开始（参考前一节）：\n\n```\ndef tot(x,y):\n    st =x * y\n\
    \    return x + st\n```\n\n这段代码可以运行——它返回 x 的原始值加上 `st`，其中 `st` 是 x 值乘以 y 的结果。但这到底有什么用呢？以下是重写的代码，在功能描述上更明确：\n\
    \n```\ndef total_with_tax(total_sale,sales_tax_rate):\n    return round((1 + sales_tax_rate)\
    \ * total_sale, 2)\n```\n\n这个版本更容易理解。函数名 `total_with_tax` 暗示了函数的返回值。名称 `total_sale`\
    \ 和 `sales_tax_rate` 比 x 和 y 明确得多，并且它们为你提供了应传入函数的参数线索。\n\n故意使用缩写和单字母变量名以保持代码紧凑，这与明确性背道而驰。遵循\
    \ PEP 8 指南 (https://peps.python.org/pep-0008)，使用全小写、有意义的变量名，并用下划线代替空格，以保持代码含义的明确性。\n\
    \n为了将销售税金额加到总销售额中，该函数将销售税率（例如 0.07）加到 1，然后将该值乘以总销售额，这是一种简单准确地将销售税添加到 `total_sale`\
    \ 的方法。仅仅通过使用更好的名称，代码就更具描述性。但我们可以做得更多，使代码更加明确。\n\n### 使用类型提示\n\nPython 不要求你为创建的每个值声明类型。相反，它使用*动态类型*，你只需输入一个值（例如，10、123.45\
    \ 或 \"Hello\"），Python 会自动确定其数据类型。虽然此功能很方便，但它可能使代码更难阅读，因为类型没有明确显示。"
