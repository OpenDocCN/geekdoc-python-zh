  md: "![](img/10d8e89b301a0e7452bff4d402265e78_355_0.png)\n\nKeep in mind that file\
    \ and folder names are case-sensitive on macOS and Linux, so watch your uppercase/lowercase\
    \ letters, too!\n\nThe current working directory is assumed because no other directory\
    \ is specified in the path. If the file is in another location, you can specify\
    \ the path using the proper syntax for your operating system. For example, if\
    \ the file is in a folder named `assets` on a disk or USB drive in drive `D:`\
    \ on Windows, you could write the code like this:\n\n```\npython\nfile_path =\
    \ r\"D:\\assets\\data.json\"\nwith open(file_path, 'r') as file:\n```\n\nOn macOS,\
    \ that would look like this (assuming the name of the USB drive is `MyUSB`):\n\
    \n```\npython\nfile_path = \"/Volumes/MyUSB/assets/data.json\"\nwith open(file_path,\
    \ 'r') as file:\n```\n\nOn Linux, the path may look more like this (but replace\
    \ `Alan` with your username and `MyUSB` with the name of your USB drive):\n\n\
    ```\npython\nfile_path = \"/media/Alan/MyUSB/assets/data.json\"\nwith open(file_path,\
    \ 'r') as file:\n```\n\nWorking with external files can also produce `PermissionError`,\
    \ which happens when you try to write to a file that's open in read-only mode\
    \ or a file that's already open in some other app. To fix the error, you need\
    \ to set permissions on the file, or its directory, so your script has whatever\
    \ rights it needs. Typically, you can set permissions on a file by right-clicking\
    \ the file's icon and choosing Properties > Security on Windows, choosing Get\
    \ Info > Sharing & Permissions on macOS, or using the `chmod` command on Linux.\n\
    \nIn Python code that works with files, you'll often see exception handlers in\
    \ place to handle both `FileNotFoundError` and `PermissionError` problems, as\
    \ well as a generic handler like this:\n\n```\npython\nimport json\n\ndef read_json_file(filepath):\n\
    \    try:\n        with open(filepath, 'r') as file:\n            data = json.load(file)\n\
    \            print(\"File loaded successfully.\")\n            return data\n```"
