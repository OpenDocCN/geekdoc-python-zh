    \ always including exception handling for errors related to files outside your\
    \ own code, because in many environments you may not have control over what's\
    \ happening in those other directories.\n\n# IndentationError\n\nMany programming\
    \ languages use different kinds of braces and brackets to delimit blocks of code\
    \ within a larger script. For example, in the following JavaScript code, the code\
    \ inside the greet() function is surrounded by curly braces:\n\n```\nfunction\
    \ greet(name) {\n    alert(\"Hello \" + name);\n}\n\n// Call the function with\
    \ the name \"wilma\"\ngreet(\"wilma\");\n```\n\nPython doesn't use braces or brackets\
    \ to define blocks of code. Instead, it relies solely on indentations to determine\
    \ what's inside a block of code. For example, the following greet() function contains\
    \ the one line of print code, as indicated by the indentation. The remaining code\
