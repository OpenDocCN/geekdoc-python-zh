  - '[PAGE 297]


    The `import ollama` line is required to load the `ollama` module to simplify interacting
    with Ollama models from Python. The line `model = "tinyllama"` indicates which
    Ollama model you want to use. This must be a model you''ve already downloaded
    using `ollama pull`.


    The line `prompt = input("You: ").strip()` puts the word `You` on the screen as
    a prompt (you can change that to any text you want). Then the script does nothing
    until the user types a prompt and presses `Enter`. When that happens, the user''s
    text is stored in the variable named `prompt`, with any leading and trailing spaces
    removed by the `.strip()` method.


    The next line sends that prompt to the chatbot, waits for a response, and stores
    the response in a variable named `response`:


    ```

    response = ollama.chat(model=model, messages=[{"role": "user", "content": prompt}],
    stream=False)

    ```


    Let''s dissect that line:


    | Code | Description |

    | :--- | :--- |

    | `ollama.chat` | Uses the `chat` method of the `ollama` module to send a prompt
    to the AI mode and accept the resulting reply |

    | `model=model` | Tells `ollama` to use the model previously stored in the variable
    named `model` (`tinyllama` in this example) |

    | `messages=` | Defines a dictionary of information about the prompt |

    | `"role": "user"` | Indicates that the prompt is coming from a human user rather
    than another model or system |

    | `"content": prompt` | Defines the content of the prompt being sent as the text
    currently stored in the variable named `prompt` |

    | `stream=False` | Ensures that the response is returned all at once, rather than
    in chunks, which makes it easier to store that information in the variable named
    `response` |


    This is a super simple chatbot that doesn''t remember conversations, which may
    feel strange if you''ve been using conversation AI online for a while. But you
    can add some conversational ability to your own Python AI apps, as I explain in
    the next section.'
- md: "## Creating a Conversational Chatbot\n\nOur super simple chatbot has one weakness:\
    \ It doesn’t remember anything about an ongoing conversation. For example, if\
    \ my first prompt is “My name is Alan. Say hello,” it will indeed say hello to\
    \ me. If my second prompt is “What is my name?,” it won’t know.\n\nLet’s look\
    \ at a local chatbot that can carry on a conversation for one session. For the\
    \ sake of variety, I’ll use the llama3.2 model, which is more powerful than tinyllama\
    \ but terribly slow if your computer lacks GPU or neural processing to speed things\
    \ up. If it’s too slow for you to even work with, you can use the tinyllama model\
    \ instead. I’ll start by showing you the script in its entirety:\n\n```python\n\
    # converse_bot.py\n# Install Ollama: Download and install Ollama from ollama.ai.\n\
    # pip install ollama.\nimport ollama\nimport sys\n\ndef initialize_model(model_name):\n\
    \    # Initialize the Ollama model and check if it's available.\n    try:\n  \
    \      # Strip any tag (for example, :latest) from the name for comparison.\n\
    \        base_model_name = model_name.split(\":\")[0]\n\n        # Get list of\
    \ installed models.\n        model_list = ollama.list()\n        available_models\
    \ = []\n\n        if \"models\" in model_list:\n            for model in model_list[\"\
    models\"]:\n                name = model.get(\"model\")\n                if name:\n\
    \                    # Strip any tag from installed model name for comparison.\n\
    \                    installed_base_name = name.split(\":\")[0]\n            \
    \        available_models.append(installed_base_name)\n\n        if base_model_name\
    \ not in available_models:\n            print(f\"Error: Model '{model_name}' not\
    \ found. Available models: {available_models}\")\n            sys.exit(1)\n\n\
    \        return model_name\n    except Exception as e:\n        print(f\"Error\
    \ connecting to Ollama: {e}\")\n        sys.exit(1)\n\ndef get_response(model_name,\
    \ prompt, conversation_history):\n    # Generate a response from the Ollama model\
    \ with conversation context.\n    try:\n        # Prepare the messages with conversation\
    \ history.\n        messages = conversation_history + [{\"role\": \"user\", \"\
    content\": prompt}]\n\n        # Get the response from the model.\n        response\
    \ = ollama.chat(\n            model=model_name,\n            messages=messages,\n\
    \            stream=False\n        )\n\n        # Extract and return the response\
    \ content.\n        return response[\"message\"][\"content\"]\n    except Exception\
    \ as e:\n        return f\"Error generating response: {e}\"\n\ndef main(model):\n\
    \    # Main function to run the chatbot\n    model_name = initialize_model(model)\n\
    \    conversation_history = []\n\n    print(\"Welcome to the Ollama Chatbot! Type\
    \ 'exit' or 'quit' to stop.\")\n    print(\"Start chatting below:\\n\")\n\n  \
    \  # Initialize user prompt.\n    user_prompt = ''\n    while user_prompt.lower()\
    \ not in ('quit', 'exit'):\n        # Get user input.\n        user_prompt = input(\"\
    Type your prompt, or \\\"quit\\\": \").strip()\n\n        # Check for exit commands.\n\
    \        if user_prompt.lower() in [\"exit\", \"quit\"]:\n            print(\"\
    Goodbye!\")\n            break\n\n        # Skip empty inputs.\n        if not\
    \ user_prompt:\n            print(\"Please enter a message.\")\n            continue\n\
    \n        # Add user input to conversation history.\n        conversation_history.append({\"\
    role\": \"user\", \"content\": user_prompt})\n\n        # Get response from the\
    \ model.\n        response = get_response(model_name, user_prompt, conversation_history)\n\
    \n        # Print the response.\n        print(f\"\\n\\nBot: {response}\\n\")\n\
    \n        # Add bot response to conversation history.\n        conversation_history.append({\"\
    role\": \"assistant\", \"content\": response})\n\nif __name__ == \"__main__\"\
    :\n    # Specify which Ollama model to use.\n    model=\"llama3.2\"\n    main(model)\n\
    ```\n\nIn this script, you can use any Ollama model you’ve already pulled by changing\
    \ the model name in the line that reads `model=\"llama3.2\"`. If the large model\
    \ is too slow for your computer, try changing that to `model = \"tinyllama\"`\
    \ as in the previous script example.\n\nThe real meat of the conversational AI\
    \ script is virtually identical to the super-simple chatbot I show you in the\
    \ previous section. You use this one line of code to send the prompts (messages)\
    \ to the model and store its reply in a variable named `response`:\n\n```python\n\
    response = ollama.chat(\n    model=model_name,\n    messages=messages,\n    stream=False\n\
    )\n```\n\nThe main trick to this script is in the variable named `messages`, which\
    \ no longer contains just what the user typed at the prompt. Instead, `messages`\
    \ contains every prompt the user has entered since starting this session with\
    \ the script. So, it’s not really a matter of the model “remembering” the conversation;\
    \ instead, the script “reminds” the model of every prompt entered prior to the\
    \ current prompt.\n\nIn the `main()` function, the following line asks the user\
    \ to type their prompt and stores what the user typed in the variable named `user_prompt`:\n\
    \n```python\nuser_prompt = input(\"Type your prompt, or \\\"quit\\\": \").strip()\n\
    ```\n\nAfter the user types a prompt, the next line of code adds the key \"role\"\
    , the value \"user\", the key \"content\", and whatever prompt the user typed\
    \ to a list named conversation_history:\n\n```python\nconversation_history.append({\"\
    role\": \"user\", \"content\": user_prompt})\n```\n\nEvery time the chatbot responds,\
    \ that response is also added to the conversation history. However, the chatbot's\
    \ role is \"assistant\", not \"user\", so the chatbot can distinguish between\
    \ user prompts and its own replies based on the role key. After a brief conversation,\
    \ that list of dictionaries may look something like this:\n\n```python\n[\n  \
    \  {\"role\": \"user\", \"content\": \"My name is Alan. Say hello.\"},\n    {\"\
    role\": \"assistant\", \"content\": \"Hi, Alan!\"},\n    {\"role\": \"user\",\
    \ \"content\": \"I live in the USA. Where do you live?\"},\n    {\"role\": \"\
    assistant\", \"content\": \"We both live in the USA!\"},\n    {\"role\": \"user\"\
    , \"content\": \"What is my name and where do I live?\"},\n    {\"role\": \"assistant\"\
    , \"content\": \"Your name is Alan. You live in the USA.\"}\n]\n```\n\nThe user,\
    \ of course, never sees that conversation history. From the user's perspective,\
    \ the chatbot is remembering what the user said previously, on its own. But what's\
    \ really going on, behind the scenes, is that the script is resubmitting every\
    \ prompt and every response each time it queries the model, and the model uses\
    \ that information to give the appearance of \"remembering\" the ongoing conversation.\n\
    \nThis larger script example does significantly more exception handling than the\
    \ super-simple script example did. Comments in the code should make it relatively\
    \ easy to understand what's going on, but the main thing I want you to gain from\
    \ this script is that the trick to making an LLM carry on a \"conversation\" (rather\
    \ than just answer one prompt at a time) is to resubmit the entire conversation\
    \ to the chatbot every time you post a prompt.\n\nOf course, after you quit the\
    \ script, the conversation history ceases to exist. The memory of that conversation\
    \ won't carry over to the next time you run the script.\n\n## Developing an AI\
    \ Image Generator\n\nCreating images is another popular AI pastime, and a quick\
    \ and easy way to get free — and copyright-free — images for a website or other\
    \ project. In this section, I show you how to create your own Python script that\
    \ can create images for free.\n\nAs I write this, Pollinations.AI (https://pollinations.ai)\
    \ provides free access to online AI image generation without an API key or even\
    \ requiring you to sign up. You can learn more about their products, and any current\
    \ limitations, at their website. But to get started and try it out, you can just\
    \ start here.\n\nThe first script allows you to type in a prompt describing the\
    \ image you want to create, and then asks how many images you want. The script\
    \ generates the requested number of images and saves them to a folder. Here's\
    \ the entire script:\n\n```python\n# simple_images.py\n# pip install requests\n\
    import requests\nimport os\nimport uuid\nimport time\nfrom datetime import datetime\n\
    \n# Generate one image using pollinations.ai.\ndef generate_image(prompt, save_path,\
    \ retries=3):\n    # Adding a uuid ensures that the prompt and the generated image\
    \ are unique.\n    unique_prompt = f\"{prompt}-{str(uuid.uuid4())}\"\n    url\
    \ = f\"https://image.pollinations.ai/prompt/{unique_prompt}\"\n    for attempt\
    \ in range(retries):\n        try:\n            response = requests.get(url, stream=True)\n\
    \            if response.status_code == 200:\n                # Use current datetime\
    \ for filename\n                timestamp = datetime.now().strftime(\"%Y%m%d_%H%M%S_%f\"\
    )\n                image_path = os.path.join(save_path, f\"{timestamp}.png\")\n\
    \                with open(image_path, \"wb\") as f:\n                    for\
    \ chunk in response.iter_content(chunk_size=8192):\n                        f.write(chunk)\n\
    \                return image_path\n            else:\n                print(f\"\
    Error: Status code {response.status_code}\")\n                time.sleep(5)\n\
    \        except requests.RequestException as e:\n            print(f\"Request\
    \ failed: {e}. Retrying {attempt + 1}/{retries}...\")\n            time.sleep(5)\n\
    \    return None\n```"
  mdcn: "## 创建对话式聊天机器人\n\n我们这个超级简单的聊天机器人有一个弱点：它不记得任何关于持续对话的内容。例如，如果我的第一个提示是“我叫艾伦。打个招呼”，它确实会向我问好。但如果我的第二个提示是“我叫什么名字？”，它就不知道了。\n\
    \n让我们来看一个能在单次会话中进行对话的本地聊天机器人。为了增加多样性，我将使用 `llama3.2` 模型，它比 `tinyllama` 更强大，但如果你的电脑没有\
