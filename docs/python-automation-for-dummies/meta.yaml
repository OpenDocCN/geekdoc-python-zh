    nonexistent_module`).

    » `FileNotFoundError`: Raised when a file or directory is requested but doesn''t
    exist (for example, `open("missing.txt")`).

    » `PermissionError`: Raised when an operation lacks sufficient permissions (for
    example, trying to write to a read-only file).

