    \ `f\"{dt.strftime('%a')}\"` | Thu |\n| %H | Hour (00–23, 24-hour clock) | `f\"\
    {dt.strftime('%H')}\"` | 14 |\n| %I | Hour (01–12, 12-hour clock) | `f\"{dt.strftime('%I')}\"\
