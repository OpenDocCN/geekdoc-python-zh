  md: 'Replace *duration* in the preceding line with the number of seconds the action
    should take.


    In the `move(x, y)` method, *x* is the distance from the left side of the screen,
    in pixels, to move the mouse pointer; *y* is the distance from the top, in pixels,
    to move the mouse pointer.


    In the following code, the first line moves the mouse pointer to coordinates 1,1
    near the upper-left corner of the screen and takes about half a second to do so.
    The second line moves the mouse pointer down, and to the right, 900 pixels, and
    takes 1 second to do so:


    ```

    python

    pyautogui.moveTo(1, 1, 0.5)

    pyautogui.moveTo(900, 900, 1)

    ```


    # Stopping a wild mouse


    If PyAutoGUI ever starts doing something that you don''t want, you can stop it
    immediately by grabbing the mouse and moving the mouse pointer yourself to any
    corner of the screen.


    ![](img/10d8e89b301a0e7452bff4d402265e78_153_0.png)


    PyAutoGUI itself will trigger that instant fail-safe stop, even when it moves
    the mouse pointer to any corner of the screen. You always want to make sure you
    don''t do that unintentionally in your code. In the sample code earlier, I started
    by moving the mouse pointer to 1,1 rather than 0,0 to avoid triggering that fail-safe
    condition.


    The fail-safe feature is enabled automatically whenever you use PyAutoGUI in a
    script. You can disable it by setting `pyautogui.FAILSAFE` to `False`, but doing
    so is risky because it prevents you from stopping the script if the mouse pointer
    starts doing things you didn''t intend.


    # Finding the screen locations of things


    If you want to use PyAutoGUI to control the action in a specific app, you need
    to know exactly where everything is on the screen in that app. You''ll also want
    to make sure you always maximize the app window, so the screen coordinates are
    always the same whenever finding the locations of items and when running the script.


    To locate coordinates of elements onscreen, use the PyAutoGUI MouseInfo app. To
    run it, make sure you''re in a virtual environment where you''ve already installed'
