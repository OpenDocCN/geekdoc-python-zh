  mdcn: "## 循环一段时间\n\n`while` 循环会在条件为真时重复执行一段代码。这就像在说：“一直做这件事，直到情况发生变化。” 没有变量来跟踪你已经循环了多少次，因此在需要计数的场景下，你不会想使用这种循环。`while`\
    \ 循环的语法如下：\n\n```\nwhile condition:\n    # 要重复的代码\n```\n\n条件语句可以是任何能计算出 `True`\
    \ 或 `False` 的表达式。只要条件保持为 `True`，循环就会一直运行。所有在 `while` 行下方缩进的代码，都会在每次循环中执行。当条件计算结果为\
    \ `False` 时，循环停止，代码执行将从循环下方第一个未缩进的行继续。\n\n如果条件永远不计算为 `False`，脚本就会陷入无限循环。如果你发现自己陷入了这种困境，可以按\
    \ Ctrl+C 来取消循环。你可能需要按几次 Ctrl+C。\n\n`while` 循环可以用来反复请求用户输入，直到满足某个条件。在下面的示例中，一个提示要求用户输入一个\
    \ 1 到 10 之间的数字。如果用户忽略了提示并输入了其他内容，循环会一直询问，直到用户遵守要求（或按 Ctrl+C 退出循环）：\n\n```\n# 从\
    \ user_input 为一个不在 1 到 10 之间的数字开始。\nuser_input = 0\n# 循环直到输入是一个 1 到 10 之间的数字。\n\
    while user_input < 1 or user_input > 10:\n    try:\n        # 从用户获取输入并将其转换为整数。\n\
    \        user_input = int(input(\"Enter a number between 1 and 10: \"))\n    except\
    \ ValueError:\n        # 处理非数字输入（例如，字母或符号）。\n        print(\"Invalid input! Please\
    \ enter a valid number.\")\n\n# 循环结束后，确认有效输入。\nprint(f\"You entered a valid number:\
    \ {number}\")\n```\n\n示例代码中的 `try:` 和 `except:` 语句将在本章后面的“处理异常”部分介绍。\n\n## 退出循环\n\
    \n虽然很少需要，但 Python 提供了三个特殊关键字，用于在循环自然结束之前退出循环，或用于检测循环是否自然完成：\n\n- `break`：立即退出循环。\n\
    - `continue`：跳过当前迭代的剩余部分，进入下一次迭代。\n- `else`：当循环正常完成时（而不是使用 `break` 时）运行一段代码。\n\
    \n将 `break` 语句与 `if` 条件结合使用，可以在满足某个条件时跳出循环。在下面的示例中，`fruits` 变量包含一些水果名称，其中一个是空字符串（\"\
    \"）。示例代码在遇到这样的字符串时会跳出循环。\n\n```\n# 一个水果名称列表\nfruits = [\"Apple\", \"Banana\",\
    \ \"\", \"Grape\"]\n# 打印水果列表。\nfor fruit in fruits:\n    if fruit==\"\":\n   \
    \     break\n    print(fruit)\nprint(\"All Done\")\n```\n\n该代码的输出是：\n\n```\nApple\n\
    Banana\nAll Done\n```\n\n`continue` 语句也与 `if` 条件一起使用。然而，它不是停止循环，而是简单地避免在该次循环中执行代码。例如，下面的代码与前面的代码相同，但它用\
