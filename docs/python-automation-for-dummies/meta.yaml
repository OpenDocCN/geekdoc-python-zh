    # Running scripts as imports


    In the interest of being complete, I''ll show you another way to run external
    scripts from Python, using the `import` statement. Personally, I recommend that
    you use `subprocess` from the previous example, where you can capture output from
    each script, and even run non-Python scripts and executables.


    ![](img/10d8e89b301a0e7452bff4d402265e78_285_0.png)


    The `subprocess` module is safer than `import`, because it spawns a new operating
    system process for each external script, so there''s no chance of collision between
    variables and such. It more closely resembles how things work when you manually
    start each script yourself.


    To use the `import` statement, each script you want to run should have a `main()`
