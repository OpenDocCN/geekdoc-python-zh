    \ marks, so Python treats it as a variable name rather than literal text:\n\n\
    ```\n# Put Wanda in a variable named user_name.\nuser_name = \"Wanda\"\n# Display\
    \ the contents of the user_name variable.\nprint(user_name)\n```\n\nWhen you want\
    \ to display both literal text and variable data in output, you can use a formatted\
