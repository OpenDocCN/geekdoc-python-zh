- md: "## Resizing images\n\nThe resize method handles resizing of images. It accepts\
    \ four parameters: self, width, height, and output_suffix. The self parameter\
    \ is the image being resized. The width and height parameters are integers specifying\
    \ the width and height to which to resize. You can set just the width or just\
    \ the height, set the opposite side to None to resize along one dimension, and\
    \ automatically calculate the opposite side's size to maintain the image aspect\
    \ ratio.\n\nThe optional output suffix parameter adds `_resized` to the filename\
    \ of the resized image, so the original file retains its original filename. If\
    \ you want to use some word other than `_resized` as the addition to the name,\
    \ you can pass that as a string to override the default:\n\n```python\ndef resize(self,\
    \ width, height, output_suffix=\"_resized\"):\n```\n\nMuch of the code in the\
    \ function is for calculating the image size. To retain the aspect ratio, you\
    \ specify only width or height. As usual, there's also some exception handling.\
    \ The actual resizing of the image and saving the resized image happens in this\
    \ code:\n\n```python\n# Perform resize\nresized_image = img.resize((new_width,\
    \ new_height), Image.Resampling.LANCZOS)\noutput_path = self._get_output_path(image_path,\
    \ output_suffix)\ntry:\n    resized_image.save(output_path)\n```\n\nThe `LANCZOS`\
    \ in the code is a reference to a high-quality image resampling method invented\
    \ by Hungarian mathematician Cornelius Lanczos. Pillow offers other methods including\
    \ `BICUBIC`, `BILINEAR`, `BOX`, `HAMMING`, and `NEAREST`.\n\n## Rotating images\n\
    \nThe method to rotate an image accepts three parameters: `self` (a reference\
    \ to the image being rotated), `degrees`, and an integer indicating how many degrees\
    \ to rotate the image. The optional `output_suffix` parameter lets you specify\
    \ text to add to the filename of the rotated image to differentiate the rotated\
    \ image from the original image. The default is `_rotated` if no other value is\
    \ passed:\n\n```python\ndef rotate(self, degrees, output_suffix=\"_rotated\"):\n\
    ```\n\nRotating and saving the image is handled by the following line:\n\n```python\n\
    rotated_image = img.rotate(degrees, expand=True)\n```\n\nAdding `expand=True`\
    \ ensures the image is enlarged enough, if needed, to avoid cropping. The rotated\
    \ image is then stored in an object named `rotated_image`. The next two lines\
    \ add the output suffix to the filename, and then save the rotated image object\
    \ to that filename. Then some text prints to provide feedback on the screen, or\
    \ an error message if any unforeseen exceptions prevent saving the file:\n\n```python\n\
    output_path = self._get_output_path(image_path, output_suffix)\ntry:\n    rotated_image.save(output_path)\n\
    \    print(f\"Rotated image saved to: {output_path}\")\nexcept (PermissionError,\
    \ OSError) as e:\n    print(f\"Error saving rotated image {output_path}: {e}\"\
    )\n```\n\nThat's the basic code for rotating and saving an image.\n\n## Flipping\
    \ images\n\nThe method to flip an image accepts three parameters. The `self` parameter\
    \ refers to the image being flipped. The `direction` parameter can be either \"\
    horizontal\" or \"vertical\"; it defaults to \"horizontal\" if nothing is passed\
    \ in. The `output_suffix` is the text to add to the filename of the flipped image,\
    \ and it defaults to `_flipped` if no parameter value is passed:\n\n```python\n\
    def flip(self, direction=\"horizontal\", output_suffix=\"_flipped\"):\n```\n\n\
    Within the method, this code flips the image horizontally or vertically, depending\
    \ on the value of the direction parameter, or generates an error if some unknown\
    \ value was passed in:\n\n```python\nwith Image.open(image_path) as img:\n   \
    \ if direction.lower() == \"horizontal\":\n        flipped_image = img.transpose(Image.FLIP_LEFT_RIGHT)\n\
    \    elif direction.lower() == \"vertical\":\n        flipped_image = img.transpose(Image.FLIP_TOP_BOTTOM)\n\
    \    else:\n        raise ValueError(\"Direction must be 'horizontal' or 'vertical'\"\
    )\n\n    output_path = self._get_output_path(image_path, output_suffix)\n    try:\n\
    \        flipped_image.save(output_path)\n        print(f\"Flipped image saved\
    \ to: {output_path}\")\n```\n\nIn the preceding code, `image.transpose()` is the\
    \ Pillow method that does the actual flipping. That one line of code is all it\
    \ takes to flip the image, before subsequent code saves the flipped image with\
    \ the output suffix added to the filename.\n\n## Cropping images\n\nThe method\
    \ to crop an image accepts up to six parameters. The `self` parameter refers to\
    \ the image being cropped. The `left`, `top`, `right`, and `bottom` parameters\
    \ are integers specifying the number of pixels to trim from each side of the image.\
    \ The optional `output_suffix` specifies the text to add to the filename of the\
    \ cropped image; use `_cropped` if you don't pass a different value:\n\n```python\n\
    def crop(self, left, top, right, bottom, output_suffix=\"_cropped\"):\n```\n\n\
    The actual cropping of the image is simple in Pillow. It's performed with this\
    \ one line:\n\n```python\ncropped_image = img.crop((left, top, right, bottom))\n\
    output_path = self._get_output_path(image_path, output_suffix)\ntry:\n    cropped_image.save(output_path)\n\
    \    print(f\"Cropped image saved to: {output_path}\")\nexcept (PermissionError,\
    \ OSError) as e:\n    print(f\"Error saving cropped image {output_path}: {e}\"\
    )\n```\n\nThe Pillow module works with raster images, which have extensions like\
    \ `.bmp`, `.gif`, `.jpeg`, `.jpg`, `.png`, `.psd`, `.raw`, `.tif`, `.tiff`, and\
    \ `.webp`. It won't work with vector images, which have extensions like `.ai`,\
    \ `.cdr`, `.eps`, `.pdf`, and `.svg`.\n\nThis script provides four methods for\
    \ processing any number of images:\n\n- `crop()`: Crops image using specified\
    \ coordinates\n- `flip()`: Flips image horizontally or vertically\n- `resize()`:\
    \ Changes image dimensions\n- `rotate()`: Rotates image by specified degrees\n\
    \nEach operation is defined in its own method. This script uses `pathlib` to walk\
    \ directories that contain the files to process.\n\nBecause we've defined a class\
    \ for the script, the functions defined with the `def` keyword are treated as\
    \ methods and called using the `.methodname()` syntax.\n\n```python\ndef main():\n\
    \    try:\n        # Replace with your directory path.\n        input_directory\
    \ = r\"C:\\Users\\Alan\\Documents\\Practice\\Img Process\"\n        # Mac path\
    \ example\n        #input_directory = \"/Users/alan/Practice/Img Process\"\n \
    \       # True to include subdirectories\n        recursive = True\n        #\
    \ Define as tuple inside parentheses. Must be raster image types.\n        file_types=(\"\
    *.jpg\", \"*.jpeg\", \"*.png\", \"*.webp\")\n\n        # Create processor instance\
    \ with custom parameters.\n        processor = ImageProcessor(input_directory,\
    \ recursive, file_types)\n\n        # Perform various operations on all matching\
    \ images.\n        # Comment out any operation you don't want to perform.\n  \
    \      # Resize to 512px width, auto height\n        processor.resize(width=512,\
    \ height=None)\n        # Resize to 512px height, auto width.\n        # processor.resize(width=None,\
    \ height=512)\n        # Resize to exactly 512x512.\n        # processor.resize(width=512,\
    \ height=512)\n        # Rotate 90 degrees.\n        processor.rotate(90)\n  \
    \      # Flip horizontally.\n        processor.flip(\"horizontal\")\n        #\
    \ Flip vertically.\n        processor.flip(\"vertical\")\n        # Crop to 256x256\
    \ from (100,100).\n        processor.crop(100, 100, 356, 356)\n\n    except (FileNotFoundError,\
    \ PermissionError, OSError) as e:\n        print(f\"Error in main execution: {e}\"\
    )\n        return\n\nif __name__ == \"__main__\":\n    main()\n```\n\nObviously,\
    \ that's a lot of code! However, much of it is for walking the directory tree\
    \ and catching unforeseen errors. In the following sections, I focus on the code\
    \ that does the actual work of modifying images."
  mdcn: "## 调整图像大小\n\n`resize` 方法处理图像的大小调整。它接受四个参数：`self`、`width`、`height` 和 `output_suffix`。`self`\
