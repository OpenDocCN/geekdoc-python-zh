  md: "Sometimes `if...else` may not be enough, because there are more than two possible\
    \ outcomes. That's where the `elif` statement comes into play. As you may have\
    \ guessed, `elif` is short for `else if`. Each `elif` statement can have its own\
    \ condition that proves either `True` or `False`. The final `else` statement only\
    \ executes if none of the `elif` conditions proves `True`.\n\nOnce again, indentations\
    \ are critical for the code to work properly. As soon as one `if` or `elif` statement\
    \ proves `True`, no other conditions are considered. Code execution resumes at\
    \ the next un-indented line under the `if...elif...else` block. Here's an example:\n\
    \n```\n# Define a variable named score and give it a numeric value between 0 and\
    \ 100.\nscore = 92\n# Assign a letter grade to the score based on the following\
    \ rules:\nif score >= 90:\n    print(\"Grade: A\")\nelif score >= 80:\n    print(\"\
    Grade: B\")\nelif score >= 70:\n    print(\"Grade: C\")\nelif score >= 60:\n \
    \   print(\"Grade: D\")\nelse:\n    print(\"You have failed the exam.\")\n\n#\
    \ The following code is outside the if...elif...else block.\nprint(\"Thanks for\
    \ playing!\")\n```\n\nWhen executed, only the `if` or one `elif` or the `else`\
    \ statement will execute. The last line of code isn't indented under `else` so\
