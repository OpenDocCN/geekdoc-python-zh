    \ than it needs to be. This next function performs the exact same task as the\
    \ previous one, using a single line of code within the function:\n\n```python\n\
    def calculate_average(numbers):\n    return sum(numbers) / len(numbers)\n```\n\
    \nThe beauty of the last example is that it simply returns the sum of the numbers\
    \ passed in by the length of the numbers list, and the code makes that clear without\
    \ even using any comments.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_337_0.png)\n\
    \nYou can think of code as basically an electrical circuit expressed in words.\
    \ For readability, think in terms of making those words easy for a human to read\
    \ rather than easy for a computer to read.\n\n## Special Cases Aren’t Special\
    \ Enough to Break the Rule\n\nThis principle emphasizes consistency in coding\
    \ practices, even when you’re tempted to make exceptions for unique situations.\
    \ It urges beginning programmers to stick to established rules, conventions, or\
    \ patterns in their code, even when a specific situation feels like it deserves\
    \ a unique solution. In programming, consistency makes code easier to read, maintain,\
    \ and debug.\n\nIn its simplest form, this includes following basic naming conventions,\
    \ like *snake case* for all variable names (all lowercase letters, underscores\
    \ in place of spaces). For example, you could easily make up some variables names\
    \ on the fly, as follows, and your code would run perfectly fine:\n\n```python\n\
    Dog-Name = \"Buddy\"\nCAT_AGE = 3\nsnakeLength = 5.2\n```\n\nIn the long run,\
    \ your code will be easier to read and understand if you always stick to the snake\
    \ case convention, like this:\n\n```python\ndog_name = \"Buddy\"\ncat_age = 3\n\
    snake_length = 5.2\n```\n\nThere's a general rule in Python that a function should\
    \ always return a consistent data type, such as always returning an integer or\
    \ always returning a string. Often when writing functions, people are tempted\
    \ to take the lazy route for handling errors, and just return an error message\
    \ (string) if the data passed into a function is no good. For example, the following\
    \ `square()` function will return a number, squared, as long as you pass in a\
    \ positive number. But if you pass in a negative number, the function returns\
    \ a string containing the error message:\n\n```python\ndef square(num):\n    if\
    \ num < 0:\n        return \"Negative numbers not allowed\"  # Special case\n\
    \    return num * num\n```\n\nThe preferred way to handle this sort of thing is\
    \ to always use exception handling, where the function raises an error instead\
    \ of returning a string.\n\n```python\ndef square(num):\n    if num < 0:\n   \
    \     raise ValueError(\"Negative numbers not allowed\")\n    return num * num\n\
    ```\n\nNow the code is consistent with Python's built-in functions: It either\
    \ returns a valid, consistent data type, or it raises an error when it can't.\
    \ You can use a `try...except` block to call the function and handle any errors,\
    \ as follows:\n\n```python\nif __name__ == \"__main__\":\n    number = -9\n  \
    \  try:\n        print(f\"{number} squared is {square(number)}\")\n    except\
    \ Exception as e:\n        print(f\"Error: {e}\")\n```\n\nThis approach matches\
    \ the kind of error handling you see throughout this book. The function consistently\
    \ returns a number (when it can); otherwise, it returns an error with an explanation\
    \ of what caused the error. Then the script ends gracefully with no additional\
    \ error messages.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_338_0.png)\n\nThe\
    \ PEP 8 guidelines basically define the rules you don't want to break. When you\
    \ need a quick summary, ask any AI to summarize the PEP 8 guidelines.\n\n## Practicality\
    \ Beats Purity\n\nThis principle emphasizes that real-world usability and effectiveness\
    \ should take precedence over rigid adherence to idealized rules, standards, or\
    \ theoretical perfection. In other words, when you're faced with a choice between\
    \ a “pure” or theoretically correct solution and a practical one that gets the\
    \ job done efficiently, the practical approach is preferred. Here's a summary:\n\
    \n> » **Purity** refers to following strict rules, conventions, or theoretical\
    \ ideals, such as adhering to a specific design pattern, enforcing type safety\
    \ everywhere, or writing code that is academically “perfect.”\n>\n> » **Practicality**\
    \ focuses on what works best given constraints like time, resources, readability,\
    \ or project requirements, even if it means bending rules or using less “elegant”\
    \ approaches.\n\nA common mistake in this realm is trying to use a class, in honor\
    \ of object-oriented programming (OOP), to make the code look more modern, even\
    \ when a simple procedural approach (a function) is simpler and more straightforward\
    \ for the task at hand. For example, here's a class named `DataProcessor` that\
    \ returns a list of numbers with each number squared:\n\n```python\n# Purist approach:\
    \ Define a class\nclass DataProcessor:\n    def __init__(self, data):\n      \
    \  self.data = data\n\n    def process(self):\n        return [x * 2 for x in\
    \ self.data]\n```\n\nThere's nothing wrong with OOP. The code works fines, as\
    \ shown, and an OOP purist would likely see that as the “correct” way to write\
    \ the code. To use the class, a programmer would first need to create a `DataProcessor`\
    \ object and then calculate a result:\n\n```python\nprocessor = DataProcessor([1,\
    \ 2, 3])\nresult = processor.process()\n```\n\nPython supports OOP programming,\
    \ but it doesn't demand you use it. Here, a function would likely be a cleaner,\
    \ simpler approach involving less code and complexity:\n\n```python\ndef process_data(data):\n\
    \    return [x * 2 for x in data]\n```\n\nUsing a simple function removes the\
    \ added step of instantiating an object first. You can get a result with a single\
    \ line of code:\n\n```python\nresult = process_data([1, 2, 3])\n```\n\nThe latter\
    \ approach is more practical and avoids the “purity” of trying to strictly follow\
    \ a paradigm like OOP.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_340_0.png)\n\
    \nUsing classes makes sense when creating application programming interfaces (APIs)\
    \ and larger modules that involve a lot of data input and output. There would\
    \ be nothing impractical about using a class that way. This principle is more\
    \ about using classes for small, general procedures that are easily handled with\
    \ simple functions.\n\n## Errors Should Never Pass Silently\n\nMost of the scripts\
    \ you see in this book use considerable exception handling to prevent unforeseen\
    \ problems from causing a program to crash unexpectedly. This principle emphasizes\
    \ writing robust, reliable programs that always handle errors properly and gracefully.\
    \ In other words, a script should always alert the user to any error condition\
    \ in a way that allows the user (or a programmer, if you’re still writing the\
    \ code) to remedy the situation.\n\nPerhaps the best way to explain this is with\
    \ a super simple example where a script just asks for two numbers and then returns\
    \ the result of the first number divided by the second number:\n\n```python\n\
    # Bad example: Ignoring errors\nnumber1 = float(input(\"Enter the first number:\
    \ \"))\nnumber2 = float(input(\"Enter the second number: \"))\nresult = number1\
    \ / number2  # This crashes if number2 is 0.\nprint(f\"Result: {result}\")\n```\n\
    \nThe script works fine, as long as the user enters two valid numbers and the\
    \ second number isn’t zero — but that’s not the Pythonic way. There are two possible\
    \ error conditions here: The user doesn’t enter two valid numbers, or the user\
    \ enters a zero for the divisor number. Here’s the same code with exception handling\
    \ added to gracefully handle both kinds of errors:\n\n```python\ntry:\n    number1\
    \ = float(input(\"Enter the first number: \"))\n    number2 = float(input(\"Enter\
    \ the second number: \"))\n    result = number1 / number2\n    print(f\"Result:\
    \ {result}\")\nexcept ZeroDivisionError:\n    print(\"Error: You cannot divide\
    \ by zero!\")\nexcept ValueError:\n    print(\"Error: Please enter valid numbers!\"\
    )\n```\n\nCatching and explaining each potential error prevents the script from\
    \ crashing with an obscure error message.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_341_0.png)\n\
    \nChapter 17 covers many common Python errors and includes examples of using exception\
    \ handling to manage those errors.\n\nLet's look at another example. Here's some\
    \ code to open a file named sample_data.csv (in the same folder as the script).\
    \ It does not handle potential errors.\n\n```python\n# Bad example: Ignoring errors\n\
    file_name = \"sample_data.csv\"\nwith open(file_name, 'r') as file:\n    content\
    \ = file.read()\nprint(content)\n```\n\nThis script, like any script that accesses\
    \ external files, is prone to problems where the file doesn't exist at the specified\
    \ location, or the script needs to write something to a file but doesn't have\
    \ sufficient permissions from the operating system. Adding some basic exception\
    \ handling to the script solves both problems, informing the user exactly what\
    \ will happen if the script is unable to perform its task:\n\n```python\ntry:\n\
    \    file_name = \"sample_data.csv\"\n    with open(file_name, 'r') as file:\n\
    \        content = file.read()\n    print(content)\nexcept FileNotFoundError:\n\
    \    print(f\"Error: The file '{file_name}' was not found!\")\nexcept PermissionError:\n\
    \    print(\"Error: You don't have permission to read this file!\")\n```\n\nIf\
    \ you're a beginning programmer, take some time to learn about exception handling,\
    \ and especially the more common exceptions. Chapter 3 describes the basics of\
    \ exception handling. Chapter 17 lists the ten most common error messages and\
    \ includes examples of using exception handling to prevent such errors from crashing\
    \ your code."
  mdcn: "尽管那段代码在命名上很清晰，但它比实际需要的要长得多。接下来的这个函数执行与前一个完全相同的任务，但函数内部只用了一行代码：\n\n```python\n\
    def calculate_average(numbers):\n    return sum(numbers) / len(numbers)\n```\n\
    \n最后一个例子的精妙之处在于，它直接返回传入数字的总和除以数字列表的长度，代码本身就很清晰，甚至不需要任何注释。\n\n![](img/10d8e89b301a0e7452bff4d402265e78_337_0.png)\n\
    \n你可以把代码想象成基本上是用文字表达的电路。为了可读性，应该考虑让这些文字对人类来说易于阅读，而不是对计算机来说易于阅读。\n\n## 特殊情况不足以打破规则\n\
    \n这个原则强调编码实践的一致性，即使你很想为独特的情况破例。它敦促初级程序员坚持使用既定的规则、惯例或模式，即使特定情况感觉值得一个独特的解决方案。在编程中，一致性使代码更易于阅读、维护和调试。\n\
    \n其最简单的形式包括遵循基本的命名约定，例如对所有变量名使用*蛇形命名法*（所有小写字母，用下划线代替空格）。例如，你可以临时编造一些变量名，如下所示，你的代码也能完美运行：\n\
    \n```python\nDog-Name = \"Buddy\"\nCAT_AGE = 3\nsnakeLength = 5.2\n```\n\n从长远来看，如果你始终遵循蛇形命名法约定，你的代码将更容易阅读和理解，如下所示：\n\
    \n```python\ndog_name = \"Buddy\"\ncat_age = 3\nsnake_length = 5.2\n```\n\nPython\
    \ 中有一个通用规则，即函数应始终返回一致的数据类型，例如总是返回整数或总是返回字符串。在编写函数时，人们常常倾向于采取懒惰的方式来处理错误，如果传入函数的数据有问题，就直接返回一条错误消息（字符串）。例如，下面的\
    \ `square()` 函数只要传入一个正数，就会返回该数的平方。但如果你传入一个负数，函数会返回一个包含错误消息的字符串：\n\n```python\n\
    def square(num):\n    if num < 0:\n        return \"Negative numbers not allowed\"\
    \  # 特殊情况\n    return num * num\n```\n\n处理这类情况的首选方法是始终使用异常处理，即函数在无法处理时引发错误，而不是返回字符串。\n\
    \n```python\ndef square(num):\n    if num < 0:\n        raise ValueError(\"Negative\
    \ numbers not allowed\")\n    return num * num\n```\n\n现在代码与 Python 的内置函数保持一致：它要么返回一个有效的、一致的数据类型，要么在无法处理时引发错误。你可以使用\
    \ `try...except` 块来调用该函数并处理任何错误，如下所示：\n\n```python\nif __name__ == \"__main__\"\
    :\n    number = -9\n    try:\n        print(f\"{number} squared is {square(number)}\"\
    )\n    except Exception as e:\n        print(f\"Error: {e}\")\n```\n\n这种方法与你在本书中看到的错误处理方式一致。该函数始终返回一个数字（当它能处理时）；否则，它会返回一个错误并解释导致错误的原因。然后脚本优雅地结束，没有额外的错误消息。\n\
    \n![](img/10d8e89b301a0e7452bff4d402265e78_338_0.png)\n\nPEP 8 指南基本上定义了你不想打破的规则。当你需要快速总结时，可以请任何\
    \ AI 总结 PEP 8 指南。\n\n## 实用性胜于纯粹性\n\n这个原则强调，现实世界的可用性和有效性应优先于严格遵守理想化的规则、标准或理论上的完美。换句话说，当你面临在“纯粹的”或理论上正确的解决方案与能高效完成工作的实用解决方案之间做出选择时，更倾向于实用的方法。总结如下：\n\
    \n> » **纯粹性**指的是遵循严格的规则、惯例或理论理想，例如坚持特定的设计模式、在所有地方强制类型安全，或编写学术上“完美”的代码。\n>\n> »\
    \ **实用性**关注的是在给定时间、资源、可读性或项目要求等约束下最有效的方法，即使这意味着需要变通规则或使用不那么“优雅”的方法。\n\n在这个领域的一个常见错误是，为了尊重面向对象编程（OOP），试图使用类来使代码看起来更现代，即使对于手头的任务，简单的过程式方法（一个函数）更简单、更直接。例如，这里有一个名为\
    \ `DataProcessor` 的类，它返回一个数字列表，其中每个数字都被平方：\n\n```python\n# 纯粹主义者的方法：定义一个类\nclass\
    \ DataProcessor:\n    def __init__(self, data):\n        self.data = data\n\n\
    \    def process(self):\n        return [x * 2 for x in self.data]\n```\n\nOOP\
    \ 本身没有问题。代码运行良好，如所示，OOP 纯粹主义者可能会认为这是编写代码的“正确”方式。要使用这个类，程序员首先需要创建一个 `DataProcessor`\
    \ 对象，然后计算结果：\n\n```python\nprocessor = DataProcessor([1, 2, 3])\nresult = processor.process()\n\
    ```\n\nPython 支持 OOP 编程，但它并不要求你必须使用它。在这里，使用函数可能是一种更清晰、更简单的方法，涉及更少的代码和复杂性：\n\n\
    ```python\ndef process_data(data):\n    return [x * 2 for x in data]\n```\n\n\
    使用简单的函数消除了首先实例化对象的额外步骤。你可以用一行代码得到结果：\n\n```python\nresult = process_data([1, 2,\
    \ 3])\n```\n\n后一种方法更实用，避免了试图严格遵循像 OOP 这样范式的“纯粹性”。\n\n![](img/10d8e89b301a0e7452bff4d402265e78_340_0.png)\n\
    \n在创建涉及大量数据输入和输出的应用程序编程接口（API）和大型模块时，使用类是有意义的。那样使用类没有什么不切实际的。这个原则更多是关于将类用于那些用简单函数就能轻松处理的小型通用过程。\n\
    \n## 错误绝不应被静默忽略\n\n你在本书中看到的大多数脚本都使用了大量的异常处理，以防止不可预见的问题导致程序意外崩溃。这个原则强调编写健壮、可靠的程序，始终正确且优雅地处理错误。换句话说，脚本应始终以一种允许用户（或程序员，如果你仍在编写代码）补救情况的方式提醒用户任何错误状况。\n\
    \n也许解释这一点的最好方法是一个超级简单的例子，其中脚本只是要求输入两个数字，然后返回第一个数字除以第二个数字的结果：\n\n```python\n# 错误示例：忽略错误\n\
    number1 = float(input(\"Enter the first number: \"))\nnumber2 = float(input(\"\
    Enter the second number: \"))\nresult = number1 / number2  # 如果 number2 为 0，这会崩溃。\n\
    print(f\"Result: {result}\")\n```\n\n只要用户输入两个有效的数字且第二个数字不是零，这个脚本就能正常工作——但这并不是\
    \ Python 的方式。这里有两个可能的错误情况：用户没有输入两个有效的数字，或者用户输入的除数是零。以下是添加了异常处理以优雅处理这两种错误的相同代码：\n\
    \n```python\ntry:\n    number1 = float(input(\"Enter the first number: \"))\n\
    \    number2 = float(input(\"Enter the second number: \"))\n    result = number1\
    \ / number2\n    print(f\"Result: {result}\")\nexcept ZeroDivisionError:\n   \
    \ print(\"Error: You cannot divide by zero!\")\nexcept ValueError:\n    print(\"\
    Error: Please enter valid numbers!\")\n```\n\n捕获并解释每个潜在错误可以防止脚本因晦涩的错误消息而崩溃。\n\n\
    ![](img/10d8e89b301a0e7452bff4d402265e78_341_0.png)\n\n第 17 章涵盖了许多常见的 Python 错误，并包括使用异常处理来管理这些错误的示例。\n\
    \n让我们看另一个例子。这是一些打开名为 sample_data.csv 的文件（与脚本在同一文件夹中）的代码。它没有处理潜在的错误。\n\n```python\n\
    # 错误示例：忽略错误\nfile_name = \"sample_data.csv\"\nwith open(file_name, 'r') as file:\n\
    \    content = file.read()\nprint(content)\n```\n\n这个脚本，就像任何访问外部文件的脚本一样，容易出现问题，例如文件在指定位置不存在，或者脚本需要写入某些内容但没有操作系统授予的足够权限。在脚本中添加一些基本的异常处理可以解决这两个问题，准确地告知用户如果脚本无法执行任务会发生什么：\n\
    \n```python\ntry:\n    file_name = \"sample_data.csv\"\n    with open(file_name,\
    \ 'r') as file:\n        content = file.read()\n    print(content)\nexcept FileNotFoundError:\n\
    \    print(f\"Error: The file '{file_name}' was not found!\")\nexcept PermissionError:\n\
    \    print(\"Error: You don't have permission to read this file!\")\n```\n\n如果你是初级程序员，花些时间学习异常处理，特别是更常见的异常。第\
    \ 3 章描述了异常处理的基础知识。第 17 章列出了十种最常见的错误消息，并包括使用异常处理来防止此类错误导致代码崩溃的示例。"
