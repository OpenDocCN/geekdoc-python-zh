    \       total = total_with_tax(total_sale, tax_rate)\n        print(f\"The total\
    \ price with tax is: {total:.2f}\")\n    except ValueError:\n        print(\"\
    Invalid input. Please enter numeric values for price and tax rate.\")\n    except\
    \ TypeError as e:\n        print(e)\n```\n\n## IndexError\n\nIn Python, an IndexError\
    \ occurs when you try to access an element in a sequence (like a list, tuple,\
    \ or string) using an index that’s out of range. In simpler terms, you’re trying\
    \ to reach a position that doesn’t exist in the sequence. For example, let’s say\
    \ you have a list of five items, and your code asks for the sixth item. Python\
    \ will throw an IndexError exception because there is no sixth item.\n\nIn Python\
    \ (and most programming languages), the first item in a list is always item 0\
    \ (zero), not 1 (one). We humans don’t usually think that way. For example, you\
    \ may think the following code is perfectly legitimate:\n\n```python\nfruits =\
    \ ['Apple', 'Banana', 'Cherry']\nprint(fruits[3])\n```\n\nRunning that code produces\
    \ the following error message:\n\n```\nIndexError: list index out of range\n```\n\
    \nYou would expect `fruits[3]` to be `Cherry`, the third item in the list. But\
    \ that's not how Python sees it. Python sees it like this:\n\n```python\nfruits[0]\
    \ = 'Apple'\nfruits[1] = 'Banana'\nfruits[2] = 'Cherry'\n```\n\nThere is no `fruits[3]`\
    \ as far as Python is concerned. That's why the code generates an error.\n\nOne\
    \ way to get around that problem is to try to avoid using loops with `range()`\
    \ or some other kind of counter when working with a list. The simplest way to\
    \ loop through a list using this syntax, which will never encounter an `IndexError`\
    \ (because it repeats once for each item in the list and knows to start at 0)\
    \ is as follows:\n\n```python\nfruits = ['Apple', 'Banana', 'Cherry']\nfor fruit\
    \ in fruits:\n    print(fruit)\n```\n\nYou can do that more compactly using list\
    \ comprehension like this:\n\n```python\nfruits = ['Apple', 'Banana', 'Cherry']\n\
    [print(fruit) for fruit in fruits]\n```\n\nIf you need to keep a counter going\
    \ as you're moving through a list, you can use Python enumeration, which allows\
    \ you to automatically assign a number to each item in a list. For example, look\
    \ at this code:\n\n```python\nmy_list = ['apple', 'banana', 'cherry']\nfor index,\
    \ value in enumerate(my_list, start=1):\n    print(f\"Index: {index}. {value}\"\
    )\n```\n\nThe syntax here uses a `for` loop with the name `index` (which is a\
    \ counter), and `value` (an item from the list). The word `enumerate` lets Python\
    \ know you want `index` to be a counter. The name `my_list` is a reference to\
    \ the original list. The `start=1` lets Python know you want to start counting\
    \ at 1. The output from that is:\n\n```\n1. apple\n2. banana\n3. cherry\n```\n\
    \nPython (and most other programming languages) start lists at 0 rather than 1,\
    \ because it's more efficient for computers to handle lists that way. If you use\
    \ enumeration without `start=1`, items will be numbered starting at 0.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_349_0.png)\n\
    \n## KeyError\n\nIn Python, a `KeyError` happens when you try to access a key\
    \ in a dictionary that doesn't exist. Think of a dictionary like a real-world\
    \ dictionary: You look up a word (the `key`) to find its definition (the `value`).\
    \ If the word isn't in the dictionary, you get nothing. In Python, trying to access\
    \ a nonexistent key raises a `KeyError`.\n\nHere's a simple example where a dictionary\
    \ named `my_dict` contains two keys — one named \"name\" and the other named \"\
    age\". Each of those keys has a value assigned to it — \"Annabelle\" for \"name\"\
    , and 65 for \"age\". That code is then followed by three `print` statements attempting\
    \ to display data from the dictionary:\n\n```python\n# A simple dictionary\nmy_dict\
    \ = {\"name\": \"Annabelle\", \"age\": 65}\n\nprint(my_dict[\"name\"])\nprint(my_dict[\"\
    age\"])\nprint(my_dict[\"gender\"])\n```\n\nRunning that code produces the following\
    \ output:\n\n```\nAnnabelle\n65\n...\nKeyError: 'gender'\n```\n\nThe `KeyError`\
    \ happens because there is no key named \"gender\", just keys named \"name\" and\
    \ \"age\".\n\nIf you're working with keys that are generated by other code, you\
    \ don't always have great control over the dictionaries. You can use the `.get()`\
    \ method to request a key value and specify a default if the key doesn't exist.\
    \ That way, you always get some value for a key and don't risk crashing the entire\
    \ script. Here's a modified version of the code, where the \"gender\" value becomes\
    \ \"not specified\" if the \"gender\" key is missing.\n\n```python\n# A simple\
    \ dictionary\nmy_dict = {'name': 'Annabelle', 'age': 65}\n\nprint(my_dict['name'])\n\
    print(my_dict['age'])\nprint(my_dict.get('gender', 'not specified'))\n```\n\n\
    Now take a look at the following code:\n\n```python\n# A simple dictionary\nmy_dict\
    \ = {'name': 'Annabelle', 'age': 65}\n\nprint(my_dict[name])\nprint(my_dict[age])\n\
    ```\n\nAt first glance, that code may look perfectly fine. But running it produces\
    \ a NameError. Why? Because the `print` statements treat `name` and `age` as variable\
    \ names (no quotation marks), not key names. You can easily fix that error by\
    \ adding quotation marks:\n\n```python\nprint(my_dict['name'])\nprint(my_dict['age'])\n\
    ```\n\nIf you're working with a lot of imported JavaScript Object Notation (JSON)\
    \ data that isn't always as reliable as you'd like, and you want to catch `KeyError`\
    \ with a `try...except` block, you can use the standard syntax for `try...except`,\
    \ instead of defaulting to some other value:\n\n```python\n# A simple dictionary\n\
    my_dict = {'name': 'Annabelle', 'age': 65}\n\nprint(my_dict['name'])\nprint(my_dict['age'])\n\
    try:\n    print(my_dict['gender'])\nexcept KeyError:\n    print('No gender specified')\n\
    ```\n\nThis is useful when you expect a key may be missing and you want to handle\
    \ the error without crashing your program and without presuming a default value\
    \ for the missing key.\n\n## AttributeError\n\nIn Python, an `AttributeError`\
    \ occurs when you try to access or use an attribute (method or property) that\
    \ doesn't exist on an object. In Python, objects have attributes (data) and methods\
    \ (functions) associated with their class. Common causes of errors include the\
    \ following:\n\n- Misspelling an attribute or method name\n- Accessing an attribute\
    \ that doesn't exist for the object's type\n- Using a method or attribute on the\
    \ wrong type of object\n- Forgetting to initialize an attribute in a class\n\n\
    Here's a super-simple example of creating a list and then trying to add another\
    \ item to the list:\n\n```python\nmy_list = [1, 2, 3]\nmy_list.add(4)\n```\n\n\
    Running that code generates the following error message:\n\n```\nAttributeError:\
    \ 'list' object has no attribute 'add'\n```\n\nIn other words, you can't use the\
    \ word `add`. The attribute for adding a new item to a list is `append()`. So,\
    \ correcting the error in this case is a simple matter of changing `add` to `append`,\
    \ as follows:\n\n```python\nmy_list = [1, 2, 3]\nmy_list.append(4)\n```\n\nIn\
    \ Python, you can create your own classes, with attributes of your own choosing.\
    \ Here's an example of a custom class I've created named `Car`. Each instance\
    \ of a `Car` object can have `make`, `model`, and `year` attributes:\n\n```python\n\
    class Car:\n    def __init__(self, make, model, year):\n        self.make = make\n\
    \        self.model = model\n        self.year = year\n```\n\nWith that code,\
    \ you can create objects using a syntax like `my_car = Car(\"Toyota\", \"Camry\"\
    , 2020)`. Let's say you then try to execute this command:\n\n```python\nprint(f\"\
    My car is a {my_car.year} {my_car.make} {my_car.modal}.\")\n```\n\nThat code would\
    \ fail with the following error message:\n\n```\nAttributeError: 'Car' object\
    \ has no attribute 'modal'. Did you mean: 'model'?\n```"
