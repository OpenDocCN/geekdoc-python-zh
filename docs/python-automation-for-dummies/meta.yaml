    \ 'dict'>` in the output tells you that the data read from the file is in a Python\
    \ dictionary. Subsequent `print` statements display individual items of data from\
    \ the dictionary.\n\n# Understanding REST APIs\n\nMost modern APIs today are Representational\
    \ State Transfer (REST) APIs, all of which follow the same standards and rules\
    \ for accessing information via the internet. REST APIs use the Hypertext Transfer\
    \ Protocol (HTTP), the same as all websites, to allow a *client* (your Python\
