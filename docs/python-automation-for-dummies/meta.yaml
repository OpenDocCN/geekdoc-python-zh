    # Using APScheduler with dates and times


    One big advantage APScheduler has over schedule is the ability to specify dates
    and times for running tasks, rather than just intervals. To do this, use the cron
    keyword in place of interval. The syntax is as follows:


    ```

    scheduler.add_job(job, ''cron'', [year=], [month=], [day=], [week=], [day_of_week=],
    [hour=], [minute=], [second=], [start_date=], [end_date=], [timezone=], [jitter=],
    **kwargs)

    ```


    You can omit any parameters in square brackets that you don''t need. Examples
    are probably the easiest way to understand how to phrase things, so I''ll show
    you a bunch of them next.


    Here''s a line of code to run a job every day at 8:00 AM:


    ```

    scheduler.add_job(job, ''cron'', hour=8, minute=0)

    ```


    If you want to run a job several times an hour, you can use */ with minute= to
    specify an interval. For example, here''s a line of code that will run a job every
    15 minutes:


    ```

    scheduler.add_job(job, ''cron'', minute=''*/15'')

    ```


    Here''s one that runs a job once a week, every Wednesday at noon:


    ```

    scheduler.add_job(my_job, ''cron'', day_of_week=''wed'', hour=12)

    ```


    ![](img/10d8e89b301a0e7452bff4d402265e78_279_0.png)


    When you''re using the day_of_week parameter, you can use either numbers (0 through
    6, where 0 is Sunday), or day name abbreviations in quotation marks (''sun'',
    ''mon'', ''tue'', ''wed'', ''thu'', ''fri'', ''sat'') to specify days. Use commas
    to specify multiple values.'
