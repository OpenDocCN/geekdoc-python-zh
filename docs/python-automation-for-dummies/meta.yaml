    \ the response.\nprint(f\"\\n\\nBot: {response}\\n\")\n\n# Add bot response to\
    \ conversation history.\nconversation_history.append({\"role\": \"assistant\"\
    , \"content\": response})\n\nif __name__ == \"__main__\":\n    # Specify which\
    \ Ollama model to use.\n    model=\"llama3.2\"\n    main(model)\n```\n\nIn this\
    \ script, you can use any Ollama model you’ve already pulled by changing the model\
