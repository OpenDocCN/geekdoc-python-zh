    \n## AttributeError（属性错误）\n\n在 Python 中，当你尝试访问或使用对象上不存在的属性（方法或属性）时，就会发生 `AttributeError`。在\
    \ Python 中，对象具有与其类关联的属性（数据）和方法（函数）。错误的常见原因包括：\n\n- 拼写错误属性或方法名\n- 访问对象类型不存在的属性\n\
    - 在错误类型的对象上使用方法或属性\n- 忘记在类中初始化属性\n\n这是一个超级简单的示例，创建一个列表，然后尝试向列表添加另一个项目：\n\n```python\n\
