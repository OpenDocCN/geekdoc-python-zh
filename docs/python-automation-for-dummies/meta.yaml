  mdcn: "亚马逊、谷歌、Meta、微软、PayPal、Salesforce、Shopify、Stripe、Twilio 以及 X（前身为 Twitter）只是向开发者提供\
    \ REST API 的众多主要科技公司中的一部分。其中许多公司还专门提供用于人工智能的 REST API。提供 REST API 的人工智能领域主要参与者包括\
    \ Anthropic、DeepSeek、Hugging Face、OpenAI、Stability AI、xAI 等。\n\n> 并非所有 REST API\
    \ 都是免费的。不过，许多 API 提供免费套餐，让你可以免费学习和测试你的代码。\n\n任何与 REST API 交互的脚本都可能会用到 `requests`\
    \ 库。它不属于标准库的一部分。当你编写与 REST API 交互的 Python 代码时，请确保创建并激活一个虚拟环境。在终端中输入 `pip install\
    \ requests` 命令。在你的代码中包含 `import requests` 命令。\n\n## 发起 API 请求\n\n当你的 Python 代码从互联网上的\
    \ REST API 请求信息时，就会发生 REST API 请求。每个请求都会得到一个响应，其中包含一个状态码，用于指示请求是成功还是失败。\n\n你可以发起五种主要类型的请求：\n\
    \n| 请求类型 | 功能 |\n|---|---|\n| GET | 从服务器检索数据。GET 仅用于获取信息。这是与人工智能交互时最常见的请求类型。成功时返回状态码\
    \ 200（OK）。 |\n| POST | 向服务器发送数据以创建新资源。POST 通常与数据库一起使用，用于向数据库表中插入新记录。成功时返回状态码 201（Created）。\
    \ |\n| PUT | 用新数据更新现有资源。PUT 通常用于更改数据库表中的记录。成功时返回 200（OK）或 204（No Content）。 |\n\
    | DELETE | 从服务器移除资源。DELETE 通常用于从数据库中删除记录。成功时返回 204（No Content）。 |\n| PATCH | 部分更新资源，例如数据库记录中的单个字段。成功时返回\
    \ 200（OK）或 204（No Content）。 |\n\n> 如果你还不熟悉数据库术语（如表和记录），请不要担心。这些知识对于 Python 或 Python\
    \ 自动化来说并非必需。\n\n没有适用于每个 REST API 请求的硬性规定，但大多数请求至少包含以下一些组件：\n\n- **URL/端点：** 请求发送到的\
    \ URL（例如，https://api.example.com/data）。\n- **请求头（可选）：** 随请求发送的元数据字典，可能包含身份验证令牌或\
    \ API 密钥等内容。\n- **查询参数（可选）：** 附加到 URL 或作为字典传递的键值对（例如，params={\"key\": \"value\"\
    }）。\n- **响应处理：** 处理服务器响应的代码（例如，.json() 用于解析 JSON 或 response.status_code 用于检查是否成功）。\n\
    \nREST API 的文档会告诉你将请求发送到哪个 URL/端点。例如，要获取任何位置的当前天气，请使用 URL https://api.openweathermap.org/data/2.5/weather。\n\
    \n你必须在名为 `appid` 的参数中包含你的 API 密钥。你可以发送许多可选参数。例如，如果你想获取美国某个城市的天气，并且希望温度以华氏度表示，请使用\
    \ `q` 参数指定城市和州，并使用 `units` 参数，其值为 \"imperial\" 表示华氏度。\n\n指定你将发送请求的 URL（如 OpenWeatherMap\
    \ API 文档中所述）。在此示例中，我们假设你已将密钥存储在 .env 文件中，如本章前面“发起 API 请求”部分所示，并将其分配给名称 WEATHER_API_KEY，如下所示：\n\
    \n```\nWEATHER_API_KEY=8c21435c4317367221435aac09bf4c1d\n```\n\n> 示例中显示的 API 密钥并非有效密钥——它只是一个示例。请务必从\
    \ https://openweathermap.org 获取你自己的 API 密钥，并使用该密钥来尝试代码。\n\n这是一个更完整的示例，包含了访问 .env\
    \ 文件所需的 `import os` 和 `load_dotenv` 代码，随后是一个完整的 OpenWeatherMap REST API 请求，并附有大量注释以解释正在发生的事情：\n\
    \n```python\nfrom dotenv import load_dotenv\nimport os\n\n# 加载 .env 文件\nload_dotenv()\n\
    \n# 从环境变量中检索 API 密钥\nAPI_KEY = os.getenv(\"WEATHER_API_KEY\")\n\n# OpenWeatherMap\
    \ API 端点，用于获取当前天气数据\nurl = \"https://api.openweathermap.org/data/2.5/weather\"\
    \n\n# 将参数放入字典中。\nparams = {\n    \"appid\": API_KEY,\n    \"q\": \"San Diego,\
    \ CA USA\",\n    \"units\": \"imperial\"  # 如果需要摄氏度，请改为 \"metric\"\n}\n\n# 使用定义的参数向\
    \ API 端点发送 GET 请求\nresponse = requests.get(url, params=params)\n```\n\n最后一行发送了实际的\
    \ API 请求。来自 API 的响应将被存储在名为 response 的变量中。\n\n## 解析 API 响应\n\n发送 API 请求后，服务器会发送一个响应，通常在几秒内，具体取决于你请求的内容。在上一节的代码中，该响应存储在名为\
    \ `response` 的变量中。假设我在该行代码后添加两个 `print` 语句——一个用于打印响应的数据类型，另一个用于打印实际的响应，如下所示：\n\
    \n```python\nresponse = requests.get(url, params=params)\nprint(type(response))\n\
    print(response)\n```\n\n运行脚本，假设你得到一个有效的响应，将在终端中显示以下内容：\n\n```\n<class 'requests.models.Response'>\n\
    <Response [200]>\n```\n\n数据类型 `requests.models.Response` 表明响应是来自 `requests` 库的\
    \ Response 对象。`200` 是状态码，表示事务成功。也许你现在想知道实际的数据，即所请求城市的天气数据在哪里。\n\n处理数据更实际的方法是使用\
    \ `if` 语句首先验证事务是否成功。如果成功，则使用 `response.json()`（`requests` 库的一个方法）将响应转换为 Python\
    \ 字典。然后打印响应的数据类型和内容，如下所示：\n\n```python\nresponse = requests.get(url, params=params)\n\
    # 检查请求是否成功\nif response.status_code == 200:\n    # 将响应 JSON 解析为 Python 字典\n  \
    \  data = response.json()\n    print(type(data))\n    print(data)\n```\n\n在终端中，输出如下所示：\n\
    \n```\n<class 'dict'>\n{'coord': {'lon': -117.1573, 'lat': 32.7153}, 'weather':\
    \ [{'id': 804, 'main':\n'Clouds', 'description': 'overcast clouds', 'icon': '04n'}],\
    \ 'base':\n'stations', 'main': {'temp': 59.02, 'feels_like': 58.28, 'temp_min':\
    \ 57.29,\n'temp_max': 60.6, 'pressure': 1014, 'humidity': 78, 'sea_level': 1014,\
    \ 'grnd_\nlevel': 1010, 'visibility': 10000, 'wind': {'speed': 5.75, 'deg': 320},\n\
    'clouds': {'all': 100}, 'dt': 1746187856, 'sys': {'type': 2, 'id': 2095167,\n\
    'country': 'US', 'sunrise': 1746190812, 'sunset': 1746239447}, 'timezone':\n-25200,\
    \ 'id': 5391811, 'name': 'San Diego', 'cod': 200}\n```\n\n`<class 'dict'>` 告诉你\
    \ data 变量包含一个 Python 字典。第二行是从 OpenWeatherMap REST API 接收到的所有数据，其中包含的信息远不止温度。例如，'lon'\
    \ 是经度，'lat' 是纬度，'temp' 是当前温度。还有能见度、云量、湿度、日出、日落……各种各样的信息。对于任何你不理解的内容，可以参考 OpenWeatherMap\
    \ API 文档。\n\n实际上，你可能希望以更用户友好的方式显示信息。但我想向你展示如何“检查”来自 REST API 的响应的真实本质，以便在你自己的代码中，你可以弄清楚如何从\
    \ REST API 检索信息，解析响应，然后选择你想要显示的内容以及如何显示。\n\n## 审阅完整的 REST API 脚本\n\n在本章中，我主要向你展示了与\
    \ REST API 交互的代码片段。在本节中，我将向你展示一个完整的、可运行的脚本，其中包含了所有必要的部分。"
