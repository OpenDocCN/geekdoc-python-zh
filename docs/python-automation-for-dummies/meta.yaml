    \ (contained in) | \"'a' in 'abc'\" | \"True\" |\n| Membership | \"not in\" |\
    \ Nonmembership | \"'x' not in 'abc'\" | \"True\" |\n\n## Getting Loopy with Loops\n\
    \nLoops are common in all programming languages. They're used to repeat one or\
    \ more lines of code multiple times. You can use them to access items in a list\
    \ one at a time, folders on a drive, or files in a folder. Python provides two\
    \ main types of loops: `for` loops and `while` loops.\n\n## Looping with for\n\
    \nThe `for` loop is useful when counting or when there is a known number of items\
    \ to iterate over. The loop executes a block of code for each item in the sequence.\
    \ The syntax is as follows:\n\n```\nfor variable in sequence:\n    # Code to repeat\n\
    ```\n\nReplace `variable` with a variable name of your choosing. This value keeps\
    \ count with each iteration of the loop. Replace `sequence` with the name of the\
    \ list or collection of items to loop through. The colon (`:`) marks the start\
    \ of the loop block, and indentation defines what code belongs inside the loop.\
    \ Indentation is critical, because only the code that's indented under the `for`\
    \ statement is repeated for each loop iteration. The first un-indented line under\
    \ `for` isn't executed until the looping is completed.\n\nHere's an example where\
