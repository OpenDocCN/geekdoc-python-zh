  md: 'The `import ollama` line is required to load the `ollama` module to simplify
    interacting with Ollama models from Python. The line `model = "tinyllama"` indicates
    which Ollama model you want to use. This must be a model you''ve already downloaded
    using `ollama pull`.


    The line `prompt = input("You: ").strip()` puts the word `You` on the screen as
    a prompt (you can change that to any text you want). Then the script does nothing
    until the user types a prompt and presses `Enter`. When that happens, the user''s
    text is stored in the variable named `prompt`, with any leading and trailing spaces
    removed by the `.strip()` method.


    The next line sends that prompt to the chatbot, waits for a response, and stores
    the response in a variable named `response`:


    ```

    response = ollama.chat(model=model, messages=[{"role": "user", "content": prompt}],
    stream=False)

    ```


    Let''s dissect that line:


    | Code | Description |

    | :--- | :--- |

    | `ollama.chat` | Uses the `chat` method of the `ollama` module to send a prompt
    to the AI mode and accept the resulting reply |

    | `model=model` | Tells `ollama` to use the model previously stored in the variable
    named `model` (`tinyllama` in this example) |

    | `messages=` | Defines a dictionary of information about the prompt |

    | `"role": "user"` | Indicates that the prompt is coming from a human user rather
    than another model or system |

    | `"content": prompt` | Defines the content of the prompt being sent as the text
    currently stored in the variable named `prompt` |

    | `stream=False` | Ensures that the response is returned all at once, rather than
    in chunks, which makes it easier to store that information in the variable named
    `response` |


    This is a super simple chatbot that doesn''t remember conversations, which may
    feel strange if you''ve been using conversation AI online for a while. But you
    can add some conversational ability to your own Python AI apps, as I explain in
    the next section.'
