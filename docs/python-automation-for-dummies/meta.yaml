  md: '# Moving the Mouse, Clicking, Dragging, and Scrolling


    Python can take control of your mouse and do anything you''d otherwise do by hand.
    That includes moving the mouse pointer, clicking, double-clicking, right-clicking,
    dragging, and scrolling. The library that grants you these powers is PyAutoGUI.


    As I mention at the start of this chapter, PyAutoGUI isn''t included in the Python
    standard library. So, make sure you create and activate a virtual environment
    for this script (if you haven''t already done so), and then enter the following
    command in the Terminal:


    ```

    pip install pyautogui

    ```


    # Understanding screen coordinates


    PyAutoGUI lets you move the mouse pointer to any location on the screen based
    on X, Y coordinates, where X is the distance from the left side of the screen,
    and Y is the distance from the top. The unit of measure is the pixel, where each
    pixel is one tiny lighted dot on your screen.


    The word pixel is short for picture element. A computer screen that''s 1,980 x
    1,280 is 1,930 pixels across and 1,280 pixels tall.


    The very upper-left corner of the screen is position 0,0. The lower-right corner
    of the screen is whatever your screen resolution happens to be, minus 1 for each
    coordinate (because the counting starts at 0). So, if you have a 2K QHD computer
    monitor with a resolution of 2,560 x 1,440, the lower-right corner of your screen
    is 2559,1439.


    # Controlling the mouse speed


    PyAutoGUI can move the mouse at a very high rate of speed. That can work against
    you if the mouse starts doing crazy things that you don''t want. To slow things
    down, you can specify how long any operation takes. That way you can see what''s
    going on and keep an eye on things. You do so by adding a duration= parameter
    to your move command. Here''s the syntax:


    ```

    pyautogui.move(x, y, duration= duration)

    ```'
