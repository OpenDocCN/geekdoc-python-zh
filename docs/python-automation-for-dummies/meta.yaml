    \ = interest_over_time_df\n\n        data_to_plot.plot()\n        plt.title(\"\
    Google Trends Interest Over Time\")\n        plt.xlabel(\"Date\")\n        plt.ylabel(\"\
    Interest\")\n        plt.legend(loc='upper left')\n        plt.tight_layout()\n\
