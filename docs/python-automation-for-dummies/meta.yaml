  - '[PAGE 301]


    After the user types a prompt, the next line of code adds the key "role", the
    value "user", the key "content", and whatever prompt the user typed to a list
    named conversation_history:


    ```

    conversation_history.append({"role": "user", "content": user_prompt})

    ```


    Every time the chatbot responds, that response is also added to the conversation
    history. However, the chatbot''s role is "assistant", not "user", so the chatbot
    can distinguish between user prompts and its own replies based on the role key.
    After a brief conversation, that list of dictionaries may look something like
    this:


    ```

    {"role": "user", "content": "My name is Alan. Say hello."},

    {"role": "assistant", "content": "Hi, Alan!"},

    {"role": "user", "content": "I live in the USA. Where do you live?"},

    {"role": "assistant", "content": "We both live in the USA!"},

    {"role": "user", "content": "What is my name and where do I live?"},

    {"role": "assistant", "content": "Your name is Alan. You live in the USA."}]

    ```


    The user, of course, never sees that conversation history. From the user''s perspective,
    the chatbot is remembering what the user said previously, on its own. But what''s
    really going on, behind the scenes, is that the script is resubmitting every prompt
    and every response each time it queries the model, and the model uses that information
    to give the appearance of "remembering" the ongoing conversation.


    This larger script example does significantly more exception handling than the
    super-simple script example did. Comments in the code should make it relatively
    easy to understand what''s going on, but the main thing I want you to gain from
    this script is that the trick to making an LLM carry on a "conversation" (rather
    than just answer one prompt at a time) is to resubmit the entire conversation
    to the chatbot every time you post a prompt.


    Of course, after you quit the script, the conversation history ceases to exist.
    The memory of that conversation won''t carry over to the next time you run the
    script.


