- md: "This is a complete script for querying the OpenWeatherMap REST API. It includes\
    \ code to load an API key from a .env file, handle exceptions, and display the\
    \ weather in a user-friendly format. I've included lots of comments to explain\
    \ everything that's going on in the code.\n\n```python\n# openweathermap.py\n\
    # pip install python-dotenv requests\nimport os\n# For making HTTP requests to\
    \ a REST API.\nimport requests\n# For loading variables from the .env file\nfrom\
    \ dotenv import load_dotenv\n\n# Load environment variables from the .env file\n\
    load_dotenv()\n\n# Retrieve the API key from the environment variable\nAPI_KEY\
    \ = os.getenv(\"WEATHER_API_KEY\")\n# If the API key doesn't exist, print an error\
    \ message and exit\nif not API_KEY:\n    print(\"ERROR: WEATHER_API_KEY not found\
    \ in .env file.\")\n    exit(1)\n\n# OpenWeatherMap API endpoint for current weather\
    \ data\nurl = \"https://api.openweathermap.org/data/2.5/weather\"\n\n# Define\
    \ the parameters to send with the request:\n# - q: the city to search for weather\
    \ data\n# - appid: your API key for authentication\n# - units: \"imperial\" for\
    \ Fahrenheit, \"metric\" for Celsius\nparams = {\n    \"q\": \"San Diego, CA USA\"\
    ,\n    \"appid\": API_KEY,\n    \"units\": \"imperial\"\n}\n\n# Send a GET request\
    \ to the API endpoint with the defined parameters\nresponse = requests.get(url,\
    \ params=params)\n\n# Check if the request was successful\nif response.status_code\
    \ == 200:\n    # Parse the response JSON into a Python dictionary\n    data =\
    \ response.json()\n    # Extract the city, temperature, and description.\n   \
    \ city = data[\"name\"]\n    temperature = data[\"main\"][\"temp\"]\n    description\
    \ = data[\"weather\"][0][\"description\"]\n\n    # Print the weather information\n\
    \    print(f\"\\nWeather in {city}: {temperature}°F, {description}\\n\")\nelse:\n\
    \    # If request failed, print the status code and the error message.\n    print(f\"\
    Error {response.status_code}: {response.text}\")\n```\n\nWhen you run that code\
    \ successfully, the output is a simple line of text in the Terminal that reads\
    \ something like this:\n\n```\nWeather in San Diego: 59.05°F, overcast clouds\n\
    ```\n\nThat’s an awful lot of bother to go through, just to get the weather in\
    \ some city. But the point is, there are thousands of REST APIs in the world,\
    \ capable of returning all kinds of data. What you’ve learned in this chapter\
    \ should apply to virtually every one of those APIs. So, you could use that last\
    \ script as a general model for any Python script you use to access a REST API.\n\
    \nYou always have the option to ask any AI to write the script for you. For example,\
    \ tell AI to “Write a script that gets the S&P 500 index price from a free Alpha\
    \ Vantage REST API account,” so you get some code to work with. You’ll still need\
    \ to get your own API key. The code the AI generates for you won’t look exactly\
    \ like the example I provide. But you should be able to understand and modify\
    \ that code, as needed, based on everything I explain in this chapter.\n\nYou\
    \ can also ask AI for help finding APIs for different domains. For example, ask\
    \ AI, “Where can I find free APIs for AI chatbots?” or “Where can I find free\
    \ REST APIs for AI image generation?”\n\n+   IN THIS CHAPTER\n\n* Looking at web\
    \ browser animation\n* Finding controls on web forms\n* Filling text boxes and\
    \ submitting forms\n* Automatically filling forms from JSON data files\n\n## Chapter\
    \ 10\nAutomating the Web\n\nThis chapter is all about automating web browsers.\
    \ You'll learn techniques to open a web page, find and fill text boxes, and submit\
    \ the form data, exactly as you would do yourself using a mouse and keyboard.\
    \ In this chapter, you make Python do all that for you.\n\n## Automating Web Browsers\n\
    \nIf you're looking for a way to automate opening a web page and filling one or\
    \ more text boxes with known information, `selenium` is your best bet. Two key\
    \ modules that you can import into your Python scripts are named `selenium` and\
    \ `webdriver-manager`. They aren't part of the Python standard library, so when\
    \ you plan to use them in a script, make sure to create and activate your virtual\
    \ environment. Then enter the following command at the Terminal:\n\n```\npip install\
    \ selenium webdriver-manager\n```\n\nThe `selenium` module provides the ability\
    \ to automatically control the browser and interact with controls on a web page.\
    \ The `webdriver-manager` module allows you to use different web browsers, such\
    \ as Apple Safari, Google Chrome, and Microsoft Edge, without manually downloading\
    \ and installing drivers for each browser yourself and adding them to your system\
    \ PATH.\n\n## Loading drivers for your browser\n\nOne of the first steps to creating\
    \ a script to interact with a web page is to import the correct drivers for that\
    \ browser. I'll provide a few simple scripts that you can try out yourself, to\
    \ illustrate the syntax. But be aware that each script only opens the browser,\
    \ navigates to www.google.com, and then holds the browser window open until you\
    \ press Enter on VS Code's Terminal window.\n\n> WARNING\nYou can only use a web\
    \ browser that's installed on your computer. You can't simulate an uninstalled\
    \ browser using selenium.\n\nHere's a script that loads the correct drivers for\
    \ Chrome, which you can try if you have Chrome installed on your computer.\n\n\
    ```python\n# pip install selenium webdriver-manager\nfrom selenium import webdriver\n\
    from selenium.webdriver.chrome.service import Service\nfrom webdriver_manager.chrome\
    \ import ChromeDriverManager\n\n# Set up the Chrome WebDriver.\ndriver = webdriver.Chrome(service=Service(ChromeDriverManager().install()))\n\
    \n# Open https://www.google.com in Chrome.\ndriver.get(\"https://www.google.com\"\
    )\n\n# Keep the browser open until the user presses Enter.\ninput(\"Press Enter\
    \ to close the browser...\")\ndriver.quit()\n```\n\nHere's the same script, but\
    \ this one uses Edge as the browser:\n\n```python\n# pip install selenium webdriver-manager\n\
    from selenium import webdriver\nfrom selenium.webdriver.edge.service import Service\n\
    from webdriver_manager.microsoft import EdgeChromiumDriverManager\n\n# Set up\
    \ the Microsoft Edge WebDriver.\ndriver = webdriver.Edge(service=Service(EdgeChromiumDriverManager().install()))\n\
    \n# Open https://www.google.com in Edge.\ndriver.get(\"https://www.google.com\"\
    )\n\n# Keep the browser open until the user presses Enter.\ninput(\"Press Enter\
    \ to close the browser...\")\ndriver.quit()\n```\n\nIf you're using Safari on\
    \ a Mac, you'll need to enable remote automation in Safari Settings in order for\
    \ any automation script to work. Here's how:\n\n1.  **Open Safari and choose Safari\
    \ ⚙ Settings.**\n    The Settings dialog box appears.\n2.  **Click the Advanced\
    \ tab.**\n3.  **Select the Show Features for Web Developers check box at the bottom\
    \ of the dialog box.**\n    The Settings dialog box should change to display a\
    \ Developer tab. If it doesn't, close the Settings dialog box, close and reopen\
    \ Safari, and choose Develop ⚙ Developer Settings.\n4.  **Click the Developer\
    \ tab.**\n    If you had to close and reopen Safari and choose Develop ⚙ Developer\
    \ Settings, you're already there.\n5.  **Select the Allow Remote Automation check\
    \ box, as shown in Figure 10-1.**\n\n![](img/10d8e89b301a0e7452bff4d402265e78_210_0.png)\n\
    \n6.  **Close the dialog box.**\n7.  **Close Safari.**\n\nAfter you've enabled\
    \ remote automation, you should be able to run the script to open Safari, navigate\
    \ to www.google.com, and keep the browser window open until you press Enter in\
    \ VS Code's Terminal window to end the script.\n\n## Finding text boxes to fill\n\
    \nOn web pages, controls like text boxes are defined in Hypertext Markup Language\
    \ (HTML) using tags like those shown in Table 10-1.\n\n**TABLE 10-1 Common HTML\
    \ Tags for Controls on Web Pages**\n\n| HTML Tag | Control Type |\n| :--- | :---\
    \ |\n| `<input type=\"text\">` | Text box |\n| `<input type=\"search\">` | Text\
    \ box used for searches |\n| `<textarea>` | Multiline text box |\n| `<select>`\
    \ | Drop-down list |\n| `<input type=\"radio\">` | Radio button |\n| `<input type=\"\
    checkbox\">` | Check box |\n| `<input type=\"submit\">` | Submit button for a\
    \ form |\n\nMost controls will have an id, which appears inside the tag as id=\
    \ followed by the identifier. For example, here's a tag for a text box control\
    \ with an id of \"prompt\":\n\n```html\n<input type=\"text\" id=\"prompt\">\n\
    ```\n\nThe Submit button for a form may or may not have an id. But its tag is\
    \ always `<input type=\"submit\">`, so you can typically refer to it using syntax\
    \ that identifies a Submit button, as you'll see a little later in this section.\n\
    \nThe id of a control isn't usually obvious just from looking at a web page. Typically,\
    \ you can right-click the control and choose Inspect. A panel opens the HTML tag\
    \ for the control highlighted, as shown in Figure 10-2. In this example, I right-clicked\
    \ the Search box on Wikipedia's page. The highlighted tag includes id=\"searchInput\"\
    , which shows that the control's id is \"searchInput\".\n\n> If you can't find\
    \ the id of a control using your current web browser, try visiting the same page\
    \ with Edge or Chrome to see if you get better results."
  mdcn: "这是一个用于查询 OpenWeatherMap REST API 的完整脚本。它包含了从 .env 文件加载 API 密钥、处理异常以及以用户友好的格式显示天气的代码。我添加了大量注释来解释代码中的所有内容。\n\
    \n```python\n# openweathermap.py\n# pip install python-dotenv requests\nimport\
    \ os\n# 用于向 REST API 发送 HTTP 请求。\nimport requests\n# 用于从 .env 文件加载变量\nfrom dotenv\
    \ import load_dotenv\n\n# 从 .env 文件加载环境变量\nload_dotenv()\n\n# 从环境变量中检索 API 密钥\n\
    API_KEY = os.getenv(\"WEATHER_API_KEY\")\n# 如果 API 密钥不存在，打印错误消息并退出\nif not API_KEY:\n\
    \    print(\"ERROR: WEATHER_API_KEY not found in .env file.\")\n    exit(1)\n\n\
    # OpenWeatherMap API 端点，用于获取当前天气数据\nurl = \"https://api.openweathermap.org/data/2.5/weather\"\
    \n\n# 定义随请求发送的参数：\n# - q: 要查询天气数据的城市\n# - appid: 用于身份验证的 API 密钥\n# - units: \"\
    imperial\" 表示华氏度，\"metric\" 表示摄氏度\nparams = {\n    \"q\": \"San Diego, CA USA\"\
    ,\n    \"appid\": API_KEY,\n    \"units\": \"imperial\"\n}\n\n# 使用定义的参数向 API 端点发送\
    \ GET 请求\nresponse = requests.get(url, params=params)\n\n# 检查请求是否成功\nif response.status_code\
    \ == 200:\n    # 将响应 JSON 解析为 Python 字典\n    data = response.json()\n    # 提取城市、温度和描述。\n\
    \    city = data[\"name\"]\n    temperature = data[\"main\"][\"temp\"]\n    description\
    \ = data[\"weather\"][0][\"description\"]\n\n    # 打印天气信息\n    print(f\"\\nWeather\
    \ in {city}: {temperature}°F, {description}\\n\")\nelse:\n    # 如果请求失败，打印状态码和错误消息。\n\
    \    print(f\"Error {response.status_code}: {response.text}\")\n```\n\n当你成功运行该代码时，终端中的输出是一行简单的文本，内容类似于：\n\
    \n```\nWeather in San Diego: 59.05°F, overcast clouds\n```\n\n为了获取某个城市的天气，这确实需要费一番周折。但关键在于，世界上有成千上万的\
    \ REST API，能够返回各种各样的数据。你在本章学到的内容应该适用于几乎所有这些 API。因此，你可以将上一个脚本作为使用 Python 访问任何 REST\
    \ API 的通用模型。\n\n你始终可以选择让任何 AI 为你编写脚本。例如，告诉 AI “编写一个脚本，从免费的 Alpha Vantage REST\
    \ API 账户获取标普 500 指数价格”，这样你就能得到一些可用的代码。你仍然需要获取自己的 API 密钥。AI 为你生成的代码可能与我提供的示例不完全相同。但你应该能够根据我在本章解释的所有内容，理解并按需修改该代码。\n\
    \n你也可以向 AI 寻求帮助，查找不同领域的 API。例如，询问 AI，“在哪里可以找到用于 AI 聊天机器人的免费 API？”或“在哪里可以找到用于 AI\
    \ 图像生成的免费 REST API？”\n\n+   本章内容\n\n* 查看网页浏览器动画\n* 查找网页表单上的控件\n* 填写文本框并提交表单\n\
    * 从 JSON 数据文件自动填写表单\n\n## 第 10 章\n自动化网络\n\n本章全部关于自动化网络浏览器。你将学习打开网页、查找并填写文本框以及提交表单数据的技术，就像你自己使用鼠标和键盘操作一样。在本章中，你将让\
    \ Python 为你完成所有这些工作。\n\n## 自动化网络浏览器\n\n如果你正在寻找一种方法来自动打开网页并用已知信息填写一个或多个文本框，`selenium`\
