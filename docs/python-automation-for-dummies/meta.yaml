  md: '# OTHER WAYS TO SECURE API KEYS


    Instead of storing API keys in a .env file, you can store keys with the operating
    system''s environment variables, or use a cloud-based service like Amazon Web
    Services (AWS) Secrets Manager (https://aws.amazon.com/secrets-manager), Microsoft
    Azure Key Vault (https://azure.microsoft.com/en-us/products/key-vault), or Google
    Cloud Secret Manager (https://cloud.google.com/security/products/secret-manager).
    I won''t go into detail on those options, because this is a book about Python
    automation, not API key management, but feel free to explore them on your own
    by searching the web or asking an artificial intelligence (AI) about them.


    # Creating a .gitignore file


    If there is any chance you''ll upload the project to GitHub, be sure to include
    a .gitignore file with .env included in it to prevent your key from being shared
    with your Python code. You can also include the .venv filename in that .gitignore
    file, so users can create their own virtual environment for their own system after
    they download your code.


    > I cover virtual environments and the .venv file in Chapter 2.


    Adding a .gitignore file to a VS Code project is the same as adding any other
    file. Just create a new file, as you did with .env, but name this one .gitignore
    with no spaces and no filename extension. When the file is open in the editor,
    just type in .env and .venv, each on its own line, as shown in Figure 9-2.


    ![](img/10d8e89b301a0e7452bff4d402265e78_195_0.png)'
