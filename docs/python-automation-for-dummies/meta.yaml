    \ editor to the right. If you’ve enabled AI, you’ll see a prompt at the top of\
    \ the new file inviting you to tell AI what code you want to write, as shown in\
    \ Figure 2-12.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_42_0.png)\n\nIf you\
    \ ever need to rename or delete a file in the Explorer pane, just right-click\
    \ the filename for a shortcut menu of options. If you accidentally put a file\
    \ in the .venv folder rather than the root folder, you can simply drag the file\
    \ to the root folder name and drop it there.\n\nIf you don't want to use AI to\
    \ write your code, just start typing your code. For the first example, you'll\
    \ create a Hello World script that includes a Python comment. Follow these steps:\n\
    \n1.  Click inside the editor to the right of the Explorer pane and type # My\
    \ first Hello World script.\n2.  Press Enter and type the following Python code:\n\
    \    ```python\n    print(\"Hello, World!\")\n    ```\n    Note that this is code\
    \ so you must type it exactly as shown or it won't work.\n3.  Press Enter.\n\n\
    Figure 2-13 shows how things should look now. The name of script appears in a\
    \ tab at the top of the Editor pane. The code you typed into the script appears\
    \ below that.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_43_0.png)\n\nThe `print()`\
    \ command in Python tells Python to output something to the Terminal when you\
    \ *execute* (run) the script. In the example `print(\"Hello, World!\")`, we expect\
    \ that line to show `Hello, World!` as the output. To test it, you need to run\
    \ the script, as I explain in the next section.\n\n## Running a Python script\n\
    \nRunning a Python script is simple, and you have a couple of choices. In this\
    \ section, I describe the most common.\n\nIf you haven't already done so, click\
    \ the script filename (`hello.py` in the example) to see its code in the editor.\
    \ Then click Run Python File (see Figure 2-14) near the upper-right corner of\
    \ the VS Code window.\n\nThe script runs, and any output from a `print()` command\
    \ appears in the Terminal, such as where you see `Hello, World!` in Figure 2-15.\n\
    \n![](img/10d8e89b301a0e7452bff4d402265e78_44_0.png)\n\n![](img/10d8e89b301a0e7452bff4d402265e78_44_1.png)\n\
    \nAs an alternative to using the Run Python File button, you can type **python\
    \ scriptname** at the command prompt in the Terminal. For example, to run hello.py,\
    \ you'd type the following in the Terminal and press Enter:\n\n```\npython hello.py\n\
    ```\n\nThe script runs and displays any `print()` output in the usual manner.\n\
    \n## OPENING AN EXISTING PROJECT\n\nAfter you've created a script, you don't need\
    \ to go through all these steps every time you want to run or work with the script.\
    \ In fact, all you really need to do is open the workspace folder and activate\
    \ its virtual environment. The steps are simple:\n\n1.  Open the script's workspace\
    \ folder in VS Code.\n2.  Choose View > Terminal from VS Code's menu bar to open\
    \ the Terminal.\n3.  Activate your virtual environment: In Windows, enter .venv\\\
    Scripts\\activate. In Linux or macOS, enter .venv/bin/activate.\n    Make sure\
    \ not to enter the period at the end.\n4.  To edit a script, click its name.\n\
    5.  To run a script, click its name and click the Run Python File, or use the\
    \ syntax `python filename.py` to run the script from the command prompt in the\
    \ Terminal.\n\nThat should do the trick for any existing project.\n\n# Chapter\
    \ 3\nPython Basics for Automation\n\nIn this chapter, you discover the concepts,\
    \ commands, and structures for writing Python code. If you’re an experienced Python\
    \ developer, most of this won’t be news to you. If you’re experienced with other\
    \ programming languages, the terms and concepts will be familiar — you’ll just\
    \ be learning the Python way of doing things. And if you’re new to writing code,\
    \ *all* of this will be new.\n\n> REMEMBER\nThis one chapter isn’t a replacement\
    \ for an entire book on Python. (If that’s what you need, check out *Python All-in-One\
    \ For Dummies* by John C. Shovic and Alan Simpson (published by Wiley)) The goal\
    \ of this chapter is to give you a quick overview of Python and a quick reference\
    \ to code you’ll see in this book’s automation scripts.\n\n## Understanding Python\
    \ Comments\n\nPython comments aren’t really Python code. Instead, they’re plain-English\
    \ notes embedded in code. Comments have no effect on how the code runs or is executed.\
    \ When writing your own code, you can include comments as notes to yourself, for\
    \ reminders about what the code is doing. Throughout this book, I use comments\
    \ to describe what’s going on and help you learn.\n\nTo type a single-line comment,\
    \ start by typing #. All text to the right of the # on the same line (only) is\
    \ a comment. For example, looking at the following line, the x=10 part is actual\
    \ Python code, and the text to the right of the # is a plain-English comment.\n\
    \n```\nx=10 # Store the number 10 in the variable named x.\n```\n\nYou can also\
    \ add longer multiline comments to your code by placing the comment text between\
    \ two sets of triple quotation marks (\"\"\"\"\"\" ) or triple apostrophes ( '\
    \ ' ' ). For example, all the text between the two sets of triple quotation marks\
    \ is comment text, not code:\n\n```\n\"\"\"\nIn Python, any text between triple\
    \ quotation marks or triple apostrophes is\na comment.\n\"\"\"\n```\n\n## Mastering\
    \ Variables and Data Types\n\nVirtually all Python scripts (and code in other\
    \ languages) use *variables* to store data (information). Think of a variable\
    \ as a cubbyhole in which you can store things. Every variable in a script must\
    \ have a unique name. You can make up your own variable names, as long as you\
    \ play by the following rules:\n\n-   A variable name must start with a letter\
    \ (a–z or A–Z).\n-   After the first letter, a variable name can contain any letter\
    \ (a–z or A–Z), any digit (0–9), or one or more underscores (_).\n-   A variable\
    \ name can’t contain spaces or special characters like !, @, #, $, -, and so on.\n\
    -   Python variable names are case-sensitive, which means myVar, MyVar, and myvar\
    \ are treated as different variables.\n-   Variable names can’t match any of Python’s\
    \ commands or keywords, such as if, for, while, class, def, True, False, and so\
    \ on.\n\nBeyond the hard-and-fast rules, there are some best-practice style guidelines,\
    \ defined in PEP 8 (https://peps.python.org/pep-0008). That guide is a set of\
    \ recommendations for writing clean, readable, and consistent code. It was authored\
    \ by Guido van Rossum (Python's creator) and others. PEP stands for Python Enhancement\
    \ Proposal, and most Python developers follow it. PEP 8 recommends the following\
    \ for variable names:\n\n-   Use lowercase with underscores for variable names\
    \ (for example, `my_variable`).\n-   For *constants*, variables whose values never\
    \ change, use all uppercase (for example, `TAX_RATE`).\n-   Avoid starting with\
    \ an underscore unless it's for a special case (for example, private variables\
    \ in classes).\n-   Use descriptive names that indicate the variable's purpose\
    \ (for example, `user_age` instead of `x`).\n\n![](img/10d8e89b301a0e7452bff4d402265e78_48_0.png)\n\
    \nThere's no strict limit on the length of a variable name, but it's best to keep\
    \ them concise and meaningful for readability.\n\nEach variable contains some\
    \ *value*. Here's an example where the variable `user_name` contains the value\
    \ `alan`:\n\n```python\nuser_name = \"alan\"\n```\n\nThe value you store in a\
    \ variable has a *data type*. Computers store different kinds of information differently\
    \ for efficiency and speed. The next sections describe each data type and present\
    \ examples of their use.\n\n### Working with numbers\n\nComputers, as you probably\
    \ know, are great for working with numbers. In Python, there are two data types\
    \ for numbers:\n\n-   **Integer (int):** Whole numbers with no decimal point,\
    \ such as 2, 11, 1,345, or -11\n-   **Floating point (float):** Numbers that contain\
    \ a decimal point, such as 3.12, 99.98, or -1.075. The range of values goes from\
    \ 2.35x10^-308 to 1.797x10^308.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_48_1.png)\n\
    \nWhen typing numbers, never include a dollar sign or comma, even if the number\
    \ represents a dollar amount. For example, you must type the dollar amount $1,234.57\
    \ as 1234.57. Your script can *show* the number with a dollar sign and comma in\
    \ its output. But you need to leave those out when assigning the number value\
    \ to a variable."
