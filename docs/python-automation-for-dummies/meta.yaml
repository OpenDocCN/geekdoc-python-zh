    \ 变量设置为 `False` 以排除子目录。\n\n请记住，重复文件并未从你的系统中删除。它们将位于回收站或垃圾桶中供你审查。\n\n## 压缩文件\n\n\
    下一个自动化脚本可以压缩任何目录或目录树中的任何文件类型。原始文件保持不变。你可以使用 Zip 文件与他人共享或进行备份。以下是完整的脚本：\n\n```python\n\
