  md: '# ABOUT RGB, RGBA, AND LA


    RGB (which stands for *Red, Green, Blue*), RGBA (which stands for *Red, Green,
    Blue, Alpha*), and LA (which stands for *Luminance, Alpha*) are *image modes*
    (sometimes called *color modes* or *color models*).


    +   - RGB supports virtually any color, but it does not support transparency.

    - RGBA adds the Alpha channel, which allows transparency in addition to full color.

    - LA uses a Luminance channel for grayscale and an Alpha channel for transparency.
    Because it doesn''t support color, LA is used only for grayscale images that may
    include transparency. It''s more compact than RGBA and is preferred when you need
    transparency in grayscale images.


    The next lines of code define the path and filename for the converted file. Everything
    but the extension remains the same as the original; the extension is changed to
    match the new format. The `.save()` method performs the actual conversion and
    writes the file. The `print()` statement provides feedback onscreen when the conversion
    and save are successful.


    ```

    # Create the output file path

    output_path = file_path.with_suffix(f".{output_format}")


    # Save the image in the new format.

    img.save(output_path, quality=100)

    print(f"Converted {file_path} to {output_path}")

    ```


    The `quality=100` setting in the preceding code saves the image at maximum quality
    with no compression. If you need smaller files, you can lower the number. For
    example, setting `quality=90` typically reduces the file size by 20 percent to
    40 percent (depending on the image resolution, size, and color complexity), but
    at the cost of a 10 percent reduction in image quality — slightly less detail,
    color precision, and overall clarity.


