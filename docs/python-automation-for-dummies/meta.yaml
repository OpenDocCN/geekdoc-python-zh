    # TypeError


    In Python, a `TypeError` occurs when you try to perform an operation on a data
    type that isn''t supported for that operation. Think of it as Python saying, “I
    don''t know how to do this with these types of values!” It''s one of the most
    common errors you''ll encounter when first learning Python.


    Confusing strings and numbers are one of the most common `TypeError` mistakes.
    Here''s a simple example:


    ```

    # Code that causes TypeError

    x = "5"

    y = 10

    result = x + y

    ```


    Running that code produces the following error:


    ```

    TypeError: can only concatenate str (not "int") to str

    ```


    The problem here is that the `x` variable is defined as a string (because it''s
    enclosed in quotation marks). Python doesn''t allow you to join a string to a
    number. You would either have to make both `x` and `y` numbers (by removing the
    quotation marks around 5) or make them both strings, as in "5" and "10".


    Here''s another example of a `TypeError`:


    ```

    extended_price= 98.99

    print (len(extended_price))

    ```


    The error message for this code is `TypeError: object of type ''float'' has no
    len()`. The variable `extended_price` is the `float` data type, because its value
    is a number with a decimal point, not enclosed in quotation marks. The `len()`
    function returns the length of a string and causes an error if you try to get
    the length of a number.


    If you''re going to allow users to put in their own data while running your code,
    you can use both `TypeError` and `ValueError` in a `try...except` block to catch
    either type of error. (A `ValueError` is the correct data type, but a bad value,
    such as a negative number when a positive number is expected.) The following code
    shows an example where the user can input a total sale price and tax rate. The
    code then calls a function named `total_with_tax` to add sales tax to the total,
    but notice the `try...except` block near the end, to catch both `ValueError` and
    `TypeError` exceptions if they arise:'
