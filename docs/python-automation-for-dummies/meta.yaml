    # Automating Web Browsers


    If you''re looking for a way to automate opening a web page and filling one or
    more text boxes with known information, `selenium` is your best bet. Two key modules
    that you can import into your Python scripts are named `selenium` and `webdriver-manager`.
    They aren''t part of the Python standard library, so when you plan to use them
    in a script, make sure to create and activate your virtual environment. Then enter
    the following command at the Terminal:


    ```

    pip install selenium webdriver-manager

    ```


    The `selenium` module provides the ability to automatically control the browser
    and interact with controls on a web page. The `webdriver-manager` module allows
    you to use different web browsers, such as Apple Safari, Google Chrome, and Microsoft
    Edge, without manually downloading and installing drivers for each browser yourself
    and adding them to your system PATH.'
