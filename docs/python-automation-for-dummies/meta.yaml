    # Playing It Safe


    Some scripts in this chapter delete or rename files in ways that you can''t easily
    undo. So, it''s a good idea to always work with a `Practice` folder that contains
    copies of files. If you make a mess of things, there''s no loss. All your original
    files and folders will still be intact in their original location.


    Throughout this book, I use a folder named `Practice`. On Windows, I put it in
    the `Documents` folder for easy access. So, the path, in Windows is:


    ```

    C:\Users\Alan\Documents\Practice

    ```


    On macOS, I''m not using `Documents` because it syncs to iCloud and can''t be
    written to from Python without changing permissions. When working with scripts
    that change files, you want to play it safe and minimize the impacts of any unforeseen
    errors. So, on a Mac, I put the `Practice` folder under my username. The path
    is:


    ```

    /Users/Alan/Practice

    ```


    Most Linux distros don''t have a built-in `Documents` folder. There, I just put
    the `Practice` folder under my username. That path in most Linux distros would
    be:


    ```

    /home/Alan/Practice

