    >> Linux or macOS: .venv/bin/activate

    ```


    ![](img/10d8e89b301a0e7452bff4d402265e78_37_1.png)


    Notice that Windows uses backslashes (\), while Linux and macOS use forward slashes
    (/). Remember to use the same uppercase/lowercase letters shown here.


    If you see a warning about the script coming from an “unknown publisher,” type
    **A** and press Enter to always run. The publisher in this instance is the Python
    Software Foundation, which created the venv module, and you can certainly trust
    them.


    When a virtual environment is active, the name of that virtual environment shows
    in the command prompt, so you know the virtual environment. Figure 2–11 shows
    how the command prompt may look in Windows, where the name `.venv` is enclosed
    in parentheses at the start of the command prompt.


    In a Linux or macOS environment, the command prompt path won''t look the same
    as shown in Figure 2–11. If you''re using the zsh command line shell, then it
    will look more like this:


    ```

