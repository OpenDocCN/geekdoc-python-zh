    \ GUI you're using, just to be sure.\n\n# Detecting Keystrokes\n\nWhenever you're\
    \ running a Python script in VS Code, you can press Ctrl+C to stop code execution,\
    \ but only if VS Code (or whatever editor/Terminal you're using) is in the active\
    \ window. If you're using Python to automate other apps, you may want to be able\
    \ to detect keystrokes from other windows. The `pynput` module lets Python detect\
    \ keystrokes on the operating system level. In other words, `pynput` can detect\
    \ keystrokes from windows other than the window from which you launched your Python\
    \ script.\n\nThe `pynput` module isn't part of the standard library. Make sure\
    \ you `pip install pynput` to your virtual environment before creating scripts\
    \ that import that module.\n\nAs with PyAutoGUI used in this chapter, you'll need\
    \ to enable Accessibility features on a Mac for `pynput` to work. See \"Granting\
    \ Permissions on a Mac,\" earlier in this chapter, for details.\n\nTo illustrate\
    \ how `pynput` works, the following script will stop the currently running Python\
    \ script from any open window in Linux, macOS, or Windows when the user presses\
    \ the Escape key (`esc` in the code):"
