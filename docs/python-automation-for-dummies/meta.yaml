    \ number > 0\n```"
  - "[PAGE 325]\n\nThe latter function is more beautiful because its name, `is_positive`,\
    \ is more descriptive than `check_number` in terms of what the function does and\
    \ returns. The parameter name, `number`, is more descriptive than just using `n`\
    \ as a variable name. Performing the test and returning a value is handled by\
    \ the single line `return number > 0`, as an alternative to the complex `if...else`\
    \ statement.\n\nHere's one more example where we use some code to create a list\
    \ of numbers. The additional code creates a second list, containing only even\
    \ numbers from the original list:\n\n```\nmy_list = [1, 2, 3, 4, 5]\nnew_list\
    \ = []\nfor i in range(len(my_list)):\n    if my_list[i] % 2 == 0:\n        new_list.append(my_list[i])\n\
    print(new_list)\n```\n\nThe code works fine as is, but it's bulky and difficult\
    \ to read. It isn't very pretty to look at either. The following code accomplishes\
    \ the same thing with far fewer lines and no indentations:\n\n```\nnumbers = [1,\
    \ 2, 3, 4, 5]\neven_numbers = [num for num in numbers if num % 2 == 0]\nprint(even_numbers)\n\
    ```\n\nNot only is the latter code more succinct and easier to read, but using\
    \ names like `numbers` and `even_numbers` helps to make the code more readable\
    \ and easier to understand — and, thus, more beautiful!\n\n# Explicit Is Better\
    \ than Implicit\n\nThis principle is a way of saying that code should clearly\
    \ express its intent, avoiding hidden or assumed behavior. Implicit code relies\
    \ on defaults, side effects, or unclear assumptions, which can obscure meaning\
    \ and lead to errors. Explicit code, by contrast, makes actions, types, and intentions\
    \ obvious, improving readability and maintainability.\n\nTo clarify the difference\
    \ between explicit and implicit consider the following:\n\n> >> **Explicit code**\
    \ clearly states what the code does, using precise names, types, or operations."
  - "[PAGE 326]\n\n> >> **Implicit code** relies on defaults, magic behavior, or context\
    \ that isn't immediately obvious to all developers.\n\nBeing explicit encourages\
    \ writing code that is self-documenting and predictable, reducing the need for\
    \ developers to guess or dig into documentation to understand it.\n\nLet's work\
    \ through an example of making code more explicit. We'll start with this \"ugly\"\
    \ code (referring to the preceding section):\n\n```\ndef tot(x,y):\n    st =x\
    \ * y\n    return x + st\n```\n\nThe code works — it returns the original value\
    \ of x with `st` added, where `st` is that x value multiplied by y. But what exactly\
    \ does that get us? Here's a rewrite of the code that's more explicit in terms\
    \ of what the code does:\n\n```\ndef total_with_tax(total_sale,sales_tax_rate):\n\
    \    return round((1 + sales_tax_rate) * total_sale.2)\n```\n\nIt's easier to\
    \ tell what's going on in this version. The function name, `total_with_tax`, gives\
    \ you a hint as to what the function returns. The names `total_sale` and `sales_tax_rate`\
    \ are much more explicit than x and y, and they give you some clue as to what\
    \ to pass into the function.\n\nIntentionally using abbreviations and single-letter\
    \ variable names to keep your code compact works against explicitness. Follow\
    \ PEP 8 guidelines (https://peps.python.org/pep-0008) and use all lowercase variable\
    \ names that are meaningful, with underscores in place of spaces, to keep your\
    \ code's meaning explicit.\n\nTo add the sales tax amount to the total sale, the\
    \ function adds the sales tax rate (say, 0.07) to 1, and then multiples that value\
    \ by the total sale, a simple and accurate way to add sales tax to `total_sale`.\
    \ The code is more descriptive just by using better names for things. But we can\
    \ do more to make the code even more explicit.\n\n# Using type hints\n\nPython\
    \ doesn't require you to declare a type for every value you create. Instead, it\
    \ uses *dynamic typing*, where you simply enter a value (for example, 10, 123.45,\
    \ or \"Hello\") and Python figures out its data type automatically. Although this\
    \ feature is convenient, it can make code harder to read because the type isn't\
    \ explicitly shown."
- md: "Python *type hints* allow you to specify data types for values passed into\
    \ and returned from functions. That way, anybody working with your code knows\
    \ exactly what kind of value to pass into and expect from a function. To use type\
    \ hints in a function's parameter list, follow the parameter name with a colon\
    \ and the data type, using one of the abbreviations (int, float, bool, str, list,\
    \ dict, object, None, and so on).\n\nIf you need a reminder of data types, turn\
    \ to Chapter 3.\n\nHere is the `total_with_tax()` function with type hints added\
    \ to the top line:\n\n```python\ndef total_with_tax(total_sale: float, sales_tax_rate:\
    \ float) -> float:\n    return (1 + sales_tax_rate) * total_sale\n```\n\nThe type\
    \ hints show that both `total_sale` and `sales_tax_rate` should be the `float`\
    \ type, and that the function returns a `float` as well.\n\n## Using comments\n\
    \nPython code comments are ideal for making code more explicit. Referring to the\
    \ previous example, it may not be clear how to pass in a sales tax rate. A comment\
    \ for the return type may be useful. You can put the comments above the code,\
    \ if you like, or you put the comments right inside the function as shown here:\n\
    \n```python\ndef total_with_tax(total_sale: float, sales_tax_rate: float) -> float:\n\
    \    # total_sale (float): The taxable sale amount (positive number)\n    # sales_tax_rate\
    \ (float): Tax rate as decimal (for example, 0.07 for 7%)\n    # Returns float\
    \ rounded to pennies (two decimal places)\n    return round((1 + sales_tax_rate)\
    \ * total_sale, 2)\n```\n\nThe comments provide info about the values you'd pass\
    \ into the function and what to expect in return.\n\n## Handling errors\n\nBuilding\
    \ exception handling into your code helps make code more explicit, by leaving\
    \ no doubt as to what data isn't acceptable. The sample automation scripts in\
    \ this book all use exception handling to handle errors gracefully. For this simple\
    \ example with sales tax calculations, we can add some exception handing to reject\
    \ negative sales amounts or invalid percentages, like this:\n\n```python\ndef\
    \ total_with_tax(total_sale: float, sales_tax_rate: float) -> float:\n    # total_sale\
    \ (float): The taxable sale amount (positive number)\n    # sales_tax_rate (float):\
    \ Tax rate as decimal (for example, 0.07 for 7%)\n    # Returns float rounded\
    \ to pennies (two decimal places)\n    # Exception handling\n    if total_sale\
    \ < 0:\n        raise ValueError(\"Total sale cannot be negative\")\n    if not\
    \ 0 <= sales_tax_rate <= 1:\n        raise ValueError(\"Sales tax rate must be\
    \ between 0 and 1\")\n    return round((1 + sales_tax_rate) * total_sale, 2)\n\
    ```\n\nYou could add even more comments to the code, to explain the exception\
    \ handling, though the error messages in the code (\"Total sale cannot be negative\"\
    \ and \"Sales tax rate must be between 0 and 1\") are **self-explanatory**.\n\n\
    Turn to Chapter 3 for more information on exception handling. Chapter 17 also\
    \ provides information on common exceptions and how to handle them.\n\nWith the\
    \ function written the way it is now, any Python programmer can call the function\
    \ and handle any errors using a `try...except` block, like this:\n\n```python\n\
    if __name__ == \"__main__\":\n    total_sale = 10.00\n    sales_tax_rate = 0.07\n\
    \    try:\n        result = total_with_tax(total_sale, sales_tax_rate)\n     \
    \   print(f\"Total with tax: ${result}\")\n    except ValueError as e:\n     \
    \   print(f\"Error: {e}\")\n```\n\nBeing specific (and explicit) in your coding\
    \ makes it easier for others (and perhaps your future self) to really understand\
    \ the intent of the code and how best to use it.\n\n## Simple Is Better than Complex\n\
    \nThis principle emphasizes that clear, straightforward solutions are preferable\
    \ to overly complicated ones. For a beginning programmer, this means writing code\
    \ that's easy to read, understand, and maintain. Simple code reduces bugs, makes\
    \ collaboration easier, and helps you focus on solving the problem rather than\
    \ wrestling with the code itself. To summarize:\n\n- **Choose clear logic.** Avoid\
    \ convoluted approaches when a direct one works.\n- **Use readable code.** Write\
    \ code that others (or your future self) can understand quickly.\n- **Avoid over-engineering.**\
    \ Don't add unnecessary features or layers of abstraction.\n\nFor example, here's\
    \ a function that accepts a number and returns that number squared:\n\n```python\n\
    def calculate_square(number):\n    result = number ** 2\n    return result\n```\n\
    \nThis function works, but it's unnecessarily verbose. It uses a temporary variable\
    \ (`result`) and a function when a simpler approach would suffice, like this:\n\
    \n```python\ndef square(number):\n    return number * number\n```\n\nThis version\
    \ is concise, has a clear name, and directly returns the result. It's easier to\
    \ read and does the same thing.\n\nLarge functions that perform many operations\
    \ before returning a value can add to code complexity. Consider decomposing complex\
    \ functions into smaller, simpler ones. Each function should ideally do one thing\
    \ well, making testing, debugging, and maintenance easier.\n\nHere's another example\
    \ where the function returns `True` if passed an even number; otherwise, it returns\
    \ `False`:\n\n```python\ndef is_number_even(num):\n    if num % 2 == 0:\n    \
    \    return True\n    else:\n        return False\n```\n\nThis code is overly\
    \ verbose because it uses an `if...else` structure to return `True` or `False`\
    \ when the condition itself is already a Boolean. In other words, the expression\
    \ `num % 2 == 0` returns `True` if `num` is evenly divisible by 2 (that is, if\
    \ the remainder is zero); otherwise, the expression returns `False`. Here's a\
    \ much simpler, cleaner way to write this function:\n\n```python\ndef is_even(num):\n\
    \    return num % 2 == 0\n```\n\nThis version is shorter and clearer. The expression\
    \ `num % 2 == 0` already evaluates to `True` or `False`, so the function just\
    \ returns that result.\n\nIf you're looking at your own code, wondering if there's\
    \ a simpler way to achieve a result, consider copying and pasting that code into\
    \ AI and asking \"Is there a simpler, more Pythonic way to do what this code does?\"\
    \n\nHere's an example where the function totals all the numbers in any list that's\
    \ passed to the function:\n\n```python\ndef sum_list(numbers):\n    total = 0\n\
    \    for i in range(len(numbers)):\n        total += numbers[i]\n    return total\n\
    ```\n\nThe function works. When you're first learning Python, you may see code\
    \ like this as an example of using a loop. However, lists have a built-in `sum()`\
    \ function, which accomplishes the same thing, but with a single line of code:\n\
    \n```python\ndef sum_list(numbers):\n    return sum(numbers)\n```\n\nTo clarify\
    \ exactly what should be passed into the function, you can add a type hint, like\
    \ this:\n\n```python\ndef sum_list(numbers: list):\n    return sum(numbers)\n\
    ```\n\nThe beauty of this version is that the both the input (a list of numbers)\
    \ and the output (the sum of numbers) is clearly stated in the minimal code. Python's\
    \ built-in `sum()` function is both simpler and more efficient.\n\nBeginning programmers\
    \ are often tempted to write complex code to feel \"clever\" or because they're\
    \ mimicking something they saw somewhere else. But complex code often leads to\
    \ more bugs, difficult debugging, and other people misusing your code because\
    \ they don't understand what the code is about. If you keep things simple, you\
    \ make your code more reliable and easier to work with.\n\n## Complex Is Better\
    \ than Complicated\n\nFor a newbie Python developer, this principle means that\
    \ it’s okay for your code to handle complex tasks or ideas, but it should avoid\
    \ being unnecessarily complicated. Here’s the difference:\n\n- **Complex code**\
    \ deals with intricate problems but is structured, readable, and logical. It embraces\
    \ the necessary complexity of the task while keeping things as straightforward\
    \ as possible.\n- **Complicated code** is overly tangled, hard to follow, or unnecessarily\
    \ obscure, making it difficult to understand or maintain.\n\nAs a beginner, think\
    \ of this as choosing a clear path to solve a problem, even if the problem requires\
    \ multiple steps, rather than creating a messy, hard-to-follow solution. As an\
    \ example, let’s look at a sum of squares function, that calculates the sum of\
    \ squares for numbers from 1 to n (for example, for n = 3, compute 1² + 2² + 3²\
    \ = 1 + 4 + 9 = 14). Here’s the code:\n\n```python\ndef sum_squares(n):\n    result\
    \ = 0\n    for i in range(1, n+1):\n        if i != 0:\n            result = result\
    \ + (i * i)\n    return result\n```\n\nThe function works fine as written, but\
    \ it’s a little overcomplicated because:\n\n- The code includes an unnecessary\
    \ check (`if i != 0`) because `range(1, n+1)` would exclude 0 anyway.\n- The loop\
    \ iterates one extra time (`n+1`) and compensates with logic, making it harder\
    \ to follow.\n- The variable update (`result = result + (i * i)`) is verbose.\n\
    \nHere’s an alternative function that accomplishes exactly the same thing as the\
    \ original function, but in a cleaner, simpler way:\n\n```python\ndef sum_squares(n):\n\
    \    return sum(i ** 2 for i in range(1, n + 1))\n```"
  mdcn: "Python *类型提示*允许你为传入函数和从函数返回的值指定数据类型。这样，任何使用你的代码的人都能确切知道应该向函数传递什么样的值，以及从函数中期望得到什么样的值。要在函数的参数列表中使用类型提示，请在参数名后跟一个冒号和数据类型，使用以下缩写之一（`int`、`float`、`bool`、`str`、`list`、`dict`、`object`、`None`\
    \ 等）。\n\n如果你需要回顾数据类型，请参阅第 3 章。\n\n以下是添加了类型提示的 `total_with_tax()` 函数：\n\n```python\n\
    def total_with_tax(total_sale: float, sales_tax_rate: float) -> float:\n    return\
    \ (1 + sales_tax_rate) * total_sale\n```\n\n类型提示表明 `total_sale` 和 `sales_tax_rate`\
    \ 都应该是 `float` 类型，并且函数也返回一个 `float`。\n\n## 使用注释\n\nPython 代码注释非常适合使代码更加明确。参考前面的例子，可能不清楚如何传入销售税率。返回类型的注释可能很有用。你可以将注释放在代码上方，或者像这里展示的那样，将注释直接放在函数内部：\n\
    \n```python\ndef total_with_tax(total_sale: float, sales_tax_rate: float) -> float:\n\
    \    # total_sale (float): 应税销售额（正数）\n    # sales_tax_rate (float): 税率，以小数表示（例如，0.07\
    \ 代表 7%）\n    # 返回四舍五入到分（两位小数）的浮点数\n    return round((1 + sales_tax_rate) * total_sale,\
    \ 2)\n```\n\n这些注释提供了关于你将传入函数的值以及期望返回什么的信息。\n\n## 处理错误\n\n在代码中构建异常处理有助于使代码更加明确，因为这样就不会对哪些数据不可接受产生任何疑问。本书中的所有示例自动化脚本都使用异常处理来优雅地处理错误。对于这个简单的销售税计算示例，我们可以添加一些异常处理来拒绝负的销售金额或无效的百分比，如下所示：\n\
    \n```python\ndef total_with_tax(total_sale: float, sales_tax_rate: float) -> float:\n\
    \    # total_sale (float): 应税销售额（正数）\n    # sales_tax_rate (float): 税率，以小数表示（例如，0.07\
    \ 代表 7%）\n    # 返回四舍五入到分（两位小数）的浮点数\n    # 异常处理\n    if total_sale < 0:\n     \
    \   raise ValueError(\"Total sale cannot be negative\")\n    if not 0 <= sales_tax_rate\
    \ <= 1:\n        raise ValueError(\"Sales tax rate must be between 0 and 1\")\n\
    \    return round((1 + sales_tax_rate) * total_sale, 2)\n```\n\n你可以为代码添加更多注释来解释异常处理，尽管代码中的错误消息（\"\
    Total sale cannot be negative\" 和 \"Sales tax rate must be between 0 and 1\"）是**不言自明的**。\n\
    \n有关异常处理的更多信息，请参阅第 3 章。第 17 章也提供了关于常见异常及其处理方法的信息。\n\n按照现在的方式编写函数，任何 Python 程序员都可以调用该函数，并使用\
    \ `try...except` 块来处理任何错误，如下所示：\n\n```python\nif __name__ == \"__main__\":\n \
    \   total_sale = 10.00\n    sales_tax_rate = 0.07\n    try:\n        result =\
    \ total_with_tax(total_sale, sales_tax_rate)\n        print(f\"Total with tax:\
    \ ${result}\")\n    except ValueError as e:\n        print(f\"Error: {e}\")\n\
    ```\n\n在编码中做到具体（且明确）可以使其他人（也许还有未来的你）更容易真正理解代码的意图以及如何最好地使用它。\n\n## 简单优于复杂\n\n这一原则强调清晰、直接的解决方案优于过于复杂的方案。对于初学者来说，这意味着要编写易于阅读、理解和维护的代码。简单的代码可以减少错误，使协作更容易，并帮助你专注于解决问题，而不是与代码本身作斗争。总结如下：\n\
    \n-   **选择清晰的逻辑。** 当直接的方法可行时，避免使用复杂的方法。\n-   **使用可读的代码。** 编写其他人（或未来的你）能够快速理解的代码。\n\
    -   **避免过度工程化。** 不要添加不必要的功能或抽象层。\n\n例如，这是一个接受一个数字并返回该数字平方的函数：\n\n```python\ndef\
    \ calculate_square(number):\n    result = number ** 2\n    return result\n```\n\
    \n这个函数可以工作，但不必要地冗长。它使用了一个临时变量（`result`）和一个函数，而更简单的方法就足够了，如下所示：\n\n```python\n\
    def square(number):\n    return number * number\n```\n\n这个版本简洁，名称清晰，并直接返回结果。它更易于阅读，并且功能相同。\n\
    \n在返回值之前执行许多操作的大型函数会增加代码的复杂性。考虑将复杂的函数分解成更小、更简单的函数。每个函数理想情况下应该只做好一件事，使测试、调试和维护更容易。\n\
    \n这里是另一个例子，如果传入偶数，函数返回 `True`；否则，返回 `False`：\n\n```python\ndef is_number_even(num):\n\
    \    if num % 2 == 0:\n        return True\n    else:\n        return False\n\
    ```\n\n这段代码过于冗长，因为它使用 `if...else` 结构来返回 `True` 或 `False`，而条件本身已经是布尔值。换句话说，表达式\
    \ `num % 2 == 0` 在 `num` 能被 2 整除（即余数为零）时返回 `True`；否则，表达式返回 `False`。以下是编写此函数的一种更简单、更清晰的方式：\n\
    \n```python\ndef is_even(num):\n    return num % 2 == 0\n```\n\n这个版本更短、更清晰。表达式\
    \ `num % 2 == 0` 的计算结果已经是 `True` 或 `False`，所以函数只需返回该结果。\n\n如果你正在查看自己的代码，想知道是否有更简单的方法来实现某个结果，可以考虑将该代码复制粘贴到\
    \ AI 中，并询问“是否有更简单、更 Pythonic 的方式来实现这段代码的功能？”\n\n这是一个函数，它对传入函数的任何列表中的所有数字求和：\n\n\
    ```python\ndef sum_list(numbers):\n    total = 0\n    for i in range(len(numbers)):\n\
    \        total += numbers[i]\n    return total\n```\n\n这个函数可以工作。当你刚开始学习 Python\
    \ 时，你可能会看到这样的代码作为使用循环的示例。然而，列表有一个内置的 `sum()` 函数，它可以用一行代码完成同样的事情：\n\n```python\n\
    def sum_list(numbers):\n    return sum(numbers)\n```\n\n为了明确应该传入函数的内容，你可以添加类型提示，如下所示：\n\
    \n```python\ndef sum_list(numbers: list):\n    return sum(numbers)\n```\n\n这个版本的美妙之处在于，输入（数字列表）和输出（数字之和）都在最少的代码中清晰地陈述了。Python\
    \ 的内置 `sum()` 函数既更简单又更高效。\n\n初学者常常倾向于编写复杂的代码以显得“聪明”，或者因为他们模仿在其他地方看到的东西。但复杂的代码通常会导致更多的错误、调试困难，以及其他人因为不理解代码的含义而误用你的代码。如果你保持简单，你会使你的代码更可靠、更易于使用。\n\
    \n## 复杂优于晦涩\n\n对于 Python 新手来说，这一原则意味着你的代码可以处理复杂的任务或想法，但应该避免不必要地晦涩难懂。区别如下：\n\n\
    -   **复杂的代码**处理复杂的问题，但结构清晰、可读且合乎逻辑。它拥抱任务必要的复杂性，同时尽可能保持直接明了。\n-   **晦涩的代码**过于纠缠、难以理解或不必要地晦涩，使其难以理解或维护。\n\
    \n作为初学者，可以将其视为选择一条清晰的路径来解决问题，即使问题需要多个步骤，而不是创建一个混乱、难以遵循的解决方案。例如，让我们看一个平方和函数，它计算从\
    \ 1 到 n 的数字的平方和（例如，对于 n = 3，计算 1² + 2² + 3² = 1 + 4 + 9 = 14）。代码如下：\n\n```python\n\
    def sum_squares(n):\n    result = 0\n    for i in range(1, n+1):\n        if i\
    \ != 0:\n            result = result + (i * i)\n    return result\n```\n\n这个函数按原样可以正常工作，但它有点过于复杂，因为：\n\
    \n-   代码包含一个不必要的检查（`if i != 0`），因为 `range(1, n+1)` 无论如何都会排除 0。\n-   循环多迭代了一次（`n+1`），并通过逻辑进行补偿，使其更难理解。\n\
    -   变量更新（`result = result + (i * i)`）过于冗长。\n\n这是一个替代函数，它完成与原始函数完全相同的功能，但更清晰、更简单：\n\
    \n```python\ndef sum_squares(n):\n    return sum(i ** 2 for i in range(1, n +\
    \ 1))\n```"
