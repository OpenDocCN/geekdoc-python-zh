  - '[PAGE 202]


    Amazon, Google, Meta, Microsoft, PayPal, Salesforce, Shopify, Stripe, Twilio,
    and X (formerly Twitter) are just a few of the major tech companies offering REST
    APIs to developers. Many of those companies offer REST APIs specifically for AI.
    Major players in the AI world offering REST APIs include Anthropic, DeepSeek,
    Hugging Face, OpenAI, Stability AI, xAI, and others.


    > Not all REST APIs are free. However, many offer a free tier so you can learn
    and test your code for free.


    Any script that interacts with a REST API is likely to use the `requests` library.
    That''s not part of the standard library. When you''re writing Python code to
    interact with a REST API, make sure to create and activate a virtual environment.
    Enter a `pip install requests` command in the Terminal. Include an `import requests`
    command in your code.


    # Making API requests


    A REST API request happens when your Python code requests information from a REST
    API on the internet. Each request gets a response that includes a status code
    to indicate whether the request succeeded or failed.


    You can make five main types of requests:


    | Type of Request | What It Does |

    |---|---|

    | GET | Retrieves data from a server. GET is used to fetch information only. This
    is the most common type of request when you''re interacting with AI. It returns
    status code 200 (OK) on success. |

    | POST | Sends data to the server to create a new resource. POST is typically
    used with databases to insert a new record into a database table. It returns status
    code 201 (Created) on success. |

    | PUT | Updates an existing resource with new data. PUT is typically used to change
    a record in a database table. It returns 200 (OK) or 204 (No Content) on success.
    |

    | DELETE | Removes a resource from the server. DELETE is typically used to delete
    a record from a database. It returns 204 (No Content) on success. |

    | PATCH | Partially updates a resource, such as a single field in a database record.
    It returns 200 (OK) or 204 (No Content) on success. |


    > Don''t worry if you''re not already familiar with database terminology like
    tables and records. That knowledge isn''t required for Python or Python automation.'
  - '[PAGE 203]


    There is no hard-and-fast rule that applies to every REST API request, but most
    include at least some of the following components:


    +   » **URL/endpoint:** The URL to which the request is sent (for example, https://api.example.com/data).

    » **Headers (optional):** A dict of metadata sent with the request, which may
    include things like authentication tokens or API keys.

    » **Query parameters (optional):** Key-value pairs appended to the URL or passed
    as a dictionary (for example, params={"key": "value"}).

    » **Response handling:** Code that processes the server''s response (for example,
    .json() to parse JSON or response.status_code to check for success).


    The documentation for the REST API will tell you the URL/endpoint to which you''ll
    send your request. For example, to get the current weather for any location, use
    the URL https://api.openweathermap.org/data/2.5/weather.


    You must include your API key in a parameter named `appid`. You can send numerous
    optional parameters. For example, if you want to get the weather for a city in
    the United States, and you want the temperature expressed in degrees Fahrenheit,
    use the `q` parameter to specify the city and state and use the `units` parameter
    with the value "imperial" for Fahrenheit.


    Specify the URL to which you''ll send the request (as specified in the OpenWeatherMap
    API documentation). In this example, let''s assume you have the key in the .env
    file, as shown in the "Making API requests section, earlier in this chapter, assigned
    to the name WEATHER_API_KEY as follows:


    ```

    WEATHER_API_KEY=8c21435c4317367221435aac09bf4c1d

    ```


    > The API key shown in the example isn''t a valid one — it''s just an example.
    Make sure to get your own API key from https://openweathermap.org and use that
    key to try out the code.


    Here is a more complete example that includes the `import os` and `load_dotenv`
    code needed to access the .env file, followed by a complete REST API request for
    OpenWeatherMap, with lots of comments to explain what''s going on:


    ```

    from dotenv import load_dotenv

    import os


    # Load the .env file

    load_dotenv()

    ```'
