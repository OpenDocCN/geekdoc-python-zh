    \ most video types, including .avi, .flv, .mkv, .mov, .mp4, .mpeg, .webm, and\
    \ .wmv. You can use a file with any of those extensions in your video_path variable.\n\
    \nKeep in mind that every second of video contains about 30 individual frames\
    \ (images). A one-minute video contains about 1,800 frames. A ten-minute video,\
    \ about 18,000 frames! When specifying your interval variable, you can use whole\
    \ numbers or decimal numbers. For example, setting interval to 1 takes images\
    \ at one-second intervals. Setting interval to 0.5 takes one image every half-second.\
    \ Setting interval to 1.5 takes an image every 1.5 seconds.\n\nKeep in mind that\
    \ the shorter the interval, the more frames you'll generate. Each frame you generate\
    \ could easily be an image file that's 3MB or more in size. For example, if you\
    \ capture a frame every second in a ten-minute video, you'll generate 600 image\
    \ files!\n\n## IN THIS CHAPTER\n\n- Automating mouse and keyboard\n- Typing text\
    \ from a Python script\n- Creating your own shortcut keys\n- Taking screenshots\
    \ automatically\n\n## Chapter 7\n### Automating Mouse and Keyboard\n\nIn this\
    \ chapter, you investigate techniques for automating the mouse and keyboard. These\
    \ techniques allow you to simulate human input for tasks like graphical user interface\
    \ (GUI) testing, data entry, or repetitive workflows where you need to type the\
    \ same thing over and over.\n\nPyAutoGUI (short for Python Automation for Graphical\
    \ User Interfaces) is the main library we'll use for these scripts. It's not part\
    \ of the standard library. You'll need to `pip install` it yourself. I suggest\
    \ you create a folder for the script (or all scripts that use PyAutoGUI); then\
    \ create a virtual environment and activate that virtual environment (see Chapter\
    \ 2). Then make sure you enter this command at the VS Code Terminal:\n\n```bash\n\
    pip install pyautogui\n```\n\nIf you want to try out all the scripts in this chapter,\
    \ you can create each one in that same sample folder to share the PyAutoGUI module.\n\
    \n## Granting Permissions on a Mac\n\nBy default, Mac computers generally won't\
    \ allow apps to take control of your mouse or keyboard. On macOS, the first time\
    \ you try to run a script in this chapter, a permission error may display onscreen,\
    \ saying the app doesn't have sufficient permissions. Or you may see that the\
    \ script is running in the VS Code Terminal, but the mouse isn't moving onscreen.\n\
    \nFor mouse and keyboard operations to work on a Mac, you may need to give accessibility\
    \ permissions to your code editor. Click the Apple icon in the upper-left corner\
    \ of your screen and choose System Settings; in System Settings, click Privacy\
    \ & Security, and then click Accessibility. Set the slider next to your code editor's\
    \ name to On. In Figure 7–1, I granted permission to Visual Studio Code, since\
    \ I'm using VS Code as my editor. Enter your password or use Touch ID to make\
    \ changes if prompted. If you're using a different editor, you may need to grant\
    \ permission to that editor.\n\n![Figure 7-1: Allowing VS Code to control the\
    \ mouse.](img/10d8e89b301a0e7452bff4d402265e78_151_0.png)\n\n## Moving the Mouse,\
    \ Clicking, Dragging, and Scrolling\n\nPython can take control of your mouse and\
    \ do anything you'd otherwise do by hand. That includes moving the mouse pointer,\
    \ clicking, double-clicking, right-clicking, dragging, and scrolling. The library\
    \ that grants you these powers is PyAutoGUI.\n\nAs I mention at the start of this\
    \ chapter, PyAutoGUI isn't included in the Python standard library. So, make sure\
    \ you create and activate a virtual environment for this script (if you haven't\
    \ already done so), and then enter the following command in the Terminal:\n\n\
    ```bash\npip install pyautogui\n```\n\n### Understanding screen coordinates\n\n\
    PyAutoGUI lets you move the mouse pointer to any location on the screen based\
    \ on X, Y coordinates, where X is the distance from the left side of the screen,\
    \ and Y is the distance from the top. The unit of measure is the pixel, where\
    \ each pixel is one tiny lighted dot on your screen.\n\nThe word pixel is short\
    \ for picture element. A computer screen that's 1,980 x 1,280 is 1,930 pixels\
    \ across and 1,280 pixels tall.\n\nThe very upper-left corner of the screen is\
    \ position 0,0. The lower-right corner of the screen is whatever your screen resolution\
    \ happens to be, minus 1 for each coordinate (because the counting starts at 0).\
    \ So, if you have a 2K QHD computer monitor with a resolution of 2,560 x 1,440,\
    \ the lower-right corner of your screen is 2559,1439.\n\n### Controlling the mouse\
    \ speed\n\nPyAutoGUI can move the mouse at a very high rate of speed. That can\
    \ work against you if the mouse starts doing crazy things that you don't want.\
    \ To slow things down, you can specify how long any operation takes. That way\
    \ you can see what's going on and keep an eye on things. You do so by adding a\
    \ duration= parameter to your move command. Here's the syntax:\n\n```python\n\
    pyautogui.move(x, y, duration=duration)\n```\n\nReplace *duration* in the preceding\
    \ line with the number of seconds the action should take.\n\nIn the `move(x, y)`\
    \ method, *x* is the distance from the left side of the screen, in pixels, to\
    \ move the mouse pointer; *y* is the distance from the top, in pixels, to move\
    \ the mouse pointer.\n\nIn the following code, the first line moves the mouse\
    \ pointer to coordinates 1,1 near the upper-left corner of the screen and takes\
    \ about half a second to do so. The second line moves the mouse pointer down,\
    \ and to the right, 900 pixels, and takes 1 second to do so:\n\n```python\npyautogui.moveTo(1,\
    \ 1, 0.5)\npyautogui.moveTo(900, 900, 1)\n```\n\n### Stopping a wild mouse\n\n\
    If PyAutoGUI ever starts doing something that you don't want, you can stop it\
    \ immediately by grabbing the mouse and moving the mouse pointer yourself to any\
    \ corner of the screen.\n\n![Figure 7-2: The MouseInfo window.](img/10d8e89b301a0e7452bff4d402265e78_153_0.png)\n\
    \nPyAutoGUI itself will trigger that instant fail-safe stop, even when it moves\
    \ the mouse pointer to any corner of the screen. You always want to make sure\
    \ you don't do that unintentionally in your code. In the sample code earlier,\
    \ I started by moving the mouse pointer to 1,1 rather than 0,0 to avoid triggering\
    \ that fail-safe condition.\n\nThe fail-safe feature is enabled automatically\
    \ whenever you use PyAutoGUI in a script. You can disable it by setting `pyautogui.FAILSAFE`\
