  - "[PAGE 162]\n\n```\n# listen_esc.py\n# You must pip install pynput for this to\
    \ work.\nfrom pynput import keyboard\nimport sys\n\ndef on_press(key):\n    #\
    \ Check if the Esc key is pressed.\n    if key == keyboard.Key.esc:\n        print(f'Esc\
    \ key detected! Stopping the script...')\n        # Stop the listener and exit\
    \ the script\n        sys.exit(0)\n\n# Set up the keyboard listener.\nprint(f'Press\
    \ Esc in any window to stop')\nwith keyboard.Listener(on_press=on_press) as listener:\n\
    \    listener.join()\n```\n\nNotice the function named `on_press(key)`. Whenever\
    \ the preceding script is running, the `key` parameter in parentheses receives\
    \ the last key pressed on the keyboard, no matter what window you're in. The line\
    \ that reads `if key == keyboard.Key.esc` is True when you press Esc, so the function\
    \ simply prints a little feedback and stops script execution with `sys.exit(0)`.\n\
    \nThe most complicated code is probably `with keyboard.Listener(on_press=on_press)`,\
    \ which creates a `pynput` listener that can detect every key pressed at the keyboard.\
    \ The `on_press=on_press` bit says to call the function names `on_press` every\
    \ time a key is pressed. Whatever key was pressed is then passes to that function\
    \ as the `key` parameter.\n\nThe `as listener` part simply names that keyboard\
    \ listener `listener`. The `listener.join()` activates the listener by temporarily\
    \ blocking the Python script from being the only one listening for keystrokes,\
    \ so the listener can monitor keystrokes globally, across all open windows. That\
    \ listener stays in effect until `sys.exit(0)` terminates the Python script, which\
    \ also terminates the listener.\n\n# Creating Your Own Keyboard Shortcuts\n\n\
