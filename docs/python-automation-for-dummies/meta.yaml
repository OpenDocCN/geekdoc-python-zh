  md: "# Clicking a form’s Submit button\n\nAfter the loop has completed the task\
    \ of typing text into all the text boxes on the form, the following lines click\
    \ the Submit button to submit the form:\n\n```\nsubmit_button = driver.find_element(By.XPATH,\
    \ \"//button[@type='submit']\")\nsubmit_button.click()\n```\n\nThat syntax is,\
    \ admittedly, a bit strange looking. The word `driver` refers to the Selenium\
    \ WebDriver instance that’s currently controlling the browser. The `.find_element()`\
    \ method tells the driver to locate a specific element on the page. `By.XPATH`\
    \ specifies the method to locate the element, which is what Selenium uses to locate\
    \ tags in HTML documents. Then the crazy-looking `\"//button[@type='submit']\"\
    ` expression starts with `//`, which tells XPath to search the entire page to\
    \ look for a button that has a `type=\"submit\"` attribute. That line simply finds\
    \ the button; the following line actually clicks it:\n\n```\nsubmit_button.click()\n\
    ```\n\nI’ve tried to make the script as generic as possible, even though no two\
    \ web pages are exactly alike in terms of URL or controls on a page. In the following\
    \ section, I explain how to adapt it to your own use case.\n\n# Adapting the script\
    \ to your needs\n\nTo adapt this script to your own needs, set the variables in\
    \ the `main()` function. Be sure to set the `site_url` to the URL of the page\
    \ that contains your form. The `sample_data` variable must be a dictionary with\
