  md: "# Complex Is Better than Complicated\n\nFor a newbie Python developer, this\
    \ principle means that it’s okay for your code to handle complex tasks or ideas,\
    \ but it should avoid being unnecessarily complicated. Here’s the difference:\n\
    \n> » **Complex code** deals with intricate problems but is structured, readable,\
    \ and logical. It embraces the necessary complexity of the task while keeping\
    \ things as straightforward as possible.\n\n» **Complicated code** is overly tangled,\
    \ hard to follow, or unnecessarily obscure, making it difficult to understand\
    \ or maintain.\n\nAs a beginner, think of this as choosing a clear path to solve\
    \ a problem, even if the problem requires multiple steps, rather than creating\
    \ a messy, hard-to-follow solution. As an example, let’s look at a sum of squares\
    \ function, that calculates the sum of squares for numbers from 1 to n (for example,\
    \ for n = 3, compute 1² + 2² + 3² = 1 + 4 + 9 = 14). Here’s the code:\n\n```\n\
    def sum_squares(n):\n    result = 0\n    for i in range(1,n+1):\n        if i\
    \ != 0:\n            result = result + (i * i)\n    return result\n```\n\nThe\
    \ function works fine as written, but it’s a little overcomplicated because:\n\
    \n> » The code includes an unnecessary check (if i != 0) because range(1, n+1)\
    \ would exclude 0 anyway.\n\n» The loop iterates one extra time (n+1) and compensates\
    \ with logic, making it harder to follow.\n\n» The variable update (result = result\
    \ + (i * i)) is verbose.\n\nHere’s an alternative function that accomplishes exactly\
    \ the same thing as the original function, but in a cleaner, simpler way:\n\n\
    ```\ndef sum_squares(n):\n    return sum(i ** 2 for i in range(1, n + 1))\n```"
