    \   print(href)\n\nexcept requests.RequestException as e:\n    print(f\"Error\
    \ fetching the page: {e}\")\n\ndef main():\n    # URL of the web page to scrape.\n\
    \    page_url = \"https://en.wikipedia.org/wiki/Platypus\"\n\n    get_links(page_url)\n\
    \nif __name__ == \"__main__\":\n    main()\n```\n\nI'll step through this script\
    \ and discuss key components. The imports at the top of the page load the `requests`\
    \ module (for accessing a web page) and `bs4` from BeautifulSoup. BeautifulSoup\
    \ is a library of code, and `bs4` is a core component for parsing web pages.\n\
    \n![](img/10d8e89b301a0e7452bff4d402265e78_226_0.png)\n\nEven though you `pip\
    \ install lxml`, you don't need an `import lxml` statement in your script to use\
    \ it. BeautifulSoup will use `lxml`, when needed, as long as it's available because\
    \ you installed it.\n\n# Sending a browser header\n\nWhen you browse the web using\
    \ a web browser, your browser identifies itself with a `User-Agent` header. This\
    \ sometimes includes text that identifies the browser and the operating system\
    \ you're using.\n\nWhen you access a site using an automation script, no such\
    \ header is sent. Some sites may reject or limit access to pages on the assumption\
    \ that the script is a search engine indexer or an advertising-related bot that\
    \ adds a lot of traffic to the site."
