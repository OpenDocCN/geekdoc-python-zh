    \        yield None, gr.update(value=\"Prompt cannot be empty.\")\n        return\n\
    \    yield None, gr.update(value=\"Starting generation...\")\n    for image, status\
    \ in generate_image(prompt, status_box=None):\n        yield image, status\n```\n\
    \nNote the use of the keyword `yield` in that function. The word `yield` is a\
    \ gradio keyword that creates a generator function that can return multiple values.\
    \ In other words, it supports *streaming outputs* (where a function can return\
    \ different values over time), which is exactly what you need if you want to show\
    \ a progress indicator as a function is running.\n\nIn this example, the `yield`\
    \ keyword returns two values each time it's called. The first value is placed\
    \ in the image placeholder, where the generated image appears, after it's completed.\
    \ The second value is displayed in the status box, which keeps the user informed\
    \ of status or any error messages.\n\nIn the `gradio_generate()` function, this\
    \ first `yield` line is as follows:\n\n```\nyield None, gr.update(value=\"Prompt\
    \ cannot be empty.\")\n```\n\nIt shows nothing (`None`) in the image box, and\
    \ an error message (\"Prompt cannot be empty.\") in the status text box if the\
    \ user didn't provide a prompt. Otherwise, the following line executes:\n\n```\n\
    yield None, gr.update(value=\"Starting generation...\")\n```\n\nThis line still\
    \ leaves the image box empty. But the status text box displays the text to tell\
    \ the user that image generation has started.\n\nThe next line sets up a `for`\
    \ loop to call the function named in `generate_image()` repeatedly. The `prompt`\
    \ parameter is the user's prompt for creating the image. The `status_box` parameter\
    \ gets `None` as input, because there is no status to report at this moment in\
    \ time.\n\n```\nfor image, status in generate_image(prompt, status_box=None):\n\
    ```"
