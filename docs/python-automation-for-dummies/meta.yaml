  md: "You would expect `fruits[3]` to be `Cherry`, the third item in the list. But\
    \ that's not how Python sees it. Python sees it like this:\n\n```\nfruits[0] =\
    \ 'Apple'\nfruits[1] = 'Banana'\nfruits[2] = 'Cherry'\n```\n\nThere is no `fruits[3]`\
    \ as far as Python is concerned. That's why the code generates an error.\n\nOne\
    \ way to get around that problem is to try to avoid using loops with `range()`\
    \ or some other kind of counter when working with a list. The simplest way to\
    \ loop through a list using this syntax, which will never encounter an `IndexError`\
    \ (because it repeats once for each item in the list and knows to start at 0)\
    \ is as follows:\n\n```\nfruits = ['Apple', 'Banana', 'Cherry']\nfor fruit in\
    \ fruits:\n    print(fruit)\n```\n\nYou can do that more compactly using list\
    \ comprehension like this:\n\n```\nfruits = ['Apple', 'Banana', 'Cherry']\n[print(fruit)\
    \ for fruit in fruits]\n```\n\nIf you need to keep a counter going as you're moving\
    \ through a list, you can use Python enumeration, which allows you to automatically\
    \ assign a number to each item in a list. For example, look at this code:\n\n\
    ```\nmy_list = ['apple', 'banana', 'cherry']\nfor index, value in enumerate(my_list,\
    \ start=1):\n    print(f\"Index: {index}. {value}\")\n```\n\nThe syntax here uses\
    \ a `for` loop with the name `index` (which is a counter), and `value` (an item\
    \ from the list). The word `enumerate` lets Python know you want `index` to be\
    \ a counter. The name `my_list` is a reference to the original list. The `start=1`\
    \ lets Python know you want to start counting at 1. The output from that is:\n\
    \n```\n1. apple\n2. banana\n3. cherry\n```\n\nPython (and most other programming\
    \ languages) start lists at 0 rather than 1, because it's more efficient for computers\
    \ to handle lists that way. If you use enumeration without `start=1`, items will\
    \ be numbered starting at 0.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_349_0.png)"
