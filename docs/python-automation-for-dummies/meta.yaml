    *gigabytes*, and so forth.


    If I assume too much, there are plenty of resources available to you to fill in
    the blanks. Artificial intelligence (AI) is usually your best bet for getting
    quick definitions and answers to tech questions. Any free AI will do. In Windows,
    you can use Copilot. On a Mac, you can use Apple Intelligence. Or you can use
    any AI that includes a free tier such as ChatGPT at https://chatgpt.com.


    # Icons Used in This Book


