    # THINKING LIKE A SOFTWARE ENGINEER: PUTTING ARTIFICIAL INTELLIGENCE TO WORK FOR
    YOU


    Writing Python automation requires writing computer code. This book isn''t a replacement
    for a beginner''s tutorial on the entire Python language. Instead, it''s a collection
    of Python automation scripts, designed to automate and simplify mundane, time-consuming
    computer tasks.


    These days, most software engineers (people who write computer code for a living)
    use artificial intelligence (AI) to help with writing code. Sure, you''ll hear
    many software engineers complain that AI can''t write code as well as they can,
    but that sentiment may be rooted in feeling threatened.


    In addition to writing code, AI can easily answer any questions that come up along
    the way as you''re using this book. If I throw some terminology at you that leaves
    you scratching your head, ask AI to explain things. If some code leaves you stymied,
    show the code to AI and ask it to explain the code to you.


    You can even tell AI to write an entire script for you, doing exactly what a script
    in this book does. But don''t be surprised if the code you get from AI looks different
    from what''s in this book. Python offers many tools and techniques for accomplishing
    any task. There''s no telling exactly how AI will generate code to perform some
    feat. If AI gives you a script that looks nothing like the script in this book,
    that doesn''t mean one is right and the other is wrong — you probably just have
    two scripts that do the same thing in different ways. That''s not unusual. They
    say there''s more than one way to bake a cake. Likewise, there''s more than one
    way to write a script to accomplish some task.


    # Choosing a Programming Language


    There are many programming languages in the world. They have names like C#, Go,
    Java, JavaScript, Python, and TypeScript, to name a few. The TIOBE Index (www.tiobe.com/tiobe-index)
    consistently ranks Python as the most popular language of our time.


    JavaScript is great for creating web apps, but it''s rarely used for anything
    else. Python excels at AI and automation. In fact, Python has so many ready-to-use
    modules designed for automation that it would probably be crazy to use any language
    *other* than Python for the kinds of automation scripts you''ll see throughout
    this book.'
- md: "There's a lot to like about Python — and many reasons to learn Python beyond\
