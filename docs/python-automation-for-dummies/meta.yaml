  md: 'With that in mind, look at the code again. On the one hand, `schedule.every(10).seconds.do(job)`
    is adding the task to run the job every ten seconds to a queue. But it isn’t actually
    running the task.


    The `while True` loop is constantly running, but it repeats only once every second
    (not thousands of times a second). During that one second, the computer can be
    handling other demands from other apps. When the loop repeats and `schedule.run_pending()`
    is executed, then any scheduled tasks waiting in the queue can be executed (one
    at a time if there are several) without “crashing into” each other and overwhelming
    the CPU.


    Thats how it all works, technically, behind the scenes. From your standpoint,
