  md: "# Getting Loopy with Loops\n\nLoops are common in all programming languages.\
    \ They're used to repeat one or more lines of code multiple times. You can use\
    \ them to access items in a list one at a time, folders on a drive, or files in\
    \ a folder. Python provides two main types of loops: `for` loops and `while` loops.\n\
    \n# Looping with for\n\nThe `for` loop is useful when counting or when there is\
    \ a known number of items to iterate over. The loop executes a block of code for\
    \ each item in the sequence. The syntax is as follows:\n\n```\nfor variable in\
    \ sequence:\n    # Code to repeat\n```\n\nReplace `variable` with a variable name\
    \ of your choosing. This value keeps count with each iteration of the loop. Replace\
    \ `sequence` with the name of the list or collection of items to loop through.\
    \ The colon (`:`) marks the start of the loop block, and indentation defines what\
    \ code belongs inside the loop. Indentation is critical, because only the code\
    \ that's indented under the `for` statement is repeated for each loop iteration.\
    \ The first un-indented line under `for` isn't executed until the looping is completed.\n\
    \nHere's an example where I define a list of three values and then use a `for`\
    \ loop to go through the list and print each item on a separate line:\n\n```\n\
    # Define a list and loop through the list.\nfruits = [\"apple\", \"banana\", \"\
    cherry\"]\nfor fruit in fruits:\n    print(fruit)\n```\n\nWith Python automation,\
    \ you're more likely to loop through all files in a folder, or something similar.\
    \ Here's an example where the `folder_path` variable indicates the location and\
    \ name of a hypothetical folder. Then the `for` loop iterates through each file\
    \ in the folder and displays its name. The script imports the built-in `pathlib`\
    \ module, which contains the code to allow such looping to work.\n\n```\nfrom\
    \ pathlib import Path\n# Specify the directory path (you can change this to your\
    \ desired directory).\ndirectory = Path(r\"C:\\Users\\Alan\\Documents\\Practice\"\
    ) # Windows example\n#directory = Path(\"/Users/Alan/Practice\") # Mac example\n\
    ```"
  merge: -1
  pgno: 62
- img_proc: true
  md: "```\n# Loop through all files in the directory.\nfor file_path in directory.iterdir():\n\
    \    if file_path.is_file():  # Check if it's a file (not a directory).\n    \
    \    print(f\"Found file: {file_path.name}\")\n```\n\n# Looping for a while\n\n\
    The `while` loop repeats a block of code as long as a condition is true. It's\
    \ like saying, “Keep doing this until something changes.” There is no variable\
    \ keeping track of how many times you've gone through the loop, so you don't want\
    \ to use this loop where counting is required. The syntax of the `while` loop\
    \ is:\n\n```\nwhile condition:\n    # Code to repeat\n```\n\nThe condition statement\
    \ can be anything that evaluates to either `True` or `False`. The loop runs for\
    \ as long as the condition remains `True`. All code that's indented below the\
    \ `while` line is executed with each pass through the loop. When the condition\
    \ evaluates to `False`, the loop stops and code execution resumes at the first\
    \ non-indented line of code below the loop.\n\nIf the condition never evaluates\
    \ to `False`, the script will get stuck in an infinite loop. If you find yourself\
    \ in that predicament, press Ctrl+C to cancel the loop. You may have to press\
    \ Ctrl+C a few times.\n\nA `while` loop can be used to repeatedly ask a user for\
    \ input until some condition is met. In the following example, a prompt asks the\
    \ user to enter a number between 1 and 10. If the user ignores the prompt and\
    \ enters something else, the loop keeps asking until the user complies with the\
    \ requests (or presses Ctrl+C to bail out of the loop):\n\n```\n# Start with user_input\
    \ at some number that's not between 1 and 10.\nuser_input = 0\n# Loop until the\
    \ input is a number between 1 and 10.\nwhile user_input < 1 or user_input > 10:\n\
    \    try:\n        # Get input from the user and convert it to an integer.\n \
    \       user_input = int(input(\"Enter a number between 1 and 10: \"))\n    except\
    \ ValueError:\n        # Handle non-numeric input (for example, letters or symbols).\n\
    \        print(\"Invalid input! Please enter a valid number.\")\n\n# After the\
    \ loop ends, confirm the valid input.\nprint(f\"You entered a valid number: {number}\"\
    )\n```"
