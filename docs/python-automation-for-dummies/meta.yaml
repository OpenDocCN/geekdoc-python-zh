    \ file_hash = calculate_file_hash(file)\n            if file_hash in file_hashes:\n\
    \                duplicates.append(file)\n                print(f\"Duplicate found:\
    \ {file} (same as {file_hashes[file_hash]})\")\n            else:\n          \
    \      file_hashes[file_hash] = file\n    return duplicates\n```\n\n`file_hashes`\
    \ 字典中的每一行包含一个文件的哈希摘要，后跟一个冒号，然后是产生该哈希值的文件路径，如下例所示：\n\n```python\n{\n    'abc123':\
    \ Path('C:/Users/Alan/Documents/Practice Duplicates/file1.txt'),\n    'def456':\
