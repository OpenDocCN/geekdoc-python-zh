    ![](img/10d8e89b301a0e7452bff4d402265e78_33_0.png)


    FIGURE 2-6: Selecting a Python interpreter.


    ![](img/10d8e89b301a0e7452bff4d402265e78_33_1.png)


    FIGURE 2-7: Choose the Recommended Python interpreter.


    In this chapter, I had you select the Recommended interpreter in case you''re
    just getting started with Python and just want to use the latest Python version.
    In practice, some projects require specific Python versions, so VS Code lets you
    pick one each time you start it. You won''t need this for this book, but I''m
    mentioning it because choosing a specific version helps advanced developers.


    # Opening the Terminal in VS Code


    Much of the time when working with Python, you''ll use the Terminal pane. The
    Terminal provides a *command line interface* (CLI) for entering commands from
    the keyboard. You can open the Terminal from the menu, or shortcut keys, as follows:


    +   >> Choose View > Terminal from the menu bar.

    >> Press F1, or press Ctrl+` in Windows or Command+` in macOS. ` is the backtick
    character, usually to the left of the number 1 on the keyboard.


    The Terminal opens near the bottom of the VS Code window, looking something like
    Figure 2-8 (in Windows). The PS and path you see are the *command prompt*, where
    you type your commands.


    22 PART 1 Getting Started with Python Automation'
  - '[PAGE 34]


    ![](img/10d8e89b301a0e7452bff4d402265e78_34_0.png)


    In Linux and macOS, the command prompt will be different, but don''t worry about
    that right now. I explain more after we activate a virtual environment a little
    later in this chapter. However, it''s worth noting that you''re not stuck with
    whatever happens to be showing as your default command line shell. You can use
    the drop-down arrow next to the current shell name to choose a different command
    line shell if you like.


    You always want to know what Python version you''re using in VS Code, and the
    Terminal lets you find out, as I explain in the next section.


    # # Checking your Python version


    To see what Python version you''re currently using, you can enter either the command
    `python --version` or `python -V` (the case matters here). But until you''ve set
    up a virtual environment (see the next section), that command may give you an
    error message. The trick to get around that may seem strange, but here it is:


    +   - In Windows, use `py` rather than `python` at the command.

    - In Linux or macOS, use `python3` rather than `python` as the command.


    The reason for this weirdness has to do with the operating system PATH that determines
    how system commands (which are run from the operating system) have been treated
    in the past, and the fact that different projects may require different Python
    versions. Both `py` and `python3` are *aliases* for the python command and will
    use whatever python version is currently available. In VS Code, that''s the Python
    version you chose when choosing Python: Select Python Interpreter from the command
    palette (see "Selecting your Python version," earlier in this chapter).


    Python code is case-sensitive, meaning you can''t use uppercase and lowercase
    letters interchangeably. You must use the same uppercase and lowercase letters
    shown in this book for things to work as described in this book.'
  - '[PAGE 35]


    When VS Code tells you it doesn''t recognize `python` as a command, you can still
    determine your Python version using the following:


    +   » In Windows, enter the command `py --version` or `py -V` to determine your
    Python version.

    » In Linux or macOS, enter the command `python3 --version` or `python3 -V` to
    determine your Python version.


    After you type the appropriate command and press Enter, the current Python version
    will show just under the command you typed, as shown in Figure 2-9.


    ![](img/10d8e89b301a0e7452bff4d402265e78_35_0.png)


    After you''ve set up and activated a virtual environment, the `python` command
    will work as expected. Let''s get started on the whole business of virtual environments
    now.


    # Using Virtual Environments


    Every Python script or app should live in its own folder (its *workspace folder*)
    for organization and portability. Each one also needs its own virtual environment,
    specifying the Python version and module dependencies, to run correctly. This
    setup lets you execute the script on any computer — Linux, macOS, Windows — regardless
    of the system''s Python version or installed modules.


    At first, the process of creating a virtual environment may seem like a bit of
    a pain. But you get used to it, and the advantages are well worth the tiny effort
    it takes to create and activate a virtual environment.'
  - '[PAGE 36]


    # Creating a virtual environment


    The command to create a virtual environment is, technically, `python -m venv`
    followed by a name for the virtual environment. But, of course, that `python`
    command may fail, so you''ll have to use the `py` alias in Windows or the `python3`
    alias in Linux or macOS to get it to work.


    The `-m` is a *flag* the tells Python to run a module named `venv` as a script,
    rather than as a module (which is something we normally add to existing scripts
    rather than run directly). That name, `venv` is short for *virtual environment*.


    You also need to give the virtual environment a name. The virtual environment
    is stored in a subfolder under the workspace folder name. You can name your virtual
    environment anything you like, but `.venv` is a common name. That `.venv` name
    offers several advantages over some name you choose at random:


    +   » The dot in `.venv` signals to other developers that the folder contains
    configuration or utility information and is not part of the actual Python code.

    » Many modern editors like VS Code and PyCharm recognize `.venv` as a virtual
    environment and auto-detect it for Python interpreter selection, reducing setup
    steps.

    » On Unix-like systems (Linux, macOS), files and folders starting with a dot are
    hidden unless the user specifically knows how to look for them. That prevents
    less experienced users from messing about in the `.venv` folder without knowing
    what they''re doing.


    In short, you can think of using `.venv` as the virtual environment folder name
    a “best practice,” and the consistency will make it easier to recognize its purpose
    at a glance.


    To create a virtual environment named `.venv`, open the VS Code Terminal and enter
    the appropriate command:


    +   » **Windows:** `py -m venv .venv`

    » **Linux or macOS:** `python3 -m venv .venv`


    You won''t get any feedback in the Terminal after you press Enter. But if you
    look at the Explorer pane, you''ll probably see the `.venv` folder icon under
    the root of your workspace folder, `First Python` in our working example. You
    may also see the message shown in Figure 2–10 pop up in the lower-right corner
    of VS Code.'
- md: "## Activating a virtual environment\n\nCreating a virtual environment doesn't\
    \ activate the virtual environment. You always want to make sure your virtual\
    \ environment is activated before you start working on your script or run a script.\
    \ That you'll do in the Terminal window of VS Code. The command prompt in the\
    \ Terminal should still show the path of the workspace root folder. Enter one\
    \ of the commands to run the activate script within that folder, depending on\
    \ your operating system:\n\n```\n>> Windows: .venv\\Scripts\\activate\n>> Linux\
    \ or macOS: .venv/bin/activate\n```\n\nNotice that Windows uses backslashes (\\\
    ), while Linux and macOS use forward slashes (/). Remember to use the same uppercase/lowercase\
    \ letters shown here.\n\nIf you see a warning about the script coming from an\
    \ “unknown publisher,” type **A** and press Enter to always run. The publisher\
    \ in this instance is the Python Software Foundation, which created the venv module,\
    \ and you can certainly trust them.\n\nWhen a virtual environment is active, the\
    \ name of that virtual environment shows in the command prompt, so you know the\
    \ virtual environment. Figure 2–11 shows how the command prompt may look in Windows,\
    \ where the name `.venv` is enclosed in parentheses at the start of the command\
    \ prompt.\n\nIn a Linux or macOS environment, the command prompt path won't look\
    \ the same as shown in Figure 2–11. If you're using the zsh command line shell,\
    \ then it will look more like this:\n\n```\n.venvalan@MacBookAir First Python\
    \ %\n```\n\nIf you're using the bash shell, it will look more like this:\n\n```\n\
    bash\n.venvMacBookAir:First Python alan$\n```\n\nOn your own computer, *MacBookAir*\
    \ will be the name of the computer you're using, and *alan* will be your own username.\n\
    \nZ shell (or zsh) is a command-line interpreter shell, similar to Bash (short\
    \ for Bourne Again Shell), but with more capabilities. Until macOS Catalina 10.15,\
    \ released in 2019, macOS used Bash as the default shell; since then, zsh has\
    \ been the default shell for macOS.\n\nYou can choose which command line shell\
    \ you want to use by clicking the drop-down arrow next to the current shell name\
    \ near the upper-right corner of the Terminal (refer to Figure 2-8). But Python\
    \ commands should work the same way with either shell.\n\nAfter you've activated\
    \ a virtual environment, you no longer need to use an alias like `py` or `python3`\
    \ instead of `python` in a command. The `python` command works without the alias.\
    \ So, now you can use `python --version` or `python -V` to see the version number\
    \ of Python you're using for the current project.\n\nWhen your workspace folder\
    \ is open and your virtual environment is active, you're ready to get to work\
    \ on creating or modifying your script or running a script if you've already created\
    \ one. It's extremely unlikely you'll need to deactivate the virtual environment\
    \ while you're in the workspace. But in the interest of completeness, I should\
    \ tell you that it's easy to do. Regardless of what operating system you're using,\
    \ you can just type the following command at the command prompt and press Enter:\n\
    \n```\nbash\ndeactivate\n```\n\nThe name of the virtual environment disappears\
    \ from the start of the command prompt in the Terminal. The command `python` goes\
    \ back to being unrecognized, so you'd have to use the `py` or `python3` alias\
    \ to run any Python commands.\n\n## Installing Modules\n\nAfter you've created\
    \ and opened your project workspace folder, selected your Python version (interpreter),\
    \ and created and activated your virtual environment, you can install any modules\
    \ your project might use. So, what are modules and why would you use them?\n\n\
    A Python *module* is Python code already written by someone else to perform certain\
    \ tasks. Most modules have been around for years, have been refined and improved\
    \ over the years, and are ideal for performing whatever they're designed to do.\
    \ Modules help you avoid reinventing the wheel, by giving you trustworthy code\
    \ to perform some common tasks.\n\nSome modules are part of the Python standard\
    \ library and installed automatically when you first install Python. You can use\
    \ them any time in your code just by including an `import` statement at the top\
    \ of your code. The most common and widely recognized modules include the following:\n\
    \n- **math**: Mathematical functions\n- **os**: Operating system interfaces\n\
    - **sys**: System-specific parameters and functions\n- **datetime**: Date and\
    \ time handling\n- **random**: Random number generation\n\nTo keep the base Python\
    \ installation lean, many larger more specialized modules are not included. But\
    \ you can add them to your virtual environment using a `pip install` command at\
    \ the command prompt when you're sure that virtual environment is active. The\
    \ name *pip* is short for Pip Installed Packages, and that's exactly what it does.\
    \ You just enter a command like this:\n\n```\npip install modulename\n```\n\n\
    Replace *modulename* with the name of the module you want to import. Optionally,\
    \ you can install multiple modules just by separating their names with a space,\
    \ like this:\n\n```\npip install modulename1 modulename2 modulename3 modulename4\n\
    ```\n\nSo, how do you know what modules to import for a script? When you're a\
    \ beginner creating your own scripts, you don't. But when you're running an existing\
    \ script, like those presented in this book, the `import` statements at the top\
    \ of the code tell you exactly which modules you'll need.\n\n```\nimport requests\n\
    import tkinter as tk  # For GUI\nfrom bs4 import BeautifulSoup  # For web scraping\n\
    import pandas as pd  # For data handling\nimport matplotlib.pyplot as plt  # For\
    \ plotting\n\nclass WeatherDashboard:\n    def __init__(self, root):\n       \
    \ self.root = root\n        self.root.title(\"Weather Dashboard\")\n        self.root.geometry(\"\
    400x500\")\n```\n\nThe name of the module to install is always right after the\
    \ word `import`. Don't worry about `from` or `as` names in the preceding sample\
    \ code (`import tkinter as tk` or `from bs4 import BeautifulSoup`). Just use the\
    \ name after `import` in your `install` command. For example, to install packages\
    \ to run that script, you could enter these `pip install` commands:\n\n```\npip\
    \ install requests\npip install beautifulsoup4\npip install pandas\npip install\
    \ matplotlib\n```\n\nOptionally, you could import them all with the following\
    \ single command:\n\n```\npip install requests beautifulsoup4 pandas matplotlib\n\
    ```\n\nDon't worry about memorizing all of that right now. I'll be sure to explain\
    \ requirements with each automation script presented in this book. For now, it's\
    \ sufficient to make the connection between the `import` statements at the top\
    \ of a script, and the `pip install` commands for adding those to the script's\
    \ virtual environment.\n\n## Writing and Running Python Scripts\n\nThe goal of\
    \ everything we've done so far is to set things up to create a Python app or script.\
    \ The word *app* is short for *application*, and it typically refers to larger\
    \ commercial apps requiring dozens of files of code. In Python, it's common to\
    \ refer to single-file apps as *scripts*. Most automation projects in this book\
    \ only require one file of code, so I use the word *script* more than *app*. But\
    \ regardless of whether you call it a script or an app, each one requires its\
    \ own workspace folder and virtual environment.\n\nIn this section, I show you\
    \ how to write and run a Python script.\n\n### Writing a Python script\n\nNow\
    \ it's time to write your first Python script. If you've been following along,\
    \ you have the `First Python` workspace folder open in VS Code, and your `.venv`\
    \ virtual environment is activated. You're ready to create your first script.\
    \ Each script is just a file within the workspace root folder. That file must\
    \ have a `.py` extension. The filename itself should follow the same rules as\
    \ Python variable names. In short:\n\n- Use all lowercase letters.\n- Use a lowercase\
    \ letter (not a number or underscore) for the first character.\n- Use an underscore\
    \ (_) instead of a space.\n- Don't use any special characters (for example, !,\
    \ @, #, -, and so on).\n- Don't use names of built-in modules (for example, sys,\
    \ os, math, random, datetime, io, and so on).\n- Make the name as descriptive\
    \ as possible and always use the .py extension.\n\nTable 2-1 shows examples of\
    \ good and bad filenames, where the third column indicates what's wrong in the\
    \ bad example.\n\n**Table 2-1 Good and Bad Python Filenames**\n\n| Good Filename\
    \ | Bad Filename | Why It's Bad |\n| :--- | :--- | :--- |\n| main.py | Main.py\
    \ | It has an uppercase letter. |\n| calculate_stats.py | math.py | It has the\
    \ same name as a built-in module. |\n| file_reader.py | File Reader.py | It has\
    \ uppercase letters and a space. |\n| process_images.py | 9images.py | It starts\
    \ with a number. |"
  mdcn: "## 激活虚拟环境\n\n创建虚拟环境并不等于激活虚拟环境。在开始编写脚本或运行脚本之前，你始终需要确保虚拟环境已激活。这将在 VS Code 的终端窗口中完成。终端中的命令提示符应仍显示工作区根文件夹的路径。根据你的操作系统，输入以下命令之一来运行该文件夹内的激活脚本：\n\
    \n```\n>> Windows: .venv\\Scripts\\activate\n>> Linux 或 macOS: .venv/bin/activate\n\
    ```\n\n请注意，Windows 使用反斜杠（\\），而 Linux 和 macOS 使用正斜杠（/）。请务必使用此处显示的大小写字母。\n\n如果你看到一个关于脚本来自“未知发布者”的警告，输入\
    \ **A** 并按回车键以始终运行。此处的发布者是创建了 venv 模块的 Python 软件基金会，你完全可以信任他们。\n\n当虚拟环境处于活动状态时，该虚拟环境的名称会显示在命令提示符中，这样你就知道当前使用的是哪个虚拟环境。图\
    \ 2-11 展示了在 Windows 中命令提示符可能的样子，其中名称 `.venv` 被括在命令提示符开头的括号中。\n\n在 Linux 或 macOS\
    \ 环境中，命令提示符路径看起来不会与图 2-11 所示完全相同。如果你使用的是 zsh 命令行 shell，它看起来会更像这样：\n\n```\n.venvalan@MacBookAir\
    \ First Python %\n```\n\n如果你使用的是 bash shell，它看起来会更像这样：\n\n```\nbash\n.venvMacBookAir:First\
    \ Python alan$\n```\n\n在你自己的计算机上，*MacBookAir* 将是你所使用计算机的名称，而 *alan* 将是你自己的用户名。\n\
    \nZ shell（或 zsh）是一种命令行解释器 shell，类似于 Bash（Bourne Again Shell 的缩写），但功能更强大。在 2019\
    \ 年发布的 macOS Catalina 10.15 之前，macOS 使用 Bash 作为默认 shell；此后，zsh 一直是 macOS 的默认 shell。\n\
    \n你可以通过点击终端右上角当前 shell 名称旁边的下拉箭头（参见图 2-8）来选择要使用的命令行 shell。但无论使用哪种 shell，Python\
    \ 命令的工作方式应该相同。\n\n激活虚拟环境后，你不再需要在命令中使用像 `py` 或 `python3` 这样的别名来代替 `python`。`python`\
    \ 命令无需别名即可工作。因此，现在你可以使用 `python --version` 或 `python -V` 来查看当前项目所使用的 Python 版本号。\n\
    \n当你的工作区文件夹已打开且虚拟环境已激活时，你就可以开始创建或修改脚本，或者运行已创建的脚本了。在工作区中，你极不可能需要停用虚拟环境。但为了完整性，我应该告诉你这很容易做到。无论你使用什么操作系统，只需在命令提示符下输入以下命令并按回车键即可：\n\
    \n```\nbash\ndeactivate\n```\n\n虚拟环境的名称将从终端命令提示符的开头消失。`python` 命令将再次无法识别，因此你必须使用\
    \ `py` 或 `python3` 别名来运行任何 Python 命令。\n\n## 安装模块\n\n在你创建并打开了项目工作区文件夹、选择了 Python\
    \ 版本（解释器）、创建并激活了虚拟环境之后，你就可以安装项目可能使用的任何模块了。那么，什么是模块，为什么要使用它们？\n\nPython *模块* 是其他人已经编写的、用于执行特定任务的\
    \ Python 代码。大多数模块已经存在多年，经过多年的完善和改进，非常适合执行它们设计要完成的任务。模块通过提供可信赖的代码来执行一些常见任务，帮助你避免重复造轮子。\n\
    \n一些模块是 Python 标准库的一部分，在你首次安装 Python 时会自动安装。你只需在代码顶部包含一个 `import` 语句，就可以随时在代码中使用它们。最常见和广泛认可的模块包括以下：\n\
    \n- **math**：数学函数\n- **os**：操作系统接口\n- **sys**：系统特定的参数和函数\n- **datetime**：日期和时间处理\n\
    - **random**：随机数生成\n\n为了保持基础 Python 安装的精简，许多更大、更专业的模块并未包含在内。但当你确定虚拟环境处于活动状态时，可以在命令提示符下使用\
    \ `pip install` 命令将它们添加到你的虚拟环境中。名称 *pip* 是 Pip Installed Packages 的缩写，这正是它的功能。你只需输入如下命令：\n\
    \n```\npip install modulename\n```\n\n将 *modulename* 替换为你想要导入的模块名称。或者，你可以通过用空格分隔多个模块名称来一次性安装多个模块，如下所示：\n\
    \n```\npip install modulename1 modulename2 modulename3 modulename4\n```\n\n那么，你如何知道为一个脚本导入哪些模块呢？当你是一个初学者，正在创建自己的脚本时，你可能不知道。但当你运行一个现有的脚本，比如本书中介绍的那些脚本时，代码顶部的\
    \ `import` 语句会准确地告诉你需要哪些模块。\n\n```\nimport requests\nimport tkinter as tk  # 用于\
    \ GUI\nfrom bs4 import BeautifulSoup  # 用于网页抓取\nimport pandas as pd  # 用于数据处理\n\
    import matplotlib.pyplot as plt  # 用于绘图\n\nclass WeatherDashboard:\n    def __init__(self,\
    \ root):\n        self.root = root\n        self.root.title(\"Weather Dashboard\"\
    )\n        self.root.geometry(\"400x500\")\n```\n\n要安装的模块名称总是紧跟在 `import` 一词之后。不要担心前面示例代码中的\
    \ `from` 或 `as` 名称（`import tkinter as tk` 或 `from bs4 import BeautifulSoup`）。只需在你的\
    \ `install` 命令中使用 `import` 之后的名称即可。例如，要安装运行该脚本所需的包，你可以输入以下 `pip install` 命令：\n\
    \n```\npip install requests\npip install beautifulsoup4\npip install pandas\n\
    pip install matplotlib\n```\n\n或者，你可以使用以下单个命令一次性导入它们：\n\n```\npip install requests\
    \ beautifulsoup4 pandas matplotlib\n``\n\n现在不必担心记住所有这些内容。我将在本书介绍的每个自动化脚本中解释其依赖关系。目前，只需理解脚本顶部的\
    \ `import` 语句与将这些模块添加到脚本虚拟环境的 `pip install` 命令之间的联系即可。\n\n## 编写和运行 Python 脚本\n\
    \n到目前为止，我们所做的一切都是为了设置环境以创建 Python 应用程序或脚本。*app* 是 *application* 的缩写，它通常指需要数十个代码文件的大型商业应用程序。在\
    \ Python 中，通常将单文件应用程序称为 *scripts*。本书中的大多数自动化项目只需要一个代码文件，因此我使用 *script* 一词多于 *app*。但无论你称其为脚本还是应用程序，每个都需要自己的工作区文件夹和虚拟环境。\n\
    \n在本节中，我将向你展示如何编写和运行 Python 脚本。\n\n### 编写 Python 脚本\n\n现在是时候编写你的第一个 Python 脚本了。如果你一直跟着操作，你已经在\
    \ VS Code 中打开了 `First Python` 工作区文件夹，并且你的 `.venv` 虚拟环境已激活。你已准备好创建你的第一个脚本。每个脚本只是工作区根文件夹中的一个文件。该文件必须具有\
    \ `.py` 扩展名。文件名本身应遵循与 Python 变量名相同的规则。简而言之：\n\n- 使用全小写字母。\n- 首字符使用小写字母（不是数字或下划线）。\n\
    - 使用下划线（_）代替空格。\n- 不要使用任何特殊字符（例如，!、@、#、- 等）。\n- 不要使用内置模块的名称（例如，sys、os、math、random、datetime、io\
    \ 等）。\n- 使名称尽可能具有描述性，并始终使用 .py 扩展名。\n\n表 2-1 展示了良好和不良文件名的示例，其中第三列指出了不良示例中的问题。\n\
    \n**表 2-1 良好和不良的 Python 文件名**\n\n| 良好文件名 | 不良文件名 | 为什么不好 |\n| :--- | :--- | :---\
    \ |\n| main.py | Main.py | 它包含大写字母。 |\n| calculate_stats.py | math.py | 它与内置模块同名。\
    \ |\n| file_reader.py | File Reader.py | 它包含大写字母和空格。 |\n| process_images.py |\
    \ 9images.py | 它以数字开头。 |"
