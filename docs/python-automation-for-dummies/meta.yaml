    \ code in the `else` block runs. If the loop is exited prematurely with a `break`,\
    \ the `else` block is skipped. This can be useful for scenarios where you want\
    \ to confirm that a loop completed fully or to handle a “not found” case after\
    \ searching through a sequence.\n\n```\nnumbers = [1, 2, 3, 4, 5]\ntarget = 6\n\
    for num in numbers:\n    if num == target:\n        print(f\"Found {target}!\"\
