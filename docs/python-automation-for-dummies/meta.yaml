  md: "The `try:` and `except:` statements in the sample code are covered in the “Handling\
    \ Exceptions” section, later in this chapter.\n\n# Bailing out of loops\n\nThough\
    \ rarely needed, Python offers three special keywords for bailing out of loops\
    \ before the loop ends naturally or for detecting whether a loop completed naturally:\n\
    \n+   » break: Exits the loop immediately.\n» continue: Skips the rest of the\
    \ current iteration and moves to the next one.\n» else: Runs a block of code when\
    \ the loop finishes normally (not when break is used).\n\nUse the `break` statement\
    \ with an `if` condition to break out of a loop if some condition is met. In the\
    \ following example, the `fruits` variable contains some fruit names, one of which\
    \ is an empty string (\"\"). The sample code breaks out of the loop when it encounters\
    \ such a string.\n\n```\n# A list of fruit names\nfruits = [\"Apple\", \"Banana\"\
    , \"\", \"Grape\"]\n# Print the list of fruits.\nfor fruit in fruits:\n    if\
    \ fruit==\"\":\n        break\n    print(fruit)\nprint(\"All Done\")\n```\n\n\
    The output from that code is:\n\n```\nApple\nBanana\nAll Done\n```\n\nThe `continue`\
    \ statement also works with an `if` condition. However, instead of stopping the\
    \ loop, it simply avoids executing the code at that pass through the loop. For\
    \ example, the following code is identical to the preceding code, but it uses\
    \ `continue` in place of `break`:\n\n```\n# A list of fruit names\nfruits = [\"\
    Apple\", \"Banana\", \"\", \"Grape\"]\n# Print the list of fruits.\n```"
