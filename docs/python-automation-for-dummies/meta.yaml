  md: "There's a general rule in Python that a function should always return a consistent\
    \ data type, such as always returning an integer or always returning a string.\
    \ Often when writing functions, people are tempted to take the lazy route for\
    \ handling errors, and just return an error message (string) if the data passed\
    \ into a function is no good. For example, the following `square()` function will\
    \ return a number, squared, as long as you pass in a positive number. But if you\
    \ pass in a negative number, the function returns a string containing the error\
    \ message:\n\n```\ndef square(num):\n    if num < 0:\n        return \"Negative\
    \ numbers not allowed\"  # Special case\n    return num * num\n```\n\nThe preferred\
    \ way to handle this sort of thing is to always use exception handling, where\
    \ the function raises an error instead of returning a string.\n\n```\ndef square(num):\n\
    \    if num < 0:\n        raise ValueError(\"Negative numbers not allowed\")\n\
    \    return num * num\n```\n\nNow the code is consistent with Python's built-in\
    \ functions: It either returns a valid, consistent data type, or it raises an\
    \ error when it can't. You can use a `try...except` block to call the function\
    \ and handle any errors, as follows:\n\n```\nif __name__ == \"__main__\":\n  \
    \  number = -9\n    try:\n        print(f\"{number} squared is {square(number)}\"\
    )\n    except Exception as e:\n        print(f\"Error: {e}\")\n```\n\nThis approach\
    \ matches the kind of error handling you see throughout this book. The function\
    \ consistently returns a number (when it can); otherwise, it returns an error\
    \ with an explanation of what caused the error. Then the script ends gracefully\
    \ with no additional error messages.\n\n![](img/10d8e89b301a0e7452bff4d402265e78_338_0.png)\n\
    \nThe PEP 8 guidelines basically define the rules you don't want to break. When\
    \ you need a quick summary, ask any AI to summarize the PEP 8 guidelines."
