- md: "## 7.2 正则表达式：\n\n正则表达式（regex）是用于模式匹配和文本处理的强大工具。\n\n**示例：** 模式匹配\n\n```python\n\
    import re\n\n# 在文本中使用正则表达式查找模式\ntext = \"电话号码是 123-456-7890。\"\npattern = r\"\\\
    d{3}-\\d{3}-\\d{4}\" # 匹配电话号码模式\nmatch = re.search(pattern, text)\n\nif match:\n\
    \    print(\"找到电话号码：\", match.group())\nelse:\n    print(\"未找到电话号码。\")\n```\n\n\
    **示例：** 在Python中使用正则表达式\n\n```python\nimport re\n\n# 使用正则表达式进行文本处理\ntext = \"\
    将元音替换为 'X'\"\npattern = r\"[aeiou]\"\nreplacement = \"X\"\nmodified_text = re.sub(pattern,\
    \ replacement, text)\nprint(\"修改后的文本：\", modified_text)\n```\n\n**模式匹配：** 使用正则表达式定义一个模式，并使用\
    \ `re.search` 等函数在文本中搜索它。\n\n**在Python中使用正则表达式：** `re.sub` 函数允许您用指定的字符串替换文本中的模式。\n\
    \n理解异常处理和正则表达式等高级主题对于编写健壮且功能多样的Python程序至关重要。\n\n本模块提供了Python高级主题的介绍，涵盖了异常处理和正则表达式。\n\
    \n## 7.2.1 模式匹配\n\n正则表达式（regex）提供了一种强大的机制，用于在文本中进行模式匹配。这使您能够搜索并识别特定的模式或字符序列。\n\
    \n**示例：** 使用正则表达式进行模式匹配\n\n```python\nimport re\n\n# 在文本中使用正则表达式查找模式\ntext = \"\
    电话号码是 123-456-7890。\"\npattern = r\"\\d{3}-\\d{3}-\\d{4}\" # 匹配电话号码模式\nmatch =\
    \ re.search(pattern, text)\n\nif match:\n    print(\"找到电话号码：\", match.group())\n\
    else:\n    print(\"未找到电话号码。\")\n```\n\n创建模式：模式 `r\"\\d{3}-\\d{3}-\\d{4}\"` 代表典型的电话号码格式。\n\
    \n**`\\d`**：匹配任何数字（0-9）。\n**`{3}`**：指定前面的数字模式恰好出现三次。\n**`-`**：匹配连字符。\n\n使用 **`re.search()`**：**`re.search()`**\
    \ 函数在文本中搜索模式。如果找到匹配项，则返回一个匹配对象；否则返回 **`None`**。\n\n## 7.2.2 在Python中使用正则表达式\n\n\
    正则表达式可用于Python中的各种文本处理任务，例如查找和替换模式。\n\n## 示例：使用正则表达式进行文本处理\n\n```python\nimport\
    \ re\n\n# 使用正则表达式进行文本处理\ntext = \"将元音替换为 'X'\"\npattern = r\"[aeiou]\"\nreplacement\
    \ = \"X\"\nmodified_text = re.sub(pattern, replacement, text)\nprint(\"修改后的文本：\"\
    , modified_text)\n```\n\n替换模式：**`re.sub()`** 函数用于替换文本中的模式。\n**`r\"[aeiou]\"`**：匹配任何元音。\n\
    **`\"X\"`**：将每个元音替换为字母 \"X\"。\n\n理解正则表达式是一项宝贵的技能，适用于数据验证、文本处理和模式提取等任务。\n\n本节概述了使用正则表达式进行模式匹配，并演示了如何在Python中使用正则表达式进行文本处理。\n\
    \n## 模块 8：使用Flask进行Web开发（可选）\n\n模块8介绍了使用Flask进行Web开发，Flask是一个用于在Python中构建Web应用程序的微框架。本模块是可选的，重点在于创建简单Web应用程序的基础知识。\n\
    \n## 8.1 Flask简介：\n\nFlask是一个轻量级的Web框架，它简化了Python中的Web应用程序开发。\n\n示例：设置基本的Flask应用\n\
    \n```python\nfrom flask import Flask\n\n# 创建Flask应用\napp = Flask(__name__)\n\n\
    # 定义路由和关联的函数\n@app.route('/')\ndef hello_world():\n    return 'Hello, World!'\n\
    \n# 运行应用\nif __name__ == '__main__':\n    app.run(debug=True)\n```\n\n设置基本的Flask应用：创建Flask应用，定义路由，并将函数与这些路由关联。\n\
    \n## 8.1.1 设置基本的Flask应用\n\n首先，如果尚未安装Flask，您需要使用以下命令进行安装：\n\n```\npip install flask\n\
    ```\n\n现在，您可以使用以下示例创建一个基本的Flask应用：\n\n## **示例**：设置基本的Flask应用\n\n```python\nfrom\
    \ flask import Flask\n\n# 创建Flask应用\napp = Flask(__name__)\n\n# 定义路由和关联的函数\n@app.route('/')\n\
    def hello_world():\n    return 'Hello, World!'\n\n# 运行应用\nif __name__ == '__main__':\n\
    \    app.run(debug=True)\n```\n\n- 创建Flask应用：导入 `Flask` 类并创建一个实例。`__name__` 参数用于确定应用程序的根路径。\n\
    - 定义路由和关联的函数：使用 `@app.route()` 装饰器定义一个路由（例如 /）。将一个函数与该路由关联，该函数的返回值将是发送给客户端的响应。\n\
    - 运行应用：执行脚本时，`if __name__ == '__main__':` 块确保只有在脚本直接执行（而非作为模块导入）时才会运行应用。\n\n##\
    \ 运行Flask应用：\n\n将脚本以 `.py` 扩展名保存（例如 `app.py`）。\n打开终端并导航到包含该脚本的目录。\n使用以下命令运行应用：\n\
    \n```\npython app.py\n```\n\n在您的Web浏览器中访问 `http://127.0.0.1:5000/`，即可看到 \"Hello,\
    \ World!\" 消息。\n\n这个基本示例说明了具有单个路由的Flask应用的基本结构。您可以根据Web应用程序的需求，通过添加更多路由、模板和功能来扩展和自定义应用。\n\
    \n本节提供了设置基本Flask应用的基础理解。\n\n## 8.1.2 路由和模板\n\n## 定义具有动态内容的路由：\n\n```python\nfrom\
    \ flask import Flask, render_template\n\napp = Flask(__name__)\n\n# 定义动态路由\n@app.route('/user/<username>')\n\
    def show_user_profile(username):\n    return f'User: {username}'\n\n# 定义使用模板渲染动态内容的路由\n\
    @app.route('/welcome/<name>')\ndef welcome_user(name):\n    return render_template('welcome.html',\
    \ user=name)\n\nif __name__ == '__main__':\n    app.run(debug=True)\n```\n\n-\
    \ 动态路由：在路由定义中使用 `<variable>` 语法来捕获动态值。在示例中，`/user/<username>` 将用户名捕获为变量。\n- 渲染模板：`render_template`\
    \ 函数用于渲染HTML模板。在示例中，`welcome_user` 路由渲染 `welcome.html` 模板并将 `name` 变量传递给它。\n\n\
    ## 创建HTML模板（templates/welcome.html）：\n\n```html\n<!DOCTYPE html>\n<html lang=\"\
    en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta http-equiv=\"X-UA-Compatible\"\
    \ content=\"IE=edge\">\n    <meta name=\"viewport\" content=\"width=device-width,\
    \ initial-scale=1.0\">\n    <title>Welcome Page</title>\n</head>\n<body>\n   \
    \ <h1>Welcome, {{ user }}!</h1>\n</body>\n</html>\n```\n\n- **HTML模板**：在名为 `templates`\
    \ 的文件夹中创建一个HTML文件。在示例中，`welcome.html` 模板使用Jinja模板语法（`{{ user }}`）来动态插入 `user`\
    \ 变量。\n\n## 运行Flask应用：\n\n- 确保已安装Flask（`pip install flask`）。\n- 保存脚本和HTML模板。\n\
    - 使用以下命令运行应用：\n\n```\npython app.py\n```\n\n在Web浏览器中访问 `http://127.0.0.1:5000/user/john`\
    \ 和 `http://127.0.0.1:5000/welcome/Jane`，即可看到动态内容。\n\n此示例演示了Flask路由如何捕获动态值，以及模板如何用于基于这些值渲染动态HTML内容。您可以扩展此概念，构建具有动态路由和模板的更复杂的Web应用程序。\n\
    \n本节介绍了Flask中的路由和模板。\n\n## 8.2 构建简单的Web应用：\n\n构建简单的Web应用涉及处理路由、渲染模板和与表单交互。\n\n\
    **示例：** 在Flask中处理表单\n\n```python\nfrom flask import Flask, render_template, request\n\
    \napp = Flask(__name__)\n\n# 定义主页的路由\n@app.route('/')\ndef index():\n    return\
    \ render_template('index.html')\n```"
