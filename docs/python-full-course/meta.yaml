    \    print(f\"Values: x={x}, y={y}\")\n    result = x + y\n    print(f\"Result:\
    \ {result}\")\n    return result\n```\n\n### Debugger (pdb - Python Debugger):\n\
    Usage: Insert breakpoints in your code using `pdb.set_trace()` to interactively\
    \ inspect variables.\n\n### Example:\n```python\nimport pdb\n\ndef example_function(x,\
    \ y):\n    pdb.set_trace() # Insert a breakpoint\n    result = x + y\n    return\
    \ result\n```\n\nExecution: Run your script with the -m pdb option:\n```\npython\
    \ -m pdb your_script.py\n```\n\n## IDE Debugging:\n- Usage: Integrated Development\
