    \ 和 `http://127.0.0.1:5000/welcome/Jane`，即可看到动态内容。\n\n此示例演示了Flask路由如何捕获动态值，以及模板如何用于基于这些值渲染动态HTML内容。您可以扩展此概念，构建具有动态路由和模板的更复杂的Web应用程序。\n\
    \n本节介绍了Flask中的路由和模板。\n\n## 8.2 构建简单的Web应用：\n\n构建简单的Web应用涉及处理路由、渲染模板和与表单交互。\n\n\
    **示例：** 在Flask中处理表单\n\n```python\nfrom flask import Flask, render_template, request\n\
    \napp = Flask(__name__)\n\n# 定义主页的路由\n@app.route('/')\ndef index():\n    return\
