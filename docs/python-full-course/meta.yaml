    \ `Exception` 类的新类来创建自定义异常。\n\n### 7.1.1 Try, Except, Finally\n\nPython 中的异常处理允许你优雅地管理程序执行期间可能发生的错误。`try`、`except`\
    \ 和 `finally` 块是此机制的基本组成部分。\n\n**示例：** Python 中的 Try, Except, Finally\n\n```python\n\
    # 可能引发异常的示例函数\ndef divide_numbers(a, b):\n    try:\n        result = a / b\n \
    \       print(\"Result:\", result)\n    except ZeroDivisionError:\n        print(\"\
    Error: Division by zero!\")\n    finally:\n        print(\"This block always executes.\"\
    )\n\n# 示例用法\ndivide_numbers(10, 2)  # Result: 5.0, This block always executes.\n\
    divide_numbers(10, 0)  # Error: Division by zero!, This block always executes.\n\
    ```\n\n`try` 块：可能引发异常的代码放在 `try` 块中。\n\n`except` 块：如果发生异常，则执行 `except` 块中的代码。不同的\
    \ `except` 块可以处理不同类型的异常。\n\n`finally` 块：此块始终执行，无论是否发生异常。\n\n在示例中，**divide_numbers**\
    \ 函数尝试执行除法，如果发生除以零的情况，它会被 **except** 块捕获。**finally** 块确保某些代码（如清理操作）无论是否发生异常都会执行。\n\
    \n异常处理对于编写健壮和容错的代码至关重要，尤其是在可能出现意外错误的情况下。\n\n本节概述了在 Python 中使用 **try**、**except**\
    \ 和 **finally** 块进行有效异常处理的方法。\n\n### 7.1.2 自定义异常\n\n在 Python 中，你可以通过定义一个继承自内置\
    \ **Exception** 类的新类来创建自定义异常。自定义异常允许你引发和捕获特定于应用程序的错误。\n\n**示例：** Python 中的自定义异常\n\
    \n```python\n# 自定义异常类的定义\nclass MyCustomError(Exception):\n    def __init__(self,\
    \ message=\"A custom error occurred.\"):\n        self.message = message\n   \
    \     super().__init__(self.message)\n\n# 可能引发自定义异常的示例函数\ndef perform_custom_operation(value):\n\
    \    try:\n        if value < 0:\n            raise MyCustomError(\"Value cannot\
    \ be negative.\")\n        else:\n            print(\"Operation successful.\"\
    )\n    except MyCustomError as e:\n        print(f\"Caught a custom exception:\
    \ {e}\")\n    finally:\n        print(\"This block always executes.\")\n\n# 示例用法\n\
    perform_custom_operation(5)  # Operation successful, This block always executes.\n\
    perform_custom_operation(-2)  # Caught a custom exception: Value cannot be negative.,\
    \ This block always executes.\n```\n\n- 创建自定义异常类：定义一个继承自 `Exception` 的新类，并根据需要进行自定义。在示例中，创建了带有可选错误消息的\
    \ `MyCustomError`。\n- 引发自定义异常：当满足特定条件时，使用 `raise` 语句引发自定义异常。\n- 捕获自定义异常：在 `except`\
    \ 块中，捕获自定义异常并进行适当处理。\n\n当你需要传达与应用程序逻辑相关的特定错误条件时，自定义异常非常有用。它们提供了一种清晰的方式来区分不同类型的错误，并根据错误采取适当的行动。"
