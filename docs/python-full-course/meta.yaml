  mdcn: "## 异常处理：\n将代码段包裹在 `try`、`except` 和 `finally` 块中，以捕获和处理异常。\n\n## 示例：\n```python\n\
    def safe_divide(a, b):\n    try:\n        result = a / b\n    except ZeroDivisionError:\n\
    \        result = float('inf') # Handle division by zero\n    return result\n\
    ```\n\n## 代码性能分析：\n使用 `cProfile` 等性能分析工具来分析代码性能并识别瓶颈。\n\n## 示例\n```python\nimport\
