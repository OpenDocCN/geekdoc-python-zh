    \n```python\nfrom flask import Flask\n\n# 创建Flask应用\napp = Flask(__name__)\n\n\
    # 定义路由和关联的函数\n@app.route('/')\ndef hello_world():\n    return 'Hello, World!'\n\
    \n# 运行应用\nif __name__ == '__main__':\n    app.run(debug=True)\n```\n\n设置基本的Flask应用：创建Flask应用，定义路由，并将函数与这些路由关联。\n\
    \n## 8.1.1 设置基本的Flask应用\n\n首先，如果尚未安装Flask，您需要使用以下命令进行安装：\n\n```\npip install flask\n\
