    if color = \"purple\":\n    print(\"Cool!\")\n```\n\n### SYNTAX SELF-CHECK\n\n\
    What do the following functions and keywords mean:\n\n- =\n- +\n- \" \"\n- [ ]\n\
    - random.choice()\n- import\n- if/elif/else\n- ==, <, >, !=\n- and, or, not\n\
    - True, False\n\n## 2.1.6 Practice Exercises\n\nNow it’s time for you to practice\
