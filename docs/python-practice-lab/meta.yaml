    \ then -4\n15 print(multiplier100(4)) # Prints 400\n```\n\n与任何其他函数一样，你可以在定义后在程序中的任何地方重复调用有返回值的函数。你也可以将有返回值的函数的返回值用作另一个函数的输入。\n\
