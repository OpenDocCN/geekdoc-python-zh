    \ Fortune Cookie Generator!\nYou will become rich.\n```\n\nFigure 2.1 Printing\
    \ a random fortune to the screen.\n\n```\nWelcome to Fortune Cookie Generator!\n\
    You will have great success.\n```\n\nFigure 2.2 Printing another random fortune\
    \ to the screen in a different run.\n\n### COFFEE BOT\n\nWrite a CoffeeBot that\
    \ asks if you would like cream. It should accept Yes/yes or No/no as inputs, and\
    \ reply appropriately depending on the answer. If the user inputs anything else,\
    \ it should repeat back their answer and say that it does not understand.\n\n\
    ```\nI'm CoffeeBot. Would you like cream with your coffee? (Yes/No)\nYes\nHere's\
    \ your coffee with cream.\n```\n\nFigure 2.3 User enters Yes\n\n```\nI'm CoffeeBot.\
    \ Would you like cream with your coffee? (Yes/No)\nNo\nHere's your coffee, no\
    \ cream.\n```\n\nFigure 2.4 User enters No\n\n```\nI'm CoffeeBot. Would you like\
    \ cream with your coffee? (Yes/No)\nyes\nHere's your coffee with cream.\n```\n\
    \n**Figure 2.5** User enters yes in lowercase.\n\n```\nI'm CoffeeBot. Would you\
    \ like cream with your coffee? (Yes/No)\nMaybe\nSorry, I don't know what Maybe\
    \ means.\n```\n\n**Figure 2.6** User enters something else.\n\n## 2.1.7 Glossary\n\
    \n- **import**, the action of bringing in external functionalities (as modules)\
    \ for the program to do something extra. This is also the keyword used in Python\
    \ to tell the interpreter to perform the action.\n- **functions**, bits of code\
    \ that you can use to add functionality into your program. Some examples you have\
    \ seen previously include `print()` to output something to the screen, `input()`\
    \ to obtain input from the terminal, and `random.choice()` to randomly select\
    \ an item from a list. Functions are great for code reuse and for simplifying\
    \ your code. You'll learn more about using and even creating your own functions\
    \ later in this book.\n- **operators**, special symbols in programming where a\
    \ computational operation is carried out by the program, for example, addition\
    \ (+), comparison (<), etc. In most cases an operator needs to have two operands\
    \ (e.g., two numbers for addition) to occur, but in some cases only one operand\
    \ is needed (e.g., turning a positive number into a negative number).\n- **assignment**,\
    \ a common operation in programming where a variable is set to store the value\
    \ it is given. Typically the operation is indicated by an equal symbol (=) and\
    \ is different from the mathematical operation with the same symbol. In math,\
    \ it means the expression on the left of = is the same as that on the right. But\
    \ in programming, it means the variable shown on the left of = is set to the value\
    \ calculated on the right.\n- **conditional**, a programming construct that allows\
    \ the program to execute different code based on the current state of the program\
    \ (e.g., the value of a certain variable), that is, the condition in which the\
    \ program is.\n- **the \\ operator**, called the “escape” character. In programming\
    \ languages, there exist some special characters that are not available on a standard\
    \ keyboard (e.g., the invisible carriage-return character to start new line of\
    \ output) or that are used for other purposes (e.g., the double-quote character,\
    \ \", to indicate start and end of a string), but are needed as part of the output.\
    \ The presence of the \\ character signifies that the character immediately after\
    \ it should not be considered as its original value but one of those special characters\
    \ (e.g., \\n means the invisible carriage-return character, \\ \" means the double-quote\
    \ character). In Python, if this character is used on its own (as a backslash),\
    \ it is the “continuation character.”"
