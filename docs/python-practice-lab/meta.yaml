    Here are some of the motion/state commands that our turtle fred accepts:


    +   - forward(distance)—move forward by the specified distance, in the direction
    the turtle is headed (where the pointy bit is pointing at).

    - right(units)—turn the turtle right by the specified units. By default they are
    in degrees.

    - left(units)—turn the turtle left by the specified units. By default they are
    in degrees.

    - circle(radius)—draw a circle with the specified radius. The center is radius
    units above the turtle. You can include a few more controls on how the circle
    is drawn by providing some extra arguments.

    - stamp—stamp a copy of the turtle shape onto the canvas at the current turtle
    position. You can change the shape of the turtle using the shape command.

    - penup—pull the pen up so that no trail is left when moving.

    - pendown—put the pen down so that a trail is left when moving.


