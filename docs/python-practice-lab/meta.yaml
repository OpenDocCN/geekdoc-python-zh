    +   1. Rotate right. Rotates the image right by 90 degrees. This operation requires
    creating a new image with width equal to the original height and height equal
    to the original width. (Hint: Use the nested for-loop structure to copy a row
    of pixels into a column of pixels).

    2. Zoom. Double both width and height (so the size is actually four times as before).
    This operation requires creating a new image with width equal to two times the
    original width and height equal to two times the original height. To “build” a
    bigger image, each pixel from the original image becomes a 2x2 block of pixels
    in the result image. For example, the pixels at result[0][0], result[0][1], result[1][0],
    and result[1][1] will have the same RGB values of the pixel at original[0][0].

    3. Locate fish. The cat in your photo is hungry! Using the provided fish.jpg,
