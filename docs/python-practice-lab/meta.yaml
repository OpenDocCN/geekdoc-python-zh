    \ 程序通过正确显示一条简单的问候语来展示该语言的基本语法。\n\n我们都需要时不时地获得一些智慧或鼓励的话语——这就是为什么人们喜欢打开幸运饼干，或者张贴带有励志短语的海报。在本节中，让我们编写一个励志名言生成器程序，它可以向用户说一些激励人心、富有智慧或有趣的话（如果你喜欢的话）。\n\
    \n**谁是用户？** 程序员构建应用程序供人们使用。使用你应用程序的人被称为用户。\n\n```python\n# 励志名言生成器\n# 作者：\n# 日期：\n\
    \nprint(\"If you can dream it, you can do it.\")\n```\n\n在上面的代码示例中，让我们识别程序的几个重要部分：\n\
    \n- 第 1-3 行是**注释**，计算机不会解释或运行它们。相反，它们的目的是为阅读或编写代码的人提供有关代码的有用信息。在 Python 中，每行注释都以\
    \ # 符号开头。在本书中，我们将文件顶部的注释（通常包含标题、作者和日期等信息）称为**文件头**。\n- 第 4 行是一个空行，计算机会忽略它。它的存在是为了在视觉上分隔代码，使代码更易于人类阅读。你可以根据需要使用任意多的空行，但最好有目的地、一致地使用它们。\n\
    - 第 5 行是计算机执行的代码。它代表一个单一的命令：向屏幕**打印**一个句子。尝试用其他词语（甚至是用逗号分隔的字符串和数字的组合）替换示例代码中的句子。句子必须用引号括起来。如果你想打印引号本身，必须在它前面加上一个反斜杠，像这样：`print(\"\
    As they say, \\\"Practice makes perfect!\\\"\")`。\n\n> 注释是代码的重要组成部分。除了文件头，我们使用注释来解释代码、留下笔记和提供文档。如果你想写多行注释，可以使用**多行文档字符串**，即用三个双引号\
    \ `\"\"\"` 将这些行括起来。\n\n## 1.1.5 复习题\n\n是时候测试一下你对本章内容的理解程度了！如果需要，请随时回顾。\n\n###\
    \ 理论与理解\n\n- 在这本练习册中，我们将学习计算机科学的哪两个组成部分？\n- 算法的一个例子是什么？\n- 我们在本书中将使用的编程语言叫什么名字？它是解释型的还是编译型的？\n\
    - 我们可以在哪里在线练习编程？离线呢？\n- 程序的文件头包含什么？\n- 学习一门编程语言与学习一门自然语言有什么共同点？\n\n### 语法自测\n\n\
    以下函数和关键字是什么意思？\n\n- `print(\"Hello, World\")`\n- `print(\"I have\", 1)`\n- `#`\n\
    - `\"a string\"`\n- `\"\"\"\n  a multiline string\n  another line\n  \"\"\"`\n\
    \n## 1.1.6 练习\n\n### 编程\n\n现在轮到你通过编写一些代码来练习了。完成后，你可以访问我们配套网站上的“解答”部分，将你的答案与我们的进行比较。请注意，同一个问题可能有多种答案，所以如果你的代码与我们的不完全相同，也不必担心。目前，重要的是你的代码能产生你预期的结果。\n\
    \n### 显示句子\n\n编写一行代码，将以下句子输出到屏幕：\n\n```\nDr. Evil: Back in the 60's, we developed\
    \ a sophisticated heat beam we called a \"laser\".\n```\n\n### 励志名言生成器\n\n编写你自己的\
    \ Python 程序来显示一句励志名言。以一个包含你想要的标题、你的名字和日期的文件头开始。然后根据我们之前展示的示例代码，将名言替换为你选择的一句。使用“运行”按钮确保它按预期打印在屏幕上。\n\
    \n## 1.1.7 术语表\n\n- **代码（又称源代码）**，编写计算机程序时使用的词汇。代码有不同的种类/层次，包括伪代码（人类易于阅读）、编程代码（遵循特定语言的规则）和机器代码（计算机能理解，但通常人类无法理解）。\n\
    - **伪代码**，用自然语言编写的代码，以便人类阅读。伪代码通常遵循一些结构约定，如换行和缩进，以指示执行顺序。它使用一些标准关键字（如 repeat 和\
    \ if-then）和符号（如 + 和 :=）来表示编程逻辑，但省略了特定于语言的细节，如变量声明。许多算法都以这种形式编写，以便计算机科学家能够快速交流他们的想法，而不必拘泥于特定的编程语言。\n\
    - **编程**，将一个大型、复杂的任务分解成越来越小的任务，直到它们足够简单，可以用基本构造（包括输入/输出、循环、条件和逻辑）的序列来执行，并使用代码编写它们的过程。\n\
    - **算法**，完成一项任务或解决一个问题的逐步指令列表。通常有许多不同的方法来完成同一任务或解决同一问题，每个步骤越清晰越好（有多种方法可以使算法更好，例如更快或需要更少的空间）。\n\
    - **文件头**，位于代码之前的一块注释，提供有关程序的一些信息。它包括作者姓名、创建和修改日期以及程序的高级描述。\n- **注释**，与代码相邻的特殊部分，用自然英语编写，解释该代码的作用。它是供人类读者理解代码的，并通过特殊符号（Python\
    \ 中是 #）表示，以便计算机在执行代码时忽略它。它可以是一个句子或一个短段落。\n- **解释**，计算机执行源代码的过程。对于解释型编程语言，源代码在执行期间直接翻译成机器代码。Python\
    \ 和 JavaScript 就是例子。\n- **编译**，计算机执行源代码的另一种过程，其中源代码首先被翻译成机器/目标代码（又称编译代码），然后执行。C/C++\
    \ 和 Java 是编译型编程语言的例子。"
