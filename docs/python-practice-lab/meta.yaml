    \ == \"Good\":\n    print(\"Good!\")\n\n# Otherwise if they said Bad, reply Oh\
    \ no!\nelif reply == \"Bad\":\n    print(\"Oh no!\")\n```\n\nYou'll notice a few\
    \ things about the code above. First, line 16 is **indented**. In fact, whenever\
    \ the condition in line 15 is true (user typed Good), all of the indented lines\
    \ immediately following it will be executed. Remember to unindent for your next\
    \ case (here, the elif statement), and the rest of your program.\n\n> To indent\
    \ your code, press the **tab** key on your keyboard. Python is quite flexible\
    \ on what you use for indentation as long as you are consistent (e.g., two spaces,\
    \ four spaces). Later, you will also have to indent your code into several levels—we'll\
    \ get to that when the time comes!\n\nNow, what if the user typed something other\
    \ than Good or Bad? How could our bot be made to handle that case? We can add\
    \ a default condition using the else keyword, as follows.\n\n```python\n# How's\
    \ it going bot\n# Author:\n# Date:\n# Description: This bot will ask you how it's\n\
    # going and reply based on your answer\n\n# Ask user how it's going\nprint(\"\
    How's it going?\")\n\n# Get the user's reply\nreply = input()\n\n# If they said\
    \ Good, then reply Good!\nif reply == \"Good\":\n    print(\"Good!\")\n\n# Otherwise\
    \ if they said Bad, then reply Oh no!\nelif reply == \"Bad\":\n    print(\"Oh\
    \ no!\")\n\n# Otherwise reply \"I see...\"\nelse:\n    print(\"I see...\")\n```\n\
    \n> In lines 14 and 18 above, you can use the keyword **in** to check for the\
