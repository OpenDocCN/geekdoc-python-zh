    \ in reply. You will learn more about this keyword later in this chapter.\n\n\
    ## THE IF/ELSE SANDWICH\n\nAs you've seen above, we have created three different\
    \ potential pathways for chatbot replies. The chatbot will only choose one of\
    \ these paths to execute, depending on what the user typed. This structure may\
    \ be confusing at first—when do we use if? When do we use elif? Does if always\
    \ need to come before elif? (Yes.) Here is a general template for creating conditional\
    \ blocks like the one in our program above.\n\n```python\nif condition: # The\
    \ only thing required in a conditional\n    # do something\nelif condition2: #\
    \ Optional. Can be repeated.\n    # do something else\nelse: # Optional. Only\
    \ have one else per if.\n    # do something else\n```\n\nIn this book, we'll informally\
    \ call the construct the **if/else sandwich**. You can have as many delicious\
    \ `elif` statements as you want in between your `if` and your `else`, or none\
    \ at all. Also, you don't need the bottom layer of your sandwich (the `else` statement).\
    \ The only thing that is necessary is the first `if` statement and the statements\
    \ that will be executed in that condition. You can try stripping down your program\
    \ to only the first `if` condition to check for yourself.\n\nIn the code below,\
    \ you can see an example of repeated `elif` statements providing more options\
