    \ `return` 旁边的值（如果存在）。这意味着你可以在一个函数中有多个 `return` 语句作为不同的退出点，这些退出点可以返回不同的值。\n\n\
    因此，测试大量像素中哪些是绿色的更聪明的方法是将检查实现为一个有返回值的函数。请注意，惯例是将函数定义放在程序的顶部，紧接在 import 语句之后。\n\n\
    ```\n1  # Exploring Images\n2  # Author:\n3  # Date:\n4\n5  import csimage\n6\n\
