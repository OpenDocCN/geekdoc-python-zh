  md: '# METHOD CHAINING


    The replacement code above demonstrates a special way of using methods called
    *chaining*, where the output of one method is used as the input to the next method.


    When the `input()` function reads in the user input, it produces a string variable
    storing the input. Then, it is used as an input for the `lower()` method (connected
    to it by a .) that produces another string variable that turns all the uppercase
    letters into lowercase letters. Finally, this string variable is used as an input
    for the `strip(".?!"`) method to produce the resulting string variable with the
    leading and trailing ., ?, and ! removed.


    ![](img/806aba0b9a38ca3131946c02e34638cb_50_0.png)


    Method chaining is useful for keeping your code concise. However, sometimes the
    order in which the methods are chained changes how the resulting string will look.
    For example, the results produced by the following two lines of code are different
    when the user inputs APPLE:


    ```

    1  fruit_1 = input().lower().strip("a")

    2  fruit_2 = input().strip("a").lower()

    ```


    Can you guess what string would be contained in each of `fruit_1` and `fruit_2`
    after the code is run? Check in your Python IDE to see if you''re right! All in
    all, when using method chaining, be cautious about the order of the methods. Create
    a few possible inputs to test your code, and check that the ordering gives you
    what you expect.


