    # BOOLEAN EXPRESSIONS, LOGICAL AND RELATIONAL OPERATORS


    The template above puts conditions after the `if` and `elif` statements. We call
    these conditions Boolean expressions. But what''s a Boolean expression? A Boolean
    expression is a piece of code that can boil down to either true or false. For
    example, `"apples" == "apples"` is True, while `"apples" == "oranges"` is False.


    You can combine Boolean expressions with others, using, for instance, the keyword
    `or`. This will be helpful, for example, if we want to make our bot reply Good!
    no matter whether the user types Good, good, or great.'
