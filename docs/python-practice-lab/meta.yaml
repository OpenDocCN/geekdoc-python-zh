    Python is what is called a procedural or imperative programming language. This
    means that the program is executed from top to bottom in a step-by-step, command-like
    fashion. But there are other styles of programming languages:


    +   - Functional programming: All things in a program are functions (e.g., LISP,
    Scheme, OCaml)

    - Logic programming: All things in a program are predicates (rules and facts)
    (e.g., Prolog)

    - Object-oriented programming: All things in a program are objects (states and
    methods) (e.g., Java, C++)


    In order to perform the above **map**, **filter**, and **reduce** operations,
    one straightforward method in Python is to use an iterative approach, which is
    a common pattern in **procedural** programming. Specifically, you could use a
    loop to solve these problems on lists.'
