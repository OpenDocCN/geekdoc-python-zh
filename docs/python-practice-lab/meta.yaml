    # TIPS


    To detect the yellow colour, you can use the code provided below, which returns
    a list containing three values, for Hue, Saturation, and Value (brightness) given
    an RGB color. You may refer to an HSV colour picker online to help you define
    a good range for hue, saturation, and value to detect the fish. The HSV representation
    is often used for graphics software because it is slightly closer to how humans
    perceive colour. It can be a better representation for this computer vision task,
    because an object with a particular hue might have a different brightness, depending
    on the amount of light hitting it at a particular time.


    ```

    1

    2 def rgb_to_hsv(r, g, b):

    3     """

    4         Input: values of a pixel in RGB colour space

    5         Output: values in HSV colour space

    6         From

    7         https://www.w3resource.com/python-exercises/math/

    8         python-math-exercise-77.php

    9     """

    10    r, g, b = r/255.0, g/255.0, b/255.0

    11    mx = max(r, g, b)

    12    mn = min(r, g, b)

    13    df = mx-mn

    14    if mx == mn:

    15        h = 0

    16    elif mx == r:

    17        h = (60 * ((g-b)/df) + 360) % 360

    18    elif mx == g:

    19        h = (60 * ((b-r)/df) + 120) % 360

    20    elif mx == b:

    21        h = (60 * ((r-g)/df) + 240) % 360

    22    if mx == 0:

    23        s = 0

    24    else:

    25        s = (df/mx)*100

    26    v = mx*100

    27    return [h, s, v]

    ```'
