    - test a basic program for unexpected cases, interactively\n- test smaller pieces\
    \ of code by commenting out blocks\n- explain the interpreter's role in catching\
    \ errors\n\n### 2.2.2 A Robust Bot\n\nA requirement for an advanced chatbot is\
    \ that it has to be **robust**. What does that mean?\n\nWhat robust means in a\
    \ chatbot is that it should be able to function even when an error occurs, for\
    \ example, when the user has inputted something not recognized, a value does not\
    \ match with what is expected, or some required resources are not available.\n\
    \n> There are three main kinds of errors in programming: (1) Syntax errors, caused\
    \ by incorrect use of keywords/structures (e.g., typos); (2) semantic errors,\
    \ caused by misunderstandings of how the program is expected to function; and\
    \ (3) runtime errors, caused by incorrect inputs or other issues emerging during\
    \ the execution of the program.\n\nLet's look back at our How's It Going Bot.\n\
    \n```python\n# How's it going bot\n# Author:\n# Date:\n# Description: This bot\
    \ will ask you how it's\n# going and reply based on your answer\n\n# Ask user\
    \ how it's going\nprint(\"How's it going?\")\n\n# Get the user's reply\nreply\
    \ = input()\n\n# If they said Good,\n# reply Good!\nif reply == \"Good\" or reply\
    \ == \"good\" or reply == \"great\":\n    print(\"Good!\")\n\n# Otherwise if they\
    \ said Bad\n# reply Oh no!\nelif reply == \"Bad\":\n    print(\"Oh no!\")\n\n\
    # Otherwise reply \"I see...\"\nelse:\n    print(\"I see...\")\n```\n\nWhat happens\
    \ if the user inputs, I'm good.? Our chatbot will reply, I see..., instead of\
    \ what we would expect it to say (Good!). This is an example of a semantic error.\
    \ Our program runs, but doesn't produce an expected or suitable result.\n\nThe\
    \ reason why this error happens is that our bot is looking for complete matches\
    \ in each of the if statements: it looks for Good, good, great, and Bad. Since\
    \ the input begins with I'm and ends with . the chatbot treats it as different\
    \ from good or the other related strings, and thus determines that the default\
    \ action is the correct one.\n\nTo make our chatbot robust to additional characters,\
    \ we need to let it know that it is OK to have a match within the input. In our\
    \ last section, we discovered the in keyword, which allowed us to check whether\
    \ a string was contained within a list of strings. In Python, we can use the in\
    \ keyword also to see if a string is contained within another string.\n\nReplace\
    \ line 15 with the following code:\n\n```python\nif \"Good\" in reply or \"good\"\
    \ in reply or \"great\" in reply:\n    print(\"Good!\")\n```\n\nNow if the user\
    \ inputs I'm good. our chatbot will check if any of Good, good, and great is within\
    \ the input, which is the case here, and say Good!\n\n> The keyword in is a very\
    \ useful keyword in Python and has different uses depending on what you use it\
    \ with. Here we learn that we can use it to check if a string is within another\
    \ string (i.e., is a \"substring\" of the other string). We will see other uses\
    \ later in this book.\n\nNow, what if the user is upset and inputs Very BAD!?\
    \ Even with the in keyword our chatbot will not be able to reply Oh no! This is\
    \ because besides the letters needing to be identical, the capitalization needs\
    \ to be identical too. So BAD is treated as a different string from bad.\n\nTo\
    \ make our chatbot robust to variations in capitalization we can first process\
    \ the input to eliminate concerns of uppercase or lowercase letters. In Python,\
    \ the method lower() converts all uppercase letters into lowercase letters (can\
    \ you guess the name of the method that does the opposite?). Replace line 11 with\
    \ the following code:\n\n```python\nreply = input().lower()\n```\n\n> In programming\
    \ languages, functions and methods are both bits of code that add functionalities.\
    \ Functions are freestanding bits of code (e.g., input()), whereas methods are\
    \ bits of code associated to something else that have to be used via the dot operator\
    \ (e.g., random.choice()).\n\nAfter the user inputs their response, Python applies\
    \ the lower() method to the input, creating a version of the response where all\
    \ the letters are in lowercase. Now we can update our How's It Going Bot into\
    \ a more robust version:\n\n```python\n# How's it going bot (a more robust version)\n\
    # Author:\n# Date:\n# Description: This bot will ask you how it's\n# going and\
    \ reply based on your answer\n\n# Ask user how it's going\nprint(\"How's it going?\"\
    )\n\n# Get the user's reply, all lowercase\nreply = input().lower()\n\n# If they\
    \ said Good,\n# reply Good!\nif \"good\" in reply or \"great\" in reply:\n   \
    \ print(\"Good!\")\n\n# Otherwise if they said Bad\n# reply Oh no!\nelif \"bad\"\
    \ in reply:\n    print(\"Oh no!\")\n\n# Otherwise reply \"I see...\"\nelse:\n\
    \    print(\"I see...\")\n```\n\nTry different inputs such as Really great! Bad,\
    \ bad, bad ..., and GOOD!!\n\n> What if the user inputs something like not good?\
    \ The current version of the chatbot is not robust against situations like this.\
    \ We'll leave this as a challenge for you.\n\n### 2.2.3 Food Bot\n\nOur next example\
    \ will combine together the various constructs we've learned so far. We'll create\
    \ a Food Bot, which provides recommendations on where to find the best local cuisine.\n\
    \nOur Food Bot will ask the user about their favorite dish and suggest a place\
    \ where their favorite food is served. As an example, let's start with Japanese\
    \ food. You may be familiar with Japanese dishes like tempura, sushi, and sashimi.\
    \ In this program, if the user inputs any one of these dishes, our chatbot recognizes\
    \ that it is a type of Japanese food. Here, we use the in keyword again, as in\
    \ our Horoscope Bot: if the right side of in is a list, Python will check if the\
    \ value on the left side matches with any of the items in the list. This is very\
    \ similar to asking the question: is something in the list?\n\n![Figure 2.7 Where\
    \ do we go for food?](img/806aba0b9a38ca3131946c02e34638cb_49_0.png)\n\n**Figure\
    \ 2.7** Where do we go for food?\n\n```python\n# Food Bot (Japanese food expert)\n\
    # Author:\n# Date:\n\n# Asks your favourite dish?\nprint(\"What's your favourite\
    \ dish?\")\n\n# Gets your reply, e.g., tempura\nfavourite = input().lower()\n\n\
    # Create a list of Japanese foods, including\n# tempura, sushi, sashimi\njapanese_foods\
    \ = [\"tempura\", \"sushi\", \"sashimi\"]\n\n# If your favourite food is in the\
    \ Japanese\n# food list, then give a recommendation\nif favourite in japanese_foods:\n\
    \    print(\"Oh! You should try Sushi Garden in Metrotown.\")\nelse:\n    print(\"\
    Sorry, not sure. You could always try Cactus Club!\")\n```\n\nWe have made our\
    \ chatbot a bit more robust by accepting capitalization, so inputs like Tempura\
    \ and SUSHI will still be matched with items in the list. What about inputs from\
    \ someone who is really excited (e.g., Sushi!!) or indecisive (e.g., Sashimi ...?).\n\
    \nInputs with punctuation marks will not be matched by our chatbot because the\
    \ punctuation marks are treated as part of the string. We can use another method\
    \ in Python called strip() that removes a selected set of characters in the front\
    \ or at the back of a string. For example, strip(\".?!\") removes all the ., ?,\
    \ and ! from the string. So if we replace line 9 with the following code, our\
    \ chatbot will be now able to look past the punctuation marks.\n\n```python\n\
    favourite = input().lower().strip(\".?!\")\n```"
