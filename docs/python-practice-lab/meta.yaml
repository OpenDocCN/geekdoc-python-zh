    think about what (if anything) would change between the repetitions of your code.
    For example, here the flavour would change with each repetition, but the milk
    part would stay the same. So we can factor out the flavour element into a variable.
    Let’s call the variable `flavour`.


    ```

    1  # Bubble Tea Menu (Version 2)

    2  # Author:

    3  # Date:

    4  # Prints a bubble tea menu

    5

    6  flavour = "Mango"

    7  print(flavour + " milk")

    8  print("~~~~~~~~~~~~~~~~")

