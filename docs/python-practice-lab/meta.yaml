- md: "## 4.1 INTERACTIVE DRAWINGS\n\nMany of the animated movies you see nowadays\
    \ consist of many frames of images generated by code. Some of this code is quite\
    \ simple. Yet, when you combine them with some programming constructs, they generate\
    \ intricate drawings that you can manipulate and even incorporate some randomness\
    \ into.\n\nIn this section we introduce Python turtle, a Python module that creates\
    \ drawings based on commands. We begin with some basic commands, and then discuss\
    \ how to draw intricate patterns and shapes by combining them in an efficient\
    \ way.\n\n### 4.1.1 Learning Outcomes\n\nAt the end of this unit, you will be\
    \ able to ...\n\n### THE TURTLE MODULE\n\n- use the turtle module to create drawings\n\
    - read and understand basic turtle code to visualize its output\n- color the turtle\
    \ using turtle color names as well as RGB color values coded as 3-tuples\n\n###\
    \ DEFINING FUNCTIONS\n\n- create a function with and without parameters\n- call\
    \ a function previously created in the program\n- call a function from a loop,\
    \ possibly using the loop index as part of the arguments\n- identify the scope\
    \ of a variable, especially in relation to a function's scope\n\n### 4.1.2 Basic\
    \ Turtle Commands\n\nThe main idea of Python turtle is to give you full control\
    \ of a \"turtle\" that moves around leaving trails. The trails are part of the\
    \ drawing that you can modify by changing their color or appearance.\n\nThe first\
    \ thing you want to do is import the turtle module so you have access to its definitions\
    \ and commands. Then, you can create a turtle and give it a name by which you\
    \ can refer to it in the rest of your code.\n\n```python\n# Basic Turtle Commands\n\
    # Author:\n# Date:\n# Description: Quick demo of some of the basic\n# Turtle commands\n\
    \nimport turtle\n\nfred = turtle.Turtle()\n\nfred.forward(100)\nfred.stamp()\n\
    fred.penup()\nfred.forward(100)\nfred.pendown()\nfred.stamp()\n```\n\nHere are\
    \ some of the motion/state commands that our turtle fred accepts:\n\n- forward(distance)—move\
    \ forward by the specified distance, in the direction the turtle is headed (where\
    \ the pointy bit is pointing at).\n- right(units)—turn the turtle right by the\
    \ specified units. By default they are in degrees.\n- left(units)—turn the turtle\
    \ left by the specified units. By default they are in degrees.\n- circle(radius)—draw\
    \ a circle with the specified radius. The center is radius units above the turtle.\
    \ You can include a few more controls on how the circle is drawn by providing\
    \ some extra arguments.\n- stamp—stamp a copy of the turtle shape onto the canvas\
    \ at the current turtle position. You can change the shape of the turtle using\
    \ the shape command.\n- penup—pull the pen up so that no trail is left when moving.\n\
    - pendown—put the pen down so that a trail is left when moving.\n\nGive them a\
    \ try, modify the code and see how different your drawings are from those in the\
    \ demo.\n\nFor more commands supported by the turtle, refer to https://docs.python.org/3/library/turtle.html.\n\
    \n### 4.1.3 Interactive Drawing with Turtle\n\nLet’s create an interactive chatbot\
    \ that lets the user issue commands to draw in real time via the turtle it controls.\n\
    \nTo start, this chatbot will only draw a short line in the direction the turtle\
    \ is facing. But the user can control how many times it draws the line.\n\n```python\n\
    # Interactive Drawing with Turtle\n# Author:\n# Date:\n# The turtle will take\
    \ commands to move and draw\n# It will keep asking for a command until\n# you\
    \ say stop\n# f: forward 10 pixels\n# s: stamp\n# stop: exit the loop\n\n# Create\
    \ a turtle\nimport turtle\n\nanna = turtle.Turtle()\n\n# Create a boolean sentinel/flag\n\
    keep_looping = True\n\nwhile keep_looping:\n    # Ask what the user wants to do\n\
    \    command = input(\"What would you like me to do?\").lower()\n\n    # If the\
    \ user types s, stamp\n    if command == \"s\":\n        anna.stamp()\n    # If\
    \ the user types f, go forward\n    elif command == \"f\":\n        anna.forward(10)\n\
    \    elif command == \"stop\":\n        keep_looping = False\n```\n\n> This chatbot\
    \ is rather simple, isn't it? Try including a few more commands, for example,\
    \ l to turn left by 90 degrees, r to turn right by 90 degrees.\n\nWhen we first\
    \ built our chatbots in the previous chapters, we didn't have a way for the bot\
    \ to ask again whether it didn't receive an acceptable response, or to end only\
    \ if a certain response was received.\n\nIn the code above we use a new programming\
    \ construct, the while-loop, to enable that. Similar to a for-loop, the while-loop\
    \ repeats the code inside; but instead of using a list to control how many times\
    \ it repeats, it uses a Boolean sentinel/flag to determine if it is going to repeat.\n\
    \nIn line 17 we create a Boolean variable called **keep_looping**, which stores\
    \ the initial value True. When the while-loop begins the first time, it checks\
    \ whether the variable's value is True or False. If the value is True, it executes\
    \ the code inside; if not, it skips the code and never repeats itself. After each\
    \ repetition, the while-loop will check the variable's value again and decide\
    \ whether it is going to repeat or skip. It is therefore very important to have\
    \ some code inside the while-loop to update the value of the sentinel/flag variable\
    \ so that the loop will eventually end (line 30).\n\n> This use of a Boolean variable\
    \ as a sentinel/flag alongside a while-loop is a very common technique for input\
    \ validation. Imagine the Boolean variable is the result of a validity check of\
    \ an input string (e.g., does it have a number inside? is it long enough?). You\
    \ can use the Boolean variable to store the answer to the question: is the input\
    \ string invalid? If so, it will be True and the while-loop will repeat; otherwise\
    \ it will be False and the while-loop will end. Try to write this code!\n\n###\
    \ 4.1.4 Cookie Drawer\n\nNow let's draw something a bit more intricate, for example,\
    \ a cookie with some chocolate chips on top!\n\n```python\nimport turtle\n\nfred\
    \ = turtle.Turtle()\n\nfred.circle(30)\nfred.penup()\nfred.goto(5, 30) #where\
    \ the middle chip is\nfred.stamp()\nfor x in [-5, 15]:\n    fred.goto(x, 20)\n\
    \    fred.stamp()\n    fred.goto(x, 40)\n    fred.stamp();\n```\n\n**Figure 4.2**\
    \ One chocolate chip cookie!\n\nThe above code snippet draws one cookie by drawing\
    \ a circle and then some chocolate chips using the `stamp()` method. It uses the\
    \ method `goto`, which moves the turtle to the position specified by the arguments.\
    \ We use the `penup()` method (line 6) so that when the turtle moves to the specified\
    \ location it doesn't leave a trail (as if it jumps there). We also use a `for`-loop\
    \ to shorten the code so that a pair of chocolate chips is drawn for each loop\
    \ iteration.\n\n> turtle uses a two-dimensional coordinate system to manage its\
    \ position. The first value is the x-position (horizontal), which becomes negative\
    \ as you go left and positive as you go right. The second value is the y-position\
    \ (vertical), which becomes negative as you go down and positive as you go up.\
    \ The middle of the canvas has the position (0, 0), which is also called **home**,\
    \ and you can go there by calling the `home()` method.\n\nThis looks great. But\
    \ what if we want to draw a few more cookies? Do we need to copy this code multiple\
    \ times? We can certainly do that, but this will make our code much longer. Also,\
    \ if we want to change how the cookie looks (e.g., a bigger cookie with more chocolate\
    \ chips), we will have to go to all of the copies and make the change.\n\nIn programming\
    \ we have a construct that allows us to reuse the code after it is written, with\
    \ a bit of flexibility on how the code is being reused. This programming construct\
    \ is called a **function**. In fact, you have seen it many times in our code samples!\
    \ For example, `print()` is a function that we reuse many times to print something\
    \ to the display, and it is flexible enough so that we can make it print different\
    \ things. Another example is the `random.choice()` method, which randomly picks\
    \ an item from the list we provide it with.\n\n> As explained previously, we have\
    \ been using both “functions” and “methods” to refer to bits of code that we can\
    \ reuse. The distinction is whether it is a code associated to a variable/object:\
    \ if it isn’t we call it function; otherwise we call it method. Since `choice()`\
    \ is associated to the `random` object, we call it a method of the `random` object.\n\
    \nThe process of creating this reusable function programming construct is called\
    \ “defining a function.” First, we use the `def` keyword to indicate that we are\
    \ defining a function. Then, we decide on a name for the function and what information\
    \ it needs when it is being reused. Finally, we put the code it executes in the\
    \ *function body*. For example, below is a function that draws one cookie.\n\n\
    ```python\ndef drawOneCookie(x_offset, y_offset):\n    # goto the starting position\n\
    \    fred.penup()\n    fred.goto(x_offset, y_offset)\n    fred.pendown()\n\n \
    \   fred.circle(30)\n    fred.penup()\n    fred.goto(5+x_offset, 30+y_offset)\n\
    \    fred.stamp()\n    for x in [-5, 15]:\n        fred.goto(x+x_offset, 20+y_offset)\n\
    \        fred.stamp()\n        fred.goto(x+x_offset, 40+y_offset)\n        fred.stamp();\n\
    ```\n\nThis function uses two parameters, `x_offset` and `y_offset`, to move the\
    \ turtle to the desired position on the canvas to draw. This is how the function\
    \ becomes flexible in drawing one cookie at different positions."
  mdcn: "## 4.1 交互式绘图\n\n如今你看到的许多动画电影，都是由代码生成的多帧图像组成的。其中一些代码相当简单。然而，当你将它们与一些编程结构结合时，就能生成复杂的图形，你甚至可以操控它们，甚至加入一些随机性。\n\
    \n在本节中，我们将介绍 Python turtle，这是一个基于命令创建图形的 Python 模块。我们将从一些基本命令开始，然后讨论如何通过高效地组合它们来绘制复杂的图案和形状。\n\
    \n### 4.1.1 学习成果\n\n在本单元结束时，你将能够...\n\n### TURTLE 模块\n\n- 使用 turtle 模块创建图形\n-\
    \ 阅读并理解基本的 turtle 代码以可视化其输出\n- 使用 turtle 颜色名称以及编码为 3 元组的 RGB 颜色值为海龟着色\n\n### 定义函数\n\
    \n- 创建带参数和不带参数的函数\n- 调用程序中先前创建的函数\n- 从循环中调用函数，可能使用循环索引作为参数的一部分\n- 识别变量的作用域，特别是与函数作用域相关的作用域\n\
    \n### 4.1.2 基本 Turtle 命令\n\nPython turtle 的主要思想是让你完全控制一个“海龟”，它移动时会留下轨迹。轨迹是图形的一部分，你可以通过改变它们的颜色或外观来修改。\n\
    \n首先要做的是导入 turtle 模块，以便访问其定义和命令。然后，你可以创建一个海龟并给它一个名称，以便在代码的其余部分中引用它。\n\n```python\n\
    # Basic Turtle Commands\n# Author:\n# Date:\n# Description: Quick demo of some\
    \ of the basic\n# Turtle commands\n\nimport turtle\n\nfred = turtle.Turtle()\n\
    \nfred.forward(100)\nfred.stamp()\nfred.penup()\nfred.forward(100)\nfred.pendown()\n\
    fred.stamp()\n```\n\n以下是我们海龟 fred 接受的一些运动/状态命令：\n\n- forward(distance)——沿海龟当前朝向（尖端指向的方向）向前移动指定距离。\n\
    - right(units)——将海龟向右转指定单位。默认单位是度。\n- left(units)——将海龟向左转指定单位。默认单位是度。\n- circle(radius)——绘制一个指定半径的圆。圆心在海龟上方\
    \ radius 个单位处。你可以通过提供一些额外参数来控制圆的绘制方式。\n- stamp——在当前海龟位置将海龟形状的副本印在画布上。你可以使用 shape\
    \ 命令改变海龟的形状。\n- penup——提起笔，这样移动时就不会留下轨迹。\n- pendown——放下笔，这样移动时就会留下轨迹。\n\n尝试一下，修改代码，看看你的图形与演示中的有何不同。\n\
    \n有关 turtle 支持的更多命令，请参阅 https://docs.python.org/3/library/turtle.html。\n\n###\
    \ 4.1.3 使用 Turtle 进行交互式绘图\n\n让我们创建一个交互式聊天机器人，让用户通过其控制的海龟实时发出绘图命令。\n\n首先，这个聊天机器人只会沿着海龟面向的方向画一条短线。但用户可以控制它画线的次数。\n\
    \n```python\n# Interactive Drawing with Turtle\n# Author:\n# Date:\n# The turtle\
    \ will take commands to move and draw\n# It will keep asking for a command until\n\
    # you say stop\n# f: forward 10 pixels\n# s: stamp\n# stop: exit the loop\n\n\
    # Create a turtle\nimport turtle\n\nanna = turtle.Turtle()\n\n# Create a boolean\
    \ sentinel/flag\nkeep_looping = True\n\nwhile keep_looping:\n    # Ask what the\
    \ user wants to do\n    command = input(\"What would you like me to do?\").lower()\n\
    \n    # If the user types s, stamp\n    if command == \"s\":\n        anna.stamp()\n\
    \    # If the user types f, go forward\n    elif command == \"f\":\n        anna.forward(10)\n\
    \    elif command == \"stop\":\n        keep_looping = False\n```\n\n> 这个聊天机器人相当简单，不是吗？尝试添加更多命令，例如，l\
    \ 向左转 90 度，r 向右转 90 度。\n\n在前面的章节中，当我们第一次构建聊天机器人时，我们没有办法让机器人在没有收到可接受响应时再次询问，或者只有在收到特定响应时才结束。\n\
    \n在上面的代码中，我们使用了一种新的编程结构——while 循环来实现这一点。与 for 循环类似，while 循环会重复执行内部的代码；但它不是使用列表来控制重复次数，而是使用一个布尔哨兵/标志来决定是否重复。\n\
    \n在第 17 行，我们创建了一个名为 **keep_looping** 的布尔变量，其初始值为 True。当 while 循环第一次开始时，它会检查变量的值是\
    \ True 还是 False。如果值为 True，则执行内部代码；否则，跳过代码且永不重复。每次重复后，while 循环会再次检查变量的值，并决定是重复还是跳过。因此，在\
    \ while 循环内部编写一些代码来更新哨兵/标志变量的值非常重要，这样循环最终才会结束（第 30 行）。\n\n> 将布尔变量用作哨兵/标志与 while\
    \ 循环一起使用，是输入验证中非常常见的技术。想象一下，布尔变量是输入字符串有效性检查的结果（例如，它包含数字吗？长度足够吗？）。你可以使用布尔变量来存储问题的答案：输入字符串是否无效？如果是，它将为\
    \ True，while 循环将重复；否则它将为 False，while 循环将结束。尝试编写这段代码！\n\n### 4.1.4 饼干绘制器\n\n现在让我们画一些更复杂的东西，例如，一块上面有巧克力碎片的饼干！\n\
