  md: '# HOW IS THIS BOOK DIFFERENT?


    This workbook is meant to be engaging, hands-on, and example-driven to help you
    become a confident coder. In line with our theme, interactive chatbots, natural
    language and text strings are used early on as the main building blocks for learning
    about program structures, rather than math. This approach demonstrates the use
    of CS in many diverse areas and fields. Additionally, code comprehension exercises,
    traditionally containing terse, single-letter variables, are rewritten in equivalent
    code with inclusive and approachable variable names. In each chapter, the reader
    is challenged to write a full program based on the topics and the provided examples.
    Finally, a selection of projects is presented at the end of the book, to integrate
    the concepts learned through all the chapters.


    By the end of this book, you will become well-versed in traditional introductory
    algorithms and become fluent in programming in Python 3. The learning outcomes
    for this toolkit are roughly equivalent to those of *How to Think Like a Computer
    Scientist* (Ch. 1–12, 15) (https://runestone.academy/ns/books/published/thinkcspy/index.html).


    # IS THIS BOOK RIGHT FOR ME?


    The audience for this workbook includes:


    +   - anyone who wants to learn how to program by coding fun, working programs
    that gradually become more complex;

    - instructors teaching Python to beginners who need motivating examples and exercises
    for their classes; and

    - students wishing to have a reference to examples taught by their instructors
    and wishing to build complete and functional programs.


    # WHAT IS THIS BOOK NOT?


    This book is not a stand-alone CS textbook. It is a hands-on workbook that provides
    basic coverage of all the necessary concepts needed for introductory CS through
    examples and exercises, without overburdening the reader with details behind individual
    topics (e.g., how are variables represented in memory? what are modules?). Additional
    explanations and exercises to practice specific skills are linked to from this
    workbook as additional resources from this workbook.


    # ROADMAP


    Here is a short guide to the contents of this book. Chapters 1 to 4.2 focus on
    learning the basics of programming in Python 3, while Chapters 4.3 to 6 introduce
    classic algorithms and hands-on projects to deepen your knowledge of CS.


    Chapter 1, “Getting Started,” explains the concept of an algorithm and gets you
    up and running with your first, “Hello, World,” program.


    Chapter 2, “Chatbots,” introduces a broad range of concepts by progressively building
    more and more advanced programs that we call “bots.” Chapter 2.1 focuses on the
    string data type and the many things you can do with it: assign it to a variable,
    concatenate it,'
