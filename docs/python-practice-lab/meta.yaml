    As you can see, the more the number of common answers two persons have, the higher
    the similarity score will be.


    This small program, together with the above tallying examples (and the Favourite
    Cafe program), also demonstrates a very useful computation technique called **accumulator
    pattern**: we create a few counter variables and set them to an initial value.
    When we go through the data and see something worth noting, we update the corresponding
    counter variable by adding 1 to it. After all the data is examined, we can look
    at a summary of how many times something worth noting has occurred. In other words,
    we *accumulate* information as we examine the data.


    A variation of this accumulator pattern is one in which, instead of incrementing
    the counter variable, we update a variable to the value of some information we
    find worth recording. You will see an example in the next section.


