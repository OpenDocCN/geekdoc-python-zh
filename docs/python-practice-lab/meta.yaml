  mdcn: "## 5.2.3 归并排序\n\n与选择排序相比，归并排序是一种快得多的列表排序方法，尤其是在待排序项目数量很大时。\n\n让我们从一个例子开始，以直观理解归并排序算法。假设你得到了两个数字列表，每个列表已经按从小到大的顺序排好序。\n\
    \n你将如何把这两个列表合并成一个有序列表？\n\n### 合并算法\n\n一种可能性是从每个列表的开头开始。然后，你选择较小的项目并将其添加到结果列表中。\n\
