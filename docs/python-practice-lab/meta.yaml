    \n同样的直觉帮助我们编写**二分搜索**的算法，如下所述。我们使用两个变量来帮助我们跟踪尚未探索的列表部分。然后，我们继续检查该列表的中间部分，直到找到我们的数字。就像我们之前关于线性搜索的部分一样，我们可以检查项目是否存在（即，返回\
    \ True 或 False）或返回列表中该项的索引（即，位置）。\n\n请记住，数据需要按从低到高的顺序排序，此代码才能工作。\n\n```\n# 二分搜索\n\
    # 作者：\n# 日期：\n\n# 如果在列表中则返回 True，否则返回 False\ndef binarySearch(input_list, search_term):\n\
    \    # 跟踪活动的搜索空间\n    low = 0\n    high = len(input_list) - 1  # 最后一个元素的索引\n\n\
    \    while low <= high:\n        # 检查活动搜索空间的中点\n        midpoint = (low + high)\
    \ // 2  # 向下取整到最近的整数\n        # 如果是搜索项，返回 True\n        if input_list[midpoint]\
