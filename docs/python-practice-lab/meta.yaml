    | Yellow | 255 | 255 | 0 |


    **Figure 4.5** A few common colour values. Each colour value ranges from 0 to
    255.


    Besides knowing what colour pixels are in the image, a computer also needs to
    know *where* each pixel is in the image. Misplacing a pixel will result in a completely
    different image!


    One way to store the pixels in their correct positions is to use a **two-dimensional
    matrix** where each entry of the matrix is a pixel and the position of the entry
    corresponds to the pixel’s position in the image (Figure 4.6). We can use a 2D
    list (i.e., list of lists) to represent such a configuration, where each sublist
    stores a horizontal strip (row) of pixels, as shown in Figure 4.7.


