    \ number > 1000\n```\n\n换句话说，该函数将返回 True 或 False，表示作为参数传递的数字是否大于 1,000。这里，True\
    \ 和 False 是布尔值；换句话说，它们是一种称为布尔的特定数据类型，类似于 int 和 string。这是另一个例子，这次返回一个数值。\n\n```\n\
    1  # Fruitful Function Example\n2  # Author:\n3  # Date:\n4\n5  # A function that\
