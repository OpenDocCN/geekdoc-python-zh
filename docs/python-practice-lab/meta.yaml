    \n# Preface\n\nInteractive chatbots are taking the world by storm! Are you interested\
    \ in creating interactive programs but don’t know where to start? Do you have\
    \ no coding background and want a fun introduction to computer science (CS)? Or,\
    \ perhaps you are a teacher looking for a structured program to cover the areas\
    \ in CS, while keeping examples interesting and fresh for your students?\n\nIn\
    \ this book, you will learn basic programming by writing Python programs that\
    \ mimic interactive chatbots. While this introductory book is *not* about how\
    \ to code an advanced artificial intelligence, you will gain skills necessary\
    \ for basic coding while learning about artificial intelligence concepts such\
    \ as recommendation systems, computer vision, and big data.\n\nThe curriculum\
    \ presented in this workbook has been taught as an introduction to CS and programming\
    \ course at Simon Fraser University in British Columbia, Canada, to over a thousand\
    \ students, and to both majors and nonmajors in Computing Science. The course\
    \ is designed to teach through real-life situations, and to give students the\
    \ opportunity for creative thinking. Reflecting on the course, a student shared:\n\
    \n> > Although I have been interested in programming since high school, I was\
    \ always too intimidated to try it. I am really glad to have finally taken this\
    \ course because I found that I enjoyed programming and problem solving more than\
    \ I expected to. I had so much fun throughout the entire semester, and will be\
    \ taking more computing science courses this summer—hopefully I can pursue a minor!\n\
    \nWe hope this book will inspire the same enthusiasm in you to pursue a deeper\
    \ understanding and appreciation of CS!\n\n# WHAT ARE CHATBOTS?\n\nIn this book,\
    \ we use the term “chatbots” to describe interactive programs that use text as\
    \ input and output. In particular, these programs converse with the user and have\
    \ a text-based interface, similar to that of a messaging app. You will be developing\
    \ these interactive programs, which your friends and you can try!\n\n# HOW IS\
    \ THIS BOOK DIFFERENT?\n\nThis workbook is meant to be engaging, hands-on, and\
    \ example-driven to help you become a confident coder. In line with our theme,\
    \ interactive chatbots, natural language and text strings are used early on as\
    \ the main building blocks for learning about program structures, rather than\
    \ math. This approach demonstrates the use of CS in many diverse areas and fields.\
    \ Additionally, code comprehension exercises, traditionally containing terse,\
    \ single-letter variables, are rewritten in equivalent code with inclusive and\
    \ approachable variable names. In each chapter, the reader is challenged to write\
    \ a full program based on the topics and the provided examples. Finally, a selection\
    \ of projects is presented at the end of the book, to integrate the concepts learned\
    \ through all the chapters.\n\nBy the end of this book, you will become well-versed\
    \ in traditional introductory algorithms and become fluent in programming in Python\
    \ 3. The learning outcomes for this toolkit are roughly equivalent to those of\
    \ *How to Think Like a Computer Scientist* (Ch. 1–12, 15) (https://runestone.academy/ns/books/published/thinkcspy/index.html).\n\
    \n# IS THIS BOOK RIGHT FOR ME?\n\nThe audience for this workbook includes:\n\n\
    - anyone who wants to learn how to program by coding fun, working programs that\
    \ gradually become more complex;\n- instructors teaching Python to beginners who\
    \ need motivating examples and exercises for their classes; and\n- students wishing\
    \ to have a reference to examples taught by their instructors and wishing to build\
    \ complete and functional programs.\n\n# WHAT IS THIS BOOK NOT?\n\nThis book is\
    \ not a stand-alone CS textbook. It is a hands-on workbook that provides basic\
    \ coverage of all the necessary concepts needed for introductory CS through examples\
    \ and exercises, without overburdening the reader with details behind individual\
    \ topics (e.g., how are variables represented in memory? what are modules?). Additional\
    \ explanations and exercises to practice specific skills are linked to from this\
    \ workbook as additional resources from this workbook.\n\n# ROADMAP\n\nHere is\
    \ a short guide to the contents of this book. Chapters 1 to 4.2 focus on learning\
    \ the basics of programming in Python 3, while Chapters 4.3 to 6 introduce classic\
    \ algorithms and hands-on projects to deepen your knowledge of CS.\n\nChapter\
    \ 1, “Getting Started,” explains the concept of an algorithm and gets you up and\
    \ running with your first, “Hello, World,” program.\n\nChapter 2, “Chatbots,”\
    \ introduces a broad range of concepts by progressively building more and more\
    \ advanced programs that we call “bots.” Chapter 2.1 focuses on the string data\
    \ type and the many things you can do with it: assign it to a variable, concatenate\
    \ it,"
