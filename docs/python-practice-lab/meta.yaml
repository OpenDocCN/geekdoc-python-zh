    # Recommendation Systems


    Many services nowadays collect user data and provide relevant information as recommendations.
    In this chapter you’ll write programs that use some basic matching techniques
    to do just that!


    Recommendation systems such as Netflix’s and Amazon’s “You might also like” features
    are a great way to help people discover new things they may like. Under the hood,
    it’s statistics and looking for matches. Today’s recommendation system software
    uses large datasets and machine learning to generate recommendations. Their advanced
    AI algorithms are outside the scope of this book, but in this chapter you’ll learn
    how to write chatbots that provide recommendations to their users based on the
    information they collect and store in files.


    The chatbot programs that you’ll be writing include:


    +   - Popular Cafe Finder

