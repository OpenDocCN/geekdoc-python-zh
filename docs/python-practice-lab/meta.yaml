  md: 'Scale up: If the value is less than 64, the scaled-up value is value/64 * 80;
    if the value is 64 or above but less than 128, the scaled-up value is (value–64)/(128–64)
    * (160–80) + 80; otherwise, the scaled-up value is (value–128)/(255–128) * (255–160)
    + 160


    Scale down: if the value is less than 64, the scaled-down value is value/64 *
    50; if the value is 64 or above but less than 128, the scaled-down value is (value-64)/(128–64)
    * (100–50) + 50; otherwise, the scaled-up value is (value–128)/(255–128) * (255–100)
    + 100. For example, if a pixel has [100, 255, 200] as its RGB colour, the warm
    colour of this pixel will be [125, 255, 187], where the R value is scaled up and
    the B value is scaled down. Note that the scaling might result in a float number,
    so you need to convert it into an integer. To make things easier, consider first
    defining a function that does the scale up calculation and a function that does
    the scale down calculation.


