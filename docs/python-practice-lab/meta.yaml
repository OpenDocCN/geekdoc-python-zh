    In programming we have a construct that allows us to reuse the code after it is
    written, with a bit of flexibility on how the code is being reused. This programming
    construct is called a **function**. In fact, you have seen it many times in our
    code samples! For example, `print()` is a function that we reuse many times to
    print something to the display, and it is flexible enough so that we can make
    it print different things. Another example is the `random.choice()` method, which
    randomly picks an item from the list we provide it with.


    > As explained previously, we have been using both “functions” and “methods” to
    refer to bits of code that we can reuse. The distinction is whether it is a code
    associated to a variable/object: if it isn’t we call it function; otherwise we
    call it method. Since `choice()` is associated to the `random` object, we call
    it a method of the `random` object.


    The process of creating this reusable function programming construct is called
    “defining a function.” First, we use the `def` keyword to indicate that we are
    defining a function. Then, we decide on a name for the function and what information
    it needs when it is being reused. Finally, we put the code it executes in the
    *function body*. For example, below is a function that draws one cookie.


