- img_proc: true
  md: 'Spoiler alert: Your computer is just like this alien! It has no idea about
    the human world. We therefore need to be patient with it and explain our algorithms
    very clearly. Luckily, to communicate with our computer, we have the common language
    of Python, which we will learn in this book. Once we learn how to communicate
