    A more sophisticated recommendation system would do more than just asking for
    a few votes. Instead, it looks into hundreds or thousands of records and look
    for patterns and matches.

    In this section we explain how to write chatbots that read data from files with
    thousands of entries and provide recommendations based on those data.


