    \n## 二分搜索\n\n让我们假设我们的数据是按从低到高排序的。这种数据组织方式允许我们使用一种称为**二分搜索**的搜索算法。以下是直觉。你玩过高低猜数字游戏吗？在这个游戏中，你的朋友应该选择一个\
    \ 1 到 100 之间的数字。你的任务是猜出他们的数字，他们会告诉你需要猜高一点还是低一点，以此类推。选择数字的最佳策略是什么？你会选择 99，然后 98，以此类推吗？一个常见的策略是选择你尚未探索的数字集合的中间数字。所以，例如，游戏可能会这样进行：\n\
