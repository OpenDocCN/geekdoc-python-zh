    # 2.2.2 A Robust Bot


    A requirement for an advanced chatbot is that it has to be **robust**. What does
    that mean?


    What robust means in a chatbot is that it should be able to function even when
    an error occurs, for example, when the user has inputted something not recognized,
    a value does not match with what is expected, or some required resources are not
    available.


    > There are three main kinds of errors in programming: (1) Syntax errors, caused
    by incorrect use of keywords/structures (e.g., typos); (2) semantic errors, caused
    by misunderstandings of how the program is expected to function; and (3) runtime
    errors, caused by incorrect inputs or other issues emerging during the execution
    of the program.


    Let''s look back at our How''s It Going Bot.


    ```

    1  # How''s it going bot

    2  # Author:

    3  # Date:

    4  # Description: This bot will ask you how it''s

    5  # going and reply based on your answer

