    # 4.2.2 Green or Not?


    Did you know that some of your favourite movie action sequences are filmed in
    front of a green screen? After filming, special effects studios use computer software
    to separate people and objects from the background, which is then replaced with
    something else (e.g., a space background). One easy way to do this is to assume
    that the background is of a specific colour, such as bright green. When the computer
    program senses that a pixel in an image is a specific green colour, it determines
    that it is part of the background, and deduces that the remainder of the image
    are people and objects in the foreground.

    In this section, we will build a green screen program that can weave together
    the picture of an actor into a new background!


    # IMAGE PRIMER


    Let’s start by learning how images are represented in a computer. An image is
    simply a collection of **pixels**. As shown in Figure 4.4, each pixel forms a
    “dot” of colour of the image.

    Each **pixel** is represented by a **colour**, which is stored as three **colour
    values** (Red, Green, Blue). You can think of the colour values as the amount
    of red, green, and blue light composing a particular colour. It is important to
    remember that each value ranges from 0 to 255.

    So, for example, 0 for red and green and 255 for blue will produce the colour
    blue. You’ll notice that since we use the convention of RGB, we can use a list
    of three integers to represent a colour without explicitly stating which value
    is for which colour. Figure 4.5 shows a few common colour RGB values.


    > Note: Mixing colour values is not exactly like mixing paint. 255, 255, 255 does
    not equal black; it produces white. To help you remember, think about how white
    light contains the spectrum of colours.'
