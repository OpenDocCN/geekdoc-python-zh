    # 2.2.2 A Robust Bot


    A requirement for an advanced chatbot is that it has to be **robust**. What does
    that mean?


    What robust means in a chatbot is that it should be able to function even when
    an error occurs, for example, when the user has inputted something not recognized,
    a value does not match with what is expected, or some required resources are not
    available.


    > There are three main kinds of errors in programming: (1) Syntax errors, caused
    by incorrect use of keywords/structures (e.g., typos); (2) semantic errors, caused
    by misunderstandings of how the program is expected to function; and (3) runtime
    errors, caused by incorrect inputs or other issues emerging during the execution
    of the program.


    Let''s look back at our How''s It Going Bot.


    ```

    1  # How''s it going bot

    2  # Author:

    3  # Date:

    4  # Description: This bot will ask you how it''s

    5  # going and reply based on your answer

    6

    7  # Ask user how it''s going

    8  print("How''s it going?")

    9

    10 # Get the user''s reply

    11 reply = input()

    12

    13 # If they said Good,

    14 # reply Good!

    15 if reply == "Good" or reply == "good" or reply == "great":

    16     print("Good!")

    17

    18 # Otherwise if they said Bad

    19 # reply Oh no!

    20 elif reply == "Bad":

    21     print("Oh no!")

    22

    23 # Otherwise reply "I see..."

    24 else:

    25     print("I see...")

    ```'
  - '[PAGE 47]


    What happens if the user inputs, I''m good.? Our chatbot will reply, I see...,
    instead of what we would expect it to say (Good!). This is an example of a semantic
    error. Our program runs, but doesn''t produce an expected or suitable result.


    The reason why this error happens is that our bot is looking for complete matches
    in each of the if statements: it looks for Good, good, great, and Bad. Since the
    input begins with I''m and ends with . the chatbot treats it as different from
    good or the other related strings, and thus determines that the default action
    is the correct one.


    To make our chatbot robust to additional characters, we need to let it know that
    it is OK to have a match within the input. In our last section, we discovered
    the in keyword, which allowed us to check whether a string was contained within
    a list of strings. In Python, we can use the in keyword also to see if a string
    is contained within another string.


    Replace line 15 with the following code:


    ```

    15  if "Good" in reply or "good" in reply or "great" in reply:

    16      print("Good!")

    ```


    Now if the user inputs I''m good. our chatbot will check if any of Good, good,
    and great is within the input, which is the case here, and say Good!


    > The keyword in is a very useful keyword in Python and has different uses depending
    on what you use it with. Here we learn that we can use it to check if a string
    is within another string (i.e., is a "substring" of the other string). We will
    see other uses later in this book.


    Now, what if the user is upset and inputs Very BAD!? Even with the in keyword
    our chatbot will not be able to reply Oh no! This is because besides the letters
    needing to be identical, the capitalization needs to be identical too. So BAD
    is treated as a different string from bad.


    To make our chatbot robust to variations in capitalization we can first process
    the input to eliminate concerns of uppercase or lowercase letters. In Python,
    the method lower() converts all uppercase letters into lowercase letters (can
    you guess the name of the method that does the opposite?). Replace line 11 with
    the following code:


    ```

    11  reply = input().lower()

    ```


    > In programming languages, functions and methods are both bits of code that add
    functionalities. Functions are freestanding bits of code (e.g., input()), whereas
    methods are bits of code associated to something else that have to be used via
    the dot operator (e.g., random.choice()).


    After the user inputs their response, Python applies the lower() method to the
    input, creating a version of the response where all the letters are in lowercase.
    Now we can update our How''s It Going Bot into a more robust version:'
