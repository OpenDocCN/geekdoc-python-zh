    # FRUITFUL FUNCTIONS


    We now have a program that can check a pixel to see whether it is green. But we
    want to check all the pixels in our image to decide whether they are part of the
    green screen. Imagine you have a big image with thousands or millions of pixels—you’ll
    have to repeat this code thousands or millions of times!


    How can we avoid copying/pasting code? We can begin by using a loop to save us
    the repetitions, and we can make it better by putting the checking steps into
    a repeatable unit. Recall our previous programs where we created functions, for
    example, to draw a cookie. In this program, we’d also like to write a function
    that takes a pixel to test and tells us whether it is green or not. The thing
    is, the functions we used previously can only “tell” us by printing a sentence
    to the display, which doesn’t really help if we want to use this information for
    further processing of the image. We need another kind of function that can report
    the result, which can be used by the rest of the program.


    In programming, there is a way to make a function return (i.e., report) a value.
    You have used this before; for example, random.choice(mylist) returned a random
    element'
