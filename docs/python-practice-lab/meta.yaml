    # 3.2.8 Glossary


    +   - **CSV files**, human-readable text files in which pieces of data are separated
    by commas (comma-separated values), and each entry is in its own line. Some productivity
    applications (e.g., Microsoft Excel) automatically convert these files into tables,
    but you can always open them with a normal text editor to see the values and even
    modify them.

    - **header line**, the first line in a data file indicating what the values in
    the subsequent lines of the file represent. Typically when a program retrieves
    data from the data file, this line will be ignored as it does not contain any
    value (some data files does not even have this line). But it is very useful for
    the user to make sense of the data when the program is displaying the data.

    - **accumulator pattern**, a computational technique to aggregate information
    as the program goes through the data. This technique involves setting up a counter/accumulator
    variable and assigning an initial value to it. As the program examines the data,
    this variable gets updated according to some rules. An example is that of counting
    the number of even numbers in a data file: set up a counter variable with an initial
    value 0, as the program examines the values, increment this counter variable by
    1 each time it sees an even number. When all the values are examined, the counter
    variable holds the number of even numbers. The same technique can be used to analyze
    all values in the data file in other ways, for example, to calculate the total
    of all values (keep adding to the variable), and to find the largest value (update
    the variable when a larger value appears).

    - **list slicing**, a functionality in Python to extract a portion of a list.
    Instead of using an index to access an item in the list, one can use numbers and
    a colon to specify which portion to extract. For example, 3:5 means the portion
    starting from the index 3 to the index 4 (= 5 – 1). If one of the numbers is missing,
    it means all the items on that side are to be extracted. For example, :5 means
    the portion from the index 0 to the index 4; and 3: means the portion from the
    index 3 to the last index of the list.'
