- md: "## Ask the user how it's going\n\nAs you can see, our program sketch contains\
    \ a possible **condition**, or branching: if the user replies that they're Good,\
    \ the chatbot should reply, Good! If the user says they're Bad, the chatbot replies,\
    \ Oh no! You should be able to translate the first two steps of the program (lines\
    \ 8 and 9) into Python, based on what you've learned so far. Give it a try!\n\n\
    Now, let's see how we translate our conditions into Python. We need two keywords:\
    \ if, which checks our first condition (that the user typed Good), and elif (else\
    \ if), which checks another condition (that the user typed Bad). Each conditional\
    \ uses == to compare the reply variable's content to what the user typed, followed\
    \ by a colon.\n\n```python\n# How's it going bot\n# Author:\n# Date:\n# Description:\
    \ This bot will ask you how it's\n# going and make a comment depending on\n# how\
    \ you answered\n\n# Ask user how it's going\nprint(\"How's it going?\")\n\n# Get\
