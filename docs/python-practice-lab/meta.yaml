  md: '# 3.1.4 Movie Rater


    In our previous code example, on finding the most popular nearby cafe to go to,
    we used a number of variables to store the tallies for the options: starbucks_tally,
    tim_hortons_tally, and artiggiano_tally.


    This works well with a small number of options. What if we have more options?
    It will become harder to keep track of the variables, and if we want to print
    the results we might have to type a lot of code (and the more we type the more
    likely we are to make mistakes and make the code harder to modify).


    Python provides an effective way to store pairs of values, similar to how it stores
    individual values in a list. It is called **dictionary**. In a dictionary, each
    item is a pair indicated by its key (think about label) and its value. Using our
    Popular Cafe Finder example, we could have a dictionary of three items, using
    the cafe names as the keys and starting with the value 0 for each of them.


    Let''s use another example here. Let''s say we wish to write a Movie Rater chatbot
    that asks five people about their movie preference and displays the results. To
    keep it simple, we use three movies: Frozen, X-Men, and Harry Potter.


    ```

    1  # Movie Rater with Dictionaries

    2  # Author:

    3  # Date:

    4  # Asks 5 people for their movie ratings

    5  # and tracks them using dictionaries

    6

    7  # Initialize a dictionary of movies

    8  movies = {"frozen": 0,

    9           "x-men": 0,

    10          "harry potter": 0}

    11

    12 # Ask 5 people for their movie preference

    13 for i in range(5):

    14     preference = input("Which movie is your \n15                         favourite
    out of Frozen, X-Men \n16                         or Harry Potter? ").lower().strip("
    .!")

    17

    18     # Add 1 to the appropriate movie

    19     movies[preference] += 1

    20

    21 # Print out the results using a loop

    22 for movie in movies:

    23     print(movie, movies[movie]) # Name and tally

    ```


    Dictionaries provide a number of advantages over individual variables as well
    as lists:


    +   - we can come up with a meaningful name for the tallies (movies);

    - when referring to a pair in the dictionary, we can use the key of the pair,
    instead of a number in a list.


    Thus, instead of using `if/elif/else` statements to determine which tally to add
    to, we can directly use the user input as key to refer to the pair and access
    its value (line 19).'
