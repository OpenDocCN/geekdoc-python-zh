    16      print("Good!")

    ```


    Now if the user inputs I''m good. our chatbot will check if any of Good, good,
    and great is within the input, which is the case here, and say Good!


    > The keyword in is a very useful keyword in Python and has different uses depending
    on what you use it with. Here we learn that we can use it to check if a string
