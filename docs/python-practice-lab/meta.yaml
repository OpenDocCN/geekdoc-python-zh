    when the programs are not running and the computers are off. We can also share
    the data with others by sending them these files.


    Most files are stored in either a very compact way (binary files), or a more human-readable
    way (plain text files). Opening a binary file in a text editor application will
    result in strange characters being displayed, as the content is not designed to
    be readable by humans. However, if you open a plain text file, you will be able
