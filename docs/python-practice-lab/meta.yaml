    - **assignment**，编程中的一种常见操作，其中变量被设置为存储它被赋予的值。通常该操作由等号（=）表示，并且与具有相同符号的数学运算不同。在数学中，它表示=左边的表达式与右边的相同。但在编程中，它表示=左边显示的变量被设置为右边计算出的值。\n\
    - **conditional**，一种编程结构，允许程序根据程序的当前状态（例如，某个变量的值）执行不同的代码，即程序所处的条件。\n- **the \\\
    \ operator**，称为“转义”字符。在编程语言中，存在一些标准键盘上不可用的特殊字符（例如，用于开始新输出行的不可见回车符）或用于其他目的的字符（例如，双引号字符\
    \ \"，用于表示字符串的开始和结束），但它们是输出的一部分。`\\` 字符的存在表示其后的字符不应被视为其原始值，而是这些特殊字符之一（例如，`\\n`\
    \ 表示不可见的回车符，`\\\"` 表示双引号字符）。在Python中，如果单独使用此字符（作为反斜杠），它是“续行符”。"
