  md: '# A BETTER WAY TO REPEAT CODE


    We can reduce the number of lines of code by more than half by using a **loop**.
    Here is the process. First, write the code for one iteration, like this:


    ```

    1  # Bubble Tea Menu (Version 2)

    2  # Author:

    3  # Date:

    4  # Prints a bubble tea menu

    5

    6  print("Mango milk")

    7  print("~~~~~~~~~~~~~~~~")

    ```


    Test to see if it works—it should, printing one flavour and one divider. Now,
    think about what (if anything) would change between the repetitions of your code.
    For example, here the flavour would change with each repetition, but the milk
    part would stay the same. So we can factor out the flavour element into a variable.
    Let’s call the variable `flavour`.


    ```

    1  # Bubble Tea Menu (Version 2)

    2  # Author:

    3  # Date:

    4  # Prints a bubble tea menu

    5

    6  flavour = "Mango"

    7  print(flavour + " milk")

    8  print("~~~~~~~~~~~~~~~~")

    ```


    Now our code is becoming more flexible. How can we then make the `flavour` variable
    take on the different flavours, such as taro, matcha, etc.? Let’s list out all
    the values that `flavour` could be (line 6):


    ```

    1  # Bubble Tea Menu (Version 2)

    2  # Author:

    3  # Date:

    4  # Prints a bubble tea menu

    5

    6  flavours = ["Mango", "Taro", "Matcha", "Oreo",

    7             "Strawberry", "Coconut"]

    8  flavour = "Mango"

    9  print(flavour + " milk")

    10 print("~~~~~~~~~~~~~~~~")

    ```


    Finally, in order for the variable `flavour` to take on the flavour values from
    the list, we use a `for-loop` programming construct. A `for-loop` has two parts
    that you can change, indicated here in italics: `for variable in sequence`.

    The first part is `variable`, in this case `flavour`, and the second part is `sequence`,
    in this case the list `flavours`, which stores all the flavours you want the variable
    to take on.'
