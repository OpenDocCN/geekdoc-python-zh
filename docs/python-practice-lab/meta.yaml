    ![](img/806aba0b9a38ca3131946c02e34638cb_15_0.png)


    # Introduction to Computer Science


    Congratulations on taking your first step into CS!

    In this first unit, you’ll learn what computer science (CS) is and where it came
    from, and start to learn about how it works. You’ll get set up with the tools
    that we’ll be using in the following chapters to help you become a proficient
    computer scientist by the end of the book.

    CS topics in this chapter:


    - Algorithms

    - Comments

    - Output


    # 1.1 WELCOME TO CS!


    # CS IS PROBLEM SOLVING


    If you like solving problems, you have come to the right place! In CS, we solve
    problems by designing and developing two components:


    - **Algorithms**, which are a way of thinking

    - **Code**, which is a way of communicating


    In this book, we will be designing our algorithms in English, and translating
    them into the Python programming language. This will allow us to communicate with
    computers to solve our problems.


    # WHAT ARE ALGORITHMS?


    An algorithm is simply a list of steps to follow in order to complete a task.
    For example, cookie recipes are algorithms. They have ingredients as input, and
    a list of steps to produce a very tasty output: cookies! Another example is IKEA
    furniture instructions. If you can write clear, step-by-step instructions (e.g.,
    how to build a chair), you’ve got great potential as a computer scientist!


    Algorithms can also be **optimized** for different things. You may want to design
    instructions for how to do the task as fast as possible, or in a simple way, or
    to minimize the space needed. For instance, in our cookie recipe example, some
    recipe titles might be “Chocolate chip cookies in 15 minutes” (fast) or “Easy
    chocolate chip cookies” (simple) or “One-bowl chocolate chip cookies” (minimizing
    space), optimizing for different needs. There are often multiple recipes, or algorithms,
    to achieve a similar result.


    # WHAT ARE PROGRAMMING LANGUAGES?


    The computer is our fast, number crunching tool to solve problems for us. In order
    to communicate with the computer, we need to speak a language it understands.
    Programming languages have been developed to be a common language that both humans
    and the computer can interpret and understand.


    Python, Java, and C++ are names of some programming languages. Just like English,
    Japanese, French, and other natural languages, they are used to communicate meaning,
    and each has different grammar, syntax, and vocabulary.


    We say that some programming languages, such as Python and JavaScript, are **interpreted**
    languages, while C, C++, and Java are **compiled** languages. What does compiled
    mean? When you run a program, your instructions to the computer are translated
    from the human-readable language such as Python or C++ into 0s and 1s, which are
    digital signals that the computer can understand.


    Translation can happen in two ways: line-by-line or in a batch. To understand
    this better, imagine being at the United Nations. There are professional translators
    who sit next to each diplomat and translate everything being said in real time.
    These translators are called **interpreters**. At the same meeting, there may
    be thick piles of documents on each desk that have been **compiled** into big
    translated reports before the meeting.


    In the same way, Python is an **interpreted** language because the Python interpreter
    on your computer translates each line of code into machine code in real time,
    on the fly, as the program runs on your computer. With C++, the entire program
    is completely **compiled** into machine code before anything runs.


    > Now that you know the difference between interpreted and compiled programming
    languages, can you list two examples of programming languages for each type?


    # WHAT IS PROGRAMMING?


    Once we have a general algorithm design in mind, and have selected a programming
    language, we can begin to program! Programming itself is the process where you
    break a large, complex task down into smaller subtasks and constructs that are
    recognizable to a computer.


    Common programming constructs include:


    - Input

    - Output

    - Conditions

    - Repetition

    - Math or logic


    We will explore all of these in the coming chapters!


    > **DID YOU KNOW?** The first programmer was an English mathematician named Lady
    Ada Lovelace. In 1842, she wrote the first computer program for Charles Babbage’s
    Analytical Engine (1837). Her first program calculated Bernoulli numbers, but
    she also envisioned a future where the numbers she worked with could represent
    more than numbers. She believed that any data represented by numbers could be
    processed by a machine like the Analytical Engine, to compose music, create images,
    or do science. Today, with our modern computers, we know that she was right!


    # 1.1.1 Learning Outcomes


    At the end of this unit, you will be able to …


    - write Python comments

    - explain what pseudocode is

    - describe the main characteristics of an algorithm

    - give an example of problem solving by subdividing tasks into subtasks

    - write a program header block (i.e., initial comments with information about
    the author, date, and purpose of the code)

    - output Hello World using print()


    # 1.1.2 Alien Explanations


    Do you like science fiction? In this section, we’ll deepen our understanding of
    algorithms by inventing an example that may seem strange, even alien, at first.
    All will be clear, soon!

    Imagine that one day the Earth is visited by aliens from another planet. You have
    been chosen to communicate with the alien, which knows nothing about the human
    race. You meet the alien, which comically looks exactly like a pea-green octopus
    with a space helmet. Luckily, the alien happens to speak English. The first thing
    it says is, “I would like to learn about the human species. Please, tell me something
    about your daily life as a human.”

    You reply, “Well, we do this thing every day. We brush our teeth!”

    The alien replies, “Please, human, explain ‘brush our teeth.’”


    **EXERCISE**

    Explain to the alien the procedure to “brush one’s teeth.” You can either explain
    to another person nearby who takes the role of the alien (be as curious as possible!),
    or write out the explanation.


    **DEBRIEF**

    First off, it’s not easy to explain something that comes so simply to us! You
    may have included the tools or input involved: a hand, a toothbrush … what else?
    Toothpaste? Mouth? Many components are involved. For an alien that does not have
    teeth or even hands, this requires patience and explanation in detail.

    Secondly, what did your explanation look like? Was it a list of numbered steps?
    How detailed was it? Did you include aspects such as how long the brushing should
    last, or how much toothpaste you need? The clearer your steps were, the closer
    to algorithmic thinking they will be.


    Spoiler alert: Your computer is just like this alien! It has no idea about the
    human world. We therefore need to be patient with it and explain our algorithms
    very clearly. Luckily, to communicate with our computer, we have the common language
    of Python, which we will learn in this book. Once we learn how to communicate
    clearly in Python, we can ask our computer to do what we want!


    # 1.1.3 Writing and Running Your Programs


    Throughout this book you’ll see a lot of the following:


    ```

    1 print("Hello World!")

    ```


    These are code samples that you can copy and paste to a Python interpreter to
    try them out yourself or experiment with by making changes to it (the number on
    the left is the line number; you do not have to write it in your code). There
    are two main kinds of coding environments with Python interpreters you can use.


    # ONLINE CODING ENVIRONMENTS


    Online coding environments are websites that provide a workspace for you to write
    and run your programs in an Internet browser window. Depending on the service
    provider, some offer saving your code under a user account and/or directly to
    your computer. Some also offer subscription plans with more features. Here are
    a few that we find quite useful and that are available on some of the most common
    operating systems (i.e., Windows, macOS, Linux).


    **Online Python** (https://www.online-python.com) is an in-browser Integrated
    Development Environment (IDE) for Python. You can download your work as a .py
    or .zip file and can upload text files, too. You do not have to create an account
    to use its services, but it has some limitations, such as not being able to upload
    images. One great feature is that once you create a program, you can share a link
    to it with your friends and family. Online Python is a simple but good IDE to
    use.


    **Trinket** (https://trinket.io) is another in-browser IDE that lets you write,
    run, and share your programs on its online platform. It also includes some lessons
    for users to learn about coding and provides some other ways to program (via Blocks).
    It has fewer features than the offline coding environments described below but
    still works well. You have to sign up for a free account with some limitations
    to use its services.


    **Programiz** (https://www.programiz.com/) is a learning platform offering free
    and paid courses for various programming languages, including Python. Similarly
    to Trinket, it includes a free online compiler and lets you write, run, and share
    your code without signing up. Besides programming languages, it also offers courses
    on data structures and algorithms, which are important next steps if you are interested
    in CS.


    # OFFLINE CODING ENVIRONMENTS


    One obvious shortcoming of the online coding environments is that you have to
    stay connected to the Internet to use them. If you want to write and run your
    programs on your'
  mdcn: '# Python 实践实验室


    ![](img/806aba0b9a38ca3131946c02e34638cb_15_0.png)


    # 计算机科学导论


    恭喜你迈出了计算机科学的第一步！

    在本单元中，你将学习计算机科学（CS）是什么，它从何而来，并开始了解其工作原理。我们将为你设置后续章节中将使用的工具，帮助你在本书结束时成为一名熟练的计算机科学家。

    本章涵盖的计算机科学主题：


    - 算法

    - 注释

    - 输出


    # 1.1 欢迎来到计算机科学！


    # 计算机科学就是解决问题


    如果你喜欢解决问题，那么你来对地方了！在计算机科学中，我们通过设计和开发两个组成部分来解决问题：


    - **算法**，这是一种思维方式

    - **代码**，这是一种交流方式


    在本书中，我们将用英语设计算法，然后将其翻译成 Python 编程语言。这将使我们能够与计算机交流以解决问题。


    # 什么是算法？


    算法就是完成一项任务所需遵循的一系列步骤。例如，饼干食谱就是算法。它们以原料作为输入，并有一系列步骤来产生非常美味的输出：饼干！另一个例子是宜家家具的说明书。如果你能写出清晰、分步的说明（例如，如何组装一把椅子），那么你作为计算机科学家就具有巨大的潜力！


    算法也可以针对不同的目标进行**优化**。你可能希望设计出能以最快速度完成任务的说明，或者以简单的方式完成，或者最小化所需的空间。例如，在我们的饼干食谱示例中，一些食谱标题可能是“15分钟巧克力曲奇”（快速）、“简易巧克力曲奇”（简单）或“一碗巧克力曲奇”（最小化空间），针对不同的需求进行优化。通常有多种食谱或算法可以达到类似的结果。


    # 什么是编程语言？


    计算机是我们快速进行数值运算以解决问题的工具。为了与计算机交流，我们需要使用它能理解的语言。编程语言被开发为一种人类和计算机都能解释和理解的通用语言。


    Python、Java 和 C++ 是一些编程语言的名称。就像英语、日语、法语和其他自然语言一样，它们用于交流意义，并且各自有不同的语法、句法和词汇。


    我们说一些编程语言，如 Python 和 JavaScript，是**解释型**语言，而 C、C++ 和 Java 是**编译型**语言。编译是什么意思？当你运行一个程序时，你对计算机的指令会从人类可读的语言（如
    Python 或 C++）翻译成 0 和 1，这是计算机可以理解的数字信号。


    翻译可以通过两种方式进行：逐行翻译或批量翻译。为了更好地理解这一点，想象一下在联合国。有专业的翻译人员坐在每位外交官旁边，实时翻译所说的一切。这些翻译人员被称为**口译员**。在同一次会议上，每张桌子上可能都有厚厚的文件堆，这些文件在会议前已经被**编译**成大型翻译报告。


    同样，Python 是一种**解释型**语言，因为计算机上的 Python 解释器会在程序运行时实时地、动态地将每一行代码翻译成机器代码。而对于 C++，整个程序在运行之前会完全**编译**成机器代码。


    > 既然你已经了解了解释型和编译型编程语言的区别，你能为每种类型列出两个编程语言的例子吗？


    # 什么是编程？


    一旦我们心中有了大致的算法设计，并选择了一种编程语言，我们就可以开始编程了！编程本身是一个将大型、复杂的任务分解成计算机可识别的较小子任务和结构的过程。


    常见的编程结构包括：


    - 输入

    - 输出

    - 条件

    - 循环

    - 数学或逻辑


    我们将在接下来的章节中探讨所有这些内容！


    > **你知道吗？** 第一位程序员是一位名叫阿达·洛芙莱斯夫人的英国数学家。1842年，她为查尔斯·巴贝奇的分析机（1837年）编写了第一个计算机程序。她的第一个程序计算了伯努利数，但她也设想了一个未来，她所处理的数字可以代表不仅仅是数字。她相信任何由数字表示的数据都可以由像分析机这样的机器来处理，以创作音乐、创建图像或进行科学研究。今天，有了我们现代的计算机，我们知道她是对的！


    # 1.1.1 学习成果


    在本单元结束时，你将能够……


    - 编写 Python 注释

    - 解释什么是伪代码

    - 描述算法的主要特征

    - 举一个通过将任务细分为子任务来解决问题的例子

    - 编写程序头块（即包含作者、日期和代码用途等信息的初始注释）

    - 使用 print() 输出 Hello World


    # 1.1.2 外星人解释


    你喜欢科幻小说吗？在本节中，我们将通过一个起初可能显得奇怪甚至怪异的例子来加深对算法的理解。一切很快就会变得清晰！

    想象有一天，地球被来自另一个星球的外星人造访。你被选中与这个对外星人一无所知的外星人交流。你遇到了这个外星人，它滑稽地看起来就像一只戴着太空头盔的豌豆绿色章鱼。幸运的是，这个外星人恰好会说英语。它说的第一件事是：“我想了解人类物种。请告诉我一些关于你作为人类的日常生活的事情。”

    你回答说：“嗯，我们每天都会做一件事。我们刷牙！”

    外星人回答说：“请，人类，解释一下‘刷牙’。”


    **练习**

    向外星人解释“刷牙”的过程。你可以向附近扮演外星人的另一个人解释（尽可能好奇！），或者把解释写出来。


    **总结**

    首先，解释一些对我们来说如此简单的事情并不容易！你可能已经包含了涉及的工具或输入：一只手、一把牙刷……还有什么？牙膏？嘴巴？涉及许多组成部分。对于一个没有牙齿甚至没有手的外星人来说，这需要耐心和详细的解释。

    其次，你的解释是什么样子的？它是一个带编号的步骤列表吗？它有多详细？你是否包含了诸如刷牙应该持续多久，或者你需要多少牙膏之类的方面？你的步骤越清晰，就越接近算法思维。


    剧透警告：你的计算机就像这个外星人！它对人类世界一无所知。因此，我们需要对它有耐心，并非常清楚地解释我们的算法。幸运的是，为了与我们的计算机交流，我们有 Python
    这种通用语言，我们将在本书中学习它。一旦我们学会了如何用 Python 清晰地交流，我们就可以让计算机做我们想做的事情！


    # 1.1.3 编写和运行你的程序


    在整本书中，你会看到很多以下内容：


    ```

    1 print("Hello World!")

    ```


    这些是代码示例，你可以复制并粘贴到 Python 解释器中自己尝试，或者通过修改它来进行实验（左边的数字是行号；你不需要在代码中写它）。你可以使用两种主要类型的带有
    Python 解释器的编码环境。


    # 在线编码环境


    在线编码环境是网站，它们为你提供一个工作区，让你在互联网浏览器窗口中编写和运行程序。根据服务提供商的不同，有些提供将代码保存在用户帐户下和/或直接保存到你的计算机上的功能。有些还提供具有更多功能的订阅计划。以下是我们发现非常有用且在一些最常见操作系统（即
    Windows、macOS、Linux）上可用的几个。


    **Online Python** (https://www.online-python.com) 是一个基于浏览器的 Python 集成开发环境（IDE）。你可以将你的作品下载为
    .py 或 .zip 文件，也可以上传文本文件。你不需要创建帐户即可使用其服务，但它有一些限制，例如无法上传图片。一个很棒的功能是，一旦你创建了一个程序，你就可以与你的朋友和家人分享它的链接。Online
    Python 是一个简单但好用的 IDE。


    **Trinket** (https://trinket.io) 是另一个基于浏览器的 IDE，允许你在其在线平台上编写、运行和分享你的程序。它还包括一些课程，供用户学习编程，并提供其他一些编程方式（通过积木块）。它的功能比下面描述的离线编码环境少，但仍然运行良好。你需要注册一个免费帐户（有一些限制）才能使用其服务。


    **Programiz** (https://www.programiz.com/) 是一个学习平台，提供各种编程语言（包括 Python）的免费和付费课程。与
    Trinket 类似，它包含一个免费的在线编译器，让你无需注册即可编写、运行和分享你的代码。除了编程语言，它还提供数据结构和算法课程，如果你对计算机科学感兴趣，这些是重要的下一步。


