    # 2.1.3 How''s It Going Bot


    The next program we will write is an interactive How''s It Going chatbot. This
    time, our program is based on the ELIZA Rogerian psychotherapist chatbot developed
    at the MIT Artificial Intelligence Laboratory in 1964, which asked questions and
    empathized with the user.

    In this program, we''ll ask the user how they''re feeling, and make an appropriate
    response. What our program needs is the ability to make decisions and execute
    different pieces of code depending on the situation, as determined by the user
    input. We call the different options "conditions."


    # BRANCHING USING CONDITIONAL STATEMENTS (IF/ELIF/ELSE)


    Let''s begin with the following algorithmic design, again written first in English
    comments. Sometimes, computer scientists call program sketches like these **pseudocode**,
    as it''s not quite code, but close to it! Notice that our header also now includes
    a short description of the program, which can help remind you of the purpose of
    the program when reading it later.


    ```

    1 # How''s it going bot

