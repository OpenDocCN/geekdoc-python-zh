    # Preface


    Interactive chatbots are taking the world by storm! Are you interested in creating
    interactive programs but don’t know where to start? Do you have no coding background
    and want a fun introduction to computer science (CS)? Or, perhaps you are a teacher
    looking for a structured program to cover the areas in CS, while keeping examples
    interesting and fresh for your students?


    In this book, you will learn basic programming by writing Python programs that
    mimic interactive chatbots. While this introductory book is *not* about how to
    code an advanced artificial intelligence, you will gain skills necessary for basic
    coding while learning about artificial intelligence concepts such as recommendation
    systems, computer vision, and big data.


    The curriculum presented in this workbook has been taught as an introduction to
    CS and programming course at Simon Fraser University in British Columbia, Canada,
    to over a thousand students, and to both majors and nonmajors in Computing Science.
    The course is designed to teach through real-life situations, and to give students
    the opportunity for creative thinking. Reflecting on the course, a student shared:


    > > Although I have been interested in programming since high school, I was always
    too intimidated to try it. I am really glad to have finally taken this course
    because I found that I enjoyed programming and problem solving more than I expected
    to. I had so much fun throughout the entire semester, and will be taking more
    computing science courses this summer—hopefully I can pursue a minor!


    We hope this book will inspire the same enthusiasm in you to pursue a deeper understanding
    and appreciation of CS!


    # WHAT ARE CHATBOTS?


    In this book, we use the term “chatbots” to describe interactive programs that
    use text as input and output. In particular, these programs converse with the
    user and have a text-based interface, similar to that of a messaging app. You
    will be developing these interactive programs, which your friends and you can
    try!'
  - '[PAGE 10]


    # HOW IS THIS BOOK DIFFERENT?


    This workbook is meant to be engaging, hands-on, and example-driven to help you
    become a confident coder. In line with our theme, interactive chatbots, natural
    language and text strings are used early on as the main building blocks for learning
    about program structures, rather than math. This approach demonstrates the use
    of CS in many diverse areas and fields. Additionally, code comprehension exercises,
    traditionally containing terse, single-letter variables, are rewritten in equivalent
    code with inclusive and approachable variable names. In each chapter, the reader
    is challenged to write a full program based on the topics and the provided examples.
    Finally, a selection of projects is presented at the end of the book, to integrate
    the concepts learned through all the chapters.


    By the end of this book, you will become well-versed in traditional introductory
    algorithms and become fluent in programming in Python 3. The learning outcomes
    for this toolkit are roughly equivalent to those of *How to Think Like a Computer
    Scientist* (Ch. 1–12, 15) (https://runestone.academy/ns/books/published/thinkcspy/index.html).


    # IS THIS BOOK RIGHT FOR ME?


    The audience for this workbook includes:


    +   - anyone who wants to learn how to program by coding fun, working programs
    that gradually become more complex;

    - instructors teaching Python to beginners who need motivating examples and exercises
    for their classes; and

    - students wishing to have a reference to examples taught by their instructors
    and wishing to build complete and functional programs.


    # WHAT IS THIS BOOK NOT?


    This book is not a stand-alone CS textbook. It is a hands-on workbook that provides
    basic coverage of all the necessary concepts needed for introductory CS through
    examples and exercises, without overburdening the reader with details behind individual
    topics (e.g., how are variables represented in memory? what are modules?). Additional
    explanations and exercises to practice specific skills are linked to from this
    workbook as additional resources from this workbook.


    # ROADMAP


    Here is a short guide to the contents of this book. Chapters 1 to 4.2 focus on
    learning the basics of programming in Python 3, while Chapters 4.3 to 6 introduce
    classic algorithms and hands-on projects to deepen your knowledge of CS.


    Chapter 1, “Getting Started,” explains the concept of an algorithm and gets you
    up and running with your first, “Hello, World,” program.


    Chapter 2, “Chatbots,” introduces a broad range of concepts by progressively building
    more and more advanced programs that we call “bots.” Chapter 2.1 focuses on the
    string data type and the many things you can do with it: assign it to a variable,
    concatenate it,'
- md: '## Chapter 2.2 introduces the for-loop and integers, while building upon previous
    knowledge, such as that of string methods and nested conditionals.


    Chapter 3, “Recommendation Systems,” continues to build upon Chapter 2, expanding
    more on data types, manipulation of numbers (including floating-point numbers),
    division operators, accumulators, and lists using indexing. It also ventures deeper
    into loops by introducing nested loops and using them to access files. Finally,
    this chapter introduces dictionaries.


    Chapter 4, “Graphics and Computer Vision,” introduces the while-loop, expanding
    your understanding of functions through defining your own functions and modules.
    This chapter explains 2D arrays and color representation using RGB images. A simple
    Python course could end here, but we end the chapter with an introduction to recursion,
    an important concept in the field of CS.


    Chapter 5, “Internet and Big Data,” assumes that you now have the basics of Python
    programming under your belt. It provides a basic introduction to classic CS algorithms
    of sorting and searching, and to modern list processing algorithms such as map,
    filter and reduce.


    Finally, Chapter 6, “Expert Projects,” provides some sample applications you can
    build with the knowledge you’ve gained from this book.


    ## DEEPEN YOUR UNDERSTANDING


    Your learning doesn’t stop here! Deepen your understanding of the topics by reviewing
    and trying activities linked from our companion website https://press.princeton.edu/books/paperback/9780691243603/python-practice-lab.
