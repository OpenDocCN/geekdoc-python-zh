    - access specific elements of a list using indexing/slicing

    - access specific characters in a string using indexing/slicing


    ### ADVANCED CODING STRUCTURES


    - perform comparisons between numbers, taking into account the order of operators
    (operator precedence)

    - perform comparisons between strings

    - understand and use a nested for-loop (e.g., find common elements between two
    lists)

    - apply accumulation pattern for strings and lists (previously was done only for
    numbers)


