    In the code above we use a new programming construct, the while-loop, to enable
    that. Similar to a for-loop, the while-loop repeats the code inside; but instead
    of using a list to control how many times it repeats, it uses a Boolean sentinel/flag
    to determine if it is going to repeat.


    In line 17 we create a Boolean variable called **keep_looping**, which stores
    the initial value True. When the while-loop begins the first time, it checks whether
    the variable''s value is True or False. If the value is True, it executes the
    code inside; if not, it skips the code and never repeats itself. After each repetition,
    the while-loop will check the variable''s value again and decide whether it is
    going to repeat or skip. It is therefore very important to have some code inside
    the while-loop to update the value of the sentinel/flag variable so that the loop
    will eventually end (line 30).


    > This use of a Boolean variable as a sentinel/flag alongside a while-loop is
    a very common technique for input validation. Imagine the Boolean variable is
    the result of a validity check of an input string (e.g., does it have a number
    inside? is it long enough?). You can use the Boolean variable to store the answer
    to the question: is the input string invalid? If so, it will be True and the while-loop
    will repeat; otherwise it will be False and the while-loop will end. Try to write
    this code!


