    ## 3.1.7 Glossary


    - **compound assignment**, the combination of an operation on a variable and an
    assignment operation on that variable. For example, `i += 1` is a combination
    of the operation `i + 1` and the assignment of the result to the variable `i`.
    It is equivalent to the expression `i = i + 1`. Other compound assignments include
    `-=`, `*=`, `/=`, `//=`.

    - **string formatting**, a way to specify how strings are being printed to the
    display. The format is described inside `{` and `}` and begins with `:` instead
    of the `%` in older versions of Python. The method `format()` is then called by
    providing the values being printed. For details refer to https://docs.python.org/3/library/string.html.

    - **casting**, an operation converting a variable''s data type into another data
    type, also known as *type conversion*. This operation allows values to be used
    by operations expecting a different data type. For example, a variable returned
    by `input()` is of the string data type. In order to perform mathematical operations
    on it, it needs to be cast into a numerical data type (e.g., `int` or `float`).
    Sometimes Python performs casting automatically, but other times you will have
    to tell it what to do by calling the type conversion function explicitly.

    - **parallel lists**, a technique where two lists of the same length are used
    to store options and their corresponding values. This allows the use of one index
    to efficiently access corresponding values in a large group of options.


