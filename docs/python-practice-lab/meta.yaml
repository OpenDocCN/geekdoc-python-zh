    # CHAPTER 1 Introduction to Computer Science


    +   - **algorithm**, a step-by-step list of instructions to complete a task or
    solve a problem. There are usually many different ways to complete the same task
    or solve the same problem, and the clearer each step is, the better (there are
    different ways to make an algorithm better, e.g., faster, or requiring less space).

    - **header**, a block of comments providing some information about the program
    preceding the code. It includes the name(s) of the author(s), the creation and
    modification dates, and a high-level description of the program.

    - **comment**, a special section adjacent to the code and written in plain English
    explaining what that code does. It is for human readers to understand the code
    and is indicated by a special symbol (# in Python) so the computer will ignore
    it when executing the code. It can be a single sentence or a short paragraph.

    - **interpretation**, the process used by the computer to execute the source code.
    For an interpreted programming language, the source code is translated directly
    into machine code during execution. Python and JavaScript are examples of this.

    - **compilation**, the other process used by the computer to execute the source
    code, where the source code is first translated into machine/object (aka compiled)
    code and then executed. C/C++ and Java are examples of compiled programming languages.'
- md: '## Chatbots


    Many modern computer applications enable some form of interaction, or even conversation,
    between the computer and the user. Here you’ll learn how to create interactive
    chatbot applications in Python.


    In this unit, you’ll learn about the basics of programming through exercises loosely
    based on interactive chatbots like Amazon’s Alexa or Apple’s Siri. The chatbot
    programs that you’ll be writing include:


    - Greetings Chatbot

    - Horoscope Bot

    - Fortune Cookie Generator

    - Food Bot

    - Mindreader Game

    - New Year’s Bot

    - Star Wars Bot


    ChatGPT and other recent “large language model” chatbots are powered by neural
    networks trained on vast amounts of data, and are not necessarily programmed by
    hand in the manner you will learn to do so here. But, early chatbots were programmed
    in a similar way to that you will explore in this chapter, and Python is the de
    facto programming language in artificial intelligence development. By writing
    these chatbot programs in Python, you’ll learn about outputting to the screen,
    creating lists, working with text, and changing output depending on conditions.


    CS topics in this unit:


    - Variables

    - Concatenation

    - Input

    - Lists

    - The random module

    - Conditionals

    - Boolean statements and expressions

    - Error types

    - Robustness of a program

    - String methods

    - The in keyword

    - Chaining functions

    - for-loops

    - Lists from input


    ## 2.1 CHATBOTS WITH PERSONALITY


    In this unit, you will be learning how to build basic interactive chatbots that
    you can communicate with! Here is an example:


    You can also try the sample code yourself:


    ```python

    # Your age in 2049 bot

    # Author:

    # Date:

    # Description: This bot will ask you

    # what year it is in and how old you

    # currently are, then it''ll tell you

    # your age in 2049


    # Ask user what year it is in

    print("What year are we in?")


    # Get the user''s reply

    currentYear = input()


    # Ask user what age they currently are

    print("How old are you currently?")


    # Get the user''s reply

    userAge = input()


    # Calculate how old the user will be in 2049

    yearsAhead = 2049 - int(currentYear)

    userFutureAge = int(userAge) + yearsAhead


    # Tell the user how old they will be in 2049

    print("You will be", userFutureAge, "years old in 2049!")

    ```


    A few interesting things happen when you run this program:


    - It asks the user two questions and captures the answers

    - It converts the user inputs into values that can be used for calculation

    - It performs some calculations and prints the result


    As you might notice, when the user provides different answers, the program will
    print different results. Now, is it possible for the program to say something
    appropriate depending on the user’s age in 2049? The answer is yes, and you’ll
    find out how in this unit.


    ### 2.1.1 Learning Outcomes


    At the end of this unit, you will be able to …


    #### DESIGN AND PLAN PROGRAMS


    - design/plan an algorithm, e.g., using comments or pseudocode

    - apply some common problem solving strategies, such as breaking down the problem
    into smaller pieces


    #### CONSOLE INPUT AND OUTPUT


    - obtain input in Python from the terminal to a variable

    - receive input from the terminal without saving it to a variable


    #### VARIABLES AND DATATYPES


    - assign a value to a variable using =

    - articulate the constraints and conventions on variable naming

    - give examples of different types of data, although string is the focus for now


    #### STRING AND LIST BASICS


    - identify the string data type, " "

    - output a string variable in a print statement

    - concatenate two strings with +

    - create a list of strings and assign it to a variable, using [ ]


    #### CONDITIONAL STATEMENTS


    - use if and elif statements with ==

    - use the else clause


    #### BOOLEAN EXPRESSIONS, LOGICAL AND RELATIONAL OPERATORS


    - use logical operators and, or and not

    - use comparison operators such as <, > and == in a conditional statement

    - analyze a Boolean expression in terms of what it can be evaluated to (True/False)

    - combine Boolean expressions, e.g., x or y, using strings only (for now)

    - print a Boolean expression


    #### IMPORTING A MODULE


    - use the random.choice() function on a list (including import random)

    - explain what the . after a module name does

    - understand that modules contain functions

    - consistently place import statements at the top of the program, after the header


    ### 2.1.2 Greetings Chatbot


    Let’s begin by creating a Greetings chatbot. What do you think a chatbot should
    say when it starts a conversation? Perhaps it might say hi or some sort of greeting
    phrase. It might also be nice to personalize it by having it say the user’s name.
    This means that the program needs to be able to read text typed by the user (e.g.,
    name) and store it somewhere within the program.


    Open up your Python file, and type out the following. First, begin by writing
    the header, with a title, your name, and the date. Then, design your program by
    writing out the algorithm steps using comments.


    ```python

    # Greetings Chatbot

    # Author:

    # Date:


    # Say hi, what’s your name?

    # Get the user’s name

    # Respond nice to meet you, <name>

    ```


    Now that we’ve designed the general flow of our chatbot, let’s see how we can
    translate our algorithm, line by line, into Python. The first comment should be
    straightforward to translate into Python. Think about the Motivational Quote Generator
    you wrote in the last chapter!


    ```python

    # Greetings Chatbot

    # Author:

    # Date:


    # Say hi, what’s your name?

    print("Hi, what’s your name?")


    # Get the user’s name

    # Respond nice to meet you, <name>

    ```


    Next, we’ll learn the code for obtaining input text from the user, and storing
    that text into a variable. As you can see, you can use the input() function that
    will allow the user to type some text into the program. We create a variable called
    user and use = to store the inputted name into it.


    ```python

    # Greetings Chatbot

    # Author:

    # Date:


    # Say hi, what’s your name?

    print("Hi, what’s your name?")


    # Get the user’s name

    user = input()


    # Respond nice to meet you, <name>

    ```


    > Both print() and input() are Python elements called **functions**. For now,
    you can consider them as bits of code that you can use to add functionality into
    your program. We will dive more into what functions are in Chapter 4.


    Finally, we can take the user’s name and repeat it back to them. To do this, we
    take the string Nice to meet you and use + to tack on the contents of the variable
    user. This gluing together is called **concatenation**. Notice that we also have
    to remember to write a comma and space beforehand.


    ```python

    # Greetings Chatbot

    # Author:

    # Date:


    # Say hi, what’s your name?

    print("Hi, what’s your name?")


    # Get the user’s name

    user = input()


    # Respond nice to meet you, <name>

    print("Nice to meet you, " + user)

    ```


    > We say that “Hi, what’s your name?” is a **string** data type. “Nice to meet
    you,” is also a string (the quotation marks are included in the code to indicate
    that the characters between them form a string; the marks themselves are not part
    of the string). Finally, the input() function also returns a **string** with the
    characters that the user typed, and therefore the variable user contains a string
    as well!


    You have created your first interactive chatbot! Give it a try by running the
    entire program and typing with your chatbot. Try also inputting different names.
    You will notice that the program responds with the name of the user and changes
    when the user inputs a different name. What happens here is that at line 9 the
    program does two things: (1) it waits for the user to input their name, and then
    (2) it stores the user input (their name) in a variable with name user. Later,
    in line 12, it is able to recall the user input using the same variable. This
    is handy because if the program wants to recall the user input again later in
    the program, it can simply refer to the variable again by its name.


    Now, let’s continue the conversation. We’ll start by designing our conversation
    flow, again with comments first. Let’s ask the user about their favourite book
    and make a comment.'
