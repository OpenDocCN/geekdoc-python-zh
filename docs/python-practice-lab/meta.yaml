    # 2.2.9 Glossary


    +   - **robust**, a quality of a program being not prone to failing when an error
    occurs (e.g., invalid user input). This is typically achieved by careful planning
    and writing code that handles errors when they occur.

    - **chaining**, the ability to apply multiple operations (methods) one after the
    other by feeding the result of one operation to the next as input. This makes
    the code compact and concise.

    - **method**, similar to functions; methods are bits of code that add functionalities
    to the program. However, they are applied to something that is in the program
    (typically a variable) and thus have to be associated to something else via the
    dot operator (e.g., `input().lower()` turns all the characters to lowercase in
    the string variable produced by `input()`).

    - **loop**, a programming construct that repeats the same piece of code multiple
    times as determined by a condition or a lookup sequence. Together with variables
    that get changed every time the code repeats, one can write very compact code
    that does sophisticated tasks (e.g., access a collection of data once and only
    once).'
