    # 5.3 MAP, FILTER, REDUCE


    Searching and sorting are classic conceptual problems in computer science to process
    lists of items. In addition to **search** and **sort**, especially since the advent
    of the Internet, new common patterns of list processing have been identified.


    **Map**, **filter**, and **reduce** are common patterns that you may encounter
    in your daily life while using applications on the Internet.


    **Map**: Apply a particular function to every element in the list. For example,
    in a list of products you are buying from an online store, you may wish to apply
    a 50% discount on each item.


    **Filter**: Filter out certain parts of a list based on a condition. For example,
    in a list of T-shirts on a store website, you may wish to filter on only those
    less than $10.


    **Reduce**: Reduce the list contents into one value. For example, in a list of
    prices of items in your shopping cart, you may wish to find the total price.


