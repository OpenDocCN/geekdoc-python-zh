    instead of what we would expect it to say (Good!). This is an example of a semantic
    error. Our program runs, but doesn''t produce an expected or suitable result.


    The reason why this error happens is that our bot is looking for complete matches
    in each of the if statements: it looks for Good, good, great, and Bad. Since the
    input begins with I''m and ends with . the chatbot treats it as different from
    good or the other related strings, and thus determines that the default action
    is the correct one.


    To make our chatbot robust to additional characters, we need to let it know that
    it is OK to have a match within the input. In our last section, we discovered
    the in keyword, which allowed us to check whether a string was contained within
    a list of strings. In Python, we can use the in keyword also to see if a string
    is contained within another string.


