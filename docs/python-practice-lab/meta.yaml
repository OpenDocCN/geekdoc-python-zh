    # Preface


    Interactive chatbots are taking the world by storm! Are you interested in creating
    interactive programs but don’t know where to start? Do you have no coding background
    and want a fun introduction to computer science (CS)? Or, perhaps you are a teacher
    looking for a structured program to cover the areas in CS, while keeping examples
    interesting and fresh for your students?


    In this book, you will learn basic programming by writing Python programs that
    mimic interactive chatbots. While this introductory book is *not* about how to
    code an advanced artificial intelligence, you will gain skills necessary for basic
    coding while learning about artificial intelligence concepts such as recommendation
    systems, computer vision, and big data.


    The curriculum presented in this workbook has been taught as an introduction to
    CS and programming course at Simon Fraser University in British Columbia, Canada,
    to over a thousand students, and to both majors and nonmajors in Computing Science.
    The course is designed to teach through real-life situations, and to give students
    the opportunity for creative thinking. Reflecting on the course, a student shared:


    > > Although I have been interested in programming since high school, I was always
    too intimidated to try it. I am really glad to have finally taken this course
    because I found that I enjoyed programming and problem solving more than I expected
    to. I had so much fun throughout the entire semester, and will be taking more
    computing science courses this summer—hopefully I can pursue a minor!


    We hope this book will inspire the same enthusiasm in you to pursue a deeper understanding
    and appreciation of CS!


    # WHAT ARE CHATBOTS?


    In this book, we use the term “chatbots” to describe interactive programs that
    use text as input and output. In particular, these programs converse with the
    user and have a text-based interface, similar to that of a messaging app. You
    will be developing these interactive programs, which your friends and you can
    try!'
