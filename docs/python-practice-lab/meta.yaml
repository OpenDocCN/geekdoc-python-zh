  - '[PAGE 154]


    Debugging hints: (1) You can set the fish’s yellow pixels to a different color
    to understand what your algorithm has detected. (2) You can try to create a function
    to draw a green box in a specified location, and with a specified width and height.
    This will help you understand if your drawing function works, independently of
    the fish detection. Note: This feature only needs to work for the provided image’s
    fish and background. However, you may not hard-code the values of the box (e.g.,
    location, width, height); they must be calculated by inspecting the image (your
    program should work if the fish is in a different location in the image!)


    # EXTENSIONS


    If you’ve completed the above, try some other ways to extend your project! For
    example, provide an option for the user to enter the name of the photo to open.
    Or, investigate other filters, such as grayscale or sepia, by searching for formulas
    on the Internet. Finally, you can try to make your program “additive”; that is,
    it should apply filters one on top of the other, instead of directly on the original
    image.


    # FILES AND RESOURCES


    A starter kit of assets, including photos to modify and use in your program, have
    been provided on this book’s companion website.

    You will also need the `csimage.py` file from Section 4.2.3: Image Magic to read
    and load your images.'
