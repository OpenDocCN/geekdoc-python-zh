    ## 3.2.4 Similarity Score


    One way that recommendation systems work is to find people who are similar to
    each other, i.e., have similar tastes and preferences.


    For example, if Alice likes bananas, cherries, and apples, and Bob likes bananas,
    cherries, and durians, we might say that Alice and Bob are similar: they have
    two common favourite fruits. We could also guess that, perhaps, Alice might like
    durians, and Bob might like apples.


    How might you quantify the extent to which two persons are similar? One way to
    find out is to ask them about their preferences and count the number of common
    answers. For instance, say Charlie likes oranges, pineapples, and bananas. Then
    Alice is more similar to Bob than to Charlie, as Alice and Bob have two common
    fruits they like (bananas and cherries); whereas there is only one common fruit
    between Alice and Charlie (bananas).


    Let''s write a small program that counts the number of common favourite movies
    between two people:


    ```

    1  # Comparing two person''s favourite movies

    2  # Author:

    3  # Date:

    4  # Description: Finds out how similar two persons

    5  # are by comparing their favourite movies lists

    6

    7  # Get the favourite movies for each person

    8  angelica_favourite_movies = ["Big Hero 6",

    9                              "Inside Out",

    10                             "Wall-E"]

    11 victor_favourite_movies = ["Big Hero 6",

    12                            "Star Wars",

    13                            "Wall-E"]

    14

    15 # Initialize a common interests counter

    16 common_interests_counter = 0

    17

    18  # Go through all the favourite movies

    19  # of the first person

    20  for movie in angelica_favourite_movies:

    21

    22      # Is that movie also in the 2nd person''s list?

    23      if movie in victor_favourite_movies:

    24

    25          # Add to the common interests counter

    26          common_interests_counter += 1

    27

    28  # Print the result

    29  print(common_interests_counter)

    ```


    As you can see, the more the number of common answers two persons have, the higher
    the similarity score will be.


    This small program, together with the above tallying examples (and the Favourite
    Cafe program), also demonstrates a very useful computation technique called **accumulator
    pattern**: we create a few counter variables and set them to an initial value.
    When we go through the data and see something worth noting, we update the corresponding
    counter variable by adding 1 to it. After all the data is examined, we can look
    at a summary of how many times something worth noting has occurred. In other words,
    we *accumulate* information as we examine the data.


    A variation of this accumulator pattern is one in which, instead of incrementing
    the counter variable, we update a variable to the value of some information we
    find worth recording. You will see an example in the next section.


