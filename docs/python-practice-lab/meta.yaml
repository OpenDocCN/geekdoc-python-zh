    ## Guiding Principles


    This book is a little different from those that employ traditional methods for
    learning computer science (CS). It uses the following philosophy to teach CS and
    programming.


    - **Make parallels with foreign language learning.** We acknowledge that CS can
    feel difficult at first because learning any new language, like Chinese or French,
    takes time and practice. But once you become fluent, you can translate from English
    in your head, and communicate with a new friend—the computer!

    - **Write useful code from day 1.** Our approach takes concepts and explores them
    in useful, end-to-end programs in each lesson. You don’t have to know everything
    to write a program—we’ll start from simple ones that you can write from day 1
    and build on that to create more sophisticated ones.

    - **Introduce one or two concepts at a time, in context.** Sample programs are
    carefully crafted so that you are not overloaded with multiple concepts at a time.
    And just as when learning a natural language, new concepts are introduced embedded
    in real programs and situations, not in isolation.

    - **Design algorithms in English.** Thinking of a solution and putting it into
    code are two different processes, especially at first. We suggest that you design
    the algorithm flow in English first, then translate it into Python.

    - **Handle strings first.** We reduce cognitive overload by exploring strings
    (sequences of characters that form words and sentences), and all their possibilities
    (conditionals, loops, etc.), first. This allows you to write useful and practical
    programs early, adding the complexity of multiple data types later.

    - **Construct with creativity.** Exercises are open-ended rather than looking
    for a right answer. We reinforce from the beginning the idea that programming
    is a creative endeavor.

    - **Share code with others.** We make it a delight to build programs and share
    them with friends and family. We use an online coding space like online-python.com
    or trinket.io so that you can take pride in your work and have others try it out!

    - **Focus on fluency.** Our ultimate goal is to help you become a fluent coder.
    We deliver practice questions that ask you to write full programs from scratch.

    - **Write beautiful, understandable code.** Obscure, tricky code is often used
    for tests of understanding, but we emphasize that real code written by professionals
    is highly readable, and uses descriptive variable names. No longer are variables
    limited to i, j, and k!

    - **Showcase fields in CS.** You will learn coding through exploration units in
    contemporary fields in CS, such as computer vision, natural language processing,
    and recommendation systems.


    ## HOW TO USE THIS BOOK


    This workbook is designed to be used as an example-driven book to guide your learning
    of concepts in CS and Python programming. Each chapter unit begins with a scenario
    and a sample interactive program, followed by a list of relevant topics necessary
    to implement the program. As the chapter progresses, details and an explanation
    of each topic are provided. At the end of each chapter, additional practice exercises
    are included to reinforce these topics.


    We recommend using this workbook in a way that depends on who you are.


    ## IF YOU ARE A SELF-DIRECTED LEARNER OR STUDENT ...


    If you have never coded before and want to use this book as a guide for your learning,
    you have come to the right place! Read through each chapter and program listing,
    and try to run the example programs in your Python interpreter. Retyping the code
    from this book will help you learn and practice, so don’t skip this step! You’ll
    also be able to run the interactive programs and modify them, which we’ll sometimes
    ask you to do. Next, after each subsection, check the list of external resources
    in Preface—Deepen Your Understanding, which links to online resources and practice
    questions to solidify your learning. Finally, test your mastery of the topics
    by completing the practice coding exercises, which each results in creating a
    small chatbot. Focus on writing the requested programs from scratch, then share
    them with your family and friends to test and play with!


    ## IF YOU ARE AN INSTRUCTOR ...


    Use the scenarios as motivating examples to intrigue your students and drive the
    topics. Download the slides and code from our companion website (and feel free
    to tailor them to your class), and use in-class time to challenge your students
    with the practice exercises. Point your students to the additional readings for
    further explanations and practice exercises related to each chapter.'
