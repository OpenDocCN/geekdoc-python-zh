    \ by declaring an instance of the Moped class and trying it out.\n\n## Abstraction\n\
    \nAbstraction is generally a net positive for a large number of applications that\
    \ are being written today, and there's a reason Python and other object-oriented\
    \ programming languages are incredibly popular. Abstraction is the process of\
