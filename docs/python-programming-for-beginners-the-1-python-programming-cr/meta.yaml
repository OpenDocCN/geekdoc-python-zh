    ## Tuples


    In Python, we use lists to store various values that can be accessed, changed,
    modified, or removed at will. That certainly might not be the best thing to know
    if you intend to use data that is essential in nature. To overcome that, there
    is a kind of list that will store the data for you. After it is stored, however,
    no additional modification will be carried out, accidentally or intentionally.
    These are called tuples.

    Tuples are a form of list which are very important to know when it comes to Python.
    Unlike the square bracket representation for lists, these are represented by parentheses
    ():


    ```

    numbers = (19, 21, 28, 10, 11)

    ```


    Tuples are known as immutable items. This is because of the fact that you cannot
    mutate or modify them. Let us deliberately try to modify the value to see what
    happens.

    As soon as you type in the dot operator to access append, remove, and other similar
    methods, you should see this instead:


    ![](img/dba60ef710f8d13a0fe521223aa23724_89_0.png)


    Tuples simply do not have these options anymore. That is because you are trying
    to modify a value that is secure and locked by Python. You can try another method
    to see if you can forcefully change the value by doing this:


    ```

    numbers = (19, 21, 28, 10, 11)

    print(numbers)

    numbers[0] = 10

    ```


    > TypeError: ''tuple'' object does not support item assignment


    See how the error came up? The program cannot carry out this change of value,
    nor can it append the value in any way.

    While you will be working with lists most of the time, tuples come in handy to
    ensure you store values that you know you don''t wish to change accidentally in
    the future. Think of a shape that you wish to create and maintain throughout the
    game or website as uniform. You can always call on the values of a tuple and use
    the values when and where needed.

    The only way these values might be changed is if you purposely or unintentionally
    overwrite them. For example, say you had written the values of a tuple within
    the code and since moved on hundreds of lines ahead. At this point, you might
    have forgotten about the earlier values or the fact that you wrote these values
    previously. You start writing new values by using exactly the same name and start
    storing new values within them. This is where Python will allow you to overwrite
    the previously stored values without presenting any errors when you run the program.

    The reason this can happen is because Python understands that you may wish for
    a value to change later on and then stay the same for a while until you need to
    change them yet again. When you execute the program, the initially stored values
    will continue to remain in use right up until the point where you want them to
    be changed. In order to do that, you can simply do the following:


    ```

    numbers = (1, 2, 3, 4, 5)

    print(numbers)

    (1, 2, 3, 4, 5)

    ```


    ```

    numbers = (6, 7, 8, 9, 10)

    print(numbers)

    (6, 7, 8, 9, 10)

    ```


    The number values have changed without the program screaming back at us with an
    error. As long as you know and you do this change on purpose, there is absolutely
    nothing to worry about. However, should you start typing the same tuple and are
    about to rewrite it, you will be notified by PyCharm about the existence of the
    same tuple stored before. Can you guess how? Go ahead and try writing the above
    example in PyCharm and see how you are notified.

    PyCharm will highlight the name of the tuple for you, and that is an indication
    that you have already used the same name before. If this was the first occurrence,
    PyCharm will not highlight the name or the values for you at all.


