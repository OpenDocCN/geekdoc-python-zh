    ## Python Dictionaries


    Dictionaries are data structures that enable the memorization of the data in key-value
    couples.


    ```

    AlumniAge = {''Andrea'': 23, ''John'': 28}

    ```


    There are two keys—"Andrea" and "John." The value associated with key "Andrea"
    is "23," which is his age. The value associated with key "John" is "28," which
    is his age.


    These are the simple things you should always remember while using a Python dictionary.


    Keys in dictionaries are unique. Keys are immutable. You can always eliminate
    and add a new key, but you cannot update the key.


    There are times you will come across certain information that is unique and holds
    a key value. Let us assume that you have to design software that can store information
    about customers or clients. This information may include names, numbers, emails,
    physical addresses, and so on. This is where dictionaries will come into play.


    If you had thought that a dictionary in Python would be like your everyday dictionary
    for languages we speak, you might not have been completely wrong here. There is
    a similarity that we can see in these dictionaries. Every single entry that is
    made is unique. In Python, if an entry tries to replicate itself or if you try
    to store the same value again, you will be presented with an error.


    So, how exactly do we use dictionaries? For that, let us switch back to our new
    best friend, PyCharm, and start typing a little.


