    For instance, if you are using a 64-bit Windows computer, you will likely be using
    the "Windows x86-64 executable installer." Just click on the link to download
    it. If you download and run the wrong installer, no worries. You will get an error
    message and the interpreter will not install. Simply download the correct installer
    and you are good to go. Once you have successfully installed the interpreter,
    you are ready to start coding in Python.


    ## Python IDLE


    We advise using at least the default Python IDLE. However, there are many other
    options compared in the table below. IDLE is the integrated development environment
    (IDE) for Python and it is installed automatically with Python. As well as a neat
    graphical user interface, IDLE is packed with features that make using Python
    for developing easy, including a very powerful feature: syntax highlighting.

    With syntax highlighting, reserved keywords, literal text, comments, and so on
    are all highlighted in different colors, making it much easier to see errors in
    your code. You can both edit and execute your programs in IDLE.


    | Features | IDLE | Thonny | Eric Python | Atom | Wing | Sublime | Rodeo | PyDev
    | Spyder | PyCharm |

    | :--- | :---: | :---: | :---: | :---: | :---: | :---: | :---: | :---: | :---:
    | :---: |

    | Code Completion | X | ✓ | ✓ | ✓ | ✓ | ✓ | ✓ | ✓ | ✓ | ✓ |

    | Debugging | ✓ | ✓ | ✓ | Package Available | ✓ | Package Available | X | Remote
    Debugger | ✓ | ✓ |

    | Built-in Unit Testing | X | X | ✓ | Package Available | ✓ | Package Available
    | X | ✓ | Plugin | ✓ |

    | Open Source | ✓ | ✓ | ✓ | ✓ | X | X | ✓ | ✓ | ✓ | Community Edition |

    | Light Weight | ✓ | ✓ | X | ✓ | ✓ | ✓ | X | ✓ | X | X |

    | Refactoring | X | X | X | Package Available | ✓ | Package Available | X | ✓
    | ✓ | ✓ |


    When you install Python, you get IDLE, an integrated IDE. To start it in Windows,
    find the ArcGIS folder on your computer. Inside the Python folder, you will see
    IDLE as a choice—to start IDLE, select it. IDLE has an interactive interpreter
    built in and can easily run full scripts. The GUI module built into Python is
    used to write IDLE so it is the same language as the one it will execute.

    IDLE has another advantage over python.exe in that script outputs, including print
    statements, are sent straight to the interactive window in IDLE and don''t disappear
    once the script has been executed. IDLE also uses little memory. Disadvantages
    to IDLE can be seen in code assist, such as autocomplete, and the organization
    in terms of logical projects. Every variable in a script cannot be located like
    in other IDEs and there is a limit to the number of scripts listed in the Recent
    Files menu—this is a bit of an obstruction when it comes to finding scripts that
    haven''t been run for a while. IDLE is an ideal IDE to use, however, if there
    aren''t any other options and you need to quickly test a snippet of code.


    ## Using the Python Shell, IDLE and Writing our FIRST program


    We''ll be writing our code using the IDLE program that comes bundled with our
    Python interpreter. To do that, let''s first launch the IDLE program. You launch
    the IDLE program like how you launch any other program. For instance, on Windows
    10, you can search for it by typing "IDLE" in the search box. Once it is found,
    click on IDLE (Python GUI) to launch it. You''ll be presented with the Python
    Shell shown below.


    ![](img/dba60ef710f8d13a0fe521223aa23724_26_0.png)


    The Python Shell allows us to use Python in interactive mode. This means we can
    enter one command at a time. The Shell waits for a command from the user, executes
    it, and returns the result of the execution. After this, the Shell waits for the
    next command.

    Try typing the following into the Shell. The lines starting with >>> are the commands
    you should type while the lines after the commands show the results. In this book:

    Commands = codes inside bordered box

    Results = After the symbol " ⌐ "


    ```

    2+3

    5

    ```


    ```

    3>2

    True

    ```


    ```

    print("Hello World")

    Hello World

    ```


    When you type 2+3, you are issuing a command to the Shell, asking it to evaluate
    the value of 2+3. Hence, the Shell returns the answer 5. When you type 3>2, you
    are asking the Shell if 3 is greater than 2. The Shell replies True. Next, print
    is a command asking the Shell to display the line Hello World.


    ## Python Interactive Mode


    Python Shell is a very convenient tool for testing Python commands, especially
    when we are first getting started with the language. However, if you exit from
    the Python Shell and enter it again, all the commands you type will be gone. Also,
    you cannot use the Python Shell to create an actual program. To code an actual
    program, you need to write your code in a text file and save it with a .py extension.
    This file is known as a Python script.


    ## Python Script Mode


    To create a Python script, click on File > New File in the top menu of our Python
    Shell. This will bring up the text editor that we are going to use to write our
    very first program, the "Hello World" program. Writing the "Hello World" program
    is kind of like the rite of passage for all new programmers. We''ll be using this
    program to familiarize ourselves with the IDLE software.


    Type the following code into the text editor (not the Shell).


    ```

    #Prints the Words "Hello World"

    print ("Hello World")

    Hello World

    ```


    You should notice that the first line is in red while, on the second line, the
    word "print" is in purple and "Hello World" is in green. This is the software''s
    way of making our code easier to read. The words print and "Hello World" serve
    different purposes in our program, hence they are displayed using different colors.
    We''ll go into more details in later chapters. The line "#Prints the Words "Hello
    World""" (in red) is actually not part of the program. It is a comment written
    to make our code more readable for other programmers. This line is ignored by
    the Python interpreter. To add comments to our program, we type a # sign in front
    of each line of comment, like this:


