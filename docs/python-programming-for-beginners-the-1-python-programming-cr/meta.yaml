  md: "# Class Polymorphism and Abstraction\n\nIn Computer Science, polymorphism and\
    \ abstraction are advanced programming features that extend the application and\
    \ usefulness of inheritance.\n\nPolymorphism means that should class Y inherit\
    \ from class X, it does not necessarily have to inherit everything from that class.\
    \ It can implement some of the inherited methods and attributes differently. Python,\
    \ being implicitly polymorphic, can overload operators to grant them the desired\
    \ behavior based on individual contexts. The idea of polymorphism is that the\
    \ same process can be performed in different ways depending upon the needs of\
    \ the situation. This can be done in two different ways in Python: *method overloading*\
    \ and *method overriding*.\n\n*Method overloading* is defining the same function\
    \ twice with different arguments. For example, we could give two different initializer\
    \ functions to our Vehicle class. Right now, it just assumes a vehicle has 4 doors.\
    \ If we wanted to specifically say how many doors a car had, we could make a new\
    \ initializer function below our current one with an added *doors* argument, like\
    \ so (the newer one is on the bottom):\n\n```\ndef __init__(self, makeAndModel,\
    \ prodYear, airConditioning):\n    self.makeAndModel = makeAndModel\n    self.prodYear\
    \ = prodYear\n    self.airConditioning = airConditioning\n    self.doors = 4\n\
    def __init__(self, makeAndModel, prodYear, airConditioning, doors):\n    self.makeAndModel\
    \ = makeAndModel\n    self.prodYear = prodYear\n    self.airConditioning = airConditioning\n\
    \    self.doors = doors\n```"
  merge: -1
