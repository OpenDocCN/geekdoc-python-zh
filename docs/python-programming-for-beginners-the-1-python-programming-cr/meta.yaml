  md: "Creating an object:\n\n```\nclass NewClass:\n    #This is our first class.\
    \ What it does\n    #is display a string text and a value of\n    #variable name\n\
    \    name = str(input(\"Enter your name: \"))\n    def greeting (name):\n    \
    \    print (\"Hello\", name)\n\nMyObject = NewClass() #Creates a new NewClass\
    \ object\nprint (NewClass.greeting)\nprint (MyObject.greeting)\nMyObject.greeting()\
    \ # Calling function greeting()\n```\n\nThe name parameter is within the function\
    \ definition of the class, but we called the method using the statement MyObject.greeting()\
    \ without specifying any arguments and it still worked. This is because when an\
    \ object calls a method defined within it, the object itself passes as the first\
    \ argument. Therefore, in this case, MyObject.greeting() translates to NewClass.greeting(MyObject).\n\
    Generally speaking, when you call a method with a list of x arguments, it is the\
    \ same as calling the corresponding function using an argument list created when\
    \ the method's object is inserted before the first argument.\nAs a result, the\
    \ first function argument in a class needs to be the object itself. In Python,\
    \ this is typically called self but it can be assigned any other name.\nIt is\
    \ important to understand class objects, instance objects, function objects, and\
    \ method objects and what sets them all apart."
