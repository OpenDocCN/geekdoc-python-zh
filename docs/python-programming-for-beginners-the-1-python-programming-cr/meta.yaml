    \ An abstract class cannot be instantiated and you can neither create class instances\
    \ nor objects for them. Abstract classes are designed to inherit all or only specific\
    \ features from a base class. Abstraction innately makes the language easier to\
    \ understand, read, and learn. Though it makes the language a tad bit less powerful\
    \ by taking away some of the power that the user has over the entire computer\
