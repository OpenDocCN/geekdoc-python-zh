    ## PART 1


    ### Intro to Python


    This book is about Python for beginners. It introduces the core aspects of the
    Python programming language. Python is a high-level, integrated, general-purpose
    programming language developed in 1991 by Guido van Rossum. The design philosophy
    underpinning Python emphasizes on code readability characterized by its use of
    considerable whitespace. Python''s object-oriented approach and language constructs
    focus on helping programmers write logical, clear code for large- and small-scale
    projects. This book aims to provide a cogent introduction to Python for beginners.
    It seeks to provide a platform to learn Python programming well and in one week
    including step-by-step practical examples, exercises, and tricks.


    Before we go into the "why programming" discussion, let us first define what programming
    is. Programming is the process of taking an equation and converting it into a
    code, a programming language, so that it is implemented on a machine. Or in simple
    words, "Programming is a language to teach a machine what to do through a set
    of instructions." Various types of programming languages are used, such as the
    following:


    - Python

    - PHP

    - C language

    - JAVA


    So why is it important? What''s so great about this? Why does it matter? Almost
    everything in today''s world is done on computers. Whether you''re sending an
    email to a relative, a picture to a friend, or having an important meeting with
    a colleague on Skype, it has become a necessity for individuals to have access
    to a computer or laptop. The reliance on computers by individuals and workplaces
    can be attributed to their speed, reliability, and ease of use. So, when computers
    are as much a part of life as they are now, learning to program will boost your
    quality of life! One of the main reasons people are learning programming is because
    they want to make a career of creating websites for companies or mobile apps.
    That is not the only reason you need to learn programming; programming can also
    help improve efficiency and productivity!'
