    ## Types of Errors


    Three main types of errors can be encountered when programming in Python 3:


    - Syntax Errors

    - Runtime Errors

    - Logical Errors


    ## Syntax Errors


    The syntax is a set of guidelines that need to be followed to write correctly
    in a computer language. A syntax error is a missing punctuation character, a mistake
    such as a misspelled keyword, or a missing closing bracket. The syntax errors
    are detected by the compiler or the interpreter. If you try to execute a Python
    program that contains a syntax error, you will get an error message on your screen
    and the program won''t execute. You must correct any errors and then try to execute
    the program again. Usually these types of errors are due to typos. In the case
    an error occurs, the Python interpreter stops running. Some common causes of syntax
    errors are due to


    - wrongly written keywords,

    - wrong use of an operator,

    - forgetting parentheses in a function call, or

    - not putting strings in single quotes or double quotes.


    ## Runtime Errors


    These errors occur when the execution of the code is stopped because of an operation
    being impossible to be carried out. A runtime error can cause a program to end
    abruptly or even cause a system shutdown. Such errors can be the most difficult
    errors to detect. Running out of memory or a division by zero are examples of
    runtime errors.


    ## Logical Errors


    Logical errors happen when the code produces wrong results. For instance, a temperature
    conversion from Fahrenheit to Celsius:


    ```

    print("20 degree Fahrenheit in degree Celsius is: ")

    print(5 / 9 * 20 – 32)

    ```


    ## Result


    1. 20 degree Fahrenheit in degree Celsius is:

    2. -20.88888888888889


    The above code outputs -20.88888888888889, that is erroneous. The right result
    is -6.666. These types of errors are referred as logical errors. To get the correct
    answer, parentheses need to be used correctly: 5 / 9 * (20 - 32) instead of 5
    / 9 * 20 - 32.


    A logical error is an error that prevents your program from doing what you expected
    it to do. With logical errors, you get no warning at all. Your code compiles and
    runs but the result is not the expected one. You must review your program thoroughly
    to find out where your error is. Python program executes as normal. It is the
    programmer who has to find and correct the erroneously written Python statement,
    not the computer or the interpreter. Computers may not be that smart after all.


    ## Chapter 3: Data Types and Variables in Python


    Every program has certain data that allow it to function and operate in the way
    we want. The data can be a text, a number, or any other thing in between. Whether
    complex or simple, these data types are the cogs in a machine that allow the rest
    of the mechanism to connect and work. Python is a host to a few data types and,
    unlike its competitors; it does not deal with an extensive range of things.

    That is good because we have less to worry about and yet achieve accurate results
    despite the lapse. Python was created to make our lives, as programmers, a lot
    easier.


    ## Strings


    In Python and other programming languages, any text values, such as names, places,
    or sentences, are referred to as strings. A string is a collection of characters,
    not words or letters, marked by the use of single or double quotation marks. To
    display a string, use the print command, open up a parenthesis, put in a quotation
    mark, and write anything.

