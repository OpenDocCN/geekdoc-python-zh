- md: '## Chapter 1: Installing Python


    To code in Python, you must have the Python Interpreter installed on your computer.
    You must also have a text editor in which you will be writing and saving your
    Python codes. The good thing about Python is that it can run on various platforms
    like Windows, Linux, and Mac OS. Most of the current versions of these operating
    systems come installed with Python. You can check whether Python has been installed
    on your operating system by running this command on the terminal or operating
    system console:


    ```

    Python

    ```


    Type the above command on the terminal of your operating system then hit the enter/return
    key.


    The command should return the version of Python installed on your system. If Python
    is not installed, you will be informed that the command is not recognized; hence
    you have to install Python.


    ## Choosing a Python Version


    The main two versions of Python are 2.x and 3.x. Python 3.x is the latest one
    but Python 2.x, as of today, is most likely still the most used version. Python
    3.x is however growing much faster in terms of adoption. While Python 2.x is still
    in use in many software companies, more and more enterprises are moving to Python
    3.x. There are several technical differences between the two versions but, put
    simply, Python 2.x is legacy and Python 3.x is the future. You would be advised
    to go for the latest version, Python 3.x, as Python 2.x will not be supported
    after 2020.


    ## General installation instructions


    Installing Python is very easy. All you need to do is follow the steps described
    below:


    1.  Go to Python''s downloads page: https://www.python.org/downloads/

    2.  Click the link related to your operating system.


    ![](img/dba60ef710f8d13a0fe521223aa23724_19_0.png)


    3.  Click on the latest release and download according to your operating system.

    4.  Launch the package and follow the installation instructions (we recommend
    leaving the default settings). Make sure you click on Add Python 3.x to PATH.
    Once the installation is finished you are set to go!


    ![](img/dba60ef710f8d13a0fe521223aa23724_19_1.png)


    5.  Access your terminal IDLE.


    ![](img/dba60ef710f8d13a0fe521223aa23724_19_2.png)


    Test that all works by writing your first Python code:


    ```

    print ("I''m running my first Python code")

    ```


    Press enter or return, this is what you should get


    ```

    >>> print ("I''m running my first Python code")

    I''m running my first Python code

    ```


    You can do the same also by launching this command using a file. We will address
    this after we address the Python IDLE or another code editor.


    ## Installation on Windows


    To install Python on Windows, download Python from its official website then double-click
    the downloaded setup package to launch the installation. You can download the
    package by clicking this link:


    https://www.python.org/downloads/windows/


    It will be good for you to download and install the latest package of Python as
    you will be able to enjoy using the latest Python packages. After downloading
    the package, double-click on it and you will be guided through on-screen instructions
    on how to install Python on your Windows OS.


    ## Installation on Linux (Ubuntu)


    In Linux, there are a number of package managers that can be used for the installation
    of Python in various Linux distributions. For example, if you are using Ubuntu
    Linux, run this command to install Python:


    ```

    $ sudo apt-get install python3-minimal

    ```


    Python will be installed on your system. However, most of the latest versions
    of various Linux distributions come installed with Python. Just run the "python"
    command. If you get a Python version as the return, then Python has been installed
    on your system. If not, go ahead and install Python.


    ## Installation on Mac OS


    To install Python in Mac OS, you must first download the package. You can find
    it by opening the following link on your web browser:


    https://www.python.org/downloads/mac-osx/


    After the setup has been downloaded, double-click it to launch the installation.
    You will be presented with on-screen instructions that will guide you through
    the installation process. Then, you will have Python running on your Mac OS system.


    ## Running Programs


    One can run Python programs in two main ways:


    - Interactive interpreter

    - Script from the command line


    ## Interactive Interpreter or Interactive Mode via Shell


    Python comes with a command line, referred to as the interactive interpreter.
    You can write your Python code directly on this interpreter and press the enter
    key to get instant results. If you are on Linux, you only have to open the Linux
    terminal and type "python." Hit the enter key, and the >>> symbol will show on
    the Python interpreter. To access the interactive Python interpreter on Windows,
    click Start -> All programs, then identify "Python..." from the list of programs.
    In my case, I find "Python 3.5" as I have installed Python 3.5. Expand this option
    and click "Python...." In my case, I click "Python 3.5 (64-bit)" and I get the
    interactive Python interpreter.


    ![](img/dba60ef710f8d13a0fe521223aa23724_21_0.png)


