  md: "# Deleting Attributes and Objects\n\nYou can delete the attributes of an object\
    \ or even the object itself at any time using the statement del.\n\nDeleting Attributes\
    \ and Objects\n\n```\nclass ComplexNumbers:\n    def __init__(self, x = 0, y =\
    \ 0):\n        self.real = x\n        self.imagined = y\n    def getNumbers(self):\n\
    \        print (\"Complex numbers are: {0}+{1}j\".format(self.real, self.imagined))\n\
    Object1 = ComplexNumbers(2, 3) #Creates a new ComplexNumbers object\nObject1.getNumbers()\
    \ #Calls getNumbers() function\nObject2 = ComplexNumbers(10) #Creates another\
    \ ComplexNumbers object\nObject2.attr = 20 #Creates a new attribute 'attr'\nprint\
    \ ((Object2.real, Object2.imagined, Object2.attr))\ndel ComplexNumbers.getNumbers\n\
    Object1.getNumbers()\n```\n\nThe error you get when you run the script shows that\
    \ the attribute getNumbers() has been deleted. Note, however, that since a new\
    \ instance is created in memory when a new instance of the object is created,\
    \ the object may continue to exist in memory even after it is deleted until the\
    \ garbage collector automatically destroys unreferenced objects."
