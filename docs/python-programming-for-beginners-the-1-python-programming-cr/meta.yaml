    # **Immutable Sets**


    As mentioned earlier, Python has an immutable set type known as frozenset. It
    works much the same as set does but with one difference: You cannot use any operation
    or method that can change values, such as the clear() or add() methods. Immutability
    can be quite useful in a number of ways. For example, a normal set is mutable,
    which means it is not hashable and that, in turn, means that it cannot be a member
    of another set. On the other hand, a frozenset can be a member of another set
    because it is immutable. Plus, this immutability of frozenset means that it can
    be used as a dictionary key, like this:


    ```

    fs1 = frozenset(s1)

    fs2 = frozenset(s2)

    print({fs1: ''fs1'', fs2: ''fs2''})

    ```


