  md: '# # Chapter 11: Sets in Python


    # ## Sets


    A Python set is an unordered collection containing unique items. While sets are
    mutable, meaning we can add and remove items to and from them, each item in a
    set must be immutable. One important thing about sets is that you cannot have
    any duplicate items in them. We usually use sets to do mathematical operations,
    such as union, intersection, complement, and difference.

    Unlike a sequence type, a set type doesn''t provide any slicing or indexing operations.
    The values do not have any keys associated with them like dictionaries do. Python
    contains two types of sets—mutable sets and immutable frozensets. Each type of
    set is created with a set of curly braces containing values separated by a comma.
    An empty set cannot be created using the curly braces, as a={} will create a dictionary!
    Empty sets are created by using a=set() or a=frozenset().

    Below are the methods and the operations for sets:


    len(s) ◇ will return how many elements are in (s).


    s.copy() ◇ will return a shallow copy of (s).


