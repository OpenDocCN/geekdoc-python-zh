    )\nlast_name = input(\"Enter your last name:\")\nsay_hi(first_name, last_name)\n\
    ```\n\n现在，程序将首先询问用户的名字，然后是姓氏。一旦完成，程序将提供包含名字和姓氏的个性化问候。\n\n然而，这些是位置参数，意味着你输入的每个值都是按顺序的。如果你要改变John\
