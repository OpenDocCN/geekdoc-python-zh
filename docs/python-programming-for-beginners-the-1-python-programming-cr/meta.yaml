- md: '## Chapter 10: Deep Dive on Python Tuples


    ## Tuple in Python


    A tuple is like a list, but we cannot edit its elements. This is one of the main
    differences that we will see with the tuple versus the list when we work in the
    Python language, and other coding languages as well.


    For example, when we work with a list, we have different items that are available
    in the code, and we are able to change them, even when we execute the code. This
    is a benefit of the list; if you want to be able to change up some of the items
    and not have them set there for a long time, then you would want to work with
    the list.


    On the other hand, the tuple is going to look similar in syntax to what we see
    with a list. But the elements are not changeable at all. If you want to work with
    an option that will keep the elements the same all of the time, once you are done
    putting them in place, then the tuple is going to be the best option for you.


    Example:

    Start IDLE.

    Navigate to the File menu and click New Window.

    Type the following:


    ```python

    tuple_mine = (21, 12, 31)

    print(tuple_mine)

    tuple_mine = (31, "Green", 4.7)

    print(tuple_mine)

    ```


    Output:

    ```

    (21, 12, 31)

    (31, ''Green'', 4.7)

    ```


    ## Accessing Python Tuple Elements


    ```python

    tuple_mine=(''t'',''r'',''o'',''g'',''r'',''a'',''m'')

    print(tuple_mine[1]) # output: ''r''

    print(tuple_mine[3]) # output: ''g''

    ```


    ## Negative Indexing


    Just like lists, tuples can also be indexed negatively.

    Like lists, -1 refers to the last element on the list and -2 refer to the second
    last element.


    Example:

    Start IDLE.

    Navigate to the File menu and click New Window.

    Type the following:


    ```python

    tuple_mine=(''t'',''r'',''o'',''g'',''r'',''a'',''m'')

    print(tuple_mine[-2]) # the output will be ''a''

    ```


    ## Slicing


    The slicing operator, accessed by using the full colon( : ) is used to access
    a range of items in a tuple.


    Example:

    Start IDLE.

    Navigate to the File menu and click New Window.

    Type the following:


    ```python

    tuple_mine=(''t'',''r'',''o'',''g'',''r'',''a'',''m'')

    print(tuple_mine[2:5]) # Output: ''o'',''g'',''r''

    print(tuple_mine[:-4]) # Output: ''t'', ''r'', ''o''

    ```


    Important:

    Tuple elements are immutable meaning they cannot be changed. However, we can combine
    elements in a tuple using +(concatenation operator). We can also repeat elements
    in a tuple using the * operator, just like lists.


    Example:

    Start IDLE.

    Navigate to the File menu and click New Window.

    Type the following:


    ```python

    print((7, 45, 13) + (17, 25, 76))

    print(("Several",) * 4)

    ```


    Output:

    ```

    (7, 45, 13, 17, 25, 76)

    (''Several'', ''Several'', ''Several'', ''Several'')

    ```


    Since we cannot change elements in a tuple, we cannot delete the elements either.
    However, removing the full tuple can be attained using the keyword del.


    Example:

    Start IDLE.

    Navigate to the File menu and click New Window.

    Type the following:


    ```python

    t_mine=[''t'',''k'',''q'',''v'',''y'',''c'',''d'']

    del t_mine

    ```


    ## Inbuilt Python Functions with Tuple


    | Method | Description | Method | Description |

    | :--- | :--- | :--- | :--- |

    | enumerate() | Return an enumerate object. It contains the index and value of
    all the items of a tuple as pairs. | Tuple() | Convert an iterable to a tuple.
    |

    | Sorted() | Take elements in the tuple and return a new sorted list. It does
    not sort the tuple itself. | Max() | Return the largest element in the tuple.
    |

    | All() | Return True if all elements of the tuple are true, or if the tuple is
    empty. | Sum() | Return the sum of all elements in the tuple. |

    | Len() | Return the length (the number of items) in the tuple. | Min() | Return
    the smallest item in the tuple. |

    | | | Any() | Return True if any element of the tuple is true. If the tuple is
    empty, return False. |


    ## Escape Sequences in Python


    The escape sequences enable us to format our output to enhance clarity to the
    human user. A program will still run successfully without using escape sequences,
    but the output will be highly confusing to the human user. Writing and displaying
    output in expected output is part of good programming practices. The following
    are commonly used escape sequences:


    | Method | Description | Method | Description |

    |---|---|---|---|

    | \n | ASCII Linefeed | \b | ASCII Backspace |

    | " | Double quote | \ | Backslash |

    | \f | ASCII Formfeed | \a | ASCII Bell |

    | \newline | Backslash and newline ignored | \'' | Single quote |

    | \r | ASCII Carriage Return | \t | ASCII Horizontal Tab |

    | \v | ASCII Vertical Tab | \000 | Character with octal value 000 |

    | \xHH | The character with hexadecimal value HH | | |


    Example:

    Start your IDLE.

    Navigate to the File menu and click New Window.

    Type the following:


    ```python

    print("D:\Lessons\Programming")

    print("Prints\n in two lines")

    ```


    Output:

    ```

    D:\Lessons\Programming

    Prints

    in two lines

    ```


    Integers, floating-point, and complex numbers are supported in Python and all
    help convert different number data types. The presence or absence of a decimal
    point separates integers and floating points. For instance, 4 is an integer while
    4.0 is a floating-point number. Programmers often need to convert decimal numbers
    into octal, hexadecimal, or binary forms. We can represent binary, hexadecimal,
    and octal systems in Python by simply placing a prefix to the particular number.
    Sometimes referred to as coercion, type conversion allows us to change one type
    of number into another. Inbuilt functions such as int() allow us to convert data
    types directly. The same functions can be used to convert from strings. We create
    a list in Python by placing items called elements inside square brackets separated
    by commas. In programming and Python specifically, the first time is always indexed
    zero. For a list of five items, we will access them from index 0 to index 4. Failure
    to access the items in a list in this manner will create an index error.


    ## Chapter 11: Sets in Python


    ### Sets


    A Python set is an unordered collection containing unique items. While sets are
    mutable, meaning we can add and remove items to and from them, each item in a
    set must be immutable. One important thing about sets is that you cannot have
    any duplicate items in them. We usually use sets to do mathematical operations,
    such as union, intersection, complement, and difference.


    Unlike a sequence type, a set type doesn''t provide any slicing or indexing operations.
    The values do not have any keys associated with them like dictionaries do. Python
    contains two types of sets—mutable sets and immutable frozensets. Each type of
    set is created with a set of curly braces containing values separated by a comma.
    An empty set cannot be created using the curly braces, as a={} will create a dictionary!
    Empty sets are created by using a=set() or a=frozenset().


    Below are the methods and the operations for sets:


    - `len(s)` will return how many elements are in (s).

    - `s.copy()` will return a shallow copy of (s).

    - `s.difference(t)` will return a set containing the items in (s) but not (t).

    - `s.intersection(t)` will return a set containing the items in both (s) and (t).

    - `s.isdisjoint(t)` will return True if there are no common items between (s)
    and (t).

    - `s.issubset(t)` will return True if the contents of (s) are in (t).

    - `s.issuperset(t)` will return True if the contents of (t) are in (s).

    - `s.symmetric_difference(t)` will return a set of the items from (s) or (t) but
    not those in both.

    - `s.union(t)` will return a set containing the items in (s) or (t).


    The parameter of (t) may be any object in Python that will support iteration with
    any method that is available to the objects set and frozenset. Be aware, if you
    need to use an operator version of these methods, you must set the arguments—the
    methods themselves will accept any type that is iterable. Below are the operator
    versions of the methods:


    ### Operator Methods


    Make two sets:


    ```python

    s = {"cake", "apple", "banana"}

    t = {"humans", "cake", "1etroit"}

    ```


    The following will return the difference between s and t:


    ```python

    print(s.difference(t))

    ```


    Output:

    ```

    {''banana'', ''apple''}

    ```


    The following will return True if "s" is a subset of "t" and False if "s" is not
    a subset of "t":


    ```python

    print(s.issubset(t))

    ```


    Output:

    ```

    False

    ```


    The following will return True if "s" is a superset of "t" and False if "s" is
    not a superset of "t":


    ```python

    s.issuperset(t)

    ```


    Output:

    ```

    False

    ```'
  mdcn: '## 第10章：深入探讨Python元组


    ## Python中的元组


    元组类似于列表，但我们无法编辑其元素。这是我们在使用Python语言以及其他编程语言时，元组与列表的主要区别之一。


    例如，当我们使用列表时，代码中有不同的可用项，并且我们能够更改它们，甚至在执行代码时也是如此。这是列表的一个优点；如果你想要能够更改某些项，而不是让它们长期固定在那里，那么你会想要使用列表。


    另一方面，元组在语法上看起来与列表相似。但元素是完全不可更改的。如果你想要使用一个选项，在将元素放置到位后始终保持它们不变，那么元组将是你的最佳选择。


    示例：

    启动IDLE。

    导航到“文件”菜单并点击“新建窗口”。

    输入以下内容：


    ```python

    tuple_mine = (21, 12, 31)

    print(tuple_mine)

    tuple_mine = (31, "Green", 4.7)

    print(tuple_mine)

    ```


    输出：

    ```

    (21, 12, 31)

    (31, ''Green'', 4.7)

    ```


    ## 访问Python元组元素


    ```python

    tuple_mine=(''t'',''r'',''o'',''g'',''r'',''a'',''m'')

    print(tuple_mine[1]) # 输出：''r''

    print(tuple_mine[3]) # 输出：''g''

    ```


    ## 负索引


    与列表一样，元组也可以使用负索引。

    与列表类似，-1指的是列表中的最后一个元素，-2指的是倒数第二个元素。


    示例：

    启动IDLE。

    导航到“文件”菜单并点击“新建窗口”。

    输入以下内容：


    ```python

    tuple_mine=(''t'',''r'',''o'',''g'',''r'',''a'',''m'')

    print(tuple_mine[-2]) # 输出将是''a''

    ```


    ## 切片


    切片运算符，通过使用冒号（:）访问，用于访问元组中的一系列项。


    示例：

    启动IDLE。

    导航到“文件”菜单并点击“新建窗口”。

    输入以下内容：


    ```python

    tuple_mine=(''t'',''r'',''o'',''g'',''r'',''a'',''m'')

    print(tuple_mine[2:5]) # 输出：''o'',''g'',''r''

    print(tuple_mine[:-4]) # 输出：''t'', ''r'', ''o''

    ```


    重要提示：

    元组元素是不可变的，这意味着它们不能被更改。但是，我们可以使用+（连接运算符）组合元组中的元素。我们也可以像列表一样，使用*运算符重复元组中的元素。


    示例：

    启动IDLE。

    导航到“文件”菜单并点击“新建窗口”。

    输入以下内容：


    ```python

    print((7, 45, 13) + (17, 25, 76))

    print(("Several",) * 4)

    ```


    输出：

    ```

    (7, 45, 13, 17, 25, 76)

    (''Several'', ''Several'', ''Several'', ''Several'')

    ```


    由于我们不能更改元组中的元素，因此也不能删除元素。但是，可以使用关键字`del`删除整个元组。


    示例：

    启动IDLE。

    导航到“文件”菜单并点击“新建窗口”。

    输入以下内容：


    ```python

    t_mine=[''t'',''k'',''q'',''v'',''y'',''c'',''d'']

    del t_mine

    ```


    ## Python内置元组函数


    | 方法 | 描述 | 方法 | 描述 |

    | :--- | :--- | :--- | :--- |

    | enumerate() | 返回一个枚举对象。它包含元组所有项的索引和值，以对的形式呈现。 | Tuple() | 将可迭代对象转换为元组。 |

    | Sorted() | 获取元组中的元素并返回一个新的已排序列表。它不会对元组本身进行排序。 | Max() | 返回元组中的最大元素。 |

    | All() | 如果元组的所有元素都为真，或者元组为空，则返回True。 | Sum() | 返回元组中所有元素的总和。 |

    | Len() | 返回元组的长度（项数）。 | Min() | 返回元组中的最小项。 |

    | | | Any() | 如果元组的任何元素为真，则返回True。如果元组为空，则返回False。 |


    ## Python中的转义序列


    转义序列使我们能够格式化输出，以增强对人类用户的清晰度。程序在不使用转义序列的情况下仍然可以成功运行，但输出对人类用户来说会非常混乱。以预期的格式编写和显示输出是良好编程实践的一部分。以下是常用的转义序列：


    | 方法 | 描述 | 方法 | 描述 |

    |---|---|---|---|

    | \n | ASCII换行符 | \b | ASCII退格符 |

    | " | 双引号 | \ | 反斜杠 |

    | \f | ASCII换页符 | \a | ASCII响铃符 |

    | \newline | 忽略反斜杠和换行符 | \'' | 单引号 |

    | \r | ASCII回车符 | \t | ASCII水平制表符 |

    | \v | ASCII垂直制表符 | \000 | 八进制值为000的字符 |

    | \xHH | 十六进制值为HH的字符 | | |


    示例：

    启动你的IDLE。

    导航到“文件”菜单并点击“新建窗口”。

    输入以下内容：


    ```python

    print("D:\Lessons\Programming")

    print("Prints\n in two lines")

    ```


    输出：

    ```

    D:\Lessons\Programming

    Prints

    in two lines

    ```


    Python支持整数、浮点数和复数，所有这些都有助于转换不同的数字数据类型。小数点的存在与否区分了整数和浮点数。例如，4是整数，而4.0是浮点数。程序员经常需要将十进制数转换为八进制、十六进制或二进制形式。我们可以通过在特定数字前放置前缀来表示Python中的二进制、十六进制和八进制系统。有时称为强制转换，类型转换允许我们将一种数字类型更改为另一种。内置函数如`int()`允许我们直接转换数据类型。相同的函数也可用于从字符串转换。我们通过将称为元素的项放在方括号内并用逗号分隔来在Python中创建列表。在编程中，特别是在Python中，第一个项的索引始终为零。对于一个包含五个项的列表，我们将从索引0访问到索引4。未能以这种方式访问列表中的项将导致索引错误。


    ## 第11章：Python中的集合


    ### 集合


    Python集合是一个包含唯一项的无序集合。虽然集合是可变的，意味着我们可以向其中添加和删除项，但集合中的每个项都必须是不可变的。关于集合的一个重要事项是，其中不能有任何重复项。我们通常使用集合进行数学运算，如并集、交集、补集和差集。


    与序列类型不同，集合类型不提供任何切片或索引操作。这些值没有像字典那样的关联键。Python包含两种类型的集合——可变集合和不可变的冻结集合。每种类型的集合都使用一组花括号创建，其中包含用逗号分隔的值。空集不能使用花括号创建，因为`a={}`将创建一个字典！空集通过使用`a=set()`或`a=frozenset()`创建。


    以下是集合的方法和操作：


    - `len(s)` 将返回(s)中有多少个元素。

    - `s.copy()` 将返回(s)的浅拷贝。

    - `s.difference(t)` 将返回一个包含在(s)中但不在(t)中的项的集合。

    - `s.intersection(t)` 将返回一个包含同时在(s)和(t)中的项的集合。

    - `s.isdisjoint(t)` 如果(s)和(t)之间没有共同项，则返回True。

    - `s.issubset(t)` 如果(s)的内容在(t)中，则返回True。

    - `s.issuperset(t)` 如果(t)的内容在(s)中，则返回True。

    - `s.symmetric_difference(t)` 将返回一个包含来自(s)或(t)但不包含两者中都有的项的集合。

    - `s.union(t)` 将返回一个包含在(s)或(t)中的项的集合。


    参数(t)可以是Python中支持迭代的任何对象，使用对象集合和冻结集合可用的任何方法。请注意，如果你需要使用这些方法的运算符版本，你必须设置参数——方法本身将接受任何可迭代的类型。以下是这些方法的运算符版本：


    ### 运算符方法


    创建两个集合：


    ```python

    s = {"cake", "apple", "banana"}

    t = {"humans", "cake", "1etroit"}

    ```


    以下将返回s和t之间的差集：


    ```python

    print(s.difference(t))

    ```


    输出：

    ```

    {''banana'', ''apple''}

    ```


    如果"s"是"t"的子集，则以下将返回True；如果"s"不是"t"的子集，则返回False：


    ```python

    print(s.issubset(t))

    ```


    输出：

    ```

    False

    ```


    如果"s"是"t"的超集，则以下将返回True；如果"s"不是"t"的超集，则返回False：


    ```python

    s.issuperset(t)

    ```


    输出：

    ```

    False

    ```'
