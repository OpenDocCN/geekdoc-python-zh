  md: '# Chapter 14: Files Handling in Python


    The next thing that we need to focus on when it comes to working with Python is
    making sure we know how to handle files. It may happen that you are working with
    some data and you want to store them while ensuring that they are accessible for
    you to pull up and use when they are needed later. You do have some choices in
    the way you save the data, how they are going to be found later on, and how they
    are going to react in your code.


    When working with files, you will find that there are a few operations or methods
    that you are able to choose from, including:


    +   - Closing up a file you are working on,

    - Creating a brand new file to work on, or

    - Seeking out or moving a file over to a new location to make it easier to find.


    # Creating New Files


    The first task that we are going to look at doing is creating a file. It is hard
    to do the other tasks if we don''t first have a file in place to help us out.
    If you would like to be able to make a new file, you first need to make sure the
    file is opened up inside of your IDLE. Then, you can choose the mode that you
    would like to use when you write out your code.


    When it comes to creating files on Python, you will find there are three modes
    that you are able to work with. The three main modes that we are going to focus
    on here are append (a), mode (x), and write (w).


    Any time that you would like to open up a file and make some changes to it, you
    want to use the write mode. This is the easiest of the three to work with. The
    write method is going to make it easier for you to get the right parts of the
    code set up and working for you in the end.


    The write function will ensure that you can make any additions and changes that
    you would like to the file. You can add new information to the file, change what
    is there, and so much more. If you would like to see what you can do with this
    part of the code with the write method, then you will want to open up your compiler
    and write the following code:'
