  md: "# Chapter 7: Program Flow Control and If-else, elif Statements in Python\n\n\
    Comparison operators are special operators in Python programming language that\
    \ evaluate to either True or False. Program flow control refers to a way in which\
    \ a programmer explicitly specifies the order of execution of program code lines.\
    \ Normally, flow control involves placing some condition(s) on the program code\
    \ lines. The most basic form of these conditional statements is the *if statement*.\
    \ This one is going to provide us with some problems right from the beginning,\
    \ but knowing a bit about it will help us get the *if else* and other control\
    \ statements to work the way that we want.\nTo start, the if statement is going\
    \ to take the input of the user, and compare it to the condition that you set.\
    \ If the condition is met here, then the code will continue on, usually showing\
    \ some kind of message that you set up in the code.\nHowever, if the input does\
    \ not match up with the condition that you set, the returned value will be False.\n\
    \n# If ... else Flow Control Statements\n\nThe \"if...else\" statement will execute\
    \ the body of if in the case that the test condition is True. Should the if...else\
    \ test expression evaluate to False, the body of the else will be executed. Program\
    \ blocks are denoted by indentation. The if...else provides more maneuverability\
    \ when placing conditions on the code. The if...else syntax can be seen below:\n\
    \n```\nif test condition:\n    Statements\nelse:\n    Statements\n```\n\nLet's\
    \ make a program that checks whether a number is positive or negative."
