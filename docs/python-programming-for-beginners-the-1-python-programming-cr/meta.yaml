    \ 会移除集合 `s` 中同时存在于集合 `t` 中的项。\n- `discard(item)` 会从集合 `s` 中移除指定的项。\n- `intersection_update(t)`\
    \ 会移除集合 `s` 中不在集合 `s` 和 `t` 交集中的项。\n- `pop()` 会返回并移除集合 `s` 中的一个任意项。\n- `remove(item)`\
    \ 会从集合 `s` 中移除指定的项。\n- `symmetric_difference_update(t)` 会移除集合 `s` 中不在集合 `s` 和\
    \ `t` 对称差集中的项。\n- `update(iterable)` 会将可迭代对象 `t` 中的项添加到集合 `s` 中。\n\n以下示例将展示一些集合操作及其结果：\n\
    \n```\ns1={'ab', 3, 4, (5, 6)}\ns2={'ab', 7, (7, 6)}\nprint(s1-s2) # identical\
    \ to s1.difference(s2)\n```\n\n运行此代码将返回：\n\n```\n{(5, 6), 3, 4}\n```\n\n```\n\
    print(s1.intersection(s2))\n```\n\n此代码将返回：\n\n```\n{'ab'}\n```\n\n```\nprint(s1.union(s2))\n\
    ```\n\n此代码将返回：\n\n```\n{'ab', 3, 4, 7, (5, 6), (7, 6)}\n```\n\n集合对象不关心其成员是否为不同类型；它们只需都是不可变的。如果尝试在集合中使用可变对象（如列表或字典），将会抛出\
    \ `unhashable type` 错误。所有可哈希类型都具有一个在整个实例生命周期内保持不变的哈希值，并且所有内置不可变类型都是可哈希类型。内置可变类型不是可哈希类型，因此不能作为元素包含在集合中或作为字典键。\n\
    \n注意，当打印 `s1` 和 `s2` 的并集时，只有一个 `\"ab\"` 值。请记住，集合不包含任何重复项。除了内置方法外，还可以对集合执行其他操作。例如，要测试一个集合的成员资格，可以这样做：\n\
    \n```\nprint('ab' in s1)\n```\n\n运行此代码将返回：\n\n```\nTrue\n```\n\n```\nprint('ab'\
    \ not in s1)\n```\n\n运行此代码将返回：\n\n```\nFalse\n```\n\n遍历集合元素的方式如下：\n\n```\nfor\
    \ element in s1:\n    print(element)\n```\n\n```\n(5, 6)\nab\n3\n4\n```\n\n##\
    \ **不可变集合**\n\n如前所述，Python 有一种不可变集合类型，称为 `frozenset`。它的工作方式与 `set` 类似，但有一个区别：你不能使用任何可以更改值的操作或方法，例如\
    \ `clear()` 或 `add()` 方法。不可变性在许多方面都很有用。例如，普通集合是可变的，这意味着它不可哈希，进而意味着它不能成为另一个集合的成员。另一方面，`frozenset`\
    \ 可以成为另一个集合的成员，因为它是不可变的。此外，`frozenset` 的不可变性意味着它可以用作字典键，如下所示：\n\n```\nfs1 = frozenset(s1)\n\
    fs2 = frozenset(s2)\nprint({fs1: 'fs1', fs2: 'fs2'})\n```\n\n运行此代码将返回：\n\n```\n\
    {frozenset({(5, 6), 3, 4, 'ab'}): 'fs1', frozenset({(7, 6), 'ab', 7}): 'fs2'}\n\
    ```\n\n## **用于算法和数据结构的模块**\n\n除了这些内置类型外，Python 还有一些模块可用于扩展这些内置函数和类型。大多数时候，这些模块可能更高效，并可能提供编程方面的优势，使我们的代码更简单。到目前为止，我们已经研究了字典、列表、集合和字符串的内置类型。这些通常被称为抽象数据类型（ADT），可以被视为对数据可执行操作的数学规范。它们的行为定义了它们，而不是它们的实现。除了我们已经看过的\
    \ ADT 之外，还有一些 Python 库包含内置数据类型的扩展；我们接下来将研究这些。\n\n## **Collections 模块**\n\n名为 `collections`\
    \ 的模块包含这些数据类型的替代品——高性能、专门的替代品——以及用于创建命名元组的实用函数。以下是数据类型、操作及其功能：\n\n- `namedtuple()`\
    \ 会创建一个具有给定字段的元组子类。\n- `deque` 提供具有快速追加和从任一端弹出功能的列表。\n- `Chainmap` 类似于字典，将创建一个显示多个映射的单一视图。\n\
    - `Counter` 是一个字典子类，用于计算可哈希对象。\n- `OrderedDict` 是一个字典子类，用于记住条目的顺序。\n- `defaultdict`\
    \ 是一个字典子类，将调用一个可以提供缺失值的函数。\n- `UserDict`\n- `UserList`\n- `UserString`\n\n这些数据类型用作每个类型底层基类的包装器。我们现在不太使用它们，而是直接子类化基类。但是，它们可用于将底层对象作为属性访问。\n\
    \n## **Deques**\n\n`deque`（发音为 deck）是一个双端队列。这些对象类似于列表，支持线程安全且内存高效的追加操作。`deque`\
    \ 是可变的，并支持一些列表操作，如索引。你可以通过索引为 `deque` 赋值，但不能直接切片。例如，如果尝试 `dq[1:2]`，你会得到一个类型错误；不过有办法做到这一点，我们稍后会看到。\n\
    \n使用 `deque` 而不是列表的最大优势在于，在 `deque` 开头插入项目比在列表开头插入要快得多。也就是说，在 `deque` 末尾插入项目并不总是更快。所有\
    \ `deque` 都是线程安全的，我们可以使用名为 `pickle` 的模块对其进行序列化。\n\n使用 `deque` 最有用的方法之一可能是项目的填充和消耗，因为这些操作从每一端顺序发生。\n\
    \n```\nfrom collections import deque\ndq = deque('abc') #the deque is created\n\
    dq.append('d') #value 'd' is added on the right\ndq.appendleft('z') # value 'z'\
    \ is added on the left\ndq.extend('efg') # multiple items are added on the right\n\
    dq.extendleft('yxw') # multiple items are added on the left\nprint(dq)\n```\n\n\
    运行此代码将返回：\n\n```\ndeque(['w', 'x', 'y', 'z', 'a', 'b', 'c', 'd', 'e', 'f', 'g'])\n\
    ```\n\n要消耗 `deque` 中的项目，我们可以使用 `pop()` 和 `popleft()` 方法：\n\n```\nprint(dq.pop())\
    \ #item on the right is returned and removed\n```\n\n运行此代码将返回：\n\n```\n'g'\n```\n\
    \n```\nprint(dq.popleft()) # item on the left is returned and removed\n```\n\n\
    运行此代码将返回：\n\n```\n'w'\n```\n\n```\nprint(dq)\n```\n\n运行此代码将返回：\n\n```\ndeque(['x',\
    \ 'y', 'z', 'a', 'b', 'c', 'd', 'e', 'f'])\n```\n\n我们还有一个名为 `rotate(n)` 的方法，它可以移动和旋转任何项目，对于正整数\
    \ `n` 向右移动 `n` 步，对于负整数 `n` 向左移动 `n` 步，参数使用正整数：\n\n```\ndq.rotate(2) #all the items\
    \ are moved 2 steps to the right\nprint(dq)\n```\n\n运行此代码将返回：\n\n```\ndeque(['e',\
    \ 'f', 'x', 'y', 'z', 'a', 'b', 'c', 'd'])\n```\n\n```\ndq.rotate(-2) # all the\
    \ items are moved 2 steps to the left\nprint(dq)\n```\n\n运行此代码将返回：\n\n```\ndeque(['x',\
    \ 'y', 'z', 'a', 'b', 'c', 'd', 'e', 'f'])\n```\n\n我们也可以使用这些 `pop()` 和 `rotate()`\
    \ 方法来删除元素。返回切片作为列表的方法如下：\n\n```\nprint(dq)\n```\n\n运行此代码将返回：\n\n```\ndeque(['x',\
    \ 'y', 'z', 'a', 'b', 'c', 'd', 'e', 'f'])\n```\n\n```\nimport itertools\nprint(list(itertools.islice(dq,\
    \ 3, 9)))\n```\n\n运行此代码将返回：\n\n```\n['a', 'b', 'c', 'd', 'e', 'f']\n```\n\n`itertools.islice()`\
    \ 方法与列表切片相同，但参数不是列表，而是一个可迭代对象，选定的值作为列表返回，使用起始和停止索引。\n\n`deque` 更有用的功能之一是支持可选的\
    \ `maxlen` 参数，用于限制 `deque` 的大小。这对于循环缓冲区（一种固定大小并首尾相连的数据结构）非常理想。这些通常用于需要缓冲数据流的情况。以下是一个示例：\n\
    \n```\ndq2=deque([],maxlen=3)\nfor i in range(6):\n    dq2.append(i)\n    print(dq2)\n\
    ```\n\n我们从右侧填充，从左侧消耗。一旦缓冲区被填满，较旧的值就会被消耗，新值从右侧进入。"
