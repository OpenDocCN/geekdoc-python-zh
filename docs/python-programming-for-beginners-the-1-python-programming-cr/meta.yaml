    对于字典，我们在值之间使用冒号 (:)。对象名称放在字符串中，后跟冒号。之后，我们使用字符串、数字（整数或浮点数）或布尔值。你可以用这些为每个对象分配其唯一的键值对。如果你感到困惑，键值对只是分配给对象的值的另一种说法。例如，"name"
