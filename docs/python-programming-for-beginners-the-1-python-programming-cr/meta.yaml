- md: "## Chapter 12: Functions in Python\n\nCreating and calling a function is easy.\
    \ The primary purpose of a function is to allow you to organize, simplify, and\
    \ modularize your code. Whenever you have a set of code that you will need to\
    \ execute in sequence from time to time, defining a function for that set of code\
    \ will save you time and space in your program. Instead of repeatedly typing code\
    \ or even copy-pasting, you simply define a function.\n\nWe began with almost\
    \ no prior knowledge about Python except for a clue that it was some kind of programming\
    \ language that is in great demand these days. Now, look at you; creating simple\
    \ programs, executing codes, and fixing small-scale problems on your own. Not\
    \ bad at all! However, learning always comes to a point where things can get rather\
    \ trickier.\n\nIn quite a similar fashion, functions are docile-looking things;\
    \ you call them when you need to get something done. But did you know that these\
    \ functions have so much going on at the back? Imagine every function as a mini-program.\
    \ It is also written by programmers like us to carry out specific things without\
    \ us having to write lines and lines of code. You only do it once, save it as\
    \ a function, and then call the function where it is applicable or needed.\n\n\
    The time has come for us to dive into a complex world of functions where we not\
    \ only learn how to use them effectively, but also look into what goes on behind\
    \ these functions and how we can come up with our own personalized function. This\
    \ will be slightly challenging, but I promise there are more references that you\
    \ will enjoy to keep the momentum going.\n\n## How to Define and Call a Function\n\
    \nTo start, we need to take a look at how we are able to define our own functions\
    \ in this language. The function in Python is going to be defined when we use\
    \ the statement of \"def\" and follow it with a function name and some parentheses.\
    \ This lets the compiler know that you are defining a function, and which function\
    \ you would like to define at this time as well. There are going to be a few rules\
    \ in place when it comes to defining one of these functions though, and it is\
    \ important to do these in the proper manner to ensure your code acts in the way\
    \ you would like. Some of the Python rules that we need to follow for defining\
    \ these functions will include the following:\n\n1.  Any of the arguments or input\
    \ parameters that you would like to use have to be placed within the parentheses\
    \ so the compiler knows what is going on.\n2.  The function first statement can\
    \ be an optional statement; something like a documentation string that goes with\
    \ your function if needed.\n3.  The code that is found within all of the functions\
    \ that we are working with needs to start out with a colon and be indented.\n\
    4.  The statement return that we get, or the expression, will need to exit a function\
    \ at this time. We can then have the option of passing back a value to the caller.\
    \ A return statement that doesn't have an argument with it is going to give us\
    \ the same return as none.\n\nBefore we get too familiar with some of the work\
    \ that can be done with these Python functions, we need to take some time to understand\
    \ the rules of indentation when we are declaring these functions in Python. The\
    \ same kinds of rules are going to be applicable to some of the other elements\
    \ of Python as well, such as declaring conditions, variables, and loops, so learning\
    \ how this work can be important here.\n\nYou will find that Python is going to\
    \ follow a particular style when it comes to indentation to help define the code\
    \ because the functions in other languages are not going to have any explicit\
    \ begin or end, like curly braces, to help indicate the start and the stop for\
    \ that function. This is why we are going to rely on indentation. When we work\
    \ with the proper kind of indentation here, we are able to really see some good\
    \ results and ensure that the compiler is going to know when a function is being\
    \ used.\n\n## Understanding Functions Better\n\nFunctions are like containers\
    \ that store lines of codes within themselves, just like variables that contain\
    \ one specific value. There are two types of functions we get to deal with in\
    \ Python. The first are built-in or predefined, and the others are custom-made\
    \ or user-created. Either way, each function has a specific task that it can carry\
    \ out. The code that is written before creating any function is what gives that\
    \ function identity and a task. Now, the function knows what it needs to do whenever\
    \ it is called in.\n\nWhen we began our journey, we wrote \"I made it!\" on the\
    \ console as our first program. We used our first function there as well: the\
    \ print() function. Functions are generally identified by parentheses that follow\
    \ the name of the function. Within these parentheses, we pass arguments called\
    \ parameters. Some functions accept a certain kind of parenthesis while others\
    \ accept different ones.\n\nLet us look a little deeper and see how functions\
