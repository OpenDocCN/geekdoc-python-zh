- md: "## Example\n\nStart IDLE.\nNavigate to the File menu and click New Window.\n\
    Type the following:\n\n```\ni=0\nwhile i<6:\n    if i==5:\n        break\n   \
    \ else:\n        print(\"inside else\")\n        i=i+1\n```\n\n## Assignment\n\
    \n- a. Write a Python program that utilizes the while flow control statement to\
    \ display the sum of all odd numbers from 1 to 10.\n- b. Write a Python program\
    \ that employs the while flow control statement to display the sum of all numbers\
    \ from 11 to 21.\n- c. Write a Python program that incorporates a while flow control\
    \ statement to display the sum of all even numbers from 1 to 10.\n\n## Using While\
    \ Loop with Else\n\nIf the condition is false and no break occurs, a while loop's\
    \ else part runs.\n\n## Example\n\nStart IDLE.\nNavigate to the File menu and\
    \ click New Window.\nType the following:\n\n```\ntrack = 0\nwhile track<4:\n \
    \   print(\"Within the loop\")\n    track = track+1\nelse:\n    print(\"Now within\
    \ the else segment\")\n```\n\n## Python's Break and Continue\n\nLet us use a real-life\
    \ analogy where we force a stop on iteration before it finishes evaluating. Think\
    \ of cracking or breaking passwords using a simple dictionary attack. You'll want\
    \ to loop through all possible character combinations, immediately stopping when\
    \ you strike the password. Again, think of when recovering accidentally deleted\
    \ photos using recovery software; you will want the recovery to stop iterating\
    \ through files immediately when it finds items within the specified range. The\
    \ break and continue statement in Python works similarly.\n\n## Example\n\nStart\
    \ IDLE.\nNavigate to the File menu and click New Window.\nType the following:\n\
    \n```\nfor tracker in \"bring\":\n    if tracker == \"i\":\n        break\n  \
    \  print(tracker)\nprint(\"The End\")\n```\n\nThe output of this program will\
    \ be:\n\n- b\n- r\n- The End\n\n## Continue Statement in Python\n\nWhen the continue\
    \ statement is used, the interpreter skips the rest of the code inside a loop\
    \ for the current iteration only and the loop does not terminate.\nThe loop continues\
    \ with the next iteration.\nThe syntax of Python's continue statement is as follows:\n\
    continue\n\nStart IDLE.\nNavigate to the File menu and click New Window.\nType\
    \ the following:\n\n```\nfor tracker in \"bring\":\n    if tracker == \"i\":\n\
    \        continue\n    print(tracker)\nprint(\"finished\")\n```\n\nThe output\
    \ of this program will be:\n\n- b\n- r\n- n\n- g\n- Finished\n\nThis statement\
    \ can be helpful, for example, if you are running data recovery software and have\
    \ specified for it to skip word files (.doc, dox extension).\nThe program will\
    \ have to continue iterating even after skipping word files.\n\n## PART 2\n\n\
    ## Chapter 9: Lists in Python\n\nWe have learned quite a lot since we started\
    \ with this book. We have gone through operators, we learned about various data\
    \ types, and we also looked at loops and statements. During all of this, we did\
    \ mention the word \"list\" and represented these with a square bracket instead\
    \ of curly or round brackets. This chapter will now explore and explain what exactly\
    \ lists are. By the end of this chapter, we should be familiarized with the core\
    \ concepts of these and how they are vital to the programming of any kind.\n\n\
    ## A Look into What Lists Are\n\nLet us go ahead and create an imaginary family\
    \ that comprises Smith, Mary, their daughter Alicia, and their son Elijah. How\
    \ would we do that? Begin by creating a variable named family as shown below:\n\
    \n```\nfamily = ['Smith', 'Mary', 'Alicia', 'Elijah']\n```\n\nUsing the [] brackets,\
    \ we provided the data to this variable. Now, this specific variable holds more\
    \ than one name within it. This is where lists come to the rescue. Through listing,\
    \ we can store as many values within a variable as we like. In this case, we can\
    \ stick to four only.\nIf you now use the print command to print 'family', you\
    \ should see the following:\n\n```\n['Smith', 'Mary', 'Alicia', 'Elijah']\n```\n\
    \nThe values or names stored within the brackets are called as items. To call\
    \ on the item or to check what item is stored on a specific index number, you\
    \ can use the method we had used earlier in strings.\n\n```\nprint(family[0])\n\
    ```\n\n```\nSmith\n```\n\nInstead of showing \"S,\" the complete name was shown.\
    \ Similarly, if you use the other functions such as the len() function, it would\
    \ provide you with the length of the list. In this case, it would show you that\
    \ there are four items in this list. Let us try that out for ourselves.\n\n```\n\
    print(len(family))\n```\n\n```\n4\n```\n\nYou can use the [x:y] function, where\
    \ x and y are ranges you can set. This can be helpful if the list you are working\
    \ on contains hundreds of entries. You can filter out the ones you would like\
    \ to view. You can jump straight to the end of the list by using [-1] to see the\
    \ last entry. The combinations are endless.\nHere is a little brain-teaser. Suppose\
    \ we have around 100 numbers in a list. They are not listed chronologically and\
    \ we do not have time to scroll through each one of them. We need to find out\
    \ which of these numbers is the highest. How can we do that?\nThis is where lists,\
    \ loops, and if statements come together. How? Let us look into it right away:\n\
    \n```\nnumbers = [312, 1434, 68764, 4627, 84, 470, 9047, 98463, 389, 2]\nhigh\
    \ = numbers[0]\nfor number in numbers:\n    if number > high:\n        high =\
    \ number\n        print(f\"The highest number is {high}\")\n```\n\n```\nThe highest\
    \ number is 98463\n```\n\nTime to put our thinking cap on and see what just happened.\n\
    \nWe started out by providing some random numbers. One of these was surely the\
    \ highest. We created a variable and assigned it the first item of the list of\
    \ numbers as its value. We do not know whether this item holds the highest value.\n\
    \nMoving ahead, we initiated a \"for\" loop with a loop variable called number.\
    \ This number would iterate each value from numbers. We used an \"if\" statement\
    \ to tell the interpreter that if the loop variable \"number\" is greater than\
    \ our current set highest number, \"high,\" it should immediately replace that\
    \ with the value it holds.\n\nOnce the program was run, Python sees we assigned\
    \ \"high\" the value of the first item, which is 312. Once the loop and if statement\
    \ begins, Python analyzes if the first item is greater than the value of the variable\
    \ \"high.\" Surely, 312 is not greater than 312 itself. The loop does not alter\
    \ the value and ends. Now, the \"for\" loop restarts, this time with the second\
    \ item value. This time around, when the \"if\" statement is executed, Python\
    \ sees that our variable has a lower value than the one it is currently working\
    \ on. 312 is far less than 1434. Therefore, it executes the code within the statement\
    \ and replaces the value of our variable to the newly found higher value. This\
    \ process will continue until all values are cross-checked and finally the largest\
    \ value is maintained. Then, only the largest value will be printed for us.\n\n\
    ## 2-D Lists\n\nIn Python, we have another kind of list that is called the two-dimensional\
    \ list. If you are someone who is willing to master data sciences or machine learning,\
    \ you will need to use these quite a lot. The 2-D list is quite a powerful tool.\
    \ Generally, when it comes to maths, we have what is called matrixes. These are\
    \ arrays of numbers formed in a rectangular form within large brackets.\n\nUnlike\
    \ your regular lists, these contain rows and columns of values and data as shown\
    \ here:\n\n```\nmatrix = [\n[19, 11, 91],\n[41, 25, 54],\n[86, 28, 21]]\n```\n\
    \nIn an easier way, imagine this as a list that contains a number of lists inside.\
    \ As illustrated above, each row is now acting as a separate list. Had this been\
    \ a regular list, we could have printed a value using the index number. How do\
    \ you suppose we can have the console print out the value of our first item within\
    \ the first list?\n\n```\nprint(matrix[0][0])\n```\n\nUsing the above, you can\
    \ now command the interpreter to only print out the first value stored within\
    \ the first list. The first zero within the first [] tells the interpreter which\
    \ list to access. Following that is the second bracket set which further directs\
    \ the search to the index number of the item. In this case, we were aiming to\
    \ print out 19 and thus, 19 will be our result.\nTake a moment and try to print\
    \ out 25, 21, and 86 separately. If you were able to do this, good job.\nYou can\
    \ change the values of the items within the list. If you know the location of\
    \ the said item, you can use the name of the variable followed by the [x][y] position\
    \ of the item. Assign a new number by using a single equals-to mark and the value\
    \ you wish for it to have.\nThe 2-D lists are normally used for slightly advanced\
    \ programming where you need to juggle quite a lot of values and data types. However,\
    \ it is best to keep these in mind as you never know when you may actually need\
    \ to use them.\n\n## List Methods\n\nSomewhere in the start, we learned about\
    \ something called methods. To start off, let us go back to PyCharm and create\
    \ our own list of random numbers. Let's use the following number sequence:\n\n\
    ```\nnumbers = [11, 22, 33, 44, 55, 66, 77]\n```"
  mdcn: "## 示例\n\n启动 IDLE。\n导航到“文件”菜单并点击“新建窗口”。\n输入以下内容：\n\n```\ni=0\nwhile i<6:\n\
    \    if i==5:\n        break\n    else:\n        print(\"inside else\")\n    \
    \    i=i+1\n```\n\n## 作业\n\n- a. 编写一个 Python 程序，利用 while 流程控制语句显示 1 到 10 之间所有奇数的和。\n\
    - b. 编写一个 Python 程序，利用 while 流程控制语句显示 11 到 21 之间所有数字的和。\n- c. 编写一个 Python 程序，使用\
    \ while 流程控制语句显示 1 到 10 之间所有偶数的和。\n\n## 带有 Else 的 While 循环\n\n如果条件为假且未发生 break，while\
    \ 循环的 else 部分将运行。\n\n## 示例\n\n启动 IDLE。\n导航到“文件”菜单并点击“新建窗口”。\n输入以下内容：\n\n```\n\
    track = 0\nwhile track<4:\n    print(\"Within the loop\")\n    track = track+1\n\
    else:\n    print(\"Now within the else segment\")\n```\n\n## Python 的 Break 和\
    \ Continue\n\n让我们用一个现实生活中的类比来说明，即在迭代完成评估之前强制停止。想象一下使用简单的字典攻击来破解或破译密码。你需要遍历所有可能的字符组合，一旦找到密码就立即停止。再想想使用恢复软件恢复意外删除的照片时；一旦找到指定范围内的项目，你就希望恢复过程立即停止遍历文件。Python\
    \ 中的 break 和 continue 语句的工作原理类似。\n\n## 示例\n\n启动 IDLE。\n导航到“文件”菜单并点击“新建窗口”。\n输入以下内容：\n\
    \n```\nfor tracker in \"bring\":\n    if tracker == \"i\":\n        break\n  \
    \  print(tracker)\nprint(\"The End\")\n```\n\n该程序的输出将是：\n\n- b\n- r\n- The End\n\
    \n## Python 中的 Continue 语句\n\n当使用 continue 语句时，解释器仅跳过当前迭代中循环内的其余代码，而循环不会终止。\n\
    循环将继续进行下一次迭代。\nPython 的 continue 语句的语法如下：\ncontinue\n\n启动 IDLE。\n导航到“文件”菜单并点击“新建窗口”。\n\
    输入以下内容：\n\n```\nfor tracker in \"bring\":\n    if tracker == \"i\":\n        continue\n\
    \    print(tracker)\nprint(\"finished\")\n```\n\n该程序的输出将是：\n\n- b\n- r\n- n\n\
    - g\n- Finished\n\n此语句可能很有帮助，例如，如果你正在运行数据恢复软件并指定跳过 Word 文件（.doc、dox 扩展名）。\n程序在跳过\
    \ Word 文件后必须继续迭代。\n\n## 第二部分\n\n## 第 9 章：Python 中的列表\n\n自从我们开始阅读本书以来，我们已经学到了很多东西。我们学习了运算符，了解了各种数据类型，还研究了循环和语句。在此过程中，我们确实提到了“列表”这个词，并用方括号而不是花括号或圆括号来表示它们。本章现在将探讨并解释列表到底是什么。在本章结束时，我们应该熟悉这些核心概念以及它们对任何类型的编程为何至关重要。\n\
    \n## 深入了解列表是什么\n\n让我们来创建一个虚构的家庭，包括史密斯、玛丽、他们的女儿艾丽西亚和他们的儿子以利亚。我们该怎么做呢？首先创建一个名为 family\
    \ 的变量，如下所示：\n\n```\nfamily = ['Smith', 'Mary', 'Alicia', 'Elijah']\n```\n\n使用\
    \ [] 方括号，我们向这个变量提供了数据。现在，这个特定的变量包含多个名称。这就是列表发挥作用的地方。通过列表，我们可以在一个变量中存储任意多的值。在这种情况下，我们只保留四个。\n\
    如果你现在使用 print 命令打印 'family'，你应该会看到以下内容：\n\n```\n['Smith', 'Mary', 'Alicia', 'Elijah']\n\
    ```\n\n存储在方括号内的值或名称称为项。要调用项或检查特定索引号上存储了哪个项，你可以使用我们之前在字符串中使用过的方法。\n\n```\nprint(family[0])\n\
    ```\n\n```\nSmith\n```\n\n它没有显示 \"S\"，而是显示了完整的名称。同样，如果你使用其他函数，例如 len() 函数，它会提供列表的长度。在这种情况下，它会告诉你这个列表中有四个项。让我们自己尝试一下。\n\
    \n```\nprint(len(family))\n```\n\n```\n4\n```\n\n你可以使用 [x:y] 函数，其中 x 和 y 是你可以设置的范围。如果你正在处理的列表包含数百个条目，这会很有帮助。你可以过滤出你想要查看的那些。你可以使用\
    \ [-1] 直接跳到列表末尾查看最后一个条目。组合方式是无穷无尽的。\n这里有一个小脑筋急转弯。假设我们有一个包含大约 100 个数字的列表。它们没有按时间顺序排列，我们没有时间逐一滚动查看。我们需要找出这些数字中哪个是最大的。我们该怎么做呢？\n\
    这就是列表、循环和 if 语句结合在一起的地方。如何结合？让我们立即深入研究：\n\n```\nnumbers = [312, 1434, 68764, 4627,\
    \ 84, 470, 9047, 98463, 389, 2]\nhigh = numbers[0]\nfor number in numbers:\n \
    \   if number > high:\n        high = number\n        print(f\"The highest number\
    \ is {high}\")\n```\n\n```\nThe highest number is 98463\n```\n\n是时候开动脑筋，看看刚才发生了什么。\n\
    \n我们首先提供了一些随机数字。其中肯定有一个是最大的。我们创建了一个变量，并将数字列表中的第一项作为其值赋给它。我们不知道这一项是否持有最大值。\n\n\
    接下来，我们启动了一个“for”循环，循环变量名为 number。这个 number 将遍历 numbers 中的每个值。我们使用了一个“if”语句来告诉解释器，如果循环变量“number”大于我们当前设定的最高数字“high”，它应该立即用它持有的值替换那个值。\n\
    \n程序运行后，Python 看到我们将“high”赋值为第一项的值，即 312。一旦循环和 if 语句开始，Python 会分析第一项是否大于变量“high”的值。当然，312\
    \ 不大于 312 本身。循环不会改变值并结束。现在，“for”循环重新开始，这次使用第二项的值。这一次，当执行“if”语句时，Python 看到我们的变量值低于它当前正在处理的值。312\
    \ 远小于 1434。因此，它执行语句内的代码，并将我们变量的值替换为新找到的较高值。这个过程将持续进行，直到所有值都被交叉检查，最终保留最大的值。然后，只会为我们打印出最大的值。\n\
    \n## 二维列表\n\n在 Python 中，我们有另一种列表，称为二维列表。如果你是愿意掌握数据科学或机器学习的人，你会经常需要使用这些。二维列表是一个非常强大的工具。通常，当涉及到数学时，我们有所谓的矩阵。这些是在大括号内以矩形形式形成的数字数组。\n\
    \n与常规列表不同，它们包含值和数据的行和列，如下所示：\n\n```\nmatrix = [\n[19, 11, 91],\n[41, 25, 54],\n\
    [86, 28, 21]]\n```\n\n简单来说，可以将其想象为一个包含多个列表的列表。如上所示，每一行现在都充当一个单独的列表。如果这是一个常规列表，我们可以使用索引号打印一个值。你认为我们如何让控制台打印出第一个列表中第一个项的值？\n\
    \n```\nprint(matrix[0][0])\n```\n\n使用上述方法，你现在可以命令解释器仅打印出存储在第一个列表中的第一个值。第一个 []\
