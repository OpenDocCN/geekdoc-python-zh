    \ lot similar to calling a function.\n\n```\nMyObject = NewClass()\n```\n\nIn\
    \ the example above, a new instance object called MyObject is created. This object\
    \ can be used to access the attributes of the class NewClass using the class name\
    \ as a prefix.\nThe attributes in this case may include methods and variables.\
    \ The methods of an object are the corresponding functions of a class meaning\
    \ that any class attribute function object defines the methods for objects in\
    \ that class.\nFor instance, because NewClass.greeting is a function object and\
    \ an attribute of NewClass, MyObject.greeting will be a method object."
