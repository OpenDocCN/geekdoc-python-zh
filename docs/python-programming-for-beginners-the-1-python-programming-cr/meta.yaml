  md: "# # Constructors\n\nIn Python, the __init__() function is special because it\
    \ is called when a new object of its class is instantiated. This object is also\
    \ called a constructor because it is used to initialize all variables.\n\nConstructors\n\
    \n```\nclass ComplexNumbers:\n    def __init__(self, x = 0, y = 0):\n        self.real\
    \ = x\n        self.imagined = y\n    def getNumbers(self):\n        print (\"\
    Complex numbers are: {0}+{1}j\".format(self.real, self.imagined))\n\nObject1 =\
    \ ComplexNumbers(2, 3) #Creates a new ComplexNumbers object\nObject1.getNumbers()\
    \ #Calls getNumbers() function\nObject2 = ComplexNumbers(10) #Creates another\
    \ ComplexNumbers object\nObject2.attr = 20 #Creates a new attribute 'attr'\nprint((Object2.real,\
    \ Object2.imagined, Object2.attr))\nObject1.attr #Generates an error because c1\
    \ object doesn't have attribute 'attr'\n```\n\nIn the above exercise, we have\
    \ defined a new class that represents complex numbers. We have defined two functions,\
    \ the __init__() function that initializes the variables and the getNumbers()\
    \ function to properly display the numbers.\n\nNote that the attributes of the\
    \ objects in the exercise are created on the fly. For instance, the new attribute\
    \ attr for Object2 was created but one for Object1 was not (hence the error)."
