- md: '## What is Python?


    Python is a multi-purpose language created by Guido van Rossum. Different from
    HTML, CSS, and JavaScript, Python can be used for multiple types of programming
    and software development. Python can be used for things like


    - back end software development,

    - desktop apps,

    - big data and mathematical computations,

    - system scripts,

    - data analysis,

    - data science, or

    - Artificial Intelligence.


    The reasons why Python is the go-to language for many can be summarized in the
    following points:


    - Beginner friendliness, as it reads almost like English;

    - No hard rules on how to build features;

    - Easy-to-manage errors;

    - Many large, supportive communities;

    - Career opportunities; and

    - Future, especially for the strong fit towards data science and machine learning
    applications.


    Python is one of the most powerful programming languages. It''s one of the programming
    languages that are interpreted rather than compiled. This means the Python Interpreter,
    which works line by line, operates on Python programs to give the user the results.
    With Python, one can do a lot. Python has been used for the development of apps
    that span a wide of fields, from the most basic apps to the most complex ones.
    Python can be used for the development of basic desktop computer applications.
    It is also a good coding language for web development. Websites developed with
    Python are known for the level of security and protection they provide, making
    them safe and secure from hackers and other malicious users. Python is well applicable
    in the field of game development. It has been used for the development of basic
    and complex computer games. Python is currently the best programming language
    for use in data science and machine learning. It has libraries that are best suitable
    for use in data analysis, making it suitable for use in this field. A good example
    of such a library is scikit-learn (sklearn) which has proved to be the best for
    use in data science and machine learning.


    Python is well known for its easy-to-use syntax. It was written with the goal
    of making coding easy. This has made it easy the best language even for beginners.
    Its semantics are also easy, making it easy for one to understand Python codes.
    The language has received a lot of changes and improvements, especially after
    the introduction of Python 3. Previously, we had Python 2.7 which had gained much
    stability. Python 3 brought in new libraries, functions, and other features, and
    some of the language''s construct was changed significantly.


    ## Features of Python


    ### Python is Easy


    Python is an easy language to get started with. The ease of use is underscored
    by the fact that most of the programs written in Python look similar to the English
    language. Therefore, this simplicity makes Python an ideal learning language for
    entry-level programming courses, and thus introducing programming concepts to
    students.


    ### Python is Portable/Platform Independent


    Python is massively portable, which means that Python programs can be run in various
    operating systems without needing specific or extensive changes.


    ### Python is an Interpreted Language


    Mainly, Python is an interpreted language as opposed to being a compiled language.
    C and C++ are examples of compiled languages.


    In many cases, the programs composed in a high-level language are typically referred
    to as source code or source programs. As a result, the commands in the source
    codes are referred to as statements. A computer lacks the capacity to execute
    a program written in high-level language. Typically, computers understand machine
    language, which comprises of 1s and 0s only.


    As a result, there are two types of programs available to users when translating
    high-level languages to machine languages: compiler and interpreter.


    ### Compiler


    In its operative function, a compiler translates the entire source code into the
    readable machine language in one swoop. The machine language is subsequently executed.
    The process is illustrated below:


    ![](img/dba60ef710f8d13a0fe521223aa23724_13_0.png)


    ### Interpreter


    An interpreter employs a line by line approach to translating a high-level language
    into machine language, which is subsequently executed. The Python interpreter
    begins at the top of the file, translates the beginning line into machine language,
    and subsequently executes it. The process repeatedly continues throughout the
    entire file as illustrated below:


    ![](img/dba60ef710f8d13a0fe521223aa23724_13_1.png)


    It is crucial to distinguish between high-level and compiled languages. For example,
    compiled languages such as C and C++ use a compiler to translate and interpret
    (high-level to machine language). On the other hand, an interpreted language such
    as Python employs an interpreter to conduct this approach of translation and subsequent
    execution. The important distinction here is that compiled language generally
    operates and performs better compared to written programs that employ interpreted
    languages. However, Python does not suffer from this disadvantage.


    In synthesis, Python is an interpreted language as the program executes directly
    from the source code. Every time Python programs are run, the source code is required.
    What Python does is convert the source code written by the developer into an intermediate
    code which is then further converted into the machine language ready to be executed.
    Python is processed in real time by the interpreter and the source code does not
    need to be compiled before its execution. Compiled means that the code needs to
    be converted to machine language before runtime.


    ### Python is Dynamically Typed


    Another characteristic of Python is that it is dynamically typed, which means
    that data types are checked on the fly during execution, rather than being checked
    before run time (statically typed).


    ### Python is Strongly Typed


    The primary feature of a strongly typed language is that it lacks the capacity
    to convert one form (type) of data to another automatically. On the other hand,
    languages such as PHP and JavaScript, which are loosely typed, have the capacity
    to convert data from one type to another freely and automatically. Consider the
    following case:


    ```

    1 | price = 12

    2 | str = "The total price = " + 12

    3 | console.log(str)

    ```


    **Output:**


    ```

    The total price = 12

    ```


    In this regard, before adding 12 to the string, the JavaScript language seeks
    to convert the number 12 to a string "12", which is subsequently appended to the
    end of the string. However, in a Python statement such as below:


    ```

    str = "The total price = " + 12

    ```


    The language (Python) would occasion an error because it does not have the capacity
    to convert the number 12 into a string.


    In synthesis, Python is a strongly typed language, meaning the type of variables
    must be known. This implies that the type of a value doesn''t change in unexpected
    ways. For example, a string containing only a number doesn''t automatically change
    into a number, as may happen in Perl. In Python, every data type change needs
    an explicit conversion.


    ### A huge set of libraries


    Python provides users with a broad range of libraries, which make it easy to add
    new capacities and capabilities without necessarily reinventing new approaches.
    The following sections will go through common questions mostly posed by beginners
    in Python programming.


    ### What type of application can I create using Python?


    Some of the main applications for which Python is used include


    - games,

    - machine learning and Artificial Intelligence,

    - data science and data visualization,

    - web development,

    - game development,

    - desktop GUI,

    - web scraping applications,

    - business applications,

    - audio and video applications,

    - CAD applications,

    - embedded applications,

    - system administration applications,

    - GUI applications,

    - console applications,

    - scientific applications, and

    - Android applications.


    ## Who uses Python?


    Some of the main companies that utilize Python include


    - YouTube;

    - Mozilla;

    - Dropbox;

    - Quora;

    - Disqus;

    - Reddit;

    - Google;

    - Disney;

    - Mozilla;

    - Bit Torrent;

    - Intel;

    - Cisco;

    - banks such as JPMorgan Chase, UBS, Getco, and Citadel apply Python for financial
    market forecasting;

    - NASA for scientific programming tasks;

    - iRobot for commercial robotic vacuum cleaner;

    - and many others.'
  mdcn: '## 什么是 Python？


    Python 是由 Guido van Rossum 创建的一种多用途语言。与 HTML、CSS 和 JavaScript 不同，Python 可用于多种类型的编程和软件开发。Python
    可用于以下方面：


    - 后端软件开发，

    - 桌面应用程序，

    - 大数据和数学计算，

    - 系统脚本，

    - 数据分析，

    - 数据科学，或

    - 人工智能。


    Python 成为许多人的首选语言，其原因可总结为以下几点：


    - 对初学者友好，因为它读起来几乎像英语；

    - 对如何构建功能没有硬性规定；

    - 易于管理的错误处理；

    - 拥有许多大型、支持性的社区；

    - 职业机会；以及

    - 未来前景，特别是在数据科学和机器学习应用方面的强大契合度。


    Python 是最强大的编程语言之一。它是解释型而非编译型的编程语言之一。这意味着 Python 解释器逐行工作，对 Python 程序进行操作以向用户提供结果。使用
    Python，人们可以做很多事情。Python 已被用于开发涵盖广泛领域的应用程序，从最基本的应用程序到最复杂的应用程序。Python 可用于开发基本的桌面计算机应用程序。它也是
    Web 开发的良好编码语言。使用 Python 开发的网站以其提供的安全性和保护水平而闻名，使其免受黑客和其他恶意用户的攻击。Python 在游戏开发领域也适用。它已被用于开发基本和复杂的计算机游戏。Python
    目前是数据科学和机器学习的最佳编程语言。它拥有最适合数据分析的库，使其适用于该领域。一个很好的例子是 scikit-learn (sklearn)，它已被证明是数据科学和机器学习的最佳选择。


    Python 以其易于使用的语法而闻名。它的编写目标是使编码变得简单。这使得它即使对于初学者来说也是最佳语言。其语义也很简单，使得人们易于理解 Python
    代码。该语言经历了许多更改和改进，特别是在引入 Python 3 之后。以前，我们有 Python 2.7，它已经获得了很高的稳定性。Python 3 引入了新的库、函数和其他功能，并且该语言的一些构造发生了显著变化。


    ## Python 的特点


    ### Python 简单易用


    Python 是一种易于上手的语言。其易用性体现在大多数用 Python 编写的程序看起来都与英语相似。因此，这种简单性使得 Python 成为入门级编程课程的理想学习语言，从而向学生介绍编程概念。


    ### Python 可移植/平台无关


    Python 具有极强的可移植性，这意味着 Python 程序可以在各种操作系统上运行，而无需进行特定或大量的更改。


    ### Python 是一种解释型语言


    主要来说，Python 是一种解释型语言，而不是编译型语言。C 和 C++ 是编译型语言的例子。


    在许多情况下，用高级语言编写的程序通常被称为源代码或源程序。因此，源代码中的命令被称为语句。计算机缺乏执行用高级语言编写的程序的能力。通常，计算机理解机器语言，它仅由
    1 和 0 组成。


    因此，当将高级语言转换为机器语言时，用户有两种类型的程序可用：编译器和解释器。


    ### 编译器


    在其操作功能中，编译器将整个源代码一次性转换为可读的机器语言。然后执行机器语言。该过程如下图所示：


    ![](img/dba60ef710f8d13a0fe521223aa23724_13_0.png)


    ### 解释器


    解释器采用逐行方法将高级语言转换为机器语言，然后执行。Python 解释器从文件顶部开始，将第一行转换为机器语言，然后执行。该过程在整个文件中重复进行，如下图所示：


    ![](img/dba60ef710f8d13a0fe521223aa23724_13_1.png)


    区分高级语言和编译型语言至关重要。例如，像 C 和 C++ 这样的编译型语言使用编译器来翻译和解释（从高级语言到机器语言）。另一方面，像 Python 这样的解释型语言则使用解释器来进行这种翻译和后续执行的方法。这里的重要区别在于，编译型语言通常比使用解释型语言编写的程序运行和执行得更好。然而，Python
    并没有受到这个缺点的影响。


    总之，Python 是一种解释型语言，因为程序直接从源代码执行。每次运行 Python 程序时，都需要源代码。Python 所做的是将开发人员编写的源代码转换为中间代码，然后进一步转换为可执行的机器语言。Python
    由解释器实时处理，源代码在执行前不需要编译。编译意味着代码需要在运行前转换为机器语言。


    ### Python 是动态类型的


    Python 的另一个特点是它是动态类型的，这意味着数据类型在执行时即时检查，而不是在运行前检查（静态类型）。


    ### Python 是强类型的


    强类型语言的主要特点是它缺乏自动将一种形式（类型）的数据转换为另一种形式的能力。另一方面，像 PHP 和 JavaScript 这样的松散类型语言则能够自由且自动地将数据从一种类型转换为另一种类型。考虑以下情况：


    ```

    1 | price = 12

    2 | str = "The total price = " + 12

    3 | console.log(str)

    ```


    **输出：**


    ```

    The total price = 12

    ```


    在这方面，在将 12 添加到字符串之前，JavaScript 语言会尝试将数字 12 转换为字符串 "12"，然后将其附加到字符串的末尾。然而，在像下面这样的
    Python 语句中：


    ```

    str = "The total price = " + 12

    ```


    该语言（Python）会引发错误，因为它没有将数字 12 转换为字符串的能力。


    总之，Python 是一种强类型语言，这意味着变量的类型必须是已知的。这意味着一个值的类型不会以意想不到的方式改变。例如，一个只包含数字的字符串不会自动变成数字，就像在
    Perl 中可能发生的情况一样。在 Python 中，每种数据类型的更改都需要显式转换。


    ### 庞大的库集合


    Python 为用户提供了广泛的库，这使得在不一定需要重新发明新方法的情况下，轻松添加新的容量和功能。以下部分将介绍 Python 编程初学者最常提出的一些常见问题。


    ### 我可以使用 Python 创建什么类型的应用程序？


    Python 的一些主要应用包括：


    - 游戏，

    - 机器学习和人工智能，

    - 数据科学和数据可视化，

    - Web 开发，

    - 游戏开发，

    - 桌面 GUI，

    - Web 抓取应用程序，

    - 商业应用程序，

    - 音频和视频应用程序，

    - CAD 应用程序，

    - 嵌入式应用程序，

    - 系统管理应用程序，

    - GUI 应用程序，

    - 控制台应用程序，

    - 科学应用程序，以及

    - Android 应用程序。


    ## 谁在使用 Python？


    一些使用 Python 的主要公司包括：


    - YouTube；

    - Mozilla；

    - Dropbox；

    - Quora；

    - Disqus；

    - Reddit；

    - Google；

    - Disney；

    - Mozilla；

    - Bit Torrent；

    - Intel；

    - Cisco；

    - 摩根大通、瑞银、Getco 和 Citadel 等银行使用 Python 进行金融市场预测；

    - NASA 用于科学编程任务；

    - iRobot 用于商用机器人吸尘器；

    - 以及许多其他公司。'
