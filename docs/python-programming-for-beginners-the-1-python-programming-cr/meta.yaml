    # Strings


    In Python and other programming languages, any text values, such as names, places,
    or sentences, are referred to as strings. A string is a collection of characters,
    not words or letters, marked by the use of single or double quotation marks. To
    display a string, use the print command, open up a parenthesis, put in a quotation
    mark, and write anything.

    Once done, we generally end the quotation marks and close the bracket. If you
    are using PyCharm, IntelliSense detects what we are about to do and delivers the
    rest for us immediately. You may have noticed how it jumped to the rescue when
    you only type in the opening bracket. It will automatically provide you with a
    closing one. Similarly, when you insert quotation marks, it will provide the closing
    ones for you.

    See why we are using PyCharm?

    It greatly helps us out. "I do have a question. Why do we use either single or
    double quotation marks if both provide the same result?" Ah! Quite an eye.


    There is a reason we use different quotation marks. Let me explain by using the
    example below:


    ```

    print(''I''m afraid I won''t be able to make it'')

