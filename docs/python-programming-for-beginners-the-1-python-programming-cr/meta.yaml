  md: "# Chapter 17: Inheritance and Polymorphism\n\nIn Python, a class is defined\
    \ using the keyword Class, the same way a function is defined with the keyword\
    \ def. Therefore, if we were to define a class called ClassName, our syntax would\
    \ look like this:\n\n```\nclass ClassName:\n    \"Class Documentation String\"\
    \n    Class_Suite\n```\n\nIn this syntax, the keyword class is used to define\
    \ a new class, followed by the class name ClassName, and a colon. The class documentation\
    \ string is essentially a definition or description of the class. The Class_Suite\
    \ is representative of the entirety of the defining class members, component statements,\
    \ functions, and data attributes of the class.\nSince a class is used to create\
    \ objects, it is best seen as a way to add consistency to programs created in\
    \ Python so that they are cleaner, more efficient, and most importantly, functional.\
    \ To create a class that can be instantiated anywhere in your code, it must be\
    \ defined at a module's top-level.\n\n# Creating a Class in Python\n\nNow that\
    \ we are familiar with the syntax for creating a class in Python, we'll introduce\
    \ a class example called Dog.\n\n```\nclass Dog:\n    \"Dog class\"\n    var1\
    \ = \"Bark\"\n    var2 = \"Jump\"\n```\n\n# Class Declaration and Definition"
