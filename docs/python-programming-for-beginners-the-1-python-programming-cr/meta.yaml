    # Conclusion


    Programming isn''t just about getting a PC to get things done. It is tied in with
    cmposing code that is helpful to people. Great programming is saddling complexity
    by composing code that rhymes with our instincts. Great code will be code that
    we can use with a negligible amount of setting.


    The most important thing for you to do is to practice programming in Python. If
    you have read until here then you have already absorbed quite much. You need to
    practice all the things you have learned to make sure you consolidate that knowledge
    (i.e. make it stick).


    Knowledge is useless without application. Learning how to program without actual
