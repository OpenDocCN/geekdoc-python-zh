    # Types of Errors


    Three main types of errors can be encountered when programming in Python 3:


    +   - Syntax Errors

    - Runtime Errors

    - Logical Errors


    # Syntax Errors


    The syntax is a set of guidelines that need to be followed to write correctly
    in a computer language. A syntax error is a missing punctuation character, a mistake
    such as a misspelled keyword, or a missing closing bracket. The syntax errors
    are detected by the compiler or the interpreter. If you try to execute a Python
    program that contains a syntax error, you will get an error message on your screen
    and the program won''t execute. You must correct any errors and then try to execute
    the program again. Usually these types of errors are due to typos. In the case
    an error occurs, the Python interpreter stops running. Some common causes of syntax
    errors are due to


    +   - wrongly written keywords,

    - wrong use of an operator,

    - forgetting parentheses in a function call, or

    - not putting strings in single quotes or double quotes.


    # Runtime Errors


    These errors occur when the execution of the code is stopped because of an operation
    being impossible to be carried out. A runtime error can cause a program to end
    abruptly or even cause a system shutdown. Such errors can be the most difficult
    errors to detect. Running out of memory or a division by zero are examples of
    runtime errors.'
