    ### 1. Arithmetic Operators


    These are operators that have the ability to perform mathematical or arithmetic
    operations that are going to be fundamental or widely used in this programming
    language, and these operators are in turn subdivided into:


    1.1. Sum Operator: Its symbol is (+) and its function is to add the values of
    numerical data. Its syntax is written as follows:


    ```

    6+4

    10

    ```


    1.2 Subtract Operator: Its symbol is (-) and its function is to subtract the values
    of numerical data types. Its syntax can be written like this:


    ```

    4-3

    1

    ```


    1.3 Multiplication Operator: Its symbol is (*) and its function is to multiply
    the values of numerical data types.

    Its syntax can be written like this:


    ```

    3*2

    6

    ```


    1.4 Division Operator: Its symbol is (/); the result offered by this operator
    is a real number. Its syntax is written like this:


    ```

    3.5/2

    1.75

    ```


    1.5 Module Operator: Its symbol is (%); its function is to return the rest of
    the division between the two operators. In the following example, we have the
    division of 8 by 5, equal to 1 with a remainder of 3. For this reason, its module
    will be 3.

    Its syntax is written like this:


    ```

    8%5

    3

    ```


    1.6 Exponent Operator: Its symbol is (**) and its function is to calculate the
    exponent between numerical data type values. Its syntax is written like this:


    ```

    3**2

    9

    ```


    1.7 Whole Division Operator: Its symbol is (//); in this case, the result it returns
    is only the whole part of the resulting number.

    Its syntax is written like this:


    ```

    3.5//2

    1.0

    ```


