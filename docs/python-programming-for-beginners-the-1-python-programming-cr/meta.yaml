- md: "## Chapter 17: Inheritance and Polymorphism\n\nIn Python, a class is defined\
    \ using the keyword `class`, the same way a function is defined with the keyword\
    \ `def`. Therefore, if we were to define a class called `ClassName`, our syntax\
    \ would look like this:\n\n```python\nclass ClassName:\n    \"Class Documentation\
    \ String\"\n    Class_Suite\n```\n\nIn this syntax, the keyword `class` is used\
    \ to define a new class, followed by the class name `ClassName`, and a colon.\
    \ The class documentation string is essentially a definition or description of\
    \ the class. The `Class_Suite` is representative of the entirety of the defining\
    \ class members, component statements, functions, and data attributes of the class.\n\
    \nSince a class is used to create objects, it is best seen as a way to add consistency\
    \ to programs created in Python so that they are cleaner, more efficient, and\
    \ most importantly, functional. To create a class that can be instantiated anywhere\
    \ in your code, it must be defined at a module's top-level.\n\n## Creating a Class\
    \ in Python\n\nNow that we are familiar with the syntax for creating a class in\
    \ Python, we'll introduce a class example called `Dog`.\n\n```python\nclass Dog:\n\
    \    \"Dog class\"\n    var1 = \"Bark\"\n    var2 = \"Jump\"\n```\n\n## Class\
    \ Declaration and Definition\n\nIn Python 3, there is no difference between class\
    \ declaration and class definition. This is because the two occur simultaneously.\
    \ Class definition follows declaration and documentation string as demonstrated\
    \ in our example.\n\n## Class Methods and Attributes\n\nA class, defined and created,\
    \ is not complete unless it has some functionality. Functionalities in a class\
    \ are defined by setting their attributes, which are best seen as containers for\
    \ functions and data related to those attributes. Class attributes include data\
    \ members like variables and instance variables and methods found using the dot\
    \ notation. Here are their definitions:\n\n- Class variable: A variable shared\
    \ by all the class instances and objects.\n- Instance variable: A variable unique\
    \ to an instance of a class. It is typically defined within a method and will\
    \ only be applicable to the instance of that class.\n- Method: Also called a function,\
    \ a method is defined in a class and defines the behavior of an object.\n\n##\
    \ Class Attributes\n\nA class attribute is a functional element that belongs to\
    \ another object and is accessed via dotted-attribute notation. In Python, complex\
    \ numbers have data attributes while lists and dictionaries have functional attributes.\
    \ When you access an attribute, you can also access an object that may have attributes\
    \ of its own.\n\nClass attributes are linked to the classes in which they are\
    \ defined. The most commonly used objects in OOP are instance objects. Instance\
    \ data attributes are the primary data attributes that are used. You'll find most\
    \ use for class data attributes when you require a data type, which does not need\
    \ any instances.\n\n## Class Data Attributes\n\nData attributes are the class\
    \ variables that are defined by the programmer. They can be used like any other\
    \ variable when creating the class. Methods can update them within the class.\
    \ Programmers know these types of attributes better as static members, class variables,\
    \ or static data. They represent data tied to the class object they belong to\
    \ and are independent of any class instances.\n\nExample of using class data attributes\
    \ (`xyz`):\n\n```python\nclass ABC:\n    def __init__(self):\n        self.xyz\
    \ = 10\n        self.xyz = self.xyz + 1\nprint(ABC().xyz)\n```\n\nThe output of\
    \ this example code will be `11`.\n\n## Python Class Inheritance\n\nInheritance\
    \ is a feature in object-oriented programming that allows a class to inherit methods\
    \ and attributes from a parent class, also referred to as a base class. This is\
    \ a very handy feature in programming as it allows the programmer to create a\
    \ suite of functionality for a single class and then pass them on to sub-classes\
    \ or child classes. As a result, the program will be able to create new and even\
    \ overwrite existing functionalities in a child class without affecting the functionality\
    \ of the parent class.\n\nThe sub-classes that inheritance creates will feature\
    \ the specializations of the parent classes. There are four types of inheritances\
    \ in Python: single, multilevel, hierarchical, and multiple inheritances.\n\n\
    ## Single Inheritance\n\nProgramming classes that have no inheritance features\
    \ can be accurately referred to as object-based programming. The program, when\
    \ run, should create new abstract data types, each with its own operations. However,\
    \ what separates object-oriented programming from object-based programming is\
    \ inheritance. Single inheritance is when a class or subclass inherits methods\
    \ and attributes from one parent class.\n\n## Multiple Inheritance\n\nIn multiple\
    \ inheritance, a child class or subclass inherits methods and attributes from\
    \ multiple classes. For instance, a class `C` can inherit the features of both\
    \ class `A` and `B`, in the same way that a child inherits the characteristics\
    \ of both the mother and father. In some cases, a child class can inherit the\
    \ features and functionalities of more than two parent classes. There is no limit\
    \ to the number of parent classes from which a child class can inherit methods\
    \ and attributes. Note that while multiple inheritances is best known to reduce\
    \ program redundancy, it may also introduce a higher level of complexity and ambiguity\
    \ to the program and must be properly thought out during program design before\
    \ implementation.\n\n## Multilevel Inheritance\n\nWe have already established\
    \ that it is possible for a class in Python to inherit features of multiple parent\
    \ classes. When a class inherits the methods and functions of other classes that\
    \ also inherit them from other classes, the process is known as multilevel inheritance.\
    \ Like in C++ and other object-oriented programming languages, Python allows for\
    \ multilevel inheritance implemented at any depth.\n\n## Hierarchical Inheritance\n\
    \nA hierarchical inheritance occurs when more than one class is derived from a\
    \ single parent or base class. The features inherited by the sub-class or the\
    \ child class are included in the parent class. What sets hierarchical inheritance\
    \ apart from a multi-level inheritance is the order in which the relationship\
    \ between the classes is established. In multilevel inheritance, the order can\
    \ be haphazard and parent classes can inherit features from previous child classes.\n\
    \n## Why is Inheritance Useful in Python Programming?\n\nInheritance is a very\
    \ handy feature of object-oriented programming because it allows a programmer\
    \ to easily adhere to one of software development's most important rules: Don't\
    \ Repeat Yourself (DRY). Simply put, implementing class inheritance in your programs\
    \ is the most efficient way to get more done with fewer lines of code and less\
    \ repetition.\n\nInheritance will also compel you to pay closer attention to the\
    \ design phase of programming to ensure that you write a program code that is\
