    print command and run the dictionary named "user_one" and the system will print
    out these values for you.


    For dictionaries, we use the colon (:) sign between values. The object name is
    placed in a string followed by the colon sign. After that, we use either a string,
    a number (integer or float), or a Boolean value. You can use these to assign every
    object with its unique key pair. In case you are confused, the key pair is just
    another way of saying the value that is assigned to the object. For example, the
    key pair for "name" is "Sam."


    Now, let us try and see what happens if we add another "married" value. As soon
    as you are done typing, the system will highlight it. Note that you can still
    type in the new value and the system will continue to function. However, the value
    it will use will be the latest value it can find.


    This means that if you initially set the value for married to False and later
    change it to True, it will only display True.


    ```

    user_one = { #Dictionaries are represented by {}

    ''name'': ''Sam'',

