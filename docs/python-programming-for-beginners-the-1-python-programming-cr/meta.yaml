    \ {\n    printf(\"hello world\");\n    return 0;\n}\n```\n\nto the Python code\
    \ for doing the same:\n\n```\nprint(\"hello world\")\n# That's it. That's all\
    \ there is to it.\n```\n\n## Encapsulation\n\nThe last major concept in object-oriented\
    \ programming is that of encapsulation. This one's the easiest to explain. This\
    \ is the notion that common data should be put together, and that code should\
