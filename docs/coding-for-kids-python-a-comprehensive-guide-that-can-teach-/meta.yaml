    # 8.2 Packages in Python


    Modules are files that contain Python statements and definitions, such as function
    and class definitions, as we taught. Now, we will learn how to combine many modules
    into a package.

    A package consists of a directory containing Python files and a file named init
    .py. This indicates that Python will treat every directory inside the Python path
    that has a file named init .py as a package. Multiple modules can be combined
    into a Package.

    We do not normally keep all of our files in the same folder on our computers.
    For easy access, we use a well-organized structure of directories.

    Similar files are stored in the same directory; for example, all pictures could
    be maintained in the "media" directory. Python offers packages for directories
    and modules for files, similar to this.

    As our application program increases in size and contains more modules, we group
    relevant modules together in one package. This makes a project (software) simple
    to manage and understand conceptually. A Python package can have sub-packages
    and modules, just like a directory can have subdirectories and files.


    # Importing a Module from a Package


