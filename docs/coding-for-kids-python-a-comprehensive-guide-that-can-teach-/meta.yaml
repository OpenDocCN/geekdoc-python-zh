    \n## 第三章：字符串数据类型\n\n字符串是 Python 最流行的数据类型之一。我们可以通过将字符括在引号中来轻松创建它们。在 Python 中，单引号和双引号的处理方式相同。只需为变量赋值即可创建一个字符串。\n\
    \n在本章中，我们将讨论字符串的工作原理以及如何创建它。\n\n那么，让我们开始吧。\n\n### 3.1 什么是字符串？\n\n一连串的字符被称为字符串。字符不过是一个符号。例如，英语有\
    \ 26 个字符。计算机处理的是数字（二进制），而不是字符。虽然你可能在屏幕上看到字符，但它们在内部是以一系列 0 和 1 的形式存储和修改的。\n\n编码是将字符转换为数字的过程，解码则是相反的过程。一些最常用的编码包括\
    \ ASCII 和 Unicode。\n\nPython 中的字符串是 Unicode 字符的集合。Unicode 的创建是为了涵盖所有语言中的所有字符，并提供编码标准化。\n\
    \nPython 包含一个名为 \"str\" 的内置字符串类，它提供了许多有用的功能（有一个名为 \"string\" 的旧模块，你不应该使用）。字符串字面量可以用单引号或双引号括起来。但是，单引号更常用。反斜杠转义在单引号和双引号字面量中的工作方式相同。单引号字符串字面量可以轻松包含双引号，而双引号字符串字面量可以轻松包含单引号。字面量字符串可以跨越多行，但每行必须以反斜杠结尾以转义换行符。用三引号括起来的字符串字面量，如\
    \ `\"\"\"` 或 `'''`，可以跨越多行。\n\n### 字符串总结\n\n- Python 中的字符串是字符的集合。Python 字符串也是不可变的。\n\
    - 要生成字符串字面量，请使用引号，单引号或双引号均可。\n- 要在字符串中转义引号，请使用反斜杠字符。\n- 要转义反斜杠字符，请使用原始字符串 `r'...'`。\n\
    - 要在字面量字符串中插入替代变量，请使用 f-strings。\n- 通过将字面量字符串放在一起进行连接。使用 `+` 运算符连接字符串变量。\n- 要确定字符串的长度，请使用\
