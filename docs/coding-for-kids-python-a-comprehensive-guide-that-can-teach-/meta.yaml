    reuse. The Python interpreter and its substantial standard library are free to
    download and distribute in source or binary form for all major platforms.


    Python is popular among programmers because of the enhanced productivity it offers.
    The edit-test-debug cycle is extraordinarily rapid because there is no compilation
    step. Python scripts are simple to debug: a bug or improper input will never result
    in a segmentation fault. Instead, when the interpreter finds a mistake, it throws
    an exception. The interpreter prints a stack trace if the application fails to
    catch the exception. Inspection of local and global variables, execution of arbitrary
    expressions, setting breakpoints, stepping through the code one line at a time,
    and so on are all possible with a source-level debugger. The debugger is written
    in Python, demonstrating Python''s introspective capabilities.


