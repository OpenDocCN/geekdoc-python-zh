    \ jobholder:\n>>>     id = 22;\n>>>     name = \"Jennifer\"\n>>>     def display(self):\n\
    >>>         print(self.id, self.name)\n```\n\n在这个例子中，Self 被用作视角变量的来源，它指向当前的类对象。毫无疑问，它是方法定义中最重要的参数。但是，无论何时调用或定义方法，使用\
