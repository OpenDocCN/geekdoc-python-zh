  md: '# 2.3 Python''s Data Types


    A data type is a collection of operations and values that can be applied to the
    operands and values in question. Identifiers in Python can have a variety of properties.
    For example, a person''s name must be stored as a string, whereas their "id" must
    be stored as a whole number.

    Python supplies us with a variety of standard data types that describe the capabilities
    and techniques of each. The following are the most often used data types in Python.


    +   - Numbers

    - String

    - List

    - Tuple

    - Dictionary


    Now we will go through a few of them with some instances.


    +   - **Numbers**

    In Python, Number, as a data type, stores the numeric values. Python generates
    a numeric object whenever a number is assigned to a variable or identifier.


    **Example:**

    >>> c = 69

    >>> k = 96

    In the above-mentioned example, c and k are the numeric objects. The Python supports
    four different types of numeric data.


    +   - **Integer (int)**

    Int assigns integers, such as 82, 67, 28, etc.

    - **Long Integers (long)**

    Long integers are generally used for a higher number or range of integer values,
    such as -0x19397L, 988007X, etc.

    Moreover, Python allows using a lower-case "l" to be used with the long integers.
    But you must ensure that always an upper-case "L" is used for clarity and basic
    understanding.

    - **Float (float)**

    In Python programming, the float is used to store the floating-point values, such
    as 3.8, 98.6027, 78.982, etc.

    - **Complex**

    Complex, in Python, is used to support complex numbers, such as 16.024j, 5.2 +
    6.8j, etc.

    Moreover, a complex data type always consists of an ordered pair, such as c +
    ik where c and k denote the real and imaginary parts, respectively.


    +   - **String**

    In Python, we may describe string as a sequence of characters that is usually
    represented in quotation marks. Moreover, single, double, or even triple quotes
    can be used to define a string.

    String handling is a simple, understandable, and very clear task since there are
    many in-built functions and operators that are provided by Python to execute this
    task. For string handling in Python, the operator "+" is used to connect two strings
    as the operation.

    "Hi" + " Mr. David Robertson"

    Returns,

    "Hi Mr. David Robertson"

    Furthermore, the operator "*" is usually known as a repetition operator.

    "Mirror" * 2

    Returns,

    "Mirror Mirror"

    You may understand string handling in Python, with the help of the following example.


    +   - **Lists**

    In Python, we use lists as we use arrays in C or C++. However, the list may contain
    data of various types. The stored items in a list are usually separated by a comma
    "," and enclosed within square brackets "[ ]"'
