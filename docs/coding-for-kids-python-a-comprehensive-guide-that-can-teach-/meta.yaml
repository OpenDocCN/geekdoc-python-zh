  md: '# 10.2 Python Objects and Classes


    A class is a presumptive element that holds a collection of items. It is a virtual
    thing that takes on meaning when we compare it to objects and their attributes.
    As an example, consider a hospital. There are rooms, beds, medical equipment,
    and other amenities. The hospital structure is a class, and all of the structure''s
    components are its objects.


    Python is a computer language that focuses on objects. Object-oriented programming,
    in contrast to procedure-oriented programming, places a greater emphasis on objects.


    A collection of data (variables) and methods (functions) that act on that data
    is known as an object. A class, on the other hand, is a blueprint for that item.


    A class can be compared to a rough sketch (prototype) of a home. It covers all
    of the information regarding the floors, doors, and windows, among other things.
    We construct the house based on these descriptions. The item is a house.


    # Creating Python Classes


    The syntax for creating classes in Python is simple. A non-technical person can
    also create a class by just typing a few commands. The following is the syntax
    for creating a class.


    ```

    >>> class ClassName:

    >>> (statement_suite)

    ```


    Consider the following instructions for creating an eEmployee class with two fields:
    Employee id and name. A capacity show () is also included in the class, which
    is used to display information about the job holder.


    # Example:


    ```

    >>> class jobholder:

    >>> id = 22;

    >>> name = "Jennifer"

    >>>def display (self):

    >>> print(self.id,self.name)

    ```


    Self is used as a source of perspective variable in this case, and it refers to
    the current class object. It is, without a doubt, the most important argument
    in the capacity definition. However, whenever you are calling or defining capacity,
    using **self** is optional.


    # Creating a Class Instance


    A class should be instantiated if the class''s characteristics are to be used
    in another class. It may be instantiated by using the class name to call the class.


    # Example:


    ```

    >>> id number = 22;

    >>> name = "Lucifer"

    >>>print("ID number: %d \nname: %s"%(self.id,self.name))

    >>> emp = Employee()

    >>> emp.display()


    Output:

    ID number: 22

    Name: Lucifer

    ```


    # Creating an Object in Python'
