    # 5.1 What is a Dictionary?


    In Python, a dictionary is an unordered collection of data values that can be
    used to store data values like a map. Unlike other Data Types, which can only
    carry a single value as an element, Dictionary can hold a key: value pair. The
    dictionary includes a key-value pair to make it more efficient.


    Dictionaries are Python''s implementation of an associative array, which is more
    often known as a data structure. A dictionary is made up of a set of key-value
    pairs. Each key-value pair corresponds to a certain value.


    Curly braces {} can be used to define a dictionary by enclosing a comma-separated
    list of key-value pairs. Each key is separated from its associated value by a
    colon (:).


    # Dictionary Built-in Functions


    | Function | Description |

    | :--- | :--- |

    | all() | Return True if all keys of the dictionary are True (or if the dictionary
    is empty). |

    | any() | Return True if any key of the dictionary is true. If the dictionary
    is empty, return False. |

    | len() | Return the length (the number of items) in the dictionary. |

    | cmp() | Compares items of two dictionaries. (Not available in Python 3) |

    | sorted() | Return a new sorted list of keys in the dictionary. |


    # Creating a Python’s Dictionary


    A Dictionary is built in Python by enclosing a succession of entries in curly
    braces and separating them with a comma. Dictionary stores a pair of values, one
    of which is the Key and the other is the **key:value( )**pair element. In a dictionary,
    values can be of any data type and can be replicated, but keys cannot be copied
    and must be immutable.


    Dictionary keys are case-sensitive. Therefore two keys with the same name but
    different cases will be interpreted differently.


