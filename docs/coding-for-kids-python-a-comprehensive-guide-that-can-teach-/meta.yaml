- md: '## Chapter 2: Concept of Variables, Operators, and Data Types


    Python''s fundamental notions are data types, variables, and operators. They are
    considered the core building blocks of this high-level computer programming language
    as some operators. Typically, we use them to program our projects and to achieve
    the desired objectives. The most important of these three notions are data types,
    and no one can grasp Python programming without first mastering these three fundamental
    concepts.


    This chapter will talk about some of the necessary variables, operators, and data
    types in Python programming.


    ## 2.1 Variables in Python Programming


    In Python, identifiers are referred to as variables. A memory zone of a machine
    or a computer is referred to as a variable. Python does not require you to choose
    these types of identifiers because it is a comprehensive programming language
    that is capable of sorting its variables on its own.


    Furthermore, in Python programming, variables or identifiers are memory locations
    with distinct data kinds, such as integers or characters. Variables in Python
    are only manipulable and changeable since they are normally used in conjunction
    with a set of operations. Lower-case letters [such as a, b, c, d,..., z] are recommended
    for variable names.


    ### The Naming of Variables or Identifier


    Factors are locations of identifiers/variables. The literal coefficients and integers
    used in your Python application are created using variables. The following are
    the Python variable naming conventions.


    - A variable''s or identifier''s name must be a single letter or an underscore
    "_".

    - Aside from the fundamental letters, each of the remaining characters can be
    a letter (lower case "a-z," capitals "A-Z," underscores, or numbers "0-9").

    - The name of an identifier/variable must not contain any empty/void zones, as
    well as any unique or unusual characters such as "! @, #, percent, and *."

    - The name of a variable cannot be a word in Python syntax.

    - Variables are case-sensitive. The terms alien and Alien, for example, are not
    interchangeable.

    - Valid identifiers/variables include r203, _m, f90, and others.

    - Invalid identifiers/variables include 90, m percent 809, f90x69, and others.


    ### Multiple Assignments


    - Multiple Assignment is the term used when Python assigns a single location to
    multiple identifiers/variables. It can be used in two ways: defining a single
    location for multiple identifiers/variables at the same time or declaring multiple
    locations for multiple identifiers/variables at the same time.

    - At different times, assigning the same attributes or quantities to a large number
    of variables/identifiers.


    ### Example of assigning at the same variable


    Open the Python console or IDE and write the command to declare variables.


    ```

    >>> v=r=t=29

    >>> print

    >>> print (v, r, t)

    Output:

    When you type the command to print the value of variables, the output will be
    something like this.

    >>> 29, 29, 29

    ```


    ### Example of assigning at multiple variable


    Now write:


    ```

    >>> v, r, t = 27, 83, 49

    >>> print

    >>> print (v)

    >>> print (r)

    >>> print (t)

    Output:

    For output,

    When you will type your command

    >>> print (v)

    Your console will print "27"


    When you will type your command


    >>> print (r)

    Your console will print "83"


    When you will type your command


    >>> print (t)

    Your console will print "49"

    ```


    ## 2.2 Operators in Python


    Operators, in general, are syntactic tokens [language-specific] that necessitate
    certain further actions. Operators are usually developed from basic mathematical
    notions. For example, in Python programming, the "Sign of addition (+)" operator
    is employed. It is used to multiply two numbers together.


    Operators are a symbolic representation of a function in Python that performs
    a specific action between two operands to achieve desired results. Operators are
    thought of as the central concept of a program, on which your program is based
    on a specific computer programming language. Python''s various operators are represented
    as relational, arithmetic logic.


    Here are some highly used operators of Python that are used to perform specific
    operations:


    - Arithmetic Operators

    - Comparison Operators

    - Assignment Operators

    - Logical Operators

    - Bitwise Operators

    - Membership Operators

    - Identity Operators


    ### Python Arithmetic Operators


    To achieve the desired results, arithmetic operators are employed to conduct certain
    arithmetic operations.


    Two operands are taken in Arithmetic Operations, and activity between them is
    done through an operator, resulting in a specified, desired, and absolute consequence.


    Here are some of the most widely used and helpful arithmetic operators in Python.


    - Addition "+"

    - Subtraction "-"

    - Division "/"

    - Multiplication "*"

    - Remainder "%"


    ### Python Comparison Operators


    Comparison operators are used in Python programming to compare two values/operands
    and yield a Boolean type value, such as TRUE or FALSE.


    - `==` If and only if the values are logically true and equal in nature, this
    operator is used.

    - `!=` This operator is used when both values are true but unequal in nature.

    - `<=` You use this operator when your first value/operand is smaller than or
    equal to the second value/operand.

    - `>=` You use this operator when your first value/operand is greater than or
    equal to the second value/operand.

    - `<>` If the values/operands are not equal, this operator is employed.

    - `>` When your first value/operand is bigger than the second value/operand, you
    use this operator.

    - `<` When your first value/operand is less than the second value/operand, you
    use this operator.


    ### Python''s logical operators


    In our real lives, we sometimes have to make difficult decisions based on logical
    data, such as **True False**.


    Let''s imagine you get a phone call, and someone asks, "Are you at home?" Yes,
    you would have two options.


    - Yes! I am home.

    - No! I am not.


    In programming, this would fall under the 0 (false) and 1 (true) categories. This
    is referred to as logical data. Logical Operators are used in Python to evaluate
    expressions and make specific conclusions. These operators are quite useful for
    writing reasoning. The following is a list of logical operators in Python, along
    with a brief description to help you understand them better.


    ### AND operator


    The outcome will be true if an expression "c" is true and another expression "k"
    is true as well. The result will be false in all other cases. The table below
    may assist you in better understanding "And Operator."


    | c | k | c and k |

    |---|---|---|

    | True | True | True |

    | True | False | False |

    | False | True | False |

    | False | False | False |


    ### OR Operator


    If and only if both operands are false, this operator will return false. If one
    of the expressions "c" is true and the other "k" is false, the outcome will be
    true. The table below may assist you in better understanding the "Or Operator."


    | c | k | c or k |

    |---|---|---|

    | True | True | True |

    | True | False | True |

    | False | True | True |

    | False | False | False |


    ## 2.3 Python''s Data Types


    A data type is a collection of operations and values that can be applied to the
    operands and values in question. Identifiers in Python can have a variety of properties.
    For example, a person''s name must be stored as a string, whereas their "id" must
    be stored as a whole number.


    Python supplies us with a variety of standard data types that describe the capabilities
    and techniques of each. The following are the most often used data types in Python.


    - Numbers

    - String

    - List

    - Tuple

    - Dictionary


    Now we will go through a few of them with some instances.


    ### Numbers


    In Python, Number, as a data type, stores the numeric values. Python generates
    a numeric object whenever a number is assigned to a variable or identifier.


    **Example:**

    ```

    >>> c = 69

    >>> k = 96

    ```

    In the above-mentioned example, c and k are the numeric objects. The Python supports
    four different types of numeric data.


    - **Integer (int)**: Int assigns integers, such as 82, 67, 28, etc.

    - **Long Integers (long)**: Long integers are generally used for a higher number
    or range of integer values, such as -0x19397L, 988007X, etc. Moreover, Python
    allows using a lower-case "l" to be used with the long integers. But you must
    ensure that always an upper-case "L" is used for clarity and basic understanding.

    - **Float (float)**: In Python programming, the float is used to store the floating-point
    values, such as 3.8, 98.6027, 78.982, etc.

    - **Complex**: Complex, in Python, is used to support complex numbers, such as
    16.024j, 5.2 + 6.8j, etc. Moreover, a complex data type always consists of an
    ordered pair, such as c + ik where c and k denote the real and imaginary parts,
    respectively.


    ### String


    In Python, we may describe string as a sequence of characters that is usually
    represented in quotation marks. Moreover, single, double, or even triple quotes
    can be used to define a string.


    String handling is a simple, understandable, and very clear task since there are
    many in-built functions and operators that are provided by Python to execute this
    task. For string handling in Python, the operator "+" is used to connect two strings
    as the operation.


    ```

    "Hi" + " Mr. David Robertson"

    Returns,

    "Hi Mr. David Robertson"

    ```


    Furthermore, the operator "*" is usually known as a repetition operator.


    ```

    "Mirror" * 2

    Returns,

    "Mirror Mirror"

    ```


    You may understand string handling in Python, with the help of the following example.


    ### Lists


    In Python, we use lists as we use arrays in C or C++. However, the list may contain
    data of various types. The stored items in a list are usually separated by a comma
    "," and enclosed within square brackets "[ ]".'
  mdcn: '## 第二章：变量、运算符和数据类型的概念


    Python 的基本概念是数据类型、变量和运算符。它们被视为这门高级计算机编程语言的核心构建块，与某些运算符一样。通常，我们使用它们来编写项目程序并实现预期目标。这三个概念中最重要的就是数据类型，不先掌握这三个基本概念，就无法精通
    Python 编程。


    本章将讨论 Python 编程中一些必要的变量、运算符和数据类型。


    ## 2.1 Python 编程中的变量


    在 Python 中，标识符被称为变量。机器或计算机的一个内存区域被称为变量。Python 不需要你选择这些类型的标识符，因为它是一种功能全面的编程语言，能够自行对其变量进行分类。


    此外，在 Python 编程中，变量或标识符是具有不同数据类型的内存位置，例如整数或字符。Python 中的变量是可操作和可更改的，因为它们通常与一组操作结合使用。建议使用小写字母
    [例如 a, b, c, d,..., z] 作为变量名。


    ### 变量或标识符的命名


    因子是标识符/变量的位置。你的 Python 应用程序中使用的字面系数和整数是使用变量创建的。以下是 Python 变量命名约定。


    - 变量或标识符的名称必须是单个字母或下划线 "_"。

    - 除了基本字母外，其余字符可以是字母（小写 "a-z"、大写 "A-Z"、下划线或数字 "0-9"）。

    - 标识符/变量的名称不得包含任何空白/空区域，以及任何特殊或异常字符，如 "! @, #, 百分号, 和 *"。

    - 变量的名称不能是 Python 语法中的关键字。

    - 变量区分大小写。例如，术语 alien 和 Alien 不可互换。

    - 有效的标识符/变量包括 r203, _m, f90 等。

    - 无效的标识符/变量包括 90, m percent 809, f90x69 等。


    ### 多重赋值


    - 多重赋值是指 Python 将单个位置分配给多个标识符/变量时使用的术语。它可以通过两种方式使用：同时为多个标识符/变量定义单个位置，或同时为多个标识符/变量声明多个位置。

    - 在不同时间，将相同的属性或数量分配给大量变量/标识符。


    ### 在同一变量上赋值的示例


    打开 Python 控制台或 IDE，编写声明变量的命令。


    ```

    >>> v=r=t=29

    >>> print

    >>> print (v, r, t)

    输出：

    当你输入打印变量值的命令时，输出将类似于这样。

    >>> 29, 29, 29

    ```


    ### 在多个变量上赋值的示例


    现在编写：


    ```

    >>> v, r, t = 27, 83, 49

    >>> print

    >>> print (v)

    >>> print (r)

    >>> print (t)

    输出：

    对于输出，

    当你输入你的命令时

    >>> print (v)

    你的控制台将打印 "27"


    当你输入你的命令时


    >>> print (r)

    你的控制台将打印 "83"


    当你输入你的命令时


    >>> print (t)

    你的控制台将打印 "49"

    ```


    ## 2.2 Python 中的运算符


    运算符通常是语法标记 [特定于语言]，需要某些进一步的操作。运算符通常源于基本的数学概念。例如，在 Python 编程中，使用了 "加号 (+)" 运算符。它用于将两个数字相乘。


    运算符是 Python 中函数的符号表示，它在两个操作数之间执行特定操作以实现预期结果。运算符被认为是程序的核心概念，你的程序基于特定的计算机编程语言。Python
    的各种运算符表示为关系、算术逻辑。


    以下是一些常用的 Python 运算符，用于执行特定操作：


    - 算术运算符

    - 比较运算符

    - 赋值运算符

    - 逻辑运算符

    - 位运算符

    - 成员运算符

    - 身份运算符


    ### Python 算术运算符


    为了实现预期结果，算术运算符用于执行某些算术运算。


    算术运算中取两个操作数，并通过运算符在它们之间进行活动，产生指定的、预期的和绝对的结果。


    以下是 Python 中一些最广泛使用和有用的算术运算符。


    - 加法 "+"

    - 减法 "-"

    - 除法 "/"

    - 乘法 "*"

    - 余数 "%"


    ### Python 比较运算符


    比较运算符在 Python 编程中用于比较两个值/操作数，并产生布尔类型值，例如 TRUE 或 FALSE。


    - `==` 当且仅当值在逻辑上为真且性质相等时，使用此运算符。

    - `!=` 当两个值都为真但性质不相等时，使用此运算符。

    - `<=` 当你的第一个值/操作数小于或等于第二个值/操作数时，使用此运算符。

    - `>=` 当你的第一个值/操作数大于或等于第二个值/操作数时，使用此运算符。

    - `<>` 如果值/操作数不相等，则使用此运算符。

    - `>` 当你的第一个值/操作数大于第二个值/操作数时，使用此运算符。

    - `<` 当你的第一个值/操作数小于第二个值/操作数时，使用此运算符。


    ### Python 的逻辑运算符


    在我们的现实生活中，我们有时必须根据逻辑数据做出困难的决定，例如 **True False**。


    让我们想象你接到一个电话，有人问："你在家吗？" 是的，你有两个选择。


    - 是的！我在家。

    - 不！我不在。


    在编程中，这将属于 0（假）和 1（真）的类别。这被称为逻辑数据。Python 中使用逻辑运算符来评估表达式并做出特定结论。这些运算符对于编写推理非常有用。以下是
    Python 中逻辑运算符的列表，以及简要说明以帮助你更好地理解它们。


    ### AND 运算符


    如果表达式 "c" 为真且另一个表达式 "k" 也为真，则结果将为真。在所有其他情况下，结果将为假。下表可能有助于你更好地理解 "And 运算符"。


    | c | k | c and k |

    |---|---|---|

    | True | True | True |

    | True | False | False |

    | False | True | False |

    | False | False | False |


    ### OR 运算符


    当且仅当两个操作数都为假时，此运算符将返回假。如果表达式 "c" 之一为真而另一个 "k" 为假，则结果将为真。下表可能有助于你更好地理解 "Or 运算符"。


    | c | k | c or k |

    |---|---|---|

    | True | True | True |

    | True | False | True |

    | False | True | True |

    | False | False | False |


    ## 2.3 Python 的数据类型


    数据类型是可应用于相关操作数和值的操作和值的集合。Python 中的标识符可以具有多种属性。例如，一个人的姓名必须存储为字符串，而其 "id" 必须存储为整数。


    Python 为我们提供了多种标准数据类型，描述了每种类型的功能和技术。以下是 Python 中最常用的数据类型。


    - 数字

    - 字符串

    - 列表

    - 元组

    - 字典


    现在我们将通过一些实例来介绍其中几种。


    ### 数字


    在 Python 中，数字作为一种数据类型，存储数值。每当将数字分配给变量或标识符时，Python 就会生成一个数字对象。


    **示例：**

    ```

    >>> c = 69

    >>> k = 96

    ```

    在上述示例中，c 和 k 是数字对象。Python 支持四种不同类型的数字数据。


    - **整数 (int)**：Int 赋值整数，例如 82, 67, 28 等。

    - **长整数 (long)**：长整数通常用于较大数字或整数值范围，例如 -0x19397L, 988007X 等。此外，Python 允许使用小写 "l"
    与长整数一起使用。但你必须确保始终使用大写 "L" 以保持清晰和基本理解。

    - **浮点数 (float)**：在 Python 编程中，浮点数用于存储浮点值，例如 3.8, 98.6027, 78.982 等。

    - **复数**：Python 中的复数用于支持复数，例如 16.024j, 5.2 + 6.8j 等。此外，复数数据类型总是由一个有序对组成，例如 c +
    ik，其中 c 和 k 分别表示实部和虚部。


    ### 字符串


    在 Python 中，我们可以将字符串描述为通常用引号表示的字符序列。此外，可以使用单引号、双引号甚至三引号来定义字符串。


    字符串处理是一个简单、易懂且非常清晰的任务，因为 Python 提供了许多内置函数和运算符来执行此任务。对于 Python 中的字符串处理，运算符 "+"
    用于连接两个字符串作为操作。


    ```

    "Hi" + " Mr. David Robertson"

    返回，

    "Hi Mr. David Robertson"

    ```


    此外，运算符 "*" 通常被称为重复运算符。


    ```

    "Mirror" * 2

    返回，

    "Mirror Mirror"

    ```


    你可以借助以下示例来理解 Python 中的字符串处理。


    ### 列表


    在 Python 中，我们使用列表就像在 C 或 C++ 中使用数组一样。然而，列表可以包含各种类型的数据。列表中存储的项目通常用逗号 "," 分隔，并包含在方括号
    "[ ]" 内。'
