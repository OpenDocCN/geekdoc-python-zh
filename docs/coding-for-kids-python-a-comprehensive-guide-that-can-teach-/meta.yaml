  md: "# 7.2 Scope of Variable\n\nNot every variable is accessible from every portion\
    \ of our program, and not every variable exists for the same amount of time. How\
    \ a variable is defined determines where it is accessible and how long it exists.\
    \ The area of a program where a variable is accessible is called a scope, and\
    \ the period the variable exists is called lifetime.\n\nA global variable is a\
    \ variable that is defined in the main body of a file. It will be visible throughout\
    \ the file, as well as in any file that imports it. Because of their wide-ranging\
    \ impacts, global variables can have unforeseen repercussions, which is why we\
    \ should nearly never utilize them. The global namespace should only contain things\
    \ that are intended to be used globally, such as functions and classes.\n\nA variable\
    \ defined within a function is considered local to that function. It is available\
    \ from the beginning of the function until the finish, and it exists for as long\
    \ as the function is running. The names of the parameters in the function specification\
    \ act like local variables, but they include the values that we provide into the\
    \ function when we call it. When we use the assignment operator (=) within a function,\
    \ it creates a new local variable by default unless a variable with the same name\
    \ already exists in the local scope.\n\nHere is an example of variables in different\
    \ scopes:\n\n```\n# This is a global variable\na = 0\n\nif a == 0:\n    # This\
    \ is still a global variable\n    b = 1\n\ndef my_function(c):\n    # this is\
    \ a local variable\n    d = 3\n    print(c)\n    print(d)\n\n# Now we call the\
