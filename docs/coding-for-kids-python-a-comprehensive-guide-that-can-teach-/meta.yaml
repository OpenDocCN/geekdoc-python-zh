    # 1.1 What is Python?


    Python is a high-level programming language that is interpreted and object-oriented.
    Its high-level built-in data structures, together with dynamic typing and dynamic
    binding, make it ideal for Rapid Application Development and scripting or glue
    language for connecting existing components. Python''s concise, easy-to-learn
