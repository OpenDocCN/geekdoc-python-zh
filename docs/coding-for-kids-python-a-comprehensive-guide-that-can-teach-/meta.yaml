    # Chapter 3: Strings Data Type


    Strings are one of Python''s most popular data types. We can easily make them
    by enclosing characters in quotation marks. Single quotes are treated the same
    as double quotes in Python. Assigning a value to a variable is all it takes to
    make a string.


    In this chapter, we will discuss how string works and how we can create it.


    So Let’s get started.


    # 3.1 What is a String?


    A succession of characters is known as a string. A character is nothing more than
    a symbol. The English language, for example, has 26 characters. Numbers are what
    computers work with, not characters (binary). Although you may see characters
    on your screen, they are stored and modified inside as a series of 0s and 1s.


    Encoding is the process of converting a character to a number, and decoding is
    the reverse procedure. Some of the most often used encodings include ASCII and
    Unicode.


    A string in Python is a collection of Unicode characters. Unicode was created
    to encompass all characters in all languages and offer encoding standardization.


    Python contains a built-in string class called "str" that offers a number of useful
    capabilities (there is an older module named "string" which you should not use).
    Single or double quotes can be used to surround string literals. However, single
    quotes are more popular. Backslash escapes work in both single and double-quoted
    literals in the same way. A single-quoted string literal can easily include double
    quotes, while a double-quoted string literal can easily contain single quotes.
    A literal string can span multiple lines, but each line must conclude with a backslash
    to escape the newline. String literals enclosed in triple quotes, such as """
    or '''''', can span multiple lines.


    # Summarizing String


    +   - A string in Python is a collection of characters. Python strings are also
    immutable.

    - To produce string literals, use quotes, either single-quotes or double-quotes.

    - To escape quotes in strings, use the backslash character.

    - To escape the backslash character, use raw strings r''...''.

    - To insert substitute variables in literal strings, use f-strings.

    - Concatenate literal strings by putting them next to one other. Concatenate string
    variables with the + operator.

    - To determine the length of a string, use the len() function.

    - To access the character at point n of the string str, use the str[n] function.

    - To extract a substring from a string, use slicing.


    # 3.2 Creating String


    # How do you Make a String in Python?


    Strings are formed by enclosing characters within single or double quotations.
    In Python, triple quotes can be used to represent multiline strings and docstrings,
    but they are most commonly used to represent multiline strings and docstrings.'
