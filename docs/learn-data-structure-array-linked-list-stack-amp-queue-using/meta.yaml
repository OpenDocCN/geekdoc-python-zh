  md: "```\npython\nclass Stack():\n    def __init__(self):\n        self.stack =\
    \ []\n\n    def push(self, val):\n        self.stack.append(val)\n\n    def pop(self):\n\
    \        self.stack.pop()\n\n    def peek(self):\n        x = len(self.stack)\n\
    \        return self.stack[x-1]\n```"
