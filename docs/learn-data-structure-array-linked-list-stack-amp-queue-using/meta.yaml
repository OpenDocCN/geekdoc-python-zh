  md: '# Chapter 5 : Queue


    Queue is a data structure which stores data elements. In this data elements are
    inserted from one end (**rear** ) and deletion is performed from the other end
    (**front** ). For example: Let us consider a drive-through car wash line.


    ![](img/591d9c11b694572e0eabb212be0ec9cf_45_0.png)


    The first car which enters the line gets washed first and they leave. Then the
    second car is washed and then the third car. Similarly in **queue** , the first
    data element inserted gets removed first and the last data element inserted gets
    removed last. Hence **queue** is called **First in First Out (FIFO)** or **Last
    In Last Out (LILO)** list .'
