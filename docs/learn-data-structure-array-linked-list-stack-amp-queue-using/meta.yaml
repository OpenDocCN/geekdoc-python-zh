  md: '# Chapter 4 : Stack


    A stack is a data structure which is used for storing data element. For example:
    Let us consider that in a kitchen cabinet, plates **a**, **b**, **c**, **d** are
    stacked one on the another as shown in the image below.


    ![](img/591d9c11b694572e0eabb212be0ec9cf_39_0.png)


    Plate **a** is the first one to go in and plate **d** is the last one to enter
    the cabinet. When we want to use a plate, we usually take plate **d** and it is
    the first plate to be removed and plate **a** is the last one to be removed.


    This concept is similar to a data structure **stack**. The first data element
    inserted into the **stack** (*plate a in the above example*) is the last one to
    be removed and the last element inserted into the **stack** (*plate d of above
    example*) is the first one to be removed. Hence **stack** is called **Last In
    First Out (LIFO)** or **First In Last Out (FILO)** list. The insertion and deletion
    always occurs from one end and that is the **top**.'
  merge: -1
  pgno: 39
- img_proc: true
  md: '![](img/591d9c11b694572e0eabb212be0ec9cf_40_0.png)


    **NOTE:** The data elements are pushed and popped from the **top** of the **stack**
    which has a special index value of -1. When the stack is empty the index value
    of **top** is -1.'
