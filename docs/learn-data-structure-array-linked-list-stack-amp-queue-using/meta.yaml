- md: "First Edition\n\n## LEARN DATA STRUCTURE ARRAY LINKED LIST STACK QUEUE USING\
    \ PYTHON IN 5 MINUTES\n\nS. BASU\n\nCopyright © 2021 S Basu\nAll rights reserved.\n\
    \n## Disclaimer:\n\nThe information and materials presented here are for educational\
    \ purposes only. Every effort has been made to make this book as complete and\
    \ as accurate as possible but no warranty or fitness is implied. The information\
    \ provided is on an \"as is\" basis. The ideas and opinions expressed are of the\
    \ author's own imagination and the author is not affiliated to any organization,\
    \ school or educational discipline and will not be held accountable or liable\
    \ for any inadvertent misrepresentation.\n\n## Contents\n\n- Chapter 1 : Few Important\
    \ Python Basics\n    - 1.1 : What is a Python module?\n    - 1.2 : What is a Python\
    \ function?\n    - 1.3 : What is a Python class?\n- Chapter 2 : Array\n- Chapter\
    \ 3 : Linked List\n    - 3.1 : Creating a Linked List & displaying its values\n\
    \    - 3.2 : Insert a node in the beginning of the Linked List\n    - 3.3 : Insert\
    \ a node in the middle of the Linked List\n    - 3.4 : Insert a node at the end\
    \ of the Linked List\n    - 3.5 : Deletion\n    - 3.6 : Types of Linked List\n\
    \    - 3.7 : Difference between a Array and a Linked List\n- Chapter 4 : Stack\n\
    - Chapter 5 : Queue\n\n## Chapter 1 : Few Important Python Basics\n\nBefore we\
    \ start learning about data structure related topics like linked list, array,\
    \ stack and queue, we first need to get an understanding about a few python basics\
    \ like how to create a python module, run a python code and what is a python function\
    \ or a python class.\n\nSo let us first review these python topics.\n\n### 1.1\
    \ : What is a Python module?\n\n- Python module is a Python file that contains\
    \ functions, classes, and variables that group a logical functionality together.\n\
    - Modules can be **imported** for use in code.\n\nLet’s create a simple Python\
    \ file or module,\n\n- Open **Notepad++** and create a new file (*hello_world*)\
    \ and save the file with `.py` extension\n\n![](img/591d9c11b694572e0eabb212be0ec9cf_5_0.png)\n\
    \nInside ***hello_world.py*** file, write one line of code:\n\n```\nprint(\"Hello\
    \ World\")\n```\n\n> **What is print( ) function in Python?**\n\n**print( )**\
    \ function displays the output to the screen\n\nNow let's run the above piece\
    \ of code.\nOpen command prompt -> Go to the **hello_world.py** file location\
    \ and type the following command:\n**python** *file_name* **.py**\n\n![](img/591d9c11b694572e0eabb212be0ec9cf_6_0.png)\n\
    \nThe output displays\n\n- Now let's create another Python file and name it **test.py**\n\
    \n![](img/591d9c11b694572e0eabb212be0ec9cf_6_1.png)\n\nIn **test.py** file, simply\
    \ **import** the **hello_world** module created above.\n\n```\nimport hello_world\n\
    ```\n\nNow run this file.\nOpen command prompt -> Go to the **test.py** file location\
    \ and write the following command:\n**python test.py**\n\n![](img/591d9c11b694572e0eabb212be0ec9cf_7_0.png)\n\
    \nWe see that the **test** module prints out “*Hello World*” output from **hello_world**\
    \ module.\n\n> **What is import statement in Python?**\n\n**import** statement\
    \ in Python allows a Python file or module to access all the codes present in\
    \ another Python file or module.\n\n### 1.2 : What is a Python function?\n\nPython\
    \ Functions are just like Java methods. It is a block of codes performing certain\
    \ task.\n\nSyntax:\n\n```\ndef function_name() :\n    ....... \n```\n\n### Example:\n\
    \n```\nusername = \"John123\"\ndef validate_username(uname):\n    if uname ==\
    \ \"John123\":\n        print(\"Hello John\")\n    else:\n        print(\"Wrong\
    \ username\")\nvalidate_username(username)\n```\n\n### Code Explanation:\n\n-\
    \ In the above piece of code, we created a **function validate_username** with\
    \ parameter **uname**. If the argument is \"*John123*\", the **function** prints\
    \ \"*Hello John*\" or else it will print \"*Wrong username*\".\n- To call any\
    \ function, we simply have to write the function name followed by parenthesis.\
    \ Within that parenthesis, we passed the value of **username** which is \"*John123*\"\
    \n\n### Output\n\n```\nC:\\Users\\...\\Python_script>functions.py\nHello John\n\
    ```\n\n> **Difference between parameter and argument**\n\nParameter is the variable\
    \ passed to a **function**. Example:\n\n**function** *function_name* ( *variable1*\
    \ , *variable2* ) :\n\n> Argument is the **value** assigned to the variables.\
    \ Example:\n*function_name* ( 123, \"Hello_World\" )\n\n### 1.3 : What is a Python\
    \ class?\n\n- Python is an **object oriented programming language**.\n- A **class**\
    \ is a “blueprint” for creating an **object** and like any other programming language\
    \ Python **class** contains attributes and methods.\n- Python **object** contains\
    \ the copy of all attributes and methods present within its **class**. To access\
    \ those properties **dot** operator ( . ) is used.\n    - The syntax for creating\
    \ a **class** is:\n\n```python\nclass class_name :\n    def __init__(self) :\n\
    \        ....\n    def method1 :\n        ....\n```\n\nThe syntax for creating\
    \ an **object** of a **class** is:\n\n```python\nclass Hello :\n    def __init__(self)\
    \ :\n        ................\n        ............\n```\n\n*h = Hello()* , where\
    \ **h** is the **object** of **class** *Hello*.\n\n> **What is def __init__ (self)?**\n\
    \n\"__init__\" is a reserved method in **Python** classes initializing the **object**'s\
    \ state. In Object Oriented concepts, it refers to the **constructor** of the\
    \ **class**. This method initializes the attributes of a **class** when an **object**\
    \ is created.\n\n**self** keyword helps to access the attributes of the class.\n\
    \n### **Example:**\n\n```\nclass Employee:\n    def __init__(self,id_num,name,age,address,salary):\n\
    \        self.id_num = id_num\n        self.name = name\n        self.age = age\n\
    \        self.address = address\n        self.salary = salary\n    def validation(self):\n\
    \        if (str(self.id_num) == \"123\" and self.name ==\"John\"):\n        \
    \    print(\"This is Jon and his age is\",self.age,\n            \",his address\
    \ is\",self.address,\n            \"and his salary is\", self.salary)\n      \
    \  else:\n            print(\"Not John\")\ne = Employee(123,\"John\",25,\"Texas\"\
    ,1000)\ne.validation()\n```\n\n### **Output**\n\n```\nC:\\Users\\Pinky\\Desktop\\\
    Python_script>classes.py\nThis is Jon and his age is 25 ,his address is Texas\
    \ and his salary is 1000\n```\n\n**Important points to note from the above piece\
    \ of code are:**\n\n1. A Python **Class** name should start with a capital letter.\n\
    2. Within the **__init__** method we declared different attributes of our **class\
    \ Employee** and passed those values to **self**.\n3. In our **validation()**\
    \ method we pass the argument **self** which helps to access all the attributes\
    \ of the **class Employee**.\n4. **str()** function helps to convert an integer\
    \ value to a string value.\n5. **and** keyword is the **logical and operator**\
    \ in Python.\n6. In **line 15** of the above code, we created an **object e**\
    \ and passed values into it.\n\n## Chapter 2 : Array\n\nAn Array is a collection\
    \ of items or elements all having the same datatypes. An element from an array\
    \ can only be accessed from its index value. Example: Let’s create an array of\
    \ cars.\n\n```\ncars = [\"Kia\", \"Toyota\", \"Ford\", \"Tesla\"]\n```\n\n| Index\
    \ | 0 | 1 | 2 | 3 |\n|---|---|---|---|---|\n| Value | Kia | Toyota | Ford | Tesla\
    \ |\n\nIn order to get the value **Ford** as output, we need to write `print (\
    \ cars [ 2 ] )`\n\n- In Python, a **List** is very similar to an **Array**. It\
    \ contains a list of elements separated by commas and its elements are written\
    \ with square brackets [ .... ].\n- A value from a **List** can be accessed from\
    \ its index value and the syntax is.\n\n```\nList_name [ index_num ]\n```\n\n\
    **Example:**\nCreate a new Python file (**variables.py**) and write the following\
    \ lines of code:\n\n```\nfruits = [\"apple\",\"orange\",\"banana\",\"mango\",\"\
    strawberry\",\"peaches\"]\nx = \"this apple is tasty\"\nprint(len(fruits))\nprint(fruits[2:4])\n\
    print(x[2:8])\n```\n\nAfter running the above piece of code, we get an output\
    \ of:\n\n```\nC:\\Users\\...\\Desktop\\Python_script>variables.py\n6\n['banana',\
    \ 'mango']\nis app\n```\n\n### Code explanation:\n\n- In the above piece of code,\
    \ **fruits** is a **List** containing 6 elements. The value at position 0 is \"\
    apple\", at position 1 is \"orange\" and so on.\n- **x** is a variable holding\
    \ a string value. The value at position 0 is \"t\", at position 1 is \"h\" and\
    \ so on.\n- **len()** function is used to get the length of the list.\n- In Line\
    \ 4 and 5 we are performing **Slicing operation**.\n    - **print ( fruits [ 2\
    \ : 4] )** means print elements from position 2 (including its value) to position\
    \ 4 (excluding its value).\n    - **print ( x [ 2 : 8 ] )** means print the values\
    \ of **x** (\"this apple is tasty\") from position 2 (including its value) to\
    \ position 8 (excluding its value).\n\n![](img/591d9c11b694572e0eabb212be0ec9cf_13_0.png)\n\
    \n**Output:** ['banana', 'mango']"
  mdcn: "第一版\n\n## 5分钟内使用Python学习数据结构：数组、链表、栈、队列\n\nS. BASU\n\n版权所有 © 2021 S Basu\n\
    保留所有权利。\n\n## 免责声明：\n\n此处提供的信息和材料仅供教育用途。我们已尽一切努力确保本书尽可能完整和准确，但不提供任何明示或暗示的保证或适用性。所提供的信息按“原样”基础提供。所表达的观点和意见均为作者个人想象，作者与任何组织、学校或教育机构无关，且不对任何无意的错误陈述承担责任。\n\
    \n## 目录\n\n- 第1章：几个重要的Python基础\n    - 1.1：什么是Python模块？\n    - 1.2：什么是Python函数？\n\
    \    - 1.3：什么是Python类？\n- 第2章：数组\n- 第3章：链表\n    - 3.1：创建链表并显示其值\n    - 3.2：在链表开头插入节点\n\
    \    - 3.3：在链表中间插入节点\n    - 3.4：在链表末尾插入节点\n    - 3.5：删除操作\n    - 3.6：链表的类型\n \
    \   - 3.7：数组与链表的区别\n- 第4章：栈\n- 第5章：队列\n\n## 第1章：几个重要的Python基础\n\n在开始学习与数据结构相关的主题（如链表、数组、栈和队列）之前，我们首先需要了解一些Python基础知识，例如如何创建Python模块、运行Python代码，以及什么是Python函数或Python类。\n\
    \n因此，让我们先回顾这些Python主题。\n\n### 1.1：什么是Python模块？\n\n- Python模块是一个Python文件，其中包含将逻辑功能组合在一起的函数、类和变量。\n\
    - 模块可以被**导入**以在代码中使用。\n\n让我们创建一个简单的Python文件或模块，\n\n- 打开**Notepad++**并创建一个新文件（*hello_world*），并将文件保存为`.py`扩展名\n\
    \n![](img/591d9c11b694572e0eabb212be0ec9cf_5_0.png)\n\n在***hello_world.py***文件中，编写一行代码：\n\
    \n```\nprint(\"Hello World\")\n```\n\n> **Python中的print( )函数是什么？**\n\n**print(\
    \ )**函数将输出显示到屏幕上\n\n现在让我们运行上面的代码。\n打开命令提示符 -> 转到**hello_world.py**文件位置并输入以下命令：\n\
    **python** *file_name* **.py**\n\n![](img/591d9c11b694572e0eabb212be0ec9cf_6_0.png)\n\
    \n输出显示\n\n- 现在让我们创建另一个Python文件并将其命名为**test.py**\n\n![](img/591d9c11b694572e0eabb212be0ec9cf_6_1.png)\n\
    \n在**test.py**文件中，只需**导入**上面创建的**hello_world**模块。\n\n```\nimport hello_world\n\
    ```\n\n现在运行此文件。\n打开命令提示符 -> 转到**test.py**文件位置并输入以下命令：\n**python test.py**\n\n\
    ![](img/591d9c11b694572e0eabb212be0ec9cf_7_0.png)\n\n我们看到**test**模块打印出了来自**hello_world**模块的“*Hello\
    \ World*”输出。\n\n> **Python中的import语句是什么？**\n\nPython中的**import**语句允许一个Python文件或模块访问另一个Python文件或模块中存在的所有代码。\n\
    \n### 1.2：什么是Python函数？\n\nPython函数类似于Java方法。它是一个执行特定任务的代码块。\n\n语法：\n\n```\ndef\
    \ function_name() :\n    ....... \n```\n\n### 示例：\n\n```\nusername = \"John123\"\
    \ndef validate_username(uname):\n    if uname == \"John123\":\n        print(\"\
    Hello John\")\n    else:\n        print(\"Wrong username\")\nvalidate_username(username)\n\
    ```\n\n### 代码解释：\n\n- 在上面的代码中，我们创建了一个带参数**uname**的**函数validate_username**。如果参数是“*John123*”，**函数**打印“*Hello\
    \ John*”，否则将打印“*Wrong username*”。\n- 要调用任何函数，我们只需编写函数名后跟括号。在该括号内，我们传递了**username**的值，即“*John123*”\n\
    \n### 输出\n\n```\nC:\\Users\\...\\Python_script>functions.py\nHello John\n```\n\
    \n> **参数与实参的区别**\n\n参数是传递给**函数**的变量。示例：\n\n**function** *function_name* ( *variable1*\
    \ , *variable2* ) :\n\n> 实参是分配给变量的**值**。示例：\n*function_name* ( 123, \"Hello_World\"\
    \ )\n\n### 1.3：什么是Python类？\n\n- Python是一种**面向对象的编程语言**。\n- **类**是创建**对象**的“蓝图”，与任何其他编程语言一样，Python**类**包含属性和方法。\n\
    - Python**对象**包含其**类**中存在的所有属性和方法的副本。要访问这些属性，使用**点**运算符（.）。\n    - 创建**类**的语法是：\n\
    \n```python\nclass class_name :\n    def __init__(self) :\n        ....\n    def\
    \ method1 :\n        ....\n```\n\n创建**类**的**对象**的语法是：\n\n```python\nclass Hello\
    \ :\n    def __init__(self) :\n        ................\n        ............\n\
    ```\n\n*h = Hello()*，其中**h**是**类***Hello*的**对象**。\n\n> **什么是def __init__ (self)？**\n\
    \n“__init__”是**Python**类中的一个保留方法，用于初始化**对象**的状态。在面向对象的概念中，它指的是**类**的**构造函数**。此方法在创建**对象**时初始化**类**的属性。\n\
    \n**self**关键字有助于访问类的属性。\n\n### **示例：**\n\n```\nclass Employee:\n    def __init__(self,id_num,name,age,address,salary):\n\
    \        self.id_num = id_num\n        self.name = name\n        self.age = age\n\
    \        self.address = address\n        self.salary = salary\n    def validation(self):\n\
    \        if (str(self.id_num) == \"123\" and self.name ==\"John\"):\n        \
    \    print(\"This is Jon and his age is\",self.age,\n            \",his address\
    \ is\",self.address,\n            \"and his salary is\", self.salary)\n      \
    \  else:\n            print(\"Not John\")\ne = Employee(123,\"John\",25,\"Texas\"\
    ,1000)\ne.validation()\n```\n\n### **输出**\n\n```\nC:\\Users\\Pinky\\Desktop\\\
    Python_script>classes.py\nThis is Jon and his age is 25 ,his address is Texas\
    \ and his salary is 1000\n```\n\n**从上面的代码中需要注意的重要点：**\n\n1. Python**类**名应以大写字母开头。\n\
    2. 在**__init__**方法中，我们声明了**类Employee**的不同属性，并将这些值传递给**self**。\n3. 在我们的**validation()**方法中，我们传递了参数**self**，它有助于访问**类Employee**的所有属性。\n\
    4. **str()**函数有助于将整数值转换为字符串值。\n5. **and**关键字是Python中的**逻辑与运算符**。\n6. 在上面代码的**第15行**，我们创建了一个**对象e**并向其传递了值。\n\
    \n## 第2章：数组\n\n数组是具有相同数据类型的项目或元素的集合。数组中的元素只能通过其索引值访问。示例：让我们创建一个汽车数组。\n\n```\n\
    cars = [\"Kia\", \"Toyota\", \"Ford\", \"Tesla\"]\n```\n\n| 索引 | 0 | 1 | 2 | 3\
    \ |\n|---|---|---|---|---|\n| 值 | Kia | Toyota | Ford | Tesla |\n\n为了获得**Ford**作为输出，我们需要编写`print\
    \ ( cars [ 2 ] )`\n\n- 在Python中，**列表**与**数组**非常相似。它包含由逗号分隔的元素列表，其元素用方括号[ ....\
    \ ]编写。\n- **列表**中的值可以通过其索引值访问，语法是。\n\n```\nList_name [ index_num ]\n```\n\n**示例：**\n\
    创建一个新的Python文件（**variables.py**）并编写以下代码：\n\n```\nfruits = [\"apple\",\"orange\"\
    ,\"banana\",\"mango\",\"strawberry\",\"peaches\"]\nx = \"this apple is tasty\"\
    \nprint(len(fruits))\nprint(fruits[2:4])\nprint(x[2:8])\n```\n\n运行上面的代码后，我们得到输出：\n\
    \n```\nC:\\Users\\...\\Desktop\\Python_script>variables.py\n6\n['banana', 'mango']\n\
    is app\n```\n\n### 代码解释：\n\n- 在上面的代码中，**fruits**是一个包含6个元素的**列表**。位置0的值是“apple”，位置1的值是“orange”，依此类推。\n\
    - **x**是一个保存字符串值的变量。位置0的值是“t”，位置1的值是“h”，依此类推。\n- **len()**函数用于获取列表的长度。\n- 在第4行和第5行，我们执行**切片操作**。\n\
    \    - **print ( fruits [ 2 : 4] )**表示打印从位置2（包括其值）到位置4（不包括其值）的元素。\n    - **print\
    \ ( x [ 2 : 8 ] )**表示打印**x**（“this apple is tasty”）从位置2（包括其值）到位置8（不包括其值）的值。\n\n\
    ![](img/591d9c11b694572e0eabb212be0ec9cf_13_0.png)\n\n**输出：** ['banana', 'mango']"
