  - '[PAGE 38]


    | Array | Linked List |

    |---|---|

    | An array is a collection of data elements having a fixed size. It is static
    in nature | Linked List is dynamic in nature. |

    | In Array, accessing an element is faster. It helps us to access any elements
    simply from its index value. Hence the time complexity is O(1) | In Linked List,
    we need to perform iteration to access any element. Hence the time complexity
    is O(n) |

    | In an Array, memory is allocated during compile time (Static memory allocation).
    | In Linked list memory is allocated during runtime (Dynamic memory allocation).
    Memory consumption is also more in linked lists compared to arrays and this is
    because each **node** contains data and a **pointer** which requires extra memory.
    |'
