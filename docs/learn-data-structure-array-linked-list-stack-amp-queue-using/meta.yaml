- md: "## Chapter 3 : Linked List\n\n- A Linked List is a **Linear Data Structure**\
    \ which is a collection of data elements or **nodes**.\n- Each **node** contains\
    \ a **data** and an **address** or **pointer** which points to the next **node**.\n\
    - The first node is called the Head and the last node is called the Tail. The\
    \ last node always points to NULL.\n\n![](img/591d9c11b694572e0eabb212be0ec9cf_16_0.png)\n\
    \n> **What is data structure?**\n> Data structure is the process of organizing\
    \ and storing the data.\n> It is classified into two types:\n> 1. **Linear Data\
    \ Structure** – In this type of data structure, the data elements are arranged\
    \ in a linear sequential order, but it is not compulsory to store the elements\
    \ sequentially. Example: Array, Linked List, Stacks & Queue.\n> 2. **Non-Linear\
    \ Data Structure** – In this type of data structure, the data elements are arranged\
    \ in a non-linear order. Example: Tree and graphs.\n\nLet's code..\n\n### 3.1\
    \ : Creating a Linked List & displaying its values\n\nOpen **Notepad++** and create\
    \ a new **python** file and name it ***linked_list.py*** and write the following\
    \ lines of code.\n\n```python\nclass Node():\n    def __init__(self,value):\n\
    \        self.value = value\n        self.next = None\n```\n\nIn the above piece\
    \ of code, we simply created the **Node class** which contains two attributes,\
    \ one is **value** or data of the linked list **node** and the other one is the\
    \ ***next*** **pointer** which points to the next **node** of the linked list.\n\
    For now the ***next*** **pointer** points to none.\n\nNow let's create the **Linked\
    \ List class**\n\n```python\nclass Node():\n    def __init__(self,value):\n  \
    \      self.value = value\n        self.next = None\n\nclass Linked_List():\n\
    \    def __init__(self):\n        self.head = None\n```\n\nThe **Linked_List class**\
    \ contains only one attribute **head** and for now the **head** is empty or **none**.\n\
    \nThe image below shows the order in which we will create our linked list.\n\n\
    ![](img/591d9c11b694572e0eabb212be0ec9cf_18_0.png)\n\n```\nHead = n1\nn1.next\
    \ = n2\nn2.next = n3\nn3 points to none or null\n```\n\n```python\nclass Node():\n\
    \    def __init__(self,value):\n        self.value = value\n        self.next\
    \ = None\n\nclass Linked_List():\n    def __init__(self):\n        self.head =\
    \ None\n\ns = Linked_List()\ns.head = Node(5)\nn2 = Node(6)\nn3 = Node(7)\nn2.next\
    \ = n3\ns.head.next = n2\nwhile s.head is not None:\n    print(s.head.value)\n\
    \    s.head = s.head.next\n```\n\n### Code explanation:\n\n- In line 8, we created\
    \ object **s** of **class Linked_List( )**.\n- In line 9, we created the first\
    \ **node** of the linked list using **Node class** and assigned that node to **head**.\n\
    \n**s.head** now act as an **object** of **class Node**\n\n- In line 10, we created\
    \ the second **node** of the linked list.\n- In line 11, we created the third\
    \ **node** of the linked list.\n- In line 12, we linked the second **node** and\
    \ the third **node** using ***next*** attribute of **class Node**.\n- In line\
    \ 13, we link the **head** with the second **node**.\n- From line 14 to line 16,\
    \ using **while loop**, we display the values of each **node** of the linked list.\n\
    \nNow let's save everything and run the python module.\n\nTo run the above piece\
    \ of code,\nOpen command prompt -> navigate to the python file location and run\
    \ using **python** command as shown in the screen shot below.\n\n![](img/591d9c11b694572e0eabb212be0ec9cf_20_0.png)\n\
    \n### 3.2 : Insert a node in the beginning of the Linked List\n\nLet us suppose\
    \ we want to assign a **node x** as the new **head** of the linked list as shown\
    \ in the image below.\n\n![](img/591d9c11b694572e0eabb212be0ec9cf_21_0.png)\n\n\
    In order to do this the following three steps are needed:\n\n1. **Step 1** : Move\
    \ the existing linked list (*suppose linked list z* ) and store it in a temporary\
    \ variable.\n2. **Step 2** : Create a new **node** and assign that **node** to\
    \ the **head**.\n3. **Step 3** : Now link the new **head** with the existing linked\
    \ list **z** with the help of *next* pointer.\n\nIn *linked_list.py* , add the\
    \ following **function** in **class Linked_List** .\n\n```python\ndef add_beginning(self,newVal):\n\
    \    temp = self.head\n    self.head = Node(newVal)\n    self.head.next = temp\n\
    ```\n\nNow let's call the newly created **function** .\n\n```python\ns.head =\
    \ Node(5)\n\nn2 = Node(6)\n\nn3 = Node(7)\n\nn2.next = n3\n\ns.head.next = n2\n\
    \ns.add_beginning(4)\n\nwhile s.head is not None:\n    print(s.head.value)\n \
    \   s.head = s.head.next\n```\n\nRun the above piece of code.\n\n![](img/591d9c11b694572e0eabb212be0ec9cf_22_0.png)\n\
    \n**Time Complexity** : Since we know in which position we need to add the new\
    \ **node** , so no iteration is required, hence the time complexity is **O(1)**\n\
    \n> **What is Time Complexity and Big-O notation?**\n>\n> **Time complexity**\
    \ denotes the amount of time taken by the code to execute.\n>\n> The **Big-O notation**\
    \ is the growth rate of a **function** . It usually provides the upper limit on\
    \ the growth rate of an algorithm or **function** .\n\n### 3.3 : Insert a node\
    \ in the middle of the Linked List\n\nSuppose we want to insert a new node **x**\
    \ after node **y** in the linked list as shown in the image below.\n\n![](img/591d9c11b694572e0eabb212be0ec9cf_23_0.png)\n\
    \nIn order to do this the following two steps are needed:\n\n**Step 1:** Node\
    \ **y** was previously pointing to **node a**. The **y node**'s *next* must be\
    \ removed and assigned to **x node**'s *next* making **node x** point to **node\
    \ a**.\n\n**Step 2:** **y node**'s *next* must point to **node x**.\n\nIn ***linked_list.py***,\
    \ add the following **function** in class **Linked_List**.\n\n```python\ndef add_middle(self,\
    \ node, newVal):\n    newNode = Node(newVal)\n    newNode.next = node.next\n \
    \   node.next = newNode\n```\n\nNow let's call the newly created **function**.\n\
    \n```python\ns.head = Node(5)\nn2 = Node(6)\nn3 = Node(7)\nn2.next = n3\ns.head.next\
    \ = n2\ns.add_beginning(4)\ns.add_middle(6, 6.5)\nwhile s.head is not None:\n\
    \    print(s.head.value)\n    s.head = s.head.next\n```\n\nRun the above piece\
    \ of code.\n\n```\nC:\\Users\\...>python linked_List.py\n4\n5\n6\n6.5\n7\n```\n\
    \n**Time Complexity** : In this case we have a reference **node** and know the\
    \ position in which we are inserting the new **node** , so the time complexity\
    \ is **O(1)**.\n\nIf we do not have a reference **node** and have to iterate through\
    \ the linked list to insert a **node** , in that case the time complexity is **O(n)**\
    \ , where **n** refers to the input size. For example, in a **list** , **n** refers\
    \ to the number of elements.\n\n### 3.4 : Insert a node at the end of the Linked\
    \ List\n\nSuppose we want to insert node **b** at the end of the linked list as\
    \ shown in the image below.\n\n![](img/591d9c11b694572e0eabb212be0ec9cf_25_0.png)\n\
    \nIn order to do this the following two steps are needed:\n\n**Step 1:** We need\
    \ to loop through the **pointers** and reach the end of the linked list. Once\
    \ the **pointer** *next* points to **none** , then stop the loop and return the\
    \ last **node** **a** of the linked list.\n\n**Step 2:** Now make the last **node\
    \ a** of the linked list point to the new **node b**\n\nIn *linked_list.py* ,\
    \ add the following **function** in **class Linked_List** .\n\n```python\ndef\
    \ add_end(self,newVal):\n    newNode = Node(newVal)\n    temp = self.head\n  \
    \  while temp.next:\n        temp = temp.next\n    temp.next = newNode\n```\n\n\
    Now let's call the newly created **function** ."
  mdcn: "## 第三章：链表\n\n- 链表是一种**线性数据结构**，它由数据元素或**节点**组成。\n- 每个**节点**包含一个**数据**和一个**地址**或**指针**，该指针指向下一个**节点**。\n\
    - 第一个节点称为头节点，最后一个节点称为尾节点。最后一个节点总是指向NULL。\n\n![](img/591d9c11b694572e0eabb212be0ec9cf_16_0.png)\n\
    \n> **什么是数据结构？**\n> 数据结构是组织和存储数据的过程。\n> 它分为两种类型：\n> 1. **线性数据结构** – 在这种数据结构中，数据元素按线性顺序排列，但元素不一定必须按顺序存储。例如：数组、链表、栈和队列。\n\
    > 2. **非线性数据结构** – 在这种数据结构中，数据元素按非线性顺序排列。例如：树和图。\n\n让我们开始编码吧。\n\n### 3.1：创建链表并显示其值\n\
    \n打开 **Notepad++**，创建一个新的 **python** 文件，命名为 ***linked_list.py***，并编写以下代码。\n\n\
    ```python\nclass Node():\n    def __init__(self,value):\n        self.value =\
    \ value\n        self.next = None\n```\n\n在上面的代码中，我们简单地创建了 **Node 类**，它包含两个属性，一个是链表**节点**的**值**或数据，另一个是\
    \ ***next*** **指针**，它指向链表的下一个**节点**。\n目前，***next*** **指针**指向 none。\n\n现在让我们创建\
    \ **Linked List 类**\n\n```python\nclass Node():\n    def __init__(self,value):\n\
    \        self.value = value\n        self.next = None\n\nclass Linked_List():\n\
    \    def __init__(self):\n        self.head = None\n```\n\n**Linked_List 类**只包含一个属性\
    \ **head**，目前 **head** 是空的或 **none**。\n\n下图显示了我们将创建链表的顺序。\n\n![](img/591d9c11b694572e0eabb212be0ec9cf_18_0.png)\n\
    \n```\nHead = n1\nn1.next = n2\nn2.next = n3\nn3 points to none or null\n```\n\
    \n```python\nclass Node():\n    def __init__(self,value):\n        self.value\
    \ = value\n        self.next = None\n\nclass Linked_List():\n    def __init__(self):\n\
    \        self.head = None\n\ns = Linked_List()\ns.head = Node(5)\nn2 = Node(6)\n\
    n3 = Node(7)\nn2.next = n3\ns.head.next = n2\nwhile s.head is not None:\n    print(s.head.value)\n\
    \    s.head = s.head.next\n```\n\n### 代码解释：\n\n- 在第 8 行，我们创建了 **Linked_List( )\
    \ 类**的对象 **s**。\n- 在第 9 行，我们使用 **Node 类**创建了链表的第一个**节点**，并将该节点赋值给 **head**。\n\n\
    **s.head** 现在充当 **Node 类**的一个**对象**。\n\n- 在第 10 行，我们创建了链表的第二个**节点**。\n- 在第 11\
    \ 行，我们创建了链表的第三个**节点**。\n- 在第 12 行，我们使用 **Node 类**的 ***next*** 属性将第二个**节点**和第三个**节点**连接起来。\n\
    - 在第 13 行，我们将 **head** 与第二个**节点**连接起来。\n- 从第 14 行到第 16 行，使用 **while 循环**，我们显示链表中每个**节点**的值。\n\
    \n现在让我们保存所有内容并运行 python 模块。\n\n要运行上面的代码，\n打开命令提示符 -> 导航到 python 文件位置，并使用 **python**\
    \ 命令运行，如下图所示。\n\n![](img/591d9c11b694572e0eabb212be0ec9cf_20_0.png)\n\n### 3.2：在链表开头插入一个节点\n\
    \n假设我们想将一个**节点 x** 作为链表的新**头节点**，如下图所示。\n\n![](img/591d9c11b694572e0eabb212be0ec9cf_21_0.png)\n\
    \n为了做到这一点，需要以下三个步骤：\n\n1. **步骤 1**：移动现有的链表（*假设为链表 z*）并将其存储在一个临时变量中。\n2. **步骤 2**：创建一个新的**节点**并将该**节点**赋值给\
    \ **head**。\n3. **步骤 3**：现在借助 *next* 指针将新的**head**与现有的链表 **z** 连接起来。\n\n在 *linked_list.py*\
    \ 中，在 **Linked_List 类**中添加以下**函数**。\n\n```python\ndef add_beginning(self,newVal):\n\
    \    temp = self.head\n    self.head = Node(newVal)\n    self.head.next = temp\n\
    ```\n\n现在让我们调用新创建的**函数**。\n\n```python\ns.head = Node(5)\n\nn2 = Node(6)\n\nn3\
    \ = Node(7)\n\nn2.next = n3\n\ns.head.next = n2\n\ns.add_beginning(4)\n\nwhile\
    \ s.head is not None:\n    print(s.head.value)\n    s.head = s.head.next\n```\n\
    \n运行上面的代码。\n\n![](img/591d9c11b694572e0eabb212be0ec9cf_22_0.png)\n\n**时间复杂度**：由于我们知道需要在哪个位置添加新的**节点**，因此不需要迭代，所以时间复杂度是\
    \ **O(1)**。\n\n> **什么是时间复杂度和大O表示法？**\n>\n> **时间复杂度**表示代码执行所需的时间量。\n>\n> **大O表示法**是**函数**的增长率。它通常提供算法或**函数**增长率的上限。\n\
    \n### 3.3：在链表中间插入一个节点\n\n假设我们想在链表中节点 **y** 之后插入一个新节点 **x**，如下图所示。\n\n![](img/591d9c11b694572e0eabb212be0ec9cf_23_0.png)\n\
    \n为了做到这一点，需要以下两个步骤：\n\n**步骤 1：** 节点 **y** 之前指向**节点 a**。必须移除 **y 节点**的 *next* 并将其赋值给\
    \ **x 节点**的 *next*，使**节点 x** 指向**节点 a**。\n\n**步骤 2：** **y 节点**的 *next* 必须指向**节点\
    \ x**。\n\n在 ***linked_list.py*** 中，在 **Linked_List 类**中添加以下**函数**。\n\n```python\n\
    def add_middle(self, node, newVal):\n    newNode = Node(newVal)\n    newNode.next\
    \ = node.next\n    node.next = newNode\n```\n\n现在让我们调用新创建的**函数**。\n\n```python\n\
    s.head = Node(5)\nn2 = Node(6)\nn3 = Node(7)\nn2.next = n3\ns.head.next = n2\n\
    s.add_beginning(4)\ns.add_middle(6, 6.5)\nwhile s.head is not None:\n    print(s.head.value)\n\
    \    s.head = s.head.next\n```\n\n运行上面的代码。\n\n```\nC:\\Users\\...>python linked_List.py\n\
    4\n5\n6\n6.5\n7\n```\n\n**时间复杂度**：在这种情况下，我们有一个参考**节点**，并且知道插入新**节点**的位置，所以时间复杂度是\
    \ **O(1)**。\n\n如果我们没有参考**节点**，并且必须遍历链表来插入一个**节点**，那么时间复杂度是 **O(n)**，其中 **n** 指的是输入大小。例如，在一个**列表**中，**n**\
