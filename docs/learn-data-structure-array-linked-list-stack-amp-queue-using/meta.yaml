    \n## 3.7 : Difference between a Array and a Linked List\n\n| Array | Linked List\
    \ |\n|---|---|\n| An array is a collection of data elements having a fixed size.\
    \ It is static in nature | Linked List is dynamic in nature. |\n| In Array, accessing\
    \ an element is faster. It helps us to access any elements simply from its index\
    \ value. Hence the time complexity is O(1) | In Linked List, we need to perform\
    \ iteration to access any element. Hence the time complexity is O(n) |\n| In an\
    \ Array, memory is allocated during compile time (Static memory allocation). |\
    \ In Linked list memory is allocated during runtime (Dynamic memory allocation).\
    \ Memory consumption is also more in linked lists compared to arrays and this\
    \ is because each **node** contains data and a **pointer** which requires extra\
    \ memory. |\n\n## Chapter 4 : Stack\n\nA stack is a data structure which is used\
    \ for storing data element. For example: Let us consider that in a kitchen cabinet,\
    \ plates **a**, **b**, **c**, **d** are stacked one on the another as shown in\
    \ the image below.\n\n![](img/591d9c11b694572e0eabb212be0ec9cf_39_0.png)\n\nPlate\
    \ **a** is the first one to go in and plate **d** is the last one to enter the\
    \ cabinet. When we want to use a plate, we usually take plate **d** and it is\
    \ the first plate to be removed and plate **a** is the last one to be removed.\n\
    \nThis concept is similar to a data structure **stack**. The first data element\
    \ inserted into the **stack** (*plate a in the above example*) is the last one\
    \ to be removed and the last element inserted into the **stack** (*plate d of\
    \ above example*) is the first one to be removed. Hence **stack** is called **Last\
    \ In First Out (LIFO)** or **First In Last Out (FILO)** list. The insertion and\
    \ deletion always occurs from one end and that is the **top**."
