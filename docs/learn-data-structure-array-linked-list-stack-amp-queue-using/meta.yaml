  md: '# Chapter 3 : Linked List


    +   - A Linked List is a **Linear Data Structure** which is a collection of data
    elements or **nodes** .

    - Each **node** contains a **data** and an **address** or **pointer** which points
    to the next **node** .

    - The first node is called the Head and the last node is called the Tail. The
    last node always points to NULL.


    ![](img/591d9c11b694572e0eabb212be0ec9cf_16_0.png)


    > **What is data structure?**

    Data structure is the process of organizing and storing the data.

    It is classified into two types:

    1. **Linear Data Structure** – In this type of data structure, the data elements
    are arranged in a linear sequential order, but it is not compulsory to store the
    elements sequentially. Example: Array, Linked List, Stacks & Queue.

    2. **Non-Linear Data Structure** – In this type of data structure, the data elements
    are arranged in a non-linear order. Example: Tree and graphs.'
