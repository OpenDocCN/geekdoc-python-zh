- md: 'you to write more efficient, cleaner, and optimized code, regardless of the
    complexity of the problem you are trying to solve.


    ## Lists and Tuples


    Lists are ordered and mutable data structures containing elements of different
    types. They are created using square brackets [] and separating the elements with
    commas.


    ```

    my_list = [1, 2, 3, ''four'', 5.0]

    ```


    ## Characteristics


    - **Mutability:** The elements of a list can be modified after the list is created.

    - **Versatility:** Lists can contain numbers, strings, other lists, and various
    other data types.

    - **Access:** Items can be accessed via their index.

    - **Use:** They are used when there is a need for an ordered collection of items
    that can be modified over time, such as a list of students and a shopping list.


    ## Tuples


    Tuples are like lists, but they are immutable. This means that, once defined,
    they cannot be modified. They are created using round brackets () and separating
    the elements with commas.


    ```

    my_tuple = (1, 2, 3, ''four'', 5.0)

    ```


    ## Characteristics


    - **Immutability:** The elements of a tuple cannot be modified after creation.

    - **Versatility:** Like lists, tuples can contain elements of different types.

    - **Access:** Items can be accessed via their index.

    - **Usage:** They are ideal when you need a neat collection of items that do not
    need to be changed, such as a pair of geographic coordinates and a date.


    Both lists and tuples are fundamental data structures in Python that store ordered
    collections of elements. The main difference concerns mutability: while lists
    can be modified, tuples remain immutable once defined. The choice between lists
    and tuples will depend on the specific needs of your code and how you intend to
    use these data collections.


    ## Sets and Dictionaries


    The set is an unordered, unindexed collection of unique items.

    Sets are created using curly braces {} or the set() function.


    ```

    my_set = {1, 2, 3}

    other_set = set([2, 3, 4])

    ```


    ## Characteristics


    - **Unique Items:** Each item in a set is unique.

    - **Unordered:** The elements in a set have no specific order.

    - **Mutable:** The sets themselves are mutable, but the elements within them must
    be immutable.

    - **Usage:** Sets are helpful for operations such as union, intersection, and
    difference between collections and for removing duplicates from a collection.


    Dictionaries are unordered collections of key-value pairs.

    Created with curly braces {}, with keys and values separated by :.


    ```

    my_dictionary = {''one'': 1, ''two'': 2, ''three'': 3}

    ```


    ## Characteristics


    - **Unique Keys:** Each key in a dictionary must be unique.

    - **Accessible Values:** Values are accessible via their keys.

    - **Mutable:** Dictionaries are mutable.

    - **Usage:** Dictionaries are ideal for situations where you need to associate
    information, such as a contact database where each name is associated with a phone
    number.


    Sets and dictionaries are implemented efficiently, allowing fast operations, especially
    searches. They are versatile tools for manipulating data collections. Knowing
    data structures is fundamental to mastering Python, as it allows you to choose
    the most appropriate and efficient structure for each situation, making the code
    cleaner, more readable, and more efficient.


    Sets and dictionaries are powerful and flexible tools every Python programmer
    needs to know. Understanding and using them effectively are critical to writing
    efficient Python code and solving a wide range of programming problems more efficiently
    and effectively.


    ## List and dictionary comprehensions


    List comprehensions offer a concise way to create lists.

    They use square brackets [] and are often written in a single line of code.


    ```

    [expression for element in iterable if condition]

    ```


    ## Example


    ```

    squares = [x*x for x in range(10) if x%2 == 0]

    ```


    This code lists the squares of even numbers from 0 to 9.

    They are used to create new lists by applying an expression to each element in
    an iterable (such as a list or range), optionally filtering the elements.


    ## Dictionary Comprehensions


    Like list comprehensions but used to create dictionaries.

    They use curly braces {}.


    ```

    {key_expression: value_expression for element in iterable if condition}

    ```


    ## Example


    ```

    word_lengths = {word: len(word) for word in ["apple", "banana", "grape"] if len(word)
    > 5}

    ```


    This code creates a dictionary where the keys are words, and the values are their
    lengths for words with more than five characters.

    They are used to create dictionaries from iterables, applying a key expression
    and a value expression to each element in the iterable, optionally filtering the
    elements.


    - **Efficiency:** Comprehensions are often more computationally efficient than
    using loops, as they are optimized internally by Python.

    - **Readability:** They can be more readable and concise, reducing the code needed
    to create lists and dictionaries.

    - **Pythonic Style:** Using comprehensions is considered "Pythonic," meaning it
    is a coding style that aligns well with Python''s design principles.


    Understanding and effectively using list and dictionary comprehensions can lead
    to cleaner, more efficient code. They are powerful tools that, when used correctly,
    can make your code more Pythonic and easier to read and understand while also
    improving the performance of your program.


    ## Advanced usage and methods


    Lists support advanced slicing operations, allowing access to specific list portions.


    ```

    my_list = [0, 1, 2, 3, 4, 5]

    sub_list = my_list[1:5:2]  # Returns [1, 3]

    ```


    ## Important Methods


    - `append(element)`: Adds an element to the bottom of the list.

    - `extend(iterable)`: Adds all elements of an iterable to the list.

    - `insert(index, element)`: Inserts an element at a specified position.

    - `remove(element)`: Removes the first occurrence of an element.

    - `pop(index)`: Removes and returns the element at a specific position.

    - `sort()`: Sorts the list elements in place.

    - `reverse()`: Reverses the order of the list elements in place.


    ## Dictionaries - Advanced Use and Methods


    ```

    squares = {x: x*x for x in (2, 4, 6)}

    ```


    ## Important Methods


    - `get(key, default)`: Returns the value of the specified key, if present; otherwise,
    it returns the default value.

    - `keys()`: Returns all the keys in the dictionary.

    - `values()`: Returns all values in the dictionary.

    - `items()`: Returns all key-value pairs in the dictionary.

    - `update(other_dictionary)`: Updates the dictionary with key-value pairs from
    another dictionary.

    - `pop(key)`: Removes and returns the value associated with the specified key.


    Knowing the advanced usage and specific methods for lists and dictionaries in
