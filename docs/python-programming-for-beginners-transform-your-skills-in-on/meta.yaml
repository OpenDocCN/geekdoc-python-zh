  md: 'a solution has been found, and the function returns True.


    Suppose no numbers from 1 to 9 can be placed in a cell without violating Sudoku
    rules. In that case, the function returns False, signaling a failure, and triggers
    backtracking: you remove the last number entered and try a new option in the previous
    cell.

    If all cells are filled correctly, the function returns True, indicating that
    the Sudoku has been solved.


    # Complexity Analysis:


    +   - **Time:** Solving via backtracking can be computationally expensive. In
    the worst case, the time complexity is O(9N×N)O(9N×N) since, potentially, each
    empty cell (in an N×NN×N grid) could require nine numbers to be verified.

    - **Space:** Space usage is primarily O(N×N)O(N×N) for the Sudoku grid, plus additional
    space for recursion, which, in the worst case, could be O(N×N)O (N×N) for a recursion
    depth N×NN×N.


