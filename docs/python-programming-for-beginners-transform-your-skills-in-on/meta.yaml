    acquires from external sources. These sources can be multiple: keyboard, from
    which the user enters data manually; mouse, through which the user can interact
    with the graphic interface; files, which the system can read to acquire previously
    saved data; networks, which allow you to receive data from the internet or other
    networks. Furthermore, input devices can also be, for example, sensors or other
    peripherals connected to the system.'
