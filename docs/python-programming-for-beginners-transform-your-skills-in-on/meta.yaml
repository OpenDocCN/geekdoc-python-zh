    \ appear in the same row or column.\n2. Checking the 3x3 submatrix: Check that\
    \ the number is not already present in the 3x3 submatrix where you are trying\
    \ to place the number.\n\n**solve_sudoku function:** The solve_sudoku function\
    \ is the primary function that implements the backtracking logic.\n\nScan each\
