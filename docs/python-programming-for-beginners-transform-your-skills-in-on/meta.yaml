- md: '**Download:** Visit [python.org](https://www.python.org/) and download the
    latest version for macOS.


    **Installation:** Open the downloaded file (a `.pkg` package) and follow the installation
    instructions.


    **Verification:** Open the terminal and type `python3` or `python3 --version`
    to ensure the installation succeeded.


    **For Linux users:**


    Most Linux distributions have Python preinstalled. However, you can upgrade or
    install a different version using your distribution''s package manager.


    **Upgrade/Install:** Open the terminal and use the appropriate package manager.
    For Debian-based distributions (such as Ubuntu), the command might be:


    ```

    sudo apt update

    sudo apt upgrade

    sudo apt install python3

    ```


    **Verification:** After installation, check the version of Python with `python3
    --version` or start the interpreter with `python3`.


    After completing these steps, Python should run on your system! Ready to begin
    your journey into programming with Python?


    ## Configuring the IDE (e.g., PyCharm, VSCode)


    An IDE (Integrated Development Environment) is an integrated development environment
    that facilitates writing, debugging, and compiling code. There are several IDEs
    available for Python, including PyCharm and Visual Studio Code (VSCode).


    ## PyCharm


    PyCharm is a popular IDE dedicated to Python, developed by JetBrains. It offers
    numerous tools and features to facilitate development in Python.


    ### Installation


    - Visit the official PyCharm website. (https://www.jetbrains.com/pycharm/)

    - Download the appropriate version for your operating system (Windows, macOS,
    Linux).

    - If you are a beginner or student, the "Community" version may suit your needs.

    - Follow the instructions to install PyCharm on your computer.


    ### Configuration


    - Start PyCharm.

    - Configure the Python interpreter by selecting the version of Python installed
    on your system.

    - You can create a new project or open an existing project and start writing code.


    ## Visual Studio Code (VSCode)


    VSCode is a source code editor developed by Microsoft that is highly versatile
    and supports many programming languages, including Python, through extensions.


    ### Installation


    - Go to the official Visual Studio Code website. (https://code.visualstudio.com/)

    - Download and install the appropriate version for your operating system (Windows,
    macOS, Linux).


    ### Configuration for Python


    - Start VSCode.

    - Visit the extension marketplace (the squares icon on the sidebar).

    - Search for and install Microsoft''s Python extension.

    - Restart VSCode.

    - Open or create a new Python file (with a .py extension), and VSCode will automatically
    prompt you to select the Python interpreter to use. Select the version of Python
    you have previously installed.


    Both IDEs have numerous features, such as syntax highlighting, code hinting, built-in
    debugging, and many other tools that make programming in Python more accessible
    and productive. Choose the IDE that best suits your preferences and needs.


    ## Using the terminal or Python shell


    The terminal (or console) is a text interface that allows you to interact with
    the operating system through text commands. The Python shell, on the other hand,
    is an interactive environment in which Python code can be written and executed
    in real-time.


    ### Starting the Terminal


    **Windows:** You can open the Command Prompt or PowerShell.


    **Mac:** Use the Terminal, which you can find in the Applications > Utilities
    folder.


    **Linux:** Open the Terminal from the application menu or use a keyboard shortcut.


    ### Running Python


    - After opening the terminal, type `python` or `python3` and press Enter. This
    command will start the Python interpreter, and you should see `>>>`, which is
    the Python shell prompt.


    ### Writing and Executing Code


    In the Python shell, you can write Python code line by line. After writing a line
    of code, press "Enter" to execute it immediately. For example, typing `print("Hello,
    world!")` will show the output directly in the console.


    ### Use of Variables


    You can define variables and use them as you would in a standard Python script.
    For example:


    ```

    a = 10

    b = 20

    print(a + b)

    ```


    This will print 30 to the console.


    ### Exiting the Python Shell


    To exit the Python shell and return to the terminal prompt, you can type `exit()`
    or press Ctrl + Z (Windows) or Ctrl + D (Mac/Linux), followed by "Enter."


    ### Useful Tips


    - The Python shell is great for testing small code snippets or exploring new ideas.

    - You can also use the Python shell to do quick math calculations or explore the
    functionality of various Python libraries.

    - It would help if you used a dedicated text editor or IDE to write your code
    for longer scripts or larger projects.

    - The Python shell is an excellent tool for learning and practicing Python programming
    interactively, offering immediate feedback as you write and execute code.


    ## Basic Syntax


    The syntax of a programming language refers to the set of rules that define the
    combinations of symbols that are considered grammatically correct structures in
    that language. In other words, syntax determines how code should be written so
    that it can be understood and executed correctly by the language''s interpreter
    or compiler.


    When we talk about "basic syntax" in Python, we refer to the fundamental rules
    and structures that make up the Python language. This includes how variables are
    declared, functions are created and called, and how loops and conditions are structured.
    *Basic syntax* is the foundation for more complex scripts and programs.


    Knowing basic Python syntax is essential to writing code that works as intended.
    With a solid understanding of syntax, you can avoid running into frequent errors
    and know how to fix them. Mastering basic syntax allows you to express your logic
    and ideas in code clearly and effectively, creating programs that run smoothly
    and predictably. Correct syntax ensures that your code is interpretable by the
    computer—syntactically correct code runs without syntax errors, which are among
    the most common mistakes among novice programmers. Once you are familiar with
    basic syntax, moving on to more advanced and complex programming concepts is easier.
    The basic syntax is like the alphabet of a language: once you know it, you can
    start forming words and sentences. Knowing syntax allows you not only to write
    code that works but also code that is clean, readable, and efficient. This is
    crucial when working on larger projects or collaborating with other developers.
    Basic Python syntax is the starting point for anyone who wants to learn to program
    in Python. With a simple and intuitive syntax, Python makes the learning experience
    accessible and rewarding for new programmers while providing powerful tools for
    experienced developers. Each successive chapter of this book will build on this
    fundamental knowledge, guiding you through the many possibilities offered by programming
    in Python.


    ## Variables


    Variables are memory spaces used to store data that can vary over time. In Python,
    declaring variables is simple: just assign a value to a variable name without
    having to declare the data type in advance.


    ```

    name = "Andrew"

    age = 30

    height = 0.146

    ```


    ### Python supports several data types


    - Strings (str): Sequences of characters enclosed in double or single quotes.

    - Integers (int): Whole numbers without decimal parts.

    - Floating-point numbers (float): Numbers with decimal part.

    - Booleans (bool): Truth values, True or False.


    You can also convert between different data types using functions such as `int()`,
    `float()`, and `str()`.


    ## Operators


    Operators in Python are special symbols that perform calculations on values and
    variables. Operators can be of different types:


    **Arithmetic:** They perform mathematical operations, such as addition (+), subtraction
    (-), multiplication (*), division (/), and modulus (%).


    **Comparison:** They compare two values and return a boolean. They include equal
    to (==), different from (!=), greater than (>), less than (<), greater than or
    equal to (>=), less than or equal to (<=).'
