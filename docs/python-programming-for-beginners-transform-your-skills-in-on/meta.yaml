  md: '# Explanation


    is_valid function: The is_valid function checks whether a specific number can
    be placed at a particular position in the grid. Performs three checks:


    +   1. Row and column check: Check that the number does not already appear in
    the same row or column.

    2. Checking the 3x3 submatrix: Check that the number still needs to be present
    in the 3x3 submatrix where you are trying to place the number.

    3. solve_sudoku function: The solve_sudoku function is the primary function that
    implements the backtracking logic.


    Scan each grid cell from left to right and top to bottom, looking for an empty
    cell (value 0).

    When it finds an empty cell, it tries to place a number from 1 to 9 in that cell
    and tests whether the move is valid using the is_valid function.

    If the move is valid, it recursively calls solve_sudoku to fill the next cell.
    If this recursive call returns True,'
  merge: -1
