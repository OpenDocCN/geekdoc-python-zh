    \ 0, 0, 7, 9]\n]\n\n# Solve the Sudoku\nsolve_sudoku(example_board)\n```\n\n###\
    \ Explanation\n\n**is_valid function:** The is_valid function checks whether a\
    \ specific number can be placed at a particular position in the grid. Performs\
