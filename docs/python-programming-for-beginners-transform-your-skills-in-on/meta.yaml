    \ = 3 * (row // 3), 3 * (col // 3)\n    for i in range(start_row, start_row +\
    \ 3):\n        for j in range(start_col, start_col + 3):\n            if board[i][j]\
    \ == num:\n                return False\n    return True\n\ndef solve_sudoku(board):\n\
    \    for row in range(9):\n        for col in range(9):\n            if board[row][col]\
