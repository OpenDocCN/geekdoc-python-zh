    # 4) Prim algorithm


    # Context


    Prim''s algorithm finds a Minimum Spanning Tree (MST) in a connected and weighted
    graph. An MST is a subset of the edges of a graph that connects all vertices without
    cycles and with the most negligible possible edge weight.


    Prim''s algorithm is handy in networking applications, such as designing a computer
    network, where the goal is to connect computers with the minimum cable length.


    Prim Algorithm: Step-by-Step Explanation


    # Initialization:


    +   - Choose an arbitrary vertex as the starting node.

    - Create an empty set (or other type of data structure) to keep track of the vertices
    included in the MST so far.

    - Create a priority queue (min-heap) to keep edges with their weights so you can
    easily select the edge with the minimum weight in each iteration.'
  - '[PAGE 145]


    +   - Basic Operations:

    - Add the starting node to the MST vertex set.

    - Add all edges starting from the starting node to the priority queue with their
    associated weights.


    # MST Construction Cycle:


    +   - While the priority queue is not empty and the MST has not reached all vertices:

    - Pull the arc with the minimum weight from the priority queue.

    - If the edge connects a vertex already in the MST with a vertex outside the MST:

    - Add this arc to the MST.

    - Add the new vertex to the MST vertex set.

    - Add all edges starting from the new vertex to the priority queue, with their
    associated weights, unless the edge connects two vertices already in the MST.


    # Result


    When the loop ends, the selected edges form the MST of the initial graph.'
  - '[PAGE 146]


    # Details and Considerations:


    **Efficiency:** Prim''s algorithm has a time complexity that can range from O(Elog
    E)O(ElogE) to O(E +Vlog V)O(E+VlogV), depending on the data structures used. Here,
    EE is the number of edges, and VV is the number of vertices in the graph.


    **Data Structures:** The priority queue is fundamental to the algorithm''s efficiency.
    Common data structures for implementing priority queuing include binary heaps
    and Fibonacci heaps.


    **Applicability:** Prim is applicable only on connected graphs. If the graph is
    not connected, the algorithm will generate the MST of the connected subgraph that
    contains the starting vertex.


    **Negative Weight Case:** Prim''s algorithm works with negative-weight edges,
    but all edges must be weighted.


    **Comparison with Other Algorithms:** Sometimes, the Kruskal Algorithm might be
    preferred to the Prim Algorithm when the graph is sparse, i.e., when the number
    of EE edges is much less than V2V2. This'
  - '[PAGE 147]


    is because, in some instances, Kruskal can be implemented to perform O(Elog V)O(ElogV)
    time, which for very sparse graphs can be more efficient than Prim''s algorithm.


    The Prim Algorithm is a fundamental and widely used method for solving the Minimum
    Spanning Tree problem, providing an optimal solution given a connected and weighted
    graph.


    # 5) The Huffman Algorithm


    The Huffman algorithm is a popular method for compressing data using variable
    prefix coding. The idea is based on shorter codes for characters that appear more
    frequently and more extended codes for those that appear less frequently.


    # Steps of the Huffman Algorithm:


    *Frequency Calculation:* Analyze input (e.g., text) to calculate the frequency
    of each character.'
  - '[PAGE 148]


    Create individual nodes for each character and assign them a corresponding frequency.


    # Construction of the Huffman Tree:


    +   1. Create a priority queue (commonly used min-heap) and insert all character
    nodes.

    2. Pull the two lowest frequency nodes from the priority queue.

    3. Combine the two nodes to form a new node, whose frequency is the sum of the
    frequencies of the two child nodes.

    4. Insert the new combined node into the priority queue.


    Repeat steps 2 through 4 until only one node is left in the queue. This node becomes
    the root of the Huffman tree.'
  - '[PAGE 149]


    # Huffman Code Generation:


    Navigate the tree from root to leaves, assigning a ''0'' when going left and a
    ''1'' when going right.

    The sequence of ''0''s and ''1''s accumulated when reaching a leaf forms the Huffman
    code for the character represented by that leaf.


    # Data Encoding:


    Replace each character in the input with its corresponding Huffman code.

    The result is a compact bitstream representing the original input in less space.


    # Decompression:


    It uses the Huffman tree and compressed bitstream to reconstruct the original
    input.

    Navigate the tree from top (root) to bottom (leaves), following the path indicated
    by the compressed bitstream, until you reach a leaf representing a character from
    the original input.


    Additional Considerations:


    # Optimality:'
  - '[PAGE 150]


    Huffman coding is optimal when the symbol probabilities are powers inversely proportional
    to 2 (e.g., 1/2, 1/4, 1/8, ...).

    Overall, it is a very effective and widely used lossless compression algorithm.


    **Practical uses:**

    Huffman is used in various compression systems, including file compression (e.g.,
    ZIP) and image compression (e.g., JPEG).


    **Time Complexity:**

    The Huffman tree construction has a time complexity of O(nlog n)O(nlogn), with
    nn equal to the number of unique symbols.

    The actual encoding and decoding have a time complexity of O(L)O(L), where LL
    is the length of the message to be encoded/decoded.'
  - '[PAGE 151]


    # Challenges:


    Decompression requires access to the Huffman tree, which can be sent as part of
    the compressed output, potentially reducing compression gains.

    The effectiveness of Huffman compression is strongly influenced by the frequency
    distribution of the symbols in the input.


    Huffman coding represents a brilliant combination of data structures and information
    theory, offering an efficient and practical method for lossless data compression
    in various applications.'
