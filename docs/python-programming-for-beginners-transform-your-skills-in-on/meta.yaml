    \ row, col, num):\n                        board[row][col] = num\n           \
    \             if solve_sudoku(board):\n                            return True\
    \ # Solution found\n                        board[row][col] = 0 # Backtrack\n\
    \                return False # No number can be placed in this cell\n    return\
    \ True # Board solved\n\n# Example Sudoku grid\n# 0 represents an empty cell\n\
    example_board = [\n    [5, 3, 0, 0, 7, 0, 0, 0, 0],\n    [6, 0, 0, 1, 9, 5, 0,\
    \ 0, 0],\n    [0, 9, 8, 0, 0, 0, 0, 6, 0],\n    [8, 0, 0, 0, 6, 0, 0, 0, 3],\n\
