    # Exercise 1: Solving the Tower of Hanoi Problem


    The Tower of Hanoi problem is a classic problem in the science of computation
    and offers a beautiful example of how recursion can be used to solve problems
    elegantly.


    **Problem:**

    *You have three poles and N discs of different sizes, which can slide into any
    of the poles. The goal is to move the entire stack of discs from one pole to another,
    respecting the following rules:*


    +   1. Only one disk can be moved at a time.'
  merge: -1
  pgno: 129
- img_proc: true
  md: '+   2. Each move involves moving one pole''s top disk to another.

    3. A disk cannot be placed on a smaller disk.


    # Recursive Solution:


    The solution to the Tower of Hanoi can be formulated recursively, which makes
    it particularly interesting and elegant. Below is a step-by-step approach:


    # Basic Step:


    If we only have one disk, we move it directly from the starting pile to the destination
    pile.


    # Recursive Step:


    Assuming we know how to move \(N-1\) pucks between the posts, we can follow this
    approach to move N pucks:


    +   - **Step 1:** Move \(N-1\) disks from the source pole (A) to the auxiliary
    pole (B), using the destination pole (C) as a temporary one. To do this, we can
    use the same strategy recursively.'
  merge: -1
  pgno: 130
- img_proc: true
  md: "+   - **Step 2:** Move the N disk (the largest) from the source pole (A) to\
    \ the destination pole (C). This is a simple move.\n- **Step 3:** Now, move the\
    \ \\(N-1\\) disks from the auxiliary pole (B) to the destination pole (C), using\
    \ the source pole (A) as a temporary one. Again, we can do this recursively using\
    \ the same strategy.\n\n**Code:**\n\n```\ndef hanoi(n, source_pole, target_pole,\
    \ auxiliary_pole):\n    if n == 1:\n        print(f\"Move disk 1 from {source_pole}\
    \ to {target_pole}\")\n        return\n    hanoi(n-1, source_pole, auxiliary_pole,\
    \ target_pole)\n    print(f\"Move disk {n} from {source_pole} to {target_pole}\"\
    )\n    hanoi(n-1, auxiliary_pole, target_pole, source_pole)\n\n# Example usage:\n\
    # Move 3 disks from pole A to pole C using pole B\nhanoi(3, 'A', 'C', 'B')\n```"
  merge: -1
  pgno: 131
- img_proc: true
  md: '# Explanation:


    +   - `n` is the number of disks.

    - `source_pole`, `target_pole`, and `auxiliary_pole` are the source pole, the
    destination pole, and the auxiliary pole, respectively.


    When `n` equals 1 (base case), the program directly prints the instruction to
    move the disk. When `n` is greater than 1, the program calls itself (recursion)
    to move \(n-1\) disks around and then moves for the giant disk. Finally, move
    \(n-1\) disks around the giant disk again.


    Execution of these instructions leads to solving the Tower of Hanoi problem in
    a minimum number of moves, precisely \(2^N - 1\).'
