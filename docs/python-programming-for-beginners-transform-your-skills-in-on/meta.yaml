    )\ndef home():\n    return render_template(\"index.html\")\n# [...]\n```\n\n###\
    \ 阶段 3：应用的基础创建\n\n- 从一个简单的 Flask 应用开始，设置一个指向主页的路由。\n- 使用 Jinja2 创建一个基本模板，以获得统一的页面布局。\n\
    - 使用 CSS 添加基本样式。\n\n```python\nfrom flask import Flask, render_template\n\napp\
