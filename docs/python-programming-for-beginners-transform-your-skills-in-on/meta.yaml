    # Exercise 2: Completing Sudoku


    Completing a Sudoku is a classic problem often solved with the backtracking approach.
    *Backtracking* is a strategy that attempts to find the solution to a problem by
    trying and, if unsuccessful, undoing moves, going back, and trying another option.
    A detailed explanation of the solution to the Sudoku problem using backtracking
    is presented below.


    # Problem:


    You have a partially filled 9x9 Sudoku grid. The goal is to fill the grid so that
    every row, every column, and every 3x3 submatrix contains all the numbers from
    1 to 9 without repetition.


    Solution with Backtracking:


    # Find an Empty Cell:


    Search for an empty cell in the Sudoku grid. If there are no empty cells, the
    problem is already solved (base case).


    # Try the Numbers:'
  - '[PAGE 134]


    For the blank cell you found, enter the numbers 1 to 9.


    # Check Validity:


    After entering a number, check whether the grid remains valid, i.e., whether there
    are no conflicts in the rows, columns, and 3x3 submatrices.


    # Recursion:


    If entering the number keeps the grid valid, proceed recursively, trying to fill
    the next empty cell.


    # Backtrack if Necessary:


    If entering a number cannot provide a solution, remove (cancel) the number entered
    and try the following number.


    If no numbers from 1 to 9 lead to a solution, return to one cell and change the
    last number entered.


    # Complete solution:


    Continue this process until the grid is filled and valid.


