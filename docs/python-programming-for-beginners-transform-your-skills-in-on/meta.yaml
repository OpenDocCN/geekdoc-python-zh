    # Recursive functions


    *Recursive functions* are functions that call themselves during their execution.
    In other words, a recursive function is a function that solves a problem by breaking
    it down into smaller, simpler subproblems, solved with recursive calls to the
    same function.


    # Basic Structure:


    A recursive function typically has two main parts:


    +   - Base Case: The base case is the condition that ends the recursion. The function
    would continue calling forever without a base case, resulting in an infinite loop.

    - Recursive Call: The function calls itself with different arguments, usually
    more minor or straightforward than the original one.'
