    as a two-dimensional grid of cells (which may be passable or blocked), find a
    path from the starting cell (S) to the destination cell (D) by crossing only passable
    cells.


    # Algorithmic Tools


    Several strategies can be adopted to solve the pathfinder problem in a maze, including:


    +   - Depth Search (DFS)

    - Breadth-Breadth Search (BFS)

    - Dijkstra''s algorithm

    - Algorithm A*


    # Method 1: Depth Search (DFS)


    Depth-first search (DFS) is a standard method for solving maze search problems,
    mainly when one is interested in finding a possible path rather than the shortest.


