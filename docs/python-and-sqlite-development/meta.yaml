  md: '# 2.3 Creating Python Program


    In this section, we create Python file, called The objective is to connect SQLite
    database via SQLite driver for Python.


    Firstly, we load SQLite driver for Python library and then define database file,
    called pydb.db. We use **pydb** database for demo.


    ```

    import sqlite3


    db = ''pydb.db''


    conn = sqlite3.connect(db)

    print(''connected'')

    print(conn)


    conn.close()

    ```


    Then we connect to SQLite using **sqlite3.connect()** by passing database file.
    We should pass database file with full path. If the database file is not exist,
    SQLite driver will create a database file.


    At the end of code, we close connection using **close()** function.


    Save all code. Next, we run this program.'
