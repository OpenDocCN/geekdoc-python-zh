    \ open_database()\n\n# creating data demo\ncreate_table(conn)\n\n# close database\n\
    conn.close()\n```\n\n你可以在下图中看到我的程序输出。\n\n接下来的操作是创建两个函数，用于上传图像和列出/保存图像数据。\n\n##\
