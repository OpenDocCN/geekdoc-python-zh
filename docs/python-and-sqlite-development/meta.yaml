    \ filename, imagetype, created])\n            with open(save_as_file, 'wb') as\
    \ f:\n                f.write(imgfile)\n            f.close()\n            print('Save\
    \ image data as ', save_as_file)\n        print(t)\n    except Exception as e:\n\
    \        print(e)\n    finally:\n        cursor.close()\n        pass\n```\n\n\
    Save the code.\n\nWe call **read_image_data()** function with passing file name\
    \ **image1-read.png** and image ID so our image data will be saved as image1-read.png.\
    \ For instance, I have my image with ID 1. I read this image data and save to\
    \ local folder.\n\n```python\n# open database\nconn = open_database()\n\n# reading\
    \ image data demo\nprint('reading image data demo')\nsave_as_file = './image1-read.png'\n\
    id = 1\nread_image_data(conn, id, save_as_file)\nprint('done')\n```\n\nNow open\
    \ image1-read.png file. You should see the image file. If you cannot open the\
    \ file, you probably have problems on saving and reading image file. The following\
    \ is a sample of program output.\n\n## 5. Transaction\n\nThis chapter explains\
    \ how to work with transaction on SQLite using Python.\n\n## 5.1 Python and SQLite\
    \ Transaction\n\nSQLite driver provides transaction operations. To implement a\
    \ transaction in SQLite, we can perform the following steps:\n\n- open connection\
    \ to SQLite\n- set connection with `conn.isolation_level = None`\n- if you use\
    \ a cursor, you can call `cursor.execute(\"BEGIN\")`\n- `commit()` is used to\
    \ commit all query operations\n- `rollback()` and `cursor.execute(\"ROLLBACK\"\
    )` are used to cancel all query operations\n\nNext, we build a Python program\
    \ to show how to work with transaction in SQLite.\n\n## 5.2 Demo\n\nTo illustrate\
    \ transaction demo, we create a simple Python application. We insert 5 data into\
    \ database. If one of them is failed we will call rollback transaction. If succeed,\
    \ we call **commit()** to store all data. Otherwise, we call **rollback()** to\
    \ perform rollback operation.\n\nFor demo, we use previous database, pydb.db SQLite\
    \ file. Let's build. Create Python file, called and write the following code:\n\
    \n```python\nimport sqlite3\nfrom datetime import datetime\nfrom prettytable import\
    \ PrettyTable\n\ndef open_database():\n    db = 'pydb.db'\n\n    print('Connecting\
    \ to SQLite...')\n    conn = sqlite3.connect(db)\n    print('connected')\n\n \
    \   return conn\n\ndef read_data(conn):\n    print('reading data')\n    cursor\
    \ = conn.cursor()\n\n    cursor.execute(\"select id, name, stock, price, created\
    \ from product\")\n    t = PrettyTable(['ID', 'Name', 'Stock', 'Price', 'Created'])\n\
    \    for (id, name, stock, price, created) in cursor:\n        t.add_row([id,\
    \ name, stock, format(price, '.2f'), created])\n\n    print(t)\n    cursor.close()\n\
    ```\n\n```python\nprint('done')\n\n# creating data demo\nprint('transaction demo')\n\
    \nconn = open_database()\nprint('Original data.....')\nread_data(conn)\n\n# set\
    \ manual transaction\nconn.isolation_level = None\n\ntry:\n    cursor = conn.cursor()\n\
    \    cursor.execute(\"BEGIN\")\n    for index in range(1, 5):\n        product_name\
    \ = 'product ' + str(index)\n        price = 1.2 * index\n        stock = 10 +\
    \ 2 * index\n\n        insert_sql = (\"INSERT INTO product \"\n              \
    \        \"(name, stock, price, created) \"\n                      \"VALUES(?,\
    \ ?, ?, ?)\")\n\n        # demo error\n        # if index == 3:\n        #   \
    \  insert_sql = insert_sql.replace('INSERT', 'INSERT1') # wrong statement\n\n\
    \        params = (product_name, stock, price, datetime.now())\n        conn.execute(insert_sql,\
    \ params)\n        product_id = cursor.lastrowid\n        print('inserted with\
    \ id=', product_id)\n\n    conn.commit()\n    cursor.close()\n\nexcept Exception\
    \ as e:\n    cursor.execute(\"ROLLBACK\")\n    conn.rollback()\n    print('error\
    \ in inserting data')\n    print(e)\n\nprint('Update data.....')\nread_data(conn)\n\
    ```"
  mdcn: "## 4. 处理图像和 Blob 数据\n\n本章介绍如何在 SQLite 数据库中处理图像和 Blob 数据，并使用 Python 进行操作。\n\
    \n## 4.1 图像和 Blob 数据\n\nSQLite 数据库为文本和 Blob 数据提供了相应的数据类型。图像数据类型可以存储图像文件，而二进制数据类型可用于存储任何文件。\n\
