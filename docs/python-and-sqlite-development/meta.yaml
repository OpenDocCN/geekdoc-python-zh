- md: "# Python and SQLite Development\n\nAgus Kurniawan\n\n# Python and SQLite Development\n\
    \nPython and SQLite Development\n\nAgus Kurniawan\n\n1st Edition, 2021\n\nCopyright\
    \ © 2021 Agus Kurniawan\n\nISBN: 978-1-716-24602-9\n\n# Table of Contents\n\n\
    - [Python and SQLite Development](#)\n- [Preface](#)\n- [1. Setting up Development\
    \ Environment](#)\n  - [1.1 Python](#)\n  - [1.2 SQLite Database](#)\n  - [1.3\
    \ SQLite Driver for Python](#)\n  - [1.4 Development Tools](#)\n  - [1.5 Python\
    \ Programming](#)\n- [2. Getting Started - Python and SQLite](#)\n  - [2.1 SQLite\
    \ Shell](#)\n  - [2.2 Connecting to SQLite](#)\n  - [2.3 Creating Python Program](#)\n\
    \  - [2.3 Running](#)\n- [3. CRUD Operations](#)\n  - [3.1 CRUD Operations](#)\n\
    \  - [3.2 Creating Data](#)\n  - [3.3 Reading Data](#)\n  - [3.4 Updating Data](#)\n\
    \  - [3.5 Deleting Data](#)\n- [4. Working with Image and Blob Data](#)\n  - [4.1\
    \ Image and Blob Data](#)\n  - [4.2 Inserting Image File](#)\n  - [4.3 Reading\
    \ and Saving Image File](#)\n- [5. Transaction](#)\n  - [5.1 Python and SQLite\
    \ Transaction](#)\n  - [5.2 Demo](#)\n- [6. Python, SQLite and Pandas](#)\n  -\
    \ [6.1 Demo](#)\n\nSource Code\n\nContact\n\n# Preface\n\nThis book provides alternative\
    \ approach to build Python application with SQLite database. This book describes\
    \ how to work with Python and SQLite and illustrates their use with code examples.\n\
    \nAgus Kurniawan\n\nDepok, January 2021\n\n# 1. Setting up Development Environment\n\
    \n## 1.1 Python\n\nPython is an interpreted, object-oriented, high-level programming\
    \ language with dynamic semantics. In this book, we focus on learning how to develop\
    \ Python programs to access SQLite database.\n\nTo install Python, you can download\
    \ it for your platform. This book covers for Windows, Mac and Linux.\n\nAfter\
    \ installed Python, you can verify it by opening Terminal or Command Prompt for\
    \ Windows. Type this command.\n\n```\n$ python --version\n$ pip --version\n```\n\
    \nYou should see python and pip versions on Terminal.\n\nFor Windows users, you\
    \ probably get errors while you are running python command. You can configure\
    \ Python path into Path environment from Control Panel. You can see my Python\
    \ path configuration in Figure below.\n\nYou probably have Python 3.x so your\
    \ pip may be pip3. You can type this command\n\n```\n$ python3 --version\n$ pip3\
    \ --version\n```\n\nYou should get a Python version in Terminal. You can see my\
    \ Python version in Windows.\n\n```\nE:\\Projects\\PEPRESS\\python_sqlite\\codes>python\
    \ --version\nPython 3.9.0\n\nE:\\Projects\\PEPRESS\\python_sqlite\\codes>pip --version\n\
    pip 20.3.1 from C:\\Users\\agus\\AppData\\Roaming\\Python\\Python39\\site-packages\\\
    pip (python 3.9)\n\nE:\\Projects\\PEPRESS\\python_sqlite\\codes>\n```\n\n## 1.2\
    \ SQLite Database\n\nI use SQLite 3 for demo. SQLite provides a shell so you can\
    \ perform data manipulation. You can download SQLite 3 shell on this site on Download\
    \ SQLite shell based your platform. For Windows, you can download sqlite-tools\
    \ as shown in Figure below.\n\nDownload and extract ZIP file. Then, you can see\
    \ 3 files as shown in Figure below.\n\nFor Linux, for instance Debian/Ubuntu,\
    \ we can download and install using these commands on Terminal.\n\n```\n$ sudo\
    \ apt-get update\n$ sudo apt-get install sqlite3 libsqlite3-dev\n```\n\nIf you\
    \ are working with macOS, you can install SQLite3 via brew. You can type this\
    \ command on Terminal.\n\n```\n$ brew install sqlite\n```\n\nNow your platform\
    \ is ready for SQLite database included SQLite shell.\n\n## 1.3 SQLite Driver\
    \ for Python\n\nTo access SQLite from Python, we need SQLite driver for Python.\
    \ Fortunately, SQLite driver for Python is already included in Python standard\
    \ library so we don't need to install this.\n\nNext, we start to develop Python\
    \ program for SQLite.\n\n## 1.4 Development Tools\n\nTechnically, you can use\
    \ any editor to develop Python. For demo, I use Visual Studio Code for writing\
    \ Python scripts. This tool is free. You can download it for Windows, macOS and\
    \ Linux. Download it.\n\nThe following is a sample of Visual Studio Code.\n\n\
    ## 1.5 Python Programming\n\nThis book does not cover about basic Python programming.\
    \ You can learn Python programming from online stuffs. In addition, I also have\
    \ written a book about Python Programming by Example.\n\nYou can get this book\
    \ on the following online store:\n\n- Amazon\n- Google Play\n\n# 2. Getting Started\
    \ - Python and SQLite\n\nThis chapter explains how to connect SQLite database\
    \ via SQLite driver for Python.\n\n## 2.1 SQLite Shell\n\nSQLite has a shell that\
    \ runs on Terminal. We can create database and tables using SQLite shell. You\
    \ can download SQLite shell for your platform.\n\nAfter you set up SQLite shell,\
    \ you can run this shell using sqlite3 command. You can type this.\n\n```\n$ sqlite3\
    \ --version\n```\n\nYou should see SQLite shell version on Terminal. You can see\
    \ my SQLite shell version in Figure below (macOS version).\n\nIf you are working\
    \ on Windows, you can open Command Prompt. Then, navigate to a folder where SQLite\
    \ shell file was extracted. Then, type sqlite3 --version so you can see SQLite\
    \ version on Command Prompt.\n\n```\n$ sqlite3 --version\n```\n\nNext, we are\
    \ playing with SQLite shell. We can use a memory database on SQLite. This means\
    \ we can create some tables and then insert data but our data will loss after\
    \ we quit from SQLite shell.\n\nYou can type sqlite3 on Terminal and then you\
    \ can see SQLite memory database.\n\n```\n$ sqlite3\n```\n\nNow we can create\
    \ a table, called tbl. You can type this command on SQLite shell.\n\n```\n> create\
    \ table tbl(id int, name char(10));\n```\n\nAfter that, we can insert data into\
    \ tbl table. Type these commands on SQLite shell.\n\n```\n> insert into tbl(id,name)\
    \ values(1,'data 1');\n> insert into tbl(id,name) values(2,'data 2');\n> insert\
    \ into tbl(id,name) values(3,'data 3');\n```\n\nAfter we inserted data, we show\
    \ data using select statement. You can type this shell command.\n\n```\n> select\
    \ * from tbl;\n```\n\nYou can see my program output from SQLite shell in Figure\
    \ below.\n\nTo quit from SQLite shell, we can type .exit command.\n\n```\n> .exit\n\
    ```\n\nNext, we can connect to SQLite database and perform data manipulation.\n\
    \n## 2.2 Connecting to SQLite\n\nWe can connect to SQLite database using SQLite\
    \ driver for Python with passing our database configuration such as SQLite database\
    \ file. As we know, SQLite doesn't have database engine like SQL Server, Oracle\
    \ and MySQL so we can access SQLite database through database file directly.\n\
    \nNext, we create Python program to access SQLite database.\n\n## 2.3 Creating\
    \ Python Program\n\nIn this section, we create Python file. The objective is to\
    \ connect SQLite database via SQLite driver for Python.\n\nFirstly, we load SQLite\
    \ driver for Python library and then define database file, called pydb.db. We\
    \ use **pydb** database for demo.\n\n```\nimport sqlite3\n\ndb = 'pydb.db'\n\n\
    conn = sqlite3.connect(db)\nprint('connected')\nprint(conn)\n\nconn.close()\n\
    ```\n\nThen we connect to SQLite using **sqlite3.connect()** by passing database\
    \ file. We should pass database file with full path. If the database file is not\
    \ exist, SQLite driver will create a database file.\n\nAt the end of code, we\
    \ close connection using **close()** function.\n\nSave all code. Next, we run\
    \ this program.\n\n## 2.3 Running\n\nWe can run our Python program in Visual Studio\
    \ Code. Open Terminal on Visual Studio Code (menu View -> Terminal). You also\
    \ can run this program on Terminal directly.\n\n```\n$ python db_connect.py\n\
    ```\n\nHere is a sample of running Python application."
  mdcn: "# Python与SQLite开发\n\nAgus Kurniawan\n\n# Python与SQLite开发\n\nPython与SQLite开发\n\
    \nAgus Kurniawan\n\n第一版，2021年\n\n版权所有 © 2021 Agus Kurniawan\n\nISBN: 978-1-716-24602-9\n\
    \n# 目录\n\n- [Python与SQLite开发](#)\n- [前言](#)\n- [1. 搭建开发环境](#)\n  - [1.1 Python](#)\n\
    \  - [1.2 SQLite数据库](#)\n  - [1.3 Python的SQLite驱动](#)\n  - [1.4 开发工具](#)\n  -\
    \ [1.5 Python编程](#)\n- [2. 入门 - Python与SQLite](#)\n  - [2.1 SQLite Shell](#)\n\
    \  - [2.2 连接到SQLite](#)\n  - [2.3 创建Python程序](#)\n  - [2.3 运行](#)\n- [3. CRUD操作](#)\n\
    \  - [3.1 CRUD操作](#)\n  - [3.2 创建数据](#)\n  - [3.3 读取数据](#)\n  - [3.4 更新数据](#)\n\
    \  - [3.5 删除数据](#)\n- [4. 处理图像和Blob数据](#)\n  - [4.1 图像和Blob数据](#)\n  - [4.2 插入图像文件](#)\n\
    \  - [4.3 读取和保存图像文件](#)\n- [5. 事务](#)\n  - [5.1 Python与SQLite事务](#)\n  - [5.2\
    \ 演示](#)\n- [6. Python、SQLite与Pandas](#)\n  - [6.1 演示](#)\n\n源代码\n\n联系方式\n\n#\
    \ 前言\n\n本书提供了一种使用SQLite数据库构建Python应用程序的替代方法。本书描述了如何使用Python和SQLite，并通过代码示例说明了它们的用法。\n\
    \nAgus Kurniawan\n\n德波，2021年1月\n\n# 1. 搭建开发环境\n\n## 1.1 Python\n\nPython是一种解释型、面向对象、具有动态语义的高级编程语言。在本书中，我们专注于学习如何开发Python程序来访问SQLite数据库。\n\
    \n要安装Python，您可以从您的平台下载。本书涵盖Windows、Mac和Linux。\n\n安装Python后，您可以通过打开终端或Windows的命令提示符来验证它。输入此命令。\n\
    \n```\n$ python --version\n$ pip --version\n```\n\n您应该在终端上看到python和pip版本。\n\n\
    对于Windows用户，在运行python命令时可能会遇到错误。您可以从控制面板将Python路径配置到Path环境变量中。您可以在下图中看到我的Python路径配置。\n\
    \n您可能安装的是Python 3.x，因此您的pip可能是pip3。您可以输入此命令\n\n```\n$ python3 --version\n$ pip3\
    \ --version\n```\n\n您应该在终端中获得Python版本。您可以在Windows中看到我的Python版本。\n\n```\nE:\\Projects\\\
    PEPRESS\\python_sqlite\\codes>python --version\nPython 3.9.0\n\nE:\\Projects\\\
    PEPRESS\\python_sqlite\\codes>pip --version\npip 20.3.1 from C:\\Users\\agus\\\
    AppData\\Roaming\\Python\\Python39\\site-packages\\pip (python 3.9)\n\nE:\\Projects\\\
    PEPRESS\\python_sqlite\\codes>\n```\n\n## 1.2 SQLite数据库\n\n我使用SQLite 3进行演示。SQLite提供了一个shell，您可以执行数据操作。您可以在此站点上根据您的平台下载SQLite\
    \ 3 shell。对于Windows，您可以下载sqlite-tools，如下图所示。\n\n下载并解压ZIP文件。然后，您可以看到3个文件，如下图所示。\n\
    \n对于Linux，例如Debian/Ubuntu，我们可以在终端上使用这些命令下载和安装。\n\n```\n$ sudo apt-get update\n\
    $ sudo apt-get install sqlite3 libsqlite3-dev\n```\n\n如果您使用的是macOS，您可以通过brew安装SQLite3。您可以在终端上输入此命令。\n\
    \n```\n$ brew install sqlite\n```\n\n现在您的平台已准备好使用SQLite数据库，包括SQLite shell。\n\n\
    ## 1.3 Python的SQLite驱动\n\n要从Python访问SQLite，我们需要Python的SQLite驱动。幸运的是，Python的SQLite驱动已经包含在Python标准库中，因此我们不需要安装它。\n\
    \n接下来，我们开始为SQLite开发Python程序。\n\n## 1.4 开发工具\n\n从技术上讲，您可以使用任何编辑器来开发Python。在演示中，我使用Visual\
    \ Studio Code编写Python脚本。此工具是免费的。您可以为Windows、macOS和Linux下载它。下载它。\n\n以下是Visual Studio\
    \ Code的示例。\n\n## 1.5 Python编程\n\n本书不涵盖基础Python编程。您可以从在线资源学习Python编程。此外，我还写了一本关于Python编程示例的书。\n\
    \n您可以在以下在线商店购买此书：\n\n- Amazon\n- Google Play\n\n# 2. 入门 - Python与SQLite\n\n本章解释了如何通过Python的SQLite驱动连接SQLite数据库。\n\
    \n## 2.1 SQLite Shell\n\nSQLite有一个在终端上运行的shell。我们可以使用SQLite shell创建数据库和表。您可以为您的平台下载SQLite\
    \ shell。\n\n设置好SQLite shell后，您可以使用sqlite3命令运行此shell。您可以输入此命令。\n\n```\n$ sqlite3\
    \ --version\n```\n\n您应该在终端上看到SQLite shell版本。您可以在下图中看到我的SQLite shell版本（macOS版本）。\n\
    \n如果您在Windows上工作，可以打开命令提示符。然后，导航到提取SQLite shell文件的文件夹。然后，输入sqlite3 --version，以便您可以在命令提示符上看到SQLite版本。\n\
    \n```\n$ sqlite3 --version\n```\n\n接下来，我们来玩转SQLite shell。我们可以在SQLite中使用内存数据库。这意味着我们可以创建一些表，然后插入数据，但当我们退出SQLite\
    \ shell后，数据将会丢失。\n\n您可以在终端上输入sqlite3，然后您可以看到SQLite内存数据库。\n\n```\n$ sqlite3\n```\n\
    \n现在我们可以创建一个名为tbl的表。您可以在SQLite shell上输入此命令。\n\n```\n> create table tbl(id int,\
    \ name char(10));\n```\n\n之后，我们可以将数据插入到tbl表中。在SQLite shell上输入这些命令。\n\n```\n> insert\
    \ into tbl(id,name) values(1,'data 1');\n> insert into tbl(id,name) values(2,'data\
    \ 2');\n> insert into tbl(id,name) values(3,'data 3');\n```\n\n插入数据后，我们使用select语句显示数据。您可以输入此shell命令。\n\
    \n```\n> select * from tbl;\n```\n\n您可以在下图中看到我从SQLite shell的程序输出。\n\n要退出SQLite\
    \ shell，我们可以输入.exit命令。\n\n```\n> .exit\n```\n\n接下来，我们可以连接到SQLite数据库并执行数据操作。\n\n\
    ## 2.2 连接到SQLite\n\n我们可以使用Python的SQLite驱动连接到SQLite数据库，传递我们的数据库配置，例如SQLite数据库文件。众所周知，SQLite没有像SQL\
    \ Server、Oracle和MySQL那样的数据库引擎，因此我们可以直接通过数据库文件访问SQLite数据库。\n\n接下来，我们创建Python程序来访问SQLite数据库。\n\
    \n## 2.3 创建Python程序\n\n在本节中，我们创建一个Python文件。目标是通过Python的SQLite驱动连接SQLite数据库。\n\n\
    首先，我们加载Python的SQLite驱动库，然后定义数据库文件，名为pydb.db。我们使用**pydb**数据库进行演示。\n\n```\nimport\
    \ sqlite3\n\ndb = 'pydb.db'\n\nconn = sqlite3.connect(db)\nprint('connected')\n\
    print(conn)\n\nconn.close()\n```\n\n然后我们使用**sqlite3.connect()**连接到SQLite，传递数据库文件。我们应该传递带有完整路径的数据库文件。如果数据库文件不存在，SQLite驱动将创建一个数据库文件。\n\
    \n在代码末尾，我们使用**close()**函数关闭连接。\n\n保存所有代码。接下来，我们运行此程序。\n\n## 2.3 运行\n\n我们可以在Visual\
    \ Studio Code中运行我们的Python程序。在Visual Studio Code上打开终端（菜单视图 -> 终端）。您也可以直接在终端上运行此程序。\n\
    \n```\n$ python db_connect.py\n```\n\n以下是运行Python应用程序的示例。"
