    保存代码。\n\n我们调用 **read_image_data()** 函数，传递文件名 **image1-read.png** 和图像 ID，这样我们的图像数据将保存为\
    \ image1-read.png。例如，我有一个 ID 为 1 的图像。我读取此图像数据并保存到本地文件夹。\n\n```python\n# open database\n\
    conn = open_database()\n\n# reading image data demo\nprint('reading image data\
    \ demo')\nsave_as_file = './image1-read.png'\nid = 1\nread_image_data(conn, id,\
    \ save_as_file)\nprint('done')\n```\n\n现在打开 image1-read.png 文件。你应该能看到图像文件。如果你无法打开文件，可能是在保存和读取图像文件时遇到了问题。以下是程序输出的示例。\n\
    \n## 5. 事务\n\n本章介绍如何使用 Python 在 SQLite 中处理事务。\n\n## 5.1 Python 和 SQLite 事务\n\n\
    SQLite 驱动程序提供事务操作。要在 SQLite 中实现事务，我们可以执行以下步骤：\n\n- 打开与 SQLite 的连接\n- 设置连接 `conn.isolation_level\
    \ = None`\n- 如果你使用游标，可以调用 `cursor.execute(\"BEGIN\")`\n- `commit()` 用于提交所有查询操作\n\
    - `rollback()` 和 `cursor.execute(\"ROLLBACK\")` 用于取消所有查询操作\n\n接下来，我们构建一个 Python\
    \ 程序来展示如何在 SQLite 中处理事务。\n\n## 5.2 演示\n\n为了说明事务演示，我们创建一个简单的 Python 应用程序。我们向数据库插入\
