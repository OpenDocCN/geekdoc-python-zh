    dynamic semantics. In this book, we focus on learning how to develop Python programs
    to access SQLite database.


    To install Python, you can download it for your platform This book covers for
    Windows, Mac and Linux.


    After installed Python, you can verify it by opening Terminal or Command Prompt
    for Windows. Type this command.


