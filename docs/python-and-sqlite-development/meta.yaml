    \       filename char(30) not null,\n        imagetype char(30) not null,\n  \
    \      imgfile blob,\n        created datetime\n    )'''\n\n    cursor.execute(sql)\n\
    \    conn.commit()\n    print('created a table')\n```\n\n现在我们可以调用 **open_database()**，然后调用\
