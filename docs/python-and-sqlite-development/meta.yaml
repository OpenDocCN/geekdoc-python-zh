    \ pydb.db SQLite 数据库文件。你可能会更改这个数据库文件。\n\n```python\nimport sqlite3\nfrom datetime\
    \ import datetime\nfrom prettytable import PrettyTable\n```\n\n```python\ndef\
    \ open_database():\n    db = 'pydb.db'\n\n    print('Connecting to SQLite...')\n\
