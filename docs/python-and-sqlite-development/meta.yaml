- md: "## 4. Working with Image and Blob Data\n\nThis chapter explains how to work\
    \ with image and blob data on SQLite database and manipulate them using Python.\n\
    \n## 4.1 Image and Blob Data\n\nSQLite database provides data type for Text and\
    \ blob for blob data. Image data type can store image file and binary data type\
    \ can be used to store any file.\n\nIn this chapter, we will work with image file\
    \ on SQLite database. The following is table schema, called\n\nThe following Table\
    \ schema:\n\n- Data Type: integer; Primary Key and Auto Increment; Not null\n\
    - Data Type: char(30); Not null\n- Data Type: char(15); Not null\n- Data Type:\
    \ Text\n- Data Type: datetime\n\n**imagetype** is image type of uploading file.\
    \ This is important while we want to display the image in web, for instance. Firstly,\
    \ we create Python file, called We set database file configuration and create\
    \ **open_database()** function to open SQLite database. In this demo, we create\
    \ pydb.db SQLite database file. You probably change this database file.\n\n```python\n\
    import sqlite3\nfrom datetime import datetime\nfrom prettytable import PrettyTable\n\
    ```\n\n```python\ndef open_database():\n    db = 'pydb.db'\n\n    print('Connecting\
    \ to SQLite...')\n    conn = sqlite3.connect(db)\n    print('connected')\n\n \
    \   return conn\n```\n\nNext, we create **create_table()** function to create\
    \ ImageFiles table using SQLite query. You can type these scripts.\n\n```python\n\
    def create_table(conn):\n    cursor = conn.cursor()\n    sql = ''' create table\
    \ if not exists imagefiles(\n        id integer primary key autoincrement,\n \
    \       filename char(30) not null,\n        imagetype char(30) not null,\n  \
    \      imgfile blob,\n        created datetime\n    )'''\n\n    cursor.execute(sql)\n\
    \    conn.commit()\n    print('created a table')\n```\n\nNow we can call **open_database()**\
    \ and then call **create_table()** function to create database and table. Type\
    \ these scripts.\n\n```python\n# open database\nconn = open_database()\n\n# creating\
    \ data demo\ncreate_table(conn)\n\n# close database\nconn.close()\n```\n\nYou\
    \ can see my program output in Figure below.\n\nThe next action we create two\
    \ functions for uploading image and listing/saving image data.\n\n## 4.2 Inserting\
    \ Image File\n\nIn this section, we insert an image file into SQLite database.\
    \ Firstly, we create **insert_image_data()** function. For binary data, we open\
    \ and read image file using **open()** and **read()** functions. Then, we pass\
    \ all parameters to SQLite query. Write these codes for implementation.\n\n```python\n\
    def insert_image_data(conn, full_file_path, file_name, file_type):\n    print('inserting\
    \ image data')\n    cursor = conn.cursor()\n\n    with open(full_file_path, 'rb')\
    \ as f:\n        imagedata = f.read()\n\n    params = (file_name, file_type, imagedata,\
    \ datetime.now())\n    query = (\"insert into imagefiles(filename, imagetype,\
    \ imgfile, created) \"\n             \"values(?, ?, ?, ?)\")\n\n    cursor.execute(query,\
    \ params)\n    img_id = cursor.lastrowid\n    print('inserted with id=', img_id)\n\
    \n    conn.commit()\n    cursor.close()\n```\n\nSave this program.\n\nNow we use\
    \ the following image file, image1.png, to be inserted into SQLite Database.\n\
    \nWe test our function **insert_image_data()** function. We use **image1.png**\
    \ on the same directory with **db_image_demo.py** program.\n\n```python\n# open\
    \ database\nconn = open_database()\n\n# inserting image data demo\nprint('inserting\
    \ image data demo')\nfull_file_path = './image1.png'\nfile_name = 'image1.png'\n\
    file_type = 'image/png'\ninsert_image_data(conn, full_file_path, file_name, file_type)\n\
    print('done')\n```\n\nSave this program. You can run this file.\n\n```\n$ python\
    \ db_image_demo.py\n```\n\nYou can see the program output as shown in Figure below.\n\
    \n```\nCommand Prompt\nConnecting to SQLite...\nconnected\ncreated a table\n\n\
    E:\\Projects\\PEPRESS\\python_sqlite\\codes>python db_image_demo.py\nConnecting\
    \ to SQLite...\nconnected\ninserting image data demo\ninserting image data\ninserted\
    \ with id= 1\ndone\n\nE:\\Projects\\PEPRESS\\python_sqlite\\codes>\n```\n\nYou\
    \ can try to upload another image file using this program.\n\n## 4.3 Reading and\
    \ Saving Image File\n\nNow we build a function, to show an image data. We save\
    \ image data into a file using **open()** and **write()** functions. We also print\
    \ database data with PrettyTable library.\n\nWrite these codes for **read_image_data()**\
    \ implementation.\n\n```python\ndef read_image_data(conn, id, save_as_file):\n\
    \    print('reading data id=', id)\n    cursor = conn.cursor()\n    try:\n   \
    \     params = (id,)\n        query = (\"select filename, imagetype, imgfile,\
    \ created \"\n                 \"from imagefiles where id=?\")\n        cursor.execute(query,\
