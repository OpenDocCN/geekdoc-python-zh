  md: '# 5.1 Python and SQLite Transaction


    SQLite driver provides transaction operations. To implement a transaction in SQLite,
    we can perform teh following steps:


    +   - open connection to SQLite

    - set connection with `conn.isolation_level = None`

    - if you use a cursor, you can call `cursor.execute("BEGIN")`

    - `commit()` is used to commit all query operations

    - `rollback()` and `cursor.execute("ROLLBACK")` are used to cancel all query operations


    Next, we build a Python program to show how to work with transaction in SQLite.'
  merge: -1
  pgno: 45
- img_proc: true
  md: "# 5.2 Demo\n\nTo illustrate transaction demo, we create a simple Python application.\
    \ We insert 5 data into database. If one of them is failed we will call rollback\
    \ transaction. If succeed, we call **commit()** to store all data. Otherwise,\
    \ we call **rollback()** to perform rollback operation.\n\nFor demo, we use previous\
    \ database, pydb.db SQLite file. Let's build. Create Python file, called and write\
    \ the following code:\n\n```\nimport sqlite3\nfrom datetime import datetime\n\
    from prettytable import PrettyTable\n\ndef open_database():\n    db = 'pydb.db'\n\
    \n    print('Connecting to SQLite...')\n    conn = sqlite3.connect(db)\n    print('connected')\n\
    \n    return conn\n\ndef read_data(conn):\n    print('reading data')\n    cursor\
    \ = conn.cursor()\n\n    cursor.execute(\"select id, name, stock, price, created\
    \ from product\")\n    t = PrettyTable(['ID','Name', 'Stock', 'Price', 'Created'])\n\
    \    for (id, name, stock, price, created) in cursor:\n        t.add_row([id,\
