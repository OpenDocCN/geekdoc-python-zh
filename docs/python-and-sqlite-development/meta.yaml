- md: "## 3. CRUD Operations\n\nThis chapter explains how to manipulate data SQLite\
    \ using Python.\n\n## 3.1 CRUD Operations\n\nCRUD (Create, Read, Update, Delete)\
    \ operations are basic data manipulation for database. In this chapter we will\
    \ develop Python application to execute CRUD operations. Firstly, we create database,\
    \ called and then create a table, called On previous chapter, we already created\
    \ pydb database. The following is **product** table schema:\n\n- Data Type: integer;\
    \ Primary Key (PK) and Not null (NN)\n- Data Type: character(30); Not null (NN)\n\
    - Data Type: integer\n- Data Type: float\n- Data Type: datetime\n\nYou also can\
    \ generate Product table using this query in Python. For CRUD demo, we start by\
    \ creating a Python file, crud_demo.py. We create **open_database()** function\
    \ to connect SQLite database file. The following is codes implementation for open_database()\
    \ function. You can change database file name. I use pydb.db file. After we connected\
    \ to SQLite database file, we return conn object.\n\n```python\nimport sqlite3\n\
    from datetime import datetime\nfrom prettytable import PrettyTable\n\ndef open_database():\n\
    \    db = 'pydb.db'\n\n    print('Connecting to SQLite...')\n    conn = sqlite3.connect(db)\n\
    \    print('connected')\n\n    return conn\n```\n\n**open_database()** function\
    \ will return conn object that will be used for CRUD operations.\n\nWe create\
    \ create_table() function to create Product table. create_table() function needs\
    \ SQLite connection. We define creating table query in sql variable. Firstly,\
    \ we obtain cursor by calling conn.cursor(). Then, we execute a query using cursor.execute().\
    \ After executed, you should call conn.commit() to commit all data changes.\n\n\
    ```python\ndef create_table(conn):\n    cursor = conn.cursor()\n    sql = '''\
    \ create table if not exists product(\n        id integer primary key autoincrement,\n\
    \        name char(30) not null,\n        stock integer,\n        price float,\n\
    \        created datetime\n    )'''\n\n    cursor.execute(sql)\n    conn.commit()\n\
    \    print('created a table')\n```\n\nWe use PrettyTable library to display a\
    \ table in Terminal. Further information about PrettyTable library, you can read\
    \ it on You can install this library using pip.\n\n```\n$ pip install PrettyTable\n\
    ```\n\nNow we can call open_database() function to connect SQLite database file.\
    \ Then, we create a table by calling create_table().\n\n```python\n# open data\n\
    conn = open_database()\n\n# creating table demo\ncreate_table(conn)\n\n# close\
    \ data\nconn.close()\n```\n\nSave the code and try to run crud_demo.py file.\n\
    \n```\n$ python crud_demo.py\n```\n\nThe following is sample running test on Terminal.\n\
    \n![](img/e5b7246022b4d7fa697a71247ffc4e5a_26_0.png)\n\nThe next step is to create\
    \ functions for CRUD implementation. We will add some functions to execute CRUD\
    \ operations on next section.\n\n## 3.2 Creating Data\n\nIn this scenario, we\
    \ create a new product and try to retrieve inserted ID. We can retrieve inserted\
    \ id using cursor.lastrowid. We will use SQL statement to insert data but we use\
    \ parameters to prevent SQL injection. At the end of codes, don't forget to release\
    \ our usage resources and close connection using **close()**\n\nNow we add function\
    \ **create_data()** to create new product. Write these codes.\n\n```python\ndef\
    \ create_data(conn):\n    cursor = conn.cursor()\n    print('inserting data...')\n\
    \    for i in range(1,6):\n        insert_sql = (\"INSERT INTO product \"\n  \
    \                   \"(name, stock, price, created) \"\n                     \"\
    VALUES(?, ?, ?, ?)\")\n\n        params = (\"product \" + str(i), 3+i*4,\n   \
    \               0.4+i*8, datetime.now())\n        cursor.execute(insert_sql, params)\n\
    \        product_id = cursor.lastrowid\n        print('inserted with id=', product_id)\n\
    \n    conn.commit()\n    cursor.close()\n    print('done')\n```\n\nSave this code.\n\
    \nTo test this class, we call **create_data()** function. After that, we try to\
    \ insert 5 data.\n\n```python\n# open data\nconn = open_database()\n\n# creating\
    \ data demo\ncreate_data(conn)\n\n# close data\nconn.close()\n```\n\nSave the\
    \ code and try to run crud_demo.py file.\n\n```\n$ python crud_demo.py\n```\n\n\
    The following is sample running test on Terminal.\n\n![](img/e5b7246022b4d7fa697a71247ffc4e5a_28_0.png)\n\
    \n## 3.3 Reading Data\n\nAfter inserted data, we read data. The following is a\
    \ list of reading data steps:\n\n- Open connection by calling **open_database()**\
    \ function\n- Get cursor object to perform query\n- Create query with SELECT statement\n\
    - Execute query using **execute()**\n- Get all data by looping on cursor object\n\
    - Print data\n- Close connection using **close()**\n\nNow we implement our demo.\
    \ Create a function called write this code:\n\n```python\ndef read_data(conn):\n\
    \    print('reading data')\n    cursor = conn.cursor()\n\n    cursor.execute(\"\
    select id, name, stock, price, created from product\")\n    t = PrettyTable(['ID','Name',\
    \ 'Stock', 'Price', 'Created'])\n    for (id, name, stock, price, created) in\
    \ cursor:\n        t.add_row([id, name, stock, format(price,'.2f'), created])\n\
    \n    print(t)\n    cursor.close()\n    print('done')\n```\n\nSave this code.\n\
    \nNow we test function Write these codes\n\n```python\n# open data\nconn = open_database()\n\
    \n# reading data demo\nread_data(conn)\n\n# close data\nconn.close()\n```\n\n\
    Save this code.\n\nYou can execute **crud_demo.py** file. The following is a sample\
    \ of program output.\n\n![](img/e5b7246022b4d7fa697a71247ffc4e5a_30_0.png)\n\n\
    ## 3.4 Updating Data\n\nOn this section, we will update data by particular ID.\
    \ We use UPDATE statement and pass an updated data.\n\nNow we implement our scenario.\
    \ Create a function called **update_data()** and write this function.\n\n```python\n\
    def update_data(conn,id,product_name,stock,price):\n    print('updating data for\
    \ product id=' + str(id))\n    update_sql = (\"UPDATE product SET name=?, stock=?,\
    \ price=? \"\n                  \"WHERE id=?\")\n    cursor = conn.cursor()\n\n\
    \    params = (product_name,stock,price,id,)\n    cursor.execute(update_sql, params)\n\
    \    print(cursor.rowcount, ' products updated')\n\n    conn.commit()\n    cursor.close()\n\
    \    print('done')\n```\n\nSave this code.\n\nNow we work on file call In this\
    \ testing, we update product with ID 3. You may change product ID based on your\
    \ database. After updated data, we show all data on Terminal.\n\n```python\n#\
    \ open data\nconn = open_database()\n\n# updating data demo\nprint('updating data\
    \ demo')\nid = 3\nproduct_name = 'updated name'\nstock = 10\nprice = 0.9\nupdate_data(conn,id,\
    \ product_name, stock, price)\nread_data(conn)\n\n# close data\nconn.close()\n\
    ```\n\nSave this code. Run file\n\n```\nE:\\Projects\\PEPRESS\\python_sqlite\\\
    codes>python crud_demo.py\nConnecting to SQLite...\nconnected\nupdating data demo\n\
    updating data for product id=3\n1  products updated\ndone\nreading data\n+----+---------------+-------+-------+-----------------------------+\n\
    | ID | Name          | Stock | Price | Created                     |\n+----+---------------+-------+-------+-----------------------------+\n\
    | 1  | product 1     | 7     | 8.40  | 2020-12-17 06:18:03.657792  |\n| 2  | product\
    \ 2     | 11    | 16.40 | 2020-12-17 06:18:03.662788  |\n| 3  | updated name \
    \ | 10    | 0.90  | 2020-12-17 06:18:03.663789  |\n| 4  | product 4     | 19 \
    \   | 32.40 | 2020-12-17 06:18:03.663789  |\n| 5  | product 5     | 23    | 40.40\
    \ | 2020-12-17 06:18:03.663789  |\n+----+---------------+-------+-------+-----------------------------+\n\
    done\n\nE:\\Projects\\PEPRESS\\python_sqlite\\codes>\n```\n\n## 3.5 Deleting Data\n\
    \nTo delete data, we use SQL statement using DELETE and pass a product ID.\n\n\
    We start by creating a function called **delete_data()** and write these codes.\n\
    \n```python\ndef delete_data(conn,id):\n    print('deleting data with id=' + str(id))\n\
    \    cursor = conn.cursor()\n\n    params = (id,)\n    cursor.execute(\"delete\
    \ from product where id=?\", params)\n    print(cursor.rowcount, ' product deleted')\n\
    \n    conn.commit()\n    cursor.close()\n    print('done')\n```\n\nSave this code.\n\
    \nNow we test this function on file Firstly, we open and read existing data. Then,\
    \ we delete data with ID = 3. You can change this ID based on your database. After\
    \ that, we show a list of changed data.\n\n```python\n# open data\nconn = open_database()\n\
    \n# deleting data demo\nprint('deleting data demo')\nread_data(conn)\nid = 3\n\
    ```"
  mdcn: "## 3. CRUD 操作\n\n本章将讲解如何使用 Python 操作 SQLite 数据库中的数据。\n\n## 3.1 CRUD 操作\n\n\
    CRUD（创建、读取、更新、删除）操作是数据库的基本数据操作。在本章中，我们将开发一个 Python 应用来执行 CRUD 操作。首先，我们创建一个名为 `pydb`\
    \ 的数据库，然后创建一个名为 `product` 的表。在上一章中，我们已经创建了 `pydb` 数据库。以下是 **product** 表的结构：\n\n\
    -   数据类型：整数；主键（PK）且非空（NN）\n-   数据类型：字符(30)；非空（NN）\n-   数据类型：整数\n-   数据类型：浮点数\n\
    -   数据类型：日期时间\n\n你也可以在 Python 中使用此查询来生成 Product 表。为了演示 CRUD，我们首先创建一个 Python 文件\
    \ `crud_demo.py`。我们创建 **open_database()** 函数来连接 SQLite 数据库文件。以下是 `open_database()`\
    \ 函数的代码实现。你可以更改数据库文件名。我使用的是 `pydb.db` 文件。连接到 SQLite 数据库文件后，我们返回 `conn` 对象。\n\n\
    ```python\nimport sqlite3\nfrom datetime import datetime\nfrom prettytable import\
    \ PrettyTable\n\ndef open_database():\n    db = 'pydb.db'\n\n    print('Connecting\
    \ to SQLite...')\n    conn = sqlite3.connect(db)\n    print('connected')\n\n \
    \   return conn\n```\n\n**open_database()** 函数将返回一个 `conn` 对象，该对象将用于 CRUD 操作。\n\
    \n我们创建 `create_table()` 函数来创建 Product 表。`create_table()` 函数需要 SQLite 连接。我们在 `sql`\
    \ 变量中定义创建表的查询。首先，我们通过调用 `conn.cursor()` 获取游标。然后，我们使用 `cursor.execute()` 执行查询。执行后，你应该调用\
    \ `conn.commit()` 来提交所有数据更改。\n\n```python\ndef create_table(conn):\n    cursor\
    \ = conn.cursor()\n    sql = ''' create table if not exists product(\n       \
    \ id integer primary key autoincrement,\n        name char(30) not null,\n   \
    \     stock integer,\n        price float,\n        created datetime\n    )'''\n\
    \n    cursor.execute(sql)\n    conn.commit()\n    print('created a table')\n```\n\
    \n我们使用 PrettyTable 库在终端中显示表格。关于 PrettyTable 库的更多信息，你可以阅读其文档。你可以使用 pip 安装此库。\n\n\
    ```\n$ pip install PrettyTable\n```\n\n现在我们可以调用 `open_database()` 函数来连接 SQLite\
    \ 数据库文件。然后，通过调用 `create_table()` 来创建一个表。\n\n```python\n# open data\nconn = open_database()\n\
    \n# creating table demo\ncreate_table(conn)\n\n# close data\nconn.close()\n```\n\
    \n保存代码并尝试运行 `crud_demo.py` 文件。\n\n```\n$ python crud_demo.py\n```\n\n以下是终端中的示例运行测试。\n\
    \n![](img/e5b7246022b4d7fa697a71247ffc4e5a_26_0.png)\n\n下一步是创建用于 CRUD 实现的函数。我们将在下一节中添加一些函数来执行\
    \ CRUD 操作。\n\n## 3.2 创建数据\n\n在这个场景中，我们创建一个新产品并尝试检索插入的 ID。我们可以使用 `cursor.lastrowid`\
    \ 来检索插入的 id。我们将使用 SQL 语句插入数据，但使用参数来防止 SQL 注入。在代码末尾，不要忘记使用 **close()** 释放我们使用的资源并关闭连接。\n\
    \n现在我们添加 **create_data()** 函数来创建新产品。编写以下代码。\n\n```python\ndef create_data(conn):\n\
    \    cursor = conn.cursor()\n    print('inserting data...')\n    for i in range(1,6):\n\
    \        insert_sql = (\"INSERT INTO product \"\n                     \"(name,\
    \ stock, price, created) \"\n                     \"VALUES(?, ?, ?, ?)\")\n\n\
    \        params = (\"product \" + str(i), 3+i*4,\n                  0.4+i*8, datetime.now())\n\
    \        cursor.execute(insert_sql, params)\n        product_id = cursor.lastrowid\n\
    \        print('inserted with id=', product_id)\n\n    conn.commit()\n    cursor.close()\n\
    \    print('done')\n```\n\n保存此代码。\n\n要测试这个函数，我们调用 **create_data()** 函数。之后，我们尝试插入\
    \ 5 条数据。\n\n```python\n# open data\nconn = open_database()\n\n# creating data\
    \ demo\ncreate_data(conn)\n\n# close data\nconn.close()\n```\n\n保存代码并尝试运行 `crud_demo.py`\
    \ 文件。\n\n```\n$ python crud_demo.py\n```\n\n以下是终端中的示例运行测试。\n\n![](img/e5b7246022b4d7fa697a71247ffc4e5a_28_0.png)\n\
    \n## 3.3 读取数据\n\n插入数据后，我们来读取数据。以下是读取数据的步骤列表：\n\n-   通过调用 **open_database()** 函数打开连接\n\
    -   获取游标对象以执行查询\n-   使用 SELECT 语句创建查询\n-   使用 **execute()** 执行查询\n-   通过循环游标对象获取所有数据\n\
    -   打印数据\n-   使用 **close()** 关闭连接\n\n现在我们来实现我们的示例。创建一个名为 `read_data()` 的函数，编写以下代码：\n\
    \n```python\ndef read_data(conn):\n    print('reading data')\n    cursor = conn.cursor()\n\
    \n    cursor.execute(\"select id, name, stock, price, created from product\")\n\
    \    t = PrettyTable(['ID','Name', 'Stock', 'Price', 'Created'])\n    for (id,\
    \ name, stock, price, created) in cursor:\n        t.add_row([id, name, stock,\
    \ format(price,'.2f'), created])\n\n    print(t)\n    cursor.close()\n    print('done')\n\
    ```\n\n保存此代码。\n\n现在我们测试 `read_data()` 函数。编写以下代码：\n\n```python\n# open data\nconn\
    \ = open_database()\n\n# reading data demo\nread_data(conn)\n\n# close data\n\
    conn.close()\n```\n\n保存此代码。\n\n你可以执行 **crud_demo.py** 文件。以下是程序输出的示例。\n\n![](img/e5b7246022b4d7fa697a71247ffc4e5a_30_0.png)\n\
    \n## 3.4 更新数据\n\n在本节中，我们将通过特定 ID 更新数据。我们使用 UPDATE 语句并传递更新后的数据。\n\n现在我们来实现我们的场景。创建一个名为\
    \ **update_data()** 的函数并编写此函数。\n\n```python\ndef update_data(conn,id,product_name,stock,price):\n\
    \    print('updating data for product id=' + str(id))\n    update_sql = (\"UPDATE\
    \ product SET name=?, stock=?, price=? \"\n                  \"WHERE id=?\")\n\
    \    cursor = conn.cursor()\n\n    params = (product_name,stock,price,id,)\n \
    \   cursor.execute(update_sql, params)\n    print(cursor.rowcount, ' products\
    \ updated')\n\n    conn.commit()\n    cursor.close()\n    print('done')\n```\n\
    \n保存此代码。\n\n现在我们在 `crud_demo.py` 文件中进行测试。在此测试中，我们更新 ID 为 3 的产品。你可以根据你的数据库更改产品\
    \ ID。更新数据后，我们在终端上显示所有数据。\n\n```python\n# open data\nconn = open_database()\n\n\
    # updating data demo\nprint('updating data demo')\nid = 3\nproduct_name = 'updated\
    \ name'\nstock = 10\nprice = 0.9\nupdate_data(conn,id, product_name, stock, price)\n\
    read_data(conn)\n\n# close data\nconn.close()\n```\n\n保存此代码。运行文件：\n\n```\nE:\\\
    Projects\\PEPRESS\\python_sqlite\\codes>python crud_demo.py\nConnecting to SQLite...\n\
    connected\nupdating data demo\nupdating data for product id=3\n1  products updated\n\
    done\nreading data\n+----+---------------+-------+-------+-----------------------------+\n\
    | ID | Name          | Stock | Price | Created                     |\n+----+---------------+-------+-------+-----------------------------+\n\
    | 1  | product 1     | 7     | 8.40  | 2020-12-17 06:18:03.657792  |\n| 2  | product\
    \ 2     | 11    | 16.40 | 2020-12-17 06:18:03.662788  |\n| 3  | updated name \
    \ | 10    | 0.90  | 2020-12-17 06:18:03.663789  |\n| 4  | product 4     | 19 \
    \   | 32.40 | 2020-12-17 06:18:03.663789  |\n| 5  | product 5     | 23    | 40.40\
    \ | 2020-12-17 06:18:03.663789  |\n+----+---------------+-------+-------+-----------------------------+\n\
    done\n\nE:\\Projects\\PEPRESS\\python_sqlite\\codes>\n```\n\n## 3.5 删除数据\n\n要删除数据，我们使用\
    \ DELETE 的 SQL 语句并传递一个产品 ID。\n\n我们首先创建一个名为 **delete_data()** 的函数并编写以下代码。\n\n```python\n\
    def delete_data(conn,id):\n    print('deleting data with id=' + str(id))\n   \
    \ cursor = conn.cursor()\n\n    params = (id,)\n    cursor.execute(\"delete from\
    \ product where id=?\", params)\n    print(cursor.rowcount, ' product deleted')\n\
    \n    conn.commit()\n    cursor.close()\n    print('done')\n```\n\n保存此代码。\n\n\
    现在我们在 `crud_demo.py` 文件中测试此函数。首先，我们打开并读取现有数据。然后，我们删除 ID = 3 的数据。你可以根据你的数据库更改此\
    \ ID。之后，我们显示更改后的数据列表。\n\n```python\n# open data\nconn = open_database()\n\n# deleting\
    \ data demo\nprint('deleting data demo')\nread_data(conn)\nid = 3\n```"
