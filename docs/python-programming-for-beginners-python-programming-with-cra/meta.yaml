  mdcn: '## openpyxl 入门


    既然我们已经了解了电子表格以及它们在我们要开发的程序中的运作方式，现在是时候开始使用 Python 库了，它将允许我们用这种语言与 Excel 电子表格进行交互。在本节中，我们需要
    Python 3.7 和 openpyxl 2.6.2 版本。你需要使用以下代码来安装该包：


    ```

    $ pip install openpyxl

    ```


    安装程序后，我们需要创建一个简单的电子表格来配合它。为此，我们可以使用以下代码：


    ```

    from openpyxl import Workbook


    workbook = Workbook()


    sheet = workbook.active


    sheet["A1"] = "hello"


    sheet["B1"] = "world!"


    workbook.save(filename="hello_world.xlsx")

    ```


    现在，假设你正确遵循了说明，上述代码将在你运行代码的位置生成一个名为 hello_world.xlsx 的文件。如果你在 Excel 中打开该文件，你应该会看到一个类似于你习惯使用的电子表格，顶部的前两个单元格分别显示
    hello 和 world。


    当然，我们可以经历这个过程，并根据需要添加尽可能多的深度和细节。但是，我们必须谨慎处理插入各种行和列的方式。如果你足够勤奋，你可以利用上面提供的一些代码来填充整个表格。


    ## 章节总结


    有时你需要构建电子表格来处理数据以及 Python 代码的其他关键部分。这将帮助我们应对由于你将要编写的一些代码而可能出现的许多挑战，并且它将使我们更容易创建数据集，这对于数据分析来说将是理想的。


    从上面的信息可以看出，入门比看起来更简单。只需几个简单的步骤，你就能设置正确的库以及处理创建自己的 Excel 电子表格并确保包含所有相关数据所需的所有其他信息。


    ## 第 15 章


    ### 图形和图像


    我们还应该看看 Python 的图形和图像如何与图形和图片一起工作。我们可以指示 Python 仅在需要时显示图片，确保我们正在处理的网页或其他产品包含我们所需的一些图像。


    当我们谈论计算机图形学时，我们谈论的是如何修改屏幕上的像素，以便我们可以制作漂亮的形状、排版以及我们想要的任何视觉效果。计算机图形学被用于开发我们今天使用的许多产品，包括我们所有的智能设备。


    尽管计算机图形学领域已经以惊人的速度发展，并且已经开发了大量优秀的软件来管理它，但这些软件都无法即时生成图像。为了实现这一点，我们必须达到一种编程水平，其中没有拖放，没有巧妙的全选加粗计算机快捷键，没有裁剪，也没有像过去那样复制和粘贴。


    即使我们无法即时生成我们想要的一些视觉效果，至少使用目前可用的一些图形选项，并不意味着我们对需要做的事情束手无策。实际上，通过我们的编码，我们可以实现这一点。


    我们将通过将我们的一个动态文本数据绘制到图片上来开始这个项目。首先，打开你首选的文本编辑器（大多数都可以；使用你计算机上已安装的那个），并确保你已安装 pip
    和 Python。如果你还没有安装，设置它以确保你的流程顺利运行至关重要。


    在你的系统上安装了 pip 和 Python 之后，我们将打开我们想要使用的 shell，并着手安装 Pillow 库及其所有依赖项。Pillow 将是 Python
    图像库（PIL）的一部分，该库由包括 Alex Clark 在内的几个人发起和维护。它基于 PIL 代码，并且对于这项工作中的某些部分，它已经发展成为比原始
    PIL 更好的版本。


    当你与 Pillow 交互时，你会看到它增加了对打开、修改和保存多种不同图像文件类型的支持。你可以用 Pillow 做的大部分事情将与你可以用原始 PIL
    做的事情相似。


    Pillow 将很容易安装在你的 PC 上。它兼容所有三个主要操作系统，包括 Linux、Mac OS X 和 Windows。在撰写本手册时，最新版本是
    2.2.1，它适用于 Python 2.6 或更高版本，因此它应该适用于你已有的大多数 Python 安装。你可以使用以下代码帮助你在 Windows 计算机上安装它：


    ```

    easy_install Pillow

    ```


    你可以在 Linux 机器上安装它，代码与我们在 Windows 安装选项中看到的非常相似。你可以使用以下代码在 Linux 操作系统上启动并运行 Pillow，以便你可以处理你的照片和图形：


    ```

    sudo pip install Pillow

    ```


    最后，我们可以花一些时间在我们的 Mac OS X 系统上安装 Pillow 扩展。为了实现这一点，需要完成一些额外的步骤。你必须首先安装 XCode，然后使用
    Homebrew 安装所有必要的组件。在你的系统上安装它们之后，你需要运行以下代码：


    ```

    $ brew install libtiff libjpeg webp littlecms

    $ sudo pip install Pillow

    ```


    我们现在已经在我们的 PC 上安装了 Pillow 扩展并准备使用。要开发一些代码，我们需要知道如何处理它。就我们可以用图形和照片做的事情而言，你会发现 Pillow
    有一个庞大的库。但是，目前，我们将保持简单，并专注于以下类来完成工作：


    - Image：用于创建图像对象，我们希望用我们的问候背景来实现这一点。

    - ImageFont：这是我们将用于在问候语上绘制文本的字体。

    - ImageDraw：使用 ImageDraw 创建绘图上下文。


    记住这一点，我们将着手创建一个我们想要使用的背景。这将是一个简单的背景图像，我们可以对其进行操作并用不同的颜色和文本进行装饰。可以使用以下代码来设置它：


    ```

    # import required classes

    from PIL import Image, ImageDraw, ImageFont

    # create an Image object with the input image

    image = Image.open(''background.png'')

    # initialize the drawing context with

    # the image object as background

    draw = ImageDraw.Draw(image)

    ```


    我们需要确保我们拥有正确的文件来创建我们之前讨论的图像字体。你可以自由使用任何最适合你需求的字体。出于我们的目的，我们将使用 Roboto 字体，我们可以从
    Google Fonts GitHub 仓库获取它。为了实现这一点，我们将使用以下代码：


    ```

    # create font object with the font file and specify

    # desired size

    font = ImageFont.truetype(''Roboto-Bold.ttf'', size=45)

    # The starting position of the message

    (x, y) = (50, 50)

    message = "Happy Birthday!"

    color = ''RGB(0, 0, 0)'' # black color

    # draw the message on the background

    draw.text((x, y), message, fill=color, font=font)

    (x, y) = (150, 150)

    name = ''Vinay''

    color = ''RGB(255, 255, 255)'' # white color

    draw.text((x, y), name, fill=color, font=font)

    # save the edited image

    image.save(''greeting_card.png'')

    ```


    如果你能够跟随这段代码并正确地写出来，最终结果将如下所示：


    ![](img/73c5f65e70698c37f092bddc20360f42_100_0.png)


    你可能需要提供一个可选参数来用你想要使用的一些字体加密字体。这意味着告诉 ImageFont 模块在编码期间使用包含你想要使用的字体的文件将起作用。


    ## 第 16 章


    ### 放松一下


    在我们结束本指南之前，我们将看看一些你可以用来与 Python 一起玩乐并了解其工作原理的代码。我们将用 Python 享受一些乐趣，并摆脱我们到目前为止讨论的一些更困难的任务。这让我们可以放松一下，玩得开心，并测试我们的新技能。


    Python 是学习编程的绝佳语言，对于那些想要完成任务而不必花太多时间学习如何使用代码的人来说，它是理想的选择。这就是为什么我们将尽一切努力设计一些游戏，让我们享受编码，而不是总是将其视为一件苦差事。'
