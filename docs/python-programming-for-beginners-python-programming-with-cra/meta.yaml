    # Chapter 11


    ## Tuples


    Python Tuple is the next topic in this guidebook that we need to spend some time
    looking at. When we talk about a tuple in Python, we''re talking about a list.
    However, there are a few distinctions to consider before we begin. The main distinction
    between a list and a tuple is that once an element of a tuple is assigned, it
    cannot be changed. However, while working with a list, you can change the components
    as you interact with them in the code.


    A list and a tuple, on the other hand, will appear to be nearly identical. It''ll
    just come down to whether you want to be able to change up your elements after
    they''ve been assigned. Working with a list is necessary if you want to be able
    to make modifications. You''ll want to use a Tuple if you want to retain the elements
    precisely the same after they''ve been assigned.


    When we wish to work with Tuples, the most critical task we''ll look at is how
    to make our own. This is a simple method to use, and you can build it by putting
    all of your elements, or items, inside the parenthesis and separating them with
    commas. Keep in mind that these parentheses are optional, although including them
    is frequently considered good practice and makes code easier.


    As you work on your tuple, you''ll notice that you can include as many things
    as you like. There will almost always be two because you''re working with a list
    of ideas, but you won''t have to worry about a maximum or minimum. You may also
    mix and match different types of things, so you can include as many strings, lists,
    floats, and integers as you like.


    Now that we''ve discussed tuples and how they tie into some of the Python codings
    you''re doing, it''s time to look at some of the coding required to make your
    tuple. The following are examples of Python code that will assist you in creating
    a tuple.


    ```python

    # Empty tuple

    my_tuple = ()

    print(my_tuple)  # Output: ()


    # Tuple having integers

    my_tuple = (1, 2, 3)

    print(my_tuple)  # Output: (1, 2, 3)


    # tuple with mixed datatypes

    my_tuple = (1, "Hello", 3.4)

    print(my_tuple)  # Output: (1, "Hello", 3.4)


    # nested tuple

    my_tuple = ("mouse", [8, 4, 6], (1, 2, 3))

    print(my_tuple)  # Output: ("mouse", [8, 4, 6], (1, 2, 3))

    ```


    With this in mind, you''ll discover various advantages to dealing with a tuple
    rather than a list. Because these tuples will be similar to lists and used in
    comparable situations, it will be challenging to determine when one should be
    used and why a tuple would have some advantages over working with a list. Some
    of the most significant advantages of using the tuple rather than the list in
    your code include:


    - 1. For heterogeneous or various forms of data and homogeneous or similar types
    of data, the tuple will be employed.

    - 2. Because these tuples are regarded immutable, iterating through them is typically
    faster than through a list. This allows us to receive a minor performance improvement
    when using tuples in our code.

    - 3. Tuples will contain some of the dictionary''s immutable elements that can
    be used as a key. When working with a list, this is not possible.

    - 4. If you have data that doesn''t change, implementing it as a tuple will help
    you protect it.


    ## Chapter Summary


    Tuples and lists will be pretty similar, and if you look at the code, they will
    appear to be the same. The main distinction is whether or not you want to be allowed
    to edit the list of things once they''ve been assigned. Once you assign a value
    to a tuple, it will remain unchanged, and you will not be able to alter it. However,
    you can make some of the necessary adjustments once the task is completed using
    a list. Understanding how the two of these interactions can impact the type of
    code you can do.


    # Chapter 12


    ## Web Scraping


