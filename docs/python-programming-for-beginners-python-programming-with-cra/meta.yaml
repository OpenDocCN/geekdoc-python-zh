    当然，你能为编码和程序做的最重要的事情之一，就是确保这些问题永远不会进入其中。起初这可能会很困难，你可能会担心你的代码永远无法工作，因为它存在缺陷。然而，你练习和学习这些调试工具越多，就越容易避免其中一些问题，并确保你的代码按预期工作。


    当你刚开始学习编码时，学习如何避免或至少将其中一些错误保持在最低限度可能至关重要。到目前为止，我们已经讨论了一些可用于发现和纠正错误的反应性工具。但如果我们能从一开始就防止这些缺陷出现呢？


    这就是各种分析工具将派上用场的地方。使用这些工具，我们将能够看到代码的走向。需要记住的一点是，你的代码可能并不总是按你希望的方向发展。可以使用多种工具对代码进行预调试，包括：


    - 1. Pylint：这被称为代码检查工具，因为它可以检查你的代码并提供改进建议。

    - 2. Pycodestyle：这是一个极好的工具，因为它会建议如何格式化你希望使用的代码。其背后的理念是，如果你的代码遵循一些标准惯例，其他 Python
    程序员将更容易查看它并快速获得更好的理解。

    - 3. Flake8：这是你将一直想要使用的工具之一。它将我们讨论过的两个工具包含在一个包中，并添加了一些额外的功能。这使得检查代码并确保其正常工作变得更加容易。


    ## 章节总结


    错误有时会进入我们的程序，导致程序无法按我们希望的方式执行。好消息是，Python 将为我们提供各种工具，帮助我们发现缺陷并确保我们的程序按预期执行。另一方面，使用一些工具并谨慎处理我们编写的某些代码，可能是处理这个问题的理想方法，因为它确保我们首先可以避免其中一些错误。


    # 第 11 章


    ## 元组


    Python 元组是本指南中我们需要花时间研究的下一个主题。当我们谈论 Python 中的元组时，我们谈论的是一个列表。然而，在开始之前，有一些区别需要考虑。列表和元组之间的主要区别在于，一旦元组的元素被赋值，就不能更改。然而，在使用列表时，你可以在代码中交互时更改组件。


    另一方面，列表和元组看起来几乎相同。这取决于你是否希望在元素赋值后能够更改它们。如果你想能够进行修改，就需要使用列表。如果你想在元素赋值后保持它们完全相同，就需要使用元组。


    当我们希望使用元组时，我们将研究的最关键任务是如何创建自己的元组。这是一个简单的方法，你可以通过将所有元素或项目放在括号内并用逗号分隔来创建它。请记住，这些括号是可选的，但包含它们通常被认为是良好的实践，并且使代码更易于理解。


    在处理元组时，你会注意到你可以包含任意多的项目。几乎总是会有两个，因为你正在处理一个想法列表，但你不必担心最大值或最小值。你还可以混合搭配不同类型的项目，因此你可以包含任意数量的字符串、列表、浮点数和整数。


    既然我们已经讨论了元组以及它们与你正在编写的某些 Python 代码的关联，现在是时候看看创建元组所需的一些代码了。以下是将帮助你创建元组的 Python
    代码示例。


    ```python

    # 空元组

    my_tuple = ()

    print(my_tuple)  # 输出：()


    # 包含整数的元组

    my_tuple = (1, 2, 3)

    print(my_tuple)  # 输出：(1, 2, 3)


    # 包含混合数据类型的元组

    my_tuple = (1, "Hello", 3.4)

    print(my_tuple)  # 输出：(1, "Hello", 3.4)


    # 嵌套元组

    my_tuple = ("mouse", [8, 4, 6], (1, 2, 3))

    print(my_tuple)  # 输出：("mouse", [8, 4, 6], (1, 2, 3))

    ```


    考虑到这一点，你会发现使用元组而不是列表有各种优势。因为这些元组类似于列表并在类似的情况下使用，所以很难确定何时应该使用一个，以及为什么元组比使用列表有一些优势。在代码中使用元组而不是列表的一些最显著优势包括：


    - 1. 元组将用于异构或各种形式的数据以及同构或相似类型的数据。

    - 2. 因为这些元组被认为是不可变的，所以遍历它们通常比遍历列表更快。这使我们能够在代码中使用元组时获得轻微的性能提升。

    - 3. 元组将包含一些字典的不可变元素，这些元素可以用作键。使用列表时，这是不可能的。

    - 4. 如果你有不会更改的数据，将其作为元组实现将帮助你保护它。


    ## 章节总结


    元组和列表非常相似，如果你查看代码，它们看起来会是一样的。主要区别在于你是否希望在元素赋值后允许编辑项目列表。一旦你为元组赋值，它将保持不变，你将无法更改它。但是，你可以在任务完成后使用列表进行一些必要的调整。理解这两者如何交互会影响你可以编写的代码类型。


    # 第 12 章


    ## 网页抓取


    假设你的公司决定进行数据分析以改善客户互动。还应该尽快从各种网站中提取大量数据。确保此过程尽快完成。如果你必须手动逐个收集和搜索每个网站上的数据，你如何在短时间内完成这项工作？


    如果上述技术听起来很费力，网页抓取可能适合你。我们可以经历这个过程并从网页中检索我们需要的信息。网页抓取过程有许多优势，而 Python 编程语言可以使其尽可能轻松和简单。


    ### 为什么使用网页抓取？


    网页抓取最常用于从网站获取大量信息。然而，你首先会关心的是为什么有人需要从网站获取所有这些信息。下面列出了一些网页抓取应用程序。让我们都了解它们：


    - 1. 电子邮件地址：在当今世界，几乎每家公司都使用电子邮件进行营销活动。然后，网页抓取可以获取向许多潜在买家发送大量营销电子邮件所需的电子邮件。

    - 2. 价格比较：包括 ParseHub 在内的各种服务使用网页抓取从在线购物网站中提取信息。这些数据将用于比较各种产品的成本。

    - 3. 从社交媒体抓取：这将类似于我们之前看到的电子邮件收集。网页抓取将帮助我们从 Facebook 和 Instagram 等各种社交媒体平台收集信息。这将极大地帮助确定企业的下一步最佳行动以及当前的热门趋势。

    - 4. 网页抓取可用于从网站获取大量数据用于研发。然后你可以分析数据并利用它来完成你需要完成的一些研发和调查工作。

    - 5. 职位发布：有时会从许多不同的网站获取有关各种职位空缺的信息。它们可以集中在一处，使用户在需要时更容易找到它们。


    网页抓取是一种从网站自动提取大量数据的技术。网站上的数据将是非结构化格式。网页抓取可以收集非结构化数据，然后将其转换为结构化格式，保存信息。


    抓取网站可以通过多种方式完成，包括构建自己的代码、使用 API 和互联网服务。稍后，我们将研究如何使用 Python 实现你需要的一些网页抓取，以及执行此操作所需的一些代码。


    在你深入研究并执行此技术之前，请记住，某些网站会允许你这样做，而其他网站则不会。也可以检查该网站的 robots.txt 文件以确定是否允许抓取。如果你尝试抓取的网站不允许，你将不得不找到另一种方法来完成你的任务。'
