    \n你可以使用你的命令行文本编辑器来处理 Hello World! 程序。这应该随你下载的 Python 版本一起提供，所以打开它并开始处理一个新文件。在信封内写下以下行：\n\
    \n```\n$ nano hello.py\n```\n\n在你的终端窗口中打开此文本文件后，输入以下行来运行程序：\n\n```\nprint(\"Hello,\
