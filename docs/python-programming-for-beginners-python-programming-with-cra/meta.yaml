    \ Python 和测试我们编码技能的一个绝佳机会。\n\n在我们将要查看的示例中，我们将学习如何制作一个可以进行加、减、乘、除运算的简单计算器。用户输入的内容将决定计算器执行的操作。这个计算器将是功能性的，并且能够处理你需要完成的大部分加法和减法运算。\n\
