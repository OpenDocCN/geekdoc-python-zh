  md: '# Creating a Hangman Game


    Now that we''ve acquired some experience with Python and had some fun with our
    smiley faces, it''s time to take things a step further and learn how to make our
    own game. We''ll use the traditional Hangman Game as a starting point. You''ll
    be able to play Hangman by yourself or with a friend after it''s finished. You''ll
    be astounded by the amount of power and enjoyment you can have with this code
    simply by working with it.


    Even in this game, you''ll find many of the essential pieces you need with Python
    scripting. A loop will be included because it gives us a few chances to guess
    before the game considers itself finished. This is critical since you do not want
    the game to halt after only guessing one letter, nor do you want it to become
    stuck and freeze.


    You may also notice that this Hangman game contains a few conditional statements.
    The conditional statements are crucial in this game because they will tell us
    if the letter we chose was the correct one for that term or not. And, for the
    code we''re building today, you won''t be responsible for figuring out the secret
    word because Python will do it for us. This allows you actually to play the game.
