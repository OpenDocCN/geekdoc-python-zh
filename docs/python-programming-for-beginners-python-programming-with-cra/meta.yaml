  mdcn: "## 打开文件\n\nPython 被设计成内置了一个函数来帮助你打开想要的文件。这个函数被称为 `open()`。这个函数会返回我们所需的文件对象或句柄，因为它被用来帮助你按照期望的方式读取或修改文件。当我们打开文件时，可以指定模式。我们必须指定是使用\
    \ \"r\" 进行读取、\"w\" 进行写入，还是 \"a\" 进行追加。此外，我们必须指定是以二进制模式还是文本模式打开文件。\n\n默认情况下，文件将以文本模式打开。当我们在此模式下从文件读取时，会得到一些字符串作为结果。不过，你有多种打开文件的选项，包括以二进制模式打开。当你选择二进制模式时，我们将收到字节，这在处理包含文本的文件时可能很有用。\n\
    \n我们需要了解一些可用的不同 Python 文件模式来帮助理解这一点。以下是一些选项，可以帮助你以正确的顺序和方式打开想要的文件：\n\n- 1. `r`：这将帮助我们读取文件。\n\
    - 2. `w`：这将打开一个我们可以写入的文件。如果文件不存在，它会创建一个新文件；如果文件已存在，则会截断该文件。\n- 3. `x`：这将帮助我们以独占创建方式打开文件。如果文件已存在，操作将失败。\n\
    - 4. `a`：这将打开文件以进行追加。这允许你在不截断文件的情况下向文件末尾添加额外数据。如果文件不存在，也可以用它来创建新文件。\n- 5. `t`：这将以文本模式打开文件。\n\
    - 6. `b`：文件将以二进制模式打开。\n- 7. `+`：无论你是读取还是写入文件，这都会打开它以进行更新。\n\n## 如何写入文件\n\n接下来我们要看的是使用\
    \ Python 创建文件。我们有几种写入文件的方式，包括写入、独占创建和追加模式。请谨慎使用写入模式，因为它会覆盖你在文件中之前完成的所有工作。此选项会清除所有先前的数据，因此请仔细确认这是你希望执行的操作。\n\
    \n`write()` 方法用于写出字符串，如果你处理的是二进制文件，则是字节序列。这是一种可以告诉我们文件中有多少字符的方法。你可以通过以下代码看到这一点：\n\
    \n```python\nwith open(\"test.txt\", 'w', encoding='utf-8') as f:\n    f.write(\"\
    my first file\\n\")\n    f.write(\"This file\\n\\n\")\n    f.write(\"contains\
    \ three lines\\n\")\n```\n\n如果你的计算机上还没有名为 \"test.txt\" 的文件，此程序将创建一个。如果你已经有这个文件，那么上面的代码将覆盖它。为了帮助我们区分不同的行，我们需要自己添加一些换行符。\n\
    \n## 章节总结\n\n了解如何处理代码中附带的一些文件至关重要。这确保我们能够创建新文件、编辑现有文件、追加到现有文件等等。但是，你必须验证选择了正确的方法来操作。否则，你可能会在编程中遇到问题。另一方面，遵循上面的代码可以帮助你处理很多\
    \ Python 文件，你会看到当它们组合在一起时是多么简单。\n\n# 第 9 章\n\n## 组织文件\n\n在编写你想要在 Python 中实现的不同脚本时，有时你需要组织一些文件。这些文件对你的语言工作至关重要，但如果我们不花时间去组织它们并给予它们所需的关心和注意，最终会弄得一团糟。\n\
    \n你在 Python 中使用的任何数据都会作为文件保存在计算机的硬盘驱动器上。你可以多次重用代码，例如使用继承，但你必须采取适当的步骤来做到这一点，而且大多数人当他们能够将数据转换为文件时都会感到高兴。当需要在\
    \ Python 的文件模式下工作时，我们可以做几件事。让我们看一个例子，看看如何让事情尽可能简单。\n\n想想你如何使用 Word 文档。你会打开它，在里面写一些东西，然后保存信息以避免丢失。你使用的\
    \ Python 文件的工作方式类似。你不是存储页面，而是将你编写的代码保存在某个地方，以便你能找到它，并且编译器之后也能找到它。我们可以专注于几个步骤来实现这一点，包括在现有文件中编写代码、查找或移动文件、创建新文件以及关闭并保存现有文件。让我们看看在你希望完成的代码上下文中，每个步骤将如何工作。\n\
    \n## 为 Python 创建新文件\n\n在处理 Python 文件时，我们首先要关注的是如何创建一个自己的文件。如果你想创建一个新文件然后编写代码，你必须首先确保\
    \ IDLE 和编译器正在运行。你还需要做出一些选择，例如决定编写代码时使用哪种模式。请记住，你有三个主要选项可供选择：追加 (`a`)、写入 (`w`)\
    \ 和模式 (`x`)。\n\n如果你希望更改当前打开的文件，可以选择 (`w`) 或写入选项，因为它通常最容易处理。当你尝试打开一个文件然后向其中写入新字符串时，你会处理二进制文件并需要使用\
    \ `write()` 方法。这将很好地工作，因为它确保你最终会得到正确的字符。\n\n`write()` 函数非常易于使用，允许你对文件进行任意多次修改。你可以向文件添加新信息，也可以修改已打开的文件。如果你想自己编写代码，可以按照这个示例来简化操作：\n\
    \n```python\n# file handling operations\n# writing to a new file hello.txt\nf\
    \ = open('hello.txt', 'w', encoding='utf-8')\nf.write(\"Hello Python Developers!\"\
    )\nf.write(\"Welcome to Python World\")\nf.flush()\nf.close()\n```\n\n在我们继续之前，请确保打开编译器并输入以下代码。此代码本质上帮助你创建一个文件并将所有内容放在正确的位置。当前目录被称为默认目录。可以更改你希望存储信息的目录，但请确保提前这样做，否则之后可能难以找到它。\n\
    \n然而，我们必须在此处谨慎行事。当我们编写代码时，文件将保存在我们正在工作的目录中。这可能不是文件的最佳位置，你可能需要移动它。如果你希望文件位于不同的目录，请确保在开始之前当前目录是你想要的那个。\n\
    \n当你前往文件存储的正确位置并使用我们讨论过的选项打开该文件时，你将看到的消息是 \"Hello Python Developers! Welcome to\
    \ Python World!\"\n\n我们可以看到，现在我们已经到了这一步，我们已经能够开发一个新程序。但是，有时你可能需要进行一些调整，或者想要覆盖你正在使用的软件。这允许你向该文件添加一个新语句。假设你已经写好了上面的文件，但你想编辑它显示的消息。我们可以用它来实现这一点，但我们需要稍微调整一下我们正在处理的语法。为了实现这一点，你需要编写以下代码：\n\
    \n```python\n# file handling operations\n# writing to a new file hello.txt\nf\
    \ = open('hello.txt', 'w', encoding='utf-8')\nf.write(\"Hello Python Developers!\"\
    )\nf.write(\"Welcome to Python World\")\nmylist = [\"Apple\", \"Orange\", \"Banana\"\
    ]\n# writelines() is used to write multiple lines into the file\nf.write(mylist)\n\
    f.flush()\nf.close()\n```\n\n因为你只需要添加一行新内容，所以当你想要对已经处理过的文件进行一些修改时，上面的例子是一个很好的例子。因为这个例子只有几个简单的词，所以第三行不是必需的，但你可以按照上面的语法并根据需要进行修改，向程序添加任何你想要的内容。"
