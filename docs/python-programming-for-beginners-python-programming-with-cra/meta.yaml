- md: "## First Steps with Linux\n\nWorking with the Python coding language on a Linux\
    \ operating system is also advantageous. While the Linux operating system may\
    \ not be as widely used as Windows and Mac, there are still many advantages to\
    \ using Python on this system. Linux is an excellent choice for programming and\
    \ other tasks.\n\nIf you want to work with the Linux operating system, you should\
    \ see if your system already has a Python version installed. This is simple enough\
    \ to accomplish, and you'll only need to use the following code to get started:\n\
    \n```\n$ python3 --version\n```\n\nInstalling Python 3.6 on Ubuntu 16.10 or later\
    \ is a simple process. All you have to do is type the following commands:\n\n\
    ```\n$ sudo apt-get update\n$ sudo apt-get install python3.6\n```\n\nIf you're\
    \ using an older version of Ubuntu or another operating system, you'll need to\
    \ use the dead snakes PPA or another tool to get the Python 3.6 version. The following\
    \ is the code you'll need to do this:\n\n```\n$ sudo apt-get install software-properties-common\n\
    $ sudo add-apt-repository ppa:deadsnakes/ppa\n$ sudo apt-get update\n$ sudo apt-get\
    \ install python3.6\n```\n\nThe good news is that if you're working with other\
    \ Linux distributions, Python 3 is almost certainly already installed. If not,\
    \ you can use the package manager included with the distribution. If the Python\
    \ 3 package isn't up to date or isn't the correct version for you, you can follow\
    \ these identical procedures to help install a more recent version of Python on\
    \ your computer.\n\n## Chapter Summary\n\nThere are very few programming languages\
    \ that can run on all types of operating systems, including Python. With this\
    \ method, you have great flexibility and can program without changing your computer\
    \ or its practices. Having the option to use any operating system is advantageous,\
    \ regardless of whether you are familiar with Windows, Mac OS X, or Linux.\n\n\
    ## Chapter 4\n\n### The Basics of Python\n\nOne of the most effective ways to\
    \ become acquainted with the Python programming language is to give it a few tries.\
    \ The more you practice some of the coding you want to do in this language, the\
    \ more comfortable you will become with it, making it easier to work on some more\
    \ complicated stuff later. That's why we'll spend some time in this chapter going\
    \ over the fundamentals of Python programming and how to work with your IDE and\
    \ compiler to get the job done.\n\nIn this chapter, we'll focus on writing our\
    \ first few lines of code. For this one, we'll keep it simple and learn one of\
    \ the most basic codes: Hello, World!\n\nThe good news is that we can combine\
    \ many different parts with this code to achieve the best results. As we progress\
    \ through this guidebook, we only need to learn the fundamentals before moving\
    \ on to something a little more complicated.\n\nYou can use your command line\
    \ text editor to work with the Hello World! Program. This should have come with\
    \ the Python version you downloaded, so open it and start working on a new file.\
    \ Write the following line on the inside of the envelope:\n\n```\n$ nano hello.py\n\
    ```\n\nAfter you've gotten this text file to open in your terminal window, type\
    \ out the following line to run the program:\n\n```\nprint(\"Hello, World!\")\n\
