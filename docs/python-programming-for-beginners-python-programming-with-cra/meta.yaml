- md: '## Getting Started with openpyxl


    Now that we''ve learned a bit about spreadsheets and how they function in the
    programs we want to develop, it''s time to get started with the Python library,
    which will allow us to interact with Excel spreadsheets in this language. For
    this section, we''ll require Python 3.7 and openpyxl 2.6.2 version. You''ll need
    to work with the following code to install the package:


    ```

    $ pip install openpyxl

    ```


    After installing the program, we''ll need to make our straightforward spreadsheet
    to go along with it. To accomplish this, we can use the following code:


    ```

    from openpyxl import Workbook


    workbook = Workbook()


    sheet = workbook.active


    sheet["A1"] = "hello"


    sheet["B1"] = "world!"


    workbook.save(filename="hello_world.xlsx")

    ```


    Now, assuming you followed the instructions correctly, the code above will generate
    a file named hello_world.xlsx in the location where you want to run the code.
    If you open the file in Excel, you should see a spreadsheet similar to what you''re
    used to, with the first two cells on top saying hello and world.


    Of course, we may go through this procedure and add as much depth and detail as
    we want. However, we must be cautious in how we insert the various rows and columns.
    If you''re diligent, you can fill up the entire table utilizing some of the code
    provided above to assist you.


    ## Chapter Summary


    There will be times when you need to construct your spreadsheets to handle data
    and other crucial components of your Python code. This will help us deal with
    a lot of the challenges that may arise due to some of the coding you''ll be doing,
    and it will make it easier for us to create our data set, which will be ideal
    for data analysis.


    As you can see from the information above, getting started is more straightforward
    than it appears. With just a few simple steps, you''ll be able to set up the correct
    library, as well as all of the other information you''ll need, to handle creating
    your own Excel spreadsheet and ensuring that all of the relevant data is included.


    ## Chapter 15


    ### Graphics and Images


    We should also look at how Python''s graphics and images operate with graphics
    and pictures. We can instruct Python to display a picture only when required,
    ensuring that the webpage or other product we are dealing with contains some of
    the images we require.


    When we talk about computer graphics, we''re talking about how a pixel on our
    screen can be modified so that we can make beautiful shapes, typography, and any
    visuals we want. Computer graphics were used to develop many of the products we
    use today, including all of our smart devices.


    Even though the field of computer graphics has advanced at a breakneck pace and
    that a plethora of excellent software has been developed to manage it, none of
    these can generate images on the fly. To accomplish this, we must reach a level
    of programming where there is no drag and drop, no clever select-all make bold
    computer shortcuts, no cropping, and no copying and pasting as we have done in
    the past.


    Even while we can''t generate some of the visuals we want on the fly, at least
    with some of the graphics options available right now, it doesn''t mean we''re
    at a loss for what we need to do. In reality, with our coding, we can make this
    happen.


    We will begin working on this project by drawing one of our dynamic text data
    on a picture. First, open your preferred text editor (most of them will work;
    use the one already installed on your computer) and ensure that you have pip and
    Python installed. If you don''t have this present yet, it''s critical to set it
    up so that your process runs well.


    After pip and Python are installed on your system, we''ll open the shell we want
    to use and work on installing the Pillow library and all of its dependencies.
    Pillow will be a part of the Python Image Library, or PIL, which was started and
    is maintained by several people, including Alex Clark. This is based on the PIL
    code and has evolved into a better version of PIL for some of this work than PIL
    was originally.


    When you interact with Pillow, you''ll see that it adds support for opening, modifying,
    and saving a variety of different image file types. Much of what you can do with
    Pillow will be similar to what you can do with the original PIL.


    Pillow will be simple to install on your PC. It is compatible with all three major
    operating systems, including Linux, Mac OS X, and Windows. As of the time of writing
    this handbook, the most recent version is 2.2.1, and it works with Python 2.6
    or higher, so it should work with most of the Python installations you already
    have. You can use the code below to help you install this on your Windows computer:


    ```

    easy_install Pillow

    ```


    You can install this on a Linux machine, and the code is very similar to what
    we see with the Windows installation option. You can use the following code to
    get Pillow up and running on a Linux operating system so you can work with your
    photos and graphics:


    ```

    sudo pip install Pillow

    ```


    Finally, we can devote some time to installing the Pillow extension on our Mac
    OS X system. To make this happen, there are a few additional actions to complete.
    You must first install XCode and then use Homebrew to install all of the necessary.
    You''ll need to run the following codes after you''ve installed them on your system:


    ```

    $ brew install libtiff libjpeg webp littlecms

    $ sudo pip install Pillow

    ```


    We now have the Pillow extension installed and ready to use on our PC. To develop
    some code, we need to know how to take this. When it comes to what we can do with
    graphics and photos, you''ll find that Pillow has an extensive library. But, for
    now, we''ll keep things basic and focus on the following classes to get the job
    done:


    - Image: This is used to make an image object, which we want to achieve with our
    greeting background.

    - ImageFont: This is the typeface we''ll use to draw the text on the greeting.

    - ImageDraw: Create a drawing context with ImageDraw.


    Keeping this in mind, we''ll set out to create a background that we''d like to
    work with. This will be a simple backdrop image that we can manipulate and embellish
    with different colors and text as we go. The following code can be used to set
    it up:


    ```

    # import required classes

    from PIL import Image, ImageDraw, ImageFont

    # create an Image object with the input image

    image = Image.open(''background.png'')

    # initialize the drawing context with

    # the image object as background

    draw = ImageDraw.Draw(image)

    ```


    We need to make sure we have the correct files to create the image font we discussed
    earlier. You are free to use any of the fonts that best suit your needs. We''ll
