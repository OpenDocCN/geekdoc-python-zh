    \n随着我们逐步深入这本指南并了解 Python 的工作原理以及使用起来有多简单，你将能够掌握代码的许多基本部分。然而，我们将介绍一些用 Python 编写你想要的代码的基础知识，并确保所有内容都能很好地结合在一起。\n\
    \n正如你所看到的，Python 代码有许多部分。首先是关键字。这些是你给编译器的指令，让它理解如何表现以及你希望它做什么。这些是保留的；将它们放在代码中的错误位置会导致编译器失败。\n\
    \n当你浏览一些代码时，你会注意到 `#` 符号经常出现。在 Python 编程语言中，这是我们编写注释的方式。如果你想给代码的一部分命名、提供一些信息或在不破坏代码的情况下留下其他内容，只需在其前面放置一个注释或\
    \ `#` 符号。\n\n我们还必须注意变量。这些变量本质上只是我们计算机内存中的位置。变量用于存储它们。然后，当我们在代码中为变量赋值时，该值将存储在该内存部分中，以便程序可以访问它。\n\
