    \ 2 you use will differ depending on how old your computer is and which operating\
    \ system you're using. However, Python should be present in some form. To find\
    \ out which Python 2 version is installed on your computer, open your terminal\
    \ app and type the following command:\n\n```\npython –V\n```\n\nThis will display\
    \ the version you will receive by showing a number. If you want, you can install\
    \ Python 3 on this system instead of the 2.X version, and you don't have to uninstall\
    \ the 2.X version. To check for the 3.X installation simply launches the terminal\
    \ app and enter the following command:\n\n```\nPython3 –V\n```\n\nFor this one,\
    \ keep in mind that the default for this type of operating system is that Python\
    \ 3 will not be installed at all. This means that if you want to use a newer version\
    \ of Python, such as Python 3, you must go to www.python.org and download the\
    \ version of Python you want. There are a few other places to get Python, but\
    \ the website listed above can do it all for you and ensure that you have the\
    \ IDLE, interpreter, and other tools you need at no cost.\n\nAs soon as you begin\
    \ writing code in this language, you will discover that having the Python Shell\
    \ and IDLE installed is critical to getting that code down. You should double-check\
    \ that both of these are installed on your system, and the best way to do so is\
    \ to use the instructions below:\n\n- You can type \"Idle\" in Python 2.\n- You\
    \ can type \"idle3.\" in Python 3.X.\n\nWhen you install Python 3, IDLE will be\
    \ included as part of the standard applications. As we mentioned earlier, you\
    \ will need to install IDLE as part of the common application when installing\
    \ Python 3. This section of the code will then be located in the Applications\
    \ folder. To get this program started and working on your desktop, simply open\
    \ the folder, double-click on the IDLE application, and get to work.\n\n### First\
    \ Steps with Windows\n\nWhen it comes to handling some of your Python needs, you\
    \ can download and install this language on your Windows computer in addition\
    \ to working with the Mac operating system. And, because so many people enjoy\
    \ working with this coding language because of its ease of use and extensive features,\
    \ it's comforting to know that Python will run smoothly on it as well.\n\nWhen\
    \ working with the Windows operating system, one thing to keep in mind is that\
    \ Python will not come pre-installed. This is because Windows already has its\
    \ coding system and would not add another. The good news is that Python will continue\
    \ to function normally. We simply don't see the value in having this pre-installed\
    \ and ready to use on the system.\n\nPython installation on a Windows computer\
    \ does not have to be complicated. You can take the following steps to ensure\
    \ it's installed:\n\n- 1. You'll need to go to the official Python download page\
    \ and download the Windows installer to get started. You can either download the\
    \ most recent version of Python 3 or choose another option. The installer will\
    \ install the 32-bit version of Python by default, but you can upgrade to the\
    \ 64-bit version if you prefer. The 32-bit version is usually recommended to ensure\
    \ no compatibility issues with older packages, but you can experiment if you want.\n\
    - 2. Select \"Run as Administrator\" from the context menu when you right-click\
    \ the installer. There will be two options for you to choose from. You should\
    \ select \"Customize Installation.\"\n- 3. Ensure all the boxes under \"Optional\
    \ Features\" are checked on the next screen and then click to continue.\n- 4.\
    \ You should select the location where you want Python to be installed under Advanced\
    \ Options. Install should be desired. Allow some time for it to complete before\
    \ closing the installer.\n- 5. Next, modify the system's PATH variable to include\
    \ directories containing packages and other components you'll need later. Follow\
    \ these steps to accomplish this:\n    - To access the Control Panel, go to the\
    \ Start menu and select Control Panel. To do so, right-click on the taskbar and\
    \ type Control Panel. Select the icon.\n    - Look for Environment in the Control\
    \ Panel. Then select Edit the System Environment Variables from the drop-down\
    \ menu. You can then choose Environment Variables from the drop-down menu.\n \
    \   - Go to the User Variables section. You can either edit the existing PATH\
    \ variable or create a new one.\n    - If the system doesn't have a variable for\
    \ PATH, create one by clicking on New. Give the PATH variable a name and include\
    \ it in the folders you wish. Close all of the control Panel dialogs and proceed.\n\
    - 6. You can now use the command prompt. To do so, go to the Start Menu, then\
    \ Windows System, and finally Command Prompt. Enter \"python\" in the search box.\
    \ This will start the Python interpreter on your behalf.\n\nThe program will be\
    \ ready for us to use on our Windows system from here. You have the option of\
    \ checking out all of the different parts by opening them up. Examine the available\
    \ features before embarking on your coding adventure!"
  mdcn: "## 第二章\n\n### Python 语言\n\n许多企业使用 Python 来完成各种任务。由于许多公司对其商业机密持谨慎态度，你并不总能听到\
    \ Python 的应用案例。但 Python 几乎无所不能，你的公司将其用于业务需求将大受裨益。\n\n由于其多功能性，Python 可用于广泛的任务。Python\
    \ 既适用于大型和小型项目，也适用于离线和在线项目。数据分析、简单脚本编写和 Web 开发将是 Python 最佳的应用场景。Python 可以在许多方面帮助你和你的公司，包括：\n\
    \n- 1. Web 开发：Python 可以创建任何类型的 Web 应用程序，无论其复杂程度如何。Flask、Django 和 Pyramid 只是众多优秀\
    \ Python 框架中的几个例子。\n- 2. 数据科学编程：Python 是数据科学家的热门选择。得益于其附带的众多优秀库，如 Pandas 和 NumPy，以及一些数据可视化库如\
    \ Seaborn 和 Matplotlib，它在该领域日益普及。\n- 3. 机器学习：机器学习对许多企业变得越来越重要，了解如何使用它将帮助公司在竞争中保持领先。许多优秀的机器学习算法都支持\
    \ Python，帮助我们更深入地了解客户并脱颖而出。\n- 4. 计算机视觉：使用 OpenCV 和 Python，你可以用计算机视觉做许多令人兴奋的事情，例如颜色检测和人脸检测。\n\
    - 5. 游戏开发：Python 模块 Pygame 可以帮助我们创建电子游戏。这些应用程序可以在 Android 设备上流畅运行。\n- 6. 网页抓取：如果你想从某个网站抓取数据，但该网站没有提供\
    \ API 来暴露数据，Python 可以介入并为你完成部分抓取工作。\n- 7. 编写脚本：如果你手动执行某些操作，Python 会更易于使用，并确保重复性任务（如发送电子邮件）可以实现自动化。\n\
    - 8. 浏览器自动化：Python 可以通过多种方式帮助完成这部分流程。它可以帮你自动打开浏览器，然后无需手动操作即可发布你的 Facebook 状态。为此，Selenium\
    \ 配合 Python 是最佳选择。\n- 9. GUI 开发：使用多个 Python 模块，如 PyQT 和 Tkinter，你可以创建自己的图形用户界面（GUI）或桌面应用程序。\n\
    - 10. Python 庞大的库使其能够执行你想到的几乎任何任务。这将使你能够在几秒钟内创建原型。虽然其质量和功能通常不如完整模型，但你可以用它来帮助构建原型。你的初创公司或现有企业可以利用\
    \ Python 来验证其想法或产品。\n\n## 章节总结\n\nPython 编程语言是企业最受欢迎的语言之一。你需要确保能够充分利用这种编程语言的能力，但最终，这一切都是值得的。由于\
    \ Python 是一种极其易用且功能强大的语言，许多企业纷纷转向 Python 也就不足为奇了。\n\n## 第三章\n\n### Python 入门\n\
    \n既然我们已经对 Python 及其能做什么有了一些了解，让我们来看看安装 Python 可以采取的一些步骤。Python 兼容三大操作系统：Linux、Mac\
    \ OS X 和 Windows。无论你在过程中偏好哪种类型的系统，这都使其更易于使用和操作。以下是在系统上安装 Python 可以采取的一些步骤：\n\n\
    ### Mac OS X 入门\n\n如果你使用 Mac 电脑，你应该能找到已安装的 Python 2。你使用的 Python 2 版本会因电脑的年龄和所使用的操作系统而异。但是，Python\
    \ 应该以某种形式存在。要查明你的电脑上安装了哪个 Python 2 版本，请打开终端应用程序并输入以下命令：\n\n```\npython –V\n```\n\
    \n这将通过显示一个数字来显示你将获得的版本。如果你愿意，你可以在此系统上安装 Python 3 而不是 2.X 版本，并且你不必卸载 2.X 版本。要检查\
    \ 3.X 安装，只需启动终端应用程序并输入以下命令：\n\n```\nPython3 –V\n```\n\n对于这个命令，请记住，此类操作系统的默认设置是\
    \ Python 3 根本不会被安装。这意味着如果你想使用更新版本的 Python，例如 Python 3，你必须访问 www.python.org 并下载你想要的\
    \ Python 版本。还有其他一些地方可以获取 Python，但上面列出的网站可以为你完成所有操作，并确保你免费获得所需的 IDLE、解释器和其他工具。\n\
    \n一旦你开始用这种语言编写代码，你就会发现安装 Python Shell 和 IDLE 对于编写代码至关重要。你应该仔细检查这两者是否都已安装在你的系统上，最好的方法是使用以下说明：\n\
    \n- 你可以在 Python 2 中输入 \"Idle\"。\n- 你可以在 Python 3.X 中输入 \"idle3.\"。\n\n当你安装 Python\
    \ 3 时，IDLE 将作为标准应用程序的一部分包含在内。正如我们之前提到的，在安装 Python 3 时，你需要将 IDLE 作为常用应用程序的一部分进行安装。然后，这部分代码将位于应用程序文件夹中。要启动此程序并在桌面上工作，只需打开文件夹，双击\
    \ IDLE 应用程序，然后开始工作。\n\n### Windows 入门\n\n在处理一些 Python 需求时，除了使用 Mac 操作系统外，你还可以在\
    \ Windows 电脑上下载和安装这种语言。而且，由于许多人喜欢使用这种编程语言，因为它易于使用且功能广泛，知道 Python 也能在 Windows 上流畅运行是令人欣慰的。\n\
    \n在使用 Windows 操作系统时，需要注意的一点是 Python 不会预装。这是因为 Windows 已经有自己的编码系统，不会添加另一个。好消息是\
    \ Python 将继续正常运行。我们只是认为没有必要在系统上预装并准备好使用它。\n\n在 Windows 电脑上安装 Python 不一定很复杂。你可以采取以下步骤确保其安装：\n\
    \n- 1. 首先，你需要访问官方 Python 下载页面并下载 Windows 安装程序。你可以下载最新版本的 Python 3 或选择其他选项。安装程序默认将安装\
    \ 32 位版本的 Python，但如果你愿意，可以升级到 64 位版本。通常建议使用 32 位版本以确保与旧软件包没有兼容性问题，但你可以根据需要进行尝试。\n\
    - 2. 右键单击安装程序，从上下文菜单中选择“以管理员身份运行”。将有两个选项供你选择。你应该选择“自定义安装”。\n- 3. 在下一个屏幕上，确保“可选功能”下的所有复选框都已选中，然后单击继续。\n\
    - 4. 你应该在“高级选项”下选择你希望安装 Python 的位置。选择所需的安装位置。留出一些时间让其完成，然后关闭安装程序。\n- 5. 接下来，修改系统的\
    \ PATH 变量以包含包含你稍后需要的软件包和其他组件的目录。按照以下步骤操作：\n    - 要访问控制面板，请转到“开始”菜单并选择“控制面板”。为此，右键单击任务栏并输入“控制面板”。选择该图标。\n\
    \    - 在控制面板中查找“环境”。然后从下拉菜单中选择“编辑系统环境变量”。然后你可以从下拉菜单中选择“环境变量”。\n    - 转到“用户变量”部分。你可以编辑现有的\
    \ PATH 变量或创建一个新的。\n    - 如果系统没有 PATH 变量，请单击“新建”创建一个。为 PATH 变量命名，并将其包含在你希望的文件夹中。关闭所有控制面板对话框并继续。\n\
    - 6. 现在你可以使用命令提示符了。为此，请转到“开始”菜单，然后转到“Windows 系统”，最后转到“命令提示符”。在搜索框中输入“python”。这将为你启动\
    \ Python 解释器。\n\n从这里开始，该程序将准备好在我们的 Windows 系统上使用。你可以选择通过打开所有不同的部分来查看它们。在开始你的编码之旅之前，请先研究可用的功能！"
