  md: "# Recursion\n\nWe say that a function works recursively when it calls itself.\
    \ When it does, the same code is used for different values. This creates a clean\
    \ code with low space complexity, but it can significantly increase the time complexity.\
    \ It is of high importance to set criteria that will end the recursive process.\
    \ Below we see the Fibonacci sequence solved recursively and iteratively, where\
    \ the Fibonacci sequence starts with 0 and 1 and each next element is the sum\
    \ of the previous two: 0,1,1,2,3,5,8,13. The n-th element is the sum of the n-1\
    \ and n-2 element, for n > 2 and is 0 or 1 for n = 0 or n = 1 respectively.\n\n\
    ```\n# recursively\ndef fib(n):\n    if n <= 1:\n        return n\n    return\
    \ fib(n - 1) + fib(n - 2)\n\n# iteratively\ndef Fib(n):\n    f = (n + 1) * [0]\n\
    \    f[0] = 0\n    f[1] = 1\n    for i in range(2, n + 1):\n        f[i] = f[i\
    \ - 1] + f[i - 2]\n    return f[n]\n```\n\n# Model Validation\n\nData modeling\
