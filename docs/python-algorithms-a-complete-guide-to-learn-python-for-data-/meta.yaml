  mdcn: '为了有效存储基础设施并管理共享分析，TDSP建议使用诸如“机器学习服务”、数据库、“大数据集群”和基于云的系统等工具来存储数据集。用于存放原始以及经过处理或清洗的数据集的分析和存储基础设施可以是基于云的，也可以是本地部署的。这种分析和存储基础设施允许分析的可重复性，并防止数据的重复和冗余，从而避免产生不一致性和不必要的基础设施成本。提供工具来授予共享资源的特定权限并跟踪其活动，这反过来又允许团队的每个成员安全地访问这些资源。


