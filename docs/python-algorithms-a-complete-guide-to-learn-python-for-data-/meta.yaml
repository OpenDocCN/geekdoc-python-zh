    In simple terms, an algorithm refers to instructions that are arranged step by
    step and covering every important detail. The goal behind an algorithm is that
    by the time you finish following the final instruction, you would have solved
    a problem. The instructions in an algorithm should be arranged in a way that makes
    sense. That means they should be logical. You can’t skip a step in the instructions.
    On top of that, you should also follow one step after the other in the designated
    order.


    You can’t go to step 5 then go back to step 3. One step is a prerequisite to the
    other steps. For instance, you can’t tell someone to take a bite on sardines before
    you take them out of the can or maybe chop the potatoes first and then take them
    out of the fridge.


    The right way to arrange these instructions is first to open the can of sardines
    first before you can eat them and take the potatoes out of the fridge, and then
    you can chop them up.


    # Think of an Algorithm as a Kind of Recipe


    You need to follow the recipe exactly as it says, or else you don’t get the results
    that you want. The same is true when you write a gaming program (or any other
    app or program for that matter).


    You need to follow everything step by step. If you don’t, you end up getting an
    error message, or you won’t get the results that you were expecting to get. It
    may not be as detailed as it should be since you were supposed to fill in the
    rest of the tasks as part of the exercise, but those instructions are also another
    example of an algorithm.


    # Sample Algorithm


    Making an algorithm can be easy with a little exercise. You can even think of
    algorithms for the things you do every day. In this section, we’ll go over an
    algorithm for a simple everyday task—brushing your teeth. We’ll go over the details
    of that task and the steps needed to accomplish it. After that, you will have
    to work on an assignment to outline the step by step tasks needed in another algorithm.


    # Brush Your Teeth Algorithm'
  - '[PAGE 8]


    Here is a simple algorithm for brushing your teeth.


    +   1. Grab a tube of toothpaste in one hand and open the cap using your other
    hand.

    2. With your other hand, grab hold of a toothbrush in an upright position with
    the bristles facing you.

    3. Bring the tube of toothpaste that you were holding in your other hand closer
    to the bristles of the toothbrush.

    4. Squeeze enough toothpaste onto the brush placing it on the bristles of the
    brush.

    5. Put the tube of toothpaste down on the counter so you can begin brushing.

    6. Open your mouth and smile.

    7. Press the bristles of your brush against your front teeth—this will apply toothpaste
    on your teeth.

    8. Brush your front teeth with an up and down motion.

    9. Do this for 10 seconds.

    10. Press your brush against the molars on your jaw near your left cheek. Brush
    those teeth with an in-and-out motion (aka a forward and back motion).

    11. Brush for 10 seconds.

    12. Press your brush against the molars on your jaw near the right cheek this
    time. Brush with an in and out motion.

    13. Brush for 10 seconds.'
- md: '## Chapter 1. Overview


    ### Python Conventions


    ### Programming Naming Conventions


    Readability and consistency are vital when working on a project, especially if
    others have to read your work. For this reason, you need to learn about programming
    naming conventions. A programmer or a data analyst should be able to look through
    your code and understand it at a glance. It should be self-explanatory with intuitive
    variables that make it clear to the reader what their purpose is.


    Do not ignore this aspect of programming. Someday you might write a program, hit
    a stump, abandon it for a short while, and when you come back to it, it will look
    like gibberish due to variables that have no meaning to you.


    With that being said, here are the most commonly used naming conventions used
    by programmers and data scientists:


    ### Pascal Case


    Capitalize the first letter of each word without using any spaces or symbols between
    them. A variable name written using Pascal Case should look something like this:
    PascalCaseVariable, MyComplexPassword, CarManufacturer.


    ### Camel Case


    This is almost the same as Pascal case, except the first word starts with a lowercase
    letter. A variable name written using Camel Case should look something like this:
    camelCaseVariable, myInterface, userPassword.


    ### Snake Case


    This naming convention is often used to clearly illustrate multi-word variables
    by separating each word with an underscore sign. Snake Case can be applied together
    with Camel Case or Pascal Case.


    The only thing that differentiates it from others is word separation. A variable
    name written using Snake Case should look something like this: my_snake_case_variable,
    This_is also_snake_case, my_account_password. Reading variable names might seem
    easier on the eye by using this naming convention. As a side note, Snake Case
    is also great for naming your project folders and files, and it is often used
    for that purpose.


    Keep in mind that there is no such thing as the “best” naming convention. It all
    depends on your preference; however, you should always be consistent when writing
    your code. Try not to mix different naming conventions. Pick one style and stick
    to it throughout your project. Give your variables a descriptive name that allows
    the reader to understand what it does and then write them by using one of the
    mentioned conventions.


    ## How Data is Structured


    There are many different forms of data, but, at its highest level, data is mainly
    categorized in three ways:


    ### Structured


    This is the incredibly organized data found in databases, CSV files (as values
    separated by commas), or other repositories. The data format ensures it is right
    for computation and inquiries, using SQL or other structured languages.


    ### Semi-Structured


    Data that doesn’t follow the way data models are structured when associated with
    data tables like relational databases but does have markers and tags that keep
    the semantic elements apart and enforce hierarchy in the data fields and records.


    ### Unstructured


    All the data that has no real structure, such as natural language text or audio
    streams.


    Clearly, the most useful data is structured data because it is ready for immediate
    manipulation.


    As a rule, only around 20% of the total data is represented by structured data,
    while the remaining 80% is a combination of unstructured and semi-structured data.


    Be aware, though; most of what we call unstructured data does have some kind of
    structure. Take an article for publishing on the internet, for example.


    While it is classed as unstructured, it does have a structure of sorts by way
    of tags and metadata for the article content. It is classed as unstructured because
    the content itself has no real structure that is usable straightaway.


    ## Machine Learning


    In the machine learning phase, a learning model is created and then validated.
    On occasion, the model itself is the product, and this would be deployed in an
    application context, providing some type of capability, such as prediction or
    classification. Other times, the algorithm is nothing more than a means to an
    end, and, in cases like this, the learning algorithm is not the product; the data
    produced by the model is.


    The real meat of the pipeline lies in data processing. In one learning model,
    the data is processed by the algorithm, and the result is a brand-new data product.
    However, from the sense of production, the model is actually the product, and
    it is deployed as a way of adding value or providing insight, i.e., a neural network
    deployed for prediction for the insurance market.


    There are multiple approaches to machine learning, and later we’ll be looking
    at some of the more popular algorithms to illustrate just


    ## What Makes a Good Algorithm


    In Python programming, there are certain qualities that will make an algorithm
    really good for solving a particular problem. They will be essential when you
    start writing game programs.


    Remember the following:


    - Each step in the algorithm that you will write should be unambiguous—that means
    whatever it is that you want to get done should be very clear.

    - The input that is needed from the user and the output that should be displayed
    on the screen should be precisely defined.

    - Do not add any computer code to the algorithm so that you can apply or make
    use of other programming languages to write the code based on the algorithm.


    ## Algorithm Writing Assignments


    ### Write 2 Parallel Lines


    So, here it is. Write an algorithm that will instruct a person to write two parallel
    lines.


    The tools that the person will use include the following:


    - A pencil

    - A ruler

    - A sheet of Paper


    Remember the techniques and details we talked about earlier. You can use repetition,
    sub-tasks, and orderly detailed procedures in the instructions. Use as many instructions
    as necessary to complete the algorithm.


    ### Spell Hello


    Here is your second assignment.


    You will write an algorithm that will detail the steps to display the word Hello
    horizontally and then vertically.


    After that, you will use the Python coding information that you have learned from
    the previous chapter, which is about using the print statement.


    Remember that you will not only write an algorithm, but you will also write an
    actual Python program that will print the letters of the word “Hello” in one line
    and then display each of these letters in each line.


    In effect, the output should look something like this:


    ```

    H e l l o

    H

    e

    l

    l

    o

    ```


    The answer to each assignment will be on the next page.


    ### Answer to Assignment 1


    The following is an algorithm to solve the problem in assignment 1. Note that
    there can be different ways to solve the problem (i.e. to get the task of writing
    two parallel lines done).


    The solution/algorithm presented below may be a bit different from the one that
    you may have written. It’s the same thing in mathematics or in programming. There
    are different ways to get to a certain solution.


    1. Get a piece of paper, a ruler, and a pencil.

    2. Place the piece of paper on a table in portrait orientation. That means the
    paper should be vertically oriented, which is typical of letters, book texts,
    and memos. In other words, it should appear taller, not wider.

    3. Place the ruler horizontally at the middle of the paper where it bisects the
    sheet into two equal halves.

    4. Hold the rule down with one hand making sure that it doesn’t move.

    5. Use the pencil to draw a line on the paper by tracing it along the top edge
    of the ruler.

    6. Make another line but this time tracing along the bottom edge of the ruler.

    7. Remove the ruler from off the paper. Now you are done.


    Remember that your algorithm may be a bit different than what is provided above.


    ### Answer to Assignment 2


    Here is the answer to assignment number 2. Note again that your actual solution
    or algorithm may be a bit different.


    1. Launch the IDLE program editor.

    2. Click File > New File

    3. Type the following code in the “Untitled” file window that will pop up:

    4. In that same window where you typed that Python code go to File > Save As


    ```python

    print("Hello World!")

    print("H")

    print("e")

    print("l")

    print("l")

    print("o")

    ```


    5. Type “Print Hello World Horizontally and Vertically” and then click “Save”
    at the bottom of the window.

    6. Click Run > Run Module

    7. You will see the output in the Python shell window.


    ## Sample Algorithm: Brushing Teeth


    14. Take the brush out of your mouth and rinse it with water from the tap.

    15. Grab a glass of water and gargle. Spit the water out into the sink.

    16. You are done brushing.


    As you can see from this sample algorithm, the instructions are very detailed.
    There are also smaller tasks or sub-tasks involved in the process of brushing
    one’s teeth, such as how to open a tube of toothpaste, how to brush the front
    teeth, and how to brush the inside of your mouth. There is also a sub-section
