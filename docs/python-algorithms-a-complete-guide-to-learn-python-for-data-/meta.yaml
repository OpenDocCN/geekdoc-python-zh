    \ X_test, y_train, y_test = validation.train_test(X, y,\ntest_size=0.30, random_state=chosen_state)\n\
    print(\"(X train shape %s, X test shape %s, \\ny train shape %s, y test\nshape\
    \ %s\" \\n% (X_train.shape, X_test.shape, y_train.shape, y_test.shape))\nh1.fit(X_train,y_train)\n\
    print(h1.score(X_test,y_test))\n# This will return the average accuracy on the\
