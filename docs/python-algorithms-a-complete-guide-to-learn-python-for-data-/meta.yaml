    ## 数据类型


    既然您已经了解了数据科学的重要性，让我们来看看不同类型的数据，以便您可以为需要处理的数据类型选择最合适的分析工具和算法。在非常高的层面上，数据类型可分为两类：定性和定量。


    ### 定性数据


    任何无法测量、只能通过为主观对象添加定性特征来观察的数据，称为“定性数据”。它是使用不可测量的特征对对象进行分类的结果，从而产生定性数据。


    例如，颜色、气味、质地和味道等属性。定性数据有三种类型：


