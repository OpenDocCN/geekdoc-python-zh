- img_proc: true
  md: '![](img/88ef5cbd9d5513fe683999eee6dc7780_101_0.png)


    We also need to consider where we would like to store some of the data that we
    are working with along the way. You are likely to gather up a lot of data in the
    process, and it isn’t likely that you just want to have it sitting around without
