  md: '# Binary Classifications


    Let’s assume we have only two output classes. For example, when you need to guess
    the gender. You can use the previously mentioned methods for binary classification
    as well; however, you will have to take an additional step. This step is a graphical
    representation of the performances of a classifier, and is called the “receiver
    operating characteristics curve.” It’s also sometimes known as the “area under
    a curve.” This graphical expression is highly informative because it displays
    how a change in the outcome occurs when a parameter is changed. First, it expresses
    the performances of the true positive rate and then the false positive rate. The
    true positive rate (or hit rate) represents the correct positive results, while
    the false positive rate (or miss rate) represents the rate of incorrect positive
    results. If you search for an example of a receiver operating characteristic,
    you will notice there’s an area under the curve which expresses how the classifier
    performs next to a random classifier. Normally in this kind of graphical representation,
    the random classifier is represented through a dotted line, while the better classifier
    is through a solid line.


    You can use the following function to build a receiver operating characteristic
    graph through Python:


    ```

    sklearn.metrics.roc_auc_score().

    ```


