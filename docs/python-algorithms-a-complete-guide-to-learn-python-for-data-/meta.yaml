  md: "The last measure worth taking note of is the *F1 score*. This concept, however,\
    \ is mostly used when we have an unbalanced dataset. The purpose of it is to determine\
    \ whether our classifier is performing properly in relation to our classes. The\
    \ F1 score is, in fact, the harmonic mean of recall and precision. To clarify\
    \ in case you don’t know, a harmonic mean is an average of rates. We’re not going\
    \ to dig deeper into the mathematics side of this calculation. It is enough that\
    \ you gain an idea of the concept of an F1 score. Here’s how it’s used in code:\n\
