    \ import confusion_matrix\ncm = confusion_matrix(Y_test, Y_pred)\nprint (cm)\n\
    Out: [[30  0  0]\n [ 0 19  3]\n [ 0  2 21]]\n```\n\n```\nIn: import matplotlib.pyplot\
    \ as plt\nimg = plt.matshow(cm, cmap=plt.cm.autumn)\nplt.colorbar(img, fraction=0.045)\n\
    for x in range(cm.shape[0]):\n    for y in range(cm.shape[1]):\n        plt.text(x,\
    \ y, \"%0.2f\" % cm[x,y],\n        size=12, color='black', ha=\"center\", va=\"\
    center\")\nplt.show()\n```\n\nOut:\n\nWith the help of tabular visualization,\
    \ we can see that in our example the first class “setosa” (class 0) is not misclassified.\
    \ However, “versicolor” which is class 1 is misclassified as the “virginica” class\
