    ## What the Cloud Is


    Cloud can be described as a global server network, each having different unique
    functions. Understanding networks is required to study the cloud. Networks can
    be simple or complex clusters of information or data.


    As specified earlier, networks can have a simple or small group of computers connected
    or large groups of computers connected. The largest network can be the Internet.
    The small groups can be home local networks like Wi-Fi and Local Area Network
    that are limited to certain computers or locality. There are shared networks such
    as media, web pages, app servers, data storage, and printers, and scanners. Networks
    have nodes, where a computer is referred to as a node. The communication between
    these computers is established by using protocols. Protocols are the intermediary
    rules set for a computer. Protocols like HTTP, TCP, and IP are used on a large
    scale. All the information is stored on the computer, but it becomes difficult
    to search for information on the computer every time. Such information is usually
    stored in a data Centre. Data Centre is designed in such a way that it is equipped
    with support security and protection for the data. Since the cost of computers
    and storage has decreased substantially, multiple organizations opt to make use
    of multiple computers that work together that one wants to scale. This differs
    from other scaling solutions like buying other computing devices. The intent behind
    this is to keep the work going continuously even if a computer fails; the other
    will continue the operation. There is a need to scale some cloud applications,
    as well, having a broad look at some computing applications like YouTube, Netflix,
    and Facebook that require some scaling. We rarely experience such applications
    failing, as they have set up their systems on the cloud. There is a network cluster
    in the cloud, where many computers are connected to the same networks and accomplish
    similar tasks. You can call it a single source of information or a single computer
    that manages everything to improve performance, scalability, and availability.


