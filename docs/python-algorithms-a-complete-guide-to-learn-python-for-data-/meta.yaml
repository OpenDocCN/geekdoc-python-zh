    \ numbers that are stored as a vector. Flattening each 8x8 image results in this\
    \ vector that will have 64 numeric values from 0 to 16.\n\nBasically, this expresses\
    \ the greyscale tonality of every single pixel contained in the images, like so:\n\
    \n```\nIn: X[0]\n\nOut: array([0., 0., 5., 13., 9., 1., 0., 0., ...])\n```\n\n\
    Next, we will upload three machine learning algorithms that already have their\
