    ## Types of Data


    Now that you understand the importance of data science let us look at different
    types of data so you can choose the most appropriate analytical tools and algorithms
    for the type of data that needs to be processed. Data types can be divided into
    two at a very high level: qualitative and quantitative.


    ### Qualitative Data


    Any data that cannot be measured and only observed subjectively by adding a qualitative
    feature to the object is called “qualitative data.” It is the classification of
    an object using unmeasurable features results in the creation of qualitative data.


    For example, attributes like color, smell, texture, and taste. There are three
    types of qualitative data:


    #### Binary or Binomial Data


    Data values that signal mutually exclusive events where only one of the two categories
    or options is correct and applicable. For example, true or false, yes or no, positive
    or negative. Consider a box of assorted tea bags.


    You try all the different flavors and group the ones that you like as “good” and
    the ones you don’t as “bad.” In this case, “good or bad” would be categorized
    as the “binomial data” type. This type of data is widely used in the development
    of statistical models for predictive analysis.


    #### Nominal or Unordered Data


    Data characteristics that lack an “implicit or natural value” can be referred
    to as nominal data. Consider a box of M&Ms, you can record the color of each M&M
    in the box in a worksheet, and that would serve as nominal data.


    This kind of data is widely used to assess statistical differences in the data
    set, using techniques like “Chi-Square analysis,” which could tell you “statistically
    significant differences” in the amount of each color of M&M in a box.


    #### Ordered or Ordinal Data


    The characteristics of this Data type do have certain “implicit or natural value”
    such as small, medium, or large. For example, online reviews on the sites like
    “Yelp,” “Amazon,” and “Trip Advisor” have a rating scale from 1 to 5, implying
    a 5-star rating is better than 4, which is better than 3, and so on.


    ### Quantitative Data


    Any characteristics of the data that can be measured objectively are called “quantitative
    data.” It is the classification of an object using measurable features and giving
    it a numerical value results in the creation of quantitative data.


    For example, product prices, temperature, dimensions like length, etc.


    There are two types of quantitative data:


    #### Continuous Data


    Data values that can be defined to a further lower level, such as units of measurement
    like kilometers, meters, centimeters, and on.'
