- img_proc: true
  md: 'how rich the capabilities provided by machine learning are.


    There are three primary types of machine learning:


    # Supervised Learning


    The training data is labeled, and the dataset contains an independent variable
    or class; the algorithm trains to predict the right class and changes the model
    when it cannot make the right prediction. This continues until a certain level
    of accuracy is reached, and the model can then be deployed to make predictions
    on unseen data.


    # Unsupervised Learning


    There is no class; the algorithm looks at the data and puts it into groups, based
    on a hidden structure in the data.


    # Reinforcement Learning


    This is a type of semi-supervised algorithm that learns on a reward basis—when
    it makes satisfactory predictions, it is rewarded; when it doesn’t, it is penalized.


    # Model Validation


    Once a machine learning model has been trained, we want to know how it is going
    to behave when it goes into production. Model validation is one method used to
    understand this behavior. One of the commonest approaches to model validation
    is reserving a certain percentage of the dataset for use as test data against
    the finished model. The training data, typically 80% of the available data, is
    used for training the model. In contrast, the test data, typically 20%, is used
    to test the final model to see how well it can generalize when fed with unseen
    data.


    Constructing a test data set from the training data may be complicated. You can
    use random sampling, but this can cause a problem. The random sample may, for
    example, over-sample for a specific class, or it may not provide decent coverage
    of all the'
  merge: -1
  pgno: 17
- img_proc: true
  md: 'potential data features or classes. When you do random sampling using a data
    class distribution, you can prevent overfitting (the training is too close to
    the training date) or underfitting (the training data isn’t modeled, and the model
    cannot generalize).


    # Operations


    This refers to the pipeline’s end goal, and it can be nothing more than creating
    data product visualizations to tell your audience a story, or it could be to answer
    a specific question set before the model was trained on the dataset. It could
    even be as complex as the deployment of the model in production to carry out an
    operation on unseen data for the purpose of classification or prediction. We’ll
    look at both now.


    # Model Deployment


    When the machine learning product is a model that can be used against data in
    the future, the model is being deployed for application against new data in a
    production environment. That model may be a prediction system taking historical
    financial data as input, such as revenue and monthly sales figures, classifying
    whether the company is a good target for acquisition.


    In a scenario such as this, the model that gets deployed is not learning any longer;
    it is given data from which it makes its predictions. There are some excellent
    reasons why learning should be avoided in production. In a deep learning context,
    i.e., neural networks that have deep layers, there have been some adverse attacks
    that can change a network’s results. In a deep learning network for image processing,
    for example, applying a perturbation to an image can change that image’s prediction
    capabilities in such a way that, rather than seeing a tank, the network sees a
    lorry. These types of adverse attacks have gotten more prevalent since deep learning
    became more used, and active research contains new attack vectors.


    # Model Visualization'
