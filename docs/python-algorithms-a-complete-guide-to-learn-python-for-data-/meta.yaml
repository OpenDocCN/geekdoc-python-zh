    of almonds by weight like 500 g or 8 ounces. This accounts for continuous data
    type, which is primarily used to test and verify different kinds of hypotheses
    such as assessing the accuracy of the weight printed on the bag of almonds.


    ## Discrete Data


    The numerical data value that cannot be divided and reduced to a higher level
    of precision, such as the number of cars owned by a person which can only be accounted
    for as indivisible numbers (you cannot have 1.5 or 2.3 cars), is called as discrete
    data types. For example, you can purchase another bag of ice cream bars by the
    number of ice cream bars inside the package, like four or six.


    This accounts for the discrete data type, which can be used in combination with
    the continuous data type to perform a regression analysis to verify if the total
    weight of the ice cream box (continuous data) is correlated with the number of
    ice cream bars (discrete data) inside.


    ## Data Science Strategies


    Data science is mainly used in decision-making by making precise predictions with
    the use of “predictive causal analytics,” “prescriptive analytics,” and machine
    learning.


    ## Predictive Causal Analytics


    The “predictive causal analytics” can be applied to develop a model that can accurately
    predict and forecast the likelihood of a particular event occurring in the future.


    For example, financial institutions use predictive causal analytics-based tools
    to assess the likelihood of a customer defaulting on their credit card payments
    by generating a model that can analyze the payment history of the customer with
    all of their borrowing institutions.


    ## Prescriptive Analytics


    The “prescriptive analytics” is widely used in the development of “intelligent
    tools and applications” that are capable of modifying and learning with dynamic
    parameters and make their own “decisions.” The tool not only predicts the occurrence
    of a future event but is also capable of providing recommendations on a variety
    of actions and its resulting outcomes. For example, the self-driving cars gather
    driving-related data with every driving experience and use it to train themselves
    to make better driving and maneuvering decisions.


    ## Machine Learning to Make Predictions


    Machine learning algorithms are a necessity to develop models that can determine
    future trends based on the transactional data acquired by the company. This is
    considered as “supervised machine learning,” which we will elaborate on later
    in this book. For example, fraud detection systems use machine learning algorithms
    on the historical data pertaining to fraudulent purchases to detect if a transaction
    is fraudulent.


    ## Machine Learning for Pattern Discovery


    To be able to develop models that are capable of identifying hidden data patterns
    but lack required parameters to make future predictions, the “unsupervised machine
    learning algorithms,” such as “Clustering,” need to be employed.


    For example, telecom companies often use the “clustering” technology to expand
    their network by identifying network tower locations with optimal signal strength
    in the targeted region.


    ## Data Science Versus Data Analysis


    The terms data science and data analytics are often used interchangeably. However,
    these terms are completely different and have different implications for different
    businesses. Data science encompasses a variety of scientific models and methods
    that can be used to manipulate and analyze structured, semi-structured, and unstructured
    data. Tools and processes that can be used to make sense of gather insight from
    highly complex, unorganized, and raw data set fall under the umbrella of data
    science. Unlike data analytics that is targeted to verify a hypothesis, data science
    boils down to connecting data points to identify new patterns and insights that
    can be made use of in future planning for the business. Data science moves the
    business from inquiry to insights by providing a new perspective into their structured
    and unstructured data by identifying patterns that can allow businesses to increase
    efficiencies, reduce costs and recognize the new market opportunities.


    Data science acts as a multidisciplinary blend of technology, machine learning
    algorithm development, statistical analysis, and data inference that provides
    businesses with enhanced capability to solve their most complex business problems.
    Data analytics falls under the umbrella of data science and pertains more to reviewing
    and analyzing historical data to put it in context. Unlike data science, data
    analytics is characterized by low usage of artificial intelligence, predictive
    modeling, and machine learning algorithms to gather insights from processed and
    structured data using standard SQL query commands. The seemingly nuanced differences
    between data analytics and data science can actually have a substantial impact
    on an organization.


    ## Data Science in Cyber Security


    The ability to analyze and closely examine Data trends and patterns using Machine
    learning algorithms has resulted in the significant application of data science
    in the cybersecurity space. With the use of data science, companies are not only
    able to identify the specific network terminal(s) that initiated the cyber-attack
    but are also in a position to predict potential future attacks on their systems
    and take required measures to prevent the attacks from happening in the first
    place. Use of “active intrusion detection systems” that are capable of monitoring
    users and devices on any network of choice and flag any unusual activity serves
    as a powerful weapon against hackers and cyber attackers. At the same time, the
    “predictive intrusion detection systems” that are capable of using machine learning
    algorithms on historical data to detect potential security threats serves as a
    powerful shield against cyber predators.


    Cyber-attacks can result in a loss of priceless data and information resulting
    in extreme damage to the organization. Sophisticated encryption and complex signatures
    can be used to secure and protect the data set and prevent unauthorized access.
    Data science can help with the development of such impenetrable protocols and
    algorithms. By analyzing the trends and patterns of previous cyber-attacks on
    companies across different industrial sectors, Data science can help detect the
    most frequently targeted data set and even predict potential future cyber-attacks.
    Companies rely heavily on the data generated and authorized by their customers,
    but in the light of increasing cyber-attacks, customers are extremely wary of
    their personal information being compromised and are looking to take their businesses
    to the companies that are able to assure them of their data security and privacy
    by implementing advanced data security tools and technologies. This is where data
    science is becoming the saving grace of the companies by helping them enhance
    their cybersecurity measures.


