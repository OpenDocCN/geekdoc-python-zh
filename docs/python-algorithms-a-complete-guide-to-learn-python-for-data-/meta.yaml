    \ To clarify in case you don’t know, a harmonic mean is an average of rates. We’re\
    \ not going to dig deeper into the mathematics side of this calculation. It is\
    \ enough that you gain an idea of the concept of an F1 score. Here’s how it’s\
    \ used in code:\n\n```\nIn: print (\"F1 score:\", metrics.f1_score(Y_test, Y_pred))\n\
    \nF1 score: 0.933267359393\n```\n\nThere are other methods you can use in multi-label\
