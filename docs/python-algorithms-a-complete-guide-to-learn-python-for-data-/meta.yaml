    # Chapter 3. Technical Indicators


    ## Algorithms


    An algorithm is a set of unambiguous steps which should provide the solution to
    a problem after feeding input to it. There are three main categories of algorithms:
    the greedy, the divide and conquer, and the dynamic programming algorithms, as
    explained below. The Greedy algorithms try to find an optimum solution locally,
    which leads to globally optimized solutions. They do it by searching for the best
    solution at present without considering the best solution in the future. Unfortunately,
    in many cases, greedy algorithms do not provide globally optimized solutions.
    Some famous greedy algorithms are:


    - Travelling Salesman Problem

    - Prim’s Minimal Spanning Tree Algorithm

    - Kruskal’s Minimum Spanning Tree Algorithm

    - Dijkstra’s Minimum Spanning Tree Algorithm


    The Divide and Conquer algorithms involve breaking down the given problem into
    smaller ones and then solving each of the subproblems independently. When the
    problem cannot be further subdivided, then the merging process starts where the
    different sub-solutions are put together to create a global solution. Some famous
    Divide and Conquer algorithms are:


    - Merge Sort

    - Quick Sort

    - Kruskal’s Minimum Spanning Tree Algorithm'
