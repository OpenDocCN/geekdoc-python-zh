    # Business Understanding


    The goal of this stage is to gather and drill down on the essential variables
    that will be used as targets for the model, and the metrics associated with these
    variables will ultimately determine the overall success of the project. Another
    significant objective of this stage is the identification of required data sources
    that the company already has or may need to procure. At this stage, the two primary
    tasks that are required to be accomplished are: “defining objects and identifying
    data sources.”


    # Defining Objectives


    All projects must always start with the identification of the key business variables
    that the analytical tools are required to predict. These variables are called
    “model targets,” and the metrics associated with these model targets, such as
    sales forecast and prediction of fraudulent orders, are used as a measure of the
    success of the project. It is imperative to define the project goals and'
