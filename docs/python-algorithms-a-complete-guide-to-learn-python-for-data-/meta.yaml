    \  - WHAT ARE ALGORITHMS\n  - SAMPLE ALGORITHM\n  - WHAT MAKES A GOOD ALGORITHM\n\
    \  - ALGORITHM WRITING ASSIGNMENTS\n- **CHAPTER 1. OVERVIEW**\n  - PYTHON CONVENTIONS\n\
    \  - HOW DATA IS STRUCTURED\n  - MACHINE LEARNING\n  - MODEL VALIDATION\n- **CHAPTER\
