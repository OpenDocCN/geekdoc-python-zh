    # Dimensionality Reduction


    What happens when you have a dataset with too many features that aren’t really
    necessary?


    Sometimes features don’t contain information that is relevant, and they are basically
    noise. Reducing this noise is vital because it will make your dataset easier to
    manage, and your data will come out with more accuracy and with less noise. Dimensionality
    reduction is just right for this purpose. It is used to eliminate features and
    therefore improve the time it takes to perform the process.


