  md: '# Repeat the Process


    Unfortunately, this is not where it all ends; getting 60 percent accuracy is not
    going to be an excuse to walk away and do nothing else with some of the work that
    you want to handle. It is a good start, but we need to rinse and repeat to get
    this higher. Our goal here is not to get it to 100 percent. That takes a long
    time and won’t really happen until we put this into some of the real-world applications
    that we are hoping with these algorithms. However, if you are looking to use this
    as a way to make decisions and learn more about your industry, it is likely that
    you want the algorithm to start out with more accuracy than 60 percent.


    So, how do we get the accuracy to be higher? We go through the same steps that
    we outlined above, many times over. When the first test is done, we go through
    and do another set of training, making sure that the data we rely on is strong
    and will provide us with the answers that we want. Then, when that training is
    all done, we go through and do another test, and hope that we are able to get
    a higher accuracy level in the process.


    This is a process that we may have to repeat multiple times in order to get the
    accuracy that we want. The cool thing about machine learning, though, is that
    these algorithms are able to learn, and they will get better at some of the work
    they do; the more data that you feed to them, the more that they are able to learn
    from that information along the way. And as long as your training and testing
    data are higher in quality and are on the right topics, you will find that it
    is going to work in your favor, and the accuracy levels will go up.


    The number of times that you need to go through this process will often depend
    on your own goals and what you are hoping to accomplish.


    If you want to get the accuracy level up as high as possible before you start
    working with the algorithm, then you will need to do more iterations of the training
    and the testing.'
