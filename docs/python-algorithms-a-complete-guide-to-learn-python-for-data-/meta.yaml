    \ easiest way with the highest time complexity is to do a *linear search* (start\
    \ from the beginning and search the elements of the data structure one by one\
    \ until we find what we are looking for).\n\nAn alternative here is the *interpolation\
    \ search*, where first we have to sort the data structure and then start searching\
    \ by following the steps below:\n\nWe check if the element that we are looking\
    \ for is the one in the middle of the list. If it is, we return its index, and\
    \ we are done. If not:\n\n+   1. If the middle item is greater than the item,\
    \ then the probable position is again calculated in the subarray to the right\
    \ of the middle item. Otherwise, the item is searched in the subarray to the left\
    \ of the middle item. This process continues on the subarray as well until the\
    \ size of the subarray reduces to zero.\n2. If the search finishes and the element\
    \ is not found, then the element was not included in the list."
