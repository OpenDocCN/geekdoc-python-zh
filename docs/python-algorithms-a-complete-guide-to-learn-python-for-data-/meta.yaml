    \ of this calculation are then averaged like so:\n\n```\nIn: print (\"Recall:\"\
    , metrics.recall_score(Y_test, Y_pred))\n```\n\nRecall: 0.93333333333333\n\nThe\
    \ last measure worth taking note of is the *F1 score*. This concept, however,\
    \ is mostly used when we have an unbalanced dataset. The purpose of it is to determine\
