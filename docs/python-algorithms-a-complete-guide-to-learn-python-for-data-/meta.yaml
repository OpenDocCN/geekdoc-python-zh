    # Types of Data


    Now that you understand the importance of data science let us look at different
    types of data so you can choose the most appropriate analytical tools and algorithms
    for the type of data that needs to be processed. Data types can be divided into
    two at a very high level: qualitative and quantitative.


    # Qualitative Data


    Any data that cannot be measured and only observed subjectively by adding a qualitative
    feature to the object it’s called “qualitative data.” It is the classification
    of an object using unmeasurable features results in the creation of qualitative
    data.


    For example, attributes like color, smell, texture, and taste. There are three
    types of qualitative data:


    # Binary or Binomial Data


    Data values that signal mutually exclusive events where only one of the two categories
    or options is correct and applicable. For example, true or false, yes or no, positive
    or negative. Consider a box of assorted tea bags.'
  merge: -1
  pgno: 78
- img_proc: true
  md: 'You try all the different flavors and group the ones that you like as “good”
    and the ones you don’t as “bad.” In this case, “good or bad” would be categorized
    as the “binomial data” type. This type of data is widely used in the development
    of statistical models for predictive analysis.


    # Nominal or Unordered Data


    Data characteristics that lack an “implicit or natural value” can be referred
    to as nominal data. Consider a box of M&Ms, you can record the color of each M&M
    in the box in a worksheet, and that would serve as nominal data.


    This kind of data is widely used to assess statistical differences in the data
    set, using techniques like “Chi-Square analysis,” which could tell you “statistically
    significant differences” in the amount of each color of M&M in a box.


    # Ordered or Ordinal Data


    The characteristics of this Data type do have certain “implicit or natural of
    value” such as small, medium, or large. For example, online reviews on the sites
    like “Yelp,” “Amazon,” and “Trip Advisor” have a rating scale from 1 to 5, implying
    a 5-star rating is better than 4, which is better than 3, and so on.


    # Quantitative Data


    Any characteristics of the data that can be measured objectively are called “quantitative
    data.” It is the classification of an object in using measurable features and
    giving it a numerical value results and creation of quantitative data.


    For example, product prices, temperature, dimensions like length, etc.


    There are two types of quantitative data:


    # Continuous Data


    Data values that can be defined to a further lower level, such as units of measurement
    like kilometers, meters, centimeters, and on'
  merge: -1
  pgno: 79
- img_proc: true
  md: 'and on, are called continuous data type. For example, you can purchase a bag
    of almonds by weight like 500 g or 8 ounces. This accounts for continuous data
    type, which is primarily used to test and verify different kinds of hypotheses
    such as assessing the accuracy of the weight printed on the bag of almonds.


    # Discrete Data


    The numerical data value that cannot be divided and reduced to a higher level
    of precision, such as the number of cars owned by a person which can only be accounted
    for as indivisible numbers (you cannot have 1.5 or 2.3 cars), is called as discrete
    data types. For example, you can purchase another bag of ice cream bars by the
    number of ice cream bars inside the package, like four or six.


    This accounts for the discrete data type, which can be used in combination with
    the continuous data type to perform a regression analysis to verify if the total
    weight of the ice cream box (continuous data) is correlated with the number of
    ice cream bars (discrete data) inside.


    # Data Science Strategies


    Data science is mainly used in decision-making by making precise predictions with
    the use of “predictive causal analytics,” “prescriptive analytics,” and machine
    learning.


    # Predictive Causal Analytics


    The “predictive causal analytics” can be applied to develop a model that can accurately
    predict and forecast the likelihood of a particular event occurring in the future.


