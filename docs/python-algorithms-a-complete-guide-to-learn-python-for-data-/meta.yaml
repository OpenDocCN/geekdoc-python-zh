    # Outlier Detection


    This next stage is one of the most important ones. Determining outliers is important
    because if we have any kind of erroneous information in our dataset, or partially
    incomplete data, adapting any new data will be extremely problematic. In turn,
    this issue can lead to algorithms that process faulty data and create inaccurate
    results.


    So what is an outlier in this case? When we detect that a data point deviated
    from other data points, we can compare them and establish that it is, in fact,
    an outlier. Let’s discuss several cases where we have a different outlier in order
    to gain a better understanding of how to detect them and treat them.


    Mainly there are three situations, and each one is handled differently. Firstly,
    we will presume that the outlier is an infrequent appearance in whatever dataset
    we are working with. In this scenario, the information is based on another set
    of data from which it was extracted. Here we have a data sample that contains
    an outlier that is flagged as one because of its assumed rarity. This type of
    outlier is dealt with through a basic removal process. In the second example,
    we have an outlier that frequently manifests itself. In this case, it appears
    frequently. Whenever you experience similar occurrences, there’s a sizable chance
    of encountering an error that affects the data sample generation. The problem
    here is that the algorithm’s priority isn’t the generalization; instead, it focuses
    on learning the non-focused distribution. The outlier has to be eliminated.


    The third situation involves a data point, which is easy to conclude that it is,
    in fact, an error. Datasets often contain faulty data entries, and they can easily
    cause inconsistencies in your data whenever'
  merge: -1
  pgno: 61
- img_proc: true
  md: 'you modify or manipulate the value. All you need to do in this case is delete
    the value and instruct the model to presume that it is a random loss. Another
    option is calculating and using an average value instead of the erroneous one.
    This is a preferable solution; however, if you find it difficult to implement
    it, then simply delete the outlier.


    Knowing these scenarios will help you understand which one you are experiencing,
    thus allowing you to have an easier time detecting the outlier and removing it.
    The first phase is to determine every single outlier and locate it. You can use
    two techniques to do this, though they are similar. You can either examine all
    separated variables individually or all of them at once. These techniques are
    called univariate and multivariate analysis.


