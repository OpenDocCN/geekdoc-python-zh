    \ function based on the “test_size” parameter. As a side note, this parameter\
    \ can be an integer that is used to express how many examples we have for the\
    \ test set, or it can be a float that indicates the percentage of data that should\
    \ be utilized for testing. Afterward, the data split is ruled by “random_state”\
    \ which guarantees that the process can be reproduced at any time and on any computer.\
    \ This addition will also ensure that we can run and reproduce the operation on\
    \ any computer, no matter which operating system is running. In our example, we\
    \ have an accuracy of 0.94. If we change the value of our “chosen_state” parameter,\
    \ we will see a change in the accuracy. What does that mean? The performance evaluation\
    \ is not an absolute measure, and we should use it carefully. Different test samples\
    \ will yield different results. The performance result should look great as long\
