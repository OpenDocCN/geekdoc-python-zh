    # Covariance Matrix


    When you have several groups of features, you will need to search for the correlation
    between them. This is what the covariance matrix is used for. As already mentioned,
    one of the purposes of dimensionality reduction is to learn which features have
    a strong relationship with each other. By doing so, you will automatically know
    which features are of little to no use, and you can remove them.


