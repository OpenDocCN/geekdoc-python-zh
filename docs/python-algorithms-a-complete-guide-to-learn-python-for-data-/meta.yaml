    Do not ignore this aspect of programming. Someday you might write a program, hit
    a stump, abandon it for a short while, and when you come back to it, it will look
    like gibberish due to variables that have no meaning to you.


    With that being said, here are the most commonly used naming conventions used
    by programmers and data scientists:


    # ### Pascal Case


    Capitalize the first letter of each word without using any spaces or symbols between
    them. A variable name written using Pascal Case should look something like this:
    PascalCaseVariable, MyComplexPassword, CarManufacturer.


    # ### Camel Case


    This is almost the same as Pascal case, except the first word starts with a lowercase
    letter. A variable name written using Camel Case should look something like this:
    camelCaseVariable, myInterface, userPassword.'
  - '[PAGE 15]


    # Snake Case


    This naming convention is often used to clearly illustrate multi-word variables
    by separating each word with an underscore sign. Snake Case can be applied together
    with Camel Case or Pascal Case.


    The only thing that differentiates it from others is word separation. A variable
    name written using Snake Case should look something like this: my_snake_case_variable,
    This_is also_snake_case, my_account_password. Reading variable names might seem
    easier on the eye by using this naming convention. As a side note, Snake Case
    is also great for naming your project folders and files, and it is often used
    for that purpose.


    Keep in mind that there is no such thing as the “best” naming convention. It all
    depends on your preference; however, you should always be consistent when writing
    your code. Try not to mix different naming conventions. Pick one style and stick
    to it throughout your project. Give your variables a descriptive name that allows
    the reader to understand what it does and then write them by using one of the
    mentioned conventions.


    # How Data is Structured


    There are many different forms of data, but, at its highest level, data is mainly
    categorized in three ways:


    # Structured


    This is the incredibly organized data found in databases, CSV files (as values
    separated by commas), or other repositories. The data format ensures it is right
    for computation and inquiries, using SQL or other structured languages.


    # Semi-Structured


    Data that doesn’t follow the way data models are structured when associated with
    data tables like relational databases but does have markers and tags that keep
    the semantic elements apart and enforce hierarchy in the data fields and records.'
  - '[PAGE 16]


    # Unstructured


    All the data that has no real structure, such as natural language text or audio
    streams.


    Clearly, the most useful data is structured data because it is ready for immediate
    manipulation.


    As a rule, only around 20% of the total data is represented by structured data,
    while the remaining 80% is a combination of unstructured and semi-structured data.


    Be aware, though; most of what we call unstructured data does have some kind of
    structure. Take an article for publishing on the internet, for example.


    While it is classed as unstructured, it does have a structure of sorts by way
    of tags and metadata for the article content. It is classed as unstructured because
    the content itself has no real structure that is usable straightaway.


    # Machine Learning


    In the machine learning phase, a learning model is created and then validated.
    On occasion, the model itself is the product, and this would be deployed in an
    application context, providing some type of capability, such as prediction or
    classification. Other times, the algorithm is nothing more than a means to an
    end, and, in cases like this, the learning algorithm is not the product; the data
    produced by the model is.


    The real meat of the pipeline lies in data processing. In one learning model,
    the data is processed by the algorithm, and the result is a brand-new data product.
    However, from the sense of production, the model is actually the product, and
    it is deployed as a way of adding value or providing insight, i.e., a neural network
    deployed for prediction for the insurance market.


    There are multiple approaches to machine learning, and later we’ll be looking
    at some of the more popular algorithms to illustrate just'
