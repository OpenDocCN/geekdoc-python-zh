  md: '# Unstructured


    All the data that has no real structure, such as natural language text or audio
    streams.


    Clearly, the most useful data is structured data because it is ready for immediate
    manipulation.


    As a rule, only around 20% of the total data is represented by structured data,
    while the remaining 80% is a combination of unstructured and semi-structured data.


    Be aware, though; most of what we call unstructured data does have some kind of
    structure. Take an article for publishing on the internet, for example.


    While it is classed as unstructured, it does have a structure of sorts by way
    of tags and metadata for the article content. It is classed as unstructured because
    the content itself has no real structure that is usable straightaway.


    # Machine Learning


    In the machine learning phase, a learning model is created and then validated.
    On occasion, the model itself is the product, and this would be deployed in an
    application context, providing some type of capability, such as prediction or
    classification. Other times, the algorithm is nothing more than a means to an
    end, and, in cases like this, the learning algorithm is not the product; the data
    produced by the model is.


    The real meat of the pipeline lies in data processing. In one learning model,
    the data is processed by the algorithm, and the result is a brand-new data product.
    However, from the sense of production, the model is actually the product, and
    it is deployed as a way of adding value or providing insight, i.e., a neural network
    deployed for prediction for the insurance market.


    There are multiple approaches to machine learning, and later we’ll be looking
    at some of the more popular algorithms to illustrate just'
