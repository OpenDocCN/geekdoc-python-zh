    ## The Fundamental Components of the Team Data Science Process


    ### Definition of a Data Science Lifecycle


    The five major stages of the TDSP lifecycle that outline the interactive steps
    required for project execution from start to finish are: “Business understanding,”
    “Data acquisition in understanding,” “modeling,” “deployment,” and “customer acceptance.”
    Keep reading for details on this to come shortly!


    ### Standardized Project Structure


    To enable seamless and easy access to project documents for the team members allowing
    for quick retrieval of information, use of templates and a shared directory structure
    goes a long way; all the project documents and the project code are stored in
    a “version control system” such as “TFS,” “Git” or “Subversion” for improved team
    collaboration. Business requirements and associated tasks and functionalities
    are stored in an agile project tracking system like “JIRA,” “Rally,” and “Azure
    DevOps” to enable enhanced tracking of code for every single functionality. These
    tools also help in the estimation of resources and costs involved through the
    project lifecycle. To ensure effective management of each project, information
    security, and team collaboration, TDSP confers the creation of separate storage
    for each project on the version control system; the adoption of a standardized
    structure for all the projects within an organization aids in the creation of
    an institutional knowledge library across the organization.


    The TDSP lifecycle provides standard templates for all the required documents
    as well as folder structure at a centralized location. The files containing programming
    codes for the data exploration and extraction of the functionality can be organized
    using the provided folder structure, which also holds records pertaining to model
    iterations. These templates allow the team members to easily understand the work
    that has been completed by others as well as for a seamless addition of new team
    members to a given project. The markdown format supports ease of accessibility
    as well as making edits or updates to the document templates. In order to make
    sure the project goal and objectives are well defined and also to ensure the expected
    quality of the deliverables, these templates provide various checklists with important
    questions for each project. For example, a “project charter” can be used to document
    the project scope and the business problem that is being resolved by the project;
    standardized data reports are used to document the “structure and statistics”
    of the data.


