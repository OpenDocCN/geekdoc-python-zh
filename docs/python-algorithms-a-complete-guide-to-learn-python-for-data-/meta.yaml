  md: 'In simple terms, an algorithm refers to instructions that are arranged step
    by step and covering every important detail. The goal behind an algorithm is that
    by the time you finish following the final instruction, you would have solved
    a problem. The instructions in an algorithm should be arranged in a way that makes
    sense. That means they should be logical. You can’t skip a step in the instructions.
    On top of that, you should also follow one step after the other in the designated
    order.


    You can’t go to step 5 then go back to step 3. One step is a prerequisite to the
    other steps. For instance, you can’t tell someone to take a bite on sardines before
    you take them out of the can or maybe chop the potatoes first and then take them
    out of the fridge.


    The right way to arrange these instructions is first to open the can of sardines
    first before you can eat them and take the potatoes out of the fridge, and then
    you can chop them up.


    # Think of an Algorithm as a Kind of Recipe


    You need to follow the recipe exactly as it says, or else you don’t get the results
    that you want. The same is true when you write a gaming program (or any other
