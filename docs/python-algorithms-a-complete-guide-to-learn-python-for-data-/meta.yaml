    \ the Fibonacci sequence starts with 0 and 1 and each next element is the sum\
    \ of the previous two: 0,1,1,2,3,5,8,13. The n-th element is the sum of the n-1\
    \ and n-2 element, for n > 2 and is 0 or 1 for n = 0 or n = 1 respectively.\n\n\
    ```python\n# recursively\ndef fib(n):\n    if n <= 1:\n        return n\n    return\
