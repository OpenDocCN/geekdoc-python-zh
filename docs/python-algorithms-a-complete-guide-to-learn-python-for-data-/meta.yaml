    ## Deliverables to Be Created in This Stage


    ### Data Quality Report


    This report must include a “data summary” relationship between the business requirement
    and its attributes and variable ranking, among other details. The “IDEAR” tool
    supplied with TDSP is capable of generating data quality reports on a relational
    table, CSV file, or any other tabular data set.


    ### Solution Architecture


    A description or a diagram of the data pipeline that is used to score new data
    and generate predictions after the model has been built can be referred to as
    “solution architecture.” This diagram can also provide the data pipeline needed
    to “retrain” the model based on new data.


    ### Checkpoint Decision


    Prior to the start of the actual model building process, the project must be reevaluated
    to determine if the expected value can be achieved by pursuing the project. These
    are also called “Go or No-Go” decisions.


    ## Modeling


    The goal of this stage is to find “optimal data features” for the machine learning
    model, which is informative enough to predict the target variables accurately
    and can be deployed in the production environment. The three primary tasks that
    must be accomplished in this stage are: “feature engineering, model training,
    and the determination of the suitability of the model for the production environment.”


    ### Feature Engineering


    The data features must be created from the raw data variables using the process
    of “inclusion, aggregation, and transformation.” To be able to understand the
    functioning of the model, a clear understanding of how these data features relate
    to one another as well as to the machine learning algorithms that will be using
    those features must be developed. The insights gathered from the data exploration
    phase can be combined with the domain expertise to allow creative feature engineering.


    The fine art of determining and including informative variables while making sure
    a whole lot of unrelated variables are not included in the data set is referred
    to as feature engineering.


    Too many unrelated variables will add noise to the data model, so an attempt must
    be made to add as many informative variables as possible to get better results.
    The features must also be generated for any new data collected during the scoring.


    ### Model Training


    A wide variety of modeling algorithms are available in the market today. The algorithm
    that meets the criteria of your project must be selected. The process for “model
    training” can be divided into four steps which are:


    - Create a “training data set” as well as a “test data set” by appropriately dividing
    the input data.

    - Development of the model with the use of the “training data set.”

    - Evaluation of the training and the test data set by employing various machine
    learning algorithms as well as related “tuning parameters” that are designed to
    help answer the previously discussed five types of questions from the existing
    data set.

    - Assess the best fit for the solution to resolve the business problem by comparing
    all available methods using key performance indicators and metrics.


    TDSP provides an “automated modeling and reporting tool” that is capable of running
    through multiple algorithms and “parameter sweeps” to develop a “baseline model”
    as well as a “baseline modeling report” that can serve as a performance summary
    for each “model and parameter combination.”


