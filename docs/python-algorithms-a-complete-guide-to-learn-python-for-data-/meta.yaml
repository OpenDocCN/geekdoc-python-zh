    ## Tools and Utilities for Project Execution


    The introduction of any changes to an existing process tends to be rather challenging
    in most organizations. Several tools that are provided by the TDSP can be implemented
    to encourage and raise the consistency of the adoption of these changes. Some
    of the basic tasks in the data science lifecycle, including "data exploration"
    and "baseline modeling" can be easily automated with the tools provided by TDSP.
    To allow the hassle-free contribution of shared tools and utilities into the team''s
    "shared code repository," TDSP provides a well-defined structure. This results
    in cost savings by allowing other project teams within the organization to reuse
    and repurpose these shared tools and utilities.


    The TDSP lifecycle serves as a standardized template with a well-defined set of
    artifacts that can be used to garner effective team collaboration and communication
    across the board. This lifecycle is comprised of a selection of the best practices
    and structures from "Microsoft" to facilitate the successful delivery of predictive
    analytics solutions and intelligent applications. Let''s look at the details of
    each of the five stages of the TDSP lifecycle, namely, "Business understanding,"
    "Data acquisition in understanding," "modeling," "deployment," and "customer acceptance."


    ![](img/88ef5cbd9d5513fe683999eee6dc7780_70_0.png)


    ## Business Understanding


    The goal of this stage is to gather and drill down on the essential variables
    that will be used as targets for the model, and the metrics associated with these
    variables will ultimately determine the overall success of the project. Another
    significant objective of this stage is the identification of required data sources
    that the company already has or may need to procure. At this stage, the two primary
    tasks that are required to be accomplished are: "defining objects and identifying
    data sources."


    ### Defining Objectives


    All projects must always start with the identification of the key business variables
    that the analytical tools are required to predict. These variables are called
    "model targets," and the metrics associated with these model targets, such as
    sales forecast and prediction of fraudulent orders, are used as a measure of the
    success of the project. It is imperative to define the project goals and objectives,
    to work with the stakeholders and the end-users, and to ask relevant questions
    that can be highly specific or even vague. The data science approach employs names
    and numbers to answer these questions. The five types of questions that are primarily
    used for data science or machine learning are pertaining to: "regression (how
    much or how many?), classification (what categories?), clustering (which groups?),
    anomaly detection (is this unusual?), recommendation (which option should be taken?)".
    It is important to determine the right questions for your project and understand
    how the answers to these questions will help you accomplish the business or project
    goals. Specification and alignment of the roles and responsibilities of each member
    within the project team are quintessential to the success of the project. This
    can be accomplished with the help of a high-level project plan containing significant
    milestones that can be modified as needed for the course of the project. Another
    important definition that should be agreed upon at this stage of the project is
    that of all key performance indicators and metrics. For example, a project for
    prediction of customer turnover rate requiring the accuracy rate of "ABC" percent
    by the completion of the project can help you understand the requirement that
    must be fulfilled to meet the success criteria of the project. So in order to
    achieve the "ABC" percent accuracy rate, the company may run discount offers and
    promotions.


    The industry-wide standard used in the development of metrics is called "SMART,"
    which stands for "Specific, Measurable, Achievable, Relevant, Time-bound."


    ### Identification of Data Sources


    The data sources that may contain "known examples" of answers to the five types
    of questions raised during the defining phase must be identified and accounted
    for. You must look for data that is in direct relevance to the questions asked
    and assess if you have a measurable target and features related to those targets.


    The data that serves as an accurate measure for the model target and its features
    is crucial for the determination of the project''s success. For example, you might
    encounter a situation where the existing system is unable to collect and record
    the types of data that are required to accomplish the project goals. This should
    immediately inform you that you need to start looking for external data sources
    or run a system update to enable the collection of additional data types by the
    existing system.


    ### Deliverables to Be Created in This Stage


    #### Charter Document


    It is a "living document" that needs to be updated throughout the course of the
    project, in light of new project discoveries and changing business requirements.
    A standard template is supplied with the TDSP "project structure definition."
    It is important to build upon this document by adding more details throughout
    the course of the project while keeping the stakeholders updated promptly on all
    changes made.


    #### Data Sources


    Within the TDSP "project data report folder," the data sources can be found within
    the "Raw Data Sources" section of the "Data Definitions Report." The "Raw Data
    Sources" section also specifies the initial and final locations of the raw data
    and provide additional details like the "coding scripts" to move up the data to
    any desired environment.


    #### Data Dictionaries


    The descriptions of the characteristics and features of the data such as the "data
    schematics" and available "entity-relationship diagrams," provided by the stakeholders
    are documented within the Data dictionaries.


    ## Data Acquisition and Understanding


    The goal of this stage is the production of high-quality processed data set with
    defined relationships to the model targets and location of the data set in the
    required analytics environment. At this stage, the "solution architecture" of
    the data pipeline must also be developed, which will allow regular updates to
    and scoring of the data. The three primary tasks that must be completed during
    this stage are: "Data ingestion, Data exploration, and Data pipeline set up."


    ### Data ingestion


    The process required to transfer the data from the source location to the target
    location should be set up in this phase. The target locations are determined by
    the environments that will allow you to perform analytical activities like training
    and predictions.


    ### Data exploration


    The data set must be scrubbed to remove any discrepancies and errors before it
