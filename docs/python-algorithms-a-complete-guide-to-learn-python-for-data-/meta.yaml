    \ sklearn.metrics import classification_report\n\nprint (classification_report(Y_test,\
    \ Y_pred,\n    target_names=iris.target_names))\n\nOut:\n```\n\nNow let’s talk\
    \ a bit more about the use of these different measures of multi-label classification.\
