    \ more efficient and effective. If we were unable to do this, we would have had\
    \ to resort to writing the same bunch of lines every now and then.\n\n## Return\
    \ Statement\n\nWe could have covered what a return statement is when we were discussing\
    \ ‘if’ statements and others. However, it makes more sense to learn this after\
    \ you have understood the concept of parameters and functions.\n\nSo far, we have\
    \ created a function that has allowed us to send information via the use of parameters.\
    \ However, when we talk about return statements, these are designed to do certain\
    \ calculations and provide us with the results instead of us feeding it with values.\n\
    \nLet us look a little deeper into how this works by creating our second function.\
    \ The purpose of this function is based on a simple math trick which most of us\
    \ might have heard of or played with when we were young. Ask the user to think\
    \ of any number and you would ask them to add and subtract a few simple numbers.\
    \ Eventually, you would provide them with an accurate result and everyone would\
    \ be shocked. Now, let us reveal what happens with the use of this function we\
    \ are about to create.\n\n```\ndef magic_number(number):\n    return number +\
    \ 6 - 4 + 5 - number\n```\n\nThis simple calculation would always return you the\
    \ value of seven. Go ahead, try it out yourself by doing this. However, for us\
    \ to be able to get these values back, we have used the return statement here.\
    \ This tells Python that it is supposed to do the calculation for us and then\
    \ only return the resulting value instead of printing each of these individually.\n\
    \nLet us give our second function a test run:\n\n```\nresult = magic_number(8329)\n\
    print(result)\n```\n\nSee how the result now shows as seven? You can try and change\
    \ the values to whatever you please, the result will continue to remain as seven.\
    \ That is only made possible owing to the return statement we have provided here.\
    \ If you take away the keyword return, you end up with a value that says ‘None’.\
    \ The program will still function but the result would no longer be calculated\
    \ or of any use to us. This is because Python would not execute a return phase\
    \ and thus will not carry out the calculations as we would like it to.\n\nUsing\
    \ these can greatly enhance your experience as a programmer or a user. However,\
    \ before you dive in and start creating your functions, here are some which are\
    \ pre-defined and may come in handy. There is no point in creating a function\
    \ and finding out Python already had one for you."
  mdcn: "Python 的设计初衷是**简洁**。它旨在**最小化工作量，最大化输出**。如果你能明智地使用代码和函数，你一定能充分利用这门编程语言。值得注意的是，你所学到的关于\
    \ Python 及其函数、参数、方法等大部分知识，都将帮助你更快地学习其他语言，因此请务必留意。\n\n## 参数\n\n我们眼尖的读者可能已经注意到，几分钟前我们创建的函数有些特别。与大多数函数不同，我们根本没有在括号中传递任何信息。为什么会这样？一旦我们确切理解了\
    \ Python 中的**参数**是什么，我们就会明白。\n\n参数用作接收信息的占位符。这些是我们（以及用户）提供给程序的信息，以便程序能更准确地工作。有些情况下，某些函数在执行基本操作时并不需要参数。然而，如果你为这些函数提供一个参数，它们将为你提供更具体的输出。当然，这取决于该参数是否可用。你不能强迫一个函数去做它设计之外的事情。\n\
    \n现在，让我们看看我们的函数。它确实缺少了什么。如果你现在打印 `welcome_user` 函数，它会显示所有内容，但完全不包含用户的名称。当然，如果我们能以某种方式使用这个函数来获取用户的名称并将其添加到问候语中，看起来会好得多。\n\
    \n幸运的是，我们确实可以这样做！为此，我们首先需要在开始定义函数的第一行添加 `name` 参数。只需在括号中输入 `name`，你就会看到文本变成灰色。这确认了该词已被添加为参数。现在，我们希望打印这个用户的名称以及我们在函数中定义的问候语。在这个例子中，让我们假设用户的名字是\
    \ Fred。\n\n```\ndef welcome_message(name):\n    print(\"Begin\")\n    print(\"\
    Hello and welcome {name}!\")\n    print(\"Hope you have a great time\")\n    print(\"\
    End\")\n```\n\n```\nwelcome_message('Fred')\n```\n\n```\nBegin\nHello and welcome\
    \ Fred!\nHope you have a great time\nEnd\n```\n\n终于！我们有了一个可以添加到问候语中的名字。你可以通过使用我们的函数并传递一个不同的名字来添加另一行代码。看看会发生什么。\n\
    \n当我们为一个函数设置了一个参数，然后在调用该函数时没有提供参数或括号中应包含的信息时，它会给我们一个错误，除了少数例外情况。\n\n现在，让我们使我们的函数更具动态性，并添加另一个参数。让我们添加一个参数，允许程序打印用户的姓氏。现在，我们的代码应该看起来像这样：\n\
    \n```\ndef welcome_message(name, last_name):\n    print(\"Hello and welcome {name}\
    \ {last_name}!\")\n    print(\"Hope you have a great time\")\n    print(\"Begin\"\
    )\n    welcome_message('Fred', 'William')\n    print(\"End\")\n```\n\n这里要学习的要点，除了能够添加参数之外，是\
    \ `Fred` 和 `William` 是以特定顺序使用的。如果你输入顺序相反，Python 将按原样打印它们。这是因为它们相对于已定义参数的位置。Python\
    \ 读取的第一个值，将自动将其与第一个参数关联。这可能会引起一些混淆，特别是当姓氏变成名字时。\n\n这些参数被称为**位置参数**。为了进一步说明它们的重要性，让我们从上面的参数中移除姓氏。\n\
    \n```\nprint(\"Begin\")\nwelcome_message('Fred')\nprint(\"End\")\n```\n\n```\n\
    Traceback (most recent call last):\n  File \"C:/Users/Smith/PycharmProjects/MyFirstGo/PosArg.py\"\
    , line 7, in <module>\n    welcome_message('Fred')\nTypeError: welcome_message()\
    \ missing 1 required positional argument: 'last_name'\n```\n\n所以，系统不允许我们继续，因为我们移除了一个元素。这次，先输入姓氏，然后输入名字，看看是否有任何不同。现在运行程序时，你应该能看到：\n\
    \n```\nprint(\"Begin\")\nwelcome_message('Fred', 'William')\nprint(\"End\")\n\
    ```\n\n```\nBegin\nHello and welcome William Fred!\nHope you have a great time\n\
    End\n```\n\n现在，顺序似乎起作用了。唯一的问题是它把名字搞错了。现在，姓氏被描绘并打印为名字。这相当尴尬，不是吗？\n\n上述错误要么指出我们缺少一个必需的位置参数，要么显示我们把错误的名字放在了错误的位置。位置参数是那些位置非常重要的参数。如果你完全忽略了位置，最终会得到一个错误。如果你输入了其他内容，就像我们在最后一个例子中所做的那样，你会产生不正确的结果。要纠正它，只需在名字后面提供姓氏。\n\
    \n还有一种方法可以使用所谓的“关键字参数”来处理这些情况。这类参数的位置根本不重要，无论它们在括号中的位置如何，Python 都将继续正常工作。要传递关键字参数，你需要执行以下操作：\n\
    \n```\nprint(\"Begin\")\nwelcome_message(last_name='William', name='Fred')\nprint(\"\
    End\")\n```\n\n```\nBegin\nHello and welcome Fred William!\nHope you have a great\
    \ time\nEnd\n```\n\n现在看起来更像样了。事情正按照我们想要的方式发展。注意，即使我们写错了顺序，Python 也为我们挑选并排序了顺序。这是因为我们使用\
    \ `name=` 或 `last_name=` 参数将我们的条目或参数转换为关键字参数，并将其与参数结合。这允许 Python 提取信息并理解这两个参数中哪一个在顺序上排在前面，正如我们最初在函数中定义的那样。\n\
    \n事实上，你不会经常使用这些，但知道克服某些问题的方法总是一个优势。通常，你或其他程序员只要遵循规则，先输入名字再输入姓氏，就能轻松查看和读取数据。让代码尽可能简单，以便每个人都能阅读和理解。\n\
    \n> “那么，如果我使用数字而不是名字呢？”\n\n这是一个很好的问题。这就是你需要使用关键字参数来表示这些值用途的地方。你可能正在运行一个涉及多个值的函数，这些值可能只有你自己能理解，但其他人将不知道它们来自哪里。你必须用相关的关键字参数标记每一个，以提高可读性。\n\
    \n我们目前才刚刚开始，为了演示，我们使用了一个简单的例子来展示如何创建和使用函数。你的函数，在适当的时候，可能会相当庞大或同样简短，这取决于你在任何特定情况下创建的函数类型。\n\
    \n创建函数无疑有助于我们组织代码，使其更高效、更有效。如果我们无法做到这一点，我们就不得不时不时地重写相同的一堆代码行。\n\n## Return 语句\n\
    \n我们本可以在讨论 `if` 语句和其他内容时介绍什么是 `return` 语句。然而，在理解了参数和函数的概念之后再学习这个更有意义。\n\n到目前为止，我们创建了一个允许我们通过使用参数来发送信息的函数。然而，当我们谈论\
    \ `return` 语句时，它们旨在进行某些计算并为我们提供结果，而不是我们向其提供值。\n\n让我们通过创建第二个函数来更深入地了解这是如何工作的。这个函数的目的基于一个简单的数学技巧，我们大多数人可能在小时候都听说过或玩过。让一个用户想一个数字，然后让他们加减几个简单的数字。最终，你会给他们一个准确的结果，每个人都会感到震惊。现在，让我们揭示使用我们即将创建的这个函数会发生什么。\n\
    \n```\ndef magic_number(number):\n    return number + 6 - 4 + 5 - number\n```\n\
    \n这个简单的计算总是会返回值七。来吧，自己试试看。然而，为了让我们能够取回这些值，我们在这里使用了 `return` 语句。这告诉 Python 它应该为我们进行计算，然后只返回结果值，而不是单独打印每一个。\n\
    \n让我们测试运行一下我们的第二个函数：\n\n```\nresult = magic_number(8329)\nprint(result)\n```\n\
    \n看到结果现在显示为七了吗？你可以尝试将值更改为任何你喜欢的值，结果将继续保持为七。这只有在我们提供了 `return` 语句的情况下才可能实现。如果你去掉关键字\
    \ `return`，你最终会得到一个值为 `None` 的结果。程序仍然会运行，但结果将不再被计算或对我们有用。这是因为 Python 不会执行 `return`\
    \ 阶段，因此不会按照我们希望的方式进行计算。\n\n使用这些可以极大地增强你作为程序员或用户的体验。然而，在你投入并开始创建自己的函数之前，这里有一些预定义的函数可能会派上用场。创建一个函数却发现\
    \ Python 已经为你准备好了一个是毫无意义的。"
