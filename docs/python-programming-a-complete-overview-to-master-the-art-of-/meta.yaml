    \n选择“Add Python 3.6 to PATH”后，选择自定义安装。当然，也可以选择第一项进行安装，这意味着 Python 将安装在 C 盘的用户目录中。但此时，你最好了解用户目录是什么，以便将来在需要时能够找到已安装的\
    \ Python.exe 文件。\n\n按照说明操作，Python 将成功安装在系统中。\n\n## 3. 启动 Python\n\nPython 可以通过两种方式启动。\n\
    \n### 1) 启动 Python 自带的 IDLE\n\n如果你想运行 Python，可以点击 Windows 桌面上的“开始”按钮，在出现的搜索框中输入“IDLE”，启动一个\
    \ Python 桌面应用程序，快速提供一个“读取-求值-打印-循环”的提示符。\n\nIDLE 是 Python 自带的简单 IDE（集成开发环境），是\
    \ Python 的图形界面编辑器。IDLE 可以看作是集成开发环境的简化版。它的功能看起来简单，但对于初学者学习 Python 语言本身很有帮助。\n\n\
    这里提供了一个 REPL 环境，即它读取用户的输入（“Read”），回车，进行求值和计算（“Evaluate”），然后打印结果（“Print”），接着出现一个提示符“Loop”，如此循环。\n\
    \n### 2) 在 Windows 提示符下启动 Python\n\n另一种启动 Python 的方式是通过 Windows 命令提示符运行 Python\
    \ 程序，在 Windows 搜索框中输入“cmd”（或按“Win+R”键打开运行提示框，注意键盘上的“Win”键），或者点击开始按钮，在弹出的搜索框中输入“cmd”并回车，启动\
    \ Windows 命令行窗口。\n\n注意：这里看到的“>”后面的闪烁光标是 Windows 提供的命令提示符。\n\n安装 Python 时，由于勾选了“Add\
    \ Python 3.6 to PATH”选项，已安装的 Python 被添加到 Windows 的环境变量中，因此在提示符“>”后输入“python”即可成功启动\
    \ Python。\n\n提示符“>>>”表示 Python 安装成功并且 Python 已启动。“>>>”是 Python 特有的提示符。\n\n接下来，在第一种或第二种启动方式中执行\
    \ `print(\"Hello Python!\")`。\n\n如果你想返回 Windows 命令提示符，可以通过按快捷键“Ctrl+Z”来实现。\n\n\
    以上两种方法都是 REPL 形式，适用于编写相对简短的程序或命令，具有简单灵活的优点。如果程序功能较多，调用的模块或包较多，REPL 形式在维护上就不太方便了。\n\
    \n在本章中，我们详细介绍了 Python 的安装。在接下来的章节中，我们将开始详细讨论 Python 语法。请继续关注！\n\n## 第 6 章：了解函数\n\
    \n到目前为止，我们已经学了不少东西。如果你已经开始对所有知识感到有些混乱，不必惊慌。在学习过程中，每个人发现自己处于这种情况是很正常的。没有人是完美的，这正是我们作为人类的特点，对吧？\n\
    \n我们已经了解了字典，并且知道它们与我们用来学习新单词和含义的字典完全不同。我们学习了一个相当有趣的东西，叫做元组，并理解了它们本质上是带有括号的列表，不允许任何人添加、删除或修改值。我们也初步接触了一些函数，但现在是时候让我们更深入地研究一下函数了。\n\
    \n## 理解函数的概念\n\n在这里花一两分钟，让你的思维活跃一下。思考一下，试着对函数到底是什么形成一些模糊的概念。\n\n函数要么是用户定义的，要么是预定义的。无论哪种情况，它们的工作都是将代码组织在一个可调用的函数名中。Python\
    \ 中有大量预定义的函数可用。我们已经反复使用了其中一些。\n\n我们已经对内置和预定义的函数有了相当好的了解。这些包括但不限于 `input()`、`print()`\
    \ 等等。然而，现在让我们看看如何创建我们自己的函数。\n\n让我们从一个传统的方法开始，编写一段代码，用友好的问候欢迎用户。我们将把它存储为一个名为“welcome_message”的函数，以便稍后可以调用这个函数。\n\
    \n```\ndef welcome_message():\n    print(\"Hello and welcome\")\n    print(\"\
    Hope you have a great time\")\n```\n\n```\nprint(\"Begin\")\nwelcome_message()\n\
    print(\"End\")\n```\n\n让我们开始学习，看看上面代码块中发生了什么。首先，为了创建我们的函数，我们需要先定义它。`def` 是一个关键字，Python\
    \ 会看到它并立即明白你即将“定义”一个新函数。接下来，我们需要给函数命名。虽然你可以随意命名函数，但强烈建议并鼓励你使用易于理解且具有描述性的名称。如果我们把这个函数命名为\
    \ welcome_message 以外的任何名字，我们作为编写者可能知道它是什么，但对于其他任何程序员来说，他们可能无法理解。\n\n每当你创建一个函数时，你都需要使用括号。你不必通过它传递任何信息，所以保持它们原样即可。现在，我们需要添加冒号。\n\
    \n当你在语句末尾使用冒号时会发生什么？你的光标会在下一行缩进。这意味着你的光标会稍微远离实际的起始点。这是为了向程序员表明，他/她即将输入的内容将对上面的命令或语句具有价值。在这种情况下，我们正在尝试定义函数。\n\
    \n然后让我们使用两个 print 命令并放置我们的问候消息。就是这样！你现在创建了你的第一个函数。你可以根据需要多次调用它。但是，如果你尝试在 `def`\
    \ 命令之前一两行调用这个函数，Python 将不知道你在说什么。为什么？这完全与 Python 逐行读取程序的事实有关。当它到达你调用函数的那一行时，它会检查前面的行，但找不到任何相关的内容，因为实际的\
    \ `def` 步骤是在这之后执行的。\n\n接下来，让我们使用我们的函数，看看它是如何工作的。记住，这个函数包含了两个可打印的消息给我们的用户。为了参考，我们现在创建一个“begin”和一个“end”消息。这将让我们和程序员知道常规消息在哪里，函数在哪里。如上所示，在两个\
    \ print 命令之间使用你的函数，括号留空。如果你愿意，你可以删除这些 print 命令，只输入你的函数名来查看结果。\n\n给所有人一个小提示！如果你遇到烦人的波浪线，只需将鼠标悬停在上面，你就会发现预期或建议的解决方案是什么。在这种情况下，如果你删除两行空行，你应该会看到这样的建议：\n\
    \n每当你定义一个函数时，你总是需要在继续编写代码之前至少留出两个空行。\n\n现在，让我们运行程序，你应该会看到所有的消息和我们的函数在运行。Python\
    \ 启动了序列并首先读取了定义。这是 Python 仅为自己理解函数是什么的地方。当 Python 到达第六行，我们的 `print(\"Begin\")`\
    \ 消息开始时，实际的程序才被执行。在下一行，我们放置了我们的函数，这就是 Python 回忆起它刚刚学到的内容的地方。它快速执行了我们在函数内定义的一组代码并执行了相同的代码。最后，它在完成程序之前执行了最后一行。\n\
    \n这就是函数的创建和使用方式。现在，我们可以在同一个文件中根据需要多次使用这个函数。请注意，如果你打开一个新文件或处理一个未定义此函数的旧文件，你将无法使用这个新创建的函数。\n\
    \n在你未来的编程生涯中，当事情开始变得更困难时，记住创建你的函数并在适用的地方使用它们。它们将为你节省大量时间，并在某些地方提供帮助。这些函数用于需要不时执行某些操作或运算的情况。\n\
    \n## 使用各种函数"
