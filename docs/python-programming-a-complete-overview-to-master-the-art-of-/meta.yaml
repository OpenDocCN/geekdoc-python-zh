- md: "Python was created with simplicity in mind. It was also created to minimize\
    \ the work and maximize the output. If you use the codes and the functions wisely,\
    \ you will surely be making the most out of this programming language. It is also\
    \ noticeable that most of the things you learn about Python and its functions,\
    \ parameters, methods, and such will help you learn other languages quicker, so\
    \ do pay attention.\n\n## Parameters\n\nOur eagle-eyed readers may have noticed\
    \ something about the function we just created a few minutes ago. Unlike most\
    \ of the functions, we did not pass any information through the parentheses at\
    \ all. Why that happens is something we will come to know about once we understand\
    \ exactly what parameters are in Python.\n\nParameters are used as place-holders\
    \ for receiving information. These are what we, as well as users, provide to the\
    \ program in order for it to work more accurately. There are some cases and functions\
    \ where arguments are not required for them to do their basic operation. However,\
    \ if you provide an argument to these functions, they will provide you a more\
    \ specific output. Of course, it does depend on the availability of the said parameter.\
    \ You cannot force a function to do something it is not designed to do.\n\nNow,\
    \ let us look at our function. It is certainly missing something. If you currently\
    \ print the welcome_user function, it would say everything but will not contain\
    \ the name of the user at all. Surely, it would look a lot nicer for us if we\
    \ could somehow use this function to use the name of the user and add it to the\
    \ greeting.\n\nLuckily, we can do just that! For that, we first need to add the\
    \ ‘name’ parameter in the first line where we began defining our function. Simple\
    \ type name between the parentheses and you will see the text turn grey. This\
    \ confirms that the word has been added as a parameter. Now, we wish to print\
    \ the name of this user along with the greetings we have defined within the function.\
    \ For this example, let us assume that the user is named Fred.\n\n```\ndef welcome_message(name):\n\
    \    print(\"Begin\")\n    print(\"Hello and welcome {name}!\")\n    print(\"\
    Hope you have a great time\")\n    print(\"End\")\n```\n\n```\nwelcome_message('Fred')\n\
    ```\n\n```\nBegin\nHello and welcome Fred!\nHope you have a great time\nEnd\n\
    ```\n\nFinally! We have a name to add to our greetings. You can add another line\
    \ of code by using our function and passing a different name now. See what happens\
    \ then.\n\nWhen we set a parameter for a function and then call upon the function\
    \ without providing it an argument or the bit of information that goes between\
    \ the parentheses, it will provide us with an error, except for a few.\n\nNow,\
    \ let us make our function a little more dynamic and add another parameter. Let\
    \ us add a parameter that allows the program to print out the last name of the\
    \ user. Now, our code should look something like this:\n\n```\ndef welcome_message(name,\
    \ last_name):\n    print(\"Hello and welcome {name} {last_name}!\")\n    print(\"\
    Hope you have a great time\")\n    print(\"Begin\")\n    welcome_message('Fred',\
    \ 'William')\n    print(\"End\")\n```\n\nThe point to learn here, apart from being\
    \ able to add parameters, is the fact that ‘Fred’ and ‘William’ are being used\
    \ in a specific order. Should you type it the other way around, Python will print\
    \ these as they are. This is because of their position concerning the defined\
    \ parameters. The first value Python reads here, it will automatically link it\
    \ with the first parameter. This can cause a little confusion, especially if the\
    \ last name becomes the first name.\n\nThese arguments are called as positional\
    \ arguments. To further show their importance, let us remove the last name from\
    \ the argument above.\n\n```\nprint(\"Begin\")\nwelcome_message('Fred')\nprint(\"\
    End\")\n```\n\n```\nTraceback (most recent call last):\n  File \"C:/Users/Smith/PycharmProjects/MyFirstGo/PosArg.py\"\
    , line 7, in <module>\n    welcome_message('Fred')\nTypeError: welcome_message()\
    \ missing 1 required positional argument: 'last_name'\n```\n\nSo, the system does\
    \ not allow us to continue as we have removed an element. This time, type in the\
    \ last name first followed by the first name and see if it makes any difference.\
    \ When you run the program now, you should be able to see this:\n\n```\nprint(\"\
    Begin\")\nwelcome_message('Fred', 'William')\nprint(\"End\")\n```\n\n```\nBegin\n\
    Hello and welcome William Fred!\nHope you have a great time\nEnd\n```\n\nNow,\
    \ the sequence kind of worked. The only issue is that it has gotten the name wrong.\
    \ Now, the last name is being portrayed and printed as the first name. That is\
    \ rather embarrassing, isn’t it?\n\nThe above errors either state that we are\
    \ missing one required positional argument or show that we placed the wrong name\
    \ in the wrong place. Positional arguments are such arguments whose position matters\
    \ a lot. If you miss out on the position altogether, you will end up with an error.\
    \ If you type in something else, as we did in our last example, you will produce\
    \ incorrect results. To correct it, simply provide the last name after the first\
    \ name.\n\nThere is one more way you can have these dealt with by using what is\
    \ termed as ‘keyword arguments’. These are the kind of arguments whose position\
    \ does not matter at all and Python will still continue to function properly regardless\
    \ of their position in the parentheses. To pass a keyword argument, you will need\
    \ to do the following:\n\n```\nprint(\"Begin\")\nwelcome_message(last_name='William',\
    \ name='Fred')\nprint(\"End\")\n```\n\n```\nBegin\nHello and welcome Fred William!\n\
    Hope you have a great time\nEnd\n```\n\nNow that’s more like it. Things are looking\
    \ right at how we want them. Notice how, even though we wrote in the wrong order,\
    \ Python picked up and sorted the order for us. That is because we made our entries\
    \ or arguments into keyword arguments using the name= or last_name= parameter\
    \ and combining it with arguments. This allows Python to draw information and\
    \ understand which of these two comes first in order as defined originally in\
    \ our function.\n\nFactually speaking, you will not be using these quite a lot\
