    adding underscores between compound variable names, like this: underscore_name,
    variable_name, this_is_snake_case.


    According to the Python style guide, the preferred variable style is snake case.


    Beyond that, try to name variables things that make sense. Avoid confusing variable
    names (i.e. Cat = “dog”) in favor of variable names that make intuitive sense
    (animal = “dog”).


