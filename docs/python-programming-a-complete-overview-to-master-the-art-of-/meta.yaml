    although the first character in the variable name cannot be a number. There are
    also a few words (like “input,” “print,” and “while”) that cannot be used as variable
    names because Python reserves these words for specific commands. One last important
    thing to remember is that variable names are case sensitive, so “varName” is a
    different variable than “varname.”


