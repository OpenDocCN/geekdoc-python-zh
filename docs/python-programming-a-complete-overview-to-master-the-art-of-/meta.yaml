  md: '**min() and max()** - In case you run into various values and you quickly wish
    to find out the minimum value in existence within a list or collection of data,
    use the min() command and run the numbers through. The minimum number will be
    printed for you. The max() function is the opposite, of course!


    **sum()** - This is quite a nifty function and allows you to quickly add up all
    the numbers in the list and produce the result for you right away. The accuracy
    with floats might not be what we like but hey, it gets you going.


    type() - There may come lines and lines of codes with variables that are scattered
    all over the place. You now wish to find out where the variable started from and
    what kind of a variable it is. Using the type() function, you can quickly find
    out what kind of variable you are dealing with. It will return values such as
    ‘bool’ to indicate that the variable in question is a bool in type.


    There are hundreds of functions that you will start to learn as you proceed into
    advanced Python learning and machine learning. However, to understand most of
