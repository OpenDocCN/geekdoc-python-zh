  mdcn: '在末尾填写正确的数字并非强制要求。由于Python编程不会持续跟踪，也没有规定必须输入正确的最终值，你可以自由设定，例如，声称一天有25小时。然而，为了其他可能需要使用的程序员着想，设置正确的值仍然很重要。


    在字符串中更改值至关重要，因为它允许程序员在未来更改最大值。因此，理解程序中字符串的运作方式对程序的成功大有裨益。必须学习并了解值的存储位置、适用于每个值的规则，以及如何在特定领域表现出色。


    ## 赋值运算符


    尽管本书前面已经讨论过，但我们尚未赋予其特定名称。它指的是等号（=）。你使用赋值运算符将右侧语句的值赋给左侧的变量。然而，你必须评估右侧的值是否是一个算术表达式。请注意，在编程中，赋值运算符并非数学符号，因为在编程中我们被允许添加各种内容，并使它们看起来等同于某个数字。此符号用于表示这些项目可以在另一侧的部分中被更改或修改。


    ## 第4章：Python与其他编程语言的区别？


    Python是一种解释型、面向对象且具有动态数据类型的高级编程语言。自20世纪90年代初Python语言诞生以来，它已逐渐广泛应用于处理系统管理任务和Web编程。特别是随着人工智能的不断发展，Python已成为最受欢迎的编程语言之一。


    ## Python为何特别？


    目前有数百种编程语言可供程序员入门。然而，根据哈佛大学计算机科学家进行的一项调查统计，Python是初学者中的领先语言。我们将在本节讨论一些使Python成为新程序员易于理解的语言的原因。


    与其他编程语言相比，Python具有以下主要优势：


    - (1) 语法简洁明了，代码可读性高。Python的语法要求强制缩进，用于反映语句之间的逻辑关系，并显著提高程序的可读性。

    - (2) 由于简单清晰，它也是一种开发效率高的编程语言。

    - (3) Python可以实现真正的跨平台，例如，我们开发的程序可以在Windows、Linux、macOS系统上运行。这是其可移植性优势。

    - (4) 它包含大量丰富的库或扩展。Python常被称为胶水语言。它可以轻松连接用其他语言编写的模块，特别是C/C++。利用这些丰富的第三方库，我们可以轻松开发应用程序。

    - (5) 代码量小，在一定程度上提高了软件质量。由于用Python编写的代码量远少于其他语言，出错概率也小得多，这在一定程度上提高了所编写软件的质量。


    Python用途广泛，可用于以下领域：


    - (1) 网页开发；

    - (2) 可视化（GUI）界面开发；

    - (3) 网络（可用于网络编程）；

    - (4) 系统编程；

    - (5) 数据分析；

    - (6) 机器学习（Python有各种库支持）；

    - (7) 网络爬虫（例如Google使用的）；

    - (8) 科学计算（Python在科学计算的许多方面都有应用）。


    例如，Python被用于许多Google服务。YouTube也是用Python实现的。维基百科网络的基本框架最初也是用Python实现的。


    ## Python如何工作？


    Python程序执行原理非常简单。我们都知道，用C/C++等编译语言编写的程序需要从源文件转换为计算机使用的机器语言，然后通过链接器链接后形成二进制可执行文件。运行程序时，可以从硬盘将二进制程序加载到内存中并运行。


    然而，对于Python，Python源代码不需要编译成二进制代码。它可以直接从源代码运行程序。Python解释器将源代码转换为字节码，然后将编译后的字节码转发给Python虚拟机（PVM）执行。


    当我们运行Python程序时，Python解释器执行两个步骤。


    (1) 将源代码编译为字节码


    编译后的字节码是Python特有的表达形式。它不是二进制机器代码，需要进一步编译才能被机器执行。这也是为什么Python代码无法像C/C++那样快速运行的原因。


    如果Python进程在机器上具有写入权限，它会将程序的字节码保存为扩展名为.pyc的文件。如果Python无法在机器上写入字节码，则字节码将在内存中生成，并在程序结束时自动丢弃。构建程序时，最好授予Python在计算机上的写入权限，这样只要源代码不变，生成的.pyc文件就可以重复使用，以提高执行效率。


    (2) 将编译后的字节码转发给Python虚拟机（PVM）执行。


    PVM是Python Virtual Machine的缩写。它是Python的运行引擎，是Python系统的一部分。它是一个大型循环，迭代运行字节码指令，依次完成操作。


    在这个过程中，每个Python程序都被执行，并给出可以进一步分析和测试的结果，以完全部署为新的应用程序。


    ## 未来展望？


    如前所述，从零开始学习一门编程语言总是很困难的。Python是最受欢迎的初学者编程语言之一，因为它直截了当，没有任何偏差。许多代码非常简单，能实现你所说的功能。初学者使用Python创建预测逻辑非常轻松。我们要求你做的就是坚持使用Python，你就能用它创造奇迹。我们建议你查看GitHub上的Python程序，以进一步增加你对Python编程的兴趣。


    在下一章中，我们将详细讨论Python在不同操作系统中的安装过程。让我们开始吧！


    ## 第5章：如何在你的电脑上安装Python？


    在前面的章节中，我们从技术和理论角度讨论了Python。从下一章开始，我们将开始讨论构成Python的各种词汇概念。在讨论所有这些概念之前，我们需要先在系统中安装Python。本章是一个教程，向你解释如何在不同操作系统中安装Python。让我们开始吧！


    ## Python的安装与运行


    由于Python的跨平台特性，Windows、Linux和macOS系统都支持Python软件的安装。首先，我们需要下载安装软件。


    ### 1. 下载Python


    这里我们介绍Windows环境下Python的安装和运行。由于Windows操作系统中没有内置Python环境，需要独立安装。安装包可以从Python官方网站（[www.Python.org](http://www.Python.org)）下载。打开官方网站后，搜索带有“Downloads”按钮的导航栏。


    网站默认推荐一个链接，因为它可以检测你的操作系统并推荐最新的Python 3.x版本，即3.6.5。进入相应版本的下载页面后，会有对你尝试下载的环境的基本介绍。几个不同的版本主要针对不同的操作系统平台。你可以根据系统是32位还是64位选择不同的文件下载。


    在打开的新页面中，我们可以找到其他版本，包括最新的测试版本和所需的3.4版本。如果你想安装64位版本的3.6.5，请点击当前页面上带框的链接。


    在新打开的页面底部，我们可以找到其他几个链接。以Windows实体开头的文件代表64-'
