  md: "Let us look a little deeper into how this works by creating our second function.\
    \ The purpose of this function is based on a simple math trick which most of us\
    \ might have heard of or played with when we were young. Ask the user to think\
    \ of any number and you would ask them to add and subtract a few simple numbers.\
    \ Eventually, you would provide them with an accurate result and everyone would\
    \ be shocked. Now, let us reveal what happens with the use of this function we\
    \ are about to create.\n\n```\ndef magic_number(number):\n    return number +\
    \ 6 - 4 + 5 - number\n```\n\nThis simple calculation would always return you the\
    \ value of seven. Go ahead, try it out yourself by doing this. However, for us\
    \ to be able to get these values back, we have used the return statement here.\
    \ This tells Python that it is supposed to do the calculation for us and then\
    \ only return the resulting value instead of printing each of these individually.\n\
    \nLet us give our second function a test run:\n\n```\nresult = magic_number(8329)\n\
    print(result)\n```\n\nSee how the result now shows as seven? You can try and change\
    \ the values to whatever you please, the result will continue to remain as seven.\
    \ That is only made possible owing to the return statement we have provided here.\
    \ If you take away the keyword return, you end up with a value that says ‘None’.\
    \ The program will still function but the result would no longer be calculated\
    \ or of any use to us. This is because Python would not execute a return phase\
    \ and thus will not carry out the calculations as we would like it to.\n\nUsing\
    \ these can greatly enhance your experience as a programmer or a user. However,\
    \ before you dive in and start creating your functions, here are some which are\
    \ pre-defined and may come in handy. There is no point in creating a function\
    \ and finding out Python already had one for you."
