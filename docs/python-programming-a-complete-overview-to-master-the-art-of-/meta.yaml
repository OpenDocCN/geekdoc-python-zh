    ### Comment


    A note in Python programming starts with the # sign. This continues until the
    programmer reaches the end of the line. A good example is:


    ```

    # This is a note

    print("hello, thank you for contacting us")

    ```


    It instructs your computer to print "hello, thank you for contacting us". In fact,
    the Python interpreter ignores all comments. As a programmer, however, you should
    not leave a comment after every line. You can comment if you need to explain something.
    Since long comments are not supported by Python, it is important to use short
    and descriptive comments to avoid going overboard.


    ### Read and write


    You will realize that some programs ask for specific information or display the
    text on the screen. Sometimes we start the program code by informing readers about
