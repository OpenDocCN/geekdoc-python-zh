    ```


    在这里，我们断言“weather”变量中存储了单词“cloudy”。当我们在 Python 中使用“等于”号时，与数学中不同，我们并不是说两个值相等。相反，我们是在“赋值”或在该变量中存储一个值。我们将在介绍运算符时详细讨论这一点，但目前，只需知道在
    Python（以及通常在编程语言中）中，等号的使用方式与数学等号不同。


    关于变量命名，只要名称遵守一些规则，变量基本上可以命名为任何名称：


    -   它只包含字母、数字或下划线

    -   **第一个字符不是数字**

    -   **变量名不是保留关键字之一**


    大写和小写字母都可以，任意数量的数字或下划线也可以，但变量名的第一个字符不能是数字。还有一些单词（如“input”、“print”和“while”）不能用作变量名，因为
    Python 将这些单词保留用于特定命令。最后要记住的一件重要事情是变量名区分大小写，因此“varName”与“varname”是不同的变量。


    虽然变量几乎可以命名为任何名称，但在实践中，创建变量名时你需要遵循一些准则。过去，有两种普遍接受的变量名格式化方式：驼峰式命名法和蛇形命名法。驼峰式命名法是指用大写字母连接复合词的做法（即
