  md: '# Chapter 2: Variables and Operators


    Now that we’ve gotten Python installed and an IDE set up, we’re ready to begin
    learning Python for real. The following couple of chapters will focus on introducing
    core Python concepts like variables, operators, and the various types of data
    you can manipulate with Python. For now, let’s concentrate on understanding variables
    and operators.


    # 2.1 - Variables


    When you hear the word “variable,” what do you think of? There’s a good chance
    you might think back to algebra class and recall that a variable was often a letter
    that represents some number. In other words, it was an item that contained a representation
    of another item. Generally, in Python and programming, that’s what variables are.
    They are just representations of data stored in a form that is easy to access
    and manipulate. Let’s try creating some variables now.


    ```

    X = 30

    ```


    That’s a very common usage of a variable. Just like you’d see in math class, “X”
    represents the numerical value 30. However, variables can also store other types
    of data, like text.


    ```

    weather = "cloudy"

    ```


    Here, we’re asserting that the “weather” variable has the word “cloudy” stored
    in it. When we use the “equals” sign in Python, unlike in math, we aren’t saying
    that the two values are equal. Rather, we’re “assigning” or storing a value in
    that variable. We’ll talk more about this when we cover operators, but for now,
    just know that in Python (and in programming languages generally), the equals
    sign is used differently than the mathematical equals sign.


    As far as naming our variables goes, a variable can basically be called anything
    if the name adheres to a few rules:


    +   - It contains only letters, numbers, or underscores'
  merge: -1
  pgno: 20
- img_proc: true
  md: '+   - **The first character is not a number**

    - **The variable name is not one of the reserved keywords**


    Uppercase and lowercase letters are fine, as are any amount of numbers or underscores,
    although the first character in the variable name cannot be a number. There are
    also a few words (like “input,” “print,” and “while”) that cannot be used as variable
    names because Python reserves these words for specific commands. One last important
    thing to remember is that variable names are case sensitive, so “varName” is a
    different variable than “varname.”


    While variables can be named pretty much anything, in practice, you’ll want to
    follow some guidelines when creating variable names. In the past, there were two
    commonly accepted ways of formatting variable names: camel case and snake case.
    Camel case refers to the practice of joining together compound words with upper
    case letters (i.e. variableName, thisIsCamelCase). Meanwhile, snake case is just
    adding underscores between compound variable names, like this: underscore_name,
    variable_name, this_is_snake_case.


    According to the Python style guide, the preferred variable style is snake case.


    Beyond that, try to name variables things that make sense. Avoid confusing variable
    names (i.e. Cat = “dog”) in favor of variable names that make intuitive sense
    (animal = “dog”).


    # 2.2 - Operators


    Now that we’ve discussed variables, let’s talk about operators. Operators are
    symbols that perform functions, and they are used to manipulate data in different
    ways.


    We’ve already touched on one operator, the assignment operator, which is represented
    by an equal sign. As previously mentioned, the “=” sign in Python has a different
    meaning than its use in math; here it means that we are assigning the value on
    the right side of the operator to the variable name found on the left side. Let’s
    try using the = operator and assigning some values to some variables.'
