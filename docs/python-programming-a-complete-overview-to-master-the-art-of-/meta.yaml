    ## Chapter 4: Differences between Python and other programming languages?


    Python is an interpretive, object-oriented and dynamic data type high-level programming
    language. Since the birth of Python language in the early 1990s, it has gradually
    been widely used in processing system management tasks and Web programming. Especially
    with the continuous development of artificial intelligence, Python has become
    one of the most popular programming languages.


    ## Why is Python special?


    There are hundreds of programming languages now available for programmers to start
    with. However, according to statistics from a survey done by Harvard computer
    scientists Python is a leading language among beginners. We will in this section
    discuss about some of the reasons that make Python an understandable language
    for new programmers.


    Python has the following major advantages over other programming languages:


    - (1) The grammar is concise and clear, and the code is highly readable. Python''s
    syntax requires mandatory indentation, which is used to reflect the logical relationship
    between statements and significantly improve the readability of the program.

    - (2) Because it is simple and clear, it is also a programming language with high
    development efficiency.

    - (3) Python can be truly cross-platform, for example, the programs we develop
    can run on Windows, Linux, macOS systems. This is its portability advantage.

    - (4) It consists of a large number of rich libraries or extensions. Python is
    often nicknamed glue language. It can easily connect various modules written in
    other languages, especially C/C++. Using these abundant third-party libraries,
    we can easily develop our applications.

    - (5) The amount of code is small, which improves the software quality to a certain
    extent. Since the amount of code written in Python is much smaller than that in
    other languages, the probability of errors is much smaller, which improves the
    quality of the software written to a certain extent.


    Python is very versatile and can be used in the following areas:


    - (1) web page development;

    - (2) Visual (GUI) interface development;

    - (3) Network (can be used for network programming);

    - (4) System programming;

    - (5) Data analysis;

    - (6) Machine learning (Python has various libraries to support it);

    - (7) Web crawlers (such as those used by Google);

    - (8) Scientific calculation (Python is used in many aspects of the scientific
    calculation).


    For example, Python is used in many Google services. YouTube is also implemented
    in Python. The basic framework of the Wikipedia Network initially is also implemented
    in Python.


    ## How does python work?


    Python Program Execution Principle is very simple. We all know that programs written
    in compiled languages such as C/C++ need to be converted from source files to
    machine languages used by computers, and then binary executable files are formed
    after linking by linkers. When running the program, you can load the binary program
    from the hard disk into memory and run it.


    However, for Python, Python source code does not need to be compiled into binary
    code. It can run programs directly from the source code. The Python interpreter
    converts the source code into bytecode and then forwards the compiled bytecode
    to the Python virtual machine (PVM) for execution.


    When we run the Python program, the Python interpreter performs two steps.


    (1) Compiles Source Code into Byte Code


    Compiled bytecode is a Python-specific expression. It is not a binary machine
    code and needs further compilation before it can be executed by the machine. This
    is also why Python code cannot run as fast as C/C++.


    If the Python process has to write permission on the machine, it will save the
    bytecode of the program as a file with the extension .pyc. If Python cannot write
    the bytecode on the machine, the bytecode will be generated in memory and automatically
    discarded at the end of the program. When building a program, it is best to give
    Python permission to write on the computer, so as long as the source code is unchanged,
    the generated .py file can be reused to improve the execution efficiency.


    (2) Forwarding the compiled bytecode to Python Virtual Machine (PVM) for execution.


    PVM is short for Python Virtual Machine. It is Python''s running engine and part
    of the Python system. It is a large loop that iteratively runs bytecode instructions,
    completing operations one after another.


    In this process, every python program is executed and gives results that can be
    further analyzed and tested to completely deploy as new applications.


