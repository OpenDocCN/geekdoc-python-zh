    \ We will learn about template engines like Jinja2, template inheritance, some\
    \ in-built Python functions; all with proper explanations. Now it’s time to get\
    \ into it.\n\n## BASICS OF TEMPLATE\n\nThe templates in Django are strings of\
    \ indented text to separate the presentation of a document from its data. It is\
    \ the template that defines placeholders and various bits of basic logic that\
    \ regulate how the paper should be displayed. Templates are used for showing HTML,\
    \ but Django templates are equally capable of text-based format data. Let’s review\
    \ a simple example of a template. Signifying a web framework, Django needs a convenient\
    \ way to generate HTML dynamically. The most common approach relies on templates.\n\
    \nA Django project can be worked with one or more several templates. Django has\
    \ its in-built backend for its own templates system; it is called Django template\
    \ language (DTL), a popular alternative is Jinja2. Backends for the other template\
    \ language can be available from third parties. We can also write a custom backend.\
    \ First, we will talk about the Jinja template briefly.\n\n## JINJA\n\nJinja is\
    \ also commonly referred to as “Jinja2”. The Python templating engine is used\
    \ to create HTML, XML, or other markup formats returned to the user via an HTTP\
    \ response. It is a fast, expressive, extensible templating engine. These templates\
    \ allow writing code similar to Python syntax. This template is then passed data\
    \ to render the final document.\n\n**Why Is Jinja2 Useful?**\nIt has consistent\
    \ template tag syntax, and the project is cleanly extracted as independent and\
    \ open-source by other code libraries.\n\n**Origin of Jinja2?**\nIt is not the\
    \ only template engine that exists. Django’s built-in template engine inspires\
    \ Jinja2’s syntax. Many template systems, such as JavaServer Pages (JSPs), originated\
    \ many years before Jinja. You should know the fundamental of Jinja2 before starting\
    \ to use it. It is built upon the concepts of other template engines, and nowadays\
    \ it is widely used by the Python community and developers.\n\n## API\n\nThis\
    \ will define the API to Jinja and not the template language. Let’s talk about\
    \ the basics of it. It uses an object called the template. The class instances\
    \ are used to store the global things and used to load templates from the file\
    \ system or other locations. The simplest way to configure Jinja is to load templates.\n\
    \n```python\nfrom jinja2 import Environment, PackageLoader, select_autoescape\n\
    env = Environment(\n    loader=PackageLoader(\"Your_app_name\"),\n    autoescape=select_autoescape()\n\
    )\n```\n\nThis will create a template environment with a loader that looks up\
    \ templates in the templates folder inside the ‘Your_app_name’ Python package\
    \ (or next to the Your_app_name.py Python module). It also enables autoescaping\
    \ for HTML files. It might allow autorunning by default for security reasons.\n\
    \n## Why do we need Jinja2?\n\n1. It provides protected framework for testing\
    \ programs whose behavior is unknown and must be investigated.\n2. It has a powerful\
    \ automatic HTML Escaping feature, which helps the site prevent Cross-site Scripting\
    \ (XSS Attack).\n3. There are special characters like >, <, &, and so on that\
    \ carry special meanings in the templates.\n4. It has a most important feature\
    \ which will expand your project, that is Template Inheritance.\n5. It consists\
    \ of extensible filters, tests, functions, and more clear syntax.\n6. It makes\
    \ debugging easier.\n7. These are compiled to optimize Python code just in time.\n\
    8. I18N support with Babel.\n9. Define and import macros within templates.\n\n\
    ## Installation\n\nIf you want to install Jinja in your system, you require Python\
    \ 3.6 and a newer version of Python. Run this command in the terminal as follows:\n\
    \n```bash\npip install Jinja2\n# another way to add Jinja to your project\npip\
    \ install jinja2\neasy_install jinja2\n```\n\n## Dependencies\n\nThese will automatically\
    \ be installed when installing Jinja.\n\n- **Markup Safe**: It escapes the untrusted\
    \ when rendering the templates to avoid malicious attacks.\n- **Babel**: It provides\
    \ translation support in Jinja templates."
