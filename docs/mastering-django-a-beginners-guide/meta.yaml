  md: '# # Django’s History


    IN THIS CHAPTER


    +   - Getting to know the history of Django

    - Learning about uses and features

    - Installation of Django


    Django is a high-level Python-based web framework that follows the MTV pattern,
    i.e., MODEL TEMPLATE VIEWS, enabling us to have a coherent architecture designed
    and developed by the *Lawrence Journal-World* newspaper in 2003. Django was released
    on July 21, 2005. It is a Python-based framework that uses Python to create fast
    dynamic websites. The Django agency decided to publish the Django source code
    in the BSD license in 2005. The Django Software Foundation (DSF) was created to
    support and advance Django in 2008 and version 1 of the framework was released
    a few months later. Django 2.0 is compatible with Python 3.4, 3.5, 3.6, and 3.7
    versions. Its primary goal is to ease the formation of complex database-driven
    websites. MNC’s such as the Instagram mobile website, Mozilla.org, and Openstack.org
    are using Django.


    # ## WHICH LANGUAGE IS USED IN DJANGO?


    It is written in Python, which runs on many platforms like Windows, Linux, and
    macOS, a dynamic and high-level programming language. It covers almost all tasks
    and problems.'
  merge: -1
  pgno: 21
- img_proc: true
  md: '2 ■ Mastering Django


    # IS PYTHON NECESSARY FOR DJANGO?


    It is not easy to learn Django if you don''t have a strong knowledge of Python.
    You don''t have to know everything in Python, but make your basic concept clear,
    which Django requires. Also, focus on OOPS concepts.


    # WHAT CAN I DO WITH PYTHON?


    Python helps fulfill real-world tasks – a sort of things that programmers do day
    in, day out. It''s generally used in a variety of domains, scripting other components
    and implementing stand-alone programs. Python plays an important role here. You
    can use it anywhere: from developing website and gaming to robotics and spacecraft
    control, or anything else. Python currently seems to fall into various categories.

    Python is commonly applied in many domains for jobs that can be mentioned here.
    For example, you can do:


    +   - Web Application Development

    - Game programming and multimedia with the pygame system

    - Serial port communication on Windows, Linux

    - Natural Language Processing

    - Image processing with PIL

    - Web Scraping

    - Robot control programming

    - Artificial intelligence programming

    - DevOps

    - Machine Learning


    # IS PYTHON SUPPORTED?


    Yes. The Python community responds to user queries with a speed that most commercial
    software help desks would do well to emulate. Python comes with complete source
    code; its documentation empowers developers, creating a large team of implementation
    experts.


    # ADVANTAGES OF PYTHON PROGRAMMING LANGUAGE


    The languages are full of benefits and there are some excellent reasons to love
    them. The most outstanding companies in the world use Python.'
  merge: -1
  pgno: 22
