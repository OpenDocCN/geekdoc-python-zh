  md: "# THE MODEL TEMPLATE VIEW (MTV) DESIGN PATTERN\n\nDjango follows this MTV pattern\
    \ closely enough to be called an MTV framework based on the MCV or model view\
    \ controller. The difference between these two is that Django itself cares about\
    \ the controller part. Here’s roughly how the M, T, and V break down in Django.\n\
    \nMVC stands for model view controller. It is used for developing web applications,\
    \ where we break the code into various segments. Here we have three components:\
    \ model, view, and controller:\n\n+   1. “M” stands for model, the data-access\
    \ layer. This data layer contains the required fields of the data you are storing\
    \ in the database. The model helps developers to create, read, update data in\
    \ the original database.\n\n```\nfrom django.db import models\nfrom django.contrib.auth.models\
    \ import User\nclass Post(models.Model):\n    title= models.CharField(max_length=100)\n\
    \    description=models.TextField()\n```\n\n+   2. “T” stands for template, the\
    \ presentation layer. This layer contains presentation-related decisions: how\
    \ something should be displayed on a Web page or other type of document. A template\
    \ is used only to present the data since there is no business logic in it.\n\n\
    +   • To configure the Template, go to the setting.py file and update the DIRS\
    \ to the path of the template folder. The entire Template is kept under the template\
    \ folder.\n\n+   3. “V” stands for view, the business logic layer which interacts\
    \ with the model and carries data to the Template. This layer accepts the HTTPS\
    \ request, logic by Python classes and methods. You can think of it as the bridge\
    \ between models and templates. It is a call-back function for a particular URL.\n\
    \n+   4. “C”, which stands for controller, is a business logic that will interact\
    \ with the model and the view, but Django takes it by itself. That’s why we use\
    \ the MTV pattern in Django."
