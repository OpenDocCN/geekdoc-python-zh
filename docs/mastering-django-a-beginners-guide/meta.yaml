    \ learn some advanced functionalities like class, method, inheritance, and so\
    \ on. Instead of using the function, use class in a better way because the class\
    \ is callable in nature. In the future, your small project will help you a lot\
    \ more.\n\n![](img/6b248a6900b90aa4ebb02bce8e067804_266_0.png)\n\nTaylor & Francis\n\
    Taylor & Francis Group\nhttp://taylorandfrancis.com\n\n# CHAPTER 12\nProject To-Do\
    \ List\n\n## IN THIS CHAPTER\n\n- Getting to know about Django\n- Quiz application\
    \ overview\n- Project code\n\nIn this chapter, we will be creating a To-Do app\
    \ that is fully scalable and runs on a platform independent basis. This will give\
    \ you a head start for Django with the proper understanding of basic things.\n\
    \nBefore understanding Django, let's first know why we need a web framework? A\
    \ web framework is a server application framework that is designed to support\
    \ dynamic websites. With the help of these frameworks, you don't have to bother\
    \ about web development. There are various web development frameworks available\
    \ on the market. Some of them are as follows:\n\n## REACT, FLASK, RUBY ON RAILS,\
    \ ETC.\n\nOne of the main points of Django is that it is built on Python. It follows\
    \ the principle of DRY – “Don't Repeat Yourself.” It takes care of user content\
    \ administration, authentication, site maps, and many more. It is highly secure.\
    \ It helps all beginners and developers avoid many common security mistakes, such\
    \ as SQL injection, cross-site scripting, csrf/xsrf, and click-jacking.\n\nIt\
    \ is pretty scalable, like using a shared-nothing architecture, which means you\
    \ can add hardware at any level – database servers, caching servers, or applications\
    \ servers. It has various other advantages: it has an intuitive administration\
    \ interface, ORM, RSS feeds, and many more.\n\nIt builds websites dynamically,\
    \ it is extremely fast, and SEO optimized.\n\n## HOW TO CREATE A TO-DO LIST APP\
    \ IN PYTHON DJANGO\n\nA list that keeps track of all the tasks you perform in\
    \ a single day is called a to-do list. It is a manageable way to complete tasks\
    \ on time. It makes the users responsible for also knowing the value of time.\
    \ Today we will be creating a to-do list application using the Django framework.\
    \ The main motive of this to-do list is to get some knowledge of Python syntax\
    \ and Django CRUD. It has some basic functionality like Create, Read, Update,\
    \ and Delete. Users can add their tasks and also delete them.\n\nIf you know the\
    \ fundamentals of Django and Python well, then you are good to go with this project.\
    \ Here are the steps to start this project.\n\n1. **Install Python:** Before we\
    \ go forward, ensure you have Python installed in your system. If you do not have\
    \ Python, install Python from its official site.\n2. Add environment variable\
    \ in the environment variable set so that you won't get any problem regarding\
    \ the path.\n3. Create a folder and then create a virtual environment in it using\
    \ Python –m venv Virtual_env.\n4. Activate the virtual environment when it has\
    \ been installed in your folder.\n5. Move to directory Scripts, using the cd command.\n\
    6. The run activates in the folder.\n7. It will let you move to the end of the\
    \ project, where you have to install your Django using pip install Django.\n8.\
    \ After installation of Django, move back to the project folder using cd .. twice."
  mdcn: "在 view.py 文件中，你将看到与上面相同的模块导入；在深入代码之前，我们先来讨论 view.py 文件的导入部分：\n\n1.  **From\
    \ Django.shortcuts import redirect, render:** 这段代码包含了项目在将文本渲染到模板以及重定向到特定 URL 以使网站动态化时的重要功能。你可以从\
    \ Django.shortcuts 中获取所有的重定向和返回。\n\n2.  **From django.contrib.auth import logout,\
    \ authenticate, login:** 这将帮助你使视图更安全。一旦用户注册，只有该用户才能访问网站。登录、登出有助于传递经过身份验证的用户。在前面的章节中，你已经了解了存储所有数据的管理面板。\n\
    \n3.  **From .forms import *:** 表单在这里扮演着至关重要的角色，因为你可以通过在 view.py 文件中导入它来直接获取表单数据。只有当用户输入详细信息并点击\
    \ POST 方法时，表单数据才能被存储。这就是为什么在每个表单中，我们总是写 `if method == POST`；这段代码只有在方法匹配时才会运行。\n\
    \n4.  **From .models import *:** 当用户在表单中输入数据时，模型文件会像这样导入，forms.py 会运行，并且当 `save()`\
    \ 方法执行时数据将被保存，下面的代码是 save 方法的示例。\n\n```\nif request.method=='POST':\n    form\
    \ = createuserform(request.POST)\n    if form.is_valid():\n        user=form.save()\n\
    \        return redirect('login')\n```\n\n当用户点击按钮时，请求方法与用户值匹配，该值我们将从 `createuserform(request.POST)`\
    \ 中获取并保存在 form 变量中；在下一行，检查代码是否有效：如果 `form.is_valid()` 返回 True，则用户详细信息将存储在数据库中，并在代码成功运行后链接到数据库，然后窗口重定向到登录页面。\n\
    \n5.  **From Django.http import HttpResponse:** HttpResponse 将文本返回给客户端浏览器。每当请求产生时，它由中间件处理并由\
    \ HttpResponse 渲染。\n\n6.  **From django.contrib.auth.models import auth:** 你的\
