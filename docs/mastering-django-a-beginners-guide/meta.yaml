    \ A，而B使用Python1和Django 2。请记住，两者都有独立的虚拟环境，互不干扰（图2.7）。\n\n组织文件夹\n您不必将venv文件夹放在项目文件夹内。请记住，Django将下载到venv内部（图2.8）。\n\
    \n冻结依赖项\n这意味着您的项目包列表可以使用pip freeze命令存储在文件中。\n\n![](img/6b248a6900b90aa4ebb02bce8e067804_57_0.png)\n\
