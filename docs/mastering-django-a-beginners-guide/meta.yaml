    ```python\ndef __contains__(self,name):\n    if name in self.students:\n     \
    \   return True\n    else:\n        return False\n```\n\n- **布尔求值**\n    1. **__bool__**：每个对象都有一个布尔值，可以是\
    \ True 或 False。`布尔(对象)` 返回该对象的布尔值。它通过调用 `__bool__()` 方法产生一个布尔值。\n    2. **__nonzero__**：Python\
    \ 2 使用 `__nonzero__` 方法将对象转换为布尔值。\n\n示例：\n\n```python\nclass MyBoolean(object):\n\
    \    def __bool__(self):\n        return True    # 在此处实现一些逻辑\n    def __nonzero__(self):\
    \  # Python 2 兼容性\n        return type(self).__bool__(self)\n```\n\n- 除法\n\n```python\n\
