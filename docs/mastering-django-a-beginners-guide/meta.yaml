- md: "## ModelAdmin Methods\n\n10. **ModelAdmin.get_search_fields(request)**: This\
    \ method is given the HttpRequest and returns the same kind of type as for the\
    \ search_fields attribute in the model.\n\n11. **ModelAdmin.get_sortable_by(request)**:\
    \ This method is passed the HttpRequest and is expected to return a collection\
    \ (list, tuple, or set) of fields that will be sorted in the change list page.\n\
    \nIts default returns sortable_by if it is set, otherwise it only defers to get_list_display().\n\
    \n12. **ModelAdmin.get_urls()**: This method of a ModelAdmin returns the URLs\
    \ used for that ModelAdmin in the same way as a URLconf.\n\n13. **ModelAdmin.get_form(request,\
    \ obj, \\*\\*kwargs)**: It returns a ModelForm class that is used in the admin\
    \ panel to add and change views using see add_view() and change_view() methods.\n\
    \nThe base implementation is to subclass form, modified by attributes such as\
    \ fields and exclude.\n\n## Some Permission Methods for AdminPanel\n\n1. **ModelAdmin.has_view_permission(request,\
    \ obj=None)**: It returns True if viewing obj is permitted, False otherwise. This\
    \ class allows user read-only access to model when object is None, return True\
    \ or False to indicate the way viewing of objects of this type is permitted.\n\
    \nThe default implementation is true if the user has only “view” permission.\n\
    \n2. **ModelAdmin.has_add_permission(request)**: It returns True if adding obj\
    \ is permitted, False otherwise. This class allows user add-only access to model.\n\
    \nThe default implementation is true if the user has only “add” permission.\n\n\
    3. **ModelAdmin.has_change_permission(request, obj=None)**: It returns True if\
    \ changing is permitted, False otherwise. This class allows user change-only access\
    \ to model.\n\nThe default implementation is true if the user has only “change”\
    \ permission.\n\n4. **ModelAdmin.has_delete_permission(request, obj=None)**: It\
    \ returns True if the user obj has delete permission, False otherwise. This class\
    \ allows user delete-only access to model.\n\nThe default implementation is true\
    \ if the user has only “delete” permission.\n\n5. **ModelAdmin.response_add(request,\
    \ obj, post_url_continue=None)**: It is called after the admin form is submitted\
    \ to the model and after the object. You can override the model to change the\
    \ default behavior after the object has been created. It is used for adding new\
    \ instance.\n\n6. **ModelAdmin.response_change(request, obj)**: It is called after\
    \ the admin form is submitted and after the object has been saved. It is used\
    \ for changing the instance once.\n\n7. **ModelAdmin.response_delete(request,\
    \ obj_display, obj_id)**: It is called after the object has been deleted. It is\
    \ used for delete instance once.\n\n**obj_display**: It is the first argument\
    \ in a string with the name of the deleted object.\n\n**obj_id**: It is the first\
    \ argument as the serialized identifier used to retrieve the object to be deleted.\n\
    \n8. **ModelAdmin.has_module_permission(request)**: It should return True if displaying\
    \ the module on the admin index page and accessing the module’s index page are\
    \ permitted, False otherwise. Use User.has_module_perms() by default.\n\n9. **ModelAdmin\
    \ asset (Media and CSS)**: ModelAdmin has a feature of adding CSS, JavaScript,\
    \ and Media in the Admin Panel.\n\n```python\nfrom django.contrib import admin\n\
    \nclass CustomAdmin(admin.ModelAdmin):\n    class Media:\n        css = {\n  \
    \          'all': ('css/mymarkup.css',)\n        }\n        js = ('javascript/mymarkup.js',)\n\
    \nadmin.site.register(CustomAdmin)\n```\n\n## HOW TO ADD JQUERY IN YOUR PROJECT?\n\
    \nDjango allows us to use the jQuery library in the admin panel.\nIf you would\
    \ like to use jQuery in your admin JavaScript without including a second copy,\
    \ you can use the Django.jQuery object and add/edit views on the change list.\
    \ Also, your admin forms or widgets depending on Django.jQuery must specify as\
    \ follows:\n\n```python\nfrom django.contrib import admin\n\nclass CustomAdmin(admin.ModelAdmin):\n\
    \    class Media:\n        css = {\n            'all': ('css/mymarkup.css',)\n\
    \        }\n        js = ('admin/js/jquery.init.js',)\n\nadmin.site.register(CustomAdmin)\n\
    ```\n\n**Adding custom validation to the admin:** This Form consists of fields.\
    \ Create a different file of name form.py, and then make a basic form structure\
    \ and import it in admin.py.\nForm.py looks as follows:\n\n```python\nclass CustomForm(forms.Form):\n\
    \    name = forms.CharField(label='Your name',\n                           max_length=100)\n\
    \    age = forms.IntegerField(label='Your Age')\n```\n\nHere, the admin.py is\
    \ needed to import that form for use directly in the admin panel.\n\n```python\n\
    from .form import *\n\nclass ArticleAdmin(admin.ModelAdmin):\n    form = CustomForm\n\
    ```\n\n## How to use form.py in view.py?\n\n```python\nfrom .form import *\n\n\
    def register(request):\n    # this is a POST request, need to process the form\
    \ data\n    if request.method == 'POST':\n        # create instance and populate\
    \ it with data from the request:\n        form = NameForm(request.POST)\n    \
    \    # check whether it's valid:\n        if form.is_valid():\n            # process\
    \ the data in form.cleaned_data as required\n            # ...\n            #\
    \ redirect to a new URL:\n            return HttpResponseRedirect('/thanks/')\n\
    \    # if a GET (or any other method) we'll create a blank form\n    else:\n \
    \       form = CustomForm()\n```\n\nLet's understand each line of the code.\n\
    First, we import the CustomForm from form.py, and then we start our function named\
    \ as register(). In the following line, we start our logic with if request.method,\
    \ i.e., when the button is pressed, and its method is the same as “POST”. Then\
    \ the code written inside it will run, where we get the Form Data from the page\
    \ form.py and store it in the form variable. We can call the Form is_valid() method;\
    \ if it is not true, we can go back to the template with the Form. If is_valid()\
    \ is True, we will be able to find all the validated form data in its cleaned_data\
    \ attribute.\n\n## InlineModelAdmin\n\nWhen two Django models share a foreign\
    \ key relation, inline that can expose the related model on the parent model page\
    \ is called InlineModelAdmin. It provides two subclasses of InlineModelAdmin:\n\
    \n1. TabularInline\n2. StackedInline\n\nInlineModelAdmin: It shares many of the\
    \ same features as ModelAdmin, and adds some of its own. The shared features are\
    \ as follows:\n\n1. form\n2. fieldsets\n3. fields\n4. formfield_overrides\n5.\
    \ exclude\n6. filter_horizontal\n7. filter_vertical\n8. ordering\n9. prepopulated_fields\n\
    10. get_fieldsets()\n11. get_queryset()\n12. radio_fields\n13. readonly_fields\n\
    14. raw_id_fields\n15. formfield_for_choice_field()\n16. formfield_for_foreignkey()\n\
    17. formfield_for_manytomany()\n18. has_module_permission()\n\nInlineModelAdmin\
    \ has its separate method:\n\n- **InlineModelAdmin.model**:\n- **InlineModelAdmin.fk_name**:\
    \ It is the name of the foreign key in the model. In few cases, this will be dealt\
    \ with automatically, but fk_name must be specified explicitly if there will be\
    \ more than one foreign key to the same parent model.\n- **InlineModelAdmin.formset**:\
    \ This defaults to BaseInlineFormSet. Using your formset can give you many possibilities\
    \ for alteration.\n\nInlines are built around model formsets.\n\n- **InlineModelAdmin.form**:\
    \ You cannot access any inline object inside any Inline Model. It is the only\
    \ way to use a custom Modelform.\n\nExamples\n\n- self.instance.pk\n\n- **InlineModelAdmin.get_extra()**:\
    \ It allows you to customize the number of different forms.\n\n- **InlineModelAdmin.get_max_num()**:\
    \ It allows you to customize the maximum number of different forms.\n\n- **InlineModelAdmin.get_min_num()**:\
    \ It allows you to customize the minimum number of displayed forms.\n\n1. **InlineModelAdmin.raw_id_fields()**:\
    \ It is a list of fields you like to change into an input for either a ForeignKey\
    \ or ManyToManyField as widget.\n\n2. **InlineModelAdmin.template**: This template\
    \ used to render the inline model on the page.\n\n3. **InlineModelAdmin.verbose_name**:\
    \ It is human-readable name in Django for the field. If it is not given, then\
    \ Django can create it using the fields attribute.\n\n```python\nfield_name =\
    \ models.Field(verbose_name = \"name\")\n```\n\n4. **InlineModelAdmin.has_add_permission(request,\
    \ obj)**: It should return True if adding a model object is permitted; False otherwise.\n\
    \n5. **Example**: We can do this with a foreign key, for example:\n\n```python\n\
    class Friendship(models.Model):\n    to_person = models.ForeignKey(Student1, on_delete=models.CASCADE,\
    \ )\n    from_person = models.ForeignKey(Student2, on_delete=models.CASCADE,)\n\
    ```"
