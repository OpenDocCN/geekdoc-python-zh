    +   - django-admin.py runserver --adminmedia=/tmp/new-admin-stylefiles/: Use the
    --admin media option to tell Django where to find the various CSS and JavaScript
    files for the Django admin interface.

    - Django-admin.py runserver --noreload: Use the --noreload option to disable the
    use of the auto-reloader.'
