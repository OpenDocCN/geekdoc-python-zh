    \ 中，并且不要忘记结束此 block `{% endblock %}`。当你按下保存更新时，update 方法将运行，并且当你的代码正确工作时，值会立即存储。\n\
    \n## 编辑页面\n\n图 12.1 显示了编辑页面。\n\n## 编辑页面之后\n\n一旦你完成了数据的编辑，旧内容就会被更新（图 12.2）。\n\n\
