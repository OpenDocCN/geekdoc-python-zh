- md: "## CHAPTER 8\n\n# Django’s Forms\n\n## IN THIS CHAPTER\n\n- HTML forms\n- Form\
    \ classes\n- Widget\n- Looping over the form fields\n- Django crisp forms\n- User\
    \ creation form\n\nIn the previous chapter, we learned about the admin panel,\
    \ its working, register, and many functions. Here, we will discuss Django’s most\
    \ essential topic – Django forms.\n\n## HTML FORMS\n\nThey are used to take the\
    \ input from the user in order to compile data. They are quite easy to use and\
    \ handle all the validations for you. In HTML, the form is a collection of various\
    \ elements inside `<form>..other code..</form>` that allow a user to do things\
    \ like enter text, select options, manipulate objects or controls, add images,\
    \ and so on, and then send that information back to the server. They also have\
    \ various attributes like method, enctype, name, and so on. The `<form>` element\
    \ might contain one or more element inside it:\n\n- `<input>`: For entering text\
    \ in the form\n- `<textarea>`: For entering text like your message, feedback\n\
    - `<button>`: For submitting data to the server\n- `<select>`: Used for dropdown\
    \ list\n- `<option>`: Should be written inside the `<select>`\n- `<label>`: Used\
    \ for defining the name\n\n```html\n<form>\n  <p>First Name: <input type=\"text\"\
    \ name=\"firstname\"></p>\n  <p>Last Name: <input type=\"text\" name=\"lastname\"\
    ></p>\n  <p><input type=\"submit\" value=\"Submit\"></p>\n</form>\n```\n\n###\
    \ Link to a Page with the Form\n\n```html\n<a href=\"{% url 'post' %}\" class=\"\
    title\"> You can place text, image or anything else between the anchor tag </a>\n\
    ```\n\nIt is an HTML element that creates a link to target another URL. While\
    \ implemented, the link can wrap-around text, images, or buttons so that users\
    \ can interact with it and visit the link’s destination.\n\nAn essential attribute\
    \ of the `<a>` element is the href attribute, which indicates the link’s destination.\
    \ It has various attributes that should be written inside the anchor tags:\n\n\
    | Attribute | Description |\n| :--- | :--- |\n| download | Target will be downloaded\
    \ |\n| href | Specifies the URL |\n| rel | Set out the relationship between the\
    \ current document and the other linked document |\n| type | Specifies the media\
    \ type of the linked document |\n| target | _blank, _parent, _self, _top, it states\
    \ where to open the linked document |\n\n## Input Tag\n\nThis `<input>` tag describes\
    \ an input field where the user can enter data. It can be shown in various ways,\
    \ depending on the type of attribute. The different input types are as follows:\
    \ button, checkbox, color, date, email, number, password, submit, and file. These\
    \ are the commonly used example.\n\n```html\n<input type=\"text\" class=\"form-control\"\
    \ntype=\"submit\" name=\"username\">\n```\n\n## Django's Role in Forms\n\nDjango's\
    \ form can simplify and automate a huge part of the work and do it more reliably\
    \ than most programmers would be able to do in code. We can use it anywhere as\
    \ it won't take much space. Django handles have three distinct parts:\n\n- Preparing\
    \ and restructuring data to make it ready for rendering to the user\n- Creating\
    \ HTML forms for the data\n- Receiving and processing submitted forms and data\
    \ from the client\n\n## Django's Forms\n\nDjango provides form classes that allow\
    \ you to create HTML forms. It also describes a form and how it works and appears.\
    \ Each field of the form class maps to the HTML form `<input>` element, and each\
    \ is the class itself. It manages form data and performs validation while submitting\
    \ the form.\n\n```python\nfrom django import forms\nfrom .models import Post\n\
    #this is the forms\nclass CustomForm(forms.Form):\n    first_name = forms.CharField(max_length=50)\n\
    \    last_name= forms.CharField(max_length=50)\n#this is the form that the model\
    \ automatically creates\nclass PostForm(forms.ModelForm):\n    class Meta:\n \
    \       model = Post\n        fields = ('first_name', 'last_name',)\n```\n\n###\
    \ forms.Form vs forms.ModelForm\n\nTwo forms are created from forms. In ModelForm,\
    \ we have to declare which model will be used to create our form.\n\nFirst, we\
    \ have to import Django forms (`from django import forms`) and our ModelName model\
    \ (`from .models import ModelName`). ModelNameForm, as you probably suspect, is\
    \ the name of our custom form. It is necessary to tell Django that this form is\
    \ a ModelForm – form. ModelForm is responsible for that. Next, we have class Meta\
    \ (Meta provides you the information about the data) that tells Django which model\
    \ should be used to create this form (`model = ModelName`). Finally, we add some\
    \ fields in it like title and text.\n\n‘Form’ refers to HTML `<form>` or Django\
    \ form that provides structure to the form we can use it by import anywhere in\
    \ any file. Every website has at least one form in it with which the user can\
    \ interact.\n\nThe form has two essential state attributes:\n\n1. **is_bound**:\
    \ It will return False, and then it is an unbound state of form, that is, a new\
    \ form with empty or default field values. If true, the form is bound; that is,\
    \ at least one field has been set with user input.\n2. **is_valid()**: If this\
    \ returns true, every field in the bound form has valid data. If false, there\
    \ was some invalid data in at least one field, or the form was not bound.\n\n\
    ### The Django Form Class\n\nForm class describes a form that defines how it works\
    \ and appears. For example, a ModelForm links a model class’ fields to the HTML\
    \ form `<input>` elements via a FormIt, which is represented to a user in the\
    \ browser as an HTML ‘widget’.\n\n### Bound and Unbound Form Instances\n\n- **Unbound\
    \ Form**: It is a form that has no data linked with it. When rendered to the user,\
    \ it will be empty or will contain default values.\n- **Bound Form**: It is a\
    \ form that has submitted data and can be used to tell that data is valid. When\
    \ an invalid bound form is rendered, it includes inline error messages telling\
    \ the user what data to correct.\n\n## Widgets\n\nIt is Django's representation\
    \ of an HTML input element. The widget handles all the rendering of the HTML.\n\
    \n```python\nfrom django import forms\nclass CustomForm(forms.Form):\n    title\
    \ = forms.CharField(widget = forms.Textarea)\n    description = forms.CharField(widget\
    \ = forms.CheckboxInput)\n    views = forms.IntegerField(widget = forms.TextInput)\n\
    \    available = forms.BooleanField(widget = forms.Textarea)\n```\n\nA widget\
