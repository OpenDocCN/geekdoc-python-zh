    \  ```\n\n- **表单（Forms）：** 用于以不同方式从用户获取输入。Django 提供了一个表单类用于创建 HTML 表单；它也类似于 `ModelForm`\
    \ 类。\n\n  ```python\n  from django import forms\n\n  class SForm(forms.Form):\n\
    \      first_name = forms.CharField(label=\"Enter first name\", max_length=50)\n\
    \      last_name = forms.CharField(label=\"Enter last name\", max_length=100)\n\
    \  ```\n\n- **在 HTML 示例中定义此表单的方式：**\n\n  ```html\n  <label for=\"firstname\">Enter\
    \ first name:</label>\n  <input type=\"text\" name=\"firstname\" required maxlength=\"\
    50\" id=\"firstname\" />\n  <label for=\"lastname\">Enter last name:</label>\n\
    \  <input type=\"text\" name=\"lastname\" required maxlength=\"100\" id=\"lastname\"\
    \ />\n  ```\n\n  `<input>` 标签中的 `name` 属性代表模型的字段名。\n\n## 章节总结\n\n本章解释了 Python\
    \ 和 Django 是什么，以及它们是如何发展的。它还描述了两者各自的特性，并介绍了不同类型的编辑器。在下一章中，你将学习 Python 和 Django\
    \ 的目的和特性，以及如何在你的计算机上安装它们。\n\n# 第 2 章\n\n## 安装\n\n### 本章内容\n\n- 了解 Django 的安装\n\
    - 安装 pip\n- 安装 Python\n\n在上一章中，我们介绍了 Python 和 Django 的基础知识。它们的特性和不同类型的编辑器是什么？在这里，你将了解\
    \ Python 和 Django 的目的和特性。\n\n在安装 Django 之前，你必须知道你将在哪里工作。从哪里获取所有你需要的东西，比如所需的包、你的开发环境、库、调试功能以及其他很棒的东西。因此，这里我们将讨论\
    \ IDE 的主题，它将为你提供编程领域，它能给你什么，以及它们的好处。\n\n## 那么，首先，什么是 IDE？\n\nIDE（集成开发环境）是一种用于执行和构建任何基于\
    \ Web 的应用程序的软件，它将所有开发人员工具组合到一个单一的 GUI（图形用户界面）中。它理想地适用于编写编程语言，如 JavaScript、MySQL\
    \ 和 Python。让我们了解一下这个平台是如何工作的。它主要包含以下内容：\n\n- **源代码编辑器**：一些文本编辑器可以为你提供出色的功能，例如语法高亮文本、任何语言的代码自动补全、深色和浅色模式主题，以及在编写代码时检查代码中的错误。\n\
    - **调试器**：它将在原始代码中以图形方式表示错误位置。\n\n## 为什么开发人员使用 IDE？\n\n它将允许你快速开始编程，因为在 IDE 中，我们获得了大多数技术的多个内置配置。它使事情易于理解，无需花费数小时来学习该配置。IDE\
    \ 旨在节省时间，因为会自动生成代码。此外，你可以下载各种扩展来添加更多功能，例如任何语言的简单代码片段、实时服务器、使你的代码更美观以及许多其他功能。\n\
    \n## 理解差异：本地 IDE 与云 IDE\n\n### 什么是本地 IDE？\n\n让我们看看如何开始使用本地 IDE。开发人员需要安装和下载 IDE。一旦\
    \ IDE 安装完毕，开发人员需要下载各种库和项目依赖项。要在 IDE 中运行项目，你应该了解你正在使用的特定 IDE 的工作环境。大多数语言都有其主要的\
    \ IDE，例如 Eclipse 适合 Java 开发。但著名的本地 IDE 是 VS code，它适用于每种语言。\n\n### 优点\n\n- **可定制性**：许多\
    \ IDE 允许用户安装不同的扩展或插件，以添加功能并支持工作流程。VS code 有 271,000 个扩展，而 Microsoft workplace\
    \ 有 11,000 个。\n- **无需互联网连接**：一旦你安装并下载了 IDE，设置好你的开发环境。现在你的代码就可以在本地运行了。\n\n### 什么是云\
    \ IDE？\n\n云 IDE 是软件即服务（SaaS），与本地开发环境相比，提供了几个独特的优势。它运行在某处的服务器上，完全通过浏览器访问，无需下载软件和配置。有些人喜欢使用云\
    \ IDE，而另一些人则喜欢在本地工作。但在本地，你无法获得在浏览器中共享代码的功能。\n\n### 优点\n\n- 你可以使用与本地相同的 IDE，只是在云端。一些公司已经构建了自己的云\
    \ IDE，如 Coder、Gitpod、Google Cloud Shell、Codeanywhere 等。\n- 它们是可扩展的，并且具有出色的可伸缩性。\n\
    - 它们非常适合想要尝试新语言而无需在本地安装的开发人员。\n- 它允许开发人员同时处理多个项目，并管理每个项目。\n\n以下是一些基于云的 IDE。\n\n\
    - **CodePen**：它是一个基于云的 HTML、CSS 和 JavaScript 编辑器，允许你实时渲染代码、与他人分享并保存他人的代码片段。它的主要目的是创建一个小程序来理解概念。你可以添加样式表、脚本。此外，它还有一个\
    \ JavaScript 控制台来调试你的代码。\n- **JSFiddle**：它允许你进行前端开发并在同一浏览器中实时渲染。你可以 fork 别人的作品并在此基础上开始你的代码。它是\
    \ CodePen 的简化版本。\n- **Microsoft Azure**：它是 Microsoft 提供的一个完整的端到端解决方案。它管理通过 Jupiter\
    \ notebook 开发的项目。你需要登录你的 Microsoft 帐户并选择一个计划。它有免费和付费两种选项。\n- **Repl.it**：它只让你专注于编码，让平台负责设置环境。一旦你在其官方网站上完成注册，你只需单击一下即可创建一个环境。你可以根据项目需求选择语言。窗口分为三列——你的文件、文本编辑器和一个终端，你可以在其中查看结果。"
