    # WHY DO WE USE ENGINE?


    Django Template: The engine is an instance of the Django template system. Benefits
    of using Jinja:


    +   - **Speed and performance**: It compiles template source code to Python bytecode
    when it is loaded, so the template is only parsed, resulting in better performance
    at runtime.

    - **Similar to the Django template**: It is actually inspired by Django templates,
    so there is a lot of common ground between the two systems.

    - **Asynchronous execution**: Jinja templates support asynchronous execution,
    which allows backing tasks to run their course – without holding back templates.

    - **Flexibility**: They can contain supporting concepts like macros and more Python-like
    constructs.


    # WHAT ARE LOADERS?


    Template loaders are responsible for locating the template and returning template
    objects.'
  - "[PAGE 153]\n\n# Support for Template Engines\n\nConfiguration or How Django Finds\
    \ the Templates?\n\nTemplates engines are configured in the TEMPLATES setting.\
    \ It is a list of all the configurations, one for each engine.\n\n```\nTEMPLATES\
    \ = [\n    {\n        'BACKEND': 'django.template.backends.django.DjangoTemplates',\n\
    \        'DIRS': ['template'],\n        'APP_DIRS': True,\n        'OPTIONS':\
    \ {\n            'context_processors': [\n                'django.template.context_processors.debug',\n\
    \                'django.template.context_processors.request',\n             \
    \   'django.contrib.auth.context_processors.auth',\n                'django.contrib.messages.context_processors.messages',\n\
    \            ],\n        },\n    },\n]\n```\n\nBackend dotted Python path to a\
    \ template class: The built-in backends are 'Django.template.backends.Django.DjangoTemplates'.\n\
    \nCommon terms used in TEMPLATE\n\n+   - **DIRS**: It is the list of directories\
    \ where the engine should look.\n- **APP_DIRS**: It tells whether the engine should\
    \ look for a template inside the application. When it is True, Django Templates\
    \ engines look for template and then the template engine looks at the templates\
    \ subdirectory of installed applications.\n\nCreating a Site Template\n\nDjango\
    \ did not create the \\templates folder for you, so create it by own. When you\
    \ are finished, your folder structure should look like this:\n\n```\n\\myclub_site\
    \ # You App Folder\n    \\templates #Your Template Folder\n```"
- md: "## Addition Path for Template\n\nos.path.join is a Python command to create\
    \ a file path by joining strings together. In this example, we are joining my\
    \ site/templates to our project directory to create the full path to our templates\
    \ directory, i.e., <your project path>/root/my site/templates.\n\n```python\n\
    TEMPLATES = [\n    {\n        'BACKEND': 'django.template.backends.django.DjangoTemplates',\n\
    \        'DIRS': ['template'],\n        'APP_DIRS': os.path.join(BASE_DIR, 'mysite/templates'),\n\
    \        'OPTIONS': {\n            'context_processors': [\n                'django.template.context_processors.debug',\n\
    \                'django.template.context_processors.request',\n             \
    \   'django.contrib.auth.context_processors.auth',\n                'django.contrib.messages.context_processors.messages',\n\
    \            ],\n        },\n    },\n]\n```\n\n## Full Example of Templates\n\n\
    You can add a template in setting.py like above.\n\n```python\n# views.py\ndef\
    \ index(request):\n    data = \" I am learning \".\n    return render(request,\
    \ 'index.html', {'data': data})\n\n# index.html\n<html>\n<head>\n<title></title>\n\
    </head>\n<body>\n<!-- Data will render here -->\n{{data}}\n</body>\n</html>\n\n\
    # urls.py\nurlpatterns = [\n    path('', index, name=\"index\"),\n]\n```\n\nRender()\
    \ is a special Django helper function that creates a shortcut for communicating\
    \ with a web browser.\n\n## Class Jinja2\n\nIt is necessary to install:\n\n```bash\n\
    >>> python -m pip install Jinja2\n```\n\nSet BACKEND to ‘Django.template.backend.jinja2.Jinja2\
    \ ‘ to use Jinja2 engine.\n\nThe most important entry in OPTIONS is ‘environment.’\
    \ It is a Python path to callable returning a Jinja environment. Django will add\
    \ defaults that differ from Jinja2’s for options.\n\nThere are few common notations\
    \ used in Django:\n\n1. “**autoescape**”: True\n2. “**loader**”: a loader configured\
    \ for DIRS and APPS_DIRS.\n3. “**auto_reload**”: setting.DEBUG\n4. “**undefined**”:\
    \ DebugUndefined is settings.DEBUG else Undefined.\n\n## Usage of Template Loaders\n\
    \nThe Django.template.loader module is loaders modules that define two functions\
    \ to load templates:\n\n- **get_template(template_name, using=None)**: This function\
    \ loads the template with the given name and returns a Template object. If any\
    \ template cannot be found, it raises the TemplateDoesNotExist error. If the template\
    \ exists but contains invalid syntax, it raises TemplateSyntaxError error.\n-\
    \ **select_template(template_name_list, using=None)**: It is just like get_template(),\
    \ it takes a list of template names. It will try each name in order and return\
    \ the first template that exists.\n\nOptional Argument\n\n- **Backend**: It is\
    \ an instance from which the exception originated.\n- **Tried**: A list of sources\
    \ that were tried when finding the template formatted as a list of tuples containing\
    \ (origin, status).\n- **Chain**: This is used by functions, such as get_template(),\
    \ that try to load a given template from multiple engines.\n\nExample:\n\n```python\n\
    TEMPLATES = [\n    {\n        'BACKEND': 'django.template.backends.django.DjangoTemplates',\n\
    \        'DIRS': [\n            '/home/html/example.com',\n            '/home/html/default',\n\
    \        ],\n    },\n    {\n        'BACKEND': 'django.template.backends.jinja2.Jinja2',\n\
    \        'DIRS': [\n            '/home/html/jinja2',\n        ],\n    },\n]\n\
    ```\n\n## Template Inheritance\n\nJinja2 supports template inheritance, which\
    \ is the most powerful, useful feature of any templating engine. It means that\
    \ one template can inherit from another template.\n\nAlmost each and every website\
    \ has a navigation bar attached to the top of its page. Repeating the code is\
    \ a bad idea, so to avoid repeating the code, we use the inheritance feature because\
    \ it saves a lot more time and also reduces work.\n\nA base page template contains\
    \ the basic layout, which is common to all the other templates. This base template\
    \ extends or derives the layout for other pages.\n\nExample: We have a parent\
    \ template.\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n  {% block head %}\n\
    \  <title>{% block title %}{% endblock %}</title>\n  {% endblock %}\n</head>\n\
    <body>\n  {% block body %}{% endblock %}\n</body>\n</html>\n```\n\nTemplate inheritance\
    \ {% block %}: This tag is used to tell the template engine that we want to override\
    \ the common elements of our site via some common templates. It is the parent\
    \ template which is the basic layout and on which you can modify using the child\
    \ templates.\n\nExample: We have a child template in it; we are going to extend\
    \ our cord with the bits of help extends.\n\n```html\n{% extends \"base.html\"\
    \ %}\n{% block title %} Index {% endblock %}\n{% block head %}\n  {{ super() }}\n\
    {% endblock %}\n{% block body %}\n  <h1>Hello World</h1>\n  <p>Welcome to my site.</p>\n\
    {% endblock %}\n```\n\n1. The {% extends %} must be the very first tag in the\
    \ child templates. This tag tells the template engine that this template extends\
    \ from the parent template or (base.html).\n2. {% extends %} represents the inheritance.\n\
    \n## Django Static Files Handling\n\nDjango deals with it efficiently and provides\
    \ a convenient manner to use its resources. The Django.contrib.staticfiles module\
    \ helps to manage all the static files.\n\nDjango Static (CSS, JavaScript, images)\
    \ Configuration:\n\n- Includes the django.contrib.staticfiles in INSTALLED_APPS.\n\
    - Defines STATIC_URL in settings.py file as given below:\n  - STATIC_URL = '/static/'\n\
    - Loads the static files in the templates by using the below expression:\n  -\
    \ {% load static %}\n- Stores all the images, JavaScript, CSS files in a static\
    \ folder of the application and then creates a directory static and store the\
    \ files inside it.\n\nTo load your static files in a template, add the below code\
    \ in your base.html in the beginning. You can then get access to your static folder.\
    \ In the static folder, you can keep your CSS, JavaScript, and Bootstrap files.\n\
    \n- **Django Image Loading Example:**\n\n```html\n<!DOCTYPE html>\n<html lang=\"\
    en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <title>Index</title>\n    {%\
    \ load static %}\n</head>\n<body>\n    <img src=\"{% static '/wallpaper.jpeg'\
    \ %}\" alt=\"image\" height=\"200px\" width=\"500px\"/>\n</body>\n</html>\n```\n\
    \n- **Django Loading JavaScript:** To load JavaScript code in your file, just\
    \ add the following line of code in index.html file:\n\n```html\n{% load static\
    \ %}\n<script src=\"{% static '/js/script.js' %}\" type=\"text/javascript\"></script>\n\
    ```\n\n- **Django Loading CSS Example:**\n\n```html\n{% load static %}\n<!DOCTYPE\
    \ html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <title>Index\
    \ Page</title>\n    <link href=\"{% static 'css/style.css' %}\" rel=\"stylesheet\"\
    >\n</head>\n<body>\n    <p> I am Learning Python with Django </p>\n</body>\n</html>\n\
    ```\n\n- **Use of Forms in html Templating:**\n\n```html\n<form method=\"POST\"\
    \ enctype=\"multipart/form-data\">\n    {% csrf_token %}\n    {{ formset.as_p\
    \ }}\n    <input type=\"submit\" value=\"Submit\">\n</form>\n```\n\nWe create\
    \ an HTML page for our website in which we have used <form> tag with some attributes\
    \ like Method that means method to get and send with the help of Types of Method\
    \ we have:\n\n- **GET**\n\nGET is used to request (getting) data from a resource.\
    \ It is one of the most common HTTP methods.\n\nHow it looks like in the URL:\n\
    \n- /test/demo_site.php?name1=value1&name2=value2\n\nWe got the whole information\
    \ over the URL when we used it in the place of the POST method, so this method\
    \ is mainly used for retrieving the data.\n\n- **POST**\n\nIt is used to send\
    \ data to a server to create a resource. The data have sent to the server with\
    \ POST request stored in the request body of the HTTP request:\n\n- POST /test/demo_site.php\
    \ HTTP/1.1\n- Host: example.com\n- name1=value1&name2=value2\n\n## CHAPTER SUMMARY\n\
    \nYou have learned the basics of Django’s template system with the concepts of\
    \ tags and filters that exist both in Django’s template language and in Jinja2.\
    \ In the next chapter we will look at Django’s admin panel."
  mdcn: "## 模板的附加路径\n\n`os.path.join` 是一个 Python 命令，用于通过连接字符串来创建文件路径。在此示例中，我们将 `my\
    \ site/templates` 连接到项目目录，以创建模板目录的完整路径，即 `<your project path>/root/my site/templates`。\n\
    \n```python\nTEMPLATES = [\n    {\n        'BACKEND': 'django.template.backends.django.DjangoTemplates',\n\
    \        'DIRS': ['template'],\n        'APP_DIRS': os.path.join(BASE_DIR, 'mysite/templates'),\n\
    \        'OPTIONS': {\n            'context_processors': [\n                'django.template.context_processors.debug',\n\
    \                'django.template.context_processors.request',\n             \
    \   'django.contrib.auth.context_processors.auth',\n                'django.contrib.messages.context_processors.messages',\n\
    \            ],\n        },\n    },\n]\n```\n\n## 模板的完整示例\n\n你可以像上面那样在 `setting.py`\
    \ 中添加模板。\n\n```python\n# views.py\ndef index(request):\n    data = \" I am learning\
    \ \".\n    return render(request, 'index.html', {'data': data})\n\n# index.html\n\
    <html>\n<head>\n<title></title>\n</head>\n<body>\n<!-- Data will render here -->\n\
    {{data}}\n</body>\n</html>\n\n# urls.py\nurlpatterns = [\n    path('', index,\
    \ name=\"index\"),\n]\n```\n\n`Render()` 是一个特殊的 Django 辅助函数，它为与 Web 浏览器通信创建了一个快捷方式。\n\
    \n## Jinja2 类\n\n需要安装：\n\n```bash\n>>> python -m pip install Jinja2\n```\n\n将\
    \ `BACKEND` 设置为 `'Django.template.backend.jinja2.Jinja2 '` 以使用 Jinja2 引擎。\n\n\
    `OPTIONS` 中最重要的条目是 `'environment'`。它是一个可调用对象的 Python 路径，该对象返回一个 Jinja 环境。Django\
    \ 会添加与 Jinja2 不同的默认选项。\n\nDjango 中使用了一些常见的表示法：\n\n1.  “**autoescape**”：True\n\
    2.  “**loader**”：为 `DIRS` 和 `APPS_DIRS` 配置的加载器。\n3.  “**auto_reload**”：`setting.DEBUG`\n\
    4.  “**undefined**”：如果 `settings.DEBUG` 为真则为 `DebugUndefined`，否则为 `Undefined`。\n\
    \n## 模板加载器的用法\n\n`Django.template.loader` 模块是加载器模块，定义了两个加载模板的函数：\n\n-   **`get_template(template_name,\
    \ using=None)`**：此函数加载给定名称的模板并返回一个 `Template` 对象。如果找不到任何模板，它会引发 `TemplateDoesNotExist`\
    \ 错误。如果模板存在但包含无效语法，它会引发 `TemplateSyntaxError` 错误。\n-   **`select_template(template_name_list,\
    \ using=None)`**：它就像 `get_template()`，它接受一个模板名称列表。它将按顺序尝试每个名称，并返回第一个存在的模板。\n\n\
    可选参数\n\n-   **Backend**：异常源自的实例。\n-   **Tried**：查找模板时尝试过的源列表，格式为包含 `(origin, status)`\
    \ 的元组列表。\n-   **Chain**：这被 `get_template()` 等函数使用，这些函数尝试从多个引擎加载给定的模板。\n\n示例：\n\
    \n```python\nTEMPLATES = [\n    {\n        'BACKEND': 'django.template.backends.django.DjangoTemplates',\n\
    \        'DIRS': [\n            '/home/html/example.com',\n            '/home/html/default',\n\
    \        ],\n    },\n    {\n        'BACKEND': 'django.template.backends.jinja2.Jinja2',\n\
    \        'DIRS': [\n            '/home/html/jinja2',\n        ],\n    },\n]\n\
    ```\n\n## 模板继承\n\nJinja2 支持模板继承，这是任何模板引擎最强大、最有用的功能。它意味着一个模板可以从另一个模板继承。\n\n几乎每个网站的页面顶部都有一个导航栏。重复代码是个坏主意，因此为了避免重复代码，我们使用继承功能，因为它节省了更多时间，也减少了工作量。\n\
    \n一个基础页面模板包含基本布局，该布局对所有其他模板都是通用的。这个基础模板扩展或派生其他页面的布局。\n\n示例：我们有一个父模板。\n\n```html\n\
    <!DOCTYPE html>\n<html>\n<head>\n  {% block head %}\n  <title>{% block title %}{%\
    \ endblock %}</title>\n  {% endblock %}\n</head>\n<body>\n  {% block body %}{%\
    \ endblock %}\n</body>\n</html>\n```\n\n模板继承 `{% block %}`：此标签用于告诉模板引擎，我们希望通过一些公共模板覆盖站点的公共元素。它是父模板，是基本布局，你可以使用子模板对其进行修改。\n\
    \n示例：我们有一个子模板；我们将借助 `extends` 扩展我们的代码。\n\n```html\n{% extends \"base.html\" %}\n\
    {% block title %} Index {% endblock %}\n{% block head %}\n  {{ super() }}\n{%\
    \ endblock %}\n{% block body %}\n  <h1>Hello World</h1>\n  <p>Welcome to my site.</p>\n\
    {% endblock %}\n```\n\n1.  `{% extends %}` 必须是子模板中的第一个标签。此标签告诉模板引擎，此模板扩展自父模板或\
    \ (`base.html`)。\n2.  `{% extends %}` 代表继承。\n\n## Django 静态文件处理\n\nDjango 高效地处理它，并提供了一种便捷的方式来使用其资源。`Django.contrib.staticfiles`\
    \ 模块有助于管理所有静态文件。\n\nDjango 静态（CSS、JavaScript、图像）配置：\n\n-   在 `INSTALLED_APPS`\
    \ 中包含 `django.contrib.staticfiles`。\n-   在 `settings.py` 文件中定义 `STATIC_URL`，如下所示：\n\
    \    -   `STATIC_URL = '/static/'`\n-   使用以下表达式在模板中加载静态文件：\n    -   `{% load static\
    \ %}`\n-   将所有图像、JavaScript、CSS 文件存储在应用程序的 `static` 文件夹中，然后创建一个 `static` 目录并将文件存储在其中。\n\
    \n要在模板中加载静态文件，请在 `base.html` 的开头添加以下代码。然后你就可以访问你的 `static` 文件夹了。在 `static` 文件夹中，你可以存放你的\
    \ CSS、JavaScript 和 Bootstrap 文件。\n\n-   **Django 图像加载示例：**\n\n```html\n<!DOCTYPE\
    \ html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <title>Index</title>\n\
    \    {% load static %}\n</head>\n<body>\n    <img src=\"{% static '/wallpaper.jpeg'\
    \ %}\" alt=\"image\" height=\"200px\" width=\"500px\"/>\n</body>\n</html>\n```\n\
    \n-   **Django 加载 JavaScript：** 要在文件中加载 JavaScript 代码，只需在 `index.html` 文件中添加以下代码行：\n\
    \n```html\n{% load static %}\n<script src=\"{% static '/js/script.js' %}\" type=\"\
