  mdcn: "## 1. 一键安装程序\n\n此类安装程序是帮助您直接安装高级配置的绝佳工具：涵盖WordPress、Drupal、Joomla等众多流行应用。\n\
    \n## 2. .htaccess 文件访问\n\n这是一个功能强大的网站文件管理工具。如果您希望进行全站范围的管理更改，就必须访问 .htaccess 文件。它还提供了修改目录配置的方法。\n\
    \n## 3. FTP/SFTP 访问\n\n许多托管服务提供商会提供某种形式的文件管理器，但其功能往往相当有限。通过 FTP/SFTP 访问，您可以安全地在服务器上处理和传输大量文件。\n\
    \n- 在本地硬盘或云端为您的网站创建备份，对您大有裨益。\n\n它们对网站至关重要。即使采取了全球性的安全措施，您的网站仍可能面临各种病毒、崩溃、故障或黑客攻击，导致网站完全瘫痪。备份可以在服务器上创建项目的副本，这样一旦发生任何意外，您都可以从备份中恢复。\n\
    \n- **长期增长能力：** 网络托管服务将提供您公司发展所需的所有基本资源。您的托管服务商应为您提供各种托管方案，助您从小型发展到大型。\n\n## 准备发布您的网站\n\
    \nDjango 网站是使用 Django-admin 创建的，而 manage.py 工具则旨在简化开发过程。许多 Django 项目设置在 settings.py\
    \ 中指定，出于安全或性能考虑，生产环境的设置应与开发环境有所不同。\n\n您需要检查的一些强制性设置如下：\n\n- **DEBUG**：在生产环境中应设置为\
    \ False（DEBUG = False），这将阻止显示敏感的调试跟踪和变量信息。\n- **SECRET_KEY**：这是一个用于 CSRF 保护等的相当随机的值。生产环境中使用的密钥位于\
    \ Django 中。当我们运行 Django-admin startproject 时，它会自动为每个新项目添加一个随机生成的 SECRET_KEY。\n\
    - **ALLOWED_HOSTS**：需要将其设置为您的应用可以使用的 IP 地址/域名的允许列表，以防止跨站请求伪造攻击或类似问题。\n- **DATABASES**：数据库连接参数在开发和生产环境中可能不同。数据库密码非常敏感。最好像保护\
    \ SECRET_KEY 一样保护它们。为确保最大安全，请确保数据库服务器仅接受来自应用服务器的连接。\n\n## DJANGO 部署接口\n\n根据您的模式或特定业务需求，部署\
    \ Django 项目应用程序有多种选择。Django 作为一个 Web 框架，需要一个 Web 服务器来运行。由于大多数 Web 服务器本身不支持 Python，我们需要一个接口来实现这种通信。Django\
    \ 目前支持两种接口：WSGI 和 ASGI。这两个文件位于项目内部。\n\n## WSGI\n\nWSGI 是 Web 服务器与应用程序之间通信的首要 Python\
    \ 标准，但它仅支持同步代码。WSGI 是 Web 服务器网关接口。它描述了 Web 服务器如何执行 Web 应用并将信息发送给客户端。在部署 Django\
    \ 或 Flask 应用程序时，它扮演着不可或缺的角色。为什么它是必要的？服务器被设计为能够同时处理大量请求。并非所有框架都能处理成千上万的提交。这就是为什么我们使用它来加速\
    \ Python Web 应用程序开发的原因，因为您只需要了解 WSGI 的基本知识。\n\n准备我们的 WSGI 服务器：WSGI 规范使得任何兼容 WSGI\
    \ 的 Web 服务器都可以运行任何符合 WSGI 的 Web 框架，这意味着：\n\n- Green Unicorn (Gunicorn) 是一个基于预分叉工作模型的服务器，移植自\
    \ Ruby Unicorn 项目。它是一个用于 UNIX 系统的 Python WSGI 服务器。与工作模型架构相比，它基于预分叉模型。\n\n```\n\
    python -m pip install gunicorn\n```\n\n安装 Gunicorn 后，会有一个 gunicorn 命令可用，用于启动 Gunicorn\
    \ 服务器进程。\n\n```\ngunicorn myproject.wsgi\n```\n\n- uWSGI 作为一种高性能的 WSGI 服务器实现正日益受到关注。uWSGI\
    \ 运行在客户端-服务器模型上。您的 Web 服务器（例如 Nginx、Apache）与 Django-uwsgi “工作”进程通信以提供动态内容。\n\n\
    - mod_wsgi 是一个实现 WSGI 规范的 Apache 模块。mod_wsgi 是一个用于基于 Python 的主机（任何 Python2）的 Apache\
    \ HTTP 服务器模块。它是 mod_python、FastCGI 解决方案的替代品。\n\n基本文件结构：\n\n```\nWSGIScriptAlias\
    \ / /path/to/mysite.com/mysite/wsgi.py\nWSGIPythonHome /path/to/venv\nWSGIPythonPath\
    \ /path/to/mysite.com\n<Directory /path/to/mysite.com/mysite>\n<Files wsgi.py>\n\
    Require all granted\n</Files>\n</Directory>\n```\n\nCherryPy 是一个纯 Python Web 服务器，同时也作为\
    \ WSGI 服务器运行。它内置了会话、静态文件、Cookie、文件上传、缓存、编码、授权、压缩等众多工具。\n\n以下是一些兼容 WSGI 的 Web 框架：\n\
    \n- Django\n- Flask\n- Pyramid\n- web2py\n\n配置设置模块：当 WSGI 服务器加载您的应用程序时，Django\
    \ 需要导入设置模块。Django 使用 DJANGO_SETTINGS_MODULE 环境变量来定位，例如：\n\n- os.environ[\"DJANGO_SETTINGS_MODULE\"\
    ] = \"my site.settings\"\n\n应用 WSGI 中间件：WSGI 中间件组件是一个 Python 可调用对象。\n\n## ASGI\n\
    \nASGI 是新的、对异步友好的标准，它将允许您的 Django 网站使用异步 Python 功能和异步 Django 功能（随着它们的发展）。异步服务器网关接口（ASGI）是扩展\
    \ WSGI（Web 服务器网关接口）能力的规范。此应用程序是一个可调用对象，它接受一个作用域并返回一个协程可调用对象，该协程可调用对象接收和发送方法。它通常写成一个类：\n\
    \n```\nclass Application:\n    def __init__(self, scope):\n    async def __call__(self,\
    \ receive, send):\n```\n\n作用域保存连接的属性。它有两个接口：在异步语法方法中，我们有 __call__ 方法，这使其成为与其他任务切换器的实际切换点，并允许其他代码（异步代码）与该执行上下文一起使用。\n\
    \n第二个接口接收和发送参数，服务器与应用程序之间的消息传递通过这些参数进行。可用的 receive 以字典形式提供事件，可用的 send 提供了一种发送回数据和事件的方式。\n\
    \n## AWS？\n\nAWS 的全称是 Amazon Web Services。它为 Amazon 提供了一个更灵活、可靠、可扩展、易于使用且经济高效的云计算解决方案平台。该平台为您提供了桌面即服务（DaaS）、平台即服务（PaaS）和软件即服务（SaaS）的组合。它是目前最全面、应用最广泛的云平台。\n\
    \n## 什么是云计算？\n\n云计算意味着通过互联网存储、访问数据和程序。它是一种基于应用的软件基础设施，将数据存储在小型服务器上，并通过互联网进行访问。\n\
    \n## 云的类型\n\n云有三种类型：\n\n1. **公有云**：在这种云中，第三方服务提供商通过互联网向其客户提供所有资源和服务。\n2. **私有云**：私有云与公有云具有几乎相同的特性，但所有组织都管理所有资源。主要关注的工作是基础设施。\n\
    3. **混合云**：混合云是私有云和公有云的组合。其策略为您的业务提供了更大的灵活性。它帮助组织将本地工作负载复制并备份到云服务器上。\n\n## 云服务模型\n\
    \n- **IaaS**：代表基础设施即服务。它为用户提供按需处理、存储和网络连接的能力。\n- **PaaS**：代表平台即服务。这将提供数据库、队列、工作流和引擎等服务，这些服务拥有资源，可以更专注于其应用程序的功能。"
