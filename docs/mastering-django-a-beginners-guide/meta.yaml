    forms.Form vs forms.ModelForm


    Two forms are created from forms. In ModelForm, we have to declare which model
    will be used to create our form.


    First, we have to import Django forms (from Django import forms) and our ModelName
    model (from .models import ModelName ). ModelNameForm, as you probably suspect,
    is the name of our custom form. It is necessary to tell Django that this form
    is a ModelForm – form. ModelForm is responsible for that. Next, we have class
    Meta (Meta provides you the information about the data) that tells Django which
    model should be used to create this form (model = ModelName ). Finally, we add
    some fields in it like title and text.


    ‘Form’ refers to HTML <form> or Django form that provides structure to the form
    we can use it by import anywhere in any file. Every website has at least one form
    in it with which the user can interact.


    The form has two essential state attributes:


    +   1. **is_bound**: It will return False, and then it is an unbound state of
    form, that is, a new form with empty or default field values. If true, the form
    is bound; that is, at least one field has been set with user input.

    2. **is_valid()**: If this returns true, every field in the bound form has valid
    data. If false, there was some invalid data in at least one field, or the form
    was not bound.


    The Django Form Class


    Form class describes a form that defines how it works and appears. For example,
    a ModelForm links a model class’ fields to the HTML form <input> elements via
    a FormIt, which is represented to a user in the browser as an HTML ‘widget’.


