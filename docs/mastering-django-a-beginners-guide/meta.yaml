- md: "## CHAPTER 13\nComparative Study between Django, Flask, Node.Js, and Spring\
    \ Boot\n\n### IN THIS CHAPTER\n\n- Introduction about frameworks\n- Comparison\
    \ with Flask\n- Comparison with Node.Js\n- Comparison with Spring Boot\n\nHere\
    \ you will learn the difference between the most popular and in-demand Python-based\
    \ frameworks.\nPython is an advanced programming language used in data science,\
    \ developing websites and software, automating tasks, building control and management,\
    \ and testing. Many non-programmers have adopted it for everyday tasks. There\
    \ are many Python frameworks.\nIts frameworks offer well-defined structures for\
    \ app development. They can automate and carry through some standard solutions.\n\
    \n### TYPES OF PYTHON FRAMEWORK\n\nPython frameworks are categorized into various\
    \ types:\n\n1. **Full Stack Framework**: Also known as enterprise framework, it\
    \ is one of the best solutions for all development needs. It is a person who can\
    \ quickly develop both client and server-side software. These have built-in libraries\
    \ to work smoothly and continuously. They hold up the development of databases,\
    \ frontend interfaces, and backend services. The Full Stack developer can handle\
    \ all the benefits.\n2. **Micro Framework**: These frameworks are lightweight,\
    \ minimalist web applications that limit functionalities and features. They are\
    \ required for just building an application. They lack additional functionality\
    \ like control database stuff, authentication, validation, and backend services.\n\
    \nLet's have a look at the difference between the Python frameworks.\n\n### WHAT\
    \ IS FLASK?\n\nIt is an API of Python that allows us to build up web applications.\
    \ Armin Ronacher developed it, and it is easier to learn because it has less code\
    \ to implement. A Web Application Framework is the collection of modules and libraries\
    \ that helps the developer to write applications. It is based on the WSGI (Web\
    \ Server Gateway Interface) toolkit and Jinja2 templates.\n\nComparison of Flask\
    \ with Django.\n\nLet’s have a look at how they compare to Django:\n\n1. Django\
    \ is a full-stack web framework that enables ready-to-use with its batteries-included\
    \ approach. Flask is a lightweight micro-framework that gives abundant features\
    \ without eternal libraries and minimalist elements.\n2. Django provides its own\
    \ Django ORM (object-relational-mapper) and uses data models, while Flask doesn't\
    \ have any data model. Django bundles everything, whereas Flask is more modular.\n\
    3. Django has a massive number of built packages, whereas Flask has minimalistic\
    \ packages.\n4. The admin interface is what makes Django a capable web system,\
    \ whereas this is not true for Flask.\n5. Django is convenient for more significant\
    \ projects that need a lot of functionality. For simple projects, the features\
    \ can be consuming more space.\n6. Django needs two more lines of code than Flask,\
    \ where Flask applications require much fewer lines of code for simple tasks.\n\
    7. The Django tools are built-in tools with which developers can build a web application\
    \ without external. Admin features are not as well-known as in Django.\n8. Django\
    \ has a vast and active developer community. Whenever you have any questions about\
    \ any topic, you can ask them on various platforms like web portals, where Flask\
    \ has not the big community as Django.\n9. Django can easily protect its application\
    \ from these issues.\n    * Cross-site scripting (XSS): It enables an attacker\
    \ to inject the client-side scripts into browsers. Django protects its application\
    \ from these attacks.\n    * Cross-site request forgery (CSRF): CSRF attacks allow\
    \ the invalid user to execute their action using another user's credentials.\n\
    \    * SQL injection: It is an attack where the user can execute the SQL code\
    \ on a database.\nWhere Flask library provides the same, Django also prevents\
    \ the data from significant loss and other web attacks.\n10. Django separates\
    \ the routes from the function, where Flask uses decorators on the function to\
    \ set routes.\n11. Django has so many third-party libraries and packages. That's\
    \ why it is not easy to learn whereas Flask has none these features. It is easy\
    \ to understand.\n\n| Basic Comparison | Django | Flask |\n| :--- | :--- | :---\
    \ |\n| Structure | It is a Python-based free, open-source framework that follows\
    \ the MTV structure pattern because the controller is handled by the framework\
    \ itself. Some of the functionality is done by models, templates, and views. It\
    \ is considered a Full Stack Framework | It is a Python-based micro-framework\
    \ for any set of particular tools or external libraries. It also doesn't have\
    \ a database layer or provisions for form validation and makes use of extensions\
    \ |\n| Features | - ORM (object-relational-mapper)<br>- View – web templating<br>-\
    \ Model – relational<br>- Caching<br>- Inheritance<br>- Controller – regex-based\
    \ URL dispatcher<br>- Middleware classes support<br>- Internationalization<br>-\
    \ Unit-testing framework<br>- Authentication<br>- Admin interface<br>- Atom and\
    \ RSS syndication feeds<br>- Google's sitemaps<br>- Framework for GIS applications<br>-\
    \ Extensibility<br>- Server arrangements | Development server<br>Development debugger<br>Inbuilt\
    \ support for unit<br>Jinja2 templates<br>RESTful request dispatch<br>Support\
    \ for secure cookies<br>Full WSGI complaint Extensive Documentation<br>High flexibility<br>Easily\
    \ deployable in production<br>ORM – agnostic |\n| Project Layout | Conventional\
    \ project structure | Arbitrary structure |\n| Sites using these frameworks |\
    \ Public Broadcasting Service, Mozilla, Instagram, Nextdoor | Pinterest, LinkedIn,\
    \ Flask community |\n| Flexibility | It doesn't exclude setting flexibility |\
    \ It is believed that all possible permutations that organize a Flask code equal\
    \ the application number present in the Flask already |\n| Routing | Url.py is\
    \ used to set the connection properties, and the request is tackled by the first\
    \ matching view of the regex list | URL is most frequently used than not set by\
    \ the view decorator, and centralized configuration is also possible |\n| Advantages\
    \ | Lots of batteries<br>Huge third party<br>Functional admin panel<br>Versioning<br>Browsable\
    \ API<br>Descriptive and elaborative | Speed<br>Support for NoSQL<br>Minimal complexity<br>No\
    \ ORM, easily connected with extensions |\n| Templates | It helps you to utilize\
    \ the View web templating | Uses a Ninja2 templates design |\n| Working style\
    \ | It offers a diversified working style | It offers a monolithic working style\
    \ |\n| URL dispatcher | Based on controller-regex | Based on RESTful request |\n\
    | HTML features | Offers HTML | Does not offer HTML |\n| Visual Debug | No support\
    \ for Visual Debug | Support for Visual Debug |\n| Third-party application | Support\
    \ for third-party application | Does not support third-party application |\n|\
    \ API | Does not support | Support AAI |\n| Databases | Doesn't support multiple\
    \ databases | Support multiple databases |\n\n### DJANGO VS NODE.JS\n\n### What\
    \ Is Node.js?\n\nIt is an open-source and cross-platform runtime environment for\
    \ executing JavaScript code. Node.js is not a framework, and it’s not a programming\
    \ language. Node.js for building backend services such as like APIs and Mobile\
    \ App. It is used by large production companies such as PayPal, Uber, and Walmart.\n\
    \nNode.js with Django."
  mdcn: "## 第13章\nDjango、Flask、Node.Js与Spring Boot的比较研究\n\n### 本章内容\n\n- 框架简介\n- 与Flask的比较\n\
    - 与Node.Js的比较\n- 与Spring Boot的比较\n\n在这里，你将了解最受欢迎且需求量最大的基于Python的框架之间的区别。\nPython是一种高级编程语言，广泛应用于数据科学、网站和软件开发、任务自动化、控制与管理构建以及测试。许多非程序员也已将其用于日常任务。Python拥有众多框架。\n\
    其框架为应用开发提供了明确的结构。它们可以自动化并执行一些标准解决方案。\n\n### PYTHON框架的类型\n\nPython框架分为多种类型：\n\n\
    1.  **全栈框架**：也称为企业框架，是满足所有开发需求的最佳解决方案之一。它能够快速开发客户端和服务器端软件。这些框架拥有内置库，可平稳、持续地运行。它们支持数据库、前端界面和后端服务的开发。全栈开发者可以处理所有这些优势。\n\
    2.  **微框架**：这些框架是轻量级、极简的Web应用程序，功能和特性有限。它们仅用于构建应用程序。它们缺乏额外的功能，如控制数据库、身份验证、验证和后端服务。\n\
    \n让我们来看看Python框架之间的区别。\n\n### 什么是FLASK？\n\n它是一个Python API，允许我们构建Web应用程序。由Armin\
    \ Ronacher开发，由于代码量少，更容易学习。Web应用程序框架是帮助开发者编写应用程序的模块和库的集合。它基于WSGI（Web服务器网关接口）工具包和Jinja2模板。\n\
    \nFlask与Django的比较。\n\n让我们看看它们与Django的比较：\n\n1.  Django是一个全栈Web框架，通过其“自带电池”的方法提供开箱即用的功能。Flask是一个轻量级的微框架，无需外部库和极简元素即可提供丰富的功能。\n\
    2.  Django提供自己的Django ORM（对象关系映射器）并使用数据模型，而Flask没有任何数据模型。Django捆绑了所有东西，而Flask更具模块化。\n\
    3.  Django拥有大量的内置包，而Flask的包则非常精简。\n4.  管理界面是Django成为一个强大Web系统的关键，而Flask则不然。\n\
    5.  Django适用于需要大量功能的大型项目。对于简单项目，这些功能可能会占用更多空间。\n6.  Django比Flask需要多两行代码，而Flask应用程序在简单任务上所需的代码行数要少得多。\n\
    7.  Django工具是内置工具，开发者无需外部工具即可构建Web应用程序。Flask的管理功能不如Django知名。\n8.  Django拥有庞大且活跃的开发者社区。无论你对任何主题有任何问题，都可以在各种平台（如Web门户）上提问，而Flask的社区不如Django庞大。\n\
    9.  Django可以轻松保护其应用程序免受以下问题的影响：\n    *   跨站脚本攻击（XSS）：它允许攻击者将客户端脚本注入浏览器。Django保护其应用程序免受此类攻击。\n\
    \    *   跨站请求伪造（CSRF）：CSRF攻击允许非法用户使用其他用户的凭据执行操作。\n    *   SQL注入：这是一种用户可以在数据库上执行SQL代码的攻击。\n\
    \    Flask库也提供相同的功能，Django还能防止数据重大损失和其他Web攻击。\n10. Django将路由与函数分离，而Flask使用函数上的装饰器来设置路由。\n\
    11. Django拥有众多的第三方库和包。这就是为什么它不容易学习，而Flask没有这些特性。它易于理解。\n\n| 基本比较 | Django | Flask\
    \ |\n| :--- | :--- | :--- |\n| 结构 | 它是一个基于Python的免费、开源框架，遵循MTV结构模式，因为控制器由框架本身处理。部分功能由模型、模板和视图完成。它被认为是一个全栈框架\
    \ | 它是一个基于Python的微框架，用于任何特定的工具集或外部库。它也没有数据库层或表单验证规定，并使用扩展 |\n| 特性 | - ORM（对象关系映射器）<br>-\
