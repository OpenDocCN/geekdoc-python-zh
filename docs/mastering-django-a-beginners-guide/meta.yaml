  md: '# Mastering Computer Science Series Preface


    The *Mastering Computer Science* covers a wide range of topics, spanning programming
    languages as well as modern-day technologies and frameworks. The series has a
    special focus on beginner-level content, and is presented in an easy-to-understand
    manner, comprising:


    +   - Crystal-clear text, spanning various topics sorted by relevance

    - A special focus on practical exercises, with numerous code samples and programs

    - A guided approach to programming, with step-by-step tutorials for the absolute
    beginners

    - Keen emphasis on real-world utility of skills, thereby cutting the redundant
    and seldom-used concepts and focusing instead of industry-prevalent coding paradigm

    - A wide range of references and resources to help both beginner and intermediate-level
    developers gain the most out of the books


    The *Mastering Computer Science* series of books start from the core concepts,
    and then quickly move on to industry-standard coding practices, to help learners
    gain efficient and crucial skills in as little time as possible. The books assume
    no prior knowledge of coding, so even the absolute newbie coders can benefit from
    this series.


    The *Mastering Computer Science* series is edited by Sufyan bin Uzayr, a writer
    and educator with more than a decade of experience in the computing field.'
