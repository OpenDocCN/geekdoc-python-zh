    # AWS SERVICES


    It (Amazon Web services) offers a wide range of business, primarily cloud-based
    products. The products must include storage, database, analytics, network, various
    development tools, and many more. Now, let’s talk about the AWS Compute Services
    provided by Amazon.


    It has been a building block for those organizations as they are used for creating
    and developing any Application over the cloud. Various domains of Amazon Web Services
    are Compute, Storage, Database, Migration, Network, Content Delivery, Management
    Tools, and Security and Identity Compliance.


    There are various best services offered by AWS:


    +   1. **Amazon Elastic Cloud Compute (EC2)**: It provides services that assist
    compute workloads, and its web interface is used to reduce the expensive physical
    servers by creating virtual machines. Amazon EC2 is preferable while creating
    a virtual server within a few minutes with just a few clicks according to the
    user’s operating system. This helps a lot to focus more on the project rather
    than the server maintenance.

    2. **Amazon S3 (Simple Storage Service)**: This domain provides data storage over
    internet services. It stores the data with high security because of its improved
    infrastructure. The information is distributed over different regions and has
    high-quality integration. It blocks the data from getting lost and helps retrieve
    stored time and space data via the internet.

    3. **Amazon Virtual Private Cloud (VPC)**: It falls under the networking domain
    of AWS used to isolate the network infrastructure of one’s computer. It holds
    a unique virtual network that protects the information from others and makes the
    user information risk-free in the cloud.

    4. **Amazon Cloud Front**: It represents the delivery domain that is used to deliver
    the content with good speed and reduce latency. It effectively manages all the
    user content via the Global Content Delivery Services.'
