  md: '# Filtering the Records


    The QuerySet return by all() describes all records in the database. But sometimes
    we want to select only limited information from the database, which can be done
    by adding the filter conditions.


    ```

    data_filter = Student.objects.filter(name="Sam")

    ```


    # Using exclude() Method


    It returns a new QuerySet that does not match with the given parameter.


    ```

    data_filter = Student.objects.exclude(''name="Sam"'')

    #OUTPUT

    [ <Student: Jam> ]

    ```


    # Ordering Data


    As you play around with the previous example, you might discover that they are
    being returned in seemingly random order. Sometimes you want the result in order
    like alphabets, series of numbers, etc., we use the order_by() method.


    ```

    # Ascending order

    ModelName.objects.all().filter(client=id).order_by(''number'')

    # Descending order

    ModelName.objects.all().filter(client=id).order_by(''-number'')

    # Earliest

    ModelName.objects.all().filter(client=id).earliest(''number'')

    # Latest

    ModelName.objects.all().filter(client=id).latest(''-number'')

    ```


