    \ 'myapp.views.hours'),\n    (r'^tag/(\\w+)/$', 'blog.views.tag'),\n)\n```\n\n\
    新方法如下：\n\n```python\nfrom django.conf.urls.defaults import *\npatterns = patterns('mysite.views',\n\
    \    (r'^time/$', 'hello'),\n    (r'^time/$', 'current_datetime'),\n    (r'^time/plus/(\\\
    d{1,2})/$', 'hours'),\n)\nurlpatterns += patterns('blog.views',\n    (r'^tag/(\\\
    w+)/$', 'tag'),\n)\n```\n\n该框架只关心是否存在一个名为 `urlpatterns` 的模块级变量。如本例所示，该变量可以动态创建。值得注意的是，`patterns()`\
    \ 提供的对象可以连接在一起，这可能是你意想不到的。\n\n## Using Named Groups\n\n到目前为止，在我们所有的 URLconf 示例中，我们都使用了简单的、非命名的正则表达式组——也就是说，我们在希望捕获的\
    \ URL 部分周围放置括号，Django 将捕获的文本作为位置参数提供给视图函数。在更高级的用法中，可以利用命名的正则表达式组来捕获 URL 部分，并将它们作为关键字参数传递给视图。\n\
    \n## Keyword Arguments vs. Positional Arguments\n\n可以使用关键字参数或位置参数来调用 Python 函数，在某些情况下也可以同时使用两者。在关键字参数调用中，你定义参数的名称以及你发送的值。在位置参数调用中，你只发送参数而不说明哪个参数对应哪个值；这种关系是由参数的顺序隐含的。\n\
    \n## Passing Extra Options to View Functions\n\n有时你会发现视图函数非常相似：\n\n```python\n\
    # urls.py\nfrom django.conf.urls.defaults import *\nfrom mysite import views\n\
    urlpatterns = patterns('',\n    (r'^foo/$', views.foo_view),\n    (r'^bar/$',\
    \ views.bar_view),\n)\n\nfrom django.shortcuts import render\nfrom mysite.models\
    \ import MyModelName\n```\n\n```python\ndef foo_view(request):\n    m_list = MyModelName.objects.filter(is_new=True)\n\
    \    return render(request, 'template1.html', {'m_list': list})\ndef bar_view(request):\n\
    \    m_list = MyModelName.objects.filter(is_new=True)\n    return render(request,\
    \ 'template2.html', {'m_list': m_list})\n```\n\n## CHAPTER SUMMARY\n\n在本章中，我们详细介绍了\
    \ Django 的视图，从 Django 视图的基础知识开始，以及视图如何与模型、模板和项目的其余部分交互。为了帮助你在初学者水平上理解视图，我们向你展示了它们如何使用简单的\
    \ HTML 响应工作。在下一章中，我们将介绍 Django 模板的基础知识。\n\n# CHAPTER 6\n\n## Django’s Templates\n\
    \n### IN THIS CHAPTER\n\n-   了解 Django 的模板\n-   模板引擎 Jinja\n-   加载器\n-   静态文件\n\
    \n在上一章中，我们学习了 Django 的模型及其实现、语法、模型包、主要管理界面以及存储数据的数据库类型。在本章中，我们将讨论如何使用模板在你的 Django\
    \ 项目中渲染数据。我们将学习像 Jinja2 这样的模板引擎、模板继承、一些内置的 Python 函数；所有这些都有适当的解释。现在是时候深入探讨了。\n\
    \n## BASICS OF TEMPLATE\n\nDjango 中的模板是缩进的文本字符串，用于将文档的表示与其数据分开。正是模板定义了占位符和各种基本逻辑片段，这些逻辑控制着文档应如何显示。模板用于显示\
    \ HTML，但 Django 模板同样能够处理基于文本格式的数据。让我们回顾一个简单的模板示例。作为一个 Web 框架，Django 需要一种方便的方法来动态生成\
    \ HTML。最常见的方法依赖于模板。\n\n一个 Django 项目可以使用一个或多个模板。Django 有自己的内置模板系统后端；它被称为 Django\
    \ 模板语言（DTL），一个流行的替代方案是 Jinja2。其他模板语言的后端可以从第三方获得。我们也可以编写自定义后端。首先，我们将简要讨论 Jinja\
    \ 模板。\n\n## JINJA\n\nJinja 通常也被称为“Jinja2”。这个 Python 模板引擎用于创建 HTML、XML 或其他标记格式，这些格式通过\
    \ HTTP 响应返回给用户。它是一个快速、富有表现力、可扩展的模板引擎。这些模板允许编写类似于 Python 语法的代码。然后将数据传递给此模板以渲染最终文档。\n\
    \n**Why Is Jinja2 Useful?**\n它具有一致的模板标签语法，并且该项目已被其他代码库干净地提取为独立的开源项目。\n\n**Origin\
    \ of Jinja2?**\n它并不是唯一存在的模板引擎。Django 的内置模板引擎启发了 Jinja2 的语法。许多模板系统，例如 JavaServer\
    \ Pages（JSP），在 Jinja 之前很多年就出现了。在开始使用 Jinja2 之前，你应该了解它的基础知识。它建立在其他模板引擎的概念之上，如今被\
    \ Python 社区和开发者广泛使用。\n\n## API\n\n这将定义 Jinja 的 API，而不是模板语言。让我们谈谈它的基础知识。它使用一个称为模板的对象。类实例用于存储全局内容，并用于从文件系统或其他位置加载模板。配置\
    \ Jinja 最简单的方法是加载模板。\n\n```python\nfrom jinja2 import Environment, PackageLoader,\
    \ select_autoescape\nenv = Environment(\n    loader=PackageLoader(\"Your_app_name\"\
    ),\n    autoescape=select_autoescape()\n)\n```\n\n这将创建一个模板环境，其中包含一个加载器，该加载器在‘Your_app_name’\
    \ Python 包内的 templates 文件夹（或 Your_app_name.py Python 模块旁边）中查找模板。它还为 HTML 文件启用了自动转义。出于安全原因，它可能默认允许自动运行。\n\
    \n## Why do we need Jinja2?\n\n1.  它为测试行为未知且必须调查的程序提供了一个受保护的框架。\n2.  它具有强大的自动\
    \ HTML 转义功能，有助于防止网站遭受跨站脚本攻击（XSS Attack）。\n3.  模板中有像 `>`、`<`、`&` 等具有特殊含义的特殊字符。\n\
    4.  它有一个最重要的特性，可以扩展你的项目，那就是模板继承。\n5.  它包含可扩展的过滤器、测试、函数和更清晰的语法。\n6.  它使调试更容易。\n\
    7.  这些被编译为即时优化的 Python 代码。\n8.  使用 Babel 支持 I18N。\n9.  在模板中定义和导入宏。\n\n## Installation\n\
    \n如果你想在你的系统中安装 Jinja，你需要 Python 3.6 和更新版本的 Python。在终端中运行以下命令：\n\n```bash\npip\
    \ install Jinja2\n# another way to add Jinja to your project\npip install jinja2\n\
    easy_install jinja2\n```\n\n## Dependencies\n\n安装 Jinja 时，这些将自动安装。\n\n-   **Markup\
    \ Safe**：在渲染模板时转义不受信任的内容，以避免恶意攻击。\n-   **Babel**：在 Jinja 模板中提供翻译支持。"
