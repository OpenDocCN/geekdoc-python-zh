    # Customization of Heading in Admin Panel


    Add this line of code in your admin.py:


    ```

    admin.site.site_header = "Django Practise"

    ```


    # Django Admin Custom Page Layout, Data, and Behaviors


    There are multiple ways to customize the design, data, and behaviors of Django
    admin pages. You can customize specific global values used across all Django admin
    pages without the need to modify any Django template. There are a number declarations
    on the admin. site object that is part of the Django.contrib package:


    +   1. **admin.site.site_header**: It defines the title used beyond all Django
    admin pages (e.g., in the navy blue header and login page)

    2. **admin.site.site_title**: It defines the title used. It defines all Django
    admin pages as part of the HTML title.

    3. **admin.site.site_url**: It defines the domain (e.g., coffeehouse.com) to be
    used as part of the Django admin ‘View site’ link to access the live site from
    the Django admin easily.

    4. **admin.site.index_title**: It defines the title of the main Django admin page.

    5. **admin.empty_value_display**: It defines the default value to display when
    a Django admin model value is empty.'
