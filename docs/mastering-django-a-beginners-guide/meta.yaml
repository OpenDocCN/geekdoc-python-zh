- md: "## Load in the Crispy Form Tags\n\nThe crispy form tags code will allow you\
    \ to call the crispy form filters in the form below.\n\n```\n{% load crispy_forms_tags\
    \ %}\n<h1>This Is My Crispy Form:</h1>\n{% crispy form %}\n```\n\n```\n<html>\n\
    \  <head>\n    <!-- here adds meta tags -->\n    <meta charset=\"utf-8\">\n  \
    \  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n\
    \    <!--Bootstrap CSS-->\n    <link href=\"https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css\"\
    \ rel=\"stylesheet\" integrity=\"sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh\"\
    \ crossorigin=\"anonymous\">\n  </head>\n  <body>\n    {% load crispy_forms_tags\
    \ %}\n    <!--Contact form-->\n    ...\n    <!-- Optional Javascript -->\n   \
    \ <script src=\"https://code.jquery.com/jquery-3.4.1.slim.min.js\" integrity=\"\
    sha384-J6qa4849blE2+poT4WxyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n\" crossorigin=\"\
    anonymous\"></script>\n    <script src=\"https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js\"\
    \ integrity=\"sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo\"\
    \ crossorigin=\"anonymous\"></script>\n    <script src=\"https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js\"\
    \ integrity=\"sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfkTj0Uod8GCExl3Og8ifwB6\"\
    \ crossorigin=\"anonymous\"></script>\n  </body>\n</html>\n```\n\n## Using the\
    \ Django as_crispy_field Form Filter\n\nUse the format `{{form.name_of_field|as_crispy_field}}`.\
    \ That way, you can change the order in which the form fields display.\n\n```\n\
    <div>\n    <h1>Contact</h1>\n    <form method=\"post\">\n        {% csrf_token\
    \ %}\n        {{form.first_name|as_crispy_field}}\n        {{form.last_name|as_crispy_field}}\n\
    \        <button type=\"submit\">Submit</button>\n    </form>\n</div>\n```\n\n\
    ## WHAT TO DO WHEN THE CRISPY FORM IS NOT WORKING?\n\n- Check that the installed\
    \ package is named correctly.\n- Make sure to add the `crispy_template_pack` to\
    \ the settings.\n- Be sure to load `crispy_forms_tags` at the top of the HTML\
    \ template.\n- The form filter used needs to either be `|crispy` or `|as_crispy_field`.\n\
    \n## Template Packs\n\nDjango-crispy-forms: It has a built-in application that\
    \ helps to manage forms in Django and it supports different CSS frameworks like\
    \ Bootstrap, known as template packs within the Django-crispy-forms:\n\n- Bootstrap\
    \ is crispy-forms' default template pack, version 2 of the simple and flexible\
    \ HTML, CSS, and JavaScript for user interfaces bootstrap3.\n- Support for Twitter\
    \ Bootstrap version 4.\n- Uni-form is a nice-looking, well-structured, highly\
    \ customizable, accessible, and usable form.\n- This template pack is available\
    \ through crispy-forms-foundation.\n- Tailwind a utility first framework. This\
    \ template pack is available through crispy-tailwind.\n\nThe crispy forms do not\
    \ include static files like css and JavaScript. You will need to include the proper\
    \ static and media files yourself, depending on what CSS framework (Template pack)\
    \ you are using.\n\n## How to Style Django Forms with Bootstrap\n\nRendering a\
    \ Django form with a Bootstrap requires you to `pip install bootstrap4` or add\
    \ the Bootstrap CDN and JavaScript to the file.\n\n```\n<!DOCTYPE html>\n<html>\n\
    <head>\n    <!-- Required meta tags -->\n    <meta charset=\"utf-8\">\n    <meta\
    \ name=\"viewport\" content=\"width=device-width, initial-scale=1, shrink-to-fit=no\"\
    >\n\n    <!-- Bootstrap CSS -->\n    <link rel=\"stylesheet\" href=\"https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css\"\
    \ integrity=\"sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk\"\
    \ crossorigin=\"anonymous\">\n\n</head>\n<body>\n    <div class=\"container\"\
    >\n        <div class=\"row justify-content-center\">\n            <div class=\"\
    col-8\">\n                <h1 class=\"mt-2\">Django People</h1>\n            \
    \    <hr class=\"mt-0 mb-4\">\n                {% block content %}\n         \
    \       {% endblock %}\n            </div>\n        </div>\n    </div>\n    <!--\
    \ Optional Javascript -->\n    <script src=\"https://code.jquery.com/jquery-3.4.1.slim.min.js\"\
    \ integrity=\"sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n\"\
    \ crossorigin=\"anonymous\"></script>\n    <script src=\"https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js\"\
    \ integrity=\"sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo\"\
    \ crossorigin=\"anonymous\"></script>\n    <script src=\"https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js\"\
    \ integrity=\"sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6\"\
    \ crossorigin=\"anonymous\"></script>\n</body>\n</html>\n```\n\n## Form Helpers\n\
    \nThe Django-crispy-forms app has a special class named `FormHelper` to make your\
    \ life easier and give you enough power over how you want to render your forms.\n\
    \n## Django UserCreationForm\n\nThe `UserCreationForm` is used to create a new\
    \ user with built-in fields. Note that the user-created using \"UserCreationForm\"\
    \ doesn’t have email fields, so you can add it by adding more code of lines. It\
    \ consists of the following primary attributes:\n\n- username\n- password\n- first_name\n\
    - last_name\n\n## Implement Django UserCreationForm\n\nTo use the `UserCreationForm`,\
    \ we need to import it from `django.contrib.auth.forms`.\n\n```\nfrom django.contrib.auth.forms\
    \ import UserCreationForm\n```\n\nExample of `UserCreationForm`:\n\n**form.py**\n\
    \n```\nfrom django.shortcuts import render\nfrom django.contrib.auth.forms import\
    \ UserCreationForm\n# Create your views here.\ndef register(request):\n    if\
    \ request.POST == 'POST':\n        form = UserCreationForm()\n        if form.is_valid():\n\
    \            form.save()\n            messages.success(request, 'Account created\
    \ successfully')\n    else:\n        form = UserCreationForm()\n    context =\
    \ {\n        'form':form\n    }\n    return render(request, 'register.html', context)\n\
    ```\n\n**register.html:**\n\n```\n<div class = \"register\">\n    {% if messages\
    \ %}\n        <ul>\n            {% for message in messages %}\n              \
    \  <li>{{ message }}</li>\n            {% endfor %}\n        </ul>\n    {% endif\
    \ %}\n    <form method=\"post\" >\n        {% csrf_token %}\n        <table>\n\
    \            {{ form.as_table }}\n            <tr>\n                <td></td>\n\
    \                <td><input type=\"submit\" name=\"submit\" value=\"Register\"\
    \ /></td>\n            </tr>\n        </table>\n    </form>\n</div>\n```\n\n**view.py:**\n\
    \n```\nfrom django.urls import path\nfrom .views import *\nurlpatterns = [\n \
    \   path('register', register, name = 'register')\n]\n```\n\nAfter doing all the\
    \ code, you just need to run the server and open this link in the browser, i.e.,\
    \ http://127.0.0.1:8000/register.\n\n## THE REASON WHY WE USE SELF.CLEANED_DATA\n\
    \nData is passed as a string to the server, and even the browser gets everything\
    \ as a string. When Django cleans the data, it automatically converts data to\
    \ the appropriate type.\n\n- `name = form.cleaned_data['name']`\n\n## Understanding\
    \ Args and Kwargs in Python\n\nHere, I will teach you what args and kwargs are,\
    \ and how to use them.\n\n## What Are Args?\n\n1. `*args` are used to pass non-keyword\
    \ arguments. Examples of non-keyword arguments are `fun(12,14)`, `fun(\"value1\"\
    ,\"value2\")`.\n2. `*args` are usually used to prevent the program from crashing.\
    \ If we do not know, numerous parameters will be passed to the function. This\
    \ is used in other programming languages.\n\nIt makes it easy to use any number\
    \ of arguments without having to change your code. It provides more flexibility\
    \ to your code since you can have as many arguments as you wish in the future.\n\
    \nExample:\n\n```\ndef func(*args):\n    for arg in args:\n        print(arg)\n\
    func(11,22,33,\"Django\",\"Python\")\nlist = [11,22,33,\"Django\",\"Python\"]\n\
    func(list)\n```\n\n```\n#OUTPUT\n11\n22\n33\nDjango\nPython\n#List\n[11, 22, 33,\
    \ 'Django', 'Python']\n```\n\n## What Are Kwargs?\n\n`**kwargs` is a dictionary\
    \ of keyword arguments. The double asterisk (`**`) symbol allows us to pass any\
    \ number of arguments. A keyword argument is usually a dictionary.\nHere an example\
    \ of a keyword argument is `fun(a=1,b=17)`.\n`**kwargs` are similar to `*args`,\
    \ except you declare the variables and the amount within the same function arguments.\n\
    \n## Use of Args and Kwargs\n\nArgs and kwargs are handy when you need to:\n\n\
    - Pass multiple arguments in functions\n- Reduce code writing\n- Make your code\
    \ more readable\n- Reuse the piece of code\n\n## Using Both Args and Kwargs in\
    \ a Function\n\nWhen using both args and kwargs in the same function definition,\
    \ `*args` must occur before `**kwargs`.\n\n```\ndef __init__(self, *args, **kwargs):\n\
    ```\n\n## CHAPTER SUMMARY\n\nIn this chapter, we covered HTML forms: how they\
    \ work and their syntax. We also looked at implementing crispy forms with `csrf_token`,\
    \ widgets and attributes in Django forms. We also learned about `UserCreationForm`.\
    \ In the next chapter, we will learn about advanced models."
  mdcn: "## 加载 Crispy 表单标签\n\nCrispy 表单标签代码将允许你在下面的表单中调用 crispy 表单过滤器。\n\n```\n{%\
    \ load crispy_forms_tags %}\n<h1>This Is My Crispy Form:</h1>\n{% crispy form\
