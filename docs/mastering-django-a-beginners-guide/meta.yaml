    >\n{{ q.option_one }}\n</label>\n</div>\n<div class=\"form-check\">\n<input type=\"\
    radio\" class=\"form-check-input\" name=\"{{ q.question }}\" id=\"gridRadio2\"\
    \ value=\"{{ q.option_two }}\">\n<label class=\"form-check-label\" for=\"gridRadios2\"\
    >\n{{ q.option_two }}\n</label>\n</div>\n<div class=\"form-check\">\n<input class=\"\
    form-check-input\" type=\"radio\" name=\"{{ q.question }}\" id=\"gridRadio3\"\
    \ value=\"{{ q.option_three }}\">\n<label class=\"form-check-label\" for=\"gridRadios3\"\
    >\n{{ q.option_three }}\n</label>\n</div>\n<div class=\"form-check\">\n<input\
    \ type=\"radio\" class=\"form-check-input\" name=\"{{ q.question }}\" id=\"gridRadio4\"\
    \ value=\"{{ q.option_four }}\">\n<label class=\"form-check-label\" for=\"gridRadios4\"\
    >\n{{ q.option_four }}\n</label>\n</div>\n<br>\n</div>\n{% endfor %}\n<br>\n<button\
    \ type=\"submit\" class=\"btn btn-primary\">Submit</button>\n</form>\n{% block\
    \ script %}\n<script>\nconsole.log('hello world')\n</script>\n{% endblock script\
    \ %}\n</div>\n{% endblock %}\n```\n\n## 主页\n\n主页包含应用程序根 URL 的代码，这意味着当有人访问该 URL\
    \ 时，第一个页面将是根 URL，即主页。在 `urls.py` 中，它看起来像 `path('', home, name='home')`。第一个空参数意味着您正在引用根\
    \ URL。`{% load static %}` 将帮助加载静态文件夹；静态文件夹包含 CSS、图像或其他文件。在 `<div>` 标签中，我使用了带有\
    \ `jumbotron` 的类属性。要开始使用 POST 方法，请在表单标签后添加 `{% csrf_token %}`，然后应用于表单输入，例如 `{%\
    \ for q in questions %}` 我们使用了 Jinja 模板表达式。`<div>` 标签具有 `form-group` 类，Bootstrap\
    \ 类 `<label>` 用于为文本添加标签。`{{ q.question }}` 是一个 Jinja 模板，通过它我们可以在浏览器上获取值。Jinja\
    \ 模板表达式不会显示在屏幕上。只有使用此 `{{ }}` 括号的文本才会显示。基本上，`q.question` 中的 `q` 是为循环提供的数据，而 `question`\
    \ 是模型的字段。这是从数据库获取值的方式。所有值都是以这种方式获取的。现在结束您打开的块。\n\n图 11.3 显示了主页。\n\n![](img/6b248a6900b90aa4ebb02bce8e067804_255_0.png)\n\
    \n图 11.3 主页。\n\n- templates > navbar.html\n\n```\n{% load static %}\n<style>\n\
    .greet{\n    font-size: 18px;\n    color: #fff;\n    margin-right: 20px;\n}\n\
    </style>\n<nav class=\"navbar navbar-expand-lg navbar-dark bg-dark\">\n    <button\
    \ type=\"button\" class=\"navbar-toggler\" data-toggle=\"collapse\" data-target=\"\
    #navbarNav\" aria-controls=\"navbarNav\" aria-expanded=\"false\" aria-label=\"\
    Toggle navigation\">\n<span class=\"navbar-toggler-icon\"></span>\n</button>\n\
    <div class=\"collapse navbar-collapse\" id=\"navbarNav\">\n    <ul class=\"navbar-nav\"\
    >\n        <li class=\"nav-item active\">\n            <a class=\"nav-link\" href=\"\
    {% url 'home' %}\">\n                Home </a>\n        </li>\n        <li class=\"\
    nav-item\">\n            <a class=\"nav-link\" href=\"{% url 'login' %}\">\n \
    \               Login </a>\n        </li>\n    </ul>\n</div>\n{% if user.is_authenticated\
    \ %}\n<span class=\"greet\"> Hello, {{ request.user }} </span>\n{% endif %}\n\
    <span><a class=\"greet\" href=\"{% url 'logout' %}\">\nLogout </a></span>\n</nav>\n\
    ```\n\n导航栏是添加在每个页面顶部的通用栏。您可以通过 `{% include 'navbar.html' %}` 添加此文件。它将自动添加到每个页面的顶部。它应该只有一个顶部。在此文件中，我们添加了\
    \ Bootstrap 导航栏，以便我们的文本看起来更好，并且我们可以轻松管理、添加内容。打开导航标签并在其中添加类属性。此导航栏是响应式的，这意味着当屏幕变小时，所有内容将被隐藏并显示在按钮后面。然后，当您点击该按钮时，所有导航栏选项将作为下拉菜单工作并显示。接下来，您在导航栏类中有一个按钮。其类型为按钮，`data-toggle`\
    \ 为折叠状态，并且提到了目标 ID，以便当屏幕较小时，按钮覆盖导航栏，同时点击按钮时，目标引用在所有情况下都相同的 ID，否则什么也不会发生。要运行整个代码，您应该添加名为"
