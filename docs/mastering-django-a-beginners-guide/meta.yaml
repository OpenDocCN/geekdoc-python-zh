    \ `get_list_display()` 方法。\n\n12. **ModelAdmin.get_urls()**：此 ModelAdmin 方法返回该\
    \ ModelAdmin 所使用的 URL，其方式与 URLconf 相同。\n\n13. **ModelAdmin.get_form(request, obj,\
    \ \\*\\*kwargs)**：它返回一个 ModelForm 类，该类在管理面板中用于添加和更改视图，具体使用方法参见 `add_view()` 和\
    \ `change_view()` 方法。\n\n基础实现是创建一个表单子类，并通过 `fields` 和 `exclude` 等属性进行修改。\n\n##\
    \ 管理面板的一些权限方法\n\n1. **ModelAdmin.has_view_permission(request, obj=None)**：如果允许查看\
    \ `obj`，则返回 True，否则返回 False。此类在 `obj` 为 None 时允许用户对模型进行只读访问，返回 True 或 False 以指示是否允许查看此类型的对象。\n\
    \n默认实现是：如果用户只有“view”权限，则返回 true。\n\n2. **ModelAdmin.has_add_permission(request)**：如果允许添加\
    \ `obj`，则返回 True，否则返回 False。此类允许用户对模型进行仅添加访问。\n\n默认实现是：如果用户只有“add”权限，则返回 true。\n\
    \n3. **ModelAdmin.has_change_permission(request, obj=None)**：如果允许更改，则返回 True，否则返回\
    \ False。此类允许用户对模型进行仅更改访问。\n\n默认实现是：如果用户只有“change”权限，则返回 true。\n\n4. **ModelAdmin.has_delete_permission(request,\
    \ obj=None)**：如果用户 `obj` 具有删除权限，则返回 True，否则返回 False。此类允许用户对模型进行仅删除访问。\n\n默认实现是：如果用户只有“delete”权限，则返回\
    \ true。\n\n5. **ModelAdmin.response_add(request, obj, post_url_continue=None)**：在管理表单提交给模型并创建对象之后调用。你可以重写此方法以更改对象创建后的默认行为。它用于添加新实例。\n\
    \n6. **ModelAdmin.response_change(request, obj)**：在管理表单提交并保存对象之后调用。它用于更改单个实例。\n\
    \n7. **ModelAdmin.response_delete(request, obj_display, obj_id)**：在对象被删除后调用。它用于删除单个实例。\n\
    \n**obj_display**：这是一个字符串，作为第一个参数，包含被删除对象的名称。\n\n**obj_id**：这是一个序列化标识符，作为第一个参数，用于检索要删除的对象。\n\
    \n8. **ModelAdmin.has_module_permission(request)**：如果允许在管理索引页面上显示模块并访问该模块的索引页面，则应返回\
    \ True，否则返回 False。默认使用 `User.has_module_perms()`。\n\n9. **ModelAdmin 资源（媒体和 CSS）**：ModelAdmin\
    \ 具有在管理面板中添加 CSS、JavaScript 和媒体的功能。\n\n```python\nfrom django.contrib import admin\n\
    \nclass CustomAdmin(admin.ModelAdmin):\n    class Media:\n        css = {\n  \
    \          'all': ('css/mymarkup.css',)\n        }\n        js = ('javascript/mymarkup.js',)\n\
    \nadmin.site.register(CustomAdmin)\n```\n\n## 如何在你的项目中添加 jQuery？\n\nDjango 允许我们在管理面板中使用\
    \ jQuery 库。\n如果你想在管理 JavaScript 中使用 jQuery 而不包含第二份副本，你可以使用 `Django.jQuery` 对象，并在变更列表上添加/编辑视图。此外，依赖于\
    \ `Django.jQuery` 的管理表单或小部件必须按如下方式指定：\n\n```python\nfrom django.contrib import\
    \ admin\n\nclass CustomAdmin(admin.ModelAdmin):\n    class Media:\n        css\
    \ = {\n            'all': ('css/mymarkup.css',)\n        }\n        js = ('admin/js/jquery.init.js',)\n\
    \nadmin.site.register(CustomAdmin)\n```\n\n**向管理添加自定义验证：** 此表单由字段组成。创建一个名为 `form.py`\
    \ 的不同文件，然后构建一个基本的表单结构，并在 `admin.py` 中导入它。\n`form.py` 如下所示：\n\n```python\nclass\
    \ CustomForm(forms.Form):\n    name = forms.CharField(label='Your name',\n   \
    \                        max_length=100)\n    age = forms.IntegerField(label='Your\
    \ Age')\n```\n\n这里，`admin.py` 需要导入该表单以直接在管理面板中使用。\n\n```python\nfrom .form import\
    \ *\n\nclass ArticleAdmin(admin.ModelAdmin):\n    form = CustomForm\n```\n\n##\
    \ 如何在 view.py 中使用 form.py？\n\n```python\nfrom .form import *\n\ndef register(request):\n\
    \    # 这是一个 POST 请求，需要处理表单数据\n    if request.method == 'POST':\n        # 创建实例并用请求中的数据填充它：\n\
    \        form = NameForm(request.POST)\n        # 检查它是否有效：\n        if form.is_valid():\n\
    \            # 根据需要处理 form.cleaned_data 中的数据\n            # ...\n            #\
    \ 重定向到一个新的 URL：\n            return HttpResponseRedirect('/thanks/')\n    # 如果是\
    \ GET（或任何其他方法），我们将创建一个空白表单\n    else:\n        form = CustomForm()\n```\n\n让我们理解代码的每一行。\n\
    首先，我们从 `form.py` 导入 `CustomForm`，然后开始名为 `register()` 的函数。在接下来的行中，我们以 `if request.method`\
    \ 开始逻辑，即当按钮被按下时，其方法与“POST”相同。然后，其内部编写的代码将运行，我们从页面 `form.py` 获取表单数据并将其存储在 `form`\
    \ 变量中。我们可以调用表单的 `is_valid()` 方法；如果它不是 true，我们可以带着表单返回模板。如果 `is_valid()` 为 True，我们就能在其\
    \ `cleaned_data` 属性中找到所有已验证的表单数据。\n\n## InlineModelAdmin\n\n当两个 Django 模型共享一个外键关系时，可以在父模型页面上暴露相关模型的内联被称为\
    \ InlineModelAdmin。它提供了 InlineModelAdmin 的两个子类：\n\n1. TabularInline\n2. StackedInline\n\
    \nInlineModelAdmin：它共享 ModelAdmin 的许多相同功能，并添加了一些自己的功能。共享的功能如下：\n\n1. form\n2.\
    \ fieldsets\n3. fields\n4. formfield_overrides\n5. exclude\n6. filter_horizontal\n\
    7. filter_vertical\n8. ordering\n9. prepopulated_fields\n10. get_fieldsets()\n\
    11. get_queryset()\n12. radio_fields\n13. readonly_fields\n14. raw_id_fields\n\
    15. formfield_for_choice_field()\n16. formfield_for_foreignkey()\n17. formfield_for_manytomany()\n\
    18. has_module_permission()\n\nInlineModelAdmin 有其独立的方法：\n\n- **InlineModelAdmin.model**：\n\
    - **InlineModelAdmin.fk_name**：这是模型中外键的名称。在少数情况下，这将自动处理，但如果存在多个指向同一父模型的外键，则必须显式指定\
    \ `fk_name`。\n- **InlineModelAdmin.formset**：这默认为 `BaseInlineFormSet`。使用你自己的表单集可以为你提供许多修改的可能性。\n\
    \n内联是围绕模型表单集构建的。\n\n- **InlineModelAdmin.form**：你无法在任何内联模型中访问任何内联对象。这是使用自定义 ModelForm\
    \ 的唯一方式。\n\n示例\n\n- self.instance.pk\n\n- **InlineModelAdmin.get_extra()**：它允许你自定义不同表单的数量。\n\
    \n- **InlineModelAdmin.get_max_num()**：它允许你自定义不同表单的最大数量。\n\n- **InlineModelAdmin.get_min_num()**：它允许你自定义显示表单的最小数量。\n\
    \n1. **InlineModelAdmin.raw_id_fields()**：这是一个字段列表，你希望将其更改为 ForeignKey 或 ManyToManyField\
    \ 的输入小部件。\n\n2. **InlineModelAdmin.template**：此模板用于在页面上渲染内联模型。\n\n3. **InlineModelAdmin.verbose_name**：这是\
    \ Django 中字段的可读名称。如果未给出，则 Django 可以使用 `fields` 属性创建它。\n\n```python\nfield_name\
    \ = models.Field(verbose_name = \"name\")\n```\n\n4. **InlineModelAdmin.has_add_permission(request,\
    \ obj)**：如果允许添加模型对象，则应返回 True；否则返回 False。\n\n5. **示例**：我们可以通过外键来实现这一点，例如：\n\n\
    ```python\nclass Friendship(models.Model):\n    to_person = models.ForeignKey(Student1,\
    \ on_delete=models.CASCADE, )\n    from_person = models.ForeignKey(Student2, on_delete=models.CASCADE,)\n\
    ```"
