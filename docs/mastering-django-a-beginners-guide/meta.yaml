    注意：使用 migrate 命令迁移所有模型（图 2.15）。\n\nDjango-admin 是一个命令行工具，可帮助您管理项目的所有任务：\n\n```\n\
    Django-admin startproject project_name\n```\n\n## 如何更改默认端口？\n\n默认情况下，您的服务器在端口\
    \ 8080 上运行，您可以分别传入 IP 地址和端口号。\n\n- C:\\Users\\PC\\Desktop\\Python-Project\\Project>\
    \ python manage.py runserver 8080\n\n如果您想在网络上另一台计算机上展示您的作品，请使用此命令：\n\n- C:\\Users\\\
    PC\\Desktop\\Python-Project\\Project> python manage.py runserver 0.0.0.0:8080\n\
    \n## 如何检查 Django 版本？\n\n要验证 Django 是否已安装在您的 PC 上，只需在 PIP 已安装在您的 PC 上后输入“pip show\
    \ Django”。\n示例：\n\n```\nC:\\Users\\PC>pip show Django\nName: Django\nVersion:\
    \ 3.2.6\nC:\\users\\PC\\appdata\\roaming\\python\\python39\\site-packages\nRequires:\
    \ asgiref, pytz, SQL parse\nRequired by: Django-MySQL, djangorestframework\n```\n\
    \n或者，\n您也可以通过这种方式检查：\n\n```\nC:\\Users\\PC>python -m django --version\n3.2.6\n\
    ```\n\n一些关于整个安装的参考。\nhttps://www.stanleyulili.com/django/how-to-install-django-on-windows/\n\
    \n您在 Django 中的第一个程序：\n移入第二个项目文件夹，并使用 touch 命令或创建新文件来创建一个视图文件。\n\n- C:\\Users\\\
    PC\\Projects> touch view.py\n\n注意：view.py 区分大小写。\n现在，我们将编辑两个文件：\n\n- view.py\n\
    - url.py\n\n```\n# editing view.py file\nfrom django.http.response import HttpResponse\n\
    def print(request):\n    return HttpResponse(\"Hello World!\")\n```\n\n在 view.py\
    \ 中，您将在此编写逻辑并将结果返回给模板。\n\n```\nfrom .views import *\nfrom django.urls import path\n\
    urlpatterns = [\n    path('', login,name=\"login\"),\n    path('register', register,name=\"\
    register\"),\n]\n```\n\n在 url.py 中，我们为视图添加一个路径，名称如上 path=” register”，并将路径留空以将模板渲染为项目的主页。编写路径的方法：\n\
    语法：path(‘URL’, view method, name )\n注意：使用此行从 view 导入所有视图方法：\nFrom .view import\
    \ *（* 是星号符号，它从特定文件导入所有内容。）\n\n## 模板文件\n\n在浏览器上呈现内容的唯一方法是使用模板。这些在您的项目中被称为静态文件。为此创建一个不同的文件夹，然后将您的文件添加到其中。\n\
    不要忘记在项目文件夹的 setting.py 中添加 Static 路径。对于媒体、CSS 文件，文件夹将位于项目文件夹之外。每个应用程序都可以访问该文件夹，前提是您的图像和样式表适用于所有其他应用程序。\n\
    \n```\n<!doctype html>\n<html lang=\"en\">\n<head>\n    <title>Title</title>\n\
    \    <!-- Required meta tags -->\n</head>\n<body>\n    {% block content %}\n \
    \   {% endblock %}\n<!-- Optional JavaScript -->\n<!-- jQuery first, then Popper.js,\
    \ then Bootstrap JS -->\n</body>\n</html>\n```\n\n## 创建项目和部署\n\n我们可以使用 star project\
    \ 命令创建一个新项目，后跟项目名称（您可以更改它）。此命令将在同一目录中创建一个具有给定项目名称的新文件夹。现在，使用 cd 命令移至新目录，并将其部署在本地服务器上。\n\
    \n部署后，您将在命令行界面上看到一堆包含 URL 的文件。将该 URL 复制到您的浏览器，您将看到一条介绍性消息。无需复制，只需按 Ctrl + 链接（URL）。它将自动打开您的浏览器并在本地部署您的项目。完成项目后，在命令行上按\
    \ Ctrl + c 退出服务器。\n\n## 使用 Heroku 部署\n\nHeroku 是一个云托管平台；它支持多种语言和 Web 框架，现在我们使用\
    \ Django Python。因此，一旦您的 Django 项目准备就绪，您将注册一个免费的 Heroku 账户。Heroku 提供至少五种部署项目的方式：\n\
    \n1. Git\n2. Github\n3. Docker\n4. API\n5. Web\n\n现在登录您的 Heroku 账户，然后启用多因素认证（MFA）以增强您账户的保护。它也称为双因素认证。\n\
    \n- 安装 Heroku CLI。\n- 如果 Heroku 已经在您的系统中，那么使用 Heroku –version 检查其版本。"
