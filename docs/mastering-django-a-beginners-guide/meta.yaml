- md: "## WHAT IS BABEL?\n\nIt provides a message extraction framework. This package\
    \ contains various messages for integration.\n\n- A message extraction plugin\
    \ for Django templates: Django-Babel comes with a method plugin that can extract\
    \ messages from Django template files. Python is supported entirely by Babel.\n\
    - A middleware class that adds the Babel Locale_object to requests: To use the\
    \ Babel middleware, make sure you add it to the list of MIDDLEWARE_CLASSES in\
    \ your settings module.\n- Template tags for date and number formatting: To make\
    \ the template filters/tags available in your project, you need to add Django-Babel\
    \ to the list of INSTALLED_APPS in your settings module:\n\n```\nMIDDLEWARE_CLASSES\
    \ = (\n    ...\n    'django.middleware.locale.LocaleMiddleware',\n    'django_babel.middleware.LocaleMiddleware',\n\
    \    ...\n)\n```\n\n```\nINSTALLED_APPS = (\n    ...\n    'django_babel',\n  \
    \  ...\n)\n```\n\nJinja supports the latest version, Python 3.4, and newer. We\
    \ also recommend using a virtual environment in order to add dependencies from\
    \ other projects and the system.\n\n## Template\n\nIt represents the syntax and\
    \ semantics of the template engine. The template engine is so flexible that the\
    \ application's configuration can be different from the code presented here.\n\
    The template is simply a text file. Jinja can generate any text-based format like\
    \ HTML, XML, etc. It does not need to have a specific extension: .html, .xml,\
    \ etc. It contains variables and/or expressions, which get replaced with values\
    \ when a template is rendered, and tags, which control the logic. Django and Python\
    \ inspire this.\n\nA few examples will help to understand the default behavior\
    \ of the Jinja configuration.\n\n```\n<!doctype html>\n<html lang=\"en\">\n<head>\n\
    \    <title>Title</title>\n    <!-- Required meta tags -->\n    <meta charset=\"\
    utf-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1,\
    \ shrink-to-fit=no\">\n    <link rel=\"stylesheet\" href=\"{% static 'css/style.css'\
    \ %}\">\n    <!-- Bootstrap CSS -->\n    <link rel=\"stylesheet\" href=\"https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css\"\
    >\n    <link rel=\"stylesheet\" href=\"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.1/css/all.min.css\"\
    >\n</head>\n<body>\n    {% block content %}\n    <!DOCTYPE html>\n    <html lang=\"\
    en\">\n    <head>\n        <title>My Webpage</title>\n    </head>\n    <body>\n\
    \        <ul id=\"navigation\">\n            {% for item in items %}\n       \
    \     <li><a href=\"{{ item.href }}\">{{ item.caption }}</a></li>\n          \
    \  {% endfor %}\n        </ul>\n        <h1>My Webpage</h1>\n        {{ name_of_website\
    \ }}\n        {# a comment #}\n    </body>\n    </html>\n    {% endblock %}\n\
    \    <!-- Optional JavaScript -->\n    <!-- jQuery first, then Popper.js, then\
    \ Bootstrap JS -->\n    <script src=\"https://code.jquery.com/jquery-3.3.1.slim.min.js\"\
    \ ></script>\n    <script src=\"https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js\"\
    ></script>\n</body>\n</html>\n```\n\nIn the above example, you see everything\
    \ related to the templates in Django. Don't get confused after looking at this\
    \ code, and we will explain each and every step of the code. Let's look at it.\n\
    \nStart your HTML code and then write the common boilerplate and add on your additional\
    \ files in the <head> tag of CSS in <link> tag. After that, we will see {% block\
    \ content %}. The following example shows syntax configuration.\n\n## Django Template\
    \ System Basic\n\nA template tag is surrounded by {% and %}. This is because Django's\
    \ tags are so flexible. Some examples performed by template tags are as follows:\n\
    \n1. **Display Logic:** E.g., {% if %} Add {% endif %}\n2. **Loop Control:** E.g.,\
    \ {% for x in y %}...{% endfor %}\n3. **Block Declaration:** E.g., {% block content\
    \ %}...{% endblock %}\n4. **Content Import:** E.g., {% include \"header.html\"\
    \ %}\n5. **Inheritance:** E.g., {% extends \"base.html\" %}\n\nA template variable\
    \ is surrounded by {{ and }}. These template variables are passed to the template\
    \ at runtime in the Context.\n\n1. **Simple Variables:** E.g., {{ name }}\n2.\
    \ **Object Attributes:** E.g., {{ page.heading }}\n3. **Dictionary Lookups:**\
    \ E.g., {{ dict.item }}\n4. **List Indexes:** E.g., {{ list_items.2 }}\n5. **Method\
    \ Calls:** E.g., {{ var.lower }}, {{ mydict.push }}\n\nThere are few delimiters\
    \ as follows:\n\n- **Display Logic - {% ... %} (for Statements)**: A control statement\
    \ refers to all those things that control the flow of a program – conditionals\
    \ if/elif/else, for-loops, as well as things like macros and blocks. Example,\n\
    \n```\n<h1>Favorite Color</h1>\n<ul>\n{% for user in colors %}\n  <li>{{ user.color\
    \ }}</li>\n{% endfor %}\n</ul>\n```\n\n- **If**: In Jinja, it is easiest to use\
    \ if as a variable that is defined and then returns some values, not empty and\
    \ not false.\n\n```\n{% if users %}\n<ul>\n{% for user in users %}\n  <li>{{ user.username}}</li>\n\
    {% endfor %}\n</ul>\n{% endif %}\n#Template will get value from view.py in form\
    \ of dictionary.\n{'users' :user})\n```\n\n- **If Expression**: It is also used\
    \ as an inline expression. For example, you can add this to extend your code logic.\n\
    \n```\n{% extends condition if the condition is defined\nelse 'default.html' %}\n\
    ```\n\n- **Expressions**: It allows expression everywhere. The simplest form of\
    \ expression is literals. They are represented as Python objects such as strings\
    \ and numbers. The following are literals:\n    - **“Django with Python”**: Single\
    \ quotes or double quote works as same.\n    - **123 / 123_432**: Integers are\
    \ whole numbers without decimal parts.\n    - **12.12**: Floating point number\
    \ can be written as a decimal mark.\n    - **['List', 'of', 'objects']**: Everything\
    \ defined in between [] is a list. It is used to store data in a sequential manner.\n\
    \    - **('Values', 'of', 'tuples')**: Tuples are like lists that cannot be modified\
    \ (“immutable list”). It is usually used to represent items of two or more elements.\n\
    \    - **{\"Key\": \"Value\"}**: In Python, a dictionary is a structure that includes\
    \ the keys and values represented as key-value pairs. The keys must be unique\
    \ and always have exactly one value. It is rarely used in the template.\n    -\
    \ **True/false**: true is always true, and false is always false. True, false,\
    \ and none should be in lowercase.\n\n## Operators\n\nMath Jinja allows you to\
    \ calculate with values.\n\n- **(+)**: Adds two instances together. Usually, the\
    \ objects are numbers, but they also add both strings or lists to add the extra\
    \ data. Example: {{ 1+1 }} is 2.\n- **(-)**: It subtracts the second number from\
    \ the first one. {{ 3 - 2 }} is 1.\n- **(/)**: It will divide two numbers and\
    \ return value will be a floating point number. {{ 1 / 2 }} is {{ 0.5 }}.\n- **(%)**:\
    \ Calculate the remainder of an integer division. {{ 11 % 7 }} is 4.\n- **(*)**:\
    \ Multiply the left operand with the right one. {{ 2 * 2 }} would return 4 and\
    \ it may also be used to repeat a string multiple times. {{ '=' * 4 }} would print\
    \ a bar of 80 equal signs ****.\n- **(**)**: Raise the left operand to the power\
    \ of the right operand. {{ 2**3 }} would return 8.\n\n## Other Operators\n\n-\
    \ **in**: It returns true if the left operand exists in the right. {{ 2 in [1,\
    \ 2, 3,4] }} would, for example, return true.\n- **Is**: Used to perform tests.\n\
    - **| (a pipe, vertical)**: Used to apply filter.\n- **~ (tilde)**: Converts all\
    \ operands into strings and concatenates them.\n\n## Python in-built Method\n\n\
    Python has various in-built methods. You can also use any of the methods defined\
    \ on a variable type.\n\n| abs() | xmlattr() | jsonencode() | round() | lower()\
    \ |\n| float() | format() | pprint() | join() | trim() |\n| slice() | truncate()\
    \ | capitalize() | string() | reverse() |\n| dformat() | center() | int() | urlencode()\
    \ | sort() |\n| replace() | length() | upper() | random() | dictsort() |\n| last()\
    \ | wordcount() | sum() | first() | list() |\n| title() | filesizeformat() | escape()\
    \ | trim() | urlize() |\n\n- **Explanation:** Templates are a way to filter the\
    \ alternating value of the variable before they are displayed. Filters use a pipe\
    \ character like this. {{ name | lower }}\n\n## Various Functions\n\n- **abs:**\
    \ It will return the absolute value of the number as an argument. For example,\
    \ if a variable contains -15, the filter statement {{variable| abs}} outputs 15.\n\
    - **xmlattr:** It will create an SGML/XML attribute string, but it depends on\
    \ the items in a dict. All values, neither none nor undefined, are automatically\
    \ escaped.\n- **JSON encode:** JSON dumps a variable, it just works if a simple\
    \ JSON is installed.\n- **round:** It filter rounds a number to a given precision,\
    \ where the first argument is the precision – which defaults to 0.\n    - ‘common’\
    \ rounds either up or down\n    - ‘ceil’ always rounds up\n    - ‘floor’ always\
    \ rounds down\n- **lower:** It will convert all values of a string variable to\
    \ a lowercase character. For example, if a variable contains Hello Python, the\
    \ filter statement {{variable | lower}} outputs hello Python.\n- **float:** It\
    \ will filter convert a value into a floating-point number."
  mdcn: "## 什么是 Babel？\n\n它提供了一个消息提取框架。此软件包包含用于集成的各种消息。\n\n- 一个用于 Django 模板的消息提取插件：Django-Babel\
    \ 附带一个方法插件，可以从 Django 模板文件中提取消息。Babel 完全支持 Python。\n- 一个将 Babel Locale 对象添加到请求中的中间件类：要使用\
    \ Babel 中间件，请确保将其添加到设置模块的 `MIDDLEWARE_CLASSES` 列表中。\n- 用于日期和数字格式化的模板标签：要使模板过滤器/标签在项目中可用，您需要将\
    \ Django-Babel 添加到设置模块的 `INSTALLED_APPS` 列表中：\n\n```\nMIDDLEWARE_CLASSES = (\n\
    \    ...\n    'django.middleware.locale.LocaleMiddleware',\n    'django_babel.middleware.LocaleMiddleware',\n\
    \    ...\n)\n```\n\n```\nINSTALLED_APPS = (\n    ...\n    'django_babel',\n  \
    \  ...\n)\n```\n\nJinja 支持最新版本 Python 3.4 及更高版本。我们还建议使用虚拟环境，以便从其他项目和系统添加依赖项。\n\
    \n## 模板\n\n它代表了模板引擎的语法和语义。模板引擎非常灵活，因此应用程序的配置可以与此处展示的代码不同。\n模板只是一个文本文件。Jinja 可以生成任何基于文本的格式，如\
    \ HTML、XML 等。它不需要特定的扩展名：.html、.xml 等。它包含变量和/或表达式，在渲染模板时会被值替换，以及控制逻辑的标签。Django\
    \ 和 Python 启发了这一点。\n\n一些示例将有助于理解 Jinja 配置的默认行为。\n\n```\n<!doctype html>\n<html\
    \ lang=\"en\">\n<head>\n    <title>Title</title>\n    <!-- Required meta tags\
    \ -->\n    <meta charset=\"utf-8\">\n    <meta name=\"viewport\" content=\"width=device-width,\
    \ initial-scale=1, shrink-to-fit=no\">\n    <link rel=\"stylesheet\" href=\"{%\
    \ static 'css/style.css' %}\">\n    <!-- Bootstrap CSS -->\n    <link rel=\"stylesheet\"\
    \ href=\"https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css\"\
    >\n    <link rel=\"stylesheet\" href=\"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.1/css/all.min.css\"\
    >\n</head>\n<body>\n    {% block content %}\n    <!DOCTYPE html>\n    <html lang=\"\
    en\">\n    <head>\n        <title>My Webpage</title>\n    </head>\n    <body>\n\
    \        <ul id=\"navigation\">\n            {% for item in items %}\n       \
    \     <li><a href=\"{{ item.href }}\">{{ item.caption }}</a></li>\n          \
    \  {% endfor %}\n        </ul>\n        <h1>My Webpage</h1>\n        {{ name_of_website\
    \ }}\n        {# a comment #}\n    </body>\n    </html>\n    {% endblock %}\n\
    \    <!-- Optional JavaScript -->\n    <!-- jQuery first, then Popper.js, then\
    \ Bootstrap JS -->\n    <script src=\"https://code.jquery.com/jquery-3.3.1.slim.min.js\"\
    \ ></script>\n    <script src=\"https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js\"\
    ></script>\n</body>\n</html>\n```\n\n在上面的示例中，您看到了与 Django 中模板相关的所有内容。不要在查看此代码后感到困惑，我们将解释代码的每一步。让我们看看它。\n\
    \n开始编写 HTML 代码，然后编写通用样板代码，并在 `<head>` 标签中的 `<link>` 标签中添加您的附加 CSS 文件。之后，我们将看到\
    \ `{% block content %}`。以下示例展示了语法配置。\n\n## Django 模板系统基础\n\n模板标签被 `{%` 和 `%}`\
    \ 包围。这是因为 Django 的标签非常灵活。模板标签执行的一些示例如下：\n\n1. **显示逻辑：** 例如，`{% if %}` 添加 `{% endif\
    \ %}`\n2. **循环控制：** 例如，`{% for x in y %}...{% endfor %}`\n3. **块声明：** 例如，`{% block\
    \ content %}...{% endblock %}`\n4. **内容导入：** 例如，`{% include \"header.html\" %}`\n\
    5. **继承：** 例如，`{% extends \"base.html\" %}`\n\n模板变量被 `{{` 和 `}}` 包围。这些模板变量在运行时通过上下文传递给模板。\n\
    \n1. **简单变量：** 例如，`{{ name }}`\n2. **对象属性：** 例如，`{{ page.heading }}`\n3. **字典查找：**\
    \ 例如，`{{ dict.item }}`\n4. **列表索引：** 例如，`{{ list_items.2 }}`\n5. **方法调用：** 例如，`{{\
    \ var.lower }}`，`{{ mydict.push }}`\n\n有以下几个分隔符：\n\n- **显示逻辑 - `{% ... %}`（用于语句）**：控制语句指的是所有控制程序流程的东西——条件\
    \ if/elif/else、for 循环，以及宏和块之类的东西。例如，\n\n```\n<h1>Favorite Color</h1>\n<ul>\n{%\
    \ for user in colors %}\n  <li>{{ user.color }}</li>\n{% endfor %}\n</ul>\n```\n\
    \n- **If**：在 Jinja 中，最容易将 if 用作已定义的变量，然后返回一些值，而不是空值或 false。\n\n```\n{% if users\
    \ %}\n<ul>\n{% for user in users %}\n  <li>{{ user.username}}</li>\n{% endfor\
    \ %}\n</ul>\n{% endif %}\n#模板将从 view.py 以字典形式获取值。\n{'users' :user})\n```\n\n-\
    \ **If 表达式**：它也用作内联表达式。例如，您可以添加它来扩展代码逻辑。\n\n```\n{% extends condition if the condition\
    \ is defined\nelse 'default.html' %}\n```\n\n- **表达式**：它允许在任何地方使用表达式。表达式的最简单形式是字面量。它们表示为\
    \ Python 对象，如字符串和数字。以下是字面量：\n    - **“Django with Python”**：单引号或双引号作用相同。\n   \
    \ - **123 / 123_432**：整数是没有小数部分的整数。\n    - **12.12**：浮点数可以写成小数点形式。\n    - **['List',\
    \ 'of', 'objects']**：在 `[]` 之间定义的所有内容都是一个列表。它用于以顺序方式存储数据。\n    - **('Values',\
    \ 'of', 'tuples')**：元组就像不能修改的列表（“不可变列表”）。它通常用于表示两个或更多元素的项目。\n    - **{\"Key\"\
    : \"Value\"}**：在 Python 中，字典是一种包含键和值的结构，表示为键值对。键必须是唯一的，并且始终只有一个值。它在模板中很少使用。\n\
    \    - **True/false**：true 始终为真，false 始终为假。True、false 和 none 应为小写。\n\n## 运算符\n\
    \n数学 Jinja 允许您使用值进行计算。\n\n- **(+)**：将两个实例相加。通常，对象是数字，但它们也可以将两个字符串或列表相加以添加额外数据。例如：`{{\
    \ 1+1 }}` 是 2。\n- **(-)**：它从第一个数字中减去第二个数字。`{{ 3 - 2 }}` 是 1。\n- **(/)**：它将除以两个数字，返回值将是浮点数。`{{\
    \ 1 / 2 }}` 是 `{{ 0.5 }}`。\n- **(%)**：计算整数除法的余数。`{{ 11 % 7 }}` 是 4。\n- **(*)**：将左操作数乘以右操作数。`{{\
    \ 2 * 2 }}` 将返回 4，它也可以用于多次重复字符串。`{{ '=' * 4 }}` 将打印一个由 80 个等号组成的条 ****。\n- **(**)**：将左操作数提升到右操作数的幂。`{{\
    \ 2**3 }}` 将返回 8。\n\n## 其他运算符\n\n- **in**：如果左操作数存在于右操作数中，则返回 true。例如，`{{ 2 in\
    \ [1, 2, 3,4] }}` 将返回 true。\n- **Is**：用于执行测试。\n- **|（管道符，竖线）**：用于应用过滤器。\n- **~（波浪号）**：将所有操作数转换为字符串并连接它们。\n\
    \n## Python 内置方法\n\nPython 有各种内置方法。您也可以使用在变量类型上定义的任何方法。\n\n| abs() | xmlattr()\
    \ | jsonencode() | round() | lower() |\n| float() | format() | pprint() | join()\
    \ | trim() |\n| slice() | truncate() | capitalize() | string() | reverse() |\n\
    | dformat() | center() | int() | urlencode() | sort() |\n| replace() | length()\
    \ | upper() | random() | dictsort() |\n| last() | wordcount() | sum() | first()\
    \ | list() |\n| title() | filesizeformat() | escape() | trim() | urlize() |\n\n\
    - **解释：** 模板是一种在显示之前过滤变量交替值的方法。过滤器使用管道字符，如下所示。`{{ name | lower }}`\n\n## 各种函数\n\
    \n- **abs：** 它将返回作为参数的数字的绝对值。例如，如果一个变量包含 -15，过滤器语句 `{{variable| abs}}` 输出 15。\n\
    - **xmlattr：** 它将创建一个 SGML/XML 属性字符串，但这取决于字典中的项目。所有值，既不是 none 也不是 undefined，都会自动转义。\n\
    - **JSON encode：** JSON 转储一个变量，它仅在安装了简单 JSON 时才有效。\n- **round：** 它过滤器将数字四舍五入到给定精度，其中第一个参数是精度——默认为\
    \ 0。\n    - ‘common’ 向上或向下舍入\n    - ‘ceil’ 始终向上舍入\n    - ‘floor’ 始终向下舍入\n- **lower：**\
    \ 它将字符串变量的所有值转换为小写字符。例如，如果一个变量包含 Hello Python，过滤器语句 `{{variable | lower}}` 输出\
    \ hello Python。\n- **float：** 它将过滤器将值转换为浮点数。"
