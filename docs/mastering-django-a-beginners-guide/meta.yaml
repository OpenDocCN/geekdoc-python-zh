    4. **List Indexes:** E.g., {{ list_items.2 }}

    5. **Method Calls:** E.g., {{ var.lower }}, {{ mydict.push }}'
  - "[PAGE 145]\n\nThere are few delimiters as follows:\n\n+   - **Display Logic -\
    \ {% ... %} (for Statements )**: A control statement refers to all those things\
    \ that control the flow of a program – conditionals if/elif/else, for-loops, as\
    \ well as things like macros and blocks. Example,\n\n```\n<h1>Favorite Color</h1>\n\
    <ul>\n{% for user in colors %}\n  <li>{{ user.color }}</li>\n{% endfor %}\n</ul>\n\
    ```\n\n+   - **If**: In Jinja, it is easiest to use if as a variable that is defined\
    \ and then returns some values, not empty and not false.\n\n```\n{% if users %}\n\
    <ul>\n{% for user in users %}\n  <li>{{ user.username}}</li>\n{% endfor %}\n</ul>\n\
    {% endif %}\n#Template will get value from view.py in form of dictionary.\n{'users'\
    \ :user})\n```\n\n+   - **If Expression**: It is also used as an inline expression.\
    \ For example, you can add this to extend your code logic.\n\n```\n{% extends\
    \ condition if the condition is defined\nelse 'default.html' %}\n```\n\n+    \
    \ - **Expressions**: It allows expression everywhere. The simplest form of expression\
    \ is literals. They are represented as Python objects such as strings and numbers.\
    \ The following are literals:\n    - **“Django with Python”**: Single quotes or\
    \ double quote works as same.\n    - **123 / 123_432**: Integers are whole numbers\
    \ without decimal parts.\n    - **12.12**: Floating pint number can be written\
    \ as a decimal mark."
  - '[PAGE 146]


    126 ■ Mastering Django


    +   - [‘List’, ‘of’, ‘objects’]: Everything define in between [] these is list.
    It is used to store data in a sequential manner.

    - (‘Values’, ‘of’, ‘tuples’): Tuples are like that cannot be modified (“immutable
    list”). It is usually used to represent items of two or more elements.

    - {“Key”: “Value”} = In Python dictionary is a structure that includes the keys
    and values represented as Key values pairs. The keys must be unique and always
    have exactly one value. It is rarely used in the template.

    - **True/false**: true is always true, and false is always false. True, false,
    and none should be in lowercase.


    # Operators


    Math Jinja allows you to calculate with values.


    +   - (+): Adds two instances together. Usually, the objects are numbers, but
    they also add both strings or lists to add the extra data. Example: {{ 1+1 }}
    is 2.

    - (-): It subtracts the second number from the first one. {{ 3 - 2 }} is 1.

    - (/): It will divide two numbers and return value will be a floating point number.
    {{ 1 / 2 }} is {{ 0.5 }}.

    - (%): Calculate the remainder of an integer division. {{ 11 % 7 }} is 4.

    - (*): Multiply the left operand with the right one. {{ 2 * 2 }} would return
    4 and it may also be used to repeat a string multiple times. {{ ‘=’ * 4 }} would
    print a bar of 80 equal signs ****.

    - (**): Raise the left operand to the power of the right operand. {{ 2**3 }} would
    return 8.


    # Other Operators


    +   - **in**: It returns true if the left operand exists in the right. {{ 2 in
    [1, 2, 3,4] }} would, for example, return true.

    - **Is**: Used to perform tests.

    - **| (a pipe, vertical)**: Used to apply filter.

    - **~ (tilde)**: Converts all operands into strings and concatenates them.'
  - "[PAGE 147]\n\n# Python in-built Method\n\nPython has various in-built methods.\
    \ You can also use any of the methods defined on a variable type.\n\n| abs() |\
    \ xmlattr () | jsonencode() | round() | lower() |\n| float() | format() | pprint()\
    \ | join() | trim() |\n| slice() | truncate() | capitalize() | string() | reverse()\
    \ |\n| dformat() | center() | int() | urlencode() | sort() |\n| replace() | length()\
    \ | upper() | random() | dictsort() |\n| last() | wordcount() | sum() | first()\
    \ | list() |\n| title() | filesizeformat() | escape() | trim() | urlize() |\n\n\
    +   - **Explanation:** Templates are a way to filter the alternating value of\
    \ the variable before they are displayed. Filters use a pipe character like this.\
    \ {{ name | lower }}\n\n# Various Functions\n\n+   - **abs:** It will return the\
    \ absolute value of the number as an argument. For example, if a variable contains\
    \ -15, the filter statement {{variable| abs}} outputs 15.\n- **xmlattr:** It will\
    \ create an SGML/XML attribute string, but it depends on the items in a dict.\
    \ All values, neither none nor undefined, are automatically escaped.\n- **JSON\
    \ encode:** JSON dumps a variable, it just works if a simple JSON is installed.\n\
    - **round:** It filter rounds a number to a given precision, where the first argument\
    \ is the precision – which defaults to 0.\n    - ‘common’ rounds either up or\
    \ down\n    - ‘ceil’ always rounds up\n    - ‘floor’ always rounds down\n- **lower:**\
    \ It will convert all values of a string variable to a lowercase character. For\
    \ example, if a variable contains Hello Python, the filter statement {{variable\
    \ | lower}} outputs hello Python.\n- **float:** It will filter convert a value\
    \ into a floating-point number."
- md: "## Comparisons\n\n- ( == ): Compares two objects for equality.\n- ( != ): Compares\
    \ two objects for inequality.\n- (>): True if the left-hand side is greater than\
    \ the right-hand side.\n- (>=): True if the left-hand side is greater or equal\
    \ to the right-hand side.\n- (<): The left-hand side is lower than the right-hand\
    \ side.\n- (<=): The left-hand side is lower than or equal to the right-hand side\
    \ value.\n\n## Logic\n\nIf statements, filtering, and if expressions can be useful\
    \ to combine multiple expressions:\n\n1. ( **and** ): Return true if the left\
    \ and the right operand are true.\n2. ( **Or** ): Return true if the left or the\
    \ right operand is true.\n3. ( **not** ): negate a statement (see below).\n4.\
    \ (**expr**): Parentheses group an expression.\n\n## Rendering a Template\n\n\
    When you have a Template object, you can pass its data by giving it a context:\n\
    \n```\nfrom django.template import Context, Template\nobj_t = Template('You are\
    \ learning {{ name }}.')\nobj_c = Context({'name': 'Python with Django'})\nt.render(c)\n\
    ```\n\nA context is a similar to a set of template variable names and their values.\
    \ A template uses a context to populate its variables. A context in Django is\
    \ represented by the Context class. The Template object's render() method with\
    \ the Context is called to “fill” the template. We should point out here that\
    \ the return value of obj_t.render(obj_c) is a Unicode object – not a normal Python\
    \ string.\n\nLet's step into this code one statement at a time:\n\n- First, we\
    \ import the Template and Context classes, which are available in the module,\
    \ which is Django. Template.\n- We pass the raw text of our template into some\
    \ variable.\n- Next we create a template object, obj_t, by passing raw_template\
    \ to the Template class constructor.\n- We create a Context object, obj_c. A Context\
    \ is an object that takes a Python dictionary, which maps variable names to values.\n\
    - Eventually, we can call the render() method on our template object by passing\
    \ it the Context.\n\n## The Django Template Language\n\n- **Variable**: It has\
    \ to output a value from the Context, which is a direct-like object mapping keys\
    \ to values. Variables are surrounded by {{ and }} like this:\n  - I am learning\
    \ {{ name1 }} with{{ name2 }}.\n  - With a context of {'name1': 'Python', 'name2':\
    \ 'Django'}, output like:\n  - I am learning Python with Django.\n\nHaving dictionary\
    \ lookup, attribute lookup and list-index lookups are implemented with a dot notation(.):\n\
    \n- {{ my_own_dict.key }}\n- {{ my_own_object.attribute }}\n- {{ my_own_list.0\
    \ }}\n\n**Tags**: It provides an arbitrary logic in the rendering process. Tags\
    \ can output the content, e.g., an “if” statement or a “for” loop, etc. Tags are\
    \ surrounded by {% and %}.\n\n```\n{% csrf_token %} #used for authentication purpose\
    \ in <form> tag.\n```\n\n**Filter**: It transforms the values of variable and\
    \ tag arguments. They look like this:\n\n```\n{{ django|title }}\n```\n\nWe have\
    \ various filters:\n\n**add**: Adds the argument to the value.\n\n```\n{{ value|add:\"\
    2\" }} #If value is \"django\", the output will be \"Django\".\n```\n\n**center**:\
    \ The value is a field of a given width.\n\n```\n{{ value|center:\"2\" }} #If\
    \ value is \"Django\", the output will be \" Django \".\n```\n\nOther filters\
    \ are as follows:\n\n- date\n- cut\n- default\n- dictsort\n- divisible by\n- dictsortreversed\
    \ and many more.\n\n## WHY DO WE USE ENGINE?\n\nDjango Template: The engine is\
    \ an instance of the Django template system. Benefits of using Jinja:\n\n- **Speed\
    \ and performance**: It compiles template source code to Python bytecode when\
    \ it is loaded, so the template is only parsed, resulting in better performance\
    \ at runtime.\n- **Similar to the Django template**: It is actually inspired by\
    \ Django templates, so there is a lot of common ground between the two systems.\n\
    - **Asynchronous execution**: Jinja templates support asynchronous execution,\
    \ which allows backing tasks to run their course – without holding back templates.\n\
    - **Flexibility**: They can contain supporting concepts like macros and more Python-like\
    \ constructs.\n\n## WHAT ARE LOADERS?\n\nTemplate loaders are responsible for\
    \ locating the template and returning template objects.\n\n## Support for Template\
    \ Engines\n\nConfiguration or How Django Finds the Templates?\n\nTemplates engines\
    \ are configured in the TEMPLATES setting. It is a list of all the configurations,\
    \ one for each engine.\n\n```\nTEMPLATES = [\n    {\n        'BACKEND': 'django.template.backends.django.DjangoTemplates',\n\
    \        'DIRS': ['template'],\n        'APP_DIRS': True,\n        'OPTIONS':\
    \ {\n            'context_processors': [\n                'django.template.context_processors.debug',\n\
    \                'django.template.context_processors.request',\n             \
    \   'django.contrib.auth.context_processors.auth',\n                'django.contrib.messages.context_processors.messages',\n\
    \            ],\n        },\n    },\n]\n```\n\nBackend dotted Python path to a\
    \ template class: The built-in backends are 'Django.template.backends.Django.DjangoTemplates'.\n\
    \nCommon terms used in TEMPLATE\n\n- **DIRS**: It is the list of directories where\
    \ the engine should look.\n- **APP_DIRS**: It tells whether the engine should\
    \ look for a template inside the application. When it is True, Django Templates\
    \ engines look for template and then the template engine looks at the templates\
    \ subdirectory of installed applications.\n\nCreating a Site Template\n\nDjango\
    \ did not create the \\templates folder for you, so create it by own. When you\
    \ are finished, your folder structure should look like this:\n\n```\n\\myclub_site\
    \ # You App Folder\n    \\templates #Your Template Folder\n```\n\n128 ■ Mastering\
    \ Django\n\n- **Print**: It is a variable useful for debugging.\n- **Join**: It\
    \ will return a string which is the concatenation of the strings in the sequence.\n\
    - **Trim**: The trim filter is used to strip leading and trailing whitespace just\
    \ like Python’s string strip() Method.\n- **Slice**: It will provide an iterator\
    \ and return a list of lists containing those items.\n- **Truncate**: Return a\
    \ truncated copy of the string.\n- **Capitalize**: This filter capitalizes the\
    \ first letter of a string variable. For example, if a variable contains hello\
    \ Python, the filter statement {{variable | capitalize}} outputs Hello Python.\n\
    - **String**: The string filter makes a string Unicode if it isn’t already.\n\
    - **Reverse**: Return a reversed list of the sequence filtered.\n- **Format**:\
    \ Apply Python mapping string formatting on an object.\n- **Center**: It center\
    \ aligns a value and pads it with additional white space characters until it reaches\
    \ the given argument of characters.\n- **Int**: The int filter converts a value\
    \ into an integer.\n- **urlencode**: It will escape a value for use in URLs. For\
    \ example, variable contains http://localhost/data?type=cold&size=large the filter\
    \ statement {{variable| urlencode }} outputs http%3A//localhost/data%3Ftype%3Dcold%26size%3Dlarge.\n\
    - **sort**: Sort a sequence. By default, it sorts ascending, and if you pass it\
    \ True as the first argument, it will reverse the sorting.\n- **Replace**: It\
    \ will work just like Python replace string. The first part of the sub-string\
    \ should be replaced; the second is the replacement string.\n- **Length**: Return\
    \ the length of the value.\n- **Upper**: It will convert all values of a string\
    \ of letters to uppercase. For example, if a variable contains Hello Python, the\
    \ filter statement {{variable| upper}} outputs HELLO PYTHON.\n- **Random**: It\
    \ will return a random item from the sequence.\n- **dictsort**: It will sort a\
    \ dict and yield (key, value) pairs. Because the dictionary is unsorted, you may\
    \ want to use this function to order them.\n- **Last**: Return the last item of\
    \ a sequence.\n- **sum**: It will return the sum of a sequence of numbers, plus\
    \ the value provided with the start parameter, which defaults to 0.\n- **first**:\
    \ Return the first item of a sequence.\n- **List**: It will be used to return\
    \ a list of characters. For example, a variable contains a letter and the filter\
    \ statement {{variable | list}} generates ['l', 'a', 'v', 'b', 't', 's'].\n- **title**:\
    \ It will convert all first character values of a string letter to uppercase.\
    \ For example, if a variable contains Hello Python, the filter statement {{variable|\
    \ title}} outputs Hello Python.\n- **file size format**: It will convert a number\
    \ of bytes into a friendly file size string. For example, if a variable contains\
    \ 150, the filter statement {{variable| filesizeformat}} outputs 150 bytes.\n\
    - **escape**: It escapes HTML characters from a value. Specifically, with the\
    \ escape filter,\n  1. < is converted to <\n  2. > is converted to >,\n  3. '\
    \ (single quote) is converted to &#39;\n  4. \" (double quote) is converted to\
    \ &quot,\n  5. & is converted to &amp.\n- **Trim**: It is used to strip leading\
    \ and trailing whitespace just like Python's string strip() method.\n- **urlize**:\
    \ It will make your text URLs into clickable HTML links.\n\n130 ■ Mastering Django"
  mdcn: "## 比较\n\n- ( == )：比较两个对象是否相等。\n- ( != )：比较两个对象是否不相等。\n- (>)：如果左侧大于右侧，则为真。\n\
    - (>=)：如果左侧大于或等于右侧，则为真。\n- (<)：左侧小于右侧。\n- (<=)：左侧小于或等于右侧的值。\n\n## 逻辑\n\nIf 语句、过滤和\
    \ if 表达式可用于组合多个表达式：\n\n1. ( **and** )：如果左侧和右侧操作数都为真，则返回真。\n2. ( **Or** )：如果左侧或右侧操作数为真，则返回真。\n\
    3. ( **not** )：对语句取反（见下文）。\n4. (**expr**)：括号用于对表达式进行分组。\n\n## 渲染模板\n\n当你有一个 Template\
    \ 对象时，你可以通过为其提供一个 context 来传递其数据：\n\n```\nfrom django.template import Context,\
    \ Template\nobj_t = Template('You are learning {{ name }}.')\nobj_c = Context({'name':\
    \ 'Python with Django'})\nt.render(c)\n```\n\nContext 类似于一组模板变量名及其值的集合。模板使用 context\
    \ 来填充其变量。Django 中的 context 由 Context 类表示。使用 Context 调用 Template 对象的 render() 方法来“填充”模板。这里我们应该指出，obj_t.render(obj_c)\
    \ 的返回值是一个 Unicode 对象——而不是普通的 Python 字符串。\n\n让我们逐行分析这段代码：\n\n- 首先，我们导入 Template\
    \ 和 Context 类，它们在 Django 模块中可用。\n- 我们将模板的原始文本传递给某个变量。\n- 接下来，我们通过将 raw_template\
    \ 传递给 Template 类构造函数来创建一个模板对象 obj_t。\n- 我们创建一个 Context 对象 obj_c。Context 是一个接受\
    \ Python 字典的对象，该字典将变量名映射到值。\n- 最后，我们可以通过将 Context 传递给模板对象来调用其 render() 方法。\n\n\
    ## Django 模板语言\n\n- **变量**：它必须从 Context 中输出一个值，Context 是一个类似字典的对象，将键映射到值。变量用 {{\
    \ 和 }} 括起来，如下所示：\n  - I am learning {{ name1 }} with{{ name2 }}.\n  - 使用 context\
    \ {'name1': 'Python', 'name2': 'Django'}，输出如下：\n  - I am learning Python with\
    \ Django.\n\n字典查找、属性查找和列表索引查找使用点表示法（.）实现：\n\n- {{ my_own_dict.key }}\n- {{ my_own_object.attribute\
    \ }}\n- {{ my_own_list.0 }}\n\n**标签**：它在渲染过程中提供任意逻辑。标签可以输出内容，例如“if”语句或“for”循环等。标签用\
    \ {% 和 %} 括起来。\n\n```\n{% csrf_token %} #用于 <form> 标签中的身份验证目的。\n```\n\n**过滤器**：它转换变量和标签参数的值。它们看起来像这样：\n\
    \n```\n{{ django|title }}\n```\n\n我们有各种过滤器：\n\n**add**：将参数添加到值中。\n\n```\n{{ value|add:\"\
    2\" }} #如果 value 是 \"django\"，输出将是 \"Django\"。\n```\n\n**center**：值是一个给定宽度的字段。\n\
    \n```\n{{ value|center:\"2\" }} #如果 value 是 \"Django\"，输出将是 \" Django \"。\n```\n\
    \n其他过滤器如下：\n\n- date\n- cut\n- default\n- dictsort\n- divisible by\n- dictsortreversed\
    \ 以及更多。\n\n## 为什么使用引擎？\n\nDjango 模板：引擎是 Django 模板系统的一个实例。使用 Jinja 的好处：\n\n- **速度和性能**：它在加载时将模板源代码编译为\
    \ Python 字节码，因此模板只被解析一次，从而在运行时获得更好的性能。\n- **类似于 Django 模板**：它实际上受到 Django 模板的启发，因此两个系统之间有很多共同点。\n\
    - **异步执行**：Jinja 模板支持异步执行，这允许后台任务运行其流程——而不阻塞模板。\n- **灵活性**：它们可以包含宏等支持概念以及更类似 Python\
    \ 的构造。\n\n## 什么是加载器？\n\n模板加载器负责定位模板并返回模板对象。\n\n## 对模板引擎的支持\n\n配置或 Django 如何查找模板？\n\
    \n模板引擎在 TEMPLATES 设置中配置。它是一个包含所有配置的列表，每个引擎一个。\n\n```\nTEMPLATES = [\n    {\n \
    \       'BACKEND': 'django.template.backends.django.DjangoTemplates',\n      \
    \  'DIRS': ['template'],\n        'APP_DIRS': True,\n        'OPTIONS': {\n  \
    \          'context_processors': [\n                'django.template.context_processors.debug',\n\
    \                'django.template.context_processors.request',\n             \
    \   'django.contrib.auth.context_processors.auth',\n                'django.contrib.messages.context_processors.messages',\n\
    \            ],\n        },\n    },\n]\n```\n\nBackend 指向模板类的 Python 点分路径：内置后端是\
    \ 'Django.template.backends.Django.DjangoTemplates'。\n\n模板中使用的常见术语\n\n- **DIRS**：这是引擎应该查找的目录列表。\n\
    - **APP_DIRS**：它告诉引擎是否应该在应用程序内部查找模板。当为 True 时，Django 模板引擎会查找模板，然后模板引擎会查看已安装应用程序的\
    \ templates 子目录。\n\n创建站点模板\n\nDjango 没有为你创建 \\templates 文件夹，所以请自行创建。完成后，你的文件夹结构应如下所示：\n\
    \n```\n\\myclub_site # 你的应用文件夹\n    \\templates # 你的模板文件夹\n```\n\n128 ■ 精通 Django\n\
    \n- **Print**：这是一个用于调试的变量。\n- **Join**：它将返回一个字符串，该字符串是序列中字符串的连接。\n- **Trim**：trim\
    \ 过滤器用于去除前导和尾随空格，就像 Python 的字符串 strip() 方法一样。\n- **Slice**：它将提供一个迭代器并返回一个包含这些项目的列表的列表。\n\
    - **Truncate**：返回字符串的截断副本。\n- **Capitalize**：此过滤器将字符串变量的首字母大写。例如，如果变量包含 hello\
    \ Python，过滤器语句 {{variable | capitalize}} 输出 Hello Python。\n- **String**：string\
    \ 过滤器使字符串成为 Unicode（如果它还不是）。\n- **Reverse**：返回过滤序列的反转列表。\n- **Format**：对对象应用 Python\
    \ 映射字符串格式化。\n- **Center**：它居中对齐一个值，并用额外的空格字符填充，直到达到给定的字符参数。\n- **Int**：int 过滤器将值转换为整数。\n\
    - **urlencode**：它将转义一个值以用于 URL。例如，变量包含 http://localhost/data?type=cold&size=large，过滤器语句\
    \ {{variable| urlencode }} 输出 http%3A//localhost/data%3Ftype%3Dcold%26size%3Dlarge。\n\
    - **sort**：对序列进行排序。默认情况下，它按升序排序，如果你传递 True 作为第一个参数，它将反转排序。\n- **Replace**：它的工作方式类似于\
    \ Python 的 replace 字符串。第一部分是要替换的子字符串；第二部分是替换字符串。\n- **Length**：返回值的长度。\n- **Upper**：它将字符串字母的所有值转换为大写。例如，如果变量包含\
    \ Hello Python，过滤器语句 {{variable| upper}} 输出 HELLO PYTHON。\n- **Random**：它将从序列中返回一个随机项。\n\
    - **dictsort**：它将对字典进行排序并生成（键，值）对。因为字典是无序的，你可能想使用此函数来排序它们。\n- **Last**：返回序列的最后一项。\n\
    - **sum**：它将返回数字序列的总和，加上 start 参数提供的值（默认为 0）。\n- **first**：返回序列的第一项。\n- **List**：它将用于返回字符列表。例如，一个变量包含一个字母，过滤器语句\
    \ {{variable | list}} 生成 ['l', 'a', 'v', 'b', 't', 's']。\n- **title**：它将字符串字母的所有首字符值转换为大写。例如，如果变量包含\
    \ Hello Python，过滤器语句 {{variable| title}} 输出 Hello Python。\n- **file size format**：它将字节数转换为友好的文件大小字符串。例如，如果变量包含\
    \ 150，过滤器语句 {{variable| filesizeformat}} 输出 150 bytes。\n- **escape**：它从值中转义 HTML\
    \ 字符。具体来说，使用 escape 过滤器，\n  1. < 被转换为 <\n  2. > 被转换为 >，\n  3. '（单引号）被转换为 &#39;\n\
    \  4. \"（双引号）被转换为 &quot,\n  5. & 被转换为 &amp。\n- **Trim**：它用于去除前导和尾随空格，就像 Python\
    \ 的字符串 strip() 方法一样。\n- **urlize**：它将使你的文本 URL 变成可点击的 HTML 链接。\n\n130 ■ 精通 Django"
