    \n- **迭代器：** Python 迭代器对象必须实现两个独特的方法：`__iter__()` 和 `__next__()`，统称为迭代器协议。\n \
    \   - `__iter__()`：此函数返回一个迭代器对象，该对象遍历对象的每个元素。后续方法可通过 `__next__()` 函数访问。\n    -\
