    \ 会被自动获取。\n\n- **装饰器方法**：你可以使用 `csrf_protect` 装饰器，而不是添加 CsrfViewMiddleware，它在需要保护的特定视图上具有相同的功能。但它存在一个安全漏洞。\n\
