    # Django Template System Basic


    A template tag is surrounded by {% and %}. This is because Django''s tags are
    so flexible. Some examples performed by template tags are as follows:


    +   1. **Display Logic:** E.g., {% if %} Add {% endif %}

    2. **Loop Control:** E.g., {% for x in y %}...{% endfor %}

    3. **Block Declaration:** E.g., {% block content %}...{% endblock %}

    4. **Content Import:** E.g., {% include "header.html" %}

    5. **Inheritance:** E.g., {% extends "base.html" %}


    A template variable is surrounded by {{ and }}. These template variables are passed
    to the template at runtime in the Context.


    +   1. **Simple Variables:** E.g., {{ name }}

    2. **Object Attributes:** E.g., {{ page.heading }}

    3. **Dictionary Lookups:** E.g., {{ dict.item }}

    4. **List Indexes:** E.g., {{ list_items.2 }}

    5. **Method Calls:** E.g., {{ var.lower }}, {{ mydict.push }}'
