- md: "## Custom Middleware\n\nYou can have your own Middleware and install your Middleware\
    \ in the MIDDLEWARE portion at last.\n\n## How to Create Middleware?\n\n1. Create\
    \ Python package within a file named as middleware in `__init__.py`.\n2. Create\
    \ a file named `custommiddleware.py` and use regular class and functions.\n3.\
    \ Now write Middleware as function or class whose object are callable.\n\n```python\n\
    class CustomMiddleware:\n    def __init__(self, getback_response):\n        self.getback_response\
    \ = getback_response\n    def __call__(self, request):\n        # This Code that\
    \ is executed in each request before the view is called\n        response = self.getback_response(request)\n\
    \        # This Code that is executed in each request after the view is called\n\
    \        return response\n    def process_view(request, view_func, view_args,\
    \ view_kwargs):\n        # The code is executed just before the view is called\n\
    \    def process_exception(request, exception):\n        # The code is executed\
    \ if an exception is raised\n    def process_template_response(request, response):\n\
    \        # This code will execute if the response contains a render() method\n\
    \        return response\n```\n\nAlso, provide various built-in Middleware that\
    \ will allow you to write your Middleware. See in `setting.py` file of Django\
    \ project that already contains multiple Middleware to maintain the application's\
    \ security.\n\nThese are in-built Middleware in the file of `setting.py`. To activate,\
    \ Middleware app in your `MIDDLEWARE`, it should be within a single quote like\
    \ below:\n\n```python\nMIDDLEWARE = [\n    'your_app_name.middleware_directory.custom_middleware_file.CustomMiddleware_class',\n\
    \    'django.middleware.clickjacking.XFrameOptionsMiddleware',\n]\n```\n\n## Middleware\
    \ Methods\n\n1. `process_view (request, view_func, view_args, view_kwargs)`\n\
    \   It surely takes the HttpRequest object, function object, list of an argument\
    \ passed to the view. It returns either None or HttpResponse where the result\
    \ shows.\n2. `process_template_response (request, response)`\n   It takes two\
    \ parameters, the first is a reference of HttpRequest, and the second is the HttpResponse\
    \ object. It returns a response object that implements the render method.\n3.\
    \ `process_exception(request, exception)`\n   This method takes two arguments,\
    \ the first is the HttpRequest object, and the second is the Exception class object\
    \ that is read by the view function.\n\n## urls.py\n\nURL is a universal resource\
    \ locator used to provide the addresses of the resources that are present there\
    \ on the internet. It contains all the site deployment data, such as server names\
    \ and ports, that we should have for our website. In simple words, it tells Django\
    \ that a user comes with this URL, where to redirect them to the particular website\
    \ or image whatever it is.\n\n```python\nfrom django.urls import path\n# from\
    \ .urls import *\npatterns = [\n    path('',include('First.urls')),\n    path('',include('Framework.urls')),\n\
    \    path('admin/', admin.site.urls),\n]\n```\n\n## URL Mapping\n\nNow, we will\
    \ learn about the routing of applications. In the introduction, we learned about\
    \ MTV and that Django is a web application framework that receives user requests\
    \ through URL locator and responds. To handle the URL, Django uses the URLs module.\
    \ The above example shows how URLs are defined in Django.\nURLs contain various\
    \ functions, paths (routes, views, kwargs, names), and first arguments as a route\
    \ of string or regex type. In the second argument, the view is defined, which\
    \ returns a response (template) to this user.\n\n## Most Commonly Used Django\
    \ URL Functions\n\n| Function | Description | Example |\n| :--- | :--- | :---\
    \ |\n| `path(route, view, kwargs=None, name=None)` | It will return an element\
    \ for inclusion in url patterns | `path('index', views.index, name='main-view')`\
    \ |\n| `include(module, namespace=None)` | It is a function that takes a full\
    \ Python import path URLconf module that should be \"included\" in this place\
    \ | |\n\nLet's create a function in the `view.py`, and this function will be mapped\
    \ from the `url.py` of the same folder.\n\n```python\n# this is the url.py\nfrom\
    \ django.contrib import admin\nfrom django.urls import path\nfrom myapp import\
    \ views # Or (from myapp import *)\nurlpatterns = [\n    path('index/', index,\
    \ name=\"index\"),\n]\n```\n\nNow, run the server and enter `localhost:8000/index`\
    \ to the browser. The followed URL will be mapped into the list of URLs and call\
    \ the function from the views file. This is called URL mapping.\n\n```python\n\
    # views.py\nfrom django.shortcuts import render\nfrom django.http import HttpResponse,\
    \ HttpResponseNotFound\nfrom django.views.decorators.http import require_http_methods\n\
    \ndef index(request):\n    return HttpResponse('<h1>This is Http GET request for\
    \ index page.</h1>')\n```\n\nViews are represented as Python function or a method\
    \ of a Python class. But in the early time there were function-based views, as\
    \ Django start growing, the Django's developer added class-based views. Class-based\
    \ views add extra feature and extensibility to Django views. It has many built-in\
    \ class-based views. Examples:\n\n- **Base Views**\n  - View\n  - Template View\n\
    \  - Redirect View\n- **Generic Display View**\n  - Details View\n  - List View\n\
    - **Generic Editing View**: It will inherit from `django.views.generic.CreateView`.\n\
    \  - FormView\n  - CreateView\n  - UpdateView\n  - DeleteView\n\n```python\nclass\
    \ CustomCreateView(View):\n    templateName = 'form.html'\n    formName = MyForm\n\
    \    def get(self, request, *args, **kwargs):\n        form = self.formName\n\
    \        return render(request, template_name, {'form': form})\n    def post(self,\
    \ request, *args, **kwargs):\n        form = self.formName(request.POST)\n   \
    \     if form.is_valid():\n            form.save()\n            return HttpResponseRedirect('main')\n\
    \        else:\n            return render(request, self.templateName, {'form':\
    \ form})\n```\n\nFunctions-based View: They are callable function. It inherits\
    \ the method `as_view()` which uses a `dispatch()` method depending on the HTTP\
    \ verb (get, post, and so on). They accept an HttpRequest object and return raise\
    \ as exception.\n\nAdvantages:\n\n1. Simple to implement.\n2. Easy to read and\
    \ understand it's working.\n3. Direct usage of decorators.\n\nDisadvantages:\n\
    \n- Hard to extend as class-based views to reuse the code.\n- Handling various\
    \ HTTP method using branching.\n\n```python\ndef index(request):\n    return HttpResponse('<h1>This\
    \ is Http GET request for index page.</h1>')\n```\n\nYou can go for any method.\
    \ It totally depends on the context and the needs.\n\n## wsgi.py\n\nIt stands\
    \ for deploying our applications onto servers like Apache etc. **WSGI (Web Server\
    \ Gateway Interface)** can be a specification describing how the servers interact\
    \ with web applications. Here you will not be using the webserver, but the WSGI\
    \ server will take care of it. It describes the way how servers interact with\
    \ the applications.\n\n## asgi.py\n\n**Asynchronous Server Gateway:** It is an\
    \ interface that works similar to WSGI, but this is more useful than the others\
    \ because it gives better freedom in Django development.\n\n## EXPLORING THE APP\
    \ FOLDER\n\nThis project folder contains all the app default directories. Let's\
    \ have a look into the Django app structure in detail.\n\n![File structure.](img/6b248a6900b90aa4ebb02bce8e067804_81_0.png)\n\
    \nLet's go over the files of the first app folder in the application directory\
    \ to understand what they are used for.\n\n- **`__init__.py`**: This file is usually\
    \ an empty file that marks this directory as a Python package and has the same\
    \ functionality as the `__init__.py` file in the Django project structure.\n-\
    \ **`__pycache__`**: This contains byte code that makes the program start faster.\n\
    - **`admin.py`**: Django has an automatic admin interface in admin that you can\
