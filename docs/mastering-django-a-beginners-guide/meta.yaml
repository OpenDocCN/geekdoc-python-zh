  md: "# URL Dispatcher\n\nDjango allows you to design URLs clean and usable. To create\
    \ URLs for an app, you create a Python module informally called URLconf, i.e.,\
    \ URL configuration.\n\nHow does Django process a request?\n\nIt determines the\
    \ root URLconf module to use. The value will be the ROOT_URLCONF setting, but\
    \ if the incoming HTTPRequest object has URL conf attribute (), the discount will\
    \ be used in the place of the ROOT_URLCONF setting.\n\nIt loads the Python module\
    \ and paths for the variable urlpatterns.\n\nIt runs through each URL_pattern.\
    \ This should be a sequence of Django .URLs.path().\n\nIt imports the given view\
    \ once the URL pattern matches. The view gets past the following arguments.\n\n\
    +   1. An instance of HttpRequest.\n2. If the matched URL pattern contained no\
    \ name groups, then it matches from the regular expression.\n3. The keyword is\
    \ made up of any name parts matched by the path expression that is provided, overridden\
    \ with arguments specified in the optional kwargs.\n\nIf no URL matches, or if\
    \ an exception is raised during any point in this process, Django invokes an error\
    \ handling.\n\nExample:\n\n```\nfrom Django. URLs import path\nfrom. import views\n\
    urlpatterns = [\n    path('student/id/,student,name=student_login),\n    path('student/<int:year>/',\n\
    \    student,name=student_login),\n    path('student/<int:year>/<int:month>/',\
    \ views.\n    month_archive),\n]\n```\n\nNote: To get a value from the URL, use\
    \ angle brackets < >. <int: name>, this will add data type for URL so that user\
    \ can pass only one integer."
