    # Class-Based Views


    This is special view that takes a request and returns a response. Django provides
    a few examples of some classes which can be used as views. These will allow you
    to restructure and reuse code for your views by harnessing inheritance and mixins.


    +   - It supports the DRY convention of Django.

    - We can enlarge class-based views and can add extra functionality according to
    our requirements using mixin.

    - It allows inheriting methods and features from another class and can be modified
    for various use cases.


