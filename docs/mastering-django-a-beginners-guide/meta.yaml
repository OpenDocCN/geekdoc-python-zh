    # WHAT ARE EXCEPTIONS?


    These are those events in a program whose occurrence can lead to an unwanted behavior.
    They are able to detect errors by run-time executive or operating system. Exceptions
    do not always emerge from errors. Errors can only be caught, and a response can
    be generated only when all can be done. Exceptions are the only thing that the
    developers actually deal with every single day.


    # Exception in Python


    This part of this book offers exceptions, which are events that can modify the
    flow of control through a program. They are processed by the following five statements:


    +   1. **try/except**: It matches and recovers from exceptions raised by code,
    or by you.

    2. **try/finally**: It performs cleanup actions in the code, whether exceptions
    occur or not.

    3. **Raise**: It triggers an exception manually by the programmer in their code.

    4. **Assert**: It conditionally triggers an exception in your code and the condition
    is evaluated to True results.

    5. **With/as**: It implements context managers in Python 2.6 and 3.0.


    This topic was saved until nearly the end of this book because you need to know
    about it.'
