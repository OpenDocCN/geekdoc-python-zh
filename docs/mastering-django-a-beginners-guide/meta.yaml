    \        raise Exception(\"Student Name doesn't exist\")\n# 删除值的方法。\ndef __delitem__(self,name,student):\n\
    \    if name in self.student:\n        del self.student[name]\n        self.names.remove(name)\n\
    \    else:\n        raise Exception(\"Student Name doesn't exist\")\n```\n\n`__len__()`：类的\
