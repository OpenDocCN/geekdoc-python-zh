    # What Are Kwargs?


    **kwargs is a dictionary of keyword arguments. The double asterisk (**) symbol
    allows us to pass any number of arguments. A keyword argument is usually a dictionary.

    Here an example of a keyword argument is fun(a=1,b=17).

    **kwargs are similar to *args, except you declare the variables and the amount
    within the same function arguments.


    # Use of Args and Kwargs


    Args and kwargs are handy when you need to:


    +   - Pass multiple arguments in functions

    - Reduce code writing

    - Make your code more readable

    - Reuse the piece of code


    # Using Both Args and Kwargs in a Function


    When using both args and kwargs in the same function definition, *args must occur
    before **kwargs.


    ```

    def __init__(self, *args, **kwargs):

    ```


