    \n  使用pip设置虚拟环境\n\n  virtualenv your_environment_name 或者\n\n  python3 –m venv\
    \ your_environment_name（您可以为环境指定任何名称）\n\n接下来，通过使用ls命令列出所有目录来确认环境（名称可以是任何名称）目录已创建\n\
    \n- >ls\n\n一旦virtualenv完成设置您新创建的虚拟环境，现在打开Windows Explorer，查看virtualenv为您创建了什么。在您的主目录中，您现在将看到一个名为\
