    模板引擎来显示内容。它使用管理面板来支持任何语言。这个框架是可扩展的框架。Django 支持 MTV 模式，而不是 MVC。控制器由 Django 自身处理。我们需要关注模型、视图和模板。它既适合小型企业，也适合大型企业。它支持
    SQL 和 NoSQL 数据库，使小型企业能够从广泛的数据库中更轻松地选择解决方案。它基于 ORM 系统工作，这意味着它弥合了数据模型和数据库引擎之间的差距。小型企业可以受益于
    ORM 系统，使用关系数据库管理系统如 MySQL、Oracle、PostgreSQL，以及 NoSQL 数据库如 MongoDB 和 Google App
    Engine。Django 和 Python 被认为是可移植的。你可以将它们移植到许多平台，从 PC 和 Linux 到任何 PlayStation。Django
    总共有大约 40,000 个包来覆盖测试和调试。它是安全且最新的。


    使用这个框架，你的时间将得到节省。你不必花几个小时来编码。它完全遵循 Python，而 Python 社区非常庞大。你可以在互联网上找到任何代码。你也可以从它们的官方文档中获取。一旦你熟悉了它，你就可以广泛地使用它。它是当今最受欢迎的框架。它有自己的
    REST 框架来构建 API。


    本书涵盖了模型、视图和模板等主题。首先，你对 Python 语言有了一个简要的介绍。你应该了解 Python 的基础和语法，以及如何用 Python 语言编写内容。本书也涵盖了安装，然后你学习了进行项目的要求。我们还涵盖了一些关键的安装，如
    pip。不要困惑，它只是安装的一部分。然后我们查看了 Django 的文件结构，比如在哪里编写代码块，以便你对文件及其用途有所了解，这意味着逻辑部分、数据库部分和表示部分。在第
    4 章中，我们学习了语法，哪个文件负责这段代码（model.py），如何编写所有内容，何时将模型迁移到数据库中，等等。


    第 5 章基于视图。视图用于编写逻辑部分。所有类型的逻辑都应该写在这个文件中。下一章探讨了 Django 中的模板。这里我们使用 Jinja 模板作为模板引擎。这个模板非常方便，可以使语法清晰；我们很快就能知道这个模板文件中发生了什么。在管理面板中，你将看到迁移模型时存储的内容。这用于存储我们定义的模型的数据库。我们也可以检查和更新模型字段。第
    8 章告诉你如何在模板或模型文件中正确实现表单。整章包含内置功能，如它们的方法和函数。它使工作更容易。在第 9 章中，模型的高级特性通过其内置的 Python
    方法进行了定义。第 10 章回顾了部署。我们简要介绍了使用 Microsoft Azure、AWS Elastic Bean Stack 和 Git 进行
    Django 部署。在第 11 章中，我们有一个使用 Python 和 Django 框架的简单待办事项列表项目，具有功能和特性，如简单的 CRUD 操作和身份验证，用户可以随时存储和获取他们的数据。我们还涵盖了更多项目，如
    Django 中的测验应用。它将帮助你了解从哪里开始你的项目，并在未来帮助你更快地完成事情。我们还涵盖了 Django 与其他框架的比较研究，例如 Flask
    基于 Python，Node.Js 基于 JavaScript，Spring Boot 基于 Java。读完整本书后，初级和中级开发人员将获得更多关于 Python
    和 Django 的信息。尝试做一些小项目，以获得更多获得好工作的机会。你应该对 Python 和 Django 都有实践经验。当你真正知道你未来想成为什么样的人时，无论是全栈、前端还是后端开发人员，许多机会将为你敞开。同时，尝试保持对
    IT 领域最新技术的了解。


