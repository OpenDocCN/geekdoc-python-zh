    Command for using the Virtual Environment

    There are just a few commands that you should employ while using the virtual environment:


    +   1. **deactivate:** Exit the Python virtual environment

    2. **work on:** List all the available virtual environment

    3. **work name_of_venvironment:** Activate the current virtual environment

    4. **reversal name_of_venvironment:** Remove the specified virtual environment


    # INSTALLING DJANGO WITH PIP


