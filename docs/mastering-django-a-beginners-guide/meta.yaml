  mdcn: "## 自定义中间件\n\n你可以拥有自己的中间件，并在 `MIDDLEWARE` 部分的最后安装你的中间件。\n\n## 如何创建中间件？\n\n\
    1.  创建一个 Python 包，其中包含一个名为 `middleware` 的文件，并在 `__init__.py` 中定义。\n2.  创建一个名为\
    \ `custommiddleware.py` 的文件，并使用常规的类和函数。\n3.  现在，将中间件编写为函数或类，其对象是可调用的。\n\n```python\n\
    class CustomMiddleware:\n    def __init__(self, getback_response):\n        self.getback_response\
    \ = getback_response\n    def __call__(self, request):\n        # This Code that\
    \ is executed in each request before the view is called\n        response = self.getback_response(request)\n\
    \        # This Code that is executed in each request after the view is called\n\
    \        return response\n    def process_view(request, view_func, view_args,\
    \ view_kwargs):\n        # The code is executed just before the view is called\n\
    \    def process_exception(request, exception):\n        # The code is executed\
    \ if an exception is raised\n    def process_template_response(request, response):\n\
    \        # This code will execute if the response contains a render() method\n\
    \        return response\n```\n\n此外，还提供了各种内置中间件，允许你编写自己的中间件。请查看 Django 项目中的 `setting.py`\
    \ 文件，该文件已包含多个用于维护应用程序安全性的中间件。\n\n这些是 `setting.py` 文件中的内置中间件。要激活中间件应用，请在你的 `MIDDLEWARE`\
    \ 中添加，它应该用单引号括起来，如下所示：\n\n```python\nMIDDLEWARE = [\n    'your_app_name.middleware_directory.custom_middleware_file.CustomMiddleware_class',\n\
    \    'django.middleware.clickjacking.XFrameOptionsMiddleware',\n]\n```\n\n## 中间件方法\n\
    \n1.  `process_view (request, view_func, view_args, view_kwargs)`\n    它接收 `HttpRequest`\
    \ 对象、函数对象、传递给视图的参数列表。它返回 `None` 或 `HttpResponse`，其中结果会显示。\n2.  `process_template_response\
    \ (request, response)`\n    它接受两个参数，第一个是 `HttpRequest` 的引用，第二个是 `HttpResponse`\
    \ 对象。它返回一个实现了 `render` 方法的响应对象。\n3.  `process_exception(request, exception)`\n\
    \    此方法接受两个参数，第一个是 `HttpRequest` 对象，第二个是视图函数读取的 `Exception` 类对象。\n\n## urls.py\n\
    \nURL 是一个通用资源定位符，用于提供互联网上存在的资源的地址。它包含我们网站所需的所有站点部署数据，例如服务器名称和端口。简单来说，它告诉 Django，当用户访问此\
    \ URL 时，应将他们重定向到特定的网站或图像等。\n\n```python\nfrom django.urls import path\n# from\
    \ .urls import *\npatterns = [\n    path('',include('First.urls')),\n    path('',include('Framework.urls')),\n\
    \    path('admin/', admin.site.urls),\n]\n```\n\n## URL 映射\n\n现在，我们将学习应用程序的路由。在介绍中，我们了解了\
    \ MTV，并且 Django 是一个通过 URL 定位器接收用户请求并做出响应的 Web 应用程序框架。为了处理 URL，Django 使用了 URLs\
    \ 模块。上面的例子展示了如何在 Django 中定义 URL。\nURL 包含各种函数、路径（路由、视图、kwargs、名称），第一个参数是字符串或正则表达式类型的路由。在第二个参数中，定义了视图，该视图向此用户返回响应（模板）。\n\
    \n## 最常用的 Django URL 函数\n\n| 函数 | 描述 | 示例 |\n| :--- | :--- | :--- |\n| `path(route,\
    \ view, kwargs=None, name=None)` | 它将返回一个用于包含在 url 模式中的元素 | `path('index', views.index,\
    \ name='main-view')` |\n| `include(module, namespace=None)` | 这是一个函数，它接受一个完整的\
    \ Python 导入路径 URLconf 模块，该模块应在此处“包含” | |\n\n让我们在 `view.py` 中创建一个函数，该函数将从同一文件夹的\
    \ `url.py` 映射。\n\n```python\n# this is the url.py\nfrom django.contrib import\
    \ admin\nfrom django.urls import path\nfrom myapp import views # Or (from myapp\
    \ import *)\nurlpatterns = [\n    path('index/', index, name=\"index\"),\n]\n\
    ```\n\n现在，运行服务器并在浏览器中输入 `localhost:8000/index`。随后的 URL 将被映射到 URL 列表中，并从视图文件中调用函数。这称为\
    \ URL 映射。\n\n```python\n# views.py\nfrom django.shortcuts import render\nfrom\
    \ django.http import HttpResponse, HttpResponseNotFound\nfrom django.views.decorators.http\
    \ import require_http_methods\n\ndef index(request):\n    return HttpResponse('<h1>This\
    \ is Http GET request for index page.</h1>')\n```\n\n视图表示为 Python 函数或 Python 类的方法。但在早期，存在基于函数的视图，随着\
    \ Django 的发展，Django 的开发者添加了基于类的视图。基于类的视图为 Django 视图增加了额外的功能和可扩展性。它有许多内置的基于类的视图。例如：\n\
    \n- **基础视图**\n  - View\n  - Template View\n  - Redirect View\n- **通用显示视图**\n \
    \ - Details View\n  - List View\n- **通用编辑视图**：它将继承自 `django.views.generic.CreateView`。\n\
    \  - FormView\n  - CreateView\n  - UpdateView\n  - DeleteView\n\n```python\nclass\
    \ CustomCreateView(View):\n    templateName = 'form.html'\n    formName = MyForm\n\
    \    def get(self, request, *args, **kwargs):\n        form = self.formName\n\
    \        return render(request, template_name, {'form': form})\n    def post(self,\
    \ request, *args, **kwargs):\n        form = self.formName(request.POST)\n   \
    \     if form.is_valid():\n            form.save()\n            return HttpResponseRedirect('main')\n\
    \        else:\n            return render(request, self.templateName, {'form':\
    \ form})\n```\n\n基于函数的视图：它们是可调用的函数。它继承了 `as_view()` 方法，该方法根据 HTTP 动词（get、post\
    \ 等）使用 `dispatch()` 方法。它们接受一个 `HttpRequest` 对象并返回或引发异常。\n\n优点：\n\n1.  实现简单。\n\
    2.  易于阅读和理解其工作原理。\n3.  可直接使用装饰器。\n\n缺点：\n\n-   难以像基于类的视图那样扩展以重用代码。\n-   使用分支处理各种\
    \ HTTP 方法。\n\n```python\ndef index(request):\n    return HttpResponse('<h1>This\
    \ is Http GET request for index page.</h1>')\n```\n\n你可以选择任何方法。这完全取决于上下文和需求。\n\
    \n## wsgi.py\n\n它代表将我们的应用程序部署到 Apache 等服务器上。**WSGI（Web 服务器网关接口）** 可以是一个描述服务器如何与\
    \ Web 应用程序交互的规范。在这里，你将不使用 Web 服务器，而是由 WSGI 服务器来处理。它描述了服务器与应用程序交互的方式。\n\n## asgi.py\n\
    \n**异步服务器网关：** 它是一个与 WSGI 类似工作的接口，但它比其他接口更有用，因为它在 Django 开发中提供了更大的自由度。\n\n## 探索\
    \ APP 文件夹\n\n此项目文件夹包含所有应用程序的默认目录。让我们详细了解一下 Django 应用程序的结构。\n\n![文件结构。](img/6b248a6900b90aa4ebb02bce8e067804_81_0.png)\n\
    \n让我们浏览一下应用程序目录中第一个应用文件夹的文件，以了解它们的用途。\n\n-   **`__init__.py`**：此文件通常是一个空文件，用于将此目录标记为\
    \ Python 包，并且与 Django 项目结构中的 `__init__.py` 文件具有相同的功能。\n-   **`__pycache__`**：这包含字节码，使程序启动更快。\n\
    -   **`admin.py`**：Django 在 admin 中有一个自动管理界面，你可以用来管理内容。`admin.py` 用于将模型注册到 Django\
    \ 管理面板。所有现有的模型都有一个唯一的超级用户管理员，可以控制存储的信息。在这里，你可以注册你的模型以在该特定应用程序的管理面板中使用。我们将在接下来的章节中介绍模型。我们将使用名为\
    \ `django-import-export` 的包通过 Django 管理员导入和导出数据。\n-   **`apps.py`**：此文件是一个通用的入口点，处理应用程序的应用程序配置。这有助于用户包含任何应用程序配置，你也可以添加一些应用程序的属性。\n\
    \n```python\nfrom django.contrib import admin\nfrom .models import *\n# Register\
    \ your models here.\nadmin.site.register(Register)\n```"
