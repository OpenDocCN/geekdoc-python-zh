  md: '# HOW DOES IT WORK?


    When Django loads your URLconf from urls.py at server startup, it executes the
    admin. This function iterates over your INSTALLED_APPS setting and looks for a
    file called admin.py in each installed app. In the admin.py in our books app,
    each call to admin.site.register() registers the given model. The admin site will
    display an edit/change interface only. The app django.contrib.auth includes its
    admin.py, which is why the Users and Groups showed up automatically in the admin.
    Other Django. contrib apps include Django.contrib. The Django admin site is just
    a Django application, with its models, templates, views, and URL patterns given
    with the admin.


    # HOW SECURE IS DJANGO ADMIN?


    Django admin is handy at creating a database record to manage groups and users
    that give permissions to models at the level of reading, writing, modification,
    and according to what permission the user has. The Django admin itself is pretty
    safe. You can take additional measures by securing it via htaccess and force HTTPS
    access on it. The design is not responsive. Users on mobile devices need to do
    a lot of zooming and panning.


