    \ 示例：\n\n所有视图都继承自 View 类，该类处理将视图链接到 URL、HTTP 方法分发和其他常见功能。RedirectView 提供 HTTP\
    \ 重定向，TemplateView 扩展基类以使其也能渲染模板。\n\n- **在你的 URL 配置中使用**：使用通用视图的直接方法是在你的 URLconf\
    \ 中直接创建它们。如果你只是更改基于类的视图的少数属性，你可以将它们传递给 as_view() 方法调用本身：\n\n## 什么是通用视图？\n\n这是一种设置那些简单、复杂视图的简便方法，这些视图被称为通用视图；通用视图是类而不是函数。每个通用视图或类都可以被继承。一组通用视图类实现为\
    \ Django.views.generic。\n\n要掌握基于类的视图，我们必须在 urls.py 文件中使用 as_view()。\n\n```python\n\
    # urls.py\nfrom django.urls import path\nfrom myapp.views import NewView\nurlpatterns\
    \ = [\n    path('about/', NewView.as_view()),\n]\n```\n\n如何在代码中导入通用视图：\nfrom django.views.generic\
    \ import ListView\n\n## 通用视图的类型\n\n1. **CreateView**：它实现了在数据库中创建表实例的视图。它自动完成创建新实例的所有工作。我们只需要指定模型的名称来创建视图及其字段。\n\
    \n```python\nfrom .models import Employee\nfrom django.views.generic.edit import\
