    \n1. **AbstractUser**：它是一个完整的用户模型，字段作为抽象类，因此你可以从中继承数据并添加你的个人资料字段和方法。\n2. **AbstractBaseUser**：它只包含身份验证功能。你可以使用\
    \ `from django.contrib.auth.models import AbstractUser, AbstractBaseUser` 导入两者。\n\
    3. **User model**：\n\n```python\nfrom django.db import models\nfrom django.contrib.auth.models\
