    In base.html, the first step while creating templates for the project is to make
    the base template. It is used to set the top navigation bar and the footer, and
    provide the body canvas for any page. Using this base template, we can give a
    traditional look to our HTML page with any duplicate code. The base.html files
    can have huge lines of code.


    The topline shows that we were commenting on our text like that {# add any text}.
    The {% load static %} tag is used to add load in the static folder in the base
    file. This is the critical part of the templating language. It provides you with
    the specific features of the file that can be changed by pages that extend it.
    Any page that opens the base.html could easily change the title by writing {%
    block title %} Add Text {% end block title %}.


    Example:


    ```

    {% include ''navbar.html'' %}

    ```


    Include will help you to extend the page it always writes on top of the code.


    ```

    {% block content %}

    ```


    ...... In between the block, you can add your HTML code for rendering.


    ```

    {% end block %}

    ```


    This helps a lot more to extend your template and reduce the repetition of the
    common code like style sheets, JavaScript code, etc.


    +   - templates > Edit.html


    ```

    {% extends ''base.html'' %}

    {% block content %}

