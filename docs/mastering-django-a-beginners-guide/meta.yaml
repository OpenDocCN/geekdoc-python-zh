  mdcn: "## Azure 部署\n\n填写所需信息。我们将应用命名为 azure-Django-demo。请确保在填写配置时，系统选择 Linux，而非\
    \ Windows。\n\n![](img/6b248a6900b90aa4ebb02bce8e067804_236_0.png)\n\n找到已创建的应用服务资源。\n\
    \n![](img/6b248a6900b90aa4ebb02bce8e067804_236_1.png)\n\n屏幕上应弹出以下界面：\n\n![](img/6b248a6900b90aa4ebb02bce8e067804_237_0.png)\n\
    \n点击左侧边栏（浅色边栏，非深色）的“部署中心”。屏幕将显示包含三个步骤的“部署中心”弹出窗口。你将首先（1）通过 GitHub 部署，（2）使用应用服务构建服务，然后（3）配置你的用户名、仓库和分支。\n\
    \n![](img/6b248a6900b90aa4ebb02bce8e067804_237_1.png)\n\n最后，我们将对 Python 应用进行一些配置更改。在搜索栏中，找到“扩展”。滚动查找并点击最新的\
    \ Python 版本（目前为 Python 3.7）。添加后，我们将使用搜索栏搜索“配置”。在屏幕弹出的窗口中转到“常规设置”，并将堆栈和 Python\
    \ 版本分别更改为 Python 和 3.7。\n\n![](img/6b248a6900b90aa4ebb02bce8e067804_238_0.png)\n\
    \n你应该能够在 azure-django-demo.azurewebsites.net 访问你的网站。\n\n## Azure 部署文件\n\n要部署到\
    \ Azure，我们需要一个额外的文件 `requirement.txt`，它指定了为使应用正常工作需要安装的 Azure 包。如果你想访问实时 Azure\
    \ 应用，请在 `ALLOWED_HOST` 中添加 `'*'`，例如 `ALLOWED_HOST = ['*']`。\n\n## GIT\n\nGit 是一个免费且开源的分布式版本控制系统，用于管理和跟踪源代码历史记录；而\
    \ GitHub 是一个基于云的托管服务，用于收集 Git 仓库。如果你有一个使用 Git 的开源项目，那么 GitHub 旨在帮助你更好地管理它们。为什么我们需要两者？使用\
    \ Git 不需要 GitHub，但没有 Git 就无法使用 GitHub。\n\n- **安装 Git：** 你可以从其官方网站下载并安装到你的电脑上。Git\
    \ 有两种使用模式——bash 脚本 shell（命令行）和图形用户界面（GUI）。\n- **配置 GitHub 凭据：** 通过输入以下命令配置你的本地\
    \ Git 安装以使用你的 GitHub 凭据：\n    - `git config –global user.name \"输入你的名字\"`\n  \
    \  - `git config –global user.email \"email_address\"`\n- **克隆 GitHub 仓库：** 转到你在\
    \ GitHub 上的仓库。在右上角，打开“Clone or download”下拉菜单。复制通过 HTTPS 克隆的 URL。\n- **设置本地仓库：**\
    \ 打开你的项目位置，并在同一路径打开 Git bash。它可以从互联网下载。然后逐行运行以下代码：\n    - **`git init`：** 它将初始化\
    \ Git，即在你的项目中创建名为 `.git` 的文件夹。\n    - **`git add`：** 要添加所有文件，运行此命令并手动使用 `git add\
    \ folder/filename`。\n    - **`git commit –m`：** `'First Commit done'`。\n    -\
    \ `git remote add origin \"粘贴你在 GITHUB 上新仓库的 URL\"` 例如，`https://github.com/project_name.git`。\n\
    \    - **`git push –u origin`：** 它将把你的文件添加到你账户的 git 仓库中。\n    - **`git status`：**\
    \ 检查你当前的状态。\n\n## 章节总结\n\n在本章中，我们介绍了使用各种云平台（如 AWS Elastic Beanstalk、Microsoft\
    \ Azure、Github 和 Git）部署 Django。我们有多种通过互联网部署的选项，包括免费和付费。付费版将比免费版具有更多功能，因此如果你是初学者，首先使用免费版，熟悉环境后再考虑付费版。\n\
    \n![](img/6b248a6900b90aa4ebb02bce8e067804_240_0.png)\n\nTaylor & Francis\nTaylor\
    \ & Francis Group\nhttp://taylorandfrancis.com\n\n# 第 11 章\n\n## 使用 Python Django\
    \ 创建测验 Web 应用\n\n### 本章内容\n\n- 了解 Django 基础知识\n- 待办事项应用概述\n- 项目代码\n\n在本章中，初学者将在开始任何基于\
    \ Web 的应用或开发之前，学习 Python Django 的基础知识。在尝试任何项目之前，对基础知识有良好的理解非常重要。\n\n在讨论 Django\
    \ 之前，让我们先看看为什么需要 Web 框架。Web 框架是一种服务器应用框架，旨在支持动态网站。借助此框架，你无需费心于 Web 开发。市场上有各种 Web\
    \ 开发框架。其中一些如下：\n\n### REACT、FLASK、RUBY ON RAILS 等\n\nDjango 的主要特点之一是它基于 Python\
    \ 构建。它遵循 DRY 原则——“不要重复自己”。它负责用户内容管理、身份验证、站点地图等等。它具有高度安全性。它帮助所有其他开发人员避免许多常见的安全错误，例如\
    \ SQL 注入、跨站脚本、csrf/xsrf 和点击劫持。\n\n它具有相当好的可扩展性，例如使用共享无模式，这意味着你可以在任何阶段添加硬件——数据库服务器、缓存服务器或应用服务器。它还有许多其他优点：它具有自动管理界面、ORM、RSS\
    \ 源等等。它动态构建网站，速度极快，并且针对 SEO 进行了优化。\n\n## 如何在 PYTHON DJANGO 中创建测验列表应用\n\n让我们在 Django\
    \ 中开发自己的测验应用项目，让其他人使用测验来测试他们的知识。这将帮助你理解 Django Python 框架的基础知识以及如何设计前端和后端部分。每个人都喜欢尝试测验，最后查看分数，并查看尝试回答需要多长时间。你是否曾尝试制作一个其他人可以使用你的编程知识来玩的测验？如果你是\
    \ Django 初学者，那么这对你来说是一个完美的项目。它将提高你的前端技能，包括 HTML、CSS 等。\n\n### 目的\n\n我们项目的目标是使用\
    \ Python Django 框架制作一个包含不同主题的测验。对 Django 和前端技能的良好了解就足以完成该项目。\n\n### 项目先决条件\n\n\
    - **文本编辑器：** 任何文本编辑器，如 Visual Code、Brackets、PyCharm 等。你可以从互联网下载这些编辑器。这些编辑器可以帮助你最透彻地理解结构。\n\
    - **Python3：** 你的系统中应安装最新版本的 Python；访问 Python 官方网站获取。\n\n> 注意：你可以轻松地跟随此项目来理解 Python\
    \ 的基础知识，并学习循环、函数、类等；对于高级知识，你将学习 bash 和命令行。\n\n### 虚拟环境\n\n它作为 Python 相关项目的依赖项。它是自包含的，存在于所有\
    \ Python 相关包和所需版本中。强烈建议在单独的环境中创建和执行 Django 应用程序。Python 提供了 `virtualenv` 工具来创建隔离的\
    \ Python 环境。\n\n### 安装包\n\n创建虚拟环境（在你想创建 Django 项目的同一文件夹的终端中运行这些命令）。\n\n```\nC:\\\
    Users\\PC> python -m venv Virtual_name\n```\n\n更改目录\n\n```\nC:\\Users\\PC> cd\
    \ Virtual_name\n```\n\n激活环境：`Virtual_name/Scripts/activate`。\n\n```\nC:\\Users\\\
    PC> cd Virtual_name\nC:\\Users\\PC\\Virtual_name> cd Scripts.\nC:\\Users\\PC\\\
    Virtual_name\\Scripts> activate.\n(env) C:\\Users\\PC\\Virtual_name\\Scripts>\n\
    ```\n\n在同一文件夹中，使用 `pip install Django` 安装 Django。\n\n```\n(Virtual_name) C:\\\
    Users\\PC\\Virtual_name\\Scripts>\npip install django\n```\n\n安装步骤汇总；请查看以更好地理解。\n\
    \n```\nC:\\Users\\PC\\dd>python -m venv Virtual_env\nC:\\Users\\PC\\dd>cd Virtual_env\n\
    C:\\Users\\PC\\Quiz\\Virtual_env>cd Scripts\nC:\\Users\\PC\\Quiz\\Virtual_env\\\
