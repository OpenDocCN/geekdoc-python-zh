    \n在安装Django之前，请使用上述PIP命令安装虚拟环境设置。Python中的虚拟环境称为virtualenv，我们使用PIP在命令提示符中安装它：\n\
    \n- pip install virtualenv（图2.10）\n- 确保您的pip版本是最新的。您可以这样做。\n\n![](img/6b248a6900b90aa4ebb02bce8e067804_61_0.png)\n\
