    \ of your account. It is also called as two-factor authentication.\n\n- Install\
    \ the Heroku CLI.\n- If Heroku is already in your system, then check its version\
    \ using Heroku –version."
  mdcn: "## 从 Git 安装 Django\n\n可以通过克隆 Django Git 仓库到本地，直接从 Git 下载 Django。\n\nDjango\
    \ 使用 Git 进行源代码管理。请为您的操作系统下载 Git。Git 仓库托管在 Github 上。请在 Github 上创建账户，并像这样创建您 fork\
    \ 的本地副本。\n\n- 使用此命令将创建 Git 文件夹\n- git clone https://github.com/github_username/django.git\n\
    - 然后 cd 到 Django 文件夹（现在您的 Github 仓库将被称为“origin”）\n- 将 Django/Django 设置为“upstream”远程仓库（这指定了\
    \ Django 官方仓库的引用）\n- 执行这些 git 命令\n- git remote add upstream git@github.com:django/django.git.\n\
    - git fetch upstream\n\n> 注意：Django git 官方仓库：https://github.com/django/django。Git\
    \ 有很多命令，比如本地和远程的。我们需要在使用前理解这些命令。\n\n- **Git init**：它将使文件夹/目录成为 git 仓库\n- **Git\
    \ adds**：将文件添加到 Git 的暂存区。在 Git 中，提交任何存储之前总是使用 add。一次移动多个文件时，使用 Git add。（不要忘记在\
    \ add 后面加一个点）。\n- **Git status**：返回当前工作分支。如果文件在暂存区或没有更改，它将返回“nothing to commit”。\n\
    \n## 安装和创建 Django 项目\n\n在您的命令运行的确切位置，运行此命令安装 Django：\n\n44 ■ 精通 Django\n\n- pip\
    \ install Django\n\n    或者（您也可以像这样定义您的版本）\n\n    pip install django==1.8.13（图\
    \ 2.12）\n\n    在运行您的项目之前，请确保您位于项目位置，而不是在 /Scripts 文件夹中（图 2.13）。\n\n    创建您的 Python\
    \ 项目。\n\n- Django-admin startproject Project\n\n    （这将在您的位置创建 Project 名称文件夹，现在使用\
    \ cd 命令移入该文件夹。）\n\n    运行命令 django-admin startproject projectname。\n\n    然后将您的目录更改为\
    \ project。\n\n    在项目文件夹内运行 startapp，\n\n    django-admin startapp appname（图 2.14）。\n\
    \n    现在，您的 Python 项目已准备好运行。\n\n- python manage.py runserver\n\n    （上述命令帮助您运行您的\
    \ python 项目。）\n\n    PS C:\\Users\\PC\\Desktop\\Python-Project\\Project> Python\
    \ manage.py run server\n\n    Watching for file changes with StatReloader\n\n\
    ```\n(env) C:\\Users\\Dell\\Desktop\\Python-Project>cd ..\n(env) C:\\Users\\Dell\\\
    Desktop>cd Python-Project\n```\n\n图 2.13 移入根目录。\n\n```\n(env) C:\\Users\\Dell\\\
    Desktop\\Python-Project>django-admin startproject Project\n(env) C:\\Users\\Dell\\\
    Desktop\\Python-Project>cd Project\n(env) C:\\Users\\Dell\\Desktop\\Python-Project\\\
    Project>python manage.py runserver\nWatching for file changes with StatReloader\n\
    Performing system checks...\nSystem check identified no issues (0 silenced).\n\
    You have 1 unapplied migration(s) on Project. Your project may not work properly\
    \ until you apply the migrations for app(s): admin, auth, contenttypes, sessions.\n\
    Run 'python manage.py migrate' to apply them.\nDjango version 2.2.5, using settings\
    \ 'Project.settings'\nStarting development server at http://127.0.0.1:8000/\n\
    Quit the server with CTRL-BREAK.\n```\n\n图 2.14 移入项目目录。\n\n![](img/6b248a6900b90aa4ebb02bce8e067804_65_0.png)\n\
    \n安装成功！恭喜！\n您看到此页面是因为您的设置文件中 DEBUG=True，并且您尚未配置任何 URL。\n\n图 2.15 运行服务器。\n\n```\n\
    Performing system checks...\n\nSystem check identified no issues (0 silenced).\n\
