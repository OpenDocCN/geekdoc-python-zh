- md: "## RESULT PAGE\n\nCode only runs when it is properly added to your file. Then\
    \ we have div class with the id NavbarNav for toggling on the small screen. Next,\
    \ in the `<li>` tag, we keep the nav-item and active class to tell the browser\
    \ that this is the nav-item link, add the `<a>` tags with class nav-link; href\
    \ tells the template that this is the link for navigation. Similarly, other navigation\
    \ links in Jinja are written as `{% URL 'home' %}`: the first argument is URL\
    \ pattern name and the next argument is used as an argument in the URL.\n\nThe\
    \ next line lets you know whether the user is authenticated or not. The code `{%\
    \ if user.is_authenticated %}` describes that if the user is authenticated, it\
    \ will check authentication using the built-in method, i.e., it is_authenticated\
    \ if the user is authenticated, and then the next lines of code will run. It will\
    \ show the authenticate user name `{{request.user}}`. Always remember to end the\
    \ if block; the logout option is next to it, which will redirect the user to the\
    \ root.\n\n- templates > result.html\n\n```\n{% extends 'dependencies.html' %}\n\
    {% block content %}\n<div class=\"container \">\n    <div class=\"card-column\"\
    >\n        <div class=\"card\" align=\"centre \">\n            <div class=\"card-body\"\
    >\n                <h5 class=\"card-title\">Score: {{ score }}</h5>\n        \
    \        <p class=\"card-text\">Percentage: {{ percent }}</p>\n              \
    \  <p class=\"card-text\">Correct answers: {{ correct }}</p>\n               \
    \ <p class=\"card-text\">Incorrect answers: {{ wrong }}</p>\n                <p\
    \ class=\"card-text\">Total questions: {{ total }}</p>\n                <h5>All\
    \ the best for next quiz!</h5>\n            </div>\n        </div>\n    </div>\n\
    </div>\n{% endblock %}\n```\n\nThe above code will show you the result in sequence.\
    \ The result is processed in the view.py in-home function. Whenever there is no\
    \ False condition that occurs, the user will redirect after the successful execution\
    \ of the code `{{ variable }}`. Variables like score, percent, correct, wrong,\
    \ and the total will be shown using the syntax.\n\nFigure 11.4 shows the result\
    \ page.\n\n### url.py\n\n```\nfrom django.contrib import admin\nfrom django.urls\
    \ import path\nfrom django.urls.conf import include\nfrom quizapp.urls import\
    \ *\n\nurlpatterns = [\n    path('admin/', admin.site.urls),\n    path('', include('quizapp.urls')),\n\
    ]\n```\n\n- From django.contrib import admin\n\nIt is automatically looking for\
    \ an admin module in each application and importing them when it gets imported.\n\
    \n![FIGURE 11.4 Show your quiz result.](img/6b248a6900b90aa4ebb02bce8e067804_258_0.png)\n\
    \n- From django.urls import path\n\nThe path function contains the Django.URL\
    \ module. It is used for routing URLs to the appropriate view function within\
    \ an application using dispatcher (expression).\n\n- From django.urls.conf import\
    \ include\n\nA function that takes full import path to another URLconf module\
    \ where include can be added. The dot (.) operator, in this case, is shortcuts\
    \ accessing the current package.\n\n- From quizapp.urls import *\n\nquizapp.urls\
    \ are the URL file of the quiz app application, so here we are just importing\
    \ them to make them in use.\n\n```\nfrom django.urls import path\nfrom quizapp.views\
    \ import *\nfrom django.conf import settings\nfrom django.conf.urls.static import\
    \ static\n\nurlpatterns = [\n    path('', home, name='home'),\n    path('login/',\
    \ loginpage, name='login'),\n    path('logout/', logoutpage, name='logout'),\n\
    \    path('register/', registerpage, name='register'),\n]\n\nif settings.DEBUG:\n\
    \    urlpatterns += static(settings.MEDIA_URL,\n                          document_root=settings.MEDIA_ROOT)\n\
    ```\n\nIn url.py, we have an essential module that needs to be imported:\n\n-\
    \ From django.urls import path\n\nThe path function contains the Django.URL module.\
    \ It is used for routing URLs to the appropriate view function within an application\
    \ using dispatcher (expression).\n\n- From quizapp.views import *\n\nquizapp.urls\
    \ are the URL file of the quiz app application, so here we are just importing\
    \ them to make them in use.\n\n- From django.conf import settings\n\nIt abstracts\
    \ the default and site-specific setting also presents a single interface. The\
    \ setting file holds the value that your web app needs to work your database setting,\
    \ static files, API key, Secret key, and a bunch of stuff.\n\n- From django.conf.urls.static\
    \ import static\n\nFor setting, static needs to introduce the Django.contrib.static\
    \ in url.py file to make a path like STATIC_ROOT, MEDIA_ROOT, and MEDIA_URL and\
    \ STATIC_URL are for URL.\n\nUrlpattern is the tuple where you define the mapping\
    \ between the URLs and View. You are merging the path of MEDIA here for adding\
    \ images in the project.\n\n### form.py\n\n```\nfrom django.forms import ModelForm\n\
    from .models import *\nfrom django.contrib.auth.forms import UserCreationForm\n\
    from django.contrib.auth.models import User\n\nclass createuserform(UserCreationForm):\n\
    \    class Meta:\n        model = User\n        fields = ['username', 'password']\n\
    ```\n\nIn form.py, we will learn how to make the Form using built-in Form, i.e.,\
    \ UserCreationForm. First, import the package, and then from the package, import\
    \ the particular module for use in your project. So from Django, Forms is the\
    \ package, and the module name is ModelForm that we use in form.py. Second, we\
    \ import all the models of the particular application, (*) is the symbol that\
    \ fetches all the models from that file. There is no need to get them manually\
    \ from the .model import create user form.\n\nNext, we have UserCreationForm and\
    \ User. These are built-in modules in Django. Both have various data fields like\
    \ username, password, email, confirm password, and so on. Remember, you have to\
    \ write the model in class, not in function. Inside the create user form, we have\
    \ the class Meta, which provides us with all information related to Meta (brief\
    \ information about data). It has various fields like the model, fields, and so\
    \ on, but here we have only two models that define the model of that Form, like\
    \ where the Form data get stored and what kinds of attributes the Form has. Next,\
    \ we have fields username and password. Our Form has only two fields: the username\
    \ and password. With it, the user is able to log in with their own credentials.\
    \ There UserCreationForm overrides the fields of the other Form in it. If you\
    \ would like to use all the fields, then prefer a piece of code, fields=\"__all__\"\
    . These are used to take all the input at once with Form.\n\n### view.py\n\n```\n\
    from django.shortcuts import redirect, render\nfrom django.contrib.auth import\
    \ login, logout, authenticate\nfrom .forms import *\nfrom .models import *\nfrom\
    \ django.http import HttpResponse\nfrom django.contrib.auth.models import auth\n\
    \n# Create your views here.\ndef home(request):\n    if request.method == 'POST':\n\
    \        print(request.POST)\n        questions = QuestionsModel.objects.all()\n\
    \        score = 0\n        wrong = 0\n        correct = 0\n        total = 0\n\
    \        for q in questions:\n            total += 1\n            print(request.POST.get(q.question))\n\
    \            print(q.answer)\n            print()\n            if q.answer ==\
    \ request.POST.get(q.question):\n                score += 10\n               \
    \ correct += 1\n            else:\n                wrong += 1\n        percent\
    \ = score / (total * 10) * 100\n        context = {\n            'score': score,\n\
    \            'correct': correct,\n            'wrong': wrong,\n            'percent':\
    \ percent,\n            'total': total\n        }\n        return render(request,\
    \ 'result.html', context)\n    else:\n        questions = QuestionsModel.objects.all()\n\
    \        context = {\n            'questions': questions\n        }\n        return\
    \ render(request, 'home.html', context)\n\ndef registerPage(request):\n    if\
    \ request.user.is_authenticated:\n        return redirect('home')\n    else:\n\
    \        form = createuserform()\n        if request.method == 'POST':\n     \
    \       form = createuserform(request.POST)\n            if form.is_valid():\n\
    \                user = form.save()\n                return redirect('login')\n\
    \        context = {\n            'form': form,\n        }\n        return render(request,\
    \ 'register.html', context)\n\ndef loginPage(request):\n    if request.user.is_authenticated:\n\
    \        return redirect('home')\n    else:\n        if request.method == \"POST\"\
    :\n            username = request.POST.get('username')\n            password =\
    \ request.POST.get('password')\n            user = authenticate(request, username=username,\
    \ password=password)\n            if user is not None:\n                login(request,\
    \ user)\n                return redirect('/')\n        context = {}\n        return\
    \ render(request, 'login.html', context)\n\ndef logoutPage(request):\n    auth.logout(request)\n\
    \    return redirect('/')\n```"
  mdcn: "## 结果页面\n\n代码只有在正确添加到文件中后才会运行。接着我们有一个 `div` 元素，其 `id` 为 `NavbarNav`，用于在小屏幕上切换显示。然后，在\
    \ `<li>` 标签中，我们保留了 `nav-item` 和 `active` 类，以告知浏览器这是一个导航项链接，并添加了带有 `nav-link` 类的\
    \ `<a>` 标签；`href` 属性告诉模板这是一个导航链接。类似地，Jinja 中的其他导航链接写作 `{% URL 'home' %}`：第一个参数是\
    \ URL 模式名称，下一个参数用作 URL 中的参数。\n\n下一行代码让你知道用户是否已通过身份验证。代码 `{% if user.is_authenticated\
    \ %}` 描述了如果用户已通过身份验证，它将使用内置方法（即 `is_authenticated`）进行检查，然后接下来的代码行将运行。它将显示已验证的用户名\
    \ `{{request.user}}`。始终记得结束 `if` 代码块；注销选项紧邻其后，它会将用户重定向到根目录。\n\n- templates > result.html\n\
    \n```\n{% extends 'dependencies.html' %}\n{% block content %}\n<div class=\"container\
    \ \">\n    <div class=\"card-column\">\n        <div class=\"card\" align=\"centre\
    \ \">\n            <div class=\"card-body\">\n                <h5 class=\"card-title\"\
    >Score: {{ score }}</h5>\n                <p class=\"card-text\">Percentage: {{\
    \ percent }}</p>\n                <p class=\"card-text\">Correct answers: {{ correct\
    \ }}</p>\n                <p class=\"card-text\">Incorrect answers: {{ wrong }}</p>\n\
    \                <p class=\"card-text\">Total questions: {{ total }}</p>\n   \
    \             <h5>All the best for next quiz!</h5>\n            </div>\n     \
    \   </div>\n    </div>\n</div>\n{% endblock %}\n```\n\n上述代码将按顺序显示结果。结果在 `view.py`\
    \ 的 `home` 函数中处理。只要没有出现 `False` 条件，用户将在代码 `{{ variable }}` 成功执行后被重定向。像 `score`、`percent`、`correct`、`wrong`\
    \ 和 `total` 这样的变量将使用该语法显示。\n\n图 11.4 展示了结果页面。\n\n### url.py\n\n```\nfrom django.contrib\
    \ import admin\nfrom django.urls import path\nfrom django.urls.conf import include\n\
    from quizapp.urls import *\n\nurlpatterns = [\n    path('admin/', admin.site.urls),\n\
    \    path('', include('quizapp.urls')),\n]\n```\n\n- `from django.contrib import\
    \ admin`\n\n当它被导入时，它会自动在每个应用中查找 `admin` 模块并导入它们。\n\n![图 11.4 显示你的测验结果。](img/6b248a6900b90aa4ebb02bce8e067804_258_0.png)\n\
    \n- `from django.urls import path`\n\n`path` 函数包含在 `Django.URL` 模块中。它用于使用分发器（表达式）将\
    \ URL 路由到应用程序中适当的视图函数。\n\n- `from django.urls.conf import include`\n\n一个函数，它接受另一个\
    \ `URLconf` 模块的完整导入路径，可以在其中添加 `include`。在这种情况下，点（`.`）运算符是访问当前包的快捷方式。\n\n- `from\
    \ quizapp.urls import *`\n\n`quizapp.urls` 是测验应用的 URL 文件，因此这里我们只是导入它们以使其可用。\n\n\
    ```\nfrom django.urls import path\nfrom quizapp.views import *\nfrom django.conf\
    \ import settings\nfrom django.conf.urls.static import static\n\nurlpatterns =\
    \ [\n    path('', home, name='home'),\n    path('login/', loginpage, name='login'),\n\
    \    path('logout/', logoutpage, name='logout'),\n    path('register/', registerpage,\
    \ name='register'),\n]\n\nif settings.DEBUG:\n    urlpatterns += static(settings.MEDIA_URL,\n\
    \                          document_root=settings.MEDIA_ROOT)\n```\n\n在 `url.py`\
    \ 中，我们有一个需要导入的重要模块：\n\n- `from django.urls import path`\n\n`path` 函数包含在 `Django.URL`\
    \ 模块中。它用于使用分发器（表达式）将 URL 路由到应用程序中适当的视图函数。\n\n- `from quizapp.views import *`\n\
    \n`quizapp.urls` 是测验应用的 URL 文件，因此这里我们只是导入它们以使其可用。\n\n- `from django.conf import\
    \ settings`\n\n它抽象了默认和站点特定的设置，并提供了一个单一接口。设置文件保存了你的 Web 应用程序工作所需的值，包括数据库设置、静态文件、API\
    \ 密钥、密钥以及一堆其他内容。\n\n- `from django.conf.urls.static import static`\n\n为了设置静态文件，需要在\
    \ `url.py` 文件中引入 `Django.contrib.static`，以创建像 `STATIC_ROOT`、`MEDIA_ROOT` 和 `MEDIA_URL`\
    \ 以及 `STATIC_URL` 这样的路径。\n\n`urlpatterns` 是一个元组，你可以在其中定义 URL 和视图之间的映射。你在这里合并了\
    \ `MEDIA` 的路径，以便在项目中添加图片。\n\n### form.py\n\n```\nfrom django.forms import ModelForm\n\
    from .models import *\nfrom django.contrib.auth.forms import UserCreationForm\n\
    from django.contrib.auth.models import User\n\nclass createuserform(UserCreationForm):\n\
    \    class Meta:\n        model = User\n        fields = ['username', 'password']\n\
    ```\n\n在 `form.py` 中，我们将学习如何使用内置的 `Form`，即 `UserCreationForm` 来创建表单。首先，导入包，然后从该包中导入特定的模块以在你的项目中使用。因此，从\
    \ `Django` 中，`Forms` 是包，模块名是 `ModelForm`，我们在 `form.py` 中使用它。其次，我们导入特定应用程序的所有模型，`(*)`\
    \ 是一个符号，用于从该文件中获取所有模型。无需手动从 `.model` 导入 `create user form`。\n\n接下来，我们有 `UserCreationForm`\
    \ 和 `User`。这些是 Django 中的内置模块。两者都有各种数据字段，如 `username`、`password`、`email`、`confirm\
    \ password` 等。记住，你必须在类中编写模型，而不是在函数中。在 `create user form` 内部，我们有 `class Meta`，它为我们提供了所有与\
    \ `Meta` 相关的信息（关于数据的简要信息）。它有各种字段，如 `model`、`fields` 等，但这里我们只有两个模型，它们定义了该表单的模型，例如表单数据存储在哪里以及表单具有哪些类型的属性。接下来，我们有字段\
    \ `username` 和 `password`。我们的表单只有两个字段：`username` 和 `password`。有了它，用户就能够使用自己的凭据登录。`UserCreationForm`\
    \ 覆盖了其中其他表单的字段。如果你想使用所有字段，那么建议使用代码 `fields=\"__all__\"`。这些用于通过表单一次获取所有输入。\n\n\
    ### view.py\n\n```\nfrom django.shortcuts import redirect, render\nfrom django.contrib.auth\
    \ import login, logout, authenticate\nfrom .forms import *\nfrom .models import\
    \ *\nfrom django.http import HttpResponse\nfrom django.contrib.auth.models import\
    \ auth\n\n# Create your views here.\ndef home(request):\n    if request.method\
    \ == 'POST':\n        print(request.POST)\n        questions = QuestionsModel.objects.all()\n\
    \        score = 0\n        wrong = 0\n        correct = 0\n        total = 0\n\
    \        for q in questions:\n            total += 1\n            print(request.POST.get(q.question))\n\
    \            print(q.answer)\n            print()\n            if q.answer ==\
    \ request.POST.get(q.question):\n                score += 10\n               \
    \ correct += 1\n            else:\n                wrong += 1\n        percent\
    \ = score / (total * 10) * 100\n        context = {\n            'score': score,\n\
    \            'correct': correct,\n            'wrong': wrong,\n            'percent':\
    \ percent,\n            'total': total\n        }\n        return render(request,\
    \ 'result.html', context)\n    else:\n        questions = QuestionsModel.objects.all()\n\
    \        context = {\n            'questions': questions\n        }\n        return\
    \ render(request, 'home.html', context)\n\ndef registerPage(request):\n    if\
    \ request.user.is_authenticated:\n        return redirect('home')\n    else:\n\
    \        form = createuserform()\n        if request.method == 'POST':\n     \
    \       form = createuserform(request.POST)\n            if form.is_valid():\n\
    \                user = form.save()\n                return redirect('login')\n\
    \        context = {\n            'form': form,\n        }\n        return render(request,\
    \ 'register.html', context)\n\ndef loginPage(request):\n    if request.user.is_authenticated:\n\
    \        return redirect('home')\n    else:\n        if request.method == \"POST\"\
    :\n            username = request.POST.get('username')\n            password =\
    \ request.POST.get('password')\n            user = authenticate(request, username=username,\
    \ password=password)\n            if user is not None:\n                login(request,\
    \ user)\n                return redirect('/')\n        context = {}\n        return\
    \ render(request, 'login.html', context)\n\ndef logoutPage(request):\n    auth.logout(request)\n\
    \    return redirect('/')\n```"
