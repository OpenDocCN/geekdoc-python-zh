    - **String**: The string filter makes a string Unicode if it isn’t already.

    - **Reverse**: Return a reversed list of the sequence filtered.

    - **Format**: Apply Python mapping string formatting on an object.

    - **Center**: It center aligns a value and pads it with additional white space
    characters until it reaches the given argument of characters.

    - **Int**: The int filter converts a value into an integer.

    - **urlencode**: It will escape a value for use in URLs. For example, variable
    contains http://localhost/data?type=cold&size=large the filter statement {{variable|
    urlencode }} outputs http%3A//localhost/data%3Ftype%3Dcold%26size%3Dlarge.

    - **sort**: Sort a sequence. By default, it sorts ascending, and if you pass it
    True as the first argument, it will reverse the sorting.

    - **Replace**: It will work just like Python replace string. The first part of
    the sub-string should be replaced; the second is the replacement string.

    - **Length**: Return the length of the value.

    - **Upper**: It will convert all values of a string of letters to uppercase. For
    example, if a variable contains Hello Python, the filter statement {{variable|
    upper}} outputs HELLO PYTHON.

    - **Random**: It will return a random item from the sequence.'
