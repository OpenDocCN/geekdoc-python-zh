    \    -   IntegrityError\n    -   InternalError\n    -   ProgrammingError\n   \
    \ -   NotSupportedError\n\n我们在以下情况下引发这些错误：\n    -   找不到数据库\n    -   接口不存在\n  \
    \  -   数据库未连接\n    -   输入数据无效，等等。\n\n4.  **HTTP Exceptions**：Django 的 HttpResponse\
    \ 类是一个子类。HTTP 是一种协议。该模块提供异常和特定的响应。\n5.  **Transaction Exceptions**：一系列数据库查询被称为一个事务。这是你会找到最微小查询的地方，也称为原子查询。当在这个原子级别发生错误时，`Django.DB.transaction`\
    \ 模块会解决它。\n6.  **Testing Framework Exceptions**：`Django.test` 包也附带了许多异常。\n\n##\
    \ ADVANCED VIEW AND URLS\n\n这是定义视图和 URL 的旧方法。\n\n```python\nfrom django.conf.urls.defaults\
    \ import *\npatterns = patterns('',\n    (r'^index/$', 'mysite.views.indx'),\n\
