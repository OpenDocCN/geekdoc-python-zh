    ## DJANGO VS. SPRING BOOT


    什么是 Spring Boot？

    它是一个用于创建业务应用程序的知名 Java 框架。它是一个基于 Web 的应用程序，具有明确的观点。它使你能够快速启动一个产品，一个独立的应用程序。它使用
    Java 编写，其背后的概念是让事情变得简单。它减少了启动和运行应用程序所需的工作量。它为你提供了依赖分离等功能。


    ![](img/6b248a6900b90aa4ebb02bce8e067804_297_0.png)


    Spring Boot 与 Django 的比较。


    一些 Spring Boot 特性：


    - 它允许快速创建 Web 应用程序。

    - 一些嵌入式服务器对于执行应用程序很有价值。

    - 它允许你通过使用 YAML 文件在不同内容中操作相同的应用程序。

    - 它确保应用程序的安全。

    - 它依赖于注解和 XML 文件。Spring Boot 使项目入门变得简单。


    让我们来看看基于 Java 的 Spring Boot 框架与 Django 中使用的基于 Python 的框架相比如何。


    | Django | Spring Boot |

    |---|---|

    | 它是免费的、开源的，且易于学习 | 它是免费的、开源的。 |

    | 它是一个基于 Python 的 Web 开发框架 | 它是一个基于 Java 的 Web 开发框架 |

    | 比 Spring Boot 简单，Django 很受欢迎 | Spring 是一个基于 Java 的框架，理解起来可能具有挑战性 |

    | 它也提供快速的 Web 开发 | 它提供了快速创建 Java 项目的设施 |

    | 它比 Spring Boot 环境更难设置 | 使用 SB 设置和启动一个项目很简单 |

    | 它拥有庞大的社区 | 与 Django 相比，它的社区较小 |

    | 它提供全文搜索 | 它没有全文搜索的概念 |


    在将其他框架与 Django 进行比较后，我们了解到每个框架都有其特点。有些框架适合小型开发，有些适合大型开发。它们允许开发者使用模块来加速增长。因此，请明智地选择你的框架。


    ## 章节总结


    在本章中，你了解了基于 Python 的框架 Django 与 Flask、Node.Js 和 Spring Boot 之间的区别。Django 拥有 Flask、Node.Js
    和 Spring Boot 所不具备的各种功能。每个框架都有其优缺点。选择使用哪一个取决于你自己。


    ## 评价


    如果你想成为一名全栈开发者，这本书将帮助你从零开始。目前，开发正处于顶峰。你可能已经看到许多大公司已经从零开始，随着新技术的开发开展工作。他们都在学习并将技术应用到他们的产品中。全栈开发技能的基础包括
    Web 技术，如 HTML、CSS 和 JavaScript，以及数据库、框架等等。现在你可以通过使用第三方包来扩展它们的功能。技术世界在不断变化，随着需求的增长和技术需要提供有效代码产品的时期，新技术经常被各种公司引入。你为什么想成为一名全栈开发者？关于它，什么知识是重要的？


    全栈开发者了解多种技术，如前端和后端技术。他们熟悉所有这些技术。没有强制要求你必须适合全栈。你可以选择前端（客户端）或后端（服务器端）。前端开发者的技能包括
    HTML、CSS、JavaScript，以及前端开发的重要方面，如用户体验、一些验证和响应式设计。他们必须至少熟悉一个前端框架，如 Angular.js、React、Vue.js、JQuery
    等。了解框架也会增加你在全球获得好工作的机会。一旦他们掌握了前端，就可以进一步转向后端。后端开发所需的技能是至少掌握一种后端语言（PHP、Java、C#、Ruby、.Net、Python）的知识，以及数据库、服务器配置和
    API 的经验。数据库层管理也是全栈的一部分。他们必须处理一些基本查询，如从服务器（无论是基于云的还是本地安装的）存储、创建和管理数据。流行的全栈开发包括
    LAMP Stack、MEAN STACK、MERN STACK、PHP Full Stack、Python Full Stack、Java Full Stack
    和 Django Full Stack。许多人已经选择全栈开发作为职业，未来还会有更多人这样做。由于其广泛的开发，它需求量很大。当你进入这个领域时，职业道路就向你敞开了。你可以选择任何方向，也可以通过学习新事物来改变你的道路。他们构建动态、创新的软件，提供持续改进的见解，并根据需要移除功能；他们还可以管理开发团队并与他们进行良好的沟通。


    他们发展哪些角色？全栈开发者通常会在前端基础（如上所述）、服务器端基础和用户体验设计方面获得多样化的工作，即在设计应用程序时，必须仅考虑客户的观点。因此，全栈开发者必须具备设计
    UX 组件的能力。数据库架构和设计，即了解数据库，对于这样的开发者来说是必须的。数据库将如何构建？如何进行部署？——业务逻辑，即开发者必须从业务角度构建代码。项目管理是另一项技能，可以让你提升全栈工作的水平。多任务处理，即全栈，会让他们在学习工作的同时处理多项任务。除了全栈开发之外，还会有更多选择。如果你觉得合适，你可以选择它，但你应该具备类似的技能组合。这种方法的一个基本事实是，他们在一两个领域高度熟练，而不是在所有领域。他们对所有相关技术都有一个大致的了解。有时，单人开发难以处理；有一个好的团队领导可以提升你的技能组合。


    如何成为一名全栈开发者？仔细阅读以上内容，你肯定会很好地了解从哪里开始你的开发者之旅。首先，你需要在一些知名公司获得几年的专业培训，以学习这些技术。你不能仅通过学习就成为一名全栈开发者。获取一些实践经验。这完全在于不断学习并在前端和后端开发方面获得经验。


    有许多资源和课程可供学习全栈 Web 开发。但要始终问自己你想成为什么，以及在哪个职业中你会得到好的指导。


    这就是全栈开发的全部内容。现在让我们来谈谈最流行的基于 Python 的框架——Django。'
