    # DJANGO DEPLOYMENT INTERFACES


    There are various options for deploying your Django project application based
    on your pattern or particular business needs.

    Django, being a web framework, needs a web server to operate. And since most web
    servers don''t natively speak Python, we need an interface to make that communication
    happen.

    Django currently supports two interfaces: WSGI and ASGI.

    These two files are located inside the project.


    # WSGI


    WSGI is the leading Python standard for communication between web servers and
    applications, but it only supports synchronous code. WSGI is the Web Server Gateway
    Interface. It describes how a webserver executes the web app and sends the information
    to the client. It plays an indispensable role at the time when you deploy your
    Django or Flask Application.

    Why is it necessary?

    It is servers that are designed to handle so many requests concurrently. All frameworks
    are not made to process thousands of submissions. That''s why we use it to speed
    up your Python web application development because you only need to know basic
    things about WSGI.'
