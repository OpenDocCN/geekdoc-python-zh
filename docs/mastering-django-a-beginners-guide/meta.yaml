    \ https://www.python.org/downloads/source/。\n\n## 什么是PIP？\n\nPython的标准包管理器允许我们安装和管理不属于Python标准库的额外包。pip代表“首选安装程序”或“Pip安装包”。如果您使用的是旧版本，则需要安装PIP。\n\
    \n在Windows上安装PIP\n要安装PIP，请输入以下内容：\n\n- Python get-pip.py\n- 您可以使用以下命令查看目录内容：dir\n\
