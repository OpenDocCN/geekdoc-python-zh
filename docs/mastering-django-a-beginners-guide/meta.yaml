    \ id=\"id_name\" maxlength=\"100\" name=\"name\" type=\"text\" />\n</li>\n<li>\n\
    <label for=\"id_age\">Age:</label>\n<input class=\"numberinput formcontrol\" id=\"\
    id_age\" name=\"age\" type=\"number\"/>\n</li>\n</div>\n |\n| `{{ form.as_table\
    \ }}` | html\n<tr>\n<th>\n<label for=\"id_name\">Name:</label>\n</th>\n<td>\n\
    <input class=\"textinput textInput form-control\" id=\"id_name\" maxlength=\"\
