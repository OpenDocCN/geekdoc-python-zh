    \nOn the logout page(), the method name auth.logout(request) is used for logging\
    \ out only if the user is logged in. This option will only come when the user\
    \ is authenticated.\n\n### app.py\n\n```python\nfrom django.apps import AppConfig\n\
    \nclass QuizappConfig(AppConfig):\n    default_auto_field = 'django.db.models.BigAutoField'\n\
    \    name = 'quizapp'\n```\n\nIt is a configuration that is common to all Django\
    \ applications. The AppConfig used to configure the application has a path attribute.\
    \ The name of the class is in-app. Y is similar to the name of your application.\
    \ Its word letter must be capital pass parentheses add AppConfig. the default_auto_field\
    \ is an attribute and the default value is DEFAULT_AUTO_FIELD if BigAutoField.\
    \ BigAutoField is an auto-incrementing primary key according to the available\
    \ IDs like AutoField.\n\n## WHAT IS THE PURPOSE OF THIS PROJECT?\n\nIn this project\
    \ you have learned Python and Django from scratch. It has shown you how to make\
    \ syntax and logic. Now you are able to make your own project. The concepts we\
    \ have used in this project are related to authentication, model, templating,\
