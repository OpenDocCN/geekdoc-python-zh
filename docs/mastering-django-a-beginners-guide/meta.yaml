    # Rendering a Template


    When you have a Template object, you can pass its data by giving it a context:


    ```

    from django.template import Context, Template

    obj_t = Template(''You are learning {{ name }}.'')

    obj_c = Context({''name'': ''Python with Django''})

    t.render(c)

    ```


    A context is a similar to a set of template variable names and their values. A
    template uses a context to populate its variables. A context in Django is represented
    by the Context class. The Template object''s render() method with the Context
    is called to “fill” the template. We should point out here that the return value
    of obj_t.render(obj_c) is a Unicode object – not a normal Python string.

    Let''s step into this code one statement at a time:


    +   - First, we import the Template and Context classes, which are available in
    the module, which is Django. Template.

    - We pass the raw text of our template into some variable.'
