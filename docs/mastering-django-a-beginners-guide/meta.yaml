  mdcn: "## 第八章\n\n# Django 表单\n\n## 本章内容\n\n- HTML 表单\n- 表单类\n- 小部件\n- 遍历表单字段\n-\
    \ Django crispy forms\n- 用户创建表单\n\n在上一章中，我们学习了管理后台、其工作原理、注册以及许多功能。在这里，我们将讨论 Django\
    \ 最核心的主题——Django 表单。\n\n## HTML 表单\n\n它们用于从用户那里获取输入以收集数据。它们非常易于使用，并为你处理所有验证。在\
    \ HTML 中，表单是 `<form>..其他代码..</form>` 内各种元素的集合，允许用户执行诸如输入文本、选择选项、操作对象或控件、添加图像等操作，然后将这些信息发送回服务器。它们还具有各种属性，如\
    \ method、enctype、name 等。`<form>` 元素内部可能包含一个或多个元素：\n\n- `<input>`：用于在表单中输入文本\n\
    - `<textarea>`：用于输入文本，如你的消息、反馈\n- `<button>`：用于向服务器提交数据\n- `<select>`：用于下拉列表\n\
    - `<option>`：应写在 `<select>` 内部\n- `<label>`：用于定义名称\n\n```html\n<form>\n  <p>First\
    \ Name: <input type=\"text\" name=\"firstname\"></p>\n  <p>Last Name: <input type=\"\
    text\" name=\"lastname\"></p>\n  <p><input type=\"submit\" value=\"Submit\"></p>\n\
    </form>\n```\n\n### 链接到包含表单的页面\n\n```html\n<a href=\"{% url 'post' %}\" class=\"\
    title\"> You can place text, image or anything else between the anchor tag </a>\n\
    ```\n\n它是一个 HTML 元素，用于创建指向另一个 URL 的链接。在实现时，链接可以包裹文本、图像或按钮，以便用户可以与之交互并访问链接的目标地址。\n\
    \n`<a>` 元素的一个重要属性是 href 属性，它指示链接的目标地址。它具有各种属性，应写在锚标签内：\n\n| 属性 | 描述 |\n| :---\
    \ | :--- |\n| download | 目标将被下载 |\n| href | 指定 URL |\n| rel | 设置当前文档与其他链接文档之间的关系\
    \ |\n| type | 指定链接文档的媒体类型 |\n| target | _blank, _parent, _self, _top，它指明在哪里打开链接文档\
    \ |\n\n## Input 标签\n\n这个 `<input>` 标签描述了一个输入字段，用户可以在其中输入数据。根据 type 属性的不同，它可以以多种方式显示。不同的输入类型如下：button、checkbox、color、date、email、number、password、submit\
    \ 和 file。这些是常用的示例。\n\n```html\n<input type=\"text\" class=\"form-control\"\ntype=\"\
    submit\" name=\"username\">\n```\n\n## Django 在表单中的作用\n\nDjango 的表单可以简化并自动化大部分工作，并且比大多数程序员在代码中能做的更可靠。我们可以在任何地方使用它，因为它不会占用太多空间。Django\
    \ 处理包含三个不同的部分：\n\n- 准备和重构数据，使其准备好呈现给用户\n- 为数据创建 HTML 表单\n- 接收和处理来自客户端的提交表单和数据\n\
    \n## Django 表单\n\nDjango 提供了表单类，允许你创建 HTML 表单。它还描述了表单及其工作方式和外观。表单类的每个字段都映射到 HTML\
    \ 表单的 `<input>` 元素，每个字段本身就是一个类。它管理表单数据并在提交表单时执行验证。\n\n```python\nfrom django import\
    \ forms\nfrom .models import Post\n#this is the forms\nclass CustomForm(forms.Form):\n\
    \    first_name = forms.CharField(max_length=50)\n    last_name= forms.CharField(max_length=50)\n\
    #this is the form that the model automatically creates\nclass PostForm(forms.ModelForm):\n\
    \    class Meta:\n        model = Post\n        fields = ('first_name', 'last_name',)\n\
    ```\n\n### forms.Form 与 forms.ModelForm\n\n有两种表单是从 forms 创建的。在 ModelForm 中，我们必须声明哪个模型将用于创建我们的表单。\n\
    \n首先，我们必须导入 Django 表单 (`from django import forms`) 和我们的 ModelName 模型 (`from .models\
    \ import ModelName`)。ModelNameForm，正如你可能猜测的那样，是我们自定义表单的名称。有必要告诉 Django 这个表单是一个\
    \ ModelForm——表单。ModelForm 负责这一点。接下来，我们有一个 class Meta（Meta 提供关于数据的信息），它告诉 Django\
    \ 应该使用哪个模型来创建这个表单 (`model = ModelName`)。最后，我们在其中添加一些字段，如 title 和 text。\n\n‘Form’\
    \ 指的是 HTML `<form>` 或 Django 表单，它为表单提供结构，我们可以在任何文件的任何地方通过导入来使用它。每个网站至少有一个表单，用户可以与之交互。\n\
    \n表单有两个基本的状态属性：\n\n1. **is_bound**：如果返回 False，则表单处于未绑定状态，即一个具有空或默认字段值的新表单。如果为\
    \ true，则表单已绑定；即至少一个字段已设置用户输入。\n2. **is_valid()**：如果返回 true，则绑定表单中的每个字段都具有有效数据。如果为\
    \ false，则至少一个字段中存在一些无效数据，或者表单未绑定。\n\n### Django 表单类\n\n表单类描述了一个表单，定义了它的工作方式和外观。例如，一个\
    \ ModelForm 通过一个 FormIt 将模型类的字段链接到 HTML 表单 `<input>` 元素，该 FormIt 在浏览器中以 HTML ‘小部件’\
    \ 的形式呈现给用户。\n\n### 绑定和未绑定的表单实例\n\n- **未绑定表单**：这是一个没有与之关联数据的表单。当呈现给用户时，它将是空的或包含默认值。\n\
    - **绑定表单**：这是一个已提交数据的表单，可用于判断数据是否有效。当呈现一个无效的绑定表单时，它包含内联错误消息，告诉用户需要更正哪些数据。\n\n\
    ## 小部件\n\n它是 Django 对 HTML 输入元素的表示。小部件处理所有 HTML 的渲染。\n\n```python\nfrom django\
    \ import forms\nclass CustomForm(forms.Form):\n    title = forms.CharField(widget\
    \ = forms.Textarea)\n    description = forms.CharField(widget = forms.CheckboxInput)\n\
    \    views = forms.IntegerField(widget = forms.TextInput)\n    available = forms.BooleanField(widget\
    \ = forms.Textarea)\n```\n\n小部件表示为一个 HTML 输入元素。Django 使用适合要显示的数据类型的默认小部件。这将识别一个带有注释的表单，该注释使用较大的\
    \ Textarea 小部件而不是默认的 TextInput 小部件。\n\n### 表单类\n\n```python\nfrom django import\
    \ forms\nclass NameForm(forms.Form):\n    name = forms.CharField(label='Your name',\
    \ max_length=100)\n```\n\n表单渲染选项：\n\n- `{{ form.as_table }}`：它会将它们渲染为包裹在 `<tr>`\
    \ 标签中的表格单元格。\n- `{{ form.as_p }}`：它会将它们渲染为包裹在 `<p>` 标签中。\n- `{{ form.as_ul }}`：它会将它们渲染为包裹在\
    \ `<li>` 标签中。"
