    ModelName.objects.all().order_by(''title'',''data'').first()

    ModelName.objects.all().order_by(''title'',''data'').last()

    ModelName.objects.all().filter(id=2).delete()

    ModelName.objects.all().filter(pk=id).last()

    ```'
