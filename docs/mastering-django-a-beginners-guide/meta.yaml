    # HOW TO USE DJANGO FRAMEWORKS?


    Let’s see the proper step to configure the Django project.

    We can start with the overview of the command line in your system. There are many
    commands one can use, and the following six commands are frequently used in Django
    development:


    +   - cd (change down a directory/folder)

    - cd .. (change up a directory)

    - ls (list files in your current directory)

    - PWD (print working directory)

    - mkdir (make directory)

    - touch (create a new record)


    # HOW DOES DJANGO CODE LOOK LIKE?


    The code consists of URLs, views, models, and templates. The below figure shows
    how data pass in Django. The user interacts with the browser and clicks on links
    that work as URLs of the particular application. The user’s data is stored in
    Django using Models, Python objects, that define the structure of an application’s
    data and give us privileges to manage (add, modify, delete) and record queries
    in the database. Users can see the content using templates. HTML files work as
    templates in Django. All the information passes by the views. Views are requested
    handler function which receives HTTP requests and returns HTTP responses. Views
    access the data needed to satisfy demands via models and delegate the response
    formatting to templates.


