  md: '# WHAT IS URL ROUTING?


    Before using the Regular Expressions to Django, we need to understand what URL
    routing is; it is actually pretty simple to understand. It is just a matter of
    how Django understands what the user is requesting.

    These routes are called static routes.


    | Path | URL Route | View Name |

    |---|---|---|

    | http://example.com/ | / | IndexPageView |

    | http://example.com/about/ | /about/ | AboutPageView |

    | http://example.com/user/id | /user/id/ | UserIdView |


    What will these do?


    +   - / - render the root page of the project.

    - /about/- render the about page when user requests.

    - /user/id- render the user with its id number. User will get to know the data
    whatever user is added.


    These routes are called dynamic routes.


    | Path | URL Route | View Name |

    |---|---|---|

    | http://example.com/user/data/content | /user/data/content | UserDataContent
    |

    | http://example.com/about/compan-name | /about/company-name | AboutCompanyView
    |

    | http://example.com/user/id | /user/id/ | UserIdView |


    The above examples are static routes in that they never change. The /about/ path
    will always be the /about/ path (unless we manually change it).

    The handler (view) will be the exact same for both paths. The only way for the
    View (handler) to know which post to display, it must accept some additional values.


    +   - The keyword arguments is where you give a name to a variable as you pass
    it into the function.

    - django.URLs.path() or django.URLs.re_path().


    In Django, we create dynamic URLs with path converters. A path converter has a
    simple syntax:'
