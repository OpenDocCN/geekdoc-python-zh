    \ seen order_by. You can use both in a single line of code.\n\n```python\nStudent.objects.filter(country=\"\
    US\").order_by(\"-name\")\n[<Student: 'SAM'>, <Marks: 89>]\n```\n\n## Slicing\
    \ Data\n\nSuppose you have the data of thousands of Students in your database,\
    \ and you want data in various forms like first Student's data, only 100 students'\
    \ data, data of students between 1 and 50. The slicing concept appears. You can\
    \ get data with indexing, i.e. [].\n\n```python\nStudent.objects.order_by('name')[0]\
    \  # for only first\nStudent.objects.order_by('name')[0:100]  # 1 to 100 excluding\
    \ 100.\n```\n\nUsing an operator in Django ORM:\n\n- 1. And\n- 2. Or\n\nAn operator\
    \ is used to bind the condition with each other when we need the record matching\
    \ with two or more requirements.\nIt can be done with three ways:\n\n- 1. query_1\
    \ & query_2\n- 2. filter(<condition_1>, <condition_2>)\n- 3. filter(<condition_1>\
    \ & <condition_2>)\n\n## Syntax\n\n```python\nStudent.objects.filter(name__startswith='Sam')\
    \ &\nStudent.objects.filter(name__startswith='Jam')\n\nStudent.objects.filter(name__startswith='Sam',\n\
    \                       name__startswith='Jam')\n\nStudent.objects.filter(Q(name__startswith='Sam')\
    \ &\n                       Q(name__startswith='Jam'))\n```\n\nAll queries will\
    \ have the same result.\nHow to clear Relation set:\n\n```python\np2.student.clear()\n\
    p2.student.all()\n# OUTPUT\n<QuerySet []>\n```\n\n## Many-to-One Relationships\n\
    \nA many-to-one relationship is where one entity (typically a column or a set\
    \ of columns) contains values that refer to another entity (a column or a group\
    \ of columns) with unique values (in RDBMS).\nTo define many-to-one relationship,\
    \ use Foreign Key:\n\n```python\nfrom django.db import models\n\nclass Student(models.Model):\n\
    \    first_name = models.CharField(max_length=30)\n    last_name = models.CharField(max_length=30)\n\
    \n    def __str__(self):\n        return self.first_name\n\nclass Article(models.Model):\n\
    \    marks = models.CharField(max_length=100)\n    student = models.ForeignKey(Student,\
    \ on_delete=models.CASCADE)\n\n    def __str__(self):\n        return self.marks\n\
    ```\n\nExamples are similar to many-to-many relationships.\n\nCreate a new Student:\n\
    \n```python\nadd = Student.objects.create(username='rahul20',\n              \
    \               first_name='Rahul', last_name='Shakya')\n```\n\nSave data in the\
    \ student model:\n\n```python\ns1 = Student(name='ROHAN')\ns1 = Student(name='SOHAN')\n\
    s1.save()\n```\n\nThis is how you can save student in Django. Save() is an inbuilt\
    \ method which saves data in the database.\n\nGet all the data:\n\n```python\n\
    # using all() method\ndata = Student.objects.all()\n# output\n<QuerySet [<Student:\
    \ ROHAN>, <Student: SOHAN>]>\n```\n\nRetrieving single object from QuerySets:\n\
    The get() returns the single object directly with the parameter passed in the\
    \ parentheses. It finds the match object and returns it in QuerySet result.\n\n\
    ```python\n# using the get() method.\nget_data = Student.objects.get(pk=1)\nget_data\n\
    <Student: Jam>\n\nget_data = Student.objects.get(name='ROHAN')\nget_data\n<Student:\
    \ ROHAN>\n```\n\nFiltering the records:\nThe QuerySet return by all() describes\
    \ all records in the database. But sometimes we want to select only limited information\
    \ from the database, which can be done by adding the filter conditions.\n\n```python\n\
    data_filter = Student.objects.filter(name=\"SOHAN\")\n```\n\nUsing Exclude() Method:\n\
    It returns a new QuerySet contain that do not match with the given parameter.\n\
    \n```python\ndata_filter = Student.objects.exclude(name=\"SOHAN\")\n# OUTPUT\n\
    <Student: SOHAN>\n```\n\n## SOME IMPORTANT FIELD LOOKUPS\n\nIn Django, we have\
    \ various field lookups, which are similar to the SQL WHERE clause. They are only\
    \ used with filter(), exclude(), and get(). Every lookup should be prefixed __name_of_lookup.\
    \ It is case-sensitive.\n\nExample:\n\nUse of starts with the standard:\n\n```python\n\
    Student.objects.filter(fname__startswith='Aman')\n```\n\nUse of exact:\n\n```python\n\
    Student.objects.get(lname__exact='Singh')\n```\n\nUse of contains:\n\n```python\n\
    Student.objects.filter(surname__contains='Gill')\n```\n\n## One-to-One Relationships\n\
    \nA one-to-one relationship exists when each row in one table has only one corresponding\
    \ row in a second table.\n\nTo define a one-to-one relationship, use OneToOneField:\n\
    \n```python\nfrom django.db import models\n\nclass Student(models.Model):\n  \
    \  first_name = models.CharField(max_length=30)\n    last_name = models.CharField(max_length=30)\n\
    \n    def __str__(self):\n        return self.first_name\n\nclass Article(models.Model):\n\
    \    marks = models.CharField(max_length=100)\n    student = models.OneToOneField(Student,\
    \ on_delete=models.CASCADE)\n\n    def __str__(self):\n        return self.marks\n\
    ```\n\nExamples are similar to many-to-many relationships.\n\nSome rules for the\
    \ field:\n\n- 1. A field name cannot be a Python identifier or reserved word because\
    \ it will show you the Syntax error.\n\n```python\nclass Example(models.Model):\n\
    \    break = models.IntegerField()  # 'break' is a reserved key word!\n```\n\n\
    - 2. A field name should only have one underscore, not more than one underscore\
    \ (__) in a row, and the field name cannot end with an underscore, and it is invalid:\n\
    \n```python\nclass Example(models.Model):\n    first__name = models.CharField()\
    \  # 'first__name' is a reserved word!\n```\n\n- 3. **Meta Options**: Model Meta\
    \ is the inner class of your model class. Model Meta is used for changing your\
    \ model fields' behavior like changing order options, verbose_name, and many other\
    \ options. It is completely optional to add a Meta class to your model.\n\n```python\n\
    class student(models.Model):\n    class Meta:\n        options.......\n```\n\n\
    ## 4. Model Attributes\n\n- **Objects**: The most crucial attribute of the model\
    \ is the model's manager. It is the interface through which database query operations\
    \ are provided to the Django model and is used to get the instances from the database.\n\
    - **Model methods**:\n  - `__str__()`: This is a “magic method” that returns a\
    \ string representation of any object.\n\n```python\nclass Example(models.Model):\n\
    \    first__name = models.CharField()  # 'first__name' is a reserved word!\n```\n\
    \nPython model has various advantages:\n\n- **Simplicity**: Python is not only\
    \ easier than writing SQL, but it is also easier for programs to build web applications\
    \ with clean, readable, and maintainable code by taking advantage of syntax.\n\
    - **Consistency**: SQL is inconsistent across different databases. A model can\
    \ describe your data once, and there is no need to create different sets of SQL\
    \ statements for every database to which the application will be easily deployed.\n\
    - **Version Control**: Storing models in your database makes it easier to keep\
    \ track of design changes.\n- **Metadata**: Having a model described in code rather\
    \ than SQL allows for particular data types and provides the capacity to store\
    \ much more metadata than SQL.\n\n## WHY DO WE USE MODELS?\n\nDjango’s model is\
    \ written in Python and provides a mapping to the underlying database structure.\
    \ Django uses a model to execute SQL behind the scenes to return Python data structures\
    \ – which Django calls QuerySets.\n\n## CONFIGURING THE DATABASE\n\nWe will assume\
    \ you have set up a database server, activated it, and created a database within\
    \ it (e.g., using CREATE DATABASE statement). If you are using SQLite, no such\
    \ setup is required because SQLite uses standalone files in the Django file system\
    \ to store its data.\n\nSQL Lite:\n\n```python\nDATABASES = {\n    'default':\
    \ {\n        'ENGINE': 'django.db.backends.sqlite3',\n        'NAME': BASE_DIR\
    \ / 'db.sqlite3',\n    }\n}\n```\n\nIn the previous chapter, we heard about setting.py.\
    \ SQLite is previously added as default.\n\n## Types of Database\n\n| Setting\
    \ | Database |\n| :--- | :--- |\n| PostgreSQL | PostgreSQL |\n| Postgresql_psycopg2\
    \ | PostgreSQL |\n| oracle | Oracle |\n| MySQL | MYSQL |\n| sqlite3 | SQLite |\n\
    \n## Connecting to Database\n\nConnecting settings are used in this order:\n\n\
    - 1. Options\n- 2. NAME, USER, PASSWORD, HOST, PORT\n- 3. MySQL options files.\n\
    \nOn the other hand, if you set the name of the database in OPTIONS, this will\
    \ take precedence over NAME, which would override anything in an MYSQL option\
    \ file.\nMYSQL database:\n\n```python\n# settings.py\nDATABASES = {\n    'default':\
    \ {\n        'DATABASE_ENGINE': 'django.db.backends.mysql',\n        'DATABASE_NAME':\
    \ 'home/db/djangodatabase',\n        'DATABASE_USER': 'dbadmin',\n        'DATABASE_PASSWORD':\
    \ '12345',\n        'DATABASE_HOST': 'localhost',\n        'DATABASE_PORT': '3306',\n\
    \    }\n}\n```\n\nYou will need to download and install the appropriate database\
    \ adapter, no matter whichever database back-end you may be using. Each one is\
    \ available for free on the Web. If you have a Linux system, your distribution’s\
    \ package-management system might offer convenient packages (look for the package\
    \ called python-PostgreSQL or python-psycopg). For example:\n\n- DATABASE_ENGINE\
    \ = \"django.db.backends.MySQL\"\n- DATABASE_NAME tells Django the name of your\
    \ database. For example,\n- DATABASE_NAME = \"djangodatabase\""
