  mdcn: "## 掌握 Django\n\n```python\nfrom django.apps import AppConfig\n\nclass FirstConfig(AppConfig):\n\
    \    default_auto_field = 'django.db.models.BigAutoField'\n    name = 'First'\n\
    ```\n\n- **views.py**：视图是接收 Web 请求并返回响应的 Python 函数。它决定了我们在渲染 Django Web 应用时看到的内容。这个文件至关重要，`view.py`\
    \ 负责实际处理 HTTP 请求。\n\n    在你的视图文件中导入所有 URL 以供后续使用。\n\n    ```python\n    from .models\
    \ import *\n\n    def User(request):\n        return render(request, 'user_details.html')\n\
    \    ```\n\n## 迁移文件夹\n\n迁移文件夹包含应用的迁移文件。这些文件用于对数据库应用更改，并具有数据库架构的版本控制功能。每当我们执行 `makemigrations`\
    \ 和 `migrate` 命令时，更改会自动应用。\n\n## models.py\n\n这些是我们所使用的数据库结构的蓝图，因此包含了数据库的信息。它是你应用中最重要的文件之一。它遵循\
    \ MTV 设计架构。\n\n```python\nfrom django.db import models\n\n# 在此处创建你的模型。\nclass\
    \ Register(models.Model):\n    Username = models.CharField(max_length=20)\n```\n\
    \n## urls.py\n\n它处理和搜索所有 URL 的 URL 模式。该文件用于将应用中的 `Views.py` 与主机 Web URL `apps.py`\
    \ 链接起来。在 `urls.py` 中，`^` 表示 URL 的开始，`$` 表示 URL 的结束。其前后不能添加任何额外内容。\n\n## tests.py\n\
    \n此文件包含用于应用程序运行的不同测试用例。几乎每个单独创建的应用程序中都存在此文件。它将帮助你为数据库编写简单的测试用例。\n\n## 需要创建的文件和目录\n\
    \n当你处理 Django 项目时，你会在过程中创建许多新的附加文件和目录。最常见的文件如下：\n\n- **模板目录**：Django 项目的另一个重要组成部分。模板是\
    \ MTV 模式中的 “T”。你可以在模板中编写网站的显示逻辑。它基本上包含不同的 HTML 文件。你可以在根目录中创建模板文件夹。\n\n- **静态目录**：你应该在根目录中创建静态目录。这将包含被视为静态文件的\
    \ CSS 文件、JavaScript 文件和图像。\n\n## DJANGO 命令\n\n让我们讨论一些 Django 命令。\n\n## 创建项目的目录结构\n\
    \n以下命令创建项目目录。一个项目可以包含多个应用。\n\n- `Django-admin.py startproject project_name`\n\n\
    ## 在项目中创建新应用\n\n以下命令创建应用目录。你可以在项目中创建多个应用。\n\n```bash\npython manage.py startapp\
    \ APPNAME\n```\n\n## 运行服务器\n\n以下命令有助于在本地服务器上部署你的项目：\n\n- `python manage.py run\
    \ server`\n\n## 创建数据库迁移\n\n`makemigrations` 命令创建迁移文件。这些文件随其余代码一起移动，并在其他环境中应用：\n\
    \n- `python manage.py makemigrations`\n\n## 迁移数据库\n\n`migrate` 命令更新数据库架构。在进行迁移后，请始终使用以下命令：\n\
    \n- `python manage.py migrate`\n\n## 创建管理员用户\n\n`createsuperuser` 命令创建主管理账户。此用户默认拥有所有权限（添加、编辑、更新、删除）。当我们在项目文件夹终端中运行此命令时，它会要求提供电子邮件、用户名和密码。请确保你必须使用强密码和唯一的用户名。\n\
    \n- `Python manage.py createsuperuser.`\n\n## 在 Git Bash 中创建管理员用户\n\n- `winpty\
    \ python manage.py createsuperuser`\n\n## DJANGO 是一个松耦合框架\n\n它被称为松耦合框架，因为其 *MVT\
    \ 模式*，这是 MVC 架构的一个变体，与服务器代码完全不同。它有助于将服务器代码与客户端相关代码分离。这些组件相互支持，降低了维护项目应用程序的风险。Django\
    \ 被称为松耦合框架。\n\n## Django 的 URL 配置\n\n这个原则在实践中有一些很好的例子。在 Django 应用程序中，URL 定义及其调用的视图函数是松耦合的。\n\
    \n> 如果两段代码是松耦合的，那么对其中一部分进行的持续更改对另一部分的影响很小或没有影响。\n\n## 附加配置\n\n你可以为你的 Django 项目添加什么额外内容？\n\
    \n- Bootstrap\n- 静态文件\n- 媒体文件\n- 模板\n\n这些将涵盖在你的项目中安装 Bootstrap 所需的所有必要事项。所以让我们首先谈谈\
    \ Bootstrap 是什么。它是用于快速、无任何问题地开发响应式和基于移动设备的网站的最受欢迎的 CSS 框架。它包含各种类，你可以在 HTML 标签中使用。它是一个专注于简化网页开发的\
    \ HTML、CSS 和 JS 库。有多种方法可以将 Bootstrap 添加到你的项目中。\n\n- **在你的本地系统中安装 Bootstrap**：访问\
    \ Bootstrap 的官方网站 “https://getbootstrap.com/docs/3.4/getting-started” 并单击 Download\
    \ Bootstrap 按钮；它将下载到你的 PC 上。然后从下载的 zip 文件夹中提取文件，然后你只需将该文件夹复制到你的项目中并添加它。在下载之前，你还会得到三个选项：Bootstrap\
    \ 本身、源代码和 Sass。\n\n- **直接在你的项目中通过 script 标签添加其 CDN**：在同一官方网站下方，你将获得 Bootstrap\
    \ CDN。复制该 CDN 链接并将其粘贴到你的 HTML 文件中。将 CSS 链接粘贴到 HTML 的 head 部分，将 script 链接粘贴到 `</body>`\
    \ body 结束标签上方的 script 标签本身中。\n\n    示例：\n\n    ```html\n    <!--这是 CSS 链接-->\n\
    \    <link rel=\"stylesheet\" href=\"https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css\"\
    >\n    <!--这是 Js 链接-->\n    <script src=\"https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js\"\
    ></script>\n    ```\n\n- 使用终端，运行命令来安装它。\n    1. 使用 bower 安装，使用如下简单命令：\n      \
    \  `C:\\Users\\PC\\Project> bower install bootstrap`\n    2. 使用 npm 安装\n     \
    \   `C:\\Users\\PC\\Project> npm install bootstrap@3`\n    3. 使用 composer 安装\n\
    \        `C:\\Users\\PC\\Project> composer require twbs/bootstrap`\n\n但在 Django\
    \ 中，你可以使用一个使事情更容易实现的终端。现在在你的项目中创建一个名为 `static` 的文件夹或目录，然后在你的 `setting.py`（位于你的主项目文件夹中）中添加几行代码。\n\
    \n```python\nimport os\nSTATIC_DIR = os.path.join(BASE_DIR, 'static')\nSTATIC_URL\
    \ = '/static/'\n```\n\n要在模板中加载你的静态文件，请在你的基础 `.html` 文件开头添加以下代码，然后你就可以访问你的静态文件夹了。\n\
    \n```django\n{% load static %}\n```\n\n在 `setting.py` 中添加上述代码行。确保你的目录与上述相同。上述代码定义了你导入\
    \ `os` 模块，然后将应用程序的基础路径与你的静态文件夹连接起来。现在在你的项目基础模板（即包含项目每个页面上相同渲染内容的标准模板文件）中加载这个静态文件夹。在你的项目中添加媒体文件与上述相同；你只需将模板文件夹的名称更改为\
    \ `media`，然后在你的 `setting.py` 中添加一行\n\n```python\nSTATICFILES_DIRS = [\n    STATIC_DIR,\
    \ MEDIA_DIR\n]\n```\n\n一步一步地执行这些步骤。不要混合它们。一次尝试一个。上述代码定义了你添加了两个路径。\n\n- **模板**：Django\
    \ 借助 HTML 在浏览器上渲染其内容。你只需要在你的项目中有一个 `templates` 文件夹。然后在 `setting.py` 中添加模板的路径，如下所示：\n\
    \n    ```python\n    # setting.py\n    TEMPLATES = [\n        {\n            'BACKEND':\
    \ 'django.template.backends.django.DjangoTemplates',\n            'DIRS': ['template'],\
    \ #在 [] 中写入你的文件夹名称。\n            'APP_DIRS': True,\n            'OPTIONS': {\n\
    \                'context_processors': [\n                    'django.template.context_processors.debug',\n\
    \                    'django.template.context_processors.request',\n         \
    \           'django.contrib.auth.context_processors.auth',\n                 \
    \   'django.contrib.messages.context_processors.messages',\n                ],\n\
    \            },\n        },\n    ]\n    ```\n\nDjango 静态（CSS、JavaScript、图像）配置。\n\
    \n- **加载图像示例**\n\n    ```html\n    <!DOCTYPE html>\n    <html lang=\"en\">\n \
    \   <head>\n        <meta charset=\"UTF-8\">\n        <title>索引页</title>\n   \
    \     {% load static %}\n    </head>\n    <body>\n        <img src=\"{% static\
    \ '/wallpaper.jpeg' %}\" alt=\"我的图片\" height=\"300px\" width=\"700px\"/>\n   \
    \ </body>\n    </html>\n    ```"
