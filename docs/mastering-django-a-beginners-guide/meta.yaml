  - '[PAGE 214]


    # Methods of Manager Class


    | Method Class | Description |

    |---|---|

    | all() | It returns a query set containing all objects created so far |

    | filter(**kwargs) | It returns a query set containing a list of objects that
    match with the given arguments. If no matched thing is found, it returns an empty
    query set |

    | exclude(**kwargs) | It does precisely the opposite of the filter() method, i.e.,
    returns a queryset containing objects that do not match with given arguments |

    | get(**kwargs) | It returns a single object that matches the given argument.
    If multiple objects are found, it will throw a Model.MultipleObjectsReturned error.
    If get() doesn''t find any object, it raises a model – there does not exist exception
    |

    | create(**kwargs) | It creates a new object with given arguments |

    | order_by(*fields) | It sets the ordering of the previously returned queryset
    according to the arguments passed in it |


