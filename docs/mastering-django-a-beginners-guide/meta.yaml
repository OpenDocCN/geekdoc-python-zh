- md: "## Install Django from Git\n\nDjango can be downloaded from Git itself by the\
    \ cloning of the Django Git repository locally.\n\nDjango uses Git for source\
    \ control. Download Git for your operating system. Git repository is hosted on\
    \ Github. Create the account on Github and also create a local copy of your fork\
    \ like that.\n\n- Git folder will be created by using this command\n- git clone\
    \ https://github.com/github_username/django.git\n- then cd to Django folder (now\
    \ your Github repository will be called “origin”)\n- set up Django/Django as an\
    \ “upstream” remote (that tells the reference of Django’s official repository\
    \ )\n- execute these git commands\n- git remote add upstream git@github.com:django/django.git.\n\
    - git fetch upstream\n\n> Note: Django git official repository: https://github.com/django/django.\
    \ There are so many commands of Git, like locally and remote. We need to understand\
    \ that command before using it.\n\n- **Git init**: It will make folder/directory\
    \ a git repository\n- **Git adds**: Add files in the staging area for Git. In\
    \ Git, always use add before committing any storage. Move files at once, then\
    \ use Git add. (don’t forget to add a dot after add) .\n- **Git status**: Return\
    \ the current working branch. If files are in the staging area or there are no\
    \ changes, it will return nothing to commit.\n\n## INSTALLING AND CREATING THE\
    \ DJANGO PROJECT\n\nIn the exact location where your commands are running, run\
    \ this command to install Django:\n\n44 ■ Mastering Django\n\n- pip install Django\n\
    \n    Or (you can also define your version like this)\n\n    pip install django==1.8.13\
    \ (Figure 2.12)\n\n    Before running your project, make sure you will be in your\
    \ project location, not in the/Scripts folder (Figure 2.13).\n\n    Make your\
    \ Python project.\n\n- Django-admin startproject Project\n\n    (This will make\
    \ the Project name folder in your location now move into that folder with the\
    \ help of the cd command.)\n\n    Run the command django-admin startproject projectname.\n\
    \n    Then change your directory into project.\n\n    Inside the project folder\
