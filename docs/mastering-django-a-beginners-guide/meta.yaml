- md: '## CHAPTER 7


    ## Django’s Admin Panel


    ### IN THIS CHAPTER


    - Overview of Django admin

    - Django admin customization

    - Custom layout

    - Model admin classes


    In the last chapter, we learned about Django templates, Jinja2, its syntax, and
    Django database with some python functions and inheritance. Here, we will learn
    about the admin panel of Django.


    ## OVERVIEW OF DJANGO ADMIN


    Django has an automatic admin interface. It reads all metadata from your models
    to provide a quick, model-centric interface where trusted users can manage content
    on your site. The admin’s use is limited to an organization’s internal management
    tool.


    Django-admin.py is Django’s command-line utility for administrative tasks management.


    Usually, you will access Django-admin.py through a project’s manage.py wrapper.
    manage.py is created automatically in each Django project and is a thin wrapper
    around Django-admin.py.


    It takes care of two things for Django-admin.py:


    1. It puts your entire project’s package on system path.

    2. It sets the DJANGO_SETTINGS_MODULE environment variable to your project settings.py
    file.


    ## ACCESSING THE DJANGO ADMIN SITE


    When you ran the start project in the previous chapter, Django created and configured
    the default admin site. You need to create an admin user (superuser) to log in
    into the admin panel. Run the following command inside your virtual environment:


    - python manage.py createsuperuser


    Enter your desired username and press enter:


    - Username (leave blank to use ‘dell’): Quiz

    - Error: That username is already taken.

    - Username (leave blank to use ‘dell’): quiz

    - Email address:

    - Password:

    - Password (again):

    - The username and password are too close.

    - This is an insufficiently long password. It must be at least 8 characters long.

    - Bypass password validation and create user anyway? [y/N]: y


    Superuser created successfully.


    Now you have created an admin user, you are ready to use the Django admin. Let’s
    run the development server and explore something new. First, make sure the development
    server is running. Then open a web browser to http://127.0.0.1:8000/admin/. You
    should see the admin login screen.


    ![Admin panel.](img/6b248a6900b90aa4ebb02bce8e067804_163_0.png)


    You may see the admin panel login window of Django in the above figure. Log in
    with the superuser account that you have created. Once logged in, you can see
    the Django admin page.


    ![Admin panel.](img/6b248a6900b90aa4ebb02bce8e067804_163_1.png)


    You will see the admin panel of Django in the above figure. On the top of the
    page is the Authentication and Authorization group. Groups and Users, both are
    provided by the authentication framework in Django.


    Generally, when we are working on a single Django project, it''s easier to use
    manage.py. If you want to switch between multiple Django settings files, use Django-admin.py
    with DJANGO_SETTINGS_MODULE or use the settings command-line option. The Django-admin.py
    script must be on your system path when you have installed Django via its setup.py
    utility. We will discuss it in brief subsequently (Django Admin Customization).


    ## Enabling Admin Panel


    The admin is allowed in the default Django project template used as start-project.
    If you do not want to use the default project template, here are the options:


    - Add ''django.contrib.admin'' and its dependencies: django.contrib.auth, django.contrib.contenttypes,
    django.contrib.messages, and django.contrib.sessions. Add these codes into your
    setting.py in the place of INSTALLED_APPS.

    - Configure the DjangoTemplates backend in your TEMPLATES setting using django.contrib.auth.context_processors.auth,
    django.template.context_processors.request, and django.contrib.messages.context_processors.messages
    in setting.py.

    - The MIDDLEWARE setting, django.contrib.auth.middleware.AuthenticationMiddleware
    and django.contrib.messages.middleware.MessageMiddleware, must be included.


    If you have to create an admin user to log in with, run the createsuperuser command
    in the terminal for the same project. By default, log in to the admin requires
    that the user details has the is_staff attribute set to True, otherwise you will
    not get access to your admin panel.


    Application models must be changeable in the admin interface. For each of the
    models, register them with the admin, as described in ModelAdmin.


    ## WHAT DOES ADMIN DO?


    The admin let you register and write on any actions. Admin panel contains all
    the models you have created in your project. The basic workflow of Django admin
    is select an object, then change it, delete it, update it, and add it. Django
    admin tries to provide you a user interface for performing multiple operations
    (CRUD) on various user models with other functionalities like authentication,
    user access levels, etc. You will get to learn how the admin interface is customizable
    and how you can add and change the things in the admin. This modification may
    make it more productive.


    ## HOW DOES IT WORK?


    When Django loads your URLconf from urls.py at server startup, it executes the
    admin. This function iterates over your INSTALLED_APPS setting and looks for a
    file called admin.py in each installed app. In the admin.py in our books app,
    each call to admin.site.register() registers the given model. The admin site will
    display an edit/change interface only. The app django.contrib.auth includes its
    admin.py, which is why the Users and Groups showed up automatically in the admin.
    Other Django.contrib apps include Django.contrib. The Django admin site is just
    a Django application, with its models, templates, views, and URL patterns given
    with the admin.


    ## HOW SECURE IS DJANGO ADMIN?


    Django admin is handy at creating a database record to manage groups and users
    that give permissions to models at the level of reading, writing, modification,
    and according to what permission the user has. The Django admin itself is pretty
    safe. You can take additional measures by securing it via htaccess and force HTTPS
    access on it. The design is not responsive. Users on mobile devices need to do
    a lot of zooming and panning.


    ## Writing Action Functions


    First, we’ll need to write a function called when the admin triggers the action.
    Action functions are regular functions that take three arguments:


    - The current ModelAdmin

    - An HttpRequest representing the current request

    - A QuerySet containing the set of objects selected by the user.


    ## Usage


    Here are how to use django-admin.py:


    - django-admin.py <subcommand> [options]

    - manage.py <subcommand> [options]


    It should be one of the subcommands listed in the “Available Subcommands”, which
    is optional, should be zero, or more options available for the given subcommand.


    ## Various Subcommands


    - **Cleanup**: This can be run as a cron job or directly to clean out old data
    from the database (only expired sessions currently).

    - **Compile messages**: The compile messages subcommand compiles .po files created,
    making messages to .mo files for use with built-in get text support.

    - **createsuperuser**: This will create a superuser account (a user who has all
    permissions) that has full access to the site and requires permission using manage.py.
    It is useful if you need to create an initial superuser account. This command
    may be called in the terminal.

    - **--locale**: use the --locale or -l option to specify the locale to process.
    If this option is not provided, all locales are processed.

    - **Here is a usage example**: Django-admin.py compile messages --locale=br_PT

    - **createcachetable**: This subcommand make a cache-table with a given name for
    use in the database-cache back-end.

    - **Example**: django-admin.py createcachetable my_cache_table.

    - **Runserver**: python manage.py runserver. You can run many servers as you want.
    Execute django-admin.py runserver more than once. To ensure your development server
    is clear to other machines on the web, run its default ip address (192.168.2.1)
    or 0.0.0.0 (which you can use if you don''t know your IP address on the web).


    The new account''s username and e-mail address (optional) can be supplied by using
    the --username and --email arguments on the command line. This command is available
    only if Django''s authentication system (Django.contrib.auth) is INSTALLED_APPS.


    - django-admin.py runserver --adminmedia=/tmp/new-admin-stylefiles/: Use the --admin
    media option to tell Django where to find the various CSS and JavaScript files
    for the Django admin interface.

    - Django-admin.py runserver --noreload: Use the --noreload option to disable the
    use of the auto-reloader.'
  mdcn: '## 第7章


    ## Django的管理后台


    ### 本章内容


    - Django管理后台概述

    - Django管理后台自定义

    - 自定义布局

    - 模型管理类


    在上一章中，我们学习了Django模板、Jinja2、其语法以及Django数据库的一些Python函数和继承。在这里，我们将学习Django的管理后台。


    ## DJANGO管理后台概述


    Django拥有一个自动化的管理界面。它从你的模型中读取所有元数据，提供一个快速、以模型为中心的界面，让受信任的用户可以管理你网站上的内容。管理后台的使用仅限于组织的内部管理工具。


    Django-admin.py是Django用于管理任务的命令行实用程序。


    通常，你会通过项目的manage.py包装器来访问Django-admin.py。manage.py在每个Django项目中自动创建，是Django-admin.py的一个轻量级包装器。


    它为Django-admin.py处理两件事：


    1.  它将你的整个项目包添加到系统路径中。

    2.  它将DJANGO_SETTINGS_MODULE环境变量设置为你的项目settings.py文件。


    ## 访问DJANGO管理站点


    当你在上一章运行startproject时，Django创建并配置了默认的管理站点。你需要创建一个管理员用户（超级用户）来登录管理面板。在你的虚拟环境中运行以下命令：


    - python manage.py createsuperuser


    输入你想要的用户名并按回车：


    - 用户名（留空则使用‘dell’）：Quiz

    - 错误：该用户名已被占用。

    - 用户名（留空则使用‘dell’）：quiz

    - 电子邮件地址：

    - 密码：

    - 密码（再次输入）：

    - 用户名和密码太相似。

    - 密码长度不足。密码长度必须至少为8个字符。

    - 绕过密码验证并继续创建用户？[y/N]：y


    超级用户创建成功。


    现在你已经创建了一个管理员用户，可以使用Django管理后台了。让我们运行开发服务器并探索一些新东西。首先，确保开发服务器正在运行。然后打开一个网页浏览器，访问
    http://127.0.0.1:8000/admin/。你应该会看到管理登录屏幕。


    ![管理面板。](img/6b248a6900b90aa4ebb02bce8e067804_163_0.png)


    你可能会在上图中看到Django的管理面板登录窗口。使用你创建的超级用户账户登录。登录后，你可以看到Django管理页面。


    ![管理面板。](img/6b248a6900b90aa4ebb02bce8e067804_163_1.png)


    你将在上图中看到Django的管理面板。页面顶部是“认证和授权”组。组和用户都由Django中的认证框架提供。


    通常，当我们处理单个Django项目时，使用manage.py更容易。如果你想在多个Django设置文件之间切换，请使用带有DJANGO_SETTINGS_MODULE的Django-admin.py，或者使用settings命令行选项。当你通过setup.py实用程序安装Django时，Django-admin.py脚本必须位于你的系统路径上。我们将在后面简要讨论它（Django管理后台自定义）。


    ## 启用管理面板


    管理后台在用作startproject的默认Django项目模板中是启用的。如果你不想使用默认的项目模板，以下是选项：


    - 添加 ''django.contrib.admin'' 及其依赖项：django.contrib.auth、django.contrib.contenttypes、django.contrib.messages
    和 django.contrib.sessions。将这些代码添加到你的setting.py中的INSTALLED_APPS位置。

    - 在你的TEMPLATES设置中配置DjangoTemplates后端，使用django.contrib.auth.context_processors.auth、django.template.context_processors.request和django.contrib.messages.context_processors.messages（在setting.py中）。

    - MIDDLEWARE设置中必须包含django.contrib.auth.middleware.AuthenticationMiddleware和django.contrib.messages.middleware.MessageMiddleware。


    如果你需要创建一个管理员用户来登录，请在终端中为同一项目运行createsuperuser命令。默认情况下，登录管理后台要求用户详细信息的is_staff属性设置为True，否则你将无法访问管理面板。


    应用程序模型必须在管理界面中可更改。对于每个模型，按照ModelAdmin中的描述将它们注册到管理后台。


    ## 管理后台做什么？


    管理后台允许你注册并编写任何操作。管理面板包含你在项目中创建的所有模型。Django管理后台的基本工作流程是：选择一个对象，然后更改它、删除它、更新它和添加它。Django管理后台试图为你提供一个用户界面，用于对各种用户模型执行多种操作（CRUD），以及其他功能，如认证、用户访问级别等。你将了解管理界面是如何可定制的，以及你如何在管理后台中添加和更改内容。这种修改可能会使其更具生产力。


    ## 它是如何工作的？


    当Django在服务器启动时从urls.py加载你的URLconf时，它会执行admin.site.urls。这个函数遍历你的INSTALLED_APPS设置，并在每个已安装的应用中查找名为admin.py的文件。在我们books应用的admin.py中，每次调用admin.site.register()都会注册给定的模型。管理站点将只显示一个编辑/更改界面。django.contrib.auth应用包含其admin.py，这就是为什么用户和组会自动出现在管理后台中。其他Django.contrib应用也包含Django.contrib。Django管理站点本身就是一个Django应用程序，其模型、模板、视图和URL模式都由管理后台提供。


    ## DJANGO管理后台有多安全？


    Django管理后台在创建数据库记录以管理组和用户方面很方便，这些组和用户根据用户拥有的权限，在读取、写入、修改级别上授予模型权限。Django管理后台本身相当安全。你可以通过htaccess保护它并强制使用HTTPS访问来采取额外措施。该设计不是响应式的。移动设备上的用户需要进行大量的缩放和平移。


    ## 编写操作函数


    首先，我们需要编写一个函数，当管理后台触发操作时调用它。操作函数是常规函数，接受三个参数：


    - 当前的ModelAdmin

    - 代表当前请求的HttpRequest

    - 包含用户选择的对象集合的QuerySet。


    ## 用法


    以下是使用django-admin.py的方法：


    - django-admin.py <子命令> [选项]

    - manage.py <子命令> [选项]


    它应该是“可用子命令”中列出的子命令之一，该子命令是可选的，可以是零个或多个适用于给定子命令的选项。


    ## 各种子命令


    - **Cleanup**：这可以作为cron作业运行或直接运行，以从数据库中清除旧数据（目前仅限过期的会话）。

    - **Compile messages**：compile messages子命令编译创建的.po文件，将消息转换为.mo文件，以供内置的gettext支持使用。

    - **createsuperuser**：这将创建一个超级用户账户（一个拥有所有权限的用户），该账户拥有对站点的完全访问权限，并需要使用manage.py进行权限设置。如果你需要创建一个初始的超级用户账户，这很有用。此命令可以在终端中调用。

    - **--locale**：使用--locale或-l选项指定要处理的区域设置。如果未提供此选项，则处理所有区域设置。

    - **这是一个用法示例**：Django-admin.py compile messages --locale=br_PT

    - **createcachetable**：此子命令创建一个具有给定名称的缓存表，用于数据库缓存后端。

    - **示例**：django-admin.py createcachetable my_cache_table。

    - **Runserver**：python manage.py runserver。你可以根据需要运行多个服务器。多次执行django-admin.py
    runserver。为确保你的开发服务器对网络上的其他机器可见，请运行其默认IP地址（192.168.2.1）或0.0.0.0（如果你不知道网络上的IP地址，可以使用此地址）。


    新账户的用户名和电子邮件地址（可选）可以通过在命令行上使用--username和--email参数提供。此命令仅在Django的认证系统（Django.contrib.auth）是INSTALLED_APPS时可用。


    - django-admin.py runserver --adminmedia=/tmp/new-admin-stylefiles/：使用--adminmedia选项告诉Django在哪里可以找到Django管理界面所需的各种CSS和JavaScript文件。

    - Django-admin.py runserver --noreload：使用--noreload选项禁用自动重载器的使用。'
