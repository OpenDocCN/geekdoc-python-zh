- md: "## Mastering Computer Science Series Preface\n\nThe *Mastering Computer Science*\
    \ covers a wide range of topics, spanning programming languages as well as modern-day\
    \ technologies and frameworks. The series has a special focus on beginner-level\
    \ content, and is presented in an easy-to-understand manner, comprising:\n\n-\
    \ Crystal-clear text, spanning various topics sorted by relevance\n- A special\
    \ focus on practical exercises, with numerous code samples and programs\n- A guided\
    \ approach to programming, with step-by-step tutorials for the absolute beginners\n\
    - Keen emphasis on real-world utility of skills, thereby cutting the redundant\
    \ and seldom-used concepts and focusing instead of industry-prevalent coding paradigm\n\
    - A wide range of references and resources to help both beginner and intermediate-level\
    \ developers gain the most out of the books\n\nThe *Mastering Computer Science*\
    \ series of books start from the core concepts, and then quickly move on to industry-standard\
    \ coding practices, to help learners gain efficient and crucial skills in as little\
    \ time as possible. The books assume no prior knowledge of coding, so even the\
    \ absolute newbie coders can benefit from this series.\n\nThe *Mastering Computer\
    \ Science* series is edited by Sufyan bin Uzayr, a writer and educator with more\
    \ than a decade of experience in the computing field.\n\nTaylor & Francis\nTaylor\
    \ & Francis Group\nhttp://taylorandfrancis.com\n\n## About the Editor\n\n**Sufyan\
    \ bin Uzayr** is a writer, coder, and entrepreneur with more than a decade of\
    \ experience in the industry. He has authored several books in the past, pertaining\
    \ to a diverse range of topics, ranging from History to Computers/IT.\n\nSufyan\
    \ is the Director of Parakozm, a multinational IT company specializing in EdTech\
    \ solutions. He also runs Zeba Academy, an online learning and teaching vertical\
    \ with a focus on STEM fields.\n\nSufyan specializes in a wide variety of technologies,\
    \ such as JavaScript, Dart, WordPress, Drupal, Linux, and Python. He holds multiple\
    \ degrees, including ones in Management, IT, Literature, and Political Science.\n\
    \nSufyan is a digital nomad, dividing his time between four countries. He has\
    \ lived and taught in universities and educational institutions around the globe.\
    \ Sufyan takes a keen interest in technology, politics, literature, history, and\
    \ sports, and in his spare time, he enjoys teaching coding and English to young\
    \ students.\n\nLearn more at sufyanism.com.\n\nTaylor & Francis\nTaylor & Francis\
    \ Group\nhttp://taylorandfrancis.com\n\n## Django’s History\n\nIN THIS CHAPTER\n\
    \n- Getting to know the history of Django\n- Learning about uses and features\n\
    - Installation of Django\n\nDjango is a high-level Python-based web framework\
    \ that follows the MTV pattern, i.e., MODEL TEMPLATE VIEWS, enabling us to have\
    \ a coherent architecture designed and developed by the *Lawrence Journal-World*\
    \ newspaper in 2003. Django was released on July 21, 2005. It is a Python-based\
    \ framework that uses Python to create fast dynamic websites. The Django agency\
    \ decided to publish the Django source code in the BSD license in 2005. The Django\
    \ Software Foundation (DSF) was created to support and advance Django in 2008\
    \ and version 1 of the framework was released a few months later. Django 2.0 is\
    \ compatible with Python 3.4, 3.5, 3.6, and 3.7 versions. Its primary goal is\
    \ to ease the formation of complex database-driven websites. MNC’s such as the\
    \ Instagram mobile website, Mozilla.org, and Openstack.org are using Django.\n\
    \n### WHICH LANGUAGE IS USED IN DJANGO?\n\nIt is written in Python, which runs\
    \ on many platforms like Windows, Linux, and macOS, a dynamic and high-level programming\
    \ language. It covers almost all tasks and problems.\n\n2 ■ Mastering Django\n\
    \n### IS PYTHON NECESSARY FOR DJANGO?\n\nIt is not easy to learn Django if you\
    \ don't have a strong knowledge of Python. You don't have to know everything in\
    \ Python, but make your basic concept clear, which Django requires. Also, focus\
    \ on OOPS concepts.\n\n### WHAT CAN I DO WITH PYTHON?\n\nPython helps fulfill\
    \ real-world tasks – a sort of things that programmers do day in, day out. It's\
    \ generally used in a variety of domains, scripting other components and implementing\
    \ stand-alone programs. Python plays an important role here. You can use it anywhere:\
    \ from developing website and gaming to robotics and spacecraft control, or anything\
    \ else. Python currently seems to fall into various categories.\nPython is commonly\
    \ applied in many domains for jobs that can be mentioned here. For example, you\
    \ can do:\n\n- Web Application Development\n- Game programming and multimedia\
    \ with the pygame system\n- Serial port communication on Windows, Linux\n- Natural\
    \ Language Processing\n- Image processing with PIL\n- Web Scraping\n- Robot control\
    \ programming\n- Artificial intelligence programming\n- DevOps\n- Machine Learning\n\
    \n### IS PYTHON SUPPORTED?\n\nYes. The Python community responds to user queries\
    \ with a speed that most commercial software help desks would do well to emulate.\
    \ Python comes with complete source code; its documentation empowers developers,\
    \ creating a large team of implementation experts.\n\n### ADVANTAGES OF PYTHON\
    \ PROGRAMMING LANGUAGE\n\nThe languages are full of benefits and there are some\
    \ excellent reasons to love them. The most outstanding companies in the world\
    \ use Python.\n\nExample: Pixar to produce films, Google for crawl pages, Instagram,\
    \ Netflix, and Spotify are taking advantage of it.\n\n- **Simplicity**: Python\
    \ is a straightforward syntax that makes beginners want to learn this language.\
    \ It is easy to maintain, share, and comprehend.\n\n  It has a straightforward\
    \ syntax and coding style.\n\n- **Is Python Portable?** It can be installed in\
    \ every operating system. It is free and open source and is available for everyone.\
    \ The Python script can be used on Linux, Windows, macOS, and UNIX. Python is\
    \ available for:\n\n  1. Microsoft Windows and DOS (all modern flavors)\n  2.\
    \ MacOS (both OS X and Classic)\n  3. Real-time systems\n  4. Python for IOS and\
    \ iPods\n  5. Other cell phones Windows Mobile\n  6. Gaming\n\n- **Python Is a\
    \ Powerful Language**: Unlike some other scripting languages like JavaScript,\
    \ Ruby, this combination makes Python useful for large-scale development projects.\
    \ You will find the main things you need to know in Python's Documentation.\n\n\
    - **Dynamic Typing Language**: It means that the type of the variable is determined\
    \ only during runtime. But Python keeps track of the kinds of objects your program\
    \ uses when it runs.\n\n  It allows one to add an integer and a floating point\
    \ number, but adding an integer to a string produces the error. Python code does\
    \ not constrain data types, and it is also usually automatically applied to a\
    \ whole.\n\n- **Automatic Memory Management**: Python automatically allocates\
    \ objects (\"garbage collects\") called garbage collection when they are no longer\
    \ used, and most can grow and shrink. It keeps track of low-level memory details,\
    \ so you don't have to worry about it.\n\n- **Large System Support**: Python is\
    \ a fantastic tool for larger systems or projects such as modules, classes, packages,\
    \ and exceptions. What other tools would allow you to organize strategies into\
    \ components, use OOP to reuse, customize code, and handle events and errors gracefully?\n\
    \n- **Built-in Object Types:** Python provides the most commonly used data structures\
    \ such as lists, dictionaries, and strings as intrinsic parts of the language\
    \ itself; they are flexible and easy to work with. For a while, built-in objects\
    \ can grow and shrink on their own to represent complex information and more.\n\
    - **Many Built-in Tools:** Python has powerful and standard operations to process\
    \ all the object types, including concatenation (joining collections), slicing\
    \ (extracting sections), sorting, mapping, and more.\n\nBefore Django, Things\
    \ Needed to Be Done in Python\nFirst you need to download Python and then understand\
    \ how to run a simple pip and install Django. Once you have done this, start learning\
    \ the basics.\n\n1. **Basic Concept:** In this, you first need to understand the\
    \ basics of Python, variables, data types, conditional statements; for loops,\
    \ all these things come into the basics of Python. All these concepts are part\
    \ of programming. You will be facing lots of problems if the basics are not clear\
    \ to you.\n   - **Standard Data Types**\n     - Numeric\n     - Boolean\n    \
    \ - Set\n     - Dictionary\n     - List\n     - Tuple\n     - Strings\n   *Note:\
    \ String, List, tuple comes under Sequence type.*\n\n2. **Variables in Python**\n\
    \n```\n>>> n = 300\n\n>>> print (n)\n```"
  mdcn: "## 《精通计算机科学》系列前言\n\n*精通计算机*系列涵盖广泛的主题，从编程语言到现代技术和框架。该系列特别关注初学者内容，并以易于理解的方式呈现，包括：\n\
    \n- 清晰明了的文本，涵盖按相关性排序的各种主题\n- 特别注重实践练习，提供大量代码示例和程序\n- 针对绝对初学者的引导式编程方法，提供分步教程\n\
    - 强调技能的实际应用，从而剔除冗余和少用的概念，转而关注行业普遍采用的编码范式\n- 提供广泛的参考和资源，帮助初学者和中级开发者从书籍中获得最大收益\n\
    \n*精通计算机科学*系列书籍从核心概念入手，然后迅速转向行业标准编码实践，帮助学习者在尽可能短的时间内获得高效且关键的技能。这些书籍假设读者没有编程先验知识，因此即使是绝对的新手程序员也能从该系列中受益。\n\
    \n*精通计算机科学*系列由苏夫扬·本·乌扎伊尔编辑，他是一位在计算机领域拥有超过十年经验的作家和教育家。\n\n泰勒与弗朗西斯\n泰勒与弗朗西斯集团\n\
    http://taylorandfrancis.com\n\n## 关于编辑\n\n**苏夫扬·本·乌扎伊尔**是一位作家、程序员和企业家，在该行业拥有超过十年的经验。他过去曾撰写过多本书籍，涉及从历史到计算机/IT等广泛主题。\n\
    \n苏夫扬是Parakozm的总监，这是一家专注于教育科技解决方案的跨国IT公司。他还运营着Zeba Academy，这是一个专注于STEM领域的在线学习和教学平台。\n\
    \n苏夫扬精通多种技术，如JavaScript、Dart、WordPress、Drupal、Linux和Python。他拥有多个学位，包括管理、IT、文学和政治学学位。\n\
    \n苏夫扬是一位数字游民，时间分配在四个国家之间。他曾在全球各地的大学和教育机构生活和教学。苏夫扬对技术、政治、文学、历史和体育有着浓厚的兴趣，在业余时间，他喜欢教年轻学生编程和英语。\n\
    \n了解更多请访问sufyanism.com。\n\n泰勒与弗朗西斯\n泰勒与弗朗西斯集团\nhttp://taylorandfrancis.com\n\n\
    ## Django的历史\n\n本章内容\n\n- 了解Django的历史\n- 学习其用途和特性\n- Django的安装\n\nDjango是一个基于Python的高级Web框架，遵循MTV模式，即模型-模板-视图，使我们能够拥有一个由*《劳伦斯日报世界》*报纸在2003年设计和开发的连贯架构。Django于2005年7月21日发布。它是一个基于Python的框架，使用Python创建快速动态网站。Django机构决定在2005年以BSD许可证发布Django源代码。Django软件基金会（DSF）于2008年成立，以支持和发展Django，几个月后发布了该框架的1.0版本。Django\
    \ 2.0兼容Python 3.4、3.5、3.6和3.7版本。其主要目标是简化复杂数据库驱动网站的构建。像Instagram移动网站、Mozilla.org和Openstack.org这样的跨国公司都在使用Django。\n\
    \n### DJANGO使用什么语言？\n\n它是用Python编写的，Python可以在Windows、Linux和macOS等多种平台上运行，是一种动态和高级编程语言。它涵盖了几乎所有任务和问题。\n\
    \n2 ■ 精通Django\n\n### 学习DJANGO是否需要PYTHON？\n\n如果你没有扎实的Python知识，学习Django并不容易。你不必了解Python的所有内容，但要弄清楚Django所需的基本概念。同时，关注面向对象编程（OOP）概念。\n\
    \n### 我能用PYTHON做什么？\n\nPython有助于完成现实世界的任务——程序员日复一日所做的那种事情。它通常用于各种领域，编写其他组件的脚本和实现独立程序。Python在这里扮演着重要角色。你可以将其用于任何地方：从网站开发和游戏到机器人和航天器控制，或其他任何事情。Python目前似乎分为多个类别。\n\
    Python通常应用于许多领域，这里可以提到一些工作。例如，你可以做：\n\n- Web应用程序开发\n- 使用pygame系统进行游戏编程和多媒体\n-\
    \ Windows、Linux上的串口通信\n- 自然语言处理\n- 使用PIL进行图像处理\n- 网页抓取\n- 机器人控制编程\n- 人工智能编程\n\
