    \ | 根据不匹配给定查找参数的对象进行过滤 |\n| annotate() | 为查询集中的每个对象添加注释。注释可以是简单值、字段引用或聚合表达式 |\n\
    | order_by() | 更改查询集的默认排序 |\n| reverse() | 反转查询集的默认排序 |\n| distinct() | 执行 SQL\
