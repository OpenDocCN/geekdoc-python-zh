  mdcn: "## 高级模型\n\n### 本章内容\n\n- Django 的模型定义\n- 字段\n- 模型方法与对象\n- 用户模型\n- 模型管理器\n\
    \n上一章我们探讨了 Web 表单的工作原理，并使用 Django 表单类对其进行了抽象。我们还了解了在处理文档时，如何运用各种策略和模式来节省时间。\n\n\
    本章，我们将讨论 Django 模型代码的高级方法。我们将更深入地探讨 Django 的模型。内容将涵盖添加和重写模型管理器与模型方法，以及 Django\
    \ 中模型继承的工作原理。\n\n## DJANGO 模型定义\n\nDjango 的模型是提供面向对象方式处理数据库的类。每个属性对应一个数据库列，每个类型属于一个数据库表。可以使用自动生成的\
    \ API 来查询这些表。它通常在应用的 `model.py` 中定义。它们作为 `Django.DB.models.Model` 的子类被应用，并包含字段、方法和类的元数据。\n\
    \n模型可以作为多种其他组件的基础。一旦你找到了一个合适的模型。模型的应用场景也比你想象的要多。Django 可以在多种方式中使用：\n\n```python\n\
    from Django.DB import models\n\nclass ModelName(models.Model):\n    # Fields of\
    \ the model\n    fieldname = models.CharField(max_length=50, help_text='Enter\
    \ field data')\n    ...\n    # Metadata\n    class Meta:\n        ordering = ['-fieldname']\n\
    \    # Methods\n    def get_absolute_url(self):\n        return reverse('model-view',\
    \ args=[str(self.id)])\n    def __str__(self):\n        return self.fieldname\n\
    ```\n\n## 字段\n\n一个模型可以有多个字段，每个字段代表一列数据，用于在模型中存储值。\n\n- **max_length=10**：表示此字段中值的最大长度为十个字符。\n\
    - **help_text=**：它只是提供一个文本标签，用于显示用户通过 HTML 表单输入的值。\n\n## 常用字段参数\n\n在声明大多数不同字段类型时，可以使用以下常用参数：\n\
    \n- **verbose_name**：字段的可读名称。如果未指定，Django 将从字段名推断默认的 verbose_name。\n- **Null**：如果声明为\
    \ true，Django 将为空白值在数据库中存储 NULL（如果适用）。默认值为 False。\n- **Blank**：如果为 True，则允许字段在表单中为空。默认值为\
    \ False，这意味着 Django 的表单验证将要求你输入一个值。`null=True` 是因为如果你允许空白值，你不会希望在数据库中得到它们，需要适当地表示它们。\n\
    - **Choices**：它是由恰好两个项目组成的序列（`[(A,B)]`）。这种元组中的第一个元素是名称，第二个是包含值的可迭代对象。\n- **primary_key**：如果定义为\
    \ true，则将当前字段设置为模型的主键。（主键是用于唯一标识所有不同表记录的唯一数据库列。）如果没有字段被指定为主键，Django 会自动为此目的添加一个。\n\
    - **db_column**：用作字段的数据库列的名称。如果未指定，Django 将使用字段的名称。\n\n## 常用数据类型的字段\n\n- **CharField**：用于定义短到中等长度的固定长度字符串。它指定了要存储数据的\
    \ `max_length`。\n- **TextField**：用于长字符串。你可以为字段指定 `max_length`，这通常用于文本区域。\n- **IntegerField**：用于存储整数（整数）值的字段。\n\
    - **DateField 和 DateTimeField**：这些用于存储/表示日期和日期/时间信息。\n- **电子邮件字段**：用于在模型中存储和验证电子邮件地址。\n\
    - **FileField 和 ImageField**：这些字段分别用于上传文件和图像。\n- **AutoField**：这是一种特殊的 IntegerField，它使用主键自动递增，如果你没有手动指定，它会自动添加到你的模型中。\n\
    - **ForeignKey**：用于指定与另一个数据库模型的一对多关系。“一”指的是关系的模型，它持有“键”（包含“外键”的模型，该外键指向关系中“多”方的“键”）。\n\
    - **ManyToManyField**：此关系用于指定多对多关系。\n\n## 在不同文件中导入 model.py\n\n所有包级别的定义必须在 `__init__.py`\
    \ 的全局作用域中定义。例如，如果我们把 `models.py` 拆分成不同的类，并将它们存储在相应的文件中，比如 `p1.py`、`p2.py` 和 `comment.py`，放在\
    \ models 子目录下，那么 `_init_.py` 包将如下所示：\n\n- from p1.model import p1\n- from p2.model\
    \ import p2\n\n现在你可以像我们在前一章学到的那样导入模型了。\n\n## Django 模型中的各种高级主题\n\n- **自动主键**：`get_absolute_url()`\
    \ 方法中的 `self.pk` 在使用此方法时出现。它返回一个指向 URL 的反向链接，这将向 URL 传递一个额外的参数。\n- **get_absolute_url\
