    Next, fetch the Python dependencies, and install them:

    sudo apt-get install python

    Note that certain distros might require you to specify the version number:

    sudo apt-get install python3.8

    Once done, you will have Python ready and deployed on your local machine. You
    can then proceed with the next step. To install Python3 on LINUX/UNIX, visit the
    https://www.python.org/downloads/source/.


    # WHAT IS A PIP?


    The standard package manager for Python allows us to install and manage additional
    packages that are not part of the Python standard library. pip stands for “preferred
    installer program” or “Pip Installs Packages”. If you are working on an older
    version of it, then you need to install PIP.


    Installing PIP on Windows

    To install PIP, type the following:


    +   - Python get-pip.py

    - You can view the content of your directory using the command: dir

    - Verify the installation using pip,

    - pip help

    - Upgrade pip on windows,

    - pip --version


    PIP Commands


    +   1. Install package – python3 –m pip install package_name

    2. Uninstall package – python3 –m pip uninstall package_name

    3. List all the installed packages – python3 –m pip list

    4. Create requirements.txt automatically – python3 –m pip freeze > requirement.txt'
  - '[PAGE 57]


    +   5. Upgrade a package – python3 -m pip install package_name --upgrade

    6. Get information about a package – python3 -m pip show package_name

    7. These are the basic commands for use while installing Python in your system


    # SETUP PYTHON VIRTUAL ENVIRONMENT


    Why Use Virtual Environments?

    It allows you to manage project dependencies simply. Suppose you have two projects
    Project A and Project B. Both use different versions of Python. Django like A
    uses Python2 with Django A, and B uses Python1 with Django 2. Remember, both have
    a separate virtual environment and don’t interfere with each other (Figure 2.7).


    Organizing Folders

    You don’t have to put the venv folder inside the project folder. Remember, Django
    will download inside the venv (Figure 2.8).


    Freezing Requirements

    It means your project package list can be stored in a file using the pip freeze
    command.


    ![](img/6b248a6900b90aa4ebb02bce8e067804_57_0.png)


    FIGURE 2.7 Different project different virtual environment.


    ![](img/6b248a6900b90aa4ebb02bce8e067804_57_1.png)


    FIGURE 2.8 A project with virtual environment.'
