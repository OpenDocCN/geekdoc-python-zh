    \ powering your application. You can select any AWS resources such as EC2 that\
    \ will provide optimally for your Application.\n\nNow create the virtual environment\
    \ to use the AWS services.\nFirst, sign up and have an AWS account and login credentials.\
    \ To learn more about it, visit https://aws.amazon.com/\nIt would be best if you\
    \ had all of the Common Prerequisites for Python installed, including the following\
    \ packages:\n\n- Python 3.7 or later\n- pip\n- virtualenv\n- awsebcli\n\nOur requirement\
    \ for Django is done. Now configure your Django application for Elastic Beanstalk.\n\
    By default, Elastic Beanstalk has a file named application.py to run their Django\
    \ application. Because this does not exist in the Django project that you have\
    \ created, you need to make something to set your application environment. You\
    \ must also keep the environment variables so that your Application's modules\
    \ can be loaded.\n\nTo configure your site for Elastic Beanstalk, activate your\
    \ site for Elastic Beanstalk.\n\nIn Unix-based system following this command,\
    \ open your project folder and activate it:\n\n- C:\\Users\\PC\\Django_project>\
    \ virtualenv\\Scripts\\activate.\n\nRun pip freeze in the terminal, and then save\
    \ the output to a file named requirements.txt (here you will get the list of every\
    \ installed package in your project):\n\n- pip freeze > requirements.txt\n- Create\
    \ a Directory named .ebextensions, using this command\n- mkdir .ebextensions\n\
    - In the .ebextensions directory/folder, add a file named as django.config with\
    \ the following:\n- Example: /ebdjango/.ebextensions/django.config\n- option_settings:\n\
    - aws:elasticbeanstalk:container:python:\n- WSGIPath: ebdjango.wsgi:application\n\
    \nWSGI path will specify the location of the WSGI script that Elastic Beanstalk\
    \ uses to start your Application.\n\nTo deactivate your virtual environment with\
    \ the deactivate command,\n\n- >>> deactivate\n\nReactivate your virtual environment\
    \ whenever you need to add packages to your Application or run your Application\
    \ locally.\n\n### Design your new Application in the AWS EB CLI\n\nIn Windows,\n\
    \n```\nEnter Application Name\n(default is \"my site\"): Django-deployment\nApplication\
    \ Django-deployment has been created\n```\n\nIn macOS terminal,\n\n```\nEnter\
    \ Application Name\n(default is \"my site\"): Django-deployment\nApplication Django-deployment\
    \ has been created\n```\n\nAWS CLI asks for an application name, and your application\
    \ name is Django-deployment. Multiple environments can be within one Application.\
    \ AWS Elastic Beanstalk is comprised of Application and environment. Before telling\
    \ your application name, enter your credentials.\n\n### Your preferable programming\
    \ language\n\nIn the macOS terminal,\n\n```\nIt appears you are using Python.\
    \ Is this correct?\n(Y/n): y\nSelect a platform version.\n1) Python 3.6\n2) Python\
    \ 3.4\n3) Python 3.4 (Preconfigured - Docker)\n4) Python 2.7\n5) Python\n(default\
    \ is 1): 1\n```\n\nWindows Command Prompt:\n\n```\nIt appears you are using Python.\
    \ Is this correct?\n(Y/n): y\nSelect a platform version.\n1) Python 3.6\n2) Python\
    \ 3.4\n3) Python 3.4 (Preconfigured - Docker)\n4) Python 2.7\n5) Python\n(default\
    \ is 1): 1\n```\n\nThe CLI knows which programming language you are using. To\
    \ respond, type y, and then select the latest version of Python.\n\n### Configure\
    \ SSH security connection\n\nSSH (Secure Socket Shell) is a secure connection\
    \ allowing the developers to access a server remotely. This connection enables\
    \ the user to safely access system administration and transfer files without fearing\
    \ an insecure network connection.\n\nWhen connecting to a host via SSH, SSH key\
    \ pairs are often used to authorize users individually. These organizations are\
    \ responsible for storing, sharing, managing access for, and maintaining these\
    \ SSH keys.\n\nIn Windows and macOS, the output will be as follows:\n\n```\nDo\
    \ you want to set up an SSH key for your instances?\nObject?\n(Y/n): y (y if yes\
    \ you want to set up )\nSelect a keypair.\n1) aws-eb\n2) [ Create new KeyPair\
    \ ]\n(default is 1): 1\n```\n\n### Now create the environment for your project\n\
    \nmacOS:\n\n```\neb create Django-env\n```\n\nWindows Command Prompt:\n\n```\n\
    C:\\Users\\PC> eb create Django-env\n```\n\nRun the command create Django-env\
    \ to create a new environment named Django-env (this can be anything). The environment\
    \ will reset and begin to configure by itself based on the files we added before\
    \ the project automatically.\n\n### Check the status of the environment\n\nmacOS\
    \ terminal:\n\n```\nFacebook-user: site user$ eb status\nEnvironment details for\
    \ Django-env\nApplication name: Django-deployment\n...\nCNAME: django-env......elasticbeanstalk.com\n\
    ```\n\nIn Windows Prompt:\n\n```\nC:\\Users\\PC> eb status\nEnvironment details\
    \ for: django-env\nApplication name: django-deployment\n...\nCNAME: Django-env......elasticbeanstalk.com\n\
    ```\n\nCheck the status of the environment after it has been perfectly installed\
    \ in your system. The Elastic Beanstalk (EB) domain AWS has been automatically\
    \ created for your application. CNAME value is the Elastic Beanstalk domain name\
    \ of your website.\n\n### Add your custom EB domain name to setting.py\n\n```\n\
    ALLOWED_HOSTS = [\n    'django-env...........elasticbeanstalk.com'\n]\n```\n\n\
    Go to your setting.py of your Django project; add the above line of code of CNAME\
    \ in ALLOWED_HOSTS. Place all the tests in between quotations (' ').\n\n### Replace\
    \ the Django DEBUG settings in the .env file\n\n```\nDEBUG = True\n```\n\nWe have\
    \ left DEBUG = TRUE until we can still receive a yellow Django page whenever any\
    \ error occurs. But in the deployment, we do not want users to get the debug page\
    \ if they type in a nonexistent URL; they should get a 404 error instead. Turn\
    \ the DEBUG to False and save the changes.\n\n```\nDEBUG = False\n```\n\n### Upload\
    \ the project to AWS Elastic Beanstalk\n\nIn macOS:\n\n```\nMacbook-user:site\
    \ user$ eb status\nEnvironment details for: django-env\n```"
  mdcn: "## AWS 服务\n\n它（Amazon Web Services）提供广泛的业务产品，主要基于云。这些产品必须包括存储、数据库、分析、网络、各种开发工具等等。现在，让我们来谈谈\
    \ Amazon 提供的 AWS 计算服务。\n\n对于那些组织来说，它一直是一块基石，因为它们被用于在云上创建和开发任何应用程序。Amazon Web Services\
    \ 的各个领域包括计算、存储、数据库、迁移、网络、内容分发、管理工具以及安全与身份合规。\n\nAWS 提供了多种最佳服务：\n\n- 1. **Amazon\
    \ Elastic Cloud Compute (EC2)**：它提供协助计算工作负载的服务，其 Web 界面用于通过创建虚拟机来减少昂贵的物理服务器。在根据用户操作系统通过几次点击在几分钟内创建虚拟服务器时，Amazon\
    \ EC2 是首选。这有助于更多地专注于项目，而不是服务器维护。\n- 2. **Amazon S3 (Simple Storage Service)**：该领域通过互联网服务提供数据存储。由于其改进的基础设施，它以高安全性存储数据。信息分布在不同的区域，并具有高质量的集成。它防止数据丢失，并帮助通过互联网检索存储的时间和空间数据。\n\
    - 3. **Amazon Virtual Private Cloud (VPC)**：它属于 AWS 的网络领域，用于隔离一台计算机的网络基础设施。它拥有一个独特的虚拟网络，保护信息不被他人获取，并使用户信息在云中无风险。\n\
    - 4. **Amazon Cloud Front**：它代表分发领域，用于以良好的速度交付内容并减少延迟。它通过全球内容分发服务有效地管理所有用户内容。\n\
    \n## AWS ELASTIC BEANSTALK\n\n它是一个易于使用的服务，用于部署和扩展使用 Python、Ruby 和 Go 开发的 Web 应用程序和服务。你可以自动将代码上传到\
    \ Elastic Beanstalk，它处理应用程序的部署、负载平衡和自动扩展。Elastic Beanstalk 没有额外费用。\n\n### 优势\n\
    \n- **快速且直接**：这是在 AWS 上部署应用程序的最快方式。你使用 AWS 管理控制台、Git 存储库或 Visual Studio 等 IDE\
    \ 来上传整个项目。\n- **开发者生产力**：它管理应用程序的基础设施。它将保持运行你的应用程序的底层平台更新到最新功能。\n- **完全的资源控制**：它允许保留对驱动你的应用程序的\
    \ AWS 资源的完全控制。你可以选择任何 AWS 资源，例如 EC2，它将为你的应用程序提供最佳支持。\n\n现在创建虚拟环境以使用 AWS 服务。\n\
    首先，注册并拥有一个 AWS 要户和登录凭证。要了解更多，请访问 https://aws.amazon.com/\n你应该安装所有 Python 的通用先决条件，包括以下包：\n\
    \n- Python 3.7 或更高版本\n- pip\n- virtualenv\n- awsebcli\n\n我们对 Django 的要求已完成。现在为\
    \ Elastic Beanstalk 配置你的 Django 应用程序。\n默认情况下，Elastic Beanstalk 有一个名为 application.py\
    \ 的文件来运行其 Django 应用程序。因为这在你创建的 Django 项目中不存在，你需要创建一些东西来设置你的应用程序环境。你还必须保留环境变量，以便你的应用程序的模块可以被加载。\n\
    \n要为 Elastic Beanstalk 配置你的站点，请为 Elastic Beanstalk 激活你的站点。\n\n在基于 Unix 的系统中，使用以下命令，打开你的项目文件夹并激活它：\n\
    \n- C:\\Users\\PC\\Django_project> virtualenv\\Scripts\\activate.\n\n在终端中运行 pip\
    \ freeze，然后将输出保存到名为 requirements.txt 的文件中（这里你将获得项目中每个已安装包的列表）：\n\n- pip freeze\
    \ > requirements.txt\n- 创建一个名为 .ebextensions 的目录，使用此命令\n- mkdir .ebextensions\n\
    - 在 .ebextensions 目录/文件夹中，添加一个名为 django.config 的文件，内容如下：\n- 示例：/ebdjango/.ebextensions/django.config\n\
    - option_settings:\n- aws:elasticbeanstalk:container:python:\n- WSGIPath: ebdjango.wsgi:application\n\
    \nWSGI 路径将指定 Elastic Beanstalk 用于启动你的应用程序的 WSGI 脚本的位置。\n\n要使用 deactivate 命令停用你的虚拟环境，\n\
    \n- >>> deactivate\n\n每当你需要向应用程序添加包或在本地运行应用程序时，重新激活你的虚拟环境。\n\n### 在 AWS EB CLI\
    \ 中设计你的新应用程序\n\n在 Windows 中，\n\n```\nEnter Application Name\n(default is \"my\
    \ site\"): Django-deployment\nApplication Django-deployment has been created\n\
    ```\n\n在 macOS 终端中，\n\n```\nEnter Application Name\n(default is \"my site\"):\
    \ Django-deployment\nApplication Django-deployment has been created\n```\n\nAWS\
    \ CLI 会询问应用程序名称，你的应用程序名称是 Django-deployment。一个应用程序中可以有多个环境。AWS Elastic Beanstalk\
    \ 由应用程序和环境组成。在输入你的应用程序名称之前，请输入你的凭证。\n\n### 你偏好的编程语言\n\n在 macOS 终端中，\n\n```\nIt\
    \ appears you are using Python. Is this correct?\n(Y/n): y\nSelect a platform\
    \ version.\n1) Python 3.6\n2) Python 3.4\n3) Python 3.4 (Preconfigured - Docker)\n\
    4) Python 2.7\n5) Python\n(default is 1): 1\n```\n\nWindows 命令提示符：\n\n```\nIt\
    \ appears you are using Python. Is this correct?\n(Y/n): y\nSelect a platform\
    \ version.\n1) Python 3.6\n2) Python 3.4\n3) Python 3.4 (Preconfigured - Docker)\n\
    4) Python 2.7\n5) Python\n(default is 1): 1\n```\n\nCLI 知道你正在使用哪种编程语言。要响应，输入 y，然后选择最新版本的\
    \ Python。\n\n### 配置 SSH 安全连接\n\nSSH（安全套接字外壳）是一种安全连接，允许开发人员远程访问服务器。此连接使用户能够安全地访问系统管理并传输文件，而无需担心不安全的网络连接。\n\
    \n通过 SSH 连接到主机时，通常使用 SSH 密钥对来单独授权用户。这些组织负责存储、共享、管理访问权限和维护这些 SSH 密钥。\n\n在 Windows\
    \ 和 macOS 中，输出将如下所示：\n\n```\nDo you want to set up an SSH key for your instances?\n\
    Object?\n(Y/n): y (y if yes you want to set up )\nSelect a keypair.\n1) aws-eb\n\
    2) [ Create new KeyPair ]\n(default is 1): 1\n```\n\n### 现在为你的项目创建环境\n\nmacOS：\n\
    \n```\neb create Django-env\n```\n\nWindows 命令提示符：\n\n```\nC:\\Users\\PC> eb create\
    \ Django-env\n```\n\n运行命令 create Django-env 以创建一个名为 Django-env 的新环境（这可以是任何名称）。环境将重置并开始根据我们之前添加到项目中的文件自动进行配置。\n\
    \n### 检查环境状态\n\nmacOS 终端：\n\n```\nFacebook-user: site user$ eb status\nEnvironment\
    \ details for Django-env\nApplication name: Django-deployment\n...\nCNAME: django-env......elasticbeanstalk.com\n\
    ```\n\n在 Windows 提示符中：\n\n```\nC:\\Users\\PC> eb status\nEnvironment details for:\
    \ django-env\nApplication name: django-deployment\n...\nCNAME: Django-env......elasticbeanstalk.com\n\
    ```\n\n在环境完全安装到你的系统后检查其状态。Elastic Beanstalk (EB) 域 AWS 已为你的应用程序自动创建。CNAME 值是你的网站的\
    \ Elastic Beanstalk 域名。\n\n### 将你的自定义 EB 域名添加到 setting.py\n\n```\nALLOWED_HOSTS\
    \ = [\n    'django-env...........elasticbeanstalk.com'\n]\n```\n\n转到你的 Django\
    \ 项目的 setting.py；将上面的 CNAME 代码行添加到 ALLOWED_HOSTS 中。将所有测试放在引号（' '）之间。\n\n### 在\
    \ .env 文件中替换 Django DEBUG 设置\n\n```\nDEBUG = True\n```\n\n我们保留了 DEBUG = TRUE，直到我们仍然可以在发生任何错误时收到黄色的\
    \ Django 页面。但在部署中，我们不希望用户在输入不存在的 URL 时看到调试页面；他们应该得到一个 404 错误。将 DEBUG 设置为 False\
    \ 并保存更改。\n\n```\nDEBUG = False\n```\n\n### 将项目上传到 AWS Elastic Beanstalk\n\n在 macOS\
    \ 中：\n\n```\nMacbook-user:site user$ eb status\nEnvironment details for: django-env\n\
    ```"
