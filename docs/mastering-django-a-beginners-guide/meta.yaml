- md: "## LOGIN PAGE\n\nThe login page will describe the login form for users so that\
    \ they can enter their login details to get access to their accounts. `{% extends\
    \ 'dependencies.html' %}` extends the code by adding the `dependencies.html` on\
    \ top. `dependencies.html` is the file where we get all the common code included\
    \ in every template page. `{% load static %}` will help to load the static folder;\
    \ static folder includes the files like CSS, images, or others. In `<div>` tags,\
    \ I have used the class attributes with `container jumbotron` in them. We get\
    \ it from the Bootstrap CDN link in our `dependencies.html` file. CDN (content\
    \ delivery network) has all the classes defined in Bootstrap. By adding this link,\
    \ you get access to it. Bootstrap helps you to make the web page more attractive.\
    \ Next, we have `<form>` tags with method POST. It is secure to store data over\
    \ the internet. `{% csrf_token %}` helps to prevent us from the various attack\
    \ from SQL injection so that nobody can get access to your site. The Form has\
    \ two input tags which take username and password. It also has some attributes\
    \ like `name` defining, the name of the field like if you want to store the data,\
    \ you can refer the name to use, `placeholder` defines the name which shows inside\
    \ the input tags on the browser. The button is used to click the event. When you\
    \ press any button, something will happen. Below the button, we have an anchor\
    \ tag that mainly works as routing. It will redirect us to the registration page;\
    \ at last, we have the end of the block. The whole code should be in the block\
    \ section; otherwise, your code will not render.\n\nFigure 11.1 shows the login\
    \ page.\n\n![](img/6b248a6900b90aa4ebb02bce8e067804_252_0.png)\n\nFIGURE 11.1\
    \ Login page.\n\n- templates > Register.html\n\n```\n{% extends 'dependencies.html'\
    \ %}\n{% load static %}\n{% block content %}\n<div class=\"container jumbotron\"\
    >\n    <form method=\"POST\" action=\"\" >\n        {% csrf_token %}\n       \
    \ {{form.as_p}}\n        <input class=\"btn btn-primary\" type=\"submit\" value=\"\
    register here\">\n    </form>\n</div>\n{% endblock %}\n```\n\n## REGISTER PAGE\n\
    \nThe register page will describe the register form for users so that they can\
    \ enter their login details to get access to their accounts. `{% extends 'dependencies.html'\
    \ %}` extends the code by adding the `dependencies.html` on top. `dependencies.html`\
    \ is the file where we get all the common codes included in every template page.\
    \ `{% load static %}` will help to load the static folder; static folder includes\
    \ the files like CSS, images, or others. In `<div>` tags, I have used the class\
    \ attributes with the `container`, `jumbotron`, similar to the login page. The\
    \ register form is slightly different from the login page here. We have used the\
    \ `{{ form.as_p }}` that means we have to use the advance forms template like\
    \ it will return the fields of the Form In paragraph like each data is wrapped\
    \ up with the paragraph `<p>` tag. `{% csrf_token %}` token is required for the\
    \ data storage or retrieving.\n\nFigure 11.2 shows the register page.\n\n![](img/6b248a6900b90aa4ebb02bce8e067804_253_0.png)\n\
    \nFIGURE 11.2 Registration page.\n\n- templates > home.html\n\n```\n{% extends\
    \ 'dependencies.html' %}\n{% block content %}\n{% load static %}\n<div class=\"\
    container \">\n<h1>Quiz</h1>\n<form method='post' action=''>\n{% csrf_token %}\n\
    {% for q in questions %}\n<div class=\"form-group\">\n<label for=\"question\"\
    >{{ q.question }}</label>\n</div>\n<div class=\"form-check\">\n<div class=\"form-check\"\
    >\n<input type=\"radio\" class=\"form-check-input\" name=\"{{ q.question }}\"\
    \ id=\"gridRadio1\" value=\"{{ q.option_one }}\" checked>\n<label class=\"form-check-label\"\
    \ for=\"gridRadios1\">\n{{ q.option_one }}\n</label>\n</div>\n<div class=\"form-check\"\
    >\n<input type=\"radio\" class=\"form-check-input\" name=\"{{ q.question }}\"\
    \ id=\"gridRadio2\" value=\"{{ q.option_two }}\">\n<label class=\"form-check-label\"\
    \ for=\"gridRadios2\">\n{{ q.option_two }}\n</label>\n</div>\n<div class=\"form-check\"\
    >\n<input class=\"form-check-input\" type=\"radio\" name=\"{{ q.question }}\"\
    \ id=\"gridRadio3\" value=\"{{ q.option_three }}\">\n<label class=\"form-check-label\"\
    \ for=\"gridRadios3\">\n{{ q.option_three }}\n</label>\n</div>\n<div class=\"\
    form-check\">\n<input type=\"radio\" class=\"form-check-input\" name=\"{{ q.question\
    \ }}\" id=\"gridRadio4\" value=\"{{ q.option_four }}\">\n<label class=\"form-check-label\"\
    \ for=\"gridRadios4\">\n{{ q.option_four }}\n</label>\n</div>\n<br>\n</div>\n\
    {% endfor %}\n<br>\n<button type=\"submit\" class=\"btn btn-primary\">Submit</button>\n\
    </form>\n{% block script %}\n<script>\nconsole.log('hello world')\n</script>\n\
    {% endblock script %}\n</div>\n{% endblock %}\n```\n\n## HOME PAGE\n\nThe homepage\
    \ contains the code of the root URL of the application that means when somebody\
    \ hits the URL, the very first page will be the root URL which is the home page.\
    \ In `urls.py`, this will look like a `path('', home, name='home')`. The first\
    \ empty parameter means that you are referring to the root URL. `{% load static\
    \ %}` will help to load the static folder; static folder includes the files like\
    \ CSS, images, or others. In `<div>` tags, I have used the class attributes with\
    \ `jumbotron`. To start with the method, POST adds `{% csrf_token %}` after the\
    \ form tag and then applies over the form inputs like `{% for q in questions %}`\
    \ we have used Jinja templates expressions. `<div>` tag has class `form-group`\
    \ and bootstrap class `<label>` is used to add label for the text. `{{ q.question\
    \ }}` is a Jinja template from where we can get our value on the browser. The\
    \ Jinja template expression will not show on the screen. Only the text using this\
    \ `{{ }}` bracket will show. Basically, `q.question` as `q` is the data provides\
    \ for loop and `question` the field which is model's fields. This is the way you\
    \ can get the value from the database. All the values are fetching in this way\
    \ only. Now end the blocks that you have opened.\n\nFigure 11.3 shows the home\
    \ page.\n\n![](img/6b248a6900b90aa4ebb02bce8e067804_255_0.png)\n\nFIGURE 11.3\
    \ Home page.\n\n- templates > navbar.html\n\n```\n{% load static %}\n<style>\n\
    .greet{\n    font-size: 18px;\n    color: #fff;\n    margin-right: 20px;\n}\n\
    </style>\n<nav class=\"navbar navbar-expand-lg navbar-dark bg-dark\">\n    <button\
    \ type=\"button\" class=\"navbar-toggler\" data-toggle=\"collapse\" data-target=\"\
    #navbarNav\" aria-controls=\"navbarNav\" aria-expanded=\"false\" aria-label=\"\
    Toggle navigation\">\n<span class=\"navbar-toggler-icon\"></span>\n</button>\n\
    <div class=\"collapse navbar-collapse\" id=\"navbarNav\">\n    <ul class=\"navbar-nav\"\
    >\n        <li class=\"nav-item active\">\n            <a class=\"nav-link\" href=\"\
    {% url 'home' %}\">\n                Home </a>\n        </li>\n        <li class=\"\
    nav-item\">\n            <a class=\"nav-link\" href=\"{% url 'login' %}\">\n \
    \               Login </a>\n        </li>\n    </ul>\n</div>\n{% if user.is_authenticated\
    \ %}\n<span class=\"greet\"> Hello, {{ request.user }} </span>\n{% endif %}\n\
    <span><a class=\"greet\" href=\"{% url 'logout' %}\">\nLogout </a></span>\n</nav>\n\
    ```\n\nNavbar is the common bar added on the top of every single page. You can\
    \ add this file by `{% include 'navbar.html' %}`. It will automatically add to\
    \ the top of every page. It should be one top. In this file, we have added Bootstrap\
    \ Navbar so that our text looks good and we can easily manage, add our content.\
    \ Open navbar tag adds the class attributes in it. This navbar is responsive,\
    \ meaning when the screen gets smaller, all the content will be hidden and will\
    \ show behind the button. Then whenever you hit that button, all the navbar options\
    \ will work and show as dropdown menus. Next, you have a button inside the navbar\
    \ class. Its type is the button, `data-toggle` is collapsed, and the target id\
    \ is mentioned so that when the screen is small, the button overlap the navbar,\
    \ while hitting the button, the target refers to the id that would be same in\
    \ all cases, otherwise nothing will happen. To run this whole code, you should\
    \ add Bootstrap CSS, javaScript files named as"
  mdcn: "## 登录页面\n\n登录页面将向用户描述登录表单，以便他们输入登录详情以访问其账户。`{% extends 'dependencies.html'\
    \ %}` 通过在顶部添加 `dependencies.html` 来扩展代码。`dependencies.html` 是包含每个模板页面中所有通用代码的文件。`{%\
    \ load static %}` 将帮助加载静态文件夹；静态文件夹包含 CSS、图像或其他文件。在 `<div>` 标签中，我使用了带有 `container\
    \ jumbotron` 的类属性。我们从 `dependencies.html` 文件中的 Bootstrap CDN 链接获取它。CDN（内容分发网络）包含\
    \ Bootstrap 中定义的所有类。通过添加此链接，您可以访问它。Bootstrap 可帮助您使网页更具吸引力。接下来，我们有带有 POST 方法的 `<form>`\
    \ 标签。通过互联网存储数据是安全的。`{% csrf_token %}` 有助于防止我们遭受各种 SQL 注入攻击，以便没有人可以访问您的站点。该表单有两个输入标签，用于接收用户名和密码。它还有一些属性，如\
    \ `name` 定义字段的名称，例如，如果您想存储数据，可以引用该名称来使用；`placeholder` 定义在浏览器中显示在输入标签内的名称。按钮用于点击事件。当您按下任何按钮时，会发生某些事情。在按钮下方，我们有一个主要用作路由的锚点标签。它将重定向我们到注册页面；最后，我们有块的结束。整个代码应在块部分中；否则，您的代码将不会渲染。\n\
    \n图 11.1 显示了登录页面。\n\n![](img/6b248a6900b90aa4ebb02bce8e067804_252_0.png)\n\n图\
    \ 11.1 登录页面。\n\n- templates > Register.html\n\n```\n{% extends 'dependencies.html'\
    \ %}\n{% load static %}\n{% block content %}\n<div class=\"container jumbotron\"\
    >\n    <form method=\"POST\" action=\"\" >\n        {% csrf_token %}\n       \
    \ {{form.as_p}}\n        <input class=\"btn btn-primary\" type=\"submit\" value=\"\
    register here\">\n    </form>\n</div>\n{% endblock %}\n```\n\n## 注册页面\n\n注册页面将向用户描述注册表单，以便他们输入登录详情以访问其账户。`{%\
    \ extends 'dependencies.html' %}` 通过在顶部添加 `dependencies.html` 来扩展代码。`dependencies.html`\
    \ 是包含每个模板页面中所有通用代码的文件。`{% load static %}` 将帮助加载静态文件夹；静态文件夹包含 CSS、图像或其他文件。在 `<div>`\
    \ 标签中，我使用了与登录页面类似的 `container`、`jumbotron` 类属性。注册表单与登录页面略有不同。我们使用了 `{{ form.as_p\
    \ }}`，这意味着我们必须使用高级表单模板，例如它将返回表单的字段，其中每个数据都用段落 `<p>` 标签包裹。`{% csrf_token %}` 令牌是数据存储或检索所必需的。\n\
    \n图 11.2 显示了注册页面。\n\n![](img/6b248a6900b90aa4ebb02bce8e067804_253_0.png)\n\n图\
    \ 11.2 注册页面。\n\n- templates > home.html\n\n```\n{% extends 'dependencies.html'\
    \ %}\n{% block content %}\n{% load static %}\n<div class=\"container \">\n<h1>Quiz</h1>\n\
    <form method='post' action=''>\n{% csrf_token %}\n{% for q in questions %}\n<div\
    \ class=\"form-group\">\n<label for=\"question\">{{ q.question }}</label>\n</div>\n\
