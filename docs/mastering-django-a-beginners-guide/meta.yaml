    \ as the main page of the project. Way to write the path:\nSyntax: path(‘URL’,\
    \ view method, name )\nNote: Import all the views method from view by using this\
    \ line:\nFrom .view import * (* is asterisk symbol which import everything from\
    \ a particular file.)\n\n## Template File\n\nThe only way to render your content\
