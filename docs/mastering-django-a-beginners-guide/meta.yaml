- md: "If you are using SQLite, specify the full filesystem path to the database file\
    \ on your filesystem.\n\n- DATABASE_NAME = 'djangodatabase'\n\nWe are now putting\
    \ the database path in the directory, like we are using “home/DB/Django database”.\n\
    \n- DATABASE_USER tells Django which username to use when connecting to your database.\
    \ If you are using SQLite, leave this blank.\n- DATABASE_PASSWORD tells Django\
    \ which password to use when the database is appropriately connected to get all\
    \ the stored information. If SQLite, leave this blank.\n- DATABASE_HOST tells\
    \ Django who the host is if your database is on the same computer as your Django\
    \ installation (i.e., localhost). If SQLite, leave this blank.\n\n## Modelformsets\n\
    \nIt is a layer of abstraction to work with the multiple forms of the same pages\
    \ like\n\n```\nFormSet = modelformset_factory(User_Model, fields=['title', 'description'],\
    \ extra=3)\n```\n\nThe extra keyword argument makes multiple copies of the same\
    \ form.\n\n## THE ADMIN MODULE\n\nThe administration module is convenient and\
    \ is included by default with Django. It is a module that will maintain the content\
    \ of the database without any difficulty. It cannot support the structure of the\
    \ database because this is not the database manager. It manages the relationships\
    \ between models. It contains Django permissions. You can set permissions for\
    \ users according to models and CRUD operations. It is quickly established.\n\n\
    ## Installing the Admin Module\n\nTo implement the administration module, go to\
    \ setting.py and edit them. In the INSTALLED_APPS setting, you need to add the\
    \ new line in it:\n\n```\n# add this to INSTALLED_APPS\n'django.contrib.admin'\n\
    ```\n\n## CHAPTER SUMMARY\n\nHaving read this chapter, you have enough knowledge\
    \ of Django models to write basic database applications. It provided some information\
    \ on more advanced usage of Django’s database layer. Once you’ve defined your\
    \ models, the next step is to populate your database with data. The next chapter\
    \ covers Django’s Views interface.\n\n# CHAPTER 5\n\n## Django’s View\n\n### IN\
    \ THIS CHAPTER\n\n- Getting to know about view in Django\n- URL routing\n- Regular\
    \ expression\n\nIn the previous chapter, we have learned about Django models and\
    \ their basic database applications, types of databases in Django, and some information\
    \ on more advanced usage of Django’s database layers. Various types of keys and\
    \ their relationships were also covered. This chapter covers Django’s view interface.\n\
    \nIn this chapter, you will learn about views, the basics and the advanced creating\
    \ dynamic and static URLs for web pages: regex, class-based generic and function-based\
    \ generic views, and their types.\n\n## VIEWS IN DJANGO\n\nIn Python, a view function,\
    \ or view for short, is used to take a web request and returns a web response.\
    \ This is accomplished by the use of HTML content on a web page, text rendering,\
    \ documents, graphics, style, and other techniques. It itself contains whatever\
    \ logic is necessary to return that response back to the client. This code can\
    \ live anywhere on the browser you want, as long as it is on your Python path.\n\
    \n## CONFIGURATION OF THE URLS\n\nWhenever you start your development server,\
    \ you would notice on your screen Django’s welcome page. In Django, for having\
    \ a new view, you will have to tell Django that index view should be displayed\
    \ when someone navigates to the site root URL (name of the page). We do this by\
    \ adding the new URLs.\n\nIn Django, the path() function is also used to configure\
    \ URLs for mapping the view with URL. The path function is contained under the\
    \ Django.url within the Django project codebase in its basic form, the path()\
    \ function.\n\nSyntax:\n\n```\npath(route, view)\n```\n\nAn example of the basic\
    \ path() function will be path('mypage/', views.myview)\n\n1. The path() function\
    \ can also take one optional name argument, and zero or more keyword arguments\
    \ passed as a Python dictionary (a concept in Python). We will get to these details\
    \ later in this book.\n2. The path() function statements live in a special file\
    \ called urls.py.\n\nWhen startproject created our website, it created an urls.py\
    \ file in our site folder (\\mysite\\urls.py).\n\nCode of simple view:\n\n```\n\
    from Django.http import HttpResponse\ndef index(request):\n    return HttpResponse(\"\
    Hello Python\")\n```\n\nLet’s step within this code one line at a time:\nFirst,\
    \ you import the class HttpResponse, which lives in Django.HTTP module. Import\
    \ this for later use in code.\n\n- Next, you define a function called index –\
    \ the view function.\n- Each view function takes at least one parameter, which\
    \ is simply called request by convention. This object contains information about\
    \ the current Web request that has triggered this view and it's an instance of\
    \ the class: Django.HTTP.HttpRequest.\n- The name of the view function does not\
    \ matter whatever it is; it doesn't have to be named.\n- In a certain way, Django\
    \ has to recognize it. So every URL should have a unique name so that no confusion\
    \ may arises. We called it index so that it could render the index page.\n- The\
    \ function is a simple one line that merely returns an HttpResponse object that\
    \ has been instantiated with the text “Hello Python”.\n\nThis code is for implementing\
    \ the basics of views in Django; the above code tells what to import to use the\
    \ URL in the project.\n\n## MAPPING URLS TO VIEWS\n\nThis diagram may be as short\
    \ or as long as you need it to be. It has the ability to refer to other mappings.\
    \ It may also be built dynamically because it is a pure Python code. You make\
    \ a Python module known as a URLconf to design URLs for an app (URL configuration).\
    \ It easily maps the URL path expressions to Python functions (views).\n\n## HOW\
    \ DOES IT PROCESS A REQUEST?\n\nWhen a user requests for a page from your Django\
    \ site, this is how the system follows the Python code to execute:\n\n- It (Django)\
    \ determines the root URLconf module to use.\n- It loads the Python module and\
    \ looks for the variable urlpatterns which can be defined in urls.py of the project.\
    \ This should be a way to write Django.URLs.path().\n- It runs through each URL\
    \ pattern in order and stops at the first one that matches the requested URL,\
    \ matching against path_info.\n- When one of the URL patterns matches with your\
    \ view, and the matched URL pattern contained no named groups, then the matches\
    \ from the regular expression are provided as positional arguments.\n\n## WHAT\
    \ IS URL ROUTING?\n\nBefore using the Regular Expressions to Django, we need to\
    \ understand what URL routing is; it is actually pretty simple to understand.\
    \ It is just a matter of how Django understands what the user is requesting.\n\
    These routes are called static routes.\n\n| Path | URL Route | View Name |\n|---|---|---|\n\
    | http://example.com/ | / | IndexPageView |\n| http://example.com/about/ | /about/\
    \ | AboutPageView |\n| http://example.com/user/id | /user/id/ | UserIdView |\n\
    \nWhat will these do?\n\n- / - render the root page of the project.\n- /about/\
    \ - render the about page when user requests.\n- /user/id - render the user with\
    \ its id number. User will get to know the data whatever user is added.\n\nThese\
    \ routes are called dynamic routes.\n\n| Path | URL Route | View Name |\n|---|---|---|\n\
    | http://example.com/user/data/content | /user/data/content | UserDataContent\
    \ |\n| http://example.com/about/company-name | /about/company-name | AboutCompanyView\
    \ |\n| http://example.com/user/id | /user/id/ | UserIdView |\n\nThe above examples\
    \ are static routes in that they never change. The /about/ path will always be\
    \ the /about/ path (unless we manually change it).\nThe handler (view) will be\
    \ the exact same for both paths. The only way for the View (handler) to know which\
    \ post to display, it must accept some additional values.\n\n- The keyword arguments\
    \ is where you give a name to a variable as you pass it into the function.\n-\
    \ django.URLs.path() or django.URLs.re_path().\n\nIn Django, we create dynamic\
    \ URLs with path converters. A path converter has a simple syntax:\n\n<type:variable>\n\
    \nThere are five different path converter types:\n\n1. **str**: matches any non-empty\
    \ string, excluding '/'.\n2. **path**: matches any non-empty string, including\
    \ '/'. Useful for matching the entire URL.\n3. **int**: matches an integer\n4.\
    \ **slug**: matches any slug string. E.g., slugs-are-text-strings-with-hyphens-and_underscores\n\
    5. **UUID**: matches a universally unique identifier (UUID)\n\nThis example has\
    \ URL containing path converters:\n\n- /<int:year>/<str:month>/\n\nLet's put this\
    \ into writing and modify this in urls.py for views function:\n\n```\nurlpatterns\
    \ = [\n    # path('', views.index, name='index'),\n    path('<int:year>/<str:month>/',\
    \ views.index, name='index'),\n]\n```\n\n## WHAT IS PATH VS. RE_PATH?\n\nTo understand\
    \ that the path function does not accept regex URLs anymore, you need to use the\
    \ new URLs syntax <slug: title> instead of passing a regex through matching parameters.\
    \ The re_path only works with regex formatted URLs (the old way we made URLs).\n\
    \n- If no URL pattern matches or exception is raised at any point in that process,\
    \ Django invokes an appropriate error-handling view. See error handling below:\n\
    \    - \"Is there various HTTP Status Code?\"\n    - REST API Development with\
    \ Node.js defines a status code as \"a number that summarizes the response associated\
    \ to it\"."
  mdcn: "如果你使用的是 SQLite，请指定数据库文件在文件系统中的完整路径。\n\n- DATABASE_NAME = 'djangodatabase'\n\
    \n我们现在将数据库路径放在目录中，就像我们使用 \"home/DB/Django database\" 一样。\n\n- DATABASE_USER 告诉\
    \ Django 在连接数据库时使用哪个用户名。如果你使用的是 SQLite，请将其留空。\n- DATABASE_PASSWORD 告诉 Django 在数据库正确连接以获取所有存储信息时使用哪个密码。如果是\
    \ SQLite，请将其留空。\n- DATABASE_HOST 告诉 Django 如果你的数据库与 Django 安装在同一台计算机上（即 localhost），主机是谁。如果是\
    \ SQLite，请将其留空。\n\n## 模型表单集\n\n它是一个抽象层，用于处理同一页面上的多个表单，例如\n\n```\nFormSet = modelformset_factory(User_Model,\
    \ fields=['title', 'description'], extra=3)\n```\n\nextra 关键字参数会创建同一表单的多个副本。\n\
    \n## 管理模块\n\n管理模块非常方便，并且默认包含在 Django 中。它是一个可以轻松维护数据库内容的模块。它不能支持数据库的结构，因为它不是数据库管理器。它管理模型之间的关系。它包含\
    \ Django 权限。你可以根据模型和 CRUD 操作为用户设置权限。它建立起来很快。\n\n## 安装管理模块\n\n要实现管理模块，请转到 setting.py\
    \ 并进行编辑。在 INSTALLED_APPS 设置中，你需要添加新行：\n\n```\n# add this to INSTALLED_APPS\n'django.contrib.admin'\n\
    ```\n\n## 章节总结\n\n阅读本章后，你已经掌握了足够的 Django 模型知识来编写基本的数据库应用程序。它提供了一些关于 Django 数据库层更高级用法的信息。一旦你定义了模型，下一步就是用数据填充数据库。下一章将介绍\
    \ Django 的视图接口。\n\n# 第 5 章\n\n## Django 的视图\n\n### 本章内容\n\n- 了解 Django 中的视图\n\
    - URL 路由\n- 正则表达式\n\n在上一章中，我们学习了 Django 模型及其基本数据库应用、Django 中的数据库类型，以及一些关于 Django\
    \ 数据库层更高级用法的信息。还涵盖了各种类型的键及其关系。本章介绍 Django 的视图接口。\n\n在本章中，你将学习视图，包括基础知识和高级内容：为网页创建动态和静态\
    \ URL：正则表达式、基于类的通用视图和基于函数的通用视图，以及它们的类型。\n\n## DJANGO 中的视图\n\n在 Python 中，视图函数（简称视图）用于接收\
    \ Web 请求并返回 Web 响应。这是通过在网页上使用 HTML 内容、文本渲染、文档、图形、样式和其他技术来实现的。它本身包含返回该响应给客户端所需的所有逻辑。这段代码可以放在浏览器上的任何位置，只要它在你的\
    \ Python 路径上即可。\n\n## URL 的配置\n\n每当启动开发服务器时，你会在屏幕上看到 Django 的欢迎页面。在 Django 中，要拥有一个新视图，你必须告诉\
    \ Django 当有人导航到站点根 URL（页面名称）时应显示索引视图。我们通过添加新的 URL 来实现这一点。\n\n在 Django 中，path()\
    \ 函数也用于配置 URL 以将视图映射到 URL。path 函数包含在 Django.url 下，在 Django 项目代码库中，其基本形式是 path()\
    \ 函数。\n\n语法：\n\n```\npath(route, view)\n```\n\n基本 path() 函数的示例是 path('mypage/',\
    \ views.myview)\n\n1. path() 函数还可以接受一个可选的 name 参数，以及零个或多个作为 Python 字典（Python 中的一个概念）传递的关键字参数。我们将在本书后面详细介绍这些内容。\n\
    2. path() 函数语句位于一个名为 urls.py 的特殊文件中。\n\n当 startproject 创建我们的网站时，它在我们的站点文件夹（\\\
    mysite\\urls.py）中创建了一个 urls.py 文件。\n\n简单视图的代码：\n\n```\nfrom Django.http import\
    \ HttpResponse\ndef index(request):\n    return HttpResponse(\"Hello Python\"\
    )\n```\n\n让我们逐行分析这段代码：\n首先，你导入 HttpResponse 类，它位于 Django.HTTP 模块中。导入它以供代码后续使用。\n\
    \n- 接下来，你定义一个名为 index 的函数——视图函数。\n- 每个视图函数至少接受一个参数，按照惯例简单地称为 request。此对象包含有关触发此视图的当前\
    \ Web 请求的信息，它是以下类的实例：Django.HTTP.HttpRequest。\n- 视图函数的名称无关紧要；它不必被命名。\n- 在某种程度上，Django\
    \ 必须识别它。因此，每个 URL 都应该有一个唯一的名称，以避免混淆。我们称它为 index，以便它可以渲染索引页。\n- 该函数是一个简单的单行函数，仅返回一个\
    \ HttpResponse 对象，该对象已使用文本 \"Hello Python\" 进行实例化。\n\n此代码用于实现 Django 中视图的基础知识；上述代码告诉了在项目中使用\
    \ URL 需要导入什么。\n\n## 将 URL 映射到视图\n\n此图可以按你需要的长度进行绘制。它具有引用其他映射的能力。它也可以动态构建，因为它是纯\
    \ Python 代码。你创建一个名为 URLconf 的 Python 模块来为应用程序设计 URL（URL 配置）。它轻松地将 URL 路径表达式映射到\
    \ Python 函数（视图）。\n\n## 它如何处理请求？\n\n当用户从你的 Django 站点请求页面时，系统遵循 Python 代码执行的过程如下：\n\
    \n- 它（Django）确定要使用的根 URLconf 模块。\n- 它加载 Python 模块并查找变量 urlpatterns，该变量可以在项目的 urls.py\
    \ 中定义。这应该是编写 Django.URLs.path() 的一种方式。\n- 它按顺序运行每个 URL 模式，并在第一个匹配请求 URL 的模式处停止，与\
    \ path_info 进行匹配。\n- 当其中一个 URL 模式与你的视图匹配，并且匹配的 URL 模式不包含命名组时，则正则表达式中的匹配项将作为位置参数提供。\n\
    \n## 什么是 URL 路由？\n\n在将正则表达式用于 Django 之前，我们需要了解什么是 URL 路由；它实际上非常容易理解。它只是 Django\
    \ 理解用户请求内容的方式。\n这些路由称为静态路由。\n\n| 路径 | URL 路由 | 视图名称 |\n|---|---|---|\n| http://example.com/\
    \ | / | IndexPageView |\n| http://example.com/about/ | /about/ | AboutPageView\
    \ |\n| http://example.com/user/id | /user/id/ | UserIdView |\n\n这些会做什么？\n\n- /\
    \ - 渲染项目的根页面。\n- /about/ - 当用户请求时渲染关于页面。\n- /user/id - 渲染带有其 ID 号的用户。用户将了解添加的任何用户数据。\n\
    \n这些路由称为动态路由。\n\n| 路径 | URL 路由 | 视图名称 |\n|---|---|---|\n| http://example.com/user/data/content\
    \ | /user/data/content | UserDataContent |\n| http://example.com/about/company-name\
    \ | /about/company-name | AboutCompanyView |\n| http://example.com/user/id | /user/id/\
    \ | UserIdView |\n\n上面的示例是静态路由，因为它们永远不会改变。/about/ 路径将始终是 /about/ 路径（除非我们手动更改它）。\n\
    处理程序（视图）对于两个路径将是完全相同的。视图（处理程序）知道要显示哪个帖子的唯一方法是它必须接受一些额外的值。\n\n- 关键字参数是你在将变量传递给函数时为其命名的地方。\n\
    - django.URLs.path() 或 django.URLs.re_path()。\n\n在 Django 中，我们使用路径转换器创建动态 URL。路径转换器具有简单的语法：\n\
    \n<type:variable>\n\n有五种不同的路径转换器类型：\n\n1. **str**：匹配任何非空字符串，不包括 '/'。\n2. **path**：匹配任何非空字符串，包括\
    \ '/'。对于匹配整个 URL 很有用。\n3. **int**：匹配一个整数\n4. **slug**：匹配任何 slug 字符串。例如，slugs-are-text-strings-with-hyphens-and_underscores\n\
    5. **UUID**：匹配通用唯一标识符（UUID）\n\n此示例包含路径转换器的 URL：\n\n- /<int:year>/<str:month>/\n\
    \n让我们将其写下来，并在 urls.py 中为视图函数修改此内容：\n\n```\nurlpatterns = [\n    # path('', views.index,\
