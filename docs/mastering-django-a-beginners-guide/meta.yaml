    \ crossorigin=\"anonymous\"></script>\n    <script src=\"https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js\"\
    \ integrity=\"sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfkTj0Uod8GCExl3Og8ifwB6\"\
    \ crossorigin=\"anonymous\"></script>\n  </body>\n</html>\n```\n\n## 使用 Django\
    \ 的 as_crispy_field 表单过滤器\n\n使用格式 `{{form.name_of_field|as_crispy_field}}`。这样，你就可以更改表单字段的显示顺序。\n\
    \n```\n<div>\n    <h1>Contact</h1>\n    <form method=\"post\">\n        {% csrf_token\
    \ %}\n        {{form.first_name|as_crispy_field}}\n        {{form.last_name|as_crispy_field}}\n\
    \        <button type=\"submit\">Submit</button>\n    </form>\n</div>\n```\n\n\
    ## 当 Crispy 表单不工作时该怎么办？\n\n- 检查已安装的包名称是否正确。\n- 确保在设置中添加了 `crispy_template_pack`。\n\
    - 务必在 HTML 模板顶部加载 `crispy_forms_tags`。\n- 使用的表单过滤器必须是 `|crispy` 或 `|as_crispy_field`。\n\
    \n## 模板包\n\nDjango-crispy-forms：它有一个内置应用程序，用于帮助管理 Django 中的表单，并支持不同的 CSS 框架，如\
    \ Bootstrap，在 Django-crispy-forms 中称为模板包：\n\n- Bootstrap 是 crispy-forms 的默认模板包，是简单灵活的\
    \ HTML、CSS 和 JavaScript 用户界面 bootstrap3 的第 2 版。\n- 支持 Twitter Bootstrap 第 4 版。\n\
    - Uni-form 是一个外观精美、结构良好、高度可定制、可访问且易用的表单。\n- 此模板包可通过 crispy-forms-foundation 获得。\n\
    - Tailwind 是一个实用优先的框架。此模板包可通过 crispy-tailwind 获得。\n\nCrispy 表单不包含静态文件，如 CSS 和\
    \ JavaScript。你需要根据所使用的 CSS 框架（模板包）自行包含适当的静态和媒体文件。\n\n## 如何使用 Bootstrap 为 Django\
    \ 表单设置样式\n\n使用 Bootstrap 渲染 Django 表单需要你 `pip install bootstrap4` 或将 Bootstrap\
    \ CDN 和 JavaScript 添加到文件中。\n\n```\n<!DOCTYPE html>\n<html>\n<head>\n    <!-- Required\
    \ meta tags -->\n    <meta charset=\"utf-8\">\n    <meta name=\"viewport\" content=\"\
    width=device-width, initial-scale=1, shrink-to-fit=no\">\n\n    <!-- Bootstrap\
    \ CSS -->\n    <link rel=\"stylesheet\" href=\"https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css\"\
    \ integrity=\"sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk\"\
    \ crossorigin=\"anonymous\">\n\n</head>\n<body>\n    <div class=\"container\"\
    >\n        <div class=\"row justify-content-center\">\n            <div class=\"\
    col-8\">\n                <h1 class=\"mt-2\">Django People</h1>\n            \
    \    <hr class=\"mt-0 mb-4\">\n                {% block content %}\n         \
    \       {% endblock %}\n            </div>\n        </div>\n    </div>\n    <!--\
    \ Optional Javascript -->\n    <script src=\"https://code.jquery.com/jquery-3.4.1.slim.min.js\"\
    \ integrity=\"sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n\"\
    \ crossorigin=\"anonymous\"></script>\n    <script src=\"https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js\"\
    \ integrity=\"sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo\"\
    \ crossorigin=\"anonymous\"></script>\n    <script src=\"https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js\"\
    \ integrity=\"sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6\"\
    \ crossorigin=\"anonymous\"></script>\n</body>\n</html>\n```\n\n## 表单助手\n\nDjango-crispy-forms\
    \ 应用程序有一个名为 `FormHelper` 的特殊类，旨在让你的生活更轻松，并为你提供足够的控制力来决定如何渲染表单。\n\n## Django UserCreationForm\n\
    \n`UserCreationForm` 用于创建具有内置字段的新用户。请注意，使用 \"UserCreationForm\" 创建的用户没有电子邮件字段，因此你可以通过添加更多代码行来添加它。它包含以下主要属性：\n\
    \n- username\n- password\n- first_name\n- last_name\n\n## 实现 Django UserCreationForm\n\
    \n要使用 `UserCreationForm`，我们需要从 `django.contrib.auth.forms` 导入它。\n\n```\nfrom django.contrib.auth.forms\
    \ import UserCreationForm\n```\n\n`UserCreationForm` 示例：\n\n**form.py**\n\n```\n\
    from django.shortcuts import render\nfrom django.contrib.auth.forms import UserCreationForm\n\
    # Create your views here.\ndef register(request):\n    if request.POST == 'POST':\n\
    \        form = UserCreationForm()\n        if form.is_valid():\n            form.save()\n\
    \            messages.success(request, 'Account created successfully')\n    else:\n\
    \        form = UserCreationForm()\n    context = {\n        'form':form\n   \
    \ }\n    return render(request, 'register.html', context)\n```\n\n**register.html:**\n\
    \n```\n<div class = \"register\">\n    {% if messages %}\n        <ul>\n     \
    \       {% for message in messages %}\n                <li>{{ message }}</li>\n\
    \            {% endfor %}\n        </ul>\n    {% endif %}\n    <form method=\"\
    post\" >\n        {% csrf_token %}\n        <table>\n            {{ form.as_table\
    \ }}\n            <tr>\n                <td></td>\n                <td><input\
    \ type=\"submit\" name=\"submit\" value=\"Register\" /></td>\n            </tr>\n\
    \        </table>\n    </form>\n</div>\n```\n\n**view.py:**\n\n```\nfrom django.urls\
    \ import path\nfrom .views import *\nurlpatterns = [\n    path('register', register,\
    \ name = 'register')\n]\n```\n\n完成所有代码后，你只需运行服务器并在浏览器中打开此链接，即 http://127.0.0.1:8000/register。\n\
    \n## 我们使用 SELF.CLEANED_DATA 的原因\n\n数据作为字符串传递到服务器，甚至浏览器也以字符串形式获取所有内容。当 Django 清理数据时，它会自动将数据转换为适当的类型。\n\
    \n- `name = form.cleaned_data['name']`\n\n## 理解 Python 中的 Args 和 Kwargs\n\n在这里，我将教你什么是\
    \ args 和 kwargs，以及如何使用它们。\n\n## 什么是 Args？\n\n1. `*args` 用于传递非关键字参数。非关键字参数的示例是\
    \ `fun(12,14)`、`fun(\"value1\",\"value2\")`。\n2. `*args` 通常用于防止程序崩溃。如果我们不知道将有多少参数传递给函数。这在其他编程语言中也有使用。\n\
    \n它使得使用任意数量的参数变得容易，而无需更改代码。它为你的代码提供了更多的灵活性，因为将来你可以拥有任意数量的参数。\n\n示例：\n\n```\ndef\
    \ func(*args):\n    for arg in args:\n        print(arg)\nfunc(11,22,33,\"Django\"\
    ,\"Python\")\nlist = [11,22,33,\"Django\",\"Python\"]\nfunc(list)\n```\n\n```\n\
    #OUTPUT\n11\n22\n33\nDjango\nPython\n#List\n[11, 22, 33, 'Django', 'Python']\n\
    ```\n\n## 什么是 Kwargs？\n\n`**kwargs` 是一个关键字参数字典。双星号 (`**`) 符号允许我们传递任意数量的参数。关键字参数通常是一个字典。\n\
    这里有一个关键字参数的示例 `fun(a=1,b=17)`。\n`**kwargs` 与 `*args` 类似，不同之处在于你在同一个函数参数中声明变量及其数量。\n\
    \n## Args 和 Kwargs 的使用\n\n当你需要以下情况时，Args 和 kwargs 非常方便：\n\n- 在函数中传递多个参数\n- 减少代码编写\n\
    - 使你的代码更具可读性\n- 重用代码片段\n\n## 在函数中同时使用 Args 和 Kwargs\n\n在同一函数定义中同时使用 args 和 kwargs\
    \ 时，`*args` 必须出现在 `**kwargs` 之前。\n\n```\ndef __init__(self, *args, **kwargs):\n\
    ```\n\n## 章节总结\n\n在本章中，我们介绍了 HTML 表单：它们的工作原理和语法。我们还研究了在 Django 表单中使用 `csrf_token`、小部件和属性实现\
    \ crispy 表单。我们还学习了 `UserCreationForm`。在下一章中，我们将学习高级模型。"
