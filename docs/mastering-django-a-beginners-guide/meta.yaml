    It is pretty scalable, like using a shared-nothing architecture, which means you
    can add hardware at any level – database servers, caching servers, or applications
    servers. It has various other advantages: it has an intuitive administration interface,
    ORM, RSS feeds, and many more.


    It builds websites dynamically, it is extremely fast, and SEO optimized.


    # HOW TO CREATE A TO-DO LIST APP IN PYTHON DJANGO


    A list that keeps track of all the tasks you perform in a single day is called
    a to-do list. It is a manageable way to complete tasks on time. It makes the users
    responsible for also knowing the value of time. Today we will be creating a to-do
    list application using the Django framework. The main motive of this to-do list
    is to get some knowledge of Python syntax and Django CRUD. It has some basic functionality
    like Create, Read, Update, and Delete. Users can add their tasks and also delete
    them.


    If you know the fundamentals of Django and Python well, then you are good to go
    with this project. Here are the steps to start this project.


    +   1. **Install Python:** Before we go forward, ensure you have Python installed
    in your system. If you do not have Python, install Python from its official site.

    2. Add environment variable in the environment variable set so that you won''t
    get any problem regarding the path.

    3. Create a folder and then create a virtual environment in it using Python –m
    venv Virtual_env.

    4. Activate the virtual environment when it has been installed in your folder.

    5. Move to directory Scripts, using the cd command.

    6. The run activates in the folder.

    7. It will let you move to the end of the project, where you have to install your
    Django using pip install Django.

    8. After installation of Django, move back to the project folder using cd .. twice.'
