    # AWS ELASTIC BEANSTALK


    It is an easy-to-use service for deploying and scaling web applications and services
    developed with Python, Ruby, and Go. You can automatically upload your code into
    Elastic Beanstalk that handles the Application’s deployment, load balancing, and
    autoscaling. There are no additional charges for Elastic Beanstalk.


    Benefits


    +   - **Fast and straightforward**: It is the quickest way to deploy your application
    on AWS. You use the AWS management console, a Git repository, or IDEs suck as
    Visual Studio to upload your whole project.

    - **Developer productivity**: It manages the Application’s infrastructure. It
    will keep the underlying platform running your Application up to date with the
    latest features.

    - **Complete resource control**: It allows retaining full control over the AWS
    resources powering your application. You can select any AWS resources such as
    AC2 that will provide optimally for your Application.


    Now create the virtual environment to use the ASW services.

    First, sign up and have an ASW account and login credentials. To learn more about
    it, visit https://aws.amazon.com/

    It would be best if you had all of the Common Prerequisites for Python installed,
    including the following packages:


    +   - Python 3.7 or later

    - pip

    - virtual

    - awsebcli


    Our requirement for Django is done. Now configure your Django application for
    Elastic Beanstalk.

    By default, Elastic Beanstalk has a file named application.py to run their Django
    application. Because this does not exist in the Django project'
