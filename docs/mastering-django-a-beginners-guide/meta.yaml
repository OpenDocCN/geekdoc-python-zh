    模板目录是一个目录，所有 HTML 模板都将在此渲染以显示输出。让我们讨论每个模板。\n\n### templates > Base.html\n\n```html\n\
    {% load static %}\n<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"\
