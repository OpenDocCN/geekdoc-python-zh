    # What Is Cloud Computing?


    Cloud computing means storing, accessing data, and programs over the Internet.
    It is an application-based software infrastructure that stores data on small serves,
    accessed through the Internet.


    # Types of Clouds


    There are three types of cloud:


    +   1. **Public cloud**: In this cloud, the third-party service providers make
    all the resources and services available to their customers via the internet.

    2. **Private cloud**: A private cloud has almost the same feature as the public,
    but all the organizations manage all the resources. The main work to focus on
    is infrastructure.

    3. **Hybrid cloud**: A hybrid cloud is a combination of both private and public
    clouds. Its strategy provides you the greater flexibility in your businesses.
    It helps organizations replicate on-premise workloads and backup over the cloud
    server.


    # Cloud Services Models


    +   - **IaaS**: It stands for Infrastructure as a Service. It provides users with
    the capability to process, storage, and network connectivity on demand.

    - **PaaS**: It stands for Platform as a Service. This will provide services like
    databases, queues, workflow, and the engine, which has resources to focus more
    on their Application''s functionality.'
