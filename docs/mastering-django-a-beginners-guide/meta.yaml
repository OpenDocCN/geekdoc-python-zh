    \ (change up a directory)\n- ls (list files in your current directory)\n- PWD\
    \ (print working directory)\n- mkdir (make directory)\n- touch (create a new record)\n\
    \n## HOW DOES DJANGO CODE LOOK LIKE?\n\nThe code consists of URLs, views, models,\
    \ and templates. The below figure shows how data pass in Django. The user interacts\
    \ with the browser and clicks on links that work as URLs of the particular application.\
    \ The user’s data is stored in Django using Models, Python objects, that define\
    \ the structure of an application’s data and give us privileges to manage (add,\
    \ modify, delete) and record queries in the database. Users can see the content\
    \ using templates. HTML files work as templates in Django. All the information\
    \ passes by the views. Views are requested handler function which receives HTTP\
    \ requests and returns HTTP responses. Views access the data needed to satisfy\
    \ demands via models and delegate the response formatting to templates.\n\n![](img/6b248a6900b90aa4ebb02bce8e067804_36_0.png)\n\
    \n## THE MODEL TEMPLATE VIEW (MTV) DESIGN PATTERN\n\nDjango follows this MTV pattern\
    \ closely enough to be called an MTV framework based on the MCV or model view\
    \ controller. The difference between these two is that Django itself cares about\
    \ the controller part. Here’s roughly how the M, T, and V break down in Django.\n\
    \nMVC stands for model view controller. It is used for developing web applications,\
    \ where we break the code into various segments. Here we have three components:\
    \ model, view, and controller:\n\n1. “M” stands for model, the data-access layer.\
    \ This data layer contains the required fields of the data you are storing in\
    \ the database. The model helps developers to create, read, update data in the\
    \ original database.\n\n```python\nfrom django.db import models\nfrom django.contrib.auth.models\
    \ import User\nclass Post(models.Model):\n    title= models.CharField(max_length=100)\n\
    \    description=models.TextField()\n```\n\n2. “T” stands for template, the presentation\
    \ layer. This layer contains presentation-related decisions: how something should\
    \ be displayed on a Web page or other type of document. A template is used only\
    \ to present the data since there is no business logic in it.\n\n- To configure\
    \ the Template, go to the setting.py file and update the DIRS to the path of the\
    \ template folder. The entire Template is kept under the template folder.\n\n\
    3. “V” stands for view, the business logic layer which interacts with the model\
    \ and carries data to the Template. This layer accepts the HTTPS request, logic\
    \ by Python classes and methods. You can think of it as the bridge between models\
    \ and templates. It is a call-back function for a particular URL.\n\n4. “C”, which\
    \ stands for controller, is a business logic that will interact with the model\
    \ and the view, but Django takes it by itself. That’s why we use the MTV pattern\
    \ in Django."
