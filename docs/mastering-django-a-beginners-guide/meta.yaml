    ## Django Admin 自定义页面布局、数据和行为\n\n有多种方法可以自定义 Django admin 页面的设计、数据和行为。你可以自定义所有\
    \ Django admin 页面中使用的特定全局值，而无需修改任何 Django 模板。Django.contrib 包中的 admin.site 对象上有许多声明：\n\
    \n1. **admin.site.site_header**：它定义了所有 Django admin 页面中使用的标题（例如，在深蓝色页眉和登录页面中）\n\
    2. **admin.site.site_title**：它定义了使用的标题。它将所有 Django admin 页面定义为 HTML 标题的一部分。\n\
    3. **admin.site.site_url**：它定义了域名（例如，coffeehouse.com），用作 Django admin ‘查看网站’链接的一部分，以便轻松地从\
    \ Django admin 访问实时网站。\n4. **admin.site.index_title**：它定义了 Django admin 主页面的标题。\n\
    5. **admin.empty_value_display**：它定义了当 Django admin 模型值为空时显示的默认值。\n\n## 模型 Admin\
    \ 类\n\n它定义了管理面板中自定义用户定义模型的表示。它用于覆盖各种操作。ModelAdmin 类提供了许多选项范围。\n\n**ModelAdmin.exclude：**\n\
    \n```python\n# ModelAdmin Class #\nclass Product_Details(admin.ModelAdmin):\n\
    \    exclude = ('description', )\n```\n\n此 ModelAdmin 类覆盖了 admin 创建的默认类视图。在上面的示例中，变量\
    \ ‘descriptions’ 将被排除。exclude 变量接受元组；列表作为输入或数组，只有名称将显示在管理面板中。\n\n**ModelAdmin.fields：**\n\
    \n```python\n# ModelAdmin Class #\nclass Product_Details(admin.ModelAdmin):\n\
    \    fields = ('name','description')\n```\n\n此模型将更改管理面板中模型的布局。显示的字段仅限于其中定义的字段。\n\
    \n**ModelAdmin.fieldsets：** 设置 fieldsets 以控制 admin “添加”和“更改”页面的设计和布局。fieldset\
    \ 是一个包含两个元组的列表，其中每个二元组代表表单页面上的一个 <fieldset>。（<fieldset> 是表单的一个小“部分”。）\n\n```python\n\
    # ModelAdmin Class #\nclass Product_Details(admin.ModelAdmin):\n    fields = ('name','description')\n\
    ```\n\n此模型将更改管理面板中模型的布局。显示的字段仅限于其中定义的字段。\n\n```python\nclass FlatPageAdmin(admin.ModelAdmin):\n\
    \    fieldsets = (\n        (Options, {\n            'fields': ('url', 'title',\
    \ 'content', 'sites')\n        }),\n    )\n```\n\n字段可以具有直接类型的值，如下所示：\n\n```python\n\
    {\n    'fields': (('firstname', 'lastname'), 'address',\n    'city', 'state'),\n\
    }\n```\n\n**ModelAdmin.form：**\n\n```python\nclass CustomForm(forms.ModelForm):\n\
    \    class Meta:\n        model = Person\n        exclude = ['name']\n\nclass\
    \ Person_APanel(admin.ModelAdmin):\n    exclude = ['age']\n    form = CustomForm\n\
    ```\n\n在上面的代码中，我们为模型创建了一个动态表单来存储值，并在 AdminModel 类中定义它们。\n\n**ModelAdmin.list_display：**\n\
    \n```python\nclass PersonAdmin(admin.ModelAdmin):\n    list_display = ('first_name',\
    \ 'last_name')\n```\n\n设置 list_display 以控制在 admin 的更改列表页面上显示的字段。\n\n1. **ModelAdmin.list_editable**：它将\
    \ list_editable 设置为模型上的字段名列表，这将允许在更改列表页面上进行编辑。它将作为表单小部件显示在更改列表页面上，允许用户一次编辑和保存多行。\n\
    2. **ModelAdmin.list_filter**：要使用此过滤器，请定义 list_filter 以在 admin 列表页面的侧边栏中激活过滤器。它可能是一个元素列表或元组，其中每个元素应是以下类型之一：\n\
    \    1. 指定的字段应为 BooleanField 类型、CharField 类型、DateField 类型、DateTimeField 类型、IntegerField\
    \ 类型、ForeignKey 或 ManyToManyField 类型\n3. **ModelAdmin.ordering：** 要使用此过滤器，请定义\
    \ set 方法以指定在 Django admin 视图中应如何调用对象列表。\n4. **ModelAdmin.paginator：** 分页器类用于分页。默认情况下，使用\
    \ Django.core.paginator.Paginator。假设自定义类没有相同的构造函数接口。那么它还需要为 ModelAdmin.get_paginator()\
    \ 提供一个实现。\n5. **ModelAdmin.radio_fields：** 默认情况下，Django admin 使用选择框界面（<select>）来选择字段为\
    \ ForeignKey 或持有 choices 集的字段。你可以选择使用 Django.contrib.admin 模块中的 HORIZONTAL 或 VERTICAL。\n\
    6. **ModelAdmin.autocomplete_fields：** 要使用此过滤器，请将 autocomplete_fields 定义为 ForeignKey\
    \ 和 Many-To-ManyField 字段的列表，如果你想将其更改为自动完成输入。\n7. **ModelAdmin.search_fields：**\
    \ 要使用此过滤器，请定义 set search_fields 以允许在 admin 列表页面上有一个搜索框。它应设置为字段名列表，当有人在该文本字段框中给出搜索查询时，将搜索这些字段。\n\
    \    这些字段应是一些文本字段，例如 CharField 或 TextField。\n    示例，\n    * search_fields = ['foreign_key__fieldname']\n\
    8. **class apps.AdminConfig：** 它是管理面板的默认 AppConfig 类。\n    autocover() 将在每个应用程序中导入一个\
    \ admin 模块。这些模块用于向管理面板注册模型。\n9. **Class apps.SimpleAdminConfig：** 此类的工作方式类似于 AdminConfig，只是它不调用\
    \ autodiscover()。\n10. **ModelAdmin.date_hierarchy：** 它被定义为将 date_hierarchy 设置为注册模型中的\
    \ DateField/DateTimeField 的名称，并且"
