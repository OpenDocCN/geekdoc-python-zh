    Django.


    # TYPES OF PYTHON FRAMEWORK


    Python frameworks are categorized into various types:


    +   1. **Full Stack Framework**: Also known as enterprise framework, it is one
    of the best solutions for all development needs. It is a person who can quickly
    develop both client and server-side software. These have built-in libraries to
    work smoothly and continuously. They hold up the development of databases, frontend
    interfaces, and backend services. The Full Stack developer can handle all the
    benefits.

    2. **Micro Framework**: These frameworks are lightweight, minimalist web applications
    that limit functionalities and features. They are required for just building an
    application. They lack additional functionality like control database stuff, authentication,
    validation, and backend services.


    Let''s have a look at the difference between the Python frameworks.


    # WHAT IS FLASK?


    It is an API of Python that allows us to build up web applications. Armin Ronacher
    developed it, and it is easier to learn because it has less code to implement.
    A Web Application Framework is the collection of modules and libraries that helps
    the developer to write applications. It is based on the WSGI (Web Server Gateway
    Interface) toolkit and Jinja2 templates.


    ![](img/6b248a6900b90aa4ebb02bce8e067804_292_1.png)


    Comparison of Flask with Django.'
