    # Function-Based Views


    Let us have a brief look at function-based views and class-based views.

    Function-based views are used by a beginner to easily understand that this will
    work as function. It is easy to understand in comparison to class-based views.


    +   - It provides explicit code flow.

    - It is a straightforward usage of decorators.

    - But function-based view can''t be extended and also leads to code redundancy.


    # Class-Based Views


    This is special view that takes a request and returns a response. Django provides
    a few examples of some classes which can be used as views. These will allow you
    to restructure and reuse code for your views by harnessing inheritance and mixins.


    +   - It supports the DRY convention of Django.

    - We can enlarge class-based views and can add extra functionality according to
    our requirements using mixin.

    - It allows inheriting methods and features from another class and can be modified
    for various use cases.


    # Examples:


    All views inherit from the View class, which handles linking the view into the
    URLs, HTTP method dispatching, and other common features. RedirectView provides
    a HTTP redirect, and TemplateView extends the base class to make it also render
    a template.'
