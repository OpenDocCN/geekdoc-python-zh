- md: "## Azure deployment.\n\nFill out the information required. We will be calling\
    \ our app azure-Django-demo. Make sure that when you are filling the configuration,\
    \ your system will be Linux, not Windows.\n\n![](img/6b248a6900b90aa4ebb02bce8e067804_236_0.png)\n\
    \nFind the app service, the resource created.\n\n![](img/6b248a6900b90aa4ebb02bce8e067804_236_1.png)\n\
    \nThe following should pop up on the screen:\n\n![](img/6b248a6900b90aa4ebb02bce8e067804_237_0.png)\n\
    \nClick on “Deployment Center” on the left sidebar (the light sidebar, not the\
    \ dark). On-screen “Deployment Center” with three steps displayed pop-ups. You\
    \ will first (1) deploy through GitHub, (2) use the App Service build service,\
    \ and then (3) configure with your username, repo, and branch.\n\n![](img/6b248a6900b90aa4ebb02bce8e067804_237_1.png)\n\
    \nFinally, we will perform a few configuration changes to the Python app. In the\
    \ search bar, you will find “Extensions”. Scroll to find and click the latest\
    \ Python version (currently at Python 3.7). Once added, we will use the search\
    \ bar to search for the “Configuration”. Move to “General settings” in the Window\
    \ that pops up on the screen, and change the Stack and Python Version to Python\
    \ and 3.7, respectively.\n\n![](img/6b248a6900b90aa4ebb02bce8e067804_238_0.png)\n\
    \nYou should be able to get your website at azure-django-demo.azurewebsites.net.\n\
    \n## Azure Deployment Files\n\nTo deploy onto Azure, we will need one additional\
    \ file, requirement.txt, which specifies the Azure package to install for your\
    \ app to work. If you want to access the Azure app live, then add '*' in ALLOWED_HOST\
    \ like ALLOWED_HOST = ['*'].\n\n## GIT\n\nIt is a free and open distributed version\
    \ control system that lets you manage and hold onto the track of your source code\
    \ history, and where Github is a cloud-based hosting service that collects Git\
    \ repository. If you have an open-source that use Git, then Github is designed\
    \ to help you better manage them. Why do we need both? You do not need Github\
    \ to use Git, but you cannot use Github without using Git.\n\n- **Installing Git:**\
    \ You can download it from their formal site and install it on your PC. Git has\
    \ its two-mode modes of use – a bash scripting shelly (command line) and a graphical\
    \ user interface (GUI).\n- **Configure Github Credentials:** Configure your local\
    \ Git installations to use your Github credentials by entering the following:\n\
    \    - git config –global user.name \"Enter your name\".\n    - git config –global\
    \ user.email \"email_address\".\n- **Clone a Github Repository:** Go to your repository\
    \ on Github. In the top right above, open the Clone or download dropdown menu.\
    \ Copy the URL for cloning over HTTPS.\n- **Setting Up a Local Repository:** Open\
    \ your project location and open the Git bash for the same path. It can be downloaded\
    \ from the internet. Then run these lines of code one by one:\n    - **git init:**\
    \ It will initialize Git as creating .git name folder in your project.\n    -\
    \ **git add:** For adding all the files, run this command and manually use “git\
    \ add folder/filename”.\n    - **git commit –m:** ‘First Commit done’.\n    -\
    \ git remote add origin \"PASTE THE URL OF YOUR NEW REPOSITORY IN GITHUB\" example,\
    \ https://github.com/project_name.git.\n    - **git push –u origin:** It will\
    \ add your files in the git repository of your account.\n    - **git status:**\
    \ Check your current level.\n\n## CHAPTER SUMMARY\n\nIn this chapter, we covered\
    \ the deployment of Django using the various cloud platforms like AWS Elastic\
    \ Beanstalk, Microsoft Azure, Github, and Git. We have multiple options for deployment\
    \ over the internet, free as well as paid. Paid will have more features than free,\
    \ so if you’re a beginner, first go for free and then for paid after getting familiar\
    \ with their environment.\n\n![](img/6b248a6900b90aa4ebb02bce8e067804_240_0.png)\n\
    \nTaylor & Francis\nTaylor & Francis Group\nhttp://taylorandfrancis.com\n\n# CHAPTER\
    \ 11\n\n## Create Quiz Web App with Python Django\n\n### IN THIS CHAPTER\n\n-\
    \ Getting to know the basics of Django\n- Todo application overview\n- Project\
    \ code\n\nIn this chapter, beginners will learn the basics of Python Django before\
    \ starting any web-based application or development. It is important to have a\
    \ good understanding of the basics before attempting any projects.\n\nBefore we\
    \ discuss Django, let’s first look at why we need a web framework. A web framework\
    \ is a server application framework that is designed to support dynamic websites.\
    \ With the help of this framework, you don’t have to bother about web development.\
    \ There are various web development frameworks available on the market. Some of\
    \ them are as follows:\n\n### REACT, FLASK, RUBY ON RAILS, ETC.\n\nOne of the\
    \ main points of Django is that it is built on Python. It follows the principle\
    \ of DRY – “Don’t Repeat Yourself”. It takes care of user content administration,\
    \ authentication, site maps, and many more. It is highly secure. It helps all\
    \ the other developers avoid many common security mistakes, such as SQL injection,\
    \ cross-site scripting, csrf/xsrf, and click-jacking.\n\nIt is pretty scalable,\
    \ like using a shared nothing pattern, which means you can add hardware at any\
    \ stage – database servers, caching servers, or applications servers. It has various\
    \ other advantages: it has an automatic administration interface, ORM, RSS feeds,\
    \ and many more. It builds websites dynamically, it is extremely fast, and it\
    \ is SEO optimized.\n\n## HOW TO CREATE A QUIZ LIST APP IN PYTHON DJANGO\n\nLet’s\
    \ develop our own Quiz App Project in Django and let others test their knowledge\
    \ using the quiz. This will help you understand the basics of the Django Python\
    \ framework and how to design the frontend and backend parts. Everyone likes to\
    \ attempt a quiz, checking scores at the end, and seeing how much time it takes\
    \ to attempt to make an answer. Have you ever tried to make a quiz that other\
    \ people can play using some of your programming knowledge? If you are a beginner\
    \ at Django, then it is the perfect project for you. It will improve your frontend\
    \ skills, including HTML, CSS, and so on.\n\n### Purpose\n\nThe objective of our\
    \ project is to make a quiz that has different topics using the Python Django\
    \ framework. Good knowledge of Django and frontend skills is enough for the project.\n\
    \n### Project Prerequisites\n\n- **Text-Editor:** Any text-editors like Visual\
    \ Code, Brackets, PyCharm, and so on. You can download these editors from the\
    \ internet. These editors can help you to understand the structure most thoroughly.\n\
    - **Python3:** You should have the latest version of Python in your system; visit\
    \ the Python Official Website to get that.\n\n> Note: You can easily follow this\
    \ project to understand the basics of Python and learn about loops, functions,\
