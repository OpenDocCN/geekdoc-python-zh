    \ that CDN links and paste them into your HTML file. Paste the CSS link in the\
    \ head section of HTML and script links in the script tag itself above the `</body>`\
    \ body closing tag.\n\n    Example:\n\n    ```html\n    <!--this is CSS Link-->\n\
    \    <link rel=\"stylesheet\" href=\"https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css\"\
    >\n    <!--this is Js link-->\n    <script src=\"https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js\"\
    ></script>\n    ```\n\n- Using the terminal, run the command to install it.\n\
    \    1. Install with bower, with simple command as given below:\n        `C:\\\
