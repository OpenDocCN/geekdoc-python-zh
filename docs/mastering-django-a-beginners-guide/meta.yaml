    \ Templates\n\n### IN THIS CHAPTER\n\n- Getting to know about Django’s templates\n\
    - Templating engine Jinja\n- Loaders\n- Static files\n\nIn the last chapter, we\
    \ learned about Django’s models with their implementation, syntax, models package,\
