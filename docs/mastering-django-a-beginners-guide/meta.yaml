    # DJANGO MODEL DEFINITION


    Django''s models are classes that provide an object-oriented way of dealing with
    databases. Each attribute corresponds to a database column, and each type belongs
    to a database table. An automatically produced API can be used to query these
    tables. It is usually defined in an application''s model.py. They are applied
    as subclasses of Django.DB.models.Model and include fields, method, and metadata
    of class.'
