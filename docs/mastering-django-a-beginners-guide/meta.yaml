    \n```python\nfrom django.views.generic.list import ListView\nclass EmployeeRetrieve(ListView):\n\
    \    model = Employee\n```\n\n3. **DetailView**：DetailView 与 ListView 略有不同，因为它只显示数据库中表的一个实例。Django\
