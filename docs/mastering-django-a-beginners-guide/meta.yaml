  - "[PAGE 37]\n\n# THE MODEL TEMPLATE VIEW (MTV) DESIGN PATTERN\n\nDjango follows\
    \ this MTV pattern closely enough to be called an MTV framework based on the MCV\
    \ or model view controller. The difference between these two is that Django itself\
    \ cares about the controller part. Here’s roughly how the M, T, and V break down\
    \ in Django.\n\nMVC stands for model view controller. It is used for developing\
    \ web applications, where we break the code into various segments. Here we have\
    \ three components: model, view, and controller:\n\n+   1. “M” stands for model,\
    \ the data-access layer. This data layer contains the required fields of the data\
    \ you are storing in the database. The model helps developers to create, read,\
    \ update data in the original database.\n\n```\nfrom django.db import models\n\
    from django.contrib.auth.models import User\nclass Post(models.Model):\n    title=\
    \ models.CharField(max_length=100)\n    description=models.TextField()\n```\n\n\
    +   2. “T” stands for template, the presentation layer. This layer contains presentation-related\
    \ decisions: how something should be displayed on a Web page or other type of\
    \ document. A template is used only to present the data since there is no business\
    \ logic in it.\n\n+   • To configure the Template, go to the setting.py file and\
    \ update the DIRS to the path of the template folder. The entire Template is kept\
    \ under the template folder.\n\n+   3. “V” stands for view, the business logic\
    \ layer which interacts with the model and carries data to the Template. This\
    \ layer accepts the HTTPS request, logic by Python classes and methods. You can\
    \ think of it as the bridge between models and templates. It is a call-back function\
    \ for a particular URL.\n\n+   4. “C”, which stands for controller, is a business\
    \ logic that will interact with the model and the view, but Django takes it by\
    \ itself. That’s why we use the MTV pattern in Django."
- md: '## WHY DJANGO TEMPLATES?


    It is a text document that renders in the browser. Django keeps the logic and
    codes clean and separate from the design. It is essential to know that the Django
    template doesn’t contain the Python code in the HTML file, so Django uses the
    principle of DRY (Do not repeat yourself). It has its notations such as tags,
    variables, filters, comments, template inheritance, etc.


    ## HOW POPULAR IS DJANGO?


    Popular applications like Instagram, Pinterest, Mozilla, and many more use this
    framework. The number of people or developers providing free and paid-for support
    make it obvious that Django is a popular framework.


    ## WHY MTV INSTEAD OF MVC?


    Django framework itself takes care of the controller part (in this pattern, views
    are replaced by templates, and views replace controllers), leaving us with the
    Template, i.e., why Django is MTV-based framework. The Template is an HTML file
    mixed with Django Template Language (DTL). Features:


    - 1. Less coding

    - 2. Clean design

    - 3. Fast development and secure

    - 4. Simplicity

    - 5. Reusability

    - 6. Scalable


    ## WHY DJANGO?


    Django very well reduced the complexities of a web application, giving it a more
    simplified approach and has an active community, excellent documentation, and
    many options for free and paid-for support. Django is fully customizable. Developers
    can adapt to it quickly by creating modules or overridden framework methods. Python’s
    help in this framework allows you to benefit from all Python libraries and assures
    excellent readability. A good community supports Django. This is an essential
    asset because it allows you to resolve issues and fix bugs very fast. Thanks to
    the community, we can also find code examples that show the best practices. Django
    lets you build deep, dynamic, exciting sites in a short time. Django framework
    mainly consists of the following components:


    - **Model**: It holds your database schema.

    - **Template**: It looks upon the content which will see by the front end user
    on screen.

    - **View**: It contains all your rendering files like HTML.

    - **Admin**: This component is responsible for the application process for authentication
    and security.


    ## Advantages of Django


    Here are a few advantages of using Django:


    - **Batteries (Packages) Included**: These batteries include ORM, authentication,
    session management support, HTML templating, URL routing, Middleware, HTTP libraries,
    multi-site support, template engine, forms, view layers, model layers, Python
    compatibility, and more.

    - **Python Web Framework**: Django, a Python web framework, provides users with
    almost ease for creating their applications. Understanding and implementing Python
    codes are relatively easy and free. Knowing Python only, you will be able to work
    with Django, and you don''t have to be a master of frontend and backend while
    working with Django.

    - **Speed and App Performance**: This framework helps the users to create dynamic
    web applications in no time. Django MTV architecture makes the deployment process
    relatively easy.

    - **Object-oriented**: Django provides the functionality of Object-oriented programming.
    The use of Class, methods, objects, and functionality of OOPS make things easier.

    - **REST Framework for APIs**: Applications programming interface, better known
    as “API”, is essential to add the latest features to an application. It is used
    for building APIs for web applications and comes with authentication, authorization,
    and increasing the flexibility of the applications.

    - **Built-in Admin**: The Django team was quite thoughtful when they created the
    framework, and they kept user and client satisfaction in mind. It''s pretty unreasonable
    to develop your admin interface at the backend to manage your data with basic
    CRUD operations.

    - **Community Support**: Django''s community is one of the communities that is
    helpful and actively works to make the framework more beginner-friendly and stabilize
    it while adding new features.

    - **Scalable**: Django is a highly scalable and well-thought-out framework. It
    will enable you to scale your application horizontally and support hundreds of
    millions of requests, as we have seen in many cases like Instagram, Netflix, and
    more.

    - **Security**: User authentication and authorization are also necessary to safely
    manage Django''s user accounts and passwords with the Admin Panel.

    - **Admin Interface**: You will get the Admin panel with Django created with the
    command of create-super.


    ## Disadvantages of Django


    Here are a few disadvantages of using Django:


    - **Not Suitable for More Minor Projects**: This framework comes with lots of
    code that provides lots of processing and saves our time.

    - **No Conventions**: These frameworks having conventions over configuration make
    things difficult to follow and implement in the application. Modules should have
    a short case or all-lowercase letter to make it clear.

    - **Does Not Provide Multiprocessor Support**: Multiprocessing is a demand of
    today. Applications must support multiprocessing. It is not capable of handling
    multiple requests at the same time.

    - **Monolithic Framework**: Django does not allow developers to learn Python packages
    and tools. Instead, it focuses on providing code-oriented programming. Django
    has a specific set of files and that you only need to know.

    - **Issue with URL**: Sometimes, specifying URLs can be a tricky task. Template
    error can be time-consuming.


    ## DIFFERENCE BETWEEN PROJECT AND APP


    The project could be defined as the entire application containing apps to perform
    specific tasks. And app is within the project that is self-sufficient in a project
    and designed for particular tasks. A project might consist of many apps, which
    are not related to each other.


    ## DJANGO FILE STRUCTURE


    ![](img/6b248a6900b90aa4ebb02bce8e067804_41_0.png)


    - **Project-Name**: The inner project folder will always have the *same name*
    as the outer directory when creating a new Django project.

    - **__init__.py**: Define the containing directory as a Python package.

    - **Setting.py**: It contains many global settings for your Django project.

    - **Urls.py**: It is where you register the routes that point to functions in
    your applications.

    - **Wsgi.py**: Need to work with this file during deployment to a Web Server Gateway
    Interface server.

    - **Manage.py**: This file provides the developer with many valuable features
    in a command-line utility to help build and troubleshoot the Django application.


    ## WHAT ELSE CAN YOU DO?


    The main feature that you will use in every web application: URL mapping, views,
    templates, and model. Django itself works on these features.


    - **Forms:** HTML forms are usually used to collect data from users’ input in
    every language for processing on the server with POST and GET method also provides
    some validation over conditions.

    - **User Authentication and Permissions:** Django includes valid user authentication
    and permission system that builds security.

    - **Administration Site:** The Django administration site is by default added
    when you create an app. You can easily create, edit, and view any data model on
    your website.

    - **Serializing Object:** Django can also serialize and serve your thing in XML
    and JSON format.


    ## SETTING UP A DATABASE?


    Django doesn’t require a database. Django supports four database engines:


    1. **PostgreSQL** (http://www.postgresql.org/)

    2. **SQLite 3** (http://www.sqlite.org/)

    3. **MySQL** (http://www.mysql.com/)

    4. **Oracle** (http://www.oracle.com/)


    If you are just playing around with the Django framework and then don’t want to
    install a database server from anywhere, consider using SQLite as the default
    database. It (SQLite) is unique in the list of supported databases already established
    in that it doesn’t require either of the preceding steps if you’re using Python
    2.5 or higher. It simply reads, writes, edits its data to a single file on your
    file system, and it includes the Python versions 2.5 and higher built-in support
    for it.


    - **Using Django with PostgreSQL:** If you use PostgreSQL, you’ll need to install
    either the psycopg or psycopg2 package from http://www.djangoproject.com/r/python-pgsql/.'
  mdcn: '## 为什么选择 Django 模板？


    它是一个在浏览器中渲染的文本文档。Django 保持逻辑和代码的整洁，并将其与设计分离。重要的是要知道 Django 模板不包含 HTML 文件中的 Python
    代码，因此 Django 使用了 DRY（不要重复自己）原则。它有自己的标记法，如标签、变量、过滤器、注释、模板继承等。


    ## Django 有多受欢迎？


    像 Instagram、Pinterest、Mozilla 等流行应用都使用这个框架。提供免费和付费支持的人员或开发者数量之多，显然表明 Django 是一个受欢迎的框架。


    ## 为什么是 MTV 而不是 MVC？


    Django 框架本身负责控制器部分（在这种模式中，视图被模板取代，而视图取代了控制器），留给我们的是模板，即为什么 Django 是基于 MTV 的框架。模板是混合了
    Django 模板语言（DTL）的 HTML 文件。特点：


    - 1. 代码更少

    - 2. 设计整洁

    - 3. 开发快速且安全

    - 4. 简单性

    - 5. 可重用性

    - 6. 可扩展性


    ## 为什么选择 Django？


    Django 极大地降低了 Web 应用程序的复杂性，提供了更简化的方法，并且拥有活跃的社区、优秀的文档以及许多免费和付费支持选项。Django 完全可定制。开发者可以通过创建模块或重写框架方法快速适应它。Python
    在这个框架中的帮助使你能够受益于所有 Python 库，并确保出色的可读性。一个良好的社区支持着 Django。这是一个重要的资产，因为它允许你快速解决问题和修复错误。多亏了社区，我们还能找到展示最佳实践的代码示例。Django
    让你在短时间内构建出深入、动态、令人兴奋的网站。Django 框架主要由以下组件组成：


    - **模型**：它保存你的数据库模式。

    - **模板**：它负责前端用户在屏幕上看到的内容。

    - **视图**：它包含你所有的渲染文件，如 HTML。

    - **管理**：此组件负责应用程序的认证和安全过程。


    ## Django 的优势


    以下是使用 Django 的一些优势：


    - **内置电池（包）**：这些电池包括 ORM、身份验证、会话管理支持、HTML 模板、URL 路由、中间件、HTTP 库、多站点支持、模板引擎、表单、视图层、模型层、Python
    兼容性等。

    - **Python Web 框架**：Django 作为一个 Python Web 框架，为用户创建应用程序提供了极大的便利。理解和实现 Python 代码相对容易且自由。只要了解
    Python，你就能使用 Django 工作，并且在使用 Django 时，你不必成为前端和后端的专家。

    - **速度和应用性能**：这个框架帮助用户快速创建动态 Web 应用程序。Django MTV 架构使部署过程相对容易。

    - **面向对象**：Django 提供了面向对象编程的功能。使用类、方法、对象和 OOPS 的功能使事情变得更容易。

    - **用于 API 的 REST 框架**：应用程序编程接口，通常称为“API”，对于向应用程序添加最新功能至关重要。它用于为 Web 应用程序构建 API，并附带身份验证、授权以及提高应用程序的灵活性。

    - **内置管理**：Django 团队在创建框架时考虑得非常周到，他们将用户和客户满意度放在心上。在后端开发自己的管理界面来管理数据并执行基本的 CRUD
    操作是相当不合理的。

    - **社区支持**：Django 的社区是乐于助人的社区之一，积极致力于使框架对初学者更友好，并在添加新功能的同时保持其稳定性。

    - **可扩展**：Django 是一个高度可扩展且经过深思熟虑的框架。它将使你能够水平扩展你的应用程序，并支持数亿个请求，正如我们在 Instagram、Netflix
    等许多案例中看到的那样。

    - **安全性**：用户身份验证和授权对于通过管理面板安全地管理 Django 的用户账户和密码也是必要的。

    - **管理界面**：你将获得 Django 创建的管理面板，使用 create-super 命令创建。


    ## Django 的劣势


    以下是使用 Django 的一些劣势：


    - **不适合较小的项目**：这个框架包含大量代码，提供大量处理并节省我们的时间。

    - **没有约定**：这些框架具有约定优于配置的特点，使得在应用程序中遵循和实现变得困难。模块应该使用小写字母或全小写字母以使其清晰。

    - **不提供多处理器支持**：多处理是当今的需求。应用程序必须支持多处理。它无法同时处理多个请求。

    - **单体框架**：Django 不允许开发者学习 Python 包和工具。相反，它专注于提供面向代码的编程。Django 有一组特定的文件，你只需要了解这些。

    - **URL 问题**：有时，指定 URL 可能是一项棘手的任务。模板错误可能很耗时。


    ## 项目和应用的区别


    项目可以定义为包含执行特定任务的应用程序的整个应用程序。而应用是在项目中自给自足的，为特定任务而设计。一个项目可能包含许多彼此不相关的应用。


    ## Django 文件结构


    ![](img/6b248a6900b90aa4ebb02bce8e067804_41_0.png)


    - **项目名称**：创建新的 Django 项目时，内部项目文件夹将始终与外部目录具有*相同的名称*。

    - **__init__.py**：将包含目录定义为 Python 包。

    - **Setting.py**：它包含 Django 项目的许多全局设置。

    - **Urls.py**：这是你注册指向应用程序中函数的路由的地方。

    - **Wsgi.py**：在部署到 Web 服务器网关接口服务器时需要使用此文件。

    - **Manage.py**：此文件为开发者提供了许多有用的命令行实用程序功能，以帮助构建和调试 Django 应用程序。


    ## 你还能做什么？


    你将在每个 Web 应用程序中使用的主要功能：URL 映射、视图、模板和模型。Django 本身就在这些功能上工作。


    - **表单**：HTML 表单通常用于从用户输入中收集数据，在每种语言中用于在服务器上使用 POST 和 GET 方法进行处理，也提供一些条件验证。

    - **用户身份验证和权限**：Django 包含有效的用户身份验证和权限系统，以构建安全性。

    - **管理站点**：Django 管理站点在你创建应用程序时默认添加。你可以轻松地在网站上创建、编辑和查看任何数据模型。

    - **序列化对象**：Django 还可以将你的对象序列化并以 XML 和 JSON 格式提供。


    ## 设置数据库？


    Django 不需要数据库。Django 支持四种数据库引擎：


    1. **PostgreSQL** (http://www.postgresql.org/)

    2. **SQLite 3** (http://www.sqlite.org/)

    3. **MySQL** (http://www.mysql.com/)

    4. **Oracle** (http://www.oracle.com/)


    如果你只是想尝试 Django 框架，而不想从任何地方安装数据库服务器，请考虑使用 SQLite 作为默认数据库。它（SQLite）在已建立的支持数据库列表中是独特的，如果你使用
    Python 2.5 或更高版本，它不需要上述任何步骤。它只是将数据读取、写入、编辑到文件系统上的单个文件中，并且它包含对 Python 2.5 及更高版本的内置支持。


    - **将 Django 与 PostgreSQL 一起使用**：如果你使用 PostgreSQL，你需要从 http://www.djangoproject.com/r/python-pgsql/
    安装 psycopg 或 psycopg2 包。'
