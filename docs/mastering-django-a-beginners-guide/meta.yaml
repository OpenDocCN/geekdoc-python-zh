- md: "## CHAPTER SUMMARY\n\nThis chapter covered the installation of Django and Python\
    \ with simple steps. It also covered some PIP installation commands. You can also\
    \ check Django's official site to learn more about different types of IDEs and\
    \ the first Hello World program in Django.\n\n## File Structure\n\n### IN THIS\
    \ CHAPTER\n\n- Getting to know about file structure\n- Working with static files\n\
    - URL dispatcher\n\nThe previous chapter covered various IDEs for Python languages,\
    \ Python, and Django installation from scratch. It also covered some PIP installation\
    \ commands.\n\n### EXAMINING THE PROJECT STRUCTURE AND APPS\n\nDjango makes a\
    \ directory structure to manage different parts of the web application wisely.\
    \ It builds a project and an app folder for this.\n\nCreating a proper project\
    \ and organizing it helps keep the project DRY (Don't Repeat Yourself) and clean.\
    \ When we create a project, Django itself makes a root directory of the project\
    \ with the proper project name you have given on it. It contains the necessary\
    \ files that provide basic functionalities to your web applications.\n\n- **Application:**\
    \ It (app) is a Python package that adds features to your project. You can create\
    \ new apps with the startapp command \"python manage.py startup myApp\".\n\nYou\
    \ typically enable apps by adding string in the INSTALLED_APPS list in the setting.py\
    \ file:\n\n```\nINSTALLED_APPS = [\n    'django.contrib.admin',\n    'django.contrib.auth',\n\
    \    'django.contrib.contenttypes',\n    'django.contrib.sessions',\n    'django.contrib.messages',\n\
    \    'django.contrib.staticfiles',\n    'myApp', #this you app\n]\n```\n\n- **Project:**\
    \ It is a collection of settings for an instance of Django. If you are using Django\
    \ the first time, you'll have to take care of some initial setup. You will need\
    \ to generate some code that organizes a Django project: a collection of settings\
    \ for an instance of Django, including database configuration and many more. Use\
    \ the Django-admin tool to generate a project folder.\n\n**Handling projects in\
    \ Django.**\n\n### EXPLORING THE PROJECT FOLDER\n\nThe project root contains the\
    \ database, manage.py file, and all the apps not installed in the environment\
    \ folder. Django package and Python are installed in the venv folder.\n\nIt uses\
    \ a directory structure to arrange the different parts of the web application.\
    \ Now, we will discuss the Django app structure and the project structure in further\
    \ detail here.\n\n**File structure.**\n\nLet's understand the function of the\
    \ files that are shown in the above image. First, we will discuss the Project\
    \ folder.\n\n### Manage.py\n\nThe file is used basically as a command-line utility\
    \ and for deploying, debugging, or running our web application. You can read all\
    \ the details of your project in manage.py. It works as a command-line utility\
    \ for our projects. It is a tool for debugging, deploying, and running Django\
    \ web applications also. The files consist of running the server, makemigrations\
    \ or migrations, and several other commands, which we perform in the code editor.\
    \ It serves the same things as Django-admin but also provides some project-specific\
    \ functionality.\n\nIt contains code to run servers, makemigrations or migrations,\
    \ etc.\n\n- **runserver**: It is used to run the server for our web application,\
    \ provided with the Django Framework.\n- **Migration**: It applies the changes\
    \ done to our models into the database.\n- **makemigrations**: It applies new\
    \ migrations that have been carried out due to the changes in the database.\n\n\
    1. **\\_\\_init\\_\\_.py**: It lets you know that the directory contains code;\
    \ basically, this file is empty and is the only way to tell that this particular\
    \ directory is a package. Its function is to tell the Python interpreter that\
    \ this directory is a package and involvement of this \\_\\_init.py\\_\\_ files\
    \ in it. If you delete this init.py file, Python will no longer look at the modules\
    \ inside it and some of your files will fail. There is no need of this file on\
    \ Python version 3.3 and above. All the package are considered a namespace. \\\
    _\\_init\\_\\_ is the reserved in Python class name.\n2. **setting.py**: This\
    \ file is the master configuration file in the Django project. It holds the configuration\
    \ values which need to work, information about templates, and databases. It is\
    \ a core file in Django that contains all the configurations that web apps need\
    \ to do. Here, you can install your app, which you will create for your project.\
    \ Most of the project configuration happens in the setting .py. It contains sqlite3\
    \ as the built-in database. We can replace this database with Mysql, PostgreSQL,\
    \ or MongoDB after changing a few settings in setting.py according to the web\
    \ application we create.\n\nFor example, the default database configuration looks\
    \ like this:\n\n```\nDATABASES = {\n    'default': {\n        'ENGINE': 'django.db.backends.sqlite3',\n\
    \        'NAME': BASE_DIR / 'db.sqlite3',\n    }\n}\n```\n\nFor PostgreSQL database,\
    \ we would do something like this:\n\n```\nDATABASES = {\n    'default': {\n \
    \       'ENGINE': 'django.db.backends.postgresql_psycopg2',\n        'NAME': database_name,\n\
    \        'USER': 'username',\n        'PASSWORD': 'password',\n        'HOST':\
    \ 'localhost',\n        'PORT': '',\n    }\n}\n```\n\nFor changing your time zone:\n\
    \n```\nTIME_ZONE = 'UTC'\n```\n\nFor security purposes: This enables debugging\
    \ logs to be displayed when hitting error rather than HTTP status, i.e., 200,\
    \ 505,400, and many more. It is good to put it True locally for error checking,\
    \ but it should be false at the production level.\n\n```\n#WARNING: don not run\
    \ with debug turned on in production!\nDEBUG = True\n```\n\n### Middleware\n\n\
    In every programming language, Middleware works for processing during request\
    \ and response execution. It is used to perform a function in the application.\
    \ The functions can be a security session, crisp, authentication, and many more.\
    \ It is hooked into Django request/response processing. It is a light low-level\
    \ plugin system for entire Django's input or output.\n\nHow does this work?\n\
    When a user makes a request to server from any application, A handler WSGI get\
    \ started which handles the following things:\n\n1. Resolves the requested URL\n\
    2. Call the view function\n3. Process exception methods\n4. Loop through each\
    \ of the response methods.\n5. Loads all the Middleware’s classes which written\
    \ in MIDDLEWARE tuple in setting.py.\n\n### Types of Middleware\n\n1. Built-in\
    \ Middleware\n2. Custom Middleware\n\nBuilt-in Middleware are default present\
    \ in Django when you just create your project. You can also check in setting.py\
    \ portion name MIDDLEWARE.\n\n```\nMIDDLEWARE = [\n    'django.middleware.security.SecurityMiddleware',\n\
    \    'django.contrib.sessions.middleware.SessionMiddleware',\n    'django.middleware.common.CommonMiddleware',\n\
    \    'django.middleware.csrf.CsrfViewMiddleware',\n    'django.contrib.auth.middleware.AuthenticationMiddleware',\n\
    \    'django.contrib.messages.middleware.MessageMiddleware',\n    'django.middleware.clickjacking.XFrameOptionsMiddleware',\n\
    ]\n```\n\nAll these Middleware have their own functionality. Some is for security\
    \ purposes, session creation, and csrf which prevent our sites from various attacks.\
    \ There is also authentication Middleware used for security."
  mdcn: "## 章节总结\n\n本章介绍了 Django 和 Python 的安装步骤，以及一些 PIP 安装命令。你也可以访问 Django 官方网站，了解更多关于不同类型的\
    \ IDE 以及 Django 中第一个 Hello World 程序的信息。\n\n## 文件结构\n\n### 本章内容\n\n- 了解文件结构\n-\
    \ 处理静态文件\n- URL 调度器\n\n上一章介绍了各种 Python 语言的 IDE，以及从零开始安装 Python 和 Django。还涵盖了一些\
    \ PIP 安装命令。\n\n### 检查项目结构和应用\n\nDjango 创建了一个目录结构来明智地管理 Web 应用程序的不同部分。为此，它构建了一个项目和一个应用文件夹。\n\
    \n创建一个合适的项目并对其进行组织有助于保持项目的 DRY（不要重复自己）和整洁。当我们创建一个项目时，Django 本身会根据你提供的项目名称创建一个项目根目录。它包含为你的\
    \ Web 应用程序提供基本功能的必要文件。\n\n- **应用：** 它（应用）是一个 Python 包，用于为你的项目添加功能。你可以使用 startapp\
    \ 命令 \"python manage.py startup myApp\" 创建新的应用。\n\n你通常通过在 setting.py 文件的 INSTALLED_APPS\
    \ 列表中添加字符串来启用应用：\n\n```\nINSTALLED_APPS = [\n    'django.contrib.admin',\n   \
    \ 'django.contrib.auth',\n    'django.contrib.contenttypes',\n    'django.contrib.sessions',\n\
    \    'django.contrib.messages',\n    'django.contrib.staticfiles',\n    'myApp',\
    \ #this you app\n]\n```\n\n- **项目：** 它是 Django 实例的一组设置。如果你是第一次使用 Django，你需要处理一些初始设置。你需要生成一些代码来组织一个\
    \ Django 项目：一个 Django 实例的设置集合，包括数据库配置等等。使用 Django-admin 工具生成一个项目文件夹。\n\n**在 Django\
    \ 中处理项目。**\n\n### 探索项目文件夹\n\n项目根目录包含数据库、manage.py 文件以及所有未安装在环境文件夹中的应用。Django 包和\
    \ Python 安装在 venv 文件夹中。\n\n它使用目录结构来安排 Web 应用程序的不同部分。现在，我们将在这里更详细地讨论 Django 应用结构和项目结构。\n\
    \n**文件结构。**\n\n让我们理解上图中所示文件的功能。首先，我们将讨论项目文件夹。\n\n### Manage.py\n\n该文件基本上用作命令行实用程序，用于部署、调试或运行我们的\
    \ Web 应用程序。你可以在 manage.py 中阅读项目的全部详细信息。它作为我们项目的命令行实用程序。它也是调试、部署和运行 Django Web\
    \ 应用程序的工具。该文件包含运行服务器、makemigrations 或 migrations 以及我们在代码编辑器中执行的其他几个命令。它提供与 Django-admin\
    \ 相同的功能，但也提供一些特定于项目的功能。\n\n它包含运行服务器、makemigrations 或 migrations 等的代码。\n\n- **runserver**：它用于运行\
    \ Django 框架提供的 Web 应用程序服务器。\n- **Migration**：它将对模型所做的更改应用到数据库中。\n- **makemigrations**：它应用由于数据库更改而进行的新迁移。\n\
    \n1. **\\_\\_init\\_\\_.py**：它让你知道该目录包含代码；基本上，这个文件是空的，是告诉 Python 这个特定目录是一个包的唯一方式。它的作用是告诉\
    \ Python 解释器这个目录是一个包，并且其中包含这个 \\_\\_init.py\\_\\_ 文件。如果你删除这个 init.py 文件，Python\
    \ 将不再查看其中的模块，你的一些文件将会失败。在 Python 3.3 及以上版本中不需要此文件。所有包都被视为命名空间。\\_\\_init\\_\\\
    _ 是 Python 类名中的保留字。\n2. **setting.py**：此文件是 Django 项目中的主配置文件。它保存了工作所需的配置值、模板信息和数据库信息。它是\
    \ Django 中的核心文件，包含 Web 应用程序需要做的所有配置。在这里，你可以安装你为项目创建的应用。大多数项目配置都在 setting.py 中进行。它包含\
    \ sqlite3 作为内置数据库。我们可以根据创建的 Web 应用程序，在 setting.py 中更改一些设置后，将此数据库替换为 Mysql、PostgreSQL\
    \ 或 MongoDB。\n\n例如，默认数据库配置如下所示：\n\n```\nDATABASES = {\n    'default': {\n    \
    \    'ENGINE': 'django.db.backends.sqlite3',\n        'NAME': BASE_DIR / 'db.sqlite3',\n\
    \    }\n}\n```\n\n对于 PostgreSQL 数据库，我们会这样做：\n\n```\nDATABASES = {\n    'default':\
    \ {\n        'ENGINE': 'django.db.backends.postgresql_psycopg2',\n        'NAME':\
    \ database_name,\n        'USER': 'username',\n        'PASSWORD': 'password',\n\
    \        'HOST': 'localhost',\n        'PORT': '',\n    }\n}\n```\n\n要更改你的时区：\n\
    \n```\nTIME_ZONE = 'UTC'\n```\n\n出于安全目的：这使得在发生错误时显示调试日志，而不是 HTTP 状态码，例如 200、505、400\
    \ 等等。在本地进行错误检查时将其设置为 True 是很好的，但在生产环境中应将其设置为 False。\n\n```\n#WARNING: don not\
    \ run with debug turned on in production!\nDEBUG = True\n```\n\n### 中间件\n\n在每种编程语言中，中间件都用于在请求和响应执行期间进行处理。它用于在应用程序中执行功能。这些功能可以是安全会话、身份验证等等。它被挂接到\
    \ Django 的请求/响应处理中。它是一个轻量级的低级插件系统，用于整个 Django 的输入或输出。\n\n这是如何工作的？\n当用户从任何应用程序向服务器发出请求时，一个\
    \ WSGI 处理程序会启动，它处理以下事项：\n\n1. 解析请求的 URL\n2. 调用视图函数\n3. 处理异常方法\n4. 遍历每个响应方法。\n\
    5. 加载在 setting.py 的 MIDDLEWARE 元组中编写的所有中间件类。\n\n### 中间件类型\n\n1. 内置中间件\n2. 自定义中间件\n\
    \n内置中间件在你创建项目时默认存在于 Django 中。你也可以在 setting.py 中名为 MIDDLEWARE 的部分查看。\n\n```\nMIDDLEWARE\
    \ = [\n    'django.middleware.security.SecurityMiddleware',\n    'django.contrib.sessions.middleware.SessionMiddleware',\n\
    \    'django.middleware.common.CommonMiddleware',\n    'django.middleware.csrf.CsrfViewMiddleware',\n\
    \    'django.contrib.auth.middleware.AuthenticationMiddleware',\n    'django.contrib.messages.middleware.MessageMiddleware',\n\
    \    'django.middleware.clickjacking.XFrameOptionsMiddleware',\n]\n```\n\n所有这些中间件都有自己的功能。有些用于安全目的、会话创建和\
    \ csrf，以防止我们的网站受到各种攻击。还有用于安全的身份验证中间件。"
