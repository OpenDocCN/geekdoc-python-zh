- md: "## FieldError\n\nWhen models include mistakes, we raise field errors. Examples\
    \ include fields in a model having the same name. Infinite loops result from incorrect\
    \ ordering. Methods of join and drop are being used incorrectly. It is possible\
    \ that the names of the fields don't exist, and so forth.\n\n## ValidationError\n\
    \nWhen models include mistakes, we raise field errors. Examples include fields\
    \ in a model having the same name. Infinite loops result from incorrect ordering.\
    \ Methods of join and drop are being used incorrectly. It is possible that the\
    \ names of the fields don't exist, and so forth.\n\n## URL Resolver Exceptions\n\
    \nDjango. URLs is one of Django's basic classes, and it wouldn't work without\
    \ it. There are a few exceptions to this class:\n\n1. **Resolver404**: If path()\
    \ does not have a valid view to map, this exception is thrown. The error page\
    \ is displayed by Resolver404. It's a subclass of the Django.HTTP.Http404 module.\n\
    2. **NoReverseMatch**: When we request a URL that is not defined in our URLs-config,\
    \ we get this error.\n3. **Database Exceptions**: Django's exception wrappers\
    \ function in the same way as the Python database API. The errors are:\n    -\
    \ InterfaceError\n    - DatabaseError\n    - DataError\n    - IntegrityError\n\
    \    - InternalError\n    - ProgrammingError\n    - NotSupportedError\n\nWe raise\
    \ these errors when:\n    - The database is not found\n    - The interface is\
    \ not there\n    - The database is not connected\n    - Input data is not valid,\
    \ etc.\n\n4. **HTTP Exceptions**: Django's HttpResponse class is a subclass. HTTP\
    \ is a kind of protocol. Exceptions and specific answers are provided by the module.\n\
    5. **Transaction Exceptions**: A sequence of database queries is referred to as\
    \ a transaction. It is where you'll find the tiniest queries, also known as atomic\
    \ queries. When an error occurs at this atomic level, the Django.DB.transaction\
    \ module resolves it.\n6. **Testing Framework Exceptions**: The Django. test package\
    \ also comes with many exceptions.\n\n## ADVANCED VIEW AND URLS\n\nThis is the\
    \ older way to define views and URLs.\n\n```python\nfrom django.conf.urls.defaults\
    \ import *\npatterns = patterns('',\n    (r'^index/$', 'mysite.views.indx'),\n\
    \    (r'^index/$', 'myapp.views.currentdatetime'),\n    (r'^index/plus/(\\d{1,2})/$',\
    \ 'myapp.views.hours'),\n    (r'^tag/(\\w+)/$', 'blog.views.tag'),\n)\n```\n\n\
    The new way is as follows:\n\n```python\nfrom django.conf.urls.defaults import\
    \ *\npatterns = patterns('mysite.views',\n    (r'^time/$', 'hello'),\n    (r'^time/$',\
    \ 'current_datetime'),\n    (r'^time/plus/(\\d{1,2})/$', 'hours'),\n)\nurlpatterns\
    \ += patterns('blog.views',\n    (r'^tag/(\\w+)/$', 'tag'),\n)\n```\n\nThe framework\
    \ is only concerned with the existence of a module-level variable named URL patterns.\
    \ As seen in this example, this variable may be created dynamically. It is worth\
    \ noting that the objects provided by patterns() can be joined together, something\
    \ you might not expect.\n\n## Using Named Groups\n\nWe've used simple, non-named\
    \ regular expression groups in all of our URLconf examples so far – that is, we\
    \ place parentheses around bits of the URL we wish to capture, and Django provides\
    \ the captured text to the view function as a positional parameter. It is possible\
    \ to utilize named regular expression groups to capture URL bits and give them\
    \ as keyword arguments to a view in more advanced use.\n\n## Keyword Arguments\
    \ vs. Positional Arguments\n\nKeyword arguments or positional arguments can be\
    \ used to invoke a Python function, and in certain situations both at the same\
    \ time. You define the names of the arguments as well as the values you're sending\
    \ in a keyword argument call. In a positional argument call, you just send the\
    \ arguments without saying which argument corresponds to which value; the relationship\
    \ is implied by the sequence of the arguments.\n\n## Passing Extra Options to\
    \ View Functions\n\nSometimes you will find yourself that view functions are quite\
