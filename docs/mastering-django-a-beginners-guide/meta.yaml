- md: "## 6. From django.contrib.auth.models import auth\n\ncontrib.auth in your INSTALLED_APP\
    \ setting.py file will ensure the four default common permission – add, delete,\
    \ change, and view.\n\nThis is the common importing model in the view.py.\n\n\
    All the logic of the Django project should be written in separate functions. We\
    \ have different functions for each page so that everything looks better and runs\
    \ in the proper way. Have a look over the code of the home page.\n\nOur first\
    \ function is about login with the request as a parameter. It will only get implemented\
    \ when the request method is POST. In the first two lines, when the user enters\
    \ their number and password in Django, we can get the input like it. print(phone,\
    \ password) has its own purpose. It is basically used for debugging the code.\
    \ The user name and password will be shown in the console terminal of the editor.\
    \ Authentication is the method that checks if a user is present in the User Model.\
    \ This is Django’s default User model, i.e., “user_auth = auth.authenticate(username=phone,\
    \ password=password).” If the user exists, then the auth.login will run, auth.login(request,\
    \ user_auth) and if it returns True, the next line executes after the successful\
    \ login and the message will print with messages.success(request, ‘Auth User’).\
    \ If the user is not found, it redirects the user to the root URL.\n\nThe next\
    \ method is register.html. When it gets the POST method, it will both match and\
    \ confirm the password. If the password does not match, an error will occur. If\
    \ both match, the code is moved to a try statement; also try block check, if the\
    \ user already exists, then a message will appear saying that the username is\
    \ already taken by somebody, you can add your own message. If the entered name\
    \ is not found, the except block runs. It will create a new user with email, username,\
    \ password, and save it in the database, and then authorized user redirects to\
    \ the next page. If any other error occurs, the user redirects to the same register\
    \ page.\n\nThe show is the third method we have, and this page will only show\
    \ when the authenticated user is logged in. If the user is a valid user, it will\
    \ redirect to this page. The page opens on this particular page. The user can\
    \ add their task list when it is completed, and the user can delete it or edit\
    \ it any time. This page will not be obtained by anyone because we have used request.user\
    \ and so will be obtained by the valid user. The authorized user can only get\
    \ the data here and we have to filter the values of that particular user.\n\n\
    In the logout method, the user logout option is only present. They can log out\
    \ at any time and when there is a need they can log in. The page will redirect\
    \ the user to the main page.\n\nThe delete() matches the ID of passed object before\
    \ deletion.\n\nThe edit method is also done with the id. We get the id first and\
    \ then get data from the user input as requested.POST.get('todo'). Next, the id\
    \ matches and once we get that id and its corresponding todo, the user changes\
    \ the value and hits the save button; the todo will save in the same place, i.e.,\
    \ override that data and after that page will render to the show itself.\n\n```python\n\
    # urls.py\nfrom django.contrib import admin\nfrom django.urls import path\nfrom\
    \ .views import *\nfrom django.contrib.staticfiles.urls import staticfiles_urlpatterns\n\
    \nurlpatterns = [\n    path('', login, name=\"login\"),\n    path('register',\
    \ register, name=\"register\"),\n    path('show', show, name=\"show\"),\n    path('logout',\
    \ logout, name=\"logout\"),\n    path('delete/<id>', delete, name=\"delete\"),\n\
    \    path('edit/<id>', edit, name=\"edit\"),\n]\n```\n\n1. From Django.contrib\
    \ import admin\n   It automatically looks for an admin module in each application\
    \ and imports them.\n\n2. From Django.URLs import path\n   The path function contains\
    \ the Django.URL module. It is used for routing URLs to the appropriate view function\
    \ within an application using dispatcher (expression).\n\n3. From Django.URLs.conf\
    \ import include\n   A function that takes full import path to another URLconf\
    \ module where include can be added. The dot (.) operator is shorthand for the\
    \ current package.\n\n4. From quiz app.URLs import *\n   quiz app.URLs are the\
    \ URL file of the quiz app application, so here we are just importing them to\
    \ use them.\n\n5. From Django.contrib.staticfiles.URLs import staticfiles_urlpatterns\n\
    \   This will return the URL pattern for serving static files already defined\
    \ in the pattern list.\n\n6. URL patterns – It refers to the mapping of URLs to\
    \ function name and views the first parameter for adding the URLs, then next is\
    \ about the view function name. This method should be the same as defined in the\
    \ view.py.\n\n### model.py\n\nIn the code shown below, we imported the model from\
    \ Django.db. It is a built-in module with various packages that we can use in\
    \ our project. The database tables are created through the help of the class keyword\
    \ in “model.py”.\n\n```python\n# Create your tests here.\n# https://testdriven.io/blog/django-custom-user\n\
    # model/\nfrom django.db import models\nfrom django.contrib.auth.models import\
    \ User\n\nclass TodoModel(models.Model):\n    user = models.ForeignKey(User, on_delete=models.CASCADE,\
    \ null=True)\n    todos = models.CharField(max_length=20, blank=True)\n\n    def\
    \ __str__(self):\n        return f\"User {self.user}\"\n```\n\nThese fields are\
    \ of the model’s name TodoModel having user fields as Foreign Key, which is a\
    \ column in a table whose values must match values in some other table, meaning\
    \ the fields user of TodoModel now has the same value as the User model which\
    \ is the Django’s inbuilt model. Whenever we delete this user, all the data related\
    \ to this user will be deleted.\n\nOn_delete – It tells Django what to do with\
    \ the model's field that depends on the model instance you have deleted. CASCADE\
    \ tells Django to cascade the deleting effect. This constraint in MYSQL is to\
    \ delete the row from the table when the rows from the parent are deleted. Every\
    \ field must have a Field type like above. We have CharField(). It is a text-based\
    \ column and accepts “max_length” of 200 characters and in our next fields, todos\
    \ have max_length of only 20 characters, blank=True means by default this field\
    \ is blank.\n\n__str__(): It tells Django what to print. It returns the string\
    \ representation of the object of the model. F string (f\"\") is a way of embedding\
    \ an expression inside the literal string; you can use the quotes, double or even\
    \ triple, to create your literal string. For evaluating the expression in f string,\
    \ write it into the {} curly braces like {self.user}. Here, self is for pointing\
    \ to the current user name.\n\n### forms.py\n\n```python\nfrom Django.forms import\
    \ fields\nfrom .models import TodoModel\nfrom Django import forms\nfrom Django.contrib.auth\
    \ import models\n\nclass TodoForm(forms.Form):\n    todos = forms.CharField(max_length=100)\n\
    \nclass UpdateForm(forms.ModelForm):\n    class Meta:\n        model = TodoModel\n\
    \        fields = ['todos']\n        widgets = {\n            'todos': forms.TextInput(attrs={\n\
    \                'class': 'form__field'\n            })\n        }\n```\n\nWe\
    \ have some importing fields in this form.py:\n\n1. **From Django.forms import\
    \ fields**: This field is used in the class Meta as fields = ['todos']. It will\
    \ return all the fields of the todo model of TodoForm.\n2. **From .models import\
    \ TodoModel**: We import the defined models on the TodoModel of the model.py.\n\
    3. **From Django import forms:** Here, we get access to our defined form. With\
    \ this line of code, we can import the form in model.py. Form can be used directly\
    \ in the template as {{ form }}.\n4. **From Django.contrib.auth import models:**\
    \ This code import the models from Django.contrib listed in setting.py in the\
    \ portion of INSTALLED_APPS = [ ]. For the user default model, the user identifier\
    \ is the username.\n\n```python\nINSTALLED_APPS = [\n    'django.contrib.auth',\n\
    ]\n```\n\nUpdateForm is the class that consists of the Meta class: We can customize\
    \ data as per our needs, like we can use the same model in the UpdateForm. Widgets\
    \ are for adding customization in the forms.\n\n### apps.py\n\n```python\nfrom\
    \ Django.apps import AppConfig\n\nclass TodoConfig(AppConfig):\n    default_auto_field\
    \ = 'django.db.models.BigAutoField'\n    name = 'Todo'\n```\n\nIt is a configuration\
    \ that is common to all Django applications. The AppConfig used to configure the\
    \ application has a path attribute. BigAutoField is an auto-incrementing primary\
    \ key according to the available IDs like AutoField.\n\n### admin.py\n\nLet's\
    \ move to “admin.py” and do an import of the models called TodoModel by using\
    \ “from .models import TodoModel”.\n\n```python\n# Register your models here.\n\
    from Django.contrib import admin\nfrom .models import *\n\nadmin.site.register(TodoModel)\n\
    ```"
  mdcn: "## 6. 从 django.contrib.auth.models 导入 auth\n\n在 `settings.py` 文件的 `INSTALLED_APP`\
    \ 设置中包含 `contrib.auth`，将确保启用四个默认的通用权限——添加、删除、更改和查看。\n\n这是 `view.py` 中常见的导入模型。\n\
    \nDjango 项目的所有逻辑都应编写在独立的函数中。我们为每个页面设置不同的函数，这样一切看起来更清晰，运行也更顺畅。让我们看看主页的代码。\n\n我们的第一个函数是关于登录的，以\
    \ `request` 作为参数。它仅在请求方法为 POST 时执行。在前两行中，当用户在 Django 中输入他们的号码和密码时，我们可以这样获取输入。`print(phone,\
    \ password)` 有其特定用途。它主要用于调试代码。用户名和密码将显示在编辑器的控制台终端中。认证是检查用户是否存在于用户模型中的方法。这是 Django\
    \ 的默认用户模型，即 `user_auth = auth.authenticate(username=phone, password=password)`。如果用户存在，则\
    \ `auth.login` 将运行，`auth.login(request, user_auth)`，如果返回 `True`，则下一行将在成功登录后执行，并通过\
    \ `messages.success(request, 'Auth User')` 打印消息。如果未找到用户，则将用户重定向到根 URL。\n\n下一个方法是\
    \ `register.html`。当它收到 POST 方法时，它将匹配并确认密码。如果密码不匹配，将发生错误。如果两者匹配，代码将移至 `try` 语句；同时\
    \ `try` 块会检查用户是否已存在，如果存在，则会出现一条消息，说明该用户名已被他人占用，你可以添加自己的消息。如果未找到输入的名称，则 `except`\
    \ 块将运行。它将使用电子邮件、用户名、密码创建一个新用户，并将其保存在数据库中，然后授权用户将被重定向到下一个页面。如果发生任何其他错误，用户将被重定向到同一个注册页面。\n\
    \n`show` 是我们拥有的第三个方法，此页面仅在已认证用户登录时显示。如果用户是有效用户，它将被重定向到此页面。页面在此特定页面上打开。用户可以在任务完成时添加他们的任务列表，用户可以随时删除或编辑它。此页面不会被任何人获取，因为我们使用了\
    \ `request.user`，因此只有有效用户才能获取。授权用户只能在此处获取数据，我们必须过滤该特定用户的值。\n\n在 `logout` 方法中，仅存在用户注销选项。他们可以随时注销，并在需要时登录。该页面将用户重定向到主页。\n\
    \n`delete()` 在删除前匹配传递对象的 ID。\n\n`edit` 方法也通过 ID 完成。我们首先获取 ID，然后根据请求 `request.POST.get('todo')`\
    \ 从用户输入获取数据。接下来，匹配 ID，一旦我们获得该 ID 及其对应的 todo，用户更改值并点击保存按钮；todo 将保存在同一位置，即覆盖该数据，之后页面将渲染回\
    \ `show` 本身。\n\n```python\n# urls.py\nfrom django.contrib import admin\nfrom django.urls\
    \ import path\nfrom .views import *\nfrom django.contrib.staticfiles.urls import\
    \ staticfiles_urlpatterns\n\nurlpatterns = [\n    path('', login, name=\"login\"\
    ),\n    path('register', register, name=\"register\"),\n    path('show', show,\
    \ name=\"show\"),\n    path('logout', logout, name=\"logout\"),\n    path('delete/<id>',\
    \ delete, name=\"delete\"),\n    path('edit/<id>', edit, name=\"edit\"),\n]\n\
    ```\n\n1.  从 Django.contrib 导入 admin\n    它会自动在每个应用中查找 admin 模块并导入它们。\n\n2.  从\
    \ Django.URLs 导入 path\n    `path` 函数包含在 `Django.URL` 模块中。它用于使用分发器（表达式）将 URL 路由到应用程序中适当的视图函数。\n\
    \n3.  从 Django.URLs.conf 导入 include\n    一个函数，它接受另一个 URLconf 模块的完整导入路径，可以在其中添加\
    \ `include`。点（.）运算符是当前包的简写。\n\n4.  从 quiz app.URLs 导入 *\n    `quiz app.URLs` 是\
    \ quiz 应用程序的 URL 文件，因此这里我们只是导入它们以供使用。\n\n5.  从 Django.contrib.staticfiles.URLs\
    \ 导入 staticfiles_urlpatterns\n    这将返回用于提供已在模式列表中定义的静态文件的 URL 模式。\n\n6.  URL 模式——它指的是\
    \ URL 到函数名称的映射以及视图。第一个参数用于添加 URL，接下来是视图函数名称。此方法应与 `view.py` 中定义的相同。\n\n### model.py\n\
    \n在下面显示的代码中，我们从 `Django.db` 导入了模型。它是一个内置模块，包含各种包，我们可以在项目中使用。数据库表是通过 `model.py`\
    \ 中的 `class` 关键字创建的。\n\n```python\n# Create your tests here.\n# https://testdriven.io/blog/django-custom-user\n\
    # model/\nfrom django.db import models\nfrom django.contrib.auth.models import\
    \ User\n\nclass TodoModel(models.Model):\n    user = models.ForeignKey(User, on_delete=models.CASCADE,\
    \ null=True)\n    todos = models.CharField(max_length=20, blank=True)\n\n    def\
    \ __str__(self):\n        return f\"User {self.user}\"\n```\n\n这些字段属于名为 `TodoModel`\
    \ 的模型，其中 `user` 字段是外键，它是表中的一列，其值必须与另一表中的值匹配，这意味着 `TodoModel` 的 `user` 字段现在具有与\
    \ Django 内置模型 `User` 相同的值。每当我们删除此用户时，与此用户相关的所有数据都将被删除。\n\n`on_delete`——它告诉 Django\
    \ 对依赖于你已删除的模型实例的模型字段执行什么操作。`CASCADE` 告诉 Django 级联删除效果。在 MySQL 中，此约束是在父表中的行被删除时从表中删除行。每个字段必须有一个字段类型，如上所示。我们有\
    \ `CharField()`。它是一个基于文本的列，接受最大长度为 200 个字符，在我们的下一个字段中，`todos` 的最大长度仅为 20 个字符，`blank=True`\
    \ 意味着默认情况下此字段为空。\n\n`__str__()`：它告诉 Django 要打印什么。它返回模型对象的字符串表示。F 字符串（`f\"\"`）是一种在字面字符串中嵌入表达式的方式；你可以使用引号、双引号甚至三引号来创建你的字面字符串。要在\
    \ F 字符串中求值表达式，请将其写入 `{}` 花括号中，如 `{self.user}`。这里，`self` 用于指向当前用户名。\n\n### forms.py\n\
    \n```python\nfrom Django.forms import fields\nfrom .models import TodoModel\n\
    from Django import forms\nfrom Django.contrib.auth import models\n\nclass TodoForm(forms.Form):\n\
    \    todos = forms.CharField(max_length=100)\n\nclass UpdateForm(forms.ModelForm):\n\
    \    class Meta:\n        model = TodoModel\n        fields = ['todos']\n    \
    \    widgets = {\n            'todos': forms.TextInput(attrs={\n             \
    \   'class': 'form__field'\n            })\n        }\n```\n\n在这个 `forms.py` 中，我们有一些导入字段：\n\
    \n1.  **从 Django.forms 导入 fields**：此字段在 `class Meta` 中用作 `fields = ['todos']`。它将返回\
    \ `TodoForm` 的 todo 模型的所有字段。\n2.  **从 .models 导入 TodoModel**：我们导入在 `model.py`\
    \ 的 `TodoModel` 上定义的模型。\n3.  **从 Django 导入 forms**：这里，我们可以访问我们定义的表单。通过这行代码，我们可以在\
    \ `model.py` 中导入表单。表单可以直接在模板中使用 `{{ form }}`。\n4.  **从 Django.contrib.auth 导入\
    \ models**：此代码从 `Django.contrib` 导入模型，这些模型在 `settings.py` 的 `INSTALLED_APPS =\
    \ [ ]` 部分列出。对于默认用户模型，用户标识符是用户名。\n\n```python\nINSTALLED_APPS = [\n    'django.contrib.auth',\n\
    ]\n```\n\n`UpdateForm` 是包含 `Meta` 类的类：我们可以根据需要自定义数据，例如我们可以在 `UpdateForm` 中使用相同的模型。`widgets`\
    \ 用于在表单中添加自定义。\n\n### apps.py\n\n```python\nfrom Django.apps import AppConfig\n\
    \nclass TodoConfig(AppConfig):\n    default_auto_field = 'django.db.models.BigAutoField'\n\
    \    name = 'Todo'\n```\n\n这是所有 Django 应用程序通用的配置。用于配置应用程序的 `AppConfig` 有一个 `path`\
    \ 属性。`BigAutoField` 是一个根据可用 ID（如 `AutoField`）自动递增的主键。\n\n### admin.py\n\n让我们转到\
    \ `admin.py`，并使用 `from .models import TodoModel` 导入名为 `TodoModel` 的模型。\n\n```python\n\
    # Register your models here.\nfrom Django.contrib import admin\nfrom .models import\
    \ *\n\nadmin.site.register(TodoModel)\n```"
