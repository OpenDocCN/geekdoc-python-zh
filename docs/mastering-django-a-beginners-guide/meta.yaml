    id_number\">Number:</label>\n</th>\n<td>\n<input class=\"textinput textInput form-control\"\
    \ id=\"id_number\" maxlength=\"100\" name=\"number\" type=\"number\" />\n</td>\n\
    </tr>\n |\n\nThere are various ways to show forms. Django forms help you create\
    \ HTML representations of your forms. They support three separate representations:\
    \ as_p (defined as paragraph tags), as_ul (defined as unordered list items), and\
    \ as_table (as, unsurprisingly, a table).\n\nDjango defines a form class with\
    \ a single field (name). The field maximum allowable length is defined by max_length.\
    \ It puts a maxlength=“150” on the HTML <input>. It also means that whenever Django\
    \ receives the form back from the browser, it should validate the length of the\
    \ data.\n\nThe Template: To add form in your template, you don't need to do much\
    \ in the template:\n\n```\n<form action=\"/your-name/\" method=\"post\">\n   \
    \ {% csrf_token %}\n    {{ form }}\n    <input type=\"submit\" value=\"Submit\"\
    >\n</form>\n```\n\nAll the form's fields are fetched by {{form}} by Django's template\
    \ language.\n\n```\n{% csrf_token %}\n```\n\nCross-site Request Forgery (CSRF)\
    \ protection: The CSRF's middleware and template tag protect against the CSRF\
    \ attack. This type of attack occurs when various malicious website contains a\
    \ link, a form button. How to use it? It should be activated by default in the\
    \ MIDDLEWARE setting; remember that 'django.middleware.csrf.CsrfViewMiddleware'.\n\
    \nWidgets Argument\n\n- CharField() with Textarea widget attribute:\n\n```\nfrom\
    \ django import forms\n# Create your forms here.\nclass ExampleForm(forms.Form):\n\
    \    comment = forms.CharField(widget=forms.Textarea(attrs={'rows':3}))\n```\n\
    \nWe can pass the various attributes in the widget for changes. Here we are changing\
    \ the height with attributes in 'rows'.\n\n- DateField() with NumberInput widget\
    \ attribute:\n\n```\nfrom django import forms\nfrom django.forms.widgets import\
    \ NumberInput\n# Create your forms here.\nclass ExampleForm(forms.Form):\n   \
    \ birth_date = forms.DateField(widget=NumberInput(\n        attrs={'type': 'date'}))\n\
    ```\n\nHere we separately import NumberInput at the top of the file and then add\
    \ the NumberInput widget with the attribute ‘type’: ‘date.’ We can also add required\
    \ as an additional parameter.\n\nVarious additional parameters\n\n- Required\n\
    - max_length\n- min_length\n- label\n- initial for CharField(), DateField(), BooleanField()\n\
    \n- ChoiceField, MultipleChoiceField, ModelChoiceField, and ModelMultipleChoiceField:\n\
    \n```\nfrom django import forms\n# Create your forms here.\nFAVORITE_COLORS =\
    \ [\n    ('blue', 'Blue'),\n    ('green', 'Green'),\n    ('black', 'Black'),\n\
    ]\nclass ExampleForm(forms.Form):\n    favorite_color = forms.ChoiceField(choices=FAVORITE_COLORS)\n\
    ```\n\nUse the Django ChoiceField as a string field for selecting a particular\
    \ choice or to create a drop-down menu of choices. Each choice should have a key\
    \ and a value. FAVORITE_COLORS are automatically fetched.\n\n- **The Decorator\
    \ Method**: Rather than adding CsrfViewMiddleware, you can use the csrf_protect\
    \ decorator, which has the same functionality on particular views that need protection.\
    \ But it has a security hole.\nThis is the basic structure of our new decorator:\n\
    \n```\nimport functools\nfrom django.shortcuts import render\ndef view_form(form_cls,\
    \ template):\n    def decorator(func):\n        @functools.wraps(func)\n     \
    \   def wrapper(request, *args, **kwargs):\n            ...\n        return wrapper\n\
    \    return decorator\n```\n\n- **CSRF in Jinja2 Templates**: Django's Jinja2\
    \ template backend adds {{ csrf_input }} to the context of all templates which\
    \ is equivalent to {% csrf_token %} in the Django template language. For example:\n\
    \n- <form method=\"post\">{{ csrf_input }} or {% csrf_token%}</form>\n\n- **Rendering\
    \ Fields Manually**: You can get the data manually as per your needs. Suppose\
    \ in the database you have fields name, age, marks, etc., and each field is available\
    \ as an attribute of the form using {{ form.name_of_field }}:\n\n```\n<div class=\"\
    wrapper\">\n    {{ form.message.errors }}\n    <label for=\"{{ form.message.id_for_label\
    \ }}\">Your message:</label>\n    {{ form.name }}\n</div>\n<div class=\"wrapper\"\
    >\n    {{ form.message.errors }}\n    <label for=\"{{ form.message.id_for_label\
    \ }}\">Your message:</label>\n    {{ form.age}}\n</div>\n<div class=\"wrapper\"\
    >\n    {{ form.message.errors }}\n    <label for=\"{{ form.message.id_for_label\
    \ }}\">Your message:</label>\n    {{ form.marks}}\n</div>\n```\n\n- **Displaying\
    \ Error**\n\n- Using {{form.name_of_field.errors}}: It displays a list of form\
    \ errors, rendered as an unordered list. This might look as follows:\n\n```\n\
    {% if form.subject.errors %}\n  <ol>\n    {% for error in form.subject.errors\
    \ %}\n      <li><strong>{{ error|escape }}</strong></li>\n    {% endfor %}\n \
    \ </ol>\n{% endif %}\n```\n\n- **Looping over the Form’s Fields**: Looping reduce\
    \ the code by looping each field in turn using {% for %} loop:\n\n```\n{% for\
    \ field in form %}\n  <div class=\"wrapper\">\n    {{ field.errors }}\n    {{\
    \ field.name }} {{ age }}\n  </div>\n{% endfor %}\n```\n\nAttributes of {{ field\
    \ }}\n\n- **{{ field.label }}**: It owns label attribute of the field, e.g., email\
