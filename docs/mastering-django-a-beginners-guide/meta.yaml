    # Install Django from Git


    Django can be downloaded from Git itself by the cloning of the Django Git repository
    locally.


    Django uses Git for source control. Download Git for your operating system. Git
    repository is hosted on Github. Create the account on Github and also create a
    local copy of your fork like that.


    +   - Git folder will be created by using this command

    - git clone https://github.com/github_username/django.git

    - then cd to Django folder (now your Github repository will be called “origin”)

    - set up Django/Django as an “upstream” remote (that tells the reference of Django’s
    official repository )

    - execute these git commands

    - git remote add upstream git@github.com:django/django.git.

    - git fetch upstream


    > Note: Django git official repository: https://github.com/django/django. There
    are so many commands of Git, like locally and remote. We need to understand that
    command before using it.


    +   - **Git init**: It will make folder/directory s git repository

    - **Git adds**: Add files in the staging area for Git. In Git, always use add
    before committing any storage. Move files at once, then use Git add. (don’t forget
    to add a dot after add) .

    - **Git status**: Return the current working branch. If files are in the staging
    area or there are no changes, it will return nothing to commit.


