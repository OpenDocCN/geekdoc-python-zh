- md: '## Check the Django Web App from AWS


    Login to your AWS and select the region where you deployed your project – then
    search for Elastic Beanstalk in the console. If you get it, click on it, and then
    your environments in that region should appear. There are various options in it
    that you can check: your website created date and time, the URL of your site,
    platform technologies like in this project we have used Python for building the
    website, last modification, and termination.


    To terminate your website, select the Django-env, click the Actions to get dropdown
    menu, select terminate environment, enter the name of your domain to confirm “Django-deployment”,
    and click terminate. Once you terminated it, you move to the Application name
    and select “Delete application”. Enter the name of the Application and click delete.
    Your Application will be deleted entirely.


    ## AZURE


    It is a public cloud computing platform – with solutions including Infrastructure
    as a service (IaaS), Platform as a Service (PaaS), and Software as a Service (SaaS)
    that can be used for storage, analytics, networking, virtual computing, storage,
    networking, and so on. It can be used to replace your on-premise servers. With
    its massive set of features and functionalities and build for the Microsoft platform,
    Azure makes it easier for IT professionals to develop and manage enterprise, mobile,
    web, and Internet of Things (IoT) apps and applications.


    ## Features of Cloud-Based Services


    - **Availability of Virtual Machines:** With the Microsoft Azure IaaS facility,
    you benefit from virtualization and virtual machines. User can launch their general-purpose
    virtual machine developed in the Windows or Linux platform.


    - **Availability of App Services**: This facility of Azure falls under the Azure
    PaaS Services section. You can quickly produce as well as manage your websites
    and business web applications. It is yet another of the greatest Microsoft Azure
    Features for web developers, mobile app developers, and online business owners.


    ### Microsoft Azure Features Related to Mobile Services


    Another one of the great features of Microsoft Azure Strength is the mobile services
    provided by the Platform. Have a look at each of them.


    1. **Mobile Engagement Services**: You can easily monitor and manage the mobile
    user engagement that your Application is getting from the users. The Azure Mobile
    Services allows for real-time data analytics tracking that helps you take a deep
    dive. You also get a push notification to keep track of the significant user.


    2. **Data Management**: The Azure search uses SDK APIs or REST to bring up text-search
    and a subset of OData’s structured filters. Azure enables handling data-intensive
    queries on datasets that exceed 1TB through its data warehousing service called
    SQL Data Warehouse.


    - **Storage**: This category of Azure services provides us scalable cloud storage
    for structured and unstructured data and supports big data projects, persistent
    storage, and archival storage. Last but not least, we have a file service feature
    in the Microsoft Azure cloud. Through this feature of Microsoft Azure for business
    application data storage, you can store your data on the cloud by using the REST
    API and the SMB protocol. Queue Services let programs communicate asynchronously
    by using queries.


    - **Analytics**: These Azure services provide us with distributed analytics and
    storage, as well as features for real-time analytics, big data analytics, data
    lakes, Machine Learning (ML), business intelligence (BI), Internet of Things (IoT)
    data streams, and data warehousing.


    - **Containers**: These Azure services will help an enterprise create, register,
    orchestrate, and manage vast volumes of containers in the Azure cloud, using common
    platforms such as Docker and Kubernetes.


    - **Internet of Things:** These services will help users capture, monitor, and
    analyze IoT data from sensors and other devices. Services include notifications,
    analytics, monitoring, and support for coding and execution.


    - **Databases:** This category includes Database as a Service (DBaaS) offering
    for SQL and NoSQL and other database instances – such as Azure Cosmos DB and Azure
    Database for PostgreSQL. It also includes Azure SQL Data Warehouse support, caching,
    and hybrid database integration and migration features.


    ## DEPLOYING OUR DJANGO APP ONTO AZURE


    First, ensure that your system has Python installed, and then create a virtual
    environment by running the command `pip install virtualenv` (use `pip3` instead
    of `pip`).


    Now that we have it running nearby, let’s deploy our first app onto Azure.


    ### File Structure


    Now, create the `django_azure_demo` folder. Afterward, run the `cd django_azure_Demo`
    to see the files out of the `django_azure_Demo` folder should have `manage.py`.


    In the beginning, push your code to Github:


    ```

    1. git init

    2. git remote add origin https://github.com/YOUR_USERNAME/YOUR_REPO_NAME

    3. git pull origin master

    4. git add -A

    5. git commit -m "Initial commit."

    6. git push origin master

    ```


    - **Git init:** Initialize your local repo as a git repo.

    - **Git remote add origin:** link your local repo with the remote repo in Github.

    - **Git pull:** Pull the remote .gitignore Github created to your local repo.

    - **Git add:** Add all files for staging (files are in processing mode).

    - **Git commit:** Save changes to your repo by “committing” the as message “-m”.

    - **Git push:** Pushing them to Github; you can view your files in your Github
    account whatever the name is given to your repository.


    ## Installing Azure


    Create a free account at azure.com. The Django app will be deployed through Azure’s
    web app services. To sort, we will create a resource from the upper left “Create
    a Resource” button. Click on the “Web App” button, but it isn’t there; you can
    search for “Web App” in the search bar. If you are a student, then visit this
    link https://azure.microsoft.com/en-us/offers/ms-azr-0144p/.


    ![Azure deployment.](img/6b248a6900b90aa4ebb02bce8e067804_235_0.png)'
  mdcn: '## 从 AWS 检查 Django Web 应用


    登录你的 AWS 并选择部署项目的区域——然后在控制台中搜索 Elastic Beanstalk。如果找到了，点击它，那么该区域中的环境应该会显示出来。其中有各种选项可供检查：你的网站创建日期和时间、网站的
    URL、平台技术（例如在本项目中，我们使用 Python 构建网站）、最后修改时间和终止时间。


    要终止你的网站，选择 Django-env，点击“操作”以获取下拉菜单，选择“终止环境”，输入你的域名以确认“Django-deployment”，然后点击“终止”。一旦终止，你转到“应用程序名称”并选择“删除应用程序”。输入应用程序的名称并点击“删除”。你的应用程序将被完全删除。


    ## AZURE


    它是一个公共云计算平台——提供包括基础设施即服务（IaaS）、平台即服务（PaaS）和软件即服务（SaaS）在内的解决方案，可用于存储、分析、网络、虚拟计算、存储、网络等。它可以用来替代你的本地服务器。凭借其庞大的功能集和为
    Microsoft 平台构建的特性，Azure 使 IT 专业人员更容易开发和管理企业、移动、Web 和物联网（IoT）应用程序。


    ## 基于云的服务特性


    - **虚拟机的可用性：** 通过 Microsoft Azure IaaS 设施，你可以受益于虚拟化和虚拟机。用户可以启动在 Windows 或 Linux
    平台上开发的通用虚拟机。


    - **应用服务的可用性：** Azure 的这一设施属于 Azure PaaS 服务部分。你可以快速创建和管理你的网站和业务 Web 应用程序。这是 Microsoft
    Azure 为 Web 开发人员、移动应用程序开发人员和在线企业主提供的又一伟大特性。


    ### 与移动服务相关的 Microsoft Azure 特性


    Microsoft Azure 优势的另一个伟大特性是平台提供的移动服务。让我们逐一了解。


    1. **移动参与服务：** 你可以轻松监控和管理你的应用程序从用户那里获得的移动用户参与度。Azure 移动服务允许进行实时数据分析跟踪，帮助你深入了解。你还会收到推送通知，以跟踪重要用户。


    2. **数据管理：** Azure 搜索使用 SDK API 或 REST 来提供文本搜索和 OData 结构化过滤器的子集。Azure 通过其名为 SQL
    Data Warehouse 的数据仓库服务，能够处理超过 1TB 的数据集上的数据密集型查询。


    - **存储：** 这类 Azure 服务为我们提供可扩展的云存储，用于结构化和非结构化数据，并支持大数据项目、持久存储和归档存储。最后但同样重要的是，我们在
    Microsoft Azure 云中有一个文件服务功能。通过 Microsoft Azure 的这一业务应用程序数据存储功能，你可以使用 REST API
    和 SMB 协议将数据存储在云上。队列服务允许程序通过使用查询进行异步通信。


    - **分析：** 这些 Azure 服务为我们提供分布式分析和存储，以及实时分析、大数据分析、数据湖、机器学习（ML）、商业智能（BI）、物联网（IoT）数据流和数据仓库等功能。


    - **容器：** 这些 Azure 服务将帮助企业使用 Docker 和 Kubernetes 等通用平台，在 Azure 云中创建、注册、编排和管理大量容器。


    - **物联网：** 这些服务将帮助用户从传感器和其他设备捕获、监控和分析 IoT 数据。服务包括通知、分析、监控以及对编码和执行的支持。


    - **数据库：** 此类别包括针对 SQL 和 NoSQL 以及其他数据库实例的数据库即服务（DBaaS）产品——例如 Azure Cosmos DB 和
    Azure Database for PostgreSQL。它还包括 Azure SQL Data Warehouse 支持、缓存以及混合数据库集成和迁移功能。


    ## 将我们的 DJANGO 应用部署到 AZURE


    首先，确保你的系统已安装 Python，然后通过运行命令 `pip install virtualenv`（使用 `pip3` 代替 `pip`）创建一个虚拟环境。


    现在我们已经在本地准备好了，让我们将第一个应用部署到 Azure。


    ### 文件结构


    现在，创建 `django_azure_demo` 文件夹。然后，运行 `cd django_azure_Demo` 以查看 `django_azure_Demo`
    文件夹外的文件，其中应包含 `manage.py`。


    首先，将你的代码推送到 Github：


    ```

    1. git init

    2. git remote add origin https://github.com/YOUR_USERNAME/YOUR_REPO_NAME

    3. git pull origin master

    4. git add -A

    5. git commit -m "Initial commit."

    6. git push origin master

    ```


    - **Git init：** 将你的本地仓库初始化为 git 仓库。

    - **Git remote add origin：** 将你的本地仓库与 Github 中的远程仓库链接。

    - **Git pull：** 将 Github 创建的远程 .gitignore 拉取到你的本地仓库。

    - **Git add：** 添加所有文件进行暂存（文件处于处理模式）。

    - **Git commit：** 通过“提交”更改并附带消息“-m”来保存对仓库的更改。

    - **Git push：** 将它们推送到 Github；你可以在你的 Github 账户中查看你的文件，无论你的仓库被赋予什么名称。


    ## 安装 Azure


    在 azure.com 创建一个免费账户。Django 应用将通过 Azure 的 Web 应用服务进行部署。为了开始，我们将从左上角的“创建资源”按钮创建一个资源。点击“Web
    App”按钮，但如果没找到，你可以在搜索栏中搜索“Web App”。如果你是学生，请访问此链接 https://azure.microsoft.com/en-us/offers/ms-azr-0144p/。


    ![Azure 部署。](img/6b248a6900b90aa4ebb02bce8e067804_235_0.png)'
