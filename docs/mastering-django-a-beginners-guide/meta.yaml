    # RELATIONSHIPS AND QUERY SET


    Relationships


    A relationship works between two relational database tables when one table has
    the foreign key of the other table as a primary key. It allows us to split and
    store data in different tables:


    +   1. Many-to-many relationships

    2. Many-to-one relationships

    3. One-to-one relationships


    Many-to-Many Relationships


    A many-to-many relationship refers to a relationship between tables in a database.
    A parent row in one table contains several child rows in the second table and
    vice versa (in RDBMS). Use ManyToManyField to define the many-to-many relationships
    with the class model.'
