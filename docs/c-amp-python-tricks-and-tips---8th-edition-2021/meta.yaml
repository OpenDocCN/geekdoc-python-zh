    ## 分割和连接字符串


    在处理 Python 中的数据时，尤其是来自用户输入的数据，你无疑会遇到长字符串。学习 Python 编程的一项有用技能是能够分割这些长字符串以提高可读性。


    ### 字符串理论


    你已经看过一些列表函数，使用了 `.insert`、`.remove` 和 `.pop`，但也有可以应用于字符串的函数。


    第1步 字符串函数库中的主要工具是 `.split()`。借助它，你可以根据括号内的参数分割数据字符串。例如，这里有一个包含三个项目的字符串，每个项目由空格分隔：

    `text="Daniel Hannah Emma"`


    第2步 现在让我们将字符串转换为列表并相应地分割内容：

    `names=text.split(" ")`

    然后输入新列表的名称 `names` 以查看这三个项目。


    第3步 注意 `text.split` 部分有括号、引号，然后是一个空格，接着是闭合引号和括号。空格是分隔符，表示每个列表项条目由空格分隔。同样，CSV（逗号分隔值）内容有一个逗号，所以你会使用：

    `text="January,February,March,April,May,June"`

    `months=text.split(",")`

    `months`


    ![](img/893ff1cb7ac32885c7c794a5e648f755_13_0.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_13_1.png)


    第4步 你之前已经看过如何使用一个名称将字符串分割成单个字母的列表：

    `name=list("David")`

    `name`

    返回的值是 ''D'', ''a'', ''v'', ''i'', ''d''。虽然在普通情况下可能看起来没什么用，但它可能对创建拼写游戏等很有帮助。


    ![](img/893ff1cb7ac32885c7c794a5e648f755_13_2.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_13_3.png)


    第5步 `.split` 函数的反面是 `.join`，你将拥有字符串中的单独项目，并可以将它们全部连接在一起形成一个单词或仅仅是项目的组合，具体取决于你编写的程序。例如：


    ```

    alphabet="".join(["a","b","c","d","e"])

    alphabet

    ```


    这将在 Shell 中显示 ''abcde''。


    ![](img/893ff1cb7ac32885c7c794a5e648f755_14_0.png)


    第6步 因此，你可以将 `.join` 应用于你在第4步中创建的分割后的名称，再次组合字母以形成名称：


    ```

    name="".join(name)

    name

    ```


    我们已经将字符串重新连接起来，并保留了名为 `name` 的列表，将其传递给 `.join` 函数。


    ![](img/893ff1cb7ac32885c7c794a5e648f755_14_2.png)


    第7步 使用 `.join` 函数的一个好例子是当你有一个单词列表，你想将它们组合成一个句子时：


    ```

    list=["Conan", "raised", "his", "mighty", "sword", "and", "struck", "the", "demon"]

    text=" ".join(list)

    text

    ```


    注意 `.join` 函数前引号之间的空格（在第6步的 join 中没有空格）


    ![](img/893ff1cb7ac32885c7c794a5e648f755_14_4.png)


    第8步 与 `.split` 函数一样，分隔符不一定是空格，也可以是逗号、句号、连字符或任何你喜欢的：


    ```

    colours=["Red", "Green", "Blue"]

    col=",".join(colours)

    col

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_14_1.png)


    第9步 你可以对字符串应用一些有趣的函数，例如 `.capitalize` 和 `.title`。例如：


    ```

    title="conan the cimmerian"

    title.capitalize()

    title.title()

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_14_3.png)


    第10步 你也可以在字符串上使用逻辑运算符，使用 `''in''` 和 `''not in''` 函数。这些函数使你能够检查字符串是否包含（或不包含）字符序列：


    ```

    message="Have a nice day"

    "nice" in message

    "bad" not in message

    "day" not in message

    "night" in message

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_14_5.png)'
