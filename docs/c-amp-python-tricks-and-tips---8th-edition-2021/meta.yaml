    # # C++ Input/Output


    There''s a satisfying feeling when you program code that asks the user for input,
    then uses that input to produce something that the user can see. Even if it''s
    simply asking for someone''s name, and displaying a personal welcome message,
    it''s a big leap forward.


    User interaction, character literals, defining constants and file input and output
    are all covered in the following pages. All of which help you to understand how
    a C++ program works better.


    ![](img/893ff1cb7ac32885c7c794a5e648f755_44_1.png)'
