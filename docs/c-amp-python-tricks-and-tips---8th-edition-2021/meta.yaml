    71 #if ACE_SIZEOF_LONG == 8 && \n72 !((defined( amd64 ) || defined ( x86_64

    ```


    # PLAN AHEAD


    While it’s great to wake up one morning and decide to code a classic text adventure,
    it’s not always practical without a good plan. Small snippets of code can be written
    without too much thought and planning but longer and more in-depth code requires
    a good working plan to stick to and help iron out the bugs.


    ![](img/893ff1cb7ac32885c7c794a5e648f755_67_1.png)'
  - '[PAGE 68]


    # Common Coding Mistakes


    # USER ERROR


    User input is often a paralysing mistake in code. For example, when the user is
    supposed to enter a number for their age and instead they enter it in letters.
    Often a user can enter so much into an input that it overflows some internal buffer,
    thus sending the code crashing. Watch those user inputs and clearly state what''s
    needed from them.


    ```

    Enter an integer number

    aswdfsf

    You have entered wrong input

    s

    You have entered wrong input

    !"£"!£!"

    You have entered wrong input

    sdfsdf213213123

    You have entered wrong input

    123234234234234234

    You have entered wrong input

    12

    the number is: 12


    Process returned 0 (0x0)   execution time : 21.495 s

    Press any key to continue.

    ```


    # BACKUPS


    Always make a backup of your work, with a secondary backup for any changes you''ve
    made. Mistakes can be rectified if there''s a good backup in place to revert to
    for those times when something goes wrong. It''s much easier to start where you
    left off, rather than starting from the beginning again.


    ![](img/893ff1cb7ac32885c7c794a5e648f755_68_0.png)


    # RE-INVENTING WHEELS


    You can easily spend days trying to fathom out a section of code to achieve a
    given result and it''s frustrating and often time-wasting. While it''s equally
    rewarding to solve the problem yourself, often the same code is out there on the
    Internet somewhere. Don''t try and re-invent the wheel, look to see if some else
    has done it first.


    ![](img/893ff1cb7ac32885c7c794a5e648f755_68_1.png)


    # SECURE DATA


    If you''re writing code to deal with usernames and passwords, or other such sensitive
    data, then ensure that the data isn''t in cleartext. Learn how to create a function
    to encrypt sensitive data, prior to feeding into a routine that can transmit or
    store it where someone may be able to get to view it.


    ![](img/893ff1cb7ac32885c7c794a5e648f755_68_2.png)


    # HELP!


    Asking for help is something most of us has struggled with in the past. Will the
    people we''re asking laugh at us? Am I wasting everyone''s time? It''s a common
    mistake for someone to suffer in silence. However, as long as you ask the in the
    correct manner, obey any forum rules and be polite, then your question isn''t
    silly.


    ![](img/893ff1cb7ac32885c7c794a5e648f755_68_3.png)


    # MATHS


    If your code makes multiple calculations then you need to ensure that the maths
    behind it is sound. There are thousands of instances where programs have offered
    incorrect data based on poor mathematical coding, which can have disastrous effects
    depending on what the code is set to do. In short, double check your code equations.


    ```

    set terminal x11

    set output


    rmax = 5

    nmax = 100


    complex (x, y) = x * {1, 0} + y * {0, 1}

    mandel (x, y, z, n) = (abs (z) > rmax || n >= 100)? n: mandel (x, y, z * z + complex
    (x, y), n + 1)


    set xrange [-0.5:0.5]

    set yrange [-0.5:0.5]

    set logscale z

    set samples 200

    set isosample 200

    set pm3d map

    set size square

    a= #A#

    b= #B#

    splot mandel(-a/100,-b/100,complex(x,y),0) notitle

    ```'
- md: "## Beginner Python Mistakes\n\nPython is a relatively easy language to get\
    \ started in where there’s plenty of room for the beginner to find their programming\
    \ feet. However, as with any other programming language, it can be easy to make\
    \ common mistakes that’ll stop your code from running.\n\n## DEF BEGINNER(MISTAKES=10)\n\
    \nHere are ten common Python programming mistakes most beginners find themselves\
    \ making. Being able to identify these mistakes will save you headaches in the\
    \ future.\n\n## VERSIONS\n\nTo add to the confusion that most beginners already\
