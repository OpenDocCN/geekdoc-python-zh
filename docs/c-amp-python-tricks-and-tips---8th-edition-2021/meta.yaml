    \ and execute the code and your image will be displayed in a new window. Have\
    \ a play around with the colours, sizes and so on and take time to look up the\
    \ many functions within the pygame module too.\n\n## Using Modules\n\nA Python\
    \ module is simply a Python-created source file which contains the necessary code\
    \ for classes, functions and global variables. You can bind and reference modules\
