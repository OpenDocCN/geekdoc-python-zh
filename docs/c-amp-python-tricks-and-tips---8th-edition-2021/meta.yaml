- md: '## Formatting Strings


    When you work with data, creating lists, dictionaries and objects you may often
    want to print out the results. Merging strings with data is easy especially with
    Python 3, as earlier versions of Python tended to complicate matters.


    ## STRING FORMATTING


    Since Python 3, string formatting has become a much neater process, using the
    .format function combined with curly brackets. It''s a more logical and better
    formed approach than previous versions.


    STEP 1 The basic formatting in Python is to call each variable into the string
    using the curly brackets:

    name="Conan"

    print("The barbarian hero of the Hyborian Age is: {}".format(name))


    STEP 3 You can of course also include integers into the mix:

    number=10000

    print("{} of {} was a skilled mercenary, and thief too. He once stole {} gold
    from a merchant.".format(name, place, number))


    ![](img/893ff1cb7ac32885c7c794a5e648f755_15_0.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_15_1.png)


    STEP 2 Remember to close the print function with two sets of brackets, as you''ve
    encased the variable in one, and the print function in another. You can include
    multiple cases of string formatting in a single print function:

    name="Conan"

    place="Cimmeria"

    print("{} hailed from the North, in a cold land known as {}".format(name, place))


    STEP 4 There are many different ways to apply string formatting, some are quite
    simple, as we''ve shown you here; others can be significantly more complex. It
    all depends on what you want from your program. A good place to reference frequently
    regarding string formatting is the Python Docs webpage, found at www.docs.python.org/3.1/library/string.html.
    Here, you will find tons of help.


    ![](img/893ff1cb7ac32885c7c794a5e648f755_15_2.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_15_3.png)


    Interestingly you can reference a list using the string formatting function. You
    need to place an asterisk in front of the list name:


    ```

    numbers=1, 3, 45, 567546, 3425346345

    print("Some numbers: {}, {}, {}, {}, {}".format(*numbers))

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_16_0.png)


    You can also print out the content of a user''s input in the same fashion:


    ```

    name=input("What''s your name? ")

    print("Hello {}.".format(name))

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_16_1.png)


    With indexing in lists, the same applies to calling a list using string formatting.
    You can index each item according to its position (from 0 to however many are
    present):


    ```

    numbers=1, 4, 7, 9

    print("More numbers: {3}, {0}, {2}, {1}.".format(*numbers))

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_16_2.png)


    You can extend this simple code example to display the first letter in a person''s
    entered name:


    ```

    name=input("What''s your name? ")

    print("Hello {}.".format(name))

    lname=list(name)

    print("The first letter of your name is a {0}".format(*lname))

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_16_3.png)


    And as you probably suspect, you can mix strings and integers in a single list
    to be called in the .format function:


    ```

    characters=["Conan", "Belit", "Valeria", 19, 27, 20]

    print ("{0} is {3} years old. Whereas {1} is {4} years old.".format(*characters))

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_16_4.png)


    You can also call upon a pair of lists and reference them individually within
    the same print function. Looking back the code from Step 7, you can alter it with:


    ```

    names=["Conan", "Belit", "Valeria"]

    ages=[25, 21, 22]

    Creating two lists. Now you can call each list, and individual items:

    print("{0[0]} is {1[0]} years old. Whereas {0[1]} is {1[1]} years old.".format(names,
    ages))

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_16_5.png)


    ## Date and Time


    When working with data it’s often handy to have access to the time. For example,
    you may want to time-stamp an entry or see at what time a user logged into the
    system and for how long. Luckily acquiring the date and time is easy, thanks to
    the Time module.


    ## TIME LORDS


    The time module contains functions that help you retrieve the current system time,
    reads the date from strings, formats the time and date and much more.


    STEP 1 First you need to import the time module. It’s one that’s built-in to Python
    3 so you shouldn’t need to drop into a command prompt and pip install it. Once
    it’s imported, you can call the current time and date with a simple command:

    import time

    time.asctime()


    STEP 3 You can see the structure of how time is presented by entering:

    time.local.time()

    The output is displayed as such: ‘time.struct_time(tm_year=2017, tm_mon=9, tm_mday=7,
    tm_hour=9, tm_min=6, tm_sec=13, tm_wday=3, tm_yday=250, tm_isdst=0)’; obviously
    dependent on your current time as opposed to the time shown above.


    ![](img/893ff1cb7ac32885c7c794a5e648f755_17_0.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_17_1.png)


    STEP 2 The time function is split into nine tuples, these are divided up into
    indexed items, as with any other tuple, and shown in the screen shot below.


    STEP 4 There are numerous functions built into the time module. One of the most
    common of these is .strftime(). With it, you’re able to present a wide range of
    arguments as it converts the time tuple into a string. For example, to display
    the current day of the week you can use:

    time.strftime(‘%A’)


    | Index | Field | Values |

    |---|---|---|

    | 0 | 4-digit year | 2016 |

    | 1 | Month | 1 to 12 |

    | 2 | Day | 1 to 31 |

    | 3 | Hour | 0 to 23 |

    | 4 | Minute | 0 to 59 |

    | 5 | Second | 0 to 61 (60 or 61 are leap-seconds) |

    | 6 | Day of Week | 0 to 6 (0 is Monday) |

    | 7 | Day of year | 1 to 366 (Julian day) |

    | 8 | Daylight savings | -1, 0, 1, -1 means library determines DST |


    ![](img/893ff1cb7ac32885c7c794a5e648f755_17_2.png)


    STEP 5 This naturally means you can incorporate various functions into your own
    code, such as:


    ```

    time.strftime("%a")

    time.strftime("%B")

    time.strftime("%b")

    time.strftime("%H")

    time.strftime("%H%M")

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_18_0.png)


    STEP 8 You saw at the end of the previous section, in the code to calculate Pi
    to however many decimal places the users wanted, you can time a particular event
    in Python. Take the code from above and alter it slightly by including:


    ```

    start_time=time.time()

    ```


    Then there''s:


    ```

    endtime=time.time()-start_time

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_18_1.png)


    STEP 6 Note the last two entries, with %H and %H%M, as you can see these are the
    hours and minutes and as the last entry indicates, entering them as %H%M doesn''t
    display the time correctly in the Shell. You can easily rectify this with:


    ```

    time.strftime("%H:%M")

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_18_2.png)


    STEP 9 The output will look similar to the screenshot below. The timer function
    needs to be either side of the input statement, as that''s when the variable name
    is being created, depending on how long the user took to log in. The length of
    time is then displayed on the last line of the code as the endtime variable.


    ![](img/893ff1cb7ac32885c7c794a5e648f755_18_3.png)


    STEP 7 This means you''re going to be able to display either the current time
    or the time when something occurred, such as a user entering their name. Try this
    code in the Editor:


    ```

    import time

    name=input("Enter login name: ")

    print("Welcome", name, "\d")

    print("User:", name, "logged in at", time.strftime("%H:%M"))

    ```


    Try to extend it further to include day, month, year and so on.


    ![](img/893ff1cb7ac32885c7c794a5e648f755_18_4.png)


    STEP 10 There''s a lot that can be done with the time module; some of it is quite
    complex too, such as displaying the number of seconds since January 1st 1970.
    If you want to drill down further into the time module, then in the Shell enter:
    help(time) to display the current Python version help file for the time module.


    ![](img/893ff1cb7ac32885c7c794a5e648f755_18_5.png)


    ## Opening Files


    In Python you can read text and binary files in your programs. You can also write
    to file, which is something we will look at next. Reading and writing to files
    enables you to output and store data from your programs.


    ## OPEN, READ AND WRITE


    In Python you create a file object, similar to creating a variable, only pass
    in the file using the open() function. Files are usually categorised as text or
    binary.


    STEP 1 Start by entering some text into your system''s text editor. The text editor
    is best, not a word processor, as word processors include background formatting
    and other elements. In our example, we have the poem The Cimmerian, by Robert
    E Howard. You need to save the file as poem.txt.


    STEP 3 If you now enter poem into the Shell, you will get some information regarding
    the text file you''ve just asked to be opened. You can now use the poem variable
    to read the contents of the file:

