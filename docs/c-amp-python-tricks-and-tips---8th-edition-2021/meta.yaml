    ```\n\n你还可以使用命令`turtle.begin_fill()`和`turtle.end_fill()`来用选定的颜色填充正方形；本例中是红色轮廓，黄色填充。\n\
    \n**第6步** 你可以看到Turtle模块可以绘制出相当不错的形状，并且随着你开始掌握其工作方式，它会变得稍微复杂一些。输入这个例子：\n\n```\n\
    from turtle import *\ncolor('red', 'yellow')\nbegin_fill()\nwhile True:\n    forward(200)\n\
    \    left(170)\n    if abs(pos()) < 1:\n        break\nend_fill()\ndone()\n```\n\
    \n这是一种不同的方法，但非常有效。\n\n**第7步** 另一种显示图形的方法是使用Pygame模块。pygame有多种方式可以帮助你将图形输出到屏幕上，但现在让我们看看如何显示一个预定义的图像。首先打开浏览器，找到一张图片，然后将其保存到你保存Python代码的文件夹中。\n\
    \n**第8步** 现在让我们通过导入pygame模块来获取代码：\n\n```\nimport pygame\npygame.init()\n\nimg\
    \ = pygame.image.load(\"RPi.png\")\n\nwhite = (255, 255, 255)\nw = 900\nh = 450\n\
    screen = pygame.display.set_mode((w, h))\nscreen.fill((white))\n\nscreen.fill((white))\n\
    screen.blit(img,(0,0))\npygame.display.flip()\n\nwhile True:\n    for event in\
    \ pygame.event.get():\n        if event.type == pygame.QUIT:\n            pygame.quit()\n\
    ```\n\n**第9步** 在上一步中，你导入了pygame，初始化了pygame引擎，并要求它导入我们保存的树莓派logo图像，保存为RPi.png。接下来，你定义了显示图像的窗口背景颜色，并根据实际图像尺寸设置了窗口大小。最后，你有一个循环来关闭窗口。\n\
    \n```\nw = 900\nh = 450\nscreen = pygame.display.set_mode((w, h))\nscreen.fill((white))\n\
    \nscreen.fill((white))\nscreen.blit(img,(0,0))\npygame.display.flip()\n\nwhile\
    \ True:\n    for event in pygame.event.get():\n        if event.type == pygame.QUIT:\n\
    \            pygame.quit()\n```\n\n**第10步** 按F5保存并执行代码，你的图像将显示在一个新窗口中。尝试调整颜色、大小等，并花时间查看pygame模块中的众多函数。\n\
    \n## 使用模块\n\nPython模块只是一个Python创建的源文件，其中包含类、函数和全局变量所需的代码。你可以绑定和引用模块以扩展功能，甚至创建更出色的Python程序。\n\
    \n想知道如何改进这些模块，为你的代码增添一些额外的东西吗？那么请继续阅读，了解如何使用它们来打造出色的代码。\n\n## 日历模块\n\n除了time模块，calendar模块在代码中执行时可以产生一些有趣的结果。它不仅仅是以类似time模块的格式显示日期，你实际上可以调用一个挂历类型的显示。\n\
    \n### 处理日期\n\ncalendar模块内置于Python 3中。但是，如果由于某种原因未安装，你可以使用`pip install calendar`（以Windows管理员身份）或`sudo\
    \ pip install calendar`（适用于Linux和macOS）来添加它。\n\n**第1步** 启动Python 3并输入：`import\
    \ calendar`以调用该模块及其固有函数。一旦加载到内存中，首先输入：\n`sep=calendar.TextCalendar(calendar.SUNDAY)`\n\
    `sep.prmonth(2017, 9)`\n\n**第2步** 你可以看到2017年9月的日期以挂历形式显示。当然，你可以将第二行中的2017, 9部分更改为任何你想要的年份和月份，例如生日（1973,\
    \ 6）。第一行将TextCalendar配置为从周日开始其周；如果你愿意，可以选择周一。\n\n**第3步** calendar模块中有许多函数在编写自己的代码时可能会对你感兴趣。例如，你可以显示两个特定年份之间的闰年数量：\n\
    `leaps=calendar.leapdays(1900, 2018)`\n`print(leaps)`\n结果是29，从1904年开始计算。\n\n**第4步**\
    \ 你甚至可以将这个特定的例子塑造成一个可工作的、用户交互式的Python代码：\n`import calendar`\n`print(\">>>>>>>>>>>Leap\
    \ Year Calculator<<<<<<<<<<\\n\")`\n`y1=int(input(\"Enter the first year: \"))`\n\
    `y2=int(input(\"Enter the second year: \"))`\n`leaps=calendar.leapdays(y1, y2)`\n\
    `print(\"Number of leap years between\", y1, \"and\", y2, \"is:\", leaps)`"
