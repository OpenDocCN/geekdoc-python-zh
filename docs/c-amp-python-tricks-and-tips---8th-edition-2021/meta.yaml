  md: "# While Loop\n\nSTEP 6 It's important to remember not to add a semicolon at\
    \ the end of a while statement. Why? Well, as you know, the semicolon represents\
    \ the end of a C++ line of code. If you place one at the end of a while statement,\
    \ your loop will be permanently stuck until you close the program.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_56_0.png)\n\
    \nSTEP 7 In our example, if we were to execute the code the value of num would\
    \ be 1, as set by the int statement. When the code hits the while statement it\
    \ reads that while the condition of 1 being less than 30 is true, loop. The semicolon\
    \ closes the line, so the loop repeats; but it never adds 1 to num, as it won't\
    \ continue through the compound statement.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_56_1.png)\n\
    \nSTEP 8 You can manipulate the while statement to display different results depending\
    \ on what code lies within the loop. For example, to read the poem, Cimmeria,\
    \ word by word, you would enter:\n\n```\n#include <iostream>\n#include <fstream>\n\
    using namespace std;\n\nint main ()\n{\n    string word;\n    ifstream newfile\
    \ (\"C:\\users\\david\\Documents\\Cimmeria.txt\");\n\n    cout << \"Cimmeria,\
    \ by Robert E Howard: \\n\" << endl;\n\n    while (newfile >> word)\n    {\n \
    \       cout << word << endl;\n    }\n\n    return 0;\n}\n```\n\nSTEP 9 You can\
    \ further expand the code to enable each word of the poem to appear every second.\
    \ To do so, you need to pull in a new library, <windows.h>. This is a Windows\
    \ only library and within it you can use the Sleep() function:\n\n```\n#include\
    \ <iostream>\n#include <fstream>\n#include <windows.h>\nusing namespace std;\n\
    \nint main ()\n{\n    string word;\n    ifstream newfile (\"C:\\users\\david\\\
    Documents\\Cimmeria.txt\");\n\n    cout << \"Cimmeria, by Robert E Howard: \\\
    n\" << endl;\n\n    while (newfile >> word)\n    {\n        cout << word << endl;\n\
    \        Sleep(1000);\n    }\n\n    return 0;\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_56_2.png)\n\
    \nSTEP 10 Sleep() works in milliseconds, so Sleep(1000) is one second, Sleep(10000)\
    \ is ten seconds and so on. Combining the sleep function (along with the header\
    \ it needs) and a while loop enables you to come up with some interesting countdown\
    \ code.\n\n```\n#include <iostream>\n#include <windows.h>\nusing namespace std;\n\
    \nint main ()\n{\n    int a = 10;\n\n    while (a != 0)\n    {\n        cout <<\
    \ a << endl;\n        a = a - 1;\n        Sleep(1000);\n    }\n\n    cout << \"\
    \\nBlast Off!\" << endl;\n\n    return 0;\n}\n```"
