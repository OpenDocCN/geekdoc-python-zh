  md: "# User Interaction\n\nThere's nothing quite as satisfying as creating a program\
    \ that responds to you. This basic user interaction is one of the most taught\
    \ aspects of any language and with it you're able to do much more than simply\
    \ greet the user by name.\n\n# HELLO, DAVE\n\nYou have already used cout, the\
    \ standard output stream, throughout our code. Now you're going to be using cin,\
    \ the standard input stream, to prompt a user response.\n\nSTEP 1 Anything that\
    \ you want the user to input into the program needs to be stored somewhere in\
    \ the system memory, so it can be retrieved and used. Therefore, any input must\
    \ first be declared as a variable, so it's ready to be used by the user. Start\
    \ by creating a blank C++ file with headers.\n\nSTEP 3 The cin command works in\
    \ the opposite way from the cout command. With the first cout line you're outputting\
    \ 'What is your age' to the screen, as indicated with the chevrons. Cin uses opposite\
    \ facing chevrons, indicating an input. The input is put into the integer age\
    \ and called up in the second cout command. Build and run the code.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_45_0.png)\n\
    \n![](img/893ff1cb7ac32885c7c794a5e648f755_45_1.png)\n\nSTEP 4 If you're asking\
    \ a question, you need to store the input as a string; to ask the user their name,\
    \ you would use:\n\nSTEP 2 The data type of the variable must also match the type\
    \ of input you want from the user. For example, to ask a user their age, you would\
    \ use an integer like this:\n\n```\n#include <iostream>\nusing namespace std;\n\
    \nint main ()\n{\n    string name;\n    cout << \"what is your name: \";\n   \
    \ cin >> name;\n\n    cout << \"\\nHello, \" << name << \". I hope you're well\
    \ today?\\n\";\n}\n```\n\n```\n#include <iostream>\nusing namespace std;\n\nint\
    \ main ()\n{\n    int age;\n    cout << \"what is your age: \";\n    cin >> age;\n\
    \n    cout <<\"\\nYou are \" << age << \" years old.\\n\";\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_45_2.png)\n\
    \n![](img/893ff1cb7ac32885c7c794a5e648f755_45_3.png)"
  merge: -1
  pgno: 45
- img_proc: true
  md: "# User Interaction\n\nSTEP 5 The principal works the same as the previous code.\
    \ The user's input, their name, is stored in a string, because it contains multiple\
    \ characters, and retrieved in the second cout line. As long as the variable 'name'\
    \ doesn't change, then you can recall it wherever you like in your code\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_46_0.png)\n\
    \nSTEP 6 You can chain input requests to the user but just make sure you have\
    \ a valid variable to store the input to begin with. Let's assume you want the\
    \ user to enter two whole numbers:\n\n```\ncpp\n#include <iostream>\nusing namespace\
    \ std;\n\nint main ()\n{\n    int num1, num2;\n\n    cout << \"Enter two whole\
    \ numbers: \";\n    cin >> num1 >> num2;\n\n    cout << \"you entered \" << num1\
    \ << \" and \" << num2 << \"\\n\";\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_46_1.png)\n\
    \nSTEP 7 Likewise, inputted data can be manipulated once you have it stored in\
    \ a variable. For instance, ask the user for two numbers and do some maths on\
    \ them:\n\n```\ncpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n\
    {\n    float num1, num2;\n\n    cout << \"Enter two numbers: \\n\";\n    cin >>\
    \ num1 >> num2;\n\n    cout << num1 << \" + \" << num2 << \" is: \" << num1 +\
    \ num2 << \"\\n\";\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_46_2.png)\n\
    \nSTEP 8 While cin works well for most input tasks, it does have a limitation.\
    \ Cin always considers spaces as a terminator, so it's designed for just single\
    \ words not multiple words. However, getline takes cin as the first argument and\
    \ the variable as the second:\n\n```\ncpp\n#include <iostream>\nusing namespace\
    \ std;\n\nint main ()\n{\n    string mystr;\n\n    cout << \"Enter a sentence:\
    \ \\n\";\n    getline (cin, mystr);\n\n    cout << \"Your sentence is: \" << mystr.size()\
    \ << \" characters long.\\n\";\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_46_3.png)\n\
    \nSTEP 9 Build and execute the code, then enter a sentence with spaces. When you're\
    \ done the code reads the number of characters. If you remove the getline line\
    \ and replace it with cin >> mystr and try again, the result displays the number\
    \ of characters up to the first space.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_46_4.png)\n\
    \nSTEP 10 Getline is usually a command that new C++ programmers forget to include.\
    \ The terminating white space is annoying when you can't figure out why your code\
    \ isn't working. In short, it's best to use getline(cin, variable) in future:\n\
    \n```\ncpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    string\
    \ name;\n\n    cout << \"Enter your full name: \\n\";\n    getline (cin, name);\n\
    \n    cout << \"\\nHello, \" << name << \"\\n\";\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_46_5.png)"
