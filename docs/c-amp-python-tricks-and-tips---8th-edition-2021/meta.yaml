  md: '# Tuples


    Tuples are very much identical to lists. However, where lists can be updated,
    deleted or changed in some way, a tuple remains a constant. This is called immutable
    and they''re perfect for storing fixed data items.


    # THE IMMUTABLE TUPLE


    Reasons for having tuples vary depending on what the program is intended to do.
    Normally, a tuple is reserved for something special but they''re also used for
    example, in an adventure game, where non-playing character names are stored.


    STEP 1 A tuple is created the same way as a list but in this instance you use
    curved brackets instead of square brackets. For example:

    months=("January", "February", "March", "April", "May", "June")

    months


    STEP 3 You can create grouped tuples into lists that contain multiple sets of
    data. For instance, here is a tuple called NPC (Non-Playable Characters) containing
    the character name and their combat rating for an adventure game:

    NPC=[("Conan", 100), ("Belit", 80), ("Valeria", 95)]


    ![](img/893ff1cb7ac32885c7c794a5e648f755_9_0.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_9_1.png)


    STEP 2 Just as with lists, the items within a named tuple can be indexed according
    to their position in the data range, i.e.:

    months[0]

    months[5]

    However, any attempt at deleting or adding to the tuple will result in an error
    in the Shell.


    STEP 4 Each of these data items can be accessed as a whole by entering NPC into
    the Shell; or they can be indexed according to their position NPC[0]. You can
    also index the individual tuples within the NPC list:

    NPC[0][1]

    Will display 100.


    ![](img/893ff1cb7ac32885c7c794a5e648f755_9_2.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_9_3.png)'
  merge: -1
  pgno: 9
- img_proc: true
  md: '# Tuples


    STEP 5 It''s worth noting that when referencing multiple tuples within a list,
    the indexing is slightly different from the norm. You would expect the 95 combat
    rating of the character Valeria to be NPC[4][5], but it''s not. It''s actually:

    NPC[2][1]


    ![](img/893ff1cb7ac32885c7c794a5e648f755_10_0.png)


    STEP 8 Now unpack the tuple into two corresponding variables:

    (name, combat_rating)=NPC

    You can now check the values by entering name and combat_rating.


    ![](img/893ff1cb7ac32885c7c794a5e648f755_10_1.png)


    STEP 6 This means of course that the indexing follows thus:

    0 1, 1

    0, 0 2

    0, 1 2, 0

    1 2, 1

    1, 0

    Which as you can imagine, gets a little confusing when you''ve got a lot of tuple
    data to deal with.


    STEP 9 Remember, as with lists, you can also index tuples using negative numbers
    which count backwards from the end of the data list. For our example, using the
    tuple with multiple data items, you would reference the Valeria character with:

    NPC[2][-0]


    ![](img/893ff1cb7ac32885c7c794a5e648f755_10_2.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_10_3.png)


    STEP 7 Tuples though utilise a feature called unpacking, where the data items
    stored within a tuple are assigned variables. First create the tuple with two
    items (name and combat rating):

    NPC=("Conan", 100)


    STEP 10 You can use the max and min functions to find the highest and lowest values
    of a tuple composed of numbers. For example:

    numbers=(10.3, 23, 45.2, 109.3, 6.1, 56.7, 99)

    The numbers can be integers and floats. To output the highest and lowest, use:

    print(max(numbers))

    print(min(numbers))


    ![](img/893ff1cb7ac32885c7c794a5e648f755_10_4.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_10_5.png)'
