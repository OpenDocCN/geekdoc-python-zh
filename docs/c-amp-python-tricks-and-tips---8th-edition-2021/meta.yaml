    你刚刚点击了我！\")`\n`btn[\"command\"]=click`\n\n第5步 保存并执行第4步的代码，一个包含“大家好！”的窗口就会出现。如果你点击“大家好！”按钮，Shell将输出文本“你刚刚点击了我！”。这很简单，但展示了用几行代码可以实现什么。\n\
    \n第6步 你还可以在Tkinter窗口中同时显示文本和图像。但是，仅支持GIF、PGM或PPM格式。因此，在使用代码之前，请找到一张图像并进行转换。以下是使用BDM\
    \ Publishing标志的示例：\n\n```\nfrom tkinter import *\n\nroot = Tk()\nlogo = PhotoImage(file=\"\
    /home/pi/Downloads/BDM_logo.gif\")\nw1 = Label(root, root.title(\"BDM Publications\"\
    ), image=logo).pack(side=\"right\")\ncontent = \"\"\"从2004年 humble beginnings\
    \ 开始，BDM品牌迅速从一个仅由两人团队制作的单一出版物，成长为全球图书杂志出版领域最知名的品牌之一，原因很简单。我们对每一卷都提供最佳产品的热情和承诺。虽然公司已发展到拥有由国际员工交付的250多种出版物，但其建立的基础保持不变，这就是为什么我们相信BDM不仅是首选，而且是明智消费者的唯一选择。\"\
    \"\"\nw2 = Label(root,\n    justify=LEFT,\n    padx = 10,\n    text=content).pack(side=\"\
    left\")\nroot.mainloop()\n```\n\n第7步 之前的代码相当冗长，主要是因为content变量包含了公司网站上BDM关于页面的一部分内容。你显然可以根据需要更改内容、root.title和图像。\n\
    \n第8步 你也可以创建单选按钮。试试看：\n\n```\nfrom tkinter import *\n\nroot = Tk()\nv = IntVar()\n\
    \nLabel(root, root.title(\"选项\"), text=\"\"\"选择一种首选语言：\"\"\",\n    justify = LEFT,\
    \ padx = 20).pack()\nRadiobutton(root,\n    text=\"Python\",\n    padx = 20,\n\
    \    variable=v,\n    value=1).pack(anchor=W)\nRadiobutton(root,\n    text=\"\
    C++\",\n    padx = 20,\n    variable=v,\n    value=2).pack(anchor=W)\nmainloop()\n\
    ```\n\n第9步 你还可以创建复选框，带有按钮和输出到Shell：\n\n```\nfrom tkinter import *\nroot = Tk()\n\
    \ndef var_states():\n    print(\"战士: %d,\\n法师: %d\" % (var1.get(), var2.get()))\n\
    \nLabel(root, root.title(\"冒险游戏\"), text=\">>>>>>>>>你的冒险角色<<<<<<<<<<\").grid(row=0,\
