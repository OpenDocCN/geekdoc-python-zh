  md: "# Beginner C++ Mistakes\n\n# COMMENTS (AGAIN)\n\nIndeed the mistake of never\
    \ making any comments on code is back once more. As we've previously bemoaned,\
    \ the lack of readable identifiers throughout the code makes it very difficult\
    \ to look back at how it worked, for both you and someone else. Use more comments.\n\
    \n```\n#include <iostream>\n#include <vector>\n#include <algorithm>\nusing namespace\
    \ std;\n\nint main()\n{\n    vector<double> v;\n\n    double d;\n    while(cin>>d)\
    \ v.push_back(d);  // read elements\n    if (!cin.eof()) {              // check\
    \ if input failed\n        cerr << \"format error\\n\";\n        return 1;   \
    \               // error return\n    }\n\n    cout << \"read \" << v.size() <<\
    \ \" elements\\n\";\n\n    reverse(v.begin(),v.end());\n    cout << \"elements\
    \ in reverse order:\\n\";\n    for (int i = 0; i<v.size(); ++i) cout << v[i] <<\
    \ '\\n';\n\n    return 0;                      // success return\n}\n```\n\n#\
    \ TOO MANY BRACES\n\nThe braces, or curly brackets, are beginning and ending markers\
    \ around blocks of code. So for every { you must have a }. Often it's easy to\
    \ include or miss out one or the other facing brace when writing code; usually\
    \ when writing in a text editor, as an IDE adds them for you.\n\n```\n#include\
    \ <iostream>\nusing namespace std;\n\nint main()\n{\n    int x;\n    string mystring\
    \ = \"This is a string!\\n\";\n    cout << \"What's the value of x? \";\n    cin\
    \ >> x;\n    cout << x;\n    {\n        cout << \"\\n\\n\";\n        cout << mystring;\n\
    \    }\n}\n```\n\n# QUOTES\n\nMissing quotes is a common mistake to make, for\
    \ every level of user. Remember that quotes need to encase strings and anything\
    \ that's going to be outputted to the screen or into a file, for example. Most\
    \ compilers errors are due to missing quotes in the code.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_72_0.png)\n\
    \n# INITIALISE VARIABLES\n\nIn C++ variables aren't initialised to zero by default.\
    \ This means if you create a variable called x then, potentially, it is given\
    \ a random number from 0 to 18,446,744,073,709,551,616, which can be difficult\
    \ to include in an equation. When creating a variable, give it the value of zero\
    \ to begin with: x=0.\n\n```\n#include <iostream>\nusing namespace std;\n\nint\
    \ main()\n{\n    int x;\n    x=0;\n\n    cout << x;\n}\n```\n\n# EXTRA SEMICOLONS\n\
    \nWhile it's necessary to have a semicolon at the end of every C++ line, there\
    \ are some exceptions to the rule. Semicolons need to be at the end of every complete\
    \ statement but some lines of code aren't complete statements. Such as:\n\n+ \
    \  - #include\n- if lines\n- switch lines\n\nIf it sounds confusing don't worry,\
    \ the compiler lets you know where you went wrong.\n\n```\n// Program to print\
    \ positive number entered by the user\n// If user enters negative number, it is\
    \ skipped\n\n#include <iostream>\nusing namespace std;\n\nint main()\n{\n    int\
    \ number;\n    cout << \"Enter an integer: \";\n    cin >> number;\n\n    // checks\
    \ if the number is positive\n    if ( number > 0)\n    {\n        cout << \"You\
    \ entered a positive integer: \" << number << endl;\n    }\n\n    cout << \"This\
    \ statement is always executed.\";\n    return 0;\n}\n```\n\n# A.OUT\n\nA common\
    \ mistake when compiling in Linux is forgetting to name your C++ code post compiling.\
    \ When you compile from the Terminal, you enter:\n\n```\ng++ code.cpp\n```\n\n\
    This compiles the code in the file code.cpp and create an a.out file that can\
    \ be executed with ./a.out. However, if you already have code in a.out then it's\
    \ overwritten. Use:\n\n```\ng++ code.cpp -o nameofprogram\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_72_1.png)"
