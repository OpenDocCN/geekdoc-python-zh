  md: "# Beginner C++ Mistakes\n\nThere are many pitfalls the C++ developer can encounter,\
    \ especially as this is a more complex and often unforgiving language to master.\
    \ Beginners need to take C++ a step at a time and digest what they've learned\
    \ before moving on.\n\n# VOID(C++, MISTAKES)\n\nAdmittedly it's not just C++ beginners\
    \ that make the kinds of errors we outline on these pages, even hardened coders\
    \ are prone to the odd mishap here and there. Here are some common issues to try\
    \ and avoid.\n\n# UNDECLARED IDENTIFIERS\n\nA common C++ mistake, and to be honest\
    \ a common mistake with most programming languages, is when you try and output\
    \ a variable that doesn't exist. Displaying the value of x on-screen is fine but\
    \ not if you haven't told the compiler what the value of x is to begin with.\n\
    \n![](img/893ff1cb7ac32885c7c794a5e648f755_71_0.png)\n\n# STD NAMESPACE\n\nReferencing\
    \ the Standard Library is common for beginners throughout their code, but if you\
    \ miss the std:: element of a statement, your code errors out when compiling.\
    \ You can combat this by adding:\n\n```\nusing namespace std;\n```\n\nUnder the\
    \ #include part and simply using cout, cin and so on from then on.\n\n```\n#include\
    \ <iostream>\nusing namespace std;\n\nint main()\n{\n    int a, b, c, d;\n   \
    \ a=10;\n    b=20;\n    c=30;\n    d=40;\n\n    cout << a, b, c, d;\n}\n```\n\n\
    # SEMICOLONS\n\nRemember that each line of a C++ program must end with a semicolon.\
    \ If it doesn't then the compiler treats the line with the missing semicolon as\
    \ the same line with the next semicolon on. This creates all manner of problems\
    \ when trying to compile, so don't forget those semicolons.\n\n```\n#include <iostream>\n\
    \nint main()\n{\n    int a, b, c, d;\n    a=10;\n    b=20;\n    c=30\n    d=40;\n\
    \n    std::cout << a, b, c, d;\n}\n```\n\n# GCC OR G++\n\nIf you're compiling\
    \ in Linux then you will no doubt come across gcc and g++. In short, gcc is the\
    \ Gnu Compiler Collection (or Gnu C Compiler as it used to be called) and g++\
    \ is the Gnu ++ (the C++ version) of the compiler. If you're compiling C++ then\
    \ you need to use g++, as the incorrect compiler drivers will be used.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_71_1.png)"
