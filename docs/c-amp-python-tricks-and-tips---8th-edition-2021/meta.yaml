    \n```\nimport pygame\npygame.init()\n```\n\n**第3步** 遗憾的是，如果不关闭Python IDLE Shell，就无法关闭新创建的Pygame窗口，这不太实用。因此，你需要在编辑器（新建\
    \ > 文件）中工作，并创建一个True/False while循环：\n\n```\nimport pygame\nfrom pygame.locals\
    \ import *\npygame.init()\n\ngamewindow=pygame.display.set_mode((800,600))\npygame.display.set_caption(\"\
    冒险游戏\")\n\nrunning=True\n\nwhile running:\n    for event in pygame.event.get():\n\
    \        if event.type==QUIT:\n            running=False\n            pygame.quit()\n\
    ```\n\n**第2步** 让我们创建一个简单的游戏就绪窗口，并为其命名：\n\n```\ngamewindow=pygame.display.set_mode((800,600))\n\
    pygame.display.set_caption(\"冒险游戏\")\n```\n\n你可以看到，在输入第一行之后，你需要点击回IDLE Shell继续输入代码；此外，你可以将窗口标题更改为任何你喜欢的内容。"
