  md: '# Formatting Strings


    Interestingly you can reference a list using the string formatting function. You
    need to place an asterisk in front of the list name:


    ```

    numbers=1, 3, 45, 567546, 3425346345

    print("Some numbers: {}, {}, {}, {}, {}".format(*numbers))

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_16_0.png)


    You can also print out the content of a user''s input in the same fashion:


    ```

    name=input("What''s your name? ")

    print("Hello {}.".format(name))

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_16_1.png)


    With indexing in lists, the same applies to calling a list using string formatting.
    You can index each item according to its position (from 0 to however many are
    present):


    ```

    numbers=1, 4, 7, 9

    print("More numbers: {3}, {0}, {2}, {1}.".format(*numbers))

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_16_2.png)


    You can extend this simple code example to display the first letter in a person''s
    entered name:


    ```

    name=input("What''s your name? ")

    print("Hello {}.".format(name))

    lname=list(name)

    print("The first letter of your name is a {0}".format(*lname))

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_16_3.png)


    And as you probably suspect, you can mix strings and integers in a single list
    to be called in the .format function:


    ```

    characters=["Conan", "Belit", "Valeria", 19, 27, 20]

    print ("{0} is {3} years old. Whereas {1} is {4} years old.".format(*characters))

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_16_4.png)


    You can also call upon a pair of lists and reference them individually within
    the same print function. Looking back the code from Step 7, you can alter it with:


    ```

    names=["Conan", "Belit", "Valeria"]

    ages=[25, 21, 22]

    Creating two lists. Now you can call each list, and individual items:

    print("{0[0]} is {1[0]} years old. Whereas {0[1]} is {1[1]} years old.".format(names,
    ages))

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_16_5.png)'
