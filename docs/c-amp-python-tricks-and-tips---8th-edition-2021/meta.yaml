    \ 3有多种包含图形的方式，而且它们的功能强大得令人惊讶。\n\n### 图形化入门\n\n你可以绘制简单的图形、线条、正方形等，或者你可以使用众多可用的Python模块之一，来呈现一些壮观的效果。\n\
    \n**第1步** 开始学习Python图形的最佳图形模块之一是Turtle。顾名思义，Turtle模块基于许多学校使用的海龟机器人，这些机器人可以被编程在地板上的大张纸上绘制东西。可以通过以下命令导入Turtle模块：`import\
