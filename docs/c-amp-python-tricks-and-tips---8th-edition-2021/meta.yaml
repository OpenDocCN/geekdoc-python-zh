    \ 11))\n```\n\n这将返回 1 到 10。\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_70_0.png)\n\
    \n## 大小写敏感\n\nPython 是一种大小写敏感的编程语言，因此你需要检查你赋值的任何变量。例如，`Lives=10` 是一个与 `lives=10`\
