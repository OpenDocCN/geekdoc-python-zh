    可以想象，当需要处理大量元组数据时，这会变得有点混乱。


    第7步 不过，元组利用了一个称为“解包”的特性，即元组中存储的数据项被分配给变量。首先创建一个包含两个项目（姓名和战斗力）的元组：

    `NPC=("Conan", 100)`


