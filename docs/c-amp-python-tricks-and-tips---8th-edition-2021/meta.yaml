    \ definitions, and click File > Save As. Name this minimath.py and save it in\
    \ the same location as the original basic_math.py program. Now close the minimath.py\
    \ window, so the basic_math.py window is left open.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_41_3.png)"
- md: "## Create Your Own Modules\n\nSTEP 6 Back to the basic_math.py window: at the\
    \ top of the code enter:\n\n```\nfrom minimath import *\n```\n\nThis will import\
    \ the function definitions as a module. Press F5 to save and execute the program\
    \ to see it in action.\n\nSTEP 7 You can now use the code further to make the\
    \ program a little more advanced, utilising the newly created module to its full.\
    \ Include some user interaction. Start by creating a basic menu the user can choose\
    \ from:\n\n```\nprint(\"Select operation.\\n\")\nprint(\"1.Times by two\")\nprint(\"\
    2.Times by Three\")\nprint(\"3.Square\")\nprint(\"4.Power of\")\nchoice = input(\"\
    \\nEnter choice (1/2/3/4):\")\n```\n\nSTEP 8 Now we can add the user input to\
    \ get the number the code will work on:\n\n```\nnum1 = int(input(\"\\nEnter number:\
    \ \"))\n```\n\nThis will save the user-entered number as the variable num1.\n\n\
    STEP 9 Finally, you can now create a range of if statements to determine what\
    \ to do with the number and utilise the newly created function definitions:\n\n\
    ```\nif choice == '1':\n    print(timestwo(num1))\nelif choice == '2':\n    print(timesthree(num1))\n\
    elif choice == '3':\n    print(square(num1))\nelif choice == '4':\n    num2 =\
    \ int(input(\"Enter second number: \"))\n    print(power(num1, num2))\nelse:\n\
    \    print(\"Invalid input\")\n```\n\nSTEP 10 Note that for the last available\
    \ options, the Power of choice, we've added a second variable, num2. This passes\
    \ a second number through the function definition called power. Save and execute\
    \ the program to see it in action.\n\n## C++ Input/Output\n\nThere's a satisfying\
    \ feeling when you program code that asks the user for input, then uses that input\
    \ to produce something that the user can see. Even if it's simply asking for someone's\
    \ name, and displaying a personal welcome message, it's a big leap forward.\n\n\
    User interaction, character literals, defining constants and file input and output\
    \ are all covered in the following pages. All of which help you to understand\
    \ how a C++ program works better.\n\n## User Interaction\n\nThere's nothing quite\
    \ as satisfying as creating a program that responds to you. This basic user interaction\
    \ is one of the most taught aspects of any language and with it you're able to\
    \ do much more than simply greet the user by name.\n\n### HELLO, DAVE\n\nYou have\
    \ already used cout, the standard output stream, throughout our code. Now you're\
    \ going to be using cin, the standard input stream, to prompt a user response.\n\
    \nSTEP 1 Anything that you want the user to input into the program needs to be\
    \ stored somewhere in the system memory, so it can be retrieved and used. Therefore,\
    \ any input must first be declared as a variable, so it's ready to be used by\
    \ the user. Start by creating a blank C++ file with headers.\n\nSTEP 2 The data\
    \ type of the variable must also match the type of input you want from the user.\
    \ For example, to ask a user their age, you would use an integer like this:\n\n\
    ```\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    int age;\n\
    \    cout << \"what is your age: \";\n    cin >> age;\n\n    cout <<\"\\nYou are\
    \ \" << age << \" years old.\\n\";\n}\n```\n\nSTEP 3 The cin command works in\
    \ the opposite way from the cout command. With the first cout line you're outputting\
    \ 'What is your age' to the screen, as indicated with the chevrons. Cin uses opposite\
    \ facing chevrons, indicating an input. The input is put into the integer age\
    \ and called up in the second cout command. Build and run the code.\n\nSTEP 4\
    \ If you're asking a question, you need to store the input as a string; to ask\
    \ the user their name, you would use:\n\n```\n#include <iostream>\nusing namespace\
    \ std;\n\nint main ()\n{\n    string name;\n    cout << \"what is your name: \"\
    ;\n    cin >> name;\n\n    cout << \"\\nHello, \" << name << \". I hope you're\
    \ well today?\\n\";\n}\n```\n\nSTEP 5 The principal works the same as the previous\
    \ code. The user's input, their name, is stored in a string, because it contains\
    \ multiple characters, and retrieved in the second cout line. As long as the variable\
    \ 'name' doesn't change, then you can recall it wherever you like in your code.\n\
    \nSTEP 6 You can chain input requests to the user but just make sure you have\
    \ a valid variable to store the input to begin with. Let's assume you want the\
    \ user to enter two whole numbers:\n\n```\n#include <iostream>\nusing namespace\
    \ std;\n\nint main ()\n{\n    int num1, num2;\n\n    cout << \"Enter two whole\
    \ numbers: \";\n    cin >> num1 >> num2;\n\n    cout << \"you entered \" << num1\
    \ << \" and \" << num2 << \"\\n\";\n}\n```\n\nSTEP 7 Likewise, inputted data can\
    \ be manipulated once you have it stored in a variable. For instance, ask the\
    \ user for two numbers and do some maths on them:\n\n```\n#include <iostream>\n\
    using namespace std;\n\nint main ()\n{\n    float num1, num2;\n\n    cout << \"\
    Enter two numbers: \\n\";\n    cin >> num1 >> num2;\n\n    cout << num1 << \"\
    \ + \" << num2 << \" is: \" << num1 + num2 << \"\\n\";\n}\n```\n\nSTEP 8 While\
    \ cin works well for most input tasks, it does have a limitation. Cin always considers\
    \ spaces as a terminator, so it's designed for just single words not multiple\
    \ words. However, getline takes cin as the first argument and the variable as\
    \ the second:\n\n```\n#include <iostream>\nusing namespace std;\n\nint main ()\n\
    {\n    string mystr;\n\n    cout << \"Enter a sentence: \\n\";\n    getline (cin,\
    \ mystr);\n\n    cout << \"Your sentence is: \" << mystr.size() << \" characters\
    \ long.\\n\";\n}\n```\n\nSTEP 9 Build and execute the code, then enter a sentence\
    \ with spaces. When you're done the code reads the number of characters. If you\
    \ remove the getline line and replace it with cin >> mystr and try again, the\
    \ result displays the number of characters up to the first space.\n\nSTEP 10 Getline\
    \ is usually a command that new C++ programmers forget to include. The terminating\
    \ white space is annoying when you can't figure out why your code isn't working.\
    \ In short, it's best to use getline(cin, variable) in future:\n\n```\n#include\
    \ <iostream>\nusing namespace std;\n\nint main ()\n{\n    string name;\n\n   \
    \ cout << \"Enter your full name: \\n\";\n    getline (cin, name);\n\n    cout\
    \ << \"\\nHello, \" << name << \"\\n\";\n}\n```\n\n## Character Literals\n\nIn\
    \ C++ a literal is an object or variable that once defined remains the same throughout\
    \ the code. However, a character literal is defined by a backslash, such as the\
    \ \\n you've been using at the end of a cout statement to signify a new line.\n\
    \n### ESCAPE SEQUENCE\n\nWhen used in something like a cout statement, character\
    \ literals are also called Escape Sequence Codes. They allow you to insert a quote,\
    \ an alert, new line and much more.\n\nSTEP 1 Create a new C++ file and enter\
    \ the relevant headers:\n\n```\n#include <iostream>\nusing namespace std;\nint\
    \ main ()\n{\n}\n```\n\nSTEP 2 You've already experienced the \\n character literal\
    \ placing a new line wherever it's called. The line: **cout << \"Hello\\n\" <<\
    \ \"I'm a C++\\n\" << \"Program\\n\";** outputs three lines of text, each starting\
    \ after the last \\n.\n\n```\n#include <iostream>\nusing namespace std;\nint main\
    \ ()\n{\n    cout << \"Hello\\n\" << \"I'm a C++\\n\" << \"Program\\n\";\n}\n\
    ```\n\nSTEP 3 If you wanted to insert speech quotes inside a cout statement, you\
    \ would have to use a backslash as it already uses quotes:\n\n```\n#include <iostream>\n\
    using namespace std;\nint main ()\n{\n    cout << \"Hello, user. This is how to\
    \ use \\\"quotes\\\".\";\n}\n```\n\nSTEP 4 There's even a character literal that\
    \ can trigger an alarm. In Windows 10, it's the notification sound that chimes\
    \ when you use \\a. Try this code, and turn up your sound.\n\n```\n#include <iostream>\n\
    using namespace std;\nint main ()\n{\n    cout << \"ALARM! \\a\";\n}\n```"
  mdcn: "## 创建你自己的模块\n\n第6步 回到 basic_math.py 窗口：在代码顶部输入：\n\n```\nfrom minimath import\
    \ *\n```\n\n这将把函数定义作为模块导入。按 F5 保存并执行程序，查看其运行效果。\n\n第7步 现在你可以进一步使用代码，使程序更高级一些，充分利用新创建的模块。加入一些用户交互。首先创建一个用户可以选择的基本菜单：\n\
    \n```\nprint(\"Select operation.\\n\")\nprint(\"1.Times by two\")\nprint(\"2.Times\
    \ by Three\")\nprint(\"3.Square\")\nprint(\"4.Power of\")\nchoice = input(\"\\\
    nEnter choice (1/2/3/4):\")\n```\n\n第8步 现在我们可以添加用户输入，获取代码将要处理的数字：\n\n```\nnum1\
    \ = int(input(\"\\nEnter number: \"))\n```\n\n这将把用户输入的数字保存为变量 num1。\n\n第9步 最后，你现在可以创建一系列\
    \ if 语句，来决定如何处理这个数字，并利用新创建的函数定义：\n\n```\nif choice == '1':\n    print(timestwo(num1))\n\
    elif choice == '2':\n    print(timesthree(num1))\nelif choice == '3':\n    print(square(num1))\n\
    elif choice == '4':\n    num2 = int(input(\"Enter second number: \"))\n    print(power(num1,\
    \ num2))\nelse:\n    print(\"Invalid input\")\n```\n\n第10步 注意，对于最后一个可用选项“Power\
    \ of”，我们添加了第二个变量 num2。这将第二个数字传递给名为 power 的函数定义。保存并执行程序，查看其运行效果。\n\n## C++ 输入/输出\n\
    \n当你编写代码，要求用户输入，然后利用该输入生成用户可见的内容时，会有一种满足感。即使只是询问某人的名字并显示个性化的欢迎信息，这也是一个巨大的进步。\n\
    \n用户交互、字符字面量、定义常量以及文件输入和输出都将在接下来的页面中介绍。所有这些都将帮助你更好地理解 C++ 程序的工作原理。\n\n## 用户交互\n\
    \n没有什么比创建一个能响应你的程序更令人满足的了。这种基本的用户交互是任何语言教学中最常讲授的方面之一，掌握了它，你能做的远不止简单地按名字问候用户。\n\
    \n### 你好，戴夫\n\n你已经在我们的代码中使用了 `cout`，即标准输出流。现在你将使用 `cin`，即标准输入流，来提示用户响应。\n\n第1步\
    \ 任何你希望用户输入到程序中的内容都需要存储在系统内存的某个地方，以便检索和使用。因此，任何输入都必须首先声明为一个变量，以便用户可以使用它。首先创建一个带有头文件的空白\
    \ C++ 文件。\n\n第2步 变量的数据类型也必须与你希望从用户那里获得的输入类型相匹配。例如，要询问用户的年龄，你可以使用一个整数，如下所示：\n\n\
    ```\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    int age;\n\
    \    cout << \"what is your age: \";\n    cin >> age;\n\n    cout <<\"\\nYou are\
    \ \" << age << \" years old.\\n\";\n}\n```\n\n第3步 `cin` 命令的工作方式与 `cout` 命令相反。在第一个\
    \ `cout` 行中，你正在向屏幕输出“what is your age”，如尖括号所示。`cin` 使用相反方向的尖括号，表示输入。输入被放入整数 `age`\
    \ 中，并在第二个 `cout` 命令中调用。构建并运行代码。\n\n第4步 如果你在提问，你需要将输入存储为字符串；要询问用户的名字，你可以使用：\n\n\
    ```\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    string name;\n\
    \    cout << \"what is your name: \";\n    cin >> name;\n\n    cout << \"\\nHello,\
    \ \" << name << \". I hope you're well today?\\n\";\n}\n```\n\n第5步 原理与前面的代码相同。用户的输入，他们的名字，被存储在一个字符串中，因为它包含多个字符，并在第二个\
    \ `cout` 行中检索。只要变量“name”没有改变，你就可以在代码中的任何地方调用它。\n\n第6步 你可以链接对用户的输入请求，但要确保你有一个有效的变量来存储输入。假设你希望用户输入两个整数：\n\
    \n```\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    int num1,\
    \ num2;\n\n    cout << \"Enter two whole numbers: \";\n    cin >> num1 >> num2;\n\
    \n    cout << \"you entered \" << num1 << \" and \" << num2 << \"\\n\";\n}\n```\n\
    \n第7步 同样，一旦你将输入数据存储在变量中，就可以对其进行操作。例如，要求用户输入两个数字并对它们进行一些数学运算：\n\n```\n#include\
    \ <iostream>\nusing namespace std;\n\nint main ()\n{\n    float num1, num2;\n\n\
    \    cout << \"Enter two numbers: \\n\";\n    cin >> num1 >> num2;\n\n    cout\
    \ << num1 << \" + \" << num2 << \" is: \" << num1 + num2 << \"\\n\";\n}\n```\n\
    \n第8步 虽然 `cin` 对于大多数输入任务都很好用，但它确实有一个局限性。`cin` 总是将空格视为终止符，因此它设计用于单个单词而不是多个单词。然而，`getline`\
    \ 以 `cin` 作为第一个参数，变量作为第二个参数：\n\n```\n#include <iostream>\nusing namespace std;\n\
    \nint main ()\n{\n    string mystr;\n\n    cout << \"Enter a sentence: \\n\";\n\
    \    getline (cin, mystr);\n\n    cout << \"Your sentence is: \" << mystr.size()\
    \ << \" characters long.\\n\";\n}\n```\n\n第9步 构建并执行代码，然后输入一个带空格的句子。完成后，代码会读取字符数。如果你删除\
    \ `getline` 行并将其替换为 `cin >> mystr` 再试一次，结果显示的是到第一个空格为止的字符数。\n\n第10步 `getline`\
    \ 通常是新 C++ 程序员忘记包含的命令。当你无法弄清楚代码为什么不工作时，终止的空白符会很烦人。简而言之，最好在将来使用 `getline(cin, variable)`：\n\
    \n```\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    string\
    \ name;\n\n    cout << \"Enter your full name: \\n\";\n    getline (cin, name);\n\
    \n    cout << \"\\nHello, \" << name << \"\\n\";\n}\n```\n\n## 字符字面量\n\n在 C++\
    \ 中，字面量是一个一旦定义在整个代码中保持不变的对象或变量。然而，字符字面量由反斜杠定义，例如你一直在 `cout` 语句末尾使用的 `\\n`，表示换行。\n\
    \n### 转义序列\n\n当在 `cout` 语句之类的东西中使用时，字符字面量也称为转义序列代码。它们允许你插入引号、警报、换行符等等。\n\n第1步\
    \ 创建一个新的 C++ 文件并输入相关的头文件：\n\n```\n#include <iostream>\nusing namespace std;\n\
    int main ()\n{\n}\n```\n\n第2步 你已经体验过 `\\n` 字符字面量在调用处放置换行符。行：**cout << \"Hello\\\
    n\" << \"I'm a C++\\n\" << \"Program\\n\";** 输出三行文本，每行从最后一个 `\\n` 之后开始。\n\n```\n\
    #include <iostream>\nusing namespace std;\nint main ()\n{\n    cout << \"Hello\\\
    n\" << \"I'm a C++\\n\" << \"Program\\n\";\n}\n```\n\n第3步 如果你想在 `cout` 语句中插入语音引号，你必须使用反斜杠，因为它已经使用了引号：\n\
    \n```\n#include <iostream>\nusing namespace std;\nint main ()\n{\n    cout <<\
    \ \"Hello, user. This is how to use \\\"quotes\\\".\";\n}\n```\n\n第4步 甚至有一个字符字面量可以触发警报。在\
    \ Windows 10 中，当你使用 `\\a` 时，它是通知声音会响起。尝试这段代码，并调高音量。\n\n```\n#include <iostream>\n\
    using namespace std;\nint main ()\n{\n    cout << \"ALARM! \\a\";\n}\n```"
