    \ of\")\nchoice = input(\"\\nEnter choice (1/2/3/4):\")\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_42_1.png)\n\
    \n![](img/893ff1cb7ac32885c7c794a5e648f755_42_2.png)\n\nSTEP 8 Now we can add\
