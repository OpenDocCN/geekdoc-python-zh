    \ Enter this example:\n\n```\nfrom turtle import *\ncolor('red', 'yellow')\nbegin_fill()\n\
    while True:\n    forward(200)\n    left(170)\n    if abs(pos()) < 1:\n       \
    \ break\nend_fill()\ndone()\n```\n\nIt's a different method, but very effective.\n\
    \n**STEP 7** Another way in which you can display graphics is by using the Pygame\
