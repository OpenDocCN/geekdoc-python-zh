  md: "# Exceptions\n\nSTEP 5 For example, use the divide by zero error. You can create\
    \ an exception where the code can handle the error without Python quitting due\
    \ to the problem:\n\n```\ntry:\n    a=int(input(\"Enter the first number: \"))\n\
    \    b=int(input(\"Enter the second number: \"))\n    print(a/b)\nexcept ZeroDivisionError:\n\
    \    print(\"You have tried to divide by zero!\")\nelse:\n    print(\"You didn't\
    \ divide by zero. Well done!\")\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_24_0.png)\n\
    \nSTEP 8 Naturally, you can quickly fix the issue by changing the \"r\" read only\
    \ instance with a \"w\" for write. This, as you already know, will create the\
    \ file and write the content then commit the changes to the file. The end result\
    \ will report a different set of circumstances, in this case, a successful execution\
    \ of the code.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_24_1.png)\n\nSTEP 6\
    \ You can use exceptions to handle a variety of useful tasks. Using an example\
    \ from our previous tutorials, let's assume you want to open a file and write\
    \ to it:\n\n```\ntry:\n    txt = open(\"/home/pi/Documents/textfile.txt\", \"\
    r\")\n    txt.write(\"This is a test. Normal service will shortly resume!\")\n\
    except IOError:\n    print (\"Error: unable to write the file. Check permissions\"\
    )\nelse:\n    print (\"Content written to file successfully. Have a nice day.\"\
    )\n    txt.close()\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_24_2.png)\n\
    \nSTEP 9 You can also use a finally: block, which works in a similar fashion but\
    \ you can't use else with it. To use our example from Step 6:\n\n```\ntry:\n \
    \   txt = open(\"/home/pi/Documents/textfile.txt\", \"r\")\n    try:\n       \
    \ txt.write(\"This is a test. Normal service will shortly resume!\")\n    finally:\n\
    \        print (\"Content written to file successfully. Have a nice day.\")\n\
    \        txt.close()\nexcept IOError:\n    print (\"Error: unable to write the\
    \ file. Check permissions\")\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_24_3.png)\n\
    \nSTEP 7 Obviously this won't work due to the file textfile.txt being opened as\
    \ read only (the \"r\" part). So in this case rather than Python telling you that\
    \ you're doing something wrong, you've created an exception using the IOError\
    \ class informing the user that the permissions are incorrect.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_24_4.png)\n\
    \nSTEP 10 As before an error will occur as you've used the \"r\" read-only permission.\
    \ If you change it to a \"w\", then the code will execute without the error being\
    \ displayed in the IDLE Shell. Needless to say, it can be a tricky getting the\
    \ exception code right the first time. Practise though, and you will get the hang\
    \ of it.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_24_5.png)"
