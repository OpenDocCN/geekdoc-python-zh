  md: "# Calendar Module\n\nSTEP 5 You can also create a program that will display\
    \ all the days, weeks and months within a given year:\n\n```\nimport calendar\n\
    year=int(input(\"Enter the year to display: \"))\nprint(calendar.prcal(year))\n\
    ```\n\nWe're sure you'll agree that's quite a handy bit of code to have to hand.\n\
    \n![](img/893ff1cb7ac32885c7c794a5e648f755_30_0.png)\n\nSTEP 8 You're also able\
    \ to print the individual months or days of the week:\n\n```\nimport calendar\n\
    for name in calendar.month_name:\n    print(name)\n\nimport calendar\nfor name\
    \ in calendar.day_name:\n    print(name)\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_30_1.png)\n\
    \nSTEP 6 Interestingly we can also list the number of days in a month by using\
    \ a simple for loop:\n\n```\nimport calendar\ncal=calendar.TextCalendar(calendar.SUNDAY)\n\
    for i in cal.itermonthdays(2018, 6):\n    print(i)\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_30_2.png)\n\
    \nSTEP 9 The calendar module also allows us to write the functions in HTML, so\
    \ that you can display it on a website. Let's start by creating a new file:\n\n\
    ```\nimport calendar\ncal=open(\"/home/pi/Documents/cal.html\", \"w\")\nc=calendar.HTMLCalendar(calendar.SUNDAY)\n\
    cal.write(c.formatmonth(2018, 1))\ncal.close()\n```\n\nThis code will create an\
    \ HTML file called cal, open it with a browser and it displays the calendar for\
    \ January 2018.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_30_3.png)\n\nSTEP\
    \ 7 You can see that code produced some zeros at the beginning, this is due to\
    \ the starting day of the week, Sunday in this case, and overlapping days from\
    \ the previous month. So the counting of the days will start on Friday 1st June\
    \ 2018 and will total 30 as the output correctly displays.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_30_4.png)\n\
    \nSTEP 10 Of course, you can modify that to display a given year as a web page\
    \ calendar:\n\n```\nimport calendar\nyear=int(input(\"Enter the year to display\
    \ as a webpage: \"))\ncal=open(\"/home/pi/Documents/cal.html\", \"w\")\ncal.write(calendar.HTMLCalendar(calendar.MONDAY).formatyear(year))\n\
    cal.close()\n```\n\nThis code asks the user for a year, then creates the necessary\
    \ webpage. Remember to change your file destination.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_30_5.png)"
