    \ or (len(self.missed_letters) == 6)\n\n    def hangman_won(self):\n        if\
    \ '_' not in self.hide_word():\n            return True\n        return False\n\
    \n    def hide_word(self):\n        rtn = ''\n        for letter in self.word:\n\
    \            if letter not in self.guessed_letters:\n                rtn += '_'\n\
    \            else:\n                rtn += letter\n        return rtn\n```\n\n\
    ## OPERATORS\n\nUsing the wrong operator is also a common mistake to make. When\
    \ you're performing a comparison between two values, for example, you need to\
    \ use the equality operator (a double equals, `==`). Using a single equal (`=`)\
    \ is an assignment operator that places a value to a variable (such as, `lives=10`).\n\
    \n```python\n1 b = 5\n2 c = 10\n3 d = 10\n4 b == c #false because 5 is not equal\
    \ to 10\n5 c == d #true because 10 is equal to 10\n```\n\n## OPERATING SYSTEMS\n\
    \nWriting code for multiple platforms is difficult, especially when you start\
    \ to utilise the external commands of the operating system. For example, if your\
    \ code calls for the screen to be cleared, then for Windows you would use `cls`.\
    \ Whereas, for Linux you need to use `clear`. You need to solve this by capturing\
    \ the error and issuing it with an alternative command.\n\n```python\n# Code to\
    \ detect error for using a different OS\nrun=1\nwhile(run==1):\n    try:\n   \
    \     os.system('clear')\n    except OSError:\n        os.system('cls')\n    print('\\\
    n>>>>>>>>>Python 3 File Manager<<<<<<<<<<<\\n')\n```\n\n## Beginner C++ Mistakes\n\
    \nThere are many pitfalls the C++ developer can encounter, especially as this\
    \ is a more complex and often unforgiving language to master. Beginners need to\
    \ take C++ a step at a time and digest what they've learned before moving on.\n\
    \n## VOID(C++, MISTAKES)\n\nAdmittedly it's not just C++ beginners that make the\
    \ kinds of errors we outline on these pages, even hardened coders are prone to\
    \ the odd mishap here and there. Here are some common issues to try and avoid.\n\
    \n## UNDECLARED IDENTIFIERS\n\nA common C++ mistake, and to be honest a common\
    \ mistake with most programming languages, is when you try and output a variable\
    \ that doesn't exist. Displaying the value of x on-screen is fine but not if you\
    \ haven't told the compiler what the value of x is to begin with.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_71_0.png)\n\
    \n## STD NAMESPACE\n\nReferencing the Standard Library is common for beginners\
    \ throughout their code, but if you miss the std:: element of a statement, your\
    \ code errors out when compiling. You can combat this by adding:\n\n```cpp\nusing\
    \ namespace std;\n```\n\nUnder the #include part and simply using cout, cin and\
    \ so on from then on.\n\n```cpp\n#include <iostream>\nusing namespace std;\n\n\
    int main()\n{\n    int a, b, c, d;\n    a=10;\n    b=20;\n    c=30;\n    d=40;\n\
    \n    cout << a, b, c, d;\n}\n```\n\n## SEMICOLONS\n\nRemember that each line\
    \ of a C++ program must end with a semicolon. If it doesn't then the compiler\
    \ treats the line with the missing semicolon as the same line with the next semicolon\
    \ on. This creates all manner of problems when trying to compile, so don't forget\
    \ those semicolons.\n\n```cpp\n#include <iostream>\n\nint main()\n{\n    int a,\
    \ b, c, d;\n    a=10;\n    b=20;\n    c=30\n    d=40;\n\n    std::cout << a, b,\
    \ c, d;\n}\n```\n\n## GCC OR G++\n\nIf you're compiling in Linux then you will\
    \ no doubt come across gcc and g++. In short, gcc is the Gnu Compiler Collection\
    \ (or Gnu C Compiler as it used to be called) and g++ is the Gnu ++ (the C++ version)\
    \ of the compiler. If you're compiling C++ then you need to use g++, as the incorrect\
    \ compiler drivers will be used.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_71_1.png)"
  mdcn: "## Python 初学者常见错误\n\nPython 是一门相对容易上手的语言，初学者有充足的空间来培养自己的编程能力。然而，与任何其他编程语言一样，很容易犯一些常见错误，导致代码无法运行。\n\
    \n## DEF BEGINNER(MISTAKES=10)\n\n以下是大多数初学者常犯的十个 Python 编程错误。能够识别这些错误将为你未来省去不少麻烦。\n\
    \n## 版本\n\n为了增加大多数初学者在接触编程时已经面临的困惑，Python 有两个可用的在线版本供下载和使用。有 Python 2.7.x 版本和\
