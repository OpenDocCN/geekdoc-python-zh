  - "[PAGE 48]\n\n# A HANDY CHART\n\nThere are numerous character literals, or escape\
    \ sequence codes, to choose from. We therefore thought it would be good for you\
    \ to have a handy chart available, for those times when you need to insert a code.\n\
    \n| ESCAPE SEQUENCE CODE | CHARACTER |\n|---|---|\n| \\ | Backslash |\n| \\' |\
    \ Single Quote |\n| \" | Double Quote (Speech Marks) |\n| \\? | Question Mark\
    \ |\n| \\a | Alert/Alarm |\n| \\b | Backspace |\n| \\f | Form Feed |\n| \\n |\
    \ New Line |\n| \\r | Carriage Return |\n| \\t | Horizontal Tab |\n| \\v | Vertical\
    \ Tab |\n| \\0 | Null Character |\n| \\uxxxx | Unicode (UTF-8) |\n| \\Uxxxxxxxx\
    \ | Unicode (UTF-16) |\n\n# UNICODE CHARACTERS (UTF-8)\n\nUnicode characters are\
    \ symbols or characters that are standard across all platforms. For example, the\
    \ copyright symbol, that can be entered via the keyboard by entering the Unicode\
    \ code, followed by ALT+X. In the case of the copyright symbol enter: 00A9 Alt+X.\
    \ In C++ code, you would enter:\n\n```\n#include <iostream>\nusing namespace std;\n\
    int main ()\n{\n    cout << \"\\u00A9\";\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_48_0.png)\n\
    \n# UNICODE CHARACTER TABLE\n\nA complete list of the available Unicode characters\
    \ can be found at www.unicode-table.com/en/. Hover your mouse over the character\
    \ to see its unique code to enter in C++.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_48_1.png)"
  - "[PAGE 49]\n\n# Defining Constants\n\nConstants are fixed values in your code.\
    \ They can be any basic data type but as the name suggests their value remains\
    \ constant throughout the entire code. There are two separate ways to define a\
    \ constant in C++, the #define pre-processor and const.\n\n# #DEFINE\n\nThe pre-processors\
    \ are instructions to the compiler to pre-process the information before it goes\
    \ ahead and compiles the code. #include is a pre-processor as is #define.\n\n\
    STEP 1 You can use the #define pre-processor to define any constants you want\
    \ in our code. Start by creating a new C++ file complete with the usual headers:\n\
    \n```\n#include <iostream>\nusing namespace std;\nint main ()\n{\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_49_0.png)\n\
    \nSTEP 3 Note the capitals for defined constants, it's considered good programming\
    \ practise to define all constants in capitals. Here, the assigned values are\
    \ 50, 40 and 60, so let's call them up:\n\n```\n#include <iostream>\nusing namespace\
    \ std;\n#define LENGTH 50\n#define WIDTH 40\n#define HEIGHT 60\nint main ()\n\
    {\n    cout << \"Length is: \" << LENGTH << \"\\n\";\n    cout << \"Width is:\
    \ \" << WIDTH << \"\\n\";\n    cout << \"Height is: \" << HEIGHT << \"\\n\";\n\
    }\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_49_1.png)\n\nSTEP 2 Now let's\
    \ assume your code has three different constants: length, width and height. You\
    \ can define them with:\n\n```\n#include <iostream>\nusing namespace std;\n#define\
    \ LENGTH 50\n#define WIDTH 40\n#define HEIGHT 60\nint main ()\n{\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_49_2.png)\n\
    \nSTEP 4 Build and run the code. Just as expected, it displays the values for\
    \ each of the constants created. It's worth noting that you don't need a semicolon\
    \ when you're defining a constant with the #define keyword.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_49_3.png)"
  - "[PAGE 50]\n\n# Defining Constants\n\nSTEP 5 You can also define other elements\
    \ as a constant. For example, instead of using \\n for a newline in the cout statement,\
    \ you can define it at the start of the code:\n\n```\n#include <iostream>\nusing\
    \ namespace std;\n\n#define LENGTH 50\n#define WIDTH 40\n#define HEIGHT 60\n#define\
    \ NEWLINE '\\n'\n\nint main ()\n{\n    cout << \"Length is: \" << LENGTH << NEWLINE;\n\
    \    cout << \"Width is: \" << WIDTH << NEWLINE;\n    cout << \"Height is: \"\
    \ << HEIGHT << NEWLINE;\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_50_0.png)\n\
    \nSTEP 6 The code, when built and executed, does exactly the same as before, using\
    \ the new constant NEWLINE to insert a newline in the cout statement. Incidentally,\
    \ creating a newline constant isn't a good idea unless you're making it smaller\
    \ than \\n or even the endl command.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_50_1.png)\n\
    \nSTEP 7 Defining a constant is a good way of initialising your base values at\
    \ the start of your code. You can define that your game has three lives, or even\
    \ the value of PI without having to call up the C++ math library:\n\n```\n#include\
    \ <iostream>\nusing namespace std;\n\n#define PI 3.14159\n\nint main ()\n{\n \
    \   cout << \"The value of Pi is: \" << PI << endl;\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_50_2.png)\n\
    \nSTEP 8 Another method of defining a constant is with the const keyword. Use\
    \ const together with a data type, variable and value: const type variable = value.\
    \ Using Pi as an example:\n\n```\n#include <iostream>\nusing namespace std;\n\n\
    int main ()\n{\n    const double PI = 3.14159;\n    cout << \"The value of Pi\
    \ is: \" << PI << endl;\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_50_3.png)\n\
    \nSTEP 9 Because you're using const within the main block of code, you need to\
    \ finish the line with a semicolon. You can use either, as long as the names and\
    \ values don't clash, but it's worth mentioning that #define requires no memory,\
    \ so if you're coding to a set amount of memory, #define is your best bet.\n\n\
    ![](img/893ff1cb7ac32885c7c794a5e648f755_50_4.png)\n\nSTEP 10 Const works in much\
    \ the same way as #define. You can create static integers and even newlines:\n\
    \n```\n#include <iostream>\nusing namespace std;\n\nint main()\n{\n    const int\
    \ LENGTH = 50;\n    const int WIDTH = 40;\n    const char NEWLINE = '\\n';\n\n\
    \    int area;\n    area = LENGTH * WIDTH;\n\n    cout << \"Area is: \" << area\
    \ << NEWLINE;\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_50_5.png)"
  - "[PAGE 51]\n\n# File Input/Output\n\nThe standard iostream library provides C++\
    \ coders with the cin and cout input and output functionality. However, to be\
    \ able to read and write from a file you need to utilise another C++ library,\
    \ called fstream.\n\n# FSTREAMS\n\nThere are two main data types within the fstream\
    \ library that are used to open a file, read from it and write to it, ofstream\
    \ and ifstream. Here’s how they work.\n\nSTEP 1 The first task is to create a\
    \ new C++ file and along with the usual headers you need to include the new fstream\
    \ header:\n\n```\n#include <iostream>\n#include <fstream>\nUsing namespace std;\n\
    int main ()\n{\n\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_51_0.png)\n\
    \nSTEP 3 We’ve included comments in the screenshot of step 2 to help you understand\
    \ the process. You created a string called name, to store the user’s inputted\
    \ name. You also created a text file called name.txt (with the ofstream newfile\
    \ and newfile.open lines), asked the user for their name and stored it and then\
    \ written the data to the file.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_51_1.png)\n\
    \nSTEP 2 Begin by asking a user for their name and writing that information to\
    \ a file. You need the usual string to store the name, and getline to accept the\
    \ input from the user.\n\n```\n#include <iostream>\n#include <fstream>\nusing\
    \ namespace std;\nint main ()\n{\n    string name;\n    ofstream newfile;\n  \
    \  newfile.open(\"name.txt\");\n    cout << \"Enter your name: \" << endl;\n \
    \   getline(cin, name);\n    newfile << name << endl;\n    newfile.close();\n\
    }\n```\n\nSTEP 4 To read the contents of a file, and output it to the screen,\
    \ you need to do things slightly differently. First you need to create a string\
    \ variable to store the file’s contents (line by line), then open the file, use\
    \ getline to read the file line by line and output those lines to the screen.\
    \ Finally, close the file.\n\n```\nstring line;\nifstream newfile (\"name.txt\"\
    );\ncout << \"Contents of the file: \" << endl;\ngetline(newfile, line);\ncout\
    \ << line << endl;\nnewfile.close();\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_51_2.png)"
  - "[PAGE 52]\n\n# File Input/Output\n\nSTEP 5 The code above is great for opening\
    \ a file with one or two lines but what if there are multiple lines? Here we opened\
    \ a text file of the poem Cimmeria, by Robert E Howard:\n\n```\nstring line;\n\
    ifstream newfile (\"c:\\users\\david\\Documents\\Cimmeria.txt\");\ncout << \"\
    Cimmeria, by Robert E Howard: \\n\" << endl;\nwhile (getline(newfile, line))\n\
    \    cout << line << endl;\nnewfile.close();\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_52_0.png)\n\
    \nSTEP 8 Just as you might expect, you can write almost anything you like to a\
    \ file, for reading either in Notepad or via the console through the C++ code:\n\
    \n```\nstring name;\nint age;\nofstream newfile;\nnewfile.open(\"name.txt\");\n\
    cout << \"Enter your name: \" << endl;\ngetline(cin, name);\nnewfile << name <<\
    \ endl;\ncout << \"\\nHow old are you: \" << endl;\ncin >> age;\nnewfile << age\
    \ << endl;\nnewfile.close();\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_52_1.png)\n\
    \nSTEP 6 You can no doubt see that we've included a while loop, which we cover\
    \ in a few pages time. It means that while there are lines to be read from the\
    \ text file, C++ getlines them. Once all the lines are read, the output is displayed\
    \ on the screen and the file is closed.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_52_2.png)\n\
    \nSTEP 9 The code from step 8 differs again, but only where it comes to adding\
    \ the age integer. Notice that we used cin >> age, instead of the previous getline(cin,\
    \ variable). The reason for this is that the getline function handles strings,\
    \ not integers; so when you're using a data type other than a string, use the\
    \ standard cin.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_52_3.png)\n\nSTEP\
    \ 7 You can also see that the location of the text file Cimmeria.txt isn't in\
    \ the same folder as the C++ program. When we created the first name.txt file,\
    \ it was written to the same folder where the code was located; this is done by\
    \ default. To specify another folder, you need to use double-back slashes, as\
    \ per the character literals/escape sequence code.\n\n```\nstring line;\nifstream\
    \ newfile (\"c:\\users\\david\\Documents\\Cimmeria.txt\");\ncout << \"Cimmeria,\
    \ by Robert E Howard: \\n\" << endl;\n```\n\nSTEP 10 Here's an exercise: see if\
    \ you can create code to write several different elements to a text file. You\
    \ can have a user's name, age, phone number etc. Maybe even the value of Pi and\
    \ various mathematical elements. It's all good practice.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_52_4.png)"
- md: "## Loops and Decision Making\n\nLoops and repetition are one of the most important\
    \ factors of any programming language. Good use of a loop creates a program that\
    \ does exactly what you want it to and delivers the desired outcome without issues\
    \ or errors.\n\nWithout loops and decision making events within the code, your\
    \ program will never be able to offer the user any choice. It’s this understanding\
    \ of choice that elevates your skills as a programmer and makes for much better\
    \ code.\n\n## While Loop\n\nA while loop’s function is to repeat a statement,\
    \ or a group of statements, while a certain condition remains true. When the while\
    \ loop starts, it initialises itself by testing the condition of the loop and\
    \ the statements within, before executing the rest of the loop.\n\n### TRUE OR\
    \ FALSE?\n\nWhile loops are one of the most popular form of C++ code looping.\
    \ They repeatedly run the code contained within the loop while the condition is\
    \ true. Once it proves false, the code continues as normal.\n\nSTEP 1 Clear what\
    \ you’ve done so far and create a new C++ file. There’s no need for any extra\
    \ headers at the moment, so add the standard headers as per usual:\n\n```\n#include\
    \ <iostream>\nusing namespace std;\nint main ()\n{\n}\n```\n\nSTEP 3 First you\
    \ need to create a condition, so use a variable called num and give it the value\
    \ 1. Now create the while loop, stating that as long as num is less than 30, the\
    \ loop is true. Within the loop the value of num is displayed and adds 1 until\
    \ it’s more than 30.\n\nSTEP 2 Create a simple while loop. Enter the code below,\
    \ build and run (we’ve added comments to the screen shot):\n\n```\n{\n    int\
    \ num = 1;\n    while (num < 30 )\n    {\n        cout << \"Number: \" << num\
    \ << endl;\n        num = num +1;\n    }\n    return 0;\n}\n```\n\nSTEP 4 We’re\
    \ introducing a few new elements here. The first are the opening and closing braces\
    \ for the while loop. This is because our loop is a compound statement, meaning\
    \ a group of statements; note also, there’s no semicolon after the while statement.\
    \ You now also have return 0, which is a clean and preferred way of ending the\
    \ code.\n\nSTEP 5 If you didn’t need to see the continually increasing value of\
    \ num, you could have done away with the compound while statement and instead\
    \ just added num by itself until it reached 30, and then displayed the value:\n\
    \n```\n{\n    int num = 1;\n    while (num < 30 )\n        num++;\n    cout <<\
    \ \"Number: \" << num << endl;\n    return 0;\n}\n```\n\nSTEP 6 It's important\
    \ to remember not to add a semicolon at the end of a while statement. Why? Well,\
    \ as you know, the semicolon represents the end of a C++ line of code. If you\
    \ place one at the end of a while statement, your loop will be permanently stuck\
    \ until you close the program.\n\nSTEP 7 In our example, if we were to execute\
    \ the code the value of num would be 1, as set by the int statement. When the\
    \ code hits the while statement it reads that while the condition of 1 being less\
    \ than 30 is true, loop. The semicolon closes the line, so the loop repeats; but\
    \ it never adds 1 to num, as it won't continue through the compound statement.\n\
    \nSTEP 8 You can manipulate the while statement to display different results depending\
    \ on what code lies within the loop. For example, to read the poem, Cimmeria,\
    \ word by word, you would enter:\n\n```\n#include <iostream>\n#include <fstream>\n\
    using namespace std;\n\nint main ()\n{\n    string word;\n    ifstream newfile\
    \ (\"C:\\users\\david\\Documents\\Cimmeria.txt\");\n\n    cout << \"Cimmeria,\
    \ by Robert E Howard: \\n\" << endl;\n\n    while (newfile >> word)\n    {\n \
    \       cout << word << endl;\n    }\n\n    return 0;\n}\n```\n\nSTEP 9 You can\
    \ further expand the code to enable each word of the poem to appear every second.\
    \ To do so, you need to pull in a new library, <windows.h>. This is a Windows\
    \ only library and within it you can use the Sleep() function:\n\n```\n#include\
    \ <iostream>\n#include <fstream>\n#include <windows.h>\nusing namespace std;\n\
    \nint main ()\n{\n    string word;\n    ifstream newfile (\"C:\\users\\david\\\
    Documents\\Cimmeria.txt\");\n\n    cout << \"Cimmeria, by Robert E Howard: \\\
    n\" << endl;\n\n    while (newfile >> word)\n    {\n        cout << word << endl;\n\
    \        Sleep(1000);\n    }\n\n    return 0;\n}\n```\n\nSTEP 10 Sleep() works\
    \ in milliseconds, so Sleep(1000) is one second, Sleep(10000) is ten seconds and\
    \ so on. Combining the sleep function (along with the header it needs) and a while\
    \ loop enables you to come up with some interesting countdown code.\n\n```\n#include\
    \ <iostream>\n#include <windows.h>\nusing namespace std;\n\nint main ()\n{\n \
    \   int a = 10;\n\n    while (a != 0)\n    {\n        cout << a << endl;\n   \
    \     a = a - 1;\n        Sleep(1000);\n    }\n\n    cout << \"\\nBlast Off!\"\
    \ << endl;\n\n    return 0;\n}\n```\n\n## For Loop\n\nIn some respects, a for\
    \ loop works in a very similar way to that of a while loop, although it’s structure\
    \ is different. A for loop is split into three stages: an initialiser, a condition\
    \ and an incremental step. Once set up, the loop repeats itself until the condition\
    \ becomes false.\n\n### LOOPY LOOPS\n\nThe initialise stage of a for loop is executed\
    \ only once and this sets the point reference for the loop. The condition is evaluated\
    \ by the loop to see if it’s true or false and then the increment is executed.\
    \ The loop then repeats the second and third stage.\n\nSTEP 1 Create a new C++\
    \ file, with the standard headers:\n\n```\n#include <iostream>\nusing namespace\
    \ std;\nint main ()\n{\n}\n```\n\nSTEP 4 After the loop, you created a compound\
    \ statement in braces (curly brackets), that displays the current value of the\
    \ integer num. Every time the for loop repeats itself, the second and third stages\
    \ of the loop, it adds 1 until the condition <30 is false. The loop then ends\
    \ and the code continues, ending neatly with return 0.\n\n```\n{\n    //For Loop\
    \ Begins\n    for( int num = 1; num < 30; num = num +1 )\n    {\n        cout\
    \ << \"Number: \" << num << endl;\n    }\n\n    return 0;\n}\n```\n\nSTEP 2 Start\
    \ simple and create a for loop that counts from 1 to 30, displaying the value\
    \ to the screen with each increment:\n\n```\n{\n    //For Loop Begins\n    for(\
    \ int num = 1; num < 30; num = num +1 )\n    {\n        cout << \"Number: \" <<\
    \ num << endl;\n    }\n\n    return 0;\n}\n```\n\nSTEP 5 A for loop is quite a\
    \ neat package in C++, all contained within its own brackets, while the other\
    \ elements outside of the loop are displayed below. If you want to create a 10-second\
    \ countdown, you could use:\n\n```\n#include <iostream>\n#include <windows.h>\n\
    using namespace std;\nint main ()\n{\n    //For Loop Begins\n    for( int a =\
    \ 10; a != 0; a = a -1 )\n    {\n        cout << a << endl;\n        Sleep(1000);\n\
    \    }\n\n    cout << \"\\nBlast Off!\" << endl;\n\n    return 0;\n}\n```\n\n\
    STEP 3 Working through the process of the for loop, begin by creating an integer\
    \ called num and assigning it a value of 1. Next, set the condition, in this case\
    \ num being less than 30. The last stage is where you create the increments; here\
    \ it’s the value of num being added by 1.\n\n```\n{\n    //For Loop Begins\n \
    \   for( int num = 1; num < 30; num = num +1 )\n}\n```\n\nSTEP 6 With the countdown\
    \ code, don't forget to include the windows.h library, so you can use the Sleep\
    \ command. Build and run the code; in the command console you can see the numbers\
    \ 10 to 1 countdown in one second increments, until it reaches zero and Blast\
    \ Off! appears.\n\nSTEP 7 Naturally you can include a lot more content into a\
    \ for loop, including some user input:\n\n```cpp\nint i, n, fact = 1;\n\ncout\
    \ << \"Enter a whole number: \";\ncin >> n;\n\nfor (i = 1; i <= n; ++i) {\n  \
    \  fact *= i;\n}\n\ncout<< \"\\nFactorial of \"<< n <<\" = \"<< fact << endl;\n\
    \nreturn 0;\n```\n\nSTEP 8 The code from step 7, when built and run, asks for\
    \ a number, then displays the factorial of that number through the for loop. The\
    \ user's number is stored in the integer n, followed by the integer i which is\
    \ used to check if the condition is true or false, adding 1 each time and comparing\
    \ it to the user's number, n.\n\nSTEP 9 Here's an example of a for loop displaying\
    \ the multiplication tables of a user inputted number. Handy for students:\n\n\
    ```cpp\n{\n    int n;\n\n    cout << \"Enter a number to view its times table:\
    \ \";\n    cin >> n;\n\n    for (int i = 1; i <= 12; ++i) {\n        cout << n\
    \ << \" x \" << i << \" = \" << n * i << endl;\n    }\n\n    return 0;\n}\n```\n\
    \nSTEP 10 The value of the integer i can be expanded from 12 to whatever number\
    \ you want, displaying a very large multiplication table in the process (or a\
    \ small one). Of course the data type within a for loop doesn't have to be an\
    \ integer; as long as it's valid, it works.\n\n```cpp\nfor ( float i = 0.00; i\
    \ < 1.00; i += 0.01)\n{\n    cout << i << endl;\n}\n\nreturn 0;\n```"
  mdcn: "## 循环与决策\n\n循环和重复是任何编程语言中最重要的因素之一。正确使用循环可以创建出完全符合你预期的程序，并且能够顺利交付所需结果，不会出现问题或错误。\n\
    \n如果代码中没有循环和决策事件，你的程序将永远无法为用户提供任何选择。正是对选择的理解，提升了你的编程技能，并能编写出更优质的代码。\n\n## While\
    \ 循环\n\nWhile 循环的功能是在某个条件保持为真时，重复执行一条语句或一组语句。当 while 循环启动时，它会通过测试循环条件及其内部的语句来进行初始化，然后再执行循环的其余部分。\n\
    \n### 真还是假？\n\nWhile 循环是 C++ 代码中最流行的循环形式之一。它们会在条件为真时反复运行循环内包含的代码。一旦条件被证明为假，代码就会正常继续执行。\n\
    \n步骤 1 清除你目前所做的操作，并创建一个新的 C++ 文件。目前不需要任何额外的头文件，因此照常添加标准头文件：\n\n```\n#include <iostream>\n\
    using namespace std;\nint main ()\n{\n}\n```\n\n步骤 3 首先你需要创建一个条件，所以使用一个名为 `num`\
    \ 的变量并赋值为 1。现在创建 while 循环，声明只要 `num` 小于 30，循环就为真。在循环内部，显示 `num` 的值并每次增加 1，直到它大于\
    \ 30。\n\n步骤 2 创建一个简单的 while 循环。输入下面的代码，构建并运行（我们在截图中添加了注释）：\n\n```\n{\n    int\
    \ num = 1;\n    while (num < 30 )\n    {\n        cout << \"Number: \" << num\
    \ << endl;\n        num = num +1;\n    }\n    return 0;\n}\n```\n\n步骤 4 我们在这里引入了一些新元素。首先是\
    \ while 循环的开始和结束花括号。这是因为我们的循环是一个复合语句，即一组语句；还要注意，while 语句后面没有分号。你现在还有 `return 0`，这是一种干净且首选的结束代码的方式。\n\
    \n步骤 5 如果你不需要看到 `num` 不断增加的值，你可以省略复合 while 语句，而是直接让 `num` 自增直到达到 30，然后显示该值：\n\n\
    ```\n{\n    int num = 1;\n    while (num < 30 )\n        num++;\n    cout << \"\
    Number: \" << num << endl;\n    return 0;\n}\n```\n\n步骤 6 重要的是要记住，不要在 while 语句末尾添加分号。为什么？嗯，如你所知，分号代表\
    \ C++ 代码行的结束。如果你在 while 语句末尾放置一个分号，你的循环将永久卡住，直到你关闭程序。\n\n步骤 7 在我们的例子中，如果我们执行代码，`num`\
    \ 的值将是 1，由 `int` 语句设置。当代码遇到 while 语句时，它读取到条件“1 小于 30”为真，因此循环。分号结束了这一行，所以循环重复；但它永远不会给\
    \ `num` 加 1，因为它不会继续执行复合语句。\n\n步骤 8 你可以操作 while 语句，根据循环内的代码显示不同的结果。例如，要逐词阅读诗歌《辛梅里亚》，你需要输入：\n\
    \n```\n#include <iostream>\n#include <fstream>\nusing namespace std;\n\nint main\
    \ ()\n{\n    string word;\n    ifstream newfile (\"C:\\users\\david\\Documents\\\
    Cimmeria.txt\");\n\n    cout << \"Cimmeria, by Robert E Howard: \\n\" << endl;\n\
    \n    while (newfile >> word)\n    {\n        cout << word << endl;\n    }\n\n\
    \    return 0;\n}\n```\n\n步骤 9 你可以进一步扩展代码，使诗歌的每个单词每秒出现一次。为此，你需要引入一个新的库 `<windows.h>`。这是一个仅限\
    \ Windows 的库，你可以在其中使用 `Sleep()` 函数：\n\n```\n#include <iostream>\n#include <fstream>\n\
    #include <windows.h>\nusing namespace std;\n\nint main ()\n{\n    string word;\n\
    \    ifstream newfile (\"C:\\users\\david\\Documents\\Cimmeria.txt\");\n\n   \
    \ cout << \"Cimmeria, by Robert E Howard: \\n\" << endl;\n\n    while (newfile\
    \ >> word)\n    {\n        cout << word << endl;\n        Sleep(1000);\n    }\n\
    \n    return 0;\n}\n```\n\n步骤 10 `Sleep()` 以毫秒为单位工作，所以 `Sleep(1000)` 是一秒，`Sleep(10000)`\
    \ 是十秒，以此类推。结合 sleep 函数（以及它需要的头文件）和 while 循环，你可以设计出一些有趣的倒计时代码。\n\n```\n#include\
    \ <iostream>\n#include <windows.h>\nusing namespace std;\n\nint main ()\n{\n \
    \   int a = 10;\n\n    while (a != 0)\n    {\n        cout << a << endl;\n   \
    \     a = a - 1;\n        Sleep(1000);\n    }\n\n    cout << \"\\nBlast Off!\"\
    \ << endl;\n\n    return 0;\n}\n```\n\n## For 循环\n\n在某些方面，for 循环的工作方式与 while 循环非常相似，尽管其结构不同。for\
    \ 循环分为三个阶段：初始化器、条件和增量步骤。一旦设置好，循环就会重复自身，直到条件变为假。\n\n### 循环循环\n\nfor 循环的初始化阶段只执行一次，这为循环设置了参考点。循环会评估条件以判断其为真或假，然后执行增量操作。接着循环重复第二和第三阶段。\n\
    \n步骤 1 创建一个新的 C++ 文件，包含标准头文件：\n\n```\n#include <iostream>\nusing namespace std;\n\
    int main ()\n{\n}\n```\n\n步骤 4 循环之后，你在花括号（大括号）中创建了一个复合语句，用于显示整数 `num` 的当前值。每次\
    \ for 循环重复自身（即循环的第二和第三阶段）时，它都会增加 1，直到条件 `<30` 为假。然后循环结束，代码继续执行，并以 `return 0` 干净地结束。\n\
    \n```\n{\n    //For Loop Begins\n    for( int num = 1; num < 30; num = num +1\
    \ )\n    {\n        cout << \"Number: \" << num << endl;\n    }\n\n    return\
    \ 0;\n}\n```\n\n步骤 2 从简单开始，创建一个从 1 计数到 30 的 for 循环，每次增量时将值显示到屏幕上：\n\n```\n{\n\
    \    //For Loop Begins\n    for( int num = 1; num < 30; num = num +1 )\n    {\n\
    \        cout << \"Number: \" << num << endl;\n    }\n\n    return 0;\n}\n```\n\
    \n步骤 5 for 循环在 C++ 中是一个相当整洁的包，所有内容都包含在自己的括号内，而循环外的其他元素则显示在下方。如果你想创建一个 10 秒倒计时，可以使用：\n\
    \n```\n#include <iostream>\n#include <windows.h>\nusing namespace std;\nint main\
    \ ()\n{\n    //For Loop Begins\n    for( int a = 10; a != 0; a = a -1 )\n    {\n\
    \        cout << a << endl;\n        Sleep(1000);\n    }\n\n    cout << \"\\nBlast\
    \ Off!\" << endl;\n\n    return 0;\n}\n```\n\n步骤 3 按照 for 循环的过程，首先创建一个名为 `num`\
    \ 的整数并赋值为 1。接下来，设置条件，在本例中是 `num` 小于 30。最后阶段是创建增量；这里是 `num` 的值增加 1。\n\n```\n{\n\
    \    //For Loop Begins\n    for( int num = 1; num < 30; num = num +1 )\n}\n```\n\
    \n步骤 6 对于倒计时代码，别忘了包含 `windows.h` 库，以便使用 `Sleep` 命令。构建并运行代码；在命令控制台中，你可以看到数字从 10\
    \ 到 1 以一秒为间隔倒计时，直到达到零并显示“Blast Off!”。\n\n步骤 7 当然，你可以在 for 循环中包含更多内容，包括一些用户输入：\n\
    \n```cpp\nint i, n, fact = 1;\n\ncout << \"Enter a whole number: \";\ncin >> n;\n\
    \nfor (i = 1; i <= n; ++i) {\n    fact *= i;\n}\n\ncout<< \"\\nFactorial of \"\
    << n <<\" = \"<< fact << endl;\n\nreturn 0;\n```\n\n步骤 8 步骤 7 中的代码在构建并运行后，会要求输入一个数字，然后通过\
    \ for 循环显示该数字的阶乘。用户的数字存储在整数 `n` 中，后面是整数 `i`，用于检查条件是否为真或假，每次增加 1 并与用户的数字 `n` 进行比较。\n\
    \n步骤 9 这是一个 for 循环显示用户输入数字的乘法表的例子。对学生很方便：\n\n```cpp\n{\n    int n;\n\n    cout\
    \ << \"Enter a number to view its times table: \";\n    cin >> n;\n\n    for (int\
    \ i = 1; i <= 12; ++i) {\n        cout << n << \" x \" << i << \" = \" << n *\
    \ i << endl;\n    }\n\n    return 0;\n}\n```\n\n步骤 10 整数 `i` 的值可以从 12 扩展到你想要的任何数字，在此过程中显示一个非常大的乘法表（或一个小的）。当然，for\
    \ 循环中的数据类型不必是整数；只要它是有效的，它就能工作。\n\n```cpp\nfor ( float i = 0.00; i < 1.00; i +=\
    \ 0.01)\n{\n    cout << i << endl;\n}\n\nreturn 0;\n```"
