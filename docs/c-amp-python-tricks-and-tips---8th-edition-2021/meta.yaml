  - "[PAGE 57]\n\n# For Loop\n\nIn some respects, a for loop works in a very similar\
    \ way to that of a while loop, although it’s structure is different. A for loop\
    \ is split into three stages: an initialiser, a condition and an incremental step.\
    \ Once set up, the loop repeats itself until the condition becomes false.\n\n\
    # LOOPY LOOPS\n\nThe initialise stage of a for loop is executed only once and\
    \ this sets the point reference for the loop. The condition is evaluated by the\
    \ loop to see if it’s true or false and then the increment is executed. The loop\
    \ then repeats the second and third stage.\n\nSTEP 1 Create a new C++ file, with\
    \ the standard headers:\n\n```\n#include <iostream>\nusing namespace std;\nint\
    \ main ()\n{\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_57_0.png)\n\n\
    STEP 4 After the loop, you created a compound statement in braces (curly brackets),\
    \ that displays the current value of the integer num. Every time the for loop\
    \ repeats itself, the second and third stages of the loop, it adds 1 until the\
    \ condition <30 is false. The loop then ends and the code continues, ending neatly\
    \ with return 0.\n\n```\n{\n    //For Loop Begins\n    for( int num = 1; num <\
    \ 30; num = num +1 )\n    {\n        cout << \"Number: \" << num << endl;\n  \
    \  }\n\n    return 0;\n}\n```\n\nSTEP 2 Start simple and create a for loop that\
    \ counts from 1 to 30, displaying the value to the screen with each increment:\n\
    \n```\n{\n    //For Loop Begins\n    for( int num = 1; num < 30; num = num +1\
    \ )\n    {\n        cout << \"Number: \" << num << endl;\n    }\n\n    return\
    \ 0;\n}\n```\n\nSTEP 5 A for loop is quite a neat package in C++, all contained\
    \ within its own brackets, while the other elements outside of the loop are displayed\
    \ below. If you want to create a 10-second countdown, you could use:\n\n```\n\
    #include <iostream>\n#include <windows.h>\nusing namespace std;\nint main ()\n\
    {\n    //For Loop Begins\n    for( int a = 10; a != 0; a = a -1 )\n    {\n   \
    \     cout << a << endl;\n        Sleep(1000);\n    }\n\n    cout << \"\\nBlast\
    \ Off!\" << endl;\n\n    return 0;\n}\n```\n\nSTEP 3 Working through the process\
    \ of the for loop, begin by creating an integer called num and assigning it a\
    \ value of 1. Next, set the condition, in this case num being less than 30. The\
    \ last stage is where you create the increments; here it’s the value of num being\
    \ added by 1.\n\n```\n{\n    //For Loop Begins\n    for( int num = 1; num < 30;\
    \ num = num +1 )\n}\n```"
  - "[PAGE 58]\n\n# For Loop\n\nSTEP 6 With the countdown code, don't forget to include\
