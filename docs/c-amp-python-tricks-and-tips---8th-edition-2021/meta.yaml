    ## 字典


    列表非常有用，但 Python 中的字典是迄今为止处理数据项更技术化的方式。一开始可能有点难掌握，但你很快就能将它们应用到自己的代码中。


    ### 键值对


    字典类似于列表，但每个数据项都以一对的形式出现，这些被称为键（Key）和值（Value）。键部分必须是唯一的，可以是数字或字符串，而值可以是任何你喜欢的数据项。


    第1步 假设你想在 Python 中创建一个电话簿。你需要创建字典名称，并在花括号中输入数据，用冒号分隔键和值，格式为 `Key:Value`。例如：

    `phonebook={"Emma": 1234, "Daniel": 3456, "Hannah": 6789}`


    第2步 就像大多数列表、元组等一样，字符串需要用引号（单引号或双引号）括起来，而整数则不需要。请记住，值可以是字符串或整数，你只需要将相关的那个用引号括起来：

    `phonebook2={"David": "0987 654 321"}`


    第3步 与列表和元组一样，你可以通过给字典一个名称（本例中为 `phonebook`）来检查其内容。这将以类似于列表的方式显示你输入的数据项，你现在对此应该很熟悉了。


    ![](img/893ff1cb7ac32885c7c794a5e648f755_11_0.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_11_1.png)


    第4步 使用字典的好处在于，你可以输入键来索引值。使用前面步骤中的电话簿示例，你可以输入：

    `phonebook["Emma"]`

    `phonebook["Hannah"]`


    ![](img/893ff1cb7ac32885c7c794a5e648f755_11_2.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_11_3.png)


    第5步 向字典中添加内容也很容易。你可以通过添加新的键和值项来包含新的数据项条目，例如：


    ```

    phonebook["David"] = "0987 654 321"

    phonebook

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_12_0.png)


    第6步 你也可以通过发出 `del` 命令后跟项目的键来从字典中删除项目；值也会被删除，因为它们作为一对数据项一起工作：


    ```

    del phonebook["David"]

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_12_2.png)


    第7步 更进一步，如何创建一段代码来询问用户字典的键和值项呢？创建一个新的编辑器实例，首先编写一个全新的、空白的字典：


    ```

    phonebook={}

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_12_4.png)


    第8步 接下来，你需要定义用户输入和变量：一个用于人名，另一个用于他们的电话号码（让我们保持简单，以避免冗长的 Python 代码）：


    ```

    name=input("Enter name: ")

    number=int(input("Enter phone number: "))

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_12_1.png)


    第9步 注意，我们将数字保留为整数而不是字符串，尽管值可以是整数或字符串。现在你需要将用户输入的变量添加到新创建的空白字典中。使用与第5步相同的过程，你可以输入：


    ```

    phonebook[name] = number

    ```


