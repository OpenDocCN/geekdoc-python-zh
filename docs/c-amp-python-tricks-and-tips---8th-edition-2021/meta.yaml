    MOVESPEED = 11\nMOVE = 1\nSHOOT = 15\n\n# set up counting\nscore = 0\n\n# set\
    \ up font\nfont = pygame.font.SysFont('calibri', 50)\n\ndef makeplayer():\n  \
    \  player = pygame.Rect(370, 635, 60, 25)\n    return player\n\ndef makeinvaders(invaders):\n\
    \    y = 0\n    for i in invaders:\n        x = 0\n        for j in range(11):\n\
    \            invader = pygame.Rect(75+x, 75+y, 50, 20)\n            invaders.append(invader)\n\
    \            x += 60\n        y += 45\n    return invaders\n\ndef makewalls(walls):\n\
    \    wall1 = pygame.Rect(60, 520, 120, 30)\n    wall2 = pygame.Rect(246, 520,\
    \ 120, 30)\n    wall3 = pygame.Rect(432, 520, 120, 30)\n    wall4 = pygame.Rect(618,\
    \ 520, 120, 30)\n```\n\n## 互联网\n\n每个程序员都曾在某个时候上网复制一些代码插入到自己的程序中。使用他人的代码没有错，但你需要在盲目地在自己的计算机上运行它之前，了解代码的工作原理和作用。\n\
    \n## 注释\n\n我们再次提到注释。这是编程中一个极其重要的因素，即使你是唯一会查看代码的人，你也需要添加注释来说明正在发生什么。这个函数是你失去一条生命的地方吗？写个注释，帮助你或任何其他人了解正在发生什么。\n\
    \n![](img/893ff1cb7ac32885c7c794a5e648f755_69_1.png)\n\n```python\n# set up pygame\n\
    pygame.init()\nmainClock = pygame.time.Clock()\n\n# set up the window\nwidth =\
