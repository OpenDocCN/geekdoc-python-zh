    \    player = pygame.Rect(370, 635, 60, 25)\n    return player\n\ndef makeinvaders(invaders):\n\
    \    y = 0\n    for i in invaders:\n        x = 0\n        for j in range(11):\n\
    \            invader = pygame.Rect(75+x, 75+y, 50, 20)\n            invaders.append(invader)\n\
    \            x += 60\n        y += 45\n    return invaders\n\ndef makewalls(walls):\n\
    \    wall1 = pygame.Rect(60, 520, 120, 30)\n    wall2 = pygame.Rect(246, 520,\
    \ 120, 30)\n    wall3 = pygame.Rect(432, 520, 120, 30)\n    wall4 = pygame.Rect(618,\
    \ 520, 120, 30)\n```\n\n## THE INTERNET\n\nEvery programmer has and does at some\
    \ point go on the Internet and copy some code to insert into their own routines.\
    \ There’s nothing wrong with using others’ code, but you need to know how the\
    \ code works and what it does before you go blindly running it on your own computer.\n\
    \n## COMMENTING\n\nAgain we mention commenting. It’s a hugely important factor\
    \ in programming, even if you’re the only one who is ever going to view the code,\
    \ you need to add comments as to what’s going on. Is this function where you lose\
    \ a life? Write a comment and help you, or anyone else, see what’s going on.\n\
    \n![](img/893ff1cb7ac32885c7c794a5e648f755_69_1.png)\n\n```python\n# set up pygame\n\
    pygame.init()\nmainClock = pygame.time.Clock()\n\n# set up the window\nwidth =\
    \ 800\nheight = 700\nscreen = pygame.display.set_mode((width, height), 0, 32)\n\
    pygame.display.set_caption('caption')\n\n# set up movement variables\nmoveLeft\
    \ = False\nmoveRight = False\nmoveUp = False\nmoveDown = False\n\n# set up direction\
    \ variables\nDOWNLEFT = 1\nDOWNRIGHT = 3\n```\n\n## COUNTING LOOPS\n\nRemember\
    \ that in Python a loop doesn't count the last number you specify in a range.\
    \ So if you wanted the loop to count from 1 to 10, then you will need to use:\n\
    \n```python\nn = list(range(1, 11))\n```\n\nWhich will return 1 to 10.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_70_0.png)\n\
    \n## CASE SENSITIVE\n\nPython is a case sensitive programming language, so you\
    \ will need to check any variables you assign. For example, `Lives=10` is a different\
    \ variable to `lives=10`, calling the wrong variable in your code can have unexpected\
    \ results.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_70_1.png)\n\n## BRACKETS\n\
    \nEveryone forgets to include that extra bracket they should have added to the\
    \ end of the statement. Python relies on the routine having an equal amount of\
    \ closed brackets to open brackets, so any errors in your code could be due to\
    \ you forgetting to count your brackets; including square brackets.\n\n```python\n\
    def print_game_status(self):\n    print (board[len(self.missed_letters)])\n  \
    \  print ('Word: ' + self.hide_word())\n    print ('Letters Missed: ',)\n    for\
    \ letter in self.missed_letters:\n        print (letter,)\n    print ()\n    print\
    \ ('Letters Guessed: ',)\n    for letter in self.guessed_letters:\n        print\
    \ (letter,)\n    print ()\n```\n\n## COLONS\n\nIt's common for beginners to forget\
    \ to add a colon to the end of a structural statement, such as:\n\n```python\n\
    class Hangman:\ndef guess(self, letter):\n```\n\nAnd so on. The colon is what\
    \ separates the code, and creates the indents to which the following code belongs\
    \ to.\n\n```python\nclass Hangman:\n    def __init__(self,word):\n        self.word\
    \ = word\n        self.missed_letters = []\n        self.guessed_letters = []\n\
    \n    def guess(self,letter):\n        if letter in self.word and letter not in\
    \ self.guessed_letters:\n            self.guessed_letters.append(letter)\n   \
    \     elif letter not in self.word and letter not in self.missed_letters:\n  \
