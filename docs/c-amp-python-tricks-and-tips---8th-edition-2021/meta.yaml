    # 处理数据


    数据就是一切。有了它，你可以根据你的每一个需求来显示、控制、添加、删除、创建和操作Python。在接下来的几页中，我们将探讨如何创建列表、元组、字典和多维列表；并了解如何使用它们来打造令人兴奋且实用的程序。


    然后，你可以学习如何使用日期和时间函数，向系统中的文件写入数据，甚至创建图形用户界面，将你的编程技能提升到新的水平，并应用于新的项目创意。


    # 列表


    列表是你在Python中最常遇到的数据结构类型之一。列表就是项目的集合，或者如果你愿意，也可以称为数据，可以作为一个整体访问，也可以根据需要单独访问。


    ## 使用列表


    列表在Python中极其方便。列表可以包含字符串、整数，也可以包含变量。你甚至可以在列表中包含函数，以及列表中的列表。


    **步骤1** 列表是一系列称为项目的值的序列。你创建列表的名称，后跟一个等号，然后是方括号，项目之间用逗号分隔；注意字符串使用引号：


    ```python

    numbers = [1, 4, 7, 21, 98, 156]

    mythical_creatures = ["Unicorn", "Balrog", "Vampire", "Dragon", "Minotaur"]

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_7_0.png)


    **步骤2** 一旦定义了列表，你就可以通过引用其名称后跟一个数字来调用每个项目。列表的第一个项目条目从0开始，然后是1、2、3，依此类推。例如：


    ```python

    numbers

    # 调用列表的全部内容。

    numbers[3]

    # 调用列表中从零开始的第三个项目（本例中为21）。

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_7_2.png)


    **步骤3** 你也可以通过在项目编号前使用减号[-1]来访问或索引列表中的最后一个项目，或者用[-2]访问倒数第二个项目，依此类推。尝试引用列表中不存在的项目，例如[10]，将返回错误：


    ```python

    numbers[-1]

    mythical_creatures[-4]

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_7_1.png)


    **步骤4** 切片类似于索引，但你可以通过用冒号分隔项目编号来检索列表中的多个项目。例如：


    ```python

    numbers[1:3]

    # 将输出4和7，即项目编号1和2。注意，返回的值不包括第二个索引位置（因为numbers[1:3]会返回4、7和21）。

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_7_3.png)


    **步骤5** 你可以更新现有列表中的项目，删除项目，甚至将列表连接在一起。例如，要连接两个列表，你可以使用：


    ```python

    everything = numbers + mythical_creatures

    # 然后查看合并后的列表：

    everything

    ```


    **步骤6** 可以通过输入以下内容向列表添加项目：


    ```python

    numbers = numbers + [201]

    # 或者对于字符串：

    mythical_creatures = mythical_creatures + ["Griffin"]

    # 或者使用append函数：

    mythical_creatures.append("Nessie")

    numbers.append(278)

    ```


    **步骤7** 删除项目可以通过两种方式完成。第一种是通过项目编号：


    ```python

    del numbers[7]

    # 或者，通过项目名称：

    mythical_creatures.remove("Nessie")

    ```


    **步骤8** 你可以通过在Shell中输入`dir(list)`来查看列表可以执行的操作。输出是可用的函数，例如，`insert`和`pop`用于在特定位置添加和删除项目。要在索引4处插入数字62：


    ```python

    numbers.insert(4, 62)

    # 要删除它：

    numbers.pop(4)

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_8_0.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_8_1.png)


    **步骤9** 你还可以使用list函数将字符串分解为其组成部分。例如：


    ```python

    list("David")

    # 将名字David分解为''D'', ''a'', ''v'', ''i'', ''d''。然后可以将其传递给一个新列表：

    name = list("David Hayward")

    name

    age = [44]

    user = name + age

    user

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_8_2.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_8_3.png)


    **步骤10** 基于此，你可以创建一个程序，将某人的姓名和年龄存储为一个列表：


    ```python

    name = input("What''s your name? ")

    lname = list(name)

    age = int(input("How old are you: "))

    lage = [age]

    user = lname + lage

    # 合并后的姓名和年龄列表称为user，可以通过在Shell中输入user来调用。尝试一下，看看你能做什么。

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_8_4.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_8_5.png)


    # 元组


    元组与列表非常相似。然而，列表可以被更新、删除或以某种方式更改，而元组则保持不变。这被称为不可变，它们非常适合存储固定的数据项。


    ## 不可变的元组


    拥有元组的原因因程序的预期用途而异。通常，元组是为特殊事物保留的，但它们也用于例如冒险游戏中存储非玩家角色名称。


    **步骤1** 元组的创建方式与列表相同，但在此情况下，你使用圆括号而不是方括号。例如：


    ```python

    months = ("January", "February", "March", "April", "May", "June")

    months

    ```


    **步骤2** 就像列表一样，命名元组中的项目可以根据其在数据范围中的位置进行索引，即：


    ```python

    months[0]

    months[5]

    # 然而，任何尝试删除或添加到元组的操作都会在Shell中导致错误。

    ```


    **步骤3** 你可以将分组的元组创建为包含多组数据的列表。例如，这里有一个名为NPC（非玩家角色）的元组，包含冒险游戏中角色的名称和战斗评级：


    ```python

    NPC = [("Conan", 100), ("Belit", 80), ("Valeria", 95)]

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_9_0.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_9_1.png)


    **步骤4** 这些数据项中的每一个都可以通过在Shell中输入`NPC`作为一个整体来访问；或者可以根据它们的位置`NPC[0]`进行索引。你还可以索引NPC列表中的单个元组：


    ```python

    NPC[0][1]

    # 将显示100。

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_9_2.png)


