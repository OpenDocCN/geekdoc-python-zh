  md: "# Defining Constants\n\nSTEP 5 You can also define other elements as a constant.\
    \ For example, instead of using \\n for a newline in the cout statement, you can\
    \ define it at the start of the code:\n\n```\n#include <iostream>\nusing namespace\
    \ std;\n\n#define LENGTH 50\n#define WIDTH 40\n#define HEIGHT 60\n#define NEWLINE\
    \ '\\n'\n\nint main ()\n{\n    cout << \"Length is: \" << LENGTH << NEWLINE;\n\
    \    cout << \"Width is: \" << WIDTH << NEWLINE;\n    cout << \"Height is: \"\
    \ << HEIGHT << NEWLINE;\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_50_0.png)\n\
    \nSTEP 6 The code, when built and executed, does exactly the same as before, using\
    \ the new constant NEWLINE to insert a newline in the cout statement. Incidentally,\
    \ creating a newline constant isn't a good idea unless you're making it smaller\
    \ than \\n or even the endl command.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_50_1.png)\n\
    \nSTEP 7 Defining a constant is a good way of initialising your base values at\
    \ the start of your code. You can define that your game has three lives, or even\
    \ the value of PI without having to call up the C++ math library:\n\n```\n#include\
    \ <iostream>\nusing namespace std;\n\n#define PI 3.14159\n\nint main ()\n{\n \
    \   cout << \"The value of Pi is: \" << PI << endl;\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_50_2.png)\n\
    \nSTEP 8 Another method of defining a constant is with the const keyword. Use\
    \ const together with a data type, variable and value: const type variable = value.\
    \ Using Pi as an example:\n\n```\n#include <iostream>\nusing namespace std;\n\n\
    int main ()\n{\n    const double PI = 3.14159;\n    cout << \"The value of Pi\
    \ is: \" << PI << endl;\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_50_3.png)\n\
    \nSTEP 9 Because you're using const within the main block of code, you need to\
    \ finish the line with a semicolon. You can use either, as long as the names and\
    \ values don't clash, but it's worth mentioning that #define requires no memory,\
    \ so if you're coding to a set amount of memory, #define is your best bet.\n\n\
    ![](img/893ff1cb7ac32885c7c794a5e648f755_50_4.png)\n\nSTEP 10 Const works in much\
    \ the same way as #define. You can create static integers and even newlines:\n\
    \n```\n#include <iostream>\nusing namespace std;\n\nint main()\n{\n    const int\
    \ LENGTH = 50;\n    const int WIDTH = 40;\n    const char NEWLINE = '\\n';\n\n\
    \    int area;\n    area = LENGTH * WIDTH;\n\n    cout << \"Area is: \" << area\
    \ << NEWLINE;\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_50_5.png)"
