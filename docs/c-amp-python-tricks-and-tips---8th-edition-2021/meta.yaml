  md: "# If... Else Statement\n\nSTEP 6 The code works the same way, as you would\
    \ expect, but what if you wanted to display something if the user entered the\
    \ number 30? Try this:\n\n```\n{\n    int num;\n\n    cout << \"Enter a number:\
    \ \";\n    cin >> num;\n\n    if ( num < 30 )\n    {\n        cout << \"The number\
    \ is less than 30!\" << endl;\n    }\n    else if ( num > 30 )\n    {\n      \
    \  cout << \"The number is greater than 30!\" << endl;\n    }\n    else if ( num\
    \ == 30 )\n    {\n        cout << \"The number is exactly 30!\" << endl;\n   \
    \ }\n\n    return 0;\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_64_0.png)\n\
    \nSTEP 7 The new addition to the code is what's known as a nested if... else statement.\
    \ This allows you to check for multiple conditions. In this case, if the user\
    \ enters a number less than 30, greater than 30 or actually 30 itself, a different\
    \ outcome is presented to them.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_64_1.png)\n\
    \nSTEP 8 You can take this up a notch and create a two-player number guessing\
    \ game. Begin by creating the variables:\n\n```\nint num, guess, tries = 0;\n\n\
    cout << \"***** Two-player number guessing game *****\" << endl;\ncout << \"\\\
    nPlayer One, enter a number for Player Two to guess: \" << endl;\ncin >> num;\n\
    cout << string(50, '\\n');\n```\n\nSTEP 9 The cout << string(50, '\\n') line clears\
    \ the screen so Player Two doesn't see the entered number. Now you can create\
    \ a do... while loop, together with if... else:\n\n```\ndo\n{\n    cout << \"\\\
    nPlayer Two, enter your guess: \";\n    cin >> guess;\n    tries++;\n    if (guess\
    \ > num)\n    {\n        cout << \"\\nToo High!\\n\" << endl;\n    }\n    else\
    \ if (guess < num)\n    {\n        cout << \"\\nToo Low!\\n\" << endl;\n    }\n\
    \    else if (guess == num)\n    {\n        cout << \"Well done! You got it in\
    \ \" << tries << \" guesses!\" << endl;\n    }\n} while (guess != num);\n\nreturn\
    \ 0;\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_64_2.png)\n\nSTEP 10 Grab\
    \ a second player, then build and run the code. Player One enters the number to\
    \ be guessed, then Player Two can take as many guesses as they need to get the\
    \ right number. Want to make it harder? Maybe use decimal numbers.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_64_3.png)"
