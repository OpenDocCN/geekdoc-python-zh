    \ entered\\n\" << endl;\n    cout << \"\\n-----------------------------------\\\
    n\" << endl;\n\n    do {\n        cout<<\"\\nPlease enter a number: \";\n    \
    \    cin>>number;\n        sum += number;\n    }\n    while(number != 0.0);\n\n\
    \    cout<<\"Total sum of all numbers: \"<<sum;\n\n    return 0;\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_60_0.png)\n\
    \nSTEP 6 The code from Step 5 works as follows: two floating point variables are\
    \ assigned, number and sum, both with the value of 0.0. There is a brief set of\
    \ instructions for the user, then the do... while loop begins.\n\n```\n{\n   \
    \ float number, sum = 0.0;\n    cout << \"**** Program to execute a Do... While\
    \ loop continuously ****\" << endl;\n    cout << \"\\nEnter 0 to stop and display\
    \ the sum of all the numbers entered\\n\" << endl;\n    cout << \"\\n-----------------------------------\\\
    n\" << endl;\n}\n```\n\nSTEP 7 The do... while loop in this instance asks the\
    \ user to input a number, which you assigned to the float variable, number. The\
    \ calculation step uses the second floating point variable, sum, which adds the\
    \ value of number every time the user enters a new value.\n\n```\ndo {\n    cout\
    \ << \"\\nPlease enter a number: \";\n    cin >> number;\n    sum += number;\n\
    }\n```\n\nSTEP 8 Finally, the while statement checks the condition of the variable\
    \ number. If the user has entered zero, then the loop is terminated, if not then\
    \ it continues indefinitely. When the user finally enters zero, the value of sum,\
    \ the total value of all the user's input, is displayed. The loop, and the program,\
