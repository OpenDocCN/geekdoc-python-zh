    71 #if ACE_SIZEOF_LONG == 8 && \n72 !((defined( amd64 ) || defined ( x86_64

    ```


    # PLAN AHEAD


    While it’s great to wake up one morning and decide to code a classic text adventure,
    it’s not always practical without a good plan. Small snippets of code can be written
    without too much thought and planning but longer and more in-depth code requires
    a good working plan to stick to and help iron out the bugs.


    ![](img/893ff1cb7ac32885c7c794a5e648f755_67_1.png)'
