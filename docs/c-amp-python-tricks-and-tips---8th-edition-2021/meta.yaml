  - '[PAGE 35]


    # Tkinter Module


    While running your code from the command line, or even in the Shell, is perfectly
    fine, Python is capable of so much more. The Tkinter module enables the programmer
    to set up a Graphical User Interface to interact with the user, and it''s surprisingly
    powerful too.


    # GETTING GUI


    Tkinter is easy to use but there''s a lot more you can do with it. Let''s start
    by seeing how it works and getting some code into it. Before long you will discover
    just how powerful this module really is.


    STEP 1 Tkinter is usually built into Python 3. However, if it''s available when
    you enter: `import tkinter`, then you need to `pip install tkinter` from the command
    prompt. We can start to import modules differently than before, to save on typing
    and by importing all their contents:

    `import tkinter as tk`

    `from tkinter import *`


    STEP 3 The ideal approach is to add `mainloop()` into the code to control the
    Tkinter event loop, but we''ll get to that soon. You''ve just created a Tkinter
    widget and there are several more we can play around with:

    `btn=Button()`

    `btn.pack()`

    `btn["text"]="Hello everyone!"`

    The first line focuses on the newly created window. Click back into the Shell
    and continue the other lines.


    ![](img/893ff1cb7ac32885c7c794a5e648f755_35_0.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_35_1.png)


    STEP 2 It''s not recommended to import everything from a module using the asterisk
    but it won''t do any harm normally. Let''s begin by creating a basic GUI window,
    enter:

    `wind=Tk()`

    This creates a small, basic window. There''s not much else to do at this point
    but click the X in the corner to close the window.


    STEP 4 You can combine the above into a New File:

    `import tkinter as tk`

    `from tkinter import *`

    `btn=Button()`

    `btn.pack()`

    `btn["text"]="Hello everyone!"`

    Then add some button interactions:

    `def click():`

    `    print("You just clicked me!")`

    `btn["command"]=click`


    ![](img/893ff1cb7ac32885c7c794a5e648f755_35_2.png)


