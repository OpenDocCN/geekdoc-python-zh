  md: "# File Input/Output\n\nThe standard iostream library provides C++ coders with\
    \ the cin and cout input and output functionality. However, to be able to read\
    \ and write from a file you need to utilise another C++ library, called fstream.\n\
    \n# FSTREAMS\n\nThere are two main data types within the fstream library that\
    \ are used to open a file, read from it and write to it, ofstream and ifstream.\
    \ Here’s how they work.\n\nSTEP 1 The first task is to create a new C++ file and\
    \ along with the usual headers you need to include the new fstream header:\n\n\
    ```\n#include <iostream>\n#include <fstream>\nUsing namespace std;\nint main ()\n\
    {\n\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_51_0.png)\n\nSTEP 3 We’ve\
    \ included comments in the screenshot of step 2 to help you understand the process.\
    \ You created a string called name, to store the user’s inputted name. You also\
    \ created a text file called name.txt (with the ofstream newfile and newfile.open\
    \ lines), asked the user for their name and stored it and then written the data\
    \ to the file.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_51_1.png)\n\nSTEP 2\
    \ Begin by asking a user for their name and writing that information to a file.\
    \ You need the usual string to store the name, and getline to accept the input\
    \ from the user.\n\n```\n#include <iostream>\n#include <fstream>\nusing namespace\
    \ std;\nint main ()\n{\n    string name;\n    ofstream newfile;\n    newfile.open(\"\
    name.txt\");\n    cout << \"Enter your name: \" << endl;\n    getline(cin, name);\n\
    \    newfile << name << endl;\n    newfile.close();\n}\n```\n\nSTEP 4 To read\
    \ the contents of a file, and output it to the screen, you need to do things slightly\
    \ differently. First you need to create a string variable to store the file’s\
    \ contents (line by line), then open the file, use getline to read the file line\
    \ by line and output those lines to the screen. Finally, close the file.\n\n```\n\
    string line;\nifstream newfile (\"name.txt\");\ncout << \"Contents of the file:\
    \ \" << endl;\ngetline(newfile, line);\ncout << line << endl;\nnewfile.close();\n\
    ```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_51_2.png)"
