  mdcn: '## 格式化字符串


    处理数据时，创建列表、字典和对象后，你可能经常需要打印结果。将字符串与数据合并非常容易，尤其是在 Python 3 中，因为早期版本的 Python 往往会使事情复杂化。


    ## 字符串格式化


    自 Python 3 起，字符串格式化变得更加简洁，使用 `.format` 函数结合花括号。这是一种比之前版本更合乎逻辑、更规范的方法。


    步骤 1 Python 中的基本格式化是使用花括号将每个变量调用到字符串中：

    name="Conan"

    print("The barbarian hero of the Hyborian Age is: {}".format(name))


    步骤 3 你当然也可以将整数包含在内：

    number=10000

    print("{} of {} was a skilled mercenary, and thief too. He once stole {} gold
    from a merchant.".format(name, place, number))


    ![](img/893ff1cb7ac32885c7c794a5e648f755_15_0.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_15_1.png)


    步骤 2 记住要用两组括号关闭 print 函数，因为你用一组括号包裹了变量，另一组包裹了 print 函数。你可以在单个 print 函数中包含多个字符串格式化实例：

    name="Conan"

    place="Cimmeria"

    print("{} hailed from the North, in a cold land known as {}".format(name, place))


    步骤 4 应用字符串格式化的方法有很多种，有些非常简单，正如我们在此展示的；有些则可能复杂得多。这完全取决于你希望程序实现什么功能。关于字符串格式化，一个经常参考的好地方是
    Python 文档网页，网址为 www.docs.python.org/3.1/library/string.html。在这里，你会找到大量帮助。


    ![](img/893ff1cb7ac32885c7c794a5e648f755_15_2.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_15_3.png)


    有趣的是，你可以使用字符串格式化函数引用一个列表。你需要在列表名称前放置一个星号：


    ```

    numbers=1, 3, 45, 567546, 3425346345

    print("Some numbers: {}, {}, {}, {}, {}".format(*numbers))

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_16_0.png)


    你也可以用同样的方式打印用户输入的内容：


    ```

    name=input("What''s your name? ")

    print("Hello {}.".format(name))

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_16_1.png)


    对于列表中的索引，使用字符串格式化调用列表时同样适用。你可以根据每个项目的位置（从 0 到存在的数量）进行索引：


    ```

    numbers=1, 4, 7, 9

    print("More numbers: {3}, {0}, {2}, {1}.".format(*numbers))

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_16_2.png)


    你可以扩展这个简单的代码示例，以显示用户输入姓名的首字母：


    ```

    name=input("What''s your name? ")

    print("Hello {}.".format(name))

    lname=list(name)

    print("The first letter of your name is a {0}".format(*lname))

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_16_3.png)


    正如你可能猜测的那样，你可以在单个列表中混合字符串和整数，并在 `.format` 函数中调用：


    ```

    characters=["Conan", "Belit", "Valeria", 19, 27, 20]

    print ("{0} is {3} years old. Whereas {1} is {4} years old.".format(*characters))

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_16_4.png)


    你也可以调用一对列表，并在同一个 print 函数中分别引用它们。回顾步骤 7 的代码，你可以这样修改：


    ```

    names=["Conan", "Belit", "Valeria"]

    ages=[25, 21, 22]

    Creating two lists. Now you can call each list, and individual items:

    print("{0[0]} is {1[0]} years old. Whereas {0[1]} is {1[1]} years old.".format(names,
    ages))

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_16_5.png)


    ## 日期和时间


    处理数据时，能够访问时间通常很方便。例如，你可能想为条目添加时间戳，或者查看用户登录系统的时间以及持续了多久。幸运的是，获取日期和时间很容易，这要归功于 Time
    模块。


    ## 时间模块


    time 模块包含帮助你检索当前系统时间、从字符串读取日期、格式化时间和日期等功能。


    步骤 1 首先你需要导入 time 模块。它是 Python 3 的内置模块，因此你不需要进入命令提示符并使用 pip 安装它。导入后，你可以使用简单的命令调用当前时间和日期：

    import time

    time.asctime()


    步骤 3 你可以通过输入以下命令查看时间呈现的结构：

    time.local.time()

    输出显示为：‘time.struct_time(tm_year=2017, tm_mon=9, tm_mday=7, tm_hour=9, tm_min=6,
    tm_sec=13, tm_wday=3, tm_yday=250, tm_isdst=0)’；显然这取决于你当前的时间，而不是上面显示的时间。


    ![](img/893ff1cb7ac32885c7c794a5e648f755_17_0.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_17_1.png)


    步骤 2 time 函数被分成九个元组，这些元组像任何其他元组一样被划分为索引项，如下图所示。


    步骤 4 time 模块内置了众多函数。其中最常用的是 `.strftime()`。通过它，你能够呈现各种参数，因为它将时间元组转换为字符串。例如，要显示当前是星期几，你可以使用：

    time.strftime(‘%A’)


    | 索引 | 字段 | 值 |

    |---|---|---|

    | 0 | 4位年份 | 2016 |

    | 1 | 月份 | 1 到 12 |

    | 2 | 日期 | 1 到 31 |

    | 3 | 小时 | 0 到 23 |

    | 4 | 分钟 | 0 到 59 |

    | 5 | 秒 | 0 到 61（60 或 61 是闰秒） |

    | 6 | 星期几 | 0 到 6（0 是星期一） |

    | 7 | 一年中的第几天 | 1 到 366（儒略日） |

    | 8 | 夏令时 | -1, 0, 1，-1 表示库决定夏令时 |


    ![](img/893ff1cb7ac32885c7c794a5e648f755_17_2.png)


    步骤 5 这自然意味着你可以将各种函数合并到自己的代码中，例如：


    ```

    time.strftime("%a")

    time.strftime("%B")

    time.strftime("%b")

    time.strftime("%H")

    time.strftime("%H%M")

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_18_0.png)


    步骤 8 你在上一节末尾看到，在计算圆周率到用户想要的小数位数的代码中，你可以为 Python 中的特定事件计时。获取上面的代码并稍作修改，加入：


    ```

    start_time=time.time()

    ```


    然后是：


    ```

    endtime=time.time()-start_time

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_18_1.png)


    步骤 6 注意最后两个条目，使用 %H 和 %H%M，你可以看到这些是小时和分钟，正如最后一个条目所示，将它们输入为 %H%M 不会在 Shell 中正确显示时间。你可以轻松地用以下方式修正：


    ```

    time.strftime("%H:%M")

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_18_2.png)


    步骤 9 输出将类似于下面的屏幕截图。计时器函数需要放在输入语句的两侧，因为那是变量名被创建的时候，具体取决于用户登录花了多长时间。然后，时间长度将作为 endtime
    变量显示在代码的最后一行。


    ![](img/893ff1cb7ac32885c7c794a5e648f755_18_3.png)


    步骤 7 这意味着你将能够显示当前时间或某事发生的时间，例如用户输入他们的名字。在编辑器中尝试此代码：


    ```

    import time

    name=input("Enter login name: ")

    print("Welcome", name, "\d")

    print("User:", name, "logged in at", time.strftime("%H:%M"))

    ```


    尝试进一步扩展它，以包含日期、月份、年份等。


    ![](img/893ff1cb7ac32885c7c794a5e648f755_18_4.png)


    步骤 10 time 模块可以做很多事情；其中一些也相当复杂，例如显示自 1970 年 1 月 1 日以来的秒数。如果你想进一步深入 time 模块，那么在
    Shell 中输入：help(time) 以显示当前 Python 版本中 time 模块的帮助文件。


    ![](img/893ff1cb7ac32885c7c794a5e648f755_18_5.png)


    ## 打开文件


    在 Python 中，你可以在程序中读取文本和二进制文件。你也可以写入文件，这是我们接下来要探讨的内容。读写文件使你能够输出和存储程序中的数据。


    ## 打开、读取和写入


    在 Python 中，你创建一个文件对象，类似于创建一个变量，只是使用 `open()` 函数传入文件。文件通常分为文本或二进制。


    步骤 1 首先在系统的文本编辑器中输入一些文本。最好使用文本编辑器，而不是文字处理器，因为文字处理器包含背景格式和其他元素。在我们的示例中，我们有罗伯特·E·霍华德的诗《西米里亚人》。你需要将文件保存为
    poem.txt。


    步骤 3 如果你现在在 Shell 中输入 poem，你将获得有关你刚刚请求打开的文本文件的一些信息。你现在可以使用 poem 变量来读取文件内容：

    poem.read()

    请注意，文本中的 /n 条目代表换行，就像你之前使用过的那样。


    ![](img/893ff1cb7ac32885c7c794a5e648f755_19_0.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_19_1.png)


    步骤 2 你使用 `open()` 函数将文件作为对象传递给一个变量。你可以随意命名文件对象，但你需要告诉 Python 你正在打开的文本文件的名称和位置：

    poem=open("/home/pi/Documents/Poem.txt")


    步骤 4 如果你第二次输入 poem.read()，你会注意到文本已从文件中移除。你需要再次输入：poem=open("/home/pi/Documents/Poem.txt")
    来重新创建文件。然而，这次输入：

    print(poem.read())

    这次，/n 条目被移除，取而代之的是换行符和可读的文本。


    ![](img/893ff1cb7ac32885c7c794a5e648f755_19_2.png)


