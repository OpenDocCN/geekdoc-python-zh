    \ temperature.\n\n```\ncpp\n5\n6 {\n7     float temp;\n8\n9     do\n0     {\n\
    1         cout << \"\\nEnter the temperature (or -10000 to exit): \" << endl;\n\
    2         cin >> temp;\n```\n\nSTEP 8 The first if statement checks to see if\
    \ the user's inputted value is less than or equal to zero. If it is, then the\
    \ output is 'Brrrr, it's really cold!'. Otherwise, if the input is greater than\
    \ zero, the code outputs 'At least it's not freezing!'.\n\n```\ncpp\ndo\n{\n \
    \   cout << \"\\nEnter the temperature (or -10000 to exit): \" << endl;\n    cin\
    \ >> temp;\n    if (temp <= 0 )\n    {\n        cout << \"\\nBrrrr, it's really\
    \ cold!\" << endl;\n    }\n    if (temp > 0 )\n    {\n        cout << \"\\nAt\
    \ least it's not freezing!\" << endl;\n    }\n}\n```\n\nSTEP 9 Finally, if the\
    \ user enters the value -10000, which is impossibly cold so is therefore a unrealistic\
    \ value, the do... while loop is terminated and a friendly 'Good bye' is displayed\
    \ to the screen.\n\n```\ncpp\n{\n    float temp;\n\n    do\n    {\n        cout\
    \ << \"\\nEnter the temperature (or -10000 to exit): \" << endl;\n        cin\
    \ >> temp;\n        if (temp <= 0 )\n        {\n            cout << \"\\nBrrrr,\
    \ it's really cold!\" << endl;\n        }\n        if (temp > 0 )\n        {\n\
    \            cout << \"\\nAt least it's not freezing!\" << endl;\n        }\n\
    \    }\n    while ( temp != -10000 );\n\n    cout << \"\\nGood bye\\n\" << endl;\n\
    \n    return 0;\n}\n```\n\nSTEP 10 Using if is quite powerful, if it's used correctly.\
    \ Just remember that if the condition is true then the code executes what's in\
    \ the braces. If not, it continues on its merry way. See what else you can come\
    \ up with using if and a combination of loops.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_62_2.png)"
- md: "## If... Else Statement\n\nThere is a much better way to use an if statement\
    \ in your code, with if... else. If... else works in much the same way as a standard\
    \ if statement. If the Boolean expression is true, the code within the braces\
    \ is executed. Else, the code within the next set of braces is used instead.\n\
    \n## IF YES, ELSE NO\n\nThere are two sections of code that can be executed depending\
    \ on the outcome in an if... else statement. It's quite easy to visualise once\
    \ you get used to its structure.\n\nSTEP 1 Begin with a new C++ file and the standard\
    \ headers:\n\n```\n#include <iostream>\nusing namespace std;\nint main ()\n{\n\
    }\n```\n\nSTEP 2 Let's expand the code from the If Statement on the previous page:\n\
    \n```\n{\n    int num = 1;\n    if ( num < 30 )\n    {\n        cout << \"The\
    \ number is less than 30!\" << endl;\n    }\n    else\n    {\n        cout <<\
    \ \"The number is greater than 30!\" << endl;\n    }\n    return 0;\n}\n```\n\n\
    STEP 3 The first line in the code creates the integer called num and gives it\
    \ a value of 1. The if statement checks to see if the value of num is less than\
    \ thirty and if it is it outputs \"The number is less than 30!\" to the console.\n\
    \n```\nif ( num < 30 )\n{\n    cout << \"The number is less than 30!\" << endl;\n\
    }\n```\n\nSTEP 4 The else companion to if checks if the number is greater than\
    \ 30 and if so, then displays \"The number is greater than 30!\" to the console;\
    \ and finally, the code is terminated satisfactorily.\n\n```\ncout << \"The number\
    \ is less than 30!\" << endl;\n}\nelse\n{\n    cout << \"The number is greater\
    \ than 30!\" << endl;\n}\n```\n\nSTEP 5 You can change the value of num in the\
    \ code or you can improve the code by asking the user to enter a value:\n\n```\n\
    {\n    int num;\n    cout << \"Enter a number: \";\n    cin >> num;\n    if (\
    \ num < 30 )\n    {\n        cout << \"The number is less than 30!\" << endl;\n\
    \    }\n    else\n    {\n        cout << \"The number is greater than 30!\" <<\
    \ endl;\n    }\n    return 0;\n}\n```\n\nSTEP 6 The code works the same way, as\
    \ you would expect, but what if you wanted to display something if the user entered\
    \ the number 30? Try this:\n\n```\n{\n    int num;\n\n    cout << \"Enter a number:\
    \ \";\n    cin >> num;\n\n    if ( num < 30 )\n    {\n        cout << \"The number\
    \ is less than 30!\" << endl;\n    }\n    else if ( num > 30 )\n    {\n      \
    \  cout << \"The number is greater than 30!\" << endl;\n    }\n    else if ( num\
    \ == 30 )\n    {\n        cout << \"The number is exactly 30!\" << endl;\n   \
    \ }\n\n    return 0;\n}\n```\n\nSTEP 7 The new addition to the code is what's\
    \ known as a nested if... else statement. This allows you to check for multiple\
    \ conditions. In this case, if the user enters a number less than 30, greater\
    \ than 30 or actually 30 itself, a different outcome is presented to them.\n\n\
    STEP 8 You can take this up a notch and create a two-player number guessing game.\
    \ Begin by creating the variables:\n\n```\nint num, guess, tries = 0;\n\ncout\
    \ << \"***** Two-player number guessing game *****\" << endl;\ncout << \"\\nPlayer\
    \ One, enter a number for Player Two to guess: \" << endl;\ncin >> num;\ncout\
    \ << string(50, '\\n');\n```\n\nSTEP 9 The cout << string(50, '\\n') line clears\
    \ the screen so Player Two doesn't see the entered number. Now you can create\
    \ a do... while loop, together with if... else:\n\n```\ndo\n{\n    cout << \"\\\
    nPlayer Two, enter your guess: \";\n    cin >> guess;\n    tries++;\n    if (guess\
    \ > num)\n    {\n        cout << \"\\nToo High!\\n\" << endl;\n    }\n    else\
    \ if (guess < num)\n    {\n        cout << \"\\nToo Low!\\n\" << endl;\n    }\n\
    \    else if (guess == num)\n    {\n        cout << \"Well done! You got it in\
    \ \" << tries << \" guesses!\" << endl;\n    }\n} while (guess != num);\n\nreturn\
    \ 0;\n```\n\nSTEP 10 Grab a second player, then build and run the code. Player\
    \ One enters the number to be guessed, then Player Two can take as many guesses\
    \ as they need to get the right number. Want to make it harder? Maybe use decimal\
    \ numbers.\n\n## Working with Code\n\nBy now you should have the essential building\
    \ blocks of how to program in both Python and C++. You can create code, store\
    \ data, ask the user questions, offer them a choice and repeat functions until\
    \ they prove true and provide the correct output. What next then?\n\nThis final\
    \ section looks at some of the more common coding mistakes that Python and C++\
    \ beginners make and where you can turn to next to continue your programming adventure.\n\
    \n## Common Coding Mistakes\n\nWhen you start something new you’re inevitably\
    \ going to make mistakes, this is purely down to inexperience and those mistakes\
    \ are great teachers in themselves. However, even experts make the occasional\
    \ mishap. Thing is, to learn from them as best you can.\n\n## X=MISTAKE, PRINT\
    \ Y\n\nThere are many pitfalls for the programmer to be aware of, far too many\
    \ to be listed here. Being able to recognise a mistake and fix it is when you\
    \ start to move into more advanced territory.\n\n## SMALL CHUNKS\n\nIt would be\
    \ wonderful to be able to work like Neo from The Matrix movies. Simply ask, your\
    \ operator loads it into your memory and you instantly know everything about the\
    \ subject. Sadly though, we can’t do that. The first major pitfall is someone\
    \ trying to learn too much, too quickly. So take coding in small pieces and take\
    \ your time.\n\n## EASY VARIABLES\n\nMeaningful naming for variables is a must\
    \ to eliminate common coding mistakes. Having letters of the alphabet is fine\
    \ but what happens when the code states there’s a problem with x variable. It’s\
    \ not too difficult to name variables lives, money, player1 and so on.\n\n```\n\
    1 var points = 1023;\n2 var lives = 3;\n3 var totalTime = 45;\n4 write(\"Points:\
    \ \"+points);\n5 write(\"Lives: \"+lives);\n6 write(\"Total Time: \"+totalTime+\"\
    \ secs\");\n7 write(\"---------------------------\");\n8 var totalScore = 0;\n\
    9 write(\"Your total Score is: \"+totalScore);\n```\n\n## //COMMENTS\n\nUse comments.\
    \ It’s a simple concept but commenting on your code saves so many problems when\
    \ you next come to look over it. Inserting comment lines helps you quickly sift\
    \ through the sections of code that are causing problems; also useful if you need\
    \ to review an older piece of code.\n\n```\n52 orig += 2;\n53 target += 2;\n54\
    \ --n;\n55 }\n56 #endif\n57 if (n == 0)\n58 return;\n59\n60 //\n61 // Loop unrolling.\
    \ Here be dragons.\n62 //\n63\n64 // (n & (~3)) is the greatest multiple of 4\
    \ r\n65 // In the while loop ahead, orig will move ov\n66 // increments (4 elements\
    \ of 2 bytes).\n67 // end marks our barrier for not falling out\n68 char const\
    \ * const end = orig + 2 * (n & ~3);\n69\n70 // See if we're aligned for writting\
    \ in\n71 #if ACE_SIZEOF_LONG == 8 && \\\n72 !((defined( amd64 ) || defined ( x86_64\n\
    ```\n\n## PLAN AHEAD\n\nWhile it’s great to wake up one morning and decide to\
    \ code a classic text adventure, it’s not always practical without a good plan.\
    \ Small snippets of code can be written without too much thought and planning\
    \ but longer and more in-depth code requires a good working plan to stick to and\
    \ help iron out the bugs.\n\n## USER ERROR\n\nUser input is often a paralysing\
    \ mistake in code. For example, when the user is supposed to enter a number for\
    \ their age and instead they enter it in letters. Often a user can enter so much\
    \ into an input that it overflows some internal buffer, thus sending the code\
    \ crashing. Watch those user inputs and clearly state what's needed from them.\n\
    \n```\nEnter an integer number\naswdfsf\nYou have entered wrong input\ns\nYou\
    \ have entered wrong input\n!\"£\"!£!\"\nYou have entered wrong input\nsdfsdf213213123\n\
    You have entered wrong input\n123234234234234234\nYou have entered wrong input\n\
    12\nthe number is: 12\n\nProcess returned 0 (0x0)   execution time : 21.495 s\n\
    Press any key to continue.\n```\n\n## BACKUPS\n\nAlways make a backup of your\
    \ work, with a secondary backup for any changes you've made. Mistakes can be rectified\
    \ if there's a good backup in place to revert to for those times when something\
    \ goes wrong. It's much easier to start where you left off, rather than starting\
    \ from the beginning again.\n\n## RE-INVENTING WHEELS\n\nYou can easily spend\
    \ days trying to fathom out a section of code to achieve a given result and it's\
    \ frustrating and often time-wasting. While it's equally rewarding to solve the\
    \ problem yourself, often the same code is out there on the Internet somewhere.\
    \ Don't try and re-invent the wheel, look to see if some else has done it first.\n\
    \n## SECURE DATA\n\nIf you're writing code to deal with usernames and passwords,\
    \ or other such sensitive data, then ensure that the data isn't in cleartext.\
    \ Learn how to create a function to encrypt sensitive data, prior to feeding into\
    \ a routine that can transmit or store it where someone may be able to get to\
    \ view it.\n\n## HELP!\n\nAsking for help is something most of us has struggled\
    \ with in the past. Will the people we're asking laugh at us? Am I wasting everyone's\
    \ time? It's a common mistake for someone to suffer in silence. However, as long\
    \ as you ask in the correct manner, obey any forum rules and be polite, then your\
    \ question isn't silly.\n\n## MATHS\n\nIf your code makes multiple calculations\
    \ then you need to ensure that the maths behind it is sound. There are thousands\
    \ of instances where programs have offered incorrect data based on poor mathematical\
    \ coding, which can have disastrous effects depending on what the code is set\
    \ to do. In short, double check your code equations.\n\n```\nset terminal x11\n\
    set output\n\nrmax = 5\nnmax = 100\n\ncomplex (x, y) = x * {1, 0} + y * {0, 1}\n\
    mandel (x, y, z, n) = (abs (z) > rmax || n >= 100)? n: mandel (x, y, z * z + complex\
    \ (x, y), n + 1)\n\nset xrange [-0.5:0.5]\nset yrange [-0.5:0.5]\nset logscale\
    \ z\nset samples 200\nset isosample 200\nset pm3d map\nset size square\na= #A#\n\
    b= #B#\nsplot mandel(-a/100,-b/100,complex(x,y),0) notitle\n```"
  mdcn: "## If... Else 语句\n\n在代码中使用 if 语句有一种好得多的方式，那就是 if... else。if... else 的工作方式与标准的\
    \ if 语句非常相似。如果布尔表达式为真，则执行花括号内的代码。否则，将使用下一组花括号内的代码。\n\n## 如果为真，否则为假\n\n在 if...\
    \ else 语句中，根据结果可以执行两个代码段。一旦你习惯了它的结构，就很容易想象出来。\n\n步骤 1 从一个新的 C++ 文件和标准头文件开始：\n\n\
    ```\n#include <iostream>\nusing namespace std;\nint main ()\n{\n}\n```\n\n步骤 2\
    \ 让我们扩展上一页 If 语句中的代码：\n\n```\n{\n    int num = 1;\n    if ( num < 30 )\n    {\n\
    \        cout << \"The number is less than 30!\" << endl;\n    }\n    else\n \
    \   {\n        cout << \"The number is greater than 30!\" << endl;\n    }\n  \
    \  return 0;\n}\n```\n\n步骤 3 代码中的第一行创建了一个名为 num 的整数，并将其值设为 1。if 语句检查 num 的值是否小于三十，如果是，则向控制台输出\
    \ \"The number is less than 30!\"。\n\n```\nif ( num < 30 )\n{\n    cout << \"\
    The number is less than 30!\" << endl;\n}\n```\n\n步骤 4 if 的配套语句 else 检查数字是否大于\
    \ 30，如果是，则向控制台显示 \"The number is greater than 30!\"；最后，代码顺利终止。\n\n```\ncout <<\
    \ \"The number is less than 30!\" << endl;\n}\nelse\n{\n    cout << \"The number\
    \ is greater than 30!\" << endl;\n}\n```\n\n步骤 5 你可以更改代码中 num 的值，或者通过要求用户输入一个值来改进代码：\n\
    \n```\n{\n    int num;\n    cout << \"Enter a number: \";\n    cin >> num;\n \
    \   if ( num < 30 )\n    {\n        cout << \"The number is less than 30!\" <<\
    \ endl;\n    }\n    else\n    {\n        cout << \"The number is greater than\
    \ 30!\" << endl;\n    }\n    return 0;\n}\n```\n\n步骤 6 代码的工作方式如预期一样，但如果你想在用户输入数字\
    \ 30 时显示一些内容呢？试试这个：\n\n```\n{\n    int num;\n\n    cout << \"Enter a number: \"\
    ;\n    cin >> num;\n\n    if ( num < 30 )\n    {\n        cout << \"The number\
    \ is less than 30!\" << endl;\n    }\n    else if ( num > 30 )\n    {\n      \
    \  cout << \"The number is greater than 30!\" << endl;\n    }\n    else if ( num\
    \ == 30 )\n    {\n        cout << \"The number is exactly 30!\" << endl;\n   \
    \ }\n\n    return 0;\n}\n```\n\n步骤 7 代码中的新增部分是所谓的嵌套 if... else 语句。这允许你检查多个条件。在这种情况下，如果用户输入一个小于\
    \ 30、大于 30 或正好是 30 的数字，会向他们呈现不同的结果。\n\n步骤 8 你可以更进一步，创建一个双人数字猜谜游戏。首先创建变量：\n\n```\n\
    int num, guess, tries = 0;\n\ncout << \"***** Two-player number guessing game\
    \ *****\" << endl;\ncout << \"\\nPlayer One, enter a number for Player Two to\
    \ guess: \" << endl;\ncin >> num;\ncout << string(50, '\\n');\n```\n\n步骤 9 `cout\
    \ << string(50, '\\n')` 这一行会清屏，这样玩家二就看不到输入的数字了。现在你可以创建一个 do... while 循环，结合 if...\
    \ else：\n\n```\ndo\n{\n    cout << \"\\nPlayer Two, enter your guess: \";\n  \
    \  cin >> guess;\n    tries++;\n    if (guess > num)\n    {\n        cout << \"\
    \\nToo High!\\n\" << endl;\n    }\n    else if (guess < num)\n    {\n        cout\
    \ << \"\\nToo Low!\\n\" << endl;\n    }\n    else if (guess == num)\n    {\n \
    \       cout << \"Well done! You got it in \" << tries << \" guesses!\" << endl;\n\
    \    }\n} while (guess != num);\n\nreturn 0;\n```\n\n步骤 10 找第二个玩家，然后构建并运行代码。玩家一输入要猜的数字，然后玩家二可以进行任意多次猜测，直到猜对数字。想让它更难吗？也许可以使用小数。\n\
    \n## 使用代码\n\n到现在为止，你应该已经掌握了用 Python 和 C++ 编程的基本构建块。你可以创建代码、存储数据、向用户提问、提供选择，并重复函数直到它们为真并提供正确的输出。那么接下来呢？\n\
    \n本节最后部分探讨了 Python 和 C++ 初学者常犯的一些编码错误，以及你可以去哪里继续你的编程之旅。\n\n## 常见编码错误\n\n当你开始接触新事物时，不可避免地会犯错误，这纯粹是由于缺乏经验，而这些错误本身就是很好的老师。然而，即使是专家偶尔也会犯错。关键在于，要尽可能从中学习。\n\
    \n## X=错误，打印 Y\n\n程序员需要注意的陷阱有很多，多到无法在此一一列举。能够识别错误并修复它，是你开始进入更高级领域的标志。\n\n## 小块学习\n\
    \n如果能像《黑客帝国》电影里的尼奥那样工作就好了。只需请求，你的操作员将其加载到你的记忆中，你就立刻知道了关于这个主题的一切。可惜的是，我们做不到。第一个主要的陷阱是有人试图学得太多、太快。所以，把编码分成小块，慢慢来。\n\
    \n## 简单的变量\n\n为变量使用有意义的命名是消除常见编码错误的必备条件。使用字母表中的字母是可以的，但当代码指出 x 变量有问题时会发生什么？将变量命名为\
    \ lives、money、player1 等并不太难。\n\n```\n1 var points = 1023;\n2 var lives = 3;\n\
    3 var totalTime = 45;\n4 write(\"Points: \"+points);\n5 write(\"Lives: \"+lives);\n\
    6 write(\"Total Time: \"+totalTime+\" secs\");\n7 write(\"---------------------------\"\
    );\n8 var totalScore = 0;\n9 write(\"Your total Score is: \"+totalScore);\n```\n\
    \n## //注释\n\n使用注释。这是一个简单的概念，但当你下次查看代码时，为代码添加注释可以节省很多问题。插入注释行可以帮助你快速筛选出导致问题的代码部分；如果你需要审查一段旧代码，这也很有用。\n\
    \n```\n52 orig += 2;\n53 target += 2;\n54 --n;\n55 }\n56 #endif\n57 if (n == 0)\n\
    58 return;\n59\n60 //\n61 // Loop unrolling. Here be dragons.\n62 //\n63\n64 //\
    \ (n & (~3)) is the greatest multiple of 4 r\n65 // In the while loop ahead, orig\
    \ will move ov\n66 // increments (4 elements of 2 bytes).\n67 // end marks our\
    \ barrier for not falling out\n68 char const * const end = orig + 2 * (n & ~3);\n\
    69\n70 // See if we're aligned for writting in\n71 #if ACE_SIZEOF_LONG == 8 &&\
    \ \\\n72 !((defined( amd64 ) || defined ( x86_64\n```\n\n## 提前规划\n\n虽然某天早上醒来决定编写一个经典的文本冒险游戏很棒，但如果没有一个好的计划，这并不总是可行的。小段代码可以不用太多思考和规划就能写出来，但更长、更深入的代码需要一个好的工作计划来遵循，并帮助排除错误。\n\
    \n## 用户错误\n\n用户输入通常是代码中的一个致命错误。例如，当用户应该输入他们的年龄数字时，他们却输入了字母。通常，用户可以在输入中输入太多内容，导致某些内部缓冲区溢出，从而使代码崩溃。注意那些用户输入，并清楚地说明需要他们提供什么。\n\
    \n```\nEnter an integer number\naswdfsf\nYou have entered wrong input\ns\nYou\
    \ have entered wrong input\n!\"£\"!£!\"\nYou have entered wrong input\nsdfsdf213213123\n\
    You have entered wrong input\n123234234234234234\nYou have entered wrong input\n\
    12\nthe number is: 12\n\nProcess returned 0 (0x0)   execution time : 21.495 s\n\
    Press any key to continue.\n```\n\n## 备份\n\n始终备份你的工作，并为所做的任何更改创建一个二级备份。如果有良好的备份可以在出错时恢复，那么错误是可以纠正的。从你离开的地方重新开始，比从头开始要容易得多。\n\
    \n## 重新发明轮子\n\n你很容易花费数天时间试图弄清楚一段代码以实现给定的结果，这既令人沮丧又常常浪费时间。虽然自己解决问题同样有成就感，但通常相同的代码在互联网上的某个地方已经存在。不要试图重新发明轮子，先看看是否有人已经做过了。\n\
    \n## 安全数据\n\n如果你正在编写处理用户名和密码或其他敏感数据的代码，那么请确保数据不是明文。在将敏感数据输入到可以传输或存储它的程序之前，学习如何创建一个函数来加密敏感数据，以防有人可能查看到它。\n\
    \n## 求助！\n\n寻求帮助是我们大多数人过去都曾挣扎过的事情。我们询问的人会嘲笑我们吗？我是在浪费大家的时间吗？默默忍受是一个常见的错误。然而，只要你以正确的方式提问，遵守任何论坛规则并保持礼貌，那么你的问题就并不愚蠢。\n\
    \n## 数学\n\n如果你的代码进行多次计算，那么你需要确保背后的数学是可靠的。有成千上万的实例表明，程序基于糟糕的数学编码提供了不正确的数据，这可能会根据代码的设定产生灾难性的后果。简而言之，仔细检查你的代码方程式。\n\
    \n```\nset terminal x11\nset output\n\nrmax = 5\nnmax = 100\n\ncomplex (x, y)\
    \ = x * {1, 0} + y * {0, 1}\nmandel (x, y, z, n) = (abs (z) > rmax || n >= 100)?\
    \ n: mandel (x, y, z * z + complex (x, y), n + 1)\n\nset xrange [-0.5:0.5]\nset\
    \ yrange [-0.5:0.5]\nset logscale z\nset samples 200\nset isosample 200\nset pm3d\
