    NPC[2][-0]


    ![](img/893ff1cb7ac32885c7c794a5e648f755_10_2.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_10_3.png)


    STEP 10 You can use the max and min functions to find the highest and lowest values
