    \nSTEP 7 Likewise, inputted data can be manipulated once you have it stored in\
    \ a variable. For instance, ask the user for two numbers and do some maths on\
    \ them:\n\n```\ncpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n\
    {\n    float num1, num2;\n\n    cout << \"Enter two numbers: \\n\";\n    cin >>\
    \ num1 >> num2;\n\n    cout << num1 << \" + \" << num2 << \" is: \" << num1 +\
    \ num2 << \"\\n\";\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_46_2.png)\n\
    \nSTEP 8 While cin works well for most input tasks, it does have a limitation.\
    \ Cin always considers spaces as a terminator, so it's designed for just single\
    \ words not multiple words. However, getline takes cin as the first argument and\
    \ the variable as the second:\n\n```\ncpp\n#include <iostream>\nusing namespace\
    \ std;\n\nint main ()\n{\n    string mystr;\n\n    cout << \"Enter a sentence:\
    \ \\n\";\n    getline (cin, mystr);\n\n    cout << \"Your sentence is: \" << mystr.size()\
    \ << \" characters long.\\n\";\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_46_3.png)\n\
    \nSTEP 9 Build and execute the code, then enter a sentence with spaces. When you're\
    \ done the code reads the number of characters. If you remove the getline line\
    \ and replace it with cin >> mystr and try again, the result displays the number\
    \ of characters up to the first space.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_46_4.png)\n\
    \nSTEP 10 Getline is usually a command that new C++ programmers forget to include.\
    \ The terminating white space is annoying when you can't figure out why your code\
    \ isn't working. In short, it's best to use getline(cin, variable) in future:\n\
    \n```\ncpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    string\
    \ name;\n\n    cout << \"Enter your full name: \\n\";\n    getline (cin, name);\n\
    \n    cout << \"\\nHello, \" << name << \"\\n\";\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_46_5.png)"
  - "[PAGE 47]\n\n# Character Literals\n\nIn C++ a literal is an object or variable\
    \ that once defined remains the same throughout the code. However, a character\
    \ literal is defined by a backslash, such as the \\n you've been using at the\
    \ end of a cout statement to signify a new line.\n\n# ESCAPE SEQUENCE\n\nWhen\
    \ used in something like a cout statement, character literals are also called\
    \ Escape Sequence Codes. They allow you to insert a quote, an alert, new line\
    \ and much more.\n\nSTEP 1 Create a new C++ file and enter the relevant headers:\n\
    \n```\n#include <iostream>\nusing namespace std;\nint main ()\n{\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_47_0.png)\n\
    \nSTEP 3 If you wanted to insert speech quotes inside a cout statement, you would\
    \ have to use a backslash as it already uses quotes:\n\n```\n#include <iostream>\n\
    using namespace std;\nint main ()\n{\n    cout << \"Hello, user. This is how to\
    \ use \"quotes\".\";\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_47_1.png)\n\
    \nSTEP 2 You've already experienced the \\n character literal placing a new line\
    \ wherever it's called. The line: **cout << \"Hello\\n\" << \"I'm a C++\\n\" <<\
    \ \"Program\\n\";** outputs three lines of text, each starting after the last\
    \ \\n.\n\n```\n#include <iostream>\nusing namespace std;\nint main ()\n{\n   \
    \ cout << \"Hello\\n\" << \"I'm a C++\\n\" << \"Program\\n\";\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_47_2.png)\n\
    \nSTEP 4 There's even a character literal that can trigger an alarm. In Windows\
    \ 10, it's the notification sound that chimes when you use \\a. Try this code,\
    \ and turn up your sound.\n\n```\n#include <iostream>\nusing namespace std;\n\
    int main ()\n{\n    cout << \"ALARM! \\a\";\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_47_3.png)"
- md: "## A HANDY CHART\n\nThere are numerous character literals, or escape sequence\
    \ codes, to choose from. We therefore thought it would be good for you to have\
    \ a handy chart available, for those times when you need to insert a code.\n\n\
    | ESCAPE SEQUENCE CODE | CHARACTER |\n|---|---|\n| \\ | Backslash |\n| \\' | Single\
    \ Quote |\n| \" | Double Quote (Speech Marks) |\n| \\? | Question Mark |\n| \\\
    a | Alert/Alarm |\n| \\b | Backspace |\n| \\f | Form Feed |\n| \\n | New Line\
    \ |\n| \\r | Carriage Return |\n| \\t | Horizontal Tab |\n| \\v | Vertical Tab\
    \ |\n| \\0 | Null Character |\n| \\uxxxx | Unicode (UTF-8) |\n| \\Uxxxxxxxx |\
    \ Unicode (UTF-16) |\n\n## UNICODE CHARACTERS (UTF-8)\n\nUnicode characters are\
    \ symbols or characters that are standard across all platforms. For example, the\
    \ copyright symbol, that can be entered via the keyboard by entering the Unicode\
    \ code, followed by ALT+X. In the case of the copyright symbol enter: 00A9 Alt+X.\
    \ In C++ code, you would enter:\n\n```\n#include <iostream>\nusing namespace std;\n\
    int main ()\n{\n    cout << \"\\u00A9\";\n}\n```\n\n## UNICODE CHARACTER TABLE\n\
    \nA complete list of the available Unicode characters can be found at www.unicode-table.com/en/.\
    \ Hover your mouse over the character to see its unique code to enter in C++.\n\
    \n## Defining Constants\n\nConstants are fixed values in your code. They can be\
    \ any basic data type but as the name suggests their value remains constant throughout\
    \ the entire code. There are two separate ways to define a constant in C++, the\
    \ #define pre-processor and const.\n\n## #DEFINE\n\nThe pre-processors are instructions\
    \ to the compiler to pre-process the information before it goes ahead and compiles\
    \ the code. #include is a pre-processor as is #define.\n\nSTEP 1 You can use the\
    \ #define pre-processor to define any constants you want in our code. Start by\
    \ creating a new C++ file complete with the usual headers:\n\n```\n#include <iostream>\n\
    using namespace std;\nint main ()\n{\n}\n```\n\nSTEP 2 Now let's assume your code\
    \ has three different constants: length, width and height. You can define them\
    \ with:\n\n```\n#include <iostream>\nusing namespace std;\n#define LENGTH 50\n\
    #define WIDTH 40\n#define HEIGHT 60\nint main ()\n{\n}\n```\n\nSTEP 3 Note the\
    \ capitals for defined constants, it's considered good programming practise to\
    \ define all constants in capitals. Here, the assigned values are 50, 40 and 60,\
    \ so let's call them up:\n\n```\n#include <iostream>\nusing namespace std;\n#define\
    \ LENGTH 50\n#define WIDTH 40\n#define HEIGHT 60\nint main ()\n{\n    cout <<\
    \ \"Length is: \" << LENGTH << \"\\n\";\n    cout << \"Width is: \" << WIDTH <<\
    \ \"\\n\";\n    cout << \"Height is: \" << HEIGHT << \"\\n\";\n}\n```\n\nSTEP\
    \ 4 Build and run the code. Just as expected, it displays the values for each\
    \ of the constants created. It's worth noting that you don't need a semicolon\
    \ when you're defining a constant with the #define keyword.\n\nSTEP 5 You can\
    \ also define other elements as a constant. For example, instead of using \\n\
    \ for a newline in the cout statement, you can define it at the start of the code:\n\
    \n```\n#include <iostream>\nusing namespace std;\n\n#define LENGTH 50\n#define\
    \ WIDTH 40\n#define HEIGHT 60\n#define NEWLINE '\\n'\n\nint main ()\n{\n    cout\
    \ << \"Length is: \" << LENGTH << NEWLINE;\n    cout << \"Width is: \" << WIDTH\
    \ << NEWLINE;\n    cout << \"Height is: \" << HEIGHT << NEWLINE;\n}\n```\n\nSTEP\
    \ 6 The code, when built and executed, does exactly the same as before, using\
    \ the new constant NEWLINE to insert a newline in the cout statement. Incidentally,\
    \ creating a newline constant isn't a good idea unless you're making it smaller\
    \ than \\n or even the endl command.\n\nSTEP 7 Defining a constant is a good way\
    \ of initialising your base values at the start of your code. You can define that\
    \ your game has three lives, or even the value of PI without having to call up\
    \ the C++ math library:\n\n```\n#include <iostream>\nusing namespace std;\n\n\
    #define PI 3.14159\n\nint main ()\n{\n    cout << \"The value of Pi is: \" <<\
    \ PI << endl;\n}\n```\n\nSTEP 8 Another method of defining a constant is with\
    \ the const keyword. Use const together with a data type, variable and value:\
    \ const type variable = value. Using Pi as an example:\n\n```\n#include <iostream>\n\
    using namespace std;\n\nint main ()\n{\n    const double PI = 3.14159;\n    cout\
    \ << \"The value of Pi is: \" << PI << endl;\n}\n```\n\nSTEP 9 Because you're\
    \ using const within the main block of code, you need to finish the line with\
    \ a semicolon. You can use either, as long as the names and values don't clash,\
    \ but it's worth mentioning that #define requires no memory, so if you're coding\
    \ to a set amount of memory, #define is your best bet.\n\nSTEP 10 Const works\
    \ in much the same way as #define. You can create static integers and even newlines:\n\
    \n```\n#include <iostream>\nusing namespace std;\n\nint main()\n{\n    const int\
    \ LENGTH = 50;\n    const int WIDTH = 40;\n    const char NEWLINE = '\\n';\n\n\
    \    int area;\n    area = LENGTH * WIDTH;\n\n    cout << \"Area is: \" << area\
    \ << NEWLINE;\n}\n```\n\n## File Input/Output\n\nThe standard iostream library\
    \ provides C++ coders with the cin and cout input and output functionality. However,\
    \ to be able to read and write from a file you need to utilise another C++ library,\
    \ called fstream.\n\n## FSTREAMS\n\nThere are two main data types within the fstream\
    \ library that are used to open a file, read from it and write to it, ofstream\
    \ and ifstream. Here’s how they work.\n\nSTEP 1 The first task is to create a\
    \ new C++ file and along with the usual headers you need to include the new fstream\
    \ header:\n\n```\n#include <iostream>\n#include <fstream>\nusing namespace std;\n\
    int main ()\n{\n\n}\n```\n\nSTEP 2 Begin by asking a user for their name and writing\
    \ that information to a file. You need the usual string to store the name, and\
    \ getline to accept the input from the user.\n\n```\n#include <iostream>\n#include\
    \ <fstream>\nusing namespace std;\nint main ()\n{\n    string name;\n    ofstream\
    \ newfile;\n    newfile.open(\"name.txt\");\n    cout << \"Enter your name: \"\
    \ << endl;\n    getline(cin, name);\n    newfile << name << endl;\n    newfile.close();\n\
    }\n```\n\nSTEP 3 We’ve included comments in the screenshot of step 2 to help you\
    \ understand the process. You created a string called name, to store the user’s\
    \ inputted name. You also created a text file called name.txt (with the ofstream\
    \ newfile and newfile.open lines), asked the user for their name and stored it\
    \ and then written the data to the file.\n\nSTEP 4 To read the contents of a file,\
    \ and output it to the screen, you need to do things slightly differently. First\
    \ you need to create a string variable to store the file’s contents (line by line),\
    \ then open the file, use getline to read the file line by line and output those\
    \ lines to the screen. Finally, close the file.\n\n```\nstring line;\nifstream\
    \ newfile (\"name.txt\");\ncout << \"Contents of the file: \" << endl;\ngetline(newfile,\
    \ line);\ncout << line << endl;\nnewfile.close();\n```\n\nSTEP 5 The code above\
    \ is great for opening a file with one or two lines but what if there are multiple\
    \ lines? Here we opened a text file of the poem Cimmeria, by Robert E Howard:\n\
    \n```\nstring line;\nifstream newfile (\"c:\\\\users\\\\david\\\\Documents\\\\\
    Cimmeria.txt\");\ncout << \"Cimmeria, by Robert E Howard: \\n\" << endl;\nwhile\
    \ (getline(newfile, line))\n    cout << line << endl;\nnewfile.close();\n```\n\
    \nSTEP 6 You can no doubt see that we've included a while loop, which we cover\
    \ in a few pages time. It means that while there are lines to be read from the\
    \ text file, C++ getlines them. Once all the lines are read, the output is displayed\
    \ on the screen and the file is closed.\n\nSTEP 7 You can also see that the location\
    \ of the text file Cimmeria.txt isn't in the same folder as the C++ program. When\
    \ we created the first name.txt file, it was written to the same folder where\
    \ the code was located; this is done by default. To specify another folder, you\
    \ need to use double-back slashes, as per the character literals/escape sequence\
    \ code.\n\n```\nstring line;\nifstream newfile (\"c:\\\\users\\\\david\\\\Documents\\\
    \\Cimmeria.txt\");\ncout << \"Cimmeria, by Robert E Howard: \\n\" << endl;\n```\n\
    \nSTEP 8 Just as you might expect, you can write almost anything you like to a\
    \ file, for reading either in Notepad or via the console through the C++ code:\n\
    \n```\nstring name;\nint age;\nofstream newfile;\nnewfile.open(\"name.txt\");\n\
    cout << \"Enter your name: \" << endl;\ngetline(cin, name);\nnewfile << name <<\
    \ endl;\ncout << \"\\nHow old are you: \" << endl;\ncin >> age;\nnewfile << age\
    \ << endl;\nnewfile.close();\n```\n\nSTEP 9 The code from step 8 differs again,\
    \ but only where it comes to adding the age integer. Notice that we used cin >>\
    \ age, instead of the previous getline(cin, variable). The reason for this is\
    \ that the getline function handles strings, not integers; so when you're using\
    \ a data type other than a string, use the standard cin.\n\nSTEP 10 Here's an\
    \ exercise: see if you can create code to write several different elements to\
    \ a text file. You can have a user's name, age, phone number etc. Maybe even the\
    \ value of Pi and various mathematical elements. It's all good practice."
  mdcn: "## 便捷参考表\n\n有众多的字符字面量或转义序列代码可供选择。因此，我们认为为您准备一份便捷参考表会很有帮助，以便在需要插入代码时查阅。\n\n\
    | 转义序列代码 | 字符 |\n|---|---|\n| \\ | 反斜杠 |\n| \\' | 单引号 |\n| \" | 双引号（引号） |\n| \\\
    ? | 问号 |\n| \\a | 警报/响铃 |\n| \\b | 退格 |\n| \\f | 换页 |\n| \\n | 换行 |\n| \\r | 回车\
    \ |\n| \\t | 水平制表符 |\n| \\v | 垂直制表符 |\n| \\0 | 空字符 |\n| \\uxxxx | Unicode (UTF-8)\
    \ |\n| \\Uxxxxxxxx | Unicode (UTF-16) |\n\n## UNICODE 字符 (UTF-8)\n\nUnicode 字符是跨所有平台通用的符号或字符。例如，版权符号可以通过键盘输入\
    \ Unicode 代码，然后按 ALT+X 来输入。对于版权符号，输入：00A9 Alt+X。在 C++ 代码中，你会输入：\n\n```\n#include\
    \ <iostream>\nusing namespace std;\nint main ()\n{\n    cout << \"\\u00A9\";\n\
    }\n```\n\n## UNICODE 字符表\n\n完整的可用 Unicode 字符列表可在 www.unicode-table.com/en/ 找到。将鼠标悬停在字符上，即可查看其在\
    \ C++ 中输入的唯一代码。\n\n## 定义常量\n\n常量是代码中的固定值。它们可以是任何基本数据类型，但顾名思义，它们的值在整个代码中保持不变。在\
    \ C++ 中定义常量有两种不同的方式：`#define` 预处理器和 `const`。\n\n## #DEFINE\n\n预处理器是指令，用于在编译器继续编译代码之前预处理信息。`#include`\
    \ 是一个预处理器，`#define` 也是。\n\n步骤 1 你可以使用 `#define` 预处理器来定义代码中所需的任何常量。首先创建一个新的 C++\
    \ 文件，并包含通常的头文件：\n\n```\n#include <iostream>\nusing namespace std;\nint main ()\n\
    {\n}\n```\n\n步骤 2 现在假设你的代码有三个不同的常量：长度、宽度和高度。你可以用以下方式定义它们：\n\n```\n#include <iostream>\n\
    using namespace std;\n#define LENGTH 50\n#define WIDTH 40\n#define HEIGHT 60\n\
    int main ()\n{\n}\n```\n\n步骤 3 注意定义的常量使用大写字母，将所有常量定义为大写被认为是良好的编程实践。这里，赋值分别为 50、40\
    \ 和 60，所以让我们调用它们：\n\n```\n#include <iostream>\nusing namespace std;\n#define LENGTH\
    \ 50\n#define WIDTH 40\n#define HEIGHT 60\nint main ()\n{\n    cout << \"Length\
    \ is: \" << LENGTH << \"\\n\";\n    cout << \"Width is: \" << WIDTH << \"\\n\"\
    ;\n    cout << \"Height is: \" << HEIGHT << \"\\n\";\n}\n```\n\n步骤 4 构建并运行代码。正如预期的那样，它显示了每个创建的常量的值。值得注意的是，使用\
    \ `#define` 关键字定义常量时，不需要分号。\n\n步骤 5 你也可以将其他元素定义为常量。例如，与其在 `cout` 语句中使用 `\\n` 表示换行，不如在代码开头定义它：\n\
    \n```\n#include <iostream>\nusing namespace std;\n\n#define LENGTH 50\n#define\
    \ WIDTH 40\n#define HEIGHT 60\n#define NEWLINE '\\n'\n\nint main ()\n{\n    cout\
    \ << \"Length is: \" << LENGTH << NEWLINE;\n    cout << \"Width is: \" << WIDTH\
    \ << NEWLINE;\n    cout << \"Height is: \" << HEIGHT << NEWLINE;\n}\n```\n\n步骤\
    \ 6 代码构建并执行后，与之前完全相同，只是使用了新的常量 `NEWLINE` 在 `cout` 语句中插入换行。顺便说一句，创建换行常量并不是个好主意，除非你将其定义得比\
    \ `\\n` 甚至 `endl` 命令更小。\n\n步骤 7 定义常量是在代码开头初始化基础值的好方法。你可以定义你的游戏有三条生命，甚至定义 PI 的值，而无需调用\
    \ C++ 数学库：\n\n```\n#include <iostream>\nusing namespace std;\n\n#define PI 3.14159\n\
    \nint main ()\n{\n    cout << \"The value of Pi is: \" << PI << endl;\n}\n```\n\
    \n步骤 8 定义常量的另一种方法是使用 `const` 关键字。将 `const` 与数据类型、变量和值一起使用：`const type variable\
    \ = value`。以 Pi 为例：\n\n```\n#include <iostream>\nusing namespace std;\n\nint main\
    \ ()\n{\n    const double PI = 3.14159;\n    cout << \"The value of Pi is: \"\
    \ << PI << endl;\n}\n```\n\n步骤 9 因为你在 `main` 代码块内使用 `const`，所以需要用分号结束该行。你可以使用任一种方式，只要名称和值不冲突即可，但值得一提的是，`#define`\
    \ 不需要内存，所以如果你在内存有限的情况下编码，`#define` 是你的最佳选择。\n\n步骤 10 `const` 的工作方式与 `#define`\
    \ 大致相同。你可以创建静态整数甚至换行符：\n\n```\n#include <iostream>\nusing namespace std;\n\nint\
    \ main()\n{\n    const int LENGTH = 50;\n    const int WIDTH = 40;\n    const\
    \ char NEWLINE = '\\n';\n\n    int area;\n    area = LENGTH * WIDTH;\n\n    cout\
    \ << \"Area is: \" << area << NEWLINE;\n}\n```\n\n## 文件输入/输出\n\n标准 iostream 库为\
    \ C++ 程序员提供了 `cin` 和 `cout` 的输入输出功能。然而，要能够从文件读取和写入，你需要使用另一个名为 fstream 的 C++ 库。\n\
    \n## FSTREAMS\n\nfstream 库中有两种主要的数据类型，用于打开文件、从中读取和写入：`ofstream` 和 `ifstream`。以下是它们的工作原理。\n\
    \n步骤 1 首要任务是创建一个新的 C++ 文件，除了通常的头文件外，你还需要包含新的 fstream 头文件：\n\n```\n#include <iostream>\n\
    #include <fstream>\nusing namespace std;\nint main ()\n{\n\n}\n```\n\n步骤 2 首先询问用户的姓名，并将该信息写入文件。你需要通常的字符串来存储姓名，以及\
    \ `getline` 来接受用户的输入。\n\n```\n#include <iostream>\n#include <fstream>\nusing namespace\
    \ std;\nint main ()\n{\n    string name;\n    ofstream newfile;\n    newfile.open(\"\
    name.txt\");\n    cout << \"Enter your name: \" << endl;\n    getline(cin, name);\n\
    \    newfile << name << endl;\n    newfile.close();\n}\n```\n\n步骤 3 我们在步骤 2 的截图中添加了注释以帮助你理解过程。你创建了一个名为\
    \ `name` 的字符串来存储用户输入的姓名。你还创建了一个名为 `name.txt` 的文本文件（通过 `ofstream newfile` 和 `newfile.open`\
    \ 行），询问用户的姓名并存储它，然后将数据写入文件。\n\n步骤 4 要读取文件内容并将其输出到屏幕，你需要稍有不同的操作。首先，你需要创建一个字符串变量来存储文件内容（逐行），然后打开文件，使用\
    \ `getline` 逐行读取文件，并将这些行输出到屏幕。最后，关闭文件。\n\n```\nstring line;\nifstream newfile\
    \ (\"name.txt\");\ncout << \"Contents of the file: \" << endl;\ngetline(newfile,\
    \ line);\ncout << line << endl;\nnewfile.close();\n```\n\n步骤 5 上面的代码非常适合打开只有一两行的文件，但如果有多行呢？这里我们打开了一个包含罗伯特·E·霍华德的诗《西米里亚》的文本文件：\n\
    \n```\nstring line;\nifstream newfile (\"c:\\\\users\\\\david\\\\Documents\\\\\
    Cimmeria.txt\");\ncout << \"Cimmeria, by Robert E Howard: \\n\" << endl;\nwhile\
    \ (getline(newfile, line))\n    cout << line << endl;\nnewfile.close();\n```\n\
    \n步骤 6 你无疑可以看到我们包含了一个 `while` 循环，我们将在几页后介绍它。它的意思是，只要文本文件中有行可读，C++ 就会逐行读取。一旦所有行都被读取，输出就会显示在屏幕上，文件也会被关闭。\n\
    \n步骤 7 你还可以看到文本文件 `Cimmeria.txt` 的位置与 C++ 程序不在同一个文件夹中。当我们创建第一个 `name.txt` 文件时，它被写入到代码所在的同一文件夹中；这是默认行为。要指定另一个文件夹，你需要使用双反斜杠，如字符字面量/转义序列代码所示。\n\
    \n```\nstring line;\nifstream newfile (\"c:\\\\users\\\\david\\\\Documents\\\\\
    Cimmeria.txt\");\ncout << \"Cimmeria, by Robert E Howard: \\n\" << endl;\n```\n\
    \n步骤 8 正如你可能预期的那样，你可以将几乎任何你喜欢的内容写入文件，以便在记事本中阅读或通过 C++ 代码在控制台中读取：\n\n```\nstring\
    \ name;\nint age;\nofstream newfile;\nnewfile.open(\"name.txt\");\ncout << \"\
    Enter your name: \" << endl;\ngetline(cin, name);\nnewfile << name << endl;\n\
    cout << \"\\nHow old are you: \" << endl;\ncin >> age;\nnewfile << age << endl;\n\
    newfile.close();\n```\n\n步骤 9 步骤 8 的代码再次有所不同，但仅在添加年龄整数方面。注意我们使用了 `cin >> age`，而不是之前的\
    \ `getline(cin, variable)`。原因是 `getline` 函数处理字符串，而不是整数；所以当你使用字符串以外的数据类型时，请使用标准的\
    \ `cin`。\n\n步骤 10 这里有一个练习：看看你能否创建代码将几个不同的元素写入文本文件。你可以包含用户的姓名、年龄、电话号码等。甚至可以是 Pi\
    \ 的值和各种数学元素。这都是很好的练习。"
