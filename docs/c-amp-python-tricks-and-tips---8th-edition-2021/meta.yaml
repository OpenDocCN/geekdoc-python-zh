  - '[PAGE 29]


    # Calendar Module


    Beyond the time module, the calendar module can produce some interesting results
    when executed within your code. It does far more than simply display the date
    in the time module-like format, you can actually call up a wall calendar type
    display.


    # WORKING WITH DATES


    The calendar module is built into Python 3. However, if for some reason it''s
    not installed you can add it using `pip install calendar` as a Windows administrator
    or `sudo pip install calendar` for Linux and macOS.


    **STEP 1** Launch Python 3 and enter: `import calendar` to call up the module
    and its inherent functions. Once it''s loaded into memory, start by entering:

    `sep=calendar.TextCalendar(calendar.SUNDAY)`

    `sep.prmonth(2017, 9)`


    **STEP 3** There are numerous functions within the calendar module that may be
    of interest to you when forming your own code. For example, you can display the
    number of leap years between two specific years:

    `leaps=calendar.leapdays(1900, 2018)`

    `print(leaps)`

    The result is 29, starting from 1904 onward.


    ![](img/893ff1cb7ac32885c7c794a5e648f755_29_0.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_29_1.png)


    **STEP 2** You can see that the days of September 2017 are displayed in a wall
    calendar fashion. Naturally you can change the 2017, 9 part of the second line
    to any year and month you want, a birthday for example (1973, 6). The first line
    configures TextCalendar to start its weeks on a Sunday; you can opt for Monday
    if you prefer.


    **STEP 4** You could even fashion that particular example into a piece of working,
    user interactive Python code:

    `import calendar`

    `print(">>>>>>>>>>>Leap Year Calculator<<<<<<<<<<\n")y1=int(input("Enter the first
    year: "))`

    `y2=int(input("Enter the second year: "))`

    `leaps=calendar.leapdays(y1, y2)`

    `print("Number of leap years between", y1, "and", y2, "is:", leaps)`


    ![](img/893ff1cb7ac32885c7c794a5e648f755_29_2.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_29_3.png)'
- md: "## Calendar Module\n\nSTEP 5 You can also create a program that will display\
    \ all the days, weeks and months within a given year:\n\n```python\nimport calendar\n\
    year=int(input(\"Enter the year to display: \"))\nprint(calendar.prcal(year))\n\
    ```\n\nWe're sure you'll agree that's quite a handy bit of code to have to hand.\n\
    \nSTEP 8 You're also able to print the individual months or days of the week:\n\
    \n```python\nimport calendar\nfor name in calendar.month_name:\n    print(name)\n\
    \nimport calendar\nfor name in calendar.day_name:\n    print(name)\n```\n\nSTEP\
    \ 6 Interestingly we can also list the number of days in a month by using a simple\
    \ for loop:\n\n```python\nimport calendar\ncal=calendar.TextCalendar(calendar.SUNDAY)\n\
    for i in cal.itermonthdays(2018, 6):\n    print(i)\n```\n\nSTEP 9 The calendar\
    \ module also allows us to write the functions in HTML, so that you can display\
    \ it on a website. Let's start by creating a new file:\n\n```python\nimport calendar\n\
    cal=open(\"/home/pi/Documents/cal.html\", \"w\")\nc=calendar.HTMLCalendar(calendar.SUNDAY)\n\
    cal.write(c.formatmonth(2018, 1))\ncal.close()\n```\n\nThis code will create an\
    \ HTML file called cal, open it with a browser and it displays the calendar for\
    \ January 2018.\n\nSTEP 7 You can see that code produced some zeros at the beginning,\
    \ this is due to the starting day of the week, Sunday in this case, and overlapping\
    \ days from the previous month. So the counting of the days will start on Friday\
    \ 1st June 2018 and will total 30 as the output correctly displays.\n\nSTEP 10\
    \ Of course, you can modify that to display a given year as a web page calendar:\n\
    \n```python\nimport calendar\nyear=int(input(\"Enter the year to display as a\
    \ webpage: \"))\ncal=open(\"/home/pi/Documents/cal.html\", \"w\")\ncal.write(calendar.HTMLCalendar(calendar.MONDAY).formatyear(year))\n\
    cal.close()\n```\n\nThis code asks the user for a year, then creates the necessary\
    \ webpage. Remember to change your file destination.\n\n## OS Module\n\nThe OS\
    \ module allows you to interact directly with the built-in commands found in your\
    \ operating system. Commands vary depending on the OS you’re running, as some\
    \ will work with Windows whereas others will work with Linux and macOS.\n\n###\
    \ INTO THE SYSTEM\n\nOne of the primary features of the OS module is the ability\
    \ to list, move, create, delete and otherwise interact with files stored on the\
    \ system, making it the perfect module for backup code.\n\nSTEP 1 You can start\
    \ the OS module with some simple functions to see how it interacts with the operating\
    \ system environment that Python is running on. If you’re using Linux or the Raspberry\
    \ Pi, try this:\n\n```python\nimport os\nhome=os.getcwd()\nprint(home)\n```\n\n\
    STEP 3 The Windows output is different as that’s the current working directory\
    \ of Python, as determined by the system; as you might suspect, the os.getcwd()\
    \ function is asking Python to retrieve the Current Working Directory. Linux users\
    \ will see something along the same lines as the Raspberry Pi, as will macOS users.\n\
    \nSTEP 2 The returned result from printing the variable home is the current user’s\
    \ home folder on the system. In our example that’s /home/pi; it will be different\
    \ depending on the user name you log in as and the operating system you use. For\
    \ example, Windows 10 will output: C:\\Program Files (x86)\\Python36-32.\n\nSTEP\
    \ 4 Yet another interesting element to the OS module, is its ability to launch\
    \ programs that are installed in the host system. For instance, if you wanted\
    \ to launch the Chromium browser from within a Python program you can use the\
    \ command:\n\n```python\nimport os\nbrowser=os.system(\"/usr/bin/chromium-browser\"\
    )\n```\n\nSTEP 5 The os.system() function is what allows interaction with external\
    \ programs; you can even call up previous Python programs using this method. You\
    \ will obviously need to know the full path and program file name for it to work\
    \ successfully. However, you can use the following:\n\n```python\nimport os\n\
    os.system('start chrome \"https://www.youtube.com/feed/music\"')\n```\n\nSTEP\
    \ 6 For Step 5's example we used Windows, to show that the OS module works roughly\
    \ the same across all platforms. In that case, we opened YouTube's music feed\
    \ page, so it is therefore possible to open specific pages:\n\n```python\nimport\
    \ os\nos.system('chromium-browser \"http://bdmpublications.com/\"')\n```\n\nSTEP\
    \ 7 Note in the previous step's example the use of single and double-quotes. The\
    \ single quotes encase the entire command and launching Chromium, whereas the\
    \ double quotes open the specified page. You can even use variables to call multiple\
    \ tabs in the same browser:\n\n```python\nimport os\na=('chromium-browser \"http://bdmpublications.com/\"\
    ')\nb=('chromium-browser \"http://www.google.co.uk\"')\nos.system(a + b)\n```\n\
    \nSTEP 8 The ability to manipulate directories, or folders if you prefer, is one\
    \ of the OS module's best features. For example, to create a new directory you\
    \ can use:\n\n```python\nimport os\nos.mkdir(\"NEW\")\n```\n\nThis creates a new\
    \ directory within the Current Working Directory, named according to the object\
    \ in the mkdir function.\n\nSTEP 9 You can also rename any directories you've\
    \ created by entering:\n\n```python\nimport os\nos.rename(\"NEW\", \"OLD\")\n\
    ```\n\nTo delete them:\n\n```python\nimport os\nos.rmdir(\"OLD\")\n```\n\nSTEP\
    \ 10 Another module that goes together with OS is shutil. You can use the shutil\
    \ module together with OS and time to create a time-stamped backup directory,\
    \ and copy files into it:\n\n```python\nimport os, shutil, time\n\nroot_src_dir\
    \ = r'/home/pi/Documents'\nroot_dst_dir = '/home/pi/backup/' + time.asctime()\n\
    \nfor src_dir, dirs, files in os.walk(root_src_dir):\n    dst_dir = src_dir.replace(root_src_dir,\
    \ root_dst_dir, 1)\n    if not os.path.exists(dst_dir):\n        os.makedirs(dst_dir)\n\
    \    for file_ in files:\n        src_file = os.path.join(src_dir, file_)\n  \
    \      dst_file = os.path.join(dst_dir, file_)\n        if os.path.exists(dst_file):\n\
    \            os.remove(dst_file)\n        shutil.copy(src_file, dst_dir)\n\nprint(\"\
    >>>>>>>>>>>Backup complete<<<<<<<<<<\")\n```\n\n## Random Module\n\nThe random\
    \ module is one you will likely come across many times in your Python programming\
    \ lifetime; as the name suggests, it's designed to create random numbers or letters.\
    \ However, it's not exactly random but it will suffice for most needs.\n\n###\
    \ RANDOM NUMBERS\n\nThere are numerous functions within the random module, which\
    \ when applied can create some interesting and very useful Python programs.\n\n\
    STEP 1 Just as with other modules you need to import random before you can use\
    \ any of the functions we're going to look at in this tutorial. Let's begin by\
    \ simply printing a random number from 1 to 5:\n\n```python\nimport random\nprint(random.randint(0,5))\n\
    ```\n\nSTEP 4 However, the random module isn't used exclusively for numbers. You\
    \ can use it to select an entry from a list from random, and the list can contain\
    \ anything:\n\n```python\nimport random\nrandom.choice([\"Conan\", \"Valeria\"\
    , \"Belit\"])\n```\n\nThis will display one of the names of our adventurers at\
    \ random, which is a great addition to a text adventure game.\n\nSTEP 2 In our\
    \ example the number four was returned. However, enter the print function a few\
    \ more times and it will display different integer values from the set of numbers\
    \ given, zero to five. The overall effect, although pseudo-random, is adequate\
    \ for the average programmer to utilise in their code.\n\nSTEP 5 You can extend\
    \ the previous example somewhat by having random.choice() select from a list of\
    \ mixed variables. For instance:\n\n```python\nimport random\nlst=[\"David\",\
    \ 44, \"BDM Publications\", 3245.23,\n\"Pi\", True, 3.14, \"Python\"]\nrnd=random.choice(lst)\n\
    print(rnd)\n```\n\nSTEP 3 For a bigger set of numbers, including floating point\
    \ values, you can extend the range by using the multiplication sign:\n\n```python\n\
    import random\nprint(random.random() *100)\n```\n\nWill display a floating point\
    \ number between 0 and 100, to the tune of around fifteen decimal points."
