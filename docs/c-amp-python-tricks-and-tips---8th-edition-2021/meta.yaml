    \ txt.close()\nexcept IOError:\n    print (\"Error: unable to write the file.\
    \ Check permissions\")\n```\n\n第10步 如前所述，由于使用了\"r\"只读权限，会发生错误。如果你将其更改为\"w\"，那么代码将执行而不会在IDLE\
