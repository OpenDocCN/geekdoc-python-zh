  md: "# COUNTING LOOPS\n\nRemember that in Python a loop doesn't count the last number\
    \ you specify in a range. So if you wanted the loop to count from 1 to 10, then\
    \ you will need to use:\n\n```\nn = list(range(1, 11))\n```\n\nWhich will return\
    \ 1 to 10.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_70_0.png)\n\n# CASE SENSITIVE\n\
    \nPython is a case sensitive programming language, so you will need to check any\
    \ variables you assign. For example, `Lives=10` is a different variable to `lives=10`,\
    \ calling the wrong variable in your code can have unexpected results.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_70_1.png)\n\
    \n# BRACKETS\n\nEveryone forgets to include that extra bracket they should have\
    \ added to the end of the statement. Python relies on the routine having an equal\
    \ amount of closed brackets to open brackets, so any errors in your code could\
    \ be due to you forgetting to count your brackets; including square brackets.\n\
    \n```\ndef print_game_status(self):\n    print (board[len(self.missed_letters)])\n\
    \    print ('Word: ' + self.hide_word())\n    print ('Letters Missed: ',)\n  \
    \  for letter in self.missed_letters:\n        print (letter,)\n    print ()\n\
    \    print ('Letters Guessed: ',)\n    for letter in self.guessed_letters:\n \
    \       print (letter,)\n    print ()\n```\n\n# COLONS\n\nIt's common for beginners\
    \ to forget to add a colon to the end of a structural statement, such as:\n\n\
    ```\nclass Hangman:\ndef guess(self, letter):\n```\n\nAnd so on. The colon is\
    \ what separates the code, and creates the indents to which the following code\
    \ belongs to.\n\n```\nclass Hangman:\n    def __init__(self,word):\n        self.word\
    \ = word\n        self.missed_letters = []\n        self.guessed_letters = []\n\
    \n    def guess(self,letter):\n        if letter in self.word and letter not in\
    \ self.guessed_letters:\n            self.guessed_letters.append(letter)\n   \
    \     elif letter not in self.word and letter not in self.missed_letters:\n  \
    \          self.missed_letters.append(letter)\n        else:\n            return\
    \ False\n        return True\n\n    def hangman_over(self):\n        return self.hangman_won()\
    \ or (len(self.missed_letters) == 6)\n\n    def hangman_won(self):\n        if\
    \ '_' not in self.hide_word():\n            return True\n        return False\n\
    \n    def hide_word(self):\n        rtn = ''\n        for letter in self.word:\n\
    \            if letter not in self.guessed_letters:\n                rtn += '_'\n\
    \            else:\n                rtn += letter\n        return rtn\n```\n\n\
    # OPERATORS\n\nUsing the wrong operator is also a common mistake to make. When\
    \ you're performing a comparison between two values, for example, you need to\
    \ use the equality operator (a double equals, `==`). Using a single equal (`=`)\
    \ is an assignment operator that places a value to a variable (such as, `lives=10`).\n\
    \n```\n1 b = 5\n2 c = 10\n3 d = 10\n4 b == c #false because 5 is not equal to\
    \ 10\n5 c == d #true because 10 is equal to 10\n```\n\n# OPERATING SYSTEMS\n\n\
    Writing code for multiple platforms is difficult, especially when you start to\
    \ utilise the external commands of the operating system. For example, if your\
    \ code calls for the screen to be cleared, then for Windows you would use `cls`.\
    \ Whereas, for Linux you need to use `clear`. You need to solve this by capturing\
    \ the error and issuing it with an alternative command.\n\n```\n# Code to detect\
    \ error for using a different OS\nrun=1\nwhile(run==1):\n    try:\n        os.system('clear')\n\
    \    except OSError:\n        os.system('cls')\n    print('\\n>>>>>>>>>Python\
    \ 3 File Manager<<<<<<<<<<<\\n')\n```"
