    mainloop()\n```\n\n第10步 第9步的代码在Tkinter中引入了一些新的几何元素。注意sticky=N、E和W参数。这些描述了复选框和按钮的位置（北、东、南和西）。row参数将它们放置在不同的行上。动手试试看你能得到什么。\n\
    \n## Pygame模块\n\n我们已经简要了解了Pygame模块，但它还有更多需要探索的内容。Pygame的开发是为了帮助Python程序员创建图形或基于文本的游戏。\n\
