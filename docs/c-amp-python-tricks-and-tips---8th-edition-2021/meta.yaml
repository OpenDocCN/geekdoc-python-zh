  md: "# Create Your Own Modules\n\nLarge programs can be much easier to manage if\
    \ you break them up into smaller parts and import the parts you need as modules.\
    \ Learning to build your own modules also makes it easier to understand how they\
    \ work.\n\n# BUILDING MODULES\n\nModules are Python files, containing code, that\
    \ you save using a .py extension. These are then imported into Python using the\
    \ now familiar import command.\n\nSTEP 1 Let's start by creating a set of basic\
    \ mathematics functions. Multiply a number by two, three and square or raise a\
    \ number to an exponent (power). Create a New File in the IDLE and enter:\n\n\
    ```\ndef timestwo(x):\n    return x * 2\n\ndef timesthree(x):\n    return x *\
    \ 3\n\ndef square(x):\n    return x * x\n\ndef power(x,y):\n    return x ** y\n\
    ```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_41_0.png)\n\nSTEP 3 Now you're\
    \ going to take the function definitions out of the program and into a separate\
    \ file. Highlight the function definitions and choose Edit > Cut. Choose File\
    \ > New File and use Edit > Paste in the new window. You now have two separate\
    \ files, one with the function definitions, the other with the function calls.\n\
    \n![](img/893ff1cb7ac32885c7c794a5e648f755_41_1.png)\n\nSTEP 2 Under the above\
    \ code, enter functions to call the code:\n\n```\nprint (timestwo(2))\nprint (timesthree(3))\n\
    print (square(4))\nprint (power(5,3))\n```\n\nSave the program as basic_math.py\
    \ and execute it to get the results.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_41_2.png)\n\
    \nSTEP 4 If you now try and execute the basic_math.py code again, the error 'NameError:\
    \ name 'timestwo' is not defined' will be displayed. This is due to the code no\
    \ longer having access to the function definitions.\n\n```\nTraceback (most recent\
    \ call last):\n  File \"/home/pi/Documents/Python Code/basic_math.py\", line 3,\
    \ in <module>\n    print (timestwo(2))\nNameError: name 'timestwo' is not defined\n\
    >>> |\n```\n\nSTEP 5 Return to the newly created window containing the function\
    \ definitions, and click File > Save As. Name this minimath.py and save it in\
    \ the same location as the original basic_math.py program. Now close the minimath.py\
    \ window, so the basic_math.py window is left open.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_41_3.png)"
