    ## Writing to Files


    The ability to read external files within Python is certainly handy but writing
    to a file is better still. Using the write() function, you''re able to output
    the results of a program to a file, that you can then read() back into Python.


    ### WRITE AND CLOSE


    The write() function is slightly more complex than read(). Along with the filename
    you must also include an access mode which determines whether the file in question
    is in read or write mode.


    **STEP 1** Start by opening IDLE and enter the following:

    `t=open("/home/pi/Documents/text.txt", "w")`

    Change the destination from /home/pi/Documents to your own system. This code will
    create a text file called text.txt in write mode using the variable ''t''. If
    there''s no file of that name in the location, it will create one. If one already
    exists, it will overwrite it, so be careful.


    **STEP 3** However, the actual text file is still blank (you can check by opening
    it up). This is because you''ve written the line of text to the file object but
    not committed it to the file itself. Part of the write() function is that you
    need to commit the changes to the file; you can do this by entering:

    `t.close()`


    ![](img/893ff1cb7ac32885c7c794a5e648f755_21_0.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_21_1.png)


    **STEP 2** You can now write to the text file using the write() function. This
    works opposite to read(), writing lines instead of reading them. Try this:

    `t.write("You awake in a small, square room. A single table stands to one side,
    there is a locked door in front of you.")`

    Note the 109. It''s the number of characters you''ve entered.


    **STEP 4** If you now open the text file with a text editor, you can see that
    the line you created has been written to the file. This gives us the foundation
    for some interesting possibilities: perhaps the creation of your own log file
    or even the beginning of an adventure game.


    ![](img/893ff1cb7ac32885c7c794a5e648f755_21_2.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_21_3.png)


    ## Writing to Files


    STEP 5 To expand this code, you can reopen the file using ''a'', for access or
    append mode. This will add any text at the end of the original line instead of
    wiping the file and creating a new one. For example:


    ```

    t=open("/home/pi/Documents/text.txt","a")

    t.write("\n")

    t.write(" You stand and survey your surroundings. On top of the table is some
    meat, and a cup of water.\n")

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_22_0.png)


    STEP 8 You can pass variables to a file that you''ve created in Python. Perhaps
    you want the value of Pi to be written to a file. You can call Pi from the math
    module, create a new file and pass the output of Pi into the new file:


    ```

    import math

    print("Value of Pi is: ",math.pi)

    print("\nWriting to a file now...")

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_22_1.png)


    STEP 6 You can keep extending the text line by line, ending each with a new line
    (\n). When you''re done, finish the code with t.close() and open the file in a
    text editor to see the results:


    ```

    t.write("The door is made of solid oak with iron strips. It''s bolted from the
    outside, locking you in. You are a prisoner!.\n")

    t.close()

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_22_2.png)


    STEP 9 Now let''s create a variable called pi and assign it the value of Pi:

    `pi=math.pi`

    You also need to create a new file in which to write Pi to:

    `t=open("/home/pi/Documents/pi.txt","w")`

    Remember to change your file location to your own particular system setup.


    ![](img/893ff1cb7ac32885c7c794a5e648f755_22_3.png)


    STEP 7 There are various types of file access to consider using the open() function.
    Each depends on how the file is accessed and even the position of the cursor.
    For example, r+ opens a file in read and write and places the cursor at the start
    of the file.


    ![](img/893ff1cb7ac32885c7c794a5e648f755_22_4.png)


    STEP 10 To finish, you can use string formatting to call the variable and write
    it to the file, then commit the changes and close the file:


    ```

    t.write("Value of Pi is: {}".format(pi))

    t.close()

    ```


    You can see from the results that you''re able to pass any variable to a file.


    ![](img/893ff1cb7ac32885c7c794a5e648f755_22_5.png)


    ## Exceptions


    When coding, you’ll naturally come across some issues that are out of your control.
    Let’s assume you ask a user to divide two numbers and they try to divide by zero.
    This will create an error and break your code.


    ### EXCEPTIONAL OBJECTS


    Rather than stop the flow of your code, Python includes exception objects which
    handle unexpected errors in the code. You can combat errors by creating conditions
    where exceptions may occur.


    STEP 1 You can create an exception error by simply trying to divide a number by
    zero. This will report back with the ZeroDivisionError: Division by zero message,
    as seen in the screenshot. The ZeroDivisionError part is the exception class,
    of which there are many.


    STEP 3 You can use the functions raise exception to create our own error handling
    code within Python. Let’s assume your code has you warping around the cosmos,
    too much however results in a warp core breach. To stop the game from exiting
    due to the warp core going supernova, you can create a custom exception:


    ![](img/893ff1cb7ac32885c7c794a5e648f755_23_0.png)


    ```

    raise Exception("warp core breach")

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_23_1.png)


    STEP 2 Most exceptions are raised automatically when Python comes across something
    that’s inherently wrong with the code. However, you can create your own exceptions
    that are designed to contain the potential error and react to it, as opposed to
    letting the code fail.


    ![](img/893ff1cb7ac32885c7c794a5e648f755_23_2.png)


    STEP 4 To trap any errors in the code you can encase the potential error within
    a try: block. This block consists of try, except, else, where the code is held
    within try:, then if there’s an exception do something, else do something else.


    ![](img/893ff1cb7ac32885c7c794a5e648f755_23_3.png)'
