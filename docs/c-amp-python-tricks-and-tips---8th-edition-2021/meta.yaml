- md: "## Do... While Loop\n\nA do... while loop differs slightly from that of a for\
    \ or even a while loop. Both for and while set and examine the state of the condition\
    \ at the start of the loop, or the top of the loop if you prefer. However, a do...\
    \ while loop is similar to a while loop but instead checks the condition at the\
    \ bottom of the loop.\n\n## DO LOOPS\n\nThe good thing about a do... while loop\
    \ is that it's guaranteed to run through at least once. Its structure is: do,\
    \ followed by statements, while condition is true. This is how it works.\n\nSTEP\
    \ 1 Begin with a new, blank C++ file and enter the standard headers:\n\n```\n\
    #include <iostream>\nusing namespace std;\nint main ()\n{\n\n}\n```\n\nSTEP 3\
    \ Now, here's a look at the structure of a do... while loop. First you create\
    \ an integer called num, with the value of 1. Now the do... while loop begins.\
    \ The code inside the body of the loop is executed at least once, then the condition\
    \ is checked for either true or false.\n\n```\n// Create integer with the value\
    \ of 1\nint num = 1;\n\n// Do... While loop begins\ndo\n{\n    cout << \"Number:\
    \ \" << num << endl; // Display the current value of num\n    num = num + 1; //\
    \ Adds 1 to the value of num\n}\nwhile (num < 30 ); // Tests the condition of\
    \ num (true or false)\n```\n\nSTEP 2 Begin with a simple number count:\n\n```\n\
    {\n    int num = 1;\n    do\n    {\n        cout << \"Number: \" << num << endl;\n\
    \        num = num + 1;\n    }\n    while (num < 30 );\n    return 0;\n}\n```\n\
    \nSTEP 4 If the condition is true, the loop is executed. This continues until\
    \ the condition is false. When the condition has been expressed as false, the\
    \ loop terminates and the code continues. This means you can create a loop where\
    \ the code continues until the user enters a certain character.\n\nSTEP 5 If you\
    \ want code to add up user inputted numbers until the user enters zero:\n\n```\n\
    {\n    float number, sum = 0.0;\n    cout << \"**** Program to execute a Do...\
    \ While loop continuously ****\" << endl;\n    cout << \"\\nEnter 0 to stop and\
    \ display the sum of all the numbers entered\\n\" << endl;\n    cout << \"\\n-----------------------------------\\\
    n\" << endl;\n\n    do {\n        cout<<\"\\nPlease enter a number: \";\n    \
    \    cin>>number;\n        sum += number;\n    }\n    while(number != 0.0);\n\n\
    \    cout<<\"Total sum of all numbers: \"<<sum;\n\n    return 0;\n}\n```\n\nSTEP\
    \ 6 The code from Step 5 works as follows: two floating point variables are assigned,\
    \ number and sum, both with the value of 0.0. There is a brief set of instructions\
    \ for the user, then the do... while loop begins.\n\n```\n{\n    float number,\
    \ sum = 0.0;\n    cout << \"**** Program to execute a Do... While loop continuously\
    \ ****\" << endl;\n    cout << \"\\nEnter 0 to stop and display the sum of all\
    \ the numbers entered\\n\" << endl;\n    cout << \"\\n-----------------------------------\\\
    n\" << endl;\n}\n```\n\nSTEP 7 The do... while loop in this instance asks the\
    \ user to input a number, which you assigned to the float variable, number. The\
    \ calculation step uses the second floating point variable, sum, which adds the\
    \ value of number every time the user enters a new value.\n\n```\ndo {\n    cout\
    \ << \"\\nPlease enter a number: \";\n    cin >> number;\n    sum += number;\n\
    }\n```\n\nSTEP 8 Finally, the while statement checks the condition of the variable\
    \ number. If the user has entered zero, then the loop is terminated, if not then\
    \ it continues indefinitely. When the user finally enters zero, the value of sum,\
    \ the total value of all the user's input, is displayed. The loop, and the program,\
    \ then ends.\n\nSTEP 9 Using the countdown and Blast Off! code used previously,\
    \ a do... while loop would look like:\n\n```\n{\n    int a = 10;\n\n    do\n \
    \   {\n        cout << a << endl;\n        a = a - 1;\n    }\n    while ( a !=\
    \ 0);\n\n    cout << \"\\nBlast Off!\" << endl;\n\n    return 0;\n}\n```\n\nSTEP\
    \ 10 The main advantage of using a do... while loop is because it's an exit-condition\
    \ loop; whereas a while loop is an entry-control loop. Therefore, if your code\
    \ requires a loop that needs to be executed at least once (for example, to check\
    \ the number of lives in a game), then a do... while loop is perfect.\n\n## If\
    \ Statement\n\nThe decision making statement ‘if’ is probably one of the most\
    \ used statements in any programming language, regardless of whether it’s C++,\
    \ Python, BASIC or anything else. It represents a junction in the code, where\
    \ IF one condition is true, do this; or IF it’s false, do that.\n\n### IF ONLY\n\
    \nIf uses a Boolean expression within its statement. If the Boolean expression\
    \ is true, the code within the statement is executed. If not, then the code after\
    \ the statement is executed instead.\n\n**STEP 1** First, create a new C++ file\
    \ and enter the relevant standard headers, as usual:\n\n```\n#include <iostream>\n\
    using namespace std;\n\nint main ()\n{\n\n}\n```\n\n**STEP 2** If is best explained\
    \ when you use a number-based condition:\n\n```\n{\n    int num = 1;\n    if (\
    \ num < 30 )\n    {\n        cout << \"The number is less than 30.\" << endl;\n\
    \    }\n    cout << \"Value of number is: \" << num << endl;\n    return 0;\n\
    }\n```\n\n**STEP 3** What’s going on here? To begin, an integer called num was\
    \ created and assigned with the value of 1. The if statement comes next, and in\
    \ this case we’ve instructed the code that if the condition, the value, of num\
    \ is less than 30, then the code within the braces should be executed.\n\n```\n\
    int num = 1; // Create integer called num with value of 1\nif ( num < 30 ) //\
    \ IF value of num is less than 30...\n{\n    cout << \"The number is less than\
    \ 30.\" << endl; // Then this output is displayed\n}\n```\n\n**STEP 4** The second\
    \ cout statement displays the current value of num and the program terminates\
    \ safely. It’s easy to see how the if statement works if you were to change the\
    \ initial value of num from 1 to 31.\n\n```\n#include <iostream>\nusing namespace\
    \ std;\n\nint main ()\n{\n    int num = 31; // Change the value of num\n    if\
    \ ( num < 30 ) // IF value of num is less than 30...\n    {\n```\n\nSTEP 5 When\
    \ you change the value to anything above 30, then build and run the code, you\
    \ can see that the only line to be outputted to the screen is the second cout\
    \ statement, displaying the current value of num. This is because the initial\
    \ if statement is false, so it ignores the code within the braces.\n\nSTEP 6 You\
    \ can include an if statement within a do... while loop. For example:\n\n```\n\
    {\n    float temp;\n\n    do\n    {\n        cout << \"\\nEnter the temperature\
    \ (or -10000 to exit): \" << endl;\n        cin >> temp;\n        if (temp <=\
    \ 0 )\n        {\n            cout << \"\\nBrrrr, it's really cold!\" << endl;\n\
    \        }\n        if (temp > 0 )\n        {\n            cout << \"\\nAt least\
    \ it's not freezing!\" << endl;\n        }\n    }\n    while ( temp != -10000\
    \ );\n\n    cout << \"\\nGood bye\\n\" << endl;\n\n    return 0;\n}\n```\n\nSTEP\
    \ 7 The code in Step 6 is simplistic but effective. First we created a floating\
    \ point integer called temp, then a do... while loop that asks the user to enter\
    \ the current temperature.\n\n```\n{\n    float temp;\n\n    do\n    {\n     \
    \   cout << \"\\nEnter the temperature (or -10000 to exit): \" << endl;\n    \
    \    cin >> temp;\n```\n\nSTEP 8 The first if statement checks to see if the user's\
    \ inputted value is less than or equal to zero. If it is, then the output is 'Brrrr,\
    \ it's really cold!'. Otherwise, if the input is greater than zero, the code outputs\
    \ 'At least it's not freezing!'.\n\n```\ndo\n{\n    cout << \"\\nEnter the temperature\
    \ (or -10000 to exit): \" << endl;\n    cin >> temp;\n    if (temp <= 0 )\n  \
    \  {\n        cout << \"\\nBrrrr, it's really cold!\" << endl;\n    }\n    if\
    \ (temp > 0 )\n    {\n        cout << \"\\nAt least it's not freezing!\" << endl;\n\
    \    }\n}\n```\n\nSTEP 9 Finally, if the user enters the value -10000, which is\
    \ impossibly cold so is therefore an unrealistic value, the do... while loop is\
    \ terminated and a friendly 'Good bye' is displayed to the screen.\n\n```\n{\n\
    \    float temp;\n\n    do\n    {\n        cout << \"\\nEnter the temperature\
    \ (or -10000 to exit): \" << endl;\n        cin >> temp;\n        if (temp <=\
    \ 0 )\n        {\n            cout << \"\\nBrrrr, it's really cold!\" << endl;\n\
    \        }\n        if (temp > 0 )\n        {\n            cout << \"\\nAt least\
    \ it's not freezing!\" << endl;\n        }\n    }\n    while ( temp != -10000\
    \ );\n\n    cout << \"\\nGood bye\\n\" << endl;\n\n    return 0;\n}\n```\n\nSTEP\
    \ 10 Using if is quite powerful, if it's used correctly. Just remember that if\
    \ the condition is true then the code executes what's in the braces. If not, it\
    \ continues on its merry way. See what else you can come up with using if and\
    \ a combination of loops."
  mdcn: "## Do... While 循环\n\ndo... while 循环与 for 循环甚至 while 循环略有不同。for 和 while 循环都在循环开始时（或者说在循环顶部）设置并检查条件状态。然而，do...\
    \ while 循环类似于 while 循环，但它是在循环底部检查条件。\n\n## DO 循环\n\ndo... while 循环的优点在于它保证至少执行一次。其结构是：do，后跟语句，while\
    \ 条件为真。其工作原理如下。\n\n步骤 1 从一个新的、空白的 C++ 文件开始，输入标准头文件：\n\n```\n#include <iostream>\n\
    using namespace std;\nint main ()\n{\n\n}\n```\n\n步骤 3 现在，来看一下 do... while 循环的结构。首先，你创建一个名为\
    \ `num` 的整数，其值为 1。现在 do... while 循环开始。循环体内的代码至少执行一次，然后检查条件是真还是假。\n\n```\n// 创建一个值为\
    \ 1 的整数\nint num = 1;\n\n// Do... While 循环开始\ndo\n{\n    cout << \"Number: \"\
    \ << num << endl; // 显示 num 的当前值\n    num = num + 1; // 将 num 的值加 1\n}\nwhile\
    \ (num < 30 ); // 测试 num 的条件（真或假）\n```\n\n步骤 2 从一个简单的数字计数开始：\n\n```\n{\n    int\
    \ num = 1;\n    do\n    {\n        cout << \"Number: \" << num << endl;\n    \
    \    num = num + 1;\n    }\n    while (num < 30 );\n    return 0;\n}\n```\n\n\
    步骤 4 如果条件为真，则执行循环。这会持续到条件为假。当条件被判定为假时，循环终止，代码继续执行。这意味着你可以创建一个循环，让代码持续运行，直到用户输入某个特定字符。\n\
    \n步骤 5 如果你希望代码累加用户输入的数字，直到用户输入零：\n\n```\n{\n    float number, sum = 0.0;\n   \
    \ cout << \"**** 程序：持续执行 Do... While 循环 ****\" << endl;\n    cout << \"\\n输入 0\
    \ 以停止并显示所有输入数字的总和\\n\" << endl;\n    cout << \"\\n-----------------------------------\\\
    n\" << endl;\n\n    do {\n        cout<<\"\\n请输入一个数字: \";\n        cin>>number;\n\
    \        sum += number;\n    }\n    while(number != 0.0);\n\n    cout<<\"所有数字的总和:\
    \ \"<<sum;\n\n    return 0;\n}\n```\n\n步骤 6 步骤 5 中的代码工作原理如下：分配了两个浮点变量 `number`\
    \ 和 `sum`，它们的初始值都是 0.0。有一组简短的用户指令，然后 do... while 循环开始。\n\n```\n{\n    float number,\
    \ sum = 0.0;\n    cout << \"**** 程序：持续执行 Do... While 循环 ****\" << endl;\n    cout\
    \ << \"\\n输入 0 以停止并显示所有输入数字的总和\\n\" << endl;\n    cout << \"\\n-----------------------------------\\\
    n\" << endl;\n}\n```\n\n步骤 7 在这个例子中，do... while 循环要求用户输入一个数字，你将其赋值给浮点变量 `number`。计算步骤使用第二个浮点变量\
    \ `sum`，每次用户输入一个新值时，它都会加上 `number` 的值。\n\n```\ndo {\n    cout << \"\\n请输入一个数字:\
    \ \";\n    cin >> number;\n    sum += number;\n}\n```\n\n步骤 8 最后，while 语句检查变量\
    \ `number` 的条件。如果用户输入了零，则循环终止；否则，它将无限继续。当用户最终输入零时，将显示 `sum` 的值，即所有用户输入的总和。然后循环和程序结束。\n\
    \n步骤 9 使用之前用过的倒计时和“发射！”代码，do... while 循环看起来会是这样：\n\n```\n{\n    int a = 10;\n\n\
    \    do\n    {\n        cout << a << endl;\n        a = a - 1;\n    }\n    while\
    \ ( a != 0);\n\n    cout << \"\\n发射！\" << endl;\n\n    return 0;\n}\n```\n\n步骤\
    \ 10 使用 do... while 循环的主要优势在于它是一个**退出条件循环**；而 while 循环是一个**入口控制循环**。因此，如果你的代码需要一个至少执行一次的循环（例如，检查游戏中的生命数），那么\
    \ do... while 循环是完美的选择。\n\n## If 语句\n\n决策语句 `if` 可能是任何编程语言中使用最多的语句之一，无论是 C++、Python、BASIC\
    \ 还是其他语言。它代表了代码中的一个分支点：如果一个条件为真，则执行这个；或者如果为假，则执行那个。\n\n### 仅 IF\n\nIf 在其语句中使用布尔表达式。如果布尔表达式为真，则执行语句内的代码。否则，将执行语句之后的代码。\n\
    \n**步骤 1** 首先，像往常一样创建一个新的 C++ 文件并输入相关的标准头文件：\n\n```\n#include <iostream>\nusing\
    \ namespace std;\n\nint main ()\n{\n\n}\n```\n\n**步骤 2** 当你使用基于数字的条件时，if 得到了最好的解释：\n\
    \n```\n{\n    int num = 1;\n    if ( num < 30 )\n    {\n        cout << \"该数字小于\
    \ 30。\" << endl;\n    }\n    cout << \"数字的值是: \" << num << endl;\n    return 0;\n\
    }\n```\n\n**步骤 3** 这里发生了什么？首先，创建了一个名为 `num` 的整数并赋值为 1。接下来是 if 语句，在这种情况下，我们指示代码：如果\
    \ `num` 的条件（即值）小于 30，则执行花括号内的代码。\n\n```\nint num = 1; // 创建一个名为 num 的整数，值为 1\n\
    if ( num < 30 ) // 如果 num 的值小于 30...\n{\n    cout << \"该数字小于 30。\" << endl; //\
    \ 则显示此输出\n}\n```\n\n**步骤 4** 第二个 cout 语句显示 `num` 的当前值，程序安全终止。如果你将 `num` 的初始值从\
    \ 1 改为 31，就很容易看出 if 语句是如何工作的。\n\n```\n#include <iostream>\nusing namespace std;\n\
    \nint main ()\n{\n    int num = 31; // 更改 num 的值\n    if ( num < 30 ) // 如果 num\
    \ 的值小于 30...\n    {\n```\n\n步骤 5 当你将值更改为任何大于 30 的数，然后构建并运行代码时，你可以看到唯一输出到屏幕的行是第二个\
    \ cout 语句，显示 `num` 的当前值。这是因为初始的 if 语句为假，所以它忽略了花括号内的代码。\n\n步骤 6 你可以在 do... while\
    \ 循环中包含一个 if 语句。例如：\n\n```\n{\n    float temp;\n\n    do\n    {\n        cout\
    \ << \"\\n请输入温度（或输入 -10000 退出）: \" << endl;\n        cin >> temp;\n        if\
    \ (temp <= 0 )\n        {\n            cout << \"\\n嘶，真冷啊！\" << endl;\n      \
    \  }\n        if (temp > 0 )\n        {\n            cout << \"\\n至少没有结冰！\" <<\
    \ endl;\n        }\n    }\n    while ( temp != -10000 );\n\n    cout << \"\\n再见\\\
    n\" << endl;\n\n    return 0;\n}\n```\n\n步骤 7 步骤 6 中的代码虽然简单但很有效。首先我们创建了一个名为 `temp`\
    \ 的浮点整数，然后是一个 do... while 循环，要求用户输入当前温度。\n\n```\n{\n    float temp;\n\n    do\n\
    \    {\n        cout << \"\\n请输入温度（或输入 -10000 退出）: \" << endl;\n        cin >>\
    \ temp;\n```\n\n步骤 8 第一个 if 语句检查用户输入的值是否小于或等于零。如果是，则输出“嘶，真冷啊！”。否则，如果输入大于零，代码输出“至少没有结冰！”。\n\
    \n```\ndo\n{\n    cout << \"\\n请输入温度（或输入 -10000 退出）: \" << endl;\n    cin >> temp;\n\
    \    if (temp <= 0 )\n    {\n        cout << \"\\n嘶，真冷啊！\" << endl;\n    }\n \
    \   if (temp > 0 )\n    {\n        cout << \"\\n至少没有结冰！\" << endl;\n    }\n}\n\
    ```\n\n步骤 9 最后，如果用户输入值 -10000（这是一个不可能的低温，因此是一个不切实际的值），do... while 循环终止，并在屏幕上显示友好的“再见”。\n\
    \n```\n{\n    float temp;\n\n    do\n    {\n        cout << \"\\n请输入温度（或输入 -10000\
    \ 退出）: \" << endl;\n        cin >> temp;\n        if (temp <= 0 )\n        {\n\
    \            cout << \"\\n嘶，真冷啊！\" << endl;\n        }\n        if (temp > 0 )\n\
    \        {\n            cout << \"\\n至少没有结冰！\" << endl;\n        }\n    }\n  \
    \  while ( temp != -10000 );\n\n    cout << \"\\n再见\\n\" << endl;\n\n    return\
    \ 0;\n}\n```\n\n步骤 10 如果使用得当，使用 if 是非常强大的。只需记住，如果条件为真，则代码执行花括号内的内容。否则，它将继续愉快地执行。看看你还能用\
    \ if 和循环的组合想出些什么。"
