  md: "# Defining Constants\n\nConstants are fixed values in your code. They can be\
    \ any basic data type but as the name suggests their value remains constant throughout\
    \ the entire code. There are two separate ways to define a constant in C++, the\
    \ #define pre-processor and const.\n\n# #DEFINE\n\nThe pre-processors are instructions\
    \ to the compiler to pre-process the information before it goes ahead and compiles\
    \ the code. #include is a pre-processor as is #define.\n\nSTEP 1 You can use the\
    \ #define pre-processor to define any constants you want in our code. Start by\
    \ creating a new C++ file complete with the usual headers:\n\n```\n#include <iostream>\n\
    using namespace std;\nint main ()\n{\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_49_0.png)\n\
    \nSTEP 3 Note the capitals for defined constants, it's considered good programming\
    \ practise to define all constants in capitals. Here, the assigned values are\
    \ 50, 40 and 60, so let's call them up:\n\n```\n#include <iostream>\nusing namespace\
    \ std;\n#define LENGTH 50\n#define WIDTH 40\n#define HEIGHT 60\nint main ()\n\
    {\n    cout << \"Length is: \" << LENGTH << \"\\n\";\n    cout << \"Width is:\
    \ \" << WIDTH << \"\\n\";\n    cout << \"Height is: \" << HEIGHT << \"\\n\";\n\
    }\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_49_1.png)\n\nSTEP 2 Now let's\
    \ assume your code has three different constants: length, width and height. You\
    \ can define them with:\n\n```\n#include <iostream>\nusing namespace std;\n#define\
    \ LENGTH 50\n#define WIDTH 40\n#define HEIGHT 60\nint main ()\n{\n}\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_49_2.png)\n\
    \nSTEP 4 Build and run the code. Just as expected, it displays the values for\
    \ each of the constants created. It's worth noting that you don't need a semicolon\
    \ when you're defining a constant with the #define keyword.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_49_3.png)"
