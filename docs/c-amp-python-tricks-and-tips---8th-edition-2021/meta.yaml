  - "[PAGE 72]\n\n# Beginner C++ Mistakes\n\n# COMMENTS (AGAIN)\n\nIndeed the mistake\
    \ of never making any comments on code is back once more. As we've previously\
    \ bemoaned, the lack of readable identifiers throughout the code makes it very\
    \ difficult to look back at how it worked, for both you and someone else. Use\
    \ more comments.\n\n```\n#include <iostream>\n#include <vector>\n#include <algorithm>\n\
    using namespace std;\n\nint main()\n{\n    vector<double> v;\n\n    double d;\n\
    \    while(cin>>d) v.push_back(d);  // read elements\n    if (!cin.eof()) {  \
    \            // check if input failed\n        cerr << \"format error\\n\";\n\
    \        return 1;                  // error return\n    }\n\n    cout << \"read\
    \ \" << v.size() << \" elements\\n\";\n\n    reverse(v.begin(),v.end());\n   \
    \ cout << \"elements in reverse order:\\n\";\n    for (int i = 0; i<v.size();\
    \ ++i) cout << v[i] << '\\n';\n\n    return 0;                      // success\
    \ return\n}\n```\n\n# TOO MANY BRACES\n\nThe braces, or curly brackets, are beginning\
    \ and ending markers around blocks of code. So for every { you must have a }.\
    \ Often it's easy to include or miss out one or the other facing brace when writing\
    \ code; usually when writing in a text editor, as an IDE adds them for you.\n\n\
    ```\n#include <iostream>\nusing namespace std;\n\nint main()\n{\n    int x;\n\
    \    string mystring = \"This is a string!\\n\";\n    cout << \"What's the value\
    \ of x? \";\n    cin >> x;\n    cout << x;\n    {\n        cout << \"\\n\\n\"\
    ;\n        cout << mystring;\n    }\n}\n```\n\n# QUOTES\n\nMissing quotes is a\
    \ common mistake to make, for every level of user. Remember that quotes need to\
    \ encase strings and anything that's going to be outputted to the screen or into\
    \ a file, for example. Most compilers errors are due to missing quotes in the\
    \ code.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_72_0.png)\n\n# INITIALISE\
    \ VARIABLES\n\nIn C++ variables aren't initialised to zero by default. This means\
    \ if you create a variable called x then, potentially, it is given a random number\
    \ from 0 to 18,446,744,073,709,551,616, which can be difficult to include in an\
    \ equation. When creating a variable, give it the value of zero to begin with:\
    \ x=0.\n\n```\n#include <iostream>\nusing namespace std;\n\nint main()\n{\n  \
    \  int x;\n    x=0;\n\n    cout << x;\n}\n```\n\n# EXTRA SEMICOLONS\n\nWhile it's\
    \ necessary to have a semicolon at the end of every C++ line, there are some exceptions\
    \ to the rule. Semicolons need to be at the end of every complete statement but\
    \ some lines of code aren't complete statements. Such as:\n\n+   - #include\n\
    - if lines\n- switch lines\n\nIf it sounds confusing don't worry, the compiler\
    \ lets you know where you went wrong.\n\n```\n// Program to print positive number\
    \ entered by the user\n// If user enters negative number, it is skipped\n\n#include\
    \ <iostream>\nusing namespace std;\n\nint main()\n{\n    int number;\n    cout\
    \ << \"Enter an integer: \";\n    cin >> number;\n\n    // checks if the number\
    \ is positive\n    if ( number > 0)\n    {\n        cout << \"You entered a positive\
    \ integer: \" << number << endl;\n    }\n\n    cout << \"This statement is always\
    \ executed.\";\n    return 0;\n}\n```\n\n# A.OUT\n\nA common mistake when compiling\
    \ in Linux is forgetting to name your C++ code post compiling. When you compile\
    \ from the Terminal, you enter:\n\n```\ng++ code.cpp\n```\n\nThis compiles the\
    \ code in the file code.cpp and create an a.out file that can be executed with\
    \ ./a.out. However, if you already have code in a.out then it's overwritten. Use:\n\
    \n```\ng++ code.cpp -o nameofprogram\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_72_1.png)"
  - "[PAGE 73]\n\n# # Where Next?\n\nCoding, like most subjects, is a continual learning\
    \ experience. You may not class yourself as a beginner any more but you still\
    \ need to test your code, learn new tricks and hacks to make it more efficient\
    \ and even branch out and learn another programming language.\n\n# # #INCLUDE<KEEP\
    \ ON LEARNING>\n\nWhat can you do to further your skills, learn new coding practises,\
    \ experiment and present your code and even begin to help others using what you've\
    \ experienced so far?\n\n# ## TWITTER\n\nTwitter isn't all trolls and antagonists,\
    \ among the well-publicised vitriol are some genuine people who are more than\
    \ willing to spread their coding knowledge. We recommend you find a few who you\
    \ can relate to and follow them. Often they post great tips, hacks and fixes for\
    \ common coding problems.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_73_0.png)\n\
    \n# ## OPEN PROJECTS\n\nLook for open source projects that you like the sound\
    \ of and offer to contribute to the code to keep it alive and up to date. There\
    \ are millions of projects to choose from, so contact a few and see where they\
    \ need help. It may only be a minor code update but it's a noble occupation for\
    \ coders to get into.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_73_1.png)\n\n\
    # ## KEEP CODING\n\nIf you've mastered Python fairly well, then turn your attention\
    \ to C++ or even C#. Still keep your Python skills going but learning a new coding\
    \ language keeps the old brain ticking over nicely and give you a view into another\
    \ community, and how they do things differently.\n\n```\ncpp\n#pragma once\n#define\
    \ EXPAND_ME __FILE__ \": \" __LINE__\nconstexpr auto pi = 314LLu;\nthread_local\
    \ decltype(pi) rage = 0b10;\n[[deprecated(\"abc\")]] char16_t *f() noexcept {\
    \ return nullptr; }\ntemplate <typename T> struct Foo {\n    static_assert(std::is_floating_point<T>::value,\n\
    \                  \"Foo<T>: T must be floating point\");\n};\nstruct A final\
    \ : Foo {\n    A() = default;\n    [[noreturn]] virtual void foo() override;\n\
    };\ntemplate <typename T> concept bool EqualityComparable = requires(T a, T b)\
    \ {\n    { a == b } -> bool;\n};\n```\n\n# ## SHARE SKILLS\n\nBecome more active\
    \ on coding and development knowledge sites, such as StackExchange. If you have\
    \ the skills to start and help others out, not only will you feel really good\
    \ for doing so but you can also learn a lot yourself by interacting with other\
    \ members.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_73_2.png)"
