    \n## 括号\n\n每个人都会忘记在语句末尾添加那个本应添加的额外括号。Python 依赖于程序具有相等数量的闭括号和开括号，因此代码中的任何错误都可能是由于你忘记计算括号造成的；包括方括号。\n\
    \n```python\ndef print_game_status(self):\n    print (board[len(self.missed_letters)])\n\
