  - "[PAGE 71]\n\n# Beginner C++ Mistakes\n\nThere are many pitfalls the C++ developer\
    \ can encounter, especially as this is a more complex and often unforgiving language\
    \ to master. Beginners need to take C++ a step at a time and digest what they've\
    \ learned before moving on.\n\n# VOID(C++, MISTAKES)\n\nAdmittedly it's not just\
    \ C++ beginners that make the kinds of errors we outline on these pages, even\
    \ hardened coders are prone to the odd mishap here and there. Here are some common\
    \ issues to try and avoid.\n\n# UNDECLARED IDENTIFIERS\n\nA common C++ mistake,\
    \ and to be honest a common mistake with most programming languages, is when you\
    \ try and output a variable that doesn't exist. Displaying the value of x on-screen\
    \ is fine but not if you haven't told the compiler what the value of x is to begin\
    \ with.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_71_0.png)\n\n# STD NAMESPACE\n\
    \nReferencing the Standard Library is common for beginners throughout their code,\
    \ but if you miss the std:: element of a statement, your code errors out when\
    \ compiling. You can combat this by adding:\n\n```\nusing namespace std;\n```\n\
    \nUnder the #include part and simply using cout, cin and so on from then on.\n\
    \n```\n#include <iostream>\nusing namespace std;\n\nint main()\n{\n    int a,\
    \ b, c, d;\n    a=10;\n    b=20;\n    c=30;\n    d=40;\n\n    cout << a, b, c,\
    \ d;\n}\n```\n\n# SEMICOLONS\n\nRemember that each line of a C++ program must\
    \ end with a semicolon. If it doesn't then the compiler treats the line with the\
    \ missing semicolon as the same line with the next semicolon on. This creates\
    \ all manner of problems when trying to compile, so don't forget those semicolons.\n\
    \n```\n#include <iostream>\n\nint main()\n{\n    int a, b, c, d;\n    a=10;\n\
    \    b=20;\n    c=30\n    d=40;\n\n    std::cout << a, b, c, d;\n}\n```\n\n# GCC\
    \ OR G++\n\nIf you're compiling in Linux then you will no doubt come across gcc\
    \ and g++. In short, gcc is the Gnu Compiler Collection (or Gnu C Compiler as\
    \ it used to be called) and g++ is the Gnu ++ (the C++ version) of the compiler.\
    \ If you're compiling C++ then you need to use g++, as the incorrect compiler\
    \ drivers will be used.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_71_1.png)"
- md: "## Beginner C++ Mistakes\n\n## COMMENTS (AGAIN)\n\nIndeed the mistake of never\
    \ making any comments on code is back once more. As we've previously bemoaned,\
    \ the lack of readable identifiers throughout the code makes it very difficult\
    \ to look back at how it worked, for both you and someone else. Use more comments.\n\
    \n```cpp\n#include <iostream>\n#include <vector>\n#include <algorithm>\nusing\
    \ namespace std;\n\nint main()\n{\n    vector<double> v;\n\n    double d;\n  \
    \  while(cin>>d) v.push_back(d);  // read elements\n    if (!cin.eof()) {    \
    \          // check if input failed\n        cerr << \"format error\\n\";\n  \
    \      return 1;                  // error return\n    }\n\n    cout << \"read\
    \ \" << v.size() << \" elements\\n\";\n\n    reverse(v.begin(),v.end());\n   \
    \ cout << \"elements in reverse order:\\n\";\n    for (int i = 0; i<v.size();\
    \ ++i) cout << v[i] << '\\n';\n\n    return 0;                      // success\
    \ return\n}\n```\n\n## TOO MANY BRACES\n\nThe braces, or curly brackets, are beginning\
    \ and ending markers around blocks of code. So for every { you must have a }.\
    \ Often it's easy to include or miss out one or the other facing brace when writing\
    \ code; usually when writing in a text editor, as an IDE adds them for you.\n\n\
    ```cpp\n#include <iostream>\nusing namespace std;\n\nint main()\n{\n    int x;\n\
    \    string mystring = \"This is a string!\\n\";\n    cout << \"What's the value\
    \ of x? \";\n    cin >> x;\n    cout << x;\n    {\n        cout << \"\\n\\n\"\
    ;\n        cout << mystring;\n    }\n}\n```\n\n## QUOTES\n\nMissing quotes is\
    \ a common mistake to make, for every level of user. Remember that quotes need\
    \ to encase strings and anything that's going to be outputted to the screen or\
    \ into a file, for example. Most compilers errors are due to missing quotes in\
    \ the code.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_72_0.png)\n\n## INITIALISE\
    \ VARIABLES\n\nIn C++ variables aren't initialised to zero by default. This means\
    \ if you create a variable called x then, potentially, it is given a random number\
    \ from 0 to 18,446,744,073,709,551,616, which can be difficult to include in an\
    \ equation. When creating a variable, give it the value of zero to begin with:\
    \ x=0.\n\n```cpp\n#include <iostream>\nusing namespace std;\n\nint main()\n{\n\
    \    int x;\n    x=0;\n\n    cout << x;\n}\n```\n\n## EXTRA SEMICOLONS\n\nWhile\
    \ it's necessary to have a semicolon at the end of every C++ line, there are some\
    \ exceptions to the rule. Semicolons need to be at the end of every complete statement\
    \ but some lines of code aren't complete statements. Such as:\n\n- #include\n\
    - if lines\n- switch lines\n\nIf it sounds confusing don't worry, the compiler\
    \ lets you know where you went wrong.\n\n```cpp\n// Program to print positive\
    \ number entered by the user\n// If user enters negative number, it is skipped\n\
    \n#include <iostream>\nusing namespace std;\n\nint main()\n{\n    int number;\n\
    \    cout << \"Enter an integer: \";\n    cin >> number;\n\n    // checks if the\
    \ number is positive\n    if ( number > 0)\n    {\n        cout << \"You entered\
    \ a positive integer: \" << number << endl;\n    }\n\n    cout << \"This statement\
    \ is always executed.\";\n    return 0;\n}\n```\n\n## A.OUT\n\nA common mistake\
    \ when compiling in Linux is forgetting to name your C++ code post compiling.\
    \ When you compile from the Terminal, you enter:\n\n```\ng++ code.cpp\n```\n\n\
    This compiles the code in the file code.cpp and create an a.out file that can\
    \ be executed with ./a.out. However, if you already have code in a.out then it's\
    \ overwritten. Use:\n\n```\ng++ code.cpp -o nameofprogram\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_72_1.png)\n\
    \n## Where Next?\n\nCoding, like most subjects, is a continual learning experience.\
    \ You may not class yourself as a beginner any more but you still need to test\
    \ your code, learn new tricks and hacks to make it more efficient and even branch\
    \ out and learn another programming language.\n\n### INCLUDE<KEEP ON LEARNING>\n\
    \nWhat can you do to further your skills, learn new coding practises, experiment\
    \ and present your code and even begin to help others using what you've experienced\
    \ so far?\n\n### TWITTER\n\nTwitter isn't all trolls and antagonists, among the\
    \ well-publicised vitriol are some genuine people who are more than willing to\
    \ spread their coding knowledge. We recommend you find a few who you can relate\
    \ to and follow them. Often they post great tips, hacks and fixes for common coding\
    \ problems.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_73_0.png)\n\n### OPEN\
    \ PROJECTS\n\nLook for open source projects that you like the sound of and offer\
    \ to contribute to the code to keep it alive and up to date. There are millions\
    \ of projects to choose from, so contact a few and see where they need help. It\
    \ may only be a minor code update but it's a noble occupation for coders to get\
    \ into.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_73_1.png)\n\n### KEEP CODING\n\
    \nIf you've mastered Python fairly well, then turn your attention to C++ or even\
    \ C#. Still keep your Python skills going but learning a new coding language keeps\
    \ the old brain ticking over nicely and give you a view into another community,\
    \ and how they do things differently.\n\n```cpp\n#pragma once\n#define EXPAND_ME\
    \ __FILE__ \": \" __LINE__\nconstexpr auto pi = 314LLu;\nthread_local decltype(pi)\
    \ rage = 0b10;\n[[deprecated(\"abc\")]] char16_t *f() noexcept { return nullptr;\
    \ }\ntemplate <typename T> struct Foo {\n    static_assert(std::is_floating_point<T>::value,\n\
    \                  \"Foo<T>: T must be floating point\");\n};\nstruct A final\
    \ : Foo {\n    A() = default;\n    [[noreturn]] virtual void foo() override;\n\
    };\ntemplate <typename T> concept bool EqualityComparable = requires(T a, T b)\
    \ {\n    { a == b } -> bool;\n};\n```\n\n### SHARE SKILLS\n\nBecome more active\
    \ on coding and development knowledge sites, such as StackExchange. If you have\
    \ the skills to start and help others out, not only will you feel really good\
    \ for doing so but you can also learn a lot yourself by interacting with other\
    \ members.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_73_2.png)\n\n## GOING MOBILE\n\
    \nThe mobile market is a great place to test your coding skills and present any\
    \ games or apps you've created. If your app is good, then who knows, it could\
    \ be the next great thing to appear on the app stores. It's a good learning experience\
    \ nevertheless, and something worth considering.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_74_0.png)\n\
    \n## PORTFOLIOS\n\nIf you've learned how to code with an eye for a developer job\
    \ in the future, then it's worth starting to build up an online portfolio of code.\
    \ Look at job postings and see what skills they require, then learn and code something\
    \ with those skills and add it to the portfolio. When it comes to applying, include\
    \ a link to the portfolio.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_74_1.png)\n\
    \n## ONLINE LEARNING\n\nOnline courses are good examples of where to take your\
    \ coding skills next, even if you start from the beginner level again. Often,\
    \ an online course follows a strict coding convention, so if you're self-taught\
    \ then it might be worth seeing how other developers lay out their code, and what's\
    \ considered acceptable.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_74_2.png)\n\
    \n## TEACH CODE\n\nCan you teach? If your coding skills are spot on, consider\
    \ approaching a college or university to see if they have need for a programming\
    \ language teacher, perhaps a part-time or evening course. If not teaching, then\
    \ consider creating your own YouTube how to code channel.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_74_3.png)\n\
    \n## SHARE CODE\n\nGet sharing, even if you think your code isn't very good. The\
    \ criticism, advice and comments you receive back help you iron out any issues\
    \ with your code, and you add them all to your checklist. Alternatively your code\
    \ might be utterly amazing but you won't know unless you share it.\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_74_4.png)\n\
    \n## HARDWARE PROJECTS\n\nContributing to hardware projects is a great resource\
    \ for proving your code with others and learning from other contributors. Many\
    \ of the developer boards have postings for coders to apply to for hardware projects,\
    \ using unique code to get the most from the hardware that's being designed.\n\
    \n![](img/893ff1cb7ac32885c7c794a5e648f755_74_5.png)"
  mdcn: "## 初学者 C++ 常见错误\n\n## 注释（再次强调）\n\n确实，从不给代码添加注释的错误又出现了。正如我们之前所抱怨的，整个代码中缺乏可读的标识符，使得无论是你自己还是其他人，都很难回顾代码是如何工作的。请多使用注释。\n\
    \n```cpp\n#include <iostream>\n#include <vector>\n#include <algorithm>\nusing\
    \ namespace std;\n\nint main()\n{\n    vector<double> v;\n\n    double d;\n  \
    \  while(cin>>d) v.push_back(d);  // read elements\n    if (!cin.eof()) {    \
    \          // check if input failed\n        cerr << \"format error\\n\";\n  \
    \      return 1;                  // error return\n    }\n\n    cout << \"read\
    \ \" << v.size() << \" elements\\n\";\n\n    reverse(v.begin(),v.end());\n   \
    \ cout << \"elements in reverse order:\\n\";\n    for (int i = 0; i<v.size();\
    \ ++i) cout << v[i] << '\\n';\n\n    return 0;                      // success\
    \ return\n}\n```\n\n## 花括号过多\n\n花括号，或称大括号，是代码块的开始和结束标记。因此，每个 `{` 都必须有一个 `}` 与之对应。在编写代码时，很容易包含或遗漏其中一个匹配的括号；通常在文本编辑器中编写时会这样，因为\
    \ IDE 会为你自动添加它们。\n\n```cpp\n#include <iostream>\nusing namespace std;\n\nint main()\n\
    {\n    int x;\n    string mystring = \"This is a string!\\n\";\n    cout << \"\
    What's the value of x? \";\n    cin >> x;\n    cout << x;\n    {\n        cout\
    \ << \"\\n\\n\";\n        cout << mystring;\n    }\n}\n```\n\n## 引号\n\n遗漏引号是各级用户常犯的错误。请记住，引号需要包裹字符串以及任何将要输出到屏幕或文件中的内容。大多数编译器错误都是由于代码中缺少引号造成的。\n\
    \n![](img/893ff1cb7ac32885c7c794a5e648f755_72_0.png)\n\n## 初始化变量\n\n在 C++ 中，变量默认不会初始化为零。这意味着如果你创建一个名为\
    \ `x` 的变量，那么它可能被赋予一个从 0 到 18,446,744,073,709,551,616 的随机数，这很难在方程中使用。创建变量时，请先给它赋值为零：`x=0`。\n\
    \n```cpp\n#include <iostream>\nusing namespace std;\n\nint main()\n{\n    int\
    \ x;\n    x=0;\n\n    cout << x;\n}\n```\n\n## 多余的分号\n\n虽然在 C++ 的每一行末尾都需要分号，但这条规则有一些例外。分号需要放在每个完整语句的末尾，但有些代码行不是完整的语句。例如：\n\
    \n- `#include`\n- `if` 语句行\n- `switch` 语句行\n\n如果听起来令人困惑，请不要担心，编译器会告诉你哪里出错了。\n\n\
    ```cpp\n// Program to print positive number entered by the user\n// If user enters\
    \ negative number, it is skipped\n\n#include <iostream>\nusing namespace std;\n\
    \nint main()\n{\n    int number;\n    cout << \"Enter an integer: \";\n    cin\
    \ >> number;\n\n    // checks if the number is positive\n    if ( number > 0)\n\
    \    {\n        cout << \"You entered a positive integer: \" << number << endl;\n\
    \    }\n\n    cout << \"This statement is always executed.\";\n    return 0;\n\
    }\n```\n\n## A.OUT\n\n在 Linux 中编译时，一个常见的错误是忘记在编译后为你的 C++ 代码命名。当你从终端编译时，你会输入：\n\
    \n```\ng++ code.cpp\n```\n\n这会编译 `code.cpp` 文件中的代码，并创建一个可以通过 `./a.out` 执行的 `a.out`\
    \ 文件。但是，如果你的 `a.out` 中已经有代码，那么它将被覆盖。请使用：\n\n```\ng++ code.cpp -o nameofprogram\n\
    ```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_72_1.png)\n\n## 下一步该做什么？\n\n编码，像大多数学科一样，是一个持续学习的过程。你可能不再认为自己是初学者，但你仍然需要测试你的代码，学习新的技巧和窍门来提高效率，甚至可以拓展学习另一种编程语言。\n\
    \n### 继续学习\n\n你能做些什么来进一步提升你的技能，学习新的编码实践，尝试并展示你的代码，甚至开始利用你目前的经验去帮助他人？\n\n### 推特\n\
    \n推特上并非全是喷子和对立者，在广为人知的尖刻言论中，有一些真诚的人非常愿意传播他们的编码知识。我们建议你找几个能产生共鸣的人并关注他们。他们经常发布关于常见编码问题的绝佳技巧、窍门和修复方法。\n\
    \n![](img/893ff1cb7ac32885c7c794a5e648f755_73_0.png)\n\n### 开源项目\n\n寻找你感兴趣的开源项目，并主动贡献代码以保持其活力和更新。有数百万个项目可供选择，所以联系几个项目，看看他们需要什么帮助。可能只是一次小的代码更新，但这是编码者值得参与的崇高事业。\n\
    \n![](img/893ff1cb7ac32885c7c794a5e648f755_73_1.png)\n\n### 继续编码\n\n如果你已经相当熟练地掌握了\
    \ Python，那么把注意力转向 C++ 甚至 C#。继续保持你的 Python 技能，但学习一门新的编程语言能让大脑保持活跃，并让你了解另一个社区以及他们做事的不同方式。\n\
    \n```cpp\n#pragma once\n#define EXPAND_ME __FILE__ \": \" __LINE__\nconstexpr\
    \ auto pi = 314LLu;\nthread_local decltype(pi) rage = 0b10;\n[[deprecated(\"abc\"\
    )]] char16_t *f() noexcept { return nullptr; }\ntemplate <typename T> struct Foo\
    \ {\n    static_assert(std::is_floating_point<T>::value,\n                  \"\
    Foo<T>: T must be floating point\");\n};\nstruct A final : Foo {\n    A() = default;\n\
    \    [[noreturn]] virtual void foo() override;\n};\ntemplate <typename T> concept\
    \ bool EqualityComparable = requires(T a, T b) {\n    { a == b } -> bool;\n};\n\
    ```\n\n### 分享技能\n\n在编码和开发知识网站上更加活跃，例如 StackExchange。如果你有能力开始并帮助他人，你不仅会因此感到非常棒，而且通过与其他成员互动，你也能学到很多东西。\n\
    \n![](img/893ff1cb7ac32885c7c794a5e648f755_73_2.png)\n\n## 转向移动端\n\n移动市场是测试你的编码技能并展示你创建的任何游戏或应用的好地方。如果你的应用程序很好，那么谁知道呢，它可能会成为应用商店中下一个伟大的产品。无论如何，这是一个很好的学习经验，值得考虑。\n\
    \n![](img/893ff1cb7ac32885c7c794a5e648f755_74_0.png)\n\n## 作品集\n\n如果你学习编码是为了将来从事开发工作，那么值得开始建立一个在线代码作品集。查看招聘信息，了解他们需要什么技能，然后学习并使用这些技能编写一些东西，并将其添加到作品集中。当申请工作时，附上作品集的链接。\n\
    \n![](img/893ff1cb7ac32885c7c794a5e648f755_74_1.png)\n\n## 在线学习\n\n在线课程是提升编码技能的好例子，即使你从初学者水平重新开始。通常，在线课程遵循严格的编码规范，所以如果你是自学的，那么看看其他开发者如何组织他们的代码，以及什么是可接受的，可能是值得的。\n\
    \n![](img/893ff1cb7ac32885c7c794a5e648f755_74_2.png)\n\n## 教授编码\n\n你会教书吗？如果你的编码技能非常出色，可以考虑联系学院或大学，看看他们是否需要编程语言教师，也许是兼职或夜校课程。如果不教书，那么考虑创建你自己的\
    \ YouTube 编码教学频道。\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_74_3.png)\n\n##\
    \ 分享代码\n\n开始分享吧，即使你认为你的代码不是很好。你收到的批评、建议和评论有助于你解决代码中的任何问题，并将它们全部添加到你的检查清单中。或者，你的代码可能非常出色，但除非你分享它，否则你不会知道。\n\
    \n![](img/893ff1cb7ac32885c7c794a5e648f755_74_4.png)\n\n## 硬件项目\n\n参与硬件项目是与他人分享你的代码并向其他贡献者学习的好资源。许多开发板都有供编码者申请的硬件项目，使用独特的代码来充分利用正在设计的硬件。\n\
    \n![](img/893ff1cb7ac32885c7c794a5e648f755_74_5.png)"
