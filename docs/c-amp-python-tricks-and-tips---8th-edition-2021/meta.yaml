  md: '# Loops and Decision Making


    Loops and repetition are one of the most important factors of any programming
    language. Good use of a loop creates a program that does exactly what you want
    it to and delivers the desired outcome without issues or errors.

    Without loops and decision making events within the code, your program will never
    be able to offer the user any choice. It’s this understanding of choice that elevates
    your skills as a programmer and makes for much better code.'
