    \       print (letter,)\n    print ()\n```\n\n## 冒号\n\n初学者常常忘记在结构语句的末尾添加冒号，例如：\n\
    \n```python\nclass Hangman:\ndef guess(self, letter):\n```\n\n等等。冒号用于分隔代码，并创建后续代码所属的缩进。\n\
    \n```python\nclass Hangman:\n    def __init__(self,word):\n        self.word =\
    \ word\n        self.missed_letters = []\n        self.guessed_letters = []\n\n\
    \    def guess(self,letter):\n        if letter in self.word and letter not in\
    \ self.guessed_letters:\n            self.guessed_letters.append(letter)\n   \
    \     elif letter not in self.word and letter not in self.missed_letters:\n  \
    \          self.missed_letters.append(letter)\n        else:\n            return\
    \ False\n        return True\n\n    def hangman_over(self):\n        return self.hangman_won()\
    \ or (len(self.missed_letters) == 6)\n\n    def hangman_won(self):\n        if\
    \ '_' not in self.hide_word():\n            return True\n        return False\n\
    \n    def hide_word(self):\n        rtn = ''\n        for letter in self.word:\n\
    \            if letter not in self.guessed_letters:\n                rtn += '_'\n\
    \            else:\n                rtn += letter\n        return rtn\n```\n\n\
    ## 运算符\n\n使用错误的运算符也是一个常见的错误。例如，当你在比较两个值时，你需要使用相等运算符（双等号，`==`）。使用单个等号（`=`）是一个赋值运算符，用于将值赋给变量（例如，`lives=10`）。\n\
    \n```python\n1 b = 5\n2 c = 10\n3 d = 10\n4 b == c #false because 5 is not equal\
    \ to 10\n5 c == d #true because 10 is equal to 10\n```\n\n## 操作系统\n\n为多个平台编写代码很困难，特别是当你开始利用操作系统的外部命令时。例如，如果你的代码要求清除屏幕，那么对于\
    \ Windows，你会使用 `cls`。而对于 Linux，你需要使用 `clear`。你需要通过捕获错误并发出替代命令来解决这个问题。\n\n```python\n\
    # Code to detect error for using a different OS\nrun=1\nwhile(run==1):\n    try:\n\
    \        os.system('clear')\n    except OSError:\n        os.system('cls')\n \
    \   print('\\n>>>>>>>>>Python 3 File Manager<<<<<<<<<<<\\n')\n```\n\n## C++ 初学者常见错误\n\
    \nC++ 开发者可能会遇到许多陷阱，尤其是因为这是一门更复杂且通常难以掌握的语言。初学者需要一步一步地学习 C++，并在继续学习之前消化所学内容。\n\n\
    ## VOID(C++, MISTAKES)\n\n诚然，不仅仅是 C++ 初学者会犯我们在这些页面中概述的错误，即使是经验丰富的程序员也难免会偶尔出错。以下是一些需要尽量避免的常见问题。\n\
    \n## 未声明的标识符\n\n一个常见的 C++ 错误，老实说也是大多数编程语言的常见错误，就是当你试图输出一个不存在的变量时。在屏幕上显示 x 的值是可以的，但如果你一开始就没有告诉编译器\
    \ x 的值是多少，那就不行了。\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_71_0.png)\n\n## STD\
    \ 命名空间\n\n初学者在整个代码中引用标准库是很常见的，但如果你漏掉了语句中的 `std::` 部分，你的代码在编译时就会出错。你可以通过添加以下内容来解决这个问题：\n\
    \n```cpp\nusing namespace std;\n```\n\n放在 `#include` 部分下面，然后就可以简单地使用 `cout`、`cin`\
    \ 等等。\n\n```cpp\n#include <iostream>\nusing namespace std;\n\nint main()\n{\n\
    \    int a, b, c, d;\n    a=10;\n    b=20;\n    c=30;\n    d=40;\n\n    cout <<\
    \ a, b, c, d;\n}\n```\n\n## 分号\n\n请记住，C++ 程序的每一行都必须以分号结尾。如果没有，编译器会将缺少分号的那一行与下一个分号所在的行视为同一行。这会在编译时产生各种各样的问题，所以不要忘记那些分号。\n\
    \n```cpp\n#include <iostream>\n\nint main()\n{\n    int a, b, c, d;\n    a=10;\n\
    \    b=20;\n    c=30\n    d=40;\n\n    std::cout << a, b, c, d;\n}\n```\n\n##\
    \ GCC 或 G++\n\n如果你在 Linux 中编译，那么你无疑会遇到 `gcc` 和 `g++`。简而言之，`gcc` 是 Gnu 编译器集合（或以前称为\
    \ Gnu C 编译器），而 `g++` 是 Gnu ++（C++ 版本）的编译器。如果你编译的是 C++，那么你需要使用 `g++`，因为使用错误的编译器驱动程序会导致问题。\n\
    \n![](img/893ff1cb7ac32885c7c794a5e648f755_71_1.png)"
