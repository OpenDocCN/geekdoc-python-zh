    \n第8步 自然，你可以通过将\"r\"只读实例更改为\"w\"写入来快速修复此问题。正如你已经知道的，这将创建文件、写入内容，然后将更改提交到文件。最终结果将报告一组不同的情况，在本例中，是代码的成功执行。\n\
    \n第9步 你还可以使用`finally:`块，它的工作方式类似，但不能与`else`一起使用。以我们第6步的例子为例：\n\n```\ntry:\n  \
