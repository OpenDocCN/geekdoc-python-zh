    ## 异常


    在编码时，你自然会遇到一些超出你控制范围的问题。假设你要求用户除以两个数字，而他们试图除以零。这将产生错误并中断你的代码。


    ### 异常对象


    Python 包含异常对象来处理代码中意外的错误，而不是停止代码的流程。你可以通过创建可能发生异常的条件来对抗错误。


    **步骤 1** 你可以通过简单地尝试将一个数字除以零来创建一个异常错误。这将报告 `ZeroDivisionError: Division by zero`
    消息，如截图所示。`ZeroDivisionError` 部分是异常类，这样的类有很多。


    **步骤 3** 你可以使用 `raise exception` 函数在 Python 中创建我们自己的错误处理代码。假设你的代码让你在宇宙中穿梭，但穿梭过多会导致曲速核心破裂。为了防止游戏因曲速核心超新星爆发而退出，你可以创建一个自定义异常：


    ![](img/893ff1cb7ac32885c7c794a5e648f755_23_0.png)


    ```

    raise Exception("warp core breach")

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_23_1.png)


    **步骤 2** 大多数异常是在 Python 遇到代码中固有的错误时自动引发的。然而，你可以创建自己的异常，旨在包含潜在的错误并对其做出反应，而不是让代码失败。


    ![](img/893ff1cb7ac32885c7c794a5e648f755_23_2.png)


    **步骤 4** 要捕获代码中的任何错误，你可以将潜在的错误封装在 `try:` 块中。此块由 `try`、`except`、`else` 组成，代码放在
    `try:` 中，然后如果有异常则执行某些操作，否则执行其他操作。


