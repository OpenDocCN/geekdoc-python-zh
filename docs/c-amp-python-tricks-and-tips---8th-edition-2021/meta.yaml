  md: "# Pygame Module\n\nSTEP 9 You can now implement a few additions and utilise\
    \ some previous tutorial code. The new elements are the subprocess module, of\
    \ which one function allows us to launch a second Python script from within another;\
    \ and we're going to create a New File called pygametxt.py:\n\n```\nimport pygame\n\
    import time\nimport subprocess\npygame.init()\nscreen = pygame.display.set_mode((800,\
    \ 250))\nclock = pygame.time.Clock()\n\nfont = pygame.font.Font(None, 25)\npygame.time.set_timer(pygame.USEREVENT,\
    \ 200)\n\ndef text_generator(text):\n    tmp = ''\n    for letter in text:\n \
    \       tmp += letter\n        if letter != ' ':\n            yield tmp\n\nclass\
    \ DynamicText(object):\n    def __init__(self, font, text, pos, autoreset=False):\n\
    \        self.done = False\n        self.font = font\n        self.text = text\n\
    \        self._gen = text_generator(self.text)\n        self.pos = pos\n     \
    \   self.autoreset = autoreset\n        self.update()\n\n    def reset(self):\n\
    \        self._gen = text_generator(self.text)\n        self.done = False\n  \
    \      self.update()\n\n    def update(self):\n        if not self.done:\n   \
    \         try: self.rendered = self.font.render(next(self._gen), True, (0, 128,\
    \ 0))\n            except StopIteration:\n                self.done = True\n \
    \               time.sleep(10)\n                subprocess.Popen(\"python3 /home/pi/Documents/Python\\\
    \ Code/pygame1.py 1\", shell=True)\n\n    def draw(self, screen):\n        screen.blit(self.rendered,\
    \ self.pos)\n\ntext=(\"A long time ago, a barbarian strode from the frozen north.\
    \ Sword in hand...\")\nmessage = DynamicText(font, text, (65, 120), autoreset=True)\n\
    \nwhile True:\n    for event in pygame.event.get():\n        if event.type ==\
    \ pygame.QUIT: break\n        if event.type == pygame.USEREVENT: message.update()\n\
    \    else:\n        screen.fill(pygame.color.Color('black'))\n        message.draw(screen)\n\
    \        pygame.display.flip()\n        clock.tick(60)\n        continue\n   \
    \ break\npygame.quit()\n```\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_40_0.png)\n\
    \nSTEP 10 When you run this code it will display a long, narrow Pygame window\
    \ with the intro text scrolling to the right. After a pause of ten seconds, it\
    \ then launches the main game Python script where you can move the warrior sprite\
    \ around. Overall the effect is quite good but there's always room for improvement.\n\
    \n![](img/893ff1cb7ac32885c7c794a5e648f755_40_1.png)\n\n![](img/893ff1cb7ac32885c7c794a5e648f755_40_2.png)"
