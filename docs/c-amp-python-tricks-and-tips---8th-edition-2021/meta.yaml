    ## Dictionaries


    Lists are extremely useful but dictionaries in Python are by far the more technical
    way of dealing with data items. They can be tricky to get to grips with at first
    but you’ll soon be able to apply them to your own code.


    ### KEY PAIRS


    A dictionary is like a list but instead each data item comes as a pair, these
    are known as Key and Value. The Key part must be unique and can either be a number
    or string whereas the Value can be any data item you like.


    STEP 1 Let’s say you want to create a phonebook in Python. You would create the
    dictionary name and enter the data in curly brackets, separating the key and value
    by a colon Key:Value. For example:

    phonebook={"Emma": 1234, "Daniel": 3456, "Hannah": 6789}


    STEP 2 Just as with most lists, tuples and so on, strings need be enclosed in
    quotes (single or double), whilst integers can be left open. Remember that the
    value can be either a string or an integer, you just need to enclose the relevant
    one in quotes:

    phonebook2={"David": "0987 654 321"}


    STEP 3 As with lists and tuples, you can check the contents of a dictionary by
    giving the dictionary a name: phonebook, in this example. This will display the
    data items you’ve entered in a similar fashion to a list, which you’re no doubt
    familiar with by now.


    ![](img/893ff1cb7ac32885c7c794a5e648f755_11_0.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_11_1.png)


    STEP 4 The benefit of using a dictionary is that you can enter the key to index
    the value. Using the phonebook example from the previous steps, you can enter:

    phonebook["Emma"]

    phonebook["Hannah"]


    ![](img/893ff1cb7ac32885c7c794a5e648f755_11_2.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_11_3.png)


    STEP 5 Adding to a dictionary is easy too. You can include a new data item entry
    by adding the new key and value items like:


    ```

    phonebook["David"] = "0987 654 321"

    phonebook

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_12_0.png)


    STEP 6 You can also remove items from a dictionary by issuing the del command
    followed by the item''s key; the value will be removed as well, since both work
    as a pair of data items:


    ```

    del phonebook["David"]

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_12_2.png)


    STEP 7 Taking this a step further, how about creating a piece of code that will
    ask the user for the dictionary key and value items? Create a new Editor instance
    and start by coding in a new, blank dictionary:


    ```

    phonebook={}

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_12_4.png)


    STEP 8 Next, you need to define the user inputs and variables: one for the person''s
    name, the other for their phone number (let''s keep it simple to avoid lengthy
    Python code):


    ```

    name=input("Enter name: ")

    number=int(input("Enter phone number: "))

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_12_1.png)


    STEP 9 Note we''ve kept the number as an integer instead of a string, even though
    the value can be both an integer or a string. Now you need to add the user''s
    inputted variables to the newly created blank dictionary. Using the same process
    as in Step 5, you can enter:


    ```

    phonebook[name] = number

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_12_3.png)


    STEP 10 Now when you save and execute the code, Python will ask for a name and
    a number. It will then insert those entries into the phonebook dictionary, which
    you can test by entering into the Shell:


    ```

    phonebook

    phonebook["David"]

    ```


    If the number needs to contain spaces you need to make it a string, so remove
    the int part of the input.


    ![](img/893ff1cb7ac32885c7c794a5e648f755_12_5.png)


    ## Splitting and Joining Strings


    When dealing with data in Python, especially from a user''s input, you will undoubtedly
    come across long sets of strings. A useful skill to learn in Python programming
    is being able to split those long strings for better readability.


    ### STRING THEORIES


    You''ve already looked at some list functions, using .insert, .remove, and .pop
    but there are also functions that can be applied to strings.


    STEP 1 The main tool in the string function arsenal is .split(). With it you''re
    able to split apart a string of data, based on the argument within the brackets.
    For example, here''s a string with three items, each separated by a space:

    text="Daniel Hannah Emma"


    STEP 2 Now let''s turn the string into a list and split the content accordingly:

    names=text.split(" ")

    Then enter the name of the new list, names, to see the three items.


    STEP 3 Note that the text.split part has the brackets, quotes, then a space followed
    by closing quotes and brackets. The space is the separator, indicating that each
    list item entry is separated by a space. Likewise, CSV (Comma Separated Value)
    content has a comma, so you''d use:

    text="January,February,March,April,May,June"

    months=text.split(",")

    months


    ![](img/893ff1cb7ac32885c7c794a5e648f755_13_0.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_13_1.png)


    STEP 4 You''ve previously seen how you can split a string into individual letters
    as a list, using a name:

    name=list("David")

    name

    The returned value is ''D'', ''a'', ''v'', ''i'', ''d''. Whilst it may seem a
    little useless under ordinary circumstances, it could be handy for creating a
    spelling game for example.


    ![](img/893ff1cb7ac32885c7c794a5e648f755_13_2.png)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_13_3.png)


    STEP 5 The opposite of the .split function is .join, where you will have separate
    items in a string and can join them all together to form a word or just a combination
    of items, depending on the program you''re writing. For instance:


    ```

    alphabet="".join(["a","b","c","d","e"])

    alphabet

    ```


    This will display ''abcde'' in the Shell.


    ![](img/893ff1cb7ac32885c7c794a5e648f755_14_0.png)


    STEP 6 You can therefore apply .join to the separated name you made in Step 4,
    combining the letters again to form the name:


    ```

    name="".join(name)

    name

    ```


    We''ve joined the string back together, and retained the list called name, passing
    it through the .join function.


    ![](img/893ff1cb7ac32885c7c794a5e648f755_14_2.png)


    STEP 7 A good example of using the .join function is when you have a list of words
    you want to combine into a sentence:


    ```

    list=["Conan", "raised", "his", "mighty", "sword", "and", "struck", "the", "demon"]

    text=" ".join(list)

    text

    ```


    Note the space between the quotes before the .join function (where there were
    no spaces in the Step 6''s join)


    ![](img/893ff1cb7ac32885c7c794a5e648f755_14_4.png)


    STEP 8 As with the .split function, the separator doesn''t have to be a space,
    it can also be a comma, a full stop, a hyphen or whatever you like:


    ```

    colours=["Red", "Green", "Blue"]

    col=",".join(colours)

    col

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_14_1.png)


    STEP 9 There''s some interesting functions you apply to a string, such as .capitalize
    and .title. For example:


    ```

    title="conan the cimmerian"

    title.capitalize()

    title.title()

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_14_3.png)


    STEP 10 You can also use logic operators on strings, with the ''in'' and ''not
    in'' functions. These enable you to check if a string contains (or does not contain)
    a sequence of characters:


    ```

    message="Have a nice day"

    "nice" in message

    "bad" not in message

    "day" not in message

    "night" in message

    ```


    ![](img/893ff1cb7ac32885c7c794a5e648f755_14_5.png)'
