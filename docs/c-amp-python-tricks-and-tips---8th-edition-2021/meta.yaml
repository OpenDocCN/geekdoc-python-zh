    `from tkinter import *`\n\n第3步 理想的方法是在代码中添加`mainloop()`来控制Tkinter事件循环，但我们很快会讲到这个。你刚刚创建了一个Tkinter小部件，还有更多我们可以尝试的：\n\
    `btn=Button()`\n`btn.pack()`\n`btn[\"text\"]=\"大家好！\"`\n第一行专注于新创建的窗口。点击回Shell继续输入其他行。\n\
