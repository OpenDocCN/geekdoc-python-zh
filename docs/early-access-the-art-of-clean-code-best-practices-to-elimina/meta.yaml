    a few hundreds of dollars of damage. Her friends might even suspect that Alice
    had written the code in her favor! This final point may sound a little tongue-in-cheek,
    but in real-world cases, the stakes are higher. Second-order consequences can
    be even more severe than the more predictable first-order consequences of complexity.


    All these potential problems could have been averted had Alice refrained from
    applying a *potential optimization* without fully thinking through whether this
    optimization was premature. The goal of the app is to broker one evening’s transaction
    between three friends. Realistically, there will be at most a few hundred transactions
    and a dozen calls to `max_transaction` rather than the thousands for which the
    optimized code is designed. Alice’s computer could’ve executed the unoptimized
    code within a split second, and neither Bob nor Carl would even have realized
    that the code was unoptimized. Plus, the unoptimized code is simpler and easier
    to maintain.


    However, suppose word gets around and a casino—which relies on high performance,
    scalability, and long-term transaction histories—contacts Alice to implement the
    same system. In that case, she can still fix the bottleneck of recomputing the
    maximum instead of tracking it quickly. But now she’d be certain that the additional
    code complexity was indeed a good investment. By avoiding optimization until the
    application requires it, she’d have saved herself dozens of those unnecessary
    premature optimizations.


    # Six Tips for Performance Tuning


    Alice’s story not only gave us a detailed picture of premature optimization in
    practice but also hinted at the proper way to successfully optimize. It’s important
    to remember that Donald Knuth did not argue that optimization *itself* is the
    root of all evil. Instead, the real problem is *premature* optimization. Now that
    Knuth’s quote has become quite popular, many mistakenly take it to be an argument
    against all optimization. When it comes at the right time, however, optimization
    can be critically important.


    The rapid technological improvements in recent decades are largely due to optimizations:
    circuit placement on chips, algorithms, and software usability have been optimized
    continuously over time. Moore’s Law states that the improvements in computer chip
    technology that make computing incredibly cheap and efficient will continue exponentially
    for a long time yet. Improvements in chip technology have significant potential,
    and they cannot be considered premature. If they create value for many, optimizations
    are at the heart of progress.


    As a rule of thumb, you should optimize only if you have clear evidence—such as
    measurements from performance optimization tools—that the code part or function
    to be optimized is indeed one of the bottlenecks and that users of the application
    will appreciate or even demand a better'
- md: "performance. Optimizing the speed of starting the Windows operating system\
    \ is not premature because it’ll directly benefit millions of users, whereas optimizing\
    \ the scalability of your web application with an upper limit of 1000 users per\
    \ month requesting a static website is premature. The costs of *developing* an\
    \ application are not as high as the costs of thousands of users *using* it. If\
    \ you can spend one hour of your time to save the users a few seconds, it’s usually\
    \ a win! Your users’ time is more valuable than your own. This is why we use computers\
    \ in the first place—to invest a few resources upfront and gain many more resources\
    \ back afterward. Optimization is not always premature. Sometimes, you must optimize\
    \ in order to create a valuable product in the first place—why bother shipping\
    \ an unoptimized product that doesn’t generate any value? Having seen several\
    \ reasons to avoid premature optimization, we will now look at six performance\
    \ tips to help you choose how and when to optimize your code.\n\n## Measure First,\
    \ Improve Second\n\nMeasure your software’s performance so you know where it can\
    \ and should be improved. What you don’t measure can’t be improved, since you\
    \ have no way to track your progress.\n\nPremature optimization is often an optimization\
    \ applied before you’ve even measured, which is a direct cause of the idea that\
    \ premature optimization is the root of all evil. You should always optimize only\
    \ after you have begun to measure the performance of your non-optimized code,\
    \ like memory footprint or speed. This is your benchmark. There’s no point in\
    \ trying to improve runtime, for example, if you don’t know what your original\
    \ runtime is. There’s no way to tell if your “optimization” actually increases\
    \ total runtime or results in no measurable effect unless you begin with a clear\
    \ benchmark.\n\nAs a general strategy for measuring performance, start with writing\
    \ the most straightforward, naïve code possible that’s also easy to read. You\
    \ may call this your *prototype*, the *naïve approach*, or the *MVP*. Document\
    \ your measurements in a spreadsheet. This is your first benchmark. Create an\
    \ alternative code solution and measure its performance against the benchmark.\
    \ Once you’ve rigorously proven that your optimization improves your code performance,\
    \ the new optimized code becomes your new benchmark, which all subsequent improvements\
    \ should be able to beat. If an optimization doesn’t measurably improve your code,\
    \ throw it away.\n\nThis way, you can track your code’s improvement over time.\
    \ You can also document, prove, and defend an optimization to your boss, your\
    \ peer group, or even the scientific community.\n\n## Pareto is King\n\nThe 80/20\
    \ principle, or *Pareto principle*, discussed in Chapter 2, also applies to performance\
    \ optimization. Some features will take up considerably more resources, such as\
    \ time and memory footprint, than others, so focusing on improving bottlenecks\
    \ like these will help you effectively optimize your code.\n\nTo exemplify the\
