    ```\n\n*清单 7-8：分析网页链接的单行程序解决方案*\n\n通过导入 re 库，我们利用了正则表达式的强大技术，立即投入了数千行代码的工作，使我们能够用一行代码编写整个程序。杠杆是你成为伟大程序员道路上的强大伙伴。例如，在代码中使用库而不是自己实现所有功能，就像使用应用程序来规划你的旅程，而不是用纸质地图来规划每一个细节。\n\
    \n> 参见 https://pythononeliners.com/ 了解解释此解决方案的视频。\n\n## 8. 避免强制用户界面\n\n强制用户界面是指那些要求用户在程序继续执行主流程之前进行交互的界面。例如，像安全外壳（SSH）、top、cat\
    \ 和 vim 这样的小程序，以及像 Python 的 input() 函数这样的编程语言特性。强制用户界面限制了代码的可用性，因为它们的设计不是为了在没有人为干预的情况下运行。然而，很多时候，强制用户界面背后的代码所提供的功能对于必须能够无需与用户手动交互即可运行的自动化程序也很有用。粗略地说，如果你把好的代码放在强制用户界面后面，没有用户交互就无法访问它！\n\
    \n假设你用 Python 创建了一个简单的预期寿命计算器，它接受用户的年龄作为输入，并基于一个简单的启发式方法返回预期剩余年数。\n\n> “如果你小于\
