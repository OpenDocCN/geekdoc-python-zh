    ![](img/8792d1c61415b2790e4dd6b390c6d60b_154_0.png)


    你已经读完了整本书，并对如何实际提升编程技能有了深入的理解。你学习了编写简洁代码的策略和成功实践者的战略。请允许我以个人笔记来结束这本书！


    在研究了复杂性难题之后，你可能会问：如果简化如此强大，为什么不是每个人都在做呢？问题在于，实施简化虽然好处巨大，但需要极大的勇气、精力和意志力。大大小小的组织通常会坚决抵制移除工作和简化流程。有人负责实施、维护和管理这些功能，即使他们知道这些功能在很大程度上无关紧要，他们也常常会竭尽全力保住自己的工作。这是一个损失厌恶的问题——很难放弃任何提供哪怕最微小价值的东西。这是需要对抗的事情；我一生中从未后悔过采取的任何简化措施。几乎所有东西都有价值，但重要的是要考虑你为获得的价值付出了多少代价。当我创办Finxter教育网站时，我有意识地决定在很大程度上忽略社交媒体，立即我就从额外获得的时间中看到了显著的积极成果，这些时间可以花在真正推动进展的事情上。简化不仅有益于编码，也有益于生活的所有领域；它有能力让你的生活更高效、更平静。希望通过阅读本书，你对简化、精简和专注变得更加开放。如果你确实决定走简化的道路，你将与伟大的人为伴：阿尔伯特·爱因斯坦相信“简单而谦逊的生活方式对每个人都是最好的，对身体和心灵都是最好的。”亨利·戴维·梭罗总结道：“简单，简单，简单！我说，让你的事情只有两三件，而不是一百件或一千件。”孔子知道“生活其实很简单，但我们却坚持把它变得复杂。”


    为了帮助你持续努力简化，我制作了一份一页的书籍摘要，以便携式文档格式（PDF）提供，你可以在本书的配套页面下载、打印并钉在办公室墙上：https://blog.finxter.com/simplicity/。也欢迎注册我的免费*Finxter邮件学院*，它教授简短而简单的编程课程——我们通常专注于激动人心的科技行业，如Python、数据科学、区块链开发或机器学习——但我们也讨论关于极简主义、自由职业和商业策略的生产力技巧。


    在你离开之前，请允许我对你花这么多时间陪伴我表示深深的感谢。我的生活目标是帮助人们通过代码完成更多事情，我希望这本书能帮助你实现这一点。我希望你已经获得了关于如何通过少做来提升编码生产力的见解。我希望你在翻过这一页后，立即开始你的第一个或下一个编码项目——并继续活跃在志同道合的编码者组成的Finxter社区中。为你的成功干杯！'
