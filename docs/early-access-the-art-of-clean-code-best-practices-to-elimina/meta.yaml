    \ in EUR. However, the reader of your code—including your future self—has to think\
    \ about the purpose of this number. It’s not self-explanatory. A far better way\
    \ of handling the magic number 0.9 is to store it in an all-uppercase variable—used\
    \ to indicate that it is a constant that doesn’t change—such as `CONVERSION_RATE\
    \ = 0.9` and use it as a factor in your conversion computations. For example,\
    \ you may then calculate your income in EUR as `income_euro = CONVERSION_RATE\
    \ * income_usd`.\n\nThese are only a few naming rules. Beyond these quick tips,\
    \ the best way to learn naming conventions is to study the well-crafted code of\
    \ experts. Googling the relevant conventions (for example, “Python naming conventions”)\
