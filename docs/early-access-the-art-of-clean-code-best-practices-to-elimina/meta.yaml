  md: '# 15. Avoid Hand-Hacking: Write Programs to Write Programs If You Can


    The principle suggests that code that can be generated automatically *should be*,
    because humans are notoriously prone to failures, especially in an activity that’s
    repetitive and boring. There are many ways to accomplish this—in fact, modern
    high-level programming languages such as Python are compiled down to machine code
    using such programs. By writing programs to write programs, the creators of those
    compilers helped high-level programmers to create all kinds of application software
    without needing to worry about low-level hardware programming languages. Without
    those programs writing programs for us, the computer industry would still be in
    its infancy.


    Code generators and compilers already produce large amounts of source code today.
    Let’s examine an additional way to think of this principle. Today, the technologies
    of machine learning and artificial intelligence lift this concept of writing programs
    to write programs to yet another level. Intelligent machines (machine learning
    models) are assembled by humans and then go on to rewrite (and tune) themselves
    based on data. Technically, a machine learning model is a program that has rewritten
    itself many times over until its behavior has maximized a set fitness function
    (usually set by humans). As machine learning permeates (and prevails over) more
    areas of computer science, this principle will become more and more relevant in
    modern computing. Human programmers will still play a major role in using those
    powerful tools; after all, compilers have not replaced human labor but have instead
    opened up a new world of applications created by human programmers. I expect that
    the same will happen in programming: machine learning engineers and software architects
    will design advanced applications by connecting the different low-level programs,
    such as machine learning models. Well, that’s one view on the topic—yours may
    be more or less optimistic!


    # Conclusion


    In this chapter, you’ve learned 15 principles designed by the Unix creators to
    write better code. It’s worth repeating them—as you read through the list, think
    about how each principle applies to your current code project.


    +   - Make each function do one thing well

    - Simple is better than complex

    - Small is beautiful

    - Build a prototype as soon as possible

    - Choose portability over efficiency

    - Store data in flat text files

    - Use software leverage to your advantage'
