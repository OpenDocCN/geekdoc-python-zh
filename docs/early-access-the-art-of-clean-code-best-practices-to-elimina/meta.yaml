    \ the portable approach over the more efficient one of using a database.\n\n```\n\
    from sklearn.datasets import fetch_olivetti_faces\nfrom numpy.random import RandomState\n\
    \nrng = RandomState(0)\n\n# Load faces data\nfaces, _ = fetch_olivetti_faces(...)\n\
    ```\n\nListing 7-7: Load data from a flat file in a Python data analysis task\n\
    \nIn the function `fetch_olivetti_faces`, we load scikit-learn’s *Olivetti faces*\
