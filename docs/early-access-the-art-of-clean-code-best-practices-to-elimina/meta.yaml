    # **Principle 13: The Law of Demeter**


    Dependencies are everywhere. When you import a library in your code, your code
    depends partially on the library’s functionality, but it will also have interdependencies
    within itself. In object-oriented programming, one function may depend on another
    function, one object on another object, and one class definition on another class
    definition.


    To write clean code, minimize the interdependency of your code elements by following
    the *Law of Demeter*, which was proposed in the late 1980s by Ian Holland, a software
    developer working on a software project named after *Demeter*, the Greek goddess
    of agriculture, growth, and fertility. The project group promoted the idea of
    “growing software” as opposed to simply building it. However, what became known
    as the Law of Demeter has little to do with these arguably more metaphysic ideas—it’s
    a practical approach of writing loosely coupled code in object-oriented programming.
    Here’s a concise quote explaining the Law of Demeter from the project group’s
    website http://ccs.neu.edu/home/lieber/what-is-demeter.html:


    > > An important concept of Demeter is to split software into at least two parts:
    The first part defines the objects. The second part defines the operations. The
    goal of Demeter is to maintain a loose coupling between the objects and the operations,
    so that one can make modifications to either without serious impact on the other.
    This cuts down significantly on maintenance time.'
