    \ Science News 网站上的一篇文章。\n\n你最初的 Python 代码可能看起来像清单 7-9。\n\n```\ndef your_life_expectancy():\n\
    \    age = int(input('how old are you? '))\n\n    if age<85:\n        exp_years\
    \ = 72 - 0.8 * age\n    else:\n        exp_years = 22 - 0.2 * age\n\n    print(f'People\
    \ your age have on average {exp_years} years left - use them wisely!')\n\nyour_life_expectancy()\n\
    ```\n\n清单 7-9：预期寿命计算器——一个简单的启发式方法——实现为强制用户界面\n\n以下是清单 7-9 中代码的一些运行示例。\n\n```\n\
    > how old are you? 10\nPeople your age have on average 64.0 years left - use them\
