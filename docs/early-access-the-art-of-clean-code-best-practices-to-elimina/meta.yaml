    like you, they assume that nobody else has already thought of it. For an idea
    to succeed, it takes a person to push it into reality. If you fast forward a few
    years, the person that succeeded will be the one who took quick and decisive action,
    released early and often, incorporated feedback from real users, and gradually
    improved their software by building on the momentum of previous releases. Keeping
    the idea secret would simply restrict its growth potential.


    # Conclusion


    Envision your end product and think about the needs of your users before you write
    any code. Work on your MVP and make it valuable, well designed, responsive, and
    usable. Remove all features but those that are absolutely necessary to achieve
    the goal. Focus on one thing at a time. Then, release MVPs quickly and often—improve
    them over time by gradually testing and adding more features. Less is more! Spend
    more time thinking about the next feature to implement than you spend actually
    implementing each feature. Every feature incurs not only direct but also indirect
    implementation costs for all features to come in the future. Use split testing
    to test the response to two product variants at a time and quickly discard features
    that don''t lead to an improvement in your key user metrics, such as retention,
    time on page, or activity. This leads to a more holistic approach to business—acknowledging
    that software development is only one step in the whole product creation and value
    delivery process.


    In the next chapter, you''ll learn why and how to write clean and simple code,
    but remember: not writing unnecessary code is the surest way to clean and simple
    code!'
