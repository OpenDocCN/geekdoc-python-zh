  md: "Many bottlenecks can be resolved by tuning your *algorithms and data structures*.\
    \ For example, imagine you're developing a financial application. You know your\
    \ bottleneck is the function `calculate_ROI()`, which goes over all combinations\
    \ of potential buying and selling points to calculate the maximum profit. As this\
    \ function is the bottleneck of the entire application, you want to find a better\
    \ algorithm for it. After a bit of research, you find out about the *maximum profit\
    \ algorithm*, a simple, powerful replacement that will speed up your computation\
    \ significantly. The same research can be done on data structures causing bottlenecks\
    \ of their own.\n\nTo reduce bottlenecks and optimize performance, ask yourself:\n\
    \n+   - Can you find better algorithms that are already proven—for example, in\
    \ books, research papers, or even Wikipedia?\n- Can you tweak existing algorithms\
    \ for your specific problem at hand?\n- Can you improve its data structures? Some\
    \ common easy solutions include using *sets* instead of lists (checking membership,\
    \ for example, is much faster for sets than lists) or *dictionaries* instead of\
    \ collections of tuples.\n\nSpending time researching these questions pays off\
    \ both for your application and for you. You'll become a better computer scientist\
    \ in the process.\n\n# All Hail the Cache\n\nOnce you've made any necessary changes\
    \ based on the previous tips, you can move on to this quick and dirty trick for\
    \ removing unnecessary computations: store the result of a subset of computations\
    \ you have already performed in a *cache*. This trick works surprisingly well\
    \ for a variety of applications. Before performing any new computation, you first\
    \ check the cache to see if you've already done that computation. This is similar\
    \ to how you approach simple calculations in your head—at a certain point, you\
    \ don't *actually* calculate 6 × 5 in your head but simply rely on your memory\
    \ to give you the result right away. Consequently, caching makes sense only if\
    \ the same type of intermediate calculations reappears multiple times throughout\
    \ your application. Fortunately, this holds for most real-world applications—for\
    \ example, thousands of users may watch the same YouTube video in a given day,\
    \ so caching it close to the user (rather than thousands of miles away in a distant\
    \ data center) saves scarce network bandwidth resources.\n\nLet's explore a short\
    \ code example where caching results in significant performance benefits: the\
    \ Fibonacci algorithm.\n\n```\ndef fib(n):\n    if n < 2:\n        return n\n\
    \    fib_n = fib(n-1) + fib(n-2)\n    return fib_n\n\nprint(fib(100))\n```"
