  - '[PAGE 139]


    We''ll first take a brief tour of some creations that have benefited tremendously
    from the radical focus of their creators. Later, we''ll see how you can apply
    minimalism in your own design efforts.


    # Minimalism in the Evolution of Mobile Phones


    A prime example of minimalism in computing design can be seen in the evolution
    of mobile phones (see Figure 8-1). The Nokia Mobira Senator was one of the earliest
    commercial “mobile” phones, released in the 1980s, weighing 10 kg, and quite complicated
    to handle. A year later, Motorola marketed its own DynaTAC 8000X model that was
    10 times lighter—weighing only 1 kg. Nokia had to up its game. In 1992, Nokia
    came up with the 1011 at half the weight of the DynaTAC 8000X. Nearly a decade
    later in 2000, in accordance with Moore’s Laws, Nokia achieved mega-success with
    its iconic Nokia 3310, weighing only 88 g. As mobile phone technology grew more
    sophisticated and complex, the *complexity of the user interface*, including the
    size, weight, and even number of buttons, *reduced* drastically. The evolution
    of mobile phones proves that radically minimalistic design can be done, even as
    the complexity of the applications increases by orders of magnitude. You could
    even argue that minimalistic design has paved the way for the success of smartphone
    apps and their exploding usage in today’s world. You’d have a hard time browsing
    the web, using mapping services, or sending video messages with the Nokia Senator!


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_139_0.png)


    Minimalistic design is apparent not only in smartphone development. Individual
    companies use it to improve UX and create focused applications. What better example
    could there be than the Google search engine?'
  - '[PAGE 140]


    # Minimalism in Search


    In Figure 8-2, I''ve sketched a minimalistic design that resembles how Google—and
    its copycats—designs its primary user interface as a radically simplified gate
    into the web. Make no mistake, the minimalistic and clean design is not an accident.
    This landing page is frequented by billions of users every day. It may be *the*
    primary real estate on the web. A small advertisement on the Google landing page
    could generate billions of clicks and, likely, billions of USD in revenue for
    Google, but Google hasn''t allowed these ads to clutter its landing page, despite
    the loss of short-term revenue opportunity—the company managers know that maintaining
    their brand integrity and focus, expressed through the minimalistic design, is
    even more valuable than the revenues generated through selling out their prime
    real estate.


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_140_0.png)


    Now compare this clean, focused design to the kind that alternative search engines
    like Bing and Yahoo use to exploit their primary real estate (see Figure 8-3).


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_140_1.png)'
  - '[PAGE 141]


    Even for basic search engine sites, companies like Yahoo have followed the same
    path: they cluttered the valuable real estate with news and advertisements to
    boost short-term revenues. But these revenues didn''t last because the design
    drove away the commodity that generated it: users. Reduced usability led to competitive
    disadvantages and the continuous erosion of users'' habitual search behavior.
    Any additional website element unrelated to search increases the cognitive challenge
    to the user, who must ignore attention-grabbing headlines, ads, and images. The
    smooth search experience is one of the reasons why Google continuously increased
    its market share. The last word isn''t spoken yet, but the rising popularity of
    focused search engines during the last decades indicates the superiority of minimalistic
    and focused design.


    # Material Design


    Google developed and currently adheres to the *Material Design* philosophy and
    design language, which describes a way to organize and design screen elements
    according to what users already understand intuitively: physical world elements
    such as paper, cards, pens, and shadow. Figure 8-3 from the previous section shows
    such an example of material design. The website is structured into cards, each
    card representing a piece of content, which creates a layout that resembles a
    newspaper with an image and some headline text. The look and feel of the website
    are almost materialistic, even though the three-dimensional (3D) effect is a pure
    illusion on the two-dimensional (2D) screen.


    Figure 8-4 compares a material design on the left and a non-material design with
    unnecessary elements stripped out on the right. You could argue that the non-material
    design is more minimalistic, and, in a way, you would be right. It takes less
    space and uses fewer colors and fewer nonfunctional visual elements like shadows.
    However, lacking boundaries and an intuitively familiar layout, the non-material
    design is often more confusing to the reader. The true minimalist will always
    use fewer costly resources to accomplish the same task. In some cases, this means
    reducing the number of visual elements on a website. In other cases, this means
    adding some elements to reduce the time the user has to think. As a rule of thumb:
    user time is a much scarcer resource than screen space.


    You can find a full introduction to material design with many beautiful case studies
    at https://material.io/design/. New design systems will emerge and users will
    get more and more used to digital work, so the material metaphors may well become
    less useful for the next generation of computer users. For now, just note that
    minimalism requires careful consideration of the relevant resources: time, space,
    and money—and you must weigh them according to the needs of your application.
    To sum up, minimalistic design gets rid of all unnecessary elements and results
    in a beautiful product likely to delight your users.


    Next, you''ll learn how to achieve it.'
  - '[PAGE 142]


    The Art of Clean Code (Early Access) © 2022 by Christian Mayer


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_142_0.png)


    # How to Achieve Minimalistic Design


    In this section, you’ll learn some technical tips and methods on how to achieve
    a focused, minimalistic design.


    # Use Whitespace


    Whitespace is one of the key pillars of minimalistic design. Adding whitespace
    to your application first may seem like a waste of valuable real estate. You must
    be crazy not to use every inch of a highly-trafficked website, right? You could
    use it for advertisements, “call to actions” to sell more products, additional
    information about the value proposition, or more personalized recommendations.
    The more successful your app becomes, the more stakeholders will fight for every
    bit of attention they can get, and it’s likely that nobody will ask you to remove
    non-whitespace elements from your app.


    Thinking “subtractively” may not come naturally; however, replacing design elements
    with whitespace will improve clarity and result in a more focused UX. Successful
    companies manage to keep the main thing the main thing by using whitespace to
    remain focused and sharp. For example, Google’s landing page uses a lot of whitespace,
    and Apple uses lots of whitespace when presenting its products. When thinking
    about your users, remember this: if you confuse them, you’ll lose them. Whitespace
    increases the clarity of user interfaces.


    Figure 8-5 shows a simple design idea for an online pizza delivery service. The
    whitespace supports the focus on the main thing: getting customers to order pizza.
    Unfortunately, seldomly will a pizza delivery service be bold enough to use whitespace
    in such an extreme way.'
  - '[PAGE 143]


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_143_0.png)


    Figure 8-5: Use lots of whitespace


    Whitespace can improve the clarity with text, too. Have a look at Figure 8-6,
    which compares two ways of formatting a paragraph.


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_143_1.png)


    Figure 8-6: Whitespace in text


    The left side of Figure 8-6 is far less readable. The right side injects whitespace
    to improve readability and UX: margins on the left and right around the text block,
    indentation of paragraphs, an increased line height, top and bottom margins around
    paragraphs, and increased font size. The costs of this additional space are negligible:
    scrolling is cheap, and we don''t have to physically cut more trees for paper
    when the publication is digital. On the other hand, the benefits are very real:
    the UX of your website or application improves significantly!'
- md: '## Remove Design Elements


    The principle is simple: go over each design element, one by one, and throw it
    out if possible. *Design elements* are any visible elements of the user interface,
    such as menu items, calls to action, featured lists, buttons, images, boxes, shadows,
    form fields, pop-ups, videos, and everything else that takes up real estate in
    your user interface. Literally, go over all design elements and ask: *Can I remove
    it?* You’ll be surprised how often the answer will be *yes!*


    Make no mistake—removing design elements is not easy! You’ve spent time and effort
    creating them, and the sunk cost bias makes you tempted to hold on to your creations
    even when they’re unnecessary. Figure 8-7 shows an idealized editing process in
    which you classify each element according to its importance regarding the UX.
    For example, does a menu item referring to your company’s blog help the user in
    the checkout process when ordering a product? No, so it should be classified as
    not important. Amazon has stripped all unnecessary design elements from the ordering
    process, for instance, by introducing the one-click buy button. When I first learned
    about this method in a scientific writing workshop, it completely transformed
    the way I thought about editing. Removing unimportant and less important design
    elements guarantees improved usability with little risk. But only truly great
    designers have the boldness to remove *important* design elements and leave only
    *very important* elements. Yet, this is what separates great from merely good
    design.


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_144_0.png)


    *Figure 8-7: Idealized editing process*


    Figure 8-8 shows an example of a cluttered design and a minimalistic, edited design.
    The order page on the left is what you may well see from an online pizza delivery
    service. Some elements are very important, such as the address to which to deliver
    the pizza and the order button, but those like the overly detailed ingredient
    list and “What’s New?” info box are less so. On the right, you see an edited version
    of this order page. We removed unnecessary elements, focused on the most popular
    upsells, combined the ingredients list with the headline, and combined the labels
    with the form elements. This allowed us to add more whitespace and even increase
    the size of a *very important* design element: the image of the tasty pizza! The
    reduced clutter and increased focus are likely to increase the conversion rate
    of the order page through an improved UX.


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_145_0.png)


    ## Remove Features


    The best way to implement a minimalistic design is to remove whole features from
    your application! You’ve already studied this idea in Chapter 3 about creating
    MVPs, which have the minimum number of features needed to validate a hypothesis.
    Minimizing the number of features is equally helpful in helping an established
    business refocus its product offerings.


    Over time, applications tend to accumulate features—a phenomenon known as *feature
    creep*. As a result, more and more focus must be shifted toward maintaining existing
    features. Feature creep leads to bloated software, and bloated software leads
    to technical debt. This reduces the agility of an organization. The idea behind
    removing features is to release energy, time, and resources and to reinvest into
    the few features that matter most to your users.


    Popular examples of feature creep and its harmful effects on usability are Yahoo,
    AOL, and MySpace, who all somehow lost their focused products by adding too much
    stuff to the user interfaces.


    In contrast, the most successful products in the world are focused and have resisted
    feature creep, even if it doesn’t look like it. Microsoft is a great example of
    how building *focused products* helped it become a super successful company. A
    common perception is that Microsoft products such as Windows are slow, inefficient,
    and loaded with too many features. But nothing could be further from the truth!
    *What you see is all there is*—you don’t see the myriad of features Microsoft
    has removed. Although Microsoft is huge, it’s actually very focused considering
    its size. Hundreds of thousands of software developers write new Microsoft code
    every day. Here’s what Eric Traut, a famous engineer who’s worked for both Apple
    and Microsoft, has to say about Microsoft’s focused approach to software engineering:


    > A lot of people think of Windows as this really large, bloated operating system,
    and that may be a fair characterization, I have to admit. It is large. It contains
    a lot of stuff in it. But at its core, the kernel and the components that make
    up the very core of the operating system actually is pretty streamlined.


    To sum this up, when creating an application used by many users for a long period,
    removing features must be a core activity of your daily effort because it frees
    up resources, time, energy, and user interface space that can be reinvested into
    improving features that matter.


    ## Reduce Variations of Fonts and Colors


    Extensive variability leads to complexity. If you vary the font types, font sizes,
    and colors too much, it’ll increase cognitive friction, increase the perceived
    complexity of the user interface, and sacrifice clarity. As a minimalist coder,
    you don’t want to build these psychological effects into your application. Effective
    minimalist design often focuses on only one or two font types, one or two colors,
    and one or two different font sizes. Figure 8-9 exemplifies the consistent and
    minimalist use of font types, sizes, colors, and contrasts. That said, do note
    that there are many approaches to design and many ways to accomplish focus and
    minimalism on all levels. A minimalist design might, for instance, use many different
    colors to make the playful, colorful attributes of an application stand out.


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_146_0.png)


    ## Be Consistent


    An application doesn’t normally consist of a single user interface but a series
    of interfaces handling the user interaction. This leads us to another dimension
    of minimalistic design: *consistency*. We define consistency as the degree to
    which we’ve minimized the variability of design choices in a given app. Instead
    of presenting the user a different “look and feel” in each step in the interaction,
    consistency ensures that the application feels like a coherent whole. For example,
    Apple provides many iPhone apps like browsers, health apps, or mapping services,
    all of which have a similar look and feel and are recognizable as Apple products.
    It can be challenging to get different app developers to agree on a consistent
    design, but it’s extremely important for the strength of the Apple brand. To ensure
    brand consistency, software companies use *brand guidelines* that any contributing
    developer must adhere to. Make sure to check off this box when creating your own
    application. You might accomplish this with the consistent use of templates and
    (CSS) stylesheets.


    ## Conclusion


    This chapter focused on how minimalistic designers have come to dominate the world
    of design, exemplified by some of the most successful software companies such
    as Apple and Google. More often than not, the leading technologies and user interfaces
    are radically simple. Nobody knows what the future holds, but it seems that the
    wide adoption of speech recognition and virtual reality will result in even simpler
    user interfaces. The ultimate minimalistic design is invisible. With ubiquitous
    computing on the rise—Alexa and Siri—I think we’ll see even simpler and even more
    focused user interfaces in the decades ahead. So, to answer the question posed
    in the beginning: *yes, less is more in design!* In the next and final chapter
    of this book, we’ll conclude with focus—and its relevance for today’s programmers.


    ## References


    Documentation for the material design style: *https://material.io/design/introduction/*


    Apple’s documentation to human interface design: *https://developer.apple.com/design/human-interface-guidelines/*'
  mdcn: '## 移除设计元素


    原则很简单：逐一审视每个设计元素，尽可能将其移除。*设计元素*是指用户界面中任何可见的元素，例如菜单项、行动号召、精选列表、按钮、图片、方框、阴影、表单字段、弹出窗口、视频，以及所有在用户界面中占据空间的其他内容。实际上，你需要审视所有设计元素并问：*我能移除它吗？*你会惊讶地发现，答案常常是*可以！*


    请不要误解——移除设计元素并非易事！你曾花费时间和精力创建它们，而沉没成本偏差会让你即使在它们不必要时也忍不住想保留自己的创作。图8-7展示了一个理想化的编辑过程，其中你根据每个元素对用户体验的重要性进行分类。例如，一个指向公司博客的菜单项，在用户订购产品时的结账过程中能提供帮助吗？不能，因此它应被归类为不重要。例如，亚马逊通过引入一键购买按钮，从订购流程中剥离了所有不必要的设计元素。当我第一次在科学写作研讨会上了解到这种方法时，它彻底改变了我对编辑的思考方式。移除不重要和较不重要的设计元素，能在风险极小的情况下保证可用性的提升。但只有真正优秀的设计移除*重要*设计元素并仅保留*非常重要*元素的魄力。然而，这正是卓越设计与仅仅良好设计之间的分水岭。


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_144_0.png)


    *图8-7：理想化的编辑过程*


    图8-8展示了一个杂乱设计与一个极简、编辑后设计的示例。左侧的订单页面可能是你在线上披萨外卖服务中常见的样子。有些元素非常重要，例如披萨的配送地址和订单按钮，但像过于详细的配料清单和“最新动态”信息框这样的元素则较不重要。右侧是该订单页面的编辑版本。我们移除了不必要的元素，专注于最受欢迎的附加销售，将配料清单与标题合并，并将标签与表单元素结合。这使我们能够增加更多留白，甚至增大了一个*非常重要*设计元素的尺寸：美味披萨的图片！减少的杂乱和增加的专注度，很可能通过改善用户体验来提高订单页面的转化率。


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_145_0.png)


    ## 移除功能


    实现极简设计的最佳方法是从你的应用程序中移除整个功能！你已经在第3章关于创建最小可行产品的部分研究过这个想法，即拥有验证假设所需的最少功能数量。最小化功能数量对于帮助成熟企业重新聚焦其产品同样有益。


    随着时间的推移，应用程序往往会累积功能——这种现象被称为*功能蔓延*。结果，越来越多的精力必须转向维护现有功能。功能蔓延导致软件臃肿，而臃肿的软件导致技术债务。这降低了组织的敏捷性。移除功能背后的理念是释放能量、时间和资源，并将其重新投入到对用户最重要的少数功能中。


    功能蔓延及其对可用性有害影响的常见例子是雅虎、AOL和MySpace，它们都因在用户界面中添加了太多东西而某种程度上失去了其专注的产品。


    相比之下，世界上最成功的产品都是专注的，并抵制了功能蔓延，即使表面上看起来并非如此。微软是一个很好的例子，说明如何通过构建*专注的产品*帮助其成为一家超级成功的公司。一种普遍的看法是，微软产品如Windows运行缓慢、效率低下，并且加载了太多功能。但事实远非如此！*你所见即全部*——你没有看到微软移除的无数功能。尽管微软规模庞大，但考虑到其规模，它实际上非常专注。成千上万的软件开发者每天都在编写新的微软代码。以下是曾在苹果和微软工作过的著名工程师埃里克·特劳特对微软专注软件工程方法的评价：


    > 很多人认为Windows是一个非常庞大、臃肿的操作系统，我必须承认，这可能是一个公正的评价。它确实很大，包含了很多东西。但在其核心，内核和构成操作系统最核心的组件实际上相当精简。


    总而言之，在创建一个被众多用户长期使用的应用程序时，移除功能必须成为你日常工作的核心活动，因为它能释放资源、时间、精力和用户界面空间，这些可以重新投入到改进重要功能上。


    ## 减少字体和颜色的变化


    过度的变化会导致复杂性。如果你过多地改变字体类型、字体大小和颜色，会增加认知摩擦，增加用户界面的感知复杂性，并牺牲清晰度。作为一名极简主义程序员，你不希望将这些心理效应构建到你的应用程序中。有效的极简设计通常只专注于一到两种字体类型、一到两种颜色以及一到两种不同的字体大小。图8-9展示了字体类型、大小、颜色和对比度的一致且极简的使用。话虽如此，请注意设计有许多方法，实现各个层面的专注和极简也有多种途径。例如，极简设计可能会使用许多不同的颜色来突出应用程序的趣味性和多彩属性。


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_146_0.png)


    ## 保持一致性


    一个应用程序通常不是由单个用户界面组成，而是由一系列处理用户交互的界面组成。这引出了极简设计的另一个维度：*一致性*。我们将一致性定义为在给定应用程序中最小化设计选择可变性的程度。一致性确保应用程序感觉像一个连贯的整体，而不是在交互的每一步都向用户呈现不同的“外观和感觉”。例如，苹果提供了许多iPhone应用程序，如浏览器、健康应用或地图服务，它们都具有相似的外观和感觉，并且可以被识别为苹果产品。让不同的应用程序开发者就一致的设计达成一致可能具有挑战性，但这对于苹果品牌的实力至关重要。为了确保品牌一致性，软件公司使用*品牌指南*，任何参与的开发者都必须遵守。在创建自己的应用程序时，请务必确保做到这一点。你可以通过一致地使用模板和（CSS）样式表来实现这一点。


    ## 结论


    本章重点介绍了极简设计师如何主导设计世界，以苹果和谷歌等一些最成功的软件公司为例。通常，领先的技术和用户界面都极其简单。没有人知道未来会怎样，但语音识别和虚拟现实的广泛采用似乎将导致更简单的用户界面。终极的极简设计是无形的。随着无处不在的计算的兴起——Alexa和Siri——我认为在未来几十年，我们将看到更简单、更专注的用户界面。因此，回答开头提出的问题：*是的，在设计中，少即是多！*在本书的下一章也是最后一章中，我们将以专注——及其对当今程序员的相关性——作为结尾。


    ## 参考资料


    Material Design风格文档：*https://material.io/design/introduction/*


    苹果人机界面设计文档：*https://developer.apple.com/design/human-interface-guidelines/*'
