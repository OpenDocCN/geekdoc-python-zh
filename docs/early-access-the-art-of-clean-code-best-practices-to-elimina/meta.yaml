    \ same problem. For example, say you’ve implemented a game application with a\
    \ high-score rating system. You want the players with the highest score to appear\
    \ at the top of the list and the players with the lowest scores to appear at the\
    \ bottom. In other words, you need to *sort* the list. Thousands of algorithms\
    \ exist for sorting a list, and sorting a list is computationally more demanding\
    \ for 1,000,000 players than it is for 100 players. Some algorithms scale better\
    \ with increasing size of the list input; others scale worse. While your app serves\
    \ a few hundred users, it doesn't really matter which algorithm you choose, but\
    \ as your user base grows, the runtime complexity of the list grows superlinearly.\
    \ Soon, the end users will have to wait longer and longer for the list to be sorted.\
    \ They start complaining—you need better algorithms!\n\nFigure 1-2 exemplifies\
    \ the algorithmic complexity of two schematic algorithms. The x-axis shows the\
    \ size of the list to be sorted. The y-axis shows the runtime of the algorithm\
    \ (in time units). Algorithm 1 is much slower than Algorithm 2. In fact, the inefficiency\
    \ of Algorithm 1 becomes more and more apparent the more list elements must be\
    \ sorted. Using Algorithm 1, your game app would become slower the more users\
    \ are playing.\n\n![](img/8792d1c61415b2790e4dd6b390c6d60b_22_0.png)\n\nLet's\
    \ see whether this actually holds for real Python sorting routines. Figure 1-3\
    \ compares three popular sorting algorithms: bubble sort, quicksort, and Timsort.\
    \ Bubble sort has the highest algorithmic complexity. Quicksort and Timsort have\
    \ the same asymptotical algorithmic complexity. But the Timsort algorithm is still\
    \ much faster—that's why it's used as Python's default sorting routine. The runtime\
    \ of the bubble sort algorithm explodes with a growing list size.\n\nIn Figure\
    \ 1-4, we repeat this experiment but only for Quicksort and Timsort. Again, there's\
    \ a drastic difference in algorithmic complexity: Timsort scales better and is\
    \ faster for the growing list size. Now you see why Python’s built-in sorting\
    \ algorithm hasn’t changed for such a long time!\n\n![](img/8792d1c61415b2790e4dd6b390c6d60b_23_0.png)\n\
    \nFigure 1-3: Algorithmic complexity of bubble sort, Quicksort, and Timsort\n\n\
    ![](img/8792d1c61415b2790e4dd6b390c6d60b_23_1.png)\n\nFigure 1-4: Algorithmic\
    \ complexity of Quicksort and Timsort\n\nListing 1-1 shows the code in Python\
    \ in case you want to reproduce the experiment. I'd recommend you choose a smaller\
    \ value for n because the code runs a long time on my machine before terminating.\n\
    \n```python\nimport matplotlib.pyplot as plt\nimport math\nimport time\nimport\
