    \n## 7. 利用软件杠杆优势\n\n利用杠杆意味着施加少量能量来放大你努力的效果。例如，在金融领域，杠杆意味着使用他人的资金进行投资和增长。在大公司中，它可能意味着雇佣成千上万的员工来提供时间和精力。作为一名程序员，你应该利用几代程序员的集体智慧：使用库来实现复杂功能，而不是从头开始编码；使用\
    \ StackOverflow 和群体智慧来修复代码中的错误；或者请其他程序员审查你的代码。这些都是杠杆的形式，让你能够以更少的努力完成更多的事情。\n\n\
    杠杆的第二个来源是计算能力。计算机执行工作的速度比人类快得多（成本也低得多）。创建更好的软件，与更多人分享，使用更多的计算能力，并更频繁地使用他人的库和软件。优秀的程序员能快速创建好的源代码，但伟大的程序员会利用他们可用的多种杠杆来源来提升他们的代码。\n\
    \n例如，清单 7-8 展示了我书中的一个单行程序（来自《Python One-Liners》（No Starch Press, 2020）），该程序抓取给定的\
