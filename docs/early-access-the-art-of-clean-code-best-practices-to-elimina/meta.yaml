  md: 'Introduction to Python, Introduction to C++, and Introduction to Java) while
    Alice reads three books diving deep into machine learning with Python (let’s call
    them Introduction to Python, Introduction to Machine Learning with Python, and
    Machine Learning for Experts). As a result, Alice will focus on becoming a machine
    learning expert and can demand a higher salary for her specialized skill set.


    # Implications for Coders


    In programming, the results tend to be much more heavily skewed toward the top
    than in most other fields. Instead of 80/20, the distribution often looks more
    like 90/10 or 95/5. Bill Gates said a “great lathe operator commands several times
    the wage of an average lathe operator, but a great writer of software code is
    worth 10,000 times the price of an average software writer.” Gates argues that
    the difference between a great and an average software writer is not 16 times,
    but 10,000 times! Here are several reasons why the software world is prone to
    such extreme Pareto distributions:


    +   - A great programmer can solve some problems that the average programmer simply
    cannot solve. In some instances, this makes him infinitely times more productive.

    - A great programmer can write code that is 10,000 times faster than the code
    of an average programmer.

    - A great programmer writes code with fewer bugs. Think about the effect of a
    single security bug on Microsoft’s reputation and brand! Moreover, every additional
    bug costs time, energy, and money for subsequent modifications of the codebase
    and feature additions—the detrimental, compounding effect of bugs.

    - A great programmer writes code that is easier to extend, which may improve the
    productivity of thousands of developers that work on his code at a later stage
    of the software development process.

    - A great programmer thinks out of the box and finds creative solutions to circumvent
    costly development efforts and help focus on the most important things.


    In practice, a combination of these factors is at play, so the difference can
    be even higher.

    So, for you, the key question may be this: *How do you become a great programmer?*


    # A Success Metric for Programmers


    Unfortunately, the statement “become a great programmer” is not a success metric
    you can directly optimize—it’s a multi-dimensional problem. A great programmer
    understands code quickly, knows algorithms and data'
  merge: -1
  pgno: 40
- img_proc: true
  md: 'structures, knows different technologies and their strengths and weaknesses,
    can collaborate with other people, is communicative and creative, stays educated
    and knows about ways to organize the software development process, and possesses
    hundreds of soft and hard skills. But you can’t be a master of all of those! If
    you don’t focus on the vital few, you’ll become washed away by the trivial many.
    To become a great programmer, you must focus on the vital few.


    One of the vital few activities to focus on is to write more lines of code. The
    more lines you write, the better coder you’ll become. It’s a simplification of
    the multi-dimensional problem: by optimizing the proxy metric (write more lines
    of code), you increase your odds of success at the target metric (become a great
    writer of software code). See Figure 2-8.


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_41_0.png)


    By writing more code, you’ll understand code better, and talk and behave more
    like an expert coder. You attract better coders and find more challenging programming
    tasks, so you write more code and become even better. You get paid more and more
    per line of code you write. You or your company can outsource the trivial many
    tasks.


    Here’s an 80/20 activity you can follow every day: *track the number of lines
    you code every day and optimize it*. Make it a game to at least match your average
    every day.


