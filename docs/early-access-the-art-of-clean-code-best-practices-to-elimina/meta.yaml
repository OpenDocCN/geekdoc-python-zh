    MVPs, which have the minimum number of features needed to validate a hypothesis.
    Minimizing the number of features is equally helpful in helping an established
    business refocus its product offerings.


    Over time, applications tend to accumulate features—a phenomenon known as *feature
    creep*. As a result, more and more focus must be shifted toward maintaining existing
    features. Feature creep leads to bloated software, and bloated software leads
    to technical debt. This reduces the agility of an organization. The idea behind
    removing features is to release energy, time, and resources and to reinvest into
    the few features that matter most to your users.


    Popular examples of feature creep and its harmful effects on usability are Yahoo,
    AOL, and MySpace, who all somehow lost their focused products by adding too much
    stuff to the user interfaces.


    In contrast, the most successful products in the world are focused and have resisted
    feature creep, even if it doesn’t look like it. Microsoft is a great example of
    how building *focused products* helped it become a super successful company. A
    common perception is that Microsoft products such as Windows are slow, inefficient,
    and loaded with too many features. But nothing could be further from the truth!
    *What you see is all there is*—you don’t see the myriad of features Microsoft
    has removed. Although Microsoft is huge, it’s actually very focused considering
    its size. Hundreds of thousands of software developers write new Microsoft code
    every day. Here’s what Eric Traut,'
  merge: -1
  pgno: 145
- img_proc: true
  md: 'a famous engineer who’s worked for both Apple and Microsoft, has to say about
    Microsoft’s focused approach to software engineering:


    > A lot of people think of Windows as this really large, bloated operating system,
    and that may be a fair characterization, I have to admit. It is large. It contains
    a lot of stuff in it. But at its core, the kernel and the components that make
    up the very core of the operating system actually is pretty streamlined.


    To sum this up, when creating an application used by many users for a long period,
    removing features must be a core activity of your daily effort because it frees
    up resources, time, energy, and user interface space that can be reinvested into
    improving features that matter.


    # Reduce Variations of Fonts and Colors


    Extensive variability leads to complexity. If you vary the font types, font sizes,
    and colors too much, it’ll increase cognitive friction, increase the perceived
    complexity of the user interface, and sacrifice clarity. As a minimalist coder,
    you don’t want to build these psychological effects into your application. Effective
    minimalist design often focuses on only one or two font types, one or two colors,
    and one or two different font sizes. Figure 8-9 exemplifies the consistent and
    minimalist use of font types, sizes, colors, and contrasts. That said, do note
    that there are many approaches to design and many ways to accomplish focus and
    minimalism on all levels. A minimalist design might, for instance, use many different
    colors to make the playful, colorful attributes of an application stand out.


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_146_0.png)'
  merge: -1
  pgno: 146
- img_proc: true
  md: '# Be Consistent


    An application doesn’t normally consist of a single user interface but a series
    of interfaces handling the user interaction. This leads us to another dimension
    of minimalistic design: *consistency*. We define consistency as the degree to
    which we’ve minimized the variability of design choices in a given app. Instead
    of presenting the user a different “look and feel” in each step in the interaction,
    consistency ensures that the application feels like a coherent whole. For example,
    Apple provides many iPhone apps like browsers, health apps, or mapping services,
    all of which have a similar look and feel and are recognizable as Apple products.
    It can be challenging to get different app developers to agree on a consistent
    design, but it’s extremely important for the strength of the Apple brand. To ensure
    brand consistency, software companies use *brand guidelines* that any contributing
    developer must adhere to. Make sure to check off this box when creating your own
    application. You might accomplish this with the consistent use of templates and
    (CSS) stylesheets.


    # Conclusion


    This chapter focused on how minimalistic designers have come to dominate the world
    of design, exemplified by some of the most successful software companies such
    as Apple and Google. More often than not, the leading technologies and user interfaces
    are radically simple. Nobody knows what the future holds, but it seems that the
    wide adoption of speech recognition and virtual reality will result in even simpler
    user interfaces. The ultimate minimalistic design is invisible. With ubiquitous
    computing on the rise—Alexa and Siri—I think we’ll see even simpler and even more
    focused user interfaces in the decades ahead. So, to answer the question posed
    in the beginning: *yes, less is more in design!* In the next and final chapter
    of this book, we’ll conclude with focus—and its relevance for today’s programmers.


    # References


    Documentation for the material design style: *https://material.io/design/introduction/*


    Apple’s documentation to human interface design: *https://developer.apple.com/design/human-interface-guidelines/*'
  merge: -1
  pgno: 147
- img_proc: true
  md: '# # 9


    # ## FOCUS


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_148_0.png)


    In this short chapter, you’ll take a quick guide through the most important lessons
    learned from this book: how to focus. We started this book with a discussion about
    complexity, the origin of many productivity obstacles. Here, we summarize how
    to tackle complexity based on what you’ve learned in this book.


    # ### The Weapon Against Complexity


    The main thesis of this book is that complexity leads to chaos. Chaos is on the
    other side of focus. To solve the challenges posed by complexity, you need to
    use the powerful weapon of *focus*.'
  merge: -1
  pgno: 148
- img_proc: true
  md: 'To justify this argument, let’s look at the scientific concept of *entropy*,
    well known in many scientific fields such as thermodynamics and information theory.
    Entropy defines the degree of randomness, disorder, and uncertainty in a system.
    High entropy means high randomness and chaos. Low entropy means order and predictability.
    Entropy is at the heart of the famous second law of thermodynamics that states
    that *the entropy of a system increases with time—resulting in a state of high
    entropy*.


    Figure 9-1 depicts entropy exemplifying the arrangement of a fixed number of particles.
    On the left, you see a state with low entropy where the structure of the particles
    resembles a house. The location of each particle is predictable and follows a
    higher-level order and structure. There’s a greater *plan* on how the particles
    must be arranged. On the right, you see a state with high entropy: the house structure
    is somehow broken down. Many particles have lost their order, giving way to chaos.
    Over time—if no external force exerts energy to reduce entropy—entropy will increase,
    and all order will be destroyed. Ruined castles, for example, are a testament
    to the second law of thermodynamics. You may ask: What does thermodynamics have
    to do with coding productivity? It’ll become clear in a moment. Let’s keep thinking
    from first principles.


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_149_0.png)


    *Figure 9-1: State of low versus high entropy*


    Productivity means creating something, whether you’re building a house, writing
    a book, or writing a software app. Essentially, to be productive, you must *reduce
    entropy* so that the overall resources are arranged in a way to make your greater
    plan whole.'
  merge: -1
  pgno: 149
- img_proc: true
  md: 'Figure 9-2 shows the relationship between entropy and productivity. You are
    a creator and a builder. You take raw resources and move them from a state of
    high entropy into a state of low entropy using *focused effort toward the attainment
    of a greater plan*. That’s it! This is the success secret and everything you need
    in life to be super productive and successful: take time to carefully *plan* your
    course of action, set specific goals, and design regular habits and action steps
    that will give you the result you want. Then apply *focused effort* using all
    resources you possess—time, energy, money, and people—until your plan comes true.


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_150_0.png)


    It may sound trivial, but most people do this wrong. They may never apply this
    focused effort toward an idea’s attainment, so the idea remains trapped in their
    heads. Others may live from day to day, never planning anything new. Only if you
    do both—plan carefully and focus your effort—will you become a productive person.
    So, to become a builder of, say, a smartphone app, you must bring order to the
    chaos by planning and by applying focused effort until you achieve your goal.


    If it is that simple, why isn’t everyone doing it? The primary obstacle, as you’ve
    guessed, is the complexity that often comes from a lack of focus. If you have
    multiple plans or you allow your plans to change more than necessary over time,
    you’re more likely to move just a few steps toward your goal before aborting the
    whole thing. Only if you focus for a long enough time on *one* plan can you actually
    accomplish it. This holds for small accomplishments, such as reading a book (you
    almost have this done!), and big accomplishments, such as writing and publishing
    your first app. Focus is the missing link.


    Figure 9-3 is graphic explaining the power of focus, plain and simple.'
  merge: -1
  pgno: 150
- img_proc: true
  md: '![](img/8792d1c61415b2790e4dd6b390c6d60b_151_0.png)


    You have limited time and energy. Say you’ve got 8 hours of full-on time or effort
    in a given day. You can decide how to spend those units. Most people spend a little
    bit of time on a lot of activities. For example, Bob may spend one hour in meetings,
    one hour coding, one hour browsing social media, one hour in project discussions,
    one hour chitchatting, one hour editing code documentation, one hour thinking
    about a new project, and one hour writing a novel. Bob is likely to achieve average
    results at best in all the activities he does because he spends so little time
    and effort on each of them. Alice may spend 8 hours doing one thing: coding. She
    does it every day. She makes rapid progress toward her goal of publishing a successful
    app. She becomes exceptional in a few things rather than average in many things.
    In fact, she excels in only one powerful skill: coding. And the progress toward
    her goal is unstoppable.


    # Unifying the Principles


    I started writing this book assuming that focus is just one of many productivity
    principles, but it quickly became apparent to me that focus is the unifying principle
    of all the principles outlined in this book. Here I’ll outline how:


    # The 80/20 Principle


    Focus on the vital few: remember that 20 percent delivers 80 percent of the results,
    and ignore the trivial many, increasing your productivity by one or two orders
    of magnitude.


    # Build a Minimal Viable Product


    Focus on one hypothesis at a time, thereby reducing the complexity of your product,
    reducing feature creep, and maximizing the rate of progress toward product-market
    fit. Before you write any line of code, figure'
  merge: -1
  pgno: 151
- img_proc: true
  md: 'out a clear hypothesis about your user’s needs. Remove all features except
    the absolute necessary. Less is more! Spend more time thinking about what features
    to implement than actually implementing them. Release your MVP quickly and often,
    and improve it over time by testing and adding gradually. Use split testing to
    test the response of two product variants and discard features that don’t lead
    to improvements in key user metrics.


    # Write Clean and Simple Code


    Complexity slows your understanding of the code and increases the risk of errors.
    As we learned from Robert C. Martin, “The ratio of time spent reading versus writing
    is well over 10 to 1. We are constantly reading old code as part of the effort
    to write new code.” Making your code easy to read simplifies the writing of new
    code. In their famous book *The Elements of Style* (Macmillan Publishing Co.,
    Inc., 1959), authors Strunk and White suggest a timeless principle to improve
    your writing: *omit needless words*. I suggest you extend this principle to programming
    and *omit needless code*.


    # Premature Optimization is the Root of All Evil


    Focus your optimization efforts where they matter. Premature optimization is the
    act of spending valuable resources on code optimizations that ultimately prove
    to be unnecessary. As Donald Knuth tells us, “Forget about small efficiencies,
    say about 97% of the time: premature optimization is the root of all evil.” In
    this chapter, I discussed my top six performance tuning tips: take metrics for
    comparisons, consider the 80/20 principle, invest in improving algorithms, apply
    the *less is more* principle, cache repeated results, and know when to stop—all
    of which could be summarized in a single word, *focus*.


    # Flow


    Flow is a state in which you’re completely involved in the task at hand—you’re
    focused and concentrated. Flow researcher Csikszentmihalyi laid out three conditions
    to achieve flow. (1) *Your goals must be clear*. Every line of code leads you
    closer to the successful completion of the larger code project. (2) *The feedback
    mechanism in your environment must be present, and, preferably, immediate*. Find
    people, in person or online, to review your work, and follow the MVP principle.
    (3) *There’s a balance between opportunity and capacity*. If the task is too easy,
    you’ll lose the rush of excitement; if it’s too hard, you’ll throw in the towel
    early. If you follow these conditions, you’re more likely to achieve a state of
    pure focus. Ask yourself daily: What can I do *today* to push my software project
    to the next level? This question is challenging but not overwhelming.


    # Do One Thing Well (Unix)


    The basic idea of the Unix philosophy is to build simple, clear, concise, modular
    code that is easy to extend and maintain. This can mean many'
  merge: -1
  pgno: 152
- img_proc: true
  md: 'different things, but the goal is to allow many humans to work together on
    a codebase by prioritizing human over computer efficiency, favoring composability
    over monolithic design. You focus every function on one purpose only. You’ve learned
    15 Unix principles to write better code, including *small is beautiful*, *make
    each function do one thing well*, *build a prototype as soon as possible*, and
    *fail early and noisily*. If you keep the *focus* rule at the top of your mind,
    you’ll do just fine in regards to these principles without necessarily needing
    to memorize every one of them.


    # Less is More in Design


    This is about focusing your design with minimalism. Think of the differences between
    Yahoo Search and Google Search, the Blackberry and the iPhone, and OkCupid and
    Tinder: the winner technologies are often those with a radically simple user interface.
    By using a minimalistic web or app design, you focus on the one thing you’re doing
    best. Focus the user’s attention on the unique value your product provides!


    # Conclusion


    Complexity is your enemy because it maximizes entropy. As a builder and creator,
    you want to minimize entropy: the pure act of creation is one of minimizing entropy.
    You accomplish this by applying focused effort. Focus is the success secret of
    every creator. Keep in mind what both Warren Buffett and Bill Gates considered
    the secret of their success: *focus*.

    To implement focus in your work, ask yourself these questions:


    +   - On which software project do I want to focus my efforts?

    - Which features do I want to focus on to create my MVP?

    - What is the minimal number of design elements I can implement to test the viability
    of my product?

    - Who will use my product and why?

    - What can I remove from my code?

    - Do my functions do one thing only?

    - How can I achieve the same result in less time?


    If you keep asking yourself these or similar *focusing questions*, the money and
    time you spent on this book have been well worth it.'
  merge: -1
  pgno: 153
