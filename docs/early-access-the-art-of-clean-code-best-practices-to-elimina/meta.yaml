    \n## 结论\n\n在本章中，你已经了解了为什么避免过早优化很重要。如果一项优化所消耗的价值超过了它所增加的价值，那么它就是过早的。根据具体项目，价值通常可以用开发人员时间、可用性指标、应用程序或功能的预期收入，或其对用户子群体的效用来衡量。例如，如果一项优化可以为成千上万的用户节省时间或金钱，那么即使你必须花费大量的开发资源来优化代码库，它也可能不是过早的。然而，如果优化无法在用户或程序员的生活质量上带来可感知的差异，那么它很可能是过早的。是的，关于软件工程过程还有更多高级模型，但常识和对过早优化危险的普遍认识大有裨益，你无需研究关于软件开发模型的花哨书籍或研究论文。例如，一个有用的经验法则是*首先编写可读且整洁的代码*，不要太在意性能，然后*根据经验、性能跟踪工具的硬性事实以及用户研究的真实世界结果来优化具有高预期价值的部分*。\n\
    \n在下一章中，你将学习*心流*的概念——程序员最好的朋友。\n\n# 6\n\n## 心流\n\n> 心流是人类终极表现的源代码。\n> ——史蒂文·科特勒\n\
    \n![](img/8792d1c61415b2790e4dd6b390c6d60b_106_0.png)\n\n在本章中，你将了解*心流*的概念以及如何利用它来提高你的编程生产力。许多程序员发现自己身处不断被打断、开会和其他干扰的办公环境中，这使得几乎不可能达到纯粹的高效编程状态。为了更深入地了解什么是心流以及如何在实践中实现它，我们将在本章中考察许多例子，但总的来说，心流是一种纯粹的专注和集中状态，有些人可能称之为“进入状态”。\n\
    \n心流不是一个严格的编程概念，而是一种可以应用于任何领域任何任务的状态。在这里，我们将探讨如何达到心流状态，以及它如何对你有用。"
