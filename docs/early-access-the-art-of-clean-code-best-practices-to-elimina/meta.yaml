  md: 'This is a better approach, because the class Person is now independent of the
    class Coffee_Machine. The total number of dependencies is reduced. For a project
    with hundreds of classes, reducing dependencies dramatically reduces the overall
    complexity of your application. Here’s the danger in terms of growing complexity
    for large applications: the number of potential dependencies grows superlinearly
    with the number of objects. Roughly speaking, a superlinear curve grows faster
    than a straight line with a constant slope. For example, doubling the number of
    objects can easily quadruple the number of dependencies (which equals complexity).
    However, the Law of Demeter can offset this trend by significantly reducing the
    number of dependencies. If every object talks to only *k* other objects and you
    have *n* objects, the total number of dependencies is bounded by *k*n*, which
    is a linear relationship if *k* is a constant. Thus, the Law of Demeter can mathematically
    help you gracefully scale your applications!


    # **Principle 14: You Ain’t Gonna Need It**


    This principle suggests that you should never implement code if you only *suspect*
    that you’ll need to use it someday in the future—because you ain’t gonna need
    it! Write code only if you’re 100-percent sure it’s necessary. Code for today’s
    needs and not tomorrow’s. If in the future you actually need the code you previously
    only suspected you needed, you can still implement the feature then. But in the
    meantime, you’ve saved many unnecessary lines of code.


    It helps to think from first principles: the simplest and cleanest code is the
    empty file. Now, go from there—what do you *need* to add to that? In Chapter 3,
    you learned about the MVP: code that is stripped of features to focus on the core
    functionality. If you minimize the number of features you pursue, you’ll obtain
    cleaner and simpler code than you could ever attain through refactoring methods
    or all other principles combined. Consider leaving out features that provide relatively
    little value compared to others you could implement instead. Opportunity costs
    are seldomly measured but are often significant. You should really *need* a feature
    before you even consider implementing it.


    An implication of this is to avoid *overengineering*: creating a product that
    is more performant and robust or contains more features than needed. It adds unnecessary
    complexity, which should immediately ring your alarm bells.


    For example, I’ve often encountered problems that could be solved within a few
    minutes using a naive algorithmic approach but, like many programmers, I refused
    to accept the minor limitations of these algorithms. Instead, I studied state-of-the-art
    clustering algorithms to eke out a few percentage points of clustering performance
    compared to the simple KMeans algorithm. These long-tail optimizations were incredibly
    costly—I had to spend 80 percent of the time to obtain 20 percent of the improvement.
    This would have been unavoidable if I’d *needed* that 20 percent and had no other
    way to get it, but in reality, I didn’t need to implement fancy clustering algorithms.
    A typical case of overengineering!'
