    of the money. The quest for continuous leverage and optimization is always on!


    In **Chapter 3**, you’ll learn about *building minimal viable products* to test
    your assumptions early, minimize waste, and increase the speed by which you go
    through the *build, measure, and learn* cycle. The idea is to learn where to focus
    your energy and attention by getting feedback early.


    In **Chapter 4**, you’ll learn about the benefits of *writing clean and simple
    code*. Contrary to what most people intuitively assume, code should be written,
    first and foremost, to maximize readability rather than minimize the usage of
    central processing unit (CPU) cycles. Collective programmer time and effort are
    far scarcer than CPU cycles, and writing code that’s hard to grasp reduces the
    efficiency of your organization, and of our collective human intelligence.


    In **Chapter 5**, you’ll learn about the conceptual foundation of performance
    optimization and the pitfalls of optimizing prematurely. Donald Knuth, one of
    the fathers of computer science, used to say, “*Premature optimization is the
    root of all evil!*” When you do need to optimize your code, use the 80/20 principle:
    optimize the 20 percent of functions that run 80 percent of the time. Get rid
    of the bottlenecks. Ignore the rest. Repeat.


    In **Chapter 6**, you’ll join me for a small excursion into Mihaly Csikszentmihalyi’s
    (literally) exciting world of *flow*. The state of flow is a state of pure concentration
    that increases productivity by magnitudes and helps to build a culture around
    deep work—speaking in the words of computer science professor Cal Newport, who
    will also lend some ideas in this chapter.


    In **Chapter 7**, you’ll learn about the Unix philosophy of *doing one thing and
    doing it well*. Rather than having a monolithic (and, potentially, more efficient)
    kernel with a huge provision of functionality, the developers of Unix chose to
    implement a small kernel with lots of optional helper functions. This helped the
    Unix ecosystem to scale up while remaining clean and (relatively) simple. We’ll
    see how you can apply these principles to your own work.


    In **Chapter 8**, you’ll enter another vital area in computer science that benefits
    from a minimalistic mindset: design and user experience (UX). Think of the differences
    between Yahoo Search and Google Search, the Blackberry and the iPhone, and OkCupid
    and Tinder. The most successful technologies often come with a radically simple
    user interface for the reason that, in design, *less is more*.


    In **Chapter 9**, you’ll revisit the power of *focus* and learn how to apply it
    in diverse areas to increase your (and your programs’) output vastly!


    Finally, we’ll wrap things up, give you actionable next steps, and release you
    into the complex world equipped with a set of reliable tools to simplify that
    world.


    ## HOW COMPLEXITY HARMS YOUR PRODUCTIVITY


    In this chapter, we’re going to have a comprehensive look at the important and
    highly underexplored topic of complexity. What exactly is *complexity*? Where
    does it occur? How does it damage your productivity? Complexity is the enemy of
    the lean and efficient organization and individual, so it’s worth taking a close
    look at all areas where we find complexity and what forms it takes. This chapter
    focuses on the problem—complexity—and the remaining chapters will explore effective
    methods to attack it by redirecting the released resources previously occupied
    by complexity.


    Let’s start with a quick overview of where complexity may be off-putting to a
    new coder:


    - Choosing a programming language

    - Choosing a coding project to work on—from thousands of open-source projects
    and myriads of problems

    - Deciding which libraries to use (scikit-learn versus NumPy versus TensorFlow)

    - Deciding which emerging technologies to invest time in—Alexa apps, smartphone
    apps, browser-based web apps, integrated Facebook or WeChat apps, virtual reality
    apps

    - Choosing a coding editor such as PyCharm, Integrated Development and Learning
    Environment (IDLE), and Atom


    Given the great confusion caused by these sources of complexity, it’s no surprise
    that “*How do I start?*” is one of the most common questions from programming
    beginners.


    The best way to start is *not* by choosing a programming book and reading over
    all syntactical features of the programming language. Many ambitious students
    buy programming books as an incentive and then add the learning task to their
    to-do lists—if they’ve spent money on the book, they better read it or the investment
    will be lost. But as with so many other tasks on to-do lists, *reading a programming
    book* is seldomly completed.


    The best way to start is to choose a practical code project—a simple one if you’re
    a beginner—and push it to completion. Don’t read coding books or random tutorials
    on the web before completing a full project. Don’t scroll through endless feeds
    on StackOverflow. Just set up the project and start coding with the limited skills
    you have and your common sense. A student of mine wanted to create a financial
    dashboard application checking the historic returns of different asset allocations
    to answer questions such as “What was the maximum down year of a portfolio consisting
    of 50% stocks and 50% government bonds?” At first she didn’t know how to approach
    this project but soon found out about a framework called *Python Dash* that deals
    with building data-based web apps. She learned how to set up a server and studied
    just the HyperText Markup Language (HTML) and Cascading Style Sheets (CSS) she
    needed to move forward, and now her app is live and has already helped thousands
    of people find the right asset allocation. But, more importantly, she joined the
    team of developers that created Python Dash and is even writing a book about it
    with No Starch Press. She did all of this in one year—and you can, too. It’s okay
    if you don’t understand what you’re doing; you will gradually increase your understanding.
    Read articles only to make progress on the project in front of you. The process
    of finishing your first project introduces a number of highly relevant problems,
    including:


    - Which code editor should you use?

    - How to install your project’s programming language?

    - How to read input from a file?

    - How to store the input in your program for later use?

    - How to manipulate the input to obtain the desired output?


    By answering these questions, you gradually build a well-rounded skill set. Over
    time, you’ll be able to answer these questions better and more easily. You’ll
    be able to solve much bigger problems, and you’ll build up an internal database
    of programming patterns and conceptual insights. Even advanced coders learn and
    improve with this same process—only the coding projects have become much larger
    and more complicated.


    With this project-based learning approach, you’ll likely find that you struggle
    with complexity in areas such as finding bugs in ever-growing codebases, understanding
    code components and how they interact, choosing the right feature to be implemented
    next, and understanding the mathematical and conceptual basics of the code.


    Complexity is everywhere, at every stage of a project. The hidden cost of this
    complexity is often that brand-new coders throw in the towel and their projects
    never see the light of day. So, the question arises: How do I solve the problem
    of complexity?


    The answer is straightforward: *simplicity*. Seek simplicity and focus in every
    stage of the coding cycle. If you take only one thing away from this book, let
    it be this: take a radically minimalistic position in every area you encounter
    in programming. Throughout the book, we’ll discuss all of the following methods:


    - Declutter your day, do fewer tasks, and focus your efforts on the tasks that
    matter. For example, instead of starting ten new interesting code projects in
    parallel, carefully select one and focus all your efforts on finishing this one
    project. In Chapter 2, you’ll learn about the 80/20 principle in programming in
    greater detail.

    - Given one software project, strip away all unnecessary features and focus on
    the minimum viable product (see Chapter 3), ship it, and validate your hypotheses
    quickly and efficiently.

    - Write simple and concise code wherever you can. In Chapter 4, you’ll learn many
    practical tips on how to accomplish this.

    - Reduce time and effort spent on premature optimization—optimizing code without
    need is one of the major reasons for unnecessary complexity (see Chapter 5).

    - Reduce switching time by blocking large chunks of time for programming to obtain
    a state of *flow*—a term from psychological research to describe a focused state
    of mind that increases your attention, focus, and productivity. Chapter 6 is all
    about reaching a state of flow.

    - Apply the Unix philosophy of focusing code functions on one objective only (“Do
    One Thing Well”). See Chapter 7 for a detailed guide into the Unix philosophy
    with Python code examples.

    - Apply simplicity in design to create beautiful, clean, and focused user interfaces
    that are easy to use and intuitive (see Chapter 8).

    - Apply focusing techniques when planning your career, your next project, your
    day, or your area of expertise (see Chapter 9).


    Let’s dive deeper into the concept of complexity to develop an understanding of
    one of the great enemies of your coding productivity.'
