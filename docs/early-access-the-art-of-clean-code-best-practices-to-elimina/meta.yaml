    \    balances[receiver] += amount\n\ndef get_balance(user):\n    return balances[user]\n\
    \ndef max_transaction():\n    return max(transactions, key=lambda x: x[2])\n```\n\
    \n```python\ntransfer('Alice', 'Bob', 2000)\ntransfer('Bob', 'Carl', 4000)\ntransfer('Alice',\
