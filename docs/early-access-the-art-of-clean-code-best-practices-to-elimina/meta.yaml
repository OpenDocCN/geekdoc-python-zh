    \ miles into kilometers in multiple instances in your code, as in Listing 4-13.\n\
    \nFirst, you create a variable `miles` and convert it to kilometers by multiplying\
    \ it with 1.60934. Second, you convert 20 miles to kilometers by multiplying it\
    \ with 1.60934, using the same constant conversion factor again, and store the\
    \ result in the variable `distance`.\n\n```python\nmiles = 100\nkilometers = miles\
    \ * 1.60934\ndistance = 20 * 1.60934\nprint(kilometers)\nprint(distance)\n'''\n\
    OUTPUT:\n160.934\n32.1868\n'''\n```\n\nListing 4-13: Convert miles to kilometers\
    \ twice\n\nYou've used the same multiplication procedure twice by multiplying\
