    # # 8


    # ## LESS IS MORE IN DESIGN


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_138_0.png)


    Simplicity is a way of life for coders. While you may not see yourself as a designer,
    chances are that you will create many user interfaces in your coding career. Whether
    you need to create a visually appealing dashboard as a data scientist, an easy-to-use
    API as a database engineer, or a simple web frontend to fill data into a smart
    contract as a blockchain developer, knowing the basic design principles will save
    the day for you and your team—and they’re easy to grasp, too! The design principles
    covered in this chapter are universal.


    Specifically, you’ll explore one vital area in computer science that benefits
    most from a minimalistic mindset: design and user experience (UX). To get an idea
    of the importance of minimalism in design and UX, think of the differences between
    Yahoo Search and Google Search, the Blackberry and the iPhone, Facebook Dating
    and Tinder: the winning technologies often come with a radically simple user interface.
    Could it be that *less is more* in design?'
- md: 'We''ll first take a brief tour of some creations that have benefited tremendously
    from the radical focus of their creators. Later, we''ll see how you can apply
    minimalism in your own design efforts.


    ## Minimalism in the Evolution of Mobile Phones


    A prime example of minimalism in computing design can be seen in the evolution
    of mobile phones (see Figure 8-1). The Nokia Mobira Senator was one of the earliest
    commercial “mobile” phones, released in the 1980s, weighing 10 kg, and quite complicated
    to handle. A year later, Motorola marketed its own DynaTAC 8000X model that was
    10 times lighter—weighing only 1 kg. Nokia had to up its game. In 1992, Nokia
    came up with the 1011 at half the weight of the DynaTAC 8000X. Nearly a decade
    later in 2000, in accordance with Moore’s Laws, Nokia achieved mega-success with
    its iconic Nokia 3310, weighing only 88 g. As mobile phone technology grew more
    sophisticated and complex, the *complexity of the user interface*, including the
    size, weight, and even number of buttons, *reduced* drastically. The evolution
    of mobile phones proves that radically minimalistic design can be done, even as
    the complexity of the applications increases by orders of magnitude. You could
    even argue that minimalistic design has paved the way for the success of smartphone
    apps and their exploding usage in today’s world. You’d have a hard time browsing
    the web, using mapping services, or sending video messages with the Nokia Senator!


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_139_0.png)


    Minimalistic design is apparent not only in smartphone development. Individual
    companies use it to improve UX and create focused applications. What better example
    could there be than the Google search engine?


    ## Minimalism in Search


    In Figure 8-2, I''ve sketched a minimalistic design that resembles how Google—and
    its copycats—designs its primary user interface as a radically simplified gate
    into the web. Make no mistake, the minimalistic and clean design is not an accident.
    This landing page is frequented by billions of users every day. It may be *the*
    primary real estate on the web. A small advertisement on the Google landing page
    could generate billions of clicks and, likely, billions of USD in revenue for
    Google, but Google hasn''t allowed these ads to clutter its landing page, despite
    the loss of short-term revenue opportunity—the company managers know that maintaining
    their brand integrity and focus, expressed through the minimalistic design, is
    even more valuable than the revenues generated through selling out their prime
    real estate.


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_140_0.png)


    Now compare this clean, focused design to the kind that alternative search engines
    like Bing and Yahoo use to exploit their primary real estate (see Figure 8-3).


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_140_1.png)


    Even for basic search engine sites, companies like Yahoo have followed the same
    path: they cluttered the valuable real estate with news and advertisements to
    boost short-term revenues. But these revenues didn''t last because the design
    drove away the commodity that generated it: users. Reduced usability led to competitive
    disadvantages and the continuous erosion of users'' habitual search behavior.
    Any additional website element unrelated to search increases the cognitive challenge
    to the user, who must ignore attention-grabbing headlines, ads, and images. The
    smooth search experience is one of the reasons why Google continuously increased
    its market share. The last word isn''t spoken yet, but the rising popularity of
    focused search engines during the last decades indicates the superiority of minimalistic
    and focused design.


    ## Material Design


    Google developed and currently adheres to the *Material Design* philosophy and
    design language, which describes a way to organize and design screen elements
    according to what users already understand intuitively: physical world elements
    such as paper, cards, pens, and shadow. Figure 8-3 from the previous section shows
    such an example of material design. The website is structured into cards, each
    card representing a piece of content, which creates a layout that resembles a
    newspaper with an image and some headline text. The look and feel of the website
    are almost materialistic, even though the three-dimensional (3D) effect is a pure
    illusion on the two-dimensional (2D) screen.


    Figure 8-4 compares a material design on the left and a non-material design with
    unnecessary elements stripped out on the right. You could argue that the non-material
    design is more minimalistic, and, in a way, you would be right. It takes less
    space and uses fewer colors and fewer nonfunctional visual elements like shadows.
    However, lacking boundaries and an intuitively familiar layout, the non-material
    design is often more confusing to the reader. The true minimalist will always
    use fewer costly resources to accomplish the same task. In some cases, this means
    reducing the number of visual elements on a website. In other cases, this means
    adding some elements to reduce the time the user has to think. As a rule of thumb:
    user time is a much scarcer resource than screen space.


    You can find a full introduction to material design with many beautiful case studies
    at https://material.io/design/. New design systems will emerge and users will
    get more and more used to digital work, so the material metaphors may well become
    less useful for the next generation of computer users. For now, just note that
    minimalism requires careful consideration of the relevant resources: time, space,
    and money—and you must weigh them according to the needs of your application.
    To sum up, minimalistic design gets rid of all unnecessary elements and results
    in a beautiful product likely to delight your users.


    Next, you''ll learn how to achieve it.


    The Art of Clean Code (Early Access) © 2022 by Christian Mayer


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_142_0.png)


    ## How to Achieve Minimalistic Design


    In this section, you’ll learn some technical tips and methods on how to achieve
    a focused, minimalistic design.


    ### Use Whitespace


    Whitespace is one of the key pillars of minimalistic design. Adding whitespace
    to your application first may seem like a waste of valuable real estate. You must
    be crazy not to use every inch of a highly-trafficked website, right? You could
    use it for advertisements, “call to actions” to sell more products, additional
    information about the value proposition, or more personalized recommendations.
    The more successful your app becomes, the more stakeholders will fight for every
    bit of attention they can get, and it’s likely that nobody will ask you to remove
    non-whitespace elements from your app.


    Thinking “subtractively” may not come naturally; however, replacing design elements
    with whitespace will improve clarity and result in a more focused UX. Successful
    companies manage to keep the main thing the main thing by using whitespace to
    remain focused and sharp. For example, Google’s landing page uses a lot of whitespace,
    and Apple uses lots of whitespace when presenting its products. When thinking
    about your users, remember this: if you confuse them, you’ll lose them. Whitespace
    increases the clarity of user interfaces.


    Figure 8-5 shows a simple design idea for an online pizza delivery service. The
    whitespace supports the focus on the main thing: getting customers to order pizza.
    Unfortunately, seldomly will a pizza delivery service be bold enough to use whitespace
    in such an extreme way.


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_143_0.png)


    Figure 8-5: Use lots of whitespace


    Whitespace can improve the clarity with text, too. Have a look at Figure 8-6,
    which compares two ways of formatting a paragraph.


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_143_1.png)


    Figure 8-6: Whitespace in text


    The left side of Figure 8-6 is far less readable. The right side injects whitespace
    to improve readability and UX: margins on the left and right around the text block,
    indentation of paragraphs, an increased line height, top and bottom margins around
    paragraphs, and increased font size. The costs of this additional space are negligible:
    scrolling is cheap, and we don''t have to physically cut more trees for paper
    when the publication is digital. On the other hand, the benefits are very real:
    the UX of your website or application improves significantly!'
  mdcn: '我们将首先简要介绍一些因其创作者的极致专注而受益匪浅的作品。随后，我们将探讨如何在自己的设计工作中应用极简主义。


    ## 手机演进中的极简主义


    计算设计中的极简主义典范，可见于手机的演进历程（参见图8-1）。诺基亚Mobira Senator是最早的商用“移动”电话之一，于1980年代推出，重达10公斤，操作相当复杂。一年后，摩托罗拉推出了自己的DynaTAC
    8000X型号，重量仅为前者的十分之一——只有1公斤。诺基亚不得不提升竞争力。1992年，诺基亚推出了1011型号，重量仅为DynaTAC 8000X的一半。近十年后的2000年，根据摩尔定律，诺基亚凭借其标志性的诺基亚3310取得了巨大成功，重量仅为88克。随着手机技术变得日益精密和复杂，*用户界面的复杂性*，包括尺寸、重量甚至按钮数量，却*急剧降低*。手机的演进证明，即使应用程序的复杂性呈指数级增长，彻底的极简设计也是可行的。你甚至可以说，极简设计为智能手机应用的成功及其在当今世界的爆炸式普及铺平了道路。用诺基亚Senator，你恐怕很难浏览网页、使用地图服务或发送视频信息！


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_139_0.png)


    极简设计不仅在智能手机发展中显而易见。各家公司也利用它来提升用户体验并打造专注的应用程序。还有什么比谷歌搜索引擎更好的例子呢？


    ## 搜索中的极简主义


    在图8-2中，我勾勒了一个极简设计，它类似于谷歌——以及其模仿者——如何将其主要用户界面设计成一个通向网络的、彻底简化的入口。请不要误会，这种极简而干净的设计并非偶然。这个着陆页每天有数十亿用户访问。它可能是网络上*最*重要的黄金地段。谷歌着陆页上的一个小广告就可能产生数十亿次点击，并为谷歌带来数十亿美元的收入，但谷歌并未允许这些广告充斥其着陆页，尽管这牺牲了短期的收入机会——公司管理者深知，通过极简设计所体现的品牌完整性和专注度，比通过出售其黄金地段所产生的收入更有价值。


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_140_0.png)


    现在，将这种干净、专注的设计与必应和雅虎等替代搜索引擎利用其主要黄金地段的设计进行比较（参见图8-3）。


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_140_1.png)


    即使是像雅虎这样的基础搜索引擎公司，也走了同样的道路：他们用新闻和广告充斥宝贵的黄金地段，以提升短期收入。但这些收入并未持久，因为这种设计赶走了产生收入的源泉：用户。可用性的降低导致了竞争劣势，并持续侵蚀着用户的习惯性搜索行为。任何与搜索无关的额外网站元素，都会增加用户的认知挑战，他们必须忽略那些吸引眼球的标题、广告和图片。流畅的搜索体验是谷歌持续增加其市场份额的原因之一。最终结论尚未尘埃落定，但过去几十年专注型搜索引擎的日益流行，表明了极简和专注设计的优越性。


    ## Material Design


    谷歌开发并目前遵循*Material Design*（材料设计）哲学和设计语言，它描述了一种根据用户已直观理解的内容来组织和设计屏幕元素的方式：物理世界元素，如纸张、卡片、笔和阴影。上一节的图8-3展示了这样一个Material
    Design的例子。该网站被结构化为卡片，每张卡片代表一块内容，创造出一种类似报纸的布局，包含图片和一些标题文字。网站的外观和感觉几乎是物质化的，尽管三维（3D）效果在二维（2D）屏幕上纯粹是一种错觉。


    图8-4对比了左侧的Material Design和右侧去除了不必要元素的非Material Design。你可能会认为非Material设计更极简，并且在某种程度上你是对的。它占用更少的空间，使用更少的颜色和更少的非功能性视觉元素，如阴影。然而，由于缺乏边界和直观熟悉的布局，非Material设计往往让读者更加困惑。真正的极简主义者总是使用更少的昂贵资源来完成相同的任务。在某些情况下，这意味着减少网站上的视觉元素数量。在其他情况下，这意味着添加一些元素以减少用户需要思考的时间。根据经验法则：用户时间是比屏幕空间稀缺得多的资源。


    你可以在 https://material.io/design/ 找到关于Material Design的完整介绍和许多精彩的案例研究。新的设计系统将会出现，用户将越来越习惯数字化工作，因此对于下一代计算机用户来说，材料隐喻可能变得不那么有用。目前，只需注意极简主义需要仔细考虑相关资源：时间、空间和金钱——你必须根据应用程序的需求来权衡它们。总而言之，极简设计去除了所有不必要的元素，创造出一个可能让用户愉悦的精美产品。


    接下来，你将学习如何实现它。


    《整洁代码的艺术》（早期访问版）© 2022 Christian Mayer


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_142_0.png)


    ## 如何实现极简设计


    在本节中，你将学习一些关于如何实现专注、极简设计的技术技巧和方法。


    ### 使用留白


    留白是极简设计的关键支柱之一。首先在你的应用程序中添加留白，可能看起来像是浪费了宝贵的黄金地段。不充分利用高流量网站的每一寸空间，你一定是疯了，对吧？你可以用它来做广告、“行动号召”以销售更多产品、提供关于价值主张的额外信息，或更多个性化推荐。你的应用越成功，利益相关者就会为争取他们能得到的每一点关注而争斗，很可能没人会要求你从应用中移除非留白元素。


    “减法式”思考可能并非与生俱来；然而，用留白替换设计元素将提高清晰度，并带来更专注的用户体验。成功的公司通过使用留白来保持专注和敏锐，设法让主要的事情保持为主要的事情。例如，谷歌的着陆页使用了大量留白，苹果在展示其产品时也使用了大量留白。在考虑你的用户时，请记住这一点：如果你让他们感到困惑，你就会失去他们。留白提高了用户界面的清晰度。


    图8-5展示了一个在线披萨外卖服务的简单设计思路。留白支持了对主要事情的关注：让顾客订购披萨。不幸的是，很少有披萨外卖服务敢于如此极端地使用留白。


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_143_0.png)


    图8-5：使用大量留白


    留白也能提高文本的清晰度。看看图8-6，它比较了两种格式化段落的方式。


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_143_1.png)


    图8-6：文本中的留白


    图8-6左侧的可读性要差得多。右侧注入了留白以提高可读性和用户体验：文本块左右两侧的页边距、段落缩进、增加的行高、段落上下的页边距以及增大的字体大小。这些额外空间的成本可以忽略不计：滚动很廉价，而且当出版物是数字形式时，我们不必为了纸张而砍伐更多的树木。另一方面，好处是非常真实的：你的网站或应用程序的用户体验得到了显著提升！'
