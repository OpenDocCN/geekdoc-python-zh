    <a href=\"https://blog.finxter.com/recursion/\">Learn recursion</a>\n<a href=\"\
    https://nostarch.com/\">Great books from NoStarchPress</a>\n<a href=\"http://finxter.com/\"\
    >Solve more Python puzzles</a>\n\n</body>\n</html>\n'''\n\n## One-Liner\npractice_tests\
