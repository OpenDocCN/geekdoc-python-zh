    Complexity describes a whole system or entity. Because of the difficulty in explaining
    this system, complexity causes struggle and confusion. Because real-world systems
    are messy, you’ll find complexity everywhere: the stock market, social trends,
    emerging political viewpoints, and big computer programs with hundreds of thousands
    of lines of code—such as the Windows operating system.


    If you’re a coder, you are especially prone to overwhelming complexity, such as
    from these different sources that we’ll cover in this chapter:


    +   - Complexity in a project life cycle

