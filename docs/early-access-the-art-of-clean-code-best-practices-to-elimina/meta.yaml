    # Material Design


    Google developed and currently adheres to the *Material Design* philosophy and
    design language, which describes a way to organize and design screen elements
    according to what users already understand intuitively: physical world elements
    such as paper, cards, pens, and shadow. Figure 8-3 from the previous section shows
    such an example of material design. The website is structured into cards, each
    card representing a piece of content, which creates a layout that resembles a
    newspaper with an image and some headline text. The look and feel of the website
    are almost materialistic, even though the three-dimensional (3D) effect is a pure
    illusion on the two-dimensional (2D) screen.


    Figure 8-4 compares a material design on the left and a non-material design with
    unnecessary elements stripped out on the right. You could argue that the non-material
    design is more minimalistic, and, in a way, you would be right. It takes less
    space and uses fewer colors and fewer nonfunctional visual elements like shadows.
    However, lacking boundaries and an intuitively familiar layout, the non-material
    design is often more confusing to the reader. The true minimalist will always
    use fewer costly resources to accomplish the same task. In some cases, this means
    reducing the number of visual elements on a website. In other cases, this means
    adding some elements to reduce the time the user has to think. As a rule of thumb:
    user time is a much scarcer resource than screen space.


    You can find a full introduction to material design with many beautiful case studies
    at https://material.io/design/. New design systems will emerge and users will
    get more and more used to digital work, so the material metaphors may well become
    less useful for the next generation of computer users. For now, just note that
    minimalism requires careful consideration of the relevant resources: time, space,
    and money—and you must weigh them according to the needs of your application.
    To sum up, minimalistic design gets rid of all unnecessary elements and results
    in a beautiful product likely to delight your users.


    Next, you''ll learn how to achieve it.'
