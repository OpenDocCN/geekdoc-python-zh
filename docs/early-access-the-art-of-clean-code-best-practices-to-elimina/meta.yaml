    performance. Optimizing the speed of starting the Windows operating system is
    not premature because it’ll directly benefit millions of users, whereas optimizing
    the scalability of your web application with an upper limit of 1000 users per
    month requesting a static website is premature. The costs of *developing* an application
    are not as high as the costs of thousands of users *using* it. If you can spend
    one hour of your time to save the users a few seconds, it’s usually a win! Your
    users’ time is more valuable than your own. This is why we use computers in the
    first place—to invest a few resources upfront and gain many more resources back
    afterward. Optimization is not always premature. Sometimes, you must optimize
    in order to create a valuable product in the first place—why bother shipping an
    unoptimized product that doesn’t generate any value? Having seen several reasons
    to avoid premature optimization, we will now look at six performance tips to help
    you choose how and when to optimize your code.


    # **Measure First, Improve Second**


    Measure your software’s performance so you know where it can and should be improved.
    What you don’t measure can’t be improved, since you have no way to track your
    progress.


    Premature optimization is often an optimization applied before you’ve even measured,
    which is a direct cause of the idea that premature optimization is the root of
    all evil. You should always optimize only after you have begun to measure the
    performance of your non-optimized code, like memory footprint or speed. This is
    your benchmark. There’s no point in trying to improve runtime, for example, if
    you don’t know what your original runtime is. There’s no way to tell if your “optimization”
    actually increases total runtime or results in no measurable effect unless you
    begin with a clear benchmark.


    As a general strategy for measuring performance, start with writing the most straightforward,
    naïve code possible that’s also easy to read. You may call this your *prototype*,
    the *naïve approach*, or the *MVP*. Document your measurements in a spreadsheet.
    This is your first benchmark. Create an alternative code solution and measure
    its performance against the benchmark. Once you’ve rigorously proven that your
    optimization improves your code performance, the new optimized code becomes your
    new benchmark, which all subsequent improvements should be able to beat. If an
    optimization doesn’t measurably improve your code, throw it away.


    This way, you can track your code’s improvement over time. You can also document,
    prove, and defend an optimization to your boss, your peer group, or even the scientific
    community.


    # **Pareto is King**


    The 80/20 principle, or *Pareto principle*, discussed in [Chapter 2](#), also
    applies to performance optimization. Some features will take up considerably more
    resources, such as time and memory footprint, than others, so focusing on improving
    bottlenecks like these will help you effectively optimize your code.'
