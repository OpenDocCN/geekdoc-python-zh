    +   - Use distributed systems to avoid a single point of failure: run your application
    on multiple machines to reduce the probability of a failing machine adversely
    affecting your application. Say one machine has a failure probability of 1 percent
    per day—it’ll fail about every 100 days. Creating a distributed system of five
    machines that fail independently can theoretically reduce your failure probability
    to 0.01^5 × 100% = 0.00000001%.


    For a user, an application is robust if you cannot easily break it by providing
    faulty or even malicious inputs. Assume that your users will behave like a mob
    of gorillas smacking the keyboard and submitting random series of characters,
    and that highly skilled hackers understand the application better than you and
    are ready to exploit even the smallest security issue. Your application must be
    robust against both types of users.


    It’s relatively simple to shield against the former group. Unit testing is one
    powerful tool: test any function against any function input you can think of,
    especially border cases. For example, if your function takes an integer and calculates
    the square root, check that it can handle negative inputs and 0 because unhandled
    exceptions would break the chain of reliable, simple, chainable programs. However,
    unhandled exceptions lead to another more subtle problem that was brought to my
    attention by security expert and technical editor of this book, Noah Spahn: providing
    input to break a program can give attackers a foothold into the host operating
    system. So, check your program’s ability to process all kinds of inputs and, thereby,
    make your code more robust!


    # 14. Repair What You Can—But Fail Early and Noisily


    While you should repair problems in your code wherever possible, you shouldn’t
    hide the errors you cannot fix. A hidden error will quickly compound, becoming
    bigger and bigger the longer it remains hidden.


    Errors have the ability to accumulate. For example, say the speech recognition
    system in your driving assistance app is fed faulty training data classifying
    two completely different phonetic waves as the same word (see Figure 7-4). So
    your code raises an error trying to map two completely different phonetic waves
    to the same English word (for example, the error may occur as you try to store
    this contradictory information in an inverted index that maps English terms to
    phonetic waves). You can write your code in two ways: hide the error or propagate
    the error up to the application, user, or programmer. While many coders intuitively
    want to hide errors from the users to improve usability, this is not the most
    sensible approach. Error messages should carry useful information. If your code
    makes you aware of this problem early, you could figure out a solution in advance.
    You better become aware of errors early before their consequences cumulate and
    destroy millions of dollars or even human lives.'
