    Algorithmic complexity is a thoroughly researched field. In my opinion, the improved
    algorithms produced from this research are among the most valuable technological
    assets of humanity, allowing us to solve the same problems with fewer resources,
    over and over. We truly stand on the shoulders of giants.


    In addition to algorithmic complexity, we can measure the complexity of code with
    *cyclomatic complexity*, a metric developed by Thomas McCabe in 1976 that describes
    the number of *linearly independent paths* through your code: the number of paths
    that have at least one edge that''s not in another path. For example, code with
    an if statement would result in two independent paths through your code, so it
    would have a higher cyclomatic complexity than flat code without any branching
    like that in an if statement. Figure 1-5 shows the cyclomatic complexity of two
    Python programs that process user input and respond accordingly. The first program
    contains only one conditional branch, which could be considered as a fork in the
    road. Either branch could be taken, but not both. Thus, the cyclomatic complexity
    is two because there are two linearly independent paths. The second program contains
    two conditional branches leading to a total of three linearly independent paths
    and cyclomatic complexity of three. Each additional if statement increases cyclomatic
    complexity.'
- md: '## Complexity in Learning


    Facts don''t exist in a vacuum but are interrelated. Consider these two facts:


    - Walt Disney was born in the year 1901.

    - Louis Armstrong was born in the year 1901.


    If you fed a program with these facts, it could answer questions like “*What''s
    the birth year of Walt Disney?*” as well as questions like “*Who was born in 1901?*”
    To answer the latter, the program must figure out the interdependency of different
    facts. It may model the information like this:


    ```

    (Walt Disney, born, 1901)

    (Louis Armstrong, born, 1901)

    ```


    To get all persons born in 1901, it could use the query (*, born, 1901) or any
    way to relate the facts and group them together.


    In 2012, Google launched a new search feature showing info boxes on the search
    result page. These fact-based info boxes are populated using a data structure
    called the *knowledge graph*, which is a massive database of billions of interrelated
    facts to represent information in a network-like structure. Instead of storing
    objective and independent facts, this database maintains information about the
    interrelationship between different facts and pieces of information. The Google
    search engine uses this knowledge graph to enrich its search results with higher-level
    knowledge and form answers autonomously.


    Figure 1-6 shows an example. One node on the knowledge graph may be about the
    famous computer scientist *Alan Turing*. In the knowledge graph, the concept of
    Alan Turing is connected to different pieces of information such as his birth
    year (1912), his field of study (computer science, philosophy, language theory),
    and his doctoral advisor (Alonzo Church). Each of those pieces of information
    is also connected to other facts (Alonzo Church''s field of study was computer
    science as well), forming a massive network of interrelated facts. You can use
    this network to acquire new information and answer user queries programmatically.
    A query about the "field of study of Turing''s doctor father" would result in
    the deducted answer "computer science". While this may sound trivial or obvious,
    the ability to generate new factoids like these has led to a breakthrough in information
    retrieval and search engine relevancy. You''d probably agree that it''s far more
    effective to learn by association than by remembering unrelated facts.


    ```

    Knowledge graph representation (triples):

    ("Alan Turing", "has doctoral advisor", "Alonzo Church")

    ("Alan Turing", "has field of study", "Philosophy")

    ("Alan Turing", "has field of study", "Linguistics")

    ...

    ```


    Every field of study focuses only on a small part of the graph, each consisting
    of myriads of interrelated factoids. You can only really understand a field by
    taking into account related facts. To understand Alan Turing thoroughly you must
    research his beliefs, philosophies, and the characteristics of his doctorate advisor.
    To understand Church you must investigate his relationship to Turing. Of course,
    there are too many related dependencies and facts in the graph to expect to understand
    everything. The complexity of these interrelations poses the most fundamental
    boundaries to your ambitions to learn. Learning and complexity are two sides of
    the same coin: complexity is at the boundary of the knowledge you’ve already acquired.
    To learn more, you must first know how to control complexity.


    We’re getting kind of abstract here, so let’s have an applicable example! Say
    you want to program a trading bot that buys and sells assets according to a set
    of sophisticated rules. You could learn lots of useful knowledge before starting
    your project: the basics of programming, distributed systems, databases, application
    programming interfaces (APIs), web services, machine learning, and data science
    and the related mathematics. You could learn about practical tools such as Python,
    NumPy, scikit-learn, ccxt, TensorFlow, and Flask. You could learn about trading
    strategies and stock market philosophies. Many people approach these problems
    with such a mindset and so never feel ready to start the project. The problem
    is that the more you learn, the less knowledgeable you feel. You’ll never attain
    sufficient mastery in all those fields to truly satisfy your desire to feel prepared.
    Overwhelmed by the complexity of the whole endeavor, you feel like quitting. Complexity
    is about to take its next victim: you.


    Fortunately, in the chapters of this book, you’ll learn skills to combat complexity:
    focus, simplification, scaling down, reduction, and minimalism. This book will
    teach you those skills.


    ## Complexity in Processes


    A *process* is a series of actions taken with the goal of realizing a defined
    result. The complexity of a process is calculated by its number of actions, participants,
    or branches. In general, the more actions (and participants), the more complicated
    a process becomes (see Figure 1-7).


    Many software companies follow process models for different aspects of the business
    in an attempt to simplify processes; for example:


    - Software development may use agile development or scrum.

    - Customer relationship development may use customer relationship management (CRM)
    and sales scripts.

    - New product and business model creation may use the business model canvas.


    When organizations accumulate too many processes, complexity starts to clog the
    system. For example, before Uber entered the scene, the process of traveling from
    location A to B might often have involved many steps: finding telephone numbers
    of taxi organizations, comparing rates, preparing different payment options, and
    planning different modes of transportation. For many, Uber streamlined the process
    of traveling from A to B, integrating the whole planning process into an easy-to-use
    mobile application. The radical simplification performed by Uber made traveling
    more convenient for customers and reduced planning time and costs compared to
    the traditional taxi industry.


    In overly complex organizations, innovation finds fewer vehicles for change because
    it’s unable to break through the complexity. Resources are wasted as actions within
    processes become redundant. Trying to fix the suffering business, managers invest
    energy to establish new processes and new actions, and the vicious cycle begins
    to destroy the business or organization.


    Complexity is the enemy of efficiency. The solution here is minimalism: to keep
    your processes efficient, you must radically weed out unnecessary steps and actions.
    It’s very unlikely that you’ll find your processes *oversimplified*.


    ## Complexity in Your Daily Life, or the Death of a Thousand Cuts


    The purpose of this book is to increase the productivity of your programming efforts.
    This can be interrupted by your own personal daily habits and routines. You must
    tackle the daily distractions and the constant competition for your valuable time.
    Computer science professor Cal Newport talks about this in his excellent book
    *Deep Work: Rules for Focused Success in a Distracted World* (Grand Central Publishing,
    2016). He argues that there’s both an *increasing* demand for work that requires
    deep thinking—such as programming, researching, medicine, and writing—and a *decreasing*
    supply due to the proliferation of communication devices, opportunities, and entertainment
    systems. If increasing demand meets decreasing supply, economic theory suggests
    that prices will rise. If you are capable of engaging in deep work, your economic
    value will increase. There has never been a better time for programmers who can
    engage in deep work.


    Now, the caveat: it has become almost impossible to engage in deep work if you
    don’t brutally enforce it. The external world demands your'
  mdcn: '## 学习中的复杂性


    事实并非孤立存在，而是相互关联的。请看以下两个事实：


    -   沃尔特·迪士尼出生于1901年。

    -   路易斯·阿姆斯特朗出生于1901年。


    如果你将这些事实输入一个程序，它既能回答“*沃尔特·迪士尼的出生年份是哪一年？*”这样的问题，也能回答“*谁出生于1901年？*”这样的问题。要回答后者，程序必须弄清楚不同事实之间的相互依赖关系。它可能会这样建模信息：


    ```

    (Walt Disney, born, 1901)

    (Louis Armstrong, born, 1901)

    ```


    要获取所有出生于1901年的人，它可以使用查询 `(*, born, 1901)` 或任何将事实关联并分组的方式。


    2012年，谷歌推出了一项新的搜索功能，在搜索结果页面上显示信息框。这些基于事实的信息框是使用一种名为*知识图谱*的数据结构填充的，这是一个包含数十亿相互关联事实的庞大数据库，以网络状结构表示信息。这个数据库不是存储客观独立的事实，而是维护不同事实和信息片段之间相互关系的信息。谷歌搜索引擎使用这个知识图谱，用更高层次的知识来丰富其搜索结果，并自主形成答案。


    图1-6展示了一个例子。知识图谱中的一个节点可能关于著名的计算机科学家*艾伦·图灵*。在知识图谱中，艾伦·图灵的概念与不同的信息片段相连，例如他的出生年份（1912年）、他的研究领域（计算机科学、哲学、语言理论）以及他的博士导师（阿隆佐·邱奇）。这些信息片段中的每一个又与其他事实相连（阿隆佐·邱奇的研究领域也是计算机科学），形成了一个庞大的相互关联事实网络。你可以利用这个网络来获取新信息，并以编程方式回答用户查询。一个关于“图灵博士导师的研究领域”的查询，会得出推导出的答案“计算机科学”。虽然这听起来可能微不足道或显而易见，但生成此类新事实的能力已经在信息检索和搜索引擎相关性方面带来了突破。你可能会同意，通过联想学习比记忆不相关的事实要有效得多。


    ```

    知识图谱表示（三元组）：

    ("Alan Turing", "has doctoral advisor", "Alonzo Church")

    ("Alan Turing", "has field of study", "Philosophy")

    ("Alan Turing", "has field of study", "Linguistics")

    ...

    ```


    每个研究领域只关注图谱的一小部分，每一部分都由无数相互关联的事实片段组成。只有考虑到相关事实，你才能真正理解一个领域。要彻底理解艾伦·图灵，你必须研究他的信仰、哲学以及他博士导师的特征。要理解邱奇，你必须调查他与图灵的关系。当然，图谱中有太多相互依赖的关系和事实，不可能期望理解所有内容。这些相互关系的复杂性，对你学习的雄心构成了最基本的限制。学习和复杂性是同一枚硬币的两面：复杂性处于你已获得知识的边界。要学习更多，你必须首先知道如何控制复杂性。


    我们这里讲得有点抽象了，所以让我们来看一个实际的例子！假设你想编写一个交易机器人，根据一套复杂的规则买卖资产。在开始项目之前，你可以学习很多有用的知识：编程基础、分布式系统、数据库、应用程序编程接口（API）、网络服务、机器学习、数据科学及相关数学。你可以学习实用工具，如Python、NumPy、scikit-learn、ccxt、TensorFlow和Flask。你可以学习交易策略和股市哲学。许多人带着这样的心态处理这些问题，因此从未觉得准备好开始项目。问题在于，你学得越多，就越觉得自己知识不足。你永远无法在所有这些领域都达到足够的精通程度，从而真正满足你希望做好准备的愿望。被整个事业的复杂性所压倒，你想要放弃。复杂性即将夺走它的下一个受害者：你。


    幸运的是，在本书的章节中，你将学习应对复杂性的技能：专注、简化、缩减、精简和极简主义。本书将教你这些技能。


    ## 流程中的复杂性


    *流程*是一系列旨在实现既定结果的行动。流程的复杂性由其行动数量、参与者数量或分支数量来计算。通常，行动（和参与者）越多，流程就越复杂（见图1-7）。


    许多软件公司为业务的不同方面遵循流程模型，试图简化流程；例如：


    -   软件开发可能使用敏捷开发或Scrum。

    -   客户关系发展可能使用客户关系管理（CRM）和销售脚本。

    -   新产品和商业模式的创建可能使用商业模式画布。


    当组织积累了过多的流程时，复杂性开始堵塞系统。例如，在优步出现之前，从A地到B地的旅行过程通常涉及许多步骤：查找出租车公司的电话号码、比较费率、准备不同的支付方式以及规划不同的交通方式。对许多人来说，优步简化了从A地到B地的旅行流程，将整个规划过程整合到一个易于使用的移动应用程序中。优步进行的彻底简化使客户出行更加便捷，并与传统出租车行业相比，减少了规划时间和成本。


    在过于复杂的组织中，创新找到的变革载体更少，因为它无法突破复杂性。随着流程内的行动变得冗余，资源被浪费。试图挽救陷入困境的业务，管理者投入精力建立新的流程和新的行动，恶性循环开始摧毁业务或组织。


    复杂性是效率的敌人。这里的解决方案是极简主义：要保持流程高效，你必须彻底剔除不必要的步骤和行动。你发现你的流程被*过度简化*的可能性非常小。


    ## 你日常生活中的复杂性，或千刀万剐之死


    本书的目的是提高你编程工作的生产力。这可能会被你个人的日常习惯和惯例所打断。你必须应对日常的干扰和对你宝贵时间的持续争夺。计算机科学教授卡尔·纽波特在他优秀的著作《*深度工作：在分心世界中专注成功的规则*》（Grand
    Central Publishing, 2016）中谈到了这一点。他认为，对需要深度思考的工作（如编程、研究、医学和写作）的需求在*增加*，而由于通信设备、机会和娱乐系统的激增，这种工作的供应却在*减少*。如果需求增加而供应减少，经济理论表明价格将会上涨。如果你能够从事深度工作，你的经济价值将会增加。对于能够从事深度工作的程序员来说，从来没有比现在更好的时代了。


    现在，需要注意的是：如果你不强制执行，几乎不可能从事深度工作。外部世界要求你'
