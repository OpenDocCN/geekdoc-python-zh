    \ stub that calculates the average red, green, and blue (RGB) color value of an\
    \ image, perhaps used to differentiate whether you travel through a city or a\
    \ forest:\n\n```python\ndef average_rgb(pixels):\n    r = [x[0] for x in pixels]\n\
    \    g = [x[1] for x in pixels]\n    b = [x[2] for x in pixels]\n    n = len(r)\n\
    \    return (sum(r)/n, sum(g)/n, sum(b)/n)\n```\n\nFor example, the following\
    \ list of pixels will create the average red, green, and blue values of 96.0,\
    \ 64.0, and 11.0, respectively:\n\n```python\nprint(average_rgb([(0, 0, 0),\n\
    \                   (256, 128, 0),\n                   (32, 64, 33)]))\n```\n\n\
    Here's the output:\n\n```\n(96.0, 64.0, 11.0)\n```\n\nAlthough the function seems\
