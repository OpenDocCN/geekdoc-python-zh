  md: '# 3. Small is Beautiful


    Rather than writing big code blocks, write small functions and work as an architect
    brokering the interaction between those functions, as exemplified in Figure 7-1.
    There are three main reasons to keep your program small:


    **Reduce complexity.**

    Code is harder to comprehend as it gets longer. This is a cognitive fact: your
    brain can keep track of only so many chunks of information simultaneously. Too
    many pieces of information make it hard to see the big picture. By going small
    and reducing the number of code lines in a function, you *improve readability*
    and reduce the likelihood of injecting costly bugs into your codebase.


    **Improve maintainability.**

    Structuring your code in many small pieces of functionality makes it easier to
    maintain. Adding more small functions is unlikely to incur side effects, whereas
    in a big, monolithic code block, any changes you make can easily have unintended
    global effects, especially if multiple programmers are working on the code at
    the same time.


    **Improve testability.**

    Many modern software companies use *test-driven development*, which involves using
    unit tests to stress-test inputs to each function and unit and compare the outputs
    with the expected ones. This allows you to find and isolate bugs. Unit tests are
    much more effective and easier to implement in small code, where each function
    focuses on just one thing, so you know what the expected result should be.


    Rather than implementing an example of small code in Python for this principle,
    Python itself is the best example. Any master coder uses other people''s code
    to improve their coding productivity. Millions of developers have spent countless
    hours optimizing code that you can import into your code in a split second. Python,
    like most other programming languages, provides this functionality through libraries.
    Many of the less-frequently used libraries don''t ship with the default implementation
    and need to be explicitly installed. By not providing all the libraries as built-in
    functionality, the Python installation on your computer remains relatively small
    but doesn''t sacrifice the potential power of external libraries. On top of this,
    the libraries themselves are relatively small—all of them focus on a restricted
    subset of functions. Rather than one monolithic library to rule all problems,
    we have many small libraries, each responsible for a small part of the picture.
    Small is beautiful.


    Every few years, new architectural patterns appear with the promise of breaking
    up large, monolithic applications into beautiful, small applications to scale
    up the software development cycle. Recent examples have been the Common Object
    Request Broker Architecture (CORBA), service-oriented architecture (SOA), and
    microservices. The idea of these is to break up a large software block into a
    series of independently'
