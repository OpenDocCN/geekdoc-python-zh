    created your first application with multiple modules, files, and classes. How
    can you apply big-picture thinking to get some order into the mess? Considering
    the following questions can give you some ideas on how to best make your code
    cleaner:


    +   - Do you need all the separate files and modules, or can you consolidate some
    of them and reduce the interdependency of your code?

    - Can you divide a large and complicated file into two simpler ones? Note that
    there’s usually a sweet spot between two extremes: a large, monolithic code block
    that is completely unreadable or myriads of small code blocks that are impossible
    to mentally keep track of. Neither is'
