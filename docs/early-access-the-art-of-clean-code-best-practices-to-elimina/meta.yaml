    # Principle 11: Test


    Test-driven development is an integral part of modern software development. No
    matter how skilled you are, you will make mistakes in your code. In order to catch
    them, you’ll need to run periodic tests, or build test-driven code in the first
    place. Every great software company employs multiple levels of testing before
    it ships the final product to the public, since it’s far better to discover errors
    internally than to learn about them from unhappy users.


    While there are no limitations to what types of tests you can perform to improve
    your software applications, these are the most common types:


    **Unit Tests** With unit tests, you write a separate application to check the
    correct input/output relationship for different inputs of each function in the
    application. The unit tests are usually applied in regular intervals—for example,
    each time a new software version is released. This ensures a certain degree of
    progress by reducing the likelihood that a software change causes previously stable
    features to suddenly fail.


    **User Acceptance Tests** These allow people in your target market to use your
    application in a controlled environment while you observe their behavior. You
    then ask them how they liked the application and how to improve it. These tests
    are usually deployed in the final phase of project development after extensive
    testing within the organization.


    **Smoke Tests** Smoke tests are rough tests designed to try to fail the application
    under development before the teams building the software give the application
    to the testing team. In other words, smoke tests are often deployed by the application-building
    team for quality assurance before handing it to the testing teams. When the app
    passes the smoke test, it’s ready for the next round of testing.


    **Performance Tests** Performance tests aim to show whether the application meets
    or even exceeds its users’ performance requirements rather than testing the actual
    functionality. For instance, before Netflix releases a new feature, it must test
    its website for page-loading time. If the new feature slows down the frontend
    too much, Netflix doesn’t release it, proactively avoiding a negative user experience.


    **Scalability Tests** If your application becomes successful, you may have to
    handle 1000 requests per minute instead of the original 2 requests. A scalability
    test will show whether your application is scalable enough to handle that. Note
    that a performant application isn’t necessarily scalable and vice versa. For instance,
    a speed boat is very performant but doesn’t scale to thousands of people at a
    time!


    Testing and refactoring will often reduce complexity and the number of errors
    in your code. However, be careful not to over-engineer (see *Principle 14*)—you
    need to test scenarios that can occur only in the real world. For example, testing
    whether the Netflix application can handle 100 billion streaming devices is unnecessary
    considering there are only 7 billion potential viewers on the planet.'
- md: "## Principle 12: Small Is Beautiful\n\nSmall code is code that requires only\
    \ a relatively small number of lines to accomplish a single specified task. Here's\
    \ an example of a small code function that reads an integer value from a user\
    \ and ensures the input is indeed an integer:\n\n```python\ndef read_int(query):\n\
    \    print(query)\n    print('Please type an integer next:')\n    try:\n     \
    \   x = int(input())\n    except:\n        print('Try again - type an integer!')\n\
    \        return read_int(query)\n    return x\n\nprint(read_int('Your age?'))\n\
    ```\n\nThe code runs until the user types in an integer. Here's an example run:\n\
    \n```\nYour age?\nPlease type an integer next:\nhello\nTry again - type an integer!\n\
    Your age?\nPlease type an integer next:\ntwenty\nTry again - type an integer!\n\
    Your age?\nPlease type an integer next:\n20\n20\n```\n\nBy separating the logic\
    \ of reading an integer value from a user, you can reuse the same function multiple\
    \ times. But, more importantly, you've broken up the code into smaller units of\
    \ functionality that are relatively easy to read and understand.\n\nInstead, many\
    \ beginner coders (or lazy intermediate coders) write large, monolithic code functions,\
    \ or so-called *God objects*, that do everything in a centralized manner. These\
    \ monolithic code blocks are a nightmare to maintain. For one thing, it's easier\
    \ for humans to understand one small code function at a time than to try to integrate\
    \ a specific feature into a 10,000-line code block. You can potentially make far\
    \ more mistakes in a large code block than in a few small functions and code blocks\
    \ that you can then integrate with your existing codebase.\n\nAt the beginning\
    \ of this chapter, Figure 4-1 showed that writing code becomes more time-consuming\
    \ with each additional line, though writing clean code is much faster in the long\
    \ run than writing dirty code. Figure 4-2 compares the time it takes to work with\
    \ small code blocks versus monolithic code blocks. For large code blocks, the\
    \ time it takes to add each additional line will increase superlinearly. If you\
    \ stack multiple small code functions on top of each other, however, the time\
    \ spent per additional line increases quasi-linearly. To best achieve this effect,\
    \ you’ll need to be sure each code function is more or less independent of other\
    \ code functions. You’ll learn more about this idea in the next principle, *The\
    \ Law of Demeter*.\n\n![](img/8792d1c61415b2790e4dd6b390c6d60b_83_0.png)\n\n*Figure\
    \ 4-2: Writing small and decoupled code functions can mitigate the burden of complexity.\
    \ With the Big Monolithic Code Block, time increases exponentially. With the Many\
    \ Small Code Blocks, time increases quasi-linearly.*\n\n## Principle 13: The Law\
    \ of Demeter\n\nDependencies are everywhere. When you import a library in your\
    \ code, your code depends partially on the library’s functionality, but it will\
    \ also have interdependencies within itself. In object-oriented programming, one\
    \ function may depend on another function, one object on another object, and one\
    \ class definition on another class definition.\n\nTo write clean code, minimize\
    \ the interdependency of your code elements by following the *Law of Demeter*,\
    \ which was proposed in the late 1980s by Ian Holland, a software developer working\
    \ on a software project named after *Demeter*, the Greek goddess of agriculture,\
    \ growth, and fertility. The project group promoted the idea of “growing software”\
    \ as opposed to simply building it. However, what became known as the Law of Demeter\
    \ has little to do with these arguably more metaphysic ideas—it’s a practical\
    \ approach of writing loosely coupled code in object-oriented programming. Here’s\
    \ a concise quote explaining the Law of Demeter from the project group’s website\
    \ http://ccs.neu.edu/home/lieber/what-is-demeter.html:\n\n> An important concept\
    \ of Demeter is to split software into at least two parts: The first part defines\
    \ the objects. The second part defines the operations. The goal of Demeter is\
    \ to maintain a loose coupling between the objects and the operations, so that\
    \ one can make modifications to either without serious impact on the other. This\
    \ cuts down significantly on maintenance time.\n\nIn other words, you should minimize\
    \ the dependencies of your code objects. By reducing dependencies between code\
    \ objects, you reduce the complexity of your code and, in turn, improve maintainability.\
    \ One specific implication is that every object should call only its own methods\
    \ or methods from adjacent objects rather than call methods of objects it obtains\
    \ from calling a method of an adjacent object. For the sake of explanation, let’s\
    \ define two objects A and B as *friends* if A calls a method provided by B. Simple.\
    \ But what if B’s method returns a reference to object C? Now, object A may perform\
    \ something like this: `B.method_of_B().method_of_C()`. This is called *chaining*\
    \ of method calls—in our metaphor, you talk to a friend of your friend. The Law\
    \ of Demeter states to *talk only to your immediate friends*, so it discourages\
    \ this type of method chaining. This may sound confusing at first, so let’s dive\
    \ into a more practical example shown in Figure 4-3.\n\n![](img/8792d1c61415b2790e4dd6b390c6d60b_84_0.png)\n\
    \nFigure 4-3 shows two object-oriented code projects that calculate the price\
    \ per cup of coffee for a given person. One of the implementations violates the\
    \ Law of Demeter, and the other one adheres to it. Let’s start with the negative\
    \ example first in which you use method chaining in the Person class to talk to\
    \ a stranger in ❶ (see Listing 4-17).\n\n```python\n# VIOLATE LAW OF DEMETER (BAD)\n\
    \nclass Person:\n    def __init__(self, coffee_cup):\n        self.coffee_cup\
    \ = coffee_cup\n\n    def price_per_cup(self):\n        cups = 798\n        ❶\
    \ machine_price = self.coffee_cup.get_creator_machine().get_price()\n        return\
    \ machine_price / cups\n\nclass Coffee_Machine:\n    def __init__(self, price):\n\
    \        self.price = price\n\n    def get_price(self):\n        return self.price\n\
    \n\nclass Coffee_Cup:\n    def __init__(self, machine):\n        self.machine\
    \ = machine\n\n    def get_creator_machine(self):\n        return self.machine\n\
    \nm = Coffee_Machine(399)\nc = Coffee_Cup(m)\np = Person(c)\n\nprint('Price per\
    \ cup:', p.price_per_cup())\n# 0.5\n```\n\nListing 4-17: Code that violates Law\
    \ of Demeter in ❶\n\nYou create a method `price_per_cup()` that calculates the\
    \ hard costs per coffee cup based on the price of the coffee machine and the number\
    \ of cups produced by this machine. The `Coffee_Cup` object collects information\
    \ about the price of the coffee machine, which influences the price per cup, and\
    \ passes it to the caller of the method `price_per_cup()` on the `Person` object.\n\
    \nThe diagram on the left shows a bad strategy for doing so. Let's first look\
    \ at the step-by-step explanation of the code from Listing 4-17.\n\n1. The method\
    \ `price_per_cup()` calls the method `Coffee_Cup.get_creator_machine()` to get\
    \ a reference to the `Coffee_Machine` object that created the coffee.\n2. The\
    \ method `get_creator_machine()` returns an object reference to the `Coffee_Machine`\
    \ object that has produced the cup's contents.\n3. The method `price_per_cup()`\
    \ calls the method `Coffee_Machine.get_price()` on the `Coffee_Machine` object\
    \ it just obtained from the previous `Coffee_Cup` method call.\n4. The method\
    \ `get_price()` returns the price of the machine.\n5. The method `price_per_cup()`\
    \ calculates the depreciation per cup and uses this to estimate the price of a\
    \ single cup. This is returned to the caller of the method.\n\nThis is a bad strategy\
    \ because the class `Person` depends on two objects: `Coffee_Cup` and `Coffee_Machine`.\
    \ A programmer responsible for maintaining this class must know about both parent\
    \ class definitions—any change in either of those may impact the `Person` class\
    \ as well.\n\nThe Law of Demeter minimizes such dependencies. You can see a better\
    \ way to model the same problem on the right in Figure 4-3 and in code Listing\
    \ 4-18. In this code snippet, the Person class doesn't talk to the Machine class\
    \ directly—it doesn't even need to be aware of its existence!\n\n```python\n#\
    \ ADHERE TO LAW OF DEMETER (GOOD)\nclass Person:\n    def __init__(self, coffee_cup):\n\
    \        self.coffee_cup = coffee_cup\n\n    def price_per_cup(self):\n      \
    \  cups = 798\n        return self.coffee_cup.get_costs_per_cup(cups)\n\nclass\
    \ Coffee_Machine:\n    def __init__(self, price):\n        self.price = price\n\
    \n    def get_price(self):\n        return self.price\n\nclass Coffee_Cup:\n \
    \   def __init__(self, machine):\n        self.machine = machine\n\n    def get_creator_machine(self):\n\
    \        return self.machine\n\n    def get_costs_per_cup(self, cups):\n     \
    \   return self.machine.get_price() / cups\n\nm = Coffee_Machine(399)\nc = Coffee_Cup(m)\n\
    p = Person(c)\n\nprint('Price per cup:', p.price_per_cup())\n# 0.5\n```\n\nListing\
    \ 4-18: Code that adheres to the Law of Demeter by not talking to strangers\n\n\
    Let's examine this code in a step-by-step manner:\n\n1. The method `price_per_cup()`\
    \ calls the method `Coffee_Cup.get_costs_per_cup()` to get the estimated price\
    \ per cup.\n2. The method `get_costs_per_cup()`—before replying to the calling\
    \ method—calls the method `Coffee_Machine.get_price()` to access the desired pricing\
    \ information for the whole machine.\n3. The method `get_price()` returns the\
    \ price information.\n4. The method `get_costs_per_cup()` calculates the price\
    \ per cup and returns it to the calling method `price_per_cup()`.\n5. The method\
    \ `price_per_cup()` simply forwards this calculated value to its caller."
  mdcn: "## 原则12：小即是美\n\n小代码是指仅需相对较少的行数就能完成单一指定任务的代码。以下是一个小代码函数的示例，它从用户处读取一个整数值，并确保输入确实是一个整数：\n\
    \n```python\ndef read_int(query):\n    print(query)\n    print('Please type an\
    \ integer next:')\n    try:\n        x = int(input())\n    except:\n        print('Try\
    \ again - type an integer!')\n        return read_int(query)\n    return x\n\n\
    print(read_int('Your age?'))\n```\n\n该代码会一直运行，直到用户输入一个整数。以下是一个运行示例：\n\n```\nYour\
    \ age?\nPlease type an integer next:\nhello\nTry again - type an integer!\nYour\
    \ age?\nPlease type an integer next:\ntwenty\nTry again - type an integer!\nYour\
    \ age?\nPlease type an integer next:\n20\n20\n```\n\n通过将从用户处读取整数值的逻辑分离出来，你可以多次重用同一个函数。但更重要的是，你已将代码分解成更小的功能单元，这些单元相对易于阅读和理解。\n\
    \n相反，许多初学者程序员（或懒惰的中级程序员）会编写大型、整体式的代码函数，或所谓的*上帝对象*，以集中方式完成所有事情。这些整体式代码块是维护的噩梦。首先，人类一次理解一个小代码函数，比试图将一个特定功能集成到一个万行代码块中要容易得多。在大型代码块中，你可能犯的错误远比在几个小函数和代码块中多，而后者可以与你现有的代码库集成。\n\
    \n在本章开头，图4-1显示，随着每一行代码的增加，编写代码变得更加耗时，尽管从长远来看，编写整洁代码比编写混乱代码要快得多。图4-2比较了处理小代码块与整体式代码块所需的时间。对于大型代码块，添加每一行额外代码所需的时间将超线性增长。然而，如果你将多个小代码函数堆叠在一起，每增加一行代码所花费的时间则呈准线性增长。为了最好地实现这种效果，你需要确保每个代码函数或多或少独立于其他代码函数。你将在下一个原则*迪米特法则*中了解更多关于这个想法的内容。\n\
    \n![](img/8792d1c61415b2790e4dd6b390c6d60b_83_0.png)\n\n*图4-2：编写小而解耦的代码函数可以减轻复杂性的负担。对于大型整体式代码块，时间呈指数级增长。对于许多小代码块，时间呈准线性增长。*\n\
    \n## 原则13：迪米特法则\n\n依赖无处不在。当你在代码中导入一个库时，你的代码部分依赖于该库的功能，但它内部也会有相互依赖。在面向对象编程中，一个函数可能依赖于另一个函数，一个对象依赖于另一个对象，一个类定义依赖于另一个类定义。\n\
    \n要编写整洁代码，请遵循*迪米特法则*来最小化代码元素之间的相互依赖。该法则由软件开发者伊恩·霍兰德在20世纪80年代末提出，他当时参与了一个以希腊农业、生长和生育女神*得墨忒耳*命名的软件项目。该项目组提倡“培育软件”的理念，而不是简单地构建它。然而，后来被称为迪米特法则的东西与这些可以说更具形而上学的理念关系不大——它是在面向对象编程中编写松耦合代码的一种实用方法。以下是项目组网站\
    \ http://ccs.neu.edu/home/lieber/what-is-demeter.html 上解释迪米特法则的一段简洁引文：\n\n> 得墨忒耳的一个重要概念是将软件分成至少两部分：第一部分定义对象。第二部分定义操作。得墨忒耳的目标是保持对象和操作之间的松耦合，以便可以对任一方进行修改而不会对另一方产生严重影响。这大大减少了维护时间。\n\
    \n换句话说，你应该最小化代码对象的依赖。通过减少代码对象之间的依赖，你可以降低代码的复杂性，从而提高可维护性。一个具体的含义是，每个对象应该只调用自己的方法或相邻对象的方法，而不是调用它通过调用相邻对象的方法获得的对象的方法。为了便于解释，让我们定义两个对象A和B为*朋友*，如果A调用B提供的方法。很简单。但如果B的方法返回一个指向对象C的引用呢？现在，对象A可能执行类似这样的操作：`B.method_of_B().method_of_C()`。这被称为方法调用的*链式调用*——在我们的比喻中，你在和你朋友的朋友说话。迪米特法则指出*只和你直接的朋友交谈*，因此它不鼓励这种类型的链式调用。这起初可能听起来令人困惑，所以让我们深入探讨图4-3中展示的一个更实际的例子。\n\
    \n![](img/8792d1c61415b2790e4dd6b390c6d60b_84_0.png)\n\n图4-3展示了两个面向对象的代码项目，它们计算给定人物每杯咖啡的价格。其中一个实现违反了迪米特法则，而另一个则遵守了它。让我们先从反面例子开始，其中你在Person类中使用链式调用在❶处与陌生人交谈（见清单4-17）。\n\
    \n```python\n# VIOLATE LAW OF DEMETER (BAD)\n\nclass Person:\n    def __init__(self,\
    \ coffee_cup):\n        self.coffee_cup = coffee_cup\n\n    def price_per_cup(self):\n\
    \        cups = 798\n        ❶ machine_price = self.coffee_cup.get_creator_machine().get_price()\n\
    \        return machine_price / cups\n\nclass Coffee_Machine:\n    def __init__(self,\
    \ price):\n        self.price = price\n\n    def get_price(self):\n        return\
    \ self.price\n\n\nclass Coffee_Cup:\n    def __init__(self, machine):\n      \
    \  self.machine = machine\n\n    def get_creator_machine(self):\n        return\
    \ self.machine\n\nm = Coffee_Machine(399)\nc = Coffee_Cup(m)\np = Person(c)\n\n\
    print('Price per cup:', p.price_per_cup())\n# 0.5\n```\n\n清单4-17：在❶处违反迪米特法则的代码\n\
    \n你创建了一个方法`price_per_cup()`，它根据咖啡机的价格和该机器生产的杯数来计算每杯咖啡的硬成本。`Coffee_Cup`对象收集有关咖啡机价格的信息（这影响了每杯的价格），并将其传递给`Person`对象上`price_per_cup()`方法的调用者。\n\
    \n左侧的图示展示了这样做的一个糟糕策略。让我们首先看看清单4-17代码的逐步解释。\n\n1.  方法`price_per_cup()`调用方法`Coffee_Cup.get_creator_machine()`以获取创建该咖啡的`Coffee_Machine`对象的引用。\n\
    2.  方法`get_creator_machine()`返回一个指向生产了杯中内容的`Coffee_Machine`对象的对象引用。\n3.  方法`price_per_cup()`在它刚刚从之前的`Coffee_Cup`方法调用中获得的`Coffee_Machine`对象上调用方法`Coffee_Machine.get_price()`。\n\
    4.  方法`get_price()`返回机器的价格。\n5.  方法`price_per_cup()`计算每杯的折旧，并用此来估算单杯的价格。这被返回给方法的调用者。\n\
    \n这是一个糟糕的策略，因为`Person`类依赖于两个对象：`Coffee_Cup`和`Coffee_Machine`。负责维护此类的程序员必须了解这两个父类定义——其中任何一个的更改都可能影响`Person`类。\n\
    \n迪米特法则最小化了此类依赖。你可以在图4-3的右侧以及代码清单4-18中看到建模同一问题的更好方法。在此代码片段中，Person类不直接与Machine类交谈——它甚至不需要知道它的存在！\n\
    \n```python\n# ADHERE TO LAW OF DEMETER (GOOD)\nclass Person:\n    def __init__(self,\
    \ coffee_cup):\n        self.coffee_cup = coffee_cup\n\n    def price_per_cup(self):\n\
    \        cups = 798\n        return self.coffee_cup.get_costs_per_cup(cups)\n\n\
    class Coffee_Machine:\n    def __init__(self, price):\n        self.price = price\n\
    \n    def get_price(self):\n        return self.price\n\nclass Coffee_Cup:\n \
    \   def __init__(self, machine):\n        self.machine = machine\n\n    def get_creator_machine(self):\n\
    \        return self.machine\n\n    def get_costs_per_cup(self, cups):\n     \
    \   return self.machine.get_price() / cups\n\nm = Coffee_Machine(399)\nc = Coffee_Cup(m)\n\
    p = Person(c)\n\nprint('Price per cup:', p.price_per_cup())\n# 0.5\n```\n\n清单4-18：通过不与陌生人交谈来遵守迪米特法则的代码\n\
    \n让我们逐步检查这段代码：\n\n1.  方法`price_per_cup()`调用方法`Coffee_Cup.get_costs_per_cup()`以获取估算的每杯价格。\n\
    2.  方法`get_costs_per_cup()`在回复调用方法之前，调用方法`Coffee_Machine.get_price()`以访问整台机器所需的定价信息。\n\
    3.  方法`get_price()`返回价格信息。\n4.  方法`get_costs_per_cup()`计算每杯价格，并将其返回给调用方法`price_per_cup()`。\n\
