    \ PageRank 算法），专注于几个高概率的选项，并在没有其他高质量网站回答查询时参考次优网站。在大多数情况下，你也应该使用启发式方法而不是最优算法。问自己以下问题：你当前的计算瓶颈是什么？它为什么存在？解决这个问题值得吗？你能移除这个功能或提供一个精简版本吗？如果这个功能只有\
    \ 1% 的用户使用，但 100% 的用户都感受到了增加的延迟，那么可能是时候进行一些极简主义处理了（移除那个很少使用但给使用者带来糟糕体验的功能）。\n\n\
    为了简化你的代码，考虑以下做法是否有意义：\n\n-   通过直接跳过该功能来完全移除你当前的瓶颈。\n-   通过用更简单的问题版本替换原问题来简化问题。\n\
    -   根据 80/20 法则，放弃一个昂贵的功能来添加十个廉价的功能。\n-   省略一个重要功能，以便你可以追求一个更重要的功能；考虑机会成本。\n\n\
    ## 知道何时停止\n\n性能优化可能是编码中最耗时的方面之一。总有改进的空间，但一旦你已经用尽了唾手可得的技术，提高性能所需的努力往往会增加。在某些时候，提高性能只是浪费你的时间。\n\
