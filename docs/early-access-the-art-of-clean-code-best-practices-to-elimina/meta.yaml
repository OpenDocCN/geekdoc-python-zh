    ## About the Author


    Christian Mayer the founder of the popular Python site Finxter.com, an educational
    platform that helps teach more than five million people a year how to program.
    He has a PhD in computer science, and has published a number of books, including
    *Python One-Liners* (No Starch Press, 2020), *Leaving the Rat Race with Python*
    (2021), and the *Coffee Break Python* series.


    ## About the Technical Reviewer


    Noah Spahn has a diverse background in software engineering. He has a Master of
    Software Engineering degree from California State University, Fullerton, and currently
    works in the Computer Security Group at University of California, Santa Barbara
    (UCSB). Noah has taught Python courses at the UCSB Interdisciplinary Collaboratory,
    and an upper division course on the Concepts of Programming Languages at Westmont
    College. Noah is glad to teach anyone who is interested in learning.


    ## ACKNOWLEDGMENTS


    Putting together a programming book builds on the ideas and contributions of a
    multitude of people. Rather than trying to list them all, I want to follow my
    own advice: *less is more*.


    First and foremost, I want to thank you. I''ve written this book for you to help
    you improve your coding skills and solve practical problems in the real world.
    For trusting me with your valuable time, I''m grateful. My primary goal with this
    book is to make it worth your while by sharing tips and strategies to save you
    time and reduce your stress throughout your coding career.


    My greatest source of motivation came from the active members of the Finxter community.
    Every day, I get encouraging messages from Finxter students that motivate me to
    keep producing content. As you read this book, I want to wholeheartedly welcome
    you to the Finxter community.¹ It''s a pleasure to have you here!


    My deep gratitude goes to the No Starch Press team for making the book writing
    process such an enlightening experience. I want to thank my editor Liz Chadwick;
    it''s because of her outstanding lead that the book reached a level of clarity
    I wouldn''t be able to pull off myself. My technical reviewer Noah Spahn invested
    his excellent technical skills to “debug my writing.” Special thanks to No Starch
    Press''s founder Bill Pollock for allowing me to contribute in a small way—with
    yet another book alongside *Python One-Liners* and *Python Dash*—to his mission
    to educate and entertain coders. Bill is an inspiring and sought-after leader
    in the coding industry, yet he still finds the time to do the small things, such
    as responding to my messages and questions during holidays, weekends, and nights!


    I’m forever grateful to my beautiful and supportive wife, Anna; my lovely daughter,
    Amalie, who is full of fantastic stories and ideas; and my curious son, Gabriel,
    who never fails to make everybody around him happier.


    And with that, let’s get started, shall we?


    ¹ You can join our free Python email academy here: https://blog.finxter.com/subscribe/.
    We have cheat sheets!


    ## INTRODUCTION


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_10_0.png)


    Once upon a time, Bill Gates’ parents invited legendary investor Warren Buffett
    to his family home to spend some time together. In a CNBC interview, Warren Buffett
    recounts how on this occasion, Bill’s father asked Warren and Bill to write down
    the secret of their successes. I’ll tell you in a moment what they wrote.


    At the time, the tech prodigy Bill Gates had met the famous investor Buffett only
    once or twice, but they had become fast friends, both leading successful billion-dollar
    companies. The young Bill Gates was on the verge of achieving his mission of placing
    a *computer on every desk* with his fast-growing software giant Microsoft. Warren
    Buffett had made his name as one of the most successful business geniuses in the
    world. Famously, Warren had grown his majority-owned company, *Berkshire Hathaway*,
    from a broke textile company to an international heavyweight in diversified business
    areas such as insurance, transport, and energy.


    The Art of Clean Code (Early Access) © 2022 by Christian Mayer


    So, what did those two unequal business legends consider the secret of their success?
    As the story goes, without any collaboration, Bill and Warren wrote down a single
    word: *Focus*.


    > You can watch Warren Buffett discussing the interaction in an interview on CNBC
    in a YouTube clip entitled, “One word that accounted for Bill Gates’ and my success:
    Focus” — Warren Buffett.


    While this “success secret” sounds simple enough, you may wonder: Does it apply
    to my career as a coder too? What does focus look like in practice—coding through
    the night with energy drinks and pizza, or perhaps eating an all-protein diet
    and getting up at sunrise? What are the not-so-obvious consequences of leading
    a focused life? And, importantly, are there actionable tips on how a programmer
    like me can benefit from the abstract principle to increase my productivity?


    This book aims to answer these questions to help you lead a more focused life
    as a programmer and become more effective in your daily work. I’ll show you how
    you can increase your productivity by writing clean, concise, and focused code
    that is easier to read, write, and collaborate on with other programmers. As I’ll
    show you in the upcoming chapters, the focusing principle holds in every stage
    of software development; you’ll learn how to write clean code, create focused
    functions that *do one thing well*, create fast and responsive applications, design
    focused user interfaces for usability and aesthetics, and plan product roadmaps
    using minimum viable products. I’ll even show you how achieving a pure state of
    focus can vastly increase your concentration and help you experience more excitement
    and joy in your task. As you’ll see, the overarching theme of this book is to
    focus in every way you can—I’ll show you exactly how to do this in the upcoming
    chapters.


    For any serious coder, it is essential to always be improving your focus and productivity.
    When you do more valuable work, you tend to get higher rewards from society. However,
    simply increasing your output is not the solution. The trap goes like this: *if
    I write more code, create more tests, read more books, learn more, think more,
    communicate more, and meet more people, I’ll get more done*. But you cannot do
    *more* without doing something *less*. Time is limited—you have 24 hours per day
    and 7 days a week, just like me and everybody else. There’s an inescapable mathematical
    limitation: in a limited space, if one thing grows, something else must shrink
    to make room. If you read more books, you may meet fewer people. If you meet more
    people, you may write less code. If you write more code, you may have less time
    with the people you love. You cannot escape the fundamental trade-off: there cannot
    be *more* without *less* in a limited space.


    Rather than focus on the obvious consequence of simply doing more, this book takes
    the reverse perspective: you reduce complexity, allowing you to work less while
    getting more value from your results. Thoughtful minimalism is the holy grail
    of personal productivity, and, as you’ll see in later chapters, it works. You
    can create more value with fewer resources by programming computers the right
    way and using the timeless principles presented in this book.


    By creating more value, you can also command higher pay. Bill Gates famously said
    that a “*great lathe operator commands several times the wage of an average lathe
    operator, but a great writer of software code is worth 10,000 times the price
    of an average software writer.*”


    One reason is that a great software developer performs a highly leveraged activity:
    programming a computer the right way can replace thousands of jobs and millions
    of hours of paid work. Code that runs self-driving cars, for example, can replace
    the labor of millions of human drivers while being cheaper, more reliable, and
    (arguably) much safer.


    ## Who Is This Book For?


    Are you a coding practitioner who wants to create more value with faster code
    and less pain? Do you ever find yourself stuck in bug-finding mode? Does the complexity
    of code often overwhelm you? Do you struggle to decide on the next thing to learn,
    having to choose from hundreds of programming languages—Python, Java, C++, HTML,
    CSS, JavaScript—and thousands of frameworks and technologies—Android apps, Bootstrap,
    TensorFlow, NumPy? If you can answer any of the questions with “YES!” (or even
    “yes”), you have the right book in your hands!


    This book is for every programmer who’s interested in increasing their productivity—doing
    more with less. It’s for you if you seek simplicity and believe in Occam’s Razor:
    “*It is futile to do with more things that which can be done with fewer.*”


    ## What Will You Learn?


    This book shows you how to practically apply nine principles to increase your
    potential as a programmer by orders of magnitude. These principles will simplify
    your life and reduce complexity, struggles, and working hours. I don’t claim that
    any of the principles are new. They’re variously well known and established—and
    proven to work by the most successful coders, engineers, philosophers, and creators.
    That’s what makes them principles in the first place! However, in this book I
    will apply the principles explicitly to coders, giving real-world examples and,
    where possible, code examples.


    **Chapter 1** will set up the main challenge to increasing value in productivity:
    complexity. You’ll learn to recognize the sources of complexity in your life and
    your code and gain an understanding that complexity can harm your productivity
    and output. Complexity is everywhere, and you need to be constantly vigilant against
    it. *Keep it simple!*


    In **Chapter 2**, you’ll learn the profound impact the *80/20 principle* can have
    on your life as a programmer. The majority of effects (80 percent) come from a
    minority of causes (20 percent); this is a ubiquitous theme in programming. You’ll
    learn that the 80/20 principle is fractal: 20 percent of the 20 percent of coders
    will earn 80 percent of the 80 percent'
