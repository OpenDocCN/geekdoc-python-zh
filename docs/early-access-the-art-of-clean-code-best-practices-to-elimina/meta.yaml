  md: '# # 2


    # ## THE 80/20 PRINCIPLE


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_32_0.png)


    In this chapter, you’ll learn about the profound impact of the *80/20 principle*
    on your life as a programmer. It has many names, including the *Pareto principle*,
    named after its discoverer Vilfredo Pareto. So, how does the principle work, and
    why should you care? The 80/20 principle refers to the idea that a majority of
    effects (80 percent) come from a minority of causes (20 percent). It shows you
    a path to achieve many more results as a professional coder by focusing your efforts
    on a few important things and ignoring the many things that hardly move the needle.


    # ### 80/20 Principle Basics


    The principle says that the majority of effects come from the minority of causes.
    For example, the majority of income is earned by the minority of people, the majority
    of innovations come from the minority of researchers, the majority of books are
    written by the minority of authors, and so on.'
  merge: -1
  pgno: 32
- img_proc: true
  md: 'You may have heard about the 80/20 principle—it’s everywhere in personal productivity
    literature. The reason for its popularity is two-fold. First, the principle allows
    you to be relaxed and productive at the same time, as long as you can figure out
    the things that matter, which make up the 20 percent of activities that lead to
    80 percent of the results, and focus on those relentlessly. Second, we can observe
    the principle in a huge variety of situations, giving it considerable credibility.
    It’s even tough to come up with a counterexample, where the effects come equally
    from the causes. Try to find some examples of 50/50 distributions where 50 percent
    of the effects come from 50 percent of causes! Sure, the distribution is not always
    80/20—the concrete numbers can change to 70/30, 90/10, or even 95/5—but the distribution
    is always heavily skewed toward the minority producing the majority of effects.


    We represent the Pareto principle in a Pareto distribution, shown in Figure 2-1.


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_33_0.png)


    Figure 2-1: Example of a general Pareto distribution


    The Pareto distribution plots the results (y-axis) against the causes (x-axis).
    The results can be any measure of success or failure, like income, productivity,
    or the number of bugs in a software project. The causes can be any entity these
    results may be associated with, such as employees, businesses, or software projects,
    respectively. To obtain the characteristic Pareto curve, we order the causes according
    to the results they produce. For example, the person with the highest income comes
    first on the x-axis, then comes the person with the second-highest income, and
    so on.


    Let’s look at a practical example.'
  merge: -1
  pgno: 33
- img_proc: true
  md: '# Application Software Optimization


    Figure 2-2 shows the Pareto principle in action in an imaginary software project:
    the minority of the code is responsible for the majority of the run-time. The
    x-axis shows code functions sorted by the runtime they incur. The y-axis shows
    the runtime of those code functions. The shaded area that dominates the overall
    area under the plot shows that most code functions contribute much less to the
    overall runtime than a few selected code functions. Joseph Juran, one of the early
    discoverers of the Pareto principle, calls the latter the *vital few* and the
    former the *trivial many*. Spending a lot of time optimizing the *trivial many*
    barely improves the overall runtime. The existence of Pareto distributions in
    software projects is well supported by scientific evidence such as in “Power Laws
    in Software” by Louridas, Spinellis, and Vlachos (2008).


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_34_0.png)


    Figure 2-2: Example of a Pareto distribution in software engineering


    Large companies like International Business Machines Corporation (IBM), Microsoft,
    and Apple employ the Pareto principle to build faster, more user-friendly computers
    by channeling their focus on the vital few; that is, by repeatedly optimizing
    the 20 percent of the code that was executed most often by the average user. Not
    all code is created equal. A minority of code has a dominating impact on the user
    experience, while much of the code has little impact. You might double-click the
    File Explorer icon multiple times per day, but you seldom change the access rights
    of a file. The 80/20 principle tells you where to focus your optimization efforts!


    The principle is easy to understand, but it can be harder to know how you can
    use the principle in your own life.'
