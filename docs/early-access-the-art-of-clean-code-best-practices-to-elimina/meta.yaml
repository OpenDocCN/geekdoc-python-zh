    of all the principles outlined in this book. Here I’ll outline how:


    # The 80/20 Principle


    Focus on the vital few: remember that 20 percent delivers 80 percent of the results,
    and ignore the trivial many, increasing your productivity by one or two orders
    of magnitude.


    # Build a Minimal Viable Product


    Focus on one hypothesis at a time, thereby reducing the complexity of your product,
