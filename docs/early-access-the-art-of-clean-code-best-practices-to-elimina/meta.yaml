    \n除了算法复杂性，我们还可以用*圈复杂性*来衡量代码的复杂性，这是Thomas McCabe在1976年开发的一个指标，它描述了代码中*线性独立路径*的数量：至少有一条边不在另一条路径中的路径数量。例如，包含if语句的代码将导致两条独立的路径通过你的代码，因此它将比没有像if语句中那样的任何分支的扁平代码具有更高的圈复杂性。图1-5展示了两个处理用户输入并相应响应的Python程序的圈复杂性。第一个程序只包含一个条件分支，可以被视为道路上的一个分叉。两个分支都可以被选择，但不能同时选择。因此，圈复杂性为2，因为有两条线性独立的路径。第二个程序包含两个条件分支，总共导致三条线性独立的路径和圈复杂性为3。每个额外的if语句都会增加圈复杂性。"
