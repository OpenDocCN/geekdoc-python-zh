  md: "In other words, you should minimize the dependencies of your code objects.\
    \ By reducing dependencies between code objects, you reduce the complexity of\
    \ your code and, in turn, improve maintainability. One specific implication is\
    \ that every object should call only its own methods or methods from adjacent\
    \ objects rather than call methods of objects it obtains from calling a method\
    \ of an adjacent object. For the sake of explanation, let’s define two objects\
    \ A and B as *friends* if A calls a method provided by B. Simple. But what if\
    \ B’s method returns a reference to object C? Now, object A may perform something\
    \ like this: `B.method_of_B().method_of_C()`. This is called *chaining* of method\
    \ calls—in our metaphor, you talk to a friend of your friend. The Law of Demeter\
    \ states to *talk only to your immediate friends*, so it discourages this type\
    \ of method chaining. This may sound confusing at first, so let’s dive into a\
    \ more practical example shown in Figure 4-3.\n\n![](img/8792d1c61415b2790e4dd6b390c6d60b_84_0.png)\n\
    \nFigure 4-3 shows two object-oriented code projects that calculate the price\
    \ per cup of coffee for a given person. One of the implementations violates the\
    \ Law of Demeter, and the other one adheres to it. Let’s start with the negative\
    \ example first in which you use method chaining in the Person class to talk to\
    \ a stranger in ❶ (see Listing 4-17).\n\n```\n# VIOLATE LAW OF DEMETER (BAD)\n\
