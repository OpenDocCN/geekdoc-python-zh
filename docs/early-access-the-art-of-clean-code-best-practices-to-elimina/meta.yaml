    \ 类中进行。\n\n## 原则11：测试\n\n测试驱动开发是现代软件开发不可或缺的一部分。无论你多么熟练，你都会在代码中犯错。为了发现它们，你需要定期运行测试，或者首先构建测试驱动的代码。每个伟大的软件公司在将最终产品发布给公众之前都会进行多级测试，因为在内部发现错误远比从不满意的用户那里得知要好。\n\
    \n虽然你可以执行的测试类型没有限制，但以下是最常见的类型：\n\n- **单元测试** 通过单元测试，你编写一个单独的应用程序来检查应用程序中每个函数的不同输入的正确输入/输出关系。单元测试通常定期应用——例如，每次发布新的软件版本时。这通过降低软件更改导致以前稳定的功能突然失败的可能性来确保一定程度的进展。\n\
    \n- **用户验收测试** 这些测试允许你目标市场中的人在受控环境中使用你的应用程序，同时你观察他们的行为。然后你询问他们对应用程序的看法以及如何改进。这些测试通常在组织内进行广泛测试后，在项目开发的最后阶段部署。\n\
    \n- **冒烟测试** 冒烟测试是粗略的测试，旨在尝试使正在开发的应用程序在构建软件的团队将其交给测试团队之前失败。换句话说，冒烟测试通常由应用程序构建团队在交给测试团队之前进行质量保证。当应用程序通过冒烟测试时，它就准备好进行下一轮测试。\n\
    \n- **性能测试** 性能测试旨在显示应用程序是否满足甚至超过用户的性能要求，而不是测试实际功能。例如，在Netflix发布新功能之前，它必须测试其网站的页面加载时间。如果新功能使前端速度过慢，Netflix就不会发布它，主动避免负面的用户体验。\n\
    \n- **可扩展性测试** 如果你的应用程序变得成功，你可能需要处理每分钟1000个请求，而不是原来的2个请求。可扩展性测试将显示你的应用程序是否具有足够的可扩展性来处理这种情况。请注意，高性能的应用程序不一定可扩展，反之亦然。例如，快艇性能非常高，但无法同时扩展到数千人！\n\
    \n测试和重构通常会降低代码的复杂性和错误数量。但是，要小心不要过度工程化（参见*原则14*）——你需要测试只能在现实世界中发生的场景。例如，考虑到地球上只有70亿潜在观众，测试Netflix应用程序是否能处理1000亿个流媒体设备是没有必要的。"
