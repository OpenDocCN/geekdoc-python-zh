    \n```\n# Functionality\ndef your_life_expectancy(age):\n    if age<85:\n     \
    \   return 72 - 0.8 * age\n    return 22 - 0.2 * age\n\n# User Interface\nage\
    \ = int(input('how old are you? '))\n\n# Combine user input with functionality\
    \ and print result\nexp_years = your_life_expectancy(age)\nprint(f'People your\
