- md: "## 9. Make Every Program a Filter\n\nThere's a good argument to be made that\
    \ every program already is a filter. A filter transforms an input to an output\
    \ using a specific filtering mechanism. This allows us to easily plug together\
    \ multiple programs by using the output of one as the input of another. This increases\
    \ the reusability of your code significantly. For example, it's generally not\
    \ a good practice to print the result of a computation in the function itself—instead,\
    \ the philosophy would suggest to rather let the program return a string that\
    \ can then be printed, written into a file, or used as input for another program.\n\
    \nFor example, a program that sorts a list can be considered a filter that filters\
    \ the unsorted elements into a sorted order, as in Listing 7-12.\n\n```python\n\
    def insert_sort(lst):\n    # Check if the list is empty\n    if not lst:\n   \
    \     return []\n\n    # Start with sorted 1-element list\n    new = [lst[0]]\n\
    \n    # Insert each remaining element\n    for x in lst[1:]:\n        i = 0\n\
    \        while i<len(new) and x>new[i]:\n            i = i + 1\n        new.insert(i,\
    \ x)\n\n    return new\n\nprint(insert_sort([42, 11, 44, 33, 1]))\nprint(insert_sort([0,\
    \ 0, 0, 1]))\nprint(insert_sort([4, 3, 2, 1]))\n```\n\nListing 7-12: This insertion\
    \ sort algorithm filters an unsorted list to a sorted list.\n\nThe algorithm creates\
    \ a new list and inserts each element at the position where all elements on the\
    \ left are smaller than the inserted element. The function uses a complex filter\
    \ to change the order of the elements, transforming the input list into a sorted\
    \ output list.\n\nIf any program already is a filter, you should design it as\
    \ such by using the intuitive input/output mapping. Let me explain this next.\n\
    \nThe gold standard of a filter is to use a *homogeneous* input/output mapping\
    \ where one type of input is mapped to the same type of output. For example, if\
    \ someone talks to you in English, they expect you to respond in English—and not\
    \ in another language. Similarly, if a function takes an input argument, the expected\
    \ output is a function return value. If a program reads from a file, the expected\
    \ output is a file. If a program reads the input from the standard input, it should\
    \ write the program to the standard output. You get the point: the most intuitive\
    \ way to design a filter is to keep the data in the same category.\n\nListing\
    \ 7-13 shows a negative example with *heterogeneous* input/output mapping where\
    \ we build an average() function that transforms the input arguments into their\
    \ average—but instead of returning the average value, average() prints the result\
    \ to the shell.\n\n```python\ndef average(*args):\n    print(sum(args)/len(args))\n\
    \naverage(1, 2, 3)\n# 2.0\n```\n\n*Listing 7-13: Negative example of heterogeneous\
    \ input/output mapping*\n\nA better approach, shown in Listing 7-14, makes the\
    \ function average() return the average value (homogeneous input/output mapping),\
    \ which you can then print to the standard output in a separate function call\
    \ using the print() function. This is better because it allows you, for example,\
    \ to write the output into a file rather than print it—or even use it as an input\
    \ for another function.\n\n```python\ndef average(*args):\n    return sum(args)/len(args)\n\
    \navg = average(1, 2, 3)\nprint(avg)\n# 2.0\n```\n\n*Listing 7-14: Positive example\
    \ of homogeneous input/output mapping*\n\nSure, some programs filter from one\
    \ category to another—for example, writing a file to the standard output or translating\
    \ English to Spanish. But following the principle of creating programs that do\
    \ one thing well (see Unix Principle 1), these programs should do nothing else.\
    \ This is the gold standard of writing intuitive and natural programs—design them\
    \ as filters!\n\n## 10. Worse is Better\n\nThis principle suggests that developing\
    \ code with less functionality is often the better approach in practice. When\
    \ resources are limited, it's better to release a worse product and be first on\
    \ the market than strive continually to make it better before you can release\
    \ it. This principle, conceived by list processing (LISP) developer Richard Gabriel\
    \ in the late eighties, is similar to the MVP principle from Chapter 3. Don't\
    \ take this contra-intuitive principle too literally. Worse is not better from\
    \ a qualitative perspective. If you had infinite time and resources, it would\
    \ be best always to make the program perfect in all instances. However, in a world\
    \ with limited resources, releasing something worse will often be more efficient.\
    \ For instance, a crude and straightforward solution to a problem gives you a\
    \ first-mover advantage, attracts quick feedback from the early adopters, and\
    \ gains momentum and attention early in the software development process. Many\
    \ practitioners argue that a second-mover must invest far more energy and resources\
    \ to create a far superior product that’s able to pull users away from the first-mover.\n\
    \n## 11. Clean Code is Better Than Clever Code\n\nI slightly modified the original\
    \ principle in the Unix philosophy, *clarity is better than cleverness*, first\
    \ to focus the principle on programming code and, second, to align it with the\
    \ principles you’ve already learned: how to *write clean code* (see Chapter 4).\n\
    \nThis principle highlights the trade-off between clean and clever code: clever\
    \ code shouldn’t come at the cost of simplicity.\n\nFor example, have a look at\
    \ the simple bubble sort algorithm in Listing 7-15. A bubble sort algorithm sorts\
    \ a list by going through it iteratively and switching the position of any two\
    \ adjacent elements that aren’t sorted: the smaller element goes to the left,\
    \ and the larger element goes to the right. Each time that happens, the list becomes\
    \ a bit more sorted.\n\n```python\ndef bubblesort(l):\n    for boundary in range(len(l)-1,\
    \ 0, -1):\n        for i in range(boundary):\n            if l[i] > l[i+1]:\n\
    \                l[i], l[i+1] = l[i+1], l[i]\n    return l\n\nl = [5, 3, 4, 1,\
    \ 2, 0]\nprint(bubblesort(l))\n# [0, 1, 2, 3, 4, 5]\n```\n\nListing 7-15: Bubble\
    \ sort algorithm in Python\n\nThe algorithm in Listing 7-15 is readable and clear,\
    \ and it achieves the goal and doesn’t contain unnecessary code.\n\nNow, suppose\
    \ your bright colleague argues that you could shorten the code using *conditional\
    \ assignments* to express the if statement with one fewer line of code (see Listing\
    \ 7-16).\n\n```python\ndef bubblesort_clever(l):\n    for boundary in range(len(l)-1,\
    \ 0, -1):\n        for i in range(boundary):\n            l[i], l[i+1] = (l[i+1],\
    \ l[i]) if l[i] > l[i+1] else (l[i], l[i+1])\n    return l\n\nprint(bubblesort_clever(l))\n\
    # [0, 1, 2, 3, 4, 5]\n```\n\nListing 7-16: “Clever” bubble sort algorithm in Python\n\
    \nThe trick doesn’t improve the code but does reduce readability and clarity.\
    \ Conditional assignment features may be clever, but using them comes at the cost\
    \ of expressing your ideas with clean code. For more tips on how to write clean\
    \ code, please refer to [Chapter 4](#).\n\n## 12. Design Programs to Connect With\
    \ Other Programs\n\nYour programs do not live in isolation. A program is called\
    \ to perform a task, either by a human being or by another program. You therefore\
    \ need to design the API to work with the outside world—users or other programs.\
    \ By adhering to Unix Principle 9, *make any program a filter*, which says to\
    \ ensure the input/output mapping is intuitive, you’re already designing connected\
    \ programs rather than making them live in isolation. The great programmer is\
    \ as much an architect as a craftsman. They create new programs as a unique combination\
    \ of old and new functions and other people’s programs. As a result, interfaces\
    \ are able to be front and center of the development cycle.\n\n## 13. Make Your\
    \ Code Robust\n\nA codebase is *robust* if it cannot be easily broken. There are\
    \ two perspectives on code robustness: the programmer’s view and the user’s view.\n\
    \nAs the programmer, you could potentially break code by modifying it. A codebase\
    \ is therefore *robust against change* if even a careless programmer can work\
    \ on the codebase without being able to destroy its functionality easily. Say\
    \ you have a big, monolithic code block, and every programmer in your organization\
    \ has *edit access* to that whole thing. Any small change could break the whole\
    \ thing. Now, compare this to software organizations like Netflix or Google, where\
    \ every change has to go through multiple approval levels before being deployed\
    \ in the real world; changes are thoroughly tested, so deployed code is protected\
    \ against breaking changes. By adding layers of protection, Google and Netflix\
    \ have made their code more robust compared to the fragile, monolithic codebase\
    \ scenario.\n\nOne way to accomplish codebase robustness is to control access\
    \ rights so that individual developers are not able to damage the application\
    \ without verifying from at least one additional person that the change is more\
    \ likely to add value than damage the code. The process may come at a price of\
    \ agility, but the price is worth paying if you’re not a one-person startup. We’ve\
    \ already seen other ways to ensure code robustness throughout the book: small\
    \ is beautiful, create functions that do one thing well, use test-driven development,\
    \ keep things simple. A few other easily applied techniques are the following:\n\
    \n- Use versioning systems such as Git so that you can recover previous versions\
    \ of your code.\n- Back up your application data regularly to make it recoverable\
    \ (data is not part of a versioning system)."
  mdcn: "## 9. 让每个程序都成为过滤器\n\n有充分的理由认为，每个程序本身就是一个过滤器。过滤器使用特定的过滤机制将输入转换为输出。这使我们能够轻松地将多个程序组合在一起，将一个程序的输出作为另一个程序的输入。这显著提高了代码的可重用性。例如，通常不建议在函数内部直接打印计算结果——相反，更好的做法是让程序返回一个字符串，然后可以将其打印出来、写入文件或用作另一个程序的输入。\n\
    \n例如，一个对列表进行排序的程序可以被视为一个过滤器，它将未排序的元素过滤成有序的排列，如清单7-12所示。\n\n```python\ndef insert_sort(lst):\n\
    \    # Check if the list is empty\n    if not lst:\n        return []\n\n    #\
    \ Start with sorted 1-element list\n    new = [lst[0]]\n\n    # Insert each remaining\
    \ element\n    for x in lst[1:]:\n        i = 0\n        while i<len(new) and\
    \ x>new[i]:\n            i = i + 1\n        new.insert(i, x)\n\n    return new\n\
    \nprint(insert_sort([42, 11, 44, 33, 1]))\nprint(insert_sort([0, 0, 0, 1]))\n\
    print(insert_sort([4, 3, 2, 1]))\n```\n\n清单7-12：这个插入排序算法将一个未排序的列表过滤成一个有序的列表。\n\
    \n该算法创建一个新列表，并将每个元素插入到其左侧所有元素都小于该插入元素的位置。该函数使用一个复杂的过滤器来改变元素的顺序，将输入列表转换为排序后的输出列表。\n\
    \n如果任何程序本身就是一个过滤器，你就应该通过使用直观的输入/输出映射来设计它。接下来我将解释这一点。\n\n过滤器的黄金标准是使用*同构*的输入/输出映射，即一种类型的输入映射到相同类型的输出。例如，如果有人用英语和你交谈，他们期望你用英语回应——而不是用另一种语言。同样，如果一个函数接受一个输入参数，期望的输出就是函数的返回值。如果一个程序从文件读取，期望的输出就是一个文件。如果一个程序从标准输入读取输入，它应该将程序输出写入标准输出。你明白了：设计过滤器最直观的方式是将数据保持在同一类别中。\n\
    \n清单7-13展示了一个使用*异构*输入/输出映射的反面例子，我们构建了一个`average()`函数，它将输入参数转换为它们的平均值——但`average()`没有返回平均值，而是将结果打印到shell。\n\
    \n```python\ndef average(*args):\n    print(sum(args)/len(args))\n\naverage(1,\
    \ 2, 3)\n# 2.0\n```\n\n*清单7-13：异构输入/输出映射的反面例子*\n\n一个更好的方法，如清单7-14所示，让函数`average()`返回平均值（同构输入/输出映射），然后你可以在单独的函数调用中使用`print()`函数将其打印到标准输出。这样更好，因为它允许你，例如，将输出写入文件而不是打印出来——甚至将其用作另一个函数的输入。\n\
    \n```python\ndef average(*args):\n    return sum(args)/len(args)\n\navg = average(1,\
    \ 2, 3)\nprint(avg)\n# 2.0\n```\n\n*清单7-14：同构输入/输出映射的正面例子*\n\n当然，有些程序会从一个类别过滤到另一个类别——例如，将文件写入标准输出或将英语翻译成西班牙语。但是，遵循创建只做一件事的程序的原则（参见Unix原则1），这些程序应该只做这一件事。这是编写直观且自然程序的黄金标准——将它们设计为过滤器！\n\
    \n## 10. 更差即更好\n\n这个原则表明，在实践中，开发功能较少的代码往往是更好的方法。当资源有限时，发布一个较差的产品并率先占领市场，比在发布前不断努力使其变得更好要好。这个原则由列表处理（LISP）开发者Richard\
    \ Gabriel在八十年代末提出，与第3章的MVP原则类似。不要从字面上理解这个反直觉的原则。从质量角度来看，更差并不意味着更好。如果你有无限的时间和资源，最好总是让程序在所有情况下都完美。然而，在资源有限的世界里，发布一些较差的东西通常会更有效率。例如，一个粗糙而直接的问题解决方案能给你带来先发优势，吸引早期用户的快速反馈，并在软件开发过程的早期获得动力和关注。许多从业者认为，后来者必须投入更多的精力和资源来创造一个远超前者的产品，才能将用户从先驱者那里吸引过来。\n\
    \n## 11. 整洁的代码优于聪明的代码\n\n我稍微修改了Unix哲学中的原始原则*清晰优于聪明*，首先是为了将原则聚焦于编程代码，其次是为了与你已经学到的原则保持一致：如何*编写整洁的代码*（参见第4章）。\n\
    \n这个原则强调了整洁代码与聪明代码之间的权衡：聪明的代码不应以牺牲简洁性为代价。\n\n例如，看看清单7-15中的简单冒泡排序算法。冒泡排序算法通过迭代遍历列表并交换任何两个未排序的相邻元素的位置来对列表进行排序：较小的元素移到左边，较大的元素移到右边。每次发生这种情况，列表就变得更有序一些。\n\
    \n```python\ndef bubblesort(l):\n    for boundary in range(len(l)-1, 0, -1):\n\
    \        for i in range(boundary):\n            if l[i] > l[i+1]:\n          \
    \      l[i], l[i+1] = l[i+1], l[i]\n    return l\n\nl = [5, 3, 4, 1, 2, 0]\nprint(bubblesort(l))\n\
    # [0, 1, 2, 3, 4, 5]\n```\n\n清单7-15：Python中的冒泡排序算法\n\n清单7-15中的算法可读且清晰，它实现了目标，并且不包含不必要的代码。\n\
    \n现在，假设你聪明的同事认为你可以使用*条件赋值*来缩短代码，用少一行代码来表达if语句（参见清单7-16）。\n\n```python\ndef bubblesort_clever(l):\n\
    \    for boundary in range(len(l)-1, 0, -1):\n        for i in range(boundary):\n\
    \            l[i], l[i+1] = (l[i+1], l[i]) if l[i] > l[i+1] else (l[i], l[i+1])\n\
    \    return l\n\nprint(bubblesort_clever(l))\n# [0, 1, 2, 3, 4, 5]\n```\n\n清单7-16：Python中的“聪明”冒泡排序算法\n\
    \n这个技巧并没有改进代码，反而降低了可读性和清晰度。条件赋值功能可能很聪明，但使用它们是以用整洁代码表达你的想法为代价的。有关如何编写整洁代码的更多提示，请参阅[第4章](#)。\n\
    \n## 12. 设计程序以与其他程序连接\n\n你的程序不是孤立存在的。一个程序被调用来执行任务，无论是由人还是由另一个程序调用。因此，你需要设计API以与外部世界——用户或其他程序——协同工作。通过遵守Unix原则9*让任何程序都成为过滤器*，该原则要求确保输入/输出映射是直观的，你已经在设计相互连接的程序，而不是让它们孤立存在。优秀的程序员既是建筑师也是工匠。他们将旧功能、新功能以及他人的程序作为独特的组合来创建新程序。因此，接口能够成为开发周期的核心。\n\
    \n## 13. 让你的代码健壮\n\n如果一个代码库不容易被破坏，那么它就是*健壮的*。关于代码健壮性有两个视角：程序员的视角和用户的视角。\n\n作为程序员，你可能会通过修改代码来破坏它。因此，如果一个粗心的程序员在代码库上工作而不容易破坏其功能，那么这个代码库就是*对变更健壮的*。假设你有一个庞大的、单体的代码块，你组织中的每个程序员都有对该整体的*编辑权限*。任何小的改动都可能破坏整个东西。现在，将其与Netflix或Google这样的软件组织进行比较，在这些组织中，任何更改在部署到现实世界之前都必须经过多个审批级别；更改经过彻底测试，因此部署的代码受到保护，免受破坏性更改的影响。通过增加保护层，与脆弱的、单体的代码库场景相比，Google和Netflix使其代码更加健壮。\n\
    \n实现代码库健壮性的一种方法是控制访问权限，使单个开发人员无法在未经至少另一人验证更改更有可能增加价值而非损害代码的情况下损害应用程序。这个过程可能会以牺牲敏捷性为代价，但如果你不是一个人的初创公司，这个代价是值得付出的。我们已经在本书中看到了确保代码健壮性的其他方法：小即是美，创建只做一件事的函数，使用测试驱动开发，保持简单。还有一些其他易于应用的技术如下：\n\
    \n- 使用版本控制系统（如Git），以便你可以恢复代码的先前版本。\n- 定期备份应用程序数据，使其可恢复（数据不是版本控制系统的一部分）。"
