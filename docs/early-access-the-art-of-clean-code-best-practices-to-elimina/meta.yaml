    \ still wondering why simple is better than complex, go back to Chapter 1 about\
    \ the negative productivity effects that originate in high complexity."
- md: "## 3. Small is Beautiful\n\nRather than writing big code blocks, write small\
    \ functions and work as an architect brokering the interaction between those functions,\
    \ as exemplified in Figure 7-1. There are three main reasons to keep your program\
    \ small:\n\n**Reduce complexity.**\nCode is harder to comprehend as it gets longer.\
    \ This is a cognitive fact: your brain can keep track of only so many chunks of\
    \ information simultaneously. Too many pieces of information make it hard to see\
    \ the big picture. By going small and reducing the number of code lines in a function,\
    \ you *improve readability* and reduce the likelihood of injecting costly bugs\
    \ into your codebase.\n\n**Improve maintainability.**\nStructuring your code in\
    \ many small pieces of functionality makes it easier to maintain. Adding more\
    \ small functions is unlikely to incur side effects, whereas in a big, monolithic\
    \ code block, any changes you make can easily have unintended global effects,\
    \ especially if multiple programmers are working on the code at the same time.\n\
    \n**Improve testability.**\nMany modern software companies use *test-driven development*,\
    \ which involves using unit tests to stress-test inputs to each function and unit\
    \ and compare the outputs with the expected ones. This allows you to find and\
    \ isolate bugs. Unit tests are much more effective and easier to implement in\
    \ small code, where each function focuses on just one thing, so you know what\
    \ the expected result should be.\n\nRather than implementing an example of small\
    \ code in Python for this principle, Python itself is the best example. Any master\
    \ coder uses other people's code to improve their coding productivity. Millions\
    \ of developers have spent countless hours optimizing code that you can import\
    \ into your code in a split second. Python, like most other programming languages,\
    \ provides this functionality through libraries. Many of the less-frequently used\
    \ libraries don't ship with the default implementation and need to be explicitly\
    \ installed. By not providing all the libraries as built-in functionality, the\
    \ Python installation on your computer remains relatively small but doesn't sacrifice\
    \ the potential power of external libraries. On top of this, the libraries themselves\
    \ are relatively small—all of them focus on a restricted subset of functions.\
    \ Rather than one monolithic library to rule all problems, we have many small\
    \ libraries, each responsible for a small part of the picture. Small is beautiful.\n\
    \nEvery few years, new architectural patterns appear with the promise of breaking\
    \ up large, monolithic applications into beautiful, small applications to scale\
    \ up the software development cycle. Recent examples have been the Common Object\
    \ Request Broker Architecture (CORBA), service-oriented architecture (SOA), and\
    \ microservices. The idea of these is to break up a large software block into\
    \ a series of independently deployable components that can then be accessed by\
    \ multiple programs rather than just one. The hope is to accelerate the overall\
    \ progress in the software development space by sharing and building upon each\
    \ other's microservices.\n\nThe underlying driver of these trends is the idea\
    \ of writing modular and reusable code. By studying the ideas presented in this\
    \ chapter, you've prepared yourself to quickly and fundamentally understand these\
    \ and upcoming trends with the same direction toward modularity. It pays to stay\
    \ ahead of the curve by applying sound principles from the start.\n\n> NOTE: Diving\
    \ deeper into this exciting topic is beyond the scope this book, but I suggest\
    \ you check out this online resource about microservices from Martin Fowler at\
    \ https://martinfowler.com/articles/microservices.html.\n\n## 4. Build a Prototype\
    \ as Soon as Possible\n\nThe Unix team is a keen proponent of the principle we\
    \ discussed in Chapter 3, build an MVP. This allows you to avoid getting stuck\
    \ in the cycle of perfectionism, adding more and more features and exponentially\
    \ increasing complexity without need. If you work on large software applications\
    \ such as an operating system, you simply cannot afford to go down the route of\
    \ complexity!\n\nFigure 7-2 shows an example of an early app launch that's stuffed\
    \ itself full of unnecessary features, in defiance of the MVP principle.\n\nUnnecessary\
    \ features!\n\n![](img/8792d1c61415b2790e4dd6b390c6d60b_121_0.png)\n\nThe app\
    \ has features like interactive solution checking, puzzle voting, user statistics,\
    \ user management, premium functionality, and related videos, and even simple\
    \ features such as a logo. All of these are unnecessary for an initial launch\
    \ of the product. In fact, the MVP of the Finxter application should just be an\
    \ image of a simple code puzzle shared on social media. This is enough to validate\
    \ the hypothesis of user demand without spending years building the application.\
    \ *Fail early, fail often, fail forward.*\n\n## 5. Choose Portability Over Efficiency\n\
    \nPortability is the ability of a system or a program to be moved from one environment\
    \ to another and still function properly. One major advantage of software is its\
    \ portability: you can write a program on your computer, and millions of users\
    \ can run the same program on their computers without adapting it at all.\n\n\
    However, portability comes at the cost of efficiency. This *portability/efficiency\
    \ trade-off* is well documented in technical literature: you can reach higher\
    \ efficiency by tailoring software to just one type of environment, but this sacrifices\
    \ portability. *Virtualization* is a great example of this trade-off: by placing\
    \ an additional layer of software between a piece of software and the underlying\
    \ infrastructure on which the software runs, your program can run on almost any\
    \ *physical machine*. Additionally, a virtual machine can carry the current execution\
    \ state from one physical machine to another. This improves the portability of\
    \ the software. However, the added layer required for virtualization reduces the\
    \ runtime and memory efficiency because of the additional overhead of intermediating\
    \ between the programs and the physical machine.\n\nThe Unix philosophy advocates\
    \ choosing portability over efficiency; this makes sense since the operating system\
    \ is used by so many.\n\nBut the rule of thumb to prefer portability also applies\
    \ to the broader audience of software developers. Reducing portability means that\
    \ you reduce your application's value. Today, it is common to improve portability\
    \ radically—even at the costs of efficiency. Web-based applications are expected\
    \ to run on every computer with a browser, whether macOS, Windows, or Linux. Web\
    \ applications are also increasingly accessible, accommodating things like blindness,\
    \ even though it may be less efficient to host a website that facilitates accessibility.\
    \ Many resources are much more valuable than computing cycles: human lives, human\
    \ time, and other second-order consequences of computers.\n\nBut what does it\
    \ mean to program for portability, apart from these general considerations? In\
    \ Listing 7-4 we create a function that computes the average of the specified\
    \ arguments—the way we've written it, it's not optimized for portability.\n\n\
    ```python\nimport numpy as np\n\ndef calculate_average_age(*args):\n    a = np.array(args)\n\
    \    return np.average(a)\n\nprint(calculate_average_age(19, 20, 21))\n# 20.0\n\
    ```\n\n*Listing 7-4: Average function, not maximally portable*\n\nThis code is\
    \ not portable for two reasons. First, the function name `calculate_average_age()`\
    \ is not general enough to be usable in any other context, despite the fact that\
    \ it simply calculated an average. You might not think to use it, for example,\
    \ to calculate the average number of website visitors. Second, it uses a library\
    \ needlessly because you could easily calculate the average without any external\
    \ library (see Listing 7-5). It’s generally a great idea to use libraries, but\
    \ only if they add value. In this case, adding a library reduces portability because\
    \ the user may not have this library installed; plus, it incurs only little benefit\
    \ for efficiency (if at all).\n\nIn Listing 7-5 we recreate the function with\
    \ superior portability.\n\n```python\ndef average(*args):\n    return sum(args)\
    \ / len(args)\n\nprint(average(19, 20, 21))\n# 20.0\n```\n\n*Listing 7-5: Average\
    \ function, portable*\n\nWe rename the functions to be more general and do away\
    \ with the unnecessary import. Now you don’t have to worry if the library becomes\
    \ deprecated, and you can port the same code to your other projects.\n\n## 6.\
    \ Store Data in Flat Text Files\n\nThe Unix philosophy encourages the use of flat\
    \ text files for storing data. Flat text files are simple text or binary files\
    \ without advanced mechanisms to access the file content—unlike many more efficient\
    \ but also more complicated file formats used by, for example, the database community.\
    \ These are simple, human-readable data files. The common comma separated values\
    \ (CSV) format is an example of a flat file format, where each line relates to\
    \ one data entry (see Listing 7-6) and someone new to the data can glean some\
    \ understanding just by looking at it.\n\n| Property Number | Date | Brand | Model\
    \ | Color | Stolen | Stolen From | Status | Incident number | Agency |\n| :---\
    \ | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n| P13827 |\
    \ 01/06/2016 | HI POINT | 9MM | BLK | Stolen Locally | Vehicle | Recovered Locally\
    \ | B16-00694 | BPD |\n| P14174 | 01/15/2016 | JENNINGS J22 | | COM | Stolen Locally\
    \ | Residence | Not Recovered | B16-01892 | BPD |\n| P14377 | 01/24/2016 | CENTURY\
    \ ARMS | M92 | | Stolen Locally | Residence | Recovered Locally | B16-03125 |\
    \ BPD |\n| P14707 | 02/08/2016 | TAURUS | PT740 SLIM | | Stolen Locally | Residence\
    \ | Not Recovered | B16-05095 | BPD |\n| P15042 | 02/23/2016 | HIGHPOINT | CARBINE\
    \ | | Stolen Locally | Residence | Recovered Locally | B16-06990 | BPD |\n| P15043\
    \ | 02/23/2016 | RUGAR | | | Stolen Locally | Residence | Recovered Locally |\
    \ B16-06990 | BPD |\n| P15556 | 03/18/2016 | HENRY ARMS | .17 CALIBRE | | Stolen\
    \ Locally | Residence | Recovered Locally | B16-08308 | BPD |\n\n*Listing 7-6:\
    \ Data on stolen guns, from Data.gov, provided as a flat file format (CSV)*"
  mdcn: "## 3. 小即是美\n\n与其编写庞大的代码块，不如编写小型函数，并像架构师一样协调这些函数之间的交互，如图7-1所示。保持程序小巧主要有三个原因：\n\
    \n**降低复杂性。**\n代码越长，理解起来就越困难。这是一个认知事实：你的大脑只能同时跟踪有限数量的信息块。过多的信息会让人难以把握全局。通过保持小巧并减少函数中的代码行数，你可以*提高可读性*，并降低在代码库中引入代价高昂的错误的可能性。\n\
    \n**提高可维护性。**\n将代码组织成许多小的功能模块，使其更易于维护。添加更多小函数不太可能产生副作用，而在一个庞大的、单体的代码块中，你所做的任何更改都很容易产生意想不到的全局影响，尤其是当多个程序员同时处理代码时。\n\
    \n**提高可测试性。**\n许多现代软件公司使用*测试驱动开发*，这涉及使用单元测试来对每个函数和单元的输入进行压力测试，并将输出与预期结果进行比较。这使你能够发现并隔离错误。单元测试在小型代码中更有效且更容易实现，因为每个函数只专注于一件事，所以你知道预期的结果应该是什么。\n\
    \n与其为这个原则用Python实现一个小代码示例，Python本身就是最好的例子。任何编程高手都会利用他人的代码来提高自己的编码效率。数百万开发者花费了无数小时优化代码，而你可以在瞬间将这些代码导入到你的代码中。Python和大多数其他编程语言一样，通过库来提供这种功能。许多不常用的库并不包含在默认实现中，需要显式安装。通过不将所有库作为内置功能提供，你计算机上的Python安装保持相对小巧，但又不牺牲外部库的潜在能力。除此之外，库本身也相对小巧——它们都专注于一个有限的功能子集。我们不是用一个庞大的库来解决所有问题，而是有许多小库，每个库负责图景的一小部分。小即是美。\n\
    \n每隔几年，新的架构模式就会出现，承诺将大型、单体的应用程序分解成美丽的小型应用程序，以扩展软件开发生命周期。最近的例子包括公共对象请求代理体系结构（CORBA）、面向服务的体系结构（SOA）和微服务。这些模式的思想是将一个大型软件块分解成一系列可独立部署的组件，然后可以被多个程序访问，而不仅仅是一个程序。其希望是通过共享和构建彼此的微服务来加速软件开发领域的整体进步。\n\
    \n这些趋势的底层驱动力是编写模块化和可重用代码的思想。通过学习本章介绍的思想，你已经准备好快速而根本地理解这些以及未来具有相同模块化方向的趋势。从一开始就应用健全的原则，有助于你领先一步。\n\
    \n> 注意：深入探讨这个激动人心的话题超出了本书的范围，但我建议你查看Martin Fowler关于微服务的在线资源：https://martinfowler.com/articles/microservices.html。\n\
    \n## 4. 尽快构建原型\n\nUnix团队是我们在第3章讨论的原则——构建MVP（最小可行产品）——的坚定支持者。这使你能够避免陷入完美主义的循环，不必要地添加越来越多的功能并指数级地增加复杂性。如果你正在开发大型软件应用程序，比如操作系统，你根本无法承受走向复杂化的道路！\n\
    \n图7-2展示了一个早期应用发布的例子，它违背了MVP原则，塞满了不必要的功能。\n\n不必要的功能！\n\n![](img/8792d1c61415b2790e4dd6b390c6d60b_121_0.png)\n\
    \n该应用具有交互式解决方案检查、拼图投票、用户统计、用户管理、高级功能、相关视频等功能，甚至还有像标志这样的简单功能。所有这些对于产品的初始发布都是不必要的。事实上，Finxter应用的MVP应该只是一个在社交媒体上分享的简单代码拼图图片。这足以验证用户需求的假设，而无需花费数年时间构建应用程序。*尽早失败，经常失败，向前失败。*\n\
    \n## 5. 选择可移植性而非效率\n\n可移植性是系统或程序能够从一个环境移动到另一个环境并仍然正常工作的能力。软件的一个主要优势是其可移植性：你可以在你的计算机上编写一个程序，数百万用户可以在他们的计算机上运行同一个程序，而完全不需要进行适配。\n\
    \n然而，可移植性是以效率为代价的。这种*可移植性/效率权衡*在技术文献中有充分记载：通过将软件定制为仅适用于一种环境，你可以达到更高的效率，但这牺牲了可移植性。*虚拟化*是这种权衡的一个很好的例子：通过在软件和软件运行的底层基础设施之间放置一个额外的软件层，你的程序几乎可以在任何*物理机器*上运行。此外，虚拟机可以将当前执行状态从一台物理机器携带到另一台物理机器。这提高了软件的可移植性。然而，虚拟化所需的额外层由于在程序和物理机器之间进行中介的额外开销，降低了运行时和内存效率。\n\
    \nUnix哲学倡导选择可移植性而非效率；这是有道理的，因为操作系统被如此多的人使用。\n\n但倾向于可移植性的经验法则也适用于更广泛的软件开发者群体。降低可移植性意味着你降低了应用程序的价值。如今，彻底提高可移植性——即使以效率为代价——是很常见的。基于Web的应用程序被期望在每台装有浏览器的计算机上运行，无论是macOS、Windows还是Linux。Web应用程序也越来越易于访问，能够适应诸如失明等情况，尽管托管一个促进无障碍访问的网站可能效率较低。许多资源比计算周期更有价值：人类生命、人类时间以及计算机的其他二阶后果。\n\
    \n但是，除了这些一般性考虑之外，为可移植性编程意味着什么？在清单7-4中，我们创建了一个计算指定参数平均值的函数——按照我们的写法，它没有针对可移植性进行优化。\n\
    \n```python\nimport numpy as np\n\ndef calculate_average_age(*args):\n    a =\
    \ np.array(args)\n    return np.average(a)\n\nprint(calculate_average_age(19,\
    \ 20, 21))\n# 20.0\n```\n\n*清单7-4：平均值函数，未最大化可移植性*\n\n这段代码不可移植有两个原因。首先，函数名`calculate_average_age()`不够通用，无法在任何其他上下文中使用，尽管它只是计算了一个平均值。例如，你可能不会想到用它来计算网站访问者的平均数量。其次，它不必要地使用了一个库，因为你可以轻松地在不使用任何外部库的情况下计算平均值（见清单7-5）。使用库通常是个好主意，但前提是它们能增加价值。在这种情况下，添加一个库会降低可移植性，因为用户可能没有安装这个库；而且，它带来的效率收益很小（如果有的话）。\n\
    \n在清单7-5中，我们重新创建了具有更好可移植性的函数。\n\n```python\ndef average(*args):\n    return sum(args)\
    \ / len(args)\n\nprint(average(19, 20, 21))\n# 20.0\n```\n\n*清单7-5：平均值函数，可移植*\n\
    \n我们将函数重命名为更通用的名称，并去掉了不必要的导入。现在你不必担心库是否会被弃用，并且可以将相同的代码移植到你的其他项目中。\n\n## 6. 将数据存储在纯文本文件中\n\
    \nUnix哲学鼓励使用纯文本文件来存储数据。纯文本文件是简单的文本或二进制文件，没有高级的文件内容访问机制——不像数据库社区使用的许多更高效但也更复杂的文件格式。这些是简单的、人类可读的数据文件。常见的逗号分隔值（CSV）格式就是纯文件格式的一个例子，其中每一行对应一个数据条目（见清单7-6），数据新手只需看一眼就能获得一些理解。\n\
    \n| 财产编号 | 日期 | 品牌 | 型号 | 颜色 | 被盗 | 被盗自 | 状态 | 事件编号 | 机构 |\n| :--- | :--- | :---\
    \ | :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n| P13827 | 01/06/2016 |\
    \ HI POINT | 9MM | BLK | 本地被盗 | 车辆 | 本地找回 | B16-00694 | BPD |\n| P14174 | 01/15/2016\
    \ | JENNINGS J22 | | COM | 本地被盗 | 住所 | 未找回 | B16-01892 | BPD |\n| P14377 | 01/24/2016\
    \ | CENTURY ARMS | M92 | | 本地被盗 | 住所 | 本地找回 | B16-03125 | BPD |\n| P14707 | 02/08/2016\
    \ | TAURUS | PT740 SLIM | | 本地被盗 | 住所 | 未找回 | B16-05095 | BPD |\n| P15042 | 02/23/2016\
    \ | HIGHPOINT | CARBINE | | 本地被盗 | 住所 | 本地找回 | B16-06990 | BPD |\n| P15043 | 02/23/2016\
    \ | RUGAR | | | 本地被盗 | 住所 | 本地找回 | B16-06990 | BPD |\n| P15556 | 03/18/2016 |\
    \ HENRY ARMS | .17 CALIBRE | | 本地被盗 | 住所 | 本地找回 | B16-08308 | BPD |\n\n*清单7-6：被盗枪支数据，来自Data.gov，以纯文件格式（CSV）提供*"
