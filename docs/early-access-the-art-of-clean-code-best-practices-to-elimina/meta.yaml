    # Pareto is Fractal


    The Pareto distribution is fractal. If you zoom in, observing only a part of the
    whole distribution, there’s another Pareto distribution! This works as long as
    the data is not too sparse; in that case, it loses its fractal nature. A single
    data point, for example, cannot be considered a Pareto distribution. Let’s look
    at this property in Figure 2-12.


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_45_0.png)


    In the center of Figure 2-12 is the Pareto distribution from Figure 2-1. I used
