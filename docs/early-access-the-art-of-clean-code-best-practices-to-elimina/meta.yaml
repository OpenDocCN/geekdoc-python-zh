  md: '# Principle 11: Test


    Test-driven development is an integral part of modern software development. No
    matter how skilled you are, you will make mistakes in your code. In order to catch
    them, you’ll need to run periodic tests, or build test-driven code in the first
    place. Every great software company employs multiple levels of testing before
    it ships the final product to the public, since it’s far better to discover errors
    internally than to learn about them from unhappy users.


    While there are no limitations to what types of tests you can perform to improve
    your software applications, these are the most common types:


    **Unit Tests** With unit tests, you write a separate application to check the
    correct input/output relationship for different inputs of each function in the
    application. The unit tests are usually applied in regular intervals—for example,
    each time a new software version is released. This ensures a certain degree of
    progress by reducing the likelihood that a software change causes previously stable
    features to suddenly fail.


    **User Acceptance Tests** These allow people in your target market to use your
    application in a controlled environment while you observe their behavior. You
    then ask them how they liked the application and how to improve it. These tests
    are usually deployed in the final phase of project development after extensive
    testing within the organization.


    **Smoke Tests** Smoke tests are rough tests designed to try to fail the application
    under development before the teams building the software give the application
    to the testing team. In other words, smoke tests are often deployed by the application-building
    team for quality assurance before handing it to the testing teams. When the app
    passes the smoke test, it’s ready for the next round of testing.


    **Performance Tests** Performance tests aim to show whether the application meets
    or even exceeds its users’ performance requirements rather than testing the actual
    functionality. For instance, before Netflix releases a new feature, it must test
    its website for page-loading time. If the new feature slows down the frontend
    too much, Netflix doesn’t release it, proactively avoiding a negative user experience.


    **Scalability Tests** If your application becomes successful, you may have to
    handle 1000 requests per minute instead of the original 2 requests. A scalability
    test will show whether your application is scalable enough to handle that. Note
    that a performant application isn’t necessarily scalable and vice versa. For instance,
    a speed boat is very performant but doesn’t scale to thousands of people at a
    time!


    Testing and refactoring will often reduce complexity and the number of errors
    in your code. However, be careful not to over-engineer (see *Principle 14*)—you
    need to test scenarios that can occur only in the real world. For example, testing
    whether the Netflix application can handle 100 billion streaming devices is unnecessary
    considering there are only 7 billion potential viewers on the planet.'
