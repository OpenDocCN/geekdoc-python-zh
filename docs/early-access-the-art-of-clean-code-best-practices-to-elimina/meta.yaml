    \nThe single responsibility principle means that every function should have one\
    \ main task. It’s better to use many small functions than one big function accomplishing\
    \ everything at the same time. The encapsulation of functionality reduces the\
    \ overall code complexity.\n\nAs a rule of thumb, every class and every function\
    \ should have only one responsibility. Robert C. Martin, the inventor of this\
    \ principle, defines a responsibility as a *reason to change*. His gold standard\
    \ when defining a class and a function, thus, is to focus them on a single responsibility\
    \ so that only the programmer who needs this single responsibility changed would\
