    # Success Metrics


    Let''s say you want to optimize for income. How can you move to the left in the
    Pareto curve? We''re leaving exact science behind here, because you need to find
    the reasons some people succeed in your specific industry and develop actionable
    *success metrics* you can control and implement. We define the term *success metric*
    as measurements of behavior that lead to more success in your field. The tricky
    thing is that the most crucial success metrics are different in most fields. The
    80/20 principle also applies to success metrics: some success metrics have a dominating
    impact on your performance in a field, while others barely matter at all.


    For example, when working as a doctoral researcher, I soon realized that success
    was all about getting cited by other researchers. The more citations you have
    as a researcher, the more credibility, visibility, and opportunities you''ll have.
    However, *increasing the number of citations* is hardly an actionable success
    metric that you can optimize daily. The number of citations is a *lagging indicator*,
    because it is based on actions you took in the past. The problem with lagging
    indicators is that they record only the consequence of past actions. They don''t
    tell you the right actions to take daily for success.


    To obtain a measure for doing the right actions, the notion of leading indicators
    was introduced. A *leading indicator* is a metric that predicts a change in the
    lagging indicator before it occurs. If you do more of the leading indicator, the
    lagging indicator is likely to improve as a result. As a researcher, then, you''ll
    receive more citations (lagging indicator) by publishing more high-class research
    papers (leading indicator). That means writing high-class papers is the most important
    activity for most scientists, not secondary activities such as preparing presentations,
    organizing, teaching, or drinking coffee. The success metric for researchers is
    therefore generating a maximal number of high-quality papers, as shown in Figure
    2-5.


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_37_0.png)'
  - '[PAGE 38]


    To push to the left in research, you must write more words today, publish your
    next high-class paper sooner, receive more citations faster, grow your scientific
    footprint, and become a more successful scientist. Roughly speaking, many different
    success metrics can serve as a proxy for “being successful in science.” For instance,
    when ordering them on a scale from lack to lead measures, you may get *number
    of citations*, *number of high-class papers written*, *number of total words written
    in your life*, and *number of words written today*.


    The 80/20 approach allows you to identify the activities on which you must focus.
    Doing more of the success metrics, preferably actionable lead measures, will increase
    your professional success, and that’s all that should matter. Spend less time
    on all the different tasks. Refuse to die the death of a thousand cuts. Be lazy
    with all activities but one: *writing more words per day*.


    Say you work 8 hours per day, and you spread your day into eight 1-hour activities.
    After completing the success metric exercise, you realize that you can skip two
    1-hour activities per day and complete four other activities in half the time
    by being less perfectionistic. You have saved 4 hours per day, but you still accomplish
    80 percent of your results. Now you can invest 2 hours into writing more words
    toward high-class papers per day. Within a few months, you’ll have submitted an
    extra paper, and over time, you’ll submit more papers than any of your colleagues.
    You work only 6 hours per day, and you generate imperfect quality in most of your
    work tasks. But you shine on where it matters: you submit more research papers
    than anyone else in your environment. As a result, you’ll soon be one of the top
    20 percent of researchers. You generate more with less.


    Instead of becoming a “Jack of all trades, master of none,” you gain expertise
    in the area that is most important to you. You heavily focus on the vital few
    and ignore the trivial many. You lead a less stressful life, but you enjoy more
    fruits from your invested labor, efforts, time, and money.


    # Focus and the Pareto Distribution


    A closely related topic I want to discuss is *focus*. We’ll discuss focus in many
    places in this book—for example, Chapter 10 discusses the power of focus in detail—but
    the 80/20 principle explains *why* focus is so powerful. Let’s dive into the argument!


    Consider the Pareto distribution in Figure 2-6 that shows the percentage improvement
    of moving toward the top of the distribution. Alice is the fifth most productive
    person in the organization. If she just overtakes one person in the organization,
    thereby becoming the fourth most productive person, she’d increase her output
    (salary) by 10 percent. One step further than that, and her output increases by
    an *additional* 20 percent. In a Pareto distribution, the growth per rank explodes
    exponentially, so even small increases in productivity can result in big increases
    in income. Increasing your productivity leads to superlinear improvements in your
    income, happiness, and joy at work. Some call this phenomenon “the winner takes
    all.”'
