    \    logistics.send_confirmation(customer)\n```\n\n*Listing 4-8: Comments as warnings*\n\
    \nYou can employ comments in many more useful ways; they are not only about applying\
    \ the standards correctly. Keep the principle to *code for humans* at the top\
    \ of your mind when writing comments, and you will be fine. As you read code from\
    \ experienced programmers, you’ll absorb the unspoken rules effectively and almost\
    \ automatically over time. Since you’re the expert on code you’ve written, helpful\
    \ comments give outsiders a glimpse into your thinking. Don’t miss out on sharing\
    \ your insights with other people!\n\n# **Principle 7: Avoid Unnecessary Comments**\n\
    \nThat said, not all comments help readers understand code better. In some cases,\
