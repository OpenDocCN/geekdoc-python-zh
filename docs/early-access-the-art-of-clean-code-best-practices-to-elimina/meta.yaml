  mdcn: "然而，你过早地为实现单元测试的完美覆盖而进行优化。这种做法价值甚微：它不仅拖慢了软件开发周期，还引入了不必要的复杂性。\n\n## 优化面向对象的世界构建\n\
    \n面向对象的方法常常会引入重大的不必要复杂性和过早的“概念”优化。假设你想用一个复杂的类层次结构来建模你的应用世界。你编写了一个关于赛车的小游戏。你创建了一个类层次结构，其中保时捷类继承自汽车类，而汽车类又继承自车辆类。毕竟，每辆保时捷都是一辆汽车，每辆汽车都是一辆交通工具。然而，这种多级类层次结构会导致你的代码库变得复杂，未来的程序员会难以理解你的代码功能。在许多情况下，这类堆叠的继承结构会增加不必要的复杂性。通过运用最小可行产品（MVP）的理念来避免它们：从最简单的模型开始，只在需要时才进行扩展。不要为了建模一个比应用实际需要更详细的世界而优化你的代码。\n\
    \n## 过早优化：一个故事\n\n既然你已经大致了解了过早优化可能带来的问题，让我们编写一个小型的 Python 应用程序，并实时观察过早优化如何为一个不需要优雅扩展到数千用户的小型交易跟踪应用程序的代码增加不必要的复杂性。\n\
    \n爱丽丝、鲍勃和卡尔每周五晚上玩扑克。几轮之后，他们决定需要开发一个系统来跟踪每个玩家在给定游戏之夜后所欠的钱。爱丽丝是一位充满热情的程序员，她创建了一个跟踪玩家余额的小应用程序，如代码清单\
