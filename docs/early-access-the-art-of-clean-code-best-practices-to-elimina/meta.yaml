  mdcn: "你可以轻松地共享纯文本文件，在任何文本编辑器中打开它们，并手动进行修改。然而，这种便利是以效率为代价的：一种专为特定目的设计的数据格式可以更高效地存储和读取数据。例如，数据库在磁盘上使用自己的数据文件，这些文件采用优化措施，如详细的索引和压缩方案来表示数据。如果你打开它们，你会看不懂。这些优化使得程序能够以比通用纯文本文件更少的内存消耗和更低的开销来读取数据。在纯文本文件中，系统必须扫描整个文件才能读取特定的一行。Web\
    \ 应用程序也需要更高效的优化数据表示，以便用户能够以低延迟快速访问，因此它们很少使用纯文本表示和数据库。\n\n然而，你应该只在确定需要时才使用优化的数据表示——例如，如果你创建一个对性能高度敏感的应用程序，比如能在毫秒内为给定用户查询找到最相关网页文档的\
    \ Google 搜索引擎！对于许多较小的应用程序，例如从包含 10,000 条记录的真实世界数据集训练机器学习模型，CSV 格式是推荐的数据存储方式。使用具有专用格式的数据库会降低可移植性并增加不必要的复杂性。\n\
    \n清单 7-7 给出了一个使用 Python（数据科学和机器学习应用中最流行的语言之一）的示例，说明了在何种情况下纯文本格式更可取。这里我们想要对一个图像（人脸）数据集执行数据分析任务，因此我们从一个纯文本\
