  md: '# # 7


    # ## DO ONE THING WELL AND OTHER UNIX PRINCIPLES


    > > This is the Unix philosophy: Write programs that do one thing and do it well.
    Write programs to work together. Write programs to handle text streams, because
    that is a universal interface. [...]

    > —Douglas McIlroy


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_114_0.png)


    The prevailing philosophy of the Unix operating system is simple: do one thing
    well. This means, for example, that it’s generally better to create a function
    or module that can solve one problem, reliably and efficiently, rather than trying
    to tackle multiple problems at the same time. Later in this chapter, you’ll see
    some Python code examples of “do one thing well” in action and learn how the Unix
    philosophy applies to programming. I’ll then present the top principles employed
    by some of the world’s most accomplished computer engineers in creating today’s
    operating systems. If you’re a software engineer, you’ll find much valuable advice
    on writing better code in your own projects.


    But first things first: What is Unix anyway, and why should you care?'
