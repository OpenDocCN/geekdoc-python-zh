  md: '![](img/8792d1c61415b2790e4dd6b390c6d60b_39_0.png)


    That’s why it doesn’t pay to spread your attention: *if you don’t focus, you participate
    in many Pareto distributions*. Consider Figure 2-7: Alice and Bob can each invest
    three units of learning efforts every day. Alice focuses on one thing: programming.
    She just spends her three units of effort in learning to code. Bob spreads his
    focus to multiple disciplines: one unit of time polishing his chess skills, one
    unit improving his programming skills, and one unit improving his political skills.
    He’s reached average skills and output in each of the three areas. But the Pareto
    distribution disproportionately rewards the top performers, so Alice collects
    more total output reward.


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_39_1.png)


    The disproportional rewards hold within each area, too. For instance, Bob may
    spend his time reading three general books (let’s call them'
