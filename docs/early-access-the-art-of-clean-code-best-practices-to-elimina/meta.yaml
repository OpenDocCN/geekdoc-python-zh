    and *omit needless code*.


    # Premature Optimization is the Root of All Evil


    Focus your optimization efforts where they matter. Premature optimization is the
    act of spending valuable resources on code optimizations that ultimately prove
    to be unnecessary. As Donald Knuth tells us, “Forget about small efficiencies,
    say about 97% of the time: premature optimization is the root of all evil.” In
    this chapter, I discussed my top six performance tuning tips: take metrics for
    comparisons, consider the 80/20 principle, invest in improving algorithms, apply
    the *less is more* principle, cache repeated results, and know when to stop—all
    of which could be summarized in a single word, *focus*.


    # Flow


    Flow is a state in which you’re completely involved in the task at hand—you’re
    focused and concentrated. Flow researcher Csikszentmihalyi laid out three conditions
