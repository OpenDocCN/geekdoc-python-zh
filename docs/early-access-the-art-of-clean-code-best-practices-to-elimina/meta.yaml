  mdcn: "## 原则三：为人类编写代码，而非机器\n\n你可能认为一段源代码的主要目的是定义机器应该做什么以及如何做。事实并非如此。像 Python 这样的编程语言，其唯一目的是帮助人类编写代码。编译器承担繁重的工作，将你的高级代码翻译成机器能理解的低级代码。是的，你的代码最终将由机器运行。但代码仍然主要由人类编写，在当今的软件开发流程中，代码在部署前很可能需要经过多层人类评判。首先，也是最重要的，你是在为人类编写代码，而不是为机器。\n\
    \n始终假设其他人会阅读你的源代码。想象一下，你转到一个新项目，而其他人必须接手你的代码库。有很多方法可以让他们工作更轻松，并最大限度地减少挫败感。首先，使用有意义的变量名，这样读者就能轻松理解某行代码的意图。清单\
    \ 4-1 展示了一个变量名选择不当的例子。\n\n```\nxxx = 10000\nyyy = 0.1\nzzz = 10\n\nfor iii in\
