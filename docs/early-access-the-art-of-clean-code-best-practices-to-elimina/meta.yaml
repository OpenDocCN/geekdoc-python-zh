  md: "During my time as a computer science researcher, a skilled student of mine\
    \ successfully applied for a job at Google. He told me that the Google headhunters\
    \ had criticized his code style because he added too many unnecessary comments.\
    \ These types of comments are another way expert coders can ascertain whether\
    \ you're a beginner, intermediate, or expert coder yourself. Issues in the code,\
    \ such as breaking style guides, being lazy or sloppy with comments, or writing\
    \ non-idiomatic code for a given programming language, are called *code smells*\
    \ that point to potential problems in the code, and expert coders can spot them\
    \ from miles away.\n\nHow do you know which comments to leave out? In most cases,\
    \ a comment is unnecessary if it is redundant. For example, if you've used meaningful\
    \ variable names, the code often becomes self-explanatory and doesn't require\
    \ line-level comments. Let's look at the code snippet with meaningful variable\
    \ names in Listing 4-9.\n\n```\ninvestments = 10000\nyearly_return = 0.1\nyears\
    \ = 10\n\nfor year in range(years):\n    print(investments * (1 + yearly_return)**year)\n\
    ```\n\n*Listing 4-9: Code snippet with meaningful variable names*\n\nIt's already\
    \ clear that the code calculates your cumulative investment return for 10 years,\
    \ assuming a 10-percent yield. For the sake of argument, let's add some unnecessary\
    \ comments in Listing 4-10.\n\n```\ninvestments = 10000 # your investments, change\
    \ if needed\nyearly_return = 0.1 # annual return (e.g., 0.1 --> 10%)\nyears =\
    \ 10 # number of years to compound\n\n# Go over each year\nfor year in range(years):\n\
    \    # Print value of your investment in current year\n    print(investments *\
    \ (1 + yearly_return)**year)\n```\n\n*Listing 4-10: Unnecessary comments*\n\n\
    All comments in Listing 4-10 are redundant. Some would have been useful if you'd\
