- md: "This is a better approach, because the class Person is now independent of the\
    \ class Coffee_Machine. The total number of dependencies is reduced. For a project\
    \ with hundreds of classes, reducing dependencies dramatically reduces the overall\
    \ complexity of your application. Here’s the danger in terms of growing complexity\
    \ for large applications: the number of potential dependencies grows superlinearly\
    \ with the number of objects. Roughly speaking, a superlinear curve grows faster\
    \ than a straight line with a constant slope. For example, doubling the number\
    \ of objects can easily quadruple the number of dependencies (which equals complexity).\
    \ However, the Law of Demeter can offset this trend by significantly reducing\
    \ the number of dependencies. If every object talks to only *k* other objects\
    \ and you have *n* objects, the total number of dependencies is bounded by *k*n*,\
    \ which is a linear relationship if *k* is a constant. Thus, the Law of Demeter\
    \ can mathematically help you gracefully scale your applications!\n\n## Principle\
    \ 14: You Ain’t Gonna Need It\n\nThis principle suggests that you should never\
    \ implement code if you only *suspect* that you’ll need to use it someday in the\
    \ future—because you ain’t gonna need it! Write code only if you’re 100-percent\
    \ sure it’s necessary. Code for today’s needs and not tomorrow’s. If in the future\
    \ you actually need the code you previously only suspected you needed, you can\
    \ still implement the feature then. But in the meantime, you’ve saved many unnecessary\
    \ lines of code.\n\nIt helps to think from first principles: the simplest and\
    \ cleanest code is the empty file. Now, go from there—what do you *need* to add\
    \ to that? In Chapter 3, you learned about the MVP: code that is stripped of features\
    \ to focus on the core functionality. If you minimize the number of features you\
    \ pursue, you’ll obtain cleaner and simpler code than you could ever attain through\
    \ refactoring methods or all other principles combined. Consider leaving out features\
    \ that provide relatively little value compared to others you could implement\
    \ instead. Opportunity costs are seldomly measured but are often significant.\
    \ You should really *need* a feature before you even consider implementing it.\n\
    \nAn implication of this is to avoid *overengineering*: creating a product that\
    \ is more performant and robust or contains more features than needed. It adds\
    \ unnecessary complexity, which should immediately ring your alarm bells.\n\n\
    For example, I’ve often encountered problems that could be solved within a few\
    \ minutes using a naive algorithmic approach but, like many programmers, I refused\
    \ to accept the minor limitations of these algorithms. Instead, I studied state-of-the-art\
    \ clustering algorithms to eke out a few percentage points of clustering performance\
    \ compared to the simple KMeans algorithm. These long-tail optimizations were\
    \ incredibly costly—I had to spend 80 percent of the time to obtain 20 percent\
    \ of the improvement. This would have been unavoidable if I’d *needed* that 20\
    \ percent and had no other way to get it, but in reality, I didn’t need to implement\
    \ fancy clustering algorithms. A typical case of overengineering!\n\nAlways go\
    \ for the low-hanging fruits first. Use naïve algorithms and straightforward methods\
    \ to establish a benchmark, then analyze which new feature and performance optimization\
    \ will yield superior results for the overall application. Think global, not local:\
    \ focus on the big picture (as per *Principle 1*) rather than on small, time-consuming\
    \ fixes.\n\n## Principle 15: Don’t Use Too Many Levels of Indentation\n\nMost\
    \ programming languages use text indentation to visualize the hierarchical structure\
    \ of potentially nested conditional blocks, function definitions, or code loops.\
    \ Overusing indentation, however, can decrease the readability of your code. Listing\
    \ 4-19 shows an example of a code snippet with too many levels of indentation,\
    \ which makes it hard to quickly understand.\n\n```\ndef if_confusion(x, y):\n\
    \    if x>y:\n        if x-5>0:\n            x = y\n            if y==y+y:\n \
    \               return \"A\"\n            else:\n                return \"B\"\n\
    \        elif x+y>0:\n            while x>y:\n                x = x-1\n      \
    \      while y>x:\n                y = y-1\n            if x==y:\n           \
    \     return \"E\"\n        else:\n            x = 2 * x\n            if x==y:\n\
    \                return \"F\"\n            else:\n                return \"G\"\
    \n    else:\n        if x-2>y-4:\n            x_old = x\n            x = y * y\n\
    \            y = 2 * x_old\n            if (x-4)**2>(y-7)**2:\n              \
    \  return \"C\"\n            else:\n                return \"D\"\n        else:\n\
    \            return \"H\"\n\nprint(if_confusion(2, 8))\n```\n\n*Listing 4-19:\
    \ Too many levels of nested code blocks*\n\nIf you now try to guess the output\
    \ of this code snippet, you’ll find it’s actually difficult to trace. The code\
    \ function if_confusion(x, y) performs relatively simple checks on variables x\
    \ and y. However, it’s easy to get lost in the different levels of indentation.\
    \ The code is not clean at all.\nListing 4-20 shows how to write the same code\
    \ more cleanly and simply.\n\n```\ndef if_confusion(x,y):\n    if x>y and x>5\
    \ and y==0:\n        return \"A\"\n    if x>y and x>5:\n        return \"B\"\n\
    \    if x>y and x+y>0:\n        return \"E\"\n    if x>y and 2*x==y:\n       \
    \ return \"F\"\n    if x>y:\n        return \"G\"\n    if x>y-2 and (y*y-4)**2>(2*x-7)**2:\n\
    \        return \"C\"\n    if x>y-2:\n        return \"D\"\n    return \"H\"\n\
    ```\n\n*Listing 4-20: Fewer levels of nested code blocks*\n\nIn Listing 4-20,\
    \ we reduced indentation and nesting. You can now go over all checks and see what\
    \ applies first to your two arguments x and y. Most coders will enjoy reading\
    \ flat code much more than reading highly nested code—even if it comes at the\
    \ expense of redundant checks; here, for example, x>y is checked multiple times.\n\
    \n## Principle 16: Use Metrics\n\nUse code quality metrics to track the complexity\
    \ of your code over time. The ultimate, if informal, metric is known as the number\
    \ of WTFs per minute, intended to measure your code readers’ frustration. The\
    \ results will be low for clean and simple code and high for dirty, confusing\
    \ code.\nAs a proxy for this hard-to-quantify standard, you can use established\
    \ metrics such as the NPath complexity or cyclomatic complexity that have been\
    \ shown in Chapter 1, “How Complexity Harms Your Productivity.” For most IDEs,\
    \ many online tools and plugins will automatically calculate the complexity as\
    \ you write your source code, such as CyclomaticComplexity, which you can find\
    \ by searching in the plugins section of JetBrains at https://plugins.jetbrains.com/.\
    \ In my experience, the actual measure of complexity used is less important than\
    \ being aware of the fact that you need to weed out complexity wherever you can.\
    \ I highly recommend using these tools to help you write cleaner and simpler code.\
    \ The return on your invested time will be phenomenal.\n\nThe Art of Clean Code\
    \ (Early Access) © 2022 by Christian Mayer\n\n## Principle 17: Boy Scout Rule\
    \ and Refactoring\n\nThe Boy Scout Rule is simple: *leave the campground cleaner\
    \ than you found it.* It’s a great rule to live and code by. Get into the habit\
    \ of cleaning up every piece of code you encounter. This will not only improve\
    \ the codebases you’re involved in and make your own life easier but also help\
    \ you develop the sharp eye of a master coder who can critically evaluate source\
    \ code quickly. As a bonus, it’ll help your team be more productive, and your\
    \ colleagues will be grateful for your value-oriented attitude. Note that this\
    \ shouldn’t violate the rule we stated earlier about avoiding premature optimization\
    \ (overengineering). Spending time to clean up your code to reduce complexity\
    \ is almost always efficient. Doing so will yield big dividends in reduced maintenance\
    \ overhead, bugs, and cognitive demands. Put succinctly, overengineering is likely\
    \ to *increase* complexity whereas cleaning up the code will *reduce* complexity.\n\
    \nThe process of improving your code is called *refactoring*. You could argue\
    \ that refactoring is the overall method comprising every principle we’ve discussed\
    \ here. As a great coder, you’ll incorporate many of the clean code principles\
    \ from the beginning. Even then, however, you’ll still need to occasionally refactor\
    \ your code to clean up any messes you’ve made. In particular, you should refactor\
    \ your code before releasing any new features to keep the code clean.\n\nThere\
    \ are many techniques for refactoring code. One is to explain your code to a colleague\
    \ or have them look it over in order to discover any poor decisions you’ve made\
    \ and had not noticed on your own. For example, you may have created two classes,\
    \ Cars and Trucks, because you expected your application would need to model both.\
    \ As you explain your code to your teammate, you realize that you don’t use the\
    \ class Trucks very often—and when you do, you use methods that already exist\
    \ in the Car class. Your colleague suggests creating a Vehicle class that handles\
    \ all cars and trucks. This allows you to get rid of many lines of code immediately.\
    \ This type of thinking can result in enormous improvements, since it will force\
    \ you to account for your decisions and explain your project from a bird’s-eye\
    \ view.\n\nIf you’re an introverted coder, you can also explain your code to a\
    \ rubber duck instead—a technique known as *rubber duck debugging*.\n\nBeyond\
    \ speaking to your colleagues (or your rubber duck), you can use the other clean\
    \ code principles listed here to quickly evaluate your code from time to time.\
    \ When you do, you’ll likely discover some tweaks you can apply quickly to greatly\
    \ reduce complexity by cleaning up your codebase. This integral part of your software\
    \ development process will improve your results significantly.\n\n## Conclusion\n\
    \nIn this chapter, you’ve learned 17 principles on how to write clean and simple\
    \ code. You’ve learned that clean code reduces complexity and increases your productivity\
    \ as well as the scalability and maintainability of your"
  mdcn: "这是一种更优的方法，因为`Person`类现在独立于`Coffee_Machine`类。依赖总数减少了。对于一个拥有数百个类的项目，减少依赖能显著降低应用程序的整体复杂性。以下是大型应用程序在复杂性增长方面的风险：潜在依赖的数量随对象数量呈超线性增长。粗略地说，超线性曲线比具有恒定斜率的直线增长得更快。例如，对象数量翻倍很容易导致依赖数量（等于复杂性）增加四倍。然而，迪米特法则可以通过显著减少依赖数量来抵消这种趋势。如果每个对象只与*k*个其他对象通信，并且你有*n*个对象，那么依赖总数将被限制在*k*n*以内，如果*k*是常数，这就是一种线性关系。因此，迪米特法则在数学上能帮助你优雅地扩展应用程序！\n\
    \n## 原则 14：你不会需要它\n\n该原则建议，如果你只是*怀疑*将来某天可能需要使用某段代码，就不应该实现它——因为你不会需要它！只有在百分之百确定必要时才编写代码。为今天的需求编码，而不是为明天。如果将来你确实需要之前只是怀疑需要的代码，你仍然可以那时再实现该功能。但与此同时，你已经节省了许多不必要的代码行。\n\
    \n从第一性原理思考会有所帮助：最简单、最干净的代码是空文件。那么，从那里开始——你*需要*添加什么？在第3章中，你了解了MVP：剥离了功能以专注于核心功能的代码。如果你最小化追求的功能数量，你将获得比通过重构方法或所有其他原则组合所能达到的更干净、更简单的代码。考虑省略那些相比其他可实现功能价值相对较小的功能。机会成本很少被衡量，但往往意义重大。在考虑实现某个功能之前，你真的应该*需要*它。\n\
    \n其含义之一是避免*过度工程化*：创建一个性能更高、更健壮或包含比所需更多功能的产品。这会增加不必要的复杂性，应立即引起你的警觉。\n\n例如，我经常遇到一些问题，使用简单的算法方法几分钟内就能解决，但像许多程序员一样，我拒绝接受这些算法的微小限制。相反，我研究了最先进的聚类算法，以比简单的KMeans算法多挤出几个百分点的聚类性能。这些长尾优化成本极高——我花了80%的时间才获得20%的改进。如果我*需要*那20%并且没有其他方法获得它，这将是不可避免的，但实际上，我并不需要实现花哨的聚类算法。一个典型的过度工程化案例！\n\
    \n始终优先选择唾手可得的成果。使用简单的算法和直接的方法建立基准，然后分析哪些新功能和性能优化能为整体应用带来更优的结果。全局思考，而非局部：关注大局（根据*原则1*），而不是耗时的小修补。\n\
