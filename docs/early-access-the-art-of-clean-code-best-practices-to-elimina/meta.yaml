  md: "# The Rise of Unix\n\nUnix is a design philosophy that inspired many of the\
    \ most popular operating systems today, including Linux and macOS. The family\
    \ of Unix operating systems emerged in the late 1970s when Bell Systems made the\
    \ source code of its technology open to the public. Since then, a multitude of\
    \ extensions and new versions has been developed by universities, individuals,\
    \ and corporations.\n\nToday, the trademarked Unix standard certifies that operating\
    \ systems meet specific quality requirements. Unix and Unix-like operating systems\
    \ have a major impact on computing. About 7 out of 10 web servers run on Linux\
    \ systems that use Unix as their base. Most supercomputers today run Unix-based\
    \ systems. Even the macOS is a registered Unix system.\n\nLinus Torvalds, Ken\
    \ Thompson, Brian Kernighan—the list of Unix developers and maintainers contains\
    \ the names of some of the world’s most impactful coders across the globe. You\
    \ would think there must be great organizational systems in place to allow programmers\
    \ all over the world to collaborate to build the massive ecosystem of Unix code\
    \ comprising millions of lines of code. And rightly so! The philosophy that enables\
    \ this scale of collaboration is the acronym DOTADIW (seriously)—or *do one thing\
    \ and do it well*. Whole books have been written about the Unix philosophy, so\
    \ here we’ll just focus on the most relevant ideas and use Python code snippets\
    \ to showcase some examples. To the best of my knowledge, no book has ever contextualized\
    \ the Unix principles for the Python programming language before. So, let’s get\
    \ started!\n\n# Philosophy Overview\n\nThe basic idea of the Unix philosophy is\
    \ to build simple, clear, concise, modular code that is easy to extend and maintain.\
    \ This can mean many different things—more on this later in the chapter—but the\
    \ goal is to allow many humans to work together on a codebase by prioritizing\
    \ readability over efficiency and favoring composability over monolithic design.\
    \ Monolithic applications are designed without modularity, meaning large parts\
    \ of the code logic cannot be reused, executed, or debugged without accessing\
    \ the overall application.\n\nSay you write a program that takes a uniform resource\
    \ locator (URL) and prints the HTML from this URL on the command line. Let’s call\
    \ this program `url_to_html()`. According to the Unix philosophy, this program\
    \ should do one thing well, and that one thing is to take the HTML from the URL\
    \ and print it to the shell (see Listing 7-1). That’s it.\n\n```\nimport urllib.request\n\
    \ndef url_to_html(url):\n    html = urllib.request.urlopen(url).read()\n    return\
    \ html\n```\n\nListing 7-1: A simple code function that reads the HTML from a\
    \ given URL and returns the string"
