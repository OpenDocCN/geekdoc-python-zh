    \ reading experience (Listing 4-15).\n\n```python\nclass Book:\n    def __init__(self):\n\
    \        self.title = \"Python One-Liners\"\n        self.publisher = \"NoStarch\"\
    \n        self.author = \"Mayer\"\n        self.current_page = 0\n\n    def get_title(self):\n\
    \        return self.title\n\n    def get_author(self):\n        return self.author\n\
    \n    def get_publisher(self):\n        return self.publisher\n\n    def next_page(self):\n\
    \        self.current_page += 1\n        return self.current_page\n\n    def print_page(self):\n\
    \        print(f\"... Page Content {self.current_page} ...\")\n\npython_one_liners\
    \ = Book()\n\nprint(python_one_liners.get_publisher())\n# NoStarch\n\npython_one_liners.print_page()\n\
    # ... Page Content 0 ...\n\npython_one_liners.next_page()\npython_one_liners.print_page()\n\
    # ... Page Content 1 ...\n```\n\nListing 4-15: Modeling the Book class while violating\
    \ the single responsibility principle\n\nThe code in Listing 4-15 defines the\
    \ class `Book` with four attributes: `title`, `author`, `publisher`, and the current\
    \ page number. You define getter methods for the attributes, along with some minimal\
    \ functionality to move to the next page, which may be called each time the user\
    \ presses a button on the reading device. The function, `print_page()`, is responsible\
    \ for printing the current page to the reading device. This is only given as a\
    \ stub, and would be more complicated in the real world. Finally, you create a\
    \ `Book` instance named `python_one_liners`, and you access its attributes via\
    \ a series of method calls and print statements in the last couple of lines. A\
    \ real eBook reader implementation, for example, would call the methods `next_page()`\
    \ and `print_page()` each time the user requests a new page when reading the book.\n\
    \nWhile the code looks clean and simple, it violates the single responsibility\
    \ principle: the class `Book` is responsible both for modeling data, such as the\
    \ book content, and for printing the book to the device. Modeling and printing\
    \ are two different functions but are encapsulated in a single class. You have\
    \ multiple reasons to change. You may want to change the modeling of the book's\
    \ data: for example, you could use a database instead of a file-based input/output\
    \ method. But you may also want to change the representation of the modeled data\
    \ by, for example, using another book formatting scheme on other types of screens.\n\
    \nLet's fix this issue in Listing 4-16.\n\n```python\nclass Book:\n    def __init__(self):\n\
    \        self.title = \"Python One-Liners\"\n        self.publisher = \"NoStarch\"\
    \n        self.author = \"Mayer\"\n        self.current_page = 0\n\n    def get_title(self):\n\
    \        return self.title\n\n    def get_author(self):\n        return self.author\n\
    \n    def get_publisher(self):\n        return self.publisher\n\n    def get_page(self):\n\
    \        return self.current_page\n\n    def next_page(self):\n        self.current_page\
    \ += 1\n\nclass Printer:\n    def print_page(self, book):\n        print(f\"...\
    \ Page Content {book.get_page()} ...\")\n\npython_one_liners = Book()\nprinter\
    \ = Printer()\n\nprinter.print_page(python_one_liners)\n# ... Page Content 0 ...\n\
    \npython_one_liners.next_page()\nprinter.print_page(python_one_liners)\n# ...\
    \ Page Content 1 ...\n```\n\nListing 4-16: Adhering to the single responsibility\
    \ principle\n\nThe code in Listing 4-16 accomplishes the same task, but it satisfies\
    \ the single responsibility principle. You create both a `Book` and a `Printer`\
    \ class. The `Book` class represents book metadata and the current page number,\
    \ while the `Printer` class is responsible for printing the book to the device.\
    \ You pass the book for which you want to print the current page into the method\
    \ `Printer.print_page()`. This way, data modeling (what is the data?) and data\
    \ presentation (how is the data presented to the user?) are decoupled, and the\
    \ code becomes easier to maintain. For example, if you wanted to change the book\
    \ data model by adding a new attribute `publishing_year`, you’d do it in the class\
    \ `Book`. And if you wanted to reflect this change in the data presentation by\
    \ providing readers this information as well, you’d do so in the class `Printer`.\n\
    \n## Principle 11: Test\n\nTest-driven development is an integral part of modern\
    \ software development. No matter how skilled you are, you will make mistakes\
    \ in your code. In order to catch them, you’ll need to run periodic tests, or\
    \ build test-driven code in the first place. Every great software company employs\
    \ multiple levels of testing before it ships the final product to the public,\
    \ since it’s far better to discover errors internally than to learn about them\
    \ from unhappy users.\n\nWhile there are no limitations to what types of tests\
    \ you can perform to improve your software applications, these are the most common\
    \ types:\n\n- **Unit Tests** With unit tests, you write a separate application\
    \ to check the correct input/output relationship for different inputs of each\
    \ function in the application. The unit tests are usually applied in regular intervals—for\
    \ example, each time a new software version is released. This ensures a certain\
    \ degree of progress by reducing the likelihood that a software change causes\
    \ previously stable features to suddenly fail.\n\n- **User Acceptance Tests**\
    \ These allow people in your target market to use your application in a controlled\
    \ environment while you observe their behavior. You then ask them how they liked\
    \ the application and how to improve it. These tests are usually deployed in the\
    \ final phase of project development after extensive testing within the organization.\n\
    \n- **Smoke Tests** Smoke tests are rough tests designed to try to fail the application\
    \ under development before the teams building the software give the application\
    \ to the testing team. In other words, smoke tests are often deployed by the application-building\
    \ team for quality assurance before handing it to the testing teams. When the\
    \ app passes the smoke test, it’s ready for the next round of testing.\n\n- **Performance\
    \ Tests** Performance tests aim to show whether the application meets or even\
    \ exceeds its users’ performance requirements rather than testing the actual functionality.\
    \ For instance, before Netflix releases a new feature, it must test its website\
    \ for page-loading time. If the new feature slows down the frontend too much,\
    \ Netflix doesn’t release it, proactively avoiding a negative user experience.\n\
    \n- **Scalability Tests** If your application becomes successful, you may have\
    \ to handle 1000 requests per minute instead of the original 2 requests. A scalability\
    \ test will show whether your application is scalable enough to handle that. Note\
    \ that a performant application isn’t necessarily scalable and vice versa. For\
    \ instance, a speed boat is very performant but doesn’t scale to thousands of\
    \ people at a time!\n\nTesting and refactoring will often reduce complexity and\
    \ the number of errors in your code. However, be careful not to over-engineer\
