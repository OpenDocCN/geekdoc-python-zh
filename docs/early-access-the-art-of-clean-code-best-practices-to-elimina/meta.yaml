    \n![](img/8792d1c61415b2790e4dd6b390c6d60b_22_0.png)\n\n让我们看看这在实际的Python排序例程中是否成立。图1-3比较了三种流行的排序算法：冒泡排序、快速排序和Timsort。冒泡排序具有最高的算法复杂性。快速排序和Timsort具有相同的渐近算法复杂性。但Timsort算法仍然快得多——这就是为什么它被用作Python的默认排序例程。冒泡排序算法的运行时间随着列表大小的增长而急剧增加。\n\
