    # 12. Design Programs to Connect With Other Programs


    Your programs do not live in isolation. A program is called to perform a task,
    either by a human being or by another program. You therefore need to design the
    API to work with the outside world—users or other programs. By adhering to Unix
    Principle 9, *make any program a filter*, which says to ensure the input/output
    mapping is intuitive, you’re already designing connected programs rather than
    making them live in isolation. The great programmer is as much an architect as
    a craftsman. They create new programs as a unique combination of old and new functions
    and other people’s programs. As a result, interfaces are able to be front and
    center of the development cycle.


    # 13. Make Your Code Robust


    A codebase is *robust* if it cannot be easily broken. There are two perspectives
    on code robustness: the programmer’s view and the user’s view.


    As the programmer, you could potentially break code by modifying it. A codebase
    is therefore *robust against change* if even a careless programmer can work on
    the codebase without being able to destroy its functionality easily. Say you have
    a big, monolithic code block, and every programmer in your organization has *edit
    access* to that whole thing. Any small change could break the whole thing. Now,
    compare this to software organizations like Netflix or Google, where every change
    has to go through multiple approval levels before being deployed in the real world;
    changes are thoroughly tested, so deployed code is protected against breaking
    changes. By adding layers of protection, Google and Netflix have made their code
    more robust compared to the fragile, monolithic codebase scenario.


    One way to accomplish codebase robustness is to control access rights so that
    individual developers are not able to damage the application without verifying
    from at least one additional person that the change is more likely to add value
    than damage the code. The process may come at a price of agility, but the price
    is worth paying if you’re not a one-person startup. We’ve already seen other ways
    to ensure code robustness throughout the book: small is beautiful, create functions
    that do one thing well, use test-driven development, keep things simple. A few
    other easily applied techniques are the following:


    +   - Use versioning systems such as Git so that you can recover previous versions
    of your code.

    - Back up your application data regularly to make it recoverable (data is not
    part of a versioning system).'
- md: "## 14. Repair What You Can—But Fail Early and Noisily\n\n- Use distributed\
    \ systems to avoid a single point of failure: run your application on multiple\
    \ machines to reduce the probability of a failing machine adversely affecting\
    \ your application. Say one machine has a failure probability of 1 percent per\
    \ day—it’ll fail about every 100 days. Creating a distributed system of five machines\
    \ that fail independently can theoretically reduce your failure probability to\
    \ 0.01^5 × 100% = 0.00000001%.\n\nFor a user, an application is robust if you\
    \ cannot easily break it by providing faulty or even malicious inputs. Assume\
    \ that your users will behave like a mob of gorillas smacking the keyboard and\
    \ submitting random series of characters, and that highly skilled hackers understand\
    \ the application better than you and are ready to exploit even the smallest security\
    \ issue. Your application must be robust against both types of users.\n\nIt’s\
    \ relatively simple to shield against the former group. Unit testing is one powerful\
    \ tool: test any function against any function input you can think of, especially\
    \ border cases. For example, if your function takes an integer and calculates\
    \ the square root, check that it can handle negative inputs and 0 because unhandled\
    \ exceptions would break the chain of reliable, simple, chainable programs. However,\
    \ unhandled exceptions lead to another more subtle problem that was brought to\
    \ my attention by security expert and technical editor of this book, Noah Spahn:\
    \ providing input to break a program can give attackers a foothold into the host\
    \ operating system. So, check your program’s ability to process all kinds of inputs\
    \ and, thereby, make your code more robust!\n\nWhile you should repair problems\
    \ in your code wherever possible, you shouldn’t hide the errors you cannot fix.\
    \ A hidden error will quickly compound, becoming bigger and bigger the longer\
    \ it remains hidden.\n\nErrors have the ability to accumulate. For example, say\
    \ the speech recognition system in your driving assistance app is fed faulty training\
    \ data classifying two completely different phonetic waves as the same word (see\
    \ Figure 7-4). So your code raises an error trying to map two completely different\
    \ phonetic waves to the same English word (for example, the error may occur as\
    \ you try to store this contradictory information in an inverted index that maps\
    \ English terms to phonetic waves). You can write your code in two ways: hide\
    \ the error or propagate the error up to the application, user, or programmer.\
    \ While many coders intuitively want to hide errors from the users to improve\
    \ usability, this is not the most sensible approach. Error messages should carry\
    \ useful information. If your code makes you aware of this problem early, you\
    \ could figure out a solution in advance. You better become aware of errors early\
    \ before their consequences cumulate and destroy millions of dollars or even human\
    \ lives.\n\n![](img/8792d1c61415b2790e4dd6b390c6d60b_134_0.png)\n\nFigure 7-4:\
    \ Classifier in training phase maps two very different phonetic waves to the same\
    \ English words.\n\nIt’s better to raise unfixable errors and hand them to the\
    \ user than bury them, even if the user doesn’t appreciate the error message and\
    \ the usability of your application decreases. The alternative is to bury the\
    \ errors until they have grown too big to ever handle.\n\nTo continue with our\
    \ faulty training data example, Listing 7-17 shows an example in which the Python\
    \ classify() function takes one input argument—the wave to be classified—and returns\
    \ the English word associated with this classification. Say you’ve implemented\
    \ a duplicate_check(wave, word) function that checks whether a substantially different\
    \ wave in your database results in the same classification using the wave and\
    \ word pairs. In this case, the classification is ambiguous because two completely\
    \ different waves map to the same English word, and you should share this with\
    \ the user by raising a ClassificationError rather than returning a random guess\
    \ of the classified word. Yes, the user will be annoyed, but at least they have\
    \ a chance to handle the consequences of the error themselves. *Repair what you\
    \ can—but fail early and noisily!*\n\n```python\ndef classify(wave):\n    # Do\
    \ the classification\n    word = # ...\n\n    # Check if another wave\n    # results\
    \ in the same word\n    if duplicate_check(wave, word):\n\n        # Do not return\
    \ a random guess\n        # and hide the error!\n        raise ClassificationError('Not\
    \ Understood')\n\n    return word\n```\n\nListing 7-17: Code snippet with noisy\
    \ failure instead of random guess if the wave cannot be classified unambiguously\n\
    \n## 15. Avoid Hand-Hacking: Write Programs to Write Programs If You Can\n\nThe\
    \ principle suggests that code that can be generated automatically *should be*,\
    \ because humans are notoriously prone to failures, especially in an activity\
    \ that’s repetitive and boring. There are many ways to accomplish this—in fact,\
    \ modern high-level programming languages such as Python are compiled down to\
    \ machine code using such programs. By writing programs to write programs, the\
    \ creators of those compilers helped high-level programmers to create all kinds\
    \ of application software without needing to worry about low-level hardware programming\
    \ languages. Without those programs writing programs for us, the computer industry\
    \ would still be in its infancy.\n\nCode generators and compilers already produce\
    \ large amounts of source code today. Let’s examine an additional way to think\
    \ of this principle. Today, the technologies of machine learning and artificial\
    \ intelligence lift this concept of writing programs to write programs to yet\
    \ another level. Intelligent machines (machine learning models) are assembled\
    \ by humans and then go on to rewrite (and tune) themselves based on data. Technically,\
    \ a machine learning model is a program that has rewritten itself many times over\
    \ until its behavior has maximized a set fitness function (usually set by humans).\
    \ As machine learning permeates (and prevails over) more areas of computer science,\
    \ this principle will become more and more relevant in modern computing. Human\
    \ programmers will still play a major role in using those powerful tools; after\
    \ all, compilers have not replaced human labor but have instead opened up a new\
    \ world of applications created by human programmers. I expect that the same will\
    \ happen in programming: machine learning engineers and software architects will\
    \ design advanced applications by connecting the different low-level programs,\
    \ such as machine learning models. Well, that’s one view on the topic—yours may\
    \ be more or less optimistic!\n\n## Conclusion\n\nIn this chapter, you’ve learned\
    \ 15 principles designed by the Unix creators to write better code. It’s worth\
    \ repeating them—as you read through the list, think about how each principle\
    \ applies to your current code project.\n\n- Make each function do one thing well\n\
    - Simple is better than complex\n- Small is beautiful\n- Build a prototype as\
    \ soon as possible\n- Choose portability over efficiency\n- Store data in flat\
    \ text files\n- Use software leverage to your advantage\n- Avoid captive user\
    \ interfaces\n- Make every program a filter\n- Worse is better\n- Clean code is\
    \ better than clever code\n- Design programs to be connected with other programs\n\
    - Make your code robust\n- Repair what you can—but fail early and noisily\n- Write\
    \ programs to write programs\n\nIn the next chapter, you’ll learn about the impact\
    \ of minimalism in design and how it can help you design applications that delight\
    \ your users by doing less.\n\n## Resources\n\nMike Gancarz, *The Unix Philosophy*,\
    \ Boston: Digital Press, 1994.\nEric Raymond, *The Art of Unix*, Boston: Addison-Wesley,\
    \ 2004, *http://www.catb.org/~esr/writings/taoup/html/*.\n\n# 8\n\n## LESS IS\
    \ MORE IN DESIGN\n\n![](img/8792d1c61415b2790e4dd6b390c6d60b_138_0.png)\n\nSimplicity\
    \ is a way of life for coders. While you may not see yourself as a designer, chances\
    \ are that you will create many user interfaces in your coding career. Whether\
    \ you need to create a visually appealing dashboard as a data scientist, an easy-to-use\
