    \ variant of Python Fibonacci:\n\n```\ncache = dict()\n\ndef fib(n):\n    if n\
    \ in cache:\n        return cache[n]\n    if n < 2:\n        return n\n    fib_n\
    \ = fib(n-1) + fib(n-2)\n    cache[n] = fib_n\n    return fib_n\n\nprint(fib(100))\n\
    # 354224848179261915075\n```\n\nYou store the result of fib(n-1) + fib(n-2) in\
    \ the cache ❶. If you already have the n-th Fibonacci number result, you pull\
    \ it from the cache rather than recalculating it again and again. On my machine,\
    \ this increases the speed by almost 2000 times when calculating the first 40\
    \ Fibonacci numbers!\n\nThere are two basic strategies for effective caching:\n\
    \n**Perform computations in advance (“offline”) and store their results in the\
    \ cache.**\n\nThis is a great strategy for web applications where you can fill\
    \ up a large cache once, or once a day, and then serve the result of your pre-computations\
    \ to the users. For them, your calculations seem blazingly fast. Mapping services\
    \ heavily use this trick to speed up the shortest path computations."
