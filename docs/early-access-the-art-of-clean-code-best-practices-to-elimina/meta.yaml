    The Pareto distribution has various practical applications in life and programming,
    and I''ll discuss some of them in this book, but, in my experience, the most transformative
    application for you will be to become an *80/20 thinker*, that is, you constantly
    try to find ways to accomplish much more with much less. Please note that while
    the concrete Pareto numbers—80/20, 70/30, or 90/10—may vary in your own life,
    you may draw some value from the fractal nature of productivity and output distributions.
    For instance, it is always true that not only do a few programmers earn much more
    than the rest but also a few from those top earners earn more than the rest of
    the top earners. The pattern stops only when the data gets too sparse. Here are
    some examples:


    **Income** Twenty percent of the 20 percent of coders will earn 80 percent of
    the 80 percent of income. In other words, 4 percent of the coders will earn 64
    percent of the income! This implies that you''re never stuck with your current
    financial situation, even if you already belong to the top 20 percent of coders.
    (This paper is just one of many that show the fractal nature of income distributions:
    http://journalarticle.ukm.my/12411/1/29%20Fatimah%20Abdul%20Razak.pdf.)


    **Activities** Twenty percent of the 20 percent of the 20 percent of the activities
    you have done this week are often responsible for 80 percent of the 80 percent
    of the 80 percent of your results. In this scenario, 0.8 percent of the activities
    will lead to 51 percent of the results. Roughly speaking, if you''re working 40
    hours per week, 20 minutes may account for half of the results in your work week!
    An example of such a 20-minute activity would be writing a script that automates
    a business task and saves you a couple of hours every few weeks that you can invest
