    The Art of Clean Code (Early Access) © 2022 by Christian Mayer


    What went wrong?


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_54_0.png)


    # Loss of Motivation


    In stealth mode, you’re alone with your idea, and doubts will pop up regularly.
    You resist the doubts initially, while your initial enthusiasm for the project
    is big enough, but the longer you work on your project the bigger your doubts
    grow. Maybe you come across a similar tool already in existence, or you start
    to believe that it cannot be done. Loss of motivation can kill your project entirely.


    On the other hand, if you release an early version of the tool, encouraging words
    from an early adopter could keep you motivated enough to persevere, and feedback
    from users might inspire you on how to improve the tool or overcome problems.
    You have external motivation.


    # Distraction


    When you work alone in stealth mode, your daily distractions are difficult to
    ignore. You work in your day job, you spend time with family and friends, other
    ideas pop into your mind. These days, your attention is a rare good sought by
    many devices and services. The longer you are in stealth mode, the higher the
    likelihood of getting distracted before ever finishing your polished app.


    An MVP can combat this by reducing the time from idea to market response, creating
    an environment of more immediate feedback that helps refocus your attention. And
    who knows—maybe you’ll find some eager early users of your MVP that can help propel
    the application development.


    # Running Over Time


    Another powerful enemy of project completion is faulty planning. Say you estimate
    that your product will take 60 hours to complete, so you initially plan to work
    on it for 2 hours every day for a month. However, loss of motivation and distractions
    cause you to average only one hour every day.'
  - '[PAGE 55]


    Further delays are caused by research you have to commit to, external distractions,
    and unexpected events and bugs that you must work around. An infinite number of
    factors will increase your anticipated project duration, and few will reduce it.
    By the end of the first month, you’re nowhere near where you thought you’d be,
    feeding back into the loss-of-motivation loop.


    An MVP is stripped of all unnecessary features. Thus, your planning mistakes will
    be consequently fewer, and your progress will be much more predictable. Fewer
    features mean fewer things will go wrong. Furthermore, the higher the predictability
    of your project, the more you or the people invested in your project will believe
    in the success of the project. Investors and stakeholders love predictability!


    # Lack of Response


    Say you overcome your low motivation, and you complete the product. You finally
    launch your project, and nothing happens. Only a handful of users even check it
    out, and they’re not enthusiastic about it. The most likely outcome of any software
    project is silence—an absence of positive or negative feedback. A common reason
    is that your product doesn’t deliver the specific value the users’ demand. It’s
    almost impossible to find the so-called *product-market fit* in your first shot.
    If you don’t get any feedback from the real world during development, you start
    to drift away from reality, working on features nobody will use.


    Your MVP will help you find product market fit much quicker because, as you’ll
    see later in this chapter, an MVP-based approach develops the project to directly
    address the most pressing customer needs, which increases your chances of customer
    engagement and therefore response to early product versions.


    # Wrong Assumptions


    The main cause for failure in stealth mode is your own assumptions. You start
    a project with a bunch of assumptions, such as who the users will be, what they
    do for a living, what problems they face, or how often they will use your product.
    These assumptions are often wrong, and without external testing you carry on blindly
    creating products your actual audience does not want. Once you get no feedback
    or negative feedback, it corrodes any motivation.


    When I was creating my *Finxter.com* app for learning Python by solving rated
    code puzzles, I assumed that most users would be computer science students because
    I was one (*reality*: most users are not computer scientists). I assumed that
    users would come when I released the app (*reality*: nobody came initially). I
    assumed that many users would share their successes on Finxter via their social
    media accounts (*reality*: only a tiny minority of users shared their coding ranks).
    I assumed that users would submit their own code puzzles (*reality*: from hundreds
    of thousands of users, only a handful submitted code puzzles). I assumed that
    users wanted a fancy design with'
- md: 'colors and images (*reality*: a simple geeky design led to improved usage behavior—see
    **Chapter 8** on simple designs). All those assumptions led to concrete implementation
    decisions that cost me tens, if not hundreds, of hours implementing many features
    my audience did not want. If I knew better, I would have tested these assumptions
    in an MVP, responded to user feedback, saved myself time and energy, and reduced
    the likelihood of jeopardizing the project’s success.


    ## Unnecessary Complexity


    There’s another problem with the stealth mode of programming: *unnecessary complexity*.
    Say you implement a software product consisting of four features (see Figure 3-3).
    You’ve been lucky—the market accepted it. You’ve spent considerable time implementing
    those four features, and you take the positive feedback as a reinforcement for
    all four features. All future releases of the software product will contain those
    four features—in addition to the future features you’ll add to the software product.


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_56_0.png)


    Figure 3-3: A valuable software product consisting of four features


    However, by releasing the package of four features at once rather than one or
    two features at a time, you don’t know whether the market would’ve accepted, or
    even preferred, any subset of features (see Figure 3-4).


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_56_1.png)


    Figure 3-4: Which subsets of features would have been accepted by the market?


    Feature 1 may be completely irrelevant, even though it took you the most time
    to implement. At the same time, Feature 4 may be a highly valuable feature that
    the market demands. There are $2^n$ different combinations of software product
    packages out of $n$ features. If you release them as feature bundles, how can
    you possibly know which is valuable and which is a waste of time?


    The costs of implementing the wrong features are already high, and releasing feature
    bundles of wrong features adds the cumulative costs of maintaining unnecessary
    features:


    - Longer, feature-heavy projects require more time to “load” the whole project
    in your mind.

    - Each feature risks introducing new bugs.

    - Each line of code adds time cost to opening, loading, and compiling the project.

    - Implementing Feature $n$ requires you to check all previous Features $1, 2,
    \dots, n-1$ to ensure that Feature $n$ doesn’t interfere with their functionality.

    - Every new feature requires new unit tests that must compile and run before you
    can release the next version of the code.

    - Every added feature makes the codebase more complicated for a coder to understand,
    increasing learning time for new coders joining the project.


    This is not an exhaustive list, but you get the point. If each feature increases
    your future implementation costs by X percent, maintaining unnecessary features
    can result in orders of magnitude difference in coding productivity. You cannot
    afford to systematically keep unnecessary features in your code projects!


    So, you may ask: If the stealth mode of programming is unlikely to succeed, what’s
    the solution?


    ## Building a Minimum Viable Product


    The solution is simple: build a series of MVPs. Formulate an explicit hypothesis—such
    as *users enjoy solving Python puzzles*—and create a product that validates only
    this hypothesis. Remove all features that don’t help you validate this hypothesis.
    Build an MVP based on that feature. By implementing just a single feature per
    release, you more thoroughly understand what features the marketplace accepts
    and which hypotheses are true. But at all costs, avoid complexity. After all,
    if users don’t enjoy solving Python puzzles, why even proceed with implementing
    the *Fintexter.com* website? Once you’ve tested your MVP on the real-world market
    and analyzed whether it works, you can build a second MVP that adds the next most
    important feature. The term to describe this strategy of searching for the right
    product via a series of MVPs is called *rapid prototyping*. Each prototype builds
    on what you learn from the previous launches, and each is designed to bring you
    maximal learning in minimal time and with minimum effort. You *release early and
    often* in order to find *product-market fit*, which entails nailing the product
    needs and desires of your target market (even if this target market is very small
    in the beginning).


    Let''s look at an example using the code search engine. You first formulate a
    hypothesis to test: coders need a way to search for code. Think about what form
    the first MVP might take for your code search engine app. A shell-based API? A
    backend server that performs a database lookup on all open-source GitHub projects
    for exact word matches? The first MVP must validate the main hypotheses. Thus,
    you decide the simplest way to validate this hypothesis and gain some insight
    into possible queries is to build a user interface without any sophisticated backend
    functionality that automatically retrieves results for the query. You set up a
    website with an input field and drive some traffic to it by sharing your idea
    in coding groups and on social media and by spending a small amount on ads. The
    app interface is simple: users enter the code they want to search for and hit
    a search button. You don''t bother optimizing the search results too much; this
    is not the point of your first MVP. Instead, you decide to simply relay to Google''s
    search results after a quick postprocessing. The point is to collect the first,
    say, one hundred search queries to find some common user behavior patterns before
    you even start developing the search engine!


    You analyze the data and find that 90 percent of the search queries are related
    to error messages; coders are simply copying and pasting their coding errors into
    the search field. Furthermore, you find that 60 out of the 90 queries concern
    JavaScript. You conclude that the initial hypothesis is validated: coders do indeed
    search for code. However, you learn the valuable information that most coders
    search for errors than for, say, functions. Based on your analysis, you decide
    to narrow your second MVP from a general-purpose code search engine to an *error*
    search engine. This way, you can tailor your product to the actual user needs
    and get more engaged feedback from a subsection of coders in order to learn quickly
    and integrate your learning in a useful product. You can always scale to other
    languages and query types over time as you gain more and more traction and market
    insights. Without your first MVP, you may have spent months working on features
    almost nobody uses, like regular expression functionality to find arbitrary patterns
    in the code, at the cost of features everybody uses like error message searches.


    Figure 3-5 sketches this gold standard of software development and product creation.
    First, you find product-market fit through iteratively launching MVPs until users
    love it. The chained launches of MVPs build interest over time and allows you
    to incorporate user feedback to gradually improve the core idea of your software.
    As soon as you''ve reached product-market fit, you add new features—one at a time.
    Only if a feature can prove that it improves key user metrics can it remain in
    the product.


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_59_0.png)


    Using *Finxter.com* as an example, if I had followed the MVP rule from the start,
    I would probably have created a simple Instagram account that shared code puzzles
    and checked if users enjoyed solving them. Instead of spending one year writing
    the Finxter app without validation, I could’ve spent a few weeks or even months
    sharing puzzles on a social network. Then, I could’ve taken lessons learned from
    interacting with the community to build a second MVP with slightly more functionality,
    such as a dedicated website that hosts the coding puzzles and their correct solutions.
    This method would have allowed me to build the Finxter app in a fraction of the
    time and with a fraction of the unnecessary features. The lesson of building an
    MVP stripped from all unnecessary features is one I’ve learned the hard way.


    The idea of an MVP was popularized by entrepreneur Eric Ries in his best-selling
    book *The Lean Startup* (Crown Publishing, 2011). The billion-dollar company Dropbox
    famously adopted the MVP approach. Instead of spending time and effort on an untested
    idea to implement the complicated Dropbox functionality of synchronizing folder
    structures into the cloud—which requires a tight integration in different operating
    systems and a thorough implementation of burdensome distributed systems concepts
    such as replica synchronization—according to *The Lean Startup*, the founders
    validated the idea with a simple product video, even though the product featured
    in the video didn’t exist yet. Countless iterations followed the validated Dropbox
    MVP to add more helpful features to the core project that simplify the lives of
    their users. Since then, the concept has been tested by thousands of successful
    companies in the software industry (and beyond).'
