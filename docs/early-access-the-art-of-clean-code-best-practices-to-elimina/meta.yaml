    # Principle 17: Boy Scout Rule and Refactoring


    The Boy Scout Rule is simple: *leave the campground cleaner than you found it.*
    It’s a great rule to live and code by. Get into the habit of cleaning up every
    piece of code you encounter. This will not only improve the codebases you’re involved
    in and make your own life easier but also help you develop the sharp eye of a
    master coder who can critically evaluate source code quickly. As a bonus, it’ll
    help your team be more productive, and your colleagues will be grateful for your
    value-oriented attitude. Note that this shouldn’t violate the rule we stated earlier
    about avoiding premature optimization (overengineering). Spending time to clean
    up your code to reduce complexity is almost always efficient. Doing so will yield
    big dividends in reduced maintenance overhead, bugs, and cognitive demands. Put
    succinctly, overengineering is likely to *increase* complexity whereas cleaning
    up the code will *reduce* complexity.


    The process of improving your code is called *refactoring*. You could argue that
    refactoring is the overall method comprising every principle we’ve discussed here.
    As a great coder, you’ll incorporate many of the clean code principles from the
    beginning. Even then, however, you’ll still need to occasionally refactor your
    code to clean up any messes you’ve made. In particular, you should refactor your
    code before releasing any new features to keep the code clean.


    There are many techniques for refactoring code. One is to explain your code to
    a colleague or have them look it over in order to discover any poor decisions
    you’ve made and had not noticed on your own. For example, you may have created
    two classes, Cars and Trucks, because you expected your application would need
    to model both. As you explain your code to your teammate, you realize that you
    don’t use the class Trucks very often—and when you do, you use methods that already
