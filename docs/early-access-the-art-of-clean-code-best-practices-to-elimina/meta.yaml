    \    lst = l[:] # work with a copy, don't modify the original\n    for passesLeft\
    \ in range(len(lst)-1, 0, -1):\n        for i in range(passesLeft):\n        \
    \    if lst[i] > lst[i + 1]:\n                lst[i], lst[i + 1] = lst[i + 1],\
    \ lst[i]\n    return lst\n\ndef qsort(lst):\n    # Explanation: https://blog.finxter.com/python-one-line-quicksort/\n\
    \    q = lambda lst: q([x for x in lst[1:] if x <= lst[0]])\n                \
    \    + [lst[0]]\n                    + q([x for x in lst if x > lst[0]]) if lst\
    \ else []\n    return q(lst)\n\ndef timsort(l):\n    # sorted()uses Timsort internally\n\
    \    return sorted(l)\n\ndef create_random_list(n):\n    return random.sample(range(n),\
    \ n)\n\nn = 50000\nxs = list(range(1,n,n//10))\ny_bubble = []\ny_qsort = []\n\
    y_tim = []\n\nfor x in xs:\n\n    # Create list\n    lst = create_random_list(x)\n\
    \n    # Measure time bubble sort\n    start = time.time()\n    bubblesort(lst)\n\
    \    y_bubble.append(time.time()-start)\n\n    # Measure time qsort\n    start\
