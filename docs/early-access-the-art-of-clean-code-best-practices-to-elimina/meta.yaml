    # # 5


    # ## PREMATURE OPTIMIZATION IS THE ROOT OF ALL EVIL


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_92_0.png)


    In this chapter, you’ll learn how premature optimization can hinder your productivity.
    *Premature optimization* is the act of spending valuable resources—time, effort,
    lines of code—on unnecessary code optimizations, especially before you have all
    the relevant information. It is one of the main problems with poorly written code.


    Premature optimization comes in many flavors; this chapter will introduce some
    of the most relevant ones. We’ll study practical examples of where premature optimization
    occurs, which will be most relevant for your own code projects. We’ll close the
    chapter with actionable tips on performance tuning, ensuring that it is *not*
    premature.


    # ### Six Types of Premature Optimization


    There’s nothing wrong with optimized code per se, but it always comes with a cost,
    whether that’s additional programming time or extra lines of'
  - '[PAGE 93]


    code. When you optimize code snippets, you''re generally trading complexity for
    performance. Sometimes you can obtain both low complexity and high performance,
    for example, by writing clean code, but you must spend programming time to accomplish
    this! If you do this too early in the process, you''ll often spend time optimizing
    code that may never be used in practice or that has little impact on the overall
    runtime of the program. You''ll also optimize without having enough context on
    when the code is called and data on possible input values. Wasting precious resources
    like programming time and code lines can reduce your productivity by orders of
    magnitude, so it''s important to know how to spend them wisely.


    But don''t take my word for it. Here''s what one of the most influential computer
    scientists of all time, Donald Knuth, says about premature optimization:


    > Programmers waste enormous amounts of time thinking about, or worrying about,
    the speed of noncritical parts of their programs, and these attempts at efficiency
    actually have a strong negative impact when debugging and maintenance are considered.
    We should forget about small efficiencies, say about 97% of the time: premature
    optimization is the root of all evil.¹


    Premature optimization can take many forms, so to explore the issue, we''ll look
    at six common cases I''ve encountered in which you too might be tempted to prematurely
    focus on small efficiencies, slowing your progress.


    # Optimizing Code Functions


    Be wary of spending time optimizing functions before you know how much those functions
    will be used. Say you encounter a function you just cannot stand to leave unoptimized.
    You reason to yourself that it''s bad programming style to use naïve methods and
    that you should use more efficient data structures or algorithms to tackle the
    problem. You dive into research mode and spend hours researching and fine-tuning
    algorithms. But as it turns out, this function is executed only a few times in
    the final project: the optimization doesn''t result in meaningful performance
    improvements.


    # Optimizing Features


    Avoid adding features that aren''t strictly necessary and wasting time optimizing
    those features. Suppose you develop a smartphone app that translates text into
    Morse code, expressed by blinking lights. You''ve learned in Chapter 3 that implementing
    an MVP first, rather than creating a polished end product with many, possibly
    unnecessary, features, is the best way to go. In this case, the MVP would be a
    simple app with one function: translate text into Morse code by providing a text
    via a simple input form and hitting a button on which the app then translates
    this text to Morse code. However, you think the MVP rule doesn''t apply to your


    1. "Structured Programming with *go to* Statements," *ACM Computing Surveys* 6
    no. 1 (1974).'
  - '[PAGE 94]


    project and decide to add a few extra features: a text-to-audio converter and
    a receiver that translates light signals to text. After shipping your app, you
    learn that your users never use these features. Premature optimization has significantly
    slowed down your product development cycle and delayed your ability to incorporate
    user feedback.


    # Optimizing Planning


    If you prematurely optimize the planning phase, trying to find solutions to problems
    that haven''t yet occurred, you risk delaying your ability to receive valuable
    feedback. While you certainly shouldn''t avoid planning entirely, getting stuck
    in the planning phase can be just as costly. To ship something of value to the
    real world, you must accept imperfection. You need user feedback and sanity checks
    from testers to figure out where to focus. Planning can help you avoid certain
    pitfalls, but if you''re not taking action, you''ll never finish your project
    and will remain stuck in the ivory tower of theory.


    # Optimizing Scalability


    Prematurely optimizing the scalability of your application before you have a realistic
    idea of the audience can be a major distractor and can easily cost you tens of
    thousands of dollars'' worth of developer and server time. Expecting millions
    of users, you design a distributed architecture that dynamically adds virtual
    machines to handle peak load if necessary. However, creating distributed systems
    is a complex and error-prone task that may easily take you months to implement.
    Many projects fail anyway; if you do become as successful as your wildest dreams
    suggest, you''ll have plenty of opportunity to scale your system with the increase
    of demand. Worse, the distribution may *reduce* an application''s scalability,
    due to an increased communication and data consistency overhead. Scalable distributed
    systems come at a price—are you sure you need to pay it? Don''t try to scale to
    millions of users before you''ve served your first one.


    # Optimizing Test Design


    Optimizing for tests too soon is also a major driver of wasted developer time.
    Test-driven development has many zealous followers who misinterpret the idea of
    *implementing tests before functionality* to always write tests first—even if
    the purpose of a code function is pure experimentation or the code function doesn''t
    lend itself well to testing in the first place. To write experimental code is
    to test concepts and ideas, and adding another layer of tests to experimental
    code can harm progress and does not adhere to the philosophy of rapid prototyping.
    In addition to that, suppose you believe in rigorous test-driven development and
    insist on 100-percent test coverage. Some functions—for instance, those that process
    free text from users—don''t work very well with unit tests because of their unpredictable
    human-based input. For those functions, only real human beings can test them in
    a meaningful way—in these cases, real-world users *are* the only test that matters.'
