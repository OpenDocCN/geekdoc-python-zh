  md: "code for all instances to make that improvement. Applying the DRY principle\
    \ also makes the code easier to understand for human readers. There’s little doubt\
    \ about the purpose of the function `miles_to_km(20)`, but you may have to think\
    \ harder about the purpose of the computation `20 * 1.60934`.\n\n> Violations\
    \ of DRY are often abbreviated as WET: *we enjoy typing, write everything twice,\
