  mdcn: "性能。优化Windows操作系统的启动速度并非过早优化，因为它将直接惠及数百万用户；而为每月仅处理1000个静态网站请求的Web应用优化可扩展性，则属于过早优化。*开发*应用的成本远低于成千上万用户*使用*它的成本。如果你能花一小时为用户节省几秒时间，这通常是值得的！用户的时间比你自己的更宝贵。这正是我们使用计算机的初衷——预先投入少量资源，事后获得更多回报。优化并非总是过早的。有时，你必须通过优化才能创造出有价值的产品——何必费力发布一个无法产生任何价值的未优化产品？在了解了避免过早优化的若干理由后，现在让我们看看六条性能优化建议，帮助你选择如何以及何时优化代码。\n\
    \n## 先测量，后改进\n\n测量软件性能，明确其可改进且应改进之处。未测量的部分无法改进，因为你无法追踪进展。\n\n过早优化通常发生在测量之前，这正是“过早优化是万恶之源”这一观点的直接成因。你应始终在开始测量未优化代码的性能（如内存占用或速度）后才进行优化。这就是你的基准。例如，若不知道原始运行时长，试图改进运行时长便毫无意义。除非从明确的基准开始，否则无法判断你的“优化”是否实际增加了总运行时长或未产生可测量效果。\n\
    \n作为测量性能的通用策略，首先编写尽可能直接、简单且易于阅读的代码。你可以称之为*原型*、*简单方法*或*MVP*。将测量结果记录在电子表格中，这是你的第一个基准。创建替代代码方案，并将其性能与基准进行对比。一旦严格证明优化提升了代码性能，新的优化代码即成为新基准，后续所有改进都应超越它。若优化未带来可测量的性能提升，就应舍弃它。\n\
    \n如此，你便能追踪代码随时间的改进。你还可以向老板、同事甚至科学界记录、证明并捍卫一项优化。\n\n## 帕累托法则为王\n\n第2章讨论的80/20法则（或*帕累托法则*）同样适用于性能优化。某些功能会比其他功能消耗更多资源（如时间和内存占用），因此专注于改进此类瓶颈将帮助你有效优化代码。\n\
    \n以我操作系统中并行运行的不同进程的高度不均衡性为例，查看图5-1中我当前的中央处理器（CPU）使用情况。\n\n![](img/8792d1c61415b2790e4dd6b390c6d60b_100_0.png)\n\
    \n若用Python绘制此图，你会看到类似帕累托的分布，如图5-2所示。\n\n![](img/8792d1c61415b2790e4dd6b390c6d60b_100_1.png)\n\
    \n一小部分应用代码需要占用显著比例的CPU使用率。如果我想降低电脑的CPU使用率，只需关闭Cortana和搜索功能——瞧，大部分CPU负载消失了，如图5-3所示。\n\
    \n![](img/8792d1c61415b2790e4dd6b390c6d60b_101_0.png)\n\n图5-3：通过关闭不需要的应用“优化”Windows系统后的结果\n\
    \n移除两个最耗资源的任务显著降低了CPU负载，但请注意，新图表乍看之下与第一张相似：两个任务（这次是资源管理器和系统）仍远比其他任务消耗更多资源。这揭示了性能调优的一条重要规则：性能优化具有分形特性。一旦移除一个瓶颈，你会发现另一个瓶颈潜伏其中。瓶颈将始终存在于任何系统中，但如果你在它们出现时反复移除，就能获得最大的“性价比”。在实际代码项目中，你会看到类似的分布：相对较少的函数占用大部分资源（例如CPU周期）。通常，你可以将优化精力集中在最耗资源的瓶颈函数上，例如用更复杂的算法重写它，或思考如何避免计算（例如缓存中间结果）。当然，解决当前瓶颈后，下一个瓶颈会立即出现；这就是为什么你需要测量代码并决定何时停止优化。例如，将Web应用的响应时间从2毫秒提升到1毫秒意义不大，因为用户根本察觉不到差异。由于优化的分形特性和帕累托法则（见第2章），获得这些微小收益通常需要大量努力和开发时间，且可能在可用性或应用效用方面收效甚微。\n\
    \n## 算法优化制胜\n\n假设你已决定代码需要特定优化，因为用户反馈和统计数据表明你的应用运行过慢。你已测量当前速度（以秒或字节为单位），知道目标速度，并找到了瓶颈。下一步是找出如何克服该瓶颈。\n\
    \n许多瓶颈可以通过调整*算法和数据结构*来解决。例如，假设你正在开发一个金融应用。你知道瓶颈是`calculate_ROI()`函数，它遍历所有潜在买卖点组合以计算最大利润。由于此函数是整个应用的瓶颈，你想为它找到更好的算法。经过一番研究，你发现了*最大利润算法*——一个简单而强大的替代方案，能显著加速计算。对于导致瓶颈的数据结构，也可以进行类似研究。\n\
    \n为减少瓶颈并优化性能，请自问：\n\n- 你能否找到已证实的更好算法——例如，在书籍、研究论文甚至维基百科中？\n- 你能否为手头的具体问题调整现有算法？\n\
    - 你能否改进其数据结构？一些常见的简单解决方案包括使用*集合*代替列表（例如，检查成员资格时集合比列表快得多）或使用*字典*代替元组集合。\n\n花时间研究这些问题，无论对你的应用还是对你个人都大有裨益。在此过程中，你将成为更出色的计算机科学家。\n\
    \n## 缓存为王\n\n根据前述建议完成必要更改后，你可以采用这个快速而直接的技巧来移除不必要的计算：将已执行的部分计算结果存储在*缓存*中。此技巧对各种应用效果显著。在执行任何新计算前，先检查缓存是否已进行过该计算。这类似于你进行简单心算的方式——在某个时刻，你并非*实际*计算6\
