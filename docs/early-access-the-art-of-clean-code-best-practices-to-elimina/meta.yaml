    \n在清单中，我们使用了 Python 的 input() 函数，它会阻塞程序执行，直到接收到用户输入。没有用户输入，代码就什么也不做。这个强制用户界面限制了代码的可用性。如果你想计算从\
    \ 1 到 100 每个年龄的预期寿命并绘制图表，你必须手动输入 100 个不同的年龄，并将结果存储在一个单独的文件中。然后，你必须将结果复制粘贴到一个新的脚本中进行绘图。就目前而言，这个函数实际上做了两件事：处理用户输入和计算预期寿命，这也违反了第一个\
