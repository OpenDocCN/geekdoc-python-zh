    \ system.\n\nIf you’re a coder, you are especially prone to overwhelming complexity,\
    \ such as from these different sources that we’ll cover in this chapter:\n\n-\
    \ Complexity in a project life cycle\n- Complexity in software and algorithmic\
    \ theory\n- Complexity in learning\n- Complexity in processes\n- Complexity in\
    \ social networks\n- Complexity in your daily life\n\n## Complexity in a Project\
    \ Life Cycle\n\nLet’s dive into the different stages of the project life cycle:\
    \ planning, defining, designing, building, testing, and deployment (see Figure\
