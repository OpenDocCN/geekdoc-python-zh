    \        max_transaction = (sender, receiver, amount)\n```\n\n*Listing 5-2: Applied\
    \ optimization to reduce redundant computations*\n\nThe variable `max_transaction`\
    \ maintains the maximum transaction amount among all transactions seen so far.\
