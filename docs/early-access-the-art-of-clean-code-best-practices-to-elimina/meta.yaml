    While we won''t go into every way to implement this principle here (though later
    principles will cover some of these in more detail), it also applies to other
    aspects that might clarify intent, such as indentation, whitespaces, comments,
    and line lengths, among others. Clean code radically optimizes for human readability.
    As Martin Fowler, an international expert on software engineering and author of
    the popular book *Refactoring*, argues, "Any fool can write code that a computer
    can understand. Good programmers write code that humans can understand" (Addison-Wesley,
    1999).


    # Principle 4: Use the Right Names


    Relatedly, experienced coders have often agreed on a set of specific naming conventions
    for functions, function arguments, objects, methods, and variables, both implicit
    and explicit. Everybody benefits from adhering to these conventions: code becomes
    more readable, easier to understand, and less cluttered. If you violate these
    conventions, readers of your code are likely to assume that it was written by
    an inexperienced programmer and may not take your code seriously.


    These conventions may differ from language to language. For example, by convention
    Java uses camelCaseNaming for naming variables, while Python uses underscore_naming
    for variables and functions. If you start using camel case in Python, it may confuse
    the reader. You don''t want your untraditional naming conventions to distract
    those reading your code. You want them to focus on what your code does, not on
    your coding style. As outlined by the *principle of least surprise*, there''s
    no value in surprising other coders by choosing unconventional variable names.


    So, let''s dive into a list of naming rules you can consider when writing source
    code.


    +   - Choose descriptive names. Say you create a function to convert currencies
    from United States dollars (USD) to euros (EUR) in Python. Call it `usd_to_eur(amount)`
    rather than `f(x)`.

    - Choose unambiguous names. You may think that `dollar_to_euro(amount)` would
    be a good name for a currency conversion function. While it is better than `f(x)`,
    it''s worse than `usd_to_eur(amount)` because it introduces an unnecessary degree
    of ambiguity. Do you mean United States, Canadian, or Australian dollars? If you''re
    in the United States, the answer may be obvious to you, but an Australian coder
    may not know that the code is written in the United States and may assume a different
    output. Minimize these confusions!

    - Use pronounceable names. Most coders subconsciously read code by pronouncing
    it in their minds. If a variable name is unpronounceable, the problem of deciphering
    it takes attention and costs precious mental space. For example, the variable
    name `cstmr_1st` may be descriptive and unambiguous, but it''s not pronounceable.
    Choosing the variable name `customer_list` is well worth the additional space
    in your code.'
