  md: '# Success Metrics


    Let''s say you want to optimize for income. How can you move to the left in the
    Pareto curve? We''re leaving exact science behind here, because you need to find
    the reasons some people succeed in your specific industry and develop actionable
    *success metrics* you can control and implement. We define the term *success metric*
    as measurements of behavior that lead to more success in your field. The tricky
    thing is that the most crucial success metrics are different in most fields. The
    80/20 principle also applies to success metrics: some success metrics have a dominating
    impact on your performance in a field, while others barely matter at all.


    For example, when working as a doctoral researcher, I soon realized that success
    was all about getting cited by other researchers. The more citations you have
    as a researcher, the more credibility, visibility, and opportunities you''ll have.
    However, *increasing the number of citations* is hardly an actionable success
    metric that you can optimize daily. The number of citations is a *lagging indicator*,
    because it is based on actions you took in the past. The problem with lagging
    indicators is that they record only the consequence of past actions. They don''t
    tell you the right actions to take daily for success.


    To obtain a measure for doing the right actions, the notion of leading indicators
    was introduced. A *leading indicator* is a metric that predicts a change in the
    lagging indicator before it occurs. If you do more of the leading indicator, the
    lagging indicator is likely to improve as a result. As a researcher, then, you''ll
    receive more citations (lagging indicator) by publishing more high-class research
    papers (leading indicator). That means writing high-class papers is the most important
    activity for most scientists, not secondary activities such as preparing presentations,
    organizing, teaching, or drinking coffee. The success metric for researchers is
    therefore generating a maximal number of high-quality papers, as shown in Figure
    2-5.


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_37_0.png)'
