    ![](img/8792d1c61415b2790e4dd6b390c6d60b_66_0.png)


    Figure 4-1: Clean code improves the scalability and maintainability of your codebase.


    Figure 4-1 also shows the difference between writing dirty and clean code. Dirty
    code is less time-consuming in the short-term and for small code projects—if there
    were no benefits to writing dirty code, nobody would do it! If you cram all your
    functionality into a 100-line code script, you don’t need to invest a lot of time
    thinking about and restructuring your project. Problems begin to arise only as
    you add more code: as your monolithic code file grows from 100 to 1000 lines,
    it’ll be less efficient compared to a more thoughtful approach in which you structure
    the code logically in different modules, classes, or files.


    As a rule of thumb: always write thoughtful and clean code. The additional costs
    for rethinking, refactoring, and restructuring will pay back many times over for
    any non-trivial project. The stakes can sometimes be quite high: in 1962 the National
    Aeronautics and Space Administration (NASA) attempted to send a spacecraft to
    Venus, but a tiny bug—an omission of a hyphen in the source code—caused the engineers
    to issue a self-destruct command, which resulted in the loss of a rocket worth
    more than $18 million at the time. If the code had been cleaner, the engineers
    may have caught the error before the launch.


    Whether or not you’re doing rocket science, the philosophy of carefully crafting
    your programming will carry you further in life. Simple code also facilitates
    scaling your project to more programmers and more features because fewer coders
    will be scared off by the project’s complexity.


    So, let’s learn how to write clean and simple code, shall we?


    # Writing Clean Code: The Principles


    I learned to write clean code the hard way when I was developing a distributed
    graph processing system from scratch as part of my doctoral research. If you’ve
    ever written a distributed application—where two processes'
  - '[PAGE 67]


    residing on different computers interact with each other via messages—you know
    that the complexity can quickly become overwhelming. My code grew to thousands
    of lines, and bugs popped up frequently. I didn’t make any progress for weeks
    at a time; it was very frustrating. The concepts were convincing in theory, but
    somehow they didn’t work in my implementation.


    Finally, after a month or so working full-time on the codebase without seeing
    any encouraging progress, I decided to simplify the codebase radically. Among
    other changes, I started to use libraries instead of coding functionality myself.
    I removed code blocks that I had commented out for a possible later use. I renamed
    variables and functions. I structured the code in logical units and created new
    classes instead of cramming everything into a “God” class. After a week or so,
    not only was my code more readable and understandable for other researchers, it
    was also more efficient and less buggy. My frustration morphed into enthusiasm—clean
    code had rescued my research project!


    Improving your codebase and reducing complexity is called *refactoring*, and it
    must be a scheduled and crucial element of your software development process if
    you want to write clean and simple code. Writing clean code is mainly about keeping
    two things in mind: knowing the best ways to build your code from the ground up
    and going back to make revisions periodically. I’ll cover some important techniques
    for keeping your code clean in the following 19 principles. While each principle
    covers a unique strategy to write cleaner code, some of the principles overlap,
    but I felt like combining the overlapping principles would reduce clarity and
    actionability. With this out of the way, let’s get started with the first one!


    # **Principle 1: Think in Big Pictures**


    If you work on a non-trivial project, you’ll likely end up with multiple files,
    modules, and libraries working together within the overall application. Your *software
    architecture* defines how your software elements interact. Good architectural
    decisions can initiate huge leaps in improvement in performance, maintainability,
    and usability. To build a good architecture, you’ll need to take a step back and
    think in big pictures. Decide on features that are needed in the first place.
    In [Chapter 3](#) about building an MVP, you’ve learned how to focus your project
    on the necessary features. If you do this, you save yourself a lot of work and
    the code will be much more clean per design. At this point, we assume you’ve already
    created your first application with multiple modules, files, and classes. How
    can you apply big-picture thinking to get some order into the mess? Considering
    the following questions can give you some ideas on how to best make your code
    cleaner:


    +   - Do you need all the separate files and modules, or can you consolidate some
    of them and reduce the interdependency of your code?

    - Can you divide a large and complicated file into two simpler ones? Note that
    there’s usually a sweet spot between two extremes: a large, monolithic code block
    that is completely unreadable or myriads of small code blocks that are impossible
    to mentally keep track of. Neither is'
  - '[PAGE 68]


    desirable, and most stages in between are better options. Think of it as an inverted
    “U” curve where the maximum represents the sweet spot between a few large code
    blocks and many small code blocks.


    +   - Can you generalize code and turn it into a library to simplify the main
    application?

    - Can you use existing libraries to get rid of many lines of code?

    - Can you use caching to avoid recomputing the same result over and over again?

    - Can you use more straightforward and suitable algorithms that accomplish the
    same things as your current algorithms?

    - Can you remove premature optimizations that don’t improve the overall performance?

    - Can you use another programming language that would be more suitable for the
    problem at hand?


    Big-picture thinking is a time-efficient way to drastically reduce the complexity
    of your application as a whole. Sometimes it’s hard to implement those changes
    at later various stages of the process or because of collaborations that might
    interfere. In particular, this kind of high-level thinking can be difficult for
    applications with millions of lines of code, like the Windows operating system.
    However, you simply cannot afford to ignore these questions entirely because all
    small tweaks combined cannot mitigate the adverse effects of wrong or lazy design
    choices. If you’re working in a small startup or just for yourself, you can usually
    make bold architectural decisions, such as changing the algorithm swiftly. If
    you’re working in a big organization, you might not have as much flexibility.
    The bigger the application, the more likely you are to find easy fixes and low-hanging
    fruits.


    # Principle 2: Stand on the Shoulders of Giants


    Reinventing the wheel is rarely valuable. Programming is a decades-old industry.
    The best coders in the world have provided us with a great legacy: a database
    of millions of fine-tuned and well-tested algorithms and code functions. Accessing
    the collective wisdom of millions of programmers is as simple as using a one-line
    import statement. There’s no reason not to use this superpower in your own projects.


    Using library code is likely to improve the efficiency of your code. Functions
    that have been used by thousands of coders tend to be much more optimized than
    your own. Furthermore, library calls are easier to understand and take less space
    in your code project than code you’ve written in yourself. For example, suppose
    you need a clustering algorithm to visualize clusters of customers. You can *stand
    on the shoulders of giants* by importing a well-tested clustering algorithm from
    an external library and passing your data into it. This is far more time-efficient
    than using your own code—it will implement the same functionality with fewer bugs,
    less space, and more performant code. Libraries are among the primary tools master
    coders use to increase their productivity thousandfold.'
