    True\nTest type...\n```"
  mdcn: "## 什么是复杂性？\n\n在不同领域，“复杂性”一词有着不同的含义。有时，它被严格定义，例如计算机程序的*计算复杂性*，它提供了一种分析给定代码函数在不同输入下表现的方法。其他时候，它被宽泛地定义为系统组件之间交互的数量或结构。在本书中，我们将更通用地使用这个概念。\n\
    \n我们将复杂性定义如下：\n\n**复杂性** “一个由多个部分组成的整体，难以分析、理解或解释”\n\n复杂性描述的是一个完整的系统或实体。由于解释这个系统的困难，复杂性会导致挣扎和困惑。由于现实世界系统是混乱的，你会发现复杂性无处不在：股票市场、社会趋势、新兴的政治观点，以及拥有数十万行代码的大型计算机程序——比如\
    \ Windows 操作系统。\n\n如果你是一名程序员，你尤其容易受到压倒性复杂性的影响，例如来自我们将在本章中涵盖的这些不同来源：\n\n- 项目生命周期中的复杂性\n\
    - 软件和算法理论中的复杂性\n- 学习中的复杂性\n- 流程中的复杂性\n- 社交网络中的复杂性\n- 日常生活中的复杂性\n\n## 项目生命周期中的复杂性\n\
    \n让我们深入探讨项目生命周期的不同阶段：规划、定义、设计、构建、测试和部署（见图 1-1）。\n\n![](img/8792d1c61415b2790e4dd6b390c6d60b_17_0.png)\n\
    \n> 图 1-1：这是基于电气与电子工程师协会（IEEE）官方软件工程标准的软件项目的六个概念阶段。\n\n即使你正在处理一个非常小的软件项目，你也可能会经历软件开发生命周期的所有六个阶段。请注意，你不一定只经历每个阶段一次——在现代软件开发中，通常更倾向于采用迭代方法，即多次回顾每个阶段。接下来，我们将看看复杂性如何对每个阶段产生重大影响。\n\
    \n### 规划\n\n软件开发生命周期的第一个阶段是规划阶段，在工程文献中有时也称为*需求分析*。这个阶段的目的是确定产品将是什么样子。成功的规划阶段会带来一套严格定义的、需要交付给最终用户的功能特性。\n\
    \n无论你是一个人从事你的业余项目，还是负责管理和协调多个软件开发团队之间的协作，你都必须找出软件的最佳功能集。必须考虑许多因素：构建某个功能的成本、无法成功实现该功能的风险、对最终用户的预期价值、市场营销和销售影响、可维护性、可扩展性、法律限制等等。\n\
    \n这个阶段至关重要，因为它可以让你避免在后期浪费大量精力。规划错误可能导致价值数百万美元的资源浪费。另一方面，仔细的规划可以为业务在未来几年取得巨大成功奠定基础。规划阶段是应用你新获得的\
    \ 80/20 思维技巧的时候（参见[第 2 章](#)）。\n\n规划阶段也很难做好，因为涉及的复杂性。几个因素增加了复杂性：提前正确评估风险、确定公司或组织的战略方向、猜测客户的反应、权衡不同候选功能的积极影响，以及确定给定软件功能的法律含义。总的来说，解决这个多维问题的纯粹复杂性正在压垮我们。\n\
    \n### 定义\n\n定义阶段包括将规划阶段的结果转化为适当指定的软件需求。换句话说，它将前一阶段的输出形式化，以获得客户和最终用户的批准或反馈，他们将在以后使用该产品。\n\
    \n如果你花了很多时间来规划和确定项目需求，但未能很好地传达它们，这将在以后造成重大问题和困难。一个错误指定的、可能有助于项目的需求，可能和一个正确制定但无助于项目的需求一样糟糕。有效的沟通和精确的规范对于避免歧义和误解至关重要。在所有人类沟通中，由于“知识的诅咒”和其他高估个人经验相关性的心理偏见，将你的信息传达出去是一项高度复杂的任务。如果你试图将想法（或需求）从你的头脑中传递到另一个人的头脑中，请小心：复杂性正等着对付你！\n\
    \n### 设计\n\n设计阶段的目标是起草系统架构，决定交付已定义功能的模块和组件，并设计用户界面——同时牢记前两个阶段制定的需求。设计阶段的黄金标准是创建一个关于最终软件产品外观和构建方式的清晰图景。这适用于所有软件工程方法。敏捷方法只是更快地迭代这些阶段。\n\
    \n但魔鬼在于细节！一个优秀的系统设计师必须了解他们可能用来构建系统的各种软件工具的优缺点。例如，某些库可能对程序员来说易于使用，但执行速度较慢。构建自定义库对程序员来说更难，但可能导致更高的速度，从而提高最终软件产品的可用性。设计阶段必须确定这些变量，以使效益成本比最大化。\n\
    \n### 构建\n\n构建阶段是许多程序员希望投入所有时间的地方。这是从架构草案到软件产品的转变发生的地方。你的想法转化为有形的结果。\n\n通过前几个阶段的适当准备，许多复杂性已经被消除了。理想情况下，构建者应该知道从所有可能的功能中实现哪些功能，这些功能是什么样子，以及使用哪些工具来实现它们。然而，构建阶段总是充满新的和不断出现的问题。意外情况，如外部库中的错误、性能问题、数据损坏和人为错误，都可能减慢进度。构建软件产品是一项高度复杂的工作。一个小小的拼写错误就可能决定整个软件产品的正确性和可行性。\n\
    \n### 测试\n\n恭喜，你已经实现了所有请求的功能，程序似乎可以运行了。不过，你还没有完成。你仍然必须针对不同的用户输入和使用模式测试你的软件产品的行为。这个阶段通常是所有阶段中最重要的——以至于许多从业者现在提倡使用*测试驱动开发*，即在编写所有测试之前甚至不开始实现（在构建阶段）。虽然你可以反对这种观点，但花时间通过创建测试用例并检查软件是否为这些测试用例提供正确结果来测试你的产品，通常是一个好主意。\n\
    \n例如，假设你正在实现一辆自动驾驶汽车。你必须编写*单元测试*来检查代码中的每个小函数（一个*单元*）是否为给定的输入生成了所需的输出。单元测试通常会发现一些在某些（极端）输入下行为异常的有缺陷的函数。例如，考虑以下计算图像平均红、绿、蓝（RGB）颜色值的\
    \ Python 函数存根，可能用于区分你是穿过城市还是森林：\n\n```python\ndef average_rgb(pixels):\n    r\
    \ = [x[0] for x in pixels]\n    g = [x[1] for x in pixels]\n    b = [x[2] for\
    \ x in pixels]\n    n = len(r)\n    return (sum(r)/n, sum(g)/n, sum(b)/n)\n```\n\
    \n例如，以下像素列表将分别创建平均红、绿、蓝值为 96.0、64.0 和 11.0：\n\n```python\nprint(average_rgb([(0,\
    \ 0, 0),\n                   (256, 128, 0),\n                   (32, 64, 33)]))\n\
    ```\n\n输出如下：\n\n```\n(96.0, 64.0, 11.0)\n```\n\n尽管该函数看起来足够简单，但在实践中可能会出错。如果像素元组列表损坏，并且某些（红、绿、蓝）元组只有两个而不是三个元素怎么办？如果其中一个值是非整数类型怎么办？如果输出必须是整数元组以避免所有浮点计算固有的浮点错误怎么办？单元测试可以测试所有这些条件，以确保函数在隔离状态下正常工作。以下是两个简单的单元测试，一个检查函数在输入为零的边界情况下是否正常工作，另一个检查函数是否返回整数元组：\n\
    \n```python\ndef unit_test_avg():\n    print('Test average...')\n    print(average_rgb([(0,\
    \ 0, 0)]) == average_rgb([(0, 0, 0), (0, 0, 0)]))\n\ndef unit_test_type():\n \
    \   print('Test type...')\n    for i in range(3):\n        print(type(average_rgb([(1,\
    \ 2, 3), (4, 5, 6)])[i]) == int)\n\nunit_test_avg()\nunit_test_type()\n```\n\n\
    结果显示类型检查失败，函数没有返回正确的类型，即应该是整数元组值：\n\n```\nTest average...\nTrue\nTest type...\n\
    ```"
