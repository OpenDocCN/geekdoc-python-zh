    \n很难猜测这段代码计算的是什么。另一方面，清单 4-2 是语义等价的代码，但使用了有意义的变量名。\n\n```\ninvestments = 10000\n\
    yearly_return = 0.1\nyears = 10\n\nfor year in range(years):\n    print(investments\
    \ * (1 + yearly_return)**year)\n```\n\n清单 4-2：使用了有意义的变量名的代码\n\n这里发生的事情更容易理解：变量名表明了如何计算一笔\
    \ 10,000 的初始投资，在年回报率为 10% 的情况下，复利计算 10 年后的价值。\n\n虽然我们不会在这里深入探讨实现这一原则的所有方法（尽管后面的原则会更详细地介绍其中一些），但它也适用于其他可能澄清意图的方面，例如缩进、空格、注释和行长度等。简洁的代码从根本上优化了人类的可读性。正如国际软件工程专家、畅销书《重构》的作者马丁·福勒所言：“任何傻瓜都能写出计算机能理解的代码。优秀的程序员写出人类能理解的代码”（Addison-Wesley,\
    \ 1999）。\n\n## 原则四：使用正确的名称\n\n与此相关，经验丰富的程序员通常对函数、函数参数、对象、方法和变量（无论是隐式还是显式）有一套特定的命名约定达成共识。遵守这些约定对每个人都有好处：代码变得更具可读性、更易于理解、更整洁。如果你违反这些约定，代码的读者很可能会认为这是由一个缺乏经验的程序员编写的，并且可能不会认真对待你的代码。\n\
    \n这些约定可能因语言而异。例如，按照惯例，Java 使用 `camelCaseNaming` 来命名变量，而 Python 使用 `underscore_naming`\
    \ 来命名变量和函数。如果你开始在 Python 中使用驼峰命名法，可能会让读者感到困惑。你不希望你非传统的命名约定分散阅读你代码的人的注意力。你希望他们关注你的代码做了什么，而不是你的编码风格。正如*最小惊讶原则*所概述的，通过选择非常规的变量名来让其他程序员感到惊讶是没有价值的。\n\
    \n那么，让我们深入探讨一些在编写源代码时可以考虑的命名规则。\n\n-   选择描述性的名称。假设你创建了一个函数，用于在 Python 中将美元（USD）转换为欧元（EUR）。将其命名为\
    \ `usd_to_eur(amount)` 而不是 `f(x)`。\n-   选择无歧义的名称。你可能认为 `dollar_to_euro(amount)`\
    \ 是一个货币转换函数的好名字。虽然它比 `f(x)` 好，但比 `usd_to_eur(amount)` 差，因为它引入了不必要的歧义。你指的是美国、加拿大还是澳大利亚的美元？如果你在美国，答案对你来说可能显而易见，但一个澳大利亚的程序员可能不知道代码是在美国编写的，并可能假设不同的输出。尽量减少这些混淆！\n\
    -   使用可发音的名称。大多数程序员在潜意识里通过在心中发音来阅读代码。如果一个变量名不可发音，解读它的问题会耗费注意力和宝贵的心理空间。例如，变量名 `cstmr_1st`\
    \ 可能具有描述性且无歧义，但它不可发音。选择变量名 `customer_list` 完全值得在代码中多占用一些空间。\n-   使用命名常量，而不是魔术数字。在你的代码中，你可能多次使用魔术数字\
    \ 0.9 作为将美元金额转换为欧元金额的因子。然而，你的代码的读者——包括未来的你——必须思考这个数字的目的。它不是不言自明的。处理魔术数字 0.9 的一个好得多的方法是将其存储在一个全大写的变量中——用于表示它是一个不会改变的常量——例如\
    \ `CONVERSION_RATE = 0.9`，并在你的转换计算中将其用作因子。例如，你可能随后将你的收入计算为欧元：`income_euro = CONVERSION_RATE\
    \ * income_usd`。\n\n这些只是少数命名规则。除了这些快速提示之外，学习命名约定的最佳方式是研究专家精心编写的代码。谷歌搜索相关约定（例如，“Python\
    \ naming conventions”）是一个很好的起点。你也可以阅读编程教程，加入 StackOverflow 向其他程序员提问，查看开源项目的 GitHub\
    \ 代码，并加入 Finxter 博客社区，这是一个雄心勃勃的程序员互相帮助提升编程技能的社区。\n\n## 原则五：遵守标准并保持一致\n\n每种编程语言都有一套隐式或显式的规则，规定如何编写简洁的代码。如果你是一个活跃的程序员，这些标准最终总会追上你。然而，你可以通过花时间学习你正在学习的编程语言的代码标准来加速这个过程。\n\
    \n例如，你可以通过以下链接访问官方 Python 风格指南 PEP 8：https://www.python.org/dev/peps/pep-0008/。与任何风格指南一样，PEP\
    \ 8 定义了正确的代码布局和缩进；设置换行的方法；一行中的最大字符数；注释的正确使用；你自己的函数文档的编写；以及类、变量和函数的命名约定。例如，清单 4-3\
    \ 展示了 PEP 8 指南中关于正确使用不同样式和约定的正面示例。你每个缩进级别使用四个空格，一致地对齐函数参数，在参数列表中列出逗号分隔的值时使用单个空格，并通过用下划线组合多个单词来正确命名函数和变量：\n\
    \n```\n# Aligned with the opening delimiter.\nfoo = long_function_name(var_one,\
    \ var_two,\n                        var_three, var_four)\n\n# Add 4 spaces (an\
    \ extra level of indentation) to distinguish\n# arguments from the rest.\ndef\
    \ long_function_name(\n        var_one, var_two, var_three,\n        var_four):\n\
    \    print(var_one)\n\n# Hanging indents should add a level.\nfoo = long_function_name(\n\
    \    var_one, var_two,\n    var_three, var_four)\n```\n\n清单 4-3：根据 PEP 8 标准在 Python\
    \ 中使用缩进、空格和命名\n\n清单 4-4 展示了错误的做法。参数没有对齐，变量和函数名中的多个单词没有正确组合，参数列表没有用单个空格正确分隔，缩进级别只有两个或三个空格而不是四个：\n\
    \n```\n# Arguments on first line forbidden when not using vertical alignment.\n\
    foo = longFunctionName(varone,varTwo,\n    var3,varxfour)\n\n# Further indentation\
    \ required as indentation is not distinguishable.\ndef longfunctionname(\n   \
    \ var1,var2,var3,\n    var4):\n    print(var_one)\n```\n\n清单 4-4：在 Python 中错误地使用缩进、空格和命名\n\
    \n你代码的所有读者都会期望你遵守公认的标准。任何其他做法都会导致混淆和挫败感。\n\n然而，通读风格指南可能是一项乏味的任务。作为一种不那么枯燥的学习约定和标准的方法，使用代码检查工具和集成开发环境（IDE），它们会告诉你在哪里以及如何犯了错误。在与我的\
    \ Finxter 团队参加的一个周末黑客马拉松中，我们创建了一个名为 *Pythonchecker.com* 的工具，它以一种有趣的方式帮助你将 Python\
    \ 代码从混乱重构为超级整洁。对于 Python，这方面最好的项目之一是 PyCharm 的 *black* 模块。所有主要编程语言都有类似的工具。只需在网上搜索\
    \ *<Your Language> Linter* 即可找到适合你编程环境的最佳工具。\n\n## 原则六：使用注释\n\n如前所述，当为人类而非机器编写代码时，你需要使用注释来帮助读者理解它。考虑清单\
    \ 4-5 中没有注释的代码。\n\n```\nimport re\n\ntext = '''\n    Ha! let me see her: out,\
    \ alas! She's cold:\n    Her blood is settled, and her joints are stiff;\n   \
    \ Life and these lips have long been separated:\n    Death lies on her like an\
    \ untimely frost\n    Upon the sweetest flower of all the field.\n'''\n```"
