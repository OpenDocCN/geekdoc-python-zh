- md: "You can share flat text files easily, open them in any text editor, and modify\
    \ them manually. However, this convenience comes at the cost of efficiency: a\
    \ data format specialized for a specific purpose could store and read the data\
    \ much more efficiently. Databases, for example, use their own data files on disk,\
    \ which use optimizations, like detailed indices and compression schemes to represent\
    \ dates. If you opened them, you wouldn’t understand a thing. These optimizations\
    \ allow programs to read from the data with less memory consumption and less overhead\
    \ than general flat text files. In a flat file, a system would have to scan the\
    \ whole file to read a specific line. Web applications also require a more efficient\
    \ optimized data representation to allow users quick access with low latency,\
    \ so they rarely use flat representations and databases.\n\nHowever, you should\
    \ use optimized data representations only if you’re sure you need them—for example,\
    \ if you create an application that is highly performance-sensitive, such as the\
