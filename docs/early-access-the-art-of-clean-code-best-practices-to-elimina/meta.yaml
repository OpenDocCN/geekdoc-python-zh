    closer to the successful completion of the larger code project. (2) *The feedback
    mechanism in your environment must be present, and, preferably, immediate*. Find
    people, in person or online, to review your work, and follow the MVP principle.
    (3) *There’s a balance between opportunity and capacity*. If the task is too easy,
    you’ll lose the rush of excitement; if it’s too hard, you’ll throw in the towel
