- md: "## 7\n\n### DO ONE THING WELL AND OTHER UNIX PRINCIPLES\n\n> This is the Unix\
    \ philosophy: Write programs that do one thing and do it well. Write programs\
    \ to work together. Write programs to handle text streams, because that is a universal\
    \ interface. [...]\n> —Douglas McIlroy\n\nThe prevailing philosophy of the Unix\
    \ operating system is simple: do one thing well. This means, for example, that\
    \ it’s generally better to create a function or module that can solve one problem,\
    \ reliably and efficiently, rather than trying to tackle multiple problems at\
    \ the same time. Later in this chapter, you’ll see some Python code examples of\
    \ “do one thing well” in action and learn how the Unix philosophy applies to programming.\
    \ I’ll then present the top principles employed by some of the world’s most accomplished\
    \ computer engineers in creating today’s operating systems. If you’re a software\
    \ engineer, you’ll find much valuable advice on writing better code in your own\
    \ projects.\n\nBut first things first: What is Unix anyway, and why should you\
    \ care?\n\n### The Rise of Unix\n\nUnix is a design philosophy that inspired many\
    \ of the most popular operating systems today, including Linux and macOS. The\
    \ family of Unix operating systems emerged in the late 1970s when Bell Systems\
    \ made the source code of its technology open to the public. Since then, a multitude\
    \ of extensions and new versions has been developed by universities, individuals,\
    \ and corporations.\n\nToday, the trademarked Unix standard certifies that operating\
    \ systems meet specific quality requirements. Unix and Unix-like operating systems\
    \ have a major impact on computing. About 7 out of 10 web servers run on Linux\
    \ systems that use Unix as their base. Most supercomputers today run Unix-based\
    \ systems. Even the macOS is a registered Unix system.\n\nLinus Torvalds, Ken\
    \ Thompson, Brian Kernighan—the list of Unix developers and maintainers contains\
    \ the names of some of the world’s most impactful coders across the globe. You\
    \ would think there must be great organizational systems in place to allow programmers\
    \ all over the world to collaborate to build the massive ecosystem of Unix code\
    \ comprising millions of lines of code. And rightly so! The philosophy that enables\
    \ this scale of collaboration is the acronym DOTADIW (seriously)—or *do one thing\
    \ and do it well*. Whole books have been written about the Unix philosophy, so\
    \ here we’ll just focus on the most relevant ideas and use Python code snippets\
    \ to showcase some examples. To the best of my knowledge, no book has ever contextualized\
    \ the Unix principles for the Python programming language before. So, let’s get\
    \ started!\n\n### Philosophy Overview\n\nThe basic idea of the Unix philosophy\
    \ is to build simple, clear, concise, modular code that is easy to extend and\
    \ maintain. This can mean many different things—more on this later in the chapter—but\
    \ the goal is to allow many humans to work together on a codebase by prioritizing\
    \ readability over efficiency and favoring composability over monolithic design.\
    \ Monolithic applications are designed without modularity, meaning large parts\
    \ of the code logic cannot be reused, executed, or debugged without accessing\
    \ the overall application.\n\nSay you write a program that takes a uniform resource\
    \ locator (URL) and prints the HTML from this URL on the command line. Let’s call\
    \ this program `url_to_html()`. According to the Unix philosophy, this program\
    \ should do one thing well, and that one thing is to take the HTML from the URL\
    \ and print it to the shell (see Listing 7-1). That’s it.\n\n```python\nimport\
    \ urllib.request\n\ndef url_to_html(url):\n    html = urllib.request.urlopen(url).read()\n\
    \    return html\n```\n\nListing 7-1: A simple code function that reads the HTML\
    \ from a given URL and returns the string\n\ngood at? What are your specific interests\
    \ in the broad area of computer science? Make lists to answer those questions.\
    \ One of the activities that will most benefit your progression is figuring out\
    \ your strengths and then brutally structuring your day around those.\n\n**Block\
    \ out your coding time in large chunks.** This will give you time to both comprehend\
    \ the issues and tasks ahead of you—every coder knows that it takes time to load\
    \ a complicated code project into their head—and get into the rhythm of your tasks.\
    \ Say Alice and Bob work on a given code project. It takes 20 minutes to attain\
    \ a state where each completely understands the demands of their code project\
    \ by glancing over the project, diving into a few code functions, and thinking\
    \ about the big picture. Alice spends three hours every three days on the project,\
    \ while Bob spends one hour every day. Who will make more progress in the project?\
    \ Alice works 53 minutes on the project per day ([3 hours – 20 minutes] ÷ 3).\
    \ Given the high constant loading time, Bob works only 40 minutes on the project\
    \ every day. Thus, all other things being equal, Alice will outwork Bob by 13\
    \ minutes every day. She has a much higher chance of achieving a state of flow\
    \ as she can dive deeper into the problem and lose herself entirely in it.\n\n\
    **Eliminate distractions during your flow time.** It seems obvious, but how seldomly\
    \ it is implemented! Coders who can reduce distractions—social networks, entertainment\
    \ applications, chitchat about colleagues—attain flow much more often than coders\
    \ who can’t. To reach success, you must do what most others are unwilling to do:\
    \ shut down distractions. Switch off your smartphone and close that social media\
    \ tab.\n\n**Do the obvious things you know you need to do,** outside of the task\
    \ at hand: get plenty of sleep, eat healthily, and get regular exercise. As a\
    \ coder, you know the expression *garbage-in, garbage-out*: if you feed a system\
    \ with bad inputs, you’ll obtain bad results. Try to cook a tasty meal with decayed\
    \ food—almost impossible! High-quality input leads to high-quality output.\n\n\
    **Consume high-quality information** because the better your inputs, the better\
    \ your output. Read programming books instead of shallow blog articles; better\
    \ yet, read research papers published in top-rated journals, the highest quality\
    \ information there is.\n\n## Conclusion\n\nTo summarize, here are some of the\
    \ easiest ways in which you can begin to attempt to attain flow: block large chunks\
    \ of time, focus on one task, stay healthy and sleep properly, set clear goals,\
    \ find work you enjoy doing, and actively seek flow.\n\nIf you seek flow, you’ll\
    \ eventually find it. If you systematically work in a state of flow daily, you’ll\
    \ boost your work productivity by an order of magnitude. This is a simple yet\
    \ powerful concept for programmers and other knowledge workers alike. As Mihaly\
    \ Csikszentmihalyi says:\n\n> The best moments in our lives are not the passive,\
    \ receptive, relaxing times… The best moments usually occur if a person’s body\
    \ or mind is stretched to its limits in a voluntary effort to accomplish something\
    \ difficult and worthwhile.\n\nIn the next chapter, you’ll dive into the Unix\
    \ philosophy about *doing one thing well*, a principle that’s proven to be not\
    \ only an excellent way to create a scalable operating system but also a great\
    \ way to live by as well!\n\n## References\n\n- F. Massimini, M. Csikszentmihalyi,\
    \ and M. Carli, “The monitoring of optimal experience: A tool for psychiatric\
    \ rehabilitation,” *Journal of Nervous and Mental Disease* 175, no. 9 (September\
    \ 1987).\n- Rony Sklar, “Hyperfocus in adult ADHD: An EEG study of the differences\
    \ in cortical activity in resting and arousal states” (M.A. thesis, University\
    \ of Johannesburg, 2013), http://hdl.handle.net/10210/8640.\n- Kevin Rathunde,\
    \ “Montessori Education and Optimal Experience: A Framework for New Research,”\
    \ *NAMTA Journal* 26, no. 1 (January 2001): 11–43.\n- Steven Kotler, “How to Get\
    \ Into The Flow State,” filmed at A-Fest Jamaica, February 19, 2019, Mindvalley\
    \ video, https://youtu.be/XG_hNZ5T4nY.\n- Troy Erstling, “The Neurochemistry of\
    \ Flow States,” *Troy Erstling* (blog), https://troyerstling.com/the-neurochemistry-of-flow-states/.\n\
    - Owen Schaffer, “Crafting Fun User Experiences: A Method to Facilitate Flow,”\
    \ *Human Factors International* white paper (2015), https://humanfactors.com/hfi_new/whitepapers/crafting_fun_ux.asp."
  mdcn: "## 7\n\n### 专注一事及其他Unix原则\n\n> 这就是Unix哲学：编写只做一件事并把它做好的程序。编写能协同工作的程序。编写能处理文本流的程序，因为那是一个通用的接口。[...]\n\
    > ——道格拉斯·麦克罗伊\n\nUnix操作系统盛行的哲学很简单：专注一事。例如，这意味着通常最好创建一个能可靠高效地解决一个问题的函数或模块，而不是试图同时处理多个问题。在本章后面，你将看到一些Python代码示例，展示“专注一事”的实际应用，并了解Unix哲学如何应用于编程。然后，我将介绍一些世界上最杰出的计算机工程师在创建当今操作系统时所采用的首要原则。如果你是一名软件工程师，你将发现许多关于在自己的项目中编写更好代码的宝贵建议。\n\
    \n但首先：Unix到底是什么，你为什么应该关心它？\n\n### Unix的崛起\n\nUnix是一种设计哲学，它启发了当今许多最受欢迎的操作系统，包括Linux和macOS。Unix操作系统家族诞生于20世纪70年代末，当时贝尔系统将其技术的源代码向公众开放。此后，大学、个人和公司开发了大量的扩展和新版本。\n\
    \n如今，受商标保护的Unix标准认证操作系统符合特定的质量要求。Unix和类Unix操作系统对计算领域产生了重大影响。大约十分之七的Web服务器运行在以Unix为基础的Linux系统上。如今大多数超级计算机运行基于Unix的系统。即使是macOS也是一个注册的Unix系统。\n\
    \n林纳斯·托瓦兹、肯·汤普森、布莱恩·柯林汉——Unix开发者和维护者的名单中包含了一些全球最具影响力的程序员的名字。你可能会认为，一定有强大的组织系统，才能让世界各地的程序员协作构建由数百万行代码组成的庞大Unix代码生态系统。确实如此！实现这种规模协作的哲学是首字母缩写词DOTADIW（说真的）——或者*专注一事并把它做好*。关于Unix哲学的书籍已经有很多，所以这里我们只关注最相关的理念，并使用Python代码片段来展示一些例子。据我所知，此前还没有任何书籍将Unix原则置于Python编程语言的背景下进行阐述。那么，让我们开始吧！\n\
    \n### 哲学概述\n\nUnix哲学的基本思想是构建简单、清晰、简洁、模块化的代码，易于扩展和维护。这可能意味着许多不同的事情——本章后面会详细讨论——但目标是让许多人能够在一个代码库上协同工作，优先考虑可读性而非效率，并倾向于可组合性而非单体设计。单体应用程序在设计时没有模块化，这意味着大部分代码逻辑无法在不访问整个应用程序的情况下重用、执行或调试。\n\
    \n假设你编写了一个程序，它接受一个统一资源定位符（URL），并在命令行打印该URL的HTML内容。我们称这个程序为`url_to_html()`。根据Unix哲学，这个程序应该专注一事，而这一件事就是获取URL的HTML并将其打印到shell（见清单7-1）。仅此而已。\n\
    \n```python\nimport urllib.request\n\ndef url_to_html(url):\n    html = urllib.request.urlopen(url).read()\n\
    \    return html\n```\n\n清单7-1：一个简单的代码函数，从给定的URL读取HTML并返回字符串\n\n擅长什么？在计算机科学的广阔领域中，你具体对什么感兴趣？列出清单来回答这些问题。最有益于你进步的活动之一，就是找出你的优势，然后严格地围绕这些优势安排你的一天。\n\
    \n**将你的编码时间划分为大块。** 这将给你时间去理解前方的问题和任务——每个程序员都知道，将一个复杂的代码项目加载到脑海中需要时间——并进入你任务的节奏。假设爱丽丝和鲍勃在一个给定的代码项目上工作。通过浏览项目、深入研究几个代码函数并思考全局，他们需要20分钟才能达到完全理解代码项目要求的状态。爱丽丝每三天花三小时在这个项目上，而鲍勃每天花一小时。谁会在项目上取得更多进展？爱丽丝每天在这个项目上工作53分钟（[3小时\
    \ – 20分钟] ÷ 3）。考虑到较高的恒定加载时间，鲍勃每天只在这个项目上工作40分钟。因此，在其他条件相同的情况下，爱丽丝每天将比鲍勃多工作13分钟。她更有可能达到心流状态，因为她可以更深入地钻研问题并完全沉浸其中。\n\
    \n**在你的心流时间消除干扰。** 这似乎显而易见，但实施起来却多么少见！能够减少干扰——社交网络、娱乐应用、关于同事的闲聊——的程序员比不能做到的程序员更容易达到心流状态。要取得成功，你必须做大多数其他人不愿意做的事：消除干扰。关掉你的智能手机，关闭那个社交媒体标签页。\n\
    \n**做你知道需要做的显而易见的事情，** 在手头任务之外：保证充足的睡眠，健康饮食，定期锻炼。作为一名程序员，你知道*垃圾进，垃圾出*这个说法：如果你给系统输入糟糕的数据，你就会得到糟糕的结果。试着用腐烂的食物做一顿美味的饭菜——几乎不可能！高质量的输入带来高质量的输出。\n\
    \n**消费高质量的信息，** 因为你的输入质量越高，你的输出质量就越高。阅读编程书籍，而不是浅薄的博客文章；更好的是，阅读顶级期刊上发表的研究论文，那是最高质量的信息。\n\
    \n## 结论\n\n总结一下，以下是一些你可以开始尝试达到心流状态的最简单方法：划出大块时间，专注于一项任务，保持健康并合理睡眠，设定明确的目标，找到你喜欢做的工作，并积极寻求心流。\n\
    \n如果你寻求心流，你最终会找到它。如果你每天系统地在心流状态下工作，你将把工作效率提高一个数量级。对于程序员和其他知识工作者来说，这是一个简单而强大的概念。正如米哈里·契克森米哈赖所说：\n\
    \n> 我们生命中最美好的时刻，不是被动、接受、放松的时刻……最美好的时刻通常发生在一个人的身体或心灵在自愿努力完成某件困难而有价值的事情时，被推向极限。\n\
    \n在下一章中，你将深入探讨关于*专注一事*的Unix哲学，这一原则已被证明不仅是创建可扩展操作系统的绝佳方式，也是生活的绝佳方式！\n\n## 参考文献\n\
    \n- F. Massimini, M. Csikszentmihalyi, and M. Carli, “The monitoring of optimal\
    \ experience: A tool for psychiatric rehabilitation,” *Journal of Nervous and\
    \ Mental Disease* 175, no. 9 (September 1987).\n- Rony Sklar, “Hyperfocus in adult\
    \ ADHD: An EEG study of the differences in cortical activity in resting and arousal\
    \ states” (M.A. thesis, University of Johannesburg, 2013), http://hdl.handle.net/10210/8640.\n\
    - Kevin Rathunde, “Montessori Education and Optimal Experience: A Framework for\
    \ New Research,” *NAMTA Journal* 26, no. 1 (January 2001): 11–43.\n- Steven Kotler,\
    \ “How to Get Into The Flow State,” filmed at A-Fest Jamaica, February 19, 2019,\
    \ Mindvalley video, https://youtu.be/XG_hNZ5T4nY.\n- Troy Erstling, “The Neurochemistry\
    \ of Flow States,” *Troy Erstling* (blog), https://troyerstling.com/the-neurochemistry-of-flow-states/.\n\
    - Owen Schaffer, “Crafting Fun User Experiences: A Method to Facilitate Flow,”\
    \ *Human Factors International* white paper (2015), https://humanfactors.com/hfi_new/whitepapers/crafting_fun_ux.asp."
