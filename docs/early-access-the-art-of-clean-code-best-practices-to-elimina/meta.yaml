    ## 80/20 Practice Tips


    Let''s finish this chapter with ten practice tips to leverage the power of the
    Pareto principle.


    **Figure out your success metrics.**

    Define your industry first. Identify what the most successful professionals in
    your industry are doing exceptionally well and which tasks you can do every day
    to push you closer toward the top 20 percent. If you''re a coder, your success
    metric may be the number of lines of code written. If you''re an author, your
    success metric may be the number of words written toward the next book. Create
    a spreadsheet and track your success metric every day. Make it a game to stick
    to it and surpass yourself. Set a minimum threshold, and don''t end the day until
    you''ve accomplished the minimal threshold each day. Better yet, don''t start
    the day until you have!


    **Figure out your big goals in life.**

    Write them down. Without clearly defined big goals (think: 10-year goals), you
    won''t stick to one thing for a sufficiently long time. You have seen that a critical
    strategy for moving up the Pareto curve is to stay in the game longer while participating
    in fewer games.


    **Look for ways to achieve the same things with fewer resources.**

    How can you accomplish 80 percent of the result in 20 percent of the time? Can
    you remove the remaining activities that take 80 percent of the time but lead
    only to 20 percent of the results? If not, can you outsource them? Fiverr and
    Upwork are cheap ways to find talent, and it pays to leverage the skills of other
    people.


    **Reflect on your own successes.**

    What did you do that led to great results? How can you do more of those things?


    **Reflect on your own failures.**

    How can you do less of the things that are responsible for the failure?


    **Read more books in your industry.**

    By reading more books, you simulate practical experience without the massive time
    and energy investment of actually experiencing it. You learn from the mistakes
    of others. You learn about new ways of doing things. You acquire more skills in
    your field. A highly educated expert coder can solve a problem 10–100 times quicker
    than a beginner can. Reading books in your field is likely to be one of the success
    metrics in your field that will catapult you to success.


    **Spend much of your time improving and tweaking existing products.**

    Do this rather than inventing new products. Again, this comes from the Pareto
    distribution. If you have one product in your business, you can invest all your
    energy pushing this one product up the Pareto curve, generating exponentially
    increasing results for you and your company. But if you create new products all
    the time without improving and optimizing the old ones, you’ll always have subaverage
    products. Never forget: the big results are found on the left of the Pareto distribution.


    **Smile.**

    It’s surprising how simple some consequences are. If you’re a positive person,
    many things will be easier. More people will collaborate with you. You’ll experience
    more positivity, happiness, and support. Smiling is a highly leveraged activity
    with massive impact and little cost.


    **Don’t do things that reduce value.**

    These are things like smoking, eating unhealthily, sleeping little, drinking alcohol,
    and watching too much Netflix. Avoiding things that drag you down is one of your
    biggest leverage points. If you skip doing things that harm you, you’ll become
    healthier, happier, and more successful. And you’ll have more time and money to
    enjoy the good things in life: relationships, nature, and positive experiences.


