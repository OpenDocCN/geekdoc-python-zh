    \ like using an app to plan your journey rather than working out every detail\
    \ with a paper map.\n\n> See https://pythononeliners.com/ for a video explaining\
    \ this solution.\n\n## 8. Avoid Captive User Interfaces\n\nCaptive user interfaces\
    \ are those that require the user to interact with the program before proceeding\
    \ with the main execution flow. Examples are mini-programs such as Secure Shell\
    \ (SSH), top, cat, and vim, as well as programming language features such as Python's\
    \ input() function. Captive user interfaces limit the usability of the code because\
    \ they're not designed to run without human involvement. However, oftentimes the\
    \ functionality provided by the code behind the captive user interface is also\
    \ useful for automated programs that must be able to run without manual interaction\
    \ with users. Roughly speaking, if you put good code behind a captive user interface,\
    \ it's not reachable without user interaction!\n\nSay you create a simple life\
