    \n> NOTE I’ve set up an interactive Jupyter notebook for you to run this example\
    \ in here: https://blog.finxter.com/clean-code/#Olivetti_Faces/.\n\n## 7. Use\
    \ Software Leverage to Your Advantage\n\nUsing leverage means applying a small\
    \ amount of energy to multiply the effects of your effort. In finance, for example,\
    \ leverage means to use other people's money to invest and grow. In a large corporation,\
    \ it might mean employing thousands of employees to provide time and energy. As\
    \ a programmer, you should leverage the collective wisdom of generations of coders\
    \ before you: use libraries for complex functionality rather than coding it from\
    \ scratch, use StackOverflow and the wisdom of the crowd to fix bugs in your code,\
    \ or ask other programmers to review your code. These are forms of leverage that\
    \ allow you to accomplish far more with far less effort.\n\nThe second source\
    \ of leverage comes from computing power. A computer can perform work much faster\
    \ (and at much lower costs) than a human being. Create better software, share\
    \ it with more people, employ more computing power, and use other people's libraries\
    \ and software more often. Good coders create good source code quickly, but great\
    \ coders tap into the many sources of leverage available to them to elevate their\
    \ code.\n\nAs an example, Listing 7-8 shows a one-liner program from my book,\
    \ *Python One-Liners* (No Starch Press, 2020), that scrapes a given HTML document\
