    <a href=\"http://finxter.com/\">Solve more Python puzzles</a>\n\n</body>\n</html>\n\
    '''\n\n## One-Liner\npractice_tests = re.findall(\"(<a.*?finxter.*?(test|puzzle).*?>)\"\
