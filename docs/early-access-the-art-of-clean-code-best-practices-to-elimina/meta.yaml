    \ or structure of interactions between system components. In this book, we’re\
    \ going to use it more generically.\n\nWe’ll define complexity as follows:\n\n\
    **Complexity** “a whole, made up of parts, that is difficult to analyze, understand,\
    \ or explain”\n\nComplexity describes a whole system or entity. Because of the\
    \ difficulty in explaining this system, complexity causes struggle and confusion.\
    \ Because real-world systems are messy, you’ll find complexity everywhere: the\
