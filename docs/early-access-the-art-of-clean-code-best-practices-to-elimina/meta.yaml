  md: '# # What is Complexity?


    In different fields, the term “complexity” comes with different meanings. Sometimes,
    it’s strictly defined, such as the *computational complexity* of a computer program
    that provides a means to analyze a given code function for varying inputs. Other
    times, it’s loosely defined as the amount or structure of interactions between
    system components. In this book, we’re going to use it more generically.


    We’ll define complexity as follows:


    **Complexity** “a whole, made up of parts, that is difficult to analyze, understand,
    or explain”


    Complexity describes a whole system or entity. Because of the difficulty in explaining
    this system, complexity causes struggle and confusion. Because real-world systems
    are messy, you’ll find complexity everywhere: the stock market, social trends,
    emerging political viewpoints, and big computer programs with hundreds of thousands
    of lines of code—such as the Windows operating system.


    If you’re a coder, you are especially prone to overwhelming complexity, such as
    from these different sources that we’ll cover in this chapter:


    +   - Complexity in a project life cycle

    - Complexity in software and algorithmic theory

    - Complexity in learning

    - Complexity in processes

    - Complexity in social networks

    - Complexity in your daily life


    # # Complexity in a Project Life Cycle


    Let’s dive into the different stages of the project life cycle: planning, defining,
    designing, building, testing, and deployment (see Figure 1-1).


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_17_0.png)


    > Figure 1-1: These are the six conceptual phases of a software project based
    on the official Institute of Electrical and Electronics Engineers (IEEE) standard
    for software engineering.'
  merge: -1
  pgno: 17
- img_proc: true
  md: 'Even if you’re working on a very small software project, you’re likely going
    through all six phases of the software development life cycle. Note that you may
    not necessarily go through each phase only once—in modern software development,
    a more iterative approach is generally preferred where each phase is revisited
    multiple times. Next, we’ll look at how complexity has a significant impact on
    each phase.


    # Planning


    The first stage of the software development life cycle is the planning phase,
    sometimes known in engineering literature as *requirement analysis*. The purpose
    of this phase is to determine how the product will look. A successful planning
    phase leads to a strictly defined set of required features to deliver to the end
    user.


    Whether you’re a single person working on your hobby project or you’re responsible
    for managing and orchestrating collaboration among multiple software development
    teams, you must figure out the optimal set of features of the software. A number
    of factors must be taken into consideration: the costs of building a feature,
    the risk of not being able to successfully implement the feature, the expected
    value for the end user, marketing and sales implications, maintainability, scalability,
    legal restrictions, and many more.


    This phase is crucial because it can save you from wasting massive amounts of
    energy later. Planning mistakes can lead to millions of dollars’ worth of wasted
    resources. On the other hand, careful planning can set the business up for great
    success in the years to follow. The planning phase is a time to apply your newly
    acquired skill of 80/20 thinking (see [Chapter 2](#)).


    The planning phase is also difficult to do right because of the complexity involved.
    Several considerations add to the complexity: assessing risk properly in advance,
    figuring out the strategic direction of a company or an organization, guessing
    the customers’ responses, weighing the positive impact of different feature candidates,
    and determining the legal implications of a given software feature. Taken together,
    the sheer complexity of solving this multi-dimensional problem is killing us.


    # Defining


    The defining phase consists of translating the results from the planning phase
    into properly specified software requirements. In other words, it formalizes the
    output of the previous phase to gain approval or feedback from clients and end
    users who will later use the product.


    If you’ve spent a lot of time planning and figuring out the project requirements
    but fail in communicating them well, it’ll cause significant problems and difficulties
    later. A wrongly specified requirement that helps the project may be just as bad
    as a correctly formulated requirement that doesn’t. Effective communication and
    precise specification are crucial to avoid ambiguities and misunderstandings.
    In all human communication, getting your message across is a highly complex endeavor
    due to the “curse of knowledge” and other psychological biases that overweight
    the relevance of personal experiences. If you try to deliver ideas (or requirements
    for that'
  merge: -1
  pgno: 18
- img_proc: true
  md: 'matter) out of your head and into another one’s head, be careful: complexity
    is out to get you!


    # Designing


    The goal of the designing phase is to draft the architecture of the system, decide
    on the modules and components that deliver the defined functionality, and design
    the user interface—while keeping the requirements developed in the previous two
    phases in mind. The gold standard of the designing phase is to create a crystal-clear
    picture of how the final software product will look and how it’s built. This holds
    for all methods of software engineering. Agile approaches would just iterate over
    those phases more quickly.


    But the devil lies in the detail! A great system designer must know about the
    pros and cons of a huge variety of software tools they may use to build the system.
    For example, some libraries may be easy for the programmer to use but slow in
    execution speed. Building custom libraries is harder for the programmers but may
    result in much higher speed and, consequently, improved usability of the final
    software product. The designing phase must fix these variables so that the benefit-and-costs
    ratio is maximized.


    # Building


    The building phase is where many coders want to spend all their time. This is
    where the transformation from the architectural draft to the software product
    happens. Your ideas transform into tangible results.


    Through proper preparation in the previous phases, a lot of complexity has already
    been eliminated. Ideally, the builders should know which features to implement
    from all the possible features, how the features look, and which tools to use
    to implement them. Yet, the building phase is always full of new and emerging
    problems. Unexpected things like bugs in external libraries, performance issues,
    corrupted data, and human mistakes can slow progress. Building a software product
    is a highly complicated endeavor. A small spelling mistake can determine the correctness
    and viability of the whole software product.


    # Testing


    Congratulations, you’ve implemented all requested features and the program seems
    to work. You’re not done yet, though. You still must test the behavior of your
    software product for different user inputs and usage patterns. This phase is often
    the most important of all—so much so that many practitioners now advocate the
    use of *test-driven development* where you don’t even start to implement (in the
    building phase) without having written all tests. While you can argue against
    that point of view, it’s generally a good idea to spend time testing your product
    by creating test cases and checking if the software delivers the correct result
    for these test cases.


    For example, say you’re implementing a self-driving car. You must write *unit
    tests* to check that each little function (a *unit*) in your code generates the
    desired output for a given input. Unit tests will usually uncover some faulty
    functions that behave strangely under certain (extreme) inputs. For'
