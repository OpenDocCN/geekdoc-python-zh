    **Activities** Twenty percent of the 20 percent of the 20 percent of the activities
    you have done this week are often responsible for 80 percent of the 80 percent
    of the 80 percent of your results. In this scenario, 0.8 percent of the activities
    will lead to 51 percent of the results. Roughly speaking, if you''re working 40
