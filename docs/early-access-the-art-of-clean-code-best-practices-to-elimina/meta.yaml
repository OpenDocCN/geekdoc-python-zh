    such as a dedicated website that hosts the coding puzzles and their correct solutions.
    This method would have allowed me to build the Finxter app in a fraction of the
    time and with a fraction of the unnecessary features. The lesson of building an
    MVP stripped from all unnecessary features is one I’ve learned the hard way.


    The idea of an MVP was popularized by entrepreneur Eric Ries in his best-selling
    book *The Lean Startup* (Crown Publishing, 2011). The billion-dollar company Dropbox
    famously adopted the MVP approach. Instead of spending time and effort on an untested
    idea to implement the complicated Dropbox functionality of synchronizing folder
    structures into the cloud—which requires a tight integration in different operating
    systems and a thorough implementation of burdensome distributed systems concepts
    such as replica synchronization—according to *The Lean Startup*, the founders
    validated the idea with a simple product video, even though the product featured
    in the video didn’t exist yet. Countless iterations followed the validated Dropbox
    MVP to add more helpful features to the core project that simplify the lives of
    their users. Since then, the concept has been tested by thousands of successful
    companies in the software industry (and beyond).'
- md: 'If the market signals that users love and value your product idea, you’ve achieved
    product-market fit with just a simple, well-crafted MVP. From there, you can iteratively
    build and refine your MVPs.


    When you use an MVP-based approach for software development, adding one feature
    at a time, it’s important to be able to identify which feature to keep and which
    to reject. The final step of the MVP software creation process is *split testing*:
    rather than release the iterations with new features to your entire user base,
    you launch the new product to a fraction of your users and observe the implicit
    and explicit response. Only if you like what you see—for example, the average
    time spent on your website increases—do you keep the feature. Otherwise, you reject
    it and stay with the previous iteration without the feature. This means you must
    sacrifice the time and energy you spent developing the feature, but it does allow
    you to keep your product as simple as possible, allowing you to remain agile,
    flexible, and efficient. By using split tests, you engage in data-driven software
    development.


    ## Four Pillars of Building a Minimum Viable Product


    When building your first software based on MVP thinking, consider these four pillars:


    **Functionality** The product provides a clearly formulated function to the user,
    and it does it well. The function doesn’t have to be provided with great economic
    efficiency. Your MVP for a chat bot might actually just be you chatting with the
    user yourself; this clearly could not scale, but you’re demonstrating the functionality
    of high-quality chatting—even if you haven’t figured out how to provide this functionality
    in an economically feasible way yet.


    **Design** The product is well designed and focused, and its design supports the
    value that your product offers to your target niche. One common mistake in MVP
    generation is that you create an interface that doesn’t accurately reflect your
    single-function MVP website. The design can be straightforward, but it must support
    the value proposition. Think Google search—they certainly didn’t spend lots of
    effort on design when releasing their first version of the search engine, but
    the design was well suited for the product they offered: distraction-free search.


    **Reliability** Just because your product is minimal doesn’t mean it can be unreliable.
    Make sure to write test cases and test all functions in your code rigorously.
    Otherwise, your learnings from the MVP will be corrupted by the negative user
    feedback based on its unreliability, and not feedback on the features directly.
    Remember: you want to maximize learning with minimal effort.


    **Usability** The MVP must be easy to use. The functionality is clearly articulated,
    and the design supports it. Users don’t need to spend a lot of time figuring out
    what to do or which buttons to click. The MVP is responsive and fast enough to
    allow fluent interactions. This is often simpler to achieve with a focused, minimalistic
    product: it is obvious how you should use a page with one button and one input
    field. Again, the Google search engine’s initial prototype is a prime example,
    and it was so usable that it lasted for more than two decades.


    Many people frequently misunderstand this characteristic of MVPs: they wrongly
    assume that, because it’s an extremely minimalist version of a product, an MVP
    must provide little value, bad usability, and a lazy design. However, the minimalist
    knows that the concision of an MVP actually comes from a rigorous focus on one
    core functionality rather than from lazy product creation. For Dropbox, creating
    an effective video showcasing intention was easier than implementing the service
    itself. The MVP was a high-quality product with great functionality, design, reliability,
    and usability.


    ## Advantages of the Minimum Viable Product


    The advantages of MVP-driven software design are manifold.


    - You can test your hypotheses as cheaply as possible.

    - You can often avoid actually writing the code until you know it’s necessary,
    and then when you do write code, you minimize the amount of work before gathering
    real-world feedback.

    - You need much less time writing code and finding bugs—and if you do, you’ll
    know that this activity is highly valuable for your users.

    - Any new feature you ship to users provides instant feedback, and the continuous
    progress keeps you and your team motivated to crank out feature after feature.
    This dramatically minimizes the risks you’re exposed to in the stealth mode of
    programming.

    - You reduce the maintenance costs in the future because the MVP approach reduces
    the complexity of your codebase by a long shot—and all future features will be
    easier and less error prone.

    - You’ll make faster progress, and implementation will be easier throughout the
    life of your software—which keeps you in a motivated state and on the road to
    success.

    - You’ll ship products faster, earn money from your software faster, and build
    your brand more predictably and reliably.


    ## Stealth versus Minimum Viable Product Approach


    A common counterargument against rapid prototyping and *for* the stealth mode
    of programming is that stealth programming protects your ideas. People assume
    their idea is special and unique enough that if they release it in the raw form,
    as an MVP, it will get stolen by larger and more powerful companies who can implement
    it more quickly. Frankly, this is a fallacy. Ideas are cheap; execution is king.
    Any given idea is unlikely to be unique, and there’s a strong chance your idea
    has already been thought of by some other person. Rather than reducing competition,
    the stealth mode of programming may even encourage others to work on the same
    idea, because like you, they assume that nobody else has already thought of it.
    For an idea to succeed, it takes a person to push it into reality. If you fast
    forward a few years, the person that succeeded will be the one who took quick
    and decisive action, released early and often, incorporated feedback from real
    users, and gradually improved their software by building on the momentum of previous
    releases. Keeping the idea secret would simply restrict its growth potential.


    ## Conclusion


    Envision your end product and think about the needs of your users before you write
    any code. Work on your MVP and make it valuable, well designed, responsive, and
    usable. Remove all features but those that are absolutely necessary to achieve
    the goal. Focus on one thing at a time. Then, release MVPs quickly and often—improve
    them over time by gradually testing and adding more features. Less is more! Spend
    more time thinking about the next feature to implement than you spend actually
    implementing each feature. Every feature incurs not only direct but also indirect
    implementation costs for all features to come in the future. Use split testing
    to test the response to two product variants at a time and quickly discard features
    that don''t lead to an improvement in your key user metrics, such as retention,
    time on page, or activity. This leads to a more holistic approach to business—acknowledging
    that software development is only one step in the whole product creation and value
    delivery process.


    In the next chapter, you''ll learn why and how to write clean and simple code,
    but remember: not writing unnecessary code is the surest way to clean and simple
    code!


    # 4


    ## WRITE CLEAN AND SIMPLE CODE


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_64_0.png)


    *Clean code* is code that’s easy to read, understand, and change. It is minimal
    and concise, as long as those attributes do not interfere with readability. While
    writing clean code is more an art than a science, the software engineering industry
    has agreed on multiple principles that, if followed, will help you write *cleaner*
    code. In this chapter, you’ll learn 17 principles on how to write clean code that
    will significantly improve your productivity and combat the problem of complexity.'
  mdcn: '如果市场信号表明用户喜爱并重视你的产品创意，那么你仅通过一个简单、精心打造的最小可行产品就实现了产品市场契合。在此基础上，你可以迭代地构建和完善你的最小可行产品。


    当你采用基于最小可行产品的方法进行软件开发，一次添加一个功能时，能够识别哪些功能该保留、哪些该舍弃至关重要。最小可行产品软件创建过程的最后一步是*拆分测试*：不要将带有新功能的迭代版本发布给所有用户，而是将其发布给一小部分用户，并观察他们的隐性和显性反应。只有当你对结果满意——例如，用户在你网站上的平均停留时间增加了——你才保留该功能。否则，你就舍弃它，并保持没有该功能的上一个迭代版本。这意味着你必须牺牲开发该功能所投入的时间和精力，但这确实能让你的产品尽可能保持简单，使你保持敏捷、灵活和高效。通过使用拆分测试，你便能进行数据驱动的软件开发。


    ## 构建最小可行产品的四大支柱


    在基于最小可行产品思维构建你的第一个软件时，请考虑以下四大支柱：


    **功能性** 产品为用户提供一个明确表述的功能，并且做得很好。该功能不必以极高的经济效率提供。你的聊天机器人最小可行产品可能实际上就是你自己与用户聊天；这显然无法规模化，但你正在展示高质量聊天的功能性——即使你尚未想出如何以经济可行的方式提供此功能。


    **设计** 产品设计精良且专注，其设计支持你的产品为目标细分市场提供的价值。最小可行产品生成中的一个常见错误是创建一个不能准确反映你单一功能最小可行产品网站的界面。设计可以简单直接，但必须支持价值主张。想想谷歌搜索——他们在发布第一个版本的搜索引擎时肯定没有在设计上投入大量精力，但该设计非常适合他们提供的产品：无干扰的搜索。


    **可靠性** 仅仅因为你的产品是极简的，并不意味着它可以不可靠。务必编写测试用例，并严格测试代码中的所有功能。否则，你从最小可行产品中获得的洞见将被基于其不可靠性的负面用户反馈所扭曲，而不是基于功能本身的反馈。记住：你的目标是以最小的努力最大化学习。


    **易用性** 最小可行产品必须易于使用。功能被清晰地阐述，设计也对其提供支持。用户不需要花大量时间去弄清楚该做什么或该点击哪些按钮。最小可行产品响应迅速且足够快，以允许流畅的交互。对于一个专注、极简的产品来说，这通常更容易实现：一个只有一个按钮和一个输入框的页面，你应该如何使用是显而易见的。同样，谷歌搜索引擎的初始原型就是一个绝佳的例子，它如此易用，以至于持续使用了二十多年。


    许多人经常误解最小可行产品的这一特性：他们错误地假设，因为它是一个产品的极简版本，所以最小可行产品必然提供很少的价值、糟糕的易用性和草率的设计。然而，极简主义者知道，最小可行产品的简洁实际上源于对一个核心功能的严格专注，而非源于懒惰的产品创建。对于Dropbox来说，创建一个展示其意图的有效视频比实现服务本身更容易。该最小可行产品是一个具有出色功能性、设计、可靠性和易用性的高质量产品。


    ## 最小可行产品的优势


    由最小可行产品驱动的软件设计优势是多方面的。


    - 你可以尽可能低成本地测试你的假设。

    - 你通常可以避免在知道必要之前实际编写代码，而当你确实编写代码时，你可以在收集真实世界反馈之前将工作量降至最低。

    - 你编写代码和查找错误所需的时间要少得多——如果你确实这样做了，你会知道这项活动对你的用户具有极高的价值。

    - 你交付给用户的任何新功能都会提供即时反馈，持续的进展让你和你的团队保持动力，不断推出一个又一个功能。这极大地最小化了你在编程“隐身模式”下所面临的风险。

    - 你降低了未来的维护成本，因为最小可行产品方法极大地降低了代码库的复杂性——并且所有未来的功能都将更容易实现且更不易出错。

    - 你将取得更快的进展，并且在整个软件生命周期中实现将更容易——这让你保持积极状态，走在通往成功的道路上。

    - 你将更快地交付产品，更快地从软件中赚钱，并更可预测、更可靠地建立你的品牌。


    ## 隐身模式与最小可行产品方法


    反对快速原型开发并*支持*编程隐身模式的一个常见反驳论点是，隐身编程可以保护你的想法。人们假设他们的想法足够特别和独特，如果他们以原始形式（即最小可行产品）发布，它会被更大、更强大的公司窃取，这些公司可以更快地实现它。坦率地说，这是一个谬论。想法廉价；执行为王。任何给定的想法都不太可能是独特的，并且很有可能你的想法已经被其他人想到过。隐身模式非但没有减少竞争，甚至可能鼓励其他人研究相同的想法，因为和你一样，他们假设没有其他人已经想到过它。一个想法要成功，需要有人将其推向现实。如果你快进几年，成功的人将是那些采取快速果断行动、尽早且频繁发布、整合真实用户反馈，并通过利用先前发布的势头逐步改进其软件的人。将想法保密只会限制其增长潜力。


    ## 结论


    在编写任何代码之前，设想你的最终产品并考虑用户的需求。致力于你的最小可行产品，使其有价值、设计精良、响应迅速且易于使用。移除所有功能，只保留那些为实现目标绝对必要的功能。一次专注于一件事。然后，快速且频繁地发布最小可行产品——通过逐步测试和添加更多功能，随时间推移改进它们。少即是多！花更多时间思考下一个要实现的功能，而不是实际实现每个功能。每个功能不仅会产生直接的实现成本，还会为未来所有功能带来间接的实现成本。使用拆分测试一次测试两个产品变体的反应，并快速舍弃那些不能改善关键用户指标（如留存率、页面停留时间或活跃度）的功能。这导致了一种更全面的业务方法——承认软件开发只是整个产品创建和价值交付过程中的一个步骤。


    在下一章中，你将学习为什么以及如何编写干净简洁的代码，但请记住：不编写不必要的代码是通往干净简洁代码最可靠的道路！


    # 4


    ## 编写干净简洁的代码


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_64_0.png)


    *干净的代码*是易于阅读、理解和修改的代码。只要这些属性不干扰可读性，它就是极简和简洁的。虽然编写干净的代码更像是一门艺术而非科学，但软件工程行业已经就多项原则达成共识，如果遵循这些原则，将帮助你编写*更干净*的代码。在本章中，你将学习17条关于如何编写干净代码的原则，这些原则将显著提高你的生产力并应对复杂性问题。'
