    \nListing 4-14: Using a function to convert miles to kilometers\n\nThis way, the\
    \ code is easier to maintain. You could, for example, tweak the function to increase\
    \ the conversion accuracy, and you would have to make the change in only one place.\
    \ In Listing 4-13, you'd have to search the code for all instances to make that\
    \ improvement. Applying the DRY principle also makes the code easier to understand\
