  md: 'The Art of Clean Code (Early Access) © 2022 by Christian Mayer


    # Perform computations as they appear (“online”) and store their results in the
    cache.


    An example is an online Bitcoin address checker that sums all incoming transactions
    and deducts all outgoing transactions to compute the balance of a given Bitcoin
    address. Once done, it could cache the intermediate results for this address to
    avoid recomputing the same transactions once the same user checks again. This
    reactive form is the most basic form of caching, where you don’t need to decide
    which computations to perform in advance.


    In both cases, the more computations you store, the higher the likelihood of *cache
    hits* where the relevant computation can be returned immediately. However, as
    there’s usually a memory limit on the number of cache entries you can save, you’ll
    need a sensible *cache replacement policy*: as the cache has a limited size, it
    may fill up quickly. At that point, the cache can store a new value only by replacing
    an old value. A common replacement policy is first in, first out (FIFO), which
    would replace the oldest cache entry with the new one. The best strategy depends
    on the concrete application, but FIFO is a good first bet.


    # Less is More


    Is your problem too hard to be solved efficiently? Make it easier! It sounds obvious,
    but so many coders are perfectionists. They accept colossal complexity and computational
    overhead just to implement a small feature that may not even get recognized by
    users. Instead of optimizing, it’s often much better to reduce complexity and
    get rid of unnecessary features and computations. Consider the problems faced
    by search engine developers, for example: “What is the perfect match for a given
    search query?” Finding the optimal solution for such a problem is extremely hard
    and involves searching billions of websites. However, search engines like Google
    don’t solve the problem optimally; rather, they do the best they can in the time
    they have by using heuristics. Instead of checking billions of websites against
    a user search query, they focus on a couple of high-probability bets by using
    rough heuristics to estimate the quality of individual websites (such as the famous
    PageRank algorithm) and consult suboptimal websites if no other high-quality website
    answers the query. You too should use heuristics rather than optimal algorithms
    in most cases. Ask yourself the following questions: What is your current bottleneck
    calculating? Why does it exist? Is it worth the effort to solve the problem anyway?
    Can you remove the feature or offer a downsized version? If the feature is used
    by 1 percent of your users, but 100 percent perceive the increased latency, it
    may be time for some minimalism (removing the feature that is hardly used but
    provides a bad experience to those who use it).


    To simplify your code, think about whether it makes sense to do one of the following:'
  merge: -1
  pgno: 104
- img_proc: true
  md: 'The Art of Clean Code (Early Access) © 2022 by Christian Mayer


    +   - Remove your current bottleneck altogether by just skipping the feature.

    - Simplify the problem by replacing it with a simpler version of the problem.

    - Get rid of one expensive feature to add ten cheap ones, in accordance with the
    80/20 policy.

    - Omit one important feature so that you can pursue an even more important one;
    think about opportunity costs.


    # Know When to Stop


    Performance optimization can be one of the most time-consuming aspects of coding.
    There’s always room for improvement, but your effort needed to improve performance
    tends to increase once you have already exhausted the low-hanging fruit techniques.
    At some point, improving performance is just a waste of your time.


    Ask yourself regularly: Is it worth the effort to keep optimizing? The answer
    can usually be found by studying the users of your application. What performance
    do they need? Do they even perceive the difference between the original and the
    optimized version of the application? Do some of them complain about bad performance?
    Answering these questions will give you a rough estimate of the maximum runtime
    of your application. Now, you can start optimizing bottlenecks until you reach
    this threshold. Then stop.


    # Conclusion


    In this chapter, you’ve learned why it’s important to avoid premature optimization.
    An optimization is premature if it takes more value than it adds. Depending on
    the concrete project, value can often be measured in terms of developer time,
    usability metrics, expected revenue of an app or feature, or its utility for a
    subgroup of users. For instance, if an optimization can save time or money for
    thousands of users, it is likely not premature, even if you must spend significant
    developer resources to optimize the codebase. However, if the optimization cannot
    lead to perceptible differences in the quality of the lives of the users or programmers,
    it most likely is premature. Yes, there are many more advanced models on the software
    engineering process, but common sense and a general awareness of the dangers of
    premature optimization go a long way without you needing to study fancy books
    or research papers on software development models. For instance, a useful rule
    of thumb is to *write readable and clean code* to start with and not care too
    much about performance, then *optimize the parts with a high expected value* based
    on experience, hard facts from performance tracking tools, and real-world results
    from user studies.


    In the next chapter, you’ll learn about the concept of *flow*—a programmer’s best
    friend.'
