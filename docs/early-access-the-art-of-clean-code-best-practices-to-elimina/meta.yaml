    \ # Measure time Timsort\n    start = time.time()\n    timsort(lst)\n    y_tim.append(time.time()-start)\n\
    \nplt.plot(xs, y_bubble, '-x', label='Bubblesort')\nplt.plot(xs, y_qsort, '-o',\
