  raw:
  - '[PAGE 153]


    different things, but the goal is to allow many humans to work together on a codebase
    by prioritizing human over computer efficiency, favoring composability over monolithic
    design. You focus every function on one purpose only. You’ve learned 15 Unix principles
    to write better code, including *small is beautiful*, *make each function do one
    thing well*, *build a prototype as soon as possible*, and *fail early and noisily*.
    If you keep the *focus* rule at the top of your mind, you’ll do just fine in regards
    to these principles without necessarily needing to memorize every one of them.


    # Less is More in Design


    This is about focusing your design with minimalism. Think of the differences between
    Yahoo Search and Google Search, the Blackberry and the iPhone, and OkCupid and
    Tinder: the winner technologies are often those with a radically simple user interface.
    By using a minimalistic web or app design, you focus on the one thing you’re doing
    best. Focus the user’s attention on the unique value your product provides!


    # Conclusion


    Complexity is your enemy because it maximizes entropy. As a builder and creator,
    you want to minimize entropy: the pure act of creation is one of minimizing entropy.
    You accomplish this by applying focused effort. Focus is the success secret of
    every creator. Keep in mind what both Warren Buffett and Bill Gates considered
    the secret of their success: *focus*.

    To implement focus in your work, ask yourself these questions:


    +   - On which software project do I want to focus my efforts?

    - Which features do I want to focus on to create my MVP?

    - What is the minimal number of design elements I can implement to test the viability
    of my product?

    - Who will use my product and why?

    - What can I remove from my code?

    - Do my functions do one thing only?

    - How can I achieve the same result in less time?


    If you keep asking yourself these or similar *focusing questions*, the money and
    time you spent on this book have been well worth it.'
  - '[PAGE 154]


    # LETTER FROM THE AUTHOR


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_154_0.png)


    You made it through the whole book, and you’ve gained insight into how to practically
    improve your programming skills. You’ve studied the tactics of writing clean and
    simple code and the strategies of successful practitioners. Allow me to wrap this
    book up with a personal note!


    Having studied the complexity conundrum, you may ask: If simplification is so
    powerful, why isn’t everybody doing it? The problem is that implementing simplification,
    despite its great benefits, takes an enormous amount of guts, energy, and willpower.
    Organizations big and small will often firmly resist removing work and simplifying.
    Someone was responsible for implementing, maintaining, and managing these features,
    and they’ll often fight tooth and nail to keep their work even if they know it
    is largely irrelevant. The problem is one of loss aversion—it’s hard to let go
    of'
  - '[PAGE 155]


    anything that provides even the slightest of value. This is something to fight
    against; I’ve never regretted any simplification measure I’ve taken in my life.
    Pretty much everything has value, but it’s important to consider how much you
    pay for the value you get. When I started my Finxter educational site, I consciously
    decided to largely ignore social media, and immediately I started to see notable
    positive results from the additional time I gained to spend on things that move
    the needle. Simplification is beneficial not just to coding but to all areas of
    life; it has the power to make your life more efficient and calmer at the same
    time. Hopefully, by reading this book, you have become more open to simplification,
    reduction, and focus. If you do decide to follow the route of simplification,
    you’ll be in good company: Albert Einstein believed that “a simple and unassuming
    manner of life is best for everyone, best both for the body and the mind.” Henry
    David Thoreau concludes: “Simplicity, simplicity, simplicity! I say, let your
    affairs be as two or three, and not a hundred or a thousand.” And Confucius knew
    that “Life is really simple, but we insist on making it complicated.”


    To help you with your continuous effort to simplify, I’ve created a one-page book
    summary as a Portable Document Format (PDF) that you can download on the book’s
    companion page, print, and pin to your office wall at https://blog.finxter.com/simplicity/.
    Feel free to also sign up for my free *Finxter email academy*, which teaches short
    and simple lessons about programming—we generally focus on exciting tech industries
    such as Python, data science, blockchain development, or machine learning—but
    we also discuss productivity tips and tricks regarding minimalism, freelancing,
    and business strategy.


    Before you leave, please allow me to express my deep gratitude for you spending
    so much time with me. My life goal is to help people get more done through code,
    and I hope this book will help you accomplish that. I hope you have gained insights
    into how you can boost your coding productivity by doing less. And I hope you
    start your first, or next, coding project as soon as you turn this page—and you
    remain active in the Finxter community of like-minded coders. Cheers toward your
    success!'
