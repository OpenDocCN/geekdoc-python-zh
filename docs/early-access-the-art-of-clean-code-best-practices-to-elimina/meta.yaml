  mdcn: "在更现实的场景中，测试人员会编写数百个单元测试，以检查函数对所有类型输入的响应——以及它是否生成预期的输出。只有当单元测试表明函数正常工作后，我们才能进一步测试应用程序更高级的功能。\n\
    \n事实上，即使你所有的单元测试都成功通过，你也尚未完成测试阶段。你必须测试各个单元在构建更大整体时的正确交互。你必须设计真实世界的测试，驾驶汽车行驶数千甚至数万英里，以在奇怪且不可预测的情况下发现异常行为模式。如果你的车行驶在没有路标的小路上怎么办？如果你前面的车突然停下怎么办？如果多辆车在十字路口互相等待怎么办？如果司机突然转向驶入对向车流怎么办？\n\
    \n有如此多的测试需要考虑；复杂性如此之高，以至于许多人在这里就放弃了。理论上看起来不错的东西，即使在你的第一次实现之后，也常常在应用了不同级别的软件测试（如单元测试或真实世界使用测试）后在实践中失败。\n\
    \n## 部署\n\n软件现在已经通过了严格的测试阶段。是时候部署它了！部署可以采取多种形式。应用程序可以发布到应用市场，软件包可以发布到代码仓库，主要（或次要）版本可以公开发布。在更迭代和敏捷的软件开发方法中，你会使用*持续部署*多次重新审视部署阶段。根据你的具体项目，这个阶段要求你启动产品、创建营销活动、与产品的早期用户交流、修复在暴露给用户后肯定会显现的新错误、协调软件在不同操作系统上的部署、支持和解决各种问题，或者维护代码库以适应和改进。考虑到你在前面阶段做出并实施的各种设计选择的复杂性和相互依赖性，这个阶段可能会变得相当混乱。后续章节将提供策略来帮助你克服这种混乱。\n\
    \n## 软件与算法理论中的复杂性\n\n软件内部的复杂性可能与围绕软件开发过程的复杂性一样高。软件工程中的许多指标以正式的方式衡量软件的复杂性。\n\n\
    首先，我们将看看*算法复杂性*，它关注不同算法的资源需求。使用算法复杂性，你可以比较解决同一问题的不同算法。例如，假设你实现了一个带有高分评级系统的游戏应用程序。你希望得分最高的玩家出现在列表顶部，得分最低的玩家出现在列表底部。换句话说，你需要对列表进行*排序*。存在数千种对列表进行排序的算法，并且对1,000,000名玩家进行排序比对100名玩家进行排序在计算上要求更高。一些算法随着列表输入规模的增加而扩展得更好；另一些则扩展得更差。虽然你的应用程序服务于几百名用户时，选择哪种算法并不真正重要，但随着用户群的增长，列表的运行时复杂性会超线性增长。很快，最终用户将不得不等待越来越长的时间才能看到排序后的列表。他们开始抱怨——你需要更好的算法！\n\
