  - '[PAGE 65]


    You may wonder about the difference between clean and simple code. These two concepts
    are closely interrelated because clean code tends to be simple and simple code
    tends to be clean. But it’s possible to encounter complex code that is still clean.
    Simplicity concerns the avoidance of complexity. Clean code goes one step further
    and also concerns itself with managing unavoidable complexity—for instance, through
    the effective use of comments and standards.


    # Why Write Clean Code?


    In the previous chapters, you learned that complexity is the number one public
    enemy for any code project. You’ve learned that simplicity increases your productivity,
    motivation, and the maintainability of your codebase. In this chapter, we’ll carry
    this concept a step further and show you how to write *clean code*.


    Clean code is easier to understand for both your future self and your fellow coders
    since people are more likely to add to clean code and the potential for collaboration
    will increase. Consequently, clean code can significantly reduce a project’s costs.
    As Robert C. Martin points out in his book *Clean Code* (Prentice Hall, 2008),
    coders spend the vast majority of their time reading old code in order to write
    new code. If the old code is easy to read, this will speed the process considerably.


    > Indeed, the ratio of time spent reading versus writing is well over 10 to 1.
    We are constantly reading old code as part of the effort to write new code. [Therefore,]
    making it easy to read makes it easier to write.


    If we take this ratio literally, this relationship is visualized in Figure 4-1.
    The x-axis corresponds to the number of lines written in a given code project.
    The y-axis corresponds to the time to write one additional line of code. In general,
    the more code you’ve already written in one project, the more time it takes to
    write an additional line of code. This is true for both clean and dirty code.


    Say you’ve written *n* lines of code, and you add the *n+1st* line of code. Adding
    this line may potentially affect all previously written lines. It may, for example,
    have a small performance penalty, which impacts the overall project. It may use
    a variable defined somewhere else. It may introduce a bug (with probability *c*),
    and to find that bug, you must search the whole project. That means your expected
    time—and therefore, costs—per line of code is *c* * *T(n)* for a steadily increasing
    time function *T* with increasing input *n*. Adding a line may also force you
    to write additional lines of code to ensure backward compatibility.


    Lengthier code may introduce many other complications, but you get the point:
    the more code you’ve written, the more the additional complexity will slow your
    progress.'
