    ```\n\n```python\nprint('Max Transaction: ' + str(max_transaction()))\n```\n\n\
    ```python\ntransfer('Alice', 'Bob', 1000)\ntransfer('Carl', 'Alice', 8000)\n```\n\
    \n```python\nprint('Balance Alice: ' + str(get_balance('Alice')))\nprint('Balance\
    \ Bob: ' + str(get_balance('Bob')))\nprint('Balance Carl: ' + str(get_balance('Carl')))\n\
    ```\n\n```python\nprint('Max Transaction: ' + str(max_transaction()))\n```\n\n\
    *代码清单 5-1：一个跟踪交易和余额的简单脚本*\n\n该脚本有两个全局变量：`transactions` 和 `balances`。列表 `transactions`\
    \ 跟踪游戏之夜期间玩家之间发生的交易。每笔交易是一个元组，包含发送者标识符、接收者标识符以及从发送者转移到接收者的金额 ①。字典 `balances` 跟踪玩家的当前余额：一个将用户标识符映射到该用户基于迄今为止发生的交易所得信用点数的字典\
    \ ②。\n\n函数 `transfer(sender, receiver, amount)` 在全局列表中创建并存储一笔新交易，如果发送者和接收者的余额尚不存在则为其创建新余额，并根据给定金额更新余额。函数\
    \ `get_balance(user)` 返回作为参数传入的用户的余额，而 `max_transaction()` 遍历所有交易并返回第三个元组元素（即交易金额）最大的那一笔。\n\
    \n最初所有余额均为零。应用程序将 2000 单位从爱丽丝转给鲍勃 ③，将 4000 单位从鲍勃转给卡尔 ④，并将 2000 单位从爱丽丝转给卡尔 ⑤。此时，爱丽丝欠\
    \ 4000（余额为 -4000），鲍勃欠 2000，卡尔有 6000 单位。在打印最大交易之后，爱丽丝将 1000 单位转给鲍勃 ⑥，卡尔将 8000 单位转给爱丽丝\
    \ ⑦。现在，账户发生了变化：爱丽丝有 3000，鲍勃 -1000，卡尔 -2000 单位。具体来说，应用程序输出如下：\n\n```\nBalance Alice:\
    \ -4000\nBalance Bob: -2000\nBalance Carl: 6000\nMax Transaction: ('Bob', 'Carl',\
    \ 4000)\nBalance Alice: 3000\nBalance Bob: -1000\nBalance Carl: -2000\nMax Transaction:\
    \ ('Carl', 'Alice', 8000)\n```\n\n但爱丽丝对这个应用程序并不满意。她意识到调用 `max_transaction()` 会导致冗余计算——因为该函数被调用了两次，脚本遍历了\
    \ `transactions` 列表两次以找到金额最大的交易。但在第二次计算 `max_transaction()` 时，它通过遍历所有交易来寻找最大值，部分重复了相同的计算——包括那些它已经知道最大值的交易，即前三笔交易\
    \ ❶–❸。爱丽丝正确地看到了一些*优化潜力*，她引入了一个新变量 `max_transaction`，每当创建新交易时，该变量都会跟踪迄今为止看到的最大交易。\n\
    \n代码清单 5-2 展示了爱丽丝为实现这一更改而添加的三行代码。\n\n```python\ntransactions = []\nbalance = {}\n\
    max_transaction = ('X', 'Y', float('-Inf'))\n\ndef transfer(sender, receiver,\
    \ amount):\n    ...\n    if amount > max_transaction[2]:\n        max_transaction\
    \ = (sender, receiver, amount)\n```\n\n*代码清单 5-2：应用优化以减少冗余计算*\n\n变量 `max_transaction`\
    \ 维护着迄今为止所有交易中的最大交易金额。因此，无需在每个游戏之夜后重新计算最大值。最初，你将最大交易值设置为负无穷大，这样第一笔真实交易肯定会更大。每次添加新交易时，程序都会将该新交易与当前最大值进行比较，如果它更大，则当前交易成为当前最大值。如果没有优化，如果你在一个包含\
    \ 1000 笔交易的列表上调用 `max_transaction()` 函数 1000 次，你将需要执行 1,000,000 次比较才能找到 1000 个最大值，因为你遍历了\
    \ 1000 个元素的列表 1000 次（1000 × 1000 = 1,000,000）。有了优化，你只需在每次函数调用时检索 `max_transaction`\
    \ 中当前存储的值一次。由于列表有 1000 个元素，你最多需要 1000 次操作来维护当前最大值。这使得所需操作数量减少了三个数量级。\n\n许多程序员无法抗拒实现此类优化，但它们的复杂性会累积。在爱丽丝的案例中，她很快将不得不跟踪一些额外的变量，以跟踪她的朋友们可能感兴趣的其他统计数据：`min_transaction`、`avg_transaction`、`median_transaction`\
    \ 和 `alice_max_transaction`（跟踪她自己的最大交易值）。每个变量都会向项目注入更多几行代码，增加了出现错误的可能性。例如，如果爱丽丝忘记在适当的位置更新某个变量，她将不得不花费宝贵的时间来修复它。更糟糕的是，她可能完全错过这个错误，导致爱丽丝的账户余额损坏，造成数百美元的损失。她的朋友们甚至可能怀疑爱丽丝编写了有利于她的代码！最后一点听起来可能有点开玩笑的意味，但在现实世界的情况下，风险更高。二阶后果可能比更可预测的一阶复杂性后果更为严重。\n\
    \n如果爱丽丝没有在没有完全思考这种优化是否过早的情况下应用*潜在优化*，所有这些潜在问题本可以避免。该应用程序的目标是为三位朋友协调一晚上的交易。实际上，最多只有几百笔交易和十几次对\
    \ `max_transaction` 的调用，而不是优化代码所设计的数千次。爱丽丝的计算机本可以在瞬间执行未优化的代码，鲍勃和卡尔甚至都不会意识到代码未经过优化。此外，未优化的代码更简单，更容易维护。\n\
    \n然而，假设消息传开了，一家赌场——依赖于高性能、可扩展性和长期交易历史——联系爱丽丝来实现相同的系统。在这种情况下，她仍然可以快速修复重新计算最大值而不是跟踪它的瓶颈。但现在她会确信额外的代码复杂性确实是一项很好的投资。通过避免在应用程序需要之前进行优化，她本可以为自己节省数十次那些不必要的过早优化。\n\
    \n## 性能调优的六个技巧\n\n爱丽丝的故事不仅让我们详细看到了实践中的过早优化，还暗示了成功优化的正确方式。重要的是要记住，唐纳德·克努特并非主张优化*本身*是万恶之源。相反，真正的问题是*过早*优化。既然克努特的名言已经广为流传，许多人错误地将其视为反对所有优化的论点。然而，当优化在正确的时机出现时，它可能至关重要。\n\
    \n近几十年来技术的快速进步在很大程度上归功于优化：芯片上的电路布局、算法和软件可用性随着时间的推移不断得到优化。摩尔定律指出，使计算变得极其廉价和高效的计算机芯片技术的改进将在很长一段时间内继续呈指数级增长。芯片技术的改进具有巨大的潜力，不能被视为过早。如果它们为许多人创造价值，那么优化就是进步的核心。\n\
    \n根据经验法则，只有当你有明确的证据——例如来自性能优化工具的测量结果——表明要优化的代码部分或函数确实是瓶颈之一，并且应用程序的用户会欣赏甚至要求更好的"
