    # Remove Design Elements


    The principle is simple: go over each design element, one by one, and throw it
    out if possible. *Design elements* are any visible elements of the user interface,
    such as menu items, calls to action, featured lists, buttons, images, boxes, shadows,
    form fields, pop-ups, videos, and everything else that takes up real estate in
    your user interface. Literally, go over all design elements and ask: *Can I remove
    it?* You’ll be surprised how often the answer will be *yes!*


    Make no mistake—removing design elements is not easy! You’ve spent time and effort
    creating them, and the sunk cost bias makes you tempted to hold on to your creations
    even when they’re unnecessary. Figure 8-7 shows an idealized editing process in
    which you classify each element according to its importance regarding the UX.
    For example, does a menu item referring to your company’s blog help the user in
    the checkout process when ordering a product? No, so it should be classified as
    not important. Amazon has stripped all unnecessary design elements from the ordering
    process, for instance, by introducing the one-click buy button. When I first learned
    about this method in a scientific writing workshop, it completely transformed
    the way I thought about editing. Removing unimportant and less important design
    elements guarantees improved usability with little risk. But only truly great
    designers have the boldness to remove *important* design elements and leave only
    *very important* elements. Yet, this is what separates great from merely good
    design.


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_144_0.png)


    *Figure 8-7: Idealized editing process*


    Figure 8-8 shows an example of a cluttered design and a minimalistic, edited design.
    The order page on the left is what you may well see from an online pizza delivery
    service. Some elements are very important, such as the address to which to deliver
    the pizza and the order button, but those like the overly detailed ingredient
    list and “What’s New?” info box are less so. On the right, you see an edited version
    of this order page. We removed unnecessary elements, focused on the most popular
    upsells, combined the ingredients list with the headline, and combined the labels
    with the form elements. This allowed us to add more whitespace and even increase
    the size of a *very important* design element: the image of the tasty pizza! The'
  - '[PAGE 145]


    reduced clutter and increased focus are likely to increase the conversion rate
    of the order page through an improved UX.


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_145_0.png)


    # Remove Features


    The best way to implement a minimalistic design is to remove whole features from
    your application! You’ve already studied this idea in Chapter 3 about creating
    MVPs, which have the minimum number of features needed to validate a hypothesis.
    Minimizing the number of features is equally helpful in helping an established
    business refocus its product offerings.


    Over time, applications tend to accumulate features—a phenomenon known as *feature
    creep*. As a result, more and more focus must be shifted toward maintaining existing
    features. Feature creep leads to bloated software, and bloated software leads
    to technical debt. This reduces the agility of an organization. The idea behind
    removing features is to release energy, time, and resources and to reinvest into
    the few features that matter most to your users.


    Popular examples of feature creep and its harmful effects on usability are Yahoo,
    AOL, and MySpace, who all somehow lost their focused products by adding too much
    stuff to the user interfaces.


    In contrast, the most successful products in the world are focused and have resisted
    feature creep, even if it doesn’t look like it. Microsoft is a great example of
    how building *focused products* helped it become a super successful company. A
    common perception is that Microsoft products such as Windows are slow, inefficient,
    and loaded with too many features. But nothing could be further from the truth!
    *What you see is all there is*—you don’t see the myriad of features Microsoft
    has removed. Although Microsoft is huge, it’s actually very focused considering
    its size. Hundreds of thousands of software developers write new Microsoft code
    every day. Here’s what Eric Traut,'
  - '[PAGE 146]


    a famous engineer who’s worked for both Apple and Microsoft, has to say about
    Microsoft’s focused approach to software engineering:


    > A lot of people think of Windows as this really large, bloated operating system,
    and that may be a fair characterization, I have to admit. It is large. It contains
    a lot of stuff in it. But at its core, the kernel and the components that make
    up the very core of the operating system actually is pretty streamlined.


    To sum this up, when creating an application used by many users for a long period,
    removing features must be a core activity of your daily effort because it frees
    up resources, time, energy, and user interface space that can be reinvested into
    improving features that matter.


    # Reduce Variations of Fonts and Colors


    Extensive variability leads to complexity. If you vary the font types, font sizes,
    and colors too much, it’ll increase cognitive friction, increase the perceived
    complexity of the user interface, and sacrifice clarity. As a minimalist coder,
    you don’t want to build these psychological effects into your application. Effective
    minimalist design often focuses on only one or two font types, one or two colors,
    and one or two different font sizes. Figure 8-9 exemplifies the consistent and
    minimalist use of font types, sizes, colors, and contrasts. That said, do note
    that there are many approaches to design and many ways to accomplish focus and
    minimalism on all levels. A minimalist design might, for instance, use many different
    colors to make the playful, colorful attributes of an application stand out.


    ![](img/8792d1c61415b2790e4dd6b390c6d60b_146_0.png)'
  - '[PAGE 147]


    # Be Consistent


    An application doesn’t normally consist of a single user interface but a series
    of interfaces handling the user interaction. This leads us to another dimension
    of minimalistic design: *consistency*. We define consistency as the degree to
    which we’ve minimized the variability of design choices in a given app. Instead
    of presenting the user a different “look and feel” in each step in the interaction,
    consistency ensures that the application feels like a coherent whole. For example,
    Apple provides many iPhone apps like browsers, health apps, or mapping services,
    all of which have a similar look and feel and are recognizable as Apple products.
    It can be challenging to get different app developers to agree on a consistent
    design, but it’s extremely important for the strength of the Apple brand. To ensure
    brand consistency, software companies use *brand guidelines* that any contributing
    developer must adhere to. Make sure to check off this box when creating your own
    application. You might accomplish this with the consistent use of templates and
    (CSS) stylesheets.


    # Conclusion


    This chapter focused on how minimalistic designers have come to dominate the world
    of design, exemplified by some of the most successful software companies such
    as Apple and Google. More often than not, the leading technologies and user interfaces
    are radically simple. Nobody knows what the future holds, but it seems that the
    wide adoption of speech recognition and virtual reality will result in even simpler
    user interfaces. The ultimate minimalistic design is invisible. With ubiquitous
    computing on the rise—Alexa and Siri—I think we’ll see even simpler and even more
    focused user interfaces in the decades ahead. So, to answer the question posed
    in the beginning: *yes, less is more in design!* In the next and final chapter
    of this book, we’ll conclude with focus—and its relevance for today’s programmers.


    # References


    Documentation for the material design style: *https://material.io/design/introduction/*


    Apple’s documentation to human interface design: *https://developer.apple.com/design/human-interface-guidelines/*'
