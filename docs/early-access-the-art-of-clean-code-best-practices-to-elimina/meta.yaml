    \ than one big function accomplishing everything at the same time. The encapsulation\
    \ of functionality reduces the overall code complexity.\n\nAs a rule of thumb,\
    \ every class and every function should have only one responsibility. Robert C.\
    \ Martin, the inventor of this principle, defines a responsibility as a *reason\
    \ to change*. His gold standard when defining a class and a function, thus, is\
    \ to focus them on a single responsibility so that only the programmer who needs\
    \ this single responsibility changed would request a change in the definition—and\
    \ no other programmer with other responsibilities would even consider to issue\
    \ a change request for the class when assuming, of course, that the code is correct.\
    \ For example, a function that’s responsible for reading data from a database\
    \ wouldn’t also be responsible for processing the data. Otherwise, the function\
    \ would have two reasons to change: a change in the database model and a change\
    \ in the processing requirements. If there are multiple reasons to change, multiple\
    \ programmers may change the same class simultaneously. Your class has too many\
    \ responsibilities and has become messy and cluttered.\n\nLet’s consider a small\
