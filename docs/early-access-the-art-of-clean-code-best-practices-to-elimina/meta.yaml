- md: "## Principle 7: Avoid Unnecessary Comments\n\nThat said, not all comments help\
    \ readers understand code better. In some cases, comments actually reduce clarity\
    \ and confuse the readers of a given codebase. To write clean code, you should\
    \ not only use valuable comments but also avoid unnecessary comments.\n\nDuring\
    \ my time as a computer science researcher, a skilled student of mine successfully\
    \ applied for a job at Google. He told me that the Google headhunters had criticized\
    \ his code style because he added too many unnecessary comments. These types of\
    \ comments are another way expert coders can ascertain whether you're a beginner,\
    \ intermediate, or expert coder yourself. Issues in the code, such as breaking\
    \ style guides, being lazy or sloppy with comments, or writing non-idiomatic code\
    \ for a given programming language, are called *code smells* that point to potential\
    \ problems in the code, and expert coders can spot them from miles away.\n\nHow\
    \ do you know which comments to leave out? In most cases, a comment is unnecessary\
    \ if it is redundant. For example, if you've used meaningful variable names, the\
    \ code often becomes self-explanatory and doesn't require line-level comments.\
    \ Let's look at the code snippet with meaningful variable names in Listing 4-9.\n\
    \n```\ninvestments = 10000\nyearly_return = 0.1\nyears = 10\n\nfor year in range(years):\n\
    \    print(investments * (1 + yearly_return)**year)\n```\n\n*Listing 4-9: Code\
    \ snippet with meaningful variable names*\n\nIt's already clear that the code\
    \ calculates your cumulative investment return for 10 years, assuming a 10-percent\
    \ yield. For the sake of argument, let's add some unnecessary comments in Listing\
    \ 4-10.\n\n```\ninvestments = 10000 # your investments, change if needed\nyearly_return\
    \ = 0.1 # annual return (e.g., 0.1 --> 10%)\nyears = 10 # number of years to compound\n\
    \n# Go over each year\nfor year in range(years):\n    # Print value of your investment\
    \ in current year\n    print(investments * (1 + yearly_return)**year)\n```\n\n\
    *Listing 4-10: Unnecessary comments*\n\nAll comments in Listing 4-10 are redundant.\
    \ Some would have been useful if you'd chosen less meaningful variable names,\
    \ but explaining a variable named yearly_return with a comment about it representing\
    \ the yearly return only adds unnecessary clutter.\n\nIn general, you should use\
    \ common sense to decide whether a comment is necessary, but here are some of\
    \ the main guidelines.\n\n- Don't use inline comments. These can be avoided entirely\
    \ by choosing meaningful variable names.\n- Don't add obvious comments. In Listing\
    \ 4-10, the comment explaining the for loop statement is unnecessary. Every coder\
    \ knows the for loop, so there is no additional value in adding the comment #\
    \ Go over each year given the expression for year in range(years).\n- Don't comment\
    \ out old code; remove it. We programmers often hang on to our beloved code snippets,\
    \ even after we've (grudgingly) decided to remove them, by simply commenting them\
    \ out. This kills your code's readability! Always remove unnecessary code—for\
    \ peace of mind, you can use a version history tool such as Git that saves earlier\
    \ drafts of your project.\n- Use documentation functionality. Many programming\
    \ languages such as Python come with built-in documentation functionality that\
    \ allows you to describe the purpose of each function, method, and class in your\
    \ code. If each of these has only a single responsibility (as per Principle 10),\
    \ it's often enough to use the documentation instead of comments to describe what\
    \ your code does.\n\n## Principle 8: The Principle of Least Surprise\n\nThe principle\
    \ of least surprise states that a component of a system should behave in a way\
    \ most users expect it to behave. This principle is one of the golden rules when\
    \ designing effective applications and user experience. For example, if you open\
    \ the Google search engine, the cursor will place itself in the search input field\
    \ so that you can start typing your search keyword right away, just as you would\
    \ expect: no surprises.\n\nClean code also leverages this design principle. Say\
    \ you write a currency converter that converts the user's input from USD to Chinese\
    \ renminbi. You store the user input in a variable. Which variable name is better\
    \ suited, user_input or var_x? The principle of least surprise answers this question\
    \ for you!\n\n## Principle 9: Don't Repeat Yourself\n\nDon't repeat yourself (DRY)\
    \ is a widely recognized principle that recommends, intuitively enough, avoiding\
    \ repetitive code. For example, take the Python code in Listing 4-11, which prints\
    \ the same string five times to the shell.\n\n```\nprint('hello world')\nprint('hello\
    \ world')\nprint('hello world')\nprint('hello world')\nprint('hello world')\n\
    ```\n\n*Listing 4-11: Printing “hello world” five times*\n\nTo reduce repetition,\
    \ a better way of writing is shown in Listing 4-12.\n\n```\nfor i in range(5):\n\
    \    print('hello world')\n```\n\n*Listing 4-12: Reducing repetition found in\
    \ Listing 4-11*\n\nThe code in Listing 4-12 will print hello world five times,\
    \ just as Listing 4-11 does, but without redundancy.\n\n---\n\nListing 4-5: Code\
    \ without comments\n\nListing 4-5 analyzes a short text snippet from Shakespeare's\
    \ *Romeo and Juliet* using regular expressions. If you're not familiar with regular\
    \ expressions, you'll probably struggle to understand what the code does. Even\
    \ the meaningful variable names don't help much.\nLet's see if a few comments\
    \ can resolve your confusion (see Listing 4-6).\n\n```\nimport re\n\ntext = '''\n\
    \    Ha! let me see her: out, alas! She's cold:\n    Her blood is settled, and\
    \ her joints are stiff;\n    Life and these lips have long been separated:\n \
    \   Death lies on her like an untimely frost\n    Upon the sweetest flower of\
    \ all the field.\n'''\n\n# Find all words starting with character 'f'\nf_words\
    \ = re.findall('\\bf\\w+\\b', text)\nprint(f_words)\n\n# Find all words starting\
    \ with character 'l'\nl_words = re.findall('\\bl\\w+\\b', text)\nprint(l_words)\n\
    \n'''\nOUTPUT:\n['frost', 'flower', 'field']\n['let', 'lips', 'long', 'lies',\
    \ 'like']\n'''\n```\n\n*Listing 4-6: Code with comments*\n\nThe two short comments\
    \ at ❶ and ❷ illuminate the purpose of the regular expression patterns '\\bf\\\
    w+\\b' and '\\bl\\w+\\b'. I won't dive deeply into regular expressions here, but\
    \ the example shows how comments can help you get a rough understanding of other\
    \ people's code without understanding the syntactic sugar.\n\nYou can also use\
    \ comments to abstract over blocks of code. For example, if you have five code\
    \ lines that deal with updating customer information in a database, add a short\
    \ comment before the block to explain this, as in Listing 4-7.\n\n```\n# Process\
    \ next order\norder = get_next_order()\nuser = order.get_user()\ndatabase.update_user(user)\n\
    database.update_product(order.get_order())\n\n# Ship order & confirm customer\n\
    logistics.ship(order, user.get_address())\nuser.send_confirmation()\n```\n\n*Listing\
    \ 4-7: Commented blocks give an overview of the code.*\n\nThis shows how an online\
    \ shop completes a customer order in two high-level steps: ❶ processing the next\
    \ order and ❷ shipping the order. The comments help you understand the purpose\
    \ of the code quickly without needing to decipher each method call.\n\nYou can\
    \ also use comments to warn programmers of potentially undesired consequences.\
    \ For example, Listing 4-8 alerts us that calling the function `ship_yacht()`\
    \ will actually ship an expensive yacht to a customer.\n\n```\n###############################################################\n\
    # WARNING                                                     #\n# EXECUTING THIS\
    \ FUNCTION WILL SHIP A $1,569,420 YACHT!! #\n###############################################################\n\
    def ship_yacht(customer):\n    database.update(customer.get_address())\n    logistics.ship_yacht(customer.get_address())\n\
    \    logistics.send_confirmation(customer)\n```\n\n*Listing 4-8: Comments as warnings*\n\
    \nYou can employ comments in many more useful ways; they are not only about applying\
    \ the standards correctly. Keep the principle to *code for humans* at the top\
    \ of your mind when writing comments, and you will be fine. As you read code from\
    \ experienced programmers, you’ll absorb the unspoken rules effectively and almost\
    \ automatically over time. Since you’re the expert on code you’ve written, helpful\
    \ comments give outsiders a glimpse into your thinking. Don’t miss out on sharing\
    \ your insights with other people!"
  mdcn: "## 原则七：避免不必要的注释\n\n话虽如此，并非所有注释都能帮助读者更好地理解代码。在某些情况下，注释实际上会降低清晰度，并让给定代码库的读者感到困惑。要编写整洁的代码，你不仅应该使用有价值的注释，还应该避免不必要的注释。\n\
    \n在我担任计算机科学研究员期间，我一位优秀的学生成功申请到了谷歌的工作。他告诉我，谷歌的招聘人员批评了他的代码风格，因为他添加了太多不必要的注释。这类注释是资深程序员判断你是初学者、中级程序员还是专家程序员的另一种方式。代码中的问题，例如违反风格指南、注释懒散或马虎，或者为给定编程语言编写非地道的代码，被称为*代码异味*，它们指向代码中潜在的问题，资深程序员能一眼看穿。\n\
    \n你怎么知道哪些注释应该省略？在大多数情况下，如果注释是多余的，那么它就是不必要的。例如，如果你使用了有意义的变量名，代码通常会变得不言自明，不需要逐行注释。让我们看看清单4-9中使用有意义变量名的代码片段。\n\
    \n```\ninvestments = 10000\nyearly_return = 0.1\nyears = 10\n\nfor year in range(years):\n\
    \    print(investments * (1 + yearly_return)**year)\n```\n\n*清单4-9：使用有意义变量名的代码片段*\n\
    \n代码已经清楚地表明，它计算的是你在10%收益率下10年的累计投资回报。为了论证，让我们在清单4-10中添加一些不必要的注释。\n\n```\ninvestments\
    \ = 10000 # your investments, change if needed\nyearly_return = 0.1 # annual return\
    \ (e.g., 0.1 --> 10%)\nyears = 10 # number of years to compound\n\n# Go over each\
    \ year\nfor year in range(years):\n    # Print value of your investment in current\
    \ year\n    print(investments * (1 + yearly_return)**year)\n```\n\n*清单4-10：不必要的注释*\n\
    \n清单4-10中的所有注释都是多余的。如果你选择了不太有意义的变量名，其中一些注释本来会有用，但用注释解释一个名为`yearly_return`的变量代表年度回报，只会增加不必要的杂乱。\n\
    \n一般来说，你应该运用常识来判断一个注释是否必要，但以下是一些主要准则。\n\n-   不要使用行内注释。通过选择有意义的变量名，这些注释完全可以避免。\n\
    -   不要添加显而易见的注释。在清单4-10中，解释`for`循环语句的注释是不必要的。每个程序员都知道`for`循环，因此在表达式`for year in\
    \ range(years)`的基础上添加注释`# Go over each year`没有额外价值。\n-   不要注释掉旧代码；直接删除它。我们程序员常常会保留我们钟爱的代码片段，即使在（不情愿地）决定删除它们之后，也只是简单地注释掉。这会损害你代码的可读性！始终删除不必要的代码——为了安心，你可以使用版本历史工具，比如Git，它会保存你项目的早期草稿。\n\
    -   使用文档功能。许多编程语言，如Python，都内置了文档功能，允许你描述代码中每个函数、方法和类的目的。如果每个函数、方法或类都只承担单一职责（根据原则十），那么通常使用文档而不是注释来描述代码的功能就足够了。\n\
    \n## 原则八：最小惊讶原则\n\n最小惊讶原则指出，系统的组件应该以大多数用户期望的方式运行。这个原则是设计有效应用程序和用户体验的黄金法则之一。例如，如果你打开谷歌搜索引擎，光标会自动放置在搜索输入框中，这样你就可以立即开始输入搜索关键词，正如你所期望的那样：没有意外。\n\
    \n整洁的代码也运用了这个设计原则。假设你编写了一个货币转换器，将用户的输入从美元转换为人民币。你将用户输入存储在一个变量中。哪个变量名更合适，`user_input`还是`var_x`？最小惊讶原则为你回答了这个问题！\n\
    \n## 原则九：不要重复自己\n\n不要重复自己（DRY）是一个被广泛认可的原则，它直观地建议避免重复代码。例如，看看清单4-11中的Python代码，它向shell打印了相同的字符串五次。\n\
    \n```\nprint('hello world')\nprint('hello world')\nprint('hello world')\nprint('hello\
    \ world')\nprint('hello world')\n```\n\n*清单4-11：打印“hello world”五次*\n\n为了减少重复，更好的写法如清单4-12所示。\n\
    \n```\nfor i in range(5):\n    print('hello world')\n```\n\n*清单4-12：减少清单4-11中的重复*\n\
    \n清单4-12中的代码将打印`hello world`五次，与清单4-11一样，但没有冗余。\n\n---\n\n清单4-5：没有注释的代码\n\n清单4-5使用正则表达式分析了莎士比亚《罗密欧与朱丽叶》中的一小段文本。如果你不熟悉正则表达式，你可能很难理解代码的作用。即使是有意义的变量名也帮不上多大忙。\n\
    让我们看看添加一些注释是否能解决你的困惑（见清单4-6）。\n\n```\nimport re\n\ntext = '''\n    Ha! let me\
    \ see her: out, alas! She's cold:\n    Her blood is settled, and her joints are\
    \ stiff;\n    Life and these lips have long been separated:\n    Death lies on\
    \ her like an untimely frost\n    Upon the sweetest flower of all the field.\n\
    '''\n\n# Find all words starting with character 'f'\nf_words = re.findall('\\\
    bf\\w+\\b', text)\nprint(f_words)\n\n# Find all words starting with character\
    \ 'l'\nl_words = re.findall('\\bl\\w+\\b', text)\nprint(l_words)\n\n'''\nOUTPUT:\n\
    ['frost', 'flower', 'field']\n['let', 'lips', 'long', 'lies', 'like']\n'''\n```\n\
    \n*清单4-6：带注释的代码*\n\n❶和❷处的两个简短注释阐明了正则表达式模式`'\\bf\\w+\\b'`和`'\\bl\\w+\\b'`的目的。我不会在这里深入探讨正则表达式，但这个例子展示了注释如何帮助你在不理解语法糖的情况下，粗略理解他人的代码。\n\
    \n你也可以使用注释来抽象代码块。例如，如果你有五行代码用于更新数据库中的客户信息，可以在代码块前添加一个简短的注释来解释这一点，如清单4-7所示。\n\n\
    ```\n# Process next order\norder = get_next_order()\nuser = order.get_user()\n\
    database.update_user(user)\ndatabase.update_product(order.get_order())\n\n# Ship\
    \ order & confirm customer\nlogistics.ship(order, user.get_address())\nuser.send_confirmation()\n\
    ```\n\n*清单4-7：带注释的代码块提供了代码概览*\n\n这展示了一个在线商店如何通过两个高级步骤完成客户订单：❶处理下一个订单和❷发货订单。注释帮助你快速理解代码的目的，而无需解读每个方法调用。\n\
    \n你还可以使用注释来警告程序员潜在的不良后果。例如，清单4-8提醒我们，调用函数`ship_yacht()`实际上会将一艘昂贵的游艇运送给客户。\n\n\
    ```\n###############################################################\n# WARNING\
    \                                                     #\n# EXECUTING THIS FUNCTION\
    \ WILL SHIP A $1,569,420 YACHT!! #\n###############################################################\n\
    def ship_yacht(customer):\n    database.update(customer.get_address())\n    logistics.ship_yacht(customer.get_address())\n\
    \    logistics.send_confirmation(customer)\n```\n\n*清单4-8：作为警告的注释*\n\n你可以以更多有用的方式使用注释；它们不仅仅是关于正确应用标准。在编写注释时，始终牢记*为人类编写代码*的原则，你就会做得很好。当你阅读经验丰富的程序员的代码时，你会随着时间的推移有效地、几乎是自动地吸收那些不成文的规则。既然你是自己所写代码的专家，有帮助的注释可以让外界一窥你的思考过程。不要错过与他人分享你的见解！"
