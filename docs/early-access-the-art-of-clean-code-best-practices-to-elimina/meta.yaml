    \ will actually ship an expensive yacht to a customer.\n\n```\n###############################################################\n\
    # WARNING                                                     #\n# EXECUTING THIS\
    \ FUNCTION WILL SHIP A $1,569,420 YACHT!! #\n###############################################################\n\
