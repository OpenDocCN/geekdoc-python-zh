    \ If you omit **superclass** when you define a class, it defaults to having the\
    \ superclass object. Every class inherits from object, either directly or indirectly.\n\
    \n> **Terminology:** As a noun, “instance” means the same as “object.” However,\
    \ we usually use “instance” when talking about a particular object (john is an\
    \ instance of Person), or when we are using the word as an adjective (name is\
    \ an instance variable of the class Person).\n\n> **Terminology:** “Field” and\
    \ “attribute” are other names for “instance variable.”\n\nExample (very bad) class\
    \ definition:\n\n```\nclass Person(object):\n    name = 'Joe'\n    age = 23\n\n\
    \    def say_hi(self):\n        print('Hello, Joe.')\n```"
  - '[PAGE 55]


    +   - To create an instance (object) of a class, use the name of the class as
    if it were a function name, for example, `p = Person()`. Used in this way, the
    class name acts as a **constructor**; it constructs a new object.

    - We can access the fields of object p using **dot notation**: `p.name` is ''Joe''
    and `p.age` is 23.

    - We can modify the fields of p, for example by saying `p.name = ''Jack''`.

    - We can use dot notation to “talk to” the object p, or more formally, “send a
    message to” the object p: `p.say_hi()` tells p to `say_hi`, and p will respond
    by printing Hello, Joe..


    **Convention:** Class names always begin with a capital letter, and variable and
    function names always begin with a lower-case letter.


    Unfortunately, every newly created instance of this class will be exactly the
    same. We would like to create instances of Person with different initial values
    for name and age. To do this, we have to explore a special variable: `self`.


    # 3.2 CONSTRUCTORS AND SELF


    If you are familiar with classes and objects in some other language, then classes
    and objects are very similar in Python—except you may have trouble with the word
    `self`, which seems to be required everywhere.


    Remember that each object we create from a class has its own copy of each of the
    fields (instance variables) of that class. If we have two Person objects named
    joe and jane, then each of them will have a name field and an age field.


    Briefly, the name `self` used inside a class definition is the particular object
    we are talking to.'
  - "[PAGE 56]\n\nEvery method within a class must have `self` as its first parameter.\n\
    \nHere's a better class definition:\n\n```\nclass Person(object):\n    def __init__(self,\
    \ name, age):\n        self.name = name\n        self.age = age\n    def say_hi(self):\n\
    \        print('Hello', self.name)\n```\n\nWhen you construct an object, you probably\
    \ want to specify the values of its instance variables. For example, each Person\
    \ object should be created with its own name and its own age. This is done by\
    \ including a special method named `__init__` in the class definition. (That's\
    \ init with two underscores before and two after.) `__init__` is an **initializer**—it\
    \ is called *automatically from the constructor* when you construct a new object.\n\
    \n**Technical note:** Python has a number of ***dunder methods***, which begin\
    \ and end with double underscores. Dunder methods are used internally, and seldom\
    \ called directly.\n\nTo create an object, use the name of the class as if it\
    \ were a function name, and supply values for all the parameters *except* `self`.\
    \ Inside the `__init__` method, use the form `self.variable = value` to initialize\
    \ instance variables.\n\nIn the above example, we would create an object `jill`\
    \ by saying `jill = Person('Jill', 30)`. Inside the initializer `__init__`, a\
    \ name instance variable is created by assigning a value to `self.name`, and an\
    \ age instance variable is created by assigning a value to `self.age`."
- md: "## 3.3 SUBCLASSES\n\nOutside the class definition, we “talk to” an object by\
    \ using dot notation, for example, `jill.age` or `jill.say_hi()`. But *inside*\
    \ the class definition, the object is talking to “itself,” so we say `self.age`\
    \ and `self.say_hi()`.\n\nSo, what is `self`? It is an *explicit* first parameter\
    \ of every method, and a *prefix* argument of every message we send to an object.\
    \ In the definition of `say_hi`, `self` must be given as the first parameter;\
    \ when we say `jill.say_hi()`, `jill` is the argument passed to the method as\
    \ the value of `self` (see Figure 3.1).\n\n```python\nclass Thing(object):\n \
    \   def do_something(self, x, y):\n        ...\n\nt.do_something(3, 5)\n```\n\n\
    **FIGURE 3.1** The word `self` as a prefix argument.\n\nIf a method refers to\
    \ an instance variable in the same class, the word `self` must be used. If one\
    \ method of a class calls another method of the same class, the word `self` must\
    \ be used. Any variables (or methods) not tagged with the name `self` are just\
    \ local to the method they are in.\n\n```python\ndef get_older(self):\n    self.age\
    \ += 1\n\ndef get_much_older(self, years):\n    for i in range(0, years):\n  \
    \      self.get_older()\n```\n\n**Technical note:** `self` is just a parameter\
    \ name, so in theory you could replace it with any other name. This would be strongly\
    \ against convention.\n\nUnlike some other object-oriented languages, an object\
    \ does not have a fixed and unvarying set of instance variables. You can add an\
    \ instance variable to an object simply by assignment; for example, you could\
    \ say `jill.occupation = 'scientist'`. This affects only `jill`; other `Person`\
    \ objects are unchanged. Similarly, you can use the `del` operation to remove\
    \ an instance variable from a particular object.\n\n**Important debugging note:**\
    \ When defining and using classes and objects, the most common error is supplying\
    \ *too many arguments* or *not enough arguments*. This is almost always the result\
    \ of forgetting to use `self` somewhere.\n\n**Comparison with Java:** Java's `this`\
    \ is equivalent to Python's `self`, with two differences: (1) `this` is a keyword,\
    \ but `self` is a variable name; and (2) `this` is usually implicit, but `self`\
    \ must be explicitly used every time.\n\nA class inherits all the instance variables\
    \ and methods of its superclass. (It is a **subclass** of its superclass.) For\
    \ example, you might define a `Friend` class as a subclass of `Person`.\n\n```python\n\
    class Friend(Person):\n    def smile(self):\n        print('~\\_(^~^)_/~')\n\n\
    meg = Person('Margaret', 25)\nbob = Friend('Robert', 33)\n```\n\nWhen you create\
    \ `meg` as an instance of `Person`, `meg` will have the `say_hi`, `get_older`,\
    \ and `get_much_older` methods and the `__init__` initializer, but not the `smile`\
    \ method. When you create `bob` as a `Friend`, `bob` will have all these things,\
    \ and will also have a `smile` method.\n\nYou can **override** (replace) any inherited\
    \ method by providing another method with the same name, for example,\n\n```python\n\
    def say_hi(self, extra):\n    print('Hi!', extra)\n```\n\nIf you override a method\
    \ in a subclass, you can still access the overridden method by using `super()`\
    \ as a prefix. For example,\n\n```python\ndef say_hi(self, extra):\n    super().say_hi()\n\
    \    print(extra)\n```\n\nYou usually write a subclass when you want everything\
    \ in its superclass, but you want the subclass to have additional information\
    \ in it. For example, a `Friend` object is a `Person`, so it should have a name\
    \ and an age, but maybe you also want it to have a nickname. In this case you\
    \ will need to write a new `__init__` method, overriding the inherited one.\n\n\
    In the initializer for `Friend` you *could* copy and paste all the work done in\
    \ the initializer for `Person`, but it is much better style to just call that\
    \ initializer. In this case you *do* call `__init__` directly. For example, the\
    \ `Friend` initializer might look like this:\n\n```python\ndef __init__(self,\
    \ name, age, nick):\n    super().__init__(name, age)\n    self.nickname = nick\n\
    ```\n\nIf you write a subclass because you want only some of the things in its\
    \ superclass, but not all of them, this is an indication that your classes would\
    \ benefit from being reorganized.\n\n## 3.4 PRINTING OBJECTS\n\nThe `print` method\
    \ takes any number of arguments, converts each argument into a string by calling\
    \ its `__str__` method, and prints them. (As with `__init__`, that's two underscores\
    \ before and after the name.)\n\nAll classes have a `__str__` method inherited\
    \ from `object`. It is a good idea to override this method. If you don't, your\
    \ objects will be printed something like this:\n\n```\n<__main__.Friend object\
    \ at 0x1064728d0>\n```\n\nIn the case of a `Friend` object, your method might\
    \ look something like this:\n\n```python\ndef __str__(self):\n    return self.name\
    \ + \"'s age is \" + str(self.age)\n```\n\nand `print(meg)` would result in:\n\
    \n```\nMargaret's age is 19\n```\n\nIn the above, Margaret's age is an integer,\
    \ and we can't add an integer to a string, so we had to explicitly convert her\
    \ age to a string by calling the function `str(self.age)`. Once you've defined\
    \ the method `__str__` in your class, you can call the function `str` on objects\
    \ of that class, for example by saying `str(meg)`.\n\nSimilar to `str(x)`, the\
    \ `repr(x)` function returns a string representing the object `x`, as defined\
    \ by its `__repr__(self)` method. The difference is that `str` is used by the\
    \ `print` method and should provide a humanly readable string, whereas the `repr`\
    \ method is used during debugging and development, and should be detailed and\
    \ unambiguous.\n\n`__str__` and `__repr__` are inherited \"dunder\" methods which\
    \ you can override with your own versions, then call indirectly with `str(x)`\
    \ and `repr(x)`.\n\n## 3.5 COMPARING OBJECTS\n\nThe equality (`==`) and inequality\
    \ (`!=`) operators work well for Python's built-in object types. When you define\
    \ your own classes, however, `==` will return `False` when comparing two distinct\
    \ objects (but see below).\n\nIt is important to keep in mind the distinction\
    \ between *equal* and *identical*.\n\n- Two objects **a** and **b** are **equal**\
    \ if every part of **a** is the same as the corresponding part of **b**; if you\
    \ change **a**, **b** might or might not change. Testing for equality requires\
    \ testing all the parts.\n- If **a** and **b** are **identical**, then they are\
    \ just two different names for the same object; changing that object by doing\
    \ something to **a** means that **b** also sees the change. Testing for identity\
    \ just involves testing whether **a** and **b** both refer to the same location\
    \ in memory.\n- Assignment, `a = b`, never makes a copy of an object **b**; it\
    \ just makes **a** refer to the same object as **b**.\n- When you use an object\
    \ as an argument to a function, the function gets a reference to the original\
    \ object, not a copy.\n- `a is b` tests whether **a** and **b** refer to the same\
    \ object; `a is not b` tests whether they are different (but possibly equal) objects.\n\
    \nFor your own class, you can define equality and ordering by defining some special\
    \ methods in the class. (All these names use double underscores.)\n\n- `__eq__(self,\
    \ other)` should return `True` if you consider the objects `self` and `other`\
    \ to be equal, and `False` otherwise. Identical objects should be considered to\
    \ be equal (you can test identity with the `is` operator). This method will be\
    \ called when your objects are compared using `==`.\n- `__ne__(self, other)` will\
    \ be called when objects are compared using `!=`.\n- `__lt__(self, other)` will\
    \ be called when objects are compared using `<`.\n- `__le__(self, other)` will\
    \ be called when objects are compared using `<=`.\n- `__ge__(self, other)` will\
    \ be called when objects are compared using `>=`.\n- `__gt__(self, other)` will\
    \ be called when objects are compared using `>`.\n\n**These methods are all independent.**\
    \ Defining some of them does *not* automatically define others. For example, if\
    \ you define an `__eq__` method, `__ne__` does not magically pop into being. If\
    \ you define one of these methods, you should define all six.\n\nWe usually think\
    \ of the comparison operators as comparing sizes, or magnitudes; but if you define\
    \ your own comparison operators, you can use them for any kind of ordering you\
    \ like. This has already been done for strings; the operators use lexicographical\
    \ (alphabetical) ordering, with all capital letters less than all lowercase letters.\n\
    \n## 3.6 BINDINGS\n\nIn a technical sense, every value in Python is an object.\
    \ However, some objects are **immutable**: They cannot be changed. For example,\
    \ the number 5 is immutable; you cannot change a 5 to a 6. If you have a variable\
    \ `x` whose value is 5 (we say `x` is **bound** to 5), you can use an assignment\
    \ statement to change the binding of `x` to 6, but 5 is still 5."
  mdcn: "## 3.3 子类\n\n在类定义之外，我们通过点号表示法“与”对象“对话”，例如 `jill.age` 或 `jill.say_hi()`。但在类定义*内部*，对象是在与“自身”对话，因此我们使用\
    \ `self.age` 和 `self.say_hi()`。\n\n那么，`self` 是什么？它是每个方法的*显式*第一个参数，也是我们发送给对象的每条消息的*前缀*参数。在\
    \ `say_hi` 的定义中，`self` 必须作为第一个参数给出；当我们说 `jill.say_hi()` 时，`jill` 是作为 `self` 的值传递给该方法的参数（参见图\
    \ 3.1）。\n\n```python\nclass Thing(object):\n    def do_something(self, x, y):\n\
    \        ...\n\nt.do_something(3, 5)\n```\n\n**图 3.1** `self` 作为前缀参数。\n\n如果一个方法引用同一类中的实例变量，则必须使用\
    \ `self` 这个词。如果一个类的一个方法调用同一类的另一个方法，也必须使用 `self` 这个词。任何未用 `self` 名称标记的变量（或方法）都只是局部于它们所在的方法。\n\
    \n```python\ndef get_older(self):\n    self.age += 1\n\ndef get_much_older(self,\
    \ years):\n    for i in range(0, years):\n        self.get_older()\n```\n\n**技术说明：**\
    \ `self` 只是一个参数名，因此理论上你可以用任何其他名称替换它。但这将严重违反惯例。\n\n与某些其他面向对象语言不同，对象没有固定不变的实例变量集。你可以简单地通过赋值向对象添加实例变量；例如，你可以说\
    \ `jill.occupation = 'scientist'`。这只会影响 `jill`；其他 `Person` 对象保持不变。同样，你可以使用 `del`\
    \ 操作从特定对象中删除实例变量。\n\n**重要调试说明：** 在定义和使用类与对象时，最常见的错误是提供*过多的参数*或*参数不足*。这几乎总是由于在某处忘记使用\
    \ `self` 造成的。\n\n**与 Java 的比较：** Java 的 `this` 等同于 Python 的 `self`，有两个区别：(1) `this`\
    \ 是一个关键字，而 `self` 是一个变量名；(2) `this` 通常是隐式的，而 `self` 必须每次显式使用。\n\n一个类继承其超类的所有实例变量和方法。（它是其超类的**子类**。）例如，你可以将\
    \ `Friend` 类定义为 `Person` 的子类。\n\n```python\nclass Friend(Person):\n    def smile(self):\n\
    \        print('~\\_(^~^)_/~')\n\nmeg = Person('Margaret', 25)\nbob = Friend('Robert',\
    \ 33)\n```\n\n当你将 `meg` 创建为 `Person` 的实例时，`meg` 将拥有 `say_hi`、`get_older` 和 `get_much_older`\
    \ 方法以及 `__init__` 初始化器，但没有 `smile` 方法。当你将 `bob` 创建为 `Friend` 时，`bob` 将拥有所有这些，并且还会有一个\
    \ `smile` 方法。\n\n你可以通过提供另一个同名方法来**覆盖**（替换）任何继承的方法，例如，\n\n```python\ndef say_hi(self,\
    \ extra):\n    print('Hi!', extra)\n```\n\n如果你在子类中覆盖了一个方法，你仍然可以使用 `super()` 作为前缀来访问被覆盖的方法。例如，\n\
    \n```python\ndef say_hi(self, extra):\n    super().say_hi()\n    print(extra)\n\
    ```\n\n当你想要超类中的所有内容，但希望子类拥有额外信息时，通常会编写一个子类。例如，一个 `Friend` 对象是一个 `Person`，所以它应该有一个名字和年龄，但也许你还想让它有一个昵称。在这种情况下，你需要编写一个新的\
    \ `__init__` 方法，覆盖继承的那个。\n\n在 `Friend` 的初始化器中，你*可以*复制并粘贴 `Person` 初始化器中完成的所有工作，但更好的风格是直接调用那个初始化器。在这种情况下，你*确实*直接调用\
    \ `__init__`。例如，`Friend` 初始化器可能看起来像这样：\n\n```python\ndef __init__(self, name,\
    \ age, nick):\n    super().__init__(name, age)\n    self.nickname = nick\n```\n\
    \n如果你编写一个子类是因为你只想要超类中的部分内容，而不是全部，这表明你的类将受益于重新组织。\n\n## 3.4 打印对象\n\n`print` 方法接受任意数量的参数，通过调用每个参数的\
    \ `__str__` 方法将其转换为字符串，然后打印它们。（与 `__init__` 一样，名称前后各有两个下划线。）\n\n所有类都有一个从 `object`\
    \ 继承的 `__str__` 方法。覆盖这个方法是个好主意。如果你不这样做，你的对象将被打印成类似这样的内容：\n\n```\n<__main__.Friend\
    \ object at 0x1064728d0>\n```\n\n对于 `Friend` 对象，你的方法可能看起来像这样：\n\n```python\ndef\
    \ __str__(self):\n    return self.name + \"'s age is \" + str(self.age)\n```\n\
    \n而 `print(meg)` 将产生：\n\n```\nMargaret's age is 19\n```\n\n在上面，Margaret 的年龄是一个整数，我们不能将整数与字符串相加，所以我们必须通过调用函数\
    \ `str(self.age)` 将她的年龄显式转换为字符串。一旦你在类中定义了 `__str__` 方法，你就可以对该类的对象调用 `str` 函数，例如通过说\
    \ `str(meg)`。\n\n类似于 `str(x)`，`repr(x)` 函数返回一个表示对象 `x` 的字符串，由其 `__repr__(self)`\
    \ 方法定义。区别在于 `str` 由 `print` 方法使用，应该提供人类可读的字符串，而 `repr` 方法在调试和开发期间使用，应该详细且明确。\n\
    \n`__str__` 和 `__repr__` 是继承的“双下划线”方法，你可以用自己的版本覆盖它们，然后通过 `str(x)` 和 `repr(x)`\
    \ 间接调用。\n\n## 3.5 比较对象\n\n相等（`==`）和不等（`!=`）运算符对于 Python 的内置对象类型工作良好。然而，当你定义自己的类时，`==`\
    \ 在比较两个不同的对象时将返回 `False`（但见下文）。\n\n记住*相等*和*相同*之间的区别很重要。\n\n- 如果 **a** 的每个部分都与\
    \ **b** 的相应部分相同，则两个对象 **a** 和 **b** 是**相等**的；如果你改变 **a**，**b** 可能会也可能不会改变。测试相等性需要测试所有部分。\n\
    - 如果 **a** 和 **b** 是**相同的**，那么它们只是同一对象的两个不同名称；通过对 **a** 做某事来改变该对象意味着 **b** 也会看到变化。测试相同性只涉及测试\
    \ **a** 和 **b** 是否都引用内存中的同一位置。\n- 赋值 `a = b` 从不复制对象 **b**；它只是让 **a** 引用与 **b**\
    \ 相同的对象。\n- 当你将对象用作函数的参数时，函数获得的是对原始对象的引用，而不是副本。\n- `a is b` 测试 **a** 和 **b** 是否引用同一对象；`a\
    \ is not b` 测试它们是否是不同的（但可能相等的）对象。\n\n对于你自己的类，你可以通过在类中定义一些特殊方法来定义相等性和排序。（所有这些名称都使用双下划线。）\n\
    \n- `__eq__(self, other)` 如果你认为对象 `self` 和 `other` 相等，则应返回 `True`，否则返回 `False`。相同的对象应被视为相等（你可以使用\
    \ `is` 运算符测试相同性）。当你的对象使用 `==` 进行比较时，将调用此方法。\n- `__ne__(self, other)` 在对象使用 `!=`\
    \ 进行比较时将被调用。\n- `__lt__(self, other)` 在对象使用 `<` 进行比较时将被调用。\n- `__le__(self, other)`\
    \ 在对象使用 `<=` 进行比较时将被调用。\n- `__ge__(self, other)` 在对象使用 `>=` 进行比较时将被调用。\n- `__gt__(self,\
    \ other)` 在对象使用 `>` 进行比较时将被调用。\n\n**这些方法都是独立的。** 定义其中一些*不会*自动定义其他方法。例如，如果你定义了一个\
    \ `__eq__` 方法，`__ne__` 不会神奇地出现。如果你定义了这些方法中的一个，你应该定义全部六个。\n\n我们通常认为比较运算符是比较大小或量级；但如果你定义自己的比较运算符，你可以将它们用于你喜欢的任何类型的排序。这已经在字符串中完成；这些运算符使用词典（字母）顺序，所有大写字母都小于所有小写字母。\n\
    \n## 3.6 绑定\n\n从技术意义上讲，Python 中的每个值都是一个对象。然而，有些对象是**不可变的**：它们不能被更改。例如，数字 5 是不可变的；你不能将\
    \ 5 改为 6。如果你有一个变量 `x`，其值为 5（我们说 `x` **绑定**到 5），你可以使用赋值语句将 `x` 的绑定更改为 6，但 5 仍然是\
    \ 5。"
