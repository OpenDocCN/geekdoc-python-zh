    \ including any newline characters.\n- *file*.readline() reads and returns a line\
    \ of text, including the terminating newline (if any). If the empty string is\
    \ returned, the end of the file has been reached.\n- *file*.readlines() reads\
    \ the entire file and returns it as a list of strings, including terminating newlines.\n\
    - Input files may be iterated over: for line in file: *statements* will read each\
    \ line in the file, assign it to the variable *line*, and execute the *statements*.\
    \ The *statements* are indented as usual.\n- *file*.write(*string*) writes the\
    \ string to the file, and returns the number of characters written.\n- *file*.close()\
    \ closes the file. **Mandatory**. Leaving the file open when you are done with\
    \ it is likely to cause problems.\n\nAs an example, here is some code to count\
    \ the number of lines in a text file.\n\n```\ncount = 0\nwith open(file_name,\
    \ 'r') as f:\n    while f.readline():\n        count += 1\n```\n\nFor historical\
    \ reasons, the character or characters used to denote a “newline” (‘\\n’) are\
    \ not the same on Windows files, old Macintosh files, and Mac OS X/Linux files.\
    \ Reading or writing text files (non-binary files) will automatically convert\
    \ platform-specific line endings to the current platform. **Reading or writing\
    \ binary files as if they were text files will corrupt them.** Text files, on\
    \ the other hand, can be read and written as binary without harm.\n\n## 2.12 PICKLING\n\
    \nSerializing (sometimes called marshalling) an object is turning it into a linear\
    \ stream of bytes. This can be done to save an object on a file, or to transmit\
    \ it to another process. The byte stream can be deserialized (unmarshalled) to\
    \ reconstruct the original object.\n\nThe most common way to serialize Python\
    \ objects is called pickling. Python can also use JSON and XML for serialization,\
    \ but these do not support as many object types.\n\nPython values and most built-in\
    \ objects can be pickled, including user-defined classes and functions at the\
    \ top level of a module. Recursive and interconnected objects can be pickled.\
    \ Generators, lambda functions, database connections, and threads are a few things\
    \ that cannot be pickled.\n\nTo pickle or unpickle objects, first import pickle,\
    \ then use the following methods:\n\n- pickle.dump(object, file) — Saves object\
    \ onto the file, which must have been opened in 'wb' (write binary) mode.\n- variable\
    \ = pickle.load(file) — Reconstructs the object previously written to file, which\
    \ must have been opened in 'rb' (read binary) mode.\n- str = pickle.dumps(object)\
    \ — Saves object into the variable str as a string.\n- object = pickle.loads(str)\
    \ — Reconstructs the object previously written to the string str.\n\nPickling\
    \ is not secure. A pickle file can contain code objects and data to attack your\
    \ system. Make sure that anything you unpickle comes from a trusted source and\
    \ has not been tampered with in transit.\n\n# Classes\n\nA CLASS DEFINES A NEW\
    \ *type*, along with a **constructor** for making values of that type. Values\
    \ of that type are **objects**, and each such **object** will contain the variables\
    \ and methods described in the class.\n\nHere is an analogy: A *class* is like\
    \ a cake recipe, while *objects* are the cakes you can make by following the recipe.\
    \ The variables in the Cake class might include sugar, flour, and butter, while\
    \ the methods might include mix, bake, and serve.\n\n## 3.1 CLASSES AND INHERITANCE\n\
    \nThe syntax for defining a class is\n\n```\nclass ClassName(superclass):\n  \
    \  variable and method definitions\n```\n\nClasses are arranged in a **hierarchy**,\
    \ with the object class at the top. Every class (except object itself) has a **superclass**,\
    \ and it **inherits** variables and methods from that superclass. That is, all\
    \ variables and methods defined in (or inherited by) the superclass are available\
    \ to the new class.\n\nFor example, you might define a class Person with variables\
    \ name and age and a method greet. Every object of this type will have its own\
    \ copies of those variables, and its own reference to the greet method. If you\
    \ then create a class Customer as a subclass of Person, every object of type Customer\
    \ will have its own name and age variables and a greet method, plus whatever additional\
    \ variables and methods you declare in Customer (for example, a list of purchases).\n\
    \nThe special class object is the “root” of all classes. If you omit **superclass**\
    \ when you define a class, it defaults to having the superclass object. Every\
    \ class inherits from object, either directly or indirectly.\n\n> **Terminology:**\
    \ As a noun, “instance” means the same as “object.” However, we usually use “instance”\
    \ when talking about a particular object (john is an instance of Person), or when\
    \ we are using the word as an adjective (name is an instance variable of the class\
    \ Person).\n\n> **Terminology:** “Field” and “attribute” are other names for “instance\
    \ variable.”\n\nExample (very bad) class definition:\n\n```\nclass Person(object):\n\
    \    name = 'Joe'\n    age = 23\n\n    def say_hi(self):\n        print('Hello,\
    \ Joe.')\n```\n\n- To create an instance (object) of a class, use the name of\
    \ the class as if it were a function name, for example, `p = Person()`. Used in\
    \ this way, the class name acts as a **constructor**; it constructs a new object.\n\
    - We can access the fields of object p using **dot notation**: `p.name` is 'Joe'\
    \ and `p.age` is 23.\n- We can modify the fields of p, for example by saying `p.name\
    \ = 'Jack'`.\n- We can use dot notation to “talk to” the object p, or more formally,\
    \ “send a message to” the object p: `p.say_hi()` tells p to `say_hi`, and p will\
    \ respond by printing Hello, Joe.\n\n**Convention:** Class names always begin\
    \ with a capital letter, and variable and function names always begin with a lower-case\
    \ letter.\n\nUnfortunately, every newly created instance of this class will be\
    \ exactly the same. We would like to create instances of Person with different\
    \ initial values for name and age. To do this, we have to explore a special variable:\
    \ `self`.\n\n## 3.2 CONSTRUCTORS AND SELF\n\nIf you are familiar with classes\
    \ and objects in some other language, then classes and objects are very similar\
    \ in Python—except you may have trouble with the word `self`, which seems to be\
    \ required everywhere.\n\nRemember that each object we create from a class has\
    \ its own copy of each of the fields (instance variables) of that class. If we\
    \ have two Person objects named joe and jane, then each of them will have a name\
    \ field and an age field.\n\nBriefly, the name `self` used inside a class definition\
    \ is the particular object we are talking to. Every method within a class must\
    \ have `self` as its first parameter.\n\nHere's a better class definition:\n\n\
    ```\nclass Person(object):\n    def __init__(self, name, age):\n        self.name\
    \ = name\n        self.age = age\n    def say_hi(self):\n        print('Hello',\
    \ self.name)\n```\n\nWhen you construct an object, you probably want to specify\
    \ the values of its instance variables. For example, each Person object should\
    \ be created with its own name and its own age. This is done by including a special\
    \ method named `__init__` in the class definition. (That's init with two underscores\
    \ before and two after.) `__init__` is an **initializer**—it is called *automatically\
    \ from the constructor* when you construct a new object.\n\n**Technical note:**\
    \ Python has a number of ***dunder methods***, which begin and end with double\
    \ underscores. Dunder methods are used internally, and seldom called directly.\n\
    \nTo create an object, use the name of the class as if it were a function name,\
    \ and supply values for all the parameters *except* `self`. Inside the `__init__`\
    \ method, use the form `self.variable = value` to initialize instance variables.\n\
    \nIn the above example, we would create an object `jill` by saying `jill = Person('Jill',\
    \ 30)`. Inside the initializer `__init__`, a name instance variable is created\
    \ by assigning a value to `self.name`, and an age instance variable is created\
    \ by assigning a value to `self.age`."
