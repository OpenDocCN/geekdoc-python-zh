- img_proc: true
  md: "# 5.1 PHILOSOPHY\n\nUse of a proper test framework has a large number of advantages:\n\
    \n+   - Code is much more likely to be correct.\n- Code typically takes less time\
    \ to produce, because debugging time is reduced.\n- Functions written to be tested\
    \ tend to be much smaller and single purpose.\n- Functions written to be tested\
    \ provide a clean separation between computation and I/O.\n- The existence of\
    \ a *test suite* (a collection of tests) makes it easier and safer to modify the\
    \ code at some later date.\n\nA good test framework gives the programmer the ability\
    \ to run the tests quickly, usually with a single button click, and see with a\
    \ single glance if there are any errors. Any tests that require more than this\
    \ will not be run frequently, if at all, thus negating the value of having them.\n\
    \nTo write testable code,\n\n+   - Write many small functions that each do one\
    \ thing, rather than a few large functions that do a lot of things.\n- Write the\
    \ tests as you go. Many authorities recommend writing the tests before writing\
    \ the code to be tested; this helps clarify what the code is supposed to do, and\
    \ also helps the programmer see the interface from the users point of view.\n\
    \  - It can be difficult or impossible to write tests for pre-existing or legacy\
    \ code."
  merge: -1
