- md: "## Appendix C: Statistics\n\nHERE ARE SOME OF THE functions provided by the\
    \ statistics module.\n\n- statistics.mean(**data**) returns the mathematical “average”\
    \ of the data, computed by adding the values and dividing their sum by the number\
    \ of values.\n- statistics.median(**data**) returns the “middle” number of the\
    \ data, such that half the values are less than or equal to it, and half are greater\
    \ than or equal to it. If there are an even number of values, the result is the\
    \ mean of the two middle values.\n- statistics.mode(**data**) returns the number\
    \ that occurs most often in the data (or if a tie, the first such number).\n\n\
    For example,\n\n```\nfrom statistics import *\na = [1, 2, 3, 4, 5, 5, 78]\nprint(f\"\
    {mean(a)=}, {median(a)=}, {mode(a)=}\")\n```\n\nprints:\n\n```\nmean(a)=14, median(a)=4,\
    \ mode(a)=5\n```\n\nHere are some more functions:\n\n- statistics.stdev(data)\
    \ returns the sample standard deviation.\n- statistics.variance(data) returns\
    \ the sample variance.\n\nUsing the same value for a as above,\n\n```\nprint(f\"\
    {stdev(a):6.2f}, {variance(a):6.2f}\")\n```\n\nprints:\n\n```\n28.26, 798.67\n\
    ```\n\nThe statistics module also includes functions for working with normal distributions.\n\
    \n## Appendix D: Functions on Iterables\n\nHERE ARE SOME FUNCTIONS that take iterable\
    \ objects (lists, sets, tuples, strings, dictionaries, ranges, files, and possibly\
    \ others).\n\n- all(iterable) returns True if every element of iterable evaluates\
    \ to a true value.\n- any(iterable) returns True if at least one element of iterable\
    \ evaluates to a true value.\n- filter(test, iterable) returns an iterator for\
    \ the items in iterable that pass the test.\n- len(iterable) returns the number\
    \ of elements in iterable.\n- list(iterable) returns a list of the elements in\
    \ iterable, in the same order.\n- map(function, iterable) returns an iterator.\
    \ Each value returned by the iterator will be the result of applying the function\
    \ to the corresponding value of the iterable.\n- max(iterable) returns the largest\
    \ value in iterable.\n- min(iterable) returns the smallest value in iterable.\n\
    - set(iterable) returns a set of the values in iterable.\n- sorted(iterable) returns\
    \ a list of the elements in iterable, in sorted order.\n- sum(iterable) returns\
    \ the sum of the values in iterable.\n- tuple(iterable) returns a tuple of the\
    \ elements in iterable, in the same order.\n- zip(iterable1,...,iterableN) returns\
    \ an iterator of N-tuples, where the first tuple contains the first value in each\
    \ iterable, the second tuple contains the second value in each iterable, and so\
    \ on. Iteration stops when any one of the iterables runs out of values.\n- element\
    \ in iterable returns True if element is in iterable.\n- element not in iterable\
    \ returns True if element is not in iterable.\n\nFunctions that take an iterable\
    \ object can, in general, also take an iterator or a generator. If this is done,\
    \ the iterator or generator will be passed in its current state, which may or\
    \ may not be at the start of the iterable.\n\nSome of the above functions have\
    \ to examine every element of the iterable (max, for example). Others, like any,\
    \ may or may not examine every element. Care should be taken not to call such\
    \ a function with an iterator or generator that produces an infinite number of\
    \ values.\n\n## Appendix E: Operating System Commands\n\nHERE ARE A FEW OF THE\
    \ functions available when you import os:\n\n- os.getcwd() gets the current working\
    \ directory.\n- os.chdir(path) changes the current working directory to path.\
    \ Paths (given as strings) may be absolute or relative.\n- os.listdir(path='.')\
    \ returns a list containing the names of the entries in the directory '.'.\n \
    \ - Note that path (not italicized) is a keyword, not a variable that can be replaced\
    \ by some other name. In other functions, path (italicized) represents a variable\
    \ containing a string, or the string itself.\n- os.mkdir(path, mode=0o777, dir_fd=None)\
    \ creates a directory named path with numeric mode 0o777.\n  - The mode is a Unix-style\
    \ three-digit octal code. The three bits of each digit specify read, write, and\
    \ execute permissions for owner, group, and world.\n- os.remove(path, dir_fd=None)\
    \ deletes the single file path; not for directories.\n- os.rmdir(path, dir_fd=None)\
    \ removes (deletes) the empty directory path.\n- os.rename(src, dst) renames the\
    \ file or directory src to dst.\n- os.walk(top, topdown=True, onerror=None, followlinks=False)\
    \ generates the file names in a directory tree by walking the tree either top-down\
    \ or bottom-up. For each directory in the tree rooted at directory top (including\
    \ top itself), it yields a 3-tuple (dirpath, dirnames, filenames).\n\n## Appendix\
    \ F: Unit Test Methods\n\nTHE FOLLOWING ARE SOME of the methods available in unittest,\
    \ most of which are self-explanatory.\n\n- assertEqual(a, b)\n- assertNotEqual(a,\
    \ b)\n- assertAlmostEqual(a, b) # for floating point numbers\n- assertAlmostEqual(a,\
    \ b, places)\n- assertTrue(x)\n- assertFalse(x)\n- assertIs(a, b) # tests for\
    \ identity\n- assertIsNot(a, b)\n- assertIsNone(x)\n- assertIsNotNone(x)\n- assertIn(a,\
    \ b)\n- assertNotIn(a, b)\n- assertIsInstance(a, b)\n- assertNotInstance(a, b)\n\
    - assertRaises(exception, function, arguments)\n\nAll calls to these methods must\
    \ be prefixed with self.\n\nEach of these methods has an optional final parameter,\
    \ which may be any expression. It is used as a message in the AssertionError to\
    \ provide any necessary additional information.\n\nThese methods are not called\
