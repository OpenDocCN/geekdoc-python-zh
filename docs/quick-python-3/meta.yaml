  md: 'After that, your code should create a “root” window,


    ```

    top = Tk()

    ```


    Next, populate the window with widgets (see below).


    Finally, turn over execution to the GUI:


    ```

    top.mainloop()

    ```


    There are three main tasks to be performed:


    +   1. Create some widgets (buttons, text areas, etc.).

    2. Arrange the widgets in the window.

    3. Associate code with some of the widgets.


    You can execute some initialization code before calling mainloop, but once you
    call mainloop, the GUI is in control.


    A minor annoyance is that whenever Tkinter is used to build a GUI, it must display
    a “root window.” This is a small window that appears on your screen and has no
    function. To eliminate it, create a root window yourself and immediately hide
    it. This only needs to be done once.


    ```

    import tkinter

    root = tkinter.Tk()

    root.withdraw()

    ```


    # 6.3 CREATING WIDGETS


    The window that opens when you run a GUI program is a **container**: it can contain
    **widgets** (buttons, text areas, etc.). A **frame** is a container that you can
    put inside a window, or in another frame.'
