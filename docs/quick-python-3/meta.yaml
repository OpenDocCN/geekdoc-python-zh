    # CHAPTER 5


    # Testing


    CODE HAS TO BE TESTED. It is unusual for any significant piece of code to run
    correctly the first time.


    One all-too-common approach is to try out the code as it is being written, conclude
    that everything is correct, and do nothing to preserve the tests. This does nothing
    to future-proof the code against more subtle errors, and makes it more difficult
    to modify the code as requirements change.


    A *test framework* is software that:


    +   1. allows tests to be written in a simple, standardized form; and

    2. allows the tests to be run with an absolute minimum of effort.


    In the following sections we will discuss two frameworks, doctest and unittest.'
  - "[PAGE 88]\n\n# 5.1 PHILOSOPHY\n\nUse of a proper test framework has a large number\
    \ of advantages:\n\n+   - Code is much more likely to be correct.\n- Code typically\
    \ takes less time to produce, because debugging time is reduced.\n- Functions\
    \ written to be tested tend to be much smaller and single purpose.\n- Functions\
    \ written to be tested provide a clean separation between computation and I/O.\n\
    - The existence of a *test suite* (a collection of tests) makes it easier and\
    \ safer to modify the code at some later date.\n\nA good test framework gives\
    \ the programmer the ability to run the tests quickly, usually with a single button\
    \ click, and see with a single glance if there are any errors. Any tests that\
    \ require more than this will not be run frequently, if at all, thus negating\
    \ the value of having them.\n\nTo write testable code,\n\n+   - Write many small\
    \ functions that each do one thing, rather than a few large functions that do\
    \ a lot of things.\n- Write the tests as you go. Many authorities recommend writing\
    \ the tests before writing the code to be tested; this helps clarify what the\
    \ code is supposed to do, and also helps the programmer see the interface from\
    \ the users point of view.\n  - It can be difficult or impossible to write tests\
    \ for pre-existing or legacy code."
  - "[PAGE 89]\n\n+   - Minimize the use of global variables, and avoid them entirely\
