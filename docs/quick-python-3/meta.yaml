    \ in a for loop).\n  - continue within nested loops applies to the innermost loop.\n\
    \n- **del variable**\n  - Causes the variable to cease to exist (become unbound).\n\
    \n- **else:**\n  - Both a while loop and a for loop may be followed by an else\
