    # 2.10 SCOPE


    The scope of a name is the part of the program in which the name has meaning and
    can be used. Python’s scope rules are unusual; they follow an “LEGB rule”: Local,
    Enclosed, Global, Built-in. To understand this rule, it helps to remember that
    (1) variables are defined by being assigned a value and (2) functions/methods
    may be nested within other functions/methods.


    +   • Variables may be declared to be global or nonlocal by a statement of the
    form global var1, ..., varN or nonlocal var1, ..., varN. The declaration must
    precede any use of the variable.'
  - '[PAGE 49]


    +   - **Local:** A variable is local to a function if it is a parameter, or if
    it is assigned a value within that function and not explicitly declared to be
    global or nonlocal.

    - **Enclosed:** A variable in a function can refer to a variable declared in an
    enclosing function, provided either (1) the variable is not assigned a value in
    this function or (2) it is declared in a nonlocal statement.

    - **Global:** A variable declared at the top level (not in a function or method)
    is global, and can be referenced throughout the program. A variable in a function
    can refer to a global variable, provided either (1) the variable is not assigned
    a value in this function or in an enclosing function or (2) it is declared in
    a global statement.

    - **Built-in:** A variable not declared otherwise in the program might be a built-in
    variable. Some examples are list, print, and divmod.


    When a variable is nonlocal (enclosed) or global, it is good documentation to
    declare it as such, even when the variable is not assigned a value within the
    function.


    Global variables are generally regarded as undesirable and should be avoided wherever
    possible. Functions that use global variables are:


    +   - no longer self-contained, and can be understood and debugged only in context;

    - harder to test because the test must include code to set the globals properly;
    and

    - harder to reuse in another project because they are context-dependent.'
  - "[PAGE 50]\n\nGlobals can be avoided by adding extra parameters to functions,\
