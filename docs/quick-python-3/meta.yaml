    \ returned.\n- *set*.clear() removes all elements from *set*.\n\n## 2.5 DICTIONARIES\n\
    \nA *dictionary* (of type dict) provides a fast way of looking something up. A\
    \ dictionary literal is written as zero or more key: value pairs enclosed in braces,\
    \ { }. For example, you might define a “phone book” dictionary as follows:\n\n\
    ```\nphones = {\"Alice\": 5551212, \"Jill\": 5556789, \"Bob\": 5559999}\n```\n\
    \nKeys must be unique; you can have only one value associated with a key. Values\
    \ do not have to be unique; many keys may have the same value.\n\nOnce you have\
    \ a dictionary, there are three ways of looking something up in it. Pay special\
