  md: '# Appendix C: Statistics


    HERE ARE SOME OF THE functions provided by the statistics module.


    +   - statistics.mean(**data**) returns the mathematical “average” of the data,
    computed by adding the values and dividing their sum by the number of values.

    - statistics.median(**data**) returns the “middle” number of the data, such that
    half the values are less than or equal to it, and half are greater than or equal
    to it. If there are an even number of values, the result is the mean of the two
    middle values.

    - statistics.mode(**data**) returns the number that occurs most often in the data
    (or if a tie, the first such number).


    For example,


    ```

    from statistics import *

    a = [1, 2, 3, 4, 5, 5, 78]

    print(f"{mean(a)=}, {median(a)=}, {mode(a)=}")

    ```'
