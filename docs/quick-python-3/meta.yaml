    foo(a, b)\nprint(a, b) # [99, 2, 3] [1, 2, 3]\n```\n\nAs a general style rule,\
    \ functions should return a value but not mutate their arguments, while methods\
    \ may mutate their arguments. For example, the following are built in:\n\n- **obj.sort()**\
    \ is a method that sorts the object **obj** and returns None, while\n- **sorted(obj)**\
