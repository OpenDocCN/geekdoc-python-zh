    # 1.3 VARIABLES


    Variables do not have a type, and do not have to be declared. Variables come into
    existence when you assign a value to them.


    **Example:** best_value = 36


    **Convention:** Variable names begin with a lowercase letter or (in special cases)
    an underscore. For multi-word variable names, most programmers use underscores
    between words (as above), but some use “camelCase” (sometimes called “studlyCaps”)
    such as bestValue.


    **Caution:** Python’s built-in type names and function names are not reserved
    words, and it is easy to override them accidentally. For example, if you use the
    name list or abs for a variable, you can no longer use those names to create lists
    or find absolute values.


