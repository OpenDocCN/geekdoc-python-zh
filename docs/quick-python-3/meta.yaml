    \n变量名可以由单个下划线组成。当需要变量但实际不用于任何事情时，通常使用此名称。\n\n```\nfor _ in range(0, 3):\n    print(\"\
    Hello!\")\n```\n\n内置的“dunder”名称以两个下划线开头和结尾。你不应该以这种方式命名自己的变量和方法。\n\n### 4.3 类型提示\n\
    \nPython 是一种**动态类型**语言。也就是说，变量名的类型是它当前持有的任何值的类型。\n\n从 Python 3.5 开始，你可以输入**类型提示**来指定变量预期持有的值的类型。这些提示被视为注释；它们对运行中的程序绝对没有影响。一些\
    \ IDE 可以使用类型提示进行一些静态代码检查，这在未来可能会变得更加普遍。\n\n以下示例演示了提示变量、参数和函数返回值类型的语法。\n\n```\n\
    def indent(line: str, amount: int) -> str:\n    indented_line:str = ' ' * amount\
