    \ (20 // 7 == 2 and 20 % 7 == 6). If you want both these values, you can use divmod(20,\
    \ 7), which returns the tuple (2, 6).\n\nHere are some of the things you can do\
    \ with tuples:\n\n- x = (1, 2, 3) # x now holds the tuple (1, 2, 3)\n- x = 1,\
