    \  - exec 实际上是一个函数，但它返回 None 作为其值，因此经常被当作语句使用。\n  - exec **不安全**，因此如果 arg 可能包含恶意或有害代码，请不要使用它。\n\
    \n- **nonlocal variables**\n  - 函数可以嵌套在其他函数内部。默认情况下，内部函数可以访问但不能更改外部函数的变量。如果内部函数声明变量为\
