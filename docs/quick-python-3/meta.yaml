    - **Bitwise and** gives a 1 when the corresponding bits of both operands are 1,
    and 0 otherwise.

    - **Bitwise or** gives a 1 when the corresponding bits of one or both operands
    are 1, and 0 otherwise.

    - **Bitwise exclusive or** gives a 1 when the corresponding bits of the two operands
    are different, and 0 otherwise.

    - **Left shift** moves all bits to the left, filling in with zeros.

    - **Right shift** moves all bits to the right, with some disappearing off the
    left end, and zeros coming in on the right.


