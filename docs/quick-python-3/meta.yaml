    The basic data types are similar to what you’re already used to:


    +   - int (integers): 73, -15, 12345678901234567890. Integers may be arbitrarily
    large.

    - float (real numbers): 3.1416, 6.022e+23.

    - bool (logicals, or booleans): True and False. Note that these are capitalized.

    - str (strings): "Hello World", ''Goodbye''. You can use either single or double
    quotes. You can insert single quotes'
