  md: "There are 15 types of widgets in Tkinter, each with many options, indicated\
    \ with option=value. This will cover only the most common types and options. In\
    \ the following, we assume that the window is called top.\n\n+   - **fr = Frame(parent,\
    \ option, ...)**\n  - This is a container for widgets. The parent may be the top-level\
    \ window (top) or another Frame. Some useful options are bg=color, the background\
    \ color (as a color name or hex number) and bd=n, the border width in pixels.\n\
    - **but = Button(parent, text=string, command=function_name)**\n  - Creates a\
    \ button containing the string, which when clicked will call the named function.\
    \ Parameters cannot be supplied to the function.\n- **lab = Label(parent, text=string)**\n\
    \  - Creates a label that can be displayed but not edited by the user.\n  - To\
    \ change the text, use lab.configure(text=new_text).\n- **ent = Entry(parent,\
    \ width=n)**\n  - Creates a rectangle large enough to display approximately n\
    \ characters, into which the user can type a single line of text. More than n\
    \ characters may be entered, but they may not all be visible.\n  - To retrieve\
    \ the text, call ent.get().\n- **txt = Text(parent, width=num_characters, height=num_lines)**\n\
    \  - Creates a rectangle num_characters wide and num_lines high, into which the\
    \ user can type multiple lines of text."
