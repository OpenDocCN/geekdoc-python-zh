  md: "# 5.5 TEST SUITES\n\nUnit tests can be combined into a *test suite*. If the\
    \ file test-foo.py contains the class TestFoo, and the file testbar.py contains\
    \ the class TestBar, the test suite can be written like this:\n\n```\nimport unittest\n\
    import testfoo, testbar\n\ndef suite():\n    suite = unittest.TestSuite()\n  \
    \  suite.addTest(\n        unittest.makeSuite(\n            testfoo.TestFoo))\n\
    \    suite.addTest(\n        unittest.makeSuite(\n            testbar.TestBar))\n\
