    \ 39\n    3.2 Constructors and Self 41\n    3.3 Subclasses 44\n    3.4 Printing\
    \ Objects 45\n    3.5 Comparing Objects 47\n    3.6 Bindings 48\n    3.7 Shallow\
    \ and Deep Copies 50\n\n## Chapter 4 ■ Getting Fancy 53\n\n+   4.1 Statements\
    \ 53\n    4.2 Identifiers 56\n    4.3 Type Hints 57\n    4.4 Numbers 58\n    4.5\
    \ Strings 59\n    4.6 F-strings 60\n    4.7 Bit Operations 61\n    4.8 List Comprehensions\
    \ 62\n    4.9 Iterators 63\n    4.10 Generators 66\n    4.11 Parameters and Arguments\
    \ 68\n    4.12 Functional Programming 69\n\n## Chapter 5 ■ Testing 73\n\n+   5.1\
    \ Philosophy 74\n    5.2 Doctest 75\n    5.3 Unit Testing 77\n    5.4 Unit Test\
    \ Example 80\n    5.5 Test Suites 81\n\n## Chapter 6 ■ Graphical User Interfaces\
    \ 83\n\n+   6.1 Dialogs 83\n    6.2 Tkinter 84\n    6.3 Creating Widgets 85\n\
    \    6.4 Putting Widgets Into the GUI 87\n    6.5 Tkinter Example 89\n\n■ Afterword\
    \ 91\n\nAppendix A: string methods, 93\n\nAppendix B: Numerical Functions, 97\n\
    \nAppendix C: Statistics, 101\n\nAppendix D: Functions on Iterables, 103\n\nAppendix\
    \ E: Operating System Commands, 105\n\nAppendix F: Unit Test Methods, 107\n\n\
    Index, 109\n\n## Author\n\nI'm David Matuszek, known to most of my students as\
    \ “Dr. Dave.”\n\nI wrote my first program on punched cards in 1963, and immediately\
    \ got hooked.\n\nI taught my first computer classes in 1970 as a graduate student\
    \ in computer science at The University of Texas in Austin. I eventually received\
    \ my PhD from there, and I've been teaching ever since. Admittedly, I spent over\
    \ a dozen years in industry, but even then I taught as an adjunct for Villanova\
    \ University.\n\nI finally escaped from industry and joined the Villanova faculty\
    \ full time for a few years, and then moved to the University of Pennsylvania,\
    \ where I directed a master's program (MCIT, master's in computer and information\
    \ technology) for students coming into computer science from another discipline.\n\
    \nThroughout my career, my main interests have been in artificial intelligence\
    \ (AI) and programming languages. I've used a *lot* of programming languages.\n\
    \nI retired in 2017, but I can't stop teaching, so I'm writing a series of “quick\
    \ start” books on programming and programming languages. I've also written two\
    \ science fiction novels, *Ice Jockey* and *All True Value*, and I expect to write\
    \ more. Check them out!\n\nAnd hey, if you're a former student of mine, drop me\
    \ a note. I'd love to hear from you!\n\ndavid.matuszek@gmail.com\n\n## Preface\n\
    \nTHE PURPOSE OF THIS BOOK IS TO GET YOU, a programmer, up and productive in Python\
    \ as quickly as possible.\n\nDon’t buy this book if:\n\n- You aren’t already a\
    \ programmer (in some language), or\n- You want a comprehensive guide to Python.\n\
    \nWith that out of the way, let’s get started.\n\n![](img/56a03ab0edc4a75f1314c5904235c8ec_14_0.png)\n\
    \n## Taylor & Francis\n\nTaylor & Francis Group\n\nhttp://taylorandfrancis.com\n\
    \n## CHAPTER 1\n\n## The Absolute Bare Minimum\n\n### 1.1 PYTHON AND IDEs\n\n\
    Go to python.org and download the most recent version of Python (it’s free). Install\
    \ it on your computer as you would any other program.\n\nWhile you’re there, you\
    \ might want to explore the online documentation. A couple of clicks will bring\
    \ you to docs.python.org/3/, and from there the Library Reference link will bring\
    \ you to a long list of modules, each containing numerous useful methods.\n\n\
    Included in your Python download you will find a simple *IDE (Integrated Development\
    \ Environment)* called IDLE. You have four choices:\n\n- You can spend five minutes\
    \ learning how to use IDLE. This is what I recommend if you’re in a hurry."
