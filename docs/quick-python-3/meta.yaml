    \ 6 章\n\n## 图形用户界面\n\n### 6.1 对话框\n\n有几种 GUI（图形用户界面，发音为“gooey”）系统可以与 Python 一起使用。本章讨论\
    \ Tkinter，它随标准 Python 发行版捆绑提供。\n\n许多程序不需要完整的 GUI，只需要一两个对话框。Tkinter 提供了许多这样的对话框。要使用它们，请从\
    \ tkinter 导入 messagebox、simpledialog 和/或 filedialog。\n\n- `messagebox.showinfo(title,\
    \ message)`\n- `messagebox.showwarning(title, message)`\n- `messagebox.showerror(title,\
    \ message)`\n  - 以上所有本质上都是相同的；区别在于显示哪个图标。所有都提供标题、消息和一个“确定”按钮。\n- *result* = `messagebox.askyesno(*title*,\
