  md: '# Appendix B: Numerical Functions


    HERE ARE SOME BUILT-IN functions on numbers; you don''t need to import these.


    +   - abs($x$) returns the absolute value of a number $x$ (or the magnitude of
    a complex number).

    - bin($int$) returns a binary string representation of $int$.

    - chr($int$) returns the character whose Unicode representation is $int$. The
    inverse operation is ord.

    - divmod($x, y$) returns the tuple ($x // y, x \% y$) for integers.

    - float($x$) converts a string or integer $x$ to a floating point number.

    - hex($int$) returns a hexadecimal string representation of $int$.

    - int($x$) converts a string $x$ to an integer, or truncates a float $x$ to an
    integer.

    - oct($int$) returns an octal string representation of $int$.'
