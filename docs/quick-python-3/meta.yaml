    \ in Minion\nby MPS Limited, Dehradun\n\nTo all my students,\npast, present, and\
    \ future\n\n![](img/56a03ab0edc4a75f1314c5904235c8ec_6_0.png)\n\n## Taylor & Francis\n\
    \nTaylor & Francis Group\n\nhttp://taylorandfrancis.com\n\n## Contents\n\nAuthor,\
    \ xi\n\nPreface, xiii\n\n+   Chapter 1 ■ The Absolute Bare Minimum 1\n    1.1\
    \ Python and IDEs 1\n    1.2 IDLE 2\n    1.3 Variables 3\n    1.4 Important Data\
    \ Types 3\n    1.5 Basic Arithmetic 4\n    1.6 Comparisons 6\n    1.7 Booleans\
    \ 6\n    1.8 Lists 7\n    1.9 Strings 8\n    1.10 Comments 9\n    1.11 Statement\
    \ Types 9\n        1.11.1 Assignment Statements 10\n        1.11.2 Print “Statements”\
    \ 10\n        1.11.3 If Statements 11\n        1.11.4 While Loops 11\n       \
    \ 1.11.5 For Loops 12\n        1.11.6 Import Statements 13\n    1.12 Input from\
    \ the User 14\n    1.13 Functions 14\n    1.14 Syntax 15\n    1.15 Order of Execution\
    \ 16\n    1.16 Summary 16\n    1.17 Wait, That’s It? 17\n\n## Chapter 2 ■ Better\
    \ Tools 19\n\n+   2.1 Object Notation 19\n    2.2 Lists 20\n    2.3 Tuples 22\n\
    \    2.4 Sets 23\n    2.5 Dictionaries 25\n    2.6 String Methods 27\n    2.7\
    \ Loops for Objects 28\n        2.7.1 Looping over Lists 28\n        2.7.2 Looping\
    \ over Sets 29\n        2.7.3 Looping over Dictionaries 29\n    2.8 Handing Exceptions\
