    \ something from a dictionary:\n\n```\ndel phones[\"Xavier\"]\n```\n\nThe del\
    \ command will give a KeyError if the key is not in the dictionary, so check before\
    \ using del. (You can use the in and not in set operators to test if a key is\
    \ in the dictionary.)\n\nAs with sets, the elements of a dictionary are stored\
