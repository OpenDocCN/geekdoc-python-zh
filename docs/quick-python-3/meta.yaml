    - *file*.readlines() 读取整个文件并将其作为字符串列表返回，包括终止换行符。\n- 输入文件可以被迭代：`for line in file:\
    \ *statements*` 将读取文件中的每一行，将其赋值给变量 *line*，并执行 *statements*。*statements* 按照惯例缩进。\n\
    - *file*.write(*string*) 将字符串写入文件，并返回写入的字符数。\n- *file*.close() 关闭文件。**必须执行**。在完成文件操作后保持文件打开可能会导致问题。\n\
    \n例如，以下是一些用于计算文本文件行数的代码。\n\n```\ncount = 0\nwith open(file_name, 'r') as f:\n\
    \    while f.readline():\n        count += 1\n```\n\n由于历史原因，用于表示“换行”（'\\n'）的字符在\
