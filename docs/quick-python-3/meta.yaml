    A lambda expression consists of the keyword lambda, any number of parameters,
    a colon, and a single expression. In this example the result of the expression
    is a boolean, but it could be of any type.


    Python has a number of built-in functions that take a function as a parameter.
    Here are some of the most generally useful:


    +   - map(function, iterable) returns an iterator whose next function will get
    the next value of the iterable, apply the function to it, and return the result.

    - filter(predicate, iterable) returns an iterator whose next function will return
    the next value of the iterable that satisfies the predicate.

    - functools.reduce(binaryFunction, iterable) applies binaryFunction to the first
    two elements of the iterable. It then repeatedly applies binaryFunction to the
    current result and the next member of iterable, returning a single value as the
    result. (Note: reduce must be imported from functools.)


    **Examples:** If my_list is [3, 1, 4, 1, 6], then


    +   - map(lambda x: x * x, my_list) will return the values 9, 1, 16, 1, 36.

    - filter(lambda x: x > 1, my_list) will return the values 3, 4, 6.

    - reduce(lambda x, y: x + y, my_list) will return 15.'
