  - '[PAGE 120]


    # 106 ■ Appendix E: Operating System Commands


    +   - The mode is a Unix-style three-digit octal code. The three bits of each
    digit specify read, write, and execute permissions for owner, group, and world.

    - os.remove(path, dir_fd=None) deletes the single file path; not for directories.

    - os.rmdir(path, dir_fd=None) removes (deletes) the empty directory path.

    - os.rename(src, dst) renames the file or directory src to dst.

    - os.walk(top, topdown=True, onerror=None, followlinks=False) generates the file
    names in a directory tree by walking the tree either top-down or bottom-up. For
    each directory in the tree rooted at directory top (including top itself), it
    yields a 3-tuple (dirpath, dirnames, filenames).'
