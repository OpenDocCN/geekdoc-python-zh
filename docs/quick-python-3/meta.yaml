  md: '# Appendix D: Functions on Iterables


    HERE ARE SOME FUNCTIONS that take iterable objects (lists, sets, tuples, strings,
    dictionaries, ranges, files, and possibly others).


    +   - all(iterable) returns True if every element of iterable evaluates to a true
    value.

    - any(iterable) returns True if at least one element of iterable evaluates to
    a true value.

    - filter(test, iterable) returns an iterator for the items in iterable that pass
    the test.

    - len(iterable) returns the number of elements in iterable.

    - list(iterable) returns a list of the elements in iterable, in the same order.

    - map(function, iterable) returns an iterator. Each value returned by the iterator
    will be the result of applying the function to the corresponding value of the
    iterable.

    - max(iterable) returns the largest value in iterable.'
