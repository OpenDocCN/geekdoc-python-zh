    # 4.9 ITERATORS


    An iterable object is any object that can be stepped through. Iterable objects
    include lists, sets, tuples, strings, dictionaries, ranges, and files. An iterator
    is an object that keeps track of where it is in stepping through an iterable object,
    and provides the next value as needed.


    For example, you can get a list iterator by saying it = iter([2, 3, 5]). You can
    step through the elements of this list by repeatedly calling next(it); this will
    return 2, then 3, then 5. Yet another call to next(it) will raise a StopIteration
    exception.


    This is exactly how a for loop works. It starts by getting an iterator for an
    iterable object such as a list or range. Then it uses the iterator to get a single
    value from the object, executes the loop body, then returns to the iterator to
    get the next value. The for loop exits when it gets a StopIteration exception.'
