    \ 另一方面，文本文件可以作为二进制文件读取和写入而不会造成损害。\n\n## 2.12 PICKLING\n\n序列化（有时称为编组）是将对象转换为线性字节流。这样做可以将对象保存到文件中，或将其传输到另一个进程。字节流可以被反序列化（解组）以重建原始对象。\n\
    \n序列化 Python 对象最常见的方法称为 pickling。Python 也可以使用 JSON 和 XML 进行序列化，但这些格式不支持那么多对象类型。\n\
    \nPython 值和大多数内置对象都可以被 pickle，包括模块顶层的用户定义类和函数。递归和相互连接的对象也可以被 pickle。生成器、lambda\
    \ 函数、数据库连接和线程是少数不能被 pickle 的东西。\n\n要 pickle 或 unpickle 对象，首先导入 pickle，然后使用以下方法：\n\
    \n- pickle.dump(object, file) — 将对象保存到文件，该文件必须以 'wb'（写入二进制）模式打开。\n- variable =\
    \ pickle.load(file) — 重建先前写入文件的对象，该文件必须以 'rb'（读取二进制）模式打开。\n- str = pickle.dumps(object)\
    \ — 将对象保存到变量 str 中作为字符串。\n- object = pickle.loads(str) — 重建先前写入字符串 str 的对象。\n\n\
    Pickling 不安全。pickle 文件可能包含代码对象和数据来攻击你的系统。确保你 unpickle 的任何内容都来自可信来源，并且在传输过程中未被篡改。\n\
    \n# 类\n\n类定义了一个新的*类型*，以及一个用于创建该类型值的**构造函数**。该类型的值是**对象**，每个这样的**对象**将包含类中描述的变量和方法。\n\
    \n这里有一个类比：*类*就像一个蛋糕食谱，而*对象*是你按照食谱制作的蛋糕。蛋糕类中的变量可能包括糖、面粉和黄油，而方法可能包括混合、烘烤和上菜。\n\n\
    ## 3.1 类和继承\n\n定义类的语法是\n\n```\nclass ClassName(superclass):\n    variable and\
    \ method definitions\n```\n\n类被安排在一个**层次结构**中，object 类位于顶层。每个类（除了 object 本身）都有一个**超类**，并且它从该超类**继承**变量和方法。也就是说，超类中定义（或继承）的所有变量和方法对新类都是可用的。\n\
    \n例如，你可以定义一个 Person 类，包含变量 name 和 age 以及一个方法 greet。这种类型的每个对象都将拥有这些变量的各自副本，以及对\
    \ greet 方法的各自引用。然后，如果你创建一个 Customer 类作为 Person 的子类，那么 Customer 类型的每个对象都将拥有自己的\
    \ name 和 age 变量以及一个 greet 方法，外加你在 Customer 中声明的任何其他变量和方法（例如，一个购买列表）。\n\n特殊的 object\
    \ 类是所有类的“根”。如果你在定义类时省略了**超类**，它默认为以 object 作为超类。每个类都直接或间接地从 object 继承。\n\n> **术语：**\
    \ 作为名词，“实例”与“对象”含义相同。然而，我们通常在谈论特定对象时使用“实例”（john 是 Person 的一个实例），或者当我们用这个词作为形容词时（name\
    \ 是类 Person 的一个实例变量）。\n\n> **术语：** “字段”和“属性”是“实例变量”的其他名称。\n\n示例（非常糟糕的）类定义：\n\n\
    ```\nclass Person(object):\n    name = 'Joe'\n    age = 23\n\n    def say_hi(self):\n\
    \        print('Hello, Joe.')\n```\n\n- 要创建类的实例（对象），使用类名就像使用函数名一样，例如，`p = Person()`。以这种方式使用时，类名充当**构造函数**；它构造一个新对象。\n\
    - 我们可以使用**点表示法**访问对象 p 的字段：`p.name` 是 'Joe'，`p.age` 是 23。\n- 我们可以修改 p 的字段，例如通过\
    \ `p.name = 'Jack'`。\n- 我们可以使用点表示法与对象 p “对话”，或者更正式地说，“向对象 p 发送消息”：`p.say_hi()`\
    \ 告诉 p 执行 `say_hi`，p 将通过打印 Hello, Joe 来响应。\n\n**约定：** 类名总是以大写字母开头，变量和函数名总是以小写字母开头。\n\
    \n不幸的是，这个类的每个新创建的实例都将完全相同。我们希望创建具有不同 name 和 age 初始值的 Person 实例。为此，我们必须探索一个特殊变量：`self`。\n\
    \n## 3.2 构造函数和 self\n\n如果你熟悉其他语言中的类和对象，那么 Python 中的类和对象非常相似——除了你可能对 `self` 这个词感到困惑，它似乎无处不在。\n\
    \n请记住，我们从类创建的每个对象都有自己对该类每个字段（实例变量）的副本。如果我们有两个名为 joe 和 jane 的 Person 对象，那么它们每个都将有一个\
    \ name 字段和一个 age 字段。\n\n简而言之，类定义内部使用的名称 `self` 是我们正在与之对话的特定对象。类中的每个方法都必须将 `self`\
    \ 作为其第一个参数。\n\n这是一个更好的类定义：\n\n```\nclass Person(object):\n    def __init__(self,\
    \ name, age):\n        self.name = name\n        self.age = age\n    def say_hi(self):\n\
    \        print('Hello', self.name)\n```\n\n当你构造一个对象时，你可能想要指定其实例变量的值。例如，每个 Person\
    \ 对象都应该以其自己的 name 和 age 创建。这是通过在类定义中包含一个名为 `__init__` 的特殊方法来完成的。（那是 init，前后各有两个下划线。）`__init__`\
    \ 是一个**初始化器**——当你构造一个新对象时，它*从构造函数自动调用*。\n\n**技术说明：** Python 有许多 ***dunder 方法***，它们以双下划线开始和结束。Dunder\
