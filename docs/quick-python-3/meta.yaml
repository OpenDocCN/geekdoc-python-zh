    \ definitions\n```\n\nClasses are arranged in a **hierarchy**, with the object\
    \ class at the top. Every class (except object itself) has a **superclass**, and\
    \ it **inherits** variables and methods from that superclass. That is, all"
  - "[PAGE 54]\n\nvariables and methods defined in (or inherited by) the superclass\
    \ are available to the new class.\n\nFor example, you might define a class Person\
    \ with variables name and age and a method greet. Every object of this type will\
    \ have its own copies of those variables, and its own reference to the greet method.\
