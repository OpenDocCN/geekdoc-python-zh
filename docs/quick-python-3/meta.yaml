    # 94 ■ Appendix A: String Methods


    +   - **string**.isalpha() tests whether all characters are alphabetic.

    - **string**.isdigit() tests whether all characters are digits.

    - **string**.isidentifier() tests whether **string** is a nonempty string consisting
    of letters, digits, and/or underscores, and does not begin with a digit.

    - **string**.islower() tests whether all letters in **string** are lowercase—False
    if the string contains no letters.

    - **string**.isprintable() tests whether the string does not contain control characters.

    - **string**.isspace() tests whether all characters are whitespace (spaces, tabs,
    newlines, some Unicode characters)—False if **string** is the empty string.

    - **string**.isupper() tests whether all letters in **string** are uppercase—False
    if the string contains no letters.

    - **string**.join(list_of_strings) returns a single string, with the elements
    of the **list_of_strings** separated by **string**.

    - **string**.ljust(int) returns a copy of **string** left-justified in a field
    of length **int**.

    - **string**.lower() returns a copy of **string** with all letters lowercased.

    - **string1**.partition(string2) returns a 3-tuple: (the part of **string1** before
    **string2**, **string2** itself, the part after **string2**).

    - **string1**.replace(string2, string3) returns a copy of **string1** with all
    occurrences of **string2** replaced by **string3**.

    - **string**.rjust(int) returns a copy of the string right-justified in a field
    of length **int**.'
