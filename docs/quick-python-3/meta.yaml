    # 1.6 COMPARISONS


    Comparisons:


    +   - Equals (==), not equal (!=), less than (<), less than or equal (<=), greater
    than (>), and greater than or equal (>=).

    - Chaining: Unlike most languages, Python lets you chain comparisons, for example,
    2 < 3 < 4 > 2. All comparisons are performed pairwise, and the result is True
    if every individual comparison is True.


    # 1.7 BOOLEANS


    The two boolean (logical) values are True and False.


    Python has the boolean operators not, and, and or, with the usual meanings. The
    and and or operators are short-circuit; that is, the second operand is evaluated
    only if necessary.


    +   - In 2 == 2 or f(x), the first part (2 == 2) makes the whole expression True
    (because True or anything is True), so the second part, f(x), is never evaluated.'
