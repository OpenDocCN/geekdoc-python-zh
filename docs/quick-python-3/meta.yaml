- md: "You can make your own objects iterable. To do this:\n\n- The iterable class\
    \ must contain an `__iter__` method to create and return a new iterator object,\
    \ in a state where all items are yet to be delivered.\n- The iterator class contains\
    \ at least two methods:\n    - an `__init__` method which takes the iterable as\
    \ a parameter, saves it in an instance variable, and does whatever other setup\
    \ is necessary;\n    - a `__next__` method to find or compute the next value.\
    \ It should raise a StopIteration exception if called when there are no more values\
    \ to be returned.\n- These classes can be combined, so that the iterable object\
    \ is its own iterator. In this case, the class contains a `__next__` method, and\
    \ the `__iter__` method just returns self.\n\nAs a simple example, we can write\
    \ an iterable class MyList which holds a list, and an iterator class Reverser\
    \ which will iterate through the list in reverse order.\n\n```\nclass MyList():\n\
    \    def __init__(self, ls):\n        self.ls = ls\n\n    def __iter__(self):\n\
    \        return Reverser(self.ls)\n\nclass Reverser():\n    def __init__(self,\
    \ ls):\n        self.ls = ls\n        self.index = len(self.ls)\n\n    def __next__(self):\n\
    \        self.index = self.index - 1\n        if self.index >= 0:\n          \
    \  return self.ls[self.index]\n        raise StopIteration\n```\n\nThe iterator's\
    \ job is to keep track of where it is in the iteration, using its own variables\
    \ and not those of the iterable object. The iterator shouldn't affect or modify\
    \ the iterable object. This rule allows two or more iterators to run simultaneously\
    \ on the same object without interfering with each other.\n\nIf the classes are\
    \ combined so that the iterable is its own iterator, then only one iterator at\
    \ a time can be supported.\n\nA for loop may use any iterable object. In for loops,\
    \ the StopIteration exception does not result in an error; it merely terminates\
    \ the for loop. For example,\n\n```\nls = MyList([1, 2, 3, 4])\nfor e in ls:\n\
    \    print(e)\n```\n\nAlternatively, you can use the iter and next methods directly,\
    \ and handle the StopIteration exception yourself. This is essentially what the\
    \ previous for loop is doing.\n\n```\nls = MyList([1, 2, 3, 4])\nit = iter(ls)\n\
    while True:\n    try:\n        print(next(it))\n    except StopIteration:\n  \
    \      break\n```\n\nAn iterator can be used only once; when it raises the StopIteration\
    \ exception, it's done, and cannot be reset. Instead of resetting an iterator,\
    \ you can simply create another one.\n\nIf you have an iterator `it` that returns\
    \ a *finite* number of values and you need a list of those values, just say `list(it)`.\n\
    \n## 4.10 GENERATORS\n\nA **generator** is a kind of iterator. It generates values\
    \ one at a time, as needed, but it isn't necessarily tied to a particular kind\
    \ of object.\n\nOne kind of **generator expression** looks just like a list comprehension,\
    \ except that the enclosing brackets are replaced by parentheses. Generators may\
    \ be used wherever an iterator may be used, such as in a for loop. Example:\n\n\
    ```\nword = 'generator'\ngen = (c for c in word if c in 'aeiou')\n\nfor i in gen:\n\
    \    print(i, end=' ')\n```\n\nThis code will print e e a o.\n\n> **Caution:**\
    \ A generator is a kind of iterator, so after it returns all its values, it is\
    \ \"used up.\" If the above for loop were called a second time, it would not print\
    \ anything, because the variable `gen` would hold an empty generator.\n\nYou can\
    \ write functions that act as generators, by using `yield` instead of `return`.\
    \ Here is an example generator for powers of 2:\n\n```\ndef powers_of_two():\n\
    \    n = 2\n    for i in range(0, 5):\n        yield n\n        n *= 2\n```\n\n\
    When this function is called, it returns a *generator*, not a number. You can\
    \ use this generator in a for loop, the same way g was used above, and you will\
    \ get the values 2, 4, 8, 16, and 32.\n\n```\ngen = powers_of_two()\nfor n in\
    \ gen:\n    print(n)\n```\n\nSince gen is an iterator, you can use next(gen) to\
    \ get the next value. In this case you will have to handle the exception yourself.\n\
    \n```\ngen = powers_of_two()\nwhile True:\n    try:\n        print(next(gen))\n\
    \    except StopIteration:\n        break\n```\n\nHere's how this works:\n\n-\
    \ The call gen = powers_of_two() returns a generator and puts it in gen.\n- The\
    \ first call of next(gen) executes the generator down to the yield statement,\
    \ and returns the yielded value, just like a normal return statement. But in addition,\
    \ the generator remembers where it left off.\n- A subsequent call to next(gen)\
    \ will cause the generator to resume execution where it left off, that is, immediately\
    \ after the yield statement. All the values of local variables will have been\
    \ retained. As far as the generator is concerned, it is as if the yield had never\
    \ happened. In this example, the for loop keeps running.\n- You can have multiple\
    \ yield statements in a generator. The function will remember at which yield it\
    \ left off, and will continue from there.\n- Just as with iterators, a generator\
    \ will raise a StopIteration exception when there are no more values to return.\
    \ This happens automatically when it reaches the end of the function, or if it\
    \ reaches a return statement.\n\n## 4.11 PARAMETERS AND ARGUMENTS\n\nWith no additional\
    \ syntax, **arguments** (expressions in a function call) are matched to **parameters**\
    \ (variables in a function definition) by position. The first parameter gets the\
    \ value of the first expression, and so on.\n\n**Parameters** in a function definition\
    \ may be:\n\n- A simple variable name, matched and bound to an argument by position.\
    \ Positional parameters must precede any other parameters.\n- *variable=value*,\
    \ to give a default value for missing arguments.\n- *args, to accept multiple\
    \ arguments as a single tuple. By convention, the name args is usually used for\
    \ this purpose.\n- **kwargs, to accept multiple keyword arguments as a dictionary.\
    \ By convention, the name kwargs (keyword arguments) is usually used for this\
    \ purpose.\n\n*args* or **kwargs** can only be used as the last parameter, as\
    \ either one collects all remaining arguments.\n\n**Arguments** in a function\
    \ call may be:\n\n- An expression.\n- *name=value*, to give a value to the parameter\
    \ with that name. This is called a *named argument* or *keyword argument*.\n-\
    \ If both positional and keyword arguments are used, all positional arguments\
    \ must precede keyword arguments.\n- *iterable*, to pass the values of an iterable\
    \ as separate arguments.\n- **dictionary**, to pass in values to multiple parameters\
    \ by name.\n\nStarting with Python 3.8, arguments can be forced to be positional\
    \ only. A single slash, /, in place of a parameter means that all earlier arguments\
    \ must be positional. An asterisk, *, in place of a parameter means that all arguments\
    \ after that must be keyword. For example, given the function\n\n```\ndef foo(a,\
    \ b, /, c, d, *, e, f):\n    print(a, b, c, d, e, f)\n```\n\nArguments for a and\
    \ b must be by position only; arguments for e and f must be keyword arguments.\
    \ Arguments for c and d may be either (but since positional arguments must precede\
    \ keyword arguments, d cannot be positional if c is keyword).\n\nMany of the functions\
    \ described in the official Python documentation appear to have a single asterisk\
    \ as a parameter, for example, os.remove(path, *, dir_fd=None). This is a documentation\
    \ convention to indicate that the subsequent arguments can only be given as named\
    \ arguments. It does *not* mean you should put an asterisk in the function call.\n\
    \n## 4.12 FUNCTIONAL PROGRAMMING\n\nDefinitions of *functional programming* differ,\
    \ but in general include the following:\n\n- Functions are objects, and can be\
    \ treated like any other value.\n- Variables are *single-assignment*; once given\
    \ a value, they are never changed.\n- All functions are *pure*; the value returned\
    \ by a function depends only on the arguments given to it, and if called again\
    \ with the same arguments, it will produce the same value. This excludes any use\
    \ of global variables or other external factors, such as the system clock.\n\n\
    Functional programming is widely regarded as an ivory-tower technique, not suitable\
    \ for day-to-day programming. This is not the place to challenge that viewpoint,\
    \ other than to note that all modern programming languages support functional\
    \ programming to some extent.\n\nIn this book we consider only the first point\
    \ above: that functions are objects. We will consider only a single example of\
    \ such a use.\n\nThe following function will find the largest value in a nonempty\
    \ list of values:\n\n```\ndef biggest(values):\n    big = values[0]\n    for v\
    \ in values:\n        if v > big:\n            big = v\n    return big\n```\n\n\
    Since > can also be used to compare strings, this function can be used to find\
    \ the lexicographically largest string in a list of strings. But for almost any\
    \ other purpose (finding the smallest number, the longest string, etc.) you have\
    \ to write another, almost identical function.\n\nInstead of writing more and\
    \ more functions, we can replace the > with a generic test:"
  mdcn: "你可以创建自己的可迭代对象。为此：\n\n-   可迭代类必须包含一个 `__iter__` 方法，用于创建并返回一个新的迭代器对象，该对象处于所有元素尚未被取出的状态。\n\
    -   迭代器类至少包含两个方法：\n    -   一个 `__init__` 方法，它接受可迭代对象作为参数，将其保存在实例变量中，并执行任何其他必要的初始化操作；\n\
    \    -   一个 `__next__` 方法，用于查找或计算下一个值。如果没有更多值可返回时调用它，应引发 `StopIteration` 异常。\n\
    -   这些类可以合并，使得可迭代对象本身就是它自己的迭代器。在这种情况下，该类包含一个 `__next__` 方法，而 `__iter__` 方法只需返回\
    \ `self`。\n\n举个简单的例子，我们可以编写一个可迭代类 `MyList`，它持有一个列表，以及一个迭代器类 `Reverser`，它将按相反顺序遍历该列表。\n\
    \n```\nclass MyList():\n    def __init__(self, ls):\n        self.ls = ls\n\n\
    \    def __iter__(self):\n        return Reverser(self.ls)\n\nclass Reverser():\n\
    \    def __init__(self, ls):\n        self.ls = ls\n        self.index = len(self.ls)\n\
    \n    def __next__(self):\n        self.index = self.index - 1\n        if self.index\
    \ >= 0:\n            return self.ls[self.index]\n        raise StopIteration\n\
    ```\n\n迭代器的工作是使用自己的变量（而非可迭代对象的变量）来跟踪其在迭代过程中的位置。迭代器不应影响或修改可迭代对象。这一规则允许两个或多个迭代器同时在同一个对象上运行而互不干扰。\n\
    \n如果类被合并，使得可迭代对象就是它自己的迭代器，那么一次只能支持一个迭代器。\n\n`for` 循环可以使用任何可迭代对象。在 `for` 循环中，`StopIteration`\
    \ 异常不会导致错误；它只是终止 `for` 循环。例如：\n\n```\nls = MyList([1, 2, 3, 4])\nfor e in ls:\n\
    \    print(e)\n```\n\n或者，你可以直接使用 `iter` 和 `next` 方法，并自行处理 `StopIteration` 异常。这本质上就是前面\
    \ `for` 循环所做的事。\n\n```\nls = MyList([1, 2, 3, 4])\nit = iter(ls)\nwhile True:\n\
    \    try:\n        print(next(it))\n    except StopIteration:\n        break\n\
    ```\n\n迭代器只能使用一次；当它引发 `StopIteration` 异常时，它就完成了，无法重置。与其重置迭代器，不如直接创建一个新的。\n\n如果你有一个迭代器\
    \ `it`，它返回*有限*数量的值，并且你需要这些值的列表，只需说 `list(it)`。\n\n## 4.10 生成器\n\n**生成器**是一种迭代器。它按需一次生成一个值，但不一定与特定类型的对象绑定。\n\
    \n一种**生成器表达式**看起来就像列表推导式，只是外层的方括号被圆括号替代。生成器可以在任何可以使用迭代器的地方使用，例如在 `for` 循环中。示例：\n\
    \n```\nword = 'generator'\ngen = (c for c in word if c in 'aeiou')\n\nfor i in\
    \ gen:\n    print(i, end=' ')\n```\n\n这段代码将打印 `e e a o`。\n\n> **注意：** 生成器是一种迭代器，因此在它返回所有值之后，它就“用完了”。如果上面的\
    \ `for` 循环被第二次调用，它将不会打印任何内容，因为变量 `gen` 将持有一个空的生成器。\n\n你可以通过使用 `yield` 而不是 `return`\
    \ 来编写充当生成器的函数。下面是一个生成 2 的幂的生成器示例：\n\n```\ndef powers_of_two():\n    n = 2\n  \
    \  for i in range(0, 5):\n        yield n\n        n *= 2\n```\n\n当这个函数被调用时，它返回一个*生成器*，而不是一个数字。你可以在\
    \ `for` 循环中使用这个生成器，方式与上面使用 `gen` 相同，你将得到值 2, 4, 8, 16 和 32。\n\n```\ngen = powers_of_two()\n\
    for n in gen:\n    print(n)\n```\n\n由于 `gen` 是一个迭代器，你可以使用 `next(gen)` 来获取下一个值。在这种情况下，你必须自己处理异常。\n\
    \n```\ngen = powers_of_two()\nwhile True:\n    try:\n        print(next(gen))\n\
    \    except StopIteration:\n        break\n```\n\n以下是其工作原理：\n\n-   调用 `gen = powers_of_two()`\
    \ 返回一个生成器并将其放入 `gen` 中。\n-   第一次调用 `next(gen)` 会执行生成器直到 `yield` 语句，并返回 `yield`\
    \ 的值，就像普通的 `return` 语句一样。但除此之外，生成器还记住了它停止的位置。\n-   后续调用 `next(gen)` 将导致生成器从它停止的地方恢复执行，即在\
    \ `yield` 语句之后立即执行。所有局部变量的值都将被保留。就生成器而言，就好像 `yield` 从未发生过一样。在这个例子中，`for` 循环会继续运行。\n\
    -   你可以在生成器中有多个 `yield` 语句。函数会记住它在哪个 `yield` 处停止，并从那里继续。\n-   与迭代器一样，当没有更多值可返回时，生成器会引发\
    \ `StopIteration` 异常。当它到达函数末尾或遇到 `return` 语句时，这会自动发生。\n\n## 4.11 参数与实参\n\n在没有额外语法的情况下，**实参**（函数调用中的表达式）通过位置与**形参**（函数定义中的变量）匹配。第一个形参获取第一个表达式的值，依此类推。\n\
    \n函数定义中的**形参**可以是：\n\n-   一个简单的变量名，通过位置匹配并绑定到一个实参。位置形参必须位于任何其他形参之前。\n-   `*variable=value`，为缺失的实参提供默认值。\n\
    -   `*args`，接受多个实参作为一个元组。按照惯例，名称 `args` 通常用于此目的。\n-   `**kwargs`，接受多个关键字实参作为一个字典。按照惯例，名称\
    \ `kwargs`（关键字实参）通常用于此目的。\n\n`*args` 或 `**kwargs` 只能作为最后一个形参使用，因为它们中的任何一个都会收集所有剩余的实参。\n\
    \n函数调用中的**实参**可以是：\n\n-   一个表达式。\n-   `*name=value`，为具有该名称的形参提供一个值。这称为*命名实参*或*关键字实参*。\n\
    -   如果同时使用了位置实参和关键字实参，所有位置实参必须位于关键字实参之前。\n-   `*iterable`，将可迭代对象的值作为单独的实参传递。\n\
    -   `**dictionary`，通过名称将值传递给多个形参。\n\n从 Python 3.8 开始，实参可以强制为仅位置实参。在形参位置使用单个斜杠\
    \ `/` 意味着所有前面的实参必须是位置实参。在形参位置使用星号 `*` 意味着其后的所有实参必须是关键字实参。例如，给定函数：\n\n```\ndef\
    \ foo(a, b, /, c, d, *, e, f):\n    print(a, b, c, d, e, f)\n```\n\n`a` 和 `b`\
    \ 的实参必须仅通过位置传递；`e` 和 `f` 的实参必须是关键字实参。`c` 和 `d` 的实参可以是任意一种（但由于位置实参必须位于关键字实参之前，如果\
    \ `c` 是关键字实参，则 `d` 不能是位置实参）。\n\n官方 Python 文档中描述的许多函数似乎有一个单独的星号作为形参，例如 `os.remove(path,\
