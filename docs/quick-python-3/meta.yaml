    \n## 大卫·马图泽克\n\nCRC出版社\n泰勒-弗朗西斯集团\n查普曼与霍尔图书\n\n## 快速掌握Python 3\n\n你是一位想快速上手新语言的程序员吗？这本书就是为你准备的。\n\
    \n你是一位想学习编程的初学者吗？这本书*不适合*你。\n\n你是一位需要百科全书式信息的Python程序员吗？这本书*不适合*你。\n\n和任何主流语言一样，Python也有循环、if语句、赋值语句、函数等。我会向你展示它们在Python中的样子。我不会浪费你的时间去解释它们有什么用。\n\
