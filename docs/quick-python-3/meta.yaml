  md: '# 108 ■ Appendix F: Unit Test Methods


    +   - assertNotIn(a, b)

    - assertIsInstance(a, b)

    - assertNotInstance(a, b)

    - assertRaises(exception, function, arguments)


    All calls to these methods must be prefixed with self..


    Each of these methods has an optional final parameter, which may be any expression.
    It is used as a message in the AssertionError to provide any necessary additional
    information.


    These methods are not called directly. Instead, they should be put in one or more
    methods whose names begin with self.. Executing unittest.main() will find and
    execute all such methods.'
