    # 3.5 COMPARING OBJECTS


    The equality (==) and inequality (!=) operators work well for Python''s built-in
    object types. When you define your own classes, however, == will return False
    when comparing two distinct objects (but see below).


    It is important to keep in mind the distinction between *equal* and *identical*.


    +   - Two objects **a** and **b** are **equal** if every part of **a** is the
    same as the corresponding part of **b**; if you change **a**, **b** might or might
    not change. Testing for equality requires testing all the parts.

    - If **a** and **b** are **identical**, then they are just two different names
    for the same object; changing that object by doing something to **a** means that
    **b** also sees the change. Testing for identity just involves testing whether
    **a** and **b** both refer to the same location in memory.

    - Assignment, **a = b**, never makes a copy of an object **b**; it just makes
    **a** refer to the same object as **b**.

    - When you use an object as an argument to a function, the function gets a reference
    to the original object, not a copy.

    - **a is b** tests whether **a** and **b** refer to the same object; **a is not
    b** tests whether they are different (but possibly equal) objects.


    For your own class, you can define equality and ordering by defining some special
    methods in the class. (All these names use double underscores.)


    +   - `__eq__(self, other)` should return True if you consider the objects self
    and **other** to be equal, and False otherwise. Identical objects should be considered
    to be equal'
