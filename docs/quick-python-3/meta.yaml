  - "[PAGE 91]\n\nWhile doctest is a least-effort way to preserve some tests, it isn't\
    \ as flexible as unit testing.\n\n# 5.3 UNIT TESTING\n\nA **unit test** is a test\
    \ of the methods in a single class. A **test case** tests the response of a single\
    \ method to a particular set of inputs. To do unit testing,\n\n+   - import unittest\n\
    - import **fileToBeTested** or from **fileToBeTested** import *\n  - **Reminder:**\
    \ If you use from file import * then you don't have to precede every function\
    \ call with the name of the file it was imported from.\n- Write a class **SomeName**(unittest.TestCase).\
    \ Within the class,\n  - Define methods setUp(self) and tearDown(self), if wanted.\
    \ These are both optional.\n  - Provide one or more test**Something**(self) methods.\
    \ You may include other methods, but the names of test methods must begin with\
    \ test.\n- At the end of the test file, put unittest.main().\n\nHere's what unittest.main()\
    \ does. For each and every method whose name begins with test, the unittest.main\
    \ method calls setUp() if you have provided one, then calls the test method, then\
    \ calls tearDown() if you have provided one. So, every test is sandwiched between\
    \ setUp and tearDown.\n\nThe purpose of the setUp method is to make sure everything\
    \ is in a known, pristine state before calling the test method. In this"
  - "[PAGE 92]\n\nway you can make sure that the results of running one test do not\
    \ affect the results of a later test.\n\nThe purpose of tearDown is to remove\
    \ artifacts (such as files) that may have been created. It is used much less frequently\
    \ than setUp.\n\nEach test method should typically test only one function, though\
    \ it may call that function many times. If a function behaves differently for\
    \ different kinds of input (for example, positive or negative numbers), it's a\
    \ good idea to write multiple test methods.\n\nHere is a trivial example of a\
    \ test method:\n\n```\ndef test_add(self):\n    self.assertEqual(4, add(2, 2))\n\
    \    self.assertEqual(0, add(2, -2))\n```\n\nIt is conventional to put the expected\
    \ result (4 or 0) first, and the function call (add) last.\n\nIf any assertion\
    \ in a test method fails, the test fails and the remaining assertions in that\
    \ method are not tested. For this reason, test methods should not become too long.\n\
    \nIf the method to be tested is in a class C, and you used import C rather than\
    \ from C import *, you must also use the class name, for example, self.assertEqual(4,\
    \ C.add(2, 2)).\n\nHere are the most commonly used assertion methods:\n\n+   -\
    \ self.assertEqual(expected, actual)\n- self.assertAlmostEqual(expected, actual)\
    \ for floating point numbers.\n- self.assertTrue(boolean) and self.assertFalse(boolean)."
- md: "More assertion methods are given in Appendix F.\n\nYou can test whether a function\
    \ raises an exception when it is supposed to, but this test has a special form.\
    \ This is necessary because arguments to a function are evaluated before the function\
    \ is called. For example, if you said\n\n```\nself.assertRaises(ZeroDivisionError,\
    \ 5/0)\n```\n\nthen the argument 5/0 would be evaluated and would raise the exception\
    \ *before* assertRaises can be called.\n\nThe solution is to pass the function\
    \ name in separately from its arguments:\n\n```\nself.assertRaises(exception,\
    \ function_name, arguments)\n```\n\nThis allows the assertRaises function to call\
    \ the function to be tested within a try-except block, and handle it appropriately.\n\
    \nWhen testing is not being done, a common idiom is to put a call to the main\
    \ function as the last line in the code file, for example, main(). This causes\
    \ the main method to run immediately after the file is loaded. When doing unit\
    \ testing, this is undesirable. Instead, replace that line with\n\n```\nif __name__\
    \ == '__main__':\n    main()\n```\n\nand put the following code at the end of\
    \ the test file:\n\n```\nunittest.main()\n```\n\nIn this way, the program will\
    \ be run if loaded from the program file, and the tests will be run if loaded\
    \ from the test file.\n\n## 5.4 UNIT TEST EXAMPLE\n\nIn file get_digits.py:\n\n\
    ```\ndef get_digits(number):\n    \"\"\"Return a list of digits in an int or string.\"\
    \"\"\n    string = str(number)\n    return [x for x in string if x.isdigit()]\n\
    \ndef main():\n    s = input(\"Enter something: \")\n    digits = get_digits(s)\n\
    \    print(\"Digits found:\", digits)\n    if digits != []:\n        main()\n\n\
    # Call main() if and only if started from this file\nif __name__ == '__main__':\n\
    \    main()\n```\n\nIn file get_digits_test.py:\n\n```\nimport unittest\nfrom\
    \ get_digits import *\n\nclass test_get_digits(unittest.TestCase):\n\n    def\
    \ test_get_digits(self):\n        s = get_digits(\"<0.12-34 56abc789x\")\n   \
    \     self.assertEqual(list(\"0123456789\"),\n                         get_digits(s))\n\
    \        self.assertEqual(list(\"1230\"),\n                         get_digits(1230))\n\
    unittest.main()\n```\n\n## 5.5 TEST SUITES\n\nUnit tests can be combined into\
    \ a *test suite*. If the file test-foo.py contains the class TestFoo, and the\
    \ file testbar.py contains the class TestBar, the test suite can be written like\
    \ this:\n\n```\nimport unittest\nimport testfoo, testbar\n\ndef suite():\n   \
    \ suite = unittest.TestSuite()\n    suite.addTest(\n        unittest.makeSuite(\n\
    \            testfoo.TestFoo))\n    suite.addTest(\n        unittest.makeSuite(\n\
    \            testbar.TestBar))\n    return suite\n\nif __name__ == '__main__':\n\
    \    test_suite = suite()\n    runner = unittest.TextTestRunner()\n    runner.run\
    \ (test_suite)\n```\n\n# CHAPTER 6\n\n## Graphical User Interfaces\n\n### 6.1\
    \ DIALOGS\n\nThere are several GUI (Graphical User Interface, pronounced “gooey”)\
    \ systems that can be used with Python. This chapter discusses Tkinter, which\
    \ comes bundled with the standard Python distribution.\n\nMany programs do not\
    \ require a full GUI, just a dialog box or two. Tkinter provides a number of these.\
    \ To use them, import messagebox, simpledialog, and/or filedialog from tkinter.\n\
    \n- messagebox.showinfo(title, message)\n- messagebox.showwarning(title, message)\n\
    - messagebox.showerror(title, message)\n  - All the above are essentially the\
    \ same; the difference is which icon is displayed. All provide for a title, a\
    \ message, and an OK button.\n- *result* = messagebox.askyesno(*title*, *question*)\n\
    \  - This provides No and Yes buttons, which return False or True, respectively.\n\
    - *result* = simpledialog.askfloat(*title*, *message*)\n- *result* = simpledialog.askinteger(*title*,\
    \ *message*)\n- *result* = simpledialog.askstring(*title*, *message*)\n  - Allows\
    \ the user to enter a floating point number, integer, or string. Provides Cancel\
    \ and OK buttons; if the dialog is canceled, the value returned is None.\n- *input_file*\
    \ = filedialog.askopenfilename(initialdir=*path*, title=*title*)\n  - Asks for\
    \ a file to be read in. If an initialdir argument is provided, navigation starts\
    \ from that point.\n- *output_file* = filedialog.asksaveasfilename(initialdir=*path*)\n\
    \  - Asks for a location in which to save a file. If an initialdir argument is\
    \ provided, navigation starts from that point.\n\n### 6.2 TKINTER\n\n**GUI programs\
    \ work differently than programs without a GUI.** Instead of all code under control\
    \ of a main method, the program creates a GUI, and thereafter everything that\
    \ happens is a result of some user interaction with the GUI. For example, the\
    \ user clicks a button, and that causes certain code to be executed.\n\nStart\
    \ with\n\n```\nfrom tkinter import *\nimport tkinter.ttk\n```\n\nAfter that, your\
    \ code should create a “root” window,\n\n```\ntop = Tk()\n```\n\nNext, populate\
    \ the window with widgets (see below).\n\nFinally, turn over execution to the\
    \ GUI:\n\n```\ntop.mainloop()\n```\n\nThere are three main tasks to be performed:\n\
    \n1. Create some widgets (buttons, text areas, etc.).\n2. Arrange the widgets\
    \ in the window.\n3. Associate code with some of the widgets.\n\nYou can execute\
    \ some initialization code before calling mainloop, but once you call mainloop,\
    \ the GUI is in control.\n\nA minor annoyance is that whenever Tkinter is used\
    \ to build a GUI, it must display a “root window.” This is a small window that\
    \ appears on your screen and has no function. To eliminate it, create a root window\
    \ yourself and immediately hide it. This only needs to be done once.\n\n```\n\
    import tkinter\nroot = tkinter.Tk()\nroot.withdraw()\n```\n\n### 6.3 CREATING\
    \ WIDGETS\n\nThe window that opens when you run a GUI program is a **container**:\
    \ it can contain **widgets** (buttons, text areas, etc.). A **frame** is a container\
    \ that you can put inside a window, or in another frame.\n\nThere are 15 types\
    \ of widgets in Tkinter, each with many options, indicated with option=value.\
    \ This will cover only the most common types and options. In the following, we\
    \ assume that the window is called top.\n\n- **fr = Frame(parent, option, ...)**\n\
    \  - This is a container for widgets. The parent may be the top-level window (top)\
    \ or another Frame. Some useful options are bg=color, the background color (as\
    \ a color name or hex number) and bd=n, the border width in pixels.\n- **but =\
    \ Button(parent, text=string, command=function_name)**\n  - Creates a button containing\
    \ the string, which when clicked will call the named function. Parameters cannot\
    \ be supplied to the function.\n- **lab = Label(parent, text=string)**\n  - Creates\
    \ a label that can be displayed but not edited by the user.\n  - To change the\
    \ text, use lab.configure(text=new_text).\n- **ent = Entry(parent, width=n)**\n\
    \  - Creates a rectangle large enough to display approximately n characters, into\
    \ which the user can type a single line of text. More than n characters may be\
    \ entered, but they may not all be visible.\n  - To retrieve the text, call ent.get().\n\
    - **txt = Text(parent, width=num_characters, height=num_lines)**\n  - Creates\
    \ a rectangle num_characters wide and num_lines high, into which the user can\
    \ type multiple lines of text.\n  - Any number of lines may be entered, but only\
    \ the specified number will be visible.\n  - To retrieve the text, call `txt.get(1.0,\
    \ END)`.\n  - To delete all text, use `txt.delete(1.0, END)`.\n  - To insert text,\
    \ use `txt.insert(END, text)`.\n- `var = IntVar()`\n  - Defines `var` as an IntVar\
    \ (see Checkbutton below).\n- `chk = Checkbutton(parent, text=string, variable=var,\
    \ command=function)`\n  - The `var` must have been defined with IntVar().\n  -\
    \ Creates a checkbox with the given text.\n  - `var.get()` will return 1 if checked,\
    \ 0 if not checked.\n\n### 6.4 PUTTING WIDGETS INTO THE GUI\n\nThere are three\
    \ methods for arranging widgets into the main window and into frames: pack, grid,\
    \ and place. Only one of these methods should be used in any given window or frame.\n\
    \nComplex layouts can be created by putting multiple frames into the window and/or\
    \ into other frames, and using different layouts for the window and for each frame.\n\
    \n`widget.pack(options)` just adds the widget to the window or frame. Options\
    \ are:\n\n- `side=side` where `side` is one of LEFT, RIGHT, TOP, or BOTTOM to\
    \ add widgets starting from that side.\n- `expand=True` to expand the widget to\
    \ fill available space."
