    # 3.6 BINDINGS


    In a technical sense, every value in Python is an object. However, some objects
    are **immutable**: They cannot be changed. For example, the number 5 is immutable;
    you cannot change a 5 to a 6. If you have a variable x whose value is 5 (we say
    x is **bound** to 5), you can use an assignment statement to change the binding
    of x to 6, but 5 is still 5.'
