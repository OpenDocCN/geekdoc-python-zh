  - '[PAGE 52]


    # 2.12 PICKLING


    Serializing (sometimes called marshalling) an object is turning it into a linear
    stream of bytes. This can be done to save an object on a file, or to transmit
    it to another process. The byte stream can be deserialized (unmarshalled) to reconstruct
    the original object.


    The most common way to serialize Python objects is called pickling. Python can
    also use JSON and XML for serialization, but these do not support as many object
    types.


    Python values and most built-in objects can be pickled, including user-defined
    classes and functions at the top level of a module. Recursive and interconnected
    objects can be pickled. Generators, lambda functions, database connections, and
    threads are a few things that cannot be pickled.


    To pickle or unpickle objects, first import pickle, then use the following methods:


    +   - pickle.dump (object, file) — Saves object onto the file, which must have
    been opened in ''wb'' (write binary) mode.

    - variable = pickle.load (file) — Reconstructs the object previously written to
    file, which must have been opened in ''rb'' (read binary) mode.

    - str = pickle.dumps (object) — Saves object into the variable str as a string.

    - object = pickle.loads (str) — Reconstructs the object previously written to
    the string str.


    Pickling is not secure. A pickle file can contain code objects and data to attack
    your system. Make sure that anything you unpickle comes from a trusted source
    and has not been tampered with in transit.'
  - "[PAGE 53]\n\n# # Classes\n\nA CLASS DEFINES A NEW *type*, along with a **constructor**\
    \ for making values of that type. Values of that type are **objects**, and each\
    \ such **object** will contain the variables and methods described in the class.\n\
    \nHere is an analogy: A *class* is like a cake recipe, while *objects* are the\
    \ cakes you can make by following the recipe. The variables in the Cake class\
