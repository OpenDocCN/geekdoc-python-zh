  md: '# Appendix A: String Methods


    HERE ARE SOME OF THE string methods available from the string module (in alphabetical
    order):


    +   - **string.center(int)** returns a copy of **string** centered in a string
    of length **int**.

    - **string.count(substring)** returns the number of non-overlapping occurrences
    of **substring** in **string**.

    - **string.endswith(suffix)** returns True if string ends with **suffix**.

    - **string.find(substring)** returns the index of the beginning of the first occurrence
    of **substring** in **string**, or -1 if not found.

    - **string.format(values)** returns a string with the values inserted into placeholders
    of the form {index} or {variable}. Placeholders may contain an optional :formatting_code.

    - **string.isalnum()** tests whether all characters are alphanumeric (letters
    or digits).'
