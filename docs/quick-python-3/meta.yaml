  mdcn: "## 6.5 TKINTER 示例\n\n`fill` 指定如何扩展控件，其中 `how` 可以是 `X`（水平）、`Y`（垂直）、`BOTH`\
    \ 或 `NONE`。\n\n`widget.grid(options)` 将控件添加到网格（二维表格）中。选项如下：\n\n- `row=n` 控件所在的行。默认为第一个可用行。\n\
    - `column=n` 控件所在的列；默认为 0。\n- `rowspan=n` 控件应占据的行数。\n- `columnspan=n` 控件应占据的列数。\n\
    - `ipadx=n`, `ipady=n` 控件的内边距（以像素为单位），水平和垂直方向。\n- `sticky=d` 如果控件所在空间较大，将其放置在何处。`d`\
    \ 是 `N`、`S`、`E`、`W`、`NE`、`SE`、`NW`、`SW` 之一。\n\n`widget.place(options)` 精确指定每个控件的放置位置。选项如下：\n\
    \n- `x=pixels`, `y=pixels` 控件锚点相对于父容器的 x 和 y 位置。\n- `anchor=d` x 和 y 指的是控件的哪个部分，其中\
    \ `d` 是 `N`、`S`、`E`、`W`、`NE`、`SE`、`NW`、`SW` 之一。默认为 `NW`（左上角）。\n- `bordermode=OUTSIDE`\
    \ 在定位控件时考虑父容器的边框，否则为 `INSIDE`（`INSIDE` 是默认值）。\n- `height=pixels`, `width=pixels`\
    \ 控件的高度和宽度，以像素为单位。\n- `relx=float`, `rely=float` x 和 y 位置，作为父容器宽度和高度的分数（介于 0.0\
    \ 和 1.0 之间）。\n- `relwidth=float`, `relheight=float` 控件的大小，作为父容器宽度和高度的分数（介于 0.0\
    \ 和 1.0 之间）。\n\n这是一个掷单个骰子的程序。执行后，窗口应出现在屏幕的左上角。通过关闭窗口退出程序。\n\n```python\nfrom tkinter\
    \ import *\nimport tkinter.ttk\nfrom random import randint\n\ndef roll():\n  \
    \  n = str(randint(1, 6))\n    result.configure(text=n)\n\ntop = Tk()\n\nroll_button\
    \ = Button(top, text='Roll', command=roll)\nresult = Label(top, width=12)\n\n\
    roll_button.grid(row=0)\nresult.grid(row=1)\n```\n\n# 后记\n\n这本小册子涵盖了 Python 3\
    \ 的基础知识。与许多 Python 书籍不同，它还介绍了函数式编程、单元测试以及使用 Tkinter 进行 GUI 实现。\n\nPython 有大量的库例程可供探索。与任何语言一样，在语法和语义的各个角落都有许多意想不到的惊喜。\n\
    \n除此之外，还有大量现成的 Python 包可用——例如用于科学应用的 NumPy、用于自然语言处理的 NLTK，以及用于机器学习的 SciPy，仅举几例最受欢迎的。\n\
    \n如果你已经读到了本书的*最后*，并且在阅读过程中尝试了各种操作，那么你应该已经打下了坚实的基础，可以继续学习更多内容，并根据你的兴趣和需求探索任何方向。\n\
    \n编程愉快！\n\n# 附录 A：字符串方法\n\n以下是 `string` 模块中提供的一些字符串方法（按字母顺序排列）：\n\n- **`string.center(int)`**\
    \ 返回一个副本，其中 **`string`** 居中于长度为 **`int`** 的字符串中。\n- **`string.count(substring)`**\
    \ 返回 **`substring`** 在 **`string`** 中非重叠出现的次数。\n- **`string.endswith(suffix)`**\
    \ 如果字符串以 **`suffix`** 结尾，则返回 `True`。\n- **`string.find(substring)`** 返回 **`substring`**\
    \ 在 **`string`** 中首次出现的起始索引，如果未找到则返回 -1。\n- **`string.format(values)`** 返回一个字符串，其中值被插入到\
    \ `{index}` 或 `{variable}` 形式的占位符中。占位符可以包含可选的 `:formatting_code`。\n- **`string.isalnum()`**\
    \ 测试所有字符是否为字母数字（字母或数字）。\n- **`string.isalpha()`** 测试所有字符是否为字母。\n- **`string.isdigit()`**\
    \ 测试所有字符是否为数字。\n- **`string.isidentifier()`** 测试 **`string`** 是否为非空字符串，由字母、数字和/或下划线组成，且不以数字开头。\n\
    - **`string.islower()`** 测试 **`string`** 中的所有字母是否为小写——如果字符串不包含字母，则返回 `False`。\n\
    - **`string.isprintable()`** 测试字符串是否不包含控制字符。\n- **`string.isspace()`** 测试所有字符是否为空白字符（空格、制表符、换行符、某些\
    \ Unicode 字符）——如果 **`string`** 是空字符串，则返回 `False`。\n- **`string.isupper()`** 测试\
    \ **`string`** 中的所有字母是否为大写——如果字符串不包含字母，则返回 `False`。\n- **`string.join(list_of_strings)`**\
    \ 返回一个单一字符串，其中 **`list_of_strings`** 的元素由 **`string`** 分隔。\n- **`string.ljust(int)`**\
    \ 返回一个副本，其中 **`string`** 在长度为 **`int`** 的字段中左对齐。\n- **`string.lower()`** 返回一个副本，其中所有字母都转换为小写。\n\
    - **`string1.partition(string2)`** 返回一个三元组：（**`string1`** 中 **`string2`** 之前的部分、**`string2`**\
    \ 本身、**`string2`** 之后的部分）。\n- **`string1.replace(string2, string3)`** 返回一个副本，其中所有出现的\
    \ **`string2`** 都被替换为 **`string3`**。\n- **`string.rjust(int)`** 返回一个副本，其中字符串在长度为\
    \ **`int`** 的字段中右对齐。\n- **`string1.split(string2)`** 返回 **`string1`** 的子字符串列表，这些子字符串由\
    \ **`string2`** 分隔。如果省略 **`string2`**，则使用空白字符作为分隔符。\n- **`string.splitlines()`**\
    \ 返回 **`string`** 中的行列表，丢弃换行符。\n- **`string.startswith(prefix)`** 如果 **`string`**\
    \ 以 **`prefix`** 开头，则返回 `True`。\n- **`string.strip()`** 返回一个副本，其中所有前导和尾随空白字符都被移除。\n\
    - **`string.upper()`** 返回一个副本，其中所有字母都转换为大写。\n\n**此外：** 字符串可以被视为字符列表，因此所有列表方法都可以应用于字符串。\n\
    \n# 附录 B：数值函数\n\n以下是一些内置的数值函数；你不需要导入它们。\n\n- `abs(x)` 返回数字 `x` 的绝对值（或复数的模）。\n\
    - `bin(int)` 返回 `int` 的二进制字符串表示。\n- `chr(int)` 返回 Unicode 表示为 `int` 的字符。逆操作是 `ord`。\n\
    - `divmod(x, y)` 对于整数，返回元组 (`x // y`, `x % y`)。\n- `float(x)` 将字符串或整数 `x` 转换为浮点数。\n\
    - `hex(int)` 返回 `int` 的十六进制字符串表示。\n- `int(x)` 将字符串 `x` 转换为整数，或将浮点数 `x` 截断为整数。\n\
    - `oct(int)` 返回 `int` 的八进制字符串表示。\n- `pow(x, y)` 返回 `x` 的 `y` 次幂。\n- `round(float)`\
    \ 返回最接近给定浮点值的整数。\n- `round(float, int)` 返回四舍五入到小数点后 `int` 位的浮点数。\n\n`math` 模块包含许多默认情况下不可用的方法。以下是一些示例。\n\
    \n- `math.ceil(x)` 返回大于或等于 `x` 的最小整数。\n- `math.floor(x)` 返回小于或等于 `x` 的最大整数。\n\
    - `math.trunc(x)` 返回通过丢弃小数点后所有内容获得的整数值。\n- `math.gcd(a, b)` 返回两个参数的最大公约数。\n- `math.factorial(n)`\
    \ 返回前 `n` 个正整数的乘积。\n- `math.comb(n, k)` 返回从 `n` 个元素的集合中选取大小为 `k` 的可能子集的数量。\n-\
    \ `math.perm(n, k)` 返回大小为 `k` 的可能有序序列的数量，其中元素是从 `n` 个元素的集合中无放回抽取的。\n- `math.sqrt(x)`\
    \ 返回 `x` 的平方根。\n- `math.log(x)`, `math.log2(x)`, `math.log10(x)`, `math.log(x,\
    \ b)` 分别返回以 e、2、10 或 `b` 为底的 `x` 的对数。\n- `math.exp(x)` 返回 e^x。"
