  mdcn: "## 附录 C：统计模块\n\n以下是统计模块提供的一些函数。\n\n-   statistics.mean(**data**) 返回数据的数学“平均值”，通过将所有值相加，然后除以值的数量来计算。\n\
    -   statistics.median(**data**) 返回数据的“中间”数，使得一半的值小于或等于它，另一半大于或等于它。如果值的数量是偶数，则结果是两个中间值的平均值。\n\
