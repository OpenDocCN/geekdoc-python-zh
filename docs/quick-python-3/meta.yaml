    \ **obj** 不变但返回一个排序后的副本。\n\n## 3.7 浅拷贝和深拷贝\n\n对象可以包含对其他对象的引用。如果我们复制该对象，我们通常会得到一个**浅拷贝**：对象中的引用被复制了，但被引用的对象本身没有被复制。\n\
    \n```\ngrades = [[\"Mary\", \"A+\"], [\"Don\", \"C-\"]]\ngrades2 = grades[:]\n\
