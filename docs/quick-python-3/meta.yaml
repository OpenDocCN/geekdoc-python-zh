    A *string* is written as a sequence of characters enclosed in quote marks. Strings
    can be concatenated (added together) with the + operator; "Hello" + "World" gives
    "HelloWorld". You can also leave out the + between literal (quoted) strings and
    just separate them by spaces or tabs. (Newlines can also be used, if the strings
    are enclosed in parentheses).


    In Python, you can enclose strings in single quotes (''...''), double quotes ("..."),
    triple single quotes (''''''...'''''') or triple double quotes ("""..."""). You
    can insert single quotes inside double-quoted strings, double quotes inside single-quoted
    strings, and either inside triple-quoted strings. Triple-quoted strings may extend
    across more than one line. Python usually uses single quotes when printing out
    results.


    There is no separate "character" type.


    Special characters can be included in strings by "escaping" them (putting a backslash
    in front of them).


    +   - \n is a "newline" character, however that is encoded on your computer system.

    - \t is a tab character. It is a single character, but the amount of space that
    it represents depends on where tab stops are set in the application used to look
    at the code.

    - " is a double quote character (useful inside double-quoted strings).

    - \'' is a single quote character (useful inside single-quoted strings).'
