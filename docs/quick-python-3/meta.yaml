    # CHAPTER 1


    # The Absolute Bare Minimum


    # 1.1 PYTHON AND IDEs


    Go to python.org and download the most recent version of Python (it’s free). Install
    it on your computer as you would any other program.


    While you’re there, you might want to explore the online documentation. A couple
    of clicks will bring you to docs.python.org/3/, and from there the Library Reference
    link will bring you to a long list of modules, each containing numerous useful
    methods.


    Included in your Python download you will find a simple *IDE (Integrated Development
    Environment)* called IDLE. You have four choices:


    +   - You can spend five minutes learning how to use IDLE. This is what I recommend
    if you’re in a hurry.'
- md: "## 2 ■ Quick Python 3\n\n- 如果你已经熟悉专业的IDE，如Eclipse、IntelliJ IDEA、NetBeans或Jupyter\
    \ Notebook，会有多种Python插件可供选择。你可以花费无限的时间来选择、下载、安装和配置你的新插件。我建议在你对Python有了一些熟悉之后再这样做。\n\
    - 你可以从命令行运行Python。\n- 有几个在线的Python编译器/编辑器可供使用（搜索“Python online”）。这些非常适合尝试一些东西。\n\
    \n## 1.2 IDLE\n\n当你运行IDLE时，你会得到一个“Shell”窗口，你可以在>>>提示符下输入表达式或语句。\n\n- 如果你输入一个表达式，如2+2，IDLE会响应4和一个新的提示符。\n\
    - 如果你输入一个语句，如x=2+2，IDLE只响应一个新的提示符。（你可以通过输入表达式x来查看赋的值。）\n\n这是测试少量代码的好方法。\n\n要编写完整的程序，选择File\
    \ > New File并在那里输入你的代码。你必须在运行之前保存文件。扩展名.py会自动添加到文件名中，或者你可以自己添加。通过选择Run > Run Module或按F5来运行你的程序。\n\
    \n> **专业提示：** 每次你对程序进行更改时，都会在再次运行之前提示你保存。你可以通过转到Preferences > General，在At Start\
    \ of Run (F5)处选择No Prompt来跳过此步骤。\n\n花几分钟浏览一下菜单；里面有一些可以节省你时间的东西。请注意，菜单会根据你是在shell窗口还是文件窗口中而有所不同。\n\
    \n## 1.3 VARIABLES\n\n变量没有类型，也不需要声明。当你给变量赋值时，变量就存在了。\n\n**示例：** best_value = 36\n\
    \n**约定：** 变量名以小写字母开头，或在特殊情况下以下划线开头。对于多词变量名，大多数程序员使用下划线分隔单词（如上），但有些人使用“camelCase”（有时称为“studlyCaps”），如bestValue。\n\
    \n**注意：** Python的内置类型名和函数名不是保留字，很容易意外覆盖它们。例如，如果你使用list或abs作为变量名，你就不能再使用这些名称来创建列表或求绝对值。\n\
    \n## 1.4 IMPORTANT DATA TYPES\n\n基本数据类型与你已经习惯的类似：\n\n- int（整数）：73，-15，12345678901234567890。整数可以任意大。\n\
    - float（实数）：3.1416，6.022e+23。\n- bool（逻辑值，或布尔值）：True和False。注意这些是大写的。\n- str（字符串）：\"\
    Hello World\"，'Goodbye'。你可以使用单引号或双引号。你可以在双引号字符串中插入单引号，反之亦然。没有单独的“字符”类型。\n- list（类数组列表）：[1,\
    \ 2, \"Buckle my shoe\"]。列表不完全是数组，但你可以这样对待它们。列表是零索引的，所以如果my_list保存上述列表，my_list[0]是1。\n\
    \n还有一个简单但不寻常的类型：\n\n- NoneType，具有单个值None。None是一个实际的值，可以赋给变量；它*不是*尚未赋值的变量的默认值。在Python中，每个函数都返回一个值，None最常见于没有显式返回值的函数的结果。\n\
    \n其他数据类型（元组、集合和字典）将在后面讨论。\n\n## 1.5 BASIC ARITHMETIC\n\n- **加法**（+）、**减法**（-）、**乘法**（*）和**乘方**（**）。如果两个操作数都是整数，结果就是整数，否则结果是浮点数。\n\
    - **除法**（/）。使用/进行除法的结果始终是浮点数。\n- **整数除法**（//）。两个整数相除的结果是结果的整数部分，向下取整。如果//的一个或两个操作数是浮点数，结果是浮点数，向下舍入到最接近的整数值。因此，10\
    \ // 4是2，而10.0 // 4是2.0。\n- **取模**（%）。两个整数“取模”的结果是除法的余数。因此，20 % 7是6，因为7进入20两次，剩下6。如果%的一个或两个操作数是浮点数，结果是浮点数。*%运算符与百分比无关。*\n\
    - **运算符优先级：** 在复杂表达式中，\n  - 乘方首先执行，然后是乘法和除法（包括取模），然后是加法和减法。\n  - 多个乘方从右到左执行；也就是说，2**3**4意味着2**(3**4)。\n\
    \  - 其他相同优先级的操作从左到右执行，所以10-5-2意味着(10-5)-2。\n  - 如果有疑问，使用括号来控制运算顺序。\n\n除了/（总是产生浮点数）的情况外，如果两个操作数都是整数，操作的结果将是整数，否则将是浮点数。\n\
    \n> **注意：** 不同语言*对于使用//或%运算符与负数时的结果并不一致*！避免这种情况，或者如果无法避免，请进行实验直到你确定Python中的规则。然后在你的代码中添加适当的注释。\n\
    \n> **风格：** 在所有算术和比较运算符（包括赋值运算符=）周围放置空格。这使你的代码更易于阅读。\n\n类型之间的转换可以使用`float`、`int`、`round`和`str`函数进行。例如：\n\
    \n- `float(123)`、`float(\"123\")`和`float(\"123.0\")`都返回浮点数123.0。\n- round(123.45678,\
    \ 3)返回浮点数123.457，四舍五入到小数点后三位。这对于更整洁地打印数字很有用。\n- int(56.78)和int(\"56\")都返回整数56。从浮点数转换时，小数点后的数字被丢弃。\n\
    - round(56.78)返回57。浮点数四舍五入到最接近的整数。\n- str(arg)将返回其参数的字符串版本。几乎所有东西，而不仅仅是数字，都可以转换为字符串表示。\n\
    \n## 1.6 COMPARISONS\n\n比较：\n\n- 等于（==），不等于（!=），小于（<），小于或等于（<=），大于（>），大于或等于（>=）。\n\
    - 链式比较：与大多数语言不同，Python允许你链式比较，例如，2 < 3 < 4 > 2。所有比较都是成对执行的，如果每个单独的比较都是True，则结果为True。\n\
    \n## 1.7 BOOLEANS\n\n两个布尔（逻辑）值是True和False。\n\nPython具有布尔运算符not、and和or，具有通常的含义。and和or运算符是短路的；也就是说，只有在必要时才评估第二个操作数。\n\
    \n- 在2 == 2 or f(x)中，第一部分（2 == 2）使整个表达式为True（因为True或任何东西都是True），所以第二部分f(x)永远不会被评估。\n\
    - 类似地，在2 == 5 and f(x)中，第一部分（2 == 5）使整个表达式为False，所以第二部分f(x)永远不会被评估。\n\n比较运算符（<,\
    \ <=, ==, !=, >=, >）也适用于布尔值；True大于False。\n\n在数值表达式中，True的值为1，False的值为0。在布尔表达式中，所有数值零值为假，所有非零值为真。使用这些事实会使你的代码不够明确。\n\
    \n特殊值None表示“无值”，被视为假。\n\n**if表达式**根据给定的**条件**是否为真，产生两个值之一。语法是：\n\n```\nvalueIfTrue\
    \ if condition else valueIfFalse\n```\n\n## 1.8 LISTS\n\n**列表**写为方括号中的一系列值。\n\n\
    列表可以像数组一样对待。如果my_list是一个包含100个值的列表，第一个元素是my_list[0]，最后一个元素是my_list[99]。你可以使用括号表示法来访问列表元素并更改其值；例如，\n\
    \n```\nmy_list[5] = my_list[4] + my_list[3]\n```\n\n方便的是，列表可以从另一端访问，使用负数：my_list[-1]与my_list[99]相同，my_list[-2]与my_list[98]相同，依此类推。"
