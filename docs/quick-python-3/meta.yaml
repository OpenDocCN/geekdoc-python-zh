    -   所有函数都是*纯*的；函数返回的值仅取决于传递给它的实参，如果使用相同的实参再次调用，它将产生相同的值。这排除了任何全局变量或其他外部因素（如系统时钟）的使用。\n\
    \n函数式编程被广泛认为是一种象牙塔技术，不适合日常编程。这里不是挑战这一观点的地方，只是指出所有现代编程语言都在一定程度上支持函数式编程。\n\n在本书中，我们只考虑上述第一点：函数是对象。我们将只考虑这种用法的一个例子。\n\
