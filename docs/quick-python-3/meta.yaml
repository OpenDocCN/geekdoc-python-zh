    # 1.5 BASIC ARITHMETIC


    +   - **Add** (+), **subtract** (-), **multiply** (*), and **exponentiation**
    (**). If both operands are integers, the result is an integer, otherwise the result
    is a float.


    +   - **Divide** (/). The result of a division using / is always a float.


    +   - **Integer divide** (//). The result of dividing two integers is the integer
    part of the result, rounded down. If either or both operands of // are floats,
    the result is a float, rounded down to the nearest integer value. Thus, 10 //
    4 is 2, while 10.0 // 4 is 2.0.


    +   - **Modulus** (%). The result of “modding” two integers is the remainder of
    the division. Thus, 20 % 7 is 6, because 7 goes into 20 twice, with 6 left over.
    If one or both operands of % are floats, the result is a float. *The % operator
    has nothing to do with percentages.*'
