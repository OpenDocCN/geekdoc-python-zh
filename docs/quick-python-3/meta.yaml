    that are separated by **string2**. If **string2** is omitted, whitespace is used
    as the separator.

    - **string.splitlines()** returns a list of the lines in **string**, discarding
    newline characters.

    - **string.startswith(prefix)** returns True if **string** starts with **prefix**.

    - **string.strip()** returns a copy of **string** with all leading and trailing
