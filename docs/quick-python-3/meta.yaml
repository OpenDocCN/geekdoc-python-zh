    # 4.5 STRINGS


    A **string** is written as a sequence of zero or more characters enclosed in single
    quotes (''...''), double quotes ("..."), triple single quotes (''''''...''''''),
    or triple double quotes ("""..."""). It can be treated as a list of characters.


    **Triply-quoted strings** may extend across several lines, and include the line
    breaks as part of the string, unless the line break is immediately preceded by
    a backslash (\).


    A **raw string** is a string prefixed with r or R. In a raw string the backslash
    does not escape characters; all characters stand for themselves. This is especially
    useful when writing regular expressions.


    **Regular expressions** in Python follow the POSIX standards, and are usually
    written as raw strings. They will not be covered here.'
