    # 1.11 STATEMENT TYPES


    **Indentation matters.** Statements at the same level must be indented exactly
    the same amount. Nested statements, for example, statements within a loop body,
    must be indented relative to the start of the loop. Where Java and the C family
    of languages use braces, Python uses indentation.


    Standard indentation is four spaces. **You may *not* mix spaces with tabs.** However,
    any IDE and any good text editor can be set to put in four spaces when you hit
    the Tab key on your keyboard.


    The first line of a program may not be indented.


    Each statement is written on a line by itself, but if the line contains an unclosed
    (, [, or {, it may be continued on the next line.


    If you want to put two statements on the same line, you can separate them with
    a semicolon, ;. If you are used to a language in which every statement ends with
    a semicolon, this will work in Python, it just looks strange to seasoned Python
    programmers.


    If you are using IDLE, it will automatically indent after any line ending with
    a colon. If it fails to indent, that means you forgot the colon.'
