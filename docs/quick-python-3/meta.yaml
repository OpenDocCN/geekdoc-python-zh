    \ 61\n-   anonymous function, 71\n-   append (list method), 21\n-   arguments,\
    \ 68\n-   arithmetic, 4\n-   askfloat (tkinter method), 84\n-   askinteger (tkinter\
    \ method), 84\n-   askopenfilename (tkinter method), 84\n-   askyesno (tkinter\
    \ method), 84\n-   assert statement, 54\n-   assertAlmostEqual (unittest method),\
    \ 78\n-   assertEqual (unittest method), 78\n-   assertRaises (unittest method),\
    \ 79\n-   assertTrue (unittest method), 78\n-   assignment statements, 10\n- \
