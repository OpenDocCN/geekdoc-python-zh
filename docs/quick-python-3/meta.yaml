    \ familiar with sets from mathematics, Python provides the most common operations:\
    \ union, intersection, difference, and set difference. These can be written either\
    \ as operators or as method calls.\n\n- *set1* | *set2* or *set1*.union(*set2*)\
    \ returns the set of elements that are in either *set1* or *set2*, or both.\n\
    - *set1* & *set2* or *set1*.intersection(*set2*) returns the set of elements that\
    \ are in both *set1* and *set2*.\n- *set1* - *set2* or *set1*.difference(*set2*)\
    \ returns the set of elements that are in *set1* but not in *set2*.\n- *set1*\
    \ ^ *set2* or *set1*.symmetric_difference(*set2*) returns the set of elements\
    \ that are in exactly one of the sets.\n- *set1*.issubset(*set2*) returns True\
    \ if every element of *set1* is also in *set2*.\n- *set1*.issuperset(*set2*) returns\
    \ True if every element of *set2* is also in *set1*.\n\nThe comparison operators\
