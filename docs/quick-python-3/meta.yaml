    \ c = \"xyz\" # a is now \"x\", b is \"y\", and c is \"z\"\n- y = x[1] # y is\
    \ now 2 (tuples are zero-indexed)\n- z = x[1:] # ok to use slices; z is now (2,\
    \ 3)\n- a, b = b, a # the values of a and b are interchanged\n\nTuples are **immutable**:\
    \ You cannot change their contents. For example, if x is (1, 2, 3), then x[0]\
    \ = 5 is illegal.\n\n## 2.4 SETS\n\nA set is a collection of values, not necessarily\
    \ all the same type. A set literal is written as braces around a comma-separated\
    \ list. For example:\n\n```\ns = {10, \"ten\", \"X\"}\n```\n\nThe empty set (the\
    \ one with no elements) cannot be written as {}, because that's an empty dictionary\
    \ (see the next section). Use set() instead.\n\nSets have two important properties:\n\
    \n- Sets have no duplicate elements. A value is either *in* the set, or it is\
    \ *not in* the set. In fact, in and not in are operators, so you could ask 10\
    \ in s (which is True) or \"TEN\" not in s (also True).\n- The order of elements\
