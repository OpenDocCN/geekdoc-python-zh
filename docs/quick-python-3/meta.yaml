- md: "QUICK PROGRAMMING SERIES\n\n## Quick Python 3\n\n![](img/56a03ab0edc4a75f1314c5904235c8ec_0_0.png)\n\
    \n## David Matuszek\n\nCRC Press\nTaylor & Francis Group\nA CHAPMAN & HALL BOOK\n\
    \n## Quick Python 3\n\nAre you a programmer who wants to get started quickly in\
    \ a new language? This book is for you.\n\nAre you a novice who wants to learn\
    \ to program? This book is *not* for you.\n\nAre you a Python programmer who needs\
    \ encyclopaedic information? This book is *not* for you.\n\nLike any mainstream\
    \ language, Python has loops, if statements, assignment statements, functions,\
    \ etc. I'll show you what these look like in Python. I won't waste your time telling\
    \ you what they're good for.\n\nPython has features you may not be familiar with—iterators,\
    \ list comprehensions, maybe even dictionaries. I'll spend more time on these.\n\
    \nI'll cover some of the library functions I found most immediately useful and\
    \ tell you where to find more.\n\nIn short, this book will help you hit the ground\
    \ running. Next week, you'll be ready to buy that Python encyclopedia.\n\n![](img/56a03ab0edc4a75f1314c5904235c8ec_2_0.png)\n\
    \n## Taylor & Francis\n\nTaylor & Francis Group\n\nhttp://taylorandfrancis.com\n\
