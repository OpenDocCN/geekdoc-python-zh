    \n# 6.4 PUTTING WIDGETS INTO THE GUI\n\nThere are three methods for arranging\
    \ widgets into the main window and into frames: pack, grid, and place. Only one\
    \ of these methods should be used in any given window or frame.\n\nComplex layouts\
    \ can be created by putting multiple frames into the window and/or into other\
    \ frames, and using different layouts for the window and for each frame.\n\n`widget.pack(options)`\
    \ just adds the widget to the window or frame. Options are:\n\n+   - `side=side`\
    \ where `side` is one of LEFT, RIGHT, TOP, or BOTTOM to add widgets starting from\
    \ that side.\n- `expand=True` to expand the widget to fill available space."
