  - "[PAGE 93]\n\nMore assertion methods are given in Appendix F.\n\nYou can test\
    \ whether a function raises an exception when it is supposed to, but this test\
    \ has a special form. This is necessary because arguments to a function are evaluated\
    \ before the function is called. For example, if you said\n\n```\nself.assertRaises(ZeroDivisionError,\
    \ 5/0)\n```\n\nthen the argument 5/0 would be evaluated and would raise the exception\
    \ *before* assertRaises can be called.\n\nThe solution is to pass the function\
    \ name in separately from its arguments:\n\n```\nself.assertRaises(exception,\
    \ function_name, arguments)\n```\n\nThis allows the assertRaises function to call\
    \ the function to be tested within a try-except block, and handle it appropriately.\n\
    \nWhen testing is not being done, a common idiom is to put a call to the main\
    \ function as the last line in the code file, for example, main(). This causes\
    \ the main method to run immediately after the file is loaded. When doing unit\
    \ testing, this is undesirable. Instead, replace that line with\n\n```\nif __name__\
    \ == '__main__':\n    main()\n```\n\nand put the following code at the end of\
    \ the test file:\n\n```\nunittest.main()\n```\n\nIn this way, the program will\
    \ be run if loaded from the program file, and the tests will be run if loaded\
    \ from the test file."
