    \ `None`。\n- *input_file* = `filedialog.askopenfilename(initialdir=*path*, title=*title*)`\n\
    \  - 请求读入一个文件。如果提供了 `initialdir` 参数，导航将从该点开始。\n- *output_file* = `filedialog.asksaveasfilename(initialdir=*path*)`\n\
    \  - 请求保存文件的位置。如果提供了 `initialdir` 参数，导航将从该点开始。\n\n### 6.2 TKINTER\n\n**GUI 程序的工作方式与没有\
    \ GUI 的程序不同。** 程序不是在主方法的控制下运行所有代码，而是创建一个 GUI，此后发生的一切都是用户与 GUI 交互的结果。例如，用户点击一个按钮，这会导致执行某些代码。\n\
    \n从以下开始\n\n```\nfrom tkinter import *\nimport tkinter.ttk\n```\n\n之后，你的代码应该创建一个“根”窗口，\n\
    \n```\ntop = Tk()\n```\n\n接下来，用控件填充窗口（见下文）。\n\n最后，将执行权交给 GUI：\n\n```\ntop.mainloop()\n\
    ```\n\n需要执行三个主要任务：\n\n1. 创建一些控件（按钮、文本区域等）。\n2. 在窗口中排列控件。\n3. 将代码与某些控件关联。\n\n你可以在调用\
    \ `mainloop` 之前执行一些初始化代码，但一旦调用 `mainloop`，GUI 就接管了控制。\n\n一个小麻烦是，每当使用 Tkinter 构建\
    \ GUI 时，它必须显示一个“根窗口”。这是一个出现在你屏幕上的小窗口，没有功能。要消除它，你可以自己创建一个根窗口并立即隐藏它。这只需要做一次。\n\n\
    ```\nimport tkinter\nroot = tkinter.Tk()\nroot.withdraw()\n```\n\n### 6.3 创建控件\n\
    \n运行 GUI 程序时打开的窗口是一个**容器**：它可以包含**控件**（按钮、文本区域等）。**框架**是一个容器，你可以将其放入窗口中，或放入另一个框架中。\n\
    \nTkinter 中有 15 种类型的控件，每种都有许多选项，用 `option=value` 表示。这里只介绍最常见的类型和选项。在下文中，我们假设窗口名为\
    \ `top`。\n\n- **`fr = Frame(parent, option, ...)`**\n  - 这是一个用于放置控件的容器。`parent`\
    \ 可以是顶层窗口（`top`）或另一个 `Frame`。一些有用的选项是 `bg=color`（背景颜色，作为颜色名称或十六进制数）和 `bd=n`（边框宽度，以像素为单位）。\n\
    - **`but = Button(parent, text=string, command=function_name)`**\n  - 创建一个包含字符串的按钮，点击时将调用指定的函数。无法向函数提供参数。\n\
    - **`lab = Label(parent, text=string)`**\n  - 创建一个可以显示但用户不能编辑的标签。\n  - 要更改文本，使用\
    \ `lab.configure(text=new_text)`。\n- **`ent = Entry(parent, width=n)`**\n  - 创建一个足够显示大约\
    \ `n` 个字符的矩形，用户可以在其中输入单行文本。可以输入超过 `n` 个字符，但可能无法全部显示。\n  - 要检索文本，调用 `ent.get()`。\n\
    - **`txt = Text(parent, width=num_characters, height=num_lines)`**\n  - 创建一个宽度为\
    \ `num_characters`、高度为 `num_lines` 的矩形，用户可以在其中输入多行文本。\n  - 可以输入任意数量的行，但只有指定数量的行会可见。\n\
    \  - 要检索文本，调用 `txt.get(1.0, END)`。\n  - 要删除所有文本，使用 `txt.delete(1.0, END)`。\n \
    \ - 要插入文本，使用 `txt.insert(END, text)`。\n- `var = IntVar()`\n  - 将 `var` 定义为 `IntVar`（参见下面的\
    \ `Checkbutton`）。\n- `chk = Checkbutton(parent, text=string, variable=var, command=function)`\n\
    \  - `var` 必须已用 `IntVar()` 定义。\n  - 创建一个带有给定文本的复选框。\n  - 如果选中，`var.get()` 将返回\
    \ `1`，如果未选中则返回 `0`。\n\n### 6.4 将控件放入 GUI\n\n有三种方法可以将控件排列到主窗口和框架中：`pack`、`grid`\
    \ 和 `place`。在任何给定的窗口或框架中，只能使用其中一种方法。\n\n可以通过将多个框架放入窗口和/或其他框架中，并为窗口和每个框架使用不同的布局来创建复杂的布局。\n\
    \n`widget.pack(options)` 只是将控件添加到窗口或框架中。选项有：\n\n- `side=side`，其中 `side` 是 `LEFT`、`RIGHT`、`TOP`\
    \ 或 `BOTTOM` 之一，用于从该侧开始添加控件。\n- `expand=True` 以扩展控件以填充可用空间。"
