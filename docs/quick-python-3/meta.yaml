    from statistics import *\na = [1, 2, 3, 4, 5, 5, 78]\nprint(f\"{mean(a)=}, {median(a)=},\
    \ {mode(a)=}\")\n```\n\n输出：\n\n```\nmean(a)=14, median(a)=4, mode(a)=5\n```\n\n\
    以下是更多函数：\n\n-   statistics.stdev(data) 返回样本标准差。\n-   statistics.variance(data)\
    \ 返回样本方差。\n\n使用与上面相同的 `a` 值，\n\n```\nprint(f\"{stdev(a):6.2f}, {variance(a):6.2f}\"\
    )\n```\n\n输出：\n\n```\n28.26, 798.67\n```\n\n统计模块还包括用于处理正态分布的函数。\n\n## 附录 D：可迭代对象上的函数\n\
    \n以下是接受可迭代对象（列表、集合、元组、字符串、字典、范围、文件，可能还有其他）的一些函数。\n\n-   all(iterable) 如果可迭代对象的每个元素都评估为真值，则返回\
    \ True。\n-   any(iterable) 如果可迭代对象中至少有一个元素评估为真值，则返回 True。\n-   filter(test, iterable)\
    \ 返回一个迭代器，用于可迭代对象中通过测试的项目。\n-   len(iterable) 返回可迭代对象中的元素数量。\n-   list(iterable)\
    \ 返回可迭代对象中元素的列表，顺序相同。\n-   map(function, iterable) 返回一个迭代器。迭代器返回的每个值都是将函数应用于可迭代对象相应值的结果。\n\
    -   max(iterable) 返回可迭代对象中的最大值。\n-   min(iterable) 返回可迭代对象中的最小值。\n-   set(iterable)\
    \ 返回可迭代对象中值的集合。\n-   sorted(iterable) 返回可迭代对象中元素的列表，按排序顺序排列。\n-   sum(iterable)\
    \ 返回可迭代对象中值的总和。\n-   tuple(iterable) 返回可迭代对象中元素的元组，顺序相同。\n-   zip(iterable1,...,iterableN)\
    \ 返回一个 N 元组的迭代器，其中第一个元组包含每个可迭代对象的第一个值，第二个元组包含每个可迭代对象的第二个值，依此类推。当任何一个可迭代对象用尽值时，迭代停止。\n\
    -   element in iterable 如果 element 在可迭代对象中，则返回 True。\n-   element not in iterable\
    \ 如果 element 不在可迭代对象中，则返回 True。\n\n通常，接受可迭代对象的函数也可以接受迭代器或生成器。如果这样做，迭代器或生成器将以其当前状态传入，该状态可能位于可迭代对象的开头，也可能不是。\n\
    \n上述一些函数必须检查可迭代对象的每个元素（例如 max）。其他函数，如 any，可能检查也可能不检查每个元素。应注意不要使用产生无限数量值的迭代器或生成器调用此类函数。\n\
    \n## 附录 E：操作系统命令\n\n以下是导入 `os` 时可用的一些函数：\n\n-   os.getcwd() 获取当前工作目录。\n-   os.chdir(path)\
    \ 将当前工作目录更改为 `path`。路径（以字符串形式给出）可以是绝对路径或相对路径。\n-   os.listdir(path='.') 返回一个列表，包含目录\
    \ `'.'` 中条目的名称。\n    -   请注意，`path`（非斜体）是一个关键字，而不是可以替换为其他名称的变量。在其他函数中，`path`（斜体）表示包含字符串的变量，或字符串本身。\n\
    -   os.mkdir(path, mode=0o777, dir_fd=None) 创建一个名为 `path` 的目录，数字模式为 `0o777`。\n\
    \    -   模式是 Unix 风格的三位八进制代码。每个数字的三位分别指定所有者、组和其他用户的读、写和执行权限。\n-   os.remove(path,\
    \ dir_fd=None) 删除单个文件 `path`；不适用于目录。\n-   os.rmdir(path, dir_fd=None) 移除（删除）空目录\
    \ `path`。\n-   os.rename(src, dst) 将文件或目录 `src` 重命名为 `dst`。\n-   os.walk(top,\
    \ topdown=True, onerror=None, followlinks=False) 通过自上而下或自下而上遍历目录树来生成目录树中的文件名。对于以目录\
    \ `top` 为根的目录树中的每个目录（包括 `top` 本身），它会生成一个三元组 `(dirpath, dirnames, filenames)`。\n\
    \n## 附录 F：单元测试方法\n\n以下是 `unittest` 中可用的一些方法，其中大部分是不言自明的。\n\n-   assertEqual(a,\
    \ b)\n-   assertNotEqual(a, b)\n-   assertAlmostEqual(a, b) # 用于浮点数\n-   assertAlmostEqual(a,\
    \ b, places)\n-   assertTrue(x)\n-   assertFalse(x)\n-   assertIs(a, b) # 测试同一性\n\
    -   assertIsNot(a, b)\n-   assertIsNone(x)\n-   assertIsNotNone(x)\n-   assertIn(a,\
    \ b)\n-   assertNotIn(a, b)\n-   assertIsInstance(a, b)\n-   assertNotInstance(a,\
    \ b)\n-   assertRaises(exception, function, arguments)\n\n所有对这些方法的调用都必须以 `self`\
    \ 为前缀。\n\n这些方法中的每一个都有一个可选的最终参数，可以是任何表达式。它用作 `AssertionError` 中的消息，以提供任何必要的附加信息。\n\
    \n这些方法不直接调用。相反，它们应该放在一个或多个以 `self` 开头的方法中。执行 `unittest.main()` 将找到并执行所有这些方法。\n\
    \n## 索引\n\n-   *args, 68\n-   **dictionary, 69\n-   % formatting, 60\n-   *iterable,\
