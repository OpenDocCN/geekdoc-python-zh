    • column=n The column to put the widget in; default is 0.

    • rowspan=n The number of rows the widget should occupy.

    • columnspan=n The number of columns the widget should occupy.

    • ipadx=n, ipady=n The amount (in pixels) to pad the widget, horizontally and
    vertically.

    • sticky=d Where to put the widget if in a larger space. d is one of N, S, E,
    W, NE, SE, NW, SW.


    widget.place(options) specifies exactly where to place each widget. Options are:


    +   • x=pixels, y=pixels The x and y position of the anchor point of the widget,
    relative to the parent.

    • anchor=d Which part of the widget the x and y refer to, where d is one of N,
    S, E, W, NE, SE, NW, SW. The default is NW (top-left corner).

    • bordermode=OUTSIDE to take the parent''s border into account when positioning
    the widget, else INSIDE (INSIDE is the default).

    • height=pixels, width=pixels The height and width of the widget, in pixels.'
