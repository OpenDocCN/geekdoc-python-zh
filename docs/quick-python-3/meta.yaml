    \    print(value, \"is at\", index)\n```\n\nNote that parentheses around the returned\
    \ tuples are optional.\n\nSimpler is generally better, so don't use a loop that\
    \ gets indices unless you really need them.\n\n### 2.7.2 Looping over Sets\n\n\
    The simple form of the for loop works for sets:\n\n```\nfor e in my_set:\n   \
