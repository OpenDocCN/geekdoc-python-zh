    # 2.2 LISTS


    A Python **list** is an indexable sequence of values, not necessarily all of the
    same type. The first index is 0. You can create a list by writing a comma-separated
    sequence of values enclosed in brackets, [].


    Examples:


    +   - s = ["Mary", 23, "A+"]

    - name = s[0] # name is now "Mary"

    - s[1] += 1 # s is now ["Mary", 24, "A+"]

    - The empty list is written as [].


    You can create a list of an arbitrary size by "multiplying" it by an integer.
    The integer must be to the right of the * operator.


    +   - [0] * 4 # result is [0, 0, 0, 0]

    - [None] * 100 # result is 100 None''s

    - [2, 4] * 3 # result is [2, 4, 2, 4, 2, 4]


    If *x* is a list, and you say *y = x*, then *y* becomes *another name for the
    same list*, not a copy of *x*. That is, any change you make to *y* also changes
    *x*, and vice versa.


    Here are two useful *functions* on lists:


    +   - len(**my_list**) returns the number of elements in the list.

    - sorted(**my_list**) returns a copy of the list with the elements in ascending
