- img_proc: true
  md: '# 104 ■ Appendix D: Functions on Iterables


    +   - min(iterable) returns the smallest value in iterable.

    - set(iterable) returns a set of the values in iterable.

    - sorted(iterable) returns a list of the elements in iterable, in sorted order.

    - sum(iterable) returns the sum of the values in iterable.

    - tuple(iterable) returns a tuple of the elements in iterable, in the same order.

    - zip(iterable1,...,iterableN) returns an iterator of N-tuples, where the first
    tuple contains the first value in each iterable, the second tuple contains the
    second value in each iterable, and so on. Iteration stops when any one of the
    iterables runs out of values.

    - element in iterable returns True if element is in iterable.

    - element not in iterable returns True if element is not in iterable.


    Functions that take an iterable object can, in general, also take an iterator
    or a generator. If this is done, the iterator or generator will be passed in its
    current state, which may or may not be at the start of the iterable.


    Some of the above functions have to examine every element of the iterable (max,
    for example). Others, like any, may or may not examine every element. Care should
    be taken not to call such a function with an iterator or generator that produces
    an infinite number of values.'
