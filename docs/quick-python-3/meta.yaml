    \ character in an f-string, double it.\n\n## 2.7 LOOPS FOR OBJECTS\n\nIterables,\
    \ such as lists, tuples, sets, and dictionaries can be iterated over with for\
    \ loops.\n\n### 2.7.1 Looping over Lists\n\nIf you want to do something with every\
    \ element of a list or other iterable type, you can use a for loop. A simple for\
    \ loop looks like this:\n\n```\nfor e in my_list:\n    print(e)\n```\n\nIf you\
    \ need to work with not only the elements in the list, but also their position\
    \ in the list, you can use a more complicated version of the for loop:\n\n```\n\
    for i in range(0, len(my_list)):\n    print(my_list[i], \"is at\", i)\n```\n\n\
    The enumerate function provides a better way to get (**index, value**) tuples.\
