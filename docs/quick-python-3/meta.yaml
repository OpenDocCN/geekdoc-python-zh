  md: '# CHAPTER 5


    # Testing


    CODE HAS TO BE TESTED. It is unusual for any significant piece of code to run
    correctly the first time.


    One all-too-common approach is to try out the code as it is being written, conclude
    that everything is correct, and do nothing to preserve the tests. This does nothing
    to future-proof the code against more subtle errors, and makes it more difficult
    to modify the code as requirements change.


    A *test framework* is software that:


    +   1. allows tests to be written in a simple, standardized form; and

    2. allows the tests to be run with an absolute minimum of effort.


    In the following sections we will discuss two frameworks, doctest and unittest.'
  merge: -1
