    我是大卫·马图泽克，我的大多数学生都叫我“戴夫博士”。\n\n我于1963年在穿孔卡片上编写了第一个程序，并立即着了迷。\n\n1970年，我在德克萨斯大学奥斯汀分校计算机科学系攻读研究生时，开始教授我的第一门计算机课程。我最终在那里获得了博士学位，并从此一直从事教学工作。诚然，我在工业界工作了十多年，但即使在那时，我也作为兼职教师在维拉诺瓦大学任教。\n\
    \n我最终离开了工业界，全职加入维拉诺瓦大学教职员工队伍几年，然后转到宾夕法尼亚大学，在那里我指导了一个面向来自其他学科的计算机科学学生的硕士项目（MCIT，计算机与信息技术硕士）。\n\
    \n在我的整个职业生涯中，我的主要兴趣一直是人工智能（AI）和编程语言。我使用过*很多*编程语言。\n\n我于2017年退休，但我无法停止教学，所以我正在编写一系列关于编程和编程语言的“快速入门”书籍。我还写了两本科幻小说，《冰上曲棍球手》和《所有真实价值》，我预计还会写更多。去看看吧！\n\
    \n嘿，如果你是我的前学生，请给我发个消息。我很乐意收到你的来信！\n\ndavid.matuszek@gmail.com\n\n## 前言\n\n本书的目的是让你，一位程序员，尽快上手并高效使用Python。\n\
    \n如果你不是程序员（使用某种语言），或者你想找一本全面的Python指南，请不要购买本书。\n\n说完这些，让我们开始吧。\n\n![](img/56a03ab0edc4a75f1314c5904235c8ec_14_0.png)\n\
    \n## 泰勒-弗朗西斯\n\n泰勒-弗朗西斯集团\n\nhttp://taylorandfrancis.com\n\n## 第1章\n\n## 最基础的入门知识\n\
    \n### 1.1 PYTHON与集成开发环境\n\n访问 python.org 并下载最新版本的Python（它是免费的）。像安装任何其他程序一样将其安装到你的计算机上。\n\
    \n在访问网站时，你可能想浏览在线文档。点击几下就能到达 docs.python.org/3/，从那里点击库参考链接，你会看到一个长长的模块列表，每个模块都包含许多有用的方法。\n\
    \n在你的Python下载中，你会找到一个简单的*IDE（集成开发环境）*，名为IDLE。你有四个选择：\n\n- 你可以花五分钟学习如何使用IDLE。如果你赶时间，我推荐这样做。"
