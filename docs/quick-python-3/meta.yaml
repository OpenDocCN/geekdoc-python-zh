  md: "way you can make sure that the results of running one test do not affect the\
    \ results of a later test.\n\nThe purpose of tearDown is to remove artifacts (such\
    \ as files) that may have been created. It is used much less frequently than setUp.\n\
    \nEach test method should typically test only one function, though it may call\
    \ that function many times. If a function behaves differently for different kinds\
    \ of input (for example, positive or negative numbers), it's a good idea to write\
    \ multiple test methods.\n\nHere is a trivial example of a test method:\n\n```\n\
    def test_add(self):\n    self.assertEqual(4, add(2, 2))\n    self.assertEqual(0,\
    \ add(2, -2))\n```\n\nIt is conventional to put the expected result (4 or 0) first,\
    \ and the function call (add) last.\n\nIf any assertion in a test method fails,\
    \ the test fails and the remaining assertions in that method are not tested. For\
    \ this reason, test methods should not become too long.\n\nIf the method to be\
    \ tested is in a class C, and you used import C rather than from C import *, you\
    \ must also use the class name, for example, self.assertEqual(4, C.add(2, 2)).\n\
    \nHere are the most commonly used assertion methods:\n\n+   - self.assertEqual(expected,\
    \ actual)\n- self.assertAlmostEqual(expected, actual) for floating point numbers.\n\
    - self.assertTrue(boolean) and self.assertFalse(boolean)."
