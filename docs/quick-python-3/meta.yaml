    # Author


    I''m David Matuszek, known to most of my students as “Dr. Dave.”


    I wrote my first program on punched cards in 1963, and immediately got hooked.


    I taught my first computer classes in 1970 as a graduate student in computer science
    at The University of Texas in Austin. I eventually received my PhD from there,
    and I''ve been teaching ever since. Admittedly, I spent over a dozen years in
    industry, but even then I taught as an adjunct for Villanova University.


    I finally escaped from industry and joined the Villanova faculty full time for
    a few years, and then moved to the University of Pennsylvania, where I directed
    a master''s program (MCIT, master''s in computer and information technology) for
    students coming into computer science from another discipline.


    Throughout my career, my main interests have been in artificial intelligence (AI)
    and programming languages. I''ve used a *lot* of programming languages.


    I retired in 2017, but I can''t stop teaching, so I''m writing a series of “quick
    start” books on programming and programming languages. I''ve also written two
    science fiction novels, *Ice*'
  - '[PAGE 12]


    xii ■ Author


    *Jockey* and *All True Value*, and I expect to write more. Check them out!


    And hey, if you''re a former student of mine, drop me a note. I''d love to hear
    from you!


    david.matuszek@gmail.com'
  - '[PAGE 13]


    # Preface


    THE PURPOSE OF THIS BOOK IS TO GET YOU, a programmer, up and productive in Python
    as quickly as possible.


    Don’t buy this book if:


    +   - You aren’t already a programmer (in some language), or

    - You want a comprehensive guide to Python.


    With that out of the way, let’s get started.'
