  - '[PAGE 65]


    +   - The assignment to grades2 makes a new list containing copies of those references.

    - The assignment to grades2[0] changes the first reference in grades2 to a new
    list, ["Bob", "B"].

    - grades2[1] is still a copy of the reference in grades[1], and both refer to
    the same list ["Don", "C-"], so the assignment to grades[1][1] changes the contents
    of that list.


    Python provides a deepcopy method to make a completely independent **deep copy**
    of an object, to any level. This works even for cyclic objects, that is, objects
    that contain themselves.


    ```

    import copy

    grades3 = copy.deepcopy(grades)

    grades3[1][1] = "D+"

    # grades is unchanged

    ```'
