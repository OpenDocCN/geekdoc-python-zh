  md: "When you do an assignment, you **bind** the variable to a value. If you then\
    \ assign that variable to a new variable, the binding is simply copied.\n\n```\n\
    a = 5 # bind a to 5\nb = a # copy a's binding into b\na = 6 # change the binding\
    \ of a\nprint(b) # b is still bound to 5\n```\n\nNumbers, strings, booleans, and\
    \ tuples are immutable. A list, however, is **mutable**: You can change the values\
    \ in a list, but it's still the same list. Sets, dictionaries, and most other\
    \ objects are mutable.\n\nBinding works the same way for mutable objects as it\
    \ does for immutable objects.\n\n```\na = [1, 2, 3] # bind a to the list\nb =\
    \ a # copy a's binding into b\na = [4, 5, 6] # change the binding of a\nprint(b)\
    \ # b is still bound to [1, 2, 3]\n```\n\nChanging the values in a mutable object\
    \ *does not change* any variable bindings.\n\n```\na = [1, 2, 3] # bind a to the\
    \ list\nb = a # copy a's binding into b\na[0] = 99 # change the list, not the\
    \ bindings\nprint(b) # b still bound to the same list,\n    # but the list is\
    \ now [99, 2, 3]\n```\n\nWhen a function is called, the values of the arguments\
    \ in the call are bound to the parameters of the function; in other words, those\
    \ values are assigned to the parameters. When a function returns, it does *not*\
    \ copy the parameter values back into the argument list, but any mutable objects\
    \ passed to the function could have been changed in the function."
