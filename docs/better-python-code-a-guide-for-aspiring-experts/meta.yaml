    \ `@functools.lru_cache` 类似的是 `@functools.cache`，它在 Python 3.9 中添加。它只是“最近最少使用”（LRU）缓存的无界变体。两者之间存在权衡：无界缓存可能更快，但也可能无限增加内存使用量。\n\
    \n一个非常有趣的类装饰器是 `functools.total_ordering`。如果我们希望自定义类的实例可排序并支持不等式和相等比较，我们需要实现 `__lt__()`、`__le__()`、`__gt__()`\
    \ 或 `__ge__()` 以及 `__eq__()`。这是一项繁重的工作，使用装饰器可以使其变得更容易。\n\n### 可比较的人\n\n```python\n\
    >>> import random\n>>> from functools import total_ordering, cached_property\n\
    >>> @total_ordering\n... class Person:\n...     def __init__(self, firstname,\
    \ lastname):\n...         self.firstname = firstname\n...         self.lastname\
    \ = lastname\n...\n...     def __eq__(self, other):                     # ❶\n\
    ...         return (self.firstname == other.firstname and\n...               \
    \  self.lastname == other.lastname)\n...\n...     def __gt__(self, other):   \
    \                  # ❶\n...         return ((self.lastname, self.firstname) >\n\
    ...                 (other.lastname, other.firstname))\n...\n...     @cached_property\
    \                             # ❷\n...     def lucky_number(self):\n...      \
    \   print(f\"Generating for {self.firstname} {self.lastname}\")\n...         return\
    \ random.randint(1, 100)\n...\n>>> person1 = Person(\"David\", \"Mertz\")\n>>>\
    \ person2 = Person(\"Guido\", \"van Rossum\")\n>>> person3 = Person(\"Grace\"\
    , \"Hopper\")\n>>> person1 <= person3                             # ❸\nFalse\n\
    \n>>> person1.lucky_number\nGenerating for David Mertz\n88\n>>> person1.lucky_number\
    \                           # ❹\n88\n>>> person2.lucky_number\nGenerating for\
    \ Guido van Rossum\n17\n>>> person2.lucky_number                           # ❹\n\
    17\n```\n\n- ❶ 可以实现任意两个比较魔术方法，其余的将为我们自动构建。\n- ❷ 此属性仅计算一次，然后被缓存。\n- ❸ 一个我们未直接实现的比较，`.__le__()`。\n\
    - ❹ 第二次访问没有副作用，也不会再次调用 `randint()`。\n\nPython 标准库中散布着许多其他有用的装饰器，许多库和框架也提供了自己的装饰器。大多数时候，使用装饰器提供了一种干净、简洁且富有表现力的方式来创建代码，而无需显式编写。与大多数事物一样，装饰器也有其滥用之处；当使用得当时，它们使代码更加\
    \ Pythonic。\n\n## 4.3.3 充分使用 itertools\n\n这个陷阱与本节中的其他陷阱一样，只是描述了开发者可能采取的方法比使用 `itertools`\
    \ 模块版本所支持的方法*更差*。这种“更差”很少是产生错误结果的问题，而通常是产生正确结果更慢的问题，有时在大O复杂度行为上更差（即，快速超出可用时间和计算机资源）。\n\
    \n基本的 Python 语言非常强大。Python 强调的概念之一是*惰性计算*。具体来说，Python 中的可迭代对象可能很大或无限。具体集合也是（通常）可迭代的，但许多不是具体集合的可迭代对象具有一个很好的特性：一次只产生一个对象，并且除了该对象所需的内存外几乎不需要额外内存。\n\
    \n> **注意 可迭代对象和迭代器**\n\n概念的新用户通常会忽略*可迭代对象*和*迭代器*之间有些微妙的区别。许多可迭代对象就是它们自己的迭代器这一事实无助于理清这种混淆。这些类型的东西在程序上由\
    \ `collections.abc.Iterable` 和 `collections.abc.Iterator` 分别定义。\n\n简而言之，可迭代对象是一个对象，当传递给内置函数\
    \ `iter()` 时，返回一个迭代器。迭代器只是一个对象，当传递给内置函数 `next()` 时，要么返回一个值，要么引发 `StopIteration`。这两个简单的属性使得可迭代对象和迭代器能够与循环、推导式和其他“可迭代上下文”*良好协作*。\n\
    \n生成器函数在调用时返回迭代器。但可迭代对象和迭代器也可以由自定义类定义。通常，是魔术方法的存在允许对象与运算符和内置函数一起工作。一个典型的此类类可能如下所示。\n\
    \n### 既是可迭代对象又是迭代器的类\n\n```python\n>>> class Ones:\n...     def __next__(self):\n\
    ...         return 1\n...     def __iter__(self):\n...         return self\n...\n\
    >>> list(zip(Ones(), \"ABC\"))\n[(1, 'A'), (1, 'B'), (1, 'C')]\n```\n\n由于 `Ones`\
    \ 类的实例在传递给 `iter()` 时返回自身（这在任何可迭代上下文中隐式发生，例如作为 `zip()` 的参数），`Ones()` 既是可迭代对象又是迭代器。我们可以将其等效地写为\
    \ `itertools.repeat(1)`，它同样产生无限多个值（在示例中，数字1无限多次）。"
