    addressed since 2010 was met with a recommendation of “use `defaultdict`.”


    Both of these collections are subclasses of `dict` that add specialized capabilities.
    A default dictionary is only narrowly specialized, and in that sense is more general
    than `collections.Counter`, `collections.OrderedDict`, or `collections.UserDict`.
