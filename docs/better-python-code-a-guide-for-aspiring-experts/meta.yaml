    What is happening here is that immutable strings are being allocated and deallocated
    with many of the concatenations. It’s not quite on every concatenation since CPython
    uses some overallocation internally, but it is common. This leads to approximately
    quadratic (i.e., O(N²) on number of words) growth in the complexity.


    It happens that for the toy code I show, there is a solution that involves almost
    no change to the `lorem_ipsum()` function. However, this approach does not generalize
    if you are doing much more than building one single long string. Python is optimized
    to treat *in-place* string concatenation more like it does appending to a list,
    which has amortized O(N) behavior (the section “Deleting or Adding Elements to
    the Middle of a List” in Chapter 7, *Misusing Data Structures*, discusses amortized
    cost further).


