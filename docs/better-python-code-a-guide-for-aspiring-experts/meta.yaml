  - "[PAGE 53]\n\n# 2.2 Overchecking for Boolean Values\n\nNearly all objects in Python\
    \ are “truthy” or “falsy.” That is to say that in a *Boolean context*, almost\
    \ all objects are perfectly usable “bare” without wrapping them in `bool()`, and\
    \ especially not with a completely pointless comparison of `obj is True` or `obj\
    \ is False`.\nWhile often the `is True` and `is False` are simply unnecessary,\
    \ they can sometimes cause actual bugs. The value you obtain from a function call—specifically\
    \ from a function that you did not write yourself, such as a function from a library—may\
    \ not be `True` or `False` since the API only guarantees or attempts to return\
    \ a truthy or falsy value. Quite often, assuming a value is an actual Boolean\
    \ will *often* work, then fail unexpectedly where the function utilizes a different\
    \ type of object, such as to communicate a sentinel.\n\n> **Note Special cases\
    \ of truthiness**\n\nAs a quick guide, numbers that are equal to zero are falsy.\
    \ So are collections that are empty. So are string-like objects of length zero.\
    \ Naturally, so are the singletons `False` and `None`. When you see those values\
    \ in a “Boolean context” they are equivalent to an actual `False`. Most other\
    \ objects are truthy.\nWell-known objects that are neither truthy nor falsy are\
    \ NumPy arrays and Pandas Series and DataFrames.\n\npython\n>>> import numpy as\
    \ np\n>>> import pandas as pd\n>>> arr = np.array([1, 2])\n>>> bool(arr)\nValueError:\
    \ The truth value of an array with more than one element is ambiguous. Use a.any()\
    \ or a.all()\n\n>>> series = pd.Series([1, 2], index=[\"A\", \"B\"])\n>>> series\n\
    A    1\nB    2\ndtype: int64\n>>> bool(series)\nValueError: The truth value of\
    \ a Series is ambiguous.\n    Use a.empty, a.bool(), a.item(), a.any() or a.all().\n\
    \n\nYou can define the truthiness of your own classes by including a `__bool__()`\
    \ dunder method. While you *can* do something else, as we see with NumPy and Pandas,\
    \ you almost always want to return `True` or `False` from that method, according\
    \ to whatever criteria make sense for instances of your custom class."
- md: "## Chapter 2 Confusing Equality with Identity\n\nWhereas `is True` and `is\
    \ False` have a narrow edge case where they can make sense, using `obj == True`\
    \ or `obj == False` will always cause a feeling of unease among Pythonistas since\
    \ `True` and `False` are unique identities already. In Python, numbers that aren't\
    \ zero and collections that aren't empty are truthy, and zeros and empty collections\
    \ are falsy. This is as much as we want to know for most constructs.\n\nIdiomatic\
    \ Python checks for truthiness\n\n```python\n>>> tuples = [ (1, 2, 3), (), (4,\
    \ 5), (9,) ]\n>>> [max(tup) for tup in tuples if tup]            # ❶\n[3, 5, 9]\n\
    >>> for tup in tuples:\n...     if tup:                                    # ❶\n\
    ...         print(len(tup))\n...     else:\n...         print(\"EMPTY\")\n...\n\
    3\nEMPTY\n2\n1\n```\n\n- ❶ Rely on implicit truthiness\n\nSome variations you\
    \ might see will try to check more than explicitly needed.\n\nUnidiomatic Python\
    \ checks for truthiness\n\n```python\n>>> [min(tup) for tup in tuples if len(tup)]\
    \      # ❶\n[1, 4, 9]\n>>> [min(tup) for tup in tuples if bool(tup)]     # ❷\n\
    [1, 4, 9]\n>>> for tup in tuples:\n...     if (len(tup) > 0) is True:        \
    \         # ❸\n...         print(min(tup))\n...\n1\n4\n9\n```\n\n- ❶ Unnecessary\
    \ `len()` check\n- ❷ Unnecessary `bool()` check\n- ❸ Triply unnecessary `len()`,\
    \ inequality comparison, and `is True`\n\nFor the most part, the mistake of coercing\
    \ actual `True` or `False` values from merely \"truthy\" or \"falsy\" is simply\
    \ stylistic and does not harm program operation. But such use has a strong code\
    \ smell that should be avoided.\n\nOften the habit of spelling out `is True` is\
    \ borrowed from SQL, where database columns might both be of Boolean type and\
    \ be nullable.¹ However, sometimes you encounter a similar usage in existing Python\
    \ code. In SQL, these checks actually do make sense, as shown in the following\
    \ code.\n\n```sql\nUse of = TRUE in SQL\nSQLite version 3.37.2 2022-01-06 13:25:41\n\
    sqlite> CREATE TABLE test (name TEXT, flag BOOL NULL);\nsqlite> INSERT INTO test\
    \ VALUES (\"Bob\", TRUE), (\"Ann\", FALSE),\n   ...> (\"Li\", NULL);\nsqlite>\
    \ SELECT name FROM test WHERE flag IS NULL;\nLi\nsqlite> SELECT name FROM test\
    \ WHERE flag = TRUE;\nBob\nsqlite> SELECT name FROM test WHERE flag = FALSE;\n\
    Ann\nsqlite> SELECT name FROM test WHERE NOT flag;       # ❶\nAnn\n```\n\n> ❶\
    \ In many SQL dialects, we can get away with Python-like bare values, but best\
    \ practice in that language remains to be explicit.\n\nSometimes in Python code,\
    \ you will see a sentinel used within a function that normally returns an actual\
    \ `True` or `False`. Often this sentinel is `None`, but sometimes other values\
    \ are used. The problem here, of course, is that a sentinel almost certainly has\
    \ a truthiness that can be deceptive in code using such a function.\n\nIf you\
    \ are writing code from scratch, or refactoring it, you are better off using an\
    \ explicit enumeration, utilizing the well-designed `enum` standard library module.\
    \ But in the real world, you will probably encounter and need to use code that\
    \ does not do this.\n\n```python\n“Almost Boolean” function with a sentinel\n\
    >>> import re\n>>> def has_vowel(s):\n...     \"Vowels are a, e, i, o, u ... and\
    \ sometimes y\"\n...     class Maybe:\n...         def __repr__(self):\n...  \
    \           return \"MAYBE\"\n...\n...     if re.search(r\"[aeiou]\", s):\n...\
    \         return True\n...     elif \"y\" in s:\n...         return Maybe()\n\
    ...     else:\n...         return False\n...\n>>> has_vowel(\"Oh no!\")      \
    \              # ❶\nTrue\n>>> has_vowel(\"My my!\")                    # ❶\nMAYBE\n\
    >>> if has_vowel(my_phrase) is True:        # ❷\n...     print(\"The phrase definitely\
    \ has a vowel\")\n...\n```\n\n- ❶ Arguably OK for printing an answer\n- ❷ The\
    \ three-valued logic makes us resort to unpythonic style.\n\nIf you are free to\
    \ redesign this function, you might define `Vowel = enum.Enum(\"Vowel\", [\"Yes\"\
    , \"No\", \"Maybe\"])` then return `Vowel.Yes`, `Vowel.No`, or `Vowel.Maybe` within\
    \ the function, as appropriate. Comparisons will require an explicit identity\
    \ (or equality) check, but that clarifies the intention better for this case anyway.\n\
    \n## 2.3 Comparing x == None\n\nThis problem is a simple one, perhaps as a breather\
    \ from many others with broad background information. In Python, `None` is a *singleton*\
    \ constant. `True` and `False` are also unique, but in a hyper-technical sense\
    \ are the *two* possible instances of the `bool` class. That is to say, there\
    \ can only ever be one `None` during a particular execution of the Python interpreter.\n\
    \nIf you ever see code using `if obj == None` you immediately know that whoever\
    \ wrote it was a newcomer to Python, and this should be cleaned up in code review.\
    \ Most linters and style checking tools will complain about this.\n\nThe correct\
    \ spelling is always simply `if obj is None`. You will make your colleagues happy\
    \ when you write this, or when you fix it in legacy code.\n\n> **Note Singletons\
    \ and the Borg**\n\nThe famous 1994 “Gang of Four” book (*Design Patterns: Elements\
    \ of Reusable Object-Oriented Software*, by Erich Gamma, Richard Helm, Ralph Johnson,\
    \ and John Vlissides) popularized the software concept of a “singleton.” In their\
    \ case, they meant a class (in C++ or Smalltalk) that can only have a single instance.\n\
    \nNarrowly speaking, Python’s `None` fulfills this definition:\n\n```python\n\
    >>> type(None)\n<class 'NoneType'>\n>>> None.__class__() is None\nTrue\n>>> (1).__class__()\
    \ is 1\n# 1\n<>:1: SyntaxWarning: \"is\" with a literal. Did you mean \"==\"?\n\
    False\n```\n\n¹ Warnings in Python 3.10, 3.11, and 3.12 have gotten noticeably\
    \ more precise. This friendly reminder is a good example.\n\nFor your own classes,\
    \ the “singleton pattern” is a poor choice in Python. It is *possible* to implement,\
    \ yes, but to accomplish all the same goals, Alex Martelli’s “Borg idiom” is uniformly\
    \ more Pythonic:\n\n```python\nclass Borg:\n    _the_collective = {}\n    def\
    \ __init__(self):\n        self.__dict__ = self._the_collective\n\n    def __eq__(self,\
    \ other):\n        return isinstance(other, self.__class__)\n```\n\nMany Borg\
    \ can exist, but every attribute and method is shared between each of them. `None`,\
    \ however, remains properly a singleton.\n\n## 2.4 Misunderstanding Mutable Default\
    \ Arguments\n\nThe behavior of mutable default arguments is surprising to many\
    \ developers. In fact, many programmers—including many experienced Python developers—would\
    \ describe it as simply a wart or antipattern of the language.²\n\nI take a somewhat\
    \ more sympathetic view of Python behavior around mutable values used as named\
    \ arguments than do many of my colleagues; however, I will probably admit that\
    \ my affection arises in overly large part from knowing the “trick” for a long\
    \ time, and having written about it in more-or-less positive terms in 2001. Moreover,\
    \ in Python 2.1 where I first wrote about playing with this behavior, many alternatives\
    \ that now exist had not yet entered the language.\n\nLet’s look at a simple function\
    \ to illustrate the issue. We have several word list files on disk:\n\n```python\n\
    >>> for fname in Path(\"data\").glob(\"?-words.txt\"):\n...     print(f\"{fname}:\
    \ {Path(fname).read_text().strip()}\")\n...\ndata/a-words.txt: acclimations airways\
    \ antinarrative astrocyte\ndata/b-words.txt: buggiest biros bushvelds begazed\
    \ braunite\ndata/z-words.txt: zonate zoophyte zumbooruk zoozoos\n```\n\nWe would\
    \ like to process the separate words within lists.\n\nRead words from a file,\
    \ arrange them in a list\n\n```python\n>>> def wordfile_to_list(fname, initial_words=[]):\n\
    ...     with open(fname) as words:\n...         initial_words.extend(words.read().split())\n\
    ...     return initial_words\n...\n>>> wordfile_to_list(\"data/z-words.txt\",\
    \ [\"zlotys\", \"zappier\"])\n['zlotys', 'zappier', 'zonate', 'zoophyte', 'zumbooruk',\
    \ 'zoozoos']\n```\n\nSo far, so good. We might want to start with some initial\
    \ list elements but add more from a file. Straightforward enough. Let’s try it\
    \ again.\n\nRead words from file to list, take two\n\n```python\n>>> wordfile_to_list(\"\
    data/a-words.txt\")\n['acclimations', 'airways', 'antinarrative', 'astrocyte']\n\
    >>> wordfile_to_list(\"data/b-words.txt\")\n['acclimations', 'airways', 'antinarrative',\
    \ 'astrocyte',\n 'buggiest', 'biros', 'bushvelds', 'begazed', 'braunite']\n>>>\
    \ wordfile_to_list(\"data/b-words.txt\", ['brine'])\n['brine', 'buggiest', 'biros',\
    \ 'bushvelds', 'begazed', 'braunite']\n```\n\nAt the first pass of just reading\
    \ *a-words.txt*, all seems well. At the second pass of also reading in *b-words.txt*,\
    \ we notice with surprise that our results are becoming cumulative.\n\n¹ Effectively,\
    \ the nullable Boolean type gives you a trinary, or “three-valued,” logic (https://en.wikipedia.org/wiki/Three-valued_logic).\n\
    \n² In a provocative blog post title, Florimond Manca declared in 2018 that “Python\
    \ Mutable Defaults Are The Source of All Evil.” A great many other writers have\
    \ given the same warning with somewhat less florid language."
  mdcn: "## 第二章 混淆相等性与同一性\n\n虽然 `is True` 和 `is False` 在少数边缘情况下可能有意义，但使用 `obj == True`\
    \ 或 `obj == False` 总会让 Python 开发者感到不安，因为 `True` 和 `False` 本身就是唯一的标识符。在 Python\
    \ 中，非零数字和非空集合被视为真值，而零和空集合被视为假值。对于大多数构造，我们只需了解这些就足够了。\n\n地道的 Python 真值检查\n\n```python\n\
    >>> tuples = [ (1, 2, 3), (), (4, 5), (9,) ]\n>>> [max(tup) for tup in tuples\
    \ if tup]            # ❶\n[3, 5, 9]\n>>> for tup in tuples:\n...     if tup: \
    \                                   # ❶\n...         print(len(tup))\n...    \
    \ else:\n...         print(\"EMPTY\")\n...\n3\nEMPTY\n2\n1\n```\n\n- ❶ 依赖隐式真值\n\
    \n你可能会看到一些变体，它们试图进行超出明确需要的检查。\n\n非地道的 Python 真值检查\n\n```python\n>>> [min(tup)\
    \ for tup in tuples if len(tup)]      # ❶\n[1, 4, 9]\n>>> [min(tup) for tup in\
    \ tuples if bool(tup)]     # ❷\n[1, 4, 9]\n>>> for tup in tuples:\n...     if\
    \ (len(tup) > 0) is True:                 # ❸\n...         print(min(tup))\n...\n\
    1\n4\n9\n```\n\n- ❶ 不必要的 `len()` 检查\n- ❷ 不必要的 `bool()` 检查\n- ❸ 三重不必要的 `len()`、不等比较和\
    \ `is True`\n\n在大多数情况下，将仅仅是“真值”或“假值”的对象强制转换为实际的 `True` 或 `False` 值，这只是一个风格问题，并不会损害程序运行。但这种用法带有强烈的代码异味，应该避免。\n\
    \n通常，拼写 `is True` 的习惯是从 SQL 借鉴来的，在 SQL 中，数据库列可能既是布尔类型又是可空的。¹ 然而，有时你会在现有的 Python\
    \ 代码中遇到类似的用法。在 SQL 中，这些检查确实有意义，如下所示代码所示。\n\n```sql\nSQL 中使用 = TRUE\nSQLite version\
    \ 3.37.2 2022-01-06 13:25:41\nsqlite> CREATE TABLE test (name TEXT, flag BOOL\
    \ NULL);\nsqlite> INSERT INTO test VALUES (\"Bob\", TRUE), (\"Ann\", FALSE),\n\
    \   ...> (\"Li\", NULL);\nsqlite> SELECT name FROM test WHERE flag IS NULL;\n\
    Li\nsqlite> SELECT name FROM test WHERE flag = TRUE;\nBob\nsqlite> SELECT name\
    \ FROM test WHERE flag = FALSE;\nAnn\nsqlite> SELECT name FROM test WHERE NOT\
    \ flag;       # ❶\nAnn\n```\n\n> ❶ 在许多 SQL 方言中，我们可以像 Python 一样使用裸值，但该语言的最佳实践仍然是显式检查。\n\
    \n有时在 Python 代码中，你会看到在一个通常返回实际 `True` 或 `False` 的函数中使用哨兵值。通常这个哨兵值是 `None`，但有时也使用其他值。这里的问题当然是，哨兵值几乎肯定具有真值，这在使用此类函数的代码中可能会产生误导。\n\
    \n如果你是从头开始编写代码，或者正在重构代码，最好使用显式枚举，利用设计良好的 `enum` 标准库模块。但在现实世界中，你可能会遇到并需要使用不这样做的代码。\n\
    \n```python\n使用哨兵值的“近似布尔”函数\n>>> import re\n>>> def has_vowel(s):\n...     \"\
    Vowels are a, e, i, o, u ... and sometimes y\"\n...     class Maybe:\n...    \
    \     def __repr__(self):\n...             return \"MAYBE\"\n...\n...     if re.search(r\"\
    [aeiou]\", s):\n...         return True\n...     elif \"y\" in s:\n...       \
    \  return Maybe()\n...     else:\n...         return False\n...\n>>> has_vowel(\"\
    Oh no!\")                    # ❶\nTrue\n>>> has_vowel(\"My my!\")            \
    \        # ❶\nMAYBE\n>>> if has_vowel(my_phrase) is True:        # ❷\n...    \
    \ print(\"The phrase definitely has a vowel\")\n...\n```\n\n- ❶ 对于打印答案来说，可以说没问题\n\
    - ❷ 三值逻辑迫使我们采用非 Pythonic 的风格。\n\n如果你可以自由地重新设计这个函数，你可以定义 `Vowel = enum.Enum(\"\
    Vowel\", [\"Yes\", \"No\", \"Maybe\"])`，然后在函数中根据情况返回 `Vowel.Yes`、`Vowel.No` 或\
    \ `Vowel.Maybe`。比较将需要显式的同一性（或相等性）检查，但无论如何，这都能更好地阐明意图。\n\n## 2.3 比较 x == None\n\
    \n这个问题很简单，也许可以作为许多其他需要广泛背景信息的问题的调剂。在 Python 中，`None` 是一个*单例*常量。`True` 和 `False`\
    \ 也是唯一的，但从超技术意义上讲，它们是 `bool` 类的*两个*可能实例。也就是说，在 Python 解释器的特定执行期间，永远只能有一个 `None`。\n\
    \n如果你看到代码使用 `if obj == None`，你立刻就知道编写它的人是 Python 新手，这应该在代码审查中清理掉。大多数代码检查工具和风格检查工具都会对此提出抱怨。\n\
    \n正确的写法总是简单的 `if obj is None`。当你这样写，或者在遗留代码中修复它时，你会让你的同事感到高兴。\n\n> **注意 单例与博格**\n\
    \n著名的 1994 年“四人帮”书籍（《设计模式：可复用面向对象软件的基础》，作者：Erich Gamma、Richard Helm、Ralph Johnson\
