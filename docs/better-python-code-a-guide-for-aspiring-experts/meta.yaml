  md: "# 7.2.1 More Efficient Data Structures\n\nThere is no one solution to the problem\
    \ described here. On the other hand, there is exceedingly rarely an actual use\
    \ case for the exact behavior implemented by code such as the preceding example.\
    \ Trust me, code like that is not purely contrived for this book—I have encountered\
    \ a great much like it in production systems (with the problem buried beneath\
    \ a lot of other functionality in such code).\n\nIf you merely need to be able\
    \ to insert and delete from *either* the end *or* the beginning of a concrete\
    \ sequence, `collections.deque` gives you exactly what you need. This is not an\
    \ arbitrary middle for insertion and deletion, but very often all you actually\
    \ want is `.appendleft()` and `.popleft()` to accompany `.append()` and `.pop()`.\n\
    \nIn some cases, `sortedcontainers` or `pyrsistent` may have closer to the performance\
    \ characteristics you need, while still offering a *sequence* datatype. Generally,\
    \ using these third-party containers is still only going to get you to O(N×log\
    \ N) rather than O(N), but that remains strikingly better than O(N²).\n\nLater\
    \ in this chapter, in the section “Rolling Your Own Data Structures,” I show an\
    \ example where creating a custom data structure actually *can* make sense. My\
    \ pure-Python implementation of `CountingTree` is able to do exactly the “insert\
    \ into the middle” action that is described in this section, and remains relatively\
    \ efficient. For this narrow and specific use case, my custom data structure is\
    \ actually pretty good.\n\nHowever, instead of reaching for the abovementioned\
    \ collections—as excellent as each of them genuinely is—this problem is probably\
    \ one in which you (or the developer before you) misunderstood what the underlying\
    \ problem *actually* requires.\n\nFor example, a somewhat plausible reason you\
    \ might *actually* want to keep an order for items is because they represent some\
    \ sort of *priority* of actions to be performed or data to be processed. A wonderful\
    \ data structure in which to maintain such priorities is simply a Python `dict`.\
    \ A plausible way of using this fast data structure is to keep your “words” (per\
    \ the earlier example) as keys, and their priority as values.\n\nA priority is\
    \ not exactly the same thing as an index position, but it *is* something that\
    \ very quickly allows you to maintain a sequence for the data you wish to handle,\
    \ while keeping insertion or deletion operations always at O(1). This means, of\
    \ course, that performing N such operations is O(N), which is the best we might\
    \ plausibly hope for. Constructing a sequence *at the end* of such operations\
    \ is both cheap and easy, as the following example shows.\n\nA collection of items\
    \ with a million possible priorities\n\n```\n>>> from pprint import pprint\n>>>\
    \ from functools import partial\n>>> priority = partial(randrange, 1, 1_000_000)\n\
    >>> words = {get_word():priority() for _ in range(100_000)}\n>>> words_by_priority\
    \ = sorted(words.items(), key=lambda p: p[1])\n>>> pprint(words_by_priority[:10])\n\
    [('badland', 8),\n ('weakliest', 21),\n```"
