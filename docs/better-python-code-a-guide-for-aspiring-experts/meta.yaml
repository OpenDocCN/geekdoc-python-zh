    \             return n\n...         z = z * z + z0\n>>> %timeit mandelbrot(0.0965-0.638j)\
    \ # 2\n1.7 µs ± 6.82 ns per loop (mean ± std. dev. of 7 runs,\n1,000,000 loops\
