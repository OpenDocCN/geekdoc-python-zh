    # Casting Down


    Rather than allow floats to annex all the results from operations that combine
    Fraction with float, we could create a custom class to do the reverse. Yes, we
    might need to consider periodic approximation with Fraction.limit_denominator(),
    but the rounding would be our explicit choice. For example, let''s start with
    this:


    ```

    >>> class Ratio(Fraction):

    ...     def __add__(self, other):

    ...         if isinstance(other, float):

    ...             numerator, denominator = other.as_integer_ratio()

    ...             other = Fraction(numerator, denominator)

    ...             self = Fraction(self.numerator, self.denominator)

    ...         return Ratio(self + other)

    ...

    >>> Ratio(3, 10) + 0.3

    Ratio(54043195528445951, 90071992547409920)

    >>> 0.3 + Ratio(3, 10)            # ❶

    0.6

    >>> f"{0.3 + Ratio(3, 10):.17f}"

    ''0.59999999999999998''

    ```


    > ❶ The Python shell performs some “friendly” rounding in its display, so we might
    mistakenly think it is producing an exact result.


    We''ve moved in the right direction. The Ratio class can cause addition with a
    float to maintain a Ratio. However, we lost commutivity in the process. That was
    an easily rectified oversight:


    ```

    >>> class Ratio(Fraction):

    ...     def __add__(self, other):

    ...         if isinstance(other, float):

    ...             numerator, denominator = other.as_integer_ratio()

    ...             other = Fraction(numerator, denominator)

    ...             self = Fraction(self.numerator, self.denominator)

    ...         return Ratio(self + other)

    ...

    ...     __radd__ = __add__

    ...

    >>> 0.3 + Ratio(3, 10)

    ```'
