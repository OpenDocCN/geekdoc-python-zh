  - "[PAGE 74]\n\n# 3.1.3 Bare or Overly Generic except Statements\n\nMostly for legacy\
    \ reasons, Python allows the `except` statement to occur in bare form, without\
    \ naming specific exceptions to be caught. This is categorically a mistake to\
    \ use. Catching a broad exception where a subclass is more appropriate is also\
    \ often a mistake; however, there are gray areas about exactly how broad an exception\
    \ it is best to catch, with judgment needed for each individual decision.\n\n\
    Broadly speaking, when you only identify that “something went wrong” in a block\
    \ of code, the remediation you apply can easily fail to match the actual underlying\
    \ problem that occurred. By narrowing exceptions caught to those you genuinely\
    \ know how to correct, you express your intentions accurately. This is true even\
    \ when the best action in some exception case is halt-and-catch-fire; at least\
    \ you are doing it with deliberation.\n\nPython has a rich exception hierarchy,\
    \ and most third-party libraries extend it with additional exceptions specific\
    \ to their purpose. As well, numerous modules in the standard library also extend\
    \ the built-in exceptions, but do not expose them unless they are imported (since\
    \ you’ll only ever see them if you use that module).\n\nIt’s easy to see this\
    \ hierarchy generated by a brief Python program and shown in Figure 3.1.\n\n```\n\
    Source code of code/exception-hierarchy.py\n\ndef asciiDocTree(cls, level=1):\n\
    \    print (f\"{'*' * level} {cls.__module__}.{cls.__name__}\")\n    for i in\
    \ cls.__subclasses__():\n        asciiDocTree(i, level+1)\n\nasciiDocTree(BaseException)\n\
    ```\n\nI am writing this book in the AsciiDoc format (https://asciidoc.org/),\
    \ so as a convenience for myself, I’ve used its style of nested bullets. You can\
    \ easily modify this code to present a tree with cosmetic differences. You will\
    \ notice that in a few cases, built-in exceptions themselves reference exceptions\
    \ in other modules. In the listing, descendants of `builtins.Exception` are italicized,\
    \ which includes most of the hierarchy.\n\nSuppose that we want to write a program\
    \ that reads numbers from two files, and creates a collection that represents\
    \ the numerator from the first file divided by the denominator from the second\
    \ file. There are a variety of ways that this program might go wrong. Many—indeed\
    \ most—programs you will write have many potential failure modes.\n\nA naive first\
    \ attempt might use a *bare except* (which most linters or style checkers will\
    \ already complain about)."
