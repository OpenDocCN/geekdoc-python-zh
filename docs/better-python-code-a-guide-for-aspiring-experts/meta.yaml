  md: "# 1.3 Don't Iterate Over dict.keys() When You Want dict.items()\n\nThere is\
    \ a sense in which you can *almost* think of Python lists as mappings from index\
    \ positions to values. Within a dictionary, integers are perfectly well able to\
    \ act as keys; hence, `obj[7]` might equally well be an index into a `dict` (or\
    \ other mapping) or an index into a `list` (or other sequence).\n\nIn much the\
    \ same way as you sometimes see unpythonic code that loops over the index positions\
    \ of a list but then looks up that index within the body, you also sometimes see\
    \ unpythonic code that loops over `dict.keys()`. Actually, let's back up just\
    \ a bit: there are two stylistic mistakes that were just named. Imagine code like\
    \ this:\n\n```\nfor key in my_dict.keys():\n    process(key, my_dict[key])\n```\n\
    \nThis is nonidiomatic in the first instance because looping over `my_dict.keys()`\
    \ is equivalent to looping over `my_dict` itself. Behind the scenes, slightly\
    \ different types of objects are produced: `dict_keys` for `my_dict.keys()` and\
    \ `dict_keyiterator` from the dictionary itself. However, little real code depends\
    \ on this difference since they behave the same for most purposes:\n\n```\n>>>\
    \ my_dict = {c:ord(c) for c in \"Bread and butter\"}\n>>> type(my_dict.keys())\n\
    <class 'dict_keys'>\n>>> type(iter(my_dict))\n<class 'dict_keyiterator'>\n```\n\
    \nSpecifically, the following identity will always apply, for every dictionary\
    \ (unless, with great perversity, you could break this identity in a subclass\
    \ of `dict` or in some custom mapping):\n\n```\n>>> all(a is b for a, b in zip(iter(my_dict),\
    \ iter(my_dict.keys())))\nTrue\n```\n\nIn other words, if you wish to loop over\
    \ keys, you should just write:\n\n```\nfor key in my_dict:\n    process(key, my_dict[key])\n\
    ```\n\nHowever, it is relatively uncommon to wish to loop *only* over the keys\
    \ of a dictionary. Even if you only rarely, in one branch of the code, actually\
    \ use the value, it costs nearly nothing to include it as a loop variable. Remember,\
    \ Python objects are accessed by"
