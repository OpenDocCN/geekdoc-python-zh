    # 9.2.2 Nonobvious Behaviors of Numeric Datatypes


    The so-called “numeric tower” in Python is more of a “garden of forking paths.”⁶
    As with many edge cases in Python, there are widely discussed and well-reasoned
    motivations for things being as they are. These reasons are not necessarily obvious
    to ordinary developers. Getting these details wrong can lead to you mistakenly
    winding up with an unexpected numeric datatype.


    In parallel with the concrete numeric types provided within Python’s built-ins,
    or in modules in its standard library, are a hierarchy of *abstract base classes*
    within the module `numbers`. These abstract base classes *can* be inherited from
    if you implement the relatively large collection of methods they require; however,
    more often they are used for purposes of “virtual inheritance.” Before we get
    there, let’s look at the actual inheritance diagram of numeric types, including
    the abstract ones (marked in italic and with rounded edges in Figure 9.1).


    ![](img/260d2e810ee4666cb82be4957d5d9141_260_0.png)


    6. The phrase “garden of forking paths” is borrowed from the translated title
    of Jorge Luis Borges’ wonderful 1941 short story “El Jardín de Senderos que se
    Bifurcan”.'
