    \ FUNCTION] datafile\nprocess-accounts3.py: error: the following arguments\n \
    \   are required: datafile\n```\n\nIt’s easy at this point to start down a wild\
    \ goose chase of trying to figure out how the arguments for `argparse` might be\
    \ wrong. Or wonder whether the admittedly too clever `eval()` to get the function\
    \ object from its name is amiss.\n\nNone of those issues is the mistake here,\
    \ though. What has happened is that somewhere buried inside the “protected” (i.e.,\
    \ leading single underscore, and not exported) functions used to implement `argparse`\
    \ there are uses of `re.match()`. One might even miss this looking at the source\
    \ code since that module had used `import re as _re`, and therefore the calls\
    \ are actually to `_re.match()`. Even so, the monkeypatching has badly broken\
    \ a completely unrelated module—in this case, one in the standard library—in a\
    \ way that is far from obvious, in code we did not necessarily even suspect would\
    \ use our altered function. It’s the same module `object` that is mutated by monkeypatching,\
    \ it doesn’t matter what name it happens to be bound to in different indirect\
    \ imports.\n\nThe example provided in this discussion is a bit artificial. You\
    \ probably would not be inclined to inject a new version of a function into a\
    \ standard library module. However, you might be inclined to inject a function\
    \ (or class attribute, or method, module constant, etc.) into a slightly obscure\
    \ third-party library you are utilizing that does *almost but not quite* what\
    \ you want. Quite likely you might inject a version derived from the provided\
    \ version, as in the example. This risks unpleasant surprises when a completely\
    \ different dependency turns out to also utilize that library, in ways that do\
    \ not know about your alteration.\n\nThe actual best approach in situations of\
    \ this sort is to bite the bullet and simply replace all relevant uses of, for\
    \ example, `re.match()` in your code. If you decide to define a function such\
    \ as `match_positive()` within your codebase, that can copy the signature of the\
    \ original version and is a straightforward search-and-replace to utilize, whenever\
    \ possible, and indeed *almost always*, it is better to leave the provided module\
    \ function untouched.\n\n# 5.3 Getters and Setters\n\nIn some programming languages—notably\
    \ C++ and Java—a common pattern is to control access to private or protected variables,\
    \ but to expose “getter” and “setter” methods."
  - "[PAGE 144]\n\nIn Python it is a mistake to use this pattern, although one sees\
    \ such code written by programmers coming from other languages relatively often.\n\
    \nAt first glance, my admonition against getters and setters might seem to contradict\
    \ that in Chapter 4, *Advanced Python Usage*, in the section “Directly Accessing\
    \ a Protected Attribute.” There I advised against directly modifying pseudo-protected\
    \ (i.e., one leading underscore) or pseudo-private (i.e., two leading underscores)\
    \ instance attributes. I use “pseudo-” in the prior sentence because, of course,\
    \ in Python you are never truly prevented from reading or modifying these (other\
    \ than by convention and mild name mangling).\n\nIn so-called “bondage-and-discipline\
    \ languages” like Java, the intention is to prevent users of a class from doing\
    \ something they are not *supposed to*. In contrast, a common saying among Pythonistas\
    \ is “We’re all adults here.” That is, the creator of a class may include *access\
    \ advisories* by using single or double leading underscores, but these are not\
    \ *access modifiers* in the style of C and Java (besides “protected” and “private”,\
    \ C—and Visual Basic also—includes “friend” as an end run around other access\
    \ modifiers).\n\nIf an attribute of a Python instance contains one or two leading\
    \ underscores, it is not because the creator of the class tries to guarantee you\
    \ won’t access it, but simply as a way of indicating that the attribute might\
    \ disappear in the next version of their class, or its meaning or values might\
    \ be altered in ways that are not guaranteed by documented and public APIs. Also,\
    \ perhaps the meaning of that attribute with an access advisory might actually\
    \ do something subtly different than what you might initially assume. The class\
    \ author is making you no promises about that attribute.\n\nCircling back to getters\
    \ and setters, let’s look at a quick example of such an antipattern in Python.\
    \ The following *works*, of course; it merely feels non-idiomatic.\n\nWriting\
    \ Java in Python antipattern\n\n```\nclass GetterSetterExample:\n    def __init__(self,\
    \ value):\n        self._value = value\n\n    def get_value(self):\n        return\
    \ self._value\n\n    def set_value(self, new_val):\n        self._value = new_val\n\
    ```\n\nEven if these extra methods took additional actions, this would not feel\
    \ like good Python. Yes, you should not muck with `._value`, but if an indirect\
    \ mechanism to have guarded access to it is needed, *properties* provide a much\
    \ more natural style.\n\nFor a slightly more fleshed out example than `GetterSetterExample`,\
    \ let’s suppose we want a `Rectangle` class, but with the special constraint that\
    \ if we imagine the rectangle having a lower-left corner at the origin, no part\
    \ of the rectangle falls outside a circle with a given radius. This is illustrated\
    \ in Figure 5.1. In Pythonic style, we might write this as follows."
