    integers are interned* in CPython. This is discussed briefly at the start of Chapter
    2, *Confusing Equality with Identity*. It means that all the pointers to 8-bit
    integers have already been allocated when Python starts up, and these pointers
    are simply reused for repeating list slots. If we were working with larger numbers,
    we would have to multiply the number of (non-duplicated) items by the size of
    the boxed number, and add that to the size of the pointer array itself:


    ```

    >>> sys.getsizeof(2)

    28

    >>> sys.getsizeof(2**31)

    32

    >>> sys.getsizeof(2**63)

    36

    >>> sys.getsizeof(2**200)

    52

    ```'
