    unpredictable. Many circumstances are not *all circumstances*, and for applications
    that care about cryptographic security, it is better simply to start by using
    **secrets** in case your code becomes used in a situation where vulnerabilities
    are exposed. The **secrets** module has been available since Python 3.6, so it
    is not anything very new.


    An excellent, fairly informal, analysis of vulnerabilities in the Mersenne Twister
    was done by James Roper.⁵ The short summary is that if you can observe 624 consecutive
    integers produced by the Mersenne Twister, you can reconstruct its complete state,
    and thereby every output it will produce in the future. Even if fewer consecutive
    values can be observed by a malicious intruder, indirect vulnerabilities can likely
    be exploited.


    Besides the vulnerability Roper points out, we also commonly spin up virtual images
    with little initial entropy and/or reproducing an exact known state of the MT
    generator. Running on your local machine, which has been in operation for hours
    or weeks, provides sufficient strength in a generated seed. Running on a Docker
    image that Kubernetes spins up frequently, on an AWS Lambda, or Google Cloud Function
    very well may not.


