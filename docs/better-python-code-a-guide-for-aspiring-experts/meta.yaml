    \ the name.\n\nInadvertently overwriting built-in names\n\n```\n# Using a natural-seeming\
    \ name within a function\ndef total_receipts(receipts):\n```"
- md: "## 4.2.2 Directly Accessing a Protected Attribute\n\nIt is (usually) a mistake\
    \ to access “protected” names outside the class or module that defines them for\
    \ its own use. Python itself provides no programmatic limitation about this, and\
    \ it can be very tempting to utilize these members directly simply because it\
    \ is so easy. You should avoid doing this. A great deal of Python code, however,\
    \ fails to utilize this advice, and often later breaks as a result.\n\nPython\
    \ has a convention that names that live inside namespaces—whether inside modules,\
    \ classes, or other objects that define namespaces—can use one or two leading\
    \ underscores to declare those names “protected” or “private” (in analogy with\
    \ languages like C++ and Java). In a very approximate way, one leading underscore\
    \ is more like *protected* and two leading underscores is more like *private*;\
    \ but this is a weak analogy at best.\n\nPython also has a convention of using\
    \ “dunder” names, which have both leading and trailing double underscores. You\
    \ should *never* use those names other than for their documented purpose of overriding\
    \ some operator or supporting some built-in and standard library function.\n\n\
    It’s just barely permissible for genuine *frameworks* to invent their own dunders\
    \ for private use; but even there, I’d advise framework creators to avoid that\
    \ pattern. For example, you should absolutely override `.__lshift__()` or `.__call__()`\
    \ if that is relevant for your class, but try to avoid inventing `.__modify__()`\
    \ in your own code, if for no other reason than some future version of Python\
    \ might discover a need for that name.\n\nCreators of modules and classes commonly\
    \ follow a convention of using attribute names that begin with underscores as\
    \ a way of telling users “don’t use this attribute directly.” Those developers\
    \ cannot *enforce* that request upon users downstream, but the intention is made\
    \ clear.\n\nAs an example, let’s write a `LinearCongruentialGenerator` (LCG) class\
    \ (see https://en.wikipedia.org/wiki/Linear_congruential_generator) with reasonable\
    \ behavior and code. In Chapter 8, *Security*, in the section *Kinds of Randomness*,\
    \ I discuss in much more detail Python’s actual pseudo-random number generator\
    \ (PRNG), the Mersenne Twister. Suffice it to say that LCGs are less good PRNGs\
    \ than what Python provides you; but LCGs were and are used in actual production\
    \ software PRNGs, so they aren’t absurdly bad (depending on configuration of parameters).\n\
    \n### Class implementation of a linear congruential generator\n\n```python\nclass\
    \ LinearCongruentialGenerator:\n    def __init__(self, seed: int = 123):  # ③\n\
    \        self.__seed: int = seed  # ①\n        self._multiplier: int = 1_103_515_245\
    \  # ②\n        self._modulus: int = 2**32  # ②\n        self._increment: int\
    \ = 1  # ②\n\n        # Simple constraints we should follow\n        assert 0\
    \ < self._modulus\n        assert 0 < self._multiplier < self._modulus\n     \
    \   assert 0 <= self._increment < self._modulus\n        assert 0 <= seed < self._modulus\n\
    \n        # One initial application of recurrence relation\n        self._state\
    \ = (\n            (self._multiplier * self.__seed + self._increment)\n      \
    \      % self._modulus)\n\n    @property\n    def seed(self):\n        return\
    \ self.__seed\n\n    def next(self):\n        # Increment the state\n        self._state\
    \ = (\n            (self._multiplier * self._state + self._increment)\n      \
    \      % self._modulus)\n        return self._state / self._modulus\n```\n\n-\
    \ ① \"Private\" attribute\n- ② \"Protected\" attribute\n- ③ Type annotations are\
    \ not runtime enforced but document intention.\n\nThis class will produce a pretty\
    \ good sequence of pseudo-random numbers, each between 0 (closed) and 1 (open),\
    \ and a different such sequence for nearly every different integer seed below\
    \ 2**32. Let's take a quick look at using this class:\n\n```python\n>>> lcg =\
    \ LinearCongruentialGenerator(456)\n>>> [lcg.next() for _ in range(8)]\n[0.9508262551389635,\
    \ 0.8921057728584856, 0.5018460648134351,\n0.16488368925638497, 0.7462635268457234,\
    \ 0.6617225247900933,\n0.06575838476419449, 0.07386434846557677]\n>>> lcg2 = LinearCongruentialGenerator(9876)\n\
    >>> [lcg2.next() for _ in range(8)]\n[0.9167962749488652, 0.9652843165677041,\
    \ 0.09186752885580063,\n0.6128534006420523, 0.5585974934510887, 0.8420640060212463,\n\
    0.9102171016857028, 0.9698882394004613]\n```\n\nFor our purposes, we are happy\
    \ for users to be able to examine the seed used by a given generator, but definitely\
    \ do not want them to modify the (purported) seed:\n\n```python\n>>> lcg.seed\n\
    456\n>>> lcg.seed = 789\nTraceback (most recent call last):\n  [...]\nAttributeError:\
    \ property 'seed' of 'LinearCongruentialGenerator'\nobject has no setter\n```\n\
    \nThis pattern of using a read-only property to access a \"private\" attribute\
    \ is a good one to follow. As creator, I want instances of my class always to\
    \ honestly report the seed that was used to initialize them.\n\nThose attributes\
    \ that only begin with a single underscore (\"protected\") are not quite as sensitive.\
    \ You *might* be able to change them and allow the functionality to remain \"\
    reasonable\" (but you might not be so able):\n\n```python\n>>> lcg3 = LinearCongruentialGenerator(456)\n\
    >>> [lcg3.next() for _ in range(3)]          # ❶\n[0.9508262551389635, 0.8921057728584856,\
    \ 0.5018460648134351]\n>>> lcg3._multiplier = 22695477              # ❷\n```\n\
    \nFor uses like this, the “mistake” is probably not that important. If the built-in\
    \ function `sum()` is not used later on in the `total_receipts()` user function,\
    \ the fact that we have (locally) overwritten a standard name stops mattering\
    \ once we leave the function scope.\n\n> **Note Python scoping rules**\n\nPython\
    \ uses a rule called LEGB (Local, Enclosing, Global, and Built-in) for scoping\
    \ variables. That is, when the runtime sees a name, it looks in each of those\
    \ scopes, in the order listed. Enclosing means an outer function or a class in\
    \ which a method is defined. Local means within the body of the function or method\
    \ where the code lives.\n\nThe important thing about scopes is that when you leave\
    \ them, the names they define are released, and do not affect the use of the same\
    \ names in the enclosing scope (nor in some other local scope you enter later).\n\
    \nIn the case of overwriting `id`, the use feels natural, but is *slightly* more\
    \ error-prone. A loop like the one I constructed *might* occur within the body\
    \ of a larger function or method, and that same function *might* want to use the\
    \ actual `__builtins__.id()` function. That said, the function *does* remain available\
    \ in the `__builtins__` namespace (which could, in principle, itself be overwritten,\
    \ which is *definitely* a bad idea to do).\n\nThere are only a handful of names\
    \ where a developer might naturally want to use that name as a custom variable.\
    \ However, a few of these *do* genuinely feel natural to use. Here is an example.\n\
    \n### Harmful overwriting of built-in name\n\n```python\n>>> input = input(\"\
    Your name? \")                # ❶\nYour name? David Mertz\n>>> input\n'David Mertz'\n\
    >>> input = input(\"Your name? \") # ②\nTraceback (most recent call last):\n \
    \ File \"<stdin>\", line 1, in <module>\nTypeError: 'str' object is not callable\n\
    ```\n\n- ① Built-in function `input()` at this point\n- ② Now the name `input`\
    \ has been bound to a string.\n\nI wish I could write honestly that this example\
    \ is a purely hypothetical mistake which I have never myself committed in real\
    \ code. I *can* state honestly that I have never had the unreflective inclination\
    \ to call a local variable `StopAsyncIteration` because that just seemed like\
    \ an intuitive name for a custom value within my program. There are fewer than\
    \ 20 names for which the inclination to make this mistake arises naturally.\n\n\
    In general, the standard solution to this concern is to append a trailing underscore\
    \ to a custom name in a program. For example:\n\n```python\n>>> input_ = input(\"\
    Your name? \")\nYour name? Bob Loblaw\n>>> input_\n'Bob Loblaw'\n>>> input_ =\
    \ input(\"Your name? \")\nYour name? Kitty Sanchez\n>>> input_\n'Kitty Sanchez'\n\
    ```"
  mdcn: "## 4.2.2 直接访问受保护的属性\n\n在定义类或模块自身使用的“受保护”名称之外访问它们，（通常）是一个错误。Python 本身对此没有编程上的限制，而且由于操作非常简单，直接使用这些成员往往极具诱惑力。你应该避免这样做。然而，大量的\
    \ Python 代码未能遵循这一建议，并且常常因此在后续出现问题。\n\nPython 有一个约定：存在于命名空间中的名称——无论是在模块、类还是其他定义命名空间的对象内部——可以使用一个或两个前导下划线来声明这些名称是“受保护的”或“私有的”（类似于\
    \ C++ 和 Java 等语言）。粗略地说，一个前导下划线更接近于 *protected*，两个前导下划线更接近于 *private*；但这充其量只是一个不太精确的类比。\n\
    \nPython 还有一个使用“dunder”（双下划线）名称的约定，这些名称既有前导双下划线也有尾随双下划线。除非是为了文档中记载的覆盖某个运算符或支持某个内置及标准库函数的目的，否则你*绝不应该*使用这些名称。\n\
    \n对于真正的*框架*来说，发明自己的 dunder 名称用于私有目的，这几乎是勉强可以接受的；但即便如此，我也建议框架创建者避免这种模式。例如，如果 `.__lshift__()`\
    \ 或 `.__call__()` 与你的类相关，你绝对应该覆盖它们，但要尽量避免在自己的代码中发明 `.__modify__()`，即使没有其他原因，也是因为\
    \ Python 的未来版本可能会发现需要这个名称。\n\n模块和类的创建者通常遵循一个约定，即使用以下划线开头的属性名称，以此告诉用户“不要直接使用此属性”。这些开发者无法*强制*下游用户遵守此要求，但其意图是明确的。\n\
    \n举个例子，让我们编写一个具有合理行为和代码的 `LinearCongruentialGenerator`（线性同余生成器，LCG）类（参见 https://en.wikipedia.org/wiki/Linear_congruential_generator）。在第\
    \ 8 章 *安全* 的 *随机性种类* 一节中，我将更详细地讨论 Python 实际的伪随机数生成器（PRNG），即梅森旋转算法。简单来说，LCG 作为\
    \ PRNG 不如 Python 提供的那么好；但 LCG 过去和现在都被用于实际生产软件的 PRNG 中，因此它们并非糟糕得离谱（取决于参数配置）。\n\n\
    ### 线性同余生成器的类实现\n\n```python\nclass LinearCongruentialGenerator:\n    def __init__(self,\
    \ seed: int = 123):  # ③\n        self.__seed: int = seed  # ①\n        self._multiplier:\
    \ int = 1_103_515_245  # ②\n        self._modulus: int = 2**32  # ②\n        self._increment:\
    \ int = 1  # ②\n\n        # Simple constraints we should follow\n        assert\
    \ 0 < self._modulus\n        assert 0 < self._multiplier < self._modulus\n   \
    \     assert 0 <= self._increment < self._modulus\n        assert 0 <= seed <\
    \ self._modulus\n\n        # One initial application of recurrence relation\n\
    \        self._state = (\n            (self._multiplier * self.__seed + self._increment)\n\
    \            % self._modulus)\n\n    @property\n    def seed(self):\n        return\
    \ self.__seed\n\n    def next(self):\n        # Increment the state\n        self._state\
    \ = (\n            (self._multiplier * self._state + self._increment)\n      \
    \      % self._modulus)\n        return self._state / self._modulus\n```\n\n-\
    \ ① “私有”属性\n- ② “受保护”属性\n- ③ 类型注解在运行时不强制执行，但用于记录意图。\n\n这个类将产生一个相当不错的伪随机数序列，每个数介于\
    \ 0（闭区间）和 1（开区间）之间，并且对于 2**32 以下的几乎每个不同整数种子，都会产生一个不同的序列。让我们快速看一下如何使用这个类：\n\n```python\n\
    >>> lcg = LinearCongruentialGenerator(456)\n>>> [lcg.next() for _ in range(8)]\n\
    [0.9508262551389635, 0.8921057728584856, 0.5018460648134351,\n0.16488368925638497,\
    \ 0.7462635268457234, 0.6617225247900933,\n0.06575838476419449, 0.07386434846557677]\n\
    >>> lcg2 = LinearCongruentialGenerator(9876)\n>>> [lcg2.next() for _ in range(8)]\n\
    [0.9167962749488652, 0.9652843165677041, 0.09186752885580063,\n0.6128534006420523,\
    \ 0.5585974934510887, 0.8420640060212463,\n0.9102171016857028, 0.9698882394004613]\n\
    ```\n\n就我们的目的而言，我们希望用户能够检查给定生成器使用的种子，但绝对不希望他们修改（所谓的）种子：\n\n```python\n>>> lcg.seed\n\
    456\n>>> lcg.seed = 789\nTraceback (most recent call last):\n  [...]\nAttributeError:\
    \ property 'seed' of 'LinearCongruentialGenerator'\nobject has no setter\n```\n\
    \n这种使用只读属性来访问“私有”属性的模式是一个值得遵循的好模式。作为创建者，我希望我的类的实例始终能诚实地报告用于初始化它们的种子。\n\n那些仅以单个下划线开头的属性（“受保护的”）则不那么敏感。你*可能*能够更改它们并让功能保持“合理”（但你可能做不到）：\n\
    \n```python\n>>> lcg3 = LinearCongruentialGenerator(456)\n>>> [lcg3.next() for\
    \ _ in range(3)]          # ❶\n[0.9508262551389635, 0.8921057728584856, 0.5018460648134351]\n\
    >>> lcg3._multiplier = 22695477              # ❷\n```\n\n对于这类用法，这个“错误”可能并不那么重要。如果内置函数\
    \ `sum()` 后来没有在 `total_receipts()` 用户函数中使用，那么我们（局部地）覆盖了一个标准名称的事实，一旦离开函数作用域就不再重要了。\n\
    \n> **注意 Python 作用域规则**\n\nPython 使用一种称为 LEGB（Local 局部、Enclosing 外层、Global 全局、Built-in\
    \ 内置）的规则来确定变量的作用域。也就是说，当运行时看到一个名称时，它会按照列出的顺序在每个作用域中查找。Enclosing 指的是定义方法的外部函数或类。Local\
    \ 指的是代码所在的函数或方法的主体内部。\n\n作用域的重要之处在于，当你离开它们时，它们定义的名称会被释放，并且不会影响在外层作用域（或你稍后进入的其他局部作用域）中对相同名称的使用。\n\
    \n在覆盖 `id` 的情况下，这种用法感觉很自然，但*稍微*更容易出错。像我构造的这样的循环*可能*发生在更大函数或方法的主体内，而同一个函数*可能*想使用实际的\
    \ `__builtins__.id()` 函数。话虽如此，该函数*确实*在 `__builtins__` 命名空间中保持可用（原则上，该命名空间本身也可能被覆盖，这*绝对*是个坏主意）。\n\
    \n只有少数几个名称，开发者可能会自然地想将其用作自定义变量。然而，其中一些*确实*感觉用起来很自然。这里有一个例子。\n\n### 有害地覆盖内置名称\n\
    \n```python\n>>> input = input(\"Your name? \")                # ❶\nYour name?\
    \ David Mertz\n>>> input\n'David Mertz'\n>>> input = input(\"Your name? \") #\
    \ ②\nTraceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    TypeError: 'str' object is not callable\n```\n\n- ① 此时是内置函数 `input()`\n- ② 现在名称\
    \ `input` 已被绑定到一个字符串。\n\n我真希望我能诚实地写道，这个例子是一个纯粹的假设性错误，我自己在实际代码中从未犯过。我*可以*诚实地声明，我从未有过不假思索地将局部变量命名为\
    \ `StopAsyncIteration` 的倾向，因为那看起来就像是我程序中一个自定义值的直观名称。自然产生这种犯错倾向的名称少于 20 个。\n\n\
    一般来说，对此问题的标准解决方案是在程序中的自定义名称后附加一个尾随下划线。例如：\n\n```python\n>>> input_ = input(\"\
    Your name? \")\nYour name? Bob Loblaw\n>>> input_\n'Bob Loblaw'\n>>> input_ =\
    \ input(\"Your name? \")\nYour name? Kitty Sanchez\n>>> input_\n'Kitty Sanchez'\n\
    ```"
