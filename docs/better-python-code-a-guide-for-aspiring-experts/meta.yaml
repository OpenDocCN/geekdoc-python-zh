- md: '## Making Copies


    Another often-overlooked method is `dict.copy()`. However, I tend to feel that
    this method is usually properly overlooked. The copy made by this method is a
    *shallow* copy, so any mutable values might still be changed indirectly, leading
    to subtle and hard-to-find bugs. Chapter 2, *Confusing Equality with Identity*,
    is primarily about exactly this kind of mistake. Most of the time, a much better
    place to look is `copy.deepcopy()`. For example:


    ```

    >>> d1 = {"foo": [3, 4, 5], "bar": {6, 7, 8}}

    >>> d2 = d1.copy()

    >>> d2["foo"].extend([10, 11, 12])

    >>> del d2["bar"]

    >>> d1

    {''foo'': [3, 4, 5, 10, 11, 12], ''bar'': {8, 6, 7}}

    >>> d2

    {''foo'': [3, 4, 5, 10, 11, 12]}

    ```


    This is confusing, and pretty much a bug magnet. Much better is:


    ```

    >>> from copy import deepcopy

    >>> d1 = {"foo": [3, 4, 5], "bar": {6, 7, 8}}

    >>> d2 = deepcopy(d1)

    >>> d2["foo"].extend([10, 11, 12])

    >>> del d2["bar"]

    >>> d1

    {''foo'': [3, 4, 5], ''bar'': {8, 6, 7}}

    >>> d2

    {''foo'': [3, 4, 5, 10, 11, 12]}

    ```


    Dictionaries are an amazingly rich data structure in Python. As well as the usual
    efficiency that hash maps or key/value stores have in most programming languages,
    Python provides a moderate number of well-chosen “enhanced” methods. In principle,
    if dictionaries only had key/value insertion, key deletion, and a method to list
    keys, that would suffice to *do everything* the underlying data structure achieves.
    However, your code can be much cleaner and more intuitive with strategic use of
    the additional methods discussed.


    ## 7.6 JSON Does Not Round-Trip Cleanly to Python


    A Python developer can be tempted into mistakenly thinking that arbitrary Python
    objects can be serialized as JSON, and relatedly that objects that can be serialized
    are necessarily deserialized as equivalent objects.


    ### 7.6.1 Some Background on JSON


    In the modern world of microservices and “cloud-native computing,” Python often
    needs to serialize and deserialize JavaScript Object Notation (JSON) data. Moreover,
    JSON doesn’t only occur in the context of message exchange between small cooperating
    services, but is also used as a storage representation of certain structured data.
    For example, GeoJSON and the related TopoJSON, or JSON-LD for ontology and knowledge
    graph data, are formats that utilize JSON to encode domain-specific structures.


    In surface appearance, JSON looks very similar to Python numbers, strings, lists,
    and dictionaries. The similarity is sufficient that for many JSON strings, simply
    writing `eval(json_str)` will deserialize a string to a valid Python object; in
    fact, this will *often* (but certainly not *always*) produce the same result as
    the correct approach of `json.loads(json_str)`. JSON looks *even more* similar
    to native expressions in JavaScript (as the name hints), but even there, a few
    valid JSON strings cannot be deserialized (meaningfully) into JavaScript.


    While superficially `json.loads()` performs a similar task as `pickle.loads()`,
    and `json.dumps()` performs a similar task as `pickle.dumps()`, the JSON versions
    do distinctly *less* in numerous situations. The “type system” of JSON is less
    rich than is that of Python. For a large subset of all Python objects, including
    (deeply) nested data structures, this invariant holds:


    ```

    obj == pickle.loads(pickle.dumps(obj))

    ```


    There are exceptions here. File handles or open sockets cannot be sensibly serialized
    and deserialized, for example. But most *data structures*, including custom classes,
    survive this round-trip perfectly well.


    In contrast, this “invariant” is very frequently violated:


    ```

    obj = json.loads(json.dumps(obj))

    ```


    JSON is a very useful format in several ways. It is (relatively) readable pure
    text; it is highly interoperable with services written in other programming languages
    with which a Python program would like to cooperate; deserializing JSON does not
    introduce code execution vulnerabilities.


    Pickle (in its several protocol versions) is also useful. It is a binary serialization
