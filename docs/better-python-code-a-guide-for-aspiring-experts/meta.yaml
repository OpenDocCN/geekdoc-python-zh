    simply ignorance of a useful feature. Everything that we can do using *debugging
    f-strings* is perfectly well possible by other means; using this technique just
    makes code look nicer and lets you debug your code just a little bit more easily.


    A small, but surprisingly cool, feature introduced in Python 3.8 was a format
    for f-strings using the pattern f"{var=}". All this formatting style does is create
    a formatted string with a *variable name* accompanying its value that is formatted
    per the usual f-string (format string) rules. A slightly more verbose spelling
    is merely f"var={var}".


