    statistics.correlation(), and others, for essentially the same reason. Interestingly,
    statistics.mode() and statistics.multimode() are “NaN aware” rather than “NaN
    propagating”:


    ```

    >>> from math import nan

    >>> statistics.mode([nan, nan, nan, 4, 3, 3, 3.0])

    nan

    >>> statistics.multimode([nan, nan, nan, 4, 3, 3, 3.0])

    [nan, 3]

    ```


