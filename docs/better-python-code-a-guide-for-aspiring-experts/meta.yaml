    \ C 编写的。广泛使用的库 NumPy 也是如此，它有自己的一章。\n\n一方面，像前面提到的自定义数据结构可能在大 O 复杂度方面比 Python 自带的结构具有显著优势。⁵\
    \ 另一方面，这些优势需要与通常是（大致）恒定的开销进行权衡。\n\n5. 参见第156页的注释1。"
