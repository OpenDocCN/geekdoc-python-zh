  md: '# 6

    Picking the Right Data Structure


    This chapter hopes to save its readers from unnecessarily difficult code by drawing
    attention to a number of useful data structures that Python beginners, and even
    many advanced language users, may be unaware of or merely tend to forget. Four
    of these data structures are contained in the Python standard library, in `collections`,
    and another is in `dataclasses` (sort of—we’ll discuss that). The last mistake
    discussed looks at several additional, closely related, sequence (i.e., list-like)
    data structures that can sometimes be more efficient than lists. These are all
    built-ins or in standard library modules.


    This book’s longest discussion of mistakes comes in Chapter 7, *Misusing Data
    Structures*, in the section “Rolling Your Own Data Structures.” That more advanced
    mistake goes into a great many pros and cons of creating custom data structures.
    Until you’ve *considered* all the standard library collections discussed in this
    chapter, and also the third-party libraries sortedcontainers (https://grantjenks.com/docs/sortedcontainers/)
    and pyrsistent (https://pyrsistent.readthedocs.io/en/latest/), you are most certainly
    premature in creating your own custom data structures.


    Some of the discussions in this chapter—each about one particular data structure
    available in the Python standard library—are arranged a bit differently than other
    sections in this book. For each of them, a simple task using one of these simple
    data structures is shown; following that is the *mistake* represented by the longer,
    less readable, and sometimes notably slower code that would be needed to achieve
    the same goal without these data structures.


