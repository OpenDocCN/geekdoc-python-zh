    > **Note Decorators and decorator factories**


    There is an often glossed-over distinction between *decorators* and *decorator
    factories*. In much of what you will read, even within the official Python documentation
    itself, this is not kept clear.


    An actual decorator takes a function (or method or class) and returns a modified
    version. However, many very common and useful “decorators” are actually parameterized
    “decorator factories.” That is, these factories take completely different arguments,
    and themselves *return a decorator*. In fact, many useful “decorators” are cleverly
    configured to act in both of these roles (probably adding to the confusion of
    nomenclature but making the functions themselves more useful).


    For example, the excellent standard library `lru_cache` provides this dual functionality:


    ```

    >>> def mandelbrot(z0:complex, orbits:int=255) -> int: # 1

    ...     z = z0

    ...     for n in range(orbits):

    ...         if abs(z) > 2.0:

    ...             return n

    ...         z = z * z + z0

    >>> %timeit mandelbrot(0.0965-0.638j) # 2

    1.7 µs ± 6.82 ns per loop (mean ± std. dev. of 7 runs,

    1,000,000 loops each)

    ```'
