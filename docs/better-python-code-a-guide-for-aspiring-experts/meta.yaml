    Choosing a data structure well suited to your tasks is one of the most important
    tasks in programming. Python provides both ubiquitously used data structures—mainly
    `dict`, `list`, `tuple`, and `set` built-in types—and some others that are more
    often overlooked. Many of these overlooked gems live inside the `collections`
    module of the standard library. A few live in other modules, or simply as less
    used built-ins.

