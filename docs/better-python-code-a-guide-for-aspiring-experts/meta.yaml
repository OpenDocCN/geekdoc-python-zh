    \ is None\nTrue\n>>> (1).__class__() is 1\n# 1\n<>:1: SyntaxWarning: \"is\" with\
    \ a literal. Did you mean \"==\"?\nFalse\n\n\n**1** Warnings in Python 3.10, 3.11,\
    \ and 3.12 have gotten noticeably more precise. This friendly reminder is a good\
    \ example.\n\nFor your own classes, the “singleton pattern” is a poor choice in\
    \ Python. It is *possible* to implement, yes, but to accomplish all the same goals,\
    \ Alex Martelli’s “Borg idiom” is uniformly more Pythonic:\n\npython\nclass Borg:\n\
    \    _the_collective = {}\n    def __init__(self):\n        self.__dict__ = self._the_collective\n\
    \n    def __eq__(self, other):\n        return isinstance(other, self.__class__)\n\
    \n\nMany Borg can exist, but every attribute and method is shared between each\
