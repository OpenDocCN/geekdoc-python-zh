- md: "In a highly dynamic language like Python, we *can* potentially redefine “constants”\
    \ since the capitalization is only a convention rather than in the syntax or semantics\
    \ of the language. If some later line of the program redefines `SQUARE = 2`, buggy\
    \ behavior is likely to emerge. More likely is that some other module that gets\
    \ imported has redefined `SQUARE` to something other than the expectation of the\
    \ current module. This risk is minimal if imports are within namespaces, but `from\
    \ othermod import SQUARE, CUBE, TESSERACT` is not necessarily unreasonable to\
    \ have within the current module.\n\nPrograms written like the preceding one are\
    \ not necessarily broken, and not even necessarily mistakes, but it is certainly\
    \ more elegant to use enums for constants that come in sets.\n\n## Using enums\
    \ for sets of alternatives\n\n```python\n>>> from enum import Enum\n>>> Color\
    \ = Enum(\"Color\", [\"RED\", \"GREEN\", \"BLUE\"])\n>>> class Shape(Enum):\n\
    ...     CIRCLE = 0\n...     SQUARE = 1\n...     TRIANGLE = 2\n...\n>>> my_sprite\
    \ = Sprite(Shape.TRIANGLE, Color.RED)\n>>> def process(sprite):\n...     if sprite.shape\
    \ == Shape.TRIANGLE and sprite.color == Color.RED:\n...         print(\"It is\
    \ a red triangle\")\n...     elif something_else:\n...         pass\n...\n>>>\
    \ process(my_sprite)\nIt is a red triangle\n>>> Color.RED = 2\nTraceback (most\
    \ recent call last):\n  [...]\nAttributeError: cannot reassign member 'RED'\n\
    ```\n\nIt’s not *impossible* to get around the protection that an `Enum` provides,\
    \ but you have to work quite hard to do so rather than break it inadvertently.\
    \ In effect, the attributes of an enum are *read-only*. Therefore, reassigning\
    \ to an immutable attribute raises an exception.\n\nThere are also “constants”\
    \ that are not alternatives, but simply values; these likewise cannot actually\
    \ be enforced as constants in Python. Enums might still be reasonable namespaces\
    \ with slightly more enforcement against changes than modules have.\n\n## Chapter\
    \ 7 Misusing Data Structures\n\n### Overwriting constants\n\n```python\n>>> import\
    \ math\n>>> radius = 2\n>>> volume = 4/3 * math.pi * radius**3\n>>> volume # ❶\n\
    33.510321638291124\n>>> math.pi = 3.14 # ❷\n>>> 4/3 * math.pi * radius**3\n33.49333333333333\n\
    >>> from math import pi\n>>> 4/3 * pi * radius**3\n33.49333333333333\n>>> pi =\
    \ 3.1415 # ❸\n>>> 4/3 * pi * radius**3\n33.50933333333333\n```\n\n- ❶ As good\
    \ as we get with 64-bit floating point numbers\n- ❷ Monkeypatching a bad approximation\
    \ of pi\n- ❸ A somewhat less bad approximation of pi\n\n### Using enums to “enforce”\
    \ value consistency\n\n```python\n>>> from enum import Enum\n>>> import math\n\
    >>> class Math(Enum):\n...     pi = math.pi\n...     tau = math.tau\n...     e\
    \ = math.e\n...\n>>> radius = 2\n>>> Math.pi.value\n3.141592653589793\n>>> 4/3\
    \ * Math.pi.value * radius**3\n33.510321638291124\n>>> math.pi = 3\n>>> 4/3 *\
    \ Math.pi.value * radius**3\n33.510321638291124\n>>> Math.pi.value = 3\nTraceback\
    \ (most recent call last):\n  [...]\nAttributeError: <enum 'Enum'> cannot set\
    \ attribute 'value'\n```\n\nThis usage doesn’t really use Enum as a way of enumerating\
    \ distinct values, but it does carry with it a modest protection of “read-only”\
    \ values.\n\n## 7.5 Learn Less Common Dictionary Methods\n\nDictionaries are a\
    \ wonderful data structure that in many ways make up the heart of Python. Internally,\
    \ most objects, including modules, are defined by their dictionaries.\nThe sometimes\
    \ overlooked method `dict.get()` was discussed in Chapter 3, *A Grab Bag of Python\
    \ Gotchas*, but dicts also have a few other methods that are often overlooked,\
    \ even by experienced Python programmers. As with a number of other mistakes throughout\
    \ this book, the mistake here is simply one of ignorance or forgetfulness; the\
    \ result is not usually broken code, but rather just code that is less fast, elegant,\
    \ and expressive than it might be.\n\n### 7.5.1 The Dictionaries Defining Objects\n\
    \nThis subsection is a digression into Python's internal mechanisms. Feel free\
    \ to skip it for the actual pitfall; or read it to understand Python a little\
    \ bit better.\nYou can use Python for a long time without ever needing to think\
    \ about the dictionaries at the heart of most non-dict objects. There are some\
    \ exceptions, but many Python objects have a `.__dict__` attribute to store the\
    \ dictionary providing its capabilities and behaviors.\nLet's look at a couple\
    \ examples.\n\n#### Module dictionaries\n\n```python\n>>> import re\n>>> type(re.__dict__)\n\
    <class 'dict'>\n>>> for key in re.__dict__.keys():\n...     print(key, end=\"\
    \ \")\n...\n__name__ __doc__ __package__ __loader__ __spec__ __path__ __file__\
    \ __cached__ __builtins__ enum _constants _parser _casefix _compiler functools\
    \ __all__ __version__ NOFLAG ASCII A IGNORECASE I LOCALE L UNICODE U MULTILINE\
    \ M DOTALL S VERBOSE X TEMPLATE T DEBUG RegexFlag error match fullmatch search\
    \ sub subn split findall finditer compile purge template _special_chars_map escape\
    \ Pattern Match _cache _MAXCACHE _compile _compile_repl _expand _subx copyreg\
    \ _pickle Scanner\n```\n\nThe various functions and constants in a module are\
    \ simply its dictionary. Built-in types usually use a slightly different dictionary-like\
    \ object.\n\n#### Dictionaries of basic types\n\n```python\n>>> for typ in (str,\
    \ int, list, tuple, dict):\n...     print(typ, type(typ.__dict__))\n...\n<class\
    \ 'str'> <class 'mappingproxy'>\n<class 'int'> <class 'mappingproxy'>\n<class\
    \ 'list'> <class 'mappingproxy'>\n<class 'tuple'> <class 'mappingproxy'>\n<class\
    \ 'dict'> <class 'mappingproxy'>\n\n>>> int.__dict__[\"numerator\"]\n<attribute\
    \ 'numerator' of 'int' objects>\n>>> (7).__class__.__dict__[\"numerator\"]\n<attribute\
    \ 'numerator' of 'int' objects>\n>>> (7).numerator\n7\n```\n\nCustom classes also\
    \ continue this pattern (their instances have either .__dict__ or .__slots__,\
    \ depending on how they are defined).\n\n#### Dictionaries defining classes (and\
    \ instances)\n\n```python\n>>> class Point:\n...     def __init__(self, x, y):\n\
    ...         self.x = x\n...         self.y = y\n...     def from_origin(self):\n\
    ...         from math import sqrt\n...         return sqrt(self.x**2 + self.y**2)\n\
    ...\n>>> point = Point(3, 4)\n>>> point.from_origin()\n5.0\n>>> type(Point.__dict__)\n\
    <class 'mappingproxy'>\n>>> type(point.__dict__)\n<class 'dict'>\n>>> Point.__dict__.keys()\n\
    dict_keys(['__module__', '__init__', 'from_origin', '__dict__', '__weakref__',\
    \ '__doc__'])\n>>> point.__dict__\n{'x': 3, 'y': 4}\n```\n\n### 7.5.2 Back to\
    \ Our Regularly Scheduled Mistake\n\n#### The Method .setdefault()\n\nOf all the\
    \ useful methods of dictionaries, the one I personally forget the most often is\
    \ dict.setdefault(). I have written code like this embarrassingly often:\n\n```python\n\
    >>> point = {\"x\": 3, \"y\": 4}\n>>> if 'color' in point:\n...     color = point[\"\
    color\"]\n... else:\n...     color = \"lime green\"\n...     point[\"color\"]\
    \ = color\n...\n>>> point\n{'x': 3, 'y': 4, 'color': 'lime green'}\n```\n\nAll\
    \ the while, I *should* have simply written:\n\n```python\n>>> point = {\"x\"\
    : 3, \"y\": 4}\n>>> color = point.setdefault(\"color\", \"lime green\")\n>>> color\n\
    'lime green'\n>>> point\n{'x': 3, 'y': 4, 'color': 'lime green'}\n>>> point.setdefault(\"\
    color\", \"brick red\")\n'lime green'\n```\n\nThe first version works, but it\
    \ uses five lines where one would be slightly faster and distinctly clearer.\n\
    \n#### The Method .update()\n\nThe method dict.update() is useful to avoid writing:\n\
    \n```python\n>>> from pprint import pprint\n>>> features = {\n...     \"shape\"\
    : \"rhombus\",\n...     \"flavor\": \"vanilla\",\n...     \"color\": \"brick red\"\
    }\n>>> for key, val in features.items():\n...     point[key] = val\n...\n>>> pprint(point)\n\
    {'color': 'brick red',\n 'flavor': 'vanilla',\n 'shape': 'rhombus',\n 'x': 3,\n\
    \ 'y': 4}\n```\n\nPrior to Python 3.9, the friendlier shortcut was:\n\n```python\n\
    >>> point = {\"x\": 3, \"y\": 4, \"color\": \"chartreuse\"}\n>>> point.update(features)\n\
    >>> pprint(point)\n{'color': 'brick red',\n 'flavor': 'vanilla',\n 'shape': 'rhombus',\n\
    \ 'x': 3,\n 'y': 4}\n```\n\nBut with recent Python versions, even more elegant\
    \ versions are:\n\n```python\n>>> point = {\"x\": 3, \"y\": 4, \"color\": \"chartreuse\"\
    }\n>>> point | features # 1\n{'x': 3, 'y': 4, 'color': 'brick red', 'shape': 'rhombus',\n\
    'flavor': 'vanilla'}\n>>> point\n{'x': 3, 'y': 4, 'color': 'chartreuse'}\n>>>\
    \ point |= features # 2\n>>> point\n{'x': 3, 'y': 4, 'color': 'brick red', 'shape':\
    \ 'rhombus',\n'flavor': 'vanilla'}\n```\n\n- 1. Create a new dictionary merging\
    \ features with point.\n- 2. Equivalent to point.update(features)\n\n#### The\
    \ Methods .pop() and .popitem()\n\nThe methods dict.pop() and dict.popitem() are\
    \ also easy to forget, but extremely useful when you need them. The former is\
    \ useful when you want to find and remove a specific key; the latter is useful\
    \ when you want to find and remove an unspecified key/value pair:\n\n```python\n\
    >>> point.pop(\"color\", \"gray\")\n'brick red'\n```"
