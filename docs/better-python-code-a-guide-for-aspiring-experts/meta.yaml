    In the Python world—and to some degree within other programming language communities—the
    contrasting acronyms EAFP and LBYL (look before you leap) are commonly used. In
    fact, the official Python documentation describes this (https://docs.python.org/3/glossary.html#term-EAFP)³:


    > Easier to ask for forgiveness than permission. This common Python coding style
    assumes the existence of valid keys or attributes and catches exceptions if the
    assumption proves false. This clean and fast style is characterized by the presence
    of many try and except statements. The technique contrasts with the LBYL style
    common to many other languages such as C.


    — Python Documentation, Glossary


    In the main, this discussion is merely a moderate expansion of the official documentation.
    As with some other concerns of this book, preferring EAFP is merely a rough rule
    of thumb; using LBYL is certainly not *categorically* a mistake. However, if you
    find yourself writing an LBYL pattern, it is definitely worth asking yourself
    whether it might better be expressed in an EAFP style.


    For a simple example, suppose that you have files with wordlists, one word per
    line. As often in this book, I''ve used the SOWPODS wordlist (https://gnosis.cx/better/data/sowpods)
    to randomly select words for the simple code shown. Specifically, I''ve variously
