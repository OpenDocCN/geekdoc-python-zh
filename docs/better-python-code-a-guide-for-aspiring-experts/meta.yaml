    > **Note So what is a closure, anyway?**


    The term closure is a bit of computer science lingo that, while important, might
    not be familiar to people who are new to programming or have not studied theoretical
    aspects. Don’t worry, it’s not as bad as it seems.

    In programming languages, a (lexical; i.e., nested scope) closure means that variables
    defined outside the current scope of a function definition are “closed over.”
    That is to say, the function itself in some manner captures those variables and
    they can continue to be used later when the function is called.

    As we will see, however, whereas many programming languages “capture” variables
    as their values, Python captures them as their names.


    In contrast, if we were to write a very closely analogous program in (fairly)
    modern JavaScript, the behavior is probably what we would expect. Older JavaScript
    does contain the keyword function that would be even more closely parallel with
    the Python version; but preference for “arrow functions” has become predominant
