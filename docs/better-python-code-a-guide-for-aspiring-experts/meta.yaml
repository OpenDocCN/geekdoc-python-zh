    ## About the Author


    **David Mertz, Ph.D.**, has been a member of the Python community for a long time:
    about 25 years—long enough to remember what was new about Python 1.5 versus 1.4.
    He has followed the development of the language closely, given keynote talks about
    many of the changes over versions, and his writing has had a modicum of influence
    on the directions Python and popular libraries for it have taken. David has taught
    Python to scientists, developers coming from other languages, and programming
    neophytes.


    You can find voluminous details about his publications at https://gnosis.cx/publish/resumes/david-mertz-publications.pdf.
    You can learn more about where he has worked at https://gnosis.cx/publish/resumes/david-mertz-resume.pdf.


    ## Introduction


    Python is a powerful, and also a reasonably opinionated, programming language.
    While there are often many ways you *could* accomplish a task in Python, there
    is very often exactly one way you *should* accomplish that task. Some programs
    are considered “Pythonic,” and others are not.


    > **Note Being Pythonic**


    The slightly joking term *Pythonic* is widely used in the Python community. In
    a general way it means “reflecting good programming practices for the Python language.”
    But there is also something just slightly *ineffable* about the term in a way
    similar to how other programmers use *fragile*, *elegant*, or *robust* in describing
    particular code. You’ll see the terms *Pythonic* and *unpythonic* quite a bit
    in this book.


    In a related bit of Pythonic humor—the language was, after all, named after the
    Monty Python comedy troupe—we often use the term *Pythonista* for developers who
    have mastered Pythonic programming.


    To a fairly large extent, being Pythonic is a goal to improve the *readability*
    of your programs so that other users and contributors can easily understand your
    intention, the behavior of the code, and indeed identify its bugs. There are,
    as well, many times when being unpythonic leads to unexpected behavior, and hence
    harms *functionality* in edge cases you may not have considered or tried out during
    initial usage.


    In this book, I am not shy in being opinionated about good Python practices. Throughout
    the discussions, I try to explain the motivations for these opinions, and reflect
    on my long experience using, teaching, and writing about Python. It is a truly
    delightful programming language, about which I have sincere enthusiasm.


    Much of what we hope for in Python code is explained by *The Zen of Python*.


    ```

    >>> import this

    The Zen of Python, by Tim Peters


    Beautiful is better than ugly.

    Explicit is better than implicit.

    Simple is better than complex.

    Complex is better than complicated.

    Flat is better than nested.

    Sparse is better than dense.

    Readability counts.

    Special cases aren''t special enough to break the rules.

    Although practicality beats purity.

    Errors should never pass silently.

    Unless explicitly silenced.

    In the face of ambiguity, refuse the temptation to guess.

    There should be one---and preferably only one---obvious way to do it.

    Although that way may not be obvious at first unless you''re Dutch.

    Now is better than never.

    Although never is often better than *right* now.

    If the implementation is hard to explain, it''s a bad idea.

    If the implementation is easy to explain, it may be a good idea.

    Namespaces are one honking great idea---let''s do more of those!

    ```


    There are many topics within the world of Python programming that are very important,
    but are not addressed in this short book. The appendix, *Topics for Other Books*,
    gives some pointers to resources, and brief summaries of the ideas I think you
    would do well to pursue when learning them.


    ## Looping Over the Wrong Things


    As in most procedural programming languages, Python has two kinds of loops: `for`
    and `while`. The semantics of these loops is very similar to that in most analogous
    languages. However, Python puts a special emphasis on looping *over* iterables—including
    *lazy* iterables along with concrete collections—which many languages do not do.
    Many of the mistakes in this chapter are “best practices” in other programming
    languages but are either stylistically flawed or unnecessarily fragile when translated
    too directly into Python.


    Technically, Python also allows for recursion, which is another way of “looping,”
    but recursion depth is limited in Python, and tail-call optimization (see https://en.wikipedia.org/wiki/Tail_call)
    is absent. Recursion can be enormously useful for problems that are naturally
    *subdivided* as a means of reaching their solution, but it is rarely a good approach
    in Python for constructing a mere *sequence* of similar actions.


    None of the mistakes in this chapter deal specifically with recursion, but programmers
    coming from Lisp-family languages, ML-family languages, or perhaps Haskell, Rust,
    Lua, Scala, or Erlang should note that while recursion may be a good habit in
    the language you used to program, it *can be* a bad habit for Python.


    ### 1.1 (Rarely) Generate a List for Iteration


    A common pattern in many Python programs is to generate a sequence of items to
    process, append them to a list, and then loop through that list, processing each
    item as we get to it. In fact, structuring programs this way is often perfectly
    sensible and wholly intuitive. Except when it is not.


    When the sequence of items might be very long (or potentially infinite) or when
    each item might be a memory-hungry object, creating and populating a list often
    consumes more memory than is needed. As well, when the processing operation might
    be concurrent with the generating operation, we might spend a long time generating
    the list, followed by a similarly long time processing the list. If actual parallelism
    is possible, we might instead be able to complete the overall program in half
    as much time. But when parallelism is possible, it isn’t always easy. (For more
    on concurrency, see this book’s Appendix.)'
