    \ Using an explicit `raise` of an exception other than `AssertionError` within\
    \ those blocks is perfectly reasonable as well.\n\n## 8.8 Wrapping Up\n\nIn Python,\
    \ as in every modern programming language, a background concern in the creation\
    \ of any software system is the vulnerabilities it might create. Software can\
    \ do things wrong in the sense of not producing the output or interactions that\
    \ we had in mind when writing it; but it can also do things wrong in the sense\
    \ of allowing bad actors to cause harm through the use of that software.\n\nGenuine\
    \ security analysis of software is a broad topic, and one requiring a great deal\
    \ of knowledge ranging over many things not in this book. However, there are a\
    \ number of often repeated mistakes that Python developers make, each of which\
    \ can be relatively straightforwardly rectified by following the advice in this\
    \ chapter. These few things will not address all possible concerns, but they will\
    \ fix surprisingly much of what we Python developers often get wrong.\n\nFor a\
    \ more in-depth look at a number of security issues, the Open Worldwide Application\
    \ Security Project (OWASP; https://owasp.org/) is a good resource. They discuss\
    \ and provide resources for some of the vulnerabilities I discuss, and for a great\
    \ many others as well.\n\nThere are many security mistakes not specifically addressed\
    \ in this chapter, of necessity. Security is a broad concern, with many books\
    \ wholly about it, and many professionals employed to understand a range of concerns.\
    \ However, a few mistakes that are already well described in the Python documentation\
    \ are still worth quickly mentioning.\n\n- Unpickling pickles with uncontrolled\
    \ sources can cause execution of arbitrary code.\n- Loading YAML has the same\
    \ concern as with pickles, but an easy solution is `yaml.safe_load()`."
