    # Chapter 4 Advanced Python Usage


    > **Note Rules have occasional exceptions**


    There are a few odd corners where the advice in this section is properly violated,
    even within the Python standard library. The most notable of these is:


    python

    >>> from collections import namedtuple

    >>> Person = namedtuple("Person", "first last handedness")

    >>> david = Person("David", "Mertz", "Left")

    >>> david

    Person(first=''David'', last=''Mertz'', handedness=''Left'')

    >>> david._fields

    (''first'', ''last'', ''handedness'')

    >>> david._asdict()

    {''first'': ''David'', ''last'': ''Mertz'', ''handedness'': ''Left''}



    The special problem namedtuple had to solve is that *anything* could be an attribute
    of a constructed special object, such as Person. For some namedtuple classes,
    a field called .fields might be perfectly reasonable (perhaps less so one called
    .asdict).


    For this situation—and a very few others—the actual documented and promised API
    for namedtuple includes having several attributes and methods whose names begin
    with a single underscore.


    Knowledge is power. Or at least often it is: The next chapter looks at cases where
    a better mantra might be “ignorance is bliss.”


    # 4.3.1 F-String Debugging


    There are a few gotchas throughout this book where the mistake in question is
    simply ignorance of a useful feature. Everything that we can do using *debugging
    f-strings* is perfectly well possible by other means; using this technique just
    makes code look nicer and lets you debug your code just a little bit more easily.


    A small, but surprisingly cool, feature introduced in Python 3.8 was a format
    for f-strings using the pattern f"{var=}". All this formatting style does is create
    a formatted string with a *variable name* accompanying its value that is formatted
    per the usual f-string (format string) rules. A slightly more verbose spelling
    is merely f"var={var}".


