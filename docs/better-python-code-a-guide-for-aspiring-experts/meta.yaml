  md: '# Praise for *Better Python Code*


    > “You’ll not just be aspiring to be an expert anymore after practicing through
    *Better Python Code: A Guide for Aspiring Experts*, you’ll be one of them! Learn
    from David Mertz, who’s been making experts through his writing and training for
    the past 20 years.”

    —Iqbal Abdullahi, past Chair, PyCon Asia Pacific, and past board member, PyCon
    Japan


    > “In *Better Python Code: A Guide for Aspiring Experts*, David Mertz serves up
    bite-sized chapters of Pythonic wisdom in this must-have addition to any serious
    Python programmer’s collection. This book helps bridge the gap from beginner to
    advanced Python user, but even the most seasoned Python programmer can up their
    game with Mertz’s insight into the ins and outs of Python.”

    —Katrina Riehl, President, NumFOCUS


    > “What separates ordinary coders from Python experts? It’s more than just knowing
    best practices—it’s understanding the benefits and pitfalls of the many aspects
    of Python, and knowing when and why to choose one approach over another. In this
    book David draws on his more than 20 years of involvement in the Python ecosystem
    and his experience as a Python author to make sure that the readers understand
    both *what* to do and *why* in a wide variety of scenarios.”

    —Naomi Ceder, past Chair, Python Software Foundation


    > “Like a Pythonic BBC, David Mertz has been informing, entertaining, and educating
    the Python world for over a quarter of a century, and he continues to do so here
    in his own pleasantly readable style.”

    —Steve Holden, past Chair, Python Software Foundation


    > “Being expert means someone with a lot of experience. David’s latest book provides
    some important but common problems that folks generally learn only after spending
    years of doing and fixing. I think this book will provide a much quicker way to
    gather those important bits and help many folks across the world to become better.”

    —Kushal Das, CPython Core Developer and Director, Python Software Foundation


    > “This book is for everyone: from beginners, who want to avoid hard-to-find bugs,
    all the way to experts looking to write more efficient code. David Mertz has compiled
    a great set of useful idioms that will make your life as a programmer easier and
    your users happier.”

    —Marc-André Lemburg, past Chair, EuroPython, and past Director, Python Software
    Foundation'
