    # # 7.3 Strings Are Iterables of Strings


    Strings in Python are strange objects. They are incredibly useful, powerful, and
    well designed. But they are still strange. In many ways, strings are *scalar*
    objects. They are immutable and hashable, for example. We usually think of a string
    as a *single value*, or equivalently call it *atomic*.


    However, at the same time, strings are iterable, and every item in their iteration
    is also a string (which is itself iterable). This oddity often leads to mistakes
    when we wish to decompose or flatten nested data. Sometimes in related contexts
    as well, as shown in the following example.


    Naive attempt at flatten() function


    ```

    >>> def flatten(o, items=[]):

    ...     try:

    ...         for part in o:

    ...             flatten(part, items)

    ...     except TypeError:

    ...         items.append(o)

    ...     return items

    ```


    If you prefer LBYL (look before you leap) to EAFP (easier to ask forgiveness than
    permission) you could write this as follows.


    Naive attempt at flatten2() function


    ```

    >>> from collections.abc import Iterable

    >>> def flatten2(o, items=[]):

    ...     if isinstance(o, Iterable):

    ...         for part in o:

    ...             flatten2(part, items)

    ...     else:

    ...         items.append(o)

    ...     return items

    ```


    Either way, these are perfectly sensible functions to take a nested data structure
    with scalar leaves, and return a linear sequence from them. These first two functions
    return a concrete list, but they could equally well be written as a generator
    function such as the following.


    Naive attempt at flatten_gen function


    ```

    >>> def flatten_gen(o):

    ...     if isinstance(o, Iterable):

    ...         for part in o:

    ...             yield from flatten_gen(part)

    ```'
