    # 7.7.3 Takeaways


    This section has had a long discussion. The takeaway you should leave with isn''t
    a simple one. The lesson is “be subtle and accurate in your judgments” about when
    to create and when to avoid creating custom data structures. It''s not a recipe,
    but more vaguely an advocacy of a nuanced attitude.


    As a general approach to making the right choice, I''d suggest following a few
    steps in your thinking:


    +   1. Try implementing the code using a widely used, standard Python data structure.

    2. Run benchmarks to find out if any theoretical sub-optimality *genuinely* matters
    for the use case your code is put to.

    3. Research the wide range of data structures that exist in the world to see which,
    if any, are theoretically optimal for your use case.'
