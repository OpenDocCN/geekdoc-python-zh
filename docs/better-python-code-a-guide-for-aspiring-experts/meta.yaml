- md: '## Appendix: Topics for Other Books


    There are, of course, many domains of Python programming in which you might make
    mistakes, or face trade-offs. Not all such topics can fit within this book, but
    those not touched on are not necessarily less important. For the most part, those
    topics not addressed are simply big enough to warrant their own full books.


    ### A.1 Test-Driven Development


    Good software development practice should *always* include extensive tests. There
    is a great amount of detail, and sometimes subtlety, to how to do tests right.
    But the biggest mistake, and the far most common one I''ve seen in real-life codebases,
    is simply not to have tests at all. Only barely less bad than tests not existing
    is to have test suites that have not been maintained. It is always difficult and
    painful to encounter production code in which tests are only run occasionally
    and erratically, and developers just live with an assumption that most tests will
    fail. Usually when you see this, it is far from obvious which of the failing tests
    might once have succeeded, and which were never completed or functional in the
    first place.


    A good test suite should be a barrier placed before every code merge. Either upon
    every push, or upon every merge (at least to production branches), CI/CD (continuous
    integration/continuous development) tests should be run by automated means. For
    more time-consuming tests, scheduling them to be run nightly or weekly can also
    be appropriate; by all means, though, such tests should be required to run and
    pass before code can enter production use.


    Whether or not development is strictly TDD (test-driven development) is a subject
    of reasonable debate. However one comes down in that debate, developers should
    *always* simply assume that untested code is broken code. Of course, the advice
    of these few paragraphs applies equally to every programming language, and is
    not specific to Python.


    Within Python itself, my advice is to always use pytest (https://docs.pytest.org)
    rather than the standard library `unittest`. Pytest supports `unittest` suites
    in a backward-compatible way, provides an enormously better syntax and, more capabilities,
    and is simply more Pythonic overall. The third-party nose2 (https://docs.nose2.io/en/latest/)
    is also not a terrible choice, but generally I recommend pytest over nose2. The
    standard library **doctest** module is also very useful for the kinds of tests
    that are easily expressed as docstrings (which is surprisingly many, and providing
    them is enormously helpful to future maintainers).


    ### A.2 Concurrency


    At some point during development of this book, I wanted to discuss a number of
    concurrency pitfalls and trade-offs. It''s a big topic, though; too big for a
    chapter or two of this moderately sized book to treat adequately. The fact that
    this is not the book for discussion of concurrency does not diminish the importance
    of the topic, nor suggest that the choices you make are not subject to pitfalls
    and trade-offs.


    Within Python itself, there are three main approaches to concurrency. Python''s
    standard library has a **threading** module to work with threads. Threads are
    famously subject to gotchas like deadlocks, race conditions, priority inversion,
    data structure corruption, and other glitches. Moreover, within pure Python, threading
    does not enable CPU parallelism because of the infamous GIL (global interpreter
    lock). That said, many third-party modules "release the GIL" and allow true parallelism.


    Python''s standard library also contains the **multiprocessing** module, which
    is largely similar in API to **threading**, but works with processes rather than
    threads. This module provides a means of running parallel tasks on multiple CPU
    cores, but is also constrained by not being able to share data directly among
    processes and in being "heavier weight." In general, in order to communicate,
    processes require message passing, usually by means of pipes and queues (which
    are available in the **multiprocessing** module).


    A useful and higher-level abstraction for both threading and multiprocessing is
    the **concurrent.futures** module of the standard library. Many problems can be
    more easily and more safely expressed using the "futures" abstraction, and where
    possible, concurrency is easier using this mechanism.


    A third abstraction in Python for concurrency is asynchronous programming with
    coroutines. This is supported via the **async** and **await** keywords, and is
    managed by the **asyncio** standard library module, or by third-party async event
    loops such as uvloop (https://uvloop.readthedocs.io/), Trio (https://trio.readthedocs.io/en/stable/),
    Curio (https://curio.readthedocs.io/en/latest/), and Twisted (https://twisted.org/).
    The general idea behind coroutines is that async functions can *yield* control
    in the middle of their operations, allowing an event loop to give attention to
    other coroutines within the same thread and process. This is typically useful
    when operations are I/O bound (since I/O is generally several orders of magnitude
    slower than CPU-bound computation).


    The official Python documentation contains a good discussion of many of the trade-offs
    among different approaches to concurrency (see https://docs.python.org/3/library/concurrency.html
    to get started).


    ### A.3 Packaging


    A large part of the Python ecosystem is about packaging software for distribution.
    Actually, pretty much the same is true of *every* programming language. When you
    write software, whether executables, libraries, or other systems, you usually
    wish to share your work with other users and developers.


    For some languages newer than Python, the design of the language itself was simultaneous
    with the design of its packaging system. So, for example, users of the Go programming
    language will use `go get` ... to install packages. Users of Rust will use `cargo`
    and `rustup`. In Julia, it is a combination of `using Pkg; Pkg.add(...)`. In R,
    it''s generally always `install.packages(...)`. For these languages, there is
    one and only one way to install a package, and pretty much exactly one way to
    publish the packages or tools you have created. Other languages like Ruby have
    mostly congealed around `gem`, and JavaScript is split between `npm` and `yarn`,
    but the two are *mostly* compatible.


    Python is not as old as C, or Fortran, or even Perl, Bash, Haskell, or Forth.
    All of those have, arguably, a greater disarray around packaging than Python does.
    But Python is *pretty old*, having started in 1991, and going through numerous
    not-quite-compatible packaging and installation systems over that time, while
    starting relatively late on putting serious effort into this aspect. Over the
    past five to 10 years, Python packaging has become solid and relatively stable,
    but a number of competing tools remain, as do a number of package formats.


    Wheels are supported and endorsed by the Python Packaging Authority (https://www.pypa.io/en/latest/),
    but so are *sdist* archives for source-only packages. Numerous tools for creating
    wheels are largely, but not entirely, compatible with one another. Conda packages
    use a different format and a different build system, but allow completely non-Python
    packages to be created, distributed, and installed. A large number of tools allow
    creation of platform-specific executables for Python, including often the native
    packaging system of operating system distributions. Moreover, especially with
    so much software being deployed in "cloud native" or at least "cloud-centric"
    ways now, containerization, such as with Docker and Kubernetes, has become a popular
    alternative approach as well.


    This book simply does not attempt to address software packaging, but rather recommends
    that you read some of the excellent online material on the topic, starting with
    https://packaging.python.org/en/latest/overview.


    ### A.4 Type Checking


    On top of the mostly orthogonal nature of type-checking mistakes and the conceptual
    mistakes addressed in this book, the use of type checking and its associated tools
    is somewhat divisive among Python developers. I do not hesitate to be opinionated
    in this book about many things, but I have chosen not to weigh in on the virtues
    and drawbacks of using or adding extensive type annotations in Python codebases.
    There are many excellent books and other resources that delve into this topic,
    and these debates, in great detail.'
  mdcn: '## 附录：其他书籍的主题


    当然，Python编程领域中存在许多你可能犯错或面临权衡取舍的方面。并非所有此类主题都能在本书中涵盖，但未涉及的主题未必不重要。在大多数情况下，这些未讨论的主题之所以未被讨论，仅仅是因为它们足够庞大，值得单独成书。


    ### A.1 测试驱动开发


    良好的软件开发实践应*始终*包含广泛的测试。如何正确进行测试存在大量细节，有时甚至颇为微妙。但最大的错误，也是我在实际代码库中见过最普遍的错误，就是根本没有测试。仅比完全没有测试稍好一点的情况是，拥有未被维护的测试套件。遇到生产代码中测试只是偶尔且随意地运行，而开发者只是抱着大多数测试都会失败的假设继续工作，这总是令人感到困难和痛苦。通常当你看到这种情况时，很难分辨哪些失败的测试曾经通过过，哪些从一开始就没有完成或根本无法运行。


    一个好的测试套件应该成为每次代码合并前的屏障。无论是在每次推送时，还是在每次合并时（至少是合并到生产分支时），CI/CD（持续集成/持续开发）测试都应通过自动化方式运行。对于更耗时的测试，安排它们在每晚或每周运行也是合适的；但无论如何，此类测试必须在代码投入生产使用前运行并通过。


    开发是否严格遵循TDD（测试驱动开发）是一个可以合理辩论的话题。无论你在辩论中持何种立场，开发者都应*始终*简单地假设未经测试的代码就是有问题的代码。当然，这几段话中的建议同样适用于每种编程语言，而不仅限于Python。


    在Python本身，我的建议是始终使用pytest (https://docs.pytest.org) 而不是标准库的`unittest`。Pytest以向后兼容的方式支持`unittest`套件，提供了好得多的语法、更多功能，并且总体上更符合Python风格。第三方库nose2
    (https://docs.nose2.io/en/latest/) 也不是一个糟糕的选择，但通常我推荐pytest胜过nose2。标准库的**doctest**模块对于那些容易表示为文档字符串的测试也非常有用（这类测试的数量出乎意料地多，提供它们对未来的维护者大有裨益）。


    ### A.2 并发


    在本书的编写过程中，我曾想讨论一些并发陷阱和权衡。然而，这是一个庞大的主题；对于这本中等规模的书来说，用一两章来充分讨论它显得过于庞大。本书不讨论并发这一事实，并不削弱该主题的重要性，也不意味着你所做的选择不会面临陷阱和权衡。


    在Python本身，处理并发有三种主要方法。Python的标准库有一个**threading**模块用于处理线程。线程以容易出现死锁、竞态条件、优先级反转、数据结构损坏等陷阱而闻名。此外，在纯Python中，由于臭名昭著的GIL（全局解释器锁），线程无法实现CPU并行。话虽如此，许多第三方模块会“释放GIL”，从而允许真正的并行。


    Python的标准库还包含**multiprocessing**模块，其API与**threading**模块大体相似，但处理的是进程而非线程。该模块提供了在多个CPU核心上运行并行任务的方法，但也受到无法在进程间直接共享数据以及“更重量级”的限制。通常，为了通信，进程需要消息传递，通常通过管道和队列（这些在**multiprocessing**模块中可用）。


    对于线程和多进程，一个有用且更高级的抽象是标准库的**concurrent.futures**模块。许多问题可以使用“futures”抽象更轻松、更安全地表达，并且在可能的情况下，使用此机制进行并发更容易。


    Python中用于并发的第三种抽象是使用协程的异步编程。这通过**async**和**await**关键字支持，并由**asyncio**标准库模块或第三方异步事件循环（如uvloop
    (https://uvloop.readthedocs.io/)、Trio (https://trio.readthedocs.io/en/stable/)、Curio
    (https://curio.readthedocs.io/en/latest/) 和Twisted (https://twisted.org/)）管理。协程背后的一般思想是，异步函数可以在操作过程中*让出*控制权，允许事件循环关注同一进程和线程中的其他协程。当操作是I/O密集型时（因为I/O通常比CPU密集型计算慢几个数量级），这通常很有用。


    官方Python文档对不同并发方法之间的许多权衡进行了很好的讨论（请参阅 https://docs.python.org/3/library/concurrency.html
    以开始了解）。


    ### A.3 打包


    Python生态系统的一个重要部分是关于软件打包以进行分发。实际上，*每种*编程语言几乎都是如此。当你编写软件时，无论是可执行文件、库还是其他系统，你通常都希望与其他用户和开发者分享你的工作。


    对于一些比Python更新的语言，其语言本身的设计与其打包系统的设计是同步的。因此，例如，Go编程语言的用户会使用`go get`...来安装包。Rust用户会使用`cargo`和`rustup`。在Julia中，是`using
    Pkg; Pkg.add(...)`的组合。在R中，通常总是`install.packages(...)`。对于这些语言，安装包只有一种方式，发布你创建的包或工具也几乎只有一种方式。其他语言如Ruby大多围绕`gem`凝聚，JavaScript则在`npm`和`yarn`之间分裂，但两者*大部分*是兼容的。


    Python不像C、Fortran，甚至Perl、Bash、Haskell或Forth那样古老。可以说，所有这些语言在打包方面的混乱程度都比Python更甚。但Python*相当古老*，始于1991年，在此期间经历了众多不完全兼容的打包和安装系统，同时在认真投入这方面工作方面起步相对较晚。在过去的五到十年里，Python打包已经变得稳固且相对稳定，但仍然存在一些相互竞争的工具，以及一些包格式。


    Wheel格式得到了Python打包权威机构 (https://www.pypa.io/en/latest/) 的支持和认可，但*sdist*源码包归档也同样受到支持。许多创建wheel的工具彼此之间大体兼容，但并非完全兼容。Conda包使用不同的格式和构建系统，但允许创建、分发和安装完全非Python的包。大量工具允许为Python创建特定平台的可执行文件，通常包括操作系统发行版的原生打包系统。此外，特别是现在如此多的软件以“云原生”或至少“云中心”的方式部署，容器化（如Docker和Kubernetes）也成为了一种流行的替代方法。


    本书并不试图讨论软件打包，而是建议你阅读一些关于该主题的优秀在线材料，从 https://packaging.python.org/en/latest/overview
    开始。


    ### A.4 类型检查


    除了类型检查错误与本书讨论的概念错误在本质上大多正交之外，类型检查及其相关工具的使用在Python开发者中有些分歧。我毫不犹豫地在本书中对许多事情表达明确观点，但我选择不就Python代码库中使用或添加大量类型注解的优缺点发表意见。有许多优秀的书籍和其他资源深入探讨了这个主题以及这些辩论，内容非常详细。'
