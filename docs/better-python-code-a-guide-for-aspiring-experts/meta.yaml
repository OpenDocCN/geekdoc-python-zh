    当你使用普通字典时，你经常想要修改与一个键关联的可变值。但在执行修改之前，你需要首先检查字典是否*拥有*所需的键。例如，让我们使用在各种示例中使用的SOWPODS词表，并创建一个将首字母映射到以该字母开头的单词集合的字典：


