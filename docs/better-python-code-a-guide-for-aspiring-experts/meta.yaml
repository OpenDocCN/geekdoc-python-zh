  md: '# Chapter 2 Confusing Equality with Identity


    Whereas is True and is False have a narrow edge case where they can make sense,
    using obj == True or obj == False will always cause a feeling of unease among
    Pythonistas since True and False are unique identities already. In Python, numbers
    that aren''t zero and collections that aren''t empty are truthy, and zeros and
    empty collections are falsy. This is as much as we want to know for most constructs.


    Idiomatic Python checks for truthiness


    ```

    >>> tuples = [ (1, 2, 3), (), (4, 5), (9,) ]

    >>> [max(tup) for tup in tuples if tup]            # ❶

    [3, 5, 9]

    >>> for tup in tuples:

    ...     if tup:                                    # ❶

    ...         print(len(tup))

    ...     else:

    ...         print("EMPTY")

    ...

    3

    EMPTY

    2

    1

    ```


    +   ❶ Rely on implicit truthiness


    Some variations you might see will try to check more than explicitly needed.


    Unidiomatic Python checks for truthiness


    ```

    >>> [min(tup) for tup in tuples if len(tup)]      # ❶

    [1, 4, 9]

    >>> [min(tup) for tup in tuples if bool(tup)]     # ❷

    [1, 4, 9]

    >>> for tup in tuples:

    ...     if (len(tup) > 0) is True:                 # ❸

    ...         print(min(tup))

    ...

    1

    4

    9

    ```


    +   ❶ Unnecessary len() check

    ❷ Unnecessary bool() check

    ❸ Triply unnecessary len(), inequality comparison, and is True'
