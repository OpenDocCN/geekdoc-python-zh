    Using a final `str.join()` is a few percent faster, which is not particularly
    important (and doesn''t necessarily generalize). But the important thing is that
    it maintains linear scaling as the size of the list/string grows.

    Another approach is to use an `io.StringIO` stream.


    Streams for file-like appending of strings


    ```

    >>> from io import StringIO

    >>> def lorem_ipsum(n=10):

    ...     buff = StringIO()

    ...     for _ in range(n):

    ...         buff.write(get_word() + " ")

    ...     return buff.getvalue()

