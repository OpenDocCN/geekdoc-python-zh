    \ you are likely to later discover a related need for `repeat()` and `chain()`.\
    \ In a sense, I believe that all the names in `itertools` would be reasonable\
    \ to have put into `__builtins__`.\n\nI have a similar attitude towards the third-party\
    \ `more_itertools` (which has a lot more names, and is discussed elsewhere), which\
    \ likewise “plays nice” with itself and with `itertools`.\n\nOn the other hand,\
    \ it isn’t all that difficult to explicitly begin your script with:\n\npython\n\
    from itertools import (\n    filterfalse, takewhile, repeat, chain, groupby, tee)\n\
    \n\nIf you want to use a few others, just add them to the list. I would make the\
    \ same comment about `collections.abc`, in which names like `AsyncIterable` and\
    \ `MutableMapping` are extremely unlikely to be accidentally reused by some unrelated\
    \ module (even a third-party module). There is nothing there where `import *`\
    \ is likely to cause harm.\n\nThere are some other modules where I also do not\
