    \n## 2.4.3 第三种方法，利用有状态生成器\n\n我将提出的最后一个解决方案是我在公共论坛上最少讨论过的。同时，它可能是我最喜欢的一个，而且在2001年我第一次看到人们为可变默认参数问题绞尽脑汁时，这个方法还不可用。\n\
    \n基于生成器的状态保持\n\n```\n>>> def word_injector(initial_words=None):\n...     words\
