    # 3.4 Optional Argument key to .sort() and sorted()


    Using the optional `key` argument to `sorted()` and `list.sort()` can make your
    code cleaner, faster, and more robust. Failing to use a `key` function where relevant
    is a common mistake.


    The requirements for sorting collections or iterables in Python are surprisingly
    minimal. Each object must be able to perform a *less than* comparison with the
    objects adjacent to it in a sequence.


    Given that all we need is less-than inequality, providing sortability of custom
    objects is extremely easy to make available. Here is an example.


    Creating custom objects that can be sorted


    ```

    >>> class Thing:

    ...     def __init__(self, value):

    ...         self.value = value

    ...     def __lt__(self, other):

    ...         return self.value < other.value

    ...     def __repr__(self):

    ...         return f"Thing({self.value})"

    ...

    >>> sorted([Thing(2), Thing(-17), Thing(55), Thing(7)])

    ```'
