  md: 'The choice of which data structures to include as built-ins, or in the standard
    library, is one that language designers debate, and which often leads to in-depth
    discussion and analysis. Python''s philosophy is to include a relatively minimal,
    but extremely powerful and versatile, collection of primitives with `dict`, `list`,
    `tuple`, `set`, `frozenset`, `bytes`, and `bytearray` in `__builtins__` (arguably,
    `complex` is a simple data structure as well). Modules such as `collections`,
    `queue`, `dataclasses`, `enum`, `array`, and a few others peripherally, include
    other data structures, but even there the number is much smaller than for many
    programming languages.


    A clear contrast with Python, in this regard, is Java. Whereas Python strives
    for simplicity, Java strives to include every data structure users might ever
    want within its standard library (i.e., the `java.util` namespace). Java has hundreds
    of distinct data structures included in the language itself. For Pythonic programmers,
    this richness of choice largely leads only to "analysis paralysis" (https://en.wikipedia.org/wiki/Analysis_paralysis).
    Choosing among so many only-slightly-different data structures imposes a large
    cognitive burden, and the final decision made (after greater work) often remains
    sub-optimal. Giving someone more hammers can sometimes provide little other than
    more ways for them to hit their thumb.


    > **Note A data structure that hasn''t quite made it into Python**


    A really lovely example of the design discussions that go into Python is in PEP
    603 (https://peps.python.org/pep-0603/), and the python-dev mailing list and Discourse
    thread among core developers that followed this PEP. The proposal of a new data
    structure has not been entirely rejected since September 2019, but it also has
    not been accepted so far.


    Internally, CPython utilizes a data structure called a Hash Array Mapped Trie
    (HAMT). This isn''t used widely, but there are specific places in the C code implementing
    CPython where it is the best choice. A HAMT is a kind of immutable dictionary,
    in essence. Since this structure *already exists* in the CPython codebase, it
    would be relatively easy to expose it under a name like `frozenmap` or `frozendict`;
    this would parallel the existing `frozenset` and `tuple` in being the "immutable
    version of built-in mutable collections."


    HAMT is clearly a useful data structure for some purposes. If it were not, the
    very talented CPython developers would not have utilized it. However, the current
    tide of opinion among these developers is that HAMT is not general purpose enough
    to add to the cognitive load of tens of millions of Python developers who *probably
    won''t need it*.


