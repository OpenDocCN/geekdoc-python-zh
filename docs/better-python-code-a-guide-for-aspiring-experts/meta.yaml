    LOCAL_SERVICE_ADDR_2=${LOCAL_SERVICE_PREFIX}.2\nLOCAL_SERVICE_ADDR_3=${LOCAL_SERVICE_PREFIX}.3\n\
    ```\n\n更好的方法是使用操作系统的密钥环服务。macOS、Windows、Linux 甚至 Android 对此的处理方式略有不同，但它们都有不存储明文密码的安全系统。`keyring`\
    \ 模块封装了这些操作系统特定的细节，并在 Python 中提供了一个通用接口。\n\n## 使用 keyring 安全地存储密钥\n\n```python\n\
    # pip install keyring\nimport keyring as kr\n\ndef get_other_data():\n    _username\
    \ = kr.get_password(\"data-service\", \"user\")  # ❶\n    _password = kr.get_password(\"\
    data-service\", \"pw\")\n    _localservice1 = kr.get_password(\"data-service\"\
    , \"1\")\n    _localservice2 = kr.get_password(\"data-service\", \"2\")\n    _localservice3\
    \ = kr.get_password(\"data-service\", \"3\")\n\n    # ... 其余代码 ...\n```\n\n❶ 必须在运行代码的系统上预先运行\
    \ `kr.set_password(\"data-service\", \"user\", \"DavidMertz\")`\n\n使用 `keyring`\
    \ 模块非常简单，并且不会在文件系统的任何地方保留任何密钥的未加密版本。如果可能，请使用这种最终方法。然而，前两种解决方案仍然*远*比将密钥直接放入源代码中要好。\n\
    \n## 8.3 “自行构建”安全机制\n\n如果你不是专业密码学家，构建密码协议是一个错误。*看起来显然很强*的东西可能并非如此。\n\nPython 标准库不包含大多数公认的密码学原语。这种排除是有原因的，并非仅仅是\
    \ CPython 核心开发者的懒惰或疏忽。处理密码学的库的演进和修复已发现漏洞的速度与 Python 发布周期不同。Python 的开发者本身不一定是密码学家或密码分析师。\n\
    \nCPython 开发者之间有时会就这种排除是否是最佳策略展开辩论，但做出这一决定*并非*缺乏思考和讨论。即使是像 Miniconda 安装的环境，虽然包含*一点*超出标准库的内容，也没有添加通用的密码学原语。\n\
    \n人们会受到诱惑——作者本人也经常犯这种错误——仅仅基于标准库中*已有的*原语来创建一些“足够好”的东西。例如，标准库有 `secrets`、`hmac`\
    \ 和 `hashlib`，其中包含*一些*公认的密码学原语。如果你觉得代码的威胁模型有限，并且你只追求“快速而粗糙”，你可能会快速编写如下内容。\n\n\
    ### 作者匆忙设计的对称加密\n\n```python\n>>> def amateur_encrypt(plaintext: str, key: str)\
    \ -> bytes:\n...     encoded_text = plaintext.encode()  # ❶\n...     m = hashlib.sha256()\
    \  # ❷\n...     m.update(key.encode())  # ❸\n...     # 扩展密钥长度以匹配完整明文\n...    \
    \ hashed_key = m.digest() * (1 + len(encoded_text)//32)\n...     ciphertext0 =\
    \ b\"\".join(                          # ❹\n...         (a ^ b).to_bytes()\n...\
    \         for a, b in zip(encoded_text, hashed_key))\n...     ciphertext = b\"\
    \".join(                           # ❺\n...         (a ^ b).to_bytes()\n...  \
    \       for a, b in zip(reversed(ciphertext0), hashed_key))\n...     return ciphertext\n\
    ...\n>>> hidden = amateur_encrypt(\"Mary had a little lamb\",\n...           \
    \               \"MyStrongKey!!17\")\n>>> hidden\nb'\\x8f\\xe5SDz\\xb4f\\xc5\\\
    x8f\\x8d\\xc1\\x87\\x91v\\xb9wDF\\xf6q\\xa0'\n```\n\n- ❶ 字节而非 Unicode 码点\n- ❷\
    \ 一个密码学上强的哈希\n- ❸ 密钥的字节哈希\n- ❹ 每个密钥字节与编码后的明文字节之间的异或\n- ❺ 我*认为*我如此“聪明”，通过与反转的密文进行异或来混淆对类维吉尼亚密码的频率攻击。\n\
    \n这个加密算法足够好，以至于*我不知道*除了对密钥进行暴力搜索之外还有更好的攻击方法。解密与加密几乎是对称的，并且有效。\n\n### 匹配的匆忙设计解密\n\
    \n```python\n>>> def amateur_decrypt(ciphertext: bytes, key: str) -> str:\n...\
    \     m = hashlib.sha256()\n...     m.update(key.encode())\n...     hashed_key\
    \ = m.digest() * (1 + len(ciphertext)//32)\n...     plainbytes0 = b\"\".join(\n\
    ...         (a ^ b).to_bytes()                          # ❶\n...         for a,\
    \ b in zip(ciphertext, hashed_key))\n...     plainbytes = b\"\".join(\n...   \
    \      (a ^ b).to_bytes()\n...         for a, b in zip(reversed(plainbytes0),\
    \ hashed_key))\n...     return plainbytes.decode()\n...\n>>> amateur_decrypt(hidden,\
    \ \"MyStrongKey!!17\")\n'Mary had a little lamb'\n```\n\n- ❶ 在 Python 3.11+ 中，`.to_bytes()`\
    \ 的默认长度为 1。对于旧版本的 Python，你需要指定 `.to_bytes(length=1)`。\n\n问题是这样的。我远没有聪明到知道如何攻击这个加密算法，即使给我许多明文和密文。然而，我微薄的智慧告诉我，确实有密码分析师在*远*比我擅长此类攻击。你们读者极有可能不是比我更好的密码学家。⁶\
    \ 仅仅因为你无法想出如何破解一个算法，并不意味着别人不能。\n\n与其依赖业余密码学，正确的方法是获取第三方 pyca/cryptography 库 (https://cryptography.io/en/latest/)。这是由真正理解安全的人正确实现的，并且在发现弱点时会快速更新。\n\
    \n协议设置可能有点繁琐，但在模块文档中有很好的记录。我展示的内容可以很容易地包装在具有简单签名的函数中，类似于我之前创建的业余版本。\n\n### 正确的对称加密\n\
    \n```python\n>>> from pprint import pprint\n>>> import secrets\n>>> from cryptography.hazmat.primitives.kdf.scrypt\
    \ import Scrypt\n>>> from cryptography.hazmat.primitives.ciphers import (\n...\
    \     Cipher, algorithms, modes)\n\n>>> salt = secrets.token_bytes(16)       \
    \                   # ❷\n>>> kdf = Scrypt(salt=salt, length=32, n=2**14, r=8,\
    \ p=1)  # ❶\n>>> key = kdf.derive(b\"MyStrongKey!!17\")\n\n>>> iv = secrets.token_bytes(16)\
    \                            # ❷\n>>> cipher = Cipher(algorithms.AES(key), modes.CBC(iv))\n\
    >>> encryptor = cipher.encryptor()\n\n>>> plaintext = b\"Mary had a little lamb\"\
    \n>>> padded = plaintext.ljust(32, b\"\\x00\")                  # ❸\n>>> encrypted\
    \ = encryptor.update(padded) + encryptor.finalize()\n>>> pprint(encrypted, width=68)\
    \                             # ❹\n(b'\\xfd\\xaf}s\\x9e8#\\xe4\\x94Fh\\x83\\x18\\\
    x17j\\xa1\\xe7\\x8a\\x98 '\n b'\\xc3\\xd9\\x07\\xee\\x1e\\xe9\\x9c\\xf2\\xec\\\
    x90\\xf74')\n```\n\n⁶. 作为一个随意的消遣，我在 https://gnosis.cx/better 创建了一个挑战。对于这个挑战，我创建了\
    \ 1000 个密文，所有密文都使用*完全相同*的加密代码，使用相同的密钥加密。此外，这 1000 个明文都是本书草稿中的句子（尽管在后续编辑后可能不会逐字出现）。如果任何读者能够识别出使用的密钥，甚至两个明文句子，我将向他们赠送一本签名的纸质版本书。"
