    \ `import *` 模式的情况之一。\n\n假设你有一个可能很大的 FASTA 源，并且你希望识别每个（RNA）序列中出现长段相同核苷酸的情况。但一旦你在序列中找到一个，你就不想花费额外的工作去检查该序列的其余部分：\n\
