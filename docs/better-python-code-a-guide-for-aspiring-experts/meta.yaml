    # # 7.5 Learn Less Common Dictionary Methods


    Dictionaries are a wonderful data structure that in many ways make up the heart
    of Python. Internally, most objects, including modules, are defined by their dictionaries.

    The sometimes overlooked method `dict.get()` was discussed in Chapter 3, *A Grab
    Bag of Python Gotchas*, but dicts also have a few other methods that are often
    overlooked, even by experienced Python programmers. As with a number of other
    mistakes throughout this book, the mistake here is simply one of ignorance or
    forgetfulness; the result is not usually broken code, but rather just code that
    is less fast, elegant, and expressive than it might be.


    # ## 7.5.1 The Dictionaries Defining Objects


    This subsection is a digression into Python''s internal mechanisms. Feel free
    to skip it for the actual pitfall; or read it to understand Python a little bit
    better.

    You can use Python for a long time without ever needing to think about the dictionaries
    at the heart of most non-dict objects. There are some exceptions, but many Python
    objects have a `.__dict__` attribute to store the dictionary providing its capabilities
    and behaviors.

    Let''s look at a couple examples.


    Module dictionaries


    ```

    >>> import re

    >>> type(re.__dict__)

    <class ''dict''>

    >>> for key in re.__dict__.keys():

    ...     print(key, end=" ")

    ...

    __name__ __doc__ __package__ __loader__ __spec__ __path__ __file__ __cached__
    __builtins__ enum _constants _parser _casefix _compiler functools __all__ __version__
    NOFLAG ASCII A IGNORECASE I LOCALE L UNICODE U MULTILINE M DOTALL S VERBOSE X
    TEMPLATE T DEBUG RegexFlag error match fullmatch search sub subn split findall
    finditer compile purge template _special_chars_map escape Pattern Match _cache
    _MAXCACHE _compile _compile_repl _expand _subx copyreg _pickle Scanner

    ```


    The various functions and constants in a module are simply its dictionary. Built-in
    types usually use a slightly different dictionary-like object.'
