    \ algorithm as a generator function.\n\nGenerator function implementing an LCG\n\
    \n```\ndef lcg(\n    seed: int = 123,\n    multiplier: int = 1_103_515_245,\n\
    \    modulus: int = 2**32,\n    increment: int = 1\n):\n    # Simple constraints\
    \ we should follow\n    assert 0 < modulus\n    assert 0 < multiplier < modulus\n\
    \    assert 0 <= increment < modulus\n    assert 0 <= seed < modulus\n\n    #\
    \ One initial application of recurrence relation\n    state = (multiplier * seed\
    \ + increment) % modulus\n\n    while True:\n        state = (multiplier * state\
    \ + increment) % modulus\n        yield state / modulus\n```\n\nWe can utilize\
    \ the generator to obtain pseudo-random numbers in the interval [0,1):\n\n```\n\
    >>> from lcg import lcg\n>>> for x, _ in zip(lcg(), range(5)):\n...     print(x)\n\
    ...\n0.7730483340565115\n0.7532131555490196\n0.8828994461800903\n0.6617866707965732\n\
    0.1618147783447057\n```\n\nThe assertions made were concretely useful when I was\
    \ first debugging this code. Moreover, they communicate to other developers some\
    \ of my expectations about the reasonable preconditions for the algorithm to work\
    \ (some are much more nuanced; what makes a “good” modulus and multiplier would\
    \ take full papers in number theory, not single lines).\n\nHowever, suppose that\
    \ a naive developer wanted to enhance this code by having a fallback to Python’s\
    \ standard library `random` module when disallowed parameters were passed in.\n\
    \nSource code of `code/bad_lcg.py`\n\n```\ndef bad_lcg(\n    seed: int = 123,\n\
    \    multiplier: int = 1_103_515_245,\n    modulus: int = 2**32,\n    increment:\
    \ int = 1\n):\n    # Skip LCG algorithm if parameters are not usable\n    try:\n\
    \        assert 0 < modulus\n        assert 0 < multiplier < modulus\n       \
    \ assert 0 <= increment < modulus\n        assert 0 <= seed < modulus\n\n    \
    \    # One initial application of recurrence relation\n        state = (multiplier\
    \ * seed + increment) % modulus\n\n        while True:\n            state = (multiplier\
    \ * state + increment) % modulus\n            yield state / modulus\n\n    except\
    \ AssertionError:\n        import random\n        while True:\n            yield\
    \ random.random()\n\nif __name__ == '__main__':\n    for x, _ in zip(bad_lcg(multiplier=-1),\
    \ range(5)):\n        print(x)\n```\n\nAt first brush, this seems to work. At\
    \ least in the sense of getting *some* pseudo-random numbers (albeit not ones\
    \ that are easily reproducible as in the non-fallback case):\n\n```\n[BetterPython]$\
    \ python code/bad_lcg.py\n0.9091770816298352\n0.5190613689590089\n0.911898811723727\n\
    0.8066722366593495\n0.5563737722223733\n[BetterPython]$ python code/bad_lcg.py\n\
    0.19828280342458238\n0.3661064573367322\n0.02637664736327605\n0.04362950928898546\n\
    0.32456135199248937\n```\n\nThis breaks down rather badly once we run the code\
    \ with the optimization flag, however:\n\n```\n[BetterPython]$ python -O code/bad_lcg.py\n\
    2.8638169169425964e-08\n0.9999999715946615\n2.8638169169425964e-08\n0.9999999715946615\n\
    2.8638169169425964e-08\n```\n\nThese pseudo-random numbers are very bad at their\
    \ job. Specifically, the same two numbers (close to the extremes of the unit interval)\
    \ will alternate forever, which is not an expected distribution. Moreover, if\
    \ you are using this numeric stream for anything vaguely security related, many\
    \ attack vectors are opened up by failing to fall back to the alternate code path.\
