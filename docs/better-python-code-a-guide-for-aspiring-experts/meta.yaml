- img_proc: true
  md: "In a highly dynamic language like Python, we *can* potentially redefine “constants”\
    \ since the capitalization is only a convention rather than in the syntax or semantics\
    \ of the language. If some later line of the program redefines `SQUARE = 2`, buggy\
    \ behavior is likely to emerge. More likely is that some other module that gets\
    \ imported has redefined `SQUARE` to something other than the expectation of the\
    \ current module. This risk is minimal if imports are within namespaces, but `from\
    \ othermod import SQUARE, CUBE, TESSERACT` is not necessarily unreasonable to\
    \ have within the current module.\n\nPrograms written like the preceding one are\
    \ not necessarily broken, and not even necessarily mistakes, but it is certainly\
    \ more elegant to use enums for constants that come in sets.\n\nUsing enums for\
    \ sets of alternatives\n\n```\n>>> from enum import Enum\n>>> Color = Enum(\"\
    Color\", [\"RED\", \"GREEN\", \"BLUE\"])\n>>> class Shape(Enum):\n...     CIRCLE\
    \ = 0\n...     SQUARE = 1\n...     TRIANGLE = 2\n...\n>>> my_sprite = Sprite(Shape.TRIANGLE,\
    \ Color.RED)\n>>> def process(sprite):\n...     if sprite.shape == Shape.TRIANGLE\
    \ and sprite.color == Color.RED:\n...         print(\"It is a red triangle\")\n\
    ...     elif something_else:\n...         pass\n...\n>>> process(my_sprite)\n\
    It is a red triangle\n>>> Color.RED = 2\nTraceback (most recent call last):\n\
    \  [...]\nAttributeError: cannot reassign member 'RED'\n```\n\nIt’s not *impossible*\
    \ to get around the protection that an `Enum` provides, but you have to work quite\
    \ hard to do so rather than break it inadvertently. In effect, the attributes\
    \ of an enum are *read-only*. Therefore, reassigning to an immutable attribute\
    \ raises an exception.\n\nThere are also “constants” that are not alternatives,\
    \ but simply values; these likewise cannot actually be enforced as constants in\
    \ Python. Enums might still be reasonable namespaces with slightly more enforcement\
    \ against changes than modules have."
