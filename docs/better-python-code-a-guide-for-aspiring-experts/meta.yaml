  md: "# Chapter 4 Advanced Python Usage\n\nshould absolutely override `.__lshift__()`\
    \ or `.__call__()` if that is relevant for your class, but try to avoid inventing\
    \ `.__modify__()` in your own code, if for no other reason than some future version\
    \ of Python might discover a need for that name.\n\nCreators of modules and classes\
    \ commonly follow a convention of using attribute names that begin with underscores\
    \ as a way of telling users “don’t use this attribute directly.” Those developers\
    \ cannot *enforce* that request upon users downstream, but the intention is made\
    \ clear.\n\nAs an example, let’s write a `LinearCongruentialGenerator` (LCG) class\
    \ (see https://en.wikipedia.org/wiki/Linear_congruential_generator) with reasonable\
    \ behavior and code. In Chapter 8, *Security*, in the section *Kinds of Randomness*,\
    \ I discuss in much more detail Python’s actual pseudo-random number generator\
    \ (PRNG), the Mersenne Twister. Suffice it to say that LCGs are less good PRNGs\
    \ than what Python provides you; but LCGs were and are used in actual production\
    \ software PRNGs, so they aren’t absurdly bad (depending on configuration of parameters).\n\
    \nClass implementation of a linear congruential generator\n\n```\nclass LinearCongruentialGenerator:\n\
    \    def __init__(self, seed: int = 123):  # ③\n        self.__seed: int = seed\
    \  # ①\n        self._multiplier: int = 1_103_515_245  # ②\n        self._modulus:\
    \ int = 2**32  # ②\n        self._increment: int = 1  # ②\n\n        # Simple\
    \ constraints we should follow\n        assert 0 < self._modulus\n        assert\
    \ 0 < self._multiplier < self._modulus\n        assert 0 <= self._increment <\
    \ self._modulus\n        assert 0 <= seed < self._modulus\n\n        # One initial\
    \ application of recurrence relation\n        self._state = (\n            (self._multiplier\
    \ * self.__seed + self._increment)\n            % self._modulus)\n\n    @property\n\
    \    def seed(self):\n        return self.__seed\n\n    def next(self):\n    \
    \    # Increment the state\n        self._state = (\n            (self._multiplier\
    \ * self._state + self._increment)\n            % self._modulus)\n        return\
    \ self._state / self._modulus\n```"
