    itself well:


    > Black is the uncompromising Python code formatter. By using it, you agree to
    cede control over minutiae of hand-formatting. In return, Black gives you speed,
    determinism, and freedom from pycodestyle nagging about formatting. You will save
    time and mental energy for more important matters.


    — Black home page


    Opinions about using Black vary among Pythonistas. I have found that even if Black
    occasionally formats code in a manner I wouldn''t entirely choose, enforcing consistency
    when working with other developers aids the readability of shared code, especially
    on large projects.


    A very impressive recent project for linting and code formatting is Ruff (https://beta.ruff.rs/docs/).
    Ruff covers most of the same linting rules as Flake8 and other tools, but is written
    in Rust and runs several orders of magnitude faster than other linters. As well,
    Ruff provides auto-formatting similar to Black, but cleans up many things that
    Black does not address. (However, Black also cleans things that Ruff does not;
    they are complementary.)


    In modern Python development, type annotations and type-checking tools are in
    relatively widespread use. The most popular of these tools are probably Mypy (http://mypy-lang.org/),
    Pytype (https://google.github.io/pytype/), Pyright (https://github.com/Microsoft/pyright),
    and Pyre (https://pyre-check.org/). All of these tools have virtues, especially
    for large-scale projects, but this book generally avoids discussion of the Python
    type-checking ecosystem. The kinds of mistakes that type checking can detect are
    mostly disjointed from the semantic and stylistic issues that we discuss herein.


