- md: '## 9.1.2 NaNs and statistics.median()


    In the preceding section, we discussed the sometimes surprising behavior of NaNs
    in extensive detail. Please refer back to the footnotes, notes, and discussion
    there if you need to familiarize yourself.


    One of the main modules in the Python standard library for working with collections
    of floating point numbers is `statistics`. As we saw in the earlier discussion,
    when you think about collections of floating point numbers you should keep in
    mind that some floating point numbers are NaNs.


    Most of the functions within `statistics` *propagate* NaNs. That is, if some of
    the numbers in a collection are NaNs, the result simply becomes NaN as well. Two
    such functions are `statistics.mean()` and `statistics.fmean()`; these functions
    differ from each other in that the former tries to preserve the specific numeric
    datatype of elements while the latter automatically converts everything to floating
    point numbers (and is thereby generally faster).


    Comparing statistics.mean() with statistics.fmean()


    ```

    >>> import statistics

    >>> from fractions import Fraction as F

    >>> a = [F(3, 7), F(1, 21), F(5, 3), F(1, 3)]

    >>> statistics.mean(a)

    Fraction(13, 21)

    >>> statistics.fmean(a)

    0.6190476190476191

    >>> from decimal import Decimal as D

    >>> b = [D("0.5"), D("0.75"), D("0.625"), D("0.375")]

    >>> statistics.mean(b)

    Decimal(''0.5625'')

    >>> statistics.fmean(b)

    0.5625

    ```


    When we introduce NaNs, it becomes impossible to say what the “mean value” is,
    regardless of which approach we are using.


    Taking a mean in the presence of NaN values


    ```

    >>> import math

    >>> statistics.fmean([math.nan] + b)

    nan

    >>> statistics.mean(a + [math.nan])

    nan

    ```


    Similar behavior is encountered with functions like statistics.stdev(), statistics.variance(),
    statistics.correlation(), and others, for essentially the same reason. Interestingly,
    statistics.mode() and statistics.multimode() are “NaN aware” rather than “NaN
    propagating”:


    ```

    >>> from math import nan

    >>> statistics.mode([nan, nan, nan, 4, 3, 3, 3.0])

    nan

    >>> statistics.multimode([nan, nan, nan, 4, 3, 3, 3.0])

    [nan, 3]

    ```


    I would likely argue that this behavior of statistics.mode is nonobvious, or perhaps
    even wrong. Those several NaN values should never be equal to one another (although
    they are identical), and it’s not clear the sense in which “the same” value occurs
    multiple times. However, this behavior remains clear and easy to understand, even
    if purity concerns are possibly pushed aside.


    Where we find a genuinely odd corner of module behavior is with statistics.median()
    (and its close relatives statistics.median_low(), statistics.median_high(), and
    statistics.median_grouped()). In all of these, the presence of NaN values makes
    the results completely nonsensical.


    Median becomes silly in the presence of NaNs


    ```

    >>> statistics.median([nan, nan, nan, 4, 3, 3, 7])

    3

    >>> statistics.median_grouped([nan, nan, nan, 4, 3, 3, 7])

    3.2

    >>> statistics.median_high([7, 4, 3, 3, nan, nan, nan])

    7

    >>> statistics.median_grouped([7, 4, 3, 3, nan, nan, nan])

    6.625

    ```


    Depending on where elements occur within a list of numbers, the median might be
    the lowest number, the highest number, a NaN (with some orderings not shown),
    or in the case of `statistics.median_grouped()`, some number that incorporates
    a fairly meaningless mean into the overall result (for strictly non-NaN values,
    this “value between the elements” is sometimes quite useful).


    There are basically two ways we might go about *fixing* this. I have argued on
    the python-ideas mailing list that these functions should grow an optional argument
    to clarify behavior; I’ve never completely convinced the module’s main author.
    One approach is to introduce NaN propagation, the other is to introduce NaN stripping.
    Notably, these two approaches are the default behaviors of NumPy and Pandas, respectively
    (but varying from each other).


    Fortunately, choosing either of these behaviors is easy to achieve in Python;
    you just have to remember to do it.


    Median with NaN propagation


    ```

    >>> c = [nan, nan, nan, 4, 3, 3, 7]

    >>> d = [4, 3, 3, 7, 0, 10, 4]

    >>> math.nan if math.nan in c else statistics.median(c)

    nan

    >>> math.nan if math.nan in d else statistics.median(d)

    4

    ```


    Notice that this ternary clause works because `in` will do an identity check before
    it tries an equality test. As we’ve seen, `nan != nan`, so the fact it checks
    this way is necessary for the suggestion to work. Here is the code for the latter
    option.


    Median with NaN stripping


    ```

    >>> statistics.median([x for x in c if not math.isnan(x)])

    3.5

    >>> statistics.median([x for x in d if not math.isnan(x)])

    4

    ```


    ## 9.1.3 Naive Use of Floating Point Numbers: Associativity and Distributivity


    It is famously easy to forget that basic algebraic operations on floating point
    numbers are neither associative nor distributive in general. Even when we rule
    out special values like `math.inf` and `math.nan`, basic “ordinary numbers” only
    approximate Rational or Real numbers. We can exclude infinities and NaNs with
    the function `math.isfinite()`.


    To put it very simply, we cannot assume in IEEE-754—whether in Python or in any
    of the other majority of programming languages that use floating point numbers
    as built-ins or standard library types—that these properties hold.


    Absence of associativity and distributivity


    ```

    >>> from math import isfinite

    >>> a, b, c, d = 0.1, 0.2, 0.3, 0.4

    >>> isfinite(a) and isfinite(b) and isfinite(c) and isfinite(d)

    True

    >>> (a + b) + c == a + (b + c)

    False

    >>> (a + b) + d == a + (b + d)

    True

    >>> a * (b + c) == (a * b) + (a * c)

    True

    >>> c * (a + b) == (c * a) + (c * b)

    False

    ```


    Associativity and distributivity do not *always* fail, of course. We see examples
    in the preceding code block of these properties both holding and failing, all
    with very ordinary numbers. However, predicting exactly which series of operations
    will preserve exact equality and which will not is exceedingly subtle.


    The solution to this Gordian Knot, of course, is not to understand all the rounding
    errors in a computation that might consist of thousands or millions of floating
    point operations, but rather to settle for “plausible equality.” For what it’s
    worth, the problem gets even more tangled in the face of concurrency, wherein
    you may not even be able to predict the order in which operations are performed.


    Both Python’s `math.isclose()` and NumPy’s `numpy.isclose()` provide such plausible
    answers.


    Approximate associativity and distributivity


    ```

    >>> import numpy as np

    >>> import math

    >>> math.isclose((a + b) + c, a + (b + c))

    True

    >>> np.isclose((a + b) + c, a + (b + c))

    True

    >>> math.isclose(c * (a + b), (c * a) + (c * b))

    True

    >>> np.isclose(c * (a + b), (c * a) + (c * b))

    True

    ```


    > **Note** *Remembrance of Things Past*


    I had already previously commented in a 2003 book that “If you think you *understand*
    just how complex IEEE 754 math is, you are not yet aware of all of its subtleties.”
    In that ancient text, I noted that my friend, colleague, and erstwhile professor
    of numeric computing, Alex Martelli, had written:


    > Anybody who thinks he knows what he’s doing when floating point is involved
    is either naive, or Tim Peters (well, it *could* be W. Kahan I guess).


    Tim Peters (after whom “Timsort,” the sorting algorithm used in Python and in
    many other modern programming languages), replied:


    > I find it’s possible to be both (wink). But *nothing* about fp comes easily
    to anyone, and even Kahan works his butt off to come up with the amazing things
    that he does.


    Peters illustrated further by way of Donald Knuth (*The Art of Computer Programming*,
    3rd edition, Addison-Wesley, 1997: 229):


    > Many serious mathematicians have attempted to analyze a sequence of floating
    point operations rigorously, but found the task so formidable that they have tried
    to be content with plausibility arguments instead.


    Both `math.isclose()` and `numpy.isclose()` come with optional arguments to fine-tune
    their meanings of “closeness.” However, note that these corresponding functions
    are *not* algorithmically identical. In fact, quoting the NumPy documentation:


    > Unlike the built-in `math.isclose`, the above equation is not symmetric in a
    and b — it assumes b is the reference value — so that `isclose(a, b)` might be
    different from `isclose(b, a)`.


    In other words, `numpy.isclose()` is also not itself commutative (the property
    of an operator in mathematics in which A ⊕ B is always equal to B ⊕ A).'
  mdcn: '## 9.1.2 NaN 与 statistics.median()


    在上一节中，我们已经非常详细地讨论了 NaN 有时令人惊讶的行为。如果需要熟悉相关内容，请回顾那里的脚注、注释和讨论。


    Python 标准库中用于处理浮点数集合的主要模块之一是 `statistics`。正如我们之前讨论的那样，当你考虑浮点数集合时，应该记住其中一些浮点数可能是
    NaN。


    `statistics` 模块中的大多数函数会*传播* NaN。也就是说，如果集合中的某些数字是 NaN，结果也会变成 NaN。这样的两个函数是 `statistics.mean()`
    和 `statistics.fmean()`；它们的区别在于前者试图保留元素的特定数值数据类型，而后者自动将所有内容转换为浮点数（因此通常更快）。


    比较 statistics.mean() 与 statistics.fmean()


    ```

    >>> import statistics

    >>> from fractions import Fraction as F

    >>> a = [F(3, 7), F(1, 21), F(5, 3), F(1, 3)]

    >>> statistics.mean(a)

    Fraction(13, 21)

    >>> statistics.fmean(a)

    0.6190476190476191

    >>> from decimal import Decimal as D

    >>> b = [D("0.5"), D("0.75"), D("0.625"), D("0.375")]

    >>> statistics.mean(b)

    Decimal(''0.5625'')

    >>> statistics.fmean(b)

    0.5625

    ```


    当我们引入 NaN 时，无论使用哪种方法，都无法确定“平均值”是什么。


    在存在 NaN 值时计算平均值


    ```

    >>> import math

    >>> statistics.fmean([math.nan] + b)

    nan

    >>> statistics.mean(a + [math.nan])

    nan

    ```


    类似的行为也出现在 `statistics.stdev()`、`statistics.variance()`、`statistics.correlation()`
    等函数中，原因基本相同。有趣的是，`statistics.mode()` 和 `statistics.multimode()` 是“NaN 感知”而非“NaN
    传播”的：


    ```

    >>> from math import nan

    >>> statistics.mode([nan, nan, nan, 4, 3, 3, 3.0])

    nan

    >>> statistics.multimode([nan, nan, nan, 4, 3, 3, 3.0])

    [nan, 3]

    ```


    我可能会认为 `statistics.mode` 的这种行为并不明显，甚至可能是错误的。那几个 NaN 值彼此之间永远不应该相等（尽管它们是相同的），而且不清楚“相同”的值多次出现的意义何在。然而，即使纯粹性考虑可能被搁置，这种行为仍然清晰易懂。


    我们发现模块行为中真正奇怪的角落是 `statistics.median()`（及其近亲 `statistics.median_low()`、`statistics.median_high()`
    和 `statistics.median_grouped()`）。在所有这些函数中，NaN 值的存在使结果变得完全无意义。


    在存在 NaN 时中位数变得荒谬


    ```

    >>> statistics.median([nan, nan, nan, 4, 3, 3, 7])

    3

    >>> statistics.median_grouped([nan, nan, nan, 4, 3, 3, 7])

    3.2

    >>> statistics.median_high([7, 4, 3, 3, nan, nan, nan])

    7

    >>> statistics.median_grouped([7, 4, 3, 3, nan, nan, nan])

    6.625

    ```


    根据元素在数字列表中的位置，中位数可能是最低的数字、最高的数字、一个 NaN（某些排序未显示），或者在 `statistics.median_grouped()`
    的情况下，是某个将相当无意义的平均值纳入整体结果的数字（对于严格非 NaN 的值，这种“元素之间的值”有时非常有用）。


    我们基本上有两种方法来*修复*这个问题。我曾在 python-ideas 邮件列表上主张这些函数应该增加一个可选参数来澄清行为；我从未完全说服该模块的主要作者。一种方法是引入
    NaN 传播，另一种是引入 NaN 剥离。值得注意的是，这两种方法分别是 NumPy 和 Pandas 的默认行为（但彼此不同）。


    幸运的是，在 Python 中选择任一行为都很容易实现；你只需要记住去做。


    带 NaN 传播的中位数


    ```

    >>> c = [nan, nan, nan, 4, 3, 3, 7]

    >>> d = [4, 3, 3, 7, 0, 10, 4]

    >>> math.nan if math.nan in c else statistics.median(c)

    nan

    >>> math.nan if math.nan in d else statistics.median(d)

    4

    ```


    请注意，这个三元子句之所以有效，是因为 `in` 在尝试相等性测试之前会进行身份检查。正如我们所看到的，`nan != nan`，因此它以这种方式检查对于建议的实现是必要的。以下是后一种选项的代码。


    带 NaN 剥离的中位数


    ```

    >>> statistics.median([x for x in c if not math.isnan(x)])

    3.5

    >>> statistics.median([x for x in d if not math.isnan(x)])

    4

    ```


    ## 9.1.3 浮点数的朴素使用：结合律与分配律


    众所周知，很容易忘记浮点数的基本代数运算通常既不满足结合律也不满足分配律。即使我们排除像 `math.inf` 和 `math.nan` 这样的特殊值，基本的“普通数字”也只是有理数或实数的近似。我们可以用
    `math.isfinite()` 函数排除无穷大与 NaN。


    简单来说，在 IEEE-754 标准中——无论是在 Python 还是其他大多数将浮点数作为内置类型或标准库类型的编程语言中——我们都不能假设这些性质成立。


    结合律与分配律的缺失


    ```

    >>> from math import isfinite

    >>> a, b, c, d = 0.1, 0.2, 0.3, 0.4

    >>> isfinite(a) and isfinite(b) and isfinite(c) and isfinite(d)

    True

    >>> (a + b) + c == a + (b + c)

    False

    >>> (a + b) + d == a + (b + d)

    True

    >>> a * (b + c) == (a * b) + (a * c)

    True

    >>> c * (a + b) == (c * a) + (c * b)

    False

    ```


    当然，结合律和分配律并非*总是*失败。我们在前面的代码块中看到了这些性质成立和失败的例子，而且都是用非常普通的数字。然而，要准确预测哪些运算序列会保持精确相等，哪些不会，是极其微妙的。


    解决这个戈尔迪之结的方法，当然不是去理解可能包含数千或数百万次浮点运算的计算中的所有舍入误差，而是满足于“合理的相等性”。值得一提的是，在并发环境下，这个问题变得更加复杂，因为你甚至可能无法预测运算执行的顺序。


    Python 的 `math.isclose()` 和 NumPy 的 `numpy.isclose()` 都提供了这样的合理答案。


    近似的结合律与分配律


    ```

    >>> import numpy as np

    >>> import math

    >>> math.isclose((a + b) + c, a + (b + c))

    True

    >>> np.isclose((a + b) + c, a + (b + c))

    True

    >>> math.isclose(c * (a + b), (c * a) + (c * b))

    True

    >>> np.isclose(c * (a + b), (c * a) + (c * b))

    True

    ```


    > **注意** *追忆似水年华*


    我之前在 2003 年的一本书中就曾评论过：“如果你认为你*理解*了 IEEE 754 数学有多复杂，那你还没有意识到它所有的微妙之处。”在那本古老的著作中，我指出我的朋友、同事和曾经的数值计算教授
    Alex Martelli 曾写道：


    > 任何认为自己在涉及浮点数时知道自己在做什么的人，要么是天真的，要么是 Tim Peters（好吧，我猜*可能*是 W. Kahan）。


    Tim Peters（Python 和许多其他现代编程语言中使用的排序算法“Timsort”就是以他命名的）回应道：


    > 我发现两者兼而有之是可能的（眨眼）。但*没有任何*关于浮点数的东西是容易的，即使是 Kahan 也为了得出他那些惊人的成果而拼命工作。


    Peters 进一步通过 Donald Knuth（《计算机程序设计艺术》，第 3 版，Addison-Wesley，1997：229）来说明：


    > 许多严肃的数学家曾试图严格分析一系列浮点运算，但发现这项任务如此艰巨，以至于他们试图满足于合理性论证。


    `math.isclose()` 和 `numpy.isclose()` 都带有可选参数来微调它们对“接近度”的定义。然而，请注意这些对应的函数在算法上*并不*相同。事实上，引用
    NumPy 文档：


    > 与内置的 `math.isclose` 不同，上述方程在 a 和 b 中不是对称的——它假设 b 是参考值——因此 `isclose(a, b)` 可能与
    `isclose(b, a)` 不同。


    换句话说，`numpy.isclose()` 本身也不是可交换的（数学中运算符的性质，其中 A ⊕ B 总是等于 B ⊕ A）。'
