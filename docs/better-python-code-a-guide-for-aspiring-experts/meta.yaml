    >>> r = range(1_000_000_000_000) # ❶

    >>> isinstance(r, collections.abc.Collection)

    True

    >>> r[:10] # ❷

    range(0, 10)

    >>> r[999_999_999_990:]

    range(999999999990, 1000000000000)

    >>> f"{r[999_999_999_990:][5]:,}" # ❷

    ''999,999,999,995''

    ```


    ❶ Ostensibly, this is a very large collection; in truth it is a very compact representation
    that doesn''t actually *contain* a trillion integers, only the endpoints and step
    of the range.

    ❷ A number of clever shortcuts exist in the implementation of the `range` object,
    generally producing what we “expect.”


    Part of the cleverness of `range` is that it does not need to do a linear search
    through its items, even though it is in many respects list-like. A `range` object
    behaves like a realized list in most ways, but only *contains* anything in a synthetic
    sense. In other words, `range(start, stop, step)` has an internal representation
    similar to its call signature, and operations like a slice or a membership test
    are calculated using a few arithmetic operations. For example, `n in my_range`
    can simply check whether *start ≤ n < stop* and whether *(n - start) % step =
    0*.


    ### Timing the efficiency of range


    ```python

    >>> %timeit 10 in r

    54 ns ± 0.85 ns per loop (mean ± std. dev. of 7 runs, 10,000,000 loops each)

    >>> %timeit 999_999_999_995 in r

    77 ns ± 0.172 ns per loop (mean ± std. dev. of 7 runs, 10,000,000 loops each)

    ```


    The time to check for membership of an element near the “start” of a range is
    almost identical to that for membership of an element near the “end” because Python
    is not actually *searching* the members.


    Lists are a concrete and ordered collection of elements that can be appended to
    very quickly, and have a few other internal optimizations. However, we have to
    watch where the *ordered* part might bite us. The only generic way to tell if
    an element is contained in a list is to do a linear search on the list. We might
    not find it until near the end of the search, and if it isn''t there, we will
    have had to search the entire list.


    > **Note When you want your lists sorted**


    We can use the bisect module in the standard library if we wish to speed this
    greatly for lists we are happy to keep in sorted order (which is not all of our
    lists, however). The sortedcontainers third-party library (https://grantjenks.com/docs/sortedcontainers/)
    also provides a similar speedup when we can live with the mentioned constraint.


    We can see where checking containment within a list becomes unwieldy with a simple
    example. I keep a copy of the 267,752-word SOWPODS (https://en.wikipedia.org/wiki/Collins_Scrabble_Words)
    English wordlist on my own system. We can use that as an example of a moderately
    large list (of strings, in this case).


    ### Searching the SOWPODS wordlist


    ```python

    >>> words = [w.rstrip() for w in open(''data/sowpods'')]

    >>> len(words)

    267752

    >>> import random

    >>> random.seed(42)

    >>> most_words = random.sample(words, k=250_000)    # ❶

    >>> %timeit "zygote" in most_words

    2.8 ms ± 147 µs per loop (mean ± std. dev. of 7 runs, 100 loops each)

    >>> %timeit "zebra" in most_words

    200 µs ± 12.2 µs per loop (mean ± std. dev. of 7 runs, 1,000 loops each)

    >>> %timeit "aardvark" in most_words

    172 µs ± 776 ns per loop (mean ± std. dev. of 7 runs, 10,000 loops each)

    >>> %timeit "coalfish" in most_words

    10.7 ms ± 163 µs per loop (mean ± std. dev. of 7 runs, 100 loops each)

    ```


    ❶ The words are genuinely shuffled in the random sampling.


    We can see that both “aardvark” and “zebra” take a fairly modest 200 microseconds
    to search. Showing that the most_words list really is not ordered alphabetically,
    “zygote” takes over 10 times as long to find (but it is found).


    However, “coalfish” (a genuine word in the full dictionary, closely related in
    the Linnaean classification system to pollock) takes over 10 milliseconds because
    it is never found in the sampled list.


    For a one-off operation, 10 milliseconds is probably fine. But imagine we want
    to do something slightly more complicated. The example is somewhat artificial,
    but one can realistically imagine wanting instead to compare lists of people''s
    names or addresses for a degree of duplication—or, for example, of shotgun-sampled
    nucleotide fragments from soil—in a real-world situation.


    ### Finding words from one collection in another collection


    ```python

    >>> random.seed(13)

    >>> some_words = random.sample(words, k=10_000)

    >>> sum(1 for word in some_words if word not in most_words)

    649

    >>> %timeit sum(1 for word in some_words if word not in most_words)

    55.2 s ± 1.26 s per loop (mean ± std. dev. of 7 runs, 1 loop each)

    ```


    Taking a full minute for this simple operation is terrible, and it gets worse
    quickly—at approximately an O(N²) rate (to be precise, it is Ω(N×M) since it gets
    even worse as the hit rate goes down for specific data).¹


    What we''ve shown is concise and superficially intuitive code to perform one linear
    scan of `most_words` for every word in `some_words`. That is, we perform an O(N)
    scan operation M different times (where N and M are the sizes of the respective
    lists). A quick clue you can use in spotting such pitfalls is to look for multiple
    occurrences of the `in` keyword in an expression or within a suite. Whether in
    an `if` expression or within a loop, the complexity is similar.


    Fortunately, Python gives us a very efficient way to solve exactly this problem
    by using sets.


    ### Efficiently finding words from one collection in another collection


    ```python

    >>> len(set(some_words) - set(most_words))

    649

    >>> %timeit len(set(some_words) - set(most_words))

    43.3 ms ± 1.31 ms per loop (mean ± std. dev. of 7 runs, 10 loops each)

    ```


    That''s better than a 1000x speedup. We can see that the result is exactly the
    same. Even assuming we needed to concretely look at where those words occur within
    our lists rather than merely count them or see what they are, 649 operations of
    `some_words.index(word)` is *comparatively* cheap relative to the three-orders-of-magnitude
    difference encountered (looking through the shorter list is far faster, and typically
    we find the different word after searching halfway).


    > 1. The so-called big-O notation is commonly used in computer science when analyzing
    the complexity of an algorithm. Wikipedia has a good discussion at https://en.wikipedia.org/wiki/Big_O_notation.
    There are multiple symbols used for slightly different characterizations of asymptotic
    complexity: O, o, Ω, ω, and Θ. Big-O is used most commonly, and indicates a worst-case
    behavior; Big-Theta indicates an asymptote for both worst case and best case;
    Big-Omega indicates a best-case behavior. Small-o and Small-omega are used to
    express the somewhat more complex concepts of one function *dominating* another
    rather than *bounding* another.


    > **Note Trie structures for fast prefix search**


    If the particular problem discussed is genuinely close to the one you face, look
    towards the third-party module `pygtrie` (https://pypi.org/project/pygtrie/),
    which will probably get you even faster and more flexible behavior. For the precise
    problem described, `CharTrie` is the class you''d want. In general, the *trie*
    data structure (https://en.wikipedia.org/wiki/Trie) is very powerful for a class
    of string search algorithms.


    ## 7.2 Deleting or Adding Elements to the Middle of a List


    An early discussion in this book, in Chapter 3, *A Grab Bag of Python Gotchas*,
    addresses how naive string concatenation within a loop might encounter quadratic
    complexity. That is to say, the overall time and computation needed to perform
    a sequence of *N* operations is O(N²).²


    Although in many situations the solution to a slowdown in (certain) string operations
    is to simply "use a list instead" (perhaps followed by a final `"".join(thelist)`
    to get back a string), lists have their own very similar danger. The problem here
    is in not understanding what is "cheap" and what is "expensive" for lists. Specifically,
    inserting or removing items from a list anywhere other than at the end is *expensive*.


    We first explore some details of exactly how lists are implemented in Python,
    then look at which other data structures would be good choices for which actual
    use cases.


    Python gives you the ability to insert or remove items from anywhere within a
    list, and for some problems it will seem like the obvious approach. Indeed, for
    a few operations on a relatively small list, the minor inefficiency is wholly
    unimportant.


    2. *Ibid.*'
  mdcn: '## 第7章 误用数据结构


    操作性的 `re` 修饰符。此外，一些不是集合而是可迭代对象的特殊对象也响应 `in` 操作符。例如，`range` 在这方面就很特殊。


    ### 探究 range 是什么


    ```python

    >>> import collections

    >>> r = range(1_000_000_000_000) # ❶

    >>> isinstance(r, collections.abc.Collection)

    True

    >>> r[:10] # ❷

    range(0, 10)

    >>> r[999_999_999_990:]

    range(999999999990, 1000000000000)

    >>> f"{r[999_999_999_990:][5]:,}" # ❷

    ''999,999,999,995''

    ```


    ❶ 表面上看，这是一个非常大的集合；实际上，它是一个非常紧凑的表示，并不真正*包含*一万亿个整数，只包含范围的端点和步长。

    ❷ `range` 对象的实现中存在许多巧妙的快捷方式，通常会产生我们“预期”的结果。


    `range` 的巧妙之处在于，即使它在许多方面类似于列表，也不需要对其元素进行线性搜索。`range` 对象在大多数方面表现得像一个已实现的列表，但只是在合成意义上*包含*任何东西。换句话说，`range(start,
    stop, step)` 有一个类似于其调用签名的内部表示，切片或成员测试等操作是通过几次算术运算计算出来的。例如，`n in my_range` 可以简单地检查
    *start ≤ n < stop* 以及 *(n - start) % step = 0*。


    ### 计时 range 的效率


    ```python

    >>> %timeit 10 in r

    54 ns ± 0.85 ns per loop (mean ± std. dev. of 7 runs, 10,000,000 loops each)

    >>> %timeit 999_999_999_995 in r

    77 ns ± 0.172 ns per loop (mean ± std. dev. of 7 runs, 10,000,000 loops each)

    ```


    检查靠近范围“起始”位置的元素的成员资格所需的时间，与检查靠近“结束”位置的元素几乎相同，因为 Python 实际上并没有*搜索*成员。


    列表是元素的具体且有序的集合，可以非常快速地追加，并且还有一些其他的内部优化。然而，我们必须注意*有序*部分可能带来的问题。判断一个元素是否包含在列表中的唯一通用方法是对列表进行线性搜索。我们可能直到搜索接近尾声时才能找到它，如果它不在列表中，我们将不得不搜索整个列表。


    > **注意 当你希望列表保持排序时**


    如果我们希望大大加快对那些我们愿意保持排序状态的列表（然而，并非我们所有的列表都如此）的搜索速度，可以使用标准库中的 bisect 模块。第三方库 sortedcontainers
    (https://grantjenks.com/docs/sortedcontainers/) 在我们可以接受上述约束时，也提供了类似的加速。


    通过一个简单的例子，我们可以看到在列表中检查包含性变得多么笨拙。我在自己的系统上保存了一份包含 267,752 个单词的 SOWPODS (https://en.wikipedia.org/wiki/Collins_Scrabble_Words)
    英文单词表。我们可以将其用作一个中等大小列表（在这种情况下是字符串列表）的示例。


    ### 搜索 SOWPODS 单词表


    ```python

    >>> words = [w.rstrip() for w in open(''data/sowpods'')]

    >>> len(words)

    267752

    >>> import random

    >>> random.seed(42)

    >>> most_words = random.sample(words, k=250_000)    # ❶

    >>> %timeit "zygote" in most_words

    2.8 ms ± 147 µs per loop (mean ± std. dev. of 7 runs, 100 loops each)

    >>> %timeit "zebra" in most_words

    200 µs ± 12.2 µs per loop (mean ± std. dev. of 7 runs, 1,000 loops each)

    >>> %timeit "aardvark" in most_words

    172 µs ± 776 ns per loop (mean ± std. dev. of 7 runs, 10,000 loops each)

    >>> %timeit "coalfish" in most_words

    10.7 ms ± 163 µs per loop (mean ± std. dev. of 7 runs, 100 loops each)

    ```


    ❶ 单词在随机抽样中是真正打乱的。


    我们可以看到，“aardvark”和“zebra”的搜索时间都相当适中，约为 200 微秒。为了显示 most_words 列表确实不是按字母顺序排列的，“zygote”的搜索时间超过了
    10 倍（但它被找到了）。


    然而，“coalfish”（完整词典中的一个真实单词，在林奈分类系统中与 pollock 密切相关）的搜索时间超过了 10 毫秒，因为它在抽样列表中从未被找到。


    对于一次性操作，10 毫秒可能还可以。但想象一下，我们想做一些稍微复杂一点的事情。这个例子有些人为，但在现实世界中，人们可以合理地想象需要比较人名或地址列表以检查重复程度——或者，例如，比较从土壤中随机抽样的核苷酸片段。


    ### 在一个集合中查找另一个集合中的单词


    ```python

    >>> random.seed(13)

    >>> some_words = random.sample(words, k=10_000)

    >>> sum(1 for word in some_words if word not in most_words)

    649

    >>> %timeit sum(1 for word in some_words if word not in most_words)

    55.2 s ± 1.26 s per loop (mean ± std. dev. of 7 runs, 1 loop each)

    ```


    这个简单操作花费整整一分钟是很糟糕的，而且情况会迅速恶化——大约以 O(N²) 的速率（准确地说，是 Ω(N×M)，因为对于特定数据，随着命中率下降，情况会变得更糟）。¹


    我们展示的是简洁且表面上直观的代码，它对 `some_words` 中的每个单词执行一次对 `most_words` 的线性扫描。也就是说，我们执行了 M
    次 O(N) 的扫描操作（其中 N 和 M 是各自列表的大小）。识别此类陷阱的一个快速线索是寻找表达式或代码块中多次出现的 `in` 关键字。无论是在 `if`
    表达式中还是在循环中，复杂度都是相似的。


    幸运的是，Python 通过使用集合为我们提供了一种非常高效的方式来解决这个问题。


    ### 高效地在一个集合中查找另一个集合中的单词


    ```python

    >>> len(set(some_words) - set(most_words))

    649

    >>> %timeit len(set(some_words) - set(most_words))

    43.3 ms ± 1.31 ms per loop (mean ± std. dev. of 7 runs, 10 loops each)

    ```


    这比 1000 倍的加速还要好。我们可以看到结果完全相同。即使假设我们需要具体查看这些单词在列表中的位置，而不仅仅是计数或查看它们是什么，649 次 `some_words.index(word)`
    操作与遇到的三个数量级的差异相比，也是*相对*廉价的（搜索较短的列表要快得多，而且通常我们在搜索到一半时就能找到不同的单词）。


    > 1. 所谓的大 O 表示法在计算机科学中常用于分析算法的复杂度。维基百科在 https://en.wikipedia.org/wiki/Big_O_notation
    上有很好的讨论。有多个符号用于表示渐近复杂度的略微不同的特征：O、o、Ω、ω 和 Θ。大 O 最常用，表示最坏情况行为；大 Θ 表示最坏情况和最佳情况的渐近线；大
    Ω 表示最佳情况行为。小 o 和小 ω 用于表达一个函数*支配*另一个函数而非*约束*另一个函数的稍微复杂的概念。


    > **注意 用于快速前缀搜索的 Trie 结构**


    如果讨论的具体问题确实接近你面临的问题，请考虑使用第三方模块 `pygtrie` (https://pypi.org/project/pygtrie/)，它可能会给你更快、更灵活的行为。对于描述的具体问题，`CharTrie`
    是你想要的类。一般来说，*trie* 数据结构 (https://en.wikipedia.org/wiki/Trie) 对于一类字符串搜索算法非常强大。


    ## 7.2 在列表中间删除或添加元素


    本书早期的讨论，在第 3 章《Python 陷阱集锦》中，涉及了在循环中天真地进行字符串连接可能遇到二次复杂度的问题。也就是说，执行 *N* 次操作所需的总时间和计算量是
    O(N²)。²


    尽管在许多情况下，（某些）字符串操作变慢的解决方案是简单地“改用列表”（也许最后再用 `"".join(thelist)` 来重新得到字符串），但列表本身也有非常相似的危险。这里的问题在于不理解列表的“廉价”和“昂贵”操作。具体来说，在列表末尾以外的任何位置插入或删除项目都是*昂贵*的。


    我们首先探讨 Python 中列表实现的一些细节，然后看看对于哪些实际用例，哪些其他数据结构是好的选择。


    Python 允许你从列表中的任何位置插入或删除项目，对于某些问题，这似乎是显而易见的方法。确实，对于相对较小的列表上的少数操作，轻微的低效完全不重要。


    2. *同上。*'
