  - "[PAGE 119]\n\nWhen producing each object yielded by an iterable is resource intensive—whether\
    \ requiring significant computation, significant I/O, or utilizing significant\
    \ memory—doing so once at a time makes for better programs. For example, programs\
    \ that don't crash with out-of-memory errors or take months to finish creating\
    \ a collection are better than those that do. For big data, being able to process\
    \ *one datum* now, and produce one partial result, is almost always better than\
    \ needing to produce only final aggregate collections. For time-sensitive data,\
    \ doing so is often a hard requirement (think of self-adjusting industrial equipment\
    \ or stock tickers, which are effectively infinite data streams).\n\nAs with other\
    \ features in this section, nothing you can do using the functions in the standard\
    \ library `itertools` module cannot be done without them. In fact, in the documentation\
    \ of the module (https://docs.python.org/3/library/itertools.html), every provided\
    \ function is accompanied by a sample (approximate) implementation in Python (often\
    \ the underlying CPython version is coded in C, and might behave subtly differently\
    \ in a few edge cases). The purpose of the functions in `itertools` is to provide\
    \ a kind of embedded language for working with infinite or very large iterators.\
    \ However, even though you *could* write each of the relatively few functions\
    \ in `itertools` yourself, most have pitfalls where a subtly wrong implementation\
    \ will wind up using large amounts of memory rather than remaining fully lazy.\n\
    \nThe documentation for `itertools` itself contains almost as many recipes as\
    \ there are functions within the module. Each of these is only a handful of lines\
    \ (often fewer than five), but combines the building blocks of the module in the\
    \ *right way* rather than getting some subtlety wrong that might break edge cases\
    \ or result in bad big-O behavior.\n\n# Reading FASTA\n\nLet's look at a small\
    \ program that uses iterators, then we'll use `itertools` functions to combine\
    \ them. The FASTA format (https://www.ncbi.nlm.nih.gov/BLAST/fasta.shtml) is a\
    \ textual format used in bioinformatics to describe nucleotide or amino acid sequences.\
    \ Very often, a single file with an extension like `.fa`, `.fna`, `.fna`, or `.fasta`\
    \ will contain hundreds of thousands of sequences, each containing tens of thousands\
    \ of single-letter codes. For example, such a file might represent an analysis\
    \ of the genetic diversity in a milliliter of soil or seawater, with each record\
    \ describing a distinct bacterium species (diversity of microscopic organisms\
    \ is amazing).\n\nGenerator function to read a FASTA file incrementally\n\n```\n\
    from collections import namedtuple\nFASTA = namedtuple(\"FASTA\", \"Description\
    \ Sequence\")\n\ndef read_fasta(filename):\n    with open(filename) as fh:\n \
    \       line = next(fh)\n        if not line.startswith(\">\"):\n            raise\
    \ ValueError(\n                f\"{filename} does not appear to be in FASTA format\"\
    )\n```"
