    # Obtaining the Tools Used in This Book


    The Python programming language is Free Software that may be obtained at the official
    site of the Python Software Foundation (PSF). A variety of other entities have
    also created customized Python distributions with additional or different capabilities
    bundled with the same core programming language. These include many operating
    system vendors. Most Linux distributions bundle Python. macOS (formerly stylized
    in slightly different ways, such as “Mac OS X” and “OS X”) has included Python
    since 2001. It is available for Windows from the Microsoft Store.


    To obtain the PSF distribution of Python, go to https://www.python.org/downloads/.
    Versions are available for many operating systems and hardware platforms. To follow
    some of the examples within this book, using the IPython terminal-based REPL (https://ipython.org/install.html)
    or Jupyter notebooks (https://docs.jupyter.org/en/latest/install.html) is advisable.
    These enhanced interactive environments support “magics,” such as `%timeit`, that
    are special commands not contained in the Python language itself, but which can
    improve interactive exploration. Throughout the book, when interactive sessions
    are shown, they can be easily identified by a leading `>>>` for initial lines
    and leading `...` for continuation lines (when present). However, Jupyter—as well
    as the interactive shells in many integrated development environments (IDEs) or
    sophisticated code editors—mark code entered and results produced by other visual
    indicators. The enhanced REPLs mentioned also support adding a single or double
    `?` at the end of a Python name to display information about the object it refers
    to; this is used in some examples.


    I personally use Miniconda (https://docs.conda.io/en/latest/miniconda.html) as
    a means of installing Python, IPython, Jupyter, and many other tools and libraries.
    Miniconda itself contains a version of Python, but will also allow creation of
    *environments* with different versions of Python, or indeed without Python at
    all, but rather other useful tools. You will see hints in some examples about
    my choice of installation, but nothing in the book depends on you following my
    choice.'
