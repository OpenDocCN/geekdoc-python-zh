  - '[PAGE 138]


    # Note The guts of a metaclass


    Usually, when you create a class in Python, what you are doing “behind the scenes”
    is calling the constructor `type()`. For example, here is a subclass of tuple
    (which needs to use `__new__()` rather than `__init__()` because immutable tuples
    cannot be modified during initialization, when the instance already exists):


    ```

    >>> from math import sqrt

    >>> class Point2d(tuple):

    ...     def __new__(self, x, y):

    ...         return tuple.__new__(self, (x, y))

    ...

    ...     def distance(self):

    ...         return sqrt(self[0]**2 + self[1]**2)

    ...

    >>> point = Point2d(3, 4)

    >>> point

    (3, 4)

    >>> point.distance()

    5.0

    >>> point.__class__.__name__

    ''Point2d''

    ```


    The very useful `collections.namedtuple` creates dynamically generated classes
    similar to `Point2d`. We *could* write this instead:


    ```

    >>> Point2d = type("Point2d", (tuple,),

    ...              {"__new__": lambda self, x, y:

    ...                  tuple.__new__(self, (x, y)),

    ...               "distance": lambda self:

    ...                  sqrt(self[0]**2 + self[1]**2)})

    >>> point = Point2d(3, 4)

    >>> point.distance()

    5.0

    >>> point.__class__.__name__

    ''Point2d''

    ```


    A metaclass is nothing but a class created using a subclass of `type` rather than
    `type` itself as the constructor of a class.² Or equivalently, every class definition
    (in regular format) could contain `metaclass=type` and retain the default behavior.


    2. To be very pedantic, a metaclass does not strictly need to be a subclass of
    `type`. In principle, any callable that takes as arguments a name, a tuple of
    bases, and a dictionary of attributes/methods would work as a metaclass. This
    could even be a plain function if it returned a class object.'
  - "[PAGE 139]\n\n```\ndef register_plugin(cls):\n    logging.info(f\"Registering:\
    \ {cls.__name__} ...\")\n    return cls\n```\n\nAs used, we'd see something like\
    \ this (depending on the configuration of logging):\n\n```\n>>> @register_plugin\n\
    ... class TestClass: pass\nRegistering: TestClass ...\n```\n\nLikewise, if you\
    \ wanted to use inheritance, rather than using a metaclass, you could simply include\
    \ a logging `__new__()` within the `Plugin` class. But why isn't this simply a\
    \ minor style preference? Here's one of the numerous places where the fragility\
    \ of metaclasses comes out:\n\n```\n>>> class NullMeta(type):\n...     pass\n\
    ...\n>>> class NullBase(metaclass=NullMeta):\n...     pass\n...\n>>> class MyStuff(Plugin,\
    \ NullBase):\n...     pass\n...\nTraceback (most recent call last):\n  class MyStuff(Plugin,\
    \ NullBase):\nTypeError: metaclass conflict: the metaclass of a derived class\
    \ must\n    be a (non-strict) subclass of the metaclasses of all its bases\n```\n\
    \nThe error message is pretty good, but in essence the problem is that `Plugin`\
    \ and `NullBase` imply different metaclasses to be used for class creation (`PluginLoggerMeta`\
    \ and `NullMeta`, respectively), and Python cannot decide which one to use. There\
    \ is a solution in creating a custom metaclass descending from both metaclasses,\
    \ but this becomes thorny and arcane quickly.\n\nIf custom metaclasses become\
    \ commonplace in your code, conflicts during multiple inheritance become almost\
    \ inevitable. This is a danger that might be justified if it did something you\
    \ couldn't do otherwise. However, as shown earlier, class decorators are almost\
    \ always cleaner, more readable, and can accomplish either absolutely or very\
    \ nearly *everything* that custom metaclasses can."
  - "[PAGE 140]\n\n# # 5.2 Monkeypatching\n\nA powerful, and therefore easily misused,\
    \ capability in highly dynamic languages like Python is that they allow *monkeypatching*.\
    \ With monkeypatching, even existing modules and classes can be modified at runtime\
    \ to exhibit different behaviors that might be better specialized for the needs\
    \ of a specific project.\n\nThe programming language Ruby is, in many ways, quite\
    \ similar to Python. It is even more dynamic, so a few things that are difficult\
    \ to impossible to monkeypatch in Python are easy in Ruby (mainly the possibility\
    \ of dynamically altering even built-in types, which Python does not allow). Partially\
    \ as a consequence of such broad power, monkeypatching became much more deeply\
    \ incorporated into Ruby's culture than it has in Python. In turn, this cultural\
    \ trend also largely became seen as an antipattern among Ruby developers; however,\
    \ a great deal of code (such as Ruby's biggest mover, the Rails web framework)\
    \ included monkeypatching that could not be removed without breaking backward\
    \ compatibility.\n\nAn influential article in that ecosystem was Avdi Grimm's\
    \ 2008 \"Monkey Patching Is Destroying Ruby\" (https://avdi.codes/why-monkeypatching-is-destroying-ruby/).\
    \ You can tell from the date that this discussion is not new. In fact, Grimm acknowledges\
    \ Python as the source of the term, and a predecessor language in allowing it.\n\
    \nAlready in 2008, monkeypatching was well-known in Python, but not especially\
    \ widely used. In 2023, as I write this, that characterization remains true. You\
    \ might certainly encounter Python code that uses monkeypatching, but only moderately\
    \ often. Deciding to use monkeypatching in your own code is *usually* a mistake,\
    \ but not *always*. Classes, instances, source code itself, and a few other objects\
    \ can be monkeypatched in Python. For this example, though, I will present the\
    \ most common use of the technique: monkeypatching modules.\n\nFor a slightly\
    \ contrived example that nonetheless genuinely exemplifies the situations that\
    \ tend to motivate Python developers to monkeypatch, suppose you have an application\
    \ that processes CSV data that comes from a vendor. A sample data file might look\
    \ like this.\n\nData in file *accounts.csv*\n\n```\nBalance,AccountNum,Owner\n\
    2913.94,3850234082,Omar\n9102.53,0028382910,Sarita\n5181.32,8213593023,David\n\
    ...more rows...\n```\n\nYour application might look something like a more sophisticated\
    \ version of this:\n\n```\nimport re\nimport sys\n\ndef get_5k_balances(rows):\n\
    \    for row in rows:\n```"
