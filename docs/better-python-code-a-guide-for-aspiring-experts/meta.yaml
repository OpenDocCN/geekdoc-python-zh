    3. The floating point initializer loses precision before creating a Fraction.

    4. A string initializer produces the simplest exact fraction.


    # Trying to Maintain Precision


    We have seen that floating point numbers—under the hood—are always just imprecise
    fractions for the rational number we want. There *is* a good reason that floating
    point numbers are used so widely: Working precisely with rational numbers often
    grows resulting numerators and denominators unboundedly.


    As we combine various fractions with large least common denominators, the size
    of numerators and denominators grows, operations become slower, and more memory
    is consumed. Small examples we could show here using a handful of numbers will
    never become that bad; but real-world code that performs millions or billions
    of numeric operations can quickly become burdensomely sluggish. IEEE-754 is a
    reasonable compromise.⁷


    Although floating point approximations of rational numbers can easily have seemingly
    insanely large numerators and denominators, the `fractions.Fraction` class provides
    a rough and heuristic way to limit this at the cost of introducing its own kind
    of numeric error:


    ```

    >>> f"{0.3:.17f}" # ①

    ''0.29999999999999999''

    >>> Fraction(*(0.3).as_integer_ratio()) # ②

    Fraction(5404319552844595, 18014398509481984)

    >>> Fraction(*(0.3).as_integer_ratio()).limit_denominator(1000)

    Fraction(3, 10)

    >>> Fraction(*(0.3).as_integer_ratio()).limit_denominator(9)

    Fraction(2, 7)

    ```


    +   1. No precise representation of 0.3 is possible in base-2.

    2. It would be nice to obtain a much simpler Fraction(3, 10).


    Limiting the denominator manually can often produce the *result we want*. Unfortunately,
    there is no obvious or computable rule about exactly how much of a limitation
    we actually


    7. Posits and unums (https://en.wikipedia.org/wiki/Unum_(number_format)) are a
    proposed alternative machine representation for approximations of real numbers
    that in many ways use a finite number of bits more efficiently, and that can be
    hardware friendly. They have not yet been widely adopted, but it is possible they
    will be in the future.'
