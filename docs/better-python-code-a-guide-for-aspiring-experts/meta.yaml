    Rust 编写的，运行速度比其他检查工具快几个数量级。此外，Ruff 提供了类似于 Black 的自动格式化功能，但清理了许多 Black 未处理的问题。（然而，Black
    也清理了 Ruff 未处理的问题；它们是互补的。）


    在现代 Python 开发中，类型注解和类型检查工具已得到相对广泛的应用。其中最受欢迎的工具可能是 Mypy (http://mypy-lang.org/)、Pytype
