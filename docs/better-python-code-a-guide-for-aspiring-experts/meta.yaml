    # Chapter 2 Confusing Equality with Identity


    > **Note Interning commonly used immutable objects**


    As an optimization strategy, CPython (and other implementations) sometimes reuses
    the memory allocation for certain objects by treating them as pseudo-eternal.
    Most notably, *small integers* and *short strings* will often reuse the identical
    objects to refer to equal objects that go by different names.


    The specific details of when this happens are implementation and version dependent,
    and you should never rely on such behavior within your programs. They merely might
    go faster as a result of these optimizations. For example, CPython and PyPy take
    very different approaches to “interning” but no well-written programs will notice
    this implementation difference.


    # Integer interning


    ```

    >>> a = 5

    >>> b = 2 + 3

    >>> a == b, a is b

    (True, True)

    >>> c = 1_000_000

    >>> d = 999_999 + 1

    >>> c == d, c is d

    (True, False)

    ```


    # String interning


    ```

    >>> e = "foobar"

    >>> f = "foo" + "bar"

    >>> e == f, e is f

    (True, True)

    >>> g = "flimflam"

    >>> h = ".join(["flim", "flam"])

    >>> g == h, g is h

    (True, False)

    ```


    However, Python *binds by name* in this circumstance, rather than binding by value.
    The value eventually utilized is the *final* value a variable takes on at the
    time the closure function is eventually called.


    Surprising behavior of functions created as closures


    ```

    >>> def make_adders(addends):

    ...     funcs = []

    ...     for addend in addends:

    ...         funcs.append(lambda x: x + addend)    # ❶

    ...     return funcs

    ...

    ```'
