  md: "This approach is very helpful in working independently of the length of the\
    \ several streams of data, merely enforcing that they are the same. And it is\
    \ very much a “fail fast” approach, which is almost universally desirable.\n\n\
    However, there are likewise definitely situations where imputing sentinel values\
    \ for missing data is more appropriate. A *sentinel* is a special value that can\
    \ mark a “special” situation for a data point. A very common sentinel, in many\
    \ contexts, is `None`. Sometimes you might use a value like -1 as a sentinel to\
    \ indicate that “normal” values are positive. At other times, you might include\
    \ a defined name like `my_sentinel = object()` to guarantee that this value is\
    \ distinct from everything else in your program. Filling in imputed values is\
    \ easy with `zip_longest()`.\n\nUsing `itertools.zip_longest()` to impute missing\
    \ data\n\n```\n>>> from itertools import zip_longest\n>>> stations = []\n>>> with\
    \ (\n...     open(\"station-names.txt\") as names,\n...     open(\"station-lattrunc.txt\"\
    ) as lats,\n...     open(\"station-longitudes.txt\") as lons,\n...     open(\"\
    station-elevations.txt\") as els,\n... ):\n...     for datum in zip_longest(\n\
    ...             names, lats, lons, els, fillvalue=\"-1\"):\n...         datum\
    \ = (d.rstrip() for d in datum)\n...         stations.append(Station(*datum))\n\
