- md: "## 8.4 Use SSL/TLS for Microservices\n\nUsing Transport Layer Security is very\
    \ important for communication over HTTP(S), but is often omitted during local\
    \ development and/or with a false confidence that firewalls around locally connected\
    \ server nodes suffice for security.\n\nTransport Layer Security (TLS) is a cryptographic\
    \ protocol that provides communications security over a computer network. The\
    \ protocol allows client/server applications to communicate in a way that is designed\
    \ to prevent eavesdropping, tampering, or message forgery. TLS supersedes the\
    \ now-deprecated SSL (Secure Sockets Layer).\n\nA great deal of Python software\
    \ is now written as “microservices,” also often called “web service.” The choice\
    \ of name often, but not consistently, reflects how limited the functionality\
    \ of a particular server is intended to be.\n\nIn a typical arrangement, a small\
    \ number of endpoints are created using a RESTful web server (https://en.wikipedia.org/wiki/Representational_state_transfer).\
    \ Many such servers can run, and provide services to each other, with general\
    \ independence from the particular hosting approach. Very often cloud hosting\
    \ providers (e.g., AWS, GCP, or Azure) and/or container orchestration systems\
    \ (e.g., Docker Swarm or Kubernetes) are used in production, often with arrangements\
    \ for demand scaling, load balancing, and other related capabilities.\n\nTypically,\
    \ Python web services are written in Flask (https://flask.palletsprojects.com/)\
    \ or FastAPI (https://fastapi.tiangolo.com/), which are both very lightweight,\
    \ and more or less designed around microservices. The heavyweight web framework,\
    \ Django, has a side project, Django REST framework (https://www.django-rest-framework.org/),\
    \ as well.\n\nAs a toy example of a web service, I wrote this Flask application.\n\
    \nSource code of HelloServer.py\n\n```python\n# pip install flask[async]\nfrom\
    \ flask import Flask\n\napp = Flask(__name__)\n\n@app.route(\"/\")\nasync def\
    \ hello_world():\n    return \"<p>Hello, World!</p>\"\n```\n\n❶ To enable async\
    \ routes, I installed with `pip install flask[async]`.\n\nWhen launched locally,\
    \ in development mode, we see:\n\n```\n[code]$ flask --app HelloServer run\n*\
    \ Serving Flask app 'HelloServer'\n* Debug mode: off\nWARNING: This is a development\
    \ server. Do not use it in a production deployment. Use a production WSGI server\
    \ instead.\n* Running on http://127.0.0.1:5000\nPress CTRL+C to quit\n```\n\n\
    Read the Flask documentation for details on how to launch using a robust WSGI\
    \ server. You can also modify IP addresses and ports exposed. The key point for\
    \ this mistake is that we only published an `http://` route by launching this\
    \ way.\n\nWe can access the data this server provides from within the same localhost,\
    \ for example:\n\n```python\n>>> import requests\n>>> resp = requests.get(\"http://127.0.0.1:5000\"\
    )\n>>> resp.text\n'<p>Hello, World!</p>'\n```\n\nHowever, I am not entirely secure\
    \ in the belief that this server might not be accessed externally via exposed\
    \ ports on my system (or on the hosting Docker image, for example). It would be\
    \ better only to provide the data from this server over an encrypted TLS channel.\n\
    \nObtaining and installing SSL certificates is a somewhat cumbersome task. The\
    \ availability of the community project Let's Encrypt (https://letsencrypt.org/)\
    \ or commercial company Cloudflare's free SSL/TLS, even on free accounts (https://www.cloudflare.com/ssl/),\
    \ makes this somewhat easier. However, your employer or project is likely to have\
    \ its own certificate creation and distribution system, which you should, obviously,\
    \ follow for production.\n\nFortunately, for local development and testing purposes,\
    \ using ad hoc certificates is very simple (but not ideal; we will improve that\
    \ shortly):\n\n```\n[code]$ pip install pyopenssl\n# messages about installation\
    \ progress\n[code]$ flask --app HelloServer run --cert=adhoc\n * Serving Flask\
    \ app 'HelloServer'\n [...]\n * Running on https://127.0.0.1:5000\nPress CTRL+C\
    \ to quit\n```\n\nAt this point, no `http://` route has been created. We can try\
    \ connecting again, to both the TLS and the unencrypted channel.\n\nConnecting\
    \ to ad hoc SSL certified route\n\n```python\n>>> import requests\n>>> resp =\
    \ requests.get('https://127.0.0.1:5000', verify=False)\nInsecureRequestWarning:\
    \ Unverified HTTPS request is being made to host '127.0.0.1'. Adding certificate\
    \ verification is strongly advised.\n>>> resp.text\n'<p>Hello, World!</p>'\n\n\
    >>> try:\n...     resp = requests.get(\"http://127.0.0.1:5000\", verify=False)\n\
    ... except Exception as err:\n...     print(err)\n...\n('Connection aborted.',\n\
    ConnectionResetError(104, 'Connection reset by peer'))\n```\n\nThe connection\
    \ to the unencrypted route is simply refused. The unverified certificate settles\
    \ for a warning, but still provides its data. However, it would be best to heed\
    \ this warning. Doing so is not difficult. You will need openssl installed (https://www.openssl.org/).\n\
    \nGenerating a self-signed cert and using it in microservice\n\n```\n[code]$ openssl\
    \ req -x509 -newkey rsa:4096 -nodes \\\n            -out cert.pem -keyout key.pem\
    \ -days 365\n# ...shows key generation process...\nYou are about to be asked to\
    \ enter information that will be\nincorporated into your certificate request.\n\
    What you are about to enter is what is called a Distinguished\nName or a DN.\n\
    There are quite a few fields but you can leave some blank\nFor some fields there\
    \ will be a default value,\nIf you enter '.', the field will be left blank.\n\
    -----\nCountry Name (2 letter code) [AU]:US\nState or Province Name (full name)\
    \ [Some-State]:Maine\nLocality Name (eg, city) []:\nOrganization Name (eg, company)\
    \ [Internet Widgits]:KDM Training\nOrganizational Unit Name (eg, section) []:\n\
    Common Name (e.g. server FQDN or YOUR name) []:localhost\nEmail Address []:\n\n\
    [code]$ flask --app HelloServer run --cert=cert.pem --key=key.pem\n * Serving\
    \ Flask app 'HelloServer'\n [...]\n * Running on https://127.0.0.1:5000\nPress\
    \ CTRL+C to quit\n```\n\nWe are now able to connect to the local microservice,\
    \ but only using the specific domain name “localhost” and by pointing to the correct\
    \ `cert.pem`. We could have configured the FQDN as “127.0.0.1” instead if we wished,\
    \ but using the symbolic name is generally the recommended practice.\n\nConnecting\
    \ to generated self-signed certificate\n\n```python\n>>> resp = requests.get('https://localhost:5000',\n\
    ...                     verify=\"code/cert.pem\")\n```\n\n> **IMPORTANT** Transport\
    \ Layer Security is not authentication\n\nThe discussion in this mistake describes\
    \ the value and procedures for utilizing TLS/SSL. Using this means that *channels*\
    \ are protected against eavesdroppers.\n\nHowever, in this example, no mechanism\
    \ was created or described around using *authentication* for access. Anyone with\
    \ access to the IP address and port used in the example can access the demonstration\
    \ server. If we also wanted to require credentials for access, that would be a\
    \ separate discussion. All the web servers we mention can certainly do that, but\
    \ the specifics are not documented herein."
  mdcn: "## 8.4 为微服务使用 SSL/TLS\n\n在通过 HTTP(S) 进行通信时，使用传输层安全协议非常重要，但在本地开发过程中，或者出于对本地连接服务器节点周围防火墙足以保障安全的错误信心，这一环节常常被忽略。\n\
    \n传输层安全协议（TLS）是一种加密协议，旨在为计算机网络上的通信提供安全保障。该协议允许客户端/服务器应用程序以一种旨在防止窃听、篡改或消息伪造的方式进行通信。TLS\
    \ 取代了现已弃用的 SSL（安全套接字层）协议。\n\n目前大量的 Python 软件以“微服务”形式编写，也常被称为“Web 服务”。这种命名选择通常（但并非总是）反映了特定服务器的功能被设计得多么有限。\n\
    \n在典型的架构中，会使用 RESTful Web 服务器（https://en.wikipedia.org/wiki/Representational_state_transfer）创建少量端点。许多这样的服务器可以运行并相互提供服务，通常与特定的托管方式无关。在生产环境中，通常会使用云托管提供商（例如\
    \ AWS、GCP 或 Azure）和/或容器编排系统（例如 Docker Swarm 或 Kubernetes），并常常配置需求扩展、负载均衡和其他相关功能。\n\
    \n通常，Python Web 服务使用 Flask（https://flask.palletsprojects.com/）或 FastAPI（https://fastapi.tiangolo.com/）编写，两者都非常轻量级，并且或多或少是围绕微服务设计的。重量级的\
    \ Web 框架 Django 也有一个附属项目 Django REST framework（https://www.django-rest-framework.org/）。\n\
    \n作为一个 Web 服务的简单示例，我编写了这个 Flask 应用程序。\n\nHelloServer.py 源代码\n\n```python\n# pip\
    \ install flask[async]\nfrom flask import Flask\n\napp = Flask(__name__)\n\n@app.route(\"\
    /\")\nasync def hello_world():\n    return \"<p>Hello, World!</p>\"\n```\n\n❶\
    \ 为了启用异步路由，我使用 `pip install flask[async]` 进行了安装。\n\n在本地以开发模式启动时，我们看到：\n\n```\n\
    [code]$ flask --app HelloServer run\n* Serving Flask app 'HelloServer'\n* Debug\
    \ mode: off\nWARNING: This is a development server. Do not use it in a production\
    \ deployment. Use a production WSGI server instead.\n* Running on http://127.0.0.1:5000\n\
    Press CTRL+C to quit\n```\n\n有关如何使用健壮的 WSGI 服务器启动的详细信息，请参阅 Flask 文档。你也可以修改暴露的\
    \ IP 地址和端口。这个错误的关键点在于，通过这种方式启动，我们只发布了一个 `http://` 路由。\n\n我们可以从同一个本地主机访问此服务器提供的数据，例如：\n\
    \n```python\n>>> import requests\n>>> resp = requests.get(\"http://127.0.0.1:5000\"\
    )\n>>> resp.text\n'<p>Hello, World!</p>'\n```\n\n然而，我并不完全确信这台服务器不会通过我系统上暴露的端口（或例如托管的\
    \ Docker 镜像上的端口）被外部访问。最好只通过加密的 TLS 通道从此服务器提供数据。\n\n获取和安装 SSL 证书是一项有些繁琐的任务。社区项目\
    \ Let's Encrypt（https://letsencrypt.org/）或商业公司 Cloudflare 提供的免费 SSL/TLS（即使在免费账户上也可用）（https://www.cloudflare.com/ssl/）使得这项任务变得相对容易一些。但是，你的雇主或项目很可能拥有自己的证书创建和分发系统，对于生产环境，你显然应该遵循该系统。\n\
    \n幸运的是，对于本地开发和测试目的，使用临时证书非常简单（但不理想；我们稍后会改进）：\n\n```\n[code]$ pip install pyopenssl\n\
    # 关于安装进度的消息\n[code]$ flask --app HelloServer run --cert=adhoc\n * Serving Flask\
    \ app 'HelloServer'\n [...]\n * Running on https://127.0.0.1:5000\nPress CTRL+C\
    \ to quit\n```\n\n此时，没有创建 `http://` 路由。我们可以尝试再次连接，分别连接到 TLS 和未加密的通道。\n\n连接到临时\
    \ SSL 认证的路由\n\n```python\n>>> import requests\n>>> resp = requests.get('https://127.0.0.1:5000',\
    \ verify=False)\nInsecureRequestWarning: Unverified HTTPS request is being made\
    \ to host '127.0.0.1'. Adding certificate verification is strongly advised.\n\
    >>> resp.text\n'<p>Hello, World!</p>'\n\n>>> try:\n...     resp = requests.get(\"\
    http://127.0.0.1:5000\", verify=False)\n... except Exception as err:\n...    \
    \ print(err)\n...\n('Connection aborted.',\nConnectionResetError(104, 'Connection\
    \ reset by peer'))\n```\n\n对未加密路由的连接被直接拒绝。未验证的证书只会产生一个警告，但仍然提供其数据。然而，最好还是注意这个警告。这样做并不困难。你需要安装\
    \ openssl（https://www.openssl.org/）。\n\n生成自签名证书并在微服务中使用\n\n```\n[code]$ openssl\
    \ req -x509 -newkey rsa:4096 -nodes \\\n            -out cert.pem -keyout key.pem\
    \ -days 365\n# ...显示密钥生成过程...\nYou are about to be asked to enter information\
    \ that will be\nincorporated into your certificate request.\nWhat you are about\
    \ to enter is what is called a Distinguished\nName or a DN.\nThere are quite a\
    \ few fields but you can leave some blank\nFor some fields there will be a default\
    \ value,\nIf you enter '.', the field will be left blank.\n-----\nCountry Name\
    \ (2 letter code) [AU]:US\nState or Province Name (full name) [Some-State]:Maine\n\
    Locality Name (eg, city) []:\nOrganization Name (eg, company) [Internet Widgits]:KDM\
    \ Training\nOrganizational Unit Name (eg, section) []:\nCommon Name (e.g. server\
    \ FQDN or YOUR name) []:localhost\nEmail Address []:\n\n[code]$ flask --app HelloServer\
    \ run --cert=cert.pem --key=key.pem\n * Serving Flask app 'HelloServer'\n [...]\n\
    \ * Running on https://127.0.0.1:5000\nPress CTRL+C to quit\n```\n\n我们现在能够连接到本地微服务，但只能使用特定的域名“localhost”并指向正确的\
    \ `cert.pem`。如果我们愿意，也可以将 FQDN 配置为“127.0.0.1”，但使用符号名称通常是推荐的做法。\n\n连接到生成的自签名证书\n\
    \n```python\n>>> resp = requests.get('https://localhost:5000',\n...          \
    \           verify=\"code/cert.pem\")\n```\n\n> **重要提示** 传输层安全协议不是身份验证\n\n本错误中的讨论描述了利用\
    \ TLS/SSL 的价值和过程。使用此方法意味着*通道*受到保护，免受窃听。\n\n然而，在这个示例中，没有创建或描述任何围绕使用*身份验证*进行访问的机制。任何能够访问示例中使用的\
    \ IP 地址和端口的人都可以访问演示服务器。如果我们还希望要求访问凭证，那将是另一个讨论话题。我们提到的所有 Web 服务器当然都能做到这一点，但具体细节未在本文档中记录。"
