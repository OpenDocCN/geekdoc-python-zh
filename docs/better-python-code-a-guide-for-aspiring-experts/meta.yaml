  md: '# 3


    A Grab Bag of Python Gotchas


    This chapter looks at concerns one encounters—and mistakes one might often make—strictly
    within the Python language itself. Like the prior two chapters on respectively
    looping and equality versus identity, these discussions are about the core of
    the Python language. Later chapters look at less common language constructs, less
    used or more specialized standard library modules, and some very common third-party
    modules.


    While the discussions in this chapter are somewhat heterogeneous, they also address
    a few of the most failings real-world Python code encounters, in my experience.
    A fair number of the issues in this chapter reflect the use of habits developed
    for other programming languages that are less well suited to Python code.


    # 3.1 Naming Things


    As the famous saying goes:


    > There are two hard things in computer science: cache invalidation, naming things,
    and off-by-one errors.


    In this section, we will look at where naming can go wrong. The kinds of mistakes
    addressed in this section are somewhat heterogeneous, but all pertain in one way
    or another to ways that choosing names badly can either cause your programs to
    break outright, or at the least make them fragile, ugly, and unpythonic.


    # 3.1.1 Naming a File Identically to a Standard Library Module


    The mechanism Python uses for determining where to import modules from is fairly
    convoluted. There are a lot of options, to provide a lot of flexibility. Setting
    the environment variable PYTHONPATH can affect this. Use of virtual environments
    can affect this. Runtime manipulation of sys.path—including within imported modules
    themselves—can affect this. Use of _pth files can affect this. The -E, -I, -s,
    and -S command-line options can affect this.'
