    # 7.5.2 Back to Our Regularly Scheduled Mistake


    # The Method .setdefault()


    Of all the useful methods of dictionaries, the one I personally forget the most
    often is dict.setdefault(). I have written code like this embarrassingly often:


    ```

    >>> point = {"x": 3, "y": 4}

    >>> if ''color'' in point:

    ...     color = point["color"]

    ... else:

    ...     color = "lime green"

    ...     point["color"] = color

    ...

    >>> point

    {''x'': 3, ''y'': 4, ''color'': ''lime green''}

    ```


    All the while, I *should* have simply written:


    ```

    >>> point = {"x": 3, "y": 4}

    >>> color = point.setdefault("color", "lime green")

    >>> color

    ''lime green''

    >>> point

    {''x'': 3, ''y'': 4, ''color'': ''lime green''}

    >>> point.setdefault("color", "brick red")

    ''lime green''

    ```


    The first version works, but it uses five lines where one would be slightly faster
    and distinctly clearer.


    # The Method .update()


    The method dict.update() is useful to avoid writing:


    ```

    >>> from pprint import pprint

    >>> features = {

    ...     "shape": "rhombus",

    ...     "flavor": "vanilla",

    ...     "color": "brick red"}

    >>> for key, val in features.items():

    ...     point[key] = val

    ...

    >>> pprint(point)

    ```'
