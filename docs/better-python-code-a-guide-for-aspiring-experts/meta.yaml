    # 8.4 Use SSL/TLS for Microservices


    Using Transport Layer Security is very important for communication over HTTP(S),
    but is often omitted during local development and/or with a false confidence that
    firewalls around locally connected server nodes suffice for security.

    Transport Layer Security (TLS) is a cryptographic protocol that provides communications
    security over a computer network. The protocol allows client/server applications
    to communicate in a way that is designed to prevent eavesdropping, tampering,
    or message forgery. TLS supersedes the now-deprecated SSL (Secure Sockets Layer).

    A great deal of Python software is now written as “microservices,” also often
    called “web service.” The choice of name often, but not consistently, reflects
    how limited the functionality of a particular server is intended to be.

    In a typical arrangement, a small number of endpoints are created using a RESTful
    web server (https://en.wikipedia.org/wiki/Representational_state_transfer). Many
    such servers can run, and provide services to each other, with general independence
    from the particular hosting approach. Very often cloud hosting providers (e.g.,
    AWS, GCP, or Azure) and/or container orchestration systems (e.g., Docker Swarm
    or Kubernetes) are used in production, often with arrangements for demand scaling,
    load balancing, and other related capabilities.

    Typically, Python web services are written in Flask (https://flask.palletsprojects.com/)
    or FastAPI (https://fastapi.tiangolo.com/), which are both very lightweight, and
    more or'
