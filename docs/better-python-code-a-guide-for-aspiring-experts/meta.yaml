    In this chapter, we looked at a variety of “obvious” numeric operations that can
    go wrong, both within the *numeric domain* of floating point numbers and in other
    domains. There are numerous assumptions that developers tend to make about numbers—perhaps
    because we learned about how they should work in elementary school or middle school—that
    become less obvious when we write actual computer programs.'
