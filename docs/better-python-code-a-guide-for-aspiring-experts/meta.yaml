    Properties, or just direct attribute access, are always more clear and more beautiful.
    To some degree, the same can be said of the choice between LBYL and EAFP coding
    styles. I will confess that an attitude characterized by an old saying, “Exceptions
    are not that exceptional,” is not as clear a consensus among experienced Pythonistas
    as I think it should be. While I fall on one side of a possible divide, there
    are a great many situations where checking *everything* in advance is infeasible
    and fragile, and both local- and outer-scope exception handling are essential.


    The remaining mistakes here are first one of not taking advantage of a feature
    new to Python 3.10. Structural pattern matching with `match` and `case` is concise
    and expressive, and very often now just much more clear in expression of intent.
    It’s often a little bit faster than walls of `elif` clauses. The final mistake
    about backtracking in regular expressions is just tricky. Using regular expressions
    wisely, but moderately, is extremely powerful; not being aware of when they become
    dramatically slower is a lurking danger, but not one with a simple and categorical
    solution. The mistake discussion gives pointers on what to be conscious of when
    creating this potential hazard.


    ## 6 Picking the Right Data Structure


    This chapter hopes to save its readers from unnecessarily difficult code by drawing
    attention to a number of useful data structures that Python beginners, and even
    many advanced language users, may be unaware of or merely tend to forget. Four
    of these data structures are contained in the Python standard library, in `collections`,
    and another is in `dataclasses` (sort of—we’ll discuss that). The last mistake
    discussed looks at several additional, closely related, sequence (i.e., list-like)
    data structures that can sometimes be more efficient than lists. These are all
    built-ins or in standard library modules.


    This book’s longest discussion of mistakes comes in Chapter 7, *Misusing Data
    Structures*, in the section “Rolling Your Own Data Structures.” That more advanced
    mistake goes into a great many pros and cons of creating custom data structures.
    Until you’ve *considered* all the standard library collections discussed in this
    chapter, and also the third-party libraries sortedcontainers (https://grantjenks.com/docs/sortedcontainers/)
    and pyrsistent (https://pyrsistent.readthedocs.io/en/latest/), you are most certainly
    premature in creating your own custom data structures.


    Some of the discussions in this chapter—each about one particular data structure
    available in the Python standard library—are arranged a bit differently than other
    sections in this book. For each of them, a simple task using one of these simple
    data structures is shown; following that is the *mistake* represented by the longer,
    less readable, and sometimes notably slower code that would be needed to achieve
    the same goal without these data structures.


    ### 6.1 collections.defaultdict


    In the very ancient history of Python (before 2.7), `collections.defaultdict`
    was available but `collections.Counter` was not; the use case that Counter has
    addressed since 2010 was met with a recommendation of “use `defaultdict`.”


    Both of these collections are subclasses of `dict` that add specialized capabilities.
    A default dictionary is only narrowly specialized, and in that sense is more general
    than `collections.Counter`, `collections.OrderedDict`, or `collections.UserDict`.
    The latter two of these are worth reading about in the Python documentation (https://docs.python.org/3/library/collections.html),
    but this book does not specifically address them.


    The “mistake” fixed by using `defaultdict` is simply that of using a repetitive
    and overly verbose pattern that can be simplified. I often make this mistake of
    inelegance, and hence feel the reminder is worthwhile.


    When you work with plain dictionaries you often want to modify a mutable value
    associated with a key. But before you can perform that modification, you need
    to check whether the dictionary *has* the needed key in the first place. For example,
    let’s work with the SOWPODS wordlist used in various examples, and create a dictionary
    that maps first letters to a collection of words starting with that letter:


    ```

    >>> from random import choice, seed

    >>> from pathlib import Path

    >>> words = Path("data/sowpods").read_text().split()

    >>> seed("first-letter") # ❶

    >>> for _ in range(100):

    ...     word = choice(words)

    ...     first_letter = word[0]

    ...     if first_letter not in by_letter:

    ...         by_letter[first_letter] = set([word])

    ...     else:

    ...         by_letter[first_letter].add(word)

    ...

    >>> by_letter.get("g", set())

    set()

    >>> by_letter.get("r", set())

    {''repositories'', ''rotating'', ''resectional'', ''reflectometry''}

    ```


    ❶ A seed is used simply so readers can replicate specific choices.


    A similar pattern is also often used with `list` and `.append()`, and sometimes
    with other collections and their corresponding method for including more items.


    This pattern is perfectly workable, but is made better with `defaultdict`:


    ```

    >>> first_letter = defaultdict(set)

    >>> seed("first-letter")

    >>> by_letter = defaultdict(set)

    >>> for _ in range(100):

    ...     word = choice(words)

    ...     by_letter[word[0]].add(word)

    ...

    >>> by_letter[''g'']

    set()

    >>> by_letter[''r'']

    {''repositories'', ''rotating'', ''resectional'', ''reflectometry''}

    ```


    Not only collections can be used, but any callable. For example, recall the fanciful
    numerological function `word_number()` defined in Chapter 1, *Looping Over the
    Wrong Things*, in the section "(Rarely) Generate a List for Iteration." But here
    let''s pretend that this function is actually computationally expensive and we''d
    like to avoid running it more often than needed (`@functools.lru_cache` and `@functools.cache`
    decorators also provide a useful way of achieving this task):


    ```

    >>> def word_number(word):

    ...     magic = 0

    ...     for letter in word:

    ...         magic += 1 + ord(letter) - ord("a")

    ...     return magic

    ...

    >>> word_magic = defaultdict(lambda: "<unknown>")

    >>> word_magic["chillier"] = word_number("chillier")

    >>> word_magic["snicker"] = word_number("snicker")

    >>> word_magic["bonesetter"] = word_number("bonesetter")

    >>> word_magic["overboiled"]

    ''<unknown>''

    >>> word_magic["chillier"]

    76

    >>> word_magic

    defaultdict(<function <lambda> at 0x7fab522b9bc0>, {''chillier'': 76, ''snicker'':
    79, ''bonesetter'': 123, ''overboiled'': ''<unknown>''})

    ```


    In this particular example, however, we might want to go ahead and perform the
    calculation once to actually save the expensive calculation into the dictionary
    (the next example works with a regular `dict` as well):


    ```

    >>> word_magic.setdefault("sternitic", word_number("sternitic"))

    117

    >>> word_magic

    defaultdict(<function <lambda> at 0x7fab522b9bc0>, {''chillier'': 76, ''snicker'':
    79, ''bonesetter'': 123, ''overboiled'': ''<unknown>'', ''sternitic'': 117})

    >>> word_magic.setdefault("overboiled", word_number("sternitic"))

    ''<unknown>''

    ```


    Related to `defaultdict`, the standard, but largely overlooked, `dict.setdefault()`
    also provides a mechanism to retrieve a key if it exists, but set (and retrieve)
    it if it hadn''t'
