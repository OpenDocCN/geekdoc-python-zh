    \   print(f\"File {err.filename} does not exist\")\nexcept OSError as err:\n \
    \   # Superclass after PermissionError and FileNotFoundError\n    print(f\"Partial\
    \ results: {[f'{r:.3f}' for r in ratios]}\")\n    print(err)\nfinally:\n    try:\n\
    \        num_fh.close()\n        den_fh.close()\n    except NameError:\n     \
