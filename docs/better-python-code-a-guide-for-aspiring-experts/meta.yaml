  md: '# 9 Numeric Computation in Python


    Working with numbers is, of course, one of the most common things we do in programming
    languages. And yet, there are a great many ways that our numeric code can go subtly
    wrong. For larger scale and more intensive work with numbers, the third-party
    libraries NumPy and Pandas make a great many tasks easier and faster. Other important
    numeric libraries also exist, but those two are so widespread in the Python ecosystem
    as to merit independent discussion. Several such libraries are discussed briefly
    in the appendix, *Topics for Other Books*.


    While reaching out to “vectorized” or “unboxed” numeric libraries can often be
    useful,¹ we should and do perform much numeric computation in Python itself.


    Many of the mistakes we can make in working with numbers derive from subtle edge
    cases of the behavior of floating point numbers. In a general way, this class
    of issues applies just as much to the third-party libraries as it does to pure
    Python. In fact, three of the four mistakes discussed in the IEEE-754 section
    of this chapter apply almost identically to most programming languages other than
    Python, but remain concerns for Python developers, so are discussed here.


    Some mistakes Python developers can make relate to other kinds of *numeric domains*,
    perhaps with choosing the wrong one for a given task. The last two mistakes in
    this chapter touch on `decimal.Decimal` and `fractions.Fraction` and when those
    are good choices for numeric types.


