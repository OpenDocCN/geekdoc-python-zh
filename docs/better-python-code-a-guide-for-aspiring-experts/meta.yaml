    The code you run today in a circumstance where “`random` is fine” will probably
    be ported to an environment where it is not tomorrow.

    There are only a few functions in the **secrets** module. The most commonly used
    one generates tokens of arbitrary length in a few different formats:


    ```

    >>> secrets.token_bytes(12)

    b''\xe7wt\x96;\x829a\xc9\xbd\xe1\x94''

    >>> secrets.token_hex(20)

    ''b397afc44c9cac5dba7900ef615ad48dd351d7e3''

    >>> secrets.token_urlsafe(24)

    ''QYNBxUDVG04feQUyetyih8V5vKKyy8nQ''

    ```


    For security against brute-force attacks by state-level actors, a length of at
    least 32 is recommended. A few additional functions are available as well, specifically
    **secrets.choice()**, **secrets.randbelow()**, and **secrets.randbits()**, but
    not the full range of distributions and other types of pseudo-randomness that
    `random` provides.

    The very interesting **secrets.compare_digest()** is also present and will compare
    two string or byte values in constant time to avoid timing attacks. This situation
    is a very specific threat model, which only occasionally exists. That said, if
    you are comparing tokens rather than simply generic strings, there is no harm
    in using this function rather than a simple `==` just in case you’ve overlooked
    such an attack.


    > 5. See Roper’s “Cracking Random Number Generators - Part 3” at https://jazzy.id.au/2010/09/22/cracking_random_number_generators_part_3.html,
    and “Cracking Random Number Generators - Part 4” at https://jazzy.id.au/2010/09/25/cracking_random_number_generators_part_4.html.'
  - '[PAGE 220]


    # 8.1.2 Reproducible Random Distributions


    The preceding section could possibly have left readers with a mistaken impression,
    if read hastily. True randomness is a valuable feature for cryptographic and security
    concerns. However, for equally many *other* purposes, cryptographic randomness
    is specifically *not* what we want (and it is a mistake to use it).


    As well as offering a reasonably large number of random distributions, `random`
    has an essential feature that `secrets` in its nature never can: reproducibility.
    Distributions provided include `random.random()` (uniform over interval [0.0,
    1.0)); `random.uniform(a, b)` (uniform over interval [a, b)); `random.triangular()`,
    `random.betavariate()`, `random.expovariate()`, `random.gammavariate()`, `random.gauss()`,
    `random.lognormvariate()`, `random.vonmisesvariate()`, `random.paretovariate()`,
    and `random.weibullvariate()`. As well, `random` provides other useful selectors
    such as `random.randint()`, `random.randrange()`, `random.randbytes()`, `random.choice()`,
    `random.choices()`, and `random.sample()` (the last two varying by whether they
    are taken with or without replacement).


    The preceding paragraph listed a large number of distributions. Don''t worry if
    you don''t know what most of them do; those people who work in domains that need
    them understand why they need them. For a variety of scientific and numeric purposes,
    each of these is useful, and few are present in `secrets`. However, with algebraic
    manipulation, you could, in principle, obtain each of those numeric distributions
    from calls to, for example, `secrets.randbelow(a)`, which picks an integer uniformly
    from the interval [0, a).


    More fundamentally, `random` contains `random.seed()`, `random.setstate()`, and
    `random.getstate()`. This enables *reproducibility* of a sequence of random values.
    Here is an example.


    Reproducible random choice from SOWPODS wordlist


    ```

    >>> import random, secrets

    >>> words = [w.strip() for w in open(''data/sowpods'')]

    >>> random.seed(''reproducible-abc123'')

    >>> for _ in range(9_999_999):

    ...     random.choice(words)

    ...

    >>> random.choice(words)

    ''spekboom''

    >>> for _ in range(secrets.randbelow(1_000_000)):  # ①

    ...     random.choice(words)

    ...

    >>> random.choice(words)                          # ②

    ''remotivations''

    >>> random.seed(''reproducible-abc123'')

    >>> for _ in range(9_999_999):

    ```'
- md: "## Chapter 8 Security\n\nJust as a quick reminder, even though the preceding\
    \ example worked with `random.choice` from a wordlist, simply to create memorable\
    \ outputs, the same reproducibility and APIs work the same way when drawing from\
    \ any of the numeric distributions.\n\nPerhaps the most obvious need for “repeatable\
    \ randomness” is in creating unit tests or functional tests of our software. We\
    \ would like to ensure that our software—for example, a long-running web server—given\
    \ a particular sequence of inputs continues to behave the same way.\n\nFor 10\
    \ million inputs, we could probably save those in a data file without outrageous\
    \ waste on modern computers. But if it were 10 billion inputs, saving a sequence\
    \ of inputs is enormously wasteful when one seed of a few-character string, or\
    \ one state of 625 numbers, would suffice.\n\nAnother common related need is when\
    \ you have a complex process that you believe you can optimize, but want to ensure\
    \ that identical behavior is retained. As a contrived example, we have a function\
    \ `blackbox()` that takes a string and an iterable of integers as arguments, and\
    \ returns a permutation of that string. Again, for short iterables, simply saving\
    \ them as static data is fine, but for long ones repeatability is relevant.\n\n\
    Let’s run the existing implementation.\n\n### An inefficient but important `blackbox()`\
    \ function\n\n```python\nfrom typing import Iterable\n\ndef blackbox(s: str, nums:\
    \ Iterable[int]) -> str:\n    # some non-optimized computation\n    return new_s\n\
    ```\n\nObserving the behavior of `blackbox()` we find:\n\n```python\n>>> def test_sequence(seed=\"\
    abc\", count=10, floor=0, ceil=100):\n...     random.seed(seed)\n...     for _\
    \ in range(count):\n...         yield random.randint(floor, ceil)\n...\n>>> s\
    \ = \"Mary had a little lamb!\"\n>>> blackbox(s, [5, 9999, 34, -65, 4, 2])\n'Mryaa\
    \ hd a itltle lamb!'\n>>> blackbox(s, test_sequence(count=10_000_000))\n'aMt!r\
    \ ahbma i  letllyda'\n>>> %timeit blackbox(s, test_sequence(count=10_000_000))\n\
    28 s ± 195 ms per loop (mean ± std. dev. of 7 runs, 1 loop each)\n```\n\nWe could\
    \ create other test sequences of varying lengths, with varying seeds, and with\
    \ varying floor and ceiling of the integers produced. But across a reasonable\
    \ collection of such configurations, we would like our new `blackbox_fast()` function\
    \ to produce the same outputs as a previous slow implementation.\n\n### Examining\
    \ implementation of `blackbox_fast()`\n\n```python\n>>> blackbox_fast(s, [5, 9999,\
    \ 34, -65, 4, 2])\n'Mryaa hd a itltle lamb!'\n>>> (blackbox(s, test_sequence(count=10_000_000))\
    \ ==\n...     blackbox_fast(s, test_sequence(count=10_000_000)))\nTrue\n>>> (blackbox(s,\
    \ test_sequence(seed=\"xyz\", count=1_000_000)) ==\n...     blackbox_fast(s, test_sequence(seed=\"\
    xyz\", count=1_000_000)))\nTrue\n>>> (blackbox(s, test_sequence(count=1000, ceil=500))\
    \ ==\n...     blackbox_fast(s, test_sequence(count=1000, ceil=500)))\nTrue\n>>>\
    \ %timeit blackbox_fast(s, test_sequence(count=10_000_000))\n3.6 s ± 36 ms per\
    \ loop (mean ± std. dev. of 7 runs, 1 loop each)\n```\n\nWe can see that the new\
    \ implementation is considerably faster, while also remaining consistent in behavior\
    \ across our range of test cases. Constructing a collection of such tests over\
    \ large iterables would be impractical without “deterministic randomness.”\n\n\
    ## 8.2 Putting Passwords or Other Secrets in “Secure” Source Code\n\nFar too often,\
    \ I have seen password information included within the source code of project\
    \ files. Usually when this is done, developers have carelessly thought that in\
    \ their particular scenario, these source code files will not be directly exposed\
    \ to users, so this style does not matter.\n\nOften the systems in question are\
    \ web servers or other kinds of data servers, where in normal operation access\
    \ is only via URLs or other encapsulated mechanisms. The passwords in source code\
    \ are used to access additional resources, such as other websites or databases\
    \ protected by credentials. Such developers often try to reassure themselves by\
    \ asserting that the resource is itself inside a firewall zone or otherwise whitelist\
    \ the particular applications or servers making such requests.\n\nApproaching\
    \ secrets this way is *always* a bad idea, and is usually motivated by mere laziness\
    \ (although ignorance can certainly be at play as well). The assumptions you make\
    \ about underlying source code not being exposed to malicious actors almost inevitably\
    \ are proved wrong, through one mechanism or another. Sometimes that happens by\
    \ so-called “hackers” deliberately looking for exploits; probably even more often\
    \ it occurs simply because access to the source code is not well regulated within\
    \ version control systems, shared drives, backup storage, and so on.\n\nA typical\
    \ example of this mistake can resemble the following code. This example uses an\
    \ HTTPS request, but a very similar pattern would apply to a request using Python’s\
    \ DB-API to talk to a database that uses credentials.\n\n### Insecure and badly\
    \ designed credential storage\n\n```python\nimport requests\nfrom requests.auth\
    \ import HTTPBasicAuth\n\ndef get_other_data():\n    _username = \"DavidMertz\"\
    \n    _password = \"jNeyQIyE6@pR\"\n    _localservice1 = \"192.168.227.1\"\n \
    \   _localservice2 = \"192.168.227.2\"\n    _localservice3 = \"192.168.227.3\"\
    \n\n    for service in [_localservice1, _localservice2, _localservice3]:\n   \
    \     resp = requests.get(f\"https://{service}/latest-data\",\n              \
    \              auth = HTTPBasicAuth(_username,\n                             \
    \                   _password))\n        if resp.status_code == 200:\n       \
    \     data = process(resp.text)\n            break\n\n    return data\n```\n\n\
    The same general principles apply for passwords, tokens, session keys, or any\
    \ other information that should generally be kept secure.\n\nA first, and sometimes\
    \ adequate, approach is to store secrets in environment variables.\n\n### User\
    \ environment variables to store secrets semi-securely\n\n```python\nimport os\n\
    \ndef get_other_data():\n    _username = os.environ.get(\"LOCAL_SERVICE_USER\"\
    )\n    _password = os.environ.get(\"LOCAL_SERVICE_PASSWORD\")\n    _localservice1\
    \ = os.environ.get(\"LOCAL_SERVICE_ADDR_1\")\n    _localservice2 = os.environ.get(\"\
    LOCAL_SERVICE_ADDR_2\")\n    _localservice3 = os.environ.get(\"LOCAL_SERVICE_ADDR_3\"\
    )\n\n    # ... rest of code ...\n```\n\nThis becomes a vulnerability only if an\
    \ attacker can gain shell access, or equivalent, to a system where the code is\
    \ running. However, these secrets are visible in unencrypted form within an OS\
    \ shell. Developers (myself included) often lose track of which environment variables\
    \ were previously set, and thereby forget explicitly to unset them after an application\
    \ using them has terminated.\n\nA step better is to use the “dotenv” approach.\
    \ This style *does* keep secret information within a file on the filesystem, usually\
    \ with the special name `.env`. Specifically, this file"
