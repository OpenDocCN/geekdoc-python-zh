    provides an interesting `.rotate()` method that lists lack (also because they
    are inefficient there). Neither `deque` nor `list` is a “pure win,” but rather
    provides a trade-off. The complexity of some common operations is presented in
    Table 6.1.


    Table 6.1 Efficiency of common operations on deque and list.


    | Operation | deque | list |

    | :--- | :--- | :--- |

    | Indexing at a position (stuff[p]) | O(N) | O(1) |

    | Popping/appending item at left side | O(1) | O(N) |

    | Popping/appending item at right side | O(1) | O(1) amortized |

    | Inserting/deleting from middle | O(N) | O(N) |'
  - "[PAGE 164]\n\nFor this section and the few around it, I present the solution\
    \ (i.e., a Pythonic example) first, then the mistake.\n\n# 6.3.1 The Solution\n\
    \nAn example given in the Python documentation (https://docs.python.org/3/library/collections.html)\
    \ shows using a deque for a moving average. This is a good, simple case where\
    \ we'd like to be able to append to one end and pop from the other. Astute readers\
    \ will notice that for the narrow task of the script shown, we do not actually\
    \ need a collection at all; imagine, however, that other operations are also performed\
    \ within the script and that you hence need the concrete collection rather than\
    \ only the total.\n\nSource code of code/moving-average-deque\n\n```\n#!/usr/bin/env\
    \ python\nfrom sys import stdin, argv\nfrom collections import deque\n\nwindow\
    \ = int(argv[1]) if len(argv) > 1 else 5\nnums = deque()\n\n# Pre-populate deque\
    \ with first window of numbers\nfor n, num in zip(range(window), stdin):\n   \
    \ nums.append(int(num.rstrip()))\n\n# Calculate initial sum and mean\ntotal =\
    \ sum(nums)\nprint(total/window)\n\n# For each new number read, print the moving\
    \ average\nfor num in stdin:\n    total -= nums.popleft()\n    nums.append(int(num.rstrip()))\n\
    \    total += nums[-1]\n    print(total/window)\n```\n\nUsing this utility is\
    \ simple:\n\n```\n[BetterPython]$ echo \"4 6 2 1 3 10 11 35 32\" |\n    tr ' '\
    \ '\\n' |\n    moving-average-deque\n3.2\n4.4\n```"
- md: "## 6.3.2 The Mistake\n\nYou *could* implement this program using lists with\
    \ only a few characters' difference, and the utility would become dramatically\
    \ worse.\n\nSource code of code/moving-average-list\n\n```python\n#!/usr/bin/env\
    \ python\nfrom sys import stdin, argv\n\nwindow = int(argv[1]) if len(argv) >\
    \ 1 else 5\nnums = []\n\n# Pre-populate deque with first window of numbers\nfor\
    \ n, num in zip(range(window), stdin):\n    nums.append(int(num.rstrip()))\n\n\
    # Calculate initial sum and mean\ntotal = sum(nums)\nprint(total/window)\n\n#\
    \ For each new number read, print the moving average\nfor num in stdin:\n    total\
    \ -= nums.pop(0)\n    nums.append(int(num.rstrip()))\n    total += nums[-1]\n\
    \    print(total/window)\n```\n\nFor small inputs, this is not important, and\
    \ the behavior is the same:\n\n```\n[BetterPython]$ echo \"4 6 2 1 3 10 11 35\
    \ 32\" |\n            tr ' ' '\\n' |\n            moving-average-list\n3.2\n4.4\n\
    5.4\n12.0\n18.2\n```\n\nThe four-line script `numbers` is available at the book's\
    \ website, as is `moving-average-deque`. The argument to `numbers` is the number\
    \ of numbers in the [1, 1000] interval to generate randomly:\n\n```\n% numbers\
    \ 7 | moving-average-list\n510.0\n571.2\n670.8\n```\n\nHowever, looking at a larger\
    \ window and more data, we notice an important difference in the two implementations\
    \ of a moving average algorithm:\n\n```\n[BetterPython]$ time numbers 1_000_000\
    \ | # ❶\n    moving-average-deque 100_000 >/dev/null\n\nreal    0m0.869s\n\n[BetterPython]$\
    \ time numbers 1_000_000 |\n    moving-average-list 100_000 >/dev/null\n\nreal\
    \    0m18.025s\n```\n\n❶ The Unix-isms of `time` and `/dev/null` are incidental;\
    \ we just want to time the script, but don't care about output.\n\nIncreasing\
    \ efficiency by 20x is wonderful, of course. Along with it, though, we get thread\
    \ safety, which is very often important in a context of queues and stacks. When,\
    \ for example, we pop a value from a collection, a Python `list` does not guarantee\
    \ that two threads don't pop the same item, whereas a `deque` does. When you write\
    \ multithreaded code, you need to think carefully about whether the data structures\
    \ shared among threads enable deadlocks, race conditions, and other concurrency\
    \ pitfalls; picking the right data structure does not eliminate these concerns,\
    \ but picking the wrong one almost guarantees them. Broader concerns around concurrency\
    \ are outside the scope of this book, but the appendix, *Topics for Other Books*,\
    \ provides a very brief recap of the Python concurrency ecosystem.\n\n## 6.4 collections.ChainMap\n\
    \nThe lovely object `collections.ChainMap` is a sort of *virtual mapping*. It\
    \ provides an abstraction for looking through multiple dictionaries (or other\
    \ mappings) successively. When using a `ChainMap` we avoid needing to copy any\
    \ data and also avoid modification of the underlying dictionaries outside of the\
    \ proper context for doing so.\n\nFor this section, as with the last few, we will\
    \ look at a Python solution first, followed by the mistake it fixes.\n\n### 6.4.1\
    \ The Solution\n\nA common pattern for configuration options is to have multiple\
    \ dictionaries that could potentially contain information, with each overriding\
    \ a previous one according to the business logic of an application. Using ChainMap\
    \ we can accomplish exactly that:\n\n```python\n>>> from collections import ChainMap\n\
    >>> default = {\n...     \"timeout-secs\": 30,\n...     \"environment\": \"development\"\
    ,\n...     \"env-file\": \"/opt/.env-default\"\n... }\n>>> application = {\n...\
    \     \"timeout-secs\": 15,\n...     \"application-name\": \"FooBarMaker\",\n\
    ...     \"env-file\": \"/user/local/foobar/.env\"\n... }\n>>> user = {\n...  \
    \   \"timeout-secs\": 60,\n...     \"env-file\": \"/home/david/.env-foobar\",\n\
    ...     \"username\": \"David\"\n... }\n\n>>> settings = ChainMap(user, application,\
    \ default)\n>>> settings[\"timeout-secs\"]                    # ❶\n60\n>>> settings[\"\
    username\"]                        # ❷\n'David'\n>>> settings[\"environment\"\
    ]                     # ❸\n'development'\n>>> settings.get(\"application-name\"\
    , \"app\")    # ❹\n'FooBarMaker'\n>>> settings.get(\"session\", \"Unknown\") \
    \         # ❺\n'Unknown'\n```\n\n- ❶ First mapping provides the key, others ignored\n\
    - ❷ Only first mapping has the key\n- ❸ Last mapping has the key\n- ❹ Middle mapping\
    \ has the key, so return value\n- ❺ No mappings have the key, fall back to argument\n\
    \nThis becomes even more useful if some of the mappings might change at runtime.\
    \ For example:\n\n```python\n>>> user['username'] = \"Dr. Mertz\"\n>>> settings[\"\
    username\"]\n'Dr. Mertz'\n>>> user['application-name'] = \"DavidMaker\"\n>>> settings[\"\
    application-name\"]\n'DavidMaker'\n```\n\nThe mappings included in a `ChainMap`\
    \ are dynamically referenced. We can examine which they are:\n\n```python\n>>>\
    \ settings.maps\n[{'timeout-secs': 60, 'env-file': '/home/david/.env-foobar',\n\
    'username': 'Dr. Mertz', 'application-name': 'DavidMaker'},\n{'timeout-secs':\
    \ 15, 'application-name': 'FooBarMaker', 'env-file':\n'/user/local/foobar/.env'},\
    \ {'timeout_secs': 30, 'environment':\n'development', 'env-file': '/opt/.env-default'}]\n\
    ```\n\nThe method `collections.ChainMap.new_child()` also allows you to add additional\
    \ maps to the beginning of the search sequence. In principle, the `.maps` attribute\
    \ can be modified as well, but it is usually less clean to do so (creating a new\
    \ `ChainMap` is nearly free).\n\n### 6.4.2 The Mistake\n\nDoing what `ChainMap`\
    \ does “manually” is possible, but cumbersome. For example, we might write a function\
    \ to accomplish the same purpose:\n\n```python\ndef search_dicts(key, default,\
    \ *dicts):\n...     for dict_ in dicts:\n...         if key in dict_:\n...   \
    \          return dict_[key]\n...     return default\n...\n>>> search_dicts(\"\
    timeout-secs\", 120, user, application, default)\n60\n>>> search_dicts(\"environment\"\
    , \"prod\", user, application, default)\n'development'\n>>> search_dicts(\"session\"\
    , \"Unknown\", user, application, default)\n'Unknown'\n```\n\n- ❶ Located value\
    \ from user\n- 2. Located value from default\n- 3. Fall back to argument\n\nThis\
    \ isn't a large amount of code, but you need to call it each time, rather than\
    \ carrying the sequence of mappings around in a single object. Moreover, this\
    \ is effectively only `collections.ChainMap.get()` and not the full collection\
    \ of `dict`-like methods a `ChainMap` provides.\n\nWorse than a utility function\
    \ such as the one shown is manually updating dictionaries. For example, if we\
    \ were to do this, we would indeed get a mapping with the collection of values\
    \ we wish to use:\n\n```python\n>>> default.update(application)\n>>> default.update(user)\n\
    >>> default\n{'timeout-secs': 60, 'environment': 'development', 'env-file':\n\
    '/home/david/.env-foobar', 'application-name': 'DavidMaker',\n'username': 'Dr.\
    \ Mertz'}\n```\n\nHowever, after merging `application` and `user` into `default`,\
    \ we have lost a record of what might have earlier been inside `default` and what\
    \ might have been absent. For many applications, retaining that information is\
    \ valuable.\n\nOne might try to remedy this by using a brand-new name (assume\
    \ all the initial mappings are reset to the initial values shown earlier):\n\n\
    ```python\n>>> settings = default.copy()\n>>> settings is default\nFalse\n>>>\
    \ settings.update(application)\n>>> settings.update(user)\n>>> settings\n{'timeout-secs':\
    \ 60, 'environment': 'development', 'env-file':\n'/home/david/.env-foobar', 'application-name':\
    \ 'FooBarMaker',\n'username': 'David'}\n```\n\nThis is perhaps better than the\
    \ last mistaken version since `default` has its initial configuration maintained.\
    \ Still, if the application updates one or more of the collected mappings, that\
    \ is not reflected in `settings` unless we use the same few lines each time before\
    \ checking `settings`.\n\n## 6.5 Dataclasses and Namedtuples\n\nPython's standard\
    \ library includes two very useful data structures for storing \"records\" of\
    \ related data elements. The first is namedtuples, which under the hood are simply\
    \ subclasses of tuples, but with named fields. The second is dataclasses, which\
    \ are simply Python classes with many dunders and other useful behaviors generated\
    \ automatically in a concise way.\n\nThe things we can do with dataclasses and\
    \ namedtuples can also be accomplished with the built-in types `dict` and `tuple`.\
    \ Indeed, every `namedtuple` is simply a subclass of `tuple`, so it is genuinely\
    \ the same type. However, using datatypes that allow readers to frame code very\
    \ clearly as “records” improves readability and makes reasoning easier.\n\nVery\
    \ often, it is useful to work with a collection of data where each item has a\
    \ fixed collection of fields, but we work with many such items (comparing, sorting,\
    \ aggregating, etc.). Namedtuples and dataclasses have more parts than simple\
    \ scalars—such as `float`, `int`, `str`, or `decimal.Decimal` or other special\
    \ types—but are more similar to *datatypes* than to *data structures*. The most\
    \ obvious difference between the two types this section discusses is that dataclasses\
    \ are mutable while namedtuples are immutable.\n\nLet’s look at an example of\
    \ record-oriented data. We often encounter such data in relational database tables,\
    \ in CSV or fixed-width files, in formats like Apache Parquet or Apache Arrow,\
    \ in JSON serialized records, and elsewhere. For extensive numeric analysis especially,\
    \ a dataframe library such as Pandas or Polars is often useful. However, for this\
    \ discussion we remain in pure-Python land.\n\nThe standard library module `csv`\
    \ is often very useful for reading line-oriented, delimited textual data files.\
    \ Despite the acronym standing for “comma-separated values” the module is perfectly\
    \ happy to work with any delimiter you might have in your data files. The `csv`\
    \ module is especially useful when character escaping is needed (the delimiter,\
    \ and the escape and quoting characters themselves, have to be treated nonliterally).\
    \ For the example in this discussion, we avoid that concern, by stipulation and\
    \ by the actual format of the example file. In the archive for the book (https://gnosis.cx/better)\
    \ we have a file with some information on per-nation demographics:\n\n```\n[data]$\
    \ wc -l population-data.txt\n236 population-data.txt\n[data]$ head -5 population-data.txt\n\
    Name|Population|Pct_Change_2023|Net_Change|Density_km3|Area_km2\nChina|1,439,323,776|0.39|5,540,090|153|9,388,211\n\
    India|1,380,004,385|0.99|13,586,631|464|2,973,190\nUnited States|331,002,651|0.59|1,937,734|36|9,147,420\n\
    Indonesia|273,523,615|1.07|2,898,047|151|1,811,570\n```\n\n### 6.5.1 Using Namedtuples\n\
    \nEach line represents some sort of object with the various attributes on it,\
    \ and the collection of lines should live in a collection such as `list` or `set`\
    \ to perform group operations. Let’s try one approach using `collections.namedtuple`:\n\
    \n```python\n>>> from collections import namedtuple\n>>> from operator import\
    \ attrgetter\n```"
