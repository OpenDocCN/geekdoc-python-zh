- md: "# Better Python Code\n\nDavid Mertz\n\nForeword by Alex Martelli\n\n# Praise\
    \ for *Better Python Code*\n\n> “You’ll not just be aspiring to be an expert anymore\
    \ after practicing through *Better Python Code: A Guide for Aspiring Experts*,\
    \ you’ll be one of them! Learn from David Mertz, who’s been making experts through\
    \ his writing and training for the past 20 years.”\n—Iqbal Abdullahi, past Chair,\
    \ PyCon Asia Pacific, and past board member, PyCon Japan\n\n> “In *Better Python\
    \ Code: A Guide for Aspiring Experts*, David Mertz serves up bite-sized chapters\
    \ of Pythonic wisdom in this must-have addition to any serious Python programmer’s\
    \ collection. This book helps bridge the gap from beginner to advanced Python\
    \ user, but even the most seasoned Python programmer can up their game with Mertz’s\
    \ insight into the ins and outs of Python.”\n—Katrina Riehl, President, NumFOCUS\n\
    \n> “What separates ordinary coders from Python experts? It’s more than just knowing\
    \ best practices—it’s understanding the benefits and pitfalls of the many aspects\
    \ of Python, and knowing when and why to choose one approach over another. In\
    \ this book David draws on his more than 20 years of involvement in the Python\
    \ ecosystem and his experience as a Python author to make sure that the readers\
    \ understand both *what* to do and *why* in a wide variety of scenarios.”\n—Naomi\
    \ Ceder, past Chair, Python Software Foundation\n\n> “Like a Pythonic BBC, David\
    \ Mertz has been informing, entertaining, and educating the Python world for over\
    \ a quarter of a century, and he continues to do so here in his own pleasantly\
    \ readable style.”\n—Steve Holden, past Chair, Python Software Foundation\n\n\
    > “Being expert means someone with a lot of experience. David’s latest book provides\
    \ some important but common problems that folks generally learn only after spending\
    \ years of doing and fixing. I think this book will provide a much quicker way\
    \ to gather those important bits and help many folks across the world to become\
    \ better.”\n—Kushal Das, CPython Core Developer and Director, Python Software\
    \ Foundation\n\n> “This book is for everyone: from beginners, who want to avoid\
    \ hard-to-find bugs, all the way to experts looking to write more efficient code.\
    \ David Mertz has compiled a great set of useful idioms that will make your life\
    \ as a programmer easier and your users happier.”\n—Marc-André Lemburg, past Chair,\
    \ EuroPython, and past Director, Python Software Foundation\n\n# Better Python\
    \ Code\n\n# A Guide for Aspiring Experts\n\nDavid Mertz\n\nAddison-Wesley\nHoboken,\
    \ New Jersey\n\nCover image: StudioLondon/Shutterstock\nPython and the Python\
    \ Logo are trademarks of the Python Software Foundation.\nLinux® is the registered\
    \ trademark of Linus Torvalds in the U.S. and other countries.\nmacOS® is a trademark\
    \ of Apple Inc.\nMicrosoft Windows is a trademark of the Microsoft group of companies.\n\
    \nMany of the designations used by manufacturers and sellers to distinguish their\
    \ products are claimed as trademarks. Where those designations appear in this\
    \ book, and the publisher was aware of a trademark claim, the designations have\
    \ been printed with initial capital letters or in all capitals.\n\nThe author\
    \ and publisher have taken care in the preparation of this book, but make no expressed\
    \ or implied warranty of any kind and assume no responsibility for errors or omissions.\
    \ No liability is assumed for incidental or consequential damages in connection\
    \ with or arising out of the use of the information or programs contained herein.\n\
    \nFor information about buying this title in bulk quantities, or for special sales\
    \ opportunities (which may include electronic versions; custom cover designs;\
    \ and content particular to your business, training goals, marketing focus, or\
    \ branding interests), please contact our corporate sales department at corpsales@pearsoned.com\
    \ or (800) 382-3419.\n\nFor government sales inquiries, please contact governmentsales@pearsoned.com.\n\
    \nFor questions about sales outside the U.S., please contact intlcs@pearson.com.\n\
    \nVisit us on the Web: informit.com/aw\n\nLibrary of Congress Control Number:\
    \ 2023944574\n\nCopyright © 2024 Pearson Education, Inc.\n\nAll rights reserved.\
    \ This publication is protected by copyright, and permission must be obtained\
    \ from the publisher prior to any prohibited reproduction, storage in a retrieval\
    \ system, or transmission in any form or by any means, electronic, mechanical,\
    \ photocopying, recording, or likewise. For information regarding permissions,\
    \ request forms and the appropriate contacts within the Pearson Education Global\
    \ Rights & Permissions Department, please visit www.pearson.com/permissions.\n\
    \nISBN-13: 978-0-13-832094-2\nISBN-10: 0-13-832094-2\n\n$PrintCode\n\n# Pearson’s\
    \ Commitment to Diversity, Equity, and Inclusion\n\nPearson is dedicated to creating\
    \ bias-free content that reflects the diversity of all learners. We embrace the\
    \ many dimensions of diversity, including but not limited to race, ethnicity,\
    \ gender, socioeconomic status, ability, age, sexual orientation, and religious\
    \ or political beliefs.\n\nEducation is a powerful force for equity and change\
    \ in our world. It has the potential to deliver opportunities that improve lives\
    \ and enable economic mobility. As we work with authors to create content for\
    \ every product and service, we acknowledge our responsibility to demonstrate\
    \ inclusivity and incorporate diverse scholarship so that everyone can achieve\
    \ their potential through learning. As the world’s leading learning company, we\
    \ have a duty to help drive change and live up to our purpose to help more people\
    \ create a better life for themselves and to create a better world.\n\nOur ambition\
    \ is to purposefully contribute to a world where:\n\n- Everyone has an equitable\
    \ and lifelong opportunity to succeed through learning.\n- Our educational products\
    \ and services are inclusive and represent the rich diversity of learners.\n-\
    \ Our educational content accurately reflects the histories and experiences of\
    \ the learners we serve.\n- Our educational content prompts deeper discussions\
    \ with learners and motivates them to expand their own learning (and worldview).\n\
    \nWhile we work hard to present unbiased content, we want to hear from you about\
    \ any concerns or needs with this Pearson product so that we can investigate and\
    \ address them.\n\n- Please contact us with concerns about any potential bias\
    \ at https://www.pearson.com/report-bias.html.\n\nThis book is dedicated to my\
    \ mother, Gayle Mertz, who always valued ideas and the relentless criticism of\
    \ existing reality.\n\n# Contents\n\nForeword xvii\n\nPreface xix\n\nAcknowledgments\
    \ xxv\n\nAbout the Author xxvii\n\nIntroduction 1\n\n## 1 Looping Over the Wrong\
    \ Things 3\n\n- 1.1 (Rarely) Generate a List for Iteration 3\n- 1.2 Use enumerate()\
    \ Instead of Looping Over an Index 6\n- 1.3 Don't Iterate Over dict.keys() When\
    \ You Want dict.items() 8\n- 1.4 Mutating an Object During Iteration 9\n- 1.5\
    \ for Loops Are More Idiomatic Than while Loops 12\n- 1.6 The Walrus Operator\
    \ for \"Loop-and-a-Half\" Blocks 13\n- 1.7 zip() Simplifies Using Multiple Iterables\
    \ 15\n- 1.8 zip(strict=True) and itertools.zip_longest() 17\n- 1.9 Wrapping Up\
    \ 20\n\n## 2 Confusing Equality with Identity 21\n\n- 2.1 Late Binding of Closures\
    \ 21\n- 2.2 Overchecking for Boolean Values 25\n- 2.3 Comparing x == None 28\n\
    - 2.4 Misunderstanding Mutable Default Arguments 29\n  - 2.4.1 First Approach,\
    \ Use a Class 31\n  - 2.4.2 Second Approach, Use a None Sentinel 32\n  - 2.4.3\
    \ Third Approach, Take Advantage of Stateful Generators 32\n- 2.5 Copies versus\
    \ References to Mutable Objects 33\n- 2.6 Confusing is with == (in the Presence\
    \ of Interning) 35\n- 2.7 Wrapping Up 37\n\n## 3 A Grab Bag of Python Gotchas\
    \ 39\n\n- 3.1 Naming Things 39\n  - 3.1.1 Naming a File Identically to a Standard\
    \ Library Module 39\n  - 3.1.2 Avoid Using import * 42\n  - 3.1.3 Bare or Overly\
    \ Generic except Statements 46\n- 3.2 Quadratic Behavior of Naive String Concatenation\
    \ 52\n- 3.3 Use a Context Manager to Open a File 56\n  - 3.3.1 First Danger 57\n\
    \  - 3.3.2 Second Danger 58\n  - 3.3.3 Correcting the Fragility 58\n- 3.4 Optional\
    \ Argument key to .sort() and sorted() 59\n- 3.5 Use dict.get() for Uncertain\
    \ Keys 62\n- 3.6 Wrapping Up 64\n\n## 4 Advanced Python Usage 67\n\n- 4.1 Comparing\
    \ type(x) == type(y) 67\n- 4.2 Naming Things (Revisited) 71\n  - 4.2.1 Overriding\
    \ Names in Built-ins 71\n  - 4.2.2 Directly Accessing a Protected Attribute 75\n\
    - 4.3 Keep Less-Used Features in Mind 79\n  - 4.3.1 F-String Debugging 80\n  -\
    \ 4.3.2 The Elegant Magic of Decorators 83"
  mdcn: "# 更优的Python代码\n\nDavid Mertz\n\nAlex Martelli 作序\n\n# 对《更优的Python代码》的赞誉\n\
    \n> “通过实践《更优的Python代码：写给有志成为专家的指南》，你将不再只是渴望成为专家，而是真正成为他们中的一员！向David Mertz学习，他在过去20年里通过写作和培训培养了无数专家。”\n\
    —Iqbal Abdullahi，PyCon Asia Pacific 前主席，PyCon Japan 前董事会成员\n\n> “在《更优的Python代码：写给有志成为专家的指南》中，David\
    \ Mertz以简短精悍的章节，呈现了Python化的智慧，这是每位严肃的Python程序员必备的藏书。这本书有助于弥合从初学者到高级Python用户的鸿沟，但即使是最资深的Python程序员，也能从Mertz对Python方方面面的深刻见解中提升自己的水平。”\n\
    —Katrina Riehl，NumFOCUS 主席\n\n> “是什么将普通程序员与Python专家区分开来？这不仅仅是了解最佳实践——而是理解Python诸多方面的利弊，并知道何时以及为何选择一种方法而非另一种。在这本书中，David运用了他20多年参与Python生态系统的经验，以及他作为Python作家的经验，确保读者在各种场景下都能理解*该做什么*以及*为什么这么做*。”\n\
    —Naomi Ceder，Python Software Foundation 前主席\n\n> “就像一个Python化的BBC，David Mertz在超过四分之一个世纪的时间里，一直以他令人愉悦的可读风格，为Python世界提供信息、娱乐和教育，他在这里继续这样做。”\n\
    —Steve Holden，Python Software Foundation 前主席\n\n> “成为专家意味着拥有丰富的经验。David的最新著作提供了一些重要但常见的问题，这些问题通常只有在多年实践和修复后才能学到。我认为这本书将提供一种更快捷的方式来收集这些重要的知识点，并帮助世界各地的许多人变得更好。”\n\
    —Kushal Das，CPython 核心开发者，Python Software Foundation 董事\n\n> “这本书适合所有人：从希望避免难以发现的bug的初学者，到希望编写更高效代码的专家。David\
    \ Mertz汇编了一套非常有用的惯用法，将使你的程序员生活更轻松，让你的用户更满意。”\n—Marc-André Lemburg，EuroPython 前主席，Python\
    \ Software Foundation 前董事\n\n# 更优的Python代码\n\n# 写给有志成为专家的指南\n\nDavid Mertz\n\n\
    Addison-Wesley\nHoboken, New Jersey\n\n封面图片：StudioLondon/Shutterstock\nPython\
    \ 和 Python 徽标是 Python Software Foundation 的商标。\nLinux® 是 Linus Torvalds 在美国和其他国家的注册商标。\n\
