    \nIn this chapter, we looked at a somewhat heterogeneous collection of mistakes,\
    \ but still all within the domain we might call “generic Python concerns.” Later\
    \ chapters look at more specialized (but not less important) concerns with matters\
    \ such as testing, data structures, security, and numeric computing.\n\nTwo mistakes\
