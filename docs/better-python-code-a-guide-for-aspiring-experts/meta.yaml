    5.69 µs ± 176 ns per loop (mean ± std. dev. of 7 runs, 100,000 loops each)

    >>> %timeit lorem_ipsum(1000)

    548 µs ± 9.33 µs per loop (mean ± std. dev. of 7 runs, 1,000 loops each)

    >>> %timeit lorem_ipsum(100_000)

    57.2 ms ± 430 µs per loop (mean ± std. dev. of 7 runs, 10 loops each)

    ```


    Again, `io.StringIO` has the same linear scaling we are looking for, and is within
    a few percent of the same speed as the other approaches. Using streams might be
    just slightly slower in the simple case, but having a file-like object lets you
    do operations like `.seek()`, `.tell()`, and `.readlines()` that are often independently
    useful. Moreover, if you need to "scale up" to using an actual filesystem (for
