    to clarify behavior; I’ve never completely convinced the module’s main author.
    One approach is to introduce NaN propagation, the other is to introduce NaN stripping.
    Notably, these two approaches are the default behaviors of NumPy and Pandas, respectively
    (but varying from each other).


