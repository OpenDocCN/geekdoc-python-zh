  md: '# Appendix: Topics for Other Books


    There are, of course, many domains of Python programming in which you might make
    mistakes, or face trade-offs. Not all such topics can fit within this book, but
    those not touched on are not necessarily less important. For the most part, those
    topics not addressed are simply big enough to warrant their own full books.


    # A.1 Test-Driven Development


    Good software development practice should *always* include extensive tests. There
    is a great amount of detail, and sometimes subtlety, to how to do tests right.
    But the biggest mistake, and the far most common one I''ve seen in real-life codebases,
    is simply not to have tests at all. Only barely less bad than tests not existing
    is to have test suites that have not been maintained. It is always difficult and
    painful to encounter production code in which tests are only run occasionally
    and erratically, and developers just live with an assumption that most tests will
    fail. Usually when you see this, it is far from obvious which of the failing tests
    might once have succeeded, and which were never completed or functional in the
    first place.


    A good test suite should be a barrier placed before every code merge. Either upon
    every push, or upon every merge (at least to production branches), CI/CD (continuous
    integration/continuous development) tests should be run by automated means. For
    more time-consuming tests, scheduling them to be run nightly or weekly can also
    be appropriate; by all means, though, such tests should be required to run and
    pass before code can enter production use.


    Whether or not development is strictly TDD (test-driven development) is a subject
    of reasonable debate. However one comes down in that debate, developers should
    *always* simply assume that untested code is broken code. Of course, the advice
    of these few paragraphs applies equally to every programming language, and is
    not specific to Python.


    Within Python itself, my advice is to always use pytest (https://docs.pytest.org)
    rather than the standard library `unittest`. Pytest supports `unittest` suites
    in a backward-compatible way, provides an enormously better syntax and, more capabilities,
    and is simply'
  merge: -1
