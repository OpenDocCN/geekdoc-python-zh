    # 7.2 Deleting or Adding Elements to the Middle of a List


    An early discussion in this book, in Chapter 3, *A Grab Bag of Python Gotchas*,
    addresses how naive string concatenation within a loop might encounter quadratic
    complexity. That is to say, the overall time and computation needed to perform
    a sequence of *N* operations is O(N²).²


    Although in many situations the solution to a slowdown in (certain) string operations
    is to simply "use a list instead" (perhaps followed by a final `"".join(thelist)`
    to get back a string), lists have their own very similar danger. The problem here
    is in not understanding what is "cheap" and what is "expensive" for lists. Specifically,
    inserting or removing items from a list anywhere other than at the end is *expensive*.


    We first explore some details of exactly how lists are implemented in Python,
    then look at which other data structures would be good choices for which actual
    use cases.


    Python gives you the ability to insert or remove items from anywhere within a
    list, and for some problems it will seem like the obvious approach. Indeed, for
    a few operations on a relatively small list, the minor inefficiency is wholly
    unimportant.


