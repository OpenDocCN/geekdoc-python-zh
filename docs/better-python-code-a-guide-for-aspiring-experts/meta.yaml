    \  # ❷\n    collection = Collection()\n    for _ in range(n):\n        collection.insert(randint(0,\
    \ len(collection)), get_word())\n    return collection\n```\n\n- ❶ The `get_word()`\
    \ function available at this book's website is used in many examples. It simply\
    \ returns a different word each time it is called.\n- ❷ Using the same random\
