  md: '# Note Visualizing backtracking


    Understanding what regular expression engines are doing can certainly be confusing.
    In particular, NFAs (nondeterministic finite automata) that perform backtracking
    match in ways that are not immediately intuitive. Let''s look at a simpler and
    non-catastrophic example, step by step (in Figure 5.2).


    ![](img/260d2e810ee4666cb82be4957d5d9141_153_0.png)


    We might have a long number string that uses commas to separate at the thousands,
    millions, billions, etc., according to a Western convention of grouping by three
    digits. The pattern r"\d,\d+$" should satisfy this.


    In the illustration, characters and regex subpatterns that match appear underlined
    and with a green background. Characters and regex subpatterns that fail appear
    overlined and with a red background.


    In order to match, the regex engine scans forward to find a digit, then expects
    a comma to follow. When that fails, it abandons the partial match, and scans again
    for a later digit. Once it finds a digit-comma sequence, it looks for repeated
    digits. Initially, it finds a subsequence of the match, but fails when the end-of-string
    is not reached. So back to scanning for the initial digit again, *giving back*
    part of the match.


    Let''s think about what is happening in the number sequences example. Since the
    subpattern r"(.+)+" can actually match any characters, it first tries to match
    the entire string, then finding no lookahead of r"(?=9.)" it *backtracks* to consider
    a bit less. Perhaps after that backtracking, it finds that the next unmatched
    characters are "9.". If not, it tries backtracking more as the *one-or-more* quantifier
    allows taking fewer repetitions. However, after each backtracking, the pattern
    tries to search forward with more repetitions, keeping'
  merge: -1
