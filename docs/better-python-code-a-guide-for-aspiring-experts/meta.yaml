    # Cycles within Cycles of Confusion


    It is very hard to reconcile the virtual parentage of Python concrete numeric
    datatypes with what I learned in middle school algebra. Some of the fault can
    be assigned to IEEE-754 floating point numbers, the subject of numerous mistakes
    addressed in this book. However, even other numeric types without rounding errors
    suffer oddities as well. Moreover, we can wonder what happens when we perform
    an operation that combines different kinds of numbers.'
