    (https://flask.palletsprojects.com/en/2.2.x/) or FastAPI (https://fastapi.tiangolo.com/);
    and Pillow (PIL fork; https://pillow.readthedocs.io/en/stable/). Clearly, there
    are mistakes that could be made with all of these libraries as well; but they
    are outside the scope of this book.


    An element of `more-itertools` that makes me give it a special place is that it
    is really not limited to any specific domain, as the other mentioned third-party
    libraries are. Nearly everything you will do in Python might plausibly be made
    just a little bit clearer and a little bit easier by using functions from `more-itertools`.


    While I do not entirely object to Python programs that use `from itertools import
    *`, unfortunately I cannot write the same of `from more_itertools import *`. The
    functions therein are clearly well designed to work well together (and with those
