    Superficially, these four types of sequences seem similar. It took a while to
    run the loop to make sure they have equal elements, but indeed they do. A first
    notable difference among them is their memory usage. For the first three objects,
    we can ask about the memory usage in a simple way:


    ```python

    >>> import sys

    >>> f"{sys.getsizeof(rand_bytes):,}"

    ''536,870,945''

    >>> f"{sys.getsizeof(rand_bytearray):,}"

    ''536,870,969''

    >>> f"{sys.getsizeof(rand_array):,}"

    ''570,425,427''

    ```


    These sizes are not quite identical since their headers vary (and `array.array`
    uses a modest overallocation strategy, similar to `list`). However, all of these
    are close to the 536,870,912 bytes that are the minimal possible size to represent
    all of these random bytes.


    The question is somewhat more complicated for `rand_list`. Lists use a relatively
    aggressive overallocation of slots; but even apart from such overallocation of
    memory, each slot is a pointer to an internal data structure used to represent
    a Python integer. For byte-sized integers (i.e., between 0 and 255), this structure
    occupies 28 bytes. For larger integers or wider floating point numbers, the size
    of the *boxed number* increases somewhat, albeit slowly. In concept, a list of
    integers needs to contain *both* an array of pointer slots (probably 64-bit on
    modern systems), of roughly the length of the array, and *also*, at a different
    memory address, the underlying boxed number.


    However, this is further complicated in the current example by the fact that *small
    integers are interned* in CPython. This is discussed briefly at the start of Chapter
    2, *Confusing Equality with Identity*. It means that all the pointers to 8-bit
    integers have already been allocated when Python starts up, and these pointers
    are simply reused for repeating list slots. If we were working with larger numbers,
    we would have to multiply the number of (non-duplicated) items by the size of
    the boxed number, and add that to the size of the pointer array itself:


    ```python

    >>> sys.getsizeof(2)

    28

    >>> sys.getsizeof(2**31)

    32

    >>> sys.getsizeof(2**63)

    36

    >>> sys.getsizeof(2**200)

    52

    ```


    ```python

    >>> f"{sys.getsizeof(rand_list):,}"

    ''4,294,967,352''

    ```


    As a ballpark figure, the list version takes about 4 GiB, since 64-bit pointers
    are eight times as large as 8-bit numbers. If we were dealing with non-interned
    numbers, the memory story would lean much more heavily against `list`.


    Often much more important than memory usage is runtime:


    ```python

    >>> assert (rand_bytes.count(42) ==

    ...         rand_bytearray.count(42) ==

    ...         rand_array.count(42) ==

    ...         rand_list.count(42))

    >>> %timeit rand_bytes.count(42)

    178 ms ± 501 µs per loop (mean ± std. dev. of 7 runs, 10 loops each)

    >>> %timeit rand_bytearray.count(42)

    179 ms ± 1.49 ms per loop (mean ± std. dev. of 7 runs, 10 loops each)

    >>> %timeit rand_array.count(42)

    5.5 s ± 33.6 ms per loop (mean ± std. dev. of 7 runs, 1 loop each)

    >>> %timeit rand_list.count(42)

    4.88 s ± 17.3 ms per loop (mean ± std. dev. of 7 runs, 1 loop each)

    ```


    ❶ Sanity check that the counts will be identical


    It''s impressive how much faster counting on `bytes` or `bytearray` is than on
    `list`. It''s disappointing that the similar data structure `array.array` doesn''t
    achieve similar results (even coming in slightly worse than `list`). The reason
    for this is that in CPython, `array.array.count()` still uses the same indexing
    machinery as other pure-Python sequences. This has been a “known issue” in CPython
    since at least 2015 and Python 3.7—no core developers have felt it is one that
    needs to be fixed, however, since as soon as you start asking this question, the
    answer is *almost always* “use NumPy” (which solves an enormous number of other
    problems at the same time).


    Of course, the example only used 8-bit unsigned integers. If you wanted to store
    16-, 32-, or 64-bit signed or unsigned integers, or floating point numbers of
    system width (usually 64-bit nowadays), `bytearray` would clearly not be an option.
    Also, in these cases, `array.array` would pull modestly ahead of `list` because
    of interning. As a redemption for `array.array`, we can notice that it *is* still
    much faster than `list` in a range of other situations where we work with sequences
    of numbers of the same underlying machine type. For example:


    ```python

    >>> rand_arr2 = rand_array[:-1]

    >>> rand_arr3 = rand_array[:-1]

    >>> rand_arr2 is rand_arr3  # ❶

    False

    >>> rand_arr2 == rand_arr3 # ②

    True

    >>> %timeit rand_arr2 == rand_arr3

    196 ms ± 2.42 ms per loop (mean ± std. dev. of 7 runs, 1 loop each)

    >>> rand_list2 = rand_list[:-1]

    >>> rand_list3 = rand_list[:-1]

    >>> %timeit rand_list2 == rand_list3

    886 ms ± 12.4 ms per loop (mean ± std. dev. of 7 runs, 1 loop each)

    ```


    +   ❶ Slices create genuinely new objects, copying the old ones.

    +   ② These distinct objects remain equal.


    The speedup from `list` isn''t as dramatic as the 30x difference in counting on
    `bytes`, but 4.5x is a worthwhile speedup if the underlying operation matters
    in your application.


    There are a lot of corners where non-`list` sequences will speed things up, where
    they won''t, and where they simply are not suitable for the purpose at hand. For
    many cases where you need to work with sequences of numbers, however, it is very
    much worth keeping these other sequences in mind as options.


    ## 6.7 Wrapping Up


    > I will, in fact, claim that the difference between a bad programmer and a good
    one is whether he considers his code or his data structures more important.

    > Bad programmers worry about the code. Good programmers worry about data structures
    and their relationships.

    > — Linus Torvalds, Creator of Linux


    Choosing a data structure well suited to your tasks is one of the most important
    tasks in programming. Python provides both ubiquitously used data structures—mainly
    `dict`, `list`, `tuple`, and `set` built-in types—and some others that are more
    often overlooked. Many of these overlooked gems live inside the `collections`
    module of the standard library. A few live in other modules, or simply as less
    used built-ins.


    On the Python Package Index (https://pypi.org/) you can probably find hundreds
    of very specialized data structure modules. There are definitely times when one
    of these is exactly what you need; however, much of what lives on PyPI is somewhat
    preliminary or partial, being the hobby of one or a few programmers. The libraries
    sortedcontainers and pyrsistent mentioned in the introduction to this chapter
    are definitely worth being aware of. I''ve found specific use for pygtrie (https://pypi.org/project/pygtrie/)
    and R-tree (https://pypi.org/project/R-tree/) as well, for example.


    A good strategy when choosing a data structure for your project is to first think
    about whether any of the “big four” listed in the preceding paragraph accomplish
    exactly what you need (including good big-O behavior). Very often the answer is
    yes. If you feel like there may be drawbacks to using those, consider using one
    of the other data structures in the standard library collections, array, enum,
    dataclasses, or perhaps queue and a few others. If it still feels like something
    is missing, think about sortedcontainers, pyrsistent, NumPy, and Pandas. If that
    still falls short—and if it does, think very carefully about whether you are genuinely
    asking the right questions—look for other data structure projects in the open
    source world. And in the rare, but not nonexistent, circumstance those earlier
    steps don''t satisfy your needs, think about creating custom data structures (after
    reading the next chapter).


    ## 7 Misusing Data Structures


    Python has extremely well-designed data structures and data representations, many
    of which are discussed in the prior chapter. However, a few antipatterns, that
    are unfortunately common, can make the use of data structures dramatically inefficient
    or lead to unintended behavior in your code.


    ### 7.1 Quadratic Behavior of Repeated List Search


    In Python, the `in` keyword is a very flexible way of looking for “membership”
    in an object, most often some sort of container. Behind the scenes, the keyword
    `in` is calling the `.__contains__(self, elem)` method of the object that potentially
    has something “inside” it.


