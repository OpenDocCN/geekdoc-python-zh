    # 9.1.1 Comparing NaNs (and Other Floating Point Numbers)


    The IEEE-754–1985 standard for floating point numbers includes a special kind
    of value called “Not a Number” (NaN).³ Nearly all programming languages and computer
    architectures implement IEEE-754 and NaN values. As well as being perfectly good
    floating point values in plain Python, NaNs serve special roles when they are
    individual values within NumPy arrays or Pandas DataFrames (and Xarray DataArrays,
    and Vaex/Polars DataFrames, and in other numeric special collections).


    > **Note Getting pedantic about NaNs**


    To be precise about things, a NaN is not *a value*, but rather a family of values
    marked by a particular bit pattern. There are 16,777,214 32-bit NaNs, and 9,007,199,254,740,990
    64-bit NaNs. Moreover, within this vast space of possible NaNs, the bit patterns
    are split evenly between *signaling* and *quiet* NaNs.


    This is a lot of complication that the original designers of IEEE-754, including
    main architect William Kahan, hoped would be utilized to carry *payloads* describing
    the circumstances within a computation where a non-representable floating point
    value arose. As things panned out, no widely used computing system makes any use
    of the many NaN values, and all basically treat every NaN as the same value.


    Let’s dig a bit deeper into the weeds. These details apply to many concerns. A
    floating point number is represented as a sign bit, followed by an exponent, followed
    by a mantissa.⁴ A NaN is simply a number that has all of its exponent bits set
    to 1s.


    2. J. B. S. Haldane, *Possible Worlds*. New Brunswick, NJ: Transaction Publishers,
    2000.

    3. See discussion at https://en.wikipedia.org/wiki/IEEE_754-1985 for more information.
    Unfortunately, these standards themselves are not available free of charge, but
    their technical requirements are widely published in other forms. Technically,
    this standard was superseded by IEEE-754-2008, and then by IEEE-754-2019, but
    nothing relevant herein was modified.

    4. To get even more technical, an alternate representation exists for *subnormal
    numbers* (https://en.wikipedia.org/wiki/Subnormal_number) where we want to represent
    floating point numbers close to zero with greater precision.'
