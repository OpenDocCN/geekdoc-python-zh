    \n## 1.2 使用 enumerate() 而不是循环遍历索引\n\n来自 C 派生语言的开发者有时会自动使用循环遍历列表或其他数据结构的索引元素。这通常是一种非\
    \ Pythonic 的循环编写方式。以这种方式编写的代码在速度上并不比使用 `enumerate()` 慢多少，但可读性较差，更冗长，并且通常感觉像是一种“代码异味”。\n\
    \n例如，在 C++ 中，这样的惯用法很常见：\n\n```cpp\n// `items` could be array, vector, or other\
