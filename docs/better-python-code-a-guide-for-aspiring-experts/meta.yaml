    # 6.4.1 The Solution


    A common pattern for configuration options is to have multiple dictionaries that
    could potentially contain information, with each overriding a previous one according
    to the business logic of an application. Using ChainMap we can accomplish exactly
    that:


    ```

    >>> from collections import ChainMap

    >>> default = {

    ...     "timeout-secs": 30,

    ...     "environment": "development",

    ...     "env-file": "/opt/.env-default"

    ... }

    >>> application = {

    ...     "timeout-secs": 15,

    ...     "application-name": "FooBarMaker",

    ...     "env-file": "/user/local/foobar/.env"

    ... }

    >>> user = {

    ...     "timeout-secs": 60,

    ...     "env-file": "/home/david/.env-foobar",

    ...     "username": "David"

    ... }


    >>> settings = ChainMap(user, application, default)

    >>> settings["timeout-secs"]                    # ❶

    60

    >>> settings["username"]                        # ❷

    ''David''

    >>> settings["environment"]                     # ❸

    ''development''

    >>> settings.get("application-name", "app")    # ❹

    ''FooBarMaker''

    >>> settings.get("session", "Unknown")          # ❺

    ''Unknown''

    ```


    +   ❶ First mapping provides the key, others ignored

    ❷ Only first mapping has the key

    ❸ Last mapping has the key

    ❹ Middle mapping has the key, so return value

    ❺ No mappings have the key, fall back to argument'
