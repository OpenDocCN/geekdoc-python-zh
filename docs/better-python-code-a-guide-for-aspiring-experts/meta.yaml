    > Anybody who thinks he knows what he’s doing when floating point is involved
    is either naive, or Tim Peters (well, it *could* be W. Kahan I guess).


    Tim Peters (after whom “Timsort,” the sorting algorithm used in Python and in
    many other modern programming languages), replied:


    > I find it’s possible to be both (wink). But *nothing* about fp comes easily
    to anyone, and even Kahan works his butt off to come up with the amazing things
    that he does.


    Peters illustrated further by way of Donald Knuth (*The Art of Computer Programming*,
    3rd edition, Addison-Wesley, 1997: 229):


    > Many serious mathematicians have attempted to analyze a sequence of floating
    point operations rigorously, but found the task so formidable that they have tried
    to be content with plausibility arguments instead.


    Both `math.isclose()` and `numpy.isclose()` come with optional arguments to fine-tune
    their meanings of “closeness.” However, note that these corresponding functions
    are *not* algorithmically identical. In fact, quoting the NumPy documentation:


    > Unlike the built-in `math.isclose`, the above equation is not symmetric in a
    and b — it assumes b is the reference value — so that `isclose(a, b)` might be
    different from `isclose(b, a)`.


    In other words, `numpy.isclose()` is also not itself commutative (the property
    of an operator in mathematics in which A ⊕ B is always equal to B ⊕ A).'
