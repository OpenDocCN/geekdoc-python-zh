    ## 致谢


    Python-Help 论坛 (https://discuss.python.org/c/users/7) 的许多参与者为这些错误提出了很好的建议。对于他们的许多建议，我已经包含了他们的想法或其某种变体，但在其他情况下，他们的想法促使我增加或修改了所讨论的错误。我衷心感谢
    Chris Angelico、Charles Machalow、John Melendy、Steven D''Aprano、Ryan Duve、Alexander
    Bessman、Cooper Lees、Peter Bartlett、Glenn A. Richard、Ruben Vorderman、Matt Welke、Steven
    Rumbalski 和 Marco Sulla 的建议。


    其他提出建议的朋友包括 Brad Hunting、Adam Peacock 和 Mary Ann Sushinsky。


    由于收到的建议，本书变得更好了；所有错误仍由我本人负责。


    ## 关于作者


    **David Mertz, Ph.D.**，是 Python 社区的长期成员：大约 25 年——足以让他记得 Python 1.5 相对于 1.4 的新特性。他密切关注这门语言的发展，就版本间的许多变化发表过主题演讲，他的写作对
    Python 及其流行库的发展方向产生了一定影响。David 曾向科学家、来自其他语言的开发者以及编程新手教授 Python。


    你可以在 https://gnosis.cx/publish/resumes/david-mertz-publications.pdf 找到关于他出版物的大量详细信息。你可以在
    https://gnosis.cx/publish/resumes/david-mertz-resume.pdf 了解更多关于他工作经历的信息。


    ## 引言


    Python 是一门强大的，同时也是相当有主见的编程语言。虽然在 Python 中完成一项任务通常有多种*可能*的方法，但往往只有一种*应该*采用的方法。有些程序被认为是“Pythonic”的，而有些则不是。


    > **关于 Pythonic 的说明**


    *Pythonic* 这个略带玩笑意味的术语在 Python 社区中被广泛使用。它大致意味着“反映了 Python 语言的良好编程实践”。但这个术语也有一种难以言喻的*微妙*之处，类似于其他程序员用
    *fragile*（脆弱）、*elegant*（优雅）或 *robust*（健壮）来描述特定代码的方式。你将在本书中经常看到 *Pythonic* 和 *unpythonic*
    这两个术语。


    在相关的 Python 幽默中——毕竟这门语言是以 Monty Python 喜剧团命名的——我们经常用 *Pythonista* 来称呼那些精通 Pythonic
    编程的开发者。


    在相当大的程度上，Pythonic 是一个目标，旨在提高程序的*可读性*，以便其他用户和贡献者能够轻松理解你的意图、代码的行为，甚至识别其错误。此外，很多时候，不
    Pythonic 的做法会导致意外行为，从而在你可能未考虑或未尝试过的边缘情况下损害*功能性*。


    在本书中，我对于好的 Python 实践毫不掩饰自己的主见。在讨论中，我试图解释这些观点背后的动机，并反思我长期使用、教授和撰写关于 Python 的经验。这是一门真正令人愉悦的编程语言，我对此怀有真诚的热情。


    我们对 Python 代码的许多期望在*《Python 之禅》*中得到了阐释。


    ```

    >>> import this

    The Zen of Python, by Tim Peters


    Beautiful is better than ugly.

    Explicit is better than implicit.

    Simple is better than complex.

    Complex is better than complicated.

    Flat is better than nested.

    Sparse is better than dense.

    Readability counts.

    Special cases aren''t special enough to break the rules.

    Although practicality beats purity.

    Errors should never pass silently.

    Unless explicitly silenced.

    In the face of ambiguity, refuse the temptation to guess.

    There should be one---and preferably only one---obvious way to do it.

    Although that way may not be obvious at first unless you''re Dutch.

    Now is better than never.

    Although never is often better than *right* now.

    If the implementation is hard to explain, it''s a bad idea.

    If the implementation is easy to explain, it may be a good idea.

    Namespaces are one honking great idea---let''s do more of those!

    ```


    Python 编程世界中有许多非常重要的话题，但这本简短的书中并未涉及。附录《*其他书籍的主题*》提供了一些资源指引，以及我认为你在学习这些主题时值得追求的想法的简要概述。


    ## 遍历错误的对象


    与大多数过程式编程语言一样，Python 有两种循环：`for` 和 `while`。这些循环的语义与大多数类似语言非常相似。然而，Python 特别强调*遍历*可迭代对象——包括*惰性*可迭代对象和具体集合——这是许多语言所不具备的。本章中的许多错误在其他编程语言中是“最佳实践”，但当直接移植到
    Python 时，要么在风格上有缺陷，要么不必要地脆弱。


    从技术上讲，Python 也允许递归，这是另一种“循环”方式，但 Python 中的递归深度是有限的，并且缺少尾调用优化（参见 https://en.wikipedia.org/wiki/Tail_call）。对于那些自然*细分*以达到解决方案的问题，递归可能非常有用，但在
    Python 中，它很少是构建一系列相似动作的好方法。


    本章中的错误都不专门涉及递归，但来自 Lisp 系列语言、ML 系列语言，或者可能是 Haskell、Rust、Lua、Scala 或 Erlang 的程序员应该注意，虽然递归在你过去使用的语言中可能是个好习惯，但它*可能*成为
    Python 中的坏习惯。


    ### 1.1 （很少）生成列表用于迭代


    许多 Python 程序中的一个常见模式是生成一系列待处理的项目，将它们附加到一个列表中，然后遍历该列表，在遍历到每个项目时进行处理。事实上，以这种方式构建程序通常完全合理且非常直观。除非它不合理。


    当项目序列可能非常长（或潜在无限长），或者每个项目可能是一个占用大量内存的对象时，创建并填充列表通常会消耗比所需更多的内存。此外，当处理操作可能与生成操作并发时，我们可能花费很长时间生成列表，然后花费同样长的时间处理列表。如果实际并行是可能的，我们或许能够以一半的时间完成整个程序。但当并行成为可能时，它并不总是容易的。（关于并发的更多信息，请参见本书的附录。）'
