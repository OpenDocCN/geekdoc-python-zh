    Often the systems in question are web servers or other kinds of data servers,
    where in normal operation access is only via URLs or other encapsulated mechanisms.
    The passwords in source code are used to access additional resources, such as
    other websites or databases protected by credentials. Such developers often try
    to reassure themselves by asserting that the resource is itself inside a firewall
    zone or otherwise whitelist the particular applications or servers making such
    requests.


    Approaching secrets this way is *always* a bad idea, and is usually motivated
    by mere laziness (although ignorance can certainly be at play as well). The assumptions
    you make about underlying source code not being exposed to malicious actors almost
    inevitably are proved wrong, through one mechanism or another. Sometimes that
    happens by so-called “hackers” deliberately looking for exploits; probably even
    more often it occurs simply because access to the source code is not well regulated
    within version control systems, shared drives, backup storage, and so on.


    A typical example of this mistake can resemble the following code. This example
    uses an HTTPS request, but a very similar pattern would apply to a request using
    Python’s DB-API to talk to a database that uses credentials.'
  - "[PAGE 224]\n\nInsecure and badly designed credential storage\n\n```\nimport requests\n\
