  md: '# Chapter 7 Misusing Data Structures


    Two or three things conspired against us here. Firstly, the JSON specification
    doesn''t prevent duplicate keys from occurring. Secondly, the integer 1 is converted
    to the string "1" when it becomes JSON. And thirdly, Python dictionaries always
    have unique keys, so the second try at setting the "1" key overwrote the first
    try.

    Another somewhat obscure edge case is that JSON itself can validly represent numbers
    that Python does not support:


    ```

    >>> json_str = ''[1E400, 3.141592653589793238462643383279]''

    >>> json.loads(json_str)

    [inf, 3.141592653589793]

    ```


    This is not a case of crashing, nor failing to load numbers at all. But rather,
    one number overflows to infinity since it is too big for float64, and the other
    is approximated to fewer digits of precision than are provided.

    A corner edge case is that JSON numbers that "look like Python integers" actually
    get cast to int rather than float:


    ```

    >>> json_str = f''{"7"*400}'' # ❶

    >>> val = json.loads(json_str)

    >>> math.log10(val)

    399.8908555305749

    >>> type(val)

    <class ''int''>

    ```


    ❶ A string of four hundred "7"s in a row

    However, since few other programming languages or architectures you might communicate
    with will support, for example, float128 either, the best policy is usually to
    stick with numbers float64 can represent.


