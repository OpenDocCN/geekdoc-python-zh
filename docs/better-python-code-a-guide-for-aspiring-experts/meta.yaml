    \ the first file will still get closed here.\n        pass\n```\n\nClearly there\
    \ is a lot more going on in this expanded version. In a non-demonstration program,\
    \ you would probably perform some actual remediation in the various except suites\
    \ rather than simply print some varying messages based on the type of error encountered.\n\
    \nOne notable feature of the preceding code is that we catch `PermissionError`\
    \ and `FileNotFoundError`, but then also catch their parent class `OSError` later\
    \ in the sequence of `except` clauses. We have a specific behavior we want if\
    \ those exact things went wrong, but still recognize that there are other ways\
    \ that `open()` might fail that we haven't specifically thought about.\n\nIn some\
    \ suites, there might be a final `except Exception` that does generic logging\
