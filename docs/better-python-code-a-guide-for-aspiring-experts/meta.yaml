    \n# Calculate initial sum and mean\ntotal = sum(nums)\nprint(total/window)\n\n\
    # For each new number read, print the moving average\nfor num in stdin:\n    total\
    \ -= nums.pop(0)\n    nums.append(int(num.rstrip()))\n    total += nums[-1]\n\
    \    print(total/window)\n```\n\n对于小规模输入，这并不重要，行为也相同：\n\n```\n[BetterPython]$\
    \ echo \"4 6 2 1 3 10 11 35 32\" |\n            tr ' ' '\\n' |\n            moving-average-list\n\
    3.2\n4.4\n5.4\n12.0\n18.2\n```\n\n四行脚本 `numbers` 和 `moving-average-deque` 都可在本书网站上找到。`numbers`\
    \ 的参数是在 [1, 1000] 区间内随机生成的数字数量：\n\n```\n% numbers 7 | moving-average-list\n510.0\n\
    571.2\n670.8\n```\n\n然而，当窗口更大、数据更多时，我们会注意到移动平均算法的两种实现之间存在一个重要差异：\n\n```\n[BetterPython]$\
    \ time numbers 1_000_000 | # ❶\n    moving-average-deque 100_000 >/dev/null\n\n\
    real    0m0.869s\n\n[BetterPython]$ time numbers 1_000_000 |\n    moving-average-list\
    \ 100_000 >/dev/null\n\nreal    0m18.025s\n```\n\n❶ `time` 和 `/dev/null` 这些 Unix\
    \ 特性只是附带的；我们只是想计时脚本，而不关心输出。\n\n效率提升 20 倍当然很棒。但除此之外，我们还获得了线程安全性，这在队列和栈的上下文中通常非常重要。例如，当我们从集合中弹出一个值时，Python\
    \ `list` 不保证两个线程不会弹出同一个元素，而 `deque` 则可以保证。当你编写多线程代码时，需要仔细思考线程间共享的数据结构是否会导致死锁、竞态条件和其他并发陷阱；选择正确的数据结构并不能消除这些顾虑，但选择错误的数据结构几乎必然会导致它们。关于并发的更广泛讨论超出了本书范围，但附录《其他主题》简要回顾了\
    \ Python 的并发生态系统。\n\n## 6.4 collections.ChainMap\n\n可爱的 `collections.ChainMap`\
    \ 对象是一种*虚拟映射*。它提供了一种抽象，用于依次查找多个字典（或其他映射）。使用 `ChainMap` 时，我们无需复制任何数据，也避免了在不适当的上下文中修改底层字典。\n\
    \n本节与前几节一样，我们将先看一个 Python 解决方案，然后是它修复的错误。\n\n### 6.4.1 解决方案\n\n配置选项的一个常见模式是拥有多个可能包含信息的字典，每个字典根据应用程序的业务逻辑覆盖前一个。使用\
    \ ChainMap 我们可以精确地实现这一点：\n\n```python\n>>> from collections import ChainMap\n\
    >>> default = {\n...     \"timeout-secs\": 30,\n...     \"environment\": \"development\"\
    ,\n...     \"env-file\": \"/opt/.env-default\"\n... }\n>>> application = {\n...\
    \     \"timeout-secs\": 15,\n...     \"application-name\": \"FooBarMaker\",\n\
    ...     \"env-file\": \"/user/local/foobar/.env\"\n... }\n>>> user = {\n...  \
    \   \"timeout-secs\": 60,\n...     \"env-file\": \"/home/david/.env-foobar\",\n\
    ...     \"username\": \"David\"\n... }\n\n>>> settings = ChainMap(user, application,\
    \ default)\n>>> settings[\"timeout-secs\"]                    # ❶\n60\n>>> settings[\"\
    username\"]                        # ❷\n'David'\n>>> settings[\"environment\"\
    ]                     # ❸\n'development'\n>>> settings.get(\"application-name\"\
    , \"app\")    # ❹\n'FooBarMaker'\n>>> settings.get(\"session\", \"Unknown\") \
    \         # ❺\n'Unknown'\n```\n\n- ❶ 第一个映射提供了该键，其他映射被忽略\n- ❷ 只有第一个映射有该键\n- ❸ 最后一个映射有该键\n\
    - ❹ 中间的映射有该键，因此返回其值\n- ❺ 没有任何映射有该键，回退到参数值\n\n如果某些映射可能在运行时更改，这会变得更加有用。例如：\n\n```python\n\
    >>> user['username'] = \"Dr. Mertz\"\n>>> settings[\"username\"]\n'Dr. Mertz'\n\
    >>> user['application-name'] = \"DavidMaker\"\n>>> settings[\"application-name\"\
    ]\n'DavidMaker'\n```\n\n`ChainMap` 中包含的映射是动态引用的。我们可以检查它们是哪些：\n\n```python\n>>>\
    \ settings.maps\n[{'timeout-secs': 60, 'env-file': '/home/david/.env-foobar',\n\
    'username': 'Dr. Mertz', 'application-name': 'DavidMaker'},\n{'timeout-secs':\
    \ 15, 'application-name': 'FooBarMaker', 'env-file':\n'/user/local/foobar/.env'},\
    \ {'timeout_secs': 30, 'environment':\n'development', 'env-file': '/opt/.env-default'}]\n\
    ```\n\n`collections.ChainMap.new_child()` 方法还允许你向搜索序列的开头添加额外的映射。原则上，`.maps` 属性也可以修改，但这样做通常不够简洁（创建一个新的\
    \ `ChainMap` 几乎没有开销）。\n\n### 6.4.2 常见错误\n\n“手动”实现 `ChainMap` 的功能是可能的，但很繁琐。例如，我们可能会编写一个函数来实现相同的目的：\n\
    \n```python\ndef search_dicts(key, default, *dicts):\n...     for dict_ in dicts:\n\
    ...         if key in dict_:\n...             return dict_[key]\n...     return\
    \ default\n...\n>>> search_dicts(\"timeout-secs\", 120, user, application, default)\n\
    60\n>>> search_dicts(\"environment\", \"prod\", user, application, default)\n\
    'development'\n>>> search_dicts(\"session\", \"Unknown\", user, application, default)\n\
    'Unknown'\n```\n\n- ❶ 从 user 中找到值\n- 2. 从 default 中找到值\n- 3. 回退到参数值\n\n这代码量不大，但每次都需要调用它，而不是将映射序列封装在一个对象中。此外，这实际上只实现了\
    \ `collections.ChainMap.get()`，而不是 `ChainMap` 提供的完整类 `dict` 方法集合。\n\n比所示的实用函数更糟糕的是手动更新字典。例如，如果我们这样做，确实会得到一个包含我们希望使用的所有值的映射：\n\
    \n```python\n>>> default.update(application)\n>>> default.update(user)\n>>> default\n\
    {'timeout-secs': 60, 'environment': 'development', 'env-file':\n'/home/david/.env-foobar',\
    \ 'application-name': 'DavidMaker',\n'username': 'Dr. Mertz'}\n```\n\n然而，在将 `application`\
    \ 和 `user` 合并到 `default` 之后，我们丢失了关于 `default` 中原本可能有什么以及可能缺少什么的记录。对于许多应用程序来说，保留这些信息很有价值。\n\
    \n有人可能会尝试通过使用一个全新的名称来补救（假设所有初始映射都重置为之前显示的初始值）：\n\n```python\n>>> settings = default.copy()\n\
    >>> settings is default\nFalse\n>>> settings.update(application)\n>>> settings.update(user)\n\
    >>> settings\n{'timeout-secs': 60, 'environment': 'development', 'env-file':\n\
    '/home/david/.env-foobar', 'application-name': 'FooBarMaker',\n'username': 'David'}\n\
    ```\n\n这可能比上一个错误版本更好，因为 `default` 保持了其初始配置。但是，如果应用程序更新了收集的映射之一或多个，除非我们在每次检查 `settings`\
    \ 之前使用相同的几行代码，否则这些更改不会反映在 `settings` 中。\n\n## 6.5 数据类和命名元组\n\nPython 的标准库包含两种非常有用的数据结构，用于存储相关数据元素的“记录”。第一种是命名元组，其底层实际上是元组的子类，但具有命名字段。第二种是数据类，它们只是\
    \ Python 类，自动生成了许多双下划线方法和其他有用的行为。\n\n我们可以用数据类和命名元组完成的事情，也可以用内置类型 `dict` 和 `tuple`\
    \ 来完成。事实上，每个 `namedtuple` 都只是 `tuple` 的子类，所以它确实是相同的类型。然而，使用允许读者将代码清晰地理解为“记录”的数据类型，可以提高可读性并使推理更容易。\n\
    \n通常，处理每个项目都有固定字段集合的数据集合非常有用，但我们处理许多这样的项目（比较、排序、聚合等）。命名元组和数据类比简单的标量（如 `float`、`int`、`str`\
    \ 或 `decimal.Decimal` 或其他特殊类型）有更多的部分，但它们更类似于*数据类型*而不是*数据结构*。本节讨论的两种类型之间最明显的区别是数据类是可变的，而命名元组是不可变的。\n\
    \n让我们看一个面向记录的数据示例。我们经常在关系数据库表、CSV 或固定宽度文件、Apache Parquet 或 Apache Arrow 等格式、JSON\
