    >>> random.choice(words)

    ''spekboom''

    ```


    ❶ This loop performs a genuinely unknowable number of steps through the Mersenne
    Twister generator.

    ❷ This choice of “remotivations” will not occur if I run the code again, or if
    you run it. However, “spekboom” will remain stable if you use my wordlist.


    Not only was “spekboom” (a South African succulent commonly kept as a houseplant)
    the 10 millionth word chosen following initialization of the MT generator with
    the seed I used, but also the prior nine million, nine hundred ninety-nine thousand,
    nine hundred ninety-nine words were the same (although were not displayed in the
    output).

    If we wish to save the state of the generator after these 10 million choices,
    that is easy to do.


    Saving the state of a Mersenne Twister generator


    ```

    >>> mt_state = random.getstate()

    >>> print(f"{len(mt_state[1])} numbers: {mt_state[1][:4] + (''...'',)}")

    625 numbers: (3974703532, 1779565825, 1928569991, 1391398096, ''...'')

    >>> random.choice(words)

    ''labdacisms''

    >>> for _ in range(secrets.randbelow(1_000_000)):    # ❶

    ...     random.choice(words)

    ...

    >>> random.choice(words)                              # ❷

    ''carnotite''

    >>> random.setstate(mt_state)

    >>> random.choice(words)

    ''labdacisms''

    ```


    ❶ Again, an unknowable number of steps through the Mersenne Twister generator

    ❷ The choice of “carnotite” is also a one-off occurrence. Or at least a 1/267,752
    chance of happening.


    Every time the state is reset to mt_state, the very next word chosen will be “labdacisms”
    (a phonological shift in which /l/ is substituted with /r/).


    # Why Do We Want Repeatability?


    We’ve seen a bit of the API for using seeds and state in random, but the reason
    we want that repeatability may remain unclear. There are a couple of clear reasons
    to want this.'
