    latter two of these are worth reading about in the Python documentation (https://docs.python.org/3/library/collections.html),
    but this book does not specifically address them.


    The “mistake” fixed by using `defaultdict` is simply that of using a repetitive
    and overly verbose pattern that can be simplified. I often make this mistake of
    inelegance, and hence feel the reminder is worthwhile.


    When you work with plain dictionaries you often want to modify a mutable value
    associated with a key. But before you can perform that modification, you need
    to check whether the dictionary *has* the needed key in the first place. For example,
    let’s work with the SOWPODS wordlist used in various examples, and create a dictionary
    that maps first letters to a collection of words starting with that letter:


    ```

    >>> from random import choice, seed

    >>> from pathlib import Path

    >>> words = Path("data/sowpods").read_text().split()

    >>> seed("first-letter") # ❶

    >>> for _ in range(100):

    ...     word = choice(words)

    ...     first_letter = word[0]

    ...     if first_letter not in by_letter:

    ...         by_letter[first_letter] = set([word])

    ...     else:

    ...         by_letter[first_letter].add(word)

    ...

    >>> by_letter.get("g", set())

    set()

    >>> by_letter.get("r", set())

    {''repositories'', ''rotating'', ''resectional'', ''reflectometry''}

    ```


    ❶ A seed is used simply so readers can replicate specific choices.


    A similar pattern is also often used with `list` and `.append()`, and sometimes
    with other collections and their corresponding method for including more items.


    This pattern is perfectly workable, but is made better with `defaultdict`:


    ```

    >>> first_letter = defaultdict(set)

    >>> seed("first-letter")

    >>> by_letter = defaultdict(set)

    >>> for _ in range(100):

    ...     word = choice(words)

    ...     by_letter[word[0]].add(word)

    ...

    >>> by_letter[''g'']

    set()

    ```'
