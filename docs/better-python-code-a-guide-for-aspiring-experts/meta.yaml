    even wrong. Those several NaN values should never be equal to one another (although
    they are identical), and it’s not clear the sense in which “the same” value occurs
    multiple times. However, this behavior remains clear and easy to understand, even
    if purity concerns are possibly pushed aside.


    Where we find a genuinely odd corner of module behavior is with statistics.median()
    (and its close relatives statistics.median_low(), statistics.median_high(), and
    statistics.median_grouped()). In all of these, the presence of NaN values makes
