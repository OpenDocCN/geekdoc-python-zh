  md: '# # 1.5 for Loops Are More Idiomatic Than while Loops


    When possible, a Pythonic loop looks like: `for item in iterable`. This is the
    basic idiom, and when you find yourself doing something else, think about whether
    that other thing is actually better.


    In writing a loop in a program, you are often faced with the choice between `for`
    and `while`. Or to be precise, you *could* always use either one for any given
    loop. It may not be obvious, but you could get by in a language that only had
    `for` if it has infinite iterators.


    Equivalent of `while predicate(a, b)` using only `for`


    ```

    >>> from itertools import repeat

    >>> a, b = 17, 23  # Initial example values have no special meaning

    >>> for _ in repeat(None):  # ❶

    ...     print("Current values:", a, b)

    ...     if predicate(a, b):  # ❷

    ...         break

    ...     a = get_data(a)  # ❸

    ...     b = get_data(b)  # ❸

    ...

    Current values: 857 338

    Current values: 613 500

    Current values: 611 47

    Current values: 387 871

    Current values: 689 812

    Current values: 406 892

    Current values: 817 522

    ```


    +   ❶ An infinite iterator always yielding `None`

    ❷ Deliberately vague about what `predicate()` is checking

    ❸ Deliberately vague about what `get_data()` is doing


    The preceding code is a standard example of a `while True` loop, but written without
    `while`. That is, we get data to work on in a stateful way. Then we evaluate that
    data with an expectation that it *might* reach a state where we wish to exit the
    loop (but it might also be an eternally running server).¹


    Expressing `for` in terms of `while` is even simpler as a translation.


    Equivalent of `for item in iterable` using only `while`


    ```

    >>> # iterable = <collection, generator, something else>

    >>> iterator = iter(iterable)

    ```


    > 1. Readers are welcome to try to guess what `get_data()` and `predicate()` are
    doing. Come prepared with a deep understanding of the Mersenne Twister pseudo-random
    number generator (PRNG).'
