    \ item being a distinct list (as indicated by their different IDs) that can be\
    \ modified independently.\n\n## 2.6 Confusing is with == (in the Presence of Interning)\n\
    \nEarlier in this chapter, we looked at == and is in some depth. In some sense,\
    \ this section is an extension of those discussions. However, the issue here is\
