  md: "Indeed, if you are not required to utilize the index position within a loop,\
    \ utilizing the index at all is generally a code smell in Python. A much more\
    \ idiomatic option is simply:\n\n```\nfor item in items:\n    process(None, item)\n\
    ```\n\nOn those fairly common occasions when you need both the index and the underlying\
    \ item, using `enumerate()` is much more expressive and idiomatic:\n\n```\nfor\
    \ i, item in enumerate(items):\n    process(i, item)\n```\n\nIn the relatively\
    \ uncommon situations when I want the index but not the item itself, I often use\
    \ `enumerate()` anyway, and I use the Python convention of `_` (single underscore)\
    \ representing “a value I don’t care about”:\n\n```\nfor i, _ in enumerate(items):\n\
    \    process(i, None)\n```\n\nAn approach that I use from time to time, when I\
    \ actually want to maintain several increments, is to initialize the several counters\
    \ prior to a loop, even if one of them could derive from `enumerate()`:\n\n```\n\
    total, n_foo, n_bar = 0, 0, 0\nfor item in items:\n    if is_foo(item):\n    \
    \    process_foo(item)\n        n_foo += 1\n    elif is_bar(item):\n        process_bar(item)\n\
    \        n_bar += 1\n    else:\n        pass\n    total += 1\n```\n\nIn the example,\
    \ `total` could equally well be reset while enumerating the loop itself, but you\
    \ might wish to emphasize the parallel with `n_foo` and `n_bar`, and that is probably\
    \ better expressed as shown here."
