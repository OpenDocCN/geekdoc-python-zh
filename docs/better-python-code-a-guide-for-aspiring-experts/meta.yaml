    ## 6.5.2 静态与动态


    读者会注意到，前面的例子对于大多数用途来说可能有点*过于巧妙*。我们动态地创建了命名元组的属性，但在后续代码中使用这些名称时，却假设我们知道哪些字段名是动态确定的。


    当然，我们*不必*依赖动态创建字段名。构造函数可以接受一个静态序列，甚至是一个静态的、以空格分隔的字段名字符串。这是更常见的情况，尽管动态情况确实有一些用途；例如，如果你*知道*读取的文件会有几个字段名，但其他字段可能会变化。


    为了强调静态声明，一些 Python 开发者更喜欢使用 `typing.NamedTuple` 的类风格拼写。注意在下面的代码中，注解仅仅是意图的文档；它们*不会*执行任何类型转换或检查注解是否匹配（除非使用第三方类型检查器）。例如：


    ```python

    from typing import NamedTuple


    >>> class Nation(NamedTuple):

    ...     Name: str

    ...     Population: int

    ...     Pct_Change: float

    ...     Net_Change: int

    ...     Density: float

    ...     Area: float

    ...

    >>> poland = Nation(

    ...     "Poland",

    ...     37_846_611,

    ...     -0.11,

    ...     -41_157,

    ...     Density=124.0,

    ...     Area=306_230

    ... )

    ...

    >>> poland

    Nation(Name=''Poland'', Population=37846611, Pct_Change=-0.11,

    Net_Change=-41157, Density=124.0, Area=306230)

    ```


    我们可以使用位置参数或命名参数来创建新的 `Nation` 对象，因此示例中混合使用了两者（当然是位置参数在前）。如前所述，类型声明并未被强制执行；例如，`poland.Area`
    是一个整数（与实际源数据一致），即使从概念上讲它可能是“声明”中的非整数。


    ## 6.5.3 数据类


    使用数据类在语法上与使用 `typing.NamedTuple` 非常相似。然而，数据类允许你修改字段，也允许你添加对处理字段内数据有用的方法。让我们创建一个
    `Nation` 对象的 `dataclass` 版本。


    可变性是 `typing.NamedTuple` 和 `@dataclasses.dataclass` 之间的主要区别，但 `collections.namedtuple`
    的优势在于在代码中使用时感觉更轻量级（对人类读者而言，而非底层资源利用率）。在速度和内存使用方面，这些选项大致相当；主要区别在于表达意图。同样，在几乎所有的普通类中，你*可以*将它们装饰为数据类，而不会对程序运行造成损害；但如果一个类确实没有面向记录的目的，这样的装饰器会令人困惑并误导后续开发者：


    ```python

