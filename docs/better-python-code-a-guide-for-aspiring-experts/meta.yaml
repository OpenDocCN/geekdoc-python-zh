    ```


    The repetition of the assignment to `val` both before the loop and within the
    loop body just feels slightly wrong from a stylistic and code-clarify perspective
    (although, it''s not an actual *mistake*).

    A probably even less aesthetically pleasing variant on this pattern is to use
    `break` within the body to avoid the repetition.


    Internal-break-style loop-and-a-half in Python


    ```

    >>> while True:

    ...     val = get_data()

    ...     if predicate(val):

    ...         break

    ...     print("Current value acceptable:", val)

    ...

    Current value acceptable: 105

    Current value acceptable: 166

    Current value acceptable: 747

    ```


    Since Python 3.8, we''ve had the option of using the so-called "walrus operator"
    to simplify this structure. The operator is fancifully named for its resemblance
    to an emoticon of a walrus with eyes and tusks. The walrus operator (`:=`) allows
    you to assign a value within an expression rather than only as a statement.


    New-style loop-and-a-half in Python


    ```

    >>> while not predicate(val := get_data()):

    ...     print("Current value acceptable:", val)

    ...

    Current value acceptable: 859

    Current value acceptable: 296

    Current value acceptable: 235

    Current value acceptable: 805

    Current value acceptable: 383

    ```


    In both cases where the predicate is inside the `while` statement, the loop might
    be entered as few as zero times. With a `while True`, the loop is always entered
    at least once, but it might terminate early (the "and-a-half") if some condition
    occurs.'
