    \ 3>, <C.BLUE: 4>, <C.BLANK: 1>],\n [<C.BLANK: 1>, <C.RED: 2>, <C.RED: 2>, <C.RED:\
    \ 2>]]\n>>> pprint([id(sublist) for sublist in grid])\n[139768305000064,\n 139768302388864,\n\
    \ 139768304216832,\n 139768302374976,\n 139768216006464]\n```\n\nWe have a list\
    \ of length 5, each item being a distinct list (as indicated by their different\
    \ IDs) that can be modified independently.\n\n# 2.6 Confusing is with == (in the\
    \ Presence of Interning)\n\nEarlier in this chapter, we looked at == and is in\
    \ some depth. In some sense, this section is an extension of those discussions.\
    \ However, the issue here is *accidental identity*; or at least *non-guaranteed\
    \ identity*.\nA sidenote to the introduction of this chapter discussed the fact\
    \ that *small integers* and *short strings* will often reuse the identical objects\
    \ to refer to equal objects that go by different names. I strongly suspect that\
    \ the “Faster CPython” project (https://github.com/faster-cpython/) will extend\
