    # 4.3.3 Use itertools (Sufficiently)


    This pitfall joins others in this section in simply describing how developers
    may take approaches that are *less good* than those enabled by versions using
    the `itertools` module. This “less good” is rarely a matter of producing the wrong
    results, but is often a matter of producing the right result more slowly, sometimes
    worse in big-O complexity behavior (i.e., quickly exceeding available time and
    computer resources).


    The basic Python language is very powerful. One of the concepts Python has moved
    toward emphasizing is *lazy computation*. Specifically, iterables in Python may
    be large or infinite. Concrete collections are also (usually) iterable, but many
    iterables that are not concrete collections have a nice property of producing
    exactly one object at a time, and requiring almost no memory beyond that needed
    for that one object.


    > **Note Iterables and iterators**


    Users new to the concept can often overlook the somewhat subtle distinction between
    *iterables* and *iterators*. The fact that many iterables are their own iterator
    does not help in sorting out that confusion. These types of things are programmatically
    defined by `collections.abc.Iterable` and `collections.abc.Iterator`, respectively.


    In brief, an iterable is an object that, when passed to the built-in function
    `iter()`, returns an iterator. An iterator is simply an object that, when passed
    to the built-in function `next()`, either returns a value or raises `StopIteration`.
    These two simple properties make iterables and iterators *play nice* with loops,
    comprehensions, and other “iterable contexts.”


    Generator functions return iterators when called. But iterables and iterators
    may also be defined by custom classes. As usual, it is the presence of dunder
    methods that allows objects to work with operators and built-in functions. A typical
    such class might look like the following.


    ```

    An iterable class that is its own iterator

    >>> class Ones:

    ...     def __next__(self):

    ...         return 1

    ...     def __iter__(self):

    ...         return self

    ...

    >>> list(zip(Ones(), "ABC"))

    [(1, ''A''), (1, ''B''), (1, ''C'')]

    ```


    Since an instance of the `Ones` class returns itself when passed to `iter()` (which
    occurs implicitly in any iterable context, such as in an argument to `zip()`),
    `Ones()` is both an iterable and an iterator. We could spell this equivalently
    as `itertools.repeat(1)`, which likewise yields infinitely many values (in the
    example, the number 1 infinitely many times).'
- md: "## Reading FASTA\n\nLet's look at a small program that uses iterators, then\
    \ we'll use `itertools` functions to combine them. The FASTA format (https://www.ncbi.nlm.nih.gov/BLAST/fasta.shtml)\
    \ is a textual format used in bioinformatics to describe nucleotide or amino acid\
    \ sequences. Very often, a single file with an extension like `.fa`, `.fna`, `.fna`,\
    \ or `.fasta` will contain hundreds of thousands of sequences, each containing\
    \ tens of thousands of single-letter codes. For example, such a file might represent\
    \ an analysis of the genetic diversity in a milliliter of soil or seawater, with\
    \ each record describing a distinct bacterium species (diversity of microscopic\
    \ organisms is amazing).\n\nWhen producing each object yielded by an iterable\
    \ is resource intensive—whether requiring significant computation, significant\
    \ I/O, or utilizing significant memory—doing so once at a time makes for better\
    \ programs. For example, programs that don't crash with out-of-memory errors or\
    \ take months to finish creating a collection are better than those that do. For\
    \ big data, being able to process *one datum* now, and produce one partial result,\
    \ is almost always better than needing to produce only final aggregate collections.\
    \ For time-sensitive data, doing so is often a hard requirement (think of self-adjusting\
    \ industrial equipment or stock tickers, which are effectively infinite data streams).\n\
    \nAs with other features in this section, nothing you can do using the functions\
    \ in the standard library `itertools` module cannot be done without them. In fact,\
    \ in the documentation of the module (https://docs.python.org/3/library/itertools.html),\
    \ every provided function is accompanied by a sample (approximate) implementation\
    \ in Python (often the underlying CPython version is coded in C, and might behave\
    \ subtly differently in a few edge cases). The purpose of the functions in `itertools`\
    \ is to provide a kind of embedded language for working with infinite or very\
    \ large iterators. However, even though you *could* write each of the relatively\
    \ few functions in `itertools` yourself, most have pitfalls where a subtly wrong\
    \ implementation will wind up using large amounts of memory rather than remaining\
    \ fully lazy.\n\nThe documentation for `itertools` itself contains almost as many\
    \ recipes as there are functions within the module. Each of these is only a handful\
    \ of lines (often fewer than five), but combines the building blocks of the module\
    \ in the *right way* rather than getting some subtlety wrong that might break\
    \ edge cases or result in bad big-O behavior.\n\n### Generator function to read\
    \ a FASTA file incrementally\n\n```python\nfrom collections import namedtuple\n\
    FASTA = namedtuple(\"FASTA\", \"Description Sequence\")\n\ndef read_fasta(filename):\n\
    \    with open(filename) as fh:\n        line = next(fh)\n        if not line.startswith(\"\
    >\"):\n            raise ValueError(\n                f\"{filename} does not appear\
    \ to be in FASTA format\")\n        description = line[1:].rstrip()\n        nucleic_acids\
    \ = []\n        for line in fh:\n            if line.startswith(\">\"):\n    \
    \            yield FASTA(description, \"\".join(nucleic_acids))\n            \
    \    description = line[1:].rstrip()\n                nucleic_acids = []\n   \
    \         else:\n                nucleic_acids.append(line.rstrip())    # ❶\n\
    \        yield FASTA(description, \"\".join(nucleic_acids))\n```\n\n❶ FASTA files\
    \ typically, but not uniformly, have 80-width lines within sequence blocks; but\
    \ the newline is not meaningful.\n\nHere is an example of reading a file that\
    \ contains just two sequences, the putative mRNA sequences for the Pfizer and\
    \ Moderna COVID-19 vaccines, respectively:²\n\n```python\n>>> for vaccine in read_fasta(\"\
    COVID-19-vax-mRNA.fasta\"):\n...     print(f\">{vaccine.Description}\")\n... \
    \    print(vaccine.Sequence[:60] + \"...\")\n...\n>Spike-encoding_contig_assembled_from_BioNTech/Pfizer_BNT-162b2\n\
    GAGAATAAACTAGTATTCTTCTGGTCCCACAGACTCAGAGAGAACCCGCCACCATGTTC...\n>Spike-encoding_contig_assembled_from_Moderna_mRNA-1273\n\
    GGGAAATAAGAGAGAAAAGAAGAGTAAGAAGAAATATAAGACCCCGGCGCCGCCACCATG...\n```\n\nLet's\
    \ move on to *doing something* with this FASTA data that we can iterate over.\n\
    \n## Run-Length Encoding\n\nIn data that is expected to have many consecutive\
    \ occurrences of the same symbol, run-length encoding (RLE) can often offer significant\
    \ compression of the representation. RLE is often used as one component within\
    \ sophisticated compression algorithms.\nIn particular, we can write extremely\
    \ compact implementations of run-length encoding and run-length decoding by using\
    \ `itertools`. These implementations also have the virtue of being able to operate\
    \ lazily. That is, both of the following functions can be consumed one value at\
    \ a time, and accept iterables as arguments, and hence operate efficiently on\
    \ large, or even infinite, streams of data.\n\n### Run-length functions\n\n```python\n\
    from collections.abc import Iterable, Iterator\nfrom itertools import groupby,\
    \ chain, repeat\n\ndef rle_encode(it: Iterable) -> Iterator:\n    for k, g in\
    \ groupby(it):\n        yield (k, len(list(g)))\n\ndef rle_decode(it: Iterable)\
    \ -> Iterator:\n    yield from chain.from_iterable(repeat(x, n) for x, n in it)\n\
    ```\n\nThe functions are annotated only to emphasize that they operate lazily.\
    \ They utilize the itertools functions groupby(), chain.from_iterable(), and repeat()\
    \ to keep the code compact and lazy. The argument to chain.from_iterable() is\
    \ itself a generator comprehension, as well. Exactly why these work so elegantly\
    \ is left, to some degree, for readers who should read the official documentation\
    \ of each function (and of the other handy functions in the module). It's worth\
    \ seeing these operate to understand what's going on:\n\n```python\n>>> from itertools\
    \ import islice\n>>> for vaccine in read_fasta(\"COVID-19-vax-mRNA.fasta\"):\n\
    ...     encoded = rle_encode(vaccine.Sequence)           # ❶\n...     first5_regions\
    \ = islice(encoded, 5)              # ❶\n...     print(vaccine.Description)\n\
    ...     print(list(first5_regions))                      # ❷\n...\nSpike-encoding_contig_assembled_from_BioNTech/Pfizer_BNT-162b2\n\
    [('G', 1), ('A', 1), ('G', 1), ('A', 2), ('T', 1)]\nSpike-encoding_contig_assembled_from_Moderna_mRNA-1273\n\
    [('G', 3), ('A', 3), ('T', 1), ('A', 2), ('G', 1)]\n```\n\n❶ The objects seq and\
    \ first5_regions are lazy iterators, not concrete.\n❷ Only by creating a list\
    \ from iterator do we allocate memory.\n\nWe can verify that our paired functions\
    \ are symmetrical:\n\n```python\n>>> for vaccine in read_fasta(\"data/COVID-19-vax-mRNA.fasta\"\
    ):\n...     encoded = rle_encode(vaccine.Sequence)\n...     decoded = rle_decode(encoded)\n\
    ...     print(vaccine.Description)\n...     print(decoded)\n...     print(\"\"\
    .join(islice(decoded, 60)) + \"...\")\n...\nSpike-encoding_contig_assembled_from_BioNTech/Pfizer_BNT-162b2\n\
    <generator object rle_decode at 0x7f5441632810>\nGAGAATAAACTAGTATTCTTCTGGTCCCACAGACTCAGAGAGAACCCGCCACCATGTTC...\n\
    Spike-encoding_contig_assembled_from_Moderna_mRNA-1273\n<generator object rle_decode\
    \ at 0x7f54416f7440>\nGGGAAATAAGAGAGAAAAGAAGAGTAAGAAGAAATATAAGACCCCGGCGCCGCCACCATG...\n\
    ```\n\nNotice that the functions `rle_encode()` and `rle_decode()` are not limited\
    \ to encoding or decoding characters; such is merely handy for the examples. In\
    \ fact, any kind of iterable of any kind of value that might be repeated successively\
    \ will work equally well in being encoded or decoded by these functions. They\
    \ will also work on infinitely long iterators of values to encode or decode, as\
    \ long as you only ask for a finite number of the values at once.\n\n## More \"\
    Iterator Algebra\"\n\nIt is, of course, somewhat silly and unnecessary to worry\
    \ so much about laziness in concretizing iterators for a file that has exactly\
    \ two relatively short nucleotide sequences. As mentioned, though, similar files\
    \ can be far larger collections of far longer sequences. Many other data sources\
    \ can also be large, or slow to produce subsequent data (such as ones obtained\
    \ from slow remote online sources); the techniques discussed in this section apply\
    \ equally to those.\n\nSome of the additional functions in `itertools` include\
    \ `dropwhile()`, `takewhile()`, `pairwise()`, `accumulate()`, `tee()`, `permutations()`,\
    \ `combinations()`, `zip_longest()`, and `filterfalse()`. `filter()` is a built-in,\
    \ but is \"spiritually\" part of `itertools`, as are `map()`, `range()`, `enumerate()`,\
    \ and `zip()`. That list is not complete, but it’s probably the ones I use most\
    \ often. The excellent official documentation discusses everything in the module.\
    \ Given that `itertools` in many ways extends several `itertools`-like functions\
    \ already in `__builtins__`, using `from itertools import *` is one of the rare\
    \ cases where I do not recommend against the `import *` pattern discussed elsewhere\
    \ in this book.\n\nSuppose that you have a FASTA source that might be large, and\
    \ you wish to identify every (RNA) sequence where a long run of the same nucleotide\
    \ occurs. But once you find one within a sequence, you don’t want to spend extra\
    \ work examining the rest of that sequence:\n\n```python\n>>> for vaccine in read_fasta(\"\
    data/COVID-19-vax-mRNA.fasta\"):\n...     long_seq = next(dropwhile(lambda run:\
    \ run[1] < 8,\n...         rle_encode(vaccine.Sequence)), None)\n...     print(vaccine.Description)\n\
    ...     print(f\"First long nucleotide duplication: {long_seq}\")\n...\nSpike-encoding_contig_assembled_from_BioNTech/Pfizer_BNT-162b2\n\
    ```\n\n² The data used can be obtained at https://gnosis.cx/better/data/COVID-19-vax-mRNA.fasta.\
    \ It is taken from “Assemblies of putative SARS CoV2 spike encoding mRNA sequences\
    \ for vaccines BNT-162b2 and mRNA-1273,” by Dae-Eun Jeong, Matthew McCoy, Karen\
    \ Artiles, Orkan Ilbay, Andrew Fire, Kari Nadeau, Helen Park, Brooke Betts, Scott\
    \ Boyd, Ramona Hoh, and Massa Shoura (https://github.com/NAalytics)."
  mdcn: "## 读取 FASTA 文件\n\n让我们先看一个使用迭代器的小程序，然后我们将使用 `itertools` 函数来组合它们。FASTA 格式（https://www.ncbi.nlm.nih.gov/BLAST/fasta.shtml）是生物信息学中用于描述核酸或氨基酸序列的文本格式。通常，一个扩展名为\
    \ `.fa`、`.fna`、`.fna` 或 `.fasta` 的文件会包含数十万条序列，每条序列又包含数万个单字母代码。例如，这样的文件可能代表了对一毫升土壤或海水中遗传多样性的分析，其中每条记录描述了一种不同的细菌物种（微观生物的多样性令人惊叹）。\n\
    \n当生成可迭代对象产生的每个对象是资源密集型的——无论是需要大量计算、大量 I/O 还是占用大量内存——一次只生成一个对象能构建出更好的程序。例如，不会因内存不足错误而崩溃或需要数月才能完成创建集合的程序，就比那些会崩溃的程序要好。对于大数据，能够现在处理*一个数据点*并产生一个部分结果，几乎总是比需要只产生最终的聚合集合要好。对于时间敏感的数据，这样做通常是硬性要求（想想自我调节的工业设备或股票行情，它们实际上是无限的数据流）。\n\
    \n与本节中的其他特性一样，使用标准库 `itertools` 模块中的函数能完成的事情，并非不用它们就无法完成。事实上，在该模块的文档（https://docs.python.org/3/library/itertools.html）中，每个提供的函数都附带了一个（近似的）Python\
    \ 示例实现（通常底层的 CPython 版本是用 C 编写的，在少数边缘情况下行为可能略有不同）。`itertools` 中函数的目的是提供一种用于处理无限或非常大的迭代器的嵌入式语言。然而，即使你*可以*自己编写\
    \ `itertools` 中相对较少的函数，大多数函数也存在陷阱，其中微妙错误的实现最终会使用大量内存，而不是保持完全惰性。\n\n`itertools`\
    \ 本身的文档包含的“食谱”数量几乎与模块中的函数一样多。每个食谱只有几行（通常少于五行），但它以*正确的方式*组合了模块的构建块，而不是犯一些微妙的错误，这些错误可能会破坏边缘情况或导致糟糕的大\
    \ O 行为。\n\n### 用于增量读取 FASTA 文件的生成器函数\n\n```python\nfrom collections import namedtuple\n\
    FASTA = namedtuple(\"FASTA\", \"Description Sequence\")\n\ndef read_fasta(filename):\n\
    \    with open(filename) as fh:\n        line = next(fh)\n        if not line.startswith(\"\
    >\"):\n            raise ValueError(\n                f\"{filename} does not appear\
    \ to be in FASTA format\")\n        description = line[1:].rstrip()\n        nucleic_acids\
    \ = []\n        for line in fh:\n            if line.startswith(\">\"):\n    \
    \            yield FASTA(description, \"\".join(nucleic_acids))\n            \
    \    description = line[1:].rstrip()\n                nucleic_acids = []\n   \
    \         else:\n                nucleic_acids.append(line.rstrip())    # ❶\n\
    \        yield FASTA(description, \"\".join(nucleic_acids))\n```\n\n❶ FASTA 文件通常（但并非统一）在序列块内有\
