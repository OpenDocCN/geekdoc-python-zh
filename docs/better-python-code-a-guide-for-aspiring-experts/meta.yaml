  md: '# 9.1.4 Naive Use of Floating Point Numbers: Granularity


    The dark corners of floating point arithmetic include not only associativity and
    distributivity, as we have seen, but also granularity. The IEEE-754 standard allows
    for expression of numbers across a very large numeric range in comparatively few
    bits; this section looks at an implication of that choice in places where errors
    become tempting.


    Let''s examine a problem, then one solution and one failed try at a solution.


    Trying to find the mean of three floating point numbers


    ```

    >>> import statistics

    >>> import numpy as np

    >>> nums = [1e20, 1.0, -1e20]

    >>> sum(nums)/len(nums)

    0.0

    >>> statistics.mean(nums)

    0.3333333333333333

    >>> np.mean(nums)

    0.0

    ```


    We are able to say at this point that the module `statistics` does a good job
    of averaging, and both the arithmetically obvious hand-rolled approach and NumPy
    do a much worse job (that is, they are flatly wrong).


    I suppose we might stop at commenting "solve your problem by using `statistics`."
    This is not terrible advice for those operations that `statistics` includes, and
    where the operation assumes samples without an inherent order. We''ve seen in
    another puzzle that this list does not include `statistics.median()` in the presence
    of NaNs. But for mean, geometric mean, harmonic mean, mode, multimode, quantiles,
    standard deviation, variance, linear regression, population variance, covariance,
    and a few other operations, the advice is sound.


    Let''s look deeper into this quandary. The underlying problem is that the structure
    of floating point numbers, with a sign, an exponent, and a mantissa, causes the
    distribution of representable numbers to be uneven. In particular, the gap between
    one floating point number and the next representable floating point number can
    be more than another number in a sample collection.


    Granularity of floating point numbers


    ```

    >>> math.nextafter(1e20, math.inf)            # ❶

    1.0000000000000002e+20

    >>> math.nextafter(1e20, -math.inf)           # ❶

    9.999999999999998e+19

    >>> 1e20 + 1.0 == 1e20

    True

    ```'
