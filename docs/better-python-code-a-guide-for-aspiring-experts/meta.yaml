    \ that matters for the current section is that `get_word()` returns some string\
    \ each time it is called.\n\nFor the handful of items inserted and removed from\
    \ the small list in the example, the relative inefficiency is not important. However,\
    \ even in the small example, keeping track of *where* each item winds up by index\
    \ becomes confusing.\n\nAs the number of operations gets large, this approach\
    \ becomes notably painful. The following toy function performs fairly meaningless\
    \ insertions and deletions, always returning five words at the end. But the general\
    \ pattern it uses is one you might be tempted towards in real-world code.\n\n\
    Asymptotic timing for insert-and-delete from list middle\n\n```python\n>>> from\
    \ random import randrange\n>>> def insert_then_del(n):\n...     words = [get_word()\
    \ for _ in range(5)]\n...     for _ in range(n):\n...         words.insert(randrange(0,\
    \ len(words)), get_word())\n...     for _ in range(n):\n...         del words[randrange(0,\
    \ len(words))]\n...     return words\n...\n>>> insert_then_del(100)\n['healingly',\
    \ 'cognitions', 'borsic', 'rathole', 'division']\n>>> insert_then_del(10_000)\n\
    ['ferny', 'pleurapophyses', 'protoavis', 'unhived', 'misinform']\n>>> %timeit\
    \ insert_then_del(100)\n109 µs ± 2.42 µs per loop (mean ± std. dev. of 7 runs,\
    \ 10,000 loops each)\n>>> %timeit insert_then_del(10_000)\n20.3 ms ± 847 µs per\
    \ loop (mean ± std. dev. of 7 runs, 10 loops each)\n>>> %timeit insert_then_del(1_000_000)\n\
    1min 52s ± 1.51 s per loop (mean ± std. dev. of 7 runs, 1 loop each)\n```\n\n\
    Going from 200 operations (counting each of insertion and deletion) to 20,000\
    \ operations takes on the order of 200x as long. At these sizes the lists themselves\
    \ are small enough to matter little; the time involved is dominated by the number\
    \ of calls to `get_word()`, or perhaps a bit to `randrange()`, although we still\
    \ see a 2x proportional slowdown from the list operations.\n\nHowever, upon increasing\
    \ the number of operations by another 100x, to 2 million, linear scaling would\
    \ see an increase from 20 ms to about 2 seconds. Instead it jumps to nearly 2\
    \ minutes, or about a 55x slowdown from linear scaling. I watched my memory usage\
    \ during the 15 minutes that `%timeit` took to run the timing seven times, and\
    \ it remained steady.\n\nIt's not that these operations actually use very much\
    \ memory; rather, every time we insert one word near the middle of a 1 million\
    \ word list, that requires the interpreter to move 500,000 pointers up one position\
    \ in the list. Likewise, each deletion near the middle of a 1 million word list\
    \ requires us to move the top 500,000 pointers back down. This gets much worse\
    \ very quickly as the number of operations increases further.\n\n### 7.2.1 More\
    \ Efficient Data Structures\n\nThere is no one solution to the problem described\
    \ here. On the other hand, there is exceedingly rarely an actual use case for\
    \ the exact behavior implemented by code such as the preceding example. Trust\
    \ me, code like that is not purely contrived for this book—I have encountered\
    \ a great much like it in production systems (with the problem buried beneath\
    \ a lot of other functionality in such code).\n\nIf you merely need to be able\
    \ to insert and delete from *either* the end *or* the beginning of a concrete\
    \ sequence, `collections.deque` gives you exactly what you need. This is not an\
    \ arbitrary middle for insertion and deletion, but very often all you actually\
    \ want is `.appendleft()` and `.popleft()` to accompany `.append()` and `.pop()`.\n\
    \nIn some cases, `sortedcontainers` or `pyrsistent` may have closer to the performance\
    \ characteristics you need, while still offering a *sequence* datatype. Generally,\
    \ using these third-party containers is still only going to get you to O(N×log\
    \ N) rather than O(N), but that remains strikingly better than O(N²).\n\nLater\
    \ in this chapter, in the section “Rolling Your Own Data Structures,” I show an\
    \ example where creating a custom data structure actually *can* make sense. My\
    \ pure-Python implementation of `CountingTree` is able to do exactly the “insert\
    \ into the middle” action that is described in this section, and remains relatively\
    \ efficient. For this narrow and specific use case, my custom data structure is\
    \ actually pretty good.\n\nHowever, instead of reaching for the abovementioned\
    \ collections—as excellent as each of them genuinely is—this problem is probably\
    \ one in which you (or the developer before you) misunderstood what the underlying\
    \ problem *actually* requires.\n\nFor example, a somewhat plausible reason you\
    \ might *actually* want to keep an order for items is because they represent some\
    \ sort of *priority* of actions to be performed or data to be processed. A wonderful\
    \ data structure in which to maintain such priorities is simply a Python `dict`.\
    \ A plausible way of using this fast data structure is to keep your “words” (per\
    \ the earlier example) as keys, and their priority as values.\n\nA priority is\
    \ not exactly the same thing as an index position, but it *is* something that\
    \ very quickly allows you to maintain a sequence for the data you wish to handle,\
    \ while keeping insertion or deletion operations always at O(1). This means, of\
    \ course, that performing N such operations is O(N), which is the best we might\
    \ plausibly hope for. Constructing a sequence *at the end* of such operations\
    \ is both cheap and easy, as the following example shows.\n\nA collection of items\
    \ with a million possible priorities\n\n```python\n>>> from pprint import pprint\n\
    >>> from functools import partial\n>>> priority = partial(randrange, 1, 1_000_000)\n\
    >>> words = {get_word():priority() for _ in range(100_000)}\n>>> words_by_priority\
    \ = sorted(words.items(), key=lambda p: p[1])\n>>> pprint(words_by_priority[:10])\n\
    [('badland', 8),\n ('weakliest', 21),\n```"
