    ## 6.7 总结


    > 事实上，我要说的是，一个糟糕的程序员和一个优秀的程序员之间的区别在于，他是否认为他的代码或他的数据结构更重要。

    > 糟糕的程序员担心代码。优秀的程序员担心数据结构及其关系。

    > —— Linus Torvalds，Linux 创始人


    选择一个适合你任务的数据结构是编程中最重要的任务之一。Python 提供了普遍使用的数据结构——主要是 `dict`、`list`、`tuple` 和 `set`
    内置类型——以及其他一些经常被忽视的类型。许多被忽视的瑰宝存在于标准库的 `collections` 模块中。一些存在于其他模块中，或者仅仅是作为较少使用的内置类型。


    在 Python 包索引 (https://pypi.org/) 上，你可能会找到数百个非常专业的数据结构模块。肯定有某些时候，其中一个正是你所需要的；然而，PyPI
    上的许多内容有些初步或不完整，是某个或几个程序员的爱好。本章引言中提到的 sortedcontainers 和 pyrsistent 库绝对值得了解。例如，我发现
