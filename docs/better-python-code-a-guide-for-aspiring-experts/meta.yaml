    \ = [Color.RED] * 3\n>>> pprint(grid)\n[[<C.BLANK: 1>, <C.BLANK: 1>, <C.BLANK:\
    \ 1>, <C.BLANK: 1>],\n [<C.RED: 2>, <C.BLANK: 1>, <C.BLANK: 1>, <C.BLANK: 1>],\n\
