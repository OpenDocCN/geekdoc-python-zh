  md: '# Note The guts of a metaclass


    Usually, when you create a class in Python, what you are doing “behind the scenes”
    is calling the constructor `type()`. For example, here is a subclass of tuple
    (which needs to use `__new__()` rather than `__init__()` because immutable tuples
    cannot be modified during initialization, when the instance already exists):


    ```

    >>> from math import sqrt

    >>> class Point2d(tuple):

    ...     def __new__(self, x, y):

    ...         return tuple.__new__(self, (x, y))

    ...

    ...     def distance(self):

    ...         return sqrt(self[0]**2 + self[1]**2)

    ...

    >>> point = Point2d(3, 4)

    >>> point

    (3, 4)

    >>> point.distance()

    5.0

    >>> point.__class__.__name__

    ''Point2d''

    ```


    The very useful `collections.namedtuple` creates dynamically generated classes
    similar to `Point2d`. We *could* write this instead:


    ```

    >>> Point2d = type("Point2d", (tuple,),

    ...              {"__new__": lambda self, x, y:

    ...                  tuple.__new__(self, (x, y)),

    ...               "distance": lambda self:

    ...                  sqrt(self[0]**2 + self[1]**2)})

    >>> point = Point2d(3, 4)

    >>> point.distance()

    5.0

    >>> point.__class__.__name__

    ''Point2d''

    ```


    A metaclass is nothing but a class created using a subclass of `type` rather than
    `type` itself as the constructor of a class.² Or equivalently, every class definition
    (in regular format) could contain `metaclass=type` and retain the default behavior.


    2. To be very pedantic, a metaclass does not strictly need to be a subclass of
    `type`. In principle, any callable that takes as arguments a name, a tuple of
    bases, and a dictionary of attributes/methods would work as a metaclass. This
    could even be a plain function if it returned a class object.'
