  md: '# Chapter 9 Numeric Computation in Python


    Python, like almost all other programming languages, simply uses one of the millions
    (or quadrillions) of possible NaNs, regardless of how we arrived at it. The leading
    1 in the mantissa technically makes it a signaling NaN, but no Python library
    I know of pays any attention to this fact. It''s technically possible in Python
    to construct a NaN with a different bit pattern, but it requires arcana from the
    `struct` or `ctypes` modules; no “normal Python” operation will do this, nor pay
    any attention to the special value.


    Let''s try a comparison that at first, certainly, *seems like* it should succeed.


    Comparing floating point numbers, including NaNs


    ```

    >>> a = [math.pi, math.e, float(''nan''), math.tau]

    >>> b = [math.pi, math.e, math.nan, math.tau]

    >>> a == b

    False

    ```


    The bit patterns stored for the NaNs in a and b are, in fact, identical. Likewise
    for the other mentioned mathematical constants. The problem is that according
    to IEEE-754, no NaN will ever compare as equal to another, even if their payloads
    are identical:


    ```

    >>> math.nan == math.nan, math.nan is math.nan

    (False, True)

    >>> math.isnan(math.nan) # ❶

    True

    ```


    ❶ The cleanest way to check whether a value is a NaN


    A NaN is a peculiar Python object that can be self-identical, yet unequal to itself.
    Moreover, the example shown allows us to fix another common problem with floating
    point numbers that other sections will also address. While the examples for a
    and b *do* produce bit-wise identical values for the non-NaN constants, in general,
    “mathematically” equal numbers that we arrive at by different sequences of floating
    point operations will more often than not be unequal because of rounding issues.
    A robust way to compare two iterables of floating point numbers is shown.


    Robustly comparing floating point numbers with NaN equivalence


    ```

    >>> def approxEqualNums(seq1, seq2):

    ...     for x, y in zip(seq1, seq2, strict=True):

