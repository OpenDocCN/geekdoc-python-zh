    \n所示代码*仅*实现了插入操作，这是我们声明的用例。对该数据结构的自然扩展是实现删除操作。或者更改给定位置的值。或者列表和其他数据结构具有的其他功能。其中大多数功能仍然开销不大，但具体细节会因操作而异。\n\
