- md: "## 5.6 Regular Expressions and Catastrophic Backtracking\n\nRegular expressions\
    \ can be extremely nuanced, and are often a concise and powerful way to express\
    \ patterns in text. This book cannot get far into an explanation or tutorial on\
    \ regular expressions, but my title *Regular Expression Puzzles and AI Coding\
    \ Assistants* (Manning Publications, 2023) contains a tutorial introduction in\
    \ its appendix; obviously I recommend that title.\n\nReaders might have worked\
    \ with regular expressions to a fair extent without having fallen into the trap\
    \ of *catastrophic backtracking*. When you do hit this issue, it can be a very\
    \ unpleasant surprise. Patterns that work well and quickly in many circumstances\
    \ can start taking longer, and become worse at an exponential rate as the strings\
    \ matched against grow longer.\n\nFor this example, suppose that we have a file\
    \ in which each line contains a non-descending list of (two-digit) numbers, each\
    \ separated by a space. We’d like to identify all the numbers up to, but not including,\
    \ 90 from each line. Some lines will match and others will not. In this hypothetical\
    \ file format, each line also has a label at its start. Let’s look at an example\
    \ of such a file (in the presentation here, some lines are wrapped because of\
    \ book margins; in the file itself each labeled line is a physical line).\n\n\
    Data in file *numbers.txt*\n\n```\nA: 08 12 22 27 29 38 39 43 47 51 52 73 74 78\
    \ 78 79 80 83 86 87 88 89\nB: 03 04 04 05 16 18 23 26 30 31 33 34 35 36 52 61\
    \ 63 68 69 72 75 80\n    82 83 83 90 92 92 92 95 97\nC: 01 07 14 19 27 30 34 36\
    \ 36 38 44 47 47 50 51 54 58 60 61 62 82 83 83 95\nD: 05 10 13 17 30 31 42 50\
    \ 56 61 63 66 76 90 91 91 93\nE: 03 21 23 24 26 31 31 31 33 36 38 38 39 42 49\
    \ 55 68 79 81\nF: 04 08 13 14 14 16 19 21 25 26 27 34 36 39 43 45 45 50 51 62\
    \ 66 67 71 75 79 82 88\nG: 03 10 27 49 51 64 70 71 82 86 94\nH: 27 31 38 42 43\
    \ 43 48 50 63 72 83 87 90 92\nI: 12 16 18 19 38 39 40 43 54 55 63 73 74 74 75\
    \ 77 78 79 88\n```\n\nAs a naive version of this program, we might try defining\
    \ the pattern:\n\n```\npat = re.compile(r\"^(.+ : )(.+ )+(?=9.)\")\n```\n\nNow\
    \ let's try to process this file using this pattern. Presumably in real code we\
    \ would take some action using the groups in the match, beyond printing out the\
    \ fact it matched or failed.\n\nTiming the regular expression matching\n\n```\n\
    >>> from time import monotonic\n>>> for line in open(\"data/numbers.txt\"):\n\
    ...     start = monotonic()\n...     if match := re.search(pat, line):\n...  \
    \       print(f\"Matched line {line.split(':')[0]} \"\n...               f\"in\
    \ {monotonic()-start:0.3f} seconds\")\n...     else:\n...         print(f\"Fail\
    \ on line {line.split(':')[0]} \"\n...               f\"in {monotonic()-start:0.3f}\
    \ seconds\")\n...\nFail on line A in 0.226 seconds\nMatched line B in 0.000 seconds\n\
    Matched line C in 0.000 seconds\nMatched line D in 0.000 seconds\nFail on line\
    \ E in 0.026 seconds\nFail on line F in 6.738 seconds\nMatched line G in 0.000\
    \ seconds\nMatched line H in 0.000 seconds\nFail on line I in 0.025 seconds\n\
    ```\n\nWe can notice a few things. In the first place, the actual matches always\
    \ take little time (less than a millisecond), while most failures take a moderate\
    \ fraction of a second. Except in the case of line F, which took almost 7 seconds.\
    \ It may not be obvious, but in fact if line F had one more number less than 90,\
    \ it would take twice as long. And one more number after that, another doubling.\
    \ Exponential behavior gets bad quickly.\n\n### Note Visualizing backtracking\n\
    \nUnderstanding what regular expression engines are doing can certainly be confusing.\
    \ In particular, NFAs (nondeterministic finite automata) that perform backtracking\
    \ match in ways that are not immediately intuitive. Let's look at a simpler and\
    \ non-catastrophic example, step by step (in Figure 5.2).\n\n![](img/260d2e810ee4666cb82be4957d5d9141_153_0.png)\n\
    \nWe might have a long number string that uses commas to separate at the thousands,\
    \ millions, billions, etc., according to a Western convention of grouping by three\
    \ digits. The pattern r\"\\d,\\d+$\" should satisfy this.\n\nIn the illustration,\
    \ characters and regex subpatterns that match appear underlined and with a green\
    \ background. Characters and regex subpatterns that fail appear overlined and\
    \ with a red background.\n\nIn order to match, the regex engine scans forward\
    \ to find a digit, then expects a comma to follow. When that fails, it abandons\
    \ the partial match, and scans again for a later digit. Once it finds a digit-comma\
    \ sequence, it looks for repeated digits. Initially, it finds a subsequence of\
    \ the match, but fails when the end-of-string is not reached. So back to scanning\
    \ for the initial digit again, *giving back* part of the match.\n\nLet's think\
    \ about what is happening in the number sequences example. Since the subpattern\
    \ r\"(.+)+\" can actually match any characters, it first tries to match the entire\
    \ string, then finding no lookahead of r\"(?=9.)\" it *backtracks* to consider\
    \ a bit less. Perhaps after that backtracking, it finds that the next unmatched\
    \ characters are \"9.\". If not, it tries backtracking more as the *one-or-more*\
    \ quantifier allows taking fewer repetitions. However, after each backtracking,\
    \ the pattern tries to search forward with more repetitions, keeping the place\
    \ of the last backtrack. When that doesn't succeed, we unwind the tail, and backtrack\
    \ more on the head.\n\nIn a manner similar to the famous Tower of Hanoi puzzle\
    \ (https://en.wikipedia.org/wiki/Tower_of_Hanoi), every possible state of head\
    \ versus tail needs to be explored before the pattern can ultimately fail. One\
    \ might have an intuition that the problem can be solved by using a non-greedy\
    \ repeating group. Intuitively, it feels like maybe the pattern will try to backtrack\
    \ less hard if we aren't greedy in matching as much as possible with the +. However,\
    \ if we set the pattern to `r\"^(.+: )(.+? )+(?=9.)\"`, the time actually gets\
    \ a little bit worse (about 10 seconds on my machine; but an exponential increase\
    \ with length either way). If you think again about the problem, you'll realize\
    \ that matching as little as possible instead of as much as possible doesn't actually\
    \ prevent backtracking since a non-match overall remains \"not possible\" for\
    \ the regex engine. The same possibility space still needs to be explored.\n\n\
    In this exact problem, there is actually an easy solution. If we use the pattern\
    \ `r\"^(.+: )(\\d+? )+(?=9\\d)\"`, all the times become negligible. We match *some\
    \ digits* followed by space rather than *any sequence including space*. However,\
    \ most of the time when you hit this problem it is not as simple as the example.\
    \ Rather, the most typical situation is when you consider alternative sub-patterns\
    \ but do not realize that they can sometimes actually match the same strings (which\
    \ is effectively what we did with the (.+) in which the dot can also be a space).\n\
    \nThe general form of the \"overlapping-alternatives\" problem is (meta-syntactically)\
    \ `(«pat1»|«pat2»|«pat3»)+` where each of the patterns might themselves be complex\
    \ and not make it obvious they can match the same thing. As a simple example,\
    \ consider a subpattern like `\\b(a\\S*|\\S*f\\S*|\\S*z)\\b`; that is, words that\
    \ start with \"a\", words that have an \"f\" in the middle, and words that end\
    \ with \"z\". Writing it in English it's easy to see that \"alferez\" (a high-ranking\
    \ official in medieval Iberia) matches every alternative. If the string contains\
    \ many repetitions of that word, a full match would backtrack across all the options.\n\
    \nThere is not one completely general solution to these kinds of problems or mistakes.\
    \ Sometimes a lookahead for an easier-to-match but less specific pattern can precede\
    \ the real search and allow it to fail quickly. For example, in the current goal,\
    \ we might simply generically assert a space-9 occurs somewhere before really\
    \ matching: `^(?=.* 9)(.+: )(.+ )+(?=9\\d)`. This produces the correct answers\
    \ and match groups, but always in a few microseconds for each line.\n\nIn Python\
    \ 3.11, a very nice new feature was introduced to the `re` module. Actually, two\
    \ closely related features: possessive quantifiers and atomic groups. In both\
    \ cases, the meaning is \"match or fail once, but don't backtrack.\" Despite the\
    \ related purpose of these constructs, it's not obvious that they lend themselves\
    \ to the current goal. But becoming aware of them will benefit you in rewriting\
    \ many problem patterns.\n\n## 5.7 Wrapping Up\n\nThere is heterogeneity in the\
    \ mistakes of this chapter. Python allows and enables you to do a great many things,\
    \ even some that are generally unwise. Some of these techniques are"
  mdcn: "## 5.6 正则表达式与灾难性回溯\n\n正则表达式可以极其精细，通常是表达文本模式的一种简洁而强大的方式。本书无法深入讲解或提供正则表达式教程，但我的著作*《正则表达式谜题与AI编程助手》*（Manning出版社，2023年）在附录中包含了一个入门教程；我显然推荐这本书。\n\
    \n读者可能已经广泛使用过正则表达式，但尚未陷入*catastrophic backtracking*（灾难性回溯）的陷阱。当你确实遇到这个问题时，它可能会带来非常不愉快的意外。在许多情况下运行良好且快速的模式，可能会开始花费更长时间，并且随着匹配字符串的增长，其耗时会以指数级速率变得更糟。\n\
    \n对于这个例子，假设我们有一个文件，其中每一行包含一个非递减的（两位数）数字列表，每个数字之间用空格分隔。我们希望从每一行中识别出所有小于90的数字。有些行会匹配，有些则不会。在这个假设的文件格式中，每一行开头还有一个标签。让我们看一个这样的文件示例（在下面的展示中，由于书籍版面限制，有些行被换行了；在文件本身中，每个带标签的行都是独立的一行）。\n\
    \n文件 *numbers.txt* 中的数据\n\n```\nA: 08 12 22 27 29 38 39 43 47 51 52 73 74 78 78\
    \ 79 80 83 86 87 88 89\nB: 03 04 04 05 16 18 23 26 30 31 33 34 35 36 52 61 63\
    \ 68 69 72 75 80\n    82 83 83 90 92 92 92 95 97\nC: 01 07 14 19 27 30 34 36 36\
    \ 38 44 47 47 50 51 54 58 60 61 62 82 83 83 95\nD: 05 10 13 17 30 31 42 50 56\
    \ 61 63 66 76 90 91 91 93\nE: 03 21 23 24 26 31 31 31 33 36 38 38 39 42 49 55\
    \ 68 79 81\nF: 04 08 13 14 14 16 19 21 25 26 27 34 36 39 43 45 45 50 51 62 66\
    \ 67 71 75 79 82 88\nG: 03 10 27 49 51 64 70 71 82 86 94\nH: 27 31 38 42 43 43\
    \ 48 50 63 72 83 87 90 92\nI: 12 16 18 19 38 39 40 43 54 55 63 73 74 74 75 77\
    \ 78 79 88\n```\n\n作为这个程序的一个朴素版本，我们可能会尝试定义如下模式：\n\n```\npat = re.compile(r\"^(.+\
    \ : )(.+ )+(?=9.)\")\n```\n\n现在让我们尝试使用这个模式来处理这个文件。在实际代码中，我们可能会利用匹配中的分组执行某些操作，而不仅仅是打印出匹配成功或失败的事实。\n\
    \n计时正则表达式匹配\n\n```\n>>> from time import monotonic\n>>> for line in open(\"data/numbers.txt\"\
    ):\n...     start = monotonic()\n...     if match := re.search(pat, line):\n...\
    \         print(f\"Matched line {line.split(':')[0]} \"\n...               f\"\
    in {monotonic()-start:0.3f} seconds\")\n...     else:\n...         print(f\"Fail\
    \ on line {line.split(':')[0]} \"\n...               f\"in {monotonic()-start:0.3f}\
    \ seconds\")\n...\nFail on line A in 0.226 seconds\nMatched line B in 0.000 seconds\n\
    Matched line C in 0.000 seconds\nMatched line D in 0.000 seconds\nFail on line\
    \ E in 0.026 seconds\nFail on line F in 6.738 seconds\nMatched line G in 0.000\
    \ seconds\nMatched line H in 0.000 seconds\nFail on line I in 0.025 seconds\n\
    ```\n\n我们可以注意到几点。首先，实际的匹配总是花费很少的时间（不到一毫秒），而大多数失败则花费了零点几秒。除了F行，它花了将近7秒。可能不太明显，但事实上，如果F行再多一个小于90的数字，它将花费两倍的时间。再加一个数字，时间又会翻倍。指数级行为会迅速变得糟糕。\n\
    \n### 注意 可视化回溯\n\n理解正则表达式引擎在做什么确实可能令人困惑。特别是，执行回溯的NFA（非确定性有限自动机）的匹配方式并不直观。让我们看一个更简单且非灾难性的例子，逐步分析（见图5.2）。\n\
    \n![](img/260d2e810ee4666cb82be4957d5d9141_153_0.png)\n\n我们可能有一个长数字字符串，它使用逗号按照西方每三位分组的惯例来分隔千位、百万位、十亿位等。模式\
    \ r\"\\d,\\d+$\" 应该满足这个要求。\n\n在图中，匹配成功的字符和正则子模式显示为带下划线和绿色背景。匹配失败的字符和正则子模式显示为带上划线和红色背景。\n\
    \n为了匹配，正则表达式引擎向前扫描以找到一个数字，然后期望后面跟着一个逗号。当这失败时，它放弃部分匹配，并再次扫描以寻找后面的数字。一旦找到一个数字-逗号序列，它就寻找重复的数字。最初，它找到了匹配的一个子序列，但在未到达字符串末尾时失败了。因此，它回到再次扫描初始数字，*回退*部分匹配。\n\
    \n让我们思考一下数字序列示例中发生的情况。由于子模式 r\"(.+)+\" 实际上可以匹配任何字符，它首先尝试匹配整个字符串，然后发现没有 r\"(?=9.)\"\
    \ 的前瞻匹配，于是*回溯*以考虑少匹配一点。也许在回溯之后，它发现下一个未匹配的字符是\"9.\"。如果不是，它会尝试更多回溯，因为*一次或多次*量词允许减少重复次数。然而，每次回溯后，模式都会尝试用更多重复次数向前搜索，保持上次回溯的位置。当这不成功时，我们展开尾部，并在头部进行更多回溯。\n\
    \n类似于著名的汉诺塔谜题（https://en.wikipedia.org/wiki/Tower_of_Hanoi），在模式最终失败之前，需要探索头部与尾部的每一种可能状态。人们可能直觉地认为可以通过使用非贪婪重复组来解决这个问题。直觉上，感觉如果我们不贪婪地用+匹配尽可能多的内容，模式可能就不会那么努力地回溯。然而，如果我们设置模式为\
    \ `r\"^(.+: )(.+? )+(?=9.)\"`，时间实际上会变得更糟一点（在我的机器上大约10秒；但无论如何，时间都会随着长度指数级增长）。如果你再思考一下这个问题，你会意识到匹配尽可能少而不是尽可能多的内容实际上并不能防止回溯，因为对于正则表达式引擎来说，整体不匹配仍然是\"\
    不可能的\"。同样的可能性空间仍然需要被探索。\n\n在这个具体问题中，实际上有一个简单的解决方案。如果我们使用模式 `r\"^(.+: )(\\d+? )+(?=9\\\
    d)\"`，所有时间都变得可以忽略不计。我们匹配*一些数字*后跟空格，而不是*包括空格在内的任何序列*。然而，大多数时候当你遇到这个问题时，它并不像这个例子那么简单。更典型的情况是，当你考虑备选子模式时，没有意识到它们有时实际上可以匹配相同的字符串（这实际上就是我们用(.+)所做的，其中的点也可以是空格）。\n\
    \n\"重叠备选项\"问题的一般形式是（元语法）`(«pat1»|«pat2»|«pat3»)+`，其中每个模式本身可能很复杂，并且不容易看出它们可以匹配相同的内容。作为一个简单的例子，考虑像\
    \ `\\b(a\\S*|\\S*f\\S*|\\S*z)\\b` 这样的子模式；即，以\"a\"开头的单词、中间有\"f\"的单词，以及以\"z\"结尾的单词。用英语写出来很容易看出\"\
    alferez\"（中世纪伊比利亚半岛的高级官员）匹配每一个备选项。如果字符串包含许多该单词的重复，完整匹配将跨越所有选项进行回溯。\n\n对于这类问题或错误，没有一个完全通用的解决方案。有时，一个更容易匹配但不够具体的模式的前瞻可以放在真正的搜索之前，从而允许快速失败。例如，在当前目标中，我们可能只需在真正匹配之前泛泛地断言某处存在空格-9：`^(?=.*\
    \ 9)(.+: )(.+ )+(?=9\\d)`。这会产生正确的答案和匹配组，但每一行都只需几微秒。\n\n在Python 3.11中，`re`模块引入了一个非常好的新特性。实际上是两个密切相关的特性：占有量词和原子组。在这两种情况下，含义都是\"\
    匹配或失败一次，但不要回溯。\"尽管这些构造的目的相关，但它们是否适用于当前目标并不明显。但了解它们将使你在重写许多有问题的模式时受益。\n\n## 5.7\
    \ 总结\n\n本章中的错误具有异质性。Python允许并使你能够做很多事情，甚至包括一些通常不明智的事情。其中一些技术是"
