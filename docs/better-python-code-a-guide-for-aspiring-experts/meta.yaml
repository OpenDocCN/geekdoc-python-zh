    It''s possible—even likely—that the same priority occurs for multiple words, occasionally.
    It''s also very uncommon that you *actually* care about *exactly* which order
    two individual items come in out of 100,000 of them. However, even with duplicated
    priorities, items are not dropped, they are merely ordered arbitrarily (but you
    could easily enough impose an order if you have a reason to).

    Deleting items from the **words** data structure is just slightly more difficult
    than was **del words[n]** where it had been a list. To be safe, you''d want to
    do something like:


    ```

    >>> for word in [''producibility'', ''scrambs'', ''marbled'']:

    ...     if word in words:

    ...         print("Removing:", word, words[word])

    ...         del words[word]

    ...     else:

    ...         print("Not present:", word)

    ...

    Not present: producibility

    Removing: scrambs 599046

    Removing: marbled 98

    ```


    The extra **print()** calls and the **else** clause are just for illustration;
    presumably if this approach is relevant to your requirements, you would omit them:


    ```

    >>> for word in [''producibility'', ''scrambs'', ''marbled'']:

    ...     if word in words:

    ...         del words[word]

    ```


    This approach remains fast and scalable, and is quite likely much closer to the
    actual requirements of your software than was misuse of a list.'
