    These sizes are not quite identical since their headers vary (and `array.array`
    uses a modest overallocation strategy, similar to `list`). However, all of these
    are close to the 536,870,912 bytes that are the minimal possible size to represent
    all of these random bytes.

    The question is somewhat more complicated for `rand_list`. Lists use a relatively
    aggressive overallocation of slots; but even apart from such overallocation of
    memory, each slot is a pointer to an internal data structure used to represent
    a Python integer. For byte-sized integers (i.e., between 0 and 255), this structure
    occupies 28 bytes. For larger integers or wider floating point numbers, the size
    of the *boxed number* increases somewhat, albeit slowly. In concept, a list of
    integers needs to contain *both* an array of pointer slots (probably 64-bit on
    modern systems), of roughly the length of the array, and *also*, at a different
    memory address, the underlying boxed number.

