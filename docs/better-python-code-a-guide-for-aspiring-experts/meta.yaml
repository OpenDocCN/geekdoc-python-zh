- md: "## Chapter 5 Just Because You Can, It Doesn't Mean You Should...\n\nIn the\
    \ Python world—and to some degree within other programming language communities—the\
    \ contrasting acronyms EAFP and LBYL (look before you leap) are commonly used.\
    \ In fact, the official Python documentation describes this (https://docs.python.org/3/glossary.html#term-EAFP)³:\n\
    \n> Easier to ask for forgiveness than permission. This common Python coding style\
    \ assumes the existence of valid keys or attributes and catches exceptions if\
    \ the assumption proves false. This clean and fast style is characterized by the\
    \ presence of many try and except statements. The technique contrasts with the\
    \ LBYL style common to many other languages such as C.\n\n— Python Documentation,\
    \ Glossary\n\nIn the main, this discussion is merely a moderate expansion of the\
    \ official documentation. As with some other concerns of this book, preferring\
    \ EAFP is merely a rough rule of thumb; using LBYL is certainly not *categorically*\
    \ a mistake. However, if you find yourself writing an LBYL pattern, it is definitely\
    \ worth asking yourself whether it might better be expressed in an EAFP style.\n\
    \nFor a simple example, suppose that you have files with wordlists, one word per\
    \ line. As often in this book, I've used the SOWPODS wordlist (https://gnosis.cx/better/data/sowpods)\
    \ to randomly select words for the simple code shown. Specifically, I've variously\
    \ run a command similar to `shuf sowpods | head -50 > 50-words`, in a separate\
    \ terminal:\n\n```python\n>>> def total_length(words_file):\n...     total = 0\n\
    ...     while word := words_file.readline():\n...         total += len(word.strip())\
    \  # remove trailing LF\n...     return total\n...\n>>> words1 = open(\"data/50-words\"\
    )\n>>> words2 = open(\"data/50-more-words\")\n>>> total_length(words1)\n454\n\
    >>> total_length(words2)\n444\n```\n\nIt's a simple function, but it does something\
    \ sensible. However, there are a lot of ways this function can go amiss:\n\n```python\n\
    >>> total_length(problem1)\nTraceback (most recent call last):\n  [...]\nValueError:\
    \ I/O operation on closed file.\n\n>>> total_length(problem2)\nTraceback (most\
    \ recent call last):\n  [...]\nAttributeError: 'PosixPath' object has no attribute\
    \ 'readline'\n\n>>> total_length(problem3)\nTraceback (most recent call last):\n\
    \  [...]\nUnicodeDecodeError: 'utf-8' codec can't decode byte 0xe6 in\n  position\
    \ 2: invalid continuation byte\n\n>>> total_length(problem4)\nTraceback (most\
    \ recent call last):\n  [...]\nOSError: [Errno 5] Input/output error\n```\n\n\
    An LBYL approach would be to check for the problems before attempting to call\
    \ `total_length()` with the object you have in hand. This might start as:\n\n\
    ```python\nif not hasattr(words_file, \"readline\"):\n    print(\"words_file is\
    \ not a file-like object\")\nelif words_file.closed:\n    print(\"words_file is\
    \ a closed file\")\nelse:\n    print(f\"Aggregate length is {total_length(words_file)}\"\
    )\n```\n\nThe problem here is that we have not even checked for those exceptions\
    \ I have specifically thought of and created in my REPL session, let alone all\
    \ of those I have so far failed to consider. I honestly do not know a mechanism\
    \ other than trying to answer the question of whether some unread bytes will be\
    \ decodable as UTF-8 (nor from another encoding, if specified in open()). Nor\
    \ do I know how to ask in advance whether I/O might fail. In the above REPL, I\
    \ created that condition by putting a file on a thumb drive and physically removing\
    \ it; similar issues occur on network filesystems and in other circumstances.\n\
    \nThe EAFP approach is simply more flexible and more Pythonic here. For example:\n\
    \n```python\ntry:\n    print(f\"Aggregate length is {total_length(words_file)}\"\
    )\nexcept AttributeError as err:\n    print(f\"words_file is not file-like: {type(words_file)}\"\
    )\nexcept ValueError as err:\n    if hasattr(words_file, \"closed\") and words_file.closed:\n\
    \        print(\"words_file is a closed file\")\n    else:\n        print(f\"\
    ValueError encountered with message {type(err)}\")\nexcept UnicodeDecodeError\
    \ as err:\n    print(f\"UnicodeDecodeError: {err}\")\nexcept OSError as err:\n\
    \    print(f\"OSError (probably I/O problem): {err}\")\nexcept Exception as err:\n\
    \    print(f\"Other error type: {err} {type(err)}\")\n```\n\nThis EAFP code handles\
    \ *more* cases than does LBYL, but it also handles absolutely every failure with\
    \ a generic fallback. We are able to provide different remediation of the problem\
    \ for every exception that we know about, and some very general fallback for those\
    \ problems we did not think about when first writing the code.\n\n### 5.5 Structural\
    \ Pattern Matching\n\nLike a number of other sections of this book, this is a\
    \ discussion of a sin of omission rather than a sin of commission. For a great\
    \ many years before PEPs 384, 385, and 386, which introduced structural pattern\
    \ matching to Python 3.10, beautiful and Pythonic code was written without this\
    \ newish feature being available. In Chapter 1, *Looping Over the Wrong Things*,\
    \ the discussion of the walrus operator (introduced in Python 3.8) similarly showed\
    \ examples where code can simply be *better* by using newer constructs.\n\nIn\
    \ the spirit of this chapter's title, you *could* use `if`, `elif`, and `else`\
    \ statements to express everything that the `match/case` statements do. Indeed,\
    \ `if` is certainly not going away, and it will remain the preferred pattern for\
    \ a great many purposes. Let's look at a brief example where the structural pattern\
    \ matching makes code more readable and shorter. For this, we will analyze some\
    \ responses from the `requests` library (whose virtues are discussed in Chapter\
    \ 8, *Security*).\n\n**Unpacking a response object**\n\n```python\nfrom requests.models\
    \ import Response\ndef process_resp(resp):\n    match resp:\n        case Response(status_code=200,\
    \ headers=headers) \\\n                if \"json\" in headers['Content-Type']:\n\
    \            print(\"Received JSON response\")\n            match resp.json():\n\
    \                case [*args]:\n                    print(f\" -> {', '.join(args[:5])},\
    \ ...\")\n                case {**kws}:\n                    print(f\" -> {',\
    \ '.join(kws.keys())}, ...\")\n        case str() as json:\n            print(f\"\
    \ -> {json[:30]}...\")\n        case Response(status_code=200, text=text):\n \
    \           print(f\"Received {len(text.splitlines())} lines\")\n        case\
    \ Response(status_code=404, text=text):\n            print(f\"Not Found with message\
    \ {text.splitlines()[0]}...\")\n        case Response(status_code=status_code):\n\
    \            print(f\"Received status code {status_code}\")\n        case _:\n\
    \            print(\"'Response' has no status code (wrong type?)\")\n```\n\nIt's\
    \ easy enough to use this function, for example:\n\n```python\n>>> import requests\n\
    >>> # Substitute some URL component path for RESOURCE below\n>>> resp = requests.get(\"\
    https://gnosis.cx/better/RESOURCE\")\n>>> process_resp(resp) # ❶\n```\n\n❶ Something\
    \ will be printed here, depending on the response.\n\nIf you are not familiar\
    \ with the syntax, it can be somewhat surprising. When we name the **Response**\
    \ class and provide what looks like initialization parameters, we are actually\
    \ *either* checking values *or* binding names within the nested block. For example,\
    \ in the first clause, `Response(status_code=200, headers=headers)`, we first\
    \ check whether the matched `resp` object has `resp.status_code == 200`; if that\
    \ holds, we then bind `headers` to `resp.headers` within the block.\n\nIn the\
    \ first case, we need to check additional features of the matched `resp`, which\
    \ we can do with an extra `if` clause. If that case does not hold, including the\
    \ `if` clause, then Python checks the next case, and if it is nonetheless a 200\
    \ status code, it binds `text` to `resp.text`. Following that, we consider 404\
    \ codes in a similar manner. If the first cases are not matched, we generically\
    \ look for whatever status code was available; but we also fall back to a default\
    \ case if the \"response\" lacks any status code at all.\n\nWithin the case that\
    \ contains JSON data, we use another `match` against the actual type of the deserialized\
    \ JSON. It might be either a JSON array (i.e., Python `list`) or a JSON object\
    \ (i.e., Python `dict`). We match that by providing templates for what a list\
    \ or dictionary looks like, capturing the contents as names `args` or `kws`. In\
    \ the case a JSON string is the data, we can use the `as` clause to bind that\
    \ to a name in the block scope (yes, this is strange that the empty string matches\
    \ all strings; but it's convenient).\n\nLet's see the function in use:\n\n```python\n\
    >>> import requests\n>>> basename = \"https://gnosis.cx/better/data\"\n>>> process_resp(requests.get(f\"\
    {basename}/sowpods\"))\n```\n\n³ My lovely colleague, and writer of this book's\
    \ Foreword, Alex Martelli, contributed these lovely acronyms early in the evolution\
    \ of Python's philosophy, perhaps a year or two on either side of 2000."
  mdcn: "## 第五章 你能做，不代表你应该做……\n\n在 Python 世界——以及在一定程度上其他编程语言社区中——EAFP 和 LBYL（三思而后行）这两个对比鲜明的缩写词被广泛使用。事实上，Python\
    \ 官方文档对此有描述（https://docs.python.org/3/glossary.html#term-EAFP）³：\n\n> 请求原谅比请求许可更容易。这种常见的\
    \ Python 编码风格假设存在有效的键或属性，并在假设被证明为假时捕获异常。这种简洁快速的风格以存在大量 `try` 和 `except` 语句为特征。该技术与许多其他语言（如\
    \ C）中常见的 LBYL 风格形成对比。\n\n— Python 文档，术语表\n\n总体而言，本节的讨论只是对官方文档的适度扩展。与本书中讨论的其他一些问题一样，偏好\
    \ EAFP 只是一个粗略的经验法则；使用 LBYL 绝对不是*绝对*错误的。然而，如果你发现自己正在编写 LBYL 模式，绝对值得问问自己，是否用 EAFP\
    \ 风格表达会更好。\n\n举一个简单的例子，假设你有包含单词列表的文件，每行一个单词。正如本书中经常做的那样，我使用了 SOWPODS 单词列表（https://gnosis.cx/better/data/sowpods）来为所示的简单代码随机选择单词。具体来说，我在一个单独的终端中运行了类似\
    \ `shuf sowpods | head -50 > 50-words` 的命令：\n\n```python\n>>> def total_length(words_file):\n\
    ...     total = 0\n...     while word := words_file.readline():\n...         total\
    \ += len(word.strip())  # remove trailing LF\n...     return total\n...\n>>> words1\
    \ = open(\"data/50-words\")\n>>> words2 = open(\"data/50-more-words\")\n>>> total_length(words1)\n\
    454\n>>> total_length(words2)\n444\n```\n\n这是一个简单的函数，但它做了一些有意义的事情。然而，这个函数有很多出错的方式：\n\
    \n```python\n>>> total_length(problem1)\nTraceback (most recent call last):\n\
    \  [...]\nValueError: I/O operation on closed file.\n\n>>> total_length(problem2)\n\
    Traceback (most recent call last):\n  [...]\nAttributeError: 'PosixPath' object\
    \ has no attribute 'readline'\n\n>>> total_length(problem3)\nTraceback (most recent\
    \ call last):\n  [...]\nUnicodeDecodeError: 'utf-8' codec can't decode byte 0xe6\
    \ in\n  position 2: invalid continuation byte\n\n>>> total_length(problem4)\n\
    Traceback (most recent call last):\n  [...]\nOSError: [Errno 5] Input/output error\n\
    ```\n\nLBYL 方法是在尝试使用手头的对象调用 `total_length()` 之前检查问题。这可能开始于：\n\n```python\nif not\
    \ hasattr(words_file, \"readline\"):\n    print(\"words_file is not a file-like\
    \ object\")\nelif words_file.closed:\n    print(\"words_file is a closed file\"\
    )\nelse:\n    print(f\"Aggregate length is {total_length(words_file)}\")\n```\n\
    \n这里的问题是，我们甚至没有检查那些我专门在 REPL 会话中想到并创建的异常，更不用说所有我目前未能考虑到的异常了。老实说，我不知道除了尝试回答“某些未读字节是否可以解码为\
    \ UTF-8”（或者如果 `open()` 中指定了其他编码，则是其他编码）这个问题之外的任何机制。我也不知道如何提前询问 I/O 是否可能失败。在上面的\
    \ REPL 中，我通过将文件放在拇指驱动器上并物理移除它来创建了这种情况；类似的问题发生在网络文件系统和其他情况下。\n\nEAFP 方法在这里更灵活、更\
    \ Pythonic。例如：\n\n```python\ntry:\n    print(f\"Aggregate length is {total_length(words_file)}\"\
    )\nexcept AttributeError as err:\n    print(f\"words_file is not file-like: {type(words_file)}\"\
    )\nexcept ValueError as err:\n    if hasattr(words_file, \"closed\") and words_file.closed:\n\
    \        print(\"words_file is a closed file\")\n    else:\n        print(f\"\
    ValueError encountered with message {type(err)}\")\nexcept UnicodeDecodeError\
    \ as err:\n    print(f\"UnicodeDecodeError: {err}\")\nexcept OSError as err:\n\
    \    print(f\"OSError (probably I/O problem): {err}\")\nexcept Exception as err:\n\
    \    print(f\"Other error type: {err} {type(err)}\")\n```\n\n这段 EAFP 代码处理的情况比\
    \ LBYL *更多*，但它也用一个通用的后备方案处理了每一个失败。我们能够为我们知道的每一个异常提供不同的问题补救措施，并为我们在最初编写代码时没有想到的问题提供一些非常通用的后备方案。\n\
    \n### 5.5 结构化模式匹配\n\n与本书的许多其他章节一样，这是对“不作为之罪”而非“作为之罪”的讨论。在 PEP 384、385 和 386 将结构化模式匹配引入\
    \ Python 3.10 之前的许多年里，即使没有这个新特性，人们也编写了漂亮且 Pythonic 的代码。在第一章《循环错误的事物》中，对海象运算符（在\
    \ Python 3.8 中引入）的讨论同样展示了通过使用新构造可以使代码变得*更好*的例子。\n\n本着本章标题的精神，你*可以*使用 `if`、`elif`\
    \ 和 `else` 语句来表达 `match/case` 语句所做的一切。事实上，`if` 肯定不会消失，它将继续成为许多目的的首选模式。让我们看一个简短的例子，其中结构化模式匹配使代码更具可读性且更短。为此，我们将分析来自\
    \ `requests` 库的一些响应（其优点在第八章《安全》中讨论）。\n\n**解包响应对象**\n\n```python\nfrom requests.models\
    \ import Response\ndef process_resp(resp):\n    match resp:\n        case Response(status_code=200,\
    \ headers=headers) \\\n                if \"json\" in headers['Content-Type']:\n\
    \            print(\"Received JSON response\")\n            match resp.json():\n\
    \                case [*args]:\n                    print(f\" -> {', '.join(args[:5])},\
    \ ...\")\n                case {**kws}:\n                    print(f\" -> {',\
    \ '.join(kws.keys())}, ...\")\n        case str() as json:\n            print(f\"\
    \ -> {json[:30]}...\")\n        case Response(status_code=200, text=text):\n \
    \           print(f\"Received {len(text.splitlines())} lines\")\n        case\
    \ Response(status_code=404, text=text):\n            print(f\"Not Found with message\
    \ {text.splitlines()[0]}...\")\n        case Response(status_code=status_code):\n\
    \            print(f\"Received status code {status_code}\")\n        case _:\n\
    \            print(\"'Response' has no status code (wrong type?)\")\n```\n\n使用这个函数很容易，例如：\n\
    \n```python\n>>> import requests\n>>> # Substitute some URL component path for\
    \ RESOURCE below\n>>> resp = requests.get(\"https://gnosis.cx/better/RESOURCE\"\
    )\n>>> process_resp(resp) # ❶\n```\n\n❶ 这里会打印一些内容，具体取决于响应。\n\n如果你不熟悉这种语法，它可能会有些令人惊讶。当我们命名\
    \ **Response** 类并提供看起来像初始化参数的内容时，我们实际上*要么*在检查值*要么*在嵌套块内绑定名称。例如，在第一个子句中，`Response(status_code=200,\
    \ headers=headers)`，我们首先检查匹配的 `resp` 对象是否具有 `resp.status_code == 200`；如果成立，我们然后在块内将\
    \ `headers` 绑定到 `resp.headers`。\n\n在第一种情况下，我们需要检查匹配的 `resp` 的附加特征，我们可以通过额外的 `if`\
    \ 子句来完成。如果该情况不成立，包括 `if` 子句，那么 Python 会检查下一个情况，如果它仍然是 200 状态码，它会将 `text` 绑定到 `resp.text`。接下来，我们以类似的方式考虑\
    \ 404 代码。如果前几个情况都不匹配，我们通常会查找可用的任何状态码；但如果“响应”完全缺少任何状态码，我们也会回退到默认情况。\n\n在包含 JSON\
    \ 数据的情况中，我们使用另一个 `match` 来匹配反序列化 JSON 的实际类型。它可能是 JSON 数组（即 Python `list`）或 JSON\
    \ 对象（即 Python `dict`）。我们通过提供列表或字典外观的模板来匹配它，将内容捕获为名称 `args` 或 `kws`。在 JSON 字符串是数据的情况下，我们可以使用\
    \ `as` 子句将其绑定到块作用域中的名称（是的，空字符串匹配所有字符串很奇怪；但它很方便）。\n\n让我们看看函数的使用：\n\n```python\n\
    >>> import requests\n>>> basename = \"https://gnosis.cx/better/data\"\n>>> process_resp(requests.get(f\"\
    {basename}/sowpods\"))\n```\n\n³ 我可爱的同事，也是本书前言的作者 Alex Martelli，在 Python 哲学发展的早期贡献了这些可爱的缩写词，大约在\
    \ 2000 年前后一两年。"
