    \ and should be distributed by a separate secure channel, as needed. As well,\
    \ permissions to a .env file should be restricted to the specific user or group\
    \ that has legitimate access rights.\n\n## Using dotenv for storing secrets semi-securely\
    \ in filesystem\n\n```python\n# pip install python-dotenv\nimport os\nfrom os.path\
    \ import join, dirname\nfrom dotenv import load_dotenv\n\ndotenv_path = join(dirname(__file__),\
    \ \".env\")\nload_dotenv(dotenv_path)\n\ndef get_other_data():\n    _username\
    \ = os.environ.get(\"LOCAL_SERVICE_USER\")\n    _password = os.environ.get(\"\
    LOCAL_SERVICE_PASSWORD\")\n    _localservice1 = os.environ.get(\"LOCAL_SERVICE_ADDR_1\"\
    )\n    _localservice2 = os.environ.get(\"LOCAL_SERVICE_ADDR_2\")\n    _localservice3\
    \ = os.environ.get(\"LOCAL_SERVICE_ADDR_3\")\n\n    # ... rest of code ...\n```\n\
    \nThis looks very similar to directly loading environment variables; it is, since\
    \ the code is identical. However, these environment variables are only loaded\
    \ at the time this code runs, and are not in the environment of the parent process.\n\
    The .env file used in this example would look like:\n\n```\n# Local service settings\n\
    LOCAL_SERVICE_USER=DavidMertz\nLOCAL_SERVICE_PASSWORD=\"jNeyQIyE6@pR\"\nLOCAL_SERVICE_PREFIX=192.168.227\n\
    LOCAL_SERVICE_ADDR_1=${LOCAL_SERVICE_PREFIX}.1\nLOCAL_SERVICE_ADDR_2=${LOCAL_SERVICE_PREFIX}.2\n\
    LOCAL_SERVICE_ADDR_3=${LOCAL_SERVICE_PREFIX}.3\n```\n\nA better approach still\
    \ is to use your operating system's keyring service. This is handled somewhat\
    \ differently by macOS, Windows, Linux, and even Android, but all have secure\
    \ systems that do not store plaintext passwords. The module keyring wraps those\
    \ OS-specific details and provides a common interface in Python.\n\n## Using keyring\
    \ for storing secrets securely\n\n```python\n# pip install keyring\nimport keyring\
    \ as kr\n\ndef get_other_data():\n    _username = kr.get_password(\"data-service\"\
    , \"user\")  # ❶\n    _password = kr.get_password(\"data-service\", \"pw\")\n\
    \    _localservice1 = kr.get_password(\"data-service\", \"1\")\n    _localservice2\
    \ = kr.get_password(\"data-service\", \"2\")\n    _localservice3 = kr.get_password(\"\
    data-service\", \"3\")\n\n    # ... rest of code ...\n```\n\n❶ Must have previously\
    \ run `kr.set_password(\"data-service\", \"user\", \"DavidMertz\")` on the system\
    \ running code\n\nUsing the `keyring` module is straightforward, and will not\
    \ keep unencrypted versions of any secrets anywhere on your filesystem. If at\
    \ all possible, use this final approach. However, the first two solutions are\
    \ still *vastly* better than putting secrets directly into source code.\n\n##\
    \ 8.3 “Rolling Your Own” Security Mechanisms\n\nIt is a mistake to construct cryptographic\
    \ protocols if you are not a professional cryptographer. Something that *seems\
    \ obviously strong* probably is not.\n\nThe Python standard library does not include\
    \ most accepted cryptographic primitives. There are reasons for this exclusion\
    \ that are not mere laziness or oversight by the core developers of CPython. Libraries\
    \ dealing with cryptography evolve and fix discovered vulnerabilities at a different\
    \ pace than the Python release cycle. The developers of Python are not themselves\
    \ necessarily cryptologists or cryptanalysts.\n\nDebate sometimes arises among\
    \ the CPython developers about whether this exclusion is the best policy, but\
    \ it is *not* a lack of thought and discussion that led to the decision. Even\
    \ environments like those installed by Miniconda, which include a *little bit*\
    \ beyond the standard library, do not add general cryptographic primitives.\n\n\
    A temptation arises—one which your author has himself been guilty of far too often—to\
    \ just create something “good enough” based on those primitives that *are* in\
    \ the standard library. For example, the standard library has `secrets`, `hmac`,\
    \ and `hashlib`, which include *some* well-accepted cryptographic primitives.\
    \ If it feels like the threat model for your code is limited and you are only\
    \ aiming for “quick and dirty,” you might quickly write something like the following.\n\
    \n### Hastily designed symmetric encryption developed by the author\n\n```python\n\
    >>> def amateur_encrypt(plaintext: str, key: str) -> bytes:\n...     encoded_text\
    \ = plaintext.encode()  # ❶\n...     m = hashlib.sha256()  # ❷\n...     m.update(key.encode())\
    \  # ❸\n...     # Expand length of key to match the full plaintext\n...     hashed_key\
    \ = m.digest() * (1 + len(encoded_text)//32)\n...     ciphertext0 = b\"\".join(\
    \                          # ❹\n...         (a ^ b).to_bytes()\n...         for\
    \ a, b in zip(encoded_text, hashed_key))\n...     ciphertext = b\"\".join(   \
    \                        # ❺\n...         (a ^ b).to_bytes()\n...         for\
    \ a, b in zip(reversed(ciphertext0), hashed_key))\n...     return ciphertext\n\
    ...\n>>> hidden = amateur_encrypt(\"Mary had a little lamb\",\n...           \
    \               \"MyStrongKey!!17\")\n>>> hidden\nb'\\x8f\\xe5SDz\\xb4f\\xc5\\\
    x8f\\x8d\\xc1\\x87\\x91v\\xb9wDF\\xf6q\\xa0'\n```\n\n- ❶ Bytes rather than Unicode\
    \ codepoints\n- ❷ A cryptographically strong hash\n- ❸ A hash of the key as bytes\n\
    - ❹ XOR between each key byte and encoded plaintext byte\n- ❺ I *think* I'm so\
    \ “clever” as to obscure a frequency attack on a Vigenère-like cipher by XORing\
    \ with a reversed cipher.\n\nThis encryption algorithm is good enough that *I\
    \ do not know* any better way to attack it than a brute-force search on the key.\
    \ Decrypting is pretty much symmetrical with the encryption, and works.\n\n###\
    \ Hastily designed matching decryption\n\n```python\n>>> def amateur_decrypt(ciphertext:\
    \ bytes, key: str) -> str:\n...     m = hashlib.sha256()\n...     m.update(key.encode())\n\
    ...     hashed_key = m.digest() * (1 + len(ciphertext)//32)\n...     plainbytes0\
    \ = b\"\".join(\n...         (a ^ b).to_bytes()                          # ❶\n\
    ...         for a, b in zip(ciphertext, hashed_key))\n...     plainbytes = b\"\
    \".join(\n...         (a ^ b).to_bytes()\n...         for a, b in zip(reversed(plainbytes0),\
    \ hashed_key))\n...     return plainbytes.decode()\n...\n>>> amateur_decrypt(hidden,\
    \ \"MyStrongKey!!17\")\n'Mary had a little lamb'\n```\n\n- ❶ Under Python 3.11+\
    \ `.to_bytes()` has a default length of 1. For older Python versions, you need\
    \ to specify `.to_bytes(length=1)`.\n\nHere's the thing. I'm not nearly smart\
    \ enough to know how to attack this encryption algorithm, even if I were given\
    \ many plaintexts and many ciphertexts. However, my sliver of intelligence tells\
    \ me that there are actual cryptanalysts who are *vastly* better at such attacks\
    \ than I am. It is extremely likely that you readers are not better cryptographers\
    \ than I am.⁶ Just because you can't think of how to compromise an algorithm,\
    \ that doesn't mean that someone else can't.\n\nRather than rely on amateur cryptography,\
    \ the correct approach is to obtain the third-party pyca/cryptography library\
    \ (https://cryptography.io/en/latest/). This is implemented correctly by people\
    \ who genuinely understand security, and is updated quickly if weaknesses are\
    \ discovered.\n\nThe protocol setup is probably slightly cumbersome, but is well\
    \ documented in the module documentation. What I show can easily be wrapped in\
    \ functions with simple signatures similar to the amateur ones I created earlier.\n\
    \n### Symmetrical encryption done right\n\n```python\n>>> from pprint import pprint\n\
    >>> import secrets\n>>> from cryptography.hazmat.primitives.kdf.scrypt import\
    \ Scrypt\n>>> from cryptography.hazmat.primitives.ciphers import (\n...     Cipher,\
    \ algorithms, modes)\n\n>>> salt = secrets.token_bytes(16)                   \
    \       # ❷\n>>> kdf = Scrypt(salt=salt, length=32, n=2**14, r=8, p=1)  # ❶\n\
    >>> key = kdf.derive(b\"MyStrongKey!!17\")\n\n>>> iv = secrets.token_bytes(16)\
    \                            # ❷\n>>> cipher = Cipher(algorithms.AES(key), modes.CBC(iv))\n\
    >>> encryptor = cipher.encryptor()\n\n>>> plaintext = b\"Mary had a little lamb\"\
    \n>>> padded = plaintext.ljust(32, b\"\\x00\")                  # ❸\n>>> encrypted\
    \ = encryptor.update(padded) + encryptor.finalize()\n>>> pprint(encrypted, width=68)\
    \                             # ❹\n(b'\\xfd\\xaf}s\\x9e8#\\xe4\\x94Fh\\x83\\x18\\\
    x17j\\xa1\\xe7\\x8a\\x98 '\n b'\\xc3\\xd9\\x07\\xee\\x1e\\xe9\\x9c\\xf2\\xec\\\
    x90\\xf74')\n```\n\n⁶. As an idle diversion, I have created a challenge at https://gnosis.cx/better.\
    \ For this challenge, I have created 1000 ciphertexts, all of which are encrypted\
    \ with the same key, using *exactly* the encryption code published here. Moreover,\
    \ all 1000 plaintexts these are encryptions of are sentences from a draft of this\
    \ book (they may not occur verbatim after later editing, though). If any reader\
    \ can identify the key used, or even two of the plaintext sentences, I will deliver\
    \ to them a signed copy of the print version of this book."
  mdcn: "必须始终将其排除在版本控制之外（例如，在 `.gitignore` 中），并应根据需要通过单独的安全渠道进行分发。同时，`.env` 文件的权限应限制为具有合法访问权限的特定用户或组。\n\
    \n## 使用 dotenv 在文件系统中半安全地存储密钥\n\n```python\n# pip install python-dotenv\nimport\
    \ os\nfrom os.path import join, dirname\nfrom dotenv import load_dotenv\n\ndotenv_path\
    \ = join(dirname(__file__), \".env\")\nload_dotenv(dotenv_path)\n\ndef get_other_data():\n\
    \    _username = os.environ.get(\"LOCAL_SERVICE_USER\")\n    _password = os.environ.get(\"\
    LOCAL_SERVICE_PASSWORD\")\n    _localservice1 = os.environ.get(\"LOCAL_SERVICE_ADDR_1\"\
    )\n    _localservice2 = os.environ.get(\"LOCAL_SERVICE_ADDR_2\")\n    _localservice3\
    \ = os.environ.get(\"LOCAL_SERVICE_ADDR_3\")\n\n    # ... 其余代码 ...\n```\n\n这看起来与直接加载环境变量非常相似；确实如此，因为代码是相同的。然而，这些环境变量仅在代码运行时加载，而不在父进程的环境中。\n\
    本示例中使用的 `.env` 文件如下所示：\n\n```\n# 本地服务设置\nLOCAL_SERVICE_USER=DavidMertz\nLOCAL_SERVICE_PASSWORD=\"\
