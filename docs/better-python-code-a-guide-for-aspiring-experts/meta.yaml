    \ 内部有一些略显晦涩但非常有用的角落。了解 Python 语法或标准库的一些功能，通常可以使你的工作更轻松，并使你的代码对他人更友好。\n\n最后两个错误涉及\
    \ Python 新手开发者，尤其是那些更熟悉静态类型编程语言的人常见的困惑。虽然本书的导言部分讨论了为什么本书不专门深入探讨 Python 中的静态类型分析世界，但类型注解的存在有时会误导一些程序员。事实上，本书本身偶尔也会使用带注解的示例；但它这样做只是为了强调正确的读者期望；换句话说，对于大多数\
    \ Python 用户来说，它们只是一种文档形式（尽管通常很有用的形式）。\n\n本页有意留白\n\n# 你能做，不代表你应该做……\n\nPython 有许多功能的存在都有其充分的理由。然而，其中许多特性创造了法学家所称的“有吸引力的公害”。¹\
