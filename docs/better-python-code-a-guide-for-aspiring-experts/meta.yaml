    However, there may be quite a few words in this wordlist, so we''d like to limit
    it. Specifically, we''d like to limit it based on a criterion provided by a user;
    in our case, users may request to only see words having a certain prefix.


    A seemingly simple function with exposed injection attack


    ```

    >>> def some_words():

    ...     prefix = input("[Prefix]? ")

    ...     print("-"*40)

    ...     with psycopg.connect(

    ...             dbname=''mistakes'',

    ...             host=''localhost'',

    ...             user=''developer'',

    ...             password=password) as conn:

    ...         with conn.cursor() as cur:

    ...             cur.execute(f"SELECT word FROM wordlist "

    ...                         f"WHERE word LIKE ''{prefix}%''")

    ...             for record in cur:

    ...                 print(record[0])

    ...         conn.commit()

    ...

    >>> some_words()

    [Prefix]? p

    ----------------------------------------

    potentialities

    platter

    pulverizations

    photoionising

    ```


    So far, it is all still straightforward and simple. But let''s try calling the
    function another time.


    An injection attack in action


    ```

    >>> some_words()

    [Prefix]? '';DELETE FROM wordlist;--

    ----------------------------------------

    ```


    The problem is not, of course, simply that nothing matches the strange user input.
    It''s that we actually did the following:


    +   - Select words matching ''''

    - Delete *everything* in the table

