    >>> %timeit insert_many(CountingTree, 10_000)\n38 ms ± 755 µs per loop (mean ±\
    \ std. dev. of 7 runs, 10 loops each)\n\n>>> %timeit insert_many(list, 100_000)\n\
    690 ms ± 5.84 ms per loop (mean ± std. dev. of 7 runs, 1 loop each)\n>>> %timeit\
    \ insert_many(CountingTree, 100_000)\n674 ms ± 20.1 ms per loop (mean ± std. dev.\
    \ of 7 runs, 1 loop each)\n\n>>> %timeit insert_many(list, 1_000_000)\n1min 5s\
    \ ± 688 ms per loop (mean ± std. dev. of 7 runs, 1 loop each)\n>>> %timeit insert_many(CountingTree,\
    \ 1_000_000)\n9.72 s ± 321 ms per loop (mean ± std. dev. of 7 runs, 1 loop each)\n\
    ```\n\nWithout having yet said just what a `CountingTree` is, I can say that I\
    \ spent more time ironing out the bugs in my code than I entirely want to admit.\
    \ It's not a large amount of code, as you'll see, but the details are futzy.\n\
    \nNotable points are that even though I've created a data structure optimized\
    \ for *exactly* this task, it does worse than `list` for 100 items. `CountingTree`\
    \ does worse than `list` for 10,000 items also, even by a slightly larger margin\
    \ than for 100. However, my custom data structure pulls ahead *slightly* for 100,000\
    \ items; and then *hugely* so for a million items.\n\nIt would be painful to use\
    \ `list` for the million-item sequence, and increasingly worse if I needed to\
    \ do even more `collection.insert()` operations.\n\n## Performing Magic in Pure\
    \ Python\n\nThe source code for `binary_tree.py` is available at the book's website\
    \ (https://gnosis.cx/better). But we will go through most of it here. The basic\
    \ idea behind my *Counting Binary Tree* data structure is that I want to keep\
    \ a binary tree, but I also want each node to keep a count of the total number\
    \ of items within it and all of its descendants. Unlike some other tree data structures,\
    \ we specifically *do not* want to order the node values by their inequality comparison,\
    \ but rather to maintain each node exactly where it is inserted.\n\n![Figure 7.1](img/260d2e810ee4666cb82be4957d5d9141_211_0.png)\n\
    \n**Figure 7.1** A graph of a Counting Binary Tree.\n\nIn Figure 7.1, each node\
    \ contains a value that is a single letter; in parentheses we show the *length*\
    \ of each node with its subtree. Identical values can occur in multiple places\
    \ (unlike, e.g., for a set or a dictionary key). Finding the `len()` of this data\
    \ structure is a matter of reading a single attribute. But having this length\
    \ available is what guides insertions.\n\nIt is very easy to construct a *sequence*\
    \ from a tree. It is simply a matter of choosing a deterministic rule for how\
    \ to order the nodes. For my code, I chose to use *depth-first, left-to-right*;\
    \ that's not the only possible choice, but it is an obvious and common one. In\
    \ other words, every node value occurs at exactly one position in the sequence,\
    \ and every sequence position (up to the length) is occupied by exactly one value.\
    \ Since our use case is approximately random insertion points for new items, no\
    \ extra work is needed for rebalancing or enforcing any other invariants.\n\n\
    The code shown *only* implements insertions, our stated use case. A natural extension\
    \ to the data structure would be to implement deletions as well. Or changing values\
    \ at a given position. Or other capabilities that lists and other data structures\
    \ have. Most of those capabilities would remain inexpensive, but details would\
    \ vary by the specific operation, of course.\n\nThe basic implementation of Counting\
    \ Binary Tree\n\n```python\nclass CountingTree:\n    def __init__(self, value=EMPTY):\n\
    \        self.left = EMPTY\n        self.right = EMPTY\n        self.value = value\n\
    \        self.length = 0 if value is EMPTY else 1\n\n    def insert(self, index:\
    \ int, value):\n        if index != 0 and not 0 < index <= self.length:\n    \
    \        raise IndexError(\n                f\"CountingTree index {index} out\
    \ of range\")\n\n        if self.value is EMPTY:\n            self.value = value\n\
    \        elif index == self.length:\n            if self.right is EMPTY:\n   \
    \             self.right = CountingTree(value)\n            else:\n          \
    \      self.right.insert(\n                    index - (self.left.length + 1),\
    \ value)\n        elif index == 0 and self.left is EMPTY:\n            self.left\
    \ = CountingTree(value)\n        else:\n            if index > self.left.length:\n\
    \                self.right.insert(\n                    index - (self.left.length\
    \ + 1), value)\n            else:\n                self.left.insert(index, value)\n\
    \n        self.length += 1\n```\n\nThis much is all we actually need to run the\
    \ benchmarks performed here. Calling `CountingTree.insert()` repeatedly creates\
    \ trees much like that in the figure. The `.left` and `.right` attributes at each\
    \ level might be occupied by the sentinel `EMPTY`, which the logic can utilize\
    \ for nodes without a given child.\n\nIt's useful also to define a few other behaviors\
    \ we'd like a collection to have.\n\nAdditional methods within Counting Binary\
    \ Tree\n\n```python\ndef append(self, value):\n    self.insert(len(self), value)\n\
    \ndef __iter__(self):\n    if self.left is not EMPTY:\n        yield from self.left\n\
    \    if self.value is not EMPTY:\n        yield self.value\n    if self.right\
    \ is not EMPTY:\n        yield from self.right\n\ndef __repr__(self):\n    return\
    \ f\"CountingTree({list(self)})\"\n```"
