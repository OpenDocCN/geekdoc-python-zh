    Python 有一些数据结构是 `collections.Sequence` 的虚拟子类，但它们避免了 Python 列表所需的大部分间接引用和值装箱。这些类型包括
    `bytes`、`bytearray` 和 `array.array`。最后一种是一系列数据结构，因为它可以被配置为存储相同数值数据类型的、相同位宽的各种元素。


    有一个相对狭窄的领域适合使用 Python 标准库的 `array` 模块，而不是“更进一步”使用 NumPy，但在那个狭窄的用例范围内，能够使用 `array.array`
