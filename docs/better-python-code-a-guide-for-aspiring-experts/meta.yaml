  md: 'The Python documentation on type hints is a good place to start if this topic
    interests you: https://docs.python.org/3/library/typing.html. The mypy project
    (https://mypy.readthedocs.io/) is the tool closest to an “official” type-checking
    tool for Python. The Pyre project (https://pyre-check.org/) is a popular type-checking
    tool, and is especially useful for large codebases. Pyright (https://microsoft.github.io/pyright)
    and Pytype (https://google.github.io/pytype/) likewise serve similar purposes.
    The PyCharm IDE (https://www.jetbrains.com/pycharm/) has excellent support for
    type checking and type inference, and is worth considering if you are looking
    for a Python IDE.


    # A.5 Numeric and Dataframe Libraries


    At the heart of much of the numeric computation performed in Python is the library
    NumPy (https://numpy.org/). NumPy provides a powerful and efficient multidimensional
    array type, and a large number of functions for operating on these arrays. NumPy
    is developed in C, and a bit for Fortran, but is explicitly a Python library that
    cannot be used outside of Python. The idioms used for vectorized computation in
    NumPy are often quite different from those used in “native Python,” and a number
    of books and articles have been and will be written on its idioms.


    For the purpose of leaving NumPy best practices out of this book, it’s sufficient
    to note that those best practices are generally different from those used in “native
    Python.” In many ways, learning NumPy is like learning a domain-specific language
    (DSL) for numeric computation that resides *within* Python.


    Tensor libraries such as TensorFlow (https://www.tensorflow.org/), PyTorch (https://pytorch.org/),
    CuPy (https://cupy.dev/), and JAX (https://jax.readthedocs.io) borrow many concepts
    from NumPy, but are reimplemented in C++ and CUDA, and are often used for machine
    learning applications. Probably even more than with NumPy, using these Python
    libraries is effectively using DSLs inside Python code (not strictly syntactically
    so, but in feel, yes).


    A powerful abstraction for working with tabular data is *dataframes*. This concept
    was popularized by the R programming language, and is mostly widely used in Python
    via the Pandas library (https://pandas.pydata.org/). Pandas is itself built on
    top of NumPy. Other libraries, such as Polars (https://www.pola.rs/) and RAPIDS
    (https://rapids.ai/) via its GPU-accelerated cuDF library, provide similar functionality,
    and some advantages over Pandas.


    As with NumPy, using Pandas and other dataframe libraries requires quite different
    idioms than those used in “native Python.” In particular, these libraries very
    commonly use “method chaining” or “fluent interfaces” to express intentions. This
    style is quite powerful and expressive, and is the topic of a great many books
    (e.g., *Pandas for Everyone: Python Data Analysis*, 2nd edition, by Daniel Y.
    Chen [Addison-Wesley, 2022], ISBN-13: 9780137891054), but is omitted from this
    one.'
