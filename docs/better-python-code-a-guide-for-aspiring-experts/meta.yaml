    \ recursion depth exceeded in comparison\n```\n\nThe solution to these issues\
    \ is to add some unfortunate ugliness to code, as in the examples shown here.\n\
    \nUgly but safe flatten function\n\n```\n>>> def flatten_safe(o, items=[]):\n\
    ...     if isinstance(o, (str, bytes)):          # ❶\n...         items.append(o)\n\
