  md: '# Chapter 8 Security


    There is a very crucial part of the quoted documentation to pay attention to:
    “mostly HTTP.” Using urllib.request with modern HTTPS websites (or microservices)
    is exceedingly difficult. It is possible, but only just barely and after great
    frustration.


    For example, a footnote in this chapter mentions challenges accompanying this
    book. It happens that my website is proxied by Cloudflare (https://www.cloudflare.com/)
    to provide it with SSL/TLS and content caching (under their free plan, for my
    limited needs); the underlying content is contained on GitHub Pages (https://pages.github.com/).
    On my local computer I use a VPN. None of this is an uncommon kind of configuration
    for static pages, but it is indeed not a 2003-style page on a single server with
    a fixed DNS entry.


    Let’s try to retrieve that page.


    Retrieving an HTTPS page using requests


    ```

    >>> import requests

    >>> domain = "www.gnosis.cx"

    >>> resource = "better"

    >>> resp = requests.get(f"https://{domain}/{resource}/")

    >>> resp.status_code

    200

    >>> for header in ["Content-Type", "Date", "Server"]:

    ...     print(f"{header}: {resp.headers[header]}")

    ...

    Content-Type: text/html; charset=utf-8

