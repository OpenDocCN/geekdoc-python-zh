- md: '## 8.5 Using the Third-Party requests Library


    The Python standard library provides several mid-level capabilities within the
    `urllib` module, and specifically within its `urllib.request`, `urllib.error`,
    `urllib.parse`, and `urllib.robotparser` submodules. For low-level SSL/TLS, it
    is possible to work with the standard library `ssl` module.


    The `urllib.request` Python documentation (https://docs.python.org/3/library/urllib.request.html#module-urllib.request)
    states:


    > The urllib.request module defines functions and classes which help in opening
    URLs (mostly HTTP) in a complex world — basic and digest authentication, redirections,
    cookies and more.


    This very same page immediately states, however, that the third-party `requests`
    package (https://requests.readthedocs.io/en/latest/) is "recommended for a higher-level
    HTTP client interface." There is a good reason for this recommendation: Working
    with the low-level modules Python''s standard library provides is cumbersome and
    error prone. You very rarely need to deal with the low-level details of SSL/TLS
    contexts, DNS resolution, proxies, and many other issues that are needed to make
    HTTP(S) requests on the modern web.


    There is a very crucial part of the quoted documentation to pay attention to:
    “mostly HTTP.” Using urllib.request with modern HTTPS websites (or microservices)
    is exceedingly difficult. It is possible, but only just barely and after great
    frustration.


    For example, a footnote in this chapter mentions challenges accompanying this
    book. It happens that my website is proxied by Cloudflare (https://www.cloudflare.com/)
    to provide it with SSL/TLS and content caching (under their free plan, for my
    limited needs); the underlying content is contained on GitHub Pages (https://pages.github.com/).
    On my local computer I use a VPN. None of this is an uncommon kind of configuration
    for static pages, but it is indeed not a 2003-style page on a single server with
    a fixed DNS entry.


    Let’s try to retrieve that page.


    ### Retrieving an HTTPS page using requests


    ```python

    >>> import requests

    >>> domain = "www.gnosis.cx"

    >>> resource = "better"

    >>> resp = requests.get(f"https://{domain}/{resource}/")

    >>> resp.status_code

    200

    >>> for header in ["Content-Type", "Date", "Server"]:

    ...     print(f"{header}: {resp.headers[header]}")

    ...

    Content-Type: text/html; charset=utf-8

    Date: Mon, 20 Feb 2023 03:37:25 GMT

    Server: cloudflare

    >>> len(resp.text)

    24974

    ```


    There is nothing difficult here, and I feel confident that the maintainers of
    requests are following all relevant security and transport protocols. What about
    if we try to do the same thing with the Python standard library?


    ### Failing to retrieve an HTTPS page using urllib


    ```python

    >>> import urllib.request

    >>> try:

    ...     url = f"https://{domain}/{resource}/"

    ...     resp = urllib.request.urlopen(url)

    ... except Exception as err:

    ...     print(f"{err.__class__.__name__}: {err}")

    ...

    HTTPError: HTTP Error 403: Forbidden

    >>> import ssl

    >>> try:

    ...     ctx = ssl.create_default_context(ssl.Purpose.CLIENT_AUTH)

    ...     url = f"https://{domain}/{resource}/"

    ...     resp = urllib.request.urlopen(url, context=ctx)

    ... except Exception as err:

    ...     print(f"{err.__class__.__name__}: {err}")

    ...

    URLError: <urlopen error Cannot create a client socket with a

    PROTOCOL_TLS_SERVER context (_ssl.c:795)>


    >>> cert = ssl.get_server_certificate((domain, 443))

    >>> print(f"{cert[:157]}\n...\n{cert[-145:]}")       # ③

    -----BEGIN CERTIFICATE-----

    MIIFMTCCBNigAwIBAgIQDJcUxb0DI0d5ZhI2SbcvOzAKBggqhkjOPQQDAjBKMqsw

    CQYDVQQGEwJVUzEZMBcGA1UEChMQQ2xvdWRmbGFyZSwgSW5jLjEgMB4GA1UEAxMX

    ...


    MAoGCCqGSM49BAMCA0cAMEQCIFv5r9ARdjfr5ctvjV57d2i18t0wGWRAS9HwDr/

    zyy8AiA4V5gjyLS5wRF24bqfyl y64AnKQqOJyAMMCXy5HAK95A==

    -----END CERTIFICATE-----


    >>> import socket                          # ④

    >>> answers = socket.getaddrinfo("www.gnosis.cx", 443)

    >>> (family, type_, proto, canonname, (address, port)) = answers[0]

    >>> address

    ''172.67.139.241''


    >>> try:

    ...     ctx = ssl.create_default_context(cadata=cert)

    ...     url = f"https://{address}:{port}/{resource}/"

    ...     resp = urllib.request.urlopen(url, context=ctx)

    ... except Exception as err:

    ...     print(f"{err.__class__.__name__}: {err}")

    ...

    URLError: <urlopen error [SSL: WRONG_VERSION_NUMBER] wrong

    version number (_ssl.c:992)>

    ```


    1. Trigger a frantic search for error explanations at this point.

    2. The Python docs and some user bugs suggest we need an SSL/TLS context.

    3. Some vague hints suggest we are not finding the needed certificate.

    4. Or maybe we need the actual IP address DNS resolves to?


    I am confident that there genuinely is *some magic incantation* that would convince
    Python''s standard library to fetch the content of this rather ordinary, static
    web page. With a great deal more effort, I would probably eventually find it.


    In the meanwhile, I will be happy and productive (and secure) using the third-party
    **requests** library, as the CPython developers themselves recommend.


    ## 8.6 SQL Injection Attacks When Not Using DB-API


    SQL injection attacks are a general security vulnerability across almost all languages
    that are able to utilize SQL databases. It''s not a *mistake* that is specific
    to Python, but the solution is specifically to use the full capabilities of Python''s
    DB-API. Other programming languages and other libraries or drivers have their
    own solutions, but in Python, it falls under the DB-API, which almost all database
    drivers follow.


    Part of what the DB-API provides is a way of passing parameters to an SQL call
    in a way that is guaranteed to be safe against injection attacks. For most modern
    RDBMSs (relational database management systems), the query parameters are, in
    fact, passed as a separate stream from the query template. However, other than
    feeling happy that efficiency is improved thereby, you do not need to worry about
    that internal detail. You simply can be assured that the DB-API and driver module
    are keeping you safe.


    Let''s see a simple example of using the DB-API.


    ### A simple (and safe) example of using the DB-API


    ```python

    >>> password = keyring.get_password("postgres", "pw")    # ❶

    >>> import psycopg2                                        # ❷

    >>> with psycopg2.connect(

    ...         dbname=''mistakes'',

    ...         host=''localhost'',

    ...         user=''developer'',

    ...         password=password) as conn:

    ...     with conn.cursor() as cur:

    ...         cur.execute("SELECT * FROM wordlist")

    ...         for record in cur:

    ...             print(record)

    ...     conn.commit()

    ...

    (''biochips'',)

    (''fluoroacetate'',)

    (''potentialities'',)

    (''steelwares'',)

    (''edacity'',)

    (''platter'',)

    (''pulverizations'',)

    (''entertains'',)

    (''photoionising'',)

    ```


    ❶ Per the mistake of putting secrets in source code, a good approach is used here.

    ❷ The Psycopg 3 driver to connect to PostgreSQL


    However, there may be quite a few words in this wordlist, so we''d like to limit
    it. Specifically, we''d like to limit it based on a criterion provided by a user;
    in our case, users may request to only see words having a certain prefix.


    ### A seemingly simple function with exposed injection attack


    ```python

    >>> def some_words():

    ...     prefix = input("[Prefix]? ")

    ...     print("-"*40)

    ...     with psycopg.connect(

    ...             dbname=''mistakes'',

    ...             host=''localhost'',

    ...             user=''developer'',

    ...             password=password) as conn:

    ...         with conn.cursor() as cur:

    ...             cur.execute(f"SELECT word FROM wordlist "

    ...                         f"WHERE word LIKE ''{prefix}%''")

    ...             for record in cur:

    ...                 print(record[0])

    ...         conn.commit()

    ...

    >>> some_words()

    [Prefix]? p

    ----------------------------------------

    potentialities

    platter

    pulverizations

    photoionising

    ```


    So far, it is all still straightforward and simple. But let''s try calling the
    function another time.


    ### An injection attack in action


    ```python

    >>> some_words()

    [Prefix]? '';DELETE FROM wordlist;--

    ----------------------------------------

    ```


    The problem is not, of course, simply that nothing matches the strange user input.
    It''s that we actually did the following:


    - Select words matching ''''

    - Delete *everything* in the table

    - Include a final comment of --'''
