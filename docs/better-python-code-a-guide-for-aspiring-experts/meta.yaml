  md: "# # 5.2 Monkeypatching\n\nA powerful, and therefore easily misused, capability\
    \ in highly dynamic languages like Python is that they allow *monkeypatching*.\
    \ With monkeypatching, even existing modules and classes can be modified at runtime\
    \ to exhibit different behaviors that might be better specialized for the needs\
    \ of a specific project.\n\nThe programming language Ruby is, in many ways, quite\
    \ similar to Python. It is even more dynamic, so a few things that are difficult\
    \ to impossible to monkeypatch in Python are easy in Ruby (mainly the possibility\
    \ of dynamically altering even built-in types, which Python does not allow). Partially\
    \ as a consequence of such broad power, monkeypatching became much more deeply\
    \ incorporated into Ruby's culture than it has in Python. In turn, this cultural\
    \ trend also largely became seen as an antipattern among Ruby developers; however,\
    \ a great deal of code (such as Ruby's biggest mover, the Rails web framework)\
    \ included monkeypatching that could not be removed without breaking backward\
    \ compatibility.\n\nAn influential article in that ecosystem was Avdi Grimm's\
    \ 2008 \"Monkey Patching Is Destroying Ruby\" (https://avdi.codes/why-monkeypatching-is-destroying-ruby/).\
    \ You can tell from the date that this discussion is not new. In fact, Grimm acknowledges\
    \ Python as the source of the term, and a predecessor language in allowing it.\n\
    \nAlready in 2008, monkeypatching was well-known in Python, but not especially\
    \ widely used. In 2023, as I write this, that characterization remains true. You\
    \ might certainly encounter Python code that uses monkeypatching, but only moderately\
    \ often. Deciding to use monkeypatching in your own code is *usually* a mistake,\
    \ but not *always*. Classes, instances, source code itself, and a few other objects\
    \ can be monkeypatched in Python. For this example, though, I will present the\
    \ most common use of the technique: monkeypatching modules.\n\nFor a slightly\
    \ contrived example that nonetheless genuinely exemplifies the situations that\
    \ tend to motivate Python developers to monkeypatch, suppose you have an application\
    \ that processes CSV data that comes from a vendor. A sample data file might look\
    \ like this.\n\nData in file *accounts.csv*\n\n```\nBalance,AccountNum,Owner\n\
    2913.94,3850234082,Omar\n9102.53,0028382910,Sarita\n5181.32,8213593023,David\n\
    ...more rows...\n```\n\nYour application might look something like a more sophisticated\
    \ version of this:\n\n```\nimport re\nimport sys\n\ndef get_5k_balances(rows):\n\
    \    for row in rows:\n```"
