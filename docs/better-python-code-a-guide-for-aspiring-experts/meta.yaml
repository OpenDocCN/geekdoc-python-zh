    \ *A Grab Bag of Python Gotchas*. Good names—and following Pythonic conventions\
    \ about naming—remain important as you become a more sophisticated programmer.\n\
    \nSeveral more mistakes discussed were mistakes of ignorance or forgetfulness.\
    \ Python, in truth, has a few slightly obscure, yet enormously useful, corners\
    \ within it. Knowing about some capabilities of the Python syntax or standard\
    \ library can often make your work easier, and make your code friendlier for others\
    \ to read.\n\nA final two mistakes concerned a common confusion among newish Python\
    \ developers, and especially those more familiar with statically typed programming\
    \ languages. While the introductory material of this book discussed why this book\
    \ does not specifically delve into the world of static type analysis in Python,\
    \ the presence of type annotations can often mislead some programmers. This book\
    \ itself, in fact, occasionally uses examples with annotations; but it only does\
    \ so in order to highlight correct reader expectations; in other words, they are\
    \ merely a form of documentation for most Python users (albeit an often useful\
    \ form).\n\nThis page intentionally left blank\n\n# Just Because You Can, It Doesn’t\
    \ Mean You Should…\n\nPython has a great many capabilities that exist for good\
    \ reasons. However, many of these features create what jurists call an “attractive\
    \ nuisance.”¹ This chapter is a mixture of positive and negative advice, in truth.\
    \ It presents some slightly unusual constructs that a new Python developer often\
    \ learns and becomes excited about, before finally stumbling over the pitfalls\
    \ those possibilities present. Hopefully, reading the mistakes here will facilitate\
    \ the learning part but discourage the misuse follow-up. In some other mistakes,\
    \ I simply discuss some techniques that people new to Python may not have known\
    \ about (but which are mistakes not to avail yourself of); in one case (and another\
    \ half case), people who have long used Python may also not be familiar with a\
    \ newer feature.\n\n## 5.1 Metaclasses\n\nThis section leans into slightly more\
    \ arcane areas of Python’s design. If you’ve seen metaclasses discussed, or if\
    \ they are used in the codebases you work with, this is definitely for you. If\
    \ you haven’t, it’s still worth reading, but treat the topic as an amusement or\
    \ an enlightenment, rather than as a necessity. Libraries you use might use metaclasses,\
    \ even if you are not aware of the fact; knowing more is always handy.\n\nMetaclasses\
    \ push at the edge of the highly dynamic nature of Python. Even class objects\
    \ can themselves be created in different manners than their code describes by\
    \ declaring a metaclass. Moreover, the choice of metaclass can itself, in principle,\
    \ be dynamically chosen.\n\n1. Attractive nuisance: “a legal doctrine which makes\
    \ a person negligent for leaving a piece of equipment or other condition on property\
    \ which would be both attractive and dangerous to curious children. These have\
    \ included tractors, unguarded swimming pools, open pits, and abandoned refrigerators”\
    \ (from https://dictionary.law.com). Some of the more obscure features in Python\
    \ are certainly reminiscent of open pits and abandoned refrigerators.\n\n## Chapter\
    \ 5 Just Because You Can, It Doesn't Mean You Should...\n\nBefore we get to showing\
    \ what metaclasses *can* do, and showing why doing those things is usually a mistake,\
    \ let's think about a comment from the early 2000s (when metaclasses were introduced)\
    \ that stands the test of 20 years:\n\n> Metaclasses are deeper magic than 99%\
    \ of users should ever worry about. If you wonder whether you need them, you don't\
    \ (the people who actually need them know with certainty that they need them,\
    \ and don't need an explanation about why).\n\n— Tim Peters, Author of *The Zen\
    \ of Python* (from the much-missed **comp.lang.python Usenet** newsgroup)\n\n\
    Around the same time as Tim Peters' quote, and not too long after they were introduced\
    \ to Python, I wrote a number of articles about Python metaclasses (often in collaboration\
    \ with Michele Simionato). Unfortunately, I probably elicited the commission of\
    \ many of the sins with metaclasses committed since.\n\nAlthough I would almost\
    \ universally advise against using metaclasses, there are some prominent Python\
    \ frameworks that make broad use of them (*cough, cough*, Django: https://www.djangoproject.com/).\
    \ Arguably, there *must* be occasions where they are the best approach to choose.\
    \ However, it's probably informative that Python's standard library **typing**\
    \ module initially used metaclasses widely but subsequently moved away from their\
    \ use (the module is largely the creation of Python creator Guido van Rossum).\n\
    \nLet's take a look at a metaclass with an arguably good use. Suppose you have\
    \ a large code base, particularly one with some sort of plugin system in which\
    \ components are dynamically loaded. You'd like to be able to examine at runtime\
    \ which classes have been created in this dynamic arrangement.\n\nA metaclass\
    \ to provide class registration and some plugins\n\n```python\nfrom math import\
    \ sqrt\nimport os\nimport logging\n\nlog_level = os.environ.get(\"APP_LOG_LEVEL\"\
    , 20)\nlogging.basicConfig(filename='app.log', level=log_level)\n\nclass PluginLoggerMeta(type):\
    \  # 1\n    def __init__(cls, name, bases, attrs):\n        logging.info(f\"Registering:\
    \ {name}\"\n                    f\"({', '.join(b.__name__ for b in bases)}): \"\
    \n                    f\"\\n  contains: {', '.join(attrs.keys())}\")\n\nclass\
    \ Plugin(metaclass=PluginLoggerMeta):\n    pass\n\nif True:  # ②\n    class Point2d(tuple,\
    \ Plugin):\n        def __new__(self, x, y):\n            return tuple.__new__(self,\
    \ (x, y))\n\n        @property\n        def distance(self):\n            return\
    \ sqrt(self[0]**2 + self[1]**2)\n\nif not False:  # ②\n    class Point3d(tuple,\
    \ Plugin):\n        def __new__(self, x, y, z):\n            return tuple.__new__(self,\
    \ (x, y, z))\n\n        @property\n        def distance(self):\n            return\
    \ sqrt(self[0]**2 + self[1]**2 + self[2]**2)\n\nprint(Point2d(4, 5).distance,\
    \ Point3d(3, 5, 7).distance)\n```\n\n- ① Inherited from, not a metaclass of type\n\
    - ② In production, some other external condition\n\nThis arrangement *works*,\
    \ and logging registered plugins is a perfectly reasonable goal. Let's take a\
    \ look.\n\nRunning the source code of metaclass.py\n\n```\n[BetterPython]$ python\
    \ code/metaclass.py\n6.4031242374328485 9.1104335791443\n[BetterPython]$ cat app.log\n\
    INFO:root:Registering: Plugin():\n    contains: __module__, __qualname__\nINFO:root:Registering:\
    \ Point2d(tuple, Plugin):\n    contains: __module__, __qualname__, __new__, distance\n\
    INFO:root:Registering: Point3d(tuple, Plugin):\n    contains: __module__, __qualname__,\
    \ __new__, distance\n```\n\nHowever, this use of metaclasses is simply *more fragile*\
    \ than other approaches to accomplishing the same thing. Since our convention\
    \ for plugins requires adding *something*, such as inheriting from Plugin, to\
    \ work, we could just as easily require something else. For example, a decorator\
    \ like @register_plugin could just as well be required by the framework using\
    \ plugins. All that decorator would need to do is log information about the class\
    \ object, then return the class unchanged. For example:"
