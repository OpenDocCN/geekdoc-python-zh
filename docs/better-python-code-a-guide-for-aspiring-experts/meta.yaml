    # 4.4.2 Mistaking typing.NewType() for a Runtime Type


    This section singles out NewType(), but there are a number of objects within the
    typing module that are easy to confuse with features of runtime type checks. In
    fact, many of the same objects have dual roles that can confuse developers, especially
    those coming from other programming languages where type systems function differently
    (i.e., especially those with static typing, which annotations resemble).

    An object like typing.Sequence is a good example of a dual-role object. Suppose
    you have a function that can only operate reasonably on a sequence. You might
    write something like this.


    An annotated function to manipulate integer sequences


    ```

    >>> from typing import Sequence

    >>> def double_middle_element(seq: Sequence[int]) -> Sequence[int]:

    ...     if len(seq) > 0:

    ...         middle = len(seq)//2

    ...         item = seq[middle] * 2

    ...         new = seq[:middle] + type(seq)([item]) + seq[middle+1:]

    ...     return new

    ...

    >>> double_middle_element([5, 8, 4, 6, 2, 3])

    [5, 8, 4, 12, 2, 3]

    >>> double_middle_element((5, 8, 4, 6, 2, 3))

    (5, 8, 4, 12, 2, 3)

    ```


    For experienced users of Python type annotations, this may be insufficiently constrained
    in the declaration since the declaration itself does not require that, for example,
    a tuple is returned if a tuple is passed as an argument (although that *is* the
    runtime behavior). However, that’s not the topic of this particular section.

    We might expect this code to catch some misuses that it seems obviously to declare
    improperly.


    Annotations do not impose runtime constraints


    ```

    >>> double_middle_element("abcde")

    "ab[''cc'']de"

    >>> double_middle_element({1: ''a'', 2: ''b'', 3: ''c''})

    Traceback (most recent call last):

    ```'
