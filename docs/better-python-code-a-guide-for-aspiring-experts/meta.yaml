    Security


    This book is not the one you should read to understand either cryptography or
    computer security built on top of cryptographic primitives. Of course, in a very
    general way, it’s a mistake to wire money to fraudulent entities phishing under
    various get-rich-quick or tug-on-heartstrings pretenses. However, that’s life
    advice that might touch on using computers, not Python advice.


    What the mistakes in this chapter discuss are simply approaches to security concerns
    that I have frequently seen Python developers do badly. Often this reflects a
    misunderstanding of some very general security concepts. At other times an unawareness
    of the appropriate modules and functions to use (standard library or third-party)
    is evidenced.


    For an actual background on cryptography, Bruce Schneier’s *Applied Cryptography:
    Protocols, Algorithms, and Source Code in C* is a quite old, but still classic,
    text (2nd edition, John Wiley & Sons, 1996; it even has a few errata corrected
    from the first edition by your current author). Schneier’s somewhat more recent
    2010 text, with coauthors Niels Ferguson and Tadayoshi Kohno, *Cryptography Engineering:
    Design Principles and Practical Applications*, is also excellent (John Wiley &
    Sons).


    There is a distinction to be made between cryptography and security, with the
    latter being more broad. Cryptography is an important element of secure software
    designs, but it is not the only concern, nor even the only building block. Cryptography
    concerns itself with mathematical mechanisms of enforcing confidentiality, integrity,
    non-repudiation, and authentication. Security more broadly concerns itself also
    with risk management, access control, classification of information, business
    continuity, disaster recovery, and laws and regulations. Addressing the broad
    security concerns often utilizes cryptographic protocols, but puts them in the
    context of a general “threat model” against which protection is sought.¹


    Threat modeling and security procedures involve many concerns beyond what Python
    programmers can or cannot do. For example, it considers corporate training about
    when


    > 1. The term *threat model* is a rather elegant one, to my eyes; but it’s also
    likely unfamiliar to many readers. It basically amounts to posing a collection
    of “what if?” questions about potential (malicious) actions that might cause a
    failure in computer systems. What are the ways the system *can possibly* go wrong?
    This is only occasionally a matter of “someone breaks the encryption protocol.”
    Far more often concerns like social engineering (convincing people to act unwisely
    through misrepresentation) or denial of service (causing systems to break without
    an intruder per se getting access to information) are threats modeled.'
