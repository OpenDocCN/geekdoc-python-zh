    \ when deciding whether an object is an instance of this hypothetical `NonAtomicIterable`\
    \ interface.\n\nFor the current Python version, 3.12 as of this writing, special\
    \ case checking for string-ness is really the only approach available to handle\
    \ the dual composite/atomic nature of strings.\n\n# 7.4 (Often) Use enum Rather\
    \ Than CONSTANT\n\nThe `enum` module was added to Python 3.4, and has grown incremental\
    \ new capabilities in several versions since then. Prior to that module being\
    \ added, but also simply because some developers are more accustomed to languages\
    \ such as bash, C, and Java,^3 it is not uncommon to see capitalized names (usually\
    \ defined at a module scope) used as constants in Python code.\n\nInformal enumerations\
    \ using capitalization\n\n```\n\"This module works with sprites having colors\
    \ and shapes\"\n\nRED = \"RED\"\nGREEN = \"GREEN\"\nBLUE = \"BLUE\"\n\nCIRCLE,\
    \ SQUARE, TRIANGLE = range(3)\n\nclass Sprite:\n    def __init__(self, shape,\
    \ color):\n        self.shape = shape\n        self.color = color\n\n    # ...\
