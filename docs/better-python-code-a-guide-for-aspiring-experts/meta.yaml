    \ green\")\n>>> color\n'lime green'\n>>> point\n{'x': 3, 'y': 4, 'color': 'lime\
    \ green'}\n>>> point.setdefault(\"color\", \"brick red\")\n'lime green'\n```\n\
    \n第一个版本可以工作，但它用了五行，而一行代码会稍微快一点，并且明显更清晰。\n\n#### 方法 .update()\n\n方法 dict.update()\
    \ 有助于避免编写：\n\n```python\n>>> from pprint import pprint\n>>> features = {\n...\
    \     \"shape\": \"rhombus\",\n...     \"flavor\": \"vanilla\",\n...     \"color\"\
    : \"brick red\"}\n>>> for key, val in features.items():\n...     point[key] =\
