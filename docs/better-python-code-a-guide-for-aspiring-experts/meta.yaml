    \ Pyjion（https://github.com/tonybaloney/Pyjion）。虽然所有这些项目都有好的想法——并且都源自 CPython\
    \ 源代码（不同于 PyPy）——但这些开源项目在很大程度上仍然专注于开发它们的私人公司。这些公司分别是 Dropbox、Meta 和 Microsoft（Alphabet——即\
