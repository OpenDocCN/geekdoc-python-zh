  md: '# Introduction


    Python is a powerful, and also a reasonably opinionated, programming language.
    While there are often many ways you *could* accomplish a task in Python, there
    is very often exactly one way you *should* accomplish that task. Some programs
    are considered “Pythonic,” and others are not.


    > **Note Being Pythonic**


    The slightly joking term *Pythonic* is widely used in the Python community. In
    a general way it means “reflecting good programming practices for the Python language.”
    But there is also something just slightly *ineffable* about the term in a way
    similar to how other programmers use *fragile*, *elegant*, or *robust* in describing
    particular code. You’ll see the terms *Pythonic* and *unpythonic* quite a bit
    in this book.


    In a related bit of Pythonic humor—the language was, after all, named after the
    Monty Python comedy troupe—we often use the term *Pythonista* for developers who
    have mastered Pythonic programming.


    To a fairly large extent, being Pythonic is a goal to improve the *readability*
    of your programs so that other users and contributors can easily understand your
    intention, the behavior of the code, and indeed identify its bugs. There are,
    as well, many times when being unpythonic leads to unexpected behavior, and hence
    harms *functionality* in edge cases you may not have considered or tried out during
    initial usage.


    In this book, I am not shy in being opinionated about good Python practices. Throughout
    the discussions, I try to explain the motivations for these opinions, and reflect
    on my long experience using, teaching, and writing about Python. It is a truly
    delightful programming language, about which I have sincere enthusiasm.


    Much of what we hope for in Python code is explained by *The Zen of Python*.


    ```

    >>> import this

    The Zen of Python, by Tim Peters


    Beautiful is better than ugly.

    Explicit is better than implicit.

    Simple is better than complex.

    ```'
