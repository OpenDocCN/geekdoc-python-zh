  md: '# 4.3.3 Use itertools (Sufficiently)


    This pitfall joins others in this section in simply describing how developers
    may take approaches that are *less good* than those enabled by versions using
    the `itertools` module. This “less good” is rarely a matter of producing the wrong
    results, but is often a matter of producing the right result more slowly, sometimes
    worse in big-O complexity behavior (i.e., quickly exceeding available time and
    computer resources).


    The basic Python language is very powerful. One of the concepts Python has moved
    toward emphasizing is *lazy computation*. Specifically, iterables in Python may
    be large or infinite. Concrete collections are also (usually) iterable, but many
    iterables that are not concrete collections have a nice property of producing
    exactly one object at a time, and requiring almost no memory beyond that needed
    for that one object.


    > **Note Iterables and iterators**


    Users new to the concept can often overlook the somewhat subtle distinction between
    *iterables* and *iterators*. The fact that many iterables are their own iterator
    does not help in sorting out that confusion. These types of things are programmatically
    defined by `collections.abc.Iterable` and `collections.abc.Iterator`, respectively.


    In brief, an iterable is an object that, when passed to the built-in function
    `iter()`, returns an iterator. An iterator is simply an object that, when passed
    to the built-in function `next()`, either returns a value or raises `StopIteration`.
    These two simple properties make iterables and iterators *play nice* with loops,
    comprehensions, and other “iterable contexts.”


    Generator functions return iterators when called. But iterables and iterators
    may also be defined by custom classes. As usual, it is the presence of dunder
    methods that allows objects to work with operators and built-in functions. A typical
    such class might look like the following.


    ```

    An iterable class that is its own iterator

    >>> class Ones:

    ...     def __next__(self):

    ...         return 1

    ...     def __iter__(self):

    ...         return self

    ...

    >>> list(zip(Ones(), "ABC"))

    [(1, ''A''), (1, ''B''), (1, ''C'')]

    ```


    Since an instance of the `Ones` class returns itself when passed to `iter()` (which
    occurs implicitly in any iterable context, such as in an argument to `zip()`),
    `Ones()` is both an iterable and an iterator. We could spell this equivalently
    as `itertools.repeat(1)`, which likewise yields infinitely many values (in the
    example, the number 1 infinitely many times).'
