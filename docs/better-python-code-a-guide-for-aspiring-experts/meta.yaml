    \ a List\n\nInserting and removing words from middle of list\n\n```python\n>>>\
    \ words = [get_word() for _ in range(10)]\n>>> words\n['hennier', 'oughtness',\
    \ 'testcrossed', 'railbus', 'ciclatoun',\n 'consimilitudes', 'trifacial', 'mauri',\
    \ 'snowploughing', 'ebonics']\n>>> del words[3] # ❶\n>>> del words[7]\n>>> del\
    \ words[3] # ❶\n>>> words\n['hennier', 'oughtness', 'testcrossed', 'consimilitudes',\
    \ 'trifacial',\n 'mauri', 'ebonics']\n>>> words.insert(3, get_word())\n>>> words.insert(1,\
    \ get_word())\n>>> words # ❷\n['hennier', 'awless', 'oughtness', 'testcrossed',\
    \ 'wringings',\n 'consimilitudes', 'trifacial', 'mauri', 'ebonics']\n```\n\n❶\
    \ The word deleted at initial index 3 was *railbus*, but on next deletion *ciclatoun*\
    \ was at that index.\n\n❷ The word *wringings* was inserted at index 3, but got\
    \ moved to index 4 when *awless* was inserted at index 1.\n\n> **Note Focus on\
    \ concepts, but code available at book website**\n\nThe specific implementation\
    \ of the `get_word()` function used here is not important. However, as with other\
