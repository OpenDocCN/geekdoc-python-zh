    implementation of the less common data structure you are considering. Such a library
    might not be widely used simply because the niche it fulfills is relatively narrow.
    On the other hand, it is also easy to put partially developed, poorly tested,
    and buggy libraries on PyPI, conda-forge, GitHub, GitLab, Bitbucket, or other
    public locations.

    5. Assuming you are writing your own after considering the preceding steps, create
    both tests and benchmarks either in conjunction with—or even before—the implementation
    of the data structure.

    6. If your well-tested implementation of a new data structure makes your code
    better, ask your boss for a raise or a bonus… and then share the code with the
    Python community under an open source license.


    # 7.8 Wrapping Up


    Sometimes a powerful object method or general technique can also lead you in the
    wrong direction, even in seemingly ordinary uses. This wrong direction might cause
    bad complexity behavior; at times it might work for initial cases but then fail
    in cases you had not yet considered.

    In this chapter we probed at some operations on lists—generally one of the best
    optimized and flexible data structures Python has—where a different data structure
    is simply better. We also looked at how recursive algorithms need to remember
    that strings are both scalar and iterable, which means they often need to be special-cased
    in program flow.

    Two more mistakes in this chapter looked at “sins of omission” where a facility
    that may be less familiar provides a more convenient and more readable approach
    to common tasks. Specifically, two mistakes served as reminders of the enum module
    and of some of the less widely used methods of dictionaries.

    In the penultimate mistake of this chapter, the capabilities and limitations of
    the widely used JSON format were explored. In particular, we saw how Python developers
    might forget the (relatively minor) lossiness of JSON representations of data.

    The final mistake discussed is one of nuance and complex decision-making. Often,
    creating custom data structures is premature optimization; but at other times
    they can significantly improve your code. The (long) discussion provides some
    guidance about making this choice wisely.'
