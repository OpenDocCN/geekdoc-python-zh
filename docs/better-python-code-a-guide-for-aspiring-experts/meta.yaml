    In this code, things appear superficially to work correctly. No exceptions are
    raised. We genuinely do get a list or bytearray with some characters removed.
    However, looking slightly more closely we see that one of the t characters that
    should be filtered out remains in the mutated object. This happened because once
    an element was deleted, the index position no longer aligned with the actual underlying
    sequence. A corresponding problem would arise with insertion of new elements.


    The correct way to approach this requirement is simply to create a brand-new object
    based on the predicate applied and selectively append to it. An append is a cheap
    operation on a Python list or bytearray (however, insertion into the middle of
    a new sequence can easily hit quadratic complexity—a danger warned about in other
    parts of this book).


    Creating a new object as a filter of a sequence


    ```

    >>> my_list = list("Mary had a little lamb!")

    >>> new_list = []

    >>> for c in my_list:

    ...     if c <= "s":

    ...         new_list.append(c)

    ...

    >>> new_list

    [''M'', ''a'', ''r'', '' '', ''h'', ''a'', ''d'', '' '', ''a'', '' '', ''l'',
    ''i'', ''l'', ''e'', '' '', ''l'', ''a'', ''m'', ''b'', ''!'']

    >>> "".join(new_list)

    ''Mar had a lile lamb!''

    ```


    Even more compactly:


    ```

    >>> new_list = [c for c in my_list if c <= "s"]

    >>> "".join(new_list)

    ''Mar had a lile lamb!''

    ```


    Recall that you can also make a (shallow) copy of a sequence simply by taking
    the null slice of it. In slightly different scenarios, my_list[:] or my_ba[:]
    can often be useful as easy syntax for creating a new sequence containing the
    same items.'
