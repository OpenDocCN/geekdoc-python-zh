    \n> 元类是比 99% 的用户应该担心的更深层的魔法。如果你想知道你是否需要它们，你就不需要（真正需要它们的人确切地知道他们需要它们，并且不需要解释为什么）。\n\
    \n— Tim Peters，《Python 之禅》作者（来自令人怀念的 **comp.lang.python Usenet** 新闻组）\n\n大约在 Tim\
    \ Peters 引用这句话的同时，也就是元类被引入 Python 后不久，我写了许多关于 Python 元类的文章（通常与 Michele Simionato\
    \ 合作）。不幸的是，我可能引发了此后犯下的许多元类之罪。\n\n尽管我几乎普遍建议不要使用元类，但有一些著名的 Python 框架广泛使用它们（*咳，咳*，Django：https://www.djangoproject.com/）。可以说，*必须*有它们是最佳选择的情况。然而，Python\
    \ 标准库 **typing** 模块最初广泛使用元类但随后不再使用（该模块主要是 Python 创始人 Guido van Rossum 的创作），这可能很有启发性。\n\
