    ② Every float is a ratio of integers, even if approximated in base-2.

    ③ Sensibly, integers are Integral.

    ④ And Integral numbers inherit from Rational.

    ⑤ Fractions and Decimals are not generally Integral, even when equal to int.

    ⑥ A Fraction is indeed a synonym for Rational.

    ⑦ A Decimal is finitely many digits, why not Rational, nor even Real?!

