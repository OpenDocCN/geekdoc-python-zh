    The big win of this decorator is that we are completely free to reuse it on *any*
    function that takes multiple arguments without having to rewrite the conditional
    logic about whether to vectorize inside each of them. Every function we decorate
    can focus solely on the numeric (or other) operation it needs to perform and leave
    the “vectorized” aspect to the decorator.

    Of course, NumPy “ufuncs” (https://numpy.org/doc/stable/reference/ufuncs.html)
    do this same thing for sequences that are specifically NumPy arrays, with a more
    optimized implementation for that case. But this version works for *any* Python
    sequence that might be operated on in a vectorized manner.

    In a similar spirit, suppose that we want to keep track of how often a function
    is called.


    # Counting calls to a function


    ```

    >>> def count_calls(fn):

    ...     @wraps(fn)

    ...     def inner(*args):

    ...         inner.num_calls += 1

    ...         return fn(*args)

