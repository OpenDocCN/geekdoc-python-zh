    \n**Figure 1.2** More magic values of generated words.\n\n## 1.2 Use enumerate()\
    \ Instead of Looping Over an Index\n\nDevelopers coming from C-derived languages\
    \ sometimes reach automatically for loops over the index elements of a list or\
    \ other data structure. This is usually an unpythonic way to write a loop. Code\
    \ written in this manner is not significantly slower than using enumerate(), but\
    \ it is less readable, is more verbose, and generally simply feels like a “code\
    \ smell.”\n\nFor example, in C++, an idiom like this is common:\n\n```cpp\n//\
    \ `items` could be array, vector, or other collection types\nfor (int i = 0; i\
    \ < items.size(); i++) {\n    process(i, items[i]);\n}\n```\n\nA closely analogous\
    \ option is available in Python, and in Python’s somewhat distant past, such an\
    \ approach was the standard available mechanism:\n\n```python\nfor i in range(len(items)):\n\
    \    process(i, items[i])\n```\n\nIndeed, if you are not required to utilize the\
    \ index position within a loop, utilizing the index at all is generally a code\
    \ smell in Python. A much more idiomatic option is simply:\n\n```python\nfor item\
    \ in items:\n    process(None, item)\n```\n\nOn those fairly common occasions\
    \ when you need both the index and the underlying item, using `enumerate()` is\
    \ much more expressive and idiomatic:\n\n```python\nfor i, item in enumerate(items):\n\
    \    process(i, item)\n```\n\nIn the relatively uncommon situations when I want\
    \ the index but not the item itself, I often use `enumerate()` anyway, and I use\
    \ the Python convention of `_` (single underscore) representing “a value I don’t\
    \ care about”:\n\n```python\nfor i, _ in enumerate(items):\n    process(i, None)\n\
    ```\n\nAn approach that I use from time to time, when I actually want to maintain\
    \ several increments, is to initialize the several counters prior to a loop, even\
    \ if one of them could derive from `enumerate()`:\n\n```python\ntotal, n_foo,\
    \ n_bar = 0, 0, 0\nfor item in items:\n    if is_foo(item):\n        process_foo(item)\n\
    \        n_foo += 1\n    elif is_bar(item):\n        process_bar(item)\n     \
    \   n_bar += 1\n    else:\n        pass\n    total += 1\n```\n\nIn the example,\
    \ `total` could equally well be reset while enumerating the loop itself, but you\
    \ might wish to emphasize the parallel with `n_foo` and `n_bar`, and that is probably\
    \ better expressed as shown here.\n\n## 1.3 Don't Iterate Over dict.keys() When\
    \ You Want dict.items()\n\nThere is a sense in which you can *almost* think of\
    \ Python lists as mappings from index positions to values. Within a dictionary,\
    \ integers are perfectly well able to act as keys; hence, `obj[7]` might equally\
    \ well be an index into a `dict` (or other mapping) or an index into a `list`\
    \ (or other sequence).\n\nIn much the same way as you sometimes see unpythonic\
    \ code that loops over the index positions of a list but then looks up that index\
    \ within the body, you also sometimes see unpythonic code that loops over `dict.keys()`.\
    \ Actually, let's back up just a bit: there are two stylistic mistakes that were\
    \ just named. Imagine code like this:\n\n```python\nfor key in my_dict.keys():\n\
    \    process(key, my_dict[key])\n```\n\nThis is nonidiomatic in the first instance\
    \ because looping over `my_dict.keys()` is equivalent to looping over `my_dict`\
    \ itself. Behind the scenes, slightly different types of objects are produced:\
    \ `dict_keys` for `my_dict.keys()` and `dict_keyiterator` from the dictionary\
    \ itself. However, little real code depends on this difference since they behave\
    \ the same for most purposes:\n\n```python\n>>> my_dict = {c:ord(c) for c in \"\
    Bread and butter\"}\n>>> type(my_dict.keys())\n<class 'dict_keys'>\n>>> type(iter(my_dict))\n\
    <class 'dict_keyiterator'>\n```\n\nSpecifically, the following identity will always\
    \ apply, for every dictionary (unless, with great perversity, you could break\
    \ this identity in a subclass of `dict` or in some custom mapping):\n\n```python\n\
    >>> all(a is b for a, b in zip(iter(my_dict), iter(my_dict.keys())))\nTrue\n```\n\
    \nIn other words, if you wish to loop over keys, you should just write:\n\n```python\n\
    for key in my_dict:\n    process(key, my_dict[key])\n```\n\nHowever, it is relatively\
    \ uncommon to wish to loop *only* over the keys of a dictionary. Even if you only\
    \ rarely, in one branch of the code, actually use the value, it costs nearly nothing\
    \ to include it as a loop variable. Remember, Python objects are accessed by reference;\
    \ you just assign a reference to an existing object by binding a loop variable;\
    \ you don't copy or create an object.\n\nIn other words, don't bother with:\n\n\
    ```python\nfor key in my_dict:\n    if rare_condition(key):\n        val = my_dict[key]\n\
    \        process(key, val)\n```\n\nSimply write the clean, Pythonic code:\n\n\
    ```python\nfor key, val in my_dict.items():\n    if rare_condition(key):\n   \
    \     process(key, val)\n```\n\nThis problem is one that linters are likely to\
    \ warn about—as was probably the prior one about using `enumerate()`—but *understanding*\
    \ the mechanisms of loops goes further than just reading a warning.\n\n## 1.4\
    \ Mutating an Object During Iteration\n\nYou should not mutate objects that you\
    \ are iterating over. At times you can “get away with” it without bad effects,\
    \ but the habit remains a bad one.\n\nThe first thing that we should note is that\
    \ some Python objects are immutable. If you iterate over a `str`, `bytes`, `tuple`,\
    \ or `frozenset` object, for example, the question simply does not arise of mutating\
    \ the underlying collection.\n\nStill, a lot of Python objects are both iterable\
    \ and mutable—most notably `list`, `dict`, `set`, and `bytearray`, although of\
    \ course, custom or third-party objects might be also. Attempting to mutate during\
    \ iteration over an object can go wrong in several different ways.\n\nBaseline\
    \ iteration over immutable object\n\n```python\n>>> s = \"Mary had a little lamb!\"\
