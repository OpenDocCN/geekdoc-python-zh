    \ `SQUARE = 2`，很可能会出现错误行为。更可能的情况是，导入的其他某个模块将 `SQUARE` 重新定义为与当前模块预期不同的值。如果导入都在命名空间内，这种风险很小，但在当前模块中使用\
    \ `from othermod import SQUARE, CUBE, TESSERACT` 也并非不合理。\n\n像前面那样编写的程序不一定有问题，甚至不一定是错误，但对于成组出现的常量，使用枚举（enums）无疑更为优雅。\n\
    \n## 为一组备选值使用枚举\n\n```python\n>>> from enum import Enum\n>>> Color = Enum(\"Color\"\
    , [\"RED\", \"GREEN\", \"BLUE\"])\n>>> class Shape(Enum):\n...     CIRCLE = 0\n\
    ...     SQUARE = 1\n...     TRIANGLE = 2\n...\n>>> my_sprite = Sprite(Shape.TRIANGLE,\
    \ Color.RED)\n>>> def process(sprite):\n...     if sprite.shape == Shape.TRIANGLE\
    \ and sprite.color == Color.RED:\n...         print(\"It is a red triangle\")\n\
    ...     elif something_else:\n...         pass\n...\n>>> process(my_sprite)\n\
    It is a red triangle\n>>> Color.RED = 2\nTraceback (most recent call last):\n\
    \  [...]\nAttributeError: cannot reassign member 'RED'\n```\n\n绕过 `Enum` 提供的保护并非*不可能*，但你需要费很大力气才能做到，而不是无意中破坏它。实际上，枚举的属性是*只读*的。因此，对不可变属性重新赋值会引发异常。\n\
    \n还有一些“常量”并非备选值，而仅仅是数值；这些在 Python 中同样无法真正强制为常量。枚举可能仍然是合理的命名空间，比模块具有稍强的防止更改的强制性。\n\
    \n## 第7章 误用数据结构\n\n### 覆盖常量\n\n```python\n>>> import math\n>>> radius = 2\n>>>\
    \ volume = 4/3 * math.pi * radius**3\n>>> volume # ❶\n33.510321638291124\n>>>\
    \ math.pi = 3.14 # ❷\n>>> 4/3 * math.pi * radius**3\n33.49333333333333\n>>> from\
    \ math import pi\n>>> 4/3 * pi * radius**3\n33.49333333333333\n>>> pi = 3.1415\
    \ # ❸\n>>> 4/3 * pi * radius**3\n33.50933333333333\n```\n\n- ❶ 使用64位浮点数能得到的最佳结果\n\
    - ❷ 猴子补丁（Monkeypatching）了一个不精确的 pi 近似值\n- ❸ 一个稍微不那么差的 pi 近似值\n\n### 使用枚举来“强制”值的一致性\n\
    \n```python\n>>> from enum import Enum\n>>> import math\n>>> class Math(Enum):\n\
    ...     pi = math.pi\n...     tau = math.tau\n...     e = math.e\n...\n>>> radius\
    \ = 2\n>>> Math.pi.value\n3.141592653589793\n>>> 4/3 * Math.pi.value * radius**3\n\
    33.510321638291124\n>>> math.pi = 3\n>>> 4/3 * Math.pi.value * radius**3\n33.510321638291124\n\
    >>> Math.pi.value = 3\nTraceback (most recent call last):\n  [...]\nAttributeError:\
    \ <enum 'Enum'> cannot set attribute 'value'\n```\n\n这种用法并非真正将枚举用作枚举不同值的方式，但它确实带来了适度的“只读”值保护。\n\
    \n## 7.5 学习不那么常见的字典方法\n\n字典是一种美妙的数据结构，在许多方面构成了 Python 的核心。在内部，大多数对象（包括模块）都是由它们的字典定义的。\n\
    有时被忽视的方法 `dict.get()` 在第3章《Python 陷阱杂谈》中讨论过，但字典还有其他一些方法也经常被忽视，即使是经验丰富的 Python\
    \ 程序员也是如此。与本书中许多其他错误一样，这里的错误仅仅是无知或遗忘；结果通常不是代码损坏，而只是代码可能不够快速、优雅和富有表现力。\n\n### 7.5.1\
    \ 定义对象的字典\n\n本小节是关于 Python 内部机制的题外话。对于实际的陷阱，可以随意跳过；或者阅读它以更好地理解 Python。\n你可以使用\
    \ Python 很长时间而无需考虑大多数非字典对象核心的字典。有一些例外，但许多 Python 对象都有一个 `.__dict__` 属性来存储提供其功能和行为的字典。\n\
    让我们看几个例子。\n\n#### 模块字典\n\n```python\n>>> import re\n>>> type(re.__dict__)\n<class\
    \ 'dict'>\n>>> for key in re.__dict__.keys():\n...     print(key, end=\" \")\n\
