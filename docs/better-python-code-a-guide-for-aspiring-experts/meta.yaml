    concurrency pitfalls and trade-offs. It''s a big topic, though; too big for a
    chapter or two of this moderately sized book to treat adequately. The fact that
    this is not the book for discussion of concurrency does not diminish the importance
    of the topic, nor suggest that the choices you make are not subject to pitfalls
    and trade-offs.


    Within Python itself, there are three main approaches to concurrency. Python''s
    standard library has a **threading** module to work with threads. Threads are
    famously subject to gotchas like deadlocks, race conditions, priority inversion,
    data structure corruption, and other glitches. Moreover, within pure Python, threading
    does not enable CPU parallelism because of the infamous GIL (global interpreter
    lock). That said, many third-party modules “release the GIL” and allow true parallelism.


    Python''s standard library also contains the **multiprocessing** module, which
    is largely similar in API to **threading**, but works with processes rather than
    threads. This module provides a means of running parallel tasks on multiple CPU
    cores, but is also constrained by not being able to share data directly among
    processes and in being “heavier weight.” In general, in order to communicate,
    processes require message passing, usually by means of pipes and queues (which
    are available in the **multiprocessing** module).


    A useful and higher-level abstraction for both threading and multiprocessing is
    the **concurrent.futures** module of the standard library. Many problems can be
    more easily and more safely expressed using the “futures” abstraction, and where
    possible, concurrency is easier using this mechanism.


    A third abstraction in Python for concurrency is asynchronous programming with
    coroutines. This is supported via the **async** and **await** keywords, and is
    managed by the **asyncio** standard library module, or by third-party async event
    loops such as uvloop (https://uvloop.readthedocs.io/), Trio (https://trio.readthedocs.io/en/stable/),
    Curio (https://curio.readthedocs.io/en/latest/), and Twisted (https://twisted.org/).
    The general idea behind coroutines is that async functions can *yield* control
    in the middle of their operations, allowing an event loop to give attention to
    other coroutines within the same thread and process. This is typically useful
    when operations are I/O bound (since I/O is generally several orders of magnitude
    slower than CPU-bound computation).


    The official Python documentation contains a good discussion of many of the trade-offs
    among different approaches to concurrency (see https://docs.python.org/3/library/concurrency.html
    to get started).'
  - '[PAGE 271]


    # A.3 Packaging


    A large part of the Python ecosystem is about packaging software for distribution.
    Actually, pretty much the same is true of *every* programming language. When you
    write software, whether executables, libraries, or other systems, you usually
    wish to share your work with other users and developers.


    For some languages newer than Python, the design of the language itself was simultaneous
    with the design of its packaging system. So, for example, users of the Go programming
    language will use `go get` ... to install packages. Users of Rust will use `cargo`
    and `rustup`. In Julia, it is a combination of `using Pkg; Pkg.add(...)`. In R,
    it''s generally always `install.packages(...)`. For these languages, there is
    one and only one way to install a package, and pretty much exactly one way to
    publish the packages or tools you have created. Other languages like Ruby have
    mostly congealed around `gem`, and JavaScript is split between `npm` and `yarn`,
    but the two are *mostly* compatible.


    Python is not as old as C, or Fortran, or even Perl, Bash, Haskell, or Forth.
    All of those have, arguably, a greater disarray around packaging than Python does.
    But Python is *pretty old*, having started in 1991, and going through numerous
    not-quite-compatible packaging and installation systems over that time, while
    starting relatively late on putting serious effort into this aspect. Over the
    past five to 10 years, Python packaging has become solid and relatively stable,
    but a number of competing tools remain, as do a number of package formats.


    Wheels are supported and endorsed by the Python Packaging Authority (https://www.pypa.io/en/latest/),
    but so are *sdist* archives for source-only packages. Numerous tools for creating
    wheels are largely, but not entirely, compatible with one another. Conda packages
    use a different format and a different build system, but allow completely non-Python
    packages to be created, distributed, and installed. A large number of tools allow
    creation of platform-specific executables for Python, including often the native
    packaging system of operating system distributions. Moreover, especially with
    so much software being deployed in “cloud native” or at least “cloud-centric”
    ways now, containerization, such as with Docker and Kubernetes, has become a popular
    alternative approach as well.


    This book simply does not attempt to address software packaging, but rather recommends
    that you read some of the excellent online material on the topic, starting with
    https://packaging.python.org/en/latest/overview.


    # A.4 Type Checking


    On top of the mostly orthogonal nature of type-checking mistakes and the conceptual
    mistakes addressed in this book, the use of type checking and its associated tools
    is somewhat divisive among Python developers. I do not hesitate to be opinionated
    in this book about many things, but I have chosen not to weigh in on the virtues
    and drawbacks of using or adding extensive type annotations in Python codebases.
    There are many excellent books and other resources that delve into this topic,
    and these debates, in great detail.'
