    Note Iterables are sortable (if the corresponding concrete collection is)


    Python really does emphasize iterables over concrete collections wherever they
    are feasible to use. The result of sorting is still a concrete collection, but
    the iterable need not have started out as such. For example:


    >>> from random import randint

    >>> def make_things():

    ...     for _ in range(5):

    ...         yield Thing(randint(1, 1000)) # ❶

    ...

    >>> sorted(make_things())

    [Thing(544), Thing(651), Thing(666), Thing(799), Thing(920)]


    ❶ The presence of yield makes this a generator function.


    Unnecessary use of subclass merely for sort order


    ```

    >>> class ModThing(Thing):

    ...     def __init__(self, value: int, mod: int=7):

    ...         self.value = value

    ...         self._mod = mod

    ...     def __lt__(self, other):

    ...         return self.value % self._mod < other.value % other._mod

    ...

    ...

    >>> sorted([ModThing(2), ModThing(-17), ModThing(55), ModThing(7)])

    [Thing(7), Thing(2), Thing(-17), Thing(55)]

    ```


    There might well be additional reasons to attach the modulus to the class itself,
    but supposing we only cared about sorting, we could achieve the same effect more
    easily using the following.


    Using the key function in decorate-sort-undecorate sorting


    ```

    >>> sorted([Thing(2), Thing(-17), Thing(55), Thing(7)],

    ...         key=lambda thing: thing.value % 7)

    [Thing(7), Thing(2), Thing(-17), Thing(55)]

    ```


    Anything that can represent a consistent transformation of the underlying objects
    being sorted is suitable as a key function. The decorate-sort-undecorate pattern
    is vastly more efficient as a big-O complexity than using a comparison function
    between every pair of items. See a discussion at https://en.wikipedia.org/wiki/Schwartzian_transform.
