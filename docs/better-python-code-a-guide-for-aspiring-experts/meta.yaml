- md: "## Chapter 4 Advanced Python Usage\n\n```python\n>>> [lcg3.next() for _ in\
    \ range(3)]\n[0.8215138253290206, 0.1279368051327765, 0.818344411207363]\n\n>>>\
    \ lcg3._multiplier = 0\n>>> [lcg3.next() for _ in range(2)]\n[2.3283064365386963e-10,\
    \ 2.3283064365386963e-10]\n```\n\n1.  Initial numbers based on seed are reproducible\n\
    2.  Reasonable multiplier, but breaks reproducibility from seed\n3.  Bad choice\
    \ of multiplier badly breaks the generator\n\nIn the example, the *very bad* multiplier\
    \ of zero causes the generator to produce the same fixed number forever. However,\
    \ other bad choices can merely weaken the distribution. The specific details of\
    \ good multiplier, modulus, and increment get into relatively heavy number theory,\
    \ with primality, relative primality, the divisibility of the multiplier by 4\
    \ specifically, and other factors coming into play. In other words, the ordinary\
    \ users of the class probably do not know the relevant considerations and should\
    \ not touch these attributes.\n\n> **Note** The first rule of underscores is \"\
    don't talk about name mangling\"\n\nPython initial double underscores have a dirty\
    \ little secret. They are *not* truly private and users can get at them if they\
    \ know about name mangling. Let's take a look:\n\n```python\n>>> lcg.__seed\n\
    Traceback (most recent call last):\n  [...]\nAttributeError: 'LinearCongruentialGenerator'\
    \ object has no attribute '__seed'\n\n>>> lcg._LinearCongruentialGenerator__seed\n\
    456\n>>> lcg._LinearCongruentialGenerator__seed = 123\n>>> lcg.seed\n123\n```\n\
    \nIf you ever find yourself breaking through the privacy of names this way, you\
    \ are making a mistake or are an actual core developer of a Python framework.\
    \ However, it can certainly be both things.\n\nThe other danger with using private\
    \ or protected attributes is that the author of a module or library is explicitly\
    \ *not* promising they will continue to exist in the next version of that software.\
    \ They may very reasonably decide to redesign or refactor their code, and only\
    \ maintain backward compatibility with documented interfaces, such as `lcg.seed`\
    \ and `lcg.next()` in the example class.\n\nPerhaps as author of my LCG, I decide\
    \ that I definitely want to use a power-of-two modulus. This is hard-coded into\
    \ the implementation shown, but a subclass, for example, might change that but\
    \ preserve the official APIs. Given this decision, I might change my implementation\
    \ to:\n\n```python\nclass LinearCongruentialGenerator:\n    def __init__(self,\
    \ seed: int=123):\n        self.__seed: int = seed\n        self._multiplier:\
    \ int = 1_103_515_245\n        self._modpow: int = 32\n        self._increment:\
    \ int = 1\n\n    # ...other code...\n\n    def next(self):\n        # Increment\
    \ the state\n        self._state = (\n            (self._multiplier * self._state\
    \ + self._increment)\n            % 2**self._modpow)\n        return self._state\
    \ / self._modulus\n```\n\nThis new implementation has *all* the same documented\
    \ behaviors. Given the same seed, the new implementation will produce exactly\
    \ the same sequence of numbers from the PRNG. However, the protected attribute\
    \ `._modulus` has simply stopped existing in this version. A downstream user who\
    \ improperly relied on that attribute, even simply to check its value, would find\
    \ their code broken by the change. If their code actually modified the protected\
    \ attribute, the failure could be less obvious since Python instances can attach\
    \ attributes that are unused for any purpose; changing `._modulus` would now have\
    \ no effect on the sequence produced, again probably surprising the misbehaving\
    \ downstream user.\n\nAs a final thought, I will mention that modules are much\
    \ like classes in regard to leading underscores. Often modules will have such\
    \ private or protected names inside them. The mechanism of `import` makes these\
    \ slightly less accessible, but not completely invisible. Nonetheless, if a module\
    \ author has requested that you not use certain names, you should believe them,\
    \ and only use the documented and exported names.\n\n## 4.3 Keep Less-Used Features\
    \ in Mind\n\nThere are a number of brilliant features in Python that you very\
    \ often do not need to think about. However, when the need does arise, it is a\
    \ mistake not to be aware of and utilize these capabilities.\n\n> **Note** Rules\
    \ have occasional exceptions\n\nThere are a few odd corners where the advice in\
    \ this section is properly violated, even within the Python standard library.\
    \ The most notable of these is:\n\n```python\n>>> from collections import namedtuple\n\
    >>> Person = namedtuple(\"Person\", \"first last handedness\")\n>>> david = Person(\"\
    David\", \"Mertz\", \"Left\")\n>>> david\nPerson(first='David', last='Mertz',\
    \ handedness='Left')\n>>> david._fields\n('first', 'last', 'handedness')\n>>>\
    \ david._asdict()\n{'first': 'David', 'last': 'Mertz', 'handedness': 'Left'}\n\
    ```\n\nThe special problem namedtuple had to solve is that *anything* could be\
    \ an attribute of a constructed special object, such as Person. For some namedtuple\
    \ classes, a field called .fields might be perfectly reasonable (perhaps less\
    \ so one called .asdict).\n\nFor this situation—and a very few others—the actual\
    \ documented and promised API for namedtuple includes having several attributes\
    \ and methods whose names begin with a single underscore.\n\nKnowledge is power.\
    \ Or at least often it is: The next chapter looks at cases where a better mantra\
    \ might be “ignorance is bliss.”\n\n### 4.3.1 F-String Debugging\n\nThere are\
    \ a few gotchas throughout this book where the mistake in question is simply ignorance\
    \ of a useful feature. Everything that we can do using *debugging f-strings* is\
    \ perfectly well possible by other means; using this technique just makes code\
    \ look nicer and lets you debug your code just a little bit more easily.\n\nA\
    \ small, but surprisingly cool, feature introduced in Python 3.8 was a format\
    \ for f-strings using the pattern f\"{var=}\". All this formatting style does\
    \ is create a formatted string with a *variable name* accompanying its value that\
    \ is formatted per the usual f-string (format string) rules. A slightly more verbose\
    \ spelling is merely f\"var={var}\".\n\nIn an earlier discussion, in Chapter 3,\
    \ *A Grab Bag of Python Gotchas*, we looked at why “bare” or overly generic exceptions\
    \ are a mistake, and how to fix that. The following code arguably uses an overly\
    \ generic exception, but it can be useful in the process of getting exception\
    \ handling as fine-tuned as we would like it to be.\n\nSource code of code/divide1b.py\n\
    \n```python\n#!/usr/bin/env python\nimport sys\n\nnumerators = sys.argv[1]\ndenominators\
    \ = sys.argv[2]\n\ntry:\n    ratios = []\n    num_fh = open(numerators)\n    den_fh\
    \ = open(denominators)\n    for string_a, string_b in zip(num_fh, den_fh, strict=True):\n\
    \        a = float(string_a.strip())\n        b = float(string_b.strip())\n  \
    \      ratios.append(a/b)\n    print([f\"{r:.3f}\" for r in ratios])\nexcept Exception\
    \ as err:\n    print(\"Unable to perform divisions\")\n```\n\nAs we saw with that\
    \ earlier discussion utilizing almost this same small program, a great many different\
    \ things can go wrong in this script. In a few paragraphs we'll see specific causes\
    \ of the errors shown generically in:\n\n```\n[BetterPython]$ code/divide1b.py\
    \ numerators1.txt denominators1.txt\nUnable to perform divisions\n[BetterPython]$\
    \ code/divide1b.py numerators1.txt denominators2.txt\nUnable to perform divisions\n\
    [BetterPython]$ code/divide1b.py numerators1.txt denominators3.txt\nUnable to\
    \ perform divisions\n[BetterPython]$ code/divide1b.py numerators1.txt denominators4.txt\n\
    Unable to perform divisions\n[BetterPython]$ code/divide1b.py numerators1.txt\
    \ denominators5.txt\n['0.738', '1.150', '2.000', '0.326', '0.000', '0.963']\n\
    ```\n\nThe example here, as in most discussions, is toy code. However, one might\
    \ easily find similar logic inside a function within a library or application\
    \ being developed. In fact, this function might be in use for a long while without\
    \ any of these constructed error cases being encountered. We would like to sort\
    \ out *what* is going wrong in each example.\n\nUsing an actual debugger is absolutely\
    \ a worthwhile approach.¹ Moreover, sending the more detailed information printed\
    \ in the following code to a logging system is often desirable. For the example,\
    \ let's just make the printed errors more informative.\n\n> 1. I personally have\
    \ a special fondness for PuDB (https://documen.tician.de/pudb/), which like IPython\
    \ pdb (https://github.com/gotcha/ipdb) is built on the standard library module\
    \ pdb (https://docs.python.org/3/library/pdb.html). Most developers, however,\
    \ probably prefer the more graphical debuggers incorporated with GUI editors or\
    \ IDEs like VS Code or PyCharm."
  mdcn: "## 第四章 高级Python用法\n\n```python\n>>> [lcg3.next() for _ in range(3)]\n[0.8215138253290206,\
    \ 0.1279368051327765, 0.818344411207363]\n\n>>> lcg3._multiplier = 0\n>>> [lcg3.next()\
    \ for _ in range(2)]\n[2.3283064365386963e-10, 2.3283064365386963e-10]\n```\n\n\
    1.  基于种子的初始数字是可复现的\n2.  合理的乘数，但破坏了从种子开始的可复现性\n3.  糟糕的乘数选择会严重破坏生成器\n\n在这个例子中，*非常糟糕*的乘数零导致生成器永远产生相同的固定数字。然而，其他糟糕的选择可能只是削弱了分布。好的乘数、模数和增量的具体细节涉及到相对深奥的数论，其中素性、互素性、乘数被4整除的特性以及其他因素都会起作用。换句话说，该类的普通用户可能不知道相关的考量，也不应该去触碰这些属性。\n\
    \n> **注意** 下划线的第一条规则是“不要谈论名称修饰”\n\nPython开头的双下划线有一个肮脏的小秘密。它们*并非*真正的私有，如果用户了解名称修饰，就可以访问它们。让我们看看：\n\
    \n```python\n>>> lcg.__seed\nTraceback (most recent call last):\n  [...]\nAttributeError:\
    \ 'LinearCongruentialGenerator' object has no attribute '__seed'\n\n>>> lcg._LinearCongruentialGenerator__seed\n\
    456\n>>> lcg._LinearCongruentialGenerator__seed = 123\n>>> lcg.seed\n123\n```\n\
    \n如果你发现自己以这种方式突破了名称的隐私性，那么你是在犯错，或者你是一个Python框架的实际核心开发者。然而，这两种情况当然可能同时存在。\n\n使用私有或受保护属性的另一个危险是，模块或库的作者明确*不*承诺它们会在该软件的下一个版本中继续存在。他们非常合理地决定重新设计或重构代码，并且只维护与文档化接口的向后兼容性，例如示例类中的`lcg.seed`和`lcg.next()`。\n\
    \n也许作为我的LCG的作者，我决定我肯定想使用2的幂作为模数。这在所示的实现中是硬编码的，但例如，一个子类可能会改变这一点，同时保留官方API。基于这个决定，我可能会将我的实现更改为：\n\
    \n```python\nclass LinearCongruentialGenerator:\n    def __init__(self, seed:\
    \ int=123):\n        self.__seed: int = seed\n        self._multiplier: int =\
    \ 1_103_515_245\n        self._modpow: int = 32\n        self._increment: int\
    \ = 1\n\n    # ...其他代码...\n\n    def next(self):\n        # 增加状态\n        self._state\
    \ = (\n            (self._multiplier * self._state + self._increment)\n      \
    \      % 2**self._modpow)\n        return self._state / self._modulus\n```\n\n\
    这个新实现具有*所有*相同的文档化行为。给定相同的种子，新实现将从PRNG产生完全相同的数字序列。然而，受保护的属性`._modulus`在这个版本中已经停止存在。一个不恰当地依赖该属性的下游用户，即使只是检查其值，也会发现他们的代码因这个更改而中断。如果他们的代码实际上修改了受保护的属性，失败可能不那么明显，因为Python实例可以附加任何用途都不使用的属性；更改`._modulus`现在将对产生的序列没有影响，这同样可能会让行为不当的下游用户感到惊讶。\n\
    \n最后一点，我将提到模块在关于前导下划线方面与类非常相似。通常模块内部会有这样的私有或受保护名称。`import`的机制使得这些名称稍微不那么容易访问，但并非完全不可见。尽管如此，如果模块作者要求你不要使用某些名称，你应该相信他们，只使用文档化和导出的名称。\n\
    \n## 4.3 记住较少使用的特性\n\nPython中有许多你通常不需要考虑的出色特性。然而，当需求确实出现时，不了解和利用这些能力是一个错误。\n\n\
    > **注意** 规则偶尔有例外\n\n在Python标准库中，有几个奇怪的角落确实可以合理地违反本节的建议。其中最值得注意的是：\n\n```python\n\
    >>> from collections import namedtuple\n>>> Person = namedtuple(\"Person\", \"\
    first last handedness\")\n>>> david = Person(\"David\", \"Mertz\", \"Left\")\n\
    >>> david\nPerson(first='David', last='Mertz', handedness='Left')\n>>> david._fields\n\
    ('first', 'last', 'handedness')\n>>> david._asdict()\n{'first': 'David', 'last':\
    \ 'Mertz', 'handedness': 'Left'}\n```\n\nnamedtuple必须解决的特殊问题是，*任何东西*都可能是构造的特殊对象（如Person）的属性。对于某些namedtuple类，一个名为.fields的字段可能是完全合理的（也许一个名为.asdict的字段就不那么合理了）。\n\
    \n对于这种情况——以及极少数其他情况——namedtuple实际文档化和承诺的API包括几个名称以单下划线开头的属性和方法。\n\n知识就是力量。或者至少通常是：下一章将探讨一个更好的格言可能是“无知是福”的情况。\n\
    \n### 4.3.1 F-String调试\n\n本书中有几个陷阱，其中所讨论的错误仅仅是对有用特性的无知。我们使用*调试f-string*能做的所有事情，通过其他方式也完全可以做到；使用这种技术只是让代码看起来更漂亮，并让你调试代码稍微容易一点。\n\
    \nPython 3.8引入的一个小但非常酷的特性是使用模式f\"{var=}\"的f-string格式。这种格式化风格所做的只是创建一个格式化字符串，其中*变量名*伴随着其值，该值按照通常的f-string（格式字符串）规则进行格式化。一个稍微冗长的拼写只是f\"\
    var={var}\"。\n\n在前面的讨论中，在第三章《Python陷阱集锦》中，我们探讨了为什么“裸露”或过于通用的异常是一个错误，以及如何修复它。以下代码可以说使用了一个过于通用的异常，但在使异常处理达到我们想要的精细程度的过程中，它可能很有用。\n\
    \n源代码 code/divide1b.py\n\n```python\n#!/usr/bin/env python\nimport sys\n\nnumerators\
    \ = sys.argv[1]\ndenominators = sys.argv[2]\n\ntry:\n    ratios = []\n    num_fh\
    \ = open(numerators)\n    den_fh = open(denominators)\n    for string_a, string_b\
    \ in zip(num_fh, den_fh, strict=True):\n        a = float(string_a.strip())\n\
    \        b = float(string_b.strip())\n        ratios.append(a/b)\n    print([f\"\
    {r:.3f}\" for r in ratios])\nexcept Exception as err:\n    print(\"Unable to perform\
    \ divisions\")\n```\n\n正如我们在前面使用几乎相同的小程序的讨论中所看到的，在这个脚本中可能会发生许多不同的事情。在接下来的几段中，我们将看到在以下通用错误中显示的具体原因：\n\
    \n```\n[BetterPython]$ code/divide1b.py numerators1.txt denominators1.txt\nUnable\
    \ to perform divisions\n[BetterPython]$ code/divide1b.py numerators1.txt denominators2.txt\n\
    Unable to perform divisions\n[BetterPython]$ code/divide1b.py numerators1.txt\
    \ denominators3.txt\nUnable to perform divisions\n[BetterPython]$ code/divide1b.py\
    \ numerators1.txt denominators4.txt\nUnable to perform divisions\n[BetterPython]$\
    \ code/divide1b.py numerators1.txt denominators5.txt\n['0.738', '1.150', '2.000',\
    \ '0.326', '0.000', '0.963']\n```\n\n这里的例子，和大多数讨论一样，是玩具代码。然而，人们很容易在正在开发的库或应用程序的函数中找到类似的逻辑。事实上，这个函数可能使用了很长时间，而没有遇到这些构造的错误情况中的任何一个。我们希望弄清楚每个例子中*什么*出了问题。\n\
    \n使用实际的调试器绝对是一种值得的方法。¹ 此外，将以下代码中打印的更详细信息发送到日志系统通常是可取的。对于这个例子，我们只让打印的错误信息更具信息性。\n\
    \n> 1. 我个人对PuDB (https://documen.tician.de/pudb/) 有特殊的喜爱，它和IPython pdb (https://github.com/gotcha/ipdb)\
    \ 一样，是建立在标准库模块pdb (https://docs.python.org/3/library/pdb.html) 之上的。然而，大多数开发者可能更喜欢集成在GUI编辑器或IDE（如VS\
    \ Code或PyCharm）中的更图形化的调试器。"
