    \ The PyCharm IDE (https://www.jetbrains.com/pycharm/) has excellent support for\
    \ type checking and type inference, and is worth considering if you are looking\
    \ for a Python IDE.\n\n## A.5 Numeric and Dataframe Libraries\n\nAt the heart\
    \ of much of the numeric computation performed in Python is the library NumPy\
    \ (https://numpy.org/). NumPy provides a powerful and efficient multidimensional\
    \ array type, and a large number of functions for operating on these arrays. NumPy\
    \ is developed in C, and a bit for Fortran, but is explicitly a Python library\
    \ that cannot be used outside of Python. The idioms used for vectorized computation\
    \ in NumPy are often quite different from those used in “native Python,” and a\
    \ number of books and articles have been and will be written on its idioms.\n\n\
    For the purpose of leaving NumPy best practices out of this book, it’s sufficient\
    \ to note that those best practices are generally different from those used in\
    \ “native Python.” In many ways, learning NumPy is like learning a domain-specific\
    \ language (DSL) for numeric computation that resides *within* Python.\n\nTensor\
    \ libraries such as TensorFlow (https://www.tensorflow.org/), PyTorch (https://pytorch.org/),\
    \ CuPy (https://cupy.dev/), and JAX (https://jax.readthedocs.io) borrow many concepts\
    \ from NumPy, but are reimplemented in C++ and CUDA, and are often used for machine\
    \ learning applications. Probably even more than with NumPy, using these Python\
    \ libraries is effectively using DSLs inside Python code (not strictly syntactically\
    \ so, but in feel, yes).\n\nA powerful abstraction for working with tabular data\
    \ is *dataframes*. This concept was popularized by the R programming language,\
