    \ 500,000 个指针向下移动。随着操作次数的进一步增加，情况会迅速恶化。\n\n### 7.2.1 更高效的数据结构\n\n对于这里描述的问题，没有唯一的解决方案。另一方面，像前面示例中的代码所实现的精确行为，在实际用例中极其罕见。相信我，像那样的代码并非纯粹为本书而构造——我在生产系统中遇到过很多类似的代码（问题隐藏在大量其他功能之下）。\n\
