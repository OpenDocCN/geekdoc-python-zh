  md: '# 3.2 Quadratic Behavior of Naive String Concatenation


    > **Note Understanding runtime complexity**


    The title of this pitfall discussion includes a little bit of computer science
    jargon. The word *quadratic* in mathematics refers to a polynomial with degree
    two. It actually means exactly the same thing in computer science, but the connection
    is perhaps not obvious immediately.


    In computer science, we often talk about the “big-O” behavior of various algorithms
    (see https://en.wikipedia.org/wiki/Big_O_notation). This concern arises in a number
    of discussions in this book.


    In quick synopsis, big-O complexity expresses the relationship between the size
    of the data being operated on and the time a computer will take to perform the
    operation. The best we can hope for is O(1), which means that the code will take
    the same amount of time no matter what size the data is. More commonly, O(N) is
    achievable, which means that the compute time increases in lockstep with the data
    size. A bit worse, but frequently seen, is O(N×log N); this says that the compute
    time is the size of the data multiplied by the logarithm of that size.


    We start to become worried when we see quadratic, that is, O(N²), behavior. Worse
    behaviors are possible, though. Some computation might take time equal to the
    cube, or the 4th power, of the data size. The worst behavior we commonly encounter
    is called exponential, that is, O(2ᴺ). These algorithms become intractable very
    quickly as data size grows; some so-called “hard problems” cannot be improved
    over exponential complexity.


    Python string concatenation uses an intuitive plus operator, although this same
    operator has a very different meaning for other types. For example, + (which under
    the hood calls the “dunder”¹ methods `.__add__()` or `.__radd__()` on the class
    of the objects involved) means addition of numbers and aggregation of lists as
    well.


    Code such as this is intuitive, readable, and perfectly Pythonic:


    ```

    firstname = "David"

    lastname = "Mertz"

    degree = "Ph.D."


    fullname = firstname + " " + lastname          # ❶

    ```


    1. The term *dunder* is commonly used by Python programmers to refer to names
    that have both two leading and two trailing underscores. These are discussed in
    a number of places throughout the book.'
