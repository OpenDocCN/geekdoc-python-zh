    in regular expressions, some quirks in floating-point representations of numbers,
    “round-tripping” problems with serialization approaches like JSON, etc. The coverage
    of such issues makes studying this book definitely worthwhile, not just for Python
    programmers of intermediate skills, but for advanced ones too.


    —Alex Martelli'
