  md: "In Python it is a mistake to use this pattern, although one sees such code\
    \ written by programmers coming from other languages relatively often.\n\nAt first\
    \ glance, my admonition against getters and setters might seem to contradict that\
    \ in Chapter 4, *Advanced Python Usage*, in the section “Directly Accessing a\
    \ Protected Attribute.” There I advised against directly modifying pseudo-protected\
    \ (i.e., one leading underscore) or pseudo-private (i.e., two leading underscores)\
    \ instance attributes. I use “pseudo-” in the prior sentence because, of course,\
    \ in Python you are never truly prevented from reading or modifying these (other\
    \ than by convention and mild name mangling).\n\nIn so-called “bondage-and-discipline\
    \ languages” like Java, the intention is to prevent users of a class from doing\
    \ something they are not *supposed to*. In contrast, a common saying among Pythonistas\
    \ is “We’re all adults here.” That is, the creator of a class may include *access\
    \ advisories* by using single or double leading underscores, but these are not\
    \ *access modifiers* in the style of C and Java (besides “protected” and “private”,\
    \ C—and Visual Basic also—includes “friend” as an end run around other access\
    \ modifiers).\n\nIf an attribute of a Python instance contains one or two leading\
    \ underscores, it is not because the creator of the class tries to guarantee you\
    \ won’t access it, but simply as a way of indicating that the attribute might\
    \ disappear in the next version of their class, or its meaning or values might\
    \ be altered in ways that are not guaranteed by documented and public APIs. Also,\
    \ perhaps the meaning of that attribute with an access advisory might actually\
    \ do something subtly different than what you might initially assume. The class\
    \ author is making you no promises about that attribute.\n\nCircling back to getters\
    \ and setters, let’s look at a quick example of such an antipattern in Python.\
    \ The following *works*, of course; it merely feels non-idiomatic.\n\nWriting\
    \ Java in Python antipattern\n\n```\nclass GetterSetterExample:\n    def __init__(self,\
    \ value):\n        self._value = value\n\n    def get_value(self):\n        return\
    \ self._value\n\n    def set_value(self, new_val):\n        self._value = new_val\n\
    ```\n\nEven if these extra methods took additional actions, this would not feel\
    \ like good Python. Yes, you should not muck with `._value`, but if an indirect\
    \ mechanism to have guarded access to it is needed, *properties* provide a much\
    \ more natural style.\n\nFor a slightly more fleshed out example than `GetterSetterExample`,\
    \ let’s suppose we want a `Rectangle` class, but with the special constraint that\
    \ if we imagine the rectangle having a lower-left corner at the origin, no part\
    \ of the rectangle falls outside a circle with a given radius. This is illustrated\
