    \ 本身包含数百种不同的数据结构。对于 Python 程序员来说，这种丰富的选择很大程度上只会导致“分析瘫痪”（https://en.wikipedia.org/wiki/Analysis_paralysis）。在如此多只有细微差别的数据结构中进行选择会带来巨大的认知负担，而最终做出的决定（经过更多努力后）往往仍然是次优的。给某人更多的锤子有时除了提供更多砸到拇指的方式外，几乎没什么用。\n\
