    (remember all those methods of datatypes that you love so much?).


    > **Note Python implementations**


    Several alternative implementations of Python exist besides CPython. In particular,
    a few of these include JIT compilation. The most widely used such implementation
    is PyPy (https://www.pypy.org/), which JITs everything, and does so remarkably
    well. Its main drawbacks are that it has fallen behind version compatibility with
    CPython, and that using compiled extensions created for CPython can encounter
    overheads that reduce the speed advantages greatly.


    Less widely used attempts at JIT Python interpreters include Pyston (https://github.com/pyston/pyston),
    Cinder (https://github.com/facebookincubator/cinder), and Pyjion (https://github.com/tonybaloney/Pyjion).
    While all of these have good ideas within them—and all are derived from CPython
    source code (unlike PyPy)—these open source projects still largely have a focus
    within the private companies that developed them. Those are Dropbox, Meta, and
    Microsoft, respectively (Alphabet—i.e., Google—subsidiary DeepMind abandoned its
    similar S6 project).


    Reservations mentioned, it is well possible that a custom data structure developed
    as pure Python but used in a JIT interpreter will achieve the speed and flexibility
    advantages that those developed in compiled languages have.


    Accompanying the fact that Python is relatively slow, most of the built-in and
    standard library data structures you might reach for are written in highly optimized
    C. Much the same is true for the widely used library NumPy, which has a chapter
    of its own.


    On the one hand, custom data structures such as those mentioned can have significant
    big-O complexity advantages over those that come with Python.⁵ On the other hand,
    these advantages need to be balanced against what is usually a (roughly) constant


