    \ '1.150', '2.000', '0.326', '0.000', '0.963']\n```\n\nI have not bothered to\
    \ display the contents of the several data files because those don't really matter.\
    \ They are all text files with one number listed per line. However, do notice\
    \ that the code considers the case of a line containing a string that cannot be\
    \ converted to a `float`.\n\nUnfortunately, the `zip(strict=True)` and the `float(\"\
    abc\")` cases both raise `ValueError` rather than more specific subclasses. We\
    \ have to tease them apart inside the `except` suite by looking at the actual\
    \ messages contained inside the exception object. This remains slightly fragile\
    \ because Python does not guarantee it will not change the wording of error messages\
    \ between versions, and we are simply looking for substrings that currently occur\
    \ inside those messages. Actually, even more than not guaranteeing, a conscious\
    \ effort is being made to improve the quality of error messages since 3.10; but\
    \ “improve” obviously means “change.”"
