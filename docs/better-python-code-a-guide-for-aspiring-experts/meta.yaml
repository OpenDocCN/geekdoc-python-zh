    # 2.7 Wrapping Up


    The puzzles of equality and identity have stymied many accomplished programmers.
    In Common Lisp, developers distinguish among eq, equal, eql, and equalp. In Scheme,
    they settle for just =, eqv?, and equal?. In JavaScript, equality is notoriously,
    and humorously, non-transitive. A well-known diagram (shown in Figure 2.1 as the
    “theological trinity”) about JavaScript gives us a perspective into the comparative
    sanity of Python, which maintains transitivity (absent deliberately pathological
    custom classes, which can make all horrors possible).


    ![](img/260d2e810ee4666cb82be4957d5d9141_65_0.png)


    In Python we do not have quite so many variations on a theme. Instead, we have
    a test for *identical* objects with `is` and a test for *equivalent* objects with
    `==`. The semantics are relatively straightforward, but many mistakes still occur
    as developers try to decide what they mean between these concepts.


    A footnote to this chapter might add that while Python’s standard library has
    the very useful function `copy.deepcopy()` to recursively copy nested collections,
    there does not exist in the standard library any function for `deepequality()`
    that would, hypothetically, recursively compare such nested collections. A great
    many recipes you can find online have implemented such a thing, but they are each
    slightly different and none ascend to a ubiquity meriting inclusion in these discussions.
    This provides an opportunity for you to make your very own novel mistake.'
