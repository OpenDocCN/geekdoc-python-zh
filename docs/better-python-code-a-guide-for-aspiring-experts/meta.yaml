  - "[PAGE 47]\n\nThis approach is very helpful in working independently of the length\
    \ of the several streams of data, merely enforcing that they are the same. And\
    \ it is very much a “fail fast” approach, which is almost universally desirable.\n\
    \nHowever, there are likewise definitely situations where imputing sentinel values\
    \ for missing data is more appropriate. A *sentinel* is a special value that can\
    \ mark a “special” situation for a data point. A very common sentinel, in many\
    \ contexts, is `None`. Sometimes you might use a value like -1 as a sentinel to\
    \ indicate that “normal” values are positive. At other times, you might include\
    \ a defined name like `my_sentinel = object()` to guarantee that this value is\
    \ distinct from everything else in your program. Filling in imputed values is\
    \ easy with `zip_longest()`.\n\nUsing `itertools.zip_longest()` to impute missing\
    \ data\n\n```\n>>> from itertools import zip_longest\n>>> stations = []\n>>> with\
    \ (\n...     open(\"station-names.txt\") as names,\n...     open(\"station-lattrunc.txt\"\
    ) as lats,\n...     open(\"station-longitudes.txt\") as lons,\n...     open(\"\
    station-elevations.txt\") as els,\n... ):\n...     for datum in zip_longest(\n\
    ...             names, lats, lons, els, fillvalue=\"-1\"):\n...         datum\
    \ = (d.rstrip() for d in datum)\n...         stations.append(Station(*datum))\n\
    ...\n>>> pprint(stations[-6:])\n[Station(name='SCUOL', latitude='46.8',\n    longitude='10.2833333',\
    \ elevation='1295.0'),\n Station(name='NALUNS', latitude='-1',\n    longitude='10.2666666',\
    \ elevation='2400.0'),\n Station(name='BUOCHS AIRPORT STANS', latitude='-1',\n\
    \    longitude='8.4', elevation='450.0'),\n Station(name='SITTERDORF', latitude='-1',\n\
    \    longitude='9.2666666', elevation='506.0'),\n Station(name='SCALOTTAS', latitude='-1',\n\
    \    longitude='9.5166666', elevation='2323.0'),\n Station(name='VADUZ', latitude='-1',\n\
    \    longitude='9.5166666', elevation='463.0')]\n```\n\nIn the case of `zip_longest()`,\
    \ shorter iterables are simply filled in with some sentinel. `None` is the default,\
    \ but it is configurable using the argument `fillvalue`.\n\nNeither of the approaches\
    \ in this section is flawless, of course. In particular, having items from iterables\
    \ *correspond* correctly is a much stricter requirement than having them *align*\
    \ correctly. If one series drops item 10 and another drops item 20, they could\
    \ still"
- md: "## 1.9 Wrapping Up\n\nOne of the loveliest elements of modern Python is its\
    \ emphasis on looping over iterables, including those that are not concrete collections.\
    \ In some mistakes in Chapter 4, *Advanced Python Usage*, we look at explicit\
    \ “iterator algebra.” This chapter reflects patterns and habits you will use nearly\
    \ every time you write Python code; we have emphasized Python’s focus on looping\
    \ *over* the data you are actually concerned with rather than over indirections\
    \ towards it.\n\nBeyond those mistakes that guide you to emphasize the right things\
    \ to loop over, we also looked at the danger of mutating concrete collections\
    \ during iteration and at how `while` loops, when they are the more elegant approach,\
    \ can benefit from use of the newish walrus operator.\n\n## 2 Confusing Equality\
    \ with Identity\n\nMost objects in Python are mutable. Moreover, *all objects*\
    \ in Python are accessed by reference. For objects that are immutable, such as\
    \ strings, numbers, and **frozensets**, comparing for equality or inequality rarely\
    \ raises a concern about whether those objects are also identical. However, for\
    \ mutable objects such as mutable collections, it becomes very important to distinguish\
    \ identity from mere equality.\n\nIn many programming languages, a distinction\
    \ is made between *pass by value*, *pass by address*, and *pass by reference*\
    \ (occasionally *pass by name* occurs as well). Python behaves most similarly\
    \ to reference passing, but in Python lingo we often emphasize Python's semantics\
    \ by calling the behavior *pass by object reference*. Being thoroughly object\
    \ oriented, Python always encapsulates its objects, regardless of the scope they\
    \ exist within. It's not the value that is passed into functions, nor is it a\
    \ memory address, nor is it a variable name, it's simply an *object*.\n\nWhat\
    \ becomes important to consider is whether an object passed into a function or\
    \ method is *immutable*. If it is, then it behaves very much like a passed value\
    \ in other languages (since it cannot be changed at all and therefore is not in\
    \ the calling scope). The particular name an object has in different scopes can\
    \ vary, but the object remains the same under each name. If that object is mutable,\
    \ it might be mutated within a child scope, changing it within the calling scope\
    \ (or elsewhere within the runtime behavior of a program).\n\n### 2.1 Late Binding\
    \ of Closures\n\nThe scoping behavior of Python can cause surprises for programmers\
    \ coming from other dynamic programming languages. An expectation of many developers\
    \ is that if a function—including a *lambda* function—is created within a loop\
    \ (including within the loop element of a list, set, dict, or generator comprehension),\
    \ then the created function will utilize the value of a variable that exists at\
    \ the time the function is created.\n\n> **Note Interning commonly used immutable\
    \ objects**\n\nAs an optimization strategy, CPython (and other implementations)\
    \ sometimes reuses the memory allocation for certain objects by treating them\
    \ as pseudo-eternal. Most notably, *small integers* and *short strings* will often\
    \ reuse the identical objects to refer to equal objects that go by different names.\n\
    \nThe specific details of when this happens are implementation and version dependent,\
    \ and you should never rely on such behavior within your programs. They merely\
    \ might go faster as a result of these optimizations. For example, CPython and\
    \ PyPy take very different approaches to “interning” but no well-written programs\
    \ will notice this implementation difference.\n\n#### Integer interning\n\n```\n\
    >>> a = 5\n>>> b = 2 + 3\n>>> a == b, a is b\n(True, True)\n>>> c = 1_000_000\n\
    >>> d = 999_999 + 1\n>>> c == d, c is d\n(True, False)\n```\n\n#### String interning\n\
    \n```\n>>> e = \"foobar\"\n>>> f = \"foo\" + \"bar\"\n>>> e == f, e is f\n(True,\
    \ True)\n>>> g = \"flimflam\"\n>>> h = \".join([\"flim\", \"flam\"])\n>>> g ==\
    \ h, g is h\n(True, False)\n```\n\nHowever, Python *binds by name* in this circumstance,\
    \ rather than binding by value. The value eventually utilized is the *final* value\
    \ a variable takes on at the time the closure function is eventually called.\n\
    \n#### Surprising behavior of functions created as closures\n\n```\n>>> def make_adders(addends):\n\
    ...     funcs = []\n...     for addend in addends:\n...         funcs.append(lambda\
    \ x: x + addend)    # ❶\n...     return funcs\n...\n>>> adders = make_adders([10,\
    \ 100, 1000])       # ②\n>>> for adder in adders:\n...     print(adder(5))\n...\n\
    1005\n1005\n1005\n```\n\n❶ The lambda does nothing special here; using a def adder\
    \ inner function definition produces the exact same behavior.\n\n② Notice that\
    \ adders is a list of functions, each of which is called in the loop.\n\n> **Note\
    \ So what is a closure, anyway?**\n\nThe term closure is a bit of computer science\
    \ lingo that, while important, might not be familiar to people who are new to\
    \ programming or have not studied theoretical aspects. Don’t worry, it’s not as\
    \ bad as it seems.\nIn programming languages, a (lexical; i.e., nested scope)\
    \ closure means that variables defined outside the current scope of a function\
    \ definition are “closed over.” That is to say, the function itself in some manner\
    \ captures those variables and they can continue to be used later when the function\
    \ is called.\nAs we will see, however, whereas many programming languages “capture”\
    \ variables as their values, Python captures them as their names.\n\nIn contrast,\
    \ if we were to write a very closely analogous program in (fairly) modern JavaScript,\
    \ the behavior is probably what we would expect. Older JavaScript does contain\
    \ the keyword function that would be even more closely parallel with the Python\
    \ version; but preference for “arrow functions” has become predominant over the\
    \ last few years.\n\n#### Less surprising behavior of JavaScript closures\n\n\
    ```\n// Welcome to Node.js v18.10.0.\n> const make_adders = (addends) => {\n...\
    \     const funcs = [];\n...     for (const addend of addends) {\n...        \
    \ funcs.push((x) => x + addend);\n...     };\n...     return funcs;\n... };\n\
    undefined\n> const adders = make_adders([10, 100, 1000]);\nundefined\n> for (const\
    \ adder of adders) {\n... console.log(adder(5));\n... };\n15\n105\n1005\nundefined\n\
    ```\n\nIn the JavaScript comparison, the const keyword is forcing “expected” scoping,\
    \ but we can accomplish the same thing in Python by using keyword binding to force\
    \ more obvious scoping. To get the output that most newcomers—and probably most\
    \ experienced Python developers as well—expect, force early binding by assigning\
    \ default arguments.\n\n#### Less surprising behavior of Python closures\n\n```\n\
    >>> def make_adders(addends):\n...     funcs = []\n...     for addend in addends:\n\
    ...         funcs.append(lambda x, *, _addend=addend: x + _addend)\n...     return\
    \ funcs\n...\n>>> adders = make_adders([10, 100, 1000])          # ❶\n>>> for\
    \ adder in adders:\n...     print(adder(5))\n...\n15\n105\n1005\n```\n\n❶ adders\
    \ is a list of (lambda) function objects.\n\nWe have required that only one positional\
    \ argument is passed, and used a “private” name for the keyword argument. Technically,\
    \ of course, we could still override the behavior of the closure function, though:\n\
    \n```\n>>> add10 = adders[0]\n>>> add10(5, 6)\nTraceback (most recent call last):\n\
    \  Cell In[272], line 1\n    add10(5, 6)\nTypeError: make_adders.<locals>.<lambda>()\
    \ takes 1 positional\nargument but 2 were given\n\n>>> add10(5, _addend=6)\n11\n\
    ```\n\n### 2.2 Overchecking for Boolean Values\n\nNearly all objects in Python\
    \ are “truthy” or “falsy.” That is to say that in a *Boolean context*, almost\
    \ all objects are perfectly usable “bare” without wrapping them in `bool()`, and\
    \ especially not with a completely pointless comparison of `obj is True` or `obj\
    \ is False`.\nWhile often the `is True` and `is False` are simply unnecessary,\
    \ they can sometimes cause actual bugs. The value you obtain from a function call—specifically\
    \ from a function that you did not write yourself, such as a function from a library—may\
    \ not be `True` or `False` since the API only guarantees or attempts to return\
    \ a truthy or falsy value. Quite often, assuming a value is an actual Boolean\
    \ will *often* work, then fail unexpectedly where the function utilizes a different\
    \ type of object, such as to communicate a sentinel.\n\n> **Note Special cases\
    \ of truthiness**\n\nAs a quick guide, numbers that are equal to zero are falsy.\
    \ So are collections that are empty. So are string-like objects of length zero.\
    \ Naturally, so are the singletons `False` and `None`. When you see those values\
    \ in a “Boolean context” they are equivalent to an actual `False`. Most other\
    \ objects are truthy.\nWell-known objects that are neither truthy nor falsy are\
    \ NumPy arrays and Pandas Series and DataFrames.\n\n```python\n>>> import numpy\
    \ as np\n>>> import pandas as pd\n>>> arr = np.array([1, 2])\n>>> bool(arr)\n\
    ValueError: The truth value of an array with more than one element is ambiguous.\
    \ Use a.any() or a.all()\n\n>>> series = pd.Series([1, 2], index=[\"A\", \"B\"\
    ])\n>>> series\nA    1\nB    2\ndtype: int64\n>>> bool(series)\nValueError: The\
    \ truth value of a Series is ambiguous.\n    Use a.empty, a.bool(), a.item(),\
    \ a.any() or a.all().\n```\n\nYou can define the truthiness of your own classes\
    \ by including a `__bool__()` dunder method. While you *can* do something else,\
    \ as we see with NumPy and Pandas, you almost always want to return `True` or\
    \ `False` from that method, according to whatever criteria make sense for instances\
    \ of your custom class."
  mdcn: "## 1.9 总结\n\n现代 Python 最迷人的特性之一，是它强调对可迭代对象进行循环，包括那些并非具体集合的迭代对象。在第 4 章《高级\
    \ Python 用法》的一些错误示例中，我们探讨了显式的“迭代器代数”。本章反映了你几乎每次编写 Python 代码时都会用到的模式和习惯；我们强调了 Python\
    \ 的重点在于循环遍历你实际关心的数据，而不是循环遍历指向数据的间接引用。\n\n除了那些引导你强调正确循环对象的错误示例，我们还探讨了在迭代过程中修改具体集合的危险，以及当\
    \ `while` 循环是更优雅的方法时，如何受益于使用较新的海象运算符。\n\n## 2 混淆相等性与同一性\n\nPython 中的大多数对象都是可变的。此外，Python\
    \ 中的*所有对象*都是通过引用访问的。对于不可变对象，如字符串、数字和**冻结集合**，比较相等性或不相等性很少会引发关于这些对象是否也是同一对象的担忧。然而，对于可变对象，如可变集合，区分同一性与单纯的相等性变得非常重要。\n\
    \n在许多编程语言中，会区分*按值传递*、*按地址传递*和*按引用传递*（有时也会出现*按名称传递*）。Python 的行为最类似于引用传递，但在 Python\
    \ 术语中，我们通常通过称其为*按对象引用传递*来强调 Python 的语义。由于 Python 是彻底面向对象的，无论对象存在于何种作用域中，它总是封装其对象。传递给函数的不是值，也不是内存地址，也不是变量名，它仅仅是一个*对象*。\n\
    \n需要考虑的重要问题是，传递给函数或方法的对象是否是*不可变的*。如果是，那么它的行为就非常类似于其他语言中的按值传递（因为它根本无法被改变，因此不在调用作用域内）。对象在不同作用域中的特定名称可能不同，但对象在每个名称下保持不变。如果该对象是可变的，它可能会在子作用域中被修改，从而在调用作用域（或程序运行时行为中的其他地方）中改变它。\n\
    \n### 2.1 闭包的延迟绑定\n\nPython 的作用域行为可能会让来自其他动态编程语言的程序员感到意外。许多开发者的预期是，如果一个函数——包括\
    \ *lambda* 函数——是在循环中创建的（包括在列表、集合、字典或生成器推导式的循环元素中），那么创建的函数将使用函数创建时存在的变量的值。\n\n\
    > **注意 常用不可变对象的驻留**\n\n作为一种优化策略，CPython（和其他实现）有时会通过将某些对象视为伪永久对象来重用其内存分配。最值得注意的是，*小整数*和*短字符串*通常会重用相同的对象来指代不同名称的相等对象。\n\
    \n发生这种情况的具体细节取决于实现和版本，你永远不应该在程序中依赖这种行为。它们可能仅仅因为这些优化而运行得更快。例如，CPython 和 PyPy 在“驻留”方面采取了非常不同的方法，但编写良好的程序不会注意到这种实现差异。\n\
    \n#### 整数驻留\n\n```\n>>> a = 5\n>>> b = 2 + 3\n>>> a == b, a is b\n(True, True)\n\
    >>> c = 1_000_000\n>>> d = 999_999 + 1\n>>> c == d, c is d\n(True, False)\n```\n\
    \n#### 字符串驻留\n\n```\n>>> e = \"foobar\"\n>>> f = \"foo\" + \"bar\"\n>>> e == f,\
    \ e is f\n(True, True)\n>>> g = \"flimflam\"\n>>> h = \".join([\"flim\", \"flam\"\
    ])\n>>> g == h, g is h\n(True, False)\n```\n\n然而，在这种情况下，Python 是*按名称绑定*，而不是按值绑定。最终使用的值是闭包函数最终被调用时变量所取的*最终*值。\n\
    \n#### 作为闭包创建的函数的意外行为\n\n```\n>>> def make_adders(addends):\n...     funcs = []\n\
    ...     for addend in addends:\n...         funcs.append(lambda x: x + addend)\
    \    # ❶\n...     return funcs\n...\n>>> adders = make_adders([10, 100, 1000])\
    \       # ②\n>>> for adder in adders:\n...     print(adder(5))\n...\n1005\n1005\n\
    1005\n```\n\n❶ 这里的 lambda 没有做任何特殊的事情；使用 def adder 内部函数定义会产生完全相同的行为。\n\n② 注意 adders\
    \ 是一个函数列表，每个函数都在循环中被调用。\n\n> **注意 那么，闭包到底是什么？**\n\n术语“闭包”是计算机科学中的一点行话，虽然重要，但对于编程新手或没有研究过理论方面的人来说可能不熟悉。别担心，它并没有看起来那么糟糕。\n\
    在编程语言中，（词法的；即嵌套作用域的）闭包意味着在函数定义的当前作用域之外定义的变量被“闭合”了。也就是说，函数本身以某种方式捕获了这些变量，并且在函数被调用时可以继续使用它们。\n\
    然而，正如我们将看到的，许多编程语言“捕获”变量是捕获它们的值，而 Python 捕获的是它们的名称。\n\n相比之下，如果我们用（相当）现代的 JavaScript\
    \ 编写一个非常类似的程序，其行为可能是我们所期望的。旧版 JavaScript 确实包含关键字 function，这与 Python 版本更接近；但在过去几年中，对“箭头函数”的偏好已成为主流。\n\
    \n#### JavaScript 闭包的意外行为较少\n\n```\n// Welcome to Node.js v18.10.0.\n> const make_adders\
    \ = (addends) => {\n...     const funcs = [];\n...     for (const addend of addends)\
    \ {\n...         funcs.push((x) => x + addend);\n...     };\n...     return funcs;\n\
    ... };\nundefined\n> const adders = make_adders([10, 100, 1000]);\nundefined\n\
    > for (const adder of adders) {\n... console.log(adder(5));\n... };\n15\n105\n\
    1005\nundefined\n```\n\n在 JavaScript 的对比中，const 关键字强制了“预期的”作用域，但我们可以通过在 Python\
    \ 中使用关键字绑定来强制更明显的作用域，从而达到相同的效果。为了获得大多数新手——可能也包括大多数经验丰富的 Python 开发者——所期望的输出，可以通过分配默认参数来强制早期绑定。\n\
    \n#### Python 闭包的意外行为较少\n\n```\n>>> def make_adders(addends):\n...     funcs =\
    \ []\n...     for addend in addends:\n...         funcs.append(lambda x, *, _addend=addend:\
    \ x + _addend)\n...     return funcs\n...\n>>> adders = make_adders([10, 100,\
    \ 1000])          # ❶\n>>> for adder in adders:\n...     print(adder(5))\n...\n\
    15\n105\n1005\n```\n\n❶ adders 是一个（lambda）函数对象的列表。\n\n我们要求只传递一个位置参数，并为关键字参数使用了一个“私有”名称。当然，从技术上讲，我们仍然可以覆盖闭包函数的行为：\n\
    \n```\n>>> add10 = adders[0]\n>>> add10(5, 6)\nTraceback (most recent call last):\n\
    \  Cell In[272], line 1\n    add10(5, 6)\nTypeError: make_adders.<locals>.<lambda>()\
    \ takes 1 positional\nargument but 2 were given\n\n>>> add10(5, _addend=6)\n11\n\
    ```\n\n### 2.2 过度检查布尔值\n\nPython 中几乎所有的对象都是“真值”或“假值”。也就是说，在*布尔上下文*中，几乎所有对象都可以直接使用，无需用\
    \ `bool()` 包装，尤其不需要进行完全无意义的 `obj is True` 或 `obj is False` 比较。\n虽然 `is True` 和\
    \ `is False` 通常只是不必要的，但它们有时会导致实际的错误。你从函数调用中获得的值——特别是从你没有自己编写的函数中获得的值，例如来自库的函数——可能不是\
    \ `True` 或 `False`，因为 API 只保证或尝试返回一个真值或假值。通常，假设一个值是实际的布尔值*通常*是有效的，然后当函数使用不同类型的对象（例如用于传递哨兵值）时，它会意外失败。\n\
    \n> **注意 真值的特殊情况**\n\n作为快速指南，等于零的数字是假值。空的集合也是假值。长度为零的类字符串对象也是假值。当然，单例 `False`\
    \ 和 `None` 也是假值。当你在“布尔上下文”中看到这些值时，它们等同于实际的 `False`。大多数其他对象是真值。\n既不是真值也不是假值的知名对象是\
    \ NumPy 数组以及 Pandas 的 Series 和 DataFrame。\n\n```python\n>>> import numpy as np\n\
    >>> import pandas as pd\n>>> arr = np.array([1, 2])\n>>> bool(arr)\nValueError:\
    \ The truth value of an array with more than one element is ambiguous. Use a.any()\
    \ or a.all()\n\n>>> series = pd.Series([1, 2], index=[\"A\", \"B\"])\n>>> series\n\
    A    1\nB    2\ndtype: int64\n>>> bool(series)\nValueError: The truth value of\
    \ a Series is ambiguous.\n    Use a.empty, a.bool(), a.item(), a.any() or a.all().\n\
    ```\n\n你可以通过包含 `__bool__()` 魔术方法来定义你自己类的真值。虽然你*可以*做其他事情，正如我们在 NumPy 和 Pandas 中看到的，但你几乎总是希望从该方法返回\
    \ `True` 或 `False`，根据对你的自定义类实例有意义的任何标准。"
