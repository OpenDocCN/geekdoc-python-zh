    \ produces the chart shown in Figure 1.2.\n\nLazily calculating only what is needed\
    \ within a generator\n\n```\npython\ndef word_numbers(src):\n    while (word :=\
    \ get_word(src=src)) is not None:\n        yield word_number(word)\n\n# source2\
    \ = <some different identifier for data source>\nmagic_nums = list(word_numbers(source2))\n\
    plt.plot(magic_nums)\nplt.title(f\"Magic values of {len(magic_nums):,} generated\
    \ words\")\nplt.show()\n```\n\nThe example shown in Figure 1.2 still needed to\
    \ instantiate the list of numbers, but not the list of actual words. If the “words”\
    \ were some much larger, memory-consuming object, this change would become more\
    \ significant. For many scenarios, exclusively incrementally processing each value\
    \ from a generator individually, with no intermediate collection at all, will\
    \ suffice, and save considerable memory."
  - "[PAGE 34]\n\n# Chapter 1 Looping Over the Wrong Things\n\n![](img/260d2e810ee4666cb82be4957d5d9141_34_0.png)\n\
    \nFigure 1.2 More magic values of generated words.\n\n# 1.2 Use enumerate() Instead\
    \ of Looping Over an Index\n\nDevelopers coming from C-derived languages sometimes\
    \ reach automatically for loops over the index elements of a list or other data\
    \ structure. This is usually an unpythonic way to write a loop. Code written in\
    \ this manner is not significantly slower than using enumerate(), but it is less\
    \ readable, is more verbose, and generally simply feels like a “code smell.”\n\
    \nFor example, in C++, an idiom like this is common:\n\n```\n// `items` could\
    \ be array, vector, or other collection types\nfor (int i = 0; i < items.size();\
    \ i++) {\n    process(i, items[i]);\n}\n```\n\nA closely analogous option is available\
    \ in Python, and in Python’s somewhat distant past, such an approach was the standard\
    \ available mechanism:\n\n```\nfor i in range(len(items)):\n    process(i, items[i])\n\
    ```"
  - "[PAGE 35]\n\nIndeed, if you are not required to utilize the index position within\
    \ a loop, utilizing the index at all is generally a code smell in Python. A much\
    \ more idiomatic option is simply:\n\n```\nfor item in items:\n    process(None,\
    \ item)\n```\n\nOn those fairly common occasions when you need both the index\
    \ and the underlying item, using `enumerate()` is much more expressive and idiomatic:\n\
    \n```\nfor i, item in enumerate(items):\n    process(i, item)\n```\n\nIn the relatively\
    \ uncommon situations when I want the index but not the item itself, I often use\
    \ `enumerate()` anyway, and I use the Python convention of `_` (single underscore)\
    \ representing “a value I don’t care about”:\n\n```\nfor i, _ in enumerate(items):\n\
    \    process(i, None)\n```\n\nAn approach that I use from time to time, when I\
    \ actually want to maintain several increments, is to initialize the several counters\
    \ prior to a loop, even if one of them could derive from `enumerate()`:\n\n```\n\
    total, n_foo, n_bar = 0, 0, 0\nfor item in items:\n    if is_foo(item):\n    \
    \    process_foo(item)\n        n_foo += 1\n    elif is_bar(item):\n        process_bar(item)\n\
    \        n_bar += 1\n    else:\n        pass\n    total += 1\n```\n\nIn the example,\
    \ `total` could equally well be reset while enumerating the loop itself, but you\
    \ might wish to emphasize the parallel with `n_foo` and `n_bar`, and that is probably\
    \ better expressed as shown here."
  - "[PAGE 36]\n\n# 1.3 Don't Iterate Over dict.keys() When You Want dict.items()\n\
    \nThere is a sense in which you can *almost* think of Python lists as mappings\
    \ from index positions to values. Within a dictionary, integers are perfectly\
    \ well able to act as keys; hence, `obj[7]` might equally well be an index into\
    \ a `dict` (or other mapping) or an index into a `list` (or other sequence).\n\
    \nIn much the same way as you sometimes see unpythonic code that loops over the\
    \ index positions of a list but then looks up that index within the body, you\
    \ also sometimes see unpythonic code that loops over `dict.keys()`. Actually,\
    \ let's back up just a bit: there are two stylistic mistakes that were just named.\
    \ Imagine code like this:\n\n```\nfor key in my_dict.keys():\n    process(key,\
    \ my_dict[key])\n```\n\nThis is nonidiomatic in the first instance because looping\
    \ over `my_dict.keys()` is equivalent to looping over `my_dict` itself. Behind\
    \ the scenes, slightly different types of objects are produced: `dict_keys` for\
    \ `my_dict.keys()` and `dict_keyiterator` from the dictionary itself. However,\
    \ little real code depends on this difference since they behave the same for most\
    \ purposes:\n\n```\n>>> my_dict = {c:ord(c) for c in \"Bread and butter\"}\n>>>\
    \ type(my_dict.keys())\n<class 'dict_keys'>\n>>> type(iter(my_dict))\n<class 'dict_keyiterator'>\n\
    ```\n\nSpecifically, the following identity will always apply, for every dictionary\
    \ (unless, with great perversity, you could break this identity in a subclass\
    \ of `dict` or in some custom mapping):\n\n```\n>>> all(a is b for a, b in zip(iter(my_dict),\
    \ iter(my_dict.keys())))\nTrue\n```\n\nIn other words, if you wish to loop over\
    \ keys, you should just write:\n\n```\nfor key in my_dict:\n    process(key, my_dict[key])\n\
    ```\n\nHowever, it is relatively uncommon to wish to loop *only* over the keys\
    \ of a dictionary. Even if you only rarely, in one branch of the code, actually\
    \ use the value, it costs nearly nothing to include it as a loop variable. Remember,\
    \ Python objects are accessed by"
  - "[PAGE 37]\n\nreference; you just assign a reference to an existing object by\
    \ binding a loop variable; you don't copy or create an object.\nIn other words,\
    \ don't bother with:\n\n```\nfor key in my_dict:\n    if rare_condition(key):\n\
    \        val = my_dict[key]\n        process(key, val)\n```\n\nSimply write the\
    \ clean, Pythonic code:\n\n```\nfor key, val = my_dict.items():\n    if rare_condition(key):\n\
    \        process(key, val)\n```\n\nThis problem is one that linters are likely\
    \ to warn about—as was probably the prior one about using `enumerate()`—but *understanding*\
    \ the mechanisms of loops goes further than just reading a warning.\n\n# 1.4 Mutating\
    \ an Object During Iteration\n\nYou should not mutate objects that you are iterating\
    \ over. At times you can “get away with” it without bad effects, but the habit\
    \ remains a bad one.\nThe first thing that we should note is that some Python\
    \ objects are immutable. If you iterate over a `str`, `bytes`, `tuple`, or `frozenset`\
    \ object, for example, the question simply does not arise of mutating the underlying\
    \ collection.\nStill, a lot of Python objects are both iterable and mutable—most\
    \ notably `list`, `dict`, `set`, and `bytearray`, although of course, custom or\
    \ third-party objects might be also. Attempting to mutate during iteration over\
    \ an object can go wrong in several different ways.\n\nBaseline iteration over\
    \ immutable object\n\n```\n>>> s = \"Mary had a little lamb!\"\n>>> for c in s:\n\
    ...     if c <= \"s\":\n...         print(c, end=\"\")\n... print()\nMar had a\
    \ lile lamb!\n```\n\nThis toy code is mostly pointless in itself, but we do a\
    \ selective operation on only those elements of an iterable that meet some predicate.\
    \ One thing we could certainly do rather than print off individual characters\
    \ is re-aggregate those passing the filter into some new"
- md: "## Chapter 1 Looping Over the Wrong Things\n\ncollection. That approach is\
    \ generally a perfectly good solution to all of the mutation issues, so keep it\
    \ in your pocket as an option.\nSuppose we want to try something similar using\
    \ mutable collections rather than an immutable string.\n\n### Quick failure in\
    \ mutation of iterables\n\n```python\n>>> my_set\n{'r', 'M', 'm', 'a', 'e', 'h',\
    \ 'l', 't', 'd', 'b', '!', ' ', 'i'}\n>>> my_set = set(\"Mary had a little lamb!\"\
    )\n>>> for c in my_set:\n...     if c > \"s\":\n...         my_set.discard(c)\n\
    ...\nTraceback (most recent call last):\n  [...]\nRuntimeError: Set changed size\
    \ during iteration\n\n>>> my_dict = {c:ord(c) for c in \"Mary had a little lamb!\"\
    }\n>>> for c in my_dict:\n...     if c > \"s\":\n...         del my_dict[c]\n\
    ...\nTraceback (most recent call last):\n  [...]\nRuntimeError: dictionary changed\
    \ size during iteration\n```\n\nThe temptation to mutate these iterables is reduced\
    \ by hitting a RuntimeError quickly. However, we are less fortunate for ordered\
    \ collections. Something goes wrong, but the error can be much more subtle and\
    \ harder to notice.\n\n### Hidden failure in mutation of iterables\n\n```python\n\
    >>> my_list = list(\"Mary had a little lamb!\")\n>>> for i, c in enumerate(my_list):\n\
    ...     if c > \"s\":\n...         del my_list[i]\n...\n>>> my_list\n['M', 'a',\
    \ 'r', ' ', 'h', 'a', 'd', ' ', 'a', ' ', 'l', 'i',\n 't', 'l', 'e', ' ', 'l',\
    \ 'a', 'm', 'b', '!']\n>>> \"\".join(my_list)\n'Mar had a litle lamb!'\n```\n\n\
    ```python\n>>> my_ba = bytearray(\"Mary had a little lamb!\", \"utf8\")\n>>> for\
    \ i, c in enumerate(my_ba):\n...     if c > ord(\"s\"):\n...         del my_ba[i]\n\
    ...\n>>> my_ba\nbytearray(b'Mar had a litle lamb!')\n```\n\nIn this code, things\
    \ appear superficially to work correctly. No exceptions are raised. We genuinely\
    \ do get a list or bytearray with some characters removed. However, looking slightly\
    \ more closely we see that one of the t characters that should be filtered out\
    \ remains in the mutated object. This happened because once an element was deleted,\
    \ the index position no longer aligned with the actual underlying sequence. A\
    \ corresponding problem would arise with insertion of new elements.\n\nThe correct\
    \ way to approach this requirement is simply to create a brand-new object based\
    \ on the predicate applied and selectively append to it. An append is a cheap\
    \ operation on a Python list or bytearray (however, insertion into the middle\
    \ of a new sequence can easily hit quadratic complexity—a danger warned about\
    \ in other parts of this book).\n\n### Creating a new object as a filter of a\
    \ sequence\n\n```python\n>>> my_list = list(\"Mary had a little lamb!\")\n>>>\
    \ new_list = []\n>>> for c in my_list:\n...     if c <= \"s\":\n...         new_list.append(c)\n\
    ...\n>>> new_list\n['M', 'a', 'r', ' ', 'h', 'a', 'd', ' ', 'a', ' ', 'l', 'i',\
    \ 'l', 'e', ' ', 'l', 'a', 'm', 'b', '!']\n>>> \"\".join(new_list)\n'Mar had a\
    \ lile lamb!'\n```\n\nEven more compactly:\n\n```python\n>>> new_list = [c for\
    \ c in my_list if c <= \"s\"]\n>>> \"\".join(new_list)\n'Mar had a lile lamb!'\n\
    ```\n\nRecall that you can also make a (shallow) copy of a sequence simply by\
    \ taking the null slice of it. In slightly different scenarios, my_list[:] or\
    \ my_ba[:] can often be useful as easy syntax for creating a new sequence containing\
    \ the same items.\n\n## 1.5 for Loops Are More Idiomatic than while Loops\n\n\
    When possible, a Pythonic loop looks like: `for item in iterable`. This is the\
    \ basic idiom, and when you find yourself doing something else, think about whether\
    \ that other thing is actually better.\n\nIn writing a loop in a program, you\
    \ are often faced with the choice between `for` and `while`. Or to be precise,\
    \ you *could* always use either one for any given loop. It may not be obvious,\
    \ but you could get by in a language that only had `for` if it has infinite iterators.\n\
    \n### Equivalent of `while predicate(a, b)` using only `for`\n\n```python\n>>>\
    \ from itertools import repeat\n>>> a, b = 17, 23  # Initial example values have\
    \ no special meaning\n>>> for _ in repeat(None):  # ❶\n...     print(\"Current\
    \ values:\", a, b)\n...     if predicate(a, b):  # ❷\n...         break\n... \
    \    a = get_data(a)  # ❸\n...     b = get_data(b)  # ❸\n...\nCurrent values:\
    \ 857 338\nCurrent values: 613 500\nCurrent values: 611 47\nCurrent values: 387\
    \ 871\nCurrent values: 689 812\nCurrent values: 406 892\nCurrent values: 817 522\n\
    ```\n\n- ❶ An infinite iterator always yielding `None`\n- ❷ Deliberately vague\
    \ about what `predicate()` is checking\n- ❸ Deliberately vague about what `get_data()`\
    \ is doing\n\nThe preceding code is a standard example of a `while True` loop,\
    \ but written without `while`. That is, we get data to work on in a stateful way.\
    \ Then we evaluate that data with an expectation that it *might* reach a state\
    \ where we wish to exit the loop (but it might also be an eternally running server).¹\n\
    \nExpressing `for` in terms of `while` is even simpler as a translation.\n\n###\
    \ Equivalent of `for item in iterable` using only `while`\n\n```python\n>>> #\
    \ iterable = <collection, generator, something else>\n>>> iterator = iter(iterable)\n\
    >>> try:\n...     while True:\n...         item = next(iterator)\n...        \
    \ print(\"Current item:\", item)\n... except StopIteration:\n...     pass\n...\n\
    Current item: 2\nCurrent item: 3\nCurrent item: 5\nCurrent item: 7\nCurrent item:\
    \ 11\n```\n\nObviously, you can do the same conditional branching, `break`, `continue`,\
    \ or all the other actions you might put inside a `for` loop in the preceding\
    \ `while` construct.\n\nNotwithstanding their formal equivalence (possibly with\
    \ a small number of extra lines to force it), it is far more common for a `for`\
    \ loop to feel Pythonic than it is for a `while` loop. This general advice has\
    \ *many* exceptions, but you will find that *almost always* when you loop in Python,\
    \ it is either over a collection or over an iterable (such as a generator function,\
    \ generator comprehension, or custom iterable class). In many of the times when\
    \ this is not the case, it is a call to refactor the part of your code that provides\
    \ data to operate *into* an iterable.\n\nIt is *not* a mistake to use `while`,\
    \ but whenever you find yourself writing it, you should still ask yourself: “Can\
    \ I do this as a `for` loop?” Ask yourself the same question for code you are\
    \ in a position to refactor. The answer may well be that the `while` loop is the\
    \ most expressive and clearest version, but the question should still have occurred\
    \ to you. Thinking in terms of (potentially infinite) sequences usually promotes\
    \ clear and elegant design in Python.\n\n## 1.6 The Walrus Operator for “Loop-and-a-Half”\
    \ Blocks\n\nA pattern that Python programmers—and programmers in many other programming\
    \ languages—have often used has always been just slightly ugly. This is the “loop-and-a-half”\
    \ pattern. In fact, a number of languages have been designed with, or later grown,\
    \ a construct like `do ... while` or `repeat ... until` specifically to avoid\
    \ exactly this minor wart. For example, the following code uses the same mysterious\
    \ `get_data()` and `predicate()` functions from the previous sections.\n\n###\
    \ Old-style loop-and-a-half in Python\n\n```python\n>>> val = get_data()\n>>>\
    \ while not predicate(val):\n...     print(\"Current value acceptable:\", val)\n\
    ...     val = get_data()\n...\nCurrent value acceptable: 869\nCurrent value acceptable:\
    \ 805\nCurrent value acceptable: 632\nCurrent value acceptable: 430\n```\n\nThe\
    \ repetition of the assignment to `val` both before the loop and within the loop\
    \ body just feels slightly wrong from a stylistic and code-clarify perspective\
    \ (although, it's not an actual *mistake*).\nA probably even less aesthetically\
    \ pleasing variant on this pattern is to use `break` within the body to avoid\
    \ the repetition.\n\n### Internal-break-style loop-and-a-half in Python\n\n```python\n\
    >>> while True:\n...     val = get_data()\n...     if predicate(val):\n...   \
    \      break\n...     print(\"Current value acceptable:\", val)\n...\nCurrent\
    \ value acceptable: 105\nCurrent value acceptable: 166\nCurrent value acceptable:\
    \ 747\n```\n\nSince Python 3.8, we've had the option of using the so-called \"\
    walrus operator\" to simplify this structure. The operator is fancifully named\
    \ for its resemblance to an emoticon of a walrus with eyes and tusks. The walrus\
    \ operator (`:=`) allows you to assign a value within an expression rather than\
    \ only as a statement.\n\n### New-style loop-and-a-half in Python\n\n```python\n\
    >>> while not predicate(val := get_data()):\n...     print(\"Current value acceptable:\"\
    , val)\n...\nCurrent value acceptable: 859\nCurrent value acceptable: 296\nCurrent\
    \ value acceptable: 235\nCurrent value acceptable: 805\nCurrent value acceptable:\
    \ 383\n```\n\nIn both cases where the predicate is inside the `while` statement,\
    \ the loop might be entered as few as zero times. With a `while True`, the loop\
    \ is always entered at least once, but it might terminate early (the \"and-a-half\"\
    ) if some condition occurs.\n\n¹ Readers are welcome to try to guess what `get_data()`\
    \ and `predicate()` are doing. Come prepared with a deep understanding of the\
    \ Mersenne Twister pseudo-random number generator (PRNG)."
