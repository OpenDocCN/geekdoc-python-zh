    ❸ Even the next 16-bit float after a million is infinity.

    ❹ The “next” 16-bit float after 50,000 is actually smaller than 50k.


    Despite the doom and gloom of some of these examples, there is *often* (but not
    always) a pretty straightforward way to address these granularity issues. If your
    operation involves adding together numbers of widely different sizes, sorting
    them in reverse order by absolute value first will generally achieve the best
    stability you can find with floating point numbers.


    > **Note Being absolutely precise about numeric error**


    Although the heuristic I provide is worth keeping in mind, it is *not* what the
    statistics module does. Instead (simplifying a bit), that module first converts
    all numbers to numerically exact (but much slower) Fractions, then down-converts
    back to floats as needed.


    A “usually correct” heuristic for adding collections of numbers


    ```

    >>> nums = [1e20, 1.0, -1e20]

    >>> sum(sorted(nums, key=abs, reverse=True))/len(nums)

    0.3333333333333333

    ```'
