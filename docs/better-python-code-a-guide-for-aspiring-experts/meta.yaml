    # 6.3 collections.deque


    A deque is a thread-safe generalization of stacks and queues. That is to say,
    while a `collections.deque` has almost the same API as does the built-in `list`,
    it adds `.*left()` versions of several methods of lists. Crucially, even though
    lists *can* do these same things—for example, `list.pop(0)` does the same thing
    as `deque.popleft()`, and `list.insert(0, x)` does the same thing as `deque.appendleft()`—a
    deque does them *efficiently*. Both FIFO (first in, first out) and LIFO (last
    in, first out) operations work well with deques.


    In Chapter 7, *Misusing Data Structures*, the first two sections treat situations
    in which ill-advised uses of lists can have quadratic complexity (see the note
    in the first section of Chapter 3, *A Grab Bag of Python Gotchas*, and https://en.wikipedia.org/wiki/Big_O_notation
    for discussions of “quadratic”). This section foreshadows those discussions.


    Underneath the implementation of `collection.deque` is a *doubly linked list*
    rather than an *array of references* (as with `list`). This makes appending or
    popping from both ends efficient, but it also makes indexing less efficient than
    on lists, and slices are unavailable (because providing them would falsely imply
    efficiency in the eyes of the `deque` designer, Raymond Hettinger). However, `deque`
    provides an interesting `.rotate()` method that lists lack (also because they
    are inefficient there). Neither `deque` nor `list` is a “pure win,” but rather
    provides a trade-off. The complexity of some common operations is presented in
    Table 6.1.


    Table 6.1 Efficiency of common operations on deque and list.


    | Operation | deque | list |

    | :--- | :--- | :--- |

    | Indexing at a position (stuff[p]) | O(N) | O(1) |

    | Popping/appending item at left side | O(1) | O(N) |

    | Popping/appending item at right side | O(1) | O(1) amortized |

    | Inserting/deleting from middle | O(N) | O(N) |'
