    >>> Ratio(3, 10) + 0.3

    Ratio(54043195528445951, 90071992547409920)

    ```


    The problem is that we''ve only handled addition this way. Other operators obviously
    exist as well:


    ```

    >>> Ratio(3, 10) * 1.0

    0.3

    ```


    Adding a full suite of dunder methods for all the operators would be straightforward,
    merely slightly tedious. Start with `__mul__()` and `__rmul__()` and work your
    way through the rest in similar fashion.


    # What to Do with All of These Numbers?


    If we enforce a rule within our own projects that all the numbers we are operating
    on are `decimal.Decimal`, or that they are all `fractions.Fraction`, operations
    will remain sensible. It creates doubts about the meaningfulness of the hierarchy
    of numeric virtual types, but we would remain within just one numeric domain.


    As mentioned earlier, the problem with the domain of `Fraction` is that as the
    numerator and denominator often grow unboundedly larger as a result of performing
    many operations, the speed and memory usage get dramatically worse. Doing many
    calculations on many numbers can become a major bottleneck in this numeric domain.


    The domain of `Decimal` remains a fixed length, which can be set by a context
    (defaulting to 28 digits), and is reasonably fast in performing operations. Floating
    point remains about 2× to 5× faster than `Decimal` at a similar precision, but
    the latter is not terrible. The problem is that for scientific or other observation-based
    measurements, base-2 minimizes the accumulation of numeric bias *far better* than
    does base-10. Base-10 is easier for most humans to understand, but its rounding
    errors are *not* numerically superior.


    Using a bit of cleverness—arguably too much of it—we could also create custom
    classes that forced results of operations into their own numeric domain, as shown,
    in partially fleshed-out form, with the `Ratio` class.


    Choosing the right numeric datatype is often a relevant concern for Python programmers,
    and happily Python provides several options beyond floating point. Creating custom
    classes with more specialized numeric datatypes is also relatively easy in Python,
    although only occasionally needed.'
