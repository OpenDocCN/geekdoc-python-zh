    \ __builtins__ enum _constants _parser _casefix _compiler functools __all__ __version__\
    \ NOFLAG ASCII A IGNORECASE I LOCALE L UNICODE U MULTILINE M DOTALL S VERBOSE\
    \ X TEMPLATE T DEBUG RegexFlag error match fullmatch search sub subn split findall\
    \ finditer compile purge template _special_chars_map escape Pattern Match _cache\
    \ _MAXCACHE _compile _compile_repl _expand _subx copyreg _pickle Scanner\n```\n\
    \n模块中的各种函数和常量就是它的字典。内置类型通常使用一个略有不同的类字典对象。\n\n#### 基本类型的字典\n\n```python\n>>> for\
    \ typ in (str, int, list, tuple, dict):\n...     print(typ, type(typ.__dict__))\n\
