    | John       | C     | 15

    | Pema       | PASS  | 14

    | Thandiwe   | B+    | ?

    ```


    Breaking the print() argument across lines means we only save one line (although
    a few more characters are saved). More importantly, we simply express the intention
    to default to certain values and avoid introducing extra variables within the
    loop.


