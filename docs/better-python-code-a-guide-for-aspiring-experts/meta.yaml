    modules.


    While the discussions in this chapter are somewhat heterogeneous, they also address
    a few of the most failings real-world Python code encounters, in my experience.
    A fair number of the issues in this chapter reflect the use of habits developed
    for other programming languages that are less well suited to Python code.


    # 3.1 Naming Things


    As the famous saying goes:


    > There are two hard things in computer science: cache invalidation, naming things,
    and off-by-one errors.


    In this section, we will look at where naming can go wrong. The kinds of mistakes
    addressed in this section are somewhat heterogeneous, but all pertain in one way
    or another to ways that choosing names badly can either cause your programs to
    break outright, or at the least make them fragile, ugly, and unpythonic.


    # 3.1.1 Naming a File Identically to a Standard Library Module


    The mechanism Python uses for determining where to import modules from is fairly
    convoluted. There are a lot of options, to provide a lot of flexibility. Setting
    the environment variable PYTHONPATH can affect this. Use of virtual environments
    can affect this. Runtime manipulation of sys.path—including within imported modules
    themselves—can affect this. Use of _pth files can affect this. The -E, -I, -s,
    and -S command-line options can affect this.'
  - "[PAGE 68]\n\n# Chapter 3 A Grab Bag of Python Gotchas\n\nUnfortunately, it's\
    \ *just complicated*. This is not the book to explore the details of Python's\
    \ import system, but a good summary write-up is available at https://docs.python.org/3/library/sys_path_init.html.\n\
    \nThe upshot of this complication is that developers are very well served by avoiding\
    \ filenames that conflict with the names of standard library modules—or indeed\
    \ with the names of any other third-party packages or modules they intend to use.\
    \ Unfortunately, there are a lot of names in the latter category especially, and\
    \ conflicts can arise innocently.\n\nIf you are uncertain about a conflict, or\
    \ fear one may occur as you add later dependencies, use of *relative imports*\
    \ can often avoid these mistakes.\n\nLet's take a look at a short shell session:\n\
    \n```\n[BetterPython]$ python code/hello.py\nHello World!\n[BetterPython]$ cd\
    \ code\n[code]$ python hello.py\nProgram goes BOOM!\n```\n\nThere are many \"\
    magical\" ways I could obtain this odd behavior, but the one I used is really\
    \ not *all that* magical.\n\nSource code of code/hello.py\n\n```\n# The special\
    \ path manipulation\nimport sys, os\nif 'code' not in os.path.abspath('.'):\n\
    \    sys.path = [p for p in sys.path if \"BetterPython\" not in p]\n\n# The \"\
    regular\" program\nimport re\npat = re.compile(\"hello\", re.I)\ns = \"Hello World!\"\
    \nif re.match(pat, s):\n    print(s)\n```\n\nNotice that the message \"Program\
    \ goes BOOM!\" is completely absent from this script. That's because it lives\
    \ in *re.py*; not the version of that file that comes with the Python standard\
    \ library, but the version that happens to be at /home/dmertz/git/BetterPython/code/re.py\
    \ on my computer.\n\nSource code of code/re.py\n\n```\nimport sys\nprint(\"Program\
    \ goes BOOM!\")\nsys.exit()\n```"
  - "[PAGE 69]\n\nOf course, if you use NumPy or Pandas, the same kind of conflict\
    \ might occur with naming a local module numpy.py or pandas.py. So simply looking\
    \ at the standard library module list does not assure absence of conflict. But\
    \ there *are* a lot of ways to come up with distinctive names for the files in\
    \ your own project.\n\nLet's suppose, however, that you really want to use a particular\
    \ name. For example, **calendar** is a standard library module, but one that is\
    \ very old and that you've probably never even thought about using. However, it's\
    \ a pretty good, generic name, one that could very easily be a good choice for\
    \ a submodule name within your own brand-new project.\n\n> **Note** The oldest\
    \ Python module(s)\n\nWhen I mention that calendar is *old*, I really mean it.\
    \ It was in Python 0.9 with largely the same capabilities, in 1991:\n\n\n[BetterPython]$\
    \ grep '0\\.9' \\n    /home/dmertz/miniconda3/envs/py0.9/README\nThis is version\
    \ 0.9 (the first beta release), patchlevel 1.\n[BetterPython]$\n/home/dmertz/miniconda3/envs/py0.9/bin/python\n\
    >>> import calendar\n>>> calendar.prmonth(2023, 2)\nMon Tue Wed Thu Fri Sat Sun\n\
