  md: "# 3.1.3 Bare or Overly Generic except Statements\n\nMostly for legacy reasons,\
    \ Python allows the `except` statement to occur in bare form, without naming specific\
    \ exceptions to be caught. This is categorically a mistake to use. Catching a\
    \ broad exception where a subclass is more appropriate is also often a mistake;\
    \ however, there are gray areas about exactly how broad an exception it is best\
