    # The Method .setdefault()


    Of all the useful methods of dictionaries, the one I personally forget the most
    often is dict.setdefault(). I have written code like this embarrassingly often:


    ```

    >>> point = {"x": 3, "y": 4}

    >>> if ''color'' in point:

    ...     color = point["color"]

