    \ During development they are a good way to enforce assumptions in the code; however,\
    \ to eke out a few percent faster production systems, optimization switches are\
    \ commonly used. The difference these flags make is small, and I myself rarely\
    \ use them; but be aware that they might be used, and my own habits are far from\
    \ universal in this respect.\n\nHere is a short example of a reasonable use of\
    \ assertions. This is an echo of the example in “Directly Accessing a Protected\
    \ Attribute” in Chapter 4, Advanced Python Usage. We presented there a class-based\
    \ version of a pseudo-random linear congruential generator. The details of this\
    \ algorithm are discussed somewhat more in that chapter, as well as in the “Kinds\
    \ of Randomness” section earlier in this chapter.\n\nThe algorithm presented here\
    \ is a perfectly reasonable pseudo-random number generator, but for production\
