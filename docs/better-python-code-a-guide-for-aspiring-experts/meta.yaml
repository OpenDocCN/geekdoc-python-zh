    There might well be additional reasons to attach the modulus to the class itself,
    but supposing we only cared about sorting, we could achieve the same effect more
    easily using the following.


    Using the key function in decorate-sort-undecorate sorting


    ```

    >>> sorted([Thing(2), Thing(-17), Thing(55), Thing(7)],

    ...         key=lambda thing: thing.value % 7)

    [Thing(7), Thing(2), Thing(-17), Thing(55)]

    ```


