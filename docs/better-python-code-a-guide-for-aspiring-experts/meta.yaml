    'Mar had a litle lamb!'\n```\n\n```python\n>>> my_ba = bytearray(\"Mary had a\
    \ little lamb!\", \"utf8\")\n>>> for i, c in enumerate(my_ba):\n...     if c >\
    \ ord(\"s\"):\n...         del my_ba[i]\n...\n>>> my_ba\nbytearray(b'Mar had a\
    \ litle lamb!')\n```\n\n在这段代码中，表面上看起来运行正确。没有抛出异常。我们确实得到了一个删除了部分字符的列表或字节数组。然而，仔细观察会发现，一个本应被过滤掉的\
    \ `t` 字符仍然留在了变更后的对象中。这是因为一旦删除了某个元素，索引位置就不再与底层实际序列对齐。插入新元素时也会出现类似问题。\n\n处理此需求的正确方法是简单地基于谓词创建一个全新的对象，并选择性地向其追加内容。在\
    \ Python 列表或字节数组上，追加操作是廉价的（然而，向新序列中间插入元素很容易导致二次复杂度——本书其他部分会对此风险提出警告）。\n\n### 创建新对象作为序列的过滤器\n\
    \n```python\n>>> my_list = list(\"Mary had a little lamb!\")\n>>> new_list = []\n\
    >>> for c in my_list:\n...     if c <= \"s\":\n...         new_list.append(c)\n\
    ...\n>>> new_list\n['M', 'a', 'r', ' ', 'h', 'a', 'd', ' ', 'a', ' ', 'l', 'i',\
    \ 'l', 'e', ' ', 'l', 'a', 'm', 'b', '!']\n>>> \"\".join(new_list)\n'Mar had a\
    \ lile lamb!'\n```\n\n更简洁的写法：\n\n```python\n>>> new_list = [c for c in my_list\
    \ if c <= \"s\"]\n>>> \"\".join(new_list)\n'Mar had a lile lamb!'\n```\n\n回想一下，你也可以通过取空切片来创建序列的（浅）副本。在稍有不同的场景中，`my_list[:]`\
    \ 或 `my_ba[:]` 通常可以作为创建包含相同元素的新序列的便捷语法。\n\n## 1.5 for 循环比 while 循环更符合 Python 风格\n\
    \n在可能的情况下，符合 Python 风格的循环看起来像这样：`for item in iterable`。这是基本的惯用法，当你发现自己在做其他事情时，请思考一下其他方式是否真的更好。\n\
    \n在编写程序循环时，你经常面临在 `for` 和 `while` 之间做出选择。或者更准确地说，对于任何给定的循环，你*可以*始终使用其中任何一个。这可能不明显，但如果一种语言只有\
    \ `for` 循环但拥有无限迭代器，你也能应付。\n\n### 仅使用 `for` 实现 `while predicate(a, b)` 的等效形式\n\n\
    ```python\n>>> from itertools import repeat\n>>> a, b = 17, 23  # 初始示例值没有特殊含义\n\
    >>> for _ in repeat(None):  # ❶\n...     print(\"Current values:\", a, b)\n...\
    \     if predicate(a, b):  # ❷\n...         break\n...     a = get_data(a)  #\
    \ ❸\n...     b = get_data(b)  # ❸\n...\nCurrent values: 857 338\nCurrent values:\
    \ 613 500\nCurrent values: 611 47\nCurrent values: 387 871\nCurrent values: 689\
    \ 812\nCurrent values: 406 892\nCurrent values: 817 522\n```\n\n- ❶ 一个始终产生 `None`\
    \ 的无限迭代器\n- ❷ 故意模糊 `predicate()` 检查的内容\n- ❸ 故意模糊 `get_data()` 执行的操作\n\n前面的代码是\
    \ `while True` 循环的标准示例，但没有使用 `while` 编写。也就是说，我们以有状态的方式获取要处理的数据。然后我们评估这些数据，期望它*可能*达到我们希望退出循环的状态（但它也可能是一个永远运行的服务器）。¹\n\
    \n将 `for` 表示为 `while` 的形式作为翻译甚至更简单。\n\n### 仅使用 `while` 实现 `for item in iterable`\
    \ 的等效形式\n\n```python\n>>> # iterable = <collection, generator, something else>\n\
    >>> iterator = iter(iterable)\n>>> try:\n...     while True:\n...         item\
    \ = next(iterator)\n...         print(\"Current item:\", item)\n... except StopIteration:\n\
    ...     pass\n...\nCurrent item: 2\nCurrent item: 3\nCurrent item: 5\nCurrent\
    \ item: 7\nCurrent item: 11\n```\n\n显然，你可以在前面的 `while` 结构中执行相同的条件分支、`break`、`continue`\
    \ 或所有其他你可能放在 `for` 循环中的操作。\n\n尽管它们在形式上是等价的（可能需要少量额外行来强制实现），但 `for` 循环比 `while`\
    \ 循环更常让人感觉符合 Python 风格。这个一般性建议有*许多*例外，但你会发现*几乎总是*在 Python 中循环时，要么是遍历集合，要么是遍历可迭代对象（如生成器函数、生成器表达式或自定义可迭代类）。在许多不是这种情况的时候，这表明需要将提供数据进行操作的代码部分重构*为*可迭代对象。\n\
    \n使用 `while` 并不是错误，但每当你发现自己在编写它时，你仍然应该问自己：“我能用 `for` 循环来完成这个吗？”对于你能够重构的代码，也问自己同样的问题。答案很可能是\
    \ `while` 循环是最具表现力和最清晰的版本，但这个问题仍然应该出现在你的脑海中。从（潜在的无限）序列的角度思考通常能促进 Python 中清晰而优雅的设计。\n\
    \n## 1.6 用于“半循环”块的海象运算符\n\nPython 程序员——以及许多其他编程语言的程序员——经常使用的一种模式总是略显丑陋。这就是“半循环”模式。事实上，许多语言在设计时就包含了，或者后来增加了像\
    \ `do ... while` 或 `repeat ... until` 这样的结构，专门为了避免这个小缺陷。例如，以下代码使用了与前面章节相同的神秘 `get_data()`\
    \ 和 `predicate()` 函数。\n\n### Python 中的旧式半循环\n\n```python\n>>> val = get_data()\n\
    >>> while not predicate(val):\n...     print(\"Current value acceptable:\", val)\n\
    ...     val = get_data()\n...\nCurrent value acceptable: 869\nCurrent value acceptable:\
    \ 805\nCurrent value acceptable: 632\nCurrent value acceptable: 430\n```\n\n在循环之前和循环体内重复对\
    \ `val` 进行赋值，从风格和代码清晰度的角度来看感觉有点不对（尽管，这并不是一个实际的*错误*）。\n这种模式的一个可能更不美观的变体是在循环体内使用\
    \ `break` 来避免重复。\n\n### Python 中的内部 break 式半循环\n\n```python\n>>> while True:\n\
    ...     val = get_data()\n...     if predicate(val):\n...         break\n... \
    \    print(\"Current value acceptable:\", val)\n...\nCurrent value acceptable:\
    \ 105\nCurrent value acceptable: 166\nCurrent value acceptable: 747\n```\n\n自\
    \ Python 3.8 起，我们有了使用所谓的“海象运算符”来简化此结构的选项。该运算符因其类似于海象的表情符号（有眼睛和獠牙）而得名。海象运算符 (`:=`)\
    \ 允许你在表达式内赋值，而不仅仅是作为语句。\n\n### Python 中的新式半循环\n\n```python\n>>> while not predicate(val\
    \ := get_data()):\n...     print(\"Current value acceptable:\", val)\n...\nCurrent\
    \ value acceptable: 859\nCurrent value acceptable: 296\nCurrent value acceptable:\
    \ 235\nCurrent value acceptable: 805\nCurrent value acceptable: 383\n```\n\n在谓词位于\
    \ `while` 语句内的两种情况下，循环可能进入零次。使用 `while True` 时，循环至少会进入一次，但如果发生某些条件，它可能会提前终止（即“半循环”）。\n\
    \n¹ 欢迎读者尝试猜测 `get_data()` 和 `predicate()` 的功能。请在深入理解梅森旋转伪随机数生成器（PRNG）后前来尝试。"
