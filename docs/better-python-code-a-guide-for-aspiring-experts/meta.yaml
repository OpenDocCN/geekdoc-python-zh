    \ are rounded down.\n- Exact daily records are audited by the regulatory agency\
    \ on a recurring basis, and errors face stiff fines.\n\nWe know that 64-bit floating\
    \ point numbers have a great deal more precision than these required amounts.\
    \ A 64-bit float carries approximately 17 decimal digits of precision with it,\
    \ which is certainly quite a lot more than the two or three digits (cents or tenths)\
    \ that we apparently need. Perhaps we can get by with a program that simply stores\
    \ approximations as needed.\n\nSource code of code/daily_interest_float\n\n```\n\
    #!/usr/bin/env python\nimport sys\n\ndef print_daily_balance(deposit, interest_rate):\n\
    \    balance = deposit\n    daily_interest = interest_rate/365\n    print(\" Day\
    \ | Customer | Internal\")\n    print(\"-----+-----------+----------\")\n    for\
    \ day in range(1, 366):\n        print(f\" {day:>3d} | {balance:8.2f} | {balance:8.3f}\"\
    )\n        balance = balance * (1 + daily_interest)\n\nif __name__ == '__main__':\n\
    \    deposit = float(sys.argv[1])\n    interest_rate = float(sys.argv[2]) / 100\n\
    \    print_daily_balance(deposit, interest_rate)\n```\n\nLet's take a look, in\
    \ part, at what this program outputs.\n\nIncorrect abridged daily balance sheet\
    \ for interest-bearing account\n\n```\n[BetterPython]$ code/daily_interest_float\
    \ 500 3.95\n Day | Customer | Internal\n-----+-----------+----------\n  1 |  \
    \  500.00 |   500.000\n  2 |    500.05 |   500.054\n```"
- md: "## Chapter 9 Numeric Computation in Python\n\n| Day | Customer | Internal |\n\
    |-----|----------|----------|\n| 3 | 500.11 | 500.108 |\n| 4 | 500.16 | 500.162\
    \ |\n| 5 | 500.22 | 500.216 |\n| 6 | 500.27 | 500.271 # ❶ |\n| ... | ... | ...\
    \ |\n| 360 | 519.81 | 519.807 # ❶ |\n| 361 | 519.86 | 519.863 # ❶ |\n| 362 | 519.92\
    \ | 519.919 # ❷ |\n| 363 | 519.98 | 519.975 # ❷ |\n| 364 | 520.03 | 520.032 #\
    \ ❶ |\n| 365 | 520.09 | 520.088 # ❷ |\n\n❶ Customer-available balance rounds to\
    \ correct, but internal balance is in error.\n❷ Both customer-available and internal\
    \ balance are in error.\n\nThis program just rounds where needed using f-string\
    \ formatting. We *could* also use a `round(balance, 3)` within the loop to periodically\
    \ approximate in an attempt to meet the regulatory rules. Neither this naive approach\
    \ nor such period approximation will produce *exactly* the right balances, though.\n\
    \nOn its face, the customer has earned *approximately* the correct amount of interest\
    \ at the end of the year, and even pretty close to the right amount at each intervening\
    \ day. However, the *true* balance sheet should read like this.\n\n### Correct\
    \ abridged daily balance sheet for interest-bearing account\n\n```\n[BetterPython]$\
    \ code/daily_interest_decimal 500 3.95\nDay | Customer | Internal\n----+----------+---------\n\
    1 | 500.00 | 500.000\n2 | 500.05 | 500.054\n3 | 500.11 | 500.108\n4 | 500.16 |\
    \ 500.162\n5 | 500.22 | 500.216\n6 | 500.27 | 500.270\n... | ... | ...\n360 |\
    \ 519.80 | 519.802\n361 | 519.86 | 519.858\n362 | 519.91 | 519.914\n363 | 519.97\
    \ | 519.970\n364 | 520.03 | 520.026\n365 | 520.08 | 520.082\n```\n\nThe divergence\
    \ between the actually correct calculation and the purely floating point one occurs\
    \ slowly, and numeric error is hardly overwhelming. If these were scientific calculations—or\
    \ even if they were predictive models within finance—these numeric divergences\
    \ would be trivial. Under laws, treaties, and regulatory rules they are not, however.\n\
    \nThe `decimal` module treats decimal arithmetic correctly, including precision\
    \ and rounding rules. There are separate available rounding modes for ROUND_CEILING,\
    \ ROUND_DOWN, ROUND_FLOOR, ROUND_HALF_DOWN, ROUND_HALF_EVEN, ROUND_HALF_UP, ROUND_UP,\
    \ and ROUND_05UP. The code that solves this specific problem utilizes two of these,\
    \ and would produce slightly different (wrong) results if it had not chosen exactly\
    \ the two it does.\n\n### Source code of code/daily_interest_decimal\n\n```python\n\
    #!/usr/bin/env python\n\nimport sys\nfrom decimal import Decimal, ROUND_HALF_EVEN,\
    \ ROUND_HALF_DOWN\n\ndef print_daily_balance(deposit, interest_rate):\n    balance\
    \ = deposit\n    daily_interest = interest_rate/365\n    print(\" Day | Customer\
    \ | Internal\")\n    print(\"-----+----------+----------\")\n    cents = Decimal('1.00')\n\
    \    tenths = Decimal('1.000')\n    for day in range(1, 366):\n        balance\
    \ = balance.quantize(tenths, rounding=ROUND_HALF_EVEN)\n        customer = balance.quantize(cents,\
    \ rounding=ROUND_HALF_DOWN)\n        print(f\" {day:>3d} | {customer:8.2f} | {balance:8.3f}\"\
    )\n        balance = balance * (1 + daily_interest)\n\nif __name__ == '__main__':\n\
    \    deposit = Decimal(sys.argv[1])\n    interest_rate = Decimal(sys.argv[2])\
    \ / 100\n    print_daily_balance(deposit, interest_rate)\n```\n\nWe can notice\
    \ that the method `ROUND_HALF_EVEN` is entirely statistically balanced. In the\
    \ long run, on data that does not contain inherent distortions, trends and tendencies\
    \ will balance exactly. But that does not ensure that *every* result will be the\
    \ same as if a greater (false) precision were used.\n\nUsing `ROUND_HALF_DOWN`\
    \ is systematically biased; however, in this particular code it never propagates,\
    \ but is simply a repeatedly derived quantization. Had we used that within the\
    \ internal balance running total, we would systematically trend down versus the\
    \ “true” floating point approximations (albeit very slowly so in this example).\n\
    \nHalf the solution to mistakes that result from using (binary) floating point\
    \ numbers for financial math is simply “use the `decimal` module.” While these\
    \ numbers are not *as fast* as IEEE-754 floating point numbers, Python provides\
    \ a pretty efficient machine-native implementation. The second half of the solution\
    \ is more subtle; it requires accurately understanding the rounding and precision\
    \ rules that are imposed by regulatory or administrative concerns. The exact details\
    \ of solutions will vary based on those concerns, but the `decimal` module provides\
    \ options for all such widely used rules.\n\n## 9.2.2 Nonobvious Behaviors of\
    \ Numeric Datatypes\n\nThe so-called “numeric tower” in Python is more of a “garden\
    \ of forking paths.”⁶ As with many edge cases in Python, there are widely discussed\
    \ and well-reasoned motivations for things being as they are. These reasons are\
    \ not necessarily obvious to ordinary developers. Getting these details wrong\
    \ can lead to you mistakenly winding up with an unexpected numeric datatype.\n\
    \nIn parallel with the concrete numeric types provided within Python’s built-ins,\
    \ or in modules in its standard library, are a hierarchy of *abstract base classes*\
    \ within the module `numbers`. These abstract base classes *can* be inherited\
    \ from if you implement the relatively large collection of methods they require;\
    \ however, more often they are used for purposes of “virtual inheritance.” Before\
    \ we get there, let’s look at the actual inheritance diagram of numeric types,\
    \ including the abstract ones (marked in italic and with rounded edges in Figure\
    \ 9.1).\n\n![](img/260d2e810ee4666cb82be4957d5d9141_260_0.png)\n\n6. The phrase\
    \ “garden of forking paths” is borrowed from the translated title of Jorge Luis\
    \ Borges’ wonderful 1941 short story “El Jardín de Senderos que se Bifurcan”.\n\
    \n> **Note A digression on virtual parents**\n\nLet's take a look at an abstract\
    \ base class. For this purpose, we wish to create a class called BigNumber whose\
    \ instances \"contain\" all big numbers (of all comparable numeric types, in fact).\
    \ The class doesn't do much else, nor much useful, but *virtually* contains all\
    \ the big numbers (here defined as more than one thousand):\n\n```python\n>>>\
    \ class BigNumber:\n...     def __contains__(self, value):\n...         return\
    \ value > 1000\n...\n>>> big_numbers = BigNumber()\n>>> 5.7 in big_numbers\nFalse\n\
    >>> 1_000_000 in big_numbers\nTrue\n\n>>> from collections.abc import Container\n\
    >>> isinstance(big_numbers, Container)\nTrue\n>>> BigNumber.__mro__\n(<class '__main__.BigNumber'>,\
    \ <class 'object'>)\n```\n\nEven though Container is nowhere in the inheritance\
    \ tree of BigNumber, the mere fact it implements the required protocol of having\
    \ a `.__contains__()` method makes it act as if it did have that ancestor class.\n\
    \nThe abstract classes within the module `numbers` are \"virtual parents\" of\
    \ various concrete numeric classes. However, the particular parent-child relationships\
    \ that exist virtually are not necessarily the ones that make obvious sense.\n\
    \n### Estranged children\n\n```python\n>>> from fractions import Fraction\n>>>\
    \ from decimal import Decimal\n>>> frac = Fraction(1, 1)\n>>> dec = Decimal(\"\
    1.0\")\n>>> 1 == 1.0 == Fraction(1, 1) == Decimal(\"1.0\")    # ❶\nTrue\n\n>>>\
    \ (1.0).as_integer_ratio()                          # ❷\n(1, 1)\n>>> (0.3).as_integer_ratio()\
    \                          # ❷\n(5404319552844595, 18014398509481984)\n\n>>> isinstance(1,\
    \ numbers.Integral) # ③\nTrue\n>>> isinstance(1, numbers.Rational) # ④\nTrue\n\
    >>> isinstance(frac, numbers.Integral) # ⑤\nFalse\n>>> isinstance(frac, numbers.Rational)\
    \ # ⑥\nTrue\n>>> isinstance(dec, numbers.Integral) # ⑤\nFalse\n>>> isinstance(dec,\
    \ numbers.Rational) # ⑦\nFalse\n>>> isinstance(dec, numbers.Real) # ⑦\nFalse\n\
    >>> isinstance(dec, numbers.Number) # ⑧\nTrue\n>>> isinstance(0.3, numbers.Rational)\
    \ # ⑨\nFalse\n>>> isinstance(0.3, numbers.Real) # ⑨\nTrue\n```\n\n- ① Various\
    \ kinds of “one” are equal to each other.\n- ② Every float is a ratio of integers,\
    \ even if approximated in base-2.\n- ③ Sensibly, integers are Integral.\n- ④ And\
    \ Integral numbers inherit from Rational.\n- ⑤ Fractions and Decimals are not\
    \ generally Integral, even when equal to int.\n- ⑥ A Fraction is indeed a synonym\
    \ for Rational.\n- ⑦ A Decimal is finitely many digits, why not Rational, nor\
    \ even Real?!\n- ⑧ And yet, Decimal *is* a Number!\n- ⑨ Why is a float with numerator\
    \ and denominator Real but not Rational?!\n\n## Cycles within Cycles of Confusion\n\
    \nIt is very hard to reconcile the virtual parentage of Python concrete numeric\
    \ datatypes with what I learned in middle school algebra. Some of the fault can\
    \ be assigned to IEEE-754 floating point numbers, the subject of numerous mistakes\
    \ addressed in this book. However, even other numeric types without rounding errors\
    \ suffer oddities as well. Moreover, we can wonder what happens when we perform\
    \ an operation that combines different kinds of numbers."
  mdcn: "## 第9章 Python中的数值计算\n\n| 天数 | 客户余额 | 内部余额 |\n|-----|----------|----------|\n\
    | 3 | 500.11 | 500.108 |\n| 4 | 500.16 | 500.162 |\n| 5 | 500.22 | 500.216 |\n\
    | 6 | 500.27 | 500.271 # ❶ |\n| ... | ... | ... |\n| 360 | 519.81 | 519.807 #\
    \ ❶ |\n| 361 | 519.86 | 519.863 # ❶ |\n| 362 | 519.92 | 519.919 # ❷ |\n| 363 |\
    \ 519.98 | 519.975 # ❷ |\n| 364 | 520.03 | 520.032 # ❶ |\n| 365 | 520.09 | 520.088\
    \ # ❷ |\n\n❶ 客户可用余额四舍五入正确，但内部余额有误。\n❷ 客户可用余额和内部余额均有误。\n\n这个程序只是在需要时使用f-string格式化进行四舍五入。我们*也可以*在循环中使用`round(balance,\
    \ 3)`来周期性地近似，试图满足监管规则。然而，无论是这种朴素的方法还是这种周期性近似，都不会产生*完全*正确的余额。\n\n表面上看，客户在年底获得了*近似*正确的利息金额，甚至在每个中间日也相当接近正确金额。然而，*真实*的资产负债表应该如下所示。\n\
    \n### 计息账户的正确简明日资产负债表\n\n```\n[BetterPython]$ code/daily_interest_decimal 500\
    \ 3.95\n天数 | 客户余额 | 内部余额\n----+----------+---------\n1 | 500.00 | 500.000\n2 |\
    \ 500.05 | 500.054\n3 | 500.11 | 500.108\n4 | 500.16 | 500.162\n5 | 500.22 | 500.216\n\
    6 | 500.27 | 500.270\n... | ... | ...\n360 | 519.80 | 519.802\n361 | 519.86 |\
    \ 519.858\n362 | 519.91 | 519.914\n363 | 519.97 | 519.970\n364 | 520.03 | 520.026\n\
    365 | 520.08 | 520.082\n```\n\n实际正确的计算与纯浮点数计算之间的差异是缓慢发生的，数值误差几乎可以忽略不计。如果这些是科学计算——或者即使是金融领域的预测模型——这些数值差异将是微不足道的。然而，在法律、条约和监管规则下，它们并非如此。\n\
    \n`decimal`模块正确处理十进制算术，包括精度和舍入规则。有单独的可用舍入模式：ROUND_CEILING、ROUND_DOWN、ROUND_FLOOR、ROUND_HALF_DOWN、ROUND_HALF_EVEN、ROUND_HALF_UP、ROUND_UP和ROUND_05UP。解决这个特定问题的代码使用了其中两种，如果它没有选择它所使用的那两种，将会产生略有不同（错误）的结果。\n\
    \n### code/daily_interest_decimal的源代码\n\n```python\n#!/usr/bin/env python\n\n\
    import sys\nfrom decimal import Decimal, ROUND_HALF_EVEN, ROUND_HALF_DOWN\n\n\
    def print_daily_balance(deposit, interest_rate):\n    balance = deposit\n    daily_interest\
    \ = interest_rate/365\n    print(\" 天数 | 客户余额 | 内部余额\")\n    print(\"-----+----------+----------\"\
    )\n    cents = Decimal('1.00')\n    tenths = Decimal('1.000')\n    for day in\
    \ range(1, 366):\n        balance = balance.quantize(tenths, rounding=ROUND_HALF_EVEN)\n\
    \        customer = balance.quantize(cents, rounding=ROUND_HALF_DOWN)\n      \
    \  print(f\" {day:>3d} | {customer:8.2f} | {balance:8.3f}\")\n        balance\
    \ = balance * (1 + daily_interest)\n\nif __name__ == '__main__':\n    deposit\
    \ = Decimal(sys.argv[1])\n    interest_rate = Decimal(sys.argv[2]) / 100\n   \
    \ print_daily_balance(deposit, interest_rate)\n```\n\n我们可以注意到，`ROUND_HALF_EVEN`方法在统计上是完全平衡的。从长远来看，在不包含固有失真、趋势和倾向的数据上，它们将完全平衡。但这并不能确保*每个*结果都与使用更大（虚假）精度时相同。\n\
    \n使用`ROUND_HALF_DOWN`是系统性偏差；然而，在这个特定代码中，它永远不会传播，而只是重复派生的量化。如果我们将其用于内部余额累计总额，我们将系统性地相对于“真实”浮点近似值呈下降趋势（尽管在这个例子中非常缓慢）。\n\
    \n解决使用（二进制）浮点数进行金融数学计算所导致错误的一半方案是简单地“使用`decimal`模块”。虽然这些数字不如IEEE-754浮点数*快*，但Python提供了一个相当高效的机器原生实现。解决方案的另一半更为微妙；它需要准确理解监管或行政关注所施加的舍入和精度规则。解决方案的确切细节将根据这些关注点而变化，但`decimal`模块为所有这些广泛使用的规则提供了选项。\n\
    \n## 9.2.2 数值数据类型的非显而易见行为\n\nPython中所谓的“数值塔”更像是一个“分岔路径的花园”。⁶ 与Python中的许多边缘情况一样，事情之所以如此存在广泛讨论和充分合理的动机。这些原因对普通开发者来说不一定显而易见。搞错这些细节可能会导致你错误地得到一个意想不到的数值数据类型。\n\
    \n与Python内置或标准库模块中提供的具体数值类型并行的是`numbers`模块中的一系列*抽象基类*。这些抽象基类*可以*被继承，如果你实现了它们要求的相对较大的方法集合；然而，更常见的是它们用于“虚拟继承”的目的。在我们深入之前，让我们看看数值类型的实际继承图，包括抽象类型（在图9.1中用斜体和圆角标记）。\n\
    \n![](img/260d2e810ee4666cb82be4957d5d9141_260_0.png)\n\n6. “分岔路径的花园”这个短语借用了豪尔赫·路易斯·博尔赫斯1941年精彩短篇小说《小径分岔的花园》的翻译标题。\n\
    \n> **注意 关于虚拟父类的题外话**\n\n让我们看看一个抽象基类。为此，我们希望创建一个名为BigNumber的类，其实例“包含”所有大数字（实际上，所有可比较的数字类型）。这个类没有做太多其他事情，也没有太多用处，但它*虚拟地*包含所有大数字（这里定义为大于一千）：\n\
    \n```python\n>>> class BigNumber:\n...     def __contains__(self, value):\n...\
    \         return value > 1000\n...\n>>> big_numbers = BigNumber()\n>>> 5.7 in\
    \ big_numbers\nFalse\n>>> 1_000_000 in big_numbers\nTrue\n\n>>> from collections.abc\
    \ import Container\n>>> isinstance(big_numbers, Container)\nTrue\n>>> BigNumber.__mro__\n\
    (<class '__main__.BigNumber'>, <class 'object'>)\n```\n\n即使Container不在BigNumber的继承树中，仅仅因为它实现了具有`.__contains__()`方法的所需协议，它的行为就好像它确实有那个祖先类一样。\n\
    \n`numbers`模块中的抽象类是各种具体数值类的“虚拟父类”。然而，存在的特定的虚拟父子关系并不一定是那些显而易见的关系。\n\n### 疏远的子类\n\
    \n```python\n>>> from fractions import Fraction\n>>> from decimal import Decimal\n\
    >>> frac = Fraction(1, 1)\n>>> dec = Decimal(\"1.0\")\n>>> 1 == 1.0 == Fraction(1,\
    \ 1) == Decimal(\"1.0\")    # ❶\nTrue\n\n>>> (1.0).as_integer_ratio()        \
    \                  # ❷\n(1, 1)\n>>> (0.3).as_integer_ratio()                 \
    \         # ❷\n(5404319552844595, 18014398509481984)\n\n>>> isinstance(1, numbers.Integral)\
    \ # ③\nTrue\n>>> isinstance(1, numbers.Rational) # ④\nTrue\n>>> isinstance(frac,\
    \ numbers.Integral) # ⑤\nFalse\n>>> isinstance(frac, numbers.Rational) # ⑥\nTrue\n\
    >>> isinstance(dec, numbers.Integral) # ⑤\nFalse\n>>> isinstance(dec, numbers.Rational)\
    \ # ⑦\nFalse\n>>> isinstance(dec, numbers.Real) # ⑦\nFalse\n>>> isinstance(dec,\
    \ numbers.Number) # ⑧\nTrue\n>>> isinstance(0.3, numbers.Rational) # ⑨\nFalse\n\
    >>> isinstance(0.3, numbers.Real) # ⑨\nTrue\n```\n\n- ① 各种“一”彼此相等。\n- ② 每个浮点数都是整数的比率，即使在二进制中是近似的。\n\
    - ③ 合理地说，整数是Integral。\n- ④ 而Integral数字继承自Rational。\n- ⑤ 分数和Decimal通常不是Integral，即使等于int。\n\
    - ⑥ 分数确实是Rational的同义词。\n- ⑦ Decimal是有限位数，为什么不是Rational，甚至不是Real？！\n- ⑧ 然而，Decimal*是*一个Number！\n\
    - ⑨ 为什么一个具有分子和分母的浮点数是Real而不是Rational？！\n\n## 困惑循环中的循环\n\n很难将Python具体数值数据类型的虚拟父类关系与我在中学代数中学到的相协调。部分责任可以归咎于IEEE-754浮点数，这是本书中讨论的众多错误的主题。然而，即使其他没有舍入误差的数值类型也存在怪异之处。此外，我们可以想知道当我们执行一个结合不同类型数字的操作时会发生什么。"
