  md: '# 7.6.2 Data That Fails to Round-Trip


    In the first place, JSON only defines a few datatypes. These are discussed in
    RFC 8256 (https://datatracker.ietf.org/doc/html/rfc8259), ECMA-404 (https://www.ecma-international.org/publications-and-standards/standards/ecma-404/),
    and ISO/IEC 21778:2017 (https://www.iso.org/standard/71616.html). Despite having
    “the standard” enshrined by several standards bodies in not-quite-identical language,
    these standards are equivalent.


    We should back up for a moment. I’ve now twice claimed—a bit incorrectly—that
    JSON has a limited number of datatypes. In reality, JSON has zero datatypes, and
    instead is, strictly speaking, only a definition of a syntax with no semantics
    whatsoever. As RFC 8256 defines the highest level of its BNF (Backus–Naur form):


    ```

    value ::= false | null | true | object | array | number | string

    ```


    Here `false`, `null`, and `true` are literals, while `object`, `array`, `number`,
    and `string` are textual patterns. To simplify, a JSON object is like a Python
    dictionary, with curly braces, colons, and commas. An array is like a Python list,
    with square brackets and commas. A number can take a number of formats, but the
    rules are *almost* the same as what defines valid Python numbers. Likewise, JSON
    strings are *almost* the same as the spelling of Python strings, but always with
    double quotation marks. Unicode numeric codes are mostly the same between JSON
    and Python (edge cases concern very obscure surrogate pair handling).


    Let’s take a look at some edge cases. The Python standard library module `json`
    “succeeds” in two cases by producing output that is *not actually* JSON:


    ```

    >>> import json

    >>> import math

    >>> print(json.dumps({"nan": math.nan}))          # ❶

    {"nan": NaN}

    >>> print(json.dumps({"inf": math.inf}))

    {"inf": Infinity}

    >>> json.loads(json.dumps({''nan'': math.nan}))     # ❷

    {''nan'': nan}

    >>> json.loads(json.dumps({''inf'': math.inf}))

    {''inf'': inf}

    ```


    +   ❶ The result of `json.dumps()` is a string; printing it just removes the extra
    quotes in the echoed representation.

    ❷ Neither NaN nor Infinity (under any spelling variation) are in the JSON standards.


    In some sense, this behavior is convenient for Python programmers, but it breaks
    compatibility with (many) consumers of these serializations in other programming
    languages. We can enforce more strictness with `json.dumps(obj, allow_nan=False)`,'
