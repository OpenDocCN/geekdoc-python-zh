    # Code Samples


    Most of the code samples shown in this book use the Python REPL (Read-Evaluate-Print-Loop).
    Or more specifically, they use the IPython (https://ipython.readthedocs.io) enhanced
    REPL, but using the `%doctest_mode` magic to make the prompt and output closely
    resemble the plain python REPL. One IPython “magic” that is used fairly commonly
    in examples is `%timeit`; this wraps the standard library `timeit` module, but
    provides an easy-to-use and adaptive way of timing an operation reliably. There
    are some *mistakes* discussed in this book where a result is not *per se* wrong,
    but it takes orders of magnitude longer to calculate than it should; this magic
    is used to illustrate that.


    When you write your own code, of course, interaction within a REPL—including within
    Jupyter notebooks (https://jupyter.org) or other richly interactive environments—will
    only be a small part of what you write. But the mistakes in this book try to focus
    on samples of code that are as narrow as possible. An interactive shell is often
    a good way to illustrate these mistakes; I encourage you to borrow the lessons
    you learn, and copy them into full `*.py` files. Ideally these discussions can
    be adapted into rich codebases after starting as mere snippets.


    At times when presenting commands run in the operating system shell (i.e., running
