    # 2.3 Comparing x == None


    This problem is a simple one, perhaps as a breather from many others with broad
    background information. In Python, `None` is a *singleton* constant. `True` and
    `False` are also unique, but in a hyper-technical sense are the *two* possible
    instances of the `bool` class. That is to say, there can only ever be one `None`
    during a particular execution of the Python interpreter.


    If you ever see code using `if obj == None` you immediately know that whoever
    wrote it was a newcomer to Python, and this should be cleaned up in code review.
    Most linters and style checking tools will complain about this.


    The correct spelling is always simply `if obj is None`. You will make your colleagues
    happy when you write this, or when you fix it in legacy code.'
