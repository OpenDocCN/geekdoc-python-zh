- img_proc: true
  md: 'the place of the last backtrack. When that doesn''t succeed, we unwind the
    tail, and backtrack more on the head.


    In a manner similar to the famous Tower of Hanoi puzzle (https://en.wikipedia.org/wiki/Tower_of_Hanoi),
    every possible state of head versus tail needs to be explored before the pattern
    can ultimately fail. One might have an intuition that the problem can be solved
    by using a non-greedy repeating group. Intuitively, it feels like maybe the pattern
    will try to backtrack less hard if we aren''t greedy in matching as much as possible
    with the +. However, if we set the pattern to `r"^(.+: )(.+? )+(?=9.)"`, the time
    actually gets a little bit worse (about 10 seconds on my machine; but an exponential
    increase with length either way). If you think again about the problem, you''ll
    realize that matching as little as possible instead of as much as possible doesn''t
    actually prevent backtracking since a non-match overall remains "not possible"
    for the regex engine. The same possibility space still needs to be explored.


    In this exact problem, there is actually an easy solution. If we use the pattern
    `r"^(.+: )(\d+? )+(?=9\d)"`, all the times become negligible. We match *some digits*
    followed by space rather than *any sequence including space*. However, most of
    the time when you hit this problem it is not as simple as the example. Rather,
    the most typical situation is when you consider alternative sub-patterns but do
    not realize that they can sometimes actually match the same strings (which is
    effectively what we did with the (.+) in which the dot can also be a space).


    The general form of the "overlapping-alternatives" problem is (meta-syntactically)
    `(«pat1»|«pat2»|«pat3»)+` where each of the patterns might themselves be complex
    and not make it obvious they can match the same thing. As a simple example, consider
    a subpattern like `\b(a\S*|\S*f\S*|\S*z)\b`; that is, words that start with "a",
    words that have an "f" in the middle, and words that end with "z". Writing it
    in English it''s easy to see that "alferez" (a high-ranking official in medieval
    Iberia) matches every alternative. If the string contains many repetitions of
    that word, a full match would backtrack across all the options.


    There is not one completely general solution to these kinds of problems or mistakes.
    Sometimes a lookahead for an easier-to-match but less specific pattern can precede
    the real search and allow it to fail quickly. For example, in the current goal,
    we might simply generically assert a space-9 occurs somewhere before really matching:
    `^(?=.* 9)(.+: )(.+ )+(?=9\d)`. This produces the correct answers and match groups,
    but always in a few microseconds for each line.


    In Python 3.11, a very nice new feature was introduced to the `re` module. Actually,
    two closely related features: possessive quantifiers and atomic groups. In both
    cases, the meaning is "match or fail once, but don''t backtrack." Despite the
    related purpose of these constructs, it''s not obvious that they lend themselves
    to the current goal. But becoming aware of them will benefit you in rewriting
    many problem patterns.


