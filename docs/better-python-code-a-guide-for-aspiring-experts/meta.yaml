    \ tuple 的子类（它需要使用 `__new__()` 而不是 `__init__()`，因为不可变的元组在初始化期间（即实例已经存在时）不能被修改）：\n\
    \n```\n>>> from math import sqrt\n>>> class Point2d(tuple):\n...     def __new__(self,\
    \ x, y):\n...         return tuple.__new__(self, (x, y))\n...\n...     def distance(self):\n\
    ...         return sqrt(self[0]**2 + self[1]**2)\n...\n>>> point = Point2d(3,\
    \ 4)\n>>> point\n(3, 4)\n>>> point.distance()\n5.0\n>>> point.__class__.__name__\n\
    'Point2d'\n```\n\n非常有用的 `collections.namedtuple` 会创建类似于 `Point2d` 的动态生成的类。我们*可以*改写成这样：\n\
    \n```\n>>> Point2d = type(\"Point2d\", (tuple,),\n...              {\"__new__\"\
    : lambda self, x, y:\n...                  tuple.__new__(self, (x, y)),\n... \
    \              \"distance\": lambda self:\n...                  sqrt(self[0]**2\
    \ + self[1]**2)})\n>>> point = Point2d(3, 4)\n>>> point.distance()\n5.0\n>>> point.__class__.__name__\n\
    'Point2d'\n```\n\n元类不过是一个使用 `type` 的子类（而不是 `type` 本身）作为类的构造函数而创建的类。² 或者等价地说，每个类定义（在常规格式中）都可以包含\
    \ `metaclass=type` 并保留默认行为。\n\n² 严格来说，元类并不一定需要是 `type` 的子类。原则上，任何接受名称、基类元组和属性/方法字典作为参数的可调用对象都可以作为元类。如果它返回一个类对象，这甚至可以是一个普通函数。\n\
    \n```\ndef register_plugin(cls):\n    logging.info(f\"Registering: {cls.__name__}\
    \ ...\")\n    return cls\n```\n\n在使用时，我们会看到类似这样的情况（取决于日志记录的配置）：\n\n```\n>>> @register_plugin\n\
    ... class TestClass: pass\nRegistering: TestClass ...\n```\n\n同样，如果你想使用继承，而不是使用元类，你可以在\
    \ `Plugin` 类中简单地包含一个日志记录的 `__new__()` 方法。但这为什么不仅仅是一个小的风格偏好呢？以下是元类脆弱性显现的众多地方之一：\n\
    \n```\n>>> class NullMeta(type):\n...     pass\n...\n>>> class NullBase(metaclass=NullMeta):\n\
    ...     pass\n...\n>>> class MyStuff(Plugin, NullBase):\n...     pass\n...\nTraceback\
    \ (most recent call last):\n  class MyStuff(Plugin, NullBase):\nTypeError: metaclass\
    \ conflict: the metaclass of a derived class must\n    be a (non-strict) subclass\
    \ of the metaclasses of all its bases\n```\n\n错误信息相当不错，但本质上问题是 `Plugin` 和 `NullBase`\
    \ 暗示了用于类创建的不同元类（分别是 `PluginLoggerMeta` 和 `NullMeta`），而 Python 无法决定使用哪一个。有一个解决方案是创建一个同时继承这两个元类的自定义元类，但这很快就会变得棘手和晦涩。\n\
    \n如果自定义元类在你的代码中变得普遍，多重继承期间的冲突几乎不可避免。如果它能做一些你无法通过其他方式完成的事情，这种危险可能是合理的。然而，如前所述，类装饰器几乎总是更简洁、更可读，并且可以完成自定义元类能做的*所有*事情，或者非常接近。\n\
    \n## 5.2 猴子补丁\n\n在像 Python 这样的高度动态语言中，一个强大且因此容易被滥用的能力是它们允许*猴子补丁*。通过猴子补丁，甚至现有的模块和类也可以在运行时被修改，以表现出可能更适合特定项目需求的不同行为。\n\
    \n编程语言 Ruby 在许多方面与 Python 非常相似。它甚至更具动态性，因此在 Python 中难以或不可能进行猴子补丁的一些事情在 Ruby 中很容易（主要是动态更改内置类型的可能性，Python\
    \ 不允许这样做）。部分由于这种广泛的能力，猴子补丁比在 Python 中更深入地融入了 Ruby 的文化。反过来，这种文化趋势在 Ruby 开发者中也很大程度上被视为一种反模式；然而，大量的代码（如\
    \ Ruby 最大的推动者，Rails Web 框架）包含了猴子补丁，如果不破坏向后兼容性就无法移除。\n\n该生态系统中一篇有影响力的文章是 Avdi Grimm\
    \ 2008 年的《猴子补丁正在摧毁 Ruby》(https://avdi.codes/why-monkeypatching-is-destroying-ruby/)。从日期可以看出，这个讨论并不新鲜。事实上，Grimm\
    \ 承认 Python 是这个术语的来源，并且是允许它的先驱语言。\n\n早在 2008 年，猴子补丁在 Python 中就已为人所知，但并未被广泛使用。在我撰写本文的\
    \ 2023 年，这一描述仍然成立。你当然可能会遇到使用猴子补丁的 Python 代码，但只是偶尔。在你自己的代码中决定使用猴子补丁*通常*是一个错误，但*并非总是*。在\
    \ Python 中，类、实例、源代码本身以及其他一些对象都可以被猴子补丁。不过，对于这个例子，我将介绍该技术最常见的用法：猴子补丁模块。\n\n对于一个稍微有些牵强但确实真实地体现了促使\
    \ Python 开发者进行猴子补丁的情况的例子，假设你有一个处理来自供应商的 CSV 数据的应用程序。一个示例数据文件可能看起来像这样。\n\n文件 *accounts.csv*\
    \ 中的数据\n\n```\nBalance,AccountNum,Owner\n2913.94,3850234082,Omar\n9102.53,0028382910,Sarita\n\
    5181.32,8213593023,David\n...更多行...\n```\n\n你的应用程序可能看起来像这个更复杂的版本：\n\n```\nimport\
    \ re\nimport sys\n\ndef get_5k_balances(rows):\n    for row in rows:\n       \
    \ if re.match(r\"5\\d{3}\\.\\d{2}\", row):\n            balance, account_num,\
    \ owner = row.split(\",\")\n            yield (f\"Account: {account_num}\\n\"\n\
    \                   f\"  Owner: {owner.strip()}\\n\"\n                   f\"Balance:\
    \ ${float(balance):,.2f}\\n\")\n\n# ... 更多函数 ...\n\nif __name__ == \"__main__\"\
    :\n    for account in get_5k_balances(open(sys.argv[1])):\n        print(account)\n\
    ```\n\n根据规定，实际上这段代码中有许多地方我们对余额数字执行 `re.match()`。当我们运行这个脚本时，它将循环遍历指定的文件并生成某些行的格式化版本（即\
    \ Sarita 和 Omar 的账户余额不在感兴趣的范围内）。\n\n运行 `process-accounts.py` 的源代码\n\n```\n[BetterPython]$\
    \ python process-accounts.py accounts.csv\nAccount: 8213593023\n  Owner: David\n\
    Balance: $5,181.32\n```\n\n一段时间后，我们的供应商引入了透支余额，因此决定更改格式，使余额始终显示前导加号或减号。\n\n文件\
    \ `accounts-new.csv` 中的数据\n\n```\nBalance,AccountNum,Owner\n+2913.94,3850234082,Omar\n\
    +9102.53,0028382910,Sarita\n+5181.32,8213593023,David\n-1002.26,4890094375,Juana\n\
    ...更多行...\n```\n\n按原样编写的程序将不会匹配任何行。因此，人们可能会想出一个*聪明的*主意，让所有 `re.match()` 调用都查找额外的前导加号，而不是在整个代码中更改它们。这很容易做到。\n\
    \n`monkey_plus.py` 的源代码\n\n```\nimport re\nfrom re import match as _match\n\n\
    def match_positive(pat, s, flags=0):\n    return _match(rf\"\\+{pat}\", s, flags)\n\
    \nre.match = match_positive\n```\n\n如果我们在脚本顶部添加一行 `import monkey_plus`，创建 `process-accounts2.py`，它现在就能处理新格式（在脚本中*所有*使用\
    \ `re.match()` 的假设函数中，而不仅仅是在 `get_5k_balances()` 中）。\n\n运行 `process-accounts2.py`\
    \ 的源代码\n\n```\n[BetterPython]$ python process-accounts2.py accounts-new.csv\n\
    Account: 8213593023\n    Owner: David\nBalance: $5,181.32\n```\n\n一个聪明的程序员会注意到他们控制着\
    \ `process-accounts2.py` 中的所有代码，并且确信 `re.match()` 唯一使用的地方是匹配余额（或者无论如何，匹配前面有加号或减号的数字）。\n\
    \n到目前为止，还没有出问题。但这个叙述中的聪明程序员决定，他们想添加一个开关来控制众多可用函数中哪些用于处理匹配新供应商格式的数据文件。一个合理的程序可能是以下这样。\n\
    \n`process-accounts3.py` 的源代码\n\n```\nimport re\nimport monkey_plus\nimport argparse\n\
    \ndef get_5k_balances(rows):\n    # ... 与之前展示的相同 ...\n\n# ... 更多函数 ...\n\nif __name__\
    \ == \"__main__\":\n    parser = argparse.ArgumentParser()\n    parser.add_argument(\"\
    datafile\", type=str, help=\"CSV data file\")\n    parser.add_argument(\n    \
    \    \"-f\", \"--function\", action=\"store\", default=\"get_5k_balances\")\n\
    \    args = parser.parse_args()\n```"
