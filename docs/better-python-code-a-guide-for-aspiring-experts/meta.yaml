    # More “Iterator Algebra”


    It is, of course, somewhat silly and unnecessary to worry so much about laziness
    in concretizing iterators for a file that has exactly two relatively short nucleotide
    sequences. As mentioned, though, similar files can be far larger collections of
    far longer sequences. Many other data sources can also be large, or slow to produce
    subsequent data (such as ones obtained from slow remote online sources); the techniques
    discussed in this section apply equally to those.


    Some of the additional functions in `itertools` include `dropwhile()`, `takewhile()`,
    `pairwise()`, `accumulate()`, `tee()`, `permutations()`, `combinations()`, `zip_longest()`,
    and `filterfalse()`. `filter()` is a built-in, but is “spiritually” part of `itertools`,
    as are `map()`, `range()`, `enumerate()`, and `zip()`. That list is not complete,
    but it’s probably the ones I use most often. The excellent official documentation
    discusses everything in the module. Given that `itertools` in many ways extends
    several `itertools`-like functions already in `__builtins__`, using `from itertools
    import *` is one of the rare cases where I do not recommend against the `import
    *` pattern discussed elsewhere in this book.


    Suppose that you have a FASTA source that might be large, and you wish to identify
    every (RNA) sequence where a long run of the same nucleotide occurs. But once
    you find one within a sequence, you don’t want to spend extra work examining the
