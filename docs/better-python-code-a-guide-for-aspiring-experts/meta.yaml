    \ For any decorator you use, you could rewrite it with a small and mechanical\
    \ translation into code that was decorator free.\n\n**Use of decorator**\n```python\n\
    @some_decorator\ndef my_function(this, that):\n    # do some stuff\n    return\
    \ a_value\n```\n\nWith *exactly* the same semantics, and yet drawing attention\
    \ to the meaning less well, we could write the following.\n\n**Rewriting without\
    \ a decorator**\n```python\ndef my_function(this, that):\n    # do some stuff\n\
    \    return a_value\n\nmy_function = some_decorator(my_function)\n```\n\nThis\
    \ equivalence fully explains precisely what a decorator actually does. It is nothing\
    \ more, and nothing less, than rebinding a name that was used in defining a function\
    \ (or a class) to some new object based on taking the original function (or class)\
    \ as an argument and returning the transformed version.\n\nThe value of decorators\
    \ is often to give Python a kind of *aspect-oriented programming* (https://en.wikipedia.org/wiki/Cross-cutting_concern)\
    \ in which a common behavior can be “injected” into many functions or classes\
    \ without needing to put a shared aspect of their functionality separately into\
    \ the bodies of those functions.\n\nIn a sense, you can think of a function as\
    \ performing a specific task, but a decorator (aspect) as recasting the means\
    \ by which many functions go about performing their respective tasks. Within a\
    \ very object-oriented way of thinking, base classes or mixins can be used to\
    \ give different objects a common behavior. More often than not, using a decorator\
    \ to give functions such a common behavior is more concise, more readable, and\
    \ much less fragile than OOP designs.\n\nAs well, a number of decorators are built\
    \ into Python itself or available within standard library modules (particularly\
    \ `functools`). Only a couple of these relate to crosscutting concerns, but rather\
    \ each performs some special configuration of functions, classes, or methods within\
    \ classes that is most elegantly expressed as a prefix to the definition that\
    \ follows.\n\nThis discussion is divided into subsections, first looking at how\
    \ to write useful decorators yourself—particularly *aspect-oriented* ones—then\
    \ looking at some of the most common and useful “standard” decorators. Both elements\
    \ are worth knowing about, and your code will be worse for not availing yourself\
    \ of these opportunities where relevant.\n\n## Writing Decorators\n\nIn general,\
    \ a decorator is simply a function that takes one other function as an argument\
    \ and returns *something*. Within Python semantics, that something *could be*\
    \ any Python object. However, in almost all cases, useful decorators for functions\
    \ and methods almost always return a callable. Moreover, this callable almost\
    \ always has the same, or almost the same, calling signature as the decorated\
    \ function or method. Useful decorators for classes return new classes, but ones\
    \ that serve a closely related purpose to the class directly in the code—merely\
    \ “tweaked” or “enhanced” in some respect.\n\nVery simple good and bad examples\
    \ follow; read a bit later to understand a better way to write even the “good”\
    \ decorator.\n\n**(Pretty) good and bad decorators**\n\n```python\n>>> def bad_decorator(fn):\n\
    ...     return 42\n...\n>>> @bad_decorator\n... def fused_multiply_add(a, b, c):\n\
    ...     return (a * b) + c\n...\n>>> fused_multiply_add(4, 7, 3)\nTraceback (most\
    \ recent call last):\n  [...]\nTypeError: 'int' object is not callable\n```\n\n\
    ```python\n>>> import sys\n>>> def ok_decorator(fn):\n...     def inner(*args,\
    \ **kws):\n...         print(f\"Calling {fn.__name__}{args}\", file=sys.stderr)\n\
    ...         return fn(*args, **kws)\n...     return inner\n...\n>>> @ok_decorator\n\
    ... def fused_multiply_add(a, b, c):\n...     return (a * b) + c\n...\n>>> fused_multiply_add(4,\
    \ 7, 3)\nCalling fused_multiply_add(4, 7, 3)                # ❷\n31\n>>> fused_multiply_add.__name__\
    \                    # ❸\n'inner'\n```\n\n❶ A kind phrase used to describe this\
    \ decorator is “abuse of notation.”\n❷ This injected, crosscutting behavior is\
    \ “pretty good.”\n❸ Losing details of introspection is less good, but curable.\n\
    \nLet’s write two reasonably good decorators that express crosscutting concerns.\
    \ In the process, we will use a very nice decorator factory that is included in\
    \ Python’s standard library.\n\n### A vectorization decorator\n\n```python\n>>>\
    \ from functools import wraps\n>>> from collections.abc import Sequence\n>>> def\
    \ vectorize(fn):\n...     @wraps(fn)                                    # ❶\n\
    ...     def inner(*args):\n...         if len(args) > 1:                     \
    \    # ❷\n...             return fn(*args)\n...         elif isinstance(args[0],\
    \ Sequence):\n...             return [fn(*a) for a in args[0]]\n...         else:\
    \                                     # ❸\n...             raise ValueError(\n\
    ...                 \"Requires original arguments or \"\n...                 \"\
    sequence of tuples\")\n...     return inner\n...\n>>> @vectorize\n... def fused_multiply_add(a,\
    \ b, c):\n...     \"Multiply and accumulate\"\n...     return (a * b) + c\n...\n\
    >>> fused_multiply_add(4, 7, 3)\n31\n>>> fused_multiply_add([(4, 7, 3), (7, 2,\
