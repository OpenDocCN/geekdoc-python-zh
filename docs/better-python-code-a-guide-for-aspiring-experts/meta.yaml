  md: '```

    >>> my_ba = bytearray("Mary had a little lamb!", "utf8")

    >>> for i, c in enumerate(my_ba):

    ...     if c > ord("s"):

    ...         del my_ba[i]

    ...

    >>> my_ba

    bytearray(b''Mar had a litle lamb!'')

