    # 8.1 Kinds of Randomness


    The module `random` in the standard library—with the exception of the `random.SystemRandom()`
    class—uses the Mersenne Twister (MT) pseudo-random number generator (PRNG).² This
    algorithm is used by numerous other programming languages and libraries; older
    languages and libraries might use linear congruential generators (LCGs),³ and
    some newer systems use permuted congruential generators (PCGs).⁴ Several other
    pseudo-random generators are occasionally used.


    A great deal of mathematical theory goes into each of these, but PRNGs all operate
    in a similar manner at a high level. They begin with a state, derived from a seed.
    Then they deterministically move between a very large cycle of other states (for
    example, among 2¹⁹⁹³⁷−1 states for MT). The distribution of states *resembles*
    a stochastic process according to numerous statistical tests, but it is actually
    a completely deterministic progression from the current state. If you know the
    current state, you know with certainty exactly what the next state will be.


    The module `secrets` in the standard library builds on `random.SystemRandom()`,
    but it is nearly always a better practice to use the wrappers within `secrets`.
    The purpose of `secrets` is to generate non-repeatable, cryptographically strong,
    random numbers. The functions in `secrets` utilize system entropy (what is called
    `/dev/random` on Unix-like systems) and will actually block (if needed, which
    is uncommon) until sufficient entropy becomes available to provide “random” data.
    Entropy comes from interrupt timing for various kinds of devices (e.g., disk,
    keyboard, network), CPU execution time jitter, and hardware RNGs if they are available.


    # 8.1.1 Use secrets for Cryptographic Randomness


    Many developers who want a random value such as a generated password or token
    will reach towards the `random` module. The `random` module is widely used, familiar
    to most users of Python, and usually feels “good enough” at being unpredictable.


    2. See a description of Mersenne Twister at https://en.wikipedia.org/wiki/Mersenne_Twister.

    3. See a description of linear congruential generators at https://en.wikipedia.org/wiki/Linear_congruential_generator.

    4. See a description of permuted congruential generators at https://en.wikipedia.org/wiki/Permuted_congruential_generator.'
