    I get to the quadratic behavior gotcha one can encounter using lists. I believe
    a deeper understanding of the mechanisms of “containment” will help many developers
    who might have only an approximate mental model of what’s going on.


    A great many kinds of objects—some that might seem unexpected—respond to `in`.
    Here is an example.


    RegexFlag can check for membership


    ```python

    >>> import re

    >>> flags = re.VERBOSE | re.IGNORECASE | re.DOTALL | re.UNICODE

    >>> type(flags)

    <flag ''RegexFlag''>

    >>> re.U in flags

    True

    >>> type(re.M)

    <flag ''RegexFlag''>

    ```


    In a commonsense way, the flag `re.U` (which is simply an alias for `re.UNICODE`)
    is *contained* in the mask of several flags. A single flag is simply a mask that
    indicates only one'
