- md: "## Note The guts of a metaclass\n\nUsually, when you create a class in Python,\
    \ what you are doing \"behind the scenes\" is calling the constructor `type()`.\
    \ For example, here is a subclass of tuple (which needs to use `__new__()` rather\
    \ than `__init__()` because immutable tuples cannot be modified during initialization,\
    \ when the instance already exists):\n\n```\n>>> from math import sqrt\n>>> class\
    \ Point2d(tuple):\n...     def __new__(self, x, y):\n...         return tuple.__new__(self,\
    \ (x, y))\n...\n...     def distance(self):\n...         return sqrt(self[0]**2\
    \ + self[1]**2)\n...\n>>> point = Point2d(3, 4)\n>>> point\n(3, 4)\n>>> point.distance()\n\
    5.0\n>>> point.__class__.__name__\n'Point2d'\n```\n\nThe very useful `collections.namedtuple`\
    \ creates dynamically generated classes similar to `Point2d`. We *could* write\
    \ this instead:\n\n```\n>>> Point2d = type(\"Point2d\", (tuple,),\n...       \
    \       {\"__new__\": lambda self, x, y:\n...                  tuple.__new__(self,\
    \ (x, y)),\n...               \"distance\": lambda self:\n...                \
    \  sqrt(self[0]**2 + self[1]**2)})\n>>> point = Point2d(3, 4)\n>>> point.distance()\n\
    5.0\n>>> point.__class__.__name__\n'Point2d'\n```\n\nA metaclass is nothing but\
    \ a class created using a subclass of `type` rather than `type` itself as the\
    \ constructor of a class.² Or equivalently, every class definition (in regular\
    \ format) could contain `metaclass=type` and retain the default behavior.\n\n\
    ² To be very pedantic, a metaclass does not strictly need to be a subclass of\
    \ `type`. In principle, any callable that takes as arguments a name, a tuple of\
    \ bases, and a dictionary of attributes/methods would work as a metaclass. This\
    \ could even be a plain function if it returned a class object.\n\n```\ndef register_plugin(cls):\n\
    \    logging.info(f\"Registering: {cls.__name__} ...\")\n    return cls\n```\n\
    \nAs used, we'd see something like this (depending on the configuration of logging):\n\
    \n```\n>>> @register_plugin\n... class TestClass: pass\nRegistering: TestClass\
    \ ...\n```\n\nLikewise, if you wanted to use inheritance, rather than using a\
    \ metaclass, you could simply include a logging `__new__()` within the `Plugin`\
    \ class. But why isn't this simply a minor style preference? Here's one of the\
    \ numerous places where the fragility of metaclasses comes out:\n\n```\n>>> class\
    \ NullMeta(type):\n...     pass\n...\n>>> class NullBase(metaclass=NullMeta):\n\
    ...     pass\n...\n>>> class MyStuff(Plugin, NullBase):\n...     pass\n...\nTraceback\
    \ (most recent call last):\n  class MyStuff(Plugin, NullBase):\nTypeError: metaclass\
    \ conflict: the metaclass of a derived class must\n    be a (non-strict) subclass\
    \ of the metaclasses of all its bases\n```\n\nThe error message is pretty good,\
    \ but in essence the problem is that `Plugin` and `NullBase` imply different metaclasses\
    \ to be used for class creation (`PluginLoggerMeta` and `NullMeta`, respectively),\
    \ and Python cannot decide which one to use. There is a solution in creating a\
    \ custom metaclass descending from both metaclasses, but this becomes thorny and\
    \ arcane quickly.\n\nIf custom metaclasses become commonplace in your code, conflicts\
    \ during multiple inheritance become almost inevitable. This is a danger that\
    \ might be justified if it did something you couldn't do otherwise. However, as\
    \ shown earlier, class decorators are almost always cleaner, more readable, and\
    \ can accomplish either absolutely or very nearly *everything* that custom metaclasses\
    \ can.\n\n## 5.2 Monkeypatching\n\nA powerful, and therefore easily misused, capability\
    \ in highly dynamic languages like Python is that they allow *monkeypatching*.\
    \ With monkeypatching, even existing modules and classes can be modified at runtime\
    \ to exhibit different behaviors that might be better specialized for the needs\
    \ of a specific project.\n\nThe programming language Ruby is, in many ways, quite\
    \ similar to Python. It is even more dynamic, so a few things that are difficult\
    \ to impossible to monkeypatch in Python are easy in Ruby (mainly the possibility\
    \ of dynamically altering even built-in types, which Python does not allow). Partially\
    \ as a consequence of such broad power, monkeypatching became much more deeply\
    \ incorporated into Ruby's culture than it has in Python. In turn, this cultural\
    \ trend also largely became seen as an antipattern among Ruby developers; however,\
    \ a great deal of code (such as Ruby's biggest mover, the Rails web framework)\
    \ included monkeypatching that could not be removed without breaking backward\
    \ compatibility.\n\nAn influential article in that ecosystem was Avdi Grimm's\
    \ 2008 \"Monkey Patching Is Destroying Ruby\" (https://avdi.codes/why-monkeypatching-is-destroying-ruby/).\
    \ You can tell from the date that this discussion is not new. In fact, Grimm acknowledges\
    \ Python as the source of the term, and a predecessor language in allowing it.\n\
    \nAlready in 2008, monkeypatching was well-known in Python, but not especially\
    \ widely used. In 2023, as I write this, that characterization remains true. You\
    \ might certainly encounter Python code that uses monkeypatching, but only moderately\
    \ often. Deciding to use monkeypatching in your own code is *usually* a mistake,\
    \ but not *always*. Classes, instances, source code itself, and a few other objects\
    \ can be monkeypatched in Python. For this example, though, I will present the\
    \ most common use of the technique: monkeypatching modules.\n\nFor a slightly\
    \ contrived example that nonetheless genuinely exemplifies the situations that\
    \ tend to motivate Python developers to monkeypatch, suppose you have an application\
    \ that processes CSV data that comes from a vendor. A sample data file might look\
    \ like this.\n\nData in file *accounts.csv*\n\n```\nBalance,AccountNum,Owner\n\
    2913.94,3850234082,Omar\n9102.53,0028382910,Sarita\n5181.32,8213593023,David\n\
    ...more rows...\n```\n\nYour application might look something like a more sophisticated\
    \ version of this:\n\n```\nimport re\nimport sys\n\ndef get_5k_balances(rows):\n\
    \    for row in rows:\n        if re.match(r\"5\\d{3}\\.\\d{2}\", row):\n    \
    \        balance, account_num, owner = row.split(\",\")\n            yield (f\"\
    Account: {account_num}\\n\"\n                   f\"  Owner: {owner.strip()}\\\
    n\"\n                   f\"Balance: ${float(balance):,.2f}\\n\")\n\n# ... many\
    \ more functions ...\n\nif __name__ == \"__main__\":\n    for account in get_5k_balances(open(sys.argv[1])):\n\
    \        print(account)\n```\n\nBy stipulation, there are actually many places\
    \ in this code where we perform a `re.match()` against balance numbers. When we\
    \ run this script, it will loop through the specified file and yield formatted\
    \ versions of some of the rows (i.e., Sarita's and Omar's accounts do not have\
    \ balances in the range of interest).\n\nRunning the source code of `process-accounts.py`\n\
    \n```\n[BetterPython]$ python process-accounts.py accounts.csv\nAccount: 8213593023\n\
    \  Owner: David\nBalance: $5,181.32\n```\n\nAfter a while, our vendor introduces\
    \ overdraft balances, and hence decides to change the format so that balances\
    \ are always shown with a leading plus or minus sign.\n\nData in file `accounts-new.csv`\n\
    \n```\nBalance,AccountNum,Owner\n+2913.94,3850234082,Omar\n+9102.53,0028382910,Sarita\n\
    +5181.32,8213593023,David\n-1002.26,4890094375,Juana\n...more rows...\n```\n\n\
    The program as written will not match any lines. So one might come up with a *clever*\
    \ idea to let all the `re.match()` calls look for the extra leading plus rather\
    \ than change them throughout the code. It's easy to do.\n\nSource code of `monkey_plus.py`\n\
    \n```\nimport re\nfrom re import match as _match\n\ndef match_positive(pat, s,\
    \ flags=0):\n    return _match(rf\"\\+{pat}\", s, flags)\n\nre.match = match_positive\n\
    ```\n\nIf we add the single line `import monkey_plus` to the top of our script,\
    \ creating `process-accounts2.py`, it now processes the new format (in *all* the\
    \ hypothetical functions within the script that utilize `re.match()`, not only\
    \ in `get_5k_balances()`).\n\nRunning the source code of `process-accounts2.py`\n\
    \n```\n[BetterPython]$ python process-accounts2.py accounts-new.csv\nAccount:\
    \ 8213593023\n    Owner: David\nBalance: $5,181.32\n```\n\nA clever programmer\
    \ is tempted to notice that they control all of the code within `process-accounts2.py`\
    \ and are confident that the only place where `re.match()` is used is in matching\
    \ balances (or in any case, matching numbers preceded by a plus or a minus sign).\n\
    \nSo far, nothing broke. But the clever programmer of this narration decides that\
    \ they would like to add a switch to control which of the many functions available\
    \ are used to process the data files that match the new vendor format. A reasonable\
    \ program might be the following.\n\nSource code of `process-accounts3.py`\n\n\
    ```\nimport re\nimport monkey_plus\nimport argparse\n\ndef get_5k_balances(rows):\n\
    \    # ... same as previously shown ...\n\n# ... many more functions ...\n\nif\
    \ __name__ == \"__main__\":\n    parser = argparse.ArgumentParser()\n    parser.add_argument(\"\
    datafile\", type=str, help=\"CSV data file\")\n    parser.add_argument(\n    \
    \    \"-f\", \"--function\", action=\"store\", default=\"get_5k_balances\")\n\
    \    args = parser.parse_args()\n```"
