    \ insert_many(list, 100)\n92.9 µs ± 742 ns per loop (mean ± std. dev. of 7 runs,\
    \ 10,000 loops each)\n>>> %timeit insert_many(CountingTree, 100)\n219 µs ± 8.17\
    \ µs per loop (mean ± std. dev. of 7 runs, 1,000 loops each)\n\n>>> %timeit insert_many(list,\
