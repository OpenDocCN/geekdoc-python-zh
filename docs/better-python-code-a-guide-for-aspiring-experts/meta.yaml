    suites rather than simply print some varying messages based on the type of error
    encountered.


    One notable feature of the preceding code is that we catch `PermissionError` and
    `FileNotFoundError`, but then also catch their parent class `OSError` later in
    the sequence of `except` clauses. We have a specific behavior we want if those
    exact things went wrong, but still recognize that there are other ways that `open()`
    might fail that we haven''t specifically thought about.


    In some suites, there might be a final `except Exception` that does generic logging
    of “everything that we haven''t thought of that could go wrong.” Such a suite
    might either decide to continue the rest of the program, or use a bare `raise`
    to re-raise the same exception, depending on what served the program''s purpose
    better.


    Let''s run the new version:


    ```

    [BetterPython]$ code/divide3.py numerators1.txt denominators1.txt

    Partial results: [''0.738'', ''1.150'', ''2.000'']

