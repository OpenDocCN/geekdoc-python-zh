    # 6.5.2 Static versus Dynamic


    Readers will note that the prior example is probably a bit *too clever* for most
    uses. We dynamically created the attributes of the namedtuple, and yet we used
    those names in subsequent code under the assumption we knew which field names
    were dynamically determined.


    Of course, we do not *need to* rely on dynamic creation of field names. The constructor
    will accept a static sequence or even a static space-separated string of field
    names. This is the more usual case, although the dynamic case certainly has some
    uses; for example, if you *know* the files you read will have a few field names,
    but they might vary in other fields.


    In order to emphasize the static declaration, some Pythonistas prefer a class-style
    spelling of typing.NamedTuple. Note in the following code that the annotations
    are merely documentation of intention; they *do not* perform any casting of types
    or checking that annotations match (unless third-party type checkers are used).
