    # 6.5 Dataclasses and Namedtuples


    Python''s standard library includes two very useful data structures for storing
    "records" of related data elements. The first is namedtuples, which under the
    hood are simply subclasses'
  - '[PAGE 170]


    of tuples, but with named fields. The second is dataclasses, which are simply
    Python classes with many dunders and other useful behaviors generated automatically
    in a concise way.


    The things we can do with dataclasses and namedtuples can also be accomplished
    with the built-in types `dict` and `tuple`. Indeed, every `namedtuple` is simply
    a subclass of `tuple`, so it is genuinely the same type. However, using datatypes
    that allow readers to frame code very clearly as “records” improves readability
    and makes reasoning easier.


    Very often, it is useful to work with a collection of data where each item has
    a fixed collection of fields, but we work with many such items (comparing, sorting,
    aggregating, etc.). Namedtuples and dataclasses have more parts than simple scalars—such
    as `float`, `int`, `str`, or `decimal.Decimal` or other special types—but are
    more similar to *datatypes* than to *data structures*. The most obvious difference
    between the two types this section discusses is that dataclasses are mutable while
    namedtuples are immutable.


    Let’s look at an example of record-oriented data. We often encounter such data
    in relational database tables, in CSV or fixed-width files, in formats like Apache
    Parquet or Apache Arrow, in JSON serialized records, and elsewhere. For extensive
    numeric analysis especially, a dataframe library such as Pandas or Polars is often
    useful. However, for this discussion we remain in pure-Python land.


    The standard library module `csv` is often very useful for reading line-oriented,
    delimited textual data files. Despite the acronym standing for “comma-separated
    values” the module is perfectly happy to work with any delimiter you might have
    in your data files. The `csv` module is especially useful when character escaping
    is needed (the delimiter, and the escape and quoting characters themselves, have
    to be treated nonliterally). For the example in this discussion, we avoid that
