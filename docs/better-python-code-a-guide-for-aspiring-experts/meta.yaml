    including sometimes mistakes described in this book. A particularly good linter
    for Python is Flake8 (https://flake8.pycqa.org/), which actually utilizes several
    lower-level linters as (optional) dependencies. A good linter may very well not
    detect important mistakes, but you cannot go wrong in at least *understanding*
    why a linter is complaining about your code.


