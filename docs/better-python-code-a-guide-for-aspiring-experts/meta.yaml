    \ 'shape': 'rhombus',\n 'x': 3,\n 'y': 4}\n```\n\n在 Python 3.9 之前，更友好的快捷方式是：\n\
    \n```python\n>>> point = {\"x\": 3, \"y\": 4, \"color\": \"chartreuse\"}\n>>>\
    \ point.update(features)\n>>> pprint(point)\n{'color': 'brick red',\n 'flavor':\
    \ 'vanilla',\n 'shape': 'rhombus',\n 'x': 3,\n 'y': 4}\n```\n\n但在最近的 Python 版本中，更优雅的版本是：\n\
    \n```python\n>>> point = {\"x\": 3, \"y\": 4, \"color\": \"chartreuse\"}\n>>>\
    \ point | features # 1\n{'x': 3, 'y': 4, 'color': 'brick red', 'shape': 'rhombus',\n\
