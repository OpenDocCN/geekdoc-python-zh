    [''0.738'', ''1.150'', ''2.000'', ''0.326'', ''0.000'', ''0.963'']

    ```


    I have not bothered to display the contents of the several data files because
    those don''t really matter. They are all text files with one number listed per
    line. However, do notice that the code considers the case of a line containing
    a string that cannot be converted to a `float`.


    Unfortunately, the `zip(strict=True)` and the `float("abc")` cases both raise
    `ValueError` rather than more specific subclasses. We have to tease them apart
    inside the `except` suite by looking at the actual messages contained inside the
    exception object. This remains slightly fragile because Python does not guarantee
    it will not change the wording of error messages between versions, and we are
    simply looking for substrings that currently occur inside those messages. Actually,
    even more than not guaranteeing, a conscious effort is being made to improve the
    quality of error messages since 3.10; but “improve” obviously means “change.”'
- md: "## 3.2 Quadratic Behavior of Naive String Concatenation\n\n> **Note Understanding\
    \ runtime complexity**\n\nThe title of this pitfall discussion includes a little\
    \ bit of computer science jargon. The word *quadratic* in mathematics refers to\
    \ a polynomial with degree two. It actually means exactly the same thing in computer\
    \ science, but the connection is perhaps not obvious immediately.\n\nIn computer\
    \ science, we often talk about the “big-O” behavior of various algorithms (see\
    \ https://en.wikipedia.org/wiki/Big_O_notation). This concern arises in a number\
    \ of discussions in this book.\n\nIn quick synopsis, big-O complexity expresses\
    \ the relationship between the size of the data being operated on and the time\
    \ a computer will take to perform the operation. The best we can hope for is O(1),\
    \ which means that the code will take the same amount of time no matter what size\
    \ the data is. More commonly, O(N) is achievable, which means that the compute\
    \ time increases in lockstep with the data size. A bit worse, but frequently seen,\
    \ is O(N×log N); this says that the compute time is the size of the data multiplied\
    \ by the logarithm of that size.\n\nWe start to become worried when we see quadratic,\
    \ that is, O(N²), behavior. Worse behaviors are possible, though. Some computation\
    \ might take time equal to the cube, or the 4th power, of the data size. The worst\
    \ behavior we commonly encounter is called exponential, that is, O(2ᴺ). These\
    \ algorithms become intractable very quickly as data size grows; some so-called\
    \ “hard problems” cannot be improved over exponential complexity.\n\nPython string\
    \ concatenation uses an intuitive plus operator, although this same operator has\
    \ a very different meaning for other types. For example, + (which under the hood\
    \ calls the “dunder”¹ methods `.__add__()` or `.__radd__()` on the class of the\
    \ objects involved) means addition of numbers and aggregation of lists as well.\n\
    \nCode such as this is intuitive, readable, and perfectly Pythonic:\n\n```\nfirstname\
    \ = \"David\"\nlastname = \"Mertz\"\ndegree = \"Ph.D.\"\n\nfullname = firstname\
    \ + \" \" + lastname          # ❶\n```\n\n1. The term *dunder* is commonly used\
    \ by Python programmers to refer to names that have both two leading and two trailing\
    \ underscores. These are discussed in a number of places throughout the book.\n\
    \n```\nif degree:\n    fullname += \", \" + degree\n```\n\n❶ This might be better\
    \ as an f-string.\n\nHowever, this good code can quickly go bad if we do too many\
    \ concatenation operations:\n\n```\n>>> from pprint import pprint\n>>> def lorem_ipsum(n=10):\n\
    ...     phrase = \"\"\n...     for _ in range(n):\n...         phrase = phrase\
    \ + get_word() + \" \"     # ❶\n...     return phrase\n...\n>>> pprint(lorem_ipsum(),\
    \ width=68)\n('engobe rereads hussif bethwacks aubade followup rabic '\n 'privateerings\
    \ nonsegregation sniffed ')\n```\n\n❷ String concatenation\n\nSo far, this code\
    \ remains reasonably Pythonic, and as used I have no complaint about it. As with\
    \ other examples ancillary to the main point of a section, or requiring larger\
    \ datasets, the source code and data file can be found at https://gnosis.cx/better.\
    \ All that matters for the current discussion is that get_word() returns some\
    \ string each time it is called.²\n\nBut what happens if we try to generate larger\
    \ phrases with this code?\n\n```\n>>> %timeit lorem_ipsum(10)\n5.85 µs ± 54 ns\
