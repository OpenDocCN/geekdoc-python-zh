    \n### 7.7.1 何时自定义数据结构是个坏主意\n\n在 Python 中编写前面提到的任何数据结构都相对容易。例如，这通常是大学考试和软件工程面试的主题。对于你将面临的大多数软件任务来说，这样做也*通常*是个坏主意。当你迅速抓住机会使用你学过的这些数据结构之一时——每一种在特定环境中确实*具有*具体的优势——这往往反映的是过度的聪明和急切，而不是良好的设计直觉。\n\
