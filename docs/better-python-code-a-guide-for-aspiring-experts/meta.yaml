    The ability to utilize metaclasses is certainly an advanced feature. Moreover,
    it is even an advanced feature that has dedicated syntax rather than simply emerging
    from the object model of Python *accidentally*. In contrast, monkeypatching is
    a somewhat advanced capability, but one that more or less follows automatically
