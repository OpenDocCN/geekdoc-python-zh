    '';DELETE FROM wordlist;--more stuff after prefix\n```\n\n## 8.7 Don't Use assert\
    \ to Check Safety Assumptions\n\nAssertions are a wonderful means of communicating\
    \ your intent to other developers who read the code you write. It can be tempting\
    \ to extend this utility to guarding against dangers in code, but doing so is\
    \ a mistake for a simple reason. Code run in production sometimes uses the `-O`\
    \ or `-OO` switch to (very slightly) optimize code performance.\n\nWhen Python\
