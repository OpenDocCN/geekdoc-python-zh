  md: '# # Looping Over the Wrong Things


    As in most procedural programming languages, Python has two kinds of loops: `for`
    and `while`. The semantics of these loops is very similar to that in most analogous
    languages. However, Python puts a special emphasis on looping *over* iterables—including
    *lazy* iterables along with concrete collections—which many languages do not do.
    Many of the mistakes in this chapter are “best practices” in other programming
    languages but are either stylistically flawed or unnecessarily fragile when translated
    too directly into Python.


    Technically, Python also allows for recursion, which is another way of “looping,”
    but recursion depth is limited in Python, and tail-call optimization (see https://en.wikipedia.org/wiki/Tail_call)
    is absent. Recursion can be enormously useful for problems that are naturally
    *subdivided* as a means of reaching their solution, but it is rarely a good approach
    in Python for constructing a mere *sequence* of similar actions.


    None of the mistakes in this chapter deal specifically with recursion, but programmers
    coming from Lisp-family languages, ML-family languages, or perhaps Haskell, Rust,
    Lua, Scala, or Erlang should note that while recursion may be a good habit in
    the language you used to program, it *can be* a bad habit for Python.


    # ## 1.1 (Rarely) Generate a List for Iteration


    A common pattern in many Python programs is to generate a sequence of items to
    process, append them to a list, and then loop through that list, processing each
    item as we get to it. In fact, structuring programs this way is often perfectly
    sensible and wholly intuitive. Except when it is not.


    When the sequence of items might be very long (or potentially infinite) or when
    each item might be a memory-hungry object, creating and populating a list often
    consumes more memory than is needed. As well, when the processing operation might
    be concurrent with the generating operation, we might spend a long time generating
    the list, followed by a similarly long time processing the list. If actual parallelism
    is possible, we might instead be able to complete the overall program in half
    as much time. But when parallelism is possible, it isn’t always easy. (For more
    on concurrency, see this book’s Appendix.)'
