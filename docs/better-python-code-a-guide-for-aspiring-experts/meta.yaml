    # 6.6 Efficient Concrete Sequences


    Python has a few data structures that are virtual subclasses of `collections.Sequence`
    but that avoid most of the indirection and value boxing that Python list requires.
    These types'
  - '[PAGE 175]


    include bytes, bytearray, and array.array. The last of these is a family of data
    structures, in the sense that it can be configured to hold a variety of identical
    bit-sized elements of the same numeric datatype.


    There is a relatively narrow domain where it makes sense to use Python''s standard
    library array module rather than "taking the next step" to use NumPy, but within
    that narrow range of use cases, it is nice to have array.array available to avoid
    external dependencies. Conceptually, bytearray is very similar to array.array("B")
    in that both are mutable unboxed sequences of integer values between 0 and 255
    (i.e., bytes). However, the collection of methods each provides are distinct.
    bytearray has most of the same methods as str, and is deliberately string-like;
    in contrast array.array (of every datatype) has methods much closer to those in
    list.


    Just as tuple is, in some sense, a "mutable version of list," bytes is "an immutable
    version of bytearray." The analogy isn''t perfect. Tuples have a starkly constrained
    collection of methods (i.e., exactly two, .count() and .index()) but bytes has
    many methods, most in common with str. The built-in type bytearray in turn essentially
    has a superset of the methods of bytes (some methods relevant to mutable sequences
    are only in bytearray):


    ```

    >>> set(dir(bytearray)) - set(dir(bytes))           # ❶

    {''copy'', ''clear'', ''remove'', ''append'', ''__alloc__'', ''__delitem__'',

    ''__setitem__'', ''reverse'', ''pop'', ''__iadd__'', ''insert'', ''__imul__'',

    ''extend''}

    ```


    ❶ A few sensible things to do with mutable sequences


    Let''s look at a few cases where notable (but constant rather than big-O) speed
    differences occur. For these quick examples, we just use random data; more realistically,
    these bytes might instead be meaningful content in a binary format. Analyzing
    or transforming such binary data is often an important goal:


    ```

    >>> from array import array

    >>> with open("/dev/urandom", "rb") as r:

    ...     rand_bytes = r.read(2**29)  # 512 MiB

    ...

    >>> type(rand_bytes)

    <class ''bytes''>

    >>> rand_bytearray = bytearray(rand_bytes)

    >>> rand_array = array("B", rand_bytes)

    >>> rand_list = list(rand_bytes)

    >>> for a, b, c, d in zip(

    ...         rand_bytes, rand_bytearray, rand_array, rand_list

    ...     ):

    ...     assert a == b == c == d

    ...

    ```'
