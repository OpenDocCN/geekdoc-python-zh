  md: '# # Just Because You Can, It Doesn’t Mean You Should…


    Python has a great many capabilities that exist for good reasons. However, many
    of these features create what jurists call an “attractive nuisance.”¹ This chapter
    is a mixture of positive and negative advice, in truth. It presents some slightly
    unusual constructs that a new Python developer often learns and becomes excited
    about, before finally stumbling over the pitfalls those possibilities present.
