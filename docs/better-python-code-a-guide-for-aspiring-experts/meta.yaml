    与 `typing.NamedTuple` 中的文档注解一样，数据类中的注解也未被 Python 本身以任何方式强制执行。虽然符合惯例，但 Python 甚至不要求注解必须是类型。


    数据类还有一些更“高级”的功能，例如 `dataclasses.field()` 允许你指定一个特定于实例的可变默认值。`dataclasses.fields()`、`dataclasses.asdict()`
    和 `dataclasses.astuple()` 提供了内省和转换数据类的方法。


    当你定义一个数据类时，你使用装饰器，而不是，例如，继承自基类。这样做是因为构造过程在某种程度上动态地向创建的类添加了属性和方法，而这通过继承是无法实现的。你不需要担心这个，只需记住语法即可。然而，如果你真的需要知道一个对象是否是数据类，可以使用
    `dataclasses.is_dataclass(obj)` 来询问。


