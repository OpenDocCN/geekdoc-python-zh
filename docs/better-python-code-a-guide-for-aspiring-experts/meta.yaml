  md: "For the most part, the mistake of coercing actual `True` or `False` values\
    \ from merely “truthy” or “falsy” is simply stylistic and does not harm program\
    \ operation. But such use has a strong code smell that should be avoided.\n\n\
    Often the habit of spelling out `is True` is borrowed from SQL, where database\
    \ columns might both be of Boolean type and be nullable.¹ However, sometimes you\
    \ encounter a similar usage in existing Python code. In SQL, these checks actually\
    \ do make sense, as shown in the following code.\n\n```\nUse of = TRUE in SQL\n\
    SQLite version 3.37.2 2022-01-06 13:25:41\nsqlite> CREATE TABLE test (name TEXT,\
    \ flag BOOL NULL);\nsqlite> INSERT INTO test VALUES (\"Bob\", TRUE), (\"Ann\"\
    , FALSE),\n   ...> (\"Li\", NULL);\nsqlite> SELECT name FROM test WHERE flag IS\
    \ NULL;\nLi\nsqlite> SELECT name FROM test WHERE flag = TRUE;\nBob\nsqlite> SELECT\
    \ name FROM test WHERE flag = FALSE;\nAnn\nsqlite> SELECT name FROM test WHERE\
    \ NOT flag;       # ❶\nAnn\n```\n\n> ❶ In many SQL dialects, we can get away with\
    \ Python-like bare values, but best practice in that language remains to be explicit.\n\
    \nSometimes in Python code, you will see a sentinel used within a function that\
    \ normally returns an actual `True` or `False`. Often this sentinel is `None`,\
    \ but sometimes other values are used. The problem here, of course, is that a\
    \ sentinel almost certainly has a truthiness that can be deceptive in code using\
    \ such a function.\n\nIf you are writing code from scratch, or refactoring it,\
    \ you are better off using an explicit enumeration, utilizing the well-designed\
