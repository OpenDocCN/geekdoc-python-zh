- md: "## Chapter 7 Misusing Data Structures\n\n> Note Cost and amortized cost\n\n\
    For lists, accessing an item at a given numeric position is O(1). Changing the\
    \ value at a numeric position is O(1). Perhaps surprisingly, `list.append()` and\
    \ `list.pop()` are also amortized O(1).\n\nThat is, adding more items to a list\
    \ will intermittently require reallocating memory to store their object references;\
    \ but Python is clever enough to use pre-allocated reserve space for items that\
    \ might be added. Moreover, as the size of a list grows, the pre-allocation padding\
    \ also grows. The overall effect is that reallocations become rarer, and their\
    \ relative cost averages out to 0% asymptotically. In CPython 3.11, we see the\
    \ following behavior on an x86-64 architecture (but these details are not promised\
    \ for a different Python implementation, version, or chip architecture):\n\n```python\n\
    >>> from sys import getsizeof\n>>> def pre_allocate():\n...     lst = []\n...\
    \     size = getsizeof(lst)\n...     print(\" Len   Size  Alloc\")\n...     for\
    \ i in range(1, 10_001):\n...         lst.append('a')\n...         newsize = getsizeof(lst)\n\
    ...         if newsize > size:\n...             print(f\"{i:>4d}{newsize:>7d}{newsize-size:>6d}\"\
    )\n...             size = newsize\n...\n>>> pre_allocate()\n```\n\n```\nLen  \
