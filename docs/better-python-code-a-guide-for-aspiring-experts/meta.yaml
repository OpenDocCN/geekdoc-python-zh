    \ Point:\n...     def __init__(self, x, y):\n...         self.x = x\n...     \
    \    self.y = y\n...     def from_origin(self):\n...         from math import\
    \ sqrt\n...         return sqrt(self.x**2 + self.y**2)\n...\n>>> point = Point(3,\
    \ 4)\n>>> point.from_origin()\n5.0\n>>> type(Point.__dict__)\n<class 'mappingproxy'>\n\
    >>> type(point.__dict__)\n<class 'dict'>\n>>> Point.__dict__.keys()\ndict_keys(['__module__',\
    \ '__init__', 'from_origin', '__dict__', '__weakref__', '__doc__'])\n>>> point.__dict__\n\
    {'x': 3, 'y': 4}\n```\n\n### 7.5.2 回到我们常规的错误\n\n#### 方法 .setdefault()\n\n在所有有用的字典方法中，我个人最常忘记的是\
