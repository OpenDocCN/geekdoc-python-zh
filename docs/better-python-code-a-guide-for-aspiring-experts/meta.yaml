    本章中的一些讨论——每个都关于Python标准库中一个特定的数据结构——其安排方式与本书其他部分略有不同。对于每一个，都会展示一个使用其中一种简单数据结构完成简单任务的例子；随后是*错误*，即如果不使用这些数据结构，为了达到相同目标而需要编写的更长、更难读、有时明显更慢的代码。


    ### 6.1 collections.defaultdict


