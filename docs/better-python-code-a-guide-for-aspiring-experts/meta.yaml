    Notwithstanding their formal equivalence (possibly with a small number of extra
    lines to force it), it is far more common for a `for` loop to feel Pythonic than
    it is for a `while` loop. This general advice has *many* exceptions, but you will
    find that *almost always* when you loop in Python, it is either over a collection
    or over an iterable (such as a generator function, generator comprehension, or
    custom iterable class). In many of the times when this is not the case, it is
    a call to refactor the part of your code that provides data to operate *into*
    an iterable.


    It is *not* a mistake to use `while`, but whenever you find yourself writing it,
    you should still ask yourself: “Can I do this as a `for` loop?” Ask yourself the
    same question for code you are in a position to refactor. The answer may well
    be that the `while` loop is the most expressive and clearest version, but the
    question should still have occurred to you. Thinking in terms of (potentially
    infinite) sequences usually promotes clear and elegant design in Python.


    # 1.6 The Walrus Operator for “Loop-and-a-Half” Blocks


    A pattern that Python programmers—and programmers in many other programming languages—have
    often used has always been just slightly ugly. This is the “loop-and-a-half” pattern.
    In fact, a number of languages have been designed with, or later grown, a construct
