    \ = CountingTree(value)\n        else:\n            if index > self.left.length:\n\
    \                self.right.insert(\n                    index - (self.left.length\
    \ + 1), value)\n            else:\n                self.left.insert(index, value)\n\
    \n        self.length += 1\n```\n\n以上就是我们实际运行此处基准测试所需的全部代码。重复调用 `CountingTree.insert()`\
    \ 会创建类似于图中的树。每一层的 `.left` 和 `.right` 属性可能被哨兵 `EMPTY` 占用，逻辑可以利用它来处理没有给定子节点的节点。\n\
    \n定义一些我们希望集合具有的其他行为也很有用。\n\n计数二叉树中的附加方法\n\n```python\ndef append(self, value):\n\
    \    self.insert(len(self), value)\n\ndef __iter__(self):\n    if self.left is\
    \ not EMPTY:\n        yield from self.left\n    if self.value is not EMPTY:\n\
    \        yield self.value\n    if self.right is not EMPTY:\n        yield from\
    \ self.right\n\ndef __repr__(self):\n    return f\"CountingTree({list(self)})\"\
    \n```"
