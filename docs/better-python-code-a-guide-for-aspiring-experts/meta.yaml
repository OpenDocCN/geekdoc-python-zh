    也有特定的用途。


    为项目选择数据结构的一个好策略是，首先考虑前面段落中列出的“四大”是否完全满足你的需求（包括良好的大 O 行为）。通常答案是肯定的。如果你觉得使用它们可能有缺点，请考虑使用标准库
    collections、array、enum、dataclasses 中的其他数据结构，或者可能是 queue 和其他一些。如果仍然觉得缺少什么，请考虑 sortedcontainers、pyrsistent、NumPy
    和 Pandas。如果仍然不够——如果确实不够，请非常仔细地考虑你是否真的在问正确的问题——在开源世界中寻找其他数据结构项目。在罕见但并非不存在的情况下，如果前面的步骤不能满足你的需求，请考虑创建自定义数据结构（在阅读下一章之后）。


    ## 7 误用数据结构


    Python 拥有设计极其精良的数据结构和数据表示，其中许多在前一章中讨论过。然而，一些不幸很常见的反模式，可能会使数据结构的使用效率急剧下降，或导致代码中出现意外行为。


