    17\n```\n\n- ❶ Any two of the comparison dunders may be implemented for the rest\
    \ to be built for us.\n- ❷ This property is only calculated once and then cached.\n\
    - ❸ A comparison, .__le__(), we did not directly implement\n- ❹ Second access\
    \ has no side effect, nor does it call randint() again\n\nThere are a good number\
    \ of additional useful decorators scattered around Python’s standard library,\
    \ and many libraries and frameworks supply their own. Much of the time, use of\
    \ decorators provides a clean, minimal, and expressive way of creating code without\
    \ explicitly writing it. As with most things, decorators have their abuses; when\
    \ well used, they make code even more Pythonic.\n\n## 4.3.3 Use itertools (Sufficiently)\n\
    \nThis pitfall joins others in this section in simply describing how developers\
    \ may take approaches that are *less good* than those enabled by versions using\
    \ the `itertools` module. This “less good” is rarely a matter of producing the\
    \ wrong results, but is often a matter of producing the right result more slowly,\
    \ sometimes worse in big-O complexity behavior (i.e., quickly exceeding available\
    \ time and computer resources).\n\nThe basic Python language is very powerful.\
    \ One of the concepts Python has moved toward emphasizing is *lazy computation*.\
    \ Specifically, iterables in Python may be large or infinite. Concrete collections\
    \ are also (usually) iterable, but many iterables that are not concrete collections\
    \ have a nice property of producing exactly one object at a time, and requiring\
    \ almost no memory beyond that needed for that one object.\n\n> **Note Iterables\
    \ and iterators**\n\nUsers new to the concept can often overlook the somewhat\
    \ subtle distinction between *iterables* and *iterators*. The fact that many iterables\
    \ are their own iterator does not help in sorting out that confusion. These types\
    \ of things are programmatically defined by `collections.abc.Iterable` and `collections.abc.Iterator`,\
    \ respectively.\n\nIn brief, an iterable is an object that, when passed to the\
    \ built-in function `iter()`, returns an iterator. An iterator is simply an object\
    \ that, when passed to the built-in function `next()`, either returns a value\
    \ or raises `StopIteration`. These two simple properties make iterables and iterators\
    \ *play nice* with loops, comprehensions, and other “iterable contexts.”\n\nGenerator\
    \ functions return iterators when called. But iterables and iterators may also\
    \ be defined by custom classes. As usual, it is the presence of dunder methods\
    \ that allows objects to work with operators and built-in functions. A typical\
    \ such class might look like the following.\n\n### An iterable class that is its\
    \ own iterator\n\n```python\n>>> class Ones:\n...     def __next__(self):\n...\
    \         return 1\n...     def __iter__(self):\n...         return self\n...\n\
