    # # Just Because You Can, It Doesn’t Mean You Should…


    Python has a great many capabilities that exist for good reasons. However, many
    of these features create what jurists call an “attractive nuisance.”¹ This chapter
    is a mixture of positive and negative advice, in truth. It presents some slightly
    unusual constructs that a new Python developer often learns and becomes excited
    about, before finally stumbling over the pitfalls those possibilities present.
    Hopefully, reading the mistakes here will facilitate the learning part but discourage
    the misuse follow-up. In some other mistakes, I simply discuss some techniques
    that people new to Python may not have known about (but which are mistakes not
    to avail yourself of); in one case (and another half case), people who have long
    used Python may also not be familiar with a newer feature.


    # ## 5.1 Metaclasses


    This section leans into slightly more arcane areas of Python’s design. If you’ve
    seen metaclasses discussed, or if they are used in the codebases you work with,
    this is definitely for you. If you haven’t, it’s still worth reading, but treat
    the topic as an amusement or an enlightenment, rather than as a necessity. Libraries
    you use might use metaclasses, even if you are not aware of the fact; knowing
    more is always handy.


    Metaclasses push at the edge of the highly dynamic nature of Python. Even class
    objects can themselves be created in different manners than their code describes
    by declaring a metaclass. Moreover, the choice of metaclass can itself, in principle,
    be dynamically chosen.


    1. Attractive nuisance: “a legal doctrine which makes a person negligent for leaving
    a piece of equipment or other condition on property which would be both attractive
    and dangerous to curious children. These have included tractors, unguarded swimming
    pools, open pits, and abandoned refrigerators” (from https://dictionary.law.com).
    Some of the more obscure features in Python are certainly reminiscent of open
    pits and abandoned refrigerators.'
