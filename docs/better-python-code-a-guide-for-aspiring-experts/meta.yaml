    \ programming languages.\n\nA clear contrast with Python, in this regard, is Java.\
    \ Whereas Python strives for simplicity, Java strives to include every data structure\
    \ users might ever want within its standard library (i.e., the `java.util` namespace).\
    \ Java has hundreds of distinct data structures included in the language itself.\
    \ For Pythonic programmers, this richness of choice largely leads only to \"analysis\
    \ paralysis\" (https://en.wikipedia.org/wiki/Analysis_paralysis). Choosing among\
    \ so many only-slightly-different data structures imposes a large cognitive burden,\
    \ and the final decision made (after greater work) often remains sub-optimal.\
    \ Giving someone more hammers can sometimes provide little other than more ways\
    \ for them to hit their thumb.\n\n> **Note A data structure that hasn't quite\
    \ made it into Python**\n\nA really lovely example of the design discussions that\
    \ go into Python is in PEP 603 (https://peps.python.org/pep-0603/), and the python-dev\
    \ mailing list and Discourse thread among core developers that followed this PEP.\
    \ The proposal of a new data structure has not been entirely rejected since September\
    \ 2019, but it also has not been accepted so far.\n\nInternally, CPython utilizes\
    \ a data structure called a Hash Array Mapped Trie (HAMT). This isn't used widely,\
    \ but there are specific places in the C code implementing CPython where it is\
    \ the best choice. A HAMT is a kind of immutable dictionary, in essence. Since\
    \ this structure *already exists* in the CPython codebase, it would be relatively\
    \ easy to expose it under a name like `frozenmap` or `frozendict`; this would\
    \ parallel the existing `frozenset` and `tuple` in being the \"immutable version\
    \ of built-in mutable collections.\"\n\nHAMT is clearly a useful data structure\
    \ for some purposes. If it were not, the very talented CPython developers would\
    \ not have utilized it. However, the current tide of opinion among these developers\
    \ is that HAMT is not general purpose enough to add to the cognitive load of tens\
    \ of millions of Python developers who *probably won't need it*.\n\n### 7.7.1\
    \ When Rolling Your Own Is a Bad Idea\n\nWriting any of the data structures mentioned\
    \ thus far is comparatively easy in Python. Doing so is often the subject of college\
    \ exams and software engineering interviews, for example. Doing so is also *usually*\
    \ a bad idea for most software tasks you will face. When you reach quickly for\
    \ an opportunity to use one of these data structures you have learned—each of\
    \ which genuinely *does* have concrete advantages in specific contexts—it often\
    \ reflects an excess of cleverness and eagerness more than it does good design\
    \ instincts.\n\nA reality is that Python itself is a relatively slow bytecode\
    \ interpreter. Unlike compiled programming languages, including just-in-time (JIT)\
    \ compiled languages, which produce machine-native instructions, CPython is a\
    \ giant bytecode dispatch loop. Every time an instruction is executed, many levels\
    \ of indirection are needed, and basic values are all relatively complex wrappers\
    \ around their underlying data (remember all those methods of datatypes that you\
    \ love so much?).\n\n> **Note Python implementations**\n\nSeveral alternative\
    \ implementations of Python exist besides CPython. In particular, a few of these\
    \ include JIT compilation. The most widely used such implementation is PyPy (https://www.pypy.org/),\
    \ which JITs everything, and does so remarkably well. Its main drawbacks are that\
    \ it has fallen behind version compatibility with CPython, and that using compiled\
    \ extensions created for CPython can encounter overheads that reduce the speed\
    \ advantages greatly.\n\nLess widely used attempts at JIT Python interpreters\
    \ include Pyston (https://github.com/pyston/pyston), Cinder (https://github.com/facebookincubator/cinder),\
    \ and Pyjion (https://github.com/tonybaloney/Pyjion). While all of these have\
    \ good ideas within them—and all are derived from CPython source code (unlike\
    \ PyPy)—these open source projects still largely have a focus within the private\
    \ companies that developed them. Those are Dropbox, Meta, and Microsoft, respectively\
    \ (Alphabet—i.e., Google—subsidiary DeepMind abandoned its similar S6 project).\n\
    \nReservations mentioned, it is well possible that a custom data structure developed\
    \ as pure Python but used in a JIT interpreter will achieve the speed and flexibility\
    \ advantages that those developed in compiled languages have.\n\nAccompanying\
    \ the fact that Python is relatively slow, most of the built-in and standard library\
    \ data structures you might reach for are written in highly optimized C. Much\
    \ the same is true for the widely used library NumPy, which has a chapter of its\
    \ own.\n\nOn the one hand, custom data structures such as those mentioned can\
    \ have significant big-O complexity advantages over those that come with Python.⁵\
    \ On the other hand, these advantages need to be balanced against what is usually\
    \ a (roughly) constant\n\n5. See note 1 on page 156."
