    ## Chapter 9 Numeric Computation in Python


    Working with numbers is, of course, one of the most common things we do in programming
    languages. And yet, there are a great many ways that our numeric code can go subtly
    wrong. For larger scale and more intensive work with numbers, the third-party
    libraries NumPy and Pandas make a great many tasks easier and faster. Other important
    numeric libraries also exist, but those two are so widespread in the Python ecosystem
    as to merit independent discussion. Several such libraries are discussed briefly
    in the appendix, *Topics for Other Books*.


    While reaching out to “vectorized” or “unboxed” numeric libraries can often be
    useful,¹ we should and do perform much numeric computation in Python itself.


    Many of the mistakes we can make in working with numbers derive from subtle edge
    cases of the behavior of floating point numbers. In a general way, this class
    of issues applies just as much to the third-party libraries as it does to pure
    Python. In fact, three of the four mistakes discussed in the IEEE-754 section
    of this chapter apply almost identically to most programming languages other than
    Python, but remain concerns for Python developers, so are discussed here.


    Some mistakes Python developers can make relate to other kinds of *numeric domains*,
    perhaps with choosing the wrong one for a given task. The last two mistakes in
    this chapter touch on `decimal.Decimal` and `fractions.Fraction` and when those
    are good choices for numeric types.


    ### 9.1 Understanding IEEE-754 Floating Point Numbers


    Had he lived 75 years later, J. B. S. Haldane likely would have remarked:


    > Now, my own suspicion is that [IEEE-754] is not only queerer than we suppose,
    but also queerer than we can suppose … I suspect that there are more things in
    numeric approximation than are dreamed of, or can be dreamed of, in any philosophy.²


    This section looks at several common mistakes Python programmers make when working
    with floating point numbers, which often occur in places that are unlikely to
    raise immediate suspicion among developers who have not yet been bitten by them.


    #### 9.1.1 Comparing NaNs (and Other Floating Point Numbers)


    The IEEE-754–1985 standard for floating point numbers includes a special kind
    of value called “Not a Number” (NaN).³ Nearly all programming languages and computer
    architectures implement IEEE-754 and NaN values. As well as being perfectly good
    floating point values in plain Python, NaNs serve special roles when they are
    individual values within NumPy arrays or Pandas DataFrames (and Xarray DataArrays,
    and Vaex/Polars DataFrames, and in other numeric special collections).


    > **Note Getting pedantic about NaNs**

    >

    > To be precise about things, a NaN is not *a value*, but rather a family of values
    marked by a particular bit pattern. There are 16,777,214 32-bit NaNs, and 9,007,199,254,740,990
    64-bit NaNs. Moreover, within this vast space of possible NaNs, the bit patterns
    are split evenly between *signaling* and *quiet* NaNs.

    >

    > This is a lot of complication that the original designers of IEEE-754, including
    main architect William Kahan, hoped would be utilized to carry *payloads* describing
    the circumstances within a computation where a non-representable floating point
    value arose. As things panned out, no widely used computing system makes any use
    of the many NaN values, and all basically treat every NaN as the same value.


    Let’s dig a bit deeper into the weeds. These details apply to many concerns. A
    floating point number is represented as a sign bit, followed by an exponent, followed
    by a mantissa.⁴ A NaN is simply a number that has all of its exponent bits set
    to 1s. Whatever happens to occur in the mantissa, it remains a NaN and is treated
    in the same special manner. Let''s see this in action.


    **Looking at bit patterns of floating point numbers**


    ```python

    >>> import struct, math

    >>> def show32(num):  # ①

    ...     pack32 = struct.pack("!f", num)

    ...     bits = ''''.join(f"{c:0>8b}" for c in pack32)

    ...     sign = bits[0]

    ...     exp = bits[1:9]

    ...     mantissa = bits[9:]

    ...     print("- exponent mantissa")

    ...     print(f"{sign} {exp} {mantissa}")

    ...

    >>> show32(3.1415)

    - exponent mantissa

    0 10000000 10010010000111001010110

    >>> show32(-math.pi)

    - exponent mantissa

    1 10000000 10010010000111111011011

    ```


    ① We “cast” a floating point to 32-bit, even if its native format is wider.


    We can see that a very rough approximation of π has the same exponent and most
    of the same mantissa bits as the best approximation we can make of negative pi
    within IEEE-754. The sign bit is flipped between the two numbers spelled out as
    bits. But what about operations that result in NaNs?


    **Looking at NaN bit patterns generated by Python**


    ```python

    >>> show32(math.nan)

    - exponent mantissa

    0 11111111 10000000000000000000000

    >>> show32(math.inf/math.inf)

    - exponent mantissa

    1 11111111 10000000000000000000000

    >>> show32(-math.nan)

    - exponent mantissa

    1 11111111 10000000000000000000000

    >>> show32(1e500-1e500)

    - exponent mantissa

    1 11111111 10000000000000000000000

    >>> show32(0 * math.inf)

    - exponent mantissa

    1 11111111 10000000000000000000000

    ```


    Python, like almost all other programming languages, simply uses one of the millions
    (or quadrillions) of possible NaNs, regardless of how we arrived at it. The leading
    1 in the mantissa technically makes it a signaling NaN, but no Python library
    I know of pays any attention to this fact. It''s technically possible in Python
    to construct a NaN with a different bit pattern, but it requires arcana from the
    `struct` or `ctypes` modules; no “normal Python” operation will do this, nor pay
    any attention to the special value.


    Let''s try a comparison that at first, certainly, *seems like* it should succeed.


    **Comparing floating point numbers, including NaNs**


    ```python

    >>> a = [math.pi, math.e, float(''nan''), math.tau]

    >>> b = [math.pi, math.e, math.nan, math.tau]

    >>> a == b

    False

    ```


    The bit patterns stored for the NaNs in a and b are, in fact, identical. Likewise
    for the other mentioned mathematical constants. The problem is that according
    to IEEE-754, no NaN will ever compare as equal to another, even if their payloads
    are identical:


    ```python

    >>> math.nan == math.nan, math.nan is math.nan

