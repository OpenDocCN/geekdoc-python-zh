    # 8.6 SQL Injection Attacks When Not Using DB-API


    SQL injection attacks are a general security vulnerability across almost all languages
    that are able to utilize SQL databases. It''s not a *mistake* that is specific
    to Python, but the solution is specifically to use the full capabilities of Python''s
    DB-API. Other programming languages and other libraries or drivers have their
    own solutions, but in Python, it falls under the DB-API, which almost all database
    drivers follow.


    Part of what the DB-API provides is a way of passing parameters to an SQL call
    in a way that is guaranteed to be safe against injection attacks. For most modern
    RDBMSs (relational database management systems), the query parameters are, in
    fact, passed as a separate stream from the query template. However, other than
    feeling happy that efficiency is improved thereby, you do not need to worry about
    that internal detail. You simply can be assured that the DB-API and driver module
    are keeping you safe.


    Let''s see a simple example of using the DB-API.


    A simple (and safe) example of using the DB-API


    ```

    >>> password = keyring.get_password("postgres", "pw")    # ❶

    >>> import psycopg2                                        # ❷

    >>> with psycopg2.connect(

    ...         dbname=''mistakes'',

    ...         host=''localhost'',

    ...         user=''developer'',

    ...         password=password) as conn:

    ...     with conn.cursor() as cur:

    ...         cur.execute("SELECT * FROM wordlist")

    ...         for record in cur:

    ...             print(record)

    ...     conn.commit()

    ...

    (''biochips'',)

    (''fluoroacetate'',)

    (''potentialities'',)

    (''steelwares'',)

    (''edacity'',)

    (''platter'',)

    (''pulverizations'',)

    (''entertains'',)

    (''photoionising'',)

    ```'
