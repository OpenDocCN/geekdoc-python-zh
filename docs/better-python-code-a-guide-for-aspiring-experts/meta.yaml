    ## 8.6 不使用 DB-API 时的 SQL 注入攻击


    SQL 注入攻击是几乎所有能够使用 SQL 数据库的语言中普遍存在的安全漏洞。这不是 Python 特有的*错误*，但解决方案是专门使用 Python DB-API
    的全部功能。其他编程语言和其他库或驱动程序有自己的解决方案，但在 Python 中，它属于 DB-API 的范畴，几乎所有数据库驱动程序都遵循它。


    DB-API 提供的部分功能是一种向 SQL 调用传递参数的方式，这种方式保证可以安全地防止注入攻击。对于大多数现代 RDBMS（关系数据库管理系统），查询参数实际上是作为与查询模板分开的流传递的。然而，除了为效率因此提高而感到高兴之外，你不需要担心这个内部细节。你只需确信
    DB-API 和驱动程序模块正在保护你的安全。


    让我们看一个使用 DB-API 的简单示例。


    ### 使用 DB-API 的一个简单（且安全）的示例


    ```python

    >>> password = keyring.get_password("postgres", "pw")    # ❶

    >>> import psycopg2                                        # ❷

    >>> with psycopg2.connect(

    ...         dbname=''mistakes'',

    ...         host=''localhost'',

    ...         user=''developer'',

    ...         password=password) as conn:

    ...     with conn.cursor() as cur:

    ...         cur.execute("SELECT * FROM wordlist")

    ...         for record in cur:

    ...             print(record)

    ...     conn.commit()

    ...

    (''biochips'',)

    (''fluoroacetate'',)

    (''potentialities'',)

    (''steelwares'',)

    (''edacity'',)

    (''platter'',)

    (''pulverizations'',)

    (''entertains'',)

    (''photoionising'',)

    ```


    ❶ 根据将密钥放在源代码中的错误，这里使用了好的方法。

    ❷ 用于连接 PostgreSQL 的 Psycopg 3 驱动程序


    然而，这个单词表中可能有很多单词，所以我们希望限制它。具体来说，我们希望根据用户提供的标准来限制它；在我们的例子中，用户可能请求只查看具有特定前缀的单词。


    ### 一个看似简单但暴露了注入攻击的函数


    ```python

    >>> def some_words():

    ...     prefix = input("[Prefix]? ")

    ...     print("-"*40)

    ...     with psycopg.connect(

    ...             dbname=''mistakes'',

    ...             host=''localhost'',

    ...             user=''developer'',

    ...             password=password) as conn:

    ...         with conn.cursor() as cur:

    ...             cur.execute(f"SELECT word FROM wordlist "

    ...                         f"WHERE word LIKE ''{prefix}%''")

    ...             for record in cur:

    ...                 print(record[0])

    ...         conn.commit()

    ...

    >>> some_words()

    [Prefix]? p

    ----------------------------------------

    potentialities

    platter

    pulverizations

    photoionising

    ```


    到目前为止，一切仍然直接而简单。但让我们尝试再次调用该函数。


    ### 注入攻击进行中


    ```python

    >>> some_words()

    [Prefix]? '';DELETE FROM wordlist;--

    ----------------------------------------

    ```


    问题当然不在于没有匹配奇怪的用户输入。问题在于我们实际上执行了以下操作：


