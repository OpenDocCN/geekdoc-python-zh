    # ## 5.1 Metaclasses


    This section leans into slightly more arcane areas of Python’s design. If you’ve
    seen metaclasses discussed, or if they are used in the codebases you work with,
    this is definitely for you. If you haven’t, it’s still worth reading, but treat
    the topic as an amusement or an enlightenment, rather than as a necessity. Libraries
    you use might use metaclasses, even if you are not aware of the fact; knowing
    more is always handy.


