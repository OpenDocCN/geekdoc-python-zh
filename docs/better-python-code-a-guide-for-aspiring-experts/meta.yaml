    本节探讨Python程序员在处理浮点数时犯的几个常见错误，这些错误通常出现在不太可能立即引起开发者怀疑的地方，尤其是那些尚未深受其害的开发者。


    #### 9.1.1 比较NaN（及其他浮点数）


    IEEE-754-1985浮点数标准包含一种称为“非数字”（NaN）的特殊值。³ 几乎所有编程语言和计算机架构都实现了IEEE-754和NaN值。NaN在纯Python中是完全有效的浮点值，当它们是NumPy数组或Pandas
    DataFrame（以及Xarray DataArray、Vaex/Polars DataFrame和其他数值特殊集合）中的单个值时，还扮演着特殊角色。


    > **注意 关于NaN的严谨讨论**

    >

    > 精确地说，NaN不是*一个值*，而是一族由特定比特模式标记的值。有16,777,214个32位NaN和9,007,199,254,740,990个64位NaN。此外，在这个庞大的可能NaN空间中，比特模式在*信号*NaN和*安静*NaN之间均匀分布。

