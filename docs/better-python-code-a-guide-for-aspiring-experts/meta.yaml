    ## 6.5.2 Static versus Dynamic


    Readers will note that the prior example is probably a bit *too clever* for most
    uses. We dynamically created the attributes of the namedtuple, and yet we used
    those names in subsequent code under the assumption we knew which field names
    were dynamically determined.


    Of course, we do not *need to* rely on dynamic creation of field names. The constructor
    will accept a static sequence or even a static space-separated string of field
    names. This is the more usual case, although the dynamic case certainly has some
    uses; for example, if you *know* the files you read will have a few field names,
    but they might vary in other fields.


    In order to emphasize the static declaration, some Pythonistas prefer a class-style
    spelling of `typing.NamedTuple`. Note in the following code that the annotations
    are merely documentation of intention; they *do not* perform any casting of types
    or checking that annotations match (unless third-party type checkers are used).
    For example:


    ```python

    from typing import NamedTuple


    >>> class Nation(NamedTuple):

    ...     Name: str

    ...     Population: int

    ...     Pct_Change: float

    ...     Net_Change: int

    ...     Density: float

    ...     Area: float

    ...

    >>> poland = Nation(

    ...     "Poland",

    ...     37_846_611,

    ...     -0.11,

    ...     -41_157,

    ...     Density=124.0,

    ...     Area=306_230

    ... )

    ...

    >>> poland

    Nation(Name=''Poland'', Population=37846611, Pct_Change=-0.11,

    Net_Change=-41157, Density=124.0, Area=306230)

    ```


    We can use either positional or named parameters to create a new `Nation` object,
    so the example uses a mixture (positional first, of course). As promised, the
    type declarations are not enforced; for example, `poland.Area` is an integer (as
    in the actual source data) even though it conceptually could be nonintegral as
    “declared.”


    ## 6.5.3 Data Classes


    Using data classes is very similar to using `typing.NamedTuple` in syntax. However,
    data classes allow you to mutate fields, and also allow you to add methods that
    are useful for working with the data within fields. Let’s create a `dataclass`
    version of our `Nation` object.


    Mutability is the overriding difference between `typing.NamedTuple` and `@dataclasses.dataclass`,
    but `collections.namedtuple` has the advantage of feeling much more lightweight
    when used in code (for human readers, not in underlying resource utilization).
    In speed and memory usage, the options are roughly equivalent; the main difference
    is in expressing an intent. Likewise, in almost all of your plain classes, you
    *could* decorate them as data classes and cause no harm to your program operation;
    but if a class really doesn’t have a record-oriented purpose, such a decorator
    would be confusing and mislead later developers:


    ```python

    >>> from dataclasses import dataclass

    >>> from copy import copy


    >>> @dataclass

    ... class DataNation:

    ...     Name: str

    ...     Population: int = 0

    ...     Pct_Change: float = 0

    ...     Net_Change: int = 0

    ...     Density: float = 0

    ...     Area: float = 0

    ...

    ...     def project_next_year(self, new_people):

    ...         self.Population += new_people

    ...         self.Net_Change = new_people

    ...         self.Pct_Change = new_people / self.Population

    ...         self.Density = self.Population / self.Area

    ...         return self

    ...

    >>> peru_2023 = DataNation(

    ...     "Peru",

    ...     32_971_854,

    ...     Pct_Change=1.42,

    ...     Net_Change=461_401,

    ...     Density=26,

    ...     Area=1_280_000

    ... )

    >>> peru_2023

    DataNation(Name=''Peru'', Population=32971854, Pct_Change=1.42,

    Net_Change=461401, Density=26, Area=1280000)

    >>> peru_2023.Density, peru_2023.Population

    (26, 32971854)

    >>> peru_2024 = copy(peru_2023).project_next_year(500_000)

    >>> peru_2024.Density, peru_2024.Population

    (26.1498859375, 33471854)

    ```


    - 1. For the example, we wish to retain the old record.

    - 2. The round number suggests the source data is imprecise.


    As with the documentary annotations in `typing.NamedTuple` the annotations in
    a dataclass are not enforced in any way by Python itself. While conventional,
    the annotations are not even required to be types by Python.


    Data classes have a few more “advanced” features, such as `dataclasses.field()`
    which allows you to specify a mutable default that is specific to the instance.
    `dataclasses.fields()`, `dataclasses.asdict()`, and `dataclasses.astuple()` provide
    means to introspect and transform data classes.


    When you define a data class, you use a decorator rather than, for example, inheriting
    from a base class. This is used because the construction somewhat dynamically
    adds attributes and methods to the created class that would not be possible with
    inheritance. You don’t need to worry about this, just remember the syntax. However,
    if you really need to know whether an object is a dataclass, you can ask `dataclasses.is_dataclass(obj)`.


    ## 6.6 Efficient Concrete Sequences


    Python has a few data structures that are virtual subclasses of `collections.Sequence`
    but that avoid most of the indirection and value boxing that Python list requires.
    These types include `bytes`, `bytearray`, and `array.array`. The last of these
    is a family of data structures, in the sense that it can be configured to hold
    a variety of identical bit-sized elements of the same numeric datatype.


    There is a relatively narrow domain where it makes sense to use Python''s standard
    library `array` module rather than "taking the next step" to use NumPy, but within
    that narrow range of use cases, it is nice to have `array.array` available to
    avoid external dependencies. Conceptually, `bytearray` is very similar to `array.array("B")`
    in that both are mutable unboxed sequences of integer values between 0 and 255
    (i.e., bytes). However, the collection of methods each provides are distinct.
    `bytearray` has most of the same methods as `str`, and is deliberately string-like;
    in contrast `array.array` (of every datatype) has methods much closer to those
    in `list`.


    Just as `tuple` is, in some sense, a "mutable version of `list`," `bytes` is "an
    immutable version of `bytearray`." The analogy isn''t perfect. Tuples have a starkly
    constrained collection of methods (i.e., exactly two, `.count()` and `.index()`)
    but `bytes` has many methods, most in common with `str`. The built-in type `bytearray`
    in turn essentially has a superset of the methods of `bytes` (some methods relevant
    to mutable sequences are only in `bytearray`):


    ```python

    >>> set(dir(bytearray)) - set(dir(bytes))           # ❶

    {''copy'', ''clear'', ''remove'', ''append'', ''__alloc__'', ''__delitem__'',

    ''__setitem__'', ''reverse'', ''pop'', ''__iadd__'', ''insert'', ''__imul__'',

    ''extend''}

    ```


    - ❶ A few sensible things to do with mutable sequences


    Let''s look at a few cases where notable (but constant rather than big-O) speed
    differences occur. For these quick examples, we just use random data; more realistically,
    these bytes might instead be meaningful content in a binary format. Analyzing
    or transforming such binary data is often an important goal:


    ```python

    >>> from array import array

    >>> with open("/dev/urandom", "rb") as r:

    ...     rand_bytes = r.read(2**29)  # 512 MiB

    ...

    >>> type(rand_bytes)

    <class ''bytes''>

    >>> rand_bytearray = bytearray(rand_bytes)

    >>> rand_array = array("B", rand_bytes)

    >>> rand_list = list(rand_bytes)

    >>> for a, b, c, d in zip(

    ...         rand_bytes, rand_bytearray, rand_array, rand_list

    ...     ):

    ...     assert a == b == c == d

    ...

    ```'
