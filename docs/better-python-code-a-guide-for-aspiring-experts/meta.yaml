- md: "## 5.3 Getters and Setters\n\nIn some programming languages—notably C++ and\
    \ Java—a common pattern is to control access to private or protected variables,\
    \ but to expose “getter” and “setter” methods.\n\nIn Python it is a mistake to\
    \ use this pattern, although one sees such code written by programmers coming\
    \ from other languages relatively often.\n\nAt first glance, my admonition against\
    \ getters and setters might seem to contradict that in Chapter 4, *Advanced Python\
    \ Usage*, in the section “Directly Accessing a Protected Attribute.” There I advised\
    \ against directly modifying pseudo-protected (i.e., one leading underscore) or\
    \ pseudo-private (i.e., two leading underscores) instance attributes. I use “pseudo-”\
    \ in the prior sentence because, of course, in Python you are never truly prevented\
    \ from reading or modifying these (other than by convention and mild name mangling).\n\
    \nIn so-called “bondage-and-discipline languages” like Java, the intention is\
    \ to prevent users of a class from doing something they are not *supposed to*.\
    \ In contrast, a common saying among Pythonistas is “We’re all adults here.” That\
    \ is, the creator of a class may include *access advisories* by using single or\
    \ double leading underscores, but these are not *access modifiers* in the style\
    \ of C and Java (besides “protected” and “private”, C—and Visual Basic also—includes\
    \ “friend” as an end run around other access modifiers).\n\nIf an attribute of\
    \ a Python instance contains one or two leading underscores, it is not because\
    \ the creator of the class tries to guarantee you won’t access it, but simply\
    \ as a way of indicating that the attribute might disappear in the next version\
    \ of their class, or its meaning or values might be altered in ways that are not\
    \ guaranteed by documented and public APIs. Also, perhaps the meaning of that\
    \ attribute with an access advisory might actually do something subtly different\
    \ than what you might initially assume. The class author is making you no promises\
    \ about that attribute.\n\nCircling back to getters and setters, let’s look at\
    \ a quick example of such an antipattern in Python. The following *works*, of\
    \ course; it merely feels non-idiomatic.\n\nWriting Java in Python antipattern\n\
    \n```python\nclass GetterSetterExample:\n    def __init__(self, value):\n    \
    \    self._value = value\n\n    def get_value(self):\n        return self._value\n\
    \n    def set_value(self, new_val):\n        self._value = new_val\n```\n\nEven\
    \ if these extra methods took additional actions, this would not feel like good\
    \ Python. Yes, you should not muck with `._value`, but if an indirect mechanism\
    \ to have guarded access to it is needed, *properties* provide a much more natural\
    \ style.\n\nFor a slightly more fleshed out example than `GetterSetterExample`,\
    \ let’s suppose we want a `Rectangle` class, but with the special constraint that\
    \ if we imagine the rectangle having a lower-left corner at the origin, no part\
    \ of the rectangle falls outside a circle with a given radius. This is illustrated\
    \ in Figure 5.1. In Pythonic style, we might write this as follows.\n\n![](img/260d2e810ee4666cb82be4957d5d9141_145_0.png)\n\
    \nFigure 5.1 Valid and invalid rectangles according to diagonal length rule.\n\
    \nWriting Pythonic Python\n\n```python\nfrom sys import stderr\nfrom math import\
    \ sqrt\n\nclass BoundedRectangle:\n    def __init__(self, x, y, radius=1):\n \
    \       assert x > 0 and y > 0 and radius > 0          # ❶\n        assert sqrt(x**2\
    \ + y**2) <= radius\n        self._x = x\n        self._y = y\n        self._radius\
    \ = radius                           # ❷\n\n    @property\n    def x(self):\n\
    \        return self._x\n\n    @x.setter                                     \
    \      # ❸\n    def x(self, new_x):\n        if new_x < 0 or sqrt(new_x**2 + self._y**2)\
    \ > self._radius:\n            print(\"Rectangle bounds violated\", file=stderr)\n\
    \            return\n        self._x = new_x\n\n    @property\n    def y(self):\n\
    \        return self._y\n\n    @y.setter\n    def y(self, new_y):\n        if\
    \ new_y < 0 or sqrt(new_y**2 + self._x**2) > self._radius:\n            print(\"\
    Rectangle bounds violated\", file=stderr)\n            return\n        self._y\
    \ = new_y\n\n    @property\n    def area(self):\n        return self._x * self._y\n\
    ```\n\n1. Production code might do something more than assert invariants.\n2.\
    \ By design, no mechanism is provided to change radius after initialization.\n\
    3. A “setter” still has that name in its decorator, but not in its API.\n\nIt\
    \ wouldn't be unreasonable to notice that we saved no code in defining the class,\
    \ nor even did it become more readable or obvious. The Pythonic savings are for\
    \ *users* of the class:\n\n```python\n>>> from BoundedRectangle import BoundedRectangle\n\
    >>> rect = BoundedRectangle(0.65, 0.30)\n>>> rect.x, rect.y, rect.area\n(0.65,\
    \ 0.3, 0.195)\n>>> rect.y = 0.25\n>>> rect.x, rect.y, rect.area\n(0.65, 0.25,\
    \ 0.1625)\n>>> rect.y = 0.8\nRectangle bounds violated\n>>> rect.x, rect.y, rect.area\n\
    (0.65, 0.25, 0.1625)\n```\n\nThe quick summary of this section is that using properties—either\
    \ read-only as with .area or read/write as with .x and .y—provides a simpler and\
    \ more Pythonic API for users of classes. It remains the case that accessing “protected”\
    \ attributes such as ._radius violates the *advice* of the class creator and might\
    \ produce unpredictable behavior (i.e., in this particular class, the radius is\
    \ intended to be set only on initialization).\n\n## 5.4 It’s Easier to Ask for\
    \ Forgiveness Than Permission\n\nAdmiral Grace Hopper, who invented or popularized\
    \ linkers, machine-independent programming languages, and the term *bug* in the\
    \ programming sense, also famously commented: “It’s easier to ask forgiveness\
    \ than it is to get permission.”"
  mdcn: "## 5.3 Getter 与 Setter\n\n在一些编程语言中——尤其是 C++ 和 Java——一种常见的模式是控制对私有或受保护变量的访问，但同时暴露“getter”和“setter”方法。\n\
    \n在 Python 中使用这种模式是错误的，尽管你相对经常能看到来自其他语言的程序员编写这样的代码。\n\n乍一看，我关于避免使用 getter 和 setter\
    \ 的告诫似乎与第 4 章《高级 Python 用法》中“直接访问受保护属性”一节的内容相矛盾。在那一节中，我建议不要直接修改伪受保护（即单下划线开头）或伪私有（即双下划线开头）的实例属性。我在前一句中使用“伪”这个词，是因为在\
    \ Python 中，你当然从未被真正阻止读取或修改这些属性（除了通过约定和轻微的名称修饰）。\n\n在像 Java 这样的所谓“约束与纪律语言”中，其意图是防止类的用户去做他们*不应该*做的事情。相比之下，Python\
    \ 开发者中有一句常见的说法：“我们都是成年人。”也就是说，类的创建者可以通过使用单下划线或双下划线前缀来包含*访问建议*，但这些并不是 C 和 Java\
    \ 风格的*访问修饰符*（除了“protected”和“private”，C 语言——以及 Visual Basic——还包括“friend”作为绕过其他访问修饰符的一种方式）。\n\
    \n如果一个 Python 实例的属性包含一个或两个前导下划线，这并不是因为类的创建者试图保证你不会访问它，而仅仅是一种表明该属性可能在类的下一个版本中消失，或者其含义或值可能以未在文档化和公共\
    \ API 中保证的方式被更改的方式。此外，带有访问建议的那个属性的实际含义可能确实与你最初假设的有所不同。类作者对该属性不做任何承诺。\n\n回到 getter\
    \ 和 setter，让我们看一个 Python 中这种反模式的快速示例。以下代码*可以工作*；只是感觉不符合 Python 风格。\n\n用 Python\
    \ 编写 Java 风格的反模式\n\n```python\nclass GetterSetterExample:\n    def __init__(self,\
    \ value):\n        self._value = value\n\n    def get_value(self):\n        return\
    \ self._value\n\n    def set_value(self, new_val):\n        self._value = new_val\n\
    ```\n\n即使这些额外的方法执行了额外的操作，这也不会感觉像是好的 Python 代码。是的，你不应该随意修改 `._value`，但如果需要一种间接机制来对其进行受保护的访问，*属性*提供了一种更自然的风格。\n\
    \n为了给出一个比 `GetterSetterExample` 稍微充实一点的例子，假设我们想要一个 `Rectangle` 类，但有一个特殊的约束：如果我们想象矩形的左下角在原点，那么矩形的任何部分都不能落在给定半径的圆外。这在图\
    \ 5.1 中进行了说明。以 Python 风格，我们可以这样编写。\n\n![](img/260d2e810ee4666cb82be4957d5d9141_145_0.png)\n\
    \n图 5.1 根据对角线长度规则的有效和无效矩形。\n\n编写 Python 风格的 Python 代码\n\n```python\nfrom sys import\
    \ stderr\nfrom math import sqrt\n\nclass BoundedRectangle:\n    def __init__(self,\
    \ x, y, radius=1):\n        assert x > 0 and y > 0 and radius > 0          # ❶\n\
    \        assert sqrt(x**2 + y**2) <= radius\n        self._x = x\n        self._y\
    \ = y\n        self._radius = radius                           # ❷\n\n    @property\n\
    \    def x(self):\n        return self._x\n\n    @x.setter                   \
    \                        # ❸\n    def x(self, new_x):\n        if new_x < 0 or\
    \ sqrt(new_x**2 + self._y**2) > self._radius:\n            print(\"Rectangle bounds\
    \ violated\", file=stderr)\n            return\n        self._x = new_x\n\n  \
    \  @property\n    def y(self):\n        return self._y\n\n    @y.setter\n    def\
    \ y(self, new_y):\n        if new_y < 0 or sqrt(new_y**2 + self._x**2) > self._radius:\n\
    \            print(\"Rectangle bounds violated\", file=stderr)\n            return\n\
    \        self._y = new_y\n\n    @property\n    def area(self):\n        return\
    \ self._x * self._y\n```\n\n1. 生产代码可能会做比断言不变量更多的事情。\n2. 设计上，初始化后没有提供更改半径的机制。\n\
    3. “setter”在其装饰器中仍然保留该名称，但在其 API 中没有。\n\n注意到我们在定义类时没有节省任何代码，甚至没有使其更具可读性或更明显，这并不奇怪。Python\
    \ 风格的节省是为类的*用户*准备的：\n\n```python\n>>> from BoundedRectangle import BoundedRectangle\n\
    >>> rect = BoundedRectangle(0.65, 0.30)\n>>> rect.x, rect.y, rect.area\n(0.65,\
    \ 0.3, 0.195)\n>>> rect.y = 0.25\n>>> rect.x, rect.y, rect.area\n(0.65, 0.25,\
    \ 0.1625)\n>>> rect.y = 0.8\nRectangle bounds violated\n>>> rect.x, rect.y, rect.area\n\
    (0.65, 0.25, 0.1625)\n```\n\n本节的简要总结是，使用属性——无论是像 .area 这样的只读属性，还是像 .x 和 .y 这样的读/写属性——为类的用户提供了更简单、更符合\
    \ Python 风格的 API。访问“受保护”属性（如 ._radius）仍然违反了类创建者的*建议*，并可能产生不可预测的行为（即，在这个特定类中，半径仅在初始化时设置）。\n\
    \n## 5.4 请求原谅比请求许可更容易\n\n海军上将格蕾丝·霍珀发明或推广了链接器、与机器无关的编程语言以及编程意义上的*bug*一词，她还有一句著名的评论：“请求原谅比请求许可更容易。”"
