    # Chapter 7 Misusing Data Structures


    For the handful of items inserted and removed from the small list in the example,
    the relative inefficiency is not important. However, even in the small example,
    keeping track of *where* each item winds up by index becomes confusing.


    As the number of operations gets large, this approach becomes notably painful.
    The following toy function performs fairly meaningless insertions and deletions,
    always returning five words at the end. But the general pattern it uses is one
    you might be tempted towards in real-world code.


    Asymptotic timing for insert-and-delete from list middle


    ```

    >>> from random import randrange

    >>> def insert_then_del(n):

    ...     words = [get_word() for _ in range(5)]

    ...     for _ in range(n):

    ...         words.insert(randrange(0, len(words)), get_word())

    ...     for _ in range(n):

    ...         del words[randrange(0, len(words))]

    ...     return words

    ...

    >>> insert_then_del(100)

    [''healingly'', ''cognitions'', ''borsic'', ''rathole'', ''division'']

    >>> insert_then_del(10_000)

    [''ferny'', ''pleurapophyses'', ''protoavis'', ''unhived'', ''misinform'']

    >>> %timeit insert_then_del(100)

    109 µs ± 2.42 µs per loop (mean ± std. dev. of 7 runs, 10,000 loops each)

    >>> %timeit insert_then_del(10_000)

    20.3 ms ± 847 µs per loop (mean ± std. dev. of 7 runs, 10 loops each)

    >>> %timeit insert_then_del(1_000_000)

    1min 52s ± 1.51 s per loop (mean ± std. dev. of 7 runs, 1 loop each)

    ```


    Going from 200 operations (counting each of insertion and deletion) to 20,000
    operations takes on the order of 200x as long. At these sizes the lists themselves
    are small enough to matter little; the time involved is dominated by the number
    of calls to `get_word()`, or perhaps a bit to `randrange()`, although we still
    see a 2x proportional slowdown from the list operations.


    However, upon increasing the number of operations by another 100x, to 2 million,
    linear scaling would see an increase from 20 ms to about 2 seconds. Instead it
    jumps to nearly 2 minutes, or about a 55x slowdown from linear scaling. I watched
    my memory usage during the 15 minutes that `%timeit` took to run the timing seven
    times, and it remained steady.


    It''s not that these operations actually use very much memory; rather, every time
    we insert one word near the middle of a 1 million word list, that requires the
    interpreter to move 500,000 pointers up one position in the list. Likewise, each
    deletion near the middle of a 1 million word list requires us to move the top
    500,000 pointers back down. This gets much worse very quickly as the number of
    operations increases further.'
