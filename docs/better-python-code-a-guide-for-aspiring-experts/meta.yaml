  md: "# Chapter 1 Looping Over the Wrong Things\n\nLet's suppose that we have a function\
    \ called `get_word()` that will return a word each time it is called, generally\
    \ different words on different calls. For example, this function might be responding\
    \ to data sent over a wire in some manner or calculated dynamically based on something\
    \ else about the state of the program. For this toy function, if `get_word()`\
    \ returns None, its data source is depleted; moreover, a “word” for the purpose\
    \ of this example is a sequence of ASCII lowercase letters only.\n\nIt is straightforward,\
    \ and commonplace, to write code similar to the following.\n\nCreating a list\
    \ from generated items\n\n```\n# source = <some identifier for how we generate\
    \ data>\nwords = []\nwhile True:\n    word = get_word(src=source)\n    if word\
    \ is None:\n        break\n    words.append(word)\n\nprint(f\"{len(words):,}\"\
    ) # -> 267,752\n```\n\nReaders of other discussions in this book might recognize\
    \ the number of words generated and guess the implementation of `get_word()` from\
    \ that. But let's assume that the number of words and what they are can vary across\
    \ each program run, and can vary across multiple orders of magnitude.\n\nIn a\
    \ bit of crude numerology, we assign a magic number to each word simply by valuing\
    \ 'a' as 1, 'b' as 2, and so on, through 'z' as 26, and adding those values. This\
    \ particular transformation isn't important, but the idea of “calculate a value\
    \ from each datum” is very commonplace. We use the following function for this\
    \ calculation.\n\nNumerological word magic number\n\n```\ndef word_number(word):\n\
    \    magic = 0\n    for letter in word:\n        magic += 1 + ord(letter) - ord('a')\n\
    \    return magic\n```\n\nWe might visualize the distribution of these numerological\
    \ values as shown in Figure 1.1.\n\n```\n# words = <regenerated list from another\
    \ source>\nimport matplotlib.pyplot as plt  # ❶\nplt.plot([word_number(word) for\
    \ word in words])\nplt.title(f\"Magic values of {len(words):,} generated words\"\
    )\nplt.show()\n```\n\n❶ pip install matplotlib or conda install matplotlib"
  merge: -1
  pgno: 32
- img_proc: true
  md: "![](img/260d2e810ee4666cb82be4957d5d9141_33_0.png)\n\n**Figure 1.1** Magic\
    \ values of generated words.\n\nAssuming that all we care about is this final\
    \ generated chart, there is no reason we needed to instantiate the full collection\
    \ of words, only their magic numbers. Admittedly, the toy example is too simple\
    \ to show the full advantage of the refactoring, but a sensible approach is to\
    \ lazily construct a generator of only the data we actually care about and to\
    \ only utilize the intermediate data as it is needed. For example, this code produces\
    \ the chart shown in Figure 1.2.\n\nLazily calculating only what is needed within\
    \ a generator\n\n```\npython\ndef word_numbers(src):\n    while (word := get_word(src=src))\
    \ is not None:\n        yield word_number(word)\n\n# source2 = <some different\
    \ identifier for data source>\nmagic_nums = list(word_numbers(source2))\nplt.plot(magic_nums)\n\
    plt.title(f\"Magic values of {len(magic_nums):,} generated words\")\nplt.show()\n\
    ```\n\nThe example shown in Figure 1.2 still needed to instantiate the list of\
    \ numbers, but not the list of actual words. If the “words” were some much larger,\
    \ memory-consuming object, this change would become more significant. For many\
    \ scenarios, exclusively incrementally processing each value from a generator\
    \ individually, with no intermediate collection at all, will suffice, and save\
    \ considerable memory."
