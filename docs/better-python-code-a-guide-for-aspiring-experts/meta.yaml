    for i, item in enumerate(items):\n    process(i, item)\n```\n\n在相对不常见的情况下，我想要索引但不想要项目本身时，我通常仍然使用\
    \ `enumerate()`，并且我使用 Python 的惯例 `_`（单下划线）表示“我不关心的值”：\n\n```python\nfor i, _ in\
    \ enumerate(items):\n    process(i, None)\n```\n\n我有时使用的一种方法，当我实际上想要维护多个增量时，是在循环之前初始化多个计数器，即使其中一个可以从\
    \ `enumerate()` 派生：\n\n```python\ntotal, n_foo, n_bar = 0, 0, 0\nfor item in items:\n\
    \    if is_foo(item):\n        process_foo(item)\n        n_foo += 1\n    elif\
    \ is_bar(item):\n        process_bar(item)\n        n_bar += 1\n    else:\n  \
    \      pass\n    total += 1\n```\n\n在这个例子中，`total` 也可以在循环本身中重置，但你可能希望强调与 `n_foo`\
    \ 和 `n_bar` 的平行关系，这可能更好地表达为这里所示。\n\n## 1.3 当你需要 dict.items() 时，不要迭代 dict.keys()\n\
    \n在某种意义上，你可以*几乎*将 Python 列表视为从索引位置到值的映射。在字典中，整数完全可以作为键；因此，`obj[7]` 可能同样是一个 `dict`（或其他映射）的索引，或者是一个\
    \ `list`（或其他序列）的索引。\n\n就像你有时会看到非 Pythonic 的代码循环遍历列表的索引位置，然后在循环体中查找该索引一样，你有时也会看到非\
    \ Pythonic 的代码循环遍历 `dict.keys()`。实际上，让我们稍微回溯一下：刚刚提到了两个风格错误。想象这样的代码：\n\n```python\n\
    for key in my_dict.keys():\n    process(key, my_dict[key])\n```\n\n这首先是非地道的，因为循环遍历\
    \ `my_dict.keys()` 等同于循环遍历 `my_dict` 本身。在幕后，产生的对象类型略有不同：`my_dict.keys()` 产生 `dict_keys`，而字典本身产生\
    \ `dict_keyiterator`。然而，很少有实际代码依赖于这种差异，因为它们在大多数目的下行为相同：\n\n```python\n>>> my_dict\
    \ = {c:ord(c) for c in \"Bread and butter\"}\n>>> type(my_dict.keys())\n<class\
    \ 'dict_keys'>\n>>> type(iter(my_dict))\n<class 'dict_keyiterator'>\n```\n\n具体来说，以下恒等式对于每个字典都将始终适用（除非你以极大的反常方式在\
    \ `dict` 的子类或某些自定义映射中破坏此恒等式）：\n\n```python\n>>> all(a is b for a, b in zip(iter(my_dict),\
    \ iter(my_dict.keys())))\nTrue\n```\n\n换句话说，如果你希望循环遍历键，你应该直接写：\n\n```python\n\
    for key in my_dict:\n    process(key, my_dict[key])\n```\n\n然而，相对不常见的是只希望循环遍历字典的*键*。即使你很少在代码的某个分支中实际使用该值，将其作为循环变量包含在内也几乎没有任何成本。记住，Python\
    \ 对象是通过引用访问的；你只是通过绑定循环变量将引用分配给现有对象；你不会复制或创建对象。\n\n换句话说，不要费心写：\n\n```python\nfor\
    \ key in my_dict:\n    if rare_condition(key):\n        val = my_dict[key]\n \
    \       process(key, val)\n```\n\n直接编写干净、Pythonic 的代码：\n\n```python\nfor key,\
    \ val in my_dict.items():\n    if rare_condition(key):\n        process(key, val)\n\
    ```\n\n这个问题是 linter 可能会警告的——就像之前关于使用 `enumerate()` 的问题一样——但*理解*循环的机制比仅仅阅读警告更进一步。\n\
    \n## 1.4 在迭代过程中修改对象\n\n你不应该修改你正在迭代的对象。有时你可以“侥幸逃脱”而没有不良影响，但这种习惯仍然是不好的。\n\n我们首先应该注意的是，某些\
    \ Python 对象是不可变的。例如，如果你迭代一个 `str`、`bytes`、`tuple` 或 `frozenset` 对象，那么修改底层集合的问题根本不会出现。\n\
    \n尽管如此，许多 Python 对象既是可迭代的又是可变的——最显著的是 `list`、`dict`、`set` 和 `bytearray`，当然，自定义或第三方对象也可能是。尝试在迭代对象时修改它可能会以几种不同的方式出错。\n\
    \n对不可变对象的基线迭代\n\n```python\n>>> s = \"Mary had a little lamb!\"\n>>> for c in\
    \ s:\n...     if c <= \"s\":\n...         print(c, end=\"\")\n... print()\nMar\
    \ had a lile lamb!\n```\n\n这个示例代码本身大多毫无意义，但我们对可迭代对象中满足某个谓词的元素执行选择性操作。我们当然可以做的不是打印单个字符，而是将通过过滤器的字符重新聚合到某个新的"
