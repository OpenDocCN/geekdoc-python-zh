  md: '# 2

    Confusing Equality with Identity


    Most objects in Python are mutable. Moreover, *all objects* in Python are accessed
    by reference. For objects that are immutable, such as strings, numbers, and **frozensets**,
    comparing for equality or inequality rarely raises a concern about whether those
    objects are also identical. However, for mutable objects such as mutable collections,
    it becomes very important to distinguish identity from mere equality.


    In many programming languages, a distinction is made between *pass by value*,
    *pass by address*, and *pass by reference* (occasionally *pass by name* occurs
    as well). Python behaves most similarly to reference passing, but in Python lingo
    we often emphasize Python''s semantics by calling the behavior *pass by object
    reference*. Being thoroughly object oriented, Python always encapsulates its objects,
    regardless of the scope they exist within. It''s not the value that is passed
    into functions, nor is it a memory address, nor is it a variable name, it''s simply
    an *object*.


    What becomes important to consider is whether an object passed into a function
    or method is *immutable*. If it is, then it behaves very much like a passed value
    in other languages (since it cannot be changed at all and therefore is not in
    the calling scope). The particular name an object has in different scopes can
    vary, but the object remains the same under each name. If that object is mutable,
    it might be mutated within a child scope, changing it within the calling scope
    (or elsewhere within the runtime behavior of a program).


    # 2.1 Late Binding of Closures


    The scoping behavior of Python can cause surprises for programmers coming from
    other dynamic programming languages. An expectation of many developers is that
    if a function—including a *lambda* function—is created within a loop (including
    within the loop element of a list, set, dict, or generator comprehension), then
    the created function will utilize the value of a variable that exists at the time
    the function is created.'
