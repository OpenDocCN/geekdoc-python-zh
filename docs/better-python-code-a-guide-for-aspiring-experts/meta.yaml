    These pseudo-random numbers are very bad at their job. Specifically, the same
    two numbers (close to the extremes of the unit interval) will alternate forever,
    which is not an expected distribution. Moreover, if you are using this numeric
    stream for anything vaguely security related, many attack vectors are opened up
    by failing to fall back to the alternate code path. Depending on the context,
    of course, many other problems might occur as well; for example, performance problems,
    errors in modeling, excessive collisions of, for instance, hash keys, and so on.


    The wisdom of this specific fallback is a separate matter; there are absolutely
    many other contexts where a fallback is reasonable. The solution to this error
    is extremely simple, happily. Simply use explicit checks for the conditions that
    are permitted or prohibited within `if/elif` or `match/case` blocks, and use those
    to fall back to alternate behavior. Using an explicit `raise` of an exception
    other than `AssertionError` within those blocks is perfectly reasonable as well.


    # 8.8 Wrapping Up


    In Python, as in every modern programming language, a background concern in the
    creation of any software system is the vulnerabilities it might create. Software
    can do things wrong in the sense of not producing the output or interactions that
    we had in mind when writing it; but it can also do things wrong in the sense of
    allowing bad actors to cause harm through the use of that software.


    Genuine security analysis of software is a broad topic, and one requiring a great
    deal of knowledge ranging over many things not in this book. However, there are
    a number of often repeated mistakes that Python developers make, each of which
    can be relatively straightforwardly rectified by following the advice in this
    chapter. These few things will not address all possible concerns, but they will
    fix surprisingly much of what we Python developers often get wrong.


    For a more in-depth look at a number of security issues, the Open Worldwide Application
    Security Project (OWASP; https://owasp.org/) is a good resource. They discuss
    and provide resources for some of the vulnerabilities I discuss, and for a great
    many others as well.


    There are many security mistakes not specifically addressed in this chapter, of
    necessity. Security is a broad concern, with many books wholly about it, and many
    professionals employed to understand a range of concerns. However, a few mistakes
    that are already well described in the Python documentation are still worth quickly
    mentioning.


    +   - Unpickling pickles with uncontrolled sources can cause execution of arbitrary
    code.

    - Loading YAML has the same concern as with pickles, but an easy solution is `yaml.safe_load()`.'
