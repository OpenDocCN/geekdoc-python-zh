    An actual decorator takes a function (or method or class) and returns a modified
    version. However, many very common and useful “decorators” are actually parameterized
    “decorator factories.” That is, these factories take completely different arguments,
    and themselves *return a decorator*. In fact, many useful “decorators” are cleverly
