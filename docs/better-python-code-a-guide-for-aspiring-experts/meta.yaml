    The code accidentally “works” with a string as an argument. The result is likely
    not what we want, but no exception is raised. However, for the dictionary argument,
    the exception that occurs really is not related to the fact that the argument
    is *not a sequence of integers*.


    If we wanted actual runtime checks, we could write something more like this.


    A runtime-checked function to manipulate integer sequences


    ```

    >>> def double_middle_element(seq):

    ...     "Double middle element in sequence of ints or return unchanged"

    ...     if not isinstance(seq, Sequence) or not seq:

    ...         return seq

    ...     if not all(isinstance(i, int) for i in seq):

    ...         return seq

    ...     middle = len(seq)//2

    ...     item = seq[middle] * 2

    ...     return seq[:middle] + type(seq)([item]) + seq[middle+1:]

    ...

    >>> double_middle_element((5, 8, 4, 6, 2, 3))

    (5, 8, 4, 12, 2, 3)

    >>> double_middle_element([5, 8, 4, 6, 2, 3])

    [5, 8, 4, 12, 2, 3]

    >>> double_middle_element({1: ''a'', 2: ''b'', 3: ''c''})

    {1: ''a'', 2: ''b'', 3: ''c''}

    >>> double_middle_element("abcde")

    ''abcde''

    ```


    Notice that the self-same object `Sequence` might play either a static or runtime
    role, but the code is structured differently for the two purposes. Using Pydantic
    might provide a path to unify these two roles, but the basic idea that “using
    the same object in different contexts does different things” isn’t actually that
    hard to think about.


    Some objects in `typing` definitely provide an attractive nuisance, however. For
    example, an actual colleague of mine—who admittedly primarily develops in C++,
    but has used Python on the side for more than a decade—wanted to have specialized
    integers against which he could perform an `isinstance()` check elsewhere in his
    program. This desire is eminently reasonable. Perhaps `UserId` is a special type
    of integer in the sense that we’d like to make sure a generic integer isn’t used
    in certain places. Or maybe we want an integer for a thermometer temperature,
    or for a percentile ranking, or for a distance measure where we want to avoid
    confusing miles with kilometers. Knowing whether the wrong kind of unit/value
    has snuck in is quite useful.


    With such a need in mind, here is an obvious—and wrong—solution to the requirement.'
