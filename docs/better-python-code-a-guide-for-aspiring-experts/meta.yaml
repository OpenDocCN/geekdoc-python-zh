    # 9.1.3 Naive Use of Floating Point Numbers: Associativity and Distributivity


    It is famously easy to forget that basic algebraic operations on floating point
    numbers are neither associative nor distributive in general. Even when we rule
    out special values like `math.inf` and `math.nan`, basic “ordinary numbers” only
    approximate Rational or Real numbers. We can exclude infinities and NaNs with
    the function `math.isfinite()`.


    To put it very simply, we cannot assume in IEEE-754—whether in Python or in any
    of the other majority of programming languages that use floating point numbers
    as built-ins or standard library types—that these properties hold.


    Absence of associativity and distributivity


    ```

    >>> from math import isfinite

    >>> a, b, c, d = 0.1, 0.2, 0.3, 0.4

    >>> isfinite(a) and isfinite(b) and isfinite(c) and isfinite(d)

    True

    >>> (a + b) + c == a + (b + c)

    False

    >>> (a + b) + d == a + (b + d)

    True

    >>> a * (b + c) == (a * b) + (a * c)

    True

    >>> c * (a + b) == (c * a) + (c * b)

    False

    ```


    Associativity and distributivity do not *always* fail, of course. We see examples
    in the preceding code block of these properties both holding and failing, all
    with very ordinary numbers. However, predicting exactly which series of operations
    will preserve exact equality and which will not is exceedingly subtle.


    The solution to this Gordian Knot, of course, is not to understand all the rounding
    errors in a computation that might consist of thousands or millions of floating
    point operations, but rather to settle for “plausible equality.” For what it’s
    worth, the problem gets even more tangled in the face of concurrency, wherein
    you may not even be able to predict the order in which operations are performed.


    Both Python’s `math.isclose()` and NumPy’s `numpy.isclose()` provide such plausible
    answers.


    Approximate associativity and distributivity


    ```

    >>> import numpy as np

    >>> import math

    >>> math.isclose((a + b) + c, a + (b + c))

    True

    >>> np.isclose((a + b) + c, a + (b + c))

    True

    ```'
