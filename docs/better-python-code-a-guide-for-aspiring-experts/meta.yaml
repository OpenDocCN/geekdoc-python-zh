    # 8.4 Use SSL/TLS for Microservices


    Using Transport Layer Security is very important for communication over HTTP(S),
    but is often omitted during local development and/or with a false confidence that
    firewalls around locally connected server nodes suffice for security.

    Transport Layer Security (TLS) is a cryptographic protocol that provides communications
