  md: "As a word-count algorithm it's fairly crude. More relevantly for this discussion,\
    \ I have relied solely on implicit garbage collection by Python. This will *probably*\
    \ work fine for this limited purpose. The reference count on the open file object\
    \ will drop to zero when `fh` is repeatedly rebound, and the `__del__()` method\
    \ of the `TextIOWrapper` object (which `fh` is an instance of) will be called\
    \ during this cleanup, closing the file.\n\nThis reasoning can quickly become\
    \ less clear in more complex programs, however, especially ones that utilize concurrency.\
    \ At least two dangers, explained in the following subsections, exist when files\
    \ might not be closed because neither does flow control actually arrive at a call\
    \ to `fh.close()` nor does scoping or program termination succeed in forcing garbage\
    \ collection. Flow control can fail because `if/elif/else` branches are not fully\
    \ analyzed, or similarly for `match/case` (in Python 3.10+), but most often because\
    \ uncaught exceptions are raised that prevent a program reaching the explicit\
    \ `fh.close()` and dangling file handles stay around.\n\n# 3.3.1 First Danger\n\
    \nThe first danger is encountering the file handle limit your operating system\
    \ imposes.\n\nOperating system file handle limit\n\n```\n>>> files = [open(f\"\
    tmp-{n:04d}.txt\", mode=\"w\") for n in range(10_000)]\nTraceback (most recent\
    \ call last):\n  [...]\nOSError: [Errno 24] Too many open files: 'tmp-1011.txt'\n\
    \n>>> from glob import glob\n>>> sorted(glob(\"tmp-*.txt\"))[-4:]\n['tmp-1007.txt',\
    \ 'tmp-1008.txt', 'tmp-1009.txt', 'tmp-1010.txt']\n```\n\nConsiderably fewer than\
    \ 10,000 files were created. We could, in concept, adjust the specific number\
    \ using `resource.setrlimit()`, but at some point we will hit limits of the operating\
    \ system itself; moreover, increasing it will cause lag in other operations the\
    \ computer is performing. Trying to open 10,000 temporary files at once is simply\
