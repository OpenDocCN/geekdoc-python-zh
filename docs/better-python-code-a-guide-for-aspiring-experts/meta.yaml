  - "[PAGE 84]\n\nI summarize the performance of several approaches to appending strings\
    \ in Table 3.1.\n\n**Table 3.1** Approaches to appending strings, time in μs,\
    \ per data size.\n\n| Approaches (μs) | 10 strings | 1,000 strings | 100,000 strings\
    \ |\n| :--- | :--- | :--- | :--- |\n| Appending strings | 5.85 | 957 | 5,640,000\
    \ |\n| In-place concat | 5.37 | 549 | 53,100 |\n| Final list.join() | 4.55 | 426\
    \ | 47,500 |\n| StringIO writes | 5.69 | 548 | 57,200 |\n\n# 3.3 Use a Context\
    \ Manager to Open a File\n\nContext managers are an important mechanism for managing\
    \ resources that require cleanup. The most common example of this is opening files.\n\
    \nIn the very ancient days of Python, context managers did not exist, and it was\
    \ the responsibility of programmers to explicitly close files when they were done\
    \ working with them. Many developers—out of haste, because a script is a “one-off”,\
    \ or under the assumption it “won’t matter”—still sometimes approach file handling\
    \ this way. I am myself guilty of this bad habit, and have probably done it more\
    \ recently than I would like to admit.\n\nIn such a quick-and-dirty approach,\
    \ I have written many scripts similar to the following.\n\nSource code of code/wordcount\n\
    \n```\n#!/usr/bin/env python\nimport os\n\nn_words = 0\nfor root, dir_, files\
    \ in os.walk(\"src\"):\n    for name in files:\n        if name.endswith(\".adoc\"\
    ):\n            filepath = os.path.join(root, name)\n            fh = open(filepath)\n\
    \            n_words += len(fh.read().split())\n\nprint(f\"Total words in book\
    \ draft: {n_words:,}\")\n```\n\nWith this script, which I wrote just a few minutes\
    \ ago, I can check my progress in writing this book. The many smaller files in\
    \ nested directories that make up the book are written in a textual format called\
    \ AsciiDoc (which is similar to reStructuredText or Markdown; the only important\
    \ focus here is that it’s basically just text files):\n\n```\n[BetterPython]$\
    \ code/wordcount\nTotal words in book draft: 65,376\n```"
- md: "As a word-count algorithm it's fairly crude. More relevantly for this discussion,\
    \ I have relied solely on implicit garbage collection by Python. This will *probably*\
    \ work fine for this limited purpose. The reference count on the open file object\
    \ will drop to zero when `fh` is repeatedly rebound, and the `__del__()` method\
    \ of the `TextIOWrapper` object (which `fh` is an instance of) will be called\
    \ during this cleanup, closing the file.\n\nThis reasoning can quickly become\
    \ less clear in more complex programs, however, especially ones that utilize concurrency.\
    \ At least two dangers, explained in the following subsections, exist when files\
    \ might not be closed because neither does flow control actually arrive at a call\
    \ to `fh.close()` nor does scoping or program termination succeed in forcing garbage\
    \ collection. Flow control can fail because `if/elif/else` branches are not fully\
    \ analyzed, or similarly for `match/case` (in Python 3.10+), but most often because\
    \ uncaught exceptions are raised that prevent a program reaching the explicit\
    \ `fh.close()` and dangling file handles stay around.\n\n## 3.3.1 First Danger\n\
    \nThe first danger is encountering the file handle limit your operating system\
    \ imposes.\n\nOperating system file handle limit\n\n```\n>>> files = [open(f\"\
    tmp-{n:04d}.txt\", mode=\"w\") for n in range(10_000)]\nTraceback (most recent\
    \ call last):\n  [...]\nOSError: [Errno 24] Too many open files: 'tmp-1011.txt'\n\
    \n>>> from glob import glob\n>>> sorted(glob(\"tmp-*.txt\"))[-4:]\n['tmp-1007.txt',\
    \ 'tmp-1008.txt', 'tmp-1009.txt', 'tmp-1010.txt']\n```\n\nConsiderably fewer than\
    \ 10,000 files were created. We could, in concept, adjust the specific number\
    \ using `resource.setrlimit()`, but at some point we will hit limits of the operating\
    \ system itself; moreover, increasing it will cause lag in other operations the\
    \ computer is performing. Trying to open 10,000 temporary files at once is simply\
    \ not a good idea. Rather, we should take an approach that uses only a few files\
    \ at a time, and reopens them when needed rather than in advance.\n\nSafe use\
    \ of many temporary files\n\n```\n# If filenames are completely reproducible from\
    \ index, then\n# pregenerating them in a list is not needed.  Suppose the names\n\
    # are created by a more complex procedure than simple numbering\nfilenames = [f\"\
    tmp-{n:04d}.txt\" for n in range(10_000)]\n\nwhile (index := more_work_needed())\
    \ is not None:\n    if not 0 <= index <= 9999:\n        raise IndexError(f\"Cannot\
    \ access temporary file {index}\")\n    with open(filenames[index], mode=\"a\"\
    ) as tmpfile:    # ❶\n        data = get_information_to_store()              \
    \  # ❷\n        tmpfile.write(data)\n```\n\n- ❶ Under the presumption that the\
    \ same index is repeated, append mode is likely better.\n- ❷ As in other sections,\
    \ a sample implementation of this function is at https://gnosis.cx/better; any\
    \ function that returns varying strings is equally illustrative.\n\n## 3.3.2 Second\
    \ Danger\n\nThe second danger is that failure to close an open file may leave\
    \ some queued changes unwritten to disk. In fact, even the permissions or existence\
    \ of an unclosed file could be messed up. Again, using a context manager assures\
    \ safety around this.\n\nUnsafe open file in code/crash.py\n\n```\nimport os\n\
    fh = open(\"crash.txt\", mode=\"w\")\nfh.write(\"Hello, world!\\n\")\nfh.flush()\n\
    fh.write(\"Goodbye!\\n\")\nos._exit(1)\nfh.close()\n```\n\nObviously this program\
    \ is a toy example. Notice, however, that it *has* a `.close()` method call included\
    \ (which is not reached):\n\n```\n[PythonMistakes]$ python code/crash.py    #\
    \ ❶\n[BetterPython]$ cat crash.txt            # ❷\nHello, world!\n```\n\n- ❶ Run\
    \ the program.\n- ❷ Show the full output generated within *crash.txt*.\n\n## 3.3.3\
    \ Correcting the Fragility\n\nSimply by enclosing every `open()` within a context\
    \ manager, the dangers are mitigated.\n\nSafe open file in code/safe-crash.py\n\
    \n```\nimport os\nwith open(\"crash.txt\", mode=\"w\") as fh:\n    fh.write(\"\
    Hello, world!\\n\")\n    fh.write(\"Goodbye!\\n\")\n    os._exit(1)\n```\n\nAdmittedly,\
    \ a genuine system-level crash such as simulated by `os._exit()` will interfere\
    \ with flushing unclosed files. That is, if the crash occurred between the “Hello”\
    \ and “Goodbye” writes, we still wouldn’t get all the data to disk. But keeping\
    \ writes inside the `with` block at least minimizes the exposure to that danger:\n\
    \n```\n[PythonMistakes]$ python code/safe-crash.py\n[BetterPython]$ cat crash.txt\n\
    Hello, world!\nGoodbye!\n```\n\nDone correctly, all the `fh.write()` lines produce\
    \ output to `crash.txt`. You can read more about writing your own context managers\
    \ at https://docs.python.org/3/reference/datamodel.html#context-managers. The\
    \ excellent description in the Python documentation describes the “guts” of how\
    \ context managers work internally.\n\n## 3.4 Optional Argument key to .sort()\
    \ and sorted()\n\nUsing the optional `key` argument to `sorted()` and `list.sort()`\
    \ can make your code cleaner, faster, and more robust. Failing to use a `key`\
    \ function where relevant is a common mistake.\n\nThe requirements for sorting\
    \ collections or iterables in Python are surprisingly minimal. Each object must\
    \ be able to perform a *less than* comparison with the objects adjacent to it\
    \ in a sequence.\n\nGiven that all we need is less-than inequality, providing\
    \ sortability of custom objects is extremely easy to make available. Here is an\
    \ example.\n\nCreating custom objects that can be sorted\n\n```\n>>> class Thing:\n\
    ...     def __init__(self, value):\n...         self.value = value\n...     def\
    \ __lt__(self, other):\n...         return self.value < other.value\n...     def\
    \ __repr__(self):\n...         return f\"Thing({self.value})\"\n...\n>>> sorted([Thing(2),\
    \ Thing(-17), Thing(55), Thing(7)])\n[Thing(-17), Thing(2), Thing(7), Thing(55)]\n\
    >>> things = [Thing(2), Thing(-17), Thing(55), Thing(7)]\n>>> things.sort()\n\
    >>> things\n[Thing(-17), Thing(2), Thing(7), Thing(55)]\n```\n\n> **Note The pointy\
    \ edges of sorting**\n\nNot all objects can be compared for less-than inequality,\
    \ which can occasionally have the surprising effect that the sortability of a\
    \ sequence depends on the original order of elements.\n\nWhile this can possibly\
    \ occur, far more often sorting heterogeneous iterables simply fails with some\
    \ variety of TypeError. Still, we *can* see situations like this:\n\n```\n>>>\
    \ sorted([5, Strange(), 1, Strange(), 2+3j])\n[1, 5, StrangeObject, StrangeObject,\
    \ (2+3j)]\n>>> sorted([5, Strange(), 2+3j, Strange(), 1])\n[1, 5, StrangeObject,\
    \ StrangeObject, (2+3j)]\n>>> sorted([5, Strange(), 1, 2+3j, Strange()])\nTraceback\
    \ (most recent call last):\n  [...]\nTypeError: '<' not supported between instances\
    \ of 'complex' and 'int'\n```\n\nTo really understand when this will succeed and\
    \ when it will fail, for a given sequence of objects that are partially incompatible,\
    \ you need to understand the details of the Timsort algorithm (https://en.wikipedia.org/wiki/Timsort).\
    \ Doing so is a worthwhile goal, but is not required to understand anything in\
    \ this book.\n\nA more useful “thing” would presumably have additional attributes\
    \ and methods, but this suffices to show the scaffolding needed (the `__repr__()`\
    \ is optional, but it makes for a more attractive display).\n\nIf a developer\
    \ is not aware of the optional keyword argument `key`, which can be passed to\
    \ `sorted()` or to `list.sort()`, the code they write is likely to perform inefficiently\
    \ or just plain wrongly. In particular, such flawed code can sometimes wind up\
    \ sorting on a basis other than the sort order that is useful for the objects\
    \ involved.\n\nFor example, suppose we wanted to sort “Things” not based on their\
    \ numeric order, but rather based on their numeric order within a ring of a given\
    \ modulus (called $\\mathbb{Z}_n$). A first inclination might be to subclass `Thing`\
    \ to have this behavior.\n\nNote Iterables are sortable (if the corresponding\
    \ concrete collection is)\n\nPython really does emphasize iterables over concrete\
    \ collections wherever they are feasible to use. The result of sorting is still\
    \ a concrete collection, but the iterable need not have started out as such. For\
    \ example:\n\n```\n>>> from random import randint\n>>> def make_things():\n...\
    \     for _ in range(5):\n...         yield Thing(randint(1, 1000)) # ❶\n...\n\
    >>> sorted(make_things())\n[Thing(544), Thing(651), Thing(666), Thing(799), Thing(920)]\n\
    ```\n\n- ❶ The presence of yield makes this a generator function.\n\nUnnecessary\
    \ use of subclass merely for sort order\n\n```\n>>> class ModThing(Thing):\n...\
    \     def __init__(self, value: int, mod: int=7):\n...         self.value = value\n\
    ...         self._mod = mod\n...     def __lt__(self, other):\n...         return\
    \ self.value % self._mod < other.value % other._mod\n...\n...\n>>> sorted([ModThing(2),\
    \ ModThing(-17), ModThing(55), ModThing(7)])\n[Thing(7), Thing(2), Thing(-17),\
    \ Thing(55)]\n```\n\nThere might well be additional reasons to attach the modulus\
    \ to the class itself, but supposing we only cared about sorting, we could achieve\
    \ the same effect more easily using the following.\n\nUsing the key function in\
    \ decorate-sort-undecorate sorting\n\n```\n>>> sorted([Thing(2), Thing(-17), Thing(55),\
    \ Thing(7)],\n...         key=lambda thing: thing.value % 7)\n[Thing(7), Thing(2),\
    \ Thing(-17), Thing(55)]\n```\n\nAnything that can represent a consistent transformation\
    \ of the underlying objects being sorted is suitable as a key function. The decorate-sort-undecorate\
    \ pattern is vastly more efficient as a big-O complexity than using a comparison\
    \ function between every pair of items. See a discussion at https://en.wikipedia.org/wiki/Schwartzian_transform.\
    \ The less"
  mdcn: "作为一个字数统计算法，它相当粗糙。与本讨论更相关的是，我完全依赖Python的隐式垃圾回收。对于这个有限的目的，这*可能*会工作得很好。当`fh`被反复重新绑定时，打开的文件对象的引用计数将降为零，并且在此清理过程中，`TextIOWrapper`对象（`fh`是其一个实例）的`__del__()`方法将被调用，从而关闭文件。\n\
    \n然而，在更复杂的程序中，这种推理可能很快变得不那么清晰，尤其是那些利用并发的程序。当文件可能未被关闭时——既因为控制流实际上没有到达调用`fh.close()`，也因为作用域或程序终止未能强制进行垃圾回收——至少存在两种危险，将在以下小节中解释。控制流可能失败，因为`if/elif/else`分支没有被完全分析，或者类似地，对于`match/case`（在Python\
    \ 3.10+中），但最常见的是因为未捕获的异常被引发，阻止程序到达显式的`fh.close()`，而悬挂的文件句柄则保留下来。\n\n## 3.3.1 第一种危险\n\
    \n第一种危险是遇到操作系统施加的文件句柄限制。\n\n操作系统文件句柄限制\n\n```\n>>> files = [open(f\"tmp-{n:04d}.txt\"\
    , mode=\"w\") for n in range(10_000)]\nTraceback (most recent call last):\n  [...]\n\
    OSError: [Errno 24] Too many open files: 'tmp-1011.txt'\n\n>>> from glob import\
    \ glob\n>>> sorted(glob(\"tmp-*.txt\"))[-4:]\n['tmp-1007.txt', 'tmp-1008.txt',\
    \ 'tmp-1009.txt', 'tmp-1010.txt']\n```\n\n创建的文件数量远少于10,000个。理论上，我们可以使用`resource.setrlimit()`调整具体数字，但在某个点上，我们将遇到操作系统本身的限制；此外，增加它会导致计算机正在执行的其他操作出现延迟。试图一次打开10,000个临时文件根本不是一个好主意。相反，我们应该采取一种一次只使用几个文件的方法，并在需要时重新打开它们，而不是提前打开。\n\
    \n安全使用多个临时文件\n\n```\n# 如果文件名可以从索引完全重现，那么\n# 就不需要在列表中预先生成它们。假设名称\n# 是通过比简单编号更复杂的程序创建的\n\
    filenames = [f\"tmp-{n:04d}.txt\" for n in range(10_000)]\n\nwhile (index := more_work_needed())\
    \ is not None:\n    if not 0 <= index <= 9999:\n        raise IndexError(f\"Cannot\
    \ access temporary file {index}\")\n    with open(filenames[index], mode=\"a\"\
    ) as tmpfile:    # ❶\n        data = get_information_to_store()              \
    \  # ❷\n        tmpfile.write(data)\n```\n\n- ❶ 假设相同的索引被重复使用，追加模式可能更好。\n- ❷ 与其他部分一样，此函数的示例实现位于\
    \ https://gnosis.cx/better；任何返回不同字符串的函数都同样具有说明性。\n\n## 3.3.2 第二种危险\n\n第二种危险是，未能关闭打开的文件可能会导致一些排队的更改未写入磁盘。事实上，未关闭文件的权限或存在性也可能被搞乱。同样，使用上下文管理器可以确保这方面的安全。\n\
    \n不安全的打开文件 code/crash.py\n\n```\nimport os\nfh = open(\"crash.txt\", mode=\"w\"\
    )\nfh.write(\"Hello, world!\\n\")\nfh.flush()\nfh.write(\"Goodbye!\\n\")\nos._exit(1)\n\
    fh.close()\n```\n\n显然，这个程序是一个玩具示例。然而，请注意，它*包含*了一个`.close()`方法调用（但未被执行到）：\n\n```\n\
    [PythonMistakes]$ python code/crash.py    # ❶\n[BetterPython]$ cat crash.txt \
    \           # ❷\nHello, world!\n```\n\n- ❶ 运行程序。\n- ❷ 显示在*crash.txt*中生成的完整输出。\n\
    \n## 3.3.3 修正脆弱性\n\n只需将每个`open()`都包含在上下文管理器中，危险就能得到缓解。\n\n安全的打开文件 code/safe-crash.py\n\
    \n```\nimport os\nwith open(\"crash.txt\", mode=\"w\") as fh:\n    fh.write(\"\
    Hello, world!\\n\")\n    fh.write(\"Goodbye!\\n\")\n    os._exit(1)\n```\n\n诚然，像`os._exit()`模拟的真正系统级崩溃会干扰未关闭文件的刷新。也就是说，如果崩溃发生在“Hello”和“Goodbye”写入之间，我们仍然无法将所有数据写入磁盘。但将写入操作保持在`with`块内至少可以将暴露于该危险的风险降至最低：\n\
    \n```\n[PythonMistakes]$ python code/safe-crash.py\n[BetterPython]$ cat crash.txt\n\
    Hello, world!\nGoodbye!\n```\n\n正确执行时，所有`fh.write()`行都会输出到`crash.txt`。您可以在 https://docs.python.org/3/reference/datamodel.html#context-managers\
    \ 阅读更多关于编写自己的上下文管理器的信息。Python文档中的精彩描述描述了上下文管理器内部工作的“核心”。\n\n## 3.4 .sort() 和 sorted()\
    \ 的可选参数 key\n\n使用`sorted()`和`list.sort()`的可选`key`参数可以使您的代码更简洁、更快、更健壮。在相关情况下未能使用`key`函数是一个常见错误。\n\
    \nPython中对集合或可迭代对象进行排序的要求出奇地少。每个对象必须能够与其在序列中相邻的对象执行*小于*比较。\n\n鉴于我们只需要小于不等式，为自定义对象提供可排序性极其容易。这里有一个例子。\n\
    \n创建可排序的自定义对象\n\n```\n>>> class Thing:\n...     def __init__(self, value):\n...\
    \         self.value = value\n...     def __lt__(self, other):\n...         return\
    \ self.value < other.value\n...     def __repr__(self):\n...         return f\"\
    Thing({self.value})\"\n...\n>>> sorted([Thing(2), Thing(-17), Thing(55), Thing(7)])\n\
    [Thing(-17), Thing(2), Thing(7), Thing(55)]\n>>> things = [Thing(2), Thing(-17),\
    \ Thing(55), Thing(7)]\n>>> things.sort()\n>>> things\n[Thing(-17), Thing(2),\
    \ Thing(7), Thing(55)]\n```\n\n> **注意 排序的棘手之处**\n\n并非所有对象都可以进行小于不等式比较，这偶尔会产生令人惊讶的效果，即序列的可排序性取决于元素的原始顺序。\n\
    \n虽然这可能发生，但更常见的情况是，对异构可迭代对象进行排序只会因某种TypeError而失败。尽管如此，我们*确实*可以看到这样的情况：\n\n```\n\
    >>> sorted([5, Strange(), 1, Strange(), 2+3j])\n[1, 5, StrangeObject, StrangeObject,\
    \ (2+3j)]\n>>> sorted([5, Strange(), 2+3j, Strange(), 1])\n[1, 5, StrangeObject,\
    \ StrangeObject, (2+3j)]\n>>> sorted([5, Strange(), 1, 2+3j, Strange()])\nTraceback\
    \ (most recent call last):\n  [...]\nTypeError: '<' not supported between instances\
    \ of 'complex' and 'int'\n```\n\n要真正理解对于给定的部分不兼容对象序列，何时会成功，何时会失败，您需要了解Timsort算法的细节（https://en.wikipedia.org/wiki/Timsort）。这样做是一个有价值的目标，但并非理解本书任何内容所必需。\n\
    \n一个更有用的“东西”可能具有额外的属性和方法，但这足以展示所需的框架（`__repr__()`是可选的，但它能提供更吸引人的显示）。\n\n如果开发者不知道可以传递给`sorted()`或`list.sort()`的可选关键字参数`key`，他们编写的代码可能效率低下或完全错误。特别是，这种有缺陷的代码有时最终会基于对所涉及对象有用的排序顺序以外的其他基础进行排序。\n\
    \n例如，假设我们想对“Things”进行排序，不是基于它们的数值顺序，而是基于它们在给定模数的环（称为$\\mathbb{Z}_n$）中的数值顺序。第一反应可能是对`Thing`进行子类化以具有此行为。\n\
    \n注意 可迭代对象是可排序的（如果相应的具体集合是的话）\n\nPython确实强调在可行的情况下使用可迭代对象而非具体集合。排序的结果仍然是一个具体集合，但可迭代对象不必一开始就是具体的。例如：\n\
    \n```\n>>> from random import randint\n>>> def make_things():\n...     for _ in\
    \ range(5):\n...         yield Thing(randint(1, 1000)) # ❶\n...\n>>> sorted(make_things())\n\
    [Thing(544), Thing(651), Thing(666), Thing(799), Thing(920)]\n```\n\n- ❶ yield的存在使其成为一个生成器函数。\n\
