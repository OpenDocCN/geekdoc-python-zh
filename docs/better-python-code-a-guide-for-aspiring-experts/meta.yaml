    > **Note A digression on virtual parents**


    Let''s take a look at an abstract base class. For this purpose, we wish to create
    a class called BigNumber whose instances "contain" all big numbers (of all comparable
    numeric types, in fact). The class doesn''t do much else, nor much useful, but
    *virtually* contains all the big numbers (here defined as more than one thousand):


    python

    >>> class BigNumber:

    ...     def __contains__(self, value):

    ...         return value > 1000

    ...

    >>> big_numbers = BigNumber()

    >>> 5.7 in big_numbers

    False

    >>> 1_000_000 in big_numbers

    True


    >>> from collections.abc import Container

    >>> isinstance(big_numbers, Container)

    True

    >>> BigNumber.__mro__

    (<class ''__main__.BigNumber''>, <class ''object''>)



    Even though Container is nowhere in the inheritance tree of BigNumber, the mere
    fact it implements the required protocol of having a `.__contains__()` method
    makes it act as if it did have that ancestor class.


    The abstract classes within the module `numbers` are "virtual parents" of various
    concrete numeric classes. However, the particular parent-child relationships that
    exist virtually are not necessarily the ones that make obvious sense.


    Estranged children


    ```

    python

    >>> from fractions import Fraction

    >>> from decimal import Decimal

    >>> frac = Fraction(1, 1)

    >>> dec = Decimal("1.0")

    >>> 1 == 1.0 == Fraction(1, 1) == Decimal("1.0")    # ❶

    True


    >>> (1.0).as_integer_ratio()                          # ❷

    (1, 1)

    >>> (0.3).as_integer_ratio()                          # ❷

    (5404319552844595, 18014398509481984)

    ```'
