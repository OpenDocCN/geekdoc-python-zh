  md: 'We''d like to create a little report from our student list. A somewhat awkward
    approach to the missing data might be the following.


    Look-before-you-leap approach (LBYL)


    ```

    >>> print("| Name      | Grade | Age")

    ... print("+----------+-------+-----")

    ... for student in students:

    ...     name = student[''name''] if ''name'' in student else "MISSING"

    ...     grade = student[''grade''] if ''grade'' in student else "PASS"

    ...     age = student[''age''] if ''age'' in student else "?"

    ...     print(f"| {name:9s} | {grade:<4s}  | {age}")

    ...

    | Name      | Grade | Age

    +----------+-------+-----

    | Xian      | A-    | 10

    | Jane      | B     | 12

    | John      | C     | 15

    | Pema      | PASS  | 14

    | Thandiwe  | B+    | ?

    ```


    Despite what I warn in Chapter 4, *Advanced Python Usage*, there are times when
    forgiveness-not-permission makes code worse.


    Easier-to-ask-forgiveness-than-permission approach (EAFP)


    ```

    >>> print("| Name      | Grade | Age")

    ... print("+----------+-------+-----")

    ... for student in students:

    ...     try:

    ...         name = student[''name'']

    ...     except KeyError:

    ...         name = "MISSING"

    ...     try:

    ...         grade = student[''grade'']

    ...     except KeyError:

    ...         grade = "PASS"

    ...     try:

    ...         age = student[''age'']

    ...     except KeyError:

    ...         age = "?"

    ...     print(f"| {name:9s} | {grade:<4s}  | {age}")

    ...

    ```'
