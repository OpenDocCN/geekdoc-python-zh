- md: "# PYTHON PROGRAMMING FOR KIDS\n\nBEN DAVIES\n\n# COPYRIGHT\n\nAll rights reserved.\
    \ This book or any portion thereof may not be reproduced, or used in any manner\
    \ whatsoever without the express written permission of the publisher except for\
    \ the use of brief quotation in a book review.\n\n# TABLE OF CONTENT\n\n- INTRODUCTION\
    \ .......................... 6\n- INSTALLING PYTHON.................. 13\n  -\
    \ Installing Python On Windows ....... 13\n  - Installing Python on Ubuntu ..........\
    \ 24\n  - Saving Your Python Programs ........ 30\n- CALCULATION AND VARIABLES\
    \ .. 35\n  - Calculating with Python ................ 35\n  - Basic Python Operators\
    \ ................ 41\n  - The Order Of Operations.............. 42\n  - Variables\
    \ Are Like Labels ............. 47\n  - Using Variables................................\
    \ 53\n- STRINGS, LIST, TUPLES AND MAPS\n  - Strings .....................................................\
    \ 62\n  - Creating Strings ................................... 62\n  - Handling\
    \ Problems With Strings..... 67\n  - Embedding Values In Strings......... 75\n\
    \  - Multiplying strings........................... 81\n  - Lists Are More Powerful\
    \ Than Strings ..................................................... 84\n  - Adding\
    \ Items To A List .................... 92\n  - Removing Items From A List .........\
    \ 95\n  - List Arithmetic................................... 97\n  - Tuples ........................................\
    \ 102\n  - Python Maps Won’t Help You find Your Way ........................................\
    \ 105\n\n# INTRODUCTION\n\nProgramming fosters creativity, reasoning, and problem\
    \ solving. The programmer gets the opportunity to create something from nothing,\
    \ use logic to turn programming constructs into a form that a computer can run,\
    \ and, when things don’t work quite as well as expected, use problem solving to\
    \ figure out what has gone wrong. Programming is a fun, sometimes challenging\
    \ (and occasionally frustrating) activity, and the skills learned from it can\
    \ be useful both in school and at work . . . even if your career has nothing to\
    \ do with computers.\n\nAnd, if nothing else, programming is a great way to spend\
    \ an afternoon when the weather outside is dreary.\n\nPython is an easy-to-learn\
    \ programming language that has some really useful features for a beginning programmer.\
    \ The code is quite easy to read when compared to other programming languages,\
    \ and it has an interactive shell into which you can enter your programs and see\
    \ them run. In addition to its simple language structure and an interactive shell\
    \ with which to experiment, Python has some features that greatly augment the\
    \ learning process and allow you to put together simple animations for creating\
    \ your own games.\n\nOne is the turtle module, inspired by Turtle graphics (used\
    \ by the Logo programming language back in the 1960s) and designed for educational\
    \ use. Another is the tkinter module, an interface for the Tk GUI toolkit, which\
    \ provides a simple way to create programs with slightly more advanced graphics\
    \ and animation.\n\nLike anything you try for the first time, it’s always best\
    \ to start with the basics, so begin with the first chapters and resist the urge\
    \ to skip ahead to the later chapters. No one can play an orchestral symphony\
    \ the first time they pick up an instrument. Student pilots don't start flying\
    \ a plane before they understand the basic controls. Gymnasts aren't (usually)\
    \ able to do back flips on their first try. If you jump ahead too quickly, not\
    \ only will the basic ideas not stick in your head, but you'll also find the content\
    \ of the later chapters more complicated than it actually is.\n\nAs you go through\
    \ this book, try each of the examples, so you can see how they work.\n\nLike humans,\
    \ computers use multiple languages to communicate— in this case, programming languages.\
    \ A programming language is simply a particular way to talk to a computer—a way\
    \ to use instructions that both humans and the computer can understand.\n\nThere\
    \ are programming languages named after people (like Ada and Pascal), those named\
    \ using simple acronyms (like BASIC and FORTRAN), and even a few named after TV\
    \ shows, like Python.\n\nYes, the Python programming language was named after\
    \ the Monty Python’s Flying Circus TV show, not after python the snake.\n\nMonty\
    \ Python’s Flying Circus was an alternative British comedy show first broadcast\
    \ in the 1970s, and it remains hugely popular today among a certain audience.\
    \ The show had sketches like “The Ministry of Silly Walks,” “The Fish-Slapping\
    \ Dance,” and “The Cheese Shop” (which didn’t sell any cheese).\n\nA number of\
    \ things about the Python programming language make it extremely useful for beginners.\
    \ Most importantly, you can use Python to write simple, efficient programs really\
    \ quickly.\n\nPython doesn’t have a lot of complicated symbols, like braces ({\
    \ }), hashes (#), and dollar signs ($), which make other programming languages\
    \ a lot more difficult to read and, therefore, a lot less friendly to beginners.\n\
    \n# INSTALLING PYTHON\n\nInstalling Python is fairly straightforward. Here, we'll\
    \ go over the steps for installing it on Windows, Mac OS, and Ubuntu. When installing\
    \ Python, you'll also set up a shortcut for the IDLE program, which is the Integrated\
    \ DeveLopment Environment that lets you write programs for Python.\n\n## Installing\
    \ Python On Windows\n\nTo install Python for Microsoft Windows, point a web browser\
    \ to http://www.python.org/ and download the latest Windows installer for Python\
    \ 3. Look for a section in the menu titled Quick Links, as shown here:\n\n![](img/3726099ac21786fed2f9ac6bed8b4337_13_0.png)\n\
    \nAfter you download the Windows installer, double-click its icon, and then follow\
    \ the instructions to install Python in the default location, as follows:\n\n\
    1. Select Install for All Users, and then click Next.\n2. Leave the default directory\
    \ unchanged, but note the name of the installation directory (probably C:\\Python31\
    \ or C:\\Python32). Click Next.\n3. Ignore the Customize Python section of the\
    \ installation, and click Next.\n\n![](img/3726099ac21786fed2f9ac6bed8b4337_14_0.png)\n\
    \nAt the end of this process, you should have a Python 3 entry in your Start menu:\n\
    \nNext, follow these steps to add a Python 3 shortcut to your desktop:\n\n1. Right-click\
    \ your desktop, and select New > Shortcut from the pop-up menu.\n2. Enter the\
    \ following in the box where it says Type the location of the item (make sure\
    \ that the directory you enter is the same as the one you noted earlier):\n\n\
    ```\nc:\\Python32\\Lib\\idlelib\\idle.pyw -n\n```\n\nYour dialog should look like\
    \ this:\n\n![](img/3726099ac21786fed2f9ac6bed8b4337_16_0.png)\n\n3. Click Next\
    \ to move to the next dialog.\n4. Enter the name as IDLE, and click Finish to\
    \ create the shortcut.\n\nNow you can skip to “Once You’ve Installed Python” on\
    \ page 10 to get started with Python.\n\n## Installing Python on Mac OS\n\nIf\
    \ you’re using a Mac, you should find a version of Python pre-installed, but it’s\
    \ probably an older version of the language. To be sure that you’re running the\
    \ newest version, point your browser to http://www.python.org/getit/ to download\
    \ the latest installer for the Mac.\n\nThere are two different installers. The\
    \ one you should download depends on which version of Mac OS X you have installed.\
    \ (To find out, click the Apple icon in the top menu bar, and choose About this\
    \ Mac.) Pick an installer as follows:\n\n- If you’re running a Mac OS X version\
    \ between 10.3 and 10.6, download the 32-bit version of Python 3 for i386/PPC.\n\
    - If you’re running Mac OS X version 10.6 or higher, download the 64-bit/32-bit\
    \ version of Python 3 for x86-64.\n\nOnce the file has downloaded (it will have\
    \ the filename extension .dmg), double-click it. You’ll see a window showing the\
    \ file’s contents.\n\n![](img/3726099ac21786fed2f9ac6bed8b4337_19_0.png)\n\nIn\
    \ this window, double-click Python.mpkg, and then follow the instructions to install\
    \ the software. You’ll be prompted for the administrator password for your Mac\
    \ before Python installs. (Don’t have the administrator password? Your parent\
    \ may need to enter it.)\n\nNext, you need to add a script to the desktop for\
    \ launching Python’s IDLE application, as follows:"
  mdcn: "# 面向儿童的Python编程\n\n本·戴维斯\n\n# 版权所有\n\n保留所有权利。未经出版商明确书面许可，不得以任何方式复制或使用本书或其任何部分，书评中的简短引用除外。\n\
    \n# 目录\n\n- 引言 .......................... 6\n- 安装Python.................. 13\n\
    \  - 在Windows上安装Python ....... 13\n  - 在Ubuntu上安装Python .......... 24\n  - 保存你的Python程序\
    \ ........ 30\n- 计算与变量 .. 35\n  - 使用Python进行计算 ................ 35\n  - 基本Python运算符\
    \ ................ 41\n  - 运算顺序.............. 42\n  - 变量如同标签 ............. 47\n\
    \  - 使用变量................................ 53\n- 字符串、列表、元组和映射\n  - 字符串 .....................................................\
    \ 62\n  - 创建字符串 ................................... 62\n  - 处理字符串问题..... 67\n\
    \  - 在字符串中嵌入值......... 75\n  - 字符串乘法........................... 81\n  - 列表比字符串更强大\
    \ ..................................................... 84\n  - 向列表添加项目 ....................\
    \ 92\n  - 从列表中移除项目 ......... 95\n  - 列表运算................................... 97\n\
    \  - 元组 ........................................ 102\n  - Python映射不会帮你指路 ........................................\
    \ 105\n\n# 引言\n\n编程能培养创造力、推理能力和解决问题的能力。程序员有机会从无到有地创造事物，运用逻辑将编程结构转化为计算机可以运行的形式，并且当事情进展不如预期时，运用问题解决能力找出问题所在。编程是一项有趣、有时具有挑战性（偶尔令人沮丧）的活动，从中获得的技能在学校和工作中都很有用……即使你的职业与计算机毫无关系。\n\
    \n而且，如果没别的事可做，编程是度过一个阴沉下午的好方法。\n\nPython是一种易于学习的编程语言，对于初学者来说具有一些非常实用的特性。与其他编程语言相比，其代码相当容易阅读，并且它有一个交互式外壳，你可以在其中输入程序并查看它们运行。除了简单的语言结构和可供实验的交互式外壳外，Python还有一些特性，极大地增强了学习过程，并允许你组合简单的动画来创建自己的游戏。\n\
    \n一个是turtle模块，灵感来源于海龟图形（1960年代由Logo编程语言使用），专为教育用途设计。另一个是tkinter模块，它是Tk GUI工具包的接口，提供了一种简单的方法来创建具有稍高级图形和动画的程序。\n\
    \n就像你第一次尝试任何事情一样，最好从基础开始，所以从第一章开始，抵制住跳到后面章节的冲动。没有人第一次拿起乐器就能演奏交响乐。学生飞行员在理解基本控制之前不会开始驾驶飞机。体操运动员（通常）第一次尝试时无法完成后空翻。如果你跳得太快，不仅基本概念不会留在你脑海中，而且你会发现后面章节的内容比实际更复杂。\n\
    \n在阅读本书时，尝试每个示例，这样你就能看到它们是如何工作的。\n\n和人类一样，计算机使用多种语言进行交流——在这种情况下，是编程语言。编程语言只是一种与计算机对话的特定方式——一种使用人类和计算机都能理解的指令的方式。\n\
    \n有些编程语言以人名命名（如Ada和Pascal），有些使用简单的首字母缩写命名（如BASIC和FORTRAN），甚至还有一些以电视节目命名，比如Python。\n\
    \n是的，Python编程语言是以《蒙提·派森的飞行马戏团》电视节目命名的，而不是以蟒蛇命名。\n\n《蒙提·派森的飞行马戏团》是一部另类的英国喜剧节目，于1970年代首次播出，至今在特定观众中仍然非常受欢迎。该节目有诸如“愚蠢的行走部”、“拍鱼舞”和“奶酪店”（里面不卖任何奶酪）等小品。\n\
    \nPython编程语言的许多特性使其对初学者极其有用。最重要的是，你可以使用Python快速编写简单、高效的程序。\n\nPython没有很多复杂的符号，如花括号（{\
    \ }）、井号（#）和美元符号（$），这些符号使其他编程语言更难阅读，因此对初学者不太友好。\n\n# 安装Python\n\n安装Python相当简单。在这里，我们将介绍在Windows、Mac\
    \ OS和Ubuntu上安装的步骤。安装Python时，你还将为IDLE程序设置一个快捷方式，IDLE是集成开发环境，允许你为Python编写程序。\n\n\
    ## 在Windows上安装Python\n\n要为Microsoft Windows安装Python，请将Web浏览器指向http://www.python.org/并下载最新的Windows\
    \ Python 3安装程序。在菜单中查找名为“快速链接”的部分，如下所示：\n\n![](img/3726099ac21786fed2f9ac6bed8b4337_13_0.png)\n\
    \n下载Windows安装程序后，双击其图标，然后按照说明将Python安装到默认位置，如下所示：\n\n1. 选择“为所有用户安装”，然后单击“下一步”。\n\
    2. 保持默认目录不变，但记下安装目录的名称（可能是C:\\Python31或C:\\Python32）。单击“下一步”。\n3. 忽略安装的“自定义Python”部分，然后单击“下一步”。\n\
    \n![](img/3726099ac21786fed2f9ac6bed8b4337_14_0.png)\n\n在此过程结束时，你应该在“开始”菜单中有一个Python\
    \ 3条目：\n\n接下来，按照以下步骤将Python 3快捷方式添加到桌面：\n\n1. 右键单击桌面，从弹出菜单中选择“新建”>“快捷方式”。\n2.\
    \ 在“键入项目的位置”框中输入以下内容（确保输入的目录与你之前记下的相同）：\n\n```\nc:\\Python32\\Lib\\idlelib\\idle.pyw\
    \ -n\n```\n\n你的对话框应如下所示：\n\n![](img/3726099ac21786fed2f9ac6bed8b4337_16_0.png)\n\
    \n3. 单击“下一步”转到下一个对话框。\n4. 输入名称为IDLE，然后单击“完成”创建快捷方式。\n\n现在你可以跳到第10页的“安装Python后”开始使用Python。\n\
    \n## 在Mac OS上安装Python\n\n如果你使用的是Mac，你应该会发现预装了Python版本，但它可能是该语言的较旧版本。为确保你运行的是最新版本，请将浏览器指向http://www.python.org/getit/以下载最新的Mac安装程序。\n\
    \n有两个不同的安装程序。你应该下载哪一个取决于你安装的Mac OS X版本。（要查明，请单击顶部菜单栏中的Apple图标，然后选择“关于本机”。）按如下方式选择安装程序：\n\
    \n- 如果你运行的是10.3到10.6之间的Mac OS X版本，请下载适用于i386/PPC的32位Python 3版本。\n- 如果你运行的是10.6或更高版本的Mac\
    \ OS X，请下载适用于x86-64的64位/32位Python 3版本。\n\n文件下载后（文件扩展名为.dmg），双击它。你将看到一个显示文件内容的窗口。\n\
    \n![](img/3726099ac21786fed2f9ac6bed8b4337_19_0.png)\n\n在此窗口中，双击Python.mpkg，然后按照说明安装软件。在Python安装之前，系统会提示你输入Mac的管理员密码。（没有管理员密码？你的父母可能需要输入。）\n\
    \n接下来，你需要在桌面上添加一个脚本来启动Python的IDLE应用程序，如下所示："
