    Variable names can be made up of letters, numbers, and the underscore character
    (_), but they can’t start with a number. You can use anything from single letters
    (such as a) to long sentences for variable names. (A variable can’t contain a
    space, so use an underscore to separate words.) Sometimes, if you’re doing something
    quick, a short variable name is best. The name you choose should depend on how
    meaningful you need the variable name to be.


