- md: '## Installing Python on Ubuntu


    Python comes preinstalled on the Ubuntu Linux distribution, but it may be an older
    version. Follow these steps to install Python 3 on Ubuntu.


    1. Click the button for the Ubuntu Software Center in the Sidebar (it’s the icon
    that looks like an orange bag—if you don’t see it, you can always click the Dash
    Home icon and enter Software in the dialog).

    2. Enter Python in the search box in the top-right corner of the Software Center.

    3. In the list of software presented, select the latest version of IDLE, which
    is IDLE (using Python 3.2) in this example:


    ![](img/3726099ac21786fed2f9ac6bed8b4337_25_0.png)


    4. Click Install.

    5. Enter your administrator password to install the software, and then click Authenticate.
    (Don’t have the administrator password? Your parent may need to enter it.)


    You should now have an icon on your Windows or Mac OS desktop labeled IDLE. If
    you’re using Ubuntu, in the Applications menu, you should see a new group named
    Programming with the application IDLE (using Python 3.2) (or a later version).


    Double-click the icon or choose the menu option, and you should see this window:


    ![](img/3726099ac21786fed2f9ac6bed8b4337_26_0.png)


    This is the Python shell, which is part of Python’s integrated development environment.
    The three greater-than signs (>>>) are called the prompt.


    Let’s enter some commands at the prompt, beginning with the following:


    ```

    >>> print("Hello World")

    ```


    Make sure to include the double quotes (" "). Press enter on your keyboard when
    you’re finished typing the line. If you’ve entered the command correctly, you
    should see something like this:


    Hello World


    The prompt should reappear to let you know that the Python shell is ready to accept
    more commands.


    Congratulations! You’ve just created your first Python program. The word print
    is a type of Python command called a function, and it prints out whatever is inside
    the parentheses to the screen. In essence, you have given the computer an instruction
    to display the words “Hello World”—an instruction that both you and the computer
    can understand.


    ## Saving Your Python Programs


    Python programs wouldn’t be very useful if you needed to rewrite them every time
    you wanted to use them, never mind print them out so you could reference them.
    Sure, it might be fine to just rewrite short programs, but a large program, like
    a word processor, could contain millions of lines of code. Print that all out,
    and you could have well over 100,000 pages. Just imagine trying to carry that
    huge stack of paper home.


    Better hope that you won’t meet up with a big gust of wind.


    Luckily, we can save our programs for future use. To save a new program, open
    IDLE and choose File > New Window. An empty window will appear, with *Untitled*
    in the menu bar.


    Enter the following code into the new shell window:


    ```

    print("Hello World")

    ```


    Now, choose File > Save. When prompted for a filename, enter hello.py, and save
    the file to your desktop. Then choose Run > Run Module. With any luck, your saved
    program should run, like this:


    ![](img/3726099ac21786fed2f9ac6bed8b4337_31_0.png)


    Now, if you close the shell window but leave the hello.py window open and then
    choose Run > Run Module, the Python shell should reappear, and your program should
    run again. (To reopen the Python shell without running the program, choose Run
    > Python Shell.) After running the code, you’ll find a new icon on your desktop
    labeled hello.py. If you double-click the icon, a black window will appear briefly
    and then vanish. What happened?


    You’re seeing the Python command-line console (similar to the shell) starting
    up, printing “Hello World,” and then exiting. Here’s what would appear if you
    had superhero-like speed vision and could see the window before it closed:


    ![](img/3726099ac21786fed2f9ac6bed8b4337_33_0.png)


    ## CALCULATION AND VARIABLES


    Now that you have Python installed and know how to start the Python shell, you’re
    ready to do something with it. We’ll begin with some simple calculations and then
    move on to variables. Variables are a way of storing things in a computer program,
    and they can help you write useful programs.


    ### Calculating with Python


    Normally, when asked to find the product of two numbers like 8 × 3.57, you would
    use a calculator or a pencil and paper. Well, how about using the Python shell
    to perform your calculation? Let’s try it.


    Start the Python shell by double-clicking the IDLE icon on your desktop or, if
    you’re using Ubuntu, by clicking the IDLE icon in the Applications menu. At the
    prompt, enter this equation:


    ```

    >>> 8 * 3.57

    28.56

    ```


    Notice that when entering a multiplication calculation in Python, you use the
    asterisk symbol (*) instead of a multiplication sign (×).


    How about if we try an equation that’s a bit more useful?


    Suppose you are digging in your backyard and uncover a bag of 20 gold coins. The
    next day, you sneak down to the basement and stick the coins inside your grandfather’s
    steam-powered replicating invention (luckily, you can just fit the 20 coins inside).
    You hear a whiz and a pop and, a few hours later, out shoot another 10 gleaming
    coins.


    How many coins would you have in your treasure chest if you did this every day
    for a year? On paper, the equations might look like this:


    10 × 365 = 3650

    20 + 3650 = 3670


    Sure, it’s easy enough to do these calculations on a calculator or on paper, but
    we can do all of these calculations with the Python shell as well. First, we multiply
    10 coins by 365 days in a year to get 3650. Next, we add the original 20 coins
    to get 3670.


    ```

    >>> 10 * 365

    3650

    >>> 20 + 3650

    3670

    ```


    Now, what if a raven spots the shiny gold sitting in your bedroom, and every week
    flies in and manages to steal three coins?


    How many coins would you have left at the end of the year? Here’s how this calculation
    looks in the shell:


    ```

    >>> 3 * 52

    156

    >>> 3670 - 156

    3514

    ```


    First, we multiply 3 coins by 52 weeks in the year. The result is 156. We subtract
    that number from our total coins (3670), which tells us that we would have 3514
    coins remaining at the end of the year.


    This is a very simple program. In this book, you’ll learn how to expand on these
    ideas to write programs that are even more useful.


    ### Python operators


    You can do multiplication, addition, subtraction, and division in the Python shell,
    among other mathematical operations that we won’t go into right now. The basic
    symbols used by Python to perform mathematical operations are called operators.


    ### Basic Python Operators


    The forward slash (/) is used for division because it’s similar to the division
    line that you would use when writing a fraction. For example, if you had 100 pirates
    and 20 large barrels and you wanted to calculate how many pirates'
