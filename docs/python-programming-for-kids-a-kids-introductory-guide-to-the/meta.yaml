    ## The Order Of Operations


    We use parentheses in a programming language to control the order of operations.
    An operation is anything that uses an operator. Multiplication and division have
    a higher order than addition and subtraction, which means that they’re performed
    first. In other words, if you enter an equation in Python, multiplication or division
    is performed before addition or subtraction.


    For example, in the following equation, the numbers 30 and 20 are multiplied first,
    and the number 5 is added to their product.


    ```

    >>> 5 + 30 * 20


    605

    ```


    This equation is another way of saying, “multiply 30 by 20, and then add 5 to
    the result.” The result is 605. We can change the order of operations by adding
    parentheses around the first two numbers, like so:


    ```

    >>> (5 + 30) * 20


    700

    ```


    The result of this equation is 700 (not 605) because the parentheses tell Python
    to do the operation in the parentheses first, and then do the operation outside
    the parentheses. This example is saying “add 5 to 30, and then multiply the result
    by 20.”


    Parentheses can be nested, which means that there can be parentheses inside parentheses,
    like this:


    ```

    >>> ((5 + 30) * 20) / 10

    70.0

    ```


    In this case, Python evaluates the innermost parentheses first, then the outer
    ones, and then the final division operator. In other words, this equation is saying,
    “add 5 to 30, then multiply the result by 20, and divide that result by 10.” Here’s
    what happens:


    - Adding 5 to 30 gives 35.

    - Multiplying 35 by 20 gives 700.

    - Dividing 700 by 10 gives the final answer of 70.


    If we had not used parentheses, the result would be slightly different:


    ```

    >>> 5 + 30 * 20 / 10

    65.0

    ```


    In this case, 30 is first multiplied by 20 (giving 600), and then 600 is divided
    by 10 (giving 60). Finally, 5 is added to get the result of 65.


    Warning: Remember that multiplication and division always go before addition and
    subtraction, unless parentheses are used to control the order of operations.


    ## Variables Are Like Labels


    The word variable in programming describes a place to store information such as
    numbers, text, lists of numbers and text, and so on. Another way of looking at
    a variable is that it’s like a label for something.


    For example, to create a variable named fred, we use an equal sign (=) and then
    tell Python what information the variable should be the label for. Here, we create
    the variable fred and tell Python that it labels the number 100 (note that this
    doesn’t mean that another variable can’t have the same value):


    ```

    >>> fred = 100

    ```


    To find out what value a variable labels, enter print in the shell, followed by
    the variable name in parentheses, like this:


    ```

    >>> print(fred)


    100

    ```


    We can also tell Python to change the variable fred so that it labels something
    else. For example, here’s how to change fred to the number 200:


    ```

    >>> fred = 200


    >>> print(fred)


    200

    ```


    On the first line, we say that fred labels the number 200. In the second line,
    we ask what fred is labeling, just to confirm the change. Python prints the result
    on the last line.


    We can also use more than one label (more than one variable) for the same item:


    ```

    >>> fred = 200

    >>> john = fred

    >>> print(john)

    200

    ```


    In this example, we''re telling Python that we want the name (or variable) john
    to label the same thing as fred by using the equal sign between john and fred.


    Of course, fred probably isn''t a very useful name for a variable because it most
    likely doesn''t tell us anything about what the variable is used for. Let''s call
    our variable number_of_coins instead of fred, like this:


    ```

    >>> number_of_coins = 200

    >>> print(number_of_coins)

