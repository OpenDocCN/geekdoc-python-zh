  md: '# INTRODUCTION


    Programming fosters creativity, reasoning, and problem solving. The programmer
    gets the opportunity to create something from nothing, use logic to turn programming
    constructs into a form that a computer can run, and, when things don’t work quite
    as well as expected, use problem solving to figure out what has gone wrong. Programming
    is a fun, sometimes challenging (and occasionally frustrating) activity, and the
    skills learned from it can be useful both in school and at work . . . even if
    your career has nothing to do with computers.'
  merge: -1
  pgno: 5
- img_proc: true
  md: 'And, if nothing else, programming is a great way to spend an afternoon when
    the weather outside is dreary.


    Python is an easy-to-learn programming language that has some really useful features
    for a beginning programmer. The code is quite easy to read when compared to other
    programming languages, and it has an interactive shell into which you can enter
    your programs and see them run. In addition to its simple language structure and
    an interactive shell with which to experiment, Python has some features that greatly
    augment the learning'
  merge: -1
  pgno: 6
- img_proc: true
  md: 'process and allow you to put together simple animations for creating your own
    games.


    One is the turtle module, inspired by Turtle graphics (used by the Logo programming
    language back in the 1960s) and designed for educational use. Another is the tkinter
    module, an interface for the Tk GUI toolkit, which provides a simple way to create
    programs with slightly more advanced graphics and animation.


    Like anything you try for the first time, it’s always best to start with the basics,'
  merge: -1
  pgno: 7
- img_proc: true
  md: so begin with the first chapters and resist the urge to skip ahead to the later
    chapters. No one can play an orchestral symphony the first time they pick up an
    instrument. Student pilots don't start flying a plane before they understand the
    basic controls. Gymnasts aren't (usually) able to do back flips on their first
    try. If you jump ahead too quickly, not only will the basic ideas not stick in
    your head, but you'll also find the content of the later chapters more complicated
    than it actually is.
  merge: -1
  pgno: 8
- img_proc: true
  md: 'As you go through this book, try each of the examples, so you can see how they
    work.


    Like humans, computers use multiple languages to communicate— in this case, programming
    languages. A programming language is simply a particular way to talk to a computer—a
    way to use instructions that both humans and the computer can understand.


    There are programming languages named after people (like Ada and Pascal), those
    named using simple acronyms (like BASIC and FORTRAN),'
  merge: -1
  pgno: 9
- img_proc: true
  md: 'and even a few named after TV shows, like Python.


    Yes, the Python programming language was named after the Monty Python’s Flying
    Circus TV show, not after python the snake.


    Monty Python’s Flying Circus was an alternative British comedy show first broadcast
    in the 1970s, and it remains hugely popular today among a certain audience. The
    show had sketches like “The Ministry of Silly Walks,” “The Fish-Slapping Dance,”
    and “The Cheese Shop” (which didn’t sell any cheese).


    11'
  merge: -1
