    ## Embedding Values In Strings


    If you want to display a message using the contents of a variable, you can embed
    values in a string using %s, which is like a marker for a value that you want
    to add later. (Embedding values is programmer-speak for “inserting values.”) For
    example, to have Python calculate or store the number of points you scored in
    a game, and then add it to a sentence like “I scored points,” use %s in the sentence
    in place of the value, and then tell Python that value, like this:


    ```

    >>> myscore = 1000

