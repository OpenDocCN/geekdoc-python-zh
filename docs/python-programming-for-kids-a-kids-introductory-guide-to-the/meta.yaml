  md: '# Saving Your Python Programs


    Python programs wouldn’t be very useful if you needed to rewrite them every time
    you wanted to use them, never mind print them out so you could reference them.
    Sure, it might be fine to just rewrite short programs, but a large program, like
    a word proces- sor, could contain millions of lines of code. Print that all out,
    and you could have well over 100,000 pages. Just imagine trying to carry that
    huge stack of paper home.'
