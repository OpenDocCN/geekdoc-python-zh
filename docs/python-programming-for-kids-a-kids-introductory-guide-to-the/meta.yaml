  md: 'A number of things about the Python programming language make it extremely
    useful for beginners. Most importantly, you can use Python to write simple, efficient
    programs really quickly.


    Python doesn’t have a lot of complicated symbols, like braces ({ }), hashes (#),
    and dollar signs ($), which make other programming languages a lot more difficult
    to read and, therefore, a lot less friendly to beginners.'
