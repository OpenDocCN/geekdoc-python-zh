    # Removing Items From A List


    To remove items from a list, use the del command (short for delete). For example,
    to remove the sixth item in the wizard’s list, snake dandruff, do this:


    ```

    >>> del wizard_list[5]

    >>> print(wizard_list)

    [''spider legs'', ''toe of frog'', ''snail tongue'', ''bat wing'', ''slug butter'',
    ''bear burp'', ''mandrake'', ''hemlock'', ''swamp gas'']

    ```'
  - '[PAGE 95]


    Note: Remember that positions start at zero, so wizard_list[5] actually refers
    to the sixth item in the list.


    And here''s how to remove the items we just added (mandrake, hemlock, and swamp
    gas):


    ```

    >>> del wizard_list[8]

    >>> del wizard_list[7]

    >>> del wizard_list[6]

    >>> print(wizard_list)

    ```'
