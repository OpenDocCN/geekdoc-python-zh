    # List Arithmetic


    We can join lists by adding them, just like adding numbers, using a plus (+) sign.
    For example, suppose we have two lists: list1, con- taining the numbers 1 through
    4, and list2, containing some words. We can add them using print and the + sign,
    like so:


    ```

    >>> list1 = [1, 2, 3, 4]

    ```'
  - '[PAGE 97]


    ```

    >>> list2 = [''I'', ''tripped'', ''over'', ''and'',

    ''hit'', ''the'', ''floor'']


    >>> print(list1 + list2)


    [1, 2, 3, 4, ''I'', ''tripped'', ''over'', ''and'',

    ''hit'', ''the'', ''floor'']

    ```


    We can also add the two lists and set the result equal to another variable.


    ```

    >>> list1 = [1, 2, 3, 4]


    >>> list2 = [''I'', ''ate'', ''chocolate'', ''and'',

    ''I'', ''want'', ''more'']


    >>> list3 = list1 + list2


    >>> print(list3)

    ```'
