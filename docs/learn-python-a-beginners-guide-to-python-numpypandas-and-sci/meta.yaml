    , \"banana\", \"cherry\"}\nfor x in thisset:\n    print(x)\n```\n\n## Python -\
    \ Join Sets\n\n### Join Two Sets\n\nThere are several ways to join two or more\
    \ sets in Python.\nYou can use the union() method that returns a new set containing\
    \ all items from both sets, or the update() method that inserts all the items\
    \ from one set into another:\n\n**Example**\nThe union() method returns a new\
    \ set with all items from both sets:\n\n```python\nset1 = {\"a\", \"b\" , \"c\"\
