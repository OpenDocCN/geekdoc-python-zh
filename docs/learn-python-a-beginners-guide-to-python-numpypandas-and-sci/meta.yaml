- md: "## 38. Python String Formatting\n\nTo make sure a string will display as expected,\
    \ we can format the result with the format() method.\n\n### String format()\n\n\
    The format() method allows you to format selected parts of a string.\nSometimes\
    \ there are parts of a text that you do not control, maybe they come from a database,\
    \ or user input?\nTo control such values, add placeholders (curly brackets {})\
    \ in the text, and run the values through the format() method:\n\n### Example\n\
    \nAdd a placeholder where you want to display the price:\n\n```\nprice = 49\n\
    txt = \"The price is {} dollars\"\nprint(txt.format(price))\n```\n\nYou can add\
    \ parameters inside the curly brackets to specify how to convert the value:\n\n\
    ### Example\n\nFormat the price to be displayed as a number with two decimals:\n\
    \n```\ntxt = \"The price is {:.2f} dollars\"\n```\n\nCheck out all formatting\
    \ types in our String format() Reference.\n\n### Multiple Values\n\nIf you want\
    \ to use more values, just add more values to the format() method:\n\n```\nprint(txt.format(price,\
    \ itemno, count))\n```\n\nAnd add more placeholders:\n\n### Example\n\n```\nquantity\
    \ = 3\nitemno = 567\nprice = 49\nmyorder = \"I want {} pieces of item number {}\
    \ for {:.2f} dollars.\"\nprint(myorder.format(quantity, itemno, price))\n```\n\
    \n### Index Numbers\n\nYou can use index numbers (a number inside the curly brackets\
    \ {0}) to be sure the values are placed in the correct placeholders:\n\n```\n\
    Example\nquantity = 3\nitemno = 567\nprice = 49\nmyorder = \"I want {0} pieces\
    \ of item number {1} for {2:.2f} dollars.\"\nprint(myorder.format(quantity, itemno,\
    \ price))\n```\n\nAlso, if you want to refer to the same value more than once,\
    \ use the index number:\n\n```\nExample\nage = 36\nname = \"John\"\ntxt = \"His\
    \ name is {1}. {1} is {0} years old.\"\nprint(txt.format(age, name))\n```\n\n\
    ### Named Indexes\n\nYou can also use named indexes by entering a name inside\
    \ the curly brackets {carname}, but then you must use names when you pass the\
    \ parameter values txt.format(carname = \"Ford\"):\n\n```\nExample\nmyorder =\
    \ \"I have a {carname}, it is a {model}.\"\nprint(myorder.format(carname = \"\
    Ford\", model = \"Mustang\"))\n```\n\n## 39. Python File Handling\n\nFile handling\
    \ is an important part of any web application.\n\nPython has several functions\
    \ for creating, reading, updating, and deleting files.\n\n### File Handling\n\n\
    The key function for working with files in Python is the open() function.\n\n\
    The open() function takes two parameters; *filename*, and *mode*.\n\nThere are\
    \ four different methods (modes) for opening a file:\n\n- \"r\" - Read - Default\
    \ value. Opens a file for reading, error if the file does not exist\n- \"a\" -\
    \ Append - Opens a file for appending, creates the file if it does not exist\n\
    - \"w\" - Write - Opens a file for writing, creates the file if it does not exist\n\
    - \"x\" - Create - Creates the specified file, returns an error if the file exists\n\
    \nIn addition you can specify if the file should be handled as binary or text\
    \ mode\n\n- \"t\" - Text - Default value. Text mode\n- \"b\" - Binary - Binary\
    \ mode (e.g. images)\n\n### Syntax\n\nTo open a file for reading it is enough\
    \ to specify the name of the file:\n\n```\nf = open(\"demofile.txt\")\n```\n\n\
    The code above is the same as:\n\n```\nf = open(\"demofile.txt\", \"rt\")\n```\n\
    \nBecause \"r\" for read, and \"t\" for text are the default values, you do not\
    \ need to specify them.\n\n**Note:** Make sure the file exists, or else you will\
    \ get an error.\n\n### Python File Open\n\n#### Open a File on the Server\n\n\
    Assume we have the following file, located in the same folder as Python:\n\ndemofile.txt\n\
    \nHello! Welcome to demofile.txt\n\nThis file is for testing purposes.\n\nGood\
    \ Luck!\n\nTo open the file, use the built-in open() function.\n\nThe open() function\
    \ returns a file object, which has a read() method for reading the content of\
    \ the file:\n\n**Example**\n\n```\npython\nf = open(\"demofile.txt\", \"r\")\n\
    print(f.read())\n```\n\nIf the file is located in a different location, you will\
    \ have to specify the file path, like this:\n\n**Example**\n\nOpen a file on a\
    \ different location:\n\n```\npython\nf = open(\"D:\\myfiles\\welcome.txt\", \"\
    r\")\nprint(f.read())\n```\n\n#### Read Only Parts of the File\n\nBy default the\
    \ read() method returns the whole text, but you can also specify how many characters\
    \ you want to return:\n\n### Example\n\nReturn the 5 first characters of the file:\n\
    \n```\nf = open(\"demofile.txt\", \"r\")\nprint(f.read(5))\n```\n\n### Read Lines\n\
    \nYou can return one line by using the readline() method:\n\n### Example\n\nRead\
    \ one line of the file:\n\n```\nf = open(\"demofile.txt\", \"r\")\nprint(f.readline())\n\
    ```\n\nBy calling readline() two times, you can read the two first lines:\n\n\
    ### Example\n\nRead two lines of the file:\n\n```\nf = open(\"demofile.txt\",\
    \ \"r\")\nprint(f.readline())\nprint(f.readline())\n```\n\nBy looping through\
    \ the lines of the file, you can read the whole file, line by line:\n\n### Example\n\
    \nLoop through the file line by line:\n\n```\nf = open(\"demofile.txt\", \"r\"\
    )\nfor x in f:\n    print(x)\n```\n\n### Close Files\n\nIt is a good practice\
