    \ not generate any error:\n\n```python\ntry:\n    print(\"Hello\")\nexcept:\n\
    \    print(\"Something went wrong\")\nelse:\n    print(\"Nothing went wrong\"\
    )\n```\n\n## Finally\n\nThe finally block, if specified, will be executed regardless\
    \ if the try block raises an error or not.\n\n**Example**\n\n```python\ntry:\n\
    \    print(x)\nexcept:\n    print(\"Something went wrong\")\nfinally:\n    print(\"\
    The 'try except' is finished\")\n```\n\nThis can be useful to close objects and\
    \ clean up resources:\n\n**Example**\nTry to open and write to a file that is\
    \ not writable:\n\n```python\ntry:\n    f = open(\"demofile.txt\")\n    f.write(\"\
    Lorum Ipsum\")\nexcept:\n    print(\"Something went wrong when writing to the\
    \ file\")\nfinally:\n    f.close()\n```\n\nThe program can continue, without leaving\
    \ the file object open.\n\n## Raise an exception\n\nAs a Python developer you\
    \ can choose to throw an exception if a condition occurs.\n\nTo throw (or raise)\
    \ an exception, use the raise keyword.\n\n**Example**\nRaise an error and stop\
    \ the program if x is lower than 0:\n\n```python\nx = -1\nif x < 0:\n    raise\
