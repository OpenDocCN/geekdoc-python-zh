    \ can contain different data types:\n\n**Example**\nA set with strings, integers\
    \ and boolean values:\n\n```python\nset1 = {\"abc\", 34, True, 40, \"male\"}\n\
    ```\n\n## type()\n\nFrom Python's perspective, sets are defined as objects with\
    \ the data type 'set':\n\n```\n<class 'set'>\n```\n\n**Example**\nWhat is the\
