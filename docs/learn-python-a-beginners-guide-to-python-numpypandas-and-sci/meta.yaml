- md: "## SciPy Optimization\n\n- 'L-BFGS-B'\n- 'TNC'\n- 'COBYLA'\n- 'SLSQP'\n\n**callback**\
    \ - function called after each iteration of optimization.\n\n**options** - a dictionary\
    \ defining extra params:\n\n```\n{\n    \"disp\": boolean - print detailed description\n\
    \    \"gtol\": number - the tolerance of the error\n}\n```\n\n## Example\n\nMinimize\
    \ the function x^2 + x + 2 with BFGS:\n\n```\nfrom scipy.optimize import minimize\n\
    \ndef eqn(x):\n    return x**2 + x + 2\n\nmymin = minimize(eqn, 0, method='BFGS')\n\
    print(mymin)\n```\n\n## SciPy Sparse Data\n\n### What is Sparse Data\n\nSparse\
    \ data is data that has mostly unused elements (elements that don't carry any\
    \ information).\n\nIt can be an array like this one:\n\n[1, 0, 2, 0, 0, 3, 0,\
    \ 0, 0, 0, 0, 0]\n\n**Sparse Data:** is a data set where most of the item values\
    \ are zero.\n\n**Dense Array:** is the opposite of a sparse array: most of the\
    \ values are *not* zero.\n\nIn scientific computing, when we are dealing with\
    \ partial derivatives in linear algebra we will come across sparse data.\n\n###\
    \ How to Work With Sparse Data\n\nSciPy has a module, scipy.sparse that provides\
    \ functions to deal with sparse data.\n\nThere are primarily two types of sparse\
    \ matrices that we use:\n\n**CSC** - Compressed Sparse Column. For efficient arithmetic,\
    \ fast column slicing.\n\n**CSR** - Compressed Sparse Row. For fast row slicing,\
    \ faster matrix vector products.\n\nWe will use the **CSR** matrix in this tutorial.\n\
    \n### CSR Matrix\n\nWe can create a CSR matrix by passing an array into the function\
    \ scipy.sparse.csr_matrix().\n\n### Example\n\nCreate a CSR matrix from an array:\n\
    \n```\nimport numpy as np\nfrom scipy.sparse import csr_matrix\n\narr = np.array([0,\
    \ 0, 0, 0, 0, 1, 1, 0, 2])\n\nprint(csr_matrix(arr))\n```\n\nThe example above\
    \ returns:\n\n(0, 5) 1\n(0, 6) 1\n(0, 8) 2\n\nFrom the result we can see that\
    \ there are 3 items with value.\n\nThe 1. item is in row 0 position 5 and has\
    \ the value 1.\n\nThe 2. item is in row 0 position 6 and has the value 1.\n\n\
    The 3. item is in row 0 position 8 and has the value 2.\n\n### Sparse Matrix Methods\n\
    \nViewing stored data (not the zero items) with the data property:\n\n**Example**\n\
    \n```\nimport numpy as np\nfrom scipy.sparse import csr_matrix\narr = np.array([[0,\
    \ 0, 0], [0, 0, 1], [1, 0, 2]])\nprint(csr_matrix(arr).data)\n```\n\nCounting\
    \ nonzeros with the count_nonzero() method:\n\n**Example**\n\n```\nimport numpy\
    \ as np\nfrom scipy.sparse import csr_matrix\narr = np.array([[0, 0, 0], [0, 0,\
    \ 1], [1, 0, 2]])\nprint(csr_matrix(arr).count_nonzero())\n```\n\nRemoving zero-entries\
    \ from the matrix with the eliminate_zeros() method:\n\n**Example**\n\n```\nimport\
    \ numpy as np\nfrom scipy.sparse import csr_matrix\narr = np.array([[0, 0, 0],\
    \ [0, 0, 1], [1, 0, 2]])\nmat = csr_matrix(arr)\nmat.eliminate_zeros()\nprint(mat)\n\
    ```\n\nEliminating duplicate entries with the sum_duplicates() method:\n\n###\
    \ Example\n\nEliminating duplicates by adding them:\n\n```\nimport numpy as np\n\
    from scipy.sparse import csr_matrix\narr = np.array([[0, 0, 0], [0, 0, 1], [1,\
    \ 0, 2]])\nmat = csr_matrix(arr)\nmat.sum_duplicates()\nprint(mat)\n```\n\nConverting\
    \ from csr to csc with the tocsc() method:\n\n### Example\n\n```\nimport numpy\
    \ as np\nfrom scipy.sparse import csr_matrix\narr = np.array([[0, 0, 0], [0, 0,\
    \ 1], [1, 0, 2]])\nnewarr = csr_matrix(arr).tocsc()\nprint(newarr)\n```\n\nNote:\
    \ Apart from the mentioned sparse specific operations, sparse matrices support\
    \ all of the operations that normal matrices support e.g. reshaping, summing,\
    \ arithmetic, broadcasting etc.\n\n## SciPy Graphs\n\n### Working with Graphs\n\
    \nGraphs are an essential data structure.\n\nSciPy provides us with the module\
    \ scipy.sparse.csgraph for working with such data structures.\n\n### Adjacency\
    \ Matrix\n\nAdjacency matrix is a nxn matrix where n is the number of elements\
    \ in a graph.\n\nAnd the values represent the connection between the elements.\n\
    \nFor a graph like this, with elements A, B and C, the connections are:\n\nA &\
    \ B are connected with weight 1.\n\nA & C are connected with weight 2.\n\nC &\
    \ B is not connected.\n\nThe Adjacency Matrix would look like this:\n\n|   | A\
    \ | B | C |\n|---|---|---|---|\n| A | 0 | 1 | 2 |\n| B | 1 | 0 | 0 |\n| C | 2\
    \ | 0 | 0 |\n\nBelow follows some of the most used methods for working with adjacency\
    \ matrices.\n\n### Connected Components\n\nFind all of the connected components\
    \ with the connected_components() method.\n\n**Example**\n\n```\nimport numpy\
    \ as np\nfrom scipy.sparse.csgraph import connected_components\nfrom scipy.sparse\
    \ import csr_matrix\narr = np.array([\n    [0, 1, 2],\n    [1, 0, 0],\n    [2,\
    \ 0, 0]\n])\nnewarr = csr_matrix(arr)\nprint(connected_components(newarr))\n```\n\
    \n### Dijkstra\n\nUse the dijkstra method to find the shortest path in a graph\
    \ from one element to another.\n\nIt takes following arguments:\n\n1. **return_predecessors**:\
    \ boolean (True to return whole path of traversal otherwise False).\n2. **indices**:\
    \ index of the element to return all paths from that element only.\n3. **limit**:\
    \ max weight of path.\n\n**Example**\n\nFind the shortest path from element 1\
    \ to 2:\n\n```\nimport numpy as np\nfrom scipy.sparse.csgraph import dijkstra\n\
    from scipy.sparse import csr_matrix\narr = np.array([\n    [0, 1, 2],\n    [1,\
    \ 0, 0],\n    [2, 0, 0]\n])\nnewarr = csr_matrix(arr)\nprint(dijkstra(newarr,\
    \ return_predecessors=True, indices=0))\n```\n\n### Floyd Warshall\n\nUse the\
    \ floyd_warshall() method to find the shortest path between all pairs of elements.\n\
    \n### Example\n\nFind the shortest path between all pairs of elements:\n\n```\n\
    import numpy as np\nfrom scipy.sparse.csgraph import floyd_warshall\nfrom scipy.sparse\
    \ import csr_matrix\narr = np.array([\n    [0, 1, 2],\n    [1, 0, 0],\n    [2,\
    \ 0, 0]\n])\nnewarr = csr_matrix(arr)\nprint(floyd_warshall(newarr, return_predecessors=True))\n\
    ```\n\n### Bellman Ford\n\nThe bellman_ford() method can also find the shortest\
    \ path between all pairs of elements, but this method can handle negative weights\
    \ as well.\n\n### Example\n\nFind shortest path from element 1 to 2 with given\
    \ graph with a negative weight:\n\n```\nimport numpy as np\nfrom scipy.sparse.csgraph\
    \ import bellman_ford\nfrom scipy.sparse import csr_matrix\narr = np.array([\n\
    \    [0, -1, 2],\n    [1, 0, 0],\n    [2, 0, 0]\n])\nnewarr = csr_matrix(arr)\n\
    print(bellman_ford(newarr, return_predecessors=True, indices=0))\n```\n\n### Depth\
    \ First Order\n\nThe depth_first_order() method returns a depth first traversal\
    \ from a node.\nThis function takes following arguments:\n\n1. the graph.\n2.\
    \ the starting element to traverse the graph from.\n\n**Example**\nTraverse the\
    \ graph depth first for given adjacency matrix:\n\n```\nimport numpy as np\nfrom\
    \ scipy.sparse.csgraph import depth_first_order\nfrom scipy.sparse import csr_matrix\n\
    arr = np.array([\n    [0, 1, 0, 1],\n    [1, 1, 1, 1],\n    [2, 1, 1, 0],\n  \
    \  [0, 1, 0, 1]\n])\nnewarr = csr_matrix(arr)\nprint(depth_first_order(newarr,\
    \ 1))\n```\n\n### Breadth First Order\n\nThe breadth_first_order() method returns\
    \ a breadth first traversal from a node.\n\nThis function takes following arguments:\n\
    \n1. the graph.\n2. the starting element to traverse the graph from.\n\n### Example\n\
    \nTraverse the graph breadth first for given adjacency matrix:\n\n```\nimport\
    \ numpy as np\nfrom scipy.sparse.csgraph import breadth_first_order\nfrom scipy.sparse\
    \ import csr_matrix\narr = np.array([\n    [0, 1, 0, 1],\n    [1, 1, 1, 1],\n\
    \    [2, 1, 1, 0],\n    [0, 1, 0, 1]\n])\nnewarr = csr_matrix(arr)\nprint(breadth_first_order(newarr,\
    \ 1))\n```\n\n## SciPy Spatial Data\n\n### Working with Spatial Data\n\nSpatial\
    \ data refers to data that is represented in a geometric space.\nE.g. points on\
    \ a coordinate system.\nWe deal with spatial data problems on many tasks.\nE.g.\
    \ finding if a point is inside a boundary or not.\nSciPy provides us with the\
    \ module scipy.spatial, which has functions for working with spatial data.\n\n\
    ### Triangulation\n\nA Triangulation of a polygon is to divide the polygon into\
    \ multiple triangles with which we can compute an area of the polygon.\nA Triangulation\
    \ *with points* means creating surface composed triangles in which all of the\
    \ given points are on at least one vertex of any triangle in the surface.\nOne\
    \ method to generate these triangulations through points is the Delaunay() Triangulation.\n\
    \n### Example\n\nCreate a triangulation from following points:\n\n```\nimport\
    \ numpy as np\nfrom scipy.spatial import Delaunay\nimport matplotlib.pyplot as\
    \ plt\n\npoints = np.array([\n    [2, 4],\n    [3, 4],\n    [3, 0],\n    [2, 2],\n\
    \    [4, 1]\n])\n```"
  mdcn: "## SciPy 优化\n\n- 'L-BFGS-B'\n- 'TNC'\n- 'COBYLA'\n- 'SLSQP'\n\n**callback**\
    \ - 每次优化迭代后调用的函数。\n\n**options** - 定义额外参数的字典：\n\n```\n{\n    \"disp\": boolean\
    \ - 打印详细描述\n    \"gtol\": number - 误差容限\n}\n```\n\n## 示例\n\n使用 BFGS 最小化函数 x^2\
    \ + x + 2：\n\n```\nfrom scipy.optimize import minimize\n\ndef eqn(x):\n    return\
    \ x**2 + x + 2\n\nmymin = minimize(eqn, 0, method='BFGS')\nprint(mymin)\n```\n\
    \n## SciPy 稀疏数据\n\n### 什么是稀疏数据\n\n稀疏数据是指大部分元素未使用（不携带任何信息）的数据。\n\n它可以是像这样的数组：\n\
    \n[1, 0, 2, 0, 0, 3, 0, 0, 0, 0, 0, 0]\n\n**稀疏数据：** 是指大部分项值为零的数据集。\n\n**稠密数组：**\
    \ 是稀疏数组的反面：大部分值*不*为零。\n\n在科学计算中，当我们处理线性代数中的偏导数时，会遇到稀疏数据。\n\n### 如何处理稀疏数据\n\nSciPy\
    \ 有一个模块 `scipy.sparse`，提供了处理稀疏数据的函数。\n\n我们主要使用两种类型的稀疏矩阵：\n\n**CSC** - 压缩稀疏列。用于高效算术运算，快速列切片。\n\
    \n**CSR** - 压缩稀疏行。用于快速行切片，更快的矩阵向量乘积。\n\n本教程中我们将使用 **CSR** 矩阵。\n\n### CSR 矩阵\n\n\
    我们可以通过将数组传递给函数 `scipy.sparse.csr_matrix()` 来创建 CSR 矩阵。\n\n### 示例\n\n从数组创建 CSR\
    \ 矩阵：\n\n```\nimport numpy as np\nfrom scipy.sparse import csr_matrix\n\narr =\
    \ np.array([0, 0, 0, 0, 0, 1, 1, 0, 2])\n\nprint(csr_matrix(arr))\n```\n\n上面的示例返回：\n\
    \n(0, 5) 1\n(0, 6) 1\n(0, 8) 2\n\n从结果中我们可以看到有 3 个具有值的项。\n\n第 1 项位于第 0 行第 5 位，值为\
    \ 1。\n\n第 2 项位于第 0 行第 6 位，值为 1。\n\n第 3 项位于第 0 行第 8 位，值为 2。\n\n### 稀疏矩阵方法\n\n使用\
    \ `data` 属性查看存储的数据（非零项）：\n\n**示例**\n\n```\nimport numpy as np\nfrom scipy.sparse\
    \ import csr_matrix\narr = np.array([[0, 0, 0], [0, 0, 1], [1, 0, 2]])\nprint(csr_matrix(arr).data)\n\
    ```\n\n使用 `count_nonzero()` 方法计算非零元素数量：\n\n**示例**\n\n```\nimport numpy as np\n\
    from scipy.sparse import csr_matrix\narr = np.array([[0, 0, 0], [0, 0, 1], [1,\
    \ 0, 2]])\nprint(csr_matrix(arr).count_nonzero())\n```\n\n使用 `eliminate_zeros()`\
    \ 方法从矩阵中移除零项：\n\n**示例**\n\n```\nimport numpy as np\nfrom scipy.sparse import csr_matrix\n\
    arr = np.array([[0, 0, 0], [0, 0, 1], [1, 0, 2]])\nmat = csr_matrix(arr)\nmat.eliminate_zeros()\n\
    print(mat)\n```\n\n使用 `sum_duplicates()` 方法消除重复项：\n\n### 示例\n\n通过相加消除重复项：\n\n\
    ```\nimport numpy as np\nfrom scipy.sparse import csr_matrix\narr = np.array([[0,\
    \ 0, 0], [0, 0, 1], [1, 0, 2]])\nmat = csr_matrix(arr)\nmat.sum_duplicates()\n\
    print(mat)\n```\n\n使用 `tocsc()` 方法从 CSR 转换为 CSC：\n\n### 示例\n\n```\nimport numpy\
    \ as np\nfrom scipy.sparse import csr_matrix\narr = np.array([[0, 0, 0], [0, 0,\
    \ 1], [1, 0, 2]])\nnewarr = csr_matrix(arr).tocsc()\nprint(newarr)\n```\n\n注意：除了提到的稀疏特定操作外，稀疏矩阵支持普通矩阵支持的所有操作，例如重塑、求和、算术运算、广播等。\n\
    \n## SciPy 图\n\n### 处理图\n\n图是一种基本的数据结构。\n\nSciPy 为我们提供了 `scipy.sparse.csgraph`\
    \ 模块来处理此类数据结构。\n\n### 邻接矩阵\n\n邻接矩阵是一个 n×n 矩阵，其中 n 是图中元素的数量。\n\n值表示元素之间的连接。\n\n\
    对于一个包含元素 A、B 和 C 的图，连接关系如下：\n\nA 和 B 以权重 1 连接。\n\nA 和 C 以权重 2 连接。\n\nC 和 B 未连接。\n\
    \n邻接矩阵如下所示：\n\n|   | A | B | C |\n|---|---|---|---|\n| A | 0 | 1 | 2 |\n| B |\
    \ 1 | 0 | 0 |\n| C | 2 | 0 | 0 |\n\n以下是一些最常用的处理邻接矩阵的方法。\n\n### 连通分量\n\n使用 `connected_components()`\
    \ 方法查找所有连通分量。\n\n**示例**\n\n```\nimport numpy as np\nfrom scipy.sparse.csgraph\
    \ import connected_components\nfrom scipy.sparse import csr_matrix\narr = np.array([\n\
    \    [0, 1, 2],\n    [1, 0, 0],\n    [2, 0, 0]\n])\nnewarr = csr_matrix(arr)\n\
    print(connected_components(newarr))\n```\n\n### Dijkstra\n\n使用 `dijkstra` 方法查找图中从一个元素到另一个元素的最短路径。\n\
    \n它接受以下参数：\n\n1. **return_predecessors**：布尔值（True 返回遍历的完整路径，否则返回 False）。\n2. **indices**：元素的索引，仅返回从该元素出发的所有路径。\n\
    3. **limit**：路径的最大权重。\n\n**示例**\n\n查找从元素 1 到 2 的最短路径：\n\n```\nimport numpy as\
    \ np\nfrom scipy.sparse.csgraph import dijkstra\nfrom scipy.sparse import csr_matrix\n\
    arr = np.array([\n    [0, 1, 2],\n    [1, 0, 0],\n    [2, 0, 0]\n])\nnewarr =\
    \ csr_matrix(arr)\nprint(dijkstra(newarr, return_predecessors=True, indices=0))\n\
    ```\n\n### Floyd Warshall\n\n使用 `floyd_warshall()` 方法查找所有元素对之间的最短路径。\n\n### 示例\n\
    \n查找所有元素对之间的最短路径：\n\n```\nimport numpy as np\nfrom scipy.sparse.csgraph import\
    \ floyd_warshall\nfrom scipy.sparse import csr_matrix\narr = np.array([\n    [0,\
    \ 1, 2],\n    [1, 0, 0],\n    [2, 0, 0]\n])\nnewarr = csr_matrix(arr)\nprint(floyd_warshall(newarr,\
    \ return_predecessors=True))\n```\n\n### Bellman Ford\n\n`bellman_ford()` 方法也可以查找所有元素对之间的最短路径，但此方法可以处理负权重。\n\
    \n### 示例\n\n在给定具有负权重的图中查找从元素 1 到 2 的最短路径：\n\n```\nimport numpy as np\nfrom scipy.sparse.csgraph\
    \ import bellman_ford\nfrom scipy.sparse import csr_matrix\narr = np.array([\n\
    \    [0, -1, 2],\n    [1, 0, 0],\n    [2, 0, 0]\n])\nnewarr = csr_matrix(arr)\n\
    print(bellman_ford(newarr, return_predecessors=True, indices=0))\n```\n\n### 深度优先遍历\n\
    \n`depth_first_order()` 方法返回从节点开始的深度优先遍历。\n此函数接受以下参数：\n\n1. 图。\n2. 开始遍历图的起始元素。\n\
    \n**示例**\n对给定邻接矩阵进行深度优先遍历：\n\n```\nimport numpy as np\nfrom scipy.sparse.csgraph\
    \ import depth_first_order\nfrom scipy.sparse import csr_matrix\narr = np.array([\n\
    \    [0, 1, 0, 1],\n    [1, 1, 1, 1],\n    [2, 1, 1, 0],\n    [0, 1, 0, 1]\n])\n\
    newarr = csr_matrix(arr)\nprint(depth_first_order(newarr, 1))\n```\n\n### 广度优先遍历\n\
    \n`breadth_first_order()` 方法返回从节点开始的广度优先遍历。\n\n此函数接受以下参数：\n\n1. 图。\n2. 开始遍历图的起始元素。\n\
    \n### 示例\n\n对给定邻接矩阵进行广度优先遍历：\n\n```\nimport numpy as np\nfrom scipy.sparse.csgraph\
    \ import breadth_first_order\nfrom scipy.sparse import csr_matrix\narr = np.array([\n\
    \    [0, 1, 0, 1],\n    [1, 1, 1, 1],\n    [2, 1, 1, 0],\n    [0, 1, 0, 1]\n])\n\
    newarr = csr_matrix(arr)\nprint(breadth_first_order(newarr, 1))\n```\n\n## SciPy\
    \ 空间数据\n\n### 处理空间数据\n\n空间数据是指在几何空间中表示的数据。\n例如，坐标系上的点。\n我们在许多任务中处理空间数据问题。\n例如，判断一个点是否在边界内。\n\
    SciPy 为我们提供了 `scipy.spatial` 模块，其中包含处理空间数据的函数。\n\n### 三角剖分\n\n多边形的三角剖分是将多边形分割成多个三角形，通过这些三角形我们可以计算多边形的面积。\n\
