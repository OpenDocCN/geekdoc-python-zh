    The message can be a string or any other object, the object will be converted
    into a string before written to the screen.


    # Syntax


    ```

    print(object(s), sep=separator, end=end, file=file, flush=flush)

    ```


    # Parameter Values


    | Parameter | Description |

    | :--- | :--- |

    | *object(s)* | Any object, and as many as you like. Will be converted to a string
    before printed |

    | *sep=''separator''* | Optional. Specify how to separate the objects, if there
    is more than one. Default is '' '' |

    | *end=''end''* | Optional. Specify what to print at the end. Default is ''\n''
    (line feed) |

    | *file* | Optional. An object with a write method. Default is sys.stdout |

    | *flush* | Optional. A Boolean, specifying if the output is flushed (True) or
    buffered (False). Default is False |'
