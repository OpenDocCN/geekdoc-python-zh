  - '[PAGE 246]


    Multinomial distribution is a generalization of binomial distribution.

    It describes outcomes of multinomial scenarios unlike binomial where scenarios
    must be only one of two. e.g. Blood type of a population, dice roll outcome.

    It has three parameters:

    n - number of possible outcomes (e.g. 6 for dice roll).

    pvals - list of probabilities of outcomes (e.g. [1/6, 1/6, 1/6, 1/6, 1/6, 1/6]
    for dice roll).

    size - The shape of the returned array.


    # Example


    Draw out a sample for dice roll:


    ```

    from numpy import random


    x = random.multinomial(n=6, pvals=[1/6, 1/6, 1/6, 1/6, 1/6, 1/6])


    print(x)

    ```


    **Note:** Multinomial samples will NOT produce a single value! They will produce
    one value for each pval.


    **Note:** As they are generalizations of binomial distribution their visual representation
    and similarity of normal distribution is same as that of multiple binomial distributions.


    # Exponential Distribution


    # Exponential Distribution


    Exponential distribution is used for describing time till the next event e.g.
    failure/success etc.


    It has two parameters:


    scale - inverse of rate ( see lam in poisson distribution ) defaults to 1.0.

    size - The shape of the returned array.'
