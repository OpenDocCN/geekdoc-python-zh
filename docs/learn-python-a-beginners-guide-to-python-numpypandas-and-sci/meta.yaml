    ```\n\n**结果：**\n(2.0, 0)\n\n## 距离矩阵\n\n在数据科学中，有许多距离度量用于计算两点之间的各种距离，例如欧几里得距离、余弦距离等。\n\
    两个向量之间的距离可能不仅仅是它们之间直线的长度，也可以是它们从原点出发的角度，或者所需的单位步数等。\n许多机器学习算法的性能在很大程度上取决于距离矩阵。例如“K近邻”或“K均值”等。\n\
    让我们来看一些距离度量：\n\n### 欧几里得距离\n\n计算给定点之间的欧几里得距离。\n\n**示例**\n\n```python\nfrom scipy.spatial.distance\
