    # The Python Command Line


    To test a short amount of code in python sometimes it is the quickest and easiest
    not to write the code in a file. This is made possible because Python can be run
    as a command-line itself.


    Type the following on the Windows, Mac, or Linux command line:


    ```

    C:\Users\Your Name>python

    ```


    Or, if the "python" command did not work, you can try "py":


    ```

    C:\Users\Your Name>py

    ```


    From there you can write any python, including our hello world example from earlier
    in the tutorial:


    ```

    C:\Users\Your Name>python

