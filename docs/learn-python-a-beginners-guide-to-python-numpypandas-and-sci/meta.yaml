    ```\n\n`math.ceil()` 方法将数字向上舍入到最接近的整数，而 `math.floor()` 方法将数字向下舍入到最接近的整数，并返回结果：\n\
    \n**示例**\n\n```\nimport math\n\nx = math.ceil(1.4)\ny = math.floor(1.4)\n\nprint(x)\
