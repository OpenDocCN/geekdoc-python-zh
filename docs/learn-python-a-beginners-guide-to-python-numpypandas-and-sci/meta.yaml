- md: "## 19. Python User Input\n\n### User Input\n\nPython allows for user input.\
    \ That means we are able to ask the user for input. The method is a bit different\
    \ in Python 3.6 than Python 2.7. Python 3.6 uses the `input()` method. Python\
    \ 2.7 uses the `raw_input()` method. The following example asks for the username,\
    \ and when you entered the username, it gets printed on the screen:\n\n```python\n\
    # Python 3.6\nusername = input(\"Enter username:\")\nprint(\"Username is: \" +\
    \ username)\n\n# Python 2.7\nusername = raw_input(\"Enter username:\")\nprint(\"\
    Username is: \" + username)\n```\n\nPython stops executing when it comes to the\
    \ `input()` function, and continues when the user has given some input.\n\n##\
    \ 20. Python eval() Function\n\n### Example\n\nEvaluate the expression `'print(55)'`:\n\
    \n```python\nx = 'print(55)'\neval(x)\n```\n\n### Definition and Usage\n\nThe\
    \ `eval()` function evaluates the specified expression, if the expression is a\
    \ legal Python statement, it will be executed.\n\n### Syntax\n\n`eval(expression,\
    \ globals, locals)`\n\n### Parameter Values\n\n| Parameter | Description |\n|\
    \ --- | --- |\n| expression | A String, that will be evaluated as Python code\
    \ |\n| globals | Optional. A dictionary containing global parameters |\n| locals\
    \ | Optional. A dictionary containing local parameters |\n\n## 21. Python If ...\
    \ Else\n\n### Python Conditions and If statements\n\nPython supports the usual\
    \ logical conditions from mathematics:\n\n- Equals: `a == b`\n- Not Equals: `a\
    \ != b`\n- Less than: `a < b`\n- Less than or equal to: `a <= b`\n- Greater than:\
    \ `a > b`\n- Greater than or equal to: `a >= b`\n\nThese conditions can be used\
    \ in several ways, most commonly in \"if statements\" and loops.\n\nAn \"if statement\"\
    \ is written by using the `if` keyword.\n\n### Example\n\nIf statement:\n\n```python\n\
    a = 33\nb = 200\nif b > a:\n    print(\"b is greater than a\")\n```\n\nIn this\
    \ example we use two variables, `a` and `b`, which are used as part of the if\
    \ statement to test whether `b` is greater than `a`. As `a` is 33, and `b` is\
    \ 200, we know that 200 is greater than 33, and so we print to screen that \"\
    b is greater than a\".\n\n### Indentation\n\nPython relies on indentation (whitespace\
    \ at the beginning of a line) to define scope in the code. Other programming languages\
    \ often use curly-brackets for this purpose.\n\n### Example\n\nIf statement, without\
    \ indentation (will raise an error):\n\n```python\na = 33\nb = 200\nif b > a:\n\
    print(\"b is greater than a\") # you will get an error\n```\n\n### Elif\n\nThe\
    \ `elif` keyword is Python's way of saying \"if the previous conditions were not\
    \ true, then try this condition\".\n\n**Example**\n\n```python\na = 33\nb = 33\n\
    if b > a:\n    print(\"b is greater than a\")\nelif a == b:\n    print(\"a and\
    \ b are equal\")\n```\n\nIn this example `a` is equal to `b`, so the first condition\
    \ is not true, but the `elif` condition is true, so we print to screen that \"\
    a and b are equal\".\n\n### Else\n\nThe `else` keyword catches anything which\
    \ isn't caught by the preceding conditions.\n\n**Example**\n\n```python\na = 200\n\
    b = 33\nif b > a:\n    print(\"b is greater than a\")\nelif a == b:\n    print(\"\
    a and b are equal\")\nelse:\n    print(\"a is greater than b\")\n```\n\nIn this\
    \ example `a` is greater than `b`, so the first condition is not true, also the\
    \ `elif` condition is not true, so we go to the `else` condition and print to\
    \ screen that \"a is greater than b\".\n\nYou can also have an `else` without\
    \ the `elif`:\n\n### Example\n\n```python\na = 200\nb = 33\nif b > a:\n    print(\"\
    b is greater than a\")\nelse:\n    print(\"b is not greater than a\")\n```\n\n\
    ### Short Hand If\n\nIf you have only one statement to execute, you can put it\
    \ on the same line as the `if` statement.\n\n### Example\n\nOne line if statement:\n\
    \n```python\nif a > b: print(\"a is greater than b\")\n```\n\n### Short Hand If\
    \ ... Else\n\nIf you have only one statement to execute, one for `if`, and one\
    \ for `else`, you can put it all on the same line:\n\n### Example\n\nOne line\
    \ if else statement:\n\n```python\na = 2\nb = 330\nprint(\"A\") if a > b else\
    \ print(\"B\")\n```\n\nThis technique is known as **Ternary Operators**, or **Conditional\
    \ Expressions**.\n\nYou can also have multiple `else` statements on the same line:\n\
    \n### Example\n\nOne line if else statement, with 3 conditions:\n\n```python\n\
    a = 330\nb = 330\nprint(\"A\") if a > b else print(\"=\") if a == b else print(\"\
    B\")\n```\n\n### And\n\nThe `and` keyword is a logical operator, and is used to\
    \ combine conditional statements:\n\n### Example\n\nTest if `a` is greater than\
    \ `b`, AND if `c` is greater than `a`:\n\n```python\na = 200\nb = 33\nc = 500\n\
    if a > b and c > a:\n    print(\"Both conditions are True\")\n```\n\n### Or\n\n\
    The `or` keyword is a logical operator, and is used to combine conditional statements:\n\
    \n### Example\n\nTest if `a` is greater than `b`, OR if `a` is greater than `c`:\n\
    \n```python\na = 200\nb = 33\nc = 500\nif a > b or a > c:\n    print(\"At least\
    \ one of the conditions is True\")\n```\n\n### Nested If\n\nYou can have `if`\
    \ statements inside `if` statements, this is called *nested* `if` statements.\n\
    \n**Example**\n\n```python\nx = 41\nif x > 10:\n    print(\"Above ten,\")\n  \
    \  if x > 20:\n        print(\"and also above 20!\")\n    else:\n        print(\"\
    but not above 20.\")\n```\n\n### The pass Statement\n\n`if` statements cannot\
    \ be empty, but if you for some reason have an `if` statement with no content,\
    \ put in the `pass` statement to avoid getting an error.\n\n**Example**\n\n```python\n\
    a = 33\nb = 200\nif b > a:\n    pass\n```\n\n## 22. Python While Loops\n\n###\
    \ Python Loops\n\nPython has two primitive loop commands:\n\n- `while` loops\n\
    - `for` loops\n\n### The while Loop\n\nWith the `while` loop we can execute a\
    \ set of statements as long as a condition is true.\n\n### Example\n\nPrint `i`\
    \ as long as `i` is less than 6:\n\n```python\ni = 1\nwhile i < 6:\n    print(i)\n\
    \    i += 1\n```\n\n**Note:** remember to increment `i`, or else the loop will\
    \ continue forever.\n\nThe `while` loop requires relevant variables to be ready,\
    \ in this example we need to define an indexing variable, `i`, which we set to\
    \ 1.\n\n### The break Statement\n\nWith the `break` statement we can stop the\
    \ loop even if the `while` condition is true:\n\n### Example\n\nExit the loop\
    \ when `i` is 3:\n\n```python\ni = 1\nwhile i < 6:\n    print(i)\n    if i ==\
    \ 3:\n        break\n    i += 1\n```\n\n### The continue Statement\n\nWith the\
    \ `continue` statement we can stop the current iteration, and continue with the\
    \ next:\n\n**Example**\n\nContinue to the next iteration if `i` is 3:\n\n```python\n\
    i = 0\nwhile i < 6:\n    i += 1\n    if i == 3:\n        continue\n    print(i)\n\
    ```\n\n### The else Statement\n\nWith the `else` statement we can run a block\
    \ of code once when the condition no longer is true:\n\n**Example**\n\nPrint a\
    \ message once the condition is false:\n\n```python\ni = 1\nwhile i < 6:\n   \
    \ print(i)\n    i += 1\nelse:\n    print(\"i is no longer less than 6\")\n```\n\
    \n## 23. Python For Loops\n\n### Python For Loops\n\nA `for` loop is used for\
    \ iterating over a sequence (that is either a list, a tuple, a dictionary, a set,\
    \ or a string).\n\nThis is less like the `for` keyword in other programming languages,\
    \ and works more like an iterator method as found in other object-orientated programming\
    \ languages.\n\nWith the `for` loop we can execute a set of statements, once for\
    \ each item in a list, tuple, set etc.\n\n### Example\n\nPrint each fruit in a\
    \ fruit list:\n\n```python\nfruits = [\"apple\", \"banana\", \"cherry\"]\nfor\
    \ x in fruits:\n    print(x)\n```\n\nThe `for` loop does not require an indexing\
    \ variable to set beforehand.\n\n### Looping Through a String\n\nEven strings\
    \ are iterable objects, they contain a sequence of characters:\n\n### Example\n\
    \nLoop through the letters in the word \"banana\":\n\n```python\nfor x in \"banana\"\
    :\n    print(x)\n```\n\n### The break Statement\n\nWith the `break` statement\
    \ we can stop the loop before it has looped through all the items:\n\n### Example\n\
    \nExit the loop when `x` is \"banana\":\n\n```python\nfruits = [\"apple\", \"\
    banana\", \"cherry\"]\nfor x in fruits:\n    print(x)\n    if x == \"banana\"\
    :\n        break\n```\n\n### Example\n\nExit the loop when `x` is \"banana\",\
    \ but this time the `break` comes before the `print`:\n\n```python\nfruits = [\"\
    apple\", \"banana\", \"cherry\"]\nfor x in fruits:\n    if x == \"banana\":\n\
    \        break\n    print(x)\n```\n\n### The continue Statement\n\nWith the `continue`\
    \ statement we can stop the current iteration of the loop, and continue with the\
    \ next:\n\n### Example\n\nDo not print banana:\n\n```python\nfruits = [\"apple\"\
    , \"banana\", \"cherry\"]\nfor x in fruits:\n    if x == \"banana\":\n       \
    \ continue\n    print(x)\n```"
