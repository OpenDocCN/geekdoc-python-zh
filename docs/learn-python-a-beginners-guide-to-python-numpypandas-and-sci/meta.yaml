  md: "To create an object/class as an iterator you have to implement the methods\
    \ `__iter__()` and `__next__()` to your object.\n\nAs you have learned in the\
    \ Python Classes/Objects chapter, all classes have a function called `__init__()`,\
    \ which allows you to do some initializing when the object is being created.\n\
    \nThe `__iter__()` method acts similar, you can do operations (initializing etc.),\
    \ but must always return the iterator object itself.\n\nThe `__next__()` method\
    \ also allows you to do operations, and must return the next item in the sequence.\n\
    \n# Example\n\nCreate an iterator that returns numbers, starting with 1, and each\
    \ sequence will increase by one (returning 1,2,3,4,5 etc.):\n\n```\nclass MyNumbers:\n\
    \  def __iter__(self):\n    self.a = 1\n    return self\n\n  def __next__(self):\n\
    \    x = self.a\n    self.a += 1\n    return x\n\nmyclass = MyNumbers()\nmyiter\
    \ = iter(myclass)\n\nprint(next(myiter))\nprint(next(myiter))\nprint(next(myiter))\n\
    print(next(myiter))\nprint(next(myiter))\n```\n\n# StopIteration"
  merge: -1
