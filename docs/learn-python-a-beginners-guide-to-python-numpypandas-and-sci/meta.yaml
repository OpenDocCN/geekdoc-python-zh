  md: 'SciPy has optimized and added functions that are frequently used in NumPy and
    Data Science.


    # Which Language is SciPy Written in?


    SciPy is predominantly written in Python, but a few segments are written in C.


    # Where is the SciPy Codebase?


    The source code for SciPy is located at this github repository [https://github.com/scipy/scipy](https://github.com/scipy/scipy)


    **github:** enables many people to work on the same codebase.


    # SciPy Getting Started


    # Installation of SciPy


    If you have Python and PIP already installed on a system, then installation of
    SciPy is very easy.


    Install it using this command:


    ```

    C:\Users\Your Name>pip install scipy

    ```


    If this command fails, then use a Python distribution that already has SciPy installed
    like Anaconda, Spyder etc.


    # Import SciPy


    Once SciPy is installed, import the SciPy module(s) you want to use in your applications
    by adding the from scipy import *module* statement:


    ```

    from scipy import constants

    ```


    Now we have imported the *constants* module from SciPy, and the application is
    ready to use it:'
