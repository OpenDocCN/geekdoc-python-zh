    2. *inputs* - the number of input arguments (arrays).\n3. *outputs* - the number\
    \ of output arrays.\n\n# Example\n\nCreate your own ufunc for addition:\n\n```\n\
    import numpy as np\n\ndef myadd(x, y):\n  return x+y\n\nmyadd = np.frompyfunc(myadd,\
    \ 2, 1)\n\nprint(myadd([1, 2, 3, 4], [5, 6, 7, 8]))\n```\n\n# Check if a Function\
    \ is a ufunc\n\nCheck the *type* of a function to check if it is a ufunc or not.\n\
    \nA ufunc should return <class 'numpy.ufunc'>.\n\n# Example\n\nCheck if a function\
    \ is a ufunc:\n\n```\nimport numpy as np\n\nprint(type(np.add))\n```\n\nIf it\
