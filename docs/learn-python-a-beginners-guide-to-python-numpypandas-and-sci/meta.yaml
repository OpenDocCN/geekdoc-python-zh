    # Replace Empty Values


    Another way of dealing with empty cells is to insert a *new* value instead.

    This way you do not have to delete entire rows just because of some empty cells.


    The fillna() method allows us to replace empty cells with a value:


    **Example**

    Replace NULL values with the number 130:


    ```

    import pandas as pd

    df = pd.read_csv(''data.csv'')

    df.fillna(130, inplace = True)

    ```


    **Replace Only For a Specified Columns**

    The example above replaces all empty cells in the whole Data Frame.

    To only replace empty values for one column, specify the *column name* for the
    DataFrame:


    **Example**

    Replace NULL values in the "Calories" columns with the number 130:


    ```

    import pandas as pd

    df = pd.read_csv(''data.csv'')

    df["Calories"].fillna(130, inplace = True)

    ```'
  - '[PAGE 295]


    # Replace Using Mean, Median, or Mode


    A common way to replace empty cells is to calculate the mean, median or mode value
    of the column.


    Pandas uses the mean() median() and mode() methods to calculate the respective
    values for a specified column:


    # Example


    Calculate the MEAN, and replace any empty values with it:


    ```

    import pandas as pd


    df = pd.read_csv(''data.csv'')


    x = df["Calories"].mean()


    df["Calories"].fillna(x, inplace = True)

    ```


    **Mean** = the average value (the sum of all values divided by number of values).


    # Example


    Calculate the MEDIAN, and replace any empty values with it:


    ```

    import pandas as pd


    df = pd.read_csv(''data.csv'')


    x = df["Calories"].median()


    df["Calories"].fillna(x, inplace = True)

    ```


    **Median** = the value in the middle, after you have sorted all values ascending.


    # Example


    Calculate the MODE, and replace any empty values with it:


    ```

    import pandas as pd


    df = pd.read_csv(''data.csv'')


    x = df["Calories"].mode()[0]

    ```'
