    A Beginner''s Guide to Python, NumPy, Pandas and SciPy.


    # M R KISHORE KUMAR


    For you.

    One way or another this book ended up in your hands. I’m excited to see what you
    do with it, and I hope the knowledge within this book makes as large an impact
    on your life as it has on my own.


    # About the Tutorial


    Python is an easy to learn, powerful programming language. It has efficient high-level
    data structures and a simple but effective approach to object-oriented programming.
    Python’s elegant syntax and dynamic typing, together with its interpreted nature,
    make it an ideal language for scripting and rapid application development in many
    areas on most platforms.


    # Audience


    This tutorial introduces the reader informally to the basic concepts and features
    of the Python language and system. It helps to have a Python interpreter handy
    for hands-on experience, but all examples are self-contained, so the tutorial
    can be read off-line as well.


    # Prerequisites


    Before proceeding with this tutorial you should have a basic working knowledge
    of Windows or Linux operating system, additionally, you must be familiar with:


    - Experience with any text editor like sublime, Visual Studio Code, or pycharm,
    etc.

    - How to create directories and files on your computer.

    - How to navigate through different directories.

    - How to type content in a file and save them on a computer.


