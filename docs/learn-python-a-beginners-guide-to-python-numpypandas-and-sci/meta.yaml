    print(constants.liter)

    ```


    **constants：** SciPy 提供了一组数学常量，其中之一是 `liter`，它返回 1 升作为立方米的值。


    你将在下一章中了解更多关于常量的信息。


    ## 检查 SciPy 版本


    版本字符串存储在 `__version__` 属性下。


