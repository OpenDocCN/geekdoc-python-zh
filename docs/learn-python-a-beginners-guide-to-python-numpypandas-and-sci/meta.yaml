    \n检查不存在的内容的类型。这将产生一个错误：\n\n```python\nimport numpy as np\nprint(type(np.blahblah))\n\
    ```\n\n要在 if 语句中测试函数是否为 ufunc，请使用 `numpy.ufunc` 值（如果你使用 `np` 作为 `numpy` 的别名，则使用\
