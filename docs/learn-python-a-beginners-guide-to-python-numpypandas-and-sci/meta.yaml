    : \"Ford\", \"model\": \"Mustang\", \"year\": 1964}\nmydict = dict(thisdict)\n\
    print(mydict)\n```\n\n## Python - 嵌套字典\n\n### 嵌套字典\n\n一个字典可以包含字典，这被称为嵌套字典。\n\n\
