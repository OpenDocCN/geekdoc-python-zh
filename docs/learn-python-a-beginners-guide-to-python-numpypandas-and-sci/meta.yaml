    ```\nimport math\n\nx = math.pi\n\nprint(x)\n```\n\n## 完整的数学模块参考\n\n在我们的数学模块参考中，您将找到属于数学模块的所有方法和常量的完整参考。\n\
    \n## 34. Python JSON\n\nJSON 是一种用于存储和交换数据的语法。\nJSON 是文本，使用 JavaScript 对象表示法编写。\n\
    \n## Python 中的 JSON\n\nPython 有一个名为 `json` 的内置包，可用于处理 JSON 数据。\n\n**示例**\n\n导入\
    \ `json` 模块：\n\n```\nimport json\n```\n\n## 解析 JSON - 从 JSON 转换为 Python\n\n如果您有一个\
    \ JSON 字符串，可以使用 `json.loads()` 方法对其进行解析。\n结果将是一个 Python 字典。\n\n**示例**\n\n从 JSON\
    \ 转换为 Python：\n\n```\nimport json\n\n# 一些 JSON：\nx =  '{ \"name\":\"John\", \"\
    age\":30, \"city\":\"New York\"}'\n\n# 解析 x：\ny = json.loads(x)\n\n# 结果是一个 Python\
    \ 字典：\nprint(y[\"age\"])\n```\n\n## 从 Python 转换为 JSON\n\n如果您有一个 Python 对象，可以使用\
    \ `json.dumps()` 方法将其转换为 JSON 字符串。\n\n**示例**\n\n从 Python 转换为 JSON：\n\n```\nimport\
    \ json\n\n# 一个 Python 对象（字典）：\nx = {\n    \"name\": \"John\",\n    \"age\": 30,\n\
    \    \"city\": \"New York\"\n}\n\n# 转换为 JSON：\ny = json.dumps(x)\n\n# 结果是一个 JSON\
    \ 字符串：\nprint(y)\n```\n\n您可以将以下类型的 Python 对象转换为 JSON 字符串：\n\n- dict\n- list\n\
    - tuple\n- string\n- int\n- float\n- True\n- False\n- None\n\n**示例**\n\n将 Python\
    \ 对象转换为 JSON 字符串，并打印值：\n\n```\nimport json\n\nprint(json.dumps({\"name\": \"John\"\
    , \"age\": 30}))\nprint(json.dumps([\"apple\", \"bananas\"]))\nprint(json.dumps((\"\
    apple\", \"bananas\")))\nprint(json.dumps(\"hello\"))\nprint(json.dumps(42))\n\
    print(json.dumps(31.76))\nprint(json.dumps(True))\nprint(json.dumps(False))\n\
    print(json.dumps(None))\n```\n\n当您从 Python 转换为 JSON 时，Python 对象会被转换为 JSON（JavaScript）等效项：\n\
    \n| Python | JSON |\n|---|---|\n| dict | Object |\n| list | Array |\n| tuple |\
    \ Array |\n| str | String |\n| int | Number |\n| float | Number |\n| True | true\
    \ |\n| False | false |\n| None | null |\n\n**示例**\n\n转换一个包含所有合法数据类型的 Python 对象：\n\
    \n```\nimport json\n\nx = {\n  \"name\": \"John\",\n  \"age\": 30,\n  \"married\"\
    : True,\n  \"divorced\": False,\n  \"children\": (\"Ann\",\"Billy\"),\n  \"pets\"\
    : None,\n  \"cars\": [\n    {\"model\": \"BMW 230\", \"mpg\": 27.5},\n    {\"\
    model\": \"Ford Edge\", \"mpg\": 24.1}\n]\n}\n\nprint(json.dumps(x))\n```\n\n\
    ## 格式化结果\n\n上面的示例打印了一个 JSON 字符串，但它不太容易阅读，没有缩进和换行。\n\n`json.dumps()` 方法有参数可以使结果更易于阅读：\n\
    \n**示例**\n\n使用 `indent` 参数定义缩进数量：\n\n```\njson.dumps(x, indent=4)\n```\n\n您还可以定义分隔符，默认值是\
    \ `(\", \", \": \")`，这意味着使用逗号和空格分隔每个对象，使用冒号和空格分隔键和值：\n\n**示例**\n\n使用 `separators`\
    \ 参数更改默认分隔符：\n\n```\njson.dumps(x, indent=4, separators=(\". \", \" = \"))\n```\n\
    \n## 对结果排序\n\n`json.dumps()` 方法有参数可以对结果中的键进行排序：\n\n**示例**\n\n使用 `sort_keys` 参数指定结果是否应排序：\n\
    \n```\njson.dumps(x, indent=4, sort_keys=True)\n```\n\n## 35. Python 正则表达式\n\n\
    正则表达式（RegEx）是形成搜索模式的字符序列。\n\n正则表达式可用于检查字符串是否包含指定的搜索模式。\n\n## 正则表达式模块\n\nPython\
    \ 有一个名为 `re` 的内置包，可用于处理正则表达式。\n\n导入 `re` 模块：\n\n```\nimport re\n```\n\n## Python\
    \ 中的正则表达式\n\n导入 `re` 模块后，就可以开始使用正则表达式了：\n\n**示例**\n\n搜索字符串，查看其是否以 \"The\" 开头并以\
    \ \"Spain\" 结尾：\n\n```\nimport re\ntxt = \"The rain in Spain\"\nx = re.search(\"\
    ^The.*Spain$\", txt)\n```\n\n## 正则表达式函数\n\n`re` 模块提供了一组函数，允许我们在字符串中搜索匹配项：\n\n\
    | 函数 | 描述 |\n| --- | --- |\n| findall | 返回一个包含所有匹配项的列表 |\n| search | 如果字符串中任何位置存在匹配项，则返回一个\
    \ Match 对象 |\n| split | 返回一个列表，其中字符串在每个匹配项处被分割 |\n| sub | 用一个字符串替换一个或多个匹配项 |\n\
    \n## 元字符\n\n元字符是具有特殊含义的字符：\n\n| 字符 | 描述 | 示例 |\n| --- | --- | --- |\n| [ ] | 一组字符\
    \ | \"[a-m]\" |\n| \\ | 表示一个特殊序列（也可用于转义特殊字符） | \"\\d\" |\n| . | 任意字符（换行符除外） |\
    \ \"he..o\" |\n| ^ | 以...开头 | \"^hello\" |\n| $ | 以...结尾 | \"world$\" |\n| * |\
    \ 零次或多次出现 | \"aix*\" |\n| + | 一次或多次出现 | \"aix+\" |\n| { } | 恰好指定次数的出现 | \"al{2}\"\
    \ |\n| \\| | 或 | \"falls\\|stays\" |\n| ( ) | 捕获和分组 | |\n\n## 集合\n\n集合是一对方括号 `[]`\
    \ 内的一组字符，具有特殊含义：\n\n| 集合 | 描述 |\n| :--- | :--- |\n| [arn] | 返回一个匹配项，其中存在指定字符之一（a、r\
    \ 或 n） |\n| [a-n] | 返回一个匹配项，匹配任何在字母顺序上介于 a 和 n 之间的小写字符 |\n| [^arn] | 返回一个匹配项，匹配除\
    \ a、r 和 n 之外的任何字符 |\n| [0123] | 返回一个匹配项，其中存在指定数字之一（0、1、2 或 3） |\n| [0-9] | 返回一个匹配项，匹配\
    \ 0 到 9 之间的任何数字 |\n| [0-5][0-9] | 返回一个匹配项，匹配从 00 到 59 的任何两位数 |\n| [a-zA-Z] | 返回一个匹配项，匹配字母顺序上介于\
    \ a 和 z 之间的任何字符，小写或大写 |\n| [+] | 在集合中，`+`、`*`、`.`、`|`、`()`、`$`、`{}` 没有特殊含义，因此\
    \ `[+]` 表示：返回字符串中任何 `+` 字符的匹配项。 |\n\n## 特殊序列\n\n特殊序列是 `\\` 后跟下面列表中的一个字符，具有特殊含义：\n\
    \n| 字符 | 描述 | 示例 |\n| :--- | :--- | :--- |\n| \\A | 如果指定字符位于字符串开头，则返回匹配项 | \"\\\
    AThe\" |\n| \\b | 返回一个匹配项，其中指定字符位于单词的开头或结尾（开头的 \"r\" 确保字符串被视为“原始字符串”） | r\"\\\
    bain\" r\"ain\\b\" |\n| \\B | 返回一个匹配项，其中指定字符存在，但不在单词的开头（或结尾）（开头的 \"r\" 确保字符串被视为“原始字符串”）\
    \ | r\"\\Bain\" r\"ain\\B\" |\n| \\d | 返回一个匹配项，其中字符串包含数字（0-9 的数字） | \"\\d\" |\n\
