    class Person:\n  def __init__(self, name, age):\n    self.name = name\n    self.age\
    \ = age\n\n  def myfunc(self):\n    print(\"Hello my name is \" + self.name)\n\
    \np1 = Person(\"John\", 36)\np1.myfunc()\n```\n\n**Note:** The self parameter\
    \ is a reference to the current instance of the class, and is used to access variables\
    \ that belong to the class.\n\n### The self Parameter\n\nThe self parameter is\
