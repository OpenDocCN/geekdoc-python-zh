    \n### 迭代具有不同数据类型的数组\n\n我们可以使用op_dtypes参数并传递预期的数据类型，以便在迭代时更改元素的数据类型。\n\nNumPy不会就地（元素在数组中的位置）更改元素的数据类型，因此它需要一些其他空间来执行此操作，这个额外的空间称为缓冲区，为了在nditer()中启用它，我们传递flags=['buffered']。\n\
    \n**示例**\n将数组作为字符串迭代：\n\n```python\nimport numpy as np\n\narr = np.array([1, 2,\
