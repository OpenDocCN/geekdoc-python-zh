    Python36-32\\Scripts>pip --version\n```\n\n## 安装 PIP\n\n如果你没有安装 PIP，可以从这个页面下载并安装：[https://pypi.org/project/pip/](https://pypi.org/project/pip/)\n\
    \n## 下载包\n\n下载包非常简单。\n打开命令行界面，告诉 PIP 下载你想要的包。\n将你的命令行导航到 Python 脚本目录的位置，然后输入以下内容：\n\
    \n### 示例\n\n下载一个名为 \"camelcase\" 的包：\n\n```\nC:\\Users\\Your Name\\AppData\\Local\\\
    Programs\\Python\\Python36-32\\Scripts>pip install camelcase\n```\n\n现在你已经下载并安装了你的第一个包！\n\
    \n## 使用包\n\n一旦包安装完毕，就可以使用了。\n将 \"camelcase\" 包导入到你的项目中。\n\n**示例**\n导入并使用 \"camelcase\"\
    ：\n\n```python\nimport camelcase\n\nc = camelcase.CamelCase()\n\ntxt = \"hello\
    \ world\"\n\nprint(c.hump(txt))\n```\n\n## 查找包\n\n在 [https://pypi.org/](https://pypi.org/)\
    \ 查找更多包。\n\n## 移除包\n\n使用 `uninstall` 命令来移除一个包：\n\n**示例**\n卸载名为 \"camelcase\" 的包：\n\
    \n```\nC:\\Users\\Your Name\\AppData\\Local\\Programs\\Python\\Python36-32\\Scripts>pip\
    \ uninstall camelcase\n```\n\nPIP 包管理器会要求你确认是否要移除 camelcase 包：\n\n```\nUninstalling\
    \ camelcase-0.2.1:\n  Would remove:\n    c:\\users\\Your Name\\appdata\\local\\\
    programs\\python\\python36-32\\lib\\site-packages\\camelcase-0.2-py3.6.egg-info\n\
    \    c:\\users\\Your Name\\appdata\\local\\programs\\python\\python36-32\\lib\\\
    site-packages\\camelcase\\*\nProceed (y/n)?\n```\n\n按 `y` 键，该包将被移除。\n\n## 列出包\n\
    \n使用 `list` 命令列出系统上安装的所有包：\n\n**示例**\n列出已安装的包：\n\n```\nC:\\Users\\Your Name\\\
    AppData\\Local\\Programs\\Python\\Python36-32\\Scripts>pip list\n```\n\n**结果：**\n\
    \n| 包名 | 版本 |\n| --- | --- |\n| camelcase | 0.2 |\n| mysql-connector | 2.1.6 |\n\
    | pip | 18.1 |\n| pymongo | 3.6.1 |\n| setuptools | 39.0.1 |\n\n# 37. Python Try\
    \ Except\n\n`try` 块允许你测试一段代码是否有错误。\n\n`except` 块允许你处理错误。\n\n`finally` 块允许你执行代码，无论\
    \ `try` 和 `except` 块的结果如何。\n\n## 异常处理\n\n当发生错误时，或者我们称之为异常，Python 通常会停止并生成一条错误消息。\n\
    \n这些异常可以使用 `try` 语句来处理：\n\n**示例**\n`try` 块将生成一个异常，因为 `x` 未定义：\n\n```python\ntry:\n\
    \    print(x)\nexcept:\n    print(\"An exception occurred\")\n```\n\n由于 `try`\
    \ 块引发了一个错误，`except` 块将被执行。\n\n如果没有 `try` 块，程序将崩溃并引发错误：\n\n此语句将引发错误，因为 `x` 未定义：\n\
    \n```python\nprint(x)\n```\n\n## 多个异常\n\n你可以根据需要定义任意数量的异常块，例如，如果你想为特定类型的错误执行特定的代码块：\n\
    \n**示例**\n如果 `try` 块引发 `NameError`，则打印一条消息，对于其他错误则打印另一条消息：\n\n```python\ntry:\n\
    \    print(x)\nexcept NameError:\n    print(\"Variable x is not defined\")\nexcept:\n\
    \    print(\"Something else went wrong\")\n```\n\n## Else\n\n你可以使用 `else` 关键字来定义一段代码，如果未引发错误，则执行该代码：\n\
    \n在此示例中，`try` 块未生成任何错误：\n\n```python\ntry:\n    print(\"Hello\")\nexcept:\n  \
    \  print(\"Something went wrong\")\nelse:\n    print(\"Nothing went wrong\")\n\
    ```\n\n## Finally\n\n如果指定了 `finally` 块，无论 `try` 块是否引发错误，它都将被执行。\n\n**示例**\n\n\
    ```python\ntry:\n    print(x)\nexcept:\n    print(\"Something went wrong\")\n\
    finally:\n    print(\"The 'try except' is finished\")\n```\n\n这对于关闭对象和清理资源很有用：\n\
    \n**示例**\n尝试打开并写入一个不可写的文件：\n\n```python\ntry:\n    f = open(\"demofile.txt\")\n\
    \    f.write(\"Lorum Ipsum\")\nexcept:\n    print(\"Something went wrong when\
    \ writing to the file\")\nfinally:\n    f.close()\n```\n\n程序可以继续运行，而不会让文件对象保持打开状态。\n\
    \n## 引发异常\n\n作为 Python 开发人员，你可以选择在发生条件时抛出异常。\n\n要抛出（或引发）异常，请使用 `raise` 关键字。\n\n\
    **示例**\n如果 `x` 小于 0，则引发错误并停止程序：\n\n```python\nx = -1\nif x < 0:\n    raise Exception(\"\
    Sorry, no numbers below zero\")\n```\n\n`raise` 关键字用于引发异常。\n\n你可以定义引发何种错误，以及要打印给用户的文本。\n\
    \n如果 `x` 不是整数，则引发 `TypeError`：\n\n```python\nx = \"hello\"\nif not type(x) is\
    \ int:\n    raise TypeError(\"Only integers are allowed\")\n```"
