    # 01.Python Introduction


    ## What is Python?


    Python is a popular programming language. It was created by Guido van Rossum,
    and released in 1991.


    It is used for:


    - web development (server-side),

    - software development,

    - mathematics,

    - system scripting.


    ## What can Python do?


    - Python can be used on a server to create web applications.

    - Python can be used alongside software to create workflows.

    - Python can connect to database systems. It can also read and modify files.

    - Python can be used to handle big data and perform complex mathematics.

    - Python can be used for rapid prototyping, or for production-ready software development.


    ## Why Python?


    - Python works on different platforms (Windows, Mac, Linux, Raspberry Pi, etc).

    - Python has a simple syntax similar to the English language.

    - Python has a syntax that allows developers to write programs with fewer lines
    than some other programming languages.

    - Python runs on an interpreter system, meaning that code can be executed as soon
    as it is written. This means that prototyping can be very quick.

    - Python can be treated in a procedural way, an object-oriented way, or a functional
    way.


    ## Good to know


    - The most recent major version of Python is Python 3, which we shall be using
    in this tutorial. However, Python 2, although not being updated with anything
    other than security updates, is still quite popular.

    - In this tutorial, Python will be written in a text editor. It is possible to
    write Python in an Integrated Development Environment, such as Thonny, Pycharm,
    Netbeans, or Eclipse which are particularly useful when managing larger collections
    of Python files.


    ## Python Syntax compared to other programming languages


    - Python was designed for readability and has some similarities to the English
    language with influence from mathematics.

    - Python uses new lines to complete a command, as opposed to other programming
    languages which often use semicolons or parentheses.

    - Python relies on indentation, using whitespace, to define scope; such as the
    scope of loops, functions, and classes. Other programming languages often use
    curly brackets for this purpose.


    ## Example


    ```

    print("Hello, World!")

    ```


    ## Definition and Usage


    The print() function prints the specified message to the screen or another standard
    output device.

    The message can be a string or any other object, the object will be converted
    into a string before written to the screen.


    ## Syntax


    ```

    print(object(s), sep=separator, end=end, file=file, flush=flush)

    ```


    ## Parameter Values


    | Parameter | Description |

    | :--- | :--- |

    | *object(s)* | Any object, and as many as you like. Will be converted to a string
    before printed |

    | *sep=''separator''* | Optional. Specify how to separate the objects, if there
    is more than one. Default is '' '' |

    | *end=''end''* | Optional. Specify what to print at the end. Default is ''\n''
    (line feed) |

    | *file* | Optional. An object with a write method. Default is sys.stdout |

    | *flush* | Optional. A Boolean, specifying if the output is flushed (True) or
    buffered (False). Default is False |


    # 02.Python Getting Started


    ## Python Install


    Many PCs and Macs will have python already installed.

    To check if you have python installed on a Windows PC, search in the start bar
    for Python or run the following on the Command Line (cmd.exe):


    ```

    C:\Users\Your Name>python --version

    ```


    To check if you have python installed on a Linux or Mac, then on Linux open the
    command line or on Mac open the Terminal, and type:


    ```

    python --version

    ```


    If you find that you do not have python installed on your computer, then you can
    download it for free from the following website: [https://www.python.org/](https://www.python.org/)


    ## Python Quickstart


    Python is an interpreted programming language, this means that as a developer
    you write Python (.py) files in a text editor and then put those files into the
    python interpreter to be executed.

    The way to run a python file is like this on the command line:


    ```

    C:\Users\Your Name>python helloworld.py

    ```


    Where "helloworld.py" is the name of your python file.

    Let''s write our first Python file, called helloworld.py, which can be done in
    any text editor.


    ```

    print("Hello, World!")

    ```


    Simple as that. Save your file. Open your command line, navigate to the directory
    where you saved your file, and run:


    ```

    C:\Users\Your Name>python helloworld.py

    ```


    The output should read: **Hello, World!**

    **Congratulations, you have written and executed your first Python**'
  mdcn: '# 学习 Python


    Python、NumPy、Pandas 和 SciPy 初学者指南。


    # M R KISHORE KUMAR


    献给你。

    无论如何，这本书最终到了你的手中。我很期待看到你如何运用它，并希望书中的知识能像对我一样，对你的生活产生深远影响。


    # 关于本教程


    Python 是一种易于学习且功能强大的编程语言。它拥有高效的高级数据结构，以及一种简单但有效的面向对象编程方法。Python 优雅的语法和动态类型，结合其解释型特性，使其成为在大多数平台上进行脚本编写和快速应用开发的理想语言，适用于众多领域。


    # 目标读者


    本教程旨在向读者非正式地介绍 Python 语言和系统的基本概念与特性。手边有一个 Python 解释器进行实践操作会很有帮助，但所有示例都是独立的，因此本教程也可以离线阅读。


    # 前提条件


    在继续本教程之前，你应该具备 Windows 或 Linux 操作系统的基本操作知识。此外，你必须熟悉：


    - 使用任何文本编辑器的经验，如 Sublime、Visual Studio Code 或 PyCharm 等。

    - 如何在计算机上创建目录和文件。

    - 如何在不同目录间导航。

    - 如何在文件中输入内容并将其保存到计算机上。


