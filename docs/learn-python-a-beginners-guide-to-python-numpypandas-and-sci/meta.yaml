    print(x(5))\n```\n\nLambda functions can take any number of arguments:\n\n###\
    \ Example\n\nMultiply argument a with argument b and return the result:\n\n```python\n\
    x = lambda a, b : a * b\nprint(x(5, 6))\n```\n\n### Example\n\nSummarize argument\
    \ a, b, and c and return the result:\n\n```python\nx = lambda a, b, c : a + b\
    \ + c\nprint(x(5, 6, 2))\n```\n\n### Why Use Lambda Functions?\n\nThe power of\
    \ lambda is better shown when you use them as an anonymous function inside another\
