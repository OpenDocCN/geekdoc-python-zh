    \ add `list2` at the end of `list1`:\n\n```python\nlist1 = [\"a\", \"b\" , \"\
    c\"]\nlist2 = [1, 2, 3]\nlist1.extend(list2)\nprint(list1)\n```\n\n## Python -\
    \ List Methods\n\n### List Methods\n\nPython has a set of built-in methods that\
    \ you can use on lists.\n\n| Method | Description |\n|---|---|\n| append() | Adds\
    \ an element at the end of the list |\n| clear() | Removes all the elements from\
    \ the list |\n| copy() | Returns a copy of the list |\n| count() | Returns the\
