  md: "# Recursion\n\nPython also accepts function recursion, which means a defined\
    \ function can call itself.\n\nRecursion is a common mathematical and programming\
    \ concept. It means that a function calls itself. This has the benefit of meaning\
    \ that you can loop through data to reach a result.\n\nThe developer should be\
    \ very careful with recursion as it can be quite easy to slip into writing a function\
    \ which never terminates, or one that uses excess amounts of memory or processor\
    \ power. However, when written correctly recursion can be a very efficient and\
    \ mathematically-elegant approach to programming.\n\nIn this example, tri_recursion()\
    \ is a function that we have defined to call itself (\"recurse\"). We use the\
    \ k variable as the data, which decrements (-1) every time we recurse. The recursion\
    \ ends when the condition is not greater than 0 (i.e. when it is 0).\n\nTo a new\
    \ developer it can take some time to work out how exactly this works, best way\
    \ to find out is by testing and modifying it.\n\n# Example\n\nRecursion Example\n\
    \n```\ndef tri_recursion(k):\n    if(k > 0):\n        result = k + tri_recursion(k\
    \ - 1)\n        print(result)\n    else:\n        result = 0\n    return result\n\
    \nprint(\"\\n\\nRecursion Example Results\")\n```"
