    \ 方法只删除指定值的第一个出现项。\n\n### 数组方法\n\nPython 有一组内置方法，您可以在列表/数组上使用。\n\n| 方法 | 描述 |\n\
    |---|---|\n| append() | 在列表末尾添加一个元素 |\n| clear() | 从列表中删除所有元素 |\n| copy() | 返回列表的副本\
    \ |\n| count() | 返回具有指定值的元素数量 |\n| extend() | 将列表（或任何可迭代对象）的元素添加到当前列表的末尾 |\n|\
    \ index() | 返回具有指定值的第一个元素的索引 |\n| insert() | 在指定位置添加一个元素 |\n| pop() | 删除指定位置的元素\
    \ |\n| remove() | 删除具有指定值的第一个项目 |\n| reverse() | 反转列表的顺序 |\n| sort() | 对列表进行排序\
    \ |\n\n## 25. Python 函数\n\n函数是一段仅在被调用时运行的代码。\n您可以将数据（称为参数）传递给函数。\n函数可以返回数据作为结果。\n\
    \n### 创建函数\n\n在 Python 中，函数使用 `def` 关键字定义。\n\n### 示例\n\n```\ndef my_function():\n\
    \    print(\"Hello from a function\")\n```\n\n### 调用函数\n\n要调用函数，请使用函数名称后跟括号。\n\
    \n### 示例\n\n```\ndef my_function():\n    print(\"Hello from a function\")\n\n\
    my_function()\n```\n\n### 参数\n\n信息可以作为参数传递给函数。\n\n参数在函数名称后指定，位于括号内。您可以根据需要添加任意数量的参数，只需用逗号分隔即可。\n\
    \n以下示例有一个带有一个参数（`fname`）的函数。当函数被调用时，我们传递一个名字，该名字在函数内部用于打印全名。\n\n### 示例\n\n```\n\
    def my_function(fname):\n    print(fname + \" Refsnes\")\n```\n\n```\nmy_function(\"\
    Emil\")\nmy_function(\"Tobias\")\nmy_function(\"Linus\")\n```\n\n在 Python 文档中，*Arguments*\
    \ 通常缩写为 *args*。\n\n### 参数还是实参？\n\n术语 *parameter* 和 *argument* 可以用于指代同一事物：传递给函数的信息。\n\
    \n从函数的角度来看：\n\n参数是函数定义中括号内列出的变量。\n\n实参是调用函数时发送给函数的值。\n\n### 参数数量\n\n默认情况下，函数必须使用正确数量的参数调用。\n\
    \n这意味着如果您的函数期望 2 个参数，您必须使用 2 个参数调用该函数，不能多也不能少。\n\n### 示例\n\n此函数期望 2 个参数，并获得 2\
    \ 个参数：\n\n```\ndef my_function(fname, lname):\n    print(fname + \" \" + lname)\n\
    ```\n\n```\nmy_function(\"Emil\", \"Refsnes\")\n```\n\n如果您尝试使用 1 个或 3 个参数调用该函数，您将得到一个错误。\n\
    \n### 示例\n\n此函数期望 2 个参数，但只获得 1 个：\n\n```\ndef my_function(fname, lname):\n   \
