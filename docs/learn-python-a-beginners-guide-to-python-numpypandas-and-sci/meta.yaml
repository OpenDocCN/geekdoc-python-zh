    \ a:\n    print(\"b is greater than a\")\nelif a == b:\n    print(\"a and b are\
    \ equal\")\n```\n\n在这个示例中，`a` 等于 `b`，所以第一个条件不成立，但 `elif` 条件成立，因此我们向屏幕打印 \"a and\
    \ b are equal\"。\n\n### Else\n\n`else` 关键字捕获前面条件未捕获到的所有情况。\n\n**示例**\n\n```python\n\
