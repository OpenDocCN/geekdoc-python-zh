    ### pass 语句\n\n`if` 语句不能为空，但如果你出于某种原因有一个没有内容的 `if` 语句，请放入 `pass` 语句以避免出现错误。\n\n\
    **示例**\n\n```python\na = 33\nb = 200\nif b > a:\n    pass\n```\n\n## 22. Python\
    \ While 循环\n\n### Python 循环\n\nPython 有两个基本的循环命令：\n\n- `while` 循环\n- `for` 循环\n\
