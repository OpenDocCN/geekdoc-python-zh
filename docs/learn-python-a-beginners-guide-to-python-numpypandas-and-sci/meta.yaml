  mdcn: "## SciPy 统计显著性检验\n\n## 什么是统计显著性检验？\n\n在统计学中，统计显著性意味着所得结果背后有其原因，并非随机产生或偶然发生。\n\
    \nSciPy 为我们提供了一个名为 `scipy.stats` 的模块，其中包含用于执行统计显著性检验的函数。\n\n以下是在执行此类检验时重要的一些技术和关键词。\n\
    \n## 统计学中的假设\n\n假设是对总体中某个参数的假定。\n\n## 零假设\n\n它假定观察结果在统计上不显著。\n\n## 备择假设\n\n它假定观察结果是由某种原因造成的。\n\
    \n它是零假设的替代。\n\n## 示例：\n\n对于学生的评估，我们会设定：\n\n“学生表现低于平均水平” - 作为零假设，以及：\n\n“学生表现优于平均水平”\
    \ - 作为备择假设。\n\n## 单尾检验\n\n当我们的假设仅检验值的一侧时，称为“单尾检验”。\n\n## 示例：\n\n对于零假设：\n“均值等于\
    \ k”，我们可以有备择假设：\n“均值小于 k”，或：\n“均值大于 k”\n\n## 双尾检验\n\n当我们的假设检验值的两侧时。\n\n## 示例：\n\
    \n对于零假设：\n“均值等于 k”，我们可以有备择假设：\n“均值不等于 k”\n在这种情况下，均值小于或大于 k，两侧都需要检验。\n\n## Alpha\
    \ 值\n\nAlpha 值是显著性水平。\n\n## 示例：\n\n数据必须接近极端到何种程度，零假设才会被拒绝。\n通常取值为 0.01、0.05 或\
    \ 0.1。\n\n## P 值\n\nP 值表示数据实际接近极端的程度。\n通过比较 P 值和 Alpha 值来确定统计显著性。\n如果 p 值 <= alpha，我们拒绝零假设，并称数据在统计上显著。否则，我们接受零假设。\n\
    \n## T 检验\n\nT 检验用于确定两个变量的均值之间是否存在显著差异，并让我们知道它们是否属于同一分布。\n\n它是一个双尾检验。\n\n函数 `ttest_ind()`\
    \ 接受两个大小相同的样本，并返回一个包含 t 统计量和 p 值的元组。\n\n## 示例\n\n判断给定值 v1 和 v2 是否来自同一分布：\n\n```\n\
    import numpy as np\nfrom scipy.stats import ttest_ind\nv1 = np.random.normal(size=100)\n\
    v2 = np.random.normal(size=100)\nres = ttest_ind(v1, v2)\nprint(res)\n```\n\n\
    结果：\n0.68346891833752133\n\n如果你想只返回 p 值，请使用 pvalue 属性：\n\n## 示例\n\n```\n...\n\
    res = ttest_ind(v1, v2).pvalue\nprint(res)\n```\n\n结果：\n0.68346891833752133\n\n\
    ## KS 检验\n\nKS 检验用于检查给定值是否遵循某种分布。\n\n该函数接受待检验的值和累积分布函数（CDF）作为两个参数。\n**CDF** 可以是一个字符串或一个返回概率的可调用函数。\n\
    它可以用作单尾或双尾检验。\n默认是双尾。我们可以通过参数 `alternative` 传递一个字符串，值为 'two-sided'、'less' 或 'greater'。\n\
    \n## 示例\n\n判断给定值是否遵循正态分布：\n\n```\nimport numpy as np\nfrom scipy.stats import\
    \ kstest\nv = np.random.normal(size=100)\nres = kstest(v, 'norm')\nprint(res)\n\
    ```\n\n## 结果：\n\nKstestResult(statistic=0.047798701221956841,\npvalue=0.97630967161777515)\n\
    \n## 数据的统计描述\n\n为了查看数组中值的摘要，我们可以使用 `describe()` 函数。\n它返回以下描述：\n\n- 1. 观测数量 (nobs)\n\
    - 2. 最小值和最大值 = minmax\n- 3. 均值\n- 4. 方差\n- 5. 偏度\n- 6. 峰度\n\n## 示例\n\n显示数组中值的统计描述：\n\
    \n```\nimport numpy as np\nfrom scipy.stats import describe\n\nv = np.random.normal(size=100)\n\
    res = describe(v)\nprint(res)\n```\n\n## 结果：\n\n```\nDescribeResult(\n    nobs=100,\n\
    \    minmax=(-2.0991855456740121, 2.1304142707414964),\n    mean=0.11503747689121079,\n\
    \    variance=0.99418092655064605,\n    skewness=0.013953400984243667,\n    kurtosis=-0.671060517912661\n\
    )\n```\n\n## 正态性检验（偏度和峰度）\n\n正态性检验基于偏度和峰度。\n`normaltest()` 函数返回零假设的 p 值：\n“x 来自正态分布”。\n\
    \n## 偏度：\n\n数据对称性的度量。\n对于正态分布，其值为 0。\n如果为负，表示数据左偏。\n如果为正，表示数据右偏。\n\n## 峰度：\n\n\
    衡量数据相对于正态分布是重尾还是轻尾的指标。\n\n正峰度表示重尾。\n\n负峰度表示轻尾。\n\n## 示例\n\n求取数组中值的偏度和峰度：\n\n```\n\
    import numpy as np\nfrom scipy.stats import skew, kurtosis\nv = np.random.normal(size=100)\n\
    print(skew(v))\nprint(kurtosis(v))\n```\n\n## 结果：\n\n0.11168446328610283\n-0.1879320563260931\n\
    \n## 示例\n\n判断数据是否来自正态分布：\n\n```\nimport numpy as np\nfrom scipy.stats import normaltest\n\
    v = np.random.normal(size=100)\nprint(normaltest(v))\n```\n\n## 结果：\n\nNormaltestResult(statistic=4.4783745697002848,\
    \ pvalue=0.10654505998635538)"
