    *low points*.


    High points are called *maxima*.


    Low points are called *minima*.


    The highest point in the whole curve is called *global maxima*, whereas the rest
    of them are called *local maxima*.


    The lowest point in the whole curve is called *global minima*, whereas the rest
    of them are called *local minima*.


    # Finding Minima


