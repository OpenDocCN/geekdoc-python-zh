    \ make a tuple:\n\n```python\nthistuple = tuple((\"apple\", \"banana\", \"cherry\"\
    )) # note the double round-brackets\nprint(thistuple)\n```\n\n## Python Collections\
    \ (Arrays)\n\nThere are four collection data types in the Python programming language:\n\
    \n- **List** is a collection which is ordered and changeable. Allows duplicate\
    \ members.\n- **Tuple** is a collection which is ordered and unchangeable. Allows\
    \ duplicate members.\n- **Set** is a collection which is unordered and unindexed.\
    \ No duplicate members.\n- **Dictionary** is a collection which is ordered* and\
    \ changeable. No duplicate members.\n\n*As of Python version 3.7, dictionaries\
    \ are *ordered*. In Python 3.6 and earlier, dictionaries are *unordered*.\n\n\
    When choosing a collection type, it is useful to understand the properties of\
    \ that type. Choosing the right type for a particular data set could mean retention\
    \ of meaning, and it could mean an increase in efficiency or security.\n\n## Python\
    \ - Access Tuple Items\n\n**Access Tuple Items**\n\nYou can access tuple items\
    \ by referring to the index number, inside square brackets:\n\n**Example**\n\n\
