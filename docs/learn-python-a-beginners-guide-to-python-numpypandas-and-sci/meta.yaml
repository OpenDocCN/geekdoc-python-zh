- img_proc: true
  md: "The example above would continue forever if you had enough next() statements,\
    \ or if it was used in a for loop.\n\nTo prevent the iteration to go on forever,\
    \ we can use the StopIteration statement.\n\nIn the __next__() method, we can\
    \ add a terminating condition to raise an error if the iteration is done a specified\
    \ number of times:\n\n# Example\n\nStop after 20 iterations:\n\n```\nclass MyNumbers:\n\
    \  def __iter__(self):\n    self.a = 1\n    return self\n\n  def __next__(self):\n\
    \    if self.a <= 20:\n      x = self.a\n      self.a += 1\n      return x\n \
    \   else:\n      raise StopIteration\n\nmyclass = MyNumbers()\nmyiter = iter(myclass)\n\
    \nfor x in myiter:\n  print(x)\n```\n\n# 30.Python Scope"
