- md: "## The range() Function\n\nTo loop through a set of code a specified number\
    \ of times, we can use the range() function.\n\nThe range() function returns a\
    \ sequence of numbers, starting from 0 by default, and increments by 1 (by default),\
    \ and ends at a specified number.\n\n### Example\n\nUsing the range() function:\n\
    \n```\nfor x in range(6):\n    print(x)\n```\n\nNote that range(6) is not the\
    \ values of 0 to 6, but the values 0 to 5.\n\nThe range() function defaults to\
    \ 0 as a starting value, however it is possible to specify the starting value\
    \ by adding a parameter: range(2, 6), which means values from 2 to 6 (but not\
    \ including 6).\n\n### Example\n\nUsing the start parameter:\n\n```\nfor x in\
    \ range(2, 6):\n    print(x)\n```\n\nThe range() function defaults to increment\
    \ the sequence by 1, however it is possible to specify the increment value by\
    \ adding a third parameter: range(2, 30, 3).\n\n### Example\n\nIncrement the sequence\
    \ with 3 (default is 1):\n\n```\nfor x in range(2, 30, 3):\n    print(x)\n```\n\
    \n## Else in For Loop\n\nThe else keyword in a for loop specifies a block of code\
    \ to be executed when the loop is finished.\n\n### Example\n\nPrint all numbers\
    \ from 0 to 5, and print a message when the loop has ended:\n\n```\nfor x in range(6):\n\
    \    print(x)\nelse:\n    print(\"Finally finished!\")\n```\n\n**Note:** The else\
    \ block will NOT be executed if the loop is stopped by a break statement.\n\n\
    ### Example\n\nBreak the loop when x is 3, and see what happens with the else\
    \ block:\n\n```\nfor x in range(6):\n    if x == 3: break\n    print(x)\nelse:\n\
    \    print(\"Finally finished!\")\n```\n\n## Nested Loops\n\nA nested loop is\
    \ a loop inside a loop.\n\nThe \"inner loop\" will be executed one time for each\
    \ iteration of the \"outer loop\".\n\n### Example\n\nPrint each adjective for\
    \ every fruit:\n\n```\nadj = [\"red\", \"big\", \"tasty\"]\nfruits = [\"apple\"\
    , \"banana\", \"cherry\"]\nfor x in adj:\n    for y in fruits:\n        print(x,\
    \ y)\n```\n\n## The pass Statement\n\nfor loops cannot be empty, but if you for\
    \ some reason have a for loop with no content, put in the pass statement to avoid\
    \ getting an error.\n\n### Example\n\n```\nfor x in [0, 1, 2]:\n    pass\n```\n\
    \n## 24. Python Arrays\n\n**Note:** Python does not have built-in support for\
    \ Arrays, but Python Lists can be used instead.\n\n### Arrays\n\n**Note:** This\
    \ page shows you how to use LISTS as ARRAYS, however, to work with arrays in Python\
    \ you will have to import a library, like the NumPy library.\n\nArrays are used\
    \ to store multiple values in one single variable.\n\n### Example\n\nCreate an\
    \ array containing car names:\n\n```\ncars = [\"Ford\", \"Volvo\", \"BMW\"]\n\
    ```\n\n### What is an Array?\n\nAn array is a special variable, which can hold\
    \ more than one value at a time.\nIf you have a list of items (a list of car names,\
    \ for example), storing the cars in single variables could look like this:\n\n\
    ```\ncar1 = \"Ford\"\ncar2 = \"Volvo\"\ncar3 = \"BMW\"\n```\n\nHowever, what if\
    \ you want to loop through the cars and find a specific one?\nAnd what if you\
    \ had not 3 cars, but 300?\nThe solution is an array!\nAn array can hold many\
    \ values under a single name, and you can access the values by referring to an\
    \ index number.\n\n### Access the Elements of an Array\n\nYou refer to an array\
    \ element by referring to the *index number*.\n\n### Example\n\nGet the value\
    \ of the first array item:\n\n```\nx = cars[0]\n```\n\n### Example\n\nModify the\
    \ value of the first array item:\n\n```\ncars[0] = \"Toyota\"\n```\n\n### The\
    \ Length of an Array\n\nUse the len() method to return the length of an array\
    \ (the number of elements in an array).\n\n### Example\n\nReturn the number of\
    \ elements in the cars array:\n\n```\nx = len(cars)\n```\n\n**Note:** The length\
    \ of an array is always one more than the highest array index.\n\n### Looping\
    \ Array Elements\n\nYou can use the for in loop to loop through all the elements\
    \ of an array.\n\n### Example\n\nPrint each item in the cars array:\n\n```\nfor\
    \ x in cars:\n    print(x)\n```\n\n### Adding Array Elements\n\nYou can use the\
    \ append() method to add an element to an array.\n\n### Example\n\nAdd one more\
    \ element to the cars array:\n\n```\ncars.append(\"Honda\")\n```\n\n### Removing\
    \ Array Elements\n\nYou can use the pop() method to remove an element from the\
    \ array.\n\n### Examples\n\nDelete the second element of the cars array:\n\n```\n\
    cars.pop(1)\n```\n\nYou can also use the remove() method to remove an element\
    \ from the array. Delete the element that has the value \"Volvo\":\n\n```\ncars.remove(\"\
    Volvo\")\n```\n\n**Note:** The list's remove() method only removes the first occurrence\
    \ of the specified value.\n\n### Array Methods\n\nPython has a set of built-in\
    \ methods that you can use on lists/arrays.\n\n| Method | Description |\n|---|---|\n\
    | append() | Adds an element at the end of the list |\n| clear() | Removes all\
    \ the elements from the list |\n| copy() | Returns a copy of the list |\n| count()\
    \ | Returns the number of elements with the specified value |\n| extend() | Add\
    \ the elements of a list (or any iterable), to the end of the current list |\n\
    | index() | Returns the index of the first element with the specified value |\n\
    | insert() | Adds an element at the specified position |\n| pop() | Removes the\
    \ element at the specified position |\n| remove() | Removes the first item with\
    \ the specified value |\n| reverse() | Reverses the order of the list |\n| sort()\
    \ | Sorts the list |\n\n## 25. Python Functions\n\nA function is a block of code\
    \ which only runs when it is called.\nYou can pass data, known as parameters,\
    \ into a function.\nA function can return data as a result.\n\n### Creating a\
    \ Function\n\nIn Python a function is defined using the def keyword.\n\n### Example\n\
    \n```\ndef my_function():\n    print(\"Hello from a function\")\n```\n\n### Calling\
    \ a Function\n\nTo call a function, use the function name followed by parenthesis.\n\
    \n### Example\n\n```\ndef my_function():\n    print(\"Hello from a function\"\
    )\n\nmy_function()\n```\n\n### Arguments\n\nInformation can be passed into functions\
    \ as arguments.\n\nArguments are specified after the function name, inside the\
    \ parentheses. You can add as many arguments as you want, just separate them with\
    \ a comma.\n\nThe following example has a function with one argument (fname).\
    \ When the function is called, we pass along a first name, which is used inside\
    \ the function to print the full name.\n\n### Example\n\n```\ndef my_function(fname):\n\
    \    print(fname + \" Refsnes\")\n```\n\n```\nmy_function(\"Emil\")\nmy_function(\"\
    Tobias\")\nmy_function(\"Linus\")\n```\n\n*Arguments* are often shortened to *args*\
    \ in Python documentations.\n\n### Parameters or Arguments?\n\nThe terms *parameter*\
    \ and *argument* can be used for the same thing: information that are passed into\
    \ a function.\n\nFrom a function's perspective:\n\nA parameter is the variable\
    \ listed inside the parentheses in the function definition.\n\nAn argument is\
    \ the value that is sent to the function when it is called.\n\n### Number of Arguments\n\
    \nBy default, a function must be called with the correct number of arguments.\n\
    \nMeaning that if your function expects 2 arguments, you have to call the function\
    \ with 2 arguments, not more, and not less.\n\n### Example\n\nThis function expects\
    \ 2 arguments, and gets 2 arguments:\n\n```\ndef my_function(fname, lname):\n\
    \    print(fname + \" \" + lname)\n```\n\n```\nmy_function(\"Emil\", \"Refsnes\"\
    )\n```\n\nIf you try to call the function with 1 or 3 arguments, you will get\
    \ an error.\n\n### Example\n\nThis function expects 2 arguments, but gets only\
    \ 1:\n\n```\ndef my_function(fname, lname):\n    print(fname + \" \" + lname)\n\
    ```\n\n```\nmy_function(\"Emil\")\n```\n\n### Arbitrary Arguments, *args\n\nIf\
    \ you do not know how many arguments that will be passed into your function, add\
    \ a * before the parameter name in the function definition.\n\nThis way the function\
    \ will receive a *tuple* of arguments, and can access the items accordingly.\n\
    \n### Example\n\nIf the number of arguments is unknown, add a * before the parameter\
    \ name:\n\n```\ndef my_function(*kids):\n    print(\"The youngest child is \"\
    \ + kids[2])\n```\n\n```\nmy_function(\"Emil\", \"Tobias\", \"Linus\")\n```\n\n\
    Arbitrary Arguments are often shortened to *args* in Python documentations.\n\n\
    ### Keyword Arguments\n\nYou can also send arguments with the *key = value* syntax.\n\
    This way the order of the arguments does not matter.\n\n### Example\n\n```\ndef\
    \ my_function(child3, child2, child1):\n    print(\"The youngest child is \" +\
    \ child3)\n```\n\n```\nmy_function(child1 = \"Emil\", child2 = \"Tobias\", child3\
    \ = \"Linus\")\n```\n\nThe phrase *Keyword Arguments* are often shortened to *kwargs*\
    \ in Python documentations.\n\n### Arbitrary Keyword Arguments, **kwargs\n\nIf\
    \ you do not know how many keyword arguments that will be passed into your function,\
    \ add two asterisk: ** before the parameter name in the function definition.\n\
    This way the function will receive a *dictionary* of arguments, and can access\
    \ the items accordingly.\n\n### Example\n\nIf the number of keyword arguments\
    \ is unknown, add a double ** before the parameter name:\n\n```\ndef my_function(**kid):\n\
    ```"
  mdcn: "## range() 函数\n\n要循环执行一段代码指定次数，我们可以使用 `range()` 函数。\n\n`range()` 函数返回一个数字序列，默认从\
    \ 0 开始，默认递增 1，并在指定的数字处结束。\n\n### 示例\n\n使用 `range()` 函数：\n\n```\nfor x in range(6):\n\
    \    print(x)\n```\n\n请注意，`range(6)` 的值不是 0 到 6，而是 0 到 5。\n\n`range()` 函数默认以 0\
