    # 36. Python PIP\n\n## 什么是 PIP？\n\nPIP 是一个 Python 包管理器，或者你喜欢的话，也可以叫模块管理器。\n**注意：**\
    \ 如果你使用的是 Python 3.4 或更高版本，PIP 默认已包含在内。\n\n## 什么是包？\n\n一个包包含模块所需的所有文件。\n模块是你可以在项目中包含的\
    \ Python 代码库。\n\n## 检查 PIP 是否已安装\n\n将你的命令行导航到 Python 脚本目录的位置，然后输入以下内容：\n\n###\
