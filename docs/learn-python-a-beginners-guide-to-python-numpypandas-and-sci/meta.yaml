    \        for z in y:\n            print(z)\n```\n\n### 使用nditer()迭代数组\n\n函数nditer()是一个辅助函数，可用于从非常基础到非常高级的迭代。它解决了我们在迭代中遇到的一些基本问题，让我们通过示例来了解它。\n\
