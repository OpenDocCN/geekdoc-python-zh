    \    return 5 * x\n\nprint(my_function(3))\nprint(my_function(5))\nprint(my_function(9))\n\
    ```\n\n## The pass Statement\n\nfunction definitions cannot be empty, but if you\
    \ for some reason have a function definition with no content, put in the pass\
