    # Special Sequences


    A special sequence is a \ followed by one of the characters in the list below,
    and has a special meaning:


    | Character | Description | Example |

    | :--- | :--- | :--- |

    | \A | Returns a match if the specified characters are at the beginning of the
    string | "\AThe" |

    | \b | Returns a match where the specified characters are at the beginning or
    at the end of a word (the "r" in the beginning is making sure that the string
    is being treated as a "raw string") | r"\bain"<br>r"ain\b" |

    | \B | Returns a match where the specified characters are present, but NOT at
    the beginning (or at the end) of a word (the "r" in the beginning is making sure
    that the string is being treated as a "raw string" | r"\Bain"<br>r"ain\B" |

    | \d | Returns a match where the string contains digits (numbers from 0-9) | "\d"
    |

    | \D | Returns a match where the string DOES NOT contain digits | "\D" |

    | \s | Returns a match where the string contains a white space character | "\s"
    |

    | \S | Returns a match where the string DOES NOT contain a white space character
    | "\S" |

    | \w | Returns a match where the string contains any word characters (characters
    from a to Z, digits from 0-9, and the underscore _ character) | "\w" |

    | \W | Returns a match where the string DOES NOT contain any word characters |
    "\W" |'
