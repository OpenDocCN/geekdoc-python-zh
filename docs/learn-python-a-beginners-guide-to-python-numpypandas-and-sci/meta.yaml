    #### 随机分布


    随机分布是一组遵循特定*概率密度函数*的随机数。


    **概率密度函数：** 描述连续概率的函数。即数组中所有值的概率。


    我们可以使用 random 模块的 choice() 方法基于定义的概率生成随机数。


    choice() 方法允许我们为每个值指定概率。


