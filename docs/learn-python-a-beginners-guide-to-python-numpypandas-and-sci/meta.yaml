- md: "## Sort Descending\n\nTo sort descending, use the keyword argument `reverse\
    \ = True`:\n\n**Example**\nSort the list descending:\n\n```python\nthislist =\
    \ [\"orange\", \"mango\", \"kiwi\", \"pineapple\", \"banana\"]\nthislist.sort(reverse\
    \ = True)\nprint(thislist)\n```\n\n**Example**\nSort the list descending:\n\n\
    ```python\nthislist = [100, 50, 65, 82, 23]\nthislist.sort(reverse = True)\nprint(thislist)\n\
    ```\n\n## Customize Sort Function\n\nYou can also customize your own function\
    \ by using the keyword argument `key = *function*`.\nThe function will return\
    \ a number that will be used to sort the list (the lowest number first):\n\n**Example**\n\
    Sort the list based on how close the number is to 50:\n\n```python\ndef myfunc(n):\n\
    \  return abs(n - 50)\n\nthislist = [100, 50, 65, 82, 23]\nthislist.sort(key =\
    \ myfunc)\nprint(thislist)\n```\n\n## Case Insensitive Sort\n\nBy default the\
    \ `sort()` method is case sensitive, resulting in all capital letters being sorted\
    \ before lower case letters:\n\n**Example**\nCase sensitive sorting can give an\
    \ unexpected result:\n\n```python\nthislist = [\"banana\", \"Orange\", \"Kiwi\"\
    , \"cherry\"]\nthislist.sort()\nprint(thislist)\n```\n\nLuckily we can use built-in\
    \ functions as key functions when sorting a list.\nSo if you want a case-insensitive\
    \ sort function, use `str.lower` as a key function:\n\n**Example**\n**Perform\
    \ a case-insensitive sort of the list:**\n\n```python\nthislist = [\"banana\"\
    , \"Orange\", \"Kiwi\", \"cherry\"]\nthislist.sort(key = str.lower)\nprint(thislist)\n\
    ```\n\n## Reverse Order\n\nWhat if you want to reverse the order of a list, regardless\
    \ of the alphabet?\nThe `reverse()` method reverses the current sorting order\
    \ of the elements.\n\n**Example**\nReverse the order of the list items:\n\n```python\n\
    thislist = [\"banana\", \"Orange\", \"Kiwi\", \"cherry\"]\nthislist.reverse()\n\
    print(thislist)\n```\n\n## Python - Copy Lists\n\n### Copy a List\n\nYou cannot\
    \ copy a list simply by typing `list2 = list1`, because: `list2` will only be\
    \ a *reference* to `list1`, and changes made in `list1` will automatically also\
    \ be made in `list2`.\n\nThere are ways to make a copy, one way is to use the\
    \ built-in List method `copy()`.\n\n**Example**\nMake a copy of a list with the\
    \ `copy()` method:\n\n```python\nthislist = [\"apple\", \"banana\", \"cherry\"\
    ]\nmylist = thislist.copy()\nprint(mylist)\n```\n\nAnother way to make a copy\
    \ is to use the built-in method `list()`.\n\n**Example**\nMake a copy of a list\
    \ with the `list()` method:\n\n```python\nthislist = [\"apple\", \"banana\", \"\
    cherry\"]\nmylist = list(thislist)\nprint(mylist)\n```\n\n## Python - Join Lists\n\
    \n### Join Two Lists\n\nThere are several ways to join, or concatenate, two or\
    \ more lists in Python.\nOne of the easiest ways is by using the `+` operator.\n\
    \n**Example**\nJoin two list:\n\n```python\nlist1 = [\"a\", \"b\", \"c\"]\nlist2\
