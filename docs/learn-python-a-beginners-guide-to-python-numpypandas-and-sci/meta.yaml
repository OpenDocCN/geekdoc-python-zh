- md: "## 15. Python Sets\n\n```python\nmyset = {\"apple\", \"banana\", \"cherry\"\
    }\n```\n\n## Set\n\nSets are used to store multiple items in a single variable.\n\
    \nSet is one of 4 built-in data types in Python used to store collections of data,\
