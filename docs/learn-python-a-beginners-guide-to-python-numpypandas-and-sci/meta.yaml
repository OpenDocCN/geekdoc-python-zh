    ### 差异


    离散差分是指连续两个元素相减。

    例如，对于 [1, 2, 3, 4]，离散差分为 [2-1, 3-2, 4-3] = [1, 1, 1]。

    要计算离散差分，请使用 `diff()` 函数。


    **示例**

    计算以下数组的离散差分：


    ```

    import numpy as np

    arr = np.array([10, 15, 25, 5])

    newarr = np.diff(arr)

    print(newarr)

    ```


    **返回：** [5 10 -20]，因为 15-10=5，25-15=10，5-25=-20。

    我们可以通过提供参数 `n` 来重复执行此操作。


    例如，对于 [1, 2, 3, 4]，当 `n = 2` 时，离散差分为 [2-1, 3-2, 4-3] = [1, 1, 1]，然后，由于 `n=2`，我们将再执行一次，得到新结果：[1-1,
    1-1] = [0, 0]。


