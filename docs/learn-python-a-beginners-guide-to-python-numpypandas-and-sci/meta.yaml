    **Example**

    Find the product of the elements of this array:


    ```python

    import numpy as np

    arr = np.array([1, 2, 3, 4])

    x = np.prod(arr)

    print(x)

    ```


    Returns: 24 because 1*2*3*4 = 24


    ## Example


