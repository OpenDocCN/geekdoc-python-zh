    上面的示例将返回 `[3.33333333 4. 3. 5. 25. 1.81818182]`，这是 10/3、20/5、30/10 等的结果。


    ## 幂运算


    `power()` 函数将第一个数组的值提升到第二个数组的值的幂，并将结果返回到一个新数组中。


    ## 示例


    将 `arr1` 中的值提升到 `arr2` 中的值的幂：


    ```python

    import numpy as np


    arr1 = np.array([10, 20, 30, 40, 50, 60])

    arr2 = np.array([3, 5, 6, 8, 2, 33])


    newarr = np.power(arr1, arr2)


    print(newarr)

    ```


    上面的示例将返回 `[1000 3200000 729000000 6553600000000 2500 0]`，这是 10*10*10、20*20*20*20*20、30*30*30*30*30*30
