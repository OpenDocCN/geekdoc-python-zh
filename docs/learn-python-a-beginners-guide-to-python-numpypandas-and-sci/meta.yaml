    \ know what item that gets removed.\n\nThe return value of the pop() method is\
    \ the removed item.\n\n**Example**\nRemove the last item by using the pop() method:\n\
    \n```python\nthisset = {\"apple\", \"banana\", \"cherry\"}\nx = thisset.pop()\n\
    print(x)\nprint(thisset)\n```\n\n**Note:** Sets are *unordered*, so when using\
    \ the pop() method, you do not know which item that gets removed.\n\n**Example**\n\
    The clear() method empties the set:\n\n```python\nthisset = {\"apple\", \"banana\"\
    , \"cherry\"}\nthisset.clear()\nprint(thisset)\n```\n\n**Example**\nThe del keyword\
    \ will delete the set completely:\n\n```python\nthisset = {\"apple\", \"banana\"\
    , \"cherry\"}\ndel thisset\nprint(thisset)\n```\n\n## Python - Loop Sets\n\n###\
    \ Loop Items\n\nYou can loop through the set items by using a for loop:\n\n**Example**\n\
