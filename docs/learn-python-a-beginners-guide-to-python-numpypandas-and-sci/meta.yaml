    \nNote: Both union() and update() will exclude any duplicate items.\n\n### Keep\
    \ ONLY the Duplicates\n\nThe intersection_update() method will keep only the items\
    \ that are present in both sets.\n\n**Example**\nKeep the items that exist in\
    \ both set x, and set y:\n\n```python\nx = {\"apple\", \"banana\", \"cherry\"\
    }\ny = {\"google\", \"microsoft\", \"apple\"}\nx.intersection_update(y)\nprint(x)\n\
    ```\n\nThe intersection() method will return a *new* set that only contains the\
    \ items that are present in both sets.\n\n**Example**\nReturn a set that contains\
    \ the items that exist in both set x, and set y:\n\n```python\nx = {\"apple\"\
    , \"banana\", \"cherry\"}\ny = {\"google\", \"microsoft\", \"apple\"}\nz = x.intersection(y)\n\
    print(z)\n```\n\n### Keep All, But NOT the Duplicates\n\nThe symmetric_difference_update()\
    \ method will keep only the elements that are NOT present in both sets.\n\n**Example**\n\
    Keep the items that are not present in both sets:\n\n```python\nx = {\"apple\"\
