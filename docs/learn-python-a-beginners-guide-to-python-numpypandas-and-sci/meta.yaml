    \ |\n| `math.tau` | 返回 tau (6.2831...) |\n\n### 数学方法\n\n**`math.acos()`** 返回一个数字的反余弦值\n\
    \n**`math.acosh()`** 返回一个数字的反双曲余弦值\n\n**`math.asin()`** 返回一个数字的反正弦值\n\n**`math.asinh()`**\
    \ 返回一个数字的反双曲正弦值\n\n**`math.atan()`** 返回一个数字的反正切值（以弧度为单位）\n\n**`math.atan2()`**\
