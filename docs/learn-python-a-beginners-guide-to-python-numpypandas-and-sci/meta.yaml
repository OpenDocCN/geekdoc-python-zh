    # Minimizing a Function


    A function, in this context, represents a curve, curves have *high points* and
    *low points*.


    High points are called *maxima*.


    Low points are called *minima*.


    The highest point in the whole curve is called *global maxima*, whereas the rest
    of them are called *local maxima*.


    The lowest point in the whole curve is called *global minima*, whereas the rest
    of them are called *local minima*.


    # Finding Minima


    We can use scipy.optimize.minimize() function to minimize the function.


    The minimize() function takes the following arguments:


    ***fun*** - a function representing an equation.


    ***x0*** - an initial guess for the root.


    ***method*** - name of the method to use. Legal values:


    +   - ''CG''

    - ''BFGS''

    - ''Newton-CG'''
