    \ 参数：\n\n```\nfor x in range(2, 6):\n    print(x)\n```\n\n`range()` 函数默认以 1 递增序列，但可以通过添加第三个参数来指定递增值：`range(2,\
    \ 30, 3)`。\n\n### 示例\n\n以 3 递增序列（默认为 1）：\n\n```\nfor x in range(2, 30, 3):\n \
    \   print(x)\n```\n\n## For 循环中的 Else\n\n`for` 循环中的 `else` 关键字指定循环完成后要执行的代码块。\n\
    \n### 示例\n\n打印从 0 到 5 的所有数字，并在循环结束时打印一条消息：\n\n```\nfor x in range(6):\n    print(x)\n\
    else:\n    print(\"Finally finished!\")\n```\n\n**注意：** 如果循环被 `break` 语句停止，则 `else`\
    \ 代码块将**不会**执行。\n\n### 示例\n\n当 x 为 3 时中断循环，并查看 `else` 代码块会发生什么：\n\n```\nfor x\
    \ in range(6):\n    if x == 3: break\n    print(x)\nelse:\n    print(\"Finally\
    \ finished!\")\n```\n\n## 嵌套循环\n\n嵌套循环是循环内部的循环。\n\n“内层循环”将针对“外层循环”的每次迭代执行一次。\n\
    \n### 示例\n\n为每种水果打印每种形容词：\n\n```\nadj = [\"red\", \"big\", \"tasty\"]\nfruits\
    \ = [\"apple\", \"banana\", \"cherry\"]\nfor x in adj:\n    for y in fruits:\n\
    \        print(x, y)\n```\n\n## pass 语句\n\n`for` 循环不能为空，但如果您出于某种原因需要一个没有内容的 `for`\
    \ 循环，请使用 `pass` 语句来避免错误。\n\n### 示例\n\n```\nfor x in [0, 1, 2]:\n    pass\n```\n\
    \n## 24. Python 数组\n\n**注意：** Python 没有内置的数组支持，但可以使用 Python 列表来代替。\n\n### 数组\n\
    \n**注意：** 本页展示如何将列表用作数组，但是，要在 Python 中使用数组，您需要导入一个库，例如 NumPy 库。\n\n数组用于在一个变量中存储多个值。\n\
    \n### 示例\n\n创建一个包含汽车名称的数组：\n\n```\ncars = [\"Ford\", \"Volvo\", \"BMW\"]\n```\n\
    \n### 什么是数组？\n\n数组是一种特殊的变量，可以一次保存多个值。\n如果您有一个项目列表（例如汽车名称列表），将汽车存储在单个变量中可能如下所示：\n\
    \n```\ncar1 = \"Ford\"\ncar2 = \"Volvo\"\ncar3 = \"BMW\"\n```\n\n但是，如果您想循环遍历汽车并找到特定的一辆怎么办？\n\
    如果您不是有 3 辆车，而是有 300 辆呢？\n解决方案是数组！\n数组可以在一个名称下保存多个值，您可以通过引用索引号来访问这些值。\n\n### 访问数组元素\n\
    \n您通过引用*索引号*来引用数组元素。\n\n### 示例\n\n获取第一个数组项的值：\n\n```\nx = cars[0]\n```\n\n###\
    \ 示例\n\n修改第一个数组项的值：\n\n```\ncars[0] = \"Toyota\"\n```\n\n### 数组的长度\n\n使用 `len()`\
    \ 方法返回数组的长度（数组中的元素数量）。\n\n### 示例\n\n返回 `cars` 数组中的元素数量：\n\n```\nx = len(cars)\n\
    ```\n\n**注意：** 数组的长度总是比最高数组索引大 1。\n\n### 循环数组元素\n\n您可以使用 `for in` 循环来遍历数组的所有元素。\n\
    \n### 示例\n\n打印 `cars` 数组中的每个项目：\n\n```\nfor x in cars:\n    print(x)\n```\n\n\
    ### 添加数组元素\n\n您可以使用 `append()` 方法向数组添加元素。\n\n### 示例\n\n向 `cars` 数组添加一个元素：\n\n\
    ```\ncars.append(\"Honda\")\n```\n\n### 删除数组元素\n\n您可以使用 `pop()` 方法从数组中删除元素。\n\n\
    ### 示例\n\n删除 `cars` 数组的第二个元素：\n\n```\ncars.pop(1)\n```\n\n您也可以使用 `remove()` 方法从数组中删除元素。删除值为\
