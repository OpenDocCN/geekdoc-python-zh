- md: "## 41. Pandas Tutorial\n\nPandas is a Python library.\nPandas is used to analyze\
    \ data.\n\n### Learning by Reading\n\nWe have created 14 tutorial pages for you\
    \ to learn more about Pandas.\nStarting with a basic introduction and ends up\
    \ with cleaning and plotting data:\n\n### Basic\n\n- Introduction\n- Getting Started\n\
    - Pandas Series\n- DataFrames\n- Read CSV\n- Read JSON\n- Analyze Data\n\n###\
    \ Cleaning Data\n\n- Clean Data\n- Clean Empty Cells\n- Clean Wrong Format\n-\
    \ Clean Wrong Data\n- Remove Duplicates\n\n### Advanced\n\n- Correlations\n- Plotting\n\
    \n## Pandas Introduction\n\n### What is Pandas?\n\nPandas is a Python library\
    \ used for working with data sets.\n\nIt has functions for analyzing, cleaning,\
    \ exploring, and manipulating data.\n\nThe name \"Pandas\" has a reference to\
    \ both \"Panel Data\", and \"Python Data Analysis\" and was created by Wes McKinney\
    \ in 2008.\n\n### Why Use Pandas?\n\nPandas allows us to analyze big data and\
    \ make conclusions based on statistical theories.\n\nPandas can clean messy data\
    \ sets, and make them readable and relevant.\n\nRelevant data is very important\
    \ in data science.\n\n**Data Science:** is a branch of computer science where\
    \ we study how to store, use and analyze data for deriving information from it.\n\
    \n### What Can Pandas Do?\n\nPandas gives you answers about the data. Like:\n\n\
    - Is there a correlation between two or more columns?\n- What is the average value?\n\
    - Max value?\n- Min value?\n\nPandas are also able to delete rows that are not\
    \ relevant, or contain wrong values, like empty or NULL values. This is called\
    \ *cleaning* the data.\n\n### Where is the Pandas Codebase?\n\nThe source code\
    \ for Pandas is located at this github repository [https://github.com/pandas-dev/pandas](https://github.com/pandas-dev/pandas)\n\
    \n**github:** enables many people to work on the same codebase.\n\n## Pandas Getting\
    \ Started\n\n### Installation of Pandas\n\nIf you have Python and PIP already\
    \ installed on a system, then installation of Pandas is very easy.\n\nInstall\
    \ it using this command:\n\n```\nC:\\Users\\Your Name>pip install pandas\n```\n\
    \nIf this command fails, then use a python distribution that already has Pandas\
    \ installed like Anaconda, Spyder etc.\n\n### Import Pandas\n\nOnce Pandas is\
    \ installed, import it in your applications by adding the import keyword:\n\n\
    ```\nimport pandas\n```\n\nNow Pandas are imported and ready to use.\n\n**Example**\n\
    \n```\nimport pandas\n\nmydataset = {\n  'cars': [\"BMW\", \"Volvo\", \"Ford\"\
    ],\n  'passings': [3, 7, 2]\n}\nmyvar = pandas.DataFrame(mydataset)\nprint(myvar)\n\
    ```\n\n### Pandas as pd\n\nPandas is usually imported under the pd alias.\n**alias:**\
    \ In Python aliases are an alternate name for referring to the same thing.\nCreate\
    \ an alias with the as keyword while importing:\n\n```\nimport pandas as pd\n\
    ```\n\nNow the Pandas package can be referred to as pd instead of pandas.\n\n\
    **Example**\n\n```\nimport pandas as pd\nmydataset = {\n  'cars': [\"BMW\", \"\
    Volvo\", \"Ford\"],\n  'passings': [3, 7, 2]\n}\nmyvar = pd.DataFrame(mydataset)\n\
    print(myvar)\n```\n\n### Checking Pandas Version\n\nThe version string is stored\
    \ under __version__ attribute.\n\n**Example**\n\n```\nimport pandas as pd\nprint(pd.__version__)\n\
    ```\n\n## Pandas Series\n\n### What is a Series?\n\nA Pandas Series is like a\
    \ column in a table.\nIt is a one-dimensional array holding data of any type.\n\
    \n### Example\n\nCreate a simple Pandas Series from a list:\n\n```\nimport pandas\
    \ as pd\n\na = [1, 7, 2]\n\nmyvar = pd.Series(a)\n\nprint(myvar)\n```\n\n### Labels\n\
    \nIf nothing else is specified, the values are labeled with their index number.\n\
    First value has index 0, second value has index 1 etc.\n\nThis label can be used\
    \ to access a specified value.\n\n### Example\n\nReturn the first value of the\
    \ Series:\n\n```\nprint(myvar[0])\n```\n\n### Create Labels\n\nWith the index\
    \ argument, you can name your own labels.\n\n### Example\n\nCreate your own labels:\n\
    \n```\nimport pandas as pd\n\na = [1, 7, 2]\n\nmyvar = pd.Series(a, index = [\"\
    x\", \"y\", \"z\"])\n\nprint(myvar)\n```\n\nWhen you have created labels, you\
    \ can access an item by referring to the label.\n\n### Example\n\nReturn the value\
    \ of \"y\":\n\n```\nprint(myvar[\"y\"])\n```\n\n### Key/Value Objects as Series\n\
    \nYou can also use a key/value object, like a dictionary, when creating a Series.\n\
    \n### Example\n\nCreate a simple Pandas Series from a dictionary:\n\n```\nimport\
    \ pandas as pd\n\ncalories = {\"day1\": 420, \"day2\": 380, \"day3\": 390}\n\n\
    myvar = pd.Series(calories)\n\nprint(myvar)\n```\n\n**Note:** The keys of the\
    \ dictionary become the labels.\n\nTo select only some of the items in the dictionary,\
    \ use the index argument and specify only the items you want to include in the\
    \ Series.\n\n### Example\n\nCreate a Series using only data from \"day1\" and\
    \ \"day2\":\n\n```\nimport pandas as pd\n\ncalories = {\"day1\": 420, \"day2\"\
    : 380, \"day3\": 390}\n\nmyvar = pd.Series(calories, index = [\"day1\", \"day2\"\
    ])\n\nprint(myvar)\n```\n\n## DataFrames\n\nDatasets in Pandas are usually multi-dimensional\
    \ tables, called DataFrames.\nSeries is like a column, a DataFrame is the whole\
    \ table.\n\n**Example**\nCreate a DataFrame from two Series:\n\n```\nimport pandas\
    \ as pd\n\ndata = {\n    \"calories\": [420, 380, 390],\n    \"duration\": [50,\
    \ 40, 45]\n}\n\nmyvar = pd.DataFrame(data)\n\nprint(myvar)\n```\n\n## Pandas DataFrames\n\
    \n### What is a DataFrame?\n\nA Pandas DataFrame is a 2 dimensional data structure,\
    \ like a 2 dimensional array, or a table with rows and columns.\n\n### Example\n\
    \nCreate a simple Pandas DataFrame:\n\n```\nimport pandas as pd\n\ndata = {\n\
    \    \"calories\": [420, 380, 390],\n    \"duration\": [50, 40, 45]\n}\n\n#load\
    \ data into a DataFrame object:\n\ndf = pd.DataFrame(data)\n\nprint(df)\n```\n\
    \n### Result\n\n```\ncalories  420\nduration  50\nName: 0, dtype: int64\n```\n\
    \n### Locate Row\n\nAs you can see from the result above, the DataFrame is like\
    \ a table with rows and columns.\n\nPandas use the loc attribute to return one\
    \ or more specified row(s)\n\n### Example\n\nReturn row 0:\n\n```\n#refer to the\
    \ row index:\n\nprint(df.loc[0])\n```\n\n### Result\n\n| | calories | duration\
    \ |\n|---|---|---|\n| 0 | 420 | 50 |\n| 1 | 380 | 40 |\n\n**Note:** This example\
    \ returns a Pandas **Series**.\n\n### Example\n\nReturn row 0 and 1:\n\n```\n\
    #use a list of indexes:\nprint(df.loc[[0, 1]])\n```\n\n### Result\n\n| | calories\
    \ | duration |\n|---|---|---|\n| day1 | 420 | 50 |\n| day2 | 380 | 40 |\n| day3\
    \ | 390 | 45 |\n\n**Note:** When using [], the result is a Pandas **DataFrame**.\n\
    \n### Locate Named Indexes\n\nUse the named index in the loc attribute to return\
    \ the specified row(s).\n\n### Example\n\nReturn \"day2\":\n\n```\n#refer to the\
    \ named index:\nprint(df.loc[\"day2\"])\n```\n\n### Result\n\n```\ncalories 380\n\
    duration 40\nName: 0, dtype: int64\n```\n\n### Load Files Into a DataFrame\n\n\
    If your data sets are stored in a file, Pandas can load them into a DataFrame.\n\
    \n**Example**\nLoad a comma separated file (CSV file) into a DataFrame:\n\n```\n\
    import pandas as pd\ndf = pd.read_csv('data.csv')\nprint(df)\n```\n\n## Pandas\
    \ Read CSV\n\n### Read CSV Files\n\nA simple way to store big data sets is to\
    \ use CSV files (comma separated files).\nCSV files contain plain text and is\
    \ a well known format that can be read by everyone including Pandas.\nIn our examples\
    \ we will be using a CSV file called 'data.csv'.\n**Download data.csv.** or **Open\
    \ data.csv**\n\n**Example**\nLoad the CSV into a DataFrame:\n\n```\nimport pandas\
    \ as pd\n\ndf = pd.read_csv('data.csv')\nprint(df.to_string())\n```\n\n**Tip:**\
    \ use to_string() to print the entire DataFrame.\n\nBy default, when you print\
    \ a DataFrame, you will only get the first 5 rows, and the last 5 rows:\n\n**Example**\n\
    \nPrint a reduced sample:\n\n```\nimport pandas as pd\ndf = pd.read_csv('data.csv')\n\
    print(df)\n```\n\n## Pandas Read JSON\n\n### Read JSON\n\nBig data sets are often\
    \ stored, or extracted as JSON.\nJSON is plain text, but has the format of an\
    \ object, and is well known in the world of programming, including Pandas.\nIn\
    \ our examples we will be using a JSON file called 'data.json'.\nOpen data.json.\n\
    \n**Example**\n\nLoad the JSON file into a DataFrame:\n\n```\nimport pandas as\
    \ pd\ndf = pd.read_json('data.json')\nprint(df.to_string())\n```\n\n**Tip:** use\
    \ to_string() to print the entire DataFrame.\n\n### Dictionary as JSON\n\n**JSON\
    \ = Python Dictionary**\n\nJSON objects have the same format as Python dictionaries.\n\
    If your JSON code is not in a file, but in a Python Dictionary, you can load it"
  mdcn: "## 41. Pandas 教程\n\nPandas 是一个 Python 库。\nPandas 用于分析数据。\n\n### 通过阅读学习\n\n\
    我们为你创建了 14 个教程页面，以便你更深入地了解 Pandas。\n从基础介绍开始，最后讲解数据清理和绘图：\n\n### 基础\n\n- 简介\n-\
    \ 入门\n- Pandas Series\n- DataFrames\n- 读取 CSV\n- 读取 JSON\n- 分析数据\n\n### 数据清理\n\
    \n- 清理数据\n- 清理空单元格\n- 清理错误格式\n- 清理错误数据\n- 删除重复项\n\n### 高级\n\n- 相关性\n- 绘图\n\n##\
    \ Pandas 简介\n\n### 什么是 Pandas？\n\nPandas 是一个用于处理数据集的 Python 库。\n\n它提供了用于分析、清理、探索和操作数据的函数。\n\
    \n“Pandas”这个名字既指“面板数据”，也指“Python 数据分析”，由 Wes McKinney 于 2008 年创建。\n\n### 为什么使用\
    \ Pandas？\n\nPandas 允许我们分析大数据，并基于统计理论得出结论。\n\nPandas 可以清理混乱的数据集，使其变得可读且相关。\n\n\
    相关数据在数据科学中非常重要。\n\n**数据科学：** 是计算机科学的一个分支，我们研究如何存储、使用和分析数据以从中提取信息。\n\n### Pandas\
    \ 能做什么？\n\nPandas 可以回答关于数据的问题。例如：\n\n- 两个或多个列之间是否存在相关性？\n- 平均值是多少？\n- 最大值？\n-\
    \ 最小值？\n\nPandas 还能删除不相关或包含错误值（如空值或 NULL 值）的行。这被称为*清理*数据。\n\n### Pandas 的代码库在哪里？\n\
    \nPandas 的源代码位于此 GitHub 仓库 [https://github.com/pandas-dev/pandas](https://github.com/pandas-dev/pandas)\n\
    \n**GitHub：** 使许多人能够在同一个代码库上工作。\n\n## Pandas 入门\n\n### 安装 Pandas\n\n如果你的系统上已经安装了\
    \ Python 和 PIP，那么安装 Pandas 非常容易。\n\n使用此命令安装：\n\n```\nC:\\Users\\Your Name>pip\
    \ install pandas\n```\n\n如果此命令失败，请使用已预装 Pandas 的 Python 发行版，如 Anaconda、Spyder\
    \ 等。\n\n### 导入 Pandas\n\n安装 Pandas 后，通过添加 import 关键字在你的应用程序中导入它：\n\n```\nimport\
    \ pandas\n```\n\n现在 Pandas 已导入并准备就绪。\n\n**示例**\n\n```\nimport pandas\n\nmydataset\
    \ = {\n  'cars': [\"BMW\", \"Volvo\", \"Ford\"],\n  'passings': [3, 7, 2]\n}\n\
    myvar = pandas.DataFrame(mydataset)\nprint(myvar)\n```\n\n### Pandas 作为 pd\n\n\
    Pandas 通常以 pd 别名导入。\n**别名：** 在 Python 中，别名是用于引用同一事物的替代名称。\n在导入时使用 as 关键字创建别名：\n\
    \n```\nimport pandas as pd\n```\n\n现在 Pandas 包可以被称为 pd 而不是 pandas。\n\n**示例**\n\
    \n```\nimport pandas as pd\nmydataset = {\n  'cars': [\"BMW\", \"Volvo\", \"Ford\"\
    ],\n  'passings': [3, 7, 2]\n}\nmyvar = pd.DataFrame(mydataset)\nprint(myvar)\n\
    ```\n\n### 检查 Pandas 版本\n\n版本字符串存储在 `__version__` 属性下。\n\n**示例**\n\n```\nimport\
    \ pandas as pd\nprint(pd.__version__)\n```\n\n## Pandas Series\n\n### 什么是 Series？\n\
    \nPandas Series 就像表格中的一列。\n它是一个一维数组，可以保存任何类型的数据。\n\n### 示例\n\n从列表创建一个简单的 Pandas\
