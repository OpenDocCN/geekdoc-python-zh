    , \"cherry\")\nprint(thistuple[1])\n```\n\n**Note:** The first item has index\
    \ 0.\n\n**Negative Indexing**\n\nNegative indexing means starting from the end.\n\
    \n`-1` refers to the last item, `-2` refers to the second last item etc.\n\n**Example**\n\
    \nPrint the last item of the tuple:\n\n```python\nthistuple = (\"apple\", \"banana\"\
    , \"cherry\")\nprint(thistuple[-1])\n```\n\n**Range of Indexes**"
