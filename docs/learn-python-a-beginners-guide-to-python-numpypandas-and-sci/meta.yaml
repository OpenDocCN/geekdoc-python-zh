    \ Test?\n\nIn statistics, statistical significance means that the result that\
    \ was produced has a reason behind it, it was not produced randomly, or by chance.\n\
    \nSciPy provides us with a module named scipy.stats, which has functions for performing\
    \ statistical significance tests.\n\nHere are some techniques and keywords that\
    \ are important when performing such tests.\n\n## Hypothesis in Statistics\n\n\
    Hypothesis is an assumption about a parameter in population.\n\n## Null Hypothesis\n\
    \nIt assumes that the observation is not statistically significant.\n\n## Alternate\
    \ Hypothesis\n\nIt assumes that the observations are due to some reason.\n\nIt's\
    \ an alternative to Null Hypothesis.\n\n## Example:\n\nFor an assessment of a\
    \ student we would take:\n\n\"student is worse than average\" - as a null hypothesis,\
    \ and:\n\n\"student is better than average\" - as an alternate hypothesis.\n\n\
    ## One tailed test\n\nWhen our hypothesis is testing for one side of the value\
    \ only, it is called \"one tailed test\".\n\n## Example:\n\nFor the null hypothesis:\n\
    \"the mean is equal to k\", we can have alternate hypothesis:\n\"the mean is less\
    \ than k\", or:\n\"the mean is greater than k\"\n\n## Two tailed test\n\nWhen\
    \ our hypothesis is tested for both sides of the values.\n\n## Example:\n\nFor\
    \ the null hypothesis:\n\"the mean is equal to k\", we can have alternate hypothesis:\n\
    \"the mean is not equal to k\"\nIn this case the mean is less than, or greater\
    \ than k, and both sides are to be checked.\n\n## Alpha value\n\nAlpha value is\
    \ the level of significance.\n\n## Example:\n\nHow close to extremes the data\
    \ must be for null hypothesis to be rejected.\nIt is usually taken as 0.01, 0.05,\
    \ or 0.1.\n\n## P value\n\nP value tells how close to extreme the data actually\
    \ is.\nP value and alpha values are compared to establish statistical significance.\n\
    If p value <= alpha we reject the null hypothesis and say that the data is statistically\
    \ significant. otherwise we accept the null hypothesis.\n\n## T-Test\n\nT-tests\
    \ are used to determine if there is significant difference between means of two\
    \ variables. and lets us know if they belong to the same distribution.\n\nIt is\
    \ a two tailed test.\n\nThe function ttest_ind() takes two samples of the same\
    \ size and produces a tuple of t-statistic and p-value.\n\n## Example\n\nFind\
    \ if the given values v1 and v2 are from same distribution:\n\n```\nimport numpy\
