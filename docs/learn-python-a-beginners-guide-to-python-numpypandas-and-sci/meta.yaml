    ### SciPy Introduction


    #### What is SciPy?


    SciPy is a scientific computation library that uses NumPy underneath.


    SciPy stands for Scientific Python.


    It provides more utility functions for optimization, stats and signal processing.


    Like NumPy, SciPy is open source so we can use it freely.


    SciPy was created by NumPy''s creator Travis Olliphant.


    #### Why Use SciPy?


    If SciPy uses NumPy underneath, why can we not just use NumPy?


    SciPy has optimized and added functions that are frequently used in NumPy and
    Data Science.


    ## Which Language is SciPy Written in?


    SciPy is predominantly written in Python, but a few segments are written in C.


    ## Where is the SciPy Codebase?


    The source code for SciPy is located at this github repository [https://github.com/scipy/scipy](https://github.com/scipy/scipy)


    **github:** enables many people to work on the same codebase.


    ## SciPy Getting Started


    ## Installation of SciPy


    If you have Python and PIP already installed on a system, then installation of
    SciPy is very easy.


    Install it using this command:


    ```

    C:\Users\Your Name>pip install scipy

    ```


    If this command fails, then use a Python distribution that already has SciPy installed
    like Anaconda, Spyder etc.


    ## Import SciPy


    Once SciPy is installed, import the SciPy module(s) you want to use in your applications
    by adding the from scipy import *module* statement:


    ```

    from scipy import constants

    ```


    Now we have imported the *constants* module from SciPy, and the application is
    ready to use it:


    ## Example


    How many cubic meters are in one liter:


    ```

    from scipy import constants

    print(constants.liter)

    ```


    **constants:** SciPy offers a set of mathematical constants, one of them is liter
    which returns 1 liter as cubic meters.


    You will learn more about constants in the next chapter.


    ## Checking SciPy Version


    The version string is stored under the __version__ attribute.


    ## Example


    ```

    import scipy

    print(scipy.__version__)

    ```


    **Note:** two underscore characters are used in __version__.


    ## SciPy Constants


    ## Constants in SciPy


    As SciPy is more focused on scientific implementations, it provides many built-in
    scientific constants.


    These constants can be helpful when you are working with Data Science.


    PI is an example of a scientific constant.


    ## Example


    Print the constant value of PI:


    ```

    from scipy import constants

    print(constants.pi)

    ```


    ## Constant Units


    A list of all units under the constants module can be seen using the dir() function.


    ## Example


    List all constants:


    ```

    from scipy import constants

    print(dir(constants))

    ```


    ## Unit Categories


    The units are placed under these categories:


    - Metric

    - Binary

    - Mass

    - Angle

    - Time

    - Length

    - Pressure

    - Volume

    - Speed

    - Temperature

    - Energy

    - Power

    - Force


    ## Metric (SI) Prefixes:


    Return the specified unit in **meter** (e.g. centi returns 0.01)


