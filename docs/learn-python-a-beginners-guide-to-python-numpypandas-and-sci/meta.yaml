    \n遍历字典时，返回值是字典的*键*，但也有方法可以返回*值*。\n\n### 示例\n\n逐个打印字典中的所有键名：\n\n```python\nfor\
    \ x in thisdict:\n    print(x)\n```\n\n### 示例\n\n逐个打印字典中的所有*值*：\n\n```python\n\
    for x in thisdict:\n    print(thisdict[x])\n```\n\n### 示例\n\n你也可以使用 `values()`\
    \ 方法来返回字典的值：\n\n```python\nfor x in thisdict.values():\n    print(x)\n```\n\n\
