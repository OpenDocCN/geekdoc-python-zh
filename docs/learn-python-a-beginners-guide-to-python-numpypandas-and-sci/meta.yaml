    \ in both:\n\n```python\nx = {\"apple\", \"banana\", \"cherry\"}\ny = {\"google\"\
    , \"microsoft\", \"apple\"}\nz = x.symmetric_difference(y)\nprint(z)\n```\n\n\
    ## Python - Set Methods\n\nPython has a set of built-in methods that you can use\
    \ on sets.\n\n| Method | Description |\n|---|---|\n| add() | Adds an element to\
