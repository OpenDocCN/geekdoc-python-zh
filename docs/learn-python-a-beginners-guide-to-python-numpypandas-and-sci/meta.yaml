    # Pandas - Cleaning Empty Cells


    # Empty Cells


    Empty cells can potentially give you a wrong result when you analyze data.


    # Remove Rows


    One way to deal with empty cells is to remove rows that contain empty cells.

    This is usually OK, since data sets can be very big, and removing a few rows will
    not have a big impact on the result.


    # Example


    Return a new Dataframe with no empty cells:


    ```

    import pandas as pd


    df = pd.read_csv(''data.csv'')


    new_df = df.dropna()


    print(new_df.to_string())

    ```


    In our cleaning examples we will be using a CSV file called ''dirtydata.csv''.

    Download dirtydata.csv. or Open dirtydata.csv


    **Note:** By default, the dropna() method returns a *new* DataFrame, and will
    not change the original.


    If you want to change the original DataFrame, use the inplace = True argument:


    # Example


    Remove all rows with NULL values:


    ```

    import pandas as pd

    ```'
  merge: -1
  pgno: 293
- img_proc: true
  md: '```

    df = pd.read_csv(''data.csv'')

    df.dropna(inplace = True)

    print(df.to_string())

    ```


    **Note:** Now, the dropna(inplace = True) will NOT return a new DataFrame, but
    it will remove all rows containing NULL values from the original DataFrame.


    # Replace Empty Values


    Another way of dealing with empty cells is to insert a *new* value instead.

    This way you do not have to delete entire rows just because of some empty cells.


    The fillna() method allows us to replace empty cells with a value:


    **Example**

    Replace NULL values with the number 130:


    ```

    import pandas as pd

    df = pd.read_csv(''data.csv'')

    df.fillna(130, inplace = True)

    ```


    **Replace Only For a Specified Columns**

    The example above replaces all empty cells in the whole Data Frame.

    To only replace empty values for one column, specify the *column name* for the
    DataFrame:


    **Example**

    Replace NULL values in the "Calories" columns with the number 130:


    ```

    import pandas as pd

    df = pd.read_csv(''data.csv'')

    df["Calories"].fillna(130, inplace = True)

    ```'
