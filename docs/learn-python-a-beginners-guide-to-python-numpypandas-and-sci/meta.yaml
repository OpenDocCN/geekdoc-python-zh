    ## 取余


    `mod()` 和 `remainder()` 函数都返回第一个数组中的值除以第二个数组中的值的余数，并将结果返回到一个新数组中。


    ## 示例


    返回余数：


    ```python

    import numpy as np


    arr1 = np.array([10, 20, 30, 40, 50, 60])

    arr2 = np.array([3, 7, 9, 8, 2, 33])


    newarr = np.mod(arr1, arr2)


    print(newarr)

    ```


    上面的示例将返回 `[1 6 3 0 0 27]`，这是 10 除以 3 (10%3)、20 除以 7 (20%7)、30 除以 9 (30%9) 等的余数。


    使用 `remainder()` 函数会得到相同的结果：


    ## 示例


    返回余数：


    ```python

    import numpy as np


    arr1 = np.array([10, 20, 30, 40, 50, 60])

    arr2 = np.array([3, 7, 9, 8, 2, 33])


    newarr = np.remainder(arr1, arr2)


    print(newarr)

    ```


    ## 商和余数


    `divmod()` 函数同时返回商和余数。返回值是两个数组，第一个数组包含商，第二个数组包含余数。


    ## 示例


    返回商和余数：


    ```python

    import numpy as np


    arr1 = np.array([10, 20, 30, 40, 50, 60])

    arr2 = np.array([3, 7, 9, 8, 2, 33])


    newarr = np.divmod(arr1, arr2)


    print(newarr)

    ```


    上面的示例将返回：

    (array([3, 2, 3, 5, 25, 1]), array([1, 6, 3, 0, 0, 27]))

    第一个数组代表商（即 10 除以 3、20 除以 7、30 除以 9 等的整数值）。

    第二个数组代表相同除法的余数。


    ## 绝对值


    `absolute()` 和 `abs()` 函数执行相同的逐元素绝对值运算，但应使用 `absolute()` 以避免与 Python 内置的 `math.abs()`
    混淆。


    ## 示例


    返回绝对值：


    ```python

    import numpy as np


    arr = np.array([-1, -2, 1, 2, 3, -4])


    newarr = np.absolute(arr)


    print(newarr)

    ```


    上面的示例将返回 `[1 2 1 2 3 4]`。


