    # RegEx in Python


    When you have imported the re module, you can start using regular expressions:


    # Example


    Search the string to see if it starts with "The" and ends with "Spain":


    ```

    import re

    txt = "The rain in Spain"

    x = re.search("^The.*Spain$", txt)

    ```


    # RegEx Functions


    The re module offers a set of functions that allows us to search a string for
    a match:


    | Function | Description |

    | --- | --- |

    | findall | Returns a list containing all matches |

    | search | Returns a Match object if there is a match anywhere in the string |

    | split | Returns a list where the string has been split at each match |

    | sub | Replaces one or many matches with a string |


    # Metacharacters


    Metacharacters are characters with a special meaning:


    | Character | Description | Example |

    | --- | --- | --- |

    | [ ] | A set of characters | "[a-m]" |

    | \ | Signals a special sequence (can also be used to escape special characters)
    | "\d" |

    | . | Any character (except newline character) | "he..o" |'
  - '[PAGE 166]


    | Symbol | Description | Example |

    | :--- | :--- | :--- |

    | ^ | Starts with | "^hello" |

    | $ | Ends with | "world$" |

    | * | Zero or more occurrences | "aix*" |

    | + | One or more occurrences | "aix+" |

    | { } | Exactly the specified number of occurrences | "al{2}" |

    | \| | Either or | "falls\|stays" |

    | ( ) | Capture and group | |


    # Sets


    A set is a set of characters inside a pair of square brackets [] with a special
    meaning:


    | Set | Description |

    | :--- | :--- |

    | [arn] | Returns a match where one of the specified characters (a, r, or n) are
    present |

    | [a-n] | Returns a match for any lower case character, alphabetically between
    a and n |

    | [^arn] | Returns a match for any character EXCEPT a, r, and n |

    | [0123] | Returns a match where any of the specified digits (0, 1, 2, or 3) are
    present |

    | [0-9] | Returns a match for any digit between 0 and 9 |

    | [0-5]<br>[0-9] | Returns a match for any two-digit numbers from 00 and 59 |

    | [a-zA-Z] | Returns a match for any character alphabetically between a and z,
    lower case OR upper case |

    | [+] | In sets, +, *, ., \|, (), $, {} has no special meaning, so [+] means:
    return a match for any + character in the string. |'
