    class Person:\n    def __init__(self, name, age):\n        self.name = name\n\
    \        self.age = age\n\np1 = Person(\"John\", 36)\n\nprint(p1.name)\nprint(p1.age)\n\
    ```\n\n**Note:** The __init__() function is called automatically every time the\
    \ class is being used to create a new object.\n\n### Object Methods\n\nObjects\
    \ can also contain methods. Methods in objects are functions that belong to the\
