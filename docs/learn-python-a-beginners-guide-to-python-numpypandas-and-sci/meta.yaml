  mdcn: "## 默认参数值\n\n以下示例展示了如何使用默认参数值。\n\n如果我们不带参数调用函数，它将使用默认值：\n\n```python\ndef\
    \ my_function(country = \"Norway\"):\n    print(\"I am from \" + country)\n```\n\
    \n```python\nmy_function(\"Sweden\")\nmy_function(\"India\")\nmy_function()\n\
    my_function(\"Brazil\")\n```\n\n## 将列表作为参数传递\n\n你可以向函数传递任何数据类型的参数（字符串、数字、列表、字典等），它在函数内部将被视为相同的数据类型。\n\
    \n例如，如果你传递一个列表作为参数，当它到达函数时，它仍然是一个列表：\n\n示例\n\n```python\ndef my_function(food):\n\
    \    for x in food:\n        print(x)\n\nfruits = [\"apple\", \"banana\", \"cherry\"\
    ]\nmy_function(fruits)\n```\n\n## 返回值\n\n要让函数返回一个值，请使用 `return` 语句：\n\n示例\n\n\
    ```python\ndef my_function(x):\n    return 5 * x\n\nprint(my_function(3))\nprint(my_function(5))\n\
    print(my_function(9))\n```\n\n## pass 语句\n\n函数定义不能为空，但如果你出于某种原因需要一个没有内容的函数定义，请放入\
    \ `pass` 语句以避免出现错误。\n\n示例\n\n```python\ndef myfunction():\n    pass\n```\n\n##\
    \ 递归\n\nPython 也接受函数递归，这意味着一个已定义的函数可以调用自身。\n\n递归是一个常见的数学和编程概念。它意味着一个函数调用自身。这样做的好处是，你可以通过循环数据来得到一个结果。\n\
    \n开发者在使用递归时应非常小心，因为很容易陷入编写一个永不终止的函数，或者一个消耗过多内存或处理器资源的函数。然而，如果编写正确，递归可以是一种非常高效且数学上优雅的编程方法。\n\
    \n在这个例子中，`tri_recursion()` 是我们定义的一个调用自身（“递归”）的函数。我们使用变量 `k` 作为数据，每次递归时它都会递减（-1）。当条件不大于\
    \ 0（即等于 0）时，递归结束。\n\n对于新手来说，可能需要一些时间才能弄清楚这到底是如何工作的，最好的方法是通过测试和修改它来了解。\n\n### 示例\n\
    \n递归示例\n\n```python\ndef tri_recursion(k):\n    if(k > 0):\n        result = k\
    \ + tri_recursion(k - 1)\n        print(result)\n    else:\n        result = 0\n\
    \    return result\n\nprint(\"\\n\\nRecursion Example Results\")\ntri_recursion(6)\n\
    ```\n\n## 26. Python Lambda\n\nLambda 函数是一个小型的匿名函数。\n\nLambda 函数可以接受任意数量的参数，但只能有一个表达式。\n\
    \n### 语法\n\n`lambda *arguments* : *expression*`\n\n表达式被执行并返回结果：\n\n### 示例\n\n\
    将参数 `a` 加上 10，并返回结果：\n\n```python\nx = lambda a : a + 10\nprint(x(5))\n```\n\n\
    Lambda 函数可以接受任意数量的参数：\n\n### 示例\n\n将参数 `a` 与参数 `b` 相乘，并返回结果：\n\n```python\nx =\
    \ lambda a, b : a * b\nprint(x(5, 6))\n```\n\n### 示例\n\n将参数 `a`、`b` 和 `c` 求和，并返回结果：\n\
    \n```python\nx = lambda a, b, c : a + b + c\nprint(x(5, 6, 2))\n```\n\n### 为什么使用\
    \ Lambda 函数？\n\n当你将 Lambda 函数用作另一个函数内部的匿名函数时，它的威力就显现出来了。\n\n假设你有一个函数定义，它接受一个参数，而这个参数将与一个未知的数字相乘：\n\
    \n```python\ndef myfunc(n):\n  return lambda a : a * n\n```\n\n使用该函数定义来创建一个函数，该函数总是将你传入的数字加倍：\n\
    \n### 示例\n\n```python\ndef myfunc(n):\n  return lambda a : a * n\nmydoubler =\
    \ myfunc(2)\nprint(mydoubler(11))\n```\n\n或者，使用相同的函数定义来创建一个函数，该函数总是将你传入的数字*三倍*：\n\
    \n### 示例\n\n```python\ndef myfunc(n):\n  return lambda a : a * n\nmytripler =\
    \ myfunc(3)\nprint(mytripler(11))\n```\n\n或者，在同一个程序中使用相同的函数定义来创建这两个函数：\n\n###\
    \ 示例\n\n```python\ndef myfunc(n):\n  return lambda a : a * n\nmydoubler = myfunc(2)\n\
    mytripler = myfunc(3)\nprint(mydoubler(11))\nprint(mytripler(11))\n```\n\n当需要一个短时间的匿名函数时，可以使用\
    \ Lambda 函数。\n\n## 27. Python 类和对象\n\n### Python 类/对象\n\nPython 是一种面向对象的编程语言。\n\
    Python 中几乎一切都是对象，具有其属性和方法。\n类就像是对象构造函数，或者是创建对象的“蓝图”。\n\n### 创建类\n\n要创建一个类，请使用关键字\
