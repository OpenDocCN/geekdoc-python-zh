    \ usage.\n\nA set is a collection which is both *unordered* and *unindexed*.\n\
    \nSets are written with curly brackets.\n\n## Example\n\nCreate a Set:\n\n```python\n\
    thisset = {\"apple\", \"banana\", \"cherry\"}\nprint(thisset)\n```\n\n**Note:**\
    \ Sets are unordered, so you cannot be sure in which order the items will appear.\n\
    \n## Set Items\n\nSet items are unordered, unchangeable, and do not allow duplicate\
    \ values.\n\n## Unordered\n\nUnordered means that the items in a set do not have\
    \ a defined order.\n\nSet items can appear in a different order every time you\
    \ use them, and cannot be referred to by index or key.\n\n## Unchangeable\n\n\
    Sets are unchangeable, meaning that we cannot change the items after the set has\
    \ been created.\n\nOnce a set is created, you cannot change its items, but you\
    \ can add new items.\n\n## Duplicates Not Allowed\n\nSets cannot have two items\
    \ with the same value.\n\n**Example**\nDuplicate values will be ignored:\n\n```python\n\
    thisset = {\"apple\", \"banana\", \"cherry\", \"apple\"}\nprint(thisset)\n```\n\
    \n## Get the Length of a Set\n\nTo determine how many items a set has, use the\
    \ len() method.\n\n**Example**\nGet the number of items in a set:\n\n```python\n\
    thisset = {\"apple\", \"banana\", \"cherry\"}\nprint(len(thisset))\n```\n\n##\
