  md: '# Replace Using Mean, Median, or Mode


    A common way to replace empty cells is to calculate the mean, median or mode value
    of the column.


    Pandas uses the mean() median() and mode() methods to calculate the respective
    values for a specified column:


    # Example


    Calculate the MEAN, and replace any empty values with it:


    ```

    import pandas as pd


    df = pd.read_csv(''data.csv'')


    x = df["Calories"].mean()


    df["Calories"].fillna(x, inplace = True)

    ```


    **Mean** = the average value (the sum of all values divided by number of values).


    # Example


    Calculate the MEDIAN, and replace any empty values with it:


    ```

    import pandas as pd


    df = pd.read_csv(''data.csv'')


    x = df["Calories"].median()


    df["Calories"].fillna(x, inplace = True)

    ```


    **Median** = the value in the middle, after you have sorted all values ascending.


    # Example


    Calculate the MODE, and replace any empty values with it:


    ```

    import pandas as pd


    df = pd.read_csv(''data.csv'')


    x = df["Calories"].mode()[0]

    ```'
