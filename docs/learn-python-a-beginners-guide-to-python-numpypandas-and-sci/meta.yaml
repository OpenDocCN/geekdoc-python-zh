    ## 34. Python JSON\n\nJSON is a syntax for storing and exchanging data.\nJSON\
    \ is text, written with JavaScript object notation.\n\n## JSON in Python\n\nPython\
    \ has a built-in package called json, which can be used to work with JSON data.\n\
    \n**Example**\n\nImport the json module:\n\n```\nimport json\n```\n\n## Parse\
    \ JSON - Convert from JSON to Python\n\nIf you have a JSON string, you can parse\
    \ it by using the json.loads() method.\nThe result will be a Python dictionary.\n\
    \n**Example**\n\nConvert from JSON to Python:\n\n```\nimport json\n\n# some JSON:\n\
    x =  '{ \"name\":\"John\", \"age\":30, \"city\":\"New York\"}'\n\n# parse x:\n\
    y = json.loads(x)\n\n# the result is a Python dictionary:\nprint(y[\"age\"])\n\
    ```\n\n## Convert from Python to JSON\n\nIf you have a Python object, you can\
    \ convert it into a JSON string by using the json.dumps() method.\n\n**Example**\n\
    \nConvert from Python to JSON:\n\n```\nimport json\n\n# a Python object (dict):\n\
    x = {\n    \"name\": \"John\",\n    \"age\": 30,\n    \"city\": \"New York\"\n\
    }\n\n# convert into JSON:\ny = json.dumps(x)\n\n# the result is a JSON string:\n\
    print(y)\n```\n\nYou can convert Python objects of the following types, into JSON\
    \ strings:\n\n- dict\n- list\n- tuple\n- string\n- int\n- float\n- True\n- False\n\
    - None\n\n**Example**\n\nConvert Python objects into JSON strings, and print the\
    \ values:\n\n```\nimport json\n\nprint(json.dumps({\"name\": \"John\", \"age\"\
    : 30}))\nprint(json.dumps([\"apple\", \"bananas\"]))\nprint(json.dumps((\"apple\"\
    , \"bananas\")))\nprint(json.dumps(\"hello\"))\nprint(json.dumps(42))\nprint(json.dumps(31.76))\n\
    print(json.dumps(True))\nprint(json.dumps(False))\nprint(json.dumps(None))\n```\n\
    \nWhen you convert from Python to JSON, Python objects are converted into the\
    \ JSON (JavaScript) equivalent:\n\n| Python | JSON |\n|---|---|\n| dict | Object\
    \ |\n| list | Array |\n| tuple | Array |\n| str | String |\n| int | Number |\n\
    | float | Number |\n| True | true |\n| False | false |\n| None | null |\n\n**Example**\n\
    \nConvert a Python object containing all the legal data types:\n\n```\nimport\
    \ json\n\nx = {\n  \"name\": \"John\",\n  \"age\": 30,\n  \"married\": True,\n\
    \  \"divorced\": False,\n  \"children\": (\"Ann\",\"Billy\"),\n  \"pets\": None,\n\
    \  \"cars\": [\n    {\"model\": \"BMW 230\", \"mpg\": 27.5},\n    {\"model\":\
    \ \"Ford Edge\", \"mpg\": 24.1}\n]\n}\n\nprint(json.dumps(x))\n```\n\n## Format\
    \ the Result\n\nThe example above prints a JSON string, but it is not very easy\
    \ to read, with no indentations and line breaks.\n\nThe json.dumps() method has\
    \ parameters to make it easier to read the result:\n\n**Example**\n\nUse the indent\
    \ parameter to define the numbers of indents:\n\n```\njson.dumps(x, indent=4)\n\
    ```\n\nYou can also define the separators, default value is (\", \", \": \"),\
    \ which means using a comma and a space to separate each object, and a colon and\
    \ a space to separate keys from values:\n\n**Example**\n\nUse the separators parameter\
    \ to change the default separator:\n\n```\njson.dumps(x, indent=4, separators=(\"\
    . \", \" = \"))\n```\n\n## Order the Result\n\nThe json.dumps() method has parameters\
    \ to order the keys in the result:\n\n**Example**\n\nUse the sort_keys parameter\
    \ to specify if the result should be sorted or not:\n\n```\njson.dumps(x, indent=4,\
    \ sort_keys=True)\n```\n\n## 35. Python RegEx\n\nA RegEx, or Regular Expression,\
    \ is a sequence of characters that forms a search pattern.\n\nRegEx can be used\
    \ to check if a string contains the specified search pattern.\n\n## RegEx Module\n\
    \nPython has a built-in package called re, which can be used to work with Regular\
    \ Expressions.\n\nImport the re module:\n\n```\nimport re\n```\n\n## RegEx in\
    \ Python\n\nWhen you have imported the re module, you can start using regular\
    \ expressions:\n\n**Example**\n\nSearch the string to see if it starts with \"\
    The\" and ends with \"Spain\":\n\n```\nimport re\ntxt = \"The rain in Spain\"\n\
    x = re.search(\"^The.*Spain$\", txt)\n```\n\n## RegEx Functions\n\nThe re module\
    \ offers a set of functions that allows us to search a string for a match:\n\n\
    | Function | Description |\n| --- | --- |\n| findall | Returns a list containing\
    \ all matches |\n| search | Returns a Match object if there is a match anywhere\
    \ in the string |\n| split | Returns a list where the string has been split at\
    \ each match |\n| sub | Replaces one or many matches with a string |\n\n## Metacharacters\n\
    \nMetacharacters are characters with a special meaning:\n\n| Character | Description\
    \ | Example |\n| --- | --- | --- |\n| [ ] | A set of characters | \"[a-m]\" |\n\
    | \\ | Signals a special sequence (can also be used to escape special characters)\
    \ | \"\\d\" |\n| . | Any character (except newline character) | \"he..o\" |\n\
    | ^ | Starts with | \"^hello\" |\n| $ | Ends with | \"world$\" |\n| * | Zero or\
    \ more occurrences | \"aix*\" |\n| + | One or more occurrences | \"aix+\" |\n\
    | { } | Exactly the specified number of occurrences | \"al{2}\" |\n| \\| | Either\
    \ or | \"falls\\|stays\" |\n| ( ) | Capture and group | |\n\n## Sets\n\nA set\
    \ is a set of characters inside a pair of square brackets [] with a special meaning:\n\
    \n| Set | Description |\n| :--- | :--- |\n| [arn] | Returns a match where one\
    \ of the specified characters (a, r, or n) are present |\n| [a-n] | Returns a\
    \ match for any lower case character, alphabetically between a and n |\n| [^arn]\
    \ | Returns a match for any character EXCEPT a, r, and n |\n| [0123] | Returns\
    \ a match where any of the specified digits (0, 1, 2, or 3) are present |\n| [0-9]\
    \ | Returns a match for any digit between 0 and 9 |\n| [0-5][0-9] | Returns a\
    \ match for any two-digit numbers from 00 and 59 |\n| [a-zA-Z] | Returns a match\
    \ for any character alphabetically between a and z, lower case OR upper case |\n\
    | [+] | In sets, +, *, ., \\|, (), $, {} has no special meaning, so [+] means:\
    \ return a match for any + character in the string. |\n\n## Special Sequences\n\
    \nA special sequence is a \\ followed by one of the characters in the list below,\
    \ and has a special meaning:\n\n| Character | Description | Example |\n| :---\
    \ | :--- | :--- |\n| \\A | Returns a match if the specified characters are at\
    \ the beginning of the string | \"\\AThe\" |\n| \\b | Returns a match where the\
    \ specified characters are at the beginning or at the end of a word (the \"r\"\
    \ in the beginning is making sure that the string is being treated as a \"raw\
    \ string\") | r\"\\bain\" r\"ain\\b\" |\n| \\B | Returns a match where the specified\
    \ characters are present, but NOT at the beginning (or at the end) of a word (the\
    \ \"r\" in the beginning is making sure that the string is being treated as a\
    \ \"raw string\") | r\"\\Bain\" r\"ain\\B\" |\n| \\d | Returns a match where the\
    \ string contains digits (numbers from 0-9) | \"\\d\" |\n| \\D | Returns a match\
    \ where the string DOES NOT contain digits | \"\\D\" |\n| \\s | Returns a match\
    \ where the string contains a white space character | \"\\s\" |\n| \\S | Returns\
    \ a match where the string DOES NOT contain a white space character | \"\\S\"\
    \ |\n| \\w | Returns a match where the string contains any word characters (characters\
    \ from a to Z, digits from 0-9, and the underscore _ character) | \"\\w\" |\n\
    | \\W | Returns a match where the string DOES NOT contain any word characters\
    \ | \"\\W\" |"
  mdcn: "## 内置数学函数\n\n`min()` 和 `max()` 函数可用于查找可迭代对象中的最小值或最大值：\n\n**示例**\n\n```\n\
