    9.16070828 9.64233874]


    # SciPy Statistical Significance Tests


    # What is a Statistical Significance Test?


    In statistics, statistical significance means that the result that was produced
    has a reason behind it, it was not produced randomly, or by chance.


    SciPy provides us with a module named scipy.stats, which has functions for performing
    statistical significance tests.


    Here are some techniques and keywords that are important when performing such
    tests.


    # Hypothesis in Statistics


    Hypothesis is an assumption about a parameter in population.


    # Null Hypothesis


    It assumes that the observation is not statistically significant.


    # Alternate Hypothesis


    It assumes that the observations are due to some reason.


    It''s an alternative to Null Hypothesis.


    # Example:


    For an assessment of a student we would take:


    "student is worse than average" - as a null hypothesis, and:


    "student is better than average" - as an alternate hypothesis.


    # One tailed test


    When our hypothesis is testing for one side of the value only, it is called "one'
  merge: -1
  pgno: 342
- img_proc: true
  md: 'tailed test".


    # Example:


    For the null hypothesis:

    "the mean is equal to k", we can have alternate hypothesis:

    "the mean is less than k", or:

    "the mean is greater than k"


    # Two tailed test


    When our hypothesis is tested for both sides of the values.


    # Example:


    For the null hypothesis:

    "the mean is equal to k", we can have alternate hypothesis:

    "the mean is not equal to k"

    In this case the mean is less than, or greater than k, and both sides are to be
    checked.


    # Alpha value


    Alpha value is the level of significance.


    # Example:


    How close to extremes the data must be for null hypothesis to be rejected.

    It is usually taken as 0.01, 0.05, or 0.1.


    # P value


    P value tells how close to extreme the data actually is.

    P value and alpha values are compared to establish statistical significance.

    If p value <= alpha we reject the null hypothesis and say that the data is statistically
    significant. otherwise we accept the null hypothesis.'
  merge: -1
  pgno: 343
- img_proc: true
  md: '# T-Test


    T-tests are used to determine if there is significant difference between means
    of two variables. and lets us know if they belong to the same distribution.


    It is a two tailed test.


    The function ttest_ind() takes two samples of the same size and produces a tuple
    of t-statistic and p-value.


    # Example


    Find if the given values v1 and v2 are from same distribution:


    ```

    import numpy as np

    from scipy.stats import ttest_ind

    v1 = np.random.normal(size=100)

    v2 = np.random.normal(size=100)

    res = ttest_ind(v1, v2)

    print(res)

    ```


    Result:

    0.68346891833752133


    If you want to return only the p-value, use the p value property:


    # Example


    ```

    ...

    res = ttest_ind(v1, v2).pvalue

    print(res)

    ```


    Result:

    0.68346891833752133


    # KS-Test


    KS test is used to check if given values follow a distribution.'
  merge: -1
  pgno: 344
- img_proc: true
  md: 'The function takes the value to be tested, and the CDF as two parameters.

    A **CDF** can be either a string or a callable function that returns the probability.

    It can be used as a one tailed or two tailed test.

    By default it is two tails. We can pass parameter alternatives as a string of
    one of two-sided, less, or greater.


    # Example


    Find if the given value follows the normal distribution:


    ```

    import numpy as np

    from scipy.stats import kstest

    v = np.random.normal(size=100)

    res = kstest(v, ''norm'')

    print(res)

    ```


    # Result:


    KstestResult(statistic=0.047798701221956841,

    pvalue=0.97630967161777515)


    # Statistical Description of Data


    In order to see a summary of values in an array, we can use the describe() function.

    It returns the following description:


    +   1. number of observations (nobs)

    2. minimum and maximum values = minmax

    3. mean

    4. variance

    5. skewness

    6. kurtosis'
  merge: -1
