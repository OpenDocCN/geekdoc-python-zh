    \n# Example\n\nThe local variable can be accessed from a function within the function:\n\
    \n```\ndef myfunc():\n  x = 300\n  def myinnerfunc():\n    print(x)\n  myinnerfunc()\n\
    myfunc()\n```\n\n# Global Scope\n\nA variable created in the main body of the\
    \ Python code is a global variable and belongs to the global scope."
