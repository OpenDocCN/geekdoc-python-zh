    \ 返回 x 的 y 次幂的值\n\n**`math.prod()`** 返回可迭代对象中所有元素的乘积\n\n**`math.radians()`** 将度数值转换为弧度\n\
    \n**`math.remainder()`** 返回能使分子被分母完全整除的最接近的值\n\n**`math.sin()`** 返回一个数字的正弦值\n\n\
    **`math.sinh()`** 返回一个数字的双曲正弦值"
