    \ |\n\n## 13. Python Tuples\n\n```python\nmytuple = (\"apple\", \"banana\", \"\
    cherry\")\n```\n\n### Tuple\n\nTuples are used to store multiple items in a single\
    \ variable.\n\nTuple is one of 4 built-in data types in Python used to store collections\
    \ of data, the other 3 are List, Set, and Dictionary, all with different qualities\
    \ and usage.\n\nA tuple is a collection which is ordered and **unchangeable**.\n\
    \nTuples are written with round brackets.\n\n### Example\n\nCreate a Tuple:\n\n\
    ```python\nthistuple = (\"apple\", \"banana\", \"cherry\")\nprint(thistuple)\n\
    ```\n\n### Tuple Items\n\nTuple items are ordered, unchangeable, and allow duplicate\
    \ values.\n\nTuple items are indexed, the first item has index [0], the second\
    \ item has index [1] etc.\n\n### Ordered\n\nWhen we say that tuples are ordered,\
    \ it means that the items have a defined order, and that order will not change.\n\
    \n### Unchangeable\n\nTuples are unchangeable, meaning that we cannot change,\
    \ add or remove items after the tuple has been created.\n\n### Allow Duplicates\n\
    \nSince tuples are indexed, they can have items with the same value:\n\n### Example\n\
    \nTuples allow duplicate values:\n\n```python\nthistuple = (\"apple\", \"banana\"\
    , \"cherry\", \"apple\", \"cherry\")\nprint(thistuple)\n```\n\n### Tuple Length\n\
    \nTo determine how many items a tuple has, use the `len()` function:\n\n### Example\n\
    \nPrint the number of items in the tuple:\n\n```python\nthistuple = (\"apple\"\
