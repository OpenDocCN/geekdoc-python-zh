- md: "## Python - Add List Items\n\n### Append Items\n\nTo add an item to the end\
    \ of the list, use the append() method:\n\n**Example**\n\nUsing the append() method\
    \ to append an item:\n\n```\nthislist = [\"apple\", \"banana\", \"cherry\"]\n\
    thislist.append(\"orange\")\nprint(thislist)\n```\n\n### Insert Items\n\nTo insert\
    \ a list item at a specified index, use the insert() method.\n\nThe insert() method\
    \ inserts an item at the specified index:\n\n**Example**\n\nInsert an item as\
    \ the second position:\n\n```\nthislist = [\"apple\", \"banana\", \"cherry\"]\n\
    thislist.insert(1, \"orange\")\nprint(thislist)\n```\n\n**Note:** As a result\
    \ of the examples above, the lists will now contain 4 items.\n\n### Extend List\n\
    \nTo append elements from *another list* to the current list, use the extend()\
    \ method.\n\n**Example**\n\nAdd the elements of tropical to thislist:\n\n```\n\
    thislist = [\"apple\", \"banana\", \"cherry\"]\ntropical = [\"mango\", \"pineapple\"\
    , \"papaya\"]\nthislist.extend(tropical)\nprint(thislist)\n```\n\nThe elements\
    \ will be added to the *end* of the list.\n\n### Add Any Iterable\n\nThe extend()\
    \ method does not have to append *lists*, you can add any iterable object (tuples,\
    \ sets, dictionaries etc.).\n\n**Example**\n\nAdd elements of a tuple to a list:\n\
    \n```\nthislist = [\"apple\", \"banana\", \"cherry\"]\nthistuple = (\"kiwi\",\
    \ \"orange\")\nthislist.extend(thistuple)\nprint(thislist)\n```\n\n## Python -\
    \ Remove List Items\n\n### Remove Specific Item\n\nThe remove() method removes\
    \ the specified item.\n\n**Example**\n\nRemove \"banana\":\n\n```\nthislist =\
    \ [\"apple\", \"banana\", \"cherry\"]\nthislist.remove(\"banana\")\nprint(thislist)\n\
    ```\n\n### Remove Specific Index\n\nThe pop() method removes the specified index.\n\
    \n**Example**\n\nRemove the second item:\n\n```\nthislist = [\"apple\", \"banana\"\
    , \"cherry\"]\nthislist.pop(1)\nprint(thislist)\n```\n\nIf you do not specify\
    \ the index, the pop() method removes the last item.\n\n**Example**\n\nRemove\
    \ the last item:\n\n```\nthislist = [\"apple\", \"banana\", \"cherry\"]\nthislist.pop()\n\
    print(thislist)\n```\n\nThe del keyword also removes the specified index:\n\n\
    **Example**\n\nRemove the first item:\n\n```\nthislist = [\"apple\", \"banana\"\
    , \"cherry\"]\ndel thislist[0]\nprint(thislist)\n```\n\nThe del keyword can also\
    \ delete the list completely.\n\n**Example**\n\nDelete the entire list:\n\n```\n\
    thislist = [\"apple\", \"banana\", \"cherry\"]\ndel thislist\n```\n\n### Clear\
    \ the List\n\nThe clear() method empties the list.\nThe list still remains, but\
    \ it has no content.\n\n**Example**\n\nClear the list content:\n\n```\nthislist\
    \ = [\"apple\", \"banana\", \"cherry\"]\nthislist.clear()\nprint(thislist)\n```\n\
    \n## Python - Loop Lists\n\n### Loop Through a List\n\nYou can loop through the\
    \ list items by using a for loop:\n\n**Example**\n\nPrint all items in the list,\
    \ one by one:\n\n```\nthislist = [\"apple\", \"banana\", \"cherry\"]\nfor x in\
    \ thislist:\n  print(x)\n```\n\nLearn more about for loops in our Python For Loops\
    \ Chapter.\n\n### Loop Through the Index Numbers\n\nYou can also loop through\
    \ the list items by referring to their index number.\nUse the range() and len()\
    \ functions to create a suitable iterable.\n\n**Example**\n\nPrint all items by\
    \ referring to their index number:\n\n```\nthislist = [\"apple\", \"banana\",\
    \ \"cherry\"]\nfor i in range(len(thislist)):\n  print(thislist[i])\n```\n\nThe\
    \ iterable created in the example above is [0, 1, 2].\n\n### Using a While Loop\n\
    \nYou can loop through the list items by using a while loop.\nUse the len() function\
    \ to determine the length of the list, then start at 0 and loop your way through\
    \ the list items by referring to their indexes.\nRemember to increase the index\
    \ by 1 after each iteration.\n\n**Example**\n\nPrint all items, using a while\
    \ loop to go through all the index numbers:\n\n```\nthislist = [\"apple\", \"\
    banana\", \"cherry\"]\ni = 0\nwhile i < len(thislist):\n    print(thislist[i])\n\
    \    i = i + 1\n```\n\nLearn more about while loops in our Python While Loops\
    \ Chapter.\n\n### Looping Using List Comprehension\n\nList Comprehension offers\
    \ the shortest syntax for looping through lists:\n\n**Example**\n\nA shorthand\
    \ for loop that will print all items in a list:\n\n```\nthislist = [\"apple\"\
    , \"banana\", \"cherry\"]\n[print(x) for x in thislist]\n```\n\nLearn more about\
    \ list comprehension in the next chapter: List Comprehension.\n\n## Python - List\
    \ Comprehension\n\n### List Comprehension\n\nList comprehension offers a shorter\
    \ syntax when you want to create a new list based on the values of an existing\
    \ list.\n\n**Example**\n\nBased on a list of fruits, you want a new list, containing\
    \ only the fruits with the letter \"a\" in the name.\n\nWithout list comprehension\
    \ you will have to write a for statement with a conditional test inside:\n\n```\n\
    fruits = [\"apple\", \"banana\", \"cherry\", \"kiwi\", \"mango\"]\nnewlist = []\n\
    for x in fruits:\n    if \"a\" in x:\n        newlist.append(x)\nprint(newlist)\n\
    ```\n\nWith list comprehension you can do all that with only one line of code:\n\
    \n```\nfruits = [\"apple\", \"banana\", \"cherry\", \"kiwi\", \"mango\"]\nnewlist\
    \ = [x for x in fruits if \"a\" in x]\nprint(newlist)\n```\n\n### The Syntax\n\
    \n```\nnewlist = [expression for item in iterable if condition == True]\n```\n\
    \nThe return value is a new list, leaving the old list unchanged.\n\n### Condition\n\
    \nThe *condition* is like a filter that only accepts the items that evaluate to\
    \ True.\n\n**Example**\n\nOnly accept items that are not \"apple\":\n\n```\nnewlist\
    \ = [x for x in fruits if x != \"apple\"]\n```\n\nThe condition `if x != \"apple\"\
    ` will return True for all elements other than \"apple\", making the new list\
    \ contain all fruits except \"apple\".\n\nThe *condition* is optional and can\
    \ be omitted:\n\n**Example**\n\nWith no if statement:\n\n```\nnewlist = [x for\
    \ x in fruits]\n```\n\n### Iterable\n\nThe *iterable* can be any iterable object,\
    \ like a list, tuple, set etc.\n\n**Example**\n\nYou can use the range() function\
    \ to create an iterable:\n\n```\nnewlist = [x for x in range(10)]\n```\n\nSame\
    \ example, but with a condition:\n\n**Example**\n\nAccept only numbers lower than\
    \ 5:\n\n```\nnewlist = [x for x in range(10) if x < 5]\n```\n\n### Expression\n\
    \nThe *expression* is the current item in the iteration, but it is also the outcome,\
    \ which you can manipulate before it ends up like a list item in the new list:\n\
    \n**Example**\n\nSet the values in the new list to upper case:\n\n```\nnewlist\
    \ = [x.upper() for x in fruits]\n```\n\nYou can set the outcome to whatever you\
    \ like:\n\n**Example**\n\nSet all values in the new list to 'hello':\n\n```\n\
    newlist = ['hello' for x in fruits]\n```\n\nThe *expression* can also contain\
    \ conditions, not like a filter, but as a way to manipulate the outcome:\n\n**Example**\n\
    \nReturn \"orange\" instead of \"banana\":\n\n```\nnewlist = [x if x != \"banana\"\
    \ else \"orange\" for x in fruits]\n```\n\nThe *expression* in the example above\
    \ says:\n\n> \"Return the item if it is not banana, if it is banana return orange\"\
    .\n\n## Python - Sort Lists\n\n### Sort List Alphanumerically\n\nList objects\
    \ have a sort() method that will sort the list alphanumerically, ascending, by\
    \ default:\n\n**Example**\n\nSort the list alphabetically:\n\n```\nthislist =\
    \ [\"orange\", \"mango\", \"kiwi\", \"pineapple\", \"banana\"]\nthislist.sort()\n\
    print(thislist)\n```\n\n**Example**\n\nSort the list numerically:\n\n```\nthislist\
    \ = [100, 50, 65, 82, 23]\nthislist.sort()\nprint(thislist)\n```"
  mdcn: "## Python - 添加列表元素\n\n### 追加元素\n\n要向列表末尾添加一个元素，请使用 `append()` 方法：\n\n**示例**\n\
    \n使用 `append()` 方法追加一个元素：\n\n```\nthislist = [\"apple\", \"banana\", \"cherry\"\
    ]\nthislist.append(\"orange\")\nprint(thislist)\n```\n\n### 插入元素\n\n要在指定索引位置插入一个列表元素，请使用\
    \ `insert()` 方法。\n\n`insert()` 方法在指定索引处插入一个元素：\n\n**示例**\n\n在第二个位置插入一个元素：\n\n\
    ```\nthislist = [\"apple\", \"banana\", \"cherry\"]\nthislist.insert(1, \"orange\"\
    )\nprint(thislist)\n```\n\n**注意：** 由于上述示例的结果，列表现在将包含 4 个元素。\n\n### 扩展列表\n\n要将\
    \ *另一个列表* 的元素追加到当前列表，请使用 `extend()` 方法。\n\n**示例**\n\n将 `tropical` 的元素添加到 `thislist`：\n\
    \n```\nthislist = [\"apple\", \"banana\", \"cherry\"]\ntropical = [\"mango\",\
    \ \"pineapple\", \"papaya\"]\nthislist.extend(tropical)\nprint(thislist)\n```\n\
    \n元素将被添加到列表的 *末尾*。\n\n### 添加任何可迭代对象\n\n`extend()` 方法不必追加 *列表*，你可以添加任何可迭代对象（元组、集合、字典等）。\n\
    \n**示例**\n\n将元组的元素添加到列表：\n\n```\nthislist = [\"apple\", \"banana\", \"cherry\"\
    ]\nthistuple = (\"kiwi\", \"orange\")\nthislist.extend(thistuple)\nprint(thislist)\n\
    ```\n\n## Python - 移除列表元素\n\n### 移除特定元素\n\n`remove()` 方法移除指定的元素。\n\n**示例**\n\n\
    移除 \"banana\"：\n\n```\nthislist = [\"apple\", \"banana\", \"cherry\"]\nthislist.remove(\"\
    banana\")\nprint(thislist)\n```\n\n### 移除特定索引\n\n`pop()` 方法移除指定索引的元素。\n\n**示例**\n\
    \n移除第二个元素：\n\n```\nthislist = [\"apple\", \"banana\", \"cherry\"]\nthislist.pop(1)\n\
    print(thislist)\n```\n\n如果你不指定索引，`pop()` 方法将移除最后一个元素。\n\n**示例**\n\n移除最后一个元素：\n\
    \n```\nthislist = [\"apple\", \"banana\", \"cherry\"]\nthislist.pop()\nprint(thislist)\n\
    ```\n\n`del` 关键字也可以移除指定索引的元素：\n\n**示例**\n\n移除第一个元素：\n\n```\nthislist = [\"apple\"\
    , \"banana\", \"cherry\"]\ndel thislist[0]\nprint(thislist)\n```\n\n`del` 关键字也可以完全删除列表。\n\
    \n**示例**\n\n删除整个列表：\n\n```\nthislist = [\"apple\", \"banana\", \"cherry\"]\ndel\
    \ thislist\n```\n\n### 清空列表\n\n`clear()` 方法清空列表。\n列表仍然存在，但没有内容。\n\n**示例**\n\n\
    清空列表内容：\n\n```\nthislist = [\"apple\", \"banana\", \"cherry\"]\nthislist.clear()\n\
    print(thislist)\n```\n\n## Python - 遍历列表\n\n### 遍历列表\n\n你可以使用 `for` 循环遍历列表元素：\n\
    \n**示例**\n\n逐个打印列表中的所有元素：\n\n```\nthislist = [\"apple\", \"banana\", \"cherry\"\
    ]\nfor x in thislist:\n  print(x)\n```\n\n在我们的 Python For 循环章节中了解更多关于 `for` 循环的信息。\n\
    \n### 通过索引号遍历\n\n你也可以通过引用索引号来遍历列表元素。\n使用 `range()` 和 `len()` 函数创建一个合适的可迭代对象。\n\
    \n**示例**\n\n通过引用索引号打印所有元素：\n\n```\nthislist = [\"apple\", \"banana\", \"cherry\"\
    ]\nfor i in range(len(thislist)):\n  print(thislist[i])\n```\n\n上面示例中创建的可迭代对象是\
    \ [0, 1, 2]。\n\n### 使用 While 循环\n\n你可以使用 `while` 循环遍历列表元素。\n使用 `len()` 函数确定列表的长度，然后从\
    \ 0 开始，通过引用索引来遍历列表元素。\n记住在每次迭代后将索引增加 1。\n\n**示例**\n\n使用 `while` 循环遍历所有索引号，打印所有元素：\n\
    \n```\nthislist = [\"apple\", \"banana\", \"cherry\"]\ni = 0\nwhile i < len(thislist):\n\
    \    print(thislist[i])\n    i = i + 1\n```\n\n在我们的 Python While 循环章节中了解更多关于 `while`\
    \ 循环的信息。\n\n### 使用列表推导式遍历\n\n列表推导式提供了遍历列表的最短语法：\n\n**示例**\n\n一个简写的 `for` 循环，将打印列表中的所有元素：\n\
    \n```\nthislist = [\"apple\", \"banana\", \"cherry\"]\n[print(x) for x in thislist]\n\
    ```\n\n在下一章：列表推导式中了解更多关于列表推导式的信息。\n\n## Python - 列表推导式\n\n### 列表推导式\n\n当你想根据现有列表的值创建一个新列表时，列表推导式提供了一种更短的语法。\n\
    \n**示例**\n\n基于一个水果列表，你想要一个新列表，只包含名称中带有字母 \"a\" 的水果。\n\n没有列表推导式，你将不得不编写一个带有条件测试的\
    \ `for` 语句：\n\n```\nfruits = [\"apple\", \"banana\", \"cherry\", \"kiwi\", \"\
    mango\"]\nnewlist = []\nfor x in fruits:\n    if \"a\" in x:\n        newlist.append(x)\n\
    print(newlist)\n```\n\n使用列表推导式，你只需一行代码就能完成所有这些：\n\n```\nfruits = [\"apple\", \"\
    banana\", \"cherry\", \"kiwi\", \"mango\"]\nnewlist = [x for x in fruits if \"\
    a\" in x]\nprint(newlist)\n```\n\n### 语法\n\n```\nnewlist = [expression for item\
    \ in iterable if condition == True]\n```\n\n返回值是一个新列表，旧列表保持不变。\n\n### 条件\n\n*条件*\
    \ 就像一个过滤器，只接受求值为 True 的元素。\n\n**示例**\n\n只接受不是 \"apple\" 的元素：\n\n```\nnewlist =\
    \ [x for x in fruits if x != \"apple\"]\n```\n\n条件 `if x != \"apple\"` 对于除 \"\
    apple\" 之外的所有元素都将返回 True，使新列表包含除 \"apple\" 之外的所有水果。\n\n*条件* 是可选的，可以省略：\n\n**示例**\n\
    \n没有 `if` 语句：\n\n```\nnewlist = [x for x in fruits]\n```\n\n### 可迭代对象\n\n*可迭代对象*\
    \ 可以是任何可迭代对象，如列表、元组、集合等。\n\n**示例**\n\n你可以使用 `range()` 函数创建一个可迭代对象：\n\n```\nnewlist\
    \ = [x for x in range(10)]\n```\n\n相同的示例，但带有一个条件：\n\n**示例**\n\n只接受小于 5 的数字：\n\n\
    ```\nnewlist = [x for x in range(10) if x < 5]\n```\n\n### 表达式\n\n*表达式* 是迭代中的当前元素，但它也是结果，你可以在它最终成为新列表中的列表元素之前对其进行操作：\n\
    \n**示例**\n\n将新列表中的值设置为大写：\n\n```\nnewlist = [x.upper() for x in fruits]\n```\n\
    \n你可以将结果设置为你想要的任何值：\n\n**示例**\n\n将新列表中的所有值设置为 'hello'：\n\n```\nnewlist = ['hello'\
    \ for x in fruits]\n```\n\n*表达式* 也可以包含条件，但不是作为过滤器，而是作为一种操作结果的方式：\n\n**示例**\n\n\
    返回 \"orange\" 而不是 \"banana\"：\n\n```\nnewlist = [x if x != \"banana\" else \"\
    orange\" for x in fruits]\n```\n\n上面示例中的 *表达式* 表示：\n\n> \"如果元素不是 banana，则返回该元素；如果是\
