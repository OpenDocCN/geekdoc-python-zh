  - "[PAGE 10]\n\n# # 03.Python Syntax\n\n# ## Execute Python Syntax\n\nAs we learned\
    \ in the previous page, Python syntax can be executed by writing directly in the\
    \ Command Line:\n\n```\n>>> print(\"Hello, World!\")\nHello, World!\n```\n\nOr\
