    \ | 0.2 |\n| mysql-connector | 2.1.6 |\n| pip | 18.1 |\n| pymongo | 3.6.1 |\n\
    | setuptools | 39.0.1 |\n\n# 37. Python Try Except\n\nThe try block lets you test\
    \ a block of code for errors.\n\nThe except block lets you handle the error.\n\
    \nThe finally block lets you execute code, regardless of the result of the try-and\
    \ except blocks.\n\n## Exception Handling\n\nWhen an error occurs, or exception\
    \ as we call it, Python will normally stop and generate an error message.\n\n\
    These exceptions can be handled using the try statement:\n\n**Examples**\nThe\
    \ try block will generate an exception, because x is not defined:\n\n```python\n\
    try:\n    print(x)\nexcept:\n    print(\"An exception occurred\")\n```\n\nSince\
    \ the try block raises an error, the except block will be executed.\n\nWithout\
    \ the try block, the program will crash and raise an error:\n\nThis statement\
    \ will raise an error, because x is not defined:\n\n```python\nprint(x)\n```\n\
    \n## Many Exceptions\n\nYou can define as many exception blocks as you want, e.g.\
    \ if you want to execute a special block of code for a special kind of error:\n\
    \n**Example**\nPrint one message if the try block raises a NameError and another\
    \ for other errors:\n\n```python\ntry:\n    print(x)\nexcept NameError:\n    print(\"\
    Variable x is not defined\")\nexcept:\n    print(\"Something else went wrong\"\
    )\n```\n\n## Else\n\nYou can use the else keyword to define a block of code to\
