    \nplt.show()\n```\n\n#### Result\n\n![](img/cc58576ad8f9c99f0fb25476ceeb53b6_253_0.png)\n\
    \n## NumPy ufuncs\n\n### What are ufuncs?\n\nufuncs stands for \"Universal Functions\"\
    \ and they are NumPy functions that operate on the ndarray object.\n\n### Why\
    \ use ufuncs?\n\nufuncs are used to implement *vectorization* in NumPy which is\
    \ way faster than iterating over elements.\n\nThey also provide broadcasting and\
    \ additional methods like reduce, accumulate etc. that are very helpful for computation.\n\
    \nufuncs also take additional arguments, like:\n\n- where boolean array or condition\
    \ defining where the operations should take place.\n- dtype defining the return\
    \ type of elements.\n- out output array where the return value should be copied.\n\
    \n### What is Vectorization?\n\nConverting iterative statements into a vector\
    \ based operation is called vectorization.\n\nIt is faster as modern CPUs are\
    \ optimized for such operations.\n\n### Add the Elements of Two Lists\n\nlist\
    \ 1: [1, 2, 3, 4]\nlist 2: [4, 5, 6, 7]\n\nOne way of doing it is to iterate over\
    \ both of the lists and then sum each element.\n\n#### Example\n\nWithout ufunc,\
    \ we can use Python's built-in zip() method:\n\n```python\nx = [1, 2, 3, 4]\n\
    y = [4, 5, 6, 7]\nz = []\n\nfor i, j in zip(x, y):\n    z.append(i + j)\nprint(z)\n\
    ```\n\nNumPy has a ufunc for this, called add(x, y) that will produce the same\
    \ result.\n\n#### Example\n\nWith ufunc, we can use the add() function:\n\n```python\n\
    import numpy as np\n\nx = [1, 2, 3, 4]\ny = [4, 5, 6, 7]\nz = np.add(x, y)\n\n\
    print(z)\n```\n\n### Create Your Own ufunc\n\n#### How To Create Your Own ufunc\n\
    \nTo create your own ufunc, you have to define a function, like you do with normal\
    \ functions in Python, then you add it to your NumPy ufunc library with the frompyfunc()\
    \ method.\n\nThe frompyfunc() method takes the following arguments:\n\n1. *function*\
    \ - the name of the function.\n2. *inputs* - the number of input arguments (arrays).\n\
    3. *outputs* - the number of output arrays.\n\n#### Example\n\nCreate your own\
    \ ufunc for addition:\n\n```python\nimport numpy as np\n\ndef myadd(x, y):\n \
    \ return x+y\n\nmyadd = np.frompyfunc(myadd, 2, 1)\n\nprint(myadd([1, 2, 3, 4],\
    \ [5, 6, 7, 8]))\n```\n\n### Check if a Function is a ufunc\n\nCheck the *type*\
    \ of a function to check if it is a ufunc or not.\n\nA ufunc should return <class\
    \ 'numpy.ufunc'>.\n\n#### Example\n\nCheck if a function is a ufunc:\n\n```python\n\
    import numpy as np\n\nprint(type(np.add))\n```\n\nIf it is not a ufunc, it will\
    \ return another type, like this built-in NumPy function for joining two or more\
    \ arrays:\n\n#### Example\n\nCheck the type of another function: concatenate():\n\
    \n```python\nimport numpy as np\nprint(type(np.concatenate))\n```\n\nIf the function\
    \ is not recognized at all, it will return an error:\n\n#### Example\n\nCheck\
    \ the type of something that does not exist. This will produce an error:\n\n```python\n\
    import numpy as np\nprint(type(np.blahblah))\n```\n\nTo test if the function is\
    \ a ufunc in an if statement, use the numpy.ufunc value (or np.ufunc if you use\
    \ np as an alias for numpy):\n\n#### Example\n\nUse an if statement to check if\
    \ the function is a ufunc or not:\n\n```python\nimport numpy as np\nif type(np.add)\
    \ == np.ufunc:\n    print('add is ufunc')\nelse:\n    print('add is not ufunc')\n\
    ```\n\n### Simple Arithmetic\n\nYou could use arithmetic operators + - * / directly\
    \ between NumPy arrays, but this section discusses an extension of the same where\
    \ we have functions that can take any array-like objects e.g. lists, tuples etc.\
    \ and perform arithmetic *conditionally*.\n\n**Arithmetic Conditionally:** means\
    \ that we can define conditions where the arithmetic operation should happen.\n\
    \nAll of the discussed arithmetic functions take a where parameter in which we\
    \ can specify that condition.\n\n### Addition\n\nThe add() function sums the content\
    \ of two arrays, and return the results in a new array.\n\n**Example**\n\nAdd\
    \ the values in arr1 to the values in arr2:\n\n```python\nimport numpy as np\n\
    \narr1 = np.array([10, 11, 12, 13, 14, 15])\narr2 = np.array([20, 21, 22, 23,\
    \ 24, 25])\n\nnewarr = np.add(arr1, arr2)\n\nprint(newarr)\n```\n\nThe example\
    \ above will return [30 32 34 36 38 40] which is the sums of 10+20, 11+21, 12+22\
    \ etc.\n\n### Subtraction\n\nThe subtract() function subtracts the values from\
    \ one array with the values from another array, and returns the results in a new\
    \ array.\n\n**Example**\n\nSubtract the values in arr2 from the values in arr1:\n\
    \n```python\nimport numpy as np\n\narr1 = np.array([10, 20, 30, 40, 50, 60])\n\
    arr2 = np.array([20, 21, 22, 23, 24, 25])\n\nnewarr = np.subtract(arr1, arr2)\n\
    \nprint(newarr)\n```\n\nThe example above will return [-10 -1 8 17 26 35] which\
    \ is the result of 10-20, 20-21, 30-22 etc.\n\n### Multiplication"
