- md: "## The Python Command Line\n\nTo test a short amount of code in python sometimes\
    \ it is the quickest and easiest not to write the code in a file. This is made\
    \ possible because Python can be run as a command-line itself.\n\nType the following\
    \ on the Windows, Mac, or Linux command line:\n\n```\nC:\\Users\\Your Name>python\n\
    ```\n\nOr, if the \"python\" command did not work, you can try \"py\":\n\n```\n\
    C:\\Users\\Your Name>py\n```\n\nFrom there you can write any python, including\
    \ our hello world example from earlier in the tutorial:\n\n```\nC:\\Users\\Your\
    \ Name>python\nPython 3.6.4 (v3.6.4:d48eceb, Dec 19 2017, 06:04:45) [MSC v.1900\
    \ 32 bit (Intel)] on win32\nType \"help\", \"copyright\", \"credits\" or \"license\"\
    \ for more information.\n>>> print(\"Hello, World!\")\n```\n\nWhich will write\
    \ \"Hello, World!\" in the command line:\n\n```\nC:\\Users\\Your Name>python\n\
    Python 3.6.4 (v3.6.4:d48eceb, Dec 19 2017, 06:04:45) [MSC v.1900 32 bit (Intel)]\
    \ on win32\nType \"help\", \"copyright\", \"credits\" or \"license\" for more\
    \ information.\n>>> print(\"Hello, World!\")\nHello, World!\n```\n\nWhenever you\
    \ are done in the python command line, you can simply type the following to quit\
    \ the python command-line interface: exit()\n\n## 03.Python Syntax\n\n### Execute\
    \ Python Syntax\n\nAs we learned in the previous page, Python syntax can be executed\
    \ by writing directly in the Command Line:\n\n```\n>>> print(\"Hello, World!\"\
    )\nHello, World!\n```\n\nOr by creating a python file on the server, using the\
    \ .py file extension, and running it in the Command Line:\n\n```\nC:\\Users\\\
    Your Name>python myfile.py\n```\n\n### Python Indentation\n\nIndentation refers\
    \ to the spaces at the beginning of a code line.\nWhere in other programming languages\
    \ the indentation in code is for readability only, the indentation in Python is\
    \ very important.\nPython uses indentation to indicate a block of code.\n\n###\
    \ Example\n\n```\nif 5 > 2:\n    print(\"Five is greater than two!\")\n```\n\n\
    **Python will give you an error if you skip the indentation!**\n\n## 04.Python\
    \ Comments\n\n- Comments can be used to explain Python code.\n- Comments can be\
    \ used to make the code more readable.\n- Comments can be used to prevent execution\
    \ when testing code.\n\n### Creating a Comment\n\nComments start with a #, and\
    \ Python will ignore them:\n\n```\n#This is a comment\nprint(\"Hello, World!\"\
    )\n```\n\nComments can be placed at the end of a line, and Python will ignore\
    \ the rest of the line:\n\n```\nprint(\"Hello, World!\") #This is a comment\n\
    ```\n\nA comment does not have to be text that explains the code, it can also\
    \ be used to prevent Python from executing code:\n\n```\n#print(\"Hello, World!\"\
    )\nprint(\"Cheers, Mate!\")\n```\n\n### Multi-Line Comments\n\nPython does not\
    \ really have a syntax for multi-line comments.\nTo add a multiline comment you\
    \ could insert a # for each line.\n\n```\n#This is a comment\n#written in\n#more\
    \ than just one line\nprint(\"Hello, World!\")\n```\n\nOr, not quite as intended,\
    \ you can use a multiline string.\nSince Python will ignore string literals that\
    \ are not assigned to a variable, you can add a multiline string (triple quotes)\
    \ in your code, and place your comment inside it:\n\n```\n\"\"\"\nThis is a comment\n\
    written in\nmore than just one line\n\"\"\"\n```\n\n```\nprint(\"Hello, World!\"\
    )\n```\n\n## 05.Python Variables\n\n**Variables**\nVariables are containers for\
    \ storing data values.\n\n**Creating Variables**\nPython has no command for declaring\
    \ a variable.\nA variable is created the moment you first assign a value to it.\n\
    \n```\nx = 5\n```\n\n```\ny = \"John\"\nprint(x)\nprint(y)\n```\n\nVariables do\
    \ not need to be declared with any particular *type*, and can even change type\
    \ after they have been set.\n\n```\nx = 4       # x is of type int\nx = \"Sally\"\
    \ # x is now of type str\nprint(x)\n```\n\n### Casting\n\nIf you want to specify\
    \ the data type of a variable, this can be done with casting.\n\n```\nx = str(3)\
    \ # x will be '3'\ny = int(3) # y will be 3\nz = float(3) # z will be 3.0\n```\n\
    \n### Get the Type\n\nYou can get the data type of a variable with the type()\
    \ function.\n\n```\nx = 5\ny = \"John\"\nprint(type(x))\nprint(type(y))\n```\n\
    \n### Single or Double Quotes?\n\nString variables can be declared either by using\
    \ single or double quotes:\n\n```\nx = \"John\"\n```\n\n```\n# is the same as\n\
    x = 'John'\n```\n\n### Case-Sensitive\n\nVariable names are case-sensitive.\n\n\
    ```\na = 4\nA = \"Sally\"\n#A will not overwrite a\n```\n\n## Python - Variable\
    \ Names\n\n### Variable Names\n\nA variable can have a short name (like x and\
    \ y) or a more descriptive name (age, carname, total_volume). Rules for Python\
    \ variables:\n\n- A variable name must start with a letter or the underscore character\n\
    - A variable name cannot start with a number\n- A variable name can only contain\
    \ alpha-numeric characters and underscores (A-z, 0-9, and _ )\n- Variable names\
    \ are case-sensitive (age, Age, and AGE are three different variables)\n\nLegal\
    \ variable names:\n\n```\nmyvar = \"John\"\nmy_var = \"John\"\n_my_var = \"John\"\
    \nmyVar = \"John\"\nMYVAR = \"John\"\nmyvar2 = \"John\"\n```\n\nRemember that\
    \ variable names are case-sensitive\n\n## Multi Words Variable Names\n\nVariable\
    \ names with more than one word can be difficult to read.\nThere are several techniques\
    \ you can use to make them more readable:\n\n### Camel Case\n\nEach word, except\
    \ the first, starts with a capital letter:\n**myVariableName** = \"John\"\n\n\
    ### Pascal Case\n\nEach word starts with a capital letter:\n**MyVariableName**\
    \ = \"John\"\n\n### Snake Case\n\nEach word is separated by an underscore character:\n\
    **my_variable_name** = \"John\"\n\n## Python Variables - Assign Multiple Values\n\
    \n### Many Values to Multiple Variables\n\nPython allows you to assign values\
    \ to multiple variables in one line:\n\n**Example**\n\n```\nx, y, z = \"Orange\"\
    , \"Banana\", \"Cherry\"\nprint(x)\nprint(y)\nprint(z)\n```\n\n**Note:** Make\
    \ sure the number of variables matches the number of values, or else you will\
    \ get an error.\n\n### One Value to Multiple Variables\n\nAnd you can assign the\
    \ *same* value to multiple variables in one line:\n\n**Example**\n\n```\nx = y\
    \ = z = \"Orange\"\nprint(x)\nprint(y)\nprint(z)\n```\n\n### Unpack a Collection\n\
    \nIf you have a collection of values in a list, tuple, etc. Python allows you\
    \ extract the values into variables. This is called *unpacking*.\n\nLearn more\
    \ about unpacking in Tuples Chapter.\n\n## Python - Output Variables\n\n### Output\
    \ Variables\n\nThe Python print statement is often used to output variables.\n\
    \nTo combine both text and a variable, Python uses the + character:\n\n**Example**\n\
    \n```\nx = \"awesome\"\nprint(\"Python is \" + x)\n```\n\nYou can also use the\
    \ + character to add a variable to another variable:\n\n**Example**\n\n```\nx\
    \ = \"Python is \"\ny = \"awesome\"\n```\n\n```\nz = x + y\nprint(z)\n```\n\n\
    For numbers, the + character works as a mathematical operator:\n\n### Example\n\
    \n```\nx = 5\ny = 10\nprint(x + y)\n```\n\n## 06.Python Operators\n\n### Python\
    \ Operators\n\nOperators are used to performing operations on variables and values.\n\
    In the example below, we use the + operator to add together two values:\n\n###\
    \ Example\n\n```\nprint(10 + 5)\n```\n\nPython divides the operators into the\
    \ following groups:\n\n- Arithmetic operators\n- Assignment operators\n- Comparison\
    \ operators\n- Logical operators\n- Identity operators\n- Membership operators\n\
    - Bitwise operators\n\n### Python Arithmetic Operators\n\nArithmetic operators\
    \ are used with numeric values to perform common mathematical operations:\n\n\
    | Operator | Name | Example |\n| :--- | :--- | :--- |\n| + | Addition | x + y\
    \ |\n| - | Subtraction | x - y |\n| * | Multiplication | x * y |\n| / | Division\
    \ | x / y |\n| % | Modulus | x % y |\n| ** | Exponentiation | x ** y |\n| // |\
    \ Floor division | x // y |\n\n### Python Assignment Operators\n\nAssignment operators\
    \ are used to assigning values to variables:\n\n| Operator | Example | Same As\
    \ |\n| :--- | :--- | :--- |\n| = | x = 5 | x = 5 |\n| += | x += 3 | x = x + 3\
    \ |\n| -= | x -= 3 | x = x - 3 |\n| *= | x *= 3 | x = x * 3 |\n| /= | x /= 3 |\
    \ x = x / 3 |\n| %= | x %= 3 | x = x % 3 |\n| //= | x //= 3 | x = x // 3 |\n|\
    \ **= | x **= 3 | x = x ** 3 |\n| &= | x &= 3 | x = x & 3 |\n| \\|= | x \\|= 3\
    \ | x = x \\| 3 |\n| ^= | x ^= 3 | x = x ^ 3 |\n| >>= | x >>= 3 | x = x >> 3 |\n\
    | <<= | x <<= 3 | x = x << 3 |\n\n### Python Identity Operators\n\nIdentity operators\
    \ are used to comparing the objects, not if they are equal, but if they are actually\
    \ the same object, with the same memory location:\n\n| Operator | Description\
    \ | Example |\n| :--- | :--- | :--- |\n| is | Returns True if both variables are\
    \ the same object | x is y |\n| is not | Returns True if both variables are not\
    \ the same object | x is not y |\n\n### Python Membership Operators\n\nMembership\
    \ operators are used to testing if a sequence is presented in an object:\n\n|\
    \ Operator | Description | Example |\n| :--- | :--- | :--- |\n| in | Returns True\
    \ if a sequence with the specified value is present in the object | x in y |\n\
    | not in | Returns True if a sequence with the specified value is not present\
    \ in the object | x not in y |\n\n### Python Comparison Operators\n\nComparison\
    \ operators are used to comparing two values:"
  mdcn: "## Python 命令行\n\n有时在 Python 中测试少量代码，最快捷简便的方法不是将代码写入文件。这之所以可行，是因为 Python 本身可以作为命令行运行。\n\
    \n在 Windows、Mac 或 Linux 命令行中输入以下内容：\n\n```\nC:\\Users\\Your Name>python\n```\n\
    \n或者，如果 \"python\" 命令不起作用，你可以尝试 \"py\"：\n\n```\nC:\\Users\\Your Name>py\n```\n\
    \n从那里你可以编写任何 Python 代码，包括我们之前教程中的 \"hello world\" 示例：\n\n```\nC:\\Users\\Your\
    \ Name>python\nPython 3.6.4 (v3.6.4:d48eceb, Dec 19 2017, 06:04:45) [MSC v.1900\
    \ 32 bit (Intel)] on win32\nType \"help\", \"copyright\", \"credits\" or \"license\"\
    \ for more information.\n>>> print(\"Hello, World!\")\n```\n\n这将在命令行中输出 \"Hello,\
    \ World!\"：\n\n```\nC:\\Users\\Your Name>python\nPython 3.6.4 (v3.6.4:d48eceb,\
    \ Dec 19 2017, 06:04:45) [MSC v.1900 32 bit (Intel)] on win32\nType \"help\",\
    \ \"copyright\", \"credits\" or \"license\" for more information.\n>>> print(\"\
    Hello, World!\")\nHello, World!\n```\n\n当你在 Python 命令行中完成操作后，只需输入以下命令即可退出 Python\
    \ 命令行界面：exit()\n\n## 03.Python 语法\n\n### 执行 Python 语法\n\n正如我们在上一页所学，Python 语法可以通过直接在命令行中编写来执行：\n\
    \n```\n>>> print(\"Hello, World!\")\nHello, World!\n```\n\n或者通过在服务器上创建一个 Python\
    \ 文件（使用 .py 文件扩展名），并在命令行中运行它：\n\n```\nC:\\Users\\Your Name>python myfile.py\n\
    ```\n\n### Python 缩进\n\n缩进指的是代码行开头的空格。\n在其他编程语言中，代码缩进仅用于提高可读性，而在 Python 中，缩进非常重要。\n\
    Python 使用缩进来表示一个代码块。\n\n### 示例\n\n```\nif 5 > 2:\n    print(\"Five is greater\
    \ than two!\")\n```\n\n**如果你跳过缩进，Python 会给你一个错误！**\n\n## 04.Python 注释\n\n- 注释可用于解释\
    \ Python 代码。\n- 注释可用于使代码更易于阅读。\n- 注释可用于在测试代码时阻止代码执行。\n\n### 创建注释\n\n注释以 # 开头，Python\
    \ 会忽略它们：\n\n```\n#This is a comment\nprint(\"Hello, World!\")\n```\n\n注释可以放在行尾，Python\
    \ 会忽略该行的其余部分：\n\n```\nprint(\"Hello, World!\") #This is a comment\n```\n\n注释不一定是解释代码的文本，它也可以用来阻止\
    \ Python 执行代码：\n\n```\n#print(\"Hello, World!\")\nprint(\"Cheers, Mate!\")\n```\n\
    \n### 多行注释\n\nPython 实际上没有多行注释的语法。\n要添加多行注释，你可以在每一行前插入一个 #。\n\n```\n#This is a\
    \ comment\n#written in\n#more than just one line\nprint(\"Hello, World!\")\n```\n\
    \n或者，虽然不完全符合预期，你可以使用多行字符串。\n由于 Python 会忽略未赋值给变量的字符串字面量，你可以在代码中添加一个多行字符串（三引号），并将注释放在其中：\n\
    \n```\n\"\"\"\nThis is a comment\nwritten in\nmore than just one line\n\"\"\"\n\
    ```\n\n```\nprint(\"Hello, World!\")\n```\n\n## 05.Python 变量\n\n**变量**\n变量是用于存储数据值的容器。\n\
    \n**创建变量**\nPython 没有声明变量的命令。\n变量在你第一次给它赋值时就被创建。\n\n```\nx = 5\n```\n\n```\ny\
    \ = \"John\"\nprint(x)\nprint(y)\n```\n\n变量不需要用任何特定的 *类型* 来声明，甚至可以在设置后更改类型。\n\n\
    ```\nx = 4       # x 是 int 类型\nx = \"Sally\" # x 现在是 str 类型\nprint(x)\n```\n\n\
    ### 类型转换\n\n如果你想指定变量的数据类型，可以使用类型转换来完成。\n\n```\nx = str(3) # x 将是 '3'\ny = int(3)\
    \ # y 将是 3\nz = float(3) # z 将是 3.0\n```\n\n### 获取类型\n\n你可以使用 type() 函数获取变量的数据类型。\n\
    \n```\nx = 5\ny = \"John\"\nprint(type(x))\nprint(type(y))\n```\n\n### 单引号还是双引号？\n\
    \n字符串变量可以使用单引号或双引号声明：\n\n```\nx = \"John\"\n```\n\n```\n# 与以下相同\nx = 'John'\n\
    ```\n\n### 大小写敏感\n\n变量名区分大小写。\n\n```\na = 4\nA = \"Sally\"\n#A 不会覆盖 a\n```\n\n\
    ## Python - 变量名\n\n### 变量名\n\n变量可以有一个简短的名称（如 x 和 y）或一个更具描述性的名称（age, carname, total_volume）。Python\
    \ 变量的规则：\n\n- 变量名必须以字母或下划线字符开头\n- 变量名不能以数字开头\n- 变量名只能包含字母数字字符和下划线（A-z, 0-9 和 _）\n\
    - 变量名区分大小写（age, Age 和 AGE 是三个不同的变量）\n\n合法的变量名：\n\n```\nmyvar = \"John\"\nmy_var\
    \ = \"John\"\n_my_var = \"John\"\nmyVar = \"John\"\nMYVAR = \"John\"\nmyvar2 =\
    \ \"John\"\n```\n\n请记住，变量名区分大小写\n\n## 多词变量名\n\n包含多个单词的变量名可能难以阅读。\n你可以使用几种技巧来使它们更具可读性：\n\
    \n### 驼峰命名法\n\n除第一个单词外，每个单词以大写字母开头：\n**myVariableName** = \"John\"\n\n### 帕斯卡命名法\n\
    \n每个单词以大写字母开头：\n**MyVariableName** = \"John\"\n\n### 蛇形命名法\n\n每个单词用下划线字符分隔：\n\
    **my_variable_name** = \"John\"\n\n## Python 变量 - 赋值多个值\n\n### 多个值赋给多个变量\n\nPython\
    \ 允许你在一行中将值赋给多个变量：\n\n**示例**\n\n```\nx, y, z = \"Orange\", \"Banana\", \"Cherry\"\
    \nprint(x)\nprint(y)\nprint(z)\n```\n\n**注意：** 确保变量的数量与值的数量匹配，否则你会得到一个错误。\n\n\
    ### 一个值赋给多个变量\n\n你也可以在一行中将 *相同* 的值赋给多个变量：\n\n**示例**\n\n```\nx = y = z = \"Orange\"\
    \nprint(x)\nprint(y)\nprint(z)\n```\n\n### 解包集合\n\n如果你有一个包含值的列表、元组等集合，Python 允许你将这些值提取到变量中。这称为\
    \ *解包*。\n\n在元组章节中了解更多关于解包的信息。\n\n## Python - 输出变量\n\n### 输出变量\n\nPython 的 print\
    \ 语句通常用于输出变量。\n\n要组合文本和变量，Python 使用 + 字符：\n\n**示例**\n\n```\nx = \"awesome\"\n\
    print(\"Python is \" + x)\n```\n\n你也可以使用 + 字符将一个变量添加到另一个变量：\n\n**示例**\n\n```\n\
    x = \"Python is \"\ny = \"awesome\"\n```\n\n```\nz = x + y\nprint(z)\n```\n\n\
    对于数字，+ 字符用作数学运算符：\n\n### 示例\n\n```\nx = 5\ny = 10\nprint(x + y)\n```\n\n## 06.Python\
    \ 运算符\n\n### Python 运算符\n\n运算符用于对变量和值执行操作。\n在下面的示例中，我们使用 + 运算符将两个值相加：\n\n### 示例\n\
    \n```\nprint(10 + 5)\n```\n\nPython 将运算符分为以下几组：\n\n- 算术运算符\n- 赋值运算符\n- 比较运算符\n\
    - 逻辑运算符\n- 身份运算符\n- 成员运算符\n- 位运算符\n\n### Python 算术运算符\n\n算术运算符用于数值以执行常见的数学运算：\n\
    \n| 运算符 | 名称 | 示例 |\n| :--- | :--- | :--- |\n| + | 加法 | x + y |\n| - | 减法 | x\
    \ - y |\n| * | 乘法 | x * y |\n| / | 除法 | x / y |\n| % | 取模 | x % y |\n| ** | 幂运算\
    \ | x ** y |\n| // | 整除 | x // y |\n\n### Python 赋值运算符\n\n赋值运算符用于将值赋给变量：\n\n|\
    \ 运算符 | 示例 | 等同于 |\n| :--- | :--- | :--- |\n| = | x = 5 | x = 5 |\n| += | x +=\
    \ 3 | x = x + 3 |\n| -= | x -= 3 | x = x - 3 |\n| *= | x *= 3 | x = x * 3 |\n\
    | /= | x /= 3 | x = x / 3 |\n| %= | x %= 3 | x = x % 3 |\n| //= | x //= 3 | x\
    \ = x // 3 |\n| **= | x **= 3 | x = x ** 3 |\n| &= | x &= 3 | x = x & 3 |\n| \\\
    |= | x \\|= 3 | x = x \\| 3 |\n| ^= | x ^= 3 | x = x ^ 3 |\n| >>= | x >>= 3 |\
    \ x = x >> 3 |\n| <<= | x <<= 3 | x = x << 3 |\n\n### Python 身份运算符\n\n身份运算符用于比较对象，不是比较它们是否相等，而是比较它们是否是同一个对象，具有相同的内存位置：\n\
    \n| 运算符 | 描述 | 示例 |\n| :--- | :--- | :--- |\n| is | 如果两个变量是同一个对象则返回 True | x is\
    \ y |\n| is not | 如果两个变量不是同一个对象则返回 True | x is not y |\n\n### Python 成员运算符\n\n\
    成员运算符用于测试一个序列是否存在于一个对象中：\n\n| 运算符 | 描述 | 示例 |\n| :--- | :--- | :--- |\n| in |\
    \ 如果对象中存在具有指定值的序列则返回 True | x in y |\n| not in | 如果对象中不存在具有指定值的序列则返回 True | x\
    \ not in y |\n\n### Python 比较运算符\n\n比较运算符用于比较两个值："
