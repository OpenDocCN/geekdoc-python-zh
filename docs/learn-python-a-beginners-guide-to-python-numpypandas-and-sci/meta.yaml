    ## NumPy Differences


    ### Differences


    A discrete difference means subtracting two successive elements.

    E.g. for [1, 2, 3, 4], the discrete difference would be [2-1, 3-2, 4-3] = [1,
    1, 1]

    To find the discrete difference, use the diff() function.


    **Example**

    Compute discrete difference of the following array:


    ```

    import numpy as np

    arr = np.array([10, 15, 25, 5])

    newarr = np.diff(arr)

    print(newarr)

    ```


    **Returns:** [5 10 -20] because 15-10=5, 25-15=10, and 5-25=-20

    We can perform this operation repeatedly by giving parameter n.


    E.g. for [1, 2, 3, 4], the discrete difference with n = 2 would be [2-1, 3-2,
    4-3] = [1, 1, 1] , then, since n=2, we will do it once more, with the new result:
    [1-1, 1-1] = [0, 0]


    **Example**


    Compute discrete difference of the following array twice:


    ```

    import numpy as np


    arr = np.array([10, 15, 25, 5])


    newarr = np.diff(arr, n=2)


    print(newarr)

    ```


    **Returns:** [5 -30] because: 15-10=5, 25-15=10, and 5-25=-20 AND 10-5=5 and -20-10=-30


    ## NumPy LCM Lowest Common Multiple


    ### Finding LCM (Lowest Common Multiple)


    The Lowest Common Multiple is the least common multiple of both of the numbers.


    **Example**


    Find the LCM of the following two numbers:


    ```

    import numpy as np


    num1 = 4


    num2 = 6


    x = np.lcm(num1, num2)


    print(x)

    ```


    **Returns:** 12 because that is the lowest common multiple of both numbers (4*3=12
    and 6*2=12).


    ### Finding LCM in Arrays


    To find the Lowest Common Multiple of all values in an array, you can use the
    reduce() method.


    The reduce() method will use the ufunc, in this case the lcm() function, on each
    element, and reduce the array by one dimension.


    **Example**


    Find the LCM of the values of the following array:


    ```

    import numpy as np


    arr = np.array([3, 6, 9])


    x = np.lcm.reduce(arr)


    print(x)

    ```


    **Returns:** 18 because that is the lowest common multiple of all three numbers
    (3*6=18, 6*3=18 and 9*2=18).


    **Example**


    Find the LCM of all of an array where the array contains all integers from 1 to
    10:


    ```

    import numpy as np


    arr = np.arange(1, 11)


    x = np.lcm.reduce(arr)


    print(x)

    ```


    ## NumPy GCD Greatest Common Denominator


    ### Finding GCD (Greatest Common Denominator)


    The GCD (Greatest Common Denominator), also known as HCF (Highest Common Factor)
    is the biggest number that is a common factor of both of the numbers.


    **Example**


    Find the HCF of the following two numbers:


    ```

    import numpy as np


    num1 = 6

    num2 = 9


    x = np.gcd(num1, num2)


    print(x)

    ```


    **Returns:** 3 because that is the highest number both numbers can be divided
    by (6/3=2 and 9/3=3).


    ### Finding GCD in Arrays


    To find the Highest Common Factor of all values in an array, you can use the reduce()
    method.


    The reduce() method will use the ufunc, in this case the gcd() function, on each
    element, and reduce the array by one dimension.


    **Example**


    Find the GCD for all of the numbers in following array:


    ```

    import numpy as np


    arr = np.array([20, 8, 32, 36, 16])


    x = np.gcd.reduce(arr)


    print(x)

    ```


    **Returns:** 4 because that is the highest number all values can be divided by.


