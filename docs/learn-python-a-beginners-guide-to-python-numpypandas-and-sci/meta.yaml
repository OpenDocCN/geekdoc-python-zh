- md: "## Create a Child Class\n\nTo create a class that inherits the functionality\
    \ from another class, send the parent class as a parameter when creating the child\
    \ class:\n\n**Example**\n\nCreate a class named Student, which will inherit the\
    \ properties and methods from the Person class:\n\n```\nclass Student(Person):\n\
    \    pass\n```\n\n**Note:** Use the pass keyword when you do not want to add any\
    \ other properties or methods to the class.\n\nNow the Student class has the same\
    \ properties and methods as the Person class.\n\n**Example**\n\nUse the Student\
    \ class to create an object, and then execute the printname method:\n\n```\nx\
    \ = Student(\"Mike\", \"Olsen\")\nx.printname()\n```\n\n## Add the __init__()\
    \ Function\n\nSo far we have created a child class that inherits the properties\
    \ and methods from its parent. We want to add the __init__() function to the child\
    \ class (instead of the pass keyword).\n\n**Note:** The __init__() function is\
    \ called automatically every time the class is being used to create a new object.\n\
    \n**Example**\n\nAdd the __init__() function to the Student class:\n\n```\nclass\
    \ Student(Person):\n    def __init__(self, fname, lname):\n        #add properties\
    \ etc.\n```\n\nWhen you add the __init__() function, the child class will no longer\
    \ inherit the parent's __init__() function.\n\n**Note:** The child's __init__()\
    \ function **overrides** the inheritance of the parent's __init__() function.\
    \ To keep the inheritance of the parent's __init__() function, add a call to the\
    \ parent's __init__() function:\n\n**Example**\n\n```\nclass Student(Person):\n\
    \    def __init__(self, fname, lname):\n        Person.__init__(self, fname, lname)\n\
    ```\n\nNow we have successfully added the __init__() function, and kept the inheritance\
    \ of the parent class, and we are ready to add functionality in the __init__()\
    \ function.\n\n## Use the super() Function\n\nPython also has a super() function\
    \ that will make the child class inherit all the methods and properties from its\
    \ parent:\n\n**Example**\n\n```\nclass Student(Person):\n    def __init__(self,\
    \ fname, lname):\n        super().__init__(fname, lname)\n```\n\nBy using the\
    \ super() function, you do not have to use the name of the parent element, it\
    \ will automatically inherit the methods and properties from its parent.\n\n##\
    \ Add Properties\n\n**Example**\n\nAdd a property called graduationyear to the\
    \ Student class:\n\n```\nclass Student(Person):\n    def __init__(self, fname,\
    \ lname):\n        super().__init__(fname, lname)\n        self.graduationyear\
    \ = 2019\n```\n\nIn the example below, the year 2019 should be a variable, and\
    \ passed into the Student class when creating student objects. To do so, add another\
    \ parameter in the __init__() function:\n\n**Example**\n\nAdd a year parameter,\
    \ and pass the correct year when creating objects:\n\n```\nclass Student(Person):\n\
    \    def __init__(self, fname, lname, year):\n        super().__init__(fname,\
    \ lname)\n        self.graduationyear = year\n\nx = Student(\"Mike\", \"Olsen\"\
    , 2019)\n```\n\n## Add Methods\n\n**Example**\n\nAdd a method called welcome to\
    \ the Student class:\n\n```\nclass Student(Person):\n    def __init__(self, fname,\
    \ lname, year):\n        super().__init__(fname, lname)\n        self.graduationyear\
    \ = year\n\n    def welcome(self):\n        print(\"Welcome\", self.firstname,\
    \ self.lastname, \"to the class of\",\n              self.graduationyear)\n```\n\
    \nIf you add a method in the child class with the same name as a function in the\
    \ parent class, the inheritance of the parent method will be overridden.\n\n##\
    \ 29. Python Iterators\n\n### Python Iterators\n\nAn iterator is an object that\
    \ contains a countable number of values.\nAn iterator is an object that can be\
    \ iterated upon, meaning that you can traverse through all the values.\nTechnically,\
    \ in Python, an iterator is an object which implements the iterator protocol,\
    \ which consist of the methods __iter__() and __next__().\n\n### Iterator vs Iterable\n\
    \nLists, tuples, dictionaries, and sets are all iterable objects. They are iterable\
    \ *containers* which you can get an iterator from.\nAll these objects have a iter()\
    \ method which is used to get an iterator:\n\n**Example**\n\nReturn an iterator\
    \ from a tuple, and print each value:\n\n```\nmytuple = (\"apple\", \"banana\"\
    , \"cherry\")\nmyit = iter(mytuple)\n\nprint(next(myit))\nprint(next(myit))\n\
    print(next(myit))\n```\n\nEven strings are iterable objects, and can return an\
    \ iterator:\n\n**Example**\n\nStrings are also iterable objects, containing a\
    \ sequence of characters:\n\n```\nmystr = \"banana\"\nmyit = iter(mystr)\n\nprint(next(myit))\n\
    print(next(myit))\nprint(next(myit))\nprint(next(myit))\nprint(next(myit))\nprint(next(myit))\n\
    ```\n\n### Looping Through an Iterator\n\nWe can also use a for loop to iterate\
    \ through an iterable object:\n\n**Example**\n\nIterate the values of a tuple:\n\
    \n```\nmytuple = (\"apple\", \"banana\", \"cherry\")\n\nfor x in mytuple:\n  \
    \  print(x)\n```\n\n**Example**\n\nIterate the characters of a string:\n\n```\n\
    mystr = \"banana\"\n\nfor x in mystr:\n    print(x)\n```\n\nThe for loop actually\
    \ creates an iterator object and executes the next() method for each loop.\n\n\
    ### Create an Iterator\n\nTo create an object/class as an iterator you have to\
    \ implement the methods `__iter__()` and `__next__()` to your object.\n\nAs you\
    \ have learned in the Python Classes/Objects chapter, all classes have a function\
    \ called `__init__()`, which allows you to do some initializing when the object\
    \ is being created.\n\nThe `__iter__()` method acts similar, you can do operations\
    \ (initializing etc.), but must always return the iterator object itself.\n\n\
    The `__next__()` method also allows you to do operations, and must return the\
    \ next item in the sequence.\n\n**Example**\n\nCreate an iterator that returns\
    \ numbers, starting with 1, and each sequence will increase by one (returning\
    \ 1,2,3,4,5 etc.):\n\n```\nclass MyNumbers:\n    def __iter__(self):\n       \
    \ self.a = 1\n        return self\n\n    def __next__(self):\n        x = self.a\n\
    \        self.a += 1\n        return x\n\nmyclass = MyNumbers()\nmyiter = iter(myclass)\n\
    \nprint(next(myiter))\nprint(next(myiter))\nprint(next(myiter))\nprint(next(myiter))\n\
    print(next(myiter))\n```\n\n### StopIteration\n\nThe example above would continue\
    \ forever if you had enough next() statements, or if it was used in a for loop.\n\
    \nTo prevent the iteration to go on forever, we can use the StopIteration statement.\n\
    \nIn the __next__() method, we can add a terminating condition to raise an error\
    \ if the iteration is done a specified number of times:\n\n**Example**\n\nStop\
    \ after 20 iterations:\n\n```\nclass MyNumbers:\n    def __iter__(self):\n   \
    \     self.a = 1\n        return self\n\n    def __next__(self):\n        if self.a\
    \ <= 20:\n            x = self.a\n            self.a += 1\n            return\
    \ x\n        else:\n            raise StopIteration\n\nmyclass = MyNumbers()\n\
    myiter = iter(myclass)\n\nfor x in myiter:\n    print(x)\n```\n\n## 30. Python\
    \ Scope\n\nA variable is only available from inside the region it is created.\
    \ This is called **scope**.\n\n### Local Scope\n\nA variable created inside a\
    \ function belongs to the *local scope* of that function, and can only be used\
    \ inside that function.\n\n**Example**\n\nA variable created inside a function\
    \ is available inside that function:\n\n```\ndef myfunc():\n    x = 300\n    print(x)\n\
    myfunc()\n```\n\n### Function Inside Function\n\nAs explained in the example above,\
    \ the variable x is not available outside the function, but it is available for\
    \ any function inside the function:\n\n**Example**\n\nThe local variable can be\
    \ accessed from a function within the function:\n\n```\ndef myfunc():\n    x =\
    \ 300\n    def myinnerfunc():\n        print(x)\n    myinnerfunc()\nmyfunc()\n\
    ```\n\n### Global Scope\n\nA variable created in the main body of the Python code\
    \ is a global variable and belongs to the global scope.\n\nGlobal variables are\
    \ available from within any scope, global and local.\n\n**Example**\n\nA variable\
    \ created outside of a function is global and can be used by anyone:\n\n```\n\
    x = 300\n\ndef myfunc():\n    print(x)\n\nmyfunc()\nprint(x)\n```\n\n### Naming\
    \ Variables\n\nIf you operate with the same variable name inside and outside of\
    \ a function, Python will treat them as two separate variables, one available\
    \ in the global scope (outside the function) and one available in the local scope\
    \ (inside the function):\n\n**Example**\n\nThe function will print the local x,\
    \ and then the code will print the global x:\n\n```\nx = 300\n\ndef myfunc():\n\
    \    x = 200\n    print(x)\n\nmyfunc()\nprint(x)\n```\n\n### Global Keyword\n\n\
    If you need to create a global variable, but are stuck in the local scope, you\
    \ can use the global keyword.\n\nThe global keyword makes the variable global."
  mdcn: "## 创建子类\n\n要创建一个继承另一个类功能的类，在创建子类时将父类作为参数传入：\n\n**示例**\n\n创建一个名为 Student 的类，它将继承\
    \ Person 类的属性和方法：\n\n```\nclass Student(Person):\n    pass\n```\n\n**注意：** 当你不想为类添加任何其他属性或方法时，使用\
    \ pass 关键字。\n\n现在 Student 类拥有与 Person 类相同的属性和方法。\n\n**示例**\n\n使用 Student 类创建一个对象，然后执行\
    \ printname 方法：\n\n```\nx = Student(\"Mike\", \"Olsen\")\nx.printname()\n```\n\
    \n## 添加 __init__() 函数\n\n到目前为止，我们已经创建了一个继承其父类属性和方法的子类。我们想向子类添加 __init__() 函数（而不是\
    \ pass 关键字）。\n\n**注意：** 每次使用类创建新对象时，__init__() 函数都会被自动调用。\n\n**示例**\n\n向 Student\
    \ 类添加 __init__() 函数：\n\n```\nclass Student(Person):\n    def __init__(self, fname,\
    \ lname):\n        #add properties etc.\n```\n\n当你添加 __init__() 函数时，子类将不再继承父类的\
    \ __init__() 函数。\n\n**注意：** 子类的 __init__() 函数**覆盖**了父类 __init__() 函数的继承。要保留父类\
    \ __init__() 函数的继承，请添加对父类 __init__() 函数的调用：\n\n**示例**\n\n```\nclass Student(Person):\n\
    \    def __init__(self, fname, lname):\n        Person.__init__(self, fname, lname)\n\
    ```\n\n现在我们已经成功添加了 __init__() 函数，并保留了父类的继承，我们准备好在 __init__() 函数中添加功能了。\n\n## 使用\
    \ super() 函数\n\nPython 还有一个 super() 函数，它将使子类继承其父类的所有方法和属性：\n\n**示例**\n\n```\n\
    class Student(Person):\n    def __init__(self, fname, lname):\n        super().__init__(fname,\
    \ lname)\n```\n\n通过使用 super() 函数，你不必使用父元素的名称，它将自动继承其父类的方法和属性。\n\n## 添加属性\n\n**示例**\n\
    \n向 Student 类添加一个名为 graduationyear 的属性：\n\n```\nclass Student(Person):\n    def\
    \ __init__(self, fname, lname):\n        super().__init__(fname, lname)\n    \
    \    self.graduationyear = 2019\n```\n\n在下面的示例中，年份 2019 应该是一个变量，并在创建学生对象时传递给 Student\
    \ 类。为此，在 __init__() 函数中添加另一个参数：\n\n**示例**\n\n添加一个 year 参数，并在创建对象时传递正确的年份：\n\n\
    ```\nclass Student(Person):\n    def __init__(self, fname, lname, year):\n   \
    \     super().__init__(fname, lname)\n        self.graduationyear = year\n\nx\
    \ = Student(\"Mike\", \"Olsen\", 2019)\n```\n\n## 添加方法\n\n**示例**\n\n向 Student\
    \ 类添加一个名为 welcome 的方法：\n\n```\nclass Student(Person):\n    def __init__(self,\
    \ fname, lname, year):\n        super().__init__(fname, lname)\n        self.graduationyear\
    \ = year\n\n    def welcome(self):\n        print(\"Welcome\", self.firstname,\
    \ self.lastname, \"to the class of\",\n              self.graduationyear)\n```\n\
    \n如果你在子类中添加一个与父类中函数同名的方法，父类方法的继承将被覆盖。\n\n## 29. Python 迭代器\n\n### Python 迭代器\n\
    \n迭代器是一个包含可计数值的对象。\n迭代器是一个可以被迭代的对象，这意味着你可以遍历所有值。\n从技术上讲，在 Python 中，迭代器是一个实现了迭代器协议的对象，该协议由\
    \ `__iter__()` 和 `__next__()` 方法组成。\n\n### 迭代器 vs 可迭代对象\n\n列表、元组、字典和集合都是可迭代对象。它们是可迭代的*容器*，你可以从中获取迭代器。\n\
    所有这些对象都有一个 `iter()` 方法，用于获取迭代器：\n\n**示例**\n\n从元组返回一个迭代器，并打印每个值：\n\n```\nmytuple\
    \ = (\"apple\", \"banana\", \"cherry\")\nmyit = iter(mytuple)\n\nprint(next(myit))\n\
    print(next(myit))\nprint(next(myit))\n```\n\n即使是字符串也是可迭代对象，并且可以返回迭代器：\n\n**示例**\n\
    \n字符串也是可迭代对象，包含一个字符序列：\n\n```\nmystr = \"banana\"\nmyit = iter(mystr)\n\nprint(next(myit))\n\
    print(next(myit))\nprint(next(myit))\nprint(next(myit))\nprint(next(myit))\nprint(next(myit))\n\
    ```\n\n### 遍历迭代器\n\n我们也可以使用 for 循环来遍历可迭代对象：\n\n**示例**\n\n遍历元组的值：\n\n```\nmytuple\
    \ = (\"apple\", \"banana\", \"cherry\")\n\nfor x in mytuple:\n    print(x)\n```\n\
    \n**示例**\n\n遍历字符串的字符：\n\n```\nmystr = \"banana\"\n\nfor x in mystr:\n    print(x)\n\
    ```\n\nfor 循环实际上创建了一个迭代器对象，并在每次循环中执行 `next()` 方法。\n\n### 创建迭代器\n\n要将一个对象/类创建为迭代器，你必须在你的对象中实现\
    \ `__iter__()` 和 `__next__()` 方法。\n\n正如你在 Python 类/对象章节中学到的，所有类都有一个名为 `__init__()`\
    \ 的函数，它允许你在对象创建时进行一些初始化。\n\n`__iter__()` 方法的作用类似，你可以执行操作（初始化等），但必须始终返回迭代器对象本身。\n\
    \n`__next__()` 方法也允许你执行操作，并且必须返回序列中的下一个项目。\n\n**示例**\n\n创建一个返回数字的迭代器，从 1 开始，每个序列将增加一（返回\
    \ 1,2,3,4,5 等）：\n\n```\nclass MyNumbers:\n    def __iter__(self):\n        self.a\
    \ = 1\n        return self\n\n    def __next__(self):\n        x = self.a\n  \
    \      self.a += 1\n        return x\n\nmyclass = MyNumbers()\nmyiter = iter(myclass)\n\
    \nprint(next(myiter))\nprint(next(myiter))\nprint(next(myit))\nprint(next(myit))\n\
    print(next(myit))\n```\n\n### StopIteration\n\n如果你有足够的 `next()` 语句，或者它在 for 循环中使用，上面的示例将永远继续下去。\n\
    \n为了防止迭代永远进行下去，我们可以使用 StopIteration 语句。\n\n在 `__next__()` 方法中，我们可以添加一个终止条件，如果迭代执行了指定次数，则引发错误：\n\
    \n**示例**\n\n在 20 次迭代后停止：\n\n```\nclass MyNumbers:\n    def __iter__(self):\n \
    \       self.a = 1\n        return self\n\n    def __next__(self):\n        if\
    \ self.a <= 20:\n            x = self.a\n            self.a += 1\n           \
    \ return x\n        else:\n            raise StopIteration\n\nmyclass = MyNumbers()\n\
    myiter = iter(myclass)\n\nfor x in myiter:\n    print(x)\n```\n\n## 30. Python\
    \ 作用域\n\n变量仅在其创建的区域内可用。这称为**作用域**。\n\n### 局部作用域\n\n在函数内部创建的变量属于该函数的*局部作用域*，并且只能在该函数内部使用。\n\
    \n**示例**\n\n在函数内部创建的变量在该函数内部可用：\n\n```\ndef myfunc():\n    x = 300\n    print(x)\n\
    myfunc()\n```\n\n### 函数内部的函数\n\n如上面的示例所述，变量 x 在函数外部不可用，但它在函数内部的任何函数中都可用：\n\n**示例**\n\
    \n可以从函数内部的函数访问局部变量：\n\n```\ndef myfunc():\n    x = 300\n    def myinnerfunc():\n\
    \        print(x)\n    myinnerfunc()\nmyfunc()\n```\n\n### 全局作用域\n\n在 Python 代码主体中创建的变量是全局变量，属于全局作用域。\n\
    \n全局变量可以从任何作用域（全局和局部）内使用。\n\n**示例**\n\n在函数外部创建的变量是全局的，任何人都可以使用：\n\n```\nx = 300\n\
    \ndef myfunc():\n    print(x)\n\nmyfunc()\nprint(x)\n```\n\n### 变量命名\n\n如果你在函数内部和外部使用相同的变量名，Python\
    \ 将它们视为两个独立的变量，一个在全局作用域（函数外部）可用，另一个在局部作用域（函数内部）可用：\n\n**示例**\n\n函数将打印局部 x，然后代码将打印全局\
    \ x：\n\n```\nx = 300\n\ndef myfunc():\n    x = 200\n    print(x)\n\nmyfunc()\n\
    print(x)\n```\n\n### global 关键字\n\n如果你需要创建一个全局变量，但被困在局部作用域中，你可以使用 global 关键字。\n\
    \nglobal 关键字使变量成为全局变量。"
