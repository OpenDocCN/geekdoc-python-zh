    import numpy as np

    arr = np.array([1.1, 2.1, 3.1])

    newarr = arr.astype(int)

    print(newarr)

    print(newarr.dtype)

    ```


    ## 示例


    将数据类型从整数更改为布尔值：


    ```python

    import numpy as np

    arr = np.array([1, 0, 3])

    newarr = arr.astype(bool)

    print(newarr)

    print(newarr.dtype)

