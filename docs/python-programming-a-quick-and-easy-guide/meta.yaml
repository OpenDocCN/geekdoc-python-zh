    \ndef convert_to_miles(kilometers):\n    return kilometers / 1.609344\n\ndef convert_to_kilometers(miles):\n\
    \    return miles * 1.609344\n```\n\nNow, we can make a general function and pass\
    \ another function as an argument:\n\n```python\ndef conversion(operation, argument):\n\
    \    return operation(argument)\n```\n\nWe can now call `conversion()` like the\
    \ following:\n\n```python\nresult = conversion(convert_to_miles, 10)\nprint(result)\
    \  # 6.2137119223733395\n```\n\nAs you can see, we have written `convert_to_miles`\
    \ as a parameter of the function `conversion()`. We can use other already defined\
    \ functions like that:\n\n```python\nresult = conversion(convert_to_feet, 310)\n\
    print(result)  # 1017.0603674540682\n```\n\nWe can now make use of lambdas and\
    \ make this type of abstraction much simpler.\nInstead of writing all those four\
    \ functions, we can simply write a concise lambda function and use it as a parameter\
    \ when calling the conversion() function:\n\n```python\ndef conversion(operation,\
    \ argument):\n    return operation(argument)\n\nresult = conversion(lambda kilometers:\
