    \ get() and specifying the key of the item that we want to get:\n\n```\ngerman_to_english_dictionary.get(\"\
    Wasser\")\n```\n\nWe can create dictionaries using dict():\n\n```\npython\nwords\
    \ = dict([\n    ('abandon', 'to give up to someone or something on the ground'),\n\
