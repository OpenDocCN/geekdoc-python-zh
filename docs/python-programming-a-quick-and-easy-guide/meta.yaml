    print(my_list[0:3])  # [1, 2, 3]

    ```


    如你所见，我们指定了 0 作为起始索引，3 作为切片应停止的索引，不包括结束索引处的元素。


    如果我们想从某个索引开始并获取列表中所有剩余的元素，即结束索引应该是最后一个索引，那么我们可以省略而不必写出最后一个索引：


    ```

