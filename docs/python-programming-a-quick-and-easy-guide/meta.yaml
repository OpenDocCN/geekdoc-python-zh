    \n```python\nbike = Bicycle(\"Connondale\", \"grey\", True)\n```\n\n我们为这辆自行车提供了自定义参数，并将它们传递给构造方法，以便我们获得一辆具有这些特定属性的新自行车。正如你可能看出的，我们正在创建一辆灰色的、Connondale品牌的山地自行车。\n\
    \n我们也可以通过使用可选参数从类创建对象，如下所示：\n\n```python\nclass Bicycle:\n    # 以下所有属性都是可选的\n\
