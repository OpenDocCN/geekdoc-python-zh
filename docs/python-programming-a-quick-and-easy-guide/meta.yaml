- md: '## Logical operators


    In high school math, you have probably learned about logical operators such as
    `and` and `or`.


    Briefly speaking, for an expression to evaluate to `True` when using `and`, both
    statements should be true. In Python, we implement it using `and`:


    ```python

    print(5 > 0 and 3 < 5)  # True

    ```


    This example is going to evaluate to `True` since 5 is greater than 0, which evaluates
    to `True`, and 3 is less than 5, which also evaluates to `True`, from which we
    get, `True and True`, which evaluates to `True`.


    Let us take an example when an `and` expression is going to evaluate to `False`:


    ```python

    print(2 > 5 and 0 > -1)  # False

    ```


    2 is not greater than 5, so the statement in the left hand side is going to evaluate
    to `False`. No matter what''s on the right hand, we are going to get the whole
    expression equal to `False`, since `False and whatever value else` is going to
    result to `False`.


    When we want to have statements that at least one of them should evaluate to `True`,
    then we should use `or`:


    ```python

    print(2 > 5 or 0 > -1)  # True

    ```


    This is going to evaluate to `True` since the statement in the right hand side
    evaluates to `True`.


    If both statements are `False`, then `or` results with `False` in the end:


    ```python

    print(2 < 0 or 0 > 1)  # False

    ```


    This is `False` since 0 is not greater than 2 and also 0 is not greater than 1.
    Hence, the whole expression is `False`.


    ## Data types


    ### Variables


    Variables can be considered as the building blocks of any computer program that
    you can think of.


    They can be used to store values and then be reused as many times as you want.
    The moment you want to change their value, you can just change it in one place
    and that new value that you just changed is going to get reflected everywhere
    else where this variable is used.


    Every variable in Python is an object.


    A variable is created in the moment it is initialized with a value.


    Here are the general rules for Python variables:


    - A variable name must start with a letter or the underscore character. It cannot
    start with a number.

    - A variable name can only contain alpha-numeric characters and underscores (A-z,
    0-9, and _ ).

    - Variable names are case-sensitive, meaning that `height`, `Height`, `HEIGHT`
    are all different variables.


    Let us define our first variable:


    ```python

    age = 28

    ```


    In this example, we are initializing a variable with the name `age` and assigning
    the value 28 to it.


    We can define other variables along with it, like:


    ```python

    age = 28

    salary = 10000

    ```


    We can use pretty much any name that we want, but it is a better practice to use
    names that can be well understood both by you and other work colleagues who work
    with you.


    We have other variable types in Python, such as float numbers, strings, and boolean
    values. We can even create our own custom types.


    Let us see an example of a variable that holds a float number:


    ```python

    height = 3.5

    ```


    As you can see, this initialization is quite similar to the ones when we had integer
    numbers. Here we are only changing the value on the right and Python interpreter
    is smart enough to know that we are dealing with another type of variable, namely
    a float type of variable.


    Let us see an example of a string:


    ```python

    reader = "Fatos"

    ```


    We put string values either in quotes or in apostrophes to specify the value that
    we want to store in string variables.


    When we want to store boolean values, we need to use reserved words, namely, *True*
    and *False*.


    ```python

    text_visibile = False

    ```


    We can also have a boolean value stored when we have expressions that result with
    a boolean value, for example, when we compare a number with another number, such
    as:


    ```python

    is_greater = 5 > 6

    ```


    This variable is going to get initialized with the value `False` since 5 is lower
    than 6.


    ### Numbers


    We have three numeric types in Python: integers, floats and complex numbers.


    #### Integers


    Integers represent whole numbers that can be both positive and negative and do
    not contain any decimal part.

    Here are a few examples of integers: 1, 3000, -31234, etc.

    When adding, subtracting, or multiplying two integers, we get an integer as a
    result in the end.


    ```python

    print(3 + 5)  # 8

    print(3 - 5)  # -2

    print(3 * 5)  # 15

    ```


    These are all integers.

    This also includes cases when we raise a number to a power:


    ```python

    result = 3 ** 4  # This is similar to multiplying 3 * 3 * 3 * 3 in which case,
    we are multiplying integers together

    print(result)  # 81

    ```


    When we want to divide two integers, we are going to get a float number.


    #### Boolean


    Boolean type represents truth values `True` and `False`. We include the explanation
    of this type inside this *Numbers* section, since booleans are indeed subtypes
    of the integer type.


    More specifically, almost always a `False` value can be considered as a 0, whereas
    a `True` value can be considered as a 1.


    As such, we can also do arithmetic operations with them:


    ```python

    print(True * 5)  # 5

    print(False * 500)  # 0, since False is equal to 0

    ```


    The exception for such integer representations of Boolean values is when we these
    values are strings such as "False" and "True".


    #### Floats


    Float numbers are numbers that contain the decimal part, such as -3.14, 12.031,
    9.3124, etc.


    We can also convert float numbers using the `float()` function:


    ```python

    ten = float(10)


    print(ten)  # 10.0

    ```


    When adding, subtracting, or dividing two float numbers, or a float number and
    an integer, we get a float number as a result in the end:


    ```python

    print(3.4 * 2)  # 6.8

    print(3.4 + 2)  # 5.4

    print(3.4 - 2)  # 1.4

    print(2.1 * 3.4)  # 7.14

    ```


    #### Complex numbers


    Complex numbers have both the real and the imaginary part that we write in the
    following way:


    ```python

    complex_number = 1 + 5j


    print(complex_number)  # (1+5j)

    ```


    ### Strings


    Strings represent characters that are enclosed in either single quotes or double
    quotes and both of them are treated the same:


    ```python

    name = "Fatos"  # Double quotes


    name = ''Fatos''  # Single quotes

    ```


    If we want to include a quote inside a string, we need to let Python know that
    it should not close the string but simply escape that quote:


    ```python

    greeting = ''Hello. I\''m fine.''  # We escaped the apostrophe


    double_quote_greeting = "Hello. I''m fine."  # When using double quotes, we do
    not need to escape the apostrophe

    ```


    When we want to include a new line in a string, we can include the special character
    `\n`:


    ```python

    my_string = "I want to continue \n in the next line"


    print(my_string)

    # I want to continue

    # in the next line

    ```


    Since strings are arrays of characters, we can index specific characters using
    indexes. Indexes start from 0 and go all the way until the length of the string
    minus 1. We exclude the index that is equal to the length of the string since
    we start indexing from 0 and not from 1.


    Here is an example:


    ```python

    string = "Word"

    ```


    In this example, if we were to select individual characters of the string, they
    would unfold as follows:


    ```python

    string = "Word"


    print(string[0])  # W

    print(string[1])  # o

    print(string[2])  # r

    print(string[3])  # d

    ```


    We can use negative indexes as well, which means that we start from the end of
    the string with -1. We cannot use 0 to index from the end of a string, since -0
    = 0:


    ```python

    print(string[-1])  # d

    print(string[-2])  # r

    print(string[-3])  # o

    print(string[-4])  # W

    ```


    We can also do slicing and include only a portion of the string and not the entire
    string, for example, if we want to get characters that start from a specific index
    until a specific index, we should write it in the following way: `string[start_index:end_index]`,
    excluding the character at index `end_index`:


    ```python

    string = "Word"


    print(string[0:3])  # Wor

    ```


    If we want to start from a specific index and continue getting all the remaining
    characters of the string until the end, we can omit specifying the end index,
    as follows:


    ```python

    string = "Word"


    print(string[2:])  # rd

    ```


    If we want to start from 0 and go until a specific index, we can simply specify
