    ```

    1 words = {

    2     ''a'': ''alfa'',

    3     ''b'': ''beta'',

    4     ''d'': ''delta'',

    5 }

    6

    7 del words[''b'']

    8

    9 print(words)  # {''a'': ''alfa'', ''d'': ''delta''}

    ```


    # Length


    We can get the length of a dictionary using len() just like with lists and tuples:'
  - '[PAGE 53]


    ```

    1 words = {

    2     ''a'': ''alfa'',

    3     ''b'': ''beta'',

    4     ''d'': ''delta'',

    5 }

    6

    7 print(len(words))  # 3

    ```


    # Membership


    If we want to check whether a key is already part of a dictionary so that we avoid
    overriding it, we can use the operator `in` and `not in` just like with lists
    and tuples:


    ```

    1 words = {

    2     ''a'': ''alfa'',

    3     ''b'': ''beta'',

    4     ''d'': ''delta'',

    5 }

    6

    7 print(''a'' in words)  # True

    8 print(''z'' not in words)  # True

    ```


    # Comprehension


    We can use comprehension just like with lists to create dictionaries in a quick
    way.


    To help us with that, we are going to need to use a method called `items()` that
    converts a dictionary into a list of tuples where the element in index 0 is a
    key, whereas in position with index 1, we have a value.


    Let us first see the method `items()` in action:'
  - "[PAGE 54]\n\n```\npoints = {\n    'Festim': 50,\n    'Zgjim': 89,\n    'Durim':\
    \ 73\n}\n\nelements = points.items()\n\nprint(elements) # dict_items([('Festim',\
    \ 50), ('Zgjim', 89), ('Durim', 73)])\n```\n\nNow let us create a new dictionary\
    \ from this existing dictionary points using comprehension. We can assume that\
    \ a professor is in a good mood and generous enough to reward each student with\
    \ a bonus of 10 points. We want to add these new points to each student by saving\
    \ these new points in a new dictionary:\n\n```\npoints = {\n    'Festim': 50,\n\
    \    'Zgjim': 89,\n    'Durim': 73\n}\n\nelements = points.items()\n\npoints_modified\
    \ = {key: value + 10 for (key, value) in elements}\n\nprint(points_modified) #\
    \ {'Festim': 60, 'Zgjim': 99, 'Durim': 83}\n```"
  - '[PAGE 55]


    # # Sets


    Sets are unordered and unindexed collections of data. Since elements in sets are
    not ordered, we cannot access elements using indexes or using the method get().


    We can add tuples, but we cannot add dictionaries or lists in a set.


    We cannot add duplicate elements in sets. This means that when we want to remove
    duplicate elements from another type of collection, we can make use of this uniqueness
    in sets.


    Let us start creating our first set using curly brackets as follows:


    ```

    first_set = {1, 2, 3}

    ```


    We can also create sets using the set() constructor:


    ```

    empty_set = set()  # Empty set


    first_set = set((1, 2, 3))  # We are converting a tuple into a set

    ```


    Like all data structures, we can find the length of a set using the method len():


    ```

    print(len(first_set))  # 3

    ```


    # ## Adding elements


    Adding one element in a set can be done using the method add():'
  - '[PAGE 56]


    ```

    1 my_set = {1, 2, 3}

    2

    3 my_set.add(4)

    4

    5 print(my_set)  # {1, 2, 3, 4}

    ```


    If we want to add more than one element, then we need to use method update() and
    as an input for this method a list, tuple, string or another set:


    ```

    1 my_set = {1, 2, 3}

    2

    3 my_set.update([4, 5, 6])

    4

    5 print(my_set)  # {1, 2, 3, 4, 5, 6}

    6

    7 my_set.update("ABC")

    8

    9 print(my_set)  # {1, 2, 3, 4, 5, 6, ''A'', ''C'', ''B''}

    ```


    # Deleting elements


    If we want to delete elements from sets, we can use methods discard() or remove():


    ```

    1 my_set = {1, 2, 3}

    2

    3 my_set.remove(2)

    4

    5 print(my_set)  # {1, 3}

    ```


    If we try to delete an element that is not part of the set using remove(), then
    we are going to get an error:'
  - '[PAGE 57]


    ```

    1 my_set = {1, 2, 3}

    2

    3 my_set.remove(4)

    4

    5 print(my_set)  # KeyError: 4

    ```


    To avoid such errors when removing elements from sets, we can use the method discard():


    ```

    1 my_set = {1, 2, 3}

    2

    3 my_set.discard(4)

    4

    5 print(my_set)  # {1, 2, 3}

    ```


    # Set Theory Operations


    If you remember high school math lessons, you should already know union, intersection,
    and the difference between two sets of elements. These operations are supported
    for sets in Python as well.


    # Union


    Union represents the collection of all unique elements from both sets. We can
    find the union of two sets using the pipe operator | or the union() method:


    ```

    1 first_set = {1, 2}

    2 second_set = {2, 3, 4}

    3

    4 union_set = first_set.union(second_set)

    5

    6 print(union_set)  # {1, 2, 3, 4}

    ```'
  - '[PAGE 58]


    # Intersection


    Intersection represents the collection that contains elements that are in both
    sets. We can find it using operator & or the intersection() method:


    ```

    1  first_set = {1, 2}

    2  second_set = {2, 3, 4}

    3

    4  intersection_set = first_set.intersection(second_set)

    5

    6  print(union_set)  # {2}

    ```


    # Difference


    The difference between two sets represents the collection that contains only the
    elements that are in the first set, but not in the second. We can find the difference
    between two sets using the - operator or the method difference()


    ```

    1  first_set = {1, 2}

    2  second_set = {2, 3, 4}

    3

    4  difference_set = first_set.difference(second_set)

    5

    6  print(difference_set)  # {1}

    ```


    As you can probably remember from high school, ordering of sets when we find the
    difference of two sets matters, which is not the case with the union and intersection.


    This is similar to arithmetic, where 3 - 4 is not equal to 4 - 3:'
- md: "## Type Conversions\n\n### Conversions between primitive types\n\nPython is\
    \ an object oriented programming. That is why it uses constructor functions of\
    \ classes to do conversions from one type into another.\n\n### int()\n\nint()\
    \ is a method that is used to do a conversion of an integer literal, float literal\
    \ (rounding it to its previous integer number, i.e. 3.1 to 3), or a string literal\
    \ (with the condition that the string represents an int or float literal):\n\n\
    ```python\nthree = int(3)  # converting an integer literal into an integer\nprint(three)\
    \  # 3\n\nfour = int(4.8)  # converting a float number into its previous closest\
    \ integer\nprint(four)  # 4\n\nfive = int('5')  # converting a string into an\
    \ integer\nprint(five)  # 5\n```\n\n### float()\n\nfloat() is similarly used to\
    \ create float numbers from an integer, float, or string literal (with the condition\
    \ that the string represents an int or float literal):\n\n```python\nint_literal\
    \ = float(5)\nprint(int_literal)  # 5.0\n\nfloat_literal = float(1.618)\nprint(float_literal)\
    \  # 1.618\n\nstring_int = float(\"40\")\nprint(string_int)  # 40.0\n\nstring_float\
    \ = float(\"37.2\")\nprint(string_float)  # 37.2\n```\n\n### str()\n\nstr() can\
    \ be used to create strings from strings, integer literals, float literals, and\
    \ many other data types:\n\n```python\nint_to_string = str(3)\nprint(int_to_string)\
    \  # '3'\n\nfloat_to_string = str(3.14)\nprint(float_to_string)  # '3.14'\n\n\
    string_to_string = str('hello')\nprint(string_to_string)  # 'hello'\n```\n\n###\
    \ Other Conversions\n\nThe way we can convert from one type of data structure\
    \ into another type is the following:\n\n```python\ndestination_type(input_type)\n\
    ```\n\nLet us get started with specific types, so that it becomes much clearer.\n\
    \n### Conversions to lists\n\nWe can convert a set, tuple, or dictionary into\
    \ a list using the `list()` constructor.\n\n```python\nbooks_tuple = ('Book 1',\
    \ 'Book 2', 'Book 3')\ntuple_to_list = list(books_tuple)  # Converting tuple to\
    \ list\nprint(tuple_to_list)  # ['Book 1', 'Book 2', 'Book 3']\n\nbooks_set =\
    \ {'Book 1', 'Book 2', 'Book 3'}\nset_to_list = list(books_set)  # Converting\
    \ set to list\nprint(set_to_list)  # ['Book 1', 'Book 2', 'Book 3']\n```\n\nWhen\
    \ converting a dictionary into a list, only its keys are going to make it into\
    \ a list:\n\n```python\nbooks_dict = {'1': 'Book 1', '2': 'Book 2', '3': 'Book\
    \ 3'}\ndict_to_list = list(books_dict)  # Converting dict to list\nprint(dict_to_list)\
    \  # ['1', '2', '3']\n```\n\nIf we want to keep both keys and values of a dictionary,\
    \ we need to use the method `items()` to first convert it into a list of tuples\
    \ where each tuple is a key and a value:\n\n```python\nbooks_dict = {'1': 'Book\
    \ 1', '2': 'Book 2', '3': 'Book 3'}\ndict_to_list = list(books_dict.items()) \
    \ # Converting dict to list\nprint(dict_to_list)\n# [('1', 'Book 1'), ('2', 'Book\
    \ 2'), ('3', 'Book 3')]\n```\n\n### Conversions to tuples\n\nAll data structures\
    \ can be converted to a tuple using the `tuple()` constructor method, including\
    \ a dictionary in which case we get a tuple with the keys of the dictionary:\n\
    \n```python\nbooks_list = ['Book 1', 'Book 2', 'Book 3']\nlist_to_tuple = tuple(books_list)\
    \  # Converting tuple to tuple\nprint(list_to_tuple)  # ('Book 1', 'Book 2', 'Book\
    \ 3')\n\nbooks_set = {'Book 1', 'Book 2', 'Book 3'}\nset_to_tuple = tuple(books_set)\
    \  # Converting set to tuple\nprint(set_to_tuple)  # ('Book 1', 'Book 2', 'Book\
    \ 3')\n\nbooks_dict = {'1': 'Book 1', '2': 'Book 2', '3': 'Book 3'}\ndict_to_tuple\
    \ = tuple(books_dict)  # Converting dict to tuple\nprint(dict_to_tuple)  # ('1',\
    \ '2', '3')\n```\n\n### Conversions to sets\n\nSimilarly, all data structures\
    \ can be converted to a set using the `set()` constructor method, including a\
    \ dictionary in which case we get a set with the keys of the dictionary:\n\n```python\n\
    books_list = ['Book 1', 'Book 2', 'Book 3']\nlist_to_set = set(books_list)  #\
    \ Converting list to set\nprint(list_to_set)  # {'Book 2', 'Book 3', 'Book 1'}\n\
    \nbooks_tuple = ('Book 1', 'Book 2', 'Book 3')\ntuple_to_set = set(books_tuple)\
    \  # Converting tuple to set\nprint(tuple_to_set)  # {'Book 2', 'Book 3', 'Book\
    \ 1'}\n\nbooks_dict = {'1': 'Book 1', '2': 'Book 2', '3': 'Book 3'}\ndict_to_set\
    \ = set(books_dict)  # Converting dict to set\nprint(dict_to_set)  # {'1', '3',\
    \ '2'}\n```\n\n### Conversions to dictionaries\n\nConversions into dictionaries\
    \ cannot be done with any type of sets, lists, or tuples, since dictionaries represent\
    \ data structures where each element contains both a key and a value.\n\nConverting\
    \ a list, or a tuple into a dictionary can be done if each element in a list is\
    \ also a list with two elements, or a tuple with two elements.\n\n```python\n\
    books_tuple_list = [(1, 'Book 1'), (2, 'Book 2'), (3, 'Book 3')]\ntuple_list_to_dictionary\
    \ = dict(books_tuple_list)  # Converting list to set\nprint(tuple_list_to_dictionary)\
    \  # {1: 'Book 1', 2: 'Book 2', 3: 'Book 3'}\n\nbooks_list_list = [[1, 'Book 1'],\
    \ [2, 'Book 2'], [3, 'Book 3']]\ntuple_list_to_dictionary = dict(books_list_list)\
    \  # Converting list to set\nprint(tuple_list_to_dictionary)  # {1: 'Book 1',\
    \ 2: 'Book 2', 3: 'Book 3'}\n```\n\n```python\nbooks_tuple_list = ([1, 'Book 1'],\
    \ [2, 'Book 2'], [3, 'Book 3'])\ntuple_list_to_set = dict(books_tuple_list)  #\
    \ Converting tuple to set\nprint(tuple_list_to_set)  # {'Book 2', 'Book 3', 'Book\
    \ 1'}\n```\n\n```python\nbooks_list_list = ([1, 'Book 1'], [2, 'Book 2'], [3,\
    \ 'Book 3'])\nlist_list_to_set = dict(books_list_list)  # Converting tuple to\
    \ set\nprint(list_list_to_set)  # {'Book 2', 'Book 3', 'Book 1'}\n```\n\nIn case\
    \ when we want to convert a set into a dictionary, we need to have each element\
    \ as a tuple of length 2.\n\n```python\nbooks_tuple_set = {('1', 'Book 1'), ('2',\
    \ 'Book 2'), ('3', 'Book 3')}\ntuple_set_to_dict = dict(books_tuple_set)  # Converting\
    \ dict to set\nprint(tuple_set_to_dict)  # {'1', '3', '2'}\n```\n\nIf we try to\
    \ do a conversion of a set that has each element as a list of length 2 into a\
    \ dictionary, we are going to get an error:\n\n```python\nbooks_list_set = {['1',\
    \ 'Book 1'], ['2', 'Book 2'], ['3', 'Book 3']}\nlist_set_to_dict = dict(books_list_set)\
    \  # Converting dict to set\nprint(list_set_to_dict)  # {'1', '3', '2'}\n```\n\
    \nAfter we run the last code block, we are going to get an error:\n\n```\nTypeError:\
    \ unhashable type: 'list'\n```\n\n### Wrap Up\n\nIn conclusion, Python has a variety\
    \ of data types that you can use to store data. These data types are important\
    \ to know so that you can choose the right one for your needs. Be sure to use\
    \ the right data type for the task that is in front of you to avoid errors and\
    \ optimize performance.\n\n## Control Flow\n\n### Conditional statements\n\nWhen\
    \ you think about ways we think and also communicate with each other, you may\
    \ get the impression that we are indeed always using conditions.\n\n- If it's\
    \ 8 am, I take the bus and go to work.\n- If I am hungry, I eat.\n- If this item\
    \ is cheap, I can afford it.\n\nThis is also something that you can do in programming.\
    \ We can use conditions to control the flow of the execution.\nTo do that, we\
    \ use the reserved term `if` and an expression that evaluates to a True or False\
    \ value. We can then also use an `else` statement where we want the flow to continue\
    \ in cases when the `if` condition is not met.\nTo make it easier to understand,\
    \ let us assume that we have an example where we want to check whether a number\
    \ is positive:\n\n```python\nif number > 0:\n    print(\"The given number is positive\"\
    )\nelse:\n    print(\"The given number is not positive\")\n```\n\nIf we were to\
    \ have `number = 2`: we would enter into the `if` branch and execute the command\
    \ that is used to print the following text in the console:\n\nThe given number\
    \ is positive\n\nIf we would have another number, such as -1, we would see in\
    \ the console the following message being printed:\n\nThe given number **is not**\
    \ positive\n\nWe can also add additional conditions and not just 2 like above\
    \ by using `elif` which is evaluated when the `if` expression is not evaluated.\n\
    \nLet us see an example to make it easier for you to understand it:\n\n```python\n\
    if number > 0:\n    print(\"The given number is positive\")\nelif number == 0:\n\
    \    print(\"The given number is 0\")\nelse:\n    print(\"The given number is\
    \ negative\")\n```\n\nNow if we were to have `number = 0`, the first condition\
    \ is not going to be met, since the value is not greater than 0. As you can guess,\
    \ since the given number is equal to 0, we are going to see the following message\
    \ being printed in the console:\n\nThe given number is 0\n\nIn cases when the\
    \ value is negative, our program is going to pass the first two conditions since\
    \ they are not satisfied and then jump into the `else` branch and print the following\
    \ message in the console:\n\nThe given number is negative"
  mdcn: "## 类型转换\n\n### 基本类型之间的转换\n\nPython 是一门面向对象的编程语言。这就是为什么它使用类的构造函数来完成从一种类型到另一种类型的转换。\n\
    \n### int()\n\n`int()` 是一个用于将整数字面量、浮点数字面量（将其四舍五入到前一个整数，即 3.1 变为 3）或字符串字面量（前提是字符串表示一个整数或浮点数字面量）进行转换的方法：\n\
    \n```python\nthree = int(3)  # 将整数字面量转换为整数\nprint(three)  # 3\n\nfour = int(4.8)\
    \  # 将浮点数转换为其前一个最接近的整数\nprint(four)  # 4\n\nfive = int('5')  # 将字符串转换为整数\nprint(five)\
    \  # 5\n```\n\n### float()\n\n`float()` 类似地用于从整数、浮点数或字符串字面量创建浮点数（前提是字符串表示一个整数或浮点数字面量）：\n\
    \n```python\nint_literal = float(5)\nprint(int_literal)  # 5.0\n\nfloat_literal\
    \ = float(1.618)\nprint(float_literal)  # 1.618\n\nstring_int = float(\"40\")\n\
    print(string_int)  # 40.0\n\nstring_float = float(\"37.2\")\nprint(string_float)\
    \  # 37.2\n```\n\n### str()\n\n`str()` 可用于从字符串、整数字面量、浮点数字面量以及许多其他数据类型创建字符串：\n\n\
    ```python\nint_to_string = str(3)\nprint(int_to_string)  # '3'\n\nfloat_to_string\
    \ = str(3.14)\nprint(float_to_string)  # '3.14'\n\nstring_to_string = str('hello')\n\
    print(string_to_string)  # 'hello'\n```\n\n### 其他转换\n\n我们可以将一种数据结构类型转换为另一种类型的方式如下：\n\
    \n```python\n目标类型(输入类型)\n```\n\n让我们从具体类型开始，这样会清晰得多。\n\n### 转换为列表\n\n我们可以使用 `list()`\
    \ 构造函数将集合、元组或字典转换为列表。\n\n```python\nbooks_tuple = ('Book 1', 'Book 2', 'Book 3')\n\
    tuple_to_list = list(books_tuple)  # 将元组转换为列表\nprint(tuple_to_list)  # ['Book\
    \ 1', 'Book 2', 'Book 3']\n\nbooks_set = {'Book 1', 'Book 2', 'Book 3'}\nset_to_list\
    \ = list(books_set)  # 将集合转换为列表\nprint(set_to_list)  # ['Book 1', 'Book 2', 'Book\
    \ 3']\n```\n\n将字典转换为列表时，只有其键会进入列表：\n\n```python\nbooks_dict = {'1': 'Book 1',\
    \ '2': 'Book 2', '3': 'Book 3'}\ndict_to_list = list(books_dict)  # 将字典转换为列表\n\
    print(dict_to_list)  # ['1', '2', '3']\n```\n\n如果我们想保留字典的键和值，我们需要使用 `items()`\
    \ 方法首先将其转换为元组列表，其中每个元组是一个键和一个值：\n\n```python\nbooks_dict = {'1': 'Book 1', '2':\
    \ 'Book 2', '3': 'Book 3'}\ndict_to_list = list(books_dict.items())  # 将字典转换为列表\n\
    print(dict_to_list)\n# [('1', 'Book 1'), ('2', 'Book 2'), ('3', 'Book 3')]\n```\n\
    \n### 转换为元组\n\n所有数据结构都可以使用 `tuple()` 构造函数方法转换为元组，包括字典，这种情况下我们得到一个包含字典键的元组：\n\n\
    ```python\nbooks_list = ['Book 1', 'Book 2', 'Book 3']\nlist_to_tuple = tuple(books_list)\
    \  # 将列表转换为元组\nprint(list_to_tuple)  # ('Book 1', 'Book 2', 'Book 3')\n\nbooks_set\
    \ = {'Book 1', 'Book 2', 'Book 3'}\nset_to_tuple = tuple(books_set)  # 将集合转换为元组\n\
    print(set_to_tuple)  # ('Book 1', 'Book 2', 'Book 3')\n\nbooks_dict = {'1': 'Book\
    \ 1', '2': 'Book 2', '3': 'Book 3'}\ndict_to_tuple = tuple(books_dict)  # 将字典转换为元组\n\
    print(dict_to_tuple)  # ('1', '2', '3')\n```\n\n### 转换为集合\n\n类似地，所有数据结构都可以使用 `set()`\
    \ 构造函数方法转换为集合，包括字典，这种情况下我们得到一个包含字典键的集合：\n\n```python\nbooks_list = ['Book 1',\
    \ 'Book 2', 'Book 3']\nlist_to_set = set(books_list)  # 将列表转换为集合\nprint(list_to_set)\
    \  # {'Book 2', 'Book 3', 'Book 1'}\n\nbooks_tuple = ('Book 1', 'Book 2', 'Book\
    \ 3')\ntuple_to_set = set(books_tuple)  # 将元组转换为集合\nprint(tuple_to_set)  # {'Book\
    \ 2', 'Book 3', 'Book 1'}\n\nbooks_dict = {'1': 'Book 1', '2': 'Book 2', '3':\
    \ 'Book 3'}\ndict_to_set = set(books_dict)  # 将字典转换为集合\nprint(dict_to_set)  #\
    \ {'1', '3', '2'}\n```\n\n### 转换为字典\n\n转换为字典不能使用任何类型的集合、列表或元组，因为字典表示的数据结构中每个元素都包含一个键和一个值。\n\
    \n如果列表中的每个元素也是一个包含两个元素的列表，或者一个包含两个元素的元组，那么可以将列表或元组转换为字典。\n\n```python\nbooks_tuple_list\
    \ = [(1, 'Book 1'), (2, 'Book 2'), (3, 'Book 3')]\ntuple_list_to_dictionary =\
    \ dict(books_tuple_list)  # 将列表转换为字典\nprint(tuple_list_to_dictionary)  # {1: 'Book\
    \ 1', 2: 'Book 2', 3: 'Book 3'}\n\nbooks_list_list = [[1, 'Book 1'], [2, 'Book\
    \ 2'], [3, 'Book 3']]\ntuple_list_to_dictionary = dict(books_list_list)  # 将列表转换为字典\n\
    print(tuple_list_to_dictionary)  # {1: 'Book 1', 2: 'Book 2', 3: 'Book 3'}\n```\n\
    \n```python\nbooks_tuple_list = ([1, 'Book 1'], [2, 'Book 2'], [3, 'Book 3'])\n\
    tuple_list_to_set = dict(books_tuple_list)  # 将元组转换为字典\nprint(tuple_list_to_set)\
    \  # {'Book 2', 'Book 3', 'Book 1'}\n```\n\n```python\nbooks_list_list = ([1,\
    \ 'Book 1'], [2, 'Book 2'], [3, 'Book 3'])\nlist_list_to_set = dict(books_list_list)\
    \  # 将元组转换为字典\nprint(list_list_to_set)  # {'Book 2', 'Book 3', 'Book 1'}\n```\n\
    \n如果我们想将集合转换为字典，我们需要每个元素都是一个长度为 2 的元组。\n\n```python\nbooks_tuple_set = {('1',\
    \ 'Book 1'), ('2', 'Book 2'), ('3', 'Book 3')}\ntuple_set_to_dict = dict(books_tuple_set)\
    \  # 将集合转换为字典\nprint(tuple_set_to_dict)  # {'1': 'Book 1', '2': 'Book 2', '3':\
