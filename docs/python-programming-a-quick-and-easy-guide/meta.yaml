    # Stacking decorators


    We can also use more than one decorator for a single function. Their order of
    execution starts from top to bottom, meaning that the decorator that has been
    defined first is applied first, then the second one, and so on.


    Let us do a simple experiment and apply the same decorator that we defined in
    the previous section twice.


    Let us first understand what does that mean.


    So we first call the decorator to reverse a list:


    [1, 2, 3, 4, 5] to [5, 4, 3, 2, 1]


    Then we apply it again, but now with the returned result from the previous calling
    of the decorator:


    [5, 4, 3, 2, 1] ⇒ [1, 2, 3, 4, 5]


    In other words, reversing a list and then reversing that reversed list again is
    going to return the original ordering of the list.


    Let us see this with decorators:


    ```

    1 @reverse_list_decorator

    2 @reverse_list_decorator

    3 def get_list():

    4     return [1, 2, 3, 4, 5]

    5

    6

    7 result = get_list()

    8

    9 print(result)  # [1, 2, 3, 4, 5]

    ```'
