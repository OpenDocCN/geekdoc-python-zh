  md: '# # Operators


    # ## Arithmetic operators


    Even though you may pull out your phone from your pocket and do some calculations,
    you should also get used from now on to implement some arithmetic operators inside
    Python.


    When we want to add two numbers, we use the plus sign, just like in Math:


    ```

    python

    print(50 + 4)  # 54

    ```


    Similarly, for subtraction, we use the minus sign:


    ```

    python

    print(50 - 4)  # 46

    ```


    For multiplication, we use the star sign:


    ```

    python

    print(50 * 4)  # 200

    ```


    When doing divisions, we use the forward slash sign:


    ```

    python

    print(50 / 4)  # 12.5

    print(8 / 4)   # 2.0

    ```


    This results in float numbers. If we want to only get the integer number when
    doing divisions also known as simply doing floor divisions, we should use the
    double fraction sign:'
  merge: -1
  pgno: 7
- img_proc: true
  md: '```

    1  print(50 // 4)  # 12

    2  print(8 / 4)  # 2

    ```


    We can also find the remainder of a number divided by another number using the
    percent sign %.


    ```

    1  print(50 % 4)  # 2

    ```


    This operation can be helpful especially in cases when we want to check whether
    a number is odd or even. A number is odd if when divided by 2, the remainder is
    1. Otherwise, it is even.

    Here is an illustration:


    ```

    1  print(50 % 2)  # 0

    2  # Since the remainder is 0, this number is even

    3

    4  print(51 % 2)  # 1

    5  #Since the remainder is 1, this number is odd

    ```


    When we want to raise a number to a specific power, we should use the double star
    sign:


    ```

    1  print(2 ** 3)  # 8

    2  # This is a short way of writing 2 * 2 * 2

    3

    4  print(5 ** 4)  # 625

    5  # This is a short way of writing 5 * 5 * 5 * 5

    ```


