- md: '## Lists


    If you take a look at a bookshelf, you can see that they are stacked and put closely
    together. You can see that there are many examples of collecting, and structuring
    elements in some way. This is also quite important in computer programming. We
    cannot just continue declaring countless variables and manage them that easily.


    Let us say that we have a class of students and want to save their names. We can
    start saving their names according to the way they are positioned in the classroom:


    ```

    first = "Albert"

    second = "Besart"

    third = "Fisnik"

    fourth = "Festim"

    fifth = "Gazmend"

    ```


    The list can keep on going and it is also quite hard for us to keep track of all
    of them.


    There is fortunately an easier way for us to put these in a collection in Python
    called list.


    Let us create a list called students and store in them all the names declared
    in the previous code block:


    ```

    students = ["Albert", "Besart", "Fisnik", "Festim", "Gazmend"]

    ```


    This is prettier, right?

    Moreover, this way, it is easier for us to manage and also manipulate with the
    elements.

    You may think that, “Well it was easier for me to just call first and get the
    value stored in there. Now it is impossible to get a value from this new list,
    called students”.

    If we would not be able to read and use those elements that we just stored in
    a list, that would make it less helpful.

    Fortunately, lists have indexes, which start from 0, meaning that if we want to
    get the first element in a list, we need to use index 0 and not index 1 as you
    may think.

    In the example above, the list items have these corresponding indexes:


    ```

    students = ["Albert", "Besart", "Fisnik", "Festim", "Gazmend"]

    # Indexes          0          1          2

    ```


    Now, if we want to get the first element, we simply write:


    ```

    students[0]

    ```


    If we want to get the second element, we just write:


    ```

    students[1]

    ```


    As you can probably get the gist, we simply need to write the name of the list
    and also the corresponding index of the element that we want to get in the square
    brackets.


    This list is of course not static. We can add elements to it, like when a new
    student joins the class.


    Let us add a new element in the list `students` with the value `Besfort`:


    ```

    students.append("Besfort")

    ```


    We can also change the value of an existing element. To do that, we need to simply
    reinitialize that specific element of the list with a new value.


    For example, let us change the name of the first student:


    ```

    students[0] = "Besim"

    ```


    Lists can contain different types of variables, for example, we can have a string
    that contains integers, float numbers, and strings:


    ```

    combined_list = [3.14, "An element", 1, "Another element here"]

    ```


    ## Slicing


    Similar to strings, lists can also be sliced, which as a result returns new lists,
    meaning that the original lists remain unchanged.


    Let us see how we can get the first three elements of a list using slicing:


    ```

    my_list = [1, 2, 3, 4, 5]


    print(my_list[0:3])  # [1, 2, 3]

    ```


    As you can see, we have specified 0 as the starting index and 3 as the index where
    the slicing should stop, excluding the element at the ending index.


    If we want to simply start from an index and get all the remaining elements in
    the list, meaning that the end_index should be the last index, then we can omit
    and not have to write the last index at all:


    ```

    my_list = [1, 2, 3, 4, 5]


    print(my_list[3:])  # [4, 5]

    ```


    Similarly, if we want to start from the beginning of the list and do the slicing
    until a specific index, then we can omit writing the 0 index entirely, since Python
    is smart enough to infer that:


    ```

    my_list = [1, 2, 3, 4, 5]


    print(my_list[:3])  # [1, 2, 3]

    ```


    Strings in Python are immutable, whereas lists are mutable, meaning that we can
    modify lists'' content after we declare them.


    As an illustration, let us say that we want to change the first character in the
    string, namely switching S with B in the following way:


    ```

    string = "String"

    string[0] = "B"

    ```


    Now, if we try to print string, we would get an error like the following:


    ```

    # TypeError: ''str'' object does not support item assignment

    ```


    Now if we have a list and want to modify its first element, then we can successfully
    do so:


    ```

    my_list = ["a", "b", "c", "d", "e"]


    my_list[0] = 50


    print(my_list)  # [50, ''b'', ''c'', ''d'', ''e'']

    ```


    We can expand a list by concatenating it with another list using the + operator:


    ```

    first_list = [1, 2, 3]


    second_list = [4, 5]


    first_list = first_list + second_list


    print(first_list)  # [1, 2, 3, 4, 5]

    ```


    ## Nesting a list inside a list


    We can nest a list inside another list:


    ```

    math_points = [30, "Math"]


    physics_points = [53, "Physics"]


    subjects = [math_points, physics_points]


    print(subjects)  # [[30, ''Math''], [53, ''Physics'']]

    ```


    These lists do not need even have to have the same length.

    To access elements of a list which is inside a list we need to use double indexes.

    Let us see how we can access the element `math_points` inside the subjects list.
    Since `math_points` is an element in the `subjects` list positioned at index 0,
    we simply need to do the following:


    ```

    print(subjects[0])  # [30, ''Math'']

    ```


    Now let us assume that we want to access Math inside subjects list. Since Math
    is at index 1, we are going to need to use the following double indexes:


    ```

    print(subjects[0][1])  # ''Math''

    ```


    ## List methods


    len() is a method that can be used to find the length of a list:


    ```

    my_list = ["a", "b", 1, 3]


    print(len(my_list))  # 4

    ```


    ## Adding elements


    We can also expand lists by adding new elements, or we can also delete elements.


    Adding new elements at the end of a list can be done by using the append() method:


    ```

    my_list = ["a", "b", "c"]


    my_list.append("New element")


    my_list.append("Yet another new element")


    print(my_list)

    # [''a'', ''b'', ''c'', ''New element'', ''Yet another new element'']

    ```


    If we want to add elements at specific indexes in a list, we can use the `insert()`
    method, where we specify the index in the first argument, and the element that
    we want to add in the list as a second argument:


    ```

    my_list = ["a", "b"]


    my_list.insert(1, "z")


    print(my_list)  # [''a'', ''z'', ''b'']

    ```


    ## Deleting elements from lists


    We can delete elements from lists using the `pop()` method, which removes the
    last element in the list:


    ```

    my_list = [1, 2, 3, 4, 5]


    my_list.pop()  # removes 5 from the list


    print(my_list)  # [1, 2, 3, 4]


    my_list.pop()  # removes 4 from the list


    print(my_list)  # [1, 2, 3]

    ```


    We can also specify the index of an element in the list that indicates which element
    in the list we should delete:


    ```

    my_list = [1, 2, 3, 4, 5]


    my_list.pop(0)  # Delete the element at index 0


    print(my_list)  # [2, 3, 4, 5]

    ```


    We can also delete elements from lists using del statement and then specifying
    the value of the element that we want to delete:


    ```

    my_list = [1, 2, 3, 4, 1]


    del my_list[0]  # Delete element my_list[0]


    print(my_list)  # [2, 3, 4, 5]

    ```


    We can also delete slices of lists using del:


    ```

    my_list = [1, 2, 3, 4, 1]


    del my_list[0:3]  # Delete elements: my_list[0], my_list[1], my_list[2]


    print(my_list)  # [4, 1]

    ```


    This can also be done using remove():


    ```

    my_list = [1, 2, 3, 4]


    my_list.remove(3)


    print(my_list)  # [1, 2, 4]

