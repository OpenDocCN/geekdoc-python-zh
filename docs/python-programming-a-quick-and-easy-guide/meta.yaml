    \ define a superclass:\n\n```python\nclass House:\n    def __init__(self, area):\n\
    \        self.area = area\n\n    def get_price(self):\n        pass\n```\n\nLet\
    \ us then implement subclasses Condo and Apartment of the superclass House:\n\n\
    ```python\nclass House:\n    def __init__(self, area):\n        self.area = area\n\
