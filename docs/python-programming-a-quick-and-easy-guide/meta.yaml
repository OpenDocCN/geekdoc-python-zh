    \ math_module_that_i_just_imported\n\nresult = math_module_that_i_just_imported.sqrt(4)\n\
    \nprint(result)  # 2.0\n```\n\n## Limiting parts that we want to import\n\nThere\
    \ are times when we do not want to import a whole package with all its methods,\
    \ since we want to avoid the overriding of methods or variables that are in the\
