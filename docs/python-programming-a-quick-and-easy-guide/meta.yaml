    \ '5000')\n\nprint(betim.get_info())  # ('Betim', 'betim@company.com', '5000')\n\
    ```\n\nIn summary, encapsulation helps us protect properties of objects and provides\
    \ access them in a controlled fashion.\n\n## Inheritance\n\nIn real life, we can\
    \ share many characteristics with other human beings.\n\nWe all need to eat food,\
