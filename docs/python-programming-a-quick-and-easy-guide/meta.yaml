    \ multiple modules at once:\n\n```python\nimport os, numbers, math\n```\n\nOnce\
    \ we have imported a module, we can start using methods that are inside it.\n\n\
    ```python\nimport math\n\nprint(math.sqrt(81))  # 9.0\n```\n\nWe can also use\
    \ new names for our imported modules by specifying an alias for them as alias\
