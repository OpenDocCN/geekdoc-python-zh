- md: "## Looping / Iterator\n\nLooping represents the ability of the program to execute\
    \ a set of instructions over and over again until a certain condition is met.\
    \ We can do it with both `while` and `for`.\n\nLet us first see the iteration\
    \ with `for`.\n\n### for loop\n\nThis looping is simple and quite straightforward.\
    \ All you have to do is specify a starting state and mention the range in which\
    \ it should iterate, as can be seen in the following example:\n\n```python\nfor\
    \ number in range(1, 7):\n    print(number)\n```\n\nIn this example, we are iterating\
    \ from 1 to 7 and printing each number (from 1 up to 7 excluding 7) in the console.\n\
    \nWe can change both the starting and the ending numbers in the range as we want.\
    \ This way, we can be quite flexible depending on our specific scenarios.\n\n\
    ### while loop\n\nLet us now describe iterations with `while`. This is also another\
    \ way of doing iterations that is also quite straightforward and intuitive. Here\
    \ we need to specify a starting condition before the while block and also update\
    \ the condition accordingly. The `while` loop needs a “loop condition.” If it\
    \ stays True, it continues iterating. In this example, when `num` is 11 the `loop\
    \ condition` equals `False`.\n\n```python\nnumber = 1\n\nwhile number < 7:\n \
    \   print(number)\n    number += 1  # This part is necessary for us to add so\
    \ that the iteration does not last forever\n```\n\nThis while block is going to\
    \ print the same statements as the code we used with the for block.\n\n## Iteration:\
    \ Looping Through Data Structures\n\nNow that we have covered both iteration and\
    \ lists, we can jump into ways of iterating through lists.\n\nWe do not just store\
    \ things into data structures and leave them there for ages. We are supposed to\
    \ be able to use those elements in different scenarios.\n\nLet us take our list\
    \ of students from before:\n\n```python\nstudents = [\"Albert\", \"Besart\", \"\
    Fisnik\", \"Festim\", \"Gazmend\"]\n```\n\nNow, to iterate through the list, we\
    \ can simply type:\n\n```python\nfor student in students:\n    print(student)\n\
    ```\n\nYes, it's that simple. We are iterating through each element in the list\
    \ and printing their values.\n\nWe can do this for dictionaries as well. However,\
    \ since elements in dictionaries have 2 parts (key and the value), we need to\
    \ specify both the key and the value as follows:\n\n```python\ngerman_to_english_dictionary\
    \ = {\n    \"Wasser\": \"Water\",\n    \"Brot\": \"Bread\",\n    \"Milch\": \"\
    Milk\"\n}\n\nfor key, value in german_to_english_dictionary:\n    print(\"The\
    \ German word \" + key + \" means \" + value + \" in English\")\n```\n\nWe can\
    \ also get only keys from the elements of the dictionary:\n\n```python\nfor key\
    \ in german_to_english_dictionary:\n    print(key)\n```\n\nNote that key and value\
    \ are simply variable names that we have chosen to illustrate the iteration, but\
    \ we can use any name that we want for our variables, such as the following example:\n\
    \n```python\nfor german_word, english_translation in german_to_english_dictionary:\n\
    \    print(\"The German word \" + german_word + \" means \" + english_translation\
    \ + \" in English\")\n```\n\nThis iteration is going to print the same thing in\
    \ the console as the code block before the last one.\n\nWe can also have nested\
    \ for loops, for example, let us say that we want to iterate through a list of\
    \ numbers and finding a sum of each element with each other element of a list.\
    \ We can do that using nested for loops:\n\n```python\nnumbers = [1, 2, 3]\nsum_of_numbers\
    \ = []  # Empty list\n\nfor first_number in numbers:\n    for second_number in\
    \ numbers:  # Loop through the list and add the numbers\n        current_sum =\
    \ first_number + second_number\n        # add current first_number from the first_list\
    \ to the second_number from the second_list\n        sum_of_numbers.append(current_sum)\n\
    \nprint(sum_of_numbers)\n# [2, 3, 4, 3, 4, 5, 4, 5, 6]\n```\n\n## Stopping a for-loop\n\
    \nSometimes we may need to exit a for loop before it reaches the end. This may\
    \ be the case when a condition has been met or we have found what we were looking\
    \ for and there is no need to continue any further.\n\nIn those situations, we\
    \ can use break to stop any other iteration of the for loop.\n\nLet us assume\
    \ that we want to check whether there is a negative number in a list. In case\
    \ we find that positive number, we stop searching for it.\n\nLet us implement\
    \ this using break:\n\n```python\nmy_list = [1, 2, -3, 4, 0]\n\nfor element in\
    \ my_list:\n    print(\"Current number: \", element)\n    if element < 0:\n  \
    \      print(\"We just found a negative number\")\n        break\n\n# Current\
    \ number:  1\n# Current number:  2\n# Current number:  -3\n# We just found a negative\
    \ number\n```\n\nAs we can see, the moment we reach -3, we break from the for\
    \ loop and stop.\n\n## Skipping an iteration\n\nThere can also be cases when we\
    \ want to skip certain iterations since we are not interested in them and they\
    \ do not matter that much. We can do that using continue which prevents code execution\
    \ below it in that code block and moves the execution procedure towards the next\
    \ iteration:\n\n```python\nmy_sum = 0\nmy_list = [1, 2, -3, 4, 0]\n\nfor element\
    \ in my_list:\n    if element < 0:  # Do not include negative numbers in the sum\n\
    \        continue\n    my_sum += element\n\nprint(my_sum)  # 7\n```\n\npass is\
    \ a statement that can be used to help us when we are about to implement a method,\
    \ or something but haven't done yet and do not want to get errors.\n\nIt helps\
    \ us execute the program even if some parts of the code are missing:\n\n```python\n\
    my_list = [1, 2, 3]\n\nfor element in my_list:\n    pass  # Do nothing\n```\n\n\
    ## Wrap Up\n\nIn conclusion, Python offers conditional statements to help you\
    \ control the flow of your program. The if statement lets you run a block of code\
    \ only if a certain condition is met. The elif statement lets you run a block\
    \ of code only if another condition is met. And the else statement lets you run\
    \ a block of code only if no other condition is met. These statements are very\
    \ useful for controlling the flow of your program.\n\n## Functions\n\nThere can\
    \ be plenty of cases when we need to use the same code block again and again.\
    \ Our first guess would be to write it as many times as we want.\n\nObjectively,\
    \ it does work, but the truth is, this is a really bad practice. We are doing\
    \ repetitive work that can be quite boring and also prone to many mistakes that\
    \ can be overlooked.\n\nThis is the reason why we need to start using code blocks\
    \ that we can define once and use that same code of instructions anywhere else.\n\
    \nJust think about this in real life: You see a YouTube video that has been recorded\
    \ and uploaded to YouTube once. It is then going to be watched by many other people,\
    \ but the video still remains the same one that was uploaded initially.\n\nIn\
    \ other words, we use methods as a representative of a set of coding instructions\
    \ that are then supposed to be called anywhere else in the code and that we do\
    \ not have to write it repeatedly. In cases when we want to modify this method,\
    \ we simply change it at the place where it was first declared and other places\
    \ where it is called do not have to do anything.\n\nTo define a method in Python,\
    \ we start by using the `def` keyword, then the name of the function and then\
    \ a list of arguments that we expect to be used. After that, we need to start\
    \ writing the body of the method in a new line after an indentation.\n\n```python\n\
    def add(first_number, second_number):\n    our_sum = first_number + second_number\n\
    \    return our_sum\n```\n\nAs you can see from the coloring, both def and return\
    \ are keywords in Python that you cannot use to name your variables.\n\nNow, everywhere\
    \ we want this add() to be called, we can just call it there and not have to worry\
    \ about implementing it entirely.\n\nSince we have defined this method, we can\
    \ call it in the following way:\n\n```python\nresult = add(1, 5)\n\nprint(result)\
    \  # 6\n```\n\nYou can get the impression that this is such a simple method and\
    \ start asking, why are we even bothering to write a method for it?\nYou are right.\
    \ This was a very simple method just to get you introduced to the way we can implement\
    \ functions.\nLet us write a function that finds the sum of numbers that are between\
    \ two specified numbers:\n\n```python\ndef sum_in_range(starting_number, ending_number):\n\
    \    result = 0\n\n    while starting_number < ending_number:\n        result\
    \ = result + starting_number\n        starting_number = starting_number + 1\n\n\
    \    return result\n```\n\nThis is now a set of instructions that you can call\
    \ in other places and do not have to write all of it again."
  mdcn: "## 循环 / 迭代器\n\n循环代表程序反复执行一组指令的能力，直到满足特定条件。我们可以使用 `while` 和 `for` 来实现。\n\n\
    让我们先看看使用 `for` 的迭代。\n\n### for 循环\n\n这种循环方式简单且非常直观。你只需指定一个起始状态，并提及它应该迭代的范围，如下例所示：\n\
    \n```python\nfor number in range(1, 7):\n    print(number)\n```\n\n在这个例子中，我们从\
    \ 1 迭代到 7，并在控制台中打印每个数字（从 1 到 7，不包括 7）。\n\n我们可以根据需要更改范围中的起始和结束数字。这样，我们就可以根据具体场景灵活调整。\n\
    \n### while 循环\n\n现在让我们描述使用 `while` 的迭代。这是另一种进行迭代的方式，同样非常直观。这里我们需要在 while 块之前指定一个起始条件，并相应地更新条件。`while`\
    \ 循环需要一个“循环条件”。如果条件保持为 True，它就会继续迭代。在这个例子中，当 `num` 为 11 时，`循环条件` 等于 `False`。\n\
    \n```python\nnumber = 1\n\nwhile number < 7:\n    print(number)\n    number +=\
    \ 1  # 这部分是必要的，以防止迭代永远持续下去\n```\n\n这个 while 块将打印与我们使用 for 块时相同的语句。\n\n## 迭代：遍历数据结构\n\
    \n既然我们已经介绍了迭代和列表，我们可以开始探讨遍历列表的方法。\n\n我们不仅仅将数据存储到数据结构中然后就放任不管。我们应该能够在不同的场景中使用这些元素。\n\
    \n让我们使用之前的学生列表：\n\n```python\nstudents = [\"Albert\", \"Besart\", \"Fisnik\",\
    \ \"Festim\", \"Gazmend\"]\n```\n\n现在，要遍历这个列表，我们只需输入：\n\n```python\nfor student\
    \ in students:\n    print(student)\n```\n\n是的，就这么简单。我们遍历列表中的每个元素并打印它们的值。\n\n我们也可以对字典执行此操作。然而，由于字典中的元素有两部分（键和值），我们需要同时指定键和值，如下所示：\n\
    \n```python\ngerman_to_english_dictionary = {\n    \"Wasser\": \"Water\",\n  \
    \  \"Brot\": \"Bread\",\n    \"Milch\": \"Milk\"\n}\n\nfor key, value in german_to_english_dictionary:\n\
    \    print(\"The German word \" + key + \" means \" + value + \" in English\"\
    )\n```\n\n我们也可以只获取字典元素的键：\n\n```python\nfor key in german_to_english_dictionary:\n\
    \    print(key)\n```\n\n请注意，`key` 和 `value` 只是我们选择用来说明迭代的变量名，我们可以为变量使用任何我们想要的名字，例如以下示例：\n\
    \n```python\nfor german_word, english_translation in german_to_english_dictionary:\n\
    \    print(\"The German word \" + german_word + \" means \" + english_translation\
    \ + \" in English\")\n```\n\n这次迭代将在控制台中打印与上一个代码块相同的内容。\n\n我们还可以使用嵌套的 for 循环，例如，假设我们想要遍历一个数字列表，并找出每个元素与列表中其他每个元素的和。我们可以使用嵌套的\
    \ for 循环来实现：\n\n```python\nnumbers = [1, 2, 3]\nsum_of_numbers = []  # 空列表\n\n\
    for first_number in numbers:\n    for second_number in numbers:  # 遍历列表并相加数字\n\
    \        current_sum = first_number + second_number\n        # 将第一个列表中的当前 first_number\
    \ 添加到第二个列表中的 second_number\n        sum_of_numbers.append(current_sum)\n\nprint(sum_of_numbers)\n\
    # [2, 3, 4, 3, 4, 5, 4, 5, 6]\n```\n\n## 停止 for 循环\n\n有时我们可能需要在 for 循环到达末尾之前退出。当满足某个条件，或者我们已经找到了正在寻找的东西，没有必要继续下去时，就可能出现这种情况。\n\
    \n在这些情况下，我们可以使用 `break` 来停止 for 循环的任何后续迭代。\n\n假设我们想要检查列表中是否存在负数。如果我们找到了正数，我们就停止搜索。\n\
    \n让我们使用 `break` 来实现这一点：\n\n```python\nmy_list = [1, 2, -3, 4, 0]\n\nfor element\
    \ in my_list:\n    print(\"Current number: \", element)\n    if element < 0:\n\
    \        print(\"We just found a negative number\")\n        break\n\n# Current\
    \ number:  1\n# Current number:  2\n# Current number:  -3\n# We just found a negative\
    \ number\n```\n\n正如我们所看到的，当我们到达 -3 时，我们从 for 循环中跳出并停止。\n\n## 跳过迭代\n\n也可能出现我们想要跳过某些迭代的情况，因为我们对它们不感兴趣，或者它们不那么重要。我们可以使用\
    \ `continue` 来实现这一点，它会阻止执行该代码块中其下方的代码，并将执行过程转向下一次迭代：\n\n```python\nmy_sum = 0\n\
    my_list = [1, 2, -3, 4, 0]\n\nfor element in my_list:\n    if element < 0:  #\
    \ 不将负数包含在总和中\n        continue\n    my_sum += element\n\nprint(my_sum)  # 7\n\
    ```\n\n`pass` 是一个语句，可以在我们即将实现一个方法或某些东西但尚未完成且不想出错时使用。\n\n它帮助我们即使在代码某些部分缺失的情况下也能执行程序：\n\
    \n```python\nmy_list = [1, 2, 3]\n\nfor element in my_list:\n    pass  # 什么都不做\n\
    ```\n\n## 总结\n\n总之，Python 提供了条件语句来帮助你控制程序的流程。`if` 语句让你仅在满足特定条件时运行一段代码。`elif` 语句让你仅在满足另一个条件时运行一段代码。而\
    \ `else` 语句让你仅在没有其他条件满足时运行一段代码。这些语句对于控制程序的流程非常有用。\n\n## 函数\n\n在很多情况下，我们需要反复使用相同的代码块。我们的第一反应可能是想写多少次就写多少次。\n\
    \n客观地说，这确实可行，但事实是，这是一种非常糟糕的做法。我们在做重复性的工作，这可能相当枯燥，而且容易犯很多可能被忽视的错误。\n\n这就是为什么我们需要开始使用可以定义一次并在其他任何地方使用相同指令代码的代码块。\n\
    \n想想现实生活中的例子：你看到一个 YouTube 视频，它被录制并上传到 YouTube 一次。然后它会被许多其他人观看，但视频仍然是最初上传的那个。\n\
    \n换句话说，我们使用方法作为一组编码指令的代表，这些指令随后应该在代码中的任何其他地方被调用，而我们不必重复编写它。当我们想要修改这个方法时，我们只需在它首次声明的地方进行更改，而调用它的其他地方则无需做任何事情。\n\
    \n要在 Python 中定义一个方法，我们首先使用 `def` 关键字，然后是函数名，接着是我们期望使用的参数列表。之后，我们需要在缩进后的新行中开始编写方法体。\n\
    \n```python\ndef add(first_number, second_number):\n    our_sum = first_number\
    \ + second_number\n    return our_sum\n```\n\n从颜色可以看出，`def` 和 `return` 都是 Python\
    \ 中的关键字，你不能用它们来命名你的变量。\n\n现在，无论我们想在哪里调用这个 `add()`，我们都可以在那里调用它，而不必担心完全实现它。\n\n\
    既然我们已经定义了这个方法，我们可以这样调用它：\n\n```python\nresult = add(1, 5)\n\nprint(result)  #\
    \ 6\n```\n\n你可能会觉得这是一个如此简单的方法，并开始问，我们为什么要费心为它写一个方法？\n你说得对。这是一个非常简单的方法，只是为了向你介绍我们可以实现函数的方式。\n\
    让我们写一个函数，找出两个指定数字之间所有数字的和：\n\n```python\ndef sum_in_range(starting_number, ending_number):\n\
    \    result = 0\n\n    while starting_number < ending_number:\n        result\
    \ = result + starting_number\n        starting_number = starting_number + 1\n\n\
    \    return result\n```\n\n现在，这是一组你可以在其他地方调用的指令，而无需再次编写所有内容。"
