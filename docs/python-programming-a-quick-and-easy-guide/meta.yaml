    \ getAreaOfApartment()\n- getAreaOfSingleFamilyHouse()\n- getAreaOfMultiFamilyHouse()\n\
    \nThis would force us to remember the names of each subclass, which can be tedious\
    \ and also prone to errors when we call them.\nHowever, there is a simpler method\
    \ that we can use that comes from polymorphism.\nWe can have polymorphism using\
    \ both methods and inheritance.\nLet us first see how we can implement polymorphism\
    \ using methods.\n\n## Polymorphism using methods\n\nLet us say that we have two\
    \ classes, namely Condo and Apartment. Both of them have the method get_area()\
