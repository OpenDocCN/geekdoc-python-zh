    \ execute that, we are going to see the following in the console:\n\n```\n# 100\n\
    # 200\n```\n\nThis is the polymorphism with methods.\n\n## Polymorphism with inheritance\n\
    \nWe can not just call a method from a superclass. We can also use the same name\
