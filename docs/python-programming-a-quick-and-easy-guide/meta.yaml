- md: "## Introduction to Python\n\nPython is one of the most popular programming\
    \ languages that was created in 1991 by Guido van Rossum.\n\nAccording to Guido\
    \ van Rossum, Python is a:\n\n> “high-level programming language, and its core\
    \ design philosophy is all about code readability and a syntax which allows programmers\
    \ to express concepts in a few lines of code.”\n\nIt represents one of the easiest\
    \ languages that you can learn and also work with. It can be used for software\
    \ development, server side of web development, machine learning, mathematics,\
    \ and any type of scripting that you can think of.\n\nThe good thing about it\
    \ is that it is widely used and accepted through many companies and academic institutions,\
    \ making it a really good choice especially if you are just starting your coding\
    \ journey. Moreover, it has a large community of developers that use it and are\
    \ willing to help. This community has already published many open source libraries\
    \ that you can start using. They also actively keep improving them.\n\nIts syntax\
    \ is quite similar to that of the English language, making it easier for you to\
    \ understand and use it quite intuitively.\n\nPython runs on an interpreter system,\
    \ meaning that you are not expected to wait for a compiler to compile the code\
    \ and then execute it. You can instead build prototypes fast.\n\nIt works on different\
    \ platforms, such as Windows, Linux, Mac, Raspberry Pi, etc.\n\n## The Basics\n\
    \nIn comparison to other languages, Python places a special importance on indentations.\n\
    \nIn other programming languages, white spaces and indentations are only used\
    \ to make the code more readable and prettier, whereas in Python they represent\
    \ a sub-block of code.\n\nThe following code is not going to work, since the second\
    \ line is not properly indented:\n\n```\nif 100 > 10:\nprint(\"100 is greater\
    \ than 10\")\n```\n\nFor it to work properly, the indentation should look like\
    \ the following:\n\n```\nif 100 > 10:\n    print(\"100 is greater than 10\")\n\
    ```\n\nThis may look hard to understand, but you can have code editors that highlight\
    \ such syntax errors quite vividly. Moreover, the more Python code you write,\
    \ the easier it gets for you to consider such indentations as second nature.\n\
    \n## Comments\n\nWe use comments to specify parts that the program should be simply\
    \ ignored and not executed by the Python interpreter. This means that everything\
    \ written inside a comment is not taken into consideration at all and you can\
    \ write in any language that you want, including your own native language.\n\n\
    We can start comments with the symbol # in front of the line:\n\n```\n# This is\
    \ a comment in Python\n```\n\nWe can also include more extended comments in multiple\
    \ lines using triple quotes:\n\n```\n\"\"\"\nThis is a comment in Python.\nHere\
    \ we are typing in another line and we are still inside the same comment block.\n\
    \nIn the previous line we have a space, because it is allowed to have spaces inside\
    \ comments.\n\nLet us end this comment right here.\n\"\"\"\n```\n\n## print()\
    \ method\n\nWe are going to use the method print() since it helps us see results\
    \ in the console.\n\nYou do not need to know how it works behind the scenes or\
    \ even know what a method is right now. Just think of it as a way for us to display\
    \ results from our code in the console.\n\n## Operators\n\n### Arithmetic operators\n\
    \nEven though you may pull out your phone from your pocket and do some calculations,\
    \ you should also get used from now on to implement some arithmetic operators\
    \ inside Python.\n\nWhen we want to add two numbers, we use the plus sign, just\
    \ like in Math:\n\n```python\nprint(50 + 4)  # 54\n```\n\nSimilarly, for subtraction,\
    \ we use the minus sign:\n\n```python\nprint(50 - 4)  # 46\n```\n\nFor multiplication,\
    \ we use the star sign:\n\n```python\nprint(50 * 4)  # 200\n```\n\nWhen doing\
    \ divisions, we use the forward slash sign:\n\n```python\nprint(50 / 4)  # 12.5\n\
    print(8 / 4)   # 2.0\n```\n\nThis results in float numbers. If we want to only\
    \ get the integer number when doing divisions also known as simply doing floor\
    \ divisions, we should use the double fraction sign:\n\n```\nprint(50 // 4)  #\
    \ 12\nprint(8 // 4)   # 2\n```\n\nWe can also find the remainder of a number divided\
    \ by another number using the percent sign %.\n\n```\nprint(50 % 4)  # 2\n```\n\
    \nThis operation can be helpful especially in cases when we want to check whether\
    \ a number is odd or even. A number is odd if when divided by 2, the remainder\
    \ is 1. Otherwise, it is even.\nHere is an illustration:\n\n```\nprint(50 % 2)\
    \  # 0\n# Since the remainder is 0, this number is even\n\nprint(51 % 2)  # 1\n\
    # Since the remainder is 1, this number is odd\n```\n\nWhen we want to raise a\
    \ number to a specific power, we should use the double star sign:\n\n```\nprint(2\
    \ ** 3)  # 8\n# This is a short way of writing 2 * 2 * 2\n\nprint(5 ** 4)  # 625\n\
    # This is a short way of writing 5 * 5 * 5 * 5\n```\n\n### Assignment operators\n\
    \nThese operators are used to assign values to variables.\nWhen we declare a variable,\
    \ we use the equal sign:\n\n```\nname = \"Fatos\"\nage = 28\n```\n\nWe can also\
    \ declare multiple variables in the same line:\n\n```\nname, age, location = \"\
    Fatos\", 28, \"Europe\"\n```\n\nWe can use this way to also swap values between\
    \ variables, for example, let us say that we have two variables a and b and want\
    \ to switch their values.\n\nOne logical way to do that would be to introduce\
    \ a third variable that serves as a temporary variable:\n\n```\na, b = 1, 2\n\n\
    print(a) # 1\nprint(b) # 2\n\nc = a\na = b\nb = c\n\nprint(a) # 2\nprint(b) #\
    \ 1\n```\n\nHowever, we can do that in a single line in the following way:\n\n\
    ```\na, b = 1, 2\n\nprint(a)  # 1\nprint(b)  # 2\n\nb, a = a, b\n\nprint(a)  #\
    \ 2\nprint(b)  # 1\n```\n\nWe can also have a merge of the assignment operator\
    \ with arithmetic operators.\n\nLet us see how we can do that for addition first.\n\
    \nLet us assume that we have the following variables:\n\n```\ntotal_sum = 20\n\
    \ncurrent_sum = 10\n```\n\nNow we want to add the value of the `current_sum` to\
    \ `total_sum`. To do that, we should write the following:\n\n```\ntotal_sum =\
    \ total_sum + current_sum\n\nprint(total_sum)  # 30\n```\n\nThis may look as not\
    \ accurate, since the right hand side is not equal to the left hand side. However,\
    \ in this case we are simply doing an assignment and not a comparison of both\
    \ sides of the equation.\n\nTo do this quickly, we can use the following form:\n\
    \n```\ntotal_sum += current_sum\n\nprint(total_sum)  # 30\n```\n\nThis is equivalent\
    \ to the previous statement.\nSimilarly, we can do the same with other arithmetic\
    \ operators:\n\n- Subtraction:\n\n    ```\n    result = 3\n    number = 4\n\n\
    \    result -= number  # This is equal to result = result - number\n\n    print(result)\
    \  # -1\n    ```\n\n- Multiplication:\n\n    ```\n    product = 3\n    number\
    \ = 4\n\n    product *= number  # This is equal to product = product * number\n\
    \n    print(product)  # 12\n    ```\n\n- Division:\n\n    ```\n    result = 8\n\
    \    number = 4\n\n    result /= number  # This is equal to result = result /\
    \ number\n\n    print(result)  # 2.0\n    ```\n\n- Modulo operator:\n\n    ```\n\
    \    result = 8\n    number = 4\n\n    result %= number  # This is equal to result\
    \ = result % number\n\n    print(result)  # 0\n    ```\n\n- Power operator:\n\n\
    \    ```\n    result = 2\n    number = 4\n\n    result **= number  # This is equal\
    \ to result = result ** number\n\n    print(result)  # 16\n    ```\n\n### Comparison\
    \ operators\n\nWe have learned in elementary school to do comparisons of numbers,\
    \ such as checking whether a specific number is larger than another number, or\
    \ whether they are equal.\n\nWe can use almost the same operators in Python to\
    \ do such comparisons.\n\nLet us see them in action.\n\n#### Equalities\n\nChecking\
    \ whether two numbers are equal can be done using the ==:\n\n```\nprint(2 == 3)\
    \  # False\n```\n\nThe last expression evaluates to False since 2 is not equal\
    \ to 3.\nThere is another operator that can be used to check whether 2 numbers\
    \ are not equal. This is an operator that you may have not had the chance to see\
    \ in your math classes written exactly in this way. This is the operator !=.\n\
    Let us do a comparison of whether 2 is not equal to 3:\n\n```\nprint(2 != 3) \
    \ # True\n```\n\nThis expression evaluates to True since 2 is indeed not equal\
    \ to 3.\n\n#### Inequalities\n\nNow here we are going to see how to check whether\
    \ a number is larger than another number:\n\n```\nprint(2 > 3)  # False\n```\n\
    \nThis is something that you should already know from your math classes.\nWhen\
    \ trying to check whether a number is greater than or equal to another number,\
    \ we need to use this operator >=:"
  mdcn: "## Python 简介\n\nPython 是最受欢迎的编程语言之一，由 Guido van Rossum 于 1991 年创建。\n\n根据\
    \ Guido van Rossum 的说法，Python 是一种：\n\n> “高级编程语言，其核心设计哲学完全围绕代码可读性和一种允许程序员用几行代码表达概念的语法。”\n\
    \n它代表了你可以学习并使用的最简单的语言之一。它可用于软件开发、Web 开发的服务端、机器学习、数学以及你能想到的任何类型的脚本编写。\n\n它的好处在于，它被许多公司和学术机构广泛使用和接受，使其成为一个非常好的选择，特别是如果你刚刚开始你的编程之旅。此外，它有一个庞大的开发者社区，他们使用它并愿意提供帮助。这个社区已经发布了许多你可以开始使用的开源库。他们还积极地不断改进它们。\n\
    \n它的语法与英语非常相似，使你更容易理解并相当直观地使用它。\n\nPython 运行在解释器系统上，这意味着你不需要等待编译器编译代码然后执行它。相反，你可以快速构建原型。\n\
    \n它可以在不同的平台上运行，例如 Windows、Linux、Mac、Raspberry Pi 等。\n\n## 基础知识\n\n与其他语言相比，Python\
    \ 特别重视缩进。\n\n在其他编程语言中，空格和缩进仅用于使代码更具可读性和更美观，而在 Python 中，它们代表一个代码子块。\n\n以下代码将无法工作，因为第二行没有正确缩进：\n\
    \n```\nif 100 > 10:\nprint(\"100 is greater than 10\")\n```\n\n为了使其正常工作，缩进应如下所示：\n\
    \n```\nif 100 > 10:\n    print(\"100 is greater than 10\")\n```\n\n这可能看起来很难理解，但你可以使用代码编辑器来非常生动地突出显示此类语法错误。此外，你编写的\
    \ Python 代码越多，你就越容易将这种缩进视为第二天性。\n\n## 注释\n\n我们使用注释来指定程序应简单忽略且不被 Python 解释器执行的部分。这意味着写在注释中的所有内容都不会被考虑，你可以用任何你想要的语言编写，包括你自己的母语言。\n\
    \n我们可以在行首使用符号 # 来开始注释：\n\n```\n# This is a comment in Python\n```\n\n我们也可以使用三引号在多行中包含更长的注释：\n\
    \n```\n\"\"\"\nThis is a comment in Python.\nHere we are typing in another line\
    \ and we are still inside the same comment block.\n\nIn the previous line we have\
    \ a space, because it is allowed to have spaces inside comments.\n\nLet us end\
    \ this comment right here.\n\"\"\"\n```\n\n## print() 方法\n\n我们将使用 print() 方法，因为它帮助我们在控制台中看到结果。\n\
    \n你现在不需要知道它在幕后是如何工作的，甚至不需要知道什么是方法。只需将其视为一种在控制台中显示代码结果的方式。\n\n## 运算符\n\n### 算术运算符\n\
    \n尽管你可能从口袋里掏出手机进行一些计算，但从现在开始你也应该习惯在 Python 中实现一些算术运算符。\n\n当我们想将两个数字相加时，我们使用加号，就像在数学中一样：\n\
    \n```python\nprint(50 + 4)  # 54\n```\n\n类似地，对于减法，我们使用减号：\n\n```python\nprint(50\
    \ - 4)  # 46\n```\n\n对于乘法，我们使用星号：\n\n```python\nprint(50 * 4)  # 200\n```\n\n\
    进行除法时，我们使用正斜杠：\n\n```python\nprint(50 / 4)  # 12.5\nprint(8 / 4)   # 2.0\n```\n\
    \n这会产生浮点数。如果我们只想在除法时获得整数，也称为简单地进行整数除法，我们应该使用双斜杠：\n\n```\nprint(50 // 4)  # 12\n\
    print(8 // 4)   # 2\n```\n\n我们还可以使用百分号 % 找到一个数除以另一个数的余数。\n\n```\nprint(50 % 4)\
    \  # 2\n```\n\n这个操作在我们想检查一个数是奇数还是偶数时特别有用。如果一个数除以 2 的余数是 1，那么它就是奇数。否则，它就是偶数。\n\
    这是一个示例：\n\n```\nprint(50 % 2)  # 0\n# 由于余数是 0，这个数是偶数\n\nprint(51 % 2)  # 1\n#\
    \ 由于余数是 1，这个数是奇数\n```\n\n当我们想将一个数提升到特定幂时，我们应该使用双星号：\n\n```\nprint(2 ** 3)  # 8\n\
    # 这是 2 * 2 * 2 的简写\n\nprint(5 ** 4)  # 625\n# 这是 5 * 5 * 5 * 5 的简写\n```\n\n###\
    \ 赋值运算符\n\n这些运算符用于将值赋给变量。\n当我们声明一个变量时，我们使用等号：\n\n```\nname = \"Fatos\"\nage =\
    \ 28\n```\n\n我们也可以在一行中声明多个变量：\n\n```\nname, age, location = \"Fatos\", 28, \"\
    Europe\"\n```\n\n我们也可以使用这种方式在变量之间交换值，例如，假设我们有两个变量 a 和 b，并想交换它们的值。\n\n一种逻辑方法是引入一个作为临时变量的第三个变量：\n\
    \n```\na, b = 1, 2\n\nprint(a) # 1\nprint(b) # 2\n\nc = a\na = b\nb = c\n\nprint(a)\
    \ # 2\nprint(b) # 1\n```\n\n然而，我们可以通过以下方式在一行中完成：\n\n```\na, b = 1, 2\n\nprint(a)\
    \  # 1\nprint(b)  # 2\n\nb, a = a, b\n\nprint(a)  # 2\nprint(b)  # 1\n```\n\n\
    我们还可以将赋值运算符与算术运算符合并。\n\n让我们先看看如何对加法进行此操作。\n\n假设我们有以下变量：\n\n```\ntotal_sum = 20\n\
    \ncurrent_sum = 10\n```\n\n现在我们想将 `current_sum` 的值加到 `total_sum`。为此，我们应该写：\n\n\
