    # Limiting parts that we want to import


    There are times when we do not want to import a whole package with all its methods,
    since we want to avoid the overriding of methods or variables that are in the
    module with the ones that we want to implement ourselves.


    We specify parts that we want to import by using the following form:


    ```

    1  from module import function

    ```


