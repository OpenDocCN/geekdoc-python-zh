    \ of a set of coding instructions that are then supposed to be called anywhere\
    \ else in the code and that we do not have to write it repeatedly. In cases when\
    \ we want to modify this method, we simply change it at the place where it was\
    \ first declared and other places where it is called do not have to do anything.\n\
    \nTo define a method in Python, we start by using the `def` keyword, then the\
