    # # Importing


    One of the main benefits of using a popular language such as Python is its large
    number of libraries that you can use and benefit from.


    Many developers around the world are generous with their time and knowledge and
    publish a lot of really useful libraries that can save us plenty of time both
    in our professional work, but also on our side projects that we may do for fun.


    Here are some of the modules with very useful methods that you can immediately
    start using in your projects:


    +   - time: Time access and conversions

    - csv: CSV File Reading and Writing

    - math: Math functions

    - email: Create, send, and process email

    - urllib: Work with URLs


    To import one or more modules, we only need to write `import` and then the name
    of the modules that we want to import.


    Let us import our first module:


    ```

    python

    import os

    ```


    Now, let us import multiple modules at once:


    ```

    python

    import os, numbers, math

    ```


    Once we have imported a module, we can start using methods that are inside it.'
