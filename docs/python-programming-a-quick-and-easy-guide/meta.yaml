- md: "## super() function\n\nThere is a special function called super() that can\
    \ be used from a child class to refer to its parent class without writing the\
    \ exact name of the parent class.\n\nWe use it with initializers, or when calling\
    \ properties or methods of parent classes.\n\nLet us see all three of them illustrated\
    \ with examples.\n\n### Using super() with initializers\n\nWe can use super()\
    \ inside the constructor method of the subclass and even call the constructor\
    \ of the super class:\n\n```python\nclass Animal():\n    def __init__(self, name,\
    \ age):\n        self.name = name\n        self.age = age\n\n\nclass Cat(Animal):\n\
    \    def __init__(self, name, age):\n        super().__init__(name, age)  # calling\
    \ the parent class constructor\n        self.health = 100  # initializing a new\
    \ attribute that is not in the parent class\n```\n\nWe can also replace super()\
    \ with the name of the parent class, which is going to work in the same way again:\n\
    \n```python\nclass Animal():\n    def __init__(self, name, age):\n        self.name\
    \ = name\n        self.age = age\n\n\nclass Cat(Animal):\n    def __init__(self,\
    \ name, age):\n        Animal.__init__(name, age)  # calling the parent class\
    \ constructor\n        self.health = 100  # initializing a new attribute that\
    \ is not in the parent class\n```\n\nEven changing the order of the lines inside\
    \ the child’s constructor will not cause any error at all.\n\n### Using super()\
    \ with class properties of the parent class\n\nWe can use super() to access class\
    \ properties of the parent class, which can be useful especially when both the\
    \ parent and the child class use the same name for an attribute.\n\nTo see that\
    \ in action, let us assume that we have a class attribute called call name which\
    \ is present both in the parent and the child class. We want to access this variable\
    \ from both the parent class and the child class.\n\nTo do that, we simply need\
    \ to write super() and then the name of the variable:\n\n```python\nclass Producer:\
    \  # parent class\n    name = 'Samsung'\n\n\nclass Seller(Producer):  # child\
    \ class\n    name = 'Amazon'\n\n    def get_product_details(self):\n        #\
    \ Calling the variable from the parent class\n        print(\"Producer:\", super().name)\n\
    \n        # Calling the variable from the child class\n        print(\"Seller:\"\
    , self.name)\n```\n\nNow, if we call method get_product_details(), we are going\
    \ to get the following printed in the console:\n\n```python\nseller = Seller()\n\
    \nseller.get_product_details()\n\n# Producer: Samsung\n# Seller: Amazon\n```\n\
    \n### Using super() with methods of the parent class\n\nWe can similarly call\
    \ methods in the parent class using super().\n\n```python\nclass Producer:  #\
    \ parent class\n    name = 'Samsung'\n\n    def get_details(self):\n        return\
    \ f'Producer name: {self.name}'\n\nclass Seller(Producer):  # child class\n  \
    \  name = 'Amazon'\n\n    def get_details(self):\n        # Calling the method\
    \ from the parent class\n        print(super().get_details())\n\n        # Calling\
    \ the variable from the child class\n        print(f'Seller name: {self.name}')\n\
    \nseller = Seller()\nseller.get_details()\n\n# Producer name: Amazon\n# Seller\
    \ name: Amazon\n```\n\nThis is all you need to know about super().\n\n## Types\
    \ of inheritance\n\nWe can have different types of inheritance based on the relationship\
    \ of parent classes and child classes:\n\n- 1. Single\n- 2. Multi-level\n- 3.\
    \ Hierarchical\n- 4. Multiple\n- 5. Hybrid\n\n### 1. Single inheritance\n\nWe\
    \ can have a class that inherits only from another class:\n\n```python\nclass\
    \ Animal:\n    def __init__(self):\n        self.health = 100\n\n    def get_health(self):\n\
    \        return self.health\n\n\nclass Cat(Animal):\n    def __init__(self, name):\n\
    \        super().__init__()\n        self.health = 150\n        self.name = name\n\
    \n    def move(self):\n        print(\"Cat is moving\")\n\ncat = Cat(\"Cat\")\n\
    \n# Calling the method from the parent class\nprint(cat.get_health())  # 150\n\
    \n# Calling the method from the child class\ncat.move()  # Cat is moving\n```\n\
    \n### 2. Multi-level inheritance\n\nThis is another type of inheritance where\
    \ a class inherits from another class which inherits from another class: Class\
    \ A inherits from Class B which inherits from Class C.\n\nLet us implement this\
    \ in Python:\n\n```python\nclass Creature:\n    def __init__(self, alive):\n \
    \       self.alive = alive\n\n    def is_it_alive(self):\n        return self.alive\n\
    \n\nclass Animal(Creature):\n    def __init__(self):\n        super().__init__(True)\n\
    \        self.health = 100\n\n    def get_health(self):\n        return self.health\n\
    \n\nclass Cat(Animal):\n    def __init__(self, name):\n        super().__init__()\n\
    \        self.name = name\n\n    def move(self):\n        print(\"Cat is moving\"\
    )\n\ncat = Cat(\"Cat\")\n\n# Calling the method from the parent of the parent\
    \ class\nprint(cat.is_it_alive())\n\n# Calling the method from the parent class\n\
    print(cat.get_health())  # 150\n\n# Calling the method from the child class\n\
    cat.move()  # Cat is moving\n```\n\n### 3. Hierarchical inheritance\n\nWhen we\
    \ derive multiple child classes from the same parent class, then we have hierarchical\
    \ inheritance. These child classes inherit from the parent class:\n\n```python\n\
    class Location:\n    def __init__(self, x, y):\n        self.x = x\n        self.y\
    \ = y\n\n    def get_location(self):\n        return self.x, self.y\n\nclass Continent(Location):\n\
    \    pass\n\nclass Country(Location):\n    pass\n\ncontinent = Continent(0, 0)\n\
    print(continent.get_location())  # (0, 0)\n\ncountry = Country(10, 30)\nprint(country.get_location())\
    \  # (10, 30)\n```\n\n### 4. Multiple inheritance\n\nWe can have another type\
    \ of inheritance, namely multiple inheritance which can help us inherit from more\
    \ than one class at the same time.\n\nLet us assume that we have a class called\
    \ Date and another one called Time.\n\nWe can then implement another class then\
    \ inherits from both classes:\n\n```python\nclass Date:\n    date = '2022-07-23'\
    \  # Hardcoded date\n\n    def get_date(self):\n        return self.date\n\n\n\
    class Time:\n    time = '20:20:20'  # Hardcoded time\n\n    def get_time(self):\n\
    \        return self.time\n\n\nclass DateTime(Date, Time):  # Inheriting from\
    \ both\n    def get_date_time(self):\n        return self.get_date() + ' ' + self.get_time()\
    \  # getting methods from its parent classes\n```"
  mdcn: "## super() 函数\n\n有一个特殊的函数叫做 `super()`，它可以在子类中使用，用来引用其父类，而无需写出父类的确切名称。\n\n\
    我们通常在初始化方法中使用它，或者在调用父类的属性或方法时使用。\n\n让我们通过示例来了解这三种用法。\n\n### 在初始化方法中使用 super()\n\
    \n我们可以在子类的构造函数方法中使用 `super()`，甚至可以调用父类的构造函数：\n\n```python\nclass Animal():\n \
    \   def __init__(self, name, age):\n        self.name = name\n        self.age\
    \ = age\n\n\nclass Cat(Animal):\n    def __init__(self, name, age):\n        super().__init__(name,\
    \ age)  # 调用父类构造函数\n        self.health = 100  # 初始化一个父类中没有的新属性\n```\n\n我们也可以用父类的名称来代替\
    \ `super()`，效果是一样的：\n\n```python\nclass Animal():\n    def __init__(self, name,\
    \ age):\n        self.name = name\n        self.age = age\n\n\nclass Cat(Animal):\n\
    \    def __init__(self, name, age):\n        Animal.__init__(name, age)  # 调用父类构造函数\n\
    \        self.health = 100  # 初始化一个父类中没有的新属性\n```\n\n即使改变子类构造函数内部的代码顺序，也不会导致任何错误。\n\
    \n### 使用 super() 访问父类的类属性\n\n我们可以使用 `super()` 来访问父类的类属性，这在父类和子类使用相同名称的属性时尤其有用。\n\
    \n为了演示这一点，假设我们有一个名为 `call_name` 的类属性，它同时存在于父类和子类中。我们希望从父类和子类中都能访问这个变量。\n\n为此，我们只需写出\
    \ `super()` 然后加上变量名：\n\n```python\nclass Producer:  # 父类\n    name = 'Samsung'\n\
    \n\nclass Seller(Producer):  # 子类\n    name = 'Amazon'\n\n    def get_product_details(self):\n\
    \        # 调用父类中的变量\n        print(\"Producer:\", super().name)\n\n        # 调用子类中的变量\n\
    \        print(\"Seller:\", self.name)\n```\n\n现在，如果我们调用 `get_product_details()`\
    \ 方法，控制台将打印出以下内容：\n\n```python\nseller = Seller()\n\nseller.get_product_details()\n\
    \n# Producer: Samsung\n# Seller: Amazon\n```\n\n### 使用 super() 调用父类的方法\n\n我们同样可以使用\
    \ `super()` 来调用父类中的方法。\n\n```python\nclass Producer:  # 父类\n    name = 'Samsung'\n\
    \n    def get_details(self):\n        return f'Producer name: {self.name}'\n\n\
    class Seller(Producer):  # 子类\n    name = 'Amazon'\n\n    def get_details(self):\n\
    \        # 调用父类中的方法\n        print(super().get_details())\n\n        # 调用子类中的变量\n\
    \        print(f'Seller name: {self.name}')\n\nseller = Seller()\nseller.get_details()\n\
    \n# Producer name: Amazon\n# Seller name: Amazon\n```\n\n这就是关于 `super()` 你需要知道的全部内容。\n\
    \n## 继承的类型\n\n根据父类和子类之间的关系，我们可以有不同类型的继承：\n\n- 1. 单继承\n- 2. 多级继承\n- 3. 层次继承\n-\
    \ 4. 多重继承\n- 5. 混合继承\n\n### 1. 单继承\n\n我们可以有一个只从另一个类继承的类：\n\n```python\nclass Animal:\n\
    \    def __init__(self):\n        self.health = 100\n\n    def get_health(self):\n\
    \        return self.health\n\n\nclass Cat(Animal):\n    def __init__(self, name):\n\
    \        super().__init__()\n        self.health = 150\n        self.name = name\n\
    \n    def move(self):\n        print(\"Cat is moving\")\n\ncat = Cat(\"Cat\")\n\
    \n# 调用父类中的方法\nprint(cat.get_health())  # 150\n\n# 调用子类中的方法\ncat.move()  # Cat\
    \ is moving\n```\n\n### 2. 多级继承\n\n这是另一种继承类型，其中一个类从另一个类继承，而另一个类又从第三个类继承：类 A 继承自类\
    \ B，类 B 继承自类 C。\n\n让我们在 Python 中实现它：\n\n```python\nclass Creature:\n    def __init__(self,\
    \ alive):\n        self.alive = alive\n\n    def is_it_alive(self):\n        return\
    \ self.alive\n\n\nclass Animal(Creature):\n    def __init__(self):\n        super().__init__(True)\n\
    \        self.health = 100\n\n    def get_health(self):\n        return self.health\n\
    \n\nclass Cat(Animal):\n    def __init__(self, name):\n        super().__init__()\n\
    \        self.name = name\n\n    def move(self):\n        print(\"Cat is moving\"\
    )\n\ncat = Cat(\"Cat\")\n\n# 调用父类的父类中的方法\nprint(cat.is_it_alive())\n\n# 调用父类中的方法\n\
    print(cat.get_health())  # 150\n\n# 调用子类中的方法\ncat.move()  # Cat is moving\n```\n\
    \n### 3. 层次继承\n\n当我们从同一个父类派生出多个子类时，就形成了层次继承。这些子类都从父类继承：\n\n```python\nclass Location:\n\
    \    def __init__(self, x, y):\n        self.x = x\n        self.y = y\n\n   \
    \ def get_location(self):\n        return self.x, self.y\n\nclass Continent(Location):\n\
    \    pass\n\nclass Country(Location):\n    pass\n\ncontinent = Continent(0, 0)\n\
    print(continent.get_location())  # (0, 0)\n\ncountry = Country(10, 30)\nprint(country.get_location())\
    \  # (10, 30)\n```\n\n### 4. 多重继承\n\n我们可以有另一种继承类型，即多重继承，它可以帮助我们同时从多个类继承。\n\n假设我们有一个名为\
    \ `Date` 的类和另一个名为 `Time` 的类。\n\n然后我们可以实现另一个类，同时继承这两个类：\n\n```python\nclass Date:\n\
    \    date = '2022-07-23'  # 硬编码的日期\n\n    def get_date(self):\n        return\
    \ self.date\n\n\nclass Time:\n    time = '20:20:20'  # 硬编码的时间\n\n    def get_time(self):\n\
    \        return self.time\n\n\nclass DateTime(Date, Time):  # 同时继承两个类\n    def\
    \ get_date_time(self):\n        return self.get_date() + ' ' + self.get_time()\
    \  # 从其父类获取方法\n```"
