    in our professional work, but also on our side projects that we may do for fun.


    Here are some of the modules with very useful methods that you can immediately
    start using in your projects:


    +   - time: Time access and conversions

    - csv: CSV File Reading and Writing

    - math: Math functions

    - email: Create, send, and process email

