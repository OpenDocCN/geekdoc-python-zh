  md: "# # List comprehension\n\nList comprehension represents a concise way in which\
    \ we use a for loop to create a new list from an existing one. The result is always\
    \ a new list in the end.\n\nLet us start with an example where we want to multiply\
    \ each number of a list with 10 and save that result in a new list. First, let\
    \ us do this without using list comprehensions:\n\n```\npython\nnumbers = [2,\
    \ 4, 6, 8]  # Complete list\n\nnumbers_tenfold = []  # Empty list\n\nfor number\
    \ in numbers:\n    number = number * 10  # Multiply each number with 10\n    numbers_tenfold.append(number)\
    \  # Add that new number in the new list\n\nprint(numbers_tenfold)  # [20, 40,\
    \ 60, 80]\n```\n\nWe can implement that using list comprehensions in the following\
    \ way:\n\n```\npython\nnumbers = [2, 4, 6, 8]  # Complete list\n\nnumbers_tenfold\
    \ = [number * 10 for number in numbers]  # List comprehension\n\nprint(numbers_tenfold)\
    \  # [20, 40, 60, 80]\n```\n\nWe can also include conditions when doing these\
    \ list comprehensions.\n\nLet us assume that we want to save a list of positive\
    \ numbers."
