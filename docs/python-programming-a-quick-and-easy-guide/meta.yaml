  md: "ZeroDivisionError: division by zero\n\nIf we were to have such occurrences\
    \ inside a Python program of any kind, we should catch and wrap this error inside\
    \ a `try/except` block.\n\nWe need to write inside the `try` block the part of\
    \ the code that we expect is going to throw errors. We then catch those types\
    \ of errors inside the `except` block by also specifying the type of error that\
    \ we except to happen.\n\nLet us see the first example.\n\nLet us see how we can\
    \ deal with that error so that we also get informed that such error happened:\n\
    \n```\npython\ntry:\n    5 / 0\nexcept ZeroDivisionError:\n    print('You cannot\
    \ divide by 0 mate!')\n```\n\nAs you can see, we are printing a message in the\
    \ console once we have reached the part where a division by 0 is happening.\n\n\
    We can also omit the part `ZeroDivisionError` completely:\n\n```\npython\ntry:\n\
    \    5 / 0\nexcept:\n    print('You cannot divide by 0 mate!')\n```\n\nHowever,\
    \ this is not recommended, since we are catching all types of errors in a single\
    \ `except` block and we are not sure what type of errors are being caught, which\
