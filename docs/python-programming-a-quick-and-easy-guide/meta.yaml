    ```

    1  bike = Bicycle("Connondale", "Grey", True, False)

    2

    3  print(bike.__get_old())  # AttributeError: ''Bicycle'' obje\n4  ct has no attribute
    ''__get_old''

    ```


    It is not a common practice to have private variables in Python. However, developers
    may see it necessary to restrict access so that specific variables are not carelessly
    accessed and modified.


    # Hiding information


    When you go out there and use a coffee machine, it is not expected from you to
    know all the engineering details that are behind that machine. This is also with
    your car. When you sit in your driving seat, you do not analyze and understand
    about all the details of every part of the car. You have some basic idea about
    them, but other than that, you are driving more freely.


    This can be thought as a restriction of the access from people outside, so that
    they do not have to worry about exact details that are going on inside.


    We can do that in Python as well.


    We have seen so far the foundational blocks of object oriented programming, such
    as classes and objects.


    Classes are blueprints that are used to create instances called objects. We can
    use objects of different classes to interact with each other and build a robust
    program.


    When we work on our own programs, we may need to not let everyone know about all
    the details that our classes have. We can hence limit access to them, so that
    certain attributes are less likely to be accessed unintentionally and be modified
    wrongfully.


    To help us with that, we hide parts of a class and simply provide an interface
    that has less details about the inner workings of our class.'
