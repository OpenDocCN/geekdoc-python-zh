    \        return self._manufacturer\n\n    @manufacturer.setter\n    def manufacturer(self,\
    \ manufacturer):\n        self._manufacturer = manufacturer\n\n    @property\n\
    \    def color(self):\n        return self._color\n\n    @color.setter\n    def\
    \ color(self, color):\n        self._color = color\n\nbike = Bicycle(\"Connondale\"\
    , \"Grey\")\n```\n\nNow that we have defined them, we can call these getter methods\
