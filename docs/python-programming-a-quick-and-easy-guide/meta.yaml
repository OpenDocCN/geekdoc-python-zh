    # Methods


    Methods are similar to functions that we have already covered before.


    In a nutshell, we group a few statements in a code block called method where we
    perform some operations that we expect to be done more than once and do not want
    to write them again and again. In the end, we may not return any result at all.


    There are three types of methods in Python:


    +   - instance methods

    - class methods

    - static methods


    Let us briefly talk about the overall structure of methods and then dive a little
    more into details for each method type.


    # Parameters


    Parameters of a method make it possible for us to pass on dynamic values that
    can then be taken into consideration when executing the statements that are inside
    the method.


    The `return` statement represents the statement that is going to be the last one
    to be executed in that method since it is an indicator for the Python interpreter
    to stop the execution of any other line and return a value.'
