    # # Exceptions


    When we are implementing Python scripts or doing any type of implementation, we
    are going to get many errors that are thrown even when the syntax is correct.


    These types of errors that happen during execution are called exceptions.


    We indeed do not have to surrender and not do anything regarding them. We can
    write handlers that are there to do something so that the execution of the program
    does not stop.


    # ## Common Exceptions


    Here are some of the most common exceptions that happen in Python with definitions
    taken from the [Python documentation](https://docs.python.org/3/library/exceptions.html):


    +   - **Exception** (This is a class that is as a superclass of most other exception
    types that happen)

    - **NameError** - Raised when a local or global name is not found.

    - **AttributeError** - Raised when an attribute reference or assignment fails.

    - **SyntaxError** - Raised when the parser encounters a syntax error.

    - **TypeError** - Raised when an operation or function is applied to an object
    of inappropriate type. The associated value is a string giving details about the
    type mismatch.

    - **ZeroDivisionError** - Raised when the second argument of a division or modulo
    operation is zero.


    ¹https://docs.python.org/3/library/exceptions.html'
- md: "## IOError\n- **IOError** - Raised when an I/O operation (such as a print statement,\
    \ the built-in open() function or a method of a file object) fails for an I/O-related\
    \ reason, e.g., “file not found” or “disk full”.\n- **ImportError** - Raised when\
    \ an import statement fails to find the module definition or when a **from ...\
    \ import** fails to find a name that is to be imported.\n- **IndexError** - Raised\
    \ when a sequence subscript is out of range.\n- **KeyError** - Raised when a mapping\
    \ (dictionary) key is not found in the set of existing keys.\n- **ValueError**\
    \ - Raised when a built-in operation or function receives an argument that has\
    \ the right type but an inappropriate value, and the situation is not described\
    \ by a more precise exception such as IndexError.\n\nThere are many other error\
    \ types, but you may not need to see about them now. It is also very unlikely\
    \ that you are going to see all types of errors all the time.\n\nYou can see more\
    \ types of exception in the [Python documentation](https://docs.python.org/3/library/exceptions.html).\n\
    \n## Handling exceptions\n\nLet us start with a very simple example and write\
    \ a program that throws an error on purpose so that we can then fix it.\n\nWe\
    \ are going to do a division by zero, which is something that you have probably\
    \ seen at school:\n\n```\nprint(5 / 0)\n```\n\nIf we try to execute that, we are\
    \ going to be greeted with the following error in the console:\n\n```\nZeroDivisionError:\
    \ division by zero\n```\n\nIf we were to have such occurrences inside a Python\
    \ program of any kind, we should catch and wrap this error inside a `try/except`\
    \ block.\n\nWe need to write inside the `try` block the part of the code that\
    \ we expect is going to throw errors. We then catch those types of errors inside\
    \ the `except` block by also specifying the type of error that we except to happen.\n\
    \nLet us see the first example.\n\nLet us see how we can deal with that error\
    \ so that we also get informed that such error happened:\n\n```python\ntry:\n\
    \    5 / 0\nexcept ZeroDivisionError:\n    print('You cannot divide by 0 mate!')\n\
    ```\n\nAs you can see, we are printing a message in the console once we have reached\
    \ the part where a division by 0 is happening.\n\nWe can also omit the part `ZeroDivisionError`\
    \ completely:\n\n```python\ntry:\n    5 / 0\nexcept:\n    print('You cannot divide\
    \ by 0 mate!')\n```\n\nHowever, this is not recommended, since we are catching\
    \ all types of errors in a single `except` block and we are not sure what type\
    \ of errors are being caught, which can be quite useful for us.\n\nLet us continue\
    \ with another type of error.\n\nLet us try to use a variable that is not defined\
    \ at all:\n\n```python\nname = 'User'\n\ntry:\n    person = name + surname  #\
    \ surname is not declared\nexcept NameError:\n    print('A variable is not defined')\n\
    ```\n\nIn the previous example, we have used variable surname before declaring\
    \ it, therefore a NameError is going to be thrown.\n\nLet us continue with another\
    \ type of example that can be common.\n\nWhen we use lists, it can be a common\
    \ mistake to use an index that is out of range, meaning that the used index is\
    \ larger or smaller than the range of indexes of the elements in that list.\n\n\
    Let us illustrate this with an example, where an IndexError is going to be thrown:\n\
    \n```python\nmy_list = [1, 2, 3, 4]\n\ntry:\n    print(my_list[5])\n    # This\
    \ list only has 4 elements, so its indexes range\n    # from 0 to 3\nexcept IndexError:\n\
    \    print('You have used an index that is out of range')\n```\n\nWe can also\
    \ use a single try block with multiple except errors:\n\n```python\nmy_list =\
    \ [1, 2, 3, 4]\n\ntry:\n    print(my_list[5])\n    # This list only has 4 elements,\
    \ so its indexes range\n    # from 0 to 3\nexcept NameError:\n    print('You have\
    \ used an invalid value')\nexcept ZeroDivisionError:\n    print('You cannot divide\
    \ by zero')\nexcept IndexError:\n    print('You have used an index that is out\
    \ of range')\n```\n\nIn the previous example, we try to initially catch whether\
    \ there is any variable that is used but not declared. If this error happens,\
    \ then this except block is going to be taking over the execution flow. This execution\
    \ flow is going to stop there.\n\nThen, we try to check whether we are dividing\
    \ by zero. If this error is thrown, then this except block is going to take over\
    \ the execution and everything that is inside it is going to be executed. Similarly,\
    \ we continue with the rest of the errors declared.\n\nWe can also put more than\
    \ one error inside parenthesis to catch multiple exceptions, but this is not going\
    \ to be helpful for us, since we do not know what specific error has been thrown.\
    \ In other words, the following method does work, but it is not recommended:\n\
    \n```python\nmy_list = [1, 2, 3, 4]\n\ntry:\n    print(my_list[5])\n    # This\
    \ list only has 4 elements, so its indexes range\n    # from 0 to 3\nexcept (NameError,\
    \ ZeroDivisionError, IndexError):\n    print('A NameError, ZeroDivisionError,\
    \ or IndexError occurred')\n```\n\n## finally\n\nAfter the `try` and `except`\
    \ are passed, there is another block that we can declare and execute. This block\
    \ starts with the `finally` keyword and it is executed no matter whether we have\
    \ an error is being thrown or not:\n\n```python\nmy_list = ['a', 'b']\n\ntry:\n\
    \    print(my_list[0])\nexcept IndexError:\n    print('An IndexError occurred')\n\
    finally:\n    print('The program is ending. This is going to be executed.')\n\
    ```\n\nIf we execute the previous block of code, we are going to see the following\
    \ in the console:\n\n```\na\nThe program is ending. This is going to be executed.\n\
    ```\n\nWe usually write code that we want to be as a cleanup inside the `finally`\
    \ block. This includes things like closing a file, or stopping a connection with\
    \ a database, exiting the program entirely, etc.\n\n## try, else, except\n\nWe\
    \ can write statements inside try and except, but we can also use an else block\
    \ where we can write code that we want to be executed if there are no errors being\
    \ thrown:\n\n```python\nmy_list = ['a', 'b']\n\ntry:\n    print(my_list[0])\n\
    except IndexError:\n    print('An IndexError occurred')\nelse:\n    print('No\
    \ error occurred. Congratulations!')\n```\n\nIf we execute the code above, we\
    \ are going to get the following printed in the console:\n\n```\na\nNo error occurred.\
    \ Congratulations!\n```\n\n## Wrap up\n\nThis should be sufficient for you to\
    \ understand exceptions and ways that you can use to handle them so that there\
    \ is no sudden interruptions that cause your program to fail unexpectedly.\n\n\
    ## Afterword\n\nThis book represents my attempt to make it quick and easy for\
    \ you to learn the essentials of Python. There are many other things that Python\
    \ includes and that are not covered in this book, but we will leave it here.\n\
    \nI hope this serves as a useful reference for you.\n\nNow that you have had the\
    \ chance to learn how to write Python, go out there and make a positive impact\
    \ with your lines of code."
  mdcn: "## IOError\n- **IOError** - 当 I/O 操作（例如 `print` 语句、内置的 `open()` 函数或文件对象的方法）因\
    \ I/O 相关原因（如“文件未找到”或“磁盘已满”）失败时引发。\n- **ImportError** - 当 `import` 语句未能找到模块定义，或\
    \ `from ... import` 未能找到要导入的名称时引发。\n- **IndexError** - 当序列下标超出范围时引发。\n- **KeyError**\
    \ - 当映射（字典）的键在现有键集合中未找到时引发。\n- **ValueError** - 当内置操作或函数接收到类型正确但值不合适的参数，且该情况未被更精确的异常（如\
    \ `IndexError`）描述时引发。\n\n还有许多其他错误类型，但你现在可能不需要了解它们。而且，你也不太可能同时遇到所有类型的错误。\n\n你可以在\
    \ [Python 文档](https://docs.python.org/3/library/exceptions.html) 中查看更多异常类型。\n\n\
    ## 处理异常\n\n让我们从一个非常简单的例子开始，编写一个故意抛出错误的程序，以便我们随后修复它。\n\n我们将进行一个除以零的操作，这可能是你在学校里见过的：\n\
    \n```\nprint(5 / 0)\n```\n\n如果我们尝试执行它，控制台将显示以下错误：\n\n```\nZeroDivisionError: division\
    \ by zero\n```\n\n如果在任何 Python 程序中出现这种情况，我们应该捕获这个错误并将其包装在 `try/except` 块中。\n\n\
    我们需要在 `try` 块中编写我们预计会抛出错误的代码部分。然后，我们在 `except` 块中捕获这些类型的错误，同时指定我们预期发生的错误类型。\n\n\
    让我们看第一个例子。\n\n让我们看看如何处理这个错误，以便我们也能得知发生了这样的错误：\n\n```python\ntry:\n    5 / 0\n\
    except ZeroDivisionError:\n    print('You cannot divide by 0 mate!')\n```\n\n\
    如你所见，一旦我们到达除以 0 的部分，我们就在控制台打印一条消息。\n\n我们也可以完全省略 `ZeroDivisionError` 部分：\n\n```python\n\
    try:\n    5 / 0\nexcept:\n    print('You cannot divide by 0 mate!')\n```\n\n然而，这并不推荐，因为我们在单个\
    \ `except` 块中捕获了所有类型的错误，我们不确定捕获了什么类型的错误，这对我们来说可能非常有用。\n\n让我们继续看另一种类型的错误。\n\n让我们尝试使用一个完全未定义的变量：\n\
    \n```python\nname = 'User'\n\ntry:\n    person = name + surname  # surname is\
    \ not declared\nexcept NameError:\n    print('A variable is not defined')\n```\n\
    \n在前面的例子中，我们在声明变量 `surname` 之前使用了它，因此将抛出 `NameError`。\n\n让我们继续看另一种可能常见的错误类型。\n\
    \n当我们使用列表时，使用超出范围的索引是一个常见的错误，这意味着使用的索引大于或小于该列表中元素的索引范围。\n\n让我们用一个例子来说明，其中将抛出 `IndexError`：\n\
    \n```python\nmy_list = [1, 2, 3, 4]\n\ntry:\n    print(my_list[5])\n    # This\
    \ list only has 4 elements, so its indexes range\n    # from 0 to 3\nexcept IndexError:\n\
    \    print('You have used an index that is out of range')\n```\n\n我们也可以在单个 `try`\
    \ 块中使用多个 `except` 错误：\n\n```python\nmy_list = [1, 2, 3, 4]\n\ntry:\n    print(my_list[5])\n\
    \    # This list only has 4 elements, so its indexes range\n    # from 0 to 3\n\
    except NameError:\n    print('You have used an invalid value')\nexcept ZeroDivisionError:\n\
    \    print('You cannot divide by zero')\nexcept IndexError:\n    print('You have\
    \ used an index that is out of range')\n```\n\n在前面的例子中，我们首先尝试捕获是否有任何使用但未声明的变量。如果发生此错误，那么这个\
    \ `except` 块将接管执行流。执行流将在此处停止。\n\n然后，我们尝试检查是否除以零。如果抛出此错误，那么这个 `except` 块将接管执行，其中的所有内容都将被执行。类似地，我们继续处理声明的其余错误。\n\
    \n我们也可以在括号中放入多个错误来捕获多个异常，但这对我们没有帮助，因为我们不知道抛出了什么具体的错误。换句话说，以下方法有效，但不推荐：\n\n```python\n\
    my_list = [1, 2, 3, 4]\n\ntry:\n    print(my_list[5])\n    # This list only has\
    \ 4 elements, so its indexes range\n    # from 0 to 3\nexcept (NameError, ZeroDivisionError,\
    \ IndexError):\n    print('A NameError, ZeroDivisionError, or IndexError occurred')\n\
    ```\n\n## finally\n\n在 `try` 和 `except` 之后，我们可以声明并执行另一个块。这个块以 `finally` 关键字开头，无论是否抛出错误，它都会被执行：\n\
    \n```python\nmy_list = ['a', 'b']\n\ntry:\n    print(my_list[0])\nexcept IndexError:\n\
    \    print('An IndexError occurred')\nfinally:\n    print('The program is ending.\
    \ This is going to be executed.')\n```\n\n如果我们执行前面的代码块，控制台将显示以下内容：\n\n```\na\n\
    The program is ending. This is going to be executed.\n```\n\n我们通常将希望作为清理工作的代码写在\
    \ `finally` 块中。这包括关闭文件、停止与数据库的连接、完全退出程序等。\n\n## try, else, except\n\n我们可以在 `try`\
    \ 和 `except` 中编写语句，但也可以使用 `else` 块，其中我们可以编写希望在没有抛出错误时执行的代码：\n\n```python\nmy_list\
    \ = ['a', 'b']\n\ntry:\n    print(my_list[0])\nexcept IndexError:\n    print('An\
    \ IndexError occurred')\nelse:\n    print('No error occurred. Congratulations!')\n\
    ```\n\n如果我们执行上面的代码，控制台将打印以下内容：\n\n```\na\nNo error occurred. Congratulations!\n\
    ```\n\n## 总结\n\n这应该足以让你理解异常以及你可以用来处理它们的方法，这样就不会有突然的中断导致你的程序意外失败。\n\n## 后记\n\n\
    本书代表了我为你快速轻松地学习 Python 基础知识所做的尝试。Python 还包含许多其他内容，本书未涵盖，但我们将在此止步。\n\n我希望这能成为你有用的参考。\n\
    \n既然你已经有机会学习如何编写 Python，那就走出去，用你的代码行产生积极的影响。"
