    \ __init__(self, manufacturer, color, is_mountain_b\\n3ike, old):\n4         self.manufacturer\
    \ = manufacturer\n5         self.color = color\n6         self.is_mountain_bike\
    \ = is_mountain_bike\n7         self.__old = old  # This is a private property\n\
    ```\n\nNow if we try to access __old, we are going to get an error:\n\n```\n1\
    \ bike = Bicycle(\"Connondale\", \"Grey\", True, False)\n2 \n3 print(bike.__old)\
    \  # AttributeError: 'Bicycle' object has\\n4 no attribute '__old'\n```\n\nLet\
    \ us now see an example where we are declaring private methods using the double\
    \ underscore in front of the name of the method that we want to make as private:\n\
    \n```\n1 class Bicycle:\n2     def __init__(self, manufacturer, color, is_mountain_b\\\
    n3ike, old):\n4         self.manufacturer = manufacturer\n5         self.color\
    \ = color\n6         self.is_mountain_bike = is_mountain_bike\n7         self.__old\
    \ = old  # This is a private property\n8 \n9     def __get_old(self):  # This\
