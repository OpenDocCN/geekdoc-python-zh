    \ values\n\nWe can add new values inside dictionaries by specifying a new key\
    \ and a corresponding value and then Python is going to create a new element inside\
    \ that dictionary:\n\n```\npython\nwords = {\n    'a': 'alfa',\n    'b': 'beta',\n\
    \    'd': 'delta',\n}\n\nwords['g'] = 'gama'\n\nprint(words)\n# {'a': 'alfa',\
    \ 'b': 'beta', 'd': 'delta', 'g': 'gama'}\n```\n\nIf we specify the key of an\
    \ element that is already part of the dictionary, that element is going to be\
    \ modified:\n\n```\n1 words = {\n2     'a': 'alfa',\n3     'b': 'beta',\n4   \
    \  'd': 'delta',\n5 }\n6\n7 words['b'] = 'bravo'\n8\n9\n10 print(words)\n11 #\
    \ {'a': 'alfa', 'b': 'bravo', 'd': 'delta'}\n```\n\n## Removing elements\n\nIf\
    \ we want to remove elements from a dictionary, we can use the method `pop()`\
    \ and also specify the key of the element that we want to delete:\n\n```\n1 words\
    \ = {\n2     'a': 'alfa',\n3     'b': 'beta',\n4     'd': 'delta',\n5 }\n6\n7\
    \ words.pop('a')\n8\n9 print(words)  # {'b': 'beta', 'd': 'delta'}\n```\n\nWe\
    \ can also delete values using `popitem()` which removes the last inserted key-value\
    \ pair starting from Python 3.7. In earlier versions, it deletes a random pair:\n\
    \n```\n1 words = {\n2     'a': 'alfa',\n3     'b': 'beta',\n4     'd': 'delta',\n\
    5 }\n6\n7 words['g'] = 'gamma'\n8\n9 words.popitem()\n10\n11 print(words)\n12\
    \ # {'a': 'alfa', 'b': 'beta', 'd': 'delta'}\n```\n\nThere is another way that\
    \ we can delete elements, namely by using del statement:\n\n```\n1 words = {\n\
    2     'a': 'alfa',\n3     'b': 'beta',\n4     'd': 'delta',\n5 }\n6\n7 del words['b']\n\
    8\n9 print(words)  # {'a': 'alfa', 'd': 'delta'}\n```\n\n## Length\n\nWe can get\
    \ the length of a dictionary using len() just like with lists and tuples:\n\n\
    ```\n1 words = {\n2     'a': 'alfa',\n3     'b': 'beta',\n4     'd': 'delta',\n\
    5 }\n6\n7 print(len(words))  # 3\n```\n\n## Membership\n\nIf we want to check\
    \ whether a key is already part of a dictionary so that we avoid overriding it,\
    \ we can use the operator `in` and `not in` just like with lists and tuples:\n\
    \n```\n1 words = {\n2     'a': 'alfa',\n3     'b': 'beta',\n4     'd': 'delta',\n\
    5 }\n6\n7 print('a' in words)  # True\n8 print('z' not in words)  # True\n```\n\
    \n## Comprehension\n\nWe can use comprehension just like with lists to create\
    \ dictionaries in a quick way.\n\nTo help us with that, we are going to need to\
    \ use a method called `items()` that converts a dictionary into a list of tuples\
    \ where the element in index 0 is a key, whereas in position with index 1, we\
    \ have a value.\n\nLet us first see the method `items()` in action:\n\n```\npoints\
    \ = {\n    'Festim': 50,\n    'Zgjim': 89,\n    'Durim': 73\n}\n\nelements = points.items()\n\
    \nprint(elements) # dict_items([('Festim', 50), ('Zgjim', 89), ('Durim', 73)])\n\
    ```\n\nNow let us create a new dictionary from this existing dictionary points\
    \ using comprehension. We can assume that a professor is in a good mood and generous\
    \ enough to reward each student with a bonus of 10 points. We want to add these\
    \ new points to each student by saving these new points in a new dictionary:\n\
    \n```\npoints = {\n    'Festim': 50,\n    'Zgjim': 89,\n    'Durim': 73\n}\n\n\
    elements = points.items()\n\npoints_modified = {key: value + 10 for (key, value)\
    \ in elements}\n\nprint(points_modified) # {'Festim': 60, 'Zgjim': 99, 'Durim':\
    \ 83}\n```\n\n# Sets\n\nSets are unordered and unindexed collections of data.\
    \ Since elements in sets are not ordered, we cannot access elements using indexes\
    \ or using the method get().\n\nWe can add tuples, but we cannot add dictionaries\
    \ or lists in a set.\n\nWe cannot add duplicate elements in sets. This means that\
    \ when we want to remove duplicate elements from another type of collection, we\
    \ can make use of this uniqueness in sets.\n\nLet us start creating our first\
    \ set using curly brackets as follows:\n\n```\nfirst_set = {1, 2, 3}\n```\n\n\
    We can also create sets using the set() constructor:\n\n```\nempty_set = set()\
    \  # Empty set\n\nfirst_set = set((1, 2, 3))  # We are converting a tuple into\
    \ a set\n```\n\nLike all data structures, we can find the length of a set using\
    \ the method len():\n\n```\nprint(len(first_set))  # 3\n```\n\n## Adding elements\n\
    \nAdding one element in a set can be done using the method add():\n\n```\n1 my_set\
    \ = {1, 2, 3}\n2\n3 my_set.add(4)\n4\n5 print(my_set)  # {1, 2, 3, 4}\n```\n\n\
    If we want to add more than one element, then we need to use method update() and\
    \ as an input for this method a list, tuple, string or another set:\n\n```\n1\
    \ my_set = {1, 2, 3}\n2\n3 my_set.update([4, 5, 6])\n4\n5 print(my_set)  # {1,\
    \ 2, 3, 4, 5, 6}\n6\n7 my_set.update(\"ABC\")\n8\n9 print(my_set)  # {1, 2, 3,\
    \ 4, 5, 6, 'A', 'C', 'B'}\n```\n\n## Deleting elements\n\nIf we want to delete\
    \ elements from sets, we can use methods discard() or remove():\n\n```\n1 my_set\
    \ = {1, 2, 3}\n2\n3 my_set.remove(2)\n4\n5 print(my_set)  # {1, 3}\n```\n\nIf\
    \ we try to delete an element that is not part of the set using remove(), then\
    \ we are going to get an error:\n\n```\n1 my_set = {1, 2, 3}\n2\n3 my_set.remove(4)\n\
    4\n5 print(my_set)  # KeyError: 4\n```\n\nTo avoid such errors when removing elements\
    \ from sets, we can use the method discard():\n\n```\n1 my_set = {1, 2, 3}\n2\n\
    3 my_set.discard(4)\n4\n5 print(my_set)  # {1, 2, 3}\n```\n\n## Set Theory Operations\n\
    \nIf you remember high school math lessons, you should already know union, intersection,\
    \ and the difference between two sets of elements. These operations are supported\
    \ for sets in Python as well.\n\n### Union\n\nUnion represents the collection\
    \ of all unique elements from both sets. We can find the union of two sets using\
    \ the pipe operator | or the union() method:\n\n```\n1 first_set = {1, 2}\n2 second_set\
    \ = {2, 3, 4}\n3\n4 union_set = first_set.union(second_set)\n5\n6 print(union_set)\
    \  # {1, 2, 3, 4}\n```\n\n### Intersection\n\nIntersection represents the collection\
    \ that contains elements that are in both sets. We can find it using operator\
    \ & or the intersection() method:\n\n```\n1  first_set = {1, 2}\n2  second_set\
    \ = {2, 3, 4}\n3\n4  intersection_set = first_set.intersection(second_set)\n5\n\
    6  print(union_set)  # {2}\n```\n\n### Difference\n\nThe difference between two\
    \ sets represents the collection that contains only the elements that are in the\
    \ first set, but not in the second. We can find the difference between two sets\
    \ using the - operator or the method difference()\n\n```\n1  first_set = {1, 2}\n\
    2  second_set = {2, 3, 4}\n3\n4  difference_set = first_set.difference(second_set)\n\
    5\n6  print(difference_set)  # {1}\n```\n\nAs you can probably remember from high\
    \ school, ordering of sets when we find the difference of two sets matters, which\
    \ is not the case with the union and intersection.\n\nThis is similar to arithmetic,\
    \ where 3 - 4 is not equal to 4 - 3:"
