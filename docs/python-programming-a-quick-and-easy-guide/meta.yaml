  md: '# # Introduction to Python


    Python is one of the most popular programming languages that was created in 1991
    by Guido van Rossum.


    According to Guido van Rossum, Python is a:


    > > “high-level programming language, and its core design philosophy is all about
    code readability and a syntax which allows programmers to express concepts in
    a few lines of code.”


    It represents one of the easiest languages that you can learn and also work with.
    It can be used for software development, server side of web development, machine
    learning, mathematics, and any type of scripting that you can think of.


    The good thing about it is that it is widely used and accepted through many companies
    and academic institutions, making it a really good choice especially if you are
    just starting your coding journey. Moreover, it has a large community of developers
    that use it and are willing to help. This community has already published many
    open source libraries that you can start using. They also actively keep improving
    them.


    Its syntax is quite similar to that of the English language, making it easier
    for you to understand and use it quite intuitively.


    Python runs on an interpreter system, meaning that you are not expected to wait
    for a compiler to compile the code and then execute it. You can instead build
    prototypes fast.


    It works on different platforms, such as Windows, Linux, Mac, Rapsberry Pi, etc.'
  merge: -1
  pgno: 4
- img_proc: true
  md: '# # The Basics


    In comparison to other languages, Python places a special importance on indentations.


    In other programming languages, white spaces and indentations are only used to
    make the code more readable and prettier, whereas in Python they represent a sub-block
    of code.


    The following code is not going to work, since the second line is not properly
    intended:


    ```

    1  if 100 > 10:

    2  print("100 is greater than 10")

    ```


    For it to work properly, the indentation should look like the following:


    ```

    1  if 100 > 10:

    2      print("100 is greater than 10")

    ```


    This may look hard to understand, but you can have code editors that highlight
    such syntax errors quite vividly. Moreover, the more Python code you write, the
    easier it gets for you to consider such indentations as second nature.


    # # Comments


    We use comments to specify parts that the program should be simply ignored and
    not executed by the Python interpreter. This means that everything written inside
    a comment is not taken into'
  merge: -1
  pgno: 5
- img_proc: true
  md: 'consideration at all and you can write in any language that you want, including
    your own native language.


    We can start comments with the symbol # in front of the line:


    ```

    # This is a comment in Python

    ```


    We can also include more extended comments in multiple lines using triple quotes:


    ```

    """

    This is a comment in Python.

    Here we are typing in another line and we are still inside the same comment block.


    In the previous line we have a space, because it is allowed to have spaces inside
    comments.


    Let us end this comment right here.

    """

    ```


