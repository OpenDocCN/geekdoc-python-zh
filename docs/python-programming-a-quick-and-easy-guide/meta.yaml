  - '[PAGE 96]


    # # Object Oriented Programming


    If you go to buy a cookie at a local store, you are going to get a piece of the
    cookie that has been produced in many other copies.


    There has been a cookie cutter at a factory that has been used to produce a large
    number of cookies that are then distributed all throughout different stores where
    it is then ready to be served to the end customers.


    We can think of that cookie cutter as a blueprint that has been designed once
    and is used afterwards. This blueprint is also used in computer programming.


    A blueprint that is used to create countless other copies is called a **class**.
    We can think of a class like a class called **Cookie**, **Factory**, **Building**,
    **Book**, **Pencil**, etc. We can use the class of **Pencil** as a blueprint to
    create as many instances as we want of it that we call objects.


    In other words, blueprints are classes that are used as cookie cutters, whereas
    the cookies that are served at different stores are <u>objects</u>.


    **Object Oriented Programming** represents a way of organizing a program in classes
    and objects. Classes are used to create objects. Objects interact with each other.


    We do not use the exact same blueprint for every object that is out there. There
    is a blueprint for producing books, another one for producing pencils, and so
    on. We need to categorize them based on attributes and their functionalities.


    An object that is created from the Pencil class can have a color type, a manufacturer,
    a specific thickness, etc. These are the **attributes**.'
