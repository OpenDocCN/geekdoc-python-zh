    Blue\"\n```\n\nOur classes can also have other methods as well, and not just getters\
    \ and setters.\n\nLet us define a method inside the class Bicycle that we can\
    \ then call from any object that we have created from that class:\n\n```python\n\
    class Bicycle:\n    def __init__(self, manufacturer, color, is_mountain_bike):\n\
    \        self._manufacturer = manufacturer\n        self._color = color\n    \
    \    self._is_mountain_bike = is_mountain_bike\n\n    def get_description(self):\n\
    \        desc = \"This is a \" + self._color + \" bike of the brand \" + self._manufacturer\n\
    \        return desc\n```\n\nWe have created a very simple method in which we\
    \ are preparing a string as a result from the attributes of the object that we\
    \ are creating. We can then call this method like any other method.\n\nLet us\
    \ see this in action:\n\n```python\nbike = Bicycle(\"Connondale\", \"Grey\", True)\n\
    \nprint(bike.get_description())  # This is a Grey bike of the brand Connondale\n\
    ```\n\n## But why do we need encapsulation?\n\nThis looks quite promising and\
    \ fancy, but you may not get it quite yet. You may get the impression that you\
