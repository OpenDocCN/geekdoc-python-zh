  md: '# # Exceptions


    When we are implementing Python scripts or doing any type of implementation, we
    are going to get many errors that are thrown even when the syntax is correct.


    These types of errors that happen during execution are called exceptions.


    We indeed do not have to surrender and not do anything regarding them. We can
    write handlers that are there to do something so that the execution of the program
    does not stop.


    # ## Common Exceptions


    Here are some of the most common exceptions that happen in Python with definitions
    taken from the [Python documentation](https://docs.python.org/3/library/exceptions.html):


    +   - **Exception** (This is a class that is as a superclass of most other exception
    types that happen)

    - **NameError** - Raised when a local or global name is not found.

    - **AttributeError** - Raised when an attribute reference or assignment fails.

    - **SyntaxError** - Raised when the parser encounters a syntax error.

    - **TypeError** - Raised when an operation or function is applied to an object
    of inappropriate type. The associated value is a string giving details about the
    type mismatch.

    - **ZeroDivisionError** - Raised when the second argument of a division or modulo
    operation is zero.


    ¹https://docs.python.org/3/library/exceptions.html'
  merge: -1
  pgno: 137
- img_proc: true
  md: '+   - **IOError** - Raised when an I/O operation (such as a print statement,
    the built-in open() function or a method of a file object) fails for an I/O-related
    reason, e.g., “file not found” or “disk full”.

    - **ImportError** - Raised when an import statement fails to find the module definition
    or when a **from ... import** fails to find a name that is to be imported.

    - **IndexError** - Raised when a sequence subscript is out of range.

    - **KeyError** - Raised when a mapping (dictionary) key is not found in the set
    of existing keys.

    - **ValueError** - Raised when a built-in operation or function receives an argument
    that has the right type but an inappropriate value, and the situation is not described
    by a more precise exception such as IndexError.


    There are many other error types, but you may not need to see about them now.
    It is also very unlikely that you are going to see all types of errors all the
    time.


    You can see more types of exception in the [Python documentation](https://docs.python.org/3/library/exceptions.html).


    # Handling exceptions


