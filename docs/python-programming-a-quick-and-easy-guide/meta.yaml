    To do that, we use the reserved term `if` and an expression that evaluates to
    a True or False value. We can then also use an `else` statement where we want
    the flow to continue in cases when the `if` condition is not met.

    To make it easier to understand, let us assume that we have an example where we
    want to check whether a number is positive:


    ```

