    Let us say that we have the following class:\n\n```python\nclass Employee:\n \
    \   def __init__(self, name=None, email=None, salary=None):\n        self.name\
    \ = name\n        self.email = email\n        self.salary = salary\n```\n\nNow,\
    \ let us create a new employee object and initialize its attributes accordingly:\n\
    \n```python\n# We are creating an object\nbetim = Employee('Betim', 'betim@company.com',\
    \ 5000)\n\nprint(betim.salary)  # 5000\n```\n\nSince salary is not being protected\
    \ in any way, we can set a new salary for this new object without any problem:\n\
    \n```python\nbetim.salary = 25000\n\nprint(betim.salary)  # 25000\n```\n\nAs we\
    \ can see, this person got five times the salary of what he was getting previously\
