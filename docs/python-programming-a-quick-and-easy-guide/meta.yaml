    driver.print_car()  # Car\ndriver.print_ferrari()  # Ferrari\ndriver.print_driver()\
    \  # Driver\n```\n\n## 多态\n\n这是面向对象编程中的另一个重要概念，指的是一个对象能够表现出不同形式并调用不同行为的可能性。\n\n\
    一个使用多态的内置函数示例是 `len()` 方法，它既可以用于字符串，也可以用于列表：\n\n```python\nprint(len('Python'))\
    \  # 6\n\nprint(len([2, 3, -43]))  # 3\n```\n\n我们可以用另一个名为 `House` 的类来举例。我们可以有不同的子类，它们从该超类继承方法和属性，例如\
    \ `Condo`、`Apartment`、`SingleFamilyHouse`、`MultiFamilyHouse` 等类。\n\n假设我们想在 `House`\
    \ 类中实现一个用于获取面积的方法。\n\n每种类型的住宅都有不同的大小，因此每个子类都应该有不同的实现。\n\n现在我们可以在子类中定义如下方法：\n\n\
    - getAreaOfCondo()\n- getAreaOfApartment()\n- getAreaOfSingleFamilyHouse()\n-\
    \ getAreaOfMultiFamilyHouse()\n\n这将迫使我们记住每个子类的名称，这可能很繁琐，并且在调用时也容易出错。\n然而，有一个更简单的方法可以使用，它来自多态。\n\
    我们可以通过方法和继承来实现多态。\n让我们首先看看如何使用方法来实现多态。\n\n## 使用方法实现多态\n\n假设我们有两个类，即 `Condo` 和\
    \ `Apartment`。它们都有一个返回值的 `get_area()` 方法。\n每个类都将有自己的自定义实现。\n现在，将被调用的方法取决于对象的类类型：\n\
    \n```python\nclass Condo:\n    def __init__(self, area):\n        self.area =\
    \ area\n\n    def get_area(self):\n        return self.area\n\n\nclass Apartment:\n\
    \    def __init__(self, area):\n        self.area = area\n\n    def get_area(self):\n\
    \        return self.area\n```\n\n让我们从这些类创建两个对象：\n\n```python\ncondo = Condo(100)\n\
    \napartment = Apartment(200)\n```\n\n现在，我们可以将它们都放入一个列表中，并为两个对象调用相同的方法：\n\n```python\n\
    places_to_live = [condo, apartment]\n\nfor place in places_to_live:\n    print(place.get_area())\
    \  # 两个对象使用相同的方法\n```\n\n执行后，我们将在控制台中看到以下内容：\n\n```\n# 100\n# 200\n```\n\n这就是使用方法实现的多态。\n\
    \n## 使用继承实现多态\n\n我们不仅可以从超类调用方法。我们还可以为每个子类使用相同的方法名，但有不同的实现。\n\n让我们首先定义一个超类：\n\n\
    ```python\nclass House:\n    def __init__(self, area):\n        self.area = area\n\
