    \ of an attribute.\n\nA **setter** is a method that is used to set the value of\
    \ an attribute.\n\nLet us first define a `getter` and a `setter` method that can\
    \ be used to get values:\n\n```python\nclass Smartphone:\n    def __init__(self,\
    \ type=None):  # defining initialize for case of no argument\n        self.__type\
    \ = type  # setting the type here in the beginning when the object is created\n\
    \n    def set_type(self, value):\n        self.__type = value\n\n    def get_type(self):\n\
    \        return (self.__type)\n```\n\nNow, let us use this class to set the type\
    \ and also get the type:\n\n```python\nsmartphone = Smartphone('iPhone')  # we\
    \ are setting the type using the constructor method\n\n# getting the value of\
    \ the type\nprint(smartphone.get_type())  # iPhone\n\n# Changing the value of\
    \ the type\nsmartphone.set_type('Samsung')\n\n# getting the new value of the type\n\
    print(smartphone.get_type())  # Samsung\n```\n\nWhat we have done so far is that\
    \ we have set and also read the value of a private attribute of an object created\
