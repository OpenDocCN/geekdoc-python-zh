    \ we can call all methods in all classes:\n\n```python\ndriver = Driver()\n\n\
    # Calling all methods from the subclass\ndriver.print_vehicle()  # Vehicle\ndriver.print_car()\
    \  # Car\ndriver.print_ferrari()  # Ferrari\ndriver.print_driver()  # Driver\n\
    ```\n\n## Polymorphism\n\nThis is another important concept from Object Oriented\
    \ Programming that refers to the possibility of an object behaving like different\
    \ forms and calling different behaviors.\n\nAn example of a built-in function\
    \ that uses polymorphism is the method `len()` which can be used for both strings\
    \ and lists:\n\n```python\nprint(len('Python'))  # 6\n\nprint(len([2, 3, -43]))\
    \  # 3\n```\n\nWe can take another example with a class called `House`. We can\
    \ have different subclasses that inherit methods and attributes from that superclass,\
