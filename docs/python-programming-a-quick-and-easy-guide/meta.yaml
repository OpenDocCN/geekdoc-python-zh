  - '[PAGE 138]


    +   - **IOError** - Raised when an I/O operation (such as a print statement, the
    built-in open() function or a method of a file object) fails for an I/O-related
    reason, e.g., “file not found” or “disk full”.

    - **ImportError** - Raised when an import statement fails to find the module definition
    or when a **from ... import** fails to find a name that is to be imported.

    - **IndexError** - Raised when a sequence subscript is out of range.

    - **KeyError** - Raised when a mapping (dictionary) key is not found in the set
    of existing keys.

    - **ValueError** - Raised when a built-in operation or function receives an argument
    that has the right type but an inappropriate value, and the situation is not described
    by a more precise exception such as IndexError.


    There are many other error types, but you may not need to see about them now.
    It is also very unlikely that you are going to see all types of errors all the
    time.


    You can see more types of exception in the [Python documentation](https://docs.python.org/3/library/exceptions.html).


    # Handling exceptions


    Let us start with a very simple example and write a program that throws an error
    on purpose so that we can then fix it.


    We are going to do a division by zero, which is something that you have probably
    seen at school:


    ```

    print(5 / 0)

    ```


    If we try to execute that, we are going to be greeted with the following error
    in the console:'
  - "[PAGE 139]\n\nZeroDivisionError: division by zero\n\nIf we were to have such\
    \ occurrences inside a Python program of any kind, we should catch and wrap this\
    \ error inside a `try/except` block.\n\nWe need to write inside the `try` block\
    \ the part of the code that we expect is going to throw errors. We then catch\
    \ those types of errors inside the `except` block by also specifying the type\
    \ of error that we except to happen.\n\nLet us see the first example.\n\nLet us\
    \ see how we can deal with that error so that we also get informed that such error\
    \ happened:\n\n```\npython\ntry:\n    5 / 0\nexcept ZeroDivisionError:\n    print('You\
    \ cannot divide by 0 mate!')\n```\n\nAs you can see, we are printing a message\
    \ in the console once we have reached the part where a division by 0 is happening.\n\
    \nWe can also omit the part `ZeroDivisionError` completely:\n\n```\npython\ntry:\n\
    \    5 / 0\nexcept:\n    print('You cannot divide by 0 mate!')\n```\n\nHowever,\
    \ this is not recommended, since we are catching all types of errors in a single\
    \ `except` block and we are not sure what type of errors are being caught, which\
    \ can be quite useful for us.\n\nLet us continue with another type of error.\n\
    \nLet us try to use a variable that is not defined at all:"
  - "[PAGE 140]\n\n```\n1 name = 'User'\n2 \n3 try:\n4     person = name + surname\
    \  # surname is not declared\n5 except NameError:\n6     print('A variable is\
    \ not defined')\n```\n\nIn the previous example, we have used variable surname\
    \ before declaring it, therefore a NameError is going to be thrown.\n\nLet us\
    \ continue with another type of example that can be common.\n\nWhen we use lists,\
    \ it can be a common mistake to use an index that is out of range, meaning that\
    \ the used index is larger or smaller than the range of indexes of the elements\
    \ in that list.\n\nLet us illustrate this with an example, where an IndexError\
    \ is going to be thrown:\n\n```\n1 my_list = [1, 2, 3, 4]\n2 \n3 try:\n4     \
    \    print(my_list[5])\n5     # This list only has 4 elements, so its indexes\
    \ range\\n6 from 0 to 3\n7 except IndexError:\n8     print('You have used an index\
    \ that is out of range')\n```\n\nWe can also use a single try block with multiple\
    \ except errors:"
  - "[PAGE 141]\n\n```\npython\nmy_list = [1, 2, 3, 4]\n\ntry:\n    print(my_list[5])\n\
    \    # This list only has 4 elements, so its indexes range\\n    from 0 to 3\n\
    except NameError:\n    print('You have used an invalid value')\nexcept ZeroDivisionError:\n\
    \    print('You cannot divide by zero')\nexcept IndexError:\n    print('You have\
    \ used an index that is out of range')\n```\n\nIn the previous example, we try\
    \ to initially catch whether there is any variable that is used but not declared.\
    \ If this error happens, then this except block is going to be taking over the\
    \ execution flow. This execution flow is going to stop there.\n\nThen, we try\
    \ to check whether we are dividing by zero. If this error is thrown, then this\
    \ except block is going to take over the execution and everything that is inside\
    \ it is going to be executed. Similarly, we continue with the rest of the errors\
    \ declared.\n\nWe can also put more than one error inside parenthesis to catch\
    \ multiple exceptions, but this is not going to be helpful for us, since we do\
    \ not know what specific error has been thrown. In other words, the following\
    \ method does work, but it is not recommended:"
  - "[PAGE 142]\n\n```\n1 my_list = [1, 2, 3, 4]\n2 \n3 try:\n4     print(my_list[5])\n\
    5     # This list only has 4 elements, so its indexes range\\n6 from 0 to 3\n\
    7 except (NameError, ZeroDivisionError, IndexError):\n8     print('A NameError,\
    \ ZeroDivisionError, or IndexError \\n9 occurred')\n```\n\n# finally\n\nAfter\
    \ the `try` and `except` are passed, there is another block that we can declare\
    \ and execute. This block starts with the `finally` keyword and it is executed\
    \ no matter whether we have an error is being thrown or not:\n\n```\n1 my_list\
    \ = ['a', 'b']\n2 \n3 try:\n4     print(my_list[0])\n5 except IndexError:\n6 \
    \    print('An IndexError occurred')\n7 finally:\n8     print('The program is\
    \ ending. This is going to be exe\\n9 cuted.')\n```\n\nIf we execute the previous\
    \ block of code, we are going to see the following in the console:\n\n```\n1 a\n\
    2 The program is ending. This is going to be executed.\n```\n\nWe usually write\
    \ code that we want to be as a cleanup inside the `finally` block. This includes\
    \ things like closing a file, or stopping a connection with a database, exiting\
    \ the program entirely, etc."
  - "[PAGE 143]\n\n# try, else, except\n\nWe can write statements inside try and except,\
    \ but we can also use an else block where we can write code that we want to be\
    \ executed if there are no errors being thrown:\n\n```\n1 my_list = ['a', 'b']\n\
    2 \n3 try:\n4     print(my_list[0])\n5 except IndexError:\n6     print('An IndexError\
    \ occurred')\n7 else:\n8     print('No error occurred. Congratulations!')\n```\n\
    \nIf we execute the code above, we are going to get the following printed in the\
    \ console:\n\n```\n1 a\n2 No error occurred. Congratulations!\n```\n\n# Wrap up\n\
    \nThis should be sufficient for you to understand exceptions and ways that you\
    \ can use to handle them so that there is no sudden interruptions that cause your\
    \ program to fail unexpectedly."
  - '[PAGE 144]


    # Afterword


    This book represents my attempt to make it quick and easy for you to learn the
    essentials of Python. There are many other things that Python includes and that
    are not covered in this book, but we will leave it here.


    I hope this serves as a useful reference for you.


    Now that you have had the chance to learn how to write Python, go out there and
    make a positive impact with your lines of code.'
