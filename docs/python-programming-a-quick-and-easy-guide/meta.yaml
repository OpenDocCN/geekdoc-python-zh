    \ be shown below:\n\n```python\nclass Employee:\n    def __init__(self, name=None,\
    \ email=None, salary=None):\n        self.__name = name\n        self.__email\
    \ = email\n        self.__salary = salary\n```\n\nLet us create a new object:\n\
    \n```python\n# We are creating an object\nbetim = Employee('Betim', 'betim@company.com',\
