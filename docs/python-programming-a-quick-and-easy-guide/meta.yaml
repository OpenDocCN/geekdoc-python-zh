  - '[PAGE 108]


    We have public and private access modifiers.

    Let us see both of them.


    # Public attributes


    Public attributes are the ones that are accessible from both inside and outside
    the class.


    By default, all attributes and methods are public in Python. If we want them to
    be private, we need to specify that.


    Let us see an example of public attributes:


    ```

    1 class Bicycle:

    2     def __init__(self, manufacturer, color, is_mountain_b\n3ike):

    4         self.manufacturer = manufacturer

    5         self.color = color

    6         self.is_mountain_bike = is_mountain_bike

    7

    8     def get_manufacturer(self):

    9         return self.manufacturer

    ```


    In the previous code block, both color and get_manufacturer() are accessible outside
    the class since they are public and can be accessed both inside and outside the
    class:


    ```

    1 bike = Bicycle("Connondale", "Grey", True)

    2

    3 print(bike.color)  # Grey

    4 print(bike.get_manufacturer())  # Connondale

    ```


    # Private attributes


    Private attributes can be accessed directly only from inside the class.'
