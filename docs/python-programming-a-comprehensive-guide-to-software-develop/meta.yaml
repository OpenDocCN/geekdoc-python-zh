    \                 else:\n                        current = current.left\n    \
    \            else:\n                    if current.right is None:\n          \
    \              current.right = new_node\n                        break\n     \
    \               else:\n                        current = current.right\n\ntree\
    \ = BinaryTree()\ntree.insert(5)\ntree.insert(3)\ntree.insert(7)\n```\n\n这个示例定义了一个Node类，表示二叉树中的一个节点，以及一个BinaryTree类，表示二叉树本身。insert方法用于将新节点插入树中，它检查新节点的值是大于还是小于当前节点的值，并相应地移动，如果没有左子节点或右子节点，它将在那里插入新节点。\n\
    \n### 字典树\n\n字典树（也称为前缀树）是一种树状数据结构，用于存储关联数组，其中键是序列（通常是字符串）。树中每个节点的位置定义了一个或多个键的公共前缀。"
