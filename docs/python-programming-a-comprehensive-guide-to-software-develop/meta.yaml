    password = b\"password\"\nsalt = b\"salt\"\nkdf = PBKDF2HMAC(\nalgorithm=hashes.SHA256,\n\
    length=32,\nsalt=salt,\niterations=100000,\nbackend=default_backend()\n)\nkey\
    \ = base64.urlsafe_b64encode(kdf.derive(password))\n\nEncrypt file\nfernet = Fernet(key)\n\
    with open(\"file.txt\", \"rb\") as file:\nencrypted_data = fernet.encrypt(file.read())\n\
    \nwith open(\"file.txt.encrypted\", \"wb\") as file:\nfile.write(encrypted_data)\n\
    \nDecrypt file\nwith open(\"file.txt.encrypted\", \"rb\") as file:\ndecrypted_data\
    \ = fernet.decrypt(file.read())\n\nwith open(\"file.txt\", \"wb\") as file:\n\
    file.write(decrypted_data)\n```\n\n# Scapy man-in-the-middle detection\n\n```\n\
    from scapy.all import ARP, Ether, srp\n\n# Define target IP and MAC\n```"
