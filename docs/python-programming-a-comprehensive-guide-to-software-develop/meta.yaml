    \ `lambda` 关键字定义，通常在需要函数但只使用一次的情况下使用。\n\n以下是使用 lambda 函数按第二个元素对元组列表进行排序的示例：\n\n\
    ```python\ndata = [(1, 'A'), (3, 'B'), (2, 'C')]\ndata.sort(key=lambda x: x[1])\n\
    print(data) # prints [(1, 'A'), (3, 'B'), (2, 'C')]\n```\n\n在这个例子中，使用 lambda 函数定义排序键，该键根据每个元组的第二个元素对列表进行排序。\n\
    \n### Map\n\n`map()` 函数将给定的函数应用于输入列表中的所有项，并返回结果的迭代器。这对于将函数应用于大型数据集而无需使用循环非常有用。\n\
    \n以下是使用 `map()` 函数对列表中所有元素求平方的示例：\n\n```python\ndata = [1, 2, 3, 4, 5]\nsquared_data\
    \ = map(lambda x: x**2, data)\nprint(list(squared_data)) # prints [1, 4, 9, 16,\
    \ 25]\n```\n\n### Filter\n\n`filter()` 函数从可迭代对象的元素中返回一个迭代器，其中函数返回 true。\n\n以下是使用\
