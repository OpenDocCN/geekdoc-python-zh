  mdcn: "这个示例展示了如何测试像阶乘这样的简单函数。但在实际项目和系统中，函数和类更为复杂，需要考虑更多条件。\n\n## 练习\n\n- 1. 为一个计算斐波那契数列的函数创建单元测试。\n\
