    \ linked list in Python:\n\n```\nclass Node:\n    def __init__(self, data):\n\
    \        self.data = data\n        self.next = None\n\nclass LinkedList:\n   \
    \ def __init__(self):\n        self.head = None\n\nlinked_list = LinkedList()\n\
    linked_list.head = Node(1)\nsecond = Node(2)\nthird = Node(3)\n\nlinked_list.head.next\
    \ = second\nsecond.next = third\n\n# traversing the linked list\ncurrent = linked_list.head\n\
    while current:\n    print(current.data)\n    current = current.next\n\n# output\
    \ : 1, 2, 3\n```\n\nIn this example, the Node class is used to represent each\
