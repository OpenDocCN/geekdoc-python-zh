    # Chapter 28: Blockchain


    Blockchain technology is a decentralized, distributed ledger that allows for secure
    and transparent transactions. It is the technology that underlies cryptocurrencies
    like Bitcoin, but it has potential applications in many other areas as well. In
    this chapter, we will explore the basics of blockchain technology and learn how
    to use popular Python libraries to work with blockchain.


    # Understanding concepts of blockchain


    A blockchain is essentially a chain of blocks, where each block contains a number
    of transactions. These transactions are verified and added to the blockchain through
    a consensus mechanism, such as proof of work or proof of stake. Once a block is
    added to the blockchain, it cannot be modified or deleted, making the blockchain
    an immutable and secure way to store data.


    One of the key features of blockchain technology is its decentralized nature.
    It is maintained by a network of users rather than a central authority, making
    it more resistant to manipulation and fraud.


    # Using Python’s blockchain libraries


    There are several popular Python libraries for working with blockchain, such as
    Bitcoin-Python and PyEthereum. Here’s an example of how to use the Bitcoin-Python
    library to create a new Bitcoin transaction:


    # The bitcoin library


    ```

    from bitcoin.rpc import RawProxy


    proxy = RawProxy()


    txid = proxy.sendtoaddress(''1BvBMSEYstWetqTFn5Au4m4GFg7xJaNVN2'', 0.01)

    print(txid)

    ```


    This example creates a new Bitcoin transaction sending 0.01 BTC to the specified
    address using the RawProxy class from the Bitcoin-Python library.


    Another library to work with blockchain using python is web3.py library which
    is a python interface for interacting with the Ethereum blockchain. Here’s an
    example of how to check the balance of an Ethereum address using web3.py:


    # The web3 library


    ```

    from web3 import Web3


    w3 = Web3(Web3.HTTPProvider(''http://ropsten.infura.io/v3/YOUR-PROJECT-ID''))


    address = ''0x4bbeEB066eD09B7AEd07bF39EEe0460DFa261520''

    balance = w3.eth.getBalance(address)


    print(w3.fromWei(balance, ''ether''))

    ```


    # Exercises for practice


    +   1. Using the Bitcoin-Python library, create a simple program that retrieves
    the current price of Bitcoin in USD.

    2. Using the web3.py library, create a program that creates a new Ethereum wallet
    and transfers a certain amount of Ether to it.

    3. Try to come up with your own blockchain problem and try to solve it using Python’s
    blockchain libraries.


    # Summary


    In this chapter, we have covered the basics of blockchain technology and how to
    use popular Python libraries to work with blockchain. We have seen examples of
    how to create new Bitcoin and Ethereum transactions using the Bitcoin-Python and
    web3.py libraries respectively. By practicing with the provided exercises, you
    will be able to gain more experience working with blockchain using Python and
    its libraries.'
