  md: '# Chapter 10: Regular Expressions


    Regular expressions, often referred to as “regex” or “regexp,” are a powerful
    tool for matching patterns in text. In Python, regular expressions are supported
    by the re module, which provides a set of functions and classes for working with
    regular expressions.


    A regular expression is a sequence of characters that define a search pattern.
    For example, the regular expression matches any digit, while the regular expression
    [A-Z] matches any uppercase letter.


    In Python, we use the re module to work with regular expressions. The most commonly
    used functions in the re module are **search()**, **findall()**, **split()**,
    **sub()**, and **compile()**.


    # search() function


    The **search()** function is used to search for a match to a regular expression
    in a string. For example, the following code will search for the regular expression
    in the string “abc123”:


    ```

    import re


    result = re.search(r"\d", "abc123")

    print(result.group())

    ```


    This will print “1” as output.


    # findall() function


    The **findall()** function returns a list of all the matches to a regular expression
    in a string. For example, the following code will find all the digits in the string
    “abc123”:


    ```

    import re


    result = re.findall(r"\d", "abc123")

    print(result)

    ```


    This will print “[''1'', ''2'', ''3'']” as output.


    # split() function


    The **split()** function is used to split a string into a list of substrings based
    on a regular expression. For example, the following code will split the string
    “abc,123,def” into a list of substrings using the regular expression ,:


    ```

    import re


    result = re.split(r",", "abc,123,def")

    print(result)

    ```


    This will print “[''abc'', ''123'', ''def'']” as output.


    # sub() function


    The **sub()** function is used to replace all occurrences of a regular expression
    in a string with a replacement string. For example, the following code will replace
    all occurrences of the regular expression in the string “abc123” with the string
    “X”:


    ```

    import re


    result = re.sub(r"\d", "X", "abc123")

    print(result)

    ```


    This will print “abcXXX” as output.


    # compile() function


    The **compile()** function is used to create a regular expression object from
    a string. This is useful when you need to use a regular expression multiple times
    in your program. For example, the following code creates a regular expression
    object for the pattern :'
