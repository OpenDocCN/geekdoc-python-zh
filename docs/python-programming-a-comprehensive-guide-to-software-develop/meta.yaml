    \ 35(8), 1798-1828.\n\n## 关于作者\n\nAmin Boulouma 是一位拥有超过10年行业经验的软件工程师、数据科学家、初创公司创始人和首席技术官。他编写了多个软件程序，并与多个行业合作，为他们的特定需求开发创新解决方案。\n\
    \n除了职业生涯，Amin 也是一名学者和研究员。他曾在国际上工作和学习，从摩洛哥到奥地利，途经西班牙和以色列，并通过他的理学硕士、工程硕士参与并持续参与学术研究，目前正在攻读博士学位。\n\
