  md: '# Chapter 16: Data Structure - Part 1


    In this chapter, we will explore some fundamental data structures such as stack,
    queue, linked list, and etc. Data structures are an important aspect of programming
    as they provide a way to organize and store data in a specific way to make it
    more efficient to access, manipulate, and process.


    # Understanding data structures


    # Stack


    A stack is a last-in-first-out (LIFO) data structure that allows for the insertion
    and deletion of elements at one end, called the top of the stack. The basic operations
    that can be performed on a stack include push, pop, and peek.


    Here''s an example of a stack implementation in Python using a list:


    ```

    stack = []


    # push operation

    stack.append(1)

    stack.append(2)

    stack.append(3)


    # pop operation

    stack.pop() # returns 3

    stack.pop() # returns 2


    # peek operation

    stack[-1] # returns 1

    ```


    In this example, the list is used to implement the stack data structure, the append
    method represents the push operation, the pop method represents the pop operation,
    and the indexing [-1] represents the peek operation.


    # Queue


    A queue is a first-in-first-out (FIFO) data structure that allows for the insertion
    of elements at one end, called the rear, and the deletion of elements at the other
    end, called the front. The basic operations that can be performed on a queue include
    enqueue, dequeue, and peek.


    Here''s an example of a queue implementation in Python using a list:


    ```

    from collections import deque


    queue = deque()


    # enqueue operation

    queue.append(1)

    queue.append(2)

    queue.append(3)


    # dequeue operation

    queue.popleft() # returns 1

    queue.popleft() # returns 2


    # peek operation

    queue[0] # returns 3

    ```


    In this example, the deque class from the collections module is used to implement
    the queue data structure, the append method represents the enqueue operation,
    the popleft method represents the dequeue operation, and the indexing [0] represents
    the peek operation.'
