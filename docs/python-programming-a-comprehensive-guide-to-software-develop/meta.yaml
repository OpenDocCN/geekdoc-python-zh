    \ in graph}\n    unvisited[start] = 0\n\n    # Dijkstra's algorithm\n    while\
    \ unvisited:\n        current = min(unvisited, key=unvisited.get)\n        unvisited.pop(current)\n\
    \n        for neighbor, weight in graph[current].items():\n            if shortest_paths[current]\
