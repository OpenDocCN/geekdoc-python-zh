  - "[PAGE 23]\n\n# Chapter 9: Error Handling\n\nAs a programmer, it’s important to\
    \ anticipate and handle errors that may occur during the execution of your program.\
    \ In Python, errors are referred to as “exceptions” and are represented by a class\
    \ that inherits from the built-in BaseException class.\n\n# try / except block\n\
    \nThere are two main types of errors that can occur in a Python program: syntax\
    \ errors and exceptions. Syntax errors occur when the Python interpreter encounters\
    \ a line of code that it cannot interpret due to a mistake in the syntax. On the\
    \ other hand, exceptions occur when an error occurs during the execution of the\
    \ program, such as when a program tries to divide by zero or access an index out\
    \ of range.\n\nTo handle exceptions in Python, we use the try and except keywords.\
    \ The try block contains the code that may raise an exception, and the except\
    \ block contains the code that will be executed if an exception is raised.\n\n\
    For example, consider the following code that opens a file and reads its contents:\n\
    \n```\ntry:\n    with open(\"example.txt\", \"r\") as file:\n        content =\
    \ file.read()\n        print(content)\nexcept FileNotFoundError:\n    print(\"\
    File not found.\")\n```\n\nIn this example, the try block contains the code that\
    \ opens and reads the file, and the except block contains the code that is executed\
    \ if a FileNotFoundError exception is raised. If the file “example.txt” is not\
    \ found, the program will print “File not found.” instead of raising an error.\n\
    \n# finally block\n\nIn addition to try and except, we can also use the finally\
    \ block. The code in this block will always be executed, whether an exception\
    \ is raised or not. This is useful for performing cleanup operations such as closing\
    \ a file or a database connection.\n\n```\ntry:\n    # code that can raise an\
    \ exception\nexcept:\n    # code that handles the exception\nfinally:\n    # code\
    \ that is always executed\n```\n\n# raise statement\n\nWe can also raise our custom\
    \ exceptions using ‘raise’ statement, it’s a good practice to give the exception\
    \ a descriptive name and add a helpful error message.\n\n```\nif age < 18:\n \
    \   raise ValueError(\"You must be at least 18 years old to use this service.\"\
    )\n```\n\n# Exercises for Practice\n\nNow, it’s time for you to practice what\
    \ you’ve learned. Try the following exercises to solidify your understanding of\
    \ error handling in Python:\n\n+   1. Create a Python script that prompts the\
    \ user for a number and then calculates the factorial of that number. Handle the\
    \ exception that may occur if the user enters a negative number or a non-numeric\
    \ value.\n2. Create a Python script that prompts the user for two numbers and\
    \ then divides the first number by the second. Handle the exception that may occur\
    \ if the user enters zero as the second number.\n3. Create a python script that\
    \ takes a list as input and returns the second largest element. Handle the exception\
    \ that may occur if the list is empty."
- md: "## Summary\n\nIn this chapter, we've covered the basics of error handling in\
    \ Python, including how to handle and raise exceptions using the try, except and\
    \ finally statements. We have also learned how to raise custom exceptions using\
    \ raise statement. You should now have a solid foundation for handling errors\
    \ in Python and be ready to move on to more advanced topics.\n\nIn summary, this\
    \ chapter has covered the basic concepts of error handling in Python, from understanding\
    \ errors and exceptions in Python, to handling and raising exceptions, and practice\
    \ exercises for the reader.\n\n## Chapter 10: Regular Expressions\n\nRegular expressions,\
    \ often referred to as “regex” or “regexp,” are a powerful tool for matching patterns\
    \ in text. In Python, regular expressions are supported by the re module, which\
    \ provides a set of functions and classes for working with regular expressions.\n\
    \nA regular expression is a sequence of characters that define a search pattern.\
    \ For example, the regular expression matches any digit, while the regular expression\
    \ [A-Z] matches any uppercase letter.\n\nIn Python, we use the re module to work\
    \ with regular expressions. The most commonly used functions in the re module\
    \ are **search()**, **findall()**, **split()**, **sub()**, and **compile()**.\n\
    \n### search() function\n\nThe **search()** function is used to search for a match\
    \ to a regular expression in a string. For example, the following code will search\
    \ for the regular expression in the string “abc123”:\n\n```python\nimport re\n\
    \nresult = re.search(r\"\\d\", \"abc123\")\nprint(result.group())\n```\n\nThis\
    \ will print “1” as output.\n\n### findall() function\n\nThe **findall()** function\
    \ returns a list of all the matches to a regular expression in a string. For example,\
    \ the following code will find all the digits in the string “abc123”:\n\n```python\n\
    import re\n\nresult = re.findall(r\"\\d\", \"abc123\")\nprint(result)\n```\n\n\
    This will print “['1', '2', '3']” as output.\n\n### split() function\n\nThe **split()**\
    \ function is used to split a string into a list of substrings based on a regular\
    \ expression. For example, the following code will split the string “abc,123,def”\
    \ into a list of substrings using the regular expression ,:\n\n```python\nimport\
    \ re\n\nresult = re.split(r\",\", \"abc,123,def\")\nprint(result)\n```\n\nThis\
    \ will print “['abc', '123', 'def']” as output.\n\n### sub() function\n\nThe **sub()**\
    \ function is used to replace all occurrences of a regular expression in a string\
    \ with a replacement string. For example, the following code will replace all\
    \ occurrences of the regular expression in the string “abc123” with the string\
    \ “X”:\n\n```python\nimport re\n\nresult = re.sub(r\"\\d\", \"X\", \"abc123\"\
    )\nprint(result)\n```\n\nThis will print “abcXXX” as output.\n\n### compile()\
    \ function\n\nThe **compile()** function is used to create a regular expression\
    \ object from a string. This is useful when you need to use a regular expression\
    \ multiple times in your program. For example, the following code creates a regular\
    \ expression object for the pattern :\n\n```python\nimport re\n\npattern = re.compile(r\"\
    \\d\")\nresult = pattern.search(\"abc123\")\nprint(result.group())\n```\n\nThis\
    \ will print “1” as output.\n\nNow, it’s time for you to practice what you’ve\
    \ learned. Try the following exercises to solidify your understanding of regular\
    \ expressions in Python:\n\n### Exercises for Practice\n\n- 1. Create a python\
    \ script that extracts all email addresses from a given string.\n- 2. Create a\
    \ python script that validates a phone number.\n- 3. Create a python script that\
    \ takes a string as input and removes all the whitespace from it.\n\n### Summary\n\
    \nIn summary, this chapter has covered the basic concepts of regular expressions\
    \ in Python, including an understanding of regular expressions and how to use\
    \ the re module for working with regular expressions using various functions such\
    \ as search(), findall(), split(), sub() and compile(). Additionally, it provides\
    \ practice exercises for the reader to solidify their understanding of regular\
    \ expressions.\n\n## Chapter 11: Debugging\n\nDebugging is the process of identifying\
    \ and fixing errors in your code. As a programmer, debugging is an important skill\
    \ to have, as it allows you to identify and fix issues in your code quickly and\
    \ efficiently.\n\n### The pdb module\n\nIn Python, there are several ways to debug\
    \ your code, but one of the most commonly used is the pdb module. pdb stands for\
    \ “Python Debugger,” and it’s a built-in module that provides a set of functions\
    \ for interacting with the Python interpreter at a low level.\n\nTo use pdb, you\
    \ can simply import the module at the top of your script and use one of its functions,\
    \ such as set_trace(), to set a breakpoint in your code. For example:\n\n```python\n\
    import pdb\n\ndef my_function(x):\n    result = x * 2\n    pdb.set_trace()\n \
    \   return result\n\nprint(my_function(3))\n```\n\nThis code will start the pdb\
    \ interpreter at the line where pdb.set_trace() is called, and then you can use\
    \ the various commands available in the pdb interpreter to step through your code\
    \ and inspect variables and stack frames.\n\npdb provides many commands that you\
    \ can use to navigate and inspect your code while it’s running, some of the most\
    \ commonly used are:\n\n- n (next) : Execute the current line and move to the\
    \ next one ignoring function calls.\n- s (step) : Execute the current line and\
    \ stop at the first possible occasion (either in a function that is called or\
    \ in the current function).\n- c (continue) : Continue execution until a breakpoint\
    \ is found.\n- l (list) : List source code for the current file. Without arguments,\
    \ list 11 lines around the current line or continue the previous listing.\n\n\
    In addition to the pdb module, you can also use other tools for debugging, such\
    \ as the print() statement, and assert statement, or Integrated Development Environments\
    \ (IDEs) like Pycharm, VSCode, etc.\n\n### Exercises for Practice\n\nNow, it’s\
    \ time for you to practice what you’ve learned. Try the following exercises to\
    \ solidify your understanding of debugging in Python:\n\n- 1. Create a python\
    \ script that has a syntax error and use pdb to find the error and fix it.\n-\
    \ 2. Create a python script that has a semantic error and use pdb to find the\
    \ error and fix it.\n- 3. Create a python script that takes a list as input and\
    \ returns the second largest element. Use pdb to debug and understand the flow\
    \ of your program.\n\nIn this chapter, we’ve covered the basics of debugging in\
    \ Python, including the use of the pdb module and various commands provided by\
    \ pdb for debugging, as well as other tools like print(), assert statement and\
    \ IDEs.\n\nAdditionally, it provided practice exercises for the reader to solidify\
    \ their understanding of debugging in Python.\n\n### Summary\n\nIn summary, this\
    \ chapter provides an understanding of debugging in Python, including use of the\
    \ built-in pdb module, various commands provided by pdb and other tools like print(),\
    \ assert statement, and IDEs to debug Python programs and also provided practice\
    \ exercises for the reader to solidify their understanding of debugging in Python.\n\
    \n## Chapter 12: Decorators\n\nIn this chapter, we will explore the concept of\
    \ decorators in Python. Decorators are a powerful feature that allows us to modify\
    \ the behavior of a function or method without changing its code. They are often\
    \ used to add additional functionality or to enforce constraints on the arguments\
    \ passed to a function.\n\n### Understanding decorators and their use in Python\n\
    \nA decorator is a special type of function that takes another function as its\
    \ argument and returns a new function. The new function is a modified version\
    \ of the original function, with additional behavior added. Decorators are defined\
    \ using the @ symbol, which is placed before the function definition.\n\nHere\
    \ is an example of a simple decorator that adds 1 to the result of a given function:\n\
    \n```python\ndef add_one(function):\n    def wrapper(*args, **kwargs):\n     \
    \   result = function(*args, **kwargs)\n        return result + 1\n    return\
    \ wrapper\n\n@add_one\ndef calculate(x, y):\n    return x + y\n\nprint(calculate(1,\
    \ 2)) # prints 3\n```\n\nIn this example, the `add_one` decorator is applied to\
    \ the `calculate` function, which adds 1 to the result of the function. The decorator\
    \ is defined as a function that takes another function as its argument and returns\
    \ a new function, `wrapper`, that is a modified version of the original function.\n\
    \n### Using decorators to modify functions and methods\n\nDecorators can be used\
    \ to add additional functionality to a function or method without changing its\
    \ code. For example, you can use a decorator to enforce constraints on the arguments\
    \ passed to a function, such as checking that a value is within a certain range.\n\
    \nHere's an example of a decorator that checks the range of value:\n\n```python\n\
    def check_range(min_value, max_value):\n    def decorator(function):\n       \
    \ def wrapper(*args, **kwargs):\n            for arg in args:\n              \
    \  if not min_value <= arg <= max_value:\n                    raise ValueError(\"\
    Argument out of range\")\n            return function(*args, **kwargs)\n     \
    \   return wrapper\n    return decorator\n\n@check_range(0, 100)\ndef calculate(x,\
    \ y):\n    return x + y\n\nprint(calculate(1, 2)) # prints 3\nprint(calculate(101,\
    \ 2)) # raises ValueError\n```\n\nIn this example, the `check_range` decorator\
    \ is defined as a function that takes two arguments: a minimum and maximum value.\
    \ It returns a decorator function that checks whether the arguments passed to\
    \ the original function are within the specified range. If any of the arguments\
    \ are out of range, a `ValueError` is raised.\n\n### Exercises for practice\n\n\
    - 1. Write a decorator that logs the arguments passed to a function and the result\
    \ returned by the function.\n- 2. Write a decorator that memoizes the results\
    \ of a function. A memoized function will return the cached result for a given\
    \ set of arguments, rather than recalculating the result."
  mdcn: "## 总结\n\n在本章中，我们介绍了 Python 中错误处理的基础知识，包括如何使用 try、except 和 finally 语句来处理和引发异常。我们还学习了如何使用\
    \ raise 语句引发自定义异常。现在，你应该已经为处理 Python 中的错误打下了坚实的基础，并准备好进入更高级的主题。\n\n总而言之，本章涵盖了\
    \ Python 中错误处理的基本概念，从理解 Python 中的错误和异常，到处理和引发异常，以及为读者提供的实践练习。\n\n## 第10章：正则表达式\n\
    \n正则表达式，通常被称为“regex”或“regexp”，是用于匹配文本中模式的强大工具。在 Python 中，正则表达式由 `re` 模块支持，该模块提供了一组用于处理正则表达式的函数和类。\n\
    \n正则表达式是定义搜索模式的字符序列。例如，正则表达式 `\\d` 匹配任何数字，而正则表达式 `[A-Z]` 匹配任何大写字母。\n\n在 Python\
    \ 中，我们使用 `re` 模块来处理正则表达式。`re` 模块中最常用的函数是 **search()**、**findall()**、**split()**、**sub()**\
    \ 和 **compile()**。\n\n### search() 函数\n\n**search()** 函数用于在字符串中搜索与正则表达式匹配的内容。例如，以下代码将在字符串\
    \ \"abc123\" 中搜索正则表达式 `\\d`：\n\n```python\nimport re\n\nresult = re.search(r\"\
    \\d\", \"abc123\")\nprint(result.group())\n```\n\n这将输出 \"1\"。\n\n### findall()\
    \ 函数\n\n**findall()** 函数返回字符串中所有与正则表达式匹配的内容的列表。例如，以下代码将找到字符串 \"abc123\" 中的所有数字：\n\
    \n```python\nimport re\n\nresult = re.findall(r\"\\d\", \"abc123\")\nprint(result)\n\
    ```\n\n这将输出 \"['1', '2', '3']\"。\n\n### split() 函数\n\n**split()** 函数用于根据正则表达式将字符串分割成子字符串列表。例如，以下代码将使用正则表达式\
    \ `,` 将字符串 \"abc,123,def\" 分割成子字符串列表：\n\n```python\nimport re\n\nresult = re.split(r\"\
    ,\", \"abc,123,def\")\nprint(result)\n```\n\n这将输出 \"['abc', '123', 'def']\"。\n\
    \n### sub() 函数\n\n**sub()** 函数用于将字符串中所有与正则表达式匹配的内容替换为替换字符串。例如，以下代码将把字符串 \"abc123\"\
    \ 中所有与正则表达式 `\\d` 匹配的内容替换为字符串 \"X\"：\n\n```python\nimport re\n\nresult = re.sub(r\"\
    \\d\", \"X\", \"abc123\")\nprint(result)\n```\n\n这将输出 \"abcXXX\"。\n\n### compile()\
    \ 函数\n\n**compile()** 函数用于从字符串创建正则表达式对象。当你需要在程序中多次使用同一个正则表达式时，这非常有用。例如，以下代码为模式\
    \ `\\d` 创建了一个正则表达式对象：\n\n```python\nimport re\n\npattern = re.compile(r\"\\d\"\
    )\nresult = pattern.search(\"abc123\")\nprint(result.group())\n```\n\n这将输出 \"\
    1\"。\n\n现在，是时候让你练习所学的内容了。尝试以下练习，以巩固你对 Python 正则表达式的理解：\n\n### 练习\n\n- 1. 创建一个\
    \ Python 脚本，从给定字符串中提取所有电子邮件地址。\n- 2. 创建一个 Python 脚本，用于验证电话号码。\n- 3. 创建一个 Python\
    \ 脚本，接受一个字符串作为输入并移除其中的所有空白字符。\n\n### 总结\n\n总而言之，本章涵盖了 Python 中正则表达式的基本概念，包括理解正则表达式以及如何使用\
    \ `re` 模块通过 search()、findall()、split()、sub() 和 compile() 等各种函数来处理正则表达式。此外，还为读者提供了实践练习，以巩固他们对正则表达式的理解。\n\
    \n## 第11章：调试\n\n调试是识别和修复代码中错误的过程。作为一名程序员，调试是一项重要的技能，因为它使你能够快速高效地识别和修复代码中的问题。\n\
    \n### pdb 模块\n\n在 Python 中，有几种调试代码的方法，但最常用的方法之一是 `pdb` 模块。pdb 代表“Python 调试器”，它是一个内置模块，提供了一组用于在底层与\
    \ Python 解释器交互的函数。\n\n要使用 pdb，你只需在脚本顶部导入该模块，并使用其函数之一，例如 `set_trace()`，在代码中设置断点。例如：\n\
    \n```python\nimport pdb\n\ndef my_function(x):\n    result = x * 2\n    pdb.set_trace()\n\
    \    return result\n\nprint(my_function(3))\n```\n\n此代码将在调用 `pdb.set_trace()`\
    \ 的行启动 pdb 解释器，然后你可以使用 pdb 解释器中可用的各种命令来单步执行代码并检查变量和堆栈帧。\n\npdb 提供了许多命令，你可以在代码运行时使用它们来导航和检查代码，其中一些最常用的命令是：\n\
    \n- n (next) : 执行当前行并移动到下一行，忽略函数调用。\n- s (step) : 执行当前行并在第一个可能的场合停止（在被调用的函数中或在当前函数中）。\n\
    - c (continue) : 继续执行直到找到断点。\n- l (list) : 列出当前文件的源代码。不带参数时，列出当前行周围的 11 行或继续之前的列表。\n\
    \n除了 `pdb` 模块，你还可以使用其他工具进行调试，例如 `print()` 语句、`assert` 语句，或像 Pycharm、VSCode 等集成开发环境（IDE）。\n\
    \n### 练习\n\n现在，是时候让你练习所学的内容了。尝试以下练习，以巩固你对 Python 调试的理解：\n\n- 1. 创建一个包含语法错误的 Python\
    \ 脚本，并使用 pdb 找到并修复该错误。\n- 2. 创建一个包含语义错误的 Python 脚本，并使用 pdb 找到并修复该错误。\n- 3. 创建一个\
    \ Python 脚本，接受一个列表作为输入并返回第二大的元素。使用 pdb 调试并理解程序的流程。\n\n在本章中，我们介绍了 Python 调试的基础知识，包括使用\
    \ `pdb` 模块以及 pdb 提供的各种调试命令，还有其他工具如 `print()`、`assert` 语句和 IDE。\n\n此外，还为读者提供了实践练习，以巩固他们对\
    \ Python 调试的理解。\n\n### 总结\n\n总而言之，本章介绍了 Python 调试的概念，包括使用内置的 `pdb` 模块、pdb 提供的各种命令以及其他工具如\
