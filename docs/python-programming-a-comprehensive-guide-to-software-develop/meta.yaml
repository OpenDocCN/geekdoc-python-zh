  md: "# Chapter 9: Error Handling\n\nAs a programmer, it’s important to anticipate\
    \ and handle errors that may occur during the execution of your program. In Python,\
    \ errors are referred to as “exceptions” and are represented by a class that inherits\
    \ from the built-in BaseException class.\n\n# try / except block\n\nThere are\
    \ two main types of errors that can occur in a Python program: syntax errors and\
    \ exceptions. Syntax errors occur when the Python interpreter encounters a line\
    \ of code that it cannot interpret due to a mistake in the syntax. On the other\
    \ hand, exceptions occur when an error occurs during the execution of the program,\
    \ such as when a program tries to divide by zero or access an index out of range.\n\
    \nTo handle exceptions in Python, we use the try and except keywords. The try\
    \ block contains the code that may raise an exception, and the except block contains\
    \ the code that will be executed if an exception is raised.\n\nFor example, consider\
    \ the following code that opens a file and reads its contents:\n\n```\ntry:\n\
    \    with open(\"example.txt\", \"r\") as file:\n        content = file.read()\n\
    \        print(content)\nexcept FileNotFoundError:\n    print(\"File not found.\"\
    )\n```\n\nIn this example, the try block contains the code that opens and reads\
    \ the file, and the except block contains the code that is executed if a FileNotFoundError\
    \ exception is raised. If the file “example.txt” is not found, the program will\
    \ print “File not found.” instead of raising an error.\n\n# finally block\n\n\
    In addition to try and except, we can also use the finally block. The code in\
    \ this block will always be executed, whether an exception is raised or not. This\
    \ is useful for performing cleanup operations such as closing a file or a database\
    \ connection.\n\n```\ntry:\n    # code that can raise an exception\nexcept:\n\
    \    # code that handles the exception\nfinally:\n    # code that is always executed\n\
    ```\n\n# raise statement\n\nWe can also raise our custom exceptions using ‘raise’\
    \ statement, it’s a good practice to give the exception a descriptive name and\
    \ add a helpful error message.\n\n```\nif age < 18:\n    raise ValueError(\"You\
    \ must be at least 18 years old to use this service.\")\n```\n\n# Exercises for\
    \ Practice\n\nNow, it’s time for you to practice what you’ve learned. Try the\
    \ following exercises to solidify your understanding of error handling in Python:\n\
    \n+   1. Create a Python script that prompts the user for a number and then calculates\
    \ the factorial of that number. Handle the exception that may occur if the user\
    \ enters a negative number or a non-numeric value.\n2. Create a Python script\
    \ that prompts the user for two numbers and then divides the first number by the\
    \ second. Handle the exception that may occur if the user enters zero as the second\
    \ number.\n3. Create a python script that takes a list as input and returns the\
    \ second largest element. Handle the exception that may occur if the list is empty."
