  md: "# # Chapter 12: Decorators\n\nIn this chapter, we will explore the concept\
    \ of decorators in Python. Decorators are a powerful feature that allows us to\
    \ modify the behavior of a function or method without changing its code. They\
    \ are often used to add additional functionality or to enforce constraints on\
    \ the arguments passed to a function.\n\n# ## Understanding decorators and their\
    \ use in Python\n\nA decorator is a special type of function that takes another\
    \ function as its argument and returns a new function. The new function is a modified\
    \ version of the original function, with additional behavior added. Decorators\
    \ are defined using the @ symbol, which is placed before the function definition.\n\
    \nHere is an example of a simple decorator that adds 1 to the result of a given\
    \ function:\n\n```\npython\ndef add_one(function):\n    def wrapper(*args, **kwargs):\n\
    \        result = function(*args, **kwargs)\n        return result + 1\n    return\
    \ wrapper\n\n@add_one\ndef calculate(x, y):\n    return x + y\n\nprint(calculate(1,\
    \ 2)) # prints 3\n```\n\nIn this example, the `add_one` decorator is applied to\
    \ the `calculate` function, which adds 1 to the result of the function. The decorator\
    \ is defined as a function that takes another function as its argument and returns\
    \ a new function, `wrapper`, that is a modified version of the original function.\n\
    \n# ## Using decorators to modify functions and methods\n\nDecorators can be used\
    \ to add additional functionality to a function or method without changing its\
    \ code. For example, you can use a decorator to enforce constraints on the arguments\
    \ passed to a function, such as checking that a value is within a certain range.\n\
    \nHere's an example of a decorator that checks the range of value:\n\n```\npython\n\
    def check_range(min_value, max_value):\n    def decorator(function):\n       \
    \ def wrapper(*args, **kwargs):\n            for arg in args:\n              \
    \  if not min_value <= arg <= max_value:\n                    raise ValueError(\"\
    Argument out of range\")\n            return function(*args, **kwargs)\n     \
    \   return wrapper\n    return decorator\n\n@check_range(0, 100)\ndef calculate(x,\
    \ y):\n    return x + y\n\nprint(calculate(1, 2)) # prints 3\nprint(calculate(101,\
    \ 2)) # raises ValueError\n```\n\nIn this example, the `check_range` decorator\
    \ is defined as a function that takes two arguments: a minimum and maximum value.\
    \ It returns a decorator function that checks whether the arguments passed to\
    \ the original function are within the specified range. If any of the arguments\
    \ are out of range, a `ValueError` is raised.\n\n# ## Exercises for practice\n\
