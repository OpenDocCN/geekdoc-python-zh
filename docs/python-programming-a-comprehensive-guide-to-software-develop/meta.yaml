  md: "```\n# Create a weightage table for each sentence\nweightage_table = {}\nfor\
    \ index, sentence in enumerate(filtered_sentences):\n    weightage_table[index]\
    \ = 0\n    for word in nltk.word_tokenize(sentence.lower()):\n        if word\
    \ in frequency_table:\n            weightage_table[index] += frequency_table[word]\n\
    \n# Get the threshold value for the weightage table\nthreshold = sum(weightage_table.values())\
    \ / len(weightage_table)\n\n# Get the summarized sentences\nsummarized_sentences\
    \ = []\nfor index, weight in weightage_table.items():\n    if weight > threshold:\n\
    \        summarized_sentences.append(sentences[index])\n\n# Return the summarized\
    \ text\nreturn \" \".join(summarized_sentences)\n\ntext = \"\"\"The natural language\
    \ processing is a field of computer science and artificial intelligence that deals\
    \ with the interaction between computers and human (natural) languages, in particular\
    \ how to program computers to process and analyze large amounts of natural language\
    \ data.\"\"\"\nprint(summarize_text(text))\n```\n\nThis program takes a text as\
    \ input and first tokenizes it into sentences using the sent_tokenize function\
    \ from NLTK. Then, it removes stopwords, which are commonly used words that do\
    \ not add much meaning to the text such as “the”, “is”, “of”, etc. Next, it creates\
    \ a frequency table for the words in the text, which will be used to assign a\
    \ weight to each sentence. Then it create a weightage table for each sentence,\
    \ the weight assigned to each sentence will be based on the frequency of the words\
    \ in the sentence. Then it set a threshold for the weightage table, the threshold\
    \ is calculated by taking the average of the weightage values. Finally, it returns\
    \ the sentences whose weightage is greater than the threshold, which represents\
    \ the most informative sentences of the text."
