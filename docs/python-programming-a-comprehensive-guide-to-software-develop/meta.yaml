    \n# Multiprocessing for Factorial Calculation\n\n```\nimport multiprocessing\n\
    \ndef factorial(n):\n    if n == 1:\n        return 1\n    return n * factorial(n-1)\n\
    \nif __name__ == '__main__':\n    p = multiprocessing.Pool(processes=4)\n    result\
    \ = p.map(factorial, range(1,16))\n    print(result)\n```\n\nThis program creates\
    \ a pool of 4 worker processes using multiprocessing.Pool(processes=4). The map()\
    \ function is then used to apply the factorial() function to a range of numbers,\
    \ 1 through 15. The results are collected and printed.\n\nMultiple Files Download\
    \ Program.\n\n# Here’s an example of a problem that can be solved using multithreading:\n\
    \n```\nimport threading\nimport urllib.request\n\ndef download_file(url):\n  \
    \  response = urllib.request.urlopen(url)\n    file = open(url.split(\"/\")[-1],\
    \ \"wb\")\n    file.write(response.read())\n    file.close()\n    print(f\"Finished\
    \ downloading {url}\")\n\nif __name__ == '__main__':\n    urls = ['https://www.example.com/file1.txt',\n\
    \            'https://www.example.com/file2.txt',\n            'https://www.example.com/file3.txt',\n\
    \            'https://www.example.com/file4.txt']\n    threads = []\n    for url\
    \ in urls:\n        thread = threading.Thread(target=download_file, args=(url,))\n\
    \        thread.start()\n        threads.append(thread)\n    for thread in threads:\n\
