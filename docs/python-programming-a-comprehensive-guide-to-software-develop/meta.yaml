    ## 第12章：装饰器\n\n在本章中，我们将探讨 Python 中装饰器的概念。装饰器是一个强大的特性，它允许我们在不修改函数或方法代码的情况下修改其行为。它们通常用于添加额外功能或对传递给函数的参数施加约束。\n\
    \n### 理解装饰器及其在 Python 中的使用\n\n装饰器是一种特殊类型的函数，它接受另一个函数作为参数并返回一个新函数。新函数是原始函数的修改版本，添加了额外的行为。装饰器使用\
    \ `@` 符号定义，该符号放在函数定义之前。\n\n这是一个简单的装饰器示例，它将给定函数的结果加 1：\n\n```python\ndef add_one(function):\n\
    \    def wrapper(*args, **kwargs):\n        result = function(*args, **kwargs)\n\
    \        return result + 1\n    return wrapper\n\n@add_one\ndef calculate(x, y):\n\
    \    return x + y\n\nprint(calculate(1, 2)) # 输出 3\n```\n\n在这个例子中，`add_one` 装饰器应用于\
    \ `calculate` 函数，它将函数的结果加 1。装饰器被定义为一个接受另一个函数作为参数并返回一个新函数 `wrapper` 的函数，`wrapper`\
    \ 是原始函数的修改版本。\n\n### 使用装饰器修改函数和方法\n\n装饰器可用于在不修改函数或方法代码的情况下为其添加额外功能。例如，你可以使用装饰器对传递给函数的参数施加约束，例如检查值是否在特定范围内。\n\
    \n这是一个检查值范围的装饰器示例：\n\n```python\ndef check_range(min_value, max_value):\n    def\
    \ decorator(function):\n        def wrapper(*args, **kwargs):\n            for\
    \ arg in args:\n                if not min_value <= arg <= max_value:\n      \
    \              raise ValueError(\"参数超出范围\")\n            return function(*args,\
    \ **kwargs)\n        return wrapper\n    return decorator\n\n@check_range(0, 100)\n\
    def calculate(x, y):\n    return x + y\n\nprint(calculate(1, 2)) # 输出 3\nprint(calculate(101,\
    \ 2)) # 引发 ValueError\n```\n\n在这个例子中，`check_range` 装饰器被定义为一个接受两个参数的函数：最小值和最大值。它返回一个装饰器函数，该函数检查传递给原始函数的参数是否在指定范围内。如果任何参数超出范围，则会引发\
