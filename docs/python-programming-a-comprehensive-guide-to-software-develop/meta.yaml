    \ 1)\n        self.assertEqual(factorial(2), 2)\n        self.assertEqual(factorial(3),\
    \ 6)\n        self.assertEqual(factorial(4), 24)\n\nif __name__ == '__main__':\n\
    \    unittest.main()\n```\n\nIn this example, a test class FactorialTest is defined\
    \ which inherits from `unittest.TestCase`. This test class defines a method `test_factorial()`\
    \ which runs several test cases for the `factorial()` function. The `assertEqual()`\
    \ method is used to check that the output of the function is as expected for different\
    \ input values."
