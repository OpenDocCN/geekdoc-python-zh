    \n# Scapy ARP spoof detection\n\n```\nfrom scapy.all import ARP, Ether, srp\n\n\
    # Define target IP and MAC\ntarget_ip = '192.168.1.1'\ntarget_mac = 'ff:ff:ff:ff:ff:ff'\n\
    \n# Send ARP request\narp = ARP(pdst=target_ip)\nether = Ether(dst=target_mac)\n\
    packet = ether/arp\nresult = srp(packet, timeout=3, verbose=0)[0]\n\n# Check for\
    \ response from target IP\nif result:\n    print(\"ARP Spoofing detected.\")\n\
    else:\n    print(\"No ARP Spoofing detected.\")\n```\n\n# Cryptography file encryption/decryption\n\
    \n```\nfrom cryptography.fernet import Fernet\nfrom cryptography.hazmat.backends\
    \ import default_backend\nfrom cryptography.hazmat.primitives import hashes\n\
    from cryptography.hazmat.primitives.kdf.pbkdf2 import PBKDF2HMAC\n\nGenerate password\n\
    password = b\"password\"\nsalt = b\"salt\"\nkdf = PBKDF2HMAC(\nalgorithm=hashes.SHA256,\n\
    length=32,\nsalt=salt,\niterations=100000,\nbackend=default_backend()\n)\nkey\
    \ = base64.urlsafe_b64encode(kdf.derive(password))\n\nEncrypt file\nfernet = Fernet(key)\n\
    with open(\"file.txt\", \"rb\") as file:\nencrypted_data = fernet.encrypt(file.read())\n\
    \nwith open(\"file.txt.encrypted\", \"wb\") as file:\nfile.write(encrypted_data)\n\
    \nDecrypt file\nwith open(\"file.txt.encrypted\", \"rb\") as file:\ndecrypted_data\
    \ = fernet.decrypt(file.read())\n\nwith open(\"file.txt\", \"wb\") as file:\n\
    file.write(decrypted_data)\n```\n\n# Scapy man-in-the-middle detection\n\n```\n\
    from scapy.all import ARP, Ether, srp\n\n# Define target IP and MAC\n```"
