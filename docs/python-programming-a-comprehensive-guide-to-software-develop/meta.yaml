- md: 'Queue


    Queue 是一种先进先出（FIFO）的数据结构。它只允许在队列的一端（队尾）进行插入操作，在另一端（队头）进行删除操作。想象一下在银行排队办理业务，先来的人先办理，后来的人排在队尾，这就是队列的典型应用场景。


    队列的基本操作包括：

    - 入队（Enqueue）：将元素添加到队尾。

    - 出队（Dequeue）：移除并返回队头元素。

    - 查看队头元素（Peek/Front）：返回队头元素但不移除它。

    - 判断队列是否为空（isEmpty）：检查队列中是否有元素。

    - 获取队列大小（size）：返回队列中元素的数量。


    队列可以用数组或链表来实现。基于数组的实现简单，但可能涉及元素的移动；基于链表的实现更灵活，但需要额外的指针空间。在计算机科学中，队列广泛应用于任务调度、缓冲区管理、广度优先搜索（BFS）等场景。'
