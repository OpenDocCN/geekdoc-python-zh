  md: '# Chapter 5: Modules


    In this chapter, we''ll be diving into modules in Python. Modules are a way to
    organize and structure code by separating it into smaller, reusable chunks. They
    allow you to use existing code in your own programs and can be used to extend
    the functionality of your programs.


    # Understanding modules in Python


    A module in Python is simply a file containing Python code. A module can define
    functions, classes and variables, and can also include other modules. The file
    name is the module name with the suffix .py added. To use a module in your code,
    you must first import it. Here''s an example of how to import and use a module
    in Python:


    ```

    import math


    x = math.sqrt(16)

    print(x)

    ```


    In this example, we''re importing the built-in math module, which provides access
    to a number of mathematical functions. Then we''re using the sqrt function, which
    is part of the math module, to calculate the square root of 16 and store it in
    the variable x.


    You can also import specific functions or variables from a module instead of the
    entire module. Here''s an example:


    ```

    from math import sqrt


    x = sqrt(16)

    print(x)

    ```


    In this example, we''re using the from keyword to import only the sqrt function
    from the math module, rather than the entire module.


    # Importing and using modules in Python


    You can import modules in python using the import keyword, followed by the module
    name. You can then use the functions and variables defined in the module by referencing
    the module name followed by the function or variable name.


    # Exercises for Practice


    The following exercises will help you practice what you''ve learned about modules
    in Python.


    +   1. Import the random module and use it to generate a random number between
    1 and 10.

    2. Import the datetime module and use it to display the current date and time.


    # Summary


    In this chapter, we learned about modules in Python, including how to import and
    use them to extend the functionality of our programs. We also saw some examples
    of how modules can be used in practice.


    Modules are an important tool for organizing and structuring code, and by practicing
    the exercises in this chapter, you''ll be well on your way to mastering them.'
