    \n# Custom Stack with Minimum Element\n\n```\nclass Stack:\n    def __init__(self):\n\
    \        self.items = []\n        self.mins = []\n\n    def push(self, item):\n\
    \        self.items.append(item)\n        if not self.mins or item <= self.mins[-1]:\n\
    \            self.mins.append(item)\n\n    def pop(self):\n        if self.items:\n\
    \            if self.items[-1] == self.mins[-1]:\n                self.mins.pop()\n\
    \            return self.items.pop()\n\n    def min(self):\n        if self.mins:\n\
    \            return self.mins[-1]\n        return None\n```\n\n```\ns = Stack()\n\
