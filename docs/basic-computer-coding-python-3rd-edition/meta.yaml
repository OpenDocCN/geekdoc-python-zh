    # 9.5.2 DELETE Command


    Deleting records works very similarly to updating records. You use the DELETE
    statement to remove selected records.


    > Note: Deleting is an *irreversible* process. If you don''t use the WHERE clause,
    then all records from the specified table will be deleted. You''ll need to run
    the INSERT INTO query again to get back the deleted records.


    It''s recommended that you first run a SELECT query with the same filter to make
    sure that you''re deleting the right records. For example, to remove all ratings
    given by reviewer_id = 2, you should first run the corresponding SELECT query:


    ```

    >>>

    >>> select_movies_query = """

    ... SELECT reviewer_id, movie_id FROM ratings

    ... WHERE reviewer_id = 2

    ... """

    >>> with connection.cursor() as cursor:

    ...     cursor.execute(select_movies_query)

    ...     for movie in cursor.fetchall():

    ...         print(movie)

    ...

    (2, 7)

    (2, 8)

    (2, 12)

    (2, 23)

    ```


    The above code snippet outputs the reviewer_id and movie_id for records in the
    ratings table where reviewer_id = 2. Once you''ve confirmed that these are the
    records that you need to delete, you can run a DELETE query with the same filter:


    ```

    delete_query = "DELETE FROM ratings WHERE reviewer_id = 2"

    ```'
