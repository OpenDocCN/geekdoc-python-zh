  mdcn: "## 面向对象编程\n\n```python\nreturn self.name + ' ' + self.__lastname\n```\n\n\
    ```python\n#在类外部\nP = Person()\nprint(P.name)\nprint(P.PrintName())\nprint(P.__lastname)\n\
    #AttributeError: 'Person' object has no attribute '__lastname'\n```\n\n> `__init__`\
    \ 方法是一个构造函数，在类的对象被实例化时立即运行。其目的是初始化对象。\n\n在类外部访问公共变量，成功。\n在类外部访问私有变量，失败。\n访问公共函数，但该函数成功访问了**私有变量\
    \ __B**，因为它们在同一个类中。\n访问私有成员数据的示例。（使用名称修饰技术）\n\n```python\nclass SeeMee:\n    def\
    \ youcanseeme(self):\n        return 'you can see me'\n\n    def __youcannotseeme(self):\n\
    \        return 'you cannot see me'\n```\n\n```python\n#在类外部\nCheck = SeeMee()\n\
    print(Check.youcanseeme())\n# you can see me\nprint(Check.__youcannotseeme())\n\
    #AttributeError: 'SeeMee' object has no attribute '__youcannotseeme'\n```\n\n\
    > **私有变量**是仅对其所属类可见的变量。\n\n如果你需要访问私有成员函数：\n\n```python\nclass SeeMee:\n    def\
    \ youcanseeme(self):\n        return 'you can see me'\n    def __youcannotseeme(self):\n\
    \        return 'you cannot see me'\n#在类外部\nCheck = SeeMee()\nprint(Check.youcanseeme())\n\
    print(Check._SeeMee__youcannotseeme())\n#更改名称后即可访问该函数\n```\n\n你仍然可以使用其修饰后的名称来调用该方法，因此这个特性并不能提供太多保护。\n\
    \n关于访问私有成员和私有函数，你应该了解以下几点：\n\n- 当你写入一个对象不存在的属性时，Python 系统通常不会报错，而是会创建一个新的属性。\n\
    - 私有属性不受 Python 系统保护。这是设计决策。\n- 私有属性会被屏蔽。原因是，在继承链中不应有冲突。屏蔽是通过一些隐式重命名完成的。私有属性的*真实*名称将是\
    \ `\"__<className>_<attributeName>\"`。\n\n使用这个名称，可以从外部访问它。当从类内部访问时，名称会自动正确更改。\n\
    \n## Python 中的数据封装\n\n在 Python 中使用面向对象编程，我们可以限制对方法和变量的访问。这防止了数据被直接修改，称为封装。在 Python\
    \ 中，我们使用下划线作为前缀来表示私有属性，即单下划线 \" _ \" 或双下划线 \" __ \"。\n\n```python\nclass Computer:\n\
    \n    def __init__(self):\n        self.__maxprice = 900\n\n    def sell(self):\n\
    \        print(\"Selling Price: {}\".format(self.__maxprice))\n\n    def setMaxPrice(self,\
    \ price):\n        self.__maxprice = price\n\nc = Computer()\nc.sell()\n\n# 更改价格\n\
    c.__maxprice = 1000\nc.sell()\n\n# 使用 setter 函数\nc.setMaxPrice(1000)\nc.sell()\n\
    ```\n\n当我们运行这个程序时，输出将是：\nSelling Price: 900\nSelling Price: 900\nSelling Price:\
    \ 1000\n\n在上面的程序中，我们定义了一个 Computer 类。我们使用 `__init__()` 方法来存储计算机的最高售价。我们尝试修改价格。然而，我们无法更改它，因为\
    \ Python 将 `__maxprice` 视为私有属性。要更改该值，我们使用了一个 setter 函数，即 `setMaxPrice()`，它接受价格作为参数。\n\
    \n## 5.2.3 多态\n\n多态意味着不同类型对同一函数做出响应。多态非常有用，因为它使编程更直观，从而更容易。多态是一个花哨的词，只是意味着同一个函数定义在不同类型的对象上。Python\
    \ 提供了协议，这在底层就是多态。这些协议为不同类型的内置对象实现了一致的行为。\n\n### 协议\n\n当我们内省一个对象时，我们有很多采用这种格式的属性：`__names__`。本节将阐明其中的许多。\n\
    \n一切都是对象，所有操作最终都意味着调用在对象上定义的函数。\n\n协议是嵌入到 Python 中的多态函数。最重要的是，解释器知道它们。\n\n协议使得：\n\
    \n- 一致性 - 程序员可以依赖直觉\n- 特殊语法 - 解释器将漂亮的语法转换为对象上的函数。\n\n我们将研究两个协议：`__contains__`\
    \ 和 `__iter__`\n\n### __add__\n\n`x + y` 解析为 `x.__add__(y)`\n\n```python\n>>>\
    \ 1 + 2\n3\n>>> one = 1\n>>> one.__add__(2)\n3\n>>> '1' + '2'\n'12'\n>>> '1'.__add__('2')\n\
    '12'\n```\n\n任何实现了 `__add__` 函数的对象都可以与 `<object> + x` 语法一起使用。\n\n### __contains__\n\
    \n`__contains__` 是用于成员关系的内置协议。\n\n`x in y` 解析为 `y.__contains__(x)`\n\n当解释器遇到 `'b'\
    \ in ['a', 'b']` 时，它知道要在 `in` 右侧的对象上查找 `__contains__` 函数，并将 `in` 左侧的对象作为**参数**传递给它。\n\
    \n列表对象定义了该函数，然后解释器执行相应的代码块。\n\n所有数据结构都定义了成员关系的概念：\n\n```python\n>>> 'b' in ['a',\
    \ 'b']\nTrue\n>>> 'b' in ('a', 'b')\nTrue\n>>> 'b' in {'a': 1, 'b': 2}\nTrue\n\
    >>> 'b' in {'a', 'b'}\nTrue\n演示 `__contains__`：\n>>> ['a', 'b'].__contains__('b')\n\
    True\n>>> ('a', 'b').__contains__('b')\nTrue\n>>> {'a': 1, 'b': 2}.__contains__('b')\n\
    True\n>>> {'a', 'b'}.__contains__('b')\nTrue\n```\n\n任何实现了 `__contains__` 函数的对象都可以与\
    \ `x in <object>` 语法一起使用。\n\n### __iter__\n\n`__iter__` 是 Python 中实现迭代的方式。这个协议比其他协议稍微复杂一些。\n\
    \n看这段代码：\n\n```python\n>>> number = [1, 2]\n>>> for i in [1, 2]:\n...     print(i)\n\
    ...\n1\n2\n```\n\n大致的事件序列如下：\n- 解释器在列表对象上调用 `__iter__`，\n- 返回一个迭代器类型的对象。\n- 然后解释器在迭代器上重复调用\
    \ `__next__`\n- 解释器执行 for 循环中的代码\n- 如果发生 `StopIteration` 异常，解释器中断循环。\n\n为了说明：\n\
    \n```python\n>>> itr_obj = [1, 2].__iter__()\n>>> type(itr_obj)\n<class 'list_iterator'>\n\
    >>> itr_obj.__next__()\n1\n>>> itr_obj.__next__()\n2\n>>> itr_obj.__next__()\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    StopIteration\n```\n\n任何实现了 `__iter__` 函数的对象都可以与 `for x in <object>: ...` 语法一起使用。\n\
    \n## 练习\n\n### 布尔运算符\n\n使用内省函数，以下语法解析为哪些协议函数：\n\n- 3 > 2\n- 3 < 2\n- 3 <= 2\n\
    - 3 >= 2\n\n### 字符串表示\n\n当我们在解释器中得到结果时，调用的是哪个函数？这与我们输入 `print(x)` 时调用的函数相同吗？\n\
    \n### len() 实现\n\nlen() 适用于多种对象类型：\n\n```python\n>>> len('hi')\n2\n>>> len([1,\
    \ 2])\n2\n```\n\n函数 `len` 在传递给它的对象上调用了哪个协议函数？多态是（在 OOP 中）为多种形式（数据类型）使用通用接口的能力。假设我们需要给一个形状上色，有多种形状选项（矩形、正方形、圆形）。然而，我们可以使用相同的方法给任何形状上色。这个概念称为多态。\n\
    \n### 在 Python 中使用多态\n\n```python\nclass Parrot:\n    def fly(self):\n       \
    \ print(\"Parrot can fly\")\n    def swim(self):\n        print(\"Parrot can't\
    \ swim\")\n\nclass Penguin:\n    def fly(self):\n        print(\"Penguin can't\
    \ fly\")\n\n    def swim(self):\n        print(\"Penguin can swim\")\n\n# 通用接口\n\
    def flying_test(bird):\n    bird.fly()\n\n#实例化对象\nblu = Parrot()\npeggy = Penguin()\n\
    \n# 传递对象\nflying_test(blu)\nflying_test(peggy)\n```\n\n当我们运行上面的程序时，输出将是：\nParrot\
    \ can fly\nPenguin can't fly\n\n在上面的程序中，我们定义了两个类 Parrot 和 Penguin。它们都有共同的 fly()\
    \ 方法。然而，它们的功能是不同的。为了允许多态，我们创建了一个通用接口，即 flying_test() 函数，它可以接受任何对象。然后，我们将对象 blu\
    \ 和 peggy 传递给 flying_test() 函数，它有效地运行了。\n\n## 5.2.4 抽象\n\n数据抽象和封装经常被用作同义词。它们几乎是同义词，因为数据抽象是通过封装实现的。\n\
    \n抽象用于隐藏内部细节，只显示功能。抽象某物意味着给事物命名，以便该名称捕捉函数或整个程序的核心功能。当我们考虑世界上我们希望在程序中表示的广泛事物时，我们发现其中大多数具有复合结构。一个日期有年、月、日。\n\
    \n**关键词**\n**模块化**是系统组件可以被分离和重新组合的程度，通常具有灵活性和使用多样性的优势。"
