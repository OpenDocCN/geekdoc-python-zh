    \ X 的值，所以很难在不涉及另一个文件的情况下理解或重用一个文件。这种隐式的跨文件依赖关系，往好了说会导致代码不灵活，往坏了说则会导致彻底的错误。\n\n\
    在这里，最好的处方通常是不要这样做——跨文件边界通信的最佳方式是调用函数，传入参数并获取返回值。在这个特定案例中，我们可能最好编写一个访问器函数来管理更改：\n\
