    \ pass these names to the constructor, and even read or modify them.\n\nWe can\
    \ flag a thread as a ‘daemon thread’. This means that the whole program exits\
    \ when only the daemon threads remain. This initial value comes from the creating\
    \ thread. We can set this flag via the property ‘daemon’, or via the **constructor**\
    \ argument ‘daemon’. Daemons abruptly stop at shutdown, and they may not properly\
    \ release all the resources held. These resources may include open files, database\
    \ transactions, and others. To stop our threads gracefully, we must make them\
    \ non-daemonic. It is also preferable to use a suitable signaling process, like\
    \ an Event.\n\nThe ‘main thread’ object pertains to the initial thread of control\
    \ in our program; it is not a daemon.\n\nFinally, it is possible that the interpreter\
    \ creates ‘dummy thread objects’. These are ‘alien threads’ (threads of control\
