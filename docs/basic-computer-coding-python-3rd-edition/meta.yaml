- md: "## 10.4.3 Why nonlocal?\n\nGiven the extra complexity of nested functions,\
    \ you might wonder what the fuss is about. Although it’s difficult to see in our\
    \ small examples, state information becomes crucial in many programs. There are\
    \ a variety of ways to “remember” information across function and method calls\
    \ in Python. While there are tradeoffs for all, nonlocal does improve this story\
    \ for enclosing scope references—the nonlocal statement allows multiple copies\
    \ of changeable state to be retained in memory and addresses simple state-retention\
    \ needs where classes may not be warranted.\n\nThe following code allows state\
    \ to be retained and modified in an enclosing scope. Each call to tester creates\
    \ a little self-contained package of changeable information, whose names do not\
    \ clash with any other part of the program:\n\n```python\ndef tester(start):\n\
    \    state = start                # Each call gets its own state\n    def nested(label):\n\
    \        nonlocal state           # Remembers state in enclosing scope\n     \
    \   print(label, state)\n        state += 1               # Allowed to change\
    \ it if nonlocal\n    return nested\n\nF = tester(0)\nF('spam')\n```\n\nUnfortunately,\
    \ this code only works in Python 3.0. If you are using Python 2.6, other options\
    \ are available, depending on your goals.\n\n### Shared state with globals\n\n\
    One usual prescription for achieving the nonlocal effect in 2.6 and earlier is\
    \ to simply move the state out to the global scope (the enclosing module):\n\n\
    ```python\n>>> def tester(start):\n...     global state              # Move it\
    \ out to the module to change it\n...     state = start             # global allows\
    \ changes in module scope\n...     def nested(label):\n...         global state\n\
    ...         print(label, state)\n...         state += 1\n...     return nested\n\
    ...\n>>> F = tester(0)\n>>> F('spam')                    # Each call increments\
    \ shared global state\n\nspam 0\n>>> F('eggs')\neggs 1\n```\n\nThis works in this\
    \ case, but it requires global declarations in both functions and is prone to\
    \ name collisions in the global scope (what if “state” is already being used?).\
    \ A worse, and more subtle, problem is that it only allows for a single shared\
    \ copy of the state information in the module scope—if we call tester again, we’ll\
    \ wind up resetting the module’s state variable, such that prior calls will see\
    \ their state overwritten:\n\n```python\n>>> G = tester(42)            # Resets\
    \ state's single copy in global scope\n>>> G('toast')\ntoast 42\n\n>>> G('bacon')\n\
    bacon 43\n\n>>> F('ham')                  # Oops -- my counter has been overwritten!\n\
    ham 44\n```\n\nWhen using nonlocal instead of global, each call to tester remembers\
    \ its own unique copy of the state object.\n\n### State with classes (preview)\n\
    \nThe other prescription for changeable state information in 2.6 and earlier is\
    \ to use classes with attributes to make state information access more explicit\
    \ than the implicit magic of scope lookup rules. As an added benefit, each instance\
    \ of a class gets a fresh copy of the state information, as a natural byproduct\
    \ of Python’s object model.\n\nWe haven’t explored classes in detail yet, but\
    \ as a brief preview, here is a reformulation of the tester/nested functions used\
    \ earlier as a class—state is recorded in objects explicitly as they are created.\
    \ To make sense of this code, you need to know that a def within a class like\
    \ this works exactly like a def outside of a class, except that the function’s\
    \ self argument automatically receives the implied subject of the call (an instance\
    \ object created by calling the class itself):\n\n```python\n>>> class tester:\
    \              # Class-based alternative\n...     def __init__(self, start): \
    \ # On object construction,\n...         self.state = start      # save state\
    \ explicitly in new object\n...     def nested(self, label):\n...         print(label,\
    \ self.state) # Reference state explicitly\n...         self.state += 1      \
    \    # Changes are always allowed\n...\n>>> F = tester(0)              # Create\
    \ instance, invoke __init__\n>>> F.nested('spam')           # F is passed to self\n\
    spam 0\n>>> F.nested('ham')\nham 1\n\n>>> G = tester(42)             # Each instance\
    \ gets new copy of state\n>>> G.nested('toast')          # Changing one does not\
    \ impact others\ntoast 42\n>>> G.nested('bacon')\nbacon 43\n\n>>> F.nested('eggs')\n\
    eggs 2\n>>> F.state\n3\n```\n\nWith just slightly more magic, which we'll delve\
    \ into later in this book, we could also make our class look like a callable function\
    \ using operator overloading. `__call__` intercepts direct calls on an instance,\
    \ so we don't need to call a named method:\n\n```python\n>>> class tester:\n...\
    \     def __init__(self, start):\n...         self.state = start\n...     def\
    \ __call__(self, label):\n...         print(label, self.state)\n...         self.state\
    \ += 1\n...\n>>> H = tester(99)\n>>> H('juice')\njuice 99\n>>> H('pancakes')\n\
    pancakes 100\n```\n\nWhile using classes for state information is generally a\
    \ good rule of thumb to follow, they might be overkill in cases like this, where\
    \ state is a single counter. Such trivial state cases are more common than you\
    \ might think; in such contexts, nested defs are sometimes more lightweight than\
    \ coding classes, especially if you're not familiar with OOP yet. Moreover, there\
    \ are some scenarios in which nested defs may actually work better than classes.\n\
    \n### State with function attributes\n\nAs a final state-retention option, we\
    \ can also sometimes achieve the same effect as nonlocals with function attributes—user-defined\
    \ names attached to functions directly. Here's a final version of our example\
    \ based on this technique—it replaces a nonlocal with an attribute attached to\
    \ the nested function. Although this scheme may not be as intuitive to some, it\
    \ also allows the state variable to be accessed outside the nested function (with\
    \ nonlocals, we can only see state variables within the nested def):\n\n```python\n\
    >>> def tester(start):\n...     def nested(label):\n...         print(label, nested.state)\n\
    ...         nested.state += 1\n...     nested.state = start          # Initial\
    \ state after func defined\n...     return nested\n...\n>>> F = tester(0)\n>>>\
    \ F('spam')                         # F is a 'nested' with state attached\nspam\
    \ 0\n>>> F('ham')\nham 1\n>>> F.state                           # Can access state\
    \ outside functions too\n2\n>>>\n>>> G = tester(42)                     # G has\
    \ own state, doesn't overwrite F's\n>>> G('eggs')\neggs 42\n>>> F('ham')\nham\
    \ 2\n```\n\nThis code relies on the fact that the function name nested is a **local\
    \ variable** in the tester scope enclosing nested; as such, it can be referenced\
    \ freely inside nested. This code also relies on the fact that changing an object\
    \ in-place is not an assignment to a name; when it increments nested.state, it\
    \ is changing part of the object nested references, not the name nested itself.\
    \ Because we're not really assigning a name in the enclosing scope, no nonlocal\
    \ is needed.\n\nAs you can see, globals, nonlocals, classes, and function attributes\
    \ all offer state-retention options. Globals only support shared data, classes\
    \ require a basic knowledge of OOP, and both classes and function attributes allow\
    \ state to be accessed outside the nested function itself. As usual, the best\
    \ tool for your program depends upon your program's goals.\n\n> **Keyword**\n\n\
    **Local variable** is a variable that is given local scope. A local variable reference\
    \ in the function or block in which it is declared overrides the same variable\
    \ name in the larger scope.\n\n## ROLE MODEL\n\n## BRAM COHEN: AMERICAN COMPUTER\
    \ PROGRAMMER\n\nBram Cohen is an American computer programmer, best known as the\
    \ author of the peer-to-peer (P2P) BitTorrent protocol in 2001, as well as the\
    \ first file sharing program to use the protocol, also known as BitTorrent. He\
    \ is also the co-founder of CodeCon and organizer of the San Francisco Bay Area\
    \ P2P-hackers meeting, was the co-author of Codeville and creator of the Chia\
    \ cryptocurrency which implements the proof of space-time consensus algorithm.\n\
    \n### Early Life and Career\n\nCohen grew up in the Upper West Side of Manhattan,\
    \ New York City, as the son of a teacher and computer scientist. He claims he\
    \ learned the BASIC programming language at the age of 5 on his family’s Timex\
    \ Sinclair computer. Cohen passed the American Invitational Mathematics Examination\
    \ to qualify for the United States of America Mathematical Olympiad while he attended\
    \ Stuyvesant High School in New York City. He graduated from Stuyvesant in 1993\
    \ and attended SUNY Buffalo. He later dropped out of college to work for several\
    \ dot com companies throughout the mid to late 1990s, the last being MojoNation,\
    \ an ambitious but ill-fated project he worked on with Jim McCoy.\n\nMojoNation\
    \ allowed people to break up confidential files into encrypted chunks and distribute\
    \ those pieces on computers also running the software. If someone wanted to download\
    \ a copy of this encrypted file, they would have to download it simultaneously\
    \ from many computers. This concept, Cohen thought, was perfect for a file sharing\
    \ program, since programs like KaZaA take a long time to download a large file\
    \ because the file is (usually) coming from one source (or “peer”). Cohen designed\
    \ BitTorrent to be able to download files from many sources, thus speeding up\
    \ the download time, especially for users with faster download than upload speeds.\
    \ Thus, the more popular a file is, the faster a user will be able to download\
    \ it, since many people will be downloading it at the same time, and these people\
    \ will also be uploading the data to other users."
  mdcn: "## 10.4.3 为何需要 nonlocal？\n\n考虑到嵌套函数带来的额外复杂性，你可能会疑惑这有什么必要。虽然在我们的小例子中不易察觉，但在许多程序中，状态信息变得至关重要。在\
    \ Python 中，有多种方式可以在函数和方法调用之间“记住”信息。虽然所有方式都有其权衡，但 `nonlocal` 确实改善了对外部作用域引用的处理——`nonlocal`\
    \ 语句允许可变状态的多个副本保留在内存中，并解决了那些可能不需要使用类的简单状态保留需求。\n\n以下代码允许在外部作用域中保留和修改状态。每次调用 `tester`\
    \ 都会创建一个独立的可变信息包，其名称不会与程序的任何其他部分冲突：\n\n```python\ndef tester(start):\n    state\
    \ = start                # Each call gets its own state\n    def nested(label):\n\
    \        nonlocal state           # Remembers state in enclosing scope\n     \
    \   print(label, state)\n        state += 1               # Allowed to change\
    \ it if nonlocal\n    return nested\n\nF = tester(0)\nF('spam')\n```\n\n不幸的是，这段代码仅在\
    \ Python 3.0 中有效。如果你使用的是 Python 2.6，则有其他选项可供选择，具体取决于你的目标。\n\n### 使用 globals 实现共享状态\n\
    \n在 2.6 及更早版本中实现 `nonlocal` 效果的一个常见方法是简单地将状态移至全局作用域（即外部模块）：\n\n```python\n>>>\
    \ def tester(start):\n...     global state              # Move it out to the module\
    \ to change it\n...     state = start             # global allows changes in module\
    \ scope\n...     def nested(label):\n...         global state\n...         print(label,\
    \ state)\n...         state += 1\n...     return nested\n...\n>>> F = tester(0)\n\
    >>> F('spam')                    # Each call increments shared global state\n\n\
    spam 0\n>>> F('eggs')\neggs 1\n```\n\n这在当前情况下有效，但它需要在两个函数中都进行 `global` 声明，并且容易在全局作用域中发生名称冲突（如果“state”已经被使用了怎么办？）。一个更糟糕、更微妙的问题是，它只允许在模块作用域中保留状态信息的单个共享副本——如果我们再次调用\
    \ `tester`，最终会重置模块的状态变量，导致之前的调用看到的状态被覆盖：\n\n```python\n>>> G = tester(42)    \
    \        # Resets state's single copy in global scope\n>>> G('toast')\ntoast 42\n\
    \n>>> G('bacon')\nbacon 43\n\n>>> F('ham')                  # Oops -- my counter\
    \ has been overwritten!\nham 44\n```\n\n使用 `nonlocal` 而不是 `global` 时，每次调用 `tester`\
    \ 都会记住其自己独特的状态对象副本。\n\n### 使用类实现状态（预览）\n\n在 2.6 及更早版本中处理可变状态信息的另一个方法是使用带有属性的类，使状态信息的访问比作用域查找规则的隐式魔法更加明确。作为额外的好处，类的每个实例都会获得状态信息的新副本，这是\
    \ Python 对象模型的自然副产品。\n\n我们还没有详细探讨类，但作为简要预览，以下是将之前使用的 `tester/nested` 函数重构为类的形式——状态在创建对象时被显式记录。要理解这段代码，你需要知道类中的\
    \ `def` 与类外的 `def` 工作方式完全相同，只是函数的 `self` 参数会自动接收调用的隐式主体（即调用类本身创建的实例对象）：\n\n```python\n\
    >>> class tester:              # Class-based alternative\n...     def __init__(self,\
    \ start):  # On object construction,\n...         self.state = start      # save\
    \ state explicitly in new object\n...     def nested(self, label):\n...      \
    \   print(label, self.state) # Reference state explicitly\n...         self.state\
    \ += 1          # Changes are always allowed\n...\n>>> F = tester(0)         \
    \     # Create instance, invoke __init__\n>>> F.nested('spam')           # F is\
    \ passed to self\nspam 0\n>>> F.nested('ham')\nham 1\n\n>>> G = tester(42)   \
    \          # Each instance gets new copy of state\n>>> G.nested('toast')     \
    \     # Changing one does not impact others\ntoast 42\n>>> G.nested('bacon')\n\
    bacon 43\n\n>>> F.nested('eggs')\neggs 2\n>>> F.state\n3\n```\n\n只需稍加一点魔法（我们将在本书后面深入探讨），我们还可以通过运算符重载使我们的类看起来像一个可调用的函数。`__call__`\
    \ 会拦截对实例的直接调用，因此我们不需要调用命名方法：\n\n```python\n>>> class tester:\n...     def __init__(self,\
    \ start):\n...         self.state = start\n...     def __call__(self, label):\n\
    ...         print(label, self.state)\n...         self.state += 1\n...\n>>> H\
    \ = tester(99)\n>>> H('juice')\njuice 99\n>>> H('pancakes')\npancakes 100\n```\n\
    \n虽然使用类来处理状态信息通常是一个好的经验法则，但在像这样的情况下（状态只是一个简单的计数器）可能有些大材小用。这种简单的状态情况比你想象的更常见；在这种情况下，嵌套的\
    \ `def` 有时比编写类更轻量级，特别是如果你还不熟悉面向对象编程（OOP）的话。此外，在某些场景中，嵌套的 `def` 实际上可能比类工作得更好。\n\
    \n### 使用函数属性实现状态\n\n作为最后一种状态保留选项，我们有时也可以通过函数属性（直接附加到函数上的用户定义名称）来实现与 `nonlocal`\
    \ 相同的效果。以下是基于此技术的示例最终版本——它用附加到嵌套函数上的属性替换了 `nonlocal`。虽然这个方案对某些人来说可能不那么直观，但它也允许在嵌套函数外部访问状态变量（使用\
    \ `nonlocal` 时，我们只能在嵌套的 `def` 内部看到状态变量）：\n\n```python\n>>> def tester(start):\n\
    ...     def nested(label):\n...         print(label, nested.state)\n...      \
    \   nested.state += 1\n...     nested.state = start          # Initial state after\
    \ func defined\n...     return nested\n...\n>>> F = tester(0)\n>>> F('spam') \
    \                        # F is a 'nested' with state attached\nspam 0\n>>> F('ham')\n\
    ham 1\n>>> F.state                           # Can access state outside functions\
    \ too\n2\n>>>\n>>> G = tester(42)                     # G has own state, doesn't\
    \ overwrite F's\n>>> G('eggs')\neggs 42\n>>> F('ham')\nham 2\n```\n\n这段代码依赖于函数名\
    \ `nested` 是 `tester` 作用域（`nested` 的外部作用域）中的一个**局部变量**这一事实；因此，它可以在 `nested` 内部自由引用。这段代码还依赖于就地修改对象不是对名称的赋值这一事实；当它递增\
    \ `nested.state` 时，它修改的是 `nested` 引用的对象的一部分，而不是名称 `nested` 本身。因为我们实际上没有在外部作用域中赋值给一个名称，所以不需要\
    \ `nonlocal`。\n\n如你所见，`globals`、`nonlocals`、类和函数属性都提供了状态保留选项。`globals` 只支持共享数据，类需要基本的\
    \ OOP 知识，而类和函数属性都允许在嵌套函数外部访问状态。通常，最适合你程序的工具取决于你程序的目标。\n\n> **关键词**\n\n**局部变量**\
    \ 是被赋予局部作用域的变量。在声明它的函数或块中的局部变量引用会覆盖更大作用域中的同名变量。\n\n## 榜样\n\n## 布拉姆·科恩：美国计算机程序员\n\
    \n布拉姆·科恩是一位美国计算机程序员，最著名的是他在 2001 年创建了点对点（P2P）BitTorrent 协议，以及第一个使用该协议的文件共享程序，也称为\
    \ BitTorrent。他还是 CodeCon 的联合创始人和旧金山湾区 P2P-hackers 会议的组织者，是 Codeville 的合著者，并创建了实现空间-时间证明共识算法的\
    \ Chia 加密货币。\n\n### 早年生活与职业生涯\n\n科恩在纽约市曼哈顿上西区长大，父亲是教师，母亲是计算机科学家。他声称自己 5 岁时就在家里的\
    \ Timex Sinclair 计算机上学会了 BASIC 编程语言。科恩在纽约市的史岱文森高中就读期间，通过了美国数学邀请赛，获得了参加美国数学奥林匹克竞赛的资格。他于\
    \ 1993 年从史岱文森高中毕业，并就读于纽约州立大学布法罗分校。后来他从大学辍学，在 1990 年代中后期为几家互联网公司工作，最后一家是 MojoNation，这是一个雄心勃勃但命运多舛的项目，他与吉姆·麦考伊合作开发。\n\
    \nMojoNation 允许人们将机密文件分割成加密块，并将这些片段分发到同样运行该软件的计算机上。如果有人想下载这个加密文件的副本，他们必须同时从许多计算机上下载。科恩认为，这个概念非常适合文件共享程序，因为像\
    \ KaZaA 这样的程序下载大文件需要很长时间，因为文件（通常）来自一个来源（或“对等点”）。科恩设计的 BitTorrent 能够从多个来源下载文件，从而加快下载时间，特别是对于下载速度比上传速度快的用户。因此，一个文件越受欢迎，用户下载它的速度就越快，因为许多人会同时下载它，而这些人也会将数据上传给其他用户。"
