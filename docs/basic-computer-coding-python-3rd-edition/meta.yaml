    You can use this to choose a thread to do special housekeeping. Take an example:


    ```

    >>> i=barrier.wait()

    >>> if i==0:

    #Only one thread must print this

    print(“passed the barrier”)

    ```


    If we provided an action to the constructor, one thread calls it before releasing.
    If this raises an error, the barrier sinks into a ‘broken’ state. The same happens
    if the call times out.


    Finally, wait() may raise a BrokenBarrierError if the barrier breaks or resets
    as a thread waits.


    b. reset()


    This function resets the barrier to its default, empty state. Any waiting threads
    receive a BrokenBarrierError.


    reset() may need external synchronization if other threads with unknown states
    exist. If it breaks a barrier, just create a new one.


    c. abort()


    abort() puts a barrier into a ‘broken’ state. Consequently, active/future calls
    to wait() fail with a BrokenBarrierError. To avoid deadlocking an application,
    we may need to abort it. This is one use-case.


    Try to create the barrier with a sensible value for *timeout* so it automatically
    guards against a thread going haywire.


    d. parties


    This returns the number of threads we need to pass the barrier.


    ![](img/dd5296ef0d2e667ac2671bdbd5535cd0_227_0.png)'
