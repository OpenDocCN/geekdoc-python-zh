    \ specified, it uses 0. And if it does not support changing thread stack size,\
    \ it raises a RuntimeError."
  mdcn: "## 7.1.1 Python 多线程入门\n\n`threading` 模块建立在 `thread` 模块的底层功能之上，使得使用线程变得更加简单和\
    \ Python 化。使用线程允许程序在同一个进程空间中并发运行多个操作。在计算机科学中，线程被定义为操作系统调度执行的最小工作单元。关于线程，有以下几点需要考虑：\n\
    \n-   线程存在于进程内部。\n-   单个进程中可以存在多个线程。\n-   同一进程中的线程共享父进程的状态和内存。\n\n以上只是对线程的简要概述。本文将主要关注\
    \ Python 中的 `threading` 模块。\n\n运行多个线程类似于并发运行多个不同的程序，但具有以下优势：\n\n-   进程内的多个线程与主线程共享相同的数据空间，因此可以比独立进程更容易地共享信息或相互通信。\n\
    -   线程有时被称为轻量级进程，它们不需要太多的内存开销；它们比进程更“廉价”。\n\n一个线程有开始、执行序列和结束。它有一个指令指针，用于跟踪在其上下文中当前运行的位置。\n\
    \n-   它可以被抢占（中断）\n-   它可以在其他线程运行时被暂时挂起（也称为休眠）——这被称为让出。\n\n> 你知道吗？\n> Python 2.0\
    \ 于 2000 年 10 月 16 日发布，带来了许多重要的新特性，包括循环检测垃圾回收器和对 Unicode 的支持。随着这次发布，开发过程变得更加透明和社区驱动。\n\
    \n让我们从创建一个名为 `download.py` 的 Python 模块开始。这个文件将包含获取图片列表和下载图片所需的所有函数。我们将这些功能拆分为三个独立的函数：\n\
    \n-   `get_links`\n-   `download_link`\n-   `setup_download_dir`\n\n第三个函数 `setup_download_dir`\
    \ 将用于在下载目标目录不存在时创建它。\n\nImgur 的 API 要求 **HTTP**（超文本传输协议）请求在 Authorization 头中携带客户端\
    \ ID。你可以在 Imgur 上注册的应用程序的仪表板中找到这个客户端 ID，响应将是 JSON 编码的。我们可以使用 Python 的标准 JSON 库来解码它。下载图片是一个更简单的任务，你只需通过其\
    \ URL 获取图片并将其写入文件即可。\n\n## 7.1.2 用于线程实现的 Python 多线程模块\n\nPython 提供了两个模块来在程序中实现线程。\n\
    \n-   `<thread>` 模块和\n-   `<threading>` 模块。\n\n供你参考，`<thread>` 模块在 Python 3 中已弃用，并重命名为\
    \ `<_thread>` 模块以保持向后兼容性。但我们将解释这两种方法，因为许多用户仍在使用旧版 Python 版本。\n\n这两个模块的关键区别在于，`<thread>`\
    \ 模块将线程实现为一个函数。另一方面，`<threading>` 模块提供了一种面向对象的方法来启用线程创建。\n\n> IronPython，一个使用\
    \ .NET 框架的 Python 实现，没有 GIL，基于 Java 的实现 Jython 也没有。你可以找到一份可用的 Python 实现列表。\n\n\
    ## 7.1.3 多进程与多线程的区别\n\n多进程和多线程都能为系统增加性能。多进程是向系统添加更多的 CPU/处理器，从而提高系统的计算速度。多线程是允许一个进程创建更多的线程，从而提高系统的响应能力。\n\
    \n### 对比图表\n\n| 比较基础 | 多进程 | 多线程 |\n| :--- | :--- | :--- |\n| 基本原理 | 多进程添加 CPU\
    \ 以增加计算能力。 | 多线程为单个进程创建多个线程以增加计算能力。 |\n| 执行方式 | 多个进程并发执行。 | 单个进程的多个线程并发执行。 |\n\
    | 创建开销 | 创建进程耗时且资源密集。 | 创建线程在时间和资源上都很经济。 |\n| 分类 | 多进程可以是对称的或非对称的。 | 多线程没有进一步分类。\
    \ |\n\n### 多进程与多线程的关键区别\n\n-   多进程和多线程的关键区别在于，多进程允许系统添加两个以上的 CPU，而多线程让一个进程生成多个线程以提高系统的计算速度。\n\
    -   多进程系统同时执行**多个进程**，而多线程系统同时执行一个进程的多个线程。\n-   创建进程可能消耗时间甚至耗尽系统资源。然而，创建线程是经济的，因为属于同一进程的线程共享该进程的资源。\n\
    -   多进程可以分为对称多处理和非对称多处理，而多线程没有进一步分类。\n\n在多进程环境中，多线程的好处可以逐步增加，因为在多处理系统上进行多线程处理可以增加并行性。\n\
    \n## 7.2 PYTHON 多线程中的函数\n\nPython 的 `threading` 模块帮助我们实现基于线程的并行性。它在底层的 `_thread`\
    \ 模块之上构建了更高级的线程接口。如果缺少 `_thread`，我们就无法使用 `threading`。对于这种情况，我们有 `dummy_threading`。\n\
    \nPython 多线程模块中有以下函数：\n\na. `active_count()`\n    这返回当前存活的 `Thread` 对象的数量。这等于\
    \ `enumerate()` 返回的列表的长度。\n\n```python\n>>> threading.active_count()\n2\n```\n\
    \nb. `current_thread()`\n    根据调用者的线程控制，这返回当前的 `Thread` 对象。如果这个线程控制不是通过 `threading`\
    \ 进行的，它将返回一个功能有限的虚拟线程对象。\n\n```python\n>>> threading.current_thread()\n<_MainThread(MainThread,\
    \ started 14352)>\n```\n\nc. `get_ident()`\n    `get_ident()` 返回当前线程的标识符，这是一个非零整数。我们可以用它来索引一个线程特定数据的字典。除此之外，它没有特殊含义。当一个线程退出而另一个线程创建时，Python\
    \ 会回收这样的标识符。\n\n```python\n>>> threading.get_ident()\n14352\n```\n\nd. `enumerate()`\n\
    \    这返回一个所有当前存活的 `Thread` 对象的列表。这包括主线程、守护线程和由 `current_thread()` 创建的虚拟线程对象。这显然不包括已终止的线程以及尚未开始的线程。\n\
    \n```python\n>>> threading.enumerate()\n[<_MainThread(MainThread, started 14352)>,\
    \ <Thread(SockThread, started daemon 9864)>\n```\n\ne. `main_thread()`\n    此方法返回主\
    \ `Thread` 对象。通常，它是启动解释器的那个线程。\n\n```python\n>>> threading.main_thread()\n<_MainThread(MainThread,\
    \ started 14352)>\n```\n\nf. `settrace(func)`\n    `settrace()` 为我们使用 `threading`\
    \ 启动的所有线程跟踪一个函数。参数 `func` 在每个线程调用其 `run()` 方法之前传递给 `sys.settrace()`。\n\n```python\n\
    >>> def sayhi():\n    print(\"Hi\")\n>>> threading.settrace(sayhi)\n>>>\n```\n\
    \ng. `setprofile(func)`\n    此方法为我们从 `threading` 启动的所有线程设置一个性能分析函数。它在每个线程调用其 `run()`\
    \ 方法之前将 `func` 传递给 `sys.setprofile()`。\n\n```python\n>>> threading.setprofile(sayhi)\n\
    >>>\n```\n\nh. `stack_size([size])`\n    `stack_size()` 返回创建新线程时线程的堆栈大小。`size`\
    \ 是我们希望为后续创建的线程使用的堆栈大小。它必须等于 0 或至少为 32,768 (32KiB) 的正整数。未指定时，使用 0。如果它不支持更改线程堆栈大小，它将引发\
    \ `RuntimeError`。"
