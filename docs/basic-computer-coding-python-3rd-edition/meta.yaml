    \ server is to establish a connection. To do this, you need `connect()` from the\
    \ `mysql.connector` module. This function takes in parameters like `host`, `user`,\
    \ and `password` and returns a `MySQLConnection` object. You can receive these\
    \ credentials as input from the user and pass them to `connect()`:\n\n```python\n\
    from getpass import getpass\nfrom mysql.connector import connect, Error\n\ntry:\n\
    \    with connect(\n        host=\"localhost\",\n        user=input(\"Enter username:\
    \ \"),\n        password=getpass(\"Enter password: \"),\n    ) as connection:\n\
    \        print(connection)\nexcept Error as e:\n    print(e)\n```\n\nThe code\
    \ above uses the entered login credentials to establish a connection with your\
    \ MySQL server. In return, you get a `MySQLConnection` object, which is stored\
    \ in the `connection` variable. From now on, you'll use this variable to access\
    \ your MySQL server.\n\nThere are several important things to notice in the code\
    \ above:\n\n- You should always deal with the exceptions that might be raised\
    \ while establishing a connection to the MySQL server. This is why you use a `try\
    \ ... except` block to catch and print any exceptions that you might encounter.\n\
    - You should always close the connection after you’re done accessing the database.\
    \ Leaving unused open connections can lead to several unexpected errors and performance\
    \ issues. The above code takes advantage of a context manager using `with`, which\
    \ abstracts away the connection cleanup process.\n- You should *never hard-code\
    \ your login credentials*, that is, your username and password, directly in a\
    \ Python script. This is a bad practice for deployment and poses a serious security\
    \ threat. The code above prompts the user for login credentials. It uses the built-in\
    \ `getpass` module to hide the password. While this is better than hard-coding,\
    \ there are other, more secure ways to store sensitive information, like using\
    \ environment variables.\n\nYou’ve now established a connection between your program\
    \ and your MySQL server, but you still need to either create a new database or\
    \ connect to an existing database inside the server.\n\n## Creating a New Database\n\
    \nHere you established a connection with your MySQL server. To create a new database,\
    \ you need to execute a SQL statement:\n\n```sql\nCREATE DATABASE books_db;\n\
    ```\n\nThe above statement will create a new database with the name `books_db`.\
    \ In MySQL, it’s mandatory to put a semicolon (`;`) at the end of a statement,\
    \ which denotes the termination of a query. However, MySQL Connector/Python automatically\
    \ appends a semicolon at the end of your queries, so there’s no need to use it\
    \ in your Python code.\n\nTo execute a SQL query in Python, you’ll need to use\
    \ a cursor, which abstracts away the access to database records. MySQL Connector/Python\
    \ provides you with the `MySQLCursor` class, which instantiates objects that can\
    \ execute MySQL queries in Python. An instance of the `MySQLCursor` class is also\
    \ called a cursor. Cursor objects make use of a `MySQLConnection` object to interact\
    \ with your MySQL server. To create a cursor, use the `.cursor()` method of your\
    \ connection variable:\n\n```python\ncursor = connection.cursor()\n```\n\nThe\
    \ above code gives you an instance of the `MySQLCursor` class.\n\nA query that\
    \ needs to be executed is sent to `cursor.execute()` in string format. In this\
    \ particular occasion, you'll send the `CREATE DATABASE` query to `cursor.execute()`:\n\
    \n```python\nfrom getpass import getpass\nfrom mysql.connector import connect,\
    \ Error\n\ntry:\n    with connect(\n        host=\"localhost\",\n        user=input(\"\
    Enter username: \"),\n        password=getpass(\"Enter password: \"),\n    ) as\
    \ connection:\n        create_db_query = \"CREATE DATABASE online_movie_rating\"\
    \n        with connection.cursor() as cursor:\n            cursor.execute(create_db_query)\n\
    except Error as e:\n    print(e)\n```\n\nAfter executing the code above, you'll\
    \ have a new database called `online_movie_rating` in your MySQL server.\n\nThe\
    \ `CREATE DATABASE` query is stored as a string in the `create_db_query` variable\
    \ and then passed to `cursor.execute()` for execution. The code uses a context\
    \ manager with the **cursor object** to handle the cleanup process.\n\nYou might\
    \ receive an error here if a database with the same name already exists in your\
    \ server. To confirm this, you can display the name of all databases in your server.\
    \ Using the same `MySQLConnection` object from earlier, execute the `SHOW DATABASES`\
    \ statement:\n\n```python\n>>> show_db_query = \"SHOW DATABASES\"\n>>> with connection.cursor()\
    \ as cursor:\n...     cursor.execute(show_db_query)\n...     for db in cursor:\n\
    ...         print(db)\n...\n('information_schema',)\n('mysql',)\n('online_movie_rating',)\n\
    ('performance_schema',)\n('sys',)\n```\n\nThe above code prints the names of all\
    \ the databases currently in your MySQL server. The `SHOW DATABASES` command also\
    \ outputs some databases that you didn't create in your server, like `information_schema`,\
    \ `performance_schema`, and so on. These databases are generated automatically\
    \ by the MySQL server and provide access to a variety of database metadata and\
    \ MySQL server settings.\n\nYou created a new database in this section by executing\
    \ the `CREATE DATABASE` statement. In the next section, you'll see how to connect\
    \ to a database that already exists.\n\n## Connecting to an Existing Database\n\
    \nIn the last section, you created a new database called `online_movie_rating`.\
    \ However, you still haven't connected to it. In many situations, you'll already\
    \ have a MySQL database that you want to connect with your Python application.\n\
    \nYou can do this using the same `connect()` function that you used earlier by\
    \ sending an additional parameter called `database`:\n\n```python\nfrom getpass\
    \ import getpass\nfrom mysql.connector import connect, Error\n\ntry:\n    with\
    \ connect(\n        host=\"localhost\",\n        user=input(\"Enter username:\
    \ \"),\n        password=getpass(\"Enter password: \"),\n        database=\"online_movie_rating\"\
    ,\n    ) as connection:\n        print(connection)\nexcept Error as e:\n    print(e)\n\
    ```\n\nThe above code is very similar to the connection script that you used earlier.\
    \ The only change here is an additional `database` parameter, where the name of\
    \ your database is passed to `connect()`. Once you execute this script, you'll\
    \ be connected to the `online_movie_rating` database.\n\n## 9.3 CREATING, ALTERING,\
    \ AND DROPPING A TABLE\n\nIn this section, you'll learn how to perform some basic\
    \ DDL queries like `CREATE`, `DROP`, and `ALTER` with Python. You'll get a quick\
    \ look at the MySQL database. You'll also create all the tables required for the\
    \ database and learn how to perform modifications on these tables later on.\n\n\
    ### 9.3.1 Defining the Database Schema\n\nYou can start by creating a database\
    \ schema for an online movie rating system. The database will consist of three\
    \ tables:\n\n- **movies** contains general information about movies and has the\
    \ following attributes:\n  - `id`\n  - `title`\n  - `release_year`\n  - `genre`\n\
    \  - `collection_in_mil`\n- **reviewers** contains information about people who\
    \ posted reviews or ratings and has the following attributes:\n  - `id`\n  - `first_name`\n\
    \  - `last_name`\n- **ratings** contains information about ratings that have been\
    \ posted and has the following attributes:\n  - `movie_id` (foreign key)\n  -\
    \ `reviewer_id` (foreign key)\n  - `rating`\n\nA real-world movie rating system,\
    \ like IMDb, would need to store a bunch of other attributes, like emails, movie\
    \ cast lists, and so on. If you want, you can add more tables and attributes to\
    \ this database.\n\nThe image below depicts the database schema:\n\n**Figure 1.**\
    \ Schema Diagram for an Online Movie Rating System.\n\nThe tables in this database\
    \ are related to each other, `movies` and `reviewers` will have a many-to-many\
    \ relationship since one movie can be reviewed by multiple reviewers and one reviewer\
    \ can review multiple movies. The `ratings` table connects the `movies` table\
    \ with the `reviewers` table.\n\n### 9.3.2 Creating Tables Using the CREATE TABLE\
    \ Statement\n\nNow, to create a new table in MySQL, you need to use the `CREATE\
    \ TABLE` statement. The following MySQL query will create the `movies` table for\
    \ your `online_movie_rating` database:\n\n```sql\nCREATE TABLE movies(\n    id\
    \ INT AUTO_INCREMENT PRIMARY KEY,\n    title VARCHAR(100),\n```"
