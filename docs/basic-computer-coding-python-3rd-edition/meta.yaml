    \ or nonlocal:** By default, all the names assigned inside a function definition\
    \ are put in the local scope (the namespace associated with the function call).\
    \ If you need to assign a name that lives at the top level of the module enclosing\
    \ the function, you can do so by declaring it in a global statement inside the\
    \ function. If you need to assign a name that lives in an enclosing def, as of\
    \ Python 3.0 you can do so by declaring it in a nonlocal statement.\n- **All other\
    \ names are enclosing function locals, globals, or built-ins:** Names not assigned\
    \ a value in the function definition are assumed to be enclosing scope locals\
    \ (in an enclosing def), globals (in the enclosing module's namespace), or builtins\
    \ (in the predefined __builtin__ module Python provides).\n\nThere are a few subtleties\
    \ to note here. First, keep in mind that code typed at the interactive command\
    \ prompt follows these same rules. You may not know it yet, but code run interactively\
    \ is really entered into a built-in module called __main__; this module works\
    \ just like a module file, but results are echoed as you go. Because of this,\
    \ interactively created names live in a module, too, and thus follow the normal\
    \ scope rules: they are global to the interactive session.\n\nAlso note that any\
    \ type of assignment within a function classifies a name as local. This includes\
    \ = statements, module names in import, function names in def, function argument\
    \ names, and so on. If you assign a name in any way within a def, it will become\
    \ a local to that function.\n\nConversely, in-place changes to objects do not\
    \ classify names as locals; only actual name assignments do. For instance, if\
    \ the name L is assigned to a list at the top level of a module, a statement L\
    \ = X within a function will classify L as a local, but L.append(X) will not.\
    \ In the latter case, we are changing the list object that L references, not L\
    \ itself— L is found in the global scope as usual, and Python happily modifies\
    \ it without requiring a global (or nonlocal) declaration. As usual, it helps\
    \ to keep the distinction between names and objects clear: changing an object\
    \ is not an assignment to a name.\n\n## 10.1.2 Name Resolution: The LEGB Rule\n\
    \nWith a def statement:\n\n- Name references search at most four scopes: local,\
    \ then enclosing functions (if any), then global, then built-in.\n- Name assignments\
    \ create or change local names by default.\n- global and nonlocal declarations\
    \ map assigned names to enclosing module and function scopes.\n\nIn other words,\
    \ all names assigned inside a function def statement (or a lambda, an expression\
    \ we’ll meet later) are locals by default. Functions can freely use names assigned\
    \ in syntactically enclosing functions and the global scope, but they must declare\
    \ such nonlocals and globals in order to change them.\n\n> Note that you shouldn’t\
    \ modify the content of locals() because changes may have no effect on the values\
    \ of local and free names.\n\nPython’s name-resolution scheme is sometimes called\
    \ the LEGB rule, after the scope names:\n\n- When you use an unqualified name\
    \ inside a function, Python searches up to four scopes—the local (L) scope, then\
    \ the local scopes of any enclosing (E) defs and lambdas, then the global (G)\
    \ scope, and then the built-in (B) scope—and stops at the first place the name\
    \ is found. If the name is not found during this search, Python reports an error.\n\
    - When you assign a name in a function (instead of just referring to it in an\
    \ expression), Python always creates or changes the name in the local scope, unless\
    \ it’s declared to be global or nonlocal in that function.\n- When you assign\
    \ a name outside any function (i.e., at the top level of a module file, or at\
    \ the interactive prompt), the local scope is the same as the global scope—the\
    \ module’s namespace.\n\nFigure 1 illustrates Python’s four scopes. Note that\
    \ the second scope lookup layer, E—the scopes of enclosing defs or lambdas—can\
    \ technically correspond to more than one lookup layer. This case only comes into\
    \ play when you nest functions within functions, and it is addressed by the nonlocal\
    \ statement. Also keep in mind that these rules apply only to simple variable\
    \ names (e.g., spam). We'll see that qualified attribute names (e.g., object.spam)\
    \ live in particular objects and follow a completely different set of **lookup\
    \ rules** than those covered here.\n\n![](img/dd5296ef0d2e667ac2671bdbd5535cd0_341_0.png)\n\
    \n**Figure 1.** The LEGB scope lookup rule.\n\n## 10.1.3 Scope Example\n\nLet's\
    \ look at a larger example that demonstrates scope ideas. Suppose we wrote the\
    \ following code in a module file:\n\n```python\n# Global scope\nX = 99      \
    \        # X and func assigned in module: global\n\ndef func(Y):        # Y and\
    \ Z assigned in function: locals\n    # Local scope\n    Z = X + Y       # X is\
    \ a global\n    return Z\n\nfunc(1)             # func in module: result=100\n\
    ```\n\nThis module and the function it contains use a number of names to do their\
    \ business. Using Python's scope rules, we can classify the names as follows:\n\
    \n*Global names: X, func*\n\nX is global because it's assigned at the top level\
    \ of the module file; it can be referenced inside the function without being declared\
    \ global. func is global for the same reason; the def statement assigns a function\
    \ object to the name func at the top level of the module."
  mdcn: "源代码，而与哪个函数调用哪个函数无关。实际上，变量可能在三个不同的位置被赋值，对应三种不同的作用域：\n\n- 如果变量在 `def` 内部被赋值，它对该函数是局部的。\n\
    - 如果变量在外部的 `def` 中被赋值，它对嵌套函数来说是非局部的。\n- 如果变量在所有 `def` 外部被赋值，它对整个文件是全局的。\n\n我们称之为词法作用域，因为变量的作用域完全由变量在程序源代码中的位置决定，而不是由函数调用决定。\n\
    \n在下面的模块文件中，`X = 99` 赋值创建了一个名为 `X` 的全局变量（在此文件中任何地方都可见），但 `X = 88` 赋值创建了一个局部变量\
    \ `X`（仅在 `def` 语句内可见）：\n\n![](img/dd5296ef0d2e667ac2671bdbd5535cd0_338_0.png)\n\
    \n```\nX = 99\n\ndef func():\n    X = 88\n```\n\n尽管两个变量都名为 `X`，但它们的作用域使它们不同。最终效果是，函数作用域有助于避免程序中的名称冲突，并使函数成为更独立的程序单元。\n\
    \n## 10.1.1 作用域规则\n\n在我们开始编写函数之前，我们编写的所有代码都位于模块的顶层（即，没有嵌套在 `def` 中），因此我们使用的名称要么存在于模块本身，要么是\
    \ Python 预定义的内置名称（例如 `open`）。函数提供了嵌套的命名空间（作用域），将它们使用的名称局部化，使得函数内部的名称不会与外部（在模块或另一个函数中）的名称冲突。同样，函数定义了一个局部作用域，模块定义了一个全局作用域。这两个作用域的关系如下：\n\
    \n- *外层模块是一个全局作用域*：每个模块都是一个全局作用域——即一个命名空间，其中在模块文件顶层创建（赋值）的变量存在。全局变量在外部世界成为模块对象的属性，但可以在模块文件内作为简单变量使用。\n\
    - **全局作用域仅跨越单个文件：** 不要被这里的“全局”一词迷惑——文件顶层的名称仅对该文件内的代码是全局的。在 Python 中，实际上并不存在单一的、包罗万象的基于文件的全局作用域概念。相反，名称被划分到模块中，如果你想使用其文件定义的名称，必须始终显式导入模块。当你在\
    \ Python 中听到“全局”时，请想到“模块”。\n- **每次调用函数都会创建一个新的局部作用域：** 每次调用函数时，你都会创建一个新的局部作用域——即一个命名空间，其中在该函数内部创建的名称通常存在。你可以将每个\
    \ `def` 语句（和 `lambda` 表达式）视为定义一个新的局部作用域，但由于 Python 允许函数调用自身进行循环（一种称为递归的高级技术），局部作用域实际上技术上对应于一次函数调用——换句话说，每次调用都会创建一个新的局部命名空间。当处理形状无法提前预测的结构时，递归很有用。\n\
    - **赋值的名称是局部的，除非声明为 global 或 nonlocal：** 默认情况下，在函数定义内赋值的所有名称都放在局部作用域（与函数调用关联的命名空间）中。如果你需要赋值一个存在于外层函数模块顶层的名称，可以通过在函数内部的\
    \ `global` 语句中声明它来实现。如果你需要赋值一个存在于外层 `def` 中的名称，从 Python 3.0 开始，可以通过在 `nonlocal`\
    \ 语句中声明它来实现。\n- **所有其他名称是外层函数的局部变量、全局变量或内置变量：** 在函数定义中未赋值的名称被假定为外层作用域的局部变量（在外层\
    \ `def` 中）、全局变量（在外层模块的命名空间中）或内置变量（在 Python 提供的预定义 `__builtin__` 模块中）。\n\n这里有一些微妙之处需要注意。首先，请记住，在交互式命令提示符下输入的代码遵循相同的规则。你可能还不知道，但交互式运行的代码实际上是输入到一个名为\
    \ `__main__` 的内置模块中；这个模块的工作方式与模块文件相同，但结果会即时回显。因此，交互式创建的名称也存在于一个模块中，因此遵循正常的作用域规则：它们对交互式会话是全局的。\n\
    \n还要注意，在函数内的任何类型的赋值都会将一个名称归类为局部变量。这包括 `=` 语句、`import` 中的模块名称、`def` 中的函数名称、函数参数名称等等。如果你在\
    \ `def` 内以任何方式赋值一个名称，它将成为该函数的局部变量。\n\n相反，对对象的就地更改不会将名称归类为局部变量；只有实际的名称赋值才会。例如，如果名称\
    \ `L` 在模块顶层被赋值给一个列表，函数内的语句 `L = X` 会将 `L` 归类为局部变量，但 `L.append(X)` 不会。在后一种情况下，我们更改的是\
    \ `L` 引用的列表对象，而不是 `L` 本身——`L` 像往常一样在全局作用域中被找到，Python 会愉快地修改它，而不需要 `global`（或 `nonlocal`）声明。像往常一样，保持名称和对象之间的区别清晰会有所帮助：更改对象不是对名称的赋值。\n\
    \n## 10.1.2 名称解析：LEGB 规则\n\n使用 `def` 语句时：\n\n- 名称引用最多搜索四个作用域：局部，然后是外层函数（如果有），然后是全局，最后是内置。\n\
    - 名称赋值默认创建或更改局部名称。\n- `global` 和 `nonlocal` 声明将赋值的名称映射到外层模块和函数作用域。\n\n换句话说，在函数\
    \ `def` 语句（或我们稍后会遇到的 `lambda` 表达式）内赋值的所有名称默认都是局部变量。函数可以自由使用在语法上外层的函数和全局作用域中赋值的名称，但必须声明这些非局部和全局变量才能更改它们。\n\
    \n> 请注意，你不应该修改 `locals()` 的内容，因为更改可能对局部和自由变量的值没有影响。\n\nPython 的名称解析方案有时被称为 LEGB\
    \ 规则，以作用域名称命名：\n\n- 当你在函数内使用一个非限定名称时，Python 最多搜索四个作用域——局部（L）作用域，然后是任何外层（E）`def`\
    \ 和 `lambda` 的局部作用域，然后是全局（G）作用域，最后是内置（B）作用域——并在找到名称的第一个位置停止。如果在此搜索期间未找到名称，Python\
    \ 会报告错误。\n- 当你在函数中赋值一个名称（而不仅仅是在表达式中引用它）时，Python 总是在局部作用域中创建或更改该名称，除非它在该函数中被声明为\
    \ `global` 或 `nonlocal`。\n- 当你在任何函数外部赋值一个名称（即，在模块文件的顶层，或在交互式提示符下）时，局部作用域与全局作用域相同——即模块的命名空间。\n\
    \n图 1 说明了 Python 的四个作用域。请注意，第二个作用域查找层，E——外层 `def` 或 `lambda` 的作用域——技术上可以对应多个查找层。这种情况仅在你将函数嵌套在函数内部时才会出现，并且通过\
    \ `nonlocal` 语句来解决。还要记住，这些规则仅适用于简单的变量名称（例如 `spam`）。我们将看到，限定的属性名称（例如 `object.spam`）存在于特定对象中，并遵循与这里介绍的完全不同的**查找规则**。\n\
    \n![](img/dd5296ef0d2e667ac2671bdbd5535cd0_341_0.png)\n\n**图 1.** LEGB 作用域查找规则。\n\
    \n## 10.1.3 作用域示例\n\n让我们看一个更大的例子来演示作用域概念。假设我们在一个模块文件中编写了以下代码：\n\n```python\n#\
    \ Global scope\nX = 99              # X and func assigned in module: global\n\n\
    def func(Y):        # Y and Z assigned in function: locals\n    # Local scope\n\
    \    Z = X + Y       # X is a global\n    return Z\n\nfunc(1)             # func\
    \ in module: result=100\n```\n\n这个模块及其包含的函数使用了许多名称来完成它们的工作。使用 Python 的作用域规则，我们可以将这些名称分类如下：\n\
    \n*全局名称：X, func*\n\n`X` 是全局的，因为它在模块文件的顶层被赋值；它可以在函数内部被引用而无需声明为 `global`。`func`\
    \ 是全局的，原因相同；`def` 语句在模块的顶层将一个函数对象赋值给名称 `func`。"
