    \    print(var)\n    local(); glob1(); glob2(); glob3()\n    print(var)\n```\n\
    \n运行时，这会将全局变量增加 3（只有第一个函数不影响它）：\n\n```python\n>>> import thismod\n>>> thismod.test()\n\
