    \ Precedence\n- Summary\n- Knowledge Check\n- Review Questions\n- References\n\
    \n## Chapter 2 Python Functions, Modules and Packages\n\n- Introduction\n- 2.1\
    \ Function in Python\n  - 2.1.1 Syntax of Function\n  - 2.1.2 Docstring\n  - 2.1.3\
    \ The Return Statement\n  - 2.1.4 How Function works in Python?\n  - 2.1.5 Python\
    \ Function Arguments\n  - 2.1.6 The Anonymous Functions\n  - 2.1.7 The Return\
    \ Statement\n- 2.2 Python Modules\n  - 2.2.1 More on Modules\n  - 2.2.2 Standard\
    \ Modules\n- 2.3 Python Packages\n  - 2.3.1 Importing* From a Package\n  - 2.3.2\
    \ Intra-package References\n  - 2.3.3 Packages in Multiple Directories\n- Summary\n\
    - Knowledge Check\n- Review Questions\n- References\n\n## Chapter 3 Dictionaries,\
    \ Sets, and Files\n\n- Introduction\n- 3.1 Python Dictionaries\n  - 3.1.1 Accessing\
    \ Dictionary Elements\n  - 3.1.2 Modifying Dictionaries\n  - 3.1.3 The dict()\
