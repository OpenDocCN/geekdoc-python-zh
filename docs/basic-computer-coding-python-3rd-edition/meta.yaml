    \ Implementation and Management, Thomson Learning-Course Technology, Seventh Edition,\
    \ 2007.\n10. Shio Kumar Singh, Database Systems Concepts, Designs and Application,\
    \ Pearson Education, Second Edition, 2011.\n\n# CHAPTER 10\n## SCOPES\n\n## INTRODUCTION\n\
    \nPython’s basic function model is simple to use, but even simple function examples\
    \ quickly led us to questions about the meaning of variables in our code. This\
    \ chapter moves on to present the details behind Python’s scopes—the places where\
    \ variables are defined and looked up. As we’ll see, the place where a name is\
    \ assigned in our code is crucial to determining what the name means. We’ll also\
    \ find that scope usage can have a major impact on program maintenance effort;\
    \ overuse of globals, for example, is a generally bad thing.\n\nAfter studying\
    \ this chapter, you will be able to:\n1. Understand python scope basics\n2. Describe\
    \ the global statement\n3. Define scopes and nested functions\n4. Explain the\
    \ nonlocal statement\n\nThe scope of a variable or name defines its visibility\
    \ throughout your code. In Python, scope is implemented as either a Local, Enclosing,\
    \ Global, or Built-in scope. When you use a variable or name, Python searches\
    \ these scopes sequentially to resolve it. If the name isn’t found, then you’ll\
    \ get an error. This is the general mechanism that Python uses for name resolution\
    \ and is known as the LEGB rule.\n\n### 10.1 PYTHON SCOPE BASICS\n\nNow that you’re\
    \ ready to start writing your own functions, we need to get more formal about\
    \ what names mean in Python. When you use a name in a program, Python creates,\
    \ changes, or looks up the name in what is known as a namespace—a place where\
    \ names live. When we talk about the search for a name’s value in relation to\
    \ code, the term scope refers to a namespace: that is, the location of a name’s\
    \ assignment in your code determines the scope of the name’s visibility to your\
    \ code.\n\n> Source code is the fundamental component of a computer program that\
    \ is created by a programmer, often written in the form of functions, descriptions,\
    \ definitions, calls, methods and other operational statements.\n\nJust about\
    \ everything related to names, including scope classification, happens at assignment\
    \ time in Python. As we’ve seen, names in Python spring into existence when they\
    \ are first assigned values, and they must be assigned before they are used. Because\
    \ names are not declared ahead of time, Python uses the location of the assignment\
    \ of a name to associate it with (i.e., bind it to) a particular namespace. In\
