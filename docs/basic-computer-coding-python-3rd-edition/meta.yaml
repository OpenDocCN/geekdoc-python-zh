    \ artima.com. Retrieved December 27, 2016.\n\n# CHAPTER 7\n\n## PYTHON MULTITHREADING\n\
    \n### INTRODUCTION\n\nMultithreading is a programming concept where multiple threads\
    \ run independently within a process, sharing the same resources but executing\
    \ different tasks concurrently. In Python, multithreading is a way to achieve\
    \ parallelism and improve the performance of certain types of applications. However,\
    \ it’s important to note that due to the Global Interpreter Lock (GIL) in CPython\
    \ (the default implementation of Python), true parallel execution of threads is\
    \ limited. This means that even though you might use threads, only one thread\
    \ can execute Python bytecode at a time in a single process. Python virtual machine\
    \ is not a thread-safe interpreter, meaning that the interpreter can execute only\
    \ one thread at any given moment. This limitation is enforced by the Python Global\
    \ Interpreter Lock (GIL), which essentially limits one Python thread to run at\
    \ a time. In other words, GIL ensures that only one thread runs within the same\
    \ process at the same time on a single processor.\n\nBasically, threading may\
    \ not speed up all tasks. The I/O-bound tasks that spend much of their time waiting\
    \ for external events have a better chance of taking advantage of threading than\
    \ CPU-bound tasks.\n\nPython comes with two built-in modules for implementing\
    \ multithreading programs, including the thread, and threading modules. The thread\
    \ and threading modules provide useful features for creating and managing threads.\
    \ However, in this tutorial, we'll focus on the threading module, which is a much-improved,\
    \ high-level module for implementing serious multithreading programs. Also, Python\
    \ provides the Queue module, allowing us to create a queue data structure to exchange\
    \ information across multiple threads safely.\n\nMultithreading allows the programmer\
    \ to divide application tasks into sub-tasks and simultaneously run them in a\
    \ program. It allows threads to communicate and share resources such as files,\
    \ data, and memory to the same processor. Furthermore, it increases the user's\
    \ responsiveness to continue running a program even if a part of the application\
    \ is the length or blocked.\n\n**Keyword**\n\n**Parallel programming** is the\
    \ process of splitting a problem into smaller tasks that can be executed at the\
    \ same time – in parallel – using multiple computing resources.\n\nAfter studying\
    \ this chapter, you will be able to:\n\n1. Discuss on python threading and python\
    \ multithreading\n2. Determine the useful functions in python multithreading\n\
    \n### 7.1 PYTHON THREADING – PYTHON MULTITHREADING\n\nPython threading module\
    \ is used to implement multithreading in python programs. Threading in python\
    \ is used to run multiple threads (tasks, function calls) at the same time. Note\
    \ that this does not mean that they are executed on different CPUs. Python threads\
    \ will not make your program faster if it already uses 100 % CPU time. In that\
    \ case, you probably want to look into parallel programming. If you are interested\
    \ in parallel programming with python. Python multiprocessing is one of the similar\
    \ module that we looked into sometime back."
