    ...     for movie in cursor.fetchall():

    ...         print(movie)

    ...

    (2, 7)

    (2, 8)

    (2, 12)

    (2, 23)

    ```


    The above code snippet outputs the reviewer_id and movie_id for records in the
    ratings table where reviewer_id = 2. Once you''ve confirmed that these are the
    records that you need to delete, you can run a DELETE query with the same filter:


    ```

    delete_query = "DELETE FROM ratings WHERE reviewer_id = 2"

    ```'
