    \nThere is a popular **time** module available in Python which provides functions\
    \ for working with times, and for converting between representations. The function\
    \ `time.time()` returns the current system time in ticks since 00:00:00 hrs January\
    \ 1, 1970(epoch).\n\n### Example\n\n```\n#!/usr/bin/python\n\nimport time; # This\
    \ is required to include time module.\n\nticks = time.time()\n\nprint \"Number\
    \ of ticks since 12:00am, January 1, 1970:\", ticks\n```\n\nThis would produce\
    \ a result something as follows –\nNumber of ticks since 12:00am, January 1, 1970:\
    \ 7186862.73399\nDate arithmetic is easy to do with ticks. However, dates before\
    \ the epoch cannot be represented in this form. Dates in the far future also cannot\
    \ be represented this way - the cutoff point is sometime in 2038 for UNIX and\
    \ Windows.\n\n### What is TimeTuple?\n\nMany of Python’s time functions handle\
