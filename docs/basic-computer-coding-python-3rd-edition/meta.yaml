    \ colon for the assignment\nprint(thisdict)\n```\n\nBuilt-in methods are pre-defined\
    \ methods that are included as part of a programming language.\n\n## 3.1.4 Dictionary\
    \ Methods\n\nPython has a set of built-in methods that you can use on dictionaries.\n\
    \n| Method | Description |\n|---|---|\n| clear() | Removes all the elements from\
    \ the dictionary |\n| copy() | Returns a copy of the dictionary |\n| fromkeys()\
    \ | Returns a dictionary with the specified keys and values |\n| get() | Returns\
    \ the value of the specified key |\n| items() | Returns a list containing a tuple\
    \ for each key value pair |\n| keys() | Returns a list containing the dictionary's\
    \ keys |\n| pop() | Removes the element with the specified key |\n| popitem()\
    \ | Removes the last inserted key-value pair |\n| setdefault() | Returns the value\
    \ of the specified key. If the key does not exist: insert the key, with the specified\
    \ value |\n| update() | Updates the dictionary with the specified key-value pairs\
    \ |\n| values() | Returns a list of all the values in the dictionary |\n\n## 3.1.5\
    \ Aliasing and Copying\n\nBecause dictionaries are mutable, you need to be aware\
    \ of aliasing. Whenever two variables refer to the same object, changes to one\
    \ affect the other.\n\n> **Remember**\n> Although we just used a dictionary to\
    \ link names to phone numbers in this extended example, we can use a dictionary\
    \ to link any one type of object to another type of object.\n\nIf you want to\
    \ modify a dictionary and keep a copy of the original, use the `copy` method.\
    \ For example, `opposites` is a dictionary that contains pairs of opposites:\n\
    \n```python\n>>> opposites = {'up': 'down', 'right': 'wrong', 'true': 'false'}\n\
    >>> an_alias = opposites\n>>> a_copy = opposites.copy()\n```\n\n`an_alias` and\
    \ `opposites` refer to the same object; `a_copy` refers to a fresh copy of the\
    \ same dictionary. If we modify `an_alias`, `opposites` is also changed:\n\n```python\n\
    >>> an_alias['right'] = 'left'\n>>> opposites['right']\n'left'\n```\n\nIf we modify\
    \ `a_copy`, `opposites` is unchanged:\n\n```python\n>>> a_copy['right'] = 'privilege'\n\
    >>> opposites['right']\n'left'\n```\n\n## 3.2 PYTHON SETS\n\nSets are a collection\
    \ of distinct (unique) objects. These are useful to create lists that only hold\
    \ unique values in the dataset. It is an unordered collection but a mutable one,\
    \ this is very helpful when going through a huge dataset.\n\n```python\nx_set\
    \ = set('CAKE&COKE')\ny_set = set('COOKIE')\nprint(x_set)\n{'A', '&', 'O', 'E',\
    \ 'C', 'K'}\nprint(y_set) # Single unique 'o'\n{'I', 'O', 'E', 'C', 'K'}\nprint(x_set\
