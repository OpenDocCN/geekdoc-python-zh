    \ SET last_name = \"A\"` 将 reviewers 表中所有记录的 last_name 更改为 \"A\"。如果您打印出 reviewers\
    \ 表，可以看到这个变化：\n\n```python\n>>> select_query = \"\"\"\n... SELECT first_name,\
    \ last_name\n... FROM reviewers\n... \"\"\"\n>>> with connection.cursor() as cursor:\n\
    ...     cursor.execute(select_query)\n...     for reviewer in cursor.fetchall():\n\
    ...         print(reviewer)\n...\n('Chaitanya', 'A')\n('Mary', 'A')\n('John',\
    \ 'A')\n('Thomas', 'A')\n('Penny', 'A')\n('Mitchell', 'A')\n('Wyatt', 'A')\n('Andre',\
    \ 'A')\n('Sheldon', 'A')\n('Kimbra', 'A')\n('Kat', 'A')\n('Bruce', 'A')\n('Domingo',\
    \ 'A')\n('Rajesh', 'A')\n('Ben', 'A')\n('Mahinder', 'A')\n('Akbar', 'A')\n('Howard',\
