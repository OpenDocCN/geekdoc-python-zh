    \ up.\n\nWe also have bounded semaphores:\n\n```python\nclass threading.BoundedSemaphore(value=1)\n\
    ```\n\nThis class implements bounded semaphore objects. Such objects ensure that\
    \ their current values do not exceed their initial values. If this happens, this\
    \ raises a `ValueError`. Mostly, semaphores guard resources with limited capacity,\
    \ for ex., a database server. Where the resource size is fixed, use a bounded\
    \ semaphore. But if it releases the semaphore way too many times, then you may\
    \ have a bug in your code. The default for this is 1.\n\nLet's take an example.\
    \ The main thread initializes the semaphore before spawning any worker threads:\n\
    \n```python\n>>> maxconnections = 5\n>>> pool_sema = threading.BoundedSemaphore(value=maxconnections)\n\
    ```\n\nNow that it is spawned, the worker threads call `acquire()` and `release()`\
    \ when they must connect to the server:\n\n```python\n>>> with pool_sema:\n  \
    \      conn = connectdb()\n        try:\n            # use connection\n      \
