    # SUMMARY


    +   - A regular expression is a sequence of characters that specifies a match
    pattern in text.

    - Regular expression techniques are developed in theoretical computer science
    and formal language theory.

    - The concept of regular expressions began in the 1950s, when the American mathematician
    Stephen Cole Kleene formalized the concept of a regular language.

    - Regular expressions (regex or regexp) are a powerful tool for working with text
    data in Python. They provide a way to search, match, and manipulate text using
    a specific pattern.

    - Python is a high level open source scripting language. Python’s built-in “re”
    module provides excellent support for regular expressions, with a modern and complete
    regex flavor. The only significant features missing from Python’s regex syntax
    are atomic grouping, possessive quantifiers, and Unicode properties.

    - The Match function attempts to match RE pattern to string with optional flags.

    - The Search function searches for first occurrence of RE pattern within string
    with optional flags.

    - The re.search function returns a match object on success, none on failure. We
    use group(num) or groups() function of match object to get matched expression.

    - Python offers two different primitive operations based on regular expressions:
    match checks for a match only at the beginning of the string, while search checks
    for a match anywhere in the string (this is what Perl does by default).

    - Regular expression literals may include an optional modifier to control various
    aspects of matching. The modifiers are specified as an optional flag.

    - Except for control characters, (+ ? . * ^ $ ( ) [ ] { } | \), all characters
    match themselves. You can escape a control character by preceding it with a backslash.'
