    \ will raise an exception:\n\n```\n$ python modify_ratings.py\n\nEnter movie id:\
    \ 18\n\nEnter reviewer id: 15\"; UPDATE reviewers SET last_name = \"A\n\nEnter\
    \ new rating: 5.0\n\nEnter username: <user_name>\n\nEnter password:\n\n1292 (22007):\
    \ Truncated incorrect DOUBLE value: '15';\n\nUPDATE reviewers SET last_name =\
    \ 'A'\n```\n\n`cursor.execute()` will raise an exception if it finds any unwanted\
    \ characters in the user input. You should use this approach whenever you incorporate\
    \ user input in a query. There are other ways of preventing SQL injection attacks\
    \ as well.\n\n### 9.5.2 DELETE Command\n\nDeleting records works very similarly\
    \ to updating records. You use the DELETE statement to remove selected records.\n\
    \n> **Note:** Deleting is an *irreversible* process. If you don't use the WHERE\
    \ clause, then all records from the specified table will be deleted. You'll need\
    \ to run the INSERT INTO query again to get back the deleted records.\n\nIt's\
    \ recommended that you first run a SELECT query with the same filter to make sure\
    \ that you're deleting the right records. For example, to remove all ratings given\
    \ by reviewer_id = 2, you should first run the corresponding SELECT query:\n\n\
    ```python\n>>> select_movies_query = \"\"\"\n... SELECT reviewer_id, movie_id\
    \ FROM ratings\n... WHERE reviewer_id = 2\n... \"\"\"\n>>> with connection.cursor()\
    \ as cursor:\n...     cursor.execute(select_movies_query)\n...     for movie in\
    \ cursor.fetchall():\n...         print(movie)\n...\n(2, 7)\n(2, 8)\n(2, 12)\n\
    (2, 23)\n```\n\nThe above code snippet outputs the reviewer_id and movie_id for\
    \ records in the ratings table where reviewer_id = 2. Once you've confirmed that\
    \ these are the records that you need to delete, you can run a DELETE query with\
    \ the same filter:\n\n```python\ndelete_query = \"DELETE FROM ratings WHERE reviewer_id\
    \ = 2\"\nwith connection.cursor() as cursor:\n    cursor.execute(delete_query)\n\
    \    connection.commit()\n```\n\nWith this query, you remove all ratings given\
    \ by the reviewer with reviewer_id = 2 from the ratings table.\n\n### 9.5.3 Other\
    \ Ways to Connect Python and MySQL\n\nYou saw MySQL Connector/Python, which is\
    \ the officially recommended means of interacting with a MySQL database from a\
    \ Python application. There are two other popular connectors:\n\n- **mysqlclient**\
    \ is a library that is a close competitor to the official connector and is actively\
    \ updated with new features. Because its core is written in C, it has better performance\
    \ than the pure-Python official connector. A big drawback is that it’s fairly\
    \ difficult to set up and install, especially on Windows.\n- **MySQLdb** is a\
    \ legacy software that’s still used in commercial applications. It’s written in\
    \ C and is faster than MySQL Connector/Python but is available only for Python\
    \ 2.\n\nThese connectors act as interfaces between your program and a MySQL database,\
    \ and you send your SQL queries through them. But many developers prefer using\
    \ an object-oriented paradigm rather than SQL queries to manipulate data.\n\n\
    **Object-relational mapping (ORM)** is a technique that allows you to query and\
    \ manipulate data from a database directly using an object-oriented language.\
    \ An ORM library encapsulates the code needed to manipulate data, which eliminates\
    \ the need to use even a tiny bit of SQL.\n\nHere are the most popular Python\
    \ ORMs for SQL-based databases:\n\n- **SQLAlchemy** is an ORM that facilitates\
    \ communication between Python and other SQL databases. You can create different\
    \ engines for different databases like MySQL, PostgreSQL, SQLite, and so on. SQLAlchemy\
    \ is commonly used alongside the pandas library to provide complete data-handling\
    \ functionality.\n- **peewee** is a lightweight and fast ORM that’s quick to set\
    \ up. This is quite useful when your interaction with the database is limited\
    \ to extracting a few records. For example, if you need to copy selected records\
    \ from a MySQL database into a CSV file, then peewee might be your best choice.\n\
    - **Django ORM** is one of the most powerful features of Django and is supplied\
    \ alongside the Django web framework. It can interact with a variety of databases\
    \ such as SQLite, PostgreSQL, and MySQL. Many Django-based applications use the\
    \ Django ORM for data modeling and basic queries but often switch to SQLAlchemy\
    \ for more complex requirements.\n\n## ROLE MODEL\n\n![](img/dd5296ef0d2e667ac2671bdbd5535cd0_329_0.png)\n\
