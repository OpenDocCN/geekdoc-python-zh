    # 5.2.3 Polymorphism


    Polymorphism means that different types respond to the same function. Polymorphism
    is very useful as it makes programming more intuitive and therefore easier. Polymorphism
    is a fancy word that just means the same function is defined on objects of different
    types. Python provides protocols which is polymorphism under the hood. These implement
    consistent behavior for built in objects of different type.


    # Protocols


    When we introspect an object we have a lot of attributes that take this format:
    `__names__`. This section will make many of those clear.


    Everything is an object and all actions ultimately mean calling functions defined
    on objects.


    Protocols are polymorphic functions that are embedded into python. Most importantly
    the interpreter is aware of them.


    Protocols enable:


