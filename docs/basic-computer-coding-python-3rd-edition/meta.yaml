    # 9.1.1 Connection Objects


    Connection objects create a connection with the database and these are further
    used for different transactions. These connection objects are also used as representatives
    of the database session.


    > **Keyword**

    Database server is a server which uses a database application that provides database
    services to other computer programs or to computers, as defined by the client–server
    model.


    A connection is created as follows:


    ```

    >>>conn = MySQLdb.connect(''library'', user=''suhas'', password=''python'')

    ```


    You can use a connection object for calling methods like commit(), rollback()
    and close() as shown below:


    ```

    >>>cur = conn.cursor()  //creates new cursor object for executing SQL statements

    >>>conn.commit()  //Commits the transactions

    >>>conn.rollback()  //Roll back the transactions

    >>>conn.close()  //closes the connection

    >>>conn.callproc(proc,param)  //call stored procedure for execution

    >>>conn.getsource(proc)  //fetches stored procedure code

    ```


    # 9.1.2 Cursor objects


    Cursor is one of the powerful features of SQL. These are objects that are responsible
    for submitting various SQL statements to a **database server**. There are several
    cursor classes in MySQLdb.cursors:


    +   - BaseCursor is the base class for Cursor objects.

    - Cursor is the default cursor class. CursorWarningMixIn, CursorStoreResultMixIn,
    CursorTupleRowsMixIn, and BaseCursor are some components of the cursor class.

    - CursorStoreResultMixIn uses the mysql_store_result() function to retrieve result
    sets from the executed query. These result sets are stored at the client side.

    - CursorUseResultMixIn uses the mysql_use_result() function to retrieve result
    sets from the executed query. These result sets are stored at the server side.


    268'
