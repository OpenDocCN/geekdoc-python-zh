    \ GLOBAL 语句\n\n`global` 语句及其 `nonlocal` 近亲是 Python 中唯一类似于声明语句的东西。不过，它们不是类型或大小声明；它们是命名空间声明。`global`\
    \ 语句告诉 Python，一个函数计划更改一个或多个全局名称——即存在于外围模块作用域（命名空间）中的名称。\n\n我们已经顺带讨论过 `global`。以下是总结：\n\
    \n-   全局名称是在外围模块文件顶层赋值的变量。\n-   全局名称仅在函数内赋值时才需要声明。\n-   全局名称可以在函数内引用而无需声明。\n\n\
