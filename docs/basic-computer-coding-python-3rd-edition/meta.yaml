    \n模块文件的全局作用域在导入后会变成模块对象的属性命名空间——导入者自动拥有对该文件所有全局变量的访问权限，因为文件的全局作用域在导入时会转变为对象的属性命名空间。\n\
    \n导入第一个模块后，第二个模块打印其变量，然后为其赋一个新值。引用模块的变量来打印它是没问题的——这通常是模块如何链接成一个更大系统的方式。然而，赋值的问题在于它过于隐式：负责维护或重用第一个模块的人可能完全不知道，在导入链上某个任意遥远的模块可以在运行时改变\
