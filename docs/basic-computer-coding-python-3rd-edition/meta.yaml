    \   b. 全局变量优先\n   c. 程序抛出错误\n   d. 两个变量独立共存\n\n8. Python中`nonlocal`关键字的目的是什么？\n\
    \   a. 将变量声明为非局部变量\n   b. 将变量声明为局部变量\n   c. 引用外部（非全局）作用域中的变量\n   d. 引用全局作用域中的变量\n\
    \n9. 关于Python中变量的生命周期，以下哪项是正确的？\n   a. 它由变量定义所在的作用域决定\n   b. 它总是全局的\n   c. 它在整个程序中是常量\n\
    \   d. 它独立于作用域\n\n10. 在Python中，在函数内部声明但未标记为`global`或`nonlocal`的变量的作用域是什么？\n  \
