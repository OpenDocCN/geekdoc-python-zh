    \ PYTHON 多线程\n\n### 简介\n\n多线程是一种编程概念，其中多个线程在进程内独立运行，共享相同的资源但同时执行不同的任务。在 Python\
    \ 中，多线程是实现并行性和提高某些类型应用程序性能的一种方式。然而，需要注意的是，由于 CPython（Python 的默认实现）中的全局解释器锁（GIL），线程的真正并行执行受到限制。这意味着即使你使用了线程，在单个进程中一次也只能有一个线程执行\
    \ Python 字节码。Python 虚拟机不是线程安全的解释器，这意味着解释器在任何给定时刻只能执行一个线程。这种限制是由 Python 全局解释器锁（GIL）强制执行的，它本质上限制了同一时间只能运行一个\
