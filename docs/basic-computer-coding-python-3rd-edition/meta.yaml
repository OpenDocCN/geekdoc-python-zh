    \n从使用函数抽象中我们知道，在我们拥有程序某些部分的实现之前，我们就可以开始高效地编程。让我们首先假设我们已经有一种从分子和分母构造有理数的方法。我们还假设，给定一个有理数，我们有一种提取（或选择）其分子和分母的方法。让我们进一步假设构造器和选择器作为以下三个函数可用：\n\
