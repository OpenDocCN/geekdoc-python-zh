    - 正则表达式的概念始于 20 世纪 50 年代，当时美国数学家斯蒂芬·科尔·克莱尼形式化了正则语言的概念。\n- 正则表达式（regex 或 regexp）是\
    \ Python 中处理文本数据的强大工具。它们提供了一种使用特定模式搜索、匹配和操作文本的方法。\n- Python 是一种高级开源脚本语言。Python\
    \ 内置的 “re” 模块为正则表达式提供了出色的支持，具有现代且完整的正则表达式风格。Python 正则表达式语法唯一缺失的重要特性是原子分组、占有量词和\
    \ Unicode 属性。\n- Match 函数尝试使用可选标志将 RE 模式与字符串匹配。\n- Search 函数使用可选标志在字符串中搜索 RE 模式的首次出现。\n\
    - `re.search` 函数在成功时返回一个匹配对象，失败时返回 None。我们使用匹配对象的 `group(num)` 或 `groups()` 函数来获取匹配的表达式。\n\
    - Python 提供了两种基于正则表达式的不同原始操作：`match` 仅检查字符串开头的匹配，而 `search` 检查字符串中任何位置的匹配（这是 Perl\
