    \ can rely on intuition\n- special syntax - interpreter translates nice syntax\
    \ to functions on objects.\n\nWe will look at two protocols: `__contains__` and\
    \ `__iter__`\n\n### __add__\n\n`x + y` resolves to `x.__add__(y)`\n\n```python\n\
    >>> 1 + 2\n3\n>>> one = 1\n>>> one.__add__(2)\n3\n>>> '1' + '2'\n'12'\n>>> '1'.__add__('2')\n\
    '12'\n```\n\nAny object that implements the `__add__` function will work with\
    \ the `<object> + x` syntax.\n\n### __contains__\n\n`__contains__` is the built\
    \ in protocol for membership.\n\n`x in y` resolves to `y.__contains__(x)`\n\n\
    When the interpreter encounters `'b' in ['a', 'b']` it knows to look for the `__contains__`\
    \ function on the object to the right of `in` and pass it the object to the left\
    \ of `in` as **parameter**.\n\nA list object has that function defined and the\
    \ interpreter then executes the corresponding code block.\n\nAll data structures\
    \ have the concept of membership defined:\n\n```python\n>>> 'b' in ['a', 'b']\n\
    True\n>>> 'b' in ('a', 'b')\nTrue\n>>> 'b' in {'a': 1, 'b': 2}\nTrue\n>>> 'b'\
    \ in {'a', 'b'}\nTrue\nDemonstrating `__contains__`:\n>>> ['a', 'b'].__contains__('b')\n\
    True\n>>> ('a', 'b').__contains__('b')\nTrue\n>>> {'a': 1, 'b': 2}.__contains__('b')\n\
    True\n>>> {'a', 'b'}.__contains__('b')\nTrue\n```\n\nAny object that implements\
    \ the `__contains__` function will work with the `x in <object>` syntax.\n\n###\
    \ __iter__\n\n`__iter__` is how iteration is implemented in Python. This protocol\
    \ is a bit more involved than the protocols.\n\nTaking this code:\n\n```python\n\
    >>> number = [1, 2]\n>>> for i in [1, 2]:\n...     print(i)\n...\n1\n2\n```\n\n\
    Roughly here is the sequence of events:\n- interpreter calls `__iter__` on the\
    \ list object,\n- an object of type iterator is returned.\n- interpreter then\
