    \ range(no_of_sides)]\n\n    def inputSides(self):\n        self.sides = [float(input(\"\
    Enter side \"+str(i+1)+\" : \")) for i in range(self.n)]\n\n    def dispSides(self):\n\
    \        for i in range(self.n):\n            print(\"Side\",i+1,\"is\",self.sides[i])\n\
