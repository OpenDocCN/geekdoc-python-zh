  mdcn: "## 基础计算机编程：Python\n\n```python\nimport sound.effects.echo\nimport sound.effects.surround\n\
    from sound.effects import *\n```\n\n在此示例中，当执行 `from... import` 语句时，`echo` 和 `surround`\
    \ 模块被导入到当前命名空间中，因为它们是在 `sound.effects` 包中定义的。（当定义了 `__all__` 时，此方法同样有效。）\n\n尽管某些模块在设计上仅导出遵循特定模式的名称，但当你使用\
    \ `import *` 时，在生产代码中这仍然被认为是不良实践。\n\n请记住，使用 `from Package import specific_submodule`\
    \ 没有任何问题！事实上，除非导入模块需要使用来自不同包的同名子模块，否则这是推荐的写法。\n\n## 2.3.2 包内引用\n\n子模块通常需要相互引用。例如，`surround`\
    \ 模块可能会使用 `echo` 模块。事实上，此类引用非常普遍，以至于 `import` 语句会首先在包含包中查找，然后才在标准模块搜索路径中查找。因此，`surround`\
    \ 模块可以简单地使用 `import echo` 或 `from echo import echofilter`。如果在当前包（当前模块是其子模块的包）中未找到导入的模块，则\
    \ `import` 语句会查找具有给定名称的顶级模块。\n\n当包被组织成子包时（如示例中的 `sound` 包），你可以使用绝对导入来引用兄弟包的子模块。例如，如果模块\
    \ `sound.filters.vocoder` 需要使用 `sound.effects` 包中的 `echo` 模块，它可以使用 `from sound.effects\
    \ import echo`。\n\n从 Python 2.5 开始，除了上述隐式相对导入外，你还可以使用 `from module import name`\
    \ 形式的 `import` 语句编写显式相对导入。这些显式相对导入使用前导点来表示相对导入所涉及的当前包和父包。例如，从 `surround` 模块中，你可能会使用：\n\
    \n```python\nfrom . import echo\nfrom .. import formats\nfrom ..filters import\
    \ equalizer\n```\n\n请注意，显式和隐式相对导入都基于当前模块的名称。由于主模块的名称始终是 `\"__main__\"`，因此旨在用作\
    \ Python 应用程序主模块的模块应始终使用绝对导入。\n\n## 2.3.3 多目录中的包\n\n包支持另一个特殊属性 `__path__`。它被初始化为一个列表，其中包含在执行该文件中的代码之前保存包的\
    \ `__init__.py` 的目录名称。可以修改此变量；这样做会影响将来对包中包含的模块和子包的搜索。\n\n虽然此功能并不经常需要，但它可用于扩展在包中找到的模块集。\n\
    \n## 总结\n\n- 在 Python 中，函数是执行特定任务或一组任务的代码块。函数有助于模块化代码，使其更具可读性、可重用性和可维护性。\n- Python\
    \ 模块是包含 Python 代码的文件，这些代码定义了函数、变量和类等。\n- Python 包是提供特定功能的模块集合。它们允许你以模块化的方式组织代码，使其更易于管理和重用。\n\
    - 语句 `return [expression]` 退出函数，并可选择将表达式返回给调用者。没有参数的 `return` 语句与 `return None`\
    \ 相同。\n- 必需参数是按正确位置顺序传递给函数的参数。此处，函数调用中的参数数量应与函数定义完全匹配。\n- 默认参数是在函数调用中未提供该参数的值时假定为默认值的参数。\n\
    - Python 有一种方法可以将定义放在文件中，并在脚本或交互式解释器实例中使用它们。这样的文件称为模块；来自模块的定义可以导入到其他模块或主模块中（在顶层执行的脚本和计算器模式下你可以访问的变量集合）。\n\
    - 包是通过使用“点号模块名称”来构建 Python 模块命名空间的一种方式。\n\n## 知识检查\n\n1. 以下哪个定义正确描述了模块？\n   a.\
    \ 用三引号表示，用于提供某些程序元素的规范\n   b. 设计和实现要合并到程序中的特定功能\n   c. 定义其使用方式的规范\n   d. 任何重用代码的程序\n\
    \n2. 以下哪项是 Python 中函数的用途？\n   a. 函数是可重用的程序片段\n   b. 函数不能为你的应用程序提供更好的模块化\n   c.\
    \ 你也不能创建自己的函数\n   d. 以上所有\n\n3. 哪个关键字用于函数？\n   a. Fun\n   b. Define\n   c. Def\n\
    \   d. Function\n\n4. 以下哪项不是使用模块的优点？\n   a. 提供重用程序代码的手段\n   b. 提供划分任务的手段\n   c.\
    \ 提供减小程序大小的手段\n   d. 提供测试程序各个部分的手段\n\n5. 使用给定模块的程序代码称为该模块的 .........。\n   a. 客户端\n\
    \   b. 文档字符串\n   c. 接口\n   d. 模块化\n\n6. Python 是用哪种语言编写的？\n   a. 英语\n   b. C\n\
    \   c. PHP\n   d. 以上所有\n\n7. 以下哪项是 Python 文件的正确扩展名？\n   a. .py\n   b. .python\n\
    \   c. .p\n   d. 以上都不是\n\n8. 标识符的最大可能长度是多少？\n   a. 31 个字符\n   b. 63 个字符\n   c.\
    \ 79 个字符\n   d. 标识符可以是任意长度。\n\n9. 以下关于 Python 函数参数的说法哪项是正确的？\n   a. 函数不能接受参数\n\
    \   b. 函数只能接受固定数量的参数\n   c. 函数可以接受可变数量的参数\n   d. 函数只能接受字符串参数\n\n10. 如何在 Python\
    \ 中导入名为 example 的模块？\n    a. include example\n    b. import example\n    c. require\
    \ example\n    d. use example\n\n11. Python 模块中 `__init__.py` 文件的目的是什么？\n    a.\
    \ 初始化模块\n    b. 指示该目录应被视为包\n    c. 定义模块的主函数\n    d. 导入外部库\n\n12. 如何从名为 package\
    \ 的包中导入名为 module 的模块？\n    a. import package.module\n    b. import module from\
    \ package\n    c. use package/module\n    d. from package import module\n\n13.\
    \ Python 中的包是什么？\n    a. 单个 Python 文件\n    b. Python 中的一个函数\n    c. 内置数据类型\n \
    \   d. 模块的集合\n\n## 复习题\n\n1. Python 中的函数是如何工作的？\n2. 讨论 Python 函数参数。\n3. 如何创建 Python\
    \ 模块。\n4. 创建一个可以作为独立脚本执行的模块。\n5. Python 模块和 Python 包之间有什么区别？\n\n## 检查你的结果\n\n\
    1. (a) 2. (a) 3. (c) 4. (c) 5. (a)\n6. (b) 7. (a) 8. (d) 9. (c) 10. (b)\n11. (b)\
    \ 12. (a) 13. (d)\n\n## 参考文献\n\n1. Kuchling, A. M. “Functional Programming HOWTO”.\
    \ Python v2.7.2 documentation. Python Software Foundation. Retrieved 9 February\
    \ 2012.\n2. Kuchling, A. M. “Functional Programming HOWTO”. Python v2.7.2 documentation.\
    \ Python Software Foundation. Archived from the original on 24 October 2012. Retrieved\
    \ 9 February 2012. List comprehensions and generator expressions [...] are a concise\
    \ notation for such operations, borrowed from the functional programming language\
    \ Haskell.\n3. Langa, Łukasz (24 March 2022). “Python Insider: Python 3.10.4 and\
    \ 3.9.12 are now available out of schedule”. Python Insider. Archived from the\
    \ original on 21 April 2022. Retrieved 19 April 2022.\n4. Fairchild, Carlie (12\
    \ July 2018). “Guido van Rossum Stepping Down from Role as Python’s Benevolent\
    \ Dictator For Life”. Linux Journal. Archived from the original on 13 July 2018.\
    \ Retrieved 13 July 2018.\n5. Krill, Paul (4 May 2023). “Mojo language marries\
