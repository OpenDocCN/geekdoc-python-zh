- md: "## CHAPTER 5 OBJECT ORIENTED PROGRAMMING\n\n## INTRODUCTION\n\nObject-oriented\
    \ programming (OOP) is a programming paradigm based on the concept of objects,\
    \ which can contain data and code: data in the form of fields (often known as\
    \ attributes or properties), and code in the form of procedures (often known as\
    \ methods).\n\nA common feature of objects is that methods are attached to them\
    \ and can access and modify the object's data fields. In this brand of OOP, there\
    \ is usually a special name such as `this` or `self` used to refer to the current\
    \ object. In OOP, computer programs are designed by making them out of objects\
    \ that interact with one another. OOP languages are diverse, but the most popular\
    \ ones are class-based, meaning that objects are instances of classes, which also\
    \ determine their types.\n\nMany of the most widely used programming languages\
    \ (such as C++, Java, Python, etc.) are multi-paradigm and they support object-oriented\
    \ programming to a greater or lesser degree, typically in combination with imperative,\
    \ procedural programming.\n\nIn Python, object-oriented Programming (OOPs) is\
    \ a programming paradigm that uses objects and classes in programming. It aims\
    \ to implement real-world entities like inheritance, polymorphisms, encapsulation,\
    \ etc. in the programming. The main concept of OOPs is to bind the data and the\
    \ functions that work on that together as a single unit so that no other part\
    \ of the code can access this data.\n\nPython is a fantastic programming language\
    \ that allows you to use both functional and object-oriented programming paradigms.\
    \ Python programmers should be able to use fundamental object-oriented programming\
    \ concepts, whether they are software developers, machine learning engineers,\
    \ or something else.\n\nPython, like every other object-oriented language, allows\
    \ you to define classes to create objects. In-built Python classes are the most\
    \ common data types in Python, such as strings, lists, dictionaries, and so on.\n\
    \nA class is a collection of instance variables and related methods that define\
    \ a particular object type. You can think of a class as an object's blueprint\
    \ or template. Attributes are the names given to the variables that make up a\
    \ class. A class instance with a defined set of properties is called an object.\
    \ As a result, the same class can be used to construct as many objects as needed.\n\
    \nAfter studying this chapter, you will be able to:\n\n- 1. Explain the concept\
    \ of OOPS in python\n- 2. Define the various types of methods of OOPS\n\n## 5.1\
    \ INTRODUCTION OF OOPS IN PYTHON\n\nObject-oriented Programming, or OOP for short,\
    \ is a programming paradigm which provides a means of structuring programs so\
    \ that properties and behaviors are bundled into individual objects.\n\nFor instance,\
    \ an object could represent a person with a name property, age, address, etc.,\
    \ with behaviors like walking, talking, breathing, and running. Or an email with\
    \ properties like recipient list, subject, body, etc., and behaviors like adding\
    \ attachments and sending.\n\nPut another way, object-oriented programming is\
    \ an approach for modeling concrete, real-world things like cars as well as relations\
    \ between things like companies and employees, students and teachers, etc. OOP\
    \ models real-world entities as software objects, which have some data associated\
    \ with them and can perform certain functions.\n\nAnother common **programming\
    \ paradigm** is procedural programming which structures a program like a recipe\
    \ in that it provides a set of steps, in the form of functions and code blocks,\
    \ which flow sequentially in order to complete a task.\n\nThe key takeaway is\
    \ that objects are at the center of the object-oriented programming paradigm,\
    \ not only representing the data, as in procedural programming, but in the overall\
    \ structure of the program as well.\n\n### 5.1.1 Classes in Python\n\nFocusing\
    \ first on the data, each thing or object is an instance of some class. The primitive\
    \ data structures available in Python, like numbers, strings, and lists are designed\
    \ to represent simple things like the cost of something, the name of a poem, and\
    \ your favorite colors, respectively. What if you wanted to represent something\
    \ much more complicated?\n\nFor example, let's say you wanted to track a number\
    \ of different animals. If you used a list, the first element could be the animal's\
    \ name while the second element could represent its age. How would you know which\
    \ element is supposed to be which? What if you had 100 different animals? Are\
    \ you certain each animal has both a name and an age, and so forth? What if you\
    \ wanted to add other properties to these animals? This lacks organization, and\
    \ it's the exact need for classes. Classes are used to create new user-defined\
    \ data structures that contain arbitrary information about something. In the case\
    \ of an animal, we could create an `Animal()` class to track properties about\
    \ the Animal like the name and age. It's important to note that a class just provides\
    \ structure—it's a blueprint for how something should be defined, but it doesn't\
    \ actually provide any real content itself. The `Animal()` class may specify that\
    \ the name and age are necessary for defining an animal, but it will not actually\
    \ state what a specific animal's name or age is. It may help to think of a class\
    \ as an idea for how something should be defined.\n\n**Keyword**\n\n**Programming\
    \ paradigms** are a way to classify programming languages based on their features.\n\
    \n### 5.1.2 Python Objects (Instances)\n\nWhile the class is the blueprint, an\
    \ *instance* is a copy of the class with *actual* values, literally an object\
    \ belonging to a specific class. It's not an idea anymore; it's an actual animal,\
    \ like a dog named Roger who's eight years old.\n\nPut another way, a class is\
    \ like a form or questionnaire. It defines the needed information. After you fill\
    \ out the form, your specific copy is an instance of the class; it contains actual\
    \ information relevant to you.\n\nYou can fill out multiple copies to create many\
    \ different instances, but without the form as a guide, you would be lost, not\
    \ knowing what information is required. Thus, before you can create individual\
    \ instances of an object, we must first specify what is needed by defining a class.\n\
    \n### How to Define a Class in Python\n\nDefining a class is simple in Python:\n\
    \n```python\nclass Dog:\n    pass\n```\n\nYou start with the `class` keyword to\
    \ indicate that you are creating a class, then you add the name of the class (using\
    \ CamelCase notation, starting with a capital letter.)\n\nAlso, we used the Python\
    \ keyword `pass` here. This is very often used as a place holder where code will\
