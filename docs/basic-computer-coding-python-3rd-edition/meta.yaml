    \ some of the object's components. Encapsulation means that the internal representation\
    \ of an object is generally hidden from view outside of the object's definition.\n\
    \nA class is an example of **encapsulation** as it encapsulates all the data that\
    \ is member functions, variables etc.\n\n> **Keyword**\n>\n> **Encapsulation**\
    \ is a way to restrict the direct access to some components of an object, so users\
    \ cannot access state values for all of the variables of a particular object.\n\
    \nDifference between Abstraction and Encapsulation:\nAbstraction is a mechanism\
    \ which represent the essential features without including implementation details.\n\
    Encapsulation: — Information hiding.\nAbstraction: — Implementation hiding.\n\
    Python follows the philosophy of we’re all adults here with respect to hiding\
