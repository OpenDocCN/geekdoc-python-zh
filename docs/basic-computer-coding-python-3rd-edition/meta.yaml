    # 8.5 PYTHON - LISTS


    Lists are used to store multiple items in a single variable. Lists are one of
    4 built-in data types in Python used to store collections of data, the other 3
    are Tuple, Set, and Dictionary, all with different qualities and usage.


    The most basic data structure in Python is the sequence. Each element of a sequence
    is assigned a number - its position or index. The first index is zero, the second
    index is one, and so forth.


    There are certain things you can do with all sequence types. These operations
    include indexing, slicing, adding, multiplying, and checking for membership. In
    addition, Python has built-in functions for finding the length of a sequence and
    for finding its largest and smallest elements.


    The list is a most versatile datatype available in Python which can be written
    as a list of comma-separated values (items) between square brackets. Important
    thing about a list is that items in a list need not be of the same type.'
