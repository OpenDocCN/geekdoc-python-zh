    numerators, denominators, and rational numbers --- whose behavior was specified
    by the latter three functions.


    But what exactly is meant by data? It is not enough to say “whatever is implemented
    by the given selectors and constructors.” We need to guarantee that these functions
    together specify the right behavior. That is, if we construct a rational number
    x from integers n and d, then it should be the case that numer(x)/denom(x) is
    equal to n/d.


    In general, we can think of an abstract data type as defined by some collection
    of selectors and constructors, together with some behavior conditions. As long
    as the behavior conditions are met (such as the division property above), these
    functions constitute a valid representation of the data type.


