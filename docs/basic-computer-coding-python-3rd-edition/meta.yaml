- md: "## 4.1.1 Handling Exceptions\n\nThe `try` statement works as follows. First,\
    \ the `try` clause (the statement(s) between the `try` and `except` keywords)\
    \ is executed. If no exception occurs, the `except` clause is skipped and execution\
    \ of the `try` statement is finished. If an exception occurs during execution\
    \ of the `try` clause, the rest of the clause is skipped. Then, if its type matches\
    \ the exception named after the `except` keyword, the `except` clause is executed,\
    \ and then execution continues after the `try` statement. If an exception occurs\
    \ which does not match the exception named in the `except` clause, it is passed\
    \ on to outer `try` statements; if no handler is found, it is an unhandled exception\
    \ and execution stops with a traceback.\n\nAn `except` clause may name multiple\
    \ exceptions as a parenthesized tuple, for example:\n\n```python\nexcept (RuntimeError,\
    \ TypeError, NameError):\n    pass\n```\n\nA class in an `except` clause is compatible\
    \ with an exception if it is the same class or a base class thereof (but not the\
    \ other way around — an `except` clause listing a derived class is not compatible\
    \ with a base class). For example, the following code will print `B`, `C`, `D`\
    \ in that order:\n\n```python\nclass B(Exception):\n    pass\n\nclass C(B):\n\
    \    pass\n\nclass D(C):\n    pass\n\nfor cls in [B, C, D]:\n    try:\n      \
    \  raise cls()\n    except D:\n        print(\"D\")\n    except C:\n        print(\"\
    C\")\n    except B:\n        print(\"B\")\n```\n\nNote that if the `except` clauses\
    \ were reversed (with `except B` first), it would have printed `B`, `B`, `B` —\
    \ the first matching `except` clause is triggered.\n\nThe last `except` clause\
    \ may omit the exception name(s), to serve as a wildcard. Use this with extreme\
    \ caution, since it is easy to mask a real programming error in this way! It can\
    \ also be used to print an error message and then re-raise the exception (allowing\
    \ a caller to handle the exception as well):\n\n```python\nimport sys\n\ntry:\n\
    \    f = open('myfile.txt')\n    s = f.readline()\n    i = int(s.strip())\nexcept\
    \ OSError as err:\n    print(\"OS error: {0}\".format(err))\nexcept ValueError:\n\
    \    print(\"Could not convert data to an integer.\")\nexcept:\n    print(\"Unexpected\
    \ error:\", sys.exc_info()[0])\n    raise\n```\n\nThe `try` ... `except` statement\
    \ has an optional *`else` clause*, which, when present, must follow all `except`\
    \ clauses. It is useful for code that must be executed if the `try` clause does\
    \ not raise an exception. For example:\n\n```python\nfor arg in sys.argv[1:]:\n\
    \    try:\n        f = open(arg, 'r')\n    except OSError:\n        print('cannot\
    \ open', arg)\n    else:\n        print(arg, 'has', len(f.readlines()), 'lines')\n\
    \        f.close()\n```\n\nThe use of the `else` clause is better than adding\
    \ additional code to the `try` clause because it avoids accidentally catching\
    \ an exception that wasn't raised by the code being protected by the `try` ...\
    \ `except` statement.\n\nWhen an exception occurs, it may have an associated value,\
    \ also known as the exception's *argument*. The presence and type of the argument\
    \ depend on the exception type.\n\nThe `except` clause may specify a variable\
    \ after the exception name. The variable is bound to an exception instance with\
    \ the arguments stored in `instance.args`. For convenience, the exception instance\
    \ defines `__str__()` so the arguments can be printed directly without having\
    \ to reference `.args`. One may also instantiate an exception first before raising\
    \ it and add any attributes to it as desired.\n\n```python\n>>> try:\n...    \
    \ raise Exception('spam', 'eggs')\n... except Exception as inst:\n...     print(type(inst))\
    \     # the exception instance\n...     print(inst.args)      # arguments stored\
    \ in .args\n...     print(inst)           # __str__ allows args to be printed\
    \ directly,\n...                           # but may be overridden in exception\
    \ subclasses\n...     x, y = inst.args     # unpack args\n...     print('x =',\
    \ x)\n...     print('y =', y)\n...\n<class 'Exception'>\n('spam', 'eggs')\n('spam',\
    \ 'eggs')\nx = spam\ny = eggs\n```\n\nIf an exception has arguments, they are\
    \ printed as the last part ('detail') of the message for unhandled exceptions.\n\
    \nException handlers don't just handle exceptions if they occur immediately in\
    \ the `try` clause, but also if they occur inside functions that are called (even\
    \ indirectly) in the `try` clause. For example:\n\n```python\n>>> def this_fails():\n\
    ...     x = 1/0\n...\n>>> try:\n...     this_fails()\n... except ZeroDivisionError\
    \ as err:\n...     print('Handling run-time error:', err)\n...\nHandling run-time\
    \ error: division by zero\n```\n\n## 4.1.2 Raising Exceptions\n\nThe `raise` statement\
    \ allows the programmer to force a specified exception to occur. For example:\n\
    \n```python\n>>> raise NameError('HiThere')\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nNameError: HiThere\n```\n\nThe sole\
    \ argument to `raise` indicates the exception to be raised. This must be either\
    \ an exception instance or an exception class (a class that derives from `Exception`).\
    \ If an exception class is passed, it will be implicitly instantiated by calling\
    \ its constructor with no arguments:\n\n```python\nraise ValueError  # shorthand\
    \ for 'raise ValueError()'\n```\n\nIf you need to determine whether an exception\
    \ was raised but don't intend to handle it, a simpler form of the `raise` statement\
    \ allows you to re-raise the exception:\n\n```python\n>>> try:\n...     raise\
    \ NameError('HiThere')\n... except NameError:\n...     print('An exception flew\
    \ by!')\n...     raise\n...\nAn exception flew by!\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 2, in <module>\nNameError: HiThere\n```\n\n\
    ## 4.1.3 User-defined Exceptions\n\nPrograms may name their own exceptions by\
    \ creating a new exception class. Exceptions should typically be derived from\
    \ the `Exception` class, either directly or indirectly.\n\nException classes can\
    \ be defined which do anything any other class can do, but are usually kept simple,\
    \ often only offering a number of attributes that allow information about the\
    \ error to be extracted by handlers for the exception. When creating a module\
    \ that can raise several distinct errors, a common practice is to create a base\
    \ class for exceptions defined by that module, and subclass that to create specific\
    \ exception classes for different error conditions:\n\n```python\nclass Error(Exception):\n\
    \    \"\"\"Base class for exceptions in this module.\"\"\"\n    pass\n\nclass\
    \ InputError(Error):\n    \"\"\"Exception raised for errors in the input.\n\n\
    \    Attributes:\n        expression -- input expression in which the error occurred\n\
    \        message -- explanation of the error\n    \"\"\"\n\n    def __init__(self,\
    \ expression, message):\n        self.expression = expression\n        self.message\
    \ = message\n\nclass TransitionError(Error):\n    \"\"\"Raised when an operation\
    \ attempts a state transition\n    that's not allowed.\n\n    Attributes:\n  \
    \      previous -- state at beginning of transition\n        next -- attempted\
    \ new state\n        message -- explanation of why the specific transition is\n\
    \                   not allowed\n    \"\"\"\n\n    def __init__(self, previous,\
    \ next, message):\n        self.previous = previous\n        self.next = next\n\
    \        self.message = message\n```\n\nMost exceptions are defined with names\
    \ that end in “Error,” similar to the naming of the standard exceptions.\n\n##\
    \ 4.1.4 Defining Clean-up Actions\n\nThe `try` statement has another optional\
    \ clause which is intended to define clean-up actions that must be executed under\
    \ all circumstances. For example:\n\n```python\n>>> try:\n...     raise KeyboardInterrupt\n\
    ... finally:\n...     print('Goodbye, world!')\n...\nGoodbye, world!\nKeyboardInterrupt\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 2, in <module>\n\
    ```\n\nA *`finally` clause* is always executed before leaving the `try` statement,\
    \ whether an exception has occurred or not. When an exception has occurred in\
    \ the `try` clause and has not been handled by an `except` clause (or it has occurred\
    \ in an `except` or `else` clause), it is re-raised after the `finally` clause\
    \ has been executed. The `finally` clause is also executed “on the way out” when\
    \ any other clause of the `try` statement is left via a `break`, `continue` or\
    \ `return` statement. A more complicated example:\n\n```python\n>>> def divide(x,\
    \ y):\n...     try:\n...         result = x / y\n...     except ZeroDivisionError:\n\
    ...         print(\"division by zero!\")\n...     else:\n...         print(\"\
    result is\", result)\n...     finally:\n...         print(\"executing finally\
    \ clause\")\n...\n>>> divide(2, 1)\nresult is 2.0\nexecuting finally clause\n\
    >>> divide(2, 0)\ndivision by zero!\nexecuting finally clause\nTraceback (most\
    \ recent call last):\n  File \"<stdin>\", line 1, in <module>\n  File \"<stdin>\"\
    , line 3, in divide\nZeroDivisionError: division by zero\n```\n\nAs you can see,\
    \ the `finally` clause is executed in any event. The `ZeroDivisionError` exception\
    \ is not handled by the `except` clause, so it is re-raised after the `finally`\
    \ clause is executed. In the last example, the `divide` function returns to the\
    \ caller after the `finally` clause executes, and a `ZeroDivisionError` exception\
    \ is raised and displayed.\n\n> **Return Statement**\n> causes execution to leave\
    \ the current subroutine and resume at the point in the code immediately after\
    \ where the subroutine was called, known as its return address."
  mdcn: "## 4.1.1 处理异常\n\n`try`语句的工作原理如下。首先，执行`try`子句（即`try`和`except`关键字之间的语句）。如果没有异常发生，则跳过`except`子句，`try`语句执行完毕。如果在执行`try`子句期间发生异常，则跳过该子句的剩余部分。然后，如果其类型与`except`关键字后命名的异常匹配，则执行`except`子句，然后继续执行`try`语句之后的代码。如果发生的异常与`except`子句中命名的异常不匹配，则将其传递给外层的`try`语句；如果未找到处理程序，则它是一个未处理的异常，执行将停止并显示回溯信息。\n\
    \n`except`子句可以将多个异常命名为一个带括号的元组，例如：\n\n```python\nexcept (RuntimeError, TypeError,\
    \ NameError):\n    pass\n```\n\n`except`子句中的类与异常兼容，如果它是同一个类或其基类（但反过来不行——列出派生类的`except`子句与基类不兼容）。例如，以下代码将按顺序打印`B`、`C`、`D`：\n\
    \n```python\nclass B(Exception):\n    pass\n\nclass C(B):\n    pass\n\nclass D(C):\n\
    \    pass\n\nfor cls in [B, C, D]:\n    try:\n        raise cls()\n    except\
    \ D:\n        print(\"D\")\n    except C:\n        print(\"C\")\n    except B:\n\
    \        print(\"B\")\n```\n\n请注意，如果`except`子句的顺序颠倒（`except B`在前），它将打印`B`、`B`、`B`——第一个匹配的`except`子句会被触发。\n\
    \n最后一个`except`子句可以省略异常名称，用作通配符。请极其谨慎地使用此功能，因为这样很容易掩盖真正的编程错误！它也可以用于打印错误消息，然后重新引发异常（允许调用者也处理该异常）：\n\
    \n```python\nimport sys\n\ntry:\n    f = open('myfile.txt')\n    s = f.readline()\n\
    \    i = int(s.strip())\nexcept OSError as err:\n    print(\"OS error: {0}\".format(err))\n\
    except ValueError:\n    print(\"Could not convert data to an integer.\")\nexcept:\n\
    \    print(\"Unexpected error:\", sys.exc_info()[0])\n    raise\n```\n\n`try`\
    \ ... `except`语句有一个可选的*`else`子句*，当存在时，必须跟在所有`except`子句之后。它对于必须在`try`子句未引发异常时执行的代码很有用。例如：\n\
    \n```python\nfor arg in sys.argv[1:]:\n    try:\n        f = open(arg, 'r')\n\
    \    except OSError:\n        print('cannot open', arg)\n    else:\n        print(arg,\
    \ 'has', len(f.readlines()), 'lines')\n        f.close()\n```\n\n使用`else`子句比在`try`子句中添加额外代码更好，因为它避免了意外捕获未被`try`\
    \ ... `except`语句保护的代码引发的异常。\n\n当异常发生时，它可能有一个关联的值，也称为异常的*参数*。参数的存在和类型取决于异常类型。\n\
    \n`except`子句可以在异常名称后指定一个变量。该变量绑定到一个异常实例，其参数存储在`instance.args`中。为方便起见，异常实例定义了`__str__()`，因此可以直接打印参数，而无需引用`.args`。也可以在引发异常之前先实例化异常，并根据需要向其添加任何属性。\n\
    \n```python\n>>> try:\n...     raise Exception('spam', 'eggs')\n... except Exception\
    \ as inst:\n...     print(type(inst))     # the exception instance\n...     print(inst.args)\
    \      # arguments stored in .args\n...     print(inst)           # __str__ allows\
    \ args to be printed directly,\n...                           # but may be overridden\
    \ in exception subclasses\n...     x, y = inst.args     # unpack args\n...   \
    \  print('x =', x)\n...     print('y =', y)\n...\n<class 'Exception'>\n('spam',\
    \ 'eggs')\n('spam', 'eggs')\nx = spam\ny = eggs\n```\n\n如果异常有参数，它们将作为未处理异常消息的最后一部分（“详细信息”）打印出来。\n\
    \n异常处理程序不仅处理直接在`try`子句中发生的异常，也处理在`try`子句中调用（即使是间接调用）的函数内部发生的异常。例如：\n\n```python\n\
    >>> def this_fails():\n...     x = 1/0\n...\n>>> try:\n...     this_fails()\n\
    ... except ZeroDivisionError as err:\n...     print('Handling run-time error:',\
    \ err)\n...\nHandling run-time error: division by zero\n```\n\n## 4.1.2 引发异常\n\
    \n`raise`语句允许程序员强制引发指定的异常。例如：\n\n```python\n>>> raise NameError('HiThere')\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\nNameError:\
    \ HiThere\n```\n\n`raise`的唯一参数指示要引发的异常。这必须是一个异常实例或一个异常类（一个从`Exception`派生的类）。如果传递一个异常类，它将通过不带参数调用其构造函数而被隐式实例化：\n\
    \n```python\nraise ValueError  # shorthand for 'raise ValueError()'\n```\n\n如果你需要确定是否引发了异常但不打算处理它，`raise`语句的一种更简单的形式允许你重新引发该异常：\n\
    \n```python\n>>> try:\n...     raise NameError('HiThere')\n... except NameError:\n\
    ...     print('An exception flew by!')\n...     raise\n...\nAn exception flew\
    \ by!\nTraceback (most recent call last):\n  File \"<stdin>\", line 2, in <module>\n\
    NameError: HiThere\n```\n\n## 4.1.3 用户自定义异常\n\n程序可以通过创建新的异常类来命名自己的异常。异常通常应直接或间接从`Exception`类派生。\n\
    \n可以定义能够执行任何其他类能做的任何事情的异常类，但通常保持简单，通常只提供许多属性，允许处理程序提取有关错误的信息。当创建一个可能引发多个不同错误的模块时，一个常见的做法是为该模块定义的异常创建一个基类，并对其进行子类化以创建针对不同错误条件的特定异常类：\n\
    \n```python\nclass Error(Exception):\n    \"\"\"Base class for exceptions in this\
    \ module.\"\"\"\n    pass\n\nclass InputError(Error):\n    \"\"\"Exception raised\
    \ for errors in the input.\n\n    Attributes:\n        expression -- input expression\
    \ in which the error occurred\n        message -- explanation of the error\n \
    \   \"\"\"\n\n    def __init__(self, expression, message):\n        self.expression\
    \ = expression\n        self.message = message\n\nclass TransitionError(Error):\n\
    \    \"\"\"Raised when an operation attempts a state transition\n    that's not\
    \ allowed.\n\n    Attributes:\n        previous -- state at beginning of transition\n\
    \        next -- attempted new state\n        message -- explanation of why the\
    \ specific transition is\n                   not allowed\n    \"\"\"\n\n    def\
    \ __init__(self, previous, next, message):\n        self.previous = previous\n\
    \        self.next = next\n        self.message = message\n```\n\n大多数异常的名称以“Error”结尾，类似于标准异常的命名。\n\
    \n## 4.1.4 定义清理操作\n\n`try`语句有另一个可选子句，旨在定义必须在所有情况下执行的清理操作。例如：\n\n```python\n>>>\
    \ try:\n...     raise KeyboardInterrupt\n... finally:\n...     print('Goodbye,\
    \ world!')\n...\nGoodbye, world!\nKeyboardInterrupt\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 2, in <module>\n```\n\n*`finally`子句*总是在离开`try`语句之前执行，无论是否发生异常。当在`try`子句中发生异常且未被`except`子句处理（或它发生在`except`或`else`子句中）时，它将在`finally`子句执行后重新引发。当通过`break`、`continue`或`return`语句离开`try`语句的任何其他子句时，`finally`子句也会在“退出时”执行。一个更复杂的例子：\n\
    \n```python\n>>> def divide(x, y):\n...     try:\n...         result = x / y\n\
    ...     except ZeroDivisionError:\n...         print(\"division by zero!\")\n\
    ...     else:\n...         print(\"result is\", result)\n...     finally:\n...\
    \         print(\"executing finally clause\")\n...\n>>> divide(2, 1)\nresult is\
    \ 2.0\nexecuting finally clause\n>>> divide(2, 0)\ndivision by zero!\nexecuting\
    \ finally clause\nTraceback (most recent call last):\n  File \"<stdin>\", line\
    \ 1, in <module>\n  File \"<stdin>\", line 3, in divide\nZeroDivisionError: division\
    \ by zero\n```\n\n如你所见，`finally`子句在任何情况下都会执行。`ZeroDivisionError`异常未被`except`子句处理，因此在`finally`子句执行后重新引发。在最后一个例子中，`divide`函数在`finally`子句执行后返回给调用者，并引发并显示`ZeroDivisionError`异常。\n\
    \n> **Return语句**\n> 导致执行离开当前子例程，并在代码中紧接子例程被调用的位置恢复，该位置称为其返回地址。"
