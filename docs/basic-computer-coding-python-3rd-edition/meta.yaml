    # 10.3 SCOPES AND NESTED FUNCTIONS


    So far, we have omitted one part of Python’s scope rules on purpose, because it’s
    relatively rare to encounter it in practice. However, it’s time to take a deeper
    look at the letter E in the LEGB lookup rule. The E layer is fairly new (it was
    added in Python 2.2); it takes the form of the local scopes of any and all enclosing
    function defs. Enclosing scopes are sometimes also called statically nested scopes.
    Really, the nesting is a lexical one—nested scopes correspond to physically and
    syntactically nested code structures in your program’s source code.


    # 10.3.1 Nested Scope Details


    With the addition of nested function scopes, variable lookup rules become slightly
    more complex. Within a function:


    +   - A reference (X) looks for the name X first in the current local scope (function);
    then in the local scopes of any lexically enclosing functions in your source code,
    from inner to outer; then in the current global scope (the module file); and finally
    in the built-in scope (the module builtins). Global declarations make the search
    begin in the global (module file) scope instead.

    - An assignment (X = value) creates or changes the name X in the current local
    scope, by default. If X is declared global within the function, the assignment
    creates or changes the name X in the enclosing module’s scope instead. If, on
    the other hand, X is declared nonlocal within the function, the assignment changes
    the name X in the closest enclosing function’s local scope.


    Notice that the global declaration still maps variables to the enclosing module.
    When nested functions are present, variables in enclosing functions may be referenced,
    but they require nonlocal declarations to be changed.


