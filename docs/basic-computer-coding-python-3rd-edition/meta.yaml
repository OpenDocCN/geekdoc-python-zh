    The examples show the most commonly used unittest features which are sufficient
    to meet many everyday testing needs. The remainder of the documentation explores
    the full feature set from first principles.


    # 4.2.2 Command-Line Interface


    The unittest module can be used from the command line to run tests from modules,
    classes or even individual test methods:


    ```

    python -m unittest test_module1 test_module2

    python -m unittest test_module.TestClass

    python -m unittest test_module.TestClass.test_method

    ```


    You can pass in a list with any combination of module names, and fully qualified
    class or method names.


    You can run tests with more detail (higher verbosity) by passing in the -v flag:


    ```

    python -m unittest -v test_module

    ```


    For a list of all the command-line options:


    ```

    python -m unittest -h

    ```


    Changed in version 2.7: In earlier versions it was only possible to run individual
    test methods and not modules or classes.


    # Command-line options


    unittest supports these command-line options:


    +   -b, --buffer

    The standard output and standard error streams are buffered during the test run.
    Output during a passing test is discarded. Output is echoed normally on test fail
    or error and is added to the failure messages.

    -c, --catch

    Control-C during the test run waits for the current test to end and then reports
    all the results so far. A second Control-C raises the normal Keyboard Interrupt


