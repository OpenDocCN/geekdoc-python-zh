    in a slightly irreverent mood (and [being] a big fan of *Monty Python''s Flying
    Circus*)". He has explained that Python''s predecessor, ABC, was inspired by SETL,
    noting that ABC co-developer Lambert Meertens had "spent a year with the SETL
    group at NYU before coming up with the final ABC design". In July 2018, Van Rossum
    announced that he would be stepping down from the position of BDFL of the Python
