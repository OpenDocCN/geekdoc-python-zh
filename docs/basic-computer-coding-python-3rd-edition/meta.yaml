    \ not function call time.\n\n# 10.4.3 Why nonlocal?\n\nGiven the extra complexity\
    \ of nested functions, you might wonder what the fuss is about. Although it’s\
    \ difficult to see in our small examples, state information becomes crucial in\
    \ many programs. There are a variety of ways to “remember” information across\
    \ function and method calls in Python. While there are tradeoffs for all, nonlocal\
    \ does improve this story for enclosing scope references—the nonlocal statement\
    \ allows multiple copies of changeable state to be retained in memory and addresses\
    \ simple state-retention needs where classes may not be warranted.\n\nThe following\
    \ code allows state to be retained and modified in an enclosing scope. Each call\
    \ to tester creates a little self-contained package of changeable information,\
    \ whose names do not clash with any other part of the program:\n\n```\ndef tester(start):\n\
    \    state = start                # Each call gets its own state\n    def nested(label):\n\
    \        nonlocal state           # Remembers state in enclosing scope\n     \
    \   print(label, state)\n        state += 1               # Allowed to change\
    \ it if nonlocal\n    return nested\n\nF = tester(0)\nF('spam')\n```\n\nUnfortunately,\
    \ this code only works in Python 3.0. If you are using Python 2.6, other options\
    \ are available, depending on your goals.\n\n# Shared state with globals\n\nOne\
    \ usual prescription for achieving the nonlocal effect in 2.6 and earlier is to\
    \ simply move the state out to the global scope (the enclosing module):\n\n```\n\
    >>> def tester(start):\n...     global state              # Move it out to the\
    \ module to change it\n...     state = start             # global allows changes\
    \ in module scope\n...     def nested(label):\n...         global state\n... \
    \        print(label, state)\n...         state += 1\n...     return nested\n\
    ...\n>>> F = tester(0)\n>>> F('spam')                    # Each call increments\
    \ shared global state\n\nspam 0\n>>> F('eggs')\neggs 1\n```"
