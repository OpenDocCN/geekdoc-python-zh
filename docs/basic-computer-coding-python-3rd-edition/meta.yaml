- md: "## 9.1.4 Python and MySQL\n\nPython and MySQL are a good combination to develop\
    \ database applications. After starting the MySQL service on Linux, you need to\
    \ acquire MySQLdb, a Python DB-API for MySQL to perform database operations. You\
    \ can check whether the MySQLdb module is installed in your system with the following\
    \ command:\n\n```python\n>>> import MySQLdb\n```\n\nIf this command runs successfully,\
    \ you can now start writing scripts for your database.\n\nTo write database applications\
    \ in Python, there are five steps to follow:\n\n- Import the SQL interface with\
    \ the following command:\n\n```python\n>>> import MySQLdb\n```\n\n- Establish\
    \ a connection with the database with the following command:\n\n```python\n>>>\
    \ conn=MySQLdb.connect(host='localhost',user='root',passwd='')\n```\n\n...where\
    \ host is the name of your host machine, followed by the username and password.\
    \ In case of the root, there is no need to provide a password.\n\n- Create a cursor\
