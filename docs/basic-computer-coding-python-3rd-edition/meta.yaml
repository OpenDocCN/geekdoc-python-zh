    scientific computation, games, and even connect to and work with a myriad of relational
    and document-oriented database solutions. This course gets you up and running
    with using Python to program against relational and document-oriented databases
    such as SQLite, MySQL, SQL Server, and MongoDB. It teaches you the basic concepts
    of relational data, databases, tables, SQL, and walks you through the code required
