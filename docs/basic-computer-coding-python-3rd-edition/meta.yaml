    While this feature is not often needed, it can be used to extend the set of modules
    found in a package.


    # SUMMARY


    +   - In Python, a function is a block of code that performs a specific task or
    set of tasks. Functions help in modularizing code, making it more readable, reusable,
    and maintainable.

    - Python modules are files containing Python code that define functions, variables,
    and classes, among other things.

    - Python packages are collections of modules that provide specific functionality.
    They allow you to organize your code in a modular way, making it easier to manage
    and reuse.

    - The statement return [expression] exits a function, optionally passing back
    an expression to the caller. A return statement with no arguments is the same
    as return None.

    - Required arguments are the arguments passed to a function in correct positional
    order. Here, the number of arguments in the function call should match exactly
    with the function definition.

    - A default argument is an argument that assumes a default value if a value is
    not provided in the function call for that argument.

    - Python has a way to put definitions in a file and use them in a script or in
    an interactive instance of the interpreter. Such a file is called a module; definitions
    from a module can be imported into other modules or into the main module (the
    collection of variables that you have access to in a script executed at the top
    level and in calculator mode).

    - Packages are a way of structuring Python’s module namespace by using “dotted
    module names”.'
