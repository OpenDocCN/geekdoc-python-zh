  - "[PAGE 364]\n\n# SUMMARY\n\n+   - Python’s basic function model is simple to use,\
    \ but even simple function examples quickly led us to questions about the meaning\
    \ of variables in our code.\n- The scope of a variable or name defines its visibility\
    \ throughout your code. In Python, scope is implemented as either a Local, Enclosing,\
    \ Global, or Built-in scope.\n- In all cases, the scope of a variable (where it\
    \ can be used) is always determined by where it is assigned in your source code\
    \ and has nothing to do with which functions call which.\n- The global statement\
    \ and its nonlocal cousin are the only things that are remotely like declaration\
    \ statements in Python.\n- Functions provide nested namespaces (scopes) that localize\
    \ the names they use, such that names inside a function won’t clash with those\
    \ outside it (in a module or another function).\n- The global scope of a module\
    \ file becomes the attribute namespace of the module object once it is imported—importers\
    \ automatically have access to all of the file’s global variables, because a file’s\
    \ global scope morphs into an object’s attribute namespace when it is imported.\n\
    - Besides allowing names in enclosing defs to be changed, the nonlocal statement\
    \ also forces the issue for references—just like the global statement, nonlocal\
    \ causes searches for the names listed in the statement to begin in the enclosing\
    \ defs’ scopes, not in the local scope of the declaring function.\n- The nonlocal\
    \ statement mostly serves to allow names in enclosing scopes to be changed rather\
    \ than just referenced.\n\n# KNOWLEDGE CHECK\n\n+   1. **What is the scope of\
    \ a variable in Python?**\n   a. The region of code where the variable can be\
