    \ arguments passed to a function in correct positional order. Here, the number\
    \ of arguments in the function call should match exactly with the function definition.\n\
    - A default argument is an argument that assumes a default value if a value is\
    \ not provided in the function call for that argument.\n- Python has a way to\
    \ put definitions in a file and use them in a script or in an interactive instance\
