  - '[PAGE 88]


    A set can be created in two ways. First, you can define a set with the built-in
    set() function:


    ```

    x = set(<iter>)

    ```


    In this case, the argument <iter> is an iterable—again, for the moment, think
    list or tuple—that generates the list of objects to be included in the set. This
    is analogous to the <iter>argument given to the .extend() list method:


    ```

    >>> x = set([''foo'', ''bar'', ''baz'', ''foo'', ''qux''])

    >>> x

    {''qux'', ''foo'', ''bar'', ''baz''}

    ```


    ```

    >>> x = set((''foo'', ''bar'', ''baz'', ''foo'', ''qux''))

    >>> x

    {''qux'', ''foo'', ''bar'', ''baz''}

    ```


    Strings are also iterable, so a string can be passed to set() as well. You have
    already seen that list(s) generates a list of the characters in the **string**
    s. Similarly, set(s) generates a set of the characters in s:


    ```

    >>> s = ''quux''

    >>> list(s)

    [''q'', ''u'', ''u'', ''x'']

    >>> set(s)

    {''x'', ''u'', ''q''}

    ```


    You can see that the resulting sets are unordered: the original order, as specified
    in the definition, is not necessarily preserved. Additionally, duplicate values
    are only represented in the set once, as with the string ''foo'' in the first
    two examples and the letter ''u'' in the third.


    Alternately, a set can be defined with curly braces ({}):


    ```

    x = {<obj>, <obj>, ..., <obj>}

    ```


    When a set is defined this way, each <obj> becomes a distinct element of the set,
    even if it is an iterable. This behavior is similar to that of the .append() list
    method.


    Thus, the sets shown above can also be defined like this:


    ```

    >>> x = {''foo'', ''bar'', ''baz'', ''foo'', ''qux''}

    >>> x

    {''qux'', ''foo'', ''bar'', ''baz''}

    ```


    > **Keyword**

    String is traditionally a sequence of characters, either as a literal constant
    or as some kind of variable.'
