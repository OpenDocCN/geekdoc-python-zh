    A module is a file containing Python definitions and statements. The **file name**\
    \ is the module name with the suffix .py appended. Within a module, the module's\
    \ name (as a string) is available as the value of the global variable `__name__`.\
    \ For instance, use your favorite text editor to create a file called fibo.py\
    \ in the current directory with the following contents:\n\n```\n# Fibonacci numbers\
    \ module\n\ndef fib(n):    # write Fibonacci series up to n\n    a, b = 0, 1\n\
    \    while b < n:\n        print b,\n        a, b = b, a+b\n\ndef fib2(n):   #\
    \ return Fibonacci series up to n\n    result = []\n    a, b = 0, 1\n    while\
    \ b < n:\n        result.append(b)\n        a, b = b, a+b\n    return result\n\
    ```\n\nNow enter the Python interpreter and import this module with the following\
    \ command:\n\n```\n>>> import fibo\n```\n\nThis does not enter the names of the\
