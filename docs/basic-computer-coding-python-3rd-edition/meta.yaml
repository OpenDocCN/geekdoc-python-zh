    The following decorators implement test skipping and expected failures:


    unittest.skip(reason)

    Unconditionally skip the decorated test. reason should describe why the test is
    being skipped.


    unittest.skipIf(condition, reason)

    Skip the decorated test if condition is true.


    unittest.skipUnless(condition, reason)

    Skip the decorated test unless condition is true.


    unittest.expectedFailure()

    Mark the test as an expected failure. If the test fails when run, the test is
    not counted as a failure.


    exception unittest.SkipTest(reason)

    This exception is raised to skip a test.

    Usually you can use TestCase.skipTest() or one of the skipping decorators instead
    of raising this directly.


    Skipped tests will not have setUp() or tearDown() run around them. Skipped classes
    will not have setUpClass() or tearDownClass() run.


    # 4.3 COMPREHENSIONS


    Comprehensions are constructs that allow sequences to be built from other sequences.
    Types of comprehensions are supported in both Python 2 and Python 3:


    +   - list comprehensions

    - dictionary comprehensions

    - set comprehensions

    - generator comprehensions


    We will discuss them one by one. Once you get the hang of using list comprehensions
    then you can use any of them easily.


