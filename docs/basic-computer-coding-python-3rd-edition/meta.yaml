    \ SQL 注入攻击。\n\n### 9.5.2 DELETE 命令\n\n删除记录的工作方式与更新记录非常相似。您使用 DELETE 语句来删除选定的记录。\n\
    \n> **注意：** 删除是一个*不可逆*的过程。如果您不使用 WHERE 子句，那么指定表中的所有记录都将被删除。您需要再次运行 INSERT INTO\
    \ 查询才能恢复已删除的记录。\n\n建议您首先运行带有相同过滤器的 SELECT 查询，以确保您删除的是正确的记录。例如，要删除 reviewer_id\
    \ = 2 给出的所有评分，您应该首先运行相应的 SELECT 查询：\n\n```python\n>>> select_movies_query = \"\
    \"\"\n... SELECT reviewer_id, movie_id FROM ratings\n... WHERE reviewer_id = 2\n\
    ... \"\"\"\n>>> with connection.cursor() as cursor:\n...     cursor.execute(select_movies_query)\n\
    ...     for movie in cursor.fetchall():\n...         print(movie)\n...\n(2, 7)\n\
    (2, 8)\n(2, 12)\n(2, 23)\n```\n\n上面的代码片段输出了 ratings 表中 reviewer_id = 2 的记录的 reviewer_id\
    \ 和 movie_id。一旦您确认这些是您需要删除的记录，您就可以运行带有相同过滤器的 DELETE 查询：\n\n```python\ndelete_query\
    \ = \"DELETE FROM ratings WHERE reviewer_id = 2\"\nwith connection.cursor() as\
    \ cursor:\n    cursor.execute(delete_query)\n    connection.commit()\n```\n\n\
    通过此查询，您可以从 ratings 表中删除 reviewer_id = 2 的审阅者给出的所有评分。\n\n### 9.5.3 连接 Python 和\
    \ MySQL 的其他方式\n\n您看到了 MySQL Connector/Python，这是官方推荐的从 Python 应用程序与 MySQL 数据库交互的方式。还有另外两种流行的连接器：\n\
    \n- **mysqlclient** 是一个与官方连接器密切竞争的库，并且正在积极更新新功能。因为其核心是用 C 编写的，所以它比纯 Python 官方连接器具有更好的性能。一个很大的缺点是它相当难以设置和安装，尤其是在\
    \ Windows 上。\n- **MySQLdb** 是一个仍在商业应用程序中使用的遗留软件。它是用 C 编写的，比 MySQL Connector/Python\
    \ 更快，但仅适用于 Python 2。\n\n这些连接器充当您的程序和 MySQL 数据库之间的接口，您通过它们发送 SQL 查询。但许多开发人员更喜欢使用面向对象的范式而不是\
    \ SQL 查询来操作数据。\n\n**对象关系映射（ORM）** 是一种允许您直接使用面向对象语言查询和操作数据库中数据的技术。ORM 库封装了操作数据所需的代码，从而消除了使用任何\
    \ SQL 的需要。\n\n以下是基于 SQL 数据库的最流行的 Python ORM：\n\n- **SQLAlchemy** 是一个 ORM，它促进了\
    \ Python 和其他 SQL 数据库之间的通信。您可以为不同的数据库（如 MySQL、PostgreSQL、SQLite 等）创建不同的引擎。SQLAlchemy\
    \ 通常与 pandas 库一起使用，以提供完整的数据处理功能。\n- **peewee** 是一个轻量级且快速的 ORM，设置起来很快。当您与数据库的交互仅限于提取少量记录时，这非常有用。例如，如果您需要将选定的记录从\
    \ MySQL 数据库复制到 CSV 文件，那么 peewee 可能是您的最佳选择。\n- **Django ORM** 是 Django 最强大的功能之一，随\
    \ Django Web 框架一起提供。它可以与各种数据库（如 SQLite、PostgreSQL 和 MySQL）进行交互。许多基于 Django 的应用程序使用\
    \ Django ORM 进行数据建模和基本查询，但通常会切换到 SQLAlchemy 以满足更复杂的需求。\n\n## 榜样\n\n![](img/dd5296ef0d2e667ac2671bdbd5535cd0_329_0.png)\n\
