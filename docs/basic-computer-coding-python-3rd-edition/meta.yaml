    The use of compound data also enables us to increase the **modularity** of the
    programs. If we can manipulate geographic positions directly as objects in their
    own right, then we can separate the part of our program that deals with values
    per se from the details of how those values may be represented. The general technique
    of isolating the parts of a program that deal with how data are represented from
    the parts of a program that deal with how those data are manipulated is a powerful
    design methodology called *data abstraction*. Data abstraction makes programs
    much easier to design, maintain, and modify.


    Data abstraction is similar in character to functional abstraction. When we create
    a functional abstraction, the details of how a function is implemented can be
    suppressed, and the particular function itself can be replaced by any other function
    with the same overall behavior. In other words, we can make an abstraction that
    separates the way the function is used from the details of how the function is
    implemented. Analogously, data abstraction is a methodology that enables us to
    isolate how a compound data object is used from the details of how it is constructed.


    The basic idea of data abstraction is to structure programs so that they operate
    on abstract data. That is, our programs should use data in such a way as to make
    as few assumptions about the data as possible. At the same time, a concrete data
    representation is defined, independently of the programs that use the data. The
    interface between these two parts of our system will be a set of functions, called
    selectors and constructors, that implement the abstract data in terms of the concrete
    representation. To illustrate this technique, we will consider how to design a
    set of functions for manipulating rational numbers. As you read the next few sections,
    keep in mind that most Python code written today uses very high-level abstract
