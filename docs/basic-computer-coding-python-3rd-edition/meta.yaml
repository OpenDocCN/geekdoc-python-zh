    The scope of a variable or name defines its visibility throughout your code. In
    Python, scope is implemented as either a Local, Enclosing, Global, or Built-in
    scope. When you use a variable or name, Python searches these scopes sequentially
    to resolve it. If the name isn’t found, then you’ll get an error. This is the
    general mechanism that Python uses for name resolution and is known as the LEGB
    rule.


    # 10.1 PYTHON SCOPE BASICS


    Now that you’re ready to start writing your own functions, we need to get more
    formal about what names mean in Python. When you use a name in a program, Python
    creates, changes, or looks up the name in what is known as a namespace—a place
    where names live. When we talk about the search for a name’s value in relation
    to code, the term scope refers to a namespace: that is, the location of a name’s
    assignment in your code determines the scope of the name’s visibility to your
    code.


    > Source code is the fundamental component of a computer program that is created
    by a programmer, often written in the form of functions, descriptions, definitions,
    calls, methods and other operational statements.


    Just about everything related to names, including scope classification, happens
    at assignment time in Python. As we’ve seen, names in Python spring into existence
    when they are first assigned values, and they must be assigned before they are
    used. Because names are not declared ahead of time, Python uses the location of
    the assignment of a name to associate it with (i.e., bind it to) a particular
    namespace. In other words, the place where you assign a name in your **source
    code** determines the namespace it will live in, and hence its scope of visibility.


    Besides packaging code, functions add an extra namespace layer to your programs—
    by default, all names assigned inside a function are associated with that function’s
    namespace, and no other. This means that:


    +   - Names defined inside a def can only be seen by the code within that def.
    You cannot even refer to such names from outside the function.

    - Names defined inside a def do not clash with variables outside the def, even
    if the same names are used elsewhere. A name X assigned outside a given def (i.e.,
    in a different def or at the top level of a module file) is a completely different
    variable from a name X assigned inside that def.


    In all cases, the scope of a variable (where it can be used) is always determined
