    \n正如我们所见，global 允许我们在函数外部更改模块中的名称。它有一个名为 nonlocal 的近亲，也可以用来更改包含函数中的名称，但要理解这如何有用，我们首先需要探讨包含函数的一般概念。\n\
    \n## 10.3 作用域与嵌套函数\n\n到目前为止，我们有意省略了 Python 作用域规则的一部分，因为在实践中遇到它相对罕见。然而，是时候深入研究\
    \ LEGB 查找规则中的字母 E 了。E 层相当新（在 Python 2.2 中添加）；它采取任何和所有包含函数定义的局部作用域的形式。包含作用域有时也称为静态嵌套作用域。实际上，这种嵌套是词法上的——嵌套作用域对应于程序源代码中物理和语法上嵌套的代码结构。\n\
    \n### 10.3.1 嵌套作用域细节\n\n随着嵌套函数作用域的添加，变量查找规则变得稍微复杂一些。在函数内部：\n\n- 一个引用（X）首先在当前局部作用域（函数）中查找名称\
    \ X；然后在源代码中任何词法包含的函数的局部作用域中，从内到外查找；然后在当前全局作用域（模块文件）中查找；最后在内置作用域（模块 builtins）中查找。全局声明使搜索从全局（模块文件）作用域开始。\n\
    - 一个赋值（X = value）默认在当前局部作用域中创建或更改名称 X。如果 X 在函数内被声明为 global，则赋值会在包含模块的作用域中创建或更改名称\
    \ X。另一方面，如果 X 在函数内被声明为 nonlocal，则赋值会更改最近包含函数的局部作用域中的名称 X。\n\n请注意，global 声明仍然将变量映射到包含模块。当存在嵌套函数时，可以引用包含函数中的变量，但需要\
    \ nonlocal 声明才能更改它们。\n\n### 10.3.2 嵌套作用域示例\n\n以下是包含函数作用域的样子：\n\n```python\nX =\
    \ 99                # 全局作用域名称：未使用\n\ndef f1():\n    X = 88            # 包含 def\
    \ 的局部变量\n    def f2():\n        print(X)      # 在嵌套 def 中进行的引用\n    f2()\n\nf1()\
    \                  # 打印 88：包含 def 的局部变量\n```\n\n首先，这是合法的 Python 代码：def 只是一个可执行语句，可以出现在任何其他语句可以出现的地方——包括嵌套在另一个\
    \ def 中。这里，嵌套的 def 在调用函数 f1 时运行；它生成一个函数并将其赋值给名称 f2，这是 f1 局部作用域内的一个局部变量。从某种意义上说，f2\
    \ 是一个临时函数，仅在包含 f1 的执行期间存在（并且仅对 f1 中的代码可见）。\n\n但请注意 f2 内部发生的情况：当它打印变量 X 时，它引用的是存在于包含\
    \ f1 函数的局部作用域中的 X。因为函数可以访问所有物理上包含的 def 语句中的名称，所以 f2 中的 X 根据 LEGB 查找规则自动映射到 f1\
    \ 中的 X。\n\n即使包含函数已经返回，这种包含作用域查找也有效。例如，以下代码定义了一个函数，该函数创建并返回另一个函数：\n\n```python\n\
    def f1():\n    X = 88\n    def f2():\n        print(X)      # 记住包含 def 作用域中的 X\n\
    \    return f2     # 返回 f2 但不调用它\n\naction = f1()         # 创建、返回函数\naction()\
    \              # 现在调用它：打印 88\n```\n\n在此代码中，对 action 的调用实际上运行的是我们在 f1 运行时命名为 f2\
    \ 的函数。f2 记住了 f1 中包含作用域的 X，即使 f1 不再活跃。\n\n### 工厂函数\n\n根据你询问的对象，这种行为有时也称为闭包或工厂函数。这些术语指的是一个函数对象，它记住包含作用域中的值，无论这些作用域是否仍在内存中。虽然类通常最擅长记住状态，因为它们通过属性赋值使其显式化，但此类函数提供了一种替代方案。\n\
