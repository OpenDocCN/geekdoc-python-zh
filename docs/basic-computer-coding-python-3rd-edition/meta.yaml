    The threading module builds on the low-level features of thread to make working
    with threads even easier and more pythonic. Using threads allows a program to
    run multiple operations concurrently in the same process space. In Computer Science,
    threads are defined as the smallest unit of work which is scheduled to be done
    by an Operating System. Some points to consider about Threads are:


    +   - Threads exists inside a process.

    - Multiple threads can exist in a single process.

    - Threads in same process share the state and memory of the parent process.


    This was just a quick overview of Threads in general. This post will mainly focus
    on the threading module in Python.


    # 7.1.1 Getting Started with Python Multithreading


    Running several threads is similar to running several different programs concurrently,
    but with the following benefits –


    +   - Multiple threads within a process share the same data space with the main
    thread and can therefore share information or communicate with each other more
    easily than if they were separate processes.

    - Threads sometimes called light-weight processes and they do not require much
    memory overhead; they are cheaper than processes.


    A thread has a beginning, an execution sequence, and a conclusion. It has an instruction
    pointer that keeps track of where within its context it is currently running.


    +   - It can be pre-empted (interrupted)


    > Did You Know?

    Python 2.0 was released on 16 October 2000 and had many major new features, including
    a cycle-detecting garbage collector and support for Unicode. With this release,
    the development process became more transparent and community-backed.'
