    \ PYTHON PACKAGES\n\nPackages are a way of structuring Python’s module namespace\
    \ by using “dotted module names”. For example, the module name A.B designates\
    \ a submodule named B in a package named A. Just like the use of modules saves\
    \ the authors of different modules from having to worry about each other’s global\
    \ variable names, the use of dotted module names saves the authors of multi-module\
    \ packages like NumPy or Pillow from having to worry about each other’s module\
    \ names.\n\nSuppose you want to design a collection of modules (a “package”) for\
    \ the uniform handling of sound files and sound data. There are many different\
    \ sound file formats (usually recognized by their extension, for example: .wav,\
    \ .aiff, .au), so you may need to create and maintain a growing collection of\
    \ modules for the conversion between the various file formats. There are also\
    \ many different operations you might want to perform on sound data (such as mixing,\
    \ adding echo, applying an equalizer function, creating an artificial stereo effect),\
    \ so in addition you will be writing a never-ending stream of modules to perform\
    \ these operations. Here’s a possible structure for your package (expressed in\
    \ terms of a **hierarchical filesystem**):\n\n> **Keyword**\n>\n> **Hierarchical\
    \ file system** is a file system that uses directories to organize files into\
    \ a tree structure.\n\n```\nsound/              Top-level package\n    __init__.py\
    \       Initialize the sound package\n    formats/          Subpackage for file\
    \ format conversions\n        __init__.py\n        wavread.py\n        wavwrite.py\n\
    \        aiffread.py\n        aiffwrite.py\n        auread.py\n        auwrite.py\n\
    \        ...\n    effects/           Subpackage for sound effects\n        __init__.py\n\
    \        echo.py\n        surround.py\n        reverse.py\n        ...\n    filters/\
    \          Subpackage for filters\n        __init__.py\n        equalizer.py\n\
    \        vocoder.py\n        karaoke.py\n        ...\n```\n\n> A python package\
    \ is a collection of modules. Modules that are related to each other are mainly\
    \ put in the same package. When a module from an external package is required\
    \ in a program, that package can be imported and its modules can be put to use.\n\
    \nWhen importing the package, Python searches through the directories on sys.path\
    \ looking for the package subdirectory.\n\nThe __init__.py files are required\
    \ to make Python treat the directories as containing packages; this is done to\
    \ prevent directories with a common name, such as string, from unintentionally\
    \ hiding valid modules that occur later on the module search path. In the simplest\
    \ case, __init__.py can just be an empty file, but it can also execute initialization\
    \ code for the package or set the __all__ variable, described later.\n\nUsers\
    \ of the package can import individual modules from the package, for example:\n\
    \n```\nimport sound.effects.echo\n```\n\nThis loads the submodule sound.effects.echo.\
    \ It must be referenced with its full name.\n\n```\nsound.effects.echo.echofilter(input,\
    \ output, delay=0.7, atten=4)\n```\n\nAn alternative way of importing the submodule\
    \ is:\n\n```\nfrom sound.effects import echo\n```\n\nThis also loads the submodule\
    \ echo, and makes it available without its package prefix, so it can be used as\
    \ follows:\n\n```\necho.echofilter(input, output, delay=0.7, atten=4)\n```\n\n\
    Yet another variation is to import the desired function or variable directly:\n\
    \n```\nfrom sound.effects.echo import echofilter\n```\n\nAgain, this loads the\
    \ submodule echo, but this makes its function echofilter() directly available:\n\
    \n```\nechofilter(input, output, delay=0.7, atten=4)\n```\n\nNote that when using\
    \ from package import item, the item can be either a submodule (or subpackage)\
    \ of the package, or some other name defined in the package, like a function,\
    \ class or variable. The import statement first tests whether the item is defined\
    \ in the package; if not, it assumes it is a module and attempts to load it. If\
    \ it fails to find it, an ImportError exception is raised.\n\nContrarily, when\
    \ using syntax like import item.subitem.subsubitem, each item except for the last\
    \ must be a package; the last item can be a module or a package but can’t be a\
    \ class or function or variable defined in the previous item.\n\n### 2.3.1 Importing*\
    \ From a Package\n\nNow what happens when the user writes from sound.effects import\
    \ *? Ideally, one would hope that this somehow goes out to the filesystem, finds\
    \ which submodules are present in the package, and imports them all. This could\
    \ take a long time and importing sub-modules might have unwanted side-effects\
    \ that should only happen when the sub-module is explicitly imported.\n\nThe only\
    \ solution is for the package author to provide an explicit index of the package.\
    \ The import statement uses the following convention: if a package’s __init__.py\
    \ code defines a list named __all__, it is taken to be the list of module names\
    \ that should be imported when from package import * is encountered. It is up\
    \ to the package author to keep this list up-to-date when a new version of the\
    \ package is released. Package authors may also decide not to support it, if they\
    \ don’t see a use for importing * from their package. For example, the file sound/effects/__init__.py\
    \ could contain the following code:\n\n```\n__all__ = [\"echo\", \"surround\"\
    , \"reverse\"]\n```\n\nThis would mean that from sound.effects import * would\
    \ import the three named submodules of the sound package.\n\nIf __all__ is not\
    \ defined, the statement from sound.effects import * does *not* import all submodules\
    \ from the package sound.effects into the current namespace; it only ensures that\
    \ the package sound.effects has been imported (possibly running any initialization\
    \ code in __init__.py) and then imports whatever names are defined in the package.\
    \ This includes any names defined (and submodules explicitly loaded) by __init__.py.\
    \ It also includes any submodules of the package that were explicitly loaded by\
    \ previous import statements. Consider this code:\n\nIn May 2023 the Python Software\
    \ Foundation reported that the United States Department of Justice had subpoenaed\
    \ the user data of three PyPI contributors. A representative of the organization\
    \ further explained that they expect privacy for contributors, but they also comply\
    \ with the law and court orders, and for this reason turned over the data which\
    \ the government requested."
