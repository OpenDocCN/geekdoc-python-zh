    # 9.2 MYSQL WITH PYTHON


    MySQL is one of the most popular database management systems (DBMSs) on the market
    today. It ranked second only to the Oracle DBMS in this year’s DB-Engines Ranking.
    As most software applications need to interact with data in some form, programming
    languages like Python provide tools for storing and accessing these data sources.


    You’ll be able to efficiently integrate a MySQL database with a Python application.
    You’ll develop a small MySQL database for a movie rating system and learn how
    to query it directly from your Python code.


    > MySQL is free and open-source software under the terms of the GNU General Public
    License, and is also available under a variety of proprietary licenses. MySQL
    was owned and sponsored by the Swedish company MySQL AB, which was bought by Sun
    Microsystems (now Oracle Corporation).


    ![](img/dd5296ef0d2e667ac2671bdbd5535cd0_291_0.png)


    Structured Query Language is a standard Database language which is used to create,
    maintain and retrieve the relational database. Following are some interesting
    facts about SQL.


    +   - SQL is case insensitive. But it is a recommended practice to use keywords
    (like SELECT, UPDATE, CREATE, etc) in capital letters and use user defined things
    (liked table name, column name, etc) in small letters.

    - We can write comments in SQL using “--” (double hyphen) at the beginning of
    any line.

    - SQL is the programming language for relational databases (explained below) like
    MySQL, Oracle, Sybase, SQL Server, Postgre, etc. Other non-relational databases
    (also called NoSQL) databases like MongoDB, DynamoDB, etc do not use SQL

    - Although there is an ISO standard for SQL, most of the implementations slightly
    vary in syntax. So we may encounter queries that work in SQL Server but do not
    work in MySQL.'
- md: '## 9.2.1 Comparing MySQL to Other SQL Databases


    SQL stands for Structured Query Language and is a widely used programming language
    for managing relational databases. You may have heard of the different flavors
    of SQL-based DBMSs. The most popular ones include MySQL, PostgreSQL, SQLite, and
    SQL Server. All of these databases are compliant with the SQL standards but with
    varying degrees of compliance.


    Being open source since its inception in 1995, MySQL quickly became a market leader
    among SQL solutions. MySQL is also a part of the Oracle ecosystem. While its core
    functionality is completely free, there are some paid add-ons as well. Currently,
    MySQL is used by all major tech firms, including Google, LinkedIn, Uber, Netflix,
    Twitter, and others.


    Apart from a large open source community for support, there are many other reasons
    for MySQL’s success:


    - **Ease of installation:** MySQL was designed to be user-friendly. It’s quite
    straightforward to set up a MySQL database, and several widely available third-party
    tools, like phpMyAdmin, further streamline the setup process. MySQL is available
    for all major operating systems, including Windows, macOS, Linux, and Solaris.

    - **Speed:** MySQL holds a reputation for being an exceedingly fast database solution.
    It has a relatively smaller footprint and is extremely scalable in the long run.

    - **User privileges and security:** MySQL comes with a script that allows you
    to set the password security level, assign admin passwords, and add and remove
    user account privileges. This script uncomplicates the admin process for a web
    hosting user management portal. Other DBMSs, like PostgreSQL, use config files
    that are more complicated to use.


    While MySQL is famous for its speed and ease of use, you can get more advanced
    features with PostgreSQL. Also, MySQL isn’t fully SQL compliant and has certain
    functional limitations, like no support for FULL JOIN clauses.


    You might also face some issues with concurrent reading and writing in MySQL.
    If your software has many users writing data to it at once, then PostgreSQL might
    be a more suitable choice.


    > **Note:** For a more in-depth comparison of MySQL and PostgreSQL in a real-world
    context, check out Why Uber Engineering Switched from Postgres to MySQL.


    SQL Server is also a very popular DBMS and is known for its reliability, efficiency,
    and security. It’s preferred by companies, especially in the banking domain, who
    regularly deal with large traffic workloads. It’s a commercial solution and is
    one of the systems that are most compatible with Windows services.


    In 2010, when Oracle acquired Sun Microsystems and MySQL, many were worried about
    MySQL’s future. At the time, Oracle was MySQL’s biggest competitor. Developers
    feared that this was a hostile takeover from Oracle with the aim of destroying
    MySQL.


    Several developers led by Michael Widenius, the original author of MySQL, created
    a fork of the MySQL code base and laid the foundation of MariaDB. The aim was
    to secure access to MySQL and keep it free forever.


    To date, MariaDB remains fully GPL licensed, keeping it completely in the public
    domain. Some features of MySQL, on the other hand, are available only with paid
    licenses. Also, MariaDB provides several extremely useful features that aren''t
    supported by MySQL server, like distributed SQL and columnar storage. You can
    find more differences between MySQL and MariaDB listed on MariaDB''s website.


    MySQL uses a very similar syntax to the Standard SQL. There are, however, some
    notable differences mentioned in the official documentation.


    Keyword


    Operating system is system software that manages computer hardware and software
    resources, and provides common services for computer programs.


    ## 9.2.2 Installing MySQL Server and MySQL Connector/Python


    Now, you need to set up two things: a MySQL server and a MySQL connector. MySQL
    server will provide all the services required for handling your database. Once
    the server is up and running, you can connect your Python application with it
    using MySQL Connector/Python.


    ### Installing MySQL Server


    The official documentation details the recommended way to download and install
    MySQL server. You''ll find instructions for all popular operating systems, including
    Windows, macOS, Solaris, Linux, and many more.


    For Windows, the best way is to download MySQL Installer and let it take care
    of the entire process. The installation manager also helps you configure the security
    settings of the MySQL server. On the Accounts and Roles page, you need to enter
    a password for the **root** (admin) account and also optionally add other users
    with varying privileges:


    While you must specify credentials for the root account during setup, you can
    modify these settings later on. Remember the hostname, username, and password
    as these will be required to establish a connection with the MySQL server later
    on.


    Although you only need the MySQL server for this tutorial, you can also set up
    other helpful tools like MySQL Workbench using these installers. If you don''t
    want to install MySQL directly in your operating system, then deploying MySQL
    on Linux with Docker is a convenient alternative.


    ![](img/dd5296ef0d2e667ac2671bdbd5535cd0_294_0.png)


    ### Installing MySQL Connector/Python


    A database driver is a piece of software that allows an application to connect
    and interact with a database system. Programming languages like Python need a
    special driver before they can speak to a database from a specific vendor.


    These drivers are typically obtained as third-party modules. The Python Database
    API (DB-API) defines the standard interface with which all Python database drivers
    must comply. These details are documented in PEP 249. All Python database drivers,
    such as sqlite3 for SQLite, psycopg for PostgreSQL, and MySQL Connector/Python
    for MySQL, follow these implementation rules. Note: MySQL’s official documentation
    uses the term connector instead of driver. Technically, connectors are associated
    only with connecting to a database, not interacting with it. However, the term
    is often used for the entire database access module comprising the connector *and*
    the driver.


    To maintain consistency with the documentation, you’ll see the term connector
    whenever MySQL is mentioned.


    Many popular programming languages have their own database API. For example, Java
    has the Java Database Connectivity (JDBC) API. If you need to connect a Java application
    to a MySQL database, then you need to use the MySQL JDBC connector, which follows
    the JDBC API.


    Similarly, in Python you need to install a Python MySQL connector to interact
    with a MySQL database. Many packages follow the DB-API standards, but the most
    popular among them is MySQL Connector/Python. You can get it with pip:


    - $ pip install mysql-connector-python


    pip installs the connector as a third-party module in the currently active virtual
    environment. It’s recommended that you set up an isolated virtual environment
    for the project along with all the dependencies.


    To test if the installation was successful, type the following command on your
    Python terminal:


    ```

    >>>

    >>> import mysql.connector

    ```


    ![](img/dd5296ef0d2e667ac2671bdbd5535cd0_295_0.png)


    If the above code executes with no errors, then mysql.connector is installed and
    ready to use. If you encounter any errors, then make sure you''re in the correct
    virtual environment and you''re using the right Python interpreter.


    Make sure that you''re installing the correct mysql-connector-python package,
    which is a pure-Python implementation. Beware of similarly named but now deprecated
    connectors like mysql-connector.


    ## 9.2.3 Establishing a Connection with MySQL Server


    MySQL is a server-based database management system. One server might contain multiple
    databases. To interact with a database, you must first establish a connection
    with the server. The general workflow of a Python program that interacts with
    a MySQL-based database is as follows:


    - Connect to the MySQL server.

    - Create a new database.

    - Connect to the newly created or an existing database.

    - Execute a SQL query and fetch results.

    - Inform the database if any changes are made to a table.'
  mdcn: '## 9.2.1 将 MySQL 与其他 SQL 数据库进行比较


    SQL 代表结构化查询语言，是一种广泛用于管理关系型数据库的编程语言。你可能听说过不同风格的基于 SQL 的数据库管理系统。其中最流行的包括 MySQL、PostgreSQL、SQLite
    和 SQL Server。所有这些数据库都符合 SQL 标准，但符合程度各不相同。


    自 1995 年诞生以来，MySQL 一直是开源的，并迅速成为 SQL 解决方案中的市场领导者。MySQL 也是 Oracle 生态系统的一部分。虽然其核心功能完全免费，但也有一些付费的附加组件。目前，MySQL
    被所有主要科技公司使用，包括 Google、LinkedIn、Uber、Netflix、Twitter 等。


    除了庞大的开源社区支持外，MySQL 成功的原因还有很多：


    - **易于安装：** MySQL 的设计初衷就是用户友好。设置 MySQL 数据库相当简单直接，而且一些广泛可用的第三方工具，如 phpMyAdmin，进一步简化了设置过程。MySQL
    适用于所有主要操作系统，包括 Windows、macOS、Linux 和 Solaris。

    - **速度：** MySQL 以其极快的数据库解决方案而闻名。它的占用空间相对较小，并且从长远来看具有极强的可扩展性。

    - **用户权限和安全性：** MySQL 附带一个脚本，允许你设置密码安全级别、分配管理员密码以及添加和移除用户账户权限。这个脚本简化了网络托管用户管理门户的管理过程。其他数据库管理系统，如
    PostgreSQL，使用的配置文件则更为复杂。


    虽然 MySQL 以其速度和易用性而闻名，但你可以通过 PostgreSQL 获得更高级的功能。此外，MySQL 并非完全符合 SQL 标准，并且存在某些功能限制，例如不支持
    `FULL JOIN` 子句。


    你可能还会在 MySQL 中遇到一些并发读写的问题。如果你的软件有许多用户同时向其写入数据，那么 PostgreSQL 可能是更合适的选择。


    > **注意：** 要在实际场景中更深入地比较 MySQL 和 PostgreSQL，请查看《为什么 Uber 工程团队从 Postgres 切换到 MySQL》。


    SQL Server 也是一个非常流行的数据库管理系统，以其可靠性、效率和安全性而著称。它受到那些经常处理高流量工作负载的公司，尤其是银行领域的青睐。它是一个商业解决方案，并且是与
    Windows 服务兼容性最高的系统之一。


    2010 年，当 Oracle 收购 Sun Microsystems 和 MySQL 时，许多人担心 MySQL 的未来。当时，Oracle 是 MySQL
    最大的竞争对手。开发者们担心这是 Oracle 的一次恶意收购，旨在摧毁 MySQL。


    由 MySQL 原始作者 Michael Widenius 领导的几位开发者创建了 MySQL 代码库的一个分支，并奠定了 MariaDB 的基础。其目的是确保对
    MySQL 的访问权，并使其永远保持免费。


    迄今为止，MariaDB 仍然完全采用 GPL 许可证，使其完全处于公共领域。而 MySQL 的某些功能则仅通过付费许可证提供。此外，MariaDB 提供了
    MySQL 服务器不支持的几个非常有用的功能，例如分布式 SQL 和列式存储。你可以在 MariaDB 的网站上找到更多关于 MySQL 和 MariaDB
    之间差异的列表。


    MySQL 使用与标准 SQL 非常相似的语法。然而，官方文档中提到了一些显著的差异。


    关键词


    操作系统是管理计算机硬件和软件资源，并为计算机程序提供通用服务的系统软件。


    ## 9.2.2 安装 MySQL 服务器和 MySQL Connector/Python


    现在，你需要设置两样东西：一个 MySQL 服务器和一个 MySQL 连接器。MySQL 服务器将提供处理数据库所需的所有服务。一旦服务器启动并运行，你就可以使用
    MySQL Connector/Python 将你的 Python 应用程序与之连接。


    ### 安装 MySQL 服务器


    官方文档详细说明了下载和安装 MySQL 服务器的推荐方式。你会找到适用于所有流行操作系统的说明，包括 Windows、macOS、Solaris、Linux
    等等。


    对于 Windows，最好的方法是下载 MySQL Installer 并让它处理整个过程。安装管理器还可以帮助你配置 MySQL 服务器的安全设置。在“账户和角色”页面，你需要为
    **root**（管理员）账户输入密码，也可以选择添加具有不同权限的其他用户：


    虽然你必须在设置期间指定 root 账户的凭据，但你可以稍后修改这些设置。请记住主机名、用户名和密码，因为稍后建立与 MySQL 服务器的连接时将需要这些信息。


    尽管本教程只需要 MySQL 服务器，但你也可以使用这些安装程序设置其他有用的工具，如 MySQL Workbench。如果你不想直接在操作系统中安装 MySQL，那么使用
    Docker 在 Linux 上部署 MySQL 是一个方便的替代方案。


    ![](img/dd5296ef0d2e667ac2671bdbd5535cd0_294_0.png)


    ### 安装 MySQL Connector/Python


    数据库驱动程序是一段允许应用程序连接并与数据库系统交互的软件。像 Python 这样的编程语言在与特定供应商的数据库通信之前，需要一个特殊的驱动程序。


    这些驱动程序通常作为第三方模块获取。Python 数据库 API（DB-API）定义了所有 Python 数据库驱动程序必须遵守的标准接口。这些细节在 PEP
    249 中有详细说明。所有 Python 数据库驱动程序，例如用于 SQLite 的 sqlite3、用于 PostgreSQL 的 psycopg 以及用于
    MySQL 的 MySQL Connector/Python，都遵循这些实现规则。注意：MySQL 的官方文档使用术语“连接器”而不是“驱动程序”。从技术上讲，连接器仅与连接到数据库相关，而不涉及交互。然而，该术语通常用于指代包含连接器*和*驱动程序的整个数据库访问模块。


    为了与文档保持一致，每当提到 MySQL 时，你都会看到术语“连接器”。


    许多流行的编程语言都有自己的数据库 API。例如，Java 有 Java 数据库连接（JDBC）API。如果你需要将 Java 应用程序连接到 MySQL
    数据库，那么你需要使用遵循 JDBC API 的 MySQL JDBC 连接器。


    同样，在 Python 中，你需要安装一个 Python MySQL 连接器来与 MySQL 数据库交互。许多包遵循 DB-API 标准，但其中最流行的是
    MySQL Connector/Python。你可以通过 pip 获取它：


    - $ pip install mysql-connector-python


    pip 将连接器作为第三方模块安装在当前活动的虚拟环境中。建议你为项目设置一个独立的虚拟环境以及所有依赖项。


    要测试安装是否成功，请在你的 Python 终端中输入以下命令：


    ```

    >>>

    >>> import mysql.connector

    ```


    ![](img/dd5296ef0d2e667ac2671bdbd5535cd0_295_0.png)


    如果上述代码执行时没有错误，那么 mysql.connector 已安装并准备就绪。如果你遇到任何错误，请确保你在正确的虚拟环境中，并且使用的是正确的 Python
    解释器。


    确保你安装的是正确的 mysql-connector-python 包，这是一个纯 Python 实现。请注意类似名称但现已弃用的连接器，如 mysql-connector。


    ## 9.2.3 与 MySQL 服务器建立连接


    MySQL 是一个基于服务器的数据库管理系统。一个服务器可能包含多个数据库。要与数据库交互，你必须首先与服务器建立连接。与基于 MySQL 的数据库交互的
    Python 程序的一般工作流程如下：


    - 连接到 MySQL 服务器。

    - 创建一个新数据库。

    - 连接到新创建的或现有的数据库。

    - 执行 SQL 查询并获取结果。

    - 如果对表进行了任何更改，则通知数据库。'
