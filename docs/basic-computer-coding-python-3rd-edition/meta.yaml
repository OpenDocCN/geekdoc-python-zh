- md: "## 3.3.1 The open function\n\nThe syntax to read and write files in Python\
    \ is similar to other **programming languages** but a lot easier to handle. Here\
    \ are some of the basic functions that will help you to work with files using\
    \ Python:\n\n- `open()` to open files in your system, the filename is the name\
    \ of the file to be opened;\n- `read()` to read entire files;\n- `readline()`\
    \ to read one line at a time;\n- `write()` to write a string to a file, and return\
    \ the number of characters written; and\n- `close()` to close the file.\n\n> **Keyword**\n\
    > Programming language is a formal language, which comprises a set of instructions\
    \ used to produce various kinds of output.\n\n```python\n# File modes (2nd argument):\
    \ 'r'(read), 'w'(write), 'a'(appending), 'r+'(both reading and writing)\nf = open('file_name',\
    \ 'w')\n\n# Reads entire file\nf.read()\n# Reads one line at a time\nf.readline()\n\
    # Writes the string to the file, returning the number of char written\nf.write('Add\
    \ this line.')\nf.close()\n```\n\nThe second argument in the `open()` function\
    \ is the file mode. It allows you to specify whether you want to read (`r`), write\
    \ (`w`), append (`a`) or both read and write (`r+`).\n\nThe open function takes\
    \ two arguments. The first is the name of the file, and the second is the **mode**.\
    \ Mode `'w'` means that we are opening the file for writing. Mode `'r'` means\
    \ reading, and mode `'a'` means appending.\n\nLet's begin with an example that\
    \ shows these three modes in operation:\n\n## Dictionaries, Sets, and Files\n\n\
    ```python\n>>> myfile = open('test.txt', 'w')\n>>> myfile.write('My first file\
    \ written from Python\\n')\n34\n>>> myfile.write('-----------------------------------\\\
    n')\n34\n>>> myfile.write('Hello, world!')\n13\n>>> myfile.close()\n>>> myfile\
    \ = open('test.txt', 'r')\n>>> contents = myfile.read()\n>>> myfile.close()\n\
    >>> print(contents)\nMy first file written from Python\n-----------------------------------\n\
    Hello, world!\n```\n\nOpening a file creates what we call a file descriptor. In\
    \ this example, the variable `myfile` refers to the new descriptor object. Our\
    \ program calls methods on the descriptor, and this makes changes to the actual\
    \ file which is located in non-volatile storage.\n\nThe first line opens the `test.txt`\
    \ for writing. If there is no file named `test.txt` on the disk, it will be created.\
    \ If there already is one, it will be replaced by the file we are writing and\
    \ any previous data in it will be lost.\n\nTo put data in the file we invoke the\
    \ `write` method on the file descriptor. We do this three times in the example\
    \ above, but in bigger programs, the three separate calls to `write` will usually\
    \ be replaced by a loop that writes many more lines into the file. The `write`\
    \ method returns the number of bytes (characters) written to the file.\n\nClosing\
    \ the file handle tells the system that we are done writing and makes the disk\
    \ file available for reading by other programs (or by our own program).\n\nWe\
    \ finish this example by opening `test.txt` for reading. We then call the `read`\
    \ method, assigning the contents of the file, which is a string, to a variable\
    \ named `contents`, and finally print `contents` to see that it is indeed what\
    \ we wrote to the file previously.\n\nIf we want to add to an already existing\
    \ file, use the *append* mode.\n\n```python\n>>> myfile = open('test.txt', 'a')\n\
    >>> myfile.write('\\nOoops, I forgot to add this line ;-)')\n37\n>>> myfile.close()\n\
    >>> myfile = open('test.txt', 'r')\n>>> print(myfile.read())\nMy first file written\
    \ from Python\n-----------------------------------\nHello, world!\nOoops, I forgot\
    \ to add this line ;-)\n>>>\n```\n\n> Many common files you may use, such as Word\
    \ documents or Excel spreadsheets are NOT text documents. They have their own\
    \ complicated file formats. Text files are ones you can create in simple text\
    \ editors, by simply typing regular keys without any special features, such as\
    \ bolding text, different fonts, etc.\n\n## 3.3.2 Opening a File that Doesn’t\
    \ Exist\n\nIf we try to open a file that doesn’t exist, we get an error:\n\n```python\n\
    >>> f = open('wharrah.txt', 'r')\nTraceback (most recent call last):\n  File \"\
    <stdin>\", line 1, in <module>\nIOError: [Errno 2] No such file or directory:\
    \ 'wharrah.txt'\n>>>\n```\n\nThere is nothing wrong with the syntax of the line\
    \ that resulted in the error. The error occurred because the file did not exist.\
    \ **Errors** like these are called **exceptions**. Most modern programming languages\
    \ provide support for dealing with situations like this. The process is called\
    \ exception handling.\n\nIn Python, exceptions are handled with the `try ... except`\
    \ statement.\n\n```python\ntry:\n    f = open('thefile.txt', 'r')\n    mydata\
    \ = f.read()\n    f.close()\nexcept IOError:\n    mydata = ''\n```\n\nIn this\
    \ example we *try* to open the data file for reading. If it succeeds, we use the\
    \ `read()` method to read the file contents as a string into the variable `mydata`\
    \ and close the file. If an `IOError` exception occurs, we still create `mydata`\
    \ as an empty string and continue on with the program.\n\n## 3.3.3 Reading Data\
    \ from Files\n\nPython file descriptors have three methods for reading in data\
    \ from a file. We’ve already seen the `read()` method, which returns the entire\
    \ contents of the file as a single string. For really big files this may not be\
    \ what you want.\n\nThe `readline()` method returns one line of the file at a\
    \ time. Each time you call it `readline()` returns the next line. Calls made to\
    \ `readline()` after reaching the end of the file return an empty string (`''`).\n\
    \n```python\nf = open('test.txt', 'r')\nwhile True:                    # keep\
    \ reading forever\n    theline = f.readline()     # try to read next line\n  \
    \  if len(theline) == 0:      # if there are no more lines\n        break    \
    \              # leave the loop\n\n    # Now process the line we've just read\n\
    \    print(theline, end='')\n\nf.close()\n```\n\nThis is a handy pattern for our\
    \ toolbox. In bigger programs, we’d squeeze more extensive logic into the body\
    \ of the loop at line 8 — for example, if each line of the file contained the\
    \ name and email address of one of our friends, perhaps we'd split the line into\
    \ some pieces and call a function to send the friend a party invitation.\n\nOn\
    \ line 8 we suppress the newline character that `print` usually appends to our\
    \ strings. Why? This is because the string already has its own newline: the `readline`\
    \ method in line 3 returns everything up to *and including* the newline character.\
    \ This also explains the end-of-file detection logic: when there are no more lines\
    \ to be read from the file, `readline` returns an empty string — one that does\
    \ not even have a newline at the end, hence its length is 0.\n\n## Turning a File\
    \ into a List of Lines\n\nIt is often useful to fetch data from a disk file and\
    \ turn it into a list of lines. Suppose we have a file containing our friends\
    \ and their email addresses, one per line in the file. But we'd like the lines\
    \ sorted into alphabetical order. A good plan is to read everything into a list\
    \ of lines, then sort the list, and then write the sorted list back to another\
    \ file:\n\n```python\nf1 = open('friends.txt', 'r')\nfriends_list = f.readlines()\n\
    f1.close()\n\nfriends_list.sort()\n\nf2 = open('sortedfriends.txt', 'w')\nfor\
    \ friend in friends_list:\n    f2.write(friend)\nf2.close()\n```\n\nThe `readlines`\
    \ method in line 2 reads all the lines and returns a list of the strings.\n\n\
    We could have used the template to read each line one-at-a-time, and to build\
    \ up the list ourselves, but it is a lot easier to use the method that the Python\
    \ implementors gave us!\n\n## An Example\n\nMany useful line-processing programs\
    \ will read a text file line-at-a-time and do some minor processing as they write\
    \ the lines to an output file. They might number the lines in the output file,\
    \ or insert extra blank lines after every 60 lines to make it convenient for printing\
    \ on sheets of paper, or extract some specific columns only from each line.\n\n\
    > **Did You Know?**\n> The `update()` method is useful whenever we want to merge\
    \ dictionaries or add new key:value pairs using an iterable (iterables are, for\
    \ instance, lists or tuples).\n\n> **Keyword**\n> Line-processing programs refer\
    \ to computer programs that process data line by line, typically reading input\
    \ data one line at a time and producing output accordingly."
  mdcn: "## 3.3.1 open 函数\n\nPython 中读写文件的语法与其他**编程语言**类似，但处理起来要简单得多。以下是一些基本函数，可帮助你使用\
    \ Python 处理文件：\n\n- `open()` 用于打开系统中的文件，文件名是要打开的文件的名称；\n- `read()` 用于读取整个文件；\n\
    - `readline()` 用于逐行读取；\n- `write()` 用于将字符串写入文件，并返回写入的字符数；以及\n- `close()` 用于关闭文件。\n\
    \n> **关键词**\n> 编程语言是一种形式语言，包含一组用于产生各种输出的指令。\n\n```python\n# 文件模式（第二个参数）：'r'（读取）、'w'（写入）、'a'（追加）、'r+'（同时读写）\n\
    f = open('file_name', 'w')\n\n# 读取整个文件\nf.read()\n# 逐行读取\nf.readline()\n# 将字符串写入文件，返回写入的字符数\n\
