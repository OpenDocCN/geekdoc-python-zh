- md: "## 7.2.1 Thread-Local Data\n\nThat data for which the values are thread-specific,\
    \ is thread-local. To manage such data, we can create an instance of local/a subclass,\
    \ and then store attributes on it.\n\n```\n>>> mydata=threading.local()\n>>> mydata.x=7\n\
    >>>\n```\n\nThese instance values differ for each thread. We have the following\
    \ class denoting thread-local data:\n\nclass threading.local\n\nA class that represents\
    \ thread-local data.\n\n## 7.2.2 Thread Objects\n\nThe Thread class denotes an\
    \ activity running in a separate thread of control. We can represent this activity\
    \ either by passing a callable object to the constructor, or by overriding the\
    \ method run() in a subclass. You must make sure to not override other methods\
    \ in a subclass, except for the constructor. In short, only override a class’\
    \ __init__() and .run() methods.\n\nOnce the interpreter creates a thread object,\
    \ we must start its activity by calling its start() method. This will invoke its\
    \ run() method in a separate thread of control. Once this happens, we consider\
    \ the thread to be ‘alive’. When run() terminates normally or raising an exception\
    \ we did not handle, it is no longer alive. To test whether a thread is alive,\
    \ we may use the method is_alive().\n\nA thread may call another’s join() method.\
    \ This will block the calling thread until the other terminates.\n\nThreads have\
    \ names, and we can pass these names to the constructor, and even read or modify\
    \ them.\n\nWe can flag a thread as a ‘daemon thread’. This means that the whole\
    \ program exits when only the daemon threads remain. This initial value comes\
    \ from the creating thread. We can set this flag via the property ‘daemon’, or\
    \ via the **constructor** argument ‘daemon’. Daemons abruptly stop at shutdown,\
    \ and they may not properly release all the resources held. These resources may\
    \ include open files, database transactions, and others. To stop our threads gracefully,\
    \ we must make them non-daemonic. It is also preferable to use a suitable signaling\
    \ process, like an Event.\n\nThe ‘main thread’ object pertains to the initial\
    \ thread of control in our program; it is not a daemon.\n\nFinally, it is possible\
    \ that the interpreter creates ‘dummy thread objects’. These are ‘alien threads’\
    \ (threads of control started outside ‘threading’, for ex, directly from C code).\
    \ Such objects have limited functionality, and are always live and daemonic. We\
    \ cannot join() them. We can also never delete them since it is impossible to\
    \ detect when they terminate.\n\nThis is the class:\n\n```\nclass threading.Thread(group=None,\
    \ target=None,\n    name=None, args=(), kwargs={}, *, daemon=None)\n```\n\nTake\
    \ note:\n\n> **Keyword**\n>\n> **Constructor** is a block of codes similar to\
    \ the method. It is called when an instance of the class is created.\n\n# Basic\
    \ Computer Coding: Python\n\n- Always call the constructor with keyword arguments.\
    \ It has the following arguments:\n- *group* must be None. Python reserves this\
    \ for future extension when we implement a ThreadGroup class.\n- *target* is a\
    \ callable object that run() will invoke. The default for this is None, which\
    \ means it calls nothing.\n- *name* is the name of the thread. The default for\
    \ this is “Thread-N”. Here, N is a small decimal number.\n- *args* is an argument\
    \ tuple. It helps invoke the target. The default for this is ().\n- *kwargs* is\
    \ a dictionary holding keyword arguments. Even this helps invoke the target. The\
    \ default for this is {}.\n- *daemon* decides whether the thread is daemonic.\
    \ When None, it inherits the daemonic property from the current thread. The default\
    \ for this is None.\n- Ensure that you invoke the base class constructor(Thread.__init__())\
    \ first if the subclass overrides the constructor.\n\nThread has the following\
    \ methods:\n\n### a. start()\n\nThis starts thread activity. For a thread object,\
    \ we can call it maximum once; if we call it again, it raises a RuntimeError.\
    \ This lets run() for the object invoke in a separate thread of control.\n\n```\n\
    >>> threading.Thread.start(threading.current_thread())\nTraceback (most recent\
    \ call last):\n  File \"<pyshell#135>\", line 1, in <module>\n    threading.Thread.start(threading.current_thread())\n\
    RuntimeError: threads can only be started once\n```\n\n### b. run()\n\nThis method\
    \ explains the thread’s activity. It invokes the callable object we passed to\
    \ the object’s constructor as the target argument, if it exists. This is with\
    \ keyword and sequential arguments from *kwargs* and *args*.\nWe can override\
    \ run() in a subclass.\n\n### c. join(timeout=None)\n\nFor join() to work, we\
    \ must wait until the thread terminates. Because when that happens, it blocks\
    \ the calling thread until the one on which we call join() terminates normally\
    \ or via an exception we did not handle, or until *timeout* occurs.\nWhen you\
    \ do provide a *timeout* (other than None), make sure it is a floating point number.\
    \ This is so you can pass a timeout in seconds or fractions.\nSo, what is the\
    \ return value? Well, join() always returns None. Hence, you will need to call\
    \ is_alive() after calling join() to determine if a timeout happened. If we find\
    \ out that it is indeed still alive, then we infer that the join() call timed\
    \ out.\n\nHowever, if *timeout* is None, or if we did not pass it, this blocks\
    \ the operation until the thread terminates. We can join() a thread many times.\n\
    \nFinally, join() will raise a RuntimeError if we try to join the current thread,\
    \ because that causes a deadlock. To join() a thread before we start it also causes\
    \ an error.\n\n```\n>>> threading.Thread.join(threading.current_thread())\nTraceback\
    \ (most recent call last):\n  File \"<pyshell#138>\", line 1, in <module>\n  \
    \  threading.Thread.join(threading.current_thread())\nRuntimeError: cannot join\
    \ current thread\n```\n\n### d. name\n\nThis is a string we use for identification;\
    \ it has no meaning. We can also give the same meaning to multiple threads. The\
    \ constructor sets the initial name.\n\n```\n>>> threading.Thread.name='First'\n\
    >>>\n```\n\n### e. getName() and setName()\n\nThese are old getter and setter\
    \ APIs for *name*. We use them directly as properties.\n\n### f. ident\n\nIf we\
    \ started the thread, this returns its identifier. Otherwise, it returns None.\
    \ Note that it is a non-zero integer, like in the get_ident() function. Python\
    \ may recycle identifiers when one thread exits and another creates. Such identifiers\
    \ exist even after a thread exits.\n\n### g. is_alive()\n\nThis returns whether\
    \ the thread is alive. is_alive() returns true from just before run() starts until\
    \ just after it terminates.\n\n```\n>>> threading.Thread.is_alive(threading.current_thread())\n\
    True\n```\n\n### h. daemon\n\ndaemon is a Boolean value that tells us whether\
    \ the thread is a daemon. If it is, it returns True. We must set it before we\
    \ call start(). Otherwise, it raises a RuntimeError. Its initial value comes from\
    \ the creating thread. The main thread is not a daemon.\n\n> Whenever a function\
    \ wants to modify a variable, it locks that variable. When another function wants\
    \ to use a variable, it must wait until that variable is unlocked."
  mdcn: "## 7.2.1 线程局部数据\n\n其值为线程特定的数据，称为线程局部数据。要管理此类数据，我们可以创建一个 `local` 类（或其子类）的实例，然后在该实例上存储属性。\n\
