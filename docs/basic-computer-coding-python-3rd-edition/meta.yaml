- md: "# PREFACE\n\nPython is a powerful object-oriented programming language created\
    \ by Guido van Rossum. It is widely recognized for its user-friendly syntax, making\
    \ it an excellent choice for beginners in programming. Python’s simplicity and\
    \ ease of use make it an ideal starting point for learning the basics of coding.\
    \ The language’s strength lies in its high-level built-in data structures, dynamic\
    \ typing, and dynamic binding, making it well-suited for tasks such as Rapid Application\
    \ Development (RAD) and scripting.\n\nPython serves as an effective “glue” language,\
    \ seamlessly connecting different components and technologies. Its readability\
    \ is a key feature, thanks to a straightforward syntax that reduces program maintenance\
    \ costs. Generally, Python is known for its versatility and is widely used in\
    \ various domains, from web development to data science and beyond.\n\n# Organization\
    \ of the Book\n\nThis edition is organized into ten chapters, serving as a comprehensive\
    \ guide for individuals looking to embark on their journey with Python programming.\
    \ It not only instructs on the fundamental principles of Python but also delves\
    \ into the reasons behind learning the language and provides effective strategies\
    \ for acquiring this skill. It commences with fundamental programming concepts,\
    \ progressively covering topics such as functions, recursion, data structures,\
    \ and object-oriented design.\n\n**Chapter 1** presents an introduction to Python.\
    \ You will learn the Python environment setup, syntax of Python and Python variables.\
    \ Basic operators of Python are also discussed.\n\n**Chapter 2** aims to focus\
    \ on Python functions, modules and packages. In Python, function is a group of\
    \ related statements that perform a specific task. Functions help break our program\
    \ into smaller and modular parts. It also describes the python modules and python\
    \ packages.\n\n**Chapter 3** begins with python dictionaries. It also explains\
    \ Python sets and files used in Python. They can be used to read and write text\
    \ memos, audio clips, Excel documents, saved email messages, and whatever else\
    \ you happen to have stored on your machine.\n\n**Chapter 4** gives an overview\
    \ of how to use the exceptions. Further, it explains the unit testing used to\
    \ validate that each unit of the software performs as designed. In last, the chapter\
    \ focuses on understanding the comprehensions that allow sequences to be built\
    \ from other sequences.\n\n**Chapter 5** is aimed to discuss the use of OOPS in\
    \ python, including various types of methods of OOPS. The programming challenge\
    \ was seen as how to write the logic, not how to define the data. Object-oriented\
    \ programming takes the view that what we really care about are the objects we\
    \ want to manipulate rather than the logic required to manipulate them.\n\n**Chapter\
    \ 6** focuses on Python regular expression that helps you match or find other\
    \ strings or sets of strings, using a specialized syntax held in a pattern.\n\n\
    **Chapter 7** discusses about Python Multithreading used to implement multithreading\
    \ in python programs and also used to run multiple threads (tasks, function calls)\
    \ at the same time.\n\n**Chapter 8** covers the fundamentals of Python scope,\
    \ providing a thorough exploration of its basics. Readers will gain a clear understanding\
    \ of how scope functions within the Python programming language.\n\n**Chapter\
    \ 9** covers Python Database Programming, exploring how to interact with databases\
    \ using Python.\n\n**Chapter 10** examines the fundamentals of Python scope, providing\
    \ insights into variable visibility and lifetime within different parts of a program.\n\
    \n# CHAPTER 1\n\n# INTRODUCTION TO PYTHON\n\n# INTRODUCTION\n\nPython is a high-level,\
    \ versatile programming language known for its simplicity and readability. It\
    \ was created by Guido van Rossum and first released in 1991. Python is widely\
    \ used for various applications, including web development, data analysis, artificial\
    \ intelligence, machine learning, scientific computing, and more.\n\nPython is\
    \ dynamically typed and garbage-collected. It supports multiple programming paradigms,\
    \ including structured (particularly procedural), object-oriented and functional\
    \ programming. It is often described as a “batteries included” language due to\
    \ its comprehensive standard library. Guido van Rossum began working on Python\
    \ in the late 1980s as a successor to the ABC programming language and first released\
    \ it in 1991 as Python 0.9.0. Python 2.0 was released in 2000. Python 3.0, released\
    \ in 2008, was a major revision not completely backward-compatible with earlier\
    \ versions. Python 2.7.18, released in 2020, was the last release of Python 2.\
    \ Python consistently ranks as one of the most popular programming languages.\n\
    \nPython uses dynamic typing and a combination of reference counting and a cycle-detecting\
    \ garbage collector for memory management. It uses dynamic name resolution (late\
    \ binding), which binds method and variable names during program execution.\n\n\
    Its design offers some support for functional programming in the Lisp tradition.\
    \ It has filter, map and reduce functions; list comprehensions, dictionaries,\
    \ sets, and generator expressions. The standard library has two modules (itertools\
    \ and functools) that implement functional tools borrowed from Haskell and Standard\
    \ ML.\n\nPython’s syntax is designed to be readable and straightforward. It uses\
    \ indentation (whitespace) to define code blocks, making it easy to understand\
    \ the structure of the code. This is a departure from languages that use braces\
    \ or keywords to delineate blocks.\n\n```python\n# Example of Python code\nif\
    \ True:\n    print(\"This condition is True\")\n```\n\nPython’s versatility, readability,\
    \ and extensive community support make it an excellent choice for beginners and\
    \ professionals alike. Its ease of learning and application in various domains\
    \ have contributed to its widespread adoption in the software development industry.\n\
    \nAfter studying this chapter, you will be able to:\n\n- Explain the basics of\
    \ Python\n- Learn about Python environment setup\n- Describe the basic syntax\
    \ of Python\n- Understand Python variables\n- Discuss about basic operators of\
    \ Python\n\n# 1.1 OVERVIEW OF PYTHON\n\nPython is a high-level, interpreted, interactive\
    \ and object-oriented scripting language. Python is designed to be highly readable.\
    \ It uses English keywords frequently where as other languages use punctuation,\
    \ and it has fewer syntactical constructions than other languages.\n\n- **Python\
    \ is Interpreted** – Python is processed at runtime by the interpreter. You do\
    \ not need to compile your program before executing it. This is similar to PERL\
    \ and PHP.\n- **Python is Interactive** – You can actually sit at a Python prompt\
    \ and interact with the interpreter directly to write your programs.\n- **Python\
    \ is Object-Oriented** – Python supports Object-Oriented style or technique of\
    \ programming that encapsulates code within objects.\n- **Python is a Beginner’s\
    \ Language** – Python is a great language for the beginner-level programmers and\
    \ supports the development of a wide range of applications from simple text processing\
    \ to WWW browsers to games.\n\n# 1.1.1 History of Python\n\nPython was developed\
    \ by Guido van Rossum in the late eighties and early nineties at the National\
    \ Research Institute for Mathematics and Computer Science in the Netherlands.\n\
    \nPython is derived from many other languages, including ABC, Modula-3, C, C++,\
    \ Algol-68, SmallTalk, and Unix shell and other scripting languages.\n\nPython\
    \ is copyrighted. Like Perl, Python source code is now available under the GNU\
    \ General Public License (GPL).\n\nPython is now maintained by a core development\
    \ team at the institute, although Guido van Rossum still holds a vital role in\
    \ directing its progress.\n\n# 1.1.2 Python Features\n\nPython’s features include\
    \ –\n\n- **Easy-to-learn** – Python has few keywords, simple structure, and a\
    \ clearly defined syntax. This allows the student to pick up the language quickly.\n\
    - **Easy-to-read** – Python code is more clearly defined and visible to the eyes.\n\
    - **Easy-to-maintain** – Python’s source code is fairly easy-to-maintain.\n- **A\
    \ broad standard library** – Python’s bulk of the library is very portable and\
    \ cross-platform compatible on UNIX, Windows, and Macintosh.\n- **Interactive\
    \ Mode** – Python has support for an interactive mode which allows interactive\
    \ testing and debugging of snippets of code.\n- **Portable** – Python can run\
    \ on a wide variety of hardware platforms and has the same interface on all platforms.\n\
    - **Extendable** – You can add low-level modules to the Python interpreter. These\
    \ modules enable programmers to add to or customize their tools to be more efficient.\n\
    - **Databases** – Python provides interfaces to all major commercial databases.\n\
    - **GUI Programming** – Python supports GUI applications that can be created and\
    \ ported to many system calls, libraries and windows systems."
  mdcn: "# 前言\n\nPython 是由吉多·范罗苏姆创建的一种强大的面向对象编程语言。它因其用户友好的语法而广受认可，是编程初学者的绝佳选择。Python\
    \ 的简洁性和易用性使其成为学习编码基础知识的理想起点。该语言的优势在于其高级内置数据结构、动态类型和动态绑定，使其非常适合快速应用开发（RAD）和脚本编写等任务。\n\
    \nPython 作为一种有效的“胶水”语言，能够无缝连接不同的组件和技术。其可读性是一个关键特性，这得益于简洁的语法，降低了程序维护成本。总的来说，Python\
    \ 以其多功能性而闻名，广泛应用于从 Web 开发到数据科学等各个领域。\n\n# 本书结构\n\n本版分为十章，为希望开启 Python 编程之旅的人士提供全面指南。它不仅教授\
    \ Python 的基本原理，还深入探讨学习该语言的原因，并提供掌握这项技能的有效策略。内容从基础编程概念开始，逐步涵盖函数、递归、数据结构和面向对象设计等主题。\n\
    \n**第 1 章** 介绍了 Python。你将学习 Python 环境设置、Python 语法和 Python 变量。同时也会讨论 Python 的基本运算符。\n\
    \n**第 2 章** 旨在重点介绍 Python 函数、模块和包。在 Python 中，函数是执行特定任务的一组相关语句。函数有助于将我们的程序分解为更小的模块化部分。本章还描述了\
    \ Python 模块和 Python 包。\n\n**第 3 章** 从 Python 字典开始。它还解释了 Python 集合和 Python 中使用的文件。它们可用于读写文本备忘录、音频片段、Excel\
    \ 文档、保存的电子邮件消息以及你碰巧存储在机器上的任何其他内容。\n\n**第 4 章** 概述了如何使用异常。此外，它解释了用于验证软件每个单元是否按设计执行的单元测试。最后，本章重点介绍理解推导式，它允许从其他序列构建序列。\n\
    \n**第 5 章** 旨在讨论面向对象编程（OOP）在 Python 中的使用，包括 OOP 的各种方法类型。编程挑战被视为如何编写逻辑，而不是如何定义数据。面向对象编程的观点是，我们真正关心的是我们想要操作的对象，而不是操作它们所需的逻辑。\n\
    \n**第 6 章** 重点介绍 Python 正则表达式，它帮助你使用存储在模式中的专用语法来匹配或查找其他字符串或字符串集。\n\n**第 7 章**\
    \ 讨论了 Python 多线程，用于在 Python 程序中实现多线程，也用于同时运行多个线程（任务、函数调用）。\n\n**第 8 章** 涵盖了 Python\
    \ 作用域的基础知识，对其基础进行了深入探讨。读者将清楚地了解作用域在 Python 编程语言中是如何运作的。\n\n**第 9 章** 涵盖了 Python\
    \ 数据库编程，探讨如何使用 Python 与数据库进行交互。\n\n**第 10 章** 检查了 Python 作用域的基础知识，深入探讨了程序不同部分中变量的可见性和生命周期。\n\
    \n# 第 1 章\n\n# Python 简介\n\n# 引言\n\nPython 是一种高级、通用的编程语言，以其简洁性和可读性而闻名。它由吉多·范罗苏姆创建，于\
    \ 1991 年首次发布。Python 广泛应用于各种应用，包括 Web 开发、数据分析、人工智能、机器学习、科学计算等。\n\nPython 是动态类型和垃圾回收的。它支持多种编程范式，包括结构化（特别是过程式）、面向对象和函数式编程。由于其全面的标准库，它通常被描述为一种“自带电池”的语言。吉多·范罗苏姆在\
    \ 20 世纪 80 年代末开始开发 Python，作为 ABC 编程语言的后继者，并于 1991 年首次发布为 Python 0.9.0。Python 2.0\
    \ 于 2000 年发布。Python 3.0 于 2008 年发布，是一次重大修订，与早期版本不完全向后兼容。Python 2.7.18 于 2020 年发布，是\
    \ Python 2 的最后一个版本。Python 一直是最受欢迎的编程语言之一。\n\nPython 使用动态类型以及引用计数和循环检测垃圾回收器的组合进行内存管理。它使用动态名称解析（延迟绑定），在程序执行期间绑定方法和变量名称。\n\
    \n其设计为 Lisp 传统中的函数式编程提供了一些支持。它有 filter、map 和 reduce 函数；列表推导式、字典、集合和生成器表达式。标准库有两个模块（itertools\
    \ 和 functools），实现了从 Haskell 和 Standard ML 借用的函数式工具。\n\nPython 的语法设计旨在易于阅读和理解。它使用缩进（空格）来定义代码块，使得理解代码结构变得容易。这与使用大括号或关键字来界定块的语言不同。\n\
    \n```python\n# Python 代码示例\nif True:\n    print(\"This condition is True\")\n\
    ```\n\nPython 的多功能性、可读性和广泛的社区支持使其成为初学者和专业人士的绝佳选择。其易于学习和在各个领域的应用，促进了它在软件开发行业的广泛采用。\n\
    \n学习本章后，你将能够：\n\n- 解释 Python 的基础知识\n- 了解 Python 环境设置\n- 描述 Python 的基本语法\n- 理解\
