  md: '# Dictionaries, Sets, and Files


    ```

    >>> myfile = open(''test.txt'', ''w'')

    >>> myfile.write(''My first file written from Python\n'')

    34

    >>> myfile.write(''-----------------------------------\n'')

    34

    >>> myfile.write(''Hello, world!'')

    13

    >>> myfile.close()

    >>> myfile = open(''test.txt'', ''r'')

    >>> contents = myfile.read()

    >>> myfile.close()

    >>> print(contents)

    My first file written from Python

    -----------------------------------

    Hello, world!

    ```


    Opening a file creates what we call a file descriptor. In this example, the variable
    myfile refers to the new descriptor object. Our program calls methods on the descriptor,
    and this makes changes to the actual file which is located in non-volatile storage.


    The first line opens the test.txt for writing. If there is no file named test.txt
    on the disk, it will be created. If there already is one, it will be replaced
    by the file we are writing and any previous data in it will be lost.


    To put data in the file we invoke the write method on the file descriptor. We
    do this three times in the example above, but in bigger programs, the three separate
    calls to write will usually be replaced by a loop that writes many more lines
    into the file. The write method returns the number of bytes (characters) written
    to the file.


    Closing the file handle tells the system that we are done writing and makes the
    disk file available for reading by other programs (or by our own program).


    We finish this example by openning test.txt for reading. We then call the read
    method, assigning the contents of the file, which is a string, to a variable named
    contents, and finally print contents to see that it is indeed what we wrote to
    the file previously.


    If we want to add to an already existing file, use the *append* mode.


    ```

    >>> myfile = open(''test.txt'', ''a'')

    >>> myfile.write(''\nOoops, I forgot to add this line ;-)'')

    37

    >>> myfile.close()

    >>> myfile = open(''test.txt'', ''r'')

    >>> print(myfile.read())

    My first file written from Python

    -----------------------------------

    Hello, world!

    Ooops, I forgot to add this line ;-)

    >>>

    ```


    > Many common files you may use, such as Word documents or Excel spreadsheets
