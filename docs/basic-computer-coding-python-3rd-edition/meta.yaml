    tm_isdst=0)\n```\n\n## 8.7.2 Getting formatted time\n\nYou can format any time\
    \ as per your requirement, but simple method to get time in readable format is\
    \ asctime() –\n\n```\n#!/usr/bin/python\n\nimport time;\n\nlocaltime = time.asctime(\
