  md: "source code and has nothing to do with which functions call which. In fact,\
    \ variables may be assigned in three different places, corresponding to three\
    \ different scopes:\n\n+   - If a variable is assigned inside a def, it is local\
    \ to that function.\n- If a variable is assigned in an enclosing def, it is nonlocal\
    \ to nested functions.\n- If a variable is assigned outside all defs, it is global\
    \ to the entire file.\n\nWe call this lexical scoping because variable scopes\
    \ are determined entirely by the locations of the variables in the source code\
    \ of your program files, not by function calls.\n\nIn the following module file,\
    \ the X = 99 assignment creates a global variable named X (visible everywhere\
    \ in this file), but the X = 88 assignment creates a local variable X (visible\
    \ only within the def statement):\n\n![](img/dd5296ef0d2e667ac2671bdbd5535cd0_338_0.png)\n\
    \n```\nX = 99\n\ndef func():\n    X = 88\n```\n\nEven though both variables are\
    \ named X, their scopes make them different. The net effect is that function scopes\
    \ help to avoid name clashes in your programs and help to make functions more\
    \ self-contained program units.\n\n# 10.1.1 Scope Rules\n\nBefore we started writing\
    \ functions, all the code we wrote was at the top level of a module (i.e., not\
    \ nested in a def), so the names we used either lived in the module itself or\
    \ were built-ins predefined by Python (e.g., open). Functions provide nested namespaces\
    \ (scopes) that localize the names they use, such that names inside a function\
    \ won’t clash with those outside it (in a module or another function). Again,\
    \ functions define a local scope, and modules define a global scope. The two scopes\
    \ are related as follows:\n\n+   - *The enclosing module is a global scope*: Each\
    \ module is a global scope—that is, a namespace in which variables created (assigned)\
    \ at the top level of the module file live. Global variables become attributes\
    \ of a module object to the outside world but can be used as simple variables\
    \ within a module file."
