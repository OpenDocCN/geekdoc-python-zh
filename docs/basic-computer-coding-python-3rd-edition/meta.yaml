- md: "## CASE STUDY\n\n## PYTHON\n\nPython is an interpreted, dynamically-typed,\
    \ object-oriented scripting language with a host of built-in data types. It is\
    \ implemented in C, but in a very object-oriented fashion. The design is a good\
    \ model for language implementation.\n\nThe Python interpreter works by loading\
    \ a source file or reading a line typed at the keyboard, parsing it into an abstract\
    \ syntax tree, compiling the tree into bytecode, and executing the bytecode. We\
    \ will concentrate mainly on how the bytecode is executed, such as how inheritance\
    \ and environments are implemented.\n\n## Parsing\n\nThe parsing process is fairly\
    \ standard. The basic idea is to first convert the input characters into a more\
    \ abstract representation like name: x, integer: 7, string: “hello”, less-than-or-equal,\
    \ etc. The abstracted characters are called *tokens*. (There are utilities, such\
    \ as lex, for automatically generating tokenizers, but Python does not use one.)\
    \ The tokenization process is fully described in the language reference.\n\n*For\
    \ example*, the statement\n\n```python\nwhile(x <= 3):\n    f(x)\n```\n\nmight\
    \ be tokenized as\n\n```\nkeyword: while\nleft-paren\nname: x\nleq\nint: 3\nright-paren\n\
    colon\nindent\nname: f\nleft-paren\nname: x\nright-paren\n```\n\nThen the tokens\
    \ are assembled into expressions, statements, function definitions, class definitions,\
    \ etc. Since function definitions contain statements which contain expressions\
    \ which may contain nested expressions, and so on, the resulting data structure\
    \ of tokens is a tree, called a *parse tree* or *abstract syntax tree*. The tokens\
    \ above might be parsed into this tree:\n\n![](img/dd5296ef0d2e667ac2671bdbd5535cd0_196_0.png)\n\
    \nThere are standard utilities, such as yacc, which aid in generating parsers,\
    \ but Python does not use one. Instead, it uses nested DFAs, which is a recursive\
    \ tokenizer that fills the tree out downward. A similar technique was used in\
    \ the book Essentials of Programming Languages. You can learn more about tokenizing,\
    \ parsing, and compilation in MIT course 6.035 or from various books such as *Crafting\
    \ a Compiler in C* or *Compilers: Principles, Techniques, and Tools*.\n\nOnce\
    \ you have a parse tree, you can do type checking, type reconstruction, constant\
    \ folding, liveness analysis, and many other kinds of optimizations and analysis.\
    \ Python only uses it for compilation.\n\n## Compilation\n\nThe parse tree is\
    \ then compiled into bytecode by a recursive walk. For example, a while syntax\
    \ node contains an expression node for the test and a compound statement node\
    \ for the body. A while node is compiled into:\n\n```\nloop:\n    (code for test)\n\
    \    jump_if_false done\n    (code for body)\n    jump loop\ndone:\n```\n\nwhere\
    \ the test and body nodes are compiled recursively. Virtually all of the compilation\
    \ rules can be described as rewrites like this. Compilation has the opposite structure\
    \ of parsing: it flattens the tree, converting it back to bytes.\n\nBytecode is\
    \ virtual machine instructions packed into an array of bytes. The instructions\
    \ are based on stack manipulation. Some instructions have no arguments and take\
    \ up one byte, e.g. BINARY_ADD (pop two values from the stack and push their sum),\
    \ while other instructions have an additional two-byte integer argument, e.g.\
    \ LOAD_NAME i (push the value of the *i*-th variable name). The full list of bytecodes\
    \ is here. Bytecode is paired with a symbol table and constant pool so that names\
    \ and literals can be referenced by number in the instructions.\n\nThe bytecode\
    \ for the above parse tree is something like:\n\n```\nloop:\n\nload-name 1   \
    \   (x)\nload-const 1     (3)\ncompare-op le\n\njump_if_false done\n\nload-name\
    \ 2      (f)\nload-name 1      (x)\ncall-function 1\n\njump loop\ndone:\n```\n\
    \nPython does not perform much optimization on the bytecode, except for speeding-up\
    \ local variable access. The reasons for this are tied to how the interpreter\
    \ works and will be discussed later.\n\nThis conversion pattern, where the input\
    \ is abstracted, processed, then specialized, is a common one in many varieties\
    \ of programs and is also presented in Abstraction and Specification in Program\
    \ Development.\n\n## Execution\n\nAt face value, the execution algorithm is straightforward:\
    \ fetch the next instruction, perform the required stack manipulation or, in the\
    \ case of a jump, reposition the instruction pointer. However, much of the real\
    \ functionality is hidden in the value objects. *For example*, there is only one\
    \ BINARY_ADD instruction, yet Python must do very different things when adding\
    \ integers, floats, strings, or user-defined objects.\n\n## Value objects\n\n\
    The trick is to decouple the kinds of values in the language from the interpreter\
    \ core. This allows Python to have many built-in data types without a complexity\
    \ explosion. Each value supports the same interface, some of which is listed here:\n\
    \n- add(v): Add yourself to *v* and return the result as a new object. It corresponds\
    \ to x + v.\n- cmp(v): Compare yourself to *v* and return -1, 0, or 1 (a la strcmp).\
    \ It corresponds to x == v.\n- repr(): Return a string representation of yourself.\n\
    - getattr(name), getitem(v): Subscript yourself by *name* or arbitrary value *v*.\
    \ getattr corresponds to x.name and getitem corresponds to x[v].\n- call(args,\
    \ keywords): Call yourself with positional arguments *args* and keyword arguments\
    \ *keywords*. It corresponds to x(1, 2, 3, foo = 4, bar = 5).\n\nEach method in\
    \ this interface has a bytecode counterpart which invokes it, e.g. BINARY_ADD.\
    \ The stack is simply an array of value objects, which each know how to add themselves.\
    \ Numerical Python takes advantage of this open-ended design to add multi-dimensional\
    \ arrays, e.g. matrices, to the language.\n\nNew kinds of values can even be defined\
    \ from within Python. An object with a method called __cmp__ will use that method\
    \ for comparison instead of the default object comparison method. All methods\
    \ in the value interface can be overridden in this way (including the getattr\
    \ method which is used to look up object methods in the first place).\n\nThe built-in\
    \ value objects are:\n\n- Primitives\n  - Integer/Long\n  - Float\n  - String\n\
    \  - File\n  - Function\n- Composites\n  - Tuple\n  - List\n  - Dictionary\n \
    \ - Class\n  - Class instance\n  - Module\n\nNote that functions are simply values\
    \ that implement the call method. Thus classes and their instances can just associate\
    \ names with arbitrary values, i.e. act like dictionaries.\n\n## Basic Computer\
    \ Coding: Python\n\n## Inheritance\n\nClasses and instances differ slightly from\
    \ dictionaries, however, in that instances inherit from classes and classes can\
    \ inherit from other classes. The inheritance is such that changes to classes\
    \ are immediately visible in their descendants and instances, as illustrated in\
    \ this example:\n\n```python\nclass p:\n    x = 3\n\nclass c(p):\n    y = \"hello\"\
    \n\ni = c()\ni.y    (prints \"hello\")\ni.x    (prints 3)\np.x = 4\nc.x    (prints\
    \ 4)\ni.x    (prints 4)\n```\n\nThus classes and instances differ from dictionaries\
    \ in that if a read cannot be resolved, the request is passed to the parent class.\
    \ Since classes can change at run-time, this makes the inheritance process highly\
    \ dynamic. This is a recurring pattern called a Chain of Responsibility. The object\
    \ diagram for the above example is thus:\n\n![](img/dd5296ef0d2e667ac2671bdbd5535cd0_199_0.png)\n\
    \nNote that if Python hadn't provided inheritance, we could recreate it by providing\
    \ a __getattr__ method to do the forwarding. The parent class would be stored\
    \ explicitly in a variable. This would have the interesting side-effect that inheritance\
    \ links could be changed at run-time by modifying this variable. The Chain of\
    \ Responsibility pattern fully supports such changes.\n\nWhat happens on a write?\
    \ If requests were forwarded up the Chain, as with a read, there would be no way\
    \ to override a slot in a parent class. In the above example, c.x = 5 would be\
    \ the same as p.x = 5. (If the variable turns out to be unbound, then the object\
    \ written to would gain a new slot.) If requests were not forwarded, then the\
    \ object written to would always gain a new slot, shadowing the ancestor slot.\
    \ Python chooses the latter, so that parent methods can be overridden in children.\
    \ Thus we get:\n\n```python\nc.x = 5\np.x     (prints 4)\ni.x     (prints 5)\n\
    \ni.x = i.x\nc.x = 6\ni.x     (prints 5)\n```\n\nNote that i.x = i.x performs\
    \ useful work under this design choice.\n\nDoes Python need to distinguish between\
    \ classes and instances? Both are essentially dictionaries and have the same read/write\
    \ and inheritance mechanism. Perhaps it’s for efficiency reasons: there are usually\
    \ far fewer classes than instances, so certain optimizations can be applied to\
    \ classes but not instances.\n\n## Variable scope\n\nPython variable environments,\
    \ aka “stack frames”, have many of the qualities of objects. They are dictionaries\
    \ of names with the same kind of inheritance semantics. That is, variables used\
    \ in a function by default refer to global names, but if a variable is assigned\
    \ to in the function, it becomes local. The same applies to class definitions.\n\
    \nOne can imagine also designing variable scope with a Chain of Responsibility.\
    \ In fact, some languages do this, even ones which don’t have the corresponding\
    \ notion of inheritance. *Structure and Interpretation of Computer Programs* uses\
    \ it to describe Scheme’s method of variable scope. The Self language actually\
    \ treats environments as objects and uses inheritance to implement lexical scope!\n\
    \nHowever, Python does not take this approach, probably for efficiency reasons.\
    \ Python does not allow more than two simultaneous environments (the global and\
    \ the local), as noted in the PLE exercise on nested scopes. This allows certain\
    \ optimizations, like the LOAD_FAST bytecode, but can confuse programmers used\
    \ to lexical scoping. The following C++ fragment has no equivalent in Python:\n\
    \n```cpp\nint x = 1;\nif(x > y) {\n    int x = 2;\n```"
  mdcn: "## 案例研究\n\n## PYTHON\n\nPython 是一种解释型、动态类型、面向对象的脚本语言，拥有丰富的内置数据类型。它用 C 语言实现，但采用了非常面向对象的方式。其设计是语言实现的良好范例。\n\
    \nPython 解释器的工作流程是加载源文件或读取键盘输入的一行代码，将其解析为抽象语法树，将树编译成字节码，然后执行字节码。我们将主要关注字节码的执行方式，例如继承和环境是如何实现的。\n\
    \n## 解析\n\n解析过程相当标准。基本思路是首先将输入字符转换为更抽象的表示，例如：名称：x，整数：7，字符串：“hello”，小于等于，等等。这些抽象后的字符被称为*词法单元*。（有一些工具，如\
    \ lex，可以自动生成词法分析器，但 Python 并未使用。）词法分析过程在语言参考手册中有完整描述。\n\n*例如*，语句\n\n```python\n\
    while(x <= 3):\n    f(x)\n```\n\n可能被词法分析为\n\n```\nkeyword: while\nleft-paren\n\
    name: x\nleq\nint: 3\nright-paren\ncolon\nindent\nname: f\nleft-paren\nname: x\n\
    right-paren\n```\n\n然后，这些词法单元被组装成表达式、语句、函数定义、类定义等。由于函数定义包含语句，语句包含表达式，表达式又可能包含嵌套表达式，如此层层嵌套，最终生成的词法单元数据结构是一棵树，称为*解析树*或*抽象语法树*。上述词法单元可能被解析成这棵树：\n\
    \n![](img/dd5296ef0d2e667ac2671bdbd5535cd0_196_0.png)\n\n有一些标准工具，如 yacc，可以帮助生成解析器，但\
    \ Python 并未使用。相反，它使用了嵌套的确定性有限自动机，这是一种递归的词法分析器，自上而下地填充树结构。类似的技术在《编程语言原理》一书中也有使用。你可以在\
    \ MIT 的 6.035 课程或《C 语言编译器构建》、《编译原理：技术与工具》等书籍中了解更多关于词法分析、解析和编译的知识。\n\n一旦你有了解析树，就可以进行类型检查、类型重构、常量折叠、活跃性分析以及许多其他类型的优化和分析。Python\
    \ 仅将其用于编译。\n\n## 编译\n\n然后，通过递归遍历将解析树编译成字节码。例如，一个 while 语法节点包含一个用于测试的表达式节点和一个用于循环体的复合语句节点。一个\
    \ while 节点被编译成：\n\n```\nloop:\n    (测试部分的代码)\n    jump_if_false done\n    (循环体的代码)\n\
    \    jump loop\ndone:\n```\n\n其中测试和循环体节点是递归编译的。几乎所有的编译规则都可以描述为这样的重写。编译的结构与解析相反：它将树展平，将其转换回字节。\n\
    \n字节码是打包到字节数组中的虚拟机指令。这些指令基于栈操作。有些指令没有参数，占用一个字节，例如 BINARY_ADD（从栈中弹出两个值并压入它们的和），而其他指令有一个额外的两字节整数参数，例如\
    \ LOAD_NAME i（压入第 *i* 个变量名的值）。完整的字节码列表在这里。字节码与符号表和常量池配对，以便在指令中可以通过数字引用名称和字面量。\n\
    \n上述解析树对应的字节码大致如下：\n\n```\nloop:\n\nload-name 1      (x)\nload-const 1     (3)\n\
    compare-op le\n\njump_if_false done\n\nload-name 2      (f)\nload-name 1     \
    \ (x)\ncall-function 1\n\njump loop\ndone:\n```\n\nPython 对字节码没有进行太多优化，除了加速局部变量访问。这与解释器的工作方式有关，将在后面讨论。\n\
    \n这种输入被抽象、处理、然后特化的转换模式，在许多类型的程序中都很常见，在《程序开发中的抽象与规范》一书中也有介绍。\n\n## 执行\n\n表面上看，执行算法很简单：获取下一条指令，执行所需的栈操作，或者在跳转的情况下，重新定位指令指针。然而，大部分实际功能都隐藏在值对象中。*例如*，只有一条\
    \ BINARY_ADD 指令，但 Python 在处理整数、浮点数、字符串或用户定义对象的加法时，必须执行非常不同的操作。\n\n## 值对象\n\n诀窍在于将语言中的值类型与解释器核心解耦。这使得\
    \ Python 可以拥有许多内置数据类型而不会导致复杂性爆炸。每个值都支持相同的接口，其中一部分如下所列：\n\n- add(v)：将自身与 *v* 相加，并将结果作为新对象返回。它对应于\
    \ x + v。\n- cmp(v)：将自身与 *v* 进行比较，并返回 -1、0 或 1（类似 strcmp）。它对应于 x == v。\n- repr()：返回自身的字符串表示。\n\
    - getattr(name), getitem(v)：通过 *name* 或任意值 *v* 对自身进行下标操作。getattr 对应于 x.name，getitem\
    \ 对应于 x[v]。\n- call(args, keywords)：使用位置参数 *args* 和关键字参数 *keywords* 调用自身。它对应于\
    \ x(1, 2, 3, foo = 4, bar = 5)。\n\n此接口中的每个方法都有一个对应的字节码来调用它，例如 BINARY_ADD。栈仅仅是一个值对象数组，每个值对象都知道如何将自身相加。Numerical\
    \ Python 利用这种开放式设计，为语言添加了多维数组，例如矩阵。\n\n甚至可以从 Python 内部定义新的值类型。一个名为 __cmp__ 的方法将用于比较，而不是使用默认的对象比较方法。值接口中的所有方法都可以通过这种方式被覆盖（包括用于首先查找对象方法的\
    \ getattr 方法）。\n\n内置的值对象有：\n\n- 基本类型\n  - 整数/长整数\n  - 浮点数\n  - 字符串\n  - 文件\n \
    \ - 函数\n- 复合类型\n  - 元组\n  - 列表\n  - 字典\n  - 类\n  - 类实例\n  - 模块\n\n请注意，函数只是实现了\
    \ call 方法的值。因此，类及其实例可以将名称与任意值关联起来，即表现得像字典一样。\n\n## 基础计算机编码：Python\n\n## 继承\n\n\
    然而，类和实例与字典略有不同，因为实例从类继承，而类可以从其他类继承。这种继承使得对类的更改会立即在其后代和实例中可见，如下例所示：\n\n```python\n\
    class p:\n    x = 3\n\nclass c(p):\n    y = \"hello\"\n\ni = c()\ni.y    (打印 \"\
    hello\")\ni.x    (打印 3)\np.x = 4\nc.x    (打印 4)\ni.x    (打印 4)\n```\n\n因此，类和实例与字典的不同之处在于，如果读取操作无法解析，请求会被传递给父类。由于类可以在运行时更改，这使得继承过程高度动态。这是一种称为责任链的常见模式。上述示例的对象图如下：\n\
    \n![](img/dd5296ef0d2e667ac2671bdbd5535cd0_199_0.png)\n\n请注意，如果 Python 没有提供继承，我们可以通过提供一个\
    \ __getattr__ 方法来进行转发来重新创建它。父类将显式存储在一个变量中。这将产生一个有趣的副作用：继承链接可以通过修改此变量在运行时更改。责任链模式完全支持此类更改。\n\
    \n写入时会发生什么？如果请求像读取一样沿着责任链向上转发，那么将无法覆盖父类中的槽位。在上面的例子中，c.x = 5 将等同于 p.x = 5。（如果变量未绑定，那么被写入的对象将获得一个新槽位。）如果请求不转发，那么被写入的对象将始终获得一个新槽位，遮蔽祖先槽位。Python\
    \ 选择了后者，以便子类可以覆盖父类方法。因此我们得到：\n\n```python\nc.x = 5\np.x     (打印 4)\ni.x     (打印\
    \ 5)\n\ni.x = i.x\nc.x = 6\ni.x     (打印 5)\n```\n\n请注意，在这种设计选择下，i.x = i.x 执行了有用的工作。\n\
    \nPython 需要区分实例和类吗？两者本质上都是字典，并具有相同的读/写和继承机制。也许是为了效率原因：通常类的数量远少于实例，因此可以对类应用某些优化，但不能对实例应用。\n\
    \n## 变量作用域\n\nPython 的变量环境，也称为“栈帧”，具有许多对象的特性。它们是具有相同继承语义的名称字典。也就是说，函数中使用的变量默认引用全局名称，但如果在函数中对变量进行了赋值，它就变成了局部变量。类定义也是如此。\n\
    \n也可以想象使用责任链来设计变量作用域。事实上，一些语言就是这样做的，甚至是一些没有相应继承概念的语言。《计算机程序的构造和解释》用它来描述 Scheme\
    \ 的变量作用域方法。Self 语言实际上将环境视为对象，并使用继承来实现词法作用域！\n\n然而，Python 并未采用这种方法，可能是出于效率原因。如关于嵌套作用域的\
    \ PLE 练习中所述，Python 不允许同时存在两个以上的环境（全局和局部）。这允许某些优化，例如 LOAD_FAST 字节码，但可能会让习惯于词法作用域的程序员感到困惑。以下\
    \ C++ 代码片段在 Python 中没有等价物：\n\n```cpp\nint x = 1;\nif(x > y) {\n    int x = 2;\n\
    ```"
