    \ <user_name>\n\nEnter password:\n\n[(18, 15, Decimal('5.0'))]\n```\n\nAgain,\
    \ the output shows that the specified rating has been changed to 5.0. What’s changed?\n\
    \nThe hacker sneaked in an update query while entering the reviewer_id. The update\
    \ query, `UPDATE reviewers SET last_name = \"A\"`, changes the last_name of all\
    \ records in the reviewers table to \"A\". You can see this change if you print\
    \ out the reviewers table:\n\n```python\n>>> select_query = \"\"\"\n... SELECT\
    \ first_name, last_name\n... FROM reviewers\n... \"\"\"\n>>> with connection.cursor()\
    \ as cursor:\n...     cursor.execute(select_query)\n...     for reviewer in cursor.fetchall():\n\
    ...         print(reviewer)\n...\n('Chaitanya', 'A')\n('Mary', 'A')\n('John',\
    \ 'A')\n('Thomas', 'A')\n('Penny', 'A')\n('Mitchell', 'A')\n('Wyatt', 'A')\n('Andre',\
    \ 'A')\n('Sheldon', 'A')\n('Kimbra', 'A')\n('Kat', 'A')\n('Bruce', 'A')\n('Domingo',\
    \ 'A')\n('Rajesh', 'A')\n('Ben', 'A')\n('Mahinder', 'A')\n('Akbar', 'A')\n('Howard',\
    \ 'A')\n('Pinkie', 'A')\n('Gurkaran', 'A')\n('Amy', 'A')\n('Marlon', 'A')\n```\n\
    \nThe above code displays the first_name and last_name for all records in the\
    \ reviewers table. The SQL injection attack corrupted this table by changing the\
    \ last_name of all records to \"A\".\n\nThere’s a quick fix to prevent such attacks.\
    \ Don’t add the query values provided by the user directly to your query string.\
    \ Instead, update the modify_ratings.py script to send these query values as arguments\
    \ to .execute():\n\n```python\nfrom getpass import getpass\nfrom mysql.connector\
    \ import connect, Error\n\nmovie_id = input(\"Enter movie id: \")\nreviewer_id\
    \ = input(\"Enter reviewer id: \")\nnew_rating = input(\"Enter new rating: \"\
    )\nupdate_query = \"\"\"\nUPDATE\n    ratings\nSET\n    rating = %s\nWHERE\n \
    \   movie_id = %s AND reviewer_id = %s;\n\nSELECT *\nFROM ratings\nWHERE\n   \
    \ movie_id = %s AND reviewer_id = %s\n\"\"\"\nval_tuple = (\n    new_rating,\n\
    \    movie_id,\n    reviewer_id,\n    movie_id,\n    reviewer_id,\n)\n\ntry:\n\
    \    with connect(\n        host=\"localhost\",\n        user=input(\"Enter username:\
    \ \"),\n        password=getpass(\"Enter password: \"),\n        database=\"online_movie_rating\"\
    ,\n    ) as connection:\n        with connection.cursor() as cursor:\n       \
    \     for result in cursor.execute(update_query, val_tuple, multi=True):\n   \
    \             if result.with_rows:\n                    print(result.fetchall())\n\
    \            connection.commit()\nexcept Error as e:\n    print(e)\n```\n\nNotice\
    \ that the %s placeholders are no longer in string quotes. Strings passed to the\
    \ placeholders might contain some special characters. If necessary, these can\
    \ be correctly escaped by the underlying library.\n\n`cursor.execute()` makes\
    \ sure that the values in the tuple received as argument are of the required data\
