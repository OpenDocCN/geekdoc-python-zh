    \ so you have to import it in order to inspect it. Once you do, you can run a\
    \ dir call to see which names are predefined. In Python 3.0:\n\n```\n>>> import\
    \ builtins\n>>> dir(builtins)\n['ArithmeticError', 'AssertionError', 'AttributeError',\
    \ 'BaseException',\n'BufferError', 'BytesWarning', 'DeprecationWarning', 'EOFError',\
    \ 'Ellipsis',\n...many more names omitted...\n'print', 'property', 'quit', 'range',\
    \ 'repr', 'reversed', 'round', 'set',\n'setattr', 'slice', 'sorted', 'staticmethod',\
    \ 'str', 'sum', 'super', 'tuple',\n'type', 'vars', 'zip']\n```\n\nThe names in\
    \ this list constitute the built-in scope in Python; roughly the first half are\
    \ built-in exceptions, and the second half are built-in functions. Also in this\
    \ list are the special names None, True, and False, though they are treated as\
    \ reserved words. Because Python automatically searches this module last in its\
    \ LEGB lookup, you get all the names in this list \"for free;\" that is, you can\
    \ use them without importing any modules. Thus, there are really two ways to refer\
    \ to a built-in function—by taking advantage of the LEGB rule, or by manually\
    \ importing the builtins module:\n\n```\n>>> zip\n<class 'zip'>\n```\n\n# The\
    \ normal way\n\nBasic Computer Coding: Python\n\n```\n>>> import builtins\n>>>\
    \ builtins.zip\n<class 'zip'>\n```\n\n# The hard way\n\nThe second of these approaches\
    \ is sometimes useful in advanced work. The careful reader might also notice that\
    \ because the LEGB lookup procedure takes the first occurrence of a name that\
    \ it finds, names in the local scope may override variables of the same name in\
    \ both the global and built-in scopes, and global names may override builtins.\
    \ A function can, for instance, create a local variable called open by assigning\
    \ to it:\n\n```\ndef hider():\n    open = 'spam'\n    ...\n    open('data.txt')\n\
    ```\n\n# Local variable, hides built-in\n\n# This won't open a file now in this\
    \ scope!\n\nKeyword\n\nAdvanced programming is shorthand for the advanced-level\
    \ programming techniques and concepts found in computer science.\n\nHowever, this\
    \ will hide the built-in function called open that lives in the built-in (outer)\
    \ scope. It's also usually a bug, and a nasty one at that, because Python will\
    \ not issue a warning message about it (there are times in advanced programming\
    \ where you may really want to replace a built-in name by redefining it in your\
    \ code).\n\nFunctions can similarly hide global variables of the same name with\
    \ locals:\n\n```\nX = 88\ndef func():\n    X = 99\nfunc()\nprint(X)\n```\n\n#\
    \ Global X\n\n# Local X: hides global\n\n# Prints 88: unchanged\n\nHere, the assignment\
    \ within the function creates a local X that is a completely different variable\
    \ from the global X in the module outside the function. Because of this, there\
    \ is no way to change a name outside a function without adding a global (or nonlocal)\
    \ declaration to the def.\n\n## 10.2 THE GLOBAL STATEMENT\n\nThe global statement\
    \ and its nonlocal cousin are the only things that are remotely like declaration\
    \ statements in Python. They are not type or size declarations, though; they are\
    \ namespace declarations. The global statement tells Python that a function plans\
    \ to change one or more global names—i.e., names that live in the enclosing module's\
    \ scope (namespace).\n\nWe've talked about global in passing already. Here's a\
    \ summary:\n\n- Global names are variables assigned at the top level of the enclosing\
    \ module file.\n- Global names must be declared only if they are assigned within\
    \ a function.\n- Global names may be referenced within a function without being\
    \ declared.\n\nIn other words, global allows us to change names that live outside\
    \ a def at the top level of a module file. As we'll see later, the nonlocal statement\
    \ is almost identical but applies to names in the enclosing def's local scope,\
    \ rather than names in the enclosing module.\n\nThe global statement consists\
    \ of the keyword global, followed by one or more names separated by commas. All\
    \ the listed names will be mapped to the enclosing module's scope when assigned\
    \ or referenced within the function body. For instance:\n\n```\nX = 88       \
    \              # Global X\n\ndef func():\n    global X\n    X = 99           \
    \      # Global X: outside def\n\nfunc()\nprint(X)                   # Prints\
    \ 99\n```\n\nWe've added a global declaration to the example here, such that the\
    \ X inside the def now refers to the X outside the def; they are the same variable\
    \ this time. Here is a slightly more involved example of global at work:\n\n```\n\
    y, z = 1, 2                # Global variables in module\ndef all_global():\n \
    \   global x               # Declare globals assigned\n    x = y + z         \
    \     # No need to declare y, z: LEGB rule\n```\n\nHere, x, y, and z are all globals\
    \ inside the function all_global. y and z are global because they aren't assigned\
    \ in the function; x is global because it was listed in a global statement to\
    \ map it to the module's scope explicitly. Without the global here, x would be\
    \ considered local by virtue of the assignment.\n\nNotice that y and z are not\
    \ declared global; Python's LEGB lookup rule finds them in the module automatically.\
    \ Also, notice that x might not exist in the enclosing module before the function\
    \ runs; in this case, the assignment in the function creates x in the module.\n\
    \n### 10.2.1 Minimize Global Variables\n\nBy default, names assigned in functions\
    \ are locals, so if you want to change names outside functions you have to write\
    \ extra code (e.g., global statements). This is by design—as is common in Python,\
    \ you have to say more to do the potentially \"wrong\" thing. Although there are\
    \ times when globals are useful, variables assigned in a def are local by default\
    \ because that is normally the best policy. Changing globals can lead to well-known\
    \ software engineering problems: because the variables’ values are dependent on\
    \ the order of calls to arbitrarily distant functions, programs can become difficult\
    \ to debug.\n\nConsider this module file, for example:\n\n```\nX = 99\ndef func1():\n\
    \    global X\n    X = 88\n\ndef func2():\n    global X\n    X = 77\n```\n\nNow,\
    \ imagine that it is your job to modify or reuse this module file. What will the\
    \ value of X be here? Really, that question has no meaning unless it’s qualified\
    \ with a point of reference in time—the value of X is timing-dependent, as it\
    \ depends on which function was called last (something we can’t tell from this\
    \ file alone).\n\nThe net effect is that to understand this code, you have to\
    \ trace the flow of control through the entire program. And, if you need to reuse\
    \ or modify the code, you have to keep the entire program in your head all at\
    \ once. In this case, you can’t really use one of these functions without bringing\
    \ along the other. They are dependent on (that is, coupled with) the global variable.\
    \ This is the problem with globals—they generally make code more difficult to\
    \ understand and use than code consisting of self-contained functions that rely\
    \ on locals.\n\nOn the other hand, short of using object-oriented programming\
    \ and classes, global variables are probably the most straightforward way to retain\
    \ shared state information (information that a function needs to remember for\
    \ use the next time it is called) in Python—local variables disappear when the\
    \ function returns, but globals do not. Other techniques, such as default mutable\
    \ arguments and enclosing function scopes, can achieve this, too, but they are\
    \ more complex than pushing values out to the global scope for retention.\n\n\
    Some programs designate a single module to collect globals; as long as this is\
    \ expected, it is not as harmful. In addition, programs that use multithreading\
    \ to do parallel processing in Python commonly depend on global variables—they\
    \ become shared memory between functions running in parallel threads, and so act\
    \ as a communication device.\n\nFor now, though, especially if you are relatively\
    \ new to programming, avoid the temptation to use globals whenever you can—try\
    \ to communicate with passed-in arguments and return values instead.\n\n### 10.2.2\
    \ Minimize Cross-File Changes\n\nHere’s another scope-related issue: although\
    \ we can change variables in another file directly, we usually shouldn’t. To illustrate\
    \ their relationship to scopes, consider these two module files:"
