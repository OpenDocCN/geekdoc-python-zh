  md: 'applies the pattern case insensitively. re.S or re.DOTALL makes the dot match
    newlines. re.Mor re.MULTILINE makes the caret and dollar match after and before
    line breaks in the subject string. There is no difference between the single-letter
    and descriptive options, except for the number of characters you have to type
    in. To specify more than one option, “or” them together with the | operator: re.search(“^a”,
    “abc”, re.I | re.M).


    By default, Python’s regex engine only considers the letters A through Z, the
    digits 0 through 9, and the underscore as “word characters”. Specify the flag
    re.L or re.LOCALE to make \w match all characters that are considered letters
    given the current locale settings. Alternatively, you can specify re.U or re.UNICODE
    to treat all letters from all scripts as word characters. The setting also affects
    word boundaries.


    > re.match() does not require the regex to match the entire string. re.match(“a”,
    “ab”) will succeed.


    Do not confuse re.search() with re.match(). Both functions do exactly the same,
    with the important distinction that re.search() will attempt the pattern throughout
    the string, until it finds a match. re.match() on the other hand, only attempts
    the pattern at the very start of the string. Basically, re.match(“regex”, subject)
    is the same as re.search(“\Aregex”, subject).


    Python 3.4 adds a new re.fullmatch() function. This function only returns a Match
    object if the regex matches the string entirely. Otherwise it returns None. re.fullmatch(“regex”,
    subject) is the same as re.search(“\Aregex\Z”, subject). This is useful for validating
    user input. If subject is an empty string then fullmatch() evaluates to True for
    any regex that can find a zero-length match.


    To get all matches from a string, call re.findall(regex, subject). This will return
    an array of all non-overlapping regex matches in the string. “Non-overlapping”
    means that the string is searched through from left to right, and the next match
    attempt starts beyond the previous match. If the regex contains one or more capturing
    groups, re.findall() returns an array of tuples, with each tuple containing text
    matched by all the capturing groups. The overall regex match is *not* included
    in the tuple, unless you place the entire regex inside a capturing group.


    More efficient than re.findall() is re.finditer(regex, subject). It returns an
    iterator that enables you to loop over the regex matches in the subject string:
    for m in re.finditer(regex, subject). The for-loop variable m is a Match object
    with the details of the current match.'
