    \ search only the local (f2), then global (the code outside f1), and then built-in\
    \ scopes. Because it skipped the scopes of enclosing functions, an error would\
    \ result. To work around this, programmers typically used default argument values\
    \ to pass in and remember the objects in an enclosing scope:\n\n```\ndef f1():\n\
    \    x = 88\n    def f2(x=x):        # Remember enclosing scope X with defaults\n\
