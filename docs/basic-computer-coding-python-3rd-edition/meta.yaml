    |---|---|---|\n| 0 | 4-digit year | 2008 |\n| 1 | Month | 1 to 12 |\n| 2 | Day\
    \ | 1 to 31 |\n| 3 | Hour | 0 to 23 |\n| 4 | Minute | 0 to 59 |\n| 5 | Second\
    \ | 0 to 61 (60 or 61 are leap-seconds) |\n| 6 | Day of Week | 0 to 6 (0 is Monday)\
    \ |\n| 7 | Day of year | 1 to 366 (Julian day) |\n| 8 | Daylight savings | -1,\
    \ 0, 1, -1 means library determines DST |\n\nThe above tuple is equivalent to\
    \ **struct_time** structure. This structure has following attributes –\n\n| Index\
