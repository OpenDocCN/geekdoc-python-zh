    \n假设你想设计一组模块（一个“包”）来统一处理声音文件和声音数据。有许多不同的声音文件格式（通常通过其扩展名识别，例如：`.wav`、`.aiff`、`.au`），因此你可能需要创建并维护一个不断增长的模块集合，用于各种文件格式之间的转换。你可能还想对声音数据执行许多不同的操作（例如混音、添加回声、应用均衡器功能、创建人工立体声效果），因此你还需要编写源源不断的模块来执行这些操作。以下是你的包的一种可能结构（以**分层文件系统**的形式表示）：\n\
    \n> **关键词**\n>\n> **分层文件系统**是一种使用目录将文件组织成树状结构的文件系统。\n\n```\nsound/           \
    \   顶层包\n    __init__.py       初始化 sound 包\n    formats/          用于文件格式转换的子包\n\
    \        __init__.py\n        wavread.py\n        wavwrite.py\n        aiffread.py\n\
    \        aiffwrite.py\n        auread.py\n        auwrite.py\n        ...\n  \
    \  effects/           用于声音效果的子包\n        __init__.py\n        echo.py\n      \
    \  surround.py\n        reverse.py\n        ...\n    filters/          用于滤波器的子包\n\
    \        __init__.py\n        equalizer.py\n        vocoder.py\n        karaoke.py\n\
    \        ...\n```\n\n> Python 包是模块的集合。相互关联的模块主要放在同一个包中。当程序中需要来自外部包的模块时，可以导入该包并使用其模块。\n\
    \n导入包时，Python 会搜索 `sys.path` 上的目录以查找包子目录。\n\n`__init__.py` 文件是必需的，它使 Python 将这些目录视为包含包；这样做是为了防止具有通用名称（如\
    \ `string`）的目录无意中隐藏了模块搜索路径上后续出现的有效模块。在最简单的情况下，`__init__.py` 可以只是一个空文件，但它也可以执行包的初始化代码或设置\
    \ `__all__` 变量（稍后描述）。\n\n包的用户可以从包中导入单个模块，例如：\n\n```\nimport sound.effects.echo\n\
    ```\n\n这会加载子模块 `sound.effects.echo`。必须使用其全名来引用它。\n\n```\nsound.effects.echo.echofilter(input,\
    \ output, delay=0.7, atten=4)\n```\n\n导入子模块的另一种方式是：\n\n```\nfrom sound.effects\
    \ import echo\n```\n\n这也会加载子模块 `echo`，并使其无需包前缀即可使用，因此可以这样使用：\n\n```\necho.echofilter(input,\
    \ output, delay=0.7, atten=4)\n```\n\n还有一种变体是直接导入所需的函数或变量：\n\n```\nfrom sound.effects.echo\
    \ import echofilter\n```\n\n同样，这会加载子模块 `echo`，但这使得其函数 `echofilter()` 可以直接使用：\n\
    \n```\nechofilter(input, output, delay=0.7, atten=4)\n```\n\n请注意，当使用 `from package\
    \ import item` 时，`item` 可以是包的子模块（或子包），也可以是包中定义的其他名称，如函数、类或变量。`import` 语句首先测试 `item`\
    \ 是否在包中定义；如果没有，它假定它是一个模块并尝试加载它。如果找不到它，将引发 `ImportError` 异常。\n\n相反，当使用 `import\
    \ item.subitem.subsubitem` 这样的语法时，除最后一个之外的每个 `item` 必须是一个包；最后一个 `item` 可以是一个模块或一个包，但不能是前一个\
    \ `item` 中定义的类、函数或变量。\n\n### 2.3.1 从包中导入*\n\n现在，当用户编写 `from sound.effects import\
    \ *` 时会发生什么？理想情况下，人们希望这能以某种方式访问文件系统，找到包中存在的所有子模块，并将它们全部导入。这可能需要很长时间，并且导入子模块可能会产生不必要的副作用，这些副作用应该只在显式导入子模块时发生。\n\
    \n唯一的解决方案是包作者提供一个显式的包索引。`import` 语句使用以下约定：如果一个包的 `__init__.py` 代码定义了一个名为 `__all__`\
    \ 的列表，则它被视为当遇到 `from package import *` 时应导入的模块名称列表。包作者有责任在发布新版本包时保持此列表的最新状态。如果包作者认为从他们的包中导入\
    \ `*` 没有用处，他们也可以决定不支持它。例如，文件 `sound/effects/__init__.py` 可能包含以下代码：\n\n```\n__all__\
    \ = [\"echo\", \"surround\", \"reverse\"]\n```\n\n这意味着 `from sound.effects import\
    \ *` 将导入 `sound` 包的三个命名子模块。\n\n如果未定义 `__all__`，则语句 `from sound.effects import\
    \ *` *不会*将 `sound.effects` 包中的所有子模块导入到当前命名空间；它只确保 `sound.effects` 包已被导入（可能运行 `__init__.py`\
    \ 中的任何初始化代码），然后导入包中定义的任何名称。这包括 `__init__.py` 定义的任何名称（以及显式加载的子模块）。它还包括包中先前通过 `import`\
    \ 语句显式加载的任何子模块。考虑以下代码：\n\n2023年5月，Python软件基金会报告称，美国司法部已传唤了三位PyPI贡献者的用户数据。该组织的一位代表进一步解释说，他们期望保护贡献者的隐私，但他们也遵守法律和法院命令，因此将政府要求的数据移交了出去。"
