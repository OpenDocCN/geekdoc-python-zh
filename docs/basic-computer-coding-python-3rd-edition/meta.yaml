    With just slightly more magic, which we''ll delve into later in this book, we
    could also make our class look like a callable function using operator overloading.
    `__call__` intercepts direct calls on an instance, so we don''t need to call a
    named method:


    ```

    >>> class tester:

    ...     def __init__(self, start):

    ...         self.state = start

    ...     def __call__(self, label):

    ...         print(label, self.state)

    ...         self.state += 1

    ...

    >>> H = tester(99)

    >>> H(''juice'')

    juice 99

    >>> H(''pancakes'')

    pancakes 100

    ```


    While using classes for state information is generally a good rule of thumb to
    follow, they might be overkill in cases like this, where state is a single counter.
    Such trivial state cases are more common than you might think; in such contexts,
    nested defs are sometimes more lightweight than coding classes, especially if
    you''re not familiar with OOP yet. Moreover, there are some scenarios in which
    nested defs may actually work better than classes.


    # State with function attributes


    As a final state-retention option, we can also sometimes achieve the same effect
    as nonlocals with function attributes—user-defined names attached to functions
    directly. Here''s a final version of our example based on this technique—it replaces
    a nonlocal with an attribute attached to the nested function. Although this scheme
    may not be as intuitive to some, it also allows the state variable to be accessed
    outside the nested function (with nonlocals, we can only see state variables within
    the nested def):


    ```

    >>> def tester(start):

    ...     def nested(label):

    ...         print(label, nested.state)

    ...         nested.state += 1

    ```'
