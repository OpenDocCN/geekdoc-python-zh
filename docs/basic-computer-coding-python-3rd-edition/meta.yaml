- md: "## Basic Computer Coding: Python\n\n```python\nimport sound.effects.echo\n\
    import sound.effects.surround\nfrom sound.effects import *\n```\n\nIn this example,\
    \ the echo and surround modules are imported in the current namespace because\
    \ they are defined in the sound.effects package when the from... import statement\
    \ is executed. (This also works when `__all__` is defined.)\n\nAlthough certain\
    \ modules are designed to export only names that follow certain patterns when\
    \ you use `import *`, it is still considered bad practice in production code.\n\
    \nRemember, there is nothing wrong with using `from Package import specific_submodule`!\
    \ In fact, this is the recommended notation unless the importing module needs\
    \ to use submodules with the same name from different packages.\n\n## 2.3.2 Intra-package\
    \ References\n\nThe submodules often need to refer to each other. For example,\
    \ the surround module might use the echo module. In fact, such references are\
    \ so common that the import statement first looks in the containing package before\
    \ looking in the standard module search path. Thus, the surround module can simply\
    \ use `import echo` or `from echo import echofilter`. If the imported module is\
    \ not found in the current package (the package of which the current module is\
    \ a submodule), the import statement looks for a top-level module with the given\
    \ name.\n\nWhen packages are structured into subpackages (as with the sound package\
    \ in the example), you can use absolute imports to refer to submodules of sibling\
    \ packages. For example, if the module `sound.filters.vocoder` needs to use the\
    \ echo module in the `sound.effects` package, it can use `from sound.effects import\
    \ echo`.\n\nStarting with Python 2.5, in addition to the implicit relative imports\
    \ described above, you can write explicit relative imports with the `from module\
    \ import name` form of import statement. These explicit relative imports use leading\
    \ dots to indicate the current and parent packages involved in the relative import.\
    \ From the surround module for example, you might use:\n\n```python\nfrom . import\
    \ echo\nfrom .. import formats\nfrom ..filters import equalizer\n```\n\nNote that\
    \ both explicit and implicit relative imports are based on the name of the current\
    \ module. Since the name of the main module is always `\"__main__\"`, modules\
    \ intended for use as the main module of a Python application should always use\
    \ absolute imports.\n\n## 2.3.3 Packages in Multiple Directories\n\nPackages support\
    \ one more special attribute, `__path__`. This is initialized to be a list containing\
    \ the name of the directory holding the package's `__init__.py` before the code\
    \ in that file is executed. This variable can be modified; doing so affects future\
    \ searches for modules and subpackages contained in the package.\n\nWhile this\
    \ feature is not often needed, it can be used to extend the set of modules found\
    \ in a package.\n\n## SUMMARY\n\n- In Python, a function is a block of code that\
