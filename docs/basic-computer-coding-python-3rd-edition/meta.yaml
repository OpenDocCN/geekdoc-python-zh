    # 3.1.5 Aliasing and Copying


    Because dictionaries are mutable, you need to be aware of aliasing. Whenever two
    variables refer to the same object, changes to one affect the other.


    ![](img/dd5296ef0d2e667ac2671bdbd5535cd0_86_0.png)


    > Remember

    Although we just used a dictionary to link names to phone numbers in this extended
    example, we can use a dictionary to link any one type of object to another type
    of object.


    If you want to modify a dictionary and keep a copy of the original, use the copy
    method. For example, opposites is a dictionary that contains pairs of opposites:


    ```

    >>> opposites = {''up'': ''down'', ''right'': ''wrong'', ''true'': ''false''}

    >>> an_alias = opposites

    >>> a_copy = opposites.copy()

    ```


    an_alias and opposites refer to the same object; a_copy refers to a fresh copy
    of the same dictionary. If we modify alias, opposites is also changed:


    ```

    >>> an_alias[''right''] = ''left''

    >>> opposites[''right'']

    ''left''

    ```


    If we modify a_copy, opposites is unchanged:


    ```

    >>> a_copy[''right''] = ''privilege''

    >>> opposites[''right'']

    ''left''

    ```


