    >>> acts = makeActions()

    >>> acts[0]

    <function <lambda> at 0x012B16B0>

    ```


    This doesn’t quite work, though—because the enclosing scope variable is looked
    up when the nested functions are later called, they all effectively remember the
    same value (the value the loop variable had on the last loop iteration). That
    is, we get back 4 to the power of 2 for each function in the list, because i is
    the same in all of them:


    ```

    >>> acts[0](2)          # All are 4 ** 2, value of last i

    16

    >>> acts[2](2)          # This should be 2 ** 2

    16

    >>> acts[4](2)          # This should be 4 ** 2

    16

    ```


    This is the one case where we still have to explicitly retain enclosing scope
    values with default arguments, rather than enclosing scope references. That is,
    to make this sort of code work, we must pass in the current value of the enclosing
    scope’s variable with a default. Because defaults are evaluated when the nested
    function is created (not when it’s later called), each remembers its own value
    for i:


    ```

    >>> def makeActions():

    ...     acts = []

    ...     for i in range(5):          # Use defaults instead

    ...         acts.append(lambda x, i=i: i ** x)  # Remember current i

    ...     return acts

    ...

    >>> acts = makeActions()

    >>> acts[0](2)          # 0 ** 2

    0

    >>> acts[2](2)          # 2 ** 2

    4

    >>> acts[4](2)          # 4 ** 2

