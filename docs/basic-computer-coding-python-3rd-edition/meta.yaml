    \ situation where we need to decide which block of code should be executed based\
    \ on a condition.\n\nLet’s take a simple example.\n\nSuppose you are writing a\
    \ program for a game. So at every step, we need to take decisions like:\n\n- If\
    \ the user presses ‘w’ key, then the character will move forward.\n- If the user\
    \ presses ‘spacebar’, then the character will jump.\n- If the character runs into\
    \ an obstacle, then the game is over otherwise we continue playing.\n\nDecisions\
    \ like these are required everywhere in programming and they decide the direction\
    \ of flow of program execution.\n\nPython has the following decision-making statements:\n\
    \n- if statements\n- if-else statements\n- if-elif ladder\n- Nested statements\n\
    \nLet’s discuss these decision making statements in Python in detail.\n\n### 8.1.1\
    \ Python if Statement\n\nif statement is the most simple form of **decision-making\
    \ statement**. It takes an expression and checks if the expression evaluates to\
    \ True then the block of code in if statement will be executed.\n\nIf the expression\
    \ evaluates to False, then the block of code is skipped.\n\nSyntax:\nif ( expression\
    \ ):\n    Statement 1\n    Statement 2\n    .\n    Statement n\n\n**Example 1:**\n\
    a = 20 ; b = 20\n\n```\nif ( a == b ):\n    print( “a and b are equal”)\n    print(“If\
    \ block ended”)\n```\n\nOutput:\n\na and b are equal\nIf block ended\n\n**Example\
    \ 2:**\n\n```\nnum = 5\n\nif ( num >= 10):\n    print(“num is greater than 10”)\n\
    \nprint(“if block ended”)\n```\n\nOutput:\n\nIf block ended\n\nIn example 1, we\
    \ see that the condition a==b evaluates to True. Therefore, the block of code\
    \ inside if statement is executed.\nIn example 2, the condition evaluates to False,\
    \ therefore, the print statement was not executed and the only statement that\
    \ got executed was because it was outside the if block.\n\nNote: Don’t forget\
    \ to add a colon(:) after if statement and indent the statements properly that\
    \ are executed when a condition is True.\n\n### 8.1.2 Python if-else Statement\n\
    \nFrom the name itself, we get the clue that the if-else statement checks the\
    \ expression and executes the if block when the expression is True otherwise it\
    \ will execute the else block of code. The else block should be right after if\
    \ block and it is executed when the expression is False.\n\nSyntax:\n\n```\nif(\
    \ expression ):\n    Statement\n\nelse:\n    Statement\n```\n\nExample:\n\n```\n\
    number1 = 20 ; number2 = 30\nif(number1 >= number2 ):\n    print(“number 1 is\
    \ greater than number 2”)\nelse:\n    print(“number 2 is greater than number 1”)\n\
    ```\n\nOutput:\n\nnumber 2 is greater than number 1\n\nNote: Only one else statement\
    \ is followed by an if statement. If you use two else statements after an if statement,\
    \ then you get the following error.\n\nExample:\n\n```\nif (5>10):\n    print(5)\n\
    else:\n    print(10)\nelse:\n    print(“End”)\n```\n\nOutput:\n\nSyntaxError:\
    \ invalid syntax\n\n### 8.1.3 Python if-elif ladder\n\nYou might have heard of\
    \ the else-if statements in other languages like C/C++ or Java. In Python, we\
    \ have an elif keyword to chain multiple conditions one after another. With elif\
    \ ladder, we can make complex decision-making statements. The elif statement helps\
    \ you to check multiple expressions and it executes the code as soon as one of\
    \ the conditions evaluates to True.\n\nSyntax:\n\n```\nif( expression1 ):\n  \
    \  statement\n\nelif (expression2 ) :\n    statement\n\nelif(expression3 ):\n\
    \    statement\n\n.\n.\nelse:\n    statement\n```\n\n**Example:**\n\n```\nprint(\"\
    Select your ride:\")\nprint(\"1. Bike\")\nprint(\"2. Car\")\nprint(\"3. SUV\"\
    )\nchoice = int( input() )\nif( choice == 1 ):\n    print( \"You have selected\
    \ Bike\" )\nelif( choice == 2 ):\n    print( \"You have selected Car\" )\nelif(\
    \ choice == 3 ):\n    print( \"You have selected SUV\" )\nelse:\n    print(\"\
    Wrong choice!\")\n```\n\nOutput:\nSelect your ride:\n1. Bike\n2. Car\n3. SUV\n\
