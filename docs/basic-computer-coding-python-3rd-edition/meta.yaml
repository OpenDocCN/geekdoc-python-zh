    \ = previous\n    self.next = next\n    self.message = message\n```\n\nMost exceptions\
    \ are defined with names that end in “Error,” similar to the naming of the standard\
    \ exceptions.\n\n# 4.1.4 Defining Clean-up Actions\n\nThe try statement has another\
    \ optional clause which is intended to define clean-up actions that must be executed\
    \ under all circumstances. For example:\n\n```\n>>>\n>>> try:\n...     raise KeyboardInterrupt\n\
    ... finally:\n...     print('Goodbye, world!')\n...\nGoodbye, world!\nKeyboardInterrupt\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 2, in <module>\n\
    ```\n\nA *finally clause* is always executed before leaving the try statement,\
    \ whether an exception has occurred or not. When an exception has occurred in\
    \ the try clause and has not been handled by an except clause (or it has occurred\
    \ in an except or else clause), it is re-raised after the finally clause has been\
    \ executed. The finally clause is also executed “on the way out” when any other\
    \ clause of the try statement is left via a break, continue or **return statement**.\
    \ A more complicated example:\n\n```\n>>>\n>>> def divide(x, y):\n...     try:\n\
    ...         result = x / y\n...     except ZeroDivisionError:\n...         print(\"\
    division by zero!\")\n...     else:\n...         print(\"result is\", result)\n\
    ```\n\n> **Return Statement**\ncauses execution to leave the current subroutine\
    \ and resume at the point in the code immediately after where the subroutine was\
    \ called, known as its return address."
- md: "## 4.1.5 Predefined Clean-up Actions\n\nSome objects define standard clean-up\
    \ actions to be undertaken when the object is no longer needed, regardless of\
    \ whether or not the operation using the object succeeded or failed. Look at the\
    \ following example, which tries to open a file and print its contents to the\
    \ screen.\n\n```python\nfor line in open(\"myfile.txt\"):\n    print(line, end=\"\
    \")\n```\n\nThe problem with this code is that it leaves the file open for an\
    \ indeterminate amount of time after this part of the code has finished executing.\
    \ This is not an issue in simple scripts, but can be a problem for larger applications.\
    \ The `with` statement allows objects like files to be used in a way that ensures\
    \ they are always cleaned up promptly and correctly.\n\n```python\nwith open(\"\
    myfile.txt\") as f:\n    for line in f:\n        print(line, end=\"\")\n```\n\n\
    After the statement is executed, the file *f* is always closed, even if a problem\
    \ was encountered while processing the lines. Objects which, like files, provide\
    \ predefined clean-up actions will indicate this in their documentation.\n\nAs\
    \ you can see, the finally clause is executed in any event. The TypeError raised\
    \ by dividing two **strings** is not handled by the except clause and therefore\
    \ re-raised after the finally clause has been executed.\n\nIn real world applications,\
    \ the finally clause is useful for releasing external resources (such as files\
    \ or network connections), regardless of whether the use of the resource was successful.\n\
    \n## 4.2 UNIT TESTING\n\nThe Python unit testing framework, sometimes referred\
    \ to as “PyUnit,” is a Python language version of JUnit, by Kent Beck and Erich\
    \ Gamma. JUnit is, in turn, a Java version of Kent’s Smalltalk testing framework.\
    \ Each is the de facto standard unit testing framework for its respective language.\n\
    \n`unittest` supports **test automation**, sharing of setup and shutdown code\
    \ for tests, aggregation of tests into collections, and independence of the tests\
    \ from the reporting framework. The `unittest` module provides classes that make\
    \ it easy to support these qualities for a set of tests.\n\nTo achieve this, `unittest`\
    \ supports some important concepts:\n\n**test fixture**\nA test fixture represents\
    \ the preparation needed to perform one or more tests, and any associate cleanup\
    \ actions. This may involve, for example, creating temporary or proxy databases,\
    \ directories, or starting a server process.\n\n**test case**\nA test case is\
    \ the smallest unit of testing. It checks for a specific response to a particular\
    \ set of inputs. `unittest` provides a base class, `TestCase`, which may be used\
    \ to create new test cases.\n\n**test suite**\nA test suite is a collection of\
    \ test cases, test suites, or both. It is used to aggregate tests that should\
    \ be executed together.\n\n**test runner**\nA test runner is a component which\
    \ orchestrates the execution of tests and provides the outcome to the user. The\
    \ runner may use a graphical interface, a textual interface, or return a special\
    \ value to indicate the results of executing the tests.\n\n**Keyword**\n**Test\
    \ Automation** is the use of special software (separate from the software being\
    \ tested) to control the execution of tests and the comparison of actual outcomes\
    \ with predicted outcomes.\n\nThe test case and **test fixture** concepts are\
    \ supported through the `TestCase` and `FunctionTestCase` classes; the former\
    \ should be used when creating new tests, and the latter can be used when integrating\
    \ existing test code with a `unittest`-driven framework. When building test fixtures\
    \ using `TestCase`, the `setUp()` and `tearDown()` methods can be overridden to\
    \ provide initialization and cleanup for the fixture. With `FunctionTestCase`,\
    \ existing functions can be passed to the constructor for these purposes. When\
    \ the test is run, the fixture initialization is run first; if it succeeds, the\
    \ cleanup method is run after the test has been executed, regardless of the outcome\
    \ of the test. Each instance of the `TestCase` will only be used to run a single\
    \ test method, so a new fixture is created for each test.\n\nTest suites are implemented\
    \ by the `TestSuite` class. This class allows individual tests and test suites\
    \ to be aggregated; when the suite is executed, all tests added directly to the\
    \ suite and in “child” test suites are run.\n\nA test runner is an object that\
    \ provides a single method, `run()`, which accepts a `TestCase` or `TestSuite`\
    \ object as a parameter, and returns a result object. The class `TestResult` is\
    \ provided for use as the result object. `unittest` provides the `TextTestRunner`\
    \ as an example test runner which reports test results on the standard error stream\
    \ by default. Alternate runners can be implemented for other environments (such\
    \ as graphical environments) without any need to derive from a specific class.\n\
    \n### 4.2.1 Basic example\n\nThe `unittest` module provides a rich set of tools\
    \ for constructing and running tests. This demonstrates that a small subset of\
    \ the tools suffices to meet the needs of most users.\n\nHere is a short script\
    \ to test three string methods:\n\n```python\nimport unittest\n\nclass TestStringMethods(unittest.TestCase):\n\
    \    def test_upper(self):\n        self.assertEqual('foo'.upper(), 'FOO')\n\n\
    \    def test_isupper(self):\n        self.assertTrue('FOO'.isupper())\n     \
    \   self.assertFalse('Foo'.isupper())\n\n    def test_split(self):\n        s\
    \ = 'hello world'\n        self.assertEqual(s.split(), ['hello', 'world'])\n \
    \       # check that s.split fails when the separator is not a string\n      \
    \  with self.assertRaises(TypeError):\n            s.split(2)\n\nif __name__ ==\
    \ '__main__':\n    unittest.main()\n```\n\nA testcase is created by subclassing\
    \ `unittest.TestCase`. The three individual tests are defined with methods whose\
    \ names start with the letters `test`. This naming convention informs the test\
    \ runner about which methods represent tests.\n\nThe crux of each test is a call\
    \ to `assertEqual()` to check for an expected result; `assertTrue()` or `assertFalse()`\
    \ to verify a condition; or `assertRaises()` to verify that a specific exception\
    \ gets raised. These methods are used instead of the `assert` statement so the\
    \ test runner can accumulate all test results and produce a report.\n\nThe `setUp()`\
    \ and `tearDown()` methods allow you to define instructions that will be executed\
    \ before and after each test method.\n\nThe final block shows a simple way to\
    \ run the tests. `unittest.main()` provides a command-line interface to the test\
    \ script. When run from the command line, the script produces an output that looks\
    \ like this:\n\n```\n...\n------------------------------------------------------\n\
    Ran 3 tests in 0.000s\n\nOK\n```\n\nInstead of `unittest.main()`, there are other\
    \ ways to run the tests with a finer level of control, less terse output, and\
    \ no requirement to be run from the command line. For example, the last two lines\
    \ may be replaced with:\n\n```python\nsuite = unittest.TestLoader().loadTestsFromTestCase(TestStringMethods)\n\
    unittest.TextTestRunner(verbosity=2).run(suite)\n```\n\nRunning the revised script\
    \ from the interpreter or another script produces the following output:\n\n```\n\
    test_isupper (__main__.TestStringMethods) ... ok\ntest_split (__main__.TestStringMethods)\
    \ ... ok\ntest_upper (__main__.TestStringMethods) ... ok\n```\n\n---------------------------------------------------------------------\n\
    Ran 3 tests in 0.001s\nOK\n\nThe examples show the most commonly used `unittest`\
    \ features which are sufficient to meet many everyday testing needs. The remainder\
    \ of the documentation explores the full feature set from first principles.\n\n\
    ### 4.2.2 Command-Line Interface\n\nThe `unittest` module can be used from the\
    \ command line to run tests from modules, classes or even individual test methods:\n\
    \n```\npython -m unittest test_module1 test_module2\npython -m unittest test_module.TestClass\n\
    python -m unittest test_module.TestClass.test_method\n```\n\nYou can pass in a\
    \ list with any combination of module names, and fully qualified class or method\
    \ names.\n\nYou can run tests with more detail (higher verbosity) by passing in\
    \ the `-v` flag:\n\n```\npython -m unittest -v test_module\n```\n\nFor a list\
    \ of all the command-line options:\n\n```\npython -m unittest -h\n```\n\nChanged\
    \ in version 2.7: In earlier versions it was only possible to run individual test\
    \ methods and not modules or classes.\n\n### Command-line options\n\n`unittest`\
    \ supports these command-line options:\n\n- `-b`, `--buffer`\n  The standard output\
    \ and standard error streams are buffered during the test run. Output during a\
    \ passing test is discarded. Output is echoed normally on test fail or error and\
    \ is added to the failure messages.\n- `-c`, `--catch`\n  Control-C during the\
    \ test run waits for the current test to end and then reports all the results\
    \ so far. A second Control-C raises the normal Keyboard Interrupt."
  mdcn: "## 4.1.5 预定义的清理操作\n\n某些对象定义了标准的清理操作，当对象不再需要时，无论使用该对象的操作是成功还是失败，这些操作都会被执行。请看以下示例，该示例尝试打开一个文件并将其内容打印到屏幕上。\n\
    \n```python\nfor line in open(\"myfile.txt\"):\n    print(line, end=\"\")\n```\n\
    \n这段代码的问题在于，在代码执行完毕后，文件会保持打开状态，时间不确定。这在简单脚本中不是问题，但对于大型应用程序来说可能是个问题。`with`语句允许以确保文件等对象始终被及时、正确清理的方式使用它们。\n\
    \n```python\nwith open(\"myfile.txt\") as f:\n    for line in f:\n        print(line,\
    \ end=\"\")\n```\n\n语句执行后，文件*f*总是会被关闭，即使在处理行时遇到问题也是如此。像文件这样提供预定义清理操作的对象，会在其文档中说明这一点。\n\
    \n如你所见，`finally`子句无论如何都会执行。除以两个**字符串**引发的`TypeError`未被`except`子句处理，因此在`finally`子句执行后被重新引发。\n\
    \n在实际应用中，`finally`子句对于释放外部资源（如文件或网络连接）非常有用，无论资源的使用是否成功。\n\n## 4.2 单元测试\n\nPython单元测试框架有时被称为“PyUnit”，是Kent\
    \ Beck和Erich Gamma的JUnit的Python语言版本。而JUnit又是Kent的Smalltalk测试框架的Java版本。每个框架都是其各自语言的事实上的标准单元测试框架。\n\
    \n`unittest`支持**测试自动化**、测试的设置和清理代码共享、测试聚合为集合，以及测试与报告框架的独立性。`unittest`模块提供了类，使得为一组测试支持这些特性变得容易。\n\
    \n为了实现这一点，`unittest`支持一些重要的概念：\n\n**测试夹具**\n测试夹具代表执行一个或多个测试所需的准备工作，以及任何相关的清理操作。这可能涉及，例如，创建临时或代理数据库、目录，或启动服务器进程。\n\
    \n**测试用例**\n测试用例是最小的测试单元。它检查特定输入集的特定响应。`unittest`提供了一个基类`TestCase`，可用于创建新的测试用例。\n\
    \n**测试套件**\n测试套件是测试用例、测试套件或两者的集合。它用于聚合应该一起执行的测试。\n\n**测试运行器**\n测试运行器是一个组件，它协调测试的执行并将结果提供给用户。运行器可以使用图形界面、文本界面，或返回一个特殊值来指示测试执行的结果。\n\
    \n**关键词**\n**测试自动化**是使用特殊软件（独立于被测软件）来控制测试执行，并将实际结果与预期结果进行比较。\n\n测试用例和**测试夹具**的概念通过`TestCase`和`FunctionTestCase`类得到支持；前者应在创建新测试时使用，后者可用于将现有测试代码与`unittest`驱动的框架集成。使用`TestCase`构建测试夹具时，可以重写`setUp()`和`tearDown()`方法来为夹具提供初始化和清理。使用`FunctionTestCase`时，可以将现有函数传递给构造函数以实现这些目的。当测试运行时，夹具初始化首先运行；如果成功，无论测试结果如何，清理方法都会在测试执行后运行。`TestCase`的每个实例将只用于运行单个测试方法，因此每个测试都会创建一个新的夹具。\n\
    \n测试套件由`TestSuite`类实现。该类允许将单个测试和测试套件聚合；当套件执行时，直接添加到套件中的所有测试以及“子”测试套件中的所有测试都会运行。\n\
    \n测试运行器是一个对象，它提供一个方法`run()`，该方法接受一个`TestCase`或`TestSuite`对象作为参数，并返回一个结果对象。提供了`TestResult`类用作结果对象。`unittest`提供了`TextTestRunner`作为示例测试运行器，默认在标准错误流上报告测试结果。可以为其他环境（如图形环境）实现替代运行器，而无需从特定类派生。\n\
    \n### 4.2.1 基本示例\n\n`unittest`模块提供了一套丰富的工具来构建和运行测试。这表明一小部分工具就足以满足大多数用户的需求。\n\n\
    这是一个测试三个字符串方法的简短脚本：\n\n```python\nimport unittest\n\nclass TestStringMethods(unittest.TestCase):\n\
    \    def test_upper(self):\n        self.assertEqual('foo'.upper(), 'FOO')\n\n\
    \    def test_isupper(self):\n        self.assertTrue('FOO'.isupper())\n     \
    \   self.assertFalse('Foo'.isupper())\n\n    def test_split(self):\n        s\
    \ = 'hello world'\n        self.assertEqual(s.split(), ['hello', 'world'])\n \
    \       # check that s.split fails when the separator is not a string\n      \
    \  with self.assertRaises(TypeError):\n            s.split(2)\n\nif __name__ ==\
    \ '__main__':\n    unittest.main()\n```\n\n通过继承`unittest.TestCase`来创建测试用例。三个单独的测试通过名称以字母`test`开头的方法定义。这种命名约定告知测试运行器哪些方法代表测试。\n\
    \n每个测试的核心是调用`assertEqual()`来检查预期结果；`assertTrue()`或`assertFalse()`来验证条件；或`assertRaises()`来验证是否引发了特定异常。这些方法被用来代替`assert`语句，以便测试运行器可以累积所有测试结果并生成报告。\n\
    \n`setUp()`和`tearDown()`方法允许你定义在每个测试方法之前和之后执行的指令。\n\n最后的代码块展示了一种运行测试的简单方法。`unittest.main()`为测试脚本提供了一个命令行界面。从命令行运行时，脚本会产生如下输出：\n\
    \n```\n...\n------------------------------------------------------\nRan 3 tests\
    \ in 0.000s\n\nOK\n```\n\n除了`unittest.main()`，还有其他方法可以更精细地控制测试运行，输出不那么简洁，并且不需要从命令行运行。例如，最后两行可以替换为：\n\
    \n```python\nsuite = unittest.TestLoader().loadTestsFromTestCase(TestStringMethods)\n\
    unittest.TextTestRunner(verbosity=2).run(suite)\n```\n\n从解释器或另一个脚本运行修改后的脚本会产生以下输出：\n\
    \n```\ntest_isupper (__main__.TestStringMethods) ... ok\ntest_split (__main__.TestStringMethods)\
    \ ... ok\ntest_upper (__main__.TestStringMethods) ... ok\n```\n\n---------------------------------------------------------------------\n\
    Ran 3 tests in 0.001s\nOK\n\n这些示例展示了最常用的`unittest`功能，足以满足许多日常测试需求。文档的其余部分将从基本原理出发探讨完整的功能集。\n\
    \n### 4.2.2 命令行界面\n\n`unittest`模块可以从命令行使用，以运行模块、类甚至单个测试方法中的测试：\n\n```\npython\
