  md: '# ROLE MODEL


    # BRAM COHEN: AMERICAN COMPUTER PROGRAMMER


    ![](img/dd5296ef0d2e667ac2671bdbd5535cd0_362_0.png)


    Bram Cohen is an American computer programmer, best known as the author of the
    peer-to-peer (P2P) BitTorrent protocol in 2001, as well as the first file sharing
    program to use the protocol, also known as BitTorrent. He is also the co-founder
    of CodeCon and organizer of the San Francisco Bay Area P2P-hackers meeting, was
    the co-author of Codeville and creator of the Chia cryptocurrency which implements
    the proof of space-time consensus algorithm.


    # Early Life and Career


    Cohen grew up in the Upper West Side of Manhattan, New York City, as the son of
    a teacher and computer scientist. He claims he learned the BASIC programming language
    at the age of 5 on his family’s Timex Sinclair computer. Cohen passed the American
    Invitational Mathematics Examination to qualify for the United States of America
    Mathematical Olympiad while he attended Stuyvesant High School in New York City.
    He graduated from Stuyvesant in 1993 and attended SUNY Buffalo. He later dropped
    out of college to work for several dot com companies throughout the mid to late
    1990s, the last being MojoNation, an ambitious but ill-fated project he worked
    on with Jim McCoy.


    MojoNation allowed people to break up confidential files into encrypted chunks
    and distribute those pieces on computers also running the software. If someone
    wanted to download a copy of this encrypted file, they would have to download
    it simultaneously from many computers. This concept, Cohen thought, was perfect
    for a file sharing program, since programs like KaZaA take a long time to download
    a large file because the file is (usually) coming from one source (or “peer”).
    Cohen designed BitTorrent to be able to download files from many sources, thus
    speeding up the download time, especially for users with faster download than
    upload speeds. Thus, the more popular a file is, the faster a user will be able
    to download it, since many people will be downloading it at the same time, and
    these people will also be uploading the data to other users.'
