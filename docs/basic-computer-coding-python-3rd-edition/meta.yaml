    \              # 但 F 的状态是上次离开时的位置：3\nbacon 3                    # 每次调用都有不同的状态信息\n\
    ```\n\n#### 边界情况\n\n有几点需要注意。首先，与 `global` 语句不同，`nonlocal` 名称在执行 `nonlocal` 时必须已经在某个外层\
