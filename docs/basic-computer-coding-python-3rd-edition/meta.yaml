    \ test.py    # This is to make file executable\n./test.py\nThis produces the following\
    \ result –\nHello, Python!\n\n## 1.3.2 Python Identifiers\n\nA Python identifier\
    \ is a name used to identify a variable, function, class, module or other object.\
    \ An identifier starts with a letter A to Z or a to z or an underscore (_) followed\
    \ by zero or more letters, underscores and digits (0 to 9).\n\nPython does not\
    \ allow punctuation characters such as @, $, and % within identifiers. Python\
    \ is a case sensitive programming language. Thus, **Manpower** and **manpower**\
    \ are two different identifiers in Python.\n\nHere are naming conventions for\
    \ Python identifiers –\n\n- Class names start with an uppercase letter. All other\
    \ identifiers start with a lowercase letter.\n- Starting an identifier with a\
    \ single leading underscore indicates that the identifier is private.\n- Starting\
    \ an identifier with two leading underscores indicates a strongly private identifier.\n\
    - If the identifier also ends with two trailing underscores, the identifier is\
    \ a language-defined special name.\n\n## 1.3.3 Reserved Words\n\nThe following\
    \ list shows the Python keywords. These are reserved words and you cannot use\
    \ them as constant or variable or any other identifier names. All the Python keywords\
    \ contain lowercase letters only.\n\n| and | exec | not |\n| --- | --- | --- |\n\
    | assert | finally | or |\n| break | for | pass |\n| class | from | print |\n\
    | continue | global | raise |\n| def | if | return |\n| del | import | try |\n\
    | elif | in | while |\n| else | is | with |\n| except | lambda | yield |\n\n##\
    \ 1.3.4 Lines and Indentation\n\nPython provides no braces to indicate blocks\
    \ of code for class and function definitions or flow control. Blocks of code are\
    \ denoted by line indentation, which is rigidly enforced.\nThe number of spaces\
    \ in the indentation is variable, but all statements within the block must be\
    \ indented the same amount. For example –\n\n```\nif True:\n    print \"True\"\
    \nelse:\n    print \"False\"\n```\n\nHowever, the following block generates an\
