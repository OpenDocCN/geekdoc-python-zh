    \ you’ll learn how to read records from database tables using the SELECT statement.\n\
    \n### Reading Records Using the SELECT Statement\n\nTo retrieve records, you need\
    \ to send a SELECT query to `cursor.execute()`. Then you use `cursor.fetchall()`\
    \ to extract the retrieved table in the form of a list of rows or records.\n\n\
