    ...\nfilters/          Subpackage for filters\n    __init__.py\n    equalizer.py\n\
    \    vocoder.py\n    karaoke.py\n...\n```\n\n> A python package is a collection\
    \ of modules. Modules that are related to each other are mainly put in the same\
    \ package. When a module from an external package is required in a program, that\
    \ package can be imported and its modules can be put to use.\n\nWhen importing\
    \ the package, Python searches through the directories on sys.path looking for\
    \ the package subdirectory.\n\nThe __init__.py files are required to make Python\
    \ treat the directories as containing packages; this is done to prevent directories\
    \ with a common name, such as string, from unintentionally hiding valid modules\
    \ that occur later on the module search path. In the simplest case, __init__.py\
    \ can just be an empty file, but it can also execute initialization code for the\
    \ package or set the __all__ variable, described later.\n\nUsers of the package\
    \ can import individual modules from the package, for example:\n\n```\nimport\
    \ sound.effects.echo\n```\n\nThis loads the submodule sound.effects.echo. It must\
