    \ | 1 to 12 |\n| 2 | tm_mday | 1 to 31 |\n| 3 | tm_hour | 0 to 23 |\n| 4 | tm_min\
    \ | 0 to 59 |\n| 5 | tm_sec | 0 to 61 (60 or 61 are leap-seconds) |\n| 6 | tm_wday\
    \ | 0 to 6 (0 is Monday) |\n| 7 | tm_yday | 1 to 366 (Julian day) |\n| 8 | tm_isdst\
    \ | -1, 0, 1, -1 means library determines DST |\n\n## 8.7.1 Getting Current Time\n\
    \nTo translate a time instant from a *seconds since the epoch* floating-point\
    \ value into a time-tuple, pass the floating-point value to a function (e.g.,\
    \ localtime) that returns a time-tuple with all nine items valid.\n\n```\n#!/usr/bin/python\n\
    \nimport time;\n\nlocaltime = time.localtime(time.time())\n\nprint \"Local current\
    \ time :\", localtime\n```\n\nThis would produce the following result, which could\
