    \ language, and are used in computer programming to implement algorithms. Most\
    \ programming languages consist of instructions for computers.\n\nNote: Core Python\
    \ doesn’t support switch-case statements that are available in other **programming\
    \ languages** but we can use the elif ladder instead of switch cases.\n\n### 8.1.4\
    \ Python Nested if statement\n\nIn very simple words, Nested if statements is\
    \ an if statement inside another if statement. Python allows us to stack any number\
    \ of if statements inside the block of another if statements. They are useful\
    \ when we need to make a series of decisions.\n\nSyntax:\n\n```\nif (expression):\n\
    \    if(expression):\n        Statement of nested if\n    else:\n        Statement\
    \ of nested if else\nStatement of outer if\nStatement outside if block\n```\n\n\
    Example:\n\n```\nnum1 = int( input())\nnum2 = int( input())\n\nif( num1>= num2):\n\
    \    if(num1 == num2):\n        print(f'{num1} and {num2} are equal')\n    else:\n\
