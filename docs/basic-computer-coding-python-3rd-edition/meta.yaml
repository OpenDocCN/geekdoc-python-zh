    # 5.1.5 Python Object Inheritance


    **Inheritance** is the process by which one class takes on the attributes and
    methods of another. Newly formed classes are called *child classes*, and the classes
    that child classes are derived from are called *parent classes*.


    It''s important to note that child classes override *or* extend the functionality
    (e.g., attributes and behaviors) of parent classes. In other words, child classes
    inherit all of the parent''s attributes and behaviors but can also specify different
    behavior to follow. The most basic type of class is an object, which generally
    all other classes inherit as their parent.


