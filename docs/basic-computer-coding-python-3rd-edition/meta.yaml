    \n## 8.1 Python - 决策\n\n程序中的决策用于当程序需要有条件地选择执行某个代码块时。让我们以交通灯为例，根据道路状况或任何特定规则，在不同情况下点亮不同颜色的灯。\n\
    \n> **关键词**\n\n**决策语句**允许你决定程序中特定语句的执行顺序。你可以设置一个条件，并告诉编译器如果满足该条件就采取特定操作。\n\n它是在执行程序时对发生的条件进行预测以指定操作。多个表达式会被求值，结果为\
    \ TRUE 或 FALSE。这些是逻辑决策，Python 也提供了决策语句，以便根据用户需求在应用程序的程序中做出决策。\n\n在你人生的某个时刻，你需要决定应该采取哪些步骤，并据此决定你的下一步行动。\n\
    \n在编程中，我们经常遇到类似的情况，需要根据条件决定应该执行哪段代码。\n\n让我们举一个简单的例子。\n\n假设你正在为一个游戏编写程序。那么在每一步，我们都需要做出决策，例如：\n\
    \n- 如果用户按下‘w’键，那么角色将向前移动。\n- 如果用户按下‘空格键’，那么角色将跳跃。\n- 如果角色撞到障碍物，那么游戏结束，否则我们继续玩。\n\
    \n编程中到处都需要这样的决策，它们决定了程序执行的流向。\n\nPython 有以下决策语句：\n\n- if 语句\n- if-else 语句\n- if-elif\
    \ 阶梯\n- 嵌套语句\n\n让我们详细讨论 Python 中的这些决策语句。\n\n### 8.1.1 Python if 语句\n\nif 语句是**决策语句**最简单的形式。它接受一个表达式，并检查该表达式是否求值为\
    \ True，如果是，则 if 语句中的代码块将被执行。\n\n如果表达式求值为 False，则跳过该代码块。\n\n语法：\nif ( 表达式 ):\n\
    \    语句 1\n    语句 2\n    .\n    语句 n\n\n**示例 1：**\na = 20 ; b = 20\n\n```\nif\
    \ ( a == b ):\n    print( “a and b are equal”)\n    print(“If block ended”)\n\
    ```\n\n输出：\n\na and b are equal\nIf block ended\n\n**示例 2：**\n\n```\nnum = 5\n\
    \nif ( num >= 10):\n    print(“num is greater than 10”)\n\nprint(“if block ended”)\n\
    ```\n\n输出：\n\nIf block ended\n\n在示例 1 中，我们看到条件 a==b 求值为 True。因此，if 语句内的代码块被执行。\n\
    在示例 2 中，条件求值为 False，因此，print 语句未被执行，唯一执行的语句是因为它在 if 块之外。\n\n注意：不要忘记在 if 语句后添加冒号(:)，并正确缩进当条件为\
    \ True 时执行的语句。\n\n### 8.1.2 Python if-else 语句\n\n从名称本身，我们就能得到线索：if-else 语句检查表达式，并在表达式为\
    \ True 时执行 if 块，否则将执行 else 代码块。else 块应紧跟在 if 块之后，并在表达式为 False 时执行。\n\n语法：\n\n\
    ```\nif( 表达式 ):\n    语句\n\nelse:\n    语句\n```\n\n示例：\n\n```\nnumber1 = 20 ; number2\
    \ = 30\nif(number1 >= number2 ):\n    print(“number 1 is greater than number 2”)\n\
    else:\n    print(“number 2 is greater than number 1”)\n```\n\n输出：\n\nnumber 2\
    \ is greater than number 1\n\n注意：一个 if 语句后只能跟一个 else 语句。如果你在 if 语句后使用两个 else 语句，那么你会得到以下错误。\n\
    \n示例：\n\n```\nif (5>10):\n    print(5)\nelse:\n    print(10)\nelse:\n    print(“End”)\n\
    ```\n\n输出：\n\nSyntaxError: invalid syntax\n\n### 8.1.3 Python if-elif 阶梯\n\n你可能在其他语言如\
    \ C/C++ 或 Java 中听说过 else-if 语句。在 Python 中，我们有一个 elif 关键字来将多个条件一个接一个地链接起来。使用 elif\
    \ 阶梯，我们可以做出复杂的决策语句。elif 语句帮助你检查多个表达式，并且一旦其中一个条件求值为 True，它就会执行代码。\n\n语法：\n\n```\n\
    if( 表达式1 ):\n    语句\n\nelif (表达式2 ) :\n    语句\n\nelif(表达式3 ):\n    语句\n\n.\n.\n\
    else:\n    语句\n```\n\n**示例：**\n\n```\nprint(\"Select your ride:\")\nprint(\"1.\
    \ Bike\")\nprint(\"2. Car\")\nprint(\"3. SUV\")\nchoice = int( input() )\nif(\
    \ choice == 1 ):\n    print( \"You have selected Bike\" )\nelif( choice == 2 ):\n\
    \    print( \"You have selected Car\" )\nelif( choice == 3 ):\n    print( \"You\
    \ have selected SUV\" )\nelse:\n    print(\"Wrong choice!\")\n```\n\n输出：\nSelect\
    \ your ride:\n1. Bike\n2. Car\n3. SUV\n3\nYou have selected SUV\n\n> 关键词\n编程语言是计算机语言的一种，用于计算机编程以实现算法。大多数编程语言由计算机指令组成。\n\
    \n注意：核心 Python 不支持其他**编程语言**中可用的 switch-case 语句，但我们可以使用 elif 阶梯来代替 switch case。\n\
    \n### 8.1.4 Python 嵌套 if 语句\n\n用非常简单的话来说，嵌套 if 语句就是另一个 if 语句内部的 if 语句。Python 允许我们在另一个\
    \ if 语句的代码块内堆叠任意数量的 if 语句。当我们需要做出一系列决策时，它们非常有用。\n\n语法：\n\n```\nif (表达式):\n   \
    \ if(表达式):\n        嵌套 if 的语句\n    else:\n        嵌套 if else 的语句\n外部 if 的语句\n\
    if 块外的语句\n```\n\n示例：\n\n```\nnum1 = int( input())\nnum2 = int( input())\n\nif(\
    \ num1>= num2):\n    if(num1 == num2):\n        print(f'{num1} and {num2} are\
    \ equal')\n    else:\n        print(f'{num1} is greater than {num2}')\nelse:\n\
    \    print(f'{num1} is smaller than {num2}')\n```\n\n**输出 1：**\n\n10\n\n20\n\n\
    10 is smaller than 20\n\n**输出 2：**\n\n5\n\n5\n\n5 and 5 are equal\n\n## 8.2 Python\
    \ - 循环\n\n通常，语句是顺序执行的：函数中的第一条语句首先执行，然后是第二条，依此类推。可能会出现需要多次执行一段代码的情况。\n\n编程语言提供各种控制结构，允许更复杂的执行路径。\n\
    \n循环语句允许我们多次执行一条语句或一组语句。下图说明了一个循环语句 –"
