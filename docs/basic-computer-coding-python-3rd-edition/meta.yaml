    | BASIS FOR COMPARISON | MULTIPROCESSING | MULTITHREADING |

    | :--- | :--- | :--- |

    | Basic | Multiprocessing adds CPUs to increase computing power. | Multithreading
    creates multiple threads of a single process to increase computing power. |

    | Execution | Multiple processes are executed concurrently. | Multiple threads
    of a single process are executed concurrently. |

    | Creation | Creation of a process is time-consuming and resource intensive. |
    Creation of a thread is economical in both sense time and resource. |

    | Classification | Multiprocessing can be symmetric or asymmetric. | Multithreading
    is not classified. |


