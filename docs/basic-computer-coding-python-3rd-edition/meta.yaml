    \   return f2     # Return f2 but don't call it\n\naction = f1()         # Make,\
    \ return function\naction()              # Call it now: prints 88\n```\n\nIn this\
    \ code, the call to action is really running the function we named f2 when f1\
    \ ran. f2 remembers the enclosing scope’s X in f1, even though f1 is no longer\
    \ active.\n\n### Factory functions\n\nDepending on whom you ask, this sort of\
    \ behavior is also sometimes called a closure or factory function. These terms\
    \ refer to a function object that remembers values in enclosing scopes regardless\
    \ of whether those scopes are still present in memory. Although classes are usually\
    \ best at remembering state because they make it explicit with attribute assignments,\
    \ such functions provide an alternative.\n\nFor instance, factory functions are\
    \ sometimes used by programs that need to generate event handlers on the fly in\
    \ response to conditions at runtime (e.g., user inputs that cannot be anticipated).\
