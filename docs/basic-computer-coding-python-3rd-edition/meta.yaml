    \ \"brand\": \"Ford\",\n  \"model\": \"Mustang\",\n  \"year\": 1964\n}\ndel thisdict[\"\
    model\"]\nprint(thisdict)\n```\n\n## 3.1.3 The dict() Constructor\n\nIt is also\
    \ possible to use the `dict()` constructor to make a dictionary:\n\n```python\n\
