    The preceding part of the error message shows the context where the exception
    happened, in the form of a stack trace back. In general it contains a stack trace
    back listing source lines; however, it will not display lines read from standard
    input.


    # 4.1.1 Handling Exceptions


    It is possible to write programs that handle selected exceptions. Look at the
    following example, which asks the user for input until a valid integer has been
    entered, but allows the user to interrupt the program (using Control-C or whatever
    the operating system supports); note that a user-generated interruption is signalled
    by raising the KeyboardInterrupt exception.


    ```

    >>> while True:

    ...     try:

    ...         x = int(input("Please enter a number: "))

    ...         break

    ...     except ValueError:

    ...         print("Oops!  That was no valid number.  Try again...")

    ...

    ```


    The try statement works as follows.


    +   - First, the *try clause* (the statement(s) between the try and except keywords)
    is executed.

    - If no exception occurs, the *except clause* is skipped and execution of the
    try statement is finished.

    - If an exception occurs during execution of the try clause, the rest of the clause
    is skipped. Then if its type matches the exception named after the except keyword,
    the except clause is executed, and then execution continues after the try statement.

    - If an exception occurs which does not match the exception named in the except
    clause, it is passed on to outer try statements; if no handler is found, it is
    an *unhandled exception* and execution stops with a message as shown.


    A try statement may have more than one except clause, to specify handlers for
    different exceptions. At most one handler will be executed. Handlers only handle
    exceptions


