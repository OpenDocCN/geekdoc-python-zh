    \ in x_set or y_set or both\n{'C', '&', 'E', 'A', 'O', 'K', 'I'}\nprint(x_set\
    \ & y_set) # Elements in both x_set and y_set\n{'O', 'E', 'K', 'C'}\n```\n\n##\
    \ 3.2.1 Defining a Set\n\nYou can define a set as simple as by naming all of its\
    \ elements in brackets. The only exception is *empty set*, which can be created\
    \ using the function `set()`. If `set()` has a list, a string or a tuple as a\
    \ parameter, it will return a set composed of its elements.\n\nLet's see what\
    \ all that means, and how you can work with sets in Python."
