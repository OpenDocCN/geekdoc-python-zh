    # BRAM COHEN: AMERICAN COMPUTER PROGRAMMER


    ![](img/dd5296ef0d2e667ac2671bdbd5535cd0_362_0.png)


    Bram Cohen is an American computer programmer, best known as the author of the
    peer-to-peer (P2P) BitTorrent protocol in 2001, as well as the first file sharing
    program to use the protocol, also known as BitTorrent. He is also the co-founder
    of CodeCon and organizer of the San Francisco Bay Area P2P-hackers meeting, was
    the co-author of Codeville and creator of the Chia cryptocurrency which implements
    the proof of space-time consensus algorithm.


    # Early Life and Career


    Cohen grew up in the Upper West Side of Manhattan, New York City, as the son of
    a teacher and computer scientist. He claims he learned the BASIC programming language
    at the age of 5 on his family’s Timex Sinclair computer. Cohen passed the American
    Invitational Mathematics Examination to qualify for the United States of America
    Mathematical Olympiad while he attended Stuyvesant High School in New York City.
    He graduated from Stuyvesant in 1993 and attended SUNY Buffalo. He later dropped
    out of college to work for several dot com companies throughout the mid to late
    1990s, the last being MojoNation, an ambitious but ill-fated project he worked
    on with Jim McCoy.


    MojoNation allowed people to break up confidential files into encrypted chunks
    and distribute those pieces on computers also running the software. If someone
    wanted to download a copy of this encrypted file, they would have to download
    it simultaneously from many computers. This concept, Cohen thought, was perfect
    for a file sharing program, since programs like KaZaA take a long time to download
    a large file because the file is (usually) coming from one source (or “peer”).
    Cohen designed BitTorrent to be able to download files from many sources, thus
    speeding up the download time, especially for users with faster download than
    upload speeds. Thus, the more popular a file is, the faster a user will be able
    to download it, since many people will be downloading it at the same time, and
    these people will also be uploading the data to other users.'
- md: "Basic Computer Coding: Python\n\nCohen says that he has Asperger syndrome based\
    \ on a self-diagnosis.\n\n## BitTorrent\n\nIn April 2001, Cohen quit MojoNation\
    \ and began work on BitTorrent. Cohen unveiled his ideas at the first CodeCon\
    \ conference, which he and his roommate Len Sassaman created as a showcase event\
    \ for novel technology projects after becoming disillusioned with the state of\
    \ technology conferences.\n\nCohen wrote the first BitTorrent client implementation\
    \ in Python, and many other programs have since implemented the protocol.\n\n\
    In the summer of 2002, Cohen collected free pornography to lure beta testers to\
    \ use the program. BitTorrent gained its fame for its ability to quickly share\
    \ large music and movie files online. Cohen has claimed he has never violated\
    \ copyright law using his software. Regardless, he is outspoken in his belief\
    \ that the current media business was doomed to being outmoded despite the RIAA\
    \ and MPAA’s legal or technical tactics, such as digital rights management. In\
    \ May 2005, Cohen released a trackerless beta version of BitTorrent.\n\nIn late\
    \ 2003, Cohen had a short career at Valve working on Steam, their digital distribution\
    \ system introduced for Half-Life 2.\n\nBy 2004, he had left Valve and formed\
    \ BitTorrent, Inc. with his brother Ross Cohen and business partner Ashwin Navin.\
    \ In 2012 he announced a beta-version of BitTorrent Live for TV broadcasting through\
    \ the Internet. Cohen left BitTorrent, Inc. in a day to day capacity to co-found\
    \ Chia Network in the fall of 2017.\n\n## BitTorrent and the MPAA\n\nBy mid-2005,\
    \ BitTorrent, Inc. was funded by venture capitalist David Chao from Doll Capital\
    \ Management, and in late 2005 Cohen and Navin made a deal with the MPAA to remove\
    \ links to illegal content on the official BitTorrent website. The deal was with\
    \ the seven largest studios in America. The agreement means the site will comply\
    \ with procedures outlined in the Digital Millennium Copyright Act.\n\n## Personal\
    \ Life\n\nAs of 2008, Cohen lived in the San Francisco Bay Area of the United\
    \ States, with his wife Jenna and their three children.\n\nCohen’s hobbies include\
    \ original origami and juggling up to five balls, but his main interest is in\
    \ recreational mathematics. Cohen maintains a blog where he frequently discusses\
    \ trust metrics with Raph Levien, as well as money systems, games of skill, and\
    \ other math-related topics. He is also an assembly puzzle enthusiast. He has\
    \ designed several puzzles including some in conjunction with Oskar van Deventer\
    \ including several gear-based puzzles such as Gear Shift and a multiple Rubik’s\
    \ Cube variant called Bram’s Fortress. Some of Bram’s puzzle designs are available\
    \ for 3-D printing via Shapeways.\n\n## SUMMARY\n\n- Python’s basic function model\
    \ is simple to use, but even simple function examples quickly led us to questions\
    \ about the meaning of variables in our code.\n- The scope of a variable or name\
    \ defines its visibility throughout your code. In Python, scope is implemented\
    \ as either a Local, Enclosing, Global, or Built-in scope.\n- In all cases, the\
    \ scope of a variable (where it can be used) is always determined by where it\
    \ is assigned in your source code and has nothing to do with which functions call\
    \ which.\n- The global statement and its nonlocal cousin are the only things that\
    \ are remotely like declaration statements in Python.\n- Functions provide nested\
    \ namespaces (scopes) that localize the names they use, such that names inside\
    \ a function won’t clash with those outside it (in a module or another function).\n\
    - The global scope of a module file becomes the attribute namespace of the module\
    \ object once it is imported—importers automatically have access to all of the\
    \ file’s global variables, because a file’s global scope morphs into an object’s\
    \ attribute namespace when it is imported.\n- Besides allowing names in enclosing\
    \ defs to be changed, the nonlocal statement also forces the issue for references—just\
    \ like the global statement, nonlocal causes searches for the names listed in\
    \ the statement to begin in the enclosing defs’ scopes, not in the local scope\
    \ of the declaring function.\n- The nonlocal statement mostly serves to allow\
    \ names in enclosing scopes to be changed rather than just referenced.\n\n## KNOWLEDGE\
    \ CHECK\n\n1. **What is the scope of a variable in Python?**\n   a. The region\
    \ of code where the variable can be accessed\n   b. The lifetime of the variable\n\
    \   c. Both (a) and (b)\n   d. None of the above\n\n2. **What is the global scope\
