    # CHAPTER 7


    # PYTHON MULTITHREADING


    # INTRODUCTION


    Multithreading is a programming concept where multiple threads run independently
    within a process, sharing the same resources but executing different tasks concurrently.
    In Python, multithreading is a way to achieve parallelism and improve the performance
    of certain types of applications. However, it’s important to note that due to
    the Global Interpreter Lock (GIL) in CPython (the default implementation of Python),
    true parallel execution of threads is limited. This means that even though you
    might use threads, only one thread can execute


    After studying this chapter, you will be able to:


    +   1. Discuss on python threading and python multithreading

    2. Determine the useful functions in python multithreading'
  - '[PAGE 209]


    Python bytecode at a time in a single process. Python virtual machine is not a
    thread-safe interpreter, meaning that the interpreter can execute only one thread
    at any given moment. This limitation is enforced by the Python Global Interpreter
    Lock (GIL), which essentially limits one Python thread to run at a time. In other
    words, GIL ensures that only one thread runs within the same process at the same
    time on a single processor.


    Basically, threading may not speed up all tasks. The I/O-bound tasks that spend
    much of their time waiting for external events have a better chance of taking
    advantage of threading than CPU-bound tasks.


    Python comes with two built-in modules for implementing multithreading programs,
    including the thread, and threading modules. The thread and threading modules
    provide useful features for creating and managing threads. However, in this tutorial,
    we''ll focus on the threading module, which is a much-improved, high-level module
    for implementing serious multithreading programs. Also, Python provides the Queue
    module, allowing us to create a queue data structure to exchange information across
    multiple threads safely.


    Multithreading allows the programmer to divide application tasks into sub-tasks
    and simultaneously run them in a program. It allows threads to communicate and
    share resources such as files, data, and memory to the same processor. Furthermore,
    it increases the user''s responsiveness to continue running a program even if
    a part of the application is the length or blocked.


    **Keyword**


    **Parallel programming** is the process of splitting a problem into smaller tasks
    that can be executed at the same time – in parallel – using multiple computing
    resources.


    # 7.1 PYTHON THREADING – PYTHON MULTITHREADING


    Python threading module is used to implement multithreading in python programs.
    Threading in python is used to run multiple threads (tasks, function calls) at
    the same time. Note that this does not mean that they are executed on different
    CPUs. Python threads will not make your program faster if it already uses 100
    % CPU time. In that case, you probably want to look into parallel programming.
    If you are interested in parallel programming with python. Python multiprocessing
    is one of the similar module that we looked into sometime back.'
- md: "## 7.1.1 Getting Started with Python Multithreading\n\nThe threading module\
    \ builds on the low-level features of thread to make working with threads even\
    \ easier and more pythonic. Using threads allows a program to run multiple operations\
    \ concurrently in the same process space. In Computer Science, threads are defined\
    \ as the smallest unit of work which is scheduled to be done by an Operating System.\
    \ Some points to consider about Threads are:\n\n- Threads exist inside a process.\n\
    - Multiple threads can exist in a single process.\n- Threads in same process share\
    \ the state and memory of the parent process.\n\nThis was just a quick overview\
    \ of Threads in general. This post will mainly focus on the threading module in\
    \ Python.\n\nRunning several threads is similar to running several different programs\
    \ concurrently, but with the following benefits:\n\n- Multiple threads within\
    \ a process share the same data space with the main thread and can therefore share\
    \ information or communicate with each other more easily than if they were separate\
    \ processes.\n- Threads sometimes called light-weight processes and they do not\
    \ require much memory overhead; they are cheaper than processes.\n\nA thread has\
    \ a beginning, an execution sequence, and a conclusion. It has an instruction\
    \ pointer that keeps track of where within its context it is currently running.\n\
    \n- It can be pre-empted (interrupted)\n- It can temporarily be put on hold (also\
    \ known as sleeping) while other threads are running - this is called yielding.\n\
    \n> Did You Know?\n> Python 2.0 was released on 16 October 2000 and had many major\
    \ new features, including a cycle-detecting garbage collector and support for\
    \ Unicode. With this release, the development process became more transparent\
    \ and community-backed.\n\nLet us start by creating a Python module, named download.py.\
    \ This file will contain all the functions necessary to fetch the list of images\
    \ and download them. We will split these functionalities into three separate functions:\n\
    \n- get_links\n- download_link\n- setup_download_dir\n\nThe third function, setup_download_dir,\
    \ will be used to create a download destination directory if it does not already\
    \ exist.\n\nImgur's API requires **HTTP** (Hypertext Transfer Protocol) requests\
    \ to bear the Authorization header with the client ID. You can find this client\
    \ ID from the dashboard of the application that you have registered on Imgur,\
    \ and the response will be JSON encoded. We can use Python's standard JSON library\
    \ to decode it. Downloading the image is an even simpler task, as all you have\
    \ to do is fetch the image by its URL and write it to a file.\n\n## 7.1.2 Python\
    \ Multithreading Modules for Thread Implementation\n\nPython offers two modules\
    \ to implement threads in programs.\n\n- `<thread>` module and\n- `<threading>`\
    \ module.\n\nFor your information, `<thread>` module is deprecated in Python 3\
    \ and renamed to `<_thread>` module for backward compatibility. But we will explain\
    \ both methods because many of the users still use legacy Python versions.\n\n\
    The key difference between the two modules is that the module `<thread>` implements\
    \ a thread as a function. On the other hand, the module `<threading>` offers an\
    \ object-oriented approach to enable thread creation.\n\n> IronPython, a Python\
    \ implementation using the .NET framework, does not have a GIL, and neither does\
    \ Jython, the Java-based implementation. You can find a list of working Python\
    \ implementations.\n\n## 7.1.3 Difference between Multiprocessing and Multithreading\n\
    \nMultiprocessing and Multithreading both adds performance to the system. Multiprocessing\
    \ is adding more number of or CPUs/processors to the system which increases the\
    \ computing speed of the system. Multithreading is allowing a process to create\
    \ more threads which increase the responsiveness of the system.\n\n### Comparison\
    \ Chart\n\n| BASIS FOR COMPARISON | MULTIPROCESSING | MULTITHREADING |\n| :---\
    \ | :--- | :--- |\n| Basic | Multiprocessing adds CPUs to increase computing power.\
    \ | Multithreading creates multiple threads of a single process to increase computing\
    \ power. |\n| Execution | Multiple processes are executed concurrently. | Multiple\
    \ threads of a single process are executed concurrently. |\n| Creation | Creation\
    \ of a process is time-consuming and resource intensive. | Creation of a thread\
    \ is economical in both sense time and resource. |\n| Classification | Multiprocessing\
    \ can be symmetric or asymmetric. | Multithreading is not classified. |\n\n###\
    \ Key Differences between Multiprocessing and Multithreading\n\n- The key difference\
    \ between multiprocessing and multithreading is that multiprocessing allows a\
    \ system to have more than two CPUs added to the system whereas multithreading\
    \ lets a process generate multiple threads to increase the computing speed of\
    \ a system.\n- Multiprocessing system executes **multiple processes** simultaneously\
    \ whereas, the multithreading system let execute multiple threads of a process\
    \ simultaneously.\n- Creating a process can consume time and even exhaust the\
    \ system resources. However creating threads is economical as threads belonging\
    \ to the same process share the belongings of that process.\n- Multiprocessing\
    \ can be classified into symmetric multiprocessing and asymmetric multiprocessing\
    \ whereas, multithreading is not classified further.\n\nThe benefits of multithreading\
    \ can be gradually increased in multiprocessing environment as multithreading\
    \ on a multiprocessing system increases parallelism.\n\n## 7.2 FUNCTIONS IN PYTHON\
    \ MULTITHREADING\n\nThe module ‘threading’, for Python, helps us with thread-based\
    \ parallelism. It constructs higher-level threading interfaces on top of the lower\
    \ level _thread module. Where _thread is missing, we cannot use threading. For\
    \ such situations, we have dummy_threading.\n\nWe have the following functions\
    \ in the Python Multithreading module:\n\na. active_count()\nThis returns the\
    \ number of alive(currently) Thread objects. This is equal to the length the of\
    \ the list that enumerate() returns.\n\n```python\n>>> threading.active_count()\n\
    2\n```\n\nb. current_thread()\nBased on the caller’s thread of control, this returns\
    \ the current Thread object. If this thread of control is not through ‘threading’,\
    \ it returns a dummy thread object with limited functionality.\n\n```python\n\
    >>> threading.current_thread()\n<_MainThread(MainThread, started 14352)>\n```\n\
    \nc. get_ident()\nget_ident() returns the current thread’s identifier, which is\
    \ a non-zero integer. We can use this to index a dictionary of thread-specific\
    \ data. Apart from that, it has no special meaning. When one thread exits and\
    \ another creates, Python recycles such an identifier.\n\n```python\n>>> threading.get_ident()\n\
    14352\n```\n\nd. enumerate()\nThis returns a list of all alive(currently) Thread\
    \ objects. This includes the main thread, daemonic threads, and dummy thread objects\
    \ created by current_thread(). This obviously does not include terminated threads\
    \ as well as those that have not begun yet.\n\n```python\n>>> threading.enumerate()\n\
    [<_MainThread(MainThread, started 14352)>, <Thread(SockThread, started daemon\
    \ 9864)>\n```\n\ne. main_thread()\nThis method returns the main Thread object.\
    \ Normally, it is that thread which started the interpreter.\n\n```python\n>>>\
    \ threading.main_thread()\n<_MainThread(MainThread, started 14352)>\n```\n\nf.\
    \ settrace(func)\nsettrace() traces a function for all threads we started using\
    \ ‘threading’. The argument func passes to sys.settrace() for each thread before\
    \ it calls its run() method.\n\n```python\n>>> def sayhi():\n    print(\"Hi\"\
    )\n>>> threading.settrace(sayhi)\n>>>\n```\n\ng. setprofile(func)\nThis method\
    \ sets a profile function for all threads we started from ‘threading’. It passes\
    \ func to sys.setprofile() for each thread before it calls its run() method.\n\
    \n```python\n>>> threading.setprofile(sayhi)\n>>>\n```\n\nh. stack_size([size])\n\
    stack_size() returns the stack size of a thread when creating new threads. size\
    \ is the stack size we want to use for subsequently created threads. This must\
