    Float

    String

    File

    Function

    Composites

    Tuple

    List

    Dictionary

    Class

    Class instance

    Module


    Note that functions are simply values that implement the call method. Thus classes
    and their instances can just associate names with arbitrary values, i.e. act like
    dictionaries.'
