    \ `acquire(blocking=True, timeout=None)`)\n\nThis acquires a semaphore. When we\
    \ pass a `timeout` value other than `None`, it blocks for a maximum of `timeout`\
    \ seconds. If in that interval, `acquire()` does not complete successfully, it\
    \ returns `False`. Otherwise, it returns `True`.\n\n- When we call it without\
    \ arguments, the following cases may be:\n    - If, on entry, the internal counter\
    \ is greater than zero, it decrements it by one, and then returns.\n    - If,\
    \ on entry, the internal counter is zero, it blocks until a call to `release()`\
    \ wakes it up. Now that the counter is greater than 0, it decrements it by 1,\
    \ and then returns `True`. Each call to `release()` wakes exactly one thread.\
    \ We cannot say what order this happens in.\n- When we call it with `blocking`\
    \ with a value of `False`, it does not block. And if a call without arguments\
    \ blocks, then it returns `False`. Otherwise, it does the same as when called\
    \ without arguments, and then returns `True`.\n\n(b. `release()`)\n\nThis method\
    \ releases a semaphore, and increments the internal counter by 1. When, on entry,\
