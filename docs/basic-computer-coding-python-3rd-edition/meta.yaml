    \ more organized and manageable.\n\nFurthermore, it avoids repetition and makes\
    \ code reusable.\n\n#### 2.1.1 Syntax of Function\n\n```\ndef function_name(parameters):\n\
    \    \"\"\"docstring\"\"\"\n    statement(s)\n```\n\nAbove shown is a function\
    \ definition which consists of following components.\n\n-   Keyword def marks\
    \ the start of function header.\n-   A function name to uniquely identify it.\
    \ Function naming follows the same rules of writing identifiers in Python.\n-\
    \   Parameters (arguments) through which we pass values to a function. They are\
    \ optional.\n-   A colon (:) to mark the end of function header.\n-   Optional\
    \ documentation string (docstring) to describe what the function does.\n-   One\
