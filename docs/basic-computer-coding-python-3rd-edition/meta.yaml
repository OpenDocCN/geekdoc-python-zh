- md: "## 7.2.6 Semaphore Objects\n\nEarly Dutch computer scientist Edsger W. Dijkstra\
    \ invented one of the oldest synchronization primitives. Instead of `acquire()`\
    \ and `release()`, he used `P()` and `V()`.\n\nWhat is a semaphore? It is a primitive\
    \ that lets us manage an internal counter. Each call to `acquire()` decrements\
    \ it, and each call to `release()` increments it. But let us tell you, the counter\
