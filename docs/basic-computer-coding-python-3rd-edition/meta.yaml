    win\"), \"requires Windows\")\n    def test_windows_support(self):\n        #\
    \ windows specific testing code\n        pass\n```\n\n这是在详细模式下运行示例的输出：\n\n```\n\
    test_format (__main__.MyTestCase) ... skipped 'not supported in this library version'\n\
    test_nothing (__main__.MyTestCase) ... skipped 'demonstrating skipping'\ntest_windows_support\
    \ (__main__.MyTestCase) ... skipped 'requires Windows'\n----------------------------------------------------------------------\n\
    Ran 3 tests in 0.005s\n\nOK (skipped=3)\n```\n\n类可以像方法一样被跳过：\n\n```\n@unittest.skip(\"\
    showing class skipping\")\nclass MySkippedTestCase(unittest.TestCase):\n    def\
    \ test_not_run(self):\n        pass\n```\n\n`TestCase.setUp()` 也可以跳过测试。当需要设置的资源不可用时，这很有用。\n\
    \n预期失败使用 `expectedFailure()` 装饰器。\n\n```\nclass ExpectedFailureTestCase(unittest.TestCase):\n\
    \    @unittest.expectedFailure\n    def test_fail(self):\n        self.assertEqual(1,\
    \ 0, \"broken\")\n```\n\n通过创建一个装饰器，在希望跳过测试时调用 `skip()`，可以轻松制作自己的跳过装饰器。此装饰器跳过测试，除非传递的对象具有特定属性：\n\
    \n```\ndef skipUnlessHasattr(obj, attr):\n    if hasattr(obj, attr):\n       \
    \ return lambda func: func\n    return unittest.skip(\"{!r} doesn't have {!r}\"\
    .format(obj, attr))\n```\n\n以下装饰器实现了测试跳过和预期失败：\n\nunittest.skip(reason)\n无条件跳过被装饰的测试。reason\
    \ 应描述为什么测试被跳过。\n\nunittest.skipIf(condition, reason)\n如果 condition 为真，则跳过被装饰的测试。\n\
    \nunittest.skipUnless(condition, reason)\n除非 condition 为真，否则跳过被装饰的测试。\n\nunittest.expectedFailure()\n\
    将测试标记为预期失败。如果测试在运行时失败，则该测试不计为失败。\n\nexception unittest.SkipTest(reason)\n引发此异常以跳过测试。\n\
    通常你可以使用 `TestCase.skipTest()` 或跳过装饰器之一，而不是直接引发此异常。\n\n跳过的测试不会在其周围运行 `setUp()`\
    \ 或 `tearDown()`。跳过的类不会运行 `setUpClass()` 或 `tearDownClass()`。\n\n## 4.3 推导式\n\n\
    推导式是允许从其他序列构建序列的构造。Python 2 和 Python 3 都支持以下类型的推导式：\n\n- 列表推导式\n- 字典推导式\n- 集合推导式\n\
    - 生成器推导式\n\n我们将逐一讨论它们。一旦你掌握了使用列表推导式，你就可以轻松使用其中任何一种。\n\n### 4.3.1 列表推导式\n\n列表推导式提供了一种简短而简洁的方式来创建列表。它由方括号组成，方括号内包含一个表达式，后跟一个\
    \ `for` 子句，然后是零个或多个 `for` 或 `if` 子句。表达式可以是任何东西，意味着你可以在列表中放入各种对象。结果将是一个新列表，该列表是在\
    \ `if` 和 `for` 子句的上下文中对表达式求值后生成的。\n\n# 蓝图\n\n```\nvariable = [out_exp for out_exp\
    \ in input_list if out_exp == 2]\n```\n\n这是一个简短的例子：\n\n```\nmultiples = [i for\
    \ i in range(30) if i % 3 == 0]\nprint(multiples)\n# Output: [0, 3, 6, 9, 12,\
    \ 15, 18, 21, 24, 27]\n```\n\n这对于快速创建列表非常有用。有些人甚至更喜欢它而不是 `filter` 函数。当你想向一个方法或函数提供一个列表，通过在\
    \ `for` 循环的每次迭代中向其追加来创建一个新列表时，列表推导式真正大放异彩。\n\n例如，你通常会这样做：\n\n```\nsquared = []\n\
    for x in range(10):\n    squared.append(x**2)\n```\n\n你可以使用列表推导式简化它。例如：\n\n```\n\
    squared = [x**2 for x in range(10)]\n```\n\n### 4.3.2 字典推导式\n\n它们的使用方式类似。这是我最近发现的一个例子：\n\
    \n```\nmcase = {'a': 10, 'b': 34, 'A': 7, 'Z': 3}\nmcase_frequency = {\n    k.lower():\
    \ mcase.get(k.lower(), 0) + mcase.get(k.upper(), 0)\n    for k in mcase.keys()\n\
    }\n# mcase_frequency == {'a': 17, 'z': 3, 'b': 34}\n```\n\n在这个例子中，我们合并了相同但大小写不同的键的值。你也可以快速交换字典的键和值：\n\
    \n```\n{v: k for k, v in some_dict.items()}\n```"
