    \ holds the records returned from using `.fetchall()`. It's a list of tuples representing\
    \ individual records from the table.\n\nIn the query above, you use the `LIMIT`\
    \ clause to constrain the number of rows that are received from the SELECT statement.\
    \ Developers often use `LIMIT` to perform **pagination** when handling large volumes\
    \ of data.\n\nIn MySQL, the `LIMIT` clause takes one or two nonnegative numeric\
    \ arguments. When using one argument, you specify the maximum number of rows to\
    \ return. Since your query includes `LIMIT 5`, only the first 5 records are fetched.\
    \ When using both arguments, you can also specify the offset of the first row\
