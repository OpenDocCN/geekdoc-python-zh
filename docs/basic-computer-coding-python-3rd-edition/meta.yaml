    \n## CHAPTER 4\n\n## EXCEPTIONS, UNIT TESTING AND COMPREHENSIONS\n\n## INTRODUCTION\n\
    \nExceptions are events that occur during the execution of a program that disrupt\
    \ the normal flow of the program's instructions. When an exceptional situation\
    \ arises, an exception is raised. If the exception is not handled (caught) by\
    \ the program, it will terminate and display an error message.\n\nIn other words,\
    \ an exception is a type of error that occurs when a syntactically correct Python\
    \ code raises an error. An arrow indicates the line where the exception occurred,\
    \ while the last line of the error message specifies the exact type of exception\
    \ and provides its description to facilitate debugging. In our case, it is a NameError\
    \ since we tried to print the value of a variable x that was not defined before.\
    \ Also in this case, the second line of our piece of code print(1) was not executed\
    \ because the normal flow of the Python program was interrupted.\n\nUnit testing\
    \ is a software testing technique where individual units or components of a software\
    \ application are tested in isolation to ensure that they work as expected. In\
    \ Python, the unittest module provides a framework for creating and running unit\
    \ tests.\n\nComprehensions in Python provide us with a short and concise way to\
    \ construct new sequences (such as lists, sets, dictionaries, etc.) using previously\
    \ defined sequences.\n\nAfter studying this chapter, you will be able to:\n\n\
    1. Discuss how to use the exceptions\n2. Explain the unit testing\n3. Understand\
    \ the comprehensions\n\n## 4.1 EXCEPTIONS\n\nEven if a statement or expression\
    \ is syntactically correct, it may cause an error when an attempt is made to execute\
    \ it. Errors detected during execution are called *exceptions* and are not unconditionally\
    \ fatal: you will soon learn how to handle them in Python programs. Most exceptions\
    \ are not handled by programs, however, and result in error messages as shown\
    \ here:\n\n```\n>>>\n>>> 10 * (1/0)\nTraceback (most recent call last):\n  File\
    \ \"<stdin>\", line 1, in <module>\nZeroDivisionError: division by zero\n>>> 4\
    \ + spam*3\nTraceback (most recent call last):\n  File \"<stdin>\", line 1, in\
    \ <module>\nNameError: name 'spam' is not defined\n>>> '2' + 2\nTraceback (most\
    \ recent call last):\n  File \"<stdin>\", line 1, in <module>\nTypeError: Can't\
    \ convert 'int' object to str implicitly\n```\n\nThe last line of the error message\
    \ indicates what happened. Exceptions come in different types, and the type is\
    \ printed as part of the message: the types in the example are ZeroDivisionError,\
    \ NameError and TypeError. The string printed as the exception type is the name\
    \ of the built-in exception that occurred. This is true for all built-in exceptions,\
    \ but need not be true for user-defined exceptions (although it is a useful convention).\
    \ Standard exception names are built-in identifiers (not reserved keywords).\n\
    \nThe rest of the line provides detail based on the type of exception and what\
    \ caused it.\n\nThe preceding part of the error message shows the context where\
    \ the exception happened, in the form of a stack trace back. In general it contains\
    \ a stack trace back listing source lines; however, it will not display lines\
    \ read from standard input.\n\n## 4.1.1 Handling Exceptions\n\nIt is possible\
    \ to write programs that handle selected exceptions. Look at the following example,\
    \ which asks the user for input until a valid integer has been entered, but allows\
    \ the user to interrupt the program (using Control-C or whatever the operating\
    \ system supports); note that a user-generated interruption is signalled by raising\
    \ the KeyboardInterrupt exception.\n\n```\n>>> while True:\n...     try:\n...\
    \         x = int(input(\"Please enter a number: \"))\n...         break\n...\
    \     except ValueError:\n...         print(\"Oops!  That was no valid number.\
    \  Try again...\")\n...\n```\n\nThe try statement works as follows.\n\n- First,\
    \ the *try clause* (the statement(s) between the try and except keywords) is executed.\n\
    - If no exception occurs, the *except clause* is skipped and execution of the\
    \ try statement is finished.\n- If an exception occurs during execution of the\
    \ try clause, the rest of the clause is skipped. Then if its type matches the\
    \ exception named after the except keyword, the except clause is executed, and\
    \ then execution continues after the try statement.\n- If an exception occurs\
    \ which does not match the exception named in the except clause, it is passed\
    \ on to outer try statements; if no handler is found, it is an *unhandled exception*\
    \ and execution stops with a message as shown.\n\nA try statement may have more\
    \ than one except clause, to specify handlers for different exceptions. At most\
    \ one handler will be executed. Handlers only handle exceptions"
