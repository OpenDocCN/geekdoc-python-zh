    At each layer, the functions within the box enforce the abstraction boundary because
    they are the only functions that depend upon both the representation above them
    (by their use) and the implementation below them (by their definitions). In this
    way, abstraction barriers are expressed as sets of functions. Abstraction barriers
    provide many advantages. One advantage is that they makes programs much easier
    to maintain and to modify. The fewer functions that depend on a particular representation,
    the fewer changes are required when one wants to change that representation.


    # The Properties of Data


    We began the rational-number implementation by implementing arithmetic operations
    in terms of three unspecified functions: make_rat, numer, and denom. At that point,
    we could think of the operations as being defined in terms of data objects ---
    numerators, denominators, and rational numbers --- whose behavior was specified
    by the latter three functions.


    But what exactly is meant by data? It is not enough to say “whatever is implemented
    by the given selectors and constructors.” We need to guarantee that these functions
    together specify the right behavior. That is, if we construct a rational number
    x from integers n and d, then it should be the case that numer(x)/denom(x) is
    equal to n/d.


    In general, we can think of an abstract data type as defined by some collection
    of selectors and constructors, together with some behavior conditions. As long
    as the behavior conditions are met (such as the division property above), these
    functions constitute a valid representation of the data type.


