    \ 99\n```\n\n我们在此示例中添加了 `global` 声明，使得 `def` 内部的 `X` 现在引用 `def` 外部的 `X`；这次它们是同一个变量。以下是\
    \ `global` 工作的一个稍微复杂的例子：\n\n```\ny, z = 1, 2                # 模块中的全局变量\ndef all_global():\n\
    \    global x               # 声明被赋值的全局变量\n    x = y + z              # 无需声明 y,\
    \ z：LEGB 规则\n```\n\n这里，`x`、`y` 和 `z` 在函数 `all_global` 内部都是全局变量。`y` 和 `z` 是全局的，因为它们没有在函数内被赋值；`x`\
    \ 是全局的，因为它被列在 `global` 语句中以显式映射到模块的作用域。如果没有这里的 `global`，`x` 将因赋值而被视为局部变量。\n\n\
    请注意，`y` 和 `z` 没有被声明为全局；Python 的 LEGB 查找规则会自动在模块中找到它们。另外，请注意 `x` 在函数运行之前可能不存在于外围模块中；在这种情况下，函数中的赋值会在模块中创建\
    \ `x`。\n\n### 10.2.1 最小化全局变量\n\n默认情况下，函数中赋值的名称是局部的，因此如果你想更改函数外部的名称，就必须编写额外的代码（例如，`global`\
    \ 语句）。这是设计使然——正如 Python 中常见的，你必须多说一些才能做潜在“错误”的事情。尽管有时全局变量很有用，但 `def` 中赋值的变量默认是局部的，因为这通常是最好的策略。更改全局变量可能导致众所周知的软件工程问题：因为变量的值依赖于对任意遥远函数的调用顺序，程序可能变得难以调试。\n\
    \n考虑这个模块文件，例如：\n\n```\nX = 99\ndef func1():\n    global X\n    X = 88\n\ndef func2():\n\
    \    global X\n    X = 77\n```\n\n现在，想象一下你的任务是修改或重用这个模块文件。这里的 `X` 值是多少？实际上，除非指定了时间参考点，否则这个问题没有意义——`X`\
    \ 的值是时间相关的，因为它取决于最后调用了哪个函数（仅从这个文件中我们无法判断）。\n\n最终效果是，要理解这段代码，你必须跟踪整个程序的控制流。而且，如果你需要重用或修改代码，你必须将整个程序同时记在脑中。在这种情况下，你无法真正使用其中一个函数而不带上另一个。它们依赖于（即耦合于）全局变量。这就是全局变量的问题——它们通常使代码比由依赖局部变量的自包含函数组成的代码更难理解和使用。\n\
    \n另一方面，除了使用面向对象编程和类之外，全局变量可能是 Python 中保留共享状态信息（函数需要记住以供下次调用时使用的信息）最直接的方式——局部变量在函数返回时消失，但全局变量不会。其他技术，如默认可变参数和闭包函数作用域，也可以实现这一点，但它们比将值推送到全局作用域以供保留更复杂。\n\
    \n一些程序指定单个模块来收集全局变量；只要这是预期的，危害就不大。此外，使用多线程在 Python 中进行并行处理的程序通常依赖于全局变量——它们成为并行线程中运行的函数之间的共享内存，因此充当通信设备。\n\
    \n不过，目前，特别是如果你是编程新手，尽量避免使用全局变量的诱惑——尝试通过传入参数和返回值进行通信。\n\n### 10.2.2 最小化跨文件更改\n\n\
