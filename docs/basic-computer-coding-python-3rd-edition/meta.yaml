    # 5.1.1 Classes in Python


    Focusing first on the data, each thing or object is an instance of some class.
    The primitive data structures available in Python, like numbers, strings, and
    lists are designed to represent simple things like the cost of something, the
    name of a poem, and your favorite colors, respectively. What if you wanted to
    represent something much more complicated?


    For example, let''s say you wanted to track a number of different animals. If
    you used a list, the first element could be the animal''s name while the second
    element could represent its age. How would you know which element is supposed
    to be which? What if you had 100 different animals? Are you certain each animal
    has both a name and an age, and so forth? What if you wanted to add other properties
    to these animals? This lacks organization, and it''s the exact need for classes.
    Classes are used to create new user-defined data structures that contain arbitrary
    information about something. In the case of an animal, we could create an Animal()
    class to track properties about the Animal like the name and age. It''s important
    to note that a class just provides structure—it''s a blueprint for how something
    should be defined, but it doesn''t actually provide any real content itself. The
    Animal() class may specify that the name and age are necessary for defining an
    animal, but it will not actually state what a specific animal''s name or age is.
    It may help to think of a class as an idea for how something should be defined.


    **Keyword**


    **Programming paradigms** are a way to classify programming languages based on
    their features.


