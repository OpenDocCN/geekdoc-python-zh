    \ can only be started once\n```\n\n### b. run()\n\n此方法描述了线程的活动。如果存在，它会调用我们作为 `target`\
    \ 参数传递给对象构造函数的可调用对象。这是使用来自 *kwargs* 和 *args* 的关键字和顺序参数。\n我们可以在子类中重写 `run()`。\n\
