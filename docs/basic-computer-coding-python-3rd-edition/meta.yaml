    [2.23, ‘john’, 70.2]

    [123, ‘john’, 123, ‘john’]

    [‘abcd’, 786, 2.23, ‘john’, 70.2, 123, ‘john’]

    ```


    ## Python Tuples


    A tuple is another sequence data type that is similar to the list. A tuple consists
    of a number of values separated by commas. Unlike lists, however, tuples are enclosed
    within parentheses.


    The main differences between lists and tuples are: Lists are enclosed in brackets
    ( [ ] ) and their elements and size can be changed, while tuples are enclosed
    in parentheses ( ( ) ) and cannot be updated. Tuples can be thought of as **read-only**
    lists. For example –


    ```

    #!/usr/bin/python


    tuple = ( ‘abcd’, 786 , 2.23, ‘john’, 70.2 )

    tinytuple = (123, ‘john’)


    print tuple           # Prints complete list

    print tuple[0]        # Prints first element of the list

    print tuple[1:3]      # Prints elements starting from 2nd till 3rd

    print tuple[2:]       # Prints elements starting from 3rd element

    print tinytuple * 2   # Prints list two times

    print tuple + tinytuple # Prints concatenated lists

    ```


    This produce the following result –


    ```

    (‘abcd’, 786, 2.23, ‘john’, 70.2)

    abcd

    (786, 2.23)

    (2.23, ‘john’, 70.2)

    (123, ‘john’, 123, ‘john’)

    (‘abcd’, 786, 2.23, ‘john’, 70.2, 123, ‘john’)

    ```


    The following code is invalid with tuple, because we attempted to update a tuple,
    which is not allowed. Similar case is possible with lists –


    ```

    #!/usr/bin/python


    tuple = ( ‘abcd’, 786 , 2.23, ‘john’, 70.2  )

    list = [ ‘abcd’, 786 , 2.23, ‘john’, 70.2  ]

    tuple[2] = 1000    # Invalid syntax with tuple

    list[2] = 1000     # Valid syntax with list

    ```


    ## Python Dictionary


    Python’s dictionaries are kind of hash table type. They work like associative
    arrays or hashes found in Perl and consist of key-value pairs. A dictionary key
    can be almost any Python type, but are usually numbers or strings. Values, on
    the other hand, can be any arbitrary Python object.

    Dictionaries are enclosed by curly braces ({ }) and values can be assigned and
    accessed using square braces ([]). For example –


    ```

    #!/usr/bin/python


    dict = {}

    dict[‘one’] = “This is one”

    dict[2]     = “This is two”


    tinydict = {‘name’: ‘john’,’code’:6734, ‘dept’: ‘sales’}


    print dict[‘one’]       # Prints value for ‘one’ key

    print dict[2]           # Prints value for 2 key

    print tinydict          # Prints complete dictionary

    print tinydict.keys()   # Prints all the keys

    print tinydict.values() # Prints all the values

    ```


    This produce the following result –


    ```

    This is one

    This is two

    {''dept'': ''sales'', ''code'': 6734, ''name'': ''john''}

    [''dept'', ''code'', ''name'']

    [''sales'', 6734, ''john'']

    ```


    Dictionaries have no concept of order among elements. It is incorrect to say that
    the elements are “out of order”; they are simply unordered.


    ## 1.4.4 Data Type Conversion


    Sometimes, you may need to perform conversions between the built-in types. To
    convert between types, you simply use the type name as a function.

    There are several built-in functions to perform conversion from one data type
    to another. These functions return a new object representing the converted value.


    | Sr.No. | Function & Description |

    |---|---|

    | 1 | **int(x [,base])** Converts x to an integer. base specifies the base if
    x is a string. |

    | 2 | **long(x [,base] )** Converts x to a long integer. base specifies the base
    if x is a string. |

    | 3 | **float(x)** Converts x to a floating-point number. |

    | 4 | **complex(real [,imag])** Creates a complex number. |

    | 5 | **str(x)** Converts object x to a string representation. |

    | 6 | **repr(x)** Converts object x to an expression string. |

    | 7 | **eval(str)** Evaluates a string and returns an object. |

    | 8 | **tuple(s)** Converts s to a tuple. |'
