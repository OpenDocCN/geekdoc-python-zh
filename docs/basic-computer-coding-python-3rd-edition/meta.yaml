    Cohen wrote the first BitTorrent client implementation in Python, and many other
    programs have since implemented the protocol.


    In the summer of 2002, Cohen collected free pornography to lure beta testers to
    use the program. BitTorrent gained its fame for its ability to quickly share large
    music and movie files online. Cohen has claimed he has never violated copyright
    law using his software. Regardless, he is outspoken in his belief that the current
    media business was doomed to being outmoded despite the RIAA and MPAA’s legal
    or technical tactics, such as digital rights management. In May 2005, Cohen released
    a trackerless beta version of BitTorrent.


    In late 2003, Cohen had a short career at Valve working on Steam, their digital
    distribution system introduced for Half-Life 2.


    By 2004, he had left Valve and formed BitTorrent, Inc. with his brother Ross Cohen
    and business partner Ashwin Navin. In 2012 he announced a beta-version of BitTorrent
    Live for TV broadcasting through the Internet. Cohen left BitTorrent, Inc. in
    a day to day capacity to co-found Chia Network in the fall of 2017.


    # BitTorrent and the MPAA


    By mid-2005, BitTorrent, Inc. was funded by venture capitalist David Chao from
    Doll Capital Management, and in late 2005 Cohen and Navin made a deal with the
    MPAA to remove links to illegal content on the official BitTorrent website. The
    deal was with the seven largest studios in America. The agreement means the site
    will comply with procedures outlined in the Digital Millennium Copyright Act.


    # Personal Life


    As of 2008, Cohen lived in the San Francisco Bay Area of the United States, with
    his wife Jenna and their three children.


    Cohen’s hobbies include original origami and juggling up to five balls, but his
    main interest is in recreational mathematics. Cohen maintains a blog where he
    frequently discusses trust metrics with Raph Levien, as well as money systems,
    games of skill, and other math-related topics. He is also an assembly puzzle enthusiast.
    He has designed several puzzles including some in conjunction with Oskar van Deventer
    including several gear-based puzzles such as Gear Shift and a multiple Rubik’s
    Cube variant called Bram’s Fortress. Some of Bram’s puzzle designs are available
    for 3-D printing via Shapeways.


