    \ smaller than {num2}')\n```\n\n**Output 1:**\n\n10\n\n20\n\n10 is smaller than\
    \ 20\n\n**Output 2:**\n\n5\n\n5\n\n5 and 5 are equal\n\n## 8.2 PYTHON - LOOPS\n\
