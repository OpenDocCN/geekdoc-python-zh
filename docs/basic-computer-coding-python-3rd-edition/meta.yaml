  md: '# 3.1.1 Accessing Dictionary Elements


    We can call the values of a dictionary by referencing the related keys.


    # Accessing Data Items with Keys


    Because dictionaries offer key-value pairs for storing data, they can be important
    elements in your Python program.

    If we want to isolate Sammy’s username, we can do so by calling sammy[‘username’].
    Let’s print that out:

    print(sammy[‘username’])

    Output

    sammy-shark

    Dictionaries behave like a database in that instead of calling an integer to get
    a particular index value as you would with a list, you assign a value to a key
    and can call that key to get its related value.

    By invoking the key ‘username’ we receive the value of that key, which is ‘sammy-shark’.

    The remaining values in the sammy dictionary can similarly be called using the
    same format:

    sammy[‘followers’]

    # Returns 987

    sammy[‘online’]

    # Returns True

    By making use of dictionaries’ key-value pairs, we can reference keys to retrieve
    values.


    # Using Methods to Access Elements


    In addition to using keys to access values, we can also work with some built-in
    methods:


    +   - dict.keys() isolates keys

    - dict.values() isolates values

    - dict.items() returns items in a list format of (key, value) tuple pairs


    To return the keys, we would use the dict.keys() method. In our example, that
    would use the variable name and be sammy.keys(). Let’s pass that to a print()
    method :and look at the output


    ![](img/dd5296ef0d2e667ac2671bdbd5535cd0_78_0.png)'
