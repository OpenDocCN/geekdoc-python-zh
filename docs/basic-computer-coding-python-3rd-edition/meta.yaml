    \ tests.\n\nComprehensions in Python provide us with a short and concise way to\
    \ construct new sequences (such as lists, sets, dictionaries, etc.) using previously\
    \ defined sequences.\n\n# 4.1 EXCEPTIONS\n\nEven if a statement or expression\
    \ is syntactically correct, it may cause an error when an attempt is made to execute\
    \ it. Errors detected during execution are called *exceptions* and are not unconditionally\
    \ fatal: you will soon learn how to handle them in Python programs. Most exceptions\
    \ are not handled by programs, however, and result in error messages as shown\
    \ here:\n\n```\n>>>\n>>> 10 * (1/0)\nTraceback (most recent call last):\n  File\
    \ \"<stdin>\", line 1, in <module>\nZeroDivisionError: division by zero\n>>> 4\
    \ + spam*3\nTraceback (most recent call last):\n  File \"<stdin>\", line 1, in\
    \ <module>\nNameError: name 'spam' is not defined\n>>> '2' + 2\nTraceback (most\
    \ recent call last):\n  File \"<stdin>\", line 1, in <module>\nTypeError: Can't\
    \ convert 'int' object to str implicitly\n```\n\nThe last line of the error message\
    \ indicates what happened. Exceptions come in different types, and the type is\
    \ printed as part of the message: the types in the example are ZeroDivisionError,\
    \ NameError and TypeError. The string printed as the exception type is the name\
    \ of the built-in exception that occurred. This is true for all built-in exceptions,\
    \ but need not be true for user-defined exceptions (although it is a useful convention).\
    \ Standard exception names are built-in identifiers (not reserved keywords).\n\
    \nThe rest of the line provides detail based on the type of exception and what\
    \ caused it.\n\n94"
