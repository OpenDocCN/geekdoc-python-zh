    \ 局部作用域中的名称，而不是外围模块中的名称。\n\n`global` 语句由关键字 `global` 后跟一个或多个用逗号分隔的名称组成。所有列出的名称在函数体内赋值或引用时，都将映射到外围模块的作用域。例如：\n\
    \n```\nX = 88                     # 全局 X\n\ndef func():\n    global X\n    X =\
