    # EDITORIAL BOARD


    **Aleksandar Mratinković** is born on May 5, 1988. in Arandjelovac, Serbia. He
    has graduated on Economic high school (2007), The College of Tourism in Belgrade
    (2013), and also has a master degree of Psychology (Faculty of Philosophy, University
    of Novi Sad). He has been engaged in different fields of psychology (Developmental
    Psychology, Clinical Psychology, Educational Psychology and Industrial Psychology)
    and has published several scientific works.


    **Dan Piestun (PhD)** is currently a startup entrepreneur in Israel working on
    the interface of Agriculture and Biomedical Sciences and was formerly president-CEO
    of the National Institute of Agricultural Research (INIA) in Uruguay. Dan is a
    widely published scientist who has received many honours during his career including
    being a two-time recipient of the Amit Golda Meir Prize from the Hebrew University
    of Jerusalem, his areas of expertise includes stem cell molecular biology, plant
    and animal genetics and bioinformatics. Dan’s passion for applied science and
    technological solutions did not stop him from pursuing a deep connection to the
    farmer, his family and nature. Among some of his interest and practices counts
    enjoying working as a beekeeper and onboard fishing.


    **Hazem Shawky Fouda** has a PhD. in Agriculture Sciences, obtained his PhD. From
    the Faculty of Agriculture, Alexandria University in 2008, He is working in Cotton
    Arbitration & Testing General Organization (CATGO).


    **Felecia Killings** is the Founder and CEO of LiyahAmore Publishing, a publishing
    company committed to providing technical and educational services and products
    to Christian Authors. She operates as the Senior Editor and Writer, the Senior
    Writing Coach, the Content Marketing Specialist, Editor-in-Chief to the company’s
    quarterly magazine, the Executive and Host of an international virtual network,
    and the Executive Director of the company’s online school for Authors. She is
    a former high-school English instructor and professional development professor.
    She possesses a Master of Arts degree in Education and a Bachelor’s degree in
    English and African American studies.


    **Dr. Sandra El Hajj**, Ph.D. in Health Sciences from Nova Southeastern University,
    Florida, USA is a health professional specialized in Preventive and Global Health.
    With her 12 years of education obtained from one of the most prominent universities
    in Beirut, in addition to two leading universities in the State of Florida (USA),
    Dr. Sandra made sure to incorporate interdisciplinary and multicultural approaches
    in her work. Her long years of studies helped her create her own miniature world
    of knowledge linking together the healthcare field with Medical Research, Statistics,
    Food Technology, Environmental & Occupational Health, Preventive Health and most
    noteworthy her precious last degree of Global Health. Till today, she is the first
    and only doctor specialized in Global Health in the Middle East area.


    **Fozia Parveen** has a Dphil in Sustainable Water Engineering from the University
    of Oxford. Prior to this she has received MS in Environmental Sciences from National
    University of Science and Technology (NUST), Islamabad Pakistan and BS in Environmental
    Sciences from Fatima Jinnah Women University (FJWU), Rawalpindi.


    **Igor Krunic** 2003-2007 in the School of Economics. After graduating in 2007,
    he went on to study at The College of Tourism, at the University of Belgrade where
    he got his bachelor degree in 2010. He was active as a third-year student representative
    in the student parliament. Then he went on the Faculty of science, at the University
    of Novi Sad where he successfully defended his master’s thesis in 2013. The crown
    of his study was the work titled Opportunities for development of cultural tourism
    in Cacak“. Later on, he became part of a multinational company where he got promoted
    to a deputy director of logistic. Nowadays he is a consultant and writer of academic
    subjects in the field of tourism.


    **Dr. Jovan Pehcevski** obtained his PhD in Computer Science from RMIT University
    in Melbourne, Australia in 2007. His research interests include big data, business
    intelligence and predictive analytics, data and information science, information
    retrieval, XML, web services and service-oriented architectures, and relational
    and NoSQL database systems. He has published over 30 journal and conference papers
    and he also serves as a journal and conference reviewer. He is currently working
    as a Dean and Associate Professor at European University in Skopje, Macedonia.


    **Dr. Tanjina Nur** finished her PhD in Civil and Environmental Engineering in
    2014 from University of Technology Sydney (UTS). Now she is working as Post-Doctoral
    Researcher in the Centre for Technology in Water and Wastewater (CTWW) and published
    about eight International journal papers with 80 citations. Her research interest
    is wastewater treatment technology using adsorption process.


    **Stephen** obtained his PhD from the University of North Carolina at Charlotte
    in 2013 where his graduate research focused on cancer immunology and the tumor
    microenvironment. He received postdoctoral training in regenerative and translational
    medicine, specifically gastrointestinal tissue engineering, at the Wake Forest
    Institute of Regenerative Medicine. Currently, Stephen is an instructor for anatomy
    and physiology and biology at Forsyth Technical Community College.


    **Michelle** holds a Masters of Business Administration from the University of
    Phoenix, with a concentration in Human Resources Management. She is a professional
    author and has had numerous articles published in the Henry County Times and has
    written and revised several employee handbooks for various YMCA organizations
    throughout the United States.'
