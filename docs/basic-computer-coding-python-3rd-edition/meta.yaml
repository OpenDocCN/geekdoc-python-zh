    \ each other through columns. These database systems support SQL, the Structured\
    \ Query Language, which is used to create, access and manipulate the data. SQL\
    \ is used to access data, and also to create and exploit the relationships between\
    \ the stored data. Additionally, these databases support database normalization\
    \ rules for avoiding redundancy of data. The Python programming language has powerful\
    \ features for database programming. Python supports various databases like MySQL,\
    \ Oracle, Sybase, PostgreSQL, etc. Python also supports Data Definition Language\
    \ (DDL), Data Manipulation Language (DML) and Data Query Statements. For database\
    \ programming, the Python DB API is a widely used module that provides a database\
    \ application programming interface.\n\nIt’s not often that you get to use a language\
    \ as powerful and as versatile as Python. Python is a great language for writing\
    \ web applications, cross-platform desktop applications, Artificial Intelligence\
    \ software, shell scripts, perform scientific computation, games, and even connect\
    \ to and work with a myriad of relational and document-oriented database solutions.\
    \ This course gets you up and running with using Python to program against relational\
    \ and document-oriented databases such as SQLite, MySQL, SQL Server, and MongoDB.\
    \ It teaches you the basic concepts of relational data, databases, tables, SQL,\
    \ and walks you through the code required to connect to these databases and perform\
    \ CRUD (create, retrieve, update, and delete) operations within them using Python.\
    \ When you’re finished with this course, you’ll have a solid foundation to go\
    \ out and start building your own database applications using Python.\n\nRelational\
    \ databases use SQL (Structured Query Language) for performing INSERT/DELETE/UPDATE\
    \ operations on the database tables. However, implementation of SQL varies from\
    \ one type of database to other. This raises incompatibility issues. SQL instructions\
    \ for one database do not match with other.\n\nTo overcome this incompatibility,\
    \ a common interface was proposed in PEP (Python Enhancement Proposal) 249. This\
    \ proposal is called DB-API and requires that a database driver program used to\
    \ interact with Python should be DB-API compliant. Python's standard library includes\
    \ sqlite3 module which is a DB_API compatible driver for SQLite3 database, it\
    \ is also a reference implementation of DB-API.\n\nSince the required DB-API interface\
    \ is built-in, we can easily use SQLite database with a Python application. For\
    \ other types of databases, you will have to install the relevant Python package.\n\
    \n| Database | Python Package |\n| --- | --- |\n| Oracle | cx_oracle, pyodbc |\n\
    | SQL Server | pymssql, pyodbc |\n| PostgreSQL | psycopg2 |\n| MySQL | MySQL Connector/Python,\
    \ pymysql |\n\nA DB-API module such as sqlite3 contains connection and cursor\
    \ classes. The connection object is obtained with connect() method by providing\
    \ required connection credentials such as name of server and port number, and\
    \ username and password if applicable. The connection object handles opening and\
    \ closing the database, and transaction control mechanism of committing or rolling\
    \ back a transaction.\n\n## 9.1 DB-API (SQL-API) FOR PYTHON\n\nPython DB-API is\
    \ independent of any database engine, which enables you to write Python scripts\
    \ to access any database engine. The Python DB API implementation for MySQL is\
    \ MySQLdb. For PostgreSQL, it supports psycopg, PyGresQL and pyPgSQL modules.\
    \ DB-API implementations for Oracle are dc_oracle2 and cx_oracle. Pydb2 is the\
    \ DB-API implementation for DB2. Python's DB-API consists of connection objects,\
    \ cursor objects, standard exceptions and some other module contents, all of which\
    \ we will discuss.\n\n### 9.1.1 Connection Objects\n\nConnection objects create\
    \ a connection with the database and these are further used for different transactions.\
    \ These connection objects are also used as representatives of the database session.\n\
    \n> **Keyword**\n> Database server is a server which uses a database application\
    \ that provides database services to other computer programs or to computers,\
    \ as defined by the client–server model.\n\nA connection is created as follows:\n\
    \n```\n>>>conn = MySQLdb.connect('library', user='suhas', password='python')\n\
    ```\n\nYou can use a connection object for calling methods like commit(), rollback()\
    \ and close() as shown below:\n\n```\n>>>cur = conn.cursor()  //creates new cursor\
    \ object for executing SQL statements\n>>>conn.commit()  //Commits the transactions\n\
    >>>conn.rollback()  //Roll back the transactions\n>>>conn.close()  //closes the\
    \ connection\n>>>conn.callproc(proc,param)  //call stored procedure for execution\n\
    >>>conn.getsource(proc)  //fetches stored procedure code\n```\n\n### 9.1.2 Cursor\
    \ objects\n\nCursor is one of the powerful features of SQL. These are objects\
    \ that are responsible for submitting various SQL statements to a **database server**.\
    \ There are several cursor classes in MySQLdb.cursors:\n\n- BaseCursor is the\
    \ base class for Cursor objects.\n- Cursor is the default cursor class. CursorWarningMixIn,\
    \ CursorStoreResultMixIn, CursorTupleRowsMixIn, and BaseCursor are some components\
    \ of the cursor class.\n- CursorStoreResultMixIn uses the mysql_store_result()\
    \ function to retrieve result sets from the executed query. These result sets\
    \ are stored at the client side.\n- CursorUseResultMixIn uses the mysql_use_result()\
    \ function to retrieve result sets from the executed query. These result sets\
    \ are stored at the server side.\n\nThe following example illustrates the execution\
    \ of SQL commands using cursor objects. You can use execute to execute SQL commands\
    \ like SELECT. To commit all SQL operations you need to close the cursor as cursor.close().\n\
    \n```\n>>>cursor.execute('SELECT * FROM books')\n>>>cursor.execute(\"\"\"SELECT\
    \ * FROM books WHERE book_name = 'python' AND book_author = 'Mark Lutz' )\n>>>cursor.close()\n\
    ```\n\n### 9.1.3 Error and Exception Handling in DB-API\n\nException handling\
    \ is very easy in the Python DB-API module. We can place warnings and error handling\
    \ messages in the programs. Python DB-API has various options to handle this,\
    \ like Warning, InterfaceError, DatabaseError, IntegrityError, InternalError,\
    \ NotSupportedError, OperationalError and ProgrammingError. Let’s take a look\
    \ at them one by one:\n\n- IntegrityError: Let’s look at integrity error in detail.\
    \ In the following example, we will try to enter duplicate records in the database.\
    \ It will show an integrity error, _mysql_exceptions.IntegrityError, as shown\
    \ below:\n\n```\n>>> cursor.execute('insert books values (%s,%s,%s,%s)',('Py9098','Programming\
    \ With Perl',120,100))\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in ?\n  File \"/usr/lib/python2.3/site-packages/MySQLdb/cursors.py\"\
    , line 95, in execute\n    return self._execute(query, args)\n  File \"/usr/lib/python2.3/site-packages/MySQLdb/cursors.py\"\
    , line 114, in _execute\n    self.errorhandler(self, exc, value)\n  raise errorclass,\
    \ errorvalue\n_mysql_exceptions.IntegrityError: (1062, \"Duplicate entry 'Py9098'\
    \ for key 1\")\n```\n\n- OperationalError: If there are any operation errors like\
    \ no databases selected, Python DB-API will handle this error as OperationalError,\
    \ shown below:\n\n```\n>>> cursor.execute('Create database Library')\n>>> q='select\
    \ name from books where cost>=%s order by name'\n>>>cursor.execute(q,[50])\nTraceback\
    \ (most recent call last):\nFile \"<stdin>\", line 1, in ?\nFile \"/usr/lib/python2.3/site-packages/MySQLdb/cursors.py\"\
    , line 95, in execute\nreturn self._execute(query, args)\nFile \"/usr/lib/python2.3/site-packages/MySQLdb/cursors.py\"\
    , line 114, in _execute\nself.errorhandler(self, exc, value)\nFile \"/usr/lib/python2.3/site-packages/MySQLdb/connections.py\"\
    , line 33, in defaulterrorhandler\nraise errorclass, errorvalue\n_mysql_exceptions.OperationalError:\
    \ (1046, 'No Database Selected')\n```\n\n- ProgrammingError: If there are any\
    \ programming errors like duplicate database creations, Python DB-API will handle\
    \ this error as ProgrammingError, shown below:\n\n```\n>>> cursor.execute('Create\
    \ database Library')\nTraceback (most recent call last):\nFile \"<stdin>\", line\
    \ 1, in ?\nFile \"/usr/lib/python2.3/site-packages/MySQLdb/cursors.py\", line\
    \ 95, in execute\n```"
  mdcn: "数据库。这些本质上是表的集合，并通过列相互连接。这些数据库系统支持SQL，即结构化查询语言，用于创建、访问和操作数据。SQL用于访问数据，也用于创建和利用存储数据之间的关系。此外，这些数据库支持数据库规范化规则以避免数据冗余。Python编程语言具有强大的数据库编程功能。Python支持多种数据库，如MySQL、Oracle、Sybase、PostgreSQL等。Python还支持数据定义语言（DDL）、数据操作语言（DML）和数据查询语句。对于数据库编程，Python\
    \ DB API是一个广泛使用的模块，它提供了数据库应用程序编程接口。\n\n你很少有机会使用像Python这样强大且用途广泛的语言。Python是编写Web应用程序、跨平台桌面应用程序、人工智能软件、Shell脚本、执行科学计算、游戏，甚至连接和使用众多关系型和文档型数据库解决方案的绝佳语言。本课程将帮助你快速上手使用Python对关系型和文档型数据库（如SQLite、MySQL、SQL\
    \ Server和MongoDB）进行编程。它将教你关系型数据、数据库、表、SQL的基本概念，并引导你完成连接这些数据库并使用Python在其中执行CRUD（创建、检索、更新和删除）操作所需的代码。完成本课程后，你将拥有坚实的基础，可以开始使用Python构建自己的数据库应用程序。\n\
    \n关系型数据库使用SQL（结构化查询语言）对数据库表执行INSERT/DELETE/UPDATE操作。然而，SQL的实现因数据库类型而异。这导致了兼容性问题。一个数据库的SQL指令与其他数据库不匹配。\n\
    \n为了克服这种不兼容性，PEP（Python增强提案）249中提出了一个通用接口。该提案称为DB-API，要求用于与Python交互的数据库驱动程序必须符合DB-API标准。Python的标准库包含sqlite3模块，它是SQLite3数据库的DB-API兼容驱动程序，也是DB-API的参考实现。\n\
    \n由于所需的DB-API接口是内置的，我们可以轻松地在Python应用程序中使用SQLite数据库。对于其他类型的数据库，你将需要安装相关的Python包。\n\
    \n| 数据库 | Python包 |\n| --- | --- |\n| Oracle | cx_oracle, pyodbc |\n| SQL Server\
    \ | pymssql, pyodbc |\n| PostgreSQL | psycopg2 |\n| MySQL | MySQL Connector/Python,\
    \ pymysql |\n\nDB-API模块（如sqlite3）包含连接和游标类。连接对象通过提供所需的连接凭证（如服务器名称和端口号，以及用户名和密码（如果适用））使用connect()方法获取。连接对象处理数据库的打开和关闭，以及提交或回滚事务的事务控制机制。\n\
    \n## 9.1 Python的DB-API（SQL-API）\n\nPython DB-API独立于任何数据库引擎，这使你能够编写Python脚本来访问任何数据库引擎。MySQL的Python\
    \ DB-API实现是MySQLdb。对于PostgreSQL，它支持psycopg、PyGresQL和pyPgSQL模块。Oracle的DB-API实现是dc_oracle2和cx_oracle。Pydb2是DB2的DB-API实现。Python的DB-API由连接对象、游标对象、标准异常和其他一些模块内容组成，我们将逐一讨论。\n\
    \n### 9.1.1 连接对象\n\n连接对象创建与数据库的连接，这些连接进一步用于不同的事务。这些连接对象也用作数据库会话的代表。\n\n> **关键词**\n\
    > 数据库服务器是一个使用数据库应用程序的服务器，该应用程序根据客户端-服务器模型为其他计算机程序或计算机提供数据库服务。\n\n连接创建如下：\n\n```\n\
    >>>conn = MySQLdb.connect('library', user='suhas', password='python')\n```\n\n\
    你可以使用连接对象调用commit()、rollback()和close()等方法，如下所示：\n\n```\n>>>cur = conn.cursor()\
    \  //创建新的游标对象以执行SQL语句\n>>>conn.commit()  //提交事务\n>>>conn.rollback()  //回滚事务\n\
    >>>conn.close()  //关闭连接\n>>>conn.callproc(proc,param)  //调用存储过程执行\n>>>conn.getsource(proc)\
    \  //获取存储过程代码\n```\n\n### 9.1.2 游标对象\n\n游标是SQL的强大功能之一。这些对象负责向**数据库服务器**提交各种SQL语句。MySQLdb.cursors中有几个游标类：\n\
    \n- BaseCursor是游标对象的基类。\n- Cursor是默认的游标类。CursorWarningMixIn、CursorStoreResultMixIn、CursorTupleRowsMixIn和BaseCursor是游标类的一些组成部分。\n\
    - CursorStoreResultMixIn使用mysql_store_result()函数从执行的查询中检索结果集。这些结果集存储在客户端。\n- CursorUseResultMixIn使用mysql_use_result()函数从执行的查询中检索结果集。这些结果集存储在服务器端。\n\
    \n以下示例说明了使用游标对象执行SQL命令。你可以使用execute执行SELECT等SQL命令。要提交所有SQL操作，你需要关闭游标，即cursor.close()。\n\
    \n```\n>>>cursor.execute('SELECT * FROM books')\n>>>cursor.execute(\"\"\"SELECT\
    \ * FROM books WHERE book_name = 'python' AND book_author = 'Mark Lutz' )\n>>>cursor.close()\n\
    ```\n\n### 9.1.3 DB-API中的错误和异常处理\n\n在Python DB-API模块中，异常处理非常简单。我们可以在程序中放置警告和错误处理消息。Python\
    \ DB-API有多种处理此问题的选项，如Warning、InterfaceError、DatabaseError、IntegrityError、InternalError、NotSupportedError、OperationalError和ProgrammingError。让我们逐一查看：\n\
    \n- IntegrityError：让我们详细看看完整性错误。在下面的示例中，我们将尝试在数据库中输入重复的记录。它将显示一个完整性错误，_mysql_exceptions.IntegrityError，如下所示：\n\
    \n```\n>>> cursor.execute('insert books values (%s,%s,%s,%s)',('Py9098','Programming\
    \ With Perl',120,100))\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in ?\n  File \"/usr/lib/python2.3/site-packages/MySQLdb/cursors.py\"\
    , line 95, in execute\n    return self._execute(query, args)\n  File \"/usr/lib/python2.3/site-packages/MySQLdb/cursors.py\"\
    , line 114, in _execute\n    self.errorhandler(self, exc, value)\n  raise errorclass,\
    \ errorvalue\n_mysql_exceptions.IntegrityError: (1062, \"Duplicate entry 'Py9098'\
    \ for key 1\")\n```\n\n- OperationalError：如果有任何操作错误，如未选择数据库，Python DB-API将此错误处理为OperationalError，如下所示：\n\
    \n```\n>>> cursor.execute('Create database Library')\n>>> q='select name from\
    \ books where cost>=%s order by name'\n>>>cursor.execute(q,[50])\nTraceback (most\
    \ recent call last):\nFile \"<stdin>\", line 1, in ?\nFile \"/usr/lib/python2.3/site-packages/MySQLdb/cursors.py\"\
    , line 95, in execute\nreturn self._execute(query, args)\nFile \"/usr/lib/python2.3/site-packages/MySQLdb/cursors.py\"\
    , line 114, in _execute\nself.errorhandler(self, exc, value)\nFile \"/usr/lib/python2.3/site-packages/MySQLdb/connections.py\"\
    , line 33, in defaulterrorhandler\nraise errorclass, errorvalue\n_mysql_exceptions.OperationalError:\
    \ (1046, 'No Database Selected')\n```\n\n- ProgrammingError：如果有任何编程错误，如重复创建数据库，Python\
    \ DB-API将此错误处理为ProgrammingError，如下所示：\n\n```\n>>> cursor.execute('Create database\
    \ Library')\nTraceback (most recent call last):\nFile \"<stdin>\", line 1, in\
    \ ?\nFile \"/usr/lib/python2.3/site-packages/MySQLdb/cursors.py\", line 95, in\
    \ execute\n```"
