    In 1999, Van Rossum submitted a funding proposal to DARPA called "Computer Programming
    for Everybody," in which he further defined his goals for Python:


    +   - An easy and intuitive language just as powerful as major competitors

    - Open source, so anyone can contribute to its development

    - Code that is as understandable as plain English

    - Suitability for everyday tasks, allowing for short development times


    Python has grown to become a popular programming language. As of October 2017,
    it was the second most popular language on GitHub, a social coding website, behind
    Javascript and ahead of Java. According to a programming language popularity survey
    it is consistently amongst the top 10 most mentioned languages in job postings.
    Furthermore, Python is consistently in the top 10 most popular languages according
    to the TIOBE Programming Community Index.


    # Mondrian


    At Google, Van Rossum developed Mondrian, a web-based code review system written
    in Python and used within the company. He named the software after the Dutch painter
    Piet Mondriaan. He named another related software projectafter Gerrit Rietveld,
    a Dutch designer.


    # Dropbox


    In 2013, Van Rossum started working at the cloud file storage company Dropbox.'
  - '[PAGE 45]


    Basic Computer Coding: Python


    # SUMMARY


    +   - Python is a high-level, versatile programming language known for its simplicity
    and readability. It was created by Guido van Rossum and first released in 1991.

    - Python is widely used for various applications, including web development, data
    analysis, artificial intelligence, machine learning, scientific computing, and
    more.

    - Python is dynamically typed and garbage-collected. It supports multiple programming
    paradigms, including structured (particularly procedural), object-oriented and
    functional programming.

    - A Python identifier is a name used to identify a variable, function, class,
    module or other object. An identifier starts with a letter A to Z or a to z or
    an underscore (_) followed by zero or more letters, underscores and digits (0
    to 9).

    - A group of individual statements, which make a single code block are called
    suites in Python. Compound or complex statements, such as if, while, def, and
    class require a header line and a suite.

    - Variables are nothing but reserved memory locations to store values. This means
    that when you create a variable you reserve some space in memory.

    - Python variables do not need explicit declaration to reserve memory space. The
    declaration happens automatically when you assign a value to a variable. The equal
    sign (=) is used to assign values to variables.

    - Python’s dictionaries are kind of hash table type. They work like associative
    arrays or hashes found in Perl and consist of key-value pairs. A dictionary key
    can be almost any Python type, but are usually numbers or strings. Values, on
    the other hand, can be any arbitrary Python object.

    - Operators are the constructs which can manipulate the value of operands. Consider
    the expression 4 + 5 = 9. Here, 4 and 5 are called operands and + is called operator.'
