- md: "## CHAPTER 3\n\n## DICTIONARIES, SETS, AND FILES\n\n## INTRODUCTION\n\nIn Python,\
    \ a dictionary is a built-in data type that allows you to store and retrieve data\
    \ in a key-value pair format. Dictionaries are also known as associative arrays\
    \ or hash maps in other programming languages. They are mutable, unordered, and\
    \ can store a variety of data types, including numbers, strings, lists, and even\
    \ other dictionaries.\n\nThe dictionary holds the key: value pair. Key-value is\
    \ provided in the dictionary to make it more optimized. The code defines a Python\
    \ dictionary named Dict with three key-value pairs. Each key is an integer, and\
    \ each value is a string. The code then prints the contents of the dictionary.\n\
    \nAfter studying this chapter, you will be able to:\n\n- Understand python dictionaries\n\
    - Explain python sets\n- Discuss about files\n\nA Set in Python programming is\
    \ an unordered collection data type that is iterable, mutable and has no duplicate\
    \ elements.\n\nSet are represented by { } (values enclosed in curly braces).\n\
    \nThe major advantage of using a set, as opposed to a list, is that it has a highly\
    \ optimized method for checking whether a specific element is contained in the\
    \ set. This is based on a data structure known as a hash table. Since sets are\
    \ unordered, we cannot access items using indexes as we do in lists.\n\nFile objects\
    \ are Python code's main interface to external files on your computer. They can\
    \ be used to read and write text memos, audio clips, Excel documents, saved email\
    \ messages, and whatever else you happen to have stored on your machine. Files\
    \ are a core type, but they're something of an oddball—there is no specific literal\
    \ syntax for creating them. Rather, to create a file object, you call the built-in\
    \ open function, passing in an external filename and an optional processing mode\
    \ as strings.\n\n## 3.1 PYTHON DICTIONARIES\n\nA dictionary is a collection which\
    \ is unordered, changeable and indexed. In Python dictionaries are written with\
    \ curly brackets, and they have keys and values.\n\nExample:\nCreate and print\
    \ a dictionary:\n\n```python\nthisdict = {\n  \"brand\": \"Ford\",\n  \"model\"\
    : \"Mustang\",\n  \"year\": 1964\n}\nprint(thisdict)\n```\n\n### 3.1.1 Accessing\
    \ Dictionary Elements\n\nWe can call the values of a dictionary by referencing\
    \ the related keys.\n\n#### Accessing Data Items with Keys\n\nBecause dictionaries\
    \ offer key-value pairs for storing data, they can be important elements in your\
    \ Python program.\nIf we want to isolate Sammy’s username, we can do so by calling\
    \ sammy[‘username’]. Let’s print that out:\n\n```python\nprint(sammy['username'])\n\
    ```\n\nOutput\n\n```\nsammy-shark\n```\n\nDictionaries behave like a database\
    \ in that instead of calling an integer to get a particular index value as you\
    \ would with a list, you assign a value to a key and can call that key to get\
    \ its related value.\nBy invoking the key ‘username’ we receive the value of that\
    \ key, which is ‘sammy-shark’.\nThe remaining values in the sammy dictionary can\
    \ similarly be called using the same format:\n\n```python\nsammy['followers']\n\
    # Returns 987\nsammy['online']\n# Returns True\n```\n\nBy making use of dictionaries’\
    \ key-value pairs, we can reference keys to retrieve values.\n\n#### Using Methods\
    \ to Access Elements\n\nIn addition to using keys to access values, we can also\
    \ work with some built-in methods:\n\n- dict.keys() isolates keys\n- dict.values()\
    \ isolates values\n- dict.items() returns items in a list format of (key, value)\
    \ tuple pairs\n\nTo return the keys, we would use the dict.keys() method. In our\
    \ example, that would use the variable name and be sammy.keys(). Let’s pass that\
    \ to a print() method and look at the output:\n\n```python\nprint(sammy.keys())\n\
    ```\n\nOutput\n\n```\ndict_keys(['followers', 'username', 'online'])\n```\n\n\
    We receive output that places the keys within an iterable view object of the dict_keys\
    \ class. The keys are then printed within a list format.\nThis method can be used\
    \ to query across dictionaries. For example, we can take a look at the common\
    \ keys shared between two dictionary data structures:\n\n```python\nsammy = {'username':\
    \ 'sammy-shark', 'online': True, 'followers': 987}\njesse = {'username': 'JOctopus',\
    \ 'online': False, 'points': 723}\nfor common_key in sammy.keys() & jesse.keys():\n\
    \    print(sammy[common_key], jesse[common_key])\n```\n\nThe dictionary sammy\
    \ and the dictionary jesse are each a user profile dictionary.\nTheir profiles\
    \ have different keys, however, because Sammy has a social profile with associated\
    \ followers, and Jesse has a gaming profile with associated points. The 2 keys\
    \ they have in common are username and online status, which we can find when we\
    \ run this small program:\n\nOutput\n\n```\nsammy-shark JOctopus\nTrue False\n\
    ```\n\nWe could certainly improve on the program to make the output more user-readable,\
    \ but this illustrates that dict.keys() can be used to check across various dictionaries\
    \ to see what they share in common or not. This is especially useful for large\
    \ dictionaries.\nSimilarly, we can use the dict.values() method to query the values\
    \ in the sammy dictionary, which would be constructed as sammy.values(). Let's\
    \ print those out:\n\n```python\nsammy = {'username': 'sammy-shark', 'online':\
    \ True, 'followers': 987}\n\nprint(sammy.values())\n```\n\nOutput\n\n```\ndict_values([True,\
    \ 'sammy-shark', 987])\n```\n\nBoth the methods keys() and values() return unsorted\
    \ lists of the keys and values present in the sammy dictionary with the view objects\
    \ of dict_keys and dict_values respectively.\nIf we are interested in all of the\
    \ items in a dictionary, we can access them with the items() method:\n\n```python\n\
