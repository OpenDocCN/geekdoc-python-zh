    \ `Event`。\n\n“主线程”对象属于我们程序中的初始控制线程；它不是守护线程。\n\n最后，解释器可能会创建“虚拟线程对象”。这些是“外来线程”（在“threading”之外启动的控制线程，例如，直接从\
