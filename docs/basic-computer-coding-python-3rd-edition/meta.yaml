    \    print \"Answer\"\n    print \"False\"\n```\n\nThus, in Python all the continuous\
    \ lines indented with same number of spaces would form a block. The following\
    \ example has various statement blocks –\n\n```\n#!/usr/bin/python\nimport sys\n\
    \ntry:\n    # open file stream\n    file = open(file_name, \"w\")\nexcept IOError:\n\
    \    print \"There was an error writing to\", file_name\n    sys.exit()\nprint\
    \ \"Enter \", file_finish,\nprint \" When finished\"\nwhile file_text != file_finish:\n\
    \    file_text = raw_input(\"Enter text: \")\n    if file_text == file_finish:\n\
    \        # close the file\n        file.close\n        break\n    file.write(file_text)\n\
    \    file.write(\"\\n\")\nfile.close()\nfile_name = raw_input(\"Enter filename:\
    \ \")\nif len(file_name) == 0:\n    print \"Next time please enter something\"\
    \n    sys.exit()\ntry:\n    file = open(file_name, \"r\")\nexcept IOError:\n \
    \   print \"There was an error reading file\"\n    sys.exit()\nfile_text = file.read()\n\
    file.close()\nprint file_text\n```\n\n## 1.3.5 Multi-Line Statements\n\nStatements\
    \ in Python typically end with a new line. Python does, however, allow the use\
    \ of the line continuation character (\\) to denote that the line should continue.\
    \ For example –\n\n```\ntotal = item_one + \\\n        item_two + \\\n       \
    \ item_three\n```\n\nStatements contained within the [], {}, or () brackets do\
    \ not need to use the line continuation character. For example –\n\n```\ndays\
    \ = ['Monday', 'Tuesday', 'Wednesday',\n        'Thursday', 'Friday']\n```\n\n\
    ## 1.3.6 Quotation in Python\n\nPython accepts single ('), double (\") and triple\
    \ (''' or \"\"\") quotes to denote string literals, as long as the same type of\
    \ quote starts and ends the string. The triple quotes are used to span the string\
    \ across multiple lines. For example, all the following are legal –\n\n```\nword\
    \ = 'word'\nsentence = \"This is a sentence.\"\nparagraph = \"\"\"This is a paragraph.\
    \ It is\nmade up of multiple lines and sentences.\"\"\"\n```\n\n## 1.3.7 Comments\
    \ in Python\n\nA hash sign (#) that is not inside a string literal begins a comment.\
    \ All characters after the # and up to the end of the physical line are part of\
    \ the comment and the Python interpreter ignores them.\n\n```\n#!/usr/bin/python\n\
    # First comment\nprint \"Hello, Python!\" # second comment\n```\n\nThis produces\
    \ the following result –\nHello, Python!\n\nYou can type a comment on the same\
    \ line after a statement or expression –\n\n```\nname = “Madisetti” # This is\
    \ again comment\n```\n\nYou can comment multiple lines as follows –\n\n```\n#\
    \ This is a comment.\n# This is a comment, too.\n# This is a comment, too.\n#\
    \ I said that already.\n```\n\nCode block is a lexical structure of source code\
    \ which is grouped together.\n\n## 1.3.8 Using Blank Lines\n\nA line containing\
    \ only whitespace, possibly with a comment, is known as a blank line and Python\
    \ totally ignores it.\n\nIn an interactive interpreter session, you must enter\
    \ an empty physical line to terminate a multiline statement.\n\n## 1.3.9 Waiting\
    \ for the User\n\nThe following line of the program displays the prompt, the statement\
    \ saying “Press the enter key to exit”, and waits for the user to take action\
    \ –\n\n```\n#!/usr/bin/python\nraw_input(“\\n\\nPress the enter key to exit.”)\n\
    ```\n\nHere, “\\n\\n” is used to create two new lines before displaying the actual\
    \ line. Once the user presses the key, the program ends. This is a nice trick\
    \ to keep a console window open until the user is done with an application.\n\n\
    ## 1.3.10 Multiple Statements on a Single Line\n\nThe semicolon ( ; ) allows multiple\
    \ statements on the single line given that neither statement starts a new **code\
    \ block**. Here is a sample snip using the semicolon –\n\n```\nimport sys; x =\
    \ ‘foo’; sys.stdout.write(x + ‘\\n’)\n```\n\n## 1.3.11 Multiple Statement Groups\
    \ as Suites\n\nA group of individual statements, which make a single code block\
    \ are called **suites** in Python. Compound or complex statements, such as if,\
    \ while, def, and class require a header line and a suite. Header lines begin\
    \ the statement (with the keyword) and terminate with a colon ( : ) and are followed\
    \ by one or more lines which make up the suite. For example –\n\n```\nif expression\
    \ :\n    suite\n\nelif expression :\n    suite\n\nelse :\n    suite\n```\n\n##\
    \ 1.3.12 Command Line Arguments\n\nMany programs can be run to provide you with\
    \ some basic information about how they should be run. Python enables you to do\
    \ this with -h –\n\n```\n$ python -h\nusage: python [option] ... [-c cmd | -m\
    \ mod | file | -] [arg] ...\nOptions and arguments (and corresponding environment\
    \ variables):\n-c cmd : program passed in as string (terminates option list)\n\
    -d     : debug output from parser (also PYTHONDEBUG=x)\n-E     : ignore environment\
    \ variables (such as PYTHONPATH)\n-h     : print this help message and exit\n\n\
    [ etc. ]\n```\n\nYou can also program your script in such a way that it should\
    \ accept various options. Command Line Arguments is an advanced topic and should\
    \ be studied a bit later once you have gone through rest of the Python concepts.\n\
    \n## 1.4 PYTHON VARIABLES\n\nVariables are nothing but reserved memory locations\
    \ to store values. This means that when you create a variable you reserve some\
    \ space in memory.\nBased on the data type of a variable, the interpreter allocates\
    \ memory and decides what can be stored in the reserved memory. Therefore, by\
    \ assigning different data types to variables, you can store integers, decimals\
    \ or characters in these variables.\n\n## 1.4.1 Assigning Values to Variables\n\
    \nPython variables do not need explicit declaration to reserve memory space. The\
    \ declaration happens automatically when you assign a value to a variable. The\
    \ equal sign (=) is used to assign values to variables."
