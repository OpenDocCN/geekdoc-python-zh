    \ = %s\nWHERE\n    movie_id = %s AND reviewer_id = %s;\n\nSELECT *\nFROM ratings\n\
    WHERE\n    movie_id = %s AND reviewer_id = %s\n\"\"\"\nval_tuple = (\n    new_rating,\n\
