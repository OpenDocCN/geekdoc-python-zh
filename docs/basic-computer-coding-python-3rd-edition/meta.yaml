    \ and attributes to this database.\n\nThe image below depicts the database schema:\n\
    \n![](img/dd5296ef0d2e667ac2671bdbd5535cd0_301_0.png)\n\n**Figure 1.** Schema\
    \ Diagram for an Online Movie Rating System.\n\nThe tables in this database are\
    \ related to each other, movies and reviewers will have a many-to-many relationship\
    \ since one movie can be reviewed by multiple reviewers and one reviewer can review\
    \ multiple movies. The ratings table connects the movies table with the reviewers\
    \ table.\n\n# 9.3.2 Creating Tables Using the CREATE TABLE Statement\n\nNow, to\
    \ create a new table in MySQL, you need to use the CREATE TABLE statement. The\
    \ following MySQL query will create the movies table for your online_movie_rating\
    \ database:\n\n```\nCREATE TABLE movies(\n    id INT AUTO_INCREMENT PRIMARY KEY,\n\
    \    title VARCHAR(100),\n```"
- md: "## 9.3.3 Showing a Table Schema Using the DESCRIBE Statement\n\nNow, that you’ve\
    \ created all three tables, you can look at their schema using the following SQL\
    \ statement:\n`DESCRIBE <table_name>;`\n\nTo get some results back from the cursor\
    \ object, you need to use `cursor.fetchall()`. This method fetches all rows from\
    \ the last executed statement. Assuming you already have the MySQLConnection object\
    \ in the connection variable, you can print out all the results fetched by `cursor.fetchall()`:\n\
    \n```python\n>>> show_table_query = \"DESCRIBE movies\"\n>>> with connection.cursor()\
    \ as cursor:\n...     cursor.execute(show_table_query)\n...     # Fetch rows from\
    \ last executed query\n...     result = cursor.fetchall()\n...     for row in\
    \ result:\n...         print(row)\n...\n('id', 'int(11)', 'NO', 'PRI', None, 'auto_increment')\n\
    ('title', 'varchar(100)', 'YES', '', None, '')\n('release_year', 'year(4)', 'YES',\
    \ '', None, '')\n('genre', 'varchar(100)', 'YES', '', None, '')\n('collection_in_mil',\
    \ 'int(11)', 'YES', '', None, '')\n```\n\nOnce you execute the above code, you\
    \ should receive a table containing information about all the columns in movies\
    \ table. For each column, you'll receive details like the column's data type,\
    \ whether the column is a primary key, and so on.\n\n## 9.3.4 Modifying a Table\
    \ Schema Using the ALTER Statement\n\nIn the movies table, you have a column called\
    \ `collection_in_mil`, which contains a movie's box office collection in millions\
    \ of dollars. You can write the following MySQL statement to modify the data type\
    \ of `collection_in_mil` attribute from INT to DECIMAL:\n\n```sql\nALTER TABLE\
    \ movies MODIFY COLUMN collection_in_mil DECIMAL(4,1);\n```\n\n`DECIMAL(4,1)`\
    \ means a decimal number that can have a maximum of 4 digits, of which 1 is decimal,\
    \ such as 120.1, 3.4, 38.0, and so on. After executing the ALTER TABLE statement,\
    \ you can show the updated table schema using DESCRIBE:\n\n```python\n>>> alter_table_query\
    \ = \"\"\"\n... ALTER TABLE movies\n... MODIFY COLUMN collection_in_mil DECIMAL(4,1)\n\
    ... \"\"\"\n>>> show_table_query = \"DESCRIBE movies\"\n>>> with connection.cursor()\
    \ as cursor:\n...     cursor.execute(alter_table_query)\n...     cursor.execute(show_table_query)\n\
    ...     # Fetch rows from last executed query\n...     result = cursor.fetchall()\n\
    ...     print(\"Movie Table Schema after alteration:\")\n...     for row in result:\n\
    ...         print(row)\n...\n```\n\nMovie Table Schema after alteration\n('id',\
    \ 'int(11)', 'NO', 'PRI', None, 'auto_increment')\n('title', 'varchar(100)', 'YES',\
    \ '', None, '')\n('release_year', 'year(4)', 'YES', '', None, '')\n('genre', 'varchar(100)',\
    \ 'YES', '', None, '')\n('collection_in_mil', 'decimal(4,1)', 'YES', '', None,\
    \ '')\n\nAs shown in the output, the `collection_in_mil` attribute is now of type\
    \ `DECIMAL(4,1)`. Also note that in the code above, you call `cursor.execute()`\
    \ twice. But `cursor.fetchall()` fetches rows from only the last executed query,\
    \ which is the `show_table_query`.\n\n## 9.3.5 Deleting Tables Using the DROP\
    \ Statement\n\nTo delete a table, you need to execute the DROP TABLE statement\
    \ in MySQL. Deleting a table is an *irreversible* process. If you execute the\
    \ code below, then you'll need to call the CREATE TABLE query again to use the\
    \ ratings table in the upcoming sections.\n\nTo delete the ratings table, send\
    \ `drop_table_query` to `cursor.execute()`:\n\n```python\ndrop_table_query = \"\
    DROP TABLE ratings\"\n\nwith connection.cursor() as cursor:\n    cursor.execute(drop_table_query)\n\
    ```\n\nIf you execute the above code, you will have successfully deleted the ratings\
    \ table.\n\n## 9.4 INSERTING RECORDS IN TABLES\n\nEarlier you created three tables\
    \ in your database: movies, reviewers, and ratings. Now you need to populate these\
    \ tables with data. Here we will cover two different ways to insert records in\
    \ the MySQL Connector for Python.\n\nThe first method, `.execute()`, works well\
    \ when the number of records is small and the records can be hard-coded. The second\
    \ method, `.executemany()`, is more popular and is better suited for real-world\
    \ scenarios.\n\n### 9.4.1 Using .execute()\n\nThe first approach uses the same\
    \ `cursor.execute()` method that you've been using until now. You write the INSERT\
    \ INTO query in a string and pass it to `cursor.execute()`. You can use this method\
    \ to insert data into the movies table.\n\nFor reference, the movies table has\
    \ five attributes:\n\n- id\n- title\n- release_year\n- genre\n- collection_in_mil"
