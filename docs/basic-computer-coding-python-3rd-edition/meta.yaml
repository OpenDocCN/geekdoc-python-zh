    # 基础计算机编程：Python


    第三版


    Python 是由吉多·范罗苏姆创建的一种强大的面向对象编程语言。它因其用户友好的语法而广受认可，使其成为编程初学者的绝佳选择。Python 的简洁性和易用性使其成为学习编码基础知识的理想起点。该语言的优势在于其高级内置数据结构、动态类型和动态绑定，使其非常适合快速应用程序开发
    (RAD) 和脚本编写等任务。


    Python 作为一种有效的“胶水”语言，能够无缝连接不同的组件和技术。其可读性是一个关键特性，这得益于其简洁的语法，降低了程序维护成本。总的来说，Python
    以其多功能性而闻名，广泛应用于从 Web 开发到数据科学等各个领域。


    ## 本书结构


    本版分为十章，为希望开始 Python 编程之旅的人们提供全面的指南。它不仅教授 Python 的基本原理，还深入探讨了学习这门语言的原因，并提供了掌握这项技能的有效策略。它从基本的编程概念开始，逐步涵盖函数、递归、数据结构和面向对象设计等主题。


    拥有计算机科学博士学位的 **Lavinia Iancu** 在并行计算、数值算法、GPU 计算和结构化矩阵方面拥有专业知识。他对这些学科的热情体现在他合著的四本书以及在同行评审期刊、书籍和会议论文集中发表的五十多篇文章中。出于探索高级计算技术的好奇心，Lavinia
    通过他的学术著作继续为研究界做出宝贵贡献。


    ![](img/dd5296ef0d2e667ac2671bdbd5535cd0_371_0.png)


