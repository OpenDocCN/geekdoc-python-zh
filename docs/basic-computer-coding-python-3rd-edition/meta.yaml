    # Tuples


    To enable us to implement the concrete level of our data abstraction, Python provides
    a compound structure called a tuple, which can be constructed by separating values
    by commas. Although not strictly required, parentheses almost always surround
    tuples.


    ```

    >>> (1, 2)

    (1, 2)

    ```


    The elements of a tuple can be unpacked in two ways. The first way is via our
    familiar method of multiple assignment.


    ```

    >>> pair = (1, 2)

    >>> pair

    (1, 2)

    >>> x, y = pair

    >>> x

    1

    >>> y

    2

    ```


    In fact, multiple assignment has been creating and unpacking tuples all along.


    A second method for accessing the elements in a tuple is by the indexing operator,
    written as square brackets.


    ```

    >>> pair[0]

    1

    >>> pair[1]

    2

    ```


    Tuples in Python (and sequences in most other programming languages) are 0-indexed,
    meaning that the index 0 picks out the first element, index 1 picks out the second,
    and so on. One intuition that underlies this indexing convention is that the index
    represents how far an element is offset from the beginning of the tuple.


    ![](img/dd5296ef0d2e667ac2671bdbd5535cd0_169_0.png)'
