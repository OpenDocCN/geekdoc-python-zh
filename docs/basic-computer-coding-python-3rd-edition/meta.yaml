    -f, --failfast\nStop the test run on the first error or failure.\nNew in version\
    \ 2.7: The command-line options -b, -c and -f were added.\nThe command line can\
    \ also be used for test discovery, for running all of the tests in a project or\
    \ just a subset.\n\n## 4.2.3 Test Discovery\n\nUnittest supports simple test discovery.\
    \ In order to be compatible with test discovery, all of the test files must be\
    \ modules or packages importable from the top-level directory of the project (this\
    \ means that their filenames must be valid identifiers).\nTest discovery is implemented\
    \ in TestLoader.discover(), but can also be used from the command line. The basic\
    \ command-line usage is:\ncd project_directory\npython -m unittest discover\n\
    The discover sub-command has the following options:\n-v, --verbose\nVerbose output\n\
    -s, --start-directory directory\nDirectory to start discovery (. default)\n-p,\
    \ --pattern pattern\nPattern to match test files (test*.py default)\n-t, --top-level-directory\
    \ directory\nTop level directory of project (defaults to start directory)\nThe\
    \ -s, -p, and -t options can be passed in as positional arguments in that order.\
    \ The following two command lines are equivalent:\npython -m unittest discover\
    \ -s project_directory -p \"*_test.py\"\npython -m unittest discover project_directory\
    \ \"*_test.py\"\nAs well as being a path it is possible to pass a package name,\
    \ for example myproject.subpackage.test, as the start directory. The package name\
    \ you supply will then be imported and its location on the filesystem will be\
    \ used as the start directory.\n\n> Remember\nTest discovering are the steps that\
    \ are taken to find the tests in your code-base. This means you don't have to\
    \ specify where your tests are but if the files contains the tests follow a certain\
    \ location (filenames, directories, etc) then the testing framework can find them\
    \ automatically.\n\n**Caution:** Test discovery loads tests by importing them.\
    \ Once test discovery has found all the test files from the start directory you\
    \ specify it turns the paths into package names to import. For example foo/bar/baz.py\
    \ will be imported as foo.bar.baz.\n\nIf you have a package installed globally\
    \ and attempt test discovery on a different copy of the package, then the import\
    \ could happen from the wrong place. If this happens test discovery will warn\
    \ you and exit.\n\nIf you supply the start directory as a package name rather\
    \ than a path to a directory then discover assumes that whichever location it\
    \ imports from is the location you intended, so you will not get the warning.\n\
    \nTest modules and packages can customize test loading and discovery by through\
    \ the load_tests protocol.\n\n## 4.2.4 Organizing test code\n\nThe basic building\
    \ blocks of unit testing are test cases — single scenarios that must be set up\
    \ and checked for correctness. In unittest, test cases are represented by instances\
    \ of unittest’s TestCase class. To make your own test cases you must write subclasses\
    \ of TestCase, or use FunctionTestCase.\n\nAn instance of a TestCase-derived class\
    \ is an object that can completely run a single test method, together with optional\
    \ set-up and tidy-up code.\n\nThe testing code of a TestCase instance should be\
    \ entirely self-contained, such that it can be run either in isolation or in arbitrary\
    \ combination with any number of other test cases.\n\nThe simplest TestCase subclass\
    \ will simply override the runTest() method in order to perform specific testing\
    \ code:\n\n```python\nimport unittest\n\nclass DefaultWidgetSizeTestCase(unittest.TestCase):\n\
    \    def runTest(self):\n        widget = Widget('The widget')\n        self.assertEqual(widget.size(),\
    \ (50, 50), 'incorrect default size')\n```\n\nSubclass “derived class”, heir class,\
    \ or child class is a modular, derivative class that inherits one or more language\
    \ entities from one or more other classes (called superclass, base classes, or\
    \ parent classes).\n\nNote that in order to test something, we use one of the\
    \ assert*() methods provided by the TestCase base class. If the test fails, an\
    \ exception will be raised, and unittest will identify the test case as a failure.\
    \ Any other exceptions will be treated as errors. This helps you identify where\
    \ the problem is: failures are caused by incorrect results - a 5 where you expected\
    \ a 6. Errors are caused by incorrect code - e.g., a TypeError caused by an incorrect\
    \ function call.\n\nThe way to run a test case will be described later. For now,\
    \ note that to construct an instance of such a test case, we call its constructor\
    \ without arguments:\ntestCase = DefaultWidgetSizeTestCase()\n\nNow, such test\
    \ cases can be numerous, and their set-up can be repetitive. In the case, constructing\
    \ a Widget in each of 100 Widget test case **subclasses** would mean unsightly\
    \ duplication.\n\nLuckily, we can factor out such set-up code by implementing\
    \ a method called setUp(), which the testing framework will automatically call\
    \ for us when we run the test:\n\n```python\nimport unittest\nclass SimpleWidgetTestCase(unittest.TestCase):\n\
    \    def setUp(self):\n        self.widget = Widget('The widget')\nclass DefaultWidgetSizeTestCase(SimpleWidgetTestCase):\n\
    \    def runTest(self):\n        self.assertEqual(self.widget.size(), (50,50),\n\
    \                         'incorrect default size')\nclass WidgetResizeTestCase(SimpleWidgetTestCase):\n\
    \    def runTest(self):\n        self.widget.resize(100,150)\n        self.assertEqual(self.widget.size(),\
    \ (100,150),\n                         'wrong size after resize')\n```\n\nIf the\
    \ setUp() method raises an exception while the test is running, the framework\
    \ will consider the test to have suffered an error, and the runTest() method will\
    \ not be executed.\n\nSimilarly, we can provide a tearDown() method that tidies\
    \ up after the runTest() method has been run:\n\n```python\nimport unittest\n\
    class SimpleWidgetTestCase(unittest.TestCase):\n    def setUp(self):\n       \
    \ self.widget = Widget('The widget')\n    def tearDown(self):\n        self.widget.dispose()\n\
    \        self.widget = None\n```\n\nIf setUp() succeeded, the tearDown() method\
    \ will be run whether runTest() succeeded or not.\n\nSuch a working environment\
    \ for the testing code is called a fixture.\n\nOften, many small test cases will\
    \ use the same fixture. In this case, we would end up subclassing SimpleWidgetTestCase\
    \ into many small one-method classes such as DefaultWidgetSizeTestCase. This is\
    \ time-consuming and discouraging, so in the same vein as JUnit, unittest provides\
    \ a simpler mechanism:\n\n```python\nimport unittest\nclass WidgetTestCase(unittest.TestCase):\n\
    \    def setUp(self):\n        self.widget = Widget('The widget')\n    def tearDown(self):\n\
    \        self.widget.dispose()\n        self.widget = None\n    def test_default_size(self):\n\
    \        self.assertEqual(self.widget.size(), (50,50),\n                     \
    \    'incorrect default size')\n    def test_resize(self):\n        self.widget.resize(100,150)\n\
    \        self.assertEqual(self.widget.size(), (100,150),\n                   \
    \      'wrong size after resize')\n```\n\nHere we have not provided a runTest()\
    \ method, but have instead provided two different test methods. Class instances\
    \ will now each run one of the test_*() methods, with self.widget created and\
    \ destroyed separately for each instance. When creating an instance we must specify\
    \ the test method it is to run. We do this by passing the method name in the constructor:\n\
    \n```python\ndefaultSizeTestCase = WidgetTestCase('test_default_size')\nresizeTestCase\
    \ = WidgetTestCase('test_resize')\n```\n\nTest case instances are grouped together\
    \ according to the features they test. unittest provides a mechanism for this:\
    \ the test suite, represented by unittest's TestSuite class:\n\n```python\nwidgetTestSuite\
    \ = unittest.TestSuite()\nwidgetTestSuite.addTest(WidgetTestCase('test_default_size'))\n\
    widgetTestSuite.addTest(WidgetTestCase('test_resize'))\n```\n\nFor the ease of\
    \ running tests, as we will see later, it is a good idea to provide in each test\
    \ module a callable object that returns a pre-built test suite:\n\n```python\n\
    def suite():\n    suite = unittest.TestSuite()\n```"
