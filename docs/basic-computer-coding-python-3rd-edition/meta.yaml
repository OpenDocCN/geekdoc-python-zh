    \ of a module file becomes the attribute namespace of the module object once it\
    \ is imported—importers automatically have access to all of the file’s global\
    \ variables, because a file’s global scope morphs into an object’s attribute namespace\
    \ when it is imported.\n\nAfter importing the first module, the second module\
    \ prints its variable and then assigns it a new value. Referencing the module’s\
    \ variable to print it is fine—this is how modules are linked together into a\
    \ larger system normally. The problem with the assignment, however, is that it\
    \ is far too implicit: whoever’s charged with maintaining or reusing the first\
    \ module probably has no clue that some arbitrarily far-removed module on the\
