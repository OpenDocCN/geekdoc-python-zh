    \ how that can be useful, we first need to explore enclosing functions in general.\n\
    \n## 10.3 SCOPES AND NESTED FUNCTIONS\n\nSo far, we have omitted one part of Python’s\
    \ scope rules on purpose, because it’s relatively rare to encounter it in practice.\
    \ However, it’s time to take a deeper look at the letter E in the LEGB lookup\
    \ rule. The E layer is fairly new (it was added in Python 2.2); it takes the form\
    \ of the local scopes of any and all enclosing function defs. Enclosing scopes\
    \ are sometimes also called statically nested scopes. Really, the nesting is a\
    \ lexical one—nested scopes correspond to physically and syntactically nested\
    \ code structures in your program’s source code.\n\n### 10.3.1 Nested Scope Details\n\
    \nWith the addition of nested function scopes, variable lookup rules become slightly\
    \ more complex. Within a function:\n\n- A reference (X) looks for the name X first\
    \ in the current local scope (function); then in the local scopes of any lexically\
    \ enclosing functions in your source code, from inner to outer; then in the current\
    \ global scope (the module file); and finally in the built-in scope (the module\
    \ builtins). Global declarations make the search begin in the global (module file)\
    \ scope instead.\n- An assignment (X = value) creates or changes the name X in\
    \ the current local scope, by default. If X is declared global within the function,\
    \ the assignment creates or changes the name X in the enclosing module’s scope\
    \ instead. If, on the other hand, X is declared nonlocal within the function,\
    \ the assignment changes the name X in the closest enclosing function’s local\
    \ scope.\n\nNotice that the global declaration still maps variables to the enclosing\
    \ module. When nested functions are present, variables in enclosing functions\
    \ may be referenced, but they require nonlocal declarations to be changed.\n\n\
    ### 10.3.2 Nested Scope Examples\n\nHere is what an enclosing function scope looks\
    \ like:\n\n```python\nX = 99                # Global scope name: not used\n\n\
    def f1():\n    X = 88            # Enclosing def local\n    def f2():\n      \
    \  print(X)      # Reference made in nested def\n    f2()\n\nf1()            \
    \      # Prints 88: enclosing def local\n```\n\nFirst off, this is legal Python\
    \ code: the def is simply an executable statement, which can appear anywhere any\
    \ other statement can—including nested in another def. Here, the nested def runs\
    \ while a call to the function f1 is running; it generates a function and assigns\
    \ it to the name f2, a local variable within f1’s local scope. In a sense, f2\
    \ is a temporary function that lives only during the execution of (and is visible\
    \ only to code in) the enclosing f1.\n\nBut notice what happens inside f2: when\
    \ it prints the variable X, it refers to the X that lives in the enclosing f1\
    \ function’s local scope. Because functions can access names in all physically\
    \ enclosing def statements, the X in f2 is automatically mapped to the X in f1,\
    \ by the LEGB lookup rule.\n\nThis enclosing scope lookup works even if the enclosing\
    \ function has already returned. For example, the following code defines a function\
    \ that makes and returns another function:\n\n```python\ndef f1():\n    X = 88\n\
