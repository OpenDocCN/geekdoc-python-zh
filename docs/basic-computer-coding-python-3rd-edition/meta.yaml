    \    a. run\n    b. start\n    c. execute\n    d. begin\n13. 在 Python 中使用多线程的主要优势是什么？\n\
    \    a. 提高安全性\n    b. 更好的内存管理\n    c. 增加并行性并更好地利用多个 CPU 核心\n    d. 更容易的调试过程\n\n\
    # 复习题\n\n1. 你对多线程的理解是什么？\n2. 如何使用 thread 模块创建线程。\n3. 如何使用 Python 多线程模块实现线程？\n\
    4. 区分多进程和多线程。\n5. 解释 Python 多线程中的函数。\n6. 写出 Lock 对象和 RLock 对象之间的区别。\n\n# 检查你的结果\n\
