    # 7.1.2 Python Multithreading Modules for Thread Implementation


    Python offers two modules to implement threads in programs.


    +   - `<thread>` module and

    - `<threading>` module.


    For your information, `<thread>` module is deprecated in Python 3 and renamed
    to `<_thread>` module for backward compatibility. But we will explain both methods
    because many of the users still use legacy Python versions.


    The key difference between the two modules is that the module `<thread>` implements
    a thread as a function. On the other hand, the module `<threading>` offers an
    object-oriented approach to enable thread creation.


