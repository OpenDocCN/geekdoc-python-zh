  mdcn: "源文件中的行，或仅打印包含特定子串的行。我们称这类程序为**过滤器**。\n\n这是一个将文件复制到另一个文件的过滤器，它会省略任何以 # 开头的行：\n\
    \n```\ninfile = open(oldfile, 'r')\noutfile = open(newfile, 'w')\nwhile True:\n\
    \    text = infile.readline()\n    if len(text) == 0:\n        break\n    if text[0]\
    \ == '#':\n        continue\n\n    # 在此处放置更多处理逻辑\n    outfile.write(text)\n\n\
    infile.close()\noutfile.close()\n```\n\n第 9 行的 `continue` 语句会跳过当前循环迭代中剩余的行，但循环仍会继续迭代。这种写法在这里看起来有点刻意，但它通常很有用，可以*\"\
    尽早将我们不关心的行排除在外，这样我们就能在循环的核心部分（可能在第 11 行左右编写）拥有更清晰、更集中的逻辑。\"*\n\n因此，如果 `text` 是空字符串，循环就会退出。如果\
    \ `text` 的第一个字符是井号，执行流程就会跳到循环顶部，准备开始处理下一行。只有当两个条件都不满足时，我们才会执行第 11 行的处理逻辑，在本例中，就是将该行写入新文件。\n\
    \n让我们再考虑一种情况：假设你的原始文件包含空行。在上面的第 6 行，这个程序会找到文件中的第一个空行并立即终止吗？不会！请记住，`readline` 总是将其返回的字符串中包含换行符。只有当我们尝试读取*超出*文件末尾时，才会得到长度为\
    \ 0 的空字符串。\n\n在选择集合类型时，了解该类型的属性很有用。为特定数据集选择正确的类型可能意味着保留其含义，并且可能意味着提高效率或安全性。\n\n\
    ## 案例研究\n\n## 一个集合划分问题\n\n集合划分问题确定了一个集合 (S) 中的元素如何被划分为更小的子集。S 中的所有元素必须包含在一个且仅一个划分中。相关问题有：\n\
    \n- 集合装填 - 所有元素必须包含在零个或一个划分中；\n- 集合覆盖 - 所有元素必须包含在至少一个划分中。\n\n在这个案例研究中，一位婚礼策划师必须确定婚礼的宾客座位分配。为了建模这个问题，桌子被建模为划分，而受邀参加婚礼的宾客被建模为\
    \ S 的元素。婚礼策划师希望最大化所有桌子的总幸福感。\n\n![](img/dd5296ef0d2e667ac2671bdbd5535cd0_100_0.png)\n\
    \n集合划分问题可以通过显式枚举每个可能的子集来建模。尽管这种方法在元素数量很多时（不使用列生成）会变得难以处理，但它确实有一个优点，即划分的目标函数系数可以是非线性表达式（如幸福感），并且仍然允许使用线性规划来解决此问题。\n\
    \n首先，我们使用 **allcombinations()** 来生成所有可能的座位安排列表。\n\n```\n#create list of all possible\
    \ tables\npossible_tables = [tuple(c) for c in pulp.allcombinations(guests,\n\
    \                                        max_table_size)]\n```\n\n然后我们创建一个二进制变量，如果该桌子在解中，则为\
    \ 1，否则为 0。\n\n```\n#create a binary variable to state that a table setting is\
    \ used\nx = pulp.LpVariable.dicts('table', possible_tables,\n    lowBound = 0,\n\
    \    upBound = 1,\n    cat = pulp.LpInteger)\n```\n\n我们创建 **LpProblem**，然后构建目标函数。请注意，此脚本中使用的幸福感函数很难用其他任何方式建模。\n\
    \n```\nseating_model = pulp.LpProblem(\"Wedding Seating Model\", pulp.LpMinimize)\n\
    seating_model += sum([happiness(table) * x[table] for table in possible_tables])\n\
    ```\n\n我们指定解中允许的桌子总数。\n\n```\n#specify the maximum number of tables\nseating_model\
    \ += sum([x[table] for table in possible_tables]) <= max_tables, \\\n    \"Maximum_number_of_tables\"\
    \n```\n\n这组约束通过保证每位宾客被分配到恰好一张桌子来定义集合划分问题。\n\n```\n#A guest must seated at one\
    \ and only one table\nfor guest in guests:\n    seating_model += sum([x[table]\
    \ for table in possible_tables\n                          if guest in table])\
    \ == 1, \"Must_seat_%s\"%guest\n```\n\n完整文件可在此处找到 wedding.py\n\n```\n\"\"\"\n\
    A set partitioning model of a wedding seating problem\n\nAuthors: Stuart Mitchell\
    \ 2009\n\"\"\"\n```\n\n```\nimport pulp\n\nmax_tables = 5\nmax_table_size = 4\n\
    guests = 'A B C D E F G I J K L M N O P Q R'.split()\n```\n\n```\ndef happiness(table):\n\
    \    \"\"\"\n    Find the happiness of the table\n    - by calculating the maximum\
    \ distance between the letters\n    \"\"\"\n    return abs(ord(table[0]) - ord(table[-1]))\n\
    ```\n\n```\n#create list of all possible tables\npossible_tables = [tuple(c) for\
    \ c in pulp.allcombinations(guests,\n    max_table_size)]\n```\n\n```\n#create\
    \ a binary variable to state that a table setting is used\nx = pulp.LpVariable.dicts('table',\
    \ possible_tables,\n    lowBound = 0,\n    upBound = 1,\n    cat = pulp.LpInteger)\n\
    ```\n\n```\nseating_model = pulp.LpProblem(\"Wedding Seating Model\", pulp.LpMinimize)\n\
    ```\n\n```\nseating_model += sum([happiness(table) * x[table] for table in possible_tables])\n\
    ```\n\n```\n#specify the maximum number of tables\nseating_model += sum([x[table]\
    \ for table in possible_tables]) <= max_tables, \\\n    \"Maximum_number_of_tables\"\
    \n```\n\n```\n#A guest must seated at one and only one table\nfor guest in guests:\n\
    \    seating_model += sum([x[table] for table in possible_tables\n        if guest\
    \ in table]) == 1, \"Must_seat_%s\"%guest\n```\n\n```\nseating_model.solve()\n\
    ```\n\n```\nprint(\"The choosen tables are out of a total of %s:\"%len(possible_tables))\n\
    for table in possible_tables:\n    if x[table].value() == 1.0:\n        print(table)\n\
    ```\n\n基础计算机编程：Python\n\n## 总结\n\n- 在 Python 中，字典是一种内置数据类型，允许你以键值对格式存储和检索数据。\n\
    - 字典保存键：值对。在字典中提供键值对是为了使其更加优化。\n- 代码定义了一个名为 Dict 的 Python 字典，其中包含三个键值对。每个键是一个整数，每个值是一个字符串。然后代码打印字典的内容。\n\
    - Python 编程中的集合是一种无序的集合数据类型，可迭代、可变且没有重复元素。\n- 使用集合（而不是列表）的主要优势在于，它具有高度优化的方法来检查特定元素是否包含在集合中。\n\
    - 字典的行为类似于数据库，因为不是像列表那样通过调用整数来获取特定的索引值，而是将值分配给一个键，并可以调用该键来获取其相关的值。\n- 集合是通过使用\
