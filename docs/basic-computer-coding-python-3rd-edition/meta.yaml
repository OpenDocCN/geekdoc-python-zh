    \ 10.1109/ICSE-Companion52605.2021.00022\n\n## 第 4 章\n\n## 异常、单元测试与推导式\n\n## 引言\n\
    \n异常是在程序执行过程中发生的事件，它会干扰程序指令的正常流程。当出现异常情况时，会引发一个异常。如果该异常未被程序处理（捕获），程序将终止并显示错误消息。\n\
    \n换句话说，异常是一种错误类型，当语法正确的 Python 代码引发错误时就会发生。箭头指示异常发生的行，而错误消息的最后一行指定了异常的确切类型并提供其描述，以便于调试。在我们的例子中，这是一个\
    \ `NameError`，因为我们试图打印一个之前未定义的变量 `x` 的值。同样在这个例子中，我们代码片段的第二行 `print(1)` 没有被执行，因为\
    \ Python 程序的正常流程被中断了。\n\n单元测试是一种软件测试技术，其中软件应用程序的各个单元或组件被单独测试，以确保它们按预期工作。在 Python\
    \ 中，`unittest` 模块提供了一个用于创建和运行单元测试的框架。\n\nPython 中的推导式为我们提供了一种简短而简洁的方式来使用先前定义的序列构建新的序列（如列表、集合、字典等）。\n\
    \n学完本章后，你将能够：\n\n1. 讨论如何使用异常\n2. 解释单元测试\n3. 理解推导式\n\n## 4.1 异常\n\n即使一个语句或表达式在语法上是正确的，在尝试执行它时也可能导致错误。在执行期间检测到的错误称为\
    \ *异常*，它们并非无条件致命：你很快就会学习如何在 Python 程序中处理它们。然而，大多数异常未被程序处理，并导致如下所示的错误消息：\n\n```\n\
    >>>\n>>> 10 * (1/0)\nTraceback (most recent call last):\n  File \"<stdin>\", line\
    \ 1, in <module>\nZeroDivisionError: division by zero\n>>> 4 + spam*3\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\nNameError:\
    \ name 'spam' is not defined\n>>> '2' + 2\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nTypeError: Can't convert 'int' object\
    \ to str implicitly\n```\n\n错误消息的最后一行指示发生了什么。异常有不同的类型，类型作为消息的一部分打印出来：示例中的类型是 `ZeroDivisionError`、`NameError`\
    \ 和 `TypeError`。作为异常类型打印的字符串是发生的内置异常的名称。这对所有内置异常都成立，但对用户定义的异常不一定成立（尽管这是一个有用的约定）。标准异常名称是内置标识符（不是保留关键字）。\n\
    \n行的其余部分根据异常类型及其原因提供详细信息。\n\n错误消息的前一部分显示了异常发生的上下文，形式为回溯堆栈。通常它包含列出源代码行的回溯堆栈；但是，它不会显示从标准输入读取的行。\n\
    \n## 4.1.1 处理异常\n\n可以编写处理特定异常的程序。看下面的例子，它要求用户输入，直到输入一个有效的整数，但允许用户中断程序（使用 Control-C\
    \ 或操作系统支持的任何方式）；请注意，用户生成的中断通过引发 `KeyboardInterrupt` 异常来发出信号。\n\n```\n>>> while\
    \ True:\n...     try:\n...         x = int(input(\"Please enter a number: \"))\n\
    ...         break\n...     except ValueError:\n...         print(\"Oops!  That\
    \ was no valid number.  Try again...\")\n...\n```\n\n`try` 语句的工作原理如下。\n\n- 首先，执行\
    \ *try 子句*（`try` 和 `except` 关键字之间的语句）。\n- 如果没有异常发生，*except 子句* 被跳过，`try` 语句的执行完成。\n\
    - 如果在执行 `try` 子句期间发生异常，则跳过该子句的其余部分。然后，如果其类型与 `except` 关键字后命名的异常匹配，则执行 `except`\
    \ 子句，然后在 `try` 语句之后继续执行。\n- 如果发生的异常与 `except` 子句中命名的异常不匹配，则将其传递给外层的 `try` 语句；如果没有找到处理程序，则它是一个\
    \ *未处理的异常*，执行停止并显示如上所示的消息。\n\n一个 `try` 语句可以有多个 `except` 子句，以指定不同异常的处理程序。最多执行一个处理程序。处理程序仅处理在\
    \ `try` 子句中发生的异常，而不会处理其他 `try` 语句中的异常（即使该处理程序位于嵌套的 `try` 语句中）。"
