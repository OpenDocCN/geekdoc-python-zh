    \ code works in all Python releases, and you’ll still see this pattern in some\
    \ existing Python code. In short, the syntax arg = val in a def header means that\
    \ the argument arg will default to the value val if no real value is passed to\
    \ arg in a call.\n\nIn the modified f2 here, the x=x means that the argument x\
    \ will default to the value of x in the enclosing scope—because the second x is\
    \ evaluated before Python steps into the nested def, it still refers to the x\
    \ in f1. In effect, the default remembers what x was in f1 (i.e., the object 88).\n\
    \nThat’s fairly complex, and it depends entirely on the timing of default value\
    \ evaluations. In fact, the nested scope lookup rule was added to Python to make\
    \ defaults unnecessary for this role—today, Python automatically remembers any\
