    When using nonlocal instead of global, each call to tester remembers its own unique
    copy of the state object.


    # State with classes (preview)


    The other prescription for changeable state information in 2.6 and earlier is
    to use classes with attributes to make state information access more explicit
    than the implicit magic of scope lookup rules. As an added benefit, each instance
    of a class gets a fresh copy of the state information, as a natural byproduct
    of Python’s object model.


    We haven’t explored classes in detail yet, but as a brief preview, here is a reformulation
    of the tester/nested functions used earlier as a class—state is recorded in objects
    explicitly as they are created. To make sense of this code, you need to know that
    a def within a class like this works exactly like a def outside of a class, except
    that the function’s self argument automatically receives the implied subject of
    the call (an instance object created by calling the class itself):


    ```

    >>> class tester:              # Class-based alternative

    ...     def __init__(self, start):  # On object construction,

    ...         self.state = start      # save state explicitly in new object

    ...     def nested(self, label):

    ...         print(label, self.state) # Reference state explicitly

    ...         self.state += 1          # Changes are always allowed

    ...

    >>> F = tester(0)              # Create instance, invoke __init__

    >>> F.nested(''spam'')           # F is passed to self

    spam 0

    >>> F.nested(''ham'')

    ham 1


    >>> G = tester(42)             # Each instance gets new copy of state

    >>> G.nested(''toast'')          # Changing one does not impact others

    toast 42

    ```


