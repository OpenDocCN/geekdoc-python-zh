  md: '# SUMMARY


    +   - Object-oriented programming (OOP) is a programming paradigm based on the
    concept of objects, which can contain data and code: data in the form of fields
    (often known as attributes or properties), and code in the form of procedures
    (often known as methods).

    - A common feature of objects is that methods are attached to them and can access
    and modify the object’s data fields. In this brand of OOP, there is usually a
    special name such as this or self-used to refer to the current object.

    - In Python, object-oriented Programming (OOPs) is a programming paradigm that
    uses objects and classes in programming.

    - Python, like every other object-oriented language, allows you to define classes
    to create objects. In-built Python classes are the most common data types in Python,
    such as strings, lists, dictionaries, and so on.

    - A class is a collection of instance variables and related methods that define
    a particular object type.

    - Inheritance is the process by which one class takes on the attributes and methods
    of another. Newly formed classes are called child classes, and the classes that
    child classes are derived from are called parent classes.

    - Python has been an object-oriented language from day one. Because of this, creating
    and using classes and objects are downright easy.

    - Inheritance is a way of creating new class for using details of existing class
    without modifying it. The newly formed class is a derived class (or child class).
    Similarly, the existing class is a base class (or parent class).

    - Encapsulation is the packing of data and functions operating on that data into
    a single component and restricting the access to some of the object’s components.
    Encapsulation means that the internal representation of an object is generally
    hidden from view outside of the object’s definition.

    - Polymorphism means that different types respond to the same function. Polymorphism
    is very useful as it makes programming more intuitive and therefore easier. Polymorphism
    is a fancy word that just means the same function is defined on objects of different
    types.

    - Abstraction is used to hide internal details and show only functionalities.
    Abstracting something means to give names to things, so that the name captures
    the core of what a function or a whole program does.'
