    \ Decimal('304.6'))\n```\n\nMySQL offers a plethora of string formatting operations\
    \ like `CONCAT` for concatenating strings. Often, websites will show the movie\
    \ title along with its release year to avoid confusion. To retrieve the titles\
    \ of the top five grossing"
