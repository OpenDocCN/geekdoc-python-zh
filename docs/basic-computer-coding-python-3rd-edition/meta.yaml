  mdcn: "## 7.2.10 在 with 语句中使用锁、条件变量和信号量\n\ne. n_waiting\n此属性返回当前在屏障处等待的线程数量。\nf.\
    \ broken\n这是一个布尔值，如果屏障处于“破损”状态，则为 True。\n请查看屏障可能引发的此异常：\nexception threading.BrokenBarrierError\n\
    这是 RuntimeError 的一个子类，当屏障对象重置或破损时引发。\n\n如果此模块中的某个对象具有 `acquire()` 和 `release()`\
    \ 方法，我们就可以将其用作 `with` 语句的上下文管理器。当进入代码块时，它会调用 `acquire()`，当退出时，它会调用 `release()`。\n\
    其语法如下：\n```python\nwith some_lock:\n    #do something\n```\n这等同于：\n```python\n\
    >>> some_lock.acquire()\n>>> try:\n        #do something\n    finally:\n     \
    \   some_lock.release()\n```\n目前，我们可以使用 Lock、RLock、Condition、Semaphore 和 BoundedSemaphore\
    \ 对象作为 `with` 语句的上下文管理器。\n\n> 请记住\n由于 CPython 中的 GIL（全局解释器锁），对于 CPU 密集型任务，其他并行化技术（如多进程）可能更有效。然而，对于\
    \ I/O 密集型任务，多线程仍然可以提供性能提升。\n\n# 榜样\n\n![](img/dd5296ef0d2e667ac2671bdbd5535cd0_229_0.png)\n\
    \n## 埃德斯赫·迪杰斯特拉：荷兰计算机科学家\n\n埃德斯赫·迪杰斯特拉，全名埃德斯赫·维贝·迪杰斯特拉（1930年5月11日生于荷兰鹿特丹 - 2002年8月6日卒于荷兰纽南），荷兰计算机科学家。他在阿姆斯特丹数学中心工作期间（1952-1962年）获得了阿姆斯特丹大学的博士学位。1963年至1973年，他在埃因霍温理工大学任教，1984年起在德克萨斯大学任教。他因1959年提出的最短路径问题解决方案而广为人知；他的算法至今仍被用于确定两点之间的最快路径，例如在通信网络路由和飞行规划中。他对通信中互斥概念的研究促使他在1968年提出了计算机信号量的概念，该概念几乎在所有现代操作系统中都有应用。他在1968年写的一封信对结构化编程的发展产生了巨大影响。他于1972年获得图灵奖。\n\
    \n# 总结\n\n- 多线程是一种编程概念，其中多个线程在进程内独立运行，共享相同资源但并发执行不同的任务。\n- 在 Python 中，多线程是实现并行性和提高某些类型应用程序性能的一种方式。\n\
    - Python 自带两个用于实现多线程程序的内置模块，包括 `thread` 和 `threading` 模块。\n- 多线程允许程序员将应用程序任务划分为子任务，并在程序中同时运行它们。\n\
    - 多进程和多线程都能提升系统性能。多进程是向系统添加更多的 CPU/处理器，从而提高系统的计算速度。\n- 在 Java 中，锁和条件变量是每个对象的基本行为。而在\
    \ Python 中，它们是独立的对象。\n- Thread 类表示在单独控制线程中运行的活动。\n\n# 知识检查\n\n1. 可以通过使用 .....................\
    \ 类来创建线程。\n   a. MultiThread\n   b. Thread\n   c. Threading\n   d. SuperThread\n\
    2. 哪个 Java 特性能够同时处理多个任务？\n   a. 类和对象\n   b. 平台无关性\n   c. 动态对象初始化\n   d. 多线程\n\
    3. 哪个方法用于调度线程执行？\n   a. start()\n   b. init()\n   c. run()\n   d. resume()\n4.\
    \ 在类内部定义的函数称为什么？\n   a. 模块\n   b. 类\n   c. 另一个函数\n   d. 方法\n5. 以下哪项是 Python 中\
    \ `id()` 函数的用途？\n   a. id 返回对象的标识\n   b. 每个对象没有唯一的 id\n   c. 以上所有\n   d. 以上都不是\n\
    6. ______ 使得两个或多个活动能够在单个处理器上并行执行。\n   a. 多线程\n   b. 线程\n   c. 单线程\n   d. 多线程和单线程\n\
    7. 在 ______ 中，命名空间 System.Threading 中的 Thread 类型对象表示并控制一个线程。\n   a. .PY\n   b.\
    \ .SAP\n   c. .NET\n   d. .EXE\n8. 一旦调用线程的 ______ 方法，该方法就会被执行。\n   a. EventBegin\n\
    \   b. EventStart\n   c. Begin\n   d. Start\n9. Thread 类中 join 方法的目的是什么？\n   a.\
    \ 启动一个新线程\n   b. 等待线程完成\n   c. 终止一个线程\n   d. 暂时暂停一个线程\n10. 关于 Python 中的 GIL，以下哪项陈述是正确的？\n\
    \    a. 它提高了多线程程序的性能\n    b. 它在 CPython 解释器中不存在\n    c. 它可能导致争用并限制多线程程序的并行性\n\
    \    d. 它仅与使用多进程相关，与多线程无关\n11. threading 模块中 Lock 类的目的是什么？\n    a. 创建一个新线程\n \
