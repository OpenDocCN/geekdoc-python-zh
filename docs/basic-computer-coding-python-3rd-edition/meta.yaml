    `nonlocal` 的添加并没有改变名称引用作用域的一般规则；它们仍然像之前描述的“LEGB”规则那样工作。`nonlocal` 语句主要用于允许更改外层作用域中的名称，而不仅仅是引用它们。然而，当在函数中编码时，`global`\
    \ 和 `nonlocal` 语句确实都在一定程度上限制了查找规则：\n\n-   `global` 使作用域查找从外层模块的作用域开始，并允许在那里赋值。如果名称在模块中不存在，作用域查找会继续到内置作用域，但对全局名称的赋值总是在模块的作用域中创建或更改它们。\n\
    -   `nonlocal` 将作用域查找限制在仅外层 `def` 中，要求名称必须已经存在，并允许对它们进行赋值。作用域查找不会继续到全局或内置作用域。\n\
    \n在 Python 2.6 中，允许引用外层 `def` 作用域的名称，但不允许赋值。不过，你仍然可以使用带显式属性的类来实现与 `nonlocal` 相同的可变状态信息效果（在某些情况下，你可能更愿意这样做）；`global`\
    \ 和函数属性有时也能实现类似的目标。稍后会详细介绍；首先，让我们看一些实际代码，使这一点更具体。\n\n### 10.4.2 nonlocal 实战\n\n\
    接下来看一些例子，全部在 3.0 中运行。对外层 `def` 作用域的引用工作方式与 2.6 中相同。在下面的例子中，`tester` 构建并返回函数 `nested`，以供稍后调用，而\
    \ `nested` 中的状态引用使用正常的作用域查找规则映射 `tester` 的局部作用域：\n\n```\nC:\\misc>c:\\python30\\\
    python\n\n>>> def tester(start):\n...     state = start                # 引用 nonlocal\
    \ 正常工作\n...     def nested(label):\n...         print(label, state)      # 记住外层作用域中的\
    \ state\n...     return nested\n...\n>>> F = tester(0)\n>>> F('spam')\nspam 0\n\
    >>> F('ham')\nham 0\n```\n\n然而，默认情况下不允许更改外层 `def` 作用域中的名称；这在 2.6 中也是常见情况：\n\n\
    ```\n>>> def tester(start):\n...     state = start\n...     def nested(label):\n\
    ...         print(label, state)\n...         state += 1               # 默认情况下（或在\
    \ 2.6 中）不能更改\n...     return nested\n...\n>>> F = tester(0)\n>>> F('spam')\nUnboundLocalError:\
    \ local variable 'state' referenced before assignment\n```\n\n#### 使用 nonlocal\
    \ 进行更改\n\n现在，在 3.0 中，如果我们在 `nested` 中将 `tester` 作用域中的 `state` 声明为 `nonlocal`，我们就可以在嵌套函数内部更改它。即使\
    \ `tester` 已经返回并退出，我们通过名称 `F` 调用返回的 `nested` 函数时，这仍然有效：\n\n```\n>>> def tester(start):\n\
    ...     state = start                # 每次调用都有自己的 state\n...     def nested(label):\n\
    ...         nonlocal state           # 记住外层作用域中的 state\n...         print(label,\
    \ state)\n...         state += 1               # 如果声明了 nonlocal，则允许更改\n...   \
    \  return nested\n...\n>>> F = tester(0)\n>>> F('spam')                      \
    \  # 每次调用都递增 state\nspam 0\n>>> F('ham')\nham 1\n>>> F('eggs')\neggs 2\n```\n\n\
    与外层作用域引用的通常情况一样，我们可以多次调用 `tester` 工厂函数，在内存中获得其状态的多个副本。外层作用域中的状态对象本质上附加到返回的嵌套函数对象上；每次调用都会创建一个新的、不同的状态对象，因此更新一个函数的状态不会影响另一个函数。以下继续前面列表的交互：\n\
    \n```\n>>> G = tester(42)          # 创建一个新的 tester，从 42 开始\n>>> G('spam')\nspam\
