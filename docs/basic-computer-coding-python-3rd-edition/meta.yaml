- md: "day; a geographic position has a latitude and a longitude. To represent positions,\
    \ we would like our programming language to have the capacity to “glue together”\
    \ a latitude and longitude to form a pair --- a *compound data* value --- that\
    \ our programs could manipulate in a way that would be consistent with the fact\
    \ that we regard a position as a single conceptual unit, which has two parts.\n\
    \nThe use of compound data also enables us to increase the **modularity** of the\
    \ programs. If we can manipulate geographic positions directly as objects in their\
    \ own right, then we can separate the part of our program that deals with values\
    \ per se from the details of how those values may be represented. The general\
    \ technique of isolating the parts of a program that deal with how data are represented\
    \ from the parts of a program that deal with how those data are manipulated is\
    \ a powerful design methodology called *data abstraction*. Data abstraction makes\
    \ programs much easier to design, maintain, and modify.\n\nData abstraction is\
    \ similar in character to functional abstraction. When we create a functional\
    \ abstraction, the details of how a function is implemented can be suppressed,\
    \ and the particular function itself can be replaced by any other function with\
    \ the same overall behavior. In other words, we can make an abstraction that separates\
    \ the way the function is used from the details of how the function is implemented.\
    \ Analogously, data abstraction is a methodology that enables us to isolate how\
    \ a compound data object is used from the details of how it is constructed.\n\n\
    The basic idea of data abstraction is to structure programs so that they operate\
    \ on abstract data. That is, our programs should use data in such a way as to\
    \ make as few assumptions about the data as possible. At the same time, a concrete\
    \ data representation is defined, independently of the programs that use the data.\
    \ The interface between these two parts of our system will be a set of functions,\
    \ called selectors and constructors, that implement the abstract data in terms\
    \ of the concrete representation. To illustrate this technique, we will consider\
    \ how to design a set of functions for manipulating rational numbers. As you read\
    \ the next few sections, keep in mind that most Python code written today uses\
    \ very high-level abstract data types that are built into the language, like classes,\
    \ dictionaries, and lists. Since we’re building up an understanding of how these\
    \ abstractions work, we can’t use them yet ourselves. As a consequence, we will\
    \ write some code that isn’t Pythonic --- it’s not necessarily the typical way\
    \ to implement our ideas in the language. What we write is instructive, however,\
    \ because it demonstrates how these abstractions can be constructed! Remember\
    \ that computer science isn’t just about learning to use programming languages,\
    \ but also learning how they work.\n\n## Example: Arithmetic on Rational Numbers\n\
    \nRecall that a rational number is a ratio of integers, and rational numbers constitute\
    \ an important sub-class of real numbers. A rational number like 1/3 or 17/29\
    \ is typically written as:\n\n```\n<numerator>/<denominator>\n```\n\nwhere both\
    \ the `<numerator>` and `<denominator>` are placeholders for integer values. Both\
    \ parts are needed to exactly characterize the value of the rational number.\n\
    \nRational numbers are important in computer science because they, like integers,\
    \ can be represented exactly. Irrational numbers (like pi or e or sqrt(2)) are\
    \ instead approximated using a finite binary expansion. Thus, working with rational\
    \ numbers should, in principle, allow us to avoid approximation errors in our\
    \ arithmetic.\n\nHowever, as soon as we actually divide the numerator by the denominator,\
    \ we can be left with a truncated decimal approximation (a float).\n\n```\n>>>\
    \ 1/3\n0.3333333333333333\n```\n\nand the problems with this approximation appear\
    \ when we start to conduct tests:\n\n```\n>>> 1/3 == 0.333333333333333300000 \
    \ # Beware of approximations\nTrue\n```\n\nHow computers approximate real numbers\
    \ with finite-length decimal expansions is a topic for another class. The important\
    \ idea here is that by representing rational numbers as ratios of integers, we\
    \ avoid the approximation problem entirely. Hence, we would like to keep the numerator\
    \ and denominator separate for the sake of precision, but treat them as a single\
    \ unit.\n\nWe know from using functional abstractions that we can start programming\
    \ productively before we have an implementation of some parts of our program.\
    \ Let us begin by assuming that we already have a way of constructing a rational\
    \ number from a numerator and a denominator. We also assume that, given a rational\
    \ number, we have a way of extracting (or selecting) its numerator and its denominator.\
    \ Let us further assume that the constructor and selectors are available as the\
    \ following three functions:\n\n- `make_rat(n, d)` returns the rational number\
    \ with numerator n and denominator d.\n- `numer(x)` returns the numerator of the\
    \ rational number x.\n- `denom(x)` returns the denominator of the rational number\
    \ x.\n\nWe are using here a powerful strategy of synthesis: *wishful thinking*.\
    \ We haven't yet said how a rational number is represented, or how the functions\
    \ `numer`, `denom`, and `make_rat` should be implemented. Even so, if we did have\
    \ these three functions, we could then add, multiply, and test equality of rational\
    \ numbers by calling them:\n\n```\n>>> def add_rat(x, y):\n        nx, dx = numer(x),\
    \ denom(x)\n        ny, dy = numer(y), denom(y)\n        return make_rat(nx *\
    \ dy + ny * dx, dx * dy)\n>>> def mul_rat(x, y):\n        return make_rat(numer(x)\
    \ * numer(y), denom(x) * denom(y))\n>>> def eq_rat(x, y):\n        return numer(x)\
    \ * denom(y) == numer(y) * denom(x)\n```\n\nNow we have the operations on rational\
    \ numbers defined in terms of the selector functions `numer` and `denom`, and\
    \ the constructor function `make_rat`, but we haven't yet defined these functions.\
    \ What we need is some way to glue together a numerator and a denominator into\
    \ a unit.\n\n## Tuples\n\nTo enable us to implement the concrete level of our\
    \ data abstraction, Python provides a compound structure called a tuple, which\
    \ can be constructed by separating values by commas. Although not strictly required,\
    \ parentheses almost always surround tuples.\n\n```\n>>> (1, 2)\n(1, 2)\n```\n\
    \nThe elements of a tuple can be unpacked in two ways. The first way is via our\
    \ familiar method of multiple assignment.\n\n```\n>>> pair = (1, 2)\n>>> pair\n\
    (1, 2)\n>>> x, y = pair\n>>> x\n1\n>>> y\n2\n```\n\nIn fact, multiple assignment\
    \ has been creating and unpacking tuples all along.\n\nA second method for accessing\
    \ the elements in a tuple is by the indexing operator, written as square brackets.\n\
    \n```\n>>> pair[0]\n1\n>>> pair[1]\n2\n```\n\nTuples in Python (and sequences\
    \ in most other programming languages) are 0-indexed, meaning that the index 0\
    \ picks out the first element, index 1 picks out the second, and so on. One intuition\
    \ that underlies this indexing convention is that the index represents how far\
    \ an element is offset from the beginning of the tuple.\n\n![](img/dd5296ef0d2e667ac2671bdbd5535cd0_169_0.png)\n\
    \nThe equivalent function for the element selection operator is called `getitem`,\
    \ and it also uses 0-indexed positions to select elements from a tuple.\n\n```\n\
    >>> from operator import getitem\n>>> getitem(pair, 0)\n1\n```\n\nTuples are native\
    \ types, which means that there are built-in Python **operators** to manipulate\
    \ them. We'll return to the full properties of tuples shortly. At present, we\
    \ are only interested in how tuples can serve as the glue that implements abstract\
    \ data types.\n\n**Representing Rational Numbers.** Tuples offer a natural way\
    \ to implement rational numbers as a pair of two integers: a numerator and a denominator.\
    \ We can implement our constructor and selector functions for rational numbers\
    \ by manipulating 2-element tuples.\n\n```\n>>> def make_rat(n, d):\n        return\
    \ (n, d)\n>>> def numer(x):\n        return getitem(x, 0)\n>>> def denom(x):\n\
    \        return getitem(x, 1)\n```\n\nA function for printing rational numbers\
    \ completes our implementation of this abstract data type.\n\n```\n>>> def str_rat(x):\n\
    \        \"\"\"Return a string 'n/d' for numerator n and denominator d.\"\"\"\n\
    \        return '{0}/{1}'.format(numer(x), denom(x))\n```\n\nTogether with the\
    \ arithmetic operations we defined earlier, we can manipulate rational numbers\
    \ with the functions we have defined.\n\n```\n>>> half = make_rat(1, 2)\n>>> str_rat(half)\n\
    '1/2'\n>>> third = make_rat(1, 3)\n>>> str_rat(mul_rat(half, third))\n'1/6'\n\
    >>> str_rat(add_rat(third, third))\n'6/9'\n```\n\nAs the final example shows,\
    \ our rational-number implementation does not reduce rational numbers to lowest\
    \ terms. We can remedy this by changing `make_rat`. If we have a function for\
    \ computing the greatest common denominator of two integers, we can use it to\
    \ reduce the numerator and the denominator to lowest terms before constructing\
    \ the pair. As with many useful tools, such a function already exists in the Python\
    \ Library."
  mdcn: "天；一个地理位置具有纬度和经度。为了表示位置，我们希望我们的编程语言能够将纬度和经度“粘合”在一起，形成一个对——一个*复合数据*值——我们的程序可以以一种与我们将位置视为一个单一概念单元（它有两个部分）这一事实相一致的方式来操作它。\n\
    \n使用复合数据也使我们能够增加程序的**模块化**。如果我们可以直接将地理位置作为独立的对象来操作，那么我们就可以将程序中处理值本身的部分与这些值如何表示的细节分离开来。将程序中处理数据表示的部分与处理数据操作的部分隔离开来的通用技术是一种强大的设计方法，称为*数据抽象*。数据抽象使程序更容易设计、维护和修改。\n\
    \n数据抽象在特性上与函数抽象相似。当我们创建函数抽象时，函数实现的细节可以被忽略，特定的函数本身可以被任何具有相同整体行为的其他函数替换。换句话说，我们可以创建一个抽象，将函数的使用方式与函数实现的细节分离开来。类似地，数据抽象是一种方法论，使我们能够将复合数据对象的使用方式与其构造细节隔离开来。\n\
    \n数据抽象的基本思想是构建程序，使其操作抽象数据。也就是说，我们的程序应该以尽可能少地对数据做出假设的方式来使用数据。同时，定义一个具体的数据表示，独立于使用数据的程序。我们系统这两部分之间的接口将是一组函数，称为选择器和构造器，它们根据具体表示来实现抽象数据。为了说明这种技术，我们将考虑如何设计一组操作有理数的函数。在阅读接下来的几节时，请记住，今天编写的大多数Python代码都使用内置在语言中的非常高级的抽象数据类型，比如类、字典和列表。由于我们正在构建对这些抽象工作原理的理解，我们还不能自己使用它们。因此，我们将编写一些非Python风格的代码——它不一定是用语言实现我们想法的典型方式。然而，我们写的内容是有启发性的，因为它展示了这些抽象是如何构建的！记住，计算机科学不仅仅是学习使用编程语言，还要学习它们的工作原理。\n\
    \n## 示例：有理数的算术运算\n\n回想一下，有理数是整数的比值，有理数构成实数的一个重要子类。像1/3或17/29这样的有理数通常写成：\n\n```\n\
    <numerator>/<denominator>\n```\n\n其中`<numerator>`和`<denominator>`都是整数值的占位符。这两个部分都需要精确地表征有理数的值。\n\
    \n有理数在计算机科学中很重要，因为它们像整数一样可以被精确表示。无理数（如pi或e或sqrt(2)）则使用有限的二进制展开来近似表示。因此，原则上，使用有理数应该允许我们避免算术运算中的近似误差。\n\
    \n然而，一旦我们实际将分子除以分母，我们可能会得到一个截断的十进制近似值（一个浮点数）。\n\n```\n>>> 1/3\n0.3333333333333333\n\
    ```\n\n当我们开始进行测试时，这种近似的问题就出现了：\n\n```\n>>> 1/3 == 0.333333333333333300000  # Beware\
