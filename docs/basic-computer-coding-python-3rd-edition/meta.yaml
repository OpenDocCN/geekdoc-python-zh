    \ 等是展示 Python 在图形和图像设计方面实际应用的一些例子。\n\n一些顶级的 3D 动画软件包在其编程栈中使用了 Python，其中包括 Blender、Houdini、3ds\
    \ Max、Lightwave 等等。\n\n## 教育程序\n\nPython 编程的一个流行用途是开发教育程序和在线课程。Python 是一种对初学者非常友好的编程语言，学习曲线平缓，资源丰富。\n\
    \nPython 的语法类似于英语，这使其成为初学者首选的编程语言。因此，基础和高级水平的教育程序开发都使用 Python 完成。\n\n世界各地的专业人士使用\
    \ Python 来构建基于不同水平的教育程序和培训课程。这就是为什么它是 Python 开发的最佳用例之一。\n\n## Python 的实际用途\n\n\
    Python 几乎可以处理所有类型的请求，这使其对各种开发活动都非常有用。从企业应用到游戏，Python 的应用现在涵盖了广泛的应用领域。\n\nPython\
    \ 正在成为构建各种应用程序的流行工具。在 BoTree Technologies，我们拥有一个由 Python 开发者组成的专家团队，他们可以帮助您构建\
    \ Python 应用程序。\n\n基础计算机编码：Python\n\n## 总结\n\n- 异常是在程序执行期间发生的事件，会干扰程序指令的正常流程。\n\
    - 当出现异常情况时，会引发一个异常。如果该异常未被程序处理（捕获），程序将终止并显示错误消息。\n- 单元测试是一种软件测试技术，其中软件应用程序的各个单元或组件被单独测试，以确保它们按预期工作。\n\
    - Python 中的推导式为我们提供了一种简洁的方式来使用先前定义的序列构建新的序列（如列表、集合、字典等）。\n- `raise` 语句允许程序员强制引发指定的异常。\n\
    - 可以定义异常类，它们可以做任何其他类能做的事情，但通常保持简单，通常只提供一些属性，允许异常处理程序提取有关错误的信息。\n- 大多数异常的名称以“Error”结尾，类似于标准异常的命名方式。\n\
    - 一些对象定义了标准的清理操作，当对象不再需要时，无论使用该对象的操作成功还是失败，这些操作都会执行。\n- Unittest 支持简单的测试发现。为了与测试发现兼容，所有测试文件必须是从项目顶层目录可导入的模块或包（这意味着它们的文件名必须是有效的标识符）。\n\
    \n## 知识检查\n\n1. 一个 try-except 块可以有多少个 except 语句？\n   a. 零个\n   b. 一个\n   c. 多个\n\
    \   d. 多于零个\n\n2. try-except-else 中的 else 部分何时执行？\n   a. 总是执行\n   b. 当发生异常时\n\
    \   c. 当没有发生异常时\n   d. 当 except 块中发生异常时\n\n3. 一个 except 语句块可以处理多个异常吗？\n   a. 可以，例如\
    \ `except TypeError, SyntaxError [,…]`。\n   b. 可以，例如 `except [TypeError, SyntaxError]`。\n\
    \   c. 不可以\n   d. 以上都不是\n\n4. 所示代码的输出是什么？\n   l=[1,2,3,4,5]\n   [x&1 for x in\
    \ l]\n   a. [1, 1, 1, 1, 1]\n   b. [1, 0, 1, 0, 1]\n   c. [1, 0, 0, 0, 0]\n  \
    \ d. [0, 1, 0, 1, 0]\n\n5. 下面所示代码的输出是什么？\n   l1=[1,2,3]\n   l2=[4,5,6]\n   [x*y\
    \ for x in l1 for y in l2]\n   a. [4, 8, 12, 5, 10, 15, 6, 12, 18]\n   b. [4,\
    \ 10, 18]\n   c. [4, 5, 6, 8, 10, 12, 12, 15, 18]\n   d. [18, 12, 6, 15, 10, 5,\
    \ 12, 8, 4]\n\n6. 以下 Python 代码的输出是什么？\n   max(“what are you”)\n   a. 错误\n   b.\
    \ u\n   c. t\n   d. y\n\n7. 以下 Python 列表推导式的输出是什么？\n   [j for i in range(2,8)\
    \ for j in range(i*2, 50, i)]\n   a. 一个包含 50 以内质数的列表\n   b. 一个包含 50 以内能被 2 整除的数的列表\n\
    \   c. 一个包含 50 以内非质数的列表\n   d. 错误\n\n8. 以下 Python 代码的输出是什么？\n   l=[2, 3, [4, 5]]\n\
    \   l2=l.copy()\n   l2[0]=88\n   l\n   l2\n   a. [88, 2, 3, [4, 5]] [88, 2, 3,\
    \ [4, 5]]\n   b. [2, 3, [4, 5]] [88, 2, 3, [4, 5]]\n   c. [88, 2, 3, [4, 5]] [2,\
    \ 3, [4, 5]]\n   d. [2, 3, [4, 5]] [2, 3, [4, 5]]\n\n9. try-except 语句中的 except\
    \ 块包含什么？\n   a. 总是执行的代码\n   b. 可能引发异常的代码\n   c. 如果没有发生异常则执行的代码\n   d. 无论是否发生异常都会执行的代码\n\
    \n10. 以下哪项不是 Python 的内置异常？\n    a. NullPointerException\n    b. ValueError\n \
    \   c. TypeError\n    d. ZeroDivisionError\n\n11. try-except 语句中 finally 块的目的是什么？\n\
    \    a. 处理异常\n    b. 定义自定义异常\n    c. 指定无论是否发生异常都必须执行的代码\n    d. 终止程序\n\n12. 如何在单个\
    \ except 块中捕获多个异常？\n    a. 使用逗号分隔的异常类型列表\n    b. 为每种异常类型使用单独的 except 块\n    c.\
    \ 使用 catch 关键字\n    d. 不可能在单个 except 块中捕获多个异常\n\n13. 在异常处理的上下文中，else 块的作用是什么？\n\
    \    a. 用于定义自定义异常\n    b. 包含总是执行的代码\n    c. 如果 try 块中没有发生异常则执行\n    d. 用于处理错误\n\
    \n## 复习题\n\n1. 确定 Python 中的用户定义异常。\n2. 什么是 Python 中的异常处理？\n3. 什么是单元测试？\n4. 使用\
    \ PyUnit 为 Python 测试设计一个测试用例。\n5. `list_1 = [expr(i) for i in list_0 if func(i)]`\
    \ 的正确展开形式是什么？\n\n## 检查你的结果\n\n1. (d) 2. (c) 3. (a) 4. (b) 5. (c)\n6. (d) 7. (c)\
    \ 8. (b) 9. (b) 10. (a)\n11. (c) 12. (a) 13. (c)\n\n基础计算机编码：Python\n\n## 参考文献\n\
    \n1. Batista, Facundo (2003年10月17日). \"PEP 327 – 十进制数据类型\". Python Enhancement\
    \ Proposals. Python Software Foundation. 原始内容存档于2020年6月4日. 2008年11月24日检索.\n2.\
    \ Borderies, Olivier (2019年1月24日). \"Pythran: Python 达到 C++ 的速度！\". Medium. 原始内容存档于2020年3月25日.\
    \ 2020年3月25日检索.\n3. C. Szyperski. Component Software: Beyond Object-Oriented Programming.\
    \ ACM Press and Addison-Wesley, New York, NY, 第二版, 2002年11月.\n4. Francisco, Thomas\
    \ Claburn in San. \"Google's Grumpy code makes Python Go\". www.theregister.com.\
    \ 原始内容存档于2021年3月7日. 2021年1月20日检索.\n5. G. Vecellio and W. M. Thomas. Issues in\
    \ the assurance of component-based software. In Proc. 2000 International Workshop\
    \ on Component-Based Software, Carnegie Mellon Software Engineering Institute,\
    \ 2000.\n6. Murri, Riccardo (2013). Performance of Python runtimes on a non-numeric\
    \ scientific code. European Conference on Python in Science (EuroSciPy). arXiv:1404.6388.\n\
    7. Nance D, Tomov S, Wong K. A Python Library for Matrix Algebra on GPU and Multicore\
    \ Architectures. 2022 IEEE 19th International Conference on Mobile Ad Hoc and\
    \ Smart Systems (MASS), Denver, CO, USA. 2022; 770–775. doi: 10.1109/MASS56207.2022.00121.\n\
    8. Yegulalp, Serdar (2020年10月29日). \"Pyston returns from the dead to speed Python\"\
    . InfoWorld. 原始内容存档于2021年1月27日. 2021年1月26日检索."
