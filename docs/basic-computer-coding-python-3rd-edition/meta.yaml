    # 8.4.7 Unicode String


    Normal strings in Python are stored internally as 8-bit ASCII, while Unicode strings
    are stored as 16-bit Unicode. This allows for a more varied set of characters,
    including special characters from most languages in the world. I''ll restrict
    my treatment of Unicode strings to the following –


    ```

    #!/usr/bin/python


    print u''Hello, world!''

    ```


    When the above code is executed, it produces the following result –

    Hello, world!


    As you can see, Unicode strings use the prefix u, just as raw strings use the
    prefix r.


