    \ second print statement started.\n\nFor example, the right way to enter the statement\
    \ should be this\n\n```\nIf 1:\n    Print (\"True\")\n    Print (\"Done\")\n```\n\
    \nThis would then result in the following statement which would be correct technically\n\
    \n```\n>>> if 1:\n```\n\nPython was created on an ideology that pays particular\
