  mdcn: "# Python 基础\n\nPython 编程网络中级课程\n\n课程设计者会精心策划课程体系。在学习一门累积性学科时，设计学习路径必须格外谨慎。\n\
    \n此时，我想说，不要因为一门语言的排名而选择它；而应选择一门拥有完整课程体系或学习路径、且不假设你具备任何先验知识的语言。\n\n现在，让我们进入正题。\n\
    \n# 什么是 Python？\n\nPython 由吉多·范罗苏姆首次设计，并于 1991 年首次公开亮相。它是一种解释型的高级编程语言，并且是\n\n\
    以下是众多编辑器中，可用于编写 Python 程序的几款名称。\n\n- Eclipse 配合 PyDev：拥有庞大社区和丰富的自定义选项。\n- Eric：此编辑器利用\
    \ Qt 框架和 Scintilla 代码编辑组件。\n- DrPython：一个免费的社区版...\n- PyCharm：一个免费的社区版，对学习者很有帮助。\n\
    - 其他选择包括 PyScripter、LeoEditor、BlueFish、Spyder、Pt 和 Geany。\n\n# 第三章：Python 中多种数据类型简介\n\
    \nPython 主要包含五种标准数据类型。在本书中，我将逐一讨论 Python 中使用的三种数据类型。\n\n当我们编程时，提供给计算机的信息被称为数据。\n\
    \nPython 中的五种数据类型是：\n\n- 数字\n- 字符串\n- 布尔值\n\n# 数字：\n\n- 整数：\n  N=1,2,3\n\n- 字符串：\n\
    \  Name=\"MARK\"\n  Surname=\"Quinn\"\n  Space=' '\n\n# 布尔值：真或假\n\n这种数据类型你可能不太熟悉。布尔数据类型有两种状态，即真或假。例如，我们可以通过调用\
    \ bool 函数来测试变量名是否等于 mark，该函数会评估 name 等于 mark 是真还是假，在这种情况下，它会返回 true。在继续之前\n\n\
    ```\nN=bool (name=='MARK')\nN=true\n```\n\n去使用和学习最新版本的 Python。\n\n在第一个屏幕上。\n\n\
    - 点击“将 Python 3.6.exe 添加到路径”选项。\n- 然后点击“立即安装”以继续。\n\n此时，你需要做出一个决定。如果你想移除 MAX_PATH\
    \ 变量的限制，请点击“禁用路径长度限制”选项。如果你不想移除 MAX_PATH 变量的限制，可以通过点击“关闭”选项来完成安装。\n\n你也可以通过打开命令提示符并输入‘Python\
    \ -V’命令来确认 Python 3 的安装，这也能让你确认路径变量是否已设置。\n\n# 第一章：初学者入门指南\n\n```\nprint \"Hello,\
    \ world!\"\n```\n\n你想开始编程，但又困惑于从何处开始吗？在本章中，我将努力消除你的困惑。\n\n计算机科学是一门累积性的学科。这意味着每个新主题都与前一个主题相关。你是否曾尝试学习编程但失败了？那不是你的错。一位教授累积性学科的好老师是\n\
    \n- 语法易于理解\n\n由于语法感觉很自然，因此用 Python 编写的代码非常易于理解。我举一个例子来清楚地阐述我的观点\n\n```\ng=1\n\
    f=4\nSum=g + f\n```\n\n```\nSum=g + f\nPrint Sum\n```\n\n让我们再看一个例子\n\n```\nThe\
    \ first number = a\nSecond number = b\nAnswer = (a * b)\n```\n\n- 不是一门过于严格的语言\n\
    在 Python 中定义变量的类型不是必需的，代码将会运行\n\n# 第五章：Python 中解释器和交互模式的概念\n\n要运行程序，大多数语言需要你编写源代码，但对于\
    \ Python，一切都更简单，你不需要编写源代码来运行特定的 Python 程序，这就是为什么它被定义为解释型语言。Python 允许用户直接从其命令提示符输入指令，而无需编辑或创建源文件（交互模式）。交互模式使你能够尝试新的语法变体。使用解释型语言的好处之一是你可以测试\n\
    \n# 第九章：适合初学者的 Python 版本\n\n对于那些第一次决定使用 Python 的人来说，最好的选择是使用第 3 版。如果你需要的选项在第 3\
    \ 版中不可用，那么就选择第 2 版。通过在 Python 2 程序的顶部添加给定的导入语句，你可以像使用 Python 3 一样使用它。\n\n如果你是\
    \ Python 新手，并且你需要的包在 Python 3 上已经可用，那么从 Python 3 开始。如果你需要的一些包在 Python 3 中尚不可用，那么选择\
    \ Python 2。\n\n人类的活体，执行着不同的功能。\n\n# 继承\n\n当人类被假定为类时，他们的身体部位成为属性，他们的行为成为函数。同样，男性和女性也可以被视为类，它们可以通过继承的概念继承属性。\n\
    \n# 对象\n\n对此进行解释，一个名叫 Kelvin 的人是男性类的一个对象。一个人的物理存在，其被对象化以进行改变，使其成为一个对象。\n\n# 抽象\n\
    \n抽象意味着描绘外部事物，同时隐藏内部\n\n# 目录\n\n引言\n\n第一章：初学者入门指南\n\n第二章：为什么学习 Python 很重要？\n\n\
    第三章：Python 中多种数据类型简介\n\n第四章：如何开始使用 Python\n\n第五章：Python 中解释器和交互模式的概念\n\n第六章：Python\
    \ 还是 PERL；哪个更好？\n\n第七章：Python - 面向对象编程\n\n第八章：Python – 细分\n\n第九章：适合初学者的 Python\
    \ 版本\n\n第十章：Python 概述\n\n第十一章：Python 的优点和缺点\n\n# 结论\n\n会进行数据分析。我做的另一件事是将 Python\
    \ 用作 C 的控制语言。Python 可以用作构建大型应用程序（如 NIC）的粘合语言，类似于 Python 和 C 的混合。这极大地提高了生产力。Python\
    \ 就像是一个计算角落，用于快速傅里叶变换或矩阵乘法之类的东西。变量和初始条件在 Python 中可以轻松更改，使得更改此类内容变得容易。变量和初始条件在\
    \ Python 中可以轻松更改，无需重写整个代码。\n\n基础，让我们尝试向你解释这门语言中常用术语的含义。为了清晰地阐述面向对象编程的概念，我将把它与人类生活联系起来。以人类为例，人类主要分为两类/类：男性和女性，两者具有相似的身体结构，但某些身体部位是特定的，仅限于某一类别。然而，像睡觉、吃饭、行走这样的动作，两者都会执行。\n\
    \n# 类\n\n借助上面的例子，这里我们将把人类视为类。类作为任何功能性生物的蓝图，决定了其特征和行为。就像一个"
