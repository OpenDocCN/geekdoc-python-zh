    \ is the main reason for the inclusion of this chapter in this book. Beginning\
    \ from the basics, we will move towards the advanced concepts.\n\n## Chapter Eight:\
    \ Python – The Subdivisions\n\nBeing a programmer means having a backup of libraries\
    \ required to interpret the codes of language. But python gives you the facility\
