    \ behavior is confusing. Some languages get compiled into machine code; others\
    \ are read and executed by an interpreter. So like C would be an excellent example\
    \ of a compiled language and Python is an excellent example of interpreted language.\
    \ Python programs are just text files with py extension to their file name. These\
    \ files need an interpreter to execute. Python interpreter is an environment that\
    \ we can use to execute little Python programs.\n\n## Advantages of Python\n\n\
    - Extensive Support Libraries\n- A powerful and fast programming language.\n-\
