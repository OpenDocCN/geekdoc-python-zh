    \ These modules contain already written codes which can perform essential functions\
    \ for you in Python programming. Also, these tasks are completed efficiently and\
    \ without any errors.\n\nWhile using this program, you might come in contact with\
    \ phrases or words like DRY, which has the abbreviation of ‘Don’t Repeat Yourself’\
