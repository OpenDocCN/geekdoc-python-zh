    \ is a wide range of cuisines for IDLE, depending on the type of windows that\
    \ you are using.\n\nLet us see how to run a command on IDLE now\n\n```\nprint(\"\
    Let's start\")\n```\n\nAs we save the file by \"file/save\" and name it start.py.\
    \ Now we can run this by the \"run\" command.\n\n## How to go in interactive mode:\n\
    \nIf you are using the macOS or the Linux, you will have to follow the below-given\
