    \ Python is one of the most-used dynamic type, programming language.\n- **Mobile\
    \ Web solutions**\n  Build customer and enterprise mobile app for customer engagement\
    \ and workforce productivity\n- **IoT solutions**\n  Build solutions to monitor,\
    \ learn and capture insights from connected devices.\n\n## Chapter Seven: Python-\
    \ An object-oriented programming\n\nAnother unique feature of Python is being\
    \ an Object-oriented (OOP) program. Object-oriented programming is the one which\
    \ is based on data instead of logic or objects instead of actions. This concept\
    \ is applied to the majority of programming languages; C language is the only\
