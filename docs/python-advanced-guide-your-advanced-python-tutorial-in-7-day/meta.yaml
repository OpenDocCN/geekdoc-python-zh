- md: "# PYTHON ADVANCED GUIDE\n\nAlec Dennis\n\n# PYTHON ADVANCED GUIDE\n\nYour Advanced\
    \ Python Tutorial\nin 7 Days. A Step-by-Step Guide\nfrom Intermediate to Advanced.\n\
    (2022 Crash Course)\n\nAlec Dennis\n\n# PYTHON ADVANCED GUIDE\n\nChapter 1: Object-oriented\
    \ programming 5\n\nPolymorphism 7\n\nEncapsulation 10\n\nChapter two 12\n\nEssential\
    \ programming tools bash script\n\nRegEx in Python 14\n\nPython Package Manager\
    \ 16\n\nSourceControl 16\n\nBringing It All Together 17\n\nChapter three 19\n\n\
    # Working with files\n\n- Creating new files 20\n- What exactly are binary files?\
    \ 22\n- Opening Your File Up 23\n\n# Chapter four 26\n\n# Exception handling\n\
    \n- Handling the Zero Division Error Exception 27\n- Reading an Exception Error\
    \ Trace Back 31\n- Using exceptions to prevent crashes 32\n\nThe Else Block 34\n\
    \nFailing Silently 37\n\nHow to Handle the File Not Found Exception Error 38\n\
    \nChecking to See if a File Exists 38\n\nTry and Except 39\n\nPractice\n\nExercise\
    \ 40\n\nCONCLUSION 41\n\n# CHAPTER ONE\nOBJECT-ORIENTED\nPROGRAMMING\n\nWe'll\
    \ now look at the four object-oriented programming concepts and how they apply\
    \ to Python.\n\n## Inheritance\n\nThe first major notion is referred to as \"\
    inheritance.\" This refers to the ability of one object to derive from another.\
    \ Take, for example, sports automobiles. Vehicles are all sports cars, but not\
    \ all vehicles are sports cars. Furthermore, all sedans are vehicles, but not\
    \ all vehicles are sedans, and sedans are most emphatically not sports cars, despite\
    \ the fact that they are both vehicles.\n\nBasically, this Object-Oriented programming\
    \ principle states that objects can and should be split up into as little and\
    \ precise notions as feasible.\n\n```python\nclass Vehicle(object):\n    def __init__(self,\
    \ makeAndModel, prodYear, airConditioning):\n        self.makeAndModel = makeAndModel\n\
    \        self.prodYear = prodYear\n        self.airConditioning = airConditioning\n\
    \        self.doors = 4\n```\n\nThis is accomplished in Python by deriving classes.\n\
    \nAssume we've created a new class called SportsCar.\nNow, construct a new class\
    \ called SportsCar, but instead of deriving from object, we'll derive from Vehicle.\n\
    \n```python\nclass SportsCar(Vehicle):\n    def __init__(self, makeAndModel, prodYear,\
    \ airConditioning):\n        self.makeAndModel = makeAndModel\n        self.prodYear\
    \ = prodYear\n        self.airConditioning = airConditioning\n        self.doors\
    \ = 4\n```\n\nWe don't need the honk function here; only the constructor function\
    \ is required. Declare a sporty car now. I'm going to stick with the Ferrari.\n\
    \n```python\nferrari = SportsCar(\"Ferrari LaFerrari\", 2016, True)\n```\n\nNow\
    \ test this by calling\n\n```python\nferrari.honk()\n```\n\nAfter that, save and\
    \ run. Everything should go off without a hitch.\nWhy is this the case? This is\
    \ due to the concept of inheritance, which states that a child class inherits\
    \ functions and class variables from a parent class. It's a simple enough concept\
    \ to grasp. The next one is a little more difficult.\n\n## Polymorphism\n\nThe\
    \ concept of polymorphism is that the same process can be carried out in various\
    \ ways depending on the circumstances. In Python, this can be accomplished in\
    \ two ways: method overloading and method overriding.\n\nOverloading a method\
    \ means defining the same function twice with different arguments. For example,\
    \ we might provide our Vehicle class with two distinct initializer procedures.\
    \ It currently assumes a car has four doors. If we wanted to specify the number\
    \ of doors on a car, we could add a new initializer function below our present\
    \ one with a doors parameter, as shown below (the newer one is at the bottom):\n\
    \n```python\ndef __init__(self, makeAndModel, prodYear, airConditioning):\n  \
    \  self.makeAndModel = makeAndModel\n    self.prodYear = prodYear\n    self.airConditioning\
    \ = airConditioning\n    self.doors = 4\n\ndef __init__(self, makeAndModel, prodYear,\
    \ airConditioning, doors):\n    self.makeAndModel = makeAndModel\n    self.prodYear\
    \ = prodYear\n    self.airConditioning = airConditioning\n    self.doors = doors\n\
    ```\n\nSomeone can now select whether or not to define the number of doors when\
    \ creating an instance of the Vehicle class. If they do not, it is believed that\
    \ the number of doors is four.\n\nMethod overriding occurs when a child class\
    \ uses its code to override a parent class's method.\n\nAs an example, make a\
    \ new class called Moped that extends Vehicle. Set the doors to zero, which is\
    \ ludicrous, and the air conditioning to fake. The only arguments that matter\
    \ are the make/model and the year of manufacture. This is how it should look:\n\
    \n```python\nclass Moped(Vehicle):\n    def __init__(self, makeAndModel, prodYear):\n\
    \        self.makeAndModel = makeAndModel\n        self.prodYear = prodYear\n\
    \        self.airConditioning = False\n        self.doors = 0\n\n    def honk(self):\n\
    \        print(\"%s says: Beep! Beep!\" % self.makeAndModel)\n```\n\nNow, if we\
    \ made an instance of the Moped class and called the honk() method, it would honk.\
    \ But it is common knowledge that mopeds don't honk, they beep. So let's override\
    \ the parent class's honk method with our own. This is super simple. We just redefine\
    \ the function in the child class:\n\nI'm part of the 299,000,000 Americans who\
    \ couldn't name a make and model of moped if their life depended on it, but you\
    \ can test out if this works for yourself by declaring an instance.\n\n## Abstraction\n\
    \nAbstraction is the next key topic in object-oriented programming. This is the\
    \ idea that the programmer and user should be kept away from the computer's inner\
    \ workings. This has two advantages.\n\nThe first is that it reduces the inherent\
    \ security concerns and the danger of catastrophic system malfunctions, whether\
    \ caused by humans or not. By isolating the programmer from the inner workings\
    \ of the computer, such as memory and the CPU, and, in some cases, even the operating\
    \ system, there is a low risk of irreparable damage.\n\nThe second benefit of\
    \ abstraction is that it naturally makes the language easier to grasp, read, and\
    \ learn. Though it reduces the language's strength by removing some of the user's\
    \ control over the complete computer architecture, this is exchanged for the ability\
    \ to write fast and effectively in the language, without wasting time dealing\
    \ with trivialities like memory addresses or the like.\n\nThese are applicable\
    \ in Python because, well, it's quite simple. You can't get into the computer's\
    \ nitty-gritty, or do anything with memory allocation, or even precisely allot\
    \ an array size, but this is a tradeoff for incredible readability, a highly safe\
    \ language in a very secure environment, and ease of use with programming. Compare\
    \ the following C code snippet:\n\n```c\n#include <stdio.h>\nint main(void) {\n\
    \    printf(\"hello world\");\n    return 0;\n}\n```\n\nto the Python code for\
    \ doing the same:\n\n```python\nprint(\"hello world\")\n# That's it. That's all\
    \ there is to it.\n```\n\nAbstraction is generally a net advantage for a vast\
    \ majority of programs produced today, which is why Python and other object-oriented\
    \ programming languages are so popular.\n\n## Encapsulation\n\nEncapsulation is\
    \ the final important notion in object-oriented programming. This is the simplest\
    \ to explain. This is the idea that common data should be combined and programs\
    \ should be modular. I'm not going to go into detail because it's a very simple\
    \ concept. Classes are as succinct an example of encapsulation as you can get:\
    \ common traits and methods are bound together under one coherent structure, making\
    \ it very easy to make objects of the type without having to generate a ton of\
    \ super-specific variables for each instance.\n\nSo there you have it. We had\
    \ finally reached the end of our Python trip. First and foremost, I'd want to\
    \ thank you for reading all the way through Python for Beginners: The Ultimate\
    \ Guide to Python Programming. Let us hope it was informative and provided you\
    \ with all of the tools you need to reach your objectives, whatever they may be.\n\
    \nThe next step is to put this knowledge to use. You just made one of the best\
    \ decisions of your life by learning the foundations of Python, whether as a hobby\
    \ or a career move, and your objective now should be finding ways to use it in\
    \ your day-to-day life to make life easier or to do tasks you've wanted to."
  mdcn: "# PYTHON 高级指南\n\nAlec Dennis\n\n# PYTHON 高级指南\n\n你的高级 Python 教程\n7 天掌握。从中级到高级的\n\
    分步指南。\n（2022 速成课程）\n\nAlec Dennis\n\n# PYTHON 高级指南\n\n第 1 章：面向对象编程 5\n\n多态 7\n\
    \n封装 10\n\n第 2 章 12\n\n必备编程工具 bash 脚本\n\nPython 中的正则表达式 14\n\nPython 包管理器 16\n\
    \n版本控制 16\n\n融会贯通 17\n\n第 3 章 19\n\n# 文件操作\n\n- 创建新文件 20\n- 二进制文件究竟是什么？ 22\n-\
    \ 打开你的文件 23\n\n# 第 4 章 26\n\n# 异常处理\n\n- 处理零除错误异常 27\n- 阅读异常错误回溯信息 31\n- 使用异常防止程序崩溃\
    \ 32\n\nElse 代码块 34\n\n静默失败 37\n\n如何处理文件未找到异常错误 38\n\n检查文件是否存在 38\n\nTry 和 Except\
    \ 39\n\n练习\n\n练习 40\n\n结语 41\n\n# 第一章\n面向对象编程\n\n我们现在将探讨面向对象编程的四个概念及其在 Python\
    \ 中的应用。\n\n## 继承\n\n第一个主要概念被称为“继承”。这指的是一个对象从另一个对象派生的能力。以跑车为例。所有跑车都是车辆，但并非所有车辆都是跑车。此外，所有轿车都是车辆，但并非所有车辆都是轿车，而且轿车绝对不是跑车，尽管它们都是车辆。\n\
    \n基本上，这个面向对象编程原则指出，对象可以也应该被分解成尽可能小且精确的概念。\n\n```python\nclass Vehicle(object):\n\
    \    def __init__(self, makeAndModel, prodYear, airConditioning):\n        self.makeAndModel\
    \ = makeAndModel\n        self.prodYear = prodYear\n        self.airConditioning\
    \ = airConditioning\n        self.doors = 4\n```\n\n这在 Python 中是通过派生类来实现的。\n\n\
    假设我们创建了一个名为 SportsCar 的新类。\n现在，构建一个名为 SportsCar 的新类，但不是从 object 派生，而是从 Vehicle\
    \ 派生。\n\n```python\nclass SportsCar(Vehicle):\n    def __init__(self, makeAndModel,\
    \ prodYear, airConditioning):\n        self.makeAndModel = makeAndModel\n    \
    \    self.prodYear = prodYear\n        self.airConditioning = airConditioning\n\
    \        self.doors = 4\n```\n\n我们这里不需要 honk 函数；只需要构造函数。现在声明一辆跑车。我打算用法拉利。\n\n\
    ```python\nferrari = SportsCar(\"Ferrari LaFerrari\", 2016, True)\n```\n\n现在通过调用来测试这个\n\
    \n```python\nferrari.honk()\n```\n\n之后，保存并运行。一切应该顺利进行。\n为什么会这样？这是由于继承的概念，它指出子类从父类继承函数和类变量。这个概念很容易理解。下一个概念有点更难。\n\
    \n## 多态\n\n多态的概念是，根据情况的不同，相同的过程可以以不同的方式执行。在 Python 中，这可以通过两种方式实现：方法重载和方法重写。\n\n\
    重载方法意味着用不同的参数定义两次相同的函数。例如，我们可以为我们的 Vehicle 类提供两个不同的初始化程序。它目前假定一辆车有四个门。如果我们想指定车门的数量，我们可以在当前初始化函数下面添加一个新的初始化函数，带有一个\
    \ doors 参数，如下所示（较新的在底部）：\n\n```python\ndef __init__(self, makeAndModel, prodYear,\
    \ airConditioning):\n    self.makeAndModel = makeAndModel\n    self.prodYear =\
    \ prodYear\n    self.airConditioning = airConditioning\n    self.doors = 4\n\n\
    def __init__(self, makeAndModel, prodYear, airConditioning, doors):\n    self.makeAndModel\
    \ = makeAndModel\n    self.prodYear = prodYear\n    self.airConditioning = airConditioning\n\
    \    self.doors = doors\n```\n\n现在，有人在创建 Vehicle 类的实例时可以选择是否定义车门的数量。如果他们不定义，则假定车门数量为四。\n\
    \n方法重写发生在子类使用自己的代码覆盖父类的方法时。\n\n例如，创建一个名为 Moped 的新类，它扩展自 Vehicle。将车门设置为零（这很荒谬），空调设置为假。唯一重要的参数是品牌/型号和制造年份。它应该看起来像这样：\n\
    \n```python\nclass Moped(Vehicle):\n    def __init__(self, makeAndModel, prodYear):\n\
    \        self.makeAndModel = makeAndModel\n        self.prodYear = prodYear\n\
    \        self.airConditioning = False\n        self.doors = 0\n\n    def honk(self):\n\
    \        print(\"%s says: Beep! Beep!\" % self.makeAndModel)\n```\n\n现在，如果我们创建一个\
    \ Moped 类的实例并调用 honk() 方法，它会鸣笛。但众所周知，轻便摩托车不鸣笛，它们发出哔哔声。所以让我们用我们自己的方法覆盖父类的 honk\
    \ 方法。这非常简单。我们只需在子类中重新定义该函数：\n\n我是 2.99 亿美国人中的一员，即使性命攸关也说不出轻便摩托车的品牌和型号，但你可以通过声明一个实例来自己测试这是否有效。\n\
    \n## 抽象\n\n抽象是面向对象编程的下一个关键主题。这是指程序员和用户应该远离计算机内部工作原理的理念。这有两个好处。\n\n第一个是它减少了固有的安全问题和灾难性系统故障的风险，无论是人为造成的还是其他原因。通过将程序员与计算机的内部工作（如内存和\
    \ CPU）隔离，在某些情况下甚至与操作系统隔离，造成不可修复损害的风险很低。\n\n抽象的第二个好处是它自然地使语言更容易理解、阅读和学习。虽然它通过移除用户对完整计算机架构的一些控制而降低了语言的强度，但这换来了用该语言快速有效地编写代码的能力，而无需浪费时间处理内存地址之类的琐事。\n\
    \n这些在 Python 中是适用的，因为，嗯，这很简单。你无法深入计算机的细节，无法处理内存分配，甚至无法精确分配数组大小，但这是一种权衡，换来的是极高的可读性、在非常安全的环境中高度安全的语言，以及编程的易用性。比较以下\
    \ C 代码片段：\n\n```c\n#include <stdio.h>\nint main(void) {\n    printf(\"hello world\"\
    );\n    return 0;\n}\n```\n\n与执行相同操作的 Python 代码：\n\n```python\nprint(\"hello world\"\
    )\n# 就这样。仅此而已。\n```\n\n抽象对于当今生产的绝大多数程序来说通常是一个净优势，这就是为什么 Python 和其他面向对象编程语言如此受欢迎的原因。\n\
    \n## 封装\n\n封装是面向对象编程中最后一个重要的概念。这是最容易解释的。这是指应该将共同的数据组合在一起，程序应该是模块化的。我不会详细说明，因为这是一个非常简单的概念。类是封装最简洁的例子：共同的特征和方法被绑定在一个连贯的结构下，使得创建该类型的对象非常容易，而无需为每个实例生成大量超级特定的变量。\n\
    \n所以，这就是全部了。我们终于到达了 Python 之旅的终点。首先，我想感谢你从头到尾阅读了《Python 初学者：Python 编程终极指南》。希望它内容丰富，并为你提供了实现目标所需的所有工具，无论目标是什么。\n\
    \n下一步是将这些知识付诸实践。你刚刚做出了人生中最明智的决定之一，学习了 Python 的基础知识，无论是作为爱好还是职业转变，你现在的目标应该是找到在日常生活中使用它的方法，让生活更轻松或完成你一直想做的任务。"
