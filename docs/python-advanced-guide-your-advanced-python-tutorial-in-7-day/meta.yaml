    # SourceControl


    A source control (also known as version control or revision control) in programming
    manages changes to the codes, which are recognized by a letter or number code
    referred to as the revision number or simply revision. For example, revision 1
    refers to the initial set of code, whereas revision 2 refers to the first alteration.
    Every edit will be accompanied with a timestamp as well as the identity of the
    person who made the modification. Revisions are necessary so that the code may
    be restored or compared.


    When working with a group, source control is essential. You can combine your code
    changes with other code changes made by a developer using different views that
    reveal detailed changes, and then merge the correct code into the primary code
    branch.


