    \ example. However, you or your user can still wreak havoc on your solution. As\
    \ an example:\n\n```\n>>> def div(dividend, divisor):\n    try:\n        print(dividend\
    \ / divisor)\n    except :\n        print(\"Cannot Divide by Zero.\")\n>>> div(5,\
