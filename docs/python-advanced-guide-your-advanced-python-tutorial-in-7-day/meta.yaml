    )\n    except FileNotFoundError:\n        print(\"The file '\" + filename + \"\
    ' does not exist.\")\n    except FileNotFound:\n        print(\"The file '\" +\
    \ filename + \"' does exist.\")\n>>> openFile(\"random.txt\")\n```"
