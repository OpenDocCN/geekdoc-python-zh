- md: "## Failing Silently\n\nSilent fails, sometimes known as failing silently, is\
    \ a programming word that is frequently used during error and exception handling.\n\
    \nSilent failure is a state in which a program fails at a given moment but never\
    \ alerts the user.\n\nA quiet failure is a situation in which the parser, runtime\
    \ development environment, or compiler fails to emit an error or exception and\
    \ continues with the program. This frequently results in unforeseen consequences.\n\
    \nWhen a programmer ignores or bypasses exceptions, he might potentially cause\
    \ quiet failures. Alternatively, he openly conceals them and devises workarounds\
    \ to ensure that the program continues to function normally even if an error occurs.\
    \ He may do so for a variety of reasons, including the fact that the fault is\
    \ not program-breaking or that the user does not need to be aware of the issue.\n\
    \n## How to Handle the File Not Found Exception Error\n\nYou will occasionally\
    \ see the FileNotFoundError. Handling such an issue is dependent on your aim or\
    \ purpose for opening the file. Here are some of the most typical causes of this\
    \ error:\n\n- You did not pass the directory and filename as a string.\n- You\
    \ misspelled the directory and filename.\n- You did not specify the directory.\n\
    - You did not include the correct file extension.\n- The file does not exist.\n\
    \nThe first step in dealing with the FileNotFoundError issue is to ensure that\
    \ none of the common causes are to blame. Once you've done that, you'll need to\
    \ decide how to handle the issue, which is entirely dependent on why you're accessing\
    \ the file in the first place.\n\n## Checking to See if a File Exists\n\nAgain,\
    \ there are two approaches to dealing with an exception: preventive and reactive.\
    \ The preventive method is to determine whether or not the file exists in the\
    \ first place.\n\nYou will need to use the `os` module that comes with your Python\
    \ installation to accomplish this. Then you can utilize the `isfile()` function\
    \ from the `path` module. The file name of the `path` module is determined by\
    \ the operating system (`posixpath` for UNIX, `ntpath` for Windows, `macpath`\
    \ for old MacOS). As an example:\n\n```python\n>>> from os import path\n>>> path.isfile(\"\
    random.txt\")\nFalse\n>>> path.isfile(\"sampleFile.txt\")\nTrue\n```\n\n## Try\
    \ and Except\n\nYou can also do it the hard way by using `try`, `except`, and\
    \ `else` blocks.\n\n```python\n>>> def openFile(filename):\n    try:\n       \
    \ x = open(filename, \"r\")\n    except FileNotFoundError:\n        print(\"The\
    \ file '\" + filename + \"' does not exist.\")\n    except FileNotFound:\n   \
    \     print(\"The file '\" + filename + \"' does exist.\")\n>>> openFile(\"random.txt\"\
    )\n```\n\n## Creating a New File\n\nIf the file does not exist and your purpose\
    \ is to overwrite any existing file, you should use the \"w\" or \"w+\" access\
    \ mode. If the file does not exist, the access mode creates it for you. As an\
    \ example:\n\n```python\n>>> x = open(\"new.txt\", \"w\")\n>>> x.tell()\n0\n```\n\
    \nIf you are going to read and write, use \"w+\" access mode instead.\n\n## Practice\
    \ Exercise\n\nMake an attempt to break your Python by finding at least ten separate\
    \ exceptions.\n\nCreate a loop after that.\n\nCreate ten statements in the loop\
    \ that will generate each of the ten different exceptions found within one try\
    \ block.\n\nEach time the loop loops, the statement following the one that caused\
    \ an exception should cause another, and so on.\n\nCreate a separate except block\
    \ for each of the mistakes.\n\n## Solution\n\n## CONCLUSION\n\nThank you for sticking\
    \ with me until the end!\nThere are many different coding languages that you may\
    \ use, but Python is one of the best for most new programmers, providing the power\
    \ and ease of use that you are seeking for when you first get started with this\
    \ type of coding language. This guidebook went through how Python works as well\
    \ as some of the many sorts of coding that you can accomplish with it.\n\nWe spent\
    \ some time looking at how to work with Python in the worlds of machine learning,\
    \ artificial intelligence, and data analysis, in addition to seeing a lot of examples\
    \ of how to write in Python and construct some of your own programs in this language.\
    \ These are topics and aspects of technology that are gaining popularity, and\
    \ many programmers are attempting to learn more about them. And, with the help\
    \ of this guidebook, you will be able to handle all of these even if you are a\
    \ Python beginner.\nWhen you are ready to learn more about how to work with the\
    \ Python coding language and how to ensure that you can utilize Python with data\
    \ analysis, artificial intelligence, and machine learning, make sure to revisit\
    \ this guidebook to get started."
  mdcn: "## 静默失败\n\n静默失败，有时也称为悄无声息地失败，是一个在错误和异常处理过程中经常使用的编程术语。\n\n静默失败是指程序在某个时刻失败，但从未向用户发出警报的状态。\n\
    \n静默失败是指解析器、运行时开发环境或编译器未能发出错误或异常，并继续执行程序的情况。这通常会导致不可预见的后果。\n\n当程序员忽略或绕过异常时，他可能会导致静默失败。或者，他公开地隐藏异常并设计变通方法，以确保即使发生错误，程序也能继续正常运行。他这样做可能有多种原因，例如该错误不会破坏程序，或者用户不需要知道该问题。\n\
    \n## 如何处理 FileNotFoundError 异常错误\n\n你有时会遇到 FileNotFoundError。处理此类问题取决于你打开文件的目标或目的。以下是此错误的一些最常见原因：\n\
    \n- 你没有将目录和文件名作为字符串传递。\n- 你拼错了目录和文件名。\n- 你没有指定目录。\n- 你没有包含正确的文件扩展名。\n- 文件不存在。\n\
    \n处理 FileNotFoundError 问题的第一步是确保这些常见原因都不是罪魁祸首。一旦你完成了这一步，你将需要决定如何处理该问题，这完全取决于你最初访问文件的原因。\n\
    \n## 检查文件是否存在\n\n同样，处理异常有两种方法：预防性和反应性。预防性方法是首先确定文件是否存在。\n\n你需要使用 Python 安装中自带的\
    \ `os` 模块来完成此操作。然后你可以使用 `path` 模块中的 `isfile()` 函数。`path` 模块的文件名由操作系统决定（UNIX 使用\
    \ `posixpath`，Windows 使用 `ntpath`，旧版 MacOS 使用 `macpath`）。例如：\n\n```python\n>>>\
    \ from os import path\n>>> path.isfile(\"random.txt\")\nFalse\n>>> path.isfile(\"\
    sampleFile.txt\")\nTrue\n```\n\n## Try 和 Except\n\n你也可以使用 `try`、`except` 和 `else`\
    \ 块来完成此操作，虽然这比较麻烦。\n\n```python\n>>> def openFile(filename):\n    try:\n     \
    \   x = open(filename, \"r\")\n    except FileNotFoundError:\n        print(\"\
    The file '\" + filename + \"' does not exist.\")\n    except FileNotFound:\n \
    \       print(\"The file '\" + filename + \"' does exist.\")\n>>> openFile(\"\
    random.txt\")\n```\n\n## 创建新文件\n\n如果文件不存在，并且你的目的是覆盖任何现有文件，你应该使用 \"w\" 或 \"w+\"\
    \ 访问模式。如果文件不存在，访问模式会为你创建它。例如：\n\n```python\n>>> x = open(\"new.txt\", \"w\")\n\
    >>> x.tell()\n0\n```\n\n如果你打算读写，请改用 \"w+\" 访问模式。\n\n## 练习\n\n尝试通过找到至少十个不同的异常来破坏你的\
    \ Python 程序。\n\n然后创建一个循环。\n\n在循环中创建十个语句，这些语句将在一个 try 块内生成十个不同的异常中的每一个。\n\n每次循环迭代时，导致异常的语句之后的语句应导致另一个异常，依此类推。\n\
    \n为每个错误创建一个单独的 except 块。\n\n## 解答\n\n## 结论\n\n感谢你一直坚持到最后！\n你可以使用许多不同的编程语言，但对于大多数新程序员来说，Python\
    \ 是最好的语言之一，它提供了你在刚开始使用这种编程语言时所寻求的强大功能和易用性。本指南介绍了 Python 的工作原理以及你可以用它完成的一些编码类型。\n\
    \n除了看到许多如何用 Python 编写代码和用这种语言构建你自己的一些程序的例子之外，我们还花了一些时间研究如何在机器学习、人工智能和数据分析领域使用\
    \ Python。这些是日益流行的技术主题和方面，许多程序员正试图了解更多关于它们的知识。而且，在本指南的帮助下，即使你是 Python 初学者，你也能够处理所有这些内容。\n\
    当你准备好了解更多关于如何使用 Python 编程语言以及如何确保你可以将 Python 用于数据分析、人工智能和机器学习时，请务必重新阅读本指南以开始学习。"
