  md: '# Creating a New File


    If the file does not exist and your purpose is to overwrite any existing file,
    you should use the "w" or "w+" access mode. If the file does not exist, the access
    mode creates it for you. As an example:


    ```

    >>> x =open("new.txt", "w")

    >>> x.tell()

    0

    ```


    If you are going to read and write, use "w+" access mode instead.


