  md: '# Failing Silently


    Silent fails, sometimes known as failing silently, is a programming word that
    is frequently used during error and exception handling.


    Silent failure is a state in which a program fails at a given moment but never
    alerts the user.


    A quiet failure is a situation in which the parser, runtime development environment,
    or compiler fails to emit an error or exception and continues with the program.
    This frequently results in unforeseen consequences.


    When a programmer ignores or bypasses exceptions, he might potentially cause quiet
    failures. Alternatively, he openly conceals them and devises workarounds to ensure
    that the program continues to function normally even if an error occurs. He may
    do so for a variety of reasons, including the fact that the fault is not program-breaking
    or that the user does not need to be aware of the issue.'
  merge: -1
  pgno: 54
- img_proc: true
  md: '# How to Handle the File Not Found Exception Error


    You will occasionally see the FileNotFoundError. Handling such an issue is dependent
    on your aim or purpose for opening the file. Here are some of the most typical
    causes of this error:


    +   - You did not pass the directory and filename as a string.

    - You misspelled the directory and filename.

    - You did not specify the directory.

    - You did not include the correct file extension.

    - The file does not exist.


    The first step in dealing with the FileNotFoundError issue is to ensure that none
    of the common causes are to blame. Once you''ve done that, you''ll need to decide
    how to handle the issue, which is entirely dependant on why you''re accessing
    the file in the first place.'
  merge: -1
  pgno: 55
- img_proc: true
  md: '# Checking to See if a File Exists


    Again, there are two approaches to dealing with an exception: preventive and reactive.
    The preventive method is to determine whether or not the file exists in the first
    place.


    You will need to use the os (os.py) module that comes with your Python installation
    to accomplish this. Then you can utilize the isfile() function from the path module.
    The file name of the path module is determined by the operating system (posixpath
    for UNIX, ntpath for Windows, macpath for old MacOS). As an example:


    ```

    >>> from os import path

    >>> path.isfile("random.txt")

    False

    >>> path.isfile("sampleFile.txt")

    True

    ```


    # Try and Except


    You can also do it the hard way by using try, except, and else blocks.'
