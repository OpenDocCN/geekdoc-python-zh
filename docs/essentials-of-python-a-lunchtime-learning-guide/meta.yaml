  md: '# Membership Operators


    in: Checks if an object exists in a sequence

    not in: Checks if an object does not exist in a sequence


    ```

    python

    my_list = [1, 2, 3, 4, 5]

    print(3 in my_list)  # True

    print(6 not in my_list)  # True


    ```


    # Identity Operators


    is: Checks if both operands refer to the same object

    is not: Checks if both operands refer to different objects


    ```

    python

    x = [1, 2, 3]

    y = [1, 2, 3]

    z = x

    print(x is y)  # False

    print(x is z)  # True

    print(x is not y)  # True


    ```


    These operators are used to evaluate expressions and perform condition checks.
    It is also important to pay attention to operator precedence. Operators with higher
    precedence are evaluated first. Operators are essential elements in programming.
    Understanding and properly using Python operators allows you to write efficient
    and readable code.'
