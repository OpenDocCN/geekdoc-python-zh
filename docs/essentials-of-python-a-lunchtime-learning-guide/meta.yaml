    # Constants in Python


    Python doesn''t have a const keyword like other languages, nor a dedicated feature
    to declare immutable constants. However, it is a common convention to treat variables
    written in all uppercase as constants.


    ```

    PI = 3.141592

    MAX_SIZE = 1000

    ```


    However, this is just a convention, and the values of variables declared as constants
    can actually be changed. Developers need to be careful not to change the values
    of variables declared as constants.


    # Naming Conventions for Variables and Constants


    In Python, there are the following rules for naming variables and constants:


    +   - Variable names should start with a lowercase letter and use underscores
    (_) to separate words (e.g., my_variable, user_id).

    - Constant names should be written in all uppercase letters and use underscores
    to separate words (e.g., MAX_VALUE, DEFAULT_SIZE).

    - Variable names and constant names can use letters, numbers, and underscores,
    but cannot start with a number.'
