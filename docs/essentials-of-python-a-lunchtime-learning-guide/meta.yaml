    \n![](img/bbcfa4d779b56e85abf35b172d0b538d_26_1.png)\n\n## 第2章 函数与模块\n\n本章将解释如何使用函数。如果你有其他编程语言的知识，这部分也应该很容易理解，因为其中没有太多难以掌握的内容。\n\
    \n### 2.1 定义函数、参数和返回值\n\n函数是为执行特定任务而设计的可重用代码块。在 Python 中，函数使用 `def` 语句定义。函数可以接受参数、执行处理并返回值。\n\
    \n#### 定义函数\n\n使用 `def` 语句来定义一个函数。函数由函数名、参数（在括号中指定）和代码块（缩进部分）组成。\n\n```python\n\
    def greet(name):\n    print(f\"Hello, {name}!\")\n```\n\n在这个例子中，定义了一个名为 `greet`\
    \ 的函数。`name` 是这个函数的参数。\n\n#### 调用函数\n\n定义好的函数可以通过在函数名后附加括号 `()` 来调用。如果有参数，请在括号内指定值。\n\
    \n```python\ngreet(\"Alice\")  # Output: Hello, Alice!\n```\n\n#### 参数\n\n参数用于指定传递给函数的数据。\n\
    \n```python\ndef greet(name):\n    print(f\"Hello, {name}!\")\n\ngreet(\"Alice\"\
    )  # Output: Hello, Alice!\ngreet(\"Bob\")  # Output: Hello, Bob!\n```\n\n在这个例子中，`greet`\
    \ 函数接受 `name` 作为参数。通过在调用函数时传递不同的参数值，可以灵活地改变函数的行为。\n\n#### 默认参数\n\n通过为参数设置默认值，可以在调用函数时省略参数。\n\
    \n```python\ndef greet(name=\"Guest\"):\n    print(f\"Hello, {name}!\")\n\ngreet()\
    \  # Output: Hello, Guest!\ngreet(\"Alice\")  # Output: Hello, Alice!\n```\n\n\
    在这个例子中，`name` 参数被设置了默认值 \"Guest\"。如果没有指定参数，则使用默认值。\n\n#### 位置参数和关键字参数\n\n参数分为两种类型：位置参数和关键字参数。位置参数在调用函数时按照参数的顺序指定。关键字参数则显式地指定参数的名称。\n\
    \n```python\ndef introduce(name, age, profession):\n    print(f\"My name is {name},\
    \ and I am {age} years old. My profession is {profession}.\")\n\nintroduce(\"\
    Alice\", 28, \"Engineer\")  # Positional arguments\nintroduce(age=30, name=\"\
    Bob\", profession=\"Teacher\")  # Keyword arguments\n```\n\n位置参数和关键字参数可以组合使用。但是，位置参数必须在关键字参数之前指定。\n\
    \n#### 可变长度参数\n\n可以使用 `*args` 来接受任意数量的参数。\n\n```python\ndef sum_numbers(*args):\n\
    \    total = 0\n    for num in args:\n        total += num\n    return total\n\
    \nresult1 = sum_numbers(1, 2, 3)  # result1 = 6\nresult2 = sum_numbers(4, 5, 6,\
    \ 7)  # result2 = 22\n```\n\n在这个例子中，`sum_numbers` 函数使用 `*args` 来接受任意数量的参数，并返回它们的总和。\n\
    \n可以使用 `**kwargs` 来接受任意数量的关键字参数。\n\n```python\ndef print_kwargs(**kwargs):\n \
    \   for key, value in kwargs.items():\n        print(f\"{key}: {value}\")\n\n\
    print_kwargs(name=\"Alice\", age=25, city=\"New York\")\n```\n\n输出：\n\n```\nname:\
    \ Alice\nage: 25\ncity: New York\n```\n\n在这个例子中，`print_kwargs` 函数使用 `**kwargs`\
    \ 来接受任意数量的关键字参数，并输出它们的键和值。\n\n#### 返回值\n\n可以使用 `return` 语句从函数返回一个值。\n\n```python\n\
    def square(x):\n    return x ** 2\n\nresult = square(5)\nprint(result)  # Output:\
    \ 25\n```\n\n在这个例子中，`square` 函数计算参数 `x` 的平方并返回结果。返回值可以赋值给一个变量，或者作为另一个函数的参数使用。函数也可以返回多个值。在这种情况下，返回值被视为一个元组。\n\
    \n```python\ndef get_name_and_age():\n    name = \"Alice\"\n    age = 28\n   \
    \ return name, age\n\nname, age = get_name_and_age()\nprint(name)  # Output: Alice\n\
    print(age)  # Output: 28\n```\n\n适当地使用参数和返回值可以提高函数的通用性和可重用性。函数可以根据接收到的参数执行处理并返回结果。这使得同一个函数可以在各种情况下被重用，从而减少代码重复。\n\
    \nPython 提供了增强函数灵活性的功能，例如默认参数值、位置参数、关键字参数和多个返回值。有效地利用这些功能可以让你编写出更具可读性和可维护性的代码。\n\
    \n### 2.2 Lambda 表达式\n\nLambda 表达式是定义小型匿名函数的一种简洁方式。使用 Lambda 表达式，你可以当场定义短小的函数，从而提高代码的可读性。\n\
    \n顺便提一下，AWS 也有 Lambda，但那是完全不同的东西，只是名字相同，所以不要混淆。\n\n#### Lambda 表达式的基本语法\n\nLambda\
    \ 表达式使用 `lambda` 关键字定义。\n\n`lambda arguments: expression`\n\n```python\ndouble\
    \ = lambda x: x * 2\n```\n\n#### 使用 Lambda 表达式\n\nLambda 表达式通常与接受函数作为参数的其他函数结合使用。典型的例子包括\
    \ `map()`、`filter()`、`sort()` 等函数。"
