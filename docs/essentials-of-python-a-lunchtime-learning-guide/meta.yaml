- md: 'Lunchtime Learning Series


    Python


    ## Essentials of Python


    A Lunchtime Learning Guide


    Master the Programming Skills Needed in the Age of Generative AI, like ChatGPT,
    Efficiently and Effectively


    T.TAKAMIYA


    ![](img/bbcfa4d779b56e85abf35b172d0b538d_0_0.png)


    Unlocking Python''s Potential: A Rapid Learning Guide for Seasoned Developers


    ## Introduction


    Dear engineers, thank you very much for picking up this book among the many available.


    Let me introduce myself first.


    I am the author, Takashi Takamiya. I am a manager and engineer of the R&D team
    in the development department with about 20 years of experience as an engineer
    in a regional city. (While it may sound good to be called a playing manager, I
    am essentially a jack-of-all-trades.)


    Although not a large company, I have been involved in a wide range of projects
    from web system development to AI and sensors in a company with about a thousand
    employees.


    Due to the nature of R&D, I have been fortunate to have the opportunity to constantly
    come into contact with new technologies and methods without being constrained
    to specific environments or languages.


    Moreover, with frequent contact with end-users through PoCs and such, I have gained
    experience in handling all processes from upstream to downstream, albeit on a
    small scale.


    Through this, what I realized is the importance of fundamental programming concepts
    and the ability to apply them, rather than the details of individual languages.

    Especially when encountering new languages and tools, I strongly felt that understanding
    the underlying thinking leads to smooth acquisition.


    Based on the knowledge gained from such experiences, this book compactly summarizes
    the essential knowledge of Python for those experienced in other languages.


    Efforts have been made so that readers who already understand the fundamental
    concepts of programming can grasp the essence of Python in a short time.


    The author''s motto is "to capture the essence of programming and cultivate the
    ability to flexibly apply it." I hope that readers can also grasp that essence
    through this book.


    ## Purpose and Target Audience of This Book


    We IT engineers would ideally like to work only with the systems, languages, and
    frameworks we specialize in, but reality is not so simple.


    It is inevitable to encounter situations that require new knowledge, such as unexpected
    project assignments, spot support, analyzing tools created by business partner
    companies or predecessors, and we are constantly compelled to acquire new knowledge
    in the busy intervals of work hours.


    On the other hand, with the advent of generative AI represented by ChatGPT, the
    positioning of programming itself is changing.


    Until now, thoroughly understanding the nooks and crannies of languages and the
    "output ability" to write code from scratch have been considered indicators of
    programming ability.


    However, generative AI is already capable of handling this "0 to 1" part.


    Instead, I believe that for humans, the "input ability" to understand the written
    source code and the "analytical ability" to verify the validity of the code will
    become more important.


    In such a context, what this book aims for is to acquire the minimum necessary
    knowledge to start Python in the shortest possible time.


    I believe that it is essential to be able to skim through the source code, understand
    the overall structure and connections, and grasp the behavior of the program.


    This book, "Python Introduction That Can Be Read During Lunch Break," aims to
    efficiently learn the basics of Python in a short time for those with programming
    experience.


    ## Scope of Learning, Prerequisites, and Learning Environment


    Before proceeding with reading this book, I will explain the scope covered in
    the book, as well as the necessary prerequisites and learning environment.


    ### Scope of Learning


    This book aims to acquire the foundational knowledge for understanding the language,
    such as Python''s basic syntax, data types, functions, classes, arrays, etc.


    The contents are written assuming a Python 3.10 environment. As of May 2024, the
    latest version is 3.12, but using too new a version may result in insufficient
    learning by generative AI or scarce information on the web, leading to reduced
    development efficiency, so a stable version with ample track record is used.


    Each chapter provides explanations using sample code to deepen practical understanding.
    Explanations of the execution results are also included to understand the behavior
    of the code.


    Practical content using various frameworks is planned to be compiled in a separate
    book.


    ### Prerequisites


    This book is intended for engineers and assumes knowledge of fundamental programming
    concepts (variables, constants, functions, control constructs, classes, object-orientation,
    etc.).

    Therefore, basic explanations such as "what is a variable" are omitted in each
    chapter.


    ### Learning Environment


    This book assumes using VSCode as the IDE, installing the Python extension, and
    running it as a sample code execution environment.

    However, if the purpose is to acquire reading comprehension skills without hands-on
    practice, there is no problem with just reading the book without preparing any
    specific environment.


    ### Characteristics and Use Cases of Python


    Before explaining the syntax, I will briefly describe the overview of the Python
    language. If you want to start learning right away, please skip to Chapter 1.

    Python is a versatile high-level programming language with features such as a
    simple and readable syntax, rich standard libraries, and powerful third-party
    libraries. The main characteristics and use cases of Python are as follows:


    ### Readable and Writable Syntax


    - Indentation-based block structure provides high code readability

    - Simple and concise syntax makes code writing easy

    - Rich built-in functions and data types enable efficient development


    ### Data Analysis and Scientific Computing


    - Data analysis using powerful libraries such as NumPy, Pandas, and SciPy

    - Data visualization using Matplotlib

    - Interactive development environment using Jupyter Notebook


    ### Machine Learning and Deep Learning


    - Utilization of machine learning libraries such as Scikit-learn, TensorFlow,
    and Keras

    - Applications in fields such as image recognition, natural language processing,
    and recommendation systems

    - Python''s rich libraries and development environment enable efficient progression
    of machine learning projects


    ### Web Application Development


    - Web application development using web frameworks such as Django, Flask, and
    FastAPI

    - Efficient development by leveraging abundant third-party libraries

    - Constructing maintainable web applications by combining Python''s simplicity
    with web frameworks


    ### Scripting and Automation


    - Automating tasks such as file operations, text processing, and system management

    - Easy integration with other programs and systems

    - Various automation tasks can be efficiently executed using Python''s rich standard
    libraries and third-party libraries


    ### Education and Prototyping


    - Python''s simple and readable syntax makes it suitable for programming education

    - A language suitable for learning algorithms and prototyping

    - Interactive development environment (REPL) allows quick confirmation of code
    behavior


    Python is used in various fields due to its versatility and rich libraries. By
    leveraging Python''s ecosystem, efficient and high-quality software development
    becomes possible. Exploring Python''s potential and taking on new fields will
    enhance your skills as a developer and expand your career possibilities.


    ## Chapter 1 The basics of Python


    ![](img/bbcfa4d779b56e85abf35b172d0b538d_8_0.png)


    This chapter explains variables, types, control structures, and the basics of
    functions.


    These concepts, while having differences in notation rules between languages,
    fall within the scope of normal specifications as a programming language and should
    be easy to understand.


    There are some unique specifications and notation rules, so it''s good to be aware
    of them.


    ### 1.1 Variables and Constants


    In Python, data is stored and manipulated using variables. Variables can have
    their values changed.


    #### Declaring and Assigning Variables


    In Python, you don''t need to specify the type when declaring variables. Variables
    are automatically created by assigning a value to a variable name.


    ```

    message = "Hello, world!"

    number = 42

    ```


    In the above example, the string "Hello, world!" is assigned to the message variable,
    and the integer 42 is assigned to the number variable.'
  mdcn: '午餐学习系列


    Python


    ## Python 基础


    午餐学习指南


    高效掌握生成式 AI 时代（如 ChatGPT）所需的编程技能


    T.TAKAMIYA


    ![](img/bbcfa4d779b56e85abf35b172d0b538d_0_0.png)


    释放 Python 潜力：资深开发者的快速学习指南


    ## 引言


    各位工程师，非常感谢你们在众多书籍中选择了这本书。


    请允许我先做个自我介绍。


    我是作者，高宫隆。我是一名研发团队的经理兼工程师，在地方城市拥有约 20 年的工程师经验。（虽然被称为“玩票经理”听起来不错，但我本质上是个万金油。）


    虽然不是大公司，但在一家约有千名员工的公司里，我参与了从 Web 系统开发到 AI 和传感器的广泛项目。


    由于研发的性质，我很幸运有机会不断接触新技术和新方法，而不局限于特定的环境或语言。


    此外，通过 PoC 等方式频繁接触终端用户，我获得了处理从上游到下游所有流程的经验，尽管规模不大。


    通过这些经历，我意识到的是基础编程概念及其应用能力的重要性，而不是单个语言的细节。

    尤其是在接触新语言和工具时，我强烈感觉到理解底层思维能带来顺畅的掌握。


    基于从这些经验中获得的知识，本书为那些有其他语言经验的人，简明扼要地总结了 Python 的核心知识。


    本书努力让已经理解编程基本概念的读者能在短时间内掌握 Python 的精髓。


    作者的座右铭是“抓住编程的本质，并培养灵活应用的能力”。我希望读者也能通过本书掌握这一精髓。


    ## 本书的目的与目标读者


    我们 IT 工程师理想情况下只希望使用我们专长的系统、语言和框架，但现实并非如此简单。


    不可避免地会遇到需要新知识的情况，例如意外的项目分配、临时支持、分析业务伙伴公司或前辈创建的工具，我们不断地被迫在繁忙的工作间隙获取新知识。


    另一方面，随着以 ChatGPT 为代表的生成式 AI 的出现，编程本身的定位正在发生变化。


    直到现在，彻底理解语言的方方面面以及从零开始编写代码的“输出能力”一直被认为是编程能力的指标。


    然而，生成式 AI 已经能够处理这种“从 0 到 1”的部分。


    相反，我认为对于人类来说，理解已编写源代码的“输入能力”和验证代码有效性的“分析能力”将变得更加重要。


    在这种背景下，本书旨在以最短的时间获取启动 Python 所需的最小必要知识。


    我认为，能够浏览源代码、理解整体结构和关联、把握程序的行为是至关重要的。


    本书《午餐时间可读的 Python 入门》旨在为有编程经验的人在短时间内高效学习 Python 基础。


    ## 学习范围、前提条件和学习环境


    在继续阅读本书之前，我将解释本书涵盖的范围，以及必要的前提条件和学习环境。


    ### 学习范围


    本书旨在获取理解该语言的基础知识，例如 Python 的基本语法、数据类型、函数、类、数组等。


    内容基于 Python 3.10 环境编写。截至 2024 年 5 月，最新版本是 3.12，但使用过新的版本可能导致生成式 AI 学习不足或网络信息稀缺，从而降低开发效率，因此使用了稳定且有充分记录的版本。


    每章都提供使用示例代码的解释，以加深实践理解。还包括执行结果的解释，以理解代码的行为。


    使用各种框架的实践内容计划在单独的书中编写。


    ### 前提条件


    本书面向工程师，假设读者具备基础编程概念（变量、常量、函数、控制结构、类、面向对象等）的知识。

    因此，各章省略了诸如“什么是变量”之类的基本解释。


    ### 学习环境


    本书假设使用 VSCode 作为 IDE，安装 Python 扩展，并将其作为示例代码执行环境运行。

    然而，如果目的是获取阅读理解能力而无需动手实践，那么只阅读本书而不准备任何特定环境也没有问题。


    ### Python 的特点与用例


    在解释语法之前，我将简要描述 Python 语言的概述。如果您想立即开始学习，请跳到第 1 章。

    Python 是一种通用的高级编程语言，具有简单易读的语法、丰富的标准库和强大的第三方库等特点。Python 的主要特点和用例如下：


    ### 易读易写的语法


    - 基于缩进的块结构提供了高代码可读性

    - 简洁的语法使代码编写变得容易

    - 丰富的内置函数和数据类型支持高效开发


    ### 数据分析与科学计算


    - 使用 NumPy、Pandas 和 SciPy 等强大库进行数据分析

    - 使用 Matplotlib 进行数据可视化

    - 使用 Jupyter Notebook 进行交互式开发环境


    ### 机器学习与深度学习


    - 利用 Scikit-learn、TensorFlow 和 Keras 等机器学习库

    - 应用于图像识别、自然语言处理和推荐系统等领域

    - Python 丰富的库和开发环境使得机器学习项目能够高效推进


    ### Web 应用开发


    - 使用 Django、Flask 和 FastAPI 等 Web 框架进行 Web 应用开发

    - 利用丰富的第三方库进行高效开发

    - 结合 Python 的简洁性和 Web 框架，构建可维护的 Web 应用


    ### 脚本与自动化


    - 自动化文件操作、文本处理和系统管理等任务

    - 易于与其他程序和系统集成

    - 使用 Python 丰富的标准库和第三方库，可以高效执行各种自动化任务


    ### 教育与原型设计


    - Python 简单易读的语法使其适合编程教育

    - 适合学习算法和原型设计的语言

    - 交互式开发环境（REPL）允许快速确认代码行为


    Python 因其通用性和丰富的库而被广泛应用于各个领域。通过利用 Python 的生态系统，可以实现高效且高质量的软件开发。探索 Python 的潜力并涉足新领域，将提升您作为开发者的技能并扩展您的职业可能性。


    ## 第 1 章 Python 基础


    ![](img/bbcfa4d779b56e85abf35b172d0b538d_8_0.png)


    本章解释变量、类型、控制结构和函数基础。


    这些概念虽然在不同语言之间存在表示规则的差异，但作为编程语言，它们属于正常规范的范围，应该容易理解。


    有一些独特的规范和表示规则，因此最好留意一下。


    ### 1.1 变量与常量


    在 Python 中，数据使用变量进行存储和操作。变量的值可以更改。


    #### 声明和赋值变量


    在 Python 中，声明变量时不需要指定类型。通过将值赋给变量名来自动创建变量。


    ```

    message = "Hello, world!"

    number = 42

    ```


    在上面的例子中，字符串 "Hello, world!" 被赋值给 message 变量，整数 42 被赋值给 number 变量。'
