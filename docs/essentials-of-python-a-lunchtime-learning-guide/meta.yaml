    \ 的文件中，并在 `main.py` 中导入和使用。\n\n# 使用 `__name__` 变量\n\n一个 Python 文件可以根据它是作为模块使用还是直接执行来改变其行为。`__name__`\
    \ 变量用于确定这一点。\n\n```\n# my_module.py\ndef greet(name):\n    print(f\"Hello, {name}!\"\
    )\n\nif __name__ == \"__main__\":\n    greet(\"Alice\")\n```\n\n在此示例中，如果 `my_module.py`\
    \ 被直接执行，`if __name__ == \"__main__\"` 下的代码块将被执行，并且会调用 `greet(\"Alice\")`。\n\n\
