  md: '# # Purpose and Target Audience of This Book


    We IT engineers would ideally like to work only with the systems, languages, and
    frameworks we specialize in, but reality is not so simple.


    It is inevitable to encounter situations that require new knowledge, such as unexpected
    project assignments, spot support, analyzing tools created by business partner
    companies or predecessors, and we are constantly compelled to acquire new knowledge
    in the busy intervals of work hours.


    On the other hand, with the advent of generative AI represented by ChatGPT, the
    positioning of programming itself is changing.


    Until now, thoroughly understanding the nooks and crannies of languages and the
    "output ability" to write code from scratch have been considered indicators of
    programming ability.


    However, generative AI is already capable of handling this "0 to 1" part.


    Instead, I believe that for humans, the "input ability" to understand the written
    source code and the "analytical ability" to verify the validity of the code will
    become more important.


