    # # 4.2 Utilizing Dictionaries and Sets


    Dictionaries and sets are frequently used data structures in Python. Dictionaries
    are enclosed in {}.


    Dictionaries store key-value pairs and allow accessing values using keys. Sets
    represent a collection of unique elements and do not allow duplicate elements.
    Here, I will explain the basic operations and usage of dictionaries and sets.


    # # Dictionary Operations


    # # 1. Adding and Modifying Elements


    +   - You can add new key-value pairs or modify the values of existing keys.


    ```

    python

    student = { ''name'' : ''Alice'' , ''age'' : 20 , ''major'' : ''Computer Science''
    }

    student[ ''gender'' ] = ''Female''  # Add a new key-value pair

    student[ ''age'' ] = 21  # Modify the value of an existing key

    print(student)  # Output: {''name'': ''Alice'', ''age'': 21, ''major'': ''Computer
    Science'', ''gender'': ''Female''}


    ```


    # # 2. Removing Elements'
  - '[PAGE 67]


    +   - You can use the del statement to remove a specified key-value pair.

    - You can use the pop() method to remove a specified key-value pair and return
    the value.


    ```

    student = { ''name'' : ''Alice'' , ''age'' : 21 , ''major'' : ''Computer Science''
    ,

    ''gender'' : ''Female'' }

    del student[ ''gender'' ]

    age = student.pop( ''age'' )

    print(student)  # Output: {''name'': ''Alice'', ''major'': ''Computer Science''}

    print(age)      # Output: 21

    ```


    # 3. Accessing Elements


    +   - You can access the values of a dictionary using keys.

    - You can use the get() method to retrieve the value of a specified key. If the
    key doesn''t exist, it can return a default value.


    ```

    student = { ''name'' : ''Alice'' , ''age'' : 21 , ''major'' : ''Computer Science''
    }

    print(student[ ''name'' ])  # Output: Alice

    print(student.get( ''gender'' , ''Unknown'' ))  # Output: Unknown

    ```


    # Set Operations


    # 1. Adding and Removing Elements'
  - '[PAGE 68]


    +   - You can use the add() method to add an element to a set.

    - You can use the remove() method to remove a specified element. If the element
    doesn''t exist, a KeyError is raised.

    - You can use the discard() method to remove a specified element. If the element
    doesn''t exist, no error is raised.


    ```

    python

    fruits = { ''apple'', ''banana'', ''orange'' }

    fruits.add( ''grape'' )

    fruits.remove( ''banana'' )

    fruits.discard( ''kiwi'' )

    print(fruits)  # Output: {''apple'', ''orange'', ''grape''}


    ```


    # ## 2. Set Operations


    +   - Sets support operations such as union, difference, and intersection.

    - You can use the union(), intersection(), and difference() methods to perform
    these operations.


    ```

    python

    set1 = { 1, 2, 3, 4, 5 }

    set2 = { 4, 5, 6, 7, 8 }

    union_set = set1.union(set2)

    intersection_set = set1.intersection(set2)

    difference_set = set1.difference(set2)

    print(union_set)  # Output: {1, 2, 3, 4, 5, 6, 7, 8}

    print(intersection_set)  # Output: {4, 5}

    print(difference_set)  # Output: {1, 2, 3}


    ```


    Dictionaries are suitable for managing key-value pairs and are used for database
    indexes, parsing configuration files, etc. Sets are suitable for managing a collection
    of unique elements and are used for removing duplicate data, testing membership,
    etc.'
