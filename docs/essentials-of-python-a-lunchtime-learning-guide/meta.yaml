  md: '# 4.3 Using Comprehensions


    Comprehensions are a concise way to create lists, dictionaries, and sets. Using
    comprehensions, you can create data structures in a single line without using
    loops or conditional statements. Here, I will explain list comprehensions, dictionary
    comprehensions, and set comprehensions.


    # List Comprehensions


    List comprehensions use the following syntax:


    ```

    new_list = [expression for item in iterable if condition]

    ```


    +   - expression: Defines the elements to be included in the new list.

    - item: The element extracted from the original list.

    - iterable: The original list or iterable object.

    - condition: The condition for including elements in the new list (optional).


    For example, to create a list containing the squares of integers from 1 to 10:


    ```

    squares = [x ** 2 for x in range(1, 11)]

    print(squares) # Output: [1, 4, 9, 16, 25, 36, 49, 64, 81, 100]

    ```


    To create a list containing only even numbers:


    ```

    even_numbers = [x for x in range(1, 11) if x % 2 == 0]

    print(even_numbers) # Output: [2, 4, 6, 8, 10]

    ```'
