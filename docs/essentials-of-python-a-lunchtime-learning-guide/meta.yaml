    \n正确使用 lambda 表达式可以提高代码的可读性和可维护性。\n在 Python 中，lambda 表达式可以与其他函数结合使用，以简洁地表达列表操作和处理。\n\
    \nLambda 表达式是 Python 的一个重要特性，它利用了其函数式编程的特点。\n\n# 2.3 导入和使用模块\n\n模块是包含相关变量、函数、类等的\
    \ Python 文件。使用模块可以提高代码的可重用性和程序结构。Python 的标准库中有许多模块可用，可以根据需要导入和使用。\n\n# 导入模块\n\n\
    要导入模块，请使用 `import` 语句。\n\n```\nimport module_name\nfrom module_name import function_name\n\
    from module_name import function_name1, function_name2\nfrom module_name import\
    \ *\n```\n\n例如，要导入 `math` 模块，你可以这样做：\n\n```\nimport math\n```\n\n现在你可以使用 `math`\
    \ 模块中包含的函数和常量。\n\n```\npi = math.pi\nprint(pi)  # Output: 3.141592653589793\n\n\
    print(math.sqrt(16))  # Output: 4.0\n```\n\n你也可以导入特定的函数。\n\n```\nfrom math import\
    \ sqrt\nprint(sqrt(16))  # Output: 4.0\n```\n\n# 使用别名导入\n\n如果模块名或函数名很长，你可以使用别名导入它。\n\
    \n```\nimport numpy as np\nprint(np.array([1, 2, 3]))  # Output: [1 2 3]\n```\n\
    \n# 创建自定义模块\n\n创建自己的模块可以提高代码的可重用性。\n\n```\n# my_module.py\ndef greet(name):\n\
    \    print(f\"Hello, {name}!\")\n\n# main.py\nimport my_module\n\nmy_module.greet(\"\
