    # 2.4 File Reading and Writing


    File reading and writing are essential features for data persistence and data
    exchange between programs. In Python, file reading and writing can be easily performed.


    # Opening and Closing Files


    To read or write a file, you first need to open the file. Use the open() function
    to open a file.


    ```

    file = open( "file.txt" , "r" )

    ```


    The first argument of the open() function is the file path, and the second argument
    specifies the mode in which to open the file. The modes include the following:


    +   - "r": Read mode (default)

    - "w": Write mode (overwrites if the file exists)

    - "a": Append mode (appends to the end of the file)

    - "x": Exclusive write mode (raises an error if the file exists)


    After using the file, call the close() method to close the file.


    ```

    file.close()

    ```


