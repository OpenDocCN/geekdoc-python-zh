- md: "## Constants in Python\n\nPython doesn't have a const keyword like other languages,\
    \ nor a dedicated feature to declare immutable constants. However, it is a common\
    \ convention to treat variables written in all uppercase as constants.\n\n```\n\
    PI = 3.141592\nMAX_SIZE = 1000\n```\n\nHowever, this is just a convention, and\
    \ the values of variables declared as constants can actually be changed. Developers\
    \ need to be careful not to change the values of variables declared as constants.\n\
    \n## Naming Conventions for Variables and Constants\n\nIn Python, there are the\
    \ following rules for naming variables and constants:\n\n- Variable names should\
    \ start with a lowercase letter and use underscores (_) to separate words (e.g.,\
    \ my_variable, user_id).\n- Constant names should be written in all uppercase\
    \ letters and use underscores to separate words (e.g., MAX_VALUE, DEFAULT_SIZE).\n\
    - Variable names and constant names can use letters, numbers, and underscores,\
    \ but cannot start with a number.\n- Python keywords (if, for, while, etc.) cannot\
    \ be used as variable names or constant names.\n\n## Type Casting\n\nIn Python,\
    \ you can convert (cast) types when necessary. Here are commonly used type casting\
    \ methods:\n\n- int(): Convert to integer type\n- float(): Convert to floating-point\
    \ type\n- str(): Convert to string type\n\n```python\nx = \"10\"\ny = int(x) \
    \ # y = 10 (整数型)\nz = float(x)  # z = 10.0 (浮動小數點型)\n```\n\nBy using variables\
    \ appropriately in Python, you can improve code readability and maintainability.\
    \ Also, following naming conventions makes it easier to share code with other\
    \ developers.\n\nVariables intended to be treated as constants should be named\
    \ in all uppercase according to convention, but care must be taken not to change\
    \ their values.\n\n## 1.2 Data Types\n\nPython has the following main data types:\n\
    \n### Numeric Types\n\n- Integer (int): Represents positive numbers, negative\
    \ numbers, and 0.\n  Example: 42, -10, 0\n- Floating-point number (float): Represents\
    \ real numbers with a decimal point.\n  Example: 3.14, -2.5, 0.0\n\n### String\
    \ Type (str)\n\nStrings represent text data enclosed in quotes (' or \").\n\n\
    ```python\nname = \"Alice\"\nmessage = 'Hello, world!'\n```\n\nThe following methods\
    \ and operators can be used for string manipulation:\n\n- String concatenation:\
    \ The + operator can be used to concatenate strings.\n  Example: \"Hello, \" +\
    \ \"world!\"\n- String length: The len() function can be used to get the length\
    \ of a string.\n  Example: len(\"Hello\")\n- String indexing: [] can be used to\
    \ access specific positions in a string.\n  Example: \"Hello\"[0] (result is \"\
    H\")\n\n### Boolean Type (bool)\n\n```python\nis_student = True\nhas_kids = False\n\
    ```\n\nThe Boolean type has either a True or False value.\n\nBoolean types are\
    \ used as the result of conditional expressions or comparison operators (==, !=,\
    \ <, >, etc.).\n\n### List (list)\n\nLists are a data type that stores multiple\
    \ elements in an ordered manner. Arrays enclosed in [] are lists. Elements can\
    \ be added, removed, or modified.\n\n```python\nnumbers = [1, 2, 3, 4, 5]\nfruits\
    \ = [\"apple\", \"banana\", \"orange\"]\n```\n\nThe following methods and operators\
    \ can be used for list manipulation:\n\n- Adding elements: The append() method\
    \ can be used to add elements to the end of a list.\n  Example: numbers.append(6)\n\
    - Removing elements: The remove() method can be used to remove a specified element\
    \ from a list.\n  Example: fruits.remove(\"banana\")\n- Accessing elements: []\
    \ can be used to access specific positions in a list.\n  Example: numbers[0] (result\
    \ is 1)\n\n### Tuple (tuple)\n\nTuples are a data type that stores multiple elements,\
    \ similar to lists, but once created, elements cannot be added, removed, or modified.\
    \ Arrays enclosed in () are tuples.\n\n```python\npoint = (10, 20)\nperson = (\"\
    Alice\", 25, \"Engineer\")\n```\n\n### Dictionary (dict)\n\nDictionaries are a\
    \ data type that stores key-value pairs. Values can be accessed using keys. Arrays\
    \ enclosed in {} are dictionaries.\n\n```python\nstudent = {\"name\": \"Bob\"\
    , \"age\": 20, \"major\": \"Computer Science\"}\n```\n\nThe following methods\
    \ and operators can be used for dictionary manipulation:\n\n- Accessing values:\
    \ [] with a key specified can be used to access the corresponding value.\n  Example:\
    \ student[\"name\"] (result is \"Bob\")\n- Adding keys and values: Specifying\
    \ a new key with [] and assigning a value adds a new key-value pair.\n  Example:\
    \ student[\"grade\"] = \"A\"\n- Checking key existence: The in operator can be\
    \ used to check if a key exists in a dictionary.\n  Example: \"age\" in student\
    \ (result is True)\n\nUnderstanding and properly using these data types is important\
    \ for managing and processing data in Python.\n\nLists, tuples, and dictionaries\
    \ will be explained in more detail again in Chapter 4.\n\n## 1.3 Control Structures\
    \ (if, for, while)\n\nControl structures are constructs used to control the flow\
    \ of program execution. Python has mainly the following control structures:\n\n\
    ### if Statement\n\nThe if statement executes a specific code block when the condition\
    \ is true (True).\n\n```python\nage = 20\nif age >= 18:\n    print(\"Adult\")\n\
    else:\n    print(\"Minor\")\n```\n\nIn the if statement, if the result of the\
    \ condition is True, the code block immediately following the if statement is\
    \ executed. If the condition is False, the code block immediately following the\
    \ else statement is executed.\n\nMultiple conditions can be specified using the\
    \ elif statement.\n\n```python\nscore = 80\nif score >= 90:\n    print(\"Excellent\"\
    )\nelif score >= 60:\n    print(\"Pass\")\nelse:\n    print(\"Fail\")\n```\n\n\
    ### for Statement\n\nThe for statement repeatedly executes a specific code block\
    \ by sequentially extracting elements from a sequence (list, tuple, string, etc.).\n\
    \n```python\nfruits = [\"apple\", \"banana\", \"orange\"]\nfor fruit in fruits:\n\
    \    print(fruit)\n```\n\nIn the above example, the elements of the fruits list\
    \ are sequentially assigned to fruit, and the print statement is executed.\n\n\
    The range() function can be used to execute a code block a specified number of\
    \ times.\n\n```python\nfor i in range(5):\n    print(i)\n```\n\nIn this example,\
    \ integers from 0 to 4 are sequentially assigned to i, and the print statement\
    \ is executed.\n\n### while Statement\n\nThe while statement repeatedly executes\
    \ a specific code block as long as the condition is true (True).\n\n```python\n\
    count = 0\nwhile count < 5:\n    print(count)\n    count += 1\n```\n\nIn this\
    \ example, as long as count is less than 5, the print statement and count += 1\
    \ are repeatedly executed.\n\n### break and continue Statements\n\nThe break statement\
    \ interrupts the loop and moves the processing outside the loop.\n\n```python\n\
    for i in range(10):\n    if i == 5:\n        break\n    print(i)\n```\n\nIn this\
    \ example, when i becomes 5, the loop is interrupted, and integers from 0 to 4\
    \ are output.\n\nThe continue statement interrupts the current iteration and moves\
    \ the processing to the next iteration of the loop.\n\n```python\nfor i in range(5):\n\
    \    if i == 3:\n        continue\n    print(i)\n```\n\nIn this example, when\
    \ i is 3, the print statement is skipped, and 0, 1, 2, and 4 are output.\n\nThese\
    \ control structures can be used to control the flow of the program and implement\
    \ processing based on conditions.\n\nControl structures can be used individually\
    \ or in combination with other control structures to realize more complex processing.\n\
    \n## 1.4 Operators\n\nPython provides various operators. Here, I will explain\
    \ the main operators.\n\n### Arithmetic Operators\n\n- +: Addition\n- -: Subtraction\n\
    - *: Multiplication\n- /: Division\n- %: Modulus\n- **: Exponentiation\n- //:\
    \ Floor Division (integer part of quotient)\n\n```python\nx = 10\ny = 3\n\nprint(x\
    \ + y)  # 13\nprint(x - y)  # 7\nprint(x * y)  # 30\nprint(x / y)  # 3.3333333333333335\n\
    print(x % y)  # 1\nprint(x ** y)  # 1000\nprint(x // y)  # 3\n```\n\n### Comparison\
    \ Operators\n\n- ==: Equal\n- !=: Not equal\n- <: Less than\n- >: Greater than\n\
    - <=: Less than or equal to\n- >=: Greater than or equal to\n\n```python\nx =\
    \ 5\ny = 3\n\nprint(x == y)  # False\nprint(x != y)  # True\nprint(x < y)   #\
    \ False\nprint(x > y)   # True\nprint(x <= y)  # False\nprint(x >= y)  # True\n\
    ```\n\n### Logical Operators\n\n- and: Logical AND (true if both conditions are\
    \ true)\n- or: Logical OR (true if at least one condition is true)\n- not: Logical\
    \ NOT (inverts the truth value of the condition)\n\n```python\nx = 5\ny = 3\n\n\
    print(x > 0 and y > 0)  # True\nprint(x > 0 or y < 0)   # True\nprint(not (x >\
    \ 0))      # False\n```"
  mdcn: "## Python 中的常量\n\nPython 没有像其他语言那样的 `const` 关键字，也没有专门的功能来声明不可变常量。然而，将全大写命名的变量视为常量是一种常见的约定。\n\
    \n```\nPI = 3.141592\nMAX_SIZE = 1000\n```\n\n但是，这仅仅是一种约定，被声明为常量的变量的值实际上是可以改变的。开发者需要注意不要更改被声明为常量的变量的值。\n\
    \n## 变量和常量的命名约定\n\n在 Python 中，变量和常量的命名遵循以下规则：\n\n- 变量名应以小写字母开头，并使用下划线 (_) 分隔单词（例如：my_variable,\
    \ user_id）。\n- 常量名应全部使用大写字母，并使用下划线分隔单词（例如：MAX_VALUE, DEFAULT_SIZE）。\n- 变量名和常量名可以使用字母、数字和下划线，但不能以数字开头。\n\
    - Python 关键字（if, for, while 等）不能用作变量名或常量名。\n\n## 类型转换\n\n在 Python 中，你可以在需要时进行类型转换（强制转换）。以下是常用的类型转换方法：\n\
    \n- int()：转换为整数类型\n- float()：转换为浮点数类型\n- str()：转换为字符串类型\n\n```python\nx = \"10\"\
    \ny = int(x)  # y = 10 (整数型)\nz = float(x)  # z = 10.0 (浮動小數點型)\n```\n\n通过在 Python\
    \ 中恰当地使用变量，你可以提高代码的可读性和可维护性。此外，遵循命名约定也使得与其他开发者共享代码变得更加容易。\n\n按照约定，打算作为常量使用的变量应全部使用大写字母命名，但必须注意不要更改它们的值。\n\
    \n## 1.2 数据类型\n\nPython 具有以下主要数据类型：\n\n### 数值类型\n\n- 整数 (int)：表示正数、负数和 0。\n  示例：42,\
    \ -10, 0\n- 浮点数 (float)：表示带小数点的实数。\n  示例：3.14, -2.5, 0.0\n\n### 字符串类型 (str)\n\n\
    字符串表示用引号（' 或 \"）括起来的文本数据。\n\n```python\nname = \"Alice\"\nmessage = 'Hello, world!'\n\
    ```\n\n可以使用以下方法和运算符进行字符串操作：\n\n- 字符串拼接：可以使用 + 运算符拼接字符串。\n  示例：\"Hello, \" + \"\
    world!\"\n- 字符串长度：可以使用 len() 函数获取字符串的长度。\n  示例：len(\"Hello\")\n- 字符串索引：可以使用 []\
    \ 访问字符串中的特定位置。\n  示例：\"Hello\"[0]（结果为 \"H\"）\n\n### 布尔类型 (bool)\n\n```python\n\
    is_student = True\nhas_kids = False\n```\n\n布尔类型的值为 True 或 False。\n\n布尔类型用作条件表达式或比较运算符（==,\
    \ !=, <, > 等）的结果。\n\n### 列表 (list)\n\n列表是一种以有序方式存储多个元素的数据类型。用 [] 括起来的数组就是列表。可以添加、删除或修改元素。\n\
    \n```python\nnumbers = [1, 2, 3, 4, 5]\nfruits = [\"apple\", \"banana\", \"orange\"\
    ]\n```\n\n可以使用以下方法和运算符进行列表操作：\n\n- 添加元素：可以使用 append() 方法将元素添加到列表末尾。\n  示例：numbers.append(6)\n\
    - 删除元素：可以使用 remove() 方法从列表中删除指定元素。\n  示例：fruits.remove(\"banana\")\n- 访问元素：可以使用\
    \ [] 访问列表中的特定位置。\n  示例：numbers[0]（结果为 1）\n\n### 元组 (tuple)\n\n元组是一种存储多个元素的数据类型，类似于列表，但一旦创建，就不能添加、删除或修改元素。用\
    \ () 括起来的数组就是元组。\n\n```python\npoint = (10, 20)\nperson = (\"Alice\", 25, \"Engineer\"\
    )\n```\n\n### 字典 (dict)\n\n字典是一种存储键值对的数据类型。可以使用键来访问值。用 {} 括起来的数组就是字典。\n\n```python\n\
    student = {\"name\": \"Bob\", \"age\": 20, \"major\": \"Computer Science\"}\n\
    ```\n\n可以使用以下方法和运算符进行字典操作：\n\n- 访问值：可以使用带指定键的 [] 访问对应的值。\n  示例：student[\"name\"\
    ]（结果为 \"Bob\"）\n- 添加键和值：使用 [] 指定新键并赋值，即可添加新的键值对。\n  示例：student[\"grade\"] = \"\
    A\"\n- 检查键是否存在：可以使用 in 运算符检查键是否存在于字典中。\n  示例：\"age\" in student（结果为 True）\n\n\
    理解和正确使用这些数据类型对于在 Python 中管理和处理数据非常重要。\n\n列表、元组和字典将在第 4 章中再次详细解释。\n\n## 1.3 控制结构\
    \ (if, for, while)\n\n控制结构是用于控制程序执行流程的构造。Python 主要有以下控制结构：\n\n### if 语句\n\nif\
    \ 语句在条件为真 (True) 时执行特定的代码块。\n\n```python\nage = 20\nif age >= 18:\n    print(\"\
    Adult\")\nelse:\n    print(\"Minor\")\n```\n\n在 if 语句中，如果条件的结果为 True，则执行紧跟在 if\
    \ 语句之后的代码块。如果条件为 False，则执行紧跟在 else 语句之后的代码块。\n\n可以使用 elif 语句指定多个条件。\n\n```python\n\
    score = 80\nif score >= 90:\n    print(\"Excellent\")\nelif score >= 60:\n   \
    \ print(\"Pass\")\nelse:\n    print(\"Fail\")\n```\n\n### for 语句\n\nfor 语句通过从序列（列表、元组、字符串等）中依次提取元素，重复执行特定的代码块。\n\
    \n```python\nfruits = [\"apple\", \"banana\", \"orange\"]\nfor fruit in fruits:\n\
    \    print(fruit)\n```\n\n在上面的例子中，fruits 列表的元素被依次赋值给 fruit，然后执行 print 语句。\n\n\
    可以使用 range() 函数来执行指定次数的代码块。\n\n```python\nfor i in range(5):\n    print(i)\n```\n\
    \n在这个例子中，从 0 到 4 的整数被依次赋值给 i，然后执行 print 语句。\n\n### while 语句\n\nwhile 语句在条件为真 (True)\
    \ 时重复执行特定的代码块。\n\n```python\ncount = 0\nwhile count < 5:\n    print(count)\n \
    \   count += 1\n```\n\n在这个例子中，只要 count 小于 5，就会重复执行 print 语句和 count += 1。\n\n###\
    \ break 和 continue 语句\n\nbreak 语句中断循环，并将处理移到循环之外。\n\n```python\nfor i in range(10):\n\
    \    if i == 5:\n        break\n    print(i)\n```\n\n在这个例子中，当 i 变为 5 时，循环中断，并输出从\
    \ 0 到 4 的整数。\n\ncontinue 语句中断当前迭代，并将处理移到循环的下一次迭代。\n\n```python\nfor i in range(5):\n\
    \    if i == 3:\n        continue\n    print(i)\n```\n\n在这个例子中，当 i 为 3 时，跳过 print\
    \ 语句，并输出 0, 1, 2 和 4。\n\n这些控制结构可用于控制程序流程并实现基于条件的处理。\n\n控制结构可以单独使用，也可以与其他控制结构组合使用，以实现更复杂的处理。\n\
    \n## 1.4 运算符\n\nPython 提供了各种运算符。这里，我将解释主要的运算符。\n\n### 算术运算符\n\n- +：加法\n- -：减法\n\
    - *：乘法\n- /：除法\n- %：取模（求余数）\n- **：幂运算\n- //：整除（商的整数部分）\n\n```python\nx = 10\n\
    y = 3\n\nprint(x + y)  # 13\nprint(x - y)  # 7\nprint(x * y)  # 30\nprint(x /\
    \ y)  # 3.3333333333333335\nprint(x % y)  # 1\nprint(x ** y)  # 1000\nprint(x\
    \ // y)  # 3\n```\n\n### 比较运算符\n\n- ==：等于\n- !=：不等于\n- <：小于\n- >：大于\n- <=：小于或等于\n\
    - >=：大于或等于\n\n```python\nx = 5\ny = 3\n\nprint(x == y)  # False\nprint(x != y)\
    \  # True\nprint(x < y)   # False\nprint(x > y)   # True\nprint(x <= y)  # False\n\
    print(x >= y)  # True\n```\n\n### 逻辑运算符\n\n- and：逻辑与（两个条件都为真时结果为真）\n- or：逻辑或（至少一个条件为真时结果为真）\n\
    - not：逻辑非（反转条件的真值）\n\n```python\nx = 5\ny = 3\n\nprint(x > 0 and y > 0)  # True\n\
    print(x > 0 or y < 0)   # True\nprint(not (x > 0))      # False\n```"
