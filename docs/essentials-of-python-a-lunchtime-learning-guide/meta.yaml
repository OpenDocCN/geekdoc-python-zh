  md: "# 3.2 Inheritance and Polymorphism\n\nInheritance and polymorphism are important\
    \ concepts in object-oriented programming.\n\nInheritance is a feature that allows\
    \ creating new classes by extending existing classes, improving code reusability.\n\
    \nPolymorphism refers to the ability of objects with the same interface to perform\
    \ different behaviors.\n\n# Inheritance\n\nIn Python, when defining a class, you\
    \ can inherit from an existing class. This allows inheriting the attributes and\
    \ methods of the parent class and adding new functionality or overriding existing\
    \ functionality.\n\n```\nclass Animal:\n    def __init__(self, name):\n      \
    \  self.name = name\n\n    def speak(self):\n        pass\n\nclass Cat(Animal):\n\
    \    def speak(self):\n        return \"Meow\"\n\nclass Dog(Animal):\n    def\
    \ speak(self):\n        return \"Woof\"\n```"
