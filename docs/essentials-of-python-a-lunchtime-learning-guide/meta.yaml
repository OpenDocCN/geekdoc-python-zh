- md: "## 3.3 Encapsulation and Access Control\n\nEncapsulation is one of the important\
    \ principles of object-oriented programming. Encapsulation refers to hiding the\
    \ internal state of an object and restricting access from the outside. This helps\
    \ maintain the integrity of objects and prevent unexpected changes. In Python,\
    \ encapsulation is realized through access control.\n\n## Access Control\n\nPython\
    \ does not have keywords like private, protected, and public like other languages,\
    \ but it realizes pseudo-access control by the number of underscores (_) added\
    \ to the beginning of variable names or function names.\n\n- public: No underscore\
    \ at the beginning of variable names or function names. Accessible from the outside.\n\
    - protected: One underscore (_) at the beginning of variable names or function\
    \ names. Accessible from the same class and child classes.\n- private: Two underscores\
    \ (__) at the beginning of variable names or function names. Accessible only from\
    \ within the same class.\n\nThe following is an example using access control:\n\
    \n```python\nclass BankAccount:\n    def __init__(self, account_number, balance):\n\
    \        self._account_number = account_number  # protected\n        self.__balance\
    \ = balance  # private\n\n    def deposit(self, amount):\n        self.__balance\
    \ += amount\n\n    def withdraw(self, amount):\n        if amount <= self.__balance:\n\
    \            self.__balance -= amount\n        else:\n            print(\"Insufficient\
    \ funds\")\n\n    def get_balance(self):\n        return self.__balance\n\naccount\
    \ = BankAccount(\"1234567890\", 1000)\nprint(account._account_number)  # Output:\
    \ 1234567890\naccount.deposit(500)\naccount.withdraw(200)\nprint(account.get_balance())\
    \  # Output: 1300\n```\n\nIn the above example, _account_number is treated as\
    \ protected and can be accessed from outside the class. __balance is treated as\
    \ private and can only be accessed through methods within the class.\n\nHowever,\
    \ Python's access control is not strict and is more of a convention among developers.\
    \ In practice, private and protected are expressed using underscores, but it is\
    \ possible to access them from the outside.\n\nProperly using encapsulation and\
    \ access control helps protect the internal state of objects, improve code maintainability\
    \ and reusability, prevent unexpected changes, and reduce bugs.\n\nIn Python,\
    \ access control is expressed using underscores, realizing encapsulation. Understanding\
    \ the principles of encapsulation and performing appropriate access control allows\
    \ developing more robust and maintainable programs.\n\n## Sample Code: Animal\
    \ Simulation\n\nHere is a sample code incorporating the contents learned in Chapter\
    \ 3.\nThis sample code demonstrates the following:\n\n- How to define classes\n\
    - How to use inheritance\n- How to realize polymorphism\n- How to use encapsulation\
    \ and access control\n- How to create and manipulate instances\n\nRead the sample\
    \ code and understand how to apply these concepts in an actual application. This\
    \ code illustrates the main concepts of object-oriented programming using an animal\
    \ simulation application as an example.\nThe Animal class is defined as the base\
    \ class, and the Cat and Dog classes inherit from it, improving code reusability.\
    \ Also, polymorphism is realized by overriding the speak method.\nThe _name and\
    \ _age attributes of the Animal class and the __color attribute of the Cat class\
    \ are used to demonstrate access control and encapsulation.\nThe Simulator class\
    \ demonstrates how to create and manipulate instances, and shows how to perform\
    \ different processing based on the type of object using the isinstance function.\n\
    Through this sample code, understand the basic concepts of object-oriented programming\
    \ and apply them to actual application development.\n\n```python\nclass Animal:\n\
    \    def __init__(self, name, age):\n        self._name = name\n        self._age\
    \ = age\n\n    def speak(self):\n        pass\n\n    def __str__(self):\n    \
    \    return f\"{self._name} ({self._age} years old)\"\n\nclass Cat(Animal):\n\
    \    def __init__(self, name, age, color):\n        super().__init__(name, age)\n\
    \        self.__color = color\n\n    def speak(self):\n        return \"Meow\"\
    \n\n    def get_color(self):\n        return self.__color\n\nclass Dog(Animal):\n\
    \    def speak(self):\n        return \"Woof\"\n\n    def fetch(self):\n     \
    \   return f\"{self._name} is fetching the ball!\"\n\nclass Simulator:\n    def\
    \ __init__(self):\n        self.animals = []\n\n    def add_animal(self, animal):\n\
    \        self.animals.append(animal)\n\n    def simulate(self):\n        for animal\
    \ in self.animals:\n            print(animal)\n            print(f\"Sound: {animal.speak()}\"\
    )\n            if isinstance(animal, Dog):\n                print(animal.fetch())\n\
    \            if isinstance(animal, Cat):\n                print(f\"Color: {animal.get_color()}\"\
    )\n            print()\n\n# Usage example\nsimulator = Simulator()\n\nwhile True:\n\
    \    print(\"Choose an animal to add:\")\n    print(\"1. Cat\")\n    print(\"\
    2. Dog\")\n    print(\"3. Simulate\")\n    print(\"4. Exit\")\n\n    choice =\
    \ input(\"Enter your choice (1-4): \")\n\n    if choice == \"1\":\n        name\
    \ = input(\"Enter the cat's name: \")\n        age = int(input(\"Enter the cat's\
    \ age: \"))\n        color = input(\"Enter the cat's color: \")\n        cat =\
    \ Cat(name, age, color)\n        simulator.add_animal(cat)\n    elif choice ==\
    \ \"2\":\n        name = input(\"Enter the dog's name: \")\n        age = int(input(\"\
    Enter the dog's age: \"))\n        dog = Dog(name, age)\n        simulator.add_animal(dog)\n\
    \    elif choice == \"3\":\n        simulator.simulate()\n    elif choice == \"\
    4\":\n        break\n    else:\n        print(\"Invalid choice. Please try again.\"\
    )\n```\n\n## Chapter.4 Data Structures and Algorithms\n\nThis chapter explains\
    \ array operations and string operations. There are three types of arrays, which\
    \ are one of the features of Python. They have different purposes, but once you\
    \ get used to them, they are intuitively understandable.\n\nThere are some rules\
    \ that are specific to them, but the specifications for each are not too difficult.\n\
    \n## 4.1 List and Tuple Operations\n\nLists and tuples are data structures for\
    \ storing multiple elements. Lists are enclosed in [], while tuples are enclosed\
    \ in ().\nLists allow adding, removing, and modifying elements, while tuples cannot\
    \ be changed once defined. Here, I will explain the basic operations for lists\
    \ and tuples.\n\n### List Operations\n\n#### 1. Adding Elements\n\n- append():\
    \ Adds an element to the end of the list.\n- insert(): Inserts an element at a\
    \ specified position.\n- extend(): Adds elements of another list to the end of\
    \ the list.\n\n```python\nfruits = ['apple', 'banana', 'orange']\n\nfruits.append('grape')\n\
    fruits.insert(1, 'kiwi')\nfruits.extend(['mango', 'pineapple'])\nprint(fruits)\
    \  # Output: ['apple', 'kiwi', 'banana', 'orange', 'grape', 'mango', 'pineapple']\n\
    ```\n\n#### 2. Removing Elements\n\n- remove(): Removes the specified element.\n\
    - pop(): Removes and returns the element at the specified position. If no index\
    \ is specified, it removes the last element.\n- clear(): Removes all elements\
    \ from the list.\n\n```python\nfruits = ['apple', 'banana', 'orange', 'grape']\n\
    fruits.remove('banana')\nfruit = fruits.pop(1)\nprint(fruits)  # Output: ['apple',\
    \ 'grape']\nprint(fruit)  # Output: orange\nfruits.clear()\nprint(fruits)  # Output:\
    \ []\n```\n\n#### 3. Accessing and Modifying Elements\n\n- You can access and\
    \ modify elements of a list using indexes.\n\n```python\nfruits = ['apple', 'banana',\
    \ 'orange']\nprint(fruits[1])  # Output: banana\nfruits[1] = 'kiwi'\nprint(fruits)\
    \  # Output: ['apple', 'kiwi', 'orange']\n```\n\n### Tuple Operations\n\nTuples\
    \ are immutable once defined, but you can access elements.\n\n```python\nfruits\
    \ = ('apple', 'banana', 'orange')\nprint(fruits[1])  # Output: banana\n```\n\n\
    ### Common Operations for Lists and Tuples\n\n- len(): Returns the number of elements\
    \ in a list or tuple.\n- count(): Returns the number of occurrences of the specified\
    \ element.\n- index(): Returns the index of the first occurrence of the specified\
    \ element.\n\n```python\nfruits = ['apple', 'banana', 'orange', 'banana']\nprint(len(fruits))\
    \  # Output: 4\nprint(fruits.count('banana'))  # Output: 2\nprint(fruits.index('orange'))\
    \  # Output: 2\n```\n\nThe choice between lists and tuples depends on whether\
    \ you need to modify elements. Use lists if you need to modify elements, and use\
    \ tuples if you don't. Also, tuples are more memory-efficient than lists, so they\
    \ are recommended when handling large amounts of data."
  mdcn: "## 3.3 封装与访问控制\n\n封装是面向对象编程的重要原则之一。封装指的是隐藏对象的内部状态，并限制外部访问。这有助于维护对象的完整性并防止意外的更改。在Python中，封装是通过访问控制来实现的。\n\
    \n## 访问控制\n\nPython不像其他语言那样有`private`、`protected`和`public`这样的关键字，但它通过在变量名或函数名开头添加下划线（_）的数量来实现伪访问控制。\n\
    \n- public：变量名或函数名开头没有下划线。可以从外部访问。\n- protected：变量名或函数名开头有一个下划线（_）。可以从同一类和子类中访问。\n\
    - private：变量名或函数名开头有两个下划线（__）。只能从同一类内部访问。\n\n以下是使用访问控制的示例：\n\n```python\nclass\
    \ BankAccount:\n    def __init__(self, account_number, balance):\n        self._account_number\
    \ = account_number  # protected\n        self.__balance = balance  # private\n\
    \n    def deposit(self, amount):\n        self.__balance += amount\n\n    def\
    \ withdraw(self, amount):\n        if amount <= self.__balance:\n            self.__balance\
    \ -= amount\n        else:\n            print(\"Insufficient funds\")\n\n    def\
    \ get_balance(self):\n        return self.__balance\n\naccount = BankAccount(\"\
    1234567890\", 1000)\nprint(account._account_number)  # Output: 1234567890\naccount.deposit(500)\n\
    account.withdraw(200)\nprint(account.get_balance())  # Output: 1300\n```\n\n在上面的例子中，`_account_number`被视为受保护的，可以从类外部访问。`__balance`被视为私有的，只能通过类内部的方法访问。\n\
    \n然而，Python的访问控制并不严格，更多是开发者之间的一种约定。在实践中，私有和受保护是通过下划线来表示的，但从外部访问它们是可能的。\n\n正确使用封装和访问控制有助于保护对象的内部状态，提高代码的可维护性和可重用性，防止意外的更改，并减少错误。\n\
    \n在Python中，访问控制通过下划线来表示，从而实现了封装。理解封装的原则并进行适当的访问控制，可以开发出更健壮、更易于维护的程序。\n\n## 示例代码：动物模拟\n\
    \n以下是结合第3章所学内容的示例代码。\n此示例代码演示了以下内容：\n\n- 如何定义类\n- 如何使用继承\n- 如何实现多态\n- 如何使用封装和访问控制\n\
    - 如何创建和操作实例\n\n阅读示例代码，理解如何在实际应用中应用这些概念。此代码以动物模拟应用为例，阐述了面向对象编程的主要概念。\n`Animal`类被定义为基类，`Cat`和`Dog`类继承自它，提高了代码的可重用性。同时，通过重写`speak`方法实现了多态。\n\
    `Animal`类的`_name`和`_age`属性以及`Cat`类的`__color`属性用于演示访问控制和封装。\n`Simulator`类演示了如何创建和操作实例，并展示了如何使用`isinstance`函数根据对象类型执行不同的处理。\n\
    通过此示例代码，理解面向对象编程的基本概念，并将其应用于实际的应用开发。\n\n```python\nclass Animal:\n    def __init__(self,\
    \ name, age):\n        self._name = name\n        self._age = age\n\n    def speak(self):\n\
    \        pass\n\n    def __str__(self):\n        return f\"{self._name} ({self._age}\
    \ years old)\"\n\nclass Cat(Animal):\n    def __init__(self, name, age, color):\n\
    \        super().__init__(name, age)\n        self.__color = color\n\n    def\
    \ speak(self):\n        return \"Meow\"\n\n    def get_color(self):\n        return\
    \ self.__color\n\nclass Dog(Animal):\n    def speak(self):\n        return \"\
    Woof\"\n\n    def fetch(self):\n        return f\"{self._name} is fetching the\
    \ ball!\"\n\nclass Simulator:\n    def __init__(self):\n        self.animals =\
    \ []\n\n    def add_animal(self, animal):\n        self.animals.append(animal)\n\
    \n    def simulate(self):\n        for animal in self.animals:\n            print(animal)\n\
    \            print(f\"Sound: {animal.speak()}\")\n            if isinstance(animal,\
    \ Dog):\n                print(animal.fetch())\n            if isinstance(animal,\
    \ Cat):\n                print(f\"Color: {animal.get_color()}\")\n           \
    \ print()\n\n# Usage example\nsimulator = Simulator()\n\nwhile True:\n    print(\"\
    Choose an animal to add:\")\n    print(\"1. Cat\")\n    print(\"2. Dog\")\n  \
    \  print(\"3. Simulate\")\n    print(\"4. Exit\")\n\n    choice = input(\"Enter\
    \ your choice (1-4): \")\n\n    if choice == \"1\":\n        name = input(\"Enter\
    \ the cat's name: \")\n        age = int(input(\"Enter the cat's age: \"))\n \
    \       color = input(\"Enter the cat's color: \")\n        cat = Cat(name, age,\
    \ color)\n        simulator.add_animal(cat)\n    elif choice == \"2\":\n     \
    \   name = input(\"Enter the dog's name: \")\n        age = int(input(\"Enter\
    \ the dog's age: \"))\n        dog = Dog(name, age)\n        simulator.add_animal(dog)\n\
    \    elif choice == \"3\":\n        simulator.simulate()\n    elif choice == \"\
    4\":\n        break\n    else:\n        print(\"Invalid choice. Please try again.\"\
    )\n```\n\n## 第4章 数据结构与算法\n\n本章讲解数组操作和字符串操作。数组有三种类型，这是Python的特性之一。它们有不同的用途，但一旦习惯，就能直观地理解。\n\
    \n它们有一些特定的规则，但各自的规范并不太难。\n\n## 4.1 列表与元组操作\n\n列表和元组是用于存储多个元素的数据结构。列表用`[]`括起来，而元组用`()`括起来。\n\
    列表允许添加、删除和修改元素，而元组一旦定义就不能更改。这里，我将解释列表和元组的基本操作。\n\n### 列表操作\n\n#### 1. 添加元素\n\n\
    - append()：在列表末尾添加一个元素。\n- insert()：在指定位置插入一个元素。\n- extend()：将另一个列表的元素添加到列表末尾。\n\
    \n```python\nfruits = ['apple', 'banana', 'orange']\n\nfruits.append('grape')\n\
    fruits.insert(1, 'kiwi')\nfruits.extend(['mango', 'pineapple'])\nprint(fruits)\
    \  # Output: ['apple', 'kiwi', 'banana', 'orange', 'grape', 'mango', 'pineapple']\n\
    ```\n\n#### 2. 删除元素\n\n- remove()：删除指定的元素。\n- pop()：删除并返回指定位置的元素。如果未指定索引，则删除最后一个元素。\n\
    - clear()：删除列表中的所有元素。\n\n```python\nfruits = ['apple', 'banana', 'orange', 'grape']\n\
    fruits.remove('banana')\nfruit = fruits.pop(1)\nprint(fruits)  # Output: ['apple',\
    \ 'grape']\nprint(fruit)  # Output: orange\nfruits.clear()\nprint(fruits)  # Output:\
    \ []\n```\n\n#### 3. 访问和修改元素\n\n- 你可以使用索引来访问和修改列表的元素。\n\n```python\nfruits = ['apple',\
    \ 'banana', 'orange']\nprint(fruits[1])  # Output: banana\nfruits[1] = 'kiwi'\n\
    print(fruits)  # Output: ['apple', 'kiwi', 'orange']\n```\n\n### 元组操作\n\n元组一旦定义就是不可变的，但你可以访问元素。\n\
    \n```python\nfruits = ('apple', 'banana', 'orange')\nprint(fruits[1])  # Output:\
    \ banana\n```\n\n### 列表和元组的通用操作\n\n- len()：返回列表或元组中的元素数量。\n- count()：返回指定元素出现的次数。\n\
    - index()：返回指定元素第一次出现的索引。\n\n```python\nfruits = ['apple', 'banana', 'orange',\
    \ 'banana']\nprint(len(fruits))  # Output: 4\nprint(fruits.count('banana'))  #\
    \ Output: 2\nprint(fruits.index('orange'))  # Output: 2\n```\n\n列表和元组的选择取决于是否需要修改元素。如果需要修改元素，使用列表；如果不需要，使用元组。此外，元组比列表更节省内存，因此在处理大量数据时推荐使用元组。"
