  - "[PAGE 55]\n\n# # 3.3 Encapsulation and Access Control\n\nEncapsulation is one\
    \ of the important principles of object-oriented programming. Encapsulation refers\
    \ to hiding the internal state of an object and restricting access from the outside.\
    \ This helps maintain the integrity of objects and prevent unexpected changes.\
    \ In Python, encapsulation is realized through access control.\n\n# ## Access\
    \ Control\n\nPython does not have keywords like private, protected, and public\
    \ like other languages, but it realizes pseudo-access control by the number of\
    \ underscores (_) added to the beginning of variable names or function names.\n\
    \n+   - public: No underscore at the beginning of variable names or function names.\
    \ Accessible from the outside.\n- protected: One underscore (_) at the beginning\
    \ of variable names or function names. Accessible from the same class and child\
    \ classes.\n- private: Two underscores (__) at the beginning of variable names\
    \ or function names. Accessible only from within the same class.\n\nThe following\
    \ is an example using access control:\n\n```\npython\nclass BankAccount :\n  \
    \  def __init__(self, account_number, balance):\n        self._account_number\
    \ = account_number # protected\n        self.__balance = balance # private\n\n\
    ```"
