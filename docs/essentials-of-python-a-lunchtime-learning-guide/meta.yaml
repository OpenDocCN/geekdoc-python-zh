- md: "# Lambda Expressions with map() Function\n\nThe map() function applies a specified\
    \ function to each element of a list and returns a new list.\n\n```\nnumbers =\
    \ [1, 2, 3, 4, 5]\nsquared_numbers = list(map(lambda x: x ** 2, numbers))\nprint(squared_numbers)\
    \  # Output: [1, 4, 9, 16, 25]\n```\n\nIn this example, the lambda expression\
    \ `lambda x: x ** 2` is used to square each element of the list.\n\n# Lambda Expressions\
    \ with filter() Function\n\nThe filter() function filters the elements of a list\
    \ and returns a new list containing only the elements that satisfy a specified\
    \ condition.\n\n```\nnumbers = [1, 2, 3, 4, 5]\neven_numbers = list(filter(lambda\
    \ x: x % 2 == 0, numbers))\nprint(even_numbers)  # Output: [2, 4]\n```\n\nIn this\
    \ example, the lambda expression `lambda x: x % 2 == 0` is used to filter only\
    \ the even numbers.\n\n# Lambda Expressions with sort() Function\n\nThe sort()\
    \ function sorts the elements of a list. By specifying a lambda expression as\
    \ the `key` argument, you can define the sorting criteria.\n\n```\nstudents =\
    \ [\n    {'name': 'Alice', 'score': 80},\n    {'name': 'Bob', 'score': 90},\n\
    \    {'name': 'Charlie', 'score': 70}\n]\n\nstudents.sort(key=lambda x: x['score'],\
    \ reverse=True)\nprint(students)\n# Output: [{'name': 'Bob', 'score': 90}, {'name':\
    \ 'Alice', 'score': 80}, {'name': 'Charlie', 'score': 70}]\n```\n\nIn this example,\
    \ the lambda expression `lambda x: x['score']` is used to sort based on the 'score'\
    \ key of the dictionary.\n\nLambda expressions are suitable for defining short\
    \ and concise functions. They are particularly useful when used in combination\
    \ with other functions that take functions as arguments.\nHowever, for complex\
    \ processing, it is more readable to use a regular function definition.\n\nProperly\
    \ utilizing lambda expressions improves code readability and maintainability.\n\
    In Python, lambda expressions can be combined with other functions to concisely\
    \ express list operations and processing.\n\nLambda expressions are an important\
    \ feature of Python that leverages its functional programming characteristics.\n\
    \n# 2.3 Importing and Utilizing Modules\n\nModules are Python files that contain\
    \ related variables, functions, classes, etc. Using modules improves code reusability\
    \ and program structure. Python has many modules available in its standard library,\
    \ which can be imported and used as needed.\n\n# Importing Modules\n\nTo import\
    \ a module, use the `import` statement.\n\n```\nimport module_name\nfrom module_name\
    \ import function_name\nfrom module_name import function_name1, function_name2\n\
    from module_name import *\n```\n\nFor example, to import the `math` module, you\
    \ can do the following:\n\n```\nimport math\n```\n\nNow you can use the functions\
    \ and constants included in the `math` module.\n\n```\npi = math.pi\nprint(pi)\
    \  # Output: 3.141592653589793\n\nprint(math.sqrt(16))  # Output: 4.0\n```\n\n\
    You can also import specific functions.\n\n```\nfrom math import sqrt\nprint(sqrt(16))\
    \  # Output: 4.0\n```\n\n# Importing with Aliases\n\nIf a module name or function\
    \ name is long, you can import it with an alias.\n\n```\nimport numpy as np\n\
    print(np.array([1, 2, 3]))  # Output: [1 2 3]\n```\n\n# Creating Custom Modules\n\
    \nCreating your own modules can improve code reusability.\n\n```\n# my_module.py\n\
    def greet(name):\n    print(f\"Hello, {name}!\")\n\n# main.py\nimport my_module\n\
    \nmy_module.greet(\"Alice\")  # Output: Hello, Alice!\n```\n\nIn this example,\
    \ the `greet` function is defined in a file named `my_module.py`, and it is imported\
    \ and used in `main.py`.\n\n# Using the `__name__` Variable\n\nA Python file can\
    \ change its behavior depending on whether it is used as a module or executed\
    \ directly. The `__name__` variable is used to determine this.\n\n```\n# my_module.py\n\
    def greet(name):\n    print(f\"Hello, {name}!\")\n\nif __name__ == \"__main__\"\
    :\n    greet(\"Alice\")\n```\n\nIn this example, if `my_module.py` is executed\
    \ directly, the block under `if __name__ == \"__main__\"` will be executed, and\
    \ `greet(\"Alice\")` will be called.\n\nWhen executed directly:\n\n```\nHello,\
    \ Alice!\n```\n\nOn the other hand, if `my_module.py` is imported from another\
    \ file, the block under `if __name__ == \"__main__\"` will not be executed.\n\n\
    When imported and executed:\n\n```\nimport my_module\nmy_module.greet(\"Bob\"\
    )\n```\n\nOutput:\n\n```\nHello, Bob!\n```\n\nThe processing for `Alice` in `__main__`\
    \ is not executed.\n\nUsing modules improves code reusability and program structure.\n\
    \nPython has a rich standard library, which can be imported and used as needed.\
    \ Also, creating your own modules makes code management easier.\n\nThe `import`\
    \ statement is used to import modules. You can import the entire module or specific\
    \ functions.\nYou can also import with aliases to improve code readability.\n\n\
    The `__name__` variable can be used to determine whether a module is being executed\
    \ directly or imported.\nThis feature can be used to appropriately control the\
    \ behavior of modules.\n\nIn Python, actively using modules is recommended.\n\n\
    By effectively utilizing the standard library and properly designing custom modules,\
    \ you can write efficient and maintainable code.\n\n# 2.4 File Reading and Writing\n\
    \nFile reading and writing are essential features for data persistence and data\
    \ exchange between programs. In Python, file reading and writing can be easily\
    \ performed.\n\n# Opening and Closing Files\n\nTo read or write a file, you first\
    \ need to open the file. Use the `open()` function to open a file.\n\n```\nfile\
    \ = open(\"file.txt\", \"r\")\n```\n\nThe first argument of the `open()` function\
    \ is the file path, and the second argument specifies the mode in which to open\
    \ the file. The modes include the following:\n\n- \"r\": Read mode (default)\n\
    - \"w\": Write mode (overwrites if the file exists)\n- \"a\": Append mode (appends\
    \ to the end of the file)\n- \"x\": Exclusive write mode (raises an error if the\
    \ file exists)\n\nAfter using the file, call the `close()` method to close the\
    \ file.\n\n```\nfile.close()\n```\n\n# Reading Files\n\nTo read contents from\
    \ a file, use the `read()`, `readline()`, or `readlines()` methods.\n\n```\n#\
    \ Read the entire file\nwith open(\"file.txt\", \"r\") as file:\n    content =\
    \ file.read()\n    print(content)\n\n# Read line by line\nwith open(\"file.txt\"\
    , \"r\") as file:\n    line = file.readline()\n    while line:\n        print(line.strip())\n\
    \        line = file.readline()\n\n# Read all lines as a list\nwith open(\"file.txt\"\
    , \"r\") as file:\n    lines = file.readlines()\n    print(lines)\n```\n\nUsing\
    \ the `with` statement, you can automatically close the file.\n\n# Writing to\
    \ Files\n\nTo write contents to a file, use the `write()` method.\n\n```\nwith\
    \ open(\"file.txt\", \"w\") as file:\n    file.write(\"Hello, World!\\n\")\n \
    \   file.write(\"This is a sample file.\\n\")\n```\n\nThe `write()` method writes\
    \ the specified string to the file. To add a new line, you need to explicitly\
    \ specify `\"\\n\"`.\n\n# Reading and Writing CSV Files\n\nCSV (Comma-Separated\
    \ Values) is a file format used to store tabular data. Python provides the `csv`\
    \ module for reading and writing CSV files.\n\n```\nimport csv\n\n# Reading a\
    \ CSV file\nwith open(\"data.csv\", \"r\") as file:\n    reader = csv.reader(file)\n\
    \    for row in reader:\n        print(row)\n\n# Writing to a CSV file\nwith open(\"\
    data.csv\", \"w\", newline=\"\") as file:\n    writer = csv.writer(file)\n   \
    \ writer.writerow([\"Name\", \"Age\", \"City\"])\n    writer.writerow([\"Alice\"\
    , \"28\", \"New York\"])\n    writer.writerow([\"Bob\", \"35\", \"Paris\"])\n\
    ```\n\nThe `csv` module makes it easy to read and write CSV files.\nFile reading\
    \ and writing are essential features for data persistence and data exchange between\
    \ programs. In Python, use the `open()` function to open a file, and use the `read()`\
    \ and `write()` methods to read from and write to files. Using the `with` statement\
    \ allows you to automatically close the file.\nAlso, Python provides the `csv`\
    \ module for easy reading and writing of CSV files. CSV files are widely used\
    \ as a file format for storing tabular data.\nProperly utilizing file reading\
    \ and writing allows you to efficiently perform data persistence and data exchange\
    \ between programs."
  mdcn: "# Lambda 表达式与 map() 函数\n\n`map()` 函数将指定的函数应用于列表的每个元素，并返回一个新列表。\n\n```\nnumbers\
    \ = [1, 2, 3, 4, 5]\nsquared_numbers = list(map(lambda x: x ** 2, numbers))\n\
    print(squared_numbers)  # Output: [1, 4, 9, 16, 25]\n```\n\n在此示例中，lambda 表达式 `lambda\
    \ x: x ** 2` 用于计算列表中每个元素的平方。\n\n# Lambda 表达式与 filter() 函数\n\n`filter()` 函数过滤列表的元素，并返回一个仅包含满足指定条件的元素的新列表。\n\
    \n```\nnumbers = [1, 2, 3, 4, 5]\neven_numbers = list(filter(lambda x: x % 2 ==\
    \ 0, numbers))\nprint(even_numbers)  # Output: [2, 4]\n```\n\n在此示例中，lambda 表达式\
    \ `lambda x: x % 2 == 0` 用于仅筛选出偶数。\n\n# Lambda 表达式与 sort() 函数\n\n`sort()` 函数对列表的元素进行排序。通过将\
    \ lambda 表达式指定为 `key` 参数，你可以定义排序标准。\n\n```\nstudents = [\n    {'name': 'Alice',\
    \ 'score': 80},\n    {'name': 'Bob', 'score': 90},\n    {'name': 'Charlie', 'score':\
    \ 70}\n]\n\nstudents.sort(key=lambda x: x['score'], reverse=True)\nprint(students)\n\
    # Output: [{'name': 'Bob', 'score': 90}, {'name': 'Alice', 'score': 80}, {'name':\
    \ 'Charlie', 'score': 70}]\n```\n\n在此示例中，lambda 表达式 `lambda x: x['score']` 用于根据字典的\
