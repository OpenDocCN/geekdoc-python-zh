  md: '# Chapter.1 The basics of Python


    This chapter explains variables, types, control structures, and the basics of
    functions.


    These concepts, while having differences in notation rules between languages,
    fall within the scope of normal specifications as a programming language and should
    be easy to understand.


    There are some unique specifications and notation rules, so it''s good to be aware
    of them.


    # 1.1 Variables and Constants


    In Python, data is stored and manipulated using variables. Variables can have
    their values changed.


    # Declaring and Assigning Variables


    In Python, you don''t need to specify the type when declaring variables. Variables
    are automatically created by assigning a value to a variable name.


    ```

    message = "Hello, world!"

    number = 42

    ```


    In the above example, the string "Hello, world!" is assigned to the message variable,
    and the integer 42 is assigned to the number variable.'
