  md: '# # Introduction


    Dear engineers, thank you very much for picking up this book among the many available.


    Let me introduce myself first.


    I am the author, Takashi Takamiya. I am a manager and engineer of the R&D team
    in the development department with about 20 years of experience as an engineer
    in a regional city. (While it may sound good to be called a playing manager, I
    am essentially a jack-of-all-trades.)


    Although not a large company, I have been involved in a wide range of projects
    from web system development to AI and sensors in a company with about a thousand
    employees.


    Due to the nature of R&D, I have been fortunate to have the opportunity to constantly
    come into contact with new technologies and methods without being constrained
    to specific environments or languages.


    Moreover, with frequent contact with end-users through PoCs and such, I have gained
    experience in handling all processes from upstream to downstream, albeit on a
    small scale.


    Through this, what I realized is the importance of fundamental programming concepts
    and the ability to apply them, rather than the details of individual languages.

    Especially when encountering new languages and tools, I strongly felt that understanding
    the underlying thinking leads to smooth acquisition.


    Based on the knowledge gained from such experiences, this book compactly summarizes
    the essential knowledge of Python for those experienced in other languages.'
