  md: '# Lambda Expressions with map() Function


    The map() function applies a specified function to each element of a list and
    returns a new list.


    ```

    numbers = [ 1 , 2 , 3 , 4 , 5 ]

    squared_numbers = list(map( lambda x: x ** 2 , numbers))

    print(squared_numbers)  # Output: [1, 4, 9, 16, 25]

    ```


    In this example, the lambda expression lambda x: x ** 2 is used to square each
    element of the list.


    # Lambda Expressions with filter() Function


    The filter() function filters the elements of a list and returns a new list containing
    only the elements that satisfy a specified condition.


    ```

    numbers = [ 1 , 2 , 3 , 4 , 5 ]

    even_numbers = list(filter( lambda x: x % 2 == 0 , numbers))

