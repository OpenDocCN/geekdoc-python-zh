    if __name__ == \"__main__\":\n    main()\n```\n\n## Chapter.3 Classes and Object-Oriented\
    \ Programming\n\n![](img/bbcfa4d779b56e85abf35b172d0b538d_48_0.png)\n\n<!-- no\
    \ content -->\n\nThis chapter explains Python classes and objects.\nThe concepts\
    \ of object-oriented programming, such as class definitions, instance creation,\
    \ inheritance, and polymorphism, are familiar in languages like Java, C++, and\
    \ C#, and Python also has similar features.\nBasic concepts such as class definition,\
    \ instance creation, inheritance, and polymorphism are common to other languages.\n\
    \n### 3.1 Class Definition and Instantiation\n\nObject-oriented programming (OOP)\
    \ is a technique that treats a program as \"objects\".\nObjects have data (attributes)\
    \ and behavior (methods). In Python, \"classes\" are defined to create blueprints\
    \ for objects, and \"instances\" are generated from those classes to use objects.\n\
    \n### Class Definition\n\nIn Python, classes are defined using the class keyword.\
    \ The following is an example of a simple Person class:\n\n```python\nclass Person:\n\
    \    def __init__(self, name, age):\n        self.name = name\n        self.age\
    \ = age\n\n    def greet(self):\n        print(f\"Hello, my name is {self.name}\
    \ and I'm {self.age} years old.\")\n```\n\n- The `__init__` method is the constructor\
    \ of the class. It is automatically called when an instance is created.\n- self\
    \ is used to refer to the instance itself.\n- name and age are attributes of the\
    \ Person class.\n- The greet method defines the behavior of the Person class.\n\
    \nself is a way to refer to the instance itself within instance methods and is\
    \ used to access the attributes and methods of the instance. It may be a bit difficult\
    \ to grasp conceptually, so it may be good to think of it as a language convention\
    \ that requires writing self.\n\n### Instantiation\n\nCreating an object from\
    \ a class is called \"instantiation\". To instantiate, append parentheses after\
    \ the class name.\n\n```python\nperson1 = Person(\"Alice\", 25)\nperson2 = Person(\"\
    Bob\", 30)\n```\n\nIn the above example, two instances, person1 and person2, are\
    \ created from the Person class.\n\n### Using Instances\n\nTo access the attributes\
    \ or methods of an instance, use dot notation.\n\n```python\nprint(person1.name)\
    \  # Output: Alice\nprint(person2.age)  # Output: 30\n\nperson1.greet()  # Output:\
    \ Hello, my name is Alice and I'm 25 years old.\nperson2.greet()  # Output: Hello,\
    \ my name is Bob and I'm 30 years old.\n```\n\nProperly defining and using classes\
    \ and instances improves code reusability and maintainability.\nIt also allows\
    \ real-world concepts to be reflected in the program, enabling more intuitive\
    \ code to be written.\n\nIn Python, object-oriented programming can be realized\
    \ using classes. Understanding the concepts of class definition and instantiation\
    \ allows you to develop more advanced and effective programs.\n\n### 3.2 Inheritance\
    \ and Polymorphism\n\nInheritance and polymorphism are important concepts in object-oriented\
    \ programming.\n\nInheritance is a feature that allows creating new classes by\
    \ extending existing classes, improving code reusability.\n\nPolymorphism refers\
    \ to the ability of objects with the same interface to perform different behaviors.\n\
    \n### Inheritance\n\nIn Python, when defining a class, you can inherit from an\
    \ existing class. This allows inheriting the attributes and methods of the parent\
    \ class and adding new functionality or overriding existing functionality.\n\n\
    ```python\nclass Animal:\n    def __init__(self, name):\n        self.name = name\n\
    \n    def speak(self):\n        pass\n\nclass Cat(Animal):\n    def speak(self):\n\
    \        return \"Meow\"\n\nclass Dog(Animal):\n    def speak(self):\n       \
    \ return \"Woof\"\n```\n\nIn the above example, the Animal class is defined as\
    \ the parent class, and the Cat and Dog classes are defined as child classes.\
    \ The Cat and Dog classes inherit the name attribute from the Animal class. Also,\
    \ they each implement the speak method independently.\n\n### Polymorphism\n\n\
    Polymorphism refers to the ability of objects with the same interface to perform\
    \ different behaviors. In Python, polymorphism can be realized using inheritance.\n\
    \n```python\ndef animal_speak(animal):\n    print(animal.speak())\n\n# At this\
    \ point, separate instances from different classes are created\ncat = Cat(\"Whiskers\"\
    )\ndog = Dog(\"Buddy\")\n\n# The behavior implemented in each class is followed\
    \ for each instance\nanimal_speak(cat)  # Output: Meow\nanimal_speak(dog)  # Output:\
    \ Woof\n```\n\nIn the above example, the animal_speak function takes an object\
    \ that inherits from the Animal class as an argument. When the Cat and Dog instances\
    \ are passed as arguments, the speak method implemented in each class is called.\n\
    \nUtilizing inheritance and polymorphism improves code reusability and flexibility.\
    \ It also allows designing complex systems in an understandable manner.\n\nIn\
    \ Python, new classes can be created using inheritance, and the behavior of objects\
    \ can be flexibly defined using polymorphism. Understanding and properly utilizing\
    \ these concepts allows developing more effective and maintainable programs."
