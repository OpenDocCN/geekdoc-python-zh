    - Train a classification model using Support Vector Machine (SVM)

    - Evaluate the model''s accuracy using the test data


    In this example, the iris dataset is loaded, split into training and test sets,
    a classification model is trained using SVM, and the model''s accuracy is evaluated
    using the test data.


    In recent years, deep learning has gained significant attention. Deep learning
    is a machine learning technique that uses artificial neural networks and has achieved
    great results in fields such as image recognition and natural language processing.
    In Python, libraries such as TensorFlow and PyTorch are widely used for deep learning.'
- md: "## 5.3 Utilization in Web Applications\n\nPython is also a very popular language\
    \ for web application development. With Python, you can build various web applications,\
    \ from simple blog sites to large-scale web services.\n\nPython has many frameworks\
    \ for web application development. Among them, Django and Flask are the most widely\
    \ used.\n\nDjango is a battery-included framework that focuses on fast development\
    \ and excellent security. Django provides a wide range of features necessary for\
    \ web application development, such as ORM for database operations, automatic\
    \ admin interface, and template system. It also has the appeal of having extensive\
    \ extensions (middleware) and support from a large community.\n\nOn the other\
    \ hand, Flask is a microframework that emphasizes simplicity and flexibility.\
    \ Flask provides minimal features and allows developers to freely configure their\
    \ applications. Flask is suitable for small to medium-sized projects and has excellent\
    \ extensibility.\n\nThe following is a simple example of a web application using\
    \ Flask:\n\n```python\nfrom flask import Flask, render_template\n\napp = Flask(__name__)\n\
    \n@app.route(\"/\")\ndef index():\n    return render_template(\"index.html\")\n\
    \n@app.route(\"/hello/<name>\")\ndef hello(name):\n    return f\"Hello, {name}!\"\
    \n\nif __name__ == \"__main__\":\n    app.run(debug=True)\n```\n\nThis application\
    \ renders the \"index.html\" template when accessing the root URL (\"/\") and\
    \ returns the message \"Hello, [name]!\" when accessing the URL \"/hello/[name]\"\
    .\n\nWeb application development requires various features such as database operations,\
    \ authentication, session management, etc. Python also has a rich set of libraries\
    \ that provide these features. For example, SQLAlchemy provides an ORM that abstracts\
    \ database operations. Flask-Login and Django's built-in authentication provide\
    \ user authentication functionality.\n\nIf you are interested in web application\
    \ development, it is recommended to start by learning either Django or Flask.\
    \ Both frameworks have excellent documentation and tutorials available.\n\nThis\
    \ book provides only a brief introduction, but I think it is an important point\
    \ to keep in mind as a use case for the language.\n\n## 5.4 File Operations for\
    \ Business Efficiency Improvement\n\nPython is very suitable for automating file\
    \ operations and data processing. In daily business tasks, there are many repetitive\
    \ tasks such as processing Excel files and PDF files.\n\nAutomating these tasks\
    \ using Python can greatly improve business efficiency.\n\nFor manipulating Excel\
    \ files, the openpyxl library is commonly used. With openpyxl, you can easily\
    \ read Excel files, edit data, and create new files.\n\nThe following is a simple\
    \ example of reading an Excel file and processing data using openpyxl:\n\n```python\n\
    from openpyxl import load_workbook\n\n# Load the Excel file\nwb = load_workbook('data.xlsx')\n\
    \n# Select the active sheet\nsheet = wb.active\n\n# Read cell values and process\
    \ them\nfor row in sheet.iter_rows(min_row=2, values_only=True):\n    name, age,\
    \ city = row\n    print(f\"Name: {name}, Age: {age}, City: {city}\")\n```\n\n\
    In this example, the Excel file \"data.xlsx\" is loaded, and the data from the\
    \ second row onwards is processed.\n\nFor manipulating PDF files, the PyPDF2 library\
    \ is useful. With PyPDF2, you can read PDF files, extract pages, and merge multiple\
    \ PDFs.\n\nThe following is an example of extracting a specific page from a PDF\
    \ file using PyPDF2:\n\n```python\nfrom PyPDF2 import PdfFileWriter, PdfFileReader\n\
    \n# Load the PDF file\nwith open('input.pdf', 'rb') as file:\n    reader = PdfFileReader(file)\n\
    \n# Create a new PDF\nwriter = PdfFileWriter()\n\n# Add a specific page to the\
    \ new PDF\nwriter.addPage(reader.getPage(2))\n\n# Save the new PDF\nwith open('output.pdf',\
    \ 'wb') as output:\n    writer.write(output)\n```\n\nIn this example, the third\
    \ page is extracted from the PDF file \"input.pdf\" and saved as a new PDF file\
    \ \"output.pdf\".\n\nThere are many other tasks that can be automated using Python,\
    \ such as processing CSV files and JSON files, batch processing files in a directory,\
    \ etc. Automating these tasks can reduce errors and save time.\n\nIf there are\
    \ repetitive tasks in your daily business, consider whether they can be automated\
    \ using Python. It may take some time to write the code for automation, but in\
    \ the long run, it will result in significant time savings.\n\nBy utilizing Python's\
    \ file operation and data processing capabilities, you can improve business efficiency\
    \ and allocate more time to creative work.\n\nThe above sections introduced Python's\
    \ use cases in machine learning, web development, and daily business tasks. Python's\
    \ very high flexibility is one of the reasons it can be used for such a wide range\
    \ of purposes. It is important to determine the direction of learning according\
    \ to each use case.\n\n## Conclusion\n\nThank you for reading this book to the\
    \ end. I hope that through this book, you have understood the basics of Python\
    \ programming and acquired the ability to read and understand code.\n\nThis book\
    \ has explained fundamental programming concepts such as Python's basic syntax,\
    \ variables, functions, classes, objects, lists, and string manipulation. This\
    \ knowledge is essential for broadly understanding Python code.\n\nHowever, the\
    \ world of Python is vast, and the contents covered in this book are just a part\
    \ of it. As introduced in Chapter 5, applied topics such as data analysis, machine\
    \ learning, web application development, and business automation play important\
    \ roles in actual development projects.\n\nAlso, the utilization of libraries\
    \ and frameworks is indispensable in modern Python development. Choosing and learning\
    \ appropriate tools according to the project requirements enables more efficient\
    \ and high-quality application development.\n\nBased on the knowledge gained from\
    \ this book, I hope that you will continue learning according to your goals and\
    \ projects.\n\nThe world of Python development is constantly evolving, with new\
    \ technologies and concepts being born continuously. Having an attitude of continuous\
    \ learning and keeping up with the latest information will be the path to becoming\
    \ an excellent Python developer.\n\nI hope this book has been helpful for you\
    \ in learning Python programming.\n\nThank you so much for taking the time to\
    \ read this book from cover to cover. Your opinions and feedback are invaluable\
    \ to me as an author. If you could spare a moment, I would be incredibly grateful\
    \ if you could leave a review and rating on the next page.\n\nEven just selecting\
    \ a star rating would mean a great deal to me, but if you could also leave a brief\
    \ comment, I would truly appreciate it. Please feel free to share your honest\
    \ thoughts on what you enjoyed about the book or areas where you think it could\
    \ be improved.\n\nThe review form and star rating can be found on the following\
    \ page. It will only take a minute or two of your time, and your feedback would\
    \ be immensely helpful.\n\nI will use your input to guide my future writing endeavors\
    \ and strive to create even better books for my readers. Your support is essential\
    \ to my growth as an author.\n\nOnce again, I extend my heartfelt thanks to you,\
    \ the reader, for your invaluable contribution. Together, we can make the world\
    \ of programming more accessible and engaging for everyone."
  mdcn: "## 5.3 在Web应用中的应用\n\nPython 也是一种非常流行的 Web 应用开发语言。借助 Python，你可以构建各种各样的 Web\
    \ 应用，从简单的博客站点到大规模的 Web 服务。\n\nPython 拥有许多用于 Web 应用开发的框架。其中，Django 和 Flask 是使用最广泛的两种。\n\
    \nDjango 是一个全栈框架，专注于快速开发和出色的安全性。Django 提供了 Web 应用开发所需的广泛功能，例如用于数据库操作的 ORM、自动管理界面和模板系统。它还因其丰富的扩展（中间件）和来自庞大社区的支持而具有吸引力。\n\
    \n另一方面，Flask 是一个微框架，强调简洁性和灵活性。Flask 提供了最小化的功能，允许开发者自由地配置他们的应用。Flask 适用于中小型项目，并且具有出色的可扩展性。\n\
    \n下面是一个使用 Flask 构建 Web 应用的简单示例：\n\n```python\nfrom flask import Flask, render_template\n\
    \napp = Flask(__name__)\n\n@app.route(\"/\")\ndef index():\n    return render_template(\"\
    index.html\")\n\n@app.route(\"/hello/<name>\")\ndef hello(name):\n    return f\"\
    Hello, {name}!\"\n\nif __name__ == \"__main__\":\n    app.run(debug=True)\n```\n\
    \n当访问根 URL (“/”) 时，此应用会渲染“index.html”模板；当访问 URL “/hello/[name]” 时，它会返回消息“Hello,\
    \ [name]!”。\n\nWeb 应用开发需要各种功能，例如数据库操作、身份验证、会话管理等。Python 也拥有丰富的库来提供这些功能。例如，SQLAlchemy\
    \ 提供了一个抽象数据库操作的 ORM。Flask-Login 和 Django 的内置认证系统则提供了用户身份验证功能。\n\n如果你对 Web 应用开发感兴趣，建议从学习\
    \ Django 或 Flask 开始。这两个框架都有优秀的文档和教程可供使用。\n\n本书仅提供了简要介绍，但我认为将其作为该语言的一个用例来记住是很重要的。\n\
    \n## 5.4 通过文件操作提升业务效率\n\nPython 非常适合自动化文件操作和数据处理。在日常业务任务中，存在许多重复性任务，例如处理 Excel\
    \ 文件和 PDF 文件。\n\n使用 Python 自动化这些任务可以显著提高业务效率。\n\n对于操作 Excel 文件，openpyxl 库是常用的选择。使用\
    \ openpyxl，你可以轻松地读取 Excel 文件、编辑数据以及创建新文件。\n\n下面是一个使用 openpyxl 读取 Excel 文件并处理数据的简单示例：\n\
    \n```python\nfrom openpyxl import load_workbook\n\n# 加载 Excel 文件\nwb = load_workbook('data.xlsx')\n\
    \n# 选择活动工作表\nsheet = wb.active\n\n# 读取单元格值并进行处理\nfor row in sheet.iter_rows(min_row=2,\
    \ values_only=True):\n    name, age, city = row\n    print(f\"Name: {name}, Age:\
    \ {age}, City: {city}\")\n```\n\n在此示例中，加载了 Excel 文件“data.xlsx”，并处理从第二行开始的数据。\n\
    \n对于操作 PDF 文件，PyPDF2 库非常有用。使用 PyPDF2，你可以读取 PDF 文件、提取页面以及合并多个 PDF 文件。\n\n下面是一个使用\
    \ PyPDF2 从 PDF 文件中提取特定页面的示例：\n\n```python\nfrom PyPDF2 import PdfFileWriter, PdfFileReader\n\
    \n# 加载 PDF 文件\nwith open('input.pdf', 'rb') as file:\n    reader = PdfFileReader(file)\n\
    \n# 创建一个新的 PDF\nwriter = PdfFileWriter()\n\n# 将特定页面添加到新 PDF\nwriter.addPage(reader.getPage(2))\n\
    \n# 保存新 PDF\nwith open('output.pdf', 'wb') as output:\n    writer.write(output)\n\
    ```\n\n在此示例中，从 PDF 文件“input.pdf”中提取了第三页，并保存为新的 PDF 文件“output.pdf”。\n\n还有许多其他任务可以使用\
    \ Python 实现自动化，例如处理 CSV 文件和 JSON 文件、批量处理目录中的文件等。自动化这些任务可以减少错误并节省时间。\n\n如果你日常业务中存在重复性任务，可以考虑是否能用\
    \ Python 将其自动化。编写自动化代码可能需要一些时间，但从长远来看，这将带来显著的时间节省。\n\n通过利用 Python 的文件操作和数据处理能力，你可以提高业务效率，并将更多时间投入到创造性工作中。\n\
    \n以上章节介绍了 Python 在机器学习、Web 开发和日常业务任务中的应用案例。Python 极高的灵活性是其能用于如此广泛目的的原因之一。根据每个用例来确定学习方向是很重要的。\n\
    \n## 总结\n\n感谢您将本书读到最后。我希望通过这本书，您已经理解了 Python 编程的基础知识，并获得了阅读和理解代码的能力。\n\n本书解释了基础的编程概念，例如\
    \ Python 的基本语法、变量、函数、类、对象、列表和字符串操作。这些知识对于广泛理解 Python 代码至关重要。\n\n然而，Python 的世界是广阔的，本书涵盖的内容只是其中的一部分。如第\
    \ 5 章所述，数据分析、机器学习、Web 应用开发和业务自动化等应用主题在实际开发项目中扮演着重要角色。\n\n此外，在现代 Python 开发中，库和框架的使用是不可或缺的。根据项目需求选择和学习合适的工具，能够实现更高效、更高质量的应用开发。\n\
    \n基于从本书中获得的知识，我希望您能根据自己的目标和项目继续学习。\n\nPython 开发的世界在不断演进，新技术和新概念持续涌现。保持持续学习的态度并紧跟最新信息，将是成为优秀\
    \ Python 开发者的路径。\n\n希望这本书对您学习 Python 编程有所帮助。\n\n非常感谢您从头到尾抽出时间阅读本书。作为作者，您的意见和反馈对我来说非常宝贵。如果您能抽出一点时间，我将非常感激您能在下一页留下评论和评分。\n\
    \n即使只是选择星级评分对我来说也意义重大，但如果您还能留下简短的评论，我将不胜感激。请随时分享您对本书的喜爱之处或认为可以改进的地方的真实想法。\n\n\
    评论表和星级评分可以在下一页找到。这只会占用您一两分钟的时间，而您的反馈将非常有帮助。\n\n我将利用您的意见来指导我未来的写作努力，并致力于为我的读者创作更好的书籍。您的支持对于我作为作者的成长至关重要。\n\
    \n我再次向您——读者，致以衷心的感谢，感谢您做出的宝贵贡献。我们一起可以让编程世界对每个人来说更易上手、更具吸引力。"
