    \ == \"__main__\"` 下的代码块将不会被执行。\n\n导入并执行时：\n\n```\nimport my_module\nmy_module.greet(\"\
    Bob\")\n```\n\n输出：\n\n```\nHello, Bob!\n```\n\n`__main__` 中对 `Alice` 的处理不会被执行。\n\
    \n使用模块可以提高代码的可重用性和程序结构。\n\nPython 拥有丰富的标准库，可以根据需要导入和使用。此外，创建自己的模块使代码管理更容易。\n\n\
    `import` 语句用于导入模块。你可以导入整个模块或特定的函数。\n你也可以使用别名导入以提高代码的可读性。\n\n`__name__` 变量可用于确定模块是被直接执行还是被导入。\n\
    此功能可用于适当控制模块的行为。\n\n在 Python 中，建议积极使用模块。\n\n通过有效利用标准库并合理设计自定义模块，你可以编写高效且可维护的代码。\n\
    \n# 2.4 文件读写\n\n文件读写是数据持久化和程序间数据交换的基本功能。在 Python 中，可以轻松执行文件读写。\n\n# 打开和关闭文件\n\n\
    要读取或写入文件，你首先需要打开文件。使用 `open()` 函数打开文件。\n\n```\nfile = open(\"file.txt\", \"r\"\
    )\n```\n\n`open()` 函数的第一个参数是文件路径，第二个参数指定打开文件的模式。模式包括以下几种：\n\n- \"r\"：读取模式（默认）\n\
    - \"w\"：写入模式（如果文件存在则覆盖）\n- \"a\"：追加模式（追加到文件末尾）\n- \"x\"：独占写入模式（如果文件存在则引发错误）\n\n\
    使用完文件后，调用 `close()` 方法关闭文件。\n\n```\nfile.close()\n```\n\n# 读取文件\n\n要从文件读取内容，请使用\
    \ `read()`、`readline()` 或 `readlines()` 方法。\n\n```\n# 读取整个文件\nwith open(\"file.txt\"\
    , \"r\") as file:\n    content = file.read()\n    print(content)\n\n# 逐行读取\nwith\
    \ open(\"file.txt\", \"r\") as file:\n    line = file.readline()\n    while line:\n\
    \        print(line.strip())\n        line = file.readline()\n\n# 将所有行读取为列表\n\
    with open(\"file.txt\", \"r\") as file:\n    lines = file.readlines()\n    print(lines)\n\
    ```\n\n使用 `with` 语句，你可以自动关闭文件。\n\n# 写入文件\n\n要将内容写入文件，请使用 `write()` 方法。\n\n```\n\
    with open(\"file.txt\", \"w\") as file:\n    file.write(\"Hello, World!\\n\")\n\
    \    file.write(\"This is a sample file.\\n\")\n```\n\n`write()` 方法将指定的字符串写入文件。要添加新行，你需要显式指定\
    \ `\"\\n\"`。\n\n# 读写 CSV 文件\n\nCSV（逗号分隔值）是一种用于存储表格数据的文件格式。Python 提供了 `csv` 模块用于读写\
    \ CSV 文件。\n\n```\nimport csv\n\n# 读取 CSV 文件\nwith open(\"data.csv\", \"r\") as\
