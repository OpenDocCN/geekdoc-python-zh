    **classification** (grouping similar instances) and **regression** (learning *what
    normally happens* to draw inferences from datasets). For example, learning to
    classify emails as spam and not spam-based on training data of spam and not spam
    email messages.

    - **Unsupervised learning**: This involves unlabeled data and can be used to discover
    patterns in the dataset. For example, learning the patterns in the *English* language
    from the *Wikipedia* pages.'
  - '[PAGE 182]


    +   - **Reinforcement learning:** This involves learning from experimentation
    based on rewards and feedback loop and can be used to train agents in simulated
    environments. For example, teaching a bot to play a computer game, and maximize
    the score, and chances of winning will use a **Reinforcement Learning (RL)** algorithm.


    Machine learning allows you to learn from data and create automations without
    explicitly programming the automations. It can also help you identify repeatable
    processes performed in the organizations.


    Python has a lot of libraries and scripts to perform ML on datasets with libraries
    such `PyTorch`, `TensorFlow`, `Keras`, `scikit-learn`, and so on. Training ML
    models requires a lot of data and computational power. For our automation requirements,
    generally a pre-trained ML model would work most of the time.


    We will look at the `PyTorch` library to perform text summarization with a pre-built
    model. **Hugging Face** ([https://huggingface.co/](https://huggingface.co/)) provides
    pre-trained ML models for a variety of tasks audio classification, image classification,
    object detection, question answering, summarization, text classification, translation,
    and so on.


    To install the **Hugging Face** with the `PyTorch` library, use the `nu` package
    manager, type `transformers[ torch]`, and click on **OK** as shown in the following
    figure. The installation process will take a bit of time as it will install various
    dependencies and other ML libraries:'
  - '[PAGE 183]


    ![](img/6fc100463e273be6e8f92a077babc451_183_0.png)


    **Figure 11.15:** *Mu package manager*


    Once the library is installed, you can use the transformers library to perform
    summarization by using the summarization pipeline object with the syntax as `pipeline("summarization")`.
    On the first run, the pipeline will download the default model to perform text
    summarization, and it will take a bit of time to complete the downloaded process.
    Once the model is downloaded, you can call the model on any text data, call the
    model on the text data, and you will get the summarized text as shown in [Figure
    11.16](#figure-11-16):'
  - '[PAGE 184]


    ```

    python

    from transformers import pipeline

    classifier = pipeline("summarization")

    sample_text = "The tower is 324 metres (1,063 ft) tall, about the same height
    as an 81-storey buildin"

    print(classifier(sample_text))


    ```


    Figure 11.16: Mu package manager


    You can also perform sentiment analysis on a piece of text using a pre-trained
    model. This is particularly useful when you want to analyze sentiments of customer
    reviews and feedback. To use the pre-trained model to perform *sentiment-analysis*,
    use **pipeline(“sentiment-analysis”)** as shown in *Figure 11.17*. You can also
    use a particular trained model by specifying a model argument to the **pipeline**
    function:'
  - '[PAGE 185]


    ![](img/6fc100463e273be6e8f92a077babc451_185_0.png)


    Figure 11.17: Mu package manager


    There are a lot of other trained machine learning models available in Python that
    can be used for your day-to-day automation requirements. These ML models can help
    you build automations for converting images to text, automating message replies,
    language translations, and a variety of other tasks.


    # Conclusion


    In this chapter, we learned about the Flask fundamentals and the machine learning
    libraries in the Python language. We looked at simple ways to use pre-trained
    ML models with few lines of code in Python with the transformers library. We also
    looked at some of the ways to build end to end process automations by combining
    different automations throughout this book and online resources to help you find
    solutions to technical challenges.


    # Further reading


    There are a lot of online resources to help you improve your learning on building
    complex automation machine learning. The following [Table 11.1](Table 11.1)'
