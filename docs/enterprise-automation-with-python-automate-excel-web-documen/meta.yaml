- img_proc: true
  md: 'PyAutoGUI provides features stated as follows:


    +   - Controlling the mouse movement and clicking on the window (user-interface)
    of the required application.

    - Sending keyboard letters to applications (for example, to fill out data).

    - Take screenshots and search for buttons and other controls using the image.

    - Display message boxes.

    - Locate an applications window and resize the application (works only on Windows
    operating system).


    Sometimes, you might want to stop the automation running with PyAutoGUI due to
    an error in your code. The PyAutoGUI has a safety feature called **FailSafe**
    that is enabled by default. If you move your mouse in any of the four corners
    of your monitor, and if the PyAutoGUI function is running, it will raise a `pyautogui.FailSafeException`.
    There is also a 0.1 second delay after calling every PyAutoGUI function so that
    you have the time to slam the mouse in the corner to trigger the fail safe exception.


    To install `pyautogui`, use the `mu` package manager, type `pyautogui`, and click
    on `ok` as shown in the following figure:'
