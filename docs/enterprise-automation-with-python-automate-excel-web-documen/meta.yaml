    \    return \"New notepad application created\"\n\nif __name__ == '__main__':\n\
    \    app.run(host='127.0.0.1', port=8080, debug=True)\n```\n\nFigure 11.10: Creating\
    \ a web API to open new Notepad application\n\nWhen you call this web service\
