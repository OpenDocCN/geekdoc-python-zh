    systems and offers three main scheduling functionalities which are as follows:


    +   - **Cron job like syntax**: Cron jobs uses Linux like cron command-line utility
    syntax.

    - **Interval-based syntax**: This allows jobs to run on specified intervals with
    an optional start and end time.

    - **One-off delayed execution**: This allows you execute jobs once based on your
    set date and time.


    To install the `APScheduler` library, use the `mu` package manager, type `APScheduler`,
    and click on `OK` as shown in the following figure:


