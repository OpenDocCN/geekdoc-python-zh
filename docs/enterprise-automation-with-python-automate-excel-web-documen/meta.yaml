    # ## Convert a PDF to a Word document


    We can easily convert a PDF document to a Word document using the **Pdfminer**
    and **python-docx** libraries. If the PDF document text contains invalid characters,
    we can remove those characters to support the Word document encoding format by
    a custom function. As shown in *[Figure 6.14]*, we will first read the PDF document
    using the **extract_text()** function and then add the extracted string to the
    Word document using the **add_paragraph()** function:'
  merge: -1
  pgno: 104
- img_proc: true
  md: "```\nimport pdfminer\nimport pdfminer.layout\nimport pdfminer.high_level\n\
    from docx import Document\nfrom docx.shared import Inches\n\ntext = pdfminer.high_level.extract_text('small_pdf.pdf')\n\
    \ndef valid_xml_char_ordinal(c):\n    codepoint = ord(c)\n    # conditions ordered\
    \ by presumed frequency\n    return (\n        0x20 <= codepoint <= 0xD7FF or\n\
    \        codepoint in (0x9, 0xA, 0xD) or\n        0xE000 <= codepoint <= 0xFFFD\
    \ or\n        0x10000 <= codepoint <= 0x10FFFF\n    )\n\ncleaned_string = ''.join(c\
    \ for c in text if valid_xml_char_ordinal(c))\n\ndocument = Document()\np = document.add_paragraph(cleaned_string)\n\
    document.add_page_break()\ndocument.save(\"pdf_doc.docx\")\n```\n\nFigure 6.14:\
    \ PDF to Word document\n\n**Figure 6.15** shows the converted PDF document to\
    \ the Word document by executing the PDF to Word conversion script:"
