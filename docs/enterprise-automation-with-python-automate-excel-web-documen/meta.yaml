  md: '# CHAPTER 2


    # Fundamentals of Python


    # Introduction


    In this chapter, we will introduce you to the Python programming language. We
    will cover fundamentals of Python, including decision statements, functions, and
    data structures. We will also look at how to import and use external libraries
    to achieve the desired goals.


    # Structure


    In this chapter, we will cover the following topics:


    +   - Introduction to Python

    - Decision statements

    - Data structures

    - Loops/repetition

    - Functions

    - Libraries, modules, or packages


    # Objectives


    After studying this chapter, you will be able to code basic programs in the Python
    programming language. You will gain knowledge of programming to get up and running
    with building Python programs. You will also have an understanding of the Python
    scripting language, syntax and data structures.


    # Introduction to Python


    Python is a general-purpose programming language which has been built on top of
    C programming language. Python is also an interpreted language and can be used
    interactively (similar to using it as an *advanced calculator*)'
  merge: -1
  pgno: 24
- img_proc: true
  md: 'executing one command at a time). The **Scripting** mode in Python allows you
    to execute a series of commands in a saved text file, usually with a `.py` extension
    after the name of your file.


    You can do just about anything with Python and it is one of the easiest languages
    to learn for beginners. Python is widely used all over the world to build automations,
    machine learning models, data analysis, and web development. It can help you build
    automations for day-to-day work tasks, create web applications, perform data analysis,
