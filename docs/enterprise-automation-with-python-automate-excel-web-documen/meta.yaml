    ## 简介

    本章我们将探讨如何使用**日期**和**计时器**来调度自动化任务。同时，我们也会介绍一些外部应用程序，它们允许我们基于特定事件（如收到新电子邮件或应用程序启动时）来运行自动化任务。


    ## 结构

    本章将涵盖以下主题：

    - 调度自动化

    - 编写计时器程序

    - 从Python启动程序

    - 使用外部工具作为触发器


    ## 目标

    学习完本章后，你将能够在一天的特定时间调度自动化任务。你还将能够创建基于触发器的工作流，并使用外部工具来帮助你运行带有触发器的自动化任务，以及与Web应用程序进行交互。


