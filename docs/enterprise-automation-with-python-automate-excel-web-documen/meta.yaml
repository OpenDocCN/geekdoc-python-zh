    ![](img/6fc100463e273be6e8f92a077babc451_158_0.png)

    **图 10.5：一次性计划**


    点击 **下一步 >** 后，你需要指定是 **启动程序**、**发送电子邮件** 还是 **显示消息**，如图10.6所示：

