    # Introduction to HTML, CSS, and JavaScript


    In this section, we will go through the building blocks and components of a web
    page. When we visit a web page, our web browser makes a `GET` request to a web
    server. The server then sends back files that tell our browser how to render the
    page for us. These files typically include:


    +   - **HTML**: The main content of the page to be displayed in the browser.

    - **CSS**: This is used to add styling to make the web page look nicer.'
  merge: -1
  pgno: 70
- img_proc: true
  md: '+   - JavaScript: JavaScript files add interactivity and additional functionality
    to web pages.

    - Images: Image files such as JPG and PNG allow web pages to show pictures.

    - Other files formats: These can be videos, documents, audio files, or any other
    file types.


    After our browser receives all the files, it renders the page and displays it.


    # HTML


    When we perform web scraping, we are mainly interested in the main content of
    the web page which is an HTML document. HTML stands for hypertext markup language
    and is the language used for building websites. HTML code is based on tags that
    provide instructions for formatting and displaying the document. A tag starts
    with the less than sign: < and ends with the greater than sign >.


    For example, to make the word Hello bold, you can use the opening bold tag <b>
    and then the closing bold tag </b>, like this:


    ```

    `<b>Hello</b>`

    ```


    HTML documents can be created using the <html> and </html> tags. There is a head
    tag which contains data about the title of the page and other top-level information,
    and a body tag which contains the main content of the page. For web scraping,
    we will mostly be interested in content within the body tag of the HTML page.


    The commonly used HTML tags are:


    +   - `<!-- ... -->`: Defines a comment.

    - `<!DOCTYPE>`: Defines the document type.

    - `<a>`: Defines a hyperlink.

    - `<audio>`: Defines embedded sound content.

    - `<b>`: Defines bold text.

    - `<body>`: Defines the document''s body.

    - `<br>`: Defines a single line break.

    - `<button>`: Defines a button.

    - `<caption>`: Defines a table caption.'
  merge: -1
