    # Abstract


    We provide a new interpretation of Hessian locally linear embedding (HLLE), revealing
    that it is essentially a variant way to implement the same idea of locally linear
    embedding (LLE). Based on the new interpretation, a substantial simplification
    can be made, in which the idea of "Hessian" is replaced by rather arbitrary weights.
