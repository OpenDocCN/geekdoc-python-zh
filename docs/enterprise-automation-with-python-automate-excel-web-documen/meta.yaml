    +   - Introduction to the PyAutoGUI module

    - Controlling mouse actions

    - Controlling keyboard actions

    - Automation using screenshots


    # ## Objectives


    After studying this chapter, you will be able to automate all kinds of applications
    you use on your work computer. We will go through the examples on a Windows machine
    but the automations would work even if you have a Mac or Linux computer.


    # ## Introduction to the PyAutoGUI module


    We will use the PyAutoGUI module that allows your Python scripts to control the
    mouse and keyboard to automate computer applications. PyAutoGUI also works across
    operating systems such as Windows, macOS, and Linux.'
