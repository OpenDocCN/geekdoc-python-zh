    # Automation Mindset – Python as a Tool for Automation


    # Introduction


    In this chapter, we will discuss the mindset needed to be successful in implementation
    of automation within your organizations. We will go through the process of identifying
    and prioritizing automation opportunities. We will also discuss the ways to share
    the developed automations with the wider organization once they are created.


    # Structure


    In this chapter, we will cover the following topics:


    +   - Mindset for automation

    - Common processes for automation

    - Identifying business processes


    # Objectives


    After studying this chapter, you will be able to identify the automation opportunities
    in your organization. You will also have the right mindset to decide when to implement
    the automation and when to look for other solutions for optimizing your workflow.


    # Mindset for automation


    Automation mindset involves a way of working where we look for continuous improvement
    of existing processes and finding opportunities for automation. It is a way of
    reimagining the whole process of doing a task, or an entire workflow, and finding
    opportunities to make it more efficient. You'
  merge: -1
  pgno: 44
