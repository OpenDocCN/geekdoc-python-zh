    \ |\n| How to create an automated task using Task Scheduler on Windows 10 | https://www.windowscentral.com/how-create-automated-task-using-task-scheduler-windows-10\
    \ |\n| Subprocess management | https://docs.python.org/3/library/subprocess.html\
    \ |\n| Subprocess module | https://www.bogotobogo.com/python/python_subprocess_module.php\
    \ |\n| n8n - Automate without limits | https://n8n.io/ |\n| n8n - Workflow automation\
    \ tool | https://github.com/n8n-io/n8n |\n| Twisted library | https://www.twistedmatrix.com/trac/\
    \ |\n\nTable 10.1: Resources on timer and event-based automation in Python\n\n\
    ## Questions\n\n1. How can you schedule to run an automation at **9:00 am** every\
    \ day?\n2. What is the library used to write timer programs in Python?\n3. What\
    \ is **n8n**?\n4. How can you create automations based on triggers?\n\n# CHAPTER\
    \ 11\nWriting Complex Automations\n\n## Introduction\n\nIn this chapter, we will\
    \ look at methods to extend your Python scripting knowledge and develop complex\
    \ end to end process automations based on your requirements. We will learn how\
    \ to work with external libraries and use external code to build these automations.\
    \ We will also look at creating Python web services and using machine learning\
    \ for automation.\n\n## Structure\n\nIn this chapter, we will cover the following\
    \ topics:\n\n- Creating APIs with Python\n- Combining multiple automation scripts\n\
    - Finding solutions online\n- Using machine learning for automation\n\n## Objectives\n\
    \nAfter studying this chapter, you will be able to build a web server in Python\
    \ using the Flask APIs and build complex automations integrating multiple automation\
    \ libraries. You will also learn about machine learning techniques that can be\
    \ used to build automation programs.\n\n## Creating APIs with Python\n\nYou can\
    \ create the **Application Programming Interface** (API) using the **Flask** library\
    \ in Python. APIs allow you to connect different applications and are particularly\
    \ useful when automating applications based on triggers. For example, you can\
    \ create an API to check for incoming emails and run the required automation.\
    \ In this section, we will mainly look at **Representational State Transfer (REST)**\
    \ APIs that are flexible, lightweight, and the most common way to connect components\
    \ and applications.\n\nThe REST APIs use four common HTTP methods, **GET** (provides\
    \ read only access to resources), **POST** (used for creating new resources),\
    \ **DELETE** (used for removing a resource), and **PUT** (used for updating an\
    \ existing resource).\n\nWe will use the **Flask** Python library to create REST\
    \ APIs based server in Python. **Flask** is a micro web framework for Python and\
    \ can be used to create web applications from scratch. You can build web pages,\
    \ applications like Wikipedia, commercial websites, or even a search engine like\
    \ *Google* using the **Flask** library. **Flask** also supports template engines\
    \ to build dynamic websites.\n\nTo install the **Flask** library, use the **Mu**\
    \ package manager, type **Flask**, and click on **OK** as shown in the following\
    \ figure:\n\n![Mu package manager](img/6fc100463e273be6e8f92a077babc451_169_0.png)\n\
    *Figure 11.1: Mu package manager*\n\nTo create a simple Flask application, you\
    \ will need to import the **Flask** class whose instance will allow us to create\
    \ a **Web Server Gateway Interface (WSGI)** application.\n\nTo create an instance\
    \ of the **Flask** class (instance is a specific realization of a class), pass\
    \ the name of the application's module, or use `__name__` as a convenient shortcut.\
    \ This is required to let the **Flask** know the location to look for resources\
    \ such as templates and static files.\n\nWe then use the `route()` decorator to\
    \ specify the URL path to trigger the function. A **decorator** in Python is a\
    \ function that extends the behavior of another function without explicitly modifying\
    \ it. We use the `@my_decorator` syntax to easily call the decorator function.\n\
    \nAfter using the `route()` decorator, we can call any function and return the\
    \ data we want to show in the document. The default content type is HTML so when\
    \ you pass an HTML string, the HTML data would be rendered by the browser.\n\n\
    To run a **Flask** application locally, you call the `app.run` function inside\
    \ the `main` method and pass in the arguments as:\n\n- `host`: The IP address\
    \ of the Python webserver; by default we use local host which is at IP `127.0.0.1`.\n\
    - `port`: The port to host the Python webserver; by default, we use `8080`.\n\
    - `debug`: Set `True` if you want to enable the debug mode, `False` otherwise.\n\
    \n[Figure 11.2] contains an example of creating a simple flask application that\
    \ can return the `Automation Bot!` string at the default route of `/`:\n\n```python\n\
    from flask import Flask\n\napp = Flask(__name__)\n\n@app.route(\"/\")\ndef automation_bot():\n\
    \    return \"<p>Automation Bot!</p>\"\n\nif __name__ == '__main__':\n    app.run(host='127.0.0.1',\
    \ port=8080, debug=True)\n\n\n\n* Environment: production\n   WARNING: This is\
    \ a development server. Do not use it in a production deployment.\n   Use a production\
    \ WSGI server instead.\n* Debug mode: on\n* Restarting with stat\n* Debugger is\
    \ active!\n* Debugger PIN: 320-645-280\n* Running on http://127.0.0.1:8080/ (Press\
    \ CTRL+C to quit)\n```\n\n## Figure 11.2: Simple flask application\n\nOnce the\
    \ webserver is running, you can go to the specified host and port number; in this\
    \ case, 127.0.0.1: 8080 in your browser, and you will see **Automation Bot!**\
    \ being printed out as shown in [Figure 11.3]:\n\n![Simple flask application running](img/6fc100463e273be6e8f92a077babc451_171_0.png)"
  mdcn: "在下一节中，我们将探讨一些可以帮助你运行基于触发器的自动化的外部工具。外部工具的优势在于它们更易于使用，提供预配置的工作流，并且你无需自己编写触发器代码。\n\
    \n## 使用外部工具作为触发器\n\n基于触发器自动化工作流最流行的方式之一是使用外部工作流自动化工具，例如**n8n** (https://n8n.io/)。它是开源的，其源代码可供修改以进行自定义\
    \ (https://github.com/n8n-io/n8n)。**n8n** 工具拥有桌面应用程序，并提供了大量工作流模板，你可以根据需求选择所需的工作流来运行。其主屏幕如*图\
    \ 10.11*所示：\n\n![n8n 主屏幕](img/6fc100463e273be6e8f92a077babc451_165_0.png)\n*图\
    \ 10.11：n8n 主屏幕*\n\n例如，使用**n8n**可以实现的一种工作流自动化是针对**Gmail**——获取带有特定标签的邮件，移除该标签，并添加一个新标签，如*图\
    \ 10.12*所示。有关如何配置工作流的更多文档可在**n8n**网站和桌面应用程序中找到：\n\nPython 还有一个**Twisted**库 (https://pypi.org/project/Twisted/)，可用于异步编程和基于事件的互联网应用框架，以创建网络自动化触发器。\n\
    \n## 结论\n\n在本章中，我们学习了定时器程序、Python 的**APScheduler**库以及 Windows 任务计划程序。我们还探讨了用于启动新程序的\
    \ Python subprocess 库，以及用于创建基于触发器的网络自动化的**n8n**自动化工具。在下一章中，我们将学习如何基于本书所学内容编写更复杂的自动化。我们还将探讨使用\
    \ Flask API 创建 Python Web 服务，这将允许你创建可部署到服务器的网络自动化端点，并且这些 API 可以在多个应用程序之间共享。\n\n\
    ## 延伸阅读\n\n有许多在线资源可以帮助你进一步了解如何创建基于时间和事件的自动化。下表 10.1 列出了一些最佳资源，以进一步提升你在时间和事件自动化方面的学习。\n\
    \n关于 Python 图像自动化的资源：\n\n| 资源名称 | 链接 |\n| :--- | :--- |\n| Advanced Python Scheduler\
    \ | https://apscheduler.readthedocs.io/en/3.x/ |\n| Introduction to APScheduler\
    \ | https://betterprogramming.pub/introduction-to-apscheduler-86337f3bb4a6 |\n\
    | How to create an automated task using Task Scheduler on Windows 10 | https://www.windowscentral.com/how-create-automated-task-using-task-scheduler-windows-10\
    \ |\n| Subprocess management | https://docs.python.org/3/library/subprocess.html\
    \ |\n| Subprocess module | https://www.bogotobogo.com/python/python_subprocess_module.php\
    \ |\n| n8n - Automate without limits | https://n8n.io/ |\n| n8n - Workflow automation\
    \ tool | https://github.com/n8n-io/n8n |\n| Twisted library | https://www.twistedmatrix.com/trac/\
    \ |\n\n表 10.1：关于 Python 定时器和事件自动化的资源\n\n## 问题\n\n1.  如何安排每天**上午 9:00**运行一次自动化？\n\
    2.  在 Python 中编写定时器程序使用的是哪个库？\n3.  **n8n**是什么？\n4.  如何创建基于触发器的自动化？\n\n# 第 11 章\n\
    编写复杂自动化\n\n## 简介\n\n在本章中，我们将探讨扩展你的 Python 脚本知识的方法，并根据你的需求开发复杂的端到端流程自动化。我们将学习如何使用外部库和外部代码来构建这些自动化。我们还将探讨创建\
    \ Python Web 服务以及使用机器学习进行自动化。\n\n## 结构\n\n在本章中，我们将涵盖以下主题：\n\n-   使用 Python 创建\
    \ API\n-   组合多个自动化脚本\n-   在线查找解决方案\n-   使用机器学习进行自动化\n\n## 目标\n\n学习本章后，你将能够使用 Flask\
    \ API 在 Python 中构建 Web 服务器，并构建集成多个自动化库的复杂自动化。你还将了解可用于构建自动化程序的机器学习技术。\n\n## 使用\
    \ Python 创建 API\n\n你可以使用 Python 中的**Flask**库创建**应用程序编程接口** (API)。API 允许你连接不同的应用程序，在基于触发器自动化应用程序时特别有用。例如，你可以创建一个\
    \ API 来检查传入的电子邮件并运行所需的自动化。在本节中，我们将主要探讨**表述性状态转移 (REST)** API，它灵活、轻量，并且是连接组件和应用程序最常用的方式。\n\
    \nREST API 使用四种常见的 HTTP 方法：**GET**（提供对资源的只读访问）、**POST**（用于创建新资源）、**DELETE**（用于删除资源）和**PUT**（用于更新现有资源）。\n\
    \n我们将使用 **Flask** Python 库在 Python 中创建基于 REST API 的服务器。**Flask** 是一个 Python 的微\
    \ Web 框架，可用于从头开始创建 Web 应用程序。你可以使用 **Flask** 库构建网页、像维基百科这样的应用程序、商业网站，甚至像 *Google*\
    \ 这样的搜索引擎。**Flask** 还支持模板引擎来构建动态网站。\n\n要安装 **Flask** 库，请使用 **Mu** 包管理器，输入 **Flask**，然后点击\
    \ **OK**，如下图所示：\n\n![Mu 包管理器](img/6fc100463e273be6e8f92a077babc451_169_0.png)\n\
    *图 11.1：Mu 包管理器*\n\n要创建一个简单的 Flask 应用程序，你需要导入 **Flask** 类，其实例将允许我们创建一个 **Web 服务器网关接口\
    \ (WSGI)** 应用程序。\n\n要创建 **Flask** 类的实例（实例是类的具体实现），请传递应用程序模块的名称，或使用 `__name__`\
    \ 作为便捷的快捷方式。这是为了让 **Flask** 知道在哪里查找模板和静态文件等资源。\n\n然后我们使用 `route()` 装饰器来指定触发函数的\
    \ URL 路径。Python 中的**装饰器**是一个函数，它在不显式修改另一个函数的情况下扩展其行为。我们使用 `@my_decorator` 语法来轻松调用装饰器函数。\n\
    \n使用 `route()` 装饰器后，我们可以调用任何函数并返回我们希望在文档中显示的数据。默认内容类型是 HTML，因此当你传递一个 HTML 字符串时，HTML\
    \ 数据将由浏览器渲染。\n\n要在本地运行 **Flask** 应用程序，你需要在 `main` 方法内调用 `app.run` 函数，并传入以下参数：\n\
    \n-   `host`：Python Web 服务器的 IP 地址；默认使用本地主机，IP 为 `127.0.0.1`。\n-   `port`：托管 Python\
    \ Web 服务器的端口；默认使用 `8080`。\n-   `debug`：如果要启用调试模式，设置为 `True`，否则设置为 `False`。\n\n\
    [图 11.2] 包含一个创建简单 Flask 应用程序的示例，该程序可以在默认路由 `/` 返回 `Automation Bot!` 字符串：\n\n```python\n\
    from flask import Flask\n\napp = Flask(__name__)\n\n@app.route(\"/\")\ndef automation_bot():\n\
    \    return \"<p>Automation Bot!</p>\"\n\nif __name__ == '__main__':\n    app.run(host='127.0.0.1',\
    \ port=8080, debug=True)\n\n\n\n* Environment: production\n   WARNING: This is\
    \ a development server. Do not use it in a production deployment.\n   Use a production\
    \ WSGI server instead.\n* Debug mode: on\n* Restarting with stat\n* Debugger is\
    \ active!\n* Debugger PIN: 320-645-280\n* Running on http://127.0.0.1:8080/ (Press\
    \ CTRL+C to quit)\n```\n\n## 图 11.2：简单的 Flask 应用程序\n\nWeb 服务器运行后，你可以在浏览器中访问指定的主机和端口号；在本例中为\
    \ 127.0.0.1: 8080，你将看到 **Automation Bot!** 被打印出来，如[图 11.3]所示：\n\n![运行中的简单 Flask\
    \ 应用程序](img/6fc100463e273be6e8f92a077babc451_171_0.png)"
