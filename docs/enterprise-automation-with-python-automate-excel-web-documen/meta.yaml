  md: '# A new locally linear embedding scheme in light of Hessian eigenmap


    Liren Lin* and Chih-Wei Chen†


    Department of Applied Mathematics, National Sun Yat-sen University, Taiwan


    # Abstract


    We provide a new interpretation of Hessian locally linear embedding (HLLE), revealing
    that it is essentially a variant way to implement the same idea of locally linear
    embedding (LLE). Based on the new interpretation, a substantial simplification
    can be made, in which the idea of "Hessian" is replaced by rather arbitrary weights.
    Moreover, we show by numerical examples that HLLE may produce projection-like
    results when the dimension of the target space is larger than that of the data
    manifold, and hence one further modification concerning the manifold dimension
    is suggested. Combining all the observations, we finally achieve a new LLE-type
    method, which is called tangential LLE (TLLE). It is simpler and more robust than
    HLLE.


    # 1 Introduction


    Let $\mathcal{X} = \{x_i\}_{i=1}^N$ be a collection of data points in some $\mathbb{R}^D$.
    The goal of nonlinear dimensionality reduction (or manifold learning) is to find
    for $\mathcal{X}$ a representation $\mathcal{Y} = \{y_i\}_{i=1}^N$


