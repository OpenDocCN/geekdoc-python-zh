    \   a. **Filling up forms**: Any task that requires repetitive filling up of forms\
    \ for single or multiple data sources.\n   b. **Sending similar emails**: Tasks\
    \ where you have to send bulk emails or similar emails to a lot of people.\n \
    \  c. **Copying data between two systems**: Any task requiring duplication of\
    \ data between multiple systems.\n   d. **Maintaining the ERP and CRM systems**:\
    \ Tasks involving data entry to ERP and CRM systems.\n   e. **Updating legacy\
    \ systems**: Tasks involving working with legacy systems and updating data into\
    \ these systems.\n   f. **Entering data to in-house systems**: Any task where\
    \ you have to work and maintain the in-house proprietary systems.\n\n+   2. **Data\
    \ extraction**: Data extraction processes involve work where you have to extract\
    \ data from different file formats to be consumed by other teams or applications.\
    \ These tasks can be easily automated saving a lot of time with day-to-day work\
