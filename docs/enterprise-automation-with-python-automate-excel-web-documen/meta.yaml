  md: '# CHAPTER 6


    # Automating File-Based Tasks


    # Introduction


    In this chapter, we will look at various file-based automations for different
    file types in Python. We will discuss some of the Python libraries that are used
    to automate different file types. We will also look at ways to extract data from
    PDF documents and Word documents type file structure.


    # Structure


    In this chapter, we will cover the following topics:


    +   - Reading and writing files

    - PDF documents automation

    - Word documents automation

    - Convert a PDF to a Word document


    # Objectives


    After studying this chapter, you will be able to extract the text from PDF documents
    and generate new PDF documents. You will also be able to read and create new Word
    documents. You will further have the skills and understanding of Python libraries
    for working with a variety of file types.


    # Reading and writing files


    A computer file is a contiguous set of bytes that is used to store data. The data
    is organized into the required format and can be anything from a simple text file
    to a computer application. These byte files are translated into 1 and 0 to be
    used by the computer.


    Most of the file types contain three main parts:'
  merge: -1
  pgno: 91
- img_proc: true
  md: '+   - **Header:** Metadata containing information about the file such as file
    type, size, file name, and so on.

    - **Data:** Contents of the file in bytes.

    - **End of file (EOF):** A special character indicating the end of the file.


    Python has many libraries that will help you work with different types of files.
    Some of the popular Python libraries for different file types are as follows:


    +   - **wave:** Read and write WAV audio files ([https://docs.python.org/3/library/wave.html](https://docs.python.org/3/library/wave.html)).

    - **zipfile:** Work with ZIP archives ([https://docs.python.org/3/library/zipfile.html](https://docs.python.org/3/library/zipfile.html)).

    - **configparser:** Create and read configuration files ([https://docs.python.org/3/library/configparser.html](https://docs.python.org/3/library/configparser.html)).

    - **xml.etree.ElementTree:** Create and read XML-based files ([https://docs.python.org/3/library/xml.etree.elementtree.html](https://docs.python.org/3/library/xml.etree.elementtree.html)).

    - **PyPDF2:** PDF toolkit for reading and writing PDF documents ([https://pypi.org/project/PyPDF2/](https://pypi.org/project/PyPDF2/)).

    - **openpyxl:** Read and write Excel files ([https://openpyxl.readthedocs.io/en/stable/](https://openpyxl.readthedocs.io/en/stable/)).

    - **Pillow:** Reading and manipulating image-based files ([https://pillow.readthedocs.io/en/stable/](https://pillow.readthedocs.io/en/stable/)).


    We will use many of these libraries in this book to build work automations. For
    working with text files in Python, it has an inbuilt `open()` function which is
    the key function for working with files. The `open()` function takes two parameters
    as arguments which are file location and mode. There are four different modes
    for opening a file using the `open` function:


    +   - **r: Read** - Opens a file for reading.

    - **a: Append** - Opens a file for adding more data and creates a new file if
    it does not exist.

    - **w: Write** - Opens a file for writing and creates a new file if it does not
    exist.

    - **x: Create** - Creates a new file.'
  merge: -1
  pgno: 92
