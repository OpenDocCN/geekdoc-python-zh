  md: "need to be comfortable for change and look for tools and solutions to help\
    \ the process run more efficiently.\n\nIn the next section, we will discuss some\
    \ of the common processes and tasks that can be easily automated with Python.\n\
    \n# Common processes for automation\n\nThe best starting process for automation\
    \ are the ones which are highly repetitive in nature and take a substantial amount\
    \ of time of your overall workload.\n\nThe most common automations opportunities\
