    The **Pillow** library has an **ImageEnhance** module that has a number of classes
    that can be used for image enhancement. The main image enhancement classes are
    as follows:


    +   * **ImageEnhance.Color**: This class adjusts the color balance of the image.
    You can pass a color enhance factor to the **enhance** function of this class
    where a factor of 1.0 is the *original* image color and a factor of 0.0 is the
    *black and white* image.

    * **ImageEnhance.Contrast**: This class adjusts the contrast of the image. You
    can pass a contrast enhance factor to the **enhance** function of this class where
    a factor of 1.0 is the *original* image color and a factor of 0.0 is a *solid
    gray* image.

    * **ImageEnhance.Brightness**: This class adjusts the brightness of the image.
    You can pass a brightness enhance factor to the **enhance** function of this class
    where a factor of 1.0 is the *original* image color and a factor of 0.0 is a *black*
    image.

    * **ImageEnhance.Sharpness**: This class adjusts the sharpness of the image. You
    can pass a sharpness enhance factor to the **enhance**'
