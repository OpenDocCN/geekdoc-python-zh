    ## CHAPTER 10

    Creating Time and Event-Based Automations


    ## Introduction


    In this chapter, we will look at scheduling automations using **dates** and **timers**.
    We will also look at external applications that can allow us to run automations
    based on certain events such as receiving a new email or during the start of an
    application.


    ## Structure


    In this chapter, we will cover the following topics:


    - Scheduling automation

    - Writing timer programs

    - Launching programs from Python

    - Using external tools for triggers


    ## Objectives


    After studying this chapter, you will be able to schedule automations at a particular
    time of the day. You will also be able to create workflows based on triggers and
    use external tools to help you to run automations with triggers and interact with
    web applications.


    ## Scheduling automation


    You can schedule automation in Python to run during certain times of the day or
    run them based on certain events. **Advanced Python Scheduler (APScheduler)**
    is a Python library that allows you to schedule your automations in Python. You
    can add or remove jobs on the fly, and you can even store these jobs on the database.
    **APScheduler** works across operating systems and offers three main scheduling
    functionalities which are as follows:


    - **Cron job like syntax**: Cron jobs uses Linux like cron command-line utility
    syntax.

    - **Interval-based syntax**: This allows jobs to run on specified intervals with
    an optional start and end time.

    - **One-off delayed execution**: This allows you execute jobs once based on your
    set date and time.


    To install the `APScheduler` library, use the Mu package manager, type `APScheduler`,
    and click on `OK` as shown in the following figure:


    ![](img/6fc100463e273be6e8f92a077babc451_154_0.png)


    *Figure 10.1: Mu package manager*


    For Windows operating systems, you can also use **Windows Task Scheduler** to
    schedule tasks at a certain date and time. With the task schedule, you can schedule
    tasks such as running the required Python automation, sending an email message,
    or starting a new application. Windows Task Scheduler supports running tasks based
    on the following events:


    - On a specific system event

    - At a particular time or schedule

    - When the computer is idle

    - During the start of the computer

    - During the user logging action


    To start the task scheduler, on the Start menu, search or press Windows + R keys
    on your keyboard to launch Run and type `taskschd.msc`. On the task scheduler,
    select the **Create Basic Task...** option in the Actions section to create a
    basic task as shown in Figure 10.2:


    ![](img/6fc100463e273be6e8f92a077babc451_155_0.png)


    **Figure 10.2:** Task scheduler home page


    Once you click on the option to create a basic task, you will see the **Create
    a Basic Task** wizard where you can add a name to your scheduled tasks and add
    a description for the task as shown in Figure 10.3:


    ![](img/6fc100463e273be6e8f92a077babc451_156_0.png)


    **Figure 10.3: Create a basic task wizard**


    Once you click on **Next >**, you can select the trigger you want for your job
    such as running the job daily, weekly, monthly, and so on as shown in Figure 10.4:


    ![](img/6fc100463e273be6e8f92a077babc451_157_0.png)


    **Figure 10.4: Selecting the task trigger**


    Once you click on **Next >**, you need to specify the trigger parameters such
    as when you want to schedule your task as shown in Figure 10.5:


    ![](img/6fc100463e273be6e8f92a077babc451_158_0.png)


    **Figure 10.5: One time schedule**


    Once you click on **Next >**, you need to specify if you want to **Start a program**,
    **Send an email**, or **Display a message** as shown in Figure 10.6:


    ![](img/6fc100463e273be6e8f92a077babc451_159_0.png)


    **Figure 10.6:** Task manager actions options


    In this case, we will select `Start a program` and click on **Next >**, we will
    specify the Python automation script path as shown in Figure 10.7:


    ![](img/6fc100463e273be6e8f92a077babc451_160_0.png)


    Once you specify the path, click on **Next >** where you will be presented with
    the summary of the task, and you need to click on finish to start the trigger
    of your task based on the selected trigger. You can schedule more complicated
    tasks using **task scheduler** using the create task option where you can have
    multiple triggers to run the same task. There are task scheduler applications
    available for Linux and Mac operating systems as well such as **crontab** which
    uses the Cron style syntax to schedule tasks.


    In the next section, we will look at writing timer programs and scheduler triggers
    with the Python **APScheduler** library.


    ## Writing timer programs


    **APScheduler** allows you to write the timer programs to schedule and run Python
    programs as discussed in the previous section. **APScheduler** has a **BlockingScheduler**
    which is a simple scheduler that runs in the foreground. You can start the scheduler
    by calling the `start()` function. With `BlockingScheduler`, you will start the
    scheduler once you are done with the initializing steps such as adding the jobs
    and passing the correct automation scripts. To add jobs to the scheduler, use
    the `add_job()` function that returns an `apscheduler.job.Job` instance that can
    be used to modify the job or remove it later. A scheduled job can be removed using
    the `remove()` function.


    For example, `scheduler.add_job(myfunc, ''interval'', minutes=2)` creates a new
    job and `job.remove()` removes the job. You can modify a job by using the `modify()`
    function and reschedule a job using the `reschedule()` function.


    To shut down the scheduler, there is a `shutdown()` function, to pause the job
    use the `pause()` function, and to resume it, use the `resume()` function.


    To start a simple scheduler job, you can create a `BlockingScheduler`, add a job
    to this scheduler using the `add_job` function, and start the scheduler using
    the `start` function as shown in Figure 10.8:


    ![](img/6fc100463e273be6e8f92a077babc451_161_0.png)


    *Figure 10.8: Starting a simple APScheduler program*


    Instead of passing a Lambda function, you can pass any other Python function to
    the scheduler, and the scheduler will call the function at the specified time.
    APScheduler supports cron-based triggers which is similar to the UNIX cron scheduler
    with parameter such as:


    - year: 4-digit year number

    - month: Month number (1-12)

    - day: Day of month (1-31)

    - week: ISO week (1-53)

    - day_of_week: Number or name of weekday (0-6 or mon, tue, wed, thu, fri, sat,
    sun)

    - hour: Hour (0-23)

    - minute: Minute (0-59)

    - second: Second (0-59)

    - start_date: Start date/time to start the trigger

    - end_date: End date/time to end the trigger

    - timezone: Time zone to use for the date/time calculations (defaults to scheduler
    timezone)


    For example, you can run a cron-based trigger to run a job every second by passing
    the second parameter as `*` as shown in Figure 10.9:


    ![](img/6fc100463e273be6e8f92a077babc451_163_0.png)


    **Figure 10.9: Cron-based scheduler program**


    In the next section, we will look at libraries to launch other programs and applications
    using Python.


    ## Launching programs from Python


    You can also launch different programs and applications from Python. This is particularly
    useful with timer programs; for example, at every login, you want certain applications
    to start on your desktop and be set up automatically. A Python script can start
    other programs on your computer using the **subprocess.Popen()** function. The
    subprocess module allows you to create new processes, connect to the input, and
    output pipes, and obtain the return code from external programs. The **subprocess.Popen**
    takes arguments as a sequence of program arguments or program string. One example
    of using the launch program is shown in the following Figure 10.10:'
