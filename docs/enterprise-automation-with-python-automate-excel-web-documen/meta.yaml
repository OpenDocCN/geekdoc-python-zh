    London NW1 5PU


    UK | UAE | INDIA | SINGAPORE


    ISBN 978-93-55511-379


    [www.bpbonline.com](http://www.bpbonline.com)


    # Dedicated to


    My beloved Parents:

    *Anil Agrawal & Saroj Agrawal*


    # About the Author


    **Ambuj Agrawal** is an industry expert in Artificial Intelligence and Enterprise
    Automation. He has received numerous innovation awards from Citibank, Imperial
    College London, Ministry of Justice UK, Bristol University, among others. He is
    also one of the youngest recipients of the "Exceptional Talent Visa in Digital
    Technology" by the UK Government for expertise in Compiler Design and Machine
    Learning.


    He has been one of the youngest Speakers at the Money2020 Europe, Fin.Techsummit
    Europe, Future of Work Summit London and Automation Summit Paris on the topic
    “Automation and Future of Work”.


    # About the Reviewer


    **Akanksha Sinha** is an Architect in Intelligent Process Automation team with
    8 years of Automation experience out of her 15 years of journey in various progressive
    roles of Software Development in Cognizant. She is extensively involved in digital
    transformation of client''s landscapes through automations in domains of Digital
    Marketing and Technology. Her area of work revolves in exploring automation potential,
    identifying automation use cases, solutioning and developing a suite of bots along
    with her team in close collaboration of multiple client stakeholders and eventually
    providing digital experience to her clients through a suite of automation solutions.


    She has worked with clients like Google, Twitter and Hartford Life. Her skills
    are in Javascript, Google Apps Script, Google Cloud, web development, Unix, NLP,
    Python, Chatbots, Open Source RPA. Open Source RPAs and NLP are her areas of interest
    where she has worked on several prototypes.


    She was one of the founding members of the Tools & Automation team in Cognizant
    for Operation Teams working for Tech giants.


    She is Google Cloud certified associate and Kore.AI certified Virtual Assistant
    developer.


    She has a B.E in E&E from RTM Nagpur University, and is working with Cognizant.


    # Acknowledgement


    First and foremost, I would like to thank my parents who continuously encouraged
    me to write this book — I could have never completed this book without their support.


    I would also like to thank my family and friends who provided me with the continued
    support during my writing of this book.


    I am also grateful to the team at BPB Publications, who provided me the opportunity
    to publish this book and for providing valuable feedback throughout the process
    of writing this book.


    # Preface


    This book takes the reader through different examples and code samples to automate
    repetitive work tasks. This book also gives solutions to common automation requirements
    and repetitive tasks faced during the day to day work environment. After reading
    this book you will be able to create automations for business processes using
    Python. You will also be able to identify the most common business process for
    automation.


    This book will equip you with the knowledge of creating, reading, modifying and
    extract data from Excel documents using Python programs. You will also be able
    to extract data from websites, PDF documents and send and read messages using
    Gmail, Outlook and WhatsApp. This book will help readers to create automations
    to automate their boring work and increase the efficiency of their organizations
    by 500%.


    *This book is divided into 11 chapters. The details are listed below.*


    In **Chapter 1**, you will be introduced to the installation steps and setting
    up the development environment for Python. We will also cover the installation
    of Python packages and libraries required for building automations.


    In **Chapter 2**, you will be introduced to the installation steps and setting
    up the development environment for Python. We will also cover the installation
    of Python packages and libraries required for building automations.


    In **Chapter 3**, we will discuss the mindset needed to be successful in implementation
    of automations within your organizations. We will go through the process of identifying
    and prioritizing automation opportunities. We will also discuss the ways to share
    the developed automations with the wider organization once they are created.


    In **Chapter 4**, we will discuss ways to automate Excel workflows including creating,
    writing, and updating the Excel documents. We will also discuss the data manipulation
    techniques with Excel and CSV documents.


    In **Chapter 5**, we will go through automation for websites and web-based tasks.
    We will look at how to download data from websites and automate data extraction
    from websites by parsing HTML documents. We will also look at the Selenium framework
    to automate web actions such as mouse click and keyboard actions on different
    websites.


    In **Chapter 6**, we will look at various file-based automations for different
    file types in Python. We will discuss some of the Python libraries that are used
    to automate different file types. We will also look at ways to extract data from
    PDF documents and Word documents type file structure.


    In **Chapter 7**, we would learn to automate email-based tasks using Gmail, Outlook
    and other SMTP clients. We will also look at Text message and WhatsApp automation
    using the Twilio API.


    In **Chapter 8**, we would learn to automate Graphical User Interface (GUI) by
    controlling the Keyboard and Mouse Actions. We will be using the Python library
    PyAutoGUI which works with Windows, Mac and Linux and provides automations for
    GUI elements within the application.


    In **Chapter 9**, we will look at computer Image fundamentals and the Pillow Python
    library for manipulating images. We would also look at the Tesseract library which
    can be used to extract text within images and scanned documents.


    In **Chapter 10**, we will look at scheduling automations using dates and timers.
    We would also look at external applications that can allow us to run automations
    based on certain events such as receiving a new email or during the start of an
    application.


    In **Chapter 11**, we will look at methods to extend your Python scripting knowledge
    and develop complex end to end process automations based on your requirements.
    We will learn how to work with external libraries and use external code to build
    these automations. We would also look at creating Python web services and using
    Machine Learning for automation.'
