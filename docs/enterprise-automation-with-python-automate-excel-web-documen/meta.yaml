  md: '# CHAPTER 7


    # Automating Email, Messenger Applications, and Messages


    # Introduction


    In this chapter, we will learn how to automate email-based tasks using *Gmail*,
    *Outlook*, and other SMTP clients. We will also look at text message and *WhatsApp*
    automation using the *Twilio* API.


    # Structure


    In this chapter, we will cover the following topics:


    +   - Simple Mail Transfer Protocol

    - Sending emails using Gmail

    - Outlook email automation

    - Text and WhatsApp message automation


    # Objectives


    After studying this chapter, you will be able to automatically read and send emails
    through Gmail and Outlook applications in Python. You will also be able to automatically
    send text messages using the *Twilio* APIs and WhatsApp messages using the WhatsApp
    web application.


    # Simple Mail Transfer Protocol


    **Simple Mail Transfer Protocol (SMTP)** is the protocol system to send emails
    on the web. It is used by many email applications to send and receive emails on
    the web. The SMTP protocol ensures that the message is sent to the right receiving
    server and the receiver server makes sure the message is delivered to the correct
    end recipient.'
  merge: -1
  pgno: 108
- img_proc: true
  md: 'Python has a built-in library called `smtplib` that is used for sending emails
    using the SMTP protocol. The `smtplib` can be imported using the `import smtplib`
    statement. The `smtplib` library has an SMTP function to connect to the server
    with the parameters as:


    +   1. `smtpObj = smtplib.SMTP( [host [, port [, local_hostname]]] )`


    The parameters used in the SMTP function are as follows:


    +   - `host`: This is the IP address or a domain name of the SMTP server running
    your email service.

    - `port`: This is the port number required with the host argument to point to
    the port where the SMTP server is listening. Generally, this is set to 25.

    - `local_hostname`: If your SMTP server is running on your local machine, then
    you can specify just local host to refer to the local server.


    The SMTP object has a method called `sendmail` that is used for sending the email.
    It takes the following parameters:


    +   - **The sender**: This is a string with the address of the sender.

    - **The receivers**: This is a list of strings, one for each recipient.

    - **The message**: This is a message as a formatted string (can be an HTML string
    as well).


    The `smtplib` client can communicate with a remote SMTP server by supplying the
    outgoing mail server as given in the following statement - `smtplib.SMTP(''mail.your-domain.com'',
    25)`.

    In the next section, we will look at a real-work example of automating the sending
    of the emails using Gmail.


    # Sending emails using Gmail


    We will use the `ssl` library and SMTP library for sending emails using Gmail.
    To use these libraries, we need to allow a less secure app option to be ON (`https://myaccount.google.com/lesssecureapps`)
    to allow the use of these libraries with password-based authentication. This setting
    is not'
  merge: -1
  pgno: 109
- img_proc: true
  md: 'available for Gmail accounts with *two-step verification* enabled. If you do
    not want to enable this option in the Gmail account, then you can use the OAuth2
    authorization framework and follow the Gmail API documentation (**https://developers.google.com/gmail/api/quickstart/python**).
    The `ssl` library has the `create_default_context()` function which returns a
    new `SSLContext` object with default settings. The `smtplib` has `SMTP_SSL()`
    function behaves exactly the same as the SMTP function taking arguments as per
    this definition: `smtplib.SMTP_SSL(host='''', port=0, local_hostname=None, keyfile=None,
    certfile=None, [timeout,] context=None, source_address=None)`. `SMTP_SSL` is used
    for situations where SSL is required from the beginning of the connection. We
    can create a connection to Gmail using these functions as shown in Figure 7.1:


    ![](img/6fc100463e273be6e8f92a077babc451_110_0.png)


    Figure 7.1: Establishing a connection with Gmail


    Once the connection is established, you can send emails using the `sendmail()`
    function with the sender email, receiver email, and message as arguments as shown
    in Figure 7.2:'
