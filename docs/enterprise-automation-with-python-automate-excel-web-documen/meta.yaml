    例如，`scheduler.add_job(myfunc, ''interval'', minutes=2)` 创建一个新作业，而 `job.remove()`
    删除该作业。你可以使用 `modify()` 函数修改作业，并使用 `reschedule()` 函数重新计划作业。


    要关闭调度器，有 `shutdown()` 函数；要暂停作业，使用 `pause()` 函数；要恢复作业，使用 `resume()` 函数。


    要启动一个简单的调度器作业，你可以创建一个 `BlockingScheduler`，使用 `add_job` 函数向此调度器添加一个作业，然后使用 `start`
    函数启动调度器，如图10.8所示：

    ![](img/6fc100463e273be6e8f92a077babc451_161_0.png)

    *图 10.8：启动一个简单的APScheduler程序*


    除了传递Lambda函数，你还可以传递任何其他Python函数给调度器，调度器将在指定时间调用该函数。APScheduler支持基于Cron的触发器，这与UNIX
    cron调度器类似，其参数包括：

    - year: 4位数年份

    - month: 月份 (1-12)

    - day: 日期 (1-31)

    - week: ISO周 (1-53)

    - day_of_week: 星期几的数字或名称 (0-6 或 mon, tue, wed, thu, fri, sat, sun)

    - hour: 小时 (0-23)

    - minute: 分钟 (0-59)

    - second: 秒 (0-59)

    - start_date: 开始触发器的起始日期/时间

    - end_date: 结束触发器的结束日期/时间

    - timezone: 用于日期/时间计算的时区（默认为调度器时区）


    例如，你可以运行一个基于Cron的触发器，通过将second参数设置为 `*` 来每秒运行一次作业，如图10.9所示：

    ![](img/6fc100463e273be6e8f92a077babc451_163_0.png)

    **图 10.9：基于Cron的调度器程序**


    在下一节中，我们将探讨使用Python启动其他程序和应用程序的库。


    ## 从Python启动程序

    你还可以从Python启动不同的程序和应用程序。这在计时器程序中特别有用；例如，每次登录时，你希望桌面上的某些应用程序自动启动并设置好。Python脚本可以使用
