    \n# CHAPTER 3\n\n## Automation Mindset – Python as a Tool for Automation\n\n###\
    \ Introduction\n\nIn this chapter, we will discuss the mindset needed to be successful\
    \ in implementation of automation within your organizations. We will go through\
    \ the process of identifying and prioritizing automation opportunities. We will\
    \ also discuss the ways to share the developed automations with the wider organization\
    \ once they are created.\n\n### Structure\n\nIn this chapter, we will cover the\
    \ following topics:\n\n- Mindset for automation\n- Common processes for automation\n\
    - Identifying business processes\n\n### Objectives\n\nAfter studying this chapter,\
    \ you will be able to identify the automation opportunities in your organization.\
    \ You will also have the right mindset to decide when to implement the automation\
    \ and when to look for other solutions for optimizing your workflow.\n\n### Mindset\
    \ for automation\n\nAutomation mindset involves a way of working where we look\
    \ for continuous improvement of existing processes and finding opportunities for\
    \ automation. It is a way of reimagining the whole process of doing a task, or\
    \ an entire workflow, and finding opportunities to make it more efficient. You\
    \ need to be comfortable for change and look for tools and solutions to help the\
    \ process run more efficiently.\n\nIn the next section, we will discuss some of\
    \ the common processes and tasks that can be easily automated with Python.\n\n\
    ### Common processes for automation\n\nThe best starting process for automation\
    \ are the ones which are highly repetitive in nature and take a substantial amount\
    \ of time of your overall workload.\n\nThe most common automations opportunities\
    \ come from the following three subsets of categories:\n\n1. **Data entry**: The\
    \ data entry process involves tasks which require you to enter data from one application\
    \ to another. These tasks are highly manual in nature and can be easily automated\
    \ with Python. The main candidates for data entry automations include:\n   a.\
    \ **Filling up forms**: Any task that requires repetitive filling up of forms\
    \ for single or multiple data sources.\n   b. **Sending similar emails**: Tasks\
    \ where you have to send bulk emails or similar emails to a lot of people.\n \
    \  c. **Copying data between two systems**: Any task requiring duplication of\
    \ data between multiple systems.\n   d. **Maintaining the ERP and CRM systems**:\
    \ Tasks involving data entry to ERP and CRM systems.\n   e. **Updating legacy\
    \ systems**: Tasks involving working with legacy systems and updating data into\
    \ these systems.\n   f. **Entering data to in-house systems**: Any task where\
    \ you have to work and maintain the in-house proprietary systems.\n\n2. **Data\
    \ extraction**: Data extraction processes involve work where you have to extract\
    \ data from different file formats to be consumed by other teams or applications.\
    \ These tasks can be easily automated saving a lot of time with day-to-day work\
    \ tasks. Almost every job involves some tasks to extract data from different files.\
    \ The main candidates for data extraction automations include:\n   a. Extracting\
    \ customer details: Tasks involving extracting customer details from emails, documents,\
    \ and other systems.\n   b. Converting PDF data to Excel sheet: Tasks involving\
    \ extracting data from PDF documents by converting it to the Excel format.\n \
    \  c. Extracting data from reports: Tasks involving extracting data from external\
    \ and internal reports such as financial reports, press releases, legal reports,\
    \ and corporate reports.\n   d. Extracting data from images: Tasks involving data\
    \ extraction from scanned or online images.\n\n3. **Data gathering**: Data gathering\
    \ processes involve work where you have to gather data from multiple sources such\
    \ as websites, files, and applications. These tasks generally involve collecting,\
    \ cleaning, and collating data from multiple sources, and performing some analysis\
    \ on them. The main candidates for data gathering automations include:\n   a.\
    \ Gathering stock prices: Tasks involving collecting stock prices data from stock\
    \ exchange websites and other market data systems.\n   b. Performing market research:\
    \ Tasks involving collecting particular pieces of information from social media\
    \ sites, competitor websites, or media documents.\n   c. Gathering website data:\
    \ Any task involving collecting data for any website on the Internet.\n   d. Online\
    \ reports extraction: Tasks involving data extraction from online HTML-based reports.\n\
    \nThere are also process discovery and process mining tools that can help you\
    \ with discovering the processes that should be prioritized and automated. We\
    \ will discuss some of these tools in the next section.\n\n### Identifying business\
    \ processes\n\nBusiness process discovery is a common way to identify processes.\
    \ Business process discovery involves techniques and ways to manually or automatically\
    \ construct the organization’s business processes and their variations.\n\nThe\
    \ processes can also be identified using process documentation or time-based analysis\
    \ of activities performed in the organization. Once the processes are identified\
    \ and the steps involved in the process are listed, use the following checklist\
    \ as a guide to select best candidates for automation:\n\n- Requires more than\
    \ a couple of hours of manual time to complete.\n- Processes which have defined\
    \ steps/rules.\n- Processes which are repetitive.\n- Processes running frequently,\
    \ at least once a month.\n- Have multiple steps involved in completing the process.\n\
    - Work involves multiple data files such as Excel, text, PDF files.\n- Work involves\
    \ dealing with legacy systems.\n- High accuracy required on the task.\n- Process\
    \ requires high level of documentation.\n- Process has high risk of human error\
    \ due to complexity or number of steps involved.\n- Process that is expensive\
    \ in terms of time, resources, and other intangible assets.\n- Process can be\
    \ easily automated.\n\nThe following figure shows time-based analysis for work\
    \ performed to identify most suitable applications for automation. Further analysis\
    \ can be performed based on user interviews to identify the final process for\
    \ automation.\n\nFigure 3.1 displays the time-based analysis across different\
    \ applications which help with the identification of the most time-consuming tasks\
    \ performed by the user:"
