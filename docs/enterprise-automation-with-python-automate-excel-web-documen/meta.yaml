  md: '**Representational State Transfer (REST)** APIs that are flexible, lightweight,
    and the most common way to connect components and applications.


    The REST APIs use four common HTTP methods, **GET** (provides read only access
    to resources), **POST** (used for creating new resources), **DELETE** (used for
    removing a resource), and **PUT** (used for updating an existing resource).


    We will use the **Flask** Python library to create REST APIs based server in Python.
    **Flask** is a micro web framework for Python and can be used to create web applications
    from scratch. You can build web pages, applications like Wikipedia, commercial
    websites, or even a search engine like *Google* using the **Flask** library. **Flask**
    also supports template engines to build dynamic websites.


    To install the **Flask** library, use the **mu** package manager, type **Flask**,
    and click on **OK** as shown in the following figure:


