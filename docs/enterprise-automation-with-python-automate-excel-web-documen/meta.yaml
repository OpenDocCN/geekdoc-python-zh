    # 第5章

    自动化基于 Web 的任务


    ## 简介


    在本章中，我们将探讨网站和基于 Web 任务的自动化。我们将研究如何从网站下载数据，以及如何通过解析 HTML 文档来自动化提取网站数据。我们还将介绍 **Selenium**
    框架，用于自动化 Web 操作，例如在不同网站上进行鼠标点击和键盘操作。


    ## 结构


    在本章中，我们将涵盖以下主题：


    - 从互联网下载文件

    - HTML、CSS 和 JavaScript 简介

    - 从网站提取数据

    - 使用 Selenium 控制浏览器


    ## 目标


    学习本章后，你将能够自动化基于 Web 的任务，例如从网页提取数据、下载文件和执行搜索。你还将了解用于处理网站和 HTML 文档的 Python 库。


    ## 从互联网下载文件


    Python 允许你从互联网下载网页、HTML 文档、PDF 文档、视频和其他文件类型。我们将使用 **requests**，这是一个 Python 库，允许你执行
    HTTP 请求。其应用之一是使用文件 URL 从网络下载文件。

    要安装 requests，请使用 **mu** 包管理器，输入 **requests**，然后点击 **确定**，如下图所示：


    *图 5.1：Mu 包管理器*


    库安装后，你可以使用 `import` 语句导入它。**Requests** 库允许你发送 HTTP 请求，无需手动将查询字符串添加到 URL，或对 POST
    数据进行表单编码。HTTP 定义了用于指示需要在 Web 服务上执行的操作的方法。**Requests** 库可用的 HTTP 方法如下：


    - **GET**：允许你从给定的网络链接检索数据。

    - **HEAD**：类似于 GET 请求，但不包含响应体。

    - **POST**：将数据提交到指定的网络链接，通常会导致服务器上发生某些操作。

    - **PUT**：使用上传的数据替换服务器上的当前表示。

    - **DELETE**：删除指定的数据。

    - **CONNECT**：建立到由网络链接标识的服务器的隧道。'
