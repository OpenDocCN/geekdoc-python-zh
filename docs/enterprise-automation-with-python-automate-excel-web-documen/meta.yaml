    In the next section, we will use the basic knowledge of HTML documents to extract
    data from web pages and automate web-based tasks.


    ## Extracting data from websites


    Extracting data from websites is called **web scraping** and it involves getting
    the HTML page from the web and extracting required data from the HTML document.
    In Python, we will use the **Beautiful Soup** library which makes it very easy
    to extract data from HTML documents. **Beautiful Soup** allows us to write custom
    code that filters through the specific elements that we specified and extracts
    the required content as instructed.


    To install **Beautiful Soup**, use the `mu` package manager, type `beautifulsoup4`,
    and click on `OK`, as shown in the following figure:


    ![img/6fc100463e273be6e8f92a077babc451_75_0.png](img/6fc100463e273be6e8f92a077babc451_75_0.png)


    *Figure 5.6: Mu package manager*


    Once the Beautiful Soup library is installed, you can import it with the statement
    `from bs4 import BeautifulSoup` where `bs4` stands for `beautifulsoup4`, as shown
    in [Figure 5.7](#figure-5-7):


    ![img/6fc100463e273be6e8f92a077babc451_76_0.png](img/6fc100463e273be6e8f92a077babc451_76_0.png)


    *Figure 5.7: Using BeautifulSoup library*


    Beautiful Soup transforms a complex HTML document into a tree of Python objects.
    There are four main types of objects that we will use for extracting data from
    web pages: **Tag, NavigableString, BeautifulSoup, and Comment**. The main properties
    and objects we will use for data extraction are:


    -   **Tag**: The `tag` object corresponds to the HTML tag in the original document.
    For example:

    ```python

    soup = BeautifulSoup(''<b class="bold">bold text</b>'',

    ''html.parser'')

    tag = soup.b

    type(tag)

    # returns <class ''bs4.element.Tag''> as output

    ```


    -   **Name**: Every HTML tag has a name which can be accessed using `.name`. For
    example:

    ```python

    tag.name

    # returns ''b'' as output

    ```


    -   **Attributes**: A tag can have any number of attributes. The `<b id="bold">`
    tag has an attribute `id` whose value is `bold`. You can access a `tag`''s attributes
    by treating the `tag` like a dictionary. For example:

    ```python

    tag = BeautifulSoup(''<b id="bold">bold text</b>'',

    ''html.parser'')

    tag[''id'']

    # returns bold as output

    ```

    You can access that dictionary containing all attributes using the `.attrs` function.


    -   **NavigableString**: A string that contains the text within a tag. For example:

    ```python

    tag = BeautifulSoup(''<b id="bold">bold text</b>'', ''html.parser'')

    bold = tag.b

    bold.string

    # returns ''bold text'' string as output

    ```


    -   **BeautifulSoup**: The **BeautifulSoup** object represents the parsed HTML
    document. It is similar to the **tag** object, and supports the preceding methods
    to navigate and search the document.


    As shown in *Figure 5.8*, we are converting the HTML document using the **BeautifulSoup**
    function, and then access its property directly by using the **tag** object properties:


    ![img/6fc100463e273be6e8f92a077babc451_77_0.png](img/6fc100463e273be6e8f92a077babc451_77_0.png)


    *Figure 5.8: Extracting HTML elements*


    We can also download a webpage using the **requests** library and extract data
    by converting the downloaded document into a **BeautifulSoup** object as shown
    in [Figure 5.9](#):


    ```

    Document title is: <title>Python Automation Example Page</title>

    Document title tag name is: title

    Document title string is: Python Automation Example Page

    Document title parent tag name is: head

    Document title paragraph is: <p>Test Content for automation with Python.</p>

    ```


    ![img/6fc100463e273be6e8f92a077babc451_78_0.png](img/6fc100463e273be6e8f92a077babc451_78_0.png)


    *Figure 5.9: Downloading and parsing online documents*


    To extract elements of a particular type, we can use the `find_all()` function
    to get the elements for that type. We can use this function to extract all the
    external links from a particular HTML page as shown in [Figure 5.10](#):


    ![img/6fc100463e273be6e8f92a077babc451_78_1.png](img/6fc100463e273be6e8f92a077babc451_78_1.png)


    *Figure 5.10: Extracting web links from website*


    To extract elements from the tag ID, we can use the `find()` function with the
    required `id` value as shown in [Figure 5.11](#figure-5-11):


    ![img/6fc100463e273be6e8f92a077babc451_79_0.png](img/6fc100463e273be6e8f92a077babc451_79_0.png)


    *Figure 5.11: Extracting data via HTML tag ID*


    To extract elements from the class name, we can use the `find_all()` function
    with the required `class` and `tag` values as shown in [Figure 5.12](#figure-5-12):


    ![img/6fc100463e273be6e8f92a077babc451_80_0.png](img/6fc100463e273be6e8f92a077babc451_80_0.png)


    *Figure 5.12: Extracting data via HTML class*


    We can also use the `select_one()` function with the class name as a parameter
    to extract data as shown in [Figure 5.13](#figure-5-13):


    ![img/6fc100463e273be6e8f92a077babc451_80_1.png](img/6fc100463e273be6e8f92a077babc451_80_1.png)


    *Figure 5.13: Extracting one element data by class name*


    In this section, we looked at a few examples on how we can use the **beautifulsoup**
    and **requests** library to extract the required data from the web pages. In the
    next section, we will look at the **Selenium** library that allows you to automate
    the browser mouse and keyboard actions.


    ## Controlling the browser with Selenium


    **Selenium** is a library that allows you to automate the browser action. It provides
    extensions to emulate the user interaction with browsers and allows you to write
    the code to automate all major web browsers.

    We will look at automation on the *Chrome* browser using Selenium but the automations
    can be easily imported to other browsers as well. To install **selenium**, use
    the **mu** package manager, type **selenium**, and click on **OK** as shown in
    the following figure:


    ![img/6fc100463e273be6e8f92a077babc451_81_0.png](img/6fc100463e273be6e8f92a077babc451_81_0.png)


    *Figure 5.14: Mu package manager*


    We will also need to download the Chrome driver with the **selenium** package
    to be able to automate Chrome actions as per the following steps:


    -   Download the *Chrome* driver from the *chromium* website, and select the right
    version and operating system for your Chrome browser as required ([https://chromedriver.chromium.org/downloads](https://chromedriver.chromium.org/downloads)).

    -   Extract the downloaded folder using any ZIP extractor tool and copy the path
    of the location of the `chromedriver.exe` file.

    -   You can also move the file to c drive or any other path that is accessible
    by the system variables.


    After this, we can perform the browser automations by importing the web driver
    from the `selenium` library using the `from selenium import webdriver` statement.
    We will also need to import the Chrome service using `from selenium.webdriver.chrome.service
    import Service`.


    To create a `selenium` service, use the `Service()` function with the path of
    the `chromedriver` as shown in *Figure 5.15*:


    ![img/6fc100463e273be6e8f92a077babc451_82_0.png](img/6fc100463e273be6e8f92a077babc451_82_0.png)


    *Figure 5.15: Creating Selenium service*


    The `selenium` has a `get()` function that takes the argument of the URL of the
    page to be opened and opens the requested page as shown in *Figures 5.15* and
    *5.16*:


    ![img/6fc100463e273be6e8f92a077babc451_83_0.png](img/6fc100463e273be6e8f92a077babc451_83_0.png)


    *Figure 5.16: Python home page*


    There are two methods in selenium that we would be using to locate web page elements
    and perform mouse or keyboard actions on them. These methods are `find_element`
    and `find_elements`. They can be used as per the following example:


    1. `from selenium.webdriver.common.by import By`

    2. `driver.find_element(By.XPATH, ''//button[text()="text"]'')`

    3. `driver.find_elements(By.XPATH, ''//button'')`


    These are the attributes available for the `By` class:


    *   `ID = id`

    *   `XPATH = xpath`

    *   `LINK_TEXT = link text`

    *   `PARTIAL_LINK_TEXT = partial link text`

    *   `NAME = name`'
