    In the next section, we will look at controlling keyboard actions with the **PyAutoGUI**
    library. In particular, we will look at how we can use the library to automatically
    type on different applications and use the hot keys functions to send commands
    such as **copy** and **paste**.


    # ## Controlling keyboard actions


    PyAutoGUI provides various functions to control different types of keyboard actions.
    The most commonly used keyboard automation functions in PyAutoGUI are stated as
    follows:


    +   * **write()**: The `write()` function is the primary keyboard function that
    is used to type the characters in the string that is passed. To add delay between
    pressing each character key, an interval keyword argument is passed with the required
