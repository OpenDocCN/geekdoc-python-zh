    You can start the scheduler by calling the `start()` function. With `BlockingScheduler`,
    you will start the scheduler once you are done with the initializing steps such
    as adding the jobs and passing the correct automation scripts. To add jobs to
    the scheduler, use the `add_job()` function that returns an `apscheduler.job.Job`
    instance that can be used to modify the job or remove it later. A scheduled job
    can be removed using the `remove()` function.


    For example, `scheduler.add_job(myfunc, ''interval'', minutes=2)` creates a new
    job and `job.remove()` removes the job. You can modify a job by using the `modify()`
    function and reschedule a job using the `reschedule()` function.


    To shut down the scheduler, there is a `shutdown()` function, to pause the job
    use the `pause()` function, and to resume it, use the `resume()` function.


    To start a simple scheduler job, you can create a `BlockingScheduler`, add a job
    to this scheduler using the `add_job` function, and start the scheduler using
    the `start` function as shown in [Figure 10.8](#figure-10-8):


    ![](img/6fc100463e273be6e8f92a077babc451_161_0.png)


    *Figure 10.8: Starting a simple APScheduler program*'
