  md: "+   - OPTIONS: This describes the communication options for the target web\
    \ link.\n- TRACE: This performs a message loop-back test.\n- PATCH: This applies\
    \ partial modifications to the data.\n\nTo download the files from the Internet,\
    \ we will use the `HTTP GET` method. As shown in *Figure 5.2*, we can use the\
    \ `requests` library with the syntax `requests.get(FILE_LINK)` to download the\
    \ file from the Internet.\n\nWe are also using the Python file write in the following\
    \ figure which allows us to create a new file or add data to an existing file.\
    \ Python has the `open()` function which is the key function for working with\
    \ files. The `open()` function takes two parameters as arguments which are file\
    \ location and mode. There are four different modes for opening a file using the\
    \ `open` function:\n\n+   - r: Read – opens a file for reading.\n- a: Append –\
    \ opens a file for adding more data and creates a new file if it does not exist.\n\
    - w: Write - opens a file for writing and creates a new file if it does not exist.\n\
    - x: Create - creates a new file.\n\n```\npython\nimport requests\n\n# URL of\
