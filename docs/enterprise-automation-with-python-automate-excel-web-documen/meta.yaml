    \ for single or multiple data sources.\n   b. **Sending similar emails**: Tasks\
    \ where you have to send bulk emails or similar emails to a lot of people.\n \
    \  c. **Copying data between two systems**: Any task requiring duplication of\
    \ data between multiple systems.\n   d. **Maintaining the ERP and CRM systems**:\
    \ Tasks involving data entry to ERP and CRM systems.\n   e. **Updating legacy\
    \ systems**: Tasks involving working with legacy systems and updating data into\
    \ these systems.\n   f. **Entering data to in-house systems**: Any task where\
    \ you have to work and maintain the in-house proprietary systems.\n\n+   2. **Data\
    \ extraction**: Data extraction processes involve work where you have to extract\
    \ data from different file formats to be consumed by other teams or applications.\
    \ These tasks can be easily automated saving a lot of time with day-to-day work\
    \ tasks. Almost every job involves some tasks to extract data from different files.\
    \ The main candidates for data extraction automations include:"
  - '[PAGE 46]


    +   a. Extracting customer details: Tasks involving extracting customer details
    from emails, documents, and other systems.

    b. Converting PDF data to Excel sheet: Tasks involving extracting data from PDF
    documents by converting it to the Excel format.

    c. Extracting data from reports: Tasks involving extracting data from external
    and internal reports such as financial reports, press releases, legal reports,
    and corporate reports.

    d. Extracting data from images: Tasks involving data extraction from scanned or
    online images.


    3. Data gathering: Data gathering processes involve work where you have to gather
    data from multiple sources such as websites, files, and applications. These tasks
    generally involve collecting, cleaning, and collating data from multiple sources,
    and performing some analysis on them. The main candidates for data gathering automations
    include:


    +   a. Gathering stock prices: Tasks involving collecting stock prices data from
    stock exchange websites and other market data systems.

    b. Performing market research: Tasks involving collecting particular pieces of
    information from social media sites, competitor websites, or media documents.

    c. Gathering website data: Any task involving collecting data for any website
    on the Internet.

    d. Online reports extraction: Tasks involving data extraction from online HTML-based
    reports.


    There are also process discovery and process mining tools that can help you with
    discovering the processes that should be prioritized and automated. We will discuss
    some of these tools in the next section.


    # **Identifying business processes**


    Business process discovery is a common way to identify processes. Business process
    discovery involves techniques and ways to manually or automatically construct
    the organization’s business processes and their variations.'
  - '[PAGE 47]


    The processes can also be identified using process documentation or time-based
    analysis of activities performed in the organization. Once the processes are identified
    and the steps involved in the process are listed, use the following checklist
    as a guide to select best candidates for automation:


    +   - Requires more than a couple of hours of manual time to complete.

    - Processes which have defined steps/rules.

    - Processes which are repetitive.

    - Processes running frequently, at least once a month.

    - Have multiple steps involved in completing the process.

    - Work involves multiple data files such as Excel, text, PDF files.

    - Work involves dealing with legacy systems.

    - High accuracy required on the task.

    - Process requires high level of documentation.

    - Process has high risk of human error due to complexity or number of steps involved.

    - Process that is expensive in terms of time, resources, and other intangible
    assets.

    - Process can be easily automated.


    The following figure shows time-based analysis for work performed to identify
    most suitable applications for automation. Further analysis can be performed based
    on user interviews to identify the final process for automation.


    Figure 3.1 displays the time-based analysis across different applications which
    help with the identification of the most time-consuming tasks performed by the
    user:'
