    # CHAPTER 4


    # Automating Excel-Based Tasks


    ## Introduction


    In this chapter, we will discuss ways to automate Excel workflows, including creating,
    writing, and updating the Excel documents. We will also discuss the data manipulation
    techniques with Excel and CSV documents.


    ## Structure


    In this chapter, we will cover the following topics:


    - Installing the library to read/write Excel

    - Creating Excel documents

    - Reading Excel documents

    - Updating a workbook

    - Sample Excel-based automation

    - CSV file-based automation


    ## Objectives


    After studying this chapter, you will gain the knowledge and understanding of
    the Python library for manipulating Excel files. You will also be familiar with
    code snippets of how to automate Excel-based tasks such as reading, writing, and
    updating a workbook. You will see a few common examples of Excel-based tasks that
    can be automated using Python.


    ## Installing the library to read/write Excel


    We will use `openpyxl` (the most popular Python library to read/write Excel files)
    to automate Excel-based tasks. It allows you to read, write, and update a workbook
    in a very simple way:


    1. To install **openpyxl**, use the **mu** package manager. Type **openpyxl**
    and click on **ok**, as shown in the following figure. We use **3.0.9** in this
    book, so to import the same version, type **openpyxl==3.0.9** in the package manager.
    Later versions should work as well with the examples in this chapter:


    *Figure 4.1: Mu settings option*


    2. After clicking on the **ok** button, you will see the message that the **openpyxl**
    package is being installed on the computer as shown in *Figure 4.2*:


    Figure 4.2: Openpyxl being installed in Mu


    3. You can verify if the `openpyxl` is installed properly by importing the library
    and printing the library version by using the `__version__` property as shown
    in [Figure 4.3](#figure-43):


    Figure 4.3: Importing Openpyxl module


    # Creating Excel documents


    In this section, we will look at an example to create a new Excel workbook and
    write some data into the workbook.


    We can create a new workbook using the `Workbook()` function in the `openpyxl`
    library. We can add some data to the working book by accessing the active worksheet,
    and selecting the row and column by their names. To access `row 1` and `column
    1`, use `A1` as an index, where `A` represents `column 1` and `1` represents `row
    1`, as shown in the following figure. The location where the file can be saved
    for the workbook is in the same folder where the script is residing by default:


    > Figure 4.4: Creating new workbook


    As soon as you save the new workbook, you can access it from the file explorer,
    and open it from the Excel application:


    Figure 4.5: New workbook being saved in the code directory


    After opening the file in the Excel application, you can see the data **Hello
    World** and the date when the program is executed is added in the worksheet, as
    shown in the following figure:


    Figure 4.6: Data being added to the new workbook


    # Reading Excel documents


    You can read and loop through the data using the Python `openpyxl` library. There
    are a few different ways to iterate through the data depending on your needs.


    You can slice the data with a combination of columns and rows. To access a value
    of a cell, use the `.value` method. For example, you can access data in *row 1*
    and *column 1* by using the assessor `A1`, or by using the `.cell` function with
    row and column number as an argument as shown in the following figure:


    Figure 4.7: Access cell values from Excel workbook


    You can also loop through the whole row or columns by using the *range* function
    in the format of *Row or Column 1:Row or Column 2* to get the cells between columns
    and rows as shown in the following figure:


    Figure 4.8: Printing cell tuples


    There are also multiple ways of using normal Python generators to go through the
    data. The main methods you can use to achieve this are the `.iter_rows()` and
    `.iter_cols()` functions. These functions take the arguments **min_row** for the
    starting row number, **max_row** for the ending row number, **min_col** for the
    starting column number, and **max_col** for the ending column number. In [Figure
    4.9], you can see an example where we are looping through rows and columns of
    **test_workbook** using the `.iter_rows()` and `.iter_cols()` functions:


    **Figure 4.9: Iterating through row and columns on the Excel sheet**


    In [Figure 4.10], you can see an example where we are looping through rows of
    **test_workbook** using the `.iter_rows()` function and accessing the value with
    another for loop and the `.value` function. This is helpful if you need to manipulate
    or read specific rows in the workbook:'
