    ## Further reading\n\nThere are a lot of online resources to help you learn more\
    \ about emails and messenger applications automation with Python. The following\
    \ table lists some of the best resources to further improve your learning to build\
    \ more complex email and messenger application automations:\n\n| Resource name\
    \ | Link |\n| --- | --- |\n| Sending emails with Python | https://realpython.com/python-send-email/\
    \ |\n| Programming reference for the Win32 API | https://docs.microsoft.com/en-us/windows/win32/api/\
    \ |\n| How to automate mass SMS, push, and chat notifications | https://www.twilio.com/learn/notifications/automate-mass-sms-push-and-chat-notifications\
    \ |\n| Build workflow automation | https://www.twilio.com/docs/sms/tutorials/workflow-automation\
    \ |\n| How to send a WhatsApp message in 30 seconds with Python | https://www.twilio.com/blog/send-whatsapp-message-30-seconds-python\
    \ |\n| Gmail API Python quick start | https://developers.google.com/gmail/api/quickstart/python\
    \ |\n\n*Table 7.1: Resources on email and messenger automation in Python*\n\n\
    ## Questions\n\n1. What is SMTP?\n2. How can you automate the sending of emails?\n\
    3. What are different Python libraries for working WhatsApp application?\n4. How\
    \ can you send a text message using Python?\n\n# CHAPTER 8 GUI – Keyboard and\
    \ Mouse Automation\n\n## Introduction\n\nIn this chapter, we would learn to automate\
    \ the Graphical User Interface (GUI) by controlling the keyboard and mouse actions.\
    \ We will use the Python library PyAutoGUI which works with Windows, Mac, and\
    \ Linux and provides automations for GUI elements within the application.\n\n\
    ## Structure\n\nIn this chapter, we will cover the following topics:\n\n- Introduction\
    \ to the PyAutoGUI module\n- Controlling mouse actions\n- Controlling keyboard\
    \ actions\n- Automation using screenshots\n\n## Objectives\n\nAfter studying this\
    \ chapter, you will be able to automate all kinds of applications you use on your\
    \ work computer. We will go through the examples on a Windows machine but the\
    \ automations would work even if you have a Mac or Linux computer.\n\n## Introduction\
    \ to the PyAutoGUI module\n\nWe will use the PyAutoGUI module that allows your\
    \ Python scripts to control the mouse and keyboard to automate computer applications.\
    \ PyAutoGUI also works across operating systems such as Windows, macOS, and Linux.\
    \ PyAutoGUI provides features stated as follows:\n\n- Controlling the mouse movement\
    \ and clicking on the window (user-interface) of the required application.\n-\
    \ Sending keyboard letters to applications (for example, to fill out data).\n\
    - Take screenshots and search for buttons and other controls using the image.\n\
    - Display message boxes.\n- Locate an applications window and resize the application\
    \ (works only on Windows operating system).\n\nSometimes, you might want to stop\
    \ the automation running with PyAutoGUI due to an error in your code. The PyAutoGUI\
    \ has a safety feature called **FailSafe** that is enabled by default. If you\
    \ move your mouse in any of the four corners of your monitor, and if the PyAutoGUI\
    \ function is running, it will raise a `pyautogui.FailSafeException`. There is\
    \ also a 0.1 second delay after calling every PyAutoGUI function so that you have\
    \ the time to slam the mouse in the corner to trigger the fail safe exception.\n\
    \nTo install `pyautogui`, use the `Mu` package manager, type `pyautogui`, and\
    \ click on `OK` as shown in the following figure:\n\n![](img/6fc100463e273be6e8f92a077babc451_127_0.png)\n\
    \nFigure 8.1: Mu package manager\n\nPyAutoGUI has functions to help you get the\
    \ screen coordinates and screen resolution. The location at the top-left corner\
    \ of the screen is at coordinates **0, 0**. The location of the lower right-hand\
    \ corner depends on your screen's resolution (for example, if the screen resolution\
    \ is *1920 x 1080*, then the location of the lower right corner will be *1919,\
    \ 1079*).\n\nPyAutoGUI has the **size()** function that returns the screen resolution\
    \ size, the **position()** function that returns the current **X** and **Y** coordinates\
    \ of the mouse cursor, and the **onScreen()** function that can check whether\
    \ the **X** and **Y** coordinates are on the screen as shown in [Figure 8.2](#).\
    \ The x and y coordinates that we see in this case are showing the position of\
    \ the *Run* button that we clicked when we ran the code:\n\n![](img/6fc100463e273be6e8f92a077babc451_128_0.png)\n\
    \n> Figure 8.2: Using pyautogui basic functions\n\nIn the next section, we will\
    \ look at controlling mouse actions with the PyAutoGUI library. In particular,\
    \ we will look at how we can use the library to automatically click on the application\
    \ and use the mouse drag function to drag the mouse pointer on applications.\n\
    \n## Controlling mouse actions\n\nPyAutoGUI provides various functions to control\
    \ different types of mouse actions. The most commonly used mouse automation functions\
    \ in PyAutoGUI are as follows:\n\n- **moveTo()**: The `moveTo()` function moves\
    \ the mouse cursor to the X and Y integer coordinates passed to it. For example,\
    \ `pyautogui.moveTo(200, 400)` will move the mouse cursor to X coordinates at\
    \ 200 and Y coordinates at 400. The mouse pointer will immediately move to these\
    \ new coordinates.\n  - To add a delay, you can pass a third parameter for the\
    \ delay (in seconds).\n  - The `move()` function moves the mouse to position relative\
    \ to the current position."
