    \n*Figure 11.5:* Output from the Python webserver with the dynamic route\n\nFlask\
    \ has a `url_for()` function that is used to build an URL for a specific function.\
    \ It takes in the name of the function as the first argument and keyword arguments\
    \ corresponding to the variable part of the URL rule. Unknown variable parts are\
    \ added to the end of the URL as query parameters. This URL building method also\
    \ shows the escaping of special characters and the paths generated are always\
    \ absolute paths.\n\nFor example, we can use the `test_request_context()` method\
    \ to try out the `url_for()` function to get the URL for functions as shown in\
    \ *Figure 11.6*:\n\n```\npython\nfrom flask import Flask, url_for\nfrom markupsafe\
