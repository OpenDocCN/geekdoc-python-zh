    results when the dimension of the target space is larger than that of the data
    manifold, and hence one further modification concerning the manifold dimension
    is suggested. Combining all the observations, we finally achieve a new LLE-type
    method, which is called tangential LLE (TLLE). It is simpler and more robust than
    HLLE.


