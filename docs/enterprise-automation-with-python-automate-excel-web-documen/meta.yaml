- md: "## Decision statements\n\nDecision-making statements decide the direction of\
    \ the flow of program execution. In Python, **if**, **else**, and **elif** statements\
    \ are used for decision making. In Python, **indentation** is used to indicate\
    \ a block of code instead of brackets and it is very important to use consistent\
    \ indentation in the Python code. We generally use four spaces per indentation\
    \ level in Python as per the *PEP 8* style guide.\n\n### if statement\n\nThe `if`\
    \ statement is used to decide whether to execute a certain block of code or not.\n\
    \n**Syntax:**\n\n```\nif (condition):\n    # Statements to execute if true\n```\n\
    \nIn Figure 2.4, we see the use of the if statement to check whether a variable\
    \ is greater than 100 or not. In the case, as the variable value is 1000, the\
    \ print statement is executed printing 1000 is greater than 100.\n\n![](img/6fc100463e273be6e8f92a077babc451_27_0.png)\n\
    \nFigure 2.3: Boolean statement in Python\n\n![](img/6fc100463e273be6e8f92a077babc451_28_0.png)\n\
    \nFigure 2.4: If statement\n\n### if-else\n\nThe **else** statement allows you\
    \ to execute the code when the **if** statement condition is *false*.\n\n**Syntax:**\n\
    \n```\nif (condition):\n    # Executes this block if condition is true\nelse:\n\
    \    # Executes this block if condition is false\n```\n\nIn *Figure 2.5*, the\
    \ variable value is 10, so the **print** statement in the **else** block is executed\
    \ printing 10 is less than 100.\n\n![](img/6fc100463e273be6e8f92a077babc451_29_0.png)\n\
    \nFigure 2.5: If-else program\n\n### if-elif-else\n\nHere, the programmer can\
    \ decide among multiple options. The `if` statements are executed from the top\
    \ down. As soon as one of the conditions controlling the `if` is *true*, the statement\
    \ associated with that `if` is executed, and the rest of the ladder is bypassed.\
    \ If none of the conditions is *true*, then the final `else` statement will be\
    \ executed.\n\n**Syntax:**\n\n```\nif (condition):\n    statement\nelif (condition):\n\
    \    statement\n.\n.\nelse:\n    statement\n```\n\nIn *Figure 2.6*, the variable\
    \ value is 10, so the `print` statement in the `elif` block is executed printing\
    \ 10 is greater than 1.\n\n![](img/6fc100463e273be6e8f92a077babc451_30_0.png)\n\
    \n*Figure 2.6: If-elif-else program*\n\n### Loops/repetition\n\nThere are two\
    \ types of loops in Python, **for** and **while**.\n\n### The for loop\n\nThe\
    \ `for` loops iterate over a given sequence. We can use the `range()` function\
    \ in Python to loop through a set of code a specified number of times. The `range()`\
    \ function returns a sequence of numbers, starting from 0 by default, and increments\
    \ by 1 (by default), and ends at a specified number.\n\nIn *Figure 2.7*, we see\
    \ a simple `for` loop being executed printing numbers from range 0 to 3 using\
    \ the `range` function.\n\n![](img/6fc100463e273be6e8f92a077babc451_31_0.png)\n\
    \nFigure 2.7: Simple for loop in Python\n\n### while loops\n\nThe while loops\
    \ are similar to for loops and they repeat as long as a certain Boolean condition\
    \ is met.\n\nIn Figure 2.8, we see a while loop being executed with the initial\
    \ value of variable i as 1 and the end condition stating that the loop should\
    \ run till the value is less than 4. Inside the loop, we increment the variable\
    \ by 1 on each iteration. This loop terminates as soon as the variable value reaches\
    \ 4.\n\n![](img/6fc100463e273be6e8f92a077babc451_32_0.png)\n\nFigure 2.8: While\
    \ loop in Python\n\n### The break statement\n\nThe `break` statement is used to\
    \ exit from the `for` loop or a `while` loop. With the `break` statement, we can\
    \ stop the loop before it has looped through all the items.\n\nIn Figure 2.9,\
    \ a `break` statement is used to exit the loop when the value of the variable\
    \ is 2. This loop terminates after printing values 0 and 1, and it exits the loop\
    \ as soon as the value reaches 2.\n\n![](img/6fc100463e273be6e8f92a077babc451_33_0.png)\n\
    \n*Figure 2.9: Break statement*\n\n### The continue statement\n\nWith the `continue`\
    \ statement, we skip the current iteration of the loop and continue with the next\
    \ iteration of loop.\n\nIn Figure 2.10, the `continue` statement is used to skip\
    \ printing of the variable when the variable value is 2. So, the values 0, 1,\
    \ and 3 are printed, and the `print` statement is skipped using the `continue`\
    \ statement when the variable value is 2.\n\n```\nfor x in range(4):\n    if x\
    \ == 2:\n        continue\n    print(x)\n```\n\nOutput:\n```\n0\n1\n3\n```\n\n\
    *Figure 2.10: Continue statement*\n\n### Data structures\n\nData plays a very\
    \ important role in the current work environment. Data structures in Python enable\
    \ you to store data, retrieve them, and perform operations on them easily. **Lists,\
    \ tuples, dictionaries,** and **sets** are four basic types of data structures\
    \ in Python.\n\n### Lists\n\n**Lists** hold an ordered sequence of elements in\
    \ Python. Each element can be accessed by an *index*. In Python, indexes start\
    \ with **0** instead of **1**, so the first element of a list is numbered at **0**,\
    \ and the last element for a list with n elements is numbered *n - 1*. There is\
    \ also negative indexing which starts from -1 enabling you to access elements\
    \ from the last to first.\n\nLists are created by placing *comma-separated values*\
    \ inside square brackets [].\n\nIn the following figure, we see several examples\
    \ of creating and modifying a list in Python.\n\n![](img/6fc100463e273be6e8f92a077babc451_35_0.png)\n\
    \n**Figure 2.11: Lists in Python**\n\nA **for** loop can be used to access the\
    \ elements in a list one at a time.\nIn [Figure 2.12](#figure-2.12), the **for**\
    \ loop is used to iterate through each item of the list and then print the items\
    \ of this list using a **print** statement.\n\n![](img/6fc100463e273be6e8f92a077babc451_36_0.png)\n\
    \nFigure 2.12: For loop with lists\n\n### Tuples\n\nA **tuple** is similar to\
    \ a list and is an ordered sequence of elements. However, tuples are *immutable*\
    \ (they cannot be changed once they are created).\n\nTuples are created by placing\
    \ *comma-separated values* inside parentheses (). There is no **append** method\
    \ in tuple as it cannot be changed once created. In the following figure, a tuple\
    \ is created, and the **for** loop is used to iterate through each item of this\
    \ tuple, and then print them.\n\n![](img/6fc100463e273be6e8f92a077babc451_37_0.png)\n\
    \nFigure 2.13: Tuple in Python\n\n### Dictionaries\n\nA **dictionary** is a data\
    \ structure that stores *key-value pairs*. A simple analogy of a dictionary would\
    \ be a phone directory where phone numbers are keys and the names would be the\
    \ values. You can access the name by the dictionary’s phone number.\n\nDictionaries\
    \ are created by placing comma-separated **key: value** pairs inside curly braces\
    \ { } . Dictionaries work similar to lists (but you index them with keys).\n\n\
    In the following figure, we see several examples of creating, accessing, and modifying\
    \ a dictionary in Python.\n\n![](img/6fc100463e273be6e8f92a077babc451_38_0.png)\n\
    \n**Figure 2.14: Dictionaries in Python**\n\nA for loop can be used to access\
    \ the elements in a dictionary using the following methods:\n\n- items(): Loop\
    \ through the key: value pairs in the dictionary.\n- values(): Loop through the\
    \ values in the dictionary.\n- keys(): Loop through the keys in the dictionary.\n\
    \nIn Figure 2.15, we see an example to iterate through a dictionary using dictionary\
    \ keys, values, or both.\n\n![](img/6fc100463e273be6e8f92a077babc451_39_0.png)\n\
    \n**Figure 2.15: For loops with dictionary**\n\n### Sets\n\n**Sets** are a collection\
    \ of unordered elements that are unique. They only hold unique values and duplicate\
    \ values are automatically deleted in the set. Sets are created by placing comma-separated\
    \ values inside curly braces {}. In the following figure, we see an example of\
    \ creating and looping through a set in Python. Notice that the duplicate elements\
    \ are omitted in the set and a unique set of element list is printed when we loop\
    \ through this set.\n\n![](img/6fc100463e273be6e8f92a077babc451_40_0.png)\n\n\
    Figure 2.16: Sets in Python\n\n### Functions\n\n**Functions** are used to divide\
    \ the code into blocks, thus allowing you to reuse the code over time. It makes\
    \ the program easier to understand and allows you to share the code across programs.\n\
    \nFunctions in Python are defined using the `def` keyword, followed by the function’s\
    \ name. Functions are called by their name and passing appropriate arguments in\
    \ the function definition.\n\n**Example syntax is as follows:**\n\n```\ndef func_name(arguments):\n\
    \    func_operation\n```\n\nIn the following figure, we see an example of creating\
    \ a simple function to add two numbers in Python. The function is called inside\
    \ the `print` statement with the two numbers we want to add as an argument inside\
    \ the function."
  mdcn: "## 决策语句\n\n决策语句决定了程序执行流程的方向。在Python中，**if**、**else**和**elif**语句用于决策。在Python中，**缩进**用于表示代码块，而不是使用花括号，并且在Python代码中使用一致的缩进非常重要。根据*PEP\
    \ 8*风格指南，我们通常在Python中每个缩进级别使用四个空格。\n\n### if语句\n\n`if`语句用于决定是否执行某个代码块。\n\n**语法：**\n\
    \n```\nif (condition):\n    # 条件为真时执行的语句\n```\n\n在图2.4中，我们看到使用if语句检查一个变量是否大于100。在这个例子中，由于变量值为1000，因此执行打印语句，输出1000大于100。\n\
    \n![](img/6fc100463e273be6e8f92a077babc451_27_0.png)\n\n图2.3：Python中的布尔语句\n\n\
    ![](img/6fc100463e273be6e8f92a077babc451_28_0.png)\n\n图2.4：If语句\n\n### if-else\n\
    \n**else**语句允许你在**if**语句条件为*假*时执行代码。\n\n**语法：**\n\n```\nif (condition):\n    #\
    \ 条件为真时执行此代码块\nelse:\n    # 条件为假时执行此代码块\n```\n\n在*图2.5*中，变量值为10，因此执行**else**块中的**print**语句，输出10小于100。\n\
    \n![](img/6fc100463e273be6e8f92a077babc451_29_0.png)\n\n图2.5：If-else程序\n\n###\
    \ if-elif-else\n\n在这里，程序员可以在多个选项中做出选择。`if`语句从上到下执行。一旦控制`if`的某个条件为*真*，与该`if`关联的语句就会被执行，而阶梯结构的其余部分将被跳过。如果没有任何条件为*真*，则将执行最后的`else`语句。\n\
    \n**语法：**\n\n```\nif (condition):\n    statement\nelif (condition):\n    statement\n\
    .\n.\nelse:\n    statement\n```\n\n在*图2.6*中，变量值为10，因此执行`elif`块中的`print`语句，输出10大于1。\n\
    \n![](img/6fc100463e273be6e8f92a077babc451_30_0.png)\n\n*图2.6：If-elif-else程序*\n\
    \n### 循环/重复\n\nPython中有两种类型的循环：**for**和**while**。\n\n### for循环\n\n`for`循环遍历给定的序列。我们可以在Python中使用`range()`函数来循环执行一段代码指定的次数。`range()`函数返回一个数字序列，默认从0开始，默认递增1，并在指定的数字处结束。\n\
    \n在*图2.7*中，我们看到一个简单的`for`循环被执行，使用`range`函数打印从0到3的数字。\n\n![](img/6fc100463e273be6e8f92a077babc451_31_0.png)\n\
    \n图2.7：Python中的简单for循环\n\n### while循环\n\nwhile循环类似于for循环，它们只要满足某个布尔条件就会重复执行。\n\
    \n在图2.8中，我们看到一个while循环被执行，变量i的初始值为1，结束条件规定循环应运行到值小于4为止。在循环内部，我们在每次迭代时将变量递增1。一旦变量值达到4，此循环就会终止。\n\
    \n![](img/6fc100463e273be6e8f92a077babc451_32_0.png)\n\n图2.8：Python中的While循环\n\
    \n### break语句\n\n`break`语句用于退出`for`循环或`while`循环。使用`break`语句，我们可以在循环遍历所有项目之前停止循环。\n\
    \n在图2.9中，当变量值为2时，使用`break`语句退出循环。此循环在打印值0和1后终止，并在值达到2时立即退出循环。\n\n![](img/6fc100463e273be6e8f92a077babc451_33_0.png)\n\
    \n*图2.9：Break语句*\n\n### continue语句\n\n使用`continue`语句，我们跳过循环的当前迭代，并继续下一次迭代。\n\n\
    在图2.10中，当变量值为2时，使用`continue`语句跳过打印该变量。因此，打印了值0、1和3，而当变量值为2时，使用`continue`语句跳过了`print`语句。\n\
    \n```\nfor x in range(4):\n    if x == 2:\n        continue\n    print(x)\n```\n\
    \n输出：\n```\n0\n1\n3\n```\n\n*图2.10：Continue语句*\n\n### 数据结构\n\n数据在当前工作环境中扮演着非常重要的角色。Python中的数据结构使你能够轻松地存储数据、检索数据并对其执行操作。**列表、元组、字典**和**集合**是Python中四种基本的数据结构类型。\n\
    \n### 列表\n\n**列表**在Python中保存一个有序的元素序列。每个元素可以通过*索引*访问。在Python中，索引从**0**开始而不是**1**，因此列表的第一个元素编号为**0**，对于一个有n个元素的列表，最后一个元素编号为*n\
    \ - 1*。还有负索引，从-1开始，使你能够从最后一个元素访问到第一个元素。\n\n列表通过将*逗号分隔的值*放在方括号[]内来创建。\n\n在下图中，我们看到了几个在Python中创建和修改列表的例子。\n\
    \n![](img/6fc100463e273be6e8f92a077babc451_35_0.png)\n\n**图2.11：Python中的列表**\n\
    \n可以使用**for**循环来逐个访问列表中的元素。\n在[图2.12](#figure-2.12)中，**for**循环用于遍历列表的每个项目，然后使用**print**语句打印此列表的项目。\n\
    \n![](img/6fc100463e273be6e8f92a077babc451_36_0.png)\n\n图2.12：带列表的For循环\n\n###\
    \ 元组\n\n**元组**类似于列表，是一个有序的元素序列。然而，元组是*不可变的*（一旦创建就不能更改）。\n\n元组通过将*逗号分隔的值*放在圆括号()内来创建。元组没有**append**方法，因为它一旦创建就不能更改。在下图中，创建了一个元组，并使用**for**循环遍历此元组的每个项目，然后打印它们。\n\
    \n![](img/6fc100463e273be6e8f92a077babc451_37_0.png)\n\n图2.13：Python中的元组\n\n###\
    \ 字典\n\n**字典**是一种存储*键值对*的数据结构。字典的一个简单类比是电话簿，其中电话号码是键，姓名是值。你可以通过字典的电话号码来访问姓名。\n\
    \n字典通过将逗号分隔的**键: 值**对放在花括号{ }内来创建。字典的工作方式类似于列表（但你使用键来索引它们）。\n\n在下图中，我们看到了几个在Python中创建、访问和修改字典的例子。\n\
    \n![](img/6fc100463e273be6e8f92a077babc451_38_0.png)\n\n**图2.14：Python中的字典**\n\
    \n可以使用以下方法通过for循环访问字典中的元素：\n\n- items(): 遍历字典中的键: 值对。\n- values(): 遍历字典中的值。\n\
    - keys(): 遍历字典中的键。\n\n在图2.15中，我们看到了一个使用字典键、值或两者来遍历字典的例子。\n\n![](img/6fc100463e273be6e8f92a077babc451_39_0.png)\n\
    \n**图2.15：带字典的For循环**\n\n### 集合\n\n**集合**是无序且唯一元素的集合。它们只保存唯一的值，重复的值在集合中会自动删除。集合通过将逗号分隔的值放在花括号{}内来创建。在下图中，我们看到了一个在Python中创建和遍历集合的例子。请注意，重复的元素在集合中被省略，当我们遍历此集合时，打印的是唯一的元素列表。\n\
    \n![](img/6fc100463e273be6e8f92a077babc451_40_0.png)\n\n图2.16：Python中的集合\n\n###\
    \ 函数\n\n**函数**用于将代码分成块，从而允许你随着时间的推移重用代码。它使程序更容易理解，并允许你在程序之间共享代码。\n\nPython中的函数使用`def`关键字定义，后跟函数名称。函数通过其名称调用，并在函数定义中传递适当的参数。\n\
    \n**示例语法如下：**\n\n```\ndef func_name(arguments):\n    func_operation\n```\n\n在下图中，我们看到了一个在Python中创建简单函数以将两个数字相加的例子。该函数在`print`语句内部被调用，我们想要相加的两个数字作为参数传递给函数。"
