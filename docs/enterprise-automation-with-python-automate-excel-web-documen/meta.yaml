    # Structure


    In this chapter, we will cover the following topics:


    +   - Downloading files from the Internet

    - Introduction to HTML, CSS, and JavaScript

    - Extracting data from websites

    - Controlling the browser with Selenium


    # Objectives


    After studying this chapter, you will be able to automate web-based tasks such
    as extracting data from webpages, downloading files, and performing search. You
    will also get an understanding of the Python libraries for working with websites
    and HTML documents.


    # Downloading files from the Internet


    Python allows you to download web pages, HTML documents, PDF documents, videos,
    and other file types from the Internet. We will use **requests** which is a Python
    library that allows you to perform HTTP requests. One of its applications is to
    download a file from the web using the file URL.

    To install requests, use the **mu** package manager, type **requests**, and click
    on **ok**, as shown in the following figure:'
  merge: -1
  pgno: 66
- img_proc: true
  md: '![](img/6fc100463e273be6e8f92a077babc451_67_0.png)


    *Figure 5.1: Mu package manager*


    Once the library is installed, you can import it using the `import` statement.
    The **Requests** library allows you to send HTTP requests, and there’s no need
    to manually add query strings to your URLs, or to form-encode your POST data.
    HTTP defines the methods to indicate the action that needs to be performed on
    the web service. The HTTP methods available with the **Requests** library are
    as follows:


    +   - **GET**: This allows you to retrieve data from the given web link.

    - **HEAD**: This is similar to the GET request but it does not include a response
    body.

    - **POST**: This submits data to the specified web link, often causing something
    to happen in the server.

    - **PUT**: This replaces the current representations on the server with uploaded
    data.

    - **DELETE**: This deletes the specified data.

    - **CONNECT**: This establishes a tunnel to the server identified by the web link.'
