    Python has a built-in library called `smtplib` that is used for sending emails
    using the SMTP protocol. The `smtplib` can be imported using the `import smtplib`
    statement. The `smtplib` library has an SMTP function to connect to the server
    with the parameters as:


    +   1. `smtpObj = smtplib.SMTP( [host [, port [, local_hostname]]] )`


    The parameters used in the SMTP function are as follows:


    +   - `host`: This is the IP address or a domain name of the SMTP server running
    your email service.

    - `port`: This is the port number required with the host argument to point to
    the port where the SMTP server is listening. Generally, this is set to 25.

    - `local_hostname`: If your SMTP server is running on your local machine, then
    you can specify just local host to refer to the local server.


    The SMTP object has a method called `sendmail` that is used for sending the email.
    It takes the following parameters:


    +   - **The sender**: This is a string with the address of the sender.

    - **The receivers**: This is a list of strings, one for each recipient.

    - **The message**: This is a message as a formatted string (can be an HTML string
    as well).


    The `smtplib` client can communicate with a remote SMTP server by supplying the
    outgoing mail server as given in the following statement - `smtplib.SMTP(''mail.your-domain.com'',
    25)`.

