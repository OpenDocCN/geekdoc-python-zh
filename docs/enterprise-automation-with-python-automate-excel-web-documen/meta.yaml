    # CHAPTER 1

    Setting Up the Automation Environment


    # Introduction


    In this chapter, you will be introduced to the installation steps and setting
    up the development environment for Python. We will also cover the installation
    of Python packages and libraries required for building automations.


    # Structure


    In this chapter, we will cover the following topics:


    +   - Installing and getting started with Mu for Python 3

    - Installing third party packages with Mu


    # Objectives


    After studying this chapter, you will be able to set the automation environment
    on your machine. You will also get an understanding of Python development environments
    and be able to run Python on your machine.


    # Installing and getting started with Mu for Python 3


    The code with **Mu** is a simple Python editor for beginner programmers. Download
    **Mu installer** from [https://codewith.mu/en/download](https://codewith.mu/en/download).
    Find the installer you just downloaded (it’s probably in your **Downloads** folder).
    Double click on the installer to run it. If you get any warning while installing,
    accept those warnings and run the installer. Once the installation has completed
    successfully, click on **Finish** to close the installer.


    # Start Mu'
- md: "You can start Mu by clicking on the icon in the **Start** menu or by typing\
    \ **Mu** in the *Search* box. The first run will take a bit of time, and it will\
    \ install and load all the required modules. Once you have started Mu, the code\
    \ editor will look as shown in the following figure:\n\n![](img/6fc100463e273be6e8f92a077babc451_19_0.png)\n\
    \n**Figure 1.1: Mu code editor**\n\nThe button bar in **Mu** contains buttons\
    \ for creating and running the Python code along with the help instructions:\n\
    \n![](img/6fc100463e273be6e8f92a077babc451_19_1.png)\n\n**Figure 1.2: Mu code\
    \ editor toolbar**\n\nThe following are the button descriptions to help you get\
    \ started with Mu:\n\n- The **Mode** button is used for changing Mu modes. We\
    \ will use the **Python 3 Mode** in this book:\n\n![](img/6fc100463e273be6e8f92a077babc451_19_2.png)\n\
    \n![](img/6fc100463e273be6e8f92a077babc451_20_0.png)\n\n**Figure 1.3: Mu change\
    \ mode view**\n\n- The New, Load, and Save allow you to interact with files on\
    \ your computer’s hard drive:\n  - New: This creates a new blank file.\n  - Load:\
    \ This opens a file selector to choose a file to load into Mu.\n  - Save: This\
    \ saves the file to your computer’s hard drive. If the file has no name, you’ll\
    \ be asked to give one.\n- The Run button runs the current script. When the code\
    \ is running, the Run button turns into a Stop button. Click on Stop to force\
    \ your code to exit in a clean way.\n- The Debug button will start Mu’s visual\
    \ debugger allowing you to debug Python programs.\n- The REPL button creates a\
    \ new panel and the code you type here is evaluated line by line by Python.\n\n\
    You can learn more about the Mu editor from the Mu tutorial page - [https://codewith.mu/en/tutorials/1.1/](https://codewith.mu/en/tutorials/1.1/).\n\
