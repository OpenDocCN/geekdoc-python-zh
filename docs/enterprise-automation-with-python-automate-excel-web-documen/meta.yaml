    \ 时，都会将一个固定大小的块加载到内存中。如*图 5.5*所示，我们遍历响应并将大型 PDF 文档写入所需文件：\n\n![](img/6fc100463e273be6e8f92a077babc451_70_0.png)\n\
    \n在下一节中，我们将介绍用于创建互联网上可用的网页和网站的 HTML、CSS 和 JavaScript 的基础知识。掌握 HTML、CSS 和 JavaScript\
    \ 的基础知识对于成功自动化网络数据提取任务至关重要。\n\n## HTML、CSS 和 JavaScript 简介\n\n在本节中，我们将介绍网页的构建块和组件。当我们访问一个网页时，我们的网络浏览器会向网络服务器发出一个\
    \ `GET` 请求。然后服务器发回文件，告诉我们的浏览器如何为我们渲染页面。这些文件通常包括：\n\n-   **HTML**：要在浏览器中显示的主要页面内容。\n\
    -   **CSS**：用于添加样式，使网页看起来更美观。\n-   **JavaScript**：JavaScript 文件为网页添加交互性和额外功能。\n\
    -   **图像**：JPG 和 PNG 等图像文件允许网页显示图片。\n-   **其他文件格式**：这些可以是视频、文档、音频文件或任何其他文件类型。\n\
    \n在我们的浏览器接收到所有文件后，它会渲染页面并显示它。\n\n## HTML\n\n当我们执行网络抓取时，我们主要感兴趣的是网页的主要内容，即一个 HTML\
    \ 文档。HTML 代表超文本标记语言，是用于构建网站的语言。HTML 代码基于标签，这些标签提供格式化和显示文档的指令。标签以小于号 < 开始，以大于号\
    \ > 结束。\n\n例如，要使单词 Hello 加粗，你可以使用开始粗体标签 <b>，然后是结束粗体标签 </b>，像这样：\n\n```\n<b>Hello</b>\n\
    ```\n\nHTML 文档可以使用 <html> 和 </html> 标签创建。有一个 head 标签，其中包含有关页面标题和其他顶级信息的数据，还有一个\
    \ body 标签，其中包含页面的主要内容。对于网络抓取，我们主要对 HTML 页面 body 标签内的内容感兴趣。\n\n常用的 HTML 标签有：\n\n\
    -   `<!-- ... -->`：定义注释。\n-   `<!DOCTYPE>`：定义文档类型。\n-   `<a>`：定义超链接。\n-   `<audio>`：定义嵌入式声音内容。\n\
    -   `<b>`：定义粗体文本。\n-   `<body>`：定义文档的主体。\n-   `<br>`：定义单个换行符。\n-   `<button>`：定义按钮。\n\
    -   `<caption>`：定义表格标题。\n-   `<dialog>`：定义对话框或窗口。\n-   `<div>`：定义文档中的一个部分。\n-\
    \   `<footer>`：定义文档或部分的页脚。\n-   `<form>`：定义用于用户输入的 HTML 表单。\n-   `<h1>` 到 `<h6>`：定义不同大小的\
    \ HTML 标题，其中 h1 最大。\n-   `<head>`：包含文档的元数据/信息。\n-   `<html>`：定义 HTML 文档的根。\n-\
    \   `<img>`：定义图像。\n-   `<input>`：定义输入控件。\n-   `<label>`：为 `<input>` 元素定义标签。\n\
    -   `<li>`：定义列表项。\n-   `<ol>`：定义有序列表。\n-   `<option>`：定义下拉列表中的一个选项。\n-   `<p>`：定义段落。\n\
    -   `<pre>`：定义预格式化文本。\n-   `<select>`：定义下拉列表。\n-   `<span>`：定义文档中的一个部分。\n-   `<style>`：定义文档的样式信息。\n\
    -   `<table>`：定义表格。\n-   `<tbody>`：对表格中的主体内容进行分组。\n-   `<td>`：定义表格中的一个单元格。\n-\
    \   `<th>`：定义表格中的一个表头单元格。\n-   `<title>`：定义文档的标题。\n-   `<tr>`：定义表格中的一行。\n-   `<ul>`：定义无序列表。\n\
    -   `<video>`：定义嵌入式视频内容。\n\nHTML 文档有一个 id 属性，用于为 HTML 元素指定唯一的 ID。id 属性对于自动化基于网络的任务特别有用。id\
    \ 的值在 HTML 文档中是唯一的。在 HTML 文档中，id 为特定标签声明，如下例所示：\n\n```\n<h1 id=\"myId\">My Id</h1>\n\
    ```\n\nHTML 文档还有一个 class 属性，可用于识别元素。多个元素可以在 HTML 文档中拥有相同的类。在 HTML 文档中，class 为特定标签声明，如下例所示：\n\
    \n```\n<div class=\"myClass\"> </div>\n```\n\n一个简单的 HTML 代码片段如下所示，当它在浏览器中显示时将打印\
    \ Hello World：\n\n```html\n<html>\n<head>\n</head>\n<body>\n    <h1>Hello World</h1>\n\
    </body>\n</html>\n```\n\n## CSS\n\nCSS 用于设置网页样式，它代表层叠样式表。它描述了 HTML 元素在屏幕、纸上或其他媒体上的显示方式。它可以在不同的网页中重复使用，通常存储在\
    \ CSS 文件中。CSS 文档通常对网络自动化目的没有用处，因为它们只定义网页的样式，而不是其内容。以下示例是一个示例 CSS 文件，其中所有 `<p>`\
    \ 元素都居中对齐，文本颜色为黑色：\n\n```css\np {\n    color: black;\n    text-align: center;\n\
    }\n```\n\n## JavaScript\n\nJavaScript 是一种类似于 Python 的编程语言，是用于设计网页的主要编程语言。JavaScript\
    \ 用于更改 HTML 内容和操作 HTML 文档。"
