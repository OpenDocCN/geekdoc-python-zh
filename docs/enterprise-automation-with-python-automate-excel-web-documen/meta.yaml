    \ 函数接受两个参数作为参数，即文件位置和模式。使用 `open` 函数打开文件有四种不同的模式：\n\n-   r：读取 - 打开文件进行读取。\n- \
    \  a：追加 - 打开文件以添加更多数据，如果文件不存在则创建一个新文件。\n-   w：写入 - 打开文件进行写入，如果文件不存在则创建一个新文件。\n\
