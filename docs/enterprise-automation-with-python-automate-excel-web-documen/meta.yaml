  md: '# # CHAPTER 9


    # ## Image Based Automations


    # ### Introduction


    In this chapter, we will look at computer image fundamentals and the **Pillow**
    Python library for manipulating images. We would also look at the OCR libraries
    to extract text within images and scanned documents.


    # ### Structure


    +   In this chapter, we will cover the following topics:

    - Computer image fundamentals

    - Pillow for image manipulation

    - Extracting text from images using OCR


    # ### Objectives


    After studying this chapter, you will be able to manipulate and modify computer
    images, and extract text from scanned documents and images. You will also learn
    about **Optical Character Recognition (OCR)** which is a technique used to extract
    text from saved images.


    # ### Computer image fundamentals


    A computer image consists of a **picture element (pixel)** which is the smallest
    component of a computer image. When an image is manipulated by the computer, the
    pixel is a dot of a single color and the image is made up of pixels on a rectangular
    grid. The resolution of the image is the number of points in the grid; for example,
    *1920x1080* means that the image is *1920* pixels wide by *1080* pixels high.


    There are a large number of formats for storing digital images. Most of the image
    formats were developed to be used by particular programs but few of'
  merge: -1
  pgno: 139
- img_proc: true
  md: 'them have become image format standards and can be used across a variety of
    applications. These image formats are also called Bitmap formats where Bitmap
    is the memory organization to map pixels for storing images. The following are
    the most commonly used image formats by different applications:


    +   - **CompuServe Graphics Interchange Format (GIF)**: This image format is used
    for file interchange and it has a good compression algorithm built into the format.

    - **Tagged Image File Format (TIF/TIFF)**: This is a flexible image format with
    a number of compression algorithms.

    - **Joint Photographic Experts Group (JPG/JPEG)**: This is an image format which
    is developed as a standard by ISO and CCITT. It has a very good compression algorithm
    for continuous-tone images. For most images, this format can compress and reduce
    the size of the images to be 20 times smaller. This format does not support transparency
    or transparent backgrounds.

    - **Portable Network Graphics (PNG)**: It is one of the most used image formats
    on the Internet. It can display transparent backgrounds and was created to replace
    the GIF format. It is an open format with no copyright limitations and it compresses
    images without any loss of image data (also known as lossless compression which
    involves reducing the size of the file without any loss of quality). This format
    supports transparency and transparent backgrounds.


    In the next section, we will look at the Pillow image library that can be used
    to manipulate images and modify image properties.


    # Pillow for image manipulation


    Pillow is a Python library used to manipulate images and it is based on the Python
    Imaging Library (PIL). The Pillow library adds image processing capabilities and
    provides extensive support for converting image files from one format to another.


    To install the Pillow library, use the mu package manager, type pillow, and click
    on ok as shown in Figure 9.1:'
