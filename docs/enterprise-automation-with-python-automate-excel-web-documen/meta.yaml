    of a class), pass the name of the application''s module, or use `__name__` as
    a convenient shortcut. This is required to let the **Flask** know the location
    to look for resources such as templates and static files.


    We then use the `route()` decorator to specify the URL path to trigger the function.
    A **decorator** in Python is a function that extends the behavior of another function
    without explicitly modifying it. We use the `@my_decorator` syntax to easily call
    the decorator function.


    After using the `route()` decorator, we can call any function and return the data
    we want to show in the document. The default content type is HTML so when you
    pass an HTML string, the HTML data would be rendered by the browser.


