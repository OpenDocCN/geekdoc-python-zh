- md: '## Updating a workbook


    In this section, we will look at ways to update an existing workbook, and add
    or remove new data to the workbook.


    To update, add, or remove data to an existing cell, use the cell assessor (like
    *A1*) and set its value to the new value as required. In Figure 4.11, we see an
    example where we add new data to **test_workbook** and print the data using the
    **iter_rows()** function:


    *Figure 4.10: Iterating through individual row and its value*


    Figure 4.11: Updating the workbook with new data


    You can also add or remove worksheets by using the **openpyxl** library. To add
    a new worksheet, use the **create_sheet(sheet_name)** function, to copy the worksheet,
    use the **copy_worksheet(sheet_name)** function, and to remove the worksheet,
    use the **remove(sheet_name)** function as shown in the following figure:


    Figure 4.12: Adding new workbooks to the Excel


    ## A sample of Excel-based automation


    In this section, we will look at a simple example of Excel automation where you
    need to move some data from one Excel file to another Excel file.


    In Figure 4.13, we can take a look at an example where we want to copy columns
    1 and 2 from the source workbook to the destination workbook. To achieve this,
    we can add the number of rows in the source workbook using the max_row method
    (number of columns in a workbook can be found similarly using the max_column method).
    Then, we loop through all the rows and required columns using the for loop function,
    getting the value from the source workbook, storing it in the variable, and then
    storing it in the destination workbook for the same row and column number. We
    then save the destination file using the .save() function:


    Figure 4.13: Copying columns 1 and 2 to another workbook


    The preceding automation would work when the source and destination workbook exist
    and Figure 4.14 shows the data of the source workbook:


    Figure 4.14: Source workbook with sample data


    Figure 4.15 shows the data of the destination workbook with column 1 and 2 copied
    from the source workbook when we run the copying data automation:


    Figure 4.15: Destination workbook with column 1 and 2 copied from source workbook


    ## CSV file automations


    Python also has libraries and functions to manipulate CSV files. A *CSV* file
    is a *Comma Separated Values* file that contains a list of data where different
    elements are separated by a comma. These files are often used for exchanging data
    between different applications.


    Python has an inbuilt CSV module which can be imported using the *import csv*
    command. This module provides functions to read, write, and update CSV files.
    As shown in *Figure 4.16*, we can use the CSV module to read the *test_file* CSV
    file using the *reader()* function, and update the file with the new data using
    the *writer()* function. Note, Python also has file I/O functions and we can open
    the file using the *open()* function as shown in the following figure. The argument
    *a+* in the *open()* function used in *line 10* is used to denote that we want
    to open the file to append the new data in it:


    Figure 4.16: Using CSV reader and writer to manipulate CSV files


    Figure 4.17 shows the CSV file before the *csv_automation* program was executed:


    *Figure 4.17: CSV file before update*


    *Figure 4.18* shows the CSV file after the *csv_automation* program was executed
    adding new data on *row number 3*:


    *Figure 4.18: Openpyxl being installed in Mu*


    You can also create new CSV files, manipulate data inside a CSV file, and convert
    a CSV file to JSON format or Python object using the CSV library.


    ## Conclusion


    In this chapter, we looked at basic Excel methods to manipulate and automate Excel-based
    tasks. We looked at different ways to use the *openpyxl* library to read, write,
    and update Excel files. We also went through the CSV module in Python to read,
    write, and update CSV files.


    In the next chapter, we will take a look at the various techniques to implement
    automation with a variety of online websites. We will discuss the Python modules
    to help with website-based dataset automations and various examples of automations
    that can be performed for different types of websites.


