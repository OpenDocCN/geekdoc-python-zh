- md: "Figure 11.3: Output from the Python webserver\n\nFlask provides the ability\
    \ to create dynamic routes with variables. You can add the variable sections in\
    \ the URL route by marking the sections with `<variable_name>`. The function then\
    \ receives the `variable_name` as a keyword argument. It is important to note\
    \ that when returning HTML data in **Flask** (which is its default type), if there\
    \ are any user-provided values, they must be escaped to protect from injection\
    \ attacks. The `escape()` function from the markup safe provides the functionality\
