- md: "## Using machine learning for automation\n\nArtificial Intelligence (AI) is\
    \ a very broad field with many subareas and involves the study of automated recognition\
    \ and understanding of signals, reasoning, planning, and decision-making learning,\
    \ and adaptation. Machine Learning (ML) is a type of AI that provides computers\
    \ with the ability to learn without being explicitly programmed.\n\nMachine learning\
    \ can be subdivided into three main categories which are as follows:\n\n- **Supervised\
    \ learning**: This involves labeled data and can be used for **classification**\
    \ (grouping similar instances) and **regression** (learning *what normally happens*\
    \ to draw inferences from datasets). For example, learning to classify emails\
    \ as spam and not spam-based on training data of spam and not spam email messages.\n\
    - **Unsupervised learning**: This involves unlabeled data and can be used to discover\
    \ patterns in the dataset. For example, learning the patterns in the *English*\
    \ language from the *Wikipedia* pages.\n- **Reinforcement learning:** This involves\
    \ learning from experimentation based on rewards and feedback loop and can be\
    \ used to train agents in simulated environments. For example, teaching a bot\
    \ to play a computer game, and maximize the score, and chances of winning will\
    \ use a **Reinforcement Learning (RL)** algorithm.\n\nMachine learning allows\
    \ you to learn from data and create automations without explicitly programming\
    \ the automations. It can also help you identify repeatable processes performed\
    \ in the organizations.\n\nPython has a lot of libraries and scripts to perform\
    \ ML on datasets with libraries such as `PyTorch`, `TensorFlow`, `Keras`, `scikit-learn`,\
    \ and so on. Training ML models requires a lot of data and computational power.\
    \ For our automation requirements, generally a pre-trained ML model would work\
    \ most of the time.\n\nWe will look at the `PyTorch` library to perform text summarization\
    \ with a pre-built model. **Hugging Face** ([https://huggingface.co/](https://huggingface.co/))\
    \ provides pre-trained ML models for a variety of tasks audio classification,\
    \ image classification, object detection, question answering, summarization, text\
    \ classification, translation, and so on.\n\nTo install the **Hugging Face** with\
