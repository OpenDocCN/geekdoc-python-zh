    The following is an example of simple JavaScript code that can be used to change
    the heading of the HTML document:


    1. `const docHeading = document.querySelector(''h1'');`

    2. `docHeading.textContent = ''New Heading'';`


    When we add this code to the HTML document, when the code is executed it will
