- img_proc: true
  md: 'If you are an experienced programmer, then you can also use other Python code
    editing tools such as **PyCharm**, **VS Code**, **Jupyter** notebook, or any other
    code editor tool that works for you.


    # ## Installing third party packages with Mu


    In this book, we will use a lot of third party packages to complete our automation
    scripts. Packages (sometimes called **libraries** or **modules**) are re-usable
    code that you can download, install, and use in your programs. They reduce the
    development time exponentially as you don''t have to rewrite the code to achieve
    the same functionality in your project.


    One of the main advantages of Python is that they have a huge collection of packages
    that allow you to achieve the desired functionality in your programs.


    Mu comes with its own package installer which will download the code from the
    **Python Package Index pypi.org** and install it so that you can use it in your
    Mu projects.


    To install a package Mu, click on the `Mu Administration` cog in the bottom right
    of the page. It is the *Setting* shaped button which is used to install Python
    packages and change settings for the code editor:


    ![](img/6fc100463e273be6e8f92a077babc451_21_0.png)


    *Figure 1.4: Mu code editors settings button*


    Select the `Third Party Packages` tab as shown in the following screenshot:'
  merge: -1
  pgno: 21
- img_proc: true
  md: '![](img/6fc100463e273be6e8f92a077babc451_22_0.png)


    Figure 1.5: Mu package installer page


    Enter the name of the package you wish to install and click on OK. The package
    will be downloaded and installed.


    Advanced users can also install third party packages using `pip` - the package
    installer for Python.


    # Conclusion


    In this chapter, we discussed about the steps to set up the Python development
    environment. In the next chapter, we will go through the fundamentals of Python
    to get you up and running with automating your day-to-day enterprise tasks.


