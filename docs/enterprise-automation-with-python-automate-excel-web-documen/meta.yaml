  md: 'function of this class where a factor of 1.0 is the original image color, a
    factor of 0.0 is a blurred image, and a factor higher than 1.0 gives a sharpened
    image.


    Figure 9.4 shows an example of using the ImageEnhance module to increase the sharpness
    of the image:


    ```

    import os

    from PIL import Image

    from PIL import ImageEnhance


    infile = "loadImage.png"

    image = Image.open(infile)


    enhancer = ImageEnhance.Sharpness(image)

    enhancer.enhance(2).save(''loadImageSharpened.png'')

    ```


