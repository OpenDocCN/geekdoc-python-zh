    ## Basics of the Python Code


    There are various different parts of the Python code that we are able to work
    with. These are needed to help us handle the various parts of coding, and to make
    it easier to write some of the programs and more that we need. That is why we
    are going to devote the first section of this part on some of the basic parts
    of the Python code that we need to focus on.


    To start here, we need to have a discussion about the Python keywords. These keywords
    are going to be used to tell the compiler a command that you would like to use.
    These need to be put at the right parts of the code to help give the compiler
    a command and ensure that the program is going to continue working the way that
    we want. Moving them around or using them in an improper manner is going to confuse
    the compiler, and will result in an error message showing up and you will need
    to go back and make some adjustments.


    Naming your identifiers is going to be important when it comes to writing out
    some of the codes that you want to do in the Python language. Working with these
    kinds of codes is not meant to be difficult, but we want to make sure that we
    are naming some of the different parts in a way that makes sense, and allows us
    the option to get them to come back later.


    There are a number of identifiers that you are able to work with when it comes
    to the Python language. You will find that these can go by the names of classes,
    entities, variables, and functions. The good news is that no matter what identifier
    you choose to go with, you will follow the same general rules for naming them.
    As a beginner, this is going to be good news that can help you handle the work
    a bit better, and will make it easier to stay on track with some of that work
    as well.


    The first rule to remember is when you name these identifiers. You have many options
    when you are naming your identifiers. For example, you can rely on both uppercase
    and lowercase letters with naming, as well as any number and the underscore symbol.
    You can also combine any of these together. One thing to remember here is that
    you can’t start the name with a number and there shouldn’t be any spaces between
    the words that you write out. So, you can’t write out 3words as a name, but you
    can write out words3 or threewords. Make sure that you don’t use one of the keywords
    that we discussed above or you will end up with an error.


    When you pick out the identifier name, you can follow the rules above, and try
    to pick out a name that you can remember. Later on when writing the code, you
    will need to pull it back up, and if you give it a name that is difficult to remember,
