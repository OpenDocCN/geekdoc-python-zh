    \n```\nclass CustomException(Exception):\n    def __init__(self, value):\n   \
    \     self.parameter = value\n    def __str__(self):\n        return repr(self.parameter)\n\
    \ntry:\n    raise CustomException(\"This is a CustomError!\")\nexcept CustomException\
