    ## How SWIFT Generates Revenue


    As pointed out earlier, SWIFT operates as a cooperative society. The members are
    the owners of the system of information exchange. Membership and ownership of
    SWIFT is based on shares owned. This is used to categorize owners in different
    categories. One of the revenue streams enjoyed by SWIFT is sharing fees paid by
    members. This is a one-off payment that also includes a support charge payable
    annually.


    The clusters are used to determine the amount of support charges different members
    pay. SWIFT also generates income via information exchange fee. This fee is payable
    by members for messages received and sent. However, the fee varies based on length
    and type of message sent or received. Additionally, charges for message volumes
    are also tiered to ensure that messages received by financial institutions are
    considered.


    Moreover, SWIFT has also generated revenue from various additional services it
