    \n首先要介绍的是布尔值、字符串和数字。我们能够使用的一些支持的数字类型包括 int、int8、int16、uint、uint8、uint16 等等。然后我们可以使用字符串，它们对我们的代码很重要，因为它们将为我们存储一个字节序列。它将被表示，并使用关键字\
