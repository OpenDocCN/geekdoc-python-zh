    ## 编码与编程


    编码只是编程的一部分，它涉及编写一系列代码行，但另一方面，编程是整个过程，它既包括输入也包括输出，其中，算法过程、编码、分析、实施、理解数据结构和解决问题等，都得到了充分的执行。


