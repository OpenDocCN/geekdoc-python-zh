    ## Dangers of Machine Learning


    In computer science field, machine learning focuses on the bequeathing of artificial
    intelligence, that resembles humans’, to machines. Coined in 1956 by Arthur Samuel,
    machine learning uses algorithms to give machines higher functionalities associated
    with humans such as learning and analyzing data to make predictions. As a pioneer
    who revolutionized scholarly knowledge on artificial intelligence, Arthur Samuel
    envisioned a world where machines have autonomy and intelligence to make decisions
    without the assistance of humans (Langford, 2018).


    Machine learning is all about imitating the process of human learning through
    a number of steps, which is also called algorithms. There could be supervised
    learning, unsupervised learning or reinforced learning (Gupta, 2018). In the last
    decade, Machine Learning has evolved into a more advanced science known as Deep
    Learning. This evolutionary transformation seeks to allow computers to carry out
    tasks based on concrete examples keyed by the algorithms rather than operate at
    the direction of set rules. These advances in computing technologies and artificial
    intelligence may herald a new era of computers. When incorporated into the mainstream
    society, these advances could radically transform our world and potentially have
    significant repercussions on the human race (Langford, 2018).


    Companies are increasingly suing machine learning to carry out critical tasks
    including data analysis and interpretation to identify and correct errors. This
    is especially important when it comes to assessing legal contracts and employee
    performance review and appraisal. Employee misconduct can be detected by analyzing
    communication transcripts not only with customers but also with other employees.
    New tools machine learning tools that are user-friendly are increasing being developed
    by companies such as Microsoft and Amazon Web Service Inc. These new tools are
    easier to use and do not require a lot of technical knowhow (Debrusk, 2018).


    Machine Learning (ML) has its share of advantages; Machine learning enables users
    to predict outcomes using past data sets, with the Machine learning process, it
    is possible to train the system with new set of data when there is change. In
    the traditional programming, one may have to write completely new program or make
    changes in the business rules, machine-learning algorithms work to optimize the
    whole decision-making process in multiple ways.


    Machine Learning can be used in hospital settings to diagnose and facilitate the
    treatment of diseases with high levels of accuracy and success. This new system
    achieves this functionality by reviewing patient data. Additionally, the system
    can use the data to prevent suicides by identifying high-risk individuals (Langford,
    2018).


    Additionally, cars with artificial intelligence have an increased capacity to
    predict the likelihood of other road users changing lanes with a significant level
    of accuracy. Such cars come fitted with high resolution cameras and sensors. They
    use these features to master their environment. These capabilities could potentially
    reduce road accident by a significant percentage.


