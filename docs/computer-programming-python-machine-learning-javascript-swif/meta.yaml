    ## 第 7 章：GoLang 与 Python 的比较


    对于程序员来说，找到一种合适的、可扩展的编程语言，以满足日益增长的向使用具有更大缓存和更多核心的处理器的转变，是一种受欢迎的缓解。这是因为，除了这些硬件改进之外，许多硬件制造商也在越来越多地开发具有并发和超线程或多线程能力的系统。如果在开发兼容软件时没有使用正确的编程语言，这些改进可能会减慢计算机系统的速度。尽管来自不同的计算时代，Python
    和 GoLang 编程语言因其独特的特性而在编程界获得了突出地位。虽然它们有一些相似之处，但这两种语言具有不同的特性和属性，使它们与众不同。


    GoLang 编程也被称为 Go，是编程领域的新秀之一。GoLang 于 2009 年推出，是 Google 的智慧结晶。作为 Google 的专有编程语言，GO
    专门开发为一种新一代语言，旨在推动编程的范式转变。它由 Google 程序员 Ken Thompson、Robert Griesemer 和 Rob Pike
    开发。该语言的各个方面都是围绕这个目标设计的。Go 的一个定义性特征是内置的并发性。


    这允许程序员通过访问在系统开发中越来越多地使用的多核处理器的改进功能来轻松开发并发程序。并发性是通过使用 goroutines 实现的，goroutines
    可以数百万次地旋转，而对内存的影响最小。这是因为 goroutines 消耗更少的内存，并且具有用于通信的内置通道。这导致 Go 的运行时更快，因为计算完成得更快。此外，它们的分段轨道是可扩展的，从而实现高效的内存使用。程序员管理内存，并可以根据需要自定义程序运行。


    另一方面，1991 年发布的 Python 编程语言缺乏内置的并发性。相反，并发应用程序的开发是通过多线程实现的。这消耗了堆大小内存的很大一部分。由此产生的内存压力导致系统关闭。用于使用
    Python 语言实现并发的扭曲线程缺乏在并发应用程序之间有效传输数据的通道。这使得 Python 的并发能力有限，从而导致更慢的计算和运行时。程序员无法自定义程序运行，因为
    Python 没有内存管理选项。


    Python 和 Go 都使用简单的语法，通过减少复杂性和混乱来实现更高的可读性。GoLang 的大多数高级类型对应于 Python 的语法。尽管两种语言在语法的简单性原则上存在这种相似性，但它们的语法存在根本差异。Go
    依赖于静态类型，这导致编写代码的速度相对较慢。代码块使用开括号和闭括号表示。使用 GoLang 的程序员还享受更多的新字符。相比之下，Python 的动态类型在编写代码时更快，使用缩进来标记代码块。此外，字符较少，这使其容易出现编码错误。使用
