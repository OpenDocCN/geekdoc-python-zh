    此外，配备人工智能的汽车能够以显著的准确度预测其他道路使用者改变车道的可能性。这类汽车配备了高分辨率摄像头和传感器。它们利用这些特性来掌握周围环境。这些能力有可能将交通事故减少相当大的比例。


