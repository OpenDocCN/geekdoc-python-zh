- md: "**Web browser based games creation.** Today’s web browsers are designed with\
    \ the goal of tapping into the popularity of computer games. They come with games\
    \ already embedded into them which can be played directly by users. JavaScript\
    \ is the scripting language used in creating these games. It can also be used\
    \ to power such activities.\n\n**Back end web** This is still the work of JavaScript.\
    \ What you see on every screen, mostly on the front end of things. However, all\
    \ this will not have happened without the presence of a dynamic and versatile\
    \ enough scripting language, which can also work on back end infrastructure.\n\
    \n## The JavaScript Basic Parts\n\nThe first basic part of JavaScript that we\
    \ are going to work with is the value. There are going to be two types of values\
    \ that we are going to spend our time on when it comes to using this coding language.\
    \ They are going to be known as a fixed value or a variable value. If you are\
    \ dealing with some literals in the language, then you are basically dealing with\
    \ a value that is fixed, and then the variable values are going to move around\
    \ and change as needed.\n\nBefore we work on these, we need to learn a few rules\
    \ that will make it easier to write out some of the fixed values or the variable\
    \ values in JavaScript. First, the numbers are going to be defined either with\
    \ or without a decimal, and then the strings that show up are going to be the\
    \ text that will have either a single or a double quote that goes around it.\n\
    \nVariables are another thing that works well with the JavaScript language. These\
    \ are going to be identified when you use the var keywords so that the program\
    \ is going to see that this is the kind of value that we want to work with. When\
    \ you are focusing on these variable values, you will want to assign a value over\
    \ to it, and using the equal sign is going to be the best way to get this done.\n\
    \nNext on the list is going to be the operators. These are going to hold onto\
    \ a special part when it is time to handle some of the work that we want to do\
    \ with JavaScript. They are going to help us to assign a value over to the variable,\
    \ and can help us with some of the basic mathematical parts of the code as well.\
    \ In JavaScript, we are going to find two basic types of operators that we need\
    \ to work with including:\n\n- Assignment operator—this is the one that you will\
    \ use in order to assign a value, or values, to your variable. You will use the\
    \ equal sign (=) to show this relationship.\n- Arithmetic operators—these are\
    \ the operators that are going to be used for the various arithmetic operations\
    \ that you may use in your program including subtraction and addition and division\
    \ and multiplication. You will use the signs (+ - * /) to show these.\n\nAlong\
    \ the way, we also need to work with an option that is known as the expressions.\
    \ These are going to be when you take a combination of values, variables, and\
    \ operators and add them in together to make the code that you want. The expression\
    \ is going to be unique because they will contain some of the other variable values,\
    \ including strings and numbers. For example, you could write out “Java” + “Script”\
    \ and then the computation of this would be JavaScript. A good example of how\
    \ this is going to look when we write it out in code form will include the following:\n\
    \n```html\n<html>\n<body>\n<script>\nvar a = 400;\nvar b = 1;\nvar str1 = \"Java\"\
    ;\nvar str2 = \"Script\";\ndocument.write(\"Addition of a + b = \" + (a + b) +\
    \ \"<br>\");\ndocument.write(\"Concat of str1 + str2 = \" + (str1 + str2));\n\
    </script>\n</body>\n</html>\n```\n\nWhen you go through and have the program execute\
    \ the code that we just wrote above, you will get the output:\nAddition of a +\
    \ b = 401\nConcat of str1 + str2 = JavaScript\n\nYou can always add in a few things\
    \ or change out some things when you are working on this code. You can add in\
    \ a few different words or send out a whole string in order to write anything\
    \ that you would like. There are so many things that you are able to do when you\
    \ are working with the code so don't feel like you are limited with what we are\
    \ writing here.\n\n## Placing the Script Properly\n\nWhen you are working with\
    \ this kind of code, there is going to be a bit of flexibility when you make a\
    \ choice of where to place the code in an HTML document. There are going to be\
    \ a few ways that you can place some of the codes that you would like to use in\
    \ this language and some of these are going to include the following:\n\nThis\
    \ is the way that most people prefer to include their code. You will be able to\
    \ place the functions in the head section and then have access to the functions\
    \ on your web page. One way that you would be able to do this is shown in the\
    \ following section:\n\n```html\n<html>\n<head>\n<script type=\"text/javascript\"\
    >\nfunction showAlert() {\n    alert(\"This is an alert from the Head section.\"\
    );\n}\n</script>\n</head>\n<body>\n<input type=\"button\" onclick=\"showAlert();\"\
    \ value=\"Call JavaScript\"/>\n</body>\n</html>\n```\n\nWhen we execute this kind\
    \ of code with the help of HTML, you are going to get the output that is an alert\
    \ message. And this alert message is going to say “This is an alert from the Head\
    \ section.” When you click on the button that is on the web page, that is the\
    \ message that you will be able to see. Of course, you are able to change up the\
    \ message that you would like to have in there, setting it up to say whatever\
    \ works the best for the code you want to write.\n\n## JavaScript in body section\n\
    \nWhile the header is going to be one of the most common places where a programmer\
    \ is going to put their code of JavaScript, it is also possible to make sure that\
    \ it is placed somewhere within the body of your HTML code. But keep in mind that\
    \ while this is something that you can possibly do, it is not going to be the\
    \ method that most programmers prefer. Despite this not being the method that\
    \ most people like to use, you do have the option for almost any coding that you\
    \ want. The syntax that you are able to work with in order to get started with\
    \ adding in this code so that it is on the body of your page is going to include:\n\
    \n```html\n<html>\n<body>\n<script type=\"text/javascript\">\ndocument.write(\"\
    Welcome to JavaScript Tutorials!\");\n</script>\n<p>Body section of the HTML document.</p>\n\
    </body>\n</html>\n```\n\nThe output that you are going to get when you add this\
    \ into the body of your HTML program, you will get “Welcome to JavaScript Tutorials!”\
    \ to show up on the screen in the location where you place this.\n\nPutting JavaScript\
    \ in both head and body sections\n\nThe third place we can look when it is time\
    \ to handle some of our JavaScript code is placing it in the head sections and\
    \ the body as well. You can do this with any of your HTML documents that you would\
    \ like. The code that we will need to use to make this happen will include:\n\n\
    ```html\n<html>\n<head>\n<script type=\"text/javascript\">\nfunction showAlert()\
    \ {\n    alert(\"This is an alert from the Head section!\");\n}\n</script>\n</head>\n\
    <body>\n<script type=\"text/javascript\">\ndocument.write(\"Welcome to JavaScript\
    \ Tutorials!\");\n</script>\n<p>Body section of the HTML document.</p>\n<input\
    \ type=\"button\" onclick=\"showAlert();\" value=\"Call JavaScript\"/>\n</body>\n\
    </html>\n```\n\nThe output that we will be able to get when we use this method\
    \ to execute the code in our HTML document is going to get us a new alert box.\
    \ This one is going to come up with the statement that says “This is an alert\
    \ from the Head section!” On the screen behind the alert box you will get “Welcome\
    \ to JavaScript Tutorials!” on one line and then “Body section of the HTML document”\
    \ on the other line. This is just one of the examples of what you are able to\
    \ do when placing JavaScript coding in different parts of the body of your HTML.\n\
    \n## Adding in JavaScript into an external file and then into the heading section\n\
    \nThis is actually one of the best ways that you can add your code to your webpage.\
    \ Using an external file that has the extension jscode.js. You can then add this\
    \ into the heading section of your HTML document. All of the functions that you\
    \ have in this file can be called by different web elements throughout the body\
    \ of your HTML document. A way to add the external file in the heading file of\
    \ the document is in the following syntax:\n\n```html\n<html>\n<head>\n<script\
    \ type=\"text/javascript\" src=\"jscode.js\"></script>\n</head>\n<body>\n<p>Body\
    \ section of the HTML document.</p>\n<input type=\"button\" onclick=\"showAlert();\"\
    \ value=\"Call JavaScript\"/>\n</body>\n</html>\n```\n\nLet’s take a moment to\
    \ look at what this code is trying to tell us. When you try to store the value\
    \ of your variable, you are doing a process called variable initialization. You\
    \ are able to do this process at any time when you want to create the variable\
    \ or even at the time that you want to use the variable.\n\nFor example, in the\
    \ above code, there are four different variables that are available and each of\
    \ them has a value that is assigned to them. One of the variables is assigned\
    \ to salary = 10000 and another one is assigned to name = “Appy”.\n\nSo when it\
    \ is time to execute the program, the information that is going to come up on\
    \ the screen will be:\n\n```\nName: Appy  Age: 21\nSalary: 10000  Expenses: 12000\n\
    ```"
  mdcn: "**基于网页浏览器的游戏创作。** 当今的网页浏览器设计目标之一是利用电脑游戏的流行度。它们内置了游戏，用户可以直接玩。JavaScript 是创建这些游戏所使用的脚本语言。它也可以用来驱动此类活动。\n\
    \n**后端网页开发** 这仍然是 JavaScript 的工作范畴。你在每个屏幕上看到的内容，大多属于前端。然而，如果没有一种足够动态和通用的脚本语言（它也能在后端基础设施上工作），这一切都不会发生。\n\
    \n## JavaScript 基础部分\n\n我们将要学习的第一个 JavaScript 基础部分是**值**。在使用这种编程语言时，我们将主要关注两种类型的值。它们将被称为**固定值**或**变量值**。如果你处理的是语言中的一些字面量，那么你基本上处理的是一个固定的值；而变量值则会根据需要移动和变化。\n\
    \n在开始之前，我们需要学习一些规则，以便更容易地写出 JavaScript 中的固定值或变量值。首先，数字可以定义为带小数点或不带小数点的形式；然后出现的字符串将是文本，其周围会有单引号或双引号。\n\
    \n变量是另一种与 JavaScript 语言配合良好的元素。当你使用 `var` 关键字时，它们将被识别出来，这样程序就会知道这是我们想要处理的那种值。当你专注于这些变量值时，你会想要给它赋一个值，而使用等号（=）是完成此操作的最佳方式。\n\
    \n接下来要介绍的是**运算符**。在处理我们想要用 JavaScript 完成的一些工作时，它们将占据一个特殊的位置。它们将帮助我们将值赋给变量，并且也能帮助我们处理代码中一些基本的数学部分。在\
    \ JavaScript 中，我们将找到两种需要使用的基本运算符类型，包括：\n\n-   **赋值运算符**——这是你用来将一个或多个值赋给变量的运算符。你将使用等号（=）来表示这种关系。\n\
    -   **算术运算符**——这些是用于程序中各种算术运算的运算符，包括减法、加法、除法和乘法。你将使用符号（+ - * /）来表示它们。\n\n在此过程中，我们还需要使用一个称为**表达式**的选项。表达式是当你将值、变量和运算符组合在一起，以生成你想要的代码时形成的。表达式是独特的，因为它们会包含一些其他的变量值，包括字符串和数字。例如，你可以写出\
    \ `\"Java\" + \"Script\"`，然后它的计算结果将是 `JavaScript`。一个用代码形式写出时看起来如何的好例子将包括以下内容：\n\
    \n```html\n<html>\n<body>\n<script>\nvar a = 400;\nvar b = 1;\nvar str1 = \"Java\"\
    ;\nvar str2 = \"Script\";\ndocument.write(\"Addition of a + b = \" + (a + b) +\
    \ \"<br>\");\ndocument.write(\"Concat of str1 + str2 = \" + (str1 + str2));\n\
    </script>\n</body>\n</html>\n```\n\n当你执行我们刚刚编写的代码时，你将得到输出：\nAddition of a + b\
    \ = 401\nConcat of str1 + str2 = JavaScript\n\n你总是可以在处理这段代码时添加一些内容或更改一些内容。你可以添加一些不同的单词或输出整个字符串，以编写任何你想要的内容。在使用代码时，你能做的事情非常多，所以不要觉得我们在这里写的内容限制了你。\n\
    \n## 正确放置脚本\n\n当你使用这种代码时，在选择将代码放置在 HTML 文档中的位置时会有一定的灵活性。有几种方法可以将你想要使用的代码放置在该语言中，其中一些方法包括以下内容：\n\
    \n这是大多数人喜欢包含其代码的方式。你将能够将函数放在 `<head>` 部分，然后在网页上访问这些函数。一种实现方式如下所示：\n\n```html\n\
    <html>\n<head>\n<script type=\"text/javascript\">\nfunction showAlert() {\n  \
    \  alert(\"This is an alert from the Head section.\");\n}\n</script>\n</head>\n\
    <body>\n<input type=\"button\" onclick=\"showAlert();\" value=\"Call JavaScript\"\
