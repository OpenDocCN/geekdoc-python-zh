    way that you want. Outside of these rules, you will be fine naming the identifiers
    anything that you want.


    Another thing that we need to take a look at is some of the comments that you
    are able to write inside of your code. As you are working through your code, you
    may find that there are going to be situations where you would like to leave an
    explanation or a note inside of the code that you are writing, to kind of help
    others see what is going on in that part of the code. Any comment that you decide
    to write out in Python needs to have the # symbol ahead of it. This will ensure
    that the compiler sees that this is a comment, and will not try to read it and
    execute it. The compiler will see that sign, and then will skip over the code
    and get to the next part.


