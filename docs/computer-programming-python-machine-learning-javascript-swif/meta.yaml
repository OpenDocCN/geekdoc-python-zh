    \ 10\ny = 10\nresult = x/y #trying to divide by zero\nprint(result)\n```\n\n当你尝试让解释器执行这段代码时，你将得到的输出是：\n\
    \n```\n>>>\nTraceback (most recent call last):\nFile \"D:\\Python34\\tt.py\",\
