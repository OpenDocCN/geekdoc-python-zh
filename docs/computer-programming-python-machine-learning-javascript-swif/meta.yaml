    一\")\n    case 2:\n        fmt.Println(\"二\")\n    default:\n        fmt.Println(\"\
    无\")\n    }\n}\n```\n\n## Golang 接口\n\n到目前为止，我们已经在本指南中花了一些时间研究了我们将要研究的一些不同内容，以了解如何使这门语言工作。现在我们将更进一步，看看如何使用接口。Golang\
