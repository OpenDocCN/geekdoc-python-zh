    ## Chapter 7: A Comparison of GoLang and Python


    For programmers, finding the right programming language that is scalable to meet
    the growing shift towards the use of processors with increased caches and cores
    is a welcome reprieve. This is because, in addition to these hardware improvements,
    many hardware manufacturers are increasingly developing systems with concurrency
    and hyper or multiple threading capabilities. These improvements can slow down
    computer systems if the right programming language is not used in developing compatible
    software. Though from different computing eras, Python and GoLang programming
    languages have gained prominence within programming circles due to their unique
    features. While they share some similarities, these two languages have distinct
    features and properties that set them apart.


    Also known as Go, GoLang programming is one of the newest kids on the block when
    it comes to programming. Launched in 2009, GoLang is the brainchild of Google.
    As Google’s proprietary programming language, GO was specifically developed as
    a new generation language that would spur a paradigm shift in programming. It
    was developed by Google programmers Ken Thompson, Robert Griesemer and Rob Pike.
    Every aspect of the language is designed with this goal in mind. One of the defining
    features of Go is the built-in concurrency.


    This allows programmers to develop concurrent programs easily by accessing the
    improved functionality of multi-core processors that are increasingly being used
    in system development. Concurrency is achieved by the use of goroutines which
    can spin millions of times with minimal effect on the memory. This is because
    goroutines consume less memory and have built-in channels for communication. This
    leads to a faster runtime for Go as calculations are completed faster. Moreover,
    their segmented tracks are scalable leading efficient use of memory. The programmer
    manages the memory and can customize it to program runs to suit their needs.


    On the other hand, Python programming language which was released in 1991 lacked
    the built-in concurrency. Rather, development of concurrent applications is achieved
    through multiple-threading. This consumes a significant proportion of the heap
    size memory. The resulting pressure on the memory causes the system to shut down.
    The twisted threading used to achieve concurrency using Python language lacks
    channels for effecting piping of data between concurrent applications. This gives
    Python limited concurrency capabilities which translate into slower calculations
    and runtimes. Programmers cannot customize program runs because Python does not
    come with memory management option.


    Both Python and Go use simple syntaxes to achieve greater readability through
    reduction of complexities and clutters. Most of the GoLang’s high-level types
    correspond to Python’s syntaxes. Despite this similarity in simplicity principle
    for the syntaxes for both languages, there are fundamental differences in the
    syntaxes of the two languages. Go relies on static typing which leads to comparably
    slower rate of writing codes. The code blocks are indicated using opening and
    closing braces. Programmers using GoLang also enjoy a greater number of novel
    characters. In contrast, Python’s dynamical typing which is faster when writing
    codes, uses indentations to mark code blocks. Moreover, the characters are fewer
    which make it prone to coding errors. The speed of writing codes is also improved
    when using Python because it uses interpreted language which is simple unlike
    Go’s complex compiled language.


    Both languages can be used in web applications programming. GoLang’s memory management
