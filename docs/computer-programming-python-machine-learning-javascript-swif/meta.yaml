    \nGolang 网站还将使用映射、切片和数组。首先，数组将只是一系列具有相同数据类型的元素。数组将有一个在声明时定义的固定长度，因此我们无法将其扩展到超过该长度。我们可以轻松地使用代码\
    \ `var a [5] int` 来声明我们想要使用的数组。\n\n在学习过程中，我们可以根据需要将数组设为多维。当我们希望限制数组值在运行时发生变化的情况时，数组将在许多情况下使用。如果我们想要，数组不会提供我们拥有子数组的能力。这时我们需要使用\
    \ Golang 中称为切片的不同数据类型。\n\nGolang 中的切片很重要，因为它将存储一系列元素，并且可以随时扩展。切片声明将类似于我们能够用数组声明所做的，但我们完全没有定义它的能力。我们可以使用代码\
    \ `var b [] int` 来声明它。\n\n这将为我们创建一个长度和容量都为零的切片。我们可以根据是否希望切片具有一些长度和容量来进行一些更改。切片是我们能够在数组中看到的一种抽象。切片将依赖于一个数组作为底层结构。然后切片将包含三个对我们需要看到发生的事情很重要的组件。这三个组件将被称为指针、长度和容量。\n\
    \n最后，我们将看一下称为映射的数据类型。Go 能够使用它来将键映射到值。我们可以使用下面的命令来定义我们的映射：\n\n```\nvar m map[string]\
    \ int\n```\n\n这里 `m` 将是我们的映射的新变量，它将具有我们想要用作字符串的键，然后我们在这里使用的所有值都是整数。然后我们能够向映射中添加我们想要使用的值和键。当我们需要创建其中一个映射时，我们能够使用的代码将包括以下内容：\n\
    \n```go\npackage main\nimport (\n    \"fmt\"\n)\nfunc main() {\n    m := make(map[string]int)\n\
    \    // 添加键/值\n    m[\"clarity\"] = 2\n    m[\"simplicity\"] = 3\n    // 打印值\n\
    \    fmt.Println(m[\"clarity\"]) // -> 2\n    fmt.Println(m[\"simplicity\"]) //\
    \ -> 3\n}\n```\n\n## 条件语句\n\n我们不能在学习过程中忘记语言中的条件语句！尽管这些条件语句可能与我们在 Python 甚至 JavaScript\
    \ 语言形式中发现的有所不同，但我们花些时间探索它们的工作原理以及我们能够用它们做什么仍然很重要。\n\n在 Go 中使用条件语句时，第一个重要的条件语句是\
    \ if else 语句。请记住，这些语句允许我们的系统根据我们设置的条件做出决策，无论用户给我们什么输入。它们在 Golang 中也运行良好，我们只需要确保以正确的方式编写代码，并且花括号与条件在同一行。我们能够用来实现这一点的代码包括：\n\
    \n```go\npackage main\nimport (\n    \"fmt\"\n)\nfunc increment(i *int) {\n  \
    \  *i++\n}\nfunc main() {\n    if num := 9; num < 0 {\n        fmt.Println(num,\
    \ \"是负数\")\n    } else if num < 10 {\n        fmt.Println(num, \"有 1 位数字\")\n\
    \    } else {\n        fmt.Println(num, \"有多位数字\")\n    }\n}\n```\n\nGolang 语言提供的另一个我们可以使用的条件语句部分是使用\
    \ switch case。这与我们能够在本指南的其他两种编码语言中讨论的有些不同，但我们将看到它对我们想要关注的一些工作非常有益。switch case\
    \ 在这里将很有帮助，因为它确保我们能够在有多个区域时组织一些条件语句。一个简单的 switch case 语句如何为我们工作的例子包括：\n\n```go\n\
    package main\nimport (\n    \"fmt\"\n)\nfunc increment(i *int) {\n    *i++\n}\n\
