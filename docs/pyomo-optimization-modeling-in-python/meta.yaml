  - '[PAGE 28]


    # Chapter 2

    Mathematical Modeling and Optimization


    **Abstract** This chapter provides a primer on optimization and mathematical modeling.
    It does not provide a complete description of these topics. Instead, this chapter
    provides enough background information to support reading the rest of the book.
    For more discussion of optimization modeling techniques see Williams [58]. Implementations
    of simple examples of models are shown to provide the reader with a quick start
    to using Pyomo.


    # 2.1 Mathematical Modeling


    # 2.1.1 Overview


    Modeling is a fundamental process in many aspects of scientific research, engineering,
    and business. Modeling involves the formulation of a simplified representation
    of a system or real-world object. These simplifications allow structured representation
    of knowledge about the original system to facilitate the analysis of the resulting
    model. Schichl [56] notes models are used to:


    +   - **Explain phenomena** arising in a system;

    - **Make predictions** about future states of a system;

    - **Assess key factors** influencing phenomena in a system;

    - **Identify extreme states** in a system possibly representing worst-case scenarios
    or minimal cost plans; and

    - **Analyze trade-offs** to support human decision makers.


    Additionally, the structured aspect of a model''s representation facilitates communication
    of the knowledge associated with a model. For example, a key aspect of a model
    is its level of detail, reflecting the system knowledge needed to employ the model
    in an application.

    Mathematics has always played a fundamental role in representing and formulating
    our knowledge. Mathematical modeling has become increasingly formal as new'
  - '[PAGE 29]


    frameworks have emerged to express complex systems. The following mathematical
    concepts are central to modern modeling activities:


    +   - **Variables:** These represent *unknown* or changing parts of a model (e.g.,
    decisions to take, or the characteristic of a system outcome).

    - **Parameters:** These are symbolic representations for real-world data, and
    might vary for different problem instances or scenarios.

    - **Relations:** These are *equations*, *inequalities*, or other mathematical
    relationships defining how different parts of a model are related to each other.


    Optimization models are mathematical models with functions representing goals
    or objectives for the system being modeled. Optimization models can be analyzed
    to explore system trade-offs in order to find solutions to optimize system objectives.
    Consequently, these models can be used for a wide range of scientific, business,
    and engineering applications.


    # 2.1.2 A Modeling Example


    A *Model*, in the sense that we will use the word, represents items by abstracting
    away some features. Everyone is familiar with physical models, such as model railroads
    or model cars. Our interest is in mathematical models that use symbols to represent
    aspects of a system or real-world object.


    For example, a person might want to determine the best number of scoops of ice
    cream to buy. We could use the symbol $x$ to represent the number of scoops. We
    might use $c$ to represent the cost per scoop. So then we could model the total
    cost as $c$ times $x$, which we usually write as $cx$.


    We might need a more sophisticated model of total cost if there are volume discounts
    or surcharges for buying fractional scoops. Also, this model is probably not valid
    for negative values of $x$. It is seldom possible to sell back ice cream for the
    same price paid for it.


    It is more complicated to provide a mathematical model of the happiness associated
    with scoops of ice cream on an ice cream cone. One approach is to use a scaled
    measure of happiness. We will do that using the basic unit of the happiness associated
    with one scoop of ice cream, which we call $h$. A simple model, then, would be
    to say that the total happiness from $x$ scoops of ice cream is $h$ times $x$,
    which we write as $hx$. For some people, that might be a pretty good approximation
    for values of $x$ between one-half and three, but there is almost no one who is
    100 times as happy to have 100 scoops of ice cream on their ice cream cone as
    they are to have one scoop. For some people, the model of happiness for values
    of $x$ between zero and ten might be something like


    $h \cdot (x - (x/5)^2)$.


    Note that this model becomes negative when there are more than 25 scoops on the
    cone, which might not be a good model for everyone.'
  - '[PAGE 30]


    It is common to want to model more than one thing at a time. For example, you
    might be able to have scoops of ice cream and peanuts. Since there are multiple
    things that can be purchased, we can represent the quantity purchased using a
    vector $x$ (i.e. the symbol $x$ now represents a list). We refer to *elements*
    of the list using the notation $x_i$ where the symbol $i$ indexes the vector.
    For example, if we agree that the first element is the number of scoops of ice
    cream, then this number could be referenced using $x_1$. For higher dimensions
    a *tuple* is used, such as $i, j$ or $(i, j)$ as the index.


    Let''s change $c$ to be a vector of costs with the same indices as $x$ (i.e.,
    $c_1$ is the cost per scoop of ice cream and $c_2$ is the cost per cup of peanuts).
    So now, we write the total cost of ice cream and peanuts as


    $$c_1x_1 + c_2x_2 = \sum_{i=1}^{2} c_ix_i.$$


    Once again, this cost model is probably not valid for all possible values of all
    elements of $x$, but it might be good enough for some purposes.


    Often, it is useful to refer to indices as being members of a set. For the example
    just given, we could use the set $\{1, 2\}$ to write the total cost as


    $$\sum_{i \in \{1, 2\}} c_ix_i.$$


    but it would be more common to use a more abstract expression like


    $$\sum_{i \in \mathscr{A}} c_ix_i$$


    where the set $\mathscr{A}$ is understood to be the index set for $c$ and $x$
    (and for our example the set $\mathscr{A}$ would be $\{1, 2\}$.)


    In addition to summing over an index set, we might want to have conditions that
    hold for all members of an index set. This is done simply by using a comma. For
    example, if we want to require that none of the values of $x$ can be negative,
    we would write


    $$x_i \geq 0, \quad i \in \mathscr{A}$$


    and we read this line out loud as “x subscript i is greater than or equal to zero
    for all i in A.”


    There is no law of mathematics or even mathematical modeling requiring the use
    of single letter symbols such as $x$ and $c$ or $i$. It would be perfectly okay
    for the set $\mathscr{A}$ to be composed of a picture of an ice cream cone and
    a picture of a cup of peanuts, but that is hard to work with in some settings.
    The set could also be $\{Scoops, Cups\}$, but that is not commonly done in books
    because it takes up too much space and causes lines to overflow. Also, $x$ could
    be replaced by something like $Quantity$. Long names are, importantly, supported
    by modeling languages such as Pyomo, and it is generally a good idea to use meaningful
    names when writing Pyomo models. Spaces or dashes embedded in names often cause
    troubles and confusion, so underscores'
