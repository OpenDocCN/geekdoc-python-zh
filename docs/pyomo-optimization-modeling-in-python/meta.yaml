    \ a set:\n\n```\nmodel.B = pyo.Set(initialize=[2,3,4])\nmodel.C = pyo.Set(initialize=[(1,4),(9,16)])\n\
    ```\n\nA Python dictionary can also be passed to the `initialize` keyword to specify\
    \ the elements for each index of an indexed set:\n\n```\nF_init = {}\nF_init[2]\
    \ = [1,3,5]\nF_init[3] = [2,4,6]\nF_init[4] = [3,5,7]\nmodel.F = pyo.Set([2,3,4],initialize=F_init)\n\
    ```\n\nAlternatively, a rule (a Python function) can be passed to the `initialize`\
    \ keyword to provide the elements for an indexed set. The function accepts the\
    \ model and indices and returns the desired set for that index:\n\n```\ndef J_init(model,\
    \ i, j):\n    return range(0,i*j)\nmodel.J = pyo.Set(model.B,model.B, initialize=J_init)\n\
    ```\n\nThe previous examples illustrate how data can be specified or dynamically\
    \ generated to initialize a set. There are some contexts where it is simpler to\
    \ specify the set elements that should be omitted. The `filter` keyword can be\
    \ used to specify a function that returns `True` when an element belongs in a\
    \ set, and `False` otherwise. For example:\n\n```\nmodel.P = pyo.Set(initialize=[1,2,3,5,7])\n\
    def filter_rule(model, x):\n    return x not in model.P\nmodel.Q = pyo.Set(initialize=range(1,10),\
    \ filter=filter_rule)\n```\n\nHere, set P contains prime values, and set Q is\
    \ the set of all numbers except for the members of P.\n\nAfter an indexed set\
    \ is constructed in a concrete model, sets can be added for specific indices using\
    \ the Python equal operator:\n\n```\nmodel.R = pyo.Set([1,2,3])\nmodel.R[1] =\
    \ [1]\nmodel.R[2] = [1,2]\n```\n\nValidation of set data is supported in two different\
    \ ways. First, a superset can be specified with the `within` or `domain` keyword:\n\
    \n```\nmodel.B = pyo.Set(within=model.A)\n```\n\nWhen an element is added to the\
    \ set B, it is checked to confirm that it also belongs to A. This ensures B is\
    \ a subset of A.\n\nValidation of set data can also be performed by passing a\
    \ rule to the `validate` keyword argument. The rule function should return `True`\
    \ if the element that is passed in belongs in this set, and `False` otherwise\
    \ (Pyomo will throw an exception). For example, the following `C_validate` function\
    \ mimics the `within` keyword argument:"
  - "[PAGE 65]\n\n```\npython\ndef C_validate(model, value):\n    return value in\
    \ model.A\nmodel.C = pyo.Set(validate=C_validate)\n```\n\nFinally, note that if\
    \ both the `within` and `validate` keyword arguments are specified, then the logic\
    \ specified by both are applied to validate set elements.\n\nBy default, sets\
    \ are ordered by insertion order. In some cases, we may want the set elements\
