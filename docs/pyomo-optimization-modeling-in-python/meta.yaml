    \ Arguments to a function are separated by commas, and after a comma the arguments\
    \ can be continued on the next line without using a backslash. Conversely, it\
    \ is sometimes possible to combine multiple Python statements on one line. However,\
    \ we recommend against it as a matter of style and to enhance maintainability\
    \ of code.\n\n## A.4 Variables and Data Types\n\nPython variables do not need\
    \ to be explicitly declared. A statement assigning a value to an undefined symbol\
    \ implicitly declares the variable. Additionally, a variable's type is determined\
    \ by the data it contains. The statement\n\n```python\npopulation = 200\n```\n\
    \ncreates a variable called `population`, and it has the integer type because\
