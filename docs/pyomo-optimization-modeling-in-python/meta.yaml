    >>> print(\"Hello World\")\nHello World\n>>>\n```\n\nOn Windows the python command\
    \ can be launched from the DOS shell (or other shells), and on *nix (which includes\
    \ Macs) the python command can be launched from a bash or csh shell (or terminal).\
    \ The Python interactive shell is similar to these shell environments; when a\
