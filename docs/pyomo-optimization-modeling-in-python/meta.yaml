  - '[PAGE 191]


    **NOTE:** Unlike other Pyomo transformations, `pyomo.dae` discretization transformations
    cannot currently be applied from the `pyomo` command line, you must create a transformation
    object and apply a discretization transformation to your model in a Python script.


    # 12.3.1 Finite Difference Transformation


    Finite difference methods approximate the derivative at a particular point using
    a difference equation, and they are among the simplest discretization schemes
    to conceptually understand and implement. Many variations differ in the choice
    of points used to approximate the derivative. The backward difference method,
    also called implicit or backward Euler, is the most common variation. To illustrate
    the discretization equations associated with this method we first define the following
    derivative and differential equation (constraint):


    $$\left(\frac{dx(t)}{dt}, f(x(t), u(t))\right) = 0, \quad t \in [0, T].$$

    (12.7)


    After applying the backward difference method to the continuous domain $t$, the
    resulting derivative and constraint pair is


    $$\frac{dx}{dt}\bigg|_{t_{k+1}} = \frac{x_{k+1} - x_k}{h}, \quad k = 0, ..., N-1$$

    (12.8)


    $$g\left(\frac{dx}{dt}\bigg|_{t_{k+1}}, f(x_{k+1}, u_{k+1})\right) = 0, \quad
    k = 0, ..., N-1$$

    (12.9)


    where $x_k = x(t_k)$, $t_k = kh$, and $h$ is the step size between discretization
    points or the size of each finite element. When a finite difference transformation
    is applied to a Pyomo model, the discretization equations such as (12.8) are automatically
    generated and added to the Pyomo model as equality constraints.

    The code required to apply the backward finite difference method to our optimal
    control example is as follows:


    ```

    discretizer = pyo.TransformationFactory(''dae.finite_difference'')

    discretizer.apply_to(m, nfe=20, wrt=m.t, scheme=''BACKWARD'')

    ```


    The `nfe` keyword argument stands for "number of finite elements", and it specifies
    the number of discretization points that are used in the discretization. The `scheme`
    keyword specifies which finite difference method to apply. There currently are
    three finite difference schemes included in `pyomo.dae`: backward finite difference
    (''BACKWARD''), central finite difference (''CENTRAL''), and forward finite difference
    (''FORWARD'').'
  - '[PAGE 192]


    # # 12.3.2 Collocation Transformation


    The second type of discretization included in `pyomo.dae` is collocation or more
    specifically, orthogonal collocation over finite elements. This approach works
    by first breaking a continuous domain into $N - 1$ segments known as finite elements.
    Over each of these segments, the profiles of the differential variables (variables
    whose derivatives appear in the model) are approximated using polynomials. The
    polynomials are defined using $K$ collocation points appearing as discretization
    points within each finite element. Continuity is enforced at the finite element
    boundaries for the differential variables. To provide a formal, mathematical representation
    of this approach applied to the derivative and differential equation (12.7) we
    have:


    $$

    \frac{dx}{dt}\bigg|_{t_{ij}} = \frac{1}{h_i} \sum_{j=0}^K x_{ij} \frac{d\ell_j(\tau_k)}{d\tau},
    \quad k=1,\dots,K, i=1,\dots,N-1 \quad (12.10)

    $$


    $$

    0 = g\left(\frac{dx}{dt}\bigg|_{t_{ij}}, f(x_{ik}, u_{ik})\right), \quad k=1,\dots,K,
    i=1,\dots,N-1 \quad (12.11)

    $$


    $$

    x_{i+1,0} = \sum_{j=0}^K \ell_j(1)x_{ij}, \quad i=1,\dots,N-1 \quad (12.12)

    $$


    where $t_{ij} = t_{i-1} + \tau_j h_i, x(t_{ij}) = x_{ij}$. Further, we note that
    the solution $x(t)$ is interpolated as follows:


    $$

    x(t) = \sum_{j=0}^K \ell_j(\tau)x_{ij}, \quad t \in [t_{i-1}, t_i], \quad \tau
    \in [0,1] \quad (12.13)

    $$


    $$

    \ell_j(\tau) = \prod_{\substack{k=0, \\ k \neq j}}^K \frac{(\tau - \tau_k)}{(\tau_j
    - \tau_k)}. \quad (12.14)

    $$


    Collocation methods produce significantly more accurate algebraic approximations
    compared to finite difference methods. However, they are much harder to implement
    manually. Variations of collocation methods differ in the functional representation
    of the differential variable profile over each finite element as well as the selection
    of the collocation points. As of this writing, the collocation transformations
    in `pyomo.dae` use Lagrange polynomials to represent differential variable profiles.
    Two options are available for the selection of collocation points: shifted Gauss-Radau
    roots (''LAGRANGE-RADAU'') and shifted Gauss-Legendre roots (''LAGRANGE-LEGENDRE'').'
