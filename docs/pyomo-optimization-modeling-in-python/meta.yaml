    \ are three finite difference schemes included in `pyomo.dae`: backward finite\
    \ difference ('BACKWARD'), central finite difference ('CENTRAL'), and forward\
    \ finite difference ('FORWARD').\n\n### 12.3.2 Collocation Transformation\n\n\
    The second type of discretization included in `pyomo.dae` is collocation or more\
    \ specifically, orthogonal collocation over finite elements. This approach works\
    \ by first breaking a continuous domain into $N - 1$ segments known as finite\
    \ elements. Over each of these segments, the profiles of the differential variables\
    \ (variables whose derivatives appear in the model) are approximated using polynomials.\
    \ The polynomials are defined using $K$ collocation points appearing as discretization\
