    \n一个典型的数独谜题如图 5.2 所示。在此谜题中，必须用数字 1 到 9 填充空单元格。每行必须只出现一次每个数字。同样，每列也必须只出现一次每个数字。最后，九个子方格中的每一个也必须只出现一次每个数字。我们定义集合\
    \ *ROWS*、*COLS* 和 *VALUES*（所有集合都包含整数 1 到 9）。然后我们定义一个二元变量 $y[r, c, v]$ 来指示每个单元格中的数字。如果\
    \ $y[r, c, v] = 1$，则意味着为行 $r$ 和列 $c$ 标识的单元格选择了值 $v$。"
