    \ rule=_con)\n```\n\n## 12.3 Solving Pyomo Models with DAEs\n\nHaving formulated\
    \ a Pyomo model with differential equations, we now describe how to solve it.\
    \ None of the optimization solvers interfaced with Pyomo can currently handle\
    \ differential equations directly. The only solution technique currently included\
    \ with pyomo.dae is a simultaneous discretization approach, also called direct\
    \ transcription. This approach discretizes the continuous domains in the model\
    \ and approximates the differential equations using algebraic equations defined\
    \ at the discretization points. The result of this discretization transformation\
    \ is a purely algebraic model that can be solved with a standard nonlinear programming\
    \ solver.\n\nThere are two types of discretization schemes included in pyomo.dae:\
    \ finite difference and collocation. The schemes differ in the algebraic equations\
    \ used to approximate the derivatives, but they are applied using nearly identical\
    \ syntax. A discretization is applied to a particular continuous domain and propagated\
