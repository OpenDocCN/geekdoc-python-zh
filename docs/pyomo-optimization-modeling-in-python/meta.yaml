  md: "The `expr` or `rule` keywords can be used to initialize a named expression\
    \ when it is declared, as shown in the following example:\n\n```\nmodel.x = pyo.Var()\n\
    model.e1 = pyo.Expression(expr=model.x + 1)\ndef e2_rule(model):\n    return model.x\
    \ + 2\nmodel.e2 = pyo.Expression(rule=e2_rule)\n```\n\n| keyword | description\
    \ | acceptable values |\n| :--- | :--- | :--- |\n| <un-named> | reserved for specifying\
    \ index sets | any number of Pyomo Set objects or Python lists |\n| expr | provides\
    \ the expression to store | any valid Pyomo expression |\n| rule | provides the\
    \ rule function that will be called to provide the expression to store | a function\
    \ that returns a Pyomo expression or Expression.Skip |\n\nTable 4.7: Common declaration\
    \ arguments for the `Expression` component\n\nAs with the other core modeling\
    \ components, the `Expression` component can be indexed by declaring it with one\
    \ or more unnamed arguments representing indexing sets. The following example\
    \ declares an indexed `Expression` component over all members of the index set\
    \ except for the first. Indices that should be left out of the indexed `Expression`\
    \ component are signified by returning the `Expression.Skip` attribute from the\
    \ rule function.\n\n```\nN = [1,2,3]\nmodel.x = pyo.Var(N)\ndef e_rule(model,\
    \ i):\n    if i == 1:\n        return pyo.Expression.Skip\n    else:\n       \
    \ return model.x[i]**2\nmodel.e = pyo.Expression(N, rule=e_rule)\n```\n\n# 4.8.2\
    \ Working with Expression Objects\n\nA simple use for the `Expression` component\
    \ declares a single expression and uses it inside an objective and a constraint\
    \ declaration:\n\n```\nmodel.x = pyo.Var()\nmodel.e = pyo.Expression(expr=(model.x\
