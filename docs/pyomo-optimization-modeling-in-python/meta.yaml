    \ components will appear in several of the examples in this chapter. Consider\
    \ the following model:\n\n```\n\nmodel = pyo.ConcreteModel()\nmodel.A = pyo.Set(initialize=[1,2,3])\n\
    model.B = pyo.Set(initialize=['Q', 'R'])\nmodel.x = pyo.Var()\nmodel.y = pyo.Var(model.A,\
    \ model.B)\nmodel.o = pyo.Objective(expr=model.x)\nmodel.c = pyo.Constraint(expr=model.x\
    \ >= 0)\ndef d_rule(model, a):\n    return a * model.x <= 0\nmodel.d = pyo.Constraint(model.A,\
    \ rule=d_rule)\n```\n\nThe component `c` specifies a single constraint in this\
    \ model, and the component `d` specifies a collection of constraints indexed over\
    \ the set `A`. The `Constraint` component can be used to declare both simple constraints\
    \ and indexed constraints. In general, components can also be indexed by multiple\
    \ index sets. For example, `model.y` is indexed over both `A` and `B`, and it\
    \ can be referenced by `model.y[i, j]` where `i` is any valid element from `model.A`\
    \ and `j` is any valid element from `model.B` (e.g., `model.y[2, 'Q']`).\n\n>\
    \ NOTE: Any unnamed arguments in a component constructor are assumed to be index\
    \ sets for the component. They specify the set of valid indices for the component.\n\
    \nDeclaration of arguments for indexed components is often more complex. For example,\
    \ the `initialize` keyword argument can be used when declaring a single variable,\n\
    \n```\n\nmodel.x = pyo.Var(initialize=3.14)\n```\n\nSpecifying a value for these\
    \ types of keyword arguments is straightforward when the component is not indexed.\
    \ When the component is indexed, however, we may want to specify a different value\
    \ for each of the indices. There are three approaches typically supported for\
    \ these kinds of keyword arguments.\n\n+   * When a single scalar value is passed,\
    \ then that value is used for all the indices of the component.\n* In many cases,\
    \ you can also pass a Python dictionary (index-value pairs) where the keys of\
    \ the dictionary are valid indices for the component."
  - "[PAGE 53]\n\n+   - It is also possible to pass in a Python function to provide\
    \ the value for every index in the component. We often call these functions rules.\n\
    \nThese uses are illustrated here:\n\n```\npython\nmodel.A = pyo.Set(initialize={1,2,3})\n\
    model.x = pyo.Var(model.A, initialize=3.14)\nmodel.y = pyo.Var(model.A, initialize={1:1.5,\
    \ 2:4.5, 3:5.5})\ndef z_init_rule(m, i):\n    return float(i) + 0.5\nmodel.z =\
    \ pyo.Var(model.A, initialize=z_init_rule)\n```\n\n# ## 4.3 Variables\n\nPyomo\
    \ variables are created using the Var class, which can represent a single value\
    \ or an indexed collection of values. Variables can have initial values, and the\
    \ value of a variable can be retrieved and set by the user or by a solver as part\
    \ of the solution process.\n\n# ### 4.3.1 Var Declarations\n\nThe following code\
    \ creates a non-indexed Var object:\n\n```\npython\nmodel.x = pyo.Var()\n```\n\
    \nNamed and un-named arguments are supported, and Table 4.1 provides a list of\
    \ the common arguments that can be passed when declaring the Var component\n\n\
    | keyword | description | acceptable values |\n| :--- | :--- | :--- |\n| `<un-named>`\
    \ | reserved for specifying index sets | any number of Pyomo Set objects or Python\
    \ lists |\n| `within or domain` | specifies the valid domain or values for a variable\
    \ | a Pyomo Set object, Python list, or rule function |\n| `bounds` | provides\
    \ lower and upper bounds for the variable | a 2-tuple, or a rule function |\n\
    | `initialize` | provides an initial value for the variable | a scalar value,\
    \ Python dictionary of index-value pairs, or rule function |\n**Table 4.1: Common\
    \ declaration arguments for the Var component**"
  - "[PAGE 54]\n\n# 4.3 Variables\n\nThe domain of a variable (i.e., the set of legal\
    \ values) is specified with either the `domain` or `within` keyword options to\
    \ the `Var` constructor:\n\n```\nmodel.A = pyo.Set(initialize=[1,2,3])\nmodel.y\
    \ = pyo.Var(within=model.A)\nmodel.r = pyo.Var(domain=pyo.Reals)\nmodel.w = pyo.Var(within=pyo.Boolean)\n\
    ```\n\nIn this example, `y` is only allowed to take on the integer values 1, 2,\
    \ or 3. The variable `r` can have any real value, and `w` is restricted to be\
    \ binary (that is 0/1 or True/False). If the domain is not specified, the default\
    \ is the `Reals` virtual set. Other virtual sets supported by Pyomo are defined\
    \ in Table 4.2. Note that these virtual sets can also be used in other contexts\
    \ (e.g., when constructing `Param` objects).\n\n| Name | Description |\n|---|---|\n\
    | `Any` | The set of all possible values, except `None` |\n| `AnyWithNone` | The\
    \ set of all possible values |\n| `EmptySet` | The set with no data values |\n\
    | `Reals` | The set of floating point values |\n| `PositiveReals` | The set of\
    \ strictly positive floating point values |\n| `NonPositiveReals` | The set of\
    \ non-positive floating point values |\n| `NegativeReals` | The set of strictly\
    \ negative floating point values |\n| `NonNegativeReals` | The set of non-negative\
    \ floating point values |\n| `PercentFraction` | The set of floating point values\
    \ in the interval [0,1] |\n| `UnitInterval` | The same as 'PercentFraction' |\n\
    | `Integers` | The set of integer values |\n| `PositiveIntegers` | The set of\
    \ positive integer values |\n| `NonPositiveIntegers` | The set of non-positive\
    \ integer values |\n| `NegativeIntegers` | The set of negative integer values\
    \ |\n| `NonNegativeIntegers` | The set of non-negative integer values |\n| `Boolean`\
    \ | The set of boolean values, which can be represented as False/True, 0/1, 'False'/'True'\
    \ and 'F'/'T' |\n| `Binary` | The same as 'Boolean' |\n\nTable 4.2: Predefined\
    \ virtual sets in Pyomo.\n\nThe `domain` or `within` argument can also accept\
    \ a function, which is used to define the domain for individual elements of an\
    \ indexed variable. For example:\n\n```\nmodel.A = pyo.Set(initialize=[1,2,3])\n\
    def s_domain(model, i):\n    return pyo.RangeSet(i, i+1, 1) # (start, end, step)\n\
    model.s = pyo.Var(model.A, domain=s_domain)\n```\n\nIn this example, `s` is an\
    \ indexed variable whose individual entities are defined over consecutive integer\
    \ intervals.\n\n> NOTE: While Pyomo supports a general representation for restricting\
    \ the domain of the variables, not all solvers support this general behavior.\
    \ You may need to restrict your definitions to those supported by the selected\
    \ solver."
  - "[PAGE 55]\n\nVariable bounds can be explicitly specified with the `bounds` keyword\
    \ option:\n\n```\nmodel.A = pyo.Set(initialize=[1,2,3])\nmodel.a = pyo.Var(bounds=(0.0,None))\n\
    \nlower = {1:2.5, 2:4.5, 3:6.5}\nupper = {1:3.5, 2:4.5, 3:7.5}\ndef f(model, i):\n\
    \    return (lower[i], upper[i])\nmodel.b = pyo.Var(model.A, bounds=f)\n```\n\n\
    The `bounds` option can specify a 2-tuple with lower and upper values. Alternatively,\
    \ it can specify a function that returns a 2-tuple for each variable index. Note\
    \ that `None` can be used in place of the lower or upper bound to indicate no\
    \ bound should be enforced. In the code snippet above, `model.a` has a lower bound\
    \ of 0, and does not have an upper bound, while `model.b` has different bounds\
    \ for each of its indices. For example, `model.b[3]` has a lower bound of 6.5\
    \ and an upper bound of 7.5.\n\nThe initial value of variables can be set with\
    \ the `initialize` keyword argument as in the following example:\n\n```\nmodel.A\
    \ = pyo.Set(initialize=[1,2,3])\nmodel.za = pyo.Var(initialize=9.5, within=pyo.NonNegativeReals)\n\
    model.zb = pyo.Var(model.A, initialize={1:1.5, 2:4.5, 3:5.5})\nmodel.zc = pyo.Var(model.A,\
    \ initialize=2.1)\n\nprint(pyo.value(model.za))  # 9.5\nprint(pyo.value(model.zb[3]))\
    \  # 5.5\nprint(pyo.value(model.zc[3]))  # 2.1\n```\n\nFor non-indexed variables,\
    \ a single scalar value is provided to the `initialize` keyword argument. If the\
    \ component is indexed, a single value can still be provided, in which case all\
    \ entries in an indexed variable will be initialized to the same value. As well,\
    \ a dictionary can be passed in where the keys correspond to the valid indices\
    \ of the variable. Additionally, this argument can be passed a rule (a Python\
    \ function) that accepts the model and variable indices as arguments and returns\
    \ the desired initial value for that variable element:\n\n```\nmodel.A = pyo.Set(initialize=[1,2,3])\n\
    def g(model, i):\n    return 3*i\nmodel.m = pyo.Var(model.A, initialize=g)\n\n\
    print(pyo.value(model.m[1]))  # 3\nprint(pyo.value(model.m[3]))  # 9\n```"
- md: "## 4.3.2 Working with Var Objects\n\nWhen generating formatted output, or scripting\
    \ advanced workflows, there are several attributes and methods of Var commonly\
    \ used. Consider the following declarations:\n\n```python\nmodel.A = pyo.Set(initialize=[1,2,3])\n\
    model.za = pyo.Var(initialize=9.5, within=pyo.NonNegativeReals)\nmodel.zb = pyo.Var(model.A,\
    \ initialize={1:1.5, 2:4.5, 3:5.5})\nmodel.zc = pyo.Var(model.A, initialize=2.1)\n\
    ```\n\nThe current value of the variable can be obtained with the value() function,\
    \ and the attributes lb and ub hold values for the lower and upper bounds on the\
    \ variable, respectively. These values may be inferred from the domain of the\
    \ variable.\n\n```python\nprint(pyo.value(model.zb[2])) # 4.5\nprint(model.za.lb)\
    \ # 0\nprint(model.za.ub) # None\n```\n\nThe setlb and setupb methods are used\
    \ to set the lower and upper bounds on a variable.\n\nVariable values can be set\
    \ using the Python assignment operator,\n\n```python\nmodel.za = 8.5\nmodel.zb[2]\
    \ = 7.5\n```\n\nOne can also call the set_values method to set all the variable\
    \ values from a dictionary.\n\nVar components can be fixed to specific values.\
    \ If the fixed attribute is True, then the variable has a fixed value that will\
    \ not be altered by an optimizer. The fix method is used to fix elements of a\
    \ Var, and the unfix method is used to unfix elements of a Var.\n\n```python\n\
    model.zb.fix(3.0)\nprint(model.zb[1].fixed) # True\nprint(model.zb[2].fixed) #\
    \ True\nmodel.zc[2].fix(3.0)\nprint(model.zc[1].fixed) # False\nprint(model.zc[2].fixed)\
    \ # True\n```\n\n## 4.4 Objectives\n\nAn objective is a function that is either\
    \ minimized or maximized by a solver. The solver searches for values of the variables\
    \ that result in the best possible value of the objective function. The following\
    \ sections describe the syntax for declaring and working with objectives.\n\n\
    ### 4.4.1 Objective Declarations\n\nMost solvers can be applied to optimization\
    \ models with a single objective. The following code creates an Objective object:\n\
    \n```python\nmodel.a = pyo.Objective()\n```\n\nNamed and un-named arguments are\
    \ supported, and Table 4.3 provides a list of the common arguments that can be\
    \ passed when declaring the Objective component.\n\n**Table 4.3: Common declaration\
    \ arguments for the Objective component**\n\n| keyword | description | acceptable\
    \ values |\n|---------|-------------|-------------------|\n| <un-named> | reserved\
    \ for specifying index sets | any number of Pyomo Set objects or Python lists\
    \ |\n| expr | provides the expression that defines the objective function | any\
    \ valid Pyomo expression |\n| rule | provides the rule function that will be called\
    \ to access the expression that defines the objective function | a function that\
    \ returns a Pyomo expression or Objective.Skip |\n| sense | determines if the\
    \ objective is to be minimized or maximized (default is to minimize) | minimize\
    \ or maximize |\n\nThe expr keyword can be used to specify the actual expression\
    \ for the objective. One can also use the rule keyword to specify a rule (a Python\
    \ function) that returns an expression. A rule provides control over how the objective\
    \ is formed. Both options are illustrated here:\n\n```python\nmodel.x = pyo.Var([1,2],\
    \ initialize=1.0)\n\nmodel.b = pyo.Objective(expr=model.x[1] + 2*model.x[2])\n\
    \ndef m_rule(model):\n    expr = model.x[1]\n    expr += 2*model.x[2]\n    return\
    \ expr\nmodel.c = pyo.Objective(rule=m_rule)\n```\n\nSome solvers can perform\
    \ multi-objective optimization with two or more objectives. Multiple objectives\
    \ can be declared individually or they can be indexed and defined using a rule\
    \ as shown here:\n\n```python\nA = ['Q', 'R', 'S']\nmodel.x = pyo.Var(A, initialize=1.0)\n\
    def d_rule(model, i):\n    return model.x[i]**2\nmodel.d = pyo.Objective(A, rule=d_rule)\n\
    ```\n\nWhen the `Objective` object is declared as an indexed component, Pyomo\
    \ iterates over all elements of the index set during object construction, passing\
    \ each set element to the function given as the argument to the `rule` keyword.\
    \ If multiple sets are specified in an `Objective` declaration, then Pyomo iterates\
    \ over the cross product of all sets, providing an element for each set to the\
    \ rule function.\n\nIn some contexts, it may be convenient to not define objectives\
    \ for some index values. If the construction rule returns `Objective.Skip`, then\
    \ the objective is ignored.\n\n```python\ndef e_rule(model, i):\n    if i == 'R':\n\
    \        return pyo.Objective.Skip\n    return model.x[i]**2\nmodel.e = pyo.Objective(A,\
    \ rule=e_rule)\n```\n\nBy default, the declaration of an `Objective` object indicates\
    \ that the objective is to be minimized. The `sense` keyword can be used to indicate\
    \ an objective that is maximized using `sense=pyo.maximize`.\n\n### 4.4.2 Working\
    \ with Objective Objects\n\nThe objective function contains a few attributes that\
    \ may be useful for scripting or debugging. The `expr` attribute stores the expression\
    \ for the objective. The `sense` attribute indicates if the objective is to be\
    \ minimized or maximized. The `value` function can be used to compute the value\
    \ of the objective. These are illustrated in the following example:\n\n```python\n\
    A = ['Q', 'R']\nmodel.x = pyo.Var(A, initialize={'Q':1.5, 'R':2.5})\nmodel.o =\
    \ pyo.Objective(expr=model.x['Q'] + 2*model.x['R'])\nprint(model.o.expr) # x[Q]\
    \ + 2*x[R]\nprint(model.o.sense) # minimize\nprint(pyo.value(model.o)) # 6.5\n\
    ```\n\n## 4.5 Constraints\n\nA constraint defines one or more expressions that\
    \ place limits on the feasible values of variables. The declaration of constraint\
    \ expressions is similar to the declaration of objective function expressions.\
    \ Constraints differ from objectives in that the expressions include relationships\
    \ (equalities or inequalities). While objectives can be indexed, this feature\
    \ is infrequently used. In contrast, constraints are commonly indexed, allowing\
    \ for a collection of related constraint expressions to be constructed and stored\
    \ in a single constraint object.\n\n### 4.5.1 Constraint Declarations\n\nThe following\
    \ code creates a single, non-indexed `Constraint` object:\n\n```python\nmodel.x\
    \ = pyo.Var([1,2], initialize=1.0)\nmodel.diff = pyo.Constraint(expr=model.x[2]-model.x[1]\
    \ <= 7.5)\n```\n\nSeveral named arguments are supported, and Table 4.4 lists the\
    \ common arguments that can be passed when declaring a `Constraint` component.\n\
    \nThe expression specified by the `expr` keyword can alternatively be generated\
    \ with a rule function. For example, the `diff` constraint can also be declared\
    \ as follows:\n\n```python\nmodel.x = pyo.Var([1,2], initialize=1.0)\ndef diff_rule(model):\n\
    \    return model.x[2] - model.x[1] <= 7.5\nmodel.diff = pyo.Constraint(rule=diff_rule)\n\
    ```\n\n**Table 4.4: Common declaration arguments for the `Constraint` component**\n\
    \n| keyword | description | acceptable values |\n|---------|-------------|-------------------|\n\
    | <un-named> | reserved for specifying index sets | any number of Pyomo Set objects\
    \ or Python lists |\n| expr | provides the expression that defines the constraint\
    \ | any valid Pyomo expression with a relational operator, a 2-tuple, or a 3-tuple\
    \ |\n| rule | provides the rule function that will be called to access the expression\
    \ that defines the constraint | a function that returns a Pyomo expression with\
    \ a relational operator, a 2-tuple, a 3-tuple, or Constraint.Skip |\n\nConstraints\
    \ can be indexed, and those indices can be used to refer to specific elements\
    \ of indexed parameters and variables when constructing expressions. The following\
    \ code fragment shows an example of this:\n\n```python\nN = [1,2,3]\n\na = {1:1,\
    \ 2:3.1, 3:4.5}\nb = {1:1, 2:2.9, 3:3.1}\n\nmodel.y = pyo.Var(N, within=pyo.NonNegativeReals,\
    \ initialize=0.0)\n\ndef CoverConstr_rule(model, i):\n    return a[i] * model.y[i]\
    \ >= b[i]\nmodel.CoverConstr = pyo.Constraint(N, rule=CoverConstr_rule)\n```\n\
    \nIndexed constraints are specified in the same manner as indexed objectives.\
    \ Pyomo iterates over the cross product of the indexing sets, providing an index\
    \ from each set to the rule function. The `CoverConstr` constraint in this example\
    \ implements the following mathematical model:\n\n$$a_i y_i \\geq b_i \\; \\forall\
    \ i \\in \\{1,2,3\\}$$\n\nGiven the data specified in `a` and `b`, the model instance\
    \ passed to the solver will include the following explicit constraints:\n\n$$y[1]\
    \ \\geq 1$$\n$$3.1 \\cdot y[2] \\geq 2.9$$\n$$4.5 \\cdot y[3] \\geq 3.1$$\n\n\
    Three types of constraint expressions are allowed in Pyomo:\n\n- *inequality constraints*\
    \ have the form\n\n  $$expr_1 \\leq expr_2 \\quad \\text{or} \\quad expr_1 \\\
    geq expr_2$$\n\n  where $expr_1$ and $expr_2$ may be non-constant expressions.\
    \ (Note that < and > are not supported.)\n- *equality constraints* have the form\n\
    \n  $$expr_1 = expr_2$$\n\n  where $expr_1$ and $expr_2$ may be non-constant expressions.\n\
    - *range constraints* have the form\n\n  $$lower \\leq expr_1 \\leq upper$$\n\n\
    \  where $lower$ and $upper$ are constant expressions and $expr_1$ is a non-constant\
    \ expression."
  mdcn: "## 4.3.2 使用 Var 对象\n\n在生成格式化输出或编写高级工作流脚本时，Var 对象有几个常用的属性和方法。请参考以下声明：\n\n\
    ```python\nmodel.A = pyo.Set(initialize=[1,2,3])\nmodel.za = pyo.Var(initialize=9.5,\
    \ within=pyo.NonNegativeReals)\nmodel.zb = pyo.Var(model.A, initialize={1:1.5,\
    \ 2:4.5, 3:5.5})\nmodel.zc = pyo.Var(model.A, initialize=2.1)\n```\n\n可以使用 `value()`\
    \ 函数获取变量的当前值，属性 `lb` 和 `ub` 分别保存变量的下界和上界值。这些值可以从变量的域中推断出来。\n\n```python\nprint(pyo.value(model.zb[2]))\
    \ # 4.5\nprint(model.za.lb) # 0\nprint(model.za.ub) # None\n```\n\n`setlb` 和 `setupb`\
    \ 方法用于设置变量的下界和上界。\n\n可以使用 Python 赋值运算符设置变量的值，\n\n```python\nmodel.za = 8.5\nmodel.zb[2]\
    \ = 7.5\n```\n\n也可以调用 `set_values` 方法从一个字典中设置所有变量的值。\n\nVar 分量可以被固定为特定的值。如果 `fixed`\
    \ 属性为 `True`，则变量具有一个固定值，该值不会被优化器改变。`fix` 方法用于固定 Var 的元素，`unfix` 方法用于取消固定 Var 的元素。\n\
    \n```python\nmodel.zb.fix(3.0)\nprint(model.zb[1].fixed) # True\nprint(model.zb[2].fixed)\
    \ # True\nmodel.zc[2].fix(3.0)\nprint(model.zc[1].fixed) # False\nprint(model.zc[2].fixed)\
    \ # True\n```\n\n## 4.4 目标函数\n\n目标函数是被求解器最小化或最大化的函数。求解器搜索使目标函数达到最优值的变量值。以下几节介绍了声明和操作目标函数的语法。\n\
    \n### 4.4.1 目标函数声明\n\n大多数求解器可用于具有单一目标函数的优化模型。以下代码创建了一个 `Objective` 对象：\n\n```python\n\
    model.a = pyo.Objective()\n```\n\n支持命名参数和非命名参数，表 4.3 列出了声明 `Objective` 分量时可以传递的常见参数。\n\
    \n**表 4.3：`Objective` 分量的常用声明参数**\n\n| 关键字 | 描述 | 可接受的值 |\n|---------|-------------|-------------------|\n\
    | <非命名> | 保留用于指定索引集 | 任意数量的 `Pyomo Set` 对象或 Python 列表 |\n| expr | 提供定义目标函数的表达式\
    \ | 任何有效的 Pyomo 表达式 |\n| rule | 提供将被调用以获取定义目标函数表达式的规则函数 | 一个返回 Pyomo 表达式或 `Objective.Skip`\
    \ 的函数 |\n| sense | 确定目标是最小化还是最大化（默认为最小化） | `minimize` 或 `maximize` |\n\n`expr`\
    \ 关键字可用于指定目标的实际表达式。也可以使用 `rule` 关键字指定一个规则（一个 Python 函数），该函数返回一个表达式。规则提供了对如何形成目标函数的控制。以下两种选项都有说明：\n\
    \n```python\nmodel.x = pyo.Var([1,2], initialize=1.0)\n\nmodel.b = pyo.Objective(expr=model.x[1]\
    \ + 2*model.x[2])\n\ndef m_rule(model):\n    expr = model.x[1]\n    expr += 2*model.x[2]\n\
    \    return expr\nmodel.c = pyo.Objective(rule=m_rule)\n```\n\n一些求解器可以使用两个或多个目标函数进行多目标优化。多个目标函数可以单独声明，也可以像下面这样索引并使用规则定义：\n\
    \n```python\nA = ['Q', 'R', 'S']\nmodel.x = pyo.Var(A, initialize=1.0)\ndef d_rule(model,\
    \ i):\n    return model.x[i]**2\nmodel.d = pyo.Objective(A, rule=d_rule)\n```\n\
    \n当 `Objective` 对象被声明为一个索引分量时，Pyomo 在对象构建期间会遍历索引集的所有元素，将每个集元素传递给 `rule` 关键字参数给出的函数。如果在\
    \ `Objective` 声明中指定了多个集合，那么 Pyomo 会遍历所有集合的笛卡尔积，为规则函数提供每个集合的一个元素。\n\n在某些情况下，为某些索引值不定义目标函数可能更方便。如果构建规则返回\
    \ `Objective.Skip`，则该目标将被忽略。\n\n```python\ndef e_rule(model, i):\n    if i ==\
    \ 'R':\n        return pyo.Objective.Skip\n    return model.x[i]**2\nmodel.e =\
    \ pyo.Objective(A, rule=e_rule)\n```\n\n默认情况下，`Objective` 对象的声明表示目标是最小化。可以使用 `sense`\
    \ 关键字并设置 `sense=pyo.maximize` 来表示最大化目标。\n\n### 4.4.2 使用目标函数对象\n\n目标函数包含一些对于脚本编写或调试可能有用的属性。`expr`\
    \ 属性存储目标函数的表达式。`sense` 属性表示目标是最小化还是最大化。`value` 函数可用于计算目标函数的值。以下示例演示了这些用法：\n\n\
    ```python\nA = ['Q', 'R']\nmodel.x = pyo.Var(A, initialize={'Q':1.5, 'R':2.5})\n\
    model.o = pyo.Objective(expr=model.x['Q'] + 2*model.x['R'])\nprint(model.o.expr)\
    \ # x[Q] + 2*x[R]\nprint(model.o.sense) # minimize\nprint(pyo.value(model.o))\
    \ # 6.5\n```\n\n## 4.5 约束\n\n约束定义了一个或多个表达式，用于限制变量的可行取值范围。约束表达式的声明类似于目标函数表达式的声明。约束与目标函数的不同之处在于，其表达式包含关系（等式或不等式）。虽然目标函数可以被索引，但此特性并不常用。相反，约束通常被索引，这允许构建一组相关的约束表达式并将其存储在一个约束对象中。\n\
    \n### 4.5.1 约束声明\n\n以下代码创建一个单一的、未索引的 `Constraint` 对象：\n\n```python\nmodel.x =\
    \ pyo.Var([1,2], initialize=1.0)\nmodel.diff = pyo.Constraint(expr=model.x[2]-model.x[1]\
    \ <= 7.5)\n```\n\n支持几个命名参数，表 4.4 列出了声明 `Constraint` 分量时可以传递的常见参数。\n\n`expr` 关键字指定的表达式也可以用规则函数生成。例如，`diff`\
    \ 约束也可以这样声明：\n\n```python\nmodel.x = pyo.Var([1,2], initialize=1.0)\ndef diff_rule(model):\n\
    \    return model.x[2] - model.x[1] <= 7.5\nmodel.diff = pyo.Constraint(rule=diff_rule)\n\
    ```\n\n**表 4.4：`Constraint` 分量的常用声明参数**\n\n| 关键字 | 描述 | 可接受的值 |\n|---------|-------------|-------------------|\n\
    | <非命名> | 保留用于指定索引集 | 任意数量的 `Pyomo Set` 对象或 Python 列表 |\n| expr | 提供定义约束的表达式 |\
    \ 任何带有关系运算符的有效 Pyomo 表达式、一个 2 元组或一个 3 元组 |\n| rule | 提供将被调用以获取定义约束表达式的规则函数 | 一个返回带有关系运算符的\
    \ Pyomo 表达式、2 元组、3 元组或 `Constraint.Skip` 的函数 |\n\n约束可以被索引，这些索引可用于在构建表达式时引用索引参数和变量的特定元素。以下代码片段展示了这方面的示例：\n\
    \n```python\nN = [1,2,3]\n\na = {1:1, 2:3.1, 3:4.5}\nb = {1:1, 2:2.9, 3:3.1}\n\
    \nmodel.y = pyo.Var(N, within=pyo.NonNegativeReals, initialize=0.0)\n\ndef CoverConstr_rule(model,\
    \ i):\n    return a[i] * model.y[i] >= b[i]\nmodel.CoverConstr = pyo.Constraint(N,\
    \ rule=CoverConstr_rule)\n```\n\n索引约束的指定方式与索引目标函数相同。Pyomo 遍历索引集的笛卡尔积，为规则函数提供每个集合的一个索引。此示例中的\
    \ `CoverConstr` 约束实现了以下数学模型：\n\n$$a_i y_i \\geq b_i \\; \\forall i \\in \\{1,2,3\\\
    }$$\n\n给定 `a` 和 `b` 中指定的数据，传递给求解器的模型实例将包含以下显式约束：\n\n$$y[1] \\geq 1$$\n$$3.1 \\\
    cdot y[2] \\geq 2.9$$\n$$4.5 \\cdot y[3] \\geq 3.1$$\n\nPyomo 中允许三种类型的约束表达式：\n\
    \n- *不等式约束* 形式如下：\n\n  $$expr_1 \\leq expr_2 \\quad \\text{或} \\quad expr_1 \\\
    geq expr_2$$\n\n  其中 $expr_1$ 和 $expr_2$ 可以是非恒定表达式。（注意不支持 `<` 和 `>`。）\n- *等式约束*\
    \ 形式如下：\n\n  $$expr_1 = expr_2$$\n\n  其中 $expr_1$ 和 $expr_2$ 可以是非恒定表达式。\n- *范围约束*\
    \ 形式如下：\n\n  $$lower \\leq expr_1 \\leq upper$$\n\n  其中 $lower$ 和 $upper$ 是常量表达式，$expr_1$\
    \ 是非恒定表达式。"
