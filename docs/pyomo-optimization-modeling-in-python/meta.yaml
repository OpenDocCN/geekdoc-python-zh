    \ expressed algebraically as either $x = 0$ or $L \\leq x \\leq U$, where $L >\
    \ 0$ and $U$ is allowed to be infinite. When $U$ is finite, this property can\
    \ be enforced by defining a binary variable $y$ and defining the following constraints:\n\
    \n$$Ly \\leq x$$\n$$x \\leq Uy$$\n$$y \\in \\{0, 1\\}$$\n\nWhen $U$ is infinite,\
    \ then the second inequality is replaced with a so-called \"Big-M\" constraint:\n\
    \n$$x \\leq My$$\n\nfor a value $M$ chosen to be sufficiently big so as to not\
    \ limit the space of feasible solutions (although it does imply a finite $U$).\
    \ One can readily see that when $y = 1$ the inequalities enforce that $x$ lie\
    \ in the continuous range $L \\leq x \\leq U$, and when $y = 0$ the inequalities\
    \ reduce to $0 \\leq x \\leq 0$, or $x = 0$.\n\nIn this formulation, the binary\
    \ variable y is not intrinsic to the constraints, but rather captures a logical\
    \ condition: indicating whether one set of mutually exclusive constraints (L ≤\
    \ x ≤ U) or another (x = 0) must be enforced. In this way, the variable is often\
    \ referred to as an indicator variable. Indeed, it can be argued that the bulk\
    \ of binary variables used in math programming are in fact indicator variables\
    \ used to capture logic in the model.\n\nThis approach to formulating a switching\
    \ decision can be generalized to switch between different groups of constraints.\
    \ For example, consider the Unit Commitment Problem, where the goal of the optimization\
    \ problem is to determine the minimal cost schedule for turning on and off a fleet\
    \ of generators in order to meet expected demand. In this case, a generator can\
    \ exist in one of several states: on, off, starting up, and shutting down. Selecting\
    \ a particular state implies additional constraints on the generator operation.\
    \ If a generator is “on”, then the output power is bounded between the minimum\
    \ (nonzero) and maximum power levels. In contrast, when the generator is “off”,\
    \ the output power must be 0. Further, the output power in any time period must\
    \ be within “ramp limits” of output power in the previous time period.\n\nOne\
    \ implementation of these state selection rules expresses all the constraints\
    \ and relaxes them based on binary state (indicator) variables using so-called\
