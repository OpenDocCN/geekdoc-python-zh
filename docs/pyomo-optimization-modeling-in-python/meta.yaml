  mdcn: "组件和表达式可以引用层级结构中任何位置的组件。\n\n> **注意：** 在一个块内部，Pyomo 支持对其他任何块中组件的引用。然而，从良好的面向对象实践出发，通常建议只引用当前层级或其下层级的组件。这有助于提高块在其他模型中的可重用性，而无需对拥有块或父块的结构做过多假设。\n\
    \n请注意，在代码片段中，每个块定义了自己的 *组件命名空间*；虽然组件名称在单个块内必须唯一，但它们不需要全局唯一。这允许安全地构建块，而无需担心一个块中的定义与其他块中的定义发生冲突或干扰。这导致所有组件有两种形式的名称：局部名称（可能在模型其他地方重复）和全局唯一的\
    \ *完全限定* 名称，其中包含以句点分隔的父块名称：\n\n```\nprint(model.x.local_name)           # x\n\
    print(model.x.name)                 # x\nprint(model.b.x.local_name)         #\
    \ x\nprint(model.b.x.name)               # b.x\nprint(model.b.b[1].x.local_name)\
    \    # x\nprint(model.b.b[1].x.name)          # b.b[1].x\n```\n\n在讨论块层级结构时，我们采用树结构的术语，将层级中上一级（朝向顶层模型）的块称为\
    \ *父块*，将包含在块中的所有组件称为其 *子组件*。块层级结构的 *根* 始终是当前模型。Pyomo 组件都提供了一组标准方法用于在组件层级结构中导航：\n\
    \n`parent_component()` Pyomo 模型中的每个建模对象都由一个组件拥有。对建模对象调用 `parent_component()` 会返回持有（或拥有）该建模对象的\
    \ *组件*。对于索引组件的成员，`parent_component()` 返回包含该组件的索引组件对象。对于标量组件，父组件就是该标量组件本身。\n\n\
    `parent_block()` 每个建模组件都连接到一个单一的块。对 Pyomo 建模对象调用 `parent_block()` 会返回拥有该对象 `parent_component()`\
    \ 的块。\n\n`model()` 对建模对象调用 `model()` 会向上遍历 `parent_block()` 调用，返回顶层（根）块。\n\n`__getitem__`\
    \ 与模型类似，子组件可以通过属性查找在块上以编程方式访问。\n\n`component()` 子组件也可以使用 Blocks 的 `component()`\
    \ 方法按名称检索。\n\n以下示例展示了如何在组件层级结构中移动：\n\n```\nmodel.b.b[1].x.parent_component() \
    \ # 是 model.b.b[1].x\nmodel.b.b[1].x.parent_block()      # 是 model.b.b[1]\nmodel.b.b[1].x.model()\
    \             # 是 model\nmodel.b.b[1].component('x')         # 是 model.b.b[1].x\n\
    model.b.x[1].parent_component()    # 是 model.b.x\nmodel.b.x[1].parent_block()\
    \        # 是 model.b\nmodel.b.x[1].model()               # 是 model\nmodel.b.component('x')\
    \             # 是 model.b.x\n```\n\n块组件也可以被创建和填充，然后添加到模型中。下面的代码展示了创建一个块，稍后将其添加到模型的过程。它也演示了父模型如何利用子块中包含的集合和参数。\n\
    \n```\nnew_b = pyo.Block()\nnew_b.x = pyo.Var()\nnew_b.P = pyo.Param(initialize=5)\n\
    new_b.I = pyo.RangeSet(10)\n\nmodel = pyo.ConcreteModel()\nmodel.b = new_b\nmodel.x\
    \ = pyo.Var(model.b.I)\n```\n\n> 注意：在此示例中，Block 对象 `new_b` 在声明时并未初始化。这种方式下，它是抽象的，直到被添加到\
    \ `ConcreteModel` 对象中。在那时，它会立即被初始化。类似地，当一个 Block 对象被添加到 `AbstractModel` 时，它不会被初始化，直到拥有它的抽象模型对象被初始化。\n\
    \n## 8.3 块作为索引组件\n\n与其他 Pyomo 组件类似，Block 组件也可以使用构造规则进行索引和初始化。然而，块构造规则遵循略有不同的约定：块规则的第一个参数是要填充的块，而不是拥有该块的块。该块已经附加到模型上，因此像\
    \ `model()` 和 `parent_block()` 这样的方法将按预期工作。在规则内部，可以通过直接为块赋值组件来填充它，或者创建一个新的块并将其从规则中返回。\n\
    \n以下示例展示了块构造规则的使用：\n\n```\nmodel = pyo.ConcreteModel()\nmodel.P = pyo.Param(initialize=3)\n\
    model.T = pyo.RangeSet(model.P)\n\ndef xyb_rule(b, t):\n    b.x = pyo.Var()\n\
    \    b.I = pyo.RangeSet(t)\n    b.y = pyo.Var(b.I)\n    b.c = pyo.Constraint(expr=b.x\
    \ == 1 - sum(b.y[i] for i in b.I))\nmodel.xyb = pyo.Block(model.T, rule=xyb_rule)\n\
    ```\n\n这里定义了一个索引 Block 组件，它为集合 `model.T` 的每个元素包含一个块。在构造规则中，我们创建了两个变量和一个集合。这些构造规则与其他组件的构造规则一样灵活。此示例中创建的集合\
    \ `b.I` 对于每个块都是不同的，因此变量 `b.y` 对于每个块也是不同长度的。这说明了块的另一个特性。通常，不同的块包含完全相同的模型结构，只是数据不同。也可以基于构造规则中可用的数据构建具有不同结构的块。\n\
    \n此示例可以扩展为打印每个块的约束主体 `c`：\n\n```\nfor t in model.T:\n    print(model.xyb[t].c.body)\n\
    ```\n\n约束被适当展开，并且它们包含每个子块中变量的完全限定名：\n\n```\n-1.0 + xyb[1].x + xyb[1].y[1]\n-1.0\
    \ + xyb[2].x + xyb[2].y[1] + xyb[2].y[2]\n-1.0 + xyb[3].x + xyb[3].y[1] + xyb[3].y[2]\
    \ + xyb[3].y[3]\n```\n\n## 8.4 块内的构造规则\n\n与模型对象类似，块可以包含其他建模组件，包括 `Set` 和 `Param`\
    \ 对象。此外，块可以用那些本身使用规则构建的建模组件进行初始化。然而，这样做会暴露出 Pyomo 组件构造规则的一个微妙之处。\n\n到目前为止，我们经常将组件规则的第一个参数称为“模型”，但这并不完全正确。组件规则的第一个参数实际上是正在构建的组件所拥有的块。对于“扁平”模型（没有任何子块的模型），拥有块确实是模型，但对于层次结构化的模型，情况就不是这样了。如果需要，可以使用前述的\
    \ `model()` 方法从拥有块获取模型对象。\n\n例如，考虑以下替代声明的 `xyb` 块（来自前一个示例）：\n\n```\ndef xyb_rule(b,\
    \ t):\n    b.x = pyo.Var()\n    b.I = pyo.RangeSet(t)\n    b.y = pyo.Var(b.I,\
    \ initialize=1.0)\n    def _b_c_rule(_b):\n        return _b.x == 1.0 - sum(_b.y[i]\
    \ for i in _b.I)\n    b.c = pyo.Constraint(rule=_b_c_rule)\nmodel.xyb = pyo.Block(model.T,\
    \ rule=xyb_rule)\n```\n\n在此示例中，`xyb` 块包含一个使用规则 `_b_c_rule` 定义的约束。传递给此规则的拥有块 `_b`\
    \ 与 `b` 是同一个。然而，`_b` 变量是局部定义的。这允许即使在拥有块以不同方式构造时也能使用该规则。\n\n由于拥有块（或模型）没有被传递到块构造规则中，建模者可能需要另一种机制来访问父块或层级结构中其他块上的组件。组件方法\
    \ `parent_block` 和 `model` 有助于在块层级结构中向上移动。任何组件或组件数据对象的 `parent_block()` 是该组件所连接的块。任何组件或组件数据对象的\
    \ `model()` 方法返回位于树根处的块对象。\n\n## 8.5 从层次模型中提取值\n\n虽然块为表示复合概念（例如，一个时间段，一个场景）提供了便捷的机制，但这导致一些数据在模型中变得更加分散。然而，我们可以通过显式地迭代块及其关联的变量来访问组件：\n\
    \n```\nfor t in model.xyb:\n    for i in model.xyb[t].y:\n        print(\"%s %f\"\
    \ % (model.xyb[t].y[i], pyo.value(model.xyb[t].y[i])))\n```\n\n此外，Pyomo 的切片表示法可用于动态提取块或变量值的一个子集：\n\
    \n```\nfor y in model.xyb[:].y[:]:\n    print(\"%s %f\" % (y, pyo.value(y)))\n\
    ```\n\n## 8.6 块示例：最优多期批量规模\n\n我们现在使用一个著名的批量规模优化问题 [31] 来演示一个基于块的完整模型。我们在批量规模问题中的目标是..."
