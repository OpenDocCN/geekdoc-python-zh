  md: '# 13.2.2 Complementarity Expressions


    The design of complementarity conditions in Pyomo relies on the specification
    of Pyomo constraint expressions. A Pyomo constraint expression defines an equality,
    a simple inequality, or a pair of inequalities. For example:


    ```

    expr1 = expr2

    expr3 ≤ expr4

    const1 ≤ expr5 ≤ const2

    ```


    where \( const_i \) are constant arithmetic expressions that may only contain
    variables that are fixed, and \( expr_i \) are arithmetic expressions containing
    unfixed variables.


    A complementarity condition is defined with a pair of constraint expressions


    ```

    l1 ≤ expr1 ≤ u1 ⊥ l2 ≤ expr2 ≤ u2,

    ```


    where exactly two of the constant bounds \( l_1, u_1, l_2 \) and \( u_2 \) are
    finite. The non-finite bounds values are omitted in practice, so this condition
    directly describes a classical or mixed complementarity condition. Additionally,
    a complementarity condition can be expressed with a simple inequality, such as:


    ```

    l1 ≤ expr1 ⊥ expr3 ≤ expr4.

    ```


    This complementarity condition is implicitly transformed to a form with constant
    bounds:


    ```

    l1 ≤ expr1 ⊥ expr3 - expr4 ≤ 0.

    ```


    If a simple inequality is used, then the other constraint expression must also
    be a simple inequality to ensure the complementarity condition has exactly two
    finite bounds.


    # 13.2.3 Modeling Mixed-Complementarity Conditions


    Pyomo’s \( pyomo.mpec \) package defines the \( \text{Complementarity} \) component
    that is used to declare complementarity conditions.


    For example, consider the \( \text{ralph1} \) problem in MacMPEC [41]:


    ```

    min 2x - y

    0 ≤ y ⊥ y ≥ x

    x, y ≥ 0

    ```'
