    # ## 6.3 Investigating the Solution


    After a model is solved, there are two aspects of the solution to be investigated.
    The first is the solution status returned from the solver, and the second is the
    value of the variables and objective function. The solution status can usually
    be viewed in the console by passing `tee=True` into the solve command, but there
    are many times when one would like to read this status in code. This section will
    discuss the results object, and show how to retrieve values from variables after
    the solve.


    # ### 6.3.1 Solver Results


    The `solve()` method returns a results object that contains status information
    from the solver. If the solve completes successfully, the solution values are
    loaded directly into the model. This consists of three steps: (1) storing solutions
    in the `solutions` attribute of the model, (2) load the values of variables from
    a selected solution, and (3) remove solutions from the results object. Afterwards,
    the `results` object only contains meta-data about the model and the optimization
    process. For memory efficiency, it no longer contains the solution itself by default.


    > > **NOTE:** By default, when the solver completes, the solution is automatically
    loaded into the model object and removed from the results object. Due to this,
    the results object will indicate it has 0 solutions.


    Typically, a solver only returns a single solution; however, there are cases where
    a solver might return multiple solutions (a pool of solutions). Due to this, the
    results object supports an interface that looks like a dictionary of lists containing
    more than one solution. However, for the most common case of a single solution,
    the results object supports a simple attribute-like interface. The results object
    returned from the `solve()` method contains a `problem` attribute and a `solver`
    attribute that contain information about the problem statistics and the solver
    status. The `results.solver` attribute contains a `SolverInformation` object.
    Key attributes of this object are shown in the Table 6.1. As noted in Section
    2.5, the simplest thing to do with the `results` object is to pass it to the function
    `assert_optimal_termination`, which halts the script and outputs a message if
    the solver does not report that it found an optimal solution. In situations where
    the script should not halt if the solution is optimal, but a test for optimality
    is needed, the `results` object can be passed to the `check_optimal_termination`
    function that returns `True` if the solver report optimality and `False` if not.


    In some scripts, it makes sense to defer moving the solution from the results
    object to the model until after optimality has been checked. This might be needed
    for efficiency or to avoid having `Var` values that are not optimal loaded into
