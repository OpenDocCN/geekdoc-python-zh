    \ disjuncts may be completely self-contained, with their own local variables,\
    \ parameters, and constraints, they may also reference Pyomo components outside\
    \ their immediate scope. The `Disjunction` component is used to associate a set\
    \ of disjuncts. A disjunction is similar to a constraint, in that it can be indexed\
    \ and defined through rules. However, unlike a `Constraint`, where the rule returns\
    \ a relational expression, the rule for a `Disjunction` must return a list of\
    \ `Disjuncts`. Subsequent model transformations will convert the `Disjunction`\
    \ component and generate the binding constraint across the disjuncts. While the\
    \ general form of a GDP relates the disjuncts using an “OR” operator, the vast\
    \ majority of models actually expect an “exactly one” relationship (a generalization\
    \ of the “exclusive OR” operator). This is so common that the default behavior\
    \ of the `Disjunction` component is to generate the “exactly one” relationship.\
