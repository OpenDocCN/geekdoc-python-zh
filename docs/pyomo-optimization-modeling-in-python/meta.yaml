    \ the `ordered` keyword:\n\n```\npython\nmodel.A = pyo.Set(ordered=pyo.Set.SortedOrder)\n\
    ```\n\nSets may contain data elements that are either singletons or $k$-tuples.\
    \ The `dimen` keyword is used to specify the expected dimension of the data. The\
    \ default value is one, indicating the set will contain singleton data. In some\
    \ cases, the appropriate value of the dimension can be determined from other keyword\
    \ values, but in general the user is required to specify this keyword for tuple\
    \ set data.\n\nOrdered sets may have first and last values. The `bounds` option\
    \ can be used to specify a 2-tuple defining upper and lower bounds for a set.\
    \ This option may be inferred from the `within` argument, when the set is ordered.\n\
    \nThe `RangeSet` component defines an ordered virtual set that represents a sequence\
    \ of integer or floating point values. This sequence is defined by a start value,\
    \ a final value, and a step size. If a `RangeSet` is defined with a single argument,\
    \ then the argument defines the final value. The start value defaults to 1 and\
    \ the step size defaults to 1. For example, the following defines a sequence of\
    \ integers from 1 to 10:\n\n```\npython\nmodel.A = pyo.RangeSet(10)\n```\n\nIf\
    \ a `RangeSet` is defined with two arguments, then the first is the start value\
    \ and the second is the final value. For example, the following defines a sequence\
    \ of integers from 5 to 10:\n\n```\npython\nmodel.C = pyo.RangeSet(5,10)\n```\n\
    \nFinally, if a `RangeSet` is defined with three arguments, then they are the\
    \ start value, final value and step size respectively. For example, the following\
    \ defines a sequence of floating point values from 2.5 to 10.0 with step 1.5:\n\
    \n```\npython\nmodel.D = pyo.RangeSet(2.5,11,1.5)\n```\n\n# 4.6.2 Working with\
    \ Set Objects\n\nThe `len()` function returns the number of elements in the set:\n\
    \n```\npython\nmodel.A = pyo.Set(initialize=[1,2,3])\n\nprint(len(model.A)) #\
    \ 3\n```"
- md: "The elements in the set can be accessed with the `data()` method, which returns\
    \ the underlying set data as a Python tuple (or a Python dictionary for indexed\
    \ sets) as shown below:\n\n```\nmodel.A = pyo.Set(initialize=[1, 2, 3])\nmodel.B\
    \ = pyo.Set(initialize=[3, 2, 1], ordered=True)\nmodel.C = pyo.Set(model.A, initialize={1:[1],\
    \ 2:[1, 2]})\n\nprint(type(model.A.data()) is tuple) # True\nprint(type(model.B.data())\
    \ is tuple) # True\nprint(type(model.C.data()) is dict) # True\nprint(sorted(model.A.data()))\
    \ # [1, 2, 3]\nfor index in sorted(model.C.data().keys()):\n    print(sorted(model.C.data()[index]))\n\
    # [1]\n# [1, 2]\n```\n\nSet comparison and membership tests are supported with\
    \ a variety of Python operators:\n\n```\nmodel.A = pyo.Set(initialize=[1,2,3])\n\
    \n# Test if an element is in the set\nprint(1 in model.A) # True\n\n# Test if\
    \ sets are equal\nprint([1, 2] == model.A) # False\n\n# Test if sets are not equal\n\
    print([1, 2] != model.A) # True\n\n# Test if a set is a subset of or equal to\
    \ the set\nprint([1, 2] <= model.A) # True\n\n# Test if a set is a subset of the\
    \ set\nprint([1, 2] < model.A) # True\n\n# Test if a set is a superset of the\
    \ set\nprint([1, 2, 3] > model.A) # False\n\n# Test if a set is a superset of\
    \ or equal to the set\nprint([1, 2, 3] >= model.A) # True\n```\n\nSets can also\
    \ be iterated over to access individual elements in the set:\n\n```\nmodel.A =\
    \ pyo.Set(initialize=[1, 2, 3])\nmodel.C = pyo.Set(model.A, initialize={1:[1],\
    \ 2:[1, 2]})\n\nprint(sorted(e for e in model.A)) # [1, 2, 3]\nfor index in model.C:\n\
    \    print(sorted(e for e in model.C[index]))\n# [1]\n# [1, 2]\n```\n\nOrdered\
    \ sets include a variety of methods that reflect the ordering in the set:\n\n\
    ```\nmodel.A = pyo.Set(initialize=[3, 2, 1], ordered=True)\n\nprint(model.A.first())\
    \ # 3\nprint(model.A.last()) # 1\nprint(model.A.next(2)) # 1\nprint(model.A.prev(2))\
    \ # 3\nprint(model.A.nextw(1)) # 3\nprint(model.A.prevw(3)) # 1\n```\n\nThe `first()`\
    \ and `last()` methods return the first and last elements in an ordered set respectively.\
    \ The `next()` method takes an element in the set and returns the next element\
    \ in the set. Similarly, the `prev()` method returns the previous element. The\
    \ `nextw()` and `prevw()` methods operate similarly, except that they wrap around\
    \ the ends of the set. In this example, the value of `nextw(1)` is 3 because 1\
    \ is the last element of the set, and 3 is the next element if the set indices\
    \ wrap around. The `ord()` method can be used to find the position index of an\
    \ element in an ordered set, and the `[]` operator can be used to access an element\
    \ given a position index:\n\n```\nmodel.A = pyo.Set(initialize=[3, 2, 1], ordered=True)\n\
    \nprint(model.A.ord(3)) # 1\nprint(model.A.ord(1)) # 3\nprint(model.A[1]) # 3\n\
    print(model.A[3]) # 1\n```\n\n> NOTE: The position indices start at one, not zero.\
    \ The order of the set is determined by the sequence of the data provided when\
    \ it is instantiated and the option specified for the `ordered` keyword argument.\n\
    \n## 4.7 Parameter Data\n\nA parameter is a numerical or symbolic value used to\
    \ formulate constraints and objectives in a model. Pyomo parameters can be created\
    \ using the `Param` class, which can denote a single value, an array of values,\
    \ or a multi-dimensional array of values.\n\nAn unindexed `Param` component looks\
    \ a lot like a scalar value, and an indexed `Param` component looks a lot like\
    \ a Python dictionary of values. The `Param` component supports advanced features\
    \ like mutability and sparse representations with default values.\n\n### 4.7.1\
    \ *Param* Declarations\n\nThe following code creates a `Param` object:\n\n```\n\
    model.Z = pyo.Param(initialize=32)\n```\n\nNamed and un-named arguments are supported,\
    \ and Table 4.6 provides a list of the common arguments that can be passed when\
    \ declaring the `Param` component.\n\n| keyword | description | acceptable values\
    \ |\n| :--- | :--- | :--- |\n| <un-named> | reserved for specifying index sets\
    \ | any number of Pyomo `Set` objects or Python lists |\n| `initialize` | provides\
    \ an initial value for the parameter | a scalar value, Python dictionary, or rule\
    \ function |\n| `default` | provides a default value to use for the parameter\
    \ if no value has been set | a scalar value, Python dictionary, or rule function\
    \ |\n| `validate` | specifies a function that is called to determine if a particular\
    \ value is valid for the parameter | a function that returns True or False given\
    \ a particular value |\n| `mutable` | specifies whether or not the parameter value\
    \ may change between calls to a solver | True/False |\n\n**Table 4.6: Common declaration\
    \ arguments for the `Param` component**\n\nAn indexed parameter can be specified\
    \ by providing sets as un-named arguments to the `Param` declaration:\n\n```\n\
    model.A = pyo.Set(initialize=[1,2,3])\nmodel.B = pyo.Set(initialize=['A','B'])\n\
    model.U = pyo.Param(model.A, initialize={1:10, 2:20, 3:30})\nmodel.T = pyo.Param(model.A,\
    \ model.B,\n                   initialize={(1,'A'):10, (2,'B'):20, (3,'A'):30})\n\
    ```\n\nThe `initialize` keyword can be used to specify the value of a parameter\
    \ as shown in the previous two code snippets. A rule function can also be passed\
    \ to the `initialize` keyword to set the value of a parameter:\n\n```\ndef X_init(model,\
    \ i, j):\n    return i*j\nmodel.X = pyo.Param(model.A, model.A, initialize=X_init)\n\
    ```\n\nIf ordered sets are used to define the index for an indexed parameter,\
    \ then the initialization function can reference previously defined parameter\
    \ values:\n\n```\ndef XX_init(model, i, j):\n    if i==1 or j==1:\n        return\
    \ i*j\n    return i*j + model.XX[i-1, j-1]\nmodel.XX = pyo.Param(model.A, model.A,\
    \ initialize=XX_init)\n```\n\nThe `default` option can be used to specify parameter\
    \ values for all valid indices that have not been explicitly initialized. For\
    \ example, we can define an indexed parameter that represents a 3 × 3 diagonal\
    \ matrix as follows:\n\n```\nu={}\nu[1,1] = 10\nu[2,2] = 20\nu[3,3] = 30\nmodel.U\
    \ = pyo.Param(model.A, model.A, initialize=u, default=0)\n```\n\nSimilar to the\
    \ `Set` component, there are two ways to validate parameter values. First, the\
    \ `within` keyword option can be used to specify the valid domain of parameter\
    \ values:\n\n```\nmodel.Z = pyo.Param(within=pyo.Reals)\n```\n\nValidation of\
    \ parameter data can also be performed with the `validate` option, which specifies\
    \ a function that returns `True` if a parameter value is valid and `False` if\
    \ it is not (Pyomo will throw an exception). The following example uses the `validate`\
    \ option to mimic the behavior of the `within` option:\n\n```\ndef Y_validate(model,\
    \ value):\n    return value in pyo.Reals\nmodel.Y = pyo.Param(validate=Y_validate)\n\
    ```\n\nValidation of indexed parameters is performed similarly. The `validate`\
    \ option specifies a function whose arguments are the model, parameter value,\
    \ and the parameter indices:\n\n```\nmodel.A = pyo.Set(initialize=[1,2,3])\ndef\
    \ X_validate(model, value, i):\n    return value > i\nmodel.X = pyo.Param(model.A,\
    \ validate=X_validate)\n```\n\nIf both the `within` and `validate` options are\
    \ specified, then the logic for both of these options will be applied to validate\
    \ parameter values.\n\nThe `Param` component can be used to represent constant\
    \ values in Pyomo models; however, mutability is also supported. In the following\
    \ example, Pyomo generates the expression for the objective in this model with\
    \ the form:\n\n$x_1 + 4x_2 + 9x_3$.\n\nSpecifically, Pyomo has treated parameter\
    \ values as fixed constants, and its expressions simply contain the numeric constants.\n\
    \n```\nmodel = pyo.ConcreteModel()\np = {1:1, 2:4, 3:9}\n\nmodel.A = pyo.Set(initialize=[1,2,3])\n\
    model.p = pyo.Param(model.A, initialize=p)\nmodel.x = pyo.Var(model.A, within=pyo.NonNegativeReals)\n\
    \nmodel.o = pyo.Objective(expr=sum(model.p[i]*model.x[i] for i in model.A))\n\
    ```\n\nNote that this “conversion” happens as soon as the expression is first\
    \ created. The fact that these values come from a Param component is lost, and\
    \ only the numerical values remain. This is done for efficiency. Consequently,\
    \ these values *cannot be changed* once the expression is created.\n\nHowever,\
    \ this behavior is different if the mutable option is specified while constructing\
    \ the model. If this option is True, then the parameter values are not treated\
    \ as constants. Consider the previous example again where the p parameter is now\
    \ mutable:\n\n```\nmodel = pyo.ConcreteModel()\np = {1:1, 2:4, 3:9}\n\nmodel.A\
    \ = pyo.Set(initialize=[1,2,3])\nmodel.p = pyo.Param(model.A, initialize=p, mutable=True)\n\
    model.x = pyo.Var(model.A, within=pyo.NonNegativeReals)\n\nmodel.o = pyo.Objective(expr=pyo.summation(model.p,\
    \ model.x))\n\nmodel.p[2] = 4.2\nmodel.p[3] = 3.14\n```\n\nWhen Pyomo generates\
    \ the expression for the objective in this model, it keeps knowledge of the Param\
    \ component and now has the form:\n\n$p_1x_1 + p_2x_2 + p_3x_3$.\n\nwhere the\
    \ values $p_i$ are Param objects with references to the parameter values. Here,\
    \ Pyomo treats the parameter values as mutable values that may be changed later\
    \ by the user. In this example, the parameter values are changed *after* the objective\
    \ expression is defined, and the resulting objective is\n\n$x_1 + 4.2x_2 + 3.14x_3$.\n\
    \nThe parameters are only replaced with their numerical values when calling the\
    \ solver. Therefore, their values can be changed between consecutive calls to\
    \ a solver."
  mdcn: "集合中的元素可以通过 `data()` 方法访问，该方法将底层集合数据作为 Python 元组（或对于索引集合为 Python 字典）返回，如下所示：\n\
    \n```\nmodel.A = pyo.Set(initialize=[1, 2, 3])\nmodel.B = pyo.Set(initialize=[3,\
    \ 2, 1], ordered=True)\nmodel.C = pyo.Set(model.A, initialize={1:[1], 2:[1, 2]})\n\
    \nprint(type(model.A.data()) is tuple) # True\nprint(type(model.B.data()) is tuple)\
    \ # True\nprint(type(model.C.data()) is dict) # True\nprint(sorted(model.A.data()))\
    \ # [1, 2, 3]\nfor index in sorted(model.C.data().keys()):\n    print(sorted(model.C.data()[index]))\n\
    # [1]\n# [1, 2]\n```\n\n集合支持使用多种 Python 运算符进行比较和成员测试：\n\n```\nmodel.A = pyo.Set(initialize=[1,2,3])\n\
    \n# 测试元素是否在集合中\nprint(1 in model.A) # True\n\n# 测试集合是否相等\nprint([1, 2] == model.A)\
    \ # False\n\n# 测试集合是否不相等\nprint([1, 2] != model.A) # True\n\n# 测试一个集合是否是另一个集合的子集或等于它\n\
    print([1, 2] <= model.A) # True\n\n# 测试一个集合是否是另一个集合的真子集\nprint([1, 2] < model.A)\
    \ # True\n\n# 测试一个集合是否是另一个集合的超集\nprint([1, 2, 3] > model.A) # False\n\n# 测试一个集合是否是另一个集合的超集或等于它\n\
    print([1, 2, 3] >= model.A) # True\n```\n\n也可以通过迭代集合来访问其中的各个元素：\n\n```\nmodel.A\
    \ = pyo.Set(initialize=[1, 2, 3])\nmodel.C = pyo.Set(model.A, initialize={1:[1],\
    \ 2:[1, 2]})\n\nprint(sorted(e for e in model.A)) # [1, 2, 3]\nfor index in model.C:\n\
    \    print(sorted(e for e in model.C[index]))\n# [1]\n# [1, 2]\n```\n\n有序集合包含多种反映集合中顺序的方法：\n\
    \n```\nmodel.A = pyo.Set(initialize=[3, 2, 1], ordered=True)\n\nprint(model.A.first())\
    \ # 3\nprint(model.A.last()) # 1\nprint(model.A.next(2)) # 1\nprint(model.A.prev(2))\
    \ # 3\nprint(model.A.nextw(1)) # 3\nprint(model.A.prevw(3)) # 1\n```\n\n`first()`\
    \ 和 `last()` 方法分别返回有序集合中的第一个和最后一个元素。`next()` 方法接受集合中的一个元素，并返回集合中的下一个元素。类似地，`prev()`\
    \ 方法返回前一个元素。`nextw()` 和 `prevw()` 方法的工作方式类似，但它们会在集合的两端循环。在此示例中，`nextw(1)` 的值为\
    \ 3，因为 1 是集合的最后一个元素，而 3 是集合索引循环时的下一个元素。`ord()` 方法可用于查找有序集合中元素的位置索引，而 `[]` 运算符可用于根据位置索引访问元素：\n\
    \n```\nmodel.A = pyo.Set(initialize=[3, 2, 1], ordered=True)\n\nprint(model.A.ord(3))\
    \ # 1\nprint(model.A.ord(1)) # 3\nprint(model.A[1]) # 3\nprint(model.A[3]) # 1\n\
    ```\n\n> 注意：位置索引从 1 开始，而不是从 0 开始。集合的顺序由实例化时提供的数据序列以及为 `ordered` 关键字参数指定的选项决定。\n\
    \n## 4.7 参数数据\n\n参数是用于在模型中构建约束和目标的数值或符号值。Pyomo 参数可以使用 `Param` 类创建，该类可以表示单个值、值数组或多维值数组。\n\
    \n未索引的 `Param` 组件看起来很像标量值，而索引的 `Param` 组件看起来很像值的 Python 字典。`Param` 组件支持高级功能，如可变性和带有默认值的稀疏表示。\n\
    \n### 4.7.1 *Param* 声明\n\n以下代码创建了一个 `Param` 对象：\n\n```\nmodel.Z = pyo.Param(initialize=32)\n\
    ```\n\n支持命名和未命名参数，表 4.6 提供了声明 `Param` 组件时可以传递的常用参数列表。\n\n| 关键字 | 描述 | 可接受的值 |\n\
    | :--- | :--- | :--- |\n| <未命名> | 保留用于指定索引集 | 任意数量的 Pyomo `Set` 对象或 Python 列表\
    \ |\n| `initialize` | 为参数提供初始值 | 标量值、Python 字典或规则函数 |\n| `default` | 如果未设置值，则为参数提供要使用的默认值\
    \ | 标量值、Python 字典或规则函数 |\n| `validate` | 指定一个函数，该函数被调用以确定特定值对参数是否有效 | 给定特定值时返回\
    \ True 或 False 的函数 |\n| `mutable` | 指定参数值是否可以在调用求解器之间更改 | True/False |\n\n**表\
    \ 4.6：`Param` 组件的常用声明参数**\n\n可以通过将集合作为未命名参数提供给 `Param` 声明来指定索引参数：\n\n```\nmodel.A\
    \ = pyo.Set(initialize=[1,2,3])\nmodel.B = pyo.Set(initialize=['A','B'])\nmodel.U\
    \ = pyo.Param(model.A, initialize={1:10, 2:20, 3:30})\nmodel.T = pyo.Param(model.A,\
    \ model.B,\n                   initialize={(1,'A'):10, (2,'B'):20, (3,'A'):30})\n\
    ```\n\n如前两个代码片段所示，可以使用 `initialize` 关键字来指定参数的值。也可以将规则函数传递给 `initialize` 关键字来设置参数的值：\n\
    \n```\ndef X_init(model, i, j):\n    return i*j\nmodel.X = pyo.Param(model.A,\
    \ model.A, initialize=X_init)\n```\n\n如果使用有序集合来定义索引参数的索引，那么初始化函数可以引用先前定义的参数值：\n\
    \n```\ndef XX_init(model, i, j):\n    if i==1 or j==1:\n        return i*j\n \
    \   return i*j + model.XX[i-1, j-1]\nmodel.XX = pyo.Param(model.A, model.A, initialize=XX_init)\n\
    ```\n\n`default` 选项可用于为所有未显式初始化的有效索引指定参数值。例如，我们可以如下定义一个表示 3 × 3 对角矩阵的索引参数：\n\n\
    ```\nu={}\nu[1,1] = 10\nu[2,2] = 20\nu[3,3] = 30\nmodel.U = pyo.Param(model.A,\
    \ model.A, initialize=u, default=0)\n```\n\n与 `Set` 组件类似，有两种方法可以验证参数值。首先，可以使用\
    \ `within` 关键字选项来指定参数值的有效域：\n\n```\nmodel.Z = pyo.Param(within=pyo.Reals)\n```\n\
    \n也可以使用 `validate` 选项执行参数数据的验证，该选项指定一个函数，如果参数值有效则返回 `True`，否则返回 `False`（Pyomo\
    \ 将抛出异常）。以下示例使用 `validate` 选项来模拟 `within` 选项的行为：\n\n```\ndef Y_validate(model,\
    \ value):\n    return value in pyo.Reals\nmodel.Y = pyo.Param(validate=Y_validate)\n\
    ```\n\n索引参数的验证方式类似。`validate` 选项指定一个函数，其参数是模型、参数值和参数索引：\n\n```\nmodel.A = pyo.Set(initialize=[1,2,3])\n\
    def X_validate(model, value, i):\n    return value > i\nmodel.X = pyo.Param(model.A,\
    \ validate=X_validate)\n```\n\n如果同时指定了 `within` 和 `validate` 选项，那么这两个选项的逻辑都将应用于验证参数值。\n\
    \n`Param` 组件可用于表示 Pyomo 模型中的常量值；但是，也支持可变性。在下面的示例中，Pyomo 生成此模型中目标的表达式形式为：\n\n$x_1\
    \ + 4x_2 + 9x_3$。\n\n具体来说，Pyomo 将参数值视为固定常量，其表达式仅包含数值常量。\n\n```\nmodel = pyo.ConcreteModel()\n\
    p = {1:1, 2:4, 3:9}\n\nmodel.A = pyo.Set(initialize=[1,2,3])\nmodel.p = pyo.Param(model.A,\
    \ initialize=p)\nmodel.x = pyo.Var(model.A, within=pyo.NonNegativeReals)\n\nmodel.o\
    \ = pyo.Objective(expr=sum(model.p[i]*model.x[i] for i in model.A))\n```\n\n请注意，这种“转换”在表达式首次创建时就会发生。这些值来自\
    \ Param 组件的事实丢失了，只剩下数值。这样做是为了提高效率。因此，一旦表达式创建，这些值*就不能被更改*。\n\n但是，如果在构建模型时指定了 mutable\
    \ 选项，则此行为会有所不同。如果此选项为 True，则参数值不会被视为常量。再次考虑前面的示例，其中 p 参数现在是可变的：\n\n```\nmodel\
    \ = pyo.ConcreteModel()\np = {1:1, 2:4, 3:9}\n\nmodel.A = pyo.Set(initialize=[1,2,3])\n\
    model.p = pyo.Param(model.A, initialize=p, mutable=True)\nmodel.x = pyo.Var(model.A,\
    \ within=pyo.NonNegativeReals)\n\nmodel.o = pyo.Objective(expr=pyo.summation(model.p,\
    \ model.x))\n\nmodel.p[2] = 4.2\nmodel.p[3] = 3.14\n```\n\n当 Pyomo 生成此模型中目标的表达式时，它保留了对\
    \ Param 组件的引用，现在形式为：\n\n$p_1x_1 + p_2x_2 + p_3x_3$。\n\n其中值 $p_i$ 是引用参数值的 Param\
    \ 对象。在这里，Pyomo 将参数值视为可变值，用户可以稍后更改。在此示例中，参数值在目标表达式定义*之后*被更改，最终的目标为\n\n$x_1 + 4.2x_2\
    \ + 3.14x_3$。\n\n参数仅在调用求解器时才替换为其数值。因此，它们的值可以在连续调用求解器之间更改。"
