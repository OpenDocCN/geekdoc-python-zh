  - '[PAGE 171]


    # 10.3.2.2 Multi-Dimensional Parameter Data


    Multi-dimensional parameter data is indexed over either multiple sets or multi-dimensional
    sets. Suppose parameter B is indexed by set A with dimension 2:


    ```

    model.A = pyo.Set(dimen=2)

    model.B = pyo.Param(model.A)

    ```


    The syntax of the `param` data command remains essentially the same when specifying
    values for B with a list of index and parameter values:


    ```

    set A := a 1 c 2 e 3;


    param B :=

    a 1 10

    c 2 30

    e 3 50;

    ```


    Missing and default values are also handled in the same way with multi-dimensional
    index sets:


    ```

    set A := a 1 c 2 e 3;


    param B default 0 :=

    a 1 10

    c 2 .

    e 3 50;

    ```


    Similarly, multiple parameters can defined with a single `param` data command.
    Suppose that parameters B, C, and D are parameters indexed over set A with dimension
    2:


    ```

    model.A = pyo.Set(dimen=2)

    model.B = pyo.Param(model.A)

    model.C = pyo.Param(model.A)

    model.D = pyo.Param(model.A)

    ```


    These parameters can be defined with a single `param` command that declares the
    parameter names followed by a list of index and parameter values:


    ```

    set A := a 1 c 2 e 3;


    param : B C D :=

    a 1 10 -1 1.1

    c 2 30 -3 3.3

    e 3 50 -5 5.5

    ;

    ```


    Similarly, the following `param` data command defines the index set along with
    the parameters:


    ```

    param : A : B C D :=

    a 1 10 -1 1.1

    c 2 30 -3 3.3

    e 3 50 -5 5.5

    ;

    ```'
  - "[PAGE 172]\n\nThe `param` command also supports a matrix syntax for specifying\
    \ the values in a parameter with a 2-dimensional index. Suppose parameter B is\
    \ indexed over set A with dimension 2:\n\n```\nmodel.A = pyo.Set(dimen=2)\nmodel.B\
    \ = pyo.Param(model.A)\n```\n\nThe following `param` command defines a matrix\
    \ of parameter values:\n\n```\nset A := 1 a 1 c 1 e 2 a 2 c 2 e 3 a 3 c 3 e;\n\
    \nparam B : a c e :=\n1 1 2 3\n2 4 5 6\n3 7 8 9\n;\n```\n\nAdditionally, the following\
    \ syntax can be used to specify a transposed matrix of parameter values:\n\n```\n\
    set A := 1 a 1 c 1 e 2 a 2 c 2 e 3 a 3 c 3 e;\n\nparam B (tr) : 1 2 3 :=\na 1\
    \ 4 7\nc 2 5 8\ne 3 6 9\n;\n```\n\nThis functionality facilitates the presentation\
    \ of parameter data in a natural format. In particular, the transpose syntax may\
    \ allow the specification of tables for which the rows comfortably fit within\
    \ a single line. However, a matrix may be divided column-wise into shorter rows\
    \ since the line breaks are not significant in Pyomo's data commands.\n\nFor parameters\
    \ with three or more indices, the parameter data values must be specified as a\
    \ series of slices. Each slice is defined by a template followed by a list of\
    \ index and parameter values. Suppose that parameter B is indexed over set A that\
    \ has dimension 4:\n\n```\nmodel.A = pyo.Set(dimen=4)\nmodel.B = pyo.Param(model.A)\n\
    ```\n\nThe following `param` command defines a matrix of parameter values with\
    \ multiple templates:\n\n```\nset A := (a,1,a,1) (a,2,a,2) (b,1,b,1) (b,2,b,2);\n\
    \nparam B :=\n\n    [*,1,*,1] a a 10 b b 20\n    [*,2,*,2] a a 30 b b 40\n;\n\
    ```\n\nThe B parameter consists of four values: B[a,1,a,1]=10, B[b,1,b,1]=20,\
    \ B[a,2,a,2]=30, and B[b,2,b,2]=40."
