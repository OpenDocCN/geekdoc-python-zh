- md: "## 12.4.2 Restricting Control Input Profiles\n\nOne of the main design considerations\
    \ for the `pyomo.dae` package was the extensibility of the package to include\
    \ general implementations of common operations applied to dynamic optimization\
    \ problems. One such common operation in the area of optimal control is restricting\
    \ the control input to have a certain profile, typically piecewise constant or\
    \ piecewise linear. Often times when a model is discretized using collocation\
    \ over finite elements the control variable is restricted to be constant over\
    \ each finite element. The `pyomo.dae` package includes a function for doing this\
    \ after a collocation discretization has been applied to a model. It works by\
    \ reducing the number of free collocation points for a particular variable. For\
    \ example, to restrict our control input $u$ to be piecewise constant in our small\
    \ optimal control problem you would add the following line right after applying\
    \ a discretization transformation:\n\n```\ndiscretizer.reduce_collocation_points(m,\
    \ var=m.u, ncp=1, contset=m.t)\n```\n\nThe `ncp` keyword argument specifies the\
    \ number of free collocation points per finite element for the variable specified\
    \ by the keyword `var`. Specifying `ncp=1` restricts $u$ to have a single free\
