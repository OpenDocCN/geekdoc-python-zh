  md: "# ## 8.6.1 A Formulation Without Blocks\n\nWe can formulate the lot-sizing\
    \ problem *without* blocks using the Pyomo code shown below.\n\n```\npython\n\
    import pyomo.environ as pyo\n\nmodel = pyo.ConcreteModel()\nmodel.T = pyo.RangeSet(5)\
    \ # time periods\n\ni0 = 5.0 # initial inventory\nc = 4.6 # setup cost\nh_pos\
    \ = 0.7 # inventory holding cost\nh_neg = 1.2 # shortage cost\nP = 5.0 # maximum\
