  - "[PAGE 61]\n\nIn some optimization models, a constraint might not be defined for\
    \ all indices. For example, particular indices might not be physically realizable.\
    \ The rule function can return `Constraint.Skip` (or `Constraint.NoConstraint`)\
    \ to indicate that no constraint is associated with a particular index. For example,\
    \ consider the declaration of a notional task scheduling constraint:\n\n```\n\
    TimePeriods = [1,2,3,4,5]\nLastTimePeriod = 5\n\nmodel.StartTime = pyo.Var(TimePeriods,\
    \ initialize=1.0)\n\ndef Pred_rule(model, t):\n    if t == LastTimePeriod:\n \
    \       return pyo.Constraint.Skip\n    else:\n        return model.StartTime[t]\
    \ <= model.StartTime[t+1]\n\nmodel.Pred = pyo.Constraint(TimePeriods, rule=Pred_rule)\n\
    ```\n\nThe value `Constraint.Skip` indicates that no constraint is being generated,\
    \ and the corresponding index value is skipped. An alternative to this approach\
    \ is to construct a sparse index set that specifies only the valid indices in\
    \ the constraint. However, this may not always be practical in complex models\
    \ (for a discussion of sparse index sets, see Section 9.4).\n\nThe value `Constraint.Feasible`\
    \ indicates that the constraint generated for the specified index is always feasible.\
    \ Consequently, that constraint does not need to be generated, and it is skipped.\
    \ Similarly, the value `Constraint.Infeasible` indicates that the constraint generated\
    \ by the specified index is infeasible. This might be used, for example, if a\
    \ particular combination of parameter values produced an invalid constraint. For\
    \ this value, Pyomo raises an exception to inform the user, because this typically\
    \ indicates an error in the model or data.\n\n# 4.5.2 Working with Constraint\
    \ Objects\n\nAfter a constraint is declared, the constraint expression is processed\
    \ to identify the elements of the logical tuple: `(lower, body, upper)`, where\
    \ the non-constant expressions are pushed to the body. Hence, the `lower` and\
    \ `upper` attributes are constant expressions or `None`, and the `body` attribute\
    \ contains a Pyomo expression. If a `Constraint` contains an equality expression,\
    \ then the `equality` attribute is `True`, and the `lower` and `upper` attributes\
    \ have the same value."
  - "[PAGE 62]\n\nThe value of the constraint body can be evaluated using the `value`\
    \ function. Similarly, the `lslack` and `uslack` methods can be used to compute\
    \ slack values (the difference between the current expression value and the lower\
    \ or upper bound), as shown in the following example:\n\n```\nmodel = pyo.ConcreteModel()\n\
    model.x = pyo.Var(initialize=1.0)\nmodel.y = pyo.Var(initialize=1.0)\n\nmodel.c1\
    \ = pyo.Constraint(expr=model.y - model.x <= 7.5)\nmodel.c2 = pyo.Constraint(expr=-2.5\
    \ <= model.y - model.x)\nmodel.c3 = pyo.Constraint(\n    expr=pyo.inequality(-3.0,\
    \ model.y - model.x, 7.0))\n\nprint(pyo.value(model.c1.body)) # 0.0\n\nprint(model.c1.lslack())\
    \ # inf\nprint(model.c1.uslack()) # 7.5\nprint(model.c2.lslack()) # 2.5\nprint(model.c2.uslack())\
    \ # inf\nprint(model.c3.lslack()) # 3.0\nprint(model.c3.uslack()) # 7.0\n```\n\
    \n# 4.6 Set Data\n\nA set is a collection of data, possibly including numeric\
    \ data (e.g., real or integer values) as well as symbolic data (e.g., strings)\
    \ typically used to specify the valid indices for an indexed component. Several\
    \ classes can be used to define sets in Pyomo models:\n\n+   - `Set` A generic\
    \ component for declaring sets\n- `RangeSet` A component that defines a range\
    \ of numbers\n- `SetOf` A component that creates a set from external data without\
    \ copying the data\n\n# 4.6.1 Set Declarations\n\nThe following code creates a\
    \ `Set` object:\n\n```\nmodel.A = pyo.Set()\n```\n\nNamed and un-named arguments\
    \ are supported, and Table 4.5 provides a list of the common arguments that can\
    \ be passed when declaring the `Set` component."
  - '[PAGE 63]


    Table 4.5: Common declaration arguments for the Set component


    | keyword | description | acceptable values |

    |---------|-------------|-------------------|

    | <un-named> | reserved for specifying index sets | any number of Pyomo Set objects
    or Python lists |

    | initialize | provides initial values to store in the set | Python list, Python
    dictionary, or rule function |

    | within domain | specifies the valid values that can be contained in the set
    | a Pyomo Set object or Python list |

    | ordered | specifies whether or not order of the set should be preserved | True,
    False, Set.InsertionOrder, or Set.SortedOrder |

    | bounds | specifies the lower and upper bounds for valid values in the set |
    a 2-tuple, a Python dictionary, or a rule function |

    | filter | specifies a rule for determining membership in the set | a rule function
    |


    An indexed set can also be specified by providing other sets or Python lists as
    un-named arguments in the declaration:


    ```

    model.A = pyo.Set()

    model.B = pyo.Set()

    model.C = pyo.Set(model.A)

    model.D = pyo.Set(model.A,model.B)

    ```


    Similarly, standard Python types can be used to define a set index:


    ```

    model.E = pyo.Set([1,2,3])

    f = set([1,2,3])

    model.F = pyo.Set(f)

    ```


    Set declarations can also use standard set operations to declare a set in a constructive
    fashion:


    ```

    model.A = pyo.Set()

    model.B = pyo.Set()

    model.G = model.A | model.B # set union

    model.H = model.B & model.A # set intersection

    model.I = model.A - model.B # set difference

    model.J = model.A ^ model.B # set exclusive-or

    ```


    Also, set cross-products can be specified with the multiplication operator:


    ```

    model.A = pyo.Set()

    model.B = pyo.Set()

    model.K = model.A * model.B

    ```'
