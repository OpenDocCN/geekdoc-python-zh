    \n图 12.1：由 matplotlib 为最优控制示例生成的图形\n\n# 第 13 章\n具有均衡约束的数学规划\n\n**摘要** 本章记录了如何构建具有均衡约束的数学规划（MPECs），这类问题在广泛的工程和经济系统中自然产生。我们描述了用于互补条件的\
    \ Pyomo 组件、能够自动化 MPEC 模型重构的转换功能，以及利用这些转换来支持 MPEC 模型全局和局部优化的元求解器。\n\n## 13.1 引言\n\
    \n具有均衡约束的数学规划（MPEC）问题在工程和经济系统的大量应用中出现 [15, 40, 48]。MPEC 是一个包含以互补条件形式出现的均衡约束的优化问题。均衡约束自然地作为优化子问题（例如，对于双层规划）、变分不等式和互补问题\
    \ [29] 的解而出现。\n\n由于 MPEC 问题在实践中经常出现，许多代数建模语言（AML）已经集成了表达互补条件的能力 [43]，包括像 AIMMS\
    \ [1]、AMPL [2, 21]、GAMS [22]、MATLAB [42] 和 YALMIP [39] 这样的 AML。在本章中，我们描述了表达和优化\
    \ MPEC 模型的方法。MPEC 模型可以使用 Pyomo 的互补条件建模组件轻松表达。此外，Pyomo 的面向对象设计自然支持将 MPEC 模型自动化重构为其他形式（例如，析取规划）的能力。我们描述了将\
    \ MPEC 转换为 MIP 或 NLP 问题的 Pyomo 元求解器，然后使用标准求解器进行优化。此外，我们描述了与专门的混合互补问题求解器的接口，这些求解器用于求解不带优化目标表达的\
    \ MPEC 问题。\n\n## 13.2 建模均衡条件\n\n### 13.2.1 互补条件\n\nFerris 等人 [16] 指出，有几种基本形式可以解释实践中出现的广泛互补条件。考虑一个变量\
    \ $x$ 和函数 $g(x)$。经典的互补条件形式可以表示为\n\n$$x \\geq 0 \\perp g(x) \\geq 0,$$\n\n这表达了互补限制，即这两个条件中至少有一个必须以等式成立。当变量\
    \ $x$ 有界，即 $x \\in [l, u]$ 时，则可以表示一个*混合互补条件*\n\n$$l \\leq x \\leq u \\perp g(x),$$\n\
    \n这表达了互补限制，即以下条件中至少有一个必须成立：\n\n$$\\begin{aligned} x = l \\quad &\\text{且 } g(x)\
    \ \\geq 0, \\\\ x = u \\quad &\\text{且 } g(x) \\leq 0, \\\\ \\text{或 } l < x <\
    \ u \\text{ 且 } g(x) = 0. \\end{aligned}$$\n\n这些形式可以通过用函数 $f(x)$ 替换变量 $x$ 来推广。因此，一个*广义混合互补条件*可以表示为\n\
    \n$$l \\leq f(x) \\leq u \\perp g(x),$$\n\n这表达了互补限制，即以下条件中至少有一个必须成立：\n\n$$\\begin{aligned}\
    \ f(x) = l \\quad &\\text{且 } g(x) \\geq 0, \\\\ f(x) = u \\quad &\\text{且 } g(x)\
    \ \\leq 0, \\\\ \\text{或 } l < f(x) < u \\text{ 且 } g(x) = 0. \\end{aligned}$$\n\
    \n为完整起见，请注意互补条件\n\n$$f(x) \\perp g(x) = 0$$\n\n是函数 $f(x)$ 无界时的特例。\n\n### 13.2.2\
    \ 互补表达式\n\nPyomo 中互补条件的设计依赖于 Pyomo 约束表达式的规范。Pyomo 约束表达式定义了一个等式、一个简单不等式或一对不等式。例如：\n\
    \n```\nexpr1 = expr2\nexpr3 ≤ expr4\nconst1 ≤ expr5 ≤ const2\n```\n\n其中 \\( const_i\
    \ \\) 是常数算术表达式，只能包含固定的变量，而 \\( expr_i \\) 是包含未固定变量的算术表达式。\n\n互补条件由一对约束表达式定义\n\n\
    ```\nl1 ≤ expr1 ≤ u1 ⊥ l2 ≤ expr2 ≤ u2,\n```\n\n其中常数边界 \\( l_1, u_1, l_2 \\) 和\
    \ \\( u_2 \\) 中恰好有两个是有限的。在实践中，非有限的边界值会被省略，因此此条件直接描述了经典或混合互补条件。此外，互补条件可以用简单不等式表示，例如：\n\
    \n```\nl1 ≤ expr1 ⊥ expr3 ≤ expr4.\n```\n\n此互补条件被隐式转换为具有常数边界的形式：\n\n```\nl1 ≤\
    \ expr1 ⊥ expr3 - expr4 ≤ 0.\n```\n\n如果使用简单不等式，则另一个约束表达式也必须是简单不等式，以确保互补条件恰好有两个有限边界。\n\
    \n### 13.2.3 建模混合互补条件\n\nPyomo 的 \\( pyomo.mpec \\) 包定义了 \\( \\text{Complementarity}\
    \ \\) 组件，用于声明互补条件。\n\n例如，考虑 MacMPEC [41] 中的 \\( \\text{ralph1} \\) 问题：\n\n```\n\
    min 2x - y\n0 ≤ y ⊥ y ≥ x\nx, y ≥ 0\n```"
