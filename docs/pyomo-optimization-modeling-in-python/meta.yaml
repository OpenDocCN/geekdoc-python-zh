- md: "## 11.5 A mixing problem with semi-continuous variables\n\n`xor=True) The transformation\
    \ name `gdp.hull` is used to apply the Hull transformation.\n\nThe following model\
    \ illustrates a simple mixing problem with three semi-continuous variables (x1,\
    \ x2, x3) which represent quantities that are mixed to meet a volumetric constraint.\
    \ In this simple example, the number of sources is minimized:\n\n```python\n#\
    \ scont.py\nimport pyomo.environ as pyo\nfrom pyomo.gdp import Disjunct, Disjunction\n\
    \nL = [1,2,3]\nU = [2,4,6]\nindex = [0,1,2]\n\nmodel = pyo.ConcreteModel()\nmodel.x\
    \ = pyo.Var(index, within=pyo.Reals, bounds=(0,20))\nmodel.x_nonzero = pyo.Var(index,\
    \ bounds=(0,1))\n\n# Each disjunction is a semi-continuous variable\n# x[k] ==\
    \ 0 or L[k] <= x[k] <= U[k]\ndef d_0_rule(d, k):\n    m = d.model()\n    d.c =\
    \ pyo.Constraint(expr=m.x[k] == 0)\nmodel.d_0 = Disjunct(index, rule=d_0_rule)\n\
    \ndef d_nonzero_rule(d, k):\n    m = d.model()\n    d.c = pyo.Constraint(expr=pyo.inequality(L[k],\
    \ m.x[k], U[k]))\n    d.count = pyo.Constraint(expr=m.x_nonzero[k] == 1)\nmodel.d_nonzero\
    \ = Disjunct(index, rule=d_nonzero_rule)\n\ndef D_rule(m, k):\n    return [m.d_0[k],\
    \ m.d_nonzero[k]]\nmodel.D = Disjunction(index, rule=D_rule)\n\n# Minimize the\
    \ number of x variables that are nonzero\nmodel.o = pyo.Objective(\n    expr=sum(model.x_nonzero[k]\
    \ for k in index))\n\n# Satisfy a demand that is met by these variables\nmodel.c\
    \ = pyo.Constraint(\n    expr=sum(model.x[k] for k in index) >= 7)\n```\n\nThere\
    \ are three ways to apply either the Big-M or Hull transformation to solve this\
    \ model:\n\n1. through the `pyomo` command line,\n2. through a scripting interface,\
    \ or\n3. through a `BuildAction`.\n\nOn the pyomo command line, the `--transform`\
    \ command line option is used to apply a transformation:\n\n```\npyomo solve scont.py\
    \ --transform gdp.bigm --solver=glpk\n```\n\nThe equivalent approach when developing\
    \ custom scripts is to create the transformation before applying it to the model:\n\
    \n```\nxfrm = pyo.TransformationFactory('gdp.bigm')\nxfrm.apply_to(model)\n\n\
    solver = pyo.SolverFactory('glpk')\nstatus = solver.solve(model)\n```\n\nFinally,\
    \ there are situations where you will want to inject transformations into models\
    \ that are generated and manipulated in environments other than the `pyomo` command\
    \ or custom scripts (e.g., the `runph` script). In this case, you can trigger\
    \ the transformation by adding a `BuildAction` to the model:\n\n```\ndef transform_gdp(m):\n\
    \    xfrm = pyo.TransformationFactory('gdp.bigm')\n    xfrm.apply_to(m)\nmodel.transform_gdp\
    \ = pyo.BuildAction(rule=transform_gdp)\n```\n\n## Chapter 12: Differential Algebraic\
    \ Equations\n\nAbstract: This chapter documents how to formulate and solve optimization\
    \ problems with differential and algebraic equations (DAEs). The pyomo.dae package\
    \ allows users to incorporate detailed dynamic models within an optimization framework,\
    \ and it is flexible enough to represent a wide variety of differential equations.\
    \ pyomo.dae also includes several automated solution techniques based on a simultaneous\
    \ discretization approach to solve dynamic optimization problems.\n\n### 12.1\
    \ Introduction\n\nIn order to develop a better understanding of real-world phenomena,\
    \ scientists and engineers often develop dynamic, or differential equation based,\
    \ models. High fidelity simulation of these models is still an active research\
    \ area in many fields, since these simulation models can be difficult and computationally\
    \ expensive. But after a model suitable for simulation has been developed, the\
    \ next goal is often to optimize a particular aspect of the dynamic system (e.g.,\
    \ model parameter estimates given dynamic data, or control of the dynamic system\
    \ to a desired set point). Consider the small optimal control problem from [35]:\n\
    \n$$\n\\begin{aligned}\n&\\min \\quad x_3(t_f) \\tag{12.1} \\\\\n&\\text{s.t.}\
    \ \\quad \\dot{x}_1 = x_2 \\tag{12.2} \\\\\n&\\quad \\dot{x}_2 = -x_2 + u \\tag{12.3}\
    \ \\\\\n&\\quad \\dot{x}_3 = x_1^2 + x_2^2 + 0.005 \\cdot u^2 \\tag{12.4} \\\\\
    \n&\\quad x_2 - 8 \\cdot (t - 0.5)^2 + 0.5 \\leq 0 \\tag{12.5} \\\\\n&\\quad x_1(0)\
    \ = 0, x_2(0) = -1, x_3(0) = 0, t_f = 1 \\tag{12.6}\n\\end{aligned}\n$$\n\nThis\
    \ problem consists of minimizing a function (12.1) subject to a set of ordinary\
    \ differential equations (12.2-12.4) expressed as constraints, and an inequality\
    \ constraint restricting the profile of $x_2$ (also known as a path constraint).\n\
    \nWhile it is easy to write down optimization problems including dynamic models,\
    \ solving them is hard. Off-the-shelf optimization solvers cannot handle differential\
    \ equations directly. Therefore, optimization problems including differential\
    \ equations as constraints, known as dynamic optimization problems, must be reformulated\
    \ in order to be solved. Common solution approaches include single or multiple\
    \ shooting methods or a full discretization approach. Regardless of the solution\
    \ strategy, the implementation of the technique is often entwined with the particular\
    \ model or problem being solved, which makes it time-consuming to apply these\
    \ solution techniques to new dynamic optimization problems or experiment with\
    \ different solution strategies on the same model.\n\nThe pyomo.dae package addresses\
    \ several of these challenges. It provides users the ability to separate the dynamic\
    \ optimization formulation from the solution strategy used to solve it. This is\
    \ done by introducing modeling components for representing continuous domains\
    \ and derivative terms directly. pyomo.dae also includes implementations of the\
    \ simultaneous discretization solution technique, which can be applied automatically\
    \ to a Pyomo model with differential equations. This chapter provides a brief\
    \ overview of how to use the pyomo.dae package. We refer the reader to Nicholson\
    \ et al. [44] for a more detailed description and information about the design\
    \ and novelty of this package. This package is still under active development\
    \ and expansion. Please refer to the online Pyomo documentation for the most up-to-date\
    \ documentation on new features.\n\n### 12.2 Pyomo DAE Modeling Components\n\n\
    The pyomo.dae package defines two new components used to represent DAE models\
    \ in Pyomo:\n\n- ContinuousSet represents continuous domains over which a derivative\
    \ can be taken, and\n- DerivativeVar represents the derivative of a Var with respect\
    \ to a given ContinuousSet.\n\nThe package is explicitly imported to access these\
    \ modeling components:\n\n```python\nimport pyomo.environ as pyo\nimport pyomo.dae\
    \ as dae\n```\n\nThe ContinuousSet component functions similarly to the regular\
    \ Pyomo Set. It can be used to index other Pyomo components such as Var, Constraint,\
    \ or Expression. A ContinuousSet can be thought of as a bounded, continuous range\
    \ of real values. It is often used to represent time or spatial domains. In order\
    \ to construct a ContinuousSet you must supply numeric values representing the\
    \ upper and lower bounds of the continuous domain being represented. For our optimal\
    \ control example, the continuous domain t is declared as follows.\n\n```python\n\
    m.tf = pyo.Param(initialize=1)\nm.t = dae.ContinuousSet(bounds=(0,m.tf))\n```\n\
    \nA separate `ContinuousSet` must be declared for each continuous domain in the\
    \ model. After declaration, it can be used to index other Pyomo components and\
    \ to declare derivatives in conjunction with the `DerivativeVar` component. A\
    \ `DerivativeVar` must be declared for each derivative appearing in the dynamic\
    \ model. Furthermore, you can only take the derivative of a `Var` with respect\
    \ to a `ContinuousSet` included as an indexing set of the variable. The variables\
    \ and derivatives for our optimal control example can be declared using:\n\n```python\n\
    m.u = pyo.Var(m.t, initialize=0)\nm.x1 = pyo.Var(m.t)\nm.x2 = pyo.Var(m.t)\nm.x3\
    \ = pyo.Var(m.t)\n\nm.dx1 = dae.DerivativeVar(m.x1, wrt=m.t)\nm.dx2 = dae.DerivativeVar(m.x2,\
    \ wrt=m.t)\nm.dx3 = dae.DerivativeVar(m.x3)\n```\n\nNotice that the positional\
    \ argument supplied to a `DerivativeVar` component is the `Var` being differentiated.\
    \ The indexing sets for a `DerivativeVar` are inherited from, and identical to,\
    \ those of the `Var` being differentiated. If a variable is indexed by more than\
    \ one `ContinuousSet` then the `wrt` or `withrespectto` keyword argument is used\
    \ to specify the desired derivative. In addition, high-order derivatives can also\
    \ be declared with the `DerivativeVar` component. For example, a second order\
    \ derivative can be specified with:\n\n```python\nm.dx1dt2 = dae.DerivativeVar(m.x1,\
    \ wrt=(m.t, m.t))\n```\n\nDifferential equations can be formulated using standard\
    \ Pyomo constraints. For example, the differential equations for our optimal control\
    \ example are implemented with:\n\n```python\ndef _x1dot(m, t):\n    return m.dx1[t]\
    \ == m.x2[t]\nm.x1dotcon = pyo.Constraint(m.t, rule=_x1dot)\n\ndef _x2dot(m, t):\n\
    \    return m.dx2[t] == -m.x2[t] + m.u[t]\nm.x2dotcon = pyo.Constraint(m.t, rule=_x2dot)\n\
    \ndef _x3dot(m, t):\n    return m.dx3[t] == m.x1[t]**2 + m.x2[t]**2 + 0.005*m.u[t]**2\n\
    m.x3dotcon = pyo.Constraint(m.t, rule=_x3dot)\n```\n\nThe `pyomo.dae` package\
    \ does not impose a particular form or structure on the differential equations.\
    \ The differential equations will by default be enforced at the boundaries of\
    \ the continuous domain. Depending on the dynamic model, this might not be desired.\
    \ You can use the `deactivate()` method to override the enforcement of a differential\
    \ equation at one or more bounds of a continuous domain as shown here:"
