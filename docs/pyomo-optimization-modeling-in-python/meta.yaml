    # 3.3.5 Modeling Components for Sets and Parameters


    While data can be specified using native Python types, Pyomo also includes modeling
    components `Set` and `Param` to define index sets and parameters respectively.
    A Pyomo `Set` component is used to declare valid indices for any indexed component.
    For example, in the context of the warehouse location problem, two sets are shown:
    $N$ stores the valid warehouse locations and $M$ stores the customer locations.
    These sets can easily be declared using the following code:


    ```

    model.N = pyo.Set()

    model.M = pyo.Set()

    ```


    These `Set` objects can be used to define indexed variables or constraints:


    ```

    model.x = pyo.Var(model.N, model.M, bounds=(0,1))

    model.y = pyo.Var(model.N, within=pyo.Binary)

    ```


    This example passes `Set` objects into the `Var` constructor, rather than the
    Python lists used in earlier examples. A `Set` component can be initialized by
    employing the `initialize` keyword argument, with a Python set, list, or tuple.'
- md: "```markdown\n## Chapter 4\n\n# Pyomo Models and Components: An Introduction\n\
    \n**Abstract** This chapter describes the core classes used to define optimization\
    \ models in Pyomo. Most of the discussion focuses on modeling components used\
    \ to declare parts of a model. Included is a discussion of the options used when\
    \ declaring the components and information about key component attributes and\
    \ methods.\n\n## 4.1 An Object-Oriented AML\n\nPyomo supports an object-oriented\
    \ approach for representing mathematical optimization models. A model object is\
    \ created, and then modeling components are added to this object to declare different\
    \ parts of the model. Pyomo includes modeling components commonly supported by\
    \ modern AMLs: variables, constraints, objectives, index sets, and symbolic parameters.\
    \ This chapter describes the Pyomo modeling components. In subsequent chapters,\
    \ additional components are introduced that provide enhanced functionality to\
    \ represent advanced optimization model features.\n\nUsers can create two types\
    \ of models in Pyomo: concrete and abstract. A *concrete* model is constructed\
    \ “on-the-fly” as each model component is declared. Therefore, the data associated\
    \ with a concrete model must be specified before model components are declared.\
    \ A user can leverage native Python data structures to define components in a\
    \ concrete model. The `ConcreteModel` class is used to represent a concrete model.\n\
    \nIn contrast, an *abstract* model supports complete declaration of a model abstractly.\
    \ A specific problem instance is not constructed until all components are declared\
    \ and the data is provided. The `AbstractModel` class is used to create an abstract\
    \ model. Because abstract models allow components to reference data before it\
    \ is defined, they often rely on Pyomo data components such as `Set` and `Param`\
    \ to provide an abstract definition of the data used to construct the model (although\
    \ these components can be used on concrete models as well).\n\nThe following are\
    \ the core modeling components in Pyomo:\n\n- **Var** The Var component is used\
    \ to represent optimization variables. Pyomo supports continuous and discrete\
    \ variables, and includes several pre-defined domains.\n- **Objective** The Objective\
    \ component defines the function or functions to be optimized by the solver. This\
    \ component contains the expression used to define the objective function, and\
    \ a flag to indicate the sense (maximize or minimize).\n- **Constraint** Constraints\
    \ are used to define additional restrictions on the optimization variables. The\
    \ Constraint component contains expressions and the appropriate relational operator.\
    \ Pyomo supports equality (==) and general inequality (<= or >=) constraints.\n\
    - **Set** The Set component represents a collection of data that can include numeric\
    \ (e.g., integer), or symbolic (e.g., string) elements. They are most commonly\
    \ used to define valid indices for other components. Several common set operations\
    \ are also supported.\n- **Param** The Param component is used to represent numerical\
    \ or symbolic values for data in the optimization problem. In contrast with simple\
    \ Python data types (e.g., float), Param objects support the ability to change\
    \ values (meaning they are *mutable*), and include features like sparse representations\
    \ and default values.\n- **Expression** The Expression component can be used to\
    \ create a Pyomo expression that can be reused in different parts of a Pyomo model.\
    \ This is useful for representing common sub-expressions for memory efficiency.\
    \ Similar to mutable parameters, the underlying expression can be changed between\
    \ calls to the solver.\n- **Suffix** Frequently, there is a need to provide, or\
    \ receive, meta-data about a model or a component (e.g., dual information from\
    \ a constraint). This is supported through the Pyomo Suffix component.\n\nThis\
    \ chapter describes each of these components in more detail. A variety of other\
    \ modeling components are included in Pyomo, some of which are briefly discussed\
    \ at the end of this chapter and covered in more detail in the remaining chapters\
    \ of this book.\n\n> NOTE: Unless otherwise stated, the code snippets and examples\
    \ used in this chapter refer to concrete models.\n\n## 4.2 Common Component Paradigms\n\
    \nThere are behaviors common across most of the Pyomo modeling components listed\
    \ in the previous section. Additionally, there are some common paradigms adopted\
    \ by Pyomo Set objects can also be indexed by other sets. Consider the following\
    \ example:\n\n```python\nmodel.PremierSundaes = pyo.Set()\nmodel.Toppings = pyo.Set(model.PremierSundaes)\n\
    ```\n\nThe set `model.Toppings` is an indexed set. If `model.PremierSundaes` is\
    \ given the values {‘PBC-Banana’, ‘Very Berry’ }, then toppings for each of these\
    \ indices can be defined. For example, `model.Toppings[’PBC-Banana’]` might contain\
    \ the set {‘Peanut Butter’, ‘Chocolate Fudge’, ‘Banana’ }. On the other hand,\
    \ `model.Toppings[’Very Berry’]` might contain {‘Strawberries’, ‘Raspberries’,\
    \ ‘Blueberries’, ‘Crunch-berries’}.\n\nA Pyomo Param component can be used to\
    \ define data values for this problem. In the context of the warehouse location\
    \ problem, two pieces of data need to be specified: P and d_n,m. These parameters\
    \ can be declared using the following code:\n\n```python\nmodel.d = pyo.Param(model.N,\
    \ model.M)\nmodel.P = pyo.Param()\n```\n\nThis example declares a scalar parameter\
    \ P and an indexed parameter d. The parameter d is indexed by the Pyomo sets for\
    \ the warehouse and customer locations defined earlier. As with the Set object,\
    \ values for these parameters could be provided through the initialize keyword\
    \ argument using a Python dictionary or by defining a construction rule.\n\nBy\
    \ default, parameters are immutable, meaning once their values are set, these\
    \ values cannot be changed. This default behavior allows for increased efficiency\
    \ within Pyomo when handling expressions. However, a parameter whose values are\
    \ mutable can be defined with the mutable=True keyword argument. This can be useful\
    \ if a model should be solved multiple times with different values of some of\
    \ the parameters.\n\nAs an example, consider the warehouse location problem again.\
    \ Assume significantly more data is required (e.g. a large number of potential\
    \ warehouse locations and customer locations). Using a mutable parameter for P\
    \ easily shows how the optimal delivery costs change when the maximum number of\
    \ warehouses is changed.\n\nThe following code shows the process to define the\
    \ model with a mutable parameter for P using the Pyomo Param object.\n\n```python\n\
    # wl_mutable.py: warehouse location problem with mutable param\nimport pyomo.environ\
    \ as pyo\n\ndef create_warehouse_model(N, M, d, P):\n    model = pyo.ConcreteModel(name=\"\
    (WL)\")\n\n    model.x = pyo.Var(N, M, bounds=(0,1))\n    model.y = pyo.Var(N,\
    \ within=pyo.Binary)\n    model.P = pyo.Param(initialize=P, mutable=True)\n\n\
    \    def obj_rule(mdl):\n        return sum(d[n,m]*mdl.x[n,m] for n in N for m\
    \ in M)\n    model.obj = pyo.Objective(rule=obj_rule)\n\n    def demand_rule(mdl,\
    \ m):\n        return sum(mdl.x[n,m] for n in N) == 1\n    model.demand = pyo.Constraint(M,\
    \ rule=demand_rule)\n\n    def warehouse_active_rule(mdl, n, m):\n        return\
    \ mdl.x[n,m] <= mdl.y[n]\n    model.warehouse_active = pyo.Constraint(N, M, rule=warehouse_active_rule)\n\
    \n    def num_warehouses_rule(mdl):\n        return sum(mdl.y[n] for n in N) <=\
    \ mdl.P\n    model.num_warehouses = pyo.Constraint(rule=num_warehouses_rule)\n\
    \n    return model\n```\n\nThe key differences are the declaration of the Param\
    \ object, `model.P`, and the use of `model.P` in the `num_warehouses` constraint.\
    \ The script can be modified to load the distance data from Excel, and execute\
    \ a loop in Python to solve the optimization problem repeatedly for different\
    \ values of the mutable parameter `model.P`. This script is shown below.\n\n```python\n\
    # wl_mutable_excel.py: solve problem with different values for P\nimport pandas\n\
    import pyomo.environ as pyo\nfrom wl_mutable import create_warehouse_model\n\n\
    # read the data from Excel using Pandas\ndf = pandas.read_excel('wl_data.xlsx',\
    \ 'Delivery Costs', header=0, index_col=0)\n\nN = list(df.index.map(str))\nM =\
    \ list(df.columns.map(str))\nd = {(r, c):df.at[r,c] for r in N for c in M}\nP\
    \ = 2\n\n# create the Pyomo model\nmodel = create_warehouse_model(N, M, d, P)\n\
    \n# create the solver interface\nsolver = pyo.SolverFactory('glpk')\n\n# loop\
    \ over values for mutable parameter P\nfor n in range(1,10):\n    model.P = n\n\
    \    res = solver.solve(model)\n    pyo.assert_optimal_termination(res)\n    print('#\
    \ warehouses:', n, 'delivery cost:', pyo.value(model.obj))\n```\n\nPyomo users\
    \ can leverage Python's powerful scripting capabilities to execute custom workflows\
    \ that manipulate and optimize models. This section has only scratched the surface\
    \ of the possibilities with scripting. More details are provided in Chapter 5."
  mdcn: "```markdown\n## 第四章\n\n# Pyomo模型与组件简介\n\n**摘要** 本章介绍了在Pyomo中定义优化模型所使用的核心类。讨论重点集中于用于声明模型各部分的建模组件。内容涵盖了声明组件时可用的选项，以及关键组件属性和方法的信息。\n\
    \n## 4.1 面向对象的AML\n\nPyomo支持一种面向对象的方法来表示数学优化模型。首先创建一个模型对象，然后向该对象添加建模组件以声明模型的不同部分。Pyomo包含了现代AML普遍支持的建模组件：变量、约束、目标函数、索引集合和符号参数。本章将描述Pyomo的建模组件。在后续章节中，将介绍其他组件，这些组件提供了增强的功能以表示高级优化模型特性。\n\
    \n用户可以在Pyomo中创建两种类型的模型：具体模型和抽象模型。*具体*模型在声明每个模型组件时是“即时”构建的。因此，与具体模型关联的数据必须在声明模型组件之前指定。用户可以利用原生的Python数据结构来定义具体模型中的组件。`ConcreteModel`类用于表示一个具体模型。\n\
    \n相比之下，*抽象*模型支持对模型进行完全抽象的声明。在所有组件被声明且数据被提供之前，不会构建具体的问题实例。`AbstractModel`类用于创建抽象模型。因为抽象模型允许组件在数据定义之前引用数据，它们通常依赖Pyomo的数据组件（如`Set`和`Param`）来提供用于构建模型的数据的抽象定义（尽管这些组件也可用于具体模型）。\n\
    \n以下是Pyomo的核心建模组件：\n\n- **Var** Var组件用于表示优化变量。Pyomo支持连续和离散变量，并包含多个预定义域。\n- **Objective**\
    \ Objective组件定义求解器要优化的函数。该组件包含用于定义目标函数的表达式，以及一个表示优化方向（最大化或最小化）的标志。\n- **Constraint**\
    \ 约束用于定义对优化变量的附加限制。Constraint组件包含表达式和相应的关系运算符。Pyomo支持等式约束（==）和一般不等式约束（<=或>=）。\n\
    - **Set** Set组件表示一个数据集合，可以包含数值（如整数）或符号（如字符串）元素。它们最常用于为其他组件定义有效的索引。同时还支持一些常见的集合运算。\n\
    - **Param** Param组件用于表示优化问题中的数据的数值或符号值。与简单的Python数据类型（如float）相比，Param对象支持更改值的能力（即它们是*可变的*），并包含稀疏表示和默认值等特性。\n\
    - **Expression** Expression组件可用于创建可在Pyomo模型不同部分重复使用的Pyomo表达式。这对于表示公共子表达式以提高内存效率很有用。与可变参数类似，底层表达式可以在求解器调用之间更改。\n\
    - **Suffix** 通常，需要提供或接收关于模型或组件的元数据（例如，来自约束的对偶信息）。这通过Pyomo的Suffix组件得到支持。\n\n本章将更详细地描述每个组件。Pyomo中还包含各种其他建模组件，其中一些将在本章末尾简要讨论，并在本书剩余章节中更详细地介绍。\n\
    \n> 注意：除非另有说明，本章中使用的代码片段和示例均指具体模型。\n\n## 4.2 常见的组件范式\n\n大多数Pyomo建模组件之间存在一些共同的行为。此外，Pyomo的Set对象也可以被其他集合索引。考虑以下示例：\n\
    \n```python\nmodel.PremierSundaes = pyo.Set()\nmodel.Toppings = pyo.Set(model.PremierSundaes)\n\
    ```\n\n集合`model.Toppings`是一个索引集合。如果`model.PremierSundaes`被赋予值{'PBC-Banana', 'Very\
    \ Berry'}，那么就可以为每个索引定义配料。例如，`model.Toppings['PBC-Banana']`可能包含集合{'Peanut Butter',\
    \ 'Chocolate Fudge', 'Banana'}。另一方面，`model.Toppings['Very Berry']`可能包含{'Strawberries',\
    \ 'Raspberries', 'Blueberries', 'Crunch-berries'}。\n\nPyomo的Param组件可用于定义此问题的数据值。在仓库选址问题的背景下，需要指定两个数据：P和d_{n,m}。这些参数可以使用以下代码声明：\n\
    \n```python\nmodel.d = pyo.Param(model.N, model.M)\nmodel.P = pyo.Param()\n```\n\
    \n此示例声明了一个标量参数P和一个索引参数d。参数d由前面定义的仓库和客户位置的Pyomo集合索引。与Set对象类似，这些参数的值可以通过`initialize`关键字参数使用Python字典提供，或者通过定义构建规则来提供。\n\
    \n默认情况下，参数是不可变的，这意味着一旦它们的值被设置，这些值就不能更改。这种默认行为允许Pyomo在处理表达式时提高效率。但是，可以使用`mutable=True`关键字参数定义值可变的参数。如果模型需要用不同的参数值多次求解，这可能会很有用。\n\
    \n作为一个例子，再次考虑仓库选址问题。假设需要更多的数据（例如，大量的潜在仓库位置和客户位置）。使用可变参数P可以轻松地展示当最大仓库数量改变时，最优配送成本如何变化。\n\
    \n以下代码展示了使用Pyomo的Param对象为P定义可变参数模型的过程。\n\n```python\n# wl_mutable.py: 带有可变参数的仓库选址问题\n\
    import pyomo.environ as pyo\n\ndef create_warehouse_model(N, M, d, P):\n    model\
    \ = pyo.ConcreteModel(name=\"(WL)\")\n\n    model.x = pyo.Var(N, M, bounds=(0,1))\n\
    \    model.y = pyo.Var(N, within=pyo.Binary)\n    model.P = pyo.Param(initialize=P,\
    \ mutable=True)\n\n    def obj_rule(mdl):\n        return sum(d[n,m]*mdl.x[n,m]\
    \ for n in N for m in M)\n    model.obj = pyo.Objective(rule=obj_rule)\n\n   \
    \ def demand_rule(mdl, m):\n        return sum(mdl.x[n,m] for n in N) == 1\n \
    \   model.demand = pyo.Constraint(M, rule=demand_rule)\n\n    def warehouse_active_rule(mdl,\
    \ n, m):\n        return mdl.x[n,m] <= mdl.y[n]\n    model.warehouse_active =\
    \ pyo.Constraint(N, M, rule=warehouse_active_rule)\n\n    def num_warehouses_rule(mdl):\n\
    \        return sum(mdl.y[n] for n in N) <= mdl.P\n    model.num_warehouses =\
    \ pyo.Constraint(rule=num_warehouses_rule)\n\n    return model\n```\n\n关键区别在于Param对象`model.P`的声明以及在`num_warehouses`约束中使用了`model.P`。可以修改脚本以从Excel加载距离数据，并在Python中执行循环，对可变参数`model.P`的不同值重复求解优化问题。该脚本如下所示。\n\
    \n```python\n# wl_mutable_excel.py: 对不同的P值求解问题\nimport pandas\nimport pyomo.environ\
    \ as pyo\nfrom wl_mutable import create_warehouse_model\n\n# 使用Pandas从Excel读取数据\n\
    df = pandas.read_excel('wl_data.xlsx', 'Delivery Costs', header=0, index_col=0)\n\
    \nN = list(df.index.map(str))\nM = list(df.columns.map(str))\nd = {(r, c):df.at[r,c]\
    \ for r in N for c in M}\nP = 2\n\n# 创建Pyomo模型\nmodel = create_warehouse_model(N,\
    \ M, d, P)\n\n# 创建求解器接口\nsolver = pyo.SolverFactory('glpk')\n\n# 对可变参数P的不同值进行循环\n\
    for n in range(1,10):\n    model.P = n\n    res = solver.solve(model)\n    pyo.assert_optimal_termination(res)\n\
    \    print('# warehouses:', n, 'delivery cost:', pyo.value(model.obj))\n```\n\n\
    Pyomo用户可以利用Python强大的脚本功能来执行自定义工作流，以操作和优化模型。本节仅触及了脚本应用可能性的皮毛。更多细节将在第5章提供。"
