    problem is to determine the optimal production $X_t$ in each time period $t \in
    T$ given known demands $d_t$. We let $y_t$ be a binary variable indicating whether
    or not there is any production in time period $t$, and assume that there is a
    fixed cost $c_t$ if we decide to produce in time period $t$. The inventory $I_t$
    at the end of each time period is a function of the previous inventory, production,
    and sales,


    $$I_t = I_{t-1} + X_t - d_t.$$


    If we allow the inventory to be negative (meaning we did not meet demands and
    we have a backlog of orders), we can represent the inventory as $I_t=I_t^+ - I_t^-$
    where we restrict both $I_t^+$ and $I_t^-$ to be non-negative. Here, $I_t^+$ represents
    inventory that we are holding, and $I_t^-$ represents a backlog of orders. We
    can assign an inventory holding cost and a shortage cost (cost of keeping a backlog)
    as $h_t^+$ and $h_t^-$, respectively.


    With this description, the optimization problem can be formulated as,


    $$\min \sum_{t \in T} c_t y_t + h_t^+ I_t^+ + h_t^- I_t^-$$

    $$\text{s.t.} \quad I_t = I_{t-1} + X_t - d_t \quad \forall t \in T$$

    $$I_t = I_t^+ - I_t^- \quad \forall t \in T$$

    $$X_t \le P y_t \quad \forall t \in T$$

    $$X_t, I_t^+, I_t^- \ge 0 \quad \forall t \in T$$

    $$y_t \in \{0, 1\} \quad \forall t \in T$$


    where Equation (LS.4) is a constraint that only allows production in time period
    $t$ if the indicator variable $y_t=1$. The data for our problem is provided in
    Table 8.1.


    Table 8.1: Data for Lot-Sizing Problem


    | Parameter | Description | Value |

    | :--- | :--- | :--- |

    | $c$ | fixed cost of production | 4.6 |

    | $I_0^+$ | initial value of positive inventory | 5.0 |

    | $I_0^-$ | initial value of backlogged orders | 0.0 |

    | $h^+$ | cost (per unit) of holding inventory | 0.7 |

    | $h^-$ | shortage cost (per unit) | 1.2 |

    | $P$ | maximum production amount (big-M value) | 5 |

    | $d$ | demand | [5, 7, 6.2, 3.1, 1.7] |'
