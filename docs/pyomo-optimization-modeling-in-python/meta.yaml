    # Chapter 3

    Pyomo Overview


    **Abstract** This chapter provides an overview of the modeling strategies and
    capabilities of Pyomo. A brief discussion of the core modeling components supported
    by Pyomo, and some of the modeling capabilities within Pyomo (e.g., discrete variables
    and nonlinear models) are provided.


    # 3.1 Introduction


    Pyomo supports an object-oriented design for the definition of optimization models.
    A Pyomo *model* object contains a collection of modeling *components* defining
    the optimization problem. The Pyomo package includes modeling components necessary
    to formulate an optimization problem: variables, objectives, and constraints,
    as well as other modeling components commonly supported by modern AMLs, including
    index sets and parameters. These basic modeling components are defined in Pyomo
    through the following Python classes:


    ```

    Var          optimization variables in a model

    Objective    expressions that are minimized or maximized in a model

    Constraint   constraint expressions in a model

    Set          set data that is used to define a model instance

    Param        parameter data that is used to define a model instance

    ```


    In this chapter, an overview of these components and the process to define and
    solve Pyomo models is given. The basic steps of a simple modeling process are
    as follows:


    +   1. Create an instance of a model using Pyomo modeling components.

    2. Pass this instance to a solver to find a solution.

    3. Report and analyze results from the solver.


    Pyomo supports general scripting with Python where a user can flexibly control
    the solution process and develop a custom workflow, such as solving sequences
    of problems with modifications, or more complex meta-algorithms.'
  - '[PAGE 39]


    In this chapter, an example problem is used to illustrate the process of formulating
    a real-world model, including the use of modeling components, indexed components,
    and construction rules. The use of scripting for more advanced workflows is also
    discussed.


    # 3.2 The Warehouse Location Problem


    The warehouse location problem is used throughout this chapter. This formulation
    seeks to find the locations for a set of warehouses that meet delivery demands
    while optimizing transportation costs. Let $N$ be a set of candidate warehouse
    locations, and let $M$ be a set of customer locations. For each warehouse $n$,
    the cost of delivering product to customer $m$ is given by $d_{n,m}$. The goal
    is to determine the optimal warehouse locations that will minimize the total cost
    of product delivery. The binary variables $y_n$ are used to define whether or
    not a warehouse should be built, where $y_n$ is 1 if warehouse $n$ is selected
    and 0 otherwise. The variable $x_{n,m}$ indicates the fraction of demand for customer
    $m$ that is served by warehouse $n$.


    The variables $x$ and $y$ are to be determined by the optimization solver, while
    all other quantities are known inputs or parameters in the problem. This problem
    is a particular description of the $p$-median problem, and it has the interesting
    property that there will be optimal $x$ values in $\{0,1\}$ even though they are
    not specified as binary variables.


    The complete problem formulation is:


    ```

    \[

    \begin{aligned}

    \min_{x,y} & \sum_{n \in N} \sum_{m \in M} d_{n,m} x_{n,m} && \text{(WL.1)} \n\text{s.t.}
    & \sum_{n \in N} x_{n,m} = 1, \quad \forall m \in M && \text{(WL.2)} \n& x_{n,m}
    \le y_n, \quad \forall n \in N, m \in M && \text{(WL.3)} \n& \sum_{n \in N} y_n
    \le P && \text{(WL.4)} \n& 0 \le x \le 1 && \text{(WL.5)} \n& y \in \{0, 1\} &&
    \text{(WL.6)}

    \end{aligned}

    \]

    ```


    Here, the objective (equation WL.1) is to minimize the total cost associated with
    delivering products to all the customers. Equation WL.2 ensures that each customer''s
    demand is fully met, and equation WL.3 ensures that a warehouse can deliver product
    to customers only if that warehouse is selected to be built. With equation WL.4
    the number of warehouses that can be built is limited to $P$.'
