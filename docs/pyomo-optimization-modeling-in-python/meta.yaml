    \nAlthough using the `LinearExpression` is less clear and less concise, it is\
    \ over 6 times faster in this example. Note the performance improvement depends\
    \ heavily on the number of terms in the expression.\n\n# 9.3 Repeated Solves with\
    \ Persistent Solvers\n\nEach time a Pyomo model is solved using the standard solver\
    \ interfaces, the generalized modeling components defining the model must be translated\
    \ into some input form recognized by the solver in use. For cases where the solver\
    \ finishes relatively quickly, this model translation may introduce significant\
    \ timing overhead. Persistent solver interfaces provide a mechanism for reducing\
    \ overall translation time for models that are solved repeatedly with incremental\
    \ changes. This is made possible by exposing functionality allowing users to efficiently\
    \ notify the solver of these incremental changes to the Pyomo model, after an\
    \ initial step where the full model is translated.\n\nWhen a persistent interface\
    \ is used, additional care must be taken so that the Pyomo model and its translated\
    \ solver representation are kept in sync. This is a manual process that must be\
    \ done by the user. However, with this tradeoff, significant performance improvements\
    \ are possible for many common optimization approaches.\n\nIn Section 9.3.1, we\
    \ briefly discuss when persistent solvers are most useful. In Sections 9.3.2 –\
    \ 9.3.4, we describe how to use a persistent solver interface. In Section 9.3.5,\
    \ we re-implement the parametric sweep example from Section 9.1.3 using a persistent\
    \ solver interface."
- md: "## 9.3.1 When to Use a Persistent Solver\n\nPersistent solver interfaces are\
    \ designed to be used when repeatedly solving the same model with minor changes.\
    \ They are most useful when the solver time is not significantly longer than the\
    \ time needed for Pyomo to translate the model to the solver’s input format. Of\
    \ course, persistent solvers can be used no matter how long it takes to solve\
    \ the problem. However, if the time spent solving the problem is significantly\
    \ longer than the time needed for translation, then little speedup will be observed,\
    \ but the complexity of the code may have increased. Linear programs are excellent\
    \ candidates for use with persistent solver interfaces because most linear programs\
    \ can be solved very efficiently. On the other hand, many mixed-integer programs\
    \ are difficult to solve and are poor candidates for the persistent solver interfaces.\
    \ Ultimately, it is necessary to use the profilers discussed in Section 9.1 to\
    \ determine how beneficial a persistent solver interface will be for any particular\
    \ application.\n\n## 9.3.2 Basic Usage\n\nThe first step in using a persistent\
    \ solver is to create a Pyomo model as usual.\n\n```python\nimport pyomo.environ\
    \ as pyo\nm = pyo.ConcreteModel()\nm.x = pyo.Var()\nm.y = pyo.Var()\nm.obj = pyo.Objective(expr=m.x**2\
    \ + m.y**2)\nm.c = pyo.Constraint(expr=m.y >= -2*m.x + 5)\n```\n\nYou can create\
    \ an instance of a persistent solver through the `SolverFactory`.\n\n```python\n\
    opt = pyo.SolverFactory('gurobi_persistent')\n```\n\nThis returns an instance\
    \ of the `GurobiPersistent` class. Now we need to tell the solver about our model.\n\
    \n```python\nopt.set_instance(m)\n```\n\nThis will create a gurobipy Model object\
    \ and include the appropriate variables and constraints. We can now solve the\
    \ model.\n\n```python\nresults = opt.solve()\n```\n\nNote that the model should\
    \ not be passed into the `solve` method, as is done with most solver interfaces.\
    \ We can also add or remove variables, constraints, or blocks and set objectives.\
    \ For example,\n\n```python\nm.c2 = pyo.Constraint(expr=m.y >= m.x)\nopt.add_constraint(m.c2)\n\
    ```\n\nThis tells the solver to add one new constraint but otherwise leave the\
    \ model unchanged. We can now resolve the model.\n\n```python\nresults = opt.solve()\n\
    ```\n\nTo remove a component, simply call the corresponding remove method.\n\n\
    ```python\nopt.remove_constraint(m.c2)\ndel m.c2\nresults = opt.solve()\n```\n\
    \nIf a Pyomo component is replaced with another component with the same name,\
    \ the first component must be removed from the solver. Otherwise, the solver will\
    \ have multiple components. For example, the following code will run without error,\
    \ but the solver will have an extra constraint. The solver will have both $y \\\
    geq -2*x + 5$ and $y \\leq x$, which is not what was intended!\n\n```python\n\
    m = pyo.ConcreteModel()\nm.x = pyo.Var()\nm.y = pyo.Var()\nm.c = pyo.Constraint(expr=m.y\
    \ >= -2*m.x + 5)\nopt = pyo.SolverFactory('gurobi_persistent')\nopt.set_instance(m)\n\
    # WRONG:\ndel m.c\nm.c = pyo.Constraint(expr=m.y <= m.x)\nopt.add_constraint(m.c)\n\
    ```\n\nThe correct way to do this is:\n\n```python\nm = pyo.ConcreteModel()\n\
    m.x = pyo.Var()\nm.y = pyo.Var()\nm.c = pyo.Constraint(expr=m.y >= -2*m.x + 5)\n\
    opt = pyo.SolverFactory('gurobi_persistent')\nopt.set_instance(m)\n# Correct:\n\
    opt.remove_constraint(m.c)\ndel m.c\nm.c = pyo.Constraint(expr=m.y <= m.x)\nopt.add_constraint(m.c)\n\
    ```\n\nIn most cases, the only way to modify a component is to remove it from\
    \ the solver instance, modify it with Pyomo, and then add it back to the solver\
    \ instance. The only exception is with variables. Variables may be modified and\
    \ then updated with the solver:\n\n```python\nm = pyo.ConcreteModel()\nm.x = pyo.Var()\n\
    m.y = pyo.Var()\nm.obj = pyo.Objective(expr=m.x**2 + m.y**2)\nm.c = pyo.Constraint(expr=m.y\
    \ >= -2*m.x + 5)\nopt = pyo.SolverFactory('gurobi_persistent')\nopt.set_instance(m)\n\
    m.x.setlb(1.0)\nopt.update_var(m.x)\n```\n\nIn short, any time the Pyomo model\
    \ is changed, the persistent solver interface must be notified and kept in sync.\
    \ Table 9.1 presents the appropriate methods to use for various Pyomo model modifications.\
    \ Note that when mutable parameters or\n\nTable 9.1: Persistent Solver Interface\
    \ Methods\n\n| Operation | Method |\n| :--- | :--- |\n| Add constraint | `opt.add_constraint()`\
    \ |\n| Add variable | `opt.add_var()` |\n| Add block | `opt.add_block()` |\n|\
    \ Set objective | `opt.set_objective()` |\n| Remove constraint | `opt.remove_constraint()`\
    \ |\n| Remove variable | `opt.remove_var()` |\n| Remove block | `opt.remove_block()`\
    \ |\n| Modify variable | `opt.update_var()` |\n| Modify mutable parameter | `opt.remove_constraint()`<br>`m.param.value\
    \ = val`<br>`opt.add_constraint()` |\n| Modify Expression | `opt.remove_constraint()`<br>`m.expr\
    \ += val`<br>`opt.add_constraint()` |\n\nnamed Expressions are modified, all constraints\
    \ utilizing the modified parameters/expressions must be updated (removed and re-added).\n\
    \n## 9.3.3 Working with Indexed Variables and Constraints\n\nThe examples in section\
    \ 9.3.2 all used scalar variables and constraints; in order to use indexed variables\
    \ and/or constraints, the code must be slightly adapted:\n\n```python\nm.v = pyo.Var([0,\
    \ 1, 2])\nm.c2 = pyo.Constraint([0, 1, 2])\nfor i in range(3):\n    m.c2[i] =\
    \ m.v[i] == i\nfor v in m.v.values():\n    opt.add_var(v)\nfor c in m.c2.values():\n\
    \    opt.add_constraint(c)\n```\n\nThis must be done when removing indexed variables\
    \ and constraints, too. Note that the `is_indexed` method can be used to automate\
    \ the process.\n\n## 9.3.4 Additional Performance\n\nIn order to get the best\
    \ performance out of the persistent solvers, use the `save_results` argument:\n\
    \n```python\nm = pyo.ConcreteModel()\nm.x = pyo.Var()\nm.y = pyo.Var()\nm.obj\
    \ = pyo.Objective(expr=m.x**2 + m.y**2)\nm.c = pyo.Constraint(expr=m.y >= -2*m.x\
    \ + 5)\nopt = pyo.SolverFactory('gurobi_persistent')\nopt.set_instance(m)\nresults\
    \ = opt.solve(save_results=False)\n```\n\nNote that if the `save_results` flag\
    \ is set to `False`, then the following is not supported.\n\n```python\nresults\
    \ = opt.solve(save_results=False, load_solutions=False)\nif results.solver.termination_condition\
    \ == \\\n    pyo.TerminationCondition.optimal:\n    try:\n        m.solutions.load_from(results)\n\
    \    except AttributeError:\n        print('AttributeError was raised')\n```\n\
    \n```\nAttributeError was raised\n```\n\nHowever, the following will work:\n\n\
    ```python\nresults = opt.solve(save_results=False, load_solutions=False)\nif results.solver.termination_condition\
    \ == \\\n    pyo.TerminationCondition.optimal:\n    opt.load_vars()\n```\n\nAdditionally,\
    \ a subset of variable values may be loaded back into the model:\n\n```python\n\
    results = opt.solve(save_results=False, load_solutions=False)\nif results.solver.termination_condition\
    \ == \\\n    pyo.TerminationCondition.optimal:\n    opt.load_vars([m.x])\n```\n\
    \n## 9.3.5 Example\n\nIn this section, we re-implement the parameter sweep example\
    \ from Section 9.1.3 using a persistent solver interface. The following is a function\
    \ which performs the parameter sweep with a persistent solver interface.\n\n```python\n\
    def solve_parametric_persistent():\n    m = create_warehouse_model(num_locations=50,\
    \ num_customers=50)\n    opt = pyo.SolverFactory('gurobi_persistent')\n    opt.set_instance(m)\n\
    \    p_values = list(range(1, 31))\n    obj_values = list()\n    for p in p_values:\n\
    \        m.P.value = p\n        opt.remove_constraint(m.num_warehouses)\n    \
    \    opt.add_constraint(m.num_warehouses)\n        res = opt.solve(save_results=False)\n\
    \        assert_optimal_termination(res)\n        obj_values.append(res.problem.lower_bound)\n\
    ```\n\nThere are a few additional lines of code compared to the function from\
    \ Section 9.1.3. Specifically, we have added calls to the `set_instance`, `remove_constraint`,\
    \ and `add_constraint` methods on the solver interface.\n\nThe following code\
    \ block calls the above function and reports the execution time.\n\n```python\n\
    timer.tic()\nsolve_parametric_persistent()\ntimer.toc('Finished parameter sweep\
    \ with persistent interface')\n```\n\nThe output is here.\n\n```\n[ 22.79] Resetting\
    \ the tic/toc delta timer\n[+ 0.91] finished parameter sweep with persistent interface\n\
    ```\n\nNote this function was approximately 8 times faster than the non-persistent\
    \ counterpart (0.91 seconds vs 7.28 seconds). Recall that the performance depends\
    \ heavily on the application as discussed in Section 9.3.1.\n\n## 9.4 Sparse Index\
    \ Sets\n\nOften, a model makes use of only a portion of the cross product of multiple\
    \ index sets. In particular, sometimes the members in one dimension depend on\
    \ the value in another, leading to the slang “jagged sets.”\n\nFor example, a\
    \ modeler may want to have a constraint to hold for\n\n$i \\in \\mathcal{I}, k\
    \ \\in \\mathcal{K}, v \\in \\mathcal{V}_k$.\n\nThere are many ways to accomplish\
    \ this, but one good way is to create a set of tuples composed of all of valid\
    \ “model.k, model.V[k]” pairs. This is illustrated in the following example where\
    \ the jagged set KV is used.\n\n```python\nimport pyomo.environ as pyo\n\nmodel\
    \ = pyo.AbstractModel()\n\nmodel.I = pyo.Set()\nmodel.K = pyo.Set()\nmodel.V =\
    \ pyo.Set(model.K)\n\ndef kv_init(m):\n    return ((k,v) for k in m.K for v in\
    \ m.V[k])\nmodel.KV = pyo.Set(dimen=2, initialize=kv_init)\n\nmodel.a = pyo.Param(model.I,\
    \ model.K)\n\nmodel.y = pyo.Var(model.I)\nmodel.x = pyo.Var(model.I, model.KV)\n\
    ```"
  mdcn: "## 9.3.1 何时使用持久化求解器\n\n持久化求解器接口设计用于在模型仅有微小改动时反复求解同一模型。当求解器的运行时间与 Pyomo 将模型转换为求解器输入格式所需的时间相比并非显著更长时，它们最为有用。当然，无论问题求解耗时多久，都可以使用持久化求解器。然而，如果求解问题所花费的时间显著长于翻译所需的时间，那么几乎不会观察到加速效果，但代码的复杂性可能已经增加。线性规划是使用持久化求解器接口的绝佳候选者，因为大多数线性规划可以非常高效地求解。另一方面，许多混合整数规划难以求解，不适合作为持久化求解器接口的候选对象。最终，有必要使用第\
    \ 9.1 节讨论的性能分析工具来确定持久化求解器接口对任何特定应用的收益有多大。\n\n## 9.3.2 基本用法\n\n使用持久化求解器的第一步是照常创建一个\
    \ Pyomo 模型。\n\n```python\nimport pyomo.environ as pyo\nm = pyo.ConcreteModel()\n\
    m.x = pyo.Var()\nm.y = pyo.Var()\nm.obj = pyo.Objective(expr=m.x**2 + m.y**2)\n\
    m.c = pyo.Constraint(expr=m.y >= -2*m.x + 5)\n```\n\n你可以通过 `SolverFactory` 创建一个持久化求解器实例。\n\
    \n```python\nopt = pyo.SolverFactory('gurobi_persistent')\n```\n\n这将返回一个 `GurobiPersistent`\
    \ 类的实例。现在我们需要将模型信息告知求解器。\n\n```python\nopt.set_instance(m)\n```\n\n这将创建一个 gurobipy\
    \ 模型对象，并包含相应的变量和约束。我们现在可以求解该模型。\n\n```python\nresults = opt.solve()\n```\n\n请注意，与大多数求解器接口不同，不应将模型传入\
    \ `solve` 方法。我们还可以添加或删除变量、约束或块，并设置目标。例如，\n\n```python\nm.c2 = pyo.Constraint(expr=m.y\
    \ >= m.x)\nopt.add_constraint(m.c2)\n```\n\n这告诉求解器添加一个新约束，但除此之外模型保持不变。我们现在可以重新求解该模型。\n\
    \n```python\nresults = opt.solve()\n```\n\n要删除一个组件，只需调用相应的移除方法。\n\n```python\n\
    opt.remove_constraint(m.c2)\ndel m.c2\nresults = opt.solve()\n```\n\n如果用同名的另一个组件替换了\
    \ Pyomo 组件，则必须从求解器中移除第一个组件。否则，求解器将拥有多个组件。例如，以下代码运行不会出错，但求解器将有一个额外的约束。求解器将同时包含\
    \ $y \\geq -2*x + 5$ 和 $y \\leq x$，这不是预期的结果！\n\n```python\nm = pyo.ConcreteModel()\n\
    m.x = pyo.Var()\nm.y = pyo.Var()\nm.c = pyo.Constraint(expr=m.y >= -2*m.x + 5)\n\
    opt = pyo.SolverFactory('gurobi_persistent')\nopt.set_instance(m)\n# 错误的方式：\n\
    del m.c\nm.c = pyo.Constraint(expr=m.y <= m.x)\nopt.add_constraint(m.c)\n```\n\
    \n正确的做法是：\n\n```python\nm = pyo.ConcreteModel()\nm.x = pyo.Var()\nm.y = pyo.Var()\n\
    m.c = pyo.Constraint(expr=m.y >= -2*m.x + 5)\nopt = pyo.SolverFactory('gurobi_persistent')\n\
    opt.set_instance(m)\n# 正确的方式：\nopt.remove_constraint(m.c)\ndel m.c\nm.c = pyo.Constraint(expr=m.y\
    \ <= m.x)\nopt.add_constraint(m.c)\n```\n\n在大多数情况下，修改组件的唯一方法是从求解器实例中将其移除，使用 Pyomo\
    \ 进行修改，然后将其重新添加到求解器实例中。唯一的例外是变量。变量可以被修改然后与求解器同步：\n\n```python\nm = pyo.ConcreteModel()\n\
    m.x = pyo.Var()\nm.y = pyo.Var()\nm.obj = pyo.Objective(expr=m.x**2 + m.y**2)\n\
    m.c = pyo.Constraint(expr=m.y >= -2*m.x + 5)\nopt = pyo.SolverFactory('gurobi_persistent')\n\
    opt.set_instance(m)\nm.x.setlb(1.0)\nopt.update_var(m.x)\n```\n\n简而言之，每当 Pyomo\
    \ 模型发生更改时，都必须通知持久化求解器接口并保持其同步。表 9.1 展示了用于各种 Pyomo 模型修改的相应方法。请注意，当可变参数或\n\n表 9.1：持久化求解器接口方法\n\
    \n| 操作 | 方法 |\n| :--- | :--- |\n| 添加约束 | `opt.add_constraint()` |\n| 添加变量 | `opt.add_var()`\
    \ |\n| 添加块 | `opt.add_block()` |\n| 设置目标 | `opt.set_objective()` |\n| 移除约束 | `opt.remove_constraint()`\
    \ |\n| 移除变量 | `opt.remove_var()` |\n| 移除块 | `opt.remove_block()` |\n| 修改变量 | `opt.update_var()`\
    \ |\n| 修改可变参数 | `opt.remove_constraint()`<br>`m.param.value = val`<br>`opt.add_constraint()`\
    \ |\n| 修改表达式 | `opt.remove_constraint()`<br>`m.expr += val`<br>`opt.add_constraint()`\
    \ |\n\n命名表达式被修改时，所有使用修改后参数/表达式的约束都必须被更新（移除并重新添加）。\n\n## 9.3.3 处理带索引的变量和约束\n\n\
    第 9.3.2 节中的示例都使用了标量变量和约束；为了使用带索引的变量和/或约束，代码必须稍作调整：\n\n```python\nm.v = pyo.Var([0,\
    \ 1, 2])\nm.c2 = pyo.Constraint([0, 1, 2])\nfor i in range(3):\n    m.c2[i] =\
    \ m.v[i] == i\nfor v in m.v.values():\n    opt.add_var(v)\nfor c in m.c2.values():\n\
    \    opt.add_constraint(c)\n```\n\n移除带索引的变量和约束时也必须这样做。请注意，`is_indexed` 方法可用于自动化此过程。\n\
    \n## 9.3.4 附加性能优化\n\n为了从持久化求解器获得最佳性能，请使用 `save_results` 参数：\n\n```python\nm =\
    \ pyo.ConcreteModel()\nm.x = pyo.Var()\nm.y = pyo.Var()\nm.obj = pyo.Objective(expr=m.x**2\
    \ + m.y**2)\nm.c = pyo.Constraint(expr=m.y >= -2*m.x + 5)\nopt = pyo.SolverFactory('gurobi_persistent')\n\
    opt.set_instance(m)\nresults = opt.solve(save_results=False)\n```\n\n请注意，如果 `save_results`\
    \ 标志设置为 `False`，则不支持以下操作。\n\n```python\nresults = opt.solve(save_results=False,\
    \ load_solutions=False)\nif results.solver.termination_condition == \\\n    pyo.TerminationCondition.optimal:\n\
    \    try:\n        m.solutions.load_from(results)\n    except AttributeError:\n\
    \        print('AttributeError was raised')\n```\n\n```\nAttributeError was raised\n\
    ```\n\n然而，以下代码是有效的：\n\n```python\nresults = opt.solve(save_results=False, load_solutions=False)\n\
    if results.solver.termination_condition == \\\n    pyo.TerminationCondition.optimal:\n\
    \    opt.load_vars()\n```\n\n此外，可以将一部分变量值加载回模型：\n\n```python\nresults = opt.solve(save_results=False,\
    \ load_solutions=False)\nif results.solver.termination_condition == \\\n    pyo.TerminationCondition.optimal:\n\
    \    opt.load_vars([m.x])\n```\n\n## 9.3.5 示例\n\n在本节中，我们使用持久化求解器接口重新实现了第 9.1.3\
    \ 节中的参数扫描示例。以下是一个使用持久化求解器接口执行参数扫描的函数。\n\n```python\ndef solve_parametric_persistent():\n\
    \    m = create_warehouse_model(num_locations=50, num_customers=50)\n    opt =\
    \ pyo.SolverFactory('gurobi_persistent')\n    opt.set_instance(m)\n    p_values\
