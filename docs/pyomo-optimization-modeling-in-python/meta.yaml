    \ ..., N-1$$\n(12.8)\n\n$$g\\left(\\frac{dx}{dt}\\bigg|_{t_{k+1}}, f(x_{k+1},\
    \ u_{k+1})\\right) = 0, \\quad k = 0, ..., N-1$$\n(12.9)\n\nwhere $x_k = x(t_k)$,\
    \ $t_k = kh$, and $h$ is the step size between discretization points or the size\
    \ of each finite element. When a finite difference transformation is applied to\
