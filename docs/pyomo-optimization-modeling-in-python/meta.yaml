    \ |\n| 10000 | 1.34381 | 1072.44 |\n\nThis example illustrates the scripting capabilities\
    \ of Pyomo. See Chapter 5 for additional scripting examples and further description\
    \ of these capabilities.\n\n## Chapter 8\nStructured Modeling with Blocks\n\n\
    **Abstract** This chapter documents how to express hierarchically-structured models\
    \ using Pyomo's `Block` component. Many models contain significant hierarchical\
    \ structure; that is, they are composed of repeated groups of conceptually related\
    \ modeling components. Pyomo allows the modeler to define fundamental building\
    \ blocks, and then construct the overall problem by connecting these building\
    \ blocks together in an object-oriented manner. In this chapter, we describe the\
    \ fundamental `Block` component along with common examples of its use, including\
    \ repeated components and managing model scope.\n\n## 8.1 Introduction\n\nOptimization\
    \ solvers typically rely on getting a model in a standardized form. For example,\
    \ linear solvers accept models built on a standard form similar to:\n\n```\nmin\
    \ $c^T x$\ns.t. $Ax \\leq b$ .\n$x \\geq 0$\n```\n\nHere, the variables are lumped\
    \ together into a single vector $x$, and constraints are represented in simplified\
    \ matrix form. While this form is convenient for algorithms directly manipulating\
    \ these matrices, it is not an easy form for a modeler to generate, manipulate,\
    \ or debug. Algebraic Modeling Languages (AMLs) directly address this challenge\
    \ by allowing modelers to provide distinguishing names to modeling components\
    \ (e.g., variables or constraints) and to define the model over index sets. Since\
    \ models are often composed of repeated mathematical expressions, this allows\
    \ the expression of large models with relatively few lines of code, which are\
    \ also easier to document, understand, modify, and debug.\n\nAs models become\
    \ larger and more complex, we often want to carry this concept further using the\
    \ principle of *composition* from object-oriented programming. In this approach,\
    \ we group - or compose - variables and constraints that are conceptually related\
    \ into a single object. This modeling approach, does not emphasize that the constraints\
    \ are connected by a common expression generator, but rather the variables and\
    \ constraints describe a certain (often physical) concept. For example, the group\
    \ of variables and constraints could represent the operating behavior of an electric\
    \ generator (ramp-up limits, ramp-down limits, cost curves) or chemical process\
    \ equipment like a distillation column (the mass, equilibrium, and energy balance\
    \ equations). Other examples include multi-period optimization problems where\
    \ the same fundamental model is repeated over many time periods, or stochastic\
    \ programming problems where the same basic model is repeated over different scenarios\
    \ with different parameters. In Pyomo, we use the Block component to support general\
    \ composition of modeling components like those described.\n\nThe Block component\
    \ is a container for organizing groups of variables and constraints, and it can\
    \ contain any number of named Pyomo components in exactly the same way models\
    \ do. In fact, ConcreteModel and AbstractModel are themselves special implementations\
    \ of the Block component. Block components can be added to a model or another\
    \ block, allowing modelers to construct hierarchical model structures based on\
    \ fundamental building blocks in an object-oriented manner.\n\nThis concept is\
    \ illustrated in Figure 8.1, which shows one possible block-oriented representation\
    \ of an electrical grid model. In this example, individual blocks define the necessary\
    \ variables and equations describing a single piece of equipment, be it a generator,\
    \ bus, or transmission line. Then, blocks are connected together to form the entire\
    \ (single time period) electrical grid power flow model. This model could be solved\
    \ on its own. However, it can also be used as a building block for a higher-level\
    \ model, like the multi-period planning problem illustrated in this figure. In\
    \ this manner, Pyomo can represent very complex models built using smaller, less\
    \ complex, reusable pieces.\n\nBlocks provide both modelers and algorithm developers\
    \ several useful benefits:\n\n- *composition* Modelers can build - and test -\
    \ small models or model components and then assemble them into larger, more complex\
    \ system models.\n- *annotation* The model can explicitly annotate model structure\
    \ and provide “hints” to both algorithms (e.g., decomposition algorithms like\
    \ Benders decomposition or progressive hedging) and transformations (e.g., generalized\
    \ disjunctive programming) for how to manipulate the model.\n- *sandboxing* Because\
    \ each Block is its own container, it enables both model (component) developers\
    \ and algorithm developers to build and manipulate modeling components in their\
    \ own “private” sandboxes, without worrying about naming collisions or other interference\
    \ from other developers.\n\n## 8.2 Block structures\n\nThe Pyomo `Block` component\
    \ can be treated in much the same way as a model: components are added directly\
    \ to the block as attributes. Since `Block` components may contain any other Pyomo\
    \ modeling components, including other blocks, it is possible to construct arbitrarily\
    \ nested hierarchical structures.\n\nThe following code snippet shows a basic\
    \ block hierarchy:\n\n```\nmodel = pyo.ConcreteModel()\nmodel.x = pyo.Var()\n\
    model.P = pyo.Param(initialize=5)\nmodel.S = pyo.RangeSet(model.P)\nmodel.b =\
    \ pyo.Block()\nmodel.b.I = pyo.RangeSet(model.P)\nmodel.b.x = pyo.Var(model.b.I)\n\
    model.b.y = pyo.Var(model.S)\nmodel.b.b = pyo.Block([1,2])\nmodel.b.b[1].x = pyo.Var()\n\
    model.b.b[2].x = pyo.Var()\n```\n\nHere, `model` contains a variable (`model.x`),\
    \ a parameter (`model.P`), and a set (`model.S`). It also contains a `Block` given\
    \ by `model.b`. This block itself contains a set, two variables, and another indexed\
    \ block. Notice components in a block can reference components in other blocks\
    \ or in the parent model. For example, the variable `model.b.x` uses a set from\
    \ its parent block, and the variable `model.b.y` references a set from the parent\
    \ of the parent block (in this case, the model). Components can also be added\
    \ to blocks using the `add_component` method."
