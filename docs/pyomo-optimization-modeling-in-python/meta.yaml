    # A.11.2 Copying


    Sometimes assignment of a reference is not what is wanted. For these situations,
    the Python `copy` module allows for transfer of data from one variable to another.
    It supports *shallow* copies via the `copy` method and *deep* copies via the `deepcopy`
    method. The difference is only apparent for compound structures (e.g. a dictionary
    containing lists). The `deepcopy` method will attempt to make a new copy of everything,
    while `copy` will only make a new copy of the top level and will try to create
    references for everything else. For example,


    ```

    >>> import copy

    >>> x = [1,2,3]

    >>> y = copy.deepcopy(x)

    >>> x[0] = 3

    >>> x.append(6)

    >>> print(x,y)

    ```


    will result in the output


    ```

    [3,2,3,6] [1,2,3]

    ```


    In this particular example `copy.copy` and `copy.deepcopy` would have the same
    behavior.


    # A.12 Modules


    A *module* is a file containing Python statements. For example, any file containing
    a Python “program” defining classes or functions is a module. Definitions from
    one module can be made available in another module (or program file) via the `import`
    command, which can specify which names to import or specify the import of all
    names by using an asterisk.

    Python is typically installed with many standard modules present, such as `types`.
    The command `from types import *` causes the import of all names from the `types`
    module.

    Multiple module files in a directory can be organized into a *package*, and packages
    can contain modules and sub-packages. Imports from a package can use a statement
    giving the package name (i.e., directory name) followed by a dot followed by a
    the module name. For example, the command


    ```

    import pyomo.environ as pyo

    ```'
