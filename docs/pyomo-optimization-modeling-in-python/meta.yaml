    \ problem adapted from Bequette [7]. The goal is to produce product B from a feed\
    \ containing reactant A. If we design a reactor that is too small, we will obtain\
    \ insufficient conversion of A to the desired product B. However, given the reaction\
    \ scheme, if the reactor is too large (e.g., too much reaction is allowed to occur),\
    \ a significant amount of the desired product B will be further reacted to form\
    \ the undesired product C. As a result, the goal in this exercise will be to solve\
    \ for the optimal reactor volume producing the maximum outlet concentration for\
    \ product B.\n\nThe steady-state mole balances for each of the four components\
    \ are given by,\n\n$$0 = \\frac{F}{V}c_{Af} - \\frac{F}{V}c_A - k_1c_A - 2k_3c_A^2$$\n\
    $$0 = -\\frac{F}{V}c_B + k_1c_A - k_2c_B$$\n$$0 = -\\frac{F}{V}c_C + k_2c_B$$\n\
    $$0 = -\\frac{F}{V}c_D + k_3c_A^2$$\n\nThe known parameters for the system are,\n\
