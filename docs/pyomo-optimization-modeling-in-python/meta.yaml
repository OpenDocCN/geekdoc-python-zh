  md: 'Complementarity: This component is used to define complementarity conditions
    in a mathematical program with equilibrium constraints (MPEC). Several forms of
    the complementarity conditions are supported. This component is documented further
    in Chapter 13.


    ContinuousSet: This component is used to represent bounded continuous domains
    in the context of modeling differential equations. This component is documented
    further in Chapter 12.


    DerivativeVar: This component is used to represent derivatives of Var components
    in the context of modeling differential equations. This component is documented
    further in Chapter 12.


    Disjunct: This component supports the Generalized Disjunctive Programming (GDP)
    capability within Pyomo. A Disjunct component is a container for an indicator
    variable and a set of constraints that should be active when that indicator variable
    is True. This component is documented further in Chapter 11.


    Disjunction: This component supports the Generalized Disjunctive Programming (GDP)
    capability within Pyomo. A Disjunction component contains a set of Disjunct objects
    connected by a logical “OR” operator. This component is documented further in
    Chapter 11.


    Piecewise: This component supports piecewise modeling of general functions. It
    supports several different transformations to produce mixed-integer representations
    for the piecewise functions. Additional documentation for this component can be
    found at the Pyomo website.


    SOSConstraint: Special ordered sets (SOS) can be defined in Pyomo through the
    SOSConstraint component. Pyomo supports special ordered sets of type 1 and 2 (SOS1
    and SOS2). Additional documentation for this component can be found at the Pyomo
    website.


    BuildAction and BuildCheck: These components are used mainly in abstract models
    and are described in Section 10.4.'
