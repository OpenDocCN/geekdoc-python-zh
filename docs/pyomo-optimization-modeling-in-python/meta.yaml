  md: '# 11.3 Expressing logical constraints


    While Disjunct blocks capture the indicator relationship between the Boolean indicator_var
    and the constraints contained on a disjunct, we also wish to express additional
    logical constraints among the disjunct indicator variables. To support this, Pyomo
    provides a LogicalConstraint component for representing logical constraints in
    a model. As is the case with Constraint components, LogicalConstraint components
    may be single or indexed, and are initialized using an explicit expr keyword argument,
    or passed a rule function through the rule keyword. Where they differ is in the
    type of expression that they take: whereas Constraint accepts relational expressions
    that are equality or inequality expressions, LogicalConstraint accepts a logical
    expression.


    Logical epressions are built using an expression system with Boolean variables
    and Boolean constants combined using logical operators. Table 11.1 shows the operators
    supported for Logical Expressions. The operations for logical expressions intentionally
    do not overlap with the operations supported for algebraic expressions, thereby
    enforcing a semantic distinction between binary (algebraic) variables and Boolean
    (logical) variables.


    Table 11.1: Supported operations for generating logical expressions. In these
    examples, X, Y, and Z are declared BooleanVar variables (the model. is omitted
    due to space limitations).


    | Operation | Function | Method | Operator |

    |-----------|----------|--------|----------|

    | **Unary operations** | | | |

    | negation | pyo.lnot(X) | | ~X |

    | **Binary operations** | | | |

    | conjunction | | X.land(Y) | |

    | disjunction | | X.lor(Y) | |

    | exclusive disjunction | pyo.xor(X, Y) | X.xor(Y) | |

    | implication | pyo.implies(X, Y) | X.implies(Y) | |

    | equivalence | pyo.equivalent(X, Y) | X.equivalent_to(Y) | |

    | **n-ary operations** | | | |

    | conjunction | pyo.land(X, Y, Z) | | |

    | disjunction | pyo.lor(X, Y, Z) | | |

    | counting (at least m) | pyo.atleast(m, X, Y, Z) | | |

    | counting (at most m) | pyo.atmost(m, X, Y, Z) | | |

    | counting (exactly m) | pyo.exactly(m, X, Y, Z) | | |'
