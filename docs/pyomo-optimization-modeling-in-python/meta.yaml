  md: '# A.5.4 Sets


    Python sets are extremely similar to Pyomo Set components. Python sets cannot
    have duplicate members and are unordered. They are declared using the `set` function,
    which takes a list (perhaps an empty list) as an argument. Once a set has been
    created, it has member functions for operations such as `add` (one new member),
    `update` (with multiple new members), and `discard` (existing members). The following
    Python session illustrates the functionality of `set` objects:


    ```

    >>> A = set([1, 3])

    >>> B = set([2, 4, 6])

    >>> A.add(7)

    >>> C = A | B

    >>> print(C)

    set([1, 2, 3, 4, 6, 7])

    ```


    > **NOTE:** Lowercase `set` refers to the built-in *Python* object. Uppercase
    `Set` refers to the *Pyomo* component.


    # A.5.5 Dictionaries


    Python dictionaries are somewhat similar to lists; however, they are unordered
    and they can be indexed by any immutable type (e.g., strings, numbers, tuples
    composed of strings and/or numbers, and more complex objects). The indices are
    called keys, and within any particular dictionary the keys must be unique. Dictionaries
    are created using curly brackets, and they can be initialized with a list of key-value
    pairs separated by commas. Dictionary members can be added by assignment of a
    value to the dictionary key. The values in the dictionary can be any object (even
    other dictionaries), but we will restrict our attention to simpler dictionaries.
    Here is an example:


    ```

    >>> D = {''Bob'':''123-1134'',}

    >>> D[''Alice''] = ''331-9987''

    >>> print(D)

    {''Bob'': ''123-1134'', ''Alice'': ''331-9987''}

    >>> print(D.keys())

    [''Bob'', ''Alice'']

    >>> print(D[''Bob''])

    123-1134

    ```'
