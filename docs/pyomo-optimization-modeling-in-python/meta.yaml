    \ = 0 \\quad d^L \\le d(x) \\le d^U \\quad x^L \\le x \\le x^U\n```\n\nThe allowable\
    \ form of the objective function f(x), the vector of equality constraints c(x),\
    \ and the vector of inequality constraints d(x) depends entirely on the solver\
    \ selected to provide a solution. However, Pyomo is tested extensively with local\
    \ and global solvers that typically assume that these functions are continuous\
    \ and smooth, with continuous first (and possibly second) derivatives. The development\
    \ of nonlinear extensions for Pyomo has focused on this broad problem class.\n\
    \n#### 7.2.1 Nonlinear Expressions\n\nFormulating nonlinear optimization problems\
    \ in Pyomo is no different from formulating linear or mixed-integer problems.\
    \ All the Pyomo modeling components described throughout the book are used in\
    \ the same way (e.g., Objective, Constraint) except they may include nonlinear\
    \ expressions. Table 7.1 lists the operators currently supported to formulate\
    \ expressions, with examples where x and y are Pyomo Var objects. In addition\
    \ to these operators, Pyomo supports a number of nonlinear functions as described\
    \ in Table 7.2. Note that these are Pyomo-specific functions Pyomo expects, and\
    \ that nonlinear functions from other Python libraries are not supported within\
    \ Pyomo expressions.\n\n> **NOTE:** Passing Pyomo components (e.g., Var, Param)\
    \ to nonlinear functions from other Python packages (e.g., math, or numpy) when\
    \ creating a Pyomo expression will cause an exception to be raised which may be\
    \ difficult to debug. This mistake can be avoided by always using named imports\
    \ and by being explicit about where a nonlinear function is coming from.\n>\n\
    > ```python\n> import pyomo.environ as pyo  # Use pyo.sin in Pyomo\n> import math\
    \ as mt            # expressions not mt.sin\n> ```\n\nTable 7.1: Python operators\
    \ that have been redefined to generate Pyomo expressions.\n\n| Operation | Operator\
    \ | Example |\n| :--- | :--- | :--- |\n| multiplication | * | expr = model.x *\
    \ model.y |\n| division | / | expr = model.x / model.y |\n| exponentiation | **\
    \ | expr = (model.x+2.0) **model.y |\n| in-place multiplication¹ | *= | expr *=\
    \ model.x |\n| in-place division² | /= | expr /= model.x |\n| in-place exponentiation³\
    \ | **= | expr **= model.x |\n\n¹ This example for in-place multiplication is\
    \ equivalent to `expr = expr * model.x`.\n² This example for in-place division\
    \ is equivalent to `expr = expr / model.x`.\n³ This example for in-place exponentiation\
    \ is equivalent to `expr = expr ** model.x`.\n\nTable 7.2: Functions supported\
    \ by Pyomo for the definition of nonlinear expressions. This table assumes that\
    \ Pyomo has been imported with `import pyomo.environ as pyo`.\n\n| Operation |\
    \ Function | Example |\n| :--- | :--- | :--- |\n| arccosine | acos | expr = pyo.acos(model.x)\
    \ |\n| hyperbolic arccosine | acosh | expr = pyo.acosh(model.x) |\n| arcsine |\
    \ asin | expr = pyo.asin(model.x) |\n| hyperbolic arcsine | asinh | expr = pyo.asinh(model.x)\
    \ |\n| arctangent | atan | expr = pyo.atan(model.x) |\n| hyperbolic arctangent\
    \ | atanh | expr = pyo.atanh(model.x) |\n| cosine | cos | expr = pyo.cos(model.x)\
    \ |\n| hyperbolic cosine | cosh | expr = pyo.cosh(model.x) |\n| exponential |\
    \ exp | expr = pyo.exp(model.x) |\n| natural log | log | expr = pyo.log(model.x)\
    \ |\n| log base 10 | log10 | expr = pyo.log10(model.x) |\n| sine | sin | expr\
