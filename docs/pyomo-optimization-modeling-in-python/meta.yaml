    While it is easy to write down optimization problems including dynamic models,
    solving them is hard. Off-the-shelf optimization solvers cannot handle differential
    equations directly. Therefore, optimization problems including differential equations
    as constraints, known as dynamic optimization problems, must be reformulated in
    order to be solved. Common solution approaches include single or multiple shooting
    methods or a full discretization approach. Regardless of the solution strategy,
    the implementation of the technique is often entwined with the particular model
    or problem being solved, which makes it time-consuming to apply these solution
    techniques to new dynamic optimization problems or experiment with different solution
    strategies on the same model.


    The pyomo.dae package addresses several of these challenges. It provides users
    the ability to separate the dynamic optimization formulation from the solution
    strategy used to solve it. This is done by introducing modeling components for
    representing continuous domains and derivative terms directly. pyomo.dae also
    includes implementations of the simultaneous discretization solution technique,
    which can be applied automatically to a Pyomo model with differential equations.
    This chapter provides a brief overview of how to use the pyomo.dae package. We
    refer the reader to Nicholson et al. [44] for a more detailed description and
    information about the design and novelty of this package. This package is still
    under active development and expansion. Please refer to the online Pyomo documentation
    for the most up-to-date documentation on new features.


    # ## 12.2 Pyomo DAE Modeling Components


    The pyomo.dae package defines two new components used to represent DAE models
    in Pyomo:


    +   - ContinuousSet represents continuous domains over which a derivative can
    be taken, and

    - DerivativeVar represents the derivative of a Var with respect to a given ContinuousSet.


    The package is explicitly imported to access these modeling components:


    ```

    python

    import pyomo.environ as pyo

    import pyomo.dae as dae


    ```


    The ContinuousSet component functions similarly to the regular Pyomo Set. It can
    be used to index other Pyomo components such as Var, Constraint, or Expression.
    A ContinuousSet can be thought of as a bounded, continuous range of real values.
    It is often used to represent time or spatial domains. In order to construct a
    ContinuousSet you must supply numeric values representing the upper and lower
    bounds of the continuous domain being represented. For our optimal control example,
    the continuous domain t is declared as follows.'
