  md: "next solution. This process is repeated until the problem is infeasible, and\
    \ no more solutions can be found. The `ConstraintList` component is used to contain\
    \ the list of cuts; each time through the loop a new cut is added to this component.\n\
    \n```\npython\nimport json\nimport pyomo.environ as pyo\nfrom warehouse_model\
    \ import create_wl_model\nimport matplotlib.pyplot as plt\n\n# load the data from\
    \ a json file\nwith open('warehouse_data.json', 'r') as fd:\n    data = json.load(fd)\n\
    \n# call function to create model\nmodel = create_wl_model(data, P=2)\nmodel.integer_cuts\
    \ = pyo.ConstraintList()\nobjective_values = list()\ndone = False\nwhile not done:\n\
    \    # solve the model\n    solver = pyo.SolverFactory('glpk')\n    results =\
    \ solver.solve(model)\n\n    term_cond = results.solver.termination_condition\n\
    \    print('')\n    print('--- Solver Status: {0} ---'.format(term_cond))\n\n\
