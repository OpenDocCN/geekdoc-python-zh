    \n## A.10 对象与类\n\n类定义了对象。换句话说：对象实例化了类。对象可以包含作为数据或函数的成员。在这个上下文中，函数通常被称为方法。顺便指出，我们注意到在Python中，数据和函数从技术上讲都是对象，因此直接说对象可以拥有成员对象也是正确的。\n\
    \n用户定义的类使用 `class` 命令声明，`class` 命令缩进块中的所有内容都是类定义的一部分。一个过于简单的类示例是一个打印其值的存储容器：\n\
    \n```python\nclass IntLocker:\n    sint = None\n    def __init__(self, i):\n \
    \       self.set_value(i)\n    def set_value(self, i):\n        if type(i) is\
    \ not int:\n            print(\"Error: %d is not integer.\" % i)\n        else:\n\
    \            self.sint = i\n    def pprint(self):\n        print(\"The Int Locker\
    \ has \"+str(self.sint))\n\na = IntLocker(3)\na.pprint()  # 打印结果：The Int Locker\
    \ has 3\na.set_value(5)\na.pprint()  # 打印结果：The Int Locker has 5\n```\n\n类 `IntLocker`\
    \ 有一个名为 `sint` 的数据成员和两个成员函数。当调用成员函数时，Python会自动将对象作为第一个参数传递。因此，将成员函数的第一个参数列为 `self`\
    \ 是合理的，因为这是类引用自身的方式。`__init__` 方法是一个特殊的成员函数，在创建对象时会自动调用；这个函数不是必需的。\n\n新的属性可以很容易地附加到Python对象上。例如，对于一个名为\
    \ `a` 的对象，可以使用以下方式附加一个名为 `name` 且值为 \"spam\" 的属性：\n\n```\na.name = \"spam\"\n\
    ```\n\n也可以查询对象以查看它们已经拥有的属性。\n\n## A.11 赋值、`copy` 和 `deepcopy`\n\n### A.11.1 引用\n\
    \nPython中的赋值语句将一个引用与等号左侧给定的变量名关联起来。如果右侧的值是一个字面量，那么Python会在内存中创建该对象，并将一个引用分配给它。例如，考虑以下Python会话：\n\
    \n```\n>>> x = [1,2,3]\n>>> y = x\n>>> x[0] = 3\n>>> x.append(6)\n>>> print(y)\n\
    ```\n\n将产生输出\n\n```\n[3,2,3,6]\n```\n\n但一个微妙之处是，`y` 引用的是与 `x` 相同的东西，而不是 `x` 本身。因此，继续上面的例子：\n\
    \n```\n>>> x = [1,2,3]\n>>> y = x\n>>> x[0] = 3\n>>> x = 'Norwegian Blue'\n>>>\
    \ print(x, y)\n```\n\n将产生输出\n\n```\nNorwegian Blue [3,2,3]\n```\n\nPython中的某些类型是\
    \ *不可变的*，这意味着它们在内存中的值不能被更改；其中包括 `int`、`float`、`decimal`、`bool`、`string` 和 `tuple`。除了\
    \ `tuple` 之外，其他都不足为奇。考虑以下情况：\n\n```\n>>> x = (1,2,3)\n>>> y = x\n>>> x[0] = 3\n\
    ```\n\n这个Python会话将导致错误，因为元组（与列表不同）一旦创建就不能被更改。\n\n### A.11.2 复制\n\n有时引用的赋值并不是我们想要的。对于这些情况，Python的\
    \ `copy` 模块允许将数据从一个变量转移到另一个变量。它通过 `copy` 方法支持 *浅* 拷贝，通过 `deepcopy` 方法支持 *深* 拷贝。这种区别只在复合结构（例如包含列表的字典）中明显。`deepcopy`\
    \ 方法将尝试复制所有内容的新副本，而 `copy` 只会复制顶层，并尝试为其他所有内容创建引用。例如，\n\n```\n>>> import copy\n\
    >>> x = [1,2,3]\n>>> y = copy.deepcopy(x)\n>>> x[0] = 3\n>>> x.append(6)\n>>>\
    \ print(x,y)\n```\n\n将产生输出\n\n```\n[3,2,3,6] [1,2,3]\n```\n\n在这个特定的例子中，`copy.copy`\
    \ 和 `copy.deepcopy` 的行为将是相同的。\n\n## A.12 模块\n\n*模块* 是一个包含Python语句的文件。例如，任何包含定义类或函数的Python“程序”的文件都是一个模块。一个模块中的定义可以通过\
    \ `import` 命令在另一个模块（或程序文件）中变得可用，该命令可以指定要导入的名称，或者通过使用星号来指定导入所有名称。\n\nPython通常安装时会包含许多标准模块，例如\
    \ `types`。命令 `from types import *` 会导入 `types` 模块中的所有名称。\n\n一个目录中的多个模块文件可以组织成一个\
    \ *包*，包可以包含模块和子包。从包导入可以使用一个语句，给出包名（即目录名），后跟一个点，再后跟模块名。例如，命令\n\n```\nimport pyomo.environ\
    \ as pyo\n```\n\n要使用Python类中的方法，可以在目录中包含一个 `__init__.py` 文件，当该模块被导入时，该文件中的任何代码都会被执行。\n\
