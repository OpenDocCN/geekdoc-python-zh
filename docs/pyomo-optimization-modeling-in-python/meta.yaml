    \ expr=2*model.x - model.y )\n\nmodel.compl = Complementarity(\n    expr=complements(0\
    \ <= model.y,\n                     model.y >= model.x) )\n```\n\nThe first lines\
    \ in this script import Pyomo packages. The `pyomo.environ` package initializes\
    \ Pyomo's environment, and `pyomo.mpec` defines modeling components for complementarity\
    \ conditions. The subsequent lines in this script create a model, declare variables\
    \ x and y, declare an objective f1, and declare a complementarity condition `compl`.\n\
    \nThe complementarity condition is declared with the `Complementarity` component.\
    \ In the simplest case, this Python class takes a keyword argument `expr` containing\
    \ the value of the `complements` function. This function accepts two Pyomo constraint\
    \ expressions used to declare a complementarity condition.\n\nPyomo also supports\
    \ indexed components, where a set of components are initialized over an index\
    \ set using a construction rule. Thus, the `Complementarity` component can be\
    \ declared with an index set. For example, consider the following model:\n\n$$\\\
    min \\sum_{i=1}^n i(x_i - 1)^2$$\n$$0 \\le x_i \\perp 0 \\le x_{i+1} \\quad i\
    \ = 1, \\dots, n-1$$\n\nThe following script defines a Pyomo implementation of\
    \ the model with $n = 5$:\n\n```\n# ex1a.py\nimport pyomo.environ as pyo\nfrom\
    \ pyomo.mpec import Complementarity, complements\n\nn = 5\n\nmodel = pyo.ConcreteModel()\n\
    \nmodel.x = pyo.Var( range(1,n+1) )\n\nmodel.f = pyo.Objective(expr=sum(i*(model.x[i]-1)**2\n\
    \                                for i in range(1,n+1)) )\n\ndef compl_(model,\
    \ i):\n    return complements(model.x[i] >= 0, model.x[i+1] >= 0)\nmodel.compl\
    \ = Complementarity( range(1,n), rule=compl_ )\n```\n\nThe complementarity conditions\
    \ are defined with a single `Complementarity`"
  - "[PAGE 200]\n\ncomponent indexed over the set $1, \\ldots, n-1$ and initialized\
    \ with a construction rule `compl_`. This rule is a function that accepts a model\
    \ instance and an index, and returns the $i$-th complementarity condition.\n\n\
    The declared set of indexes may be a superset of the indices defining complementarity\
    \ conditions. If a construction rule returns `Complementarity.Skip`, then the\
    \ corresponding index is skipped. For example:\n\n```\n# ex1d.py\nimport pyomo.environ\
    \ as pyo\nfrom pyomo.mpec import Complementarity, complements\n\nn = 5\n\nmodel\
    \ = pyo.ConcreteModel()\n\nmodel.x = pyo.Var( range(1,n+1) )\n\nmodel.f = pyo.Objective(expr=sum(i*(model.x[i]-1)**2\n\
    \                                for i in range(1,n+1)) )\n\ndef compl_(model,\
    \ i):\n    if i == n:\n        return Complementarity.Skip\n    return complements(model.x[i]\
    \ >= 0, model.x[i+1] >= 0)\nmodel.compl = Complementarity( range(1,n+1), rule=compl_\
    \ )\n```\n\nThis example can also be expressed with the `ComplementarityList`\
    \ component:\n\n```\n# ex1b.py\nimport pyomo.environ as pyo\nfrom pyomo.mpec import\
    \ ComplementarityList, complements\n\nn = 5\n\nmodel = pyo.ConcreteModel()\n\n\
    model.x = pyo.Var( range(1,n+1) )\n\nmodel.f = pyo.Objective(expr=sum(i*(model.x[i]-1)**2\n\
    \                                for i in range(1,n+1)) )\n\nmodel.compl = ComplementarityList()\n\
    model.compl.add(complements(model.x[1]>=0, model.x[2]>=0))\nmodel.compl.add(complements(model.x[2]>=0,\
    \ model.x[3]>=0))\nmodel.compl.add(complements(model.x[3]>=0, model.x[4]>=0))\n\
    model.compl.add(complements(model.x[4]>=0, model.x[5]>=0))\n```\n\nThis component\
    \ defines a list of complementarity conditions. The list index can be used in\
    \ Pyomo, but this component simplifies the declaration of models for which the\
    \ index values are not important. The `ComplementarityList` component can also\
    \ be defined with a rule iteratively yielding complementarity conditions:"
  - "[PAGE 201]\n\n```\npython\n# ex1c.py\nimport pyomo.environ as pyo\nfrom pyomo.mpec\
    \ import ComplementarityList, complements\n\nn = 5\n\nmodel = pyo.ConcreteModel()\n\
    \nmodel.x = pyo.Var( range(1,n+1) )\n\nmodel.f = pyo.Objective(expr=sum(i*(model.x[i]-1)**2\n\
    \                           for i in range(1,n+1)) )\n\ndef compl_(model):\n \
    \   yield complements(model.x[1] >= 0, model.x[2] >= 0)\n    yield complements(model.x[2]\
    \ >= 0, model.x[3] >= 0)\n    yield complements(model.x[3] >= 0, model.x[4] >=\
    \ 0)\n    yield complements(model.x[4] >= 0, model.x[5] >= 0)\nmodel.compl = ComplementarityList(\
    \ rule=compl_ )\n```\n\nSimilarly, the construction rule may be a Python list\
    \ comprehension that generates a sequence of complementarity conditions:\n\n```\n\
    python\n# ex1e.py\nimport pyomo.environ as pyo\nfrom pyomo.mpec import ComplementarityList,\
    \ complements\n\nn = 5\n\nmodel = pyo.ConcreteModel()\n\nmodel.x = pyo.Var( range(1,n+1)\
    \ )\n\nmodel.f = pyo.Objective(expr=sum(i*(model.x[i]-1)**2\n                \
    \           for i in range(1,n+1)) )\n\nmodel.compl = ComplementarityList(\n \
    \   rule=(complements(model.x[i] >= 0, model.x[i+1] >= 0)\n          for i in\
    \ range(1,n)) )\n```\n\n# 13.3 MPEC Transformations\n\nPyomo supports the automated\
    \ transformation of models. Pyomo can iterate through model components as well\
    \ as nested model blocks. Thus, model components can be easily transformed locally,\
    \ and global data can be collected to support global transformations. Further,\
    \ Pyomo components and blocks can be activated and deactivated, which facilitates\
    \ *in place* transformations that do not require the creation of a separate copy\
    \ of the original model.\nPyomo's `pyomo.mpec` package defines several model transformations\
    \ that can"
  - '[PAGE 202]


    # 13.3 MPEC Transformations


    be easily applied. For example, if model defines an MPEC model (as in our previous
    examples), then the following example illustrates how to apply a model transformation:


    ```

    xfrm = pyo.TransformationFactory("mpec.simple_nonlinear") transformed = xfrm.create_using(model)

    ```


    In this case, the mpec.simple_nonlinear transformation is applied. The following
    sections describe the transformations currently supported in pyomo.mpec.


    # 13.3.1 Standard Form


    In Pyomo, a complementarity condition is expressed a pair of constraint expressions


    $l_1 \le expr_1 \le u_1 \perp l_2 \le expr_2 \le u_2$.


    where exactly two of the constant bounds $l_1$, $u_1$, $l_2$ and $u_2$ are finite.
    The non-finite bounds are typically omitted, but the value None can be used to
    express infinite bounds. Additionally, each constraint expression can be expressed
    with a simple inequality of the form


    $expr_3 \le expr_4$.


    The mpec.standard_form transformation reformulates each complementarity condition
    in a model into a standard form:


    $l_1 \le expr \le u_1 \perp l_2 \le var \le u_2$,


    where exactly two of the constant bounds $l_1$, $u_1$, $l_2$ and $u_2$ are finite,
    and either $l_2$ is zero or both $l_2$ or $u_2$ are finite.


    Note that this transformation creates new variables and constraints as part of
    this transformation. For example, the complementarity condition


    $1 \le x+y \perp 1 \le 2x-y$,


    is transformed to:


    $1 \le x+y \perp 0 \le v$,


    where $v \in \mathbb{R}$ and $v = 2x - y - 1$.


    For each complementary condition object, the new variable and constraints are
    added as additional components within the complementarity object. Thus, the overall
    structure of the MPEC model is not changed by this transformation.'
  - "[PAGE 203]\n\n# 13.3.2 Simple Nonlinear\n\nThe `mpec.simple_nonlinear` transformation\
    \ begins by applying the `mpec.standard_form` transformation. Subsequently, a\
    \ nonlinear constraint is created that defines the complementarity condition.\
    \ This is a simple nonlinear transformation adapted from Ferris et al. [17], which\
    \ can be described by three different cases:\n\n+   - If $l_1$ is finite, then\
    \ the following constraint is defined:\n  $$\\left( \\text{expr} - l_1 \\right)\
    \ * v \\leq \\varepsilon$$\n- If $u_1$ is finite, then the following constraint\
    \ is defined:\n  $$\\left( u_1 - \\text{expr} \\right) * v \\leq \\varepsilon$$\n\
    - If $l_2$ and $u_2$ are both finite, then the following constraints are defined:\n\
    \  $$\\left( \\text{var} - l_2 \\right) * \\text{expr} \\leq \\varepsilon$$\n\
    \  $$\\left( \\text{var} - u_2 \\right) * \\text{expr} \\leq \\varepsilon$$\n\n\
    Each of these cases ensure the complementarity condition is met when $\\varepsilon$\
    \ is zero. For example, in the first case, we know $0 \\leq v$ and $0 \\leq \\\
    text{expr} - l_1$. When $\\varepsilon$ is zero, this constraint ensures either\
    \ $v$ is zero or $\\text{expr} - l_1$ is zero.\n\nThis transformation uses the\
    \ parameter `mpec_bound`, which defines the value for $\\varepsilon$ for every\
    \ complementarity condition. This allows for the specification of a relaxed nonlinear\
    \ problem, which may be easier to optimize with some nonlinear programming solvers.\
    \ The default value of `mpec_bound` is zero.\n\n# 13.3.3 Simple Disjunction\n\n\
    The `mpec.simple_disjunction` transformation expresses a complementarity condition\
    \ as a disjunctive program. We are given a complementarity condition defined with\
    \ a pair of constraint expressions\n\n> $$l_1 \\leq \\text{expr}_1 \\leq u_1 \\\
    perp l_2 \\leq \\text{expr}_2 \\leq u_2,$$\n\nwhere exactly two of the constant\
    \ bounds $l_1$, $u_1$, $l_2$ and $u_2$ are finite. Without loss of generality,\
    \ we assume that either $l_1$ or $u_1$ is finite.\n\nThis transformation generates\
    \ the constraints corresponding to the conditions implied by the complementarity\
    \ conditions (see Equation (13.1)). There are three different cases:\n\n+   -\
    \ If the first constraint is an equality, then the complementarity condition is\
    \ trivially replaced by that equality constraint."
- md: "## 13.3.4 AMPL Solver Interface\n\nSolvers like PATH [14] have been tailored\
    \ to work with the AMPL Solver Library (ASL). AMPL uses `nl` files to communicate\
    \ with solvers, which read `nl` files with the ASL. Pyomo can also create `nl`\
    \ files, and the `mpec.nl` transformation processes `Complementarity` components\
    \ into a canonical form suitable for this format [16].\n\n## 13.4 Solver Interfaces\
    \ and Meta-Solvers\n\nPyomo supports interfaces to third-party solvers as well\
    \ as meta-solvers that apply transformations and third-party solvers, perhaps\
    \ in an iterative manner. The `pyomo.mpec` package includes an interface to the\
    \ `PATH` solver, as well as several meta-solvers. These are described in this\
    \ section, and examples are provided employing the `pyomo` command-line interface.\n\
    \n### 13.4.1 Nonlinear Reformulations\n\nThe `mpec.simple_nonlinear` transformation\
    \ provides a generic way for transforming an MPEC into a nonlinear program. When\
    \ the MPEC only has continuous decision variables, the resulting model can be\
    \ optimized by a wide range of solvers.\n\nFor example, the `pyomo` command-line\
    \ interface allows the user to specify a nonlinear solver and a model transformation\
    \ applied to a model:\n\n```\npyomo solve --solver=ipopt \\\n            --transform=mpec.simple_nonlinear\
    \ ex1a.py\n```\n\nThis example illustrates the use of the `ipopt` interior-point\
    \ solver to solve a problem generated with the `mpec.simple_nonlinear` transformation.\
    \ When a transformation is used directly like this, the results returned to the\
    \ user include decision variables for the transformed model. Pyomo does not have\
    \ general capabilities for mapping a solution back into the space from the original\
    \ model. In this example, the results object includes values for the `x` variables\
    \ as well as the variables `v` introduced when applying the transformation to\
    \ the standard form as shown previously.\n\nPyomo includes a meta-solver, `mpec_nlp`\
    \ that applies the nonlinear transformation, performs optimization, and then returns\
    \ results for the original decision variables. For example, `mpec_nlp` executes\
    \ the same logic as the previous `pyomo` example:\n\n```\npyomo solve --solver=mpec_nlp\
    \ ex1a.py\n```\n\nAdditionally, this meta-solver can also manipulate the `\\epsilon`\
    \ values in the model, starting with larger values and iteratively tightening\
    \ them to generate a more accurate model.\n\n```\npyomo solve --solver=mpec_nlp\
    \ \\\n            --solver-options=\"epsilon_initial=0.1 \\\n                \
    \            epsilon_final=1e-7\" \\\n            ex1a.py\n```\n\nThis approach\
    \ may be useful when using a nonlinear solver that has difficulty optimizing with\
    \ equality constraints.\n\n### 13.4.2 Disjunctive Reformulations\n\nThe `mpec.simple_disjunction`\
    \ transformation provides a generic way for transforming an MPEC into a disjunctive\
    \ program. The `mpec_minlp` solver applies this transformation to create a nonlinear\
    \ disjunctive program, and then further reformulates the disjunctive model using\
    \ a “Big-M” transformation provided by the `pyomo.gdp` package. The resulting\
    \ transformation is similar to the reformulation of bilevel models described by\
    \ Fortuny-Amat and McCarl [20]. If the original model was nonlinear, then the\
    \ resulting model is a mixed-integer nonlinear program (MINLP). Pyomo includes\
    \ interfaces to solvers that use the AMPL Solver Library (ASL), so `mpec_minlp`\
    \ can optimize nonlinear MPECs with a solver like Couenne [10].\n\nIf the original\
    \ model was a linear MPEC, then the resulting model is a mixed-integer linear\
    \ program able to be globally optimized (e.g., see Hu et al. [33], Júdice [36]).\
    \ For example, the `pyomo` command can be used to execute the `mpec_minlp` solver\
    \ using a specified MIP solver:\n\n```\npyomo solve --solver=mpec_minlp \\\n \
    \           --solver-options=\"solver=glpk\" ralph1.py\n```\n\nNote that Pyomo\
    \ includes interfaces to a variety of MIP solvers, including CPLEX, Gurobi, CBC,\
    \ and GLPK.\n\n### 13.4.3 PATH and the ASL Solver Interface\n\nPyomo’s solver\
    \ interface for the AMPL Solver Library (ASL) applies the `mpec.nl` transformation,\
    \ writes an AMPL `.nl` file, executes an ASL solver, and then loads the solution\
    \ into the original model. Pyomo provides a custom interface to the PATH solver\
    \ [14], which simply allows the solver to be specified as `path` while the solver\
    \ executable is named `pathamp`.\n\nThe `pyomo` command can execute the PATH solver\
    \ by simply specifying the `path` solver name. For example, consider the `munson1`\
    \ problem from MCPLIB:\n\n```python\n# munson1.py\nimport pyomo.environ as pyo\n\
    from pyomo.mpec import Complementarity, complements\n\nmodel = pyo.ConcreteModel()\n\
    \nmodel.x1 = pyo.Var()\nmodel.x2 = pyo.Var()\nmodel.x3 = pyo.Var()\n\nmodel.f1\
    \ = Complementarity(expr=complements(\n    model.x1 >= 0,\n    model.x1 + 2*model.x2\
    \ + 3*model.x3 >= 1))\n\nmodel.f2 = Complementarity(expr=complements(\n    model.x2\
    \ >= 0,\n    model.x2 - model.x3 >= -1))\n\nmodel.f3 = Complementarity(expr=complements(\n\
    \    model.x3 >= 0,\n    model.x1 + model.x2 >= -1))\n```\n\nThis problem can\
    \ be solved with the following command:\n\n```bash\npyomo solve --solver=path\
    \ munson1.py\n```\n\n## 13.5 Discussion\n\nPyomo supports the ability to model\
    \ complementarity conditions in a manner that is similar to other AMLs. For example,\
    \ the `pyomo-model-libraries` repository [52] includes Pyomo formulations for\
    \ many of the MacMPEC [41] and MC-PLIB [12] models, which were originally formulated\
    \ in GAMS and AMPL. However, Pyomo does not currently support related modeling\
    \ capabilities for equilibrium models, variational inequalities and embedded models,\
    \ which are supported by the GAMS extended mathematical programming framework\
    \ [18].\n\n# Appendix A\nA Brief Python Tutorial\n\n**Abstract** This chapter\
    \ provides a short tutorial of the Python programming language. This chapter briefly\
    \ covers basic concepts of Python, including variables, expressions, control flow,\
    \ functions, and classes. The goal is to provide a reference for the Python constructs\
    \ used in the book. A full introduction to Python is provided by resources such\
    \ as those listed at the end of the chapter.\n\n## A.1 Overview\n\nPython is a\
    \ powerful programming language that is easy to learn. Python is an interpreted\
    \ language, so developing and testing Python software does not require the compilation\
    \ and linking required by traditional software languages like FORTRAN and C. Furthermore,\
    \ Python includes a command-line interpreter that can be used interactively. This\
    \ allows the user to work directly with Python data structures, which is invaluable\
    \ for learning about data structure capabilities and for diagnosing software failures.\n\
    \nPython has an elegant syntax enabling programs to be written in a compact, readable\
    \ style. Programs written in Python are typically much shorter than equivalent\
    \ software developed with languages like C, C++, or Java because:\n\n- Python\
    \ supports many high-level data types that simplify complex operations.\n- Python\
    \ uses indentation to group statements, which enforces a clean coding style.\n\
    - Python uses dynamically typed data, so variable and argument declarations are\
    \ not necessary.\n\nPython is a highly structured programming language providing\
    \ support for large software applications. Consequently, Python is a much more\
    \ powerful language than many scripting tools (e.g., shell languages and Windows\
    \ batch files). Python also includes modern programming language features like\
    \ object-oriented programming,"
  mdcn: "## 13.3.4 AMPL 求解器接口\n\n诸如 PATH [14] 等求解器已经过专门调整，可与 AMPL 求解器库（ASL）协同工作。AMPL\
    \ 使用 `nl` 文件与求解器进行通信，求解器则通过 ASL 读取 `nl` 文件。Pyomo 也能创建 `nl` 文件，而 `mpec.nl` 转换则会将\
    \ `Complementarity` 组件处理成适合此格式的规范形式 [16]。\n\n## 13.4 求解器接口与元求解器\n\nPyomo 支持与第三方求解器的接口，也支持应用转换和第三方求解器的元求解器，后者可能以迭代方式进行。`pyomo.mpec`\
    \ 包包括了与 `PATH` 求解器的接口以及若干元求解器。本节将介绍这些内容，并提供使用 `pyomo` 命令行接口的示例。\n\n### 13.4.1\
    \ 非线性重构\n\n`mpec.simple_nonlinear` 转换提供了一种将 MPEC 转化为非线性规划的通用方法。当 MPEC 仅包含连续决策变量时，所得模型可由广泛的求解器进行优化。\n\
    \n例如，`pyomo` 命令行接口允许用户为模型指定一个非线性求解器和一种模型转换：\n\n```\npyomo solve --solver=ipopt\
    \ \\\n            --transform=mpec.simple_nonlinear ex1a.py\n```\n\n此示例展示了使用 `ipopt`\
    \ 内点求解器来解决由 `mpec.simple_nonlinear` 转换生成的问题。像这样直接使用转换时，返回给用户的结果包含转换后模型的决策变量。Pyomo\
    \ 不具备将解映射回原始模型空间的通用功能。在此示例中，结果对象包含了 `x` 变量的值，以及在将转换应用于如前所述的标准形式时引入的变量 `v` 的值。\n\
    \nPyomo 包含一个元求解器 `mpec_nlp`，它应用非线性转换，执行优化，然后返回原始决策变量的结果。例如，`mpec_nlp` 执行的逻辑与前面的\
    \ `pyomo` 示例相同：\n\n```\npyomo solve --solver=mpec_nlp ex1a.py\n```\n\n此外，该元求解器还可以操作模型中的\
    \ `\\epsilon` 值，从较大的值开始，通过迭代逐步收紧以生成更精确的模型。\n\n```\npyomo solve --solver=mpec_nlp\
    \ \\\n            --solver-options=\"epsilon_initial=0.1 \\\n                \
    \            epsilon_final=1e-7\" \\\n            ex1a.py\n```\n\n当使用难以处理等式约束的非线性求解器时，此方法可能很有用。\n\
    \n### 13.4.2 析取重构\n\n`mpec.simple_disjunction` 转换提供了一种将 MPEC 转化为析取规划的通用方法。`mpec_minlp`\
    \ 求解器应用此转换来创建一个非线性析取规划，然后使用 `pyomo.gdp` 包提供的“大 M”转换进一步重构该析取模型。所得转换类似于 Fortuny-Amat\
    \ 和 McCarl [20] 所描述的二层模型重构。如果原始模型是非线性的，那么所得模型就是混合整数非线性规划（MINLP）。Pyomo 包含与使用 AMPL\
    \ 求解器库（ASL）的求解器的接口，因此 `mpec_minlp` 可以使用像 Couenne [10] 这样的求解器来优化非线性 MPEC。\n\n如果原始模型是线性\
    \ MPEC，那么所得模型就是可以进行全局优化的混合整数线性规划（例如，参见 Hu 等人 [33]，Júdice [36]）。例如，可以使用 `pyomo`\
    \ 命令来执行 `mpec_minlp` 求解器，并指定一个 MIP 求解器：\n\n```\npyomo solve --solver=mpec_minlp\
    \ \\\n            --solver-options=\"solver=glpk\" ralph1.py\n```\n\n请注意，Pyomo\
    \ 包含与各种 MIP 求解器的接口，包括 CPLEX、Gurobi、CBC 和 GLPK。\n\n### 13.4.3 PATH 和 ASL 求解器接口\n\
    \nPyomo 为 AMPL 求解器库（ASL）提供的求解器接口应用 `mpec.nl` 转换，写入一个 AMPL `.nl` 文件，执行一个 ASL 求解器，然后将解加载到原始模型中。Pyomo\
    \ 提供了与 PATH 求解器 [14] 的自定义接口，该接口只需将求解器指定为 `path`，而求解器可执行文件名为 `pathamp`。\n\n只需指定\
    \ `path` 求解器名称，`pyomo` 命令即可执行 PATH 求解器。例如，考虑来自 MCPLIB 的 `munson1` 问题：\n\n```python\n\
    # munson1.py\nimport pyomo.environ as pyo\nfrom pyomo.mpec import Complementarity,\
    \ complements\n\nmodel = pyo.ConcreteModel()\n\nmodel.x1 = pyo.Var()\nmodel.x2\
    \ = pyo.Var()\nmodel.x3 = pyo.Var()\n\nmodel.f1 = Complementarity(expr=complements(\n\
    \    model.x1 >= 0,\n    model.x1 + 2*model.x2 + 3*model.x3 >= 1))\n\nmodel.f2\
    \ = Complementarity(expr=complements(\n    model.x2 >= 0,\n    model.x2 - model.x3\
    \ >= -1))\n\nmodel.f3 = Complementarity(expr=complements(\n    model.x3 >= 0,\n\
    \    model.x1 + model.x2 >= -1))\n```\n\n可以使用以下命令解决此问题：\n\n```bash\npyomo solve\
    \ --solver=path munson1.py\n```\n\n## 13.5 讨论\n\nPyomo 支持以与其他 AML 类似的方式对互补条件进行建模。例如，`pyomo-model-libraries`\
    \ 仓库 [52] 包含了许多最初在 GAMS 和 AMPL 中建模的 MacMPEC [41] 和 MC-PLIB [12] 模型的 Pyomo 公式。然而，Pyomo\
    \ 目前尚不支持相关均衡模型、变分不等式和嵌入式模型的建模功能，而这些功能是 GAMS 扩展数学规划框架 [18] 所支持的。\n\n# 附录 A\n简明\
    \ Python 教程\n\n**摘要** 本章提供 Python 编程语言的简要教程。本章简要介绍了 Python 的基本概念，包括变量、表达式、控制流、函数和类。目标是为本书中使用的\
