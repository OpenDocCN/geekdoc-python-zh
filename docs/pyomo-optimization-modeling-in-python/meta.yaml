  md: "# 13.4.2 Disjunctive Reformulations\n\nThe `mpec.simple_disjunction` transformation\
    \ provides a generic way for transforming an MPEC into a disjunctive program.\
    \ The `mpec_minlp` solver applies this transformation to create a nonlinear disjunctive\
    \ program, and then further reformulates the disjunctive model using a “Big-M”\
    \ transformation provided by the `pyomo.gdp` package. The resulting transformation\
    \ is similar to the reformulation of bilevel models described by Fortuny-Amat\
    \ and McCarl [20]. If the original model was nonlinear, then the resulting model\
    \ is a mixed-integer nonlinear program (MINLP). Pyomo includes interfaces to solvers\
    \ that use the AMPL Solver Library (ASL), so `mpec_minlp` can optimize nonlinear\
    \ MPECs with a solver like Couenne [10].\n\nIf the original model was a linear\
    \ MPEC, then the resulting model is a mixed-integer linear program able to be\
    \ globally optimized (e.g., see Hu et al. [33], Júdice [36]). For example, the\
    \ `pyomo` command can be used to execute the `mpec_minlp` solver using a specified\
    \ MIP solver:\n\n```\npyomo solve --solver=mpec_minlp \\n            --solver-options=\"\
    solver=glpk\" ralph1.py\n```\n\nNote that Pyomo includes interfaces to a variety\
    \ of MIP solvers, including CPLEX, Gurobi, CBC, and GLPK.\n\n# 13.4.3 PATH and\
    \ the ASL Solver Interface\n\nPyomo’s solver interface for the AMPL Solver Library\
    \ (ASL) applies the `mpec.nl` transformation, writes an AMPL `.nl` file, executes\
    \ an ASL solver, and then loads the solution into the original model. Pyomo provides\
    \ a custom interface to the PATH solver [14], which simply allows the solver to\
    \ be specified as `path` while the solver executable is named `pathamp`.\n\nThe\
    \ `pyomo` command can execute the PATH solver by simply specifying the `path`\
    \ solver name. For example, consider the `munson1` problem from MCPLIB:\n\n```\n\
    # munson1.py\nimport pyomo.environ as pyo\nfrom pyomo.mpec import Complementarity,\
    \ complements\n\nmodel = pyo.ConcreteModel()\n\nmodel.x1 = pyo.Var()\nmodel.x2\
    \ = pyo.Var()\nmodel.x3 = pyo.Var()\n\nmodel.f1 = Complementarity(expr=complements(\n\
    \    model.x1 >= 0,\n    model.x1 + 2*model.x2 + 3*model.x3 >= 1))\n```"
