    \ in \\n        subsq_to_row_col[s]) == 1\nmodel.SqCon = pyo.Constraint(model.SUBSQUARES,\
    \ model.VALUES, \\n    rule=_SqCon)\n```\n\nThe last key constraint for the Sudoku\
    \ problem is to make sure that there is only one value allowed per cell. The constraint\
    \ is given by,\n\n$$\\sum_{v \\in VALUES} y[r,c,v] = 1 \\quad \\forall r \\in\
    \ ROWS, c \\in COLS.$$\n\nThe Pyomo code for this constraint is:\n\n```\n# exactly\
    \ one number in each cell\ndef _ValueCon(model, r, c):\n    return sum(model.y[r,c,v]\
    \ for v in model.VALUES) == 1\nmodel.ValueCon = pyo.Constraint(model.ROWS, model.COLS,\
    \ \\n    rule=_ValueCon)\n```\n\nWhen designing Sudoku puzzles, two features may\
    \ change frequently: the initial board layout and the number of integer cuts to\
