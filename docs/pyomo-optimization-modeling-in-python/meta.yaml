    # ### 12.4.2 Restricting Control Input Profiles


    One of the main design considerations for the `pyomo.dae` package was the extensibility
    of the package to include general implementations of common operations applied
    to dynamic optimization problems. One such common operation in the area of optimal
    control is restricting the control input to have a certain profile, typically
    piecewise constant or piecewise linear. Often times when a model is discretized
    using collocation over finite elements the control variable is restricted to be
    constant over each finite element. The `pyomo.dae` package includes a function
    for doing this after a collocation discretization has been applied to a model.
    It works by reducing the number of free collocation points for a particular variable.
    For example, to restrict our control input $u$ to be piecewise constant in our
    small optimal control problem you would add the following line right after applying
    a discretization transformation:


    ```

    discretizer.reduce_collocation_points(m, var=m.u, ncp=1, \n                                       contset=m.t)

    ```


    The `ncp` keyword argument specifies the number of free collocation points per
    finite element for the variable specified by the keyword `var`. Specifying `ncp=1`
    restricts $u$ to have a single free collocation point (or degree of freedom) rendering
    it constant over each finite element. The function works by adding constraints
    to the discretized model which force any extra, undesired collocation points to
    be interpolated from the others.


    # ### 12.4.3 Plotting


    After formulating, discretizing, and solving a dynamic optimization problem, `pyomo.dae`
    makes it easy to plot the resulting dynamic profiles. Because a `ContinuousSet`
    is populated with floating point values from a continuous domain, the user can
    directly create Python lists from it for plotting. Any variable indexed by a `ContinuousSet`
    will have a value for each point in the `ContinuousSet`, after the model has been
    solved. Therefore, creating a Python list for the variable values is just as straightforward
    as for a `ContinuousSet`


    The Python script shown below puts everything together. Assuming the Pyomo model
    has been declared in a separate file, the script shows how to apply a discretization
    and solve the model.'
