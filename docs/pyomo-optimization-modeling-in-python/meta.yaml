    # 5.4.2 A Sudoku Solver


    In this section, we further illustrate the power of scripting in Python with Pyomo.
    Specifically, we will solve a feasibility problem and show how to find all the
    feasible solutions to the Sudoku puzzle. We will solve the problem once, identify
    a feasible solution, then add an integer cut to remove this solution from the
    list of possible solutions, and solve the problem again.


    A typical Sudoku puzzle is shown in Figure 5.2. In this puzzle, one must fill
    in the empty cells with the numbers 1 through 9. Each row must have only one occurrence
    of each number. Likewise, each column must only have one occurrence of each number.
    Finally, each of the nine sub-squares must also only have one occurrence of each
    number. We define the sets *ROWS*, *COLS*, and *VALUES* (all of which contain
    the integers 1 through 9). We then define a binary variable $y[r, c, v]$ to indicate
    which number is in each of the cells. If $y[r, c, v] = 1$, then this implies that
    the value $v$ has been selected for the cell identified by row $r$ and column
    $c$.'
- md: "## 5.4 Examples of Common Scripting Tasks\n\n![](img/ebd5113b8e992ca06e2e931a59f910c7_89_0.png)\n\
    \nFig. 5.2: An example of a Sudoku puzzle prior to solving.\n\nUsing this notation,\
    \ it is relatively straightforward to define the constraints that restrict the\
    \ allowable numbers in each row and column as,\n\n$$\\sum_{c \\in COLS} y[r,c,v]\
    \ = 1 \\quad \\forall r \\in ROWS, v \\in VALUES$$\n$$\\sum_{r \\in ROWS} y[r,c,v]\
    \ = 1 \\quad \\forall c \\in COLS, v \\in VALUES$$\n\nThe Pyomo code for these\
    \ constraints is:\n\n```python\n# exactly one number in each row\ndef _RowCon(model,\
    \ r, v):\n    return sum(model.y[r,c,v] for c in model.COLS) == 1\nmodel.RowCon\
    \ = pyo.Constraint(model.ROWS, model.VALUES, rule=_RowCon)\n\n# exactly one number\
    \ in each column\ndef _ColCon(model, c, v):\n    return sum(model.y[r,c,v] for\
    \ r in model.ROWS) == 1\nmodel.ColCon = pyo.Constraint(model.COLS, model.VALUES,\
    \ rule=_ColCon)\n```\n\nDefining the constraint that restricts the number for\
    \ the sub-squares is a little more difficult. To make the definition easier, we\
    \ define a set with an index for each of the sub-squares. Then, we define a list\
    \ of tuples that describes the map from each of the sub-squares to the list of\
    \ corresponding indices. This list, along with the corresponding sub-squares constraint,\
    \ is defined in the complete code listing for this example at the end of this\
    \ section. The desired constraint for the sub-squares is given by,\n\n$$\\sum_{(r,c)\
    \ \\in ssmap[i]} y[r,c,v] = 1 \\quad \\forall i \\in SUBSQUARES.$$\n\nThe Pyomo\
    \ code for this constraint is:\n\n```python\n# exactly one number in each subsquare\n\
    def _SqCon(model, s, v):\n    return sum(model.y[r,c,v] for (r,c) in subsq_to_row_col[s])\
    \ == 1\nmodel.SqCon = pyo.Constraint(model.SUBSQUARES, model.VALUES, rule=_SqCon)\n\
    ```\n\nThe last key constraint for the Sudoku problem is to make sure that there\
    \ is only one value allowed per cell. The constraint is given by,\n\n$$\\sum_{v\
    \ \\in VALUES} y[r,c,v] = 1 \\quad \\forall r \\in ROWS, c \\in COLS.$$\n\nThe\
    \ Pyomo code for this constraint is:\n\n```python\n# exactly one number in each\
    \ cell\ndef _ValueCon(model, r, c):\n    return sum(model.y[r,c,v] for v in model.VALUES)\
    \ == 1\nmodel.ValueCon = pyo.Constraint(model.ROWS, model.COLS, rule=_ValueCon)\n\
    ```\n\nWhen designing Sudoku puzzles, two features may change frequently: the\
    \ initial board layout and the number of integer cuts to remove previously seen\
    \ solutions. One way to handle this variety of potential inputs is to define a\
    \ function to create the model from a starting puzzle as well as a list of integer\
    \ cuts. However, such a function would be inefficient for our purposes since we\
    \ would be creating an entirely new model each time we wanted to add a single\
    \ new integer cut after each solve. Thus, we will define two separate functions:\
    \ one that creates the initial model given a Sudoku board, and another that adds\
    \ a new integer cut to the given model based on the current value of its variables.\n\
    \nWe define an integer cut using two sets. The first set $S_0$ consists of indices\
    \ for those variables whose current solution is 0, and the second set $S_1$ consists\
    \ of indices for those variables whose current solution is 1. Given these two\
    \ sets, an integer cut constraint that would prevent such a solution from appearing\
    \ again is defined by,\n\n$$\\sum_{(r,c,v) \\in S_0} y[r,c,v] + \\sum_{(r,c,v)\
    \ \\in S_1} (1 - y[r,c,v]) \\geq 1.$$\n\nThe following Python code defines three\
    \ functions. The first, `create_sudoku_model` creates the Pyomo model for the\
    \ Sudoku problem. The second, `add_integer_cut` creates an integer cut corresponding\
    \ to the current solution and adds it to the `ConstraintList` called `IntegerCuts`.\
    \ The third, `print_solution` prints the current solution in the form of a Sudoku\
    \ board.\n\n```python\nimport pyomo.environ as pyo\n\n# create a standard python\
    \ dict for mapping subsquares to\n# the list (row,col) entries\nsubsq_to_row_col\
    \ = dict()\n\nsubsq_to_row_col[1] = [(i,j) for i in range(1,4) for j in range(1,4)]\n\
    subsq_to_row_col[2] = [(i,j) for i in range(1,4) for j in range(4,7)]\nsubsq_to_row_col[3]\
    \ = [(i,j) for i in range(1,4) for j in range(7,10)]\n\nsubsq_to_row_col[4] =\
    \ [(i,j) for i in range(4,7) for j in range(1,4)]\nsubsq_to_row_col[5] = [(i,j)\
    \ for i in range(4,7) for j in range(4,7)]\nsubsq_to_row_col[6] = [(i,j) for i\
    \ in range(4,7) for j in range(7,10)]\n\nsubsq_to_row_col[7] = [(i,j) for i in\
    \ range(7,10) for j in range(1,4)]\nsubsq_to_row_col[8] = [(i,j) for i in range(7,10)\
    \ for j in range(4,7)]\nsubsq_to_row_col[9] = [(i,j) for i in range(7,10) for\
    \ j in range(7,10)]\n\n# creates the sudoku model for a 10x10 board, where the\n\
    # input board is a list of fixed numbers specified in\n# (row, col, val) tuples.\n\
    def create_sudoku_model(board):\n\n    model = pyo.ConcreteModel()\n\n    # store\
    \ the starting board for the model\n    model.board = board\n\n    # create sets\
    \ for rows columns and squares\n    model.ROWS = pyo.RangeSet(1,9)\n    model.COLS\
    \ = pyo.RangeSet(1,9)\n    model.SUBSQUARES = pyo.RangeSet(1,9)\n    model.VALUES\
    \ = pyo.RangeSet(1,9)\n\n    # create the binary variables to define the values\n\
    \    model.y = pyo.Var(model.ROWS, model.COLS, model.VALUES, within=pyo.Binary)\n\
    \n    # fix variables based on the current board\n    for (r,c,v) in board:\n\
    \        model.y[r,c,v].fix(1)\n\n    # create the objective - this is a feasibility\
    \ problem\n    # so we just make it a constant\n    model.obj = pyo.Objective(expr=\
    \ 1.0)\n\n    # exactly one number in each row\n    def _RowCon(model, r, v):\n\
    \        return sum(model.y[r,c,v] for c in model.COLS) == 1\n    model.RowCon\
    \ = pyo.Constraint(model.ROWS, model.VALUES, rule=_RowCon)\n\n    # exactly one\
    \ number in each column\n    def _ColCon(model, c, v):\n        return sum(model.y[r,c,v]\
    \ for r in model.ROWS) == 1\n    model.ColCon = pyo.Constraint(model.COLS, model.VALUES,\
    \ rule=_ColCon)\n\n    # exactly one number in each subsquare\n    def _SqCon(model,\
    \ s, v):\n        return sum(model.y[r,c,v] for (r,c) in subsq_to_row_col[s])\
    \ == 1\n    model.SqCon = pyo.Constraint(model.SUBSQUARES, model.VALUES, rule=_SqCon)\n\
