- md: "## 11.3 Expressing logical constraints\n\nWhile Disjunct blocks capture the\
    \ indicator relationship between the Boolean indicator_var and the constraints\
    \ contained on a disjunct, we also wish to express additional logical constraints\
    \ among the disjunct indicator variables. To support this, Pyomo provides a LogicalConstraint\
    \ component for representing logical constraints in a model. As is the case with\
    \ Constraint components, LogicalConstraint components may be single or indexed,\
    \ and are initialized using an explicit expr keyword argument, or passed a rule\
    \ function through the rule keyword. Where they differ is in the type of expression\
    \ that they take: whereas Constraint accepts relational expressions that are equality\
    \ or inequality expressions, LogicalConstraint accepts a logical expression.\n\
    \nLogical expressions are built using an expression system with Boolean variables\
    \ and Boolean constants combined using logical operators. Table 11.1 shows the\
    \ operators supported for Logical Expressions. The operations for logical expressions\
    \ intentionally do not overlap with the operations supported for algebraic expressions,\
    \ thereby enforcing a semantic distinction between binary (algebraic) variables\
    \ and Boolean (logical) variables.\n\nTable 11.1: Supported operations for generating\
    \ logical expressions. In these examples, X, Y, and Z are declared BooleanVar\
    \ variables (the model. is omitted due to space limitations).\n\n| Operation |\
    \ Function | Method | Operator |\n|-----------|----------|--------|----------|\n\
    | **Unary operations** | | | |\n| negation | pyo.lnot(X) | | ~X |\n| **Binary\
    \ operations** | | | |\n| conjunction | | X.land(Y) | |\n| disjunction | | X.lor(Y)\
    \ | |\n| exclusive disjunction | pyo.xor(X, Y) | X.xor(Y) | |\n| implication |\
    \ pyo.implies(X, Y) | X.implies(Y) | |\n| equivalence | pyo.equivalent(X, Y) |\
    \ X.equivalent_to(Y) | |\n| **n-ary operations** | | | |\n| conjunction | pyo.land(X,\
    \ Y, Z) | | |\n| disjunction | pyo.lor(X, Y, Z) | | |\n| counting (at least m)\
    \ | pyo.atleast(m, X, Y, Z) | | |\n| counting (at most m) | pyo.atmost(m, X, Y,\
    \ Z) | | |\n| counting (exactly m) | pyo.exactly(m, X, Y, Z) | | |\n\nFor our\
    \ generator state example from the previous section, we will use logical constraints\
    \ to capture the state transition rules describing how the generator state can\
    \ change between two time periods. We can express the switching rules as:\n\n\
    ```python\ndef onState(m, g, t):\n    if t == m.TIME.first():\n        return\
    \ pyo.LogicalConstraint.Skip\n    return m.GenOn[g, t].indicator_var.implies(pyo.lor(\n\
    \        m.GenOn[g, t-1].indicator_var,\n        m.GenStartup[g, t-1].indicator_var))\n\
    model.onState = pyo.LogicalConstraint(\n    model.GENERATORS, model.TIME, rule=onState)\n\
    \ndef startupState(m, g, t):\n    if t == m.TIME.first():\n        return pyo.LogicalConstraint.Skip\n\
    \    return m.GenStartUp[g, t].indicator_var.implies(\n        m.GenOff[g, t-1].indicator_var)\n\
    model.startupState = pyo.LogicalConstraint(\n    model.GENERATORS, model.TIME,\
    \ rule=startupState)\n```\n\n## 11.4 Solving GDP models\n\nWhile special-purpose\
    \ solvers are being developed in Pyomo able to parse and manipulate generalized\
    \ disjunctive programming models, Pyomo's standard solver interfaces cannot express\
    \ directly either disjunctions or logical constraints. However, Pyomo includes\
    \ the capability to *transform* a disjunctive model into an equivalent MI(N)LP\
    \ model by converting the logical constraints into their equivalent linear forms\
    \ and relaxing the disjunctive constraints. The transformed (relaxed) model can\
    \ then be solved by an appropriate solver through the standard solver interfaces.\
    \ Pyomo's GDP package provides two automated relaxations: the first relaxes the\
    \ disjunctive constraints by adding so-called \"Big-M\" terms (recovering the\
    \ original model structure from Section 11.1) and the second explicitly generates\
    \ the hull relaxation of the individual disjunctions.\n\n### 11.4.1 Big-M transformation\n\
    \nThe Big-M transformation performs a constraint-by-constraint relaxation of the\
    \ original disjunctive model. This preserves the size (number of variables and\
    \ constraints) of the original model at the expense of possibly generating a weak\
    \ continuous relaxation.\n\nThis transformation begins by recasting each disjunct\
    \ as a normal block, modifying the individual constraints to add the Big-M term.\
    \ For equality constraints and 2-sided inequality constraints (those with both\
    \ upper and lower bounds), the transformation duplicates the constraint as two\
    \ one-sided inequality constraints before relaxing each. The values of the `M`\
    \ parameters can be specified through a `BigM Suffix` placed on the `Disjunct`.\
    \ When transforming linear constraints over bounded variables, this value can\
    \ be estimated automatically by the transformation. Finally, the Big-M transformation\
    \ recasts the `Disjunction` components as the algebraic form of the equivalent\
    \ logical constraint; that is either\n\n$\\exists_k(d_k.indicator\\_var \\land\
    \ \\neg\\exists_l(d_l.indicator\\_var \\land k \\neq l))$  (11.19)\n\nfor exclusive\
    \ disjunctions (the default), or\n\n$\\exists_k(d_k.indicator\\_var)$  (11.20)\n\
    \nfor non-exclusive disjunctions. These constraints have the equivalent algebraic\
    \ forms of\n\n$\\sum_{k \\in K} b_k = 1$  (11.21)\n\nand\n\n$\\sum_{k \\in K}\
    \ b_k \\geq 1$  (11.22)\n\nwhere $b_k$ is the binary variable associated with\
    \ the Boolean variable $d_k.indicator\\_var$.\n\nThe transformation name `gdp_bigm`\
    \ is used to apply the Big-M transformation.\n\n### 11.4.2 Hull transformation\n\
    \nThe hull transformation relaxes the original disjunctive model by generating\
    \ a lifted representation. The transformation follows the procedure of Balas [6]\
    \ for linear disjunctions and Lee and Grossmann [38] (with modifications from\
    \ Sawaya and Grossmann [55]) for nonlinear disjunctions. In both cases, the variables\
    \ appearing in each disjunct are \"disaggregated\" by defining new variables for\
    \ each disjunct and constraining the original variable to be the sum of the disaggregated\
    \ variables. This has the effect of representing the disjunction as the affine\
    \ combination of the individual disjuncts. For disjunctions with only convex constraints,\
    \ the affine combination of the disaggregated (lifted) disjuncts defines the convex\
    \ hull of the disjuncts. The logical Disjunction relationship is converted to\
    \ algebraic form using the same approach as Big-M (Equations 11.19-11.22).\n\n\
    By constraining the disaggregated variables to be zero when the disjunct's indicator\
    \ variable is False, the solution to the discrete relaxed problem will be the\
    \ solution to the original disjunctive problem. This increases the overall size\
    \ of the model (both the number of variables and constraints), but gives a tighter\
    \ continuous relaxation than the Big-M transformation. However, all variables\
    \ must be bounded to apply the hull disjunction, and the Disjunctions can only\
    \ express exclusive relationships (i.e., the \"exactly one\" default case).\n\n\
    The transformation name `gdp_hull` is used to apply the Hull transformation.\n\
    \n---\n\nNote that while the disjuncts may be completely self-contained, with\
    \ their own local variables, parameters, and constraints, they may also reference\
    \ Pyomo components outside their immediate scope. The `Disjunction` component\
    \ is used to associate a set of disjuncts. A disjunction is similar to a constraint,\
    \ in that it can be indexed and defined through rules. However, unlike a `Constraint`,\
    \ where the rule returns a relational expression, the rule for a `Disjunction`\
    \ must return a list of `Disjuncts`. Subsequent model transformations will convert\
    \ the `Disjunction` component and generate the binding constraint across the disjuncts.\
    \ While the general form of a GDP relates the disjuncts using an “OR” operator,\
    \ the vast majority of models actually expect an “exactly one” relationship (a\
    \ generalization of the “exclusive OR” operator). This is so common that the default\
    \ behavior of the `Disjunction` component is to generate the “exactly one” relationship.\
    \ Modelers may, however, specify the original “OR” operator by providing `xor=False`\
    \ to the `Disjunction` declaration. The disjunction for our generator state example\
    \ is properly an “exactly one” relationship, and can be expressed in Pyomo using:\n\
    \n```python\ndef bind_generators(m, g, t):\n    return [m.GenOn[g, t], m.GenOff[g,\
    \ t], m.GenStartup[g, t]]\nmodel.bind_generators = Disjunction(\n    model.GENERATORS,\
    \ model.TIME, rule=bind_generators)\n```\n\nexpr = pyo.inequality(-m.RampDownLimit[g],\n\
    \                 m.Power[g,t] - m.Power[g,t-1],\n                 m.RampUpLimit[g])\n\
    )\nmodel.GenOn = Disjunct(model.GENERATORS, model.TIME, rule=GenOn)\n\ndef GenOff(b,\
    \ g, t):\n    m = b.model()\n    b.power_limit = pyo.Constraint(\n        expr=m.Power[g,t]\
    \ == 0 )\n    if t == m.TIME.first():\n        return\n    b.ramp_limit = pyo.Constraint(\n\
    \        expr=m.Power[g,t-1] <= m.ShutDownRampLimit[g] )\nmodel.GenOff = Disjunct(model.GENERATORS,\
    \ model.TIME, rule=GenOff)\n\ndef GenStartUp(b, g, t):\n    m = b.model()\n  \
    \  b.power_limit = pyo.Constraint(\n        expr=m.Power[g,t] <= m.StartUpRampLimit[g]\
    \ )\nmodel.GenStartup = Disjunct(model.GENERATORS, model.TIME, rule=GenStartUp)\n\
    ```"
  mdcn: "## 11.3 表达逻辑约束\n\n虽然析取块（Disjunct blocks）捕捉了布尔指示变量 `indicator_var` 与其包含的约束之间的指示关系，但我们还希望表达析取指示变量之间的额外逻辑约束。为此，Pyomo\
    \ 提供了 `LogicalConstraint` 组件，用于在模型中表示逻辑约束。与 `Constraint` 组件类似，`LogicalConstraint`\
    \ 组件可以是单个的或带索引的，并使用显式的 `expr` 关键字参数进行初始化，或通过 `rule` 关键字传递一个规则函数。它们的区别在于所接受的表达式类型：`Constraint`\
    \ 接受等式或不等式关系表达式，而 `LogicalConstraint` 接受逻辑表达式。\n\n逻辑表达式是使用一个表达式系统构建的，该系统包含布尔变量和布尔常量，并通过逻辑运算符进行组合。表\
    \ 11.1 展示了逻辑表达式支持的运算符。逻辑表达式的运算有意与代数表达式支持的运算不重叠，从而强制区分二元（代数）变量和布尔（逻辑）变量。\n\n表 11.1：生成逻辑表达式支持的运算。在这些示例中，X、Y\
    \ 和 Z 是声明的 `BooleanVar` 变量（由于篇幅限制，省略了 `model.`）。\n\n| 运算 | 函数 | 方法 | 运算符 |\n|-----------|----------|--------|----------|\n\
    | **一元运算** | | | |\n| 否定 | pyo.lnot(X) | | ~X |\n| **二元运算** | | | |\n| 合取 | |\
    \ X.land(Y) | |\n| 析取 | | X.lor(Y) | |\n| 异或 | pyo.xor(X, Y) | X.xor(Y) | |\n\
    | 蕴含 | pyo.implies(X, Y) | X.implies(Y) | |\n| 等价 | pyo.equivalent(X, Y) | X.equivalent_to(Y)\
    \ | |\n| **n元运算** | | | |\n| 合取 | pyo.land(X, Y, Z) | | |\n| 析取 | pyo.lor(X, Y,\
    \ Z) | | |\n| 计数（至少 m） | pyo.atleast(m, X, Y, Z) | | |\n| 计数（至多 m） | pyo.atmost(m,\
    \ X, Y, Z) | | |\n| 计数（恰好 m） | pyo.exactly(m, X, Y, Z) | | |\n\n对于上一节的发电机状态示例，我们将使用逻辑约束来捕捉描述发电机状态如何在两个时间段之间变化的状态转换规则。我们可以将切换规则表达为：\n\
    \n```python\ndef onState(m, g, t):\n    if t == m.TIME.first():\n        return\
    \ pyo.LogicalConstraint.Skip\n    return m.GenOn[g, t].indicator_var.implies(pyo.lor(\n\
    \        m.GenOn[g, t-1].indicator_var,\n        m.GenStartup[g, t-1].indicator_var))\n\
    model.onState = pyo.LogicalConstraint(\n    model.GENERATORS, model.TIME, rule=onState)\n\
    \ndef startupState(m, g, t):\n    if t == m.TIME.first():\n        return pyo.LogicalConstraint.Skip\n\
    \    return m.GenStartUp[g, t].indicator_var.implies(\n        m.GenOff[g, t-1].indicator_var)\n\
    model.startupState = pyo.LogicalConstraint(\n    model.GENERATORS, model.TIME,\
    \ rule=startupState)\n```\n\n## 11.4 求解 GDP 模型\n\n虽然 Pyomo 中正在开发能够解析和操作广义析取规划模型的专用求解器，但\
    \ Pyomo 的标准求解器接口无法直接表达析取或逻辑约束。然而，Pyomo 包含将析取模型*转换*为等效的 MI(N)LP 模型的能力，方法是将逻辑约束转换为其等效的线性形式，并松弛析取约束。然后，转换后的（松弛的）模型可以通过标准求解器接口由适当的求解器求解。Pyomo\
    \ 的 GDP 包提供了两种自动松弛方法：第一种通过添加所谓的“Big-M”项来松弛析取约束（恢复第 11.1 节的原始模型结构），第二种显式生成各个析取的凸包松弛。\n\
    \n### 11.4.1 Big-M 转换\n\nBig-M 转换对原始析取模型执行逐约束松弛。这以可能生成较弱的连续松弛为代价，保留了原始模型的规模（变量和约束的数量）。\n\
    \n此转换首先将每个析取重铸为一个普通块，修改各个约束以添加 Big-M 项。对于等式约束和双边不等式约束（具有上下界的约束），转换会先将约束复制为两个单边不等式约束，然后再对每个进行松弛。`M`\
    \ 参数的值可以通过放置在 `Disjunct` 上的 `BigM Suffix` 来指定。在转换有界变量上的线性约束时，此值可以由转换自动估算。最后，Big-M\
    \ 转换将 `Disjunction` 组件重铸为等效逻辑约束的代数形式；即对于排他性析取（默认情况）为\n\n$\\exists_k(d_k.indicator\\\
    _var \\land \\neg\\exists_l(d_l.indicator\\_var \\land k \\neq l))$  (11.19)\n\
    \n或对于非排他性析取为\n\n$\\exists_k(d_k.indicator\\_var)$  (11.20)\n\n这些约束具有等效的代数形式\n\n\
    $\\sum_{k \\in K} b_k = 1$  (11.21)\n\n和\n\n$\\sum_{k \\in K} b_k \\geq 1$  (11.22)\n\
    \n其中 $b_k$ 是与布尔变量 $d_k.indicator\\_var$ 相关联的二元变量。\n\n转换名称 `gdp_bigm` 用于应用 Big-M\
    \ 转换。\n\n### 11.4.2 凸包转换\n\n凸包转换通过生成提升表示来松弛原始析取模型。该转换遵循 Balas [6] 对于线性析取的流程，以及\
    \ Lee 和 Grossmann [38]（并采用了 Sawaya 和 Grossmann [55] 的修改）对于非线性析取的流程。在这两种情况下，出现在每个析取中的变量都通过为每个析取定义新变量并约束原始变量为这些分解变量之和来进行“分解”。这具有将析取表示为各个析取的仿射组合的效果。对于仅包含凸约束的析取，分解（提升）析取的仿射组合定义了析取的凸包。逻辑析取关系使用与\
    \ Big-M 相同的方法（公式 11.19-11.22）转换为代数形式。\n\n通过约束分解变量在析取的指示变量为 False 时为零，离散松弛问题的解将是原始析取问题的解。这增加了模型的整体规模（变量和约束的数量），但给出了比\
    \ Big-M 转换更紧的连续松弛。然而，所有变量必须有界才能应用凸包析取，并且析取只能表达排他性关系（即默认的“恰好一个”情况）。\n\n转换名称 `gdp_hull`\
