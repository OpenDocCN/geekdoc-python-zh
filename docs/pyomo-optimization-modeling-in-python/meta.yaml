    # 3.3 Pyomo Models


    Pyomo supports an object-oriented design where modeling components are added to
    a Pyomo model to define the optimization problem. In this section, an overview
    of the common modeling components is given, and complete Pyomo examples of the
    warehouse location problem are provided.


    # 3.3.1 Components for Variables, Objectives, and Constraints


    Optimization problems require, at least, one variable and an objective function.
    Most problems also include constraints. The Pyomo classes for implementing these
    modeling components are `Var`, `Objective`, and `Constraint`. The following example
    shows how these components could be defined:


    ```

    model.x = pyo.Var()

    model.y = pyo.Var(bounds=(-2, 4))

    model.z = pyo.Var(initialize=1.0, within=pyo.NonNegativeReals)


    model.obj = pyo.Objective(expr=model.x**2 + model.y + model.z)


    model.eq_con = pyo.Constraint(expr=model.x + model.y + model.z \n== 1)

    model.ineq_con = pyo.Constraint(expr=model.x + model.y <= 0)

    ```


    This example includes three optimization variables (x, y, and z), a single objective,
    and two constraints. For each optimization variable, an instance of the `Var`
    class is created and that instance is added as an attribute to the model object.
    The code `model.x=pyo.Var()` creates an instance of the Pyomo class `Var` and
    assigns it to `model.x`. The `model` object identifies when a component is being
    added and performs special processing that includes, for example, setting the
    name of the instance of `Var` to "x", and setting a reference to the owning model.


    This example declares $x$ as a continuous variable, but keyword arguments can
    be used to define different properties of the Pyomo `Var`. For example, `bounds`
    is'
