    # 1.1 Modeling Languages for Optimization


    This book describes a tool for mathematical modeling: the Python Optimization
    Modeling Objects (Pyomo) software package. Pyomo supports the formulation and
    analysis of mathematical models for complex optimization applications. This capability
    is commonly associated with commercial algebraic modeling languages (AMLs) such
    as AIMMS [1], AMPL [2], and GAMS [22]. Pyomo implements a rich set of modeling
    and analysis capabilities, and it provides access to these capabilities within
    Python, a full-featured, high-level programming language with a large set of supporting
    libraries.

    Optimization models define the goals or objectives for a system under consideration.
    Optimization models can be used to explore trade-offs between goals and objectives,
    identify extreme states and worst-case scenarios, and identify key factors that
    influence phenomena in a system. Consequently, optimization models are used to
    analyze a wide range of scientific, business, and engineering applications.

    The widespread availability of computing resources has made the numerical analysis
    of optimization models commonplace. The computational analysis of an optimization
    model requires the specification of a model that is communicated to a solver software
    package. Without a language to specify optimization models, the process of writing
    input files, executing a solver, and extracting results from a solver is tedious
    and error-prone. This difficulty is compounded in complex, large-scale,'
