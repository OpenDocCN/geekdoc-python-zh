    # 第1章 引言


    **摘要** 本章介绍并阐述了 Pyomo，一个基于 Python 的优化问题建模与求解工具。建模是科学研究、工程和商业诸多方面的基本过程。像 Pyomo
    这样的代数建模语言是用于指定和求解数学优化问题的高级语言。Pyomo 是一个灵活、可扩展的建模框架，它在广泛使用的编程语言环境中，捕捉并扩展了现代代数建模语言的核心思想。


    ### 1.1 优化建模语言


    本书描述了一个用于数学建模的工具：Python 优化建模对象（Pyomo）软件包。Pyomo 支持为复杂优化应用构建和分析数学模型。这种能力通常与商业代数建模语言（AMLs）相关联，例如
    AIMMS [1]、AMPL [2] 和 GAMS [22]。Pyomo 实现了一套丰富的建模和分析功能，并在 Python 这种功能齐全、拥有大量支持库的高级编程语言中提供了对这些功能的访问。


    优化模型定义了所考虑系统的目标或目的。优化模型可用于探索目标之间的权衡、识别极端状态和最坏情况，以及识别影响系统现象的关键因素。因此，优化模型被用于分析广泛的科学、商业和工程应用。


    计算资源的广泛普及使得优化模型的数值分析变得普遍。优化模型的计算分析需要指定一个模型，并将其传递给求解器软件包。如果没有用于指定优化模型的语言，编写输入文件、执行求解器以及从求解器中提取结果的过程将是繁琐且容易出错的。在复杂的、大规模的现实世界应用中，当错误发生时难以调试，这种困难会加剧。此外，求解器使用许多不同的输入格式，但很少有被认为是标准的。因此，将多个求解器应用于分析单个优化模型会引入额外的复杂性。再者，模型验证（即确保传递给求解器的模型准确反映了开发者意图表达的模型）在没有用于表达模型的高级语言的情况下是极其困难的。


    代数建模语言（AMLs）是用于描述和求解优化问题的高级语言 [26, 37]。AMLs 通过支持优化问题的高级规范，最大限度地减少了分析优化模型相关的困难。此外，AML
    软件为用于分析问题的外部求解器包提供了严格的接口，并允许用户在其高级模型规范的上下文中与求解器结果进行交互。


    像 AIMMS [1]、AMPL [2, 21] 和 GAMS [22] 这样的定制 AMLs 实现了优化模型规范语言，具有直观简洁的语法来定义变量、约束和目标。此外，这些
    AMLs 支持指定抽象概念，如稀疏集、索引和代数表达式，这些在指定具有数千或数百万约束和变量的大规模现实世界问题时至关重要。这些 AMLs 可以表示各种各样的优化模型，并且它们与丰富的求解器包接口。AMLs
    正越来越多地被扩展以包含自定义脚本功能，这使得可以在优化模型规范的同时表达高级分析算法。


    一种互补的策略是使用扩展了标准高级编程语言（而不是基于专有语言）的 AML 来构建优化模型，并使用用低级语言编写的求解器进行分析。这种双语言方法利用了高级语言在构建优化问题方面的灵活性和低级语言在数值计算方面的效率。这是科学计算软件中一种日益常见的方法。Matlab
    TOMLAB 优化环境 [57] 是使用这种方法最成熟的优化软件包之一；Pyomo 也强烈地利用了这种方法。类似地，像 Java 和 C++ 这样的标准编程语言已被扩展以包含
    AML 构造。例如，像 FlopC++ [19]、OptimJ [47] 和 JuMP [13] 这样的建模库分别支持在 C++、Java 和 Julia
    中使用面向对象的设计来指定优化模型。尽管这些建模库牺牲了定制 AML 的一些直观数学语法，但它们允许用户利用现代高级编程语言的灵活性。这些 AML 库的另一个优势是它们可以直接链接到高性能优化库和求解器，这在某些应用中可能是一个重要的考虑因素。'
