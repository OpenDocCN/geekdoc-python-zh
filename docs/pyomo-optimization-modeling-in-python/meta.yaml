    # # Chapter 10

    Abstract Models and Their Solution


    **Abstract** This chapter describes how to declare and use an `AbstractModel`
    and data command files to initilize abstract models. Finally, this chapter describes
    the `pyomo` command, which makes it particularly easy to solve an abstract model
    using data command files. Although concrete and abstract models provide similar
    functionality, abstract models make a strong seperation of model formulation and
    model data, which is conceptually nice and practically useful in some contexts.


    # ## 10.1 Overview


    In many of the examples in this book, we use a function that takes in data and
    returns a `ConcreteModel`. This facilitates separating the concepts of model and
    data. The `AbstractModel` class in Pyomo provides this separation by populating
    the model with data only after the abstract model object has been created.


    # ### 10.1.1 Abstract and Concrete Models


    Pyomo supports two strategies for model declaration: concrete models, which immediately
    construct model components, and abstract models, which defer component construction.
    Abstract models reflect the structure of many mathematical optimization formulations.
    For example, the formulation of the warehouse location problem (WL) on page 26
    is written in a general manner describing a class of optimization problems. However,
    we cannot *solve* this problem because the actual data for the problem ($N$, $M$,
    $d$, and $P$) have not been specified. A solver must be given a specific instance
    of a problem (with the data specified).


    In Pyomo, an abstract model is declared first, and component construction is delayed
    until the data is loaded and Pyomo creates the model instance. This modeling approach
    is illustrated in the top pane of Figure 10.1. An `AbstractModel` object'
  - '[PAGE 145]


    is created, and then the data for a particular problem is given to Pyomo, and
    then Pyomo performs the construction process in order to create an *instance*
    of the model with all the variables, constraint expressions, and objective expressions
    that can be sent to a solver. This requires a two-pass approach where the model
    is declared in the first pass, and subsequently the model is constructed using
    data values specified separately. To support delayed construction, the model must
    be defined using construction rules.


    By contrast, concrete models support a programmatic style where the model instance
    is created immediately; model components are constructed and initialized on the
    first pass as Python executes the model script. This modeling approach is illustrated
    in the bottom pane of Figure 10.1. A ConcreteModel object is created, and the
    data needs to be present *before* each component is declared. As Python executes
    your model script, the particular model instance and its components are created
    immediately as Python encounters the component declaration. Once the execution
    through the Python file is completed the model is ready to be sent to the solver
    (i.e., a single pass). At this point, the ConcreteModel is the specific instance.


    > NOTE: Construction rules can be still be used with concrete models (the rules
    are immediately fired as they are encountered in the model''s Python file).


    # AbstractModel construction process


    ![](img/ebd5113b8e992ca06e2e931a59f910c7_145_0.png)


    # ConcreteModel construction process


    ![](img/ebd5113b8e992ca06e2e931a59f910c7_145_1.png)


    Fig. 10.1: This figure describes the construction process for both abstract and
    concrete models. The top pane describes the declarative style used for abstract
    models. The AbstractModel is first created. Then, given a particular realization
    of the data, Pyomo performs the construction process in order to create an instance
    of the model that can be sent to the solver. The bottom pane describes the programmatic
    style used for concrete models. As Python executes the model script, the component
    objects are constructed immediately using data previously declared. The particular
    model instance is ready to be sent to the solver once the first pass is complete.'
  - '[PAGE 146]


    The choice of which model object to use (`AbstractModel` or `ConcreteModel`) is
    largely a matter of taste and preference. The biggest difference between the use
    of `AbstractModel` or `ConcreteModel` relates to the specification of data. When
    using an `AbstractModel`, the names and structure of the data used in a model
    are declared prior to construction (but not the values themselves). This means
    Pyomo is aware of the existence of the sets and parameters that *will* be encountered
    when constructing the instance. More importantly, Pyomo knows the associated names
    and types of these quantities and something about the relationships among them
    (e.g., the variable $y$ is indexed by set $N$). This allows the user to specify
    the data using any number of Pyomo supported data formats while referring to these
    quantities by name. Pyomo includes many options for supplying data to an abstract
    model, including a *data command file* to specify values for set and parameter
    data. The syntax of Pyomo''s data command files is very similar to the data command
    syntax supported by AMPL [2].


    Concrete models facilitate more straightforward use of native Python data types
    when creating a model instance. Therefore, if you are more comfortable building
    models in a procedural programming environment (like Python or MATLAB), or if
    your application requires a more extensive workflow than that supported by the
    `pyomo` command, then a `ConcreteModel` is more appropriate. This is especially
    true if your data can be easily loaded into Python through other Python packages
    (e.g., pandas).


    > **NOTE:** In general, an `AbstractModel` is more straightforward for users that
    are unfamiliar with Python or prefer to work in some more traditional AML environments.
    A `ConcreteModel` often requires Python coding on the part of the user to load
    the data (e.g., using an existing Python package for the raw data format) and
    apply it to the model, but offers transparent control over execution order.


    # 10.1.2 An Abstract Formulation of Model (H)


    Consider model (H) (see page 19), which is reproduced here for convenience:


    ```

    $$\begin{aligned}

    \max_{x} \sum_{i \in \mathscr{A}} h_i \cdot (x_i - (x_i/d_i)^2) \quad (H) \n\text{s.t.}
    \sum_{i \in \mathscr{A}} c_i x_i \leq b \n0 \leq x_i \leq u_i, \quad i \in \mathscr{A}

    \end{aligned}$$

    ```


    Since model (H) is an abstract model, a natural way of expressing this model in
    Pyomo is with Pyomo''s `AbstractModel` class.'
  - "[PAGE 147]\n\n# Consider the following Pyomo model for this problem:\n\n```\n\
    python\n# AbstractH.py - Implement model (H)\nimport pyomo.environ as pyo\n\n\
    model = pyo.AbstractModel(name=\"(H)\")\n\nmodel.A = pyo.Set()\n\nmodel.h = pyo.Param(model.A)\n\
    model.d = pyo.Param(model.A)\nmodel.c = pyo.Param(model.A)\nmodel.b = pyo.Param()\n\
    model.u = pyo.Param(model.A)\n\ndef xbounds_rule(model, i):\n    return (0, model.u[i])\n\
    model.x = pyo.Var(model.A, bounds=xbounds_rule)\n\ndef obj_rule(model):\n    return\
    \ sum(model.h[i] * \\\n            (model.x[i] - (model.x[i]/model.d[i])**2) \\\
    \n            for i in model.A)\nmodel.z = pyo.Objective(rule=obj_rule, sense=pyo.maximize)\n\
    \ndef budget_rule(model):\n    return sum(model.c[i]*model.x[i] for i in model.A)\
    \ <= model.b\nmodel.budgetconstr = pyo.Constraint(rule=budget_rule)\n\n```\n\n\
    Given particular data for the parameters in this model, then one might be interested\
