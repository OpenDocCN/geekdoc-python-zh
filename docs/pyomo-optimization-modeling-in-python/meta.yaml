  md: '# Chapter 3

    Pyomo Overview


    **Abstract** This chapter provides an overview of the modeling strategies and
    capabilities of Pyomo. A brief discussion of the core modeling components supported
    by Pyomo, and some of the modeling capabilities within Pyomo (e.g., discrete variables
    and nonlinear models) are provided.


    # 3.1 Introduction


    Pyomo supports an object-oriented design for the definition of optimization models.
    A Pyomo *model* object contains a collection of modeling *components* defining
    the optimization problem. The Pyomo package includes modeling components necessary
    to formulate an optimization problem: variables, objectives, and constraints,
    as well as other modeling components commonly supported by modern AMLs, including
    index sets and parameters. These basic modeling components are defined in Pyomo
    through the following Python classes:


    ```

    Var          optimization variables in a model

    Objective    expressions that are minimized or maximized in a model

    Constraint   constraint expressions in a model

    Set          set data that is used to define a model instance

    Param        parameter data that is used to define a model instance

    ```


    In this chapter, an overview of these components and the process to define and
    solve Pyomo models is given. The basic steps of a simple modeling process are
    as follows:


    +   1. Create an instance of a model using Pyomo modeling components.

    2. Pass this instance to a solver to find a solution.

    3. Report and analyze results from the solver.


    Pyomo supports general scripting with Python where a user can flexibly control
    the solution process and develop a custom workflow, such as solving sequences
    of problems with modifications, or more complex meta-algorithms.'
  merge: -1
