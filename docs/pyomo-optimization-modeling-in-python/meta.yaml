    \ respectively. The components are imported from the GDP package:\n\n```\npython\n\
    from pyomo.gdp import Disjunct, Disjunction\n```\n\nA disjunct is logically a\
    \ container for the indicator variable and the corresponding constraints. Here\
    \ we see the power of the hierarchical modeling approach enabled by the `Block`\
    \ component: the `Disjunct` component is naturally derived from the `Block` class.\
    \ As with blocks, `Disjunct` components may be arbitrarily indexed and initialized\
