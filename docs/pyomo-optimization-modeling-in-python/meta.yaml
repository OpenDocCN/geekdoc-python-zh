    -   `Suffix.EXPORT`：后缀数据将由插件从模型导出到求解器。\n-   `Suffix.IMPORT_EXPORT`：后缀数据既会被导入也会被导出。\n\
    \n并非所有求解器插件都保证能管理后缀信息流，但用户可以通过配置后缀组件来控制此信息流。\n\n`datatype`关键字参数指定后缀中保存的数据类型。此参数可以是三个可能的值之一：\n\
    \n-   `Suffix.FLOAT`：浮点数据（默认值）。\n-   `Suffix.INT`：整数数据。\n-   `None`：任意类型的数据。\n\
