    \n```\nN = ['Harlingen', 'Memphis', 'Ashland']\nM = ['NYC', 'LA', 'Chicago', 'Houston']\n\
    ```\n\n然后，使用这些数据，我们可以声明变量如下：\n\n```\nmodel.x = pyo.Var(N, M, bounds=(0,1))\nmodel.y\
