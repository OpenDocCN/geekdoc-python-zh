    \ generated and added to the Pyomo model as equality constraints.\nThe code required\
    \ to apply the backward finite difference method to our optimal control example\
    \ is as follows:\n\n```python\ndiscretizer = pyo.TransformationFactory('dae.finite_difference')\n\
